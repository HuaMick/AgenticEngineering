agent: orchestration-build
category: orchestration
clarity_score: 4
completeness_score: 4
consistency_score: 3

overview: |
  The orchestration-build agent guidance is well-structured with a clear mermaid flowchart process,
  comprehensive inputs definition, and appropriate manifest. The agent correctly delegates planning
  and spawns appropriate subagents. However, there are clarity gaps around path references and
  one broken documentation link that reduces consistency score.

issues:
  - severity: high
    description: "Incorrect path reference to agent-role-scope-matrix.md. Inputs.yml references 'docs/agent-role-scope-matrix.md' (line 121), but the file is actually located at 'modules/AgenticGuidance/docs/agent-role-scope-matrix.md'. This breaks documentation navigation and violates the stated path resolution semantics where 'docs/plans/' is relative to TARGET PROJECT root, but this reference should be relative to REPOSITORY ROOT per line 4."
    location: "inputs.yml:121"
    impact: "Agents cannot locate the referenced file; documentation link is broken"

  - severity: medium
    description: "Path resolution semantics explanation could be clearer. Lines 4-10 of inputs.yml explain that most paths are repository-relative, but docs/plans/ is target-project-relative. However, this semantic is not explicitly applied to the approved_plan_path example on line 57, which shows 'docs/plans/live/260103_feature_xyz/' without clarifying that this path is target-project-relative, not repository-relative. This may confuse agents about where to resolve paths."
    location: "inputs.yml:57"
    impact: "Agents may misunderstand path resolution for approved_plan_path parameter"

  - severity: medium
    description: "Process diagram references 'planner-guidance-testing' agent (lines 47, 179) but terminology is inconsistent. The manifest lists it as 'planner-guidance-testing', and it exists in agents/planner/planner-guidance-testing/, but the process diagram calls it 'planner-guidance-testing' (correct) while referring to it generically as 'guidance validation phase' without clarifying the agent name consistency across subgraph boundaries."
    location: "process.mmd:179"
    impact: "Low - naming is consistent but could have explicit AGENT_ROUTING metadata for clarity"

  - severity: low
    description: "User escalation points AskUser and AskUserPlan in the flowchart diagram (lines 26, 38, 73, 96) do not have explicit guidance on what information should be captured when escalating. The diagram shows escalation but doesn't specify escalation protocol, expected context, or next steps."
    location: "process.mmd:26,38,73,96"
    impact: "Agents may not provide structured escalation context when asking users"

  - severity: low
    description: "Failure context re-planning pattern uses dotted lines to indicate loops (line 243: linkStyle 29,35,47,48,49,54), but the semantic meaning of these dotted lines (re-planning with failure context) could be more explicitly documented in the diagram comments or a legend. Currently explained in lines 237-241 but easy to miss."
    location: "process.mmd:243"
    impact: "Agents may misunderstand feedback loop semantics without careful diagram study"

  - severity: low
    description: "Inputs.yml line 121 references 'modules/AgenticGuidance/agents/planner/planner-build/manifest.yml' but the reference list uses relative paths inconsistently - some are modules/..., some are docs/, and none have a common explanation of how these are all repository-relative. Creates pattern inconsistency even though all work."
    location: "inputs.yml:119-124"
    impact: "Pattern clarity - makes it harder for future references to follow conventions"

recommendations:
  - "Update inputs.yml line 121 to reference correct path: 'modules/AgenticGuidance/docs/agent-role-scope-matrix.md'"
  - "Add explicit note to the approved_plan_path input example (line 57) clarifying that this is a TARGET PROJECT-relative path, with example: 'Example: docs/plans/live/260103_feature_xyz/ (relative to target_project_path)'"
  - "Add escalation protocol section to inputs.yml explaining what structured context should be captured when agents invoke AskUser or AskUserPlan decision points"
  - "Add a legend or key to the process diagram explaining that dotted lines represent re-planning feedback loops with failure context (ref: section FEEDBACK LOOP ENTRY POINTS lines 50-56)"
  - "Consider making the path resolution semantics table more explicit with a comparison showing repository-relative vs target-project-relative examples"
  - "Add explicit AGENT_ROUTING metadata reference in process diagram comments for all spawned agents to clarify routing against manifest spawns fence"

strengths:
  - Clear separation of concerns: manifest defines spawns fence, inputs defines all parameters and references, process defines execution flow
  - Comprehensive reference to guidelines and definitions with specific locations
  - Explicit max_iterations constraints linked to agent-loops definitions
  - Well-documented feedback loop semantics with failure context types (TEST_FAILURE, CICD_FAILURE, GUIDANCE_GAP, AUDIT_FAILURE)
  - Proper delegation pattern: orchestration-build delegates to orchestration-planning when needed, uses pre-approved plans when available
  - Clear planning subgraph shows both paths (pre-approved plan loading and planning delegation)
  - Comprehensive implementation, CI/CD, guidance, and audit validation phases

deprecation_status: Not deprecated. Version 2.0 indicates "reference layer architecture" which is current.

notes: |
  The agent is well-designed for code implementation orchestration. The main issue is the broken documentation
  link which should be corrected immediately. Secondary issues relate to clarity of path resolution semantics
  and escalation protocols, which are important for agent adoption but don't block functionality.
