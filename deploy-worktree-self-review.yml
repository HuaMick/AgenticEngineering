agent: deploy-worktree
category: deploy
clarity_score: 3
completeness_score: 2
consistency_score: 3

# REVIEW SUMMARY
# ==============
# The deploy-worktree agent guidance provides a solid foundation but has notable
# gaps in clarity, missing output specifications, and potential CLI command inconsistencies.
# The three-file structure (manifest.yml, process.yml, inputs.yml) is well-organized,
# but the guidance expects CLI implementations that may not fully support stated operations.

issues:
  - severity: critical
    description: |
      Process.yml references CLI command `agentic worktree status` which returns "JSON with path,
      branch, is_worktree flag, and active plans" (Step 2, line 53-54), but implementation details
      about the JSON structure are missing. No schema is provided for parsing the response.
    location: "process.yml:53-55, inputs.yml definition context"
    impact: "Agent cannot reliably parse CLI output without knowing expected JSON structure"

  - severity: critical
    description: |
      VS Code workspace file update is marked as "manual" (Step 4, line 70: "NOTE: Workspace file
      update remains manual as it requires VS Code integration"), but process.yml Step 5 expects
      validation and Step 1 asks to proceed only if all inputs are found. This creates a logical
      gap: can the agent detect if workspace update failed? Is it optional or required?
    location: "process.yml:65-73"
    impact: "Unclear whether workspace_updated output can be false, and how agent recovers from manual step failure"

  - severity: high
    description: |
      Output schema defines "workspace_updated" as required:true (process.yml:29-32), but the
      process indicates workspace file update is manual and may fail silently. Required boolean
      output conflicts with manual, potentially-failing operation.
    location: "process.yml:29-32 vs process.yml:65-73"
    impact: "Unclear completion criteria and output validation"

  - severity: high
    description: |
      process.yml references Step 6 validation using `agentic plan validate` command (line 76),
      but CLI implementation (worktree.py) does NOT validate plan folder syntax or structure
      in cmd_create. The planning folder is created but cmd_status() has no output about
      plan folder validation results. This step may be aspirational.
    location: "process.yml:75-81, Step 6"
    impact: "Stated validation step may not execute as documented"

  - severity: high
    description: |
      Output validation_status (process.yml:34-40) specifies required_fields including
      "yaml_syntax_valid", but no step in the process actually checks YAML syntax. Step 6
      references CLI validation but worktree.py does not perform syntax validation.
    location: "process.yml:34-40 and 75-81"
    impact: "Output schema promises validation that is not actually performed"

  - severity: medium
    description: |
      Plan folder naming convention example shows "260110MyProject_feature_auth" (process.yml:27),
      but actual CLI implementation (worktree.py:78) generates format "260103AE_feature-auth"
      using 2-letter abbreviation, not full project name. Examples don't match implementation.
    location: "process.yml:26-27 example, worktree.py:62-78"
    impact: "Agent and user receive incorrect examples of expected output format"

  - severity: medium
    description: |
      manifest.yml is extremely sparse (10 lines, mostly metadata), but process.yml references
      it as consolidated into inputs.yml header (inputs.yml comment line 71: "NOTE: manifest.yml
      consolidated into inputs.yml header"). This consolidation is mentioned but not clearly
      explained in manifest.yml itself.
    location: "manifest.yml completeness, inputs.yml:71 comment"
    impact: "Unclear separation of concerns between manifest and inputs"

  - severity: medium
    description: |
      Step 1 in process.yml (lines 47-50) asks agent to flag input discrepancies and update
      paths, but no output field is defined for capturing these corrections. Agent is instructed
      to modify inputs but has no mechanism to report what was changed.
    location: "process.yml:47-50"
    impact: "No output capture for one of the first procedural steps"

  - severity: medium
    description: |
      inputs.yml defines "SIGNPOST" notation (lines 35-41) for variable usage in git commands,
      but the actual git commands shown in worktree_operations (lines 123-128) don't use these
      ${REPO_ROOT} variables. Example shows bare `git -C <main-repo-path>` instead of ${REPO_ROOT}.
    location: "inputs.yml:35-41 vs inputs.yml:123-128"
    impact: "Inconsistent variable conventions between definition and operations"

  - severity: medium
    description: |
      process.yml references inputs.yml definitions for "workspace_file" and "worktree_naming_convention"
      (Step 4, line 66), but inputs.yml does NOT contain a "worktree_naming_convention" definition.
      Only "git_worktree_commands", "workspace_file", "worktree_operations", and "planning_scaffolding"
      are defined.
    location: "process.yml:66, inputs.yml:101-141"
    impact: "Referenced definition missing - agent will not find worktree_naming_convention in inputs"

  - severity: low
    description: |
      process.yml Step 2 (line 53) uses backticks for CLI command formatting (`agentic worktree status`),
      but CLI entry point is documented in cli-commands.yml. Process uses informal backticks instead of
      referencing cli-commands.yml for authoritative command syntax.
    location: "process.yml:53, 58, 76, 85-87"
    impact: "Minor: inconsistent documentation style, but no functional impact"

  - severity: low
    description: |
      inputs.yml note on line 18 mentions "target_project_path" being same as "REPO_ROOT", but
      target_project_path is never defined as an input or referenced elsewhere in deploy-worktree guidance.
      This appears to be borrowed context from orchestration.
    location: "inputs.yml:18-20"
    impact: "Confusing reference to undefined variable in notes"

  - severity: low
    description: |
      inputs.yml references "modules/AgenticGuidance/assets/inputs/deploy-shared.yml" but the file
      is very minimal (16 lines) and only references guidance.yml and friction.yml without providing
      actual deployment guidance relevant to worktrees. The layer appears under-provisioned.
    location: "inputs.yml:66, deploy-shared.yml content"
    impact: "Layer reference exists but provides minimal substance for deploy-worktree"

recommendations:
  - |
    ADD CRITICAL: Define explicit JSON schema for `agentic worktree status` output in either
    inputs.yml or a new definitions section. Include example output showing structure of JSON
    response, branches, is_worktree flag format, and active_plans structure.

  - |
    CLARIFY: Rewrite Step 4 (VS Code workspace update) to either:
    (a) Make it automatic via CLI command instead of manual, OR
    (b) Mark workspace_updated as optional:false instead of required:true, OR
    (c) Provide explicit failure handling and recovery steps if manual update fails

  - |
    CORRECT: Update process.yml examples (line 27) to use actual format from CLI implementation:
    "YYMMDDAB_feature_auth" (2-letter abbreviation) instead of "YYMMDDRepo_Branch"

  - |
    FIX CRITICAL: Either implement plan validation in CLI (agentic plan validate command)
    or remove Step 6 and remove validation_status from outputs. Current state promises validation
    that is not performed.

  - |
    REMOVE: Delete or clarify the worktree_naming_convention reference in Step 4 (process.yml:66).
    If this definition exists elsewhere, reference it properly. If not, define naming conventions
    directly in inputs.yml definitions section.

  - |
    IMPROVE: Add output field to Step 1 capturing any input path corrections made by agent,
    OR remove the instruction to flag and update discrepancies since there's nowhere to report them.

  - |
    STANDARDIZE: Use consistent variable notation throughout:
    - Either use ${REPO_ROOT} everywhere, OR
    - Use <repo_root> everywhere
    Current mix of ${REPO_ROOT} (inputs.yml header), bare paths (operations), and <angle-brackets>
    (CLI examples) is confusing.

  - |
    ENHANCE: Add pre-conditions validation step. Before Step 1, verify:
    - .git/ directory exists and is valid
    - ${REPO_ROOT} is writable and accessible
    - Sufficient disk space for worktree
    - No merge conflicts in main branch before checkout

  - |
    ADD: Define explicit success criteria for each output:
    - worktree_path: "git worktree list shows this path with correct branch"
    - plan_folder_path: "Directory exists with live/ and completed/ subdirectories"
    - workspace_updated: "VS Code workspace file parses as valid JSON and includes new folder"
    - validation_status: "All checks pass without errors"

  - |
    REORGANIZE: Consider moving detailed worktree_operations from inputs.yml definitions to
    process.yml steps, as they are procedural guidance rather than input definitions. This would
    reduce inputs.yml size and improve clarity of actual input requirements vs procedural guidance.

  - |
    VERIFY: Check if deploy-minimal.yml and deploy-shared.yml layers are sufficient context for
    an agent. Consider adding explicit reference to cli-commands.yml for deterministic worktree
    creation commands.

# DETAILED ANALYSIS BY FILE
# ==========================

# manifest.yml (10 lines)
# - Extremely minimal, serves only as metadata container
# - No process flow, examples, or procedures
# - Version 2.0 matches inputs.yml version
# - Outputs list matches process.yml outputs conceptually but lacks detail
# - Status: Adequate but sparse

# inputs.yml (141 lines)
# - Well-structured with clear sections: required_inputs, core_inputs, definitions
# - required_inputs section is clear and well-documented
# - SIGNPOST notation provides navigation context
# - Definitions are practical and include operations checklists
# - ISSUES: Missing worktree_naming_convention, inconsistent variable formatting, over-references
#   to manual operations
# - Status: Good structure, execution gaps

# process.yml (98 lines)
# - Clear goal statement and structured steps (7 steps total)
# - Good use of sequential logic and references to external definitions
# - Steps 1-3 are clear and actionable
# - Steps 4-6 have ambiguities around validation and manual operations
# - Step 7 (Final Verification) depends on CLI commands that may not fully exist
# - Output schema is well-defined but makes promises that process doesn't fulfill
# - loop_context section appropriately notes this is not an iteration loop
# - Status: Good structure, fulfillment gaps

scores_rationale:
  clarity_score: 3
  rationale: |
    Process goal is clear but individual steps have ambiguities:
    - Step 4 (manual workspace update) lacks clear success criteria
    - Step 6 (validation) references CLI that may not do what's documented
    - Output validation_status promises YAML syntax checks not actually performed
    - References to "worktree_naming_convention" definition that doesn't exist
    Partial clarity from good structure but confused by execution gaps.

  completeness_score: 2
  rationale: |
    Multiple required elements are missing or incomplete:
    - JSON schema for CLI outputs not defined
    - Workspace update handling incomplete (manual vs automatic unclear)
    - Plan validation step references non-existent or incomplete CLI capability
    - No output field for input corrections (Step 1 requirement)
    - Output examples don't match actual implementation (naming format)
    - Pre-conditions not validated
    - Success criteria not explicit for each output
    Only 40% of documented process appears fully specifiable.

  consistency_score: 3
  rationale: |
    Moderate consistency issues:
    - Example output format (process.yml:27) differs from CLI implementation
    - Variable notation inconsistent across files
    - References to undefined definitions (worktree_naming_convention)
    - manual workspace update conflicts with required:true output
    - Plans.yml uses YYMMDDRepo_Branch but CLI uses YYMMDDAbbr_branch
    References do link to existing files, but implementations diverge.

