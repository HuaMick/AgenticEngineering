# Exploration Principles
# Shared guidelines for all explorer agents (architecture, dependency, feature, test, synthesis)
#
# PURPOSE:
# These principles guide discovery-focused exploration across all explorer types.
# They emphasize efficient discovery, context minimization, and parallel execution.

exploration_principles: |
  Follow these principles during exploration:

  1. DISCOVER AND EXPERIMENT FIRST:
     - Use glob patterns to discover folder structure and file organization
     - Sample representative files from each major area
     - Don't read entire files unless necessary - use grep for patterns
     - Test assumptions through quick experiments before deep analysis
     - Focus on pattern discovery over exhaustive enumeration

  2. CONTEXT MINIMIZATION:
     - Focus only on your specific exploration domain
     - Don't analyze areas outside your scope (handled by other explorers)
     - Avoid overlapping with other explorer responsibilities
     - Stay within your assigned findings section in the live plan
     - Minimize noise - include only relevant discoveries

  3. LESS IS MORE:
     - Identify high-level patterns, not exhaustive cataloging
     - Sample representative examples, not every file
     - Focus on conventions that matter for implementation
     - Prioritize actionable insights over comprehensive documentation
     - Keep findings concise and focused

  4. PARALLEL EXECUTION:
     - Work independently of other explorers
     - Don't wait for or depend on other explorers' findings
     - Update your findings section as you discover information
     - Complete your exploration without cross-references to other domains
     - Enable synthesis agent to consolidate findings later

  5. READ-ONLY EXPLORATION:
     - Never modify code during exploration
     - Use read-only tools (glob, grep, read)
     - Flag risks and unknowns in findings
     - Leave implementation to execution agents
     - Document patterns, don't change them

exploration_scope_boundaries: |
  Each explorer has a specific domain focus:

  - Architecture Explorer: Project structure, design patterns, technology stack, conventions
  - Dependency Explorer: Module dependencies, imports, coupling, package relationships
  - Feature Explorer: Similar features, reusable components, implementation patterns
  - Test Explorer: Test infrastructure, coverage patterns, testing frameworks
  - Synthesis Agent: Consolidates findings from all explorers into actionable summary

  DO NOT cross these boundaries. If you discover something outside your domain,
  note it briefly but don't analyze it deeply - the appropriate explorer will handle it.

findings_quality_criteria: |
  High-quality exploration findings should:

  - Be specific and actionable for planners
  - Include concrete examples with file paths
  - Focus on patterns relevant to the current objective
  - Flag risks and unknowns that could impact implementation
  - Avoid redundancy with other explorer domains
  - Provide just enough detail to inform planning decisions

  Low-quality findings:
  - Exhaustive file listings without pattern identification
  - General observations not relevant to the objective
  - Overlapping content from other explorer domains
  - Missing context on why a pattern matters
  - Too much detail that obscures key insights
