overengineering: |
  Overengineering is raised complexity without value. It occurs when we add
  complexity that doesn't provide proportional benefit or solve a real problem.

  Examples of overengineering:
  - Merging incompatible agent responsibilities to simplify plans
  - Adding abstractions for hypothetical future needs
  - Creating infrastructure that exceeds current requirements
  - Combining distinct responsibilities in single phases/agents

  The cleaner agent is responsible for identifying and removing overengineering
  from the codebase. Overengineering adds noise and confusion to future agents'
  context without providing value.
