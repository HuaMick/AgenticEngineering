studio_integration_tests: |
  The following tests require LangGraph Studio service to be running:
  - test_studio_health_endpoint
  - test_studio_assistants_search
  - test_studio_threads_get
  - test_studio_assistants_get
  - test_studio_stability_under_load
  - test_studio_threads_create
  - test_studio_delayed_validation
  - test_studio_logs_no_errors
  - test_studio_logs_no_type_errors
  - test_studio_invalid_assistant_id

  These tests should NOT be skipped. Start Studio before running tests.
