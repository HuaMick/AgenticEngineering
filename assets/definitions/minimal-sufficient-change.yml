minimal-sufficient-change: |
  Make the smallest change that fully achieves the outcome.
  Complete does not mean comprehensive - it means "satisfies success criteria."

  Principles:
  - Change only what's necessary to meet observable outcomes
  - Resist the urge to "improve" unrelated code
  - Stop when success criteria are met, not when code is "perfect"
  - Avoid speculative features or "while we're here" additions

  Why minimal:
  - Reduces blast radius (fewer things can break)
  - Faster review and validation
  - Clearer cause-effect relationships
  - Less noise in future agent context

  Why sufficient:
  - Incomplete work creates debt and confusion
  - Half-fixes are worse than no fixes
  - Success criteria must be fully met, not approximated

  Balance:
  Quality ≠ Quantity. The best code is the code you don't write.
  Do what's required, nothing more, nothing less.

  Related: overengineering.yml, outcome-based-success.yml
