documentation-validation-testing: |
    A testing strategy that validates documentation completeness and accuracy.
    Justification: Documentation is part of the product; if the docs fail, the product fails.

    Created based on GCPTOOLKIT-CONFIG-GAP-001 - documentation was 525 lines but had
    9 critical gaps that prevented users from succeeding.

    Key insight: Documentation length ≠ documentation quality

    Test approach:
    1. Follow-docs-exactly test
       - Start with fresh environment
       - Follow documentation from line 1 with no prior knowledge
       - Execute each step exactly as written
       - Note any missing, incorrect, or unclear steps

    2. Blind-test validation
       - Agent has NO prior knowledge of system
       - Agent has access ONLY to documentation
       - Agent must complete user journey using docs only
       - Any failure indicates documentation gap

    What this catches:
    - Missing steps
    - Incorrect steps
    - Ambiguous instructions
    - Undocumented prerequisites
    - Missing error recovery documentation
    - Inaccessible features

    Success criteria:
    - Documentation can be followed exactly with zero prior knowledge
    - Every step works as documented
    - No undocumented steps required
    - No manual file creation/editing required
    - Error recovery documented and testable
    - Blind-test agent completes all scenarios

    Integration with release process:
    - Phase 7 (follow-docs-exactly) of pre-release checklist
    - Phase 7b (blind-test validation) of pre-release checklist
    - Must pass before documentation sign-off
    - Documentation loop at very end (Phase 12)

    See: docs/testing/pre_release_checklist.md
