manifest:
  description: |
    Index of all modular guidelines for agent behavior. Guidelines are reusable,
    composable rules that can be referenced by multiple agents and processes.

    Guidelines provide:
    - Inputs (relevant definitions and context)
    - Clear rules for agent behavior
    - Justifications for why rules matter
    - Good and bad examples
    - Relationships to other guidelines

    Usage:
    - Agents reference guidelines in their process definitions
    - Guidelines are composed together for specific agent contexts
    - Guidelines are versioned and maintained independently

  guidelines:
    - file: safety.yml
      name: "Safety and Security"
      purpose: "Operational guardrails and escalation policies"
      key_concepts:
        - "Objective validation boundaries"
        - "Fail-fast preflight checks"
        - "Proactive escalation"
      definitions:
        - "assets/definitions/separation-of-concerns.yml"
        - "assets/definitions/escalation.yml"
      related: ["assets/guidelines/testing.yml", "assets/guidelines/iteration.yml"]

    - file: context-minimisation.yml
      name: "Context Minimisation"
      purpose: "Reducing noise to maximize model focus and performance"
      key_concepts:
        - "Need-to-know basis"
        - "Precise file targeting"
        - "Avoiding structural indirection"
      definitions:
        - "assets/definitions/context-minimisation.yml"
        - "assets/definitions/path.yml"
        - "assets/definitions/fence.yml"
      related: ["assets/guidelines/less-is-more.yml", "assets/guidelines/safety.yml"]

    - file: less-is-more.yml
      name: "Less is More"
      purpose: "Minimal sufficient change and avoiding overengineering"
      key_concepts:
        - "Minimal sufficient change"
        - "Resisting speculative improvements"
        - "Stop at success"
      definitions:
        - "assets/definitions/minimal-sufficient-change.yml"
        - "assets/definitions/overengineering.yml"
        - "assets/definitions/success-criteria.yml"
      related: ["assets/guidelines/context-minimisation.yml", "assets/guidelines/iteration.yml"]

    - file: experiment-first.yml
      name: "Discover and Experiment First"
      purpose: "Discovery-focused approach to reduce uncertainty"
      key_concepts:
        - "Experiment over guessing"
        - "Representative sampling"
        - "Fail-fast assumption testing"
      definitions:
        - "assets/definitions/exploration-principles.yml"
      related: ["assets/guidelines/iteration.yml", "assets/guidelines/context-minimisation.yml"]

    - file: fix-the-source.yml
      name: "Fix the Source"
      purpose: "Root cause analysis and sustainable problem solving"
      key_concepts:
        - "Fix the source, not the symptom"
        - "Reproduce and trace"
        - "Validate tests first"
      definitions:
        - "assets/definitions/root-cause-analysis.yml"
      related: ["assets/guidelines/testing.yml"]

    - file: focus-on-what-didnt-work.yml
      name: "Focus on What Didn't Work"
      purpose: "Prioritizing gaps and failures in transparent reporting"
      key_concepts:
        - "Highlight failures and gaps"
        - "Objective-based reporting"
      definitions:
        - "assets/definitions/success-criteria.yml"
        - "assets/definitions/skipped-test.yml"
      related: ["assets/guidelines/response-audit.yml"]

    - file: follow-the-expected-path.yml
      name: "Follow the Expected Path"
      purpose: "Maintaining process consistency and operational safety"
      key_concepts:
        - "Process adherence"
        - "Escalate over workaround"
      definitions:
        - "assets/definitions/escalation.yml"
        - "assets/definitions/guidance.yml"
      related: ["assets/guidelines/safety.yml", "assets/guidelines/worktree-and-branching.yml"]

    - file: testing.yml
      name: "Testing Guidelines"
      purpose: "Behavioral standards for rigorous functional validation"
      key_concepts:
        - "Rigorous functional validation"
        - "Test the user's reality"
        - "Multi-layered approach"
        - "Documentation validation"
      definitions:
        - "assets/definitions/testing-types.yml"
        - "assets/definitions/strategy-agent-review-loop.yml"
        - "assets/definitions/strategy-agent-blind-test.yml"
        - "assets/definitions/strategy-user-simulation.yml"
        - "assets/definitions/strategy-test-suite.yml"
        - "assets/definitions/strategy-fresh-environment.yml"
        - "assets/definitions/strategy-multi-layer.yml"
        - "assets/definitions/strategy-documentation-validation.yml"
        - "assets/definitions/strategy-user-acceptance.yml"
      related: ["assets/guidelines/iteration.yml", "assets/guidelines/reward-hacking-prevention.yml"]

    - file: validation-strategy.yml
      name: "Validation Strategy"
      purpose: "Defines when and how to validate work outcomes using mechanical verification versus semantic assessment"
      key_concepts:
        - "Mechanical vs semantic validation"
        - "Bash vs agent delegation decisions"
        - "Agent delegation patterns"
      definitions:
        - "assets/definitions/agent-types.yml"
      related: ["assets/guidelines/iteration.yml"]

    - file: orchestration-policy.yml
      name: "Orchestration Policy"
      purpose: "Defines agent-task alignment verification, escalation policies, plan status management, and success criteria communication"
      key_concepts:
        - "Agent-Task Alignment Verification"
        - "Escalation Policy"
        - "Plan Status Management"
        - "Success Criteria Communication"
      definitions:
        - "docs/agent-role-scope-matrix.md"
        - "assets/definitions/plans.yml"
      related: ["assets/guidelines/validation-strategy.yml"]

    - file: user-story-testing.yml
      name: "User Story Testing"
      purpose: "Defines patterns for user simulator testing including Docker prep, story extraction, blind testing, and dual environment validation"
      key_concepts:
        - "User Simulator Prerequisites"
        - "User Story Extraction"
        - "Blind Testing Pattern"
        - "Dual Environment Testing"
      definitions:
        - "assets/definitions/strategy-user-simulation.yml"
        - "assets/definitions/strategy-agent-blind-test.yml"
      related: ["assets/guidelines/testing.yml"]

    - file: iteration.yml
      name: "Iteration Patterns"
      purpose: "Behavioral rules for build-test-fix cycles"
      key_concepts:
        - "Test-fix-loop behavior"
        - "Audit-test-fix-loop behavior"
        - "Documentation loop behavior"
        - "Cleaner voting loop behavior"
      definitions:
        - "assets/definitions/iteration-approach.yml"
        - "assets/definitions/agent-loops.yml"
      related: ["testing.yml", "reward-hacking-prevention.yml"]

    - file: reward-hacking-prevention.yml
      name: "Reward Hacking Prevention"
      purpose: "Anti-gaming guidelines to ensure authentic success"
      key_concepts:
        - "Evidence-based validation"
        - "Objective validation boundaries"
        - "Outcome-over-process"
        - "Rigorous test auditing"
      definitions:
        - "assets/definitions/reward-hacking.yml"
        - "assets/definitions/outcome-verification.yml"
        - "assets/definitions/role-separation.yml"
      related: ["assets/guidelines/safety.yml", "assets/guidelines/testing.yml", "assets/guidelines/iteration.yml"]

    - file: worktree-and-branching.yml
      name: "Worktree Source of Truth and Branching"
      purpose: "Policies for worktree consistency and safe merge flows"
      key_concepts:
        - "Main branch as source of truth"
        - "Staging-first merge strategy"
        - "Environment-worktree alignment"
      definitions:
        - "assets/definitions/folder-structure.yml"
      related: ["assets/guidelines/safety.yml"]

    - file: response-audit.yml
      name: "Response Audit (Mandatory)"
      purpose: "Final third-party verification before user reply"
      key_concepts:
        - "Independent audit before reply"
        - "Terminal-only summaries"
      definitions:
        - "assets/definitions/guidance-artifacts.yml"
        - "assets/definitions/success-criteria.yml"
      related: ["assets/guidelines/reward-hacking-prevention.yml", "assets/guidelines/focus-on-what-didnt-work.yml"]

  usage_patterns:
    agent_process:
      description: "Agents reference guidelines in their process files"
      example: |
        process:
          name: "Build Process"
          guidelines:
            - guidelines/testing.yml
          steps:
            - ...

    composed_context:
      description: "Multiple guidelines can be composed for agent context"
      example: |
        Agent context:
          - guidelines/safety.yml (separation of concerns)
          - guidelines/testing.yml (testing strategies)
          - guidelines/iteration.yml (test-fix-loop)

    phase_specific:
      description: "Different phases use different guideline combinations"
      examples:
        active_development:
          - guidelines/testing.yml (user-simulation-testing)
          - guidelines/iteration.yml (test-fix-loop)
        validation:
          - guidelines/testing.yml (agent-blind-test, multi-layer testing)
        audit:
          - guidelines/reward-hacking-prevention.yml
          - guidelines/iteration.yml (audit-test-fix-loop)
        cleanup:
          - guidelines/iteration.yml (cleaner-voting-loop)

  versioning:
    current_version: "1.1.0"
    changelog:
      - version: "1.1.0"
        date: "2025-12-19"
        changes:
          - "Added 'inputs' section to all guidelines to link definitions"
          - "Removed redundant concept descriptions already covered in definitions"
          - "Standardized naming and key concepts across all guidelines"
          - "Unified 'Worktree Source of Truth and Branching' to remove duplication"
      - version: "1.0.1"
        date: "2025-12-18"
        changes:
          - "Standardized structure for all guideline files"
          - "Linked guidelines to related definitions"
          - "Unified spelling to 'minimisation'"
          - "Added missing guidelines to manifest"
      - version: "1.0.0"
        date: "2025-12-12"
        changes:
          - "Initial creation of guidelines folder"
          - "Migration from assets/definitions/ folder"
          - "Structured YAML format for all guidelines"
          - "Added examples, justifications, and relationships"
