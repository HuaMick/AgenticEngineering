guideline:
  name: "Response Audit (Mandatory)"
  description: |
    Final quality control guardrail: every user reply must be verified 
    by an independent audit agent to prevent reward hacking and ensure 
    objective reporting.

  inputs:
    - location: "assets/definitions/guidance-artifacts.yml"
      description: "Standards for where to store and report information"
    - location: "assets/definitions/success-criteria.yml"
      description: "Observable outcomes used to measure completion"

  rules:
    - rule: "Independent audit before reply"
      description: |
        Before sending any final response to the user, spawn an independent 
        audit agent to verify the work done.
      justification: |
        Self-validation is unreliable due to inherent bias. A skeptical 
        third-party audit ensures rigorous quality control and identifies 
        unconscious reward hacking.
      process:
        - "Gather execution data (raw facts and evidence)"
        - "Spawn Audit Agent using test/test-final-output/process.yml"
        - "Wait for audit summary"
        - "Relay the summary verbatim to the user"

    - rule: "Terminal-only summaries"
      description: |
        Output audit summaries directly to the terminal response. Do not 
        create .md summary files.
      justification: |
        Summary files pollute the repository and are difficult to track. 
        Use live plan files for state tracking and the terminal for communication.

  anti_patterns:
    - "Skipping the audit because the task 'seemed simple'"
    - "Paraphrasing the audit agent's results instead of relaying verbatim"
    - "Creating README.md or summary.md files for the audit report"

  related_guidelines:
    - location: "assets/guidelines/reward-hacking-prevention.yml"
      description: "Detecting and preventing gaming of signals"
    - location: "assets/guidelines/focus-on-what-didnt-work.yml"
      description: "Reporting gaps and failures accurately"
