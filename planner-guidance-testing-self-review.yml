agent: planner-guidance-testing
category: planner
clarity_score: 3
completeness_score: 3
consistency_score: 2

issues:
  - severity: critical
    description: |
      outputs.yml file does not exist but is extensively referenced throughout guidance.
      manifest.yml (lines 21, 31, 46), process.yml (lines 5, 112, 114, 132),
      guidance-test-scenarios.yml, and example guidance-test-plan.yml all reference
      "outputs.yml" as a required guidance file for test execution. This creates a
      significant discrepancy: the agent is instructed to test agents' outputs.yml
      files, but agents don't have this file.
    location: |
      manifest.yml:21, 31, 46
      process.yml:5, 112, 114, 132
      inputs.yml: Not listed in core_inputs
      Referenced in: guidance-test-scenarios.yml, guidance-test-plan.yml
      Actual file: DOES NOT EXIST in agent directory or other agent directories

  - severity: high
    description: |
      inputs.yml is missing explicit reference to "outputs.yml" definition/requirement.
      While process.yml and manifest.yml reference outputs.yml extensively, inputs.yml
      does not list any file describing what outputs.yml should contain or why it's
      expected. This violates the principle of "define what you use" - if guidance
      expects outputs.yml files to exist, inputs.yml should define this expectation.
    location: inputs.yml:53-108 (core_inputs section lacks outputs definition)

  - severity: high
    description: |
      process.yml step 2 references "docs/plans/live/YYMMDDRepo_Branch/" folder structure
      but this path appears to be a templated placeholder without clear instructions on
      how agents discover the actual folder name or whether this path exists. The example
      shows "docs/plans/live/<YYMMDDRepo_Branch>/live/" but no guidance on resolving the
      template variable.
    location: process.yml:46, 52, 85

  - severity: high
    description: |
      Loop context section in process.yml references "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.guidance-test-loop"
      but guidance does not explain how agents should use hash-referenced sections or whether
      simulator agents can access YAML sections via hash anchors. This creates ambiguity
      about what guidance-test-loop actually means in practice.
    location: process.yml:10 (loop_definition reference syntax unclear)

  - severity: medium
    description: |
      inputs.yml lists multiple required file inputs but does not provide version
      information or dates for when these files were created/last updated. This makes
      it difficult to detect when referenced files become stale. guidance-test-scenarios.yml,
      strategy-guidance-blind-test.yml, etc. have no version numbers or update markers.
    location: inputs.yml:core_inputs section

  - severity: medium
    description: |
      process.yml steps 1-6 contain extensive references to other guidance files
      (guidance-test-scenarios.yml, strategy-guidance-blind-test.yml) but do not
      clearly distinguish between:
      (a) What the agent MUST understand from those files (core concepts)
      (b) What the agent MAY reference as needed (optional details)
      (c) What is ONLY for example/illustration purposes
      This creates unclear priority hierarchy.
    location: process.yml:30-98 (steps 3-7)

  - severity: medium
    description: |
      manifest.yml states "outputs: []" (line 35 in process.yml) indicating this
      agent produces no outputs, but the agent's purpose is to create guidance test
      PLANS. The process.yml step 5 says "Provide the guidance walkthrough validation
      plan back to the main orchestration agent for execution" (line 148). This
      contradicts the empty outputs declaration - guidance test plans ARE outputs.
    location: process.yml:35, manifest.yml description

  - severity: medium
    description: |
      inputs.yml section on "layers" (lines 34-48) uses undefined "type: layer" concept.
      The guidance does not explain what "layer" means or how transitive loading works.
      core-system.yml, core-guidelines.yml, planner-shared.yml are referenced as layers
      but no documentation explains the loading mechanism or resolution order.
    location: inputs.yml:34-48

  - severity: medium
    description: |
      process.yml references "AVOID simulation and user story terminology" (line 99)
      but does not clearly define what counts as "simulation terminology" vs.
      "walkthrough terminology." Example: Does "execute guidance walkthrough" mean
      the same thing as "simulate guidance execution"? What's the distinction?
    location: process.yml:99-100

  - severity: low
    description: |
      manifest.yml line 154 references "strategy-guidance-blind-test.yml" in
      dependencies, but inputs.yml line 78 lists the same file with path
      "modules/AgenticGuidance/assets/guidelines/strategy-guidance-blind-test.yml"
      (note: different base path structure - "guidelines" vs implied "definitions").
      This could lead to path resolution confusion.
    location: manifest.yml:154 vs inputs.yml:78

  - severity: low
    description: |
      The example guidance-test-plan.yml (referenced in inputs.yml line 89) shows
      example task IDs like "1.1", "1.2" suggesting a hierarchical numbering scheme,
      but process.yml provides no guidance on how to generate these IDs or what they
      represent in relation to phases.
    location: inputs.yml:89, example file guidance-test-plan.yml:57

  - severity: low
    description: |
      process.yml step 6 (lines 91-98) lists four phases but earlier guidance
      (manifest.yml lines 27-48) lists only four phases with slightly different names:
      "Guidance-test-loop" vs "Guidance walkthrough validation"
      "Gap analysis" vs "Gap analysis phase"
      "Audit" vs "Audit phase"
      "Documentation-loop" vs "Documentation-loop"
      The naming inconsistency could confuse agents.
    location: manifest.yml:27-48 vs process.yml:91-98

recommendations:
  - |
    CRITICAL: Resolve the outputs.yml question:
    Either (A) create an outputs.yml template file showing what agent outputs should document,
    or (B) remove all references to outputs.yml and clarify that only process.yml and
    inputs.yml are required guidance files. Update all references across manifest.yml,
    process.yml, guidance-test-scenarios.yml, and example files to be consistent.

  - |
    Add to inputs.yml a clear "requirements" section documenting that agents being tested
    MUST have process.yml and inputs.yml files (outputs.yml optional/TBD), and explain
    what happens when an agent is missing one of these files.

  - |
    Clarify the YYMMDDRepo_Branch placeholder in process.yml step 2. Add guidance on:
    - How agents discover the actual folder name
    - Whether this is provided by the orchestration agent
    - How to construct the path if folder doesn't exist yet
    - Whether agents should create the folder structure

  - |
    Document the hash-anchor syntax (#loop_types.guidance-test-loop) in process.yml.
    Explain whether agents can resolve YAML anchors dynamically, or if this is just
    documentation syntax. If agents must load the full agent-loops.yml file, state
    this explicitly.

  - |
    Restructure process.yml steps to explicitly separate:
    MUST UNDERSTAND: Core concepts agents need to know
    REFERENCE AS NEEDED: Files agents may consult during execution
    FOR EXAMPLES ONLY: Reference material showing correct vs incorrect patterns
    Use clear section headers for each category.

  - |
    Update process.yml outputs section: Instead of "outputs: []", document that the
    agent creates guidance test plans, specify their format (YAML), and where they're
    stored (docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_test_guidance.yml).

  - |
    Add to inputs.yml a new section explaining the "layers" concept, how transitive
    loading works, and the resolution order for overlapping definitions between layers.
    Document whether agents need to understand layer structure or just know which files
    are required.

  - |
    Add glossary or examples to clarify "walkthrough terminology" vs what should be
    avoided. Provide 2-3 concrete examples of correct vs incorrect phrasing when
    describing test tasks and validation approaches.

  - |
    Standardize phase naming across manifest.yml and process.yml. Use consistent
    terminology: either "Guidance walkthrough validation" or "Guidance-test-loop"
    but not both. Choose one set of phase names and apply consistently.

  - |
    Add guidance in process.yml on task ID generation: Should agents use hierarchical
    numbering (1.1, 1.2 for phase 1 tasks)? Should numbering reflect phase structure?
    Document the convention with examples.

  - |
    Add version numbers or last-updated dates to referenced definition files
    (guidance-test-scenarios.yml, strategy-guidance-blind-test.yml, etc.) so agents
    can detect stale references.

  - |
    Consider creating an outputs.yml file for planner-guidance-testing itself, documenting
    what the planning agent produces (guidance test plans, their structure, required sections).
    This would serve as both self-documentation and a template for other agents.

  - |
    Add a "dependencies validation" section to inputs.yml documenting which referenced
    files are CRITICAL vs OPTIONAL, and what the agent should do if a required file
    cannot be found (e.g., should it escalate or attempt to create a default?).
