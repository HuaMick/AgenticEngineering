user_stories:
  # ============================================================================
  # Development Workflow User Stories
  # ============================================================================
  
  - id: US-DEV-001
    name: "Fresh Developer Setup"
    category: "development"
    persona: "Junior developer, no MyAgents experience"
    priority: "critical"
    
    starting_state:
      environment:
        repo_cloned: true
        dependencies_installed: false
        current_directory: "fresh clone of MyAgents-staging branch"
      files_present:
        - "README.md"
        - "docs/README.md"
      files_missing:
        - "dependencies installed"
    
    journey:
      - step: 1
        action: "Read README.md (follow instructions exactly as written)"
        expected: "Clear setup instructions found"
        failure_indicators:
          - "No setup instructions"
          - "Unclear instructions"
      
      - step: 2
        action: "Discover how to install dependencies (should use uv)"
        expected: "Dependency installation method clearly documented using uv"
        failure_indicators:
          - "Installation method not documented"
          - "Must guess installation method"
          - "uv not mentioned as the standard method"
          - "pip mentioned as primary or alternative method (unless uv limitation documented)"
      
      - step: 3
        action: "Discover how to run tests (look for pytest or test commands)"
        expected: "Test execution instructions found"
        failure_indicators:
          - "No test instructions"
          - "Must explore source files to find test commands"
      
      - step: 4
        action: "Execute test command with defaults"
        expected: "Tests run successfully"
        failure_indicators:
          - "Tests fail with unclear errors"
          - "Default command doesn't work"
      
      - step: 5
        action: "Verify tests pass or report clear errors"
        expected: "Clear test results or helpful error messages"
        failure_indicators:
          - "Unclear test output"
          - "Errors don't help diagnose issues"
    
    success_criteria:
      - "Tests run successfully following docs alone"
      - "Zero documentation gaps preventing task completion"
      - "Clear error messages when things go wrong"
      - "No guessing required"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "README.md"
      - "docs/guides/getting-started.md"
      - "docs/testing/README.md"
  
  - id: US-DEV-002
    name: "CI/CD Pipeline Execution"
    category: "development"
    persona: "Developer with basic git knowledge"
    priority: "high"
    
    starting_state:
      environment:
        repo_cloned: true
        current_directory: "working copy of MyAgents-staging"
    
    journey:
      - step: 1
        action: "Read CI/CD documentation (look for CICD_README.md or similar)"
        expected: "CI/CD documentation found"
        failure_indicators:
          - "No CI/CD documentation"
      
      - step: 2
        action: "Understand what triggers CI/CD (push, PR, etc.)"
        expected: "Trigger mechanism clearly documented"
        failure_indicators:
          - "Triggers not documented"
      
      - step: 3
        action: "Verify Dockerfile.test builds correctly locally"
        expected: "Docker build succeeds locally"
        failure_indicators:
          - "Build fails"
          - "No local build instructions"
      
      - step: 4
        action: "Check coverage thresholds are documented"
        expected: "Coverage requirements clearly stated"
        failure_indicators:
          - "Coverage thresholds not documented"
    
    success_criteria:
      - "Clear CI/CD documentation"
      - "Docker builds work locally"
      - "Coverage thresholds documented"
      - "Local testing mirrors CI/CD"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
      docker_build_test: true
    
    documentation_references:
      - "docs/CICD_README.md"
      - "Dockerfile.test"
  
  - id: US-DEV-003
    name: "Test Execution Modes"
    category: "development"
    persona: "QA engineer testing different scopes"
    priority: "medium"
    
    starting_state:
      environment:
        dependencies_installed: true
    
    journey:
      - step: 1
        action: "Discover test execution modes (unit, quick, full)"
        expected: "Test modes clearly documented"
        failure_indicators:
          - "Modes not documented"
          - "Unclear mode definitions"
      
      - step: 2
        action: "Run unit tests: verify fast execution"
        expected: "Unit tests run quickly"
        failure_indicators:
          - "Unit tests don't exist"
          - "Unit tests are slow"
      
      - step: 3
        action: "Run quick tests: verify moderate scope"
        expected: "Quick tests have reasonable scope"
        failure_indicators:
          - "Quick tests don't work"
      
      - step: 4
        action: "Check for costly test markers and gating"
        expected: "Costly tests are marked and gated appropriately"
        failure_indicators:
          - "Costly tests not marked"
    
    success_criteria:
      - "All modes work"
      - "Clear mode selection docs"
      - "Modes behave as documented"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/testing/README.md"
      - "pytest.ini"
  
  - id: US-DEV-004
    name: "Docker Development Workflow"
    category: "development"
    persona: "Backend developer familiar with Docker"
    priority: "high"
    
    starting_state:
      environment:
        docker_installed: true
        repo_cloned: true
    
    journey:
      - step: 1
        action: "Find Docker build instructions"
        expected: "Docker build instructions found"
        failure_indicators:
          - "No Docker instructions"
      
      - step: 2
        action: "Build development containers"
        expected: "Containers build successfully"
        failure_indicators:
          - "Build fails"
          - "Hardcoded paths cause failures"
      
      - step: 3
        action: "Verify Agent-GCPtoolkit path is correct in container"
        expected: "Paths resolve correctly"
        failure_indicators:
          - "Path errors"
          - "Agent-GCPtoolkit not found"
      
      - step: 4
        action: "Run tests inside container"
        expected: "Tests run successfully in container"
        failure_indicators:
          - "Tests fail in container"
          - "Different behavior than local"
    
    success_criteria:
      - "Containers build and run correctly"
      - "Build context clearly documented"
      - "Paths work correctly"
      - "Tests pass in container"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
      docker_build_test: true
    
    documentation_references:
      - "docs/CICD_README.md (Local Docker Testing section)"
      - "Dockerfile.test"
      - "docs/testing/manual-testing.md"
  
  - id: US-DEV-005
    name: "Testmon Selective Testing"
    category: "development"
    persona: "Experienced developer optimizing test runs"
    priority: "medium"
    
    starting_state:
      environment:
        working_test_environment: true
    
    journey:
      - step: 1
        action: "Find testmon documentation"
        expected: "Testmon usage documented"
        failure_indicators:
          - "No testmon documentation"
          - "Cannot discover testmon capability"
      
      - step: 2
        action: "Run full test suite once (baseline)"
        expected: "Full suite runs successfully"
        failure_indicators:
          - "Full suite fails"
      
      - step: 3
        action: "Make small change to one file"
        expected: "File modified"
      
      - step: 4
        action: "Run with testmon to verify selective execution"
        expected: "Only affected tests run"
        failure_indicators:
          - "Full suite runs despite no changes"
          - "Testmon doesn't work"
      
      - step: 5
        action: "Verify only affected tests run"
        expected: "Selective execution works correctly"
        failure_indicators:
          - "Wrong tests run"
    
    success_criteria:
      - "Testmon correctly identifies and runs affected tests"
      - "Testmon documentation exists"
      - "Significant time savings demonstrated"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/testing/README.md (Testing quick reference)"

