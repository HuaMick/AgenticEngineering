# ==============================================================================
# RemoteAgents User Stories - Terminal I/O
# ==============================================================================

category: terminal_io
name: "Terminal I/O"
description: "Terminal input, output, and control operations"

stories:
  # --------------------------------------------------------------------------
  # US-IO-001: Send Input to Terminal
  # --------------------------------------------------------------------------
  - id: US-IO-001
    title: "Send Keystrokes to Remote Terminal"
    priority: CRITICAL
    persona: web_user

    description: |
      As a web client user, I want to send keystrokes to the remote terminal
      so that I can interact with the CLI.

    preconditions:
      - Session is PAIRED
      - E2E encryption established

    journey:
      - step: 1
        action: "Type 'echo hello' in web terminal"
        expected: "Keystrokes captured"

      - step: 2
        action: "Client encrypts and sends TerminalInput"
        expected: "EncryptedBlob sent to relay"

      - step: 3
        action: "Relay routes to desktop"
        expected: "Desktop receives encrypted message"

      - step: 4
        action: "Desktop decrypts and writes to PTY stdin"
        expected: "Command appears in terminal"

      - step: 5
        action: "Press Enter"
        expected: "Command executes"

    acceptance_criteria:
      - Keystrokes encrypted before transmission
      - Relay routes without decrypting
      - Desktop decrypts correctly
      - Input written to PTY stdin
      - Low latency (<100ms typical)

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-IO-002: Receive Terminal Output
  # --------------------------------------------------------------------------
  - id: US-IO-002
    title: "Receive Output from Remote Terminal"
    priority: CRITICAL
    persona: web_user

    description: |
      As a web client user, I want to see terminal output
      so that I can view command results.

    preconditions:
      - Session is PAIRED
      - Command executing on PTY

    journey:
      - step: 1
        action: "Command executes on PTY (e.g., 'ls -la')"
        expected: "PTY produces output"

      - step: 2
        action: "Terminal service reads PTY stdout"
        expected: "Output captured"

      - step: 3
        action: "Desktop encrypts and sends TerminalOutput"
        expected: "EncryptedBlob sent to relay"

      - step: 4
        action: "Relay routes to client"
        expected: "Client receives encrypted message"

      - step: 5
        action: "Client decrypts and displays"
        expected: "Output appears in web terminal"

    acceptance_criteria:
      - PTY output captured in real-time
      - Output encrypted before transmission
      - Client decrypts correctly
      - Output displayed promptly (<100ms)
      - No data loss or corruption

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-IO-003: ANSI Colors and Styling
  # --------------------------------------------------------------------------
  - id: US-IO-003
    title: "ANSI Escape Codes Preserved"
    priority: HIGH
    persona: web_user

    description: |
      As a web client user, I want ANSI escape codes to work
      so that I see colors and styling in the terminal.

    preconditions:
      - Session is PAIRED
      - Terminal supports ANSI

    journey:
      - step: 1
        action: "Run command with colored output (e.g., 'ls --color=always')"
        expected: "PTY output includes ANSI escape codes"

      - step: 2
        action: "Output transmitted through relay"
        expected: "ANSI codes preserved in transmission"

      - step: 3
        action: "Client receives and renders output"
        expected: "Colors displayed correctly in web terminal"

    acceptance_criteria:
      - ANSI escape codes not stripped
      - Binary data transmitted correctly (base64 encoding)
      - Colors render in web terminal
      - Cursor movement codes work
      - Bold, underline, etc. preserved

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-IO-004: Resize Terminal
  # --------------------------------------------------------------------------
  - id: US-IO-004
    title: "Resize Remote Terminal"
    priority: HIGH
    persona: web_user

    description: |
      As a web client user, I want to resize the terminal window
      so that it fits my screen.

    preconditions:
      - Session is PAIRED
      - Terminal running

    journey:
      - step: 1
        action: "Resize web terminal (e.g., 120x40)"
        expected: "Client detects dimension change"

      - step: 2
        action: "Client sends TerminalResize message"
        expected: "EncryptedBlob with resize sent to relay"

      - step: 3
        action: "Desktop receives and processes resize"
        expected: "PTYSpawner.resize() called"

      - step: 4
        action: "Verify dimensions on PTY"
        command: "stty size"
        expected: "Returns '40 120'"

    acceptance_criteria:
      - Resize message encrypted
      - PTY dimensions updated
      - SIGWINCH sent to PTY process
      - Applications reflow output correctly

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-IO-005: Binary Data Handling
  # --------------------------------------------------------------------------
  - id: US-IO-005
    title: "Handle Binary Data in Terminal"
    priority: MEDIUM
    persona: web_user

    description: |
      As a web client user, I want binary data to be handled correctly
      so that non-UTF8 output doesn't break the terminal.

    preconditions:
      - Session is PAIRED

    journey:
      - step: 1
        action: "Run command that outputs binary data (e.g., 'cat /bin/ls | head -c 100')"
        expected: "Binary data produced by PTY"

      - step: 2
        action: "Output encoded as base64 in TerminalOutput"
        expected: "Binary preserved in message"

      - step: 3
        action: "Client receives and decodes"
        expected: "Binary data intact"

    acceptance_criteria:
      - Binary data base64 encoded
      - No UTF-8 encoding errors
      - Data integrity preserved
      - Client handles binary gracefully

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-IO-006: Large Output Handling
  # --------------------------------------------------------------------------
  - id: US-IO-006
    title: "Handle Large Terminal Output"
    priority: MEDIUM
    persona: web_user

    description: |
      As a web client user, I want large output to be handled correctly
      so that commands with lots of output don't fail.

    preconditions:
      - Session is PAIRED

    journey:
      - step: 1
        action: "Run command with large output (e.g., 'cat large_file.txt')"
        expected: "PTY produces >1MB of output"

      - step: 2
        action: "Output chunked into multiple TerminalOutput messages"
        expected: "Messages sent incrementally"

      - step: 3
        action: "Client receives and concatenates"
        expected: "Full output displayed"

      - step: 4
        action: "Verify no data loss"
        expected: "Output matches original file"

    acceptance_criteria:
      - Large output doesn't crash services
      - Output chunked appropriately
      - No WebSocket frame size issues
      - Complete data received

    test_layers:
      local: true
      docker: false
      integration: true
