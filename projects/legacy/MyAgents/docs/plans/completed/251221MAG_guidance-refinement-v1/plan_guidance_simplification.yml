plan_name: "Guidance System Simplification - Removing Over-Engineering"
worktree: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1"
branch: "guidance-refinement-v1"
created: "2025-12-27"
objective: "Simplify the guidance system by removing redundant patterns and confusing terminology that lead to over-engineering during orchestration."

# FRICTION ANALYSIS
# =================
# 1. Over-engineering: executor-validator-pattern.yml adds unnecessary bureaucracy on top of existing separation of concerns.
# 2. Terminology Confusion: "bash checks" terminology leads to attempts to mechanicalize semantic judgment.
# 3. Redundancy: Multiple files defining the same separation principles creating "committee-style" cognitive load.

phases:
  - name: "phase-1-cleanup-redundant-patterns"
    description: "Remove the executor-validator pattern and its references. Tasks 1.1-1.3 can execute in parallel; task 1.4 runs after all edits complete."
    status: "completed"
    tasks:
      - id: "1.1"
        description: "Delete assets/definitions/executor-validator-pattern.yml"
        status: "completed"
        acceptance_criteria:
          - "File assets/definitions/executor-validator-pattern.yml no longer exists"

      - id: "1.2"
        description: "Update assets/definitions/agent-categories.yml to remove pattern references"
        status: "completed"
        acceptance_criteria:
          - "The 'executor_validator' key and its content removed from the patterns section"
          - "Patterns section contains exactly one top-level key: 'boundaries'"

      - id: "1.3"
        description: "Update assets/definitions/fence-build-deploy.yml to remove pattern references"
        status: "completed"
        acceptance_criteria:
          - "Reference to executor-validator-pattern.yml removed from Related section"

      - id: "1.4"
        description: "Verify all references to executor-validator-pattern.yml have been removed"
        status: "completed"
        acceptance_criteria:
          - "Grep search confirms no references to executor-validator-pattern.yml in agents/, assets/, or entrypoints/ directories"
          - "Historical documentation in docs/plans/ may retain references for archival purposes"

  - name: "phase-2-simplify-validation-guidance"
    description: "Refactor validation-strategy.yml to prioritize semantic judgment over mechanical shortcuts"
    status: "completed"
    tasks:
      - id: "2.1"
        description: "Rename and refactor 'Decision Criteria for Bash vs Agent' in validation-strategy.yml"
        status: "completed"
        acceptance_criteria:
          - "Rule renamed to 'Direct Verification vs Agent Delegation'"
          - "Text 'bash steps' does not appear in validation-strategy.yml"
          - "Text 'Direct Verification' appears in validation-strategy.yml"
          - "Rule section contains keywords: 'judgment', 'MUST spawn', and 'agent'"
          - "Adds characteristic: 'Semantic requirements in Acceptance Criteria always override plan-level verification method shortcuts'"

  - name: "phase-3-audit-and-verify"
    description: "Ensure no broken references and system remains coherent"
    status: "completed"
    tasks:
      - id: "3.1"
        description: "Run test-final-output audit on simplification changes"
        status: "completed"
        agent_type: "test-final-output"
        acceptance_criteria:
          - "Grep search for 'executor-validator-pattern' in assets/ and agents/ returns zero results"
          - "Validation terminology is simplified and consistent across guidelines"
          - "The core principle of 'not grading own work' is preserved via separation-of-concerns.yml without the redundant pattern"

