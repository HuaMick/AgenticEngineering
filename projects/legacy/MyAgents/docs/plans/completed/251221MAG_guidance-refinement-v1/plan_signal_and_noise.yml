# Signal and Noise Integration Plan
# This plan tracks the implementation of signal/noise definitions and their integration into core agents.

plan_name: "Implement Signal and Noise Definitions"
worktree: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1"
branch: "guidance-refinement-v1"
created: "2025-12-21"
status: "completed"
objective: "Standardize definitions for signal and noise to optimize agent context and reduce attentional drift."

definitions:
  signal: |
    Information that possesses "Discriminatory Power"—it allows the agent to distinguish the correct action from a sea of possibilities.
    High-signal content is Actionable, Specific, Verifiable, and Evidence-Based.
  noise: |
    Information that causes "Attentional Drift"—distracting the model's limited attention window from the critical path.
    Noise includes Meta-Talk, Stale Context, Generic Philosophy, and Structural Redundancy.

tasks:
  - id: "sn-1.1"
    description: "Create assets/definitions/signal-and-noise.yml"
    agent_type: "teacher-update-assets"
    operation: "CREATE"
    context:
      target_file: "assets/definitions/signal-and-noise.yml"
      content:
        signal: "Discriminatory Power focus"
        noise: "Attentional Drift focus"
    acceptance_criteria:
      - "File exists with refined definitions"
    files:
      - "assets/definitions/signal-and-noise.yml"

  - id: "sn-1.2"
    description: "Integrate signal/noise definitions into core agents"
    agent_type: "teacher-update-assets"
    operation: "UPDATE"
    context:
      targets:
        - "agents/orchestration/orchestration-guidance/inputs.yml"
        - "agents/orchestration/orchestration-build/inputs.yml"
        - "agents/cleaner/cleaner-core/process.yml"
        - "agents/test/test-audit/inputs.yml"
        - "agents/teacher/teacher-update-assets/process.yml"
      change: "Add signal-and-noise.yml to core_inputs"
    acceptance_criteria:
      - "Core agents have access to signal/noise definitions"
    files:
      - "agents/orchestration/orchestration-guidance/inputs.yml"
      - "agents/orchestration/orchestration-build/inputs.yml"
      - "agents/cleaner/cleaner-core/process.yml"
      - "agents/test/test-audit/inputs.yml"
      - "agents/teacher/teacher-update-assets/process.yml"

  - id: "sn-1.3"
    description: "Update guidance testing proposal with SNR validation"
    agent_type: "teacher-update-assets"
    operation: "UPDATE"
    context:
      target_file: "docs/plans/live/251221MAG_guidance-refinement-v1/proposal_planner-test-guidance.md"
      addition: "Scenario 6: SNR Validation"
