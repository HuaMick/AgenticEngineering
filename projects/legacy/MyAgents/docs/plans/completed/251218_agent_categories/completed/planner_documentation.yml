# Planner Task: Documentation Agent Category Definition
# Plan: 251218_agent_categories

task:
  agent: "documentation"
  target_path: "documentation/"

  objective: "Introduce agent category concept to documentation agent family"

  context: |
    The documentation category is responsible for documentation generation and maintenance.
    Currently has a single sub-agent (documentation-core) but structured for potential
    expansion. This task adds explicit category references to the documentation agent family.

  current_structure:
    sub_agents:
      - "documentation-core"
    has_manifest: false

  tasks:
    - id: "documentation-cat-01"
      description: "Create documentation/manifest.yml with category reference"
      file: "documentation/manifest.yml"
      criteria: "manifest.yml created and references assets/definitions/agent-categories.yml#documentation"
      details: |
        Create hub manifest with:
        - Category reference
        - Sub-agent list (currently only documentation-core)
        - Routing logic for documentation agents
        - Structure to accommodate future documentation sub-agents
      status: "completed"
      result: |
        Created manifest.yml with:
        - Category definition reference to assets/definitions/agent-categories.yml#documentation
        - Sub-agent list containing documentation-core
        - Routing rules with default_agent pointing to documentation-core
        - Expandable structure with notes for future specialization

    - id: "documentation-cat-02"
      description: "Update documentation-core/inputs.yml to reference category"
      file: "documentation/documentation-core/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section to inputs.yml with:
        - category: "assets/definitions/agent-categories.yml#documentation"
        - role: "documentation-core"

  validation:
    - "documentation/manifest.yml created and references agent-categories.yml"
    - "documentation-core sub-agent references its category"
    - "All file references resolve correctly"
    - "No broken references"

  notes:
    - "Currently minimal with only one sub-agent"
    - "May expand in future with specialized documentation agents"
    - "Manifest should be structured for easy expansion"

  dependencies:
    - "planner_definitions.yml (def-01 must complete first)"
