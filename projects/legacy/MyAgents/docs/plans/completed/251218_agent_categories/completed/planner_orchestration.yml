# Planner Task: Orchestration Agent Category Definition
# Plan: 251218_agent_categories

task:
  agent: "orchestration"
  target_path: "orchestration/"

  objective: "Introduce agent category concept to orchestration agent family"

  context: |
    The orchestration category is responsible for cross-domain workflow orchestration.
    It coordinates complex workflows that span multiple agent categories. Currently has
    a single sub-agent (orchestration-teach) but structured for future orchestration agents.
    This task adds explicit category references to the orchestration agent family.

  current_structure:
    sub_agents:
      - "orchestration-teach"
    has_manifest: false

  tasks:
    - id: "orchestration-cat-01"
      description: "Create orchestration/manifest.yml with category reference"
      file: "orchestration/manifest.yml"
      criteria: "manifest.yml created and references assets/definitions/agent-categories.yml#orchestration"
      details: |
        Create hub manifest with:
        - Category reference
        - Sub-agent list (currently only orchestration-teach)
        - Routing logic for orchestration agents
        - Structure to accommodate future orchestration sub-agents (build, test, deploy, etc.)
      status: "completed"
      result: |
        Created manifest.yml with:
        - Category reference to assets/definitions/agent-categories.yml#orchestration
        - Sub-agent orchestration-teach listed with description
        - Routing section with principles for orchestration agents
        - Structure ready for future expansion

    - id: "orchestration-cat-02"
      description: "Update orchestration-teach/inputs.yml to reference category"
      file: "orchestration/orchestration-teach/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section at top of inputs.yml with:
        - category: "assets/definitions/agent-categories.yml#orchestration"
        - role: "orchestration-teach"

  validation:
    - "orchestration/manifest.yml created and references agent-categories.yml"
    - "orchestration-teach sub-agent references its category"
    - "All file references resolve correctly"
    - "No broken references"

  notes:
    - "Currently minimal with only orchestration-teach"
    - "Likely to expand with orchestration-build, orchestration-test, orchestration-deploy"
    - "Orchestration agents coordinate cross-category workflows"
    - "Manifest should be structured for easy expansion"

  dependencies:
    - "planner_definitions.yml (def-01 must complete first)"
