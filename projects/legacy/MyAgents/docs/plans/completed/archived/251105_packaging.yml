    full_details:
      id: GLOBAL-COMMANDS-ARCH-001
      title: Fix CLI Architecture - Make All Commands Work Globally
      description: Fix inconsistent command architecture where some commands work
        globally and others require project context. Make all commands work from any
        directory by using home dir as fallback, auto-creating ~/.config/myagents/
        on first run, and removing artificial restrictions.
      priority: high
      status: completed
      created: 2025-11-07
      completed: *id001
      worktree: MyAgents-packaging-001
      plan_file: docs/plans/live/251107_global_commands_architecture.yml
      source: User request to fix CLI architecture based on lessons from DEFAULT-COMMAND-UX-001
      problem: 'Current architecture splits commands into two categories:

        - Global commands (config, preferences, update, rebuild) work from any directory

        - Project commands (chat, studio) require project context and fail with errors


        This creates confusing UX and breaks "work from anywhere" promise.

        '
      solution: 'Make all commands work globally by:

        1. Adding chat/studio to global_commands list

        2. Using home dir as fallback when not in project context

        3. Auto-creating ~/.config/myagents/ on first run

        4. Removing restrictions (required=True, allow_fallback=False)

        5. Simplifying architecture, not adding complexity

        '
