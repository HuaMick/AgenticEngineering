  CONFIG-ROUTING-FIX-001:
    title: Fix Home Config Auto-Creation to Use Proper Schema (NOT Routing)
    completed: &id002 2025-11-09
    summary: 'health_check_workflow.py creates placeholder config.yml with only ''description''
      field, but studio config loader requires full ''server/runtime/langgraph'' sections.
      User feedback: ''we shouldnt be routing, this should be populated via the preferences
      workflow after install. the install should use the existing one if there is
      already one in the home dir.'' Fix auto-creation to generate standalone config
      with proper schema.'
    full_details:
      id: CONFIG-ROUTING-FIX-001
      title: Fix Home Config Auto-Creation to Use Proper Schema (NOT Routing)
      description: 'health_check_workflow.py creates placeholder config.yml with only
        ''description'' field, but studio config loader requires full ''server/runtime/langgraph''
        sections. User feedback: ''we shouldnt be routing, this should be populated
        via the preferences workflow after install. the install should use the existing
        one if there is already one in the home dir.'' Fix auto-creation to generate
        standalone config with proper schema.'
      priority: critical
      status: completed
      created: 2025-11-09
      updated: 2025-11-09
      completed: *id002
      worktree: MyAgents-packaging-001
      source: User manual testing revealed config error + user feedback correcting
        proposed routing approach
      problem:
        current_behavior: 'When ~/.config/myagents/config.yml doesn''t exist, health_check_workflow.py

          auto-creates it with:

          ```yaml

          description: Default home configuration. Add your settings here.

          ```


          Studio config loader (backend/services/studio/src/config.py) expects:

          Full ''server'', ''runtime'', ''langgraph'' sections


          User gets error:

          "Config file ''/home/mick/.config/myagents/config.yml'' is missing required

          ''server'' section. Expected sections: server, runtime, langgraph"

          '
        root_cause: 'health_check_workflow.py lines 358-365 creates placeholder config
          with only

          description field. Should create STANDALONE config with actual server/runtime/langgraph

          sections, NOT routing config.

          '
        user_requirements: "1. \"we shouldnt be routing\" - Don't use config_path\
          \ routing pattern\n2. \"this should be populated via the preferences workflow\
          \ after install\"\n   - Preferences workflow should handle config.yml population\n\
          \   - OR install/setup step should populate it\n3. \"the install should\
          \ use the existing one if there is already one in the home dir\"\n   - Check\
          \ if ~/.config/myagents/config.yml exists\n   - If exists: DON'T OVERWRITE,\
          \ use existing\n   - If doesn't exist: CREATE with proper server/runtime/langgraph\
          \ sections\n"
        files_affected:
        - backend/services/agents/src/workflows/health_check_workflow.py (lines 358-365)
      solution:
        approach: "Modify health_check_workflow.py to create STANDALONE config with\
          \ proper schema:\n\nINCORRECT (previous proposal - routing):\n```python\n\
          default_config_yml = {\n    \"config_path\": \"/home/code/myagents/config/config.yml\"\
          \n}\n```\n\nCORRECT (user requirement - standalone config):\n```python\n\
          default_config_yml = {\n    \"server\": {\n        \"host\": \"127.0.0.1\"\
          ,\n        \"port\": 2024,\n        \"allow_blocking\": True\n    },\n \
          \   \"runtime\": {\n        \"pid_file\": \"~/.config/myagents/runtime/studio.pid\"\
          ,\n        \"log_dir\": \"~/.config/myagents/runtime/studio/logs\",\n  \
          \      \"checkpoint_dir\": \"~/.config/myagents/runtime/studio/checkpoints\"\
          \n    },\n    \"langgraph\": {\n        \"project_name\": \"myagents-default\"\
          \n    }\n}\n```\n"
        implementation_notes: "- Add file existence check BEFORE creating config.yml\n\
          - If file exists: Don't overwrite, use existing\n- If doesn't exist: Create\
          \ with full server/runtime/langgraph schema\n- Use HOME-DIRECTORY-APPROPRIATE\
          \ PATHS (not project paths):\n  - pid_file: ~/.config/myagents/runtime/studio.pid\n\
          \  - log_dir: ~/.config/myagents/runtime/studio/logs\n  - checkpoint_dir:\
          \ ~/.config/myagents/runtime/studio/checkpoints\n- NOT project paths like\
          \ /home/code/myagents/runtime/...\n- Don't use routing pattern (no config_path\
          \ field)\n- This creates a standalone, self-contained home config\n"
        preferences_workflow_consideration: 'User mentioned "populated via the preferences
          workflow after install"


          Options to investigate:

          1. Keep current approach: Auto-create during health check

          2. Move to preferences workflow: Create during preference setup

          3. Hybrid: Health check creates minimal, preferences populates full


          For now: Fix health check to create proper schema (immediate fix)

          Later: Consider if preferences workflow should be the creation point

          '
      files_to_modify:
      - file: backend/services/agents/src/workflows/health_check_workflow.py
        lines: 358-365
        change: Replace placeholder config with standalone config with proper schema
        old_content: "# Also create default config.yml\nhome_config_file = home_langgraph_dir\
          \ / \"config.yml\"\nif not home_config_file.exists():\n    default_config_yml\
          \ = {\n        \"description\": \"Default home configuration. Add your settings\
          \ here.\"\n    }\n    with open(home_config_file, 'w') as f:\n        yaml.dump(default_config_yml,\
          \ f, default_flow_style=False)\n"
        new_content: "# Also create default config.yml (if it doesn't already exist)\n\
          home_config_file = home_langgraph_dir / \"config.yml\"\nif not home_config_file.exists():\n\
          \    default_config_yml = {\n        \"server\": {\n            \"host\"\
          : \"127.0.0.1\",\n            \"port\": 2024,\n            \"allow_blocking\"\
          : True\n        },\n        \"runtime\": {\n            \"pid_file\": \"\
          ~/.config/myagents/runtime/studio.pid\",\n            \"log_dir\": \"~/.config/myagents/runtime/studio/logs\"\
          ,\n            \"checkpoint_dir\": \"~/.config/myagents/runtime/studio/checkpoints\"\
          \n        },\n        \"langgraph\": {\n            \"project_name\": \"\
          myagents-default\"\n        }\n    }\n    with open(home_config_file, 'w')\
          \ as f:\n        yaml.dump(default_config_yml, f, default_flow_style=False)\n"
      testing_requirements:
        manual_test_case_1_new_install:
        - Delete ~/.config/myagents/config.yml
        - 'Run: myagents chat (from /home/code)'
        - Verify config auto-created with server/runtime/langgraph sections
        - Verify no 'missing server section' error
        - Verify chat starts successfully
        - Verify paths use ~/.config/myagents/runtime/ not project paths
        manual_test_case_2_existing_config:
        - Create custom ~/.config/myagents/config.yml with custom port 3000
        - 'Run: myagents chat'
        - Verify existing config NOT overwritten
        - Verify custom port 3000 is used
        - Verify health check respects existing config
        automated_test:
        - Test health check creates proper schema when missing
        - Test health check doesn't overwrite existing config
        - Test config contains all required sections (server/runtime/langgraph)
        - Test home directory paths are used (not project paths)
      success_criteria:
      - ~/.config/myagents/config.yml auto-created with full server/runtime/langgraph
        schema
      - No 'missing server section' errors
      - Existing config files are NOT overwritten
      - Home directory paths used (not project paths)
      - myagents chat works from any directory
      - No routing pattern (no config_path field)
      - Existing tests still pass
      phases:
      - Implementation - Update health_check_workflow.py config creation with proper
        schema
      - Build-test loop - Verify no regressions
      - Manual verification - Test both new install and existing config scenarios
      - Cleanup - Review related config creation code
      - Documentation - Update comments in health_check_workflow.py
      - Preferences workflow review - Determine if config creation should move there
      future_considerations:
        preferences_workflow_integration: 'User suggested: "this should be populated
          via the preferences workflow after install"


          Next session: Investigate if config.yml creation should be:

          1. During preferences setup (myagents preferences init or similar)

          2. During first-run setup wizard

          3. Keep in health check but enhance with preferences data


          Current fix: Health check creates proper schema (immediate fix)

          Future enhancement: Consider preferences workflow as creation point

          '
      completion_note: "Setup workflow refactor completed in 5 phases (2025-11-09):\n\
        \nPhase 1: Renamed preferences_workflow.py to setup_workflow.py\n  - File:\
        \ backend/services/agents/src/workflows/preferences_workflow.py → setup_workflow.py\n\
        \  - Class: PreferencesWorkflow now alias for SetupWorkflow\n  - Added run_setup()\
        \ method to create config.yml with proper server/runtime/langgraph schema\n\
        \nPhase 2: Removed config auto-creation from health_check\n  - Removed config.yml\
        \ creation from health_check_workflow.py\n  - Health check now only detects\
        \ existing config, doesn't create\n  - Prevents auto-creation during routine\
        \ health checks\n\nPhase 3: Added \"myagents setup\" CLI command\n  - New\
        \ command: myagents setup\n  - Creates ~/.config/myagents/config.yml with\
        \ default settings\n  - Idempotent - does not overwrite existing config\n\
        \  - Added to frontend/cli/myagents_cli.py\n\nPhase 4: Updated all tests\n\
        \  - Updated test_preferences_workflow.py to test_setup_workflow.py\n  - All\
        \ imports updated: preferences_workflow → setup_workflow\n  - Tests verify\
        \ setup command creates proper config schema\n  - Tests verify idempotency\
        \ (no overwrite)\n\nPhase 5: Updated imports and documentation\n  - Updated\
        \ all imports: from preferences_workflow → from setup_workflow\n  - workflows/__init__.py\
        \ exports both SetupWorkflow and PreferencesWorkflow (backward compat)\n \
        \ - Updated help_workflow.py documentation\n  - Updated README.md with setup\
        \ command\n  - Updated SETUP.md with initial setup instructions\n  - All references\
        \ to preferences_workflow fixed\n\nResult:\n  - Config.yml now created explicitly\
        \ via \"myagents setup\" command\n  - Proper server/runtime/langgraph schema\
        \ in config\n  - No routing pattern used (standalone config)\n  - Existing\
        \ configs not overwritten\n  - Backward compatibility maintained via PreferencesWorkflow\
        \ alias\n"
