      # ========================================
      # TEST PHASE - Validate Stories Match Implementation
      # ========================================
      - name: Test Phase - Validate User Stories
        execution_groups:
          - execution: test-fix-loop
            name: Validate user stories match actual implementation
            agents:
              # Test agents: Validate stories by testing against implementation
              - type: test
                count: 4
                inputs:
                  - /home/code/myagents/docs/userstories/RemoteAgents/08_operations.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/09_deployment.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/10_connection_state.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/11_protocol.yml
                  - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/main.py
                  - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/infrastructure/relay_client.py
                  - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
                  - /home/code/myagents/RemoteAgents/Dockerfile
                  - /home/code/myagents/RemoteAgents/docker-compose.test.yml
                guidance: |
                  Test Strategy: implementation-validation (verify stories match code behavior)
                  Reporting: Update live plan with story_validation_failures

                  TEST DISTRIBUTION (4 agents, each tests one new file):

                  Agent 1 - Validate 08_operations.yml:
                  1. US-OPS-001: Test LOG_LEVEL environment variable
                     - Set LOG_LEVEL=DEBUG, start service, verify debug logs appear
                     - Set LOG_LEVEL=INFO, verify only info+ logs appear
                     - Set LOG_LEVEL=ERROR, verify only error logs appear
                     - Check actual behavior matches story acceptance criteria

                  2. US-OPS-002: Test health endpoint
                     - Start relay service, curl http://localhost:PORT/health
                     - Verify 200 response with service info
                     - Check response format matches story expectations

                  3. US-OPS-003: Test structured logging
                     - Create session, check logs include session_id
                     - Trigger state change, verify timestamp in log
                     - Cause error, verify error code and stack trace in log

                  4. US-OPS-004: Test log output destination
                     - Verify logs go to stdout/stderr (not files)
                     - Start in Docker, verify docker logs captures output

                  5. US-OPS-005: Check for performance metrics (may not exist yet)
                     - Search code for metrics logging
                     - Report if story is aspirational vs implemented

                  Agent 2 - Validate 09_deployment.yml:
                  1. US-DEPLOY-001: Test Docker container deployment
                     - docker build -f Dockerfile -t test-remote .
                     - docker run with env vars, verify startup
                     - Verify health endpoint responds
                     - Check docker logs for output

                  2. US-DEPLOY-002: Test environment variables
                     - Run with RELAY_URL=ws://custom, verify config used
                     - Run with PORT=9090, verify service listens on 9090
                     - Run with LOG_LEVEL=DEBUG, verify debug logging
                     - Run with invalid values, verify error handling

                  3. US-DEPLOY-003: Test docker-compose
                     - docker-compose -f docker-compose.test.yml up
                     - Verify services start and connect
                     - docker-compose down, verify cleanup

                  4. US-DEPLOY-004: Check production deployment patterns
                     - Check Dockerfile for USER directive (non-root)
                     - Check for signal handling in code

                  5. US-DEPLOY-005: Check multi-arch (may not exist)
                     - Check if Dockerfile supports multiple platforms
                     - Report if story is aspirational

                  Agent 3 - Validate 10_connection_state.yml:
                  1. US-STATE-001: Test connection lifecycle
                     - Create RelayClient, verify initial state is DISCONNECTED
                     - Call connect(), verify CONNECTING -> CONNECTED transition
                     - Check logs for state transitions

                  2. US-STATE-002: Test state transitions on failure
                     - Start connection, kill relay, verify RECONNECTING state
                     - Wait for retry, verify state changes
                     - Verify CLOSED after max attempts

                  3. US-STATE-003: Test state visibility
                     - Check if RelayClient exposes state property
                     - Verify state changes are logged
                     - Check if state accessible for debugging

                  4. US-STATE-004: Test graceful disconnect
                     - Call disconnect(), verify immediate CLOSED
                     - Verify no reconnection attempts in CLOSED
                     - Verify resources cleaned up

                  5. US-STATE-005: Test state persistence
                     - Check if RECONNECTING preserves session context
                     - Verify encryption keys preserved

                  Agent 4 - Validate 11_protocol.yml:
                  1. US-PROTOCOL-001: Test message type registry
                     - Call deserialize_message() with each known type
                     - Call with unknown type, verify ERROR_UNSUPPORTED_MESSAGE_TYPE
                     - Verify no crashes on unknown types

                  2. US-PROTOCOL-002: Test backward compatibility
                     - Send old message format, verify handling
                     - Check for version field in messages
                     - Document if not yet implemented

                  3. US-PROTOCOL-003: Test error code consistency
                     - Verify all error codes follow CATEGORY_DESCRIPTION format
                     - Check Error message includes code and message
                     - Verify details dict exists

                  4. US-PROTOCOL-004: Test message validation
                     - Send message with missing required field
                     - Send message with wrong type
                     - Send EncryptedBlob with invalid base64
                     - Verify ERROR_VALIDATION_FAILED

                  5. US-PROTOCOL-005: Check protocol documentation
                     - Look for OpenAPI/JSON Schema generation
                     - Report if story is aspirational

                  FAILURE REPORTING:
                  For any story that doesn't match implementation, add to live plan:
                  story_validation_failures:
                    - story_id: US-XXX-001
                      story_file: 08_operations.yml
                      issue_type: "behavior_mismatch" | "missing_feature" | "incorrect_acceptance_criteria"
                      description: What doesn't match
                      expected_per_story: What story says should happen
                      actual_behavior: What actually happens in code
                      recommendation: "update_story" | "fix_code" | "story_is_aspirational"

                  Why this matters: Stories must accurately reflect implementation for UAT validity.
                success_criteria:
                  - All implemented features validated against stories
                  - All behavior mismatches documented in live plan
                  - Missing features identified as aspirational stories
                  - All acceptance criteria tested where possible
                  - Zero story errors for implemented features

              # Test agents: Validate updated stories
              - type: test
                count: 2
                inputs:
                  - /home/code/myagents/docs/userstories/RemoteAgents/04_reliability.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/07_error_handling.yml
                  - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/infrastructure/relay_client.py
                  - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
                guidance: |
                  Test Strategy: implementation-validation
                  Reporting: Update live plan with story_validation_failures

                  TEST DISTRIBUTION (2 agents):

                  Agent 1 - Validate 04_reliability.yml updates:
                  1. US-RELIABLE-003: Verify exponential backoff timing
                     - Check relay_client.py RelayClientConfig defaults
                     - Verify initial_reconnect_delay = 1.0
                     - Verify max_reconnect_delay = 30.0
                     - Verify max_reconnect_attempts = 10
                     - Check backoff formula in code matches story

                  2. US-RELIABLE-006: Verify configuration story (if added)
                     - Check if RelayClientConfig accepts custom values
                     - Verify validation for positive delays
                     - Check if story accurately describes code

                  Agent 2 - Validate 07_error_handling.yml updates:
                  1. Verify all 13 error codes present in relay_messages.py:
                     - SESSION_EXPIRED, SESSION_NOT_FOUND, SESSION_ALREADY_EXISTS
                     - PAIRING_FAILED, PAIRING_CODE_INVALID, PAIRING_CODE_EXPIRED
                     - CRYPTO_ERROR, INVALID_KEY, DECRYPTION_FAILED, INVALID_NONCE
                     - INVALID_MESSAGE, UNSUPPORTED_MESSAGE_TYPE, VALIDATION_FAILED
                     - CONNECTION_LOST, TIMEOUT, INTERNAL_ERROR, UNAUTHORIZED

                  2. Verify each new story (US-ERROR-007 through 012) references correct code:
                     - Check if error code constant exists
                     - Check if error scenario is implemented
                     - Verify error handling matches story description

                  3. Check US-ERROR-005 update:
                     - Verify it references INVALID_MESSAGE and VALIDATION_FAILED
                     - Check implementation matches updated story

                  FAILURE REPORTING:
                  Use same format as other test agents (story_validation_failures)

                  Why this matters: Updated stories must accurately reflect updated understanding.
                success_criteria:
                  - Exponential backoff timing verified in code
                  - All 13 error codes confirmed in relay_messages.py
                  - Each new error story maps to actual implementation
                  - Updated stories accurate
                  - Zero validation failures for updates

              # Build agents: Fix story mismatches
              - type: build
                count: "n = total validation failures"
                inputs:
                  - /home/code/myagents/docs/userstories/RemoteAgents/08_operations.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/09_deployment.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/10_connection_state.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/11_protocol.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/04_reliability.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/07_error_handling.yml
                  - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/main.py
                  - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/infrastructure/relay_client.py
                  - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
                guidance: |
                  Context: Test agents have identified validation failures where stories don't
                  match implementation. Each build agent fixes ONE specific failure.

                  Instructions:
                  1. Read live plan story_validation_failures section
                  2. Find your assigned failure (orchestration agent specifies which)
                  3. Determine fix type based on recommendation:
                     - "update_story": Modify story to match implementation
                     - "story_is_aspirational": Add note that feature is planned, not implemented
                     - "fix_code": Implementation missing (should NOT happen - only update stories)

                  4. For story updates:
                     - Read implementation code to understand actual behavior
                     - Update story acceptance criteria to match
                     - Update journey steps if needed
                     - Update description if needed
                     - Maintain YAML format and structure

                  5. For aspirational stories:
                     - Add note in description: "NOTE: This story describes planned functionality not yet implemented"
                     - Lower priority if needed (HIGH -> MEDIUM or MEDIUM -> LOW)
                     - Update preconditions to indicate future state

                  6. Mark failure as resolved in live plan after fixing

                  Why this matters: Stories must be accurate for UAT. Aspirational stories
                  need clear labeling to avoid false test failures.
                success_criteria:
                  - Story updated to match implementation
                  - Acceptance criteria reflect actual behavior
                  - Aspirational stories clearly marked
                  - YAML format maintained
                  - Failure marked resolved in live plan

