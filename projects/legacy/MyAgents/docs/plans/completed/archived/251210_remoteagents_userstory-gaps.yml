              # Agent 3: Connection State Management
              - type: builder
                inputs:
                  - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/infrastructure/relay_client.py
                  - /home/code/myagents/RemoteAgents/tests/test_relay_client.py
                  - /home/code/myagents/docs/userstories/RemoteAgents/01_session_management.yml
                  - /home/code/myagents/docs/userstories/RemoteAgents/00_metadata.yml
                guidance: |
                  Context: relay_client.py implements full state machine with states:
                  DISCONNECTED, CONNECTING, CONNECTED, RECONNECTING, CLOSED. State transitions
                  are triggered by connection events, errors, and reconnect logic. NO user story
                  documents this state management.

                  Task: Create /home/code/myagents/docs/userstories/RemoteAgents/10_connection_state.yml

                  Instructions:
                  1. Review relay_client.py ConnectionState enum (lines 72-79):
                     - DISCONNECTED: Initial state, no connection
                     - CONNECTING: Connection attempt in progress
                     - CONNECTED: Active WebSocket connection
                     - RECONNECTING: Attempting to reconnect after failure
                     - CLOSED: Permanently closed, no reconnection

                  2. Review state transition logic in RelayClient:
                     - connect() method: DISCONNECTED -> CONNECTING -> CONNECTED
                     - _run_with_reconnect() method: handles reconnection attempts
                     - disconnect() method: transitions to CLOSED
                     - Error handling: CONNECTED -> RECONNECTING or CLOSED

                  3. Review test_relay_client.py for state transition tests:
                     - Understand tested state transitions
                     - Identify edge cases covered by tests

                  4. Use 01_session_management.yml as template

                  5. Create user stories for desktop_user persona:
                     - US-STATE-001: Connection lifecycle states (HIGH priority)
                       * Initial state is DISCONNECTED
                       * connect() transitions to CONNECTING then CONNECTED
                       * State visible in logs or client status
                       * Invalid transitions rejected

                     - US-STATE-002: State transitions on connection failure (HIGH priority)
                       * CONNECTING -> RECONNECTING if connection fails
                       * RECONNECTING -> CONNECTED on successful retry
                       * RECONNECTING -> CLOSED if max attempts exceeded
                       * State changes logged with timestamps

                     - US-STATE-003: State visibility for debugging (MEDIUM priority)
                       * Client exposes current state via property
                       * State changes emit events/callbacks
                       * Logs include state context
                       * Web UI can display connection state

                     - US-STATE-004: Graceful disconnect state handling (MEDIUM priority)
                       * disconnect() transitions to CLOSED immediately
                       * CLOSED state prevents reconnection attempts
                       * Resources cleaned up on CLOSED transition
                       * No zombie connections in CLOSED state

                     - US-STATE-005: State persistence across reconnects (LOW priority)
                       * RECONNECTING preserves session context
                       * Successful reconnect resumes from same state
                       * Encryption keys preserved during reconnect
                       * No session re-pairing needed

                  6. Follow RemoteAgents user story format:
                     - Include category, name, description
                     - Each story with persona, journey, acceptance_criteria
                     - Journey shows state transitions with expected outcomes
                     - Test layers: local and integration

                  7. Ensure stories are testable:
                     - Observable via logging and client status
                     - Can simulate connection failures
                     - State transitions measurable

                  Why this matters: Connection state management is core reliability feature.
                  Without user stories, state machine lacks UAT validation.
                success_criteria:
                  - 10_connection_state.yml created with 5 user stories
                  - Stories cover lifecycle states, failures, visibility, graceful disconnect, persistence
                  - All stories follow RemoteAgents format
                  - Stories testable via connection simulation and log inspection
                  - File includes category metadata

