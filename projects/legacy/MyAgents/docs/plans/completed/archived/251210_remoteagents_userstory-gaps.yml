                  4. Use 01_session_management.yml as template

                  5. Create user stories for platform_operator persona:
                     - US-PROTOCOL-001: Message type registry (HIGH priority)
                       * All message types registered in MESSAGE_TYPES
                       * deserialize_message() routes to correct class
                       * Unknown message types return ERROR_UNSUPPORTED_MESSAGE_TYPE
                       * No runtime errors on valid JSON with unknown type

                     - US-PROTOCOL-002: Backward compatible message handling (HIGH priority)
                       * New message types don't break old clients
                       * Old message types still work with new services
                       * Version field in messages for future compatibility
                       * Graceful degradation when features unavailable

                     - US-PROTOCOL-003: Error code namespace consistency (MEDIUM priority)
                       * All error codes follow CATEGORY_DESCRIPTION format
                       * Error messages include code and human-readable message
                       * Client can handle errors programmatically via code
                       * Error details dict provides context

                     - US-PROTOCOL-004: Message validation and type safety (MEDIUM priority)
                       * Pydantic validates all message fields
                       * Type mismatches return ERROR_VALIDATION_FAILED
                       * Missing required fields caught at deserialization
                       * Invalid base64 in EncryptedBlob rejected

                     - US-PROTOCOL-005: Protocol documentation generation (LOW priority)
                       * Message schemas extractable from Pydantic models
                       * OpenAPI/JSON Schema for message types
                       * Example messages for each type
                       * Protocol version documented

                  6. Follow RemoteAgents user story format:
                     - Include category, name, description
                     - Each story with persona, journey, acceptance_criteria
                     - Journey shows protocol interactions
                     - Test layers: local and integration

                  7. Ensure stories are testable:
                     - Send messages with unknown types
                     - Send messages with invalid fields
                     - Verify error responses
                     - Check backward compatibility

                  Why this matters: Protocol versioning enables evolution without breaking
                  changes. Without user stories, protocol features lack UAT validation.
                success_criteria:
                  - 11_protocol.yml created with 5 user stories
                  - Stories cover message registry, backward compatibility, error codes, validation, docs
                  - All stories follow RemoteAgents format
                  - Stories testable via message sending and error observation
                  - File includes category metadata

