# Live Plan: MyAgentsFrontend User Story Gap Analysis and Remediation
# Date: 2025-12-10
# Purpose: Update user stories to accurately reflect implemented features and document missing stories

worktree: /home/code/myagents/MyAgentsFrontend-userstory-gaps
liveplan: /home/code/myagents/docs/plans/live/251210_myagentsfrontend_userstory-gaps.yml
completedplan: /home/code/myagents/docs/plans/completed/251210_myagentsfrontend_userstory-gaps.yml

live-plans:
  - id: USERSTORY-GAPS-001
    title: Align User Stories with Implementation Reality
    description: |
      User story analysis revealed significant gaps between documented stories and actual implementation.
      This plan addresses:
      1. Two "future" features (WebSocket, Encryption) that are FULLY IMPLEMENTED
      2. Partial implementations needing completion (Accessibility, Terminal xterm integration)
      3. Missing user stories for implemented features (Connection State Management, Auto-reconnect)
      4. Status updates to accurately reflect implementation state

    phases:
      # ========================================
      # BUILD PHASE - Update Future Features Status
      # ========================================
      - name: Build Phase - Update Future Features File
        execution_groups:
          - execution: sequential
            name: Reclassify implemented features from "future" to "implemented"
            agents:
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/06_future_features.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/networking/relay_client.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/networking/connection_state.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/crypto/nacl_crypto.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/crypto/key_pair.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/crypto/message_envelope.dart
                guidance: |
                  Context: User story analysis revealed that US-WS-001 (WebSocket Connection) and
                  US-CRYPT-001 (Encrypted Communication) are marked as "future" features but are
                  FULLY IMPLEMENTED in the codebase. The relay_client.dart has 500+ lines implementing
                  WebSocket connection, auto-reconnect, and connection state management. The lib/core/crypto/
                  directory contains complete NaCl encryption implementation with X25519 key pairs.

                  Instructions:
                  1. Read 06_future_features.yml to understand current structure
                  2. Read relay_client.dart to verify WebSocket implementation details
                  3. Read connection_state.dart to understand connection state management
                  4. Read nacl_crypto.dart, key_pair.dart, and message_envelope.dart to verify encryption implementation

                  5. Update US-WS-001:
                     - Remove "status: future" or change to "status: implemented"
                     - Add implementation_note documenting where the feature is implemented
                     - Add implementation_references section listing:
                       * lib/core/networking/relay_client.dart (WebSocket client with auto-reconnect)
                       * lib/core/networking/connection_state.dart (Connection state management)
                     - Update journey steps if needed to reflect actual implementation behavior
                     - Keep existing success_criteria but verify they match implementation

                  6. Update US-CRYPT-001:
                     - Remove "status: future" or change to "status: implemented"
                     - Add implementation_note documenting the encryption implementation
                     - Verify implementation_references match actual files:
                       * lib/core/crypto/nacl_crypto.dart (NaCl Box encryption/decryption)
                       * lib/core/crypto/key_pair.dart (X25519 key pair generation)
                       * lib/core/crypto/message_envelope.dart (Message format with nonce)
                     - Update journey steps if needed to reflect actual implementation
                     - Verify success_criteria match actual encryption format (Base64, nonce, MAC)

                  7. Keep US-XTERM-001 and US-VOICE-001 as "status: future" (these are correctly marked)

                  8. Add a header comment to the file explaining the status classification:
                     # IMPLEMENTATION STATUS GUIDE:
                     # - No status field OR "status: implemented" = Feature is implemented
                     # - "status: future" = Feature planned but not yet implemented
                     # - "status: partial" = Feature partially implemented, see implementation_note

                  Files to modify:
                  - 06_future_features.yml: Update status and add implementation references

                  Why this matters: Accurate user story status enables proper UAT testing and prevents
                  testing "future" features that already exist.
                success_criteria:
                  - US-WS-001 marked as implemented with correct file references
                  - US-CRYPT-001 marked as implemented with correct file references
                  - US-XTERM-001 and US-VOICE-001 remain as future (status unchanged)
                  - Implementation references point to actual source files
                  - Status classification guide added to file header

      # ========================================
      # BUILD PHASE - Create Connection State User Stories
      # ========================================
      - name: Build Phase - Document Connection State Management
        execution_groups:
          - execution: sequential
            name: Create new user story file for connection state management
            agents:
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/networking/connection_state.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/networking/relay_client.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/00_metadata.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/02_pairing.yml
                guidance: |
                  Context: The codebase has a sophisticated ConnectionStateManager implementation in
                  lib/core/networking/connection_state.dart that manages connection lifecycle, but there
                  are no user stories documenting this feature. The relay_client.dart implements auto-reconnect
                  with exponential backoff (initial delay 1s, max 30s). These are critical reliability
                  features that need user story documentation.

                  Instructions:
                  1. Read connection_state.dart to understand ConnectionStateManager implementation
                  2. Read relay_client.dart to understand auto-reconnect implementation with exponential backoff
                  3. Read 02_pairing.yml to understand existing connection-related user story patterns
                  4. Read 00_metadata.yml to understand user story structure and format requirements

                  5. Create new file: 07_connection_reliability.yml with the following structure:

                     user_stories:
                       # Connection Reliability User Stories

                       - id: US-CONN-001
                         name: "Connection State Monitoring"
                         category: "connection_reliability"
                         persona: "User monitoring connection health"
                         priority: "high"

                         starting_state:
                           environment:
                             app_installed: true
                             platform: "web"
                             paired: true
                             connection_status: "connected"

                         journey:
                           - step: 1
                             action: "Observe connection status indicator"
                             expected: "Connection state visible (idle/connecting/connected/disconnected/error)"
                             failure_indicators:
                               - "No status indicator visible"
                               - "Status indicator shows wrong state"

                           - step: 2
                             action: "Monitor connection state changes"
                             expected: "State transitions are reflected in UI (connecting → connected)"
                             failure_indicators:
                               - "State doesn't update when connection changes"
                               - "UI stuck in stale state"

                           - step: 3
                             action: "Simulate connection drop"
                             expected: "State changes to disconnected, user is notified"
                             failure_indicators:
                               - "Silent failure, no notification"
                               - "App appears to work but is disconnected"

                         success_criteria:
                           - "ConnectionStateManager tracks all state transitions"
                           - "UI reflects current connection state accurately"
                           - "State changes are observable and reactive"
                           - "All five states properly handled (idle/connecting/connected/disconnected/error)"

                         testing:
                           web: true
                           widget_test: true
                           integration_test: true

                         documentation_references:
                           - "lib/core/networking/connection_state.dart"
                           - "lib/features/pairing/pairing_controller.dart"

                       - id: US-CONN-002
                         name: "Automatic Reconnection with Exponential Backoff"
                         category: "connection_reliability"
                         persona: "User experiencing network interruption"
                         priority: "critical"

                         starting_state:
                           environment:
                             app_installed: true
                             platform: "web"
                             paired: true
                             connection_status: "connected"

                         journey:
                           - step: 1
                             action: "Simulate network disconnect"
                             expected: "Connection state changes to disconnected, auto-reconnect initiated"
                             failure_indicators:
                               - "No reconnect attempt"
                               - "User must manually reconnect"
                               - "App crashes on disconnect"

                           - step: 2
                             action: "Observe first reconnect attempt"
                             expected: "Reconnect attempted after 1 second (initial delay)"
                             failure_indicators:
                               - "Immediate reconnect (no backoff)"
                               - "No reconnect attempt"
                               - "Excessive delay on first attempt"

                           - step: 3
                             action: "Simulate repeated failures, observe retry pattern"
                             expected: "Exponential backoff: 1s → 2s → 4s → 8s → 16s → 30s (max)"
                             failure_indicators:
                               - "No backoff pattern (constant delay)"
                               - "Excessive backoff (too long between attempts)"
                               - "Max delay exceeded (>30s)"

                           - step: 4
                             action: "Allow successful reconnection"
                             expected: "Connection restored, backoff timer reset, state changes to connected"
                             failure_indicators:
                               - "Reconnect succeeds but state not updated"
                               - "Timer not reset for future disconnects"
                               - "Connection unstable after reconnect"

                         success_criteria:
                           - "Auto-reconnect enabled by default"
                           - "Exponential backoff implemented (1s initial, 30s max)"
                           - "Backoff timer resets after successful reconnection"
                           - "User informed of reconnect attempts via UI"
                           - "No infinite reconnect loops on permanent failures"

                         testing:
                           web: true
                           widget_test: false
                           integration_test: true
                           note: "Requires network simulation or mock WebSocket server"

                         implementation_references:
                           - "lib/core/networking/relay_client.dart (auto-reconnect logic)"
                           - "lib/core/networking/connection_state.dart (state management)"

                       - id: US-CONN-003
                         name: "Connection Error Handling"
                         category: "connection_reliability"
                         persona: "User experiencing connection errors"
                         priority: "high"

                         starting_state:
                           environment:
                             app_installed: true
                             platform: "web"
                             paired: true

                         journey:
                           - step: 1
                             action: "Trigger WebSocket error (invalid URL, refused connection)"
                             expected: "Connection state changes to error, clear error message displayed"
                             failure_indicators:
                               - "Generic error message"
                               - "No error message displayed"
                               - "App crashes"

                           - step: 2
                             action: "Observe error recovery options"
                             expected: "User can retry connection or return to pairing"
                             failure_indicators:
                               - "No retry option"
                               - "Stuck in error state"
                               - "Must reload app to recover"

                           - step: 3
                             action: "Trigger authentication error (invalid pairing code)"
                             expected: "Specific error: 'Invalid pairing code', auto-reconnect disabled"
                             failure_indicators:
                               - "Auto-reconnect continues indefinitely"
                               - "No specific error for auth failure"
                               - "Silent failure"

                         success_criteria:
                           - "Connection errors distinguished by type (network/auth/server)"
                           - "Error messages are user-friendly and actionable"
                           - "Auto-reconnect disabled for permanent errors (auth failures)"
                           - "Auto-reconnect enabled for transient errors (network issues)"
                           - "User can manually retry or return to pairing"

                         testing:
                           web: true
                           widget_test: true
                           integration_test: true

                         documentation_references:
                           - "lib/core/networking/relay_client.dart"
                           - "lib/core/networking/connection_state.dart"

                  6. Ensure the new file follows the same YAML structure as other user story files
                  7. Add appropriate testing flags (web/widget_test/integration_test) to each story
                  8. Include clear documentation_references pointing to actual implementation files

                  Files to create:
                  - 07_connection_reliability.yml: New user story file documenting connection state and auto-reconnect

                  Why this matters: Connection reliability is a critical feature already implemented but
                  not documented in user stories. This creates a documentation gap that prevents proper UAT
                  testing and validation of this sophisticated feature.
                success_criteria:
                  - File 07_connection_reliability.yml created with 3 user stories
                  - US-CONN-001 documents ConnectionStateManager
                  - US-CONN-002 documents auto-reconnect with exponential backoff
                  - US-CONN-003 documents error handling and recovery
                  - All stories follow established YAML structure from existing files
                  - Implementation references point to actual source files

      # ========================================
      # BUILD PHASE - Enhance Accessibility User Story
      # ========================================
      - name: Build Phase - Add Accessibility Requirements
        execution_groups:
          - execution: sequential
            name: Expand US-PAIR-003 with specific accessibility requirements
            agents:
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/02_pairing.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/features/pairing/pairing_screen.dart
                guidance: |
                  Context: US-PAIR-003 exists but lacks specific accessibility requirements. The user story
                  mentions "semantic labels" but doesn't specify which elements need labels or what the
                  requirements are. This makes it untestable and impossible to validate implementation.

                  Instructions:
                  1. Read 02_pairing.yml and locate US-PAIR-003
                  2. Read pairing_screen.dart to identify UI elements that need accessibility enhancements

                  3. Expand US-PAIR-003 journey steps with specific requirements:

                     - step: 1
                       action: "Navigate pairing screen using keyboard only"
                       expected: "Input field and Connect button are reachable via Tab key, focus indicators visible"
                       failure_indicators:
                         - "Focus not visible"
                         - "Elements unreachable"
                         - "Tab order incorrect (should be: code input → connect button)"

                     - step: 2
                       action: "Activate Connect button using Enter/Space when focused"
                       expected: "Button activates without mouse when focused"
                       failure_indicators:
                         - "Keyboard activation fails"
                         - "Wrong element activated"
                         - "No response to keyboard input"

                     - step: 3
                       action: "Use screen reader to access pairing form"
                       expected: |
                         Screen reader announces:
                         - Input field with label "Enter pairing code" and placeholder "ABC123"
                         - Connect button with label "Connect to remote session"
                         - Status messages as live regions (connection status updates announced)
                       failure_indicators:
                         - "Input field unlabeled or generic label"
                         - "Button has no accessible label"
                         - "Status changes not announced"

                     - step: 4
                       action: "Check ARIA attributes and semantic HTML"
                       expected: |
                         Proper semantic structure:
                         - Input field has aria-label or associated <label> element
                         - Connect button has aria-label describing action
                         - Status area has role="status" or aria-live="polite"
                         - Error messages have role="alert" or aria-live="assertive"
                       failure_indicators:
                         - "Missing ARIA labels"
                         - "No semantic HTML structure"
                         - "Status area not a live region"

                  4. Update success_criteria to be measurable:
                     - "Input field has aria-label='Enter pairing code' or associated label element"
                     - "Connect button has aria-label='Connect to remote session'"
                     - "Status area has role='status' for connection state updates"
                     - "Error messages have role='alert' for immediate announcement"
                     - "Full keyboard navigation works (Tab order: input → button)"
                     - "Focus indicators are visible (meets WCAG 2.1 Level AA minimum 2:1 contrast)"
                     - "Screen reader announces all state changes (connecting, connected, error)"

                  5. Add implementation_note describing what needs to be added:
                     implementation_note: |
                       Missing accessibility features to implement:
                       - Semantic labels for pairing code input field
                       - ARIA label for Connect button
                       - Status area as live region (role="status")
                       - Error messages as alerts (role="alert")
                       - Visible focus indicators with sufficient contrast

                  Files to modify:
                  - 02_pairing.yml: Expand US-PAIR-003 with specific accessibility requirements

                  Why this matters: Vague accessibility requirements cannot be tested or validated.
                  Specific, measurable criteria enable proper implementation and UAT testing.
                success_criteria:
                  - US-PAIR-003 journey expanded with 4 detailed steps
                  - Step 3 specifies exact screen reader announcements expected
                  - Step 4 specifies required ARIA attributes and semantic HTML
                  - Success criteria are measurable (specific ARIA attributes listed)
                  - Implementation note added documenting missing features
                  - Requirements follow WCAG 2.1 Level AA guidelines

      # ========================================
      # BUILD PHASE - Update Terminal User Story Status
      # ========================================
      - name: Build Phase - Clarify Terminal Implementation Status
        execution_groups:
          - execution: sequential
            name: Update terminal user stories to reflect partial implementation
            agents:
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/03_terminal.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/features/remote_terminal/terminal_screen.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/pubspec.yaml
                guidance: |
                  Context: US-TERM-001 documents the terminal screen, but US-XTERM-001 (in 06_future_features.yml)
                  mentions that xterm integration is pending. The xterm package is declared in pubspec.yaml but
                  not integrated into the terminal screen. Also, US-TERM-003 mentions layout responsiveness but
                  there are no responsive design patterns implemented.

                  Instructions:
                  1. Read 03_terminal.yml to understand current terminal user stories
                  2. Read terminal_screen.dart to verify implementation status
                  3. Read pubspec.yaml to confirm xterm dependency status

                  4. Update US-TERM-001:
                     - Add implementation_note clarifying that terminal screen exists as placeholder
                     - Note that xterm integration is pending (reference US-XTERM-001 in 06_future_features.yml)
                     - Example implementation_note:
                       implementation_note: |
                         Terminal screen currently displays as placeholder only.
                         Xterm.js integration pending (see US-XTERM-001 in 06_future_features.yml).
                         xterm package declared in pubspec.yaml but not yet integrated.

                  5. Update US-TERM-003 (Layout Responsiveness):
                     - Change status to "status: partial" or add implementation_note
                     - Document missing responsive design patterns
                     - Add specific requirements for responsive breakpoints:
                       * Desktop (>1024px): Full terminal with sidebar/tools
                       * Tablet (768px-1024px): Full terminal, collapsible sidebar
                       * Mobile (375px-768px): Full-width terminal, hamburger menu
                     - Example implementation_note:
                       implementation_note: |
                         Terminal screen uses basic Container layout without responsive breakpoints.
                         Missing:
                         - MediaQuery-based layout adaptation
                         - Responsive font sizing
                         - Touch-friendly controls on mobile
                         - Orientation handling (portrait/landscape)

                  6. Add success_criteria for responsive design:
                     - "Layout uses MediaQuery to detect screen size"
                     - "Breakpoints defined for desktop (>1024px), tablet (768-1024px), mobile (<768px)"
                     - "Terminal font size scales appropriately (12-16px based on screen size)"
                     - "Touch targets meet minimum 44x44px on mobile (WCAG)"
                     - "Orientation changes handled gracefully"

                  Files to modify:
                  - 03_terminal.yml: Update US-TERM-001 and US-TERM-003 with implementation notes and requirements

                  Why this matters: Users need to understand that the terminal screen is a placeholder
                  awaiting xterm integration, and that responsive design is incomplete. This prevents
                  testing incomplete features and documents the work needed.
                success_criteria:
                  - US-TERM-001 has implementation_note clarifying placeholder status
                  - US-TERM-001 references US-XTERM-001 for xterm integration work
                  - US-TERM-003 has implementation_note documenting missing responsive patterns
                  - US-TERM-003 success_criteria expanded with specific responsive requirements
                  - Responsive breakpoints clearly defined (desktop/tablet/mobile)

