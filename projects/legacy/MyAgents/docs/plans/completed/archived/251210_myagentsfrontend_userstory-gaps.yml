      # ========================================
      # TEST PHASE - Validate User Story Accuracy
      # ========================================
      - name: Test Phase - Validate User Stories Match Implementation
        execution_groups:
          - execution: test-fix-loop
            name: Verify user stories accurately describe implementation
            agents:
              - type: test
                count: 5
                inputs:
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/02_pairing.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/03_terminal.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/06_future_features.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/07_connection_reliability.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/networking/relay_client.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/networking/connection_state.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/core/crypto/nacl_crypto.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/features/pairing/pairing_screen.dart
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/lib/features/remote_terminal/terminal_screen.dart
                guidance: |
                  Test Strategy: documentation-validation (verify user stories match source code)
                  Test Process: Read user stories, trace to source code, verify accuracy
                  Reporting: Update live plan with structured failures

                  VALIDATION SCOPE (distribute across 5 agents):

                  Agent 1 - WebSocket Implementation Validation:
                  - Read US-WS-001 in 06_future_features.yml
                  - Read relay_client.dart and connection_state.dart
                  - Verify user story accurately describes WebSocket implementation:
                    * Connection to wss://relay.remoteagents.dev/ws/client/{pairingCode}
                    * Auto-reconnect enabled with exponential backoff
                    * Connection state management (idle/connecting/connected/disconnected/error)
                  - Verify success_criteria match implementation capabilities
                  - Verify implementation_references point to correct files
                  - Report discrepancies between user story and implementation

                  Agent 2 - Encryption Implementation Validation:
                  - Read US-CRYPT-001 in 06_future_features.yml
                  - Read nacl_crypto.dart, key_pair.dart, message_envelope.dart
                  - Verify user story accurately describes encryption:
                    * NaCl Box encryption (X25519-XSalsa20-Poly1305)
                    * Message format: Base64(nonce || ciphertext)
                    * 24-byte nonce, Poly1305 MAC
                  - Verify journey steps match actual encryption flow
                  - Verify implementation_references are complete and correct
                  - Report discrepancies between user story and implementation

                  Agent 3 - Connection Reliability Validation:
                  - Read US-CONN-001, US-CONN-002, US-CONN-003 in 07_connection_reliability.yml
                  - Read relay_client.dart auto-reconnect logic
                  - Read connection_state.dart state management
                  - Verify US-CONN-002 accurately describes exponential backoff:
                    * Initial delay: 1 second
                    * Max delay: 30 seconds
                    * Exponential progression: 1s → 2s → 4s → 8s → 16s → 30s
                  - Verify US-CONN-001 describes all connection states correctly
                  - Verify US-CONN-003 describes error handling patterns
                  - Report discrepancies or missing details

                  Agent 4 - Accessibility Requirements Validation:
                  - Read US-PAIR-003 in 02_pairing.yml
                  - Read pairing_screen.dart implementation
                  - Verify accessibility requirements are:
                    * Specific and testable (not vague)
                    * Include ARIA attributes needed
                    * Follow WCAG 2.1 Level AA guidelines
                  - Check if implementation_note accurately describes missing features
                  - Verify success_criteria are measurable
                  - Report if requirements are too vague or missing specifics

                  Agent 5 - Terminal Status Validation:
                  - Read US-TERM-001 and US-TERM-003 in 03_terminal.yml
                  - Read terminal_screen.dart implementation
                  - Read pubspec.yaml for xterm dependency
                  - Verify US-TERM-001 implementation_note clearly states:
                    * Terminal is placeholder only
                    * xterm integration pending
                    * Reference to US-XTERM-001
                  - Verify US-TERM-003 implementation_note documents:
                    * Missing responsive design patterns
                    * Specific breakpoints needed
                  - Report if implementation notes are missing or unclear

                  Failure Reporting Format:
                  Add failures to live plan under USERSTORY-GAPS-001.validation_failures with structure:
                  - user_story_id: US-XXX-XXX
                  - validation_type: "accuracy", "completeness", "reference_error", "vague_requirements"
                  - description: What is inaccurate or missing
                  - expected: What the user story should say
                  - actual_in_code: What the implementation actually does
                  - recommendation: How to fix the user story
                success_criteria:
                  - All user story claims verified against source code
                  - Implementation references point to correct files (no broken references)
                  - Success criteria match actual implementation capabilities
                  - Journey steps accurately describe implementation behavior
                  - No vague or untestable requirements remain
                  - Status fields accurately reflect implementation state

              - type: build
                count: "n = validation failures"
                inputs:
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/02_pairing.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/03_terminal.yml
                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/06_future_features.yml
