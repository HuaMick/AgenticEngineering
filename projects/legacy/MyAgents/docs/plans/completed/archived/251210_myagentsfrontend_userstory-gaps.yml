                  - /home/code/myagents/MyAgentsFrontend-userstory-gaps/docs/userstories/MyAgentsFrontend/00_metadata.yml
                guidance: |
                  Context: Test agents have identified inaccuracies or gaps in user stories.
                  Each build agent is assigned ONE specific validation failure to fix.

                  Instructions:
                  1. Read live plan at /home/code/myagents/docs/plans/live/251210_myagentsfrontend_userstory-gaps.yml
                  2. Find your assigned validation failure (orchestration agent will specify which one)
                  3. Determine the fix needed:
                     - Accuracy issues: Update user story to match actual implementation
                     - Completeness issues: Add missing details or success criteria
                     - Reference errors: Correct file paths or add missing references
                     - Vague requirements: Replace with specific, measurable criteria

                  4. Make the fix in the appropriate user story file
                  5. If metadata is affected (counts, statuses), update 00_metadata.yml
                  6. Mark validation failure as resolved in live plan after fixing

                  Fix Categories:
                  - Implementation accuracy: Ensure user story describes what code actually does
                  - File references: Correct paths to implementation files
                  - Success criteria: Make criteria specific and measurable
                  - Journey steps: Align steps with actual user flow in implementation
                  - Status accuracy: Ensure status field matches implementation state

                  Why this matters: User stories must accurately reflect implementation to be useful
                  for UAT testing. Inaccurate stories lead to false test failures or missed issues.
