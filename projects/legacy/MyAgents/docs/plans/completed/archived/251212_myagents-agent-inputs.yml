              # Teacher agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/teacher/processes/process.yml
                  - src/myagents/frontend/agents/teacher/processes/plan.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                guidance: |
