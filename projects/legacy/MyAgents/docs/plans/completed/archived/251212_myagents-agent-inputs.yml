      # ========================================
      # BUILD PHASE 3: Refactor Process Files (Parallel)
      # ========================================
      - name: Build Phase - Refactor Process Files
        execution_groups:
          # Parallel: Refactor process files to reference inputs.yml
          - execution: parallel
            name: Refactor process files to use inputs.yml
            agents:
              # Test processes
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/test/inputs.yml
                  - src/myagents/frontend/agents/test/processes/test_runner.yml
                  - src/myagents/frontend/agents/test/processes/test_builder.yml
                  - src/myagents/frontend/agents/test/processes/audit.yml
                  - src/myagents/frontend/agents/test/processes/user_simulator.yml
                guidance: |
                  Context: Refactor test process files to reference test/inputs.yml for core inputs.

                  Instructions:
                  1. Update each test process file's inputs section:
                     - Add reference to test/inputs.yml as first input
                     - Keep process-specific inputs that aren't in inputs.yml
                     - Remove redundant inputs already in inputs.yml
                  2. Format:
                     ```yaml
                     inputs:
                       - location: "src/myagents/frontend/agents/test/inputs.yml"
                         description: "Core test agent inputs and guidelines"
                       - location: "specific/to/this/process.yml"
                         description: "Process-specific input"
                     ```
                  3. Update all 5+ test process files

                  Files to modify:
                  - test/processes/test_runner.yml
                  - test/processes/test_builder.yml
                  - test/processes/audit.yml
                  - test/processes/user_simulator.yml
                  - test/processes/service_test.yml (if exists)
                success_criteria:
                  - All test processes reference inputs.yml
                  - Process-specific inputs preserved
                  - Redundancy eliminated

              # Planner processes
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/planner/inputs.yml
                  - src/myagents/frontend/agents/planner/processes/build.yml
                  - src/myagents/frontend/agents/planner/processes/test.yml
                  - src/myagents/frontend/agents/planner/processes/research.yml
                guidance: |
                  Context: Refactor planner process files to reference planner/inputs.yml.

                  Instructions:
                  1. Update each planner process file's inputs section
                  2. Add reference to planner/inputs.yml as first input
                  3. Keep process-specific inputs
                  4. Remove redundant inputs

                  Files to modify:
                  - planner/processes/build.yml
                  - planner/processes/test.yml
                  - planner/processes/research.yml
                  - planner/processes/cleaning.yml (if exists)
                success_criteria:
                  - All planner processes reference inputs.yml

              # Deploy processes
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/deploy/inputs.yml
                  - src/myagents/frontend/agents/deploy/processes/cicd_maintenance.yml
                  - src/myagents/frontend/agents/deploy/processes/packaging.yml
                  - src/myagents/frontend/agents/deploy/processes/worktree_management.yml
                guidance: |
                  Context: Refactor deploy process files to reference deploy/inputs.yml.

                  Instructions:
                  1. Update each deploy process file's inputs section
                  2. Add reference to deploy/inputs.yml as first input
                  3. Keep process-specific inputs

                  Files to modify:
                  - deploy/processes/cicd_maintenance.yml
                  - deploy/processes/packaging.yml
                  - deploy/processes/worktree_management.yml
                success_criteria:
