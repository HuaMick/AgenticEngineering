              # Documentation agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/documentation/process.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                guidance: |
                  Context: Create dedicated inputs.yml for the documentation agent type.

                  Instructions:
                  1. Create: src/myagents/frontend/agents/documentation/inputs.yml
                  2. Include core inputs documentation needs:
