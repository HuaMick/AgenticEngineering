              # Other agent processes
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/cleaner/inputs.yml
                  - src/myagents/frontend/agents/teacher/inputs.yml
                  - src/myagents/frontend/agents/explore/inputs.yml
                  - src/myagents/frontend/agents/cleaner/processes/identify.yml
                  - src/myagents/frontend/agents/teacher/processes/process.yml
                guidance: |
                  Context: Refactor remaining agent process files to reference their inputs.yml.

                  Instructions:
                  1. Update cleaner/processes/identify.yml and execute.yml
                  2. Update teacher/processes/process.yml and plan.yml
                  3. Update explore/processes/*.yml (5 files)
                  4. Update documentation/process.yml
                  5. Update diagnostics/process.yml

                  Each file should reference its agent's inputs.yml as first input.
                success_criteria:
                  - All remaining processes reference inputs.yml

      # ========================================
      # VERIFICATION PHASE: Test-Audit Loop (Sequential with Parallel Subagents)
      # ========================================
      - name: Verification Phase
        execution_groups:
          # Test-fix-loop: Parallel test agents, fix based on failures
          - execution: test-fix-loop
            name: Verify inputs architecture works correctly
            agents:
              # Parallel test agents: Validate different aspects
              - type: test
                count: 4
                inputs:
                  - src/myagents/frontend/agents/test/inputs.yml
                  - src/myagents/frontend/agents/test/processes/test_runner.yml
                  - src/myagents/frontend/agents/guidelines/manifest.yml
                guidance: |
                  Test Strategy: technical-spike (architecture validation)
                  Reporting: Update live plan with failures under AGENT-INPUTS-REFACTOR-001.test_failures

                  DISTRIBUTE ACROSS 4 TEST AGENTS:

                  Agent 1 - Inputs.yml Structure Validation:
                  - Verify each agent type has inputs.yml
                  - Verify inputs.yml follows template structure
                  - Verify required fields present (agent_type, version, core_inputs, guidelines)
                  - Verify file references are valid paths

                  Agent 2 - Process File References:
                  - Verify all process files reference their agent's inputs.yml
                  - Verify inputs.yml is first in inputs list
                  - Verify no duplicate inputs between inputs.yml and process file
                  - Verify process-specific inputs are preserved

                  Agent 3 - Guidelines Folder Validation:
                  - Verify guidelines/ folder exists
                  - Verify all guideline files follow structure
                  - Verify inputs.yml files reference valid guidelines
                  - Verify no orphaned guideline files (unused)

                  Agent 4 - Integration Testing:
                  - Test orchestration can load process with inputs.yml
                  - Test input resolution works correctly
                  - Test guidelines are accessible from inputs.yml
                  - Test end-to-end: spawn agent, verify inputs received

                  Failure Reporting Format:
                  - test_name: Name of failed test
                  - component: inputs.yml | process | guideline
                  - failure_description: What went wrong
                  - files_involved: List of affected files
                success_criteria:
                  - All inputs.yml files valid
                  - All process files correctly reference inputs.yml
                  - All guidelines accessible
                  - Integration tests pass

              # Build agents for fixing failures
              - type: builder
                count: "n = total failures"
                inputs:
                  - src/myagents/frontend/agents/templates/inputs.yml
                  - docs/plans/live/251212_myagents-agent-inputs.yml
                guidance: |
                  Context: Test agents found failures in the inputs architecture.

                  Instructions:
                  1. Read live plan to find assigned failure
                  2. Determine root cause:
                     - Missing inputs.yml: Create using template
                     - Invalid structure: Fix according to template
                     - Missing reference: Add inputs.yml reference to process
                     - Invalid path: Correct file path
                  3. Fix the specific issue
                  4. Mark as resolved in live plan
                success_criteria:
                  - Test that failed now passes
                  - No regression in other tests

          # Audit phase: Verify no reward hacking
          - execution: audit-test-fix-loop
            name: Audit inputs architecture for completeness
            agents:
              - type: audit
                inputs:
                  - src/myagents/frontend/agents/test/processes/audit.yml
                  - src/myagents/frontend/agents/manifest_agents.yml
                  - src/myagents/frontend/agents/guidelines/manifest.yml
                guidance: |
                  Context: Verify the inputs refactoring is complete and correct.
                  Reporting: Update live plan under AGENT-INPUTS-REFACTOR-001.audit_findings

                  Audit Focus Areas:

                  1. Completeness Check:
                  - All 13 agent types have inputs.yml
                  - All guidelines properly migrated to guidelines/
                  - All process files updated to reference inputs.yml
                  - Agent-specific definitions.yml files can be deprecated

                  2. Structure Consistency:
                  - All inputs.yml follow same template
                  - All guidelines follow same structure
                  - Naming conventions consistent

                  3. Redundancy Elimination:
                  - No duplicate inputs between inputs.yml and process files
                  - No duplicate content between guidelines and definitions
                  - No orphaned files

                  4. Backward Compatibility:
                  - Old paths still resolvable (or documented as deprecated)
                  - No broken references
                  - Migration path clear

                  Findings Format:
                  - finding_type: "incomplete", "inconsistent", "redundant", "breaking_change"
                  - severity: "high", "medium", "low"
                  - component: Which file/folder
                  - recommendation: How to fix
                success_criteria:
                  - All agent types covered
                  - No redundancy found
                  - Backward compatibility verified

              - type: test
                inputs:
                  - src/myagents/frontend/agents/test/processes/test_runner.yml
                guidance: |
                  Context: Re-test after audit to verify all findings addressed.

                  Instructions:
                  1. Re-run all tests from initial test phase
                  2. Add tests for any issues found in audit
                  3. Verify no regressions
                success_criteria:
                  - All tests pass
                  - Audit findings verified as addressed

      # ========================================
      # CLEANUP PHASE: Remove Old Files
      # ========================================
      - name: Cleanup Phase
        execution_groups:
          - execution: sequential
            name: Remove deprecated definition files
            agents:
              - type: cleaner
                inputs:
                  - src/myagents/frontend/agents/test/definitions.yml
                  - src/myagents/frontend/agents/planner/definitions.yml
                  - src/myagents/frontend/agents/cleaner/definitions.yml
                  - src/myagents/frontend/agents/definitions/
                guidance: |
                  Context: Agent-specific definitions.yml files are now replaced by inputs.yml.
                  Shared definitions have been migrated to guidelines/.

                  Instructions:
                  1. For each agent-specific definitions.yml:
                     - Verify all content migrated to inputs.yml
                     - Add deprecation notice OR delete if fully migrated
                  2. For shared definitions/:
                     - Verify content migrated to guidelines/
                     - Keep files that are still referenced
                     - Add deprecation notice to migrated files
                  3. Do NOT delete:
                     - Files still referenced by active code
                     - Files without migration targets
                  4. Create: MIGRATION.md documenting what changed

                  Safety: Use cleaner voting pattern (verify before delete)
                success_criteria:
                  - Deprecated files marked or removed
                  - No broken references
                  - Migration documented

      # ========================================
      # DOCUMENTATION PHASE
      # ========================================
      - name: Documentation Phase
        execution_groups:
          - execution: sequential
            name: Document new inputs architecture
            agents:
              - type: documentation
                inputs:
                  - src/myagents/frontend/agents/templates/inputs.yml
                  - src/myagents/frontend/agents/guidelines/manifest.yml
                  - docs/architecture/architecture.md
                guidance: |
                  Context: Document the new inputs architecture for future reference.

                  Instructions:
                  1. Update docs/architecture/architecture.md with:
                     - New inputs.yml structure
