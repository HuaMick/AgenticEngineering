                  4. Reference appropriate guidelines:
                     - guidelines/testing.yml
                     - guidelines/iteration.yml
                     - guidelines/reward-hacking-prevention.yml
                  5. Migrate content from test/definitions.yml

                  Files to create:
                  - test/inputs.yml
                success_criteria:
                  - inputs.yml created for test agent
                  - Testing strategies documented
                  - Definitions migrated

              # Planner agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/planner/processes/build.yml
                  - src/myagents/frontend/agents/planner/definitions.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                guidance: |
                  Context: Create dedicated inputs.yml for the planner agent type.

                  Instructions:
                  1. Create: src/myagents/frontend/agents/planner/inputs.yml
                  2. Follow template structure from templates/inputs.yml
                  3. Include core inputs planner needs:
                     - Architecture documentation
                     - Existing plans (examples)
                     - Domain knowledge
                  4. Reference appropriate guidelines:
                     - guidelines/testing.yml
                  5. Migrate content from planner/definitions.yml

                  Files to create:
                  - planner/inputs.yml
                success_criteria:
                  - inputs.yml created for planner
                  - Planning patterns documented

              # Cleaner agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/cleaner/processes/identify.yml
                  - src/myagents/frontend/agents/cleaner/processes/execute.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                guidance: |
                  Context: Create dedicated inputs.yml for the cleaner agent type.

                  Instructions:
                  1. Create: src/myagents/frontend/agents/cleaner/inputs.yml
                  2. Follow template structure from templates/inputs.yml
                  3. Include core inputs cleaner needs:
                     - Codebase manifests
                     - Cleaning rules
                     - Voting patterns (3-agent consensus)
                  4. Reference appropriate guidelines:
                     - guidelines/safety.yml
                  5. Document voting loop pattern

                  Files to create:
                  - cleaner/inputs.yml
                success_criteria:
                  - inputs.yml created for cleaner
                  - Voting loop documented

          # Parallel: Create inputs.yml for remaining agent types (batch 2)
          - execution: parallel
            name: Create inputs files for agent types (batch 2)
            agents:
              # Deploy agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/deploy/processes/cicd_maintenance.yml
                  - src/myagents/frontend/agents/deploy/processes/packaging.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                guidance: |
                  Context: Create dedicated inputs.yml for the deploy agent type.

                  Instructions:
                  1. Create: src/myagents/frontend/agents/deploy/inputs.yml
                  2. Include core inputs deploy needs:
                     - CI/CD configuration files
                     - Docker files
                     - Deployment manifests
                  3. Reference appropriate guidelines

                  Files to create:
                  - deploy/inputs.yml
                success_criteria:
