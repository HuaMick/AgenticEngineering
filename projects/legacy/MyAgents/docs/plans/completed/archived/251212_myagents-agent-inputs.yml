# Live Plan: Refactor Agent Inputs Architecture
# Worktree: /home/code/myagents/MyAgents-agent-inputs
# Created: 2025-12-12
# Structure: Multi-agent plan with parallel execution and verification loops

name: Refactor Agent Inputs Architecture
worktree: /home/code/myagents/MyAgents-agent-inputs
branch: agent-inputs
status: completed
completion_date: 2025-12-12
liveplan: /home/code/myagents/docs/plans/live/251212_myagents-agent-inputs.yml
completedplan: /home/code/myagents/docs/plans/completed/251212_myagents-agent-inputs.yml

description: |
  Refactor the agent input and definitions architecture to simplify and standardize
  how agents receive their inputs and guidelines.

  Current state:
  - Definition files exist but mainly list inputs from the definitions folder
  - Process files also contain inputs
  - Agent-specific definition files add redundancy
  - 13 agent types, 28 shared definitions, 65+ YAML process files
  - Inputs are string-based location paths scattered across files

  Target state:
  - Dedicated inputs.yml file for each agent (replaces agent-specific definitions)
  - Process files reference the agent's inputs.yml as an input
  - Process files can add process-specific inputs on top
  - Dedicated guidelines/ folder with reusable guideline files
  - Inputs files reference the specific guidelines needed
  - Standardized input specification format (type, path, description, required)

objectives:
  - Create dedicated inputs files for each agent type (builder, test, audit, cleaner, etc.)
  - Refactor process files to reference agent inputs file + process-specific inputs
  - Remove agent-specific definition files (consolidate into inputs files)
  - Create dedicated guidelines folder with modular guideline files
  - Update inputs files to reference relevant guidelines
  - Ensure backward compatibility during transition

live-plans:
  - id: AGENT-INPUTS-REFACTOR-001
    title: Refactor Agent Inputs Architecture
    description: Standardize agent inputs with dedicated inputs.yml files and modular guidelines

    phases:
      # ========================================
      # EXPLORATION PHASE (Parallel Agents)
      # ========================================
      - name: Exploration Phase
        execution_groups:
          # Parallel exploration: Each agent explores different aspects simultaneously
          - execution: parallel
            name: Parallel exploration of current architecture
            agents:
              # Agent 1: Explore agent definitions
              - type: explore
                inputs:
                  - src/myagents/frontend/agents/manifest_agents.yml
                  - src/myagents/frontend/agents/orchestration/definitions.yml
                  - src/myagents/frontend/agents/test/definitions.yml
                  - src/myagents/frontend/agents/planner/definitions.yml
                  - src/myagents/frontend/agents/cleaner/definitions.yml
                guidance: |
                  Context: We need to understand the current definition files structure before refactoring.

                  Instructions:
                  1. Read manifest_agents.yml to identify all 13 agent types
                  2. For each agent type, find and analyze their definitions.yml file
                  3. Document the structure and content of each definitions file:
                     - What terms/concepts are defined?
                     - What inputs are referenced?
                     - What patterns are used?
                  4. Identify redundancy between agent-specific definitions and shared definitions
                  5. Create a mapping: agent_type -> definition_file -> key_concepts

                  Output: Summary of all agent definitions with redundancy analysis
                success_criteria:
                  - All 13 agent types identified and documented
                  - Each definitions file analyzed for structure
                  - Redundancy patterns identified

              # Agent 2: Explore shared definitions
              - type: explore
                inputs:
                  - src/myagents/frontend/agents/definitions/plan-inputs.yml
                  - src/myagents/frontend/agents/definitions/test_strategies.yml
                  - src/myagents/frontend/agents/definitions/quality_and_safety.yml
                  - src/myagents/frontend/agents/definitions/reward-hacking.yml
                  - src/myagents/frontend/agents/definitions/overengineering.yml
                guidance: |
                  Context: The definitions/ folder contains 28 shared definition files that are reused across agents.

                  Instructions:
                  1. List all 28 files in src/myagents/frontend/agents/definitions/
                  2. Categorize definitions by purpose:
                     - Input specifications (plan-inputs.yml)
                     - Testing patterns (test_strategies.yml, testing-types.yml)
                     - Quality gates (quality_and_safety.yml, reward-hacking.yml)
                     - Process patterns (test-fix-loop.yml, cleaner-voting-loop.yml)
                  3. Identify which definitions are truly shared vs single-use
                  4. Document the format/structure of each definition type
                  5. Create recommendations for organizing into guidelines/ folder

                  Output: Categorized inventory of shared definitions with organization recommendations
                success_criteria:
                  - All 28 definition files catalogued
                  - Categories identified and justified
                  - Clear migration recommendations provided

              # Agent 3: Explore process file input patterns
              - type: explore
                inputs:
                  - src/myagents/frontend/agents/test/processes/test_runner.yml
                  - src/myagents/frontend/agents/test/processes/test_builder.yml
                  - src/myagents/frontend/agents/planner/processes/build.yml
                  - src/myagents/frontend/agents/deploy/processes/cicd_maintenance.yml
                  - src/myagents/frontend/agents/cleaner/processes/identify.yml
                guidance: |
                  Context: Process files currently contain inputs sections with string-based location paths.

                  Instructions:
                  1. Analyze 10+ process files across different agent types
                  2. Document the current input specification patterns:
                     - location: path format
                     - description: usage
                     - required: flag usage
                     - placeholders: {variable} patterns
                  3. Identify common inputs that appear in multiple process files
                  4. Identify process-specific inputs that are unique to each process
                  5. Propose structure for separating agent-level vs process-level inputs

                  Output: Input pattern analysis with separation recommendations
                success_criteria:
                  - Input patterns fully documented
                  - Common vs unique inputs identified
                  - Clear separation strategy proposed

              # Agent 4: Explore orchestration guidelines
              - type: explore
                inputs:
                  - src/myagents/frontend/agents/orchestration/guidelines.yml
                  - src/myagents/frontend/agents/orchestration/core_guidance.yml
                  - src/myagents/frontend/agents/orchestration/execution.yml
                  - src/myagents/frontend/agents/orchestration/planning.yml
                guidance: |
                  Context: Orchestration files contain guidelines that apply to all agents.

                  Instructions:
                  1. Analyze orchestration/ folder structure and contents
                  2. Document the types of guidelines provided:
                     - Universal guidelines (apply to all agents)
                     - Execution guidelines (how to run processes)
                     - Planning guidelines (how to plan work)
                  3. Identify guidelines that could be extracted into reusable guideline files
                  4. Document the current guidance format/structure
                  5. Propose guidelines/ folder organization

                  Output: Guidelines analysis with modularization recommendations
                success_criteria:
                  - All orchestration guidance documented
                  - Reusable guidelines identified
                  - Modular structure proposed

      # ========================================
      # BUILD PHASE 1: Create New Structure (Parallel)
      # ========================================
      - name: Build Phase - Create New Structure
        execution_groups:
          # Parallel: Create new folder structure and templates
          - execution: parallel
            name: Create guidelines folder and templates
            agents:
              # Agent 1: Create guidelines folder structure
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/definitions/
                  - src/myagents/frontend/agents/orchestration/guidelines.yml
                guidance: |
                  Context: Create a new guidelines/ folder with modular, reusable guideline files.

                  Instructions:
                  1. Create folder: src/myagents/frontend/agents/guidelines/
                  2. Create core guideline files:
                     - guidelines/safety.yml - Safety and security guidelines
                     - guidelines/testing.yml - Testing strategies and patterns
                     - guidelines/iteration.yml - Iteration patterns (test-fix loops)
                     - guidelines/reward-hacking-prevention.yml - Anti-gaming guidelines
                     - guidelines/overengineering-prevention.yml - KISS guidelines
                  3. Each guideline file should have:
                     - name: Guideline name
                     - description: Purpose and scope
                     - rules: List of specific rules
                     - examples: Good and bad examples
                  4. Migrate content from definitions/ to appropriate guideline files

                  Files to create:
                  - guidelines/safety.yml
                  - guidelines/testing.yml
                  - guidelines/iteration.yml
                  - guidelines/reward-hacking-prevention.yml
                  - guidelines/overengineering-prevention.yml
                  - guidelines/manifest.yml (index of all guidelines)
                success_criteria:
                  - guidelines/ folder created
                  - All 7 guideline files created
                  - Content migrated from existing definitions

              # Agent 2: Create inputs.yml template
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/definitions/plan-inputs.yml
                  - src/myagents/frontend/agents/planner/examples/plan_live.yml
                guidance: |
                  Context: Create a standardized inputs.yml template that all agent types will use.

                  Instructions:
                  1. Create template file: src/myagents/frontend/agents/templates/inputs.yml
                  2. Define standardized input specification format:
                     ```yaml
                     inputs:
                       agent_type: <agent_name>
                       version: "1.0"

                       core_inputs:  # Always needed by this agent
                         - type: file | directory | pattern
                           path: relative/path/to/file.yml
                           description: Why this input is needed
                           required: true | false

                       guidelines:  # Referenced guidelines from guidelines/
                         - guidelines/safety.yml

                       definitions:  # Agent-specific terminology
                         term_name: definition
                     ```
                  3. Create example inputs.yml showing complete structure
                  4. Add validation rules documentation

                  Files to create:
                  - templates/inputs.yml (template)
                  - templates/inputs-example.yml (filled example)
                success_criteria:
                  - Template created with clear structure
                  - Example file demonstrates usage
                  - Format supports both file and directory inputs

      # ========================================
      # BUILD PHASE 2: Create Agent Inputs Files (Parallel)
      # ========================================
      - name: Build Phase - Agent Inputs Files
        execution_groups:
          # Parallel: Create inputs.yml for each agent type (first batch)
          - execution: parallel
            name: Create inputs files for agent types (batch 1)
            agents:
              # Builder agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/build/process.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                  - src/myagents/frontend/agents/orchestration/guidelines.yml
                guidance: |
                  Context: Create dedicated inputs.yml for the builder agent type.

                  Instructions:
                  1. Create: src/myagents/frontend/agents/build/inputs.yml
                  2. Follow template structure from templates/inputs.yml
                  3. Include core inputs builder needs:
                     - Architecture documentation
                     - Code style guidelines
                     - Testing requirements
                  4. Reference appropriate guidelines:
                     - guidelines/overengineering-prevention.yml
                  5. Migrate relevant content from build/definitions.yml (if exists)

                  Files to create:
                  - build/inputs.yml
                success_criteria:
                  - inputs.yml created for builder
                  - All core inputs documented
                  - Guidelines properly referenced

              # Test agent
              - type: builder
                inputs:
                  - src/myagents/frontend/agents/test/processes/test_runner.yml
                  - src/myagents/frontend/agents/test/processes/test_builder.yml
                  - src/myagents/frontend/agents/test/definitions.yml
                  - src/myagents/frontend/agents/templates/inputs.yml
                guidance: |
                  Context: Create dedicated inputs.yml for the test agent type.

                  Instructions:
                  1. Create: src/myagents/frontend/agents/test/inputs.yml
                  2. Follow template structure from templates/inputs.yml
                  3. Include core inputs test agent needs:
                     - Test manifests
                     - Test strategies
