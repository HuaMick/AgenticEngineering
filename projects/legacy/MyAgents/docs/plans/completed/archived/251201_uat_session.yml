# ==============================================================================
# UAT TESTING SESSION - 2025-12-01
# ==============================================================================
#
# PURPOSE:
#   Execute comprehensive end-to-end UAT testing with 36 user stories from
#   userstories.yml v1.3, build Docker image, trigger CI/CD, and validate
#   production readiness.
#
# WORKFLOW:
#   Phase 1: Docker Image Build (pre-requisite for UAT)
#   Phase 2: UAT Testing (36 user stories, agent-blind-test strategy)
#   Phase 3: CI/CD Trigger (manual Cloud Build trigger)
#   Phase 4: Validation and merge readiness check
#
# ==============================================================================

worktree: /home/code/myagents/MyAgents-staging
liveplan: /home/code/myagents/docs/plans/live/251201_uat_session.yml
completedplan: /home/code/myagents/docs/plans/completed/251201_uat_session.yml

live-plans:
  - id: UAT-V1_3-RERUN-001
    title: Comprehensive UAT v1.3 Re-run with CI/CD Validation
    description: |
      Execute full end-to-end UAT testing for all 36 user stories from userstories.yml v1.3.
      Validate Docker build process, trigger Cloud Build CI/CD pipeline, and confirm
      production readiness for merge to main.

    phases:
      # ========================================
      # PHASE 1: DOCKER IMAGE BUILD
      # Pre-requisite for UAT testing
      # ========================================
      - name: Docker Image Build Phase
        execution_groups:
          - execution: sequential
            name: Build shared Docker test image
            agents:
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-staging/Dockerfile.test
                  - /home/code/myagents/MyAgents-staging/pyproject.toml
                  - /home/code/myagents/MyAgents-staging/scripts/install-global.sh
                guidance: |
                  Context: UAT testing requires a pre-built Docker image (myagents-test) that all
                  user simulator agents will reuse. This prevents race conditions from parallel
                  agents trying to build images simultaneously.

                  Instructions:
                  1. Verify Dockerfile.test exists and is correct:
                     - File location: /home/code/myagents/MyAgents-staging/Dockerfile.test
                     - Verify it creates runtime/ and config/ directories (self-contained)
                     - Verify it includes Agent-GCPtoolkit dependency handling

                  2. Build Docker image with correct build arguments:
                     - Image name: myagents-test
                     - Build context: /home/code/myagents (parent directory)
                     - Build command:
                       cd /home/code/myagents && \
                       docker build \
                         -f MyAgents-staging/Dockerfile.test \
                         --build-arg WORKTREE_NAME=MyAgents-staging \
                         -t myagents-test .
                     - Why parent context: Includes both MyAgents-staging/ and Agent-GCPtoolkit/

                  3. Verify Docker image build success:
                     - Check image exists: docker images myagents-test
                     - Verify image hash is recorded for reference
                     - Test basic functionality: docker run --rm myagents-test myagents --version

                  4. Install latest CLI locally for local testing:
                     - Run: /home/code/myagents/MyAgents-staging/scripts/install-global.sh
                     - Verify installation: which myagents && myagents --version
                     - Ensure version matches pyproject.toml

                  Files to reference:
                  - Dockerfile.test: Docker build configuration
                  - pyproject.toml: Source version to verify against
                  - scripts/install-global.sh: Local installation script

                  Why this matters: Pre-built Docker image and installed CLI are prerequisites
                  for UAT testing. All 36 user simulator agents will reuse this shared image,
                  preventing duplicate builds and race conditions.
                success_criteria:
                  - Docker image myagents-test built successfully
                  - Image hash recorded for reference
                  - Basic myagents --version command works in container
                  - Local CLI installed and version matches pyproject.toml
                  - Environment ready for UAT testing (both local and Docker)

      # ========================================
      # PHASE 2: UAT TESTING
      # 36 user stories, agent-blind-test strategy
      # ========================================
      - name: UAT Testing Phase
        execution_groups:
          - execution: parallel
            name: Comprehensive UAT testing - 36 user stories
            agents:
              # Spawn 36 user simulator agents (one per user story)
              # Each agent tests specified layers (local, docker, cloud_build)
              - type: test
                count: 36
                inputs:
                  # Test process
                  - /home/code/myagents/MyAgents-staging/src/myagents/frontend/agents/test/processes/user_simulator.yml

                  # Documentation for agent-blind testing
                  - /home/code/myagents/MyAgents-staging/docs/README.md
                  - /home/code/myagents/MyAgents-staging/docs/SETUP.md
                  - /home/code/myagents/MyAgents-staging/docs/architecture/architecture.md

                  # User story metadata
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/00_metadata.yml

                  # User story files (14 files, 36 stories total)
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/01_installation.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/02_cli_basics.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/03_setup.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/04_cli_context.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/05_chat.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/06_studio.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/07_preferences.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/08_config.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/09_secrets.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/10_maintenance.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/11_development.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/12_advanced.yml
                  - /home/code/myagents/MyAgents-staging/docs/testing/userstories/13_infrastructure.yml
                guidance: |
                  Test Strategy: agent-blind-test (documentation-only, no code inspection)
                  Test Process: Execute user_simulator.yml from frontend/agents/test/processes/
                  Reporting: Update live plan at /home/code/myagents/docs/plans/live/251201_uat_session.yml

                  USER STORY DISTRIBUTION (36 agents, one per user story):

                  Orchestration Agent Responsibilities:
                  1. Read all 14 user story YAML files from docs/testing/userstories/
                  2. Extract each user story definition (36 total)
                  3. Spawn one user simulator agent per user story (36 agents total)
                  4. Pass user story definition to each agent in the prompt
                  5. Agents test specified layers from user story metadata

                  Agent Assignment (One agent per user story ID):

                  Installation Category (3 stories):
                  - Agent 1: US-INSTALL-001 (Developer Installation from Monorepo using uv)
                  - Agent 2: US-INSTALL-002 (CLI from Non-Project Directory After Install)
                  - Agent 3: US-INSTALL-003 (Developer Workflow Isolation)

                  CLI Basics Category (1 story):
                  - Agent 4: US-CLI-001 (CLI Help Discovery)

                  CLI Context Category (1 story):
                  - Agent 5: US-CLI-CONTEXT-001 (CLI Context Behavior - Project vs Global)

                  Setup Category (3 stories):
                  - Agent 6: US-SETUP-001 (Fresh User First-Time Setup)
                  - Agent 7: US-SETUP-002 (User Encountering Errors and Recovering)
                  - Agent 8: US-SETUP-003 (User with Partial Setup)

                  Chat Category (1 story):
                  - Agent 9: US-CHAT-002 (Selecting Specific Agent for Chat)

                  Studio Category (6 stories):
                  - Agent 10: US-STUDIO-001 (Starting LangGraph Studio)
                  - Agent 11: US-STUDIO-002 (Starting Studio with Custom Port)
                  - Agent 12: US-STUDIO-003 (Checking Studio Status)
                  - Agent 13: US-STUDIO-004 (Stopping Studio Gracefully)
                  - Agent 14: US-STUDIO-005 (Force Stopping Studio)
                  - Agent 15: US-STUDIO-006 (Restarting Studio)

                  Preferences Category (5 stories):
                  - Agent 16: US-PREFS-001 (Setting Preferences)
                  - Agent 17: US-PREFS-002 (Getting Preferences)
                  - Agent 18: US-PREFS-003 (Listing All Preferences)
                  - Agent 19: US-PREFS-004 (Deleting Preferences)
                  - Agent 20: US-PREFS-005 (Setting Studio Port Preference)

                  Config Category (4 stories):
                  - Agent 21: US-CONFIG-001 (Initializing Config)
                  - Agent 22: US-CONFIG-002 (Setting Config Path)
                  - Agent 23: US-CONFIG-003 (Showing Config)
                  - Agent 24: US-CONFIG-004 (Clearing Config)

                  Secrets Category (3 stories):
                  - Agent 25: US-SECRETS-001 (Retrieving Secret from GCP)
                  - Agent 26: US-SECRETS-002 (Retrieving Secret with Project ID)
                  - Agent 27: US-SECRETS-003 (Quiet Mode Secret Retrieval)

                  Maintenance Category (2 stories):
                  - Agent 28: US-MAINT-001 (Updating myagents CLI)
                  - Agent 29: US-MAINT-002 (Rebuilding myagents CLI)

                  Development Category (5 stories):
                  - Agent 30: US-DEV-001 (Fresh Developer Setup)
                  - Agent 31: US-DEV-002 (CI/CD Pipeline Execution)
                  - Agent 32: US-DEV-003 (Test Execution Modes)
                  - Agent 33: US-DEV-004 (Docker Development Workflow)
                  - Agent 34: US-DEV-005 (Testmon Selective Testing)

                  Advanced Category (1 story):
                  - Agent 35: US-MULTI-001 (Multi-Project User)

                  Infrastructure Category (1 story):
                  - Agent 36: US-INFRA-001 (Cloud Build Environment Parity Testing)

                  Three-Layer Testing Approach:
                  Each agent tests layers specified in user story metadata:

                  Layer 1: Local Environment Testing (if local: true)
                  - Direct execution on host machine (installed CLI)
                  - Purpose: Validate developer workflow and rapid iteration
                  - What it catches: Python logic errors, API contract issues, local configuration

                  Layer 2: Local Docker Testing (if docker: true)
                  - Docker build + container execution on local machine
                  - Purpose: Validate Dockerfile correctness and containerized behavior
                  - Uses shared pre-built image: myagents-test
                  - What it catches: Dockerfile issues, container runtime problems, dependency packaging
                  - Parity: Matches Cloud Build exactly (runtime/ and config/ created by Dockerfile)

                  Layer 3: Cloud Build Testing (if cloud_build: true)
                  - Full Cloud Build execution in GCP (infrastructure stories only)
                  - Purpose: Validate production deployment pipeline
                  - What it catches: Cloud Build-specific issues, workspace structure problems
                  - Note: Cannot be fully simulated locally due to workspace restructuring

                  Shared Docker Image Usage:
                  - All agents reuse pre-built myagents-test image from Phase 1
                  - Command template: docker run --rm myagents-test <command>
                  - No agent should rebuild the image (already built in Phase 1)

                  Failure Reporting Format:
                  Add failures to live plan under UAT-V1_3-RERUN-001.uat_failures with structure:
                  - user_story_id: US-XXX-XXX
                  - step: Which step in journey failed
                  - failure_type: "documentation_gap", "unexpected_error", "unclear_instructions", "command_failure"
                  - description: What went wrong
                  - expected: What user expected based on docs
                  - actual: What actually happened
                  - user_impact: How this affects the user persona
                  - recommendation: What should be fixed
                  - tested_environments: ["local", "docker", "cloud_build"] (list all tested layers)

                  Agent-Blind-Test Requirements:
                  - Agents read ONLY documentation (README.md, SETUP.md, architecture.md)
                  - Agents DO NOT inspect source code or tests
                  - Agents simulate real users following documentation exactly
                  - Agents report documentation gaps, unclear instructions, unexpected errors
                  - Agents follow user story journey steps precisely as written

                  Why this matters: Agent-blind testing validates documentation accuracy and
                  user experience from a real user perspective, catching gaps that code-based
                  testing misses.
                success_criteria:
                  - All 36 user stories tested (one agent per story)
                  - Each story tested in specified layers (local, docker, cloud_build per metadata)
                  - All CRITICAL priority stories pass (4 stories)
                  - All HIGH priority stories pass (13 stories)
                  - Pass rate >= 95% for MEDIUM priority stories (16 stories)
                  - All failures documented in structured format
                  - Documentation gaps identified and reported
                  - Zero blocking issues remain unresolved

      # ========================================
      # PHASE 3: CI/CD TRIGGER
      # Manual Cloud Build trigger for production validation
      # ========================================
      - name: CI/CD Trigger Phase
        execution_groups:
          - execution: sequential
            name: Trigger Cloud Build and monitor execution
            agents:
              - type: deploy
                inputs:
                  - /home/code/myagents/MyAgents-staging/cloudbuild.yaml
                  - /home/code/myagents/MyAgents-staging/.github/workflows/cloudbuild.yml
                  - /home/code/myagents/MyAgents-staging/docs/CICD_README.md
                guidance: |
                  Context: After UAT testing passes, trigger Cloud Build CI/CD pipeline to
                  validate production deployment readiness. This ensures the staging branch
                  is ready for merge to main.

                  Instructions:
                  1. Verify UAT results before triggering:
                     - Check live plan for UAT test results
                     - Ensure CRITICAL and HIGH priority stories all pass
                     - Review any failures and determine if they block CI/CD
                     - If blocking failures exist, do not proceed with CI/CD trigger

                  2. Trigger Cloud Build manually:
                     - Method: Push to staging branch or create draft PR to main
                     - Branch: myagents-staging
                     - Build config: cloudbuild.yaml
                     - Monitor build in GCP Console
                     - Record build ID for reference

                  3. Monitor Cloud Build execution:
                     - Step 0.5: Prepare Workspace (runtime/ creation)
                     - Step 1: Build Docker (Dockerfile.test)
                     - Step 2-9: Run test packages (8 packages)
                     - Step 10: Linting (ruff, mypy)
                     - Step 11: Upload artifacts (coverage, testmon)
                     - Watch for any failures in test packages

                  4. Analyze Cloud Build results:
                     - Overall status: SUCCESS or FAILURE
                     - Test packages: All 8 must pass
                     - Linting: Must pass (ruff, mypy)
                     - Testmon optimization: Should show selective test execution
                     - Duration: Compare to previous builds
                     - Artifacts: Verify uploaded to GCS

                  5. Document Cloud Build results in live plan:
                     - Build ID and status
                     - Test package results (all 8)
                     - Testmon savings percentage
                     - Any failures or issues encountered
                     - Build duration and comparison to previous

                  Files to reference:
                  - cloudbuild.yaml: Cloud Build configuration
                  - docs/CICD_README.md: Cloud Build documentation
                  - .github/workflows/cloudbuild.yml: GitHub Actions integration (if exists)

                  Why this matters: Cloud Build validates production deployment pipeline,
                  catching environment-specific issues that local/Docker testing may miss
                  (workspace restructuring, GCP integration, artifact uploads).
                success_criteria:
                  - Cloud Build triggered successfully
                  - Build ID recorded in live plan
                  - All 8 test packages pass
                  - Linting passes (ruff, mypy)
                  - Artifacts uploaded to GCS
                  - Build status: SUCCESS
                  - No blocking issues discovered

      # ========================================
      # PHASE 4: VALIDATION AND MERGE READINESS
      # Final validation and production readiness assessment
      # ========================================
      - name: Validation and Merge Readiness Phase
        execution_groups:
          - execution: sequential
            name: Assess production readiness and prepare for merge
            agents:
              - type: test
                inputs:
                  - /home/code/myagents/docs/plans/live/251201_uat_session.yml
                  - /home/code/myagents/MyAgents-staging/UAT_V1.3_FINAL_SUMMARY.md
                  - /home/code/myagents/MyAgents-staging/RETEST_REPORT.md
                  - /home/code/myagents/MyAgents-staging/uat_results.yml
                guidance: |
                  Context: UAT testing and Cloud Build have completed. Perform final validation
                  to assess production readiness and determine if staging is ready to merge to main.

                  Instructions:
                  1. Review UAT test results:
                     - Read live plan UAT_failures section (if exists)
                     - Check pass rate by priority (CRITICAL, HIGH, MEDIUM, LOW)
                     - Review pass rate by category (13 categories)
                     - Identify any blocking or major issues
                     - Review documentation gaps reported

                  2. Review Cloud Build results:
                     - Verify all test packages passed
                     - Verify linting passed
                     - Check for any warnings or issues
                     - Verify artifacts uploaded successfully
                     - Compare to previous builds for regressions

                  3. Assess production readiness:
                     - CRITICAL priority: Must be 100% pass rate (4 stories)
                     - HIGH priority: Must be 100% pass rate (13 stories)
                     - MEDIUM priority: Must be >= 95% pass rate (16 stories)
                     - LOW priority: Must be >= 90% pass rate (3 stories)
                     - Cloud Build: Must be SUCCESS
                     - Zero blocking issues remaining

                  4. Generate production readiness report:
                     - Overall grade (A+, A, B, C, D, F)
                     - Pass rate statistics by priority and category
                     - Key findings and highlights
                     - Issues summary (blocking, major, minor)
                     - Recommendations for next steps
                     - Merge readiness: READY / NOT_READY

                  5. Update live plan with final assessment:
                     - Add production_readiness section
                     - Document overall grade and status
                     - List validation checklist items
                     - Record recommendations for merge or fixes

                  6. Prepare merge artifacts (if READY):
                     - UAT executive summary
                     - Cloud Build validation report
                     - Production readiness checklist
                     - Merge commit message template
                     - PR description template

                  Files to reference:
                  - UAT_V1.3_FINAL_SUMMARY.md: Previous UAT summary
                  - RETEST_REPORT.md: Previous retest results
                  - uat_results.yml: Structured test results
                  - live plan: Current session results

                  Why this matters: Final validation ensures staging branch meets all quality
                  criteria before merge to main, preventing production issues and maintaining
                  high code quality standards.
                success_criteria:
                  - Production readiness assessment completed
                  - Overall grade calculated and documented
                  - Merge readiness determination made (READY or NOT_READY)
                  - All validation checklist items reviewed
                  - Recommendations documented for next steps
                  - If READY: Merge artifacts prepared
                  - If NOT_READY: Clear action items for fixes

