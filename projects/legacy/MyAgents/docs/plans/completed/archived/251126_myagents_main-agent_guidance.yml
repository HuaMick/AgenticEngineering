                  CONSENSUS RULES (Maker-inspired first-to-ahead-by-k):
                  - 3/3 agreement: AUTO-APPROVED for significant changes
                  - 2/3 agreement: ESCALATE to user with majority recommendation
                  - 1/3 or 0/3: REJECTED - do not surface to user

                  RED-FLAG FILTERING:
                  - Discard any response with excessive length (>500 lines changes)
                  - Discard any response with incorrect formatting (non-YAML)
                  - Discard any response with scope creep (changes outside assigned files)
                  - Resample if all responses red-flagged

