                guidance: |
                  Review orchestration agent guidance for:
                  1. PATH CORRECTNESS: Verify all input paths exist and are file-level (not directory)
                  2. SCHEMA COMPLIANCE: Follow process/goal/inputs/outputs/steps/guidelines structure
                  3. GUIDANCE SPECIFICITY: Is guidance actionable or too vague?
                  4. SUCCESS CRITERIA: Are criteria measurable and outcome-focused?
                  5. MAKER ALIGNMENT: Does it leverage voting/consensus patterns effectively?

