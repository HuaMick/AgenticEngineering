# Backlog: MyAgentsFrontend - Non-MVP Features
# Created: 2025-12-03
# Purpose: Track future/optional features for Flutter frontend

backlog_items:
  - id: B1-UI-POLISH
    title: UI Polish & Theming
    description: |
      Dark/light theme support, responsive layouts for various screen sizes,
      loading states, error messages, connection status indicators.
    priority: medium
    depends_on: [MVP terminal, pairing features]
    estimated_effort: 2-3 days

  - id: B2-IOS-PLATFORM
    title: Mobile Platform Support (iOS)
    description: |
      Add iOS platform to Flutter project, test on simulator,
      handle microphone permissions, App Store prep.
    priority: medium
    depends_on: [Web MVP complete]
    estimated_effort: 1-2 days

  - id: B3-ANDROID-PLATFORM
    title: Mobile Platform Support (Android)
    description: |
      Add Android platform to Flutter project, test on emulator,
      handle microphone permissions, Play Store prep.
    priority: medium
    depends_on: [Web MVP complete]
    estimated_effort: 1-2 days

  - id: B4-CONVERSATION-TTS
    title: Conversation Mode (TTS)
    description: |
      Two-way voice conversation with Claude. Detect Claude response completion,
      extract response text, send to TTS API (OpenAI TTS or ElevenLabs),
      play audio. Flow: User speaks → Deepgram → Claude → TTS → audio
    priority: low
    depends_on: [Voice feature, Terminal feature]
    estimated_effort: 2-3 days

  - id: B5-OFFLINE-SUPPORT
    title: Offline Support & Reconnection
    description: |
      Connection retry logic, offline state handling, message queuing,
      automatic reconnection with session recovery.
    priority: low
    depends_on: [Core networking]
    estimated_effort: 2-3 days

notes: |
  These items are deferred to focus on web MVP first.
  Mobile platforms will use the same codebase - just need platform setup.
  Conversation mode is optional enhancement after basic voice works.
