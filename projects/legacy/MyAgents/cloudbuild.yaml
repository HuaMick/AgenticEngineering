steps:
  # ==============================================================================
  # 0. Setup & Secrets
  # ==============================================================================
  # Fetch the GCP Service Account Key from Secret Manager.
  # This key is required by the test containers for authentication (Agent-GCPtoolkit).
  # We save it to /workspace/service-account.json to be mounted later.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Fetching Service Account Key..."
        gcloud secrets versions access latest --secret=gcp-service-account-key --project=$PROJECT_ID > /workspace/service-account.json
        
        echo "Ensuring coverage artifacts bucket exists..."
        # Attempt to create the bucket, ignore failure if it already exists
        gcloud storage buckets create gs://$PROJECT_ID-coverage --project=$PROJECT_ID || true
    id: 'fetch-sa-key'

  # ==============================================================================
  # 0.5 Prepare Workspace
  # ==============================================================================
  # Rearrange the workspace to match Dockerfile.test expectations.
  # We need 'MyAgents' (this repo) and 'Agent-GCPtoolkit' (cloned) side-by-side.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['GH_TOKEN']
    args:
      - '-c'
      - |
        echo "Cloning Agent-GCPtoolkit..."
        git clone https://x-access-token:$$GH_TOKEN@github.com/HuaMick/Agent-GCPtoolkit.git Agent-GCPtoolkit

        echo "Restructuring workspace..."
        # Create destination directory
        mkdir MyAgents_tmp

        # Move everything that isn't the new dirs or the SA key
        # We use find to include hidden files (.git, etc) but exclude our specific dirs
        find . -maxdepth 1 -mindepth 1 \
          ! -name 'MyAgents_tmp' \
          ! -name 'service-account.json' \
          -exec mv {} MyAgents_tmp/ \;
        
        mv MyAgents_tmp MyAgents
        
        echo "Workspace contents:"
        ls -la
        echo "Debugging workspace structure:"
        find . -maxdepth 4 -not -path '*/.*'
    id: 'prepare-workspace'
    waitFor: ['fetch-sa-key']

  # ==============================================================================
  # 1. Build
  # ==============================================================================
  # Build the test image using the Dockerfile.test in MyAgents directory.
  # We use the repo root as context so that the Dockerfile can access all necessary files.
  # Caching is enabled by pulling the latest image first (if available).
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Listing context root (MyAgents):"
        ls -la MyAgents
        echo "Listing MyAgents/config:"
        ls -la MyAgents/config || echo "config not found"
        
        docker pull gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest || true
        docker build \
          -t gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest \
          -t gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA \
          --cache-from gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest \
          --build-arg WORKTREE_NAME=${_WORKTREE_NAME} \
          -f MyAgents/MyAgents/Dockerfile.test \
          MyAgents
    id: 'build-image'
    waitFor: ['prepare-workspace']

  # Push the image to the registry so it's available for caching in future builds
  # and ensures we are running the exact built image.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest']
    id: 'push-image'
    waitFor: ['build-image']

  # ==============================================================================
  # 2. Linting
  # ==============================================================================
  # Run linting before heavy tests.
  # We run the container using the docker builder to avoid /workspace overwrites.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - 'cd /workspace/${_WORKTREE_NAME} && uv run ruff check . && uv run mypy .'
    id: 'lint'
    waitFor: ['build-image']

  # ==============================================================================
  # 3. Parallel Tests
  # ==============================================================================
  # Each step runs a specific subset of tests corresponding to the services in docker-compose.test.yml.
  # We inject secrets and mount the service account key.
  # Results are written to a volume mapped to /workspace/test_results.

  # Test Package 1: CLI Unification
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--name=test-cli'
      - '-v'
      - '/workspace/service-account.json:/root/service-account.json:ro'
      - '-v'
      - '/workspace/test_results:/test/results'
      - '-e'
      - 'GEMINI_API_KEY'
      - '-e'
      - 'LANGSMITH_API_KEY'
      - '-e'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json'
      - '--memory=512m'
      - '--cpus=1.0'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - |
        cd /workspace/${_WORKTREE_NAME} && \
        if [ "${_TEST_SCOPE}" = "unit" ]; then \
          echo "Running UNIT tests only..." && \
          uv run pytest -m unit tests/workflows/cli_unification/ \
          --junitxml=/test/results/cli_unification.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_cli_unification.xml \
          -v; \
        else \
          echo "Running FULL test suite..." && \
          uv run pytest tests/workflows/cli_unification/ \
          --junitxml=/test/results/cli_unification.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_cli_unification.xml \
          -v; \
        fi
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'test-cli'
    waitFor: ['lint']

  # Test Package 2: Coding Agent
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--name=test-coding'
      - '-v'
      - '/workspace/service-account.json:/root/service-account.json:ro'
      - '-v'
      - '/workspace/test_results:/test/results'
      - '-e'
      - 'GEMINI_API_KEY'
      - '-e'
      - 'LANGSMITH_API_KEY'
      - '-e'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json'
      - '--memory=512m'
      - '--cpus=1.0'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - |
        cd /workspace/${_WORKTREE_NAME} && \
        if [ "${_TEST_SCOPE}" = "unit" ]; then \
          echo "Running UNIT tests only..." && \
          uv run pytest -m unit tests/workflows/coding_agent/ \
          --junitxml=/test/results/coding_agent.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_coding_agent.xml \
          -v; \
        else \
          echo "Running FULL test suite..." && \
          uv run pytest tests/workflows/coding_agent/ \
          --junitxml=/test/results/coding_agent.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_coding_agent.xml \
          -v; \
        fi
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'test-coding'
    waitFor: ['lint']

  # Test Package 3: Echo Agent
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--name=test-echo'
      - '-v'
      - '/workspace/service-account.json:/root/service-account.json:ro'
      - '-v'
      - '/workspace/test_results:/test/results'
      - '-e'
      - 'GEMINI_API_KEY'
      - '-e'
      - 'LANGSMITH_API_KEY'
      - '-e'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json'
      - '--memory=512m'
      - '--cpus=1.0'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - |
        cd /workspace/${_WORKTREE_NAME} && \
        if [ "${_TEST_SCOPE}" = "unit" ]; then \
          echo "Running UNIT tests only..." && \
          uv run pytest -m unit tests/workflows/echo_agent/ \
          --junitxml=/test/results/echo_agent.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_echo_agent.xml \
          -v; \
        else \
          echo "Running FULL test suite..." && \
          uv run pytest tests/workflows/echo_agent/ \
          --junitxml=/test/results/echo_agent.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_echo_agent.xml \
          -v; \
        fi
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'test-echo'
    waitFor: ['lint']

  # Test Package 4: Infrastructure Workflow
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--name=test-infra'
      - '-v'
      - '/workspace/service-account.json:/root/service-account.json:ro'
      - '-v'
      - '/workspace/test_results:/test/results'
      - '-e'
      - 'GEMINI_API_KEY'
      - '-e'
      - 'LANGSMITH_API_KEY'
      - '-e'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json'
      - '--memory=512m'
      - '--cpus=1.0'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - |
        cd /workspace/${_WORKTREE_NAME} && \
        if [ "${_TEST_SCOPE}" = "unit" ]; then \
          echo "Running UNIT tests only..." && \
          uv run pytest -m unit tests/workflows/infrastructure/ \
          --junitxml=/test/results/infrastructure_workflow.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_infrastructure.xml \
          -v; \
        else \
          echo "Running FULL test suite..." && \
          uv run pytest tests/workflows/infrastructure/ \
          --junitxml=/test/results/infrastructure_workflow.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_infrastructure.xml \
          -v; \
        fi
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'test-infra'
    waitFor: ['lint']

  # Test Package 5: Packaging
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--name=test-pkg'
      - '-v'
      - '/workspace/service-account.json:/root/service-account.json:ro'
      - '-v'
      - '/workspace/test_results:/test/results'
      - '-e'
      - 'GEMINI_API_KEY'
      - '-e'
      - 'LANGSMITH_API_KEY'
      - '-e'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json'
      - '--memory=512m'
      - '--cpus=1.0'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - |
        cd /workspace/${_WORKTREE_NAME} && \
        if [ "${_TEST_SCOPE}" = "unit" ]; then \
          echo "Running UNIT tests only..." && \
          uv run pytest -m unit tests/workflows/packaging/ \
          --junitxml=/test/results/packaging.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_packaging.xml \
          -v; \
        else \
          echo "Running FULL test suite..." && \
          uv run pytest tests/workflows/packaging/ \
          --junitxml=/test/results/packaging.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_packaging.xml \
          -v; \
        fi
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'test-pkg'
    waitFor: ['lint']

  # Test Package 6: Integration File Operations
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - '--name=test-int-files'
      - '-v'
      - '/workspace/service-account.json:/root/service-account.json:ro'
      - '-v'
      - '/workspace/test_results:/test/results'
      - '-e'
      - 'GEMINI_API_KEY'
      - '-e'
      - 'LANGSMITH_API_KEY'
      - '-e'
      - 'GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json'
      - '--memory=512m'
      - '--cpus=1.0'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
      - 'bash'
      - '-c'
      - |
        cd /workspace/${_WORKTREE_NAME} && \
        if [ "${_TEST_SCOPE}" = "unit" ]; then \
          echo "Running UNIT tests only..." && \
          uv run pytest -m unit tests/integration/file_operations/ \
          --junitxml=/test/results/integration_file_ops.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_integration_file_ops.xml \
          -v; \
        else \
          echo "Running FULL test suite..." && \
          uv run pytest tests/integration/file_operations/ \
          --junitxml=/test/results/integration_file_ops.xml \
          --cov=backend --cov=frontend --cov=myagents \
          --cov-report=xml:/test/results/coverage_integration_file_ops.xml \
          -v; \
        fi
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'test-int-files'
    waitFor: ['lint']

substitutions:
  _WORKTREE_NAME: 'MyAgents'
  _IMAGE_NAME: 'myagents-test'
  # Use to potentially limit scope in future (all|fast|none)
  _TEST_SCOPE: 'all'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/LANGSMITH_API_KEY/versions/latest
      env: 'LANGSMITH_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/MyAgents-github-oauthtoken-efe903/versions/latest
      env: 'GH_TOKEN'
  # The Service Account Key is accessed via gcloud command in step 0.
  # Ensure a secret named 'gcp-service-account-key' exists in Secret Manager.

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

artifacts:
  objects:
    location: 'gs://$PROJECT_ID-coverage/$BUILD_ID'
    paths: ['/workspace/test_results/*.xml']

