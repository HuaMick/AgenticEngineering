# Agent Inputs Template
# This template defines the standard structure for agent-level inputs
# Each agent type should have an inputs.yml following this format
#
# PURPOSE:
# Input specifications define the files, directories, and context that agents need
# to complete their work. The orchestration agent uses inputs to construct context
# for target agents.
#
# VALIDATION RULES:
# 1. All paths must be relative to the worktree root (no absolute paths in template)
# 2. Required inputs must exist before agent execution
# 3. Optional inputs (required: false) may be missing
# 4. File-level inputs are preferred over directory-level inputs when files are known
# 5. Patterns should be used for groups of related files with unknown exact names
# 6. Descriptions must explain WHY the input is needed, not just WHAT it is
# 7. Core inputs should be minimal - only what's truly needed for this agent type
# 8. Guidelines should reference actual guideline files that exist
# 9. Agent type must match the folder name containing this inputs.yml
# 10. Version should follow semantic versioning (major.minor)
#
# INPUT TYPE RULES:
# - type: file
#   Use when: Specific file path is known and needed
#   Example: src/workflows/agent_chat.py
#
# - type: directory
#   Use when: Agent needs to explore/work within entire directory
#   Example: tests/workflows/agent_chat/
#   Avoid when: Specific files within directory are known (use file type instead)
#
# - type: pattern
#   Use when: Need to find related files matching a pattern
#   Example: tests/**/*_test.py
#   Use glob syntax for patterns
#
# DESCRIPTION RULES:
# Good: "Workflow to modify" (explains purpose)
# Bad: "Python workflow file" (just describes what it is)
# Good: "Test directory for validation" (explains why needed)
# Bad: "Directory containing tests" (just describes structure)
#
# REQUIRED FLAG RULES:
# - required: true (default)
#   Agent cannot proceed without this input
#   Missing input should cause validation error before agent starts
#
# - required: false
#   Input is optional, agent can work without it
#   Use for: contextual files, optional references, nice-to-have docs

inputs:
  agent_type: "<agent_name>"  # e.g., "test", "planner", "builder"
  version: "1.0"

  # Core inputs that this agent type always needs
  # These define the essential context required for this agent to function
  # Keep this list minimal - only include what's truly necessary
  core_inputs:
    - type: file  # file | directory | pattern
      path: "relative/path/to/file.yml"
      description: "Why this input is needed"
      required: true  # true | false

    - type: directory
      path: "relative/path/to/folder/"
      description: "Why this directory is needed"
      required: true

    - type: pattern
      path: "relative/path/**/*.py"
      description: "Why these files matching pattern are needed"
      required: false

  # Guidelines this agent should follow (from assets/guidelines/ folder)
  # Reference existing guideline files that provide standards and best practices
  # Orchestration agent may include these in context for target agent
  guidelines:
    - path: "assets/guidelines/testing.yml"
      description: "Testing behavioral guidelines"

    - path: "assets/guidelines/safety.yml"
      description: "Safety guidelines"

  # Agent-specific terminology and definitions
  # Define key terms and concepts specific to this agent type
  # These help clarify the agent's role and responsibilities
  definitions:
    term_name: |
      Definition of this term specific to this agent type.
      Can be multi-line for detailed explanations.
      Should clarify concepts unique to this agent's domain.

    another_term: |
      Another definition providing context for this agent's work.
