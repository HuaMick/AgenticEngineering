# Overengineering Prevention Examples
# Examples of overengineering patterns and how to avoid them

overengineering_examples:
  example_1:
    name: "Premature abstraction"
    description: "Creating abstraction before pattern is clear"
    bad: |
      # Code used in one place
      class AbstractDataProcessorFactory:
        def create_processor(self, type):
          # Complex factory for single use case
    issue: "Abstraction adds complexity without multiple use cases"
    good: |
      # Simple function for single use case
      def process_data(data):
        # Direct implementation
    lesson: "Wait for pattern to emerge before abstracting"

  example_2:
    name: "Merging incompatible responsibilities"
    description: "Combining builder and validator to simplify plan"
    bad: |
      Agent: BuildAndValidate
      Responsibilities:
        - Build feature
        - Validate feature
        - Report success
    issue: "Conflict of interest - builder incentivized to declare success"
    good: |
      Agent 1: Builder
      Responsibilities: Build feature

      Agent 2: Validator
      Responsibilities: Validate feature independently
    lesson: "Keep conflicting incentives separate"

  example_3:
    name: "Infrastructure exceeding requirements"
    description: "Building for scale before scale exists"
    bad: |
      # Current: 10 users
      # Build: Distributed system with caching, load balancing, sharding
    issue: "Massive complexity for tiny scale"
    good: |
      # Current: 10 users
      # Build: Simple monolith with database
      # Scale: When actually needed
    lesson: "Build for current requirements, scale when needed"

  example_4:
    name: "Hypothetical future needs"
    description: "Adding features for uncertain future use"
    bad: |
      # Add plugin system because "we might need it someday"
      # Add theming because "someone might want custom themes"
      # Add multi-tenancy because "we might have multiple customers"
    issue: "Complexity for unconfirmed needs"
    good: |
      # Build what's needed today
      # Add extensibility when actual need arises
    lesson: "YAGNI - You Aren't Gonna Need It"

  example_5:
    name: "Clever over clear"
    description: "Optimizing for elegance over readability"
    bad: |
      # One-liner that requires mental parsing
      result = [x for sublist in [[y**2 for y in range(z)] for z in data] for x in sublist]
    issue: "Clever but hard to understand"
    good: |
      # Multiple clear steps
      result = []
      for z in data:
        for y in range(z):
          result.append(y**2)
    lesson: "Optimize for reader, not writer"

examples:
  good:
    - description: "Starting simple, adding complexity when needed"
      example: |
        V1: Simple script that works for current scale
        Scale increases 10x
        V2: Add caching because performance now matters
        Scale increases 100x
        V3: Add distributed system because required
        Result: Complexity added only when justified

    - description: "Cleaner identifying overengineering"
      example: |
        Cleaner 1: Votes "overengineered" - unused abstraction layer
        Cleaner 2: Votes "overengineered" - same finding
        Cleaner 3: Votes "overengineered" - confirms
        Action: Remove abstraction layer (consensus reached)
        Result: Codebase simplified, easier to understand

    - description: "Keeping responsibilities distinct"
      example: |
        Temptation: Merge builder and validator to reduce agents
        Decision: Keep separate for separation of concerns
        Result: Clear responsibilities, no conflicts of interest

  bad:
    - description: "Building for hypothetical future"
      example: |
        Current: 5 users
        Built: Plugin system, theming, multi-tenancy
        Reality: Never needed, adds complexity, slows development
        Result: Wasted effort on unused features

    - description: "Premature abstraction"
      example: |
        Use case: Process one data type
        Built: Abstract factory with multiple processor types
        Reality: Only one processor ever used
        Result: Unnecessary complexity

    - description: "Merging incompatible responsibilities"
      example: |
        Agent: BuildTestValidate
        Problem: Conflict of interest, agent declares own success
        Result: False positives, tests don't catch real issues

