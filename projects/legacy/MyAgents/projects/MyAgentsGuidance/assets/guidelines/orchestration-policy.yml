guideline:
  name: "Orchestration Policy"
  description: |
    Defines agent-task alignment verification, escalation policies, plan status management,
    and success criteria communication patterns for orchestration workflows.

    This guideline ensures orchestrators correctly validate agent capabilities before spawning,
    handle issues by delegating to appropriate agents, and communicate outcomes consistently.

  inputs:
    - location: "docs/agent-role-scope-matrix.md"
      description: "Matrix defining each agent's scope and capabilities"
    - location: "assets/definitions/plans.yml"
      description: "Plan status values and completion patterns (TWO-LEVEL, COPY-NOT-MOVE)"

  rules:
    - rule: "Agent-Task Alignment Verification"
      description: |
        Before spawning any agent, verify the agent's documented scope covers the specific task.
      justification: |
        Spawning an agent for a task outside its scope leads to poor results, wasted tokens,
        and potential errors. The agent-role-scope-matrix.md is the authoritative source.
      execution_pattern:
        - "Identify the agent specified in the plan for a given task"
        - "Consult docs/agent-role-scope-matrix.md for that agent's scope"
        - "Compare: Does the documented scope cover this specific task?"
        - "If match → Proceed with spawn"
        - "If mismatch → FENCE: Do NOT spawn, trigger escalation policy"
      characteristics:
        - "Matrix check is MANDATORY before every agent spawn"
        - "Scope mismatches must halt execution, not proceed with wrong agent"
        - "Document mismatch details when triggering escalation"

    - rule: "Escalation Policy"
      description: |
        Always offload work to appropriate agents rather than doing it yourself.
      justification: |
        Orchestrators are managers, not doers. Doing work directly creates bottlenecks,
        context overload, and bypasses specialized agent capabilities.
      execution_pattern:
        - "Identify the issue category (test failure, documentation gap, scope mismatch, etc.)"
        - "Match to appropriate agent type based on issue"
        - "Spawn agent with clear context and expected outcome"
        - "If no appropriate agent exists → Ask user for guidance"
      characteristics:
        - "Bugs and investigations → Delegate to diagnostics or build agents"
        - "Specialized work → Delegate to agents with domain expertise"
        - "Scope mismatches (detected per Agent-Task Alignment Verification rule) → Update plan and re-plan with correct agent"
        - "Unknown issues → Investigate to determine agent type, then delegate"

    - rule: "Plan Status Management"
      description: |
        Update plan status and summary counts as work progresses.
      justification: |
        Accurate status tracking enables progress visibility, identifies blockers early,
        and ensures completion patterns are followed correctly.
      execution_pattern:
        - "Update task status immediately when starting (pending → in_progress)"
        - "Update task status immediately when completing (in_progress → completed)"
        - "Update phase status when all phase tasks complete"
        - "Apply TWO-LEVEL COMPLETION per assets/definitions/plans.yml"
        - "Apply COPY-NOT-MOVE for folder completion (preserve live/ for follow-on work)"
      characteristics:
        - "Status values: planning, active, partially_completed, fully_completed"
        - "Item completion: Task moves through pending → in_progress → completed"
        - "Folder completion: COPY to completed/, keep in live/"
        - "Never move to archived/ (user-only operation)"

    - rule: "Success Criteria Communication"
      description: |
        Pass success criteria as bullet points to spawned agents. Receive only success/failure reports.
      justification: |
        Clear, structured criteria enable agents to self-verify. Minimal reporting reduces noise
        and allows orchestrators to focus on exceptions.
      execution_pattern:
        - "Extract acceptance criteria from plan task definition"
        - "Format as clear bullet points in agent spawn prompt"
        - "Expect: Success/failure status from agent"
        - "Only request details on failure"
      characteristics:
        - "Bullet point format preferred for acceptance criteria"
        - "Agents report success/failure, not verbose logs"
        - "Details only on failure: what failed, why, suggested fix"
        - "Orchestrator logs failures in plan for tracking"

  examples:
    good:
      - description: "Agent-task alignment check before spawning"
        example: |
          # Plan specifies teacher-update-assets for updating agents/foo/inputs.yml
          # Step 1: Check agent-role-scope-matrix.md
          #   - teacher-update-assets scope: "shared assets in assets/ folder"
          # Step 2: Compare task location
          #   - Task location: agents/foo/inputs.yml (NOT in assets/)
          # Step 3: Mismatch detected
          # Action: Do NOT spawn teacher-update-assets
          # Escalation: Update plan to use teacher-update-guidance instead

      - description: "Escalation policy - offloading to appropriate agent"
        example: |
          # Issue: Test failing in auth module
          # Wrong: Orchestrator attempts to fix test directly
          # Right: Spawn build agent with context
          spawn:
            agent_type: "build"
            context: "Fix failing test in auth module: test_login_timeout"
            acceptance_criteria:
              - "test_login_timeout passes"
              - "No regression in other auth tests"

      - description: "Success criteria as bullet points"
        example: |
          spawn:
            agent_type: "teacher"
            task: "Update inputs.yml to include new guideline"
            acceptance_criteria:
              - "orchestration-policy.yml added to inputs list"
              - "Entry has location and description fields"
              - "File remains valid YAML syntax"

    bad:
      - description: "Skipping agent-task alignment check"
        example: |
          # Plan says spawn teacher-update-assets
          # Wrong: Immediately spawn without checking scope
          spawn:
            agent_type: "teacher-update-assets"
            task: "Update agents/foo/inputs.yml"
          # This will fail - agent scope doesn't cover agents/ folder

      - description: "Orchestrator doing work instead of delegating"
        example: |
          # Wrong: Orchestrator directly editing files
          edit:
            file: "src/auth.py"
            fix: "Add timeout handling"
          # Right: Spawn build agent to handle the fix

  related_guidelines:
    - location: "assets/guidelines/validation-strategy.yml"
      description: "Defines when to use bash vs agent delegation for validation"
    - location: "assets/definitions/plans.yml"
      description: "Plan status values and completion patterns referenced by this guideline"
