# Folder Structure Definition
# Defines the standard folder structure for plans, logs, and documentation
# Used by planner agents to understand where files are located

path_conventions:
  repo_content:
    standard: "relative"
    description: |
      Use relative paths from repo root for all repo content (assets/, agents/, processes/).
      Examples:
        - 'assets/definitions/path.yml' (CORRECT)
        - 'agents/orchestration/process.mmd' (CORRECT)
        - '/home/code/myagents/MyAgents/assets/definitions/path.yml' (INCORRECT)
    rationale: "Relative paths are portable across environments and worktrees"

  cross_worktree_references:
    standard: "absolute"
    description: |
      Use absolute paths ONLY for cross-worktree references (docs/plans/live/<worktree>/).
      Examples:
        - '/home/code/myagents/docs/plans/live/251221MAG_guidance-refinement-v1/' (CORRECT)
      Absolute paths are required here because plan folders exist outside repo boundaries.
    rationale: "Plan folders are environment-specific and exist at known absolute paths"

folders:
  - path: "/home/code/myagents/docs/plans/live/YYMMDDRepo_Branch/"
    description: |
      Each worktree has a live plan folder following the convention:
      - YYMMDD: Date of creation
      - Repo: First letters of repo name caps (e.g., MA, RA, MAF)
      - Branch: Branch name using underscores (e.g., _main, _staging, _cloud_deploy)
      Example: 251122MA_main, 251211MA_custom_agents.
      The folder MUST contain at least these subfolders:
        - live/: Active phase files (multiple .yml files, one per phase)
        - completed/: Completed plan items (plan_completed.yml)
      Additional folders (e.g., analysis/, audit-results/, design-specs/) should be created as needed
      to house agent artifacts and prevent pollution of the project root.
      These living documents store current state, outstanding items, and context needed to deliver the items.

  - path: "/home/code/myagents/docs/plans/completed/YYMMDDRepo_Branch/"
    description: |
      Completed plan folders follow the same naming convention as live plan folders.
      Each worktree has a corresponding completed folder that mirrors its live folder name.

      LIFECYCLE PATTERN - COPY NOT MOVE:
      When a phase completes, agents COPY (not move) the phase file from live/ to completed/.
      The live folder continues to exist and receive updates from follow-on work.
      Both folders coexist with the same name:
        - /docs/plans/live/251221MAG_guidance-refinement-v1/
        - /docs/plans/completed/251221MAG_guidance-refinement-v1/

      SUBFOLDER STRUCTURE:
      Each completed folder MUST contain:
        - live/: Completed phase files copied from the live folder (e.g., phase_1.yml, phase_2.yml)
        - completed/: Summary of all completed work (plan_completed.yml)
        - analysis/: Optional analysis artifacts generated during execution
        - README.md: Summary of the worktree's purpose and completed work

      LIFECYCLE WORKFLOW:
      1. Initial completion: Agent copies phase file from live/YYMMDDRepo_Branch/live/ to completed/YYMMDDRepo_Branch/live/
      2. Follow-on work: When new phases complete on the same worktree, agent copies additional phase files
      3. Both folders coexist: Live folder tracks ongoing work, completed folder tracks historical snapshots

      Completed plans should be minimized to essential information.
      Implementation details should be moved to README or be discoverable from the codebase.

  - path: "/home/code/myagents/docs/plans/completed/archived/"
    description: |
      USER-MANAGED historical archive for plans older than 6 months.

      AGENT FENCE - NEVER TOUCH:
      Agents must NEVER move, copy, modify, or interact with files in this directory.
      This is a user-managed archive for long-term storage.
      Only human users may manage the contents of archived/.

  - path: "/home/code/myagents/docs/plans/backlog/backlog_*.yml"
    description: |
      Backlog plans organized by worktree/category.
      Files include backlog_cicd.yml, backlog_core.yml, backlog_maintenance.yml, backlog_testing.yml.
      Living files to track backlog plans organized by worktree.



  - path: "/home/code/myagents/docs/plans/YYYYMMDD_*"
    description: |
      Any planning or next steps documentation.

  - path: "/home/code/myagents/docs/agent_logs/YYYYMMDD_<agent_name>"
    description: |
      Agent decision logs.
      Logs should be single line per a decision or action taken by the agent.
