example: |
  An example is a concrete, project-specific illustration that demonstrates how to apply a guideline or
  definition, or what "good" vs "bad" looks like in practice.

  Use an example when:
  - You need to show a pattern, format, or artifact shape (e.g., a plan file, a report, a checklist)
  - A rule is easy to misapply without seeing a concrete instance
  - The content is intentionally project-specific (paths, repo conventions, incident learnings)

  Examples should:
  - Be realistic and copyable (show what to do, not just describe it)
  - Include short "use cases" (when to reference this example)
  - Prefer pairing with links to the relevant definitions/guidelines rather than re-explaining concepts
  - Stay concise; demonstrate, don’t lecture


