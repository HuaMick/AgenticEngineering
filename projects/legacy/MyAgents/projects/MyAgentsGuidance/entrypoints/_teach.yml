process:
  goal: "Execute a teaching plan (agent guidance updates) by switching into an orchestration-context-engineer profile."

  inputs:
    - location: "agents/orchestration/orchestration-guidance/inputs.yml"
      description: "Required context and guidelines for orchestration."
    - location: "agents/orchestration/orchestration-guidance/process.mmd"
      description: "Mermaid diagram defining the context engineering (teach) process loop."

  steps:
    - |
      **Step 1: Context Verification & Setup**
      Switch profile to **Orchestration-Context-Engineer**.
      Load `agents/orchestration/orchestration-guidance/process.mmd`.
      Check for a live plan folder in `docs/plans/live/`. 
      If no live plan exists for the current task, spawn `deploy-worktree` first to scaffold the environment.
    - |
      **Step 2: Recursive Planning Loop**
      Spawn `planner-teach` to build the guidance refinement plan in `plan_live_teach.yml`.
      Spawn `planner-reviewer` to audit the plan. 
      Iterate until approved per the planning loop in `orchestration-guidance/process.mmd`.
    - |
      **Step 3: Execution (Teaching)**
      Spawn `teacher` agents to implement the approved changes in `plan_live_teach.yml`.
      Monitor for execution issues. If issues arise, return to Step 2 to update the plan.
    - |
      **Step 4: Guidance Testing**
      Spawn `planner-test-guidance` to create a test plan for the new/updated guidance.
      Spawn `test-guidance-simulator` to execute the test plan and verify guidance effectiveness.
      If tests fail (gaps found), return to Step 2 to refine guidance.
    - |
      **Step 5: Final Audit**
      Spawn `test-final-output` to perform an independent audit of the final guidance changes and test results.
      If the audit fails, return to Step 2.
    - |
      **Step 6: Finalization**
      Upon successful audit, copy completed plan folder to `docs/plans/completed/YYMMDDRepo_Branch/` while keeping it in `live/` for potential follow-on work.
      FENCE: Never move folders to archived/ subdirectory.

  guidelines:
    - "Strict NO CODE policy - this process is for context engineering (guidance) only."
    - "All iterative loops and agent spawns must strictly adhere to the control flow in `orchestration-guidance/process.mmd`."
    - "Fail-fast: Any execution issue or audit failure MUST trigger a return to the planning stage."
