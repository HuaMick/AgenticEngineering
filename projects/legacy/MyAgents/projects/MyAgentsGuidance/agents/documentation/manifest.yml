# Documentation Agent Family Manifest
# Hub manifest for documentation agent category

category:
  definition: "assets/definitions/agent-categories.yml#documentation"
  purpose: "Maintain minimal, accurate documentation"
  responsibility: "Update docs to match code, remove redundant docs, fill documentation gaps"
  boundaries: "Documentation agents document; they do not change code behavior"

sub_agents:
  - documentation-core

routing:
  description: "Currently routes all documentation tasks to documentation-core"
  default_agent: "documentation-core"

  rules:
    - condition: "Documentation request"
      agent: "documentation-core"
      reason: "Single sub-agent handles all documentation tasks"

structure:
  expandable: true
  notes: |
    Currently minimal with only one sub-agent (documentation-core).
    May expand in future with specialized documentation agents such as:
    - API documentation specialists
    - Tutorial/guide generators
    - Documentation validators
    Manifest structured for easy expansion when needed.
