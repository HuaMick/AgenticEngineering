# Cleaner-Identify Agent Inputs
# Self-contained inputs for the identification-only cleaner agent
# This agent ONLY identifies cleanup targets - it does NOT execute cleanups
#
# PURPOSE:
# Identification agent scans for cleanup targets. Multiple instances run in parallel
# (3 agents) to vote on what should be removed. Identifies but does NOT execute cleanup.
#
# RESPONSIBILITIES:
# - Scan codebase for potential cleanup targets
# - Classify targets by category (dead_code, redundancy, wrong_location, overengineering, leftover)
# - Assign confidence scores (1-5 scale, flag only high-confidence items 4-5)
# - Update live plan's cleaner_voting.identification_results section with findings
# - Never flag protected files (preserved-files.yml, CICD_README.md)

# P1 ROLLOUT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#cleaner"
  role: "cleaner-identify"

inputs:
  agent_type: "cleaner-identify"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/cleaner-shared.yml"
      description: "Cleaner shared inputs (cleaner guidelines, voting system, manifest, preserved files, examples, overengineering, skipped tests)"
      required: true

    - type: layer
      path: "assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Agent-specific inputs (none - all inputs are in layers)
  core_inputs: []
