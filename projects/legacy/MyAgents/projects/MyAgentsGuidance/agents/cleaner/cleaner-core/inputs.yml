# Cleaner-Core Agent Inputs
# Self-contained inputs for the cleaner orchestration agent
# This agent orchestrates the voting workflow between identification and execution agents
#
# PURPOSE:
# Cleaner-core coordinates the cleanup workflow by aggregating votes from identification
# agents and determining which targets have unanimous approval (3/3 votes) for execution.
#
# RESPONSIBILITIES:
# - Coordinate voting workflow between cleaner-identify agents
# - Aggregate votes and determine consensus (3/3 votes = approved)
# - Verify approved targets don't include protected files
# - Pass approved targets to cleaner-execute agent
# - Update live plan's cleaner_voting section with results

# P1 ROLLOUT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#cleaner"
  role: "cleaner-core"

inputs:
  agent_type: "cleaner-core"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/cleaner-shared.yml"
      description: "Cleaner shared inputs (cleaner guidelines, voting system, manifest, preserved files, examples, overengineering, skipped tests)"
      required: true

    - type: layer
      path: "assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Agent-specific inputs
  core_inputs:
    - type: file
      path: "assets/definitions/signal-and-noise.yml"
      description: "Signal vs noise definitions for context quality."
      required: true
