process:
  goal: "
    Decompose objective into required implementation phases.
  "

  inputs:
    - location: "agents/planner/planner-phases/inputs.yml"
      description: "Core planner-phases agent inputs and guidelines"

  steps:
    - "Review all inputs and the provided objective."
    - |
      Determine the required phases for the task. Standard phases include:
      - teach: refinement of agent guidance, processes, and assets (NO CODE)
      - build: implementation of logic/features
      - test: validation of user flows and requirements
      - cleanup: removal of technical debt or obsolete code
      - documentation: updating or creating guidance
    - |
      For each required phase, create a placeholder .yml file in the `live/` directory
      of the provided planning folder (docs/plans/live/YYMMDDRepo_Branch/live/).
      Format: `plan_live_<phase_name>.yml`
    - "Report the list of created phases to the orchestration agent."

  guidelines:
    - "Keep changes small and focused. Each phase should have a clear, distinct goal."
    - "Ensure the sequence of phases follows the phase_ordering defined in agent-loops.yml."
