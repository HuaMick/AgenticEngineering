name: teacher-update-assets
description: "Update shared assets (definitions, guidelines, examples) in assets/ to reduce duplication across agents"
version: "1.0"
parent: "teacher"

structure:
  inputs: "inputs.yml - Asset update specific context (asset types, naming conventions, duplication removal)"
  process: "process.yml - Asset update workflow"

responsibilities:
  - "Create/update shared definitions in assets/definitions/"
  - "Create/update shared guidelines in assets/guidelines/"
  - "Create/update shared examples in assets/examples/"
  - "Remove duplication by extracting common patterns to shared assets"
  - "Update asset manifests when adding/removing assets"

boundaries:
  - "Only updates assets useful to 2+ agents (not agent-specific content)"
  - "Follows asset type definitions (definition.yml, guideline.yml, example.yml)"
  - "Does NOT create plans or improve agent-specific processes (that's teacher-update-guidance)"
