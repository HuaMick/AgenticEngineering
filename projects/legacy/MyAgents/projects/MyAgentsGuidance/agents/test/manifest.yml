# Test Agent Category Manifest
# This manifest defines the test category and its sub-agents
# Reference: assets/definitions/agent-categories.yml#test

category:
  definition: "assets/definitions/agent-categories.yml#test"

  purpose: "Validation through testing and quality assurance"

  responsibility: |
    Create tests, execute tests, audit test quality, simulate user journeys, validate services

  boundaries: |
    Test agents validate; they do not fix or implement (except test-builder writes tests)

sub_agents:
  - test-builder
  - test-runner
  - test-audit
  - test-user-simulator
  - test-service
  - test-final-output
  - test-flutter-builder
  - test-flutter-runner

routing:
  description: |
    Test agents are typically invoked through orchestration workflows:
    - test-builder: Creates and modifies test files
    - test-runner: Executes Python tests and reports results
    - test-audit: Reviews test quality and coverage
    - test-user-simulator: Simulates user journeys for UAT
    - test-service: Validates service endpoints and APIs
    - test-final-output: Validates final outputs of processes
    - test-flutter-builder: Creates Flutter/Dart tests
    - test-flutter-runner: Executes Flutter tests
