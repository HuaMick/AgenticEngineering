# Test Builder Agent Inputs Specification
# This file defines the inputs that test-builder agents need to CREATE and MODIFY tests
# Test builders do NOT execute tests - that is the responsibility of test-runner agents
# Following context-minimization principle: only include what's needed for test creation

# PILOT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#test"
  role: "test-builder"

inputs:
  agent_type: "test-builder"
  version: "2.0-pilot"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

    - type: layer
      path: "assets/inputs/test-shared.yml"
      description: "Test category shared inputs (acceptable-skips, reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

  # Agent-specific inputs (only what's unique to test-builder)
  core_inputs:
    # Project architecture - understanding what to test
    - type: file
      path: "docs/architecture/workflows.md"
      description: "Workflow documentation for understanding system flows and integration points to test"
      required: false

    # Test organization and structure - where to put tests
    - type: file
      path: "assets/definitions/workflow-test-readme.yml"
      description: "Workflow test documentation patterns - README guidance for test packages"
      required: true

    # Testing strategies specific to test-builder
    - type: file
      path: "assets/definitions/strategy-user-simulation.yml"
      description: "User simulation testing strategy"
      required: true

    - type: file
      path: "assets/definitions/strategy-test-suite.yml"
      description: "Test suite execution strategy"
      required: true

    # Test examples and patterns - how to write good tests
    - type: directory
      path: "assets/examples/test/"
      description: "Test pattern examples: tests that should NOT be skipped, setup requirements, good vs bad test patterns"
      required: true

    # Test documentation for reference
    - type: file
      path: "docs/testing/README.md"
      description: "Testing documentation quick reference - understanding the testing ecosystem"
      required: false

    # Workflow-specific test guidance (when available)
    - type: pattern
      path: "tests/workflows/*/README.md"
      description: "Workflow-specific testing guidance and patterns (when available for specific workflows)"
      required: false

    # Live plan for test-fix-loop context
    - type: pattern
      path: "docs/plans/live/*/"
      description: "Live plan folders for reading assigned test failures to fix during test-fix-loop iterations (folder-based structure)"
      required: false

  # Guidelines that test-builder agents should follow
  guidelines:
    - path: "assets/guidelines/testing.yml"
      description: "Testing behavioral guidelines for creating appropriate tests"

    - path: "assets/definitions/strategy-user-simulation.yml"
      description: "User simulation testing strategy for creating appropriate tests"

    - path: "assets/definitions/strategy-test-suite.yml"
      description: "Test suite execution strategy and patterns"

    - path: "assets/guidelines/reward-hacking-prevention.yml"
      description: "Prevent creating tests that appear to pass but don't actually validate behavior"

    - path: "assets/guidelines/iteration.yml"
      description: "Iteration patterns for test-fix-loop when updating tests based on audit feedback"

    - path: "assets/guidelines/less-is-more.yml"
      description: "Minimal viable change - create only the tests needed, avoid over-testing"

  # Test builder specific terminology and concepts
  # Note: Core definitions moved to shared asset files for context minimization
  # - test_builder_role: assets/definitions/test-builder-role.yml
  # - test_creation_principles: assets/definitions/test-creation-principles.yml
  # - test_fix_loop_context: assets/guidelines/iteration.yml (iteration_patterns.test_fix_loop and audit_test_fix_loop)
  definitions:
    component_test: |
      Test that validates specific component functionality in isolation.
      Examples: unit tests, integration tests for single components.

      Organization:
      - Located in tests/workflows/<workflow_name>/
      - One package per workflow structure
      - Self-contained with own fixtures and helpers

      Purpose: Validate component behavior and integration points

    smoke_test: |
      Early validation of entrypoints and basic functionality during active development.
      Used in entry point testing strategy with test-fix-loop for fast iteration.

      Characteristics:
      - Tests entrypoints work (imports, basic execution)
      - Validates minimal component set
      - Fast feedback for development
      - Minimal assertions, focused on "does it run"

    integration_test: |
      Tests that validate components work together correctly.
      More comprehensive than smoke tests, less than full e2e tests.

      Focus:
      - Component interactions
      - Data flow between components
      - Integration points validation
      - Real dependencies, not mocks (where practical)

    workflow_test: |
      Tests organized by workflow under tests/workflows/<workflow_name>/.
      Each workflow has its own test package containing workflow-specific tests.

      Structure:
      - CLI/infrastructure workflows: descriptive names (health_check, studio)
      - Agent workflows: agent_ prefix (agent_chat, agent_shell_operations)
      - Cross-workflow: tests/workflows/e2e/

# PILOT NOTES:
# - Reduced from ~160 lines to ~140 lines (20 line reduction)
# - 4 layers provide: plans, domains, workflows, entrypoints, ARCHITECTURE.md,
#   fix-source, context-min, experiment-first, less-is-more, worktree-branching,
#   testing, response-audit, safety, agent-role-scope-matrix, plan-inputs,
#   folder-structure, iteration, acceptable-skips, reward-hacking, test-builder-role,
#   test-creation-principles, test-structure, testing-types
# - Only agent-specific inputs remain inline (8 unique files)
# - Layers enable easy updates to shared inputs across all test agents
