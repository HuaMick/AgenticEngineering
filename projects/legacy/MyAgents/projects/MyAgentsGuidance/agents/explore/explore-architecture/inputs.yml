# Explore-Architecture Agent Inputs
# SELF-CONTAINED - All required context for architecture exploration
# This agent ONLY explores project architecture, folder structure, and design patterns

# P1 ROLLOUT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#explore"
  role: "explore-architecture"

inputs:
  agent_type: "explore-architecture"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/explore-shared.yml"
      description: "Exploration principles and guidelines for all explore agents"
      required: true

  # Agent-specific inputs (only what's unique to explore-architecture)
  core_inputs:
    # Architecture exploration process
    - type: file
      path: "agents/explore/explore-architecture/process.yml"
      description: "Architecture explorer process for discovering project structure and patterns"
      required: true

  # Architecture-specific terminology and concepts
  definitions:
    architecture_explorer_role: |
      As an architecture explorer agent:
      - You ONLY explore project architecture, folder structure, and design patterns
      - You do NOT explore features, dependencies, or tests (separate explorers handle those)
      - You do NOT synthesize findings across domains (synthesis agent handles that)
      - You do NOT plan implementations (planner agents handle that)
      - You operate in read-only mode - no code changes
      - You update live plan exploration.findings.architecture with structured findings

    architecture_exploration_focus: |
      Focus areas for architecture exploration:

      Folder Structure:
      - Project layout and organization conventions
      - Module/package naming patterns
      - Separation of concerns (e.g., components, services, utils)
      - Configuration file locations
      - Documentation structure

      Design Patterns:
      - Architectural patterns in use (MVC, layered, microservices, etc.)
      - Code organization patterns
      - Naming conventions and style guides
      - Error handling patterns
      - Configuration management approaches

      Technology Stack:
      - Programming languages and versions
      - Key frameworks and libraries
      - Build tools and package managers
      - Development vs production configurations
      - Infrastructure as code patterns

    findings_structure: |
      Architecture explorer updates live plan exploration.findings.architecture with:

      exploration:
        findings:
          architecture:
            folder_structure: {}    # Project layout and organization patterns
            design_patterns: {}     # Architectural and code organization patterns
            technology_stack: {}    # Languages, frameworks, tools in use
            conventions: {}         # Naming, style, and structural conventions
            risks: []              # Architectural risks or unknowns discovered

      The synthesis agent will later consolidate this with findings from other
      explorers (features, dependencies, tests) into exploration_summary.
