folders:

  - path: "<worktree>/pubspec.yaml"
    description: |
      Flutter/Dart dependency management file.
      Run `flutter pub get` after modifying.

  - path: "<worktree>/lib/"
    description: |
      Main source directory for Flutter application code.

  - path: "<worktree>/lib/core/"
    description: |
      Shared core functionality used across the application.
      Organized by feature domain (crypto/, networking/, etc.).

  - path: "<worktree>/lib/features/"
    description: |
      Feature modules organized by user-facing functionality.
      Each feature is self-contained.

  - path: "<worktree>/lib/widgets/"
    description: |
      Shared widgets used across multiple features.

  - path: "<worktree>/test/"
    description: |
      Test directory mirroring lib/ structure.
      Test files named *_test.dart.

  - path: "<worktree>/test/mocks/"
    description: |
      Mock implementations for testing.
