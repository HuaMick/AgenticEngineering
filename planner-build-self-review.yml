agent: planner-build
category: planner
clarity_score: 3
completeness_score: 3
consistency_score: 2

issues:
  - severity: critical
    description: |
      Inconsistent placeholder names for plan folder identification across files.
      manifest.yml uses "{plan_folder}" while process.yml uses both "{plan_id}"
      and "{plan_folder_name}". This ambiguity breaks path resolution for agents
      generating outputs and will cause path mismatches.
    location: |
      manifest.yml: lines 28, 33 (uses "{plan_folder}")
      process.yml: lines 25, 35 (uses "{plan_id}"), lines 59-61 (references "plan_folder_name"), line 177 (uses "{plan_folder_name}")
    impact: "Critical - Agents cannot reliably construct output paths"

  - severity: high
    description: |
      Ambiguous input specification for INPUTS SECTION (lines 89-110 in process.yml).
      Guidance says "Include files that provide essential context" but does not clearly
      specify whether these should be paths relative to target_project_path or repository
      root. Given PATH RESOLUTION SEMANTICS in inputs.yml (lines 2-10), this needs
      explicit clarification.
    location: "process.yml: lines 89-110 (INPUTS SECTION guidance)"
    impact: "High - Agents may reference non-existent files or include wrong files"

  - severity: high
    description: |
      Incomplete step definitions for planner-build core responsibility.
      The guidance references "planner-test" for CI/CD validation phases (line 21,
      line 362) but does NOT clarify what planner-build should do if a build plan
      identifies test infrastructure changes. Should planner-build coordinate with
      planner-test inputs, or handle this as an error condition? This is unspecified.
    location: |
      manifest.yml: line 21
      process.yml: lines 362-363
    impact: "High - Undefined coordination path between planner-build and planner-test"

  - severity: high
    description: |
      MMD generation step 3 (lines 169-200) lacks definition of how to determine
      AGENT_ROUTING when a phase could use multiple agent types. Example:
      "Domain_Build -> builder" - but which builder? build-python or build-flutter?
      Process specifies valid_agent_types (lines 293-299) but no selection algorithm.
    location: "process.yml: lines 169-200, 293-299"
    impact: "High - Unclear how to assign specific agent implementations from agent type categories"

  - severity: high
    description: |
      Referenced file inconsistency: inputs.yml (line 115) references "test_phase.mmd"
      in MMD COMPONENT EXAMPLES section, but directory listing shows actual filename
      is "test_phase.mmd" (verified in components/ folder). However, the inputs.yml
      description mentions "test_phase.mmd" without verifying this file exists in
      examples during recent file sync. Additionally, "uat_phase.mmd" exists in
      components folder but is NOT referenced in inputs.yml at all (missing from
      core_inputs list).
    location: "inputs.yml: lines 109-122 (MMD COMPONENT EXAMPLES section)"
    impact: "Medium-High - Missing component references; unclear if all needed examples are included"

  - severity: medium
    description: |
      Inconsistent output location placeholders between manifest and process files.
      manifest.yml uses "{plan_folder}/live/" while process.yml uses both
      "{plan_id}/live/" and "{plan_folder_name}/". The nested "live/" subfolder
      requirement is clear, but the placeholder naming must be unified.
    location: |
      manifest.yml: lines 28, 33
      process.yml: lines 25, 35
    impact: "Medium - Path template inconsistency across documentation"

  - severity: medium
    description: |
      Process step (lines 89-110) specifies that task INPUTS are "CRITICAL - Required
      for each task" but manifest.yml does not include this requirement in
      architecture_checklist (lines 12-18). The checklist covers worktree, absolute
      paths, architecture patterns, service boundaries, and test structure, but NOT
      the per-task inputs requirement. This creates expectation mismatch between
      what process.yml requires and what manifest.yml validates.
    location: |
      manifest.yml: lines 12-18 (architecture_checklist)
      process.yml: lines 89-110 (INPUTS SECTION requirement)
    impact: "Medium - Architecture checklist doesn't validate a critical requirement"

  - severity: medium
    description: |
      Planner-reviewer guidance (lines 354-363) states "File-level inputs are preferred
      for parallel execution determination, but directory-level guidance is also valid."
      However, the INPUTS SECTION guidance (line 97) says "Prefer file-level paths over
      directories". These contradict each other. Which is actually preferred?
    location: |
      process.yml: line 97 vs. lines 354-363
    impact: "Medium - Conflicting guidance on input granularity"

  - severity: medium
    description: |
      Success criteria guidance (lines 111-115) requires "user-focused validation" with
      examples of what users expect, but no guidance on HOW to validate these in a plan
      that will be executed by agents (not humans). This creates ambiguity about what
      "entrypoint execution" means in the context of automated agent execution vs.
      human manual testing.
    location: "process.yml: lines 111-115 (Success criteria section)"
    impact: "Medium - Unclear how to operationalize user-focused success criteria"

  - severity: medium
    description: |
      Manifest outputs location specification is incomplete. The "location" field
      (lines 28, 33) shows "docs/plans/live/{plan_folder}/live/" but does not clarify
      what {plan_folder} format is expected. Inputs.yml requires "YYMMDDRepo_Branch"
      format (line 35), but this is not stated in manifest.yml.
    location: "manifest.yml: lines 28, 33"
    impact: "Medium - Output location format not fully specified in manifest"

  - severity: low
    description: |
      Process.yml line 5 notes that "Loop definitions (test-fix-loop, audit-test-fix-loop)
      are accessed via inputs.yml -> planner-shared.yml -> iteration.yml -> agent-loops.yml"
      but this transitive loading chain is extremely indirect. Agents must trace through
      4+ files to understand loop definitions. Clearer direct reference would improve usability.
    location: "process.yml: lines 5-6, 140-142"
    impact: "Low - Indirect reference chain but documented"

  - severity: low
    description: |
      Guideline comment (line 351) lists 7 guideline files: less-is-more.yml, iteration.yml,
      fix-the-source.yml, experiment-first.yml, context-minimisation.yml, worktree-and-branching.yml,
      response-audit.yml. However, the inputs.yml (lines 54-56) specifies planner-core-guidelines.yml
      which presumably includes these. The relationship between the guideline comment list and
      the actual input layer is not explained.
    location: |
      process.yml: line 351
      inputs.yml: lines 54-56
    impact: "Low - Relationship between direct file references and input layers unclear"

  - severity: low
    description: |
      Example path in process.yml (line 348) shows "250110Repo_feature-x" format
      (YYMMDD prefix) but could be unclear if this means Jan 10, 2025 (day 10, month 01)
      or Jan 2025 (year prefix). Standard YYMMDD should be clear, but examples elsewhere
      in code use different date formats. Not critical but could cause inconsistency.
    location: "process.yml: line 348"
    impact: "Low - Date format should use standard YYMMDD consistently"

recommendations:
  - |
    CRITICAL: Standardize placeholder names across all guidance files.
    Decision: Use "{plan_folder_name}" consistently since this matches the required_inputs
    specification (inputs.yml line 31-35) where the input is explicitly named "plan_folder_name".
    Action: Update manifest.yml lines 28, 33 to use {plan_folder_name} instead of {plan_folder}.
    Also update process.yml line 177 to reference plan_folder_name in context of input naming.

  - |
    CRITICAL: Define explicit path resolution rules for task-level inputs.
    Action: Add new section in process.yml inputs guidance (after line 110) that states:
    "Path resolution for task inputs: Files must be specified as paths relative to
    target_project_path (project root), matching the same semantic used for docs/plans/
    locations. Repository root files (e.g., pyproject.toml) should use leading paths
    from the project root (e.g., 'pyproject.toml' for files at root). Examples:
    'src/api/routes.py' (relative to project), 'pyproject.toml' (at project root)."

  - |
    HIGH: Define coordination protocol between planner-build and planner-test.
    Action: Add new guideline section after line 80 in process.yml that states:
    "If build plan identifies test infrastructure changes (new test directories,
    modified test framework configuration, etc.), planner-build MUST flag these
    for planner-test coordination. Mechanism: Include 'test_infrastructure_changes'
    section in plan_live_build.yml root with specific changes, and planner-test
    will read and incorporate into test planning. See planner-test/process.yml
    for coordination details."

  - |
    HIGH: Define agent type assignment algorithm for MMD generation.
    Action: Expand section "STEP 3: CREATE MMD HEADER COMMENTS" (lines 169-200)
    with algorithm:
    "When a phase could use multiple agent implementations (e.g., builder could be
    build-python or build-flutter), choose the specific implementation based on:
    1. If task specifies target_language or target_framework, use corresponding builder
    2. Otherwise, default to builder type and let orchestration executor select (mark as 'builder')
    3. For phases with mixed implementations, use builder type and specify in SUCCESS CRITERIA
    which implementation is expected."

  - |
    HIGH: Add uat_phase.mmd to inputs.yml core_inputs section.
    Action: Add new entry in inputs.yml after line 121:
    "- type: file
      path: 'modules/AgenticGuidance/assets/examples/planner/components/uat_phase.mmd'
      description: 'REUSABLE PATTERN: UAT phase with user acceptance validation, entrypoint testing'
      required: false"

  - |
    HIGH: Unify file-level vs directory-level input guidance.
    Action: Update process.yml lines 354-363 planner-reviewer guidance to match
    core guidance in line 97. Change to: "File-level inputs are PREFERRED for
    parallel execution determination, enabling agents to load only what they need.
    Directory-level guidance is acceptable only when directory contents are small
    and tightly scoped."

  - |
    MEDIUM: Clarify success criteria operationalization for agent execution.
    Action: Replace lines 111-115 with expanded guidance:
    "Success criteria MUST include measurable validation that agents can execute:
    1. Command execution tests: 'CLI command X should execute successfully with output Y'
    2. API tests: 'GET /endpoint should return status 200 with schema Z'
    3. Integration tests: 'End-to-end workflow from A -> B -> C should complete in <time>'
    User acceptance tests describe WHAT the user expects; success criteria describe
    HOW agents will validate it. Example: User expects 'health check available' ->
    Success criteria 'curl http://localhost:8000/health returns 200 with {status: ok}'."

  - |
    MEDIUM: Specify output location format in manifest.yml.
    Action: Update manifest.yml lines 28, 33 comment to clarify:
    "location: 'docs/plans/live/{plan_folder_name}/live/'
    Where {plan_folder_name} follows YYMMDDRepo_Branch format
    (e.g., '260110MyProject_feature_auth'). See inputs.yml line 35 for format specification."

  - |
    MEDIUM: Clarify input layer relationship in architecture documentation.
    Action: Add new section to process.yml (after line 6) called "Input Layer Hierarchy":
    "The guidance comments reference specific files (less-is-more.yml, etc.) but these
    are loaded indirectly through input layers for token efficiency. The planner-core-guidelines.yml
    layer includes all mentioned guidelines. You need not load individual guideline files—they
    are loaded as part of the core layers. See inputs.yml layers section (lines 47-61) for
    complete input loading strategy."

  - |
    LOW: Standardize date format in examples.
    Action: Update process.yml line 348 to clarify format:
    "example: 'docs/plans/live/250110Repo_feature-x/orchestration_feature_x.mmd'
    (date format: YYMMDD = Jan 10, 2025)"

  - |
    LOW: Consider adding "guidance friction points" section.
    Action: Add new section after line 363 in process.yml:
    "Known friction points and resolutions:
    - Finding existing architecture patterns: See docs/ARCHITECTURE.md for full reference
    - Understanding service boundaries: Review domains.yml, workflows.yml, entrypoints.yml
    - Determining test structure organization: See planner-test/process.yml for test organization patterns"
