process:
  goal: "Build a plan by decomposing the objective into executable phases (teaching or implementation)."

  inputs:
    - location: "assets/guidelines/fix-the-source.yml"
      description: "fix root causes instead of symptoms"
    - location: "assets/guidelines/experiment-first.yml"
      description: "discover and experiment first when unsure"
    - location: "assets/guidelines/context-minimisation.yml"
      description: "provide only required information, reduce noise"
    - location: "assets/guidelines/worktree-and-branching.yml"
      description: "worktree + branching policy"
    - location: "assets/guidelines/response-audit.yml"
      description: "mandatory response audit guideline"
    - location: "assets/guidelines/iteration.yml"
      description: "iteration patterns and small-change bias"

    - location: "assets/definitions/plans.yml"
      description: "plan types and locations"
    - location: "assets/definitions/guidance.yml"
      description: "what guidance is and how to write it"
    - location: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_teach.yml"
      description: "teach/implementation phase example (file-level inputs, guidance, success criteria)"
    - location: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
      description: "test phase example (test-fix-loop, component + user flow testing)"
    - location: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
      description: "cleanup/audit/docs phase example (cleanup before testing, audit-test-fix loop)"

  steps:
    - "Validate inputs. Locate live plan (see manifest.yml). If none exists, spawn `deploy-worktree` first."
    - |
      Execute PLANNER LOOP:
      1. Lead planner agent decides the required phases (e.g., teach, build, test, cleanup, etc.)
      2. Specialized planner agents populate the chosen phase .yml files in `live/` (one per phase)
      3. Reviewer planner agent → approves or requests changes
      4. Loop until approved (reference assets/examples/planner/ for structure)
    - "Report: live plan folder location (YYMMDDRepo_Branch/), phases created, ready for `_execute.yml` or `_teach.yml`"

  guidelines:
    - "Pass success criteria as bullet points to spawned agents."
    - "Empty cleanup phase is valid if codebase is already clean."
    - "Skip planner loop only if user explicitly instructs. Justification: Skipping planning increases the risk of misaligned execution and rework."

