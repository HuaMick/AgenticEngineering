process:
  goal: |
    Create and maintain minimal, purpose-driven documentation.
    Ensure agents discover only what they need to achieve their success criteria.

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (documentation-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/documentation/documentation-core/inputs.yml"
      description: "Core documentation agent inputs and guidelines"

  outputs: []

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Discover existing documentation and trace it back to the source code.
      - If overly verbose or redundant, fix it.
      - If outdated, remove it or update it.
    - |
      Determine what the existing documentation is missing and fill the gaps.
      Reference the documentation_scope definition from inputs.yml for what to document.
    - |
      Report back to the orchestration agent:
      - What documentation was created, updated, or removed
      - Anything you want to flag/bring to the user's attention

  guidelines:
    # Core guidelines: See inputs.yml and assets/guidelines/ (less-is-more.yml, context-minimisation.yml, fix-the-source.yml)
    # Documentation scope and structure: See inputs.yml definitions section
    - |
      Only create new files if explicitly called for by the user or plans.
    - |
      Do not split documentation into multiple files unless explicitly called for.
      If a file is becoming too large, flag this for user decision.
    - |
      Do not touch agent-specific documentation unless explicitly called for
      by the user or plans.
