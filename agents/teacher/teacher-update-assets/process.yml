process:
  goal: |
    Add or update shared assets (definitions, guidelines, examples, shared inputs.yml entries) so
    multiple agents can reuse core content without duplication. Operates on assets/ folder and
    shared input configurations that affect 2+ agents.

  loop_context:
    participates_in: []
    note: "This agent operates at meta-level, not within iteration loops"

  inputs:
    - location: "assets/definitions/signal-and-noise.yml"
      description: "Signal vs noise definitions for context quality."
    - location: "agents/teacher/teacher-update-assets/inputs.yml"
      description: "Core teacher-update-assets inputs, asset-type definitions, and manifests"

  outputs: []

  steps:
    - |
      Review all inputs. If an input cannot be found, do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.

    - |
      Pick the asset type:
      - definition: stable shared meaning ("what is X?")
      - guideline: shared behavior/guardrail ("how to act")
      - example: concrete illustration ("what good/bad looks like here")
      - input-config: shared agent configuration (inputs.yml entries used by 2+ agents)

      Consult the corresponding asset-type definition in inputs (definition.yml / guideline.yml / example.yml).

      For input-config: Check if the configuration (layer, core_input, definition) is referenced
      by multiple agents' inputs.yml files. If so, it's a shared input.

    - |
      Decide if it belongs in shared assets:
      - Use shared assets when 2+ agents/processes will benefit
      - If only relevant to one agent, keep it in that agent's folder

      For inputs.yml entries:
      - Agent-specific inputs (unique to one agent) → use teacher-update-guidance
      - Shared inputs (used by 2+ agents) → use this agent (teacher-update-assets)
      - When adding a new shared layer to assets/inputs/, update all referencing agents' inputs.yml

    - |
      Choose location and file name:
      - definitions/<topic>.yml or definitions/<cluster>.yml
      - guidelines/<topic>.yml
      - examples/<category>/<example_file>

    - |
      Write/update the asset with bias for reuse:
      - Keep definitions/guidelines project-agnostic
      - Keep examples concrete and copyable
      - Prefer links/pointers over duplication

      Reference guidance-artifacts.yml and generalized-vs-specific.yml in inputs.

    - |
      Update indexes and remove duplication:
      - Add/remove guideline: update assets/guidelines/manifest.yml
      - Add/remove example: update assets/examples/manifest.yml
      - Add definitions file: ensure discoverable via inputs/manifests
      - Add/remove shared input layer: update assets/inputs/ and referencing agents' inputs.yml
      - Replace duplicated content with pointer to shared asset

  guidelines:
    # Core guidelines: See teacher-update-assets/inputs.yml which references:
    # - definition.yml, guideline.yml, example.yml: asset type definitions
    # - guidance-artifacts.yml: where to put information
    # - generalized-vs-specific.yml: when to use shared vs agent-specific
    # - context-minimisation.yml: concise writing principles
    - |
      Be concise: one screen per concept when possible.
    - |
      Prefer actionable wording: signals, triggers, checklists, examples.
    - |
      Avoid project-specific examples unless the file is explicitly project-specific.

