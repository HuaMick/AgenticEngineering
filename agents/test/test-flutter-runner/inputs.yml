# Test Flutter Runner Inputs Specification
# This file defines ONLY the inputs needed for executing Flutter tests and reporting results
# Following context minimization principles - test runner does NOT build or modify tests

agent_context:
  category: "assets/definitions/agent-categories.yml#test"
  role: "test-flutter-runner"

inputs:
  agent_type: "test-flutter-runner"
  version: "2.0-pilot"  # Using reference layers
  project_type: flutter

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/test-shared.yml"
      description: "Test category shared inputs (acceptable-skips, reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

  # Agent-specific inputs (only what's unique to test-flutter-runner)
  core_inputs:
    # Project structure - where test files are located
    - type: file
      path: "agents/build/build-flutter/manifest.yml"
      description: "Folder structure manifest - where tests are located"
      required: true

    # Live plan for failure reporting
    - type: pattern
      path: "docs/plans/live/*/"
      description: "Live plan folders for structured failure reporting and state tracking (folder-based structure)"
      required: true

    # Core test runner resources
    - type: file
      path: "assets/definitions/test-runner-role.yml"
      description: "Test runner role definition with Flutter-specific extensions"
      required: true

    # Flutter-specific resources (atomic files for context minimization)
    - type: file
      path: "assets/definitions/flutter-test-execution.yml"
      description: "Flutter test execution workflow"
      required: true

    - type: file
      path: "assets/definitions/flutter-skipped-tests.yml"
      description: "Acceptable test skip patterns for Flutter"
      required: true

    - type: file
      path: "assets/definitions/flutter-environments.yml"
      description: "Flutter test environment behavior notes"
      required: true

    - type: file
      path: "assets/definitions/flutter-test-structure.yml"
      description: "Flutter test file structure and organization"
      required: true

  # Guidelines that test-flutter-runner should follow
  guidelines:
    - path: "assets/guidelines/reward-hacking-prevention.yml"
      description: "Prevent gaming of test success through evidence-based validation"

    - path: "assets/guidelines/safety.yml"
      description: "Safety guidelines including separation of concerns"

  # Test runner specific definitions (minimal set)
  # Note: Core definitions moved to shared asset files for context minimization
  # - test_runner_role: assets/definitions/test-runner-role.yml (includes language-specific extensions)
  # - flutter_test_execution: assets/definitions/flutter-test-execution.yml
  # - acceptable_skips_flutter: assets/definitions/flutter-skipped-tests.yml
  # - environment_notes_flutter: assets/definitions/flutter-environments.yml
  # - test_file_structure: assets/definitions/flutter-test-structure.yml
  definitions:
    failure_reporting: |
      Structured format for documenting test failures in live plan.

      Required fields:
      - test_name: Name of the failing test
      - component: Component or workflow being tested
      - failure_description: What went wrong
      - expected_behavior: What should have happened
      - actual_behavior: What actually happened
      - error_message: Captured error output
      - stack_trace: Stack trace if available

      Purpose: Enables builder agents to fix the right issues
