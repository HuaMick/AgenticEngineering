# PROJECT-SPECIFIC MANIFEST
# This manifest.yml should be copied to the target project's repository
# and customized for that project's specific folder structure.
#
# GUIDANCE:
# - Replace <project_root> with the actual project root path
# - Update folder paths to match the project's structure
# - Add/remove folders based on project needs
# - Update invalid_folders based on project's refactor history
# - Update critical_files to match project's essential files
#
# For reference on leftover folders, see: assets/definitions/leftover-folders.yml

folders:
  # Project uses src-layout pattern after folder restructure (2025-11-25)
  # REPLACE <project_root> with actual path (e.g., /home/code/myagents/MyAgents)

  - path: "<project_root>/src/myagents/*"
    description: |
      Main source code directory (src-layout pattern).
      Contains all Python packages and modules.

  - path: "<project_root>/src/myagents/backend/services/<service_name>/*"
    description: |
      backend services for the project.
      backend services should be independent and self contained.

  - path: "<project_root>/src/myagents/frontend/*"
    description: |
      the project frontend.
      frontend should route to backend services.

  - path: "<project_root>/src/myagents/frontend/cli/*"
    description: |
      the project cli.

  - path: "<project_root>/*"
    description: |
      agent context documentation and process definitions.

  - path: "<project_root>/tests/*"
    description: |
      Test suites organized by workflow.

  - path: "<project_root>/docs/*"
    description: |
      Project documentation including live plans and CI/CD docs.

invalid_folders:
  # Folders that should NOT exist - legacy locations from before src-layout refactor
  # If these exist, they are leftover and should be removed after verifying
  # the content has been migrated to the correct location in src/myagents/

  - path: "<project_root>/backend"
    reason: "Legacy location. Code should be in src/myagents/backend/"

  - path: "<project_root>/frontend"
    reason: "Legacy location. Code should be in src/myagents/frontend/"

  - path: "<project_root>/myagents"
    reason: "Legacy empty namespace. All code should be in src/myagents/"

critical_files:
  # Files that must NEVER be removed - see assets/examples/cleaner/preserved-files.yml
  # Update this list based on the specific project's essential files
  - "<project_root>/uv.lock"
  - "<project_root>/pyproject.toml"
  - "<project_root>/README.md"
  - "<project_root>/Dockerfile.test"
  - "<project_root>/docker-compose.test.yml"
  - "<project_root>/cloudbuild.yaml"


