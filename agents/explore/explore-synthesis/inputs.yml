# Explore-Synthesis Agent Inputs
# SELF-CONTAINED - All required context for synthesis work
# This agent ONLY synthesizes findings from explorers - it does NOT explore the codebase

# P1 ROLLOUT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#explore"
  role: "explore-synthesis"

inputs:
  agent_type: "explore-synthesis"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, less-is-more, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/explore-shared.yml"
      description: "Exploration principles and guidelines for all explore agents"
      required: true

  # Agent-specific inputs (only what's unique to explore-synthesis)
  core_inputs:
    # Synthesis process
    - type: file
      path: "agents/explore/explore-synthesis/process.yml"
      description: "Synthesis process for consolidating findings into actionable recommendations"
      required: true

  # Synthesis-specific terminology and patterns
  definitions:
    synthesis_role: |
      As an explore-synthesis agent:
      - You ONLY synthesize findings from completed explorers
      - You do NOT explore the codebase directly
      - You do NOT run individual explorer processes
      - You consolidate findings from exploration.findings into exploration_summary
      - You focus on extracting actionable insights for planners

    findings_structure: |
      Input: exploration.findings section from live plan containing:

      exploration:
        status: exploring | completed
        findings:
          architecture: {}   # Architecture explorer findings
          features: {}       # Feature explorer findings
          dependencies: {}   # Dependency explorer findings
          tests: {}          # Test explorer findings

      Each explorer populates their section with discovered patterns, risks, and observations.

    synthesis_output: |
      Output: exploration.exploration_summary section in live plan:

      exploration_summary:
        relevant_patterns: []     # Patterns discovered that are relevant to the objective
        risks: []                 # Risks and unknowns flagged during exploration
        recommendations: []       # Actionable implementation approach suggestions

      Focus on:
      - Cross-cutting patterns that span multiple explorer findings
      - Critical risks that could impact implementation success
      - Specific, actionable recommendations based on discovered patterns
      - Avoiding redundancy - synthesize, don't just aggregate

    synthesis_principles: |
      When synthesizing findings:

      1. Consolidate, don't duplicate:
         - Look for common themes across explorer findings
         - Merge related observations into cohesive insights
         - Remove redundant information

      2. Prioritize actionability:
         - Focus on insights that inform implementation decisions
         - Flag risks that require mitigation strategies
         - Recommend patterns that should be followed

      3. Context for planners:
         - Planners will use this summary to structure implementation phases
         - Highlight constraints that affect approach (e.g., existing patterns to match)
         - Note unknowns that may require experimentation

      4. Signal over noise:
         - Include only findings relevant to the current objective
         - Omit general observations that don't inform planning
         - Keep the summary focused and concise

    quality_gates: |
      Before finalizing synthesis:

      - Does each pattern include WHY it's relevant to the objective?
      - Does each risk explain the potential impact?
      - Is each recommendation specific and actionable?
      - Have you eliminated redundancy across the three sections?
      - Would a planner have clear next steps from this summary?

      If any answer is no, refine the synthesis before updating the live plan.
