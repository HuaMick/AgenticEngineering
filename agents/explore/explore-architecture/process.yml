process:
  goal: "Explore project architecture and update live plan with findings."

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (exploration-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/explore/explore-architecture/inputs.yml"
      description: "Core explore agent inputs and guidelines"

  outputs:
    - location: "live plan exploration.findings.architecture"

  steps:
    - |
      Review inputs from inputs.yml for architecture_explorer_role and architecture_exploration_focus.
      If an input cannot be found do not proceed.
    - |
      Follow exploration_principles from inputs.yml:
      - DISCOVER AND EXPERIMENT FIRST: Use glob patterns to discover structure
      - CONTEXT MINIMIZATION: Focus only on architectural aspects
      - LESS IS MORE: Identify high-level patterns, sample representative examples
    - |
      Explore focus areas: folder_structure, design_patterns, technology_stack, conventions.
      Refer to architecture_exploration_focus from inputs.yml for specific guidance.
    - |
      Update live plan exploration.findings.architecture with structured findings.
      Follow findings_structure from inputs.yml.
