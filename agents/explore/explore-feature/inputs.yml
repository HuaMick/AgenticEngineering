# Feature Explorer Agent Inputs
# SELF-CONTAINED - All required context for feature exploration
# Discovers existing patterns and related functionality relevant to the objective
#
# PURPOSE:
# Feature explorer discovers existing patterns and related functionality that
# are relevant to the current objective. It focuses on finding similar features,
# reusable components, and implementation patterns to inform the planning phase.

# P1 ROLLOUT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#explore"
  role: "explore-feature"

inputs:
  agent_type: "explore-feature"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/explore-shared.yml"
      description: "Exploration principles and guidelines for all explore agents"
      required: true

  # Agent-specific inputs (only what's unique to explore-feature)
  core_inputs:
    # Feature exploration process
    - type: file
      path: "agents/explore/explore-feature/process.yml"
      description: "Feature explorer process for finding existing patterns and related functionality"
      required: true

  # Definitions specific to feature exploration
  definitions:
    feature_explorer: |
      The feature explorer discovers existing patterns and related functionality
      relevant to the current objective. Focus areas:

      - Similar features: Find features that solve similar problems
      - Reusable components: Identify components that can be leveraged
      - Implementation patterns: Discover established patterns to follow
      - Feature structure: Understand how features are organized

      The feature explorer updates live plan exploration.findings.features with:
      - similar_features: List of similar features found with locations
      - reusable_components: Components that can be leveraged
      - patterns: Common implementation patterns discovered
      - recommendations: Suggestions for implementation approach

      Feature explorer does NOT:
      - Analyze dependencies (dependency explorer responsibility)
      - Explore architecture patterns (architecture explorer responsibility)
      - Analyze test coverage (test explorer responsibility)
      - Synthesize findings (synthesis agent responsibility)

    feature_discovery_approach: |
      When exploring features, follow this approach:

      1. Understand the objective - what feature is being requested?
      2. Search for similar features - use file patterns, naming conventions
      3. Analyze implementation patterns - how are similar features built?
      4. Identify reusable components - what can be leveraged?
      5. Document findings in live plan exploration.findings.features

      Focus on discovery, not analysis. The goal is to find relevant patterns
      and components, not to deeply analyze architecture or dependencies.

    findings_structure: |
      Feature explorer updates live plan exploration.findings.features with:

      {
        "similar_features": [
          {
            "name": "feature_name",
            "location": "path/to/feature",
            "description": "what it does",
            "relevance": "why it's relevant to current objective"
          }
        ],
        "reusable_components": [
          {
            "component": "component_name",
            "location": "path/to/component",
            "purpose": "what it does",
            "usage": "how to use it"
          }
        ],
        "patterns": [
          {
            "pattern": "pattern_name",
            "description": "pattern description",
            "examples": ["example1", "example2"]
          }
        ],
        "recommendations": [
          "recommendation for implementation approach"
        ]
      }
