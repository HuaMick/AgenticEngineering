process:
  goal: "Explore test infrastructure and coverage patterns, update live plan with findings."

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (exploration-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/explore/explore-test/inputs.yml"
      description: "Core explore agent inputs and guidelines"

  outputs:
    - location: "live plan exploration.findings.tests"

  steps:
    - |
      Review inputs from inputs.yml for test_explorer_scope and test_findings_format.
      If an input cannot be found do not proceed.
    - |
      Follow exploration_workflow from inputs.yml:
      - Locate test directories in the codebase
      - Identify testing frameworks and configuration
      - Analyze test file structure and naming conventions
      - Examine test organization patterns
      - Assess test coverage patterns and identify gaps
      - Document mock/fixture patterns and test data approaches
      - Flag test infrastructure risks
    - |
      Update live plan exploration.findings.tests with structured findings.
      Follow test_findings_format from inputs.yml (structure, frameworks, coverage, conventions, risks).
