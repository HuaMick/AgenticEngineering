process:
  goal: "Explore module dependencies and coupling points, update live plan with findings."

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (exploration-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/explore/explore-dependency/inputs.yml"
      description: "Core explore agent inputs and guidelines"

  outputs:
    - location: "live plan exploration.findings.dependencies"

  steps:
    - |
      Review inputs from inputs.yml for dependency_explorer_role and dependency_analysis_focus.
      If an input cannot be found do not proceed.
    - |
      Follow exploration_workflow from inputs.yml:
      - Start with package manifests (package.json, pyproject.toml, requirements.txt)
      - Analyze import patterns in key modules
      - Check for coupling risks and circular dependencies
      - Document package organization
      - Flag risks and constraints
    - |
      Update live plan exploration.findings.dependencies with structured findings:
      import_graph, coupling_points, package_structure, external_deps, risks, constraints.
      Follow findings_format from inputs.yml.
