stories:
- id: US-CLI-075
  title: Discover Available Entrypoints
  category: entrypoints
  priority: high
  as_a: orchestration agent or developer
  i_want: to list all available workflow entrypoints
  so_that: I can find the right entrypoint to initiate a workflow
  acceptance_criteria:
  - agentic entrypoint list shows all entrypoint files
  - Searches .claude/entrypoints/ and modules/AgenticGuidance/entrypoints/
  - Each entrypoint shows its name and description
  - JSON output is supported for scripting
  related_commands:
  - agentic ep list
  - agentic -j ep list
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-076
  title: View Entrypoint Content
  category: entrypoints
  priority: high
  as_a: developer reviewing a workflow definition
  i_want: to see the full content of an entrypoint file
  so_that: I understand what the workflow does before executing it
  acceptance_criteria:
  - agentic entrypoint show <name> displays the raw entrypoint content
  - The underscore prefix is optional (plan_build and _plan_build both work)
  - JSON output includes the path and content type
  related_commands:
  - agentic ep show plan_build
  - agentic ep show _orchestrate
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-077
  title: Execute Entrypoint with Variables
  category: entrypoints
  priority: critical
  as_a: orchestration agent starting a workflow
  i_want: to execute an entrypoint with variable substitution and context
  so_that: the workflow is initialized with the correct parameters
  acceptance_criteria:
  - agentic entrypoint execute <name> processes the entrypoint content
  - The --vars flag substitutes KEY=VALUE pairs using {{VAR}} syntax
  - The --context flag prepends additional context text
  - TIMESTAMP is automatically injected as a built-in variable
  - The --compile flag builds a complete context bundle
  related_commands:
  - agentic ep execute plan_build --vars TASK_ID=build_01
  - agentic ep execute orchestrate --context 'Working on auth feature'
  related_agents:
  - orchestration-planning
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-078
  title: Compile Complete Context Bundle
  category: entrypoints
  priority: high
  as_a: agent needing full workflow context
  i_want: to compile an entrypoint with all referenced files included
  so_that: I have the entire context bundle in a single output
  acceptance_criteria:
  - agentic ep execute <name> --compile includes the entrypoint, orchestration file,
    inputs, and referenced files
  - 'Output sections are delimited with headers like ''# === ENTRYPOINT: name ==='''
  - 'All location: references in inputs.yml are resolved and included'
  - Missing referenced files are reported but do not block compilation
  related_commands:
  - agentic ep execute plan_build --compile
  - agentic ep execute orchestrate --compile --context 'My context'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
