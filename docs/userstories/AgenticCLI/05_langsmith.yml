# User Stories: LangSmith Integration
# Covers trace querying, friction analysis, session analysis, and batch search

stories:
  # ============================================================================
  # LANGSMITH TRACE QUERYING
  # ============================================================================

  - id: "US-CLI-050"
    title: "Query LangSmith Runs"
    category: "langsmith"
    priority: "high"
    as_a: "developer investigating agent behavior"
    i_want: "to list and inspect LangSmith trace runs from the CLI"
    so_that: "I can diagnose issues without switching to the LangSmith web UI"
    acceptance_criteria:
      - "agentic langsmith runs lists recent runs with type and status"
      - "The --project flag scopes to a specific project"
      - "The --type flag filters by run type (llm, chain, tool, retriever)"
      - "The --error flag shows only failed runs"
      - "agentic langsmith run <id> shows detailed run information"
      - "The --tree flag shows parent/child run hierarchy"
      - "The --timing flag shows detailed timing breakdown"
      - "The --full flag displays complete inputs and outputs"
    related_commands:
      - "agentic ls runs -p my-project --error"
      - "agentic ls run <id> --tree --timing"
    related_agents:
      - "teacher-trace-diagnostics"

  - id: "US-CLI-051"
    title: "Analyze Friction Patterns"
    category: "langsmith"
    priority: "high"
    as_a: "guidance maintainer improving agent behavior"
    i_want: "to detect friction patterns from LangSmith trace data"
    so_that: "I can identify where agents struggle and improve guidance"
    acceptance_criteria:
      - "agentic langsmith friction analyzes traces for friction patterns"
      - "The --recommend flag provides actionable improvement suggestions"
      - "The --sessions flag controls how many sessions to analyze"
      - "The --min-affected flag filters patterns by minimum occurrence"
      - "The --export flag outputs to markdown, YAML, or JSON"
      - "The --group-by flag organizes by severity, type, or session"
      - "Results include pattern description, affected sessions, and severity"
    related_commands:
      - "agentic ls friction -p my-project --recommend"
      - "agentic ls friction -p my-project --export markdown --group-by severity"
    related_agents:
      - "orchestration-friction"
      - "teacher-trace-diagnostics"

  - id: "US-CLI-052"
    title: "Analyze Session Timeline"
    category: "langsmith"
    priority: "medium"
    as_a: "developer debugging a specific session"
    i_want: "to analyze a single LangSmith session with detailed timeline"
    so_that: "I can understand the sequence of events and identify bottlenecks"
    acceptance_criteria:
      - "agentic langsmith session-analyze <id> shows session timeline"
      - "The --export flag supports CSV and markdown formats"
      - "Timeline includes run types, durations, and status"
      - "Session statistics summarize run counts and error rates"
    related_commands:
      - "agentic ls session-analyze <id> --export markdown"

  - id: "US-CLI-053"
    title: "Search Runs by Pattern"
    category: "langsmith"
    priority: "medium"
    as_a: "developer searching for specific errors across traces"
    i_want: "to search across LangSmith runs using regex patterns"
    so_that: "I can find all occurrences of a specific error or behavior"
    acceptance_criteria:
      - "agentic langsmith batch-search <pattern> searches across runs"
      - "The --field flag scopes search to inputs, outputs, error, or all"
      - "The --type and --status flags filter the run set"
      - "The --group-by flag organizes results by session, type, or status"
      - "The --export flag outputs to JSON or CSV"
      - "Date range filtering is supported via --since and --until"
    related_commands:
      - "agentic ls batch-search 'timeout.*exceeded' -p my-project"
      - "agentic ls batch-search 'retry' -p my-project --field error --export csv"

  - id: "US-CLI-054"
    title: "List LangSmith Projects"
    category: "langsmith"
    priority: "medium"
    as_a: "developer exploring LangSmith data"
    i_want: "to list all available LangSmith projects"
    so_that: "I can select the right project for analysis"
    acceptance_criteria:
      - "agentic langsmith projects lists all projects"
      - "The --detail flag shows project statistics and metadata"
      - "JSON output is supported"
    related_commands:
      - "agentic ls projects"
      - "agentic ls projects --detail"
    related_agents: []

  - id: "US-CLI-055"
    title: "View Project Statistics"
    category: "langsmith"
    priority: "medium"
    as_a: "project manager tracking agent usage"
    i_want: "to see statistics for a LangSmith project"
    so_that: "I can monitor run counts, error rates, and trends"
    acceptance_criteria:
      - "agentic langsmith stats --project <name> shows project statistics"
      - "The --since and --until flags filter by date range"
      - "Statistics include run counts, error rates, and timing averages"
      - "JSON output includes detailed breakdowns"
    related_commands:
      - "agentic ls stats -p my-project"
      - "agentic ls stats -p my-project --since 2026-01-01"
    related_agents: []

  - id: "US-CLI-056"
    title: "List Sessions"
    category: "langsmith"
    priority: "medium"
    as_a: "developer reviewing recent agent activity"
    i_want: "to list recent LangSmith sessions with run counts"
    so_that: "I can identify sessions to analyze"
    acceptance_criteria:
      - "agentic langsmith sessions lists recent sessions"
      - "The --project flag scopes to a specific project"
      - "The --limit flag controls result count"
      - "The --since flag filters by start date"
      - "Each session shows ID, start time, and run count"
    related_commands:
      - "agentic ls sessions -p my-project"
      - "agentic ls sessions -p my-project --limit 20"
    related_agents: []

  - id: "US-CLI-057"
    title: "Get Run URL"
    category: "langsmith"
    priority: "low"
    as_a: "developer sharing trace details"
    i_want: "to get the web URL for a specific run"
    so_that: "I can share it with teammates or open it in a browser"
    acceptance_criteria:
      - "agentic langsmith run <id> --url outputs the LangSmith web URL"
      - "URL opens directly to the run details page"
    related_commands:
      - "agentic ls run <id> --url"
    related_agents: []
