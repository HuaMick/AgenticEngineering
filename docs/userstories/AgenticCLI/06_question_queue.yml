# User Stories: Question Queue Management
# Covers question ask, answer, defer, list, show operations

stories:
  # ============================================================================
  # QUESTION MANAGEMENT
  # ============================================================================

  - id: "US-CLI-060"
    title: "Ask a Question During Workflow"
    category: "question_management"
    priority: "high"
    as_a: "agent encountering an ambiguity during execution"
    i_want: "to create a question that gets queued for human review"
    so_that: "I can continue with other tasks while waiting for human input"
    acceptance_criteria:
      - "agentic question ask <text> creates a question in the plan's questions/pending/ directory"
      - "Questions are assigned a unique ID with format Q-YYYYMMDD-HHMMSS-XXXX"
      - "The --severity flag sets priority (blocking, high, medium, low)"
      - "The --context flag adds background information"
      - "Default severity is medium"
      - "Plan path is auto-detected or specified via --plan"
    related_commands:
      - "agentic question ask 'What testing framework should we use?' --severity high"
      - "agentic question ask 'Should we add this?' --context 'Feature request from user'"
    related_agents:
      - "orchestration-executor"

  - id: "US-CLI-061"
    title: "List Pending Questions"
    category: "question_management"
    priority: "high"
    as_a: "human reviewing agent progress"
    i_want: "to see all pending questions that need my input"
    so_that: "I can answer them to unblock agent work"
    acceptance_criteria:
      - "agentic question list shows pending questions by default"
      - "The --status flag filters by pending, answered, deferred, or all"
      - "Questions show ID, severity, text, and creation time"
      - "Blocking questions are highlighted or listed first"
      - "JSON output is supported"
    related_commands:
      - "agentic question list"
      - "agentic question list --status all"

  - id: "US-CLI-062"
    title: "Answer a Question"
    category: "question_management"
    priority: "high"
    as_a: "human providing guidance to an agent"
    i_want: "to answer a pending question with text and confidence level"
    so_that: "the agent can resume work with my input"
    acceptance_criteria:
      - "agentic question answer <id> --text <answer> records the answer"
      - "The --confidence flag sets answer confidence (high, medium, low)"
      - "The question moves from questions/pending/ to questions/answered/"
      - "Both the original question and answer are preserved"
      - "Without --text, the command prompts for answer input"
    related_commands:
      - "agentic question answer Q-20260203-143022-a1b2 --text 'Use pytest' --confidence high"

  - id: "US-CLI-063"
    title: "Defer a Question"
    category: "question_management"
    priority: "medium"
    as_a: "human triaging questions"
    i_want: "to defer a question that does not need immediate attention"
    so_that: "blocking questions get priority while non-urgent ones are tracked"
    acceptance_criteria:
      - "agentic question defer <id> changes the question status to deferred"
      - "Deferred questions are excluded from the default pending list"
      - "Deferred questions are visible with --status deferred or --status all"
    related_commands:
      - "agentic question defer Q-20260203-143022-a1b2"

  - id: "US-CLI-064"
    title: "View Question Details"
    category: "question_management"
    priority: "medium"
    as_a: "human reviewing a question before answering"
    i_want: "to see the full details of a question including context"
    so_that: "I have enough information to provide a good answer"
    acceptance_criteria:
      - "agentic question show <id> displays the full question YAML"
      - "Shows question text, severity, context, creation time, and status"
      - "If answered, shows the answer text and confidence"
      - "JSON output includes all metadata"
    related_commands:
      - "agentic question show Q-20260203-143022-a1b2"

  - id: "US-CLI-065"
    title: "Watch Questions with Tmux Notifications"
    category: "question_management"
    priority: "medium"
    as_a: "human working remotely via tmux"
    i_want: "to receive tmux notifications when new questions are created"
    so_that: "I'm alerted to questions even when not actively monitoring"
    acceptance_criteria:
      - "agentic question watch monitors questions/ directory for changes"
      - "New questions trigger tmux display-message notifications"
      - "Watch command runs in foreground and can be stopped with Ctrl+C"
      - "Notifications include question ID and severity"
    related_commands:
      - "agentic question watch"
    related_agents: []

  - id: "US-CLI-066"
    title: "Run Question Watch as Daemon"
    category: "question_management"
    priority: "medium"
    as_a: "human setting up persistent question monitoring"
    i_want: "to run question watch in the background as a daemon"
    so_that: "notifications continue across terminal sessions"
    acceptance_criteria:
      - "agentic question watch-daemon starts watch in background"
      - "Daemon PID is stored for later stopping"
      - "Daemon logs output to ~/.agentic/logs/"
      - "Command is idempotent (won't start multiple daemons)"
    related_commands:
      - "agentic question watch-daemon"
    related_agents: []

  - id: "US-CLI-067"
    title: "Stop Question Watch Daemon"
    category: "question_management"
    priority: "low"
    as_a: "human stopping question monitoring"
    i_want: "to stop the question watch daemon"
    so_that: "I no longer receive notifications"
    acceptance_criteria:
      - "agentic question watch-stop terminates the watch daemon"
      - "Command is idempotent (safe to call when no daemon is running)"
      - "Daemon cleanup is performed (PID file removed)"
    related_commands:
      - "agentic question watch-stop"
    related_agents: []
