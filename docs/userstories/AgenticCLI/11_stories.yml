stories:
- id: US-CLI-110
  title: Find User Stories Across Projects
  category: story_management
  priority: medium
  as_a: test builder creating acceptance tests
  i_want: to search for user stories across all projects
  so_that: I can identify stories that need test coverage
  acceptance_criteria:
  - agentic stories find searches docs/userstories/ directory
  - Output lists all stories with ID, title, and project
  - The --project flag filters stories by project name
  - The --changes flag filters stories related to specific files
  - Stories in plan user_stories/ directories are also searched
  - JSON output supported with --json flag
  related_commands:
  - agentic stories find
  - agentic stories find --project AgenticCLI
  - agentic stories find --changes src/agenticcli/cli.py
  - agentic st find -p my-project
  related_agents:
  - test-builder
  - planner-test
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-111
  title: Initialize User Stories Directory
  category: story_management
  priority: low
  as_a: developer starting a new project module
  i_want: to create a user stories directory structure
  so_that: I have a place to document user stories
  acceptance_criteria:
  - agentic stories init creates docs/userstories/<project>/ directory
  - Template README.md is created explaining story format
  - Example story file is created as reference
  - Command fails if directory already exists
  related_commands:
  - agentic stories init
  - agentic stories init --project MyModule
  related_agents:
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-112
  title: Display User Story Details
  category: story_management
  priority: medium
  as_a: developer reviewing acceptance criteria
  i_want: to view the full contents of a user story
  so_that: I can understand requirements and test expectations
  acceptance_criteria:
  - agentic stories cat <story-id> displays full story details
  - 'Output includes: ID, title, as_a, i_want, so_that, acceptance criteria'
  - Related commands and agents are displayed
  - Priority and category are shown
  - Command searches across all story directories
  related_commands:
  - agentic stories cat US-CLI-001
  - agentic stories cat US-CLI-001 --format yaml
  related_agents:
  - test-builder
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-113
  title: View Story Test Status
  category: story_management
  priority: medium
  as_a: developer validating test coverage
  i_want: to view the test status of a specific user story
  so_that: I know whether it has been tested and what the result was
  acceptance_criteria:
  - agentic stories status <id> displays test_status, last_tested, test_notes
  - Displays tested_by_plan if set
  - JSON output supported with --json flag
  - Shows 'never' for untested stories
  related_commands:
  - agentic stories status US-CLI-110
  - agentic --json stories status US-CLI-110
  related_agents:
  - test-builder
  - planner-test
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-114
  title: Update Story Test Status
  category: story_management
  priority: high
  as_a: test agent completing validation
  i_want: to record the test result for a user story
  so_that: test progress is tracked in the story files
  acceptance_criteria:
  - agentic stories update <id> --status pass|fail|skip sets test_status
  - last_tested is automatically set to current UTC timestamp
  - --notes flag records test notes or failure details
  - --plan flag records which plan tested the story
  - YAML file is updated in place
  - JSON output supported with --json flag
  related_commands:
  - agentic stories update US-CLI-110 --status pass
  - agentic stories update US-CLI-110 --status fail --notes 'Command not found'
  - agentic stories update US-CLI-110 --status pass --plan 260207CL
  related_agents:
  - test-builder
  - test-runner
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-115
  title: Story Test Report
  category: story_management
  priority: medium
  as_a: developer assessing overall test coverage
  i_want: to see a summary of pass/fail/untested across all stories
  so_that: I can identify coverage gaps
  acceptance_criteria:
  - agentic stories report shows pass/fail/skip/untested counts
  - --project flag filters by project
  - Coverage percentage is displayed
  - JSON output supported with --json flag
  related_commands:
  - agentic stories report
  - agentic stories report --project AgenticCLI
  - agentic --json stories report
  related_agents:
  - planner-test
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-116
  title: List Untested Stories
  category: story_management
  priority: medium
  as_a: test planner prioritizing work
  i_want: to see which stories have not been tested
  so_that: I can plan the next test cycle
  acceptance_criteria:
  - agentic stories untested lists stories with test_status=untested
  - --project flag filters by project
  - Stories are grouped by project
  - Total count is displayed
  - JSON output supported with --json flag
  related_commands:
  - agentic stories untested
  - agentic stories untested --project AgenticCLI
  - agentic --json stories untested
  related_agents:
  - planner-test
  - test-builder
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
