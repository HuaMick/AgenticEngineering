# User Stories: CLI Feedback Metrics
stories:
  - id: "US-FB-001"
    title: "Real-time Progress Visibility"
    category: "feedback_metrics"
    priority: "high"
    as_a: "CLI user"
    i_want: "to see a progress indicator during long-running session spawn commands"
    so_that: "I know the system is still working and not frozen"
    acceptance_criteria:
      - "A spinner/status indicator appears during session spawn"
      - "Real-time output is streamed to the terminal"
      - "The indicator disappears when the operation completes"

  - id: "US-FB-002"
    title: "Context Window Awareness"
    category: "feedback_metrics"
    priority: "high"
    as_a: "CLI user"
    i_want: "to see how much of the context window is being used"
    so_that: "I can prevent context rot and manage my sessions effectively"
    acceptance_criteria:
      - "Context usage percentage is displayed before session spawn"
      - "Color coding indicates severity: cyan (safe), yellow (75%+), red (90%+)"
      - "Token count is estimated from prompt content"
