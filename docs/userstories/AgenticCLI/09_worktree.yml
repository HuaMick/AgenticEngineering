stories:
- id: US-CLI-090
  title: Create Worktree with Plan Integration
  category: worktree_management
  priority: high
  as_a: developer starting a new feature branch
  i_want: to create a git worktree that is automatically linked to a planning folder
  so_that: I have both workspace and tracking structure set up in one command
  acceptance_criteria:
  - agentic worktree create <branch> creates a worktree at ../repo-<branch>
  - A corresponding plan folder is automatically created in docs/plans/live/
  - Plan folder name uses YYMMDDXX_<branch> convention
  - 'The --base flag specifies the base branch (default: main)'
  - The --no-plan flag skips plan folder creation
  - Command fails clearly if worktree already exists
  related_commands:
  - agentic worktree create <branch>
  - agentic worktree create <branch> --base develop
  - agentic worktree create <branch> --no-plan
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-091
  title: List All Worktrees
  category: worktree_management
  priority: medium
  as_a: developer managing multiple feature branches
  i_want: to see all active git worktrees in the repository
  so_that: I can track which branches have dedicated workspaces
  acceptance_criteria:
  - agentic worktree list shows all worktrees with paths and branches
  - Output includes main worktree and all linked worktrees
  - Branch names and paths are clearly displayed
  - Current worktree is indicated if applicable
  - JSON output supported with --json flag
  related_commands:
  - agentic worktree list
  - agentic wt list
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-092
  title: Remove Worktree
  category: worktree_management
  priority: medium
  as_a: developer cleaning up finished work
  i_want: to remove a worktree and optionally its plan folder
  so_that: I can free up disk space and maintain clean workspace
  acceptance_criteria:
  - agentic worktree remove <branch> removes the worktree at ../repo-<branch>
  - Command prompts for confirmation before removal
  - The --force flag skips confirmation prompt
  - Associated plan folder is NOT automatically removed (manual archive required)
  - Command fails clearly if worktree doesn't exist or has uncommitted changes
  related_commands:
  - agentic worktree remove <branch>
  - agentic worktree remove <branch> --force
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-093
  title: Show Worktree Status
  category: worktree_management
  priority: low
  as_a: developer working across multiple worktrees
  i_want: to see the status of the current worktree
  so_that: I can verify which workspace I'm in and its branch state
  acceptance_criteria:
  - agentic worktree status shows current worktree path and branch
  - Output includes git status summary (clean, uncommitted, etc.)
  - Plan folder association is displayed if it exists
  - Command works from any directory within the worktree
  related_commands:
  - agentic worktree status
  - agentic wt status
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
