stories:
- id: US-CLI-130
  title: Install Shell Auto-Completion
  category: shell_completion
  priority: high
  as_a: developer using the agentic CLI frequently
  i_want: to install auto-completion for my shell
  so_that: I can tab-complete commands and arguments efficiently
  acceptance_criteria:
  - agentic completion install <shell> installs completion for specified shell
  - 'Supported shells: bash, zsh, fish, powershell'
  - Completion is installed to standard shell config locations
  - Instructions are displayed for activating completion
  - Command detects shell automatically if not specified
  - Installation is idempotent (safe to run multiple times)
  related_commands:
  - agentic completion install bash
  - agentic completion install zsh
  - agentic completion install fish
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-131
  title: Show Completion Script
  category: shell_completion
  priority: medium
  as_a: developer customizing shell configuration
  i_want: to view the completion script without installing
  so_that: I can manually integrate it into my custom shell config
  acceptance_criteria:
  - agentic completion show <shell> displays completion script
  - Output can be redirected to a file or eval'd directly
  - Script includes all commands and subcommands
  - Script supports dynamic completion for file paths and epic folders
  related_commands:
  - agentic completion show bash
  - agentic completion show zsh > ~/.zsh_completion_agentic
  - eval "$(agentic completion show bash)"
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
