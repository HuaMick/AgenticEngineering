stories:
- id: US-CLI-100
  title: List Available Epic Templates
  category: template_generation
  priority: medium
  as_a: developer creating a new epic
  i_want: to see all available epic templates
  so_that: I can choose the right template for my work
  acceptance_criteria:
  - agentic template list displays all template types
  - Each template shows name and description
  - 'Output includes: build, test, cleanup, guidance templates'
  - JSON output supported with --json flag
  related_commands:
  - agentic template list
  - agentic tpl list
  related_agents:
  - planner-build
  - planner-test
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-101
  title: Generate Build Epic from Template
  category: template_generation
  priority: high
  as_a: developer starting a new feature implementation
  i_want: to generate a build epic with phased tickets
  so_that: I have a structured epic to guide my work
  acceptance_criteria:
  - agentic template generate build creates a epic_build.yml file
  - Template includes phases, tickets, and objective placeholders
  - 'The --output flag specifies output file path (default: stdout)'
  - The --objective flag populates the objective field
  - 'The --phases flag creates custom phase structure (format: P1:Name,P2:Name)'
  - The --success-criteria flag adds success criteria
  related_commands:
  - agentic template generate build
  - agentic template generate build --output epic_build.yml
  - agentic template generate build --objective 'Implement auth' --phases 'P1:Setup,P2:Build,P3:Test'
  related_agents:
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-102
  title: Generate Test Epic from Template
  category: template_generation
  priority: high
  as_a: developer creating test coverage
  i_want: to generate a test epic with unit, integration, and e2e phases
  so_that: I have a structured approach to testing
  acceptance_criteria:
  - agentic template generate test creates epic_test.yml
  - Template includes unit, integration, and e2e test phases
  - Test strategy section defines scope and locations
  - Template supports custom phases via --phases flag
  - Template supports custom success criteria
  related_commands:
  - agentic template generate test
  - agentic template generate test --output epic_test.yml
  related_agents:
  - planner-test
  - test-builder
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-103
  title: Generate Cleanup/Guidance Epic from Template
  category: template_generation
  priority: medium
  as_a: developer performing code review or improving guidance
  i_want: to generate a cleanup or guidance improvement epic
  so_that: I have a structured approach to audit and improvement tasks
  acceptance_criteria:
  - agentic template generate cleanup creates cleanup epic
  - agentic template generate guidance creates guidance epic
  - Templates include appropriate phases for audit and improvement
  - All standard template flags work (--output, --objective, --phases, --success-criteria)
  related_commands:
  - agentic template generate cleanup --output epic_audit.yml
  - agentic template generate guidance --objective 'Improve planner guidance'
  related_agents:
  - planner-guidance
  - test-audit
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
