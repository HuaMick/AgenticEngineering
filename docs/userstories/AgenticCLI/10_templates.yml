# User Stories: Template Generation
# Generate plan files from pre-defined templates

stories:
  - id: "US-CLI-100"
    title: "List Available Plan Templates"
    category: "template_generation"
    priority: "medium"
    as_a: "developer creating a new plan"
    i_want: "to see all available plan templates"
    so_that: "I can choose the right template for my work"
    acceptance_criteria:
      - "agentic template list displays all template types"
      - "Each template shows name and description"
      - "Output includes: build, test, cleanup, guidance templates"
      - "JSON output supported with --json flag"
    related_commands:
      - "agentic template list"
      - "agentic tpl list"
    related_agents:
      - "planner-build"
      - "planner-test"

  - id: "US-CLI-101"
    title: "Generate Build Plan from Template"
    category: "template_generation"
    priority: "high"
    as_a: "developer starting a new feature implementation"
    i_want: "to generate a build plan with phased tasks"
    so_that: "I have a structured plan to guide my work"
    acceptance_criteria:
      - "agentic template generate build creates a plan_build.yml file"
      - "Template includes phases, tasks, and objective placeholders"
      - "The --output flag specifies output file path (default: stdout)"
      - "The --objective flag populates the objective field"
      - "The --phases flag creates custom phase structure (format: P1:Name,P2:Name)"
      - "The --success-criteria flag adds success criteria"
    related_commands:
      - "agentic template generate build"
      - "agentic template generate build --output plan_build.yml"
      - "agentic template generate build --objective 'Implement auth' --phases 'P1:Setup,P2:Build,P3:Test'"
    related_agents:
      - "planner-build"

  - id: "US-CLI-102"
    title: "Generate Test Plan from Template"
    category: "template_generation"
    priority: "high"
    as_a: "developer creating test coverage"
    i_want: "to generate a test plan with unit, integration, and e2e phases"
    so_that: "I have a structured approach to testing"
    acceptance_criteria:
      - "agentic template generate test creates plan_test.yml"
      - "Template includes unit, integration, and e2e test phases"
      - "Test strategy section defines scope and locations"
      - "Template supports custom phases via --phases flag"
      - "Template supports custom success criteria"
    related_commands:
      - "agentic template generate test"
      - "agentic template generate test --output plan_test.yml"
    related_agents:
      - "planner-test"
      - "test-builder"

  - id: "US-CLI-103"
    title: "Generate Cleanup/Guidance Plan from Template"
    category: "template_generation"
    priority: "medium"
    as_a: "developer performing code review or improving guidance"
    i_want: "to generate a cleanup or guidance improvement plan"
    so_that: "I have a structured approach to audit and improvement tasks"
    acceptance_criteria:
      - "agentic template generate cleanup creates cleanup plan"
      - "agentic template generate guidance creates guidance plan"
      - "Templates include appropriate phases for audit and improvement"
      - "All standard template flags work (--output, --objective, --phases, --success-criteria)"
    related_commands:
      - "agentic template generate cleanup --output plan_audit.yml"
      - "agentic template generate guidance --objective 'Improve planner guidance'"
    related_agents:
      - "planner-guidance"
      - "test-audit"
