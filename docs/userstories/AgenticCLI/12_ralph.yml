stories:
- id: US-CLI-120
  title: Start Ralph Loop for Plan Orchestration
  category: ralph_loop
  priority: critical
  as_a: orchestrator managing multiple epics
  i_want: to start a Ralph Loop that automatically discovers and executes epic tickets
  so_that: Epics progress without manual ticket-by-ticket intervention
  acceptance_criteria:
  - agentic ralph start begins Ralph Loop execution
  - Loop automatically scans docs/epics/live/ for active epics
  - Tickets are prioritized by dependencies and status
  - The --prompt-file flag loads prompt from a file
  - 'The --max-iterations flag limits loop iterations (default: 10)'
  - The --background flag runs loop in background
  - Loop stores state in ~/.agentic/ralph/
  related_commands:
  - agentic ralph start
  - agentic ralph start --prompt-file docs/prompts/ralph.txt
  - agentic ralph start --max-iterations 20 --background
  related_agents:
  - orchestration-executor
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-121
  title: Stop Ralph Loop
  category: ralph_loop
  priority: high
  as_a: developer managing loop execution
  i_want: to stop a running Ralph Loop gracefully
  so_that: I can halt orchestration when needed
  acceptance_criteria:
  - agentic ralph stop terminates the running loop
  - Graceful shutdown allows current iteration to complete
  - The --force flag immediately kills the loop (SIGKILL)
  - Command is idempotent (safe to call multiple times)
  - Loop state is saved on graceful stop
  related_commands:
  - agentic ralph stop
  - agentic ralph stop --force
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-122
  title: View Ralph Loop Status
  category: ralph_loop
  priority: high
  as_a: developer monitoring orchestration progress
  i_want: to see the current status of the Ralph Loop
  so_that: I can track which epics and tickets are being executed
  acceptance_criteria:
  - agentic ralph status shows loop state (running, stopped, completed)
  - Output includes current iteration / max iterations
  - Active epic and ticket are displayed
  - Runtime duration is shown
  - JSON output supported with --json flag
  related_commands:
  - agentic ralph status
  - agentic ralph status --json
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-123
  title: Get Next Ralph Action Recommendation
  category: ralph_loop
  priority: critical
  as_a: agent executing within Ralph Loop
  i_want: to get the next recommended action from Ralph
  so_that: I know which epic and ticket to work on next
  acceptance_criteria:
  - agentic ralph next returns the next EpicAction to execute
  - Output includes epic folder, ticket ID, and action type
  - Returns null/none if no actions are pending
  - Action prioritization respects dependencies and status
  - JSON output includes full ticket context
  related_commands:
  - agentic ralph next
  - agentic ralph next --json
  related_agents:
  - orchestration-executor
  - builder
  - tester
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-124
  title: View Ralph Loop History
  category: ralph_loop
  priority: medium
  as_a: developer reviewing orchestration execution
  i_want: to see the history of Ralph Loop iterations
  so_that: I can audit what tasks were executed and identify issues
  acceptance_criteria:
  - agentic ralph history lists all loop iterations
  - Each iteration shows timestamp, epic, ticket, and outcome
  - 'The --limit flag controls number of iterations shown (default: 20)'
  - Failed iterations are highlighted
  - JSON output includes full iteration details
  related_commands:
  - agentic ralph history
  - agentic ralph history --limit 50
  - agentic ralph history --json
  related_agents:
  - orchestration-executor
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
