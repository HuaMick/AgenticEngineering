stories:
- id: US-CLI-PLAN-001
  name: Planner creates comprehensive implementation epics
  category: planning
  persona: Developer using agentic CLI to create epics
  priority: critical
  starting_state:
  - User has planning objective and target project path
  - No epic folder exists yet
  journey:
  - User invokes: agentic entrypoint _ticket_build.yml
  - orchestration-planning discovers affected user stories via `agentic stories find`
  - planner-build generates NEW user stories from objective (if stories missing)
  - planner-build creates ticket_build.yml with affected_stories field populated
  - planner-build creates ticket_build.yml with story generation tickets if new stories
    needed
  - planner-build creates ticket_build.yml with ticket inputs reference story files
    for context
  - planner-test creates test plan with UAT phase targeting the generated stories
  - planner-test creates test plan with acceptance criteria from story success_criteria
  - orchestration-executor validates stories exist before UAT execution
  success_criteria:
  - Epic YAML has affected_stories field with story IDs
  - If no stories found, epic has story_creation_tickets
  - Test phase has UAT tickets that reference story IDs
  - UAT tickets have acceptance criteria from stories
  testing:
    local: Create a test plan and verify it includes user stories
    docker: Run planner-build in container and check output has stories
  last_tested: '2026-02-13T21:16:51.166001+00:00'
  test_status: pass
  test_notes: All acceptance criteria validated. Plan YAML has affected_stories and
    story_creation_tasks. UAT tasks reference story IDs with acceptance criteria.
    Implementation complete.
  tested_by_plan: 260214US_add_user_story_generation_phase_to_planner_agents
- id: US-CLI-PLAN-002
  name: Epics include UAT phase with acceptance criteria
  category: planning
  persona: Developer validating implementation quality
  priority: high
  starting_state:
  - Epic has build phase complete
  - User stories defined with acceptance criteria
  journey:
  - planner-test reads affected_stories from epic metadata
  - planner-test creates UAT phase with one ticket per story
  - Each UAT ticket includes story ID reference
  - Each UAT ticket includes acceptance criteria copied from story
  - Each UAT ticket includes verification steps (what to check, what to look for)
  - Each UAT ticket includes evidence collection requirements
  - orchestration-executor spawns test-user-simulator per story
  - test-user-simulator validates against story acceptance criteria
  - Results recorded via `agentic stories update <id> --status pass/fail`
  success_criteria:
  - Test plan has UAT phase
  - UAT tickets map 1:1 to story IDs
  - Each UAT ticket has explicit acceptance criteria
  - Evidence collection specified for each story validation
  testing:
    local: Create test plan and verify UAT phase has story criteria
    docker: Run planner-test and check UAT output structure
  last_tested: '2026-02-13T21:16:53.478809+00:00'
  test_status: pass
  test_notes: All acceptance criteria validated. Test plan has mandatory UAT phase.
    UAT tasks map 1:1 to stories with explicit acceptance criteria and evidence collection.
    Implementation complete.
  tested_by_plan: 260214US_add_user_story_generation_phase_to_planner_agents
