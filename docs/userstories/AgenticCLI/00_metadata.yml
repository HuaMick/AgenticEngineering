# AgenticCLI Module - User Stories Metadata

module:
  name: "AgenticCLI"
  description: |
    Command-line interface for AgenticEngineering. Provides the tool layer that
    Claude Code invokes for deterministic, well-understood operations.

    Serves as the boundary between agent reasoning and mechanical operations.
    Commands are deterministic and produce consistent output given consistent input.

  version: "1.0.0"
  scope: "CLI Tools for Agent Operations"

  principles:
    - "Deterministic Over Reasoning - CLI commands produce same output given same input"
    - "Minimal Surface Area - Each command does one thing well"
    - "Fail Fast, Fail Clearly - Validate inputs before execution"
    - "Evidence-Based Inclusion - Commands added when LangSmith shows friction"

