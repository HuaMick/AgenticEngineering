stories:
- id: US-CLI-010
  title: Initialize Epic with Worktree
  category: epic_management
  priority: critical
  as_a: developer starting a new feature
  i_want: to run a single command that creates both a worktree and an epic folder
  so_that: I have the correct workspace structure without manual naming or setup
  acceptance_criteria:
  - agentic epic init <branch> creates a git worktree at ../repo-<branch>
  - An epic folder is created in docs/epics/live/ with YYMMDDXX_description naming
  - The epic folder contains the required scaffold structure
  - The --description flag customizes the epic folder suffix
  - The --base flag specifies the base branch for the worktree
  - If worktree already exists, it is reused without error
  - Epic folder name is generated programmatically, not interpreted by agents
  - The new epic is imported into TinyDB immediately after folder creation
  related_commands:
  - agentic epic init <branch> --description <desc> --base <base>
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-011
  title: Scaffold Epic Folder Only
  category: epic_management
  priority: high
  as_a: developer who already has a worktree
  i_want: to scaffold an epic folder without creating a new worktree
  so_that: I can add planning structure to an existing workspace
  acceptance_criteria:
  - agentic epic scaffold <name> creates an epic folder in docs/epics/live/
  - The --worktree flag associates the epic with a specific worktree path
  - The scaffolded folder contains ticket_build.yml and orchestration placeholder
  - The command fails clearly if the epic folder already exists
  related_commands:
  - agentic epic scaffold <name>
  - agentic epic scaffold <name> --worktree <path>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-012
  title: View Epic Status
  category: epic_management
  priority: high
  as_a: developer reviewing current work
  i_want: to see the status of an epic at a glance
  so_that: I know how many tickets are completed, in progress, or pending
  acceptance_criteria:
  - agentic epic status shows epic name, phase count, ticket counts by status
  - Without arguments, auto-detects the active epic from the current branch
  - With a path argument, shows status for the specified epic
  - JSON output mode (-j) returns structured status data
  related_commands:
  - agentic epic status
  - agentic epic status <path>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-013
  title: List All Epics
  category: epic_management
  priority: high
  as_a: developer managing multiple features
  i_want: to see all active and completed epics
  so_that: I have visibility into all ongoing and past work
  acceptance_criteria:
  - agentic epic list shows all epics in docs/epics/live/ and docs/epics/completed/
  - Each epic shows name, status, and creation date
  - Epics are organized by status (live vs completed)
  - JSON output mode is supported for scripting
  - Epic data is sourced from TinyDB (via EpicService.list_epics) with YAML fallback
  - Each epic entry includes action_required field (blocked, needs_planning, execute, archive)
  - has_orchestration is determined by filesystem check for orchestration_*.mmd
  - Ticket counts (pending, in_progress, completed) are sourced from TinyDB when available
  architecture_notes:
  - cmd_list uses EpicService (TinyDB-first) for epic metadata and ticket counts
  - Orchestration MMD presence is checked from the filesystem, not TinyDB
  - Deferred epics show action_required="blocked" regardless of ticket state
  related_commands:
  - agentic epic list
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-014
  title: Validate Epic Structure
  category: epic_management
  priority: medium
  as_a: developer or agent
  i_want: to validate that an epic folder has the correct structure
  so_that: I catch structural issues before execution begins
  acceptance_criteria:
  - agentic epic validate checks for required files (ticket_build.yml, orchestration_*.mmd)
  - Reports missing or malformed files with clear messages
  - Returns exit code 0 on success, non-zero on failure
  - The --strict flag treats warnings as errors
  related_commands:
  - agentic epic validate <path>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-020
  title: List Epic Tickets
  category: ticket_management
  priority: critical
  as_a: developer or agent working on an epic
  i_want: to see all tickets in the current epic with their status
  so_that: I know what work remains and what is currently in progress
  acceptance_criteria:
  - agentic epic ticket list shows all tickets with ID, name, status, and phase
  - The --status flag filters by status (pending, in_progress, completed, all)
  - The --verbose flag shows full ticket details including guidance and criteria
  - Auto-detects the epic folder if --epic is not specified
  - JSON output is supported
  - Ticket data is sourced from TinyDB (repo.get_tickets) when TinyDB has matching data
  - Falls back to scanning ticket_*.yml files when TinyDB has no matching epic or ticket data
  - TinyDB results are only used when stored folder path matches the actual epic path
  architecture_notes:
  - cmd_ticket_list calls repo.get_tickets(epic_name, status_filter) for TinyDB path
  - YAML fallback iterates ticket_*.yml files and extracts tickets from phases structure
  - Source is indicated as "(via TinyDB)" or the YAML filename in verbose output
  related_commands:
  - agentic epic ticket list
  - agentic epic ticket list --status pending --verbose
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-021
  title: Get Current Ticket
  category: ticket_management
  priority: critical
  as_a: agent beginning a work iteration
  i_want: to know which ticket I should work on next
  so_that: I can start executing without manual ticket selection
  acceptance_criteria:
  - agentic epic ticket current returns the first in_progress ticket
  - If no in_progress ticket exists, returns the first pending ticket
  - Returns ticket ID, description, phase, guidance, and success criteria
  - Returns empty result with clear message when no tickets remain
  - JSON output includes all ticket metadata
  - Current ticket is sourced from TinyDB (repo.get_current_ticket) when available
  - Falls back to YAML scan if TinyDB has no matching epic or returns no current ticket
  - Ticket counts for completion detection use repo.get_ticket_counts from TinyDB
  - JSON response includes all_complete field when all tickets are done
  architecture_notes:
  - cmd_ticket_current calls repo.get_current_ticket(epic_name) for TinyDB path
  - Completion stats use repo.get_ticket_counts(epic_name) for total and completed counts
  - YAML fallback scans all ticket_*.yml files to find in_progress then pending tickets
  related_commands:
  - agentic epic ticket current
  - agentic epic ticket current --epic <path>
  related_agents:
  - orchestration-executor
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-022
  title: Start and Complete Tickets
  category: ticket_management
  priority: critical
  as_a: agent executing epic tickets
  i_want: to mark tickets as started and completed
  so_that: epic progress is tracked accurately across sessions
  acceptance_criteria:
  - agentic epic ticket start <id> sets status to in_progress
  - Start requires orchestration_*.mmd to exist (epic must be orchestrated)
  - agentic epic ticket complete <id> sets status to completed with timestamp
  - Status transitions are validated (cannot complete a pending ticket directly)
  - Ticket status is updated in TinyDB first (repo.update_ticket_status), then synced to YAML
  - YAML files are kept in sync via repo.sync_to_yaml for git visibility
  - Falls back to direct YAML mutation when TinyDB path fails or has no matching epic
  - Multiple agents cannot start the same ticket simultaneously (FileLock protection)
  - Completing the last ticket does NOT trigger auto-archive (epic stays in live/)
  architecture_notes:
  - cmd_ticket_start and cmd_ticket_complete call _update_ticket_status internally
  - _update_ticket_status is TinyDB-first: calls repo.update_ticket_status then repo.sync_to_yaml
  - FileLock is applied at the TinyDB level via EpicRepository._lock
  related_commands:
  - agentic agent epic ticket start <id>
  - agentic agent epic ticket complete <id>
  related_agents:
  - orchestration-executor
  - build-python
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: 'Validated by plan 260222RA: ticket start/complete work correctly, no auto-archive side effects'
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-023
  title: Add Tickets to Epic
  category: ticket_management
  priority: high
  as_a: planner agent discovering new work
  i_want: to add tickets to an existing epic
  so_that: new requirements are captured within the epic structure
  acceptance_criteria:
  - agentic epic ticket add <description> creates a new pending ticket
  - The --phase flag assigns the ticket to a specific phase
  - The --id flag allows custom ticket IDs
  - The --priority flag sets ticket priority (low, medium, high)
  - Without --phase, the ticket is added to the last phase
  - Auto-generated IDs follow the phase_sequence convention
  - Ticket is added via TinyDB (repo.add_ticket) first, then synced to YAML
  - Falls back to direct YAML mutation when TinyDB path fails or has no matching epic
  - YAML is synced via repo.sync_to_yaml after TinyDB insertion for git visibility
  - If no phases exist in TinyDB, an "Ad-hoc Tickets" phase is created automatically
  architecture_notes:
  - cmd_ticket_add calls repo.add_ticket(epic_name, phase_name, ticket_dict) for TinyDB path
  - Phase lookup uses repo.get_phase and repo.list_phases to find target phase
  - JSON output indicates whether ticket was added via "TinyDB" or "YAML"
  related_commands:
  - agentic epic ticket add <desc>
  - agentic epic ticket add <desc> --phase P2 --priority high
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-024
  title: Update Ticket Status with Notes
  category: ticket_management
  priority: high
  as_a: agent reporting on ticket progress
  i_want: to update a ticket's status and add completion notes
  so_that: the epic captures not just status but context about the work done
  acceptance_criteria:
  - agentic epic ticket update <id> --status <status> changes the ticket status
  - 'Supports statuses: pending, in_progress, completed, blocked'
  - The --note flag adds text to the ticket record
  - When marking completed, a timestamp is automatically recorded
  - Status transitions are validated
  - Ticket status is updated in TinyDB first (repo.update_ticket_status), then synced to YAML
  - Falls back to direct YAML mutation when TinyDB path fails or has no matching epic
  - Updating status to completed does NOT trigger auto-archive (epic stays in live/)
  architecture_notes:
  - cmd_ticket_update calls repo.update_ticket_status(epic_name, ticket_id, new_status) for TinyDB path
  - Transition validation occurs both in TinyDB path and YAML fallback path
  - Notes are stored in ticket.completion_note field in YAML; TinyDB sync carries them through
  related_commands:
  - agentic agent epic ticket update <id> --status completed --note 'Tests passing'
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: 'Validated by plan 260222RA: ticket update works correctly, no auto-archive side effects'
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-025
