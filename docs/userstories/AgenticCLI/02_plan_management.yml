- id: US-CLI-015
  title: Manage Epic Phases
  category: phase_management
  priority: high
  as_a: planner agent structuring an epic
  i_want: to add, list, and update phases within an epic
  so_that: the epic has clear execution milestones
  acceptance_criteria:
  - agentic epic phase add --id P1 --name 'Name' creates a new phase
  - The --description flag adds scope information to the phase
  - agentic epic phase list shows all phases with status and ticket counts
  - agentic epic phase update <id> --status in_progress changes phase status
  - Phase IDs are unique within an epic
  - Phase add uses TinyDB (repo.add_phase) first, then syncs to YAML
  - Phase update uses TinyDB (repo.update_phase) first, then syncs to YAML
  - Phase list sources data from TinyDB (repo.get_epic) when available
  - All phase operations fall back to direct ticket_build.yml mutation when TinyDB path fails
  - Status transitions are validated in both TinyDB and YAML fallback paths
  architecture_notes:
  - cmd_phase_add calls repo.add_phase(epic_name, phase_dict) for TinyDB path
  - cmd_phase_update calls repo.update_phase(epic_name, phase_id, updates) for TinyDB path
  - cmd_phase_list reads from repo.get_epic(epic_name).phases for TinyDB path
  - YAML sync via repo.sync_to_yaml is called after successful TinyDB mutations
  related_commands:
  - agentic epic phase add --id P1 --name 'Core Implementation'
  - agentic epic phase list
  - agentic epic phase update P1 --status completed
  last_tested: "2026-02-24"
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-CLI-016
  title: Generate Orchestration MMD
  category: orchestration
  priority: high
  as_a: planner agent finalizing an epic
  i_want: to generate a Mermaid flowchart from the epic YAML files
  so_that: the execution order and agent routing are defined for the executor
  acceptance_criteria:
  - agentic epic orchestration generate creates an orchestration_*.mmd file
  - The MMD includes phase nodes with AGENT_ROUTING metadata
  - Test phases include test-fix loop structure
  - Feedback triggers are defined for failure handling
  - The --force flag overwrites existing MMD files
  - CLI commands are embedded as comments for agent reference
  related_commands:
  - agentic epic orchestration generate
  - agentic epic orchestration validate
  related_agents:
  - planner-orchestration
  - orchestration-executor
  last_tested: null
