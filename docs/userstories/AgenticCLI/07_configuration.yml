stories:
- id: US-CLI-070
  title: Initial CLI Setup
  category: configuration
  priority: critical
  as_a: developer installing AgenticCLI for the first time
  i_want: to run a setup wizard that configures the CLI
  so_that: I have a working configuration without manual file editing
  acceptance_criteria:
  - agentic setup runs an interactive setup wizard
  - The wizard configures required settings (project paths, preferences)
  - Configuration is stored in ~/.config/agenticcli/
  - The --force flag re-runs setup even if already configured
  - Setup validates that dependencies are available
  related_commands:
  - agentic setup
  - agentic setup --force
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-071
  title: Health Check
  category: configuration
  priority: high
  as_a: developer troubleshooting CLI issues
  i_want: to run a health check that validates CLI dependencies and configuration
  so_that: I can quickly identify what is missing or misconfigured
  acceptance_criteria:
  - agentic health checks CLI installation, dependencies, and configuration
  - Reports the status of each component (OK, WARNING, ERROR)
  - Includes version checks for python3, uv, git, and claude CLI
  - Reports configuration file presence and validity
  - Suggests fixes for any issues found
  related_commands:
  - agentic health
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-072
  title: Manage Configuration
  category: configuration
  priority: high
  as_a: developer customizing CLI behavior
  i_want: to get, set, list, and delete configuration values
  so_that: I can adjust CLI settings without editing config files directly
  acceptance_criteria:
  - agentic config show displays the current configuration
  - agentic config get <key> retrieves a single value
  - agentic config set <key> <value> stores a value
  - agentic config list shows all key-value pairs
  - agentic config delete <key> removes a value
  - agentic config clear --force removes all configuration
  - agentic config show-path shows the config file location
  related_commands:
  - agentic config show
  - agentic config set langsmith.api_key <key>
  - agentic config list
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-073
  title: Manage Preferences
  category: configuration
  priority: medium
  as_a: developer adjusting personal preferences
  i_want: to manage preferences through an alternative interface
  so_that: I have a familiar key-value interface for personal settings
  acceptance_criteria:
  - agentic prefs get/set/list/delete/clear work as expected
  - Preferences are stored alongside configuration
  - prefs clear requires --force for safety
  related_commands:
  - agentic prefs set output.format json
  - agentic prefs list
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-CLI-074
  title: Update and Rebuild CLI
  category: maintenance
  priority: medium
  as_a: developer keeping CLI current
  i_want: to update or rebuild the CLI from source
  so_that: I always have the latest features and fixes
  acceptance_criteria:
  - agentic update runs uv sync to reinstall from source
  - agentic rebuild performs a full rebuild (clean + rebuild + reinstall)
  - Both commands report success or failure clearly
  - Version number is updated after rebuild
  related_commands:
  - agentic update
  - agentic rebuild
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
