area: story_management
description: "Story find and health reporting"
stories:
- id: US-STR-001
  title: Story Discovery and Coverage
  category: story_management
  priority: high
  absorbs: [US-STR-009, US-PLN-071]
  description: As a developer assessing story inventory and test-to-story traceability, I want to search for user stories,
    check health summaries, and cross-reference pytest markers against the story inventory, so that I can understand the
    state of my stories and identify coverage gaps.
  prerequisites: []
  inherits_patterns:
  - id: PAT-CLI-001
    bind:
      command: "agentic stories find"
      expected_keys: [id, title, project, category]
  - id: PAT-CLI-002
    bind:
      command: "agentic stories find"
      filter_field: "project"
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic stories find searches docs/userstories/ directory with --project filter and --changes filter
  - step: 2
    when: the feature is used
    then:
    - JSON output supported with --json flag on find and health commands
  - step: 3
    when: the feature is used
    then:
    - agentic stories health shows pass/fail/skip/untested counts with --project filter
  - step: 4
    when: the feature is used
    then:
    - agentic stories untested lists stories with test_status=untested
  - step: 5
    when: the feature is used
    then:
    - --coverage flag activates pytest marker scanning mode
  - step: 6
    when: the feature is used
    then:
    - Regex extracts story IDs in US-XXX-NNN format from @pytest.mark.story marker arguments
  - step: 7
    when: the feature is used
    then:
    - 'Output includes: covered_by_markers count, uncovered count, orphan_markers list, coverage_pct'
  - step: 8
    when: the feature is used
    then:
    - Orphan markers (referencing non-existent stories) are identified and listed
  - step: 9
    when: the feature is used
    then:
    - STORY_COVERAGE_INCOMPLETE feedback trigger fires when uncovered set is non-empty
  - step: 10
    when: max iterations reached with uncovered stories
    then:
    - Phase transitions to blocked state with coverage report
  related_commands:
  - agentic stories find
  - agentic stories find --project AgenticCLI
  - agentic stories find --changes src/agenticcli/cli.py
  - agentic st find -p my-project
  - agentic stories health
  - agentic stories health --project AgenticCLI
  - agentic stories health --coverage
  - agentic stories health --coverage --project AgenticCLI
  - agentic stories untested
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/stories.py
  - modules/AgenticGuidance/src/agenticguidance/services/story.py
  related_agents:
  - test-builder
  - planner-test
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
