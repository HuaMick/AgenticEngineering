area: story_coverage
description: "Story coverage via ticket-to-story traceability"
stories:
- id: US-STR-011
  title: Ticket --story-ids CLI Flag
  category: story_management
  priority: medium
  description: As a planner agent creating or updating tickets via CLI, I want to specify story IDs when adding or updating
    tickets via the --story-ids flag, so that ticket-to-story traceability is established at planning time through the CLI.
  prerequisites: []
  inherits_patterns:
  - id: PAT-DAT-002
    bind:
      entity: "Ticket"
      repository: "TinyDB"
      operations: ["create", "update"]
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic ticket add supports --story-ids flag (comma-separated list)
  - step: 2
    when: the feature is used
    then:
    - agentic epic ticket update supports --story-ids flag
  - step: 3
    when: the feature is used
    then:
    - Story IDs are validated against US-XXX-NNN format
  - step: 4
    when: the feature is used
    then:
    - Story IDs are persisted to the Ticket.story_ids field in TinyDB
  - step: 5
    when: the feature is used
    then:
    - JSON output includes story_ids in ticket data
  - step: 6
    when: the feature is used
    then:
    - Multiple story IDs can be specified for a single ticket
  related_commands:
  - agentic epic ticket add --story-ids US-STR-001,US-STR-002
  - agentic epic ticket update T1 --story-ids US-GDN-080
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/epic.py
  related_stories: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
