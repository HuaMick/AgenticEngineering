area: story_coverage
description: "Story coverage via pytest markers, fences, and planning traceability"
stories:
- id: US-STR-009
  title: Story Coverage Report via Pytest Markers
  category: story_management
  priority: high
  description: As a developer assessing test-to-story traceability, I want agentic stories report --coverage to cross-reference
    pytest markers against the story inventory, so that I can see which stories have co-located test markers and identify
    coverage gaps.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - --coverage flag activates marker scanning mode in cmd_report()
  - step: 2
    when: the feature is used
    then:
    - _scan_pytest_story_markers() scans test directories using grep for @pytest.mark.story
  - step: 3
    when: the feature is used
    then:
    - Regex extracts story IDs in US-XXX-NNN format from marker arguments
  - step: 4
    when: the feature is used
    then:
    - 'Output includes: covered_by_markers count, uncovered count, orphan_markers list, coverage_pct'
  - step: 5
    when: the feature is used
    then:
    - Orphan markers (referencing non-existent stories) are identified and listed
  - step: 6
    when: the feature is used
    then:
    - JSON output includes marker_coverage section when --coverage is active
  - step: 7
    when: the feature is used
    then:
    - Text output displays coverage percentage and uncovered story list
  related_commands:
  - agentic agent stories report --coverage
  - agentic agent stories report --coverage --project AgenticCLI
  related_agents:
  - planner-test
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/stories.py
  related_stories:
  - US-STR-006
  - US-GDN-077
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-STR-010
  title: Fence 4 - Pytest Story Marker Coverage
  category: story_management
  priority: high
  description: As a developer running pre-flight fence checks on an epic, I want _check_fences() to include Fence 4 that validates
    pytest story marker coverage, so that epics are flagged when affected stories lack corresponding test markers.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Fence 4 (Pytest Story Marker Coverage) added to _check_fences() in epic.py
  - step: 2
    when: the feature is used
    then:
    - Scans test directories for @pytest.mark.story markers
  - step: 3
    when: the feature is used
    then:
    - Compares marker IDs against affected_stories from TinyDB epic metadata
  - step: 4
    when: the feature is used
    then:
    - Returns PASS if all affected stories have markers
  - step: 5
    when: the feature is used
    then:
    - Returns WARN with uncovered story list if any stories lack markers
  - step: 6
    when: the feature is used
    then:
    - Returns WARN if no affected stories to check
  - step: 7
    when: the feature is used
    then:
    - Fence 4 runs alongside existing Fences 1-3
  related_commands:
  - agentic epic validate --check-fences
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/epic.py
  related_stories:
  - US-PLN-079
  - US-PLN-081
  - US-GDN-077
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-STR-011
  title: Ticket --story-ids CLI Flag
  category: story_management
  priority: medium
  description: As a planner agent creating or updating tickets via CLI, I want to specify story IDs when adding or updating
    tickets via the --story-ids flag, so that ticket-to-story traceability is established at planning time through the CLI.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic ticket add supports --story-ids flag (comma-separated list)
  - step: 2
    when: the feature is used
    then:
    - agentic epic ticket update supports --story-ids flag
  - step: 3
    when: the feature is used
    then:
    - Story IDs are validated against US-XXX-NNN format
  - step: 4
    when: the feature is used
    then:
    - Story IDs are persisted to the Ticket.story_ids field in TinyDB
  - step: 5
    when: the feature is used
    then:
    - JSON output includes story_ids in ticket data
  - step: 6
    when: the feature is used
    then:
    - Multiple story IDs can be specified for a single ticket
  related_commands:
  - agentic epic ticket add --story-ids US-STR-001,US-STR-002
  - agentic epic ticket update T1 --story-ids US-GDN-077
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/epic.py
  related_stories:
  - US-SET-029
  - US-STR-005
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-STR-012
  title: Planner-Design Agent Solution Architecture Scaffolding
  category: planning
  priority: critical
  description: As a planner-design agent receiving an objective and affected stories, I want to produce a high-level solution
    architecture skeleton mapping stories to phases, so that downstream domain planners have shared context and cross-phase
    contracts instead of working blind.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - planner-design agent has manifest.yml, process.yml, and inputs.yml in agents/planner/planner-design/
  - step: 2
    when: the feature is used
    then:
    - Agent receives affected_stories as a required input (not discovered mid-process)
  - step: 3
    when: the feature is used
    then:
    - Agent defines phase skeleton with ordering constraints and agent assignments
  - step: 4
    when: the feature is used
    then:
    - Cross-phase contracts define shared interfaces between phases
  - step: 5
    when: the feature is used
    then:
    - Output is structured inputs consumable by planner-build, planner-test, and planner-audit
  - step: 6
    when: the feature is used
    then:
    - Agent runs after story discovery (build-story-writer) and before domain planners
  - step: 7
    when: the feature is used
    then:
    - 'Workflow handover: build-story-writer -> planner-explore -> domain planners'
  related_agents:
  - planner-design
  - orchestration-planning
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-design/manifest.yml
  - modules/AgenticGuidance/agents/planner/planner-design/process.yml
  - modules/AgenticGuidance/agents/planner/planner-design/inputs.yml
  related_stories:
  - US-STR-013
  - US-PLN-027
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-STR-013
  title: Planner-Design Story-to-Phase Traceability Matrix
  category: planning
  priority: high
  description: As a planner-design agent producing phase skeletons, I want to create a traceability matrix mapping each affected
    story to implementation phases, so that every story has explicit phase coverage and no story is silently dropped during
    planning.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Process step loads user story content (journey, success criteria) for each affected story
  - step: 2
    when: the feature is used
    then:
    - Stories are clustered by domain theme (related changes, shared files, component boundaries)
  - step: 3
    when: the feature is used
    then:
    - Each cluster maps to one or more phases in the skeleton
  - step: 4
    when: the feature is used
    then:
    - Traceability matrix shows story_id -> phase_id bidirectional mapping
  - step: 5
    when: the feature is used
    then:
    - Unmapped stories are flagged as planning gaps
  - step: 6
    when: the feature is used
    then:
    - Matrix is included in structured output for downstream planners
  related_agents:
  - planner-design
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-design/process.yml
  related_stories:
  - US-STR-012
  - US-STR-014
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-STR-014
  title: Planner-Audit Story Traceability Audit Step
  category: planning
  priority: high
  description: As a planner-audit agent reviewing epic compliance, I want a dedicated story traceability audit step that checks
    bidirectional ticket-to-story linkage, so that epics cannot pass audit without demonstrating full story coverage.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Forward traceability: each ticket''s story_ids references real stories in affected_stories'
  - step: 2
    when: the feature is used
    then:
    - 'Reverse traceability: each affected story has at least one ticket referencing it AND/OR a pytest marker'
  - step: 3
    when: the feature is used
    then:
    - Pytest marker check scans test files for @pytest.mark.story markers matching story IDs
  - step: 4
    when: the feature is used
    then:
    - Compliance report includes story_traceability section with direction, entity_id, findings
  - step: 5
    when: the feature is used
    then:
    - Unreferenced stories flagged as audit findings
  - step: 6
    when: an error condition occurs
    then:
    - Orphan ticket story_ids (referencing non-existent stories) flagged as errors
  related_agents:
  - planner-audit
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-audit/process.yml
  related_stories:
  - US-PLN-040
  - US-SET-029
  - US-GDN-077
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-STR-015
  title: Planner-Test UAT Story ID Requirement
  category: planning
  priority: high
  description: As a planner-test agent creating test phase plans, I want UAT task templates to require story_id as a mandatory
    field, so that every UAT task is explicitly linked to the user story it validates.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - planner-test process.yml includes story_id requirement in UAT task template
  - step: 2
    when: the feature is used
    then:
    - story-coverage-loop definition enables post-test marker coverage checks
  - step: 3
    when: an error condition occurs
    then:
    - Loop type triggers STORY_COVERAGE_INCOMPLETE feedback when markers are missing
  - step: 4
    when: the feature is used
    then:
    - Maximum iteration limit (default 3) prevents infinite re-runs
  - step: 5
    when: the feature is used
    then:
    - Exit condition is all affected stories having @pytest.mark.story markers in test files
  - step: 6
    when: the feature is used
    then:
    - Escalation after max iterations with coverage report
  related_agents:
  - planner-test
  - test-builder
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-test/process.yml
  related_stories:
