# ==============================================================================
# RemoteAgents User Stories - Metadata
# ==============================================================================
# Version: 1.1
# Created: 2025-12-05
# Updated: 2025-12-10
# Purpose: UAT testing for RemoteAgents remote terminal access system
#
# OVERVIEW:
#   RemoteAgents enables controlling Claude Code terminal sessions from a web
#   browser via end-to-end encrypted WebSocket communication through a relay.
#
# TESTING APPROACH:
#   - agent-blind-test: Test from documentation only (no code inspection)
#   - Three-layer testing: local, docker, integration
#   - Focus on user journeys and real-world scenarios
#
# ==============================================================================

version: "1.1"
created: "2025-12-05"
updated: "2025-12-10"
product: RemoteAgents
description: |
  Remote terminal access system for AI coding agents.
  Enables controlling Claude Code CLI sessions from Flutter Web via E2E encrypted relay.

# Priority Definitions
priorities:
  CRITICAL:
    description: "Core functionality that MUST work. Failures block all usage."
    pass_rate_required: 100%
  HIGH:
    description: "Important features for typical usage. Failures significantly impact UX."
    pass_rate_required: 100%
  MEDIUM:
    description: "Secondary features. Failures are inconvenient but workarounds exist."
    pass_rate_required: 95%
  LOW:
    description: "Edge cases and advanced scenarios. Failures are minor issues."
    pass_rate_required: 90%

# User Personas
personas:
  - id: desktop_user
    name: "Desktop Developer"
    description: "Developer running Claude Code on local machine, wants remote access"
    goals:
      - Start remote session from CLI
      - Share pairing code with web client
      - Continue coding via web terminal

  - id: web_user
    name: "Web Client User"
    description: "User accessing terminal from Flutter web interface"
    goals:
      - Enter pairing code to connect
      - Interact with remote terminal
      - Resize terminal to fit screen

  - id: platform_operator
    name: "Platform Operator"
    description: "Engineer deploying and monitoring relay service"
    goals:
      - Deploy relay service reliably
      - Monitor health and sessions
      - Handle failures gracefully

# Categories
categories:
  - id: session
    name: "Session Management"
    description: "Creating, pairing, and managing remote sessions"
    story_count: 8

  - id: terminal_io
    name: "Terminal I/O"
    description: "Terminal input, output, and control"
    story_count: 6

  - id: encryption
    name: "Encryption"
    description: "End-to-end encryption and key exchange"
    story_count: 4

  - id: reliability
    name: "Connection Reliability"
    description: "Keepalive, reconnection, and failure handling"
    story_count: 6

  - id: relay_api
    name: "Relay API"
    description: "REST and WebSocket API operations"
    story_count: 5

  - id: terminal_cli
    name: "Terminal CLI"
    description: "Desktop terminal service CLI operations"
    story_count: 4

  - id: error_handling
    name: "Error Handling"
    description: "Error conditions and recovery - covers all 13+ error codes in protocol"
    story_count: 12

  - id: operations
    name: "Operations & Monitoring"
    description: "Logging, health checks, and operational monitoring"
    story_count: 5

  - id: deployment
    name: "Deployment & Configuration"
    description: "Docker deployment and environment configuration"
    story_count: 5

  - id: connection_state
    name: "Connection State Management"
    description: "WebSocket connection lifecycle and state transitions"
    story_count: 5

  - id: protocol
    name: "Protocol & Message Types"
    description: "Message registry, versioning, and protocol evolution"
    story_count: 5

# Test Environment Requirements
environments:
  local:
    description: "Direct execution on host machine"
    requirements:
      - Python 3.11+
      - UV package manager
      - Network connectivity (localhost)
    purpose: "Validate core functionality"

  docker:
    description: "Docker container execution"
    requirements:
      - Docker installed
      - Pre-built agent-remote image
    purpose: "Validate containerized deployment"

  integration:
    description: "Multi-service integration testing"
    requirements:
      - Relay service running
      - Terminal service available
      - WebSocket connectivity
    purpose: "Validate end-to-end flows"

