stories:
- id: US-LANGSMITH-020
  title: Analyze Friction Patterns
  category: friction_detection
  priority: critical
  as_a: guidance maintainer improving agent behavior
  i_want: to detect friction patterns from LangSmith traces
  so_that: I can identify where agents struggle and improve guidance
  acceptance_criteria:
  - agentic langsmith friction analyzes traces for friction patterns
  - The --project flag specifies which project to analyze
  - 'The --limit flag controls max runs to analyze (default: 100)'
  - 'The --lookback-days flag sets timeframe (default: 7)'
  - Results show pattern type, severity, frequency, and description
  - Severity breakdown categorizes patterns as high, medium, or low
  - The --json flag outputs machine-readable JSON
  - Analysis is performed across all 6 friction pattern types
  related_commands:
  - agentic ls friction --project agenticengineering-main
  - agentic ls friction --project my-project --lookback-days 14 --limit 200
  related_agents:
  - orchestration-friction
  - teacher-trace-diagnostics
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  - modules/AgenticLangSmith/src/agenticlangsmith/friction.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-LANGSMITH-021
  title: Detect Excessive Retries (FP-001)
  category: friction_detection
  priority: high
  as_a: guidance maintainer
  i_want: to detect when agents retry the same operation multiple times
  so_that: I can add clearer error handling guidance or retry limits
  acceptance_criteria:
  - Pattern detects 3+ consecutive errors in same session
  - Evidence includes session ID, retry count, and run IDs
  - Severity is classified based on frequency across sessions
  - Suggested resolution is 'Add clearer error handling guidance or retry limits'
  - Pattern code is FP-001
  related_commands:
  - agentic ls friction --project my-project
  related_agents:
  - orchestration-friction
  related_files:
  - modules/AgenticLangSmith/src/agenticlangsmith/friction.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-LANGSMITH-022
  title: Detect Exploration Drift (FP-002)
  category: friction_detection
  priority: high
  as_a: guidance maintainer
  i_want: to detect when agents spend too much time exploring files
  so_that: I can add path hints or signposts to guide agents more efficiently
  acceptance_criteria:
  - Pattern detects >60% exploration tools (Glob, Grep, Read, Task) with 10+ tool
    calls
  - Evidence includes session ID, exploration call count, total tool calls, and ratio
  - Severity is classified based on frequency across sessions
  - Suggested resolution is 'Add path hints or signposts to process files'
  - Pattern code is FP-002
  related_commands:
  - agentic ls friction --project my-project
  related_agents:
