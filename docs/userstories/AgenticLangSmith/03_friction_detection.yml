- id: US-LANGSMITH-027
  title: Session-Based Friction Filtering
  category: friction_detection
  priority: medium
  as_a: developer analyzing recent sessions
  i_want: to filter friction analysis to specific sessions
  so_that: I can focus on recent behavior and ignore historical noise
  acceptance_criteria:
  - The --sessions flag limits analysis to N most recent sessions
  - The --min-affected flag requires patterns to affect minimum number of sessions
  - Patterns are filtered to only show those affecting selected sessions
  - Session-based filtering works with all pattern types
  related_commands:
  - agentic ls friction --project my-project --sessions 5 --min-affected 2
  related_agents:
  - orchestration-friction
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-LANGSMITH-028
  title: Friction Export and Grouping
  category: friction_detection
  priority: medium
  as_a: team lead presenting friction analysis to the team
  i_want: to export friction reports in various formats with grouping
  so_that: I can share findings and organize by severity or type
  acceptance_criteria:
  - The --export flag supports markdown, yaml, and json formats
  - The --group-by flag supports severity, type, and session grouping
  - Markdown export includes full evidence and recommendations
  - YAML export preserves complete data structure
  - Grouped output organizes patterns hierarchically
  related_commands:
  - agentic ls friction --project my-project --export markdown --group-by severity
  - agentic ls friction --project my-project --export yaml > report.yml
  related_agents:
  - orchestration-friction
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
