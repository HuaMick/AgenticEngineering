- id: US-LANGSMITH-043
  title: Session Duration and Timeline Analysis
  category: cost_and_performance
  priority: medium
  as_a: developer analyzing session efficiency
  i_want: to see session duration and run timeline
  so_that: I can understand how long sessions take and identify inefficiencies
  acceptance_criteria:
  - agentic langsmith sessions lists sessions with run counts and start times
  - agentic langsmith session-analyze shows session duration
  - Session timeline shows runs sorted chronologically
  - Duration is calculated from first to last run
  - Timeline includes run types, latencies, and status
  related_commands:
  - agentic ls sessions --project my-project
  - agentic ls session-analyze <id>
