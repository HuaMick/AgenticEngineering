- id: US-LANGSMITH-045
  title: Export Performance Data for Analysis
  category: cost_and_performance
  priority: medium
  as_a: data analyst building custom dashboards
  i_want: to export performance data in CSV and JSON formats
  so_that: I can analyze trends in external tools like Excel or Jupyter
  acceptance_criteria:
  - Session analysis supports --export csv and --export json
  - CSV export includes all relevant fields in tabular format
  - JSON export preserves complete data structure
  - The --json flag works across all commands for machine-readable output
  - Exported data is well-formatted and complete
  related_commands:
  - agentic ls session-analyze <id> --export csv > session.csv
  - agentic ls stats --project my-project --json > stats.json
  related_agents:
  - builder-automation
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-LANGSMITH-046
  title: Batch Search for Performance Issues
  category: cost_and_performance
  priority: medium
  as_a: developer investigating specific performance issues
  i_want: to search runs by regex pattern across inputs, outputs, and errors
  so_that: I can find all occurrences of specific errors or behaviors
  acceptance_criteria:
  - agentic langsmith batch-search <pattern> searches across runs
  - The --field flag scopes search to inputs, outputs, error, or all
  - The --type and --status flags filter the run set
  - The --group-by flag organizes results by session, type, or status
  - The --export flag outputs to JSON or CSV
  - Date range filtering is supported via --since and --until
  - Search results include snippets showing match context
  related_commands:
  - agentic ls batch-search 'timeout.*exceeded' --project my-project
  - agentic ls batch-search 'retry' --project my-project --field error --export csv
  related_agents:
  - teacher-trace-diagnostics
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
