stories:
- id: US-LANGSMITH-040
  title: Track Token Usage Across Sessions
  category: cost_and_performance
  priority: high
  as_a: team lead managing API costs
  i_want: to track token usage across all sessions and projects
  so_that: I can monitor and optimize LLM costs
  acceptance_criteria:
  - Project stats show total_tokens across all runs
  - Individual run details show prompt_tokens and completion_tokens
  - Token counts are captured in traces automatically
  - Token data is available via CLI and Python API
  - Token statistics can be aggregated per project
  related_commands:
  - agentic ls stats --project my-project
  - agentic ls run <id>
  related_agents:
  - teacher-trace-diagnostics
  related_files:
  - modules/AgenticLangSmith/src/agenticlangsmith/service.py
  - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-LANGSMITH-041
  title: Measure Latency and Performance
  category: cost_and_performance
  priority: high
  as_a: developer optimizing agent performance
  i_want: to measure latency for individual runs and average latency per project
  so_that: I can identify bottlenecks and optimize slow operations
  acceptance_criteria:
  - Individual runs show latency in milliseconds
  - Project stats show avg_latency across all runs
  - The --timing flag shows detailed timing breakdown
  - Timing breakdown includes total time, execution time, and overhead
  - Latency data is available via CLI and Python API
  - Latency statistics can be filtered by run type
  related_commands:
