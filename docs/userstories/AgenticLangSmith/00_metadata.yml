metadata:
  module: "AgenticLangSmith"
  version: "1.0"
  last_updated: "2026-02-07"
  purpose: "User stories for LangSmith observability integration with Claude Code"

  overview: |
    AgenticLangSmith provides comprehensive observability and friction analysis for
    Claude Code agent interactions through LangSmith trace collection and analysis.

    Key capabilities:
    - Automatic trace capture via stop hooks
    - Python API for trace querying and analysis
    - Friction pattern detection (6 pattern types)
    - Resolution recommendations
    - CLI integration for all functionality
    - Multi-worktree support with per-worktree configuration

  story_categories:
    - name: "Trace Collection"
      description: "Automatic trace capture during Claude Code sessions"
      story_files:
        - "01_trace_collection.yml"

    - name: "Query and Analysis"
      description: "Querying traces and analyzing runs via Python API and CLI"
      story_files:
        - "02_query_and_analysis.yml"

    - name: "Friction Detection"
      description: "Automated detection of agent friction patterns"
      story_files:
        - "03_friction_detection.yml"

    - name: "Resolution Planning"
      description: "Generating actionable recommendations from friction analysis"
      story_files:
        - "04_resolution_planning.yml"

    - name: "Cost and Performance"
      description: "Tracking token usage, latency, and agent performance"
      story_files:
        - "05_cost_and_performance.yml"

    - name: "Integration and Configuration"
      description: "Setup, configuration, and integration with existing workflows"
      story_files:
        - "06_integration_and_config.yml"

  conventions: |
    Story IDs use prefix US-LANGSMITH-XXX
    Each story follows as_a / i_want / so_that format
    Priority levels: critical > high > medium > low
    Related commands link to CLI usage
    Related agents reference AgenticGuidance definitions

  related_modules:
    - "AgenticCLI (for CLI commands)"
    - "AgenticGuidance (for resolution recommendations)"
