# User Stories: Resolution Planning
# Generating actionable recommendations from friction analysis

stories:
  - id: "US-LANGSMITH-030"
    title: "Generate Resolution Recommendations"
    category: "resolution_planning"
    priority: "critical"
    as_a: "guidance maintainer addressing friction"
    i_want: "actionable recommendations for fixing detected friction"
    so_that: "I know exactly what to change to improve agent behavior"
    acceptance_criteria:
      - "The --recommend flag generates resolution recommendations"
      - "Each recommendation includes pattern type, resolution type, and description"
      - "Recommendations specify target locations (files/directories to update)"
      - "Recommendations include suggested changes (specific actions to take)"
      - "Recommendations are prioritized by severity (high, medium, low)"
      - "Resolution types map to GUIDANCE_UPDATE, CLI_OFFLOAD, or ASSET_UPDATE"
    related_commands:
      - "agentic ls friction --project my-project --recommend"
    related_agents:
      - "orchestration-friction"
      - "planner-build"
      - "planner-teach"
    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"
      - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"

  - id: "US-LANGSMITH-031"
    title: "GUIDANCE_UPDATE Recommendations"
    category: "resolution_planning"
    priority: "high"
    as_a: "guidance maintainer"
    i_want: "recommendations for updating process.yml and inputs.yml files"
    so_that: "I can add missing context, error handling, and path hints"
    acceptance_criteria:
      - "FP-001 (Excessive Retries) recommends GUIDANCE_UPDATE"
      - "FP-002 (Exploration Drift) recommends GUIDANCE_UPDATE"
      - "FP-003 (Missing Context) recommends GUIDANCE_UPDATE"
      - "Target locations include modules/AgenticGuidance/agents/*/process.yml"
      - "Suggested changes are specific to the pattern type"
      - "Recommendations reference planner-teach for implementation"
    related_commands:
      - "agentic ls friction --project my-project --recommend"
    related_agents:
      - "planner-teach"
      - "teacher-process"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"

  - id: "US-LANGSMITH-032"
    title: "CLI_OFFLOAD Recommendations"
    category: "resolution_planning"
    priority: "high"
    as_a: "CLI developer"
    i_want: "recommendations for creating new CLI commands"
    so_that: "I can automate repeated patterns and enforce conventions"
    acceptance_criteria:
      - "FP-005 (Convention Violations) recommends CLI_OFFLOAD"
      - "FP-006 (Automatable Patterns) recommends CLI_OFFLOAD"
      - "Target locations include modules/AgenticCLI/src/agenticcli/commands/"
      - "Suggested changes describe the CLI command to create"
      - "Recommendations reference planner-build for implementation"
    related_commands:
      - "agentic ls friction --project my-project --recommend"
    related_agents:
      - "planner-build"
      - "builder-cli"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"

  - id: "US-LANGSMITH-033"
    title: "ASSET_UPDATE Recommendations"
    category: "resolution_planning"
    priority: "high"
    as_a: "guidance maintainer"
    i_want: "recommendations for adding examples and schema documentation"
    so_that: "I can help agents produce correct outputs"
    acceptance_criteria:
      - "FP-004 (Schema Violations) recommends ASSET_UPDATE"
      - "Target locations include modules/AgenticGuidance/assets/examples/"
      - "Target locations include modules/AgenticGuidance/assets/specifications/"
      - "Suggested changes specify what examples or schemas to add"
      - "Recommendations reference planner-teach for implementation"
    related_commands:
      - "agentic ls friction --project my-project --recommend"
    related_agents:
      - "planner-teach"
      - "teacher-examples"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"

  - id: "US-LANGSMITH-034"
    title: "Next Steps Generation"
    category: "resolution_planning"
    priority: "medium"
    as_a: "team lead organizing friction resolution work"
    i_want: "next steps that guide me to the right planning workflows"
    so_that: "I can efficiently schedule and execute the recommended changes"
    acceptance_criteria:
      - "Next steps count recommendations by resolution type"
      - "GUIDANCE_UPDATE next steps reference planner-teach workflow"
      - "CLI_OFFLOAD next steps reference planner-build workflow"
      - "ASSET_UPDATE next steps reference planner-teach workflow"
      - "Next steps are included in friction report output"
      - "Next steps are actionable and specific"
    related_commands:
      - "agentic ls friction --project my-project --recommend"
    related_agents:
      - "planner-teach"
      - "planner-build"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"

  - id: "US-LANGSMITH-035"
    title: "Validation Against Existing Guidance"
    category: "resolution_planning"
    priority: "medium"
    as_a: "guidance maintainer avoiding duplicate work"
    i_want: "recommendations to include validation notes"
    so_that: "I don't add guidance that already exists"
    acceptance_criteria:
      - "The --validate flag adds validation notes to recommendations"
      - "Validation notes suggest checking existing guidance before implementing"
      - "Validation is enabled by default"
      - "Validation notes reference specific files to check"
    related_commands:
      - "agentic ls friction --project my-project --recommend --validate"
    related_agents:
      - "orchestration-friction"
    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"

  - id: "US-LANGSMITH-036"
    title: "Python API for Resolution Planning"
    category: "resolution_planning"
    priority: "medium"
    as_a: "developer building automation scripts"
    i_want: "to generate resolution plans programmatically"
    so_that: "I can integrate friction analysis into CI/CD pipelines"
    acceptance_criteria:
      - "ResolutionRecommender class provides recommend() method"
      - "recommend() takes a FrictionReport and returns ResolutionPlan"
      - "ResolutionPlan contains recommendations and next_steps"
      - "ResolutionRecommendation includes all necessary fields"
      - "Resolution plans can be serialized to dict/JSON"
    related_commands:
      - "N/A (Python API)"
    related_agents:
      - "builder-automation"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"
