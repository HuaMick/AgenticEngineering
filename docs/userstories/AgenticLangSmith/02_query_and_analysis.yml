# User Stories: Query and Analysis
# Querying traces and analyzing runs via Python API and CLI

stories:
  - id: "US-LANGSMITH-010"
    title: "List Recent Runs"
    category: "query_and_analysis"
    priority: "high"
    as_a: "developer investigating agent behavior"
    i_want: "to list recent LangSmith runs with filtering"
    so_that: "I can quickly see what the agent has been doing"
    acceptance_criteria:
      - "agentic langsmith runs lists recent runs with ID, name, type, latency, tokens, status"
      - "The --project flag scopes to a specific project"
      - "The --limit flag controls number of results (default: 20)"
      - "The --type flag filters by run type (llm, chain, tool, retriever)"
      - "The --error flag shows only runs with errors"
      - "The --json flag outputs machine-readable JSON"
      - "Results are displayed in a rich table with color-coded status"
    related_commands:
      - "agentic ls runs --project agenticengineering-main --limit 50"
      - "agentic ls runs --error --json"
    related_agents:
      - "teacher-trace-diagnostics"
    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"

  - id: "US-LANGSMITH-011"
    title: "Get Run Details"
    category: "query_and_analysis"
    priority: "high"
    as_a: "developer debugging a specific run"
    i_want: "to see detailed information about a single run"
    so_that: "I can understand what went wrong or analyze performance"
    acceptance_criteria:
      - "agentic langsmith run <id> shows full run details"
      - "Details include ID, type, status, timing, tokens, inputs, outputs"
      - "The --url flag generates a shareable LangSmith web UI link"
      - "The --tree flag shows parent and child runs in a hierarchy"
      - "The --full flag displays complete (untruncated) inputs and outputs"
      - "The --timing flag shows detailed timing breakdown"
      - "The --format flag supports yaml and json output"
      - "Error runs display error message with color highlighting"
    related_commands:
      - "agentic ls run <id> --tree --timing --full"
      - "agentic ls run <id> --url"
      - "agentic ls run <id> --format yaml"
    related_agents:
      - "teacher-trace-diagnostics"
    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"

  - id: "US-LANGSMITH-012"
    title: "List Projects"
    category: "query_and_analysis"
    priority: "medium"
    as_a: "developer working across multiple projects"
    i_want: "to list all LangSmith projects in my workspace"
    so_that: "I can see what projects are available and their run counts"
    acceptance_criteria:
      - "agentic langsmith projects lists all projects"
      - "Table shows project name, ID, and run count"
      - "The --detail flag shows created date and description"
      - "The --json flag outputs machine-readable JSON"
      - "Results are sorted by project name"
    related_commands:
      - "agentic ls projects"
      - "agentic ls projects --detail"
    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"

  - id: "US-LANGSMITH-013"
    title: "Get Project Statistics"
    category: "query_and_analysis"
    priority: "medium"
    as_a: "team lead monitoring project health"
    i_want: "to see aggregated statistics for a project"
    so_that: "I can assess overall agent performance and error rates"
    acceptance_criteria:
      - "agentic langsmith stats --project <name> shows aggregated statistics"
      - "Statistics include total runs, error count, error rate"
      - "Performance metrics include average latency and total tokens"
      - "Run types breakdown shows distribution of run types"
      - "The --json flag outputs machine-readable JSON"
      - "Data is displayed in formatted panels with color coding"
    related_commands:
      - "agentic ls stats --project agenticengineering-main"
      - "agentic ls stats --project my-project --json"
    related_agents:
      - "teacher-trace-diagnostics"
    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"

  - id: "US-LANGSMITH-014"
    title: "Python API for Run Querying"
    category: "query_and_analysis"
    priority: "high"
    as_a: "developer building automation scripts"
    i_want: "to query LangSmith runs programmatically via Python API"
    so_that: "I can build custom analysis tools and integrations"
    acceptance_criteria:
      - "LangSmithService class provides list_runs() method"
      - "LangSmithService class provides get_run() method"
      - "LangSmithService class provides list_projects() method"
      - "LangSmithService class provides get_project_stats() method"
      - "API methods return dicts with normalized data structures"
      - "LangSmithConfigError is raised when API key is missing"
      - "LangSmithAPIError is raised when API calls fail"
      - "API key can be provided via param, env var, or config file"
    related_commands:
      - "N/A (Python API)"
    related_agents:
      - "builder-automation"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/service.py"

  - id: "US-LANGSMITH-015"
    title: "Advanced Filter Building"
    category: "query_and_analysis"
    priority: "medium"
    as_a: "developer performing complex trace queries"
    i_want: "to build complex filter expressions using composable functions"
    so_that: "I can query specific subsets of runs efficiently"
    acceptance_criteria:
      - "build_time_filter() creates time range filters"
      - "build_type_filter() creates run type filters"
      - "build_error_filter() creates error status filters"
      - "build_latency_filter() creates latency range filters"
      - "build_token_filter() creates token count filters"
      - "build_tag_filter() creates tag filters"
      - "build_name_filter() creates name pattern filters"
      - "combine_filters() combines with AND logic"
      - "combine_filters_or() combines with OR logic"
      - "Filter expressions can be passed to list_runs(filter_expr=...)"
    related_commands:
      - "N/A (Python API)"
    related_agents:
      - "builder-automation"
    related_files:
      - "modules/AgenticLangSmith/src/agenticlangsmith/filters.py"
