- id: US-BACKEND-PLAN-050
  title: Archive Epic via API
  category: archiving
  priority: medium
  as_a: frontend developer
  i_want: to archive completed epics via API
  so_that: users can clean up from the web UI
  acceptance_criteria:
  - POST /api/epics/{epic_id}/archive moves epic to completed/
  - Epic folder is moved from docs/epics/live/ to docs/epics/completed/
  - All files and history are preserved
  - Returns 200 OK with new location
  - Returns 404 Not Found if epic doesn't exist
  - Returns 409 Conflict if epic has incomplete tickets
  related_endpoints:
  - POST /api/epics/{epic_id}/archive
  integration_with: AgenticCLI
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-051
  title: Unarchive Epic via API
  category: archiving
  priority: low
  as_a: developer
  i_want: to unarchive epics via API
  so_that: I can resume work on completed epics
  acceptance_criteria:
  - POST /api/epics/{epic_id}/unarchive moves epic back to live/
  - Epic folder is moved from completed/ to live/
  - Returns 200 OK with new location
  - Returns 404 Not Found if epic doesn't exist in completed/
  related_endpoints:
  - POST /api/epics/{epic_id}/unarchive
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-060
  title: Consistent Epic API Errors
  category: error_handling
  priority: high
  as_a: frontend developer
  i_want: to receive consistent error responses
  so_that: I can handle errors predictably
  acceptance_criteria:
  - All errors return JSON with 'detail' field
  - Epic not found returns 404 Not Found
  - Ticket not found returns 404 Not Found
  - Invalid state transition returns 409 Conflict
  - Validation errors return 422 Unprocessable Entity
  - Filesystem errors return 500 Internal Server Error with error ID
  technical_notes: '- Define custom exceptions: EpicNotFoundException, TicketNotFoundException

    - Use FastAPI exception handlers

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-061
  title: Plan API Rate Limiting
  category: error_handling
  priority: low
  as_a: backend service
  i_want: to rate limit plan API requests
  so_that: filesystem operations don't overwhelm the system
  acceptance_criteria:
  - 'Rate limit: 60 requests per minute per client'
  - Rate limit header included in responses
  - Returns 429 Too Many Requests when exceeded
  - Rate limit is per-IP address
  - Admin endpoints are exempt from rate limiting
  technical_notes: '- Use FastAPI middleware or slowapi library

    - Store counters in Redis for multi-instance support

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
