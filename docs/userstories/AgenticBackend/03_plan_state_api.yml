stories:
- id: US-BACKEND-PLAN-001
  title: List All Plans
  category: plan_query
  priority: high
  as_a: frontend developer
  i_want: to retrieve a list of all plans via API
  so_that: I can display plans in the web UI without filesystem access
  acceptance_criteria:
  - GET /api/plans returns list of all plans
  - 'Each plan includes: id, name, status, priority, created, phase_count, task_count'
  - Supports filtering by status (live, completed)
  - Supports filtering by priority (high, medium, low)
  - Results include both live and completed plans
  - Returns 200 OK with list of plans
  related_endpoints:
  - GET /api/plans
  integration_with: AgenticCLI
  technical_notes: '- Use PlanService.list_plans() from AgenticGuidance

    - Map from filesystem to API response model

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-002
  title: Get Plan Details
  category: plan_query
  priority: high
  as_a: frontend developer
  i_want: to retrieve full details of a specific plan
  so_that: I can display the plan structure and progress
  acceptance_criteria:
  - GET /api/plans/{plan_id} returns complete plan details
  - 'Response includes: all plan metadata, phases, tasks, orchestration status'
  - 'Task details include: id, name, status, description, guidance, success_criteria'
  - 'Phase details include: id, name, status, task_ids'
  - Returns 200 OK with PlanDetailResponse
  - Returns 404 Not Found if plan doesn't exist
  related_endpoints:
  - GET /api/plans/{plan_id}
  integration_with: AgenticCLI
  technical_notes: '- Use PlanService.get_plan() from AgenticGuidance

    - plan_id can be folder name (YYMMDDXX_description)

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-003
  title: Query Plan by Worktree
  category: plan_query
  priority: medium
  as_a: frontend developer
  i_want: to find the plan associated with a worktree
  so_that: I can show the relevant plan for the current branch
  acceptance_criteria:
  - GET /api/plans/by-worktree/{branch} returns associated plan
  - Uses worktree code (XX in YYMMDDXX_description) to match
  - Returns 200 OK with plan details
  - Returns 404 Not Found if no plan matches
  related_endpoints:
  - GET /api/plans/by-worktree/{branch}
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-010
  title: Initialize Plan via API
  category: plan_creation
  priority: medium
  as_a: frontend developer
  i_want: to create a new plan folder via API
  so_that: users can initialize plans from the web UI
  acceptance_criteria:
  - POST /api/plans creates new plan folder
  - 'Request includes: description, phase_type (build/test/teach/deploy), worktree_code'
  - Plan folder name is auto-generated (YYMMDDXX_description)
  - Scaffold structure is created (plan_build.yml or plan_test.yml)
  - Returns 201 Created with plan details and location
  - Returns 400 Bad Request if parameters are invalid
  - Returns 409 Conflict if plan folder already exists
  related_endpoints:
  - POST /api/plans
  integration_with: AgenticCLI
  technical_notes: '- Use PlanService.create_plan() or call CLI via proxy

    - Follow naming convention from plan init

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-011
  title: Validate Plan Parameters
  category: plan_creation
  priority: high
  as_a: backend service
  i_want: to validate plan creation parameters
  so_that: only valid plans are created
  acceptance_criteria:
  - description must be kebab-case, 1-50 characters
  - 'phase_type must be one of: build, test, teach, deploy'
  - worktree_code must be 2 uppercase letters
  - Returns 422 Unprocessable Entity with field errors
  technical_notes: '- Use Pydantic models with validators

    - Match CLI validation logic

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-020
  title: List Plan Tasks via API
  category: task_operations
  priority: high
  as_a: frontend developer
  i_want: to retrieve all tasks for a plan
  so_that: I can display task list and progress
  acceptance_criteria:
  - GET /api/plans/{plan_id}/tasks returns all tasks
  - Supports filtering by status (pending, in_progress, completed, all)
  - Supports filtering by phase_id
  - 'Each task includes: id, name, status, description, phase_id'
  - Returns 200 OK with list of tasks
  - Returns 404 Not Found if plan doesn't exist
  related_endpoints:
  - GET /api/plans/{plan_id}/tasks
  integration_with: AgenticCLI
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-021
  title: Get Current Task via API
  category: task_operations
  priority: high
  as_a: agent or frontend
  i_want: to retrieve the next task to work on
  so_that: I know what to execute without CLI access
  acceptance_criteria:
  - GET /api/plans/{plan_id}/tasks/current returns current task
  - Returns first in_progress task, or first pending task if none in progress
  - Returns 200 OK with full task details
  - Returns 204 No Content if no tasks remain
  - Returns 404 Not Found if plan doesn't exist
  related_endpoints:
  - GET /api/plans/{plan_id}/tasks/current
  integration_with: AgenticCLI
  technical_notes: '- Use TaskService.get_current_task() from AgenticGuidance

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-022
  title: Start Task via API
  category: task_operations
  priority: critical
  as_a: agent orchestrator
  i_want: to mark a task as started via API
  so_that: I can update task status from remote sessions
  acceptance_criteria:
  - POST /api/plans/{plan_id}/tasks/{task_id}/start marks task as in_progress
  - Requires orchestration_*.mmd to exist
  - Updates task status atomically (uses FileLock)
  - Returns 200 OK with updated task
  - Returns 404 Not Found if plan or task doesn't exist
  - Returns 409 Conflict if task is already started or completed
  related_endpoints:
  - POST /api/plans/{plan_id}/tasks/{task_id}/start
  integration_with: AgenticCLI
  technical_notes: '- Use TaskService.start_task() from AgenticGuidance

    - Ensure atomic YAML updates

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-023
  title: Complete Task via API
  category: task_operations
  priority: critical
  as_a: agent orchestrator
  i_want: to mark a task as completed via API
  so_that: I can track progress from remote sessions
  acceptance_criteria:
  - POST /api/plans/{plan_id}/tasks/{task_id}/complete marks task as completed
  - Adds completion timestamp
  - Optional completion_note parameter
  - Updates task status atomically
  - Does NOT trigger auto-archive; plan stays in live/ after all tasks complete
  - Returns 200 OK with updated task
  - Returns 404 Not Found if plan or task doesn't exist
  - Returns 409 Conflict if task is not started
  related_endpoints:
  - POST /api/plans/{plan_id}/tasks/{task_id}/complete
  integration_with: AgenticCLI
  technical_notes: '- Use TaskService.complete_task() from AgenticGuidance

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-024
  title: Add Task via API
  category: task_operations
  priority: medium
  as_a: planner agent
  i_want: to add new tasks to a plan via API
  so_that: I can extend plans dynamically
  acceptance_criteria:
  - POST /api/plans/{plan_id}/tasks adds new task
  - 'Request includes: name, description, phase_id, priority'
  - Task ID is auto-generated if not provided
  - Task is added to specified phase
  - Returns 201 Created with new task
  - Returns 404 Not Found if plan or phase doesn't exist
  related_endpoints:
  - POST /api/plans/{plan_id}/tasks
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
