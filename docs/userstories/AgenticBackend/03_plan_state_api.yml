- id: US-BACKEND-PLAN-040
  title: Get Orchestration Status
  category: orchestration
  priority: high
  as_a: frontend developer
  i_want: to check if an epic has been orchestrated
  so_that: I know if the epic is ready for execution
  acceptance_criteria:
  - GET /api/epics/{epic_id}/orchestration returns orchestration status
  - 'Response includes: orchestrated (boolean), mmd_file_exists, mmd_file_path'
  - Returns 200 OK with orchestration status
  - Returns 404 Not Found if epic doesn't exist
  related_endpoints:
  - GET /api/epics/{epic_id}/orchestration
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-041
  title: Retrieve Orchestration MMD
  category: orchestration
  priority: medium
  as_a: frontend developer
  i_want: to retrieve the orchestration flowchart
  so_that: I can visualize execution flow
  acceptance_criteria:
  - GET /api/epics/{epic_id}/orchestration/mmd returns MMD content
  - Returns raw Mermaid syntax as text/plain
  - Returns 200 OK with MMD content
  - Returns 404 Not Found if epic or MMD doesn't exist
  related_endpoints:
