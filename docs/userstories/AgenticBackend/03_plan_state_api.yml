- id: US-BACKEND-PLAN-050
  title: Archive Plan via API
  category: archiving
  priority: medium
  as_a: frontend developer
  i_want: to archive completed plans via API
  so_that: users can clean up from the web UI
  acceptance_criteria:
  - POST /api/plans/{plan_id}/archive moves plan to completed/
  - Plan folder is moved from docs/plans/live/ to docs/plans/completed/
  - All files and history are preserved
  - Returns 200 OK with new location
  - Returns 404 Not Found if plan doesn't exist
  - Returns 409 Conflict if plan has incomplete tasks
  related_endpoints:
  - POST /api/plans/{plan_id}/archive
  integration_with: AgenticCLI
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-051
  title: Unarchive Plan via API
  category: archiving
  priority: low
  as_a: developer
  i_want: to unarchive plans via API
  so_that: I can resume work on completed plans
  acceptance_criteria:
  - POST /api/plans/{plan_id}/unarchive moves plan back to live/
  - Plan folder is moved from completed/ to live/
  - Returns 200 OK with new location
  - Returns 404 Not Found if plan doesn't exist in completed/
  related_endpoints:
  - POST /api/plans/{plan_id}/unarchive
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-060
  title: Consistent Plan API Errors
  category: error_handling
  priority: high
  as_a: frontend developer
  i_want: to receive consistent error responses
  so_that: I can handle errors predictably
  acceptance_criteria:
  - All errors return JSON with 'detail' field
  - Plan not found returns 404 Not Found
  - Task not found returns 404 Not Found
  - Invalid state transition returns 409 Conflict
  - Validation errors return 422 Unprocessable Entity
  - Filesystem errors return 500 Internal Server Error with error ID
  technical_notes: '- Define custom exceptions: PlanNotFoundException, TaskNotFoundException

    - Use FastAPI exception handlers

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-061
  title: Plan API Rate Limiting
  category: error_handling
  priority: low
  as_a: backend service
  i_want: to rate limit plan API requests
  so_that: filesystem operations don't overwhelm the system
  acceptance_criteria:
  - 'Rate limit: 60 requests per minute per client'
  - Rate limit header included in responses
  - Returns 429 Too Many Requests when exceeded
  - Rate limit is per-IP address
  - Admin endpoints are exempt from rate limiting
  technical_notes: '- Use FastAPI middleware or slowapi library

    - Store counters in Redis for multi-instance support

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
