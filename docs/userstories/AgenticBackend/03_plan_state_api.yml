stories:
- id: US-BACKEND-PLAN-001
  title: List All Epics
  category: epic_query
  priority: high
  as_a: frontend developer
  i_want: to retrieve a list of all epics via API
  so_that: I can display epics in the web UI without filesystem access
  acceptance_criteria:
  - GET /api/epics returns list of all epics
  - 'Each epic includes: id, name, status, priority, created, phase_count, ticket_count'
  - Supports filtering by status (live, completed)
  - Supports filtering by priority (high, medium, low)
  - Results include both live and completed epics
  - Returns 200 OK with list of epics
  related_endpoints:
  - GET /api/epics
  integration_with: AgenticCLI
  technical_notes: '- Use EpicService.list_epics() from AgenticGuidance

    - Map from filesystem to API response model

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-002
  title: Get Epic Details
  category: epic_query
  priority: high
  as_a: frontend developer
  i_want: to retrieve full details of a specific epic
  so_that: I can display the epic structure and progress
  acceptance_criteria:
  - GET /api/epics/{epic_id} returns complete epic details
  - 'Response includes: all epic metadata, phases, tickets, orchestration status'
  - 'Ticket details include: id, name, status, description, guidance, success_criteria'
  - 'Phase details include: id, name, status, ticket_ids'
  - Returns 200 OK with EpicDetailResponse
  - Returns 404 Not Found if epic doesn't exist
  related_endpoints:
  - GET /api/epics/{epic_id}
  integration_with: AgenticCLI
  technical_notes: '- Use EpicService.get_epic() from AgenticGuidance

    - epic_id can be folder name (YYMMDDXX_description)

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-003
  title: Query Epic by Worktree
  category: epic_query
  priority: medium
  as_a: frontend developer
  i_want: to find the epic associated with a worktree
  so_that: I can show the relevant epic for the current branch
  acceptance_criteria:
  - GET /api/epics/by-worktree/{branch} returns associated epic
  - Uses worktree code (XX in YYMMDDXX_description) to match
  - Returns 200 OK with epic details
  - Returns 404 Not Found if no epic matches
  related_endpoints:
  - GET /api/epics/by-worktree/{branch}
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-010
  title: Initialize Epic via API
  category: epic_creation
  priority: medium
  as_a: frontend developer
  i_want: to create a new epic folder via API
  so_that: users can initialize epics from the web UI
  acceptance_criteria:
  - POST /api/epics creates new epic folder
  - 'Request includes: description, phase_type (build/test/teach/deploy), worktree_code'
  - Epic folder name is auto-generated (YYMMDDXX_description)
  - Scaffold structure is created (ticket_build.yml or ticket_test.yml)
  - Returns 201 Created with epic details and location
  - Returns 400 Bad Request if parameters are invalid
  - Returns 409 Conflict if epic folder already exists
  related_endpoints:
  - POST /api/epics
  integration_with: AgenticCLI
  technical_notes: '- Use EpicService.create_epic() or call CLI via proxy

    - Follow naming convention from epic init

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-011
  title: Validate Epic Parameters
  category: epic_creation
  priority: high
  as_a: backend service
  i_want: to validate epic creation parameters
  so_that: only valid epics are created
  acceptance_criteria:
  - description must be kebab-case, 1-50 characters
  - 'phase_type must be one of: build, test, teach, deploy'
  - worktree_code must be 2 uppercase letters
  - Returns 422 Unprocessable Entity with field errors
  technical_notes: '- Use Pydantic models with validators

    - Match CLI validation logic

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-020
  title: List Epic Tickets via API
  category: ticket_operations
  priority: high
  as_a: frontend developer
  i_want: to retrieve all tickets for an epic
  so_that: I can display ticket list and progress
  acceptance_criteria:
  - GET /api/epics/{epic_id}/tickets returns all tickets
  - Supports filtering by status (pending, in_progress, completed, all)
  - Supports filtering by phase_id
  - 'Each ticket includes: id, name, status, description, phase_id'
  - Returns 200 OK with list of tickets
  - Returns 404 Not Found if epic doesn't exist
  related_endpoints:
  - GET /api/epics/{epic_id}/tickets
  integration_with: AgenticCLI
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-021
  title: Get Current Ticket via API
  category: ticket_operations
  priority: high
  as_a: agent or frontend
  i_want: to retrieve the next ticket to work on
  so_that: I know what to execute without CLI access
  acceptance_criteria:
  - GET /api/epics/{epic_id}/tickets/current returns current ticket
  - Returns first in_progress ticket, or first pending ticket if none in progress
  - Returns 200 OK with full ticket details
  - Returns 204 No Content if no tickets remain
  - Returns 404 Not Found if epic doesn't exist
  related_endpoints:
  - GET /api/epics/{epic_id}/tickets/current
  integration_with: AgenticCLI
  technical_notes: '- Use TicketService.get_current_ticket() from AgenticGuidance

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-022
  title: Start Ticket via API
  category: ticket_operations
  priority: critical
  as_a: agent orchestrator
  i_want: to mark a ticket as started via API
  so_that: I can update ticket status from remote sessions
  acceptance_criteria:
  - POST /api/epics/{epic_id}/tickets/{ticket_id}/start marks ticket as in_progress
  - Requires orchestration_*.mmd to exist
  - Updates ticket status atomically (uses FileLock)
  - Returns 200 OK with updated ticket
  - Returns 404 Not Found if epic or ticket doesn't exist
  - Returns 409 Conflict if ticket is already started or completed
  related_endpoints:
  - POST /api/epics/{epic_id}/tickets/{ticket_id}/start
  integration_with: AgenticCLI
  technical_notes: '- Use TicketService.start_ticket() from AgenticGuidance

    - Ensure atomic YAML updates

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-023
  title: Complete Ticket via API
  category: ticket_operations
  priority: critical
  as_a: agent orchestrator
  i_want: to mark a ticket as completed via API
  so_that: I can track progress from remote sessions
  acceptance_criteria:
  - POST /api/epics/{epic_id}/tickets/{ticket_id}/complete marks ticket as completed
  - Adds completion timestamp
  - Optional completion_note parameter
  - Updates ticket status atomically
  - Does NOT trigger auto-archive; epic stays in live/ after all tickets complete
  - Returns 200 OK with updated ticket
  - Returns 404 Not Found if epic or ticket doesn't exist
  - Returns 409 Conflict if ticket is not started
  related_endpoints:
  - POST /api/epics/{epic_id}/tickets/{ticket_id}/complete
  integration_with: AgenticCLI
  technical_notes: '- Use TicketService.complete_ticket() from AgenticGuidance

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-PLAN-024
  title: Add Ticket via API
  category: ticket_operations
  priority: medium
  as_a: planner agent
  i_want: to add new tickets to an epic via API
  so_that: I can extend epics dynamically
  acceptance_criteria:
  - POST /api/epics/{epic_id}/tickets adds new ticket
  - 'Request includes: name, description, phase_id, priority'
  - Ticket ID is auto-generated if not provided
  - Ticket is added to specified phase
  - Returns 201 Created with new ticket
  - Returns 404 Not Found if epic or phase doesn't exist
  related_endpoints:
  - POST /api/epics/{epic_id}/tickets
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
