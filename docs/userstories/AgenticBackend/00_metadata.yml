metadata:
  module: "AgenticBackend"
  version: "1.0"
  created: "2026-02-07"
  status: "planning"
  purpose: |
    User stories for AgenticBackend module covering backend services, API endpoints,
    WebSocket communication, and service infrastructure for Claude Code session orchestration.

  overview: |
    AgenticBackend is the server-side infrastructure layer for the AgenticEngineering ecosystem.
    It provides REST API endpoints, WebSocket communication, and workflow orchestration to support
    Claude Code session management, planning folder operations, and CLI command execution.

    The module follows Domain-Driven Design (DDD) principles with clear layer separation:
    - Domain Layer: Pure business logic (entities, value objects, repositories)
    - Application Layer: Workflow orchestration
    - Infrastructure Layer: Repository implementations, external clients
    - Interface Layer: FastAPI REST + WebSocket endpoints

    This module is currently in early development (empty scaffold). User stories describe
    aspirational capabilities based on patterns from the legacy RemoteAgents project.

  architecture_patterns: |
    - DDD Layer Separation: Domains contain pure business logic; workflows orchestrate
    - FastAPI + WebSocket: REST for management, WebSocket for real-time communication
    - Repository Pattern: Abstract persistence layer for pluggable storage backends
    - Workflow Orchestration: Single entrypoints with parameters supporting multiple use cases
    - Lifespan Management: Proper startup/shutdown with background workers

  story_categories:
    - name: "Session Management"
      prefix: "US-BACKEND-SESSION"
      description: "API endpoints for creating, querying, and managing Claude Code sessions"
      story_files:
        - "01_session_management.yml"

    - name: "WebSocket Communication"
      prefix: "US-BACKEND-WS"
      description: "Real-time bidirectional communication between clients and sessions"
      story_files:
        - "02_websocket_communication.yml"

    - name: "Plan State API"
      prefix: "US-BACKEND-PLAN"
      description: "REST API for CRUD operations on planning folder state"
      story_files:
        - "03_plan_state_api.yml"

    - name: "CLI Proxy"
      prefix: "US-BACKEND-CLI"
      description: "Execute CLI commands via API endpoints"
      story_files:
        - "04_cli_proxy.yml"

    - name: "Guidance API"
      prefix: "US-BACKEND-GUIDANCE"
      description: "Serve guidance files and agent definitions to remote agents"
      story_files:
        - "05_guidance_api.yml"

    - name: "Service Infrastructure"
      prefix: "US-BACKEND-INFRA"
      description: "Background workers, health checks, and service lifecycle"
      story_files:
        - "06_service_infrastructure.yml"

  integration_points:
    - module: "AgenticCLI"
      description: "CLI commands can be invoked via API endpoints"
      story_prefix: "US-BACKEND-CLI"

    - module: "AgenticGuidance"
      description: "Guidance files served via API, workflow orchestration logic"
      story_prefix: "US-BACKEND-GUIDANCE"

    - module: "AgenticFrontend"
      description: "Web UI consumes REST API and WebSocket endpoints"
      story_prefix: "US-BACKEND-SESSION, US-BACKEND-WS, US-BACKEND-PLAN"

  conventions: |
    - Story IDs use prefix per category: US-BACKEND-SESSION, US-BACKEND-WS, etc.
    - Each story follows as_a / i_want / so_that format
    - Acceptance criteria are testable assertions
    - Related endpoints link stories to API implementation
    - Related legacy code references RemoteAgents project for patterns
    - Priority: critical > high > medium > low

  execution_guidance: |
    When implementing user stories:

    1. Follow DDD layer structure (see AgenticBackend/README.md)
    2. Reference legacy RemoteAgents for patterns
    3. Start with in-memory repositories, graduate to persistent storage
    4. Use FastAPI dependency injection for testability
    5. Include proper error handling and validation
    6. Add health checks and monitoring endpoints
    7. Document API endpoints as they stabilize

    Test priority order:
    - critical: Core functionality required for basic operation
    - high: Important features for production use
    - medium: Enhanced functionality, nice to have
    - low: Edge cases and polish

  legacy_references:
    - path: "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/"
      description: "Reference implementation of FastAPI + WebSocket relay service"
    - path: "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/terminal/"
      description: "Reference implementation of terminal service with PTY management"
    - path: "modules/legacy/MyAgents/projects/RemoteAgents/docs/api.md"
      description: "REST API patterns and conventions"
    - path: "modules/legacy/MyAgents/projects/RemoteAgents/docs/protocol.md"
      description: "WebSocket message protocols"
