# User Stories: Backend Session Management
# Covers REST API endpoints for creating, querying, and managing Claude Code sessions

stories:
  # ============================================================================
  # SESSION CREATION
  # ============================================================================

  - id: "US-BACKEND-SESSION-001"
    title: "Create New Session with Pairing Code"
    category: "session_creation"
    priority: "critical"
    as_a: "desktop CLI user"
    i_want: "to create a new session and receive a pairing code"
    so_that: "I can share the code with a remote client to establish a connection"
    acceptance_criteria:
      - "POST /api/sessions accepts desktop_public_key (base64-encoded)"
      - "Returns session_id (UUID) and pairing_code (6-character alphanumeric)"
      - "Pairing code is unique and not currently active"
      - "Session is created with 'created' state"
      - "Session expires if not paired within configurable timeout (default 5 minutes)"
      - "Returns 201 Created on success"
      - "Returns 400 Bad Request if public key is invalid base64"
    related_endpoints:
      - "POST /api/sessions"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/api.py"
    technical_notes: |
      - Use domain entities: Session, SessionId, PairingCode
      - Workflow: RelayWorkflow.create_session()
      - Repository: SessionRepository.save()

  - id: "US-BACKEND-SESSION-002"
    title: "Generate Secure Pairing Codes"
    category: "session_creation"
    priority: "high"
    as_a: "backend service"
    i_want: "to generate collision-resistant pairing codes"
    so_that: "users can reliably pair without code conflicts"
    acceptance_criteria:
      - "Pairing codes are 6 characters (uppercase alphanumeric)"
      - "Codes exclude ambiguous characters (0, O, I, 1)"
      - "Collision detection retries up to 3 times before failing"
      - "Expired codes can be reused immediately"
      - "Code generation is cryptographically random"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/value_objects.py"
    technical_notes: |
      - Use PairingCode value object with validation
      - Check repository for active codes before returning

  # ============================================================================
  # SESSION QUERY
  # ============================================================================

  - id: "US-BACKEND-SESSION-010"
    title: "Query Session Status"
    category: "session_query"
    priority: "critical"
    as_a: "monitoring tool or frontend"
    i_want: "to retrieve current status of a session"
    so_that: "I can display connection state and debug issues"
    acceptance_criteria:
      - "GET /api/sessions/{session_id} returns session details"
      - "Response includes: session_id, state, desktop_connected, client_connected, expires_at"
      - "State values: created, desktop_connected, paired, closed"
      - "expires_at is ISO 8601 formatted timestamp"
      - "Returns 200 OK with SessionStatusResponse"
      - "Returns 404 Not Found if session doesn't exist"
      - "Returns 400 Bad Request if session_id is not valid UUID"
    related_endpoints:
      - "GET /api/sessions/{session_id}"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/api.py"

  - id: "US-BACKEND-SESSION-011"
    title: "List Active Sessions"
    category: "session_query"
    priority: "medium"
    as_a: "administrator"
    i_want: "to see all active sessions"
    so_that: "I can monitor system load and identify stale sessions"
    acceptance_criteria:
      - "GET /api/sessions returns list of all active sessions"
      - "Each entry includes session_id, state, created_at, expires_at"
      - "Supports optional query parameters: state, created_after, created_before"
      - "Results are paginated with limit and offset parameters"
      - "Returns 200 OK with list of sessions"
      - "Empty list if no sessions match filters"
    related_endpoints:
      - "GET /api/sessions"
    technical_notes: |
      - Add SessionRepository.list() method
      - Support filtering and pagination

  - id: "US-BACKEND-SESSION-012"
    title: "Query Session by Pairing Code"
    category: "session_query"
    priority: "high"
    as_a: "client attempting to pair"
    i_want: "to check if a pairing code is valid before connecting"
    so_that: "I can provide clear feedback if the code is invalid or expired"
    acceptance_criteria:
      - "GET /api/sessions/by-code/{pairing_code} returns session details"
      - "Returns session_id and expires_at if code is valid"
      - "Returns 404 Not Found if code doesn't exist or is expired"
      - "Returns 410 Gone if code existed but session is closed"
      - "Does not expose session_id for invalid codes (security)"
    related_endpoints:
      - "GET /api/sessions/by-code/{pairing_code}"
    technical_notes: |
      - Add SessionRepository.get_by_pairing_code() method
      - Validate code format before repository lookup

  # ============================================================================
  # SESSION LIFECYCLE
  # ============================================================================

  - id: "US-BACKEND-SESSION-020"
    title: "Close Session Explicitly"
    category: "session_lifecycle"
    priority: "critical"
    as_a: "desktop CLI user"
    i_want: "to explicitly close a session via API"
    so_that: "I can clean up resources when I'm done"
    acceptance_criteria:
      - "DELETE /api/sessions/{session_id} closes the session"
      - "Disconnects any connected WebSockets"
      - "Removes session from repository"
      - "Operation is idempotent (deleting non-existent session succeeds)"
      - "Returns 204 No Content on success"
      - "Returns 400 Bad Request if session_id is not valid UUID"
    related_endpoints:
      - "DELETE /api/sessions/{session_id}"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/api.py"
    technical_notes: |
      - Workflow: RelayWorkflow.close_session()
      - Repository: SessionRepository.delete()

  - id: "US-BACKEND-SESSION-021"
    title: "Auto-Expire Unpaired Sessions"
    category: "session_lifecycle"
    priority: "high"
    as_a: "backend service"
    i_want: "to automatically expire sessions that aren't paired within timeout"
    so_that: "stale sessions don't accumulate and waste resources"
    acceptance_criteria:
      - "Background worker runs periodic cleanup (default every 60 seconds)"
      - "Sessions in 'created' or 'desktop_connected' state expire after 5 minutes"
      - "Expired sessions are removed from repository"
      - "Cleanup is logged for monitoring"
      - "Worker handles errors gracefully without crashing"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/workers/cleanup_worker.py"
    technical_notes: |
      - Use FastAPI lifespan events for background task
      - Repository: SessionRepository.list_expired()

  - id: "US-BACKEND-SESSION-022"
    title: "Session State Transitions"
    category: "session_lifecycle"
    priority: "critical"
    as_a: "backend service"
    i_want: "to validate session state transitions"
    so_that: "the session lifecycle is enforced correctly"
    acceptance_criteria:
      - "Valid transitions: created -> desktop_connected -> paired -> closed"
      - "Invalid transitions raise SessionWorkflowException"
      - "Transition validation happens in domain layer"
      - "State transition events are logged"
      - "Cannot transition from 'closed' to any other state"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/entities.py"
    technical_notes: |
      - Implement in Session entity
      - Use SessionState value object (enum)

  # ============================================================================
  # SESSION METADATA
  # ============================================================================

  - id: "US-BACKEND-SESSION-030"
    title: "Store Session Metadata"
    category: "session_metadata"
    priority: "medium"
    as_a: "developer"
    i_want: "to attach metadata to sessions"
    so_that: "I can track usage patterns and debug issues"
    acceptance_criteria:
      - "Session includes optional metadata field (JSON object)"
      - "Metadata can store: client_version, user_agent, platform, etc."
      - "POST /api/sessions accepts optional metadata parameter"
      - "Metadata is returned in GET /api/sessions/{session_id}"
      - "Metadata size limit: 4KB"
      - "Invalid JSON is rejected with 400 Bad Request"
    related_endpoints:
      - "POST /api/sessions"
      - "PATCH /api/sessions/{session_id}/metadata"

  - id: "US-BACKEND-SESSION-031"
    title: "Update Session Metadata"
    category: "session_metadata"
    priority: "low"
    as_a: "connected client"
    i_want: "to update session metadata after creation"
    so_that: "I can add context as the session progresses"
    acceptance_criteria:
      - "PATCH /api/sessions/{session_id}/metadata updates metadata"
      - "Partial updates are supported (merge with existing)"
      - "Returns 200 OK with updated metadata"
      - "Returns 404 Not Found if session doesn't exist"
      - "Cannot update metadata of closed sessions (409 Conflict)"
    related_endpoints:
      - "PATCH /api/sessions/{session_id}/metadata"

  # ============================================================================
  # ERROR HANDLING
  # ============================================================================

  - id: "US-BACKEND-SESSION-040"
    title: "Consistent Error Responses"
    category: "error_handling"
    priority: "high"
    as_a: "API client developer"
    i_want: "to receive consistent error response formats"
    so_that: "I can handle errors predictably"
    acceptance_criteria:
      - "All errors return JSON with 'detail' field"
      - "SessionNotFoundException returns 404 Not Found"
      - "SessionExpiredException returns 410 Gone"
      - "SessionAlreadyPairedException returns 409 Conflict"
      - "InvalidPairingCodeException returns 404 Not Found"
      - "Validation errors return 422 Unprocessable Entity with field details"
    related_legacy:
      - "modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/api.py"
    technical_notes: |
      - Use FastAPI exception handlers
      - Define custom exception classes in domain layer

  - id: "US-BACKEND-SESSION-041"
    title: "Request Validation"
    category: "error_handling"
    priority: "high"
    as_a: "backend service"
    i_want: "to validate all API inputs"
    so_that: "invalid data is rejected before reaching domain logic"
    acceptance_criteria:
      - "Use Pydantic models for request/response validation"
      - "UUID fields are validated as proper UUID format"
      - "Base64 fields are validated before decoding"
      - "String fields have min/max length constraints"
      - "Returns 422 Unprocessable Entity with field-specific errors"
    technical_notes: |
      - Define Pydantic models: CreateSessionRequest, CreateSessionResponse, etc.
      - Use FastAPI automatic validation
