# User Stories: Backend Guidance API
# Covers serving guidance files and agent definitions to remote agents

stories:
  # ============================================================================
  # AGENT DEFINITIONS
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-001"
    title: "List All Agents"
    category: "agent_definitions"
    priority: "high"
    as_a: "frontend developer"
    i_want: "to retrieve a list of all available agents"
    so_that: "I can display agent catalog in the web UI"
    acceptance_criteria:
      - "GET /api/guidance/agents returns list of all agents"
      - "Each agent includes: id, category, description, status, capabilities"
      - "Categories: orchestration, planner, build, test, teacher, deploy"
      - "Supports filtering by category"
      - "Returns 200 OK with list of agents"
    related_endpoints:
      - "GET /api/guidance/agents"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - Read from modules/AgenticGuidance/agents/
      - Parse manifest.yml for each agent

  - id: "US-BACKEND-GUIDANCE-002"
    title: "Get Agent Manifest"
    category: "agent_definitions"
    priority: "high"
    as_a: "agent executor"
    i_want: "to retrieve an agent's manifest via API"
    so_that: "I can execute agents remotely without filesystem access"
    acceptance_criteria:
      - "GET /api/guidance/agents/{agent_id}/manifest returns manifest.yml"
      - "Response includes: agent metadata, capabilities, inputs, outputs"
      - "Returns 200 OK with parsed manifest"
      - "Returns 404 Not Found if agent doesn't exist"
      - "Supports both YAML and JSON response formats"
    related_endpoints:
      - "GET /api/guidance/agents/{agent_id}/manifest"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - agent_id format: category/subcategory/agent-name
      - Example: planner/planner-build

  - id: "US-BACKEND-GUIDANCE-003"
    title: "Get Agent Process Definition"
    category: "agent_definitions"
    priority: "high"
    as_a: "agent executor"
    i_want: "to retrieve an agent's process definition"
    so_that: "I know how to execute the agent"
    acceptance_criteria:
      - "GET /api/guidance/agents/{agent_id}/process returns process.yml or process.mmd"
      - "Returns structured workflow steps"
      - "Returns 200 OK with process definition"
      - "Returns 404 Not Found if agent or process doesn't exist"
      - "Supports both YAML and Mermaid formats"
    related_endpoints:
      - "GET /api/guidance/agents/{agent_id}/process"
    integration_with: "AgenticGuidance"

  - id: "US-BACKEND-GUIDANCE-004"
    title: "Get Agent Inputs Definition"
    category: "agent_definitions"
    priority: "high"
    as_a: "agent executor"
    i_want: "to retrieve an agent's input requirements"
    so_that: "I can provide the correct context"
    acceptance_criteria:
      - "GET /api/guidance/agents/{agent_id}/inputs returns inputs.yml"
      - "Response includes: required inputs, optional inputs, reference layers"
      - "Returns 200 OK with inputs definition"
      - "Returns 404 Not Found if agent or inputs don't exist"
      - "Resolves reference layers (shared inputs)"
    related_endpoints:
      - "GET /api/guidance/agents/{agent_id}/inputs"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - Handle reference: <ref> syntax
      - Resolve shared inputs from assets/inputs/

  # ============================================================================
  # GUIDANCE ASSETS
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-010"
    title: "List Guidance Examples"
    category: "guidance_assets"
    priority: "medium"
    as_a: "frontend developer"
    i_want: "to retrieve guidance examples"
    so_that: "I can show users example workflows"
    acceptance_criteria:
      - "GET /api/guidance/examples returns list of examples"
      - "Each example includes: id, category, description, file_path"
      - "Categories: planner, builder, test"
      - "Supports filtering by category"
      - "Returns 200 OK with list of examples"
    related_endpoints:
      - "GET /api/guidance/examples"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - Read from modules/AgenticGuidance/assets/examples/

  - id: "US-BACKEND-GUIDANCE-011"
    title: "Get Guidance Example Content"
    category: "guidance_assets"
    priority: "medium"
    as_a: "frontend developer"
    i_want: "to retrieve example file content"
    so_that: "I can display examples to users"
    acceptance_criteria:
      - "GET /api/guidance/examples/{example_id} returns example content"
      - "Returns raw YAML content"
      - "Returns 200 OK with content"
      - "Returns 404 Not Found if example doesn't exist"
    related_endpoints:
      - "GET /api/guidance/examples/{example_id}"

  - id: "US-BACKEND-GUIDANCE-012"
    title: "List Guidance Guidelines"
    category: "guidance_assets"
    priority: "medium"
    as_a: "agent executor"
    i_want: "to retrieve guidance guidelines"
    so_that: "I can enforce best practices"
    acceptance_criteria:
      - "GET /api/guidance/guidelines returns list of guidelines"
      - "Each guideline includes: id, title, description, content"
      - "Returns 200 OK with list of guidelines"
    related_endpoints:
      - "GET /api/guidance/guidelines"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - Read from modules/AgenticGuidance/assets/guidelines/

  - id: "US-BACKEND-GUIDANCE-013"
    title: "Get Guidance Guideline Content"
    category: "guidance_assets"
    priority: "medium"
    as_a: "agent executor"
    i_want: "to retrieve guideline content"
    so_that: "I can enforce specific constraints"
    acceptance_criteria:
      - "GET /api/guidance/guidelines/{guideline_id} returns guideline content"
      - "Returns raw YAML content"
      - "Returns 200 OK with content"
      - "Returns 404 Not Found if guideline doesn't exist"
    related_endpoints:
      - "GET /api/guidance/guidelines/{guideline_id}"

  # ============================================================================
  # ORCHESTRATION SUPPORT
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-020"
    title: "Resolve Agent Routing"
    category: "orchestration_support"
    priority: "high"
    as_a: "orchestration executor"
    i_want: "to resolve agent routing from MMD metadata"
    so_that: "I can dynamically route to the correct agent"
    acceptance_criteria:
      - "POST /api/guidance/routing/resolve accepts MMD node metadata"
      - "Returns agent_id and manifest for the routed agent"
      - "Handles AGENT_ROUTING metadata parsing"
      - "Returns 200 OK with routing decision"
      - "Returns 400 Bad Request if metadata is invalid"
    related_endpoints:
      - "POST /api/guidance/routing/resolve"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - Parse AGENT_ROUTING from MMD comments
      - Example: <!-- AGENT_ROUTING: planner/planner-build -->

  - id: "US-BACKEND-GUIDANCE-021"
    title: "Validate Orchestration MMD"
    category: "orchestration_support"
    priority: "medium"
    as_a: "planner agent"
    i_want: "to validate orchestration MMD via API"
    so_that: "I can catch errors before execution"
    acceptance_criteria:
      - "POST /api/guidance/orchestration/validate accepts MMD content"
      - "Validates Mermaid syntax"
      - "Validates AGENT_ROUTING metadata presence"
      - "Validates referenced agents exist"
      - "Returns 200 OK with validation result (valid: true/false, errors: [])"
      - "Returns 400 Bad Request if content is malformed"
    related_endpoints:
      - "POST /api/guidance/orchestration/validate"

  # ============================================================================
  # CONTEXT BOOTSTRAPPING
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-030"
    title: "Generate Bootstrap Context"
    category: "context_bootstrap"
    priority: "high"
    as_a: "agent executor"
    i_want: "to generate context bootstrap commands for an agent"
    so_that: "I can inject context via CLI instead of file reads"
    acceptance_criteria:
      - "POST /api/guidance/bootstrap generates CLI commands for context"
      - "Request includes: agent_id, plan_path (optional)"
      - "Returns ordered list of CLI commands to run"
      - "Commands populate agent's required inputs"
      - "Returns 200 OK with bootstrap commands"
      - "Returns 404 Not Found if agent doesn't exist"
    related_endpoints:
      - "POST /api/guidance/bootstrap"
    integration_with: "AgenticCLI"
    technical_notes: |
      - Parse agent's inputs.yml
      - Generate agentic context read commands
      - Follow CCI (CLI Context Injection) pattern

  - id: "US-BACKEND-GUIDANCE-031"
    title: "Execute Bootstrap Workflow"
    category: "context_bootstrap"
    priority: "medium"
    as_a: "agent executor"
    i_want: "to execute bootstrap commands and receive aggregated context"
    so_that: "I get all context in a single API call"
    acceptance_criteria:
      - "POST /api/guidance/bootstrap/execute runs bootstrap and returns context"
      - "Executes all generated CLI commands"
      - "Aggregates output into structured context object"
      - "Returns 200 OK with context data"
      - "Returns 500 Internal Server Error if any bootstrap command fails"
    related_endpoints:
      - "POST /api/guidance/bootstrap/execute"
    integration_with: "AgenticCLI"
    technical_notes: |
      - Combines bootstrap + CLI proxy functionality

  # ============================================================================
  # SHARED INPUTS
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-040"
    title: "List Shared Input Definitions"
    category: "shared_inputs"
    priority: "low"
    as_a: "frontend developer"
    i_want: "to list all shared input definitions"
    so_that: "I can understand reference layer architecture"
    acceptance_criteria:
      - "GET /api/guidance/inputs/shared returns list of shared inputs"
      - "Each entry includes: id, description, file_path"
      - "Returns 200 OK with list"
    related_endpoints:
      - "GET /api/guidance/inputs/shared"
    integration_with: "AgenticGuidance"
    technical_notes: |
      - Read from modules/AgenticGuidance/assets/inputs/

  - id: "US-BACKEND-GUIDANCE-041"
    title: "Get Shared Input Content"
    category: "shared_inputs"
    priority: "low"
    as_a: "agent executor"
    i_want: "to retrieve shared input content"
    so_that: "I can resolve reference layers"
    acceptance_criteria:
      - "GET /api/guidance/inputs/shared/{input_id} returns content"
      - "Returns raw YAML content"
      - "Returns 200 OK with content"
      - "Returns 404 Not Found if input doesn't exist"
    related_endpoints:
      - "GET /api/guidance/inputs/shared/{input_id}"

  # ============================================================================
  # CACHING AND PERFORMANCE
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-050"
    title: "Cache Guidance Files"
    category: "caching"
    priority: "medium"
    as_a: "backend service"
    i_want: "to cache guidance files in memory"
    so_that: "API responses are fast for repeated requests"
    acceptance_criteria:
      - "Guidance files are cached on first read"
      - "Cache is invalidated on file modification (inotify or polling)"
      - "Cache stores parsed YAML, not raw text"
      - "Cache has configurable TTL (default 5 minutes)"
      - "Cache can be manually cleared via admin endpoint"
    technical_notes: |
      - Use Python lru_cache or custom cache class
      - Watch filesystem for changes

  - id: "US-BACKEND-GUIDANCE-051"
    title: "ETag Support for Guidance Files"
    category: "caching"
    priority: "low"
    as_a: "frontend developer"
    i_want: "to use ETags for conditional requests"
    so_that: "I avoid re-downloading unchanged files"
    acceptance_criteria:
      - "All guidance endpoints return ETag header"
      - "ETag is based on file content hash"
      - "If-None-Match header returns 304 Not Modified"
      - "Reduces bandwidth for unchanged resources"
    technical_notes: |
      - Use file hash (MD5 or SHA256) as ETag
      - FastAPI middleware for ETag support

  # ============================================================================
  # ERROR HANDLING
  # ============================================================================

  - id: "US-BACKEND-GUIDANCE-060"
    title: "Handle Missing Guidance Files"
    category: "error_handling"
    priority: "high"
    as_a: "backend service"
    i_want: "to handle missing guidance files gracefully"
    so_that: "API remains stable when files are deleted"
    acceptance_criteria:
      - "Missing agent returns 404 Not Found"
      - "Missing process.yml returns 404 with clear message"
      - "Missing inputs.yml returns 200 OK with empty inputs"
      - "Filesystem errors return 500 Internal Server Error with error ID"
    technical_notes: |
      - Distinguish between expected vs unexpected missing files
      - inputs.yml is optional for some agents

  - id: "US-BACKEND-GUIDANCE-061"
    title: "Validate Guidance File Syntax"
    category: "error_handling"
    priority: "high"
    as_a: "backend service"
    i_want: "to validate guidance file syntax before returning"
    so_that: "malformed files are detected early"
    acceptance_criteria:
      - "YAML syntax is validated on read"
      - "Required fields are checked (manifest.yml: name, category, etc.)"
      - "Returns 500 Internal Server Error if file is malformed"
      - "Error includes file path and syntax error details"
    technical_notes: |
      - Use pyyaml.safe_load() with error handling
      - Define schema validators for each file type
