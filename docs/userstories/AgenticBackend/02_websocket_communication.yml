stories:
- id: US-BACKEND-WS-001
  title: Desktop WebSocket Connection
  category: websocket_desktop
  priority: critical
  as_a: desktop CLI user
  i_want: to establish a WebSocket connection using my session_id
  so_that: I can send and receive real-time messages with paired clients
  acceptance_criteria:
  - Desktop connects to GET /ws/desktop/{session_id}
  - WebSocket connection is accepted if session exists
  - Connection is rejected with error if session_id is invalid UUID
  - Connection is rejected if session doesn't exist (404)
  - Session state transitions to 'desktop_connected' on successful connection
  - WebSocket is registered with session for message routing
  related_endpoints:
  - GET /ws/desktop/{session_id}
  related_legacy:
  - modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
  technical_notes: '- Use FastAPI WebSocket support

    - Workflow: RelayWorkflow.handle_desktop_connect()

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-WS-002
  title: Desktop Message Routing
  category: websocket_desktop
  priority: critical
  as_a: desktop CLI user
  i_want: to send messages to paired client via WebSocket
  so_that: I can communicate bidirectionally in real-time
  acceptance_criteria:
  - Desktop sends EncryptedBlob messages via WebSocket
  - Messages are validated as EncryptedBlob type
  - Messages are routed to paired client if connected
  - Routing errors send Error message back to desktop
  - Non-EncryptedBlob messages are rejected with error
  - Connection stays open on routing failures (client might not be connected yet)
  related_endpoints:
  - GET /ws/desktop/{session_id}
  related_legacy:
  - modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
  technical_notes: '- Workflow: RelayWorkflow.route_message()

    - Use PeerRole.DESKTOP for sender identification

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-WS-003
  title: Desktop Disconnect Handling
  category: websocket_desktop
  priority: critical
  as_a: backend service
  i_want: to clean up sessions when desktop disconnects
  so_that: resources are freed and clients are notified
  acceptance_criteria:
  - WebSocketDisconnect exception triggers cleanup
  - Session is closed and removed from repository
  - Connected client WebSocket is closed gracefully
  - Cleanup is logged for monitoring
  - Errors during cleanup are caught and logged
  related_endpoints:
  - GET /ws/desktop/{session_id}
  technical_notes: '- Use try/finally block for cleanup

    - Workflow: RelayWorkflow.close_session()

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-WS-010
  title: Client WebSocket Connection with Pairing
  category: websocket_client
  priority: critical
  as_a: web client user
  i_want: to connect using a pairing code and establish encryption
  so_that: I can communicate securely with the desktop session
  acceptance_criteria:
  - Client connects to GET /ws/client/{pairing_code}
  - WebSocket connection is accepted if pairing code format is valid
  - Connection is rejected if pairing code format is invalid
  - First message must be SessionPair with client_public_key
  - Workflow pairs client and transitions session to 'paired' state
  - SessionPaired message is sent to both client and desktop
  - SessionPaired includes public keys for E2E encryption setup
  related_endpoints:
  - GET /ws/client/{pairing_code}
  related_legacy:
  - modules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
  technical_notes: '- Workflow: RelayWorkflow.handle_client_pair()

    - Protocol messages: SessionPair, SessionPaired

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
