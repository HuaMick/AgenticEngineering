  title: Client Message Routing
  category: websocket_client
  priority: critical
  as_a: web client user
  i_want: to send messages to desktop via WebSocket
  so_that: I can communicate bidirectionally in real-time
  acceptance_criteria:
  - After pairing, client sends EncryptedBlob messages
  - Messages are validated as EncryptedBlob type
  - Messages are routed to desktop if connected
  - Routing errors send Error message back to client
  - Non-EncryptedBlob messages are rejected with error
  - Connection stays open on routing failures
  related_endpoints:
  - GET /ws/client/{pairing_code}
  technical_notes: '- Workflow: RelayWorkflow.route_message()

    - Use PeerRole.CLIENT for sender identification

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-BACKEND-WS-012
  title: Client Disconnect Handling
  category: websocket_client
  priority: critical
  as_a: backend service
  i_want: to clean up sessions when client disconnects
  so_that: resources are freed and desktop is notified
  acceptance_criteria:
