stories:
- id: US-TMUX-050
  title: Create Dedicated Session for Ralph Loop
  category: ralph_integration
  priority: high
  as_a: developer starting a Ralph Loop
  i_want: to create a dedicated tmux session for long-running orchestration
  so_that: I can detach and reattach without interrupting the loop
  acceptance_criteria:
  - agentic-tmux session create ralph-<epic-id> creates session for loop
  - Session is linked to epic folder for context
  - Session can run in background while developer works elsewhere
  - Notification pane displays question queue during loop execution
  - Developer can attach to monitor progress at any time
  - Session persists across terminal disconnects
  related_commands:
  - agentic-tmux session create ralph-260207XX --epic docs/epics/live/260207XX_feature
  - agentic loop start --background (creates tmux session internally)
  notes: 'Ralph Loop benefits from tmux for long-running orchestration. The loop

    can run detached while showing questions/status in notification panes.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-051
  title: Display Ralph Loop Progress in Notification Pane
  category: ralph_integration
  priority: medium
  as_a: developer monitoring a Ralph Loop
  i_want: to see loop iteration count and status in a notification pane
  so_that: I know the loop is progressing without checking manually
  acceptance_criteria:
  - Ralph Loop updates notification pane with iteration count
  - Shows current phase/task being executed
  - Displays completion promise status
  - Updates status bar with messages like 'Iteration 5/10'
  - Questions appear in separate notification pane
  related_commands:
  - 'display_tmux_message(''Ralph Loop: Iteration 5/10 - Running phase: build'')'
  - notify_questions_in_tmux(epic_folder, questions)
  notes: 'Requires integration between Ralph Loop executor and tmux notification

    utilities. Loop should detect if running in tmux and send status updates.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-052
  title: Attach to Ralph Loop Session for Debugging
  category: ralph_integration
  priority: medium
  as_a: developer debugging a stuck Ralph Loop
  i_want: to attach to the loop's tmux session and inspect state
  so_that: I can diagnose issues without killing the loop
  acceptance_criteria:
  - agentic-tmux session list shows Ralph Loop sessions clearly
  - 'Session names follow convention: ralph-<epic-id> or ralph-<timestamp>'
  - Attach preserves loop execution in main pane
  - Notification pane shows questions and status
  - Developer can Ctrl-C to stop loop gracefully
  - Detach (Ctrl-B D) leaves loop running
  related_commands:
  - agentic-tmux session list
  - agentic-tmux session attach ralph-260207XX
  - agentic loop stop <loop-id> (alternative to Ctrl-C)
  notes: 'Tmux detach/attach semantics allow non-destructive inspection of running

    loops. The loop should handle SIGINT (Ctrl-C) for graceful shutdown.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
