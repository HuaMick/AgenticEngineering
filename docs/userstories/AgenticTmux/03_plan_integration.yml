stories:
- id: US-TMUX-020
  title: Create Session Linked to Epic
  category: epic_integration
  priority: high
  as_a: orchestration agent executing an epic
  i_want: to create a tmux session associated with a specific epic folder
  so_that: I can track which sessions are working on which epics
  acceptance_criteria:
  - agentic-tmux session create <name> --epic <folder> links to epic
  - Epic folder path is stored in session metadata
  - Epic folder is displayed in session list and status
  - Epic folder can be relative or absolute path
  - Does not validate that epic folder exists (allows future epics)
  related_commands:
  - agentic-tmux session create ticket-001 --epic docs/epics/live/260207XX_feature
  - agentic-tmux session create -p epics/live/my-epic agent-1
  notes: 'Epic folder links are purely metadata - they don''t affect session behavior

    but enable filtering and tracking in multi-epic orchestration scenarios.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-021
  title: Link Existing Session to Epic
  category: epic_integration
  priority: medium
  as_a: orchestration agent managing multiple epics
  i_want: to retroactively link a session to an epic folder
  so_that: session metadata accurately reflects current work
  acceptance_criteria:
  - SessionService.link_epic(session_name, epic_folder) updates metadata
  - Registry is updated with epic folder path
  - If session not in registry but exists in tmux, adds registry entry
  - Returns success result with confirmation message
  - Does not validate epic folder existence
  related_commands:
  - SessionService.link_epic('my-session', 'docs/epics/live/260207XX_feature')
  notes: 'This is primarily a service layer operation. Could be exposed as

    ''agentic-tmux session link --epic <folder> <name>'' if needed.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-022
  title: Filter Sessions by Epic
  category: epic_integration
  priority: low
  as_a: orchestration agent managing multiple epics
  i_want: to list sessions filtered by epic folder
  so_that: I can see which sessions are working on a specific epic
  acceptance_criteria:
  - agentic-tmux session list --epic <folder> filters to matching sessions
  - Matches exact epic folder path
  - Shows sessions with no epic link if filter is empty string
  - Returns empty list if no sessions match
  related_commands:
  - agentic-tmux session list --epic docs/epics/live/260207XX_feature
  notes: 'This feature requires adding a --epic filter flag to the list command.

    Not currently implemented but would be useful for multi-epic orchestration.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
