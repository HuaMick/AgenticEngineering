# User Stories: Plan Integration
# Covers associating sessions with plan folders for context tracking

stories:
  - id: "US-TMUX-020"
    title: "Create Session Linked to Plan"
    category: "plan_integration"
    priority: "high"
    as_a: "orchestration agent executing a plan"
    i_want: "to create a tmux session associated with a specific plan folder"
    so_that: "I can track which sessions are working on which plans"
    acceptance_criteria:
      - "agentic-tmux session create <name> --plan <folder> links to plan"
      - "Plan folder path is stored in session metadata"
      - "Plan folder is displayed in session list and status"
      - "Plan folder can be relative or absolute path"
      - "Does not validate that plan folder exists (allows future plans)"
    related_commands:
      - "agentic-tmux session create task-001 --plan docs/plans/live/260207XX_feature"
      - "agentic-tmux session create -p plans/live/my-plan agent-1"
    notes: |
      Plan folder links are purely metadata - they don't affect session behavior
      but enable filtering and tracking in multi-plan orchestration scenarios.

  - id: "US-TMUX-021"
    title: "Link Existing Session to Plan"
    category: "plan_integration"
    priority: "medium"
    as_a: "orchestration agent managing multiple plans"
    i_want: "to retroactively link a session to a plan folder"
    so_that: "session metadata accurately reflects current work"
    acceptance_criteria:
      - "SessionService.link_plan(session_name, plan_folder) updates metadata"
      - "Registry is updated with plan folder path"
      - "If session not in registry but exists in tmux, adds registry entry"
      - "Returns success result with confirmation message"
      - "Does not validate plan folder existence"
    related_commands:
      - "SessionService.link_plan('my-session', 'docs/plans/live/260207XX_feature')"
    notes: |
      This is primarily a service layer operation. Could be exposed as
      'agentic-tmux session link --plan <folder> <name>' if needed.

  - id: "US-TMUX-022"
    title: "Filter Sessions by Plan"
    category: "plan_integration"
    priority: "low"
    as_a: "orchestration agent managing multiple plans"
    i_want: "to list sessions filtered by plan folder"
    so_that: "I can see which sessions are working on a specific plan"
    acceptance_criteria:
      - "agentic-tmux session list --plan <folder> filters to matching sessions"
      - "Matches exact plan folder path"
      - "Shows sessions with no plan link if filter is empty string"
      - "Returns empty list if no sessions match"
    related_commands:
      - "agentic-tmux session list --plan docs/plans/live/260207XX_feature"
    notes: |
      This feature requires adding a --plan filter flag to the list command.
      Not currently implemented but would be useful for multi-plan orchestration.
