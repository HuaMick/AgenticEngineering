stories:
- id: US-TMUX-040
  title: Create Multi-Pane Layout for Agent Workflow
  category: multi_agent_workflow
  priority: high
  as_a: orchestration agent coordinating multiple tasks
  i_want: to create a tmux session with multiple panes for different agents
  so_that: I can run parallel tasks with visibility into each agent's work
  acceptance_criteria:
  - Session can be created with multiple panes using tmux split-window
  - Each pane can run a different agent or task
  - Panes can be titled to identify their purpose
  - Layout can be vertical splits, horizontal splits, or combinations
  - Notification pane (30% right vertical split) is standard layout
  related_commands:
  - tmux split-window -h -p 30 (creates right sidebar)
  - tmux split-window -v (creates horizontal split)
  - tmux select-pane -T <title> (sets pane title)
  notes: 'AgenticTmux doesn''t prescribe layouts but provides utilities for creating

    them. The notification pane layout (30% right) is implemented as default.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-041
  title: Send Commands to Specific Panes
  category: multi_agent_workflow
  priority: high
  as_a: orchestration agent
  i_want: to send commands to specific panes by ID or title
  so_that: I can control individual agents programmatically
  acceptance_criteria:
  - send_to_pane(pane_id, content, clear) sends text to pane
  - Pane can be identified by pane ID (e.g., '%1')
  - Pane can be found by title using get_pane_by_title(title)
  - Content is sent line-by-line to handle special characters
  - 'Clear flag determines whether to clear pane first (default: True)'
  - Raises RuntimeError if not in tmux or if send fails
  related_commands:
  - send_to_pane('%1', 'pytest tests/', clear=True)
  - pane_id = get_pane_by_title('agent-builder')
  - send_to_pane(pane_id, 'agentic plan list')
  notes: 'Uses tmux send-keys -l to send literal text, avoiding interpretation of

    special characters. Each line is sent with Enter key after it.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-042
  title: Monitor Multiple Panes for Agent Status
  category: multi_agent_workflow
  priority: medium
  as_a: orchestration agent
  i_want: to query pane information to track agent status
  so_that: I can detect when agents complete or encounter issues
  acceptance_criteria:
  - get_session_info(session_name) returns window and pane counts
  - Returns list of window names and pane IDs
  - Can check if pane exists by title
  - Can list all panes across session with tmux list-panes -a
  - Returns None if session not found
  related_commands:
  - get_session_info('my-session')
  - get_pane_by_title('agent-builder')
  notes: 'Currently provides structural information. Advanced monitoring (reading

    pane content, exit codes) would require tmux capture-pane commands.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-TMUX-043
  title: Coordinate Agent Handoffs Between Panes
  category: multi_agent_workflow
  priority: low
  as_a: orchestration agent
  i_want: to pass data between agents running in different panes
  so_that: agents can collaborate on multi-step workflows
  acceptance_criteria:
  - Agent 1 in pane A completes task and signals completion
  - Orchestrator detects completion and sends task to Agent 2 in pane B
  - Status pane updates to show workflow progress
  - Handoff metadata is stored in plan state or session metadata
  related_commands:
  - send_to_pane(pane_agent1, 'agentic plan task complete T001')
  - send_to_pane(pane_agent2, 'agentic plan task start T002')
  notes: 'This is more of a coordination pattern than a single feature. Requires

    combining send_to_pane, notification display, and plan state management.

    Could be implemented as a workflow orchestration script or agent.

    '
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
