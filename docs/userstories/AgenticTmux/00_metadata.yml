# AgenticTmux Module - User Stories Metadata

module:
  name: "AgenticTmux"
  description: |
    Terminal session management for AgenticEngineering workflows. Provides tmux
    session lifecycle management integrated with worktrees, epics, and agent
    orchestration.

    Acts as a thin presentation layer over SessionService in AgenticGuidance,
    enabling programmatic tmux operations for multi-agent workflows.

  version: "0.1.0"
  scope: "Tmux Session Management for Agent Workflows"

  principles:
    - "Thin Client Pattern - Business logic lives in SessionService"
    - "Session Persistence - Registry in ~/.config/agenticcli/sessions.json"
    - "Worktree Integration - Link sessions to git worktrees"
    - "Epic Tracking - Associate sessions with epic folders"
    - "Notification Panes - Question queue and status displays"

story_files:
  - id: "01_session_lifecycle"
    title: "Session Lifecycle Management"
    count: 6
    description: "Create, attach, list, kill, and status operations for tmux sessions"

  - id: "02_worktree_integration"
    title: "Worktree Integration"
    count: 3
    description: "Link sessions to worktrees with automatic navigation"

  - id: "03_plan_integration"
    title: "Plan Integration"
    count: 3
    description: "Associate sessions with epic folders for context tracking"

  - id: "04_notification_panes"
    title: "Notification Panes"
    count: 4
    description: "Question queue panes and status displays"

  - id: "05_multi_agent_workflow"
    title: "Multi-Agent Workflow"
    count: 4
    description: "Coordinate multiple agents in separate tmux panes"

  - id: "06_ralph_integration"
    title: "Ralph Loop Integration"
    count: 3
    description: "Tmux integration for Ralph Loop orchestration"

total_stories: 23

categories:
  session_management:
    description: "Core tmux session operations"
    commands:
      - session create
      - session attach
      - session list
      - session kill
      - session status

  integration:
    description: "Integration with other AgenticEngineering components"
    commands:
      - session create --worktree
      - session create --epic
      - notification panes
      - multi-pane layouts

architecture:
  thin_client: "CLI commands delegate to SessionService in AgenticGuidance"
  registry: "~/.config/agenticcli/sessions.json persists session metadata"
  tmux_utilities: "Shared utilities in agenticcli.utils.tmux for pane management"
  notification_system: "agenticcli.utils.tmux_notify for question queue displays"
