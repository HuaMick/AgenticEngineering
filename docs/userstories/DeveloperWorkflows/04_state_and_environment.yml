stories:
- id: US-DEV-030
  title: Manage Process State
  category: state_management
  priority: high
  as_a: developer monitoring CLI operations
  i_want: to view and manage the process state registry
  so_that: I can see what operations are running and clean up stale state
  acceptance_criteria:
  - agentic state list shows all tracked CLI processes
  - The --active flag filters to running processes only
  - agentic state show <pid> displays detailed process information
  - agentic state clear removes stale state entries
  - The --all --force flags clear all state entries
  - agentic state cleanup removes entries for dead processes
  related_commands:
  - agentic state list --active
  - agentic state show <pid>
  - agentic state cleanup
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-031
  title: Environment Variable Management
  category: environment
  priority: medium
  as_a: developer needing specific environment configuration
  i_want: to view, export, and run commands with CLI-managed environment variables
  so_that: I have the correct environment for agent operations
  acceptance_criteria:
  - agentic env show displays all relevant environment variables
  - agentic env export outputs variables in shell or JSON format
  - agentic env run <command> executes a command with injected variables
  - Environment includes LANGSMITH_API_KEY and project-specific variables
  related_commands:
  - agentic env show
  - agentic env export --format json
  - agentic env run pytest tests/
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-032
  title: CLI Output Mode Control
  category: output_modes
  priority: high
  as_a: developer or agent consuming CLI output
  i_want: to control the output format (human-readable, JSON, debug)
  so_that: I get the right format for my use case
  acceptance_criteria:
  - Default output is human-readable with Rich formatting
  - The -j flag enables JSON output for all commands
  - The -d flag enables debug logging to stderr
  - JSON output is parseable and includes all relevant data fields
  - Debug output includes timestamps and log levels
  - All commands support both output modes consistently
  related_commands:
  - agentic plan status
  - agentic -j plan status
  - agentic -d plan status
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-033
  title: Progress Indicators and Token Estimation
  category: output_modes
  priority: medium
  as_a: CLI user running long operations
  i_want: to see progress indicators and context window usage estimates
  so_that: I know the system is working and can prevent context rot
  acceptance_criteria:
  - Spinner/status indicators appear during long-running operations
  - Token estimation shows approximate context window usage before session spawn
  - 'Color coding indicates severity: cyan (safe), yellow (75%+), red (90%+)'
  - Progress bars show completion percentage for multi-step operations
  related_commands:
  - agentic session spawn --prompt <text>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-034
  title: CLI Installation and Discovery
  category: installation
  priority: critical
  as_a: developer setting up AgenticCLI
  i_want: to install and discover all available CLI commands
  so_that: I can use the full CLI capability set
  acceptance_criteria:
  - Installation via uv sync and uv pip install -e . works from modules/AgenticCLI/
  - The 'agentic' command is available at /usr/local/bin/agentic
  - agentic --help lists all available commands with descriptions
  - agentic --version shows the current CLI version
  - Command aliases work (wt for worktree, ls for langsmith, ep for entrypoint, etc.)
  - Running agentic with no arguments shows help (not error)
  - Global commands work from any directory
  - Project commands require being in a git repository
  related_commands:
  - agentic --help
  - agentic -v
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
