stories:
- id: US-DEV-001
  title: Create Worktree with Planning
  category: worktree_management
  priority: critical
  as_a: developer starting a new feature branch
  i_want: to create a git worktree with an integrated plan folder
  so_that: my workspace and planning structure are set up together
  acceptance_criteria:
  - agentic worktree create <branch> creates a worktree at ../repo-<branch>
  - 'The --base flag specifies the base branch (default: main)'
  - The --no-plan flag creates worktree without a plan folder
  - Without --no-plan, a plan folder is created in docs/plans/live/
  - Worktree creation is idempotent (re-running does not error)
  - The alias 'wt' works (agentic wt create)
  related_commands:
  - agentic worktree create feature-auth --base main
  - agentic wt create feature-auth --no-plan
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-002
  title: List and Monitor Worktrees
  category: worktree_management
  priority: high
  as_a: developer managing multiple features
  i_want: to see all active worktrees with their branch and plan associations
  so_that: I have a clear picture of my workspace layout
  acceptance_criteria:
  - agentic worktree list shows all worktrees with branch, path, and plan status
  - Shows which worktrees have associated plan folders
  - Shows the current active worktree
  - JSON output is supported
  related_commands:
  - agentic wt list
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-003
  title: Remove Worktree
  category: worktree_management
  priority: high
  as_a: developer cleaning up after feature merge
  i_want: to remove a worktree cleanly
  so_that: disk space is reclaimed and the workspace stays organized
  acceptance_criteria:
  - agentic worktree remove <branch> removes the worktree directory
  - The --force flag removes even with uncommitted changes
  - Associated plan folder is NOT automatically removed (plans persist on main)
  - Git branch can optionally be deleted
  related_commands:
  - agentic worktree remove feature-auth
  - agentic worktree remove feature-auth --force
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-DEV-004
  title: Worktree Status
  category: worktree_management
  priority: medium
  as_a: developer checking workspace state
  i_want: to see the current worktree's branch, plan, and git status
  so_that: I know my current context before starting work
  acceptance_criteria:
  - agentic worktree status shows current branch and worktree path
  - Shows associated plan folder if one exists
  - Shows git status summary (modified, staged, untracked counts)
  related_commands:
  - agentic worktree status
  - agentic wt status
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
