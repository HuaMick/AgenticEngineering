# User Stories: Testing Workflows
# Covers test execution, guidance testing, user story testing, and CI/CD

stories:
  # ============================================================================
  # TEST EXECUTION
  # ============================================================================

  - id: "US-DEV-010"
    title: "Run Tests via Agent"
    category: "test_execution"
    priority: "critical"
    as_a: "developer or orchestration agent validating code changes"
    i_want: "to run tests using the test-runner agent"
    so_that: "code quality is validated before marking tasks complete"
    acceptance_criteria:
      - "test-runner agent executes Python tests using pytest"
      - "Test results include pass count, fail count, and error details"
      - "Failed tests provide enough context for the build agent to fix them"
      - "Test execution works within the plan's test-fix loop structure"
      - "Tests are run from the correct worktree directory"
    related_agents:
      - "test-runner"
      - "orchestration-executor"

  - id: "US-DEV-011"
    title: "Build Tests from Plan"
    category: "test_execution"
    priority: "high"
    as_a: "planner-test agent creating test plans"
    i_want: "to define test tasks that the test-builder agent can implement"
    so_that: "test coverage is planned alongside implementation"
    acceptance_criteria:
      - "planner-test creates test phase plans with unit, integration, and e2e tasks"
      - "test-builder agent implements test files based on plan task definitions"
      - "Test tasks reference target files and expected behaviors"
      - "Test plans follow the testing.yml guideline standards"
    related_agents:
      - "planner-test"
      - "test-builder"
      - "test-runner"

  # ============================================================================
  # GUIDANCE TESTING
  # ============================================================================

  - id: "US-DEV-012"
    title: "Validate Guidance via Simulation"
    category: "guidance_testing"
    priority: "high"
    as_a: "teacher agent verifying guidance changes"
    i_want: "to test updated guidance by running a simulated agent walkthrough"
    so_that: "guidance changes are validated before deployment"
    acceptance_criteria:
      - "test-guidance-simulator executes a walkthrough of the guidance process"
      - "Simulation follows process.yml step by step"
      - "Missing or ambiguous guidance is flagged"
      - "Input file references are validated for existence"
      - "Simulation report includes step-by-step pass/fail results"
    related_agents:
      - "test-guidance-simulator"
      - "teacher-update-guidance"

  - id: "US-DEV-013"
    title: "User Story Blind Testing"
    category: "guidance_testing"
    priority: "medium"
    as_a: "developer validating deliverables"
    i_want: "to run blind tests derived from user stories in a plan"
    so_that: "deliverables are validated against user needs, not just technical criteria"
    acceptance_criteria:
      - "agentic plan stories test generates test scenarios from user stories"
      - "test-user-simulator agent executes the test scenarios"
      - "Tests are 'blind' - the agent does not read the user story file directly"
      - "Results report pass/fail per story with evidence"
      - "Failed tests include specific failure descriptions and recommendations"
    related_commands:
      - "agentic plan stories test --plan <path>"
    related_agents:
      - "test-user-simulator"

  # ============================================================================
  # CI/CD
  # ============================================================================

  - id: "US-DEV-014"
    title: "CI/CD Pipeline Audit"
    category: "cicd"
    priority: "medium"
    as_a: "developer maintaining build infrastructure"
    i_want: "to audit CI/CD configuration for the project"
    so_that: "I can identify gaps or issues in the build pipeline"
    acceptance_criteria:
      - "agentic cicd audit analyzes CI/CD configuration files"
      - "agentic cicd list shows all CI/CD configuration files"
      - "agentic cicd show displays a specific configuration"
      - "Audit reports missing or incomplete configurations"
      - "Note: CI/CD pipeline for AgenticGuidance is not yet implemented"
    related_commands:
      - "agentic cicd audit"
      - "agentic cicd list"
    related_agents:
      - "deploy-cicd"
