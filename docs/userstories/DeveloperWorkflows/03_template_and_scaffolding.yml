# User Stories: Template and Scaffolding
# Covers template generation, plan scaffolding, and input validation

stories:
  # ============================================================================
  # TEMPLATE GENERATION
  # ============================================================================

  - id: "US-DEV-020"
    title: "Generate Plan from Template"
    category: "template_generation"
    priority: "high"
    as_a: "planner agent or developer creating a new plan"
    i_want: "to generate a plan YAML file from a template with customization"
    so_that: "I start with a well-structured plan instead of writing from scratch"
    acceptance_criteria:
      - "agentic template list shows available template types"
      - "agentic template generate <type> creates a plan YAML"
      - "Template types include: build, test, cleanup, guidance"
      - "The --objective flag customizes the plan objective text"
      - "The --phases flag defines custom phase IDs and names"
      - "The --success-criteria flag adds success criteria"
      - "The --output flag saves to a file instead of stdout"
    related_commands:
      - "agentic template list"
      - "agentic template generate build --output plan_build.yml --objective 'Implement auth'"
      - "agentic tpl generate build --phases 'P1:Setup,P2:Build,P3:Test'"

  - id: "US-DEV-021"
    title: "Validate Input File References"
    category: "input_validation"
    priority: "high"
    as_a: "guidance maintainer ensuring file integrity"
    i_want: "to validate that all location: references in inputs.yml files resolve correctly"
    so_that: "agents do not encounter missing file errors during bootstrap"
    acceptance_criteria:
      - "agentic inputs validate <file> checks all location: paths in an inputs.yml"
      - "Reports missing files, broken references, and unresolvable paths"
      - "agentic inputs resolve <file> shows the fully resolved file list"
      - "Validation distinguishes between module-relative and repo-relative paths"
      - "Returns exit code 0 when all references are valid"
    related_commands:
      - "agentic inputs validate <file>"
      - "agentic inputs resolve <file>"

  # ============================================================================
  # STORY MANAGEMENT
  # ============================================================================

  - id: "US-DEV-022"
    title: "Find Related User Stories"
    category: "story_management"
    priority: "medium"
    as_a: "developer assessing the impact of code changes"
    i_want: "to find user stories related to my current changes"
    so_that: "I can validate that my changes do not break existing expectations"
    acceptance_criteria:
      - "agentic stories find surfaces user stories related to the current context"
      - "The --project flag scopes to a specific project's stories"
      - "The --changes flag accepts file paths to find stories affected by changes"
      - "Results show story ID, title, and relevant acceptance criteria"
    related_commands:
      - "agentic stories find --project AgenticCLI"
      - "agentic st find --changes src/agenticcli/commands/plan.py"
