area: feedback_recovery
description: "Test-fix loops, re-planning, escalation"
stories:
- id: US-PLN-065
  title: Test-Fix Loop Execution
  category: feedback_loops
  priority: critical
  description: As a orchestration-executor running test phases, I want to execute test-fix loops that re-run failing tests
    after fixes, so that test failures are resolved iteratively without human intervention.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Test phases in the TinyDB phase records define test-fix loop structure
  - step: 2
    when: the feature is used
    then:
    - test-runner agent executes tests and reports results
  - step: 3
    when: an error condition occurs
    then:
    - On failure, the build agent is re-spawned to fix the issue
  - step: 4
    when: the feature is used
    then:
    - The loop repeats until tests pass or max iterations is reached
  - step: 5
    when: the feature is used
    then:
    - Loop iteration count and results are tracked in plan state
  - step: 6
    when: the feature is used
    then:
    - Max iterations prevents infinite loops
  related_agents:
  - orchestration-executor
  - test-runner
  - build-python
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-066
  title: Feedback Trigger Handling
  category: feedback_loops
  priority: high
  description: As a orchestration-executor encountering a failure, I want to route failures to the appropriate recovery agent
    based on trigger type, so that different failure types get specialized handling.
  prerequisites: []
  steps:
  - step: 1
    when: an error condition occurs
    then:
    - 'TEST_FAILURE triggers: re-spawn build agent with failure details'
  - step: 2
    when: an error condition occurs
    then:
    - 'BUILD_FAILURE triggers: escalate to orchestration-planning for re-planning'
  - step: 3
    when: an error condition occurs
    then:
    - 'CICD_FAILURE triggers: route to deploy-cicd for pipeline fixes'
  - step: 4
    when: the feature is used
    then:
    - 'GUIDANCE_GAP triggers: route to teacher-update-guidance for improvement'
  - step: 5
    when: an error condition occurs
    then:
    - 'AUDIT_FAILURE triggers: route to planner-cleaning for resolution'
  - step: 6
    when: the feature is used
    then:
    - Feedback triggers are defined in the TinyDB phase sequence
  - step: 7
    when: an error condition occurs
    then:
    - Trigger metadata includes failure details for the recovery agent
  related_agents:
  - orchestration-executor
  - orchestration-planning
  - teacher-update-guidance
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-067
  title: Re-Planning After Failure
  category: failure_recovery
  priority: high
  description: As a orchestration-executor unable to resolve a failure, I want to escalate to orchestration-planning for plan
    modification, so that the plan adapts to unexpected situations instead of halting.
  prerequisites: []
  steps:
  - step: 1
    when: test-fix loops exhaust max iterations
    then:
    - failure is escalated
  - step: 2
    when: an error condition occurs
    then:
    - orchestration-planning receives failure context and original plan
  - step: 3
    when: the feature is used
    then:
    - Re-planning may add new tasks, modify existing tasks, or adjust phases
  - step: 4
    when: the feature is used
    then:
    - The updated plan generates a new orchestration TinyDB phase records
  - step: 5
    when: the feature is used
    then:
    - Execution resumes with the updated plan
  related_agents:
  - orchestration-executor
  - orchestration-planning
  - planner-orchestration
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
