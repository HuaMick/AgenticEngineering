area: feedback_recovery
description: "CLI mechanics for test-fix loops and coverage tracking"
stories:
- id: US-PLN-065
  title: Test-Fix Loop Ticket Mechanics
  category: feedback_loops
  priority: critical
  description: As a developer using orchestrated test phases, I want ticket status transitions to support iterative
    test-fix loops, so that test failures are tracked and tickets can cycle between in_progress and blocked states.
  prerequisites: []
  inherits_patterns:
  - id: PAT-EXE-001
    bind:
      phase_type: "test"
      max_iterations: "configurable"
      exit_condition: "tests pass or max iterations"
  steps:
  - step: 1
    when: the feature is used
    then:
    - TinyDB phase records define loop_type and loop_max_iterations for test-fix loops
  - step: 2
    when: a test ticket fails
    then:
    - Ticket status transitions to blocked with failure details
  - step: 3
    when: the feature is used
    then:
    - Loop iteration count is tracked in TinyDB phase state
  - step: 4
    when: the feature is used
    then:
    - Max iterations prevents infinite loops (phase transitions to blocked)
  - step: 5
    when: the feature is used
    then:
    - agentic epic ticket list --status blocked shows tickets awaiting fix
  related_commands:
  - agentic epic ticket list --status blocked
  - agentic epic ticket start <id> --epic <folder>
  - agentic epic ticket complete <id> --epic <folder>
  related_files:
  - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
  - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
  - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
