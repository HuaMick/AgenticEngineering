  description: |
    DEPRECATED on 2026-04-07 as part of the Story-Writer UAT-First Restructure.

    Merged into US-PLN-061 (Phase Execution and Validation). The test-fix
    loop ticket status cycle (in_progress ↔ blocked → completed) is now
    covered by steps 9–11 of US-PLN-061 and the extended uat_plan journey
    in docs/userstories/Planning/09_execution_workflows.yml.

    Why merged: this story described runtime semantics enforced by the
    executor (loop_type / loop_max_iterations / iteration counter /
    max-iterations fence) that have no independent CLI surface. Its only
    doc-blind-testable claim was the ticket status cycle, which duplicated
    US-PLN-061's journey. Two stories validating the same CLI surface is
    the fragmentation anti-pattern the journey principle warns against.

    The schema-level claims (loop_type, loop_max_iterations on phase
    records, iteration counter) are runtime contracts verified by unit
    tests against EpicRepository, not by doc-blind UAT.
