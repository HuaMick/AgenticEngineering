- id: US-PLN-071
  title: Story Coverage Re-Run Loop
  category: feedback_loops
  priority: high
  description: As a orchestration-executor managing test phase completion, I want to re-run the test-builder with uncovered
    story IDs when pytest marker coverage is incomplete, so that story coverage gaps are closed iteratively without manual
    intervention.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - After test phase, check pytest marker coverage against affected_stories list
  - step: 2
    when: the feature is used
    then:
    - 'If uncovered stories exist and iterations < max (default 3): re-spawn test-builder'
  - step: 3
    when: the feature is used
    then:
    - Re-spawned test-builder receives uncovered_story_ids and story_content as context
  - step: 4
    when: the feature is used
    then:
    - 'Exit condition: all affected stories have @pytest.mark.story markers in test files'
  - step: 5
    when: max iterations reached
    then:
    - transition to blocked state with coverage report
  - step: 6
    when: the feature is used
    then:
    - Loop is triggered by STORY_COVERAGE_INCOMPLETE feedback trigger
  - step: 7
    when: the feature is used
    then:
    - Coverage percentage and uncovered list included in loop state
  related_agents:
  - orchestration-executor
  - test-builder
  - planner-test
  related_stories:
  - US-PLN-080
  - US-PLN-081
  - US-STR-015
  last_tested: null
  test_status: untested
  test_notes: ''
