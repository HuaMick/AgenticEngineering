area: ticket_management
description: "Ticket list/current/start/complete/add/update"
stories:
- id: US-PLN-009
  title: Ticket Management
  category: ticket_management
  priority: critical
  description: As a developer or agent working on an epic, I want to list, add, and manage tickets through their lifecycle,
    so that epic progress is tracked accurately and I always know what to work on next.
  prerequisites: []
  inherits_patterns:
  - id: PAT-CLI-001
    bind:
      command: "agentic epic ticket list"
      expected_keys: [id, name, status, phase]
  - id: PAT-DAT-001
    bind:
      operation: "ticket status transition"
      target_file: "epics.db"
      service_method: "repo.update_ticket_status"
  steps:
  - step: 1
    when: listing tickets
    then:
    - agentic epic ticket list shows all tickets with ID, name, status, and phase; --status filters, --verbose shows full details
  - step: 2
    when: getting the next ticket
    then:
    - agentic epic ticket current returns the first in_progress ticket, or the first pending ticket if none are in progress
  - step: 3
    when: progressing a ticket
    then:
    - agentic epic ticket start <id> sets status to in_progress; agentic epic ticket complete <id> sets status to completed with timestamp
  - step: 4
    when: adding new work
    then:
    - agentic epic ticket add <description> creates a new pending ticket; --phase, --id, --priority flags supported
  - step: 5
    when: the feature is used
    then:
    - Status transitions are validated (pending -> in_progress -> completed); supports statuses pending, in_progress, completed, blocked
  - step: 6
    when: the feature is used
    then:
    - All ticket data is sourced from TinyDB via atomic FileLock operations; multiple agents cannot corrupt state
  - step: 7
    when: the feature is used
    then:
    - Auto-detects epic folder if --epic is not specified; JSON output (-j) supported on all subcommands
  - step: 8
    when: no phases exist in TinyDB
    then:
    - an "Ad-hoc Tickets" phase is created automatically when adding tickets
  related_commands:
  - agentic epic ticket list
  - agentic epic ticket list --status pending --verbose
  - agentic epic ticket current --epic <path>
  - agentic epic ticket start <id> --epic <folder>
  - agentic epic ticket complete <id> --epic <folder>
  - agentic epic ticket add <desc> --phase P2 --priority high
  - agentic epic ticket update <id> --status completed
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/epic.py
  - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
  - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
  related_agents:
  - orchestration-executor
  - build-python
  last_tested: '2026-02-24'
  test_status: passing
  test_notes: 'Validated by plan 260222RA: ticket start/complete work correctly, no auto-archive side effects'
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
