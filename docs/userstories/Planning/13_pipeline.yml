area: pipeline
description: "Planning pipeline stories"
stories:
- id: US-PLN-091
  title: Planning Pipeline Story Generation
  category: planning
  priority: critical
  description: As a planner agent executing the planning pipeline, I want affected_stories and story_creation_tasks
    in the plan YAML so that UAT tasks reference specific story IDs with acceptance criteria.
  prerequisites:
    - Epic has been scaffolded with objective and tickets
  steps:
  - step: 1
    when: the planning pipeline runs story generation
    then:
    - Plan data includes affected_stories list
    - Story creation tasks are generated for each affected story
    - UAT tasks reference story IDs with acceptance criteria
  last_tested: '2026-02-13T21:16:51.166001+00:00'
  test_status: pass
  test_notes: All acceptance criteria validated. Plan YAML has affected_stories and story_creation_tasks.
    UAT tasks reference story IDs with acceptance criteria. Implementation complete.
  tested_by_plan: 260214US_add_user_story_generation_phase_to_planner_agents
- id: US-PLN-092
  title: Mandatory UAT Phase in Test Plans
  category: planning
  priority: high
  description: As a planner-test agent creating test plans, I want a mandatory UAT phase so that
    every test plan maps UAT tasks 1:1 to user stories with explicit acceptance criteria and evidence collection.
  prerequisites:
    - Planning pipeline has generated affected stories
  steps:
  - step: 1
    when: the test plan is generated
    then:
    - Test plan includes a mandatory UAT phase
    - UAT tasks map 1:1 to user stories
    - Each UAT task has explicit acceptance criteria
    - Evidence collection is defined for each UAT task
  last_tested: '2026-02-13T21:16:53.478809+00:00'
  test_status: pass
  test_notes: All acceptance criteria validated. Test plan has mandatory UAT phase. UAT tasks map 1:1
    to stories with explicit acceptance criteria and evidence collection. Implementation complete.
  tested_by_plan: 260214US_add_user_story_generation_phase_to_planner_agents
