area: uat_fences
description: "UAT enforcement, story coverage, fences"
stories:
- id: US-PLN-072
  title: Unified escape hatch rules for story/UAT skipping
  category: uat_fences
  priority: critical
  description: As a orchestration system enforcing planning standards, I want a single source of truth for when stories and
    UAT can be skipped, so that agents cannot bypass fences through inconsistent rules across files.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - planning-standard.yml defines escape_hatch_rules with allowed_plan_types and blocked_plan_types
  - step: 2
    when: the feature is used
    then:
    - 'allowed_plan_types: [infrastructure, guidance, internal_tooling]'
  - step: 3
    when: the feature is used
    then:
    - 'blocked_plan_types: [build, test]'
  - step: 4
    when: the feature is used
    then:
    - All agent process files reference planning-standard.yml#escape_hatch_rules (no inline rules)
  - step: 5
    when: the feature is used
    then:
    - orchestration-planning/process.yml story-discovery step references unified rules
  - step: 6
    when: the feature is used
    then:
    - planner-test, planner-reviewer, planner-build all reference canonical location
  related_agents:
  - orchestration-planning
  - planner-test
  - planner-reviewer
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-073
  title: Build plans cannot skip stories
  category: uat_fences
  priority: critical
  description: As a orchestration system enforcing story-first planning, I want build plans to be blocked from using the escape
    hatch, so that build plans always have user stories driving acceptance criteria.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Build plans are listed in blocked_plan_types
  - step: 2
    when: an error condition occurs
    then:
    - process.yml has no flow from story-discovery step to all-phases-planned gate for build plans without stories
  - step: 3
    when: the feature is used
    then:
    - planner-build/process.yml notes that build is a blocked_plan_type
  related_agents:
  - orchestration-planning
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-074
  title: UAT phase cannot be skipped for build plans
  category: uat_fences
  priority: critical
  description: As a orchestration system enforcing mandatory UAT, I want the UAT check gate decision point to BLOCK instead
    of bypass for build plans, so that build plans cannot reach all-phases-planned gate without a UAT phase.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - process.yml UAT check gate 'No' path does NOT lead to all-phases-planned gate for build/test plans
  - step: 2
    when: an error condition occurs
    then:
    - Only allowed_plan_types can proceed without UAT (with rationale)
  - step: 3
    when: an error condition occurs
    then:
    - Build plans without UAT are BLOCKED with clear error message
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-075
  title: Executor validation gate blocks missing stories
  category: uat_fences
  priority: critical
  description: As a orchestration-executor enforcing story requirements, I want the validation gate to BLOCK (not WARN) when
    stories are missing without valid rationale, so that plans cannot complete execution without proper story validation.
  prerequisites: []
  steps:
  - step: 1
    when: an error condition occurs
    then:
    - Executor BLOCKs for build/test plan types missing stories without rationale
  - step: 2
    when: the feature is used
    then:
    - Executor BLOCKs when affected_stories present but no UAT subgraph in TinyDB phase records
  - step: 3
    when: the feature is used
    then:
    - Executor WARNs (allows) for allowed_plan_types with valid rationale
  - step: 4
    when: the feature is used
    then:
    - Validation gate references planning-standard.yml#escape_hatch_rules
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-076
  title: User story schema defines test metadata fields
  category: uat_fences
  priority: high
  description: As a system maintaining story test results, I want the user-stories.yml schema to formally define test_metadata
    fields, so that test_status, last_tested, test_notes, tested_by_plan have defined types and allowed values.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - user-stories.yml includes test_metadata section
  - step: 2
    when: an error condition occurs
    then:
    - 'test_status enum: untested, pass, fail, skip, regression'
  - step: 3
    when: the feature is used
    then:
    - 'last_tested type: ISO 8601 timestamp, nullable'
  - step: 4
    when: the feature is used
    then:
    - 'test_notes type: string, nullable'
  - step: 5
    when: the feature is used
    then:
    - 'tested_by_epic type: string (epic folder name), nullable'
  - step: 6
    when: the feature is used
    then:
    - Schema matches what stories.py cmd_update reads/writes
  related_commands:
  - agentic stories update
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-077
  title: Test user simulator writes back story status
  category: uat_fences
  priority: critical
  description: As a test-uat executing UAT, I want to write test results back to story YAML files via CLI, so that
    the executor can verify story coverage by reading test_status from story files.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - test-uat/process.yml includes mandatory step to run agentic stories update
  - step: 2
    when: the feature is used
    then:
    - Story update occurs BEFORE reporting results to orchestrator
  - step: 3
    when: the feature is used
    then:
    - test-uat/inputs.yml references user-stories.yml for schema awareness
  - step: 4
    when: an error condition occurs
    then:
    - agentic stories update <id> --status <pass|fail> --notes '...' --epic <folder> works
  related_commands:
  - agentic stories update
  related_agents:
  - test-uat
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-078
  title: Executor validates full story coverage
  category: uat_fences
  priority: high
  description: As a orchestration-executor completing a plan, I want the validation gate to verify ALL affected stories have
    been tested, so that plans cannot complete with untested stories.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Validation gate reads test_status for each story in affected_stories
  - step: 2
    when: the feature is used
    then:
    - If any story has test_status=untested -> BLOCK with coverage percentage
  - step: 3
    when: the feature is used
    then:
    - Block message includes list of untested story IDs
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-079
  title: CLI fence validation command
  category: uat_fences
  priority: high
  description: As a developer validating plan compliance, I want agentic epic validate --check-fences to validate all three
    UAT fences, so that I can pre-flight check epics before execution.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic validate <path> --check-fences performs 3 checks
  - step: 2
    when: the feature is used
    then:
    - 'Fence 1: story discovery - has affected_stories or valid no_stories_rationale'
  - step: 3
    when: the feature is used
    then:
    - 'Fence 2: UAT existence - TinyDB phase records has UAT subgraph'
  - step: 4
    when: the feature is used
    then:
    - 'Fence 3: story coverage - all stories have test_status != untested'
  - step: 5
    when: an error condition occurs
    then:
    - Exit 0 if all pass, exit 1 if any fail
  - step: 6
    when: the feature is used
    then:
    - pytest test_plan_validate_fences.py passes
  related_commands:
  - agentic epic validate --check-fences
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-080
  title: STORY_COVERAGE_INCOMPLETE Feedback Trigger
  category: uat_fences
  priority: high
  description: As a orchestration-executor detecting story coverage gaps, I want a STORY_COVERAGE_INCOMPLETE feedback trigger
    that fires when test phases leave stories uncovered, so that the system automatically detects and remediates missing story-test
    linkage.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - STORY_COVERAGE_INCOMPLETE trigger defined in orchestration-executor process.yml
  - step: 2
    when: the feature is used
    then:
    - 'Detection: read affected_stories from TinyDB, scan test files for @pytest.mark.story markers'
  - step: 3
    when: the feature is used
    then:
    - 'Comparison: uncovered = affected_stories - marked_stories'
  - step: 4
    when: the feature is used
    then:
    - Trigger fires when uncovered set is non-empty
  - step: 5
    when: the feature is used
    then:
    - 'Action under max iterations (default 3): re-spawn test-builder with uncovered_story_ids and story content'
  - step: 6
    when: the feature is used
    then:
    - After max iterations, transition to blocked state with coverage report
  related_agents:
  - orchestration-executor
  - test-builder
  related_files:
  - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
  related_stories:
  - US-PLN-071
  - US-PLN-081
  - US-STR-015
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-PLN-081
  title: Validation Gate Pytest Marker Scanning
  category: uat_fences
  priority: high
  description: As a orchestration-executor completing plan execution, I want the validation gate to scan pytest markers as
    the PRIMARY source of truth for story coverage, so that coverage validation is based on co-located markers that cannot
    drift, not ephemeral YAML test_status.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Validation gate scans test files for @pytest.mark.story markers (PRIMARY source)
  - step: 2
    when: the feature is used
    then:
    - YAML test_status checked as secondary signal only
  - step: 3
    when: an error condition occurs
    then:
    - 'Stories classified as: COVERED (marker found), UNTESTED (no marker), FAILED (marker + test_status=fail)'
  - step: 4
    when: the feature is used
    then:
    - Validation BLOCKS if ANY affected story is UNTESTED
  - step: 5
    when: the feature is used
    then:
    - Block message includes list of untested story IDs and coverage percentage
  - step: 6
    when: the feature is used
    then:
    - Marker scanning uses same regex pattern as _scan_pytest_story_markers() in CLI
  related_agents:
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
  related_stories:
  - US-PLN-078
  - US-PLN-080
  - US-GDN-077
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
