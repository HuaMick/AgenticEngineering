area: epic_management
description: "Epic new/seed/status/list/archive"
stories:
- id: US-PLN-001
  title: Epic Lifecycle
  category: epic_management
  priority: critical
  description: As a developer, I want to create, monitor, and archive epics through the CLI,
    so that I can manage the full epic lifecycle from inception to completion with clear visibility at every stage.
  prerequisites: []
  inherits_patterns:
  - id: PAT-CLI-001
    bind:
      command: "agentic epic status"
      expected_keys: [name, status, phase_count, ticket_counts]
  steps:
  - step: 1
    when: creating an epic with planning
    then:
    - agentic epic new "<description>" creates an epic folder in docs/epics/live/ and spawns a planner agent
  - step: 2
    when: creating an epic without planning
    then:
    - agentic epic seed "<description>" creates an epic folder and TinyDB record without spawning a planner
  - step: 3
    when: an epic is created
    then:
    - A TinyDB record is created with YYMMDDXX_description naming and required fields (name, status, epic_folder_name); duplicate names are rejected
  - step: 4
    when: viewing a single epic
    then:
    - agentic epic status shows epic name, phase count, ticket counts by status; without arguments, auto-detects the active epic from the current branch
  - step: 5
    when: viewing all epics
    then:
    - agentic epic list shows all epics across live/, completed/, and deferred/ with name, status, creation date, action_required, and ticket counts from TinyDB
  - step: 6
    when: reviewing epic health
    then:
    - Each epic includes an action_required field (blocked, needs_planning, execute, archive) indicating what attention is needed
  - step: 7
    when: filtering or scripting
    then:
    - Both commands support JSON output (-j) and filtering by status, priority, or branch
  - step: 8
    when: archiving a completed epic
    then:
    - agentic epic archive copies the epic folder to docs/epics/completed/ and updates TinyDB (status and folder path)
  - step: 9
    when: all tickets are completed
    then:
    - No auto-archive occurs; epic stays in live/ with action_required "archive" until explicitly archived
  - step: 10
    when: an epic is archived
    then:
    - Archived epics retain all files and history in docs/epics/completed/
  related_commands:
  - agentic epic new "<description>"
  - agentic epic seed "<description>"
  - agentic epic status
  - agentic epic status <path>
  - agentic epic list
  - agentic epic list --status active
  - agentic epic archive
  last_tested: '2026-02-24'
  test_status: passing
  test_notes: 'Validated by plan 260222RA: auto-archive removed, explicit archive works correctly'
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
