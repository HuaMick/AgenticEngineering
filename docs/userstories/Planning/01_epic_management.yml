area: epic_management
description: "Epic init/scaffold/status/list/validate/archive"
stories:
- id: US-PLN-001
  title: Initialize Epic with Worktree
  category: epic_management
  priority: critical
  description: As a developer starting a new feature, I want to run a single command that creates both a worktree and an epic
    folder, so that I have the correct workspace structure without manual naming or setup.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic init <branch> creates a git worktree at ../repo-<branch>
  - step: 2
    when: the feature is used
    then:
    - An epic folder is created in docs/epics/live/ with YYMMDDXX_description naming
  - step: 3
    when: the feature is used
    then:
    - The epic folder contains the required scaffold structure
  - step: 4
    when: the feature is used
    then:
    - The --description flag customizes the epic folder suffix
  - step: 5
    when: the feature is used
    then:
    - The --base flag specifies the base branch for the worktree
  - step: 6
    when: worktree already exists
    then:
    - it is reused without error
  - step: 7
    when: the feature is used
    then:
    - Epic folder name is generated programmatically, not interpreted by agents
  - step: 8
    when: the feature is used
    then:
    - The new epic is imported into TinyDB immediately after folder creation
  related_commands:
  - agentic epic init <branch> --description <desc> --base <base>
  related_agents:
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-002
  title: Scaffold Epic Folder Only
  category: epic_management
  priority: high
  description: As a developer who already has a worktree, I want to scaffold an epic folder without creating a new worktree,
    so that I can add planning structure to an existing workspace.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic scaffold <name> creates an epic folder in docs/epics/live/
  - step: 2
    when: the feature is used
    then:
    - The --worktree flag associates the epic with a specific worktree path
  - step: 3
    when: the feature is used
    then:
    - The scaffolded folder contains TinyDB ticket records (build phase) and orchestration placeholder
  - step: 4
    when: an error condition occurs
    then:
    - The command fails clearly if the epic folder already exists
  related_commands:
  - agentic epic scaffold <name>
  - agentic epic scaffold <name> --worktree <path>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-003
  title: View Epic Status
  category: epic_management
  priority: high
  description: As a developer reviewing current work, I want to see the status of an epic at a glance, so that I know how
    many tickets are completed, in progress, or pending.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic status shows epic name, phase count, ticket counts by status
  - step: 2
    when: an error condition occurs
    then:
    - Without arguments, auto-detects the active epic from the current branch
  - step: 3
    when: the feature is used
    then:
    - With a path argument, shows status for the specified epic
  - step: 4
    when: the feature is used
    then:
    - JSON output mode (-j) returns structured status data
  related_commands:
  - agentic epic status
  - agentic epic status <path>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-004
  title: List All Epics
  category: epic_management
  priority: high
  description: As a developer managing multiple features, I want to see all active and completed epics, so that I have visibility
    into all ongoing and past work.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic list shows all epics in docs/epics/live/ and docs/epics/completed/
  - step: 2
    when: the feature is used
    then:
    - Each epic shows name, status, and creation date
  - step: 3
    when: the feature is used
    then:
    - Epics are organized by status (live vs completed)
  - step: 4
    when: the feature is used
    then:
    - JSON output mode is supported for scripting
  - step: 5
    when: the feature is used
    then:
    - Epic data is sourced from TinyDB (via EpicService.list_epics) with YAML fallback
  - step: 6
    when: the feature is used
    then:
    - Each epic entry includes action_required field (blocked, needs_planning, execute, archive)
  - step: 7
    when: the feature is used
    then:
    - has_orchestration is determined by filesystem check for TinyDB phase records
  - step: 8
    when: the feature is used
    then:
    - Ticket counts (pending, in_progress, completed) are sourced from TinyDB when available
  related_commands:
  - agentic epic list
  last_tested: '2026-02-24'
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-PLN-005
  title: Validate Epic Structure
  category: epic_management
  priority: medium
  description: As a developer or agent, I want to validate that an epic folder has the correct structure, so that I catch
    structural issues before execution begins.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic validate checks for required files (TinyDB ticket records (build phase), TinyDB phase records)
  - step: 2
    when: an error condition occurs
    then:
    - Reports missing or malformed files with clear messages
  - step: 3
    when: an error condition occurs
    then:
    - Returns exit code 0 on success, non-zero on failure
  - step: 4
    when: an error condition occurs
    then:
    - The --strict flag treats warnings as errors
  related_commands:
  - agentic epic validate <path>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-006
  title: Archive Completed Epics
  category: archiving
  priority: high
  description: As a developer finishing a feature, I want to explicitly archive completed epics from live/ to completed/,
    so that the live folder only contains active work and archiving is deliberate.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic move folder --epic <name> --force moves epic to docs/epics/completed/
  - step: 2
    when: the feature is used
    then:
    - Ticket completion does NOT trigger auto-archive (epic stays in live/)
  - step: 3
    when: the feature is used
    then:
    - Epic status JSON shows action_required "archive" when all tickets are completed
  - step: 4
    when: the feature is used
    then:
    - agentic epic unarchive --epic <name> moves an epic back to live/
  - step: 5
    when: the feature is used
    then:
    - The --force flag on unarchive skips confirmation
  - step: 6
    when: the feature is used
    then:
    - Archived epics retain all files and history
  - step: 7
    when: the feature is used
    then:
    - The orchestration-loop is responsible for archiving via explicit move command
  - step: 8
    when: the feature is used
    then:
    - Archiving updates TinyDB via repo.archive_epic (updates status and folder path)
  - step: 9
    when: the feature is used
    then:
    - Unarchiving updates TinyDB via repo.unarchive_epic (resets status and folder path)
  - step: 10
    when: the feature is used
    then:
    - Physical folder moves (shutil.move / shutil.copytree) happen independently of TinyDB
  - step: 11
    when: an error condition occurs
    then:
    - TinyDB updates are non-fatal; physical file operation succeeds even if TinyDB fails
  related_commands:
  - agentic epic move folder --epic <name> --force
  - agentic epic unarchive --epic <name>
  last_tested: '2026-02-24'
  test_status: passing
  test_notes: 'Validated by plan 260222RA: auto-archive removed, explicit archive via epic move folder works correctly'
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
- id: US-PLN-007
  title: Move Completed Tickets
  category: archiving
  priority: medium
  description: As a developer cleaning up an epic, I want to move completed tickets within an epic's completed/ subfolder,
    so that the active ticket list stays focused on remaining work.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic move ticket <id> moves a single completed ticket
  - step: 2
    when: the feature is used
    then:
    - agentic epic move tickets moves all completed tickets at once
  - step: 3
    when: the feature is used
    then:
    - agentic epic move folder moves the entire epic folder when all tickets complete
  - step: 4
    when: an error condition occurs
    then:
    - The --dry-run flag previews the move without making changes
  - step: 5
    when: the feature is used
    then:
    - The --force flag skips confirmation prompts
  related_commands:
  - agentic epic move ticket <id>
  - agentic epic move tickets --dry-run
  - agentic epic move folder
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
