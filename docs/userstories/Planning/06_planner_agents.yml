- id: US-PLN-044
  title: Programmatic Ticket Nesting Validation
  category: planning
  priority: critical
  description: As a EpicService validating epic structure, I want validate_epic_structure() to reject epics with root-level
    tickets, so that malformed epics are caught deterministically, not just by LLM interpretation.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'validate_epic_structure() checks for root-level tickets: key in each epic file'
  - step: 2
    when: an error condition occurs
    then:
    - 'Root-level tickets: flagged as error: "tickets found at root level, must be nested under phases"'
  - step: 4
    when: an error condition occurs
    then:
    - 'Phase without tickets: flagged as warning: "Phase has no tickets defined"'
  - step: 5
    when: the feature is used
    then:
    - Validation runs on epic creation and epic update operations
  - step: 6
    when: the feature is used
    then:
    - ValidationResult includes structure_hierarchy findings
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/plan.py
  - modules/AgenticGuidance/assets/specifications/plan-schema.yml
  related_stories:
