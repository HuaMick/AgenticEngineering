- id: US-PLN-043
  title: Audit Ticket Nesting Enforcement
  category: planning
  priority: critical
  description: As a planner-audit agent, I want to detect epics with tickets at root level instead of nested under phases,
    so that downstream parsers iterating phases[].tickets[] do not silently skip work.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Detect root-level tickets: key and flag as HIGH severity STRUCTURE VIOLATION'
  - step: 3
    when: an error condition occurs
    then:
    - 'Blocking failure when phases: is missing AND tickets: is at root level'
  - step: 4
    when: the feature is used
    then:
    - Findings reported under structure_hierarchy section in audit report
  - step: 5
    when: the feature is used
    then:
    - Violations include actionable recommendation to restructure into phases[].tickets[]
  related_agents:
  - planner-audit
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-audit/process.yml
  - modules/AgenticGuidance/assets/definitions/plans.yml
  related_stories:
