area: execution_workflows
description: "TinyDB phase execution, agent routing, resume"
stories:
- id: US-PLN-061
  title: Phase Execution and Validation
  category: execution_workflow
  priority: critical
  description: As a specialist agent spawned by the executor, I want to execute tickets, enforce validation gates,
    and rely on routing validation utilities, so that phase execution is correct, resumable, and protected by
    quality checks at every transition.
  prerequisites: []
  inherits_patterns:
  - id: PAT-EXE-001
    bind:
      phase_type: "test"
      max_iterations: 3
      exit_condition: "tests pass"
  steps:
  - step: 1
    when: an agent starts work
    then:
    - Agent gets current ticket via agentic epic ticket current, starts it with agentic epic ticket start, performs the work, and marks it complete with agentic epic ticket complete
  - step: 2
    when: all tickets in a phase complete
    then:
    - Phase status updates automatically in TinyDB
  - step: 3
    when: a validation gate is present
    then:
    - Phase status cannot transition to 'completed' until validation passes; validation results are recorded in TinyDB phase records
  - step: 4
    when: validation fails
    then:
    - Failed validation sets phase status to 'blocked' with failure details; agentic epic ticket list --status blocked shows affected tickets
  - step: 5
    when: validate_phase_routing() is called
    then:
    - Returns (True, None) for a fully routed epic with active tickets; returns (False, reason) for epics with missing routing or all-proposed tickets
  - step: 6
    when: has_any_routed_phase() is called
    then:
    - Returns True if at least one phase has agent routing, False otherwise (empty list returns False)
  - step: 7
    when: concurrent agents write state
    then:
    - FileLock ensures atomic TinyDB operations; concurrent agents cannot corrupt ticket or phase state
  - step: 8
    when: execution is interrupted and resumed
    then:
    - Orchestrator resumes from last completed phase; completed tickets are not re-executed; in-progress tickets are re-attempted
  related_commands:
  - agentic epic ticket current --epic <folder>
  - agentic epic ticket start <id> --epic <folder>
  - agentic epic ticket complete <id> --epic <folder>
  - agentic epic ticket list --status in_progress
  - agentic epic ticket list --status blocked
  - agentic orchestrate session implement
  related_agents:
  - orchestration-executor
  - build-python
  - test-builder
  related_files:
  - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
  - modules/AgenticCLI/src/agenticcli/utils/phase_validation.py
  - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
  last_tested: '2026-02-27'
  test_status: passing
  test_notes: Validated by 260226SD SDK migration plan. TinyDB-backed EpicRepository with FileLock confirmed working for concurrent
    ticket state writes. SDK migration plan itself demonstrates resumable execution - tickets started/completed via agentic
    epic ticket start/complete CLI throughout all 6 build phases and 5 test/UAT phases. All 1622 AgenticCLI tests pass including
    TinyDB migration tests.
  tested_by_plan: 260226SD_migrate_sessions_to_sdk
