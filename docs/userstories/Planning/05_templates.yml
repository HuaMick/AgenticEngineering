- id: US-PLN-026
  title: Generate Epic from Template
  category: template_generation
  priority: high
  description: As a developer starting new work, I want to generate a complete epic from a template type, so that I have a structured
    starting point with appropriate phases and success criteria.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic template list shows available types
  - step: 2
    when: the feature is used
    then:
    - agentic template generate <type> creates epic YAML
  - step: 3
    when: the feature is used
    then:
    - Types include build/test/cleanup/guidance
  - step: 4
    when: the feature is used
    then:
    - --objective/--phases/--success-criteria/--output flags supported
  related_commands:
  - agentic template list
  - agentic template generate build --output epic_build.yml --objective 'Implement auth'
