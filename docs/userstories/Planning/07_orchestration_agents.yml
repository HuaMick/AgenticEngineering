area: orchestration
description: "Orchestration cluster \u2014 one story per CLI entry point. Three-story\
  \ cluster\nas of 2026-04-11:\n- US-PLN-046 (Orchestrate Session Plan) \u2014 claims\
  \ `agentic orchestrate\n  session plan`: seed-epic discovery, CLI surface, plan-time\
  \ phase\n  generation with --agent routing\n- US-PLN-047 (Orchestrate Session Implement)\
  \ \u2014 claims `agentic orchestrate\n  session implement`: TinyDB-ordered phase\
  \ execution, status transitions,\n  blocked-on-failure, idempotent resume from last\
  \ completed. Also owns the\n  executor-side auto-record of `last_pass_commit` for\
  \ every story whose\n  tests went green in the phase.\n- US-PLN-048 (Orchestrate\
  \ Session UAT) \u2014 claims `agentic orchestrate\n  session uat`: on-demand UAT\
  \ workflow that spawns `test-uat` once per\n  story, consumes the story's `uat_plan`\
  \ block. `test-uat` is the sole\n  writer of `last_uat_commit`; UatRunner verifies\
  \ the stamp landed.\n  Strictly decoupled from epic completion.\nEach story is named\
  \ after the CLI command it claims (single-command\nownership rule from build-story-writer\
  \ guidance). UAT is NOT a phase in\nthe main build loop as of 2026-04-11 \u2014\
  \ epic-creator and\nplanner-orchestration no longer template a UAT phase, and epic\
  \ completion\ngates only on \"no active phases\" (build+test done).\n"
stories:
- id: US-PLN-046
  title: Orchestrate Session Plan
  category: orchestration
  priority: critical
  lifecycle: implemented
  description: 'As a developer or planner agent, I want to discover seeded epics,
    see

    the next required action, and add routed phases at plan time, so that

    a plan moves from "epic exists" to "phases are routed to specific

    agents" via a single coherent CLI surface.


    This is the plan-time half of the orchestration loop. Runtime

    execution mechanics live in US-PLN-047 (Orchestration Resumption).

    '
  prerequisites: []
  steps:
  - step: 1
    when: agentic orchestrate session plan --epic <folder> is invoked on a seed epic
    then:
    - The CLI starts the planning workflow against an epic that was already created
      via `agentic epic new` (or the deprecated `epic seed` alias)
    - Planner-* agents are spawned per the agent registry; the plan emits phase records
      that downstream commands consume
  - step: 2
    when: a plan is being approved
    then:
    - Pre-flight validation runs against each proposed phase before approval; the
      human reviews and approves before any execution begins
    - Validation failures block plan approval and surface in the CLI output as named
      phase + reason
  - step: 3
    when: a phase is being added by the planner or by hand
    then:
    - agentic epic phase add --epic <folder> --id <id> --name <name> --agent <agent>
      creates a TinyDB phase record carrying the agent routing
    - Optional flags --execution <loop_type> and --feedback-triggers <list> attach
      loop semantics (see US-PLN-061 step 9 for the test-fix loop_type/loop_max_iterations
      contract)
  - step: 4
    when: phase records are queried
    then:
    - Each phase record carries planning|in_progress|completed|blocked status plus
      the agent routing field for the executor (see US-PLN-097 for the routing contract)
    - '`agentic epic phase list --epic <folder>` reads via repo.list_phases() (TinyDB
      query, no filesystem scan)'
  - step: 5
    when: the planning loop is invoked but no claude SDK / CLI is available
    then:
    - "The CLI exits non-zero with a \"claude binary not found\" error before any\
      \ TinyDB writes; the seed epic remains in `seed` status, ready for retry (degradation\
      \ contract \u2014 depender fails closed when the consumed transport is missing)"
  - step: 6
    when: --epic is not specified
    then:
    - "The orchestrate commands attempt to auto-detect the active epic from the current\
      \ branch; if no unique match is found, exit non-zero with a message of the form:\
      \ 'cannot infer epic \u2014 pass --epic <folder> (multiple epics match branch\
      \ <branch>: <folder1>, <folder2>, ...)' \u2014 the flag name and the full list\
      \ of ambiguous epic folders are both present in the error (mirrors the ticket-command\
      \ degradation contract)"
  uat_plan:
    persona: agent-blind-test
    starting_state: 'A seed epic exists via `agentic epic new "UAT orchestration discovery"

      --branch plan-uat-orch-disc`. No phases in TinyDB yet.

      '
    preconditions:
    - US-PLN-001
    - US-PLN-015
    journey:
    - step: 1
      action: Run `agentic epic list`
      observe:
      - command exits 0
      - the seed epic is listed with status=seed, and the footer prints the planning
        hint (e.g. 'N epic(s) need planning')
    - step: 2
      action: Run `agentic orchestrate session plan --help`
      observe:
      - command exits 0
      - help text lists --epic
      - 'help text lists --dry-run (safe validation path: creates tmux layout and
        prints JSON then exits without spawning agents)'
    - step: 3
      action: Run `agentic orchestrate session implement --help`
      observe:
      - command exits 0
      - help text lists --epic
    - step: 4
      action: 'Add a routed phase: `agentic epic phase add --epic <folder> --id P1
        --name Build --agent build-python`'
      observe:
      - command exits 0
      - '`agentic epic phase list --epic <folder>` shows P1 with agent=build-python'
    - step: 5
      action: Run `agentic epic status --epic <folder>`
      observe:
      - status output reflects the added phase
      - next-action hint references the implement command
    - step: 6
      action: Run an orchestrate command without --epic from a worktree that does
        not match any epic branch (or from the main branch where multiple epics match)
      observe:
      - command exits non-zero
      - error output contains the literal text `cannot infer epic` and `--epic <folder>`
      - 'if multiple epics match the current branch, the error also lists the matching
        epic folders in parentheses (e.g. `(multiple epics match branch ''main'':
        folder1, folder2, ...)`)'
    - step: 7
      action: 'Route a phase to mock-crash-fast for crash-path testing: `agentic
        epic phase add --epic <folder> --id P2 --name CrashTest --agent build-python`
        then `agentic epic phase update CrashTest --epic <folder> --agent mock-crash-fast`.
        Run `agentic orchestrate session plan --epic <folder>`.'
      observe:
      - The partial-success headline names the actual error cause (FIX-002)
      - The headline does NOT contain the strings "budget" or "iteration cap"
      - 'runner.state["errors"] surfaces the crash diagnosis (FIX-001)'
    - step: 8
      action: 'Route a phase to mock-hang-long: same two-step add+update. Run
        `agentic orchestrate session plan --epic <folder>`.'
      observe:
      - Role timeout fires within 10s (ROLE_TIMEOUT_SECONDS=5 for mock-hang-long)
      - Phase is marked blocked or failed
      - Command exits non-zero
    - step: 9
      action: 'Error-text accuracy assertion: grep the CLI output from step 7 for
        forbidden strings.'
      observe:
      - Output does NOT contain "budget" or "iteration cap"
      - Output DOES contain "mock-crash-fast" or the sdk-tmux error path name
    uat_coverage_gaps:
    - surface: mock-crash-fast deterministic error text assertion
      reason: Fixture agents require live Claude SDK to execute their constrained
        process.yml prompts. Without SDK, pane runner times out at SDK query level
        before the fixture bash command runs.
      blocked_by: US-PLN-049
    success_signals:
    - Seed epics are discoverable via `epic list` with a clear next-action hint
    - CLI surface for plan/implement is self-documenting via --help
    - Phase routing is persisted to TinyDB via `phase add --agent`
    - Missing --epic auto-detect failures degrade to a named-flag error
    - Partial-success headline names the real cause, not "budget/iteration cap" (FIX-002)
    - SDK-tmux failures produce structured diagnosis via pane-log fallback (FIX-001)
    cleanup:
    - '`agentic epic archive <folder>`'
  related_commands:
  - agentic orchestrate session plan --epic <folder>
  - agentic orchestrate session implement --epic <folder>
  - agentic orchestrate session spawn --role <agent> --epic <folder>
  - agentic epic new "<description>"
  - agentic epic list
  - agentic epic phase add --epic <folder> --id P1 --name Build --agent build-python
  - agentic epic phase add --epic <folder> --id P2 --name Test --agent test-builder
    --execution test-fix --feedback-triggers TEST_FAIL
  - agentic epic phase list --epic <folder>
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
  - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
  related_agents:
  - orchestration-planning
  last_tested: '2026-04-12T01:52:02.004388+00:00'
  test_status: pass
  test_notes: 'All 6 journey steps pass: epic list shows seed+hint, plan/implement
    --help self-documenting, phase add persists agent routing to TinyDB, missing --epic
    errors with ''cannot infer epic'' and folder list'
  tested_by_plan: executor:260411UA_exec_order:Mu Phase
  last_pass_commit: 1ddd77fbe0c4758fba0759e75eb2d5a2514628a4
  last_uat_commit: b153af3604e1dd18e0c9c9e911085974046898f4
- id: US-PLN-047
  title: Orchestrate Session Implement
  category: orchestration
  priority: critical
  lifecycle: implemented
  description: "As an orchestration-executor agent or developer running an active\n\
    orchestration loop, I want phases to execute in TinyDB-defined order\nwith idempotent\
    \ resume semantics, so that interrupted runs pick up\nfrom the last completed\
    \ phase without re-doing work and concurrent\nstate writes never corrupt the epic.\n\
    \nThis is the runtime half of the orchestration loop, split out of\nUS-PLN-046\
    \ on 2026-04-07. Plan-time mechanics live in US-PLN-046\n(Orchestration Discovery).\
    \ Static phase routing is owned by US-GDN-097.\n\nStep 8 was reconciled on 2026-04-08\
    \ \u2014 the executor marks routing-failed phases as `failed` (not unmutated)\
    \ to prevent retry-loops; this is defensive behavior, not a contract drift.\n"
  prerequisites: []
  steps:
  - step: 1
    when: agentic orchestrate session implement --epic <folder> is invoked
    then:
    - ExecutionRunner discovers phases via repo.list_phases() (TinyDB query, no filesystem
      scan) and executes them in TinyDB-defined order via the _order field
  - step: 2
    when: a phase is selected for execution
    then:
    - The phase is marked in_progress in TinyDB BEFORE the agent is spawned (so a
      crashed run can later resume from the right phase)
    - The agent is spawned via `agentic orchestrate session spawn --role <agent> --epic
      <folder>` using the routing from phase.agent (see US-GDN-097)
  - step: 3
    when: a phase agent completes successfully
    then:
    - The phase transitions to completed in TinyDB
    - ExecutionRunner advances to the next phase by _order
    - "The executor records `last_pass_commit` for every story whose tests went green\
      \ in this phase (resolved from phase.story_ids, falling back to a pytest marker\
      \ scan of tests touched in the run). The write goes through `StoryService.update_test_status(sid,\
      \ \"pass\", commit=<HEAD>, commit_kind=\"test\")`. Build/test agents do NOT\
      \ call `agentic stories update` themselves \u2014 the framework owns this write\
      \ so no agent-side drift can leave stories stuck on `never-passed`. NOTE: this\
      \ framework-owns pattern applies to `last_pass_commit` (build/test phases) only.\
      \ `last_uat_commit` is agent-owned \u2014 see US-PLN-048 for that contract."
  - step: 4
    when: a phase agent fails or its dependencies are not met
    then:
    - The phase transitions to blocked with failure details captured in the phase
      record
    - The orchestration loop halts on the blocked phase rather than skipping it; downstream
      phases are not executed until the blocked phase recovers
  - step: 5
    when: the orchestration loop is interrupted (Ctrl-C, crash, network drop)
    then:
    - On the next `implement` invocation, ExecutionRunner finds the last completed
      phase via TinyDB and resumes from the NEXT phase
    - Already-completed phases are not re-executed (idempotent resume contract)
    - In-progress phases at restart time are re-attempted from the start of the phase
      (the executor cannot know mid-phase progress)
  - step: 6
    when: epic state is queried during a long-running implement
    then:
    - '`agentic epic status --epic <folder>` is safe to run from any worktree (TinyDB
      lives at ~/.agentic/epics.db, see US-SES-020); reads do not block writes thanks
      to FileLock'
  - step: 7
    when: TinyDB FileLock cannot be acquired during a status transition
    then:
    - The executor retries with backoff up to a configured timeout; if the lock remains
      held, the phase transition is aborted and the executor exits non-zero with the
      holding-PID if discoverable (degradation contract for the FileLock dependency)
  - step: 8
    when: a phase has no agent routing (phase.agent is missing)
    then:
    - The executor exits non-zero with the routing-missing error from US-GDN-097 step
      3 BEFORE attempting to spawn anything; no agent process is created; the phase
      is marked as `failed` in TinyDB so the orchestrator does not retry-loop on it
      (depender fails closed before any side effect outside TinyDB)
  uat_plan:
    persona: agent-blind-test
    starting_state: 'A seed epic exists with three phases added via `agentic epic
      phase add`:

      P1 (agent=build-python, _order=1), P2 (agent=test-builder, _order=2),

      P3 (agent=build-python, _order=3). All begin with status=planning

      (the default produced by `agentic epic phase add`). TinyDB is writable.

      '
    preconditions:
    - US-PLN-001
    - US-PLN-015
    - US-GDN-097
    journey:
    - step: 1
      action: Run `agentic epic phase list --epic <folder>` and confirm P1/P2/P3 are
        planning in the order P1, P2, P3
      observe:
      - command exits 0
      - phases listed in 1, 2, 3 order
    - step: 2
      action: Manually transition P1 to completed using `agentic epic phase update
        P1 --epic <folder> --status completed`
      observe:
      - command exits 0
      - P1 shows completed in `agentic epic phase list --epic <folder>`
    - step: 3
      action: 'Route P2 to mock-crash-fast: `agentic epic phase update P2 --epic
        <folder> --agent mock-crash-fast`. Run `agentic orchestrate session
        implement --epic <folder>`.'
      observe:
      - P2 is marked failed with the fixture error string surfaced
      - executor does not advance past P2 to P3
      - command exits non-zero
    - step: 4
      action: 'Route P2 to mock-hang-long: `agentic epic phase update P2 --epic
        <folder> --agent mock-hang-long`. Run `agentic orchestrate session
        implement --epic <folder>`.'
      observe:
      - wait_for_session timeout is enforced (ROLE_TIMEOUT_SECONDS=5)
      - P2 is marked blocked or failed
      - executor does not advance to P3
    - step: 5
      action: 'Ctrl-C reconciliation: seed P2 as in_progress with a completed
        session record (use `agentic epic phase update P2 --epic <folder> --status
        in_progress`). Create a fake StateStore record with status=completed and
        exit_code=0. Run `agentic orchestrate session implement --epic <folder>`.'
      observe:
      - '_recover_stale_phases emits a warning: "Reconciled stuck phase ... session
        ... completed successfully while phase was in_progress — auto-promoting to
        completed"'
      - P2 is promoted to completed in TinyDB
      - executor advances to P3 (FIX-005 atomic writeback / startup reconciliation)
    - step: 6
      action: 'Foreground log tee: run `agentic orchestrate session implement --epic
        <folder>` in foreground (no -b flag). After completion, check
        ~/.agentic/sessions/<loop_id>/stdout.log.'
      observe:
      - stdout.log exists with non-zero size
      - file contains execution output from the implement run (FIX-006)
    - step: 7
      action: Add a fourth phase P4 with no --agent flag and try to run implement
      observe:
      - command exits non-zero
      - error names P4 and the missing agent routing
      - P4 status is now `failed` in TinyDB (marked as failed to prevent retry-loop,
        NOT left planning)
    uat_coverage_gaps:
    - surface: mock-crash-fast and mock-hang-long deterministic error text
      reason: Fixture agents require live Claude SDK to execute constrained
        process.yml prompts. Without SDK, pane runner times out before fixture
        bash command runs.
      blocked_by: US-PLN-049
    success_signals:
    - Phase execution follows TinyDB _order, not file/list position
    - Completed phases are not re-executed on resume (idempotency)
    - Missing agent routing marks the phase failed and exits non-zero before any agent
      spawn (depender fails closed at the routing layer, not at the spawn layer)
    - Ctrl-C between agent completion and TinyDB write is healed by startup
      reconciliation (FIX-005)
    - Foreground implement writes stdout.log to session dir (FIX-006)
    - Fixture crash/hang phases are marked failed/blocked without advancing (FIX-001)
    cleanup:
    - '`agentic epic archive <folder>`'
  related_commands:
  - agentic orchestrate session implement --epic <folder>
  - agentic orchestrate session spawn --role <agent> --epic <folder>
  - agentic epic phase list --epic <folder>
  - agentic epic phase update <id> --epic <folder> --status <status>
  - agentic epic status --epic <folder>
  related_files:
  - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
  - modules/AgenticCLI/src/agenticcli/utils/phase_validation.py
  - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
  related_agents:
  - orchestration-executor
  last_tested: '2026-04-12T01:52:02.004388+00:00'
  test_status: pass
  test_notes: Implement follows _order, skips completed phases on resume, marks agentless
    P4 failed at routing layer (exit 1)
  tested_by_plan: executor:260411UA_exec_order:Mu Phase
  last_pass_commit: 1ddd77fbe0c4758fba0759e75eb2d5a2514628a4
  last_uat_commit: b153af3604e1dd18e0c9c9e911085974046898f4
- id: US-PLN-048
  title: Orchestrate Session UAT
  category: orchestration
  priority: critical
  lifecycle: under-construction
  description: "As a developer or UAT runner, I want a standalone `agentic orchestrate\n\
    session uat` command that spawns `test-uat` once per story against the\nstory's\
    \ own `uat_plan` block, so that UAT validation is decoupled from\nepic completion\
    \ and can be run on-demand against a single story, an\nepic's stories, or the\
    \ stale set.\n\nWhy this exists (2026-04-11): the prior model templated a `UAT`\
    \ phase\ninto every epic's phase list, but nothing in the executor or agent\n\
    actually wrote `last_uat_commit` back \u2014 the phase was cosmetic because\n\
    the write was unreachable from agent-spawned paths. The new contract\nmakes `test-uat`\
    \ the sole writer of `last_uat_commit` (via `agentic stories\nupdate` as its mandatory\
    \ final step) and UatRunner the verifier (reads\nthe field before and after each\
    \ spawn; if it did not change, the run is\nmarked failed). This works uniformly\
    \ across all spawn paths: UatRunner,\norchestration-executor phase routing, and\
    \ ad-hoc subagent spawns.\n\nThis workflow is strictly on-demand. `session implement`\
    \ never triggers\nit. Epic completion never implies it has run.\n"
  prerequisites: []
  steps:
  - step: 1
    when: agentic orchestrate session uat --story <id> is invoked
    then:
    - The UatRunner loads the single story, extracts its `uat_plan` block, and spawns
      `test-uat` once with that block as the entire prompt context (agent-blind-test
      contract)
    - "UatRunner reads `last_uat_commit` via `StoryService.get_by_id(sid).last_uat_commit`\
      \ before spawning (the pre-value). After the agent exits with success, UatRunner\
      \ reads the field again. If the value did not change, the run is marked failed\
      \ with the reason 'agent forgot to stamp' \u2014 UatRunner does NOT write the\
      \ stamp itself."
    - On a verified pass (pre != post), UatRunner records the outcome in the session
      summary. The actual `last_uat_commit` write is performed by `test-uat` via `agentic
      stories update <sid> --status pass --kind uat --notes "<summary>"` as its mandatory
      final step.
  - step: 2
    when: agentic orchestrate session uat --epic <folder> is invoked
    then:
    - UatRunner resolves the set of stories attached to that epic via `get_epic_stories_path`
    - UatRunner spawns `test-uat` once per story, tagging each session with story_id
      in session metadata
    - Each story gets its own pass/fail record; `last_uat_commit` is written by `test-uat`
      on pass, verified by UatRunner via pre/post read
  - step: 3
    when: agentic orchestrate session uat --stale is invoked
    then:
    - UatRunner resolves the set via `StoryService.get_stale_stories()` (stories whose
      watched files changed since `last_uat_commit`)
    - Each stale story gets a dedicated `test-uat` session
  - step: 4
    when: a story has no `uat_plan` block
    then:
    - UatRunner skips the story with a named error (`<sid>: missing uat_plan`), continues
        the batch, and the final summary lists skipped stories
  - step: 5
    when: the UAT session completes
    then:
    - UatRunner emits a final summary: N passed, M failed, K skipped, and the list
        of stories whose `last_uat_commit` was updated
    - A "failed" entry in the summary includes stories where the agent exited with
      success but `last_uat_commit` did not change (agent forgot to stamp)
  uat_plan:
    persona: agent-blind-test
    starting_state: 'At least one story exists under `docs/userstories/` with a complete

      `uat_plan` block (e.g. US-PLN-047 from this same file). No prior

      `last_uat_commit` is required. TinyDB is writable.

      '
    preconditions:
    - US-PLN-046
    - US-PLN-047
    journey:
    - step: 1
      action: Run `agentic orchestrate session uat --help`
      observe:
      - command exits 0
      - help text lists --story, --epic, --stale, --dry-run
    - step: 2
      action: Run `agentic orchestrate session uat --story US-PLN-047 --dry-run`
      observe:
      - command exits 0
      - output prints the resolved target story set
      - no agent process is spawned and no YAML is mutated
    - step: 3
      action: 'Stamp mechanism verification: record the current `last_uat_commit`
        for a test story (e.g. US-PLN-047). Run `agentic stories update US-PLN-047
        --status pass --kind uat --notes "manual stamp test"`. Read
        `last_uat_commit` again.'
      observe:
      - last_uat_commit changed from the pre-value to the current HEAD commit
      - the stamp write is performed by the stories update command, not by UatRunner
    - step: 4
      action: 'Agent-forgot-to-stamp detection: inspect UatRunner source
        (workflows/uat.py) for the pre/post last_uat_commit comparison logic.
        Confirm the code path that marks a run as failed when post == pre.'
      observe:
      - 'code reads last_uat_commit before spawn, reads again after, and if
        post_commit == pre_commit marks the run as failed with reason containing
        "agent forgot to"'
      - this is a code-inspection step (no live agent spawn required)
    - step: 5
      action: Invoke `--story <id>` against a story that has no `uat_plan` block
      observe:
      - 'command exits 0 with a final summary listing the story as skipped
        (contract: continue batch, name the skip)'
      - YAML is not mutated for the skipped story
    - step: 6
      action: 'Real test-uat spawn path: run `agentic orchestrate session uat
        --story US-PLN-047` against a story with a complete uat_plan. Observe the
        full spawn-verify-stamp cycle.'
      observe:
      - UatRunner spawns test-uat for the story
      - On pass, last_uat_commit is updated by the agent
      - UatRunner detects the stamp change and records PASS
    uat_coverage_gaps:
    - surface: real test-uat stamp-pass path (step 6)
      reason: Requires a live Claude SDK session to spawn test-uat. Without SDK
        the pane runner times out before the agent can execute its uat_plan.
      blocked_by: US-PLN-049
    success_signals:
    - UAT is reachable via a dedicated CLI command (`orchestrate session uat`) with
      on-demand scoping (--story / --epic / --stale)
    - UatRunner spawns one `test-uat` session per story, each tagged with story_id
    - '`last_uat_commit` is written by `test-uat` via `agentic stories update` as
      its mandatory final step; UatRunner verifies via pre/post read and fails the
      run if the stamp did not land'
    - A clean agent exit without a stamp change is treated as a failed UAT run (no
      silent pass-through)
    - Missing `uat_plan` fails closed per-story without blocking the batch
    - Stamp mechanism works end-to-end: pre/post read detects change
    cleanup:
    - Revert mutated YAML via `git checkout -- docs/userstories/` if running against
      real stories
  related_commands:
  - agentic orchestrate session uat --story <id>
  - agentic orchestrate session uat --epic <folder>
  - agentic orchestrate session uat --stale
  - agentic orchestrate session uat --dry-run
  related_files:
  - modules/AgenticCLI/src/agenticcli/workflows/uat.py
  - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
  - modules/AgenticCLI/src/agenticcli/cli.py
  - modules/AgenticGuidance/agents/test/test-uat/process.yml
  - modules/AgenticGuidance/src/agenticguidance/services/story.py
  related_agents:
  - test-uat
  last_tested: '2026-04-12T01:52:02.004388+00:00'
