area: orchestration_agents
description: "CLI mechanics for plan creation, phase generation, and execution"
stories:
- id: US-PLN-046
  title: Orchestration Workflow
  category: orchestration
  priority: critical
  description: As a developer orchestrating feature delivery, I want the CLI to coordinate planning, phase generation,
    and execution through a unified workflow, so that work flows from plan approval through agent-routed execution
    with clear status tracking at each stage.
  prerequisites: []
  steps:
  - step: 1
    when: starting the planning workflow
    then:
    - agentic orchestrate session plan --plan <epic-folder> starts planning; epic is created via agentic epic new or agentic epic seed
  - step: 2
    when: planning completes
    then:
    - Pre-flight validation checks each phase plan before approval; human reviews and approves before execution begins
  - step: 3
    when: phases are approved
    then:
    - agentic epic phase add --epic <folder> --name <phase> --agent <agent-name> creates TinyDB phase records with agent routing
  - step: 4
    when: configuring phase behavior
    then:
    - Phase records support --execution flag for loop type (e.g., test-fix) and --feedback-triggers flag for failure handling
  - step: 5
    when: phase records are created
    then:
    - Each phase record includes status tracking (pending, in_progress, completed, blocked) and agent routing for orchestration-executor
  - step: 6
    when: starting execution
    then:
    - agentic orchestrate session implement --plan <epic-folder> discovers phases via repo.list_phases() and executes them in TinyDB-defined order
  - step: 7
    when: executing a phase
    then:
    - Each phase agent is spawned via CLI context injection (agentic orchestrate session spawn --role <agent>); phase is marked in_progress before spawn, completed after success
  - step: 8
    when: phase status transitions
    then:
    - Phase follows pending -> in_progress -> completed/blocked; blocked is set if dependencies are not met or agent fails
  - step: 9
    when: execution is interrupted
    then:
    - Orchestrator resumes from last completed phase; completed phases are not re-executed
  - step: 10
    when: the feature is used
    then:
    - Epic creation happens on main branch; feature worktrees are created for code implementation; epic status is viewable from any worktree via TinyDB query
  related_commands:
  - agentic orchestrate session plan --plan <epic-folder>
  - agentic orchestrate session implement --plan <epic-folder>
  - agentic orchestrate session spawn --role <agent-role> --plan <epic-folder>
  - agentic epic new "<description>"
  - agentic epic seed "<description>"
  - agentic epic list
  - agentic epic phase add --epic <folder> --name <phase> --agent build-python
  - agentic epic phase add --epic <folder> --name <phase> --agent test-builder --execution test-fix --feedback-triggers TEST_FAIL
  - agentic epic phase list --epic <folder>
  - agentic epic ticket current
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
