area: orchestration_agents
description: "Orchestration-planning, orchestration-executor agent behavior"
stories:
- id: US-PLN-046
  title: Human-in-the-Loop Plan Creation
  category: orchestration
  priority: critical
  description: As a user requesting a feature or improvement, I want to work with an orchestration agent to create a detailed
    implementation plan, so that I can review and approve the plan before any code execution begins.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - orchestration-planning agent coordinates the planning workflow
  - step: 2
    when: the feature is used
    then:
    - Agent spawns deploy-worktree to set up epic folder structure
  - step: 3
    when: the feature is used
    then:
    - Agent spawns appropriate planner (planner-build, planner-test, planner-guidance, etc.)
  - step: 4
    when: the feature is used
    then:
    - Agent spawns planner-reviewer to validate each phase plan
  - step: 5
    when: the feature is used
    then:
    - Agent spawns planner-orchestration to generate orchestration TinyDB phase records
  - step: 6
    when: the feature is used
    then:
    - Human reviews and approves plan before execution
  - step: 7
    when: the feature is used
    then:
    - Plan saved to docs/epics/live/{plan_id}/
  - step: 8
    when: the feature is used
    then:
    - Orchestration TinyDB phase records generated with TinyDB phase agent field
  related_commands:
  - agentic epic init <branch> --description <desc>
  related_agents:
  - orchestration-planning
  - deploy-worktree
  - planner-build
  - planner-test
  - planner-guidance
  - planner-reviewer
  - planner-orchestration
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-047
  title: Multi-Phase Plan Creation
  category: orchestration
  priority: high
  description: As a orchestration-planning agent, I want to coordinate creation of multiple phases (build, test, teach, cleanup),
    so that the plan is comprehensive and includes all necessary phases.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Spawns planner-build for implementation phases
  - step: 2
    when: the feature is used
    then:
    - Spawns planner-test for validation phases
  - step: 3
    when: the feature is used
    then:
    - Spawns planner-guidance for teaching phases
  - step: 4
    when: the feature is used
    then:
    - Spawns planner-cleaning for cleanup phases
  - step: 5
    when: the feature is used
    then:
    - Each phase plan is reviewed by planner-reviewer
  - step: 6
    when: the feature is used
    then:
    - Phases are integrated into single orchestration TinyDB phase records
  - step: 7
    when: the feature is used
    then:
    - Phase execution order is defined in TinyDB phase records PHASES metadata
  related_agents:
