area: planning_workflows
description: "Plan initiation, multi-phase, approval workflows"
stories:
- id: US-PLN-053
  title: Initiate Implementation Planning
  category: planning_workflow
  priority: critical
  lifecycle: under-construction
  description: As a developer starting a new feature, I want to initiate a planning workflow that produces an approved implementation
    epic, so that work is planned before execution begins.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Planning is initiated via _TinyDB ticket records (build phase) entrypoint
  - step: 2
    when: the feature is used
    then:
    - The orchestration-planning agent coordinates the planning process
  - step: 3
    when: the feature is used
    then:
    - A worktree is created or verified via CLI commands (agentic epic init)
  - step: 4
    when: the feature is used
    then:
    - An epic record is created in TinyDB with YYMMDDXX_description naming (no disk folder required at this point)
  - step: 5
    when: the feature is used
    then:
    - The planning objective is captured and validated
  - step: 6
    when: the feature is used
    then:
    - Required phases are determined based on objective type
  related_commands:
  - agentic ep execute ticket_build
  - agentic epic init <branch> --description <desc>
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-054
  title: Main-First Planning Workflow
  category: planning_workflow
  priority: critical
  lifecycle: under-construction
  description: As a team maintaining multiple features, I want epics to be created in TinyDB for centralized visibility,
    so that all active epics are accessible from a single global database regardless of worktree.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Epic records are created in the global TinyDB (~/.agentic/epics.db), not as disk folders
  - step: 2
    when: the feature is used
    then:
    - Feature worktrees are created for code implementation
  - step: 3
    when: the feature is used
    then:
    - Epic creation happens on main branch, execution on feature branch
  - step: 4
    when: the feature is used
    then:
    - agentic epic init creates both worktree and TinyDB epic record atomically
  - step: 5
    when: the feature is used
    then:
    - Epic status is viewable from any worktree via TinyDB query
  - step: 6
    when: the feature is used
    then:
    - Merging happens via staging to main
  - step: 7
    when: the feature is used
    then:
    - Disk folders in docs/epics/live/ are created lazily when agents write artifacts (stories.yml, README.md)
  related_commands:
  - agentic epic init <branch>
  - agentic epic list
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-055
  title: Specialized Planner Agents
  category: epic_creation
  priority: critical
  description: As a orchestration-planning agent, I want to spawn specialized planner agents for each phase type, so that
    each epic phase is created by a domain expert.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - planner-build creates implementation phase epics for code changes
  - step: 2
    when: the feature is used
    then:
    - planner-test creates test validation phase epics with execution loops
  - step: 3
    when: the feature is used
    then:
    - planner-audit creates cleanup and audit phase epics
  - step: 4
    when: the feature is used
    then:
    - planner-build creates guidance improvement phase epics
  - step: 5
    when: the feature is used
    then:
    - planner-test creates guidance completeness testing epics
  - step: 6
    when: the feature is used
    then:
    - Each planner follows its process.yml guidance
  - step: 7
    when: the feature is used
    then:
    - Planners output structured YAML epic files
  related_agents:
  - orchestration-planning
  - planner-build
  - planner-test
  - planner-audit
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-056
  title: Epic Review and Approval
  category: epic_review
  priority: critical
  description: As a orchestration-planning agent ensuring epic quality, I want to submit epics for review and iterate based
    on feedback, so that only well-structured, complete epics proceed to execution.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Pre-flight validation checks review submitted epics
  - step: 2
    when: the feature is used
    then:
    - Review checks for completeness, clarity, and feasibility
  - step: 3
    when: the feature is used
    then:
    - Rejected epics are returned with specific feedback
  - step: 4
    when: the feature is used
    then:
    - Orchestration-planning manages the review iteration loop
  - step: 5
    when: the feature is used
    then:
    - Epics can go through multiple review cycles
  - step: 6
    when: the feature is used
    then:
    - Approved epics have clear success criteria and ticket definitions
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-057
  title: Generate Orchestration Phases (TinyDB) from Epic
  category: epic_creation
  priority: critical
  description: As a orchestration-planning agent finalizing an epic, I want to generate a Mermaid flowchart (TinyDB phase
    records) that defines execution order, so that the orchestration-executor can read and execute the epic dynamically.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - planner-orchestration agent generates TinyDB phase records via repo.list_phases()s
  - step: 2
    when: the feature is used
    then:
    - TinyDB phase records includes phase nodes with TinyDB phase agent field
  - step: 3
    when: an error condition occurs
    then:
    - TinyDB phase records defines transitions between phases (success/failure paths)
  - step: 4
    when: the feature is used
    then:
    - Test phases include test-fix loop structures
  - step: 5
    when: an error condition occurs
    then:
    - Feedback triggers are defined for failure handling
  - step: 6
    when: the feature is used
    then:
    - TinyDB phase records is validated via agentic epic orchestration validate
  related_commands:
  - agentic epic orchestration generate
  - agentic epic orchestration validate
  related_agents:
  - planner-orchestration
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-PLN-058
  title: Human Approval Gate
  category: epic_review
  priority: critical
  description: As a human overseeing the planning process, I want to review and approve the complete epic before execution
    begins, so that I maintain control over what gets built.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - The orchestration-planning agent presents the complete epic for human review
  - step: 2
    when: the feature is used
    then:
    - Human can approve, reject, or request modifications
  - step: 3
    when: the feature is used
    then:
    - Epic includes objective, phases, tickets, success criteria, and orchestration TinyDB phase records
  - step: 4
    when: the feature is used
    then:
    - Approval is recorded in the epic metadata
  - step: 5
    when: the feature is used
    then:
    - Only approved epics can be executed by orchestration-executor
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
