area: phase_management
description: "Phase add/list/update, orchestration generate"
stories:
- id: US-PLN-015
  title: Manage Epic Phases
  category: phase_management
  priority: high
  description: As a planner agent structuring an epic, I want to add, list, and update phases within an epic, so that the
    epic has clear execution milestones.
  prerequisites: []
  inherits_patterns:
  - id: PAT-DAT-002
    bind:
      entity: phase
      repository: EpicRepository
      operations: [add, list, update]
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic epic phase add --id P1 --name 'Name' creates a new phase
  - step: 2
    when: the feature is used
    then:
    - The --description flag adds scope information to the phase
  - step: 3
    when: the feature is used
    then:
    - agentic epic phase list shows all phases with status and ticket counts
  - step: 4
    when: the feature is used
    then:
    - agentic epic phase update <id> --status in_progress changes phase status
  - step: 5
    when: the feature is used
    then:
    - Phase IDs are unique within an epic
  - step: 6
    when: the feature is used
    then:
    - Phase data is stored in TinyDB (repo.add_phase, repo.update_phase)
  - step: 7
    when: the feature is used
    then:
    - Phase list sources data from TinyDB
  - step: 8
    when: the feature is used
    then:
    - Status transitions are validated
  related_commands:
  - agentic epic phase add --id P1 --name 'Core Implementation'
  - agentic epic phase list
  - agentic epic phase update P1 --status completed
  last_tested: '2026-02-24'
  test_status: passing
  test_notes: ''
  tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
