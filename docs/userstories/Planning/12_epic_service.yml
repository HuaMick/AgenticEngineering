- id: US-PLN-087
  title: Ticket Status Management
  category: services
  priority: critical
  description: As a CLI updating ticket status, I want to transition ticket status through workflow states, so that ticket
    progress is tracked accurately.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'TaskStatus enum: PENDING, IN_PROGRESS, COMPLETED'
  - step: 2
    when: the feature is used
    then:
    - Validate status transitions (pending -> in_progress -> completed)
  - step: 3
    when: the feature is used
    then:
    - Set completed_date when status transitions to completed
  - step: 4
    when: the feature is used
    then:
    - Atomic status updates using FileLock
  - step: 5
    when: an error condition occurs
    then:
    - Return success/failure indication
  related_commands:
  - agentic epic ticket start <id> --epic <folder>
  - agentic epic ticket complete <id> --epic <folder>
