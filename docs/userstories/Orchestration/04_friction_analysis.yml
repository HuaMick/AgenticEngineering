stories:
- id: US-ORCH-030
  title: Initiate Friction Analysis
  category: friction_analysis
  priority: high
  as_a: guidance maintainer monitoring agent quality
  i_want: to initiate a friction analysis workflow from LangSmith traces
  so_that: I can systematically identify and address agent pain points
  acceptance_criteria:
  - Friction analysis is initiated via _analyze_friction.yml entrypoint
  - orchestration-friction agent coordinates the analysis workflow
  - LangSmith traces are queried for friction patterns
  - Analysis covers configurable time ranges and session counts
  - Results are organized by severity and pattern type
  related_commands:
  - agentic ep execute _analyze_friction
  - agentic ls friction -p my-project --recommend
  related_agents:
  - orchestration-friction
  - teacher-trace-diagnostics
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-031
  title: Detect Friction Patterns from Traces
  category: friction_analysis
  priority: high
  as_a: teacher-trace-diagnostics agent
  i_want: to analyze LangSmith traces and identify recurring friction patterns
  so_that: systematic issues are surfaced rather than one-off anomalies
  acceptance_criteria:
  - Friction patterns are detected across multiple sessions
  - 'Patterns include: context overload, tool misuse, guidance gaps, retry storms'
  - Each pattern has severity, affected sessions, and description
  - Minimum affected threshold filters noise from genuine patterns
  - Results are exportable to markdown, YAML, or JSON
  related_commands:
  - agentic ls friction -p my-project --min-affected 2
  related_agents:
  - teacher-trace-diagnostics
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-032
  title: Generate Improvement Recommendations
  category: friction_analysis
  priority: high
  as_a: guidance maintainer reviewing friction results
  i_want: to receive actionable recommendations for each friction pattern
  so_that: I know what guidance changes to make
  acceptance_criteria:
  - The --recommend flag generates improvement suggestions per pattern
  - Recommendations reference specific guidance files to modify
  - 'Recommendations include: add guideline, update process, add example, add definition'
  - Recommendations are prioritized by pattern severity
  - Results can be used to create a guidance improvement plan
  related_commands:
  - agentic ls friction -p my-project --recommend
  related_agents:
  - orchestration-friction
  - teacher-trace-diagnostics
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-033
  title: Guidance Improvement from Friction
  category: friction_analysis
  priority: high
  as_a: teacher agent implementing friction recommendations
  i_want: to update guidance files based on friction analysis results
  so_that: agent behavior improves over time based on observed struggles
  acceptance_criteria:
  - orchestration-friction coordinates guidance improvements
  - teacher-update-guidance modifies process.yml and inputs.yml based on recommendations
  - teacher-update-assets creates new definitions or guidelines as needed
  - Changes are validated by test-guidance-simulator
  - Improvements are tracked and their impact measured in subsequent friction analyses
  related_agents:
  - orchestration-friction
  - teacher-update-guidance
  - teacher-update-assets
  - test-guidance-simulator
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-034
  title: Agent-to-CLI Handoff Detection
  category: friction_analysis
  priority: medium
  as_a: friction analyst reviewing trace patterns
  i_want: to identify operations that should be moved from agent handling to CLI
  so_that: established patterns are automated as deterministic CLI commands
  acceptance_criteria:
  - Repeated agent operations with consistent patterns are flagged
  - Friction patterns showing naming drift suggest CLI enforcement
  - Patterns showing verification loops suggest CLI validation commands
  - Recommendations include potential CLI command designs
  - 'The handoff pattern lifecycle is documented: novel -> repeated -> established
    -> CLI'
  related_agents:
  - teacher-trace-diagnostics
  - orchestration-friction
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
