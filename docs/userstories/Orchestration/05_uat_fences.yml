stories:
- id: US-ORCH-035
  title: Unified escape hatch rules for story/UAT skipping
  category: uat_fences
  priority: critical
  as_a: orchestration system enforcing planning standards
  i_want: a single source of truth for when stories and UAT can be skipped
  so_that: agents cannot bypass fences through inconsistent rules across files
  acceptance_criteria:
  - planning-standard.yml defines escape_hatch_rules with allowed_plan_types and blocked_plan_types
  - 'allowed_plan_types: [infrastructure, guidance, internal_tooling]'
  - 'blocked_plan_types: [build, test]'
  - All agent process files reference planning-standard.yml#escape_hatch_rules (no
    inline rules)
  - orchestration-planning/process.mmd StoryDiscovery_SG references unified rules
  - planner-test, planner-reviewer, planner-build all reference canonical location
  related_agents:
  - orchestration-planning
  - planner-test
  - planner-reviewer
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-036
  title: Build plans cannot skip stories
  category: uat_fences
  priority: critical
  as_a: orchestration system enforcing story-first planning
  i_want: build plans to be blocked from using the escape hatch
  so_that: build plans always have user stories driving acceptance criteria
  acceptance_criteria:
  - Build plans are listed in blocked_plan_types
  - process.mmd has no path from StoryDiscovery_SG to AllPhasesPlanned for build plans
    without stories
  - planner-build/process.yml notes that build is a blocked_plan_type
  related_agents:
  - orchestration-planning
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-037
  title: UAT phase cannot be skipped for build plans
  category: uat_fences
  priority: critical
  as_a: orchestration system enforcing mandatory UAT
  i_want: the CheckUAT decision point to BLOCK instead of bypass for build plans
  so_that: build plans cannot reach AllPhasesPlanned without a UAT phase
  acceptance_criteria:
  - process.mmd CheckUAT 'No' path does NOT lead to AllPhasesPlanned for build/test
    plans
  - Only allowed_plan_types can proceed without UAT (with rationale)
  - Build plans without UAT are BLOCKED with clear error message
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-038
  title: Executor validation gate blocks missing stories
  category: uat_fences
  priority: critical
  as_a: orchestration-executor enforcing story requirements
  i_want: the validation gate to BLOCK (not WARN) when stories are missing without
    valid rationale
  so_that: plans cannot complete execution without proper story validation
  acceptance_criteria:
  - Executor BLOCKs for build/test plan types missing stories without rationale
  - Executor BLOCKs when affected_stories present but no UAT subgraph in MMD
  - Executor WARNs (allows) for allowed_plan_types with valid rationale
  - Validation gate references planning-standard.yml#escape_hatch_rules
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-039
  title: User story schema defines test metadata fields
  category: uat_fences
  priority: high
  as_a: system maintaining story test results
  i_want: the user-stories.yml schema to formally define test_metadata fields
  so_that: test_status, last_tested, test_notes, tested_by_plan have defined types
    and allowed values
  acceptance_criteria:
  - user-stories.yml includes test_metadata section
  - 'test_status enum: untested, pass, fail, skip, regression'
  - 'last_tested type: ISO 8601 timestamp, nullable'
  - 'test_notes type: string, nullable'
  - 'tested_by_plan type: string (plan folder name), nullable'
  - Schema matches what stories.py cmd_update reads/writes
  related_commands:
  - agentic stories update
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-040
  title: Test user simulator writes back story status
  category: uat_fences
  priority: critical
  as_a: test-user-simulator executing UAT
  i_want: to write test results back to story YAML files via CLI
  so_that: the executor can verify story coverage by reading test_status from story
    files
  acceptance_criteria:
  - test-user-simulator/process.yml includes mandatory step to run agentic stories
    update
  - Story update occurs BEFORE reporting results to orchestrator
  - test-user-simulator/inputs.yml references user-stories.yml for schema awareness
  - agentic stories update <id> --status <pass|fail> --notes '...' --plan <folder>
    works
  related_commands:
  - agentic stories update
  related_agents:
  - test-user-simulator
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-041
  title: Executor validates full story coverage
  category: uat_fences
  priority: high
  as_a: orchestration-executor completing a plan
  i_want: the validation gate to verify ALL affected stories have been tested
  so_that: plans cannot complete with untested stories
  acceptance_criteria:
  - Validation gate reads test_status for each story in affected_stories
  - If any story has test_status=untested -> BLOCK with coverage percentage
  - Block message includes list of untested story IDs
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-042
  title: CLI fence validation command
  category: uat_fences
  priority: high
  as_a: developer validating plan compliance
  i_want: agentic plan validate --check-fences to validate all three UAT fences
  so_that: I can pre-flight check plans before execution
  acceptance_criteria:
  - agentic plan validate <path> --check-fences performs 3 checks
  - 'Fence 1: story discovery - has affected_stories or valid no_stories_rationale'
  - 'Fence 2: UAT existence - MMD has UAT subgraph'
  - 'Fence 3: story coverage - all stories have test_status != untested'
  - Exit 0 if all pass, exit 1 if any fail
  - pytest test_plan_validate_fences.py passes
  related_commands:
  - agentic plan validate --check-fences
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
