stories:
- id: US-ORCH-010
  title: Execute Approved Epic via MMD
  category: execution_workflow
  priority: critical
  as_a: developer with an approved epic
  i_want: to execute the epic by routing work to appropriate agents
  so_that: implementation proceeds automatically with the right specialists
  acceptance_criteria:
  - Execution is initiated via _orchestrate.yml entrypoint
  - orchestration-executor reads the orchestration_*.mmd file
  - AGENT_ROUTING metadata determines which agent handles each phase
  - Phases execute in the order defined by the MMD flowchart
  - 'Phase status transitions: pending -> in_progress -> completed'
  - State is persisted to epic YAML and MMD STATUS headers
  related_commands:
  - agentic ep execute orchestrate
  - agentic epic ticket current
  related_agents:
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-011
  title: Dynamic Agent Routing
  category: execution_workflow
  priority: critical
  as_a: orchestration-executor agent
  i_want: to spawn the correct agent for each phase based on MMD metadata
  so_that: the right specialist handles each type of work
  acceptance_criteria:
  - Builder phases route to build-python (default) or build-flutter
  - Tester phases route to test-runner or test-guidance-simulator
  - Deployer phases route to deploy-cicd or deploy-worktree
  - Teacher phases route to teacher-update-guidance or teacher-update-assets
  - Cleaner phases route to planner-cleaning
  - Auditor phases route to test-audit or test-final-output
  - Routing is determined at runtime from MMD, not hardcoded
  related_agents:
  - orchestration-executor
  - build-python
  - test-runner
  - teacher-update-guidance
  last_tested: '2026-02-27'
  test_status: passing
  test_notes: 'Validated by 260226SD SDK migration plan. SDK migration plan executed
    6 build phases and 5 test/UAT phases with correct agent routing through the full
    lifecycle. ROLE_TOOL_ALLOWLIST added to sdk_runner.py provides role-based tool
    restrictions per agent type. All 1622 AgenticCLI tests pass.'
  tested_by_plan: 260226SD_migrate_sessions_to_sdk
- id: US-ORCH-012
  title: Phase-Level Ticket Execution
  category: execution_workflow
  priority: critical
  as_a: specialist agent spawned by the executor
  i_want: to receive my current ticket, execute it, and report completion
  so_that: epic progress is tracked at the ticket level
  acceptance_criteria:
  - Agent bootstraps via agentic ctx bootstrap to get role context and current ticket
  - Agent starts the ticket via agentic epic ticket start <id>
  - Agent performs the work defined in the ticket description and guidance
  - Agent marks the ticket complete via agentic epic ticket complete <id>
  - Ticket completion triggers status update in the epic YAML
  - When all tickets in a phase complete, the phase status updates
  related_commands:
  - agentic ctx bootstrap --role build-python
  - agentic epic ticket start <id>
  - agentic epic ticket complete <id>
  related_agents:
  - build-python
  - test-runner
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-013
  title: Validation Gates
  category: execution_workflow
  priority: high
  as_a: orchestration-executor enforcing quality
  i_want: to run validation before committing phase outputs
  so_that: defective work is caught before it progresses to the next phase
  acceptance_criteria:
  - Test phases execute test-fix loops before marking complete
  - Build phases require passing validation before completion
  - The executor spawns test agents (test-runner, test-audit) for validation
  - Failed validation triggers feedback loops (re-execution with fixes)
  - Validation results are recorded in the plan
  related_agents:
  - orchestration-executor
  - test-runner
  - test-audit
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-014
  title: Persistent Execution State
  category: state_management
  priority: critical
  as_a: orchestration-executor resuming after interruption
  i_want: to pick up execution where it left off using persistent state
  so_that: interruptions do not cause work to be repeated
  acceptance_criteria:
  - Ticket statuses are persisted to epic YAML files via atomic file operations
  - FileLock ensures concurrent agents cannot corrupt state
  - An interrupted executor can resume by reading current ticket status
  - Completed tickets are not re-executed
  - In-progress tickets are re-attempted on resume
  - agentic epic ticket current returns the correct next ticket after resume
  related_commands:
  - agentic epic ticket current
  - agentic epic ticket list --status in_progress
  related_agents:
  - orchestration-executor
  last_tested: '2026-02-27'
  test_status: passing
  test_notes: 'Validated by 260226SD SDK migration plan. TinyDB-backed EpicRepository
    with FileLock confirmed working for concurrent ticket state writes. SDK migration
    plan itself demonstrates resumable execution - tickets started/completed via agentic
    epic ticket start/complete CLI throughout all 6 build phases and 5 test/UAT phases.
    All 1622 AgenticCLI tests pass including TinyDB migration tests.'
  tested_by_plan: 260226SD_migrate_sessions_to_sdk
- id: US-ORCH-015
  title: Epic Explicit Archival
  category: state_management
  priority: high
  as_a: developer cleaning up after feature completion
  i_want: to explicitly archive completed epics when the orchestration-loop confirms completion
  so_that: the live epics folder only shows active work and archiving is deliberate
  acceptance_criteria:
  - Ticket completion does NOT auto-archive; epic stays in live/ until explicitly archived
  - Epic status JSON shows action_required "archive" when all tickets are completed
  - The orchestration-loop archives via agentic epic move folder --force
  - The epic folder moves from docs/epics/live/ to docs/epics/completed/ on explicit command
  - Archival preserves all epic files and history
  - Unarchival is available via agentic epic unarchive for reactivation
  related_commands:
  - agentic epic move folder --epic <name> --force
  - agentic epic unarchive --epic <name>
  last_tested: '2026-02-23'
  test_status: passed
  test_notes: 'Validated by plan 260222RA: auto-archive removed, explicit archive model confirmed working'
  tested_by_plan: 260222RA_remove_auto_archive_from_cli_task_completion
