stories:
- id: US-ORCH-001
  title: Initiate Implementation Planning
  category: planning_workflow
  priority: critical
  as_a: developer starting a new feature
  i_want: to initiate a planning workflow that produces an approved implementation
    epic
  so_that: work is planned before execution begins
  acceptance_criteria:
  - Planning is initiated via _ticket_build.yml entrypoint
  - The orchestration-planning agent coordinates the planning process
  - A worktree is created or verified via deploy-worktree agent
  - An epic folder is created in docs/epics/live/ with YYMMDDXX_description naming
  - The planning objective is captured and validated
  - Required phases are determined based on objective type
  related_commands:
  - agentic ep execute ticket_build
  - agentic epic init <branch> --description <desc>
  related_agents:
  - orchestration-planning
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-002
  title: Main-First Planning Workflow
  category: planning_workflow
  priority: critical
  as_a: team maintaining multiple features
  i_want: epics to be created in the main worktree for centralized visibility
  so_that: all active epics are visible from a single location
  acceptance_criteria:
  - Epic folders are created in the main worktree's docs/epics/live/
  - Feature worktrees are created for code implementation
  - Epic creation happens on main branch, execution on feature branch
  - agentic epic init creates both worktree and epic folder atomically
  - Epic status is viewable from the main worktree
  - Merging happens via staging to main
  related_commands:
  - agentic epic init <branch>
  - agentic epic list
  related_agents:
  - orchestration-planning
  - deploy-worktree
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-003
  title: Specialized Planner Agents
  category: epic_creation
  priority: critical
  as_a: orchestration-planning agent
  i_want: to spawn specialized planner agents for each phase type
  so_that: each epic phase is created by a domain expert
  acceptance_criteria:
  - planner-build creates implementation phase epics for code changes
  - planner-test creates test validation phase epics with execution loops
  - planner-cleaning creates cleanup and audit phase epics
  - planner-guidance creates guidance improvement phase epics
  - planner-guidance-testing creates guidance completeness testing epics
  - Each planner follows its process.yml guidance
  - Planners output structured YAML epic files
  related_agents:
  - orchestration-planning
  - planner-build
  - planner-test
  - planner-cleaning
  - planner-guidance
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-004
  title: Epic Review and Approval
  category: epic_review
  priority: critical
  as_a: orchestration-planning agent ensuring epic quality
  i_want: to submit epics for review and iterate based on feedback
  so_that: only well-structured, complete epics proceed to execution
  acceptance_criteria:
  - planner-reviewer agent reviews submitted epics
  - Review checks for completeness, clarity, and feasibility
  - Rejected epics are returned with specific feedback
  - Orchestration-planning manages the review iteration loop
  - Epics can go through multiple review cycles
  - Approved epics have clear success criteria and ticket definitions
  related_agents:
  - orchestration-planning
  - planner-reviewer
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-005
  title: Generate Orchestration MMD from Epic
  category: epic_creation
  priority: critical
  as_a: orchestration-planning agent finalizing an epic
  i_want: to generate a Mermaid flowchart (MMD) that defines execution order
  so_that: the orchestration-executor can read and execute the epic dynamically
  acceptance_criteria:
  - planner-orchestration agent generates orchestration_*.mmd files
  - MMD includes phase nodes with AGENT_ROUTING metadata
  - MMD defines transitions between phases (success/failure paths)
  - Test phases include test-fix loop structures
  - Feedback triggers are defined for failure handling
  - MMD is validated via agentic epic orchestration validate
  related_commands:
  - agentic epic orchestration generate
  - agentic epic orchestration validate
  related_agents:
  - planner-orchestration
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-ORCH-006
  title: Human Approval Gate
  category: epic_review
  priority: critical
  as_a: human overseeing the planning process
  i_want: to review and approve the complete epic before execution begins
  so_that: I maintain control over what gets built
  acceptance_criteria:
  - The orchestration-planning agent presents the complete epic for human review
  - Human can approve, reject, or request modifications
  - Epic includes objective, phases, tickets, success criteria, and orchestration MMD
  - Approval is recorded in the epic metadata
  - Only approved epics can be executed by orchestration-executor
  related_agents:
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
