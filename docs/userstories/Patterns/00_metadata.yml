version: "1.0"
description: "Reusable cross-cutting verification patterns for user stories"

# Pattern ID naming convention:
#   PAT-{DOMAIN}-{NNN}  e.g. PAT-CLI-001, PAT-DAT-001
#
# Patterns are reusable behavioral specs that stories inherit via
# the `inherits_patterns` field. A pattern declares parameters,
# verification steps, and structural checks. Stories bind concrete
# values to those parameters.
#
# Industry precedent: RSpec shared_examples, Gherkin Scenario Outline,
# SAFe Capabilities.

domains:
  - name: CLI
    prefix: PAT-CLI
    directory: cli/
    description: "CLI output, flags, error messages, help text"
  - name: Data
    prefix: PAT-DAT
    directory: data/
    description: "FileLock atomicity, TinyDB CRUD, persistence"
  - name: Execution
    prefix: PAT-EXE
    directory: execution/
    description: "Test-fix loops, bounded retry, feedback routing"
  - name: Context
    prefix: PAT-CTX
    directory: context/
    description: "CCI bootstrap, input resolution, context files"
  - name: Testing
    prefix: PAT-TST
    directory: testing/
    description: "UAT fences, coverage, reward hacking detection"
  - name: Agent
    prefix: PAT-AGT
    directory: agent/
    description: "Agent spawning, lifecycle, routing, manifests"

prefixes:
  PAT-CLI: CLI
  PAT-DAT: Data
  PAT-EXE: Execution
  PAT-CTX: Context
  PAT-TST: Testing
  PAT-AGT: Agent
