area: installation
description: "Setup wizard, update/rebuild, CLI installation"
stories:
- id: US-SET-001
  title: Initial CLI Setup
  category: configuration
  priority: critical
  description: As a developer installing AgenticCLI for the first time, I want to run a setup wizard that configures the CLI,
    so that I have a working configuration without manual file editing.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic setup runs an interactive setup wizard
  - step: 2
    when: the feature is used
    then:
    - The wizard configures required settings (project paths, preferences)
  - step: 3
    when: the feature is used
    then:
    - Configuration is stored in ~/.config/agenticcli/
  - step: 4
    when: the feature is used
    then:
    - The --force flag re-runs setup even if already configured
  - step: 5
    when: the feature is used
    then:
    - Setup validates that dependencies are available
  related_commands:
  - agentic setup
  - agentic setup --force
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-002
  title: Update and Rebuild CLI
  category: maintenance
  priority: medium
  description: As a developer keeping CLI current, I want to update or rebuild the CLI from source, so that I always have
    the latest features and fixes.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic update runs uv sync to reinstall from source
  - step: 2
    when: the feature is used
    then:
    - agentic rebuild performs a full rebuild (clean + rebuild + reinstall)
  - step: 3
    when: an error condition occurs
    then:
    - Both commands report success or failure clearly
  - step: 4
    when: the feature is used
    then:
    - Version number is updated after rebuild
  related_commands:
  - agentic update
  - agentic rebuild
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-003
  title: CLI Installation and Discovery
  category: configuration
  priority: critical
  description: As a new user installing the CLI, I want installation and discovery to work reliably, so that I can start using
    the tool immediately after setup.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Installation via uv sync works from modules/AgenticCLI/
  - step: 2
    when: the feature is used
    then:
    - agentic at /usr/local/bin/agentic
  - step: 3
    when: the feature is used
    then:
    - --help lists all commands
  - step: 4
    when: the feature is used
    then:
    - --version shows version
  - step: 5
    when: the feature is used
    then:
    - Command aliases work
  - step: 6
    when: the feature is used
    then:
    - No-args shows help
  - step: 7
    when: the feature is used
    then:
    - Global commands work anywhere
  - step: 8
    when: the feature is used
    then:
    - Project commands require git repo
  related_commands:
  - agentic --help
  - agentic -v
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
