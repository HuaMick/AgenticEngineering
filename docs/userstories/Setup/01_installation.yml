area: installation
description: "CLI installation, setup wizard, and health verification"
stories:
- id: US-SET-001
  title: CLI Installation and Verification
  category: configuration
  priority: critical
  description: As a new user, I want to install, configure, and verify the CLI so that I have
    a working tool immediately after setup and can quickly diagnose any issues.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Installation via uv sync works from modules/AgenticCLI/
    - agentic is available at /usr/local/bin/agentic
  - step: 2
    when: the feature is used
    then:
    - agentic setup init runs an interactive setup wizard
    - The --force flag re-runs setup even if already configured
  - step: 3
    when: the feature is used
    then:
    - Setup validates that dependencies are available (python3, uv, tmux)
    - Configuration is stored in ~/.config/agenticcli/
  - step: 4
    when: the feature is used
    then:
    - --help lists all commands and no-args shows help
    - --version shows version
    - Command aliases work; global commands work anywhere, project commands require git repo
  - step: 5
    when: the feature is used
    then:
    - agentic health checks CLI installation, dependencies, and configuration
    - Includes version checks for python3, uv, git, and claude CLI
  - step: 6
    when: an error condition occurs
    then:
    - Reports the status of each component (OK, WARNING, ERROR)
    - Reports configuration file presence and validity
    - Suggests fixes for any issues found
  related_commands:
  - agentic setup init
  - agentic setup init --force
  - agentic --help
  - agentic -v
  - agentic health
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
