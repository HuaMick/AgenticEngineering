area: shell_ux
description: "Progress feedback and context estimation"
stories:
- id: US-SET-014
  title: Session Execution Feedback
  category: feedback_metrics
  priority: high
  description: As a CLI user running orchestration sessions, I want context estimation before
    spawn and progress feedback during execution, so that I can make informed decisions and
    track system activity in real time.
  prerequisites: []
  steps:
  - step: 1
    when: a session spawn is requested
    then:
    - Context usage percentage is estimated from prompt content before spawn
    - Token count is estimated using the token utilities in agenticcli.utils.tokens
  - step: 2
    when: context estimation completes
    then:
    - 'Color coding indicates severity: cyan (safe), yellow (75%+), red (90%+)'
    - A warning is displayed suggesting context reduction when usage exceeds 90%
  - step: 3
    when: agentic orchestrate session implement is running
    then:
    - A spinner/status indicator appears during agent spawn
    - The active phase name and ticket ID are displayed as they progress
  - step: 4
    when: the feature is used
    then:
    - Real-time output from the spawned agent is streamed to the terminal
  - step: 5
    when: the operation completes or errors
    then:
    - The progress indicator disappears and final status is shown
  related_commands:
  - agentic orchestrate session implement
  - agentic orchestrate session spawn --role build-python --plan <epic>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
