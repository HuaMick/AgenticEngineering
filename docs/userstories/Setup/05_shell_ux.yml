area: shell_ux
description: "Shell completion and UX feedback"
stories:
- id: US-SET-012
  title: Install Shell Auto-Completion
  category: shell_completion
  priority: high
  description: As a developer using the agentic CLI frequently, I want to install auto-completion for my shell, so that I
    can tab-complete commands and arguments efficiently.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic completion install <shell> installs completion for specified shell
  - step: 2
    when: the feature is used
    then:
    - 'Supported shells: bash, zsh, fish, powershell'
  - step: 3
    when: the feature is used
    then:
    - Completion is installed to standard shell config locations
  - step: 4
    when: the feature is used
    then:
    - Instructions are displayed for activating completion
  - step: 5
    when: the feature is used
    then:
    - Command detects shell automatically if not specified
  - step: 6
    when: the feature is used
    then:
    - Installation is idempotent (safe to run multiple times)
  related_commands:
  - agentic completion install bash
  - agentic completion install zsh
  - agentic completion install fish
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-013
  title: Show Completion Script
  category: shell_completion
  priority: medium
  description: As a developer customizing shell configuration, I want to view the completion script without installing, so
    that I can manually integrate it into my custom shell config.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic completion show <shell> displays completion script
  - step: 2
    when: the feature is used
    then:
    - Output can be redirected to a file or eval'd directly
  - step: 3
    when: the feature is used
    then:
    - Script includes all commands and subcommands
  - step: 4
    when: the feature is used
    then:
    - Script supports dynamic completion for file paths and epic folders
  related_commands:
  - agentic completion show bash
  - agentic completion show zsh > ~/.zsh_completion_agentic
  - eval "$(agentic completion show bash)"
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-014
  title: Real-time Progress Visibility
  category: feedback_metrics
  priority: high
  description: As a CLI user, I want to see a progress indicator during long-running session spawn commands, so that I know
    the system is still working and not frozen.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - A spinner/status indicator appears during session spawn
  - step: 2
    when: the feature is used
    then:
    - Real-time output is streamed to the terminal
  - step: 3
    when: the feature is used
    then:
    - The indicator disappears when the operation completes
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-015
  title: Context Window Awareness
  category: feedback_metrics
  priority: high
  description: As a CLI user, I want to see how much of the context window is being used, so that I can prevent context rot
    and manage my sessions effectively.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Context usage percentage is displayed before session spawn
  - step: 2
    when: the feature is used
    then:
    - 'Color coding indicates severity: cyan (safe), yellow (75%+), red (90%+)'
  - step: 3
    when: the feature is used
    then:
    - Token count is estimated from prompt content
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-016
  title: Progress Indicators and Token Estimation
  category: feedback_metrics
  priority: medium
  description: As a CLI user performing long operations, I want visual progress indicators and token usage estimates, so that I
    can monitor operation progress and context window consumption.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Spinner/status indicators during long operations
  - step: 2
    when: the feature is used
    then:
    - Token estimation shows context window usage before spawn
  - step: 3
    when: the feature is used
    then:
    - 'Color coding: cyan (safe), yellow (75%+), red (90%+)'
  - step: 4
    when: the feature is used
    then:
    - Progress bars for multi-step operations
  related_commands:
  - agentic orchestrate session spawn --prompt <text>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
