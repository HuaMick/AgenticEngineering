area: configuration
description: "Configuration and preferences management"
stories:
- id: US-SET-005
  title: CLI Configuration
  category: configuration
  priority: high
  description: As a developer customizing CLI behavior, I want to manage configuration values
    and control output format, so that I can adjust settings and get human-readable or
    machine-parseable output as needed.
  prerequisites: []
  inherits_patterns:
  - id: PAT-CLI-001
    bind:
      command: "all commands"
      expected_keys: [varies_by_command]
  - id: PAT-CLI-003
    bind:
      command: "all commands"
      error_trigger: "invalid input"
      expected_message: "varies"
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic setup config show displays the current configuration
    - agentic setup config show-path shows the config file location
  - step: 2
    when: the feature is used
    then:
    - agentic setup config get <key> retrieves a single value
    - agentic setup config set <key> <value> stores a value
  - step: 3
    when: the feature is used
    then:
    - agentic setup config list shows all key-value pairs
    - agentic setup config delete <key> removes a value
  - step: 4
    when: the feature is used
    then:
    - agentic setup config clear --force removes all configuration
  - step: 5
    when: the feature is used
    then:
    - -j flag enables JSON output for all commands; JSON is parseable with all relevant fields
    - Default output is human-readable with Rich
  - step: 6
    when: the feature is used
    then:
    - -d flag enables debug logging to stderr with timestamps and log levels
    - All commands support both JSON and debug modes
  related_commands:
  - agentic setup config show
  - agentic setup config list
  - agentic setup config set output.format json
  - agentic setup config get output.format
  - agentic setup config clear --force
  - agentic setup config show-path
  - agentic -j epic status
  - agentic -d epic status
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
