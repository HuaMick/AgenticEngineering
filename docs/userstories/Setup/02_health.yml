area: health
description: "CLI health check"
stories:
- id: US-SET-004
  title: Health Check
  category: configuration
  priority: high
  description: As a developer troubleshooting CLI issues, I want to run a health check that validates CLI dependencies and
    configuration, so that I can quickly identify what is missing or misconfigured.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic health checks CLI installation, dependencies, and configuration
  - step: 2
    when: an error condition occurs
    then:
    - Reports the status of each component (OK, WARNING, ERROR)
  - step: 3
    when: the feature is used
    then:
    - Includes version checks for python3, uv, git, and claude CLI
  - step: 4
    when: the feature is used
    then:
    - Reports configuration file presence and validity
  - step: 5
    when: the feature is used
    then:
    - Suggests fixes for any issues found
  related_commands:
  - agentic health
