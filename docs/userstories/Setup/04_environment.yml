area: environment
description: "Environment variable management"
stories:
- id: US-SET-008
  title: Environment Variable Management
  category: environment_management
  priority: medium
  description: As a developer, I want to manage environment variables for the CLI so that I can
    inspect, export, and inject configuration without manual setup.
  prerequisites: []
  inherits_patterns:
  - id: PAT-CLI-001
    bind:
      command: "agentic setup config env show"
      expected_keys: [name, value, masked]
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic setup config env show displays CLI-relevant environment variables
    - Output includes CC_*, CLAUDE_* variables
  - step: 2
    when: the feature is used
    then:
    - Sensitive values are masked in output
    - JSON output supported with --json flag
  - step: 3
    when: the feature is used
    then:
    - agentic setup config env export outputs env vars in shell or JSON format
    - Output can be eval'd to set environment
  - step: 4
    when: the feature is used
    then:
    - agentic setup config env run <command> executes command with CLI environment injected
    - Command arguments are passed through correctly
  - step: 5
    when: the feature is used
    then:
    - Exit code is preserved from the wrapped command
  related_commands:
  - agentic setup config env show
  - agentic setup config env export --format shell
  - agentic setup config env export --format json
  - eval $(agentic setup config env export --format shell)
  - agentic setup config env run claude code
  - agentic setup config env run pytest tests/
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/env.py
  - modules/AgenticGuidance/src/agenticguidance/services/environment.py
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
