area: environment
description: "Environment variable management"
stories:
- id: US-SET-008
  title: Show Environment Variables
  category: environment_management
  priority: medium
  description: As a developer debugging configuration issues, I want to see all relevant environment variables, so that I
    can verify configuration and API keys.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic env show displays CLI-relevant environment variables
  - step: 2
    when: the feature is used
    then:
    - Output includes CC_*, CLAUDE_* variables
  - step: 3
    when: the feature is used
    then:
    - Sensitive values are masked in output
  - step: 4
    when: the feature is used
    then:
    - JSON output supported with --json flag
  related_commands:
  - agentic env show
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-009
  title: Export Environment Variables
  category: environment_management
  priority: low
  description: As a developer scripting CLI operations, I want to export environment variables in a format I can eval, so
    that I can set environment programmatically.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic env export outputs env vars in shell format
  - step: 2
    when: the feature is used
    then:
    - The --format shell outputs export statements
  - step: 3
    when: the feature is used
    then:
    - The --format json outputs JSON object
  - step: 4
    when: the feature is used
    then:
    - Output can be eval'd to set environment
  related_commands:
  - agentic env export --format shell
  - eval $(agentic env export --format shell)
  - agentic env export --format json
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-010
  title: Run Command with Environment
  category: environment_management
  priority: medium
  description: As a developer testing with specific environment, I want to run a command with CLI environment pre-loaded,
    so that I don't need to manually set environment variables.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic env run <command> executes command with CLI environment
  - step: 2
    when: the feature is used
    then:
    - All CLI-relevant environment variables are injected
  - step: 3
    when: the feature is used
    then:
    - Command arguments are passed through correctly
  - step: 4
    when: the feature is used
    then:
    - Exit code is preserved from the wrapped command
  related_commands:
  - agentic env run claude code
  - agentic env run pytest tests/
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SET-011
  title: Environment Variable Management
  category: environment_management
  priority: medium
  description: As a developer configuring agent environments, I want to view, export, and inject environment variables, so that
    agents and commands run with the correct configuration.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic env show displays relevant env vars
  - step: 2
    when: the feature is used
    then:
    - agentic env export outputs in shell/JSON
  - step: 3
    when: the feature is used
    then:
    - agentic env run <command> executes with injected vars
  - step: 4
    when: the feature is used
    then:
    - Environment includes project-specific variables
  related_commands:
  - agentic env show
  - agentic env export --format json
  - agentic env run pytest tests/
