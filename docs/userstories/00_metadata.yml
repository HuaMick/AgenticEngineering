metadata:
  version: "1.0"
  last_updated: "2026-02-07"
  purpose: "Centralized user stories for AgenticEngineering system validation"

  overview: |
    User stories covering the seven pillars of AgenticEngineering:
    1. AgenticCLI - Command-line interface for deterministic operations
    2. AgenticGuidance - Agent definitions, guidance, and orchestration
    3. AgenticFrontend - UI for session monitoring, plan visualization, and workflow interaction
    4. AgenticBackend - Backend services, API endpoints, and WebSocket communication
    5. AgenticLangSmith - LangSmith observability and friction analysis
    6. Orchestration - Planning and execution workflows
    7. DeveloperWorkflows - Worktrees, CI/CD, testing, and daily dev tasks

  conventions: |
    - Story IDs use prefix per category: US-CLI, US-GD, US-FE, US-BACKEND, US-LANGSMITH, US-ORCH, US-DEV
    - Each story follows as_a / i_want / so_that format
    - Acceptance criteria are testable assertions
    - Related agents and commands link stories to implementation
    - Priority: critical > high > medium > low

  categories:
    - name: AgenticCLI
      prefix: US-CLI
      description: "CLI usage stories covering plan management, session management, context bootstrapping, and tool operations"
      story_files:
        - "AgenticCLI/01_feedback_metrics.yml"
        - "AgenticCLI/02_plan_management.yml"
        - "AgenticCLI/03_session_and_loop.yml"
        - "AgenticCLI/04_context_bootstrap.yml"
        - "AgenticCLI/05_langsmith.yml"
        - "AgenticCLI/06_question_queue.yml"
        - "AgenticCLI/07_configuration.yml"
        - "AgenticCLI/08_entrypoints.yml"

    - name: AgenticGuidance
      prefix: US-GD
      description: "Guidance management stories covering agent definitions, process files, inputs, and assets"
      story_files:
        - "AgenticGuidance/01_agent_definitions.yml"
        - "AgenticGuidance/02_process_and_inputs.yml"
        - "AgenticGuidance/03_assets_management.yml"
        - "AgenticGuidance/04_cci_bootstrap.yml"

    - name: AgenticFrontend
      prefix: US-FE
      description: "Frontend UI stories covering session pairing, remote terminal, session monitoring, plan visualization, workflow monitoring, plan approval, and connection management"
      story_files:
        - "AgenticFrontend/01_session_pairing.yml"
        - "AgenticFrontend/02_remote_terminal.yml"
        - "AgenticFrontend/03_session_monitoring.yml"
        - "AgenticFrontend/04_plan_visualization.yml"
        - "AgenticFrontend/05_workflow_monitoring.yml"
        - "AgenticFrontend/06_plan_approval.yml"
        - "AgenticFrontend/07_connection_management.yml"

    - name: AgenticBackend
      prefix: US-BACKEND
      description: "Backend services stories covering API endpoints, WebSocket communication, CLI proxy, and service infrastructure"
      story_files:
        - "AgenticBackend/01_session_management.yml"
        - "AgenticBackend/02_websocket_communication.yml"
        - "AgenticBackend/03_plan_state_api.yml"
        - "AgenticBackend/04_cli_proxy.yml"
        - "AgenticBackend/05_guidance_api.yml"
        - "AgenticBackend/06_service_infrastructure.yml"

    - name: AgenticLangSmith
      prefix: US-LANGSMITH
      description: "LangSmith observability stories covering trace collection, friction analysis, and resolution planning"
      story_files:
        - "AgenticLangSmith/01_trace_collection.yml"
        - "AgenticLangSmith/02_query_and_analysis.yml"
        - "AgenticLangSmith/03_friction_detection.yml"
        - "AgenticLangSmith/04_resolution_planning.yml"
        - "AgenticLangSmith/05_cost_and_performance.yml"
        - "AgenticLangSmith/06_integration_and_config.yml"

    - name: Orchestration
      prefix: US-ORCH
      description: "Agent orchestration stories covering planning workflows, execution workflows, and feedback loops"
      story_files:
        - "Orchestration/01_planning_workflow.yml"
        - "Orchestration/02_execution_workflow.yml"
        - "Orchestration/03_feedback_and_recovery.yml"
        - "Orchestration/04_friction_analysis.yml"

    - name: DeveloperWorkflows
      prefix: US-DEV
      description: "Developer workflow stories covering worktrees, testing, and daily development"
      story_files:
        - "DeveloperWorkflows/01_worktree_management.yml"
        - "DeveloperWorkflows/02_testing_workflows.yml"
        - "DeveloperWorkflows/03_template_and_scaffolding.yml"
        - "DeveloperWorkflows/04_state_and_environment.yml"

  execution_guidance: |
    When validating user stories:

    1. Each story can be tested independently
    2. Stories reference specific CLI commands and agent roles
    3. Acceptance criteria are the primary pass/fail measure
    4. Stories with related_commands can be validated by running those commands
    5. Stories with related_agents indicate which agent definitions are involved

    Test priority order:
    - critical: Must pass for system to be usable
    - high: Core functionality, should pass for normal usage
    - medium: Enhanced functionality, nice to have
    - low: Edge cases and polish
