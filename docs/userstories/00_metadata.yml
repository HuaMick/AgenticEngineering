version: "2.0"
description: "User stories organized by CLI command tree"

# Story ID naming conventions:
#   Manual stories:  US-{CATEGORY}-{NNN}  e.g. US-SET-001, US-PLN-042
#   Epic stories:    US-{YYMMDDXX}-{NNN}  e.g. US-260402AG-001, US-260327AG-003
#     where YYMMDDXX is the epic prefix (everything before the first underscore
#     in the epic folder name, e.g. "260402AG" from "260402AG_consolidate_story_storage_...")
#
# The Story.prefix property and _categorize_stories() both use the pattern
# r"(US-[A-Z0-9]+)" to extract the prefix, which handles both formats.

categories:
  - name: Setup
    prefix: US-SET
    directory: Setup/
    cli_mapping: "setup, health, config, env"
  - name: Session
    prefix: US-SES
    directory: Session/
    cli_mapping: "session (spawn/list/stop/state)"
  - name: Planning
    prefix: US-PLN
    directory: Planning/
    cli_mapping: "epic → planning (epic/ticket/phase/ralph/orchestrate)"
  - name: Stories
    prefix: US-STR
    directory: Stories/
    cli_mapping: "stories (find/report/sync/coverage)"
  - name: Guidance
    prefix: US-GDN
    directory: Guidance/
    cli_mapping: "guidance (agents, process, inputs, teaching, testing, deploy)"
  - name: EpicStories
    prefix: "US-{YYMMDDXX}"
    directory: EpicStories/
    cli_mapping: "epic-generated stories (auto-created by planning pipeline)"
    note: "Each epic gets its own prefix derived from the epic folder name, e.g. US-260402AG"
  - name: Patterns
    prefix: "PAT-{DOMAIN}"
    directory: Patterns/
    cli_mapping: "stories patterns, pattern-cat, pattern-claimants, pattern-verify"
    note: "Cross-cutting verification patterns inherited by stories via inherits_patterns"

prefixes:
  US-SET: Setup
  US-SES: Session
  US-PLN: Planning
  US-STR: Stories
  US-GDN: Guidance

pattern_prefixes:
  PAT-CLI: CLI
  PAT-DAT: Data
  PAT-EXE: Execution
  PAT-CTX: Context
  PAT-TST: Testing
  PAT-AGT: Agent
