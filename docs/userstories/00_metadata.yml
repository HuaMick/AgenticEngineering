version: "2.0"
description: "User stories organized by CLI command tree"
categories:
  - name: Setup
    prefix: US-SET
    directory: Setup/
    cli_mapping: "setup, health, config, env"
  - name: Session
    prefix: US-SES
    directory: Session/
    cli_mapping: "session (spawn/list/stop/state)"
  - name: Planning
    prefix: US-PLN
    directory: Planning/
    cli_mapping: "epic → planning (epic/ticket/phase/ralph/orchestrate)"
  - name: Stories
    prefix: US-STR
    directory: Stories/
    cli_mapping: "stories (find/report/sync/coverage)"
  - name: Guidance
    prefix: US-GDN
    directory: Guidance/
    cli_mapping: "guidance (agents, process, inputs, teaching, testing, deploy)"
prefixes:
  US-SET: Setup
  US-SES: Session
  US-PLN: Planning
  US-STR: Stories
  US-GDN: Guidance
