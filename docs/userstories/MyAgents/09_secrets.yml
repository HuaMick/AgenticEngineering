user_stories:
  # ============================================================================
  # Secrets Commands User Stories
  # ============================================================================
  
  - id: US-SECRETS-001
    name: "Retrieving Secret from GCP"
    category: "secrets"
    persona: "User retrieving API key from GCP Secret Manager"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        config_valid: true
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
      gcp_secrets:
        - "GEMINI_API_KEY"
    
    journey:
      - step: 1
        action: "Run `myagents secrets get GEMINI_API_KEY`"
        expected: "Secret value displayed"
        failure_indicators:
          - "Command fails"
          - "Secret not found error"
          - "Authentication error"
          - "Unclear error message"
      
      - step: 2
        action: "Verify secret value correct"
        expected: "Correct secret value shown"
        failure_indicators:
          - "Wrong secret value"
          - "Secret truncated"
    
    success_criteria:
      - "Secrets get works"
      - "Secret retrieved successfully"
      - "Clear error messages if secret missing"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "SETUP.md"
  
  - id: US-SECRETS-002
    name: "Retrieving Secret with Project ID"
    category: "secrets"
    persona: "User retrieving secret from specific GCP project"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
      gcp_projects:
        - "my-project"
      gcp_secrets:
        - "MY_SECRET (in my-project)"
    
    journey:
      - step: 1
        action: "Run `myagents secrets get MY_SECRET --project-id my-project`"
        expected: "Secret retrieved from specified project"
        failure_indicators:
          - "Command fails"
          - "Wrong project used"
          - "Secret not found"
      
      - step: 2
        action: "Verify correct project used"
        expected: "Secret from my-project retrieved"
        failure_indicators:
          - "Default project used instead"
    
    success_criteria:
      - "Project ID option works"
      - "Correct project used"
      - "Secret retrieved successfully"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
  
  - id: US-SECRETS-003
    name: "Quiet Mode Secret Retrieval"
    category: "secrets"
    persona: "User retrieving secret for scripting (quiet output)"
    priority: "low"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        config_valid: true
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
      gcp_secrets:
        - "MY_SECRET"
    
    journey:
      - step: 1
        action: "Run `myagents secrets get MY_SECRET -q`"
        expected: "Only secret value displayed (no extra output)"
        failure_indicators:
          - "Extra output shown"
          - "Quiet flag ignored"
          - "Command fails"
      
      - step: 2
        action: "Verify output suitable for scripting"
        expected: "Output can be piped/captured cleanly"
        failure_indicators:
          - "Extra lines or formatting"
          - "Not script-friendly"
    
    success_criteria:
      - "Quiet mode works"
      - "Only secret value output"
      - "Script-friendly output"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"

