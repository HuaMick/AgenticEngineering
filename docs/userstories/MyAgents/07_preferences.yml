user_stories:
  # ============================================================================
  # Preferences Commands User Stories
  # ============================================================================
  
  - id: US-PREFS-001
    name: "Setting Preferences"
    category: "preferences"
    persona: "User configuring default agent preference"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        current_directory: "/tmp"
    
    journey:
      - step: 1
        action: "Run `myagents preferences set agent.default coding`"
        expected: "Preference set successfully"
        failure_indicators:
          - "Command fails"
          - "Preference not saved"
          - "Unclear success message"
      
      - step: 2
        action: "Verify preference persisted"
        expected: "Preference can be retrieved"
        failure_indicators:
          - "Preference not persisted"
          - "Wrong value saved"
    
    success_criteria:
      - "Set command works"
      - "Preference persisted correctly"
      - "Clear success feedback"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
  
  - id: US-PREFS-002
    name: "Getting Preferences"
    category: "preferences"
    persona: "User checking current preferences"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        current_directory: "/tmp"
      preferences_set:
        - "agent.default: coding"
    
    journey:
      - step: 1
        action: "Run `myagents preferences get agent.default`"
        expected: "Preference value displayed: coding"
        failure_indicators:
          - "Command fails"
          - "Wrong value displayed"
          - "Preference not found error"
      
      - step: 2
        action: "Get non-existent preference"
        expected: "Clear 'not set' message"
        failure_indicators:
          - "Unclear error"
          - "Silent failure"
    
    success_criteria:
      - "Get command works"
      - "Correct values displayed"
      - "Clear messages for unset preferences"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
  
  - id: US-PREFS-003
    name: "Listing All Preferences"
    category: "preferences"
    persona: "User viewing all configured preferences"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        current_directory: "/tmp"
      preferences_set:
        - "agent.default: coding"
        - "studio.port: 3000"
    
    journey:
      - step: 1
        action: "Run `myagents preferences list`"
        expected: "All preferences displayed"
        failure_indicators:
          - "Command fails"
          - "Preferences missing"
          - "Unclear output format"
      
      - step: 2
        action: "Verify all set preferences shown"
        expected: "Both preferences visible"
        failure_indicators:
          - "Some preferences missing"
          - "Wrong format"
    
    success_criteria:
      - "List command works"
      - "All preferences displayed"
      - "Clear, readable format"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
  
  - id: US-PREFS-004
    name: "Deleting Preferences"
    category: "preferences"
    persona: "User removing a preference"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        current_directory: "/tmp"
      preferences_set:
        - "agent.default: coding"
    
    journey:
      - step: 1
        action: "Run `myagents preferences delete agent.default`"
        expected: "Preference deleted successfully"
        failure_indicators:
          - "Command fails"
          - "Preference not deleted"
          - "Unclear success message"
      
      - step: 2
        action: "Verify preference deleted"
        expected: "Preference get returns 'not set'"
        failure_indicators:
          - "Preference still exists"
          - "Wrong behavior"
    
    success_criteria:
      - "Delete command works"
      - "Preference actually deleted"
      - "Clear success feedback"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
  
  - id: US-PREFS-005
    name: "Setting Studio Port Preference"
    category: "preferences"
    persona: "User setting default Studio port"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        current_directory: "/tmp"
    
    journey:
      - step: 1
        action: "Run `myagents preferences set studio.port 3000`"
        expected: "Studio port preference set"
        failure_indicators:
          - "Command fails"
          - "Preference not saved"
      
      - step: 2
        action: "Start Studio without --port flag"
        expected: "Studio uses preference port 3000"
        failure_indicators:
          - "Preference not used"
          - "Wrong port used"
    
    success_criteria:
      - "Studio port preference works"
      - "Preference affects Studio startup"
      - "Preference persisted"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"

