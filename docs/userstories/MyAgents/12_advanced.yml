user_stories:
  # ============================================================================
  # Multi-Project User Stories
  # ============================================================================
  
  - id: US-MULTI-001
    name: "Multi-Project User"
    category: "advanced"
    persona: "User with myagents configured for project-alpha, needs project-beta"
    priority: "low"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        config_valid: true
        current_directory: "/home/test-user/project-a"
      config_for: "project-alpha"
      user_wants_to_use: "project-beta"
      challenge: "Need to switch GCP project context"
    
    journey:
      - step: 1
        action: "Read SETUP.md 'Advanced Configuration' section"
        expected: "Multi-project guidance found"
        failure_indicators:
          - "No multi-project documentation"
      
      - step: 2
        action: "Follow documented process to switch projects"
        expected: "Project switching works"
        failure_indicators:
          - "Cannot switch projects"
          - "Process doesn't work"
      
      - step: 3
        action: "Verify new config works"
        expected: "New project config validated"
        failure_indicators:
          - "Config doesn't work"
      
      - step: 4
        action: "Start chat with new project context"
        expected: "Chat works with new project"
        failure_indicators:
          - "Chat doesn't work"
    
    success_criteria:
      - "Agent finds multi-project documentation"
      - "Agent successfully switches project context"
      - "Agent verifies new config works"
      - "Chat works with new project"
      - "Original project config preserved (if applicable)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "SETUP.md (Advanced Configuration)"
      - "docs/guides/configuration.md"

