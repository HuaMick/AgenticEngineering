user_stories:
  # ============================================================================
  # Update/Rebuild Commands User Stories
  # ============================================================================
  
  - id: US-MAINT-001
    name: "Updating myagents CLI"
    category: "maintenance"
    persona: "User updating to latest version"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        current_version: "1.0.0"
      newer_version_available: true
    
    journey:
      - step: 1
        action: "Run `myagents update`"
        expected: "Update process starts"
        failure_indicators:
          - "Command fails"
          - "Update not available"
          - "Unclear update process"
      
      - step: 2
        action: "Verify update completes"
        expected: "CLI updated to latest version"
        failure_indicators:
          - "Update incomplete"
          - "Version not updated"
          - "CLI broken after update"
      
      - step: 3
        action: "Verify CLI still works"
        expected: "Updated CLI functions correctly"
        failure_indicators:
          - "CLI broken"
          - "Commands fail"
    
    success_criteria:
      - "Update command works"
      - "CLI updated successfully"
      - "CLI functional after update"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "README.md"
  
  - id: US-MAINT-002
    name: "Rebuilding myagents CLI"
    category: "maintenance"
    persona: "Developer rebuilding CLI after changes"
    priority: "low"
    
    starting_state:
      environment:
        cli_installed: true
        source_modified: true
        current_directory: "/home/code/myagents/MyAgents-staging"
      files_present:
        - "pyproject.toml"
        - "Source files modified"
    
    journey:
      - step: 1
        action: "Run `myagents rebuild`"
        expected: "Rebuild process starts"
        failure_indicators:
          - "Command fails"
          - "Rebuild not available"
          - "Unclear rebuild process"
      
      - step: 2
        action: "Verify rebuild completes"
        expected: "CLI rebuilt successfully"
        failure_indicators:
          - "Rebuild incomplete"
          - "Build errors"
          - "CLI not updated"
      
      - step: 3
        action: "Verify rebuilt CLI works"
        expected: "Rebuilt CLI functions correctly"
        failure_indicators:
          - "CLI broken"
          - "Changes not reflected"
    
    success_criteria:
      - "Rebuild command works"
      - "CLI rebuilt successfully"
      - "Changes reflected in rebuilt CLI"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "README.md"

