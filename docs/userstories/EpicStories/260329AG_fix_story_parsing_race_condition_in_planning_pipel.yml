stories:
  - id: US-001
    title: "Reliable Story Parsing After Agent Completion"
    category: "orchestrator-retry"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a developer running the planning pipeline, I want the orchestrator to
      retry reading stories.yml with backoff after the build-story-writer agent
      completes so that transient filesystem visibility delays between the tmux
      pane write and the orchestrator read never cause spurious pipeline failures.

    prerequisites:
      - "The planning pipeline is running via planner_loop.py"
      - "The build-story-writer agent has signalled completion (SessionResult returned)"
      - "stories.yml may not yet be flushed to disk despite the completion signal"

    steps:
      - step: 1
        when: "build-story-writer agent completes and _parse_story_categories is called"
        then:
          - "The orchestrator attempts to read and parse stories.yml"
          - "If the file is missing, empty, or yields invalid YAML, the orchestrator waits and retries"
          - "Retry uses exponential backoff (e.g. 0.5s, 1s, 2s) up to 3 attempts"
      - step: 2
        when: "stories.yml becomes readable and valid within the retry window"
        then:
          - "Categories are parsed successfully"
          - "The pipeline continues to the parallel explore step without error"
      - step: 3
        when: "stories.yml is still missing or invalid after all retry attempts"
        then:
          - "A structured error is logged with the specific failure reason (missing file, empty content, YAML parse error)"
          - "The pipeline returns False with a clear error in state['errors']"
          - "The broad except Exception no longer silently swallows parse details"

    related_commands:
      - "agentic plan run"
    related_agents:
      - "build-story-writer"
      - "planner-orchestration"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-002
    title: "Structured Error Logging for Story Parse Failures"
    category: "orchestrator-retry"
    priority: high
    lifecycle: "proposal"

    description: |
      As a developer debugging pipeline failures, I want _parse_story_categories
      to log structured, distinguishable error messages for each failure mode
      (file missing, file empty, YAML syntax error, no categories key) so that
      I can quickly identify the root cause without reading source code.

    prerequisites:
      - "The planning pipeline has reached the story-parsing step"

    steps:
      - step: 1
        when: "stories.yml does not exist on disk after all retries"
        then:
          - "A log message at ERROR level states the file path and that the file was not found"
          - "The error is distinct from a parse failure"
      - step: 2
        when: "stories.yml exists but contains empty or non-YAML content"
        then:
          - "A log message at ERROR level reports 'empty or invalid YAML content' with the file path"
      - step: 3
        when: "stories.yml parses as valid YAML but has no 'categories' key or an empty categories list"
        then:
          - "A log message at ERROR level reports 'no categories found' with the epic folder name"
      - step: 4
        when: "stories.yml triggers a YAML parse exception"
        then:
          - "The exception type and message are logged at ERROR level"
          - "The exception is NOT silently swallowed by a bare except clause"

    related_commands: []
    related_agents:
      - "build-story-writer"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-003
    title: "Parallel Explore Agents Without Lock Timeouts"
    category: "tinydb-concurrency"
    priority: high
    lifecycle: "proposal"

    description: |
      As a developer running the planning pipeline with multiple explore agents
      in parallel, I want TinyDB FileLock acquisition to tolerate higher
      concurrency so that up to 6 simultaneous explore agents can update tickets
      without hitting lock timeout errors.

    prerequisites:
      - "The planning pipeline has reached the parallel explore step"
      - "Multiple explore agents are spawned via ThreadPoolExecutor, each in its own tmux pane"
      - "All agents contend on ~/.agentic/epics.db.lock"

    steps:
      - step: 1
        when: "Up to 6 explore agents are running concurrently and writing ticket updates"
        then:
          - "All agents eventually acquire the FileLock without timeout errors"
          - "The FileLock timeout is sufficient for the expected contention level"
      - step: 2
        when: "An explore agent fails to acquire the lock within the timeout"
        then:
          - "The failure is retried with backoff before being reported as an error"
          - "The error message includes the holder PID and lock age for debugging"
      - step: 3
        when: "All parallel explore agents have completed"
        then:
          - "The aggregated SessionResult reflects the actual completion status of each category"
          - "No ticket updates were lost due to stale TinyDB caches"

    related_commands:
      - "agentic plan run"
    related_agents:
      - "planner-explore"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-004
    title: "TinyDB Cache Freshness Across Process Boundaries"
    category: "tinydb-concurrency"
    priority: medium
    lifecycle: "proposal"

    description: |
      As a developer relying on accurate ticket data during planning, I want
      the orchestrator to refresh TinyDB caches after each explore agent
      completes so that subsequent pipeline steps (orchestration, ticket
      promotion) see the latest ticket state written by all explore agents.

    prerequisites:
      - "Multiple explore agents have run in parallel, each writing to TinyDB from a separate process"
      - "The orchestrator process holds its own EpicRepository with a cached TinyDB instance"

    steps:
      - step: 1
        when: "The explore aggregation step completes and control returns to the orchestrator"
        then:
          - "The orchestrator calls refresh() on its EpicRepository"
          - "Subsequent reads reflect all ticket updates from all explore agents"
      - step: 2
        when: "A single explore agent completes but others are still running"
        then:
          - "The orchestrator does not read stale ticket data for the completed category"
        notes: "This step primarily matters for future per-category post-processing"

    related_commands: []
    related_agents:
      - "planner-explore"
      - "planner-orchestration"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-005
    title: "Atomic Story Lifecycle and Test Status Updates"
    category: "story-service-locking"
    priority: medium
    lifecycle: "proposal"

    description: |
      As a developer or agent promoting story lifecycle states, I want
      StoryService.update_lifecycle() and update_test_status() to use file
      locking for their read-modify-write cycles so that concurrent updates
      to the same story file do not corrupt YAML content.

    prerequisites:
      - "The docs/userstories/ directory contains YAML story files"
      - "Multiple processes or agents may update story metadata concurrently"

    steps:
      - step: 1
        when: "update_lifecycle() is called to promote a story from 'proposal' to 'under-construction'"
        then:
          - "A FileLock is acquired on the target YAML file before reading"
          - "The file is read, modified, and written back atomically within the lock"
          - "The lock is released after the write completes"
      - step: 2
        when: "update_test_status() is called concurrently from two different processes for stories in the same file"
        then:
          - "The second caller blocks until the first completes its write"
          - "Both updates are preserved in the final file content"
          - "No YAML corruption occurs from interleaved read-modify-write"
      - step: 3
        when: "The FileLock cannot be acquired within the timeout"
        then:
          - "The update returns False and logs a warning"
          - "The YAML file is not left in a partially-written state"

    related_commands:
      - "agentic stories promote"
    related_agents:
      - "build-story-writer"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-006
    title: "Visible Warnings on Story File Parse Failures"
    category: "story-service-locking"
    priority: low
    lifecycle: "proposal"

    description: |
      As a developer investigating missing stories, I want StoryService._parse_file()
      to log a warning when it fails to parse a YAML file so that silent data
      loss from corrupted or partially-written files is detectable in logs.

    prerequisites:
      - "StoryService.load_all() is scanning docs/userstories/ for YAML files"

    steps:
      - step: 1
        when: "_parse_file() encounters a YAML syntax error in a story file"
        then:
          - "A WARNING-level log message is emitted with the file path and exception details"
          - "The method still returns an empty list (graceful degradation preserved)"
          - "The warning is distinguishable from a missing-file scenario"
      - step: 2
        when: "_parse_file() encounters an empty file or non-dict YAML content"
        then:
          - "A WARNING-level log message is emitted indicating the file was empty or had unexpected structure"
      - step: 3
        when: "load_all() runs during a concurrent write to a story file"
        then:
          - "The partially-written file triggers a parse warning rather than being silently skipped"
          - "The next call to load_all() (after cache invalidation) picks up the complete file"

    related_commands:
      - "agentic stories list"
    related_agents: []

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-007
    title: "agentic epic list Works When Folder-Free Epics Exist"
    category: "cli-folder-free-safety"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a developer, I want to run `agentic epic list` when some epics have no
      disk folder (folder-free epics created by the TinyDB-first flow) without
      the command crashing so that I can always inspect the current epic state
      regardless of how epics were created.

    prerequisites:
      - "At least one epic in TinyDB has epic_folder=None (created without a disk folder)"
      - "cmd_list in epic.py iterates over EpicMetadata records returned by the repository"

    steps:
      - step: 1
        when: "cmd_list is called and the repository returns an EpicMetadata with epic_folder=None"
        then:
          - "cmd_list does not dereference epic_folder.name without a None guard"
          - "The display falls back to epic_folder_name (the stored string field) for the folder column"
          - "The command completes without AttributeError"
      - step: 2
        when: "All epics in the list have epic_folder=None"
        then:
          - "The table renders with epic_folder_name values in the folder column"
          - "No row is silently dropped from the output"
      - step: 3
        when: "A mix of folder-bearing and folder-free epics exists"
        then:
          - "Folder-bearing epics display their resolved Path name"
          - "Folder-free epics display their epic_folder_name string"
          - "Both rows appear in the same table without error"

    related_commands:
      - "agentic epic list"
    related_agents: []

    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/epic.py"
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-008
    title: "agentic epic status Works on Folder-Free Epics"
    category: "cli-folder-free-safety"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a developer, I want to run `agentic epic status` on a folder-free epic
      without a crash so that I can inspect ticket and phase progress for any
      epic regardless of whether it has a corresponding disk folder.

    prerequisites:
      - "The target epic in TinyDB has epic_folder=None"
      - "cmd_status in epic.py uses the epic_folder value for display and for TinyDB lookups"

    steps:
      - step: 1
        when: "cmd_status is called with the name of a folder-free epic"
        then:
          - "cmd_status resolves the epic using epic_folder_name instead of epic_folder.name"
          - "No AttributeError is raised when accessing epic_folder"
          - "Ticket and phase counts are fetched from TinyDB using the epic_folder_name key"
      - step: 2
        when: "cmd_status renders the status table"
        then:
          - "The folder field displays epic_folder_name when epic_folder is None"
          - "All other fields (ticket counts, phase status) are populated correctly"
      - step: 3
        when: "cmd_status is called with the name of an epic that has a disk folder"
        then:
          - "Behavior is unchanged: epic_folder.name is used when epic_folder is not None"

    related_commands:
      - "agentic epic status"
    related_agents: []

    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/epic.py"
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-009
    title: "No CLI Command in epic.py Crashes on Folder-Free Epics"
    category: "cli-folder-free-safety"
    priority: high
    lifecycle: "proposal"

    description: |
      As the system, I want every CLI command in epic.py that iterates over or
      accesses EpicMetadata records to handle epic_folder=None without raising
      AttributeError so that the entire epic command surface is safe for the
      TinyDB-first (folder-free) creation flow.

    prerequisites:
      - "Folder-free epics can be created via the TinyDB-first flow"
      - "Any command in epic.py that touches epic_folder is a potential crash site"

    steps:
      - step: 1
        when: "Any cmd_* function in epic.py accesses epic_folder.name, epic_folder.exists(), or any other attribute"
        then:
          - "A None guard (e.g. epic_folder.name if epic_folder else epic_folder_name) is present at every access site"
          - "The command does not propagate AttributeError to the user"
      - step: 2
        when: "A command requires a resolved filesystem path (e.g. reading epic.md)"
        then:
          - "The command checks epic_folder is not None before attempting filesystem access"
          - "If epic_folder is None, the command skips the filesystem step or reports a clear message"
          - "The command does not crash with AttributeError or FileNotFoundError"
      - step: 3
        when: "A full audit of epic.py is performed after the fix"
        then:
          - "grep for '.epic_folder.' shows no unguarded attribute accesses on the epic_folder field"
          - "All remaining accesses are either behind a None check or use the epic_folder_name fallback"

    related_commands:
      - "agentic epic list"
      - "agentic epic status"
      - "agentic epic cancel"
      - "agentic epic move"
    related_agents: []

    related_files:
      - "modules/AgenticCLI/src/agenticcli/commands/epic.py"
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

