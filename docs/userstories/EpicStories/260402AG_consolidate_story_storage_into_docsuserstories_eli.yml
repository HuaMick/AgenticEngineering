stories:
  - id: US-001
    title: "Single Canonical Story Location"
    category: "path-resolution"
    priority: critical
    lifecycle: proposal

    description: |
      As a developer navigating the codebase, I want all user stories — both
      manually authored and epic-generated — to live in a single docs/userstories/
      directory so that I never have to check two locations to find a story and
      path resolution is deterministic.

    prerequisites:
      - "docs/userstories/ exists with the current 00_metadata.yml structure"
      - "00_metadata.yml defines category prefixes (US-SET, US-PLN, etc.)"

    steps:
      - step: 1
        when: "A path resolver is asked for the story storage location"
        then:
          - "It returns docs/userstories/ as the single canonical path"
          - "It never returns an epic-folder path (e.g., docs/epics/live/<epic>/stories.yml)"

      - step: 2
        when: "An epic-generated story file is written by build-story-writer"
        then:
          - "The file is stored under docs/userstories/ using a naming convention that includes the epic name"
          - "The file is discoverable by StoryService.load_all() without additional configuration"

      - step: 3
        when: "00_metadata.yml is read to list story categories"
        then:
          - "A new category exists for epic-generated stories with an appropriate prefix"
          - "The directory entry in metadata points to a subdirectory under docs/userstories/"

      - step: 4
        when: "The path resolver is called from a working directory outside the repo root"
        then:
          - "It still resolves docs/userstories/ correctly via AGENTIC_REPO_ROOT or git-root discovery"
          - "Behavior matches the existing _find_userstories_dir() fallback logic"

    related_commands:
      - "agentic stories find"
    related_agents:
      - "build-story-writer"
      - "planner-explore"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-002
    title: "Planning Pipeline Writes Stories to Unified Store"
    category: "pipeline-integration"
    priority: critical
    lifecycle: proposal

    description: |
      As the planning pipeline orchestrator, I want build-story-writer to write
      stories directly to docs/userstories/ and planner_loop to read categories
      from there so that the entire planning flow operates against the canonical
      story location without relying on epic-folder storage.

    prerequisites:
      - "Canonical path resolver from US-001 is available"
      - "build-story-writer agent guidance exists in .claude/agents/ and modules/AgenticGuidance/agents/"
      - "planner_loop._parse_story_categories() reads stories.yml from epic folders"

    steps:
      - step: 1
        when: "build-story-writer generates stories for an epic"
        then:
          - "Stories are written to docs/userstories/ (not docs/epics/live/<epic>/stories.yml)"
          - "The file uses a naming convention that preserves provenance to the originating epic"
          - "The YAML format (stories list + categories list) is preserved unchanged"

      - step: 2
        when: "planner_loop._parse_story_categories() runs after story generation"
        then:
          - "It reads categories from the docs/userstories/ location"
          - "It finds the epic's stories using the new naming convention"
          - "Retry logic (exponential backoff) continues to function"

      - step: 3
        when: "planner-explore agents are spawned for each category"
        then:
          - "Each agent receives the correct docs/userstories/ path for story context"
          - "Agents can read story_ids from the unified location to link tickets"

      - step: 4
        when: "build-story-writer encounters a pre-existing stories file for the same epic"
        then:
          - "The file is overwritten with freshly generated content (as per current behavior)"
          - "No merge or append logic is applied"

    related_commands: []
    related_agents:
      - "build-story-writer"
      - "planner-explore"
      - "planner-orchestration"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-003
    title: "Story CLI Commands Use Single Source of Truth"
    category: "story-discovery"
    priority: high
    lifecycle: proposal

    description: |
      As a developer using story CLI commands, I want agentic stories find,
      audit, sync, and report to read exclusively from docs/userstories/ so
      that results are deterministic, never produce duplicates, and don't
      depend on epic-folder scanning.

    prerequisites:
      - "Stories have been migrated from epic folders to docs/userstories/ (US-005)"
      - "StoryService.load_all() reads from the unified location"

    steps:
      - step: 1
        when: "Developer runs `agentic stories find`"
        then:
          - "Both manually authored stories (US-STR-*, US-PLN-*) and epic-generated stories (US-NNN) are returned"
          - "No duplicate stories appear in results"
          - "The --project and --changes filters work across all story sources"

      - step: 2
        when: "Developer runs `agentic stories audit --epic <name>`"
        then:
          - "Audit correctly links epic-generated stories to their tickets via story_ids"
          - "Stories are found in docs/userstories/ regardless of epic lifecycle status (live or archived)"

      - step: 3
        when: "Developer runs `agentic stories sync`"
        then:
          - "TinyDB story_tests and story_code tables are populated from docs/userstories/ content"
          - "Both manual and epic-generated stories are synced"
          - "No epic-folder paths appear in sync output"

      - step: 4
        when: "_find_plan_stories_dirs() is called by any code path"
        then:
          - "It returns only docs/userstories/ paths, not epic-folder paths"
          - "Or it has been removed entirely in favor of the canonical resolver"

    related_commands:
      - "agentic stories find"
      - "agentic stories audit"
      - "agentic stories sync"
      - "agentic stories report"
    related_agents:
      - "test-builder"
      - "planner-test"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-004
    title: "Stories Persist Beyond Epic Archival"
    category: "migration-lifecycle"
    priority: high
    lifecycle: proposal

    description: |
      As a developer managing long-term story coverage, I want stories to
      remain fully discoverable in docs/userstories/ after their originating
      epic is archived so that test coverage data, story metadata, and
      acceptance criteria are never lost when epics complete.

    prerequisites:
      - "Stories are stored in docs/userstories/ (not epic folders)"
      - "Story files include provenance metadata (source epic name)"

    steps:
      - step: 1
        when: "An epic is archived (moved from live/ to completed/)"
        then:
          - "Story files in docs/userstories/ are unaffected — they remain in place"
          - "StoryService.load_all() continues to return the archived epic's stories"

      - step: 2
        when: "Developer runs `agentic stories find` after an epic is archived"
        then:
          - "Stories from the archived epic appear in results"
          - "Story test_status, last_tested, and test_notes are preserved"

      - step: 3
        when: "Developer runs `agentic stories audit` against an archived epic"
        then:
          - "The audit resolves stories from docs/userstories/ even though the epic is in completed/"
          - "Story-to-ticket linkage is intact"

      - step: 4
        when: "A new epic references a story ID from a previously archived epic"
        then:
          - "The story is findable because it lives in the persistent docs/userstories/ directory"
          - "No special cross-epic lookup logic is needed"

    related_commands:
      - "agentic stories find"
      - "agentic stories audit"
    related_agents:
      - "build-python"
      - "test-builder"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-005
    title: "Transparent Migration of Existing Epic Stories"
    category: "migration-lifecycle"
    priority: critical
    lifecycle: proposal

    description: |
      As a developer with existing epics that have stories.yml files in their
      epic folders, I want a migration that copies those stories into
      docs/userstories/ so that no stories are lost during the transition
      to unified storage and provenance to the originating epic is preserved.

    prerequisites:
      - "One or more stories.yml files exist in docs/epics/live/<epic>/ folders"
      - "docs/userstories/ naming convention for epic-scoped stories is defined (US-001)"

    steps:
      - step: 1
        when: "The migration process runs"
        then:
          - "Each epic's stories.yml is copied to docs/userstories/ under the naming convention from T1_01"
          - "Story content (IDs, titles, steps, metadata) is preserved verbatim"
          - "Provenance metadata (source epic folder name) is included or derivable from the file name"

      - step: 2
        when: "Two epics contain stories with the same US-NNN ID (e.g., both have US-001)"
        then:
          - "The migration handles the conflict — either by namespacing IDs per epic or using separate files"
          - "No story data is silently overwritten or lost"

      - step: 3
        when: "Migration completes successfully"
        then:
          - "Original stories.yml files are removed from epic folders"
          - "A deprecation warning is logged if any code path attempts to read stories from an epic folder"

      - step: 4
        when: "Migration encounters a malformed or empty stories.yml in an epic folder"
        then:
          - "It skips the file with a warning rather than failing the entire migration"
          - "All valid story files are still processed"

    related_commands:
      - "agentic stories find"
      - "agentic stories sync"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-006
    title: "Test Suite Validates Unified Story Storage"
    category: "validation"
    priority: medium
    lifecycle: proposal

    description: |
      As a developer maintaining the codebase, I want the test suite to cover
      the unified story storage behavior — including path resolution, service
      loading, pipeline integration, and archival persistence — so that
      regressions are caught if anyone re-introduces dual-path story access.

    prerequisites:
      - "Unified storage is implemented (US-001 through US-005)"
      - "Existing tests in test_planner_loop.py and test_story.py exist"

    steps:
      - step: 1
        when: "Developer runs the AgenticGuidance test suite"
        then:
          - "StoryService.load_all() tests verify stories are loaded from docs/userstories/ only"
          - "Path resolver tests confirm the canonical location is returned"
          - "No test fixtures create stories.yml in mock epic folders"

      - step: 2
        when: "Developer runs the AgenticCLI test suite"
        then:
          - "_parse_story_categories() tests verify reading from the new location"
          - "CLI stories commands (find, audit, sync) tests use docs/userstories/ fixtures"
          - "No test references _find_plan_stories_dirs() for epic-folder scanning"

      - step: 3
        when: "An integration test simulates epic archival"
        then:
          - "Stories remain discoverable in docs/userstories/ after the epic moves to completed/"
          - "StoryService.load_all() returns the same stories before and after archival"

      - step: 4
        when: "A regression test checks for dual-path access"
        then:
          - "The test verifies _find_plan_stories_dirs() either returns only docs/userstories/ or is removed"
          - "No code path returns epic-folder story paths"

    related_commands: []
    related_agents:
      - "test-builder"
      - "planner-test"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

categories:
  - name: "path-resolution"
    description: "Canonical path resolver and metadata updates for unified story storage"
    codebase_scope:
      - "modules/AgenticGuidance/src/agenticguidance/services/story.py"
      - "docs/userstories/00_metadata.yml"
    story_ids:
      - "US-001"

  - name: "pipeline-integration"
    description: "Update build-story-writer agent guidance and planner_loop to write/read from unified location"
    codebase_scope:
      - "modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py"
      - "modules/AgenticGuidance/agents/planner/build-story-writer/"
      - ".claude/agents/build-story-writer.md"
    story_ids:
      - "US-002"

  - name: "story-discovery"
    description: "StoryService and CLI story commands read exclusively from docs/userstories/"
    codebase_scope:
      - "modules/AgenticGuidance/src/agenticguidance/services/story.py"
      - "modules/AgenticCLI/src/agenticcli/commands/stories.py"
    story_ids:
      - "US-003"

  - name: "migration-lifecycle"
    description: "Migrate existing epic-folder stories to docs/userstories/ and ensure archival persistence"
    codebase_scope:
      - "docs/epics/live/"
      - "docs/userstories/"
      - "modules/AgenticCLI/src/agenticcli/commands/stories.py"
    story_ids:
      - "US-004"
      - "US-005"

  - name: "validation"
    description: "Test suite coverage for unified storage: path resolver, service loading, pipeline, and archival"
    codebase_scope:
      - "modules/AgenticCLI/tests/"
      - "modules/AgenticGuidance/tests/"
    story_ids:
      - "US-006"
