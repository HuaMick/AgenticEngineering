stories:
  - id: US-RES-001
    title: "Blocked state and alerting on retry exhaustion"
    category: "resilience"
    priority: critical
    lifecycle: "under-construction"

    description: |
      As an operator monitoring orchestrated execution, I want phases that exhaust
      all retry attempts to be marked as "blocked" with ERROR-level logging, so that
      I can immediately identify stalled epics without scanning through debug logs.

    prerequisites:
      - "ExecutionRunner._run_phase() exists with retry logic"
      - "_execute_plan() processes phases sequentially"

    steps:
      - step: 1
        when: "A phase exhausts all spawn retries (3 consecutive failures)"
        then:
          - "Phase status is set to 'blocked' in TinyDB"
          - "ERROR log includes: phase name, failure count, last diagnosis"
      - step: 2
        when: "_execute_plan encounters a blocked phase"
        then:
          - "Execution halts immediately (returns False)"
          - "Error message references the blocked phase name"

  - id: US-RES-002
    title: "Orphan tmux session sweep on executor startup"
    category: "resilience"
    priority: high
    lifecycle: "under-construction"

    description: |
      As an operator restarting an interrupted execution, I want orphaned agentic-*
      tmux sessions from prior runs to be killed during recovery, so that zombie
      agents don't perform concurrent TinyDB writes.

    prerequisites:
      - "_recover_stale_phases() runs on executor startup"
      - "SessionCleanupService._clean_orphaned_tmux() pattern exists"

    steps:
      - step: 1
        when: "ExecutionRunner recovery sweep runs"
        then:
          - "All agentic-* tmux sessions without matching running records are killed"
          - "Sessions with alive PIDs in the state store are preserved"
      - step: 2
        when: "No orphaned tmux sessions exist"
        then:
          - "Recovery completes without errors"

  - id: US-RES-003
    title: "Phase-filtered get_current_ticket"
    category: "phase-scoping"
    priority: high
    lifecycle: "under-construction"

    description: |
      As an orchestrated agent scoped to a specific phase, I want to query only
      tickets belonging to my phase, so that I don't accidentally work on tickets
      from other phases.

    prerequisites:
      - "EpicRepository.get_current_ticket() exists"
      - "Tickets have phase_name field in TinyDB"

    steps:
      - step: 1
        when: "Agent calls `agentic epic ticket current --phase P2`"
        then:
          - "Only tickets with phase_name=P2 are considered"
          - "Returns the first in_progress or pending ticket in that phase"
      - step: 2
        when: "No tickets exist in the specified phase"
        then:
          - "Returns null/None (no ticket found)"

  - id: US-RES-004
    title: "Scope agent session to phase tickets only"
    category: "phase-scoping"
    priority: high
    lifecycle: "under-construction"

    description: |
      As an orchestration system, I want each spawned agent to receive a Phase
      Constraint in its context file, so that agents are scoped to their assigned
      phase and don't cross phase boundaries.

    prerequisites:
      - "_compile_spawn_context() builds agent context"
      - "build_spawn_command() constructs CLI commands for spawning"

    steps:
      - step: 1
        when: "ExecutionRunner spawns an agent for phase P3"
        then:
          - "The spawn command includes --phase P3"
          - "The context file includes a Phase Constraint section"
          - "The constraint instructs the agent to use --phase when querying tickets"
      - step: 2
        when: "A phase completes"
        then:
          - "Incomplete tickets in that phase are logged as warnings"

  - id: US-RES-005
    title: "Enable tmux pipe-pane output logging"
    category: "observability"
    priority: medium
    lifecycle: "under-construction"

    description: |
      As an operator debugging agent failures, I want all tmux pane output to be
      captured to a log file, so that I can review what happened even after the
      tmux session ends.

    prerequisites:
      - "Agents run in tmux sessions (sdk-tmux or legacy tmux path)"
      - "Session cleanup service exists"

    steps:
      - step: 1
        when: "A tmux session is spawned"
        then:
          - "tmux pipe-pane captures output to ~/.agentic/sessions/logs/{session_id}.pane.log"
          - "Pipe-pane is enabled before the agent starts producing output"
      - step: 2
        when: "Session cleanup runs"
        then:
          - ".pane.log files for dead sessions are cleaned up"

  - id: US-RES-006
    title: "Write session file before tmux spawn"
    category: "resilience"
    priority: critical
    lifecycle: "under-construction"

    description: |
      As a session poller (wait_for_session), I want the session JSON file to exist
      on disk before the tmux spawn starts, so that I can find it immediately
      instead of racing against the spawn.

    prerequisites:
      - "cmd_spawn() creates session data dict"
      - "_store.save() writes to disk"

    steps:
      - step: 1
        when: "cmd_spawn runs"
        then:
          - "Session file with status='starting' is written BEFORE tmux new-session"
          - "After successful spawn, status is updated to 'running'"
      - step: 2
        when: "_write_state_atomic completes"
        then:
          - "os.utime is called to force mtime update"
      - step: 3
        when: "Duration is computed from ended_at - started_at"
        then:
          - "Negative durations are clamped to 0"
