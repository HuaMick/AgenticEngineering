module: EpicStories
prefix: US-EPC
description: >
  Epic-generated stories created by the planning pipeline (build-story-writer).
  Each file corresponds to one epic and uses the epic folder name as the filename
  (e.g., 260402AG_consolidate_story_storage.yml). Stories within these files may
  use bare US-NNN IDs (e.g., US-001) rather than the US-EPC prefix — the prefix
  is used only for metadata hierarchy purposes.
