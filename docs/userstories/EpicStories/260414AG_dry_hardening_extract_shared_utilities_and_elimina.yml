# Epic 260414AG — DRY Hardening: Extract Shared Utilities and Eliminate Duplication
#
# VERIFICATION REPORT
# ===================
# This epic is a PURE INTERNAL REFACTORING — it extracts duplicated code into
# shared utilities, centralizes scattered constants, and consolidates test
# fixtures. No user-facing behavioral contract changes. All 15 overlapping
# existing stories were verified and found to correctly describe the system's
# user-facing mechanics; the DRY violations are code organization issues, not
# story contract gaps.
#
# Diagnostic question applied: "Could this epic have been avoided if the prior
# story was accurate enough?"
# Answer: NO. Stories describe WHAT the system does (CLI surface, routing
# contracts, manifest specifications), not HOW the code is organized internally.
# No story is responsible for preventing StateStore from being instantiated 7
# times instead of 1, or for preventing copy-paste of 200 lines of conftest.py.
# These are code quality issues orthogonal to behavioral specification.
#
# OVERLAPPING STORIES VERIFIED (15 total, all NO CHANGE):
#
# US-SES-006 (Session State Registry) — verified, no change
#   DRY-C1 creates get_session_store singleton; DRY-O2 extracts state_colors.
#   Story describes CLI commands (list/show/clear/cleanup), not internal
#   StateStore instantiation or color dict location. Contract intact.
#
# US-SES-001 (Session Lifecycle) — verified, no change
#   DRY-C1 affects session.py StateStore usage. Story describes spawn/list/
#   stop/health/logs user journey. Internal plumbing unchanged.
#
# US-SES-014 (Session Spawn Feedback) — verified, no change
#   DRY-W4 extracts safe_read_sdk_metrics. Story describes pre-spawn context
#   estimation and progress feedback UX. Metrics parsing is implementation
#   detail behind the same UX surface.
#
# US-SES-030 (Session Spawn Transport) — verified, no change
#   DRY-W1 extracts spawn_and_parse_session_id. Story describes transport
#   selection chain (sdk-tmux → tmux → subprocess) and one-query-per-process
#   constraint. The extraction moves code, doesn't change the selection logic.
#
# US-PLN-001 (Epic Lifecycle) — verified, no change
#   DRY-C3 centralizes path constants; DRY-D1 deletes vestigial disk folders.
#   Story describes epic new/list/status/archive via TinyDB. Paths are internal;
#   disk folder deletion removes orphaned READMEs, not TinyDB records.
#
# US-PLN-015 (Epic Populate) — verified, no change
#   DRY-S1 extracts _dict_to_ticketdata; DRY-W3 extracts get_repository.
#   Story describes phase add/list/update CLI surface. Internal helpers
#   don't affect the user-observable contract.
#
# US-PLN-046 (Orchestrate Session Plan) — verified, no change
#   DRY-W1/W2/W3 affect planner_loop.py; DRY-O1 affects orchestrate.py.
#   Story describes planning workflow CLI surface. Spawn/retry/repository
#   access patterns are internal plumbing behind the same CLI commands.
#
# US-PLN-047 (Orchestrate Session Implement) — verified, no change
#   DRY-W1/W2/W3/W4/W5 and DRY-O1 all affect orchestration.py.
#   Story describes phase execution order, idempotent resume, feedback
#   triggers, status transitions. All user-observable. Internal helpers
#   are behind the same behavioral surface.
#
# US-PLN-048 (Orchestrate Session UAT) — verified, no change
#   DRY-W1 affects uat.py spawn patterns. Story describes UAT workflow
#   (--story/--epic/--stale modes, stamp verification). Spawn pattern
