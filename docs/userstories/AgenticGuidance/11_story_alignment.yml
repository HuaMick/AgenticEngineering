stories:
- id: US-GD-160
  title: Planner-Design Agent Solution Architecture Scaffolding
  category: planning
  priority: critical
  as_a: planner-design agent receiving an objective and affected stories
  i_want: to produce a high-level solution architecture skeleton mapping stories to phases
  so_that: downstream domain planners have shared context and cross-phase contracts instead of working blind
  acceptance_criteria:
  - planner-design agent has manifest.yml, process.yml, and inputs.yml in agents/planner/planner-design/
  - Agent receives affected_stories as a required input (not discovered mid-process)
  - Agent defines phase skeleton with ordering constraints and agent assignments
  - Cross-phase contracts define shared interfaces between phases
  - Output is structured inputs consumable by planner-build, planner-test, and planner-audit
  - Agent runs after story discovery (story-generator) and before domain planners
  - 'Workflow handover: story-generator -> planner-design -> domain planners'
  related_agents:
  - planner-design
  - orchestration-planning
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-design/manifest.yml
  - modules/AgenticGuidance/agents/planner/planner-design/process.yml
  - modules/AgenticGuidance/agents/planner/planner-design/inputs.yml
  related_stories:
  - US-GD-161
  - US-GD-040
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-GD-161
  title: Planner-Design Story-to-Phase Traceability Matrix
  category: planning
  priority: high
  as_a: planner-design agent producing phase skeletons
  i_want: to create a traceability matrix mapping each affected story to implementation phases
  so_that: every story has explicit phase coverage and no story is silently dropped during planning
  acceptance_criteria:
  - Process step loads user story content (journey, success criteria) for each affected story
  - Stories are clustered by domain theme (related changes, shared files, component boundaries)
  - Each cluster maps to one or more phases in the skeleton
  - Traceability matrix shows story_id -> phase_id bidirectional mapping
  - Unmapped stories are flagged as planning gaps
  - Matrix is included in structured output for downstream planners
  related_agents:
  - planner-design
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-design/process.yml
  related_stories:
  - US-GD-160
  - US-GD-162
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-GD-162
  title: Planner-Audit Story Traceability Audit Step
  category: planning
  priority: high
  as_a: planner-audit agent reviewing epic compliance
  i_want: a dedicated story traceability audit step that checks bidirectional ticket-to-story linkage
  so_that: epics cannot pass audit without demonstrating full story coverage
  acceptance_criteria:
  - 'Forward traceability: each ticket''s story_ids references real stories in affected_stories'
  - 'Reverse traceability: each affected story has at least one ticket referencing it AND/OR a pytest marker'
  - Pytest marker check scans test files for @pytest.mark.story markers matching story IDs
  - Compliance report includes story_traceability section with direction, entity_id, findings
  - Unreferenced stories flagged as audit findings
  - Orphan ticket story_ids (referencing non-existent stories) flagged as errors
  related_agents:
  - planner-audit
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-audit/process.yml
  related_stories:
  - US-GD-053
  - US-GD-138
  - US-GD-076
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-GD-163
  title: Planner-Test UAT Story ID Requirement
  category: planning
  priority: high
  as_a: planner-test agent creating test phase plans
  i_want: UAT task templates to require story_id as a mandatory field
  so_that: every UAT task is explicitly linked to the user story it validates
  acceptance_criteria:
  - planner-test process.yml includes story_id requirement in UAT task template
  - story-coverage-loop definition enables post-test marker coverage checks
  - Loop type triggers STORY_COVERAGE_INCOMPLETE feedback when markers are missing
  - Maximum iteration limit (default 3) prevents infinite re-runs
  - Exit condition is all affected stories having @pytest.mark.story markers in test files
  - Escalation after max iterations with coverage report
  related_agents:
  - planner-test
  - test-builder
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-test/process.yml
  related_stories:
  - US-GD-078
  - US-ORCH-043
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
