stories:
- id: US-GD-100
  title: Definition Files for Stable Concepts
  category: assets
  priority: high
  as_a: agent learning about the system
  i_want: to reference definition files that answer 'what is X'
  so_that: I understand stable concepts and terminology
  acceptance_criteria:
  - 42 definition files in assets/definitions/
  - Definitions are factual, stable, and objective
  - Definitions include examples and anti-examples
  - Definitions cross-reference related definitions
  - 'Key definitions: agent-categories, plans, agent-loops, rlm-patterns, friction'
  related_files:
  - modules/AgenticGuidance/assets/definitions/
  - modules/AgenticGuidance/assets/definitions/agent-categories.yml
  - modules/AgenticGuidance/assets/definitions/plans.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-101
  title: Definition Structure
  category: assets
  priority: medium
  as_a: developer creating a new definition
  i_want: to follow consistent structure for definition files
  so_that: definitions are discoverable and maintainable
  acceptance_criteria:
  - 'Definition includes: name, definition, context, examples'
  - 'Definition includes: when_to_use, when_not_to_use'
  - 'Definition includes: related_definitions, related_guidelines'
  - Definition uses YAML format
  - Definition filename matches concept name
  related_files:
  - modules/AgenticGuidance/assets/definitions/definition.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-102
  title: Guideline Files for Behavioral Rules
  category: assets
  priority: high
  as_a: agent executing a task
  i_want: to reference guideline files that answer 'how to act'
  so_that: my behavior follows established principles
  acceptance_criteria:
  - 46 guideline files in assets/guidelines/
  - Guidelines are prescriptive and actionable
  - Guidelines include when to apply and when not to apply
  - Guidelines include examples of correct behavior
  - 'Key guidelines: less-is-more, fix-the-source, context-minimisation, iteration,
    testing, safety'
  related_files:
  - modules/AgenticGuidance/assets/guidelines/
  - modules/AgenticGuidance/assets/guidelines/less-is-more.yml
  - modules/AgenticGuidance/assets/guidelines/fix-the-source.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
