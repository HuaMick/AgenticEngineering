stories:
- id: US-GD-120
  title: Epic CRUD Operations
  category: services
  priority: critical
  as_a: CLI or agent managing epics
  i_want: to use EpicService for epic CRUD operations
  so_that: epic data access is programmatic and consistent
  acceptance_criteria:
  - EpicService provides create, read, update, delete operations
  - Handles both modern (phases[].tickets[]) and legacy (epic.tickets[]) structures
  - Uses FileLock for atomic operations
  - Returns PlanData dataclass for type safety
  - Validates epic structure against schema
  related_services:
  - EpicService
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/plan.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-121
  title: Epic Data Validation
  category: services
  priority: high
  as_a: EpicService
  i_want: to validate epic data against schema
  so_that: only well-formed epics are persisted
  acceptance_criteria:
  - 'Validate required fields: name, worktree_path, branch, status, objective, phases'
  - 'Validate status enum: planning, active, needs_review, blocked, completed'
  - 'Validate priority enum: critical, high, medium, low'
  - Validate phase structure
  - Return validation errors with specific field paths
  related_services:
  - EpicService
  related_files:
