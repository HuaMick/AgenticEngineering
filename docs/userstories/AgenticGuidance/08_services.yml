- id: US-GD-122
  title: Epic Movement Workflow
  category: services
  priority: high
  as_a: EpicService
  i_want: to automate epic archival when completed
  so_that: completed epics are moved to docs/epics/completed/
  acceptance_criteria:
  - Detect when all tickets are completed
  - Check git status before moving folder
  - Move epic folder from live/ to completed/
  - Preserve epic structure and history
  - Handle git conflicts gracefully
  - 'Return MoveResult: SUCCESS, SKIPPED, FAILED'
  related_services:
  - EpicService
  - GitSafetyChecker
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/plan.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
