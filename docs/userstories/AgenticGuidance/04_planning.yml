stories:
- id: US-GD-040
  title: Create Implementation Plan
  category: planning
  priority: critical
  as_a: planner-build agent
  i_want: to create a phased implementation plan for code changes
  so_that: builders can execute the work systematically
  acceptance_criteria:
  - Plan includes phases, tasks, and success criteria
  - Each phase has clear inputs, process, outputs, and agent assignment
  - Tasks are decomposed to single-session scope
  - Plan includes architecture pattern verification
  - Impacted files and artifacts explicitly scoped
  - Worktree path and branch specified
  - Plan saved as plan_build.yml in plan folder
  related_agents:
  - planner-build
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-build/process.yml
  - modules/AgenticGuidance/assets/specifications/plan-schema.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-041
  title: Phase Decomposition
  category: planning
  priority: high
  as_a: planner-build agent
  i_want: to decompose work into logical phases
  so_that: execution can be parallelized and checkpointed
  acceptance_criteria:
  - 'Phases are ordered: setup, implementation, validation, cleanup'
  - Each phase is independently executable
  - Phase dependencies explicitly declared
  - Phases can execute in parallel where no dependencies exist
  - Each phase assigned to appropriate agent (build-python, test-runner, etc.)
  related_agents:
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-042
  title: Task Granularity
  category: planning
  priority: high
  as_a: planner-build agent
  i_want: to create tasks at appropriate granularity
  so_that: each task fits in a single agent session
  acceptance_criteria:
  - 'Tasks are single-focus: one feature, one fix, one refactor'
  - Tasks include clear acceptance criteria
  - Tasks specify required inputs and expected outputs
  - Tasks reference specific files to modify or create
  - Tasks avoid bundling unrelated changes
  related_agents:
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-043
  title: Architecture Pattern Alignment
  category: planning
  priority: high
  as_a: planner-build agent
  i_want: to verify plan alignment with architecture patterns
  so_that: implementations follow established conventions
  acceptance_criteria:
  - Verify Domain -> Workflow -> Entrypoint pattern
  - Verify absolute paths in config files
  - Verify service boundaries maintained
  - Verify test structure follows tests/workflows/ organization
  - Architecture checklist included in manifest.yml
  related_agents:
  - planner-build
  related_files:
  - modules/AgenticGuidance/assets/definitions/architecture-pattern.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-044
  title: Create Test Plan
  category: planning
  priority: critical
  as_a: planner-test agent
  i_want: to create a phased test plan for validation
  so_that: implementations are validated through comprehensive testing
  acceptance_criteria:
  - 'Test phases include: unit tests, integration tests, E2E tests'
  - Each test phase includes audit loop (test-runner -> test-audit -> fix)
  - CI/CD validation phase included when test infrastructure changes
  - User flow testing included for CLI commands
  - Guidance validation included for agent guidance changes
  - Plan saved as plan_test.yml in plan folder
  related_agents:
  - planner-test
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-test/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-045
  title: Test Coverage Strategy
  category: planning
  priority: high
  as_a: planner-test agent
  i_want: to define test coverage strategy based on changes
  so_that: testing effort matches risk and complexity
  acceptance_criteria:
  - Unit tests for new functions and methods
  - Integration tests for component interactions
  - E2E tests for user-facing workflows
  - Regression tests for bug fixes
  - Smoke tests for quick validation
  - Coverage targets defined per phase
  related_agents:
  - planner-test
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-046
  title: Test Audit Loop Planning
  category: planning
  priority: high
  as_a: planner-test agent
  i_want: to plan audit loops that detect reward hacking
  so_that: tests validate correctness, not just pass
  acceptance_criteria:
  - 'Audit loop: test-builder creates tests -> test-runner executes -> test-audit
    reviews'
  - test-audit checks for reward hacking (tests that always pass)
  - test-audit validates test actually exercises the code
  - Audit loop repeats until test quality acceptable
  - Loop exit criteria clearly defined
  related_agents:
  - planner-test
  - test-builder
  - test-runner
  - test-audit
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-047
  title: Create Guidance Improvement Plan
  category: planning
  priority: high
  as_a: planner-guidance agent
  i_want: to create a plan for improving agent guidance
  so_that: teacher agents can systematically enhance guidance
  acceptance_criteria:
  - Plan identifies guidance gaps from friction analysis
  - 'Plan includes phases: analysis, guidance update, validation, documentation'
  - Each guidance update specifies target agent and files to modify
  - Plan includes guidance-test-loop for validation
  - Plan saved as plan_teach.yml in plan folder
  related_agents:
  - planner-guidance
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-048
  title: Guidance Validation Strategy
  category: planning
  priority: high
  as_a: planner-guidance agent
  i_want: to plan validation for guidance changes
  so_that: guidance improvements are verified before deployment
  acceptance_criteria:
  - Validation includes walkthrough-based testing
  - test-guidance-simulator executes guidance following process.yml
  - 'Validation checks: completeness, clarity, actionability'
  - Self-review loop included (agent reviews own guidance)
  - Blind test included (agent uses only guidance, no context)
  related_agents:
  - planner-guidance
  - test-guidance-simulator
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-049
  title: Review and Approve Plan
  category: planning
  priority: critical
  as_a: planner-reviewer agent
  i_want: to review plans for quality and architectural compliance
  so_that: only well-formed plans proceed to execution
  acceptance_criteria:
  - Verify plan structure matches schema
  - Verify phases are logically ordered
  - Verify tasks are appropriately scoped
  - Verify architecture patterns followed
  - Verify no unimplemented infrastructure referenced
  - Check Implementation Status in AgenticGuidance README
  - Approve plan or request revisions with specific feedback
  related_agents:
  - planner-reviewer
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml
  - modules/AgenticGuidance/README.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-050
  title: Infrastructure Availability Check
  category: planning
  priority: critical
  as_a: planner-reviewer agent
  i_want: to verify that planned work does not depend on unimplemented infrastructure
  so_that: plans are executable with current capabilities
  acceptance_criteria:
  - Check AgenticGuidance README Implementation Status section
  - Reject plans referencing unimplemented agents
  - Reject plans requiring CI/CD when deploy-cicd not fully implemented
  - Suggest workarounds or alternative approaches
  - Document infrastructure gaps as blockers
  related_agents:
  - planner-reviewer
  related_files:
  - modules/AgenticGuidance/README.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-051
  title: Plan Revision Loop
  category: planning
  priority: high
  as_a: planner-reviewer agent
  i_want: to request revisions when plan quality is insufficient
  so_that: plans improve through iterative review
  acceptance_criteria:
  - Provide specific, actionable feedback on issues
  - Reference relevant guidelines and definitions
  - Suggest concrete improvements
  - Re-review after planner makes revisions
  - Limit revision loops to prevent infinite iteration
  - Escalate to human if revisions not converging
  related_agents:
  - planner-reviewer
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-052
  title: Create Cleanup Plan
  category: planning
  priority: medium
  as_a: planner-cleaning agent
  i_want: to create a plan for code cleanup and auditing
  so_that: codebase remains clean after implementation
  acceptance_criteria:
  - 'Plan includes phases: audit, cleanup, verification'
  - Identify unused files, deprecated code, stale comments
  - Plan removal or archival of unnecessary artifacts
  - Verify no broken references after cleanup
  - Update documentation to reflect cleanup
  related_agents:
  - planner-cleaning
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-053
  title: Audit Plan Folder Compliance
  category: planning
  priority: medium
  as_a: planner-audit agent
  i_want: to audit plan folders for lifecycle compliance
  so_that: plan folders follow naming and organization conventions
  acceptance_criteria:
  - 'Check plan folder naming: YYMMDDXX_description'
  - 'Verify required files exist: plan_build.yml, orchestration_*.mmd'
  - Identify completed plans that should be archived
  - Identify stale plans that should be deferred or closed
  - Generate audit report with actionable recommendations
  related_agents:
  - planner-audit
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-audit/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-054
  title: Generate Orchestration MMD
  category: planning
  priority: critical
  as_a: planner-orchestration agent
  i_want: to generate orchestration MMD file from approved phase plans
  so_that: orchestration-executor can execute the plan
  acceptance_criteria:
  - Read all approved phase plans (plan_build.yml, plan_test.yml, etc.)
  - Extract phases, tasks, and agent assignments
  - Generate Mermaid flowchart with phases and dependencies
  - 'Include metadata: GOAL, PROFILE, PHASES, AGENT_ROUTING, STATUS'
  - Validate MMD against plan-mmd-schema.yml
  - Save as orchestration_{plan_id}.mmd in plan folder
  related_agents:
  - planner-orchestration
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-orchestration/process.yml
  - modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-055
  title: Plan Entrypoints
  category: planning
  priority: critical
  as_a: user creating a new plan
  i_want: to invoke planning via entrypoint files
  so_that: planning follows standardized workflow
  acceptance_criteria:
  - _plan_build.yml entrypoint for implementation plans
  - _plan_teach.yml entrypoint for guidance plans
