- id: US-GD-056
  title: Audit Ticket Nesting Enforcement
  category: planning
  priority: critical
  as_a: planner-audit agent
  i_want: to detect epics with tickets at root level instead of nested under phases
  so_that: downstream parsers iterating phases[].tickets[] do not silently skip work
  acceptance_criteria:
  - 'Detect root-level tickets: key and flag as HIGH severity STRUCTURE VIOLATION'
  - Detect phases without a tickets: list and flag as MEDIUM severity
  - 'Blocking failure when phases: is missing AND tickets: is at root level'
  - Findings reported under structure_hierarchy section in audit report
  - Violations include actionable recommendation to restructure into phases[].tickets[]
  related_agents:
  - planner-audit
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-audit/process.yml
  - modules/AgenticGuidance/assets/definitions/plans.yml
  related_stories:
  - US-GD-053
  - US-GD-057
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260223UT_260223ut_fix_planner_audit_to_enforce_task_levels
- id: US-GD-057
  title: Programmatic Ticket Nesting Validation
  category: planning
  priority: critical
  as_a: EpicService validating epic structure
  i_want: validate_epic_structure() to reject epics with root-level tickets
  so_that: malformed epics are caught deterministically, not just by LLM interpretation
  acceptance_criteria:
  - 'validate_epic_structure() checks for root-level tickets: key in each epic file'
  - 'Root-level tickets: flagged as error: "tickets found at root level, must be nested under phases"'
  - Each phase entry checked for presence of tickets: list
  - 'Phase without tickets: flagged as warning: "Phase has no tickets defined"'
  - Validation runs on epic creation and epic update operations
  - ValidationResult includes structure_hierarchy findings
  related_services:
  - EpicService
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/plan.py
  - modules/AgenticGuidance/assets/specifications/plan-schema.yml
  related_stories:
  - US-GD-121
  - US-GD-056
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260223UT_260223ut_fix_planner_audit_to_enforce_task_levels
- id: US-GD-058
  title: Epic Schema Nesting Constraint Documentation
  category: planning
  priority: high
  as_a: planner agent creating epics
  i_want: the epic schema to explicitly document that tickets must be nested under phases
  so_that: epic creators have clear structural requirements
  acceptance_criteria:
  - plan-schema.yml validation_rules include explicit nesting constraint
  - 'Rule: "tickets must only appear under phases[].tickets[], never at root level"'
  - plans.yml required_fields documents the phases->tickets hierarchy
  - Constraint is referenced by planner-build, planner-test, and planner-cleaning process.yml
  related_files:
  - modules/AgenticGuidance/assets/specifications/plan-schema.yml
  - modules/AgenticGuidance/assets/definitions/plans.yml
  related_stories:
  - US-GD-056
  - US-GD-057
  last_tested: null
