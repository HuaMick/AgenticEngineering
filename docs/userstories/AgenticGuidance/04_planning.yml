- id: US-GD-046
  title: Test Audit Loop Planning
  category: planning
  priority: high
  as_a: planner-test agent
  i_want: to plan audit loops that detect reward hacking
  so_that: tests validate correctness, not just pass
  acceptance_criteria:
  - 'Audit loop: test-builder creates tests -> test-runner executes -> test-audit
    reviews'
  - test-audit checks for reward hacking (tests that always pass)
  - test-audit validates test actually exercises the code
  - Audit loop repeats until test quality acceptable
  - Loop exit criteria clearly defined
  related_agents:
  - planner-test
  - test-builder
  - test-runner
  - test-audit
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
