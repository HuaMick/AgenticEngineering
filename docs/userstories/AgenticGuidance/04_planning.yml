stories:
- id: US-GD-040
  title: Create Implementation Epic
  category: planning
  priority: critical
  as_a: planner-build agent
  i_want: to create a phased implementation epic for code changes
  so_that: builders can execute the work systematically
  acceptance_criteria:
  - Epic includes phases, tickets, and success criteria
  - Each phase has clear inputs, process, outputs, and agent assignment
  - Tickets are decomposed to single-session scope
  - Epic includes architecture pattern verification
  - Impacted files and artifacts explicitly scoped
  - Worktree path and branch specified
  - Epic saved as ticket_build.yml in epic folder
  related_agents:
  - planner-build
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-build/process.yml
  - modules/AgenticGuidance/assets/specifications/plan-schema.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-041
  title: Phase Decomposition
  category: planning
  priority: high
  as_a: planner-build agent
  i_want: to decompose work into logical phases
  so_that: execution can be parallelized and checkpointed
  acceptance_criteria:
  - 'Phases are ordered: setup, implementation, validation, cleanup'
  - Each phase is independently executable
  - Phase dependencies explicitly declared
  - Phases can execute in parallel where no dependencies exist
  - Each phase assigned to appropriate agent (build-python, test-runner, etc.)
  related_agents:
  - planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-042
  title: Ticket Granularity
  category: planning
  priority: high
  as_a: planner-build agent
  i_want: to create tickets at appropriate granularity
  so_that: each ticket fits in a single agent session
  acceptance_criteria:
  - 'Tickets are single-focus: one feature, one fix, one refactor'
  - Tickets include clear acceptance criteria
  - Tickets specify required inputs and expected outputs
  - Tickets reference specific files to modify or create
  - Tickets avoid bundling unrelated changes
