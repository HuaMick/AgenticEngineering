  title: Create Git Worktree for Feature Branch
  category: deployment
  priority: critical
  as_a: deploy-worktree agent
  i_want: to create git worktree for feature branch development
  so_that: code development is isolated from main branch
  acceptance_criteria:
  - Create worktree at specified path
  - Create and checkout feature branch
  - Verify worktree creation successful
  - Initialize VS Code workspace if requested
  - Handle existing worktree gracefully
  related_agents:
  - deploy-worktree
  related_files:
  - modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml
  related_commands:
  - git worktree add <path> -b <branch>
