conventions:
  story_id_format: "US-GD-XXX (US = User Story, GD = Guidance, XXX = number)"
  priority_levels:
    - "critical: Core functionality, blocking for basic usage"
    - "high: Important functionality, impacts multiple workflows"
    - "medium: Useful functionality, enhances specific workflows"
    - "low: Nice-to-have, minor improvements"

  story_structure:
    required_fields:
      - id
      - title
      - category
      - priority
      - as_a
      - i_want
      - so_that
      - acceptance_criteria
    optional_fields:
      - related_agents
      - related_commands
      - related_services
      - related_files
      - dependencies
      - notes

