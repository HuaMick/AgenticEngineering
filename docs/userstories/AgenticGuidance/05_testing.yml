stories:
- id: US-GD-060
  title: Execute Python Tests
  category: testing
  priority: critical
  as_a: test-runner agent
  i_want: to execute existing tests and accurately report their status
  so_that: defects are identified through test failures
  acceptance_criteria:
  - Execute tests using pytest in specified directory
  - 'Report: passed, failed, skipped, errors'
  - Capture stdout/stderr for failed tests
  - Generate test execution summary
  - Do not fix code or modify tests
  - Exit with non-zero code if tests fail
  related_agents:
  - test-runner
  related_files:
  - modules/AgenticGuidance/agents/test/test-runner/process.yml
  related_commands:
  - pytest <directory>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
