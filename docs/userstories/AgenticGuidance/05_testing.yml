- id: US-GD-076
  title: Pytest Story Marker Registration
  category: testing
  priority: high
  as_a: test-builder agent writing story-linked tests
  i_want: a registered @pytest.mark.story("US-XXX-NNN") marker available in both test modules
  so_that: tests can be permanently linked to user stories via co-located markers that cannot drift
  acceptance_criteria:
  - pytest_configure() registers the "story" marker in both AgenticCLI and AgenticGuidance conftest.py
  - 'Marker description: "Links test to user story ID for persistent traceability"'
  - Marker accepts a single string argument (story ID in US-XXX-NNN format)
  - No warning emitted when using @pytest.mark.story("US-CLI-110") on a test
  - Multiple story markers can be applied to a single test function
  related_agents:
  - test-builder
  - test-runner
  related_files:
  - modules/AgenticGuidance/tests/conftest.py
  - modules/AgenticCLI/tests/conftest.py
  related_stories:
  - US-GD-077
  - US-GD-078
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-GD-077
  title: Story Marker Validation at Collection Time
  category: testing
  priority: high
  as_a: developer running the test suite
  i_want: the conftest collection plugin to validate that story markers reference valid story IDs
  so_that: typos and stale story references are caught before tests execute
  acceptance_criteria:
  - pytest_collection_modifyitems() hook loads valid story IDs from docs/userstories/ YAML files
  - _load_valid_story_ids() scans all story YAML files and extracts id fields
  - _find_repo_root_from_tests() locates the repository root from the tests/ directory
  - Invalid story IDs trigger a UserWarning (not a hard failure) with the offending ID and test name
  - Valid story IDs pass silently with no warnings
  - Performance is acceptable (story ID loading is fast even with many YAML files)
  related_agents:
  - test-runner
  - test-builder
  related_files:
  - modules/AgenticGuidance/tests/conftest.py
  - modules/AgenticCLI/tests/conftest.py
  - docs/userstories/
  related_stories:
  - US-GD-076
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-GD-078
  title: Test-Builder Story Marker Mandate
  category: testing
  priority: high
  as_a: planner-test agent planning test phases
  i_want: test-builder agent guidance to mandate @pytest.mark.story markers on story-linked tests
  so_that: new tests always include traceability markers connecting them to their source stories
  acceptance_criteria:
  - test-builder process.yml includes a step requiring story markers on UAT and acceptance tests
  - Tests linked to user stories MUST include @pytest.mark.story("US-XXX-NNN") decorator
  - Test-builder guidance references the marker convention and format
  - planner-test process.yml references story marker requirement in UAT task templates
  - Story marker mandate is enforced through guidance, not code-level validation
  related_agents:
  - test-builder
  - planner-test
  related_files:
