stories:
- id: US-GD-080
  title: Update Agent Process Files
  category: teaching
  priority: critical
  as_a: teacher-update-guidance agent
  i_want: to improve agent process.yml files based on friction analysis
  so_that: agents have clearer paths, fences, and signposts
  acceptance_criteria:
  - Identify friction patterns from trace analysis
  - Update process.yml to add missing steps
  - Add fences to constrain unwanted behavior
  - Add signposts for decision points
  - Keep guidance concise (under 5KB per agent)
  - Validate guidance via test-guidance-simulator
  related_agents:
  - teacher-update-guidance
  - teacher-trace-diagnostics
  - test-guidance-simulator
  related_files:
  - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-081
  title: Update Agent Input Configurations
  category: teaching
  priority: high
  as_a: teacher-update-guidance agent
  i_want: to improve agent inputs.yml files
  so_that: agents load exactly the context they need
  acceptance_criteria:
  - Add missing reference files to inputs.yml
  - Remove unused reference files
  - Organize inputs into layers (core, category, task-specific)
  - Verify all referenced files exist
  - Use shared input layers where applicable
  related_agents:
  - teacher-update-guidance
  related_files:
