- id: US-GD-082
  title: Create Inline Examples
  category: teaching
  priority: high
  as_a: teacher-update-guidance agent
  i_want: to add inline examples to process.yml files
  so_that: agents have concrete patterns to follow
  acceptance_criteria:
  - Examples demonstrate specific patterns
  - Examples are concise (under 20 lines)
  - Examples show both good and bad practices
  - Examples reference real codebase patterns
  - Examples embedded directly in process.yml
  related_agents:
  - teacher-update-guidance
