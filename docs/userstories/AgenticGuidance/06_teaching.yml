- id: US-GD-083
  title: Guidance Self-Review Loop
  category: teaching
  priority: high
  as_a: teacher-update-guidance agent
  i_want: to validate my guidance updates through self-review
  so_that: guidance improvements are validated before deployment
  acceptance_criteria:
  - After updating guidance, run test-guidance-simulator
  - Identify any new ambiguities or gaps
  - Iterate on guidance until validation passes
  - Document guidance change rationale
  - Limit self-review loops to prevent infinite iteration
  related_agents:
  - teacher-update-guidance
  - test-guidance-simulator
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-084
  title: Concise Guidance Principle
  category: teaching
  priority: critical
  as_a: teacher-update-guidance agent
  i_want: to keep guidance files concise and focused
  so_that: agents can load guidance without context window overflow
  acceptance_criteria:
  - Process.yml files under 5KB each
  - Inputs.yml files reference shared layers, not duplicate content
  - Remove verbose explanations, keep actionable guidance
  - Use examples in assets/ for verbose content
  - Prefer CLI offloading over agent instructions
  related_agents:
  - teacher-update-guidance
  related_files:
  - modules/AgenticGuidance/assets/examples/teacher/concise.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-085
  title: Create and Update Definitions
  category: teaching
  priority: high
  as_a: teacher-update-assets agent
  i_want: to create or update definition files in assets/definitions/
  so_that: stable concepts are documented for agent reference
  acceptance_criteria:
  - Definitions answer 'what is X'
  - Definitions are stable, factual, and objective
  - Definitions include examples and anti-examples
  - Definitions cross-reference related definitions
  - Definitions saved in assets/definitions/
  related_agents:
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/agents/teacher/teacher-update-assets/process.yml
