- id: US-GD-090
  title: Analyze LangSmith Traces
  category: teaching
  priority: high
  as_a: teacher-trace-diagnostics agent
  i_want: to analyze LangSmith traces for friction patterns
  so_that: I can identify specific guidance improvements
  acceptance_criteria:
  - Query LangSmith for recent agent traces
  - Detect backtracking patterns (repeated similar actions)
  - Detect error clusters (multiple errors in short window)
  - Detect path ambiguity (multiple approaches tried)
  - Detect tool call churn (excessive tool calls)
  - Detect context thrashing (re-reading same files)
  - Detect token anomalies (unusually high token usage)
  related_agents:
  - teacher-trace-diagnostics
  related_files:
  - modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml
  - modules/AgenticGuidance/assets/definitions/friction-patterns.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-091
  title: Generate Friction Diagnostic Report
  category: teaching
  priority: high
  as_a: teacher-trace-diagnostics agent
  i_want: to generate diagnostic report from trace analysis
  so_that: teacher agents know what guidance to improve
  acceptance_criteria:
  - Report includes detected friction patterns with examples
  - 'Report classifies severity: CRITICAL, HIGH, MEDIUM, LOW'
  - 'Report recommends resolution: GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE'
  - Report includes specific file paths and suggested changes
  - Report saved to plan folder or guidance docs
  related_agents:
  - teacher-trace-diagnostics
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-092
  title: Friction Pattern Classification
  category: teaching
  priority: high
  as_a: teacher-trace-diagnostics agent
  i_want: to classify friction patterns by severity and resolution
  so_that: highest-impact improvements are prioritized
  acceptance_criteria:
  - 'CRITICAL: Blocks task completion or causes major inefficiency'
  - 'HIGH: Significant inefficiency or repeated friction'
  - 'MEDIUM: Minor inefficiency or occasional friction'
  - 'LOW: Cosmetic or rare friction'
  - Resolution mapped to appropriate teacher agent
  related_agents:
  - teacher-trace-diagnostics
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-093
  title: CLI Offload Recommendations
  category: teaching
  priority: high
  as_a: teacher-trace-diagnostics agent
  i_want: to recommend CLI commands to replace repeated agent tool calls
  so_that: deterministic operations are offloaded to CLI
  acceptance_criteria:
  - Identify patterns where agents repeatedly use Read/Glob/Grep
  - Recommend CLI command to replace pattern
  - 'Example: Multiple file reads -> agentic context bootstrap'
  - 'Example: Status queries -> agentic plan status'
  - Document CLI command in guidance
  related_agents:
  - teacher-trace-diagnostics
  related_files:
  - modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-094
  title: Trace Analysis Test Suite
  category: teaching
  priority: medium
  as_a: developer maintaining teacher-trace-diagnostics
  i_want: to have test suite for trace analysis logic
  so_that: friction detection is reliable and testable
  acceptance_criteria:
  - Test fixtures with sample traces
  - Unit tests for each friction pattern detector
  - Integration tests for full analysis workflow
  - Tests validate classification logic
  - Tests validate resolution recommendations
  related_agents:
  - teacher-trace-diagnostics
  related_files:
  - modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/tests/
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-095
  title: Paths, Fences, and Signposts
  category: teaching
  priority: critical
  as_a: teacher agent creating guidance
  i_want: to provide paths, fences, and signposts in agent guidance
  so_that: agents have clear direction without overconstraint
  acceptance_criteria:
  - 'Paths: Sequential steps through workflow (process.yml)'
  - 'Fences: Boundaries constraining behavior (guidelines)'
  - 'Signposts: Directional hints for decisions (when X, consider Y)'
  - Balance between guidance and agent autonomy
  - Avoid overspecification that limits agent flexibility
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/assets/definitions/path.yml
  - modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-096
  title: Fix-the-Source Principle
  category: teaching
  priority: high
  as_a: teacher agent improving guidance
  i_want: to address root causes rather than symptoms
  so_that: guidance improvements are durable
  acceptance_criteria:
  - Identify why friction occurred, not just what happened
  - Update guidance at source rather than adding workarounds
  - Prefer upstream fixes (definitions, guidelines) over per-agent patches
  - Document rationale for guidance changes
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/assets/guidelines/fix-the-source.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GD-097
  title: Less-is-More Principle
  category: teaching
  priority: high
  as_a: teacher agent creating guidance
  i_want: to create minimal sufficient guidance
  so_that: agents have clarity without overwhelming detail
  acceptance_criteria:
  - Guidance is concise and actionable
  - Remove verbose explanations, keep essential information
  - Prefer examples over paragraphs of text
  - Avoid redundancy across guidance files
  - Use shared assets for common patterns
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/assets/guidelines/less-is-more.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
