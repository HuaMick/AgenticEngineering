area: agent_definitions
description: "Manifests, categories, discovery, CCI"
stories:
- id: US-GDN-001
  title: Discover Available Agents
  category: agent_definitions
  priority: critical
  description: As a orchestration agent routing work to specialists, I want to discover all available agent definitions and
    their capabilities, so that I can route tasks to the correct agent based on requirements.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Agent definitions are organized in modules/AgenticGuidance/agents/ by category
  - step: 2
    when: the feature is used
    then:
    - Each agent has a manifest.yml declaring name, description, and capabilities
  - step: 3
    when: the feature is used
    then:
    - 'Agent categories include: orchestration, planner, build, test, teacher, deploy'
  - step: 4
    when: the feature is used
    then:
    - agentic manifest list shows all agents across all categories
  - step: 5
    when: the feature is used
    then:
    - agentic manifest show <path> displays a specific agent's manifest
  - step: 6
    when: the feature is used
    then:
    - 24 active agents are discoverable (2 deprecated agents excluded)
  related_commands:
  - agentic manifest list
  - agentic manifest show ./agents/planner/planner-build
  related_agents:
  - orchestration-executor
  - orchestration-planning
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-002
  title: Validate Agent Manifest
  category: agent_definitions
  priority: high
  description: As a developer adding a new agent, I want to validate that an agent manifest is well-formed, so that the agent
    is discoverable and correctly configured before deployment.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic manifest validate <path> checks manifest.yml structure
  - step: 2
    when: the feature is used
    then:
    - 'Validates required fields: name, description, version, purpose'
  - step: 3
    when: the feature is used
    then:
    - Validates that referenced process.yml and inputs.yml files exist
  - step: 4
    when: an error condition occurs
    then:
    - Reports missing or malformed fields with clear messages
  - step: 5
    when: an error condition occurs
    then:
    - Returns exit code 0 on success, non-zero on failure
  related_commands:
  - agentic manifest validate ./agents/planner/planner-build
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-003
  title: Agent Category Organization
  category: agent_definitions
  priority: high
  description: As a developer understanding the agent ecosystem, I want to see agents organized by their category (orchestration,
    planner, build, test, teacher, deploy), so that I understand the agent taxonomy and can find the right agent for a task.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Orchestration agents (2 active): orchestration-planning, orchestration-executor'
  - step: 2
    when: the feature is used
    then:
    - 'Planner agents (7): planner-build, planner-test, planner-audit, planner-build, planner-test, planner-reviewer,
      planner-audit'
  - step: 3
    when: the feature is used
    then:
    - 'Test agents (7): test-builder, test-audit, trace-explorer, trace-explorer, test-builder, test-builder, test-uat'
  - step: 4
    when: the feature is used
    then:
    - 'Teacher agents (2): teacher-update-guidance, teacher-update-assets'
  - step: 5
    when: the feature is used
    then:
    - 'Build agents (2): build-python, build-flutter'
  - step: 6
    when: the feature is used
    then:
    - 'Deploy agents (2): deploy-worktree, deploy-cicd'
  - step: 7
    when: the feature is used
    then:
    - Each category folder is self-contained with agent subfolders
  related_agents:
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/README.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-004
  title: Agent Manifest Required Fields
  category: agent_definitions
  priority: critical
  description: As a developer creating agent manifest, I want to include all required fields in manifest.yml, so that agent
    is properly documented and discoverable.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'name: Agent identifier (e.g., planner-build)'
  - step: 2
    when: the feature is used
    then:
    - 'description: Brief description of agent purpose'
  - step: 3
    when: the feature is used
    then:
    - 'version: Version string (e.g., 2.0)'
  - step: 4
    when: the feature is used
    then:
    - 'purpose: Detailed explanation of agent role'
  - step: 5
    when: the feature is used
    then:
    - Manifest references process.yml (or process.yml) for behavioral guidance
  - step: 6
    when: the feature is used
    then:
    - Manifest references inputs.yml for context requirements
  related_files:
  - modules/AgenticGuidance/agents/*/manifest.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-005
  title: Agent Spawning Declarations
  category: agent_definitions
  priority: high
  description: As a orchestration agent, I want to see which agents can be spawned by an orchestrator, so that I know my delegation
    capabilities.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Orchestrator manifest includes 'spawns:' section
  - step: 2
    when: the feature is used
    then:
    - 'Each spawn declares: agent, purpose, when (conditions)'
  - step: 3
    when: the feature is used
    then:
    - Spawn declarations act as fence - only listed agents may be spawned
  - step: 4
    when: the feature is used
    then:
    - 'Example: orchestration-planning spawns planner-build, planner-test, planner-reviewer'
  related_agents:
  - orchestration-planning
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/orchestration/orchestration-planning/manifest.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-006
  title: Agent Output Declarations
  category: agent_definitions
  priority: high
  description: As a agent creating artifacts, I want to declare my expected outputs in manifest, so that downstream agents
    know what artifacts to expect.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Manifest includes 'outputs:' section listing artifacts
  - step: 2
    when: the feature is used
    then:
    - 'Each output declares: name, path_template, description, required'
  - step: 3
    when: the feature is used
    then:
    - 'Example: planner-build outputs TinyDB ticket records (build phase) and TinyDB phase records'
  - step: 4
    when: the feature is used
    then:
    - Output declarations enable validation of completeness
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-007
  title: Agent Versioning
  category: agent_definitions
  priority: medium
  description: As a developer maintaining agents, I want to version agent guidance, so that breaking changes are tracked and
    communicated.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Version scheme: X.Y where X = architecture version, Y = iteration'
  - step: 2
    when: the feature is used
    then:
    - Version 2.0 = reference layer architecture
  - step: 3
    when: the feature is used
    then:
    - Version increments when guidance structure changes
  - step: 4
    when: the feature is used
    then:
    - Version documented in manifest.yml
  related_files:
  - modules/AgenticGuidance/agents/*/manifest.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-008
  title: Agent vs CLI Responsibility
  category: agent_definitions
  priority: critical
  description: As a developer designing agent vs CLI split, I want to understand when to use agents vs CLI, so that I maintain
    clear responsibility boundaries.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Agents handle: judgment, interpretation, novel situations'
  - step: 2
    when: the feature is used
    then:
    - 'CLI handles: deterministic operations, validation, state queries'
  - step: 3
    when: the feature is used
    then:
    - 'Agents do NOT: naming conventions, schema validation, mechanical file ops'
  - step: 4
    when: an error condition occurs
    then:
    - 'CLI does NOT: code generation, error diagnosis, plan creation'
  - step: 5
    when: the feature is used
    then:
    - Clear boundaries prevent interpretation variance
  related_files:
  - modules/AgenticGuidance/README.md
  - modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-009
  title: Agent Context Discovery via CCI
  category: agent_definitions
  priority: critical
  description: As a agent bootstrapping at session start, I want to discover my context via CLI Context Injection (CCI), so
    that I load current context instead of stale static files.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Agent invokes: agentic context bootstrap --role <agent-role> -j'
  - step: 2
    when: the feature is used
    then:
    - 'CLI returns: process.yml, inputs.yml, referenced assets'
  - step: 3
    when: the feature is used
    then:
    - Bootstrap output is JSON for machine parsing
  - step: 4
    when: the feature is used
    then:
    - Agent does NOT use Read/Glob tools during bootstrap
  - step: 5
    when: the feature is used
    then:
    - Context loading is deterministic and consistent
  related_commands:
  - agentic context bootstrap --role planner-build -j
  - agentic epic ticket current -j
  related_files:
  - modules/AgenticGuidance/README.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
