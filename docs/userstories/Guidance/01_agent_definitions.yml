area: agent_definitions
description: "Manifest structure, archetypes, agent identity"
stories:
- id: US-GDN-005
  title: Agent Manifest Structure
  category: agent_definitions
  priority: high
  description: As an agent or developer understanding the system, I want to know what a manifest.yml declares and how
    its structure varies by agent archetype, so that I understand agent identity, capabilities, and routing contracts.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Every agent has a manifest.yml in modules/AgenticGuidance/agents/{category}/{agent-name}/
  - step: 2
    when: the feature is used
    then:
    - 'Core fields shared by all manifests: name, description, version, category'
  - step: 3
    when: the feature is used
    then:
    - 'Three manifest archetypes exist: category hub, orchestrator, and execution agent'
  - step: 4
    when: the feature is used
    then:
    - 'Category hub manifests (7) include sub_agents: and routing_logic: — act as registries for agent families'
  - step: 5
    when: the feature is used
    then:
    - 'Orchestrator manifests (3) include spawns: — each entry declares agent, purpose, and when (conditions)'
  - step: 6
    when: the feature is used
    then:
    - 'Spawn declarations act as a fence: only listed agents may be spawned by that orchestrator'
  - step: 7
    when: the feature is used
    then:
    - 'Execution agent manifests (~17) have no spawns: — they are leaf nodes that do actual work'
  - step: 8
    when: the feature is used
    then:
    - 'Optional fields vary by archetype: outputs (artifact declarations), project_type (builders), architecture_checklist (planner-build), boundaries, responsibilities'
  - step: 9
    when: the feature is used
    then:
    - 'outputs: section declares name, path_template, description, required — enables downstream validation of completeness'
  - step: 10
    when: the feature is used
    then:
    - 'Example: orchestration-planning spawns planner-build, planner-test, planner-orchestration'
  - step: 11
    when: the feature is used
    then:
    - 'Example: planner-build outputs TinyDB ticket records (build phase) and TinyDB phase records'
  related_agents:
  - orchestration-planning
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/orchestration/orchestration-planning/manifest.yml
  - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
  - modules/AgenticGuidance/agents/build/build-python/manifest.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
