area: entrypoints
description: "Entrypoint list/show/execute/compile"
stories:
- id: US-GDN-026
  title: Discover Available Entrypoints
  category: entrypoints
  priority: high
  description: As a orchestration agent or developer, I want to list all available workflow entrypoints, so that I can find
    the right entrypoint to initiate a workflow.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic entrypoint list shows all entrypoint files
  - step: 2
    when: the feature is used
    then:
    - Searches .claude/entrypoints/ and modules/AgenticGuidance/entrypoints/
  - step: 3
    when: the feature is used
    then:
    - Each entrypoint shows its name and description
  - step: 4
    when: the feature is used
    then:
    - JSON output is supported for scripting
  related_commands:
  - agentic ep list
  - agentic -j ep list
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-027
  title: View Entrypoint Content
  category: entrypoints
  priority: high
  description: As a developer reviewing a workflow definition, I want to see the full content of an entrypoint file, so that
    I understand what the workflow does before executing it.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic entrypoint show <name> displays the raw entrypoint content
  - step: 2
    when: the feature is used
    then:
    - The underscore prefix is optional (ticket_build and _ticket_build both work)
  - step: 3
    when: the feature is used
    then:
    - JSON output includes the path and content type
  related_commands:
  - agentic ep show ticket_build
  - agentic ep show _orchestrate
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-028
  title: Execute Entrypoint with Variables
  category: entrypoints
  priority: critical
  description: As a orchestration agent starting a workflow, I want to execute an entrypoint with variable substitution and
    context, so that the workflow is initialized with the correct parameters.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic entrypoint execute <name> processes the entrypoint content
  - step: 2
    when: the feature is used
    then:
    - The --vars flag substitutes KEY=VALUE pairs using {{VAR}} syntax
  - step: 3
    when: the feature is used
    then:
    - The --context flag prepends additional context text
  - step: 4
    when: the feature is used
    then:
    - TIMESTAMP is automatically injected as a built-in variable
  - step: 5
    when: the feature is used
    then:
    - The --compile flag builds a complete context bundle
  related_commands:
  - agentic ep execute ticket_build --vars TASK_ID=build_01
  - agentic orchestrate session implement --context 'Working on auth feature'
  related_agents:
  - orchestration-planning
  - orchestration-executor
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-029
  title: Compile Complete Context Bundle
  category: entrypoints
  priority: high
  description: As a agent needing full workflow context, I want to compile an entrypoint with all referenced files included,
    so that I have the entire context bundle in a single output.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic ep execute <name> --compile includes the entrypoint, orchestration file, inputs, and referenced files
  - step: 2
    when: the feature is used
    then:
    - 'Output sections are delimited with headers like ''# === ENTRYPOINT: name ==='''
  - step: 3
    when: the feature is used
    then:
    - 'All location: references in inputs.yml are resolved and included'
  - step: 4
    when: an error condition occurs
    then:
    - Missing referenced files are reported but do not block compilation
  related_commands:
  - agentic ep execute ticket_build --compile
  - agentic orchestrate session implement --compile --context 'My context'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
