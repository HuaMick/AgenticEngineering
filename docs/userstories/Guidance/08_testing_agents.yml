area: testing_agents
description: "Test-runner, test-audit, test-builder, simulators"
stories:
- id: US-GDN-061
  title: Test Execution Isolation
  category: testing
  priority: critical
  description: As a test-builder agent, I want to execute tests in isolated worktree context with
    structured output routing, so that results feed into orchestration loops.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Tests run from correct worktree directory within orchestration system (not arbitrary repo root)
  - step: 2
    when: the feature is used
    then:
    - 'Role constraint: test-builder executes tests but MUST NOT fix code or modify tests —
      separation prevents self-validation bias'
  - step: 3
    when: the feature is used
    then:
    - Report saved as structured YAML/JSON to task outputs, enabling orchestration-executor
      to parse results programmatically
  - step: 4
    when: the feature is used
    then:
    - Failed test results feed back into test-fix-loop — orchestration-executor routes failures
      to build agents for remediation
  related_agents:
  - test-builder
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/test/test-builder/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-064
  title: Test Audit Loop Integration
  category: testing
  priority: critical
  description: As a test-audit agent, I want to review test quality and feed findings into the
    audit-test-fix loop, so that test coverage metrics are meaningful and remediation is automated.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Role separation: test-audit is a distinct agent from test-builder — auditor cannot
      be the same agent that wrote the tests (prevents self-validation bias)'
  - step: 2
    when: the feature is used
    then:
    - Audit checks are defined in injectable guideline assets (reward-hacking-prevention.yml) —
      the check list is interchangeable content, the audit mechanism is the system mechanic
  - step: 3
    when: the feature is used
    then:
    - Audit report feeds into audit-test-fix-loop — orchestration-executor routes findings
      to test-builder for remediation, then re-audits
  - step: 4
    when: the feature is used
    then:
    - Loop bounded by max iterations to prevent infinite audit-fix cycles
  related_agents:
  - test-audit
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/test/test-audit/process.yml
  - modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-070
  title: Walkthrough-Based Guidance Validation
  category: testing
  priority: high
  description: As a trace-explorer agent, I want to validate guidance completeness by following process.yml, so that
    guidance is sufficient for task execution.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Execute guidance walkthrough using only process.yml and inputs.yml
  - step: 2
    when: an error condition occurs
    then:
    - Identify missing steps or unclear instructions
  - step: 3
    when: an error condition occurs
    then:
    - Identify missing context or reference files
  - step: 4
    when: the feature is used
    then:
    - Identify ambiguous decision points
  - step: 5
    when: the feature is used
    then:
    - Generate validation report with specific gaps
  - step: 6
    when: the feature is used
    then:
    - 'Blind test constraint: agent receives only process.yml, inputs.yml, and referenced assets'
  - step: 7
    when: the feature is used
    then:
    - Identify points where agent gets stuck, confused, or makes assumptions
  - step: 8
    when: the feature is used
    then:
    - Input file references validated during walkthrough
  - step: 9
    when: the feature is used
    then:
    - Report includes step-by-step pass/fail on guidance completeness
  related_agents:
  - trace-explorer
  - teacher-update-guidance
  related_files:
  - modules/AgenticGuidance/agents/test/trace-explorer/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-074
  title: User Story UAT
  category: testing
  priority: medium
  description: As a quality assurance process, I want to validate user stories through blind testing — both
    documentation-based walkthroughs and scenario execution — so that user experience matches documented workflows.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - test-uat agent receives only user-facing documentation (README, guides) — no internal guidance
  - step: 2
    when: the feature is used
    then:
    - Agent attempts to complete user story steps using only available docs and CLI help
  - step: 3
    when: the feature is used
    then:
    - Blind test scenarios can be generated from story definitions via orchestration spawn
  - step: 4
    when: the feature is used
    then:
    - 'Trigger via: agentic orchestrate session spawn --role test-uat --plan <epic-folder>'
  - step: 5
    when: the feature is used
    then:
    - Identify points where documentation is insufficient or behavior differs from docs
  - step: 6
    when: the feature is used
    then:
    - Identify workflows that require internal knowledge to complete
  - step: 7
    when: the feature is used
    then:
    - Results report pass/fail with evidence and failure descriptions
  related_commands:
  - agentic orchestrate session spawn --role test-uat --plan <epic-folder>
  related_agents:
  - test-uat
  related_files:
  - modules/AgenticGuidance/agents/test/test-uat/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-081
  title: Test Phase Planning Architecture
  category: testing
  priority: high
  description: As a planner-test agent, I want to create test phase plans that enforce mandatory
    loops, story traceability, and UAT, so that test coverage is systematic and verifiable.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Planner-builder delegation: planner-test creates the plan, test-builder implements
      test files — planning and execution are separate roles'
  - step: 2
    when: the feature is used
    then:
    - 'Mandatory loop inclusion: every test plan MUST include test-fix-loop, audit-test-fix-loop,
      and story-coverage-loop — these are not optional'
  - step: 3
    when: the feature is used
    then:
    - 'Story marker enforcement: all test files MUST use @pytest.mark.story("US-XXX-NNN")
      for test-to-story traceability — STORY_COVERAGE_INCOMPLETE triggers remediation'
  - step: 4
    when: the feature is used
    then:
    - 'Mandatory UAT phase: every test plan MUST include a UAT phase — no escape hatch exists'
  - step: 5
    when: the feature is used
    then:
    - 'Real CLI testing required: mocked CLI tests are forbidden for UAT — historical failures
      showed mocked tests masked broken CLIs'
  related_agents:
  - planner-test
  - test-builder
  related_files:
  - modules/AgenticGuidance/agents/planner/planner-test/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
