  stories were merged or relocated on 2026-04-07 as part of the post-restructure\n\
  triage:\n- US-GDN-064 (Test Audit Loop) merged into US-GDN-061\n- US-GDN-070 (Walkthrough-Based\
  \ Validation) deprecated \u2014 failed mechanics test\n- US-GDN-074 (User Story\
  \ UAT) relocated to Stories category\n- US-GDN-081 (Test Phase Planning Architecture)\
  \ merged into US-PLN-061\n"
stories:
- id: US-GDN-061
  title: Test Execution and Audit Loop
  category: testing
  priority: critical
  lifecycle: implemented
  description: 'As a test-builder or test-audit agent, I want test execution and audit

    to run as a coordinated loop with strict role separation, so that test

    quality is enforced without self-validation bias.


    This is a Guidance-internal story by the depender-owns rule (the role

    separation contract is enforced by Guidance agent definitions, not by

    a CLI command). The orchestration routing aspects (test-fix loop,

    iteration cap, blocked transitions on failure) live in US-PLN-061

    where the executor enforces them.

    '
  prerequisites: []
  steps:
  - step: 1
    when: orchestration-executor spawns a test-builder agent
    then:
    - The agent's working directory is the worktree associated with the active epic,
      never an arbitrary repo root; cwd is set at spawn time by the executor (not
      by the agent itself)
  - step: 2
    when: test-builder produces test results
    then:
    - "The agent MUST NOT modify production code or rewrite the tests it just ran\
      \ \u2014 role separation prevents self-validation bias"
    - Results are written as structured YAML/JSON to task outputs, enabling orchestration-executor
      to parse them programmatically without scraping log text
  - step: 3
    when: orchestration-executor spawns a test-audit agent
    then:
    - "test-audit is a DISTINCT agent from test-builder \u2014 the auditor cannot\
      \ be the same agent that wrote the tests (the role-separation fence is hard,\
      \ not advisory)"
  - step: 4
    when: test-audit runs against an existing test file
    then:
    - The audit checklist is loaded from injectable guideline assets (e.g., reward-hacking-prevention.yml);
      the check list is interchangeable content, the audit mechanism itself is the
      system mechanic
  - step: 5
    when: structured test output cannot be parsed by orchestration-executor
    then:
    - "The executor treats the phase as failed and routes the ticket to status=blocked\
      \ with the parse error captured in test_notes (degradation contract \u2014 depender\
      \ exits cleanly on malformed dependency output)"
  - step: 6
    when: an audit guideline asset (e.g., reward-hacking-prevention.yml) is missing
      or malformed
    then:
    - test-audit aborts the audit pass with a named-asset error and the phase is marked
      blocked; the auditor does not silently skip checks (fail-closed degradation)
  uat_plan:
    persona: agent-blind-test
    starting_state: 'A seed epic exists with one test phase P1 (agent=test-builder)
      and a

      follow-on audit phase P2 (agent=test-audit). Both phases reference

      the same test file. The reward-hacking-prevention.yml guideline asset

      exists and is well-formed.

      '
    preconditions:
    - US-PLN-001
    - US-PLN-015
    journey:
    - step: 1
      action: Run `agentic epic phase list --epic <folder>`
      observe:
      - command exits 0
      - P1 row shows agent=test-builder, P2 row shows agent=test-audit (the two roles
        are distinct in TinyDB)
    - step: 2
      action: Confirm role separation by running `agentic agent context bootstrap
        --role test-builder` and grepping the compiled output for the phrase 'MUST
        NOT modify production code'
      observe:
      - command exits 0
      - the role-separation fence is present in the compiled context
    - step: 3
      action: Confirm test-audit consumes the guideline asset by running `agentic
        agent context bootstrap --role test-audit` and grepping for `reward-hacking-prevention`
      observe:
      - command exits 0
      - the reward-hacking-prevention guideline appears as a referenced input
    - step: 4
      action: Temporarily rename `modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml`
        and re-run step 3
      observe:
      - command exits non-zero
      - stderr names the missing guideline file by absolute path (fail-closed degradation)
    success_signals:
    - Role separation between test-builder and test-audit is enforced at the agent-definition
      layer, visible in the compiled context
    - "Audit guidelines are loaded as input assets, not embedded in process.yml \u2014\
      \ they remain interchangeable content"
    - Missing audit guidelines fail the audit closed, never silently skipped
    cleanup:
    - Restore any temporarily renamed asset files
    - '`agentic epic archive <folder>`'
  related_commands:
  - agentic agent context bootstrap --role test-builder
  - agentic agent context bootstrap --role test-audit
  related_agents:
  - test-builder
  - test-audit
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/agents/test/test-builder/process.yml
  - modules/AgenticGuidance/agents/test/test-audit/process.yml
  - modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml
  - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
  last_tested: '2026-04-12T23:48:35.320737+00:00'
  test_status: pass
  test_notes: ''
  tested_by_plan: executor:260411UA_multi_story_pass:P3 Deploy
  last_pass_commit: 4fd4dfbc2f7b2d2c557593dcf47c79568442e881
