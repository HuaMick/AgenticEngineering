- id: US-GDN-077
  title: Pytest Story Marker Registration
  category: testing
  priority: high
  description: As a test-builder agent writing story-linked tests, I want a registered @pytest.mark.story("US-XXX-NNN") marker
    available in both test modules, so that tests can be permanently linked to user stories via co-located markers that cannot
    drift.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - pytest_configure() registers the "story" marker in both AgenticCLI and AgenticGuidance conftest.py
  - step: 2
    when: the feature is used
    then:
    - 'Marker description: "Links test to user story ID for persistent traceability"'
  - step: 3
    when: the feature is used
    then:
    - Marker accepts a single string argument (story ID in US-XXX-NNN format)
  - step: 4
    when: the feature is used
    then:
    - No warning emitted when using @pytest.mark.story("US-STR-001") on a test
  - step: 5
    when: the feature is used
    then:
    - Multiple story markers can be applied to a single test function
  related_agents:
  - test-builder
  - test-builder
  related_files:
  - modules/AgenticGuidance/tests/conftest.py
  - modules/AgenticCLI/tests/conftest.py
  related_stories:
  - US-GDN-078
  - US-GDN-079
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
- id: US-GDN-078
  title: Story Marker Validation at Collection Time
  category: testing
  priority: high
  description: As a developer running the test suite, I want the conftest collection plugin to validate that story markers
    reference valid story IDs, so that typos and stale story references are caught before tests execute.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - pytest_collection_modifyitems() hook loads valid story IDs from docs/userstories/ YAML files
  - step: 2
    when: the feature is used
    then:
    - _load_valid_story_ids() scans all story YAML files and extracts id fields
  - step: 3
    when: the feature is used
    then:
    - _find_repo_root_from_tests() locates the repository root from the tests/ directory
  - step: 4
    when: an error condition occurs
    then:
    - Invalid story IDs trigger a UserWarning (not a hard failure) with the offending ID and test name
  - step: 5
    when: the feature is used
    then:
    - Valid story IDs pass silently with no warnings
  - step: 6
    when: the feature is used
    then:
    - Performance is acceptable (story ID loading is fast even with many YAML files)
  related_agents:
  - test-builder
  - test-builder
  related_files:
  - modules/AgenticGuidance/tests/conftest.py
  - modules/AgenticCLI/tests/conftest.py
  - docs/userstories/
  related_stories:
  - US-GDN-077
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: 260308PD_planner_design_agent_story_alignment
