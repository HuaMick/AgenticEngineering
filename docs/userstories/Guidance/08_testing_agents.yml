- id: US-GDN-061
  title: Execute Python Tests
  category: testing
  priority: critical
  description: As a test-builder agent, I want to execute existing tests and accurately report their status, so that defects
    are identified through test failures.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Execute tests using pytest in specified directory
  - step: 2
    when: an error condition occurs
    then:
    - 'Report: passed, failed, skipped, errors'
  - step: 3
    when: an error condition occurs
    then:
    - Capture stdout/stderr for failed tests
  - step: 4
    when: the feature is used
    then:
    - Generate test execution summary
  - step: 5
    when: the feature is used
    then:
    - Do not fix code or modify tests
  - step: 6
    when: an error condition occurs
    then:
    - Exit with non-zero code if tests fail
  related_commands:
  - pytest <directory>
