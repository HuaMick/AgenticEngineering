area: context_bootstrap
description: "Context bootstrap, role guidance, input resolution"
stories:
- id: US-GDN-021
  title: Agent Self-Initialization via Bootstrap
  category: context_bootstrap
  priority: critical
  description: As a agent spawned by an orchestrator, I want to bootstrap my context with a single CLI command, so that I
    have my role guidance, current task, and input files without file exploration.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic context bootstrap returns a combined context bundle
  - step: 2
    when: the feature is used
    then:
    - The bundle includes the active ticket from docs/epics/live/
  - step: 3
    when: the feature is used
    then:
    - The bundle includes role-specific process.yml guidance
  - step: 4
    when: the feature is used
    then:
    - The bundle includes essential input file references
  - step: 5
    when: the feature is used
    then:
    - The --role flag specifies the agent role explicitly
  - step: 6
    when: an error condition occurs
    then:
    - Without --role, the role is auto-detected from context
  - step: 7
    when: the feature is used
    then:
    - JSON output (-j) returns structured data for machine parsing
  related_commands:
  - agentic context bootstrap --role build-python
  - agentic agent context bootstrap
  related_agents:
  - build-python
  - build-flutter
  - test-builder
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-022
  title: Get Role Guidance
  category: context_bootstrap
  priority: high
  description: As a agent needing its process definition, I want to retrieve my process.yml and manifest.yml content by role
    ID, so that I know what steps to follow and what my capabilities are.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic context role <id> returns process.yml and manifest.yml content
  - step: 2
    when: the feature is used
    then:
    - Content is sourced from AgenticGuidance module agent definitions
  - step: 3
    when: the feature is used
    then:
    - The --format flag supports yaml (default) and json output
  - step: 4
    when: an error condition occurs
    then:
    - Invalid role IDs produce clear error messages
  related_commands:
  - agentic ctx role planner-build
  - agentic ctx role build-python --format json
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-023
  title: Get Active Ticket from Epic
  category: context_bootstrap
  priority: critical
  description: As a agent ready to begin work, I want to retrieve the current or next ticket from the active epic, so that
    I know exactly what to implement.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic context ticket returns the first in_progress ticket
  - step: 2
    when: no in_progress ticket
    then:
    - returns the first pending ticket
  - step: 3
    when: the feature is used
    then:
    - Ticket details include ID, description, guidance, and success criteria
  - step: 4
    when: the feature is used
    then:
    - The --all flag returns all tickets in the epic
  - step: 5
    when: the feature is used
    then:
    - Returns clear message when no tickets remain
  - step: 6
    when: the feature is used
    then:
    - Crawls docs/epics/live/ to find the active epic
  related_commands:
  - agentic ctx task
  - agentic ctx task --all
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-024
  title: Resolve Input Files for Role
  category: context_bootstrap
  priority: high
  description: As a agent needing reference material, I want to get my input files with resolved paths and existence checks,
    so that I have the project files I need without searching the filesystem.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic context inputs --role <id> returns the inputs.yml for the role
  - step: 2
    when: the feature is used
    then:
    - The --resolve flag expands layer references and checks file existence
  - step: 3
    when: an error condition occurs
    then:
    - Missing files are reported but do not cause failure
  - step: 4
    when: the feature is used
    then:
    - Path resolution uses module-relative and repo-relative conventions
  - step: 5
    when: the feature is used
    then:
    - Layer expansion follows the Reference Layer Architecture
  related_commands:
  - agentic ctx inputs --role build-python
  - agentic ctx inputs --role planner-build --resolve
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-025
  title: Generate Thin-Client Agent File
  category: context_bootstrap
  priority: medium
  description: As a developer creating a new agent, I want to generate a minimal agent markdown file that uses CCI bootstrap,
    so that the agent self-initializes at runtime instead of embedding static context.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic context generate-agent <role-id> outputs a markdown agent file
  - step: 2
    when: the feature is used
    then:
    - The generated file includes bootstrap CLI calls in its initialization section
  - step: 3
    when: the feature is used
    then:
    - The --output flag saves the file to a specified path
  - step: 4
    when: the feature is used
    then:
    - The generated agent uses agentic agent context bootstrap for context loading
  related_commands:
  - agentic ctx generate-agent build-python
  - agentic ctx generate-agent planner-build --output agent.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
