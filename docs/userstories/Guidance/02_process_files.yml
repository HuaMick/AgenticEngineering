area: agent_context_compilation
description: 'How agent context (process.yml + inputs.yml + layers) is assembled and

  injected into a spawned agent session. Successor to US-GDN-010 (Process

  Context Model) and US-GDN-014 (Agent Inputs Structure), which were merged

  into a single story on 2026-04-07 as part of the Story-Writer UAT-First

  Restructure follow-up. Both predecessors are stub-deprecated; see

  US-GDN-010 and US-GDN-014 for traceability.

  '
stories:
- id: US-GDN-100
  title: Agent Context Compilation
  category: agent_context
  priority: critical
  lifecycle: implemented
  description: 'As a developer or agent operator, I want a single mechanic that compiles

    process.yml, inputs.yml, transitive layers, and ticket context into one

    markdown document injected into a spawned agent session, so that every

    agent receives a deterministic, fully-resolved context regardless of

    which entrypoint triggered the spawn.


    This is a CLI-owned story by the depender-owns rule: the only trigger

    is `agentic orchestrate session spawn` (or its programmatic equivalent

    in workflows/orchestration.py). The context-compilation service lives

    in modules/AgenticGuidance/ but it is consumed exclusively by CLI spawn

    paths.

    '
  prerequisites: []
  steps:
  - step: 1
    when: agentic orchestrate session spawn --role <agent> is invoked
    then:
    - The CLI calls _compile_spawn_context() in services/context.py with the agent
      role and current ticket id
    - The service reads modules/AgenticGuidance/agents/<category>/<role>/process.yml
      and inputs.yml as the two declarative inputs
  - step: 2
    when: process.yml is parsed
    then:
    - "The tripartite model is materialised into the compiled context \u2014 paths\
      \ (sequential workflow steps), fences (constraints on what NOT to do), and signposts\
      \ (conditional decision hints) \u2014 as three labelled markdown sections"
    - This is a non-obvious system choice; generic agent frameworks flatten steps
      and constraints into one structure
  - step: 3
    when: inputs.yml declares files or layers
    then:
    - Paths NOT starting with `docs/` are resolved against the AgenticGuidance module
      root
    - Paths starting with `docs/` are resolved against the target repository root
    - Path resolution is handled programmatically by _compile_spawn_context(); inputs.yml
      does not name absolute paths
  - step: 4
    when: inputs.yml references a layer under assets/inputs/
    then:
    - "The compiler loads the layer transitively \u2014 layers can reference other\
      \ layers \u2014 with explicit circular-dependency detection that fails the spawn\
      \ before launching the agent"
  - step: 5
    when: all inputs and layers are resolved
    then:
    - The compiler assembles process sections + resolved input file contents + the
      current ticket context into a single markdown document
    - The document is injected as the agent's first user message; agents do NOT read
      process.yml or inputs.yml at run time
  - step: 6
    when: process.yml or any referenced inputs.yml file is missing
    then:
    - "_compile_spawn_context() raises a clear \"context resolution failed\" error\
      \ naming the missing file; the spawn is aborted before tmux/SDK launch (degradation\
      \ contract \u2014 depender exits cleanly when the consumed asset is missing)"
  - step: 7
    when: a transitive layer reference resolves to a non-existent file
    then:
    - The same context-resolution error fires; the partial document is discarded and
      no agent is spawned (no half-loaded context ever reaches an agent)
  - step: 8
    when: process files and inputs files require maintenance
    then:
    - process.yml is maintained by the teacher-update-guidance agent
    - inputs.yml and assets/inputs/ layers are maintained by the teacher-update-assets
      agent
    - Agents that consume these files do NOT modify them (single-custodian rule prevents
      drift)
  uat_plan:
    persona: agent-blind-test
    starting_state: 'Fresh repo clone on main. ~/.agentic/sessions/ either empty or

      contains no session for the test role. Claude SDK or claude CLI is

      available on PATH.

      '
    preconditions: []
    journey:
    - step: 1
      action: Run `agentic -j agent context bootstrap --role build-python` (CCI bootstrap
        is the read-only inspection path of the same compiler)
      observe:
      - command exits 0
      - stdout JSON includes the compiled markdown sections (paths, fences, signposts)
        from build-python's process.yml
      - stdout JSON includes resolved file references from inputs.yml with absolute
        paths
    - step: 2
      action: Run `agentic -j agent context bootstrap --role nonexistent-role`
      observe:
      - command exits non-zero
      - stderr names the missing process.yml file by absolute path
      - no partial JSON is written to stdout (no half-loaded context)
    - step: 3
      action: Temporarily rename `modules/AgenticGuidance/assets/inputs/core-system.yml`
        (a layer referenced transitively by most agents) and re-run step 1
      observe:
      - command exits non-zero
      - stderr names `core-system.yml` as the missing layer
      - the error fires before any agent is launched
    success_signals:
    - "CCI bootstrap is the read-only mirror of the spawn-time compiler \u2014 both\
      \ call _compile_spawn_context()"
    - Missing process/input/layer files fail the spawn cleanly with a named-file error,
      not a partial context
    - The compiled document is the only thing an agent ever sees; no agent reads YAML
      at run time
    cleanup:
    - Restore any temporarily renamed asset files
  related_commands:
  - agentic orchestrate session spawn --role <agent>
  - agentic -j agent context bootstrap --role <agent>
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
  - modules/AgenticGuidance/src/agenticguidance/services/context.py
  - modules/AgenticGuidance/assets/inputs/
