area: process_files
description: "process.yml structure, paths/fences/signposts"
stories:
- id: US-GDN-010
  title: Process Context Model
  category: process_files
  priority: critical
  description: As an agent or developer understanding the system, I want to know how process.yml
    guidance is structured and compiled into agent context, so that I understand the execution
    guidance architecture.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Each agent has a process.yml defining its execution guidance
  - step: 2
    when: the feature is used
    then:
    - 'Process guidance uses a tripartite model: paths (sequential workflow steps), fences
      (constraints on what NOT to do), and signposts (conditional decision hints)'
  - step: 3
    when: the feature is used
    then:
    - This three-part model is specific to this system — generic agent frameworks typically
      flatten steps and constraints into one structure
  - step: 4
    when: the feature is used
    then:
    - _compile_spawn_context() in session.py programmatically reads process.yml and assembles
      it with inputs and ticket context into a single markdown document injected into the agent session
  - step: 5
    when: the feature is used
    then:
    - Process files are maintained by teacher-update-guidance agent, not by the agents that consume them
  related_agents:
  - teacher-update-guidance
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/context.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
