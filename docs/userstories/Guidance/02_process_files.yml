area: process_files
description: "process.yml structure, paths/fences/signposts"
stories:
- id: US-GDN-010
  title: Agent Process Guidance
  category: process_files
  priority: critical
  description: As a agent executing a task, I want to follow a structured process defined in process.yml, so that my work
    is consistent and follows established patterns.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Each agent has a process.yml defining step-by-step execution guidance
  - step: 2
    when: the feature is used
    then:
    - Process files include paths (sequential steps), fences (constraints), and signposts (decision hints)
  - step: 3
    when: the feature is used
    then:
    - Process files are versioned and maintained by teacher agents
  - step: 4
    when: the feature is used
    then:
    - agentic context bootstrap --role <id> retrieves the process.yml content
  - step: 5
    when: the feature is used
    then:
    - Process files are concise enough to fit in an agent's context window
  related_commands:
  - agentic context bootstrap --role planner-build
  related_agents:
  - teacher-update-guidance
  related_files:
  - modules/AgenticGuidance/agents/*/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-011
  title: Process File Structure
  category: process_files
  priority: high
  description: As a teacher agent creating process files, I want to structure process.yml consistently, so that agents can
    parse and follow guidance reliably.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Process includes: goal, steps, constraints, decision_points'
  - step: 2
    when: the feature is used
    then:
    - Steps are sequential and actionable
  - step: 3
    when: the feature is used
    then:
    - Constraints define boundaries (fences)
  - step: 4
    when: the feature is used
    then:
    - Decision points provide guidance (signposts)
  - step: 5
    when: the feature is used
    then:
    - Process is under 5KB for context efficiency
  related_agents:
  - teacher-update-guidance
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-012
  title: Process.yml for Complex Workflows
  category: process_files
  priority: medium
  description: As a agent executing complex workflow, I want to use process.yml for visual workflow representation, so that
    complex workflows are easier to understand.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Some agents use process.yml instead of process.yml
  - step: 2
    when: the feature is used
    then:
    - TinyDB phase records provides flowchart visualization of workflow
  - step: 3
    when: the feature is used
    then:
    - TinyDB phase records includes metadata for workflow execution
  - step: 4
    when: the feature is used
    then:
    - 'Example: orchestration-planning uses process.yml'
  related_agents:
  - orchestration-planning
  related_files: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-013
  title: Paths, Fences, and Signposts in Process Files
  category: process_files
  priority: critical
  description: As a agent using process.yml, I want to understand paths, fences, and signposts in guidance, so that I have
    clear direction without overconstraint.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Paths: Sequential steps through workflow (what to do)'
  - step: 2
    when: the feature is used
    then:
    - 'Fences: Boundaries constraining behavior (what NOT to do)'
  - step: 3
    when: the feature is used
    then:
    - 'Signposts: Directional hints for decisions (when X, consider Y)'
  - step: 4
    when: the feature is used
    then:
    - Process.yml balances guidance with agent autonomy
  - step: 5
    when: the feature is used
    then:
    - Guidance avoids overspecification
  related_files:
  - modules/AgenticGuidance/assets/definitions/path.yml
  - modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
