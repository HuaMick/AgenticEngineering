- id: US-GDN-043
  title: Definition Files for Stable Concepts
  category: assets
  priority: high
  description: As a agent learning about the system, I want to reference definition files that answer 'what is X', so that
    I understand stable concepts and terminology.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 42 definition files in assets/definitions/
  - step: 2
    when: the feature is used
    then:
    - Definitions are factual, stable, and objective
  - step: 3
    when: the feature is used
    then:
    - Definitions include examples and anti-examples
  - step: 4
    when: the feature is used
    then:
    - Definitions cross-reference related definitions
  - step: 5
    when: the feature is used
    then:
    - 'Key definitions: agent-categories, plans, agent-loops, rlm-patterns'
  related_files:
  - modules/AgenticGuidance/assets/definitions/
