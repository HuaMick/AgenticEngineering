area: input_files
description: "inputs.yml structure, path resolution, shared layers"
stories:
- id: US-GDN-014
  title: Agent Inputs Structure
  category: input_files
  priority: critical
  description: As an agent or developer understanding the system, I want to know how inputs.yml declares required
    context files, resolves paths, and reuses shared layers, so that agents load exactly the context they need.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Each agent has an inputs.yml declaring required file references
  - step: 2
    when: the feature is used
    then:
    - 'Input file structure includes: layers (shared configs), files (specific references)'
  - step: 3
    when: the feature is used
    then:
    - 'Files use location: path for file discovery, with reason: field explaining why needed'
  - step: 4
    when: the feature is used
    then:
    - Paths NOT starting with 'docs/' resolved against AgenticGuidance module root
  - step: 5
    when: the feature is used
    then:
    - Paths starting with 'docs/' resolved against target repository root
  - step: 6
    when: the feature is used
    then:
    - Path resolution is handled programmatically by _compile_spawn_context() in session.py
  - step: 7
    when: the feature is used
    then:
    - Layers reference shared input configs from assets/inputs/
  - step: 8
    when: the feature is used
    then:
    - 11 shared input configurations exist in assets/inputs/
  - step: 9
    when: the feature is used
    then:
    - 'Transitive loading: layers can reference other layers, with circular dependency prevention'
  - step: 10
    when: the feature is used
    then:
    - _compile_spawn_context() resolves all transitive layers programmatically before assembling agent context
  - step: 11
    when: the feature is used
    then:
    - 'Key layers: core-system.yml (architecture), core-guidelines.yml (principles), planner-shared.yml, test-shared.yml, deploy-shared.yml'
  - step: 12
    when: the feature is used
    then:
    - Shared inputs are created and maintained by teacher-update-assets agent
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/context.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
