area: input_files
description: "inputs.yml, path resolution, layers, validation"
stories:
- id: US-GDN-014
  title: Input File Declarations
  category: input_files
  priority: critical
  description: As a agent needing reference material, I want to have a declarative list of input files that I need for my
    work, so that I load exactly the context I need without over-fetching.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Each agent has an inputs.yml declaring required file references
  - step: 2
    when: the feature is used
    then:
    - 'Input files use location: paths for file discovery'
  - step: 3
    when: the feature is used
    then:
    - Paths are resolved as module-relative (not starting with docs/) or repo-relative (starting with docs/)
  - step: 4
    when: the feature is used
    then:
    - Layer references allow shared input configurations
  - step: 5
    when: the feature is used
    then:
    - agentic context bootstrap --role <id> retrieves resolved input content
  related_commands:
  - agentic context bootstrap --role build-python
  related_agents:
  - teacher-update-guidance
  related_files:
  - modules/AgenticGuidance/agents/*/inputs.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-015
  title: Input File Structure
  category: input_files
  priority: high
  description: As a developer creating inputs.yml, I want to structure inputs.yml consistently, so that context loading is
    predictable.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Inputs include: layers (shared configs), files (specific references)'
  - step: 2
    when: the feature is used
    then:
    - Layers reference shared input configs from assets/inputs/
  - step: 3
    when: the feature is used
    then:
    - 'Files use location: path for absolute or relative paths'
  - step: 4
    when: the feature is used
    then:
    - 'Files include reason: field explaining why needed'
  - step: 5
    when: the feature is used
    then:
    - 'Transitive loading: layers can reference other layers'
  related_files:
  - modules/AgenticGuidance/agents/*/inputs.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-016
  title: Path Resolution Convention
  category: input_files
  priority: high
  description: As a agent resolving file paths, I want to resolve paths consistently, so that files are discovered correctly.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Paths NOT starting with 'docs/' resolved against AgenticGuidance module root
  - step: 2
    when: the feature is used
    then:
    - Paths starting with 'docs/' resolved against target repository root
  - step: 3
    when: the feature is used
    then:
    - 'Module-relative: assets/definitions/plans.yml'
  - step: 4
    when: the feature is used
    then:
    - 'Repo-relative: docs/epics/live/260207XX_example/'
  - step: 5
    when: the feature is used
    then:
    - CLI resolves paths before returning to agent
  related_commands:
  - agentic context bootstrap --role <id>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-017
  title: Shared Input Layers
  category: reference_layers
  priority: high
  description: As a guidance maintainer reducing duplication, I want to define shared input layers that multiple agents reference,
    so that common context is maintained in one place instead of duplicated per agent.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Core System layer (core-system.yml) provides plan structure and architecture patterns
  - step: 2
    when: the feature is used
    then:
    - Core Guidelines layer (core-guidelines.yml) provides universal principles
  - step: 3
    when: the feature is used
    then:
    - Planner Core layers provide planner-specific context
  - step: 4
    when: the feature is used
    then:
    - Category-specific layers (planner-shared.yml, test-shared.yml, etc.) provide role context
  - step: 5
    when: the feature is used
    then:
    - Agents reference layers in their inputs.yml files
  - step: 6
    when: the feature is used
    then:
    - Layer changes propagate to all agents that reference them
  - step: 7
    when: the feature is used
    then:
    - 11 shared input configurations exist in assets/inputs/
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/assets/inputs/
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-018
  title: Context Minimization
  category: reference_layers
  priority: high
  description: As a agent operating within context window limits, I want to load only the context I need for my current task,
    so that I avoid context rot and maintain reasoning quality.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Agents load context via CCI bootstrap, not by reading all guidance files
  - step: 2
    when: the feature is used
    then:
    - 'Input layers are tiered: core (universal) -> category (role-specific) -> task (current work)'
  - step: 3
    when: the feature is used
    then:
    - Bootstrap returns only the relevant subset of guidance for the active role and task
  - step: 4
    when: the feature is used
    then:
    - Context usage can be estimated before session spawn
  - step: 5
    when: the feature is used
    then:
    - Large files are excluded from bootstrap and loaded on-demand
  related_commands:
  - agentic context bootstrap --role build-python
  related_agents:
  - orchestration-executor
  related_files:
  - modules/AgenticGuidance/assets/guidelines/context-minimisation.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-019
  title: Layer Transitive Loading
  category: reference_layers
  priority: medium
  description: As a guidance maintainer creating layers, I want to reference layers from other layers, so that layer composition
    is flexible.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Layer can include 'layers:' section referencing other layers
  - step: 2
    when: the feature is used
    then:
    - Transitive loading prevents circular dependencies
  - step: 3
    when: the feature is used
    then:
    - 'Example: planner-shared.yml references core-system.yml and core-guidelines.yml'
  - step: 4
    when: the feature is used
    then:
    - CLI resolves all transitive layers before returning content
  related_files:
  - modules/AgenticGuidance/assets/inputs/planner-shared.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-020
  title: Validate Input File References
  category: input_files
  priority: high
  description: As a developer maintaining agent guidance, I want to validate that all input file references resolve correctly,
    so that agents do not encounter broken paths at runtime.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic inputs validate checks all location paths
  - step: 2
    when: an error condition occurs
    then:
    - Reports missing files/broken refs/unresolvable paths
  - step: 3
    when: the feature is used
    then:
    - agentic inputs resolve shows resolved file list
  - step: 4
    when: the feature is used
    then:
    - Validation distinguishes module-relative vs repo-relative
  - step: 5
    when: the feature is used
    then:
    - Exit code 0 when valid
  related_commands:
  - agentic inputs validate <file>
  - agentic inputs resolve <file>
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
