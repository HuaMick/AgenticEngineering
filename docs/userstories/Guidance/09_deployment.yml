stories:
- id: US-GDN-084
  title: Main-First Worktree Pattern
  category: deployment
  priority: critical
  description: As a CLI user, I want to follow the main-first workflow where epic metadata
    lives in main and code development happens in feature worktrees, so that plans are visible
    to all developers before implementation begins.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Main-first workflow: epic folder created in main worktree BEFORE feature worktree
      is created for code development'
  - step: 2
    when: the feature is used
    then:
    - Plan and epic metadata are visible from main worktree for all developers — feature
      branches execute work against main-based state
  - step: 3
    when: the feature is used
    then:
    - Worktree-per-feature isolation — each feature gets its own worktree, preventing state
      pollution between concurrent agent work
  - step: 4
    when: the feature is used
    then:
    - Before worktree removal, system verifies branch merged to main and checks for uncommitted
      changes — prevents data loss in multi-agent environments
  related_commands:
  - git worktree add <path> -b <branch>
  - git worktree remove <path>
  related_agents: []
  related_files:
  - modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-089
  title: CI/CD Pre-Flight Validation Gates
  category: deployment
  priority: medium
  description: As a planner-audit or orchestration agent, I want to validate CI/CD infrastructure
    exists before planning CI/CD tasks, so that plans don't reference missing infrastructure.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Pre-flight validation: system checks that cloudbuild.yaml and Dockerfile.test exist
      BEFORE planning CI/CD tasks — proactive blocking, not fail-at-runtime'
  - step: 2
    when: the feature is used
    then:
    - Readiness check reads AgenticGuidance README Implementation Status — README metadata
      gates orchestration decisions
  - step: 3
    when: the feature is used
    then:
    - Plans requiring CI/CD are blocked if infrastructure is not ready — prevents planning
      agents from creating invalid task sequences
  related_agents:
  - deploy-cicd
  - planner-audit
  related_files:
  - modules/AgenticGuidance/agents/deploy/deploy-cicd/process.yml
  - modules/AgenticGuidance/README.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-097
  title: Phase-to-Agent Routing via TinyDB
  category: deployment
  priority: high
  description: As an orchestration-executor agent, I want to route phases to the correct agent
    using the TinyDB phase.agent field, so that routing is determined at plan time and executed
    without runtime detection — including deploy phases, tool offloading, and conditional routing.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Routing is static, not dynamic: phase.agent field in TinyDB is set at plan time by
      planner agents, NOT detected at runtime by executor'
  - step: 2
    when: the feature is used
    then:
    - ExecutionRunner reads phase.agent from TinyDB and spawns the specified agent directly —
      no if/else detection logic
  - step: 3
    when: the feature is used
    then:
    - 'Missing agent field causes immediate hard failure — no silent defaults or fallback
      agent selection'
  - step: 4
    when: the feature is used
    then:
    - Phase execution order determined by TinyDB _order field, enabling dynamic reordering
      without code changes — deploy phases execute alongside build phases with no fixed ordering
  - step: 5
    when: the feature is used
    then:
    - Build artifacts validated before proceeding to next phase — phase gates prevent cascading
      failures
  - step: 6
    when: the feature is used
    then:
    - 'Tool offloading: worktree and epic creation tasks are routed to CLI commands (agentic
      epic new) rather than agent reasoning — deterministic naming/structure, no agent variance'
  - step: 7
    when: the feature is used
    then:
    - 'Conditional routing: deploy-cicd agent is only routed to if CI/CD infrastructure is
      marked as implemented in README status'
  related_agents:
  - orchestration-executor
  - build-python
  - build-flutter
  - deploy-cicd
  related_files:
  - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
  - modules/AgenticGuidance/README.md
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
