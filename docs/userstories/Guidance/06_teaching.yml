- id: US-GDN-041
  title: Fix-the-Source Principle
  category: teaching
  priority: high
  description: As a teacher agent improving guidance, I want to address root causes rather than symptoms, so that guidance
    improvements are durable.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Identify why friction occurred, not just what happened
  - step: 2
    when: the feature is used
    then:
    - Update guidance at source rather than adding workarounds
  - step: 3
    when: the feature is used
    then:
    - Prefer upstream fixes (definitions, guidelines) over per-agent patches
  - step: 4
    when: the feature is used
    then:
    - Document rationale for guidance changes
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/assets/guidelines/fix-the-source.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-042
  title: Less-is-More Principle
  category: teaching
  priority: high
  description: As a teacher agent creating guidance, I want to create minimal sufficient guidance, so that agents have clarity
    without overwhelming detail.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Guidance is concise and actionable
  - step: 2
    when: the feature is used
    then:
    - Remove verbose explanations, keep essential information
  - step: 3
    when: the feature is used
    then:
    - Prefer examples over paragraphs of text
  - step: 4
    when: the feature is used
    then:
    - Avoid redundancy across guidance files
  - step: 5
    when: the feature is used
    then:
    - Use shared assets for common patterns
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
