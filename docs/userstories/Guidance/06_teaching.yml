- id: US-GDN-033
  title: Guidance Self-Review Loop
  category: teaching
  priority: high
  description: As a teacher-update-guidance agent, I want to validate my guidance updates through self-review, so that guidance
    improvements are validated before deployment.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - After updating guidance, run test-guidance-simulator
  - step: 2
    when: the feature is used
    then:
    - Identify any new ambiguities or gaps
  - step: 3
    when: the feature is used
    then:
    - Iterate on guidance until validation passes
  - step: 4
    when: the feature is used
    then:
    - Document guidance change rationale
  - step: 5
    when: the feature is used
    then:
    - Limit self-review loops to prevent infinite iteration
  related_agents:
  - teacher-update-guidance
  - test-guidance-simulator
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-GDN-034
  title: Concise Guidance Principle
  category: teaching
  priority: critical
  description: As a teacher-update-guidance agent, I want to keep guidance files concise and focused, so that agents can load
    guidance without context window overflow.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Process.yml files under 5KB each
  - step: 2
    when: the feature is used
    then:
    - Inputs.yml files reference shared layers, not duplicate content
  - step: 3
    when: the feature is used
    then:
    - Remove verbose explanations, keep actionable guidance
  - step: 4
    when: the feature is used
    then:
    - Use examples in assets/ for verbose content
  - step: 5
    when: the feature is used
    then:
    - Prefer CLI offloading over agent instructions
  related_agents:
  - teacher-update-guidance
  related_files:
  - modules/AgenticGuidance/assets/examples/teacher/concise.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
