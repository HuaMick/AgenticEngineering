area: teaching
description: "Asset types, organization, maintenance"
stories:
- id: US-GDN-035
  title: Asset Organization and Discovery
  category: teaching
  priority: high
  description: As an agent or developer understanding the system, I want to know how guidance
    assets are organized, indexed, and consumed by agents, so that I understand the asset
    routing architecture.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Four asset subdirectories in modules/AgenticGuidance/assets/: definitions/, guidelines/,
      examples/, specifications/'
  - step: 2
    when: the feature is used
    then:
    - Guidelines and examples are indexed via manifest.yml files for discovery (not filesystem scanning)
  - step: 3
    when: the feature is used
    then:
    - 'Examples are organized by agent category subdirectory: builder/, cleaner/, orchestration/,
      planner/, teacher/, test/'
  - step: 4
    when: the feature is used
    then:
    - Agents consume assets via inputs.yml layer references — _compile_spawn_context() resolves
      paths and injects content into agent sessions
  - step: 5
    when: the feature is used
    then:
    - teacher-update-assets agent is the sole custodian — it must update manifest.yml when
      adding or removing assets
  - step: 6
    when: the feature is used
    then:
    - Asset content is interchangeable (books can be added, removed, rewritten without changing
      the system) — the directory structure, indexing, and consumption pattern are the system mechanics
  related_agents:
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/src/agenticguidance/services/context.py
  - modules/AgenticCLI/src/agenticcli/commands/agent_help.py
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
