- id: US-GDN-040
  title: Paths, Fences, and Signposts
  category: teaching
  priority: critical
  description: As a teacher agent creating guidance, I want to provide paths, fences, and signposts in agent guidance, so
    that agents have clear direction without overconstraint.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - 'Paths: Sequential steps through workflow (process.yml)'
  - step: 2
    when: the feature is used
    then:
    - 'Fences: Boundaries constraining behavior (guidelines)'
  - step: 3
    when: the feature is used
    then:
    - 'Signposts: Directional hints for decisions (when X, consider Y)'
  - step: 4
    when: the feature is used
    then:
    - Balance between guidance and agent autonomy
  - step: 5
    when: the feature is used
    then:
    - Avoid overspecification that limits agent flexibility
  related_agents:
  - teacher-update-guidance
  - teacher-update-assets
  related_files:
  - modules/AgenticGuidance/assets/definitions/path.yml
  - modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml
