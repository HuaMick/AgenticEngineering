- id: US-GDN-030
  title: Update Agent Process Files
  category: teaching
  priority: critical
  description: As a teacher-update-guidance agent, I want to improve agent process.yml files based on observed agent behavior, so
    that agents have clearer paths, fences, and signposts.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - Identify areas for improvement from observed agent behavior
  - step: 2
    when: an error condition occurs
    then:
    - Update process.yml to add missing steps
  - step: 3
    when: the feature is used
    then:
    - Add fences to constrain unwanted behavior
  - step: 4
    when: the feature is used
    then:
    - Add signposts for decision points
  - step: 5
    when: the feature is used
    then:
    - Keep guidance concise (under 5KB per agent)
  - step: 6
    when: the feature is used
    then:
    - Validate guidance via test-guidance-simulator
  related_agents:
  - teacher-update-guidance
  - test-guidance-simulator
  related_files:
  - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
