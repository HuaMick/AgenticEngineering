area: state_management
description: "Process state registry inspection and cleanup"
stories:
- id: US-SES-006
  title: Process State Management
  category: state_management
  priority: medium
  description: As a developer debugging CLI operations, I want to inspect registered CLI processes and clean up stale
    records, so that I can track what operations are running, diagnose issues, and keep the state registry accurate.
  prerequisites: []
  inherits_patterns:
  - id: PAT-CLI-001
    bind:
      command: "agentic orchestrate debug state list"
      expected_keys: [pid, command, status, start_time]
  steps:
  - step: 1
    when: state is listed
    then:
    - agentic orchestrate debug state list shows all registered processes with PID, command, status, start time
    - The --active flag filters to show only running processes
    - Dead processes are automatically cleaned up on list
  - step: 2
    when: a specific process is inspected
    then:
    - agentic orchestrate debug state show <pid> displays full process details
    - Output includes command, args, cwd, environment
    - Start time, end time, and duration are shown
    - Exit code is displayed if process completed
  - step: 3
    when: completed records are cleared
    then:
    - agentic orchestrate debug state clear removes all completed process records
    - Active processes are not cleared unless --all is specified
  - step: 4
    when: all records are cleared
    then:
    - The --all flag removes all records including active processes
    - The --force flag skips confirmation prompt
  - step: 5
    when: dead records are cleaned
    then:
    - agentic orchestrate debug state cleanup removes dead process records
    - Process liveness is checked via PID
    - Count of cleaned processes is displayed
  related_commands:
  - agentic orchestrate debug state list
  - agentic orchestrate debug state list --active
  - agentic orchestrate debug state show 12345
  - agentic orchestrate debug state clear
  - agentic orchestrate debug state clear --all --force
  - agentic orchestrate debug state cleanup
  related_files:
  - modules/AgenticCLI/src/agenticcli/commands/state.py
  - modules/AgenticGuidance/src/agenticguidance/services/state.py
  related_agents: []
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
