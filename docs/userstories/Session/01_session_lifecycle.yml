area: session_lifecycle
description: "Session spawn, list, stop, and health"
stories:
- id: US-SES-001
  title: Spawn Claude Code Session
  category: session_management
  priority: critical
  description: As a developer or orchestration agent, I want to spawn a Claude Code session with a specific prompt, so that
    I can delegate work to a Claude Code instance programmatically.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic orchestrate session spawn --prompt <text> launches a Claude Code session
  - step: 2
    when: the feature is used
    then:
    - Foreground mode waits for completion and displays output
  - step: 3
    when: the feature is used
    then:
    - Background mode (--background) returns immediately with a session ID
  - step: 4
    when: the feature is used
    then:
    - The --max-turns flag limits the number of conversation turns
  - step: 5
    when: the feature is used
    then:
    - The --directory flag sets the working directory for the session
  - step: 6
    when: the feature is used
    then:
    - Session metadata is persisted to ~/.agentic/sessions/
  - step: 7
    when: the feature is used
    then:
    - Output logs are written to ~/.agentic/sessions/logs/
  related_commands:
  - agentic orchestrate session spawn --prompt 'Fix the tests' --background
  - agentic orchestrate session spawn -p 'Build feature' --max-turns 10
  related_agents:
  - orchestration-executor
  - orchestration-planning
  last_tested: '2026-02-27'
  test_status: passing
  test_notes: Validated by 260226SD SDK migration plan. Background sessions now use run_agent_sync() via SDK when available,
    recording transport=sdk, sdk_session_id, ended_at, and exit_code in session state. All 109 session command tests pass.
    Fallback to subprocess path when SDK unavailable also verified.
  tested_by_plan: 260226SD_migrate_sessions_to_sdk
- id: US-SES-002
  title: List and Monitor Sessions
  category: session_management
  priority: high
  description: As a developer managing multiple agents, I want to see all active and past Claude Code sessions, so that I
    can monitor progress and identify completed or stuck sessions.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic orchestrate session list shows all tracked sessions with status, PID, start time
  - step: 2
    when: the feature is used
    then:
    - The --active flag filters to running sessions only
  - step: 3
    when: an error condition occurs
    then:
    - 'Session status includes: running, completed, failed, stopped'
  - step: 4
    when: the feature is used
    then:
    - JSON output is supported for scripting
  - step: 5
    when: the feature is used
    then:
    - Prompt summary is truncated for readability
  related_commands:
  - agentic orchestrate session list
  - agentic orchestrate session list --active
  last_tested: '2026-02-27'
  test_status: passing
  test_notes: Validated by 260226SD SDK migration plan. Session list, status, and monitoring all continue to work correctly
    after SDK migration. State is persisted to TinyDB/YAML via StateStore. All 109 session command tests pass.
  tested_by_plan: 260226SD_migrate_sessions_to_sdk
- id: US-SES-003
  title: Stop Running Session
  category: session_management
  priority: high
  description: As a developer needing to cancel a session, I want to gracefully or forcefully stop a running Claude Code session,
    so that I can free resources or restart a stuck session.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic orchestrate session stop <id> sends SIGTERM for graceful shutdown
  - step: 2
    when: the feature is used
    then:
    - The --force flag sends SIGKILL for immediate termination
  - step: 3
    when: the feature is used
    then:
    - Partial session ID matching is supported
  - step: 4
    when: an error condition occurs
    then:
    - Stop is idempotent (stopping an already stopped session does not error)
  - step: 5
    when: the feature is used
    then:
    - Session metadata is updated to reflect stopped status
  related_commands:
  - agentic orchestrate session stop <id>
  - agentic orchestrate session stop <id> --force
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-SES-004
  title: Inspect Session Health and Logs
  category: session_management
  priority: medium
  description: As a developer debugging a session, I want to check the health of a specific session and view its logs, so
    that I can understand what the session did and diagnose issues.
  prerequisites: []
  steps:
  - step: 1
    when: the feature is used
    then:
    - agentic orchestrate health <id> shows health signals and verdict
  - step: 2
    when: the feature is used
    then:
    - The --diagnose flag auto-spawns a diagnostic planner for unhealthy sessions
  - step: 3
    when: an error condition occurs
    then:
    - Without --diagnose, healthcheck is purely read-only
  - step: 4
    when: the feature is used
    then:
    - agentic orchestrate debug logs <id> shows stdout log output
  - step: 5
    when: the feature is used
    then:
    - The --stderr flag shows stderr instead
  - step: 6
    when: the feature is used
    then:
    - The -n flag limits the number of lines shown
  - step: 7
    when: the feature is used
    then:
    - JSON output includes all fields for programmatic access
  related_commands:
  - agentic orchestrate health <id>
  - agentic orchestrate health <id> --diagnose
  - agentic orchestrate debug logs <id>
  - agentic orchestrate debug logs <id> --stderr -n 100
  last_tested: '2026-02-26'
  test_status: passing
  test_notes: Validated via 260224SC_session_cli_cleanup plan - health renamed to healthcheck, --diagnose flag gates auto-spawn.
    1553 tests passing.
  tested_by_plan: 260224SC_session_cli_cleanup
