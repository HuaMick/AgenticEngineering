area: session_lifecycle
description: "Session spawn, list, stop, health, and debug logs"
stories:
- id: US-SES-001
  title: Session Lifecycle
  category: session_management
  priority: critical
  description: As a developer or orchestration agent, I want to spawn, monitor, stop, and debug Claude Code sessions,
    so that I can manage the full lifecycle of delegated work programmatically.
  prerequisites: []
  inherits_patterns:
  - id: PAT-AGT-001
    bind:
      agent_role: "any (user-specified via --role or implicit)"
      spawn_method: "sdk-tmux with subprocess fallback"
  - id: PAT-CLI-001
    bind:
      command: "agentic orchestrate session list"
      expected_keys: [session_id, status, pid, start_time, prompt]
  - id: PAT-CLI-001
    bind:
      command: "agentic orchestrate health / agentic orchestrate debug logs"
      expected_keys: [health_verdict, signals, log_lines]
  steps:
  - step: 1
    when: a session is spawned
    then:
    - agentic orchestrate session spawn --prompt <text> launches a Claude Code session
    - Foreground mode waits for completion and displays output
    - Background mode (--background) returns immediately with a session ID
  - step: 2
    when: spawn options are specified
    then:
    - The --max-turns flag limits the number of conversation turns
    - The --directory flag sets the working directory for the session
  - step: 3
    when: a session is spawned
    then:
    - Session metadata is persisted to ~/.agentic/sessions/
    - Output logs are written to ~/.agentic/sessions/logs/
  - step: 4
    when: sessions are listed
    then:
    - agentic orchestrate session list shows all tracked sessions with status, PID, start time
    - By default only active sessions are shown; the --all flag includes completed sessions
    - The --type flag filters by type (session, loop, orchestration)
    - Prompt summary is truncated for readability
  - step: 5
    when: session status is inspected
    then:
    - "Session status includes: running, completed, failed, stopped"
  - step: 6
    when: a session is stopped
    then:
    - agentic orchestrate session stop <id> sends SIGTERM for graceful shutdown
    - The --force flag sends SIGKILL for immediate termination
    - Partial session ID matching is supported
  - step: 7
    when: a stopped session is stopped again
    then:
    - Stop is idempotent (stopping an already stopped session does not error)
    - Session metadata is updated to reflect stopped status
  - step: 8
    when: session health is checked
    then:
    - agentic orchestrate health <id> shows health signals and verdict
    - Without --diagnose, healthcheck is purely read-only
    - The --diagnose flag auto-spawns a diagnostic planner for unhealthy sessions
  - step: 9
    when: session logs are inspected
    then:
    - agentic orchestrate debug logs <id> shows stdout log output
    - The --stderr flag shows stderr instead
    - The -n flag limits the number of lines shown
  - step: 10
    when: JSON output is requested
    then:
    - JSON output includes all fields for programmatic access
  related_commands:
  - agentic orchestrate session spawn --prompt 'Fix the tests' --background
  - agentic orchestrate session spawn -p 'Build feature' --max-turns 10
  - agentic orchestrate session list
  - agentic orchestrate session list --all
  - agentic orchestrate session stop <id>
  - agentic orchestrate session stop <id> --force
  - agentic orchestrate health <id>
  - agentic orchestrate health <id> --diagnose
  - agentic orchestrate debug logs <id>
  - agentic orchestrate debug logs <id> --stderr -n 100
  related_agents:
  - orchestration-executor
  - orchestration-planning
  last_tested: '2026-02-27'
  test_status: passing
  test_notes: >
    Merged from US-SES-001 through US-SES-004. SES-001 validated by 260226SD SDK migration plan
    (background sessions use run_agent_sync() via SDK, all 109 session command tests pass).
    SES-002 validated by same plan (session list, status, monitoring work after SDK migration).
    SES-004 validated via 260224SC_session_cli_cleanup plan (health renamed to healthcheck,
    --diagnose flag gates auto-spawn, 1553 tests passing).
  tested_by_plan: 260226SD_migrate_sessions_to_sdk
