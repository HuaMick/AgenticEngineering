# User Stories: Plan Visualization
# Covers plan display, task tracking, and phase monitoring

stories:
  # ============================================================================
  # PLAN OVERVIEW
  # ============================================================================

  - id: "US-FE-060"
    title: "Display Active Plan Overview"
    category: "plan_visualization"
    priority: "high"
    as_a: "developer monitoring a plan execution"
    i_want: "to see the current plan at a glance"
    so_that: "I understand what's being worked on and what remains"
    acceptance_criteria:
      - "Plan name and description are displayed"
      - "Overall progress percentage is shown"
      - "Task counts by status (pending, in_progress, completed)"
      - "Current phase is highlighted"
      - "Plan metadata (creation date, worktree) is visible"
      - "Refreshes automatically as plan progresses"
    related_components:
      - "frontend: PlanOverview"
      - "frontend: PlanCard"
      - "backend: PlanService"

  - id: "US-FE-061"
    title: "Visual Progress Indicators"
    category: "plan_visualization"
    priority: "high"
    as_a: "user checking plan status"
    i_want: "visual progress bars and indicators"
    so_that: "I can quickly assess completion without reading details"
    acceptance_criteria:
      - "Progress bar shows overall task completion"
      - "Phase-level progress bars for each phase"
      - "Color coding for status (green=complete, blue=active, gray=pending)"
      - "Percentage labels on progress bars"
      - "Animated transitions when progress updates"
      - "Mini progress indicator in session dashboard"
    related_components:
      - "frontend: ProgressBar"
      - "frontend: PlanOverview"

  - id: "US-FE-062"
    title: "Plan Phase Breakdown"
    category: "plan_visualization"
    priority: "high"
    as_a: "user reviewing plan structure"
    i_want: "to see all phases and their tasks"
    so_that: "I understand the plan organization and flow"
    acceptance_criteria:
      - "Phases displayed in execution order"
      - "Each phase shows name, description, status"
      - "Task count per phase"
      - "Expandable/collapsible phase sections"
      - "Current phase is visually emphasized"
      - "Completed phases are visually de-emphasized"
    related_components:
      - "frontend: PhaseList"
      - "frontend: PhaseCard"

  # ============================================================================
  # TASK VISUALIZATION
  # ============================================================================

  - id: "US-FE-063"
    title: "Display Task List"
    category: "plan_visualization"
    priority: "high"
    as_a: "user tracking individual tasks"
    i_want: "to see all tasks with their details"
    so_that: "I can monitor granular progress"
    acceptance_criteria:
      - "Tasks shown in a structured list or kanban view"
      - "Each task displays ID, name, status, phase"
      - "Tasks grouped by phase or status (configurable)"
      - "Current task is highlighted"
      - "Filter tasks by status or phase"
      - "Search tasks by name or ID"
    related_components:
      - "frontend: TaskList"
      - "frontend: TaskCard"
      - "backend: TaskService"

  - id: "US-FE-064"
    title: "Task Detail View"
    category: "plan_visualization"
    priority: "medium"
    as_a: "user needing task specifics"
    i_want: "to view full task details in a modal or panel"
    so_that: "I can review guidance and acceptance criteria"
    acceptance_criteria:
      - "Click task opens detail view"
      - "Shows task description, guidance, success criteria"
      - "Displays related agents and commands"
      - "Shows task history (started at, completed at)"
      - "Links to related documentation or files"
      - "Close detail view returns to list"
    related_components:
      - "frontend: TaskDetail"
      - "frontend: TaskModal"

  - id: "US-FE-065"
    title: "Task Status Timeline"
    category: "plan_visualization"
    priority: "medium"
    as_a: "user reviewing task history"
    i_want: "to see when tasks changed status"
    so_that: "I can understand the pace of progress"
    acceptance_criteria:
      - "Timeline shows task status transitions"
      - "Each transition includes timestamp"
      - "Transitions grouped by day"
      - "Visual timeline with status indicators"
      - "Hover shows transition details"
      - "Export timeline as report"
    related_components:
      - "frontend: TaskTimeline"
      - "frontend: PlanOverview"

  # ============================================================================
  # INTERACTIVE PLAN UPDATES
  # ============================================================================

  - id: "US-FE-066"
    title: "Real-Time Plan Updates"
    category: "plan_visualization"
    priority: "high"
    as_a: "user monitoring active execution"
    i_want: "the plan view to update automatically"
    so_that: "I see changes as they happen without refreshing"
    acceptance_criteria:
      - "WebSocket updates trigger plan refresh"
      - "Task status changes reflect immediately"
      - "Progress bars animate smoothly"
      - "No page refresh required"
      - "Updates are atomic (no partial states)"
      - "Optimistic UI updates with rollback on error"
    related_components:
      - "frontend: PlanController"
      - "frontend: WebSocketService"
      - "backend: PlanEventStream"

  - id: "US-FE-067"
    title: "Task Completion Animations"
    category: "plan_visualization"
    priority: "low"
    as_a: "user watching plan execution"
    i_want: "visual feedback when tasks complete"
    so_that: "progress feels tangible and rewarding"
    acceptance_criteria:
      - "Task completion triggers checkmark animation"
      - "Progress bar updates smoothly"
      - "Subtle notification sound (optional)"
      - "Completed task moves to completed section"
      - "Animation doesn't block UI interaction"
      - "Can disable animations in settings"
    related_components:
      - "frontend: TaskCard"
      - "frontend: AnimationService"

  # ============================================================================
  # PLAN COMPARISON AND HISTORY
  # ============================================================================

  - id: "US-FE-068"
    title: "View Historical Plans"
    category: "plan_visualization"
    priority: "medium"
    as_a: "developer reviewing past work"
    i_want: "to view completed and archived plans"
    so_that: "I can reference previous decisions and outcomes"
    acceptance_criteria:
      - "List of completed plans accessible from dashboard"
      - "Completed plans show final status and duration"
      - "Can view full plan details for archived plans"
      - "Plans are read-only (no editing)"
      - "Filter by date range or project"
      - "Search completed plans by name"
    related_components:
      - "frontend: PlanArchive"
      - "frontend: PlanList"
      - "backend: PlanService"

  - id: "US-FE-069"
    title: "Plan Comparison View"
    category: "plan_visualization"
    priority: "low"
    as_a: "developer analyzing plan evolution"
    i_want: "to compare multiple plans side-by-side"
    so_that: "I can see how approaches differ"
    acceptance_criteria:
      - "Select two plans to compare"
      - "Side-by-side view of plan structures"
      - "Highlight differences in tasks and phases"
      - "Compare task counts and completion rates"
      - "Export comparison as report"
      - "Works with both active and archived plans"
    related_components:
      - "frontend: PlanComparison"
      - "frontend: DiffViewer"

  # ============================================================================
  # PLAN NAVIGATION
  # ============================================================================

  - id: "US-FE-070"
    title: "Plan-Session Linkage"
    category: "plan_visualization"
    priority: "high"
    as_a: "user with multiple sessions and plans"
    i_want: "to see which plan is active in each session"
    so_that: "I can navigate between related session and plan views"
    acceptance_criteria:
      - "Session card shows active plan name"
      - "Click plan name navigates to plan view"
      - "Plan view shows associated session"
      - "Click session link returns to terminal"
      - "Sessions without plans show 'No active plan'"
      - "Plan view accessible even if session disconnected"
    related_components:
      - "frontend: SessionCard"
      - "frontend: PlanOverview"
      - "frontend: Navigation"

  - id: "US-FE-071"
    title: "Breadcrumb Navigation"
    category: "plan_visualization"
    priority: "medium"
    as_a: "user navigating between views"
    i_want: "breadcrumb navigation showing current context"
    so_that: "I always know where I am and can navigate back"
    acceptance_criteria:
      - "Breadcrumbs show: Dashboard > Session > Plan > Task"
      - "Each breadcrumb level is clickable"
      - "Current level is highlighted"
      - "Breadcrumbs update automatically on navigation"
      - "Mobile-friendly (collapse if needed)"
      - "Breadcrumbs persist during page reloads"
    related_components:
      - "frontend: Breadcrumbs"
      - "frontend: Navigation"

  # ============================================================================
  # PLAN VISUALIZATION MODES
  # ============================================================================

  - id: "US-FE-072"
    title: "Kanban Board View"
    category: "plan_visualization"
    priority: "medium"
    as_a: "user who prefers visual task management"
    i_want: "to view tasks in a kanban board layout"
    so_that: "I can see workflow stages visually"
    acceptance_criteria:
      - "Columns for Pending, In Progress, Completed"
      - "Tasks displayed as cards in appropriate columns"
      - "Drag-and-drop to change status (if edit enabled)"
      - "Swimlanes for phases (optional)"
      - "Card shows task name, ID, assigned agent"
      - "Toggle between list and kanban views"
    related_components:
      - "frontend: KanbanBoard"
      - "frontend: TaskCard"

  - id: "US-FE-073"
    title: "Gantt Chart Visualization"
    category: "plan_visualization"
    priority: "low"
    as_a: "project manager tracking timelines"
    i_want: "to view plan tasks as a Gantt chart"
    so_that: "I can understand dependencies and timeline"
    acceptance_criteria:
      - "Tasks displayed on timeline by start/end dates"
      - "Dependencies shown as arrows between tasks"
      - "Phases shown as groupings"
      - "Current time indicator on chart"
      - "Zoom in/out on timeline"
      - "Export as image or PDF"
    related_components:
      - "frontend: GanttChart"
      - "frontend: TimelineView"

  - id: "US-FE-074"
    title: "Dependency Graph"
    category: "plan_visualization"
    priority: "low"
    as_a: "developer understanding task relationships"
    i_want: "to see task dependencies as a graph"
    so_that: "I can identify critical paths and blockers"
    acceptance_criteria:
      - "Tasks shown as nodes in directed graph"
      - "Dependencies shown as edges"
      - "Current task highlighted"
      - "Completed tasks grayed out"
      - "Click node to view task details"
      - "Graph auto-layouts for clarity"
    related_components:
      - "frontend: DependencyGraph"
      - "frontend: GraphView"
