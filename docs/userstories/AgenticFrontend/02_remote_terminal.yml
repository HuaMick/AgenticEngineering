stories:
- id: US-FE-020
  title: Display Remote Terminal Output
  category: remote_terminal
  priority: critical
  as_a: user viewing a Claude Code session
  i_want: to see the terminal output in real-time
  so_that: I can monitor what Claude is doing
  acceptance_criteria:
  - Terminal output is displayed as it is received
  - ANSI color codes are rendered correctly
  - Unicode characters display properly
  - Terminal auto-scrolls to show latest output
  - Scrollback buffer retains recent history
  - Terminal is responsive with minimal latency
  related_components:
  - 'frontend: TerminalView'
  - 'frontend: TerminalController'
  - 'frontend: xterm integration'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-021
  title: Terminal Input Handling
  category: remote_terminal
  priority: critical
  as_a: user interacting with the session
  i_want: to send keyboard input to the remote terminal
  so_that: I can respond to prompts and control Claude
  acceptance_criteria:
  - Keyboard input is captured and sent to backend
  - Special keys (Enter, Tab, Ctrl sequences) work correctly
  - Input is encrypted before transmission
  - Input echo is handled by remote terminal, not locally
  - Copy/paste operations work correctly
  - Terminal maintains focus state properly
  related_components:
  - 'frontend: TerminalInput'
  - 'frontend: CryptoService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-022
  title: Terminal Emulation Fidelity
  category: remote_terminal
  priority: high
  as_a: user running complex CLI tools
  i_want: the terminal to accurately emulate VT100/xterm behavior
  so_that: tools like vim, tmux, and progress bars render correctly
  acceptance_criteria:
  - Cursor positioning works correctly
  - Screen clearing and line editing work
  - Progress bars and spinners render properly
  - Terminal resize is supported
  - Terminal size is communicated to backend
  - Common terminal applications display correctly
  related_components:
  - 'frontend: xterm.js'
  - 'backend: PTY manager'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-023
  title: Clear Terminal Screen
  category: remote_terminal
  priority: medium
  as_a: user with a cluttered terminal
  i_want: to clear the terminal display
  so_that: I can focus on new output
  acceptance_criteria:
  - Clear button/shortcut clears visible terminal
  - Scrollback history is preserved
  - Clear only affects local display, not remote state
  - Ctrl+L shortcut works as expected
  - Clear action is reversible via scroll
  related_components:
  - 'frontend: TerminalView'
  - 'frontend: TerminalControls'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-024
  title: Search Terminal History
  category: remote_terminal
  priority: medium
  as_a: user looking for specific output
  i_want: to search the terminal scrollback buffer
  so_that: I can find errors or specific log entries
  acceptance_criteria:
  - Search input box overlays terminal
  - Search highlights matches in scrollback
  - Next/previous navigation between matches
  - Case-sensitive and case-insensitive options
  - Regex search support (optional)
  - Search persists during new output
  related_components:
  - 'frontend: TerminalSearch'
  - 'frontend: xterm-addon-search'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-025
  title: Copy Terminal Content
  category: remote_terminal
  priority: high
  as_a: user needing to extract output
  i_want: to select and copy terminal text
  so_that: I can paste it into other applications
  acceptance_criteria:
  - Mouse selection works like native terminal
  - Ctrl+C / Cmd+C copies selected text
  - Copy preserves line breaks and formatting
  - Double-click selects word, triple-click selects line
  - Copy works on both visible and scrollback content
  - Selected text is copied to system clipboard
  related_components:
  - 'frontend: TerminalView'
  - 'frontend: xterm.js selection'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-026
  title: Preserve Terminal State on Reconnect
  category: remote_terminal
  priority: high
  as_a: user who was disconnected
  i_want: the terminal to restore to its previous state on reconnect
  so_that: I don't lose context when my connection drops
  acceptance_criteria:
  - Backend buffers terminal state during disconnection
  - On reconnect, full terminal state is restored
  - Scrollback history is preserved
  - Cursor position is maintained
  - Running commands continue without interruption
  - User sees indicator of reconnection
  related_components:
  - 'backend: TerminalBuffer'
  - 'frontend: ConnectionManager'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-027
  title: Terminal Size Synchronization
  category: remote_terminal
  priority: high
  as_a: user resizing the browser window
  i_want: the remote terminal to resize accordingly
  so_that: output formatting matches my window size
  acceptance_criteria:
  - Frontend detects terminal size changes
  - Size change (rows, cols) is sent to backend
  - Backend PTY is resized to match
  - Running applications adapt to new size
  - Size sync happens on initial connection
  - Size changes are smooth without flickering
  related_components:
  - 'frontend: TerminalView'
  - 'backend: PTY manager'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-028
  title: Customize Terminal Appearance
  category: remote_terminal
  priority: low
  as_a: user with visual preferences
  i_want: to customize terminal colors and font
  so_that: the terminal is comfortable for extended viewing
  acceptance_criteria:
  - Color scheme can be changed (light/dark themes)
  - Font size is adjustable
  - Font family can be customized
  - Settings persist across sessions
  - Preview shows changes in real-time
  - Reset to defaults option available
  related_components:
  - 'frontend: TerminalSettings'
  - 'frontend: ThemeManager'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-029
  title: Terminal Scrollback Limits
  category: remote_terminal
  priority: low
  as_a: user managing memory usage
  i_want: to configure scrollback buffer size
  so_that: I can balance history retention with performance
  acceptance_criteria:
  - Scrollback line limit is configurable
  - Default is reasonable (e.g., 10,000 lines)
  - Oldest lines are discarded when limit reached
  - Setting takes effect immediately
  - Large buffers show performance warning
  - Option to disable scrollback for performance
  related_components:
  - 'frontend: TerminalSettings'
  - 'frontend: xterm.js options'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-030
  title: Interrupt Running Commands
  category: remote_terminal
  priority: high
  as_a: user who needs to stop a command
  i_want: to send Ctrl+C to interrupt execution
  so_that: I can stop runaway processes
  acceptance_criteria:
  - Ctrl+C key combination is captured
  - Interrupt signal is sent to backend
  - Backend forwards signal to PTY
  - Running command receives SIGINT
  - Terminal shows command interruption
  - Multiple Ctrl+C presses work as expected
  related_components:
  - 'frontend: TerminalInput'
  - 'backend: PTY manager'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-031
  title: Paste Multi-Line Commands
  category: remote_terminal
  priority: medium
  as_a: user pasting code or scripts
  i_want: to paste multi-line content safely
  so_that: I don't accidentally execute incomplete commands
  acceptance_criteria:
  - Paste is detected for multi-line content
  - Warning shown for content with newlines
  - User can review before sending
  - Option to paste without confirmation
  - Large pastes are chunked to avoid overflow
  - Paste preserves formatting and indentation
  related_components:
  - 'frontend: TerminalInput'
  - 'frontend: PasteHandler'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-032
  title: Terminal Link Detection
  category: remote_terminal
  priority: low
  as_a: user seeing URLs in output
  i_want: clickable links in the terminal
  so_that: I can open URLs without copy-pasting
  acceptance_criteria:
  - URLs are automatically detected in output
  - Links are underlined on hover
  - Click opens URL in new browser tab
  - File paths are detected and linkified (if applicable)
  - Links are visually distinct but not distracting
  - Ctrl+Click for alternative link behavior
  related_components:
