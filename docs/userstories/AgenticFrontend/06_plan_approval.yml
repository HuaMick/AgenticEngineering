stories:
- id: US-FE-100
  title: Review Generated Epic
  category: epic_approval
  priority: high
  as_a: developer receiving a generated epic
  i_want: to review the epic before execution starts
  so_that: I can verify it meets requirements and makes sense
  acceptance_criteria:
  - Epic is displayed in readable format
  - All phases and tickets are visible
  - Agent assignments are shown
  - Acceptance criteria for each ticket displayed
  - Orchestration flow is visualized
  - Epic metadata (description, goals) is shown
  related_components:
  - 'frontend: EpicReviewView'
  - 'frontend: EpicApprovalModal'
  - 'backend: EpicService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-101
  title: Approve or Reject Epic
  category: epic_approval
  priority: high
  as_a: developer reviewing an epic
  i_want: to approve or reject the epic with feedback
  so_that: execution only proceeds with my consent
  acceptance_criteria:
  - Clear approve/reject buttons
  - Rejection requires reason/feedback
  - Approval confirms readiness to execute
  - Decision is sent to backend/CLI
  - Approval state persists in epic metadata
  - Notification sent to session on decision
  related_commands:
  - agentic epic approve <epic-id>
  - agentic epic reject <epic-id> --reason <text>
  related_components:
  - 'frontend: ApprovalControls'
  - 'backend: EpicApprovalService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-102
  title: Request Epic Revisions
  category: epic_approval
  priority: high
  as_a: developer with concerns about the epic
  i_want: to request specific changes before approving
  so_that: the epic is refined to meet my needs
  acceptance_criteria:
  - Revision request form with specific feedback fields
  - Can flag specific tickets or phases for revision
  - Suggested changes can be entered
  - Request is sent back to planning agent
  - Epic status changes to 'revision requested'
  - User notified when revised epic is ready
  related_components:
  - 'frontend: RevisionRequestForm'
  - 'frontend: EpicReviewView'
  - 'backend: EpicService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-103
  title: Edit Ticket Descriptions
  category: epic_approval
  priority: medium
  as_a: developer reviewing tickets
  i_want: to edit ticket descriptions inline
  so_that: I can clarify or correct without full rejection
  acceptance_criteria:
  - Click ticket description to enter edit mode
  - Changes are saved to epic YAML
  - Validation prevents invalid changes
  - Confirmation before saving major edits
  - Edit history is tracked
  - Can revert individual edits
  related_components:
  - 'frontend: TicketEditor'
  - 'frontend: InlineEdit'
  - 'backend: EpicService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-104
  title: Add or Remove Tickets
  category: epic_approval
  priority: medium
  as_a: developer customizing the epic
  i_want: to add new tickets or remove unnecessary ones
  so_that: the epic reflects my priorities
  acceptance_criteria:
  - Add ticket button creates new ticket entry
  - Ticket form includes description, phase, priority
  - Remove ticket shows confirmation dialog
  - Changes update epic YAML atomically
  - Ticket IDs are auto-generated if not provided
  - Changes marked as 'user-modified'
  related_components:
  - 'frontend: TicketManager'
  - 'frontend: EpicReviewView'
  - 'backend: TicketService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-105
  title: Reorder Tickets and Phases
  category: epic_approval
  priority: medium
  as_a: developer optimizing execution order
  i_want: to drag-and-drop tickets and phases into different order
  so_that: the epic executes in my preferred sequence
  acceptance_criteria:
  - Drag-and-drop interface for tickets within phases
  - Drag phases to reorder them
  - Visual feedback during drag
  - Changes save automatically
  - Orchestration MMD regenerated on reorder
  - Undo option for accidental reorders
  related_components:
  - 'frontend: DragDropManager'
  - 'frontend: TicketList'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-106
  title: Multi-Stage Approval
  category: epic_approval
  priority: low
  as_a: team lead managing approvals
  i_want: to require multiple approvals for epics
  so_that: critical epics are reviewed by multiple stakeholders
  acceptance_criteria:
  - Configure required approver count
  - Each approver sees approval status of others
  - Epic execution blocked until all approve
  - Approvers can be assigned specific roles
  - Email/notification sent to approvers
  - Approval history tracked with timestamps
  related_components:
  - 'frontend: ApprovalWorkflow'
  - 'backend: ApprovalService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-107
  title: Conditional Approval
  category: epic_approval
  priority: low
  as_a: developer with partial concerns
  i_want: to approve with conditions or notes
  so_that: I can greenlight execution while flagging caveats
  acceptance_criteria:
  - Approve button has 'approve with conditions' option
  - Conditions entered as structured notes
  - Executor agent sees conditions during execution
  - Conditions can be ticket-specific or epic-wide
  - Conditions are tracked in approval metadata
  - Can mark conditions as addressed
  related_components:
  - 'frontend: ConditionalApproval'
  - 'frontend: ApprovalControls'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-108
  title: Pause Execution
  category: epic_approval
  priority: high
  as_a: user monitoring execution
  i_want: to pause the workflow at any time
  so_that: I can intervene if something goes wrong
  acceptance_criteria:
  - Pause button prominently displayed during execution
  - Current ticket completes before pausing
  - Status changes to 'paused by user'
  - Pause reason can be entered (optional)
  - Resume button available when paused
  - Backend respects pause state
  related_commands:
  - agentic session pause
  - agentic session resume
  related_components:
  - 'frontend: ExecutionControls'
  - 'backend: OrchestrationService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-109
  title: Cancel Execution
  category: epic_approval
  priority: high
  as_a: user needing to stop execution
  i_want: to cancel the workflow permanently
  so_that: I can prevent further actions
  acceptance_criteria:
  - Cancel button with confirmation dialog
  - Cancellation reason required
  - In-progress ticket is interrupted
  - Status changes to 'cancelled'
  - Cancellation cannot be undone
  - Session remains active but workflow stops
  related_commands:
  - agentic session cancel
  related_components:
  - 'frontend: ExecutionControls'
  - 'backend: OrchestrationService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-110
  title: Skip Current Ticket
  category: epic_approval
  priority: medium
  as_a: user with manual override needs
  i_want: to skip the current ticket and move to the next
  so_that: I can bypass problematic tickets
  acceptance_criteria:
  - Skip button available during ticket execution
  - Confirmation dialog warns of consequences
  - Skip reason is logged
  - Ticket status set to 'skipped'
  - Workflow advances to next ticket
  - Skipped tickets are visible in history
  related_commands:
  - agentic epic ticket skip <id>
  related_components:
  - 'frontend: TicketControls'
  - 'backend: TicketService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-111
  title: Approval Request Notifications
  category: epic_approval
  priority: high
  as_a: developer needing to approve epics
  i_want: to be notified when approval is needed
  so_that: I don't delay execution unnecessarily
  acceptance_criteria:
  - Browser notification when epic awaits approval
  - Email notification option (configurable)
  - In-app notification badge on sessions list
  - Notification includes epic name and summary
  - Click notification navigates to approval view
  - Reminder notification if not acted upon
  related_components:
  - 'frontend: NotificationService'
  - 'backend: ApprovalService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-112
  title: Approval Status Dashboard
  category: epic_approval
  priority: medium
  as_a: team lead tracking approvals
  i_want: a dashboard showing pending approvals
  so_that: I can see what needs review across all projects
  acceptance_criteria:
  - List of epics awaiting approval
  - Shows epic name, requester, time pending
  - Filter by project or epic type
  - Sort by urgency or date
  - Bulk approve option (with caution)
  - Click epic opens approval view
  related_components:
  - 'frontend: ApprovalDashboard'
  - 'backend: ApprovalService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-113
  title: Approval Audit Trail
  category: epic_approval
  priority: medium
  as_a: auditor reviewing decisions
  i_want: to see full history of approvals and rejections
  so_that: I can understand who approved what and when
  acceptance_criteria:
  - Audit log shows all approval events
  - Each event includes approver, timestamp, decision
  - Rejection reasons are recorded
  - Epic modifications tracked with diffs
  - Audit log is immutable
  - Export log as report
  related_components:
  - 'frontend: AuditLog'
  - 'backend: ApprovalService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-114
  title: Compare Epic Versions
  category: epic_approval
  priority: medium
  as_a: developer reviewing revised epic
  i_want: to see what changed since last review
  so_that: I can focus on the differences
  acceptance_criteria:
  - Side-by-side diff view of epic versions
  - Highlight added, removed, modified tickets
  - Diff for orchestration changes
  - Version history with timestamps
  - Rollback to previous version option
  - Export diff as document
  related_components:
  - 'frontend: EpicDiff'
  - 'frontend: VersionHistory'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-115
  title: Manually Complete Ticket
  category: epic_approval
  priority: medium
  as_a: developer taking direct control
  i_want: to mark tickets as completed manually
  so_that: I can handle tickets outside the automated workflow
  acceptance_criteria:
  - Ticket menu has 'complete manually' option
  - Requires confirmation and reason
  - Ticket status set to 'completed (manual)'
  - Timestamp and user recorded
  - Workflow advances to next ticket
  - Manual completions visible in audit log
  related_commands:
  - agentic epic ticket complete <id> --manual
  related_components:
  - 'frontend: TicketControls'
  - 'backend: TicketService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
- id: US-FE-116
  title: Add Ad-Hoc Tickets During Execution
  category: epic_approval
  priority: medium
  as_a: developer discovering new work
  i_want: to add tickets while the epic is executing
  so_that: I can capture emergent requirements
  acceptance_criteria:
  - Add ticket button available during execution
  - New tickets are inserted at appropriate position
  - Can add to current or future phase
  - Workflow pauses for user to confirm insertion
  - Orchestration updated to include new ticket
  - New tickets tracked as 'user-added'
  related_components:
  - 'frontend: TicketManager'
  - 'frontend: ExecutionControls'
  - 'backend: TicketService'
  last_tested: null
  test_status: untested
  test_notes: ''
  tested_by_plan: null
