# User Stories: Agent Workflow Monitoring
# Covers agent activity tracking, orchestration visualization, and execution flow

stories:
  # ============================================================================
  # AGENT ACTIVITY MONITORING
  # ============================================================================

  - id: "US-FE-080"
    title: "Display Active Agent"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user monitoring execution"
    i_want: "to see which agent is currently active"
    so_that: "I understand who is doing what in the workflow"
    acceptance_criteria:
      - "Current agent name is displayed prominently"
      - "Agent role/type is shown (planner, builder, tester)"
      - "Icon or avatar represents the agent"
      - "Timestamp of when agent became active"
      - "Agent switches trigger visual transition"
      - "Agent info panel is always visible"
    related_components:
      - "frontend: AgentIndicator"
      - "frontend: WorkflowView"
      - "backend: OrchestrationService"

  - id: "US-FE-081"
    title: "Agent Activity Log"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user reviewing workflow execution"
    i_want: "to see a log of agent actions and decisions"
    so_that: "I can understand the execution history"
    acceptance_criteria:
      - "Log shows agent switches with timestamps"
      - "Major actions are logged (task start/complete, decisions)"
      - "Log is scrollable and searchable"
      - "Entries grouped by agent or time"
      - "Click entry shows detailed context"
      - "Log persists across session reconnects"
    related_components:
      - "frontend: AgentActivityLog"
      - "frontend: ActivityViewer"

  - id: "US-FE-082"
    title: "Agent Performance Metrics"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "developer optimizing workflows"
    i_want: "to see performance metrics per agent"
    so_that: "I can identify slow or failing agents"
    acceptance_criteria:
      - "Time spent per agent is tracked"
      - "Task completion rate per agent"
      - "Error rate per agent type"
      - "Average task duration by agent"
      - "Metrics visualized as charts/graphs"
      - "Export metrics as CSV or JSON"
    related_components:
      - "frontend: AgentMetrics"
      - "frontend: MetricsChart"

  # ============================================================================
  # ORCHESTRATION FLOW VISUALIZATION
  # ============================================================================

  - id: "US-FE-083"
    title: "Display Orchestration Flowchart"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user understanding the plan workflow"
    i_want: "to see the orchestration Mermaid diagram rendered"
    so_that: "I can visualize the execution flow"
    acceptance_criteria:
      - "Mermaid MMD file is fetched from plan folder"
      - "Flowchart is rendered as interactive diagram"
      - "Current node is highlighted in real-time"
      - "Completed nodes are visually marked"
      - "Nodes are clickable to show details"
      - "Diagram auto-updates as execution progresses"
    related_components:
      - "frontend: MermaidRenderer"
      - "frontend: OrchestrationView"
      - "backend: PlanService"

  - id: "US-FE-084"
    title: "Execution Path Highlighting"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user monitoring execution"
    i_want: "to see the path taken through the orchestration"
    so_that: "I can follow the execution visually"
    acceptance_criteria:
      - "Completed edges are highlighted/colored"
      - "Current transition is animated"
      - "Decision branches show which path was taken"
      - "Loops show iteration count"
      - "Failed paths shown in different color"
      - "Path history viewable in replay mode"
    related_components:
      - "frontend: FlowHighlighter"
      - "frontend: OrchestrationView"

  - id: "US-FE-085"
    title: "Agent Routing Indicators"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "user understanding agent selection"
    i_want: "to see which agent is assigned to each node"
    so_that: "I understand the routing logic"
    acceptance_criteria:
      - "Each node shows assigned agent name"
      - "Agent metadata from AGENT_ROUTING comments is displayed"
      - "Tooltip shows routing rationale"
      - "Color coding by agent type"
      - "Missing agent assignments are flagged"
      - "Agent role descriptions accessible"
    related_components:
      - "frontend: AgentRoutingView"
      - "frontend: MermaidRenderer"

  # ============================================================================
  # WORKFLOW STATE TRACKING
  # ============================================================================

  - id: "US-FE-086"
    title: "Workflow State Indicator"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user monitoring execution status"
    i_want: "to see the current workflow state"
    so_that: "I know if execution is running, paused, or failed"
    acceptance_criteria:
      - "State indicator shows: running, paused, completed, failed"
      - "Icon and color coding for each state"
      - "Timestamp of state change"
      - "Reason for pause/failure displayed"
      - "State persists across page reloads"
      - "Notification on state change"
    related_components:
      - "frontend: WorkflowStateIndicator"
      - "frontend: WorkflowView"

  - id: "US-FE-087"
    title: "Phase Progress in Workflow"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user tracking phase execution"
    i_want: "to see which phase is active in the orchestration"
    so_that: "I can correlate workflow with plan phases"
    acceptance_criteria:
      - "Current phase highlighted in orchestration diagram"
      - "Phase completion percentage shown"
      - "Phase nodes expand to show tasks (optional)"
      - "Phase transitions are animated"
      - "Click phase shows phase details"
      - "Phases match plan_build.yml structure"
    related_components:
      - "frontend: PhaseOrchestration"
      - "frontend: OrchestrationView"

  # ============================================================================
  # FEEDBACK AND ERROR HANDLING
  # ============================================================================

  - id: "US-FE-088"
    title: "Visualize Feedback Loops"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "user monitoring test-fix cycles"
    i_want: "to see feedback loops in the orchestration"
    so_that: "I understand retry and recovery logic"
    acceptance_criteria:
      - "Feedback loop edges are visually distinct"
      - "Loop iteration count displayed"
      - "Maximum iterations shown"
      - "Current iteration highlighted"
      - "Failed iterations marked differently"
      - "Loop exit conditions shown"
    related_components:
      - "frontend: FeedbackLoopView"
      - "frontend: OrchestrationView"

  - id: "US-FE-089"
    title: "Error Node Highlighting"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user debugging workflow failures"
    i_want: "to see where errors occurred in the orchestration"
    so_that: "I can identify failure points quickly"
    acceptance_criteria:
      - "Nodes with errors are highlighted in red"
      - "Error icon on failed nodes"
      - "Click node shows error details"
      - "Error message and stack trace displayed"
      - "Timestamp of error"
      - "Option to retry from failed node"
    related_components:
      - "frontend: ErrorNodeView"
      - "frontend: OrchestrationView"

  - id: "US-FE-090"
    title: "Escalation Path Visualization"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "user understanding escalation logic"
    i_want: "to see escalation triggers and paths in the diagram"
    so_that: "I know when and how failures escalate"
    acceptance_criteria:
      - "Escalation edges shown with distinct styling"
      - "Escalation conditions displayed as annotations"
      - "Trigger thresholds shown (e.g., max retries)"
      - "Escalation targets highlighted"
      - "History of escalations tracked"
      - "Manual escalation option available"
    related_components:
      - "frontend: EscalationView"
      - "frontend: OrchestrationView"

  # ============================================================================
  # WORKFLOW INTERACTION
  # ============================================================================

  - id: "US-FE-091"
    title: "Zoom and Pan Orchestration Diagram"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "user viewing complex workflows"
    i_want: "to zoom and pan the orchestration diagram"
    so_that: "I can navigate large flowcharts easily"
    acceptance_criteria:
      - "Mouse wheel or pinch gesture zooms"
      - "Click-drag pans the diagram"
      - "Zoom controls (+/-) available"
      - "Fit-to-screen button resets view"
      - "Minimap shows full diagram with viewport indicator"
      - "Zoom level persists per session"
    related_components:
      - "frontend: DiagramNavigator"
      - "frontend: MermaidRenderer"

  - id: "US-FE-092"
    title: "Node Detail Popover"
    category: "workflow_monitoring"
    priority: "high"
    as_a: "user exploring the orchestration"
    i_want: "to click nodes and see detailed information"
    so_that: "I can understand each step without leaving the view"
    acceptance_criteria:
      - "Click node opens popover/modal"
      - "Shows node type, agent, status"
      - "Related tasks displayed"
      - "Command snippets shown if available"
      - "Timestamps for execution"
      - "Link to detailed logs"
    related_components:
      - "frontend: NodeDetailPopover"
      - "frontend: OrchestrationView"

  - id: "US-FE-093"
    title: "Filter Orchestration View"
    category: "workflow_monitoring"
    priority: "low"
    as_a: "user focusing on specific aspects"
    i_want: "to filter the orchestration diagram"
    so_that: "I can hide completed or irrelevant parts"
    acceptance_criteria:
      - "Toggle to hide completed nodes"
      - "Filter by agent type"
      - "Show only current phase"
      - "Highlight specific paths (e.g., error paths)"
      - "Filter controls accessible from toolbar"
      - "Filters update diagram in real-time"
    related_components:
      - "frontend: DiagramFilter"
      - "frontend: OrchestrationView"

  # ============================================================================
  # EXECUTION REPLAY
  # ============================================================================

  - id: "US-FE-094"
    title: "Replay Workflow Execution"
    category: "workflow_monitoring"
    priority: "low"
    as_a: "user reviewing completed workflows"
    i_want: "to replay the execution step-by-step"
    so_that: "I can analyze what happened"
    acceptance_criteria:
      - "Replay controls (play, pause, step, speed)"
      - "Execution state updates as replay progresses"
      - "Scrubber to jump to specific time"
      - "Shows agent switches and task completions"
      - "Terminal output synced with replay (optional)"
      - "Export replay as video or animated GIF"
    related_components:
      - "frontend: ReplayController"
      - "frontend: WorkflowView"

  - id: "US-FE-095"
    title: "Workflow Execution Timeline"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "user analyzing execution duration"
    i_want: "a timeline view of workflow execution"
    so_that: "I can see time spent in each phase/task"
    acceptance_criteria:
      - "Horizontal timeline with execution events"
      - "Events include: agent switches, task starts/completions, errors"
      - "Duration bars show time in each state"
      - "Hover shows event details"
      - "Zoom to focus on specific time ranges"
      - "Color coding by event type"
    related_components:
      - "frontend: ExecutionTimeline"
      - "frontend: WorkflowView"

  # ============================================================================
  # ORCHESTRATION METADATA
  # ============================================================================

  - id: "US-FE-096"
    title: "Display Orchestration Metadata"
    category: "workflow_monitoring"
    priority: "medium"
    as_a: "user understanding workflow configuration"
    i_want: "to view metadata about the orchestration"
    so_that: "I know version, constraints, and settings"
    acceptance_criteria:
      - "Orchestration file name and creation date"
      - "Agent definitions referenced"
      - "Guidance files used"
      - "Max retry counts and timeout settings"
      - "Escalation policies defined"
      - "Link to view raw MMD file"
    related_components:
      - "frontend: OrchestrationMetadata"
      - "frontend: MetadataPanel"
