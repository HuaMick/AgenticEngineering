      - "test_generate_agent_help: Strengthened to AND assertion ✅"
      - "test_inputs_returns_json: Fixed with non-empty assertion + structural checks ✅"

    remaining_concern:
      - test: "test_task_no_active_epic (NEW, T4_2)"
        line: 375
        pattern: "vacuous_if_guard"
        detail: >-
          Newly added test uses `if stdout.strip():` guard at line 375.
          If the command produces empty output, the error message assertions
          at lines 377-378 are skipped entirely. The unconditional assertion
          at line 373 (code == 0) still provides some validation.
        severity: LOW
        recommendation: >-
          Consider removing the if-guard and asserting that stdout IS non-empty
          for the -j flag case, or documenting that empty output is a valid
          behavior for this path.

  test_task_list_commands_py:
    verdict: NOT_ADDRESSED
    severity: HIGH
    detail: >-
      10 of 16 tests in test_task_list_commands.py exhibit reward-hacking
      patterns (vacuous if-guards, accept-failure returncodes, broken commands).
      These were identified in the audit (test_audit_results.yml sections 4A-4D)
      but are NOT addressed by any of the 14 epic tickets.
    specific_patterns:
      - test: "test_task_list_json_output (line 196)"
        pattern: "if stdout.strip() + isinstance(data, (list, dict)) - vacuous guard"
      - test: "test_task_list_filter_by_status (line 207)"
        pattern: "Triple-nested if guards - empty output passes all"
      - test: "test_task_current_returns_task (line 227)"
        pattern: "Double if-guard - null/empty passes silently"
      - test: "test_task_current_prefers_in_progress (line 238)"
        pattern: "Triple guard with conditional status assertion"
      - test: "test_task_update_changes_status (line 259)"
        pattern: "returncode in [0, 1] accepts success AND failure"
      - test: "test_task_prefill_loads_preset (line 285)"
        pattern: "Accepts success OR 'not found' OR 'error' - cannot fail"
      - test: "test_task_add_creates_task (line 303)"
        pattern: "returncode in [0, 1] - accepts failure as success"
      - test: "test_list_then_current_consistent (line 314)"
        pattern: "Four nested if-guards - vacuous pass"
      - test: "test_update_then_current_reflects_change (line 339)"
        pattern: "BROKEN: doubled 'agent' prefix + pass body - does nothing"
      - test: "test_task_status_shows_task_details (line 388)"
        pattern: "Nested guards + returncode in [0, 1]"
    recommendation: >-
      Create a follow-up epic to remediate test_task_list_commands.py
      reward-hacking patterns. This was identified as P1 priority in the
      audit but was out-of-scope for this epic.

  test_services_context_py:
    verdict: CLEAN
    details:
      - "6 new tests added with strong concrete assertions ✅"
      - "All assertions are unconditional ✅"
      - "Real filesystem fixtures used for path resolution tests ✅"
      - "Template substitution tested with specific content checks ✅"

