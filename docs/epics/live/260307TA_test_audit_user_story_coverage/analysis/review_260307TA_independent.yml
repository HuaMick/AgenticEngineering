reward_hacking_scan:

  test_context_commands_py:
    verdict: CLEAN
    details:
      - "test_role_returns_json: Rewritten with mock + 4 concrete field assertions ✅"
      - "test_inputs_with_role: Removed (was duplicate reward-hacking test) ✅"
      - "test_task_returns_json: Rewritten with non-empty assertion + field checks ✅"
