name: decommission_yaml_tinydb_native
worktree_path: ''
branch: plan-decommission-yaml-epic-files-go-tinydb-native-remo
status: active
priority: high
objective: 'Complete the YAML decommissioning promised in epic 260223NE. TinyDB is
  already

  the primary datastore but YAML files are still created by `agentic epic new`,

  still used as fallback reads, and `cmd_list()` skips epics without YAML files.

  Remove all YAML file creation/dependency so TinyDB is the sole source of truth.

  Make `db sync` throw an error since it should no longer be needed.

  '
created: ''
