name: decommission_yaml_tinydb_native
worktree_path: ''
branch: plan-decommission-yaml-epic-files-go-tinydb-native-remo
status: active
priority: high
objective: 'Complete the YAML decommissioning promised in epic 260223NE. TinyDB is
  already

  the primary datastore but YAML files are still created by `agentic epic new`,

  still used as fallback reads, and `cmd_list()` skips epics without YAML files.

  Remove all YAML file creation/dependency so TinyDB is the sole source of truth.

  Make `db sync` throw an error since it should no longer be needed.

  '
created: ''
phases:
- name: Remove YAML Dependency from Read Paths
  execution: sequential
  description: Make all read commands work from TinyDB only, no YAML fallback
  tickets:
  - id: T1_1
    name: Remove YAML skip check from cmd_list()
    description: 'In cmd_list() (epic.py ~line 2886), remove the _get_epic_yaml_files()

      check that skips epics without YAML files. The epic list should come

      entirely from TinyDB via plan_service.list_epics(). An epic exists if

      TinyDB knows about it, period.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    success_criteria:
    - cmd_list() does not call _get_epic_yaml_files()
    - Epics without YAML files still appear in agentic epic list
  - id: T1_2
    name: Remove YAML fallback from cmd_task_list()
    description: 'In cmd_task_list() (epic.py ~line 2121-2164), remove the YAML scanning

      fallback. If TinyDB has no data for an epic, that''s an error — don''t

      silently fall back to scanning YAML files.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    success_criteria:
    - cmd_task_list() uses only TinyDB, no YAML scanning
    - Clear error message if epic not found in TinyDB
  - id: T1_3
    name: Remove YAML fallback from all other read paths
    description: 'Audit all remaining code paths that fall back to YAML when TinyDB

      misses. Remove YAML fallbacks from EpicService methods, status

      commands, validate commands, etc. TinyDB is the sole read source.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    success_criteria:
    - No code path reads ticket_*.yml or plan_*.yml as data source
    - YAML reads only remain for non-epic data (user_stories, agent configs)
- name: Remove YAML Creation from Write Paths
  execution: sequential
  description: Stop creating YAML files when epics/tickets are created or modified
  tickets:
  - id: T2_1
    name: Remove YAML scaffold from epic creation
    description: 'In cmd_new() and cmd_scaffold(), stop creating ticket_*.yml/plan_*.yml

      files. Epic creation should only write to TinyDB via EpicRepository.

      The epic folder can still exist on disk (for orchestration MMD files,

      etc.) but no YAML ticket files.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    success_criteria:
    - agentic epic new creates TinyDB records only, no YAML files
    - Epic folder still created for orchestration artifacts
  - id: T2_2
    name: Remove YAML sync from ticket updates
    description: 'Remove yaml_sync_enabled and all export_to_yaml() calls from

      EpicService write operations. Ticket start/complete/update should

      only write to TinyDB.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    success_criteria:
    - yaml_sync_enabled removed from EpicService
    - No export_to_yaml() calls remain in write paths
- name: Disable db sync Command
  execution: sequential
  description: Make db sync throw an error since YAML is no longer a data source
  tickets:
  - id: T3_1
    name: Make db sync command throw deprecation error
    description: 'Replace the db sync command implementation with an error message:

      "Error: db sync is disabled. TinyDB is the sole data store. YAML

      epic files are no longer used." Remove both the sync and --export

      paths. Keep the db status command if it provides useful info.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - agentic epic db sync exits with error and clear message
    - agentic epic db sync --export also errors
- name: Remove YAML Files and Clean Up
  execution: sequential
  description: Delete existing YAML epic files, remove helper functions
  tickets:
  - id: T4_1
    name: Remove _get_epic_yaml_files() and related helpers
    description: 'Delete _get_epic_yaml_files(), import_from_yaml(), export_to_yaml()

      and any other YAML-specific helper functions that are no longer called.

      Remove import of yaml in files where it''s no longer needed.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    success_criteria:
    - _get_epic_yaml_files() removed
    - import_from_yaml() and export_to_yaml() removed
    - No dead YAML helper code remains
  - id: T4_2
    name: Delete existing YAML epic files from live epics
    description: 'Remove all ticket_*.yml and plan_*.yml files from docs/epics/live/

      folders. Keep orchestration_*.mmd and any other non-YAML artifacts.

      Verify TinyDB has all the data before deleting.

      '
    status: pending
    agent: build-python
    target_files:
    - docs/epics/live/*/ticket_*.yml
    - docs/epics/live/*/plan_*.yml
    success_criteria:
    - No ticket_*.yml or plan_*.yml in docs/epics/live/
    - All epic/ticket data accessible via agentic epic list and ticket list
- name: Testing
  execution: sequential
  description: Update tests, verify TinyDB-only operation
  tickets:
  - id: T5_1
    name: Update tests for TinyDB-only operation
    description: 'Update test_uat_tinydb_yaml_compat.py — remove or repurpose YAML

      compat tests since YAML is no longer used. Update any other tests

      that create YAML fixtures to use TinyDB directly instead.

      Add tests verifying db sync throws an error.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/tests/test_uat_tinydb_yaml_compat.py
    - modules/AgenticGuidance/tests/test_uat_tinydb_crud.py
    success_criteria:
    - All tests pass with TinyDB-only storage
    - db sync error behavior is tested
    - No test depends on YAML files for epic data
  - id: T5_2
    name: End-to-end verification
    description: 'Verify full lifecycle works without YAML:

      1. agentic epic new creates epic in TinyDB only

      2. agentic epic list shows all epics

      3. agentic epic ticket list shows all tickets

      4. agentic epic ticket start/complete updates TinyDB

      5. agentic epic archive works

      6. No YAML files created at any step

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/tests/test_e2e_tinydb_native.py
    success_criteria:
    - Full epic lifecycle works without any YAML files
    - pytest passes 100%
context: "History:\n- 260220MI: Introduced TinyDB with dual-write strategy (YAML =\
  \ source of truth)\n- 260223NE: Made TinyDB first-class, stated \"YAML files are\
  \ a secondary\n  export/fallback (eventually decommissioned)\". All CLI commands\
  \ migrated to\n  use EpicRepository/EpicService instead of direct YAML reads.\n\
  - Current: `agentic epic new` still creates ticket_*.yml/plan_*.yml files.\n  `cmd_list()`\
  \ in epic.py skips epics without YAML files (_get_epic_yaml_files\n  check at line\
  \ 2886). `cmd_task_list()` falls back to YAML scanning. `db sync`\n  rebuilds TinyDB\
  \ from YAML. All of this needs to go.\n\nKey code paths still depending on YAML:\n\
  - epic.py cmd_list() line 2886: _get_epic_yaml_files() skip check\n- epic.py cmd_task_list()\
  \ line 2121-2164: YAML scanning fallback\n- epic.py cmd_new() line 576+: creates\
  \ YAML scaffold files\n- epic.py cmd_scaffold() line 1214: writes YAML template\n\
  - epic_repository.py import_from_yaml() / export_to_yaml()\n- cli.py db sync command:\
  \ rebuilds TinyDB from YAML\n"
