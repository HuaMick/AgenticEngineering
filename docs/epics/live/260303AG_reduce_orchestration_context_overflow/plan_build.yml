# Epic: Reduce Orchestration Context Overflow
# Epic ID: 260303AG
# Created: 2026-03-03
# Updated: 2026-03-05
# Status: approved

name: "reduce_orchestration_context_overflow"
branch: "main"
status: "approved"
priority: "high"
plan_type: "guidance"
no_stories_rationale: |
  This is an infrastructure/guidance improvement epic targeting the orchestration-executor
  agent guidance. It does not introduce user-facing features and is classified as
  internal_tooling under planning-standard.yml escape_hatch_rules.

objective: |
  Address agent retrieval payload bloat that causes meta orchestration sessions
  to exhaust their context window during plan execution. The primary contributor
  is the ~35 KB agent retrieval payload injected per sub-agent per poll cycle,
  which compounds to ~770 KB per poll cycle across 22 concurrent agents.

context: |
  Diagnostic findings from session 3ee29cd2 (golden-mapping-kitten) on 2026-03-02:

  - Session ran 54 turns orchestrating 22 concurrent sub-agents
  - Agent retrieval payloads averaged ~35 KB each per poll cycle
  - A single poll cycle across all 22 agents injects ~770 KB into context
  - After 2-3 poll cycles with reasoning, the context window was exhausted
  - Compaction failed: "Conversation too long"

  Context budget breakdown:
    - System prompt + guidance: ~50 KB (fixed)
    - Plan manifests (6 files loaded at startup): ~100 KB
    - Agent launch messages (22x): ~20 KB
    - Task status updates: ~10 KB
    - Agent retrieval payloads: ~770 KB per poll cycle (primary cause)
    - Assistant reasoning: ~50 KB

  The primary fix is to change how the orchestration-executor handles agent
  retrieval payloads and polls sub-agents. Secondary fixes address plan manifest
  loading and concurrency limits.

  See README.md for full diagnostic data including turn-by-turn analysis.

impacted_files:
  - ".claude/agents/orchestration-executor.md"
  - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
  - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/inputs.yml"
  - "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
  - "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"

phases:
  - id: "phase_1_teach_quick_wins"
    name: "Phase 1: Quick Win Guidance Changes"
    description: |
      Update orchestration-executor guidance to enforce low-cost polling
      patterns and reduce verbosity of agent output captured in context.
      These are guidance-only changes with immediate benefit.
    execution: sequential
    agent_type: teacher
    tickets:
      - id: "teach_01_output_summarisation"
        name: "Teach: Output Summarisation on Retrieval"
        priority: HIGH
        status: pending
        agent_type: teacher
        description: |
          Update orchestration-executor process.yml and specification to mandate
          that when collecting agent output (loop_collect_output step), the
          executor MUST summarise the result to a fixed-size outcome record
          rather than retaining full output text in its reasoning context.

          The summary format should capture:
            - outcome: success | failure | in_progress
            - key_artifacts: list of file paths or outputs produced
            - ticket_ids_completed: list of ticket IDs marked done
            - errors: any failure details (truncated to 500 chars)
            - agent_id: the session/task ID

          Full output should be discarded after summarisation. The executor
          should NOT keep raw 35 KB agent outputs in its working memory.
        acceptance_criteria:
          - "process.yml loop_collect_output step explicitly mandates output summarisation"
          - "Summary schema is defined (outcome, key_artifacts, ticket_ids_completed, errors)"
          - "Guidance states full output text must NOT be retained in executor context"
          - "orchestration-executor-specification.yml Section: loop_collect_output updated"
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"

      - id: "teach_02_batched_polling"
        name: "Teach: Batched Poll Strategy"
        priority: HIGH
        status: pending
        agent_type: teacher
        description: |
          Update orchestration-executor process.yml to mandate a batched polling
          strategy instead of polling all agents in a single turn.

          Current behaviour: Poll all N agents in one turn, injecting N * 35 KB.
          Target behaviour: Poll at most POLL_BATCH_SIZE=5 agents per turn.

          The guidance should specify:
            - Default POLL_BATCH_SIZE: 5 (configurable via MMD metadata)
            - After each batch poll, write outcomes to a status file
              (e.g., epic_folder/live/agent_status.yml) rather than holding
              outcomes in context
            - On next poll turn, load only the status summary, not raw outputs
            - Poll strategy: round-robin across waiting agents by batch

          This reduces per-turn context injection from 770 KB to ~175 KB (5 * 35 KB),
          a 4x reduction per poll turn.
        acceptance_criteria:
          - "process.yml loop_spawn_agent or loop_collect_output documents POLL_BATCH_SIZE"
          - "Guidance mandates writing poll outcomes to agent_status.yml in epic folder"
          - "Guidance states only the summary file is loaded on subsequent polls"
          - "MMD metadata support for POLL_BATCH_SIZE documented"
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"

      - id: "teach_03_state_offload"
        name: "Teach: Offload Running State to YAML File"
        priority: HIGH
        status: pending
        agent_type: teacher
        description: |
          Update orchestration-executor guidance to require writing all running
          execution state to a persistent YAML file in the epic folder rather
          than maintaining it purely in the executor's context.

          The state file (e.g., epic_folder/live/execution_state.yml) should hold:
            - active_sessions: map of ticket_id -> session_id, status, summary
            - completed_sessions: list of completed outcomes (summary only)
            - current_phase: name and status
            - poll_cycle: integer counter
            - blocked_tickets: list with reasons

          At the start of each reasoning turn, the executor reads the state file
          summary (compact YAML, not full outputs). This enables context compaction
          to clear prior turn details while preserving execution continuity.

          This is the most impactful structural change: execution state is in a
          file, not accumulated in context turns.
        acceptance_criteria:
          - "process.yml startup_sequence includes creating execution_state.yml"
          - "Guidance defines schema for execution_state.yml"
          - "loop_transition_status and loop_complete_phase reference writing to state file"
          - "Guidance mandates reading state file at turn start (not raw prior-turn context)"
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"

      - id: "teach_04_jit_manifest_loading"
        name: "Teach: JIT Plan Manifest Loading"
        priority: MEDIUM
        status: pending
        agent_type: teacher
        description: |
          Update orchestration-executor guidance to avoid loading all ticket YAML
          files at startup. Currently the executor loads all 6 plan files (~100 KB)
          during the startup sequence. This should be changed to just-in-time loading.

          Instead of loading all ticket files upfront:
            1. At startup: load only the orchestration MMD and the primary ticket
               file for phase/ticket IDs (NOT full task descriptions)
            2. Before spawning an agent for a phase: load that phase's ticket
               file to extract success criteria and inputs
            3. After phase completes: discard the loaded content (write to state file)

          This reduces startup context from ~100 KB to ~10 KB for the initial
          load, with per-phase loads of ~15 KB instead of all-at-once.
        acceptance_criteria:
          - "startup_load_yaml step mandates loading only ticket IDs and phase names"
          - "loop_spawn_agent step mandates loading full ticket file just-in-time"
          - "Guidance explicitly prohibits loading all ticket files at startup"
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"

      - id: "teach_05_concurrency_limit"
        name: "Teach: Concurrency Limit Guidance"
        priority: MEDIUM
        status: pending
        agent_type: teacher
        description: |
          Update orchestration-executor guidance to recommend and enforce a maximum
          concurrency limit for parallel agent spawning. The session that failed
          spawned 22 concurrent agents simultaneously, which is the root cause of
          the large poll cycle payloads.

          Guidance should specify:
            - Default MAX_CONCURRENT_AGENTS: 8 (configurable via MMD metadata)
            - When a phase has more tickets than MAX_CONCURRENT_AGENTS, batch them
              into sub-waves: spawn wave 1, poll until complete, then spawn wave 2
            - Document this in process.yml loop_spawn_agent section
            - Add POLL_BATCH_SIZE and MAX_CONCURRENT_AGENTS to MMD schema guidance

          At 8 concurrent agents with 35 KB each: 280 KB per poll cycle (3.6x reduction
          from the 22-agent scenario). Combined with output summarisation (teach_01),
          per-poll context drops to ~8 KB (8 agents * ~1 KB summary each).
        acceptance_criteria:
          - "process.yml documents MAX_CONCURRENT_AGENTS with default of 8"
          - "loop_spawn_agent describes sub-wave batching when tickets exceed limit"
          - "orchestration-executor-specification.yml updated with concurrency section"
          - "MMD schema documentation updated to include MAX_CONCURRENT_AGENTS metadata"
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"

  - id: "phase_2_teach_spec_update"
    name: "Phase 2: Specification Alignment"
    description: |
      Update the orchestration-executor-specification.yml to formally capture
      all context-management changes from Phase 1 as normative specification
      sections. This ensures future guidance updates maintain consistency.
    execution: sequential
    agent_type: teacher
    tickets:
      - id: "teach_06_spec_context_budget"
        name: "Teach: Add Context Budget Section to Specification"
        priority: MEDIUM
        status: pending
        agent_type: teacher
        description: |
          Add a new Section 7: Context Budget Management to the orchestration-
          executor-specification.yml. This section formalises the context reduction
          patterns established in Phase 1 tickets.

          The section should include:
            - Context budget breakdown table (from README.md diagnostics)
            - Normative requirements for output summarisation
            - Normative requirements for state file offloading
            - Normative requirements for JIT manifest loading
            - Concurrency limits as specification constraints
            - Context overflow detection guidance (when to warn/escalate)

          This prevents future guidance drift by making these constraints
          normative (must-follow) rather than advisory.
        acceptance_criteria:
          - "Section 7 added to orchestration-executor-specification.yml"
          - "Section references all four mitigation patterns (summarisation, batching, state offload, JIT)"
          - "Context budget table from README.md diagnostic data is included"
          - "Requirements use normative language (MUST, SHALL, MUST NOT)"
        target_files:
          - "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"

      - id: "teach_07_update_claude_agent_stub"
        name: "Teach: Update .claude/agents/orchestration-executor.md Stub"
        priority: MEDIUM
        status: pending
        agent_type: teacher
        description: |
          Update the thin-client stub at .claude/agents/orchestration-executor.md
          to add a new "Context Management" section that summarises the key
          constraints. This stub is the first thing the executor reads when
          spawned, so it needs to surface context management rules prominently.

          The new section should include:
            - MAX_CONCURRENT_AGENTS: 8 (default)
            - POLL_BATCH_SIZE: 5 (default)
            - Output summarisation mandate (no raw retrieval payloads in context)
            - State file: write execution state to execution_state.yml
            - JIT loading: load ticket files per-phase, not all at startup

          These should be presented as FENCE-level constraints in the stub,
          not just advisory notes.
        acceptance_criteria:
          - "Context Management section added to orchestration-executor.md"
          - "Four constraints listed with FENCE wording"
          - "Default values for MAX_CONCURRENT_AGENTS and POLL_BATCH_SIZE documented"
          - "Stub remains concise (new section <30 lines)"
        target_files:
          - ".claude/agents/orchestration-executor.md"

  - id: "phase_3_audit"
    name: "Phase 3: Audit and Validation"
    description: |
      Validate that all guidance changes are internally consistent, complete,
      and free from contradictions. Run a self-review of the modified files.
    execution: sequential
    agent_type: auditor
    tickets:
      - id: "audit_01_guidance_review"
        name: "Audit: Self-Review of Guidance Changes"
        priority: HIGH
        status: pending
        agent_type: auditor
        description: |
          Perform a self-review audit of all modified guidance files to verify:
            1. Consistency: All four mitigation patterns are referenced consistently
               across process.yml, inputs.yml (if modified), specification.yml,
               and the .md stub
            2. Completeness: No contradictions with existing guidance patterns
               (e.g., FENCE clauses in process.yml vs specification)
            3. Clarity: New guidance is actionable and unambiguous
            4. No regressions: Existing executor protocol steps still work
               with the new context management constraints

          The audit agent should read all impacted files and produce a
          structured audit report identifying any gaps or contradictions.
        acceptance_criteria:
          - "All four context mitigation patterns referenced in at least 2 files each"
          - "No contradictions detected between process.yml and specification"
          - "FENCE constraints appear in both stub and process.yml"
          - "Audit report produced with PASS verdict"
        target_files:
          - ".claude/agents/orchestration-executor.md"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"

success_criteria:
  - "All 7 tickets completed (teach_01 through teach_07 plus audit_01)"
  - "orchestration-executor process.yml includes output summarisation mandate"
  - "orchestration-executor process.yml includes batched polling (POLL_BATCH_SIZE=5)"
  - "orchestration-executor process.yml includes execution_state.yml offload pattern"
  - "orchestration-executor process.yml includes JIT manifest loading"
  - "orchestration-executor process.yml includes MAX_CONCURRENT_AGENTS=8 concurrency limit"
  - "orchestration-executor-specification.yml has Section 7 Context Budget Management"
  - ".claude/agents/orchestration-executor.md has Context Management section with FENCE constraints"
  - "Audit phase returns PASS verdict"

estimated_context_reduction:
  current_per_poll_cycle: "~770 KB (22 agents x 35 KB)"
  after_teach_01_summarisation: "~22 KB (22 agents x ~1 KB summary)"
  after_teach_02_batching: "~5 KB (5 agents x ~1 KB summary per batch)"
  after_teach_05_concurrency: "~8 KB max (8 agents x ~1 KB summary)"
  after_teach_04_jit_manifest: "Startup reduced from ~100 KB to ~10 KB"
  combined_improvement: ">97% reduction in per-poll-cycle context injection"
