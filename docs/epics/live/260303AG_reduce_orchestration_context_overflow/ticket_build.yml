name: reduce_orchestration_context_overflow
worktree_path: ''
branch: main
status: approved
priority: high
objective: 'Address agent retrieval payload bloat that causes meta orchestration sessions

  to exhaust their context window during plan execution. The primary contributor

  is the ~35 KB agent retrieval payload injected per sub-agent per poll cycle,

  which compounds to ~770 KB per poll cycle across 22 concurrent agents.

  '
created: ''
phases:
- name: 'Phase 1: Quick Win Guidance Changes'
  execution: sequential
  description: 'Update orchestration-executor guidance to enforce low-cost polling

    patterns and reduce verbosity of agent output captured in context.

    These are guidance-only changes with immediate benefit.

    '
  tickets:
  - id: teach_01_output_summarisation
    name: 'Teach: Output Summarisation on Retrieval'
    description: "Update orchestration-executor process.yml and specification to mandate\n\
      that when collecting agent output (loop_collect_output step), the\nexecutor\
      \ MUST summarise the result to a fixed-size outcome record\nrather than retaining\
      \ full output text in its reasoning context.\n\nThe summary format should capture:\n\
      \  - outcome: success | failure | in_progress\n  - key_artifacts: list of file\
      \ paths or outputs produced\n  - ticket_ids_completed: list of ticket IDs marked\
      \ done\n  - errors: any failure details (truncated to 500 chars)\n  - agent_id:\
      \ the session/task ID\n\nFull output should be discarded after summarisation.\
      \ The executor\nshould NOT keep raw 35 KB agent outputs in its working memory.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
  - id: teach_02_batched_polling
    name: 'Teach: Batched Poll Strategy'
    description: "Update orchestration-executor process.yml to mandate a batched polling\n\
      strategy instead of polling all agents in a single turn.\n\nCurrent behaviour:\
      \ Poll all N agents in one turn, injecting N * 35 KB.\nTarget behaviour: Poll\
      \ at most POLL_BATCH_SIZE=5 agents per turn.\n\nThe guidance should specify:\n\
      \  - Default POLL_BATCH_SIZE: 5 (configurable via MMD metadata)\n  - After each\
      \ batch poll, write outcomes to a status file\n    (e.g., epic_folder/live/agent_status.yml)\
      \ rather than holding\n    outcomes in context\n  - On next poll turn, load\
      \ only the status summary, not raw outputs\n  - Poll strategy: round-robin across\
      \ waiting agents by batch\n\nThis reduces per-turn context injection from 770\
      \ KB to ~175 KB (5 * 35 KB),\na 4x reduction per poll turn.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
  - id: teach_03_state_offload
    name: 'Teach: Offload Running State to YAML File'
    description: "Update orchestration-executor guidance to require writing all running\n\
      execution state to a persistent YAML file in the epic folder rather\nthan maintaining\
      \ it purely in the executor's context.\n\nThe state file (e.g., epic_folder/live/execution_state.yml)\
      \ should hold:\n  - active_sessions: map of ticket_id -> session_id, status,\
      \ summary\n  - completed_sessions: list of completed outcomes (summary only)\n\
      \  - current_phase: name and status\n  - poll_cycle: integer counter\n  - blocked_tickets:\
      \ list with reasons\n\nAt the start of each reasoning turn, the executor reads\
      \ the state file\nsummary (compact YAML, not full outputs). This enables context\
      \ compaction\nto clear prior turn details while preserving execution continuity.\n\
      \nThis is the most impactful structural change: execution state is in a\nfile,\
      \ not accumulated in context turns.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
  - id: teach_04_jit_manifest_loading
    name: 'Teach: JIT Plan Manifest Loading'
    description: "Update orchestration-executor guidance to avoid loading all ticket\
      \ YAML\nfiles at startup. Currently the executor loads all 6 plan files (~100\
      \ KB)\nduring the startup sequence. This should be changed to just-in-time loading.\n\
      \nInstead of loading all ticket files upfront:\n  1. At startup: load only the\
      \ orchestration MMD and the primary ticket\n     file for phase/ticket IDs (NOT\
      \ full task descriptions)\n  2. Before spawning an agent for a phase: load that\
      \ phase's ticket\n     file to extract success criteria and inputs\n  3. After\
      \ phase completes: discard the loaded content (write to state file)\n\nThis\
      \ reduces startup context from ~100 KB to ~10 KB for the initial\nload, with\
      \ per-phase loads of ~15 KB instead of all-at-once.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
  - id: teach_05_concurrency_limit
    name: 'Teach: Concurrency Limit Guidance'
    description: "Update orchestration-executor guidance to recommend and enforce\
      \ a maximum\nconcurrency limit for parallel agent spawning. The session that\
      \ failed\nspawned 22 concurrent agents simultaneously, which is the root cause\
      \ of\nthe large poll cycle payloads.\n\nGuidance should specify:\n  - Default\
      \ MAX_CONCURRENT_AGENTS: 8 (configurable via MMD metadata)\n  - When a phase\
      \ has more tickets than MAX_CONCURRENT_AGENTS, batch them\n    into sub-waves:\
      \ spawn wave 1, poll until complete, then spawn wave 2\n  - Document this in\
      \ process.yml loop_spawn_agent section\n  - Add POLL_BATCH_SIZE and MAX_CONCURRENT_AGENTS\
      \ to MMD schema guidance\n\nAt 8 concurrent agents with 35 KB each: 280 KB per\
      \ poll cycle (3.6x reduction\nfrom the 22-agent scenario). Combined with output\
      \ summarisation (teach_01),\nper-poll context drops to ~8 KB (8 agents * ~1\
      \ KB summary each).\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
- name: 'Phase 2: Specification Alignment'
  execution: sequential
  description: 'Update the orchestration-executor-specification.yml to formally capture

    all context-management changes from Phase 1 as normative specification

    sections. This ensures future guidance updates maintain consistency.

    '
  tickets:
  - id: teach_06_spec_context_budget
    name: 'Teach: Add Context Budget Section to Specification'
    description: "Add a new Section 7: Context Budget Management to the orchestration-\n\
      executor-specification.yml. This section formalises the context reduction\n\
      patterns established in Phase 1 tickets.\n\nThe section should include:\n  -\
      \ Context budget breakdown table (from README.md diagnostics)\n  - Normative\
      \ requirements for output summarisation\n  - Normative requirements for state\
      \ file offloading\n  - Normative requirements for JIT manifest loading\n  -\
      \ Concurrency limits as specification constraints\n  - Context overflow detection\
      \ guidance (when to warn/escalate)\n\nThis prevents future guidance drift by\
      \ making these constraints\nnormative (must-follow) rather than advisory.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
  - id: teach_07_update_claude_agent_stub
    name: 'Teach: Update .claude/agents/orchestration-executor.md Stub'
    description: "Update the thin-client stub at .claude/agents/orchestration-executor.md\n\
      to add a new \"Context Management\" section that summarises the key\nconstraints.\
      \ This stub is the first thing the executor reads when\nspawned, so it needs\
      \ to surface context management rules prominently.\n\nThe new section should\
      \ include:\n  - MAX_CONCURRENT_AGENTS: 8 (default)\n  - POLL_BATCH_SIZE: 5 (default)\n\
      \  - Output summarisation mandate (no raw retrieval payloads in context)\n \
      \ - State file: write execution state to execution_state.yml\n  - JIT loading:\
      \ load ticket files per-phase, not all at startup\n\nThese should be presented\
      \ as FENCE-level constraints in the stub,\nnot just advisory notes.\n"
    status: pending
    agent: null
    target_files:
    - .claude/agents/orchestration-executor.md
- name: 'Phase 3: Audit and Validation'
  execution: sequential
  description: 'Validate that all guidance changes are internally consistent, complete,

    and free from contradictions. Run a self-review of the modified files.

    '
  tickets:
  - id: audit_01_guidance_review
    name: 'Audit: Self-Review of Guidance Changes'
    description: "Perform a self-review audit of all modified guidance files to verify:\n\
      \  1. Consistency: All four mitigation patterns are referenced consistently\n\
      \     across process.yml, inputs.yml (if modified), specification.yml,\n   \
      \  and the .md stub\n  2. Completeness: No contradictions with existing guidance\
      \ patterns\n     (e.g., FENCE clauses in process.yml vs specification)\n  3.\
      \ Clarity: New guidance is actionable and unambiguous\n  4. No regressions:\
      \ Existing executor protocol steps still work\n     with the new context management\
      \ constraints\n\nThe audit agent should read all impacted files and produce\
      \ a\nstructured audit report identifying any gaps or contradictions.\n"
    status: pending
    agent: null
    target_files:
    - .claude/agents/orchestration-executor.md
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
context: "Diagnostic findings from session 3ee29cd2 (golden-mapping-kitten) on 2026-03-02:\n\
  \n- Session ran 54 turns orchestrating 22 concurrent sub-agents\n- Agent retrieval\
  \ payloads averaged ~35 KB each per poll cycle\n- A single poll cycle across all\
  \ 22 agents injects ~770 KB into context\n- After 2-3 poll cycles with reasoning,\
  \ the context window was exhausted\n- Compaction failed: \"Conversation too long\"\
  \n\nContext budget breakdown:\n  - System prompt + guidance: ~50 KB (fixed)\n  -\
  \ Plan manifests (6 files loaded at startup): ~100 KB\n  - Agent launch messages\
  \ (22x): ~20 KB\n  - Task status updates: ~10 KB\n  - Agent retrieval payloads:\
  \ ~770 KB per poll cycle (primary cause)\n  - Assistant reasoning: ~50 KB\n\nThe\
  \ primary fix is to change how the orchestration-executor handles agent\nretrieval\
  \ payloads and polls sub-agents. Secondary fixes address plan manifest\nloading\
  \ and concurrency limits.\n\nSee README.md for full diagnostic data including turn-by-turn\
  \ analysis.\n"
