stories:
  - id: US-001
    title: "Manual Session Artifact Cleanup"
    category: "cleanup-service"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a developer, I want to run a single CLI command that removes all stale
      session artifacts (JSON state files, stdout/stderr logs, context files, and
      lock files) so that my ~/.agentic/sessions/ directory doesn't grow
      unboundedly and consume disk space.

      Currently 200+ session JSONs, 7,700+ log files, and 500+ context files
      accumulate with no way to clean them up short of manual rm commands.

    prerequisites:
      - "The ~/.agentic/sessions/ directory exists and contains session artifacts"
      - "At least one session has a terminated status (completed, stopped, failed, or dead PID)"

    steps:
      - step: 1
        when: "Developer runs 'agentic session cleanup'"
        then:
          - "Session JSON files for non-running sessions are deleted from ~/.agentic/sessions/"
          - "Stdout and stderr log files for non-running sessions are deleted from ~/.agentic/sessions/logs/"
          - "Context files for non-running sessions are deleted from ~/.agentic/sessions/context/"
          - "Stale .json.lock files are removed"
          - "A cleanup report is printed showing: sessions cleaned, files removed, and disk space freed"

      - step: 2
        when: "Developer runs 'agentic session cleanup' but a session is still running (PID alive)"
        then:
          - "The running session's JSON, logs, context, and lock files are NOT deleted"
          - "The report indicates that running sessions were skipped"

      - step: 3
        when: "Developer runs 'agentic session cleanup --json'"
        then:
          - "Cleanup report is returned as structured JSON with counts and byte totals"

    related_commands:
      - "agentic session cleanup"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-002
    title: "Dry-Run Cleanup Preview"
    category: "cleanup-service"
    priority: high
    lifecycle: "proposal"

    description: |
      As a developer, I want to preview what 'agentic session cleanup' would
      remove before it actually deletes anything, so that I can verify the
      cleanup scope and avoid accidental data loss.

    prerequisites:
      - "The ~/.agentic/sessions/ directory contains stale session artifacts"

    steps:
      - step: 1
        when: "Developer runs 'agentic session cleanup --dry-run'"
        then:
          - "No files are deleted or modified on disk"
          - "The output lists every file that would be removed, grouped by artifact type (JSON, log, context, lock)"
          - "A summary shows the total number of files and disk space that would be freed"

      - step: 2
        when: "Developer runs 'agentic session cleanup --dry-run --json'"
        then:
          - "No files are deleted"
          - "Structured JSON output includes the list of files that would be removed and summary totals"

    related_commands:
      - "agentic session cleanup --dry-run"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-003
    title: "Age-Based Session Purging"
    category: "cleanup-service"
    priority: high
    lifecycle: "proposal"

    description: |
      As a developer, I want to purge session artifacts older than a specified
      number of days so that I can keep recent sessions for debugging while
      removing old ones that are no longer useful.

    prerequisites:
      - "The ~/.agentic/sessions/ directory contains session artifacts of varying ages"

    steps:
      - step: 1
        when: "Developer runs 'agentic session cleanup --max-age 7'"
        then:
          - "Only session artifacts older than 7 days are removed"
          - "Sessions younger than 7 days are preserved regardless of their status"
          - "Running sessions are never removed regardless of age"

      - step: 2
        when: "Developer runs 'agentic session cleanup --max-age 7 --dry-run'"
        then:
          - "Preview shows only the artifacts that are both stale and older than 7 days"
          - "No files are deleted"

      - step: 3
        when: "Developer runs 'agentic session cleanup' without --max-age"
        then:
          - "All stale session artifacts are removed regardless of age"
        notes: "Age filtering is opt-in; the default removes everything that's not running"

    related_commands:
      - "agentic session cleanup --max-age"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-004
    title: "Orphaned Tmux Session Garbage Collection"
    category: "cleanup-service"
    priority: high
    lifecycle: "proposal"

    description: |
      As a developer, I want orphaned agentic tmux sessions (agentic-* prefix)
      to be detected and killed during cleanup so that tmux session leaks don't
      accumulate and consume system resources.

      Currently only agentic-orch-* sessions are cleaned before new orchestration
      layout creation, and foreground sessions are cleaned via atexit. Background
      spawns and crashed sessions leave orphaned tmux sessions behind.

    prerequisites:
      - "tmux is installed and accessible"

    steps:
      - step: 1
        when: "Developer runs 'agentic session cleanup' and orphaned agentic-* tmux sessions exist"
        then:
          - "All agentic-* tmux sessions without a corresponding running session record are killed"
          - "The cleanup report includes the count of orphaned tmux sessions removed"

      - step: 2
        when: "Developer runs 'agentic session cleanup' and an agentic-* tmux session has a matching running session record"
        then:
          - "The tmux session is left intact"
          - "The running session's artifacts are not touched"

      - step: 3
        when: "tmux is not installed or not accessible"
        then:
          - "Tmux cleanup is silently skipped"
          - "File-based artifact cleanup proceeds normally"
        notes: "Tmux cleanup is best-effort and must not block other cleanup"

    related_commands:
      - "agentic session cleanup"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-005
    title: "Automatic Stale Detection on Session List"
    category: "auto-cleanup"
    priority: medium
    lifecycle: "proposal"

    description: |
      As a developer, I want stale sessions (dead PIDs still marked as running)
      to be automatically detected and marked when I run 'agentic session list'
      so that the session list always reflects the true system state without
      requiring a separate cleanup step.

    prerequisites:
      - "At least one session record exists with status 'running' but its PID is dead"

    steps:
      - step: 1
        when: "Developer runs 'agentic session list'"
        then:
          - "Sessions with dead PIDs are detected and their status is updated to reflect the dead state"
          - "The list output shows the corrected status"
          - "No session files or logs are deleted (only status is updated)"

      - step: 2
        when: "Detection encounters an error (e.g., permission denied checking PID)"
        then:
          - "The error is logged but does not prevent the session list from being displayed"
          - "The session's status remains unchanged"
        notes: "Auto-detection must be fail-silent to avoid disrupting the primary list command"

    related_commands:
      - "agentic session list"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-006
    title: "Automatic Age-Based Purge on Session Spawn"
    category: "auto-cleanup"
    priority: medium
    lifecycle: "proposal"

    description: |
      As a developer, I want old session artifacts to be automatically purged
      when I spawn a new session so that routine CLI usage prevents unbounded
      accumulation without requiring me to remember to run cleanup manually.

    prerequisites:
      - "The ~/.agentic/sessions/ directory contains session artifacts older than the configured threshold"

    steps:
      - step: 1
        when: "Developer runs 'agentic session spawn' and sessions older than the default threshold (30 days) exist"
        then:
          - "Stale sessions older than the threshold are automatically purged in the background"
          - "The spawn command completes normally without noticeable delay"
          - "Running sessions are never purged regardless of age"

      - step: 2
        when: "The automatic purge encounters an error"
        then:
          - "The error is logged at debug level"
          - "The spawn command completes successfully regardless of the purge outcome"
        notes: "The purge hook must be non-blocking and fail-silent"

    related_commands:
      - "agentic session spawn"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-007
    title: "StateStore Delete and Stale-Detection API"
    category: "state-store"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a downstream service developer, I want StateStore to provide delete()
      and list_stale() methods so that cleanup logic can be built on the shared
      state store abstraction rather than duplicating file-management code.

      StateStore currently only has save(), load(), and list_all(). The cleanup
      service needs to remove individual records and identify records where a
      process is no longer alive.

    prerequisites:
      - "StateStore class exists in agenticcli/utils/state_store.py"

    steps:
      - step: 1
        when: "Caller invokes StateStore.delete(record_id)"
        then:
          - "The JSON file for that record is removed from disk"
          - "If the record does not exist, the method returns successfully (idempotent)"

      - step: 2
        when: "Caller invokes StateStore.list_stale(is_alive_fn)"
        then:
          - "All records are loaded and the is_alive_fn predicate is called for each"
          - "Records where is_alive_fn returns False are returned as stale"
          - "Records where is_alive_fn returns True are excluded"

      - step: 3
        when: "Caller invokes StateStore.list_stale(is_alive_fn) but a record has no PID field"
        then:
          - "The record is treated as stale (conservative: missing PID means unverifiable)"
        notes: "The is_alive_fn receives the full record dict, so it decides how to handle missing fields"

    related_commands: []
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

