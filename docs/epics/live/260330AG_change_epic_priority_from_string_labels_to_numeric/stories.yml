stories:
  - id: US-001
    title: "CLI Accepts Numeric and Label Priority Input"
    category: "cli-commands"
    priority: critical
    lifecycle: proposal

    description: |
      As a developer using the agentic CLI, I want to set epic priority using
      either a numeric value (1-4) or a familiar label (critical, high, medium,
      low) so that I can transition to numeric priorities without losing backward
      compatibility with existing workflows.

    prerequisites:
      - "At least one epic exists in TinyDB"

    steps:
      - step: 1
        when: "Developer runs `agentic epic set-priority --epic <name> --priority 2`"
        then:
          - "Priority is stored as integer 2 in TinyDB"
          - "CLI confirms the priority was set successfully"

      - step: 2
        when: "Developer runs `agentic epic set-priority --epic <name> --priority high`"
        then:
          - "Label 'high' is converted to integer 2"
          - "Priority is stored as integer 2 in TinyDB"
          - "CLI confirms the priority was set successfully"
        notes: "All four labels are accepted: critical→1, high→2, medium→3, low→4"

      - step: 3
        when: "Developer provides a value outside 1-4 (e.g. 0, 5, -1)"
        then:
          - "CLI rejects the input with a clear validation error"
          - "No change is written to TinyDB"

      - step: 4
        when: "Developer provides an unrecognized string (e.g. 'urgent', 'foo')"
        then:
          - "CLI rejects the input with a validation error listing valid values"
          - "Error message shows both numeric (1-4) and label options"

    related_commands:
      - "agentic epic set-priority"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-002
    title: "Numeric Priority Display in CLI Output"
    category: "cli-commands"
    priority: high
    lifecycle: proposal

    description: |
      As a developer reviewing epics, I want CLI commands to display priority
      as a number with its label (e.g. "2 (high)") so that I can immediately
      understand both the sort position and the semantic meaning.

    prerequisites:
      - "Epics exist with numeric priorities stored in TinyDB"

    steps:
      - step: 1
        when: "Developer runs `agentic epic list`"
        then:
          - "Each epic row shows its priority as number with label (e.g. '2 (high)')"
          - "Epics are sorted by priority ascending (1 first, 4 last)"
          - "Priority column uses color coding keyed by integer: 1=red-bold, 2=yellow, 3=white, 4=dim"

      - step: 2
        when: "Developer runs `agentic epic list -j` (JSON output)"
        then:
          - "JSON output includes priority as an integer field, not a string"

      - step: 3
        when: "Developer runs `agentic epic status --epic <name>`"
        then:
          - "Priority is displayed as numeric value with label and appropriate color"

      - step: 4
        when: "An epic has no priority set (null/missing)"
        then:
          - "Display shows '3 (medium)' as the default"
          - "Sorting treats it as priority 3"

    related_commands:
      - "agentic epic list"
      - "agentic epic status"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-003
    title: "Priority Sorting Uses Direct Numeric Comparison"
    category: "service-layer"
    priority: high
    lifecycle: proposal

    description: |
      As the orchestration system, I want all epic sorting to use direct integer
      comparison instead of the PRIORITY_WEIGHTS string-to-weight lookup table
      so that the ordering logic is simpler, faster, and extensible to custom
      priority ranges.

    prerequisites:
      - "Epics have numeric priorities in TinyDB (int values 1-4)"
      - "DependencyService.get_execution_order() is used for orchestration ordering"

    steps:
      - step: 1
        when: "EpicRepository.list_epics() is called"
        then:
          - "Epics are sorted by numeric priority ascending (1 first, 4 last)"
          - "Within the same priority, epics are sorted by folder name descending (newest first)"
          - "Sorting uses the integer directly, not a lookup table"

      - step: 2
        when: "DependencyService.get_execution_order() processes epics at different priorities"
        then:
          - "Epics with lower numeric value (1) are scheduled before higher (4)"
          - "Topological ordering still takes precedence over priority"

      - step: 3
        when: "OrchestrationWorkflow.discover_plans_needing_execution() sorts eligible epics"
        then:
          - "Sort key uses numeric priority directly instead of PRIORITY_WEIGHTS lookup"
          - "Behavior is identical: critical (1) before high (2) before medium (3) before low (4)"

      - step: 4
        when: "An epic has null/missing priority"
        then:
          - "It defaults to 3 (equivalent to old 'medium') for all sorting contexts"

    related_commands: []
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-004
    title: "Transparent Migration of Legacy String Priorities"
    category: "migration"
    priority: critical
    lifecycle: proposal

    description: |
      As a developer with existing epics in TinyDB, I want legacy string
      priorities (critical, high, medium, low) to be automatically converted
      to their numeric equivalents so that I don't lose priority settings
      after the upgrade and don't need to manually fix my database.

    prerequisites:
      - "TinyDB contains epics with string priority values from before the upgrade"

    steps:
      - step: 1
        when: "EpicRepository is opened and reads an epic with priority='critical'"
        then:
          - "The value is transparently mapped to integer 1"
          - "Sorting and display treat it as numeric 1"

      - step: 2
        when: "EpicRepository reads an epic with priority='high'"
        then:
          - "The value is transparently mapped to integer 2"

      - step: 3
        when: "EpicRepository reads an epic with priority='medium'"
        then:
          - "The value is transparently mapped to integer 3"

      - step: 4
        when: "EpicRepository reads an epic with priority='low'"
        then:
          - "The value is transparently mapped to integer 4"

      - step: 5
        when: "An epic has an unrecognized or null priority value in TinyDB"
        then:
          - "It defaults to integer 3 (medium equivalent)"
          - "No error is raised — the system is resilient to unexpected data"

      - step: 6
        when: "Developer runs any command that reads epics after the upgrade"
        then:
          - "No errors occur regardless of whether priority is stored as string or int in TinyDB"
          - "All commands produce correct output with migrated values"
        notes: "A normalize_priority() helper handles both string-to-int coercion and int passthrough. Migration can be lazy (on-read) or eager (batch on repo open)."

    related_commands:
      - "agentic epic list"
      - "agentic epic status"
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-005
    title: "Numeric Priority Data Model and Schema"
    category: "service-layer"
    priority: high
    lifecycle: proposal

    description: |
      As a developer maintaining the codebase, I want EpicData and EpicMetadata
      to use int for the priority field and plan-schema.yml to document int
      priority so that type checking catches misuse at development time and the
      specification matches the implementation.

    prerequisites:
      - "Migration strategy for legacy string values is defined (US-004)"

    steps:
      - step: 1
        when: "Developer inspects EpicData or EpicMetadata dataclass"
        then:
          - "priority field is typed as Optional[int] instead of Optional[str]"
          - "Default value is 3 (integer), not 'medium' (string)"

      - step: 2
        when: "Code passes a string value directly to the priority field"
        then:
          - "Type checkers (mypy/pyright) flag it as a type error"
        notes: "String-to-int conversion happens at the boundary (CLI, migration), not in the data model"

      - step: 3
        when: "Developer reads plan-schema.yml"
        then:
          - "priority field is documented as type: int with enum: [1, 2, 3, 4]"
          - "Description explains the mapping: 1=critical, 2=high, 3=medium, 4=low"

      - step: 4
        when: "PRIORITY_WEIGHTS dict is referenced in the codebase"
        then:
          - "It is replaced by PRIORITY_LABELS (int→str) and LABEL_TO_PRIORITY (str→int) utilities"
          - "No code uses a string-to-weight lookup for sorting"

    related_commands: []
    related_agents:
      - "build-python"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-006
    title: "Test Suite Updated for Numeric Priority"
    category: "test-updates"
    priority: medium
    lifecycle: proposal

    description: |
      As a developer, I want all priority-related tests updated to use numeric
      values so that the test suite validates the new behavior, catches
      regressions, and exercises the migration path for legacy data.

    prerequisites:
      - "Numeric priority is implemented in service and CLI layers"

    steps:
      - step: 1
        when: "Developer runs the AgenticGuidance test suite"
        then:
          - "All existing priority tests pass with numeric values (int, not str)"
          - "Tests for EpicRepository sorting verify numeric ordering"
          - "Tests for DependencyService verify int-based execution order"

      - step: 2
        when: "Developer runs the AgenticCLI test suite"
        then:
          - "Tests for set-priority validate both integer input (1-4) and label aliases"
          - "Tests for epic list verify numeric display and sort order"
          - "Tests for epic ticket add validate priority input"

      - step: 3
        when: "A test creates an epic with a legacy string priority"
        then:
          - "The normalize_priority migration path is exercised"
          - "The test passes without errors"

      - step: 4
        when: "UAT tests for priority ordering are run"
        then:
          - "Tests verify end-to-end: set priority → list → correct order → correct display"
          - "Both numeric and label input paths are covered"

    related_commands:
      - "agentic epic set-priority"
      - "agentic epic list"
    related_agents:
      - "test-builder"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

