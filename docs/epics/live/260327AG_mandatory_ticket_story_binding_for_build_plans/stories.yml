stories:
  - id: US-001
    title: "Build-plan ticket creation requires story linkage"
    category: "enforcement-gates"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a developer creating tickets for a build-plan epic, I want the CLI to
      reject ticket creation when --story-ids is missing so that every work item
      traces back to at least one user story before it enters the backlog.

      Currently --story-ids is accepted but fully optional on `agentic epic ticket add`.
      For build-plan epics this allows unlinked tickets to be created, breaking the
      story-first SDLC contract. Infra/guidance epics are exempt and must continue
      to allow tickets without story linkage.

    prerequisites:
      - "A plan-type detection helper exists that can classify an epic as build vs infra/guidance"
      - "The target epic has been scaffolded with at least one phase"

    steps:
      - step: 1
        when: "Developer runs `agentic epic ticket add` on a build-plan epic without --story-ids"
        then:
          - "The command exits with a non-zero return code"
          - "Error message states that --story-ids is required for build-plan epics"
          - "No ticket is created in TinyDB"

      - step: 2
        when: "Developer runs `agentic epic ticket add` on a build-plan epic with --story-ids US-001,US-002"
        then:
          - "The ticket is created in TinyDB with story_ids=['US-001', 'US-002']"
          - "Success message includes the linked story IDs"

      - step: 3
        when: "Developer runs `agentic epic ticket add` on an infra/guidance epic without --story-ids"
        then:
          - "The ticket is created successfully with an empty story_ids list"
          - "No error or warning is emitted about missing story linkage"
        notes: "Infra/guidance epics are the escape hatch — they must not be gated"

    related_commands:
      - "agentic epic ticket add"
    related_agents:
      - "build-python"
      - "epic-creator"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-002
    title: "Plan-type detection classifies epics correctly"
    category: "enforcement-gates"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a system component enforcing story-first planning, I want a reliable
      helper that classifies epics as build vs infra/guidance so that enforcement
      rules apply only where appropriate and infra epics retain their escape hatch.

      The previous determine_plan_type was removed during the planning pipeline
      rearchitect. A new, simpler helper is needed that inspects epic metadata
      (phases, agents, or explicit flags) to make the build/infra distinction.

    prerequisites:
      - "The epic exists in TinyDB with at least one phase"

    steps:
      - step: 1
        when: "The helper is called with an epic that has build-phase agents (e.g., build-python, build-flutter)"
        then:
          - "Returns a classification indicating the epic is a build plan"

      - step: 2
        when: "The helper is called with an epic that has only guidance or infrastructure agents (e.g., teacher-update-guidance, deploy-cicd)"
        then:
          - "Returns a classification indicating the epic is not a build plan"

      - step: 3
        when: "The helper is called with an epic that has mixed agents (some build, some infra)"
        then:
          - "Returns build-plan classification since at least one phase involves code construction"
        notes: "Conservative default — if any phase builds code, story linkage is required"

      - step: 4
        when: "The helper is called with an epic that has no phases or no agent fields"
        then:
          - "Returns a non-build classification to avoid blocking skeleton epics during early scaffolding"

    related_commands:
      - "agentic epic status"
    related_agents:
      - "epic-creator"
      - "planner-build"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-003
    title: "Planning validation blocks on per-ticket story gaps"
    category: "enforcement-gates"
    priority: critical
    lifecycle: "proposal"

    description: |
      As a planning agent running pre-flight validation, I want
      _validate_planning_output() to check every ticket individually for story_ids
      so that no unlinked work item slips through to execution.

      Currently the validator only checks `any(t.story_ids for t in tickets)` — if
      at least one ticket has story_ids, the gate passes. This must be hardened to
      check ALL tickets in build-plan epics, reporting each offending ticket ID in
      the error list.

    prerequisites:
      - "The plan-type detection helper is available"
      - "At least one ticket exists in TinyDB for the epic"

    steps:
      - step: 1
        when: "Pre-flight validation runs on a build-plan epic where 3 of 5 tickets lack story_ids"
        then:
          - "Validation returns failure (False)"
          - "Error list contains one entry per offending ticket, including the ticket ID"
          - "The 2 tickets with story_ids are not reported as errors"

      - step: 2
        when: "Pre-flight validation runs on a build-plan epic where all tickets have story_ids"
        then:
          - "Validation passes (True)"
          - "No story-related errors are returned"

      - step: 3
        when: "Pre-flight validation runs on an infra/guidance epic where no tickets have story_ids"
        then:
          - "Validation passes — infra epics are exempt from per-ticket story binding"
        notes: "The existing any() check should also be bypassed for infra epics"

    related_commands: []
    related_agents:
      - "planner-build"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-004
    title: "Bidirectional story audit reports coverage gaps"
    category: "audit-tooling"
    priority: high
    lifecycle: "proposal"

    description: |
      As a developer reviewing epic quality, I want `agentic stories audit` to
      report both tickets without story_ids and stories not referenced by any
      ticket so that I can identify and fix traceability gaps before execution.

      No audit subcommand currently exists in the stories CLI. The planner-audit
      agent performs similar checks manually, but there is no reusable CLI tool
      that developers or orchestrators can invoke on demand.

    prerequisites:
      - "The epic has a stories.yml file with at least one story"
      - "The epic has at least one ticket in TinyDB"

    steps:
      - step: 1
        when: "Developer runs `agentic stories audit --epic <folder>`"
        then:
          - "Output lists tickets that have empty story_ids (unlinked tickets)"
          - "Output lists stories from stories.yml that are not referenced by any ticket's story_ids (orphan stories)"
          - "Output includes a summary count of gaps in each direction"

      - step: 2
        when: "Developer runs `agentic stories audit --epic <folder> --json`"
        then:
          - "Output is valid JSON with keys for unlinked_tickets, orphan_stories, and summary"
          - "Each unlinked ticket entry includes the ticket ID and description"
          - "Each orphan story entry includes the story ID and title"

      - step: 3
        when: "Developer runs `agentic stories audit` on an epic with no stories.yml"
        then:
          - "Output reports that no stories file was found"
          - "Unlinked tickets are still reported since all tickets lack story linkage"

      - step: 4
        when: "Developer runs `agentic stories audit` on an epic where all tickets have story_ids and all stories are referenced"
        then:
          - "Output confirms full bidirectional coverage with zero gaps"

    related_commands:
      - "agentic stories audit"
    related_agents:
      - "planner-audit"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

  - id: US-005
    title: "Agent guidance enforces mandatory story binding"
    category: "agent-guidance"
    priority: high
    lifecycle: "proposal"

    description: |
      As a planning agent (epic-creator, planner-build, or orchestration-executor),
      I want my guidance documents to explicitly require --story-ids on ticket
      creation and validate per-ticket story linkage so that I produce correctly
      linked tickets and block execution of unlinked work.

      Currently epic-creator does not mention --story-ids at all, planner-build
      has story-first planning at the metadata level but not per-ticket CLI flag
      enforcement, and orchestration-executor checks coverage markers but not
      ticket-level story_ids before execution begins.

    prerequisites:
      - "The enforcement gates (plan-type detection, CLI gate, validation hardening) are implemented"

    steps:
      - step: 1
        when: "epic-creator agent creates skeleton tickets for a build-plan epic"
        then:
          - "Its process.yml instructs it to include --story-ids on every `agentic epic ticket add` call"
          - "The verification checklist includes a step to confirm all tickets have story_ids"

      - step: 2
        when: "planner-build agent enriches tickets for a build-plan epic"
        then:
          - "Its process.yml instructs it to set --story-ids per-ticket, not just plan-level affected_stories metadata"
          - "The agent is aware that the CLI will reject tickets without story_ids for build plans"

      - step: 3
        when: "orchestration-executor validates before launching execution phases"
        then:
          - "Its process.yml includes a pre-execution validation gate that checks every ticket has story_ids"
          - "Build-plan epics with unlinked tickets are blocked from proceeding to execution"

    related_commands:
      - "agentic epic ticket add"
    related_agents:
      - "epic-creator"
      - "planner-build"
      - "orchestration-executor"

    related_files: []
    last_tested: null
    test_status: "untested"
    test_notes: ""
    tested_by_plan: null

