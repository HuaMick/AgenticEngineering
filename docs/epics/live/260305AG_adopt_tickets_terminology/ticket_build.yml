# Epic: Adopt Tickets Terminology
# Epic ID: 260305AG
# Created: 2026-03-05
# Status: active
# Planner: planner-build

name: "adopt_tickets_terminology"
branch: "main"
status: "active"
priority: "high"
plan_type: "build"

objective: |
  Migrate the codebase from using the 'tasks' key to 'tickets' key as the
  canonical terminology for work items within epic phases. The YAML schema
  already uses 'tickets' but several code paths look for 'tasks' only,
  causing tickets to be invisible. After fixing with fallback, do a clean
  break: remove all fallback patterns so the codebase uses ONLY 'tickets'.

context: |
  Diagnosed 2026-03-05. The plan_build.yml for epic
  260303AG_reduce_orchestration_context_overflow has 8 pending tickets
  under phases[].tickets[], but `agentic epic list` shows 0 pending
  because some code paths use phase.get("tasks", []) without fallback
  to "tickets".

  CODE ANALYSIS RESULTS:
  - ALREADY FIXED: modules/AgenticCLI/src/agenticcli/commands/epic.py
    Already uses phase.get("tickets", phase.get("tasks", [])) at 14+ locations.
  - ALREADY FIXED: modules/AgenticGuidance/src/agenticguidance/services/epic.py
    Uses fallback pattern and smart key detection.
  - ALREADY FIXED: modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    import_from_yaml uses fallback; export_to_yaml writes "tickets".
  - BROKEN: modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    Lines 199, 247, 296, 365: uses ONLY phase.get("tasks", []) — NO fallback.
  - BROKEN: modules/AgenticGuidance/src/agenticguidance/services/context.py
    Line 258: uses ONLY phase.get("tasks", []) — NO fallback.
  - BROKEN: modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    Line 299: uses ONLY phase.get("tasks", []) — NO fallback.
  - BROKEN: modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    Line 741: uses ONLY phase.get("tasks", []) — NO fallback.
  - TESTS: Several test files construct phase data using "tasks" key only.
  - ALL OPEN EPICS: Already use 'tickets:' key in YAML — no YAML migration needed.

  CLEAN BREAK SCOPE (after fallback is applied everywhere):
  Remove all phase.get("tickets", phase.get("tasks", [])) fallback patterns
  and replace with just phase.get("tickets", []). Total 24 locations:
  - epic.py CLI: 13 locations
  - epic.py service: 3 locations
  - epic_repository.py: 1 location
  - ticket.py: 4 locations (after build_001 fix)
  - context.py: 1 location (after build_002 fix)
  - ralph.py: 1 location (after build_003 fix)
  - planner_loop.py: 1 location (after build_003b fix)

  SECONDARY CHANGE (already complete):
  The `agentic epic list` display already treats in_progress as pending
  (lines 1305-1306, 2897-2898) and has no separate "In Prog" column.
  The table columns are: Epic, Status, Orch, Action, Pending, Done, Progress.
  No further changes needed for In Prog column removal.

affected_stories:
  - "US-CLI-012"  # View Epic Status — ticket counts must be correct
  - "US-CLI-013"  # List All Epics — pending/done counts must reflect actual YAML data

impacted_artifacts:
  - artifact_type: service
    artifact_identifier: "TicketService (ticket.py)"
    impact_type: behavior_change
    description: "Fix phase ticket extraction to read 'tickets' key with 'tasks' fallback"
    breaking_change: false

  - artifact_type: service
    artifact_identifier: "MainFirstEpicResolver (context.py)"
    impact_type: behavior_change
    description: "Fix phase ticket extraction to read 'tickets' key with 'tasks' fallback"
    breaking_change: false

  - artifact_type: service
    artifact_identifier: "RalphService (ralph.py)"
    impact_type: behavior_change
    description: "Fix phase ticket extraction to read 'tickets' key with 'tasks' fallback"
    breaking_change: false

  - artifact_type: cli_command
    artifact_identifier: "agentic epic list"
    impact_type: behavior_change
    description: "Ticket counts now correctly reflect YAML 'tickets' key data"
    breaking_change: false

# ========================================
# LOOP STRUCTURES
# ========================================
loop_structures:
  - id: "loop_build_validation"
    type: "test-fix-loop"
    applies_to_phase: "Validation Phase"
    trigger: "After implementation tickets complete"
    description: |
      Run existing test suites to verify the key migration didn't break
      anything, fix any failures found.
    exit_criteria:
      success: "All existing tests pass + new tests for 'tickets' key pass"
      max_iterations: 3
      escalation: "Escalate to user with test results"

# ========================================
# PHASES AND TICKETS
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Implementation — Fix broken code paths
  # ----------------------------------------
  - name: "Implementation Phase"
    execution: sequential
    description: |
      Update the four files that use ONLY phase.get("tasks", [])
      to use the canonical fallback pattern: phase.get("tickets", phase.get("tasks", [])).
      This ensures both old YAML files (with "tasks" key) and new YAML files
      (with "tickets" key) are handled correctly.
    tickets:
      - id: "build_001"
        name: "Fix ticket.py — adopt tickets key with tasks fallback"
        description: |
          Update TicketService in ticket.py to read 'tickets' key first,
          falling back to 'tasks' for backward compatibility.
        status: "pending"
        agent: "builder"
        target_files:
          - "modules/AgenticGuidance/src/agenticguidance/services/ticket.py"
        inputs:
          - "modules/AgenticGuidance/src/agenticguidance/services/ticket.py"
          - "modules/AgenticGuidance/src/agenticguidance/services/epic.py"
        guidance: |
          WHAT TO CHANGE:
          There are 4 locations in ticket.py that use phase.get("tasks", []).
          Each must be updated to phase.get("tickets", phase.get("tasks", [])).

          SPECIFIC LINES (verify before editing — line numbers may shift):
          - Line 199: tasks = phase.get("tasks", [])
          - Line 247: tasks = phase.get("tasks", [])
          - Line 296: tasks = phase.get("tasks", [])
          - Line 365: tasks = phase.get("tasks", [])

          PATTERN TO APPLY:
            # Before:
            tasks = phase.get("tasks", [])
            # After:
            tasks = phase.get("tickets", phase.get("tasks", []))

          REFERENCE: epic.py already uses this pattern correctly.
          Do NOT rename the local variable `tasks` — it refers to the list items,
          and renaming it would cascade through many lines unnecessarily.

          BACKWARD COMPATIBILITY: The fallback to "tasks" ensures old YAML files
          that still use the "tasks" key continue to work.
        success_criteria:
          - "All 4 occurrences of phase.get('tasks', []) in ticket.py replaced with fallback pattern"
          - "No other changes to ticket.py logic"
          - "Existing tests still pass"

      - id: "build_002"
        name: "Fix context.py — adopt tickets key with tasks fallback"
        description: |
          Update MainFirstEpicResolver in context.py to read 'tickets' key first.
        status: "pending"
        agent: "builder"
        target_files:
          - "modules/AgenticGuidance/src/agenticguidance/services/context.py"
        inputs:
          - "modules/AgenticGuidance/src/agenticguidance/services/context.py"
          - "modules/AgenticGuidance/src/agenticguidance/services/epic.py"
        guidance: |
          WHAT TO CHANGE:
          There is 1 location in context.py that uses phase.get("tasks", []).

          SPECIFIC LINE (verify before editing):
          - Line 258: for task in phase.get("tasks", []):

          PATTERN TO APPLY:
            # Before:
            for task in phase.get("tasks", []):
            # After:
            for task in phase.get("tickets", phase.get("tasks", [])):
        success_criteria:
          - "The single occurrence of phase.get('tasks', []) in context.py replaced with fallback pattern"
          - "No other changes to context.py logic"

      - id: "build_003"
        name: "Fix ralph.py — adopt tickets key with tasks fallback"
        description: |
          Update RalphService._parse_plan_stats() in ralph.py to read 'tickets' key first.
        status: "pending"
        agent: "builder"
        target_files:
          - "modules/AgenticGuidance/src/agenticguidance/services/ralph.py"
        inputs:
          - "modules/AgenticGuidance/src/agenticguidance/services/ralph.py"
          - "modules/AgenticGuidance/src/agenticguidance/services/epic.py"
        guidance: |
          WHAT TO CHANGE:
          There is 1 location in ralph.py that uses phase.get("tasks", []).

          SPECIFIC LINE (verify before editing):
          - Line 299: tasks = phase.get("tasks", [])

          PATTERN TO APPLY:
            # Before:
            tasks = phase.get("tasks", [])
            # After:
            tasks = phase.get("tickets", phase.get("tasks", []))
        success_criteria:
          - "The single occurrence of phase.get('tasks', []) in _parse_plan_stats replaced with fallback pattern"
          - "No other changes to ralph.py logic"

      - id: "build_003b"
        name: "Fix planner_loop.py — adopt tickets key with tasks fallback"
        description: |
          Update planner_loop.py to read 'tickets' key first with 'tasks' fallback.
        status: "pending"
        agent: "builder"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py"
        guidance: |
          WHAT TO CHANGE:
          There is 1 location in planner_loop.py that uses phase.get("tasks", []).

          SPECIFIC LINE (verify before editing):
          - Line 741: for task in phase.get("tasks", []):

          PATTERN TO APPLY:
            # Before:
            for task in phase.get("tasks", []):
            # After:
            for task in phase.get("tickets", phase.get("tasks", [])):
        success_criteria:
          - "The single occurrence of phase.get('tasks', []) in planner_loop.py replaced with fallback pattern"
          - "No other changes to planner_loop.py logic"

  # ----------------------------------------
  # PHASE 2: Test Updates — Fix test data structures
  # ----------------------------------------
  - name: "Test Updates Phase"
    execution: sequential
    description: |
      Update test files that construct phase data using the "tasks" key
      to use the "tickets" key instead, ensuring tests validate the
      canonical schema. Keep a few tests that verify backward compat
      with the "tasks" key.
    tickets:
      - id: "build_004"
        name: "Update AgenticGuidance test files to use tickets key"
        description: |
          Update test data fixtures and assertions in AgenticGuidance tests
          to use "tickets" as the phase key.
        status: "pending"
        agent: "builder"
        target_files:
          - "modules/AgenticGuidance/tests/test_services_task.py"
          - "modules/AgenticGuidance/tests/test_integration_ralph_loop.py"
        inputs:
          - "modules/AgenticGuidance/tests/test_services_task.py"
          - "modules/AgenticGuidance/tests/test_integration_ralph_loop.py"
          - "modules/AgenticGuidance/tests/test_uat_tinydb_yaml_compat.py"
        guidance: |
          WHAT TO CHANGE:
          1. test_services_task.py line 688:
             Change: for ticket_data in phase.get("tasks", []):
             To:     for ticket_data in phase.get("tickets", phase.get("tasks", [])):

          2. test_integration_ralph_loop.py line 80:
             Change: for task in phase.get("tasks", []):
             To:     for task in phase.get("tickets", phase.get("tasks", [])):

          3. Also update any test YAML fixtures/data that construct phase dicts
             with "tasks" key — change to "tickets" key.

          NOTE: test_uat_tinydb_yaml_compat.py line 348 already uses the fallback
          pattern — no changes needed there. Read it for reference.

          IMPORTANT: If any tests construct inline YAML with "tasks" as the
          phase sub-key, update those to "tickets". The test assertions should
          validate the canonical schema, not the legacy one.
        success_criteria:
          - "All phase.get('tasks', []) in test files updated to fallback pattern"
          - "Test fixture data uses 'tickets' key where constructing phase data"
          - "All existing tests still pass"

      - id: "build_005"
        name: "Update AgenticCLI test files to use tickets key"
        description: |
          Update test data fixtures and assertions in AgenticCLI tests
          to use "tickets" as the phase key.
        status: "pending"
        agent: "builder"
        target_files:
          - "modules/AgenticCLI/tests/test_plan_bootstrap.py"
          - "modules/AgenticCLI/tests/integration/test_bootstrap_planner_workflow.py"
          - "modules/AgenticCLI/tests/integration/test_plan_creation_flow.py"
        inputs:
          - "modules/AgenticCLI/tests/test_plan_bootstrap.py"
          - "modules/AgenticCLI/tests/integration/test_bootstrap_planner_workflow.py"
          - "modules/AgenticCLI/tests/integration/test_plan_creation_flow.py"
        guidance: |
          WHAT TO CHANGE:
          1. test_plan_bootstrap.py line 355:
             Change: assert "tasks" in data["phases"][0]
             To:     assert "tickets" in data["phases"][0]
             Also update the fixture data that constructs phases with "tasks" key
             to use "tickets" instead.

          2. test_bootstrap_planner_workflow.py line 148:
             Change: assert "tasks" in plan_data["phases"][0]
             To:     assert "tickets" in plan_data["phases"][0]
             Also update fixture data.

          3. test_plan_creation_flow.py line 209:
             Change: total_tasks = sum(len(p.get("tasks", [])) for p in phases)
             To:     total_tasks = sum(len(p.get("tickets", p.get("tasks", []))) for p in phases)

          IMPORTANT: For each assertion change, also find the test fixture/data
          that populates the phases and update the key from "tasks" to "tickets".
          The test should validate the canonical schema.
        success_criteria:
          - "All test assertions check for 'tickets' key (not 'tasks')"
          - "Test fixture data constructs phases with 'tickets' key"
          - "All existing tests still pass"

  # ----------------------------------------
  # PHASE 3: Validation
  # ----------------------------------------
  - name: "Validation Phase"
    execution: sequential
    description: |
      Run the full test suites for both modules to verify no regressions.
      Also verify the fix works end-to-end by checking that the
      260303AG epic correctly shows its pending ticket counts.
    tickets:
      - id: "val_001"
        name: "Run AgenticGuidance test suite"
        description: "Run full pytest suite for AgenticGuidance module"
        status: "pending"
        agent: "test-runner"
        loop: "test-fix-loop"
        target_files:
          - "modules/AgenticGuidance/tests/"
        guidance: |
          Run: cd modules/AgenticGuidance && python3 -m pytest tests/ -x -q
          All tests must pass. If any fail due to the "tasks" → "tickets"
          migration, fix the root cause (not the test).
        success_criteria:
          - "All AgenticGuidance tests pass"
          - "No new test failures introduced"

