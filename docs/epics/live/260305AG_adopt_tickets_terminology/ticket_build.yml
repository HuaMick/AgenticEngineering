  # ----------------------------------------
  # PHASE 4: UAT — Story-anchored acceptance tests
  # ----------------------------------------
  - name: "UAT Phase"
    execution: sequential
    description: |
      User acceptance tests that validate the fix from the user's perspective,
      anchored to the affected stories. Run real CLI binary commands (no mocking)
      to confirm that ticket counts displayed in the CLI are correct.
    tickets:
      - id: "uat_001"
        name: "UAT — agentic epic list and show display correct ticket counts"
        description: |
          Verify end-to-end that `agentic epic list` and `agentic epic show`
          correctly display pending and done ticket counts after the tasks->tickets
          key migration. This validates US-CLI-012 (View Epic Status) and
          US-CLI-013 (List All Epics).
        status: "pending"
        agent: "test-runner"
        affected_stories:
          - "US-CLI-012"  # View Epic Status — ticket counts must be correct
          - "US-CLI-013"  # List All Epics — pending/done counts must reflect actual YAML data
        story_traceability:
          US-CLI-012: "agentic epic show displays correct pending/done counts for a real epic"
          US-CLI-013: "agentic epic list shows non-zero pending counts for epics with tickets key"
        target_files: []
        inputs:
          - "docs/epics/live/260305AG_adopt_tickets_terminology/ticket_build.yml"
        guidance: |
          Run real CLI binary commands only — do NOT mock or simulate.

          STEP 1 — List all epics and capture counts:
            Run: agentic epic list
            Verify: 260303AG_reduce_orchestration_context_overflow shows pending > 0 (expected: 8)
            Verify: No epics that have tickets in their YAML show 0 pending when they should not

          STEP 2 — Show a specific epic:
            Run: agentic epic show 260303AG_reduce_orchestration_context_overflow
            Verify: Pending ticket count matches actual tickets in its phase YAML (expected: 8)
            Verify: Done count is accurate

          STEP 3 — Confirm current epic counts are self-consistent:
            Run: agentic epic list
            Verify: This epic (260305AG) shows its own ticket counts correctly

          ACCEPTANCE GATE:
          - `agentic epic list` shows correct pending counts (not 0) for epics using the tickets key
          - `agentic epic show` displays correct breakdown for at least one verified epic
          - No regression: epics that previously showed correct counts still do
        success_criteria:
          - "US-CLI-012: agentic epic show displays correct pending and done counts for 260303AG epic"
          - "US-CLI-013: agentic epic list shows pending count of 8 (not 0) for 260303AG epic"
          - "No epics show incorrect counts after the migration"
          - "Real CLI binary executed — no mocking or simulation used"

