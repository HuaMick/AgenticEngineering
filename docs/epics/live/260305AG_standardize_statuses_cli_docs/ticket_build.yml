name: standardize_statuses_cli_docs
worktree_path: ''
branch: plan-standardize-epic-and-ticket-statuses-improve-cli-h
status: active
priority: high
objective: 'Standardize epic and ticket statuses from 10+ ad-hoc strings to 3 canonical

  values (proposed, in_progress, completed). Simplify the agentic epic list

  table, improve --help text, and scaffold a build-agentic-docs agent.

  '
created: ''
phases:
- name: Core Status Enums & Migration
  execution: sequential
  description: Add EpicStatus enum, normalize function, update TicketStatus, update
    repository defaults
  tickets:
  - id: T1_1
    name: Create EpicStatus enum and migration map
    description: 'Add EpicStatus enum to epic.py with PROPOSED/IN_PROGRESS/COMPLETED.

      Add EPIC_STATUS_MIGRATION dict mapping all 10+ old strings to new values.

      Add normalize_epic_status() helper function.

      Export from __init__.py.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    success_criteria:
    - EpicStatus enum has exactly 3 values
    - normalize_epic_status('active') returns 'in_progress'
    - normalize_epic_status('approved') returns 'in_progress'
    - normalize_epic_status('pending') returns 'proposed'
  - id: T1_2
    name: Replace valid_statuses lists with enum validation
    description: 'Replace the two valid_statuses list literals (lines 1233, 1396)
      with

      enum-based validation. update_epic_status() accepts old strings via

      normalize_epic_status(). validate_epic() warns on old statuses instead

      of erroring.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    success_criteria:
    - No raw valid_statuses list literals remain
    - update_epic_status with old strings succeeds via normalization
    - validate_epic warns on old statuses, does not error
  - id: T1_3
    name: Rename TicketStatus.PENDING to PROPOSED
    description: 'Rename TicketStatus.PENDING to TicketStatus.PROPOSED with value
      "proposed".

      Add backward-compat: old "pending" string parses to PROPOSED.

      Update get_current_ticket() and all TicketStatus.PENDING references.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    success_criteria:
    - TicketStatus.PROPOSED.value == 'proposed'
    - 'Old YAML with status: pending parses to TicketStatus.PROPOSED'
  - id: T1_4
    name: Update epic_repository.py defaults and lifecycle methods
    description: '- Default status on create: "proposed" (line 220)

      - unarchive_epic(): set "in_progress" instead of "active"

      - cancel_epic(): set "completed" instead of "cancelled"

      - list_epics(status="live"): match proposed/in_progress in OR clause

      - get_ticket_counts(): rename "pending" key to "proposed"

      - add_ticket() default: "proposed"

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    success_criteria:
    - New epics default to 'proposed' status
    - list_epics(status='live') finds proposed and in_progress epics
    - get_ticket_counts returns 'proposed' key not 'pending'
- name: CLI Display Changes
  execution: sequential
  description: Simplify table columns, add --all flag, update format_status colors
  tickets:
  - id: T2_1
    name: Update format_status() for new status values
    description: 'Update format_status() in console.py to handle proposed (dim),

      in_progress (yellow), completed (green). Normalize old values

      before color mapping.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/console.py
    success_criteria:
    - format_status('proposed') returns dim styled text
    - format_status('in_progress') returns yellow styled text
  - id: T2_2
    name: Simplify cmd_list() table and add --all flag
    description: '- Add --all/-a flag to epic_list() in cli.py

      - Filter completed epics by default in cmd_list()

      - Column headers: Epic, Status, Orch, Action, Proposed, Completed

      - Drop Progress column

      - Rename JSON keys: pending -> proposed, drop progress_percent

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/epic.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - agentic epic list shows 6 columns, no Progress
    - completed epics hidden by default
    - agentic epic list --all includes completed epics
- name: Help Text Improvements
  execution: sequential
  description: Improve --help output for epic commands with status definitions
  tickets:
  - id: T3_1
    name: Add status definitions to epic --help
    description: 'Improve the Typer help strings for epic_app, epic_list, epic_status,

      and epic_new commands. Include status definitions (proposed, in_progress,

      completed) in the help text so users understand the lifecycle.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - agentic epic --help shows status definitions
    - agentic epic list --help shows --all flag and status info
- name: Scaffold build-agentic-docs Agent
  execution: parallel
  description: Create the build-agentic-docs agent for future CLI documentation work
  tickets:
  - id: T4_1
    name: Create build-agentic-docs agent files
    description: 'Create manifest.yml, process.yml, inputs.yml under

      modules/AgenticGuidance/agents/build/build-agentic-docs/.

      Register in parent build/manifest.yml.

      Responsibilities: CLI --help text, docstrings, status definitions,

      consistent terminology. Boundaries: no business logic, no tests.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/agents/build/build-agentic-docs/manifest.yml
    - modules/AgenticGuidance/agents/build/build-agentic-docs/process.yml
    - modules/AgenticGuidance/agents/build/build-agentic-docs/inputs.yml
    - modules/AgenticGuidance/agents/build/manifest.yml
    success_criteria:
    - Three YAML files exist in build-agentic-docs/
    - Parent manifest lists the new agent
- name: Testing & Migration
  execution: sequential
  description: Update tests for new status values, migrate existing epics
  tickets:
  - id: T5_1
    name: Update test_services_task.py for TicketStatus.PROPOSED
    description: 'Replace all TicketStatus.PENDING and "pending" references with

      TicketStatus.PROPOSED and "proposed" in test fixtures and assertions.

      Add backward-compat test for old "pending" string.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/tests/test_services_task.py
    success_criteria:
    - pytest test_services_task.py passes 100%
  - id: T5_2
    name: Update TinyDB CRUD and compat tests
    description: 'Update test_uat_tinydb_crud.py and test_uat_tinydb_yaml_compat.py

      for new status strings: "pending"->"proposed", "active"->"in_progress"

      in all fixtures and assertions.

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/tests/test_uat_tinydb_crud.py
    - modules/AgenticGuidance/tests/test_uat_tinydb_yaml_compat.py
    success_criteria:
    - pytest test_uat_tinydb_crud.py passes 100%
    - pytest test_uat_tinydb_yaml_compat.py passes 100%
  - id: T5_3
    name: Add backward-compat migration tests
    description: 'Create test_status_migration.py testing:

      1. YAML with status: "active" normalizes to "in_progress"

      2. YAML with status: "approved" normalizes to "in_progress"

      3. YAML with status: "pending" for ticket -> TicketStatus.PROPOSED

      4. update_epic_status() accepts old strings

      5. validate_epic() warns on old statuses

      '
    status: pending
    agent: build-python
    target_files:
    - modules/AgenticGuidance/tests/test_status_migration.py
    success_criteria:
    - All 5 migration scenarios pass
  - id: T5_4
    name: Migrate existing live epic YAML files
    description: 'Update status values in live epic YAML files:

      - 260305AG_adopt_tickets_terminology: "active" -> "in_progress"

      - 260303AG_reduce_orchestration_context_overflow: "approved" -> "in_progress"

      '
    status: pending
    agent: build-python
    target_files:
    - docs/epics/live/260305AG_adopt_tickets_terminology/ticket_build.yml
    - docs/epics/live/260305AG_adopt_tickets_terminology/plan_build.yml
    - docs/epics/live/260303AG_reduce_orchestration_context_overflow/plan_build.yml
    success_criteria:
    - No YAML files in docs/epics/live/ use old status strings
context: "Current state:\n- Epic statuses are free-form strings with 10+ valid values\
  \ in two duplicate\n  lists (epic.py lines 1233, 1396). No EpicStatus enum exists.\n\
  - Live epics use \"active\" and \"approved\" inconsistently.\n- TicketStatus enum\
  \ has PENDING/IN_PROGRESS/COMPLETED but display says Pending/Done.\n- agentic epic\
  \ list shows 7 columns including a useless Progress % column.\n- agentic epic list\
  \ --help shows no info about statuses or flags.\n- completed epics always shown\
  \ (no way to hide them).\n\nTarget state:\n- EpicStatus enum: PROPOSED, IN_PROGRESS,\
  \ COMPLETED (3 values)\n- TicketStatus enum: PROPOSED replaces PENDING (backward\
  \ compat for \"pending\")\n- agentic epic list: 6 columns (Epic, Status, Orch, Action,\
  \ Proposed, Completed)\n- completed epics hidden by default, --all flag to show\
  \ them\n- --help shows status definitions\n- build-agentic-docs agent scaffolded\
  \ for future CLI docs work\n"
