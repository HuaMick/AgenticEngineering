    name: Add story coverage check to executor validation_gate
    description: ''
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    guidance: 'Add step 9 to validation_gate: For each story in affected_stories,

      read test_status from YAML; if any is untested -> BLOCK with coverage

      percentage and list of untested IDs.

      '
  - id: UF-013
    name: Add --check-fences flag to agentic plan validate
    description: ''
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'Add --check-fences flag to cmd_validate performing 3 checks:

      1. Story discovery: has affected_stories or valid no_stories_rationale

      2. UAT existence: MMD has UAT subgraph

      3. Story coverage: all stories have test_status != untested

      Reuse _collect_all_stories() and _find_story_file_by_id() from stories.py.

      Exit 0 if all pass, exit 1 if any fail.

      '
  - id: UF-014
    name: Create test_plan_validate_fences.py
    description: ''
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/tests/test_plan_validate_fences.py
    guidance: 'pytest tests covering:

      - Plan with all fences passing -> exit 0

      - Missing UAT subgraph -> exit 1

      - Missing stories -> exit 1

      - Partial coverage -> warning

      Use tmp_path fixtures, create mock plan folders with YAML/MMD.

      '
