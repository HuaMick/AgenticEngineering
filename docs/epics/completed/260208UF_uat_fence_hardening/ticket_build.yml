    name: Add test_metadata section to user-stories.yml
    description: ''
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/definitions/user-stories.yml
    guidance: 'Add test_metadata section defining:

      - test_status: enum [untested, pass, fail, skip, regression], default: untested

      - last_tested: ISO 8601 timestamp, nullable

      - test_notes: string, nullable

      - tested_by_plan: string (plan folder name), nullable

      Schema must match what stories.py cmd_update reads/writes.

      '
  - id: UF-010
    name: Add mandatory story update step to test-user-simulator/process.yml
    description: ''
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/test/test-user-simulator/process.yml
    guidance: 'After step at line 147 (report test results), add mandatory step:

      Run `agentic stories update <id> --status <pass|fail> --notes "..." --plan <folder>`

      after each story test, BEFORE reporting results to orchestrator.

      CLI command exists in commands/stories.py.

      '
