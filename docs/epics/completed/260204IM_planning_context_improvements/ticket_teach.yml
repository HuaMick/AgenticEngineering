_template_status: active
plan:
  name: Planning Context Improvements
  worktree: /home/code/AgenticEngineering
  branch: 260204PC-planning-context-improvements
  status: planning
  created: '2026-02-04'
  objective: 'Add "impacted_files" and "impacted_artifacts" sections to planning templates
    and schemas

    to enable better orchestration visibility and parallelization decisions. Update
    planner

    agents to populate these sections during planning, and update existing examples
    to

    demonstrate the pattern.

    '
  scope:
    includes:
    - modules/AgenticGuidance/agents/planner-*/process.yml
    - modules/AgenticGuidance/agents/planner-*/inputs.yml
    - modules/AgenticGuidance/assets/
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    excludes:
    - modules/AgenticGuidance/agents/orchestration/
    - modules/AgenticGuidance/agents/test/
  phases:
  - name: Phase 1 - Schema Enhancement
    id: phase_01
    status: pending
    tasks:
    - id: IM_001
      name: Define impacted_files schema
      status: completed
      description: 'Create schema definition for impacted_files section in planning
        templates.

        Schema should include: path (relative to worktree), change_type (create/modify/delete),

        change_category (implementation/test/config/docs).

        '
      target_files:
      - modules/AgenticGuidance/assets/specifications/plan-schema.yml
    - id: IM_002
      name: Define impacted_artifacts schema
      status: completed
      description: 'Create schema definition for impacted_artifacts section in planning
        templates.

        Schema should include: artifact_type (API/service/CLI command/agent/config),

        artifact_identifier (name/path), impact_type (interface change/behavior change/new
        feature).

        '
      target_files:
      - modules/AgenticGuidance/assets/specifications/plan-schema.yml
  - name: Phase 2 - Template Updates
    id: phase_02
    status: pending
    tasks:
    - id: IM_003
      name: Update planning template with new sections
      status: completed
      description: 'Add impacted_files and impacted_artifacts sections to core planning
        templates

        in AgenticGuidance assets folder.

        '
      target_files:
      - modules/AgenticGuidance/assets/examples/planner/
    - id: IM_004
      name: Update CLI template generation
      status: completed
      description: 'Update plan.py template generation to include impacted_files and
        impacted_artifacts

        sections in generated plan files.

        '
      target_files:
      - modules/AgenticCLI/src/agenticcli/commands/plan.py
  - name: Phase 3 - Agent Guidance Updates
    id: phase_03
    status: pending
    tasks:
    - id: IM_005
      name: Update planner-build guidance
      status: completed
      description: 'Add explicit steps for file/artifact analysis in planner-build
        process.

        Include guidance on populating impacted_files and impacted_artifacts sections.

        '
      target_files:
      - modules/AgenticGuidance/agents/planner/planner-build/process.yml
    - id: IM_006
      name: Update planner-guidance process
      status: completed
      description: 'Add guidance for capturing impacted files/artifacts in teach plans.

        '
      target_files:
      - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
    - id: IM_007
      name: Update planner-test guidance
      status: completed
      description: 'Add guidance for test plans to identify impacted test files and
        artifacts.

        '
      target_files:
      - modules/AgenticGuidance/agents/planner/planner-test/process.yml
  - name: Phase 4 - Example Updates
    id: phase_04
    status: pending
    tasks:
    - id: IM_008
      name: Create example plan with impacted_files
      status: completed
      description: 'Create or update an example plan demonstrating proper use of impacted_files
        section

        with realistic file paths and change types.

        '
      target_files:
      - modules/AgenticGuidance/assets/examples/planner/
    - id: IM_009
      name: Create example plan with impacted_artifacts
      status: completed
      description: 'Create or update an example plan demonstrating proper use of impacted_artifacts

        section with realistic artifact types and impact descriptions.

        '
      target_files:
      - modules/AgenticGuidance/assets/examples/planner/
success_criteria:
- Planning templates include impacted_files and impacted_artifacts sections
- Planner agents have clear guidance on populating these sections
- At least 2 example plans demonstrate the new sections
- CLI plan init generates templates with new sections
