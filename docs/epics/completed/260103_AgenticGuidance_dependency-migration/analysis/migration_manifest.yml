    - test-guidance-simulator (CRITICAL - blocks guidance testing)
    - orchestration-policy.yml (HIGH - policy documentation)
    - test-final-output (HIGH - quality gate)
    - teacher-update-guidance (HIGH - guidance improvement)
    - teacher-update-assets (HIGH - asset management)
