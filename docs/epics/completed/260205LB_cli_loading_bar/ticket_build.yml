name: cli-loading-bar-and-metrics-tests
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
objective: '1. Add progress/loading indicators to the CLI.

  2. Implement an estimation mechanism for context window usage (%).

  3. Show the loading bar during long-running ''session spawn'' commands.

  4. Use 200k tokens as the 100% mark, with a 75% warning threshold.

  '
created: ''
phases:
- name: 'Phase 1: Infrastructure'
  execution: sequential
  description: Add progress bar and token estimation utilities
  tickets:
  - id: LB_001
    name: Add progress bar support to console.py
    description: Expose Rich Progress and Status utilities in the console module
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/console.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/console.py
    guidance: 'Add a `get_progress()` method that returns a configured `rich.progress.Progress`
      instance.

      Add a `get_status(message)` context manager that uses `rich.status.Status`.

      '
    success_criteria:
    - console.py supports progress bars and status indicators
  - id: LB_002
    name: Implement token estimation utility
    description: Create a utility to estimate token usage from text/history
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/console.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tokens.py
    guidance: 'Implement a simple character-to-token heuristic (4 chars = 1 token).

      Define constants for Claude''s context limits:

      - MAX_CONTEXT_TOKENS = 200000

      - RECOMMENDED_MAX_TOKENS = 150000 (75%)

      '
    success_criteria:
    - tokens.py accurately estimates token usage based on character counts
- name: 'Phase 2: CLI Integration'
  execution: sequential
  description: Update commands to use the new indicators
  tickets:
  - id: LB_003
    name: Update session spawn for streaming and progress
    description: Change cmd_spawn to stream output and show a progress bar
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticCLI/src/agenticcli/console.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    guidance: '1. Replace `subprocess.run(capture_output=True)` with `subprocess.Popen`.

      2. Use a loop to read output in real-time.

      3. Print output directly to console while updating a Progress bar.

      4. If --background is NOT used, the bar should show "Working..." and current
      context metrics.

      '
    success_criteria:
    - '''agentic session spawn'' shows real-time output'
    - A progress bar is visible during the operation
  - id: LB_004
    name: Add context metrics to the loading bar
    description: Calculate and display context window % in the progress bar
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticCLI/src/agenticcli/utils/tokens.py
    - ~/.claude/history.jsonl
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    guidance: '1. Before spawning, sum up characters in the session history (or current
      prompt).

      2. Calculate context %: `(estimated_tokens / MAX_CONTEXT_TOKENS) * 100`.

      3. Update the progress bar label with this percentage.

      4. Change bar color to yellow at 75% and red at 90%.

      '
    success_criteria:
    - Loading bar displays '% of context window consumed'
    - Bar colors change based on thresholds
- name: 'Phase 3: Verification'
  execution: sequential
  description: Verify metrics and UI
  tickets:
  - id: LB_005
    name: Manual UAT for loading bar
    description: Run a session and verify the loading bar appears and shows metrics
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    guidance: '1. Spawn a test-user-simulator agent.

      2. The agent should run ''agentic session spawn'' with a short prompt.

      3. Note: The loading bar is part of the terminal output and will be captured
      in the agent''s context window.

      4. The agent must verify that the progress bar and metrics are visible in its
      own session log/context.

      '
    success_criteria:
    - Loading bar is visible in the terminal output/context
    - Metric % matches expected usage
- name: 'Phase 4: Documentation & Compliance'
  execution: sequential
  description: Update user stories and documentation
  tickets:
  - id: LB_006
    name: Update User Stories for feedback metrics
    description: Create/Update user stories to include loading bar and context metrics
      requirements
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticGuidance/userstories/AgenticCLI/01_feedback_metrics.yml
    guidance: '1. Create a new user story file for AgenticCLI feedback metrics.

      2. Include a story for "Real-time Progress Visibility" during long-running tasks.

      3. Include a story for "Context Window Awareness" to prevent context rot.

      4. Ensure stories follow the schema in modules/AgenticGuidance/assets/definitions/user-stories.yml.

      '
    success_criteria:
    - New user story file exists with relevant stories
    - Stories include success criteria for loading bar visibility and metric accuracy
- name: 'Phase 1: Unit Testing'
  execution: sequential
  tickets:
  - id: UNIT_001
    name: Test token estimation
    description: Verify tokens.py heuristic matches expected character-to-token ratios
    status: completed
    agent: test-builder
    target_files:
    - modules/AgenticCLI/tests/test_tokens.py
    success_criteria:
    - 1000 characters =~ 250 tokens
    - Handles empty strings and edge cases
- name: 'Phase 2: Functional Testing'
  execution: sequential
  tickets:
  - id: FUNC_001
    name: Test streaming output
    description: Verify that 'session spawn' doesn't buffer output until completion
    status: completed
    agent: test-builder
    guidance: '1. Use an agent to spawn ''agentic session spawn''.

      2. The agent should be able to see the output streaming in its own terminal/context
      window before the process exits.

      '
    success_criteria:
    - Output is printed as it arrives from the process
  - id: FUNC_002
    name: Test progress bar thresholds
    description: Mock token usage to trigger yellow/red bar states
    status: completed
    agent: test-builder
    guidance: '1. Mock the token estimation to return values > 150,000.

      2. Verify the terminal output captured by the agent reflects the color/style
      changes in the loading bar.

      '
    success_criteria:
    - Bar is cyan at 10%
    - Bar is yellow at 76%
    - Bar is red at 91%
context: 'The current ''agentic session spawn'' command captures output until completion,

  leaving the user without feedback on progress or context window usage.

  This plan addresses this by implementing a streaming approach with a

  Rich progress bar and context metrics.

  '
