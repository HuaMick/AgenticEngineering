    guidance: |
      1. Add helper function _spawn_diagnostic_planner(stuck_session: dict) -> Optional[str]:
         """Spawn a diagnostic planner for a stuck session. Returns new session ID or None."""

         # Check if already spawned
         if stuck_session.get("diagnostic_spawned", False):
             return None

         session_id = stuck_session["session_id"]
         prompt = f'''Your role is DIAGNOSTIC PLANNER. A session has become stuck/unhealthy.

      ## Stuck Session Details
      - Session ID: {session_id[:8]}
      - Started: {stuck_session.get("started_at", "unknown")}
      - Status: {stuck_session.get("status", "unknown")}
      - PID: {stuck_session.get("pid", "unknown")}
      - Prompt excerpt: {stuck_session.get("prompt", "")[:200]}...

      ## Your Task
      1. Investigate what went wrong (check logs at ~/.agentic/sessions/logs/{session_id}.*.log)
      2. Determine if this is a one-off or systemic issue
      3. If systemic, create a planning folder to address the root cause
      4. If one-off, document findings and exit

      Exit when investigation is complete.'''

         # Spawn with low max_turns (diagnostic should be quick)
         from .session import cmd_spawn
         from types import SimpleNamespace

         args = SimpleNamespace(
             prompt=prompt,
             max_turns=10,  # Limit diagnostic scope
             background=True,
             working_dir=stuck_session.get("working_dir", "."),
             resume=None,
             dangerously_skip_permissions=True,
         )

         # This returns the new session_id
         result = cmd_spawn(args, ctx=None)
         new_session_id = result  # Assuming cmd_spawn returns session ID

         # Mark the original session as having diagnostic spawned
         sessions_dir = _get_sessions_dir()
         session_path = sessions_dir / f"{session_id}.json"
         if session_path.exists():
             data = json.loads(session_path.read_text())
             data["diagnostic_spawned"] = True
             data["diagnostic_session_id"] = new_session_id
             session_path.write_text(json.dumps(data, indent=2))

         return new_session_id

