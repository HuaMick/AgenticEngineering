    - to_dict/from_dict handle new fields with backward compatibility
    - refresh_activity updates fields from filesystem state

  - id: SM_002
    name: Fix log file descriptor management in cmd_spawn
    description: |
      Fix the background spawn to properly manage log file descriptors.
      Currently files are opened but never explicitly closed, which can cause
      empty logs if the process dies before Python GC runs.
    status: pending
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    guidance: |
      In cmd_spawn background mode (around lines 337-354):

      1. After subprocess.Popen(), close the file handles immediately:
         ```
         stdout_log = open(logs_dir / f"{session_id}.stdout.log", "w")
         stderr_log = open(logs_dir / f"{session_id}.stderr.log", "w")
         try:
             process = subprocess.Popen(
                 cmd, cwd=working_dir,
                 stdin=subprocess.DEVNULL,
                 stdout=stdout_log, stderr=stderr_log,
                 start_new_session=True,
             )
         finally:
             stdout_log.close()
             stderr_log.close()
         ```
         The subprocess inherits the file descriptors, so closing them in the
         parent process is correct - the child process still writes to them.

      2. After saving session JSON, write a verification check:
         - Wait 1 second (time.sleep(1))
         - Check if process is still running via _is_process_running(pid)
         - If not running, update status to "failed" and warn user
         - This catches immediate spawn failures

      3. Set last_activity = started_at in the session data dict when saving
    success_criteria:
    - Log file handles are explicitly closed after Popen
    - Immediate spawn failure is detected within 1 second
    - last_activity is set on spawn
    - No change to existing foreground mode behavior

  - id: SM_003
    name: Add _check_session_health helper function
    description: |
      Create a reusable health check function that evaluates multiple signals
      to determine session vitality. This will be used by both the health
      command and the list command.
    status: pending
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticGuidance/src/agenticguidance/services/claude_session.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    guidance: |
      Add function near the other helpers (after _update_session_status):

      def _check_session_health(session: dict) -> dict:
          """Evaluate session health from multiple signals.

          Returns dict with:
            healthy: bool - overall health status
            signals: list[dict] - individual health signals
            stale: bool - True if session appears stuck
            stale_minutes: int - minutes since last activity
          """

          signals = []
          session_id = session.get("session_id", "")
          pid = session.get("pid")
          status = session.get("status", "")

          # Signal 1: PID alive check
          pid_alive = _is_process_running(pid) if pid else False
          signals.append({
              "name": "pid_alive",
              "ok": pid_alive,
              "detail": f"PID {pid} {'alive' if pid_alive else 'dead'}"
          })

          # Signal 2: Log file size check
          logs_dir = _get_logs_dir()
          stdout_path = logs_dir / f"{session_id}.stdout.log"
          stderr_path = logs_dir / f"{session_id}.stderr.log"
          stdout_bytes = stdout_path.stat().st_size if stdout_path.exists() else 0
          stderr_bytes = stderr_path.stat().st_size if stderr_path.exists() else 0
          total_bytes = stdout_bytes + stderr_bytes
          has_output = total_bytes > 0
          signals.append({
              "name": "has_output",
              "ok": has_output,
              "detail": f"Log size: {total_bytes} bytes (stdout={stdout_bytes}, stderr={stderr_bytes})"
          })

          # Signal 3: Log file recency (mtime)
          log_mtime = None
          for p in [stdout_path, stderr_path]:
              if p.exists():
                  mtime = p.stat().st_mtime
                  if log_mtime is None or mtime > log_mtime:
                      log_mtime = mtime
          if log_mtime:
              minutes_since_write = (time.time() - log_mtime) / 60
          else:
              # Fall back to started_at
              started_at = session.get("started_at", "")
              if started_at:
                  try:
                      dt = datetime.fromisoformat(started_at)
                      minutes_since_write = (datetime.now() - dt).total_seconds() / 60
                  except ValueError:
                      minutes_since_write = 999
              else:
                  minutes_since_write = 999

          stale_threshold = 10  # minutes
          is_stale = status == "running" and minutes_since_write > stale_threshold
          signals.append({
              "name": "recent_activity",
              "ok": not is_stale,
              "detail": f"Last activity: {int(minutes_since_write)}m ago"
          })

          # Overall health
          healthy = pid_alive and (has_output or status != "running")
          stale = is_stale

          return {
              "healthy": healthy,
              "signals": signals,
              "stale": stale,
              "stale_minutes": int(minutes_since_write),
          }

      Import time at top of file if not already imported.
    success_criteria:
    - Function checks PID, log size, and log recency
    - Returns structured health dict
    - Stale detection uses 10-minute threshold
    - Handles missing files and edge cases gracefully

