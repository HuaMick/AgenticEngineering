    guidance: |
      1. In session.py, add cmd_health function:

      def cmd_health(args, ctx=None):
          """Check health/vitality of a session."""
          session_id_prefix = getattr(args, "session_id", "")
          json_output = getattr(args, "json_output", False)

          sessions_dir = _get_sessions_dir()
          # Resolve partial ID (same pattern as cmd_status)
          matches = [f for f in sessions_dir.glob("*.json")
                     if f.stem.startswith(session_id_prefix)]
          if not matches:
              console.print(f"[red]No session found matching '{session_id_prefix}'[/red]")
              return
          if len(matches) > 1:
              console.print(f"[red]Ambiguous ID '{session_id_prefix}' matches {len(matches)} sessions[/red]")
              return

          session = json.loads(matches[0].read_text())
          _update_session_status(session, matches[0])

          health = _check_session_health(session)

          if json_output:
              print(json.dumps({"session_id": session["session_id"], **health}, indent=2))
              return

          # Rich display
          console.print(f"\n[bold]Session Health: {session['session_id'][:8]}[/bold]")
          console.print(f"Status: {session.get('status', 'unknown')}")
          console.print(f"PID: {session.get('pid', 'N/A')}")
          console.print()

          for signal in health["signals"]:
              icon = "[green]OK[/green]" if signal["ok"] else "[red]FAIL[/red]"
              console.print(f"  {icon}  {signal['name']}: {signal['detail']}")

          console.print()
          if health["healthy"] and not health["stale"]:
              console.print("[green bold]Verdict: HEALTHY[/green bold]")
          elif health["stale"]:
              console.print(f"[yellow bold]Verdict: STALE ({health['stale_minutes']}m since last activity)[/yellow bold]")
          else:
              console.print("[red bold]Verdict: UNHEALTHY[/red bold]")

      2. In session.py handle() router, add:
         elif sub == "health":
             cmd_health(args, ctx)

      3. In cli.py, register the health command:
         @session_app.command("health")
         def session_health(
             session_id: Annotated[str, typer.Argument(help="Session ID (or prefix)")],
             json_output: Annotated[bool, typer.Option("-j", "--json", help="JSON output")] = False,
         ):
             """Check health and vitality of a session."""
             _session_handle(_ns(command="session", session_command="health",
                                 session_id=session_id, json_output=json_output))
    success_criteria:
    - 'agentic session health <id>' displays PID, log, activity health signals
    - Shows HEALTHY/STALE/UNHEALTHY verdict
    - JSON output mode works with -j flag
    - Partial ID matching works

  - id: SM_005
    name: Add 'agentic session logs' command
    description: |
      New command to view stdout/stderr logs for a session. Supports
      --follow (tail -f), --stderr (show stderr instead of stdout),
      and --lines N (last N lines).
    status: pending
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: |
      1. In session.py, add cmd_logs function:

      def cmd_logs(args, ctx=None):
          """View logs for a session."""
          session_id_prefix = getattr(args, "session_id", "")
          show_stderr = getattr(args, "stderr", False)
          num_lines = getattr(args, "lines", 50)
          follow = getattr(args, "follow", False)

          sessions_dir = _get_sessions_dir()
          # Resolve partial ID
          matches = [f for f in sessions_dir.glob("*.json")
                     if f.stem.startswith(session_id_prefix)]
          if not matches:
              console.print(f"[red]No session found matching '{session_id_prefix}'[/red]")
              return
          if len(matches) > 1:
              console.print(f"[red]Ambiguous ID '{session_id_prefix}' matches {len(matches)} sessions[/red]")
              return

          session = json.loads(matches[0].read_text())
          logs_dir = _get_logs_dir()
          suffix = "stderr" if show_stderr else "stdout"
          log_path = logs_dir / f"{session['session_id']}.{suffix}.log"

          if not log_path.exists():
              console.print(f"[yellow]No {suffix} log file found for session {session['session_id'][:8]}[/yellow]")
              return

          file_size = log_path.stat().st_size
          if file_size == 0:
              console.print(f"[yellow]{suffix} log is empty (0 bytes) for session {session['session_id'][:8]}[/yellow]")
              return

          if follow:
              # Use subprocess to tail -f
              import subprocess as sp
              try:
                  sp.run(["tail", "-f", str(log_path)], check=False)
              except KeyboardInterrupt:
                  pass
              return

          # Read last N lines
          lines = log_path.read_text().splitlines()
          display_lines = lines[-num_lines:] if len(lines) > num_lines else lines
          if len(lines) > num_lines:
              console.print(f"[dim]... showing last {num_lines} of {len(lines)} lines ...[/dim]")
          for line in display_lines:
              console.print(line)

      2. In session.py handle() router, add:
         elif sub == "logs":
             cmd_logs(args, ctx)

      3. In cli.py, register the logs command:
         @session_app.command("logs")
         def session_logs(
             session_id: Annotated[str, typer.Argument(help="Session ID (or prefix)")],
             stderr: Annotated[bool, typer.Option("--stderr", help="Show stderr instead of stdout")] = False,
             lines: Annotated[int, typer.Option("-n", "--lines", help="Number of lines to show")] = 50,
             follow: Annotated[bool, typer.Option("-f", "--follow", help="Follow log output (tail -f)")] = False,
         ):
             """View stdout/stderr logs for a session."""
             _session_handle(_ns(command="session", session_command="logs",
                                 session_id=session_id, stderr=stderr,
                                 lines=lines, follow=follow))
    success_criteria:
    - 'agentic session logs <id>' shows last 50 lines of stdout
    - --stderr shows stderr log instead
    - -n 100 shows last 100 lines
    - -f follows the log (tail -f)
    - Handles missing/empty log files gracefully

