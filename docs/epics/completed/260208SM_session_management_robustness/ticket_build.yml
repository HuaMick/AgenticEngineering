name: session-management-robustness
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
context: |
  A spawned session (3f12baeb) ran for 57 minutes but got stuck with empty logs,
  missing tmux session, stale 'running' status, and no mechanism to detect the failure.

  Root causes: no heartbeat/watchdog, log file descriptor leak (files opened but never
  explicitly closed), no tmux existence check in status, and no stale session detection.

  Key files:
  - modules/AgenticCLI/src/agenticcli/commands/session.py (CLI commands, ~800 lines)
  - modules/AgenticCLI/src/agenticcli/cli.py (Typer command registration)
  - modules/AgenticGuidance/src/agenticguidance/services/claude_session.py (SessionStateService)
  - modules/AgenticGuidance/src/agenticguidance/services/session.py (tmux SessionService)

  Current session spawning (cmd_spawn background mode, lines ~337-354):
  - Opens stdout/stderr log files with open() but never explicitly closes them
  - Passes file handles to subprocess.Popen with start_new_session=True
  - Saves session JSON with status="running" but never updates it again
  - _update_session_status() only checks if PID is alive via os.kill(pid, 0)

  SessionStateService (claude_session.py):
  - SessionEntry dataclass with status, pid, started_at, ended_at fields
  - cleanup_dead_processes() marks dead PIDs as FAILED
  - No last_activity or heartbeat tracking
  - No log file size monitoring

  Session JSON stored at: ~/.agentic/sessions/{session_id}.json
  Log files at: ~/.agentic/sessions/logs/{session_id}.stdout.log and .stderr.log

objective: |
  Make session management robust against stuck/zombie sessions by:
  1. Tracking last_activity timestamp in session JSON
  2. Fixing log file descriptor management (proper close after spawn)
  3. Adding `agentic session health <id>` command for detailed vitality check
  4. Adding `agentic session logs <id>` command for log viewing
  5. Showing stale warnings in `agentic session list` for sessions with no recent activity
  6. Adding tmux session existence check to status/health commands

