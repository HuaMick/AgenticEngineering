phases:
- name: 'Phase 1: Session Health Infrastructure'
  execution: sequential
  description: |
    Add last_activity tracking to SessionEntry, fix log file descriptor management
    in cmd_spawn, and add log size monitoring. This is the foundation for all
    subsequent health detection features.

  tasks:
  - id: SM_001
    name: Add last_activity and log_bytes fields to SessionEntry
    description: |
      Extend SessionEntry dataclass in claude_session.py with:
      - last_activity: Optional[str] = None (ISO timestamp of last known activity)
      - log_bytes: Optional[int] = None (combined stdout+stderr log file size)
      These fields enable stale detection and log monitoring.
    status: pending
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/claude_session.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/claude_session.py
    guidance: |
      1. Add to SessionEntry dataclass (after exit_code field):
         last_activity: Optional[str] = None
         log_bytes: Optional[int] = None

      2. Update SessionEntry.to_dict() to include the new fields

      3. Update SessionEntry.from_dict() to load the new fields with defaults

      4. Add method SessionEntry.update_activity(timestamp: Optional[str] = None)
         - Sets last_activity to provided timestamp or datetime.now().isoformat()

      5. Add method to SessionStateService:
         def refresh_activity(self, session_id: str) -> Optional[SessionEntry]:
           """Update last_activity and log_bytes from filesystem state."""
           - Load session
           - Check log file sizes at session's stdout_log and stderr_log paths
           - Set log_bytes = sum of both file sizes
           - Set last_activity = max(file mtime of log files, current last_activity)
           - Save and return updated session
    success_criteria:
