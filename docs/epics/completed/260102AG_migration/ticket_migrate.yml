live-plans:
  - id: AG-MIGRATION-001
    title: Migrate _plan.yml Entrypoint and Dependencies
    description: |
      Complete migration of the planning entrypoint from legacy MyAgentsGuidance to the
      new AgenticGuidance module. Includes all referenced guidelines, definitions, and examples.

    phases:
      # ========================================
      # PHASE 1: ANALYSIS
      # ========================================
      - name: Analysis Phase
        status: complete
        execution_groups:
          - execution: sequential
            name: Dependency mapping
            agents:
              - type: analysis
                inputs:
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/entrypoints/_plan.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/definitions/plans.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/definitions/guidance.yml
                guidance: |
                  Context: Need to understand all dependencies of _plan.yml before migration.

                  Instructions:
                  1. Parse _plan.yml and extract all referenced file paths from inputs section
                  2. Map each dependency to its source location in legacy folder
                  3. Identify the target folder structure in AgenticGuidance
                  4. Document any agent dependencies (should be none for _plan.yml)

                  Why this matters: Complete dependency mapping prevents broken references after migration.
                success_criteria:
                  - All 6 guideline files identified (fix-the-source, experiment-first, context-minimisation, worktree-and-branching, response-audit, iteration)
                  - All 2 definition files identified (plans.yml, guidance.yml)
                  - All 3 example files identified (plan_live_teach, plan_live_test, plan_live_audit_clean)
                  - Target folder structure documented

        completed_items:
          - id: ANALYSIS-001
            completed: 2026-01-02
            description: "Mapped all dependencies of _plan.yml - 6 guidelines, 2 definitions, 3 examples"

      # ========================================
      # PHASE 2: ASSET MIGRATION
      # ========================================
      - name: Asset Migration Phase
        status: complete
        execution_groups:
          - execution: parallel
            name: Migrate guidelines
            agents:
              - type: build
                inputs:
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/guidelines/fix-the-source.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/guidelines/experiment-first.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/guidelines/context-minimisation.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/guidelines/worktree-and-branching.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/guidelines/response-audit.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/guidelines/iteration.yml
                guidance: |
                  Context: Guidelines are referenced by _plan.yml and must be migrated first.

                  Instructions:
                  1. Copy each guideline file to modules/AgenticGuidance/assets/guidelines/
                  2. Preserve file names exactly
                  3. Review content for any absolute path references that need updating
                  4. Update any internal references if present

                  Target location: /home/code/AgenticEngineering/modules/AgenticGuidance/assets/guidelines/

                  Why this matters: Guidelines provide context engineering for the planner agent.
                success_criteria:
                  - All 6 guideline files exist in target location
                  - File content preserved exactly (unless paths needed updating)
                  - No broken internal references

          - execution: parallel
            name: Migrate definitions
            agents:
              - type: build
                inputs:
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/definitions/plans.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/definitions/guidance.yml
                guidance: |
                  Context: Definitions describe planning structures and guidance formats.

                  Instructions:
                  1. Copy each definition file to modules/AgenticGuidance/assets/definitions/
                  2. Preserve file names exactly
                  3. Review for any absolute path references

                  Target location: /home/code/AgenticEngineering/modules/AgenticGuidance/assets/definitions/

                  Why this matters: Definitions are essential for plan structure compliance.
                success_criteria:
                  - Both definition files exist in target location
                  - File content preserved correctly

          - execution: parallel
            name: Migrate examples
            agents:
              - type: build
                inputs:
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_teach.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml
                guidance: |
                  Context: Example plans provide templates for the planner agent.

                  Instructions:
                  1. Create folder structure: modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/
                  2. Copy each example file preserving the nested folder structure
                  3. Preserve file content exactly (these are templates)

                  Target location: /home/code/AgenticEngineering/modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/

                  Why this matters: Examples teach correct plan structure through demonstration.
                success_criteria:
                  - All 3 example files exist in correct nested folder structure
                  - File content preserved exactly

        completed_items:
          - id: ASSET-001
            completed: 2026-01-02
            description: "Migrated 6 guideline files to assets/guidelines/"
          - id: ASSET-002
            completed: 2026-01-02
