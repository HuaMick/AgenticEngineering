      # ========================================
      # PHASE 3: CORE MIGRATION
      # ========================================
      - name: Core Migration Phase
        status: complete
        execution_groups:
          - execution: sequential
            name: Migrate _plan.yml with path updates
            agents:
              - type: build
                inputs:
                  - modules/legacy/MyAgents/projects/MyAgentsGuidance/entrypoints/_plan.yml
                guidance: |
                  Context: _plan.yml is the main entrypoint. Must update internal paths.

                  Instructions:
                  1. Copy _plan.yml to modules/AgenticGuidance/entrypoints/
                  2. Update all input paths from "assets/..." to "../assets/..."
                     (because _plan.yml is in entrypoints/ subdirectory)
                  3. Verify each referenced file exists in the target location

                  Path updates required:
                  - "assets/guidelines/fix-the-source.yml" -> "../assets/guidelines/fix-the-source.yml"
                  - "assets/guidelines/experiment-first.yml" -> "../assets/guidelines/experiment-first.yml"
                  - "assets/guidelines/context-minimisation.yml" -> "../assets/guidelines/context-minimisation.yml"
                  - "assets/guidelines/worktree-and-branching.yml" -> "../assets/guidelines/worktree-and-branching.yml"
                  - "assets/guidelines/response-audit.yml" -> "../assets/guidelines/response-audit.yml"
                  - "assets/guidelines/iteration.yml" -> "../assets/guidelines/iteration.yml"
                  - "assets/definitions/plans.yml" -> "../assets/definitions/plans.yml"
                  - "assets/definitions/guidance.yml" -> "../assets/definitions/guidance.yml"
                  - "assets/examples/planner/..." -> "../assets/examples/planner/..."

                  Target location: /home/code/AgenticEngineering/modules/AgenticGuidance/entrypoints/_plan.yml

                  Why this matters: Correct paths ensure the entrypoint can locate all dependencies.
                success_criteria:
                  - _plan.yml exists in target entrypoints/ folder
                  - All 11 input paths updated with "../" prefix
                  - All referenced files resolve correctly from entrypoints/ directory

