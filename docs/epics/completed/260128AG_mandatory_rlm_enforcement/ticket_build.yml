- name: Mandate RLM in Friction Orchestration
  tickets:
  - id: FRLM-001
    name: Add RLM Validation Gate to orchestration-friction/process.mmd
    description: "Insert a validation gate after TraceQuery_SG and before FrictionDetection_SG.\n\
      Logic:\n- Check if trace count > 100\n- If yes, verify RLM variables (CONTEXT_*,\
      \ ACCUMULATOR_*) are present in session state.\n- If missing, trigger \"Error:\
      \ RLM Required\".\n- RECOVERY: Following agent loop patterns, the orchestrator\
      \ MUST NOT hard-fail. \n  Instead, it should return the error to the sub-agent\
      \ loop with a directive to \n  \"Retry analysis using RLM decomposition patterns\
      \ as mandated by process.yml\".\n  The loop continues until compliance is met\
      \ or max retries exceeded.\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd
