name: 260208EP - Error-Driven Planning Handoff (Test)
worktree_path: ''
branch: ''
status: pending
priority: medium
objective: 'Validate that the error-driven planning protocol is correctly integrated

  across all agent guidance files and that the protocol produces expected

  behavior when agents encounter out-of-scope errors.

  '
created: ''
phases:
- name: Create Protocol Asset
  execution: sequential
  description: 'Create the error-driven-planning-protocol.yml shared asset that defines

    the formal protocol for when and how agents spawn remediation planning folders.

    '
  tickets:
  - id: T_B001
    name: Create error-driven-planning-protocol.yml
    description: "Create: modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml\n\
      \nStructure the file with these sections:\n\nerror_driven_planning_protocol:\n\
      \  definition: |\n    Protocol for agents to spawn new planning folders when\
      \ they discover\n    errors outside the scope of their current plan execution.\n\
      \n  scope: |\n    This protocol applies to ALL agent types during plan execution.\n\
      \    It complements (does not replace) existing feedback triggers.\n\n  decision_criteria:\n\
      \    spawn_new_plan:\n      description: \"When to create a NEW planning folder\"\
      \n      conditions:\n        - \"Error is NOT in the current plan's target_files\"\
      \n        - \"Error pre-dates the current plan (was already broken)\"\n    \
      \    - \"Error affects modules/packages outside current plan scope\"\n     \
      \   - \"Error reveals systemic infrastructure issues\"\n        - \"Error involves\
      \ missing or misconfigured dependencies\"\n        - \"Test failures exist for\
      \ code not touched by current plan\"\n        - \"CI/CD configuration drift\
      \ unrelated to current changes\"\n\n    use_existing_triggers:\n      description:\
      \ \"When to use standard feedback triggers instead\"\n      conditions:\n  \
      \      - \"Error is in current plan's target_files or success criteria\"\n \
      \       - \"Error was caused by changes made during current plan execution\"\
      \n        - \"Error is a known iteration scenario (test-fix-loop, build retry)\"\
      \n        - \"Previous plan iteration already addressed the same error type\"\
      \n\n  protocol_steps:\n    step_1_capture_context:\n      name: \"Capture Error\
      \ Context\"\n      fields:\n        error_type:\n          type: \"enum\"\n\
      \          values:\n            - \"pre_existing_debt\"\n            - \"systemic_issue\"\
      \n            - \"missing_dependency\"\n            - \"configuration_drift\"\
      \n            - \"test_infrastructure\"\n            - \"import_boundary\"\n\
      \            - \"cross_module_breakage\"\n          description: \"Classification\
      \ of the out-of-scope error\"\n        error_details:\n          type: \"string\"\
      \n          description: \"Full error output or description\"\n        discovery_context:\n\
      \          type: \"string\"\n          description: \"What the agent was doing\
      \ when it found the error\"\n        affected_files:\n          type: \"array<string>\"\
      \n          description: \"Files involved in the error\"\n        current_plan:\n\
      \          type: \"string\"\n          description: \"Plan folder being executed\
      \ (for reference)\"\n        priority:\n          type: \"enum\"\n         \
      \ values: [\"CRITICAL\", \"HIGH\", \"MEDIUM\", \"LOW\"]\n          description:\
      \ \"How urgently this needs remediation\"\n\n    step_2_classify_priority:\n\
      \      name: \"Classify Priority\"\n      levels:\n        CRITICAL:\n     \
      \     description: \"Blocks current plan execution\"\n          action: \"Spawn\
      \ plan immediately, may pause current execution\"\n          examples:\n   \
      \         - \"Import error prevents build from compiling at all\"\n        \
      \    - \"Shared fixture corruption breaks all tests\"\n        HIGH:\n     \
      \     description: \"Degrades plan quality but doesn't block\"\n          action:\
      \ \"Spawn plan, continue current execution\"\n          examples:\n        \
      \    - \"Pre-existing test failures inflate failure count\"\n            - \"\
      Dependency version conflict causes intermittent errors\"\n        MEDIUM:\n\
      \          description: \"Technical debt discovered during work\"\n        \
      \  action: \"Spawn plan, continue current execution\"\n          examples:\n\
      \            - \"Outdated configuration files found\"\n            - \"Dead\
      \ code or unused imports in related modules\"\n        LOW:\n          description:\
      \ \"Minor issues worth tracking\"\n          action: \"Log in output, optionally\
      \ spawn plan\"\n          examples:\n            - \"Style inconsistencies in\
      \ files not being modified\"\n            - \"Missing type hints in adjacent\
      \ code\"\n\n    step_3_report_in_output:\n      name: \"Report in Agent Output\"\
      \n      description: |\n        Include out-of-scope errors in the agent's standard\
      \ output.\n        The orchestrator reads these and handles planning folder\
      \ creation.\n      output_fields:\n        out_of_scope_error: true\n      \
      \  remediation_plan_needed: true\n        error_context:\n          error_type:\
      \ \"<classification>\"\n          error_details: \"<details>\"\n          affected_files:\
      \ [\"<files>\"]\n          suggested_plan_name: \"YYMMDDER_<type>_<description>\"\
      \n          priority: \"<level>\"\n\n  naming_convention:\n    pattern: \"YYMMDDER_<error_type>_<brief_description>\"\
      \n    code: \"ER\"\n    code_meaning: \"Error Remediation\"\n    examples:\n\
      \      - name: \"260208ER_import_errors_agenticguidance_services\"\n       \
      \ error_type: \"import_boundary\"\n        context: \"Build agent found broken\
      \ imports in services module\"\n      - name: \"260208ER_test_debt_cli_commands\"\
      \n        error_type: \"pre_existing_debt\"\n        context: \"Test runner\
      \ found 12 pre-existing test failures in CLI\"\n      - name: \"260208ER_cicd_drift_dockerfile_sync\"\
      \n        error_type: \"configuration_drift\"\n        context: \"Deploy agent\
      \ found Dockerfile.test out of sync\"\n      - name: \"260208ER_missing_dep_pyyaml_version\"\
      \n        error_type: \"missing_dependency\"\n        context: \"Build agent\
      \ found PyYAML version conflict\"\n\n  integration_points:\n    with_feedback_triggers:\
      \ |\n      ERROR_REQUIRES_PLANNING is a new feedback trigger type.\n      Unlike\
      \ TEST_FAILURE/BUILD_FAILURE which cause RE-PLANNING of the current plan,\n\
      \      ERROR_REQUIRES_PLANNING spawns a SEPARATE plan for future remediation.\n\
      \n    with_agent_loops: |\n      Out-of-scope errors discovered during loop\
      \ iterations:\n      - Do NOT count toward loop iteration limits\n      - Are\
      \ aggregated across iterations\n      - Are reported at loop exit\n      - Orchestrator\
      \ creates plans for HIGH+ priority errors\n\n    with_orchestrator: |\n    \
      \  The orchestrator tracks all spawned remediation plans:\n      - Logs each\
      \ in remediation_plans_spawned list\n      - Reports all at shutdown\n     \
      \ - CRITICAL priority plans may pause execution\n      - Plans are NOT automatically\
      \ executed (require separate orchestration)\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml
    success_criteria:
    - File exists with all sections populated
    - Decision criteria clearly distinguish spawn vs existing triggers
    - Priority levels defined with examples
    - Naming convention documented
    - Integration points with existing systems documented
- name: Define Error-Driven Planning Protocol
  execution: sequential
  description: 'Create the formal protocol definition as a shared asset that all agents
    reference.

    This is the foundational artifact that all guidance updates point to.

    '
  tickets:
  - id: T_001
    name: Create error-driven-planning-protocol.yml asset
    description: "Create a new shared asset at:\nmodules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml\n\
      \nKEY PRINCIPLE: Non-planner agents do NOT decide scope. They just report and\
      \ hand off.\nPLANNERS decide: in-scope (update existing plan) vs out-of-scope\
      \ (new plan).\n\nProtocol sections:\n\n1. ERROR HANDOFF (for non-planner agents):\n\
      \   Any agent encountering an error:\n   a. Capture error context:\n      -\
      \ error_details: full error output\n      - affected_files: files involved\n\
      \      - current_plan: the plan being executed\n      - discovery_context: what\
      \ the agent was doing\n   b. Immediately spawn orchestration-planning session\
      \ with error context\n   c. Continue current work (non-blocking) OR stop if\
      \ blocking error\n\n2. PLANNER TRIAGE (for planner agents receiving error handoff):\n\
      \   Planner decides:\n   - Is this in-scope? → Update existing plan, add tasks\
      \ to address\n   - Is this out-of-scope? → Create new planning folder\n   -\
      \ What's urgent vs deferrable?\n   - Priority: CRITICAL (blocks), HIGH, MEDIUM,\
      \ LOW\n\n3. WORKTREE SELECTION (Hard Gate):\n   - CLI BLOCKS worktrees with\
      \ active sessions — not available\n   - Multiple plans per worktree are allowed\n\
      \   - Only create new worktree if ALL have active sessions\n   - Selection enforced\
      \ by CLI, not by agent judgment\n\n4. NAMING (standard conventions):\n   - Use\
      \ standard plan naming: YYMMDDXX_description\n   - NO special \"ER\" (Error\
      \ Remediation) code — just regular planning\n   - Examples: 260208CL_cli_test_failures,\
      \ 260208IS_import_boundary_fixes\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml
    success_criteria:
    - Protocol YAML file exists with all sections defined
    - Planner-decides-scope model clearly documented
    - Hard gate worktree selection documented
    - No ER naming convention — uses standard naming
- name: Add ERROR_REQUIRES_PLANNING Feedback Trigger
  execution: sequential
  description: 'Extend the existing feedback trigger system in the MMD spec and executor
    specification

    with a new trigger type: ERROR_REQUIRES_PLANNING. This trigger fires when an agent

    detects an out-of-scope error that needs a new planning folder (not a re-plan
    of

    the current plan).

    '
  tickets:
  - id: T_002
    name: Add ERROR_REQUIRES_PLANNING to plan-mmd-schema.yml
    description: "Add a new standard trigger to the feedback_triggers section of:\n\
      modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml\n\nNew trigger\
      \ definition:\nERROR_REQUIRES_PLANNING:\n  description: \"Agent discovered out-of-scope\
      \ error requiring new planning session\"\n  detection:\n    output_patterns:\n\
      \      - \"out_of_scope_error: true\"\n      - \"remediation_plan_needed: true\"\
      \n      - \"error_outside_plan_scope: true\"\n  typical_action: \"Create new\
      \ planning folder, log in current plan, continue execution\"\n  context_package:\
      \ \"error_type, error_details, discovery_context, affected_files, suggested_plan_name\"\
      \n  note: |\n    Unlike other triggers that cause RE-PLANNING of the current\
      \ plan,\n    this trigger spawns a SEPARATE planning folder for future remediation.\n\
      \    The current plan continues execution — this is non-blocking by default\n\
      \    unless priority is CRITICAL.\n\nAlso add to trigger_to_action_mapping:\n\
      - trigger: \"ERROR_REQUIRES_PLANNING\"\n  action: \"Spawn new planning folder\
      \ via CLI\"\n  target_node: \"SpawnRemediationPlan\"\n  context_package: \"\
      error_type, error_details, discovery_context, suggested_plan_name, priority\"\
      \n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml
    success_criteria:
    - ERROR_REQUIRES_PLANNING trigger defined in standard_triggers
    - Trigger-to-action mapping added
    - Detection patterns defined
    - Context package documented
  - id: T_003
    name: Add ERROR_REQUIRES_PLANNING to orchestration-executor-specification.yml
    description: "Add a new section under feedback_triggers.trigger_types in:\nmodules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml\n\
      \nNew section (after UAT_FAILURE, before max_iterations_handling):\n\nERROR_REQUIRES_PLANNING:\n\
      \  description: \"Agent discovered error outside current plan scope that needs\
      \ separate remediation\"\n  detection:\n    output_patterns:\n      - \"out_of_scope_error:\
      \ true\"\n      - \"remediation_plan_needed: true\"\n      - \"spawned_planning_folder:\
      \ <folder_name>\"\n    agent_output:\n      - \"Agent reports error context\
      \ with error_outside_plan_scope flag\"\n      - \"Agent may have already created\
      \ planning folder\"\n\n  priority_levels:\n    critical:\n      severity: \"\
      CRITICAL\"\n      response: \"Pause current execution, ensure remediation plan\
      \ created, await user decision\"\n      blocking: true\n    high:\n      severity:\
      \ \"HIGH\"\n      response: \"Log remediation plan, continue current execution\"\
      \n      blocking: false\n    medium:\n      severity: \"MEDIUM\"\n      response:\
      \ \"Log remediation plan, continue current execution\"\n      blocking: false\n\
      \    low:\n      severity: \"LOW\"\n      response: \"Log for tracking, optionally\
      \ create plan\"\n      blocking: false\n\n  response_actions:\n    create_remediation_plan:\
      \ |\n      1. If agent did not already create plan folder:\n         - Generate\
      \ plan name: YYMMDDER_<error_type>_<description>\n         - Create folder:\
      \ agentic plan init --name <plan_name>\n         - Write seed file with error\
      \ context\n      2. Log remediation plan reference in current plan's execution\
      \ report\n      3. If CRITICAL: Pause and ask user whether to continue or address\
      \ first\n      4. If HIGH/MEDIUM/LOW: Continue execution, report at shutdown\n\
      \n    executor_tracking: |\n      Maintain a remediation_plans_spawned list\
      \ in the execution report:\n      - plan_name: string\n      - error_type: string\n\
      \      - priority: CRITICAL|HIGH|MEDIUM|LOW\n      - spawned_by: agent that\
      \ detected the issue\n      - current_plan: plan that was executing when discovered\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
    success_criteria:
    - ERROR_REQUIRES_PLANNING section added with detection, priorities, and actions
    - Priority levels defined with blocking behavior
    - Response actions include both agent-initiated and executor-initiated paths
    - Executor tracking list defined for remediation plans
