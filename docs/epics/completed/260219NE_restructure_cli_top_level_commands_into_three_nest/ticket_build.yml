objective: "The agentic CLI had 25 top-level commands which was unwieldy. Restructuring\
  \ into\nthree new parent groups (setup, configure, session) reduced top-level from\
  \ 25 to 14.\n11 project-scoped commands remain at top level.\n\nCOMPLETED (session\
  \ 2026-02-20):\n- Created setup/configure/session groups in cli.py\n- Moved commands\
  \ under correct groups\n- Added hidden backward-compat aliases for all old paths\n\
  - Extracted _dispatch() helper (replaced 19 identical _*_handle functions)\n- Extracted\
  \ StateStore utility (deduplicated JSON state across 4 command files)\n- Deleted\
  \ dead code: cli_typer.py, typer_app.py\n- Simplified entry.py (removed AGENTIC_USE_TYPER\
  \ branching)\n- Fixed -j flag position in session.py agent prompts\n\nREMAINING\
  \ WORK:\n- Remove ALL hidden backward-compat aliases (not needed, clean break)\n\
  - Remove old paths from GLOBAL_COMMANDS set\n- Update tests to use new command paths\
  \ only\n- Update any agent prompts / documentation referencing old paths\n\nTarget\
  \ file: modules/AgenticCLI/src/agenticcli/cli.py\n\nCurrent mapping:\n  setup init\
  \              ← was: setup (wizard)\n  setup health            ← was: health\n\
  \  setup update            ← was: update\n  setup rebuild           ← was: rebuild\n\
  \n  configure config ...    ← was: config ...\n  configure preferences   ← was:\
  \ preferences ...\n  configure env ...       ← was: env ...\n  configure state ...\
  \     ← was: state ...\n\n  session orchestrate     ← was: orchestrate\n  session\
  \ loop ...        ← was: loop ...\n  session planner ...     ← was: planner ...\n\
  \  session ralph ...       ← was: ralph ...\n  session terminal ...    ← was: terminal\
  \ ...\n\n  Unchanged at top level:\n  plan, stories, context, entrypoint, manifest,\
  \ cicd, langsmith, question\n\n  New additions:\n  devops worktree         ← was:\
  \ worktree\n  (inputs and template are being removed/hidden)\n"
