    name: Remove hidden backward-compat aliases from cli.py
    description: 'Remove these hidden top-level aliases from cli.py:

      - _compat_health, _compat_update, _compat_rebuild (setup group)

      - app.add_typer(preferences_app, ..., hidden=True) at top level

      - app.add_typer(config_app, ..., hidden=True) at top level

      - app.add_typer(state_app, ..., hidden=True) at top level

      - app.add_typer(env_app, ..., hidden=True) at top level

      - _compat_orchestrate and its full parameter duplication

      - app.add_typer(ralph_app, ..., hidden=True) at top level

      - app.add_typer(terminal_app, ..., hidden=True) at top level

      - app.add_typer(loop_app, ..., hidden=True) at top level

      - app.add_typer(planner_app, ..., hidden=True) at top level

      '
    status: completed
    agent: null
  - id: P3_T2
    name: Clean up GLOBAL_COMMANDS set
    description: 'Remove old alias names from GLOBAL_COMMANDS. Should contain only

      actual visible top-level command names:

      setup, configure, session, langsmith, ls, question

      (ls is a visible alias for langsmith, question is top-level)

      '
    status: completed
    agent: null
