    so that

    `agentic plan new` no longer appears in `agentic plan --help` output, while the

    command itself continues to execute when called directly (backward compatibility).

    '
  tickets:
  - id: P01_T01
    name: Add hidden=True to plan_app.command('new') decorator
    description: ''
    status: completed
    agent: build-python
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    guidance: "Locate line 1279 in cli.py where the plan_app.command(\"new\") decorator\
      \ is defined:\n\n  @plan_app.command(\"new\")\n  def plan_new(\n\nChange it\
      \ to:\n\n  @plan_app.command(\"new\", hidden=True)\n  def plan_new(\n\nThis\
      \ mirrors the pattern already used for plan_app.command(\"init\", hidden=True),\n\
      plan_app.command(\"bootstrap\", hidden=True), etc. on lines 1305, 1321, 1336,\
      \ etc.\nNo other changes to the plan_new function body are needed.\n"
    success_criteria:
    - '`@plan_app.command("new", hidden=True)` exists at the plan_new definition'
    - The plan_new function signature and body are unchanged
    - '`agentic plan --help` does NOT show ''new'' in its command list'
    - '`agentic plan new "some objective" --branch some-branch` still executes without
      error (hidden but functional)'
