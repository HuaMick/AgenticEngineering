      \ typer.Option(\"--branch\", \"-b\", help=\"Git branch name (auto-generated\
      \ from objective if omitted)\")] = None,\n      description: Annotated[Optional[str],\
      \ typer.Option(\"--description\", \"-d\", help=\"Plan folder description suffix\"\
