_template_status: active
plan:
  name: Fix tmux percentage split bug with absolute dimensions
  worktree: /home/code/AgenticEngineering-260212TC_add_test_cleaner_agent
  branch: 260214TG
  status: pending
  created: '2026-02-14'
  objective: 'Fix the tmux layout creation bug where detached sessions fail with "size
    missing" error

    when using percentage-based splits (-p). Replace with absolute dimension splits
    (-l)

    that work reliably on tmux 3.4 WSL2.


    ROOT CAUSE: tmux 3.4 on WSL2 rejects percentage splits on detached sessions even
    with

    explicit dimensions (-x/-y), but accepts absolute column/row counts.


    SOLUTION: Change -p 30 to -l 60 (30% of 200 columns) and -p 40 to -l 20 (40% of
    50 rows).

    '
  scope:
    includes:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    - modules/AgenticCLI/tests/test_tmux_layout.py
    excludes:
    - modules/AgenticCLI/src/agenticcli/utils/tmux.py
  impacted_files:
  - path: modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    change_type: modify
    change_category: fix
    reason: Replace percentage-based splits with absolute dimension splits
  - path: modules/AgenticCLI/tests/test_tmux_layout.py
    change_type: modify
    change_category: test_improvement
    reason: Add real integration test that actually runs tmux commands
  impacted_artifacts:
  - artifact_type: cli_command
    artifact_identifier: agentic orchestrate
    impact_type: fix
    description: Fixes tmux layout creation on WSL2
  phases:
  - name: Phase 1 - Code Fix
    id: phase_01
    status: pending
    tasks:
    - id: phase_01_001
      name: Replace -p 30 with -l 60 in _create_new_session_layout
      status: completed
      target_files:
      - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
      description: "Change line 115 from:\n  \"-h\", \"-p\", \"30\",\nTo:\n  \"-h\"\
        , \"-l\", \"60\",\n\nThis replaces 30% width split with absolute 60 columns\
        \ (30% of 200).\n"
    - id: phase_01_002
      name: Replace -p 40 with -l 20 in _create_new_session_layout
      status: completed
      target_files:
      - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
      description: "Change line 130 from:\n  \"-v\", \"-p\", \"40\",\nTo:\n  \"-v\"\
        , \"-l\", \"20\",\n\nThis replaces 40% height split with absolute 20 rows\
        \ (40% of 50).\n"
    - id: phase_01_003
      name: Update docstring for _create_new_session_layout
      status: completed
      target_files:
      - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
      description: 'Update the docstring (lines 71-76) to reflect absolute dimensions:

        - Main pane: 140 columns (200 - 60)

        - Right-top pane: 60 columns x 30 rows (60% of 50)

        - Right-bottom pane: 60 columns x 20 rows (40% of 50)

        '
  - name: Phase 2 - Real Integration Test
    id: phase_02
    status: pending
    tasks:
    - id: phase_02_001
      name: Add real tmux integration test
      status: completed
      target_files:
      - modules/AgenticCLI/tests/test_tmux_layout.py
      description: "Add new test class TestRealTmuxIntegration at end of file with\
        \ ONE test:\n\ntest_creates_three_panes_in_real_tmux_session:\n  1. Check\
        \ if tmux available (skip if not)\n  2. Generate unique session name with\
        \ timestamp\n  3. Call _create_new_session_layout with real subprocess calls\n\
        \  4. Verify 3 panes exist: tmux list-panes -t session -F '#{pane_id}'\n \
        \ 5. Cleanup: kill session\n  6. Assert main_pane_id, status_pane_id, questions_pane_id\
        \ all exist\n\nThis is NOT mocked - it runs actual tmux commands to catch\
        \ real issues.\n"
    - id: phase_02_002
