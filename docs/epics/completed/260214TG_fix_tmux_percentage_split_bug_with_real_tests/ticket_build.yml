      status: completed
      target_files: []
      description: "MANUAL TEST (not automated):\n1. From a bare terminal (not in\
        \ tmux), run:\n   agentic orchestrate -m loop\n2. Verify tmux layout appears\
        \ with 3 panes:\n   - Left pane (large): orchestrator\n   - Top-right pane:\
        \ sessions dashboard\n   - Bottom-right pane: questions dashboard\n3. Verify\
