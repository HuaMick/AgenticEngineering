plan:
  name: Build Phase - Fix Task ID Type Mismatch
  worktree: /home/code/AgenticEngineering-260202TF
  branch: 260202TF
  status: pending
  created: '2026-02-02'
  objective: |
    Fix CLI bug where task IDs cannot be found due to type mismatch between
    YAML parsing and CLI argument handling. YAML parser interprets decimal
    task IDs like 01.1 as float (1.1), but CLI passes them as strings,
    causing comparison failures in task lookup logic.
  success_criteria:
    - Task ID comparisons work correctly regardless of YAML type interpretation
    - Both string and numeric task IDs are handled consistently
    - Task commands (start, complete, status) work with decimal task IDs
    - Regression tests prevent future type mismatch issues
  scope:
    includes:
      - modules/AgenticCLI/src/agenticcli/commands/plan.py
      - modules/AgenticCLI/tests/
    excludes: []
  phases:
    - id: P1
      name: Root Cause Analysis
      status: pending
      tasks:
        - id: '01'
          name: Audit all task ID comparison locations
          description: |
            Search plan.py for all locations where task IDs are compared:
            - Line 1120: task.get("id") == target_task (nested tasks)
            - Line 1128: item.get("id") == target_task (legacy structure)
            - Line 2031: tid == target_task (main task update logic)
            - Line 1259: task.get("id") in task_list command

            Document all comparison points and their contexts.
          status: pending
        - id: '02'
          name: Verify YAML parsing behavior
          description: |
            Test how PyYAML parses different task ID formats:
            - id: 01 → string "01"
            - id: '01' → string "01"
            - id: 01.1 → float 1.1
            - id: '01.1' → string "01.1"

            Document which format is safer and recommended.
          status: pending
        - id: '03'
          name: Review task list output format
          description: |
            Check how task IDs are displayed in:
            - JSON output (line 1274)
            - Table output (line 1292)
            - Verbose output (line 1284)

            Ensure output matches what users will copy for CLI commands.
          status: pending
    - id: P2
      name: Implementation
      status: pending
      tasks:
        - id: '01'
          name: Create type-safe task ID comparison helper
          description: |
            Add a utility function to normalize task ID comparisons:

            ```python
            def _normalize_task_id(task_id):
                """Normalize task ID for comparison.

                Converts both strings and numbers to a consistent format
                for reliable comparison regardless of YAML type interpretation.
                """
                if task_id is None:
                    return ""
                # Convert to string and strip any whitespace
                return str(task_id).strip()
            ```

            Add this near the top of plan.py with other utility functions.
          status: pending
        - id: '02'
          name: Update all task ID comparisons
          description: |
            Replace all task ID comparisons to use normalized comparison:

            Line 1120: Change from:
              if task.get("id") == target_task
            To:
              if _normalize_task_id(task.get("id")) == _normalize_task_id(target_task)

            Line 1128: Change from:
              if item.get("id") == target_task
            To:
              if _normalize_task_id(item.get("id")) == _normalize_task_id(target_task)

            Line 2031: Change from:
              if tid == target_task
            To:
              if _normalize_task_id(tid) == _normalize_task_id(target_task)

            Apply same pattern to any other comparison locations found in P1.01.
          status: pending
        - id: '03'
          name: Update task list output to show normalized IDs
          description: |
            Ensure task_list command displays task IDs in normalized string format:

            Line 1259: Change from:
              "id": task.get("id") or task.get("task_id", "")
            To:
              "id": _normalize_task_id(task.get("id") or task.get("task_id"))

            This ensures JSON output matches what users should type in CLI.
          status: pending
    - id: P3
      name: Testing
      status: pending
      tasks:
        - id: '01'
          name: Create unit test for task ID normalization
          description: |
            Add test file: modules/AgenticCLI/tests/test_task_id_handling.py

            Test cases:
            - String ID "01" == float 1.0 (after normalization)
            - String ID "01.1" == float 1.1 (after normalization)
            - String ID "01" == string "01"
            - None ID returns empty string
            - Whitespace is stripped
          status: pending
        - id: '02'
          name: Integration test with real plan files
          description: |
            Create test plan folder with mixed task ID formats:
            - Phase with numeric IDs (01, 02)
            - Phase with decimal IDs (01.1, 01.2)
            - Phase with string IDs ('S01', 'S02')

            Test all task commands:
            - agentic plan task list
            - agentic plan task start 01.1
            - agentic plan task complete 01.1
            - agentic plan task status 01.1
          status: pending
        - id: '03'
          name: Regression test for existing plans
          description: |
            Test against actual plan files in docs/plans/live/:
            - 260201TE_typer_cli_test_suite
            - 260202EN_langsmith_cli_commands

            Verify all existing task IDs still work correctly with new logic.
          status: pending
    - id: P4
      name: Documentation
      status: pending
      tasks:
        - id: '01'
          name: Document task ID format recommendation
          description: |
            Add guidance to plan creation documentation:
            - Recommend quoting decimal task IDs in YAML: id: '01.1'
            - Explain YAML type interpretation behavior
            - Show correct vs problematic formats

            Update: modules/AgenticGuidance/agents/README.md or relevant guide.
          status: pending
        - id: '02'
          name: Add inline code comments
          description: |
            Add comments explaining the normalization:

            ```python
            # Normalize task IDs to strings for comparison to handle YAML
            # type interpretation (e.g., 01.1 parsed as float 1.1)
            if _normalize_task_id(task.get("id")) == _normalize_task_id(target_task):
            ```
          status: pending
