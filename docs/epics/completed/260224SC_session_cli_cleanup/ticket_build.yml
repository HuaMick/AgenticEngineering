    If single-session detail is needed later, it can be added as `list --detail <id>`.

    '
  tickets:
  - id: SC_007
    name: Remove cmd_status from session.py
    description: "In session.py:\n1. Remove the cmd_status function (lines ~1174-1230+)\n\
      2. Remove the \"status\" routing from handle() (line ~513-514):\n   elif args.session_command\
      \ == \"status\":\n       cmd_status(args, ctx)\n3. Update the usage message\
      \ in the else branch to remove \"status\"\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    success_criteria:
    - No cmd_status function in session.py
    - handle() no longer routes "status" command
  - id: SC_008
    name: Remove status command registration from cli.py
    description: "Remove from cli.py the session_status command (lines ~681-691):\n\
      \  @session_app.command(\"status\")\n  def session_status(...)\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - No "status" command registered under session_app
  - id: SC_009
    name: Remove status-related test cases
    description: 'Search test_session_commands.py and other test files for test cases
      that

      invoke or assert on "session status" commands. Remove those test cases.

      Keep any tests for session list, session health, etc.

      '
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/tests/test_session_commands.py
    success_criteria:
    - No test cases reference "session status" command
    - Remaining tests pass
- name: Phase 4 - Rename health to healthcheck with --diagnose flag
  execution: sequential
  description: 'Rename the `health` command to `healthcheck` and make diagnostic planner

    auto-spawn opt-in via `--diagnose` flag. Without the flag, the command is

    purely read-only: it shows health signals and verdict but never spawns.

    '
  tickets:
  - id: SC_010
    name: Rename cmd_health to cmd_healthcheck in session.py
    description: "In session.py:\n1. Rename cmd_health to cmd_healthcheck\n2. Add\
      \ `diagnose` parameter read from args:\n   diagnose = getattr(args, \"diagnose\"\
      , False)\n3. Guard auto-spawn logic behind `if diagnose:` - currently (lines\
      \ ~1313-1354)\n   the diagnostic planner spawns unconditionally when stale/unhealthy.\
      \ Wrap\n   those spawn calls so they only execute when diagnose=True.\n4. Update\
      \ handle() routing: change \"health\" to \"healthcheck\"\n5. Update the usage\
      \ message in handle()'s else branch\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    success_criteria:
    - Function is named cmd_healthcheck
    - Diagnostic spawn only happens when diagnose=True
    - handle() routes "healthcheck" (not "health")
  - id: SC_011
    name: Rename health command to healthcheck in cli.py
    description: "In cli.py:\n1. Rename @session_app.command(\"health\") to @session_app.command(\"\
      healthcheck\")\n2. Rename the function from session_health to session_healthcheck\n\
      3. Add --diagnose flag:\n   diagnose: Annotated[bool, typer.Option(\"--diagnose\"\
      , help=\"Auto-spawn diagnostic planner for unhealthy sessions\")] = False\n\
      4. Pass diagnose=diagnose in the _session_handle _ns() call\n5. Update session_command\
      \ value from \"health\" to \"healthcheck\"\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - Command is registered as "healthcheck"
    - --diagnose flag is available
    - session_command passed is "healthcheck"
  - id: SC_012
    name: Update healthcheck-related tests
    description: 'Update test_session_commands.py and any tests that reference "session
      health"

      to use "session healthcheck". Also verify that tests exist for both the

      --diagnose and no-diagnose paths.

      '
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/tests/test_session_commands.py
    success_criteria:
    - All references updated from "session health" to "session healthcheck"
    - Tests cover both --diagnose and default (no diagnose) behavior
