name: Session CLI Cleanup - Test Plan
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
priority: medium
objective: 'Validate that the session CLI restructuring correctly:

  1. Removes loop subcommand group entirely

  2. Moves ralph under orchestrate

  3. Removes status command

  4. Renames health to healthcheck with opt-in --diagnose flag


  Tests verify both the positive paths (new commands work) and negative

  paths (old commands are properly removed/unreachable).

  '
created: ''
phases:
- name: Phase 1 - Remove loop subcommand group
  execution: sequential
  description: 'Delete the loop module and all its CLI registration. The loop commands
    are

    fully redundant with the ralph commands under session.

    '
  tickets:
  - id: SC_001
    name: Delete loop.py module
    description: 'Delete modules/AgenticCLI/src/agenticcli/commands/loop.py entirely.

      This module is redundant with ralph.py - both provide start/stop/status/history

      for loop execution, but ralph is the canonical implementation backed by

      RalphLoopService.

      '
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/loop.py
    success_criteria:
    - loop.py no longer exists
  - id: SC_002
    name: Remove loop_app registration from cli.py
    description: "Remove from cli.py:\n1. The loop_app Typer instance (line ~778-779)\n\
      2. The _loop_handle dispatcher (line ~783-784)\n3. All @loop_app.command decorators\
      \ and functions: loop_start, loop_stop,\n   loop_status, loop_history (lines\
      \ ~787-845)\n\nDo NOT touch session_app, orchestrate_app, or ralph_app registrations.\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - No references to loop_app in cli.py
    - No references to _loop_handle in cli.py
    - session_app and orchestrate_app still function correctly
  - id: SC_003
    name: Delete loop-specific tests
    description: 'Delete test files that test the loop module:

      - modules/AgenticCLI/tests/test_loop_integration.py

      - modules/AgenticCLI/tests/test_loop_stop_idempotency.py


      Check test_session_commands.py and other test files for any loop-related

      test cases that reference "session loop" commands. Remove those test cases

      but keep the rest of the file intact.

      '
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/tests/test_loop_integration.py
    - modules/AgenticCLI/tests/test_loop_stop_idempotency.py
    - modules/AgenticCLI/tests/test_session_commands.py
    success_criteria:
    - No test files reference "session loop" commands
    - Remaining tests still pass
- name: Phase 2 - Move ralph under orchestrate
  execution: sequential
  description: 'Move the ralph Typer app from being a direct child of session_app
    to being

    nested under orchestrate_app. This changes the command path from

    `agentic session ralph ...` to `agentic session orchestrate ralph ...`.

    '
  tickets:
  - id: SC_004
    name: Re-parent ralph_app under orchestrate_app in cli.py
    description: "In cli.py, change the ralph registration:\n\nBEFORE (line ~614-615):\n\
      \  from agenticcli.commands.ralph import app as ralph_app\n  session_app.add_typer(ralph_app,\
      \ name=\"ralph\")\n\nAFTER:\n  from agenticcli.commands.ralph import app as\
      \ ralph_app\n  orchestrate_app.add_typer(ralph_app, name=\"ralph\")\n\nThe import\
      \ stays the same; only the parent changes from session_app\nto orchestrate_app.\
      \ The orchestrate_app is already defined at line ~723.\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - ralph_app is registered under orchestrate_app, not session_app
    - '"agentic session orchestrate ralph status" resolves correctly'
  - id: SC_005
    name: Update ralph.py help text and references
    description: "Update ralph.py command help text and any hardcoded command references:\n\
      1. In start() function, update \"Use 'agentic session ralph stop'\" to\n   \"\
      Use 'agentic session orchestrate ralph stop'\"\n2. In history() function, update\
      \ \"agentic session ralph start\" to\n   \"agentic session orchestrate ralph\
      \ start\"\n3. Update module docstring if it references command paths\n\nSearch\
      \ for all occurrences of \"session ralph\" and replace with\n\"session orchestrate\
      \ ralph\".\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    success_criteria:
    - No references to "session ralph" in ralph.py (all updated to "session orchestrate
      ralph")
  - id: SC_006
    name: Update ralph test expectations
    description: 'Update test_ralph_commands.py and any other tests that reference
      the

      old "session ralph" command path to use "session orchestrate ralph".


      Also update .claude/agents/orchestration-executor.md if it references

      ralph command paths.

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/tests/test_ralph_commands.py
    target_files:
    - modules/AgenticCLI/tests/test_ralph_commands.py
    - .claude/agents/orchestration-executor.md
    success_criteria:
    - All test references updated to "session orchestrate ralph"
    - Tests pass
