  - id: TSC_006
    name: Run AgenticGuidance test suite (regression check)
    description: "Run guidance tests to ensure ralph service layer wasn't broken:\n\
      \  python3 -m pytest modules/AgenticGuidance/tests/ -x -q\n\nFocus on ralph-related\
      \ tests.\n"
    status: completed
    agent: test-runner
    success_criteria:
    - All guidance tests pass
    - Ralph service tests unaffected
context: "The `agentic session` command group has accumulated redundancy and misplaced\n\
  commands over time. This plan restructures it for clarity:\n\n1. The `loop` subcommand\
  \ is redundant with `ralph` and should be removed.\n2. `ralph` is a meta-orchestration\
  \ concern and belongs under `orchestrate`.\n3. `status` duplicates what `list` already\
  \ shows - remove it.\n4. `health` should be renamed `healthcheck` with auto-diagnostic\
  \ spawn\n   made opt-in via `--diagnose` flag (currently it spawns automatically).\n\
  \nTarget structure after cleanup:\n  agentic session spawn\n  agentic session list\n\
  \  agentic session stop <id>\n  agentic session healthcheck <id> [--diagnose]\n\
  \  agentic session logs <id>\n  agentic session orchestrate planning\n  agentic\
  \ session orchestrate executing\n  agentic session orchestrate ralph start/stop/status/next/history\n"
