description: "Review orchestration prompts and ensure CLI error recovery protocol is prominently documented"
plan_type: build
created: "2026-02-10"

affected_stories:
  - "US-ORCH-003"  # Executor handles CLI/tooling errors with DOGFOOD recovery
  - "US-ORCH-004"  # Orchestration planner coordinates planning loops

phases:
  - id: P1
    name: "Update orchestration prompts with DOGFOOD RULE CLI error recovery protocol"
    description: "Add explicit, step-by-step CLI error recovery guidance to all three orchestration prompt files"
    tasks:
      - id: P1-T1
        name: "Update docs/prompts/orchestration.md DOGFOOD RULE section"
        status: completed
        agent: build-python
        success_criteria:
          - "DOGFOOD RULE section expanded with trigger conditions, mandatory recovery steps (diagnose, create plan, plan fix, execute fix, verify, resume)"
          - "Common CLI pitfalls table added (--json position, plan file naming, task_id vs id, --role vs --task, plan folder paths, manual edits)"
          - "FENCE subsection added prohibiting skipping steps or manual workarounds"
        files:
          - "docs/prompts/orchestration.md"

      - id: P1-T2
        name: "Update docs/prompts/orchestration_executor.md with DOGFOOD RULE section"
        status: completed
        agent: build-python
        success_criteria:
          - "New DOGFOOD RULE section added before CRITICAL RULES"
          - "Same 6-step recovery protocol as orchestration.md"
          - "Same CLI pitfalls table"
          - "CRITICAL RULES item 10 cross-references DOGFOOD RULE"
          - "Existing CLI Failure Protocol and CLI/TOOLING ERRORS bullet remain consistent"
        files:
          - "docs/prompts/orchestration_executor.md"

      - id: P1-T3
        name: "Update docs/prompts/orchestration_planner.md with DOGFOOD RULE section"
        status: completed
        agent: build-python
        success_criteria:
          - "DOGFOOD RULE replaces minimal 'Never Bypass the CLI' subsection in CRITICAL RULES"
          - "Same 6-step recovery protocol as other two files"
          - "Same CLI pitfalls table"
          - "ERROR HANDLING CLI Failure Protocol updated to cross-reference DOGFOOD RULE"
        files:
          - "docs/prompts/orchestration_planner.md"

  - id: P2
    name: "Write plan_build.yml for this plan"
    description: "Document the work done in a plan_build.yml file in the plan folder"
    tasks:
      - id: P2-T1
        name: "Create plan_build.yml with phases and task status"
        status: completed
        agent: build-python
        success_criteria:
          - "plan_build.yml exists in docs/plans/live/260210OP_review_orchestration_prompts_and_ensure_cli_issues/"
          - "All tasks marked completed"
          - "Accurate description of changes made"
        files:
          - "docs/plans/live/260210OP_review_orchestration_prompts_and_ensure_cli_issues/plan_build.yml"
