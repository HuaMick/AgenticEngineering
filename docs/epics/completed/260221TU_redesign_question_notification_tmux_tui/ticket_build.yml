- name: Build QuestionTUI core (Rich Live)
  description: 'Create the new `agenticcli/tui/` subpackage and implement `QuestionTUI`
    using

    Rich''s Live + Layout API. This gives a persistent, auto-refreshing terminal UI

    that works over SSH and Termux without requiring Textual (which needs a proper

    TTY). The TUI renders a questions table in the top panel and an answer form

    at the bottom.

    '
  tickets:
  - id: P01_T01
    name: Create tui/ package and question_tui.py scaffold
    description: ''
    status: completed
    agent: build-python
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/question.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/question_formatter.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/__init__.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    guidance: "IMPORTANT: Read ui_design.md in this plan folder first. It contains\
      \ the\nfull UI wireframes, interaction flows, and rendering pattern.\n\nCreate\
      \ the tui subpackage under agenticcli/tui/.\n\n__init__.py should be empty (just\
      \ a package marker).\n\nquestion_tui.py implements QuestionTUI - a **navigable\
      \ list** where the\nuser moves a cursor with arrow keys/Tab and presses Enter\
      \ to answer.\nSee ui_design.md Sections 2-8 for full spec.\n\nRendering pattern\
      \ (ui_design.md Section 8):\n- tty.setcbreak() for single-keypress reading (arrow\
      \ keys, Enter, q, d, m, s)\n- Rich Console for output (console.clear() + console.print())\n\
      - select.select() on stdin with timeout for auto-refresh\n- Restore line mode\
      \ (termios) for freeform text input, then back to cbreak\n- No Rich Live, no\
      \ Textual, no curses\n\nClass interface:\n\n  class QuestionTUI:\n      def\
      \ __init__(self, repo_root: Path, refresh_seconds: int = 5):\n          self.console\
      \ = Console()\n          self.cursor = 0          # index of highlighted row\n\
      \          self.questions = []      # list of (question_data, plan_path)\n \
      \         ...\n\n      def run(self) -> None:\n          \"\"\"Main loop in\
      \ cbreak mode. See ui_design.md Section 8.\"\"\"\n          # Save terminal\
      \ settings, enter cbreak, loop, restore on exit\n\n      def _refresh_questions(self)\
      \ -> None:\n          \"\"\"Scan docs/plans/live/*/questions/pending/*.yml\"\
      \"\"\n\n      def _render(self) -> None:\n          \"\"\"Clear + print table\
      \ with cursor row highlighted ([reverse])\"\"\"\n\n      def _read_key_with_timeout(self,\
      \ timeout: float) -> str | None:\n          \"\"\"select.select on stdin. Reads\
      \ escape sequences for arrows.\"\"\"\n\n      def _handle_answer(self) -> None:\n\
      \          \"\"\"Restore line mode, show detail, get answer, submit, cbreak\
      \ again.\"\"\"\n\n      def _handle_defer(self) -> None:\n          \"\"\"Single-keypress\
      \ Y/n confirmation, then defer.\"\"\"\n\n      def _handle_more_info(self) ->\
      \ None:\n          \"\"\"Restore line mode, get info request, submit with need_more_info.\"\
      \"\"\n\n      def _handle_show(self) -> None:\n          \"\"\"Show full detail\
      \ read-only, any key returns to list.\"\"\"\n\nKeyboard controls (ui_design.md\
      \ Section 3):\n  ↑/k = cursor up, ↓/j = cursor down, Tab = next (wraps)\n  Enter\
      \ = answer selected, d = defer selected, m = more info\n  s = show detail, q/Ctrl-C\
      \ = quit\n\nThe cursor row uses Rich [reverse] style for highlighting.\nAfter\
      \ answering/deferring, cursor auto-advances to next question.\n\nTable columns\
      \ (ui_design.md Section 2):\n  Plan (14 chars, truncated) | Severity (color)\
      \ | Question (rest)\nNo # column needed - cursor replaces numbered selection.\n\
      \nAdaptive widths based on console.width:\n  < 65 cols: Plan=10, Severity abbreviated\
      \ (BLK/HI/MED/LO)\n  65-80 cols: standard layout\n  > 80 cols: extra Question\
      \ space\n\nImport structure:\n  import select, sys, tty, termios, time, yaml\n\
      \  from pathlib import Path\n  from rich.console import Console\n  from rich.table\
      \ import Table\n  from rich.panel import Panel\n"
    success_criteria:
    - '`agenticcli/tui/__init__.py` exists (empty package marker)'
    - '`agenticcli/tui/question_tui.py` exists with `QuestionTUI` class'
    - '`QuestionTUI.__init__` accepts `repo_root` and `refresh_seconds`'
    - '`QuestionTUI.run()` method exists and starts Rich Live loop'
    - '`QuestionTUI._build_questions_table()` scans `docs/plans/live/*/questions/pending/*.yml`'
    - File imports do not include ntfy or watchdog
  - id: P01_T02
    name: Implement answer flow inside QuestionTUI
    description: ''
    status: completed
    agent: build-python
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    guidance: "IMPORTANT: Read ui_design.md Sections 4-7 for the full interaction\
      \ flows.\n\nComplete _handle_answer, _handle_defer, _handle_more_info, _handle_show\n\
      and the main keypress dispatch loop in run().\n\nThe main loop runs in cbreak\
      \ mode (see P01_T01). Keypress dispatch:\n  key == '\\r' (Enter)  --> _handle_answer()\n\
      \  key == 'd'           --> _handle_defer()\n  key == 'm'           --> _handle_more_info()\n\
      \  key == 's'           --> _handle_show()\n  key == arrow/j/k/Tab --> move\
      \ cursor\n\nAnswer flow (ui_design.md Section 4):\n1. User presses Enter on\
      \ highlighted question\n2. _handle_answer():\n   - Restore line mode: termios.tcsetattr(sys.stdin,\
      \ TCSADRAIN, old_settings)\n   - console.clear()\n   - Print full question detail\
      \ (severity, text, context, asked_by, time)\n   - If suggested_answers: show\
      \ navigable menu (↑↓ + Enter in cbreak)\n     OR if freeform: use input() for\
      \ text (line mode)\n   - Confirm: single-keypress y/n/e (back in cbreak)\n \
      \  - Submit via QuestionQueue(plan_path).answer_question(id, text, answered_by=\"\
      human\")\n   - Auto-advance: self.cursor moves to next question\n   - Re-enter\
      \ cbreak: tty.setcbreak(sys.stdin.fileno())\n\nNOTE on suggested answer navigation:\
      \ if the question has suggested_answers,\nstay in cbreak mode and let ↑↓ navigate\
      \ the options, Enter selects, c\nswitches to freeform input. Only switch to\
      \ line mode for freeform typing.\n\nMore info flow (ui_design.md Section 5):\n\
      1. User presses 'm' on highlighted question\n2. _handle_more_info():\n   - Restore\
      \ line mode\n   - Show question text briefly\n   - Prompt: \"What info do you\
      \ need?\"\n   - input() for the request text\n   - Submit as answer with need_more_info=True:\n\
      \     QuestionQueue.answer_question(id, f\"Need more info: {text}\",\n     \
      \    answered_by=\"human\", confidence=None)\n   - The answer YAML should include\
      \ need_more_info: true\n   - Re-enter cbreak\n\nDefer flow (ui_design.md Section\
      \ 6):\n1. User presses 'd' on highlighted question\n2. _handle_defer():\n  \
      \ - Stay in cbreak mode (single-keypress y/n)\n   - Show: \"Defer? [Y/n]\"\n\
      \   - y/Enter: mark_deferred() + write YAML, auto-advance cursor\n   - n: cancel,\
      \ back to list\n\nShow flow (ui_design.md Section 7):\n1. User presses 's' on\
      \ highlighted question\n2. _handle_show():\n   - console.clear()\n   - Print\
      \ full question detail (read-only)\n   - \"Press any key to return...\"\n  \
      \ - Read single keypress (cbreak), return to list\n\nAuto-advance after answer/defer:\n\
      \  After submitting, self.cursor should point to the next pending question.\n\
      \  If the answered question was the last one, cursor moves up to the new last.\n\
      \  If no questions remain, show empty state.\n\nError handling: if QuestionQueue\
      \ raises (e.g., question already answered),\nprint brief error, wait for keypress,\
      \ return to list. Never crash the TUI.\n"
    success_criteria:
    - Enter on cursor row opens answer flow for that question
    - Suggested answers navigable with ↑↓ + Enter (stays in cbreak)
    - Freeform answer switches to line mode for input(), then back to cbreak
    - Answering calls QuestionQueue.answer_question() on correct plan path
    - '''m'' opens more-info flow, submits with need_more_info flag'
    - '''d'' shows single-keypress Y/n confirmation, defers on Y'
    - '''s'' shows full detail read-only, any key returns'
    - Cursor auto-advances to next question after answer/defer
    - Terminal always restored to original settings on exit (try/finally)
    - Ctrl-C exits cleanly (no traceback, terminal restored)
