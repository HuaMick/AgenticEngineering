      \ refresh)\n      else:\n          # Run TUI directly in current terminal\n\
      \          tui = QuestionTUI(repo_root=repo_root, refresh_seconds=refresh)\n\
      \          tui.run()\n\nAdd `_launch_tui_in_tmux_window(repo_root, refresh)`\
      \ as a module-level helper:\n\n  def _launch_tui_in_tmux_window(repo_root: Path,\
      \ refresh: int) -> None:\n      import subprocess\n      WINDOW_NAME = \"questions\"\
      \n      # Check if 'questions' window already exists in current session\n  \
      \    result = subprocess.run(\n          [\"tmux\", \"list-windows\", \"-F\"\
      , \"#{window_name}\"],\n          capture_output=True, text=True\n      )\n\
      \      existing = result.stdout.strip().split(\"\\n\") if result.returncode\
      \ == 0 else []\n      if WINDOW_NAME in existing:\n          # Switch to it\n\
      \          subprocess.run([\"tmux\", \"select-window\", \"-t\", WINDOW_NAME])\n\
      \      else:\n          # Create new window and run TUI inside it\n        \
      \  subprocess.run([\n              \"tmux\", \"new-window\", \"-n\", WINDOW_NAME,\n\
      \              f\"agentic question dashboard --no-tmux-window --refresh {refresh}\"\
      \n          ])\n\nAdd `_get_repo_root()` as module-level helper (extract from\
      \ existing build_table() logic):\n\n  def _get_repo_root() -> Path:\n      import\
      \ subprocess\n      try:\n          result = subprocess.run(\n             \
      \ [\"git\", \"rev-parse\", \"--show-toplevel\"],\n              capture_output=True,\
      \ text=True, check=True,\n          )\n          return Path(result.stdout.strip())\n\
      \      except (subprocess.CalledProcessError, FileNotFoundError):\n        \
      \  return Path.cwd()\n\nAlso add `--no-tmux-window` and `--refresh` argument\
