phases:
- id: P01
  name: Build QuestionTUI core (Rich Live)
  status: completed
  description: 'Create the new `agenticcli/tui/` subpackage and implement `QuestionTUI`
    using

    Rich''s Live + Layout API. This gives a persistent, auto-refreshing terminal UI

    that works over SSH and Termux without requiring Textual (which needs a proper

    TTY). The TUI renders a questions table in the top panel and an answer form

    at the bottom.

    '
  tasks:
  - id: P01_T01
    name: Create tui/ package and question_tui.py scaffold
    status: completed
    priority: high
    agent: build-python
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/question.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/question_formatter.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/__init__.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    guidance: "IMPORTANT: Read ui_design.md in this plan folder first. It contains\
      \ the\nfull UI wireframes, interaction flows, and rendering pattern.\n\nCreate\
      \ the tui subpackage under agenticcli/tui/.\n\n__init__.py should be empty (just\
      \ a package marker).\n\nquestion_tui.py implements QuestionTUI - a **navigable\
      \ list** where the\nuser moves a cursor with arrow keys/Tab and presses Enter\
      \ to answer.\nSee ui_design.md Sections 2-8 for full spec.\n\nRendering pattern\
      \ (ui_design.md Section 8):\n- tty.setcbreak() for single-keypress reading (arrow\
      \ keys, Enter, q, d, m, s)\n- Rich Console for output (console.clear() + console.print())\n\
      - select.select() on stdin with timeout for auto-refresh\n- Restore line mode\
      \ (termios) for freeform text input, then back to cbreak\n- No Rich Live, no\
      \ Textual, no curses\n\nClass interface:\n\n  class QuestionTUI:\n      def\
      \ __init__(self, repo_root: Path, refresh_seconds: int = 5):\n          self.console\
      \ = Console()\n          self.cursor = 0          # index of highlighted row\n\
      \          self.questions = []      # list of (question_data, plan_path)\n \
      \         ...\n\n      def run(self) -> None:\n          \"\"\"Main loop in\
      \ cbreak mode. See ui_design.md Section 8.\"\"\"\n          # Save terminal\
      \ settings, enter cbreak, loop, restore on exit\n\n      def _refresh_questions(self)\
      \ -> None:\n          \"\"\"Scan docs/plans/live/*/questions/pending/*.yml\"\
      \"\"\n\n      def _render(self) -> None:\n          \"\"\"Clear + print table\
      \ with cursor row highlighted ([reverse])\"\"\"\n\n      def _read_key_with_timeout(self,\
      \ timeout: float) -> str | None:\n          \"\"\"select.select on stdin. Reads\
      \ escape sequences for arrows.\"\"\"\n\n      def _handle_answer(self) -> None:\n\
      \          \"\"\"Restore line mode, show detail, get answer, submit, cbreak\
      \ again.\"\"\"\n\n      def _handle_defer(self) -> None:\n          \"\"\"Single-keypress\
      \ Y/n confirmation, then defer.\"\"\"\n\n      def _handle_more_info(self) ->\
      \ None:\n          \"\"\"Restore line mode, get info request, submit with need_more_info.\"\
      \"\"\n\n      def _handle_show(self) -> None:\n          \"\"\"Show full detail\
      \ read-only, any key returns to list.\"\"\"\n\nKeyboard controls (ui_design.md\
      \ Section 3):\n  \u2191/k = cursor up, \u2193/j = cursor down, Tab = next (wraps)\n\
      \  Enter = answer selected, d = defer selected, m = more info\n  s = show detail,\
      \ q/Ctrl-C = quit\n\nThe cursor row uses Rich [reverse] style for highlighting.\n\
      After answering/deferring, cursor auto-advances to next question.\n\nTable columns\
      \ (ui_design.md Section 2):\n  Plan (14 chars, truncated) | Severity (color)\
      \ | Question (rest)\nNo # column needed - cursor replaces numbered selection.\n\
      \nAdaptive widths based on console.width:\n  < 65 cols: Plan=10, Severity abbreviated\
      \ (BLK/HI/MED/LO)\n  65-80 cols: standard layout\n  > 80 cols: extra Question\
      \ space\n\nImport structure:\n  import select, sys, tty, termios, time, yaml\n\
      \  from pathlib import Path\n  from rich.console import Console\n  from rich.table\
      \ import Table\n  from rich.panel import Panel\n"
    success_criteria:
    - '`agenticcli/tui/__init__.py` exists (empty package marker)'
    - '`agenticcli/tui/question_tui.py` exists with `QuestionTUI` class'
    - '`QuestionTUI.__init__` accepts `repo_root` and `refresh_seconds`'
    - '`QuestionTUI.run()` method exists and starts Rich Live loop'
    - '`QuestionTUI._build_questions_table()` scans `docs/plans/live/*/questions/pending/*.yml`'
