      . After removing that gate in\n   _ensure_watch_daemon, this branch can no longer\
      \ be reached, but\n   remove it anyway for hygiene.\n\nAfter these changes,\
      \ watch-daemon will start without needing ntfy config,\nand watch-stop will\
      \ stop watchers by PID using StateRegistry.list_active().\n"
