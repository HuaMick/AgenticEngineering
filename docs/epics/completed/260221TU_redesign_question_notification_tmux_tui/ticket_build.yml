name: redesign_question_notification_tmux_tui
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
priority: high
objective: 'Replace the ntfy push-notification system with a tmux-based TUI for question

  notification and answering. The new TUI will run as a persistent tmux window

  showing all pending questions in real-time and allow answering directly from

  the terminal. This works well over Termux/SSH on Android.


  The existing QuestionQueue service and YAML storage are kept unchanged.

  The existing user-facing CLI commands (list, show, answer) continue to work.

  The `agentic question dashboard` command evolves into the full TUI entry point.


  ntfy STAYS for notification-only (alerting user to jump into Termux).

  ntfy reply/answer flow is removed (NtfyReplyPoller, NtfyQuestionAgent,

  ntfy_state.yml). The user answers questions in the TUI, not via ntfy replies.


  See ui_design.md in this plan folder for detailed UI wireframes, interaction

  flows, and the clear-reprint-select rendering pattern.

  '
affected_stories:
- US-CLI-060
- US-CLI-061
- US-CLI-066
- US-CLI-120
open_questions:
- id: OQ-1
  text: 'Should the TUI run in a dedicated tmux window (new window in current session)

    or as a split pane? A window gives more screen space on small Termux screens;

    a pane keeps everything in view simultaneously.

    '
  severity: medium
  context: 'Termux on Android typically uses small screens. The existing notification
    pane

    code uses split-window -h (horizontal split, 30%). A dedicated window avoids

    squeezing both the agent and the TUI into one screen.

    '
  decision: Use a dedicated tmux window named 'questions' for the TUI dashboard.
- id: OQ-2
  text: 'Should the TUI support multi-plan view (all live plans) or be scoped to one

    plan at a time? The current dashboard already scans all live plans.

    '
  severity: low
  context: 'Multi-plan view is more useful because multiple agents may be running
    concurrently.

    The existing `cmd_dashboard` already scans docs/plans/live/*/questions/pending/*.

    '
  decision: Multi-plan view (scan all live plans) matching current dashboard behavior.
- id: OQ-3
  text: 'Which rendering pattern: Rich Live (start/stop around input), or

    clear-reprint-select (console.clear + print + select.select on stdin)?

    '
  severity: high
  context: 'Rich Live conflicts with stdin reads. The pause-resume dance is fragile

    on Termux. We need single-keypress navigation (arrow keys, Tab, Enter)

    for a navigable list. This requires tty.setcbreak() mode. Rich Live is

    incompatible with cbreak mode.

    '
  decision: 'Use cbreak mode (tty.setcbreak) for single-keypress navigation +

    Rich Console for rendering (clear + print). Restore line mode for

    freeform text input. No Rich Live. See ui_design.md Sections 3 and 8.

    '
- id: OQ-4
  text: 'How should iterative Q&A work when the user needs more information

    before answering a question?

    '
  severity: medium
  context: 'Some questions require context the agent hasn''t provided. The user

    needs a way to say "I need more info about X" and have the agent

    respond with clarification (possibly as a new follow-up question).

    '
  decision: 'Add ''m'' key action (more info). Submits answer with need_more_info:
    true

    flag. Agent reads this flag, provides clarification as a new question.

    TUI auto-refreshes to show the follow-up. See ui_design.md Section 5.

    '
success_criteria:
- ntfy still sends push notifications when a question is asked (notification only,
  no reply)
- '`agentic question dashboard` launches a Rich TUI in a dedicated tmux window named
  ''questions'''
- TUI auto-refreshes pending questions from all live plans (polling interval configurable)
- 'TUI supports inline answering: select a question, type answer, press Enter'
- TUI shows question ID, severity (color-coded), plan name, question text, suggested
  answers
- Answering via TUI calls the existing QuestionQueue.answer() service method
- TUI supports deferring a question (equivalent to `agentic question defer`)
- Watch daemon (`agentic agent question watch-daemon`) uses tmux window notification
  instead of ntfy
- NtfyQuestionAgent and NtfyReplyPoller removed; ntfy.py kept for notification-only
- ntfy_state.yml is no longer created by any command
- Existing `agentic question list/show/answer` CLI commands continue to work
- All existing question-related tests pass with no regressions
