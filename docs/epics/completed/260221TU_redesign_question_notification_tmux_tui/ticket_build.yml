    guidance: "UAT CRITICAL FAILURE (US-CLI-066, US-CLI-067): watch-daemon and watch-stop\n\
      are completely broken because question.py imports ProcessStateRegistry from\n\
      agenticcli.services.state -- a module that does not exist.\n\nInvestigation\
      \ results:\n- agenticcli/services/__init__.py: empty stub -- no ProcessStateRegistry\
      \ here\n- agenticcli/commands/state.py: exists but uses StateRegistry (from\n\
      \  agenticguidance.services), NOT ProcessStateRegistry\n- agenticguidance/services/state.py:\
      \ defines StateRegistry (not ProcessStateRegistry)\n- ProcessStateRegistry does\
      \ not exist anywhere in the codebase\n\nThe correct class is StateRegistry from\
      \ agenticguidance.services.state.\nHowever, its API is DIFFERENT from what question.py\
      \ expects for ProcessStateRegistry.\n\nquestion.py's usage of ProcessStateRegistry\
      \ (wrong API, must be replaced):\n  Line 847:  registry.get_state(state_key)\
      \          # returns dict or None\n  Line 850:  state.get(\"pid\", \"unknown\"\
      )            # dict access\n  Line 864:  registry.get_state(state_key)     \
      \     # returns dict or None\n  Line 867:  state.get(\"pid\", \"unknown\") \
      \           # dict access\n  Line 912:  registry.list_processes()          \
      \    # returns {key: state_dict}\n  Line 936:  registry.mark_stopped(state_key)\
      \       # update by string key\n  Line 980:  ProcessStateRegistry()        \
      \         # constructor\n  Line 985:  registry.get_state(state_key)        \
      \  # returns dict or None\n  Line 1009: registry.mark_stopped(state_key)   \
      \    # update by string key\n  Line 1037: registry.register_process(key, pid,\
      \ metadata=...) # register by key+pid\n  Line 1009: registry.mark_stopped(state_key)\
      \       # update by string key\n\nStateRegistry (correct class) API:\n  StateRegistry()\
      \                          # constructor (no args needed)\n  registry.register(name,\
      \ command, metadata) -> ProcessEntry  # uses os.getpid()\n  registry.get(pid:\
      \ int) -> ProcessEntry | None\n  registry.list_all() -> list[ProcessEntry]\n\
      \  registry.list_active() -> list[ProcessEntry]\n  registry.update_state(pid,\
      \ state=ProcessState.STALE)\n  ProcessEntry.pid, .name, .command, .state, .metadata,\
      \ .started_at, .ended_at\n\nThe watch-daemon pattern needs to be rewritten to\
      \ use StateRegistry's PID-keyed\nAPI instead of a string-key API. The daemon\
      \ PID is the natural key.\n\nFull fix strategy for cmd_watch_daemon (lines 831-886)\
      \ and _ensure_watch_daemon\n(lines 954-1056):\n\n1. Replace all imports of ProcessStateRegistry\
      \ with StateRegistry:\n     from agenticguidance.services.state import StateRegistry,\
      \ ProcessState\n\n2. In cmd_watch_daemon (lines 845-873): Replace ProcessStateRegistry\
      \ usage.\n   Instead of get_state(state_key) -> dict, after _ensure_watch_daemon()\n\
      \   returns (True, \"started\"), the PID is in the Popen process. The simplest\n\
      \   fix for the success message is to not look up via registry at all:\n   \
      \  print_success(\"Question watcher started in background\")\n   (Remove the\
      \ registry PID lookup in cmd_watch_daemon -- it's cosmetic only.)\n\n3. In _ensure_watch_daemon\
      \ (lines 954-1056): Replace ProcessStateRegistry:\n\n   Replace:\n     from\
      \ agenticcli.services.state import ProcessStateRegistry\n     registry = ProcessStateRegistry()\n\
      \     existing_state = registry.get_state(state_key)\n     if existing_state\
      \ and existing_state.get(\"status\") == \"running\":\n         pid = existing_state.get(\"\
      pid\")\n         ...os.kill(pid, 0)...\n         registry.mark_stopped(state_key)\n\
      \     registry.register_process(state_key, process.pid, metadata={...})\n  \
      \   registry.mark_stopped(state_key)\n\n   With StateRegistry (PID-keyed):\n\
      \     from agenticguidance.services.state import StateRegistry, ProcessState\n\
      \     registry = StateRegistry()\n     # Check for existing running watcher\
      \ by scanning active entries\n     active = registry.list_active()\n     watcher_entries\
      \ = [e for e in active\n                        if e.name == f\"question_watcher_{plan_path.name}\"\
      ]\n     if watcher_entries:\n         existing = watcher_entries[0]\n      \
      \   try:\n             os.kill(existing.pid, 0)  # PID still alive?\n      \
      \       return (False, \"already_running\")\n         except (ProcessLookupError,\
      \ OSError):\n             registry.update_state(existing.pid, state=ProcessState.STALE)\n\
      \     # ... start process ...\n     registry.register(\n         name=f\"question_watcher_{plan_path.name}\"\
      ,\n         command=\"question watch-daemon\",\n         metadata={\"plan_path\"\
      : str(plan_path), \"plan_name\": plan_path.name},\n     )\n     # Note: register()\
      \ uses os.getpid() -- but we need the child PID.\n     # Since the daemon runs\
      \ as a subprocess, we cannot register it from\n     # the parent. Instead, skip\
      \ registry registration for now and rely\n     # on cmd_watch_stop scanning\
      \ by process name using psutil or /proc.\n\n4. For cmd_watch_stop (lines 889-951):\
      \ Replace ProcessStateRegistry.\n   The simplest approach that avoids the keyed-registry\
