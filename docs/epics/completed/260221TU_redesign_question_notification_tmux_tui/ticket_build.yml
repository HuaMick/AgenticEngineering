      \ ctx=None):\n      import subprocess\n      from agenticcli.utils.tmux import\
      \ is_in_tmux, session_exists\n      from agenticcli.tui.question_tui import\
      \ QuestionTUI\n\n      refresh = getattr(args, \"refresh\", 5)\n      no_window\
      \ = getattr(args, \"no_tmux_window\", False)\n      repo_root = _get_repo_root()\n\
      \n      if is_in_tmux() and not no_window:\n          # Launch TUI in a dedicated\
