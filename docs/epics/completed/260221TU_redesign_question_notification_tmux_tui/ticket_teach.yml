    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    guidance: "Add a detailed module docstring to question_tui.py explaining:\n\n\
      1. Why Rich Live was chosen over Textual:\n   - Textual requires a proper TTY\
      \ with full terminal control sequences.\n     In some Termux + tmux combinations\
      \ the PTY handling is limited,\n     causing Textual apps to render incorrectly\
      \ or fail to accept input.\n   - Rich Live works over any terminal that supports\
      \ ANSI codes, including\n     Termux on Android and SSH sessions.\n   - Rich\
      \ is already a dependency; adding Textual would increase install size.\n\n2.\
      \ The answer-input design (pause-Live, input(), resume-Live):\n   - Rich Live\
      \ and stdin input cannot run concurrently in the same thread.\n   - Stopping/restarting\
      \ Live around input() is the simplest approach that\n     works on all terminals\
      \ including SSH/Termux.\n   - An alternative (background refresh thread + main\
      \ thread input) is more\n     complex and has race conditions on some terminals.\n\
      \n3. The tmux window design:\n   - Using a dedicated tmux window (not a split\
      \ pane) gives maximum screen\n     space on the small Termux screen.\n   - The\
      \ launcher creates the window the first time and switches focus to\n     it;\
      \ on subsequent calls it simply switches focus (idempotent).\n\nThe docstring\
      \ should be written in plain prose, not bullet lists, and kept\nunder 40 lines.\n"
    success_criteria:
    - question_tui.py module docstring explains Rich vs Textual choice
    - Docstring explains the pause-Live input pattern
    - Docstring explains the tmux window design decision
    - Docstring is under 40 lines
guidance_notes:
  tui_pattern: "The canonical pattern for a Rich-Live TUI in this codebase:\n\n  with\
    \ Live(build_layout(), console=console, refresh_per_second=1) as live:\n     \
    \ while True:\n          # Pause for input\n          live.stop()\n          choice\
    \ = input(\"Enter choice: \").strip()\n          live.start()\n\n          if\
    \ choice == \"q\":\n              break\n          # handle choice...\n      \
    \    live.update(build_layout())\n"
