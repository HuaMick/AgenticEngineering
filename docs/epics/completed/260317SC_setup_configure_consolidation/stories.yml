stories:
  - id: US-001
    title: "As a CLI operator, I want a single top-level config command that unifies configuration and preferences so that I have one intuitive path for all settings instead of two overlapping command groups"
    acceptance_criteria:
      - "Given the CLI is installed, when I run 'agentic config show', then I see all current configuration values from preferences.yml without needing a separate preferences subcommand"
      - "Given a preference key exists, when I run 'agentic config get <key>', then I receive the same value that 'agentic configure preferences get <key>' previously returned"
      - "Given I want to modify a setting, when I run 'agentic config set <key> <value>', then the value is persisted to preferences.yml in a single operation"
      - "Given config is a top-level command, when I run 'agentic config --help', then I see all operations (show, get, set, list, delete, clear, init, show-path, set-path) in one group with no separate preferences subcommand"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands:
      - "agentic config show"
      - "agentic config get"
      - "agentic config set"
      - "agentic config list"
      - "agentic config delete"
      - "agentic config clear"
      - "agentic config init"
      - "agentic config show-path"
      - "agentic config set-path"

  - id: US-002
    title: "As a CLI operator, I want a top-level health command so that I can run system diagnostics instantly without navigating into the setup subgroup"
    acceptance_criteria:
      - "Given the CLI is installed, when I run 'agentic health', then I see the same diagnostic output that 'agentic setup health' previously produced"
      - "Given I run 'agentic --help', when I scan the top-level command list, then 'health' appears as a directly accessible command alongside other top-level commands"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands:
      - "agentic health"

  - id: US-003
    title: "As a CLI operator, I want process state commands under the session group so that runtime state is logically separated from static configuration and grouped with other session operations"
    acceptance_criteria:
      - "Given running agent sessions exist, when I run 'agentic session state list', then I see the same process registry data that 'agentic configure state list' previously returned"
      - "Given a stale session exists, when I run 'agentic session state cleanup', then the stale entry is removed just as it was under the old configure path"
      - "Given I run 'agentic session --help', when I scan the subcommands, then 'state' appears as a subgroup with list, show, clear, and cleanup operations"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands:
      - "agentic session state list"
      - "agentic session state show"
      - "agentic session state clear"
      - "agentic session state cleanup"

  - id: US-004
    title: "As a CLI operator with existing scripts or muscle memory, I want old command paths to continue working with deprecation warnings so that nothing breaks while I migrate to the new structure"
    acceptance_criteria:
      - "Given I run 'agentic configure config show', when the command executes, then I see the same output as 'agentic config show' preceded by a deprecation warning directing me to the new path"
      - "Given I run 'agentic configure preferences get <key>', when the command executes, then it returns the correct value with a deprecation warning pointing to 'agentic config get'"
      - "Given I run 'agentic setup health', when the command executes, then it produces health output with a deprecation warning pointing to 'agentic health'"
      - "Given I run 'agentic configure state list', when the command executes, then it returns state data with a deprecation warning pointing to 'agentic session state list'"
      - "Given I run 'agentic --help', when I read the output, then deprecated aliases are hidden from the top-level listing to avoid confusing new users"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands:
      - "agentic configure config"
      - "agentic configure preferences"
      - "agentic setup health"
      - "agentic configure state"

  - id: US-005
    title: "As an automated agent reading guidance files, I want all CLAUDE.md and agent guidance references updated to the new command paths so that agents invoke correct commands without triggering deprecation warnings"
    acceptance_criteria:
      - "Given an agent reads CLAUDE.md for CLI command references, when it parses config-related instructions, then all paths reference 'agentic config' instead of 'agentic configure config' or 'agentic configure preferences'"
      - "Given an agent reads its guidance file for health-check instructions, when it executes the referenced command, then the path is 'agentic health' not 'agentic setup health'"
      - "Given an agent reads guidance for session management, when it finds state commands, then the path is 'agentic session state' not 'agentic configure state'"
      - "Given a developer searches the codebase for old command paths, when they grep CLAUDE.md and .claude/ guidance files, then zero references to deprecated paths remain"
    related_agents:
      - "build-python"
      - "planner-design"
    related_commands:
      - "agentic config"
      - "agentic health"
      - "agentic session state"

  - id: US-006
    title: "As a CLI developer, I want duplicate preference handler code eliminated so that each settings operation has a single implementation and maintenance burden is halved"
    acceptance_criteria:
      - "Given the codebase after consolidation, when I search for preference get/set/list/delete implementations, then each operation is defined in exactly one handler module"
      - "Given the merge is complete, when I run the full AgenticCLI test suite, then all tests pass with no regressions from code consolidation"
      - "Given dead imports and registration code are removed, when I inspect cli.py, then there are no unused configure_group registration paths or orphaned imports"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands: []

  - id: US-007
    title: "As a CLI operator, I want environment commands accessible at agentic config env so that environment management stays logically grouped with configuration at the new top-level path"
    acceptance_criteria:
      - "Given the CLI is installed, when I run 'agentic config env show', then I see the current environment configuration"
      - "Given I need to export environment settings, when I run 'agentic config env export', then it produces the same output as the old 'agentic configure env export' path"
      - "Given I run 'agentic config --help', when I scan subcommands, then 'env' appears as a subgroup under config with show, export, and run operations"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands:
      - "agentic config env show"
      - "agentic config env export"
      - "agentic config env run"
