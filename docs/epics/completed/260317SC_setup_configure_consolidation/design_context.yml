# =============================================================================
# PLANNER CONTEXT BLOCKS
# =============================================================================
planner_context_blocks:
  planner-build:
    scope: "Phases 2 and 5 (Build - Command Consolidation + Cleanup)"
    phase_dependencies:
      "Build - Command Consolidation":
        depends_on: "Explore findings (P1.1-P1.4)"
        produces: "New command registrations, merged handlers, backward compat aliases"
      "Cleanup":
        depends_on: "Test phase passing (P4.x)"
        produces: "Dead code removed, tests migrated to new paths"
    target_files:
      primary:
        - modules/AgenticCLI/src/agenticcli/cli.py
        - modules/AgenticCLI/src/agenticcli/commands/config.py
        - modules/AgenticCLI/src/agenticcli/commands/preferences.py
        - modules/AgenticCLI/src/agenticcli/commands/health.py
        - modules/AgenticCLI/src/agenticcli/commands/state.py
        - modules/AgenticCLI/src/agenticcli/commands/env.py
      secondary:
        - modules/AgenticCLI/src/agenticcli/commands/setup.py
    key_decisions:
      merge_strategy: |
        Use preferences.py as foundation (170 lines, clean ConfigWorkflow delegation).
        Move UNIQUE functions from config.py into preferences.py: cmd_show, cmd_init,
        cmd_show_path, cmd_set_path. DO NOT copy cmd_prefs_get/set/list/delete from
        config.py — those are duplicates.
      registration_pattern: |
        Use app.add_typer() for top-level groups. Hidden aliases use same pattern
        with hidden=True. Deprecation warnings via _stability_banner() or inline
        warnings.warn() in command handlers.
      ordering_constraint: |
        P2.1 (merge prefs into config) MUST complete before P2.2 (promote config).
        P2.3/P2.4/P2.5 are independent. P2.6/P2.7/P2.8 (aliases) after all promotions.
    success_criteria:
      - "agentic config show|get|set|list|delete|clear|init|show-path|set-path all work"
      - "agentic health works as top-level command"
      - "agentic session state list|show|clear|cleanup works"
      - "agentic config env show|export|run works"
      - "All backward compat aliases emit deprecation warnings"
      - "No duplicate preference handler functions remain"

  planner-test:
    scope: "Phases 4, 6, and 7 (Test + Audit + UAT)"
    phase_dependencies:
      "Test":
        depends_on: "Build phases (P2.x, P3.x) complete"
        produces: "Per-command test results, regression suite results"
      "Audit":
        depends_on: "Cleanup (P5.x) complete"
        produces: "Coverage audit, backward compat audit, doc consistency audit"
      "UAT":
        depends_on: "Audit (P6.x) complete"
        produces: "End-to-end acceptance test results"
    target_files:
      - modules/AgenticCLI/tests/test_cli.py
      - modules/AgenticCLI/tests/test_config_commands.py  # may need creation
      - modules/AgenticCLI/tests/test_health_command.py   # may need creation
    test_categories:
      new_paths:
        - "agentic config show/get/set/list/delete/clear/init/show-path/set-path"
        - "agentic health"
        - "agentic session state list/show/clear/cleanup"
        - "agentic config env show/export/run"
      backward_compat:
        - "agentic configure config * -> deprecation warning + works"
        - "agentic configure preferences * -> deprecation warning + works"
        - "agentic configure state * -> deprecation warning + works"
        - "agentic configure env * -> deprecation warning + works"
        - "agentic setup health -> deprecation warning + works"
      regression:
        - "Full AgenticCLI test suite (expect ~1487 tests)"
    success_criteria:
      - "All new command paths return exit code 0 for valid inputs"
      - "All backward compat aliases emit deprecation warnings"
      - "Full test suite passes with 0 failures"
      - "Help text at all levels shows correct command listings"

  teacher-update-guidance:
    scope: "Phase 3 (Build - Documentation)"
    phase_dependencies:
      "Build - Documentation":
        depends_on: "Build - Command Consolidation (P2.x) complete"
        produces: "Updated CLAUDE.md, agent guidance, CLI help text"
    target_files:
      - agents.md  # root-level agents documentation
      - modules/AgenticCLI/src/agenticcli/commands/config.py   # help text in usage strings
      - modules/AgenticCLI/src/agenticcli/commands/state.py    # help text in usage strings
      - modules/AgenticCLI/src/agenticcli/commands/env.py      # help text in usage strings
      - modules/AgenticCLI/src/agenticcli/commands/setup.py    # help text referencing old paths
    replacement_map:
      "agentic configure config": "agentic config"
      "agentic configure preferences": "agentic config"
      "agentic configure prefs": "agentic config"
      "agentic configure state": "agentic session state"
      "agentic configure env": "agentic config env"
      "agentic setup health": "agentic health"
    success_criteria:
      - "No references to old command paths in CLAUDE.md"
      - "No references to old command paths in agent guidance files"
      - "CLI help text at all levels reflects new hierarchy"

# =============================================================================
# PHASE AGENT ASSIGNMENTS
# =============================================================================
phase_agent_assignments:
  Explore:
    agent: explore
    rationale: "Read-only codebase scanning, no code changes"
    max_turns: 50
  "Build - Command Consolidation":
    agent: build-python
    rationale: "Core Python/Typer code changes in CLI registration and handlers"
    max_turns: 200
  "Build - Documentation":
    agent: teacher-update-guidance
    rationale: "Text-only updates to guidance, docs, and help strings"
    max_turns: 100
  Test:
    agent: test-runner
    rationale: "Test execution and validation"
    max_turns: 150
  Cleanup:
    agent: build-python
    rationale: "Code removal and refactoring"
    max_turns: 100
  Audit:
    agent: test-runner
    rationale: "Systematic verification and reporting"
    max_turns: 100
  UAT:
    agent: test-runner
    rationale: "End-to-end acceptance testing"
    max_turns: 100

# =============================================================================
# RISK ASSESSMENT
# =============================================================================
risks:
  - risk: "Backward compat aliases may not fire deprecation warnings correctly"
    impact: medium
    mitigation: "Test phase P4.5 specifically validates deprecation warnings"

  - risk: "Merging preferences into config may break ConfigWorkflow delegation"
    impact: high
    mitigation: "P2.1 guidance specifies exact merge approach — use preferences.py as foundation"

  - risk: "Test files may still reference old paths after cleanup"
    impact: low
    mitigation: "P5.3 specifically addresses test file migration; P6.2 audits coverage"

  - risk: "Session state commands may conflict with existing session subcommands"
    impact: medium
    mitigation: "P2.4 guidance specifies registering state_app as subgroup of session_group"
