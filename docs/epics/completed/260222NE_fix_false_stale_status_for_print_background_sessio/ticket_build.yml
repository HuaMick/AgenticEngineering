- name: Gate auto-diagnostic spawning for print_mode sessions
  tickets:
  - id: P5_T1
    name: Prevent auto-diagnostic spawn when PID has active children
    description: "Edit:\n  /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py\n\
      \nIn cmd_health(), at the auto-spawn diagnostic block (lines 1439-1451),\nadd\
      \ a guard that skips auto-diagnostic spawning for sessions that have\nan alive\
      \ PID and active child processes:\n\nBEFORE (line 1440):\n```python\nif health[\"\
      stale\"] or not health[\"healthy\"]:\n    if not session.get(\"diagnostic_spawned\"\
      , False):\n        new_id = _spawn_diagnostic_planner(session)\n```\n\nAFTER:\n\
      ```python\n# Check if child processes are active (indicates real work happening)\n\
      has_active_children = False\nif session.get(\"print_mode\") and session.get(\"\
      pid\"):\n    children_check = _check_child_processes(session[\"pid\"])\n   \
      \ has_active_children = children_check is True\n\nif (health[\"stale\"] or not\
      \ health[\"healthy\"]) and not has_active_children:\n    if not session.get(\"\
      diagnostic_spawned\", False):\n        new_id = _spawn_diagnostic_planner(session)\n\
      ```\n\nApply the same guard to the JSON output path (lines 1410-1418):\n\nBEFORE\
      \ (line 1411):\n```python\nif health[\"stale\"] or not health[\"healthy\"]:\n\
      ```\n\nAFTER:\n```python\nhas_active_children_json = False\nif session.get(\"\
      print_mode\") and session.get(\"pid\"):\n    children_check_json = _check_child_processes(session[\"\
      pid\"])\n    has_active_children_json = children_check_json is True\n\nif (health[\"\
      stale\"] or not health[\"healthy\"]) and not has_active_children_json:\n```\n\
      \nThis prevents unnecessary diagnostic sessions from being spawned when\na --print\
      \ session appears stale by log recency but is actually working\n(has active\
      \ child processes from tool calls).\n"
    status: pending
    agent: null
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py
    success_criteria:
    - Auto-diagnostic is NOT spawned when session has active child processes.
    - Auto-diagnostic is still spawned for truly stuck sessions (no children, stale).
    - Both JSON and Rich output paths are guarded.
