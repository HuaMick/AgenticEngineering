- name: Add child-process heartbeat signal for print_mode sessions
  tickets:
  - id: P3_T1
    name: Implement _check_child_processes helper
    description: "Edit:\n  /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py\n\
      \nAdd a new helper function near the existing _check_tmux_session() function\n\
      (around line 332):\n\n```python\ndef _check_child_processes(pid: int) -> bool\
      \ | None:\n    \"\"\"Check if a process has active child processes.\n\n    Uses\
      \ /proc/{pid}/task or psutil-free ps command to detect child\n    processes.\
      \ This serves as a heartbeat for --print sessions that\n    don't have tmux\
      \ windows.\n\n    Args:\n        pid: Process ID to check.\n\n    Returns:\n\
      \        True if child processes found, False if none, None if check failed.\n\
      \    \"\"\"\n    try:\n        # Use ps to find child processes (works on Linux/macOS\
      \ without psutil)\n        result = subprocess.run(\n            [\"ps\", \"\
      --ppid\", str(pid), \"--no-headers\", \"-o\", \"pid\"],\n            capture_output=True,\
      \ text=True, timeout=5,\n        )\n        if result.returncode == 0:\n   \
      \         children = [line.strip() for line in result.stdout.strip().splitlines()\
      \ if line.strip()]\n            return len(children) > 0\n        return False\n\
      \    except (FileNotFoundError, subprocess.TimeoutExpired):\n        return\
      \ None\n```\n"
    status: pending
    agent: null
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py
    success_criteria:
    - _check_child_processes() returns True when a process has children.
    - Returns False when no children found.
    - Returns None on failure (no ps command, timeout).
    - Does not require psutil dependency.
  - id: P3_T2
    name: Add child_processes signal to health check for print_mode sessions
    description: "Edit:\n  /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py\n\
      \nIn _check_session_health(), after the tmux signal block (after line 432),\n\
      add a new signal for print_mode sessions:\n\n```python\n# Signal 5: child process\
      \ heartbeat (only for print_mode sessions)\nif session.get(\"print_mode\") and\
      \ status == \"running\" and pid:\n    has_children = _check_child_processes(pid)\n\
      \    if has_children is not None:\n        signals.append({\n            \"\
      name\": \"child_processes\",\n            \"ok\": has_children,\n          \
      \  \"detail\": f\"Child processes {'active' if has_children else 'none'}\",\n\
      \        })\n```\n\nThis provides an alternative liveness signal for --print\
      \ sessions:\nwhen claude --print is running, it spawns tool-call subprocesses\n\
      that appear as child processes of the main PID.\n"
    status: pending
    agent: null
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/session.py
    success_criteria:
    - child_processes signal is added for print_mode sessions.
    - Signal is NOT added for non-print sessions.
    - Signal detail includes whether children are active or none.
