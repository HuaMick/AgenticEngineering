  The build plan adds a print_mode flag to session data, skips tmux checks for

  print_mode sessions, adds a child-process heartbeat signal, raises the stale

  threshold to 30 min for print_mode, and gates auto-diagnostic spawning.


  All changes are in modules/AgenticCLI/src/agenticcli/commands/session.py.

  Tests target modules/AgenticCLI/tests/test_session_commands.py.


  Testing strategy: Local-only (pure Python logic, no Docker/Cloud Build needed).

  No CLI entry points modified, so real-CLI smoke tests are not required.

  No pyproject.toml changes, so US-INSTALL-* stories are not applicable.

  '
