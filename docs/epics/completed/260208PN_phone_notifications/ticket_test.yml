- phase_id: T9_UAT
  name: 'Phase T9: UAT - User Acceptance Testing (PRIMARY SUCCESS CRITERIA)'
  status: pending
  stories:
  - US-CLI-060
  - US-CLI-062
  - US-CLI-065
  - US-CLI-066
  description: 'MANDATORY UAT phase validating the complete phone notifications feature

    against user story acceptance criteria. This is the PRIMARY SUCCESS CRITERIA

    for the plan - all prior test phases are prerequisites.


    Strategy: test-user-simulator

    Rationale: CLI tool with interactive features requiring full user journey validation.

    '
  loop:
    type: user-story-validation-loop
    maximum_iterations: 3
    exit_conditions:
      success:
        condition: PASS
        criteria: All 4 user stories pass acceptance criteria
      max_iterations:
        action: escalate
        reason: UAT failures not resolved after 3 iterations
  tasks:
  - id: T9-001
    name: 'UAT: Watch questions with ntfy notifications (US-CLI-065)'
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    - modules/AgenticGuidance/src/agenticguidance/services/config.py
    guidance: 'Simulate user journey for US-CLI-065: Watch Questions with Tmux Notifications

      Extended to include ntfy push notifications.


      Steps:

      1. Configure ntfy topic: agentic config set ntfy.topic test-phone

      2. Start question watcher: agentic question watch --plan <test-plan>

      3. Create a test question in a second process

      4. Verify ntfy notification would be sent (mock HTTP, check headers/body)

      5. Verify tmux notification still works alongside ntfy

      6. Verify deduplication: same question does not trigger second notification

      7. Verify graceful handling when ntfy server unreachable


      Use mock/tmp_path for isolation. Do not make real HTTP calls.

      '
    acceptance_criteria:
    - ntfy push sent with correct topic, title, message, priority
    - Tmux notifications unaffected by ntfy integration
    - Dedup prevents duplicate notifications
    - Network errors do not crash watcher
  - id: T9-002
    name: 'UAT: Run question watch as daemon with ntfy (US-CLI-066)'
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    guidance: 'Simulate user journey for US-CLI-066: Run Question Watch as Daemon

      Extended to include ntfy in daemon mode.


      Steps:

      1. Configure ntfy topic

      2. Start daemon: agentic question watch --daemon --plan <test-plan>

      3. Verify daemon starts successfully

      4. Create a pending question

      5. Verify ntfy notification sent from daemon callback

      6. Verify daemon survives ntfy network error

      7. Stop daemon cleanly

      '
    acceptance_criteria:
    - Daemon mode sends ntfy notifications
    - Daemon does not crash on ntfy failures
    - Daemon stop is clean
  - id: T9-003
    name: 'UAT: Answer a question interactively (US-CLI-062)'
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    guidance: 'Simulate user journey for US-CLI-062: Answer a Question

      Extended with interactive wizard flow.


      Steps:

      1. Create a pending question with suggested answers

      2. Run: agentic question answer --interactive (no question_id)

      3. Verify pending questions listed with [S] indicator

      4. Select a question by number

      5. Verify wizard displays question text, severity, suggested answers

      6. Select a suggested answer by number

      7. Verify confirmation prompt

      8. Confirm answer

      9. Verify question moved to answered/ with correct text and confidence


      Also test:

      - Custom answer flow (select C, type answer)

      - Defer flow (select D)

      - Non-interactive flow still works: agentic question answer <id> --text "answer"

      '
    acceptance_criteria:
    - Interactive wizard launches from CLI
    - Suggested answers displayed as numbered options
    - Selected answer persisted with confidence="high"
    - Custom answer persisted with confidence=None
    - Defer moves question to deferred state
    - Non-interactive answer path unbroken
  - id: T9-004
    name: 'UAT: Ask a question with suggested answers (US-CLI-060)'
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    - modules/AgenticGuidance/src/agenticguidance/models/question.py
    guidance: "Simulate user journey for US-CLI-060: Ask a Question During Workflow\n\
      Extended with suggested answers support.\n\nSteps:\n1. Ask a question with suggestions:\n\
      \   agentic question ask --text \"Use pytest or unittest?\" \\\n     --suggest\
      \ \"Use pytest\" --suggest \"Use unittest\" --suggest \"Use both\" \\\n    \
      \ --plan <test-plan>\n2. Verify question YAML file created in pending/\n3. Verify\
      \ suggested_answers field in YAML contains all 3 suggestions\n4. Verify question\
      \ without --suggest still works (backward compatible)\n5. Verify validation:\
      \ empty suggest rejected, >10 suggestions rejected\n"
    acceptance_criteria:
    - --suggest flag creates question with suggested_answers
    - Multiple --suggest values stored as list
    - YAML file contains suggested_answers field
    - Backward compatible: questions without suggestions parse correctly
    - Validation enforced at CLI level
  - id: T9-005
    name: 'UAT: End-to-end notification-to-answer flow'
    status: completed
    agent: test-user-simulator
    depends_on:
    - T9-001
    - T9-003
    - T9-004
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    - modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    guidance: "Simulate the complete phone notification workflow end-to-end:\n\n1.\
      \ Configure ntfy: agentic config set ntfy.topic my-phone\n2. Agent asks question\
      \ with suggestions:\n   agentic question ask --text \"Deploy to prod?\" \\\n\
      \     --suggest \"Yes, deploy now\" --suggest \"No, wait for review\"\n3. Watcher\
      \ detects question -> ntfy push sent (verify mock HTTP)\n4. User answers interactively:\n\
      \   agentic question answer --interactive\n5. User selects from suggestions\
      \ -> answer persisted\n6. Verify full data flow: ask -> notify -> answer ->\
      \ complete\n\nThis validates the complete user journey from phone notification\n\
      receipt to interactive answer submission.\n"
    acceptance_criteria:
    - Complete flow works end-to-end without errors
    - ntfy notification contains question text and severity
    - Interactive wizard shows the suggested answers from the question
    - Answer persisted correctly after selection
    - No regressions in non-interactive paths
test_strategy:
- type: unit
  scope: Phase-aligned unit tests for ntfy client, config schema, wizard, suggested
    answers
  location: modules/AgenticCLI/tests/, modules/AgenticGuidance/tests/
- type: regression
  scope: Existing question, config, and answer command tests
  location: modules/AgenticCLI/tests/, modules/AgenticGuidance/tests/
- type: audit
  scope: Test quality audit for reward hacking, weak assertions, coverage gaps
  location: test-audit agent per phase
- type: uat
  scope: User story acceptance testing via test-user-simulator
  location: test-user-simulator agent spawns
  stories:
