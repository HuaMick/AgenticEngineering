name: Phone Notifications - Test Plan
status: pending
priority: high
affected_stories:
- 'US-CLI-062: Answer a Question'
- 'US-CLI-065: Watch Questions with Tmux Notifications'
- 'US-CLI-066: Run Question Watch as Daemon'
- 'US-CLI-060: Ask a Question During Workflow'
objective: 'Validate the phone notifications implementation across all 4 build phases:

  ntfy client, config schema, interactive wizard, and suggested answers.

  Each build phase has a corresponding test phase with test-fix loops,

  followed by test-audit-fix loops to catch reward hacking, and a final

  UAT phase as PRIMARY SUCCESS CRITERIA.

  '
loop_structures:
- id: test_fix_loop
  type: test-fix-loop
  applies_to_phase: T1-T4 test phases
  trigger: After test creation and execution
  description: 'Run tests, fix failures, iterate until passing.

    '
  exit_criteria:
    success: All tests pass
    max_iterations: 5
    escalation: Escalate to user with test results
- id: audit_test_fix_loop
  type: audit-test-fix-loop
  applies_to_phase: T5-T8 audit phases
  trigger: After test-fix-loop passes for each phase
  description: 'Audit tests for reward hacking, weak assertions, and coverage gaps.

    Fix issues found, re-run tests, iterate until audit passes.

    '
  exit_criteria:
    success: Audit passes with no critical findings
    max_iterations: 3
    escalation: Escalate to user with audit results
- id: uat_validation_loop
  type: user-story-validation-loop
  applies_to_phase: T9 UAT phase
  trigger: After all test and audit phases complete
  description: 'Execute user stories via test-user-simulator. Iterate on failures.

    '
  exit_criteria:
    success: All affected user stories pass acceptance criteria
    max_iterations: 3
    escalation: Escalate to user with UAT results
phases:
- phase_id: T1_NTFY_TESTS
  name: 'Phase T1: ntfy Notification Hook Tests'
  status: completed
  stories:
  - US-CLI-065
  - US-CLI-066
  description: 'Test the ntfy client utility (PN-001), watcher hook integration (PN-002),

    and unit tests from the build phase (PN-003).

    '
  loop:
    type: test-fix-loop
    maximum_iterations: 5
    exit_conditions:
      success:
        condition: PASS
        criteria: All ntfy tests pass
      max_iterations:
        action: escalate
        reason: ntfy test failures persist
  tasks:
  - id: T1-001
    name: Run ntfy client unit tests
    status: completed
    agent: test-runner
    inputs:
    - modules/AgenticCLI/tests/test_ntfy.py
    - modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    guidance: 'Execute pytest on test_ntfy.py. Verify:

      - TestSendNtfy tests (success, network failure, HTTP error, timeout, custom
      server, tags)

      - TestNotifyNewQuestion tests (blocking, high, medium severity, truncation)

      - TestNtfyWatcherHook tests (configured send, no-topic skip, dedup)

      All HTTP interactions must be mocked (no real network calls).

      '
    acceptance_criteria:
    - All TestSendNtfy tests pass
    - All TestNotifyNewQuestion tests pass
    - All TestNtfyWatcherHook tests pass
    - No real network calls made during tests
  - id: T1-002
    name: Verify ntfy watcher integration does not break existing watch tests
    status: completed
    agent: test-runner
    depends_on:
    - T1-001
    inputs:
    - modules/AgenticCLI/tests/
    guidance: 'Run the full question command test suite to verify PN-002 watcher hook

      changes did not break existing watch/daemon tests.

      Execute: pytest modules/AgenticCLI/tests/ -k "question" --tb=short

      '
    acceptance_criteria:
    - All existing question command tests still pass
    - No regressions in watch or daemon functionality
  - id: T1-003
    name: Verify ntfy error isolation
    status: completed
    agent: test-runner
    depends_on:
    - T1-001
    inputs:
    - modules/AgenticCLI/tests/test_ntfy.py
    guidance: 'Specifically verify that network errors in ntfy never propagate to

      crash the watcher daemon. Run the failure-path tests and confirm

      send_ntfy returns False without raising.

      '
    acceptance_criteria:
    - URLError returns False, does not raise
    - HTTPError returns False, does not raise
    - Timeout returns False, does not raise
    - Watcher daemon continues running after ntfy failure
- phase_id: T2_CONFIG_TESTS
  name: 'Phase T2: Configuration Schema Tests'
  status: completed
  stories:
  - US-CLI-065
  description: 'Test ntfy config keys (PN-004), validation (PN-005), and config unit
    tests (PN-006).

    '
  loop:
    type: test-fix-loop
    maximum_iterations: 5
    exit_conditions:
      success:
        condition: PASS
        criteria: All config tests pass
      max_iterations:
        action: escalate
        reason: Config test failures persist
  tasks:
  - id: T2-001
    name: Run ntfy config unit tests
    status: completed
    agent: test-runner
    inputs:
    - modules/AgenticGuidance/tests/test_config_ntfy.py
    - modules/AgenticGuidance/src/agenticguidance/services/config.py
    guidance: 'Execute pytest on test_config_ntfy.py. Verify:

      - TestNtfyConfigDefaults (empty topic, default server, enabled=True)

      - TestNtfyConfigEnvVars (AGENTIC_NTFY_TOPIC, AGENTIC_NTFY_SERVER mapping)

      - TestNtfyConfigValidation (valid URL, invalid URL rejected, empty topic ok,
      boolean enabled)

      '
    acceptance_criteria:
    - DEFAULT_CONFIG contains ntfy.topic, ntfy.server, ntfy.enabled
    - Environment variable mapping works for topic and server
    - Invalid server URL raises ValueError
    - Empty topic accepted (opt-in design)
  - id: T2-002
    name: Verify existing config tests unaffected
    status: completed
    agent: test-runner
    depends_on:
    - T2-001
    inputs:
    - modules/AgenticGuidance/tests/
    guidance: 'Run all config-related tests to verify PN-004/PN-005 changes did not

      break existing config functionality.

      Execute: pytest modules/AgenticGuidance/tests/ -k "config" --tb=short

      '
    acceptance_criteria:
    - All pre-existing config tests pass
    - No regressions in TieredConfigLoader behavior
  - id: T2-003
    name: Verify config CLI integration
    status: completed
    agent: test-runner
    depends_on:
    - T2-001
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/config.py
    guidance: 'Test that `agentic config set ntfy.topic test-topic` and

      `agentic config get ntfy.topic` work through the CLI layer.

      Use subprocess or CLI test helpers to verify end-to-end config flow.

      '
    acceptance_criteria:
    - config set ntfy.topic stores value
    - config get ntfy.topic retrieves stored value
    - config set ntfy.server with invalid URL shows error
- phase_id: T3_WIZARD_TESTS
  name: 'Phase T3: Interactive Wizard Tests'
  status: completed
  stories:
  - US-CLI-062
  description: 'Test interactive answer wizard (PN-007), --interactive flag (PN-008),

    and wizard unit tests (PN-009).

    '
  loop:
    type: test-fix-loop
    maximum_iterations: 5
    exit_conditions:
      success:
        condition: PASS
        criteria: All wizard tests pass
      max_iterations:
        action: escalate
        reason: Wizard test failures persist
  tasks:
  - id: T3-001
    name: Run interactive wizard unit tests
    status: completed
    agent: test-runner
    inputs:
    - modules/AgenticCLI/tests/test_interactive_answer.py
    - modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    guidance: 'Execute pytest on test_interactive_answer.py. Verify:

      - TestInteractiveAnswerWizard (select suggested, custom, defer, confirm, no
      suggestions, retries)

      - TestAnswerCommandInteractive (flag launches wizard, non-interactive unchanged,
      no question_id)

      All input() calls must be mocked.

      '
    acceptance_criteria:
    - Suggested answer selection returns correct text and confidence="high"
    - Custom text input returns confidence=None
    - Defer returns DEFER_SENTINEL
    - Confirmation flow works (Y accepts, n re-prompts)
    - Invalid input retries up to 3 times
  - id: T3-002
    name: Verify --interactive flag registered in Typer CLI
    status: completed
    agent: test-runner
    depends_on:
    - T3-001
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'Verify that `agentic question answer --help` shows the --interactive
      / -i flag.

      Run: agentic question answer --help and check output contains "--interactive".

      '
    acceptance_criteria:
    - --interactive flag appears in help text
    - -i short form appears in help text
    - Flag is Optional[bool] defaulting to False
  - id: T3-003
    name: Verify existing answer command unaffected without --interactive
    status: completed
    agent: test-runner
    depends_on:
    - T3-001
    inputs:
    - modules/AgenticCLI/tests/
    guidance: 'Run existing question answer tests WITHOUT --interactive flag to verify

      no regressions in the standard answer flow.

      Execute: pytest modules/AgenticCLI/tests/ -k "answer" --tb=short

      '
    acceptance_criteria:
    - All pre-existing answer command tests pass
    - Non-interactive flow unchanged
- phase_id: T4_SUGGESTED_TESTS
  name: 'Phase T4: Suggested Answers Tests'
  status: completed
  stories:
  - US-CLI-060
  - US-CLI-062
  description: 'Test suggested_answers model field (PN-010), create_question param
    (PN-011),

    wizard wiring (PN-012), and suggested answers unit tests (PN-013).

    '
  loop:
    type: test-fix-loop
    maximum_iterations: 5
    exit_conditions:
      success:
        condition: PASS
        criteria: All suggested answers tests pass
      max_iterations:
        action: escalate
        reason: Suggested answers test failures persist
  tasks:
  - id: T4-001
    name: Run suggested answers unit tests
    status: completed
    agent: test-runner
    inputs:
    - modules/AgenticGuidance/tests/test_suggested_answers.py
    - modules/AgenticGuidance/src/agenticguidance/models/question.py
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    guidance: 'Execute pytest on test_suggested_answers.py. Verify:

      - TestQuestionSuggestedAnswers (default None, with values, to_dict include/omit,
      from_dict, YAML round-trip)

      - TestCreateQuestionSuggested (with suggestions, without, validation for empty
      list/string/max 10)

      - TestInteractiveWithSuggestions (displayed in wizard, [S] indicator)

      '
    acceptance_criteria:
    - suggested_answers defaults to None
    - to_dict includes field when set, omits when None
    - from_dict parses list of strings correctly
    - YAML round-trip preserves suggested_answers
    - Backward compatibility: existing questions without field still parse
    - Validation rejects empty list, empty strings, >10 items
  - id: T4-002
    name: Verify Question model backward compatibility
    status: completed
    agent: test-runner
    depends_on:
    - T4-001
    inputs:
    - modules/AgenticGuidance/tests/
    guidance: 'Run all Question model tests to verify PN-010 did not break existing

      Question serialization or deserialization.

      Execute: pytest modules/AgenticGuidance/tests/ -k "question" --tb=short

      '
    acceptance_criteria:
    - All pre-existing Question model tests pass
    - Questions without suggested_answers parse as before
    - No regressions in QuestionQueue operations
  - id: T4-003
    name: Verify --suggest flag in ask command
    status: completed
    agent: test-runner
    depends_on:
    - T4-001
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    guidance: 'Verify that `agentic question ask --help` shows the --suggest flag.

      Run: agentic question ask --help and check output.

      Then verify the flag correctly passes suggestions to create_question.

      '
    acceptance_criteria:
    - --suggest flag appears in ask command help
    - Multiple --suggest flags accepted
    - Suggestions passed to create_question service
- phase_id: T5_AUDIT_NTFY
  name: 'Phase T5: Audit ntfy Tests'
  status: completed
  stories:
  - US-CLI-065
  - US-CLI-066
  description: 'Audit ntfy test quality for reward hacking, weak assertions, and coverage
    gaps.

    '
  loop:
    type: audit-test-fix-loop
    maximum_iterations: 3
    exit_conditions:
      success:
        condition: PASS
        criteria: Audit finds no critical issues in ntfy tests
      max_iterations:
        action: escalate
        reason: Audit findings not resolved
  tasks:
  - id: T5-001
    name: Audit ntfy test coverage and quality
    status: completed
    agent: test-audit
    inputs:
    - modules/AgenticCLI/tests/test_ntfy.py
    - modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    guidance: 'Audit test_ntfy.py for:

      - Reward hacking: tests that pass trivially or assert on mocks not behavior

      - Weak assertions: missing assert on return values, HTTP headers, body content

      - Coverage gaps: untested error paths, missing edge cases

      - Mock correctness: mocks match real interfaces (urllib.request)

      - Deduplication logic: verify seen-question tracking tested properly

      '
    acceptance_criteria:
    - No reward hacking patterns found
    - All critical code paths have meaningful assertions
    - Error isolation (network errors don't crash watcher) properly tested
    - Mock signatures match real urllib.request interfaces
- phase_id: T6_AUDIT_CONFIG
  name: 'Phase T6: Audit Config Tests'
  status: completed
  stories:
  - US-CLI-065
  description: 'Audit config test quality for reward hacking and coverage gaps.

