      - test_create_with_suggestions: suggestions persisted in YAML

      - test_create_without_suggestions: backward compatible

      - test_validation_empty_list: ValueError for []

      - test_validation_empty_string: ValueError for [""]

      - test_validation_max_10: ValueError for 11+ items


      TestInteractiveWithSuggestions:

      - test_suggested_answers_displayed: verify wizard shows options

