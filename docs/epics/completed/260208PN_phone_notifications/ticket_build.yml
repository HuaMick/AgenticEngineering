      Extended with suggested answers support.\n\nSteps:\n1. Ask a question with suggestions:\n\
      \   agentic question ask --text \"Use pytest or unittest?\" \\\n     --suggest\
      \ \"Use pytest\" --suggest \"Use unittest\" --suggest \"Use both\" \\\n    \
      \ --plan <test-plan>\n2. Verify question YAML file created in pending/\n3. Verify\
      \ suggested_answers field in YAML contains all 3 suggestions\n4. Verify question\
      \ without --suggest still works (backward compatible)\n5. Verify validation:\
      \ empty suggest rejected, >10 suggestions rejected\n"
  - id: T9-005
    name: 'UAT: End-to-end notification-to-answer flow'
    description: ''
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    - modules/AgenticCLI/src/agenticcli/utils/interactive_answer.py
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    guidance: "Simulate the complete phone notification workflow end-to-end:\n\n1.\
      \ Configure ntfy: agentic config set ntfy.topic my-phone\n2. Agent asks question\
      \ with suggestions:\n   agentic question ask --text \"Deploy to prod?\" \\\n\
      \     --suggest \"Yes, deploy now\" --suggest \"No, wait for review\"\n3. Watcher\
      \ detects question -> ntfy push sent (verify mock HTTP)\n4. User answers interactively:\n\
      \   agentic question answer --interactive\n5. User selects from suggestions\
      \ -> answer persisted\n6. Verify full data flow: ask -> notify -> answer ->\
      \ complete\n\nThis validates the complete user journey from phone notification\n\
      receipt to interactive answer submission.\n"
context: 'Add phone push notifications via ntfy.sh and an interactive wizard CLI for

  answering questions from mobile. When agents create questions, the daemon

  detects new pending questions and sends an ntfy push to the user''s phone.

  The user SSHs via Termux and runs `agentic question answer --interactive`

  to select from suggested answers or type a custom response.


  The question watcher (QuestionWatcherHandler) already monitors pending/

  and answered/ folders with debounced callbacks. This plan hooks ntfy

  notification sending into that callback path.


  Configuration uses the existing TieredConfigLoader + CLI config commands

  to store ntfy topic and server URL in preferences.


  The Question model gains an optional suggested_answers field so agents

  can propose answer choices when creating questions.

  '
