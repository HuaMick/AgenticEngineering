    target_files:
    - modules/AgenticGuidance/tests/test_suggested_answers.py
    guidance: 'Create test_suggested_answers.py:


      TestQuestionSuggestedAnswers:

      - test_field_default_none: Question().suggested_answers is None

      - test_field_with_values: Question(suggested_answers=["a","b"]).suggested_answers

      - test_to_dict_includes_when_set: to_dict() has key when not None

