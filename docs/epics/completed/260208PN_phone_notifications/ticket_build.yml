    name: 'UAT: Watch questions with ntfy notifications (US-CLI-065)'
    description: ''
    status: completed
    agent: test-user-simulator
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
    - modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    - modules/AgenticGuidance/src/agenticguidance/services/config.py
    guidance: 'Simulate user journey for US-CLI-065: Watch Questions with Tmux Notifications

      Extended to include ntfy push notifications.


      Steps:

      1. Configure ntfy topic: agentic config set ntfy.topic test-phone

      2. Start question watcher: agentic question watch --plan <test-plan>

      3. Create a test question in a second process

      4. Verify ntfy notification would be sent (mock HTTP, check headers/body)

      5. Verify tmux notification still works alongside ntfy

      6. Verify deduplication: same question does not trigger second notification

      7. Verify graceful handling when ntfy server unreachable


      Use mock/tmp_path for isolation. Do not make real HTTP calls.

      '
