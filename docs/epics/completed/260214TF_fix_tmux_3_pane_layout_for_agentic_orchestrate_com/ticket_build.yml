phases:
- name: Phase 1 - Root Cause Investigation & Documentation
  description: Investigate and document the exact failure point in the tmux layout
    creation
  tickets:
  - id: phase_01_001
    name: Trace execution path and identify failure point
    description: 'Investigation reveals TWO root causes:

      BUG 1 (PRIMARY): tmux new-session -d creates detached session without terminal

      dimensions. split-window -p 30 fails with "size missing" because percentage

      splits require known dimensions. This raises RuntimeError caught at orchestrate.py:410

      causing silent fallback to plain os.execvp. User never sees tmux layout at all.

      BUG 2 (SECONDARY): Claude command sent to main pane at line 161 without Enter
      key.

      Even with layout working, command would be typed but not executed.

      Verified: tmux_available()=True, is_in_tmux()=False, _create_new_session_layout()

      path taken but fails at first split-window call.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
- name: Phase 2 - Core Fix Implementation
  description: 'Fix both root causes: detached session dimensions and missing Enter
    key'
  tickets:
  - id: phase_02_001
    name: Add terminal dimensions to detached tmux session creation
    description: "CRITICAL FIX: Modify _create_new_session_layout() to add -x and\
      \ -y flags to\nthe `tmux new-session -d` command so that split-window can calculate\
      \ percentages.\nChange from:\n  [\"tmux\", \"new-session\", \"-d\", \"-s\",\
      \ session_name, \"-n\", \"orchestrator\", \"-P\", \"-F\", \"#{pane_id}\"]\n\
      To:\n  [\"tmux\", \"new-session\", \"-d\", \"-s\", session_name, \"-n\", \"\
      orchestrator\", \"-x\", \"200\", \"-y\", \"50\", \"-P\", \"-F\", \"#{pane_id}\"\
      ]\nWithout this, tmux split-window fails with \"size missing\" on detached sessions,\n\
      causing the entire layout creation to fail and fall back to plain session.\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
  - id: phase_02_002
    name: Add Enter key to execute Claude command in _create_new_session_layout
    description: "Modify _create_new_session_layout() at line 161 to send Enter key\
      \ after the command.\nChange from:\n  subprocess.run([\"tmux\", \"send-keys\"\
      , \"-t\", main_pane_id, _shell_escape_cmd(claude_cmd)], check=True)\nTo:\n \
      \ subprocess.run([\"tmux\", \"send-keys\", \"-t\", main_pane_id, _shell_escape_cmd(claude_cmd),\
      \ \"Enter\"], check=True)\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
  - id: phase_02_003
    name: Update comment to reflect new behavior
    description: 'Update the comment at lines 158-159 from "We''ll execute it when
      we attach" to

      reflect that the command is now executed immediately when the session is created.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
