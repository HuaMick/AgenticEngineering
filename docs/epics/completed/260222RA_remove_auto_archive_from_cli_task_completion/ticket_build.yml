- name: UAT Validation
  execution: sequential
  description: 'Validate complete user journeys using the real CLI binary.

    FENCE: All UAT tasks MUST execute the actual installed CLI,

    not mocked subprocess calls. This plan modifies CLI command files

    so real CLI execution is required.

    '
  tickets:
  - id: uat_US-CLI-017
    name: Validate Archive Completed Plans (auto-archive removed)
    description: 'User Story: US-CLI-017


      Journey:

      1. Create a test plan folder in docs/plans/live/ with a single pending task

      2. Run ''agentic agent plan task start <id> --plan <folder>''

      3. Run ''agentic agent plan task complete <id> --plan <folder>''

      4. Verify the plan folder is STILL in docs/plans/live/ (NOT moved to completed/)

      5. Run ''agentic -j plan status --plan <folder>'' and verify action_required:
      "archive"

      6. Run ''agentic plan move folder --plan <folder> --force'' to explicitly archive

      7. Verify the plan folder is now in docs/plans/completed/

      8. Clean up: move the plan back or delete it


      Acceptance Criteria:

      - Task completion does NOT trigger auto-archive (folder stays in live/)

      - action_required: "archive" signal appears in plan status JSON when all tasks
      complete

      - Explicit archive via ''agentic plan move folder --force'' still works

      - Plan folder is correctly moved to completed/ only on explicit command


      Verification Steps:

      1. Execute real CLI commands (no mocking)

      2. Check filesystem for plan folder location after each step

      3. Parse JSON output from plan status for action_required field

      4. Verify move command actually relocates the folder


      Evidence Required:

      - Command output from task complete showing no archive behavior

      - JSON output from plan status showing action_required: "archive"

      - Filesystem verification showing folder in live/ after task complete

      - Filesystem verification showing folder in completed/ after explicit move

      '
    status: completed
    agent: null
  - id: uat_US-CLI-022
    name: Validate Start and Complete Tasks (no side effects)
    description: 'User Story: US-CLI-022


      Journey:

      1. Create a test plan with multiple tasks in docs/plans/live/

      2. Run ''agentic agent plan task start <id> --plan <folder>''

      3. Verify task status is in_progress in plan YAML

      4. Run ''agentic agent plan task complete <id> --plan <folder>''

      5. Verify task status is completed with timestamp

      6. Complete remaining tasks

      7. Verify plan folder STILL in live/ (no auto-archive)

      8. Run ''agentic -j plan status --plan <folder>'' to verify completion detection

      9. Clean up test plan


      Acceptance Criteria:

      - agentic plan task start <id> sets status to in_progress

      - agentic plan task complete <id> sets status to completed with timestamp

      - Completing all tasks does NOT move the plan folder

      - Plan status correctly reports all tasks completed


      Verification Steps:

      1. Execute real CLI task start/complete commands

      2. Read plan YAML to verify status changes

      3. Check filesystem after all tasks completed


      Evidence Required:

      - Command output from task start and complete

      - Plan YAML showing status transitions

      - Folder still in live/ after all tasks completed

      '
    status: completed
    agent: null
  - id: uat_US-CLI-024
    name: Validate Update Task Status (no archive side effects)
    description: 'User Story: US-CLI-024


      Journey:

      1. Create a test plan with a single task in docs/plans/live/

      2. Run ''agentic agent plan task update <id> --status in_progress --plan <folder>''

      3. Verify status changed to in_progress

      4. Run ''agentic agent plan task update <id> --status completed --plan <folder>''

      5. Verify status changed to completed with timestamp

      6. Verify plan folder STILL in live/ (no auto-archive triggered)

      7. Clean up test plan


      Acceptance Criteria:

      - agentic plan task update <id> --status <status> changes task status

      - When marking completed, a timestamp is automatically recorded

      - Status update to completed does NOT trigger auto-archive


      Verification Steps:

      1. Execute real CLI task update commands

      2. Read plan YAML to verify status and timestamp

      3. Check filesystem after completion via update


      Evidence Required:

      - Command output from task update

      - Plan YAML showing completed_at timestamp

      - Folder still in live/ after update to completed

      '
    status: completed
    agent: null
  - id: uat_no_archive_flag
    name: Validate --no-archive flag removed from CLI
    description: 'Verify that the --no-archive flag is completely removed from all
      CLI commands.


      Journey:

      1. Run ''agentic agent plan task start --help'' and verify no --no-archive

      2. Run ''agentic agent plan task complete --help'' and verify no --no-archive

      3. Run ''agentic agent plan task update --help'' and verify no --no-archive

      4. Attempt: ''agentic agent plan task complete <id> --no-archive --plan <folder>''

      5. Verify the --no-archive flag causes an unrecognized argument error


      Acceptance Criteria:

      - --no-archive not listed in any help output

      - Using --no-archive causes an error (unrecognized argument)


      Verification Steps:

      1. Parse help output for each command

      2. Attempt to use removed flag and verify error


      Evidence Required:

      - Help output showing no --no-archive option

      - Error output when --no-archive is used

      '
    status: completed
    agent: null
