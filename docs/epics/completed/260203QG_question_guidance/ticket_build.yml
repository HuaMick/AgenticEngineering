name: question-guidance
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: medium
objective: 'Update agent guidance documents (inputs.yml, process.yml) to teach agents
  the question workflow.

  Create comprehensive examples and templates for question generation and resumption
  patterns.


  Target agent categories:

  - Orchestration agents (detect decision points requiring human input)

  - Planner agents (populate open_questions in plan YAML via CLI)

  - Builder agents (ask questions when blocked on implementation decisions)

  - Tester agents (ask questions about expected behavior)


  Agents will learn to:

  1. Identify when to ask questions vs. make autonomous decisions

  2. Generate well-formed YAML questions with appropriate severity

  3. Include sufficient context for human understanding

  4. Check for answers before escalating

  5. Resume work after receiving clarification

  '
created: ''
phases:
- name: Guideline Asset Creation
  execution: sequential
  description: Create question-workflow.yml guideline asset with complete workflow
    patterns
  tickets:
  - id: guide_001
    name: Create question-workflow.yml guideline
    description: Create comprehensive guideline for question generation and resumption
      workflow
    status: completed
    agent: teacher-update-assets
    inputs:
    - modules/AgenticGuidance/assets/guidelines/escalation.yml
    - modules/AgenticGuidance/assets/guidelines/iteration.yml
    - docs/plans/live/260203QF_question_foundation/README.md
    - docs/plans/live/260203QC_question_cli/README.md
    target_files:
    - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
    guidance: "Create a new guideline file that teaches the complete question workflow\
      \ pattern.\n\nRequired sections:\n\n1. When to Ask Questions:\n   - Blockers\
      \ that require human judgment (architecture decisions, business logic, priorities)\n\
      \   - Missing critical information that cannot be inferred\n   - Conflicting\
      \ requirements or constraints\n   - High-risk decisions with significant impact\n\
      \n2. When NOT to Ask Questions (Autonomous Decision-Making):\n   - Technical\
      \ implementation details (naming, file organization)\n   - Standard patterns\
      \ with documented precedent\n   - Low-risk choices that can be validated in\
      \ review\n   - Questions answerable from existing docs/code\n\n3. Question Generation\
      \ Format:\n   - YAML structure: id, question, severity, status, context, task_id,\
      \ module\n   - Severity levels: high (blocking), medium (important), low (clarification)\n\
      \   - Context requirements: task context, attempted solutions, why it's blocking\n\
      \n4. File Storage Pattern:\n   - Location: docs/plans/live/{plan_id}/questions/pending/{question_id}.yml\n\
      \   - Filename: YYMMDD_HH_brief_description.yml (timestamped)\n   - States:\
      \ pending/, answered/, deferred/\n\n5. CLI Command References:\n   - Agent generates\
      \ YAML: Write directly to questions/pending/\n   - Human answers: `agentic question\
      \ list`, `agentic question answer <id>`\n   - Agent checks for answers: Read\
      \ from questions/answered/\n\n6. Resumption Pattern:\n   - Before escalating,\
      \ check questions/answered/ for new responses\n   - Load answer content and\
      \ incorporate into decision-making\n   - Continue task execution with clarification\n\
      \   - Move answered question to questions/answered/ if agent consumed it\n\n\
      7. Example Scenarios:\n   - Builder blocked on architecture decision\n   - Planner\
      \ needs priority clarification\n   - Tester uncertain about expected behavior\n\
      \nReference escalation.yml for escalation trigger patterns (these become question\
      \ triggers).\n"
    success_criteria:
    - Guideline file exists at correct location
    - All 7 required sections are complete
    - YAML format examples are syntactically correct
    - Severity level guidance is clear and actionable
    - CLI command references match 260203QC implementation
    - Example scenarios cover builder, planner, and tester contexts
