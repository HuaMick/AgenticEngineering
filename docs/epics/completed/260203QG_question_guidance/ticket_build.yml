      \ insufficient\n       - Mark test task as blocked_on question ID\n\n    Example\
      \ question:\n    ```yaml\n    id: \"QUESTION-TEST-002\"\n    question: \"What\
      \ error should be returned when user uploads invalid file format?\"\n    severity:\
