context: 'The CLI has been migrated to Typer (cli.py). Subcommands ARE registered
  but have argument mismatches:

  1. plan phase add: Typer expects --id/--name flags, tests pass positional args 2.
  plan status/validate/archive: Typer bridge passes path= but handlers read args.plan
  3. plan task list/current: May have similar bridge attribute issues 4. plan nested
  tasks: Task start/complete may have bridge issues

  The bridge pattern is: Typer function -> _plan_handle(_ns(...)) -> old handler.
  The _ns() call builds a namespace but attribute names don''t always match.

  DECISION: Fix the TESTS to use new Typer syntax, since the Typer migration is the
  intended direction. Do NOT revert to argparse.

  '
