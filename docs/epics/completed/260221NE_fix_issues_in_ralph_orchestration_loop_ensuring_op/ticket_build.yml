- name: Question Gate Integration
  tickets:
  - id: P1_T1
    name: Add _has_blocking_questions() method to RalphLoopService
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: 'Add a new method to RalphLoopService that checks whether a plan has

      pending blocking questions using the QuestionQueue service.


      The method should:

      1. Import QuestionQueue from agenticguidance.services.question

      2. Instantiate QuestionQueue with the plan''s path

      3. Call list_pending() to get pending questions

      4. Filter for questions with severity="blocking"

      5. Return (has_blocking: bool, count: int) tuple


      If the questions directory doesn''t exist or there are no pending

      questions, return (False, 0).


      Handle import/instantiation errors gracefully - if QuestionQueue

      is unavailable, log a warning and return (False, 0) so the loop

      doesn''t break if the question service has issues.

      '
    success_criteria:
    - _has_blocking_questions(plan_path) returns (True, N) when N blocking questions
      exist
    - _has_blocking_questions(plan_path) returns (False, 0) when no blocking questions
      exist
    - Handles missing questions directory gracefully
  - id: P1_T2
    name: Integrate question gate into discover_plans()
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: "Modify discover_plans() to call _has_blocking_questions() for each\n\
      plan and set action_required=\"blocked\" when blocking questions exist.\n\n\
      In the plan discovery loop (after line ~567 where dependencies are\nchecked),\
      \ add:\n1. Call _has_blocking_questions(plan_dir)\n2. If blocking questions\
      \ found, set action_required = \"blocked\"\n3. Store the blocking question count\n\
      \ in PlanInfo\n\nThis requires adding a new field to the PlanInfo dataclass:\n\
      \  blocking_questions: int = 0\n\nUpdate PlanInfo.to_dict() to include the new\n\
      \ field.\n\nThe blocked reason should distinguish between dependency-blocked\
      \ and\nquestion-blocked. Currently PlanAction.reason is a string, so use:\n\
      - \"Waiting for: dep1, dep2\" for dependency blocks\n- \"Blocked by N pending\n\
      \ question(s)\" for question blocks\n- If both, list both reasons\n"
    success_criteria:
    - Plans with blocking questions have action_required='blocked'
    - PlanInfo.blocking_questions field populated correctly
    - PlanAction.reason distinguishes question-blocked from dependency-blocked
  - id: P1_T3
    name: Update get_priority_queue() to include question-blocked plans
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: 'Modify get_priority_queue() so that blocked plans in the queue

      include the blocking_questions count from PlanInfo.


      In the Priority 3 (blocked actions) section, when building the

      PlanAction for blocked plans:

      1. Check if the plan has blocking_questions > 0

      2. If yes, include that in the reason string

      3. Ensure the PlanAction has enough info for the CLI to display


      No structural change needed to PlanAction - the reason string

      is sufficient. But ensure the blocked reason is clear:

      - Deps only: "Waiting for: dep1, dep2"

      - Questions only: "Blocked by 3 pending blocking question(s)"

      - Both: "Waiting for: dep1; also blocked by 2 question(s)"

      '
    success_criteria:
    - Blocked actions include question count in reason string
    - Human can distinguish dep-blocked from question-blocked in output
- name: Open Question Routing and Visibility
