  - id: P2_T2
    name: Add blocking_questions to ralph next output when plan is blocked
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    guidance: "Modify the next_action() function in ralph.py CLI so that when a\n\
      plan is blocked by questions, the output includes guidance for the\nhuman operator.\n\
      \nFor JSON output, when action is \"blocked\" and reason mentions questions:\n\
      ```json\n{\n  \"action\": \"blocked\",\n  \"plan\": \"260221NE_...\",\n  \"\
