      \ agentic question list --plan 260221NE_... to see questions\"\n}\n```\n\nFor\n\
      human-readable output, add a hint line:\n```\nAction: blocked\nPlan: 260221NE_...\n\
      Reason: Blocked by 2 pending blocking question(s)\nHint: Run: agentic question\n\
      \ list --plan 260221NE_... to review and answer\n```\n\nThe hint should only\n\
      appear when the block is caused by questions\n(check if \"question\" appears\n\
      in the reason string).\n"
    success_criteria:
    - ralph next shows hint to review questions when blocked by questions
    - Hint includes the exact agentic command to run
    - Hint does NOT appear for dependency-blocked plans
- name: Loop Robustness Fixes
  tickets:
  - id: P3_T1
    name: Fix _get_plan_status_from_cli() JSON flag
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: "Fix the CLI invocation in _get_plan_status_from_cli() method of\nRalphLoopService.\n\
      \nCurrent (WRONG - `-j` is not a valid flag for plan status):\n```python\nresult\n\
      = subprocess.run(\n    [\"agentic\", \"plan\", \"status\", \"--plan\", plan_name,\n\
      \ \"-j\"],\n    ...\n)\n```\n\nCorrect (--json is a root-level flag per CLI\n\
      convention):\n```python\nresult = subprocess.run(\n    [\"agentic\", \"--json\"\
      \n, \"plan\", \"status\", \"--plan\", plan_name],\n    ...\n)\n```\n\nThe `--json`\n\
      flag must come BEFORE the subcommand group, not after.\nThis is documented\n\
      in orchestration-loop process.yml guidelines.\n"
    success_criteria:
    - CLI invocation uses ['agentic', '--json', 'plan', 'status', '--plan', plan_name]
    - No other subprocess calls are affected
  - id: P3_T2
    name: Fix empty plan (0 tasks) classification
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: "Fix _determine_action_required() so that plans with 0 tasks are NOT\n\
      automatically classified as \"completed\".\n\nCurrent behavior (line ~493-494):\n\
      ```python\nif total_tasks == 0:\n    return \"completed\"\n```\n\nThis is wrong\n\
      because a plan with 0 tasks may be:\n- A newly created plan that only has\n\
      README.md\n- A plan whose plan_build.yml is being written by a planner agent\n\
      - A plan with a plan_build.yml that has phases but no tasks yet\n\nFix: Change\n\
      the logic to check for orchestration status:\n- If total_tasks == 0 AND has_orchestration:\n\
      return \"completed\"\n  (plan had an MMD and all tasks were removed = done)\n\
      - If total_tasks == 0 AND NOT has_orchestration: return \"needs_planning\"\n\
      \  (plan hasn't been fully planned yet)\n\nThis requires passing has_orchestration\n\
      to the method (it already\nreceives it as a parameter, so just adjust the\n\
      logic).\n"
    success_criteria:
    - Plans with 0 tasks and no orchestration MMD get action 'needs_planning'
    - Plans with 0 tasks and an orchestration MMD get action 'completed'
    - Plans with pending tasks still work correctly (no regression)
  - id: P3_T3
    name: Enhance check_all_complete() to distinguish completion states
    description: ''
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    guidance: "Enhance check_all_complete() to return a richer result that\ndistinguishes\n\
      between different end states.\n\nCurrent: returns bool\nNew: return a dict\n\
      or named tuple with:\n```python\n{\n    \"all_complete\": True/False,\n  \n\
      \    \"blocked_by_deps\": 0,       # count of dep-blocked plans\n    \"blocked_by_questions\"\
      \n: 0,   # count of question-blocked plans\n    \"in_progress\": 0,        \
      \  \n  # count of execute/needs_planning plans\n    \"completed\": 0,      \
      \    \n    # count of completed plans\n    \"can_emit_promise\": True/False\
      \  # True\n}\n```\n\ncan_emit_promise should be True ONLY\nwhen:\n- in_progress\
      \ == 0\n- blocked_by_questions == 0\n(dependency-blocked\nis OK since those\
      \ deps might be in other\nrepos or completed plans already\narchived)\n\nFor\
      \ backward compatibility, keep the existing check_all_complete()\nmethod returning\
      \ bool,\nand add a new method:\nget_completion_status() -> dict\n\nUpdate the\
      \ CLI's\nstatus() and next_action() to use\nget_completion_status()\nfor richer\
      \ output.\n"
    success_criteria:
    - get_completion_status() returns dict with all fields
    - check_all_complete() still returns bool (backward compat)
    - can_emit_promise is False when plans are blocked by questions
    - CLI status uses richer completion info
