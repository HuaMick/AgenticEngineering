- name: User Acceptance Testing
  tickets:
  - id: P5_T1
    name: 'UAT: Validate ralph loop question gate and status reporting'
    description: ''
    status: completed
    agent: null
    inputs:
    - docs/userstories/AgenticCLI/12_ralph.yml
    - docs/userstories/AgenticCLI/06_question_queue.yml
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: 'Run test-user-simulator against the following user journeys:


      Journey 1 - Question Gate Blocking (US-CLI-120, US-CLI-060):

      1. Create a plan in docs/plans/live/ with a plan_build.yml

      2. Create a blocking question via: agentic question ask "What approach?" --severity
      blocking --plan <folder>

      3. Run: agentic ralph next --json

      4. Verify the plan is reported as "blocked" with reason mentioning questions

      5. Answer the question: agentic question answer <id> --text "Use approach A"

      6. Run: agentic ralph next --json again

      7. Verify the plan is no longer blocked by questions


      Journey 2 - Status Question Summary (US-CLI-122, US-CLI-061):

      1. Create multiple plans with various pending questions

      2. Run: agentic ralph status

      3. Verify output includes "Pending Questions" section with severity counts

      4. Run: agentic ralph status --json

      5. Verify JSON includes "questions" object with counts


      Journey 3 - Empty Plan Handling (US-CLI-123):

      1. Create a plan folder with only README.md and empty plan_build.yml

      2. Run: agentic ralph next --json

      3. Verify it reports as "needs_planning" not "completed"


      CLI Smoke Tests (MANDATORY per planning-standard.yml):

      - agentic ralph status --help (must exit 0)

      - agentic ralph next --help (must exit 0)

      - agentic ralph status (must not crash even with no state)

      - agentic ralph next --json (must return valid JSON)

      '
    success_criteria:
    - Question gate correctly blocks plans with pending blocking questions
    - Ralph status shows question summary
    - Ralph next provides actionable hints for question-blocked plans
    - Empty plans classified as needs_planning
    - All CLI smoke tests pass (exit 0, valid output)
    - JSON output is valid and parseable
