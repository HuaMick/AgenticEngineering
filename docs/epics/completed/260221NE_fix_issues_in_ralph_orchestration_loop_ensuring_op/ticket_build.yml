      \nsection:\n```\nPending Questions\n─────────────────\nBlocking: 3\nHigh: 1\n\
      Medium: 2\nTotal pending: 6\n```\n\nFor JSON output, add a \"questions\"\nkey:\n\
      ```json\n{\n  \"questions\": {\n    \"blocking\": 3,\n    \"high\":\n 1,\n \
      \   \"medium\": 2,\n    \"low\": 0,\n    \"total_pending\": 6\n  }\n}\n```\n\
      \nTo collect this data:\n1. Import QuestionQueue from agenticguidance.services.question\n\
      2. For each discovered plan, instantiate QuestionQueue(plan_path)\n3. Call list_pending()\n\
