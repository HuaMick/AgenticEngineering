name: comprehensive-guidance-walkthrough-test
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
priority: high
objective: 'Refactor AgenticEngineering to 3-layer architecture:

  - AgenticGuidance/services/: Business logic (extracted from AgenticCLI workflows)

  - Thin CLI: Presentation layer only (~2k lines)

  - AgenticTmux: Terminal session management

  - AgenticVoice: Voice interface for phone-based planning


  Key decision: Business logic goes into AgenticGuidance/services/ (NOT a separate
  "Core" module)

  because these services interpret guidance and belong with the guidance they interpret.

  '
created: ''
phases:
- name: Discovery Phase
  execution: parallel
  description: Analyze existing self-review assets and identify gaps
  tickets:
  - id: disc_001
    name: Audit Existing Self-Review Assets
    description: 'Review the existing self-review assets to understand current state:

      - self-review-criteria.yml: What criteria are defined?

      - agent-self-review.yml: What protocol is documented?

      - self-review-preset.yml: What tasks are pre-configured?

      '
    status: completed
    agent: explorer
    inputs:
    - modules/AgenticGuidance/assets/definitions/self-review-criteria.yml
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    - modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml
    success_criteria:
    - Current criteria documented
    - Protocol steps identified
    - Gaps between assets and CCI pattern identified
  - id: disc_002
    name: Analyze Current CLI Agent Help Structure
    description: 'Understand how agent help commands currently work:

      - How is --planner-guidance routed?

      - Where is help content generated?

      - How can --self-review be added?

      '
    status: completed
    agent: explorer
    inputs:
    - modules/AgenticCLI/src/agenticcli/entry.py
    - modules/AgenticCLI/src/agenticcli/commands/agent_help.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - Agent help routing documented
    - Extension point for --self-review identified
  - id: disc_003
    name: Document Current CLI Command Pattern
    description: Map existing bootstrap command flow and identify simplification opportunities
    status: completed
    agent: explorer
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    - modules/AgenticCLI/src/agenticcli/commands/context.py
    success_criteria:
    - Documented current command flow
    - Identified chaining points
- name: Teach Phase
  execution: sequential
  description: Update guidance to document CCI-based self-review
  tickets:
  - id: teach_001
    name: Update agent-self-review.yml with CCI Pattern
    description: 'Update the guideline to document CCI-based self-review:

      - Add section on CLI command usage

      - Document expected CLI output format

      - Show how agent reads criteria files via paths

      - Update protocol steps to include CLI invocation

      '
    status: completed
    agent: teacher-update-guidance
    inputs:
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    success_criteria:
    - CCI invocation pattern documented
    - Protocol includes CLI as first step
    - File path reading documented
  - id: teach_002
    name: Document Self-Review CLI Output Schema
    description: 'Define the expected output structure for self-review CLI command:

      - criteria_files: List of file paths to self-review criteria

      - agent_files: List of agent guidance files to review

      - output_schema_path: Path to expected output format

      - related_assets: Paths to relevant definitions/guidelines

      '
    status: completed
    agent: teacher-update-guidance
    inputs:
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    - modules/AgenticGuidance/assets/definitions/self-review-criteria.yml
    success_criteria:
    - CLI output schema defined
    - All output fields documented
    - Example output provided
  - id: teach_003
    name: Update Self-Review Criteria with File Path References
    description: 'Ensure self-review-criteria.yml includes references to other relevant
      files:

      - Cross-references to related guidelines

      - Paths to validation scripts (if any)

      - Links to example outputs

      '
    status: completed
    agent: teacher-update-guidance
    inputs:
    - modules/AgenticGuidance/assets/definitions/self-review-criteria.yml
    success_criteria:
    - Cross-references added
    - File paths use repository-relative format
  - id: teach_004
    name: Document Self-Review Workflow with CCI
    description: 'Document how self-review works with CCI pattern:

      1. `agentic <agent>` - Get agent overview with file paths

      2. Agent reads self-review-criteria.yml from known path

      3. Agent reads agent-self-review.yml for protocol

      4. Agent reads own guidance files (process.yml, inputs.yml)

      5. Agent performs review using criteria

      6. Agent generates structured output

      '
    status: completed
    agent: teacher-update-guidance
    inputs:
    - docs/CCI_CONTEXT_ARCHITECTURE.md
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    success_criteria:
    - Self-review workflow documented in guidance
    - File paths clearly listed
    - End-to-end example included
  - id: teach_005
    name: Document CCI Command Chaining Pattern
    description: 'Create or update guideline documenting the CCI command chaining
      pattern:

      - `agentic <agent>` -> Initial instructions + next commands

      - `agentic <agent> --bootstrap` -> Full context + file paths

      - Each command outputs file paths for source exploration

      '
    status: completed
    agent: teacher-update-guidance
    inputs:
    - docs/CCI_CONTEXT_ARCHITECTURE.md
    success_criteria:
    - Command chaining pattern documented
    - File path output pattern documented
    - Examples show full chain execution
