phases:
- name: Add trace capture for --print mode sessions
  description: 'Implemented Approach A: Post-completion trace capture in session management.
    After a background session completes, reads Claude Code transcript and calls stop_hook.sh
    manually with session_id and transcript_path.

    '
  tickets:
  - id: capture-mechanism.1
    name: ''
    description: 'Added _capture_langsmith_trace() function to session.py. Reads stdout
      log to extract Claude Code session_id from JSON output, locates transcript at
      ~/.claude/projects/<hash>/<sid>.jsonl, then calls stop_hook.sh with proper JSON
      input on stdin. Wired into _update_session_status() and cmd_stop().

      '
    status: completed
    agent: null
    success_criteria:
    - Background sessions generate LangSmith traces after completion
    - Trace data matches interactive session quality
  - id: capture-mechanism.2
    name: ''
    description: 'Added --output-format json to background spawn command. This causes
      claude --print to output JSON including session_id field, which gets written
      to the stdout log. The _capture_langsmith_trace() function then parses this
      to find the Claude Code session ID.

      '
    status: completed
    agent: null
    success_criteria:
    - Reliable mapping between agentic session ID and Claude Code transcript path
  - id: capture-mechanism.3
    name: ''
    description: 'Added trace capture to cmd_stop() in session.py. When a session
      is stopped (SIGTERM or ProcessLookupError), trace capture is triggered for background
      sessions before reporting success.

      '
    status: completed
    agent: null
    success_criteria:
    - Stopping a session triggers LangSmith trace submission
