              if service.check_all_complete():
                  output = {"action": "complete", "reason": "All plans finished"}
              else:
                  action = service.get_next_action()
                  if action is None:
                      output = {"action": "blocked", "reason": "No actionable plans"}
                  else:
                      output = action.to_dict()

              if json_output:
                  print(json.dumps(output))
              else:
                  # Pretty print for humans
                  console.print(f"[cyan]Action:[/cyan] {output['action']}")
                  if 'plan' in output:
                      console.print(f"[cyan]Plan:[/cyan] {output['plan']}")
                  console.print(f"[cyan]Reason:[/cyan] {output['reason']}")
