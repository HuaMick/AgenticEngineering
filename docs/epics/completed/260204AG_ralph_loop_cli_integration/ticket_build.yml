    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    guidance: "Create RalphLoopService in services/ralph.py:\n\n```python\nclass RalphLoopService:\n\
      \    def __init__(self, plans_dir: Path = None):\n        self.plans_dir = plans_dir\
      \ or Path(\"docs/plans/live\")\n        self.state_dir = Path.home() / \".agentic\"\
      \ / \"ralph\"\n\n    def discover_plans(self) -> list[PlanInfo]:\n        \"\
      \"\"Discover all plans in live/ directory.\n\n        Returns list of PlanInfo\
      \ with:\n        - name, path, status\n        - has_orchestration (bool)\n\
      \        - action_required (execute/needs_planning/blocked)\n        - dependencies\
      \ (list of plan names)\n        - pending_tasks, completed_tasks counts\n  \
      \      \"\"\"\n\n    def get_priority_queue(self) -> list[PlanAction]:\n   \
      \     \"\"\"Build prioritized queue of actions.\n\n        Priority order:\n\
      \        1. Plans with action_required='execute' (has MMD, ready to run)\n \
      \       2. Plans with action_required='needs_planning' (needs MMD created)\n\
      \        3. Blocked plans (dependencies not met) - skip\n\n        Returns list\
      \ of PlanAction:\n        - action: 'execute' | 'plan' | 'blocked'\n       \
      \ - plan_name, plan_path\n        - reason (why this action)\n        - current_task\
      \ (if executing)\n        \"\"\"\n\n    def get_next_action(self) -> Optional[PlanAction]:\n\
      \        \"\"\"Get the single highest-priority action to take.\n\n        Returns\
