context: 'This plan implements a smart, self-directing Ralph Loop in the agentic CLI.


  KEY DESIGN DECISIONS:

  1. Ralph is a SESSION-LEVEL orchestrator, not tied to a single plan

  2. CLI handles discovery, prioritization, and completion verification

  3. Agent focuses on execution, not decision-making about what to do next

  4. No config required - discovers work from docs/plans/live/ automatically

  5. Completion is VERIFIED by CLI, not trusted from agent claims


  ARCHITECTURE:

