priority: high
objective: 'Implement a self-directing Ralph Loop that:

  1. Discovers all plans in docs/plans/live/ automatically

  2. Prioritizes based on dependencies and action_required status

  3. Spawns Claude sessions to execute work

  4. Verifies completion by checking actual plan states (not trusting agent)

  5. Continues until no actionable plans remain


  The agent prompt becomes simple: "Ask CLI what''s next, execute it, repeat."

  '
