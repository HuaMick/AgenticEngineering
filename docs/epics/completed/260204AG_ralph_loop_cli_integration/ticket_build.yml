          @app.command()
          def start(
              prompt_file: str = typer.Option(None, "--prompt-file", "-p"),
              max_iterations: int = typer.Option(20, "--max-iterations", "-n"),
              background: bool = typer.Option(False, "--background", "-b"),
          ):
              """Start Ralph loop.

              If no prompt_file specified, uses default orchestration prompt.

              Process:
              1. Check no other Ralph loop running
              2. Initialize state in ~/.agentic/ralph/
              3. Spawn tmux session with Claude
              4. In foreground mode, attach to session
              5. In background mode, return immediately
              """
              service = RalphLoopService()

              # Check for existing loop
              if service.get_state() and service.get_state().status == 'running':
                  console.print("[red]Ralph loop already running[/red]")
                  raise typer.Exit(1)

              # Initialize loop
              state = service.start_loop(
                  prompt_file=prompt_file,
                  max_iterations=max_iterations
              )

              # Spawn tmux session
              session_name = f"ralph-{state.loop_id[:8]}"
              prompt = prompt_file or get_default_ralph_prompt()

              subprocess.run([
                  "tmux", "new-session", "-d", "-s", session_name,
                  "claude", "--print", "--prompt", f"@{prompt}"
              ])

              state.tmux_session = session_name
              service._save_state(state)

              if background:
                  console.print(f"[green]Ralph started in background[/green]")
                  console.print(f"Session: {session_name}")
                  console.print(f"Attach: tmux attach -t {session_name}")
              else:
                  # Attach to session
                  subprocess.run(["tmux", "attach", "-t", session_name])
          ```
