name: Tmux orchestration UI with live session and question dashboards
status: active
priority: high
context: 'Expand agentic orchestrate from simple os.execvp into a tmux-based 3-pane
  UI:

  main pane (70%) runs the interactive Claude orchestrator, right-top pane (30% x
  60%)

  shows a live-updating session dashboard, right-bottom pane shows pending questions.

  The dashboard panes are standalone commands (agentic session dashboard, agentic
  question dashboard)

  that can also be run independently.

  '
phases:
- id: P1
  name: Tmux Layout Utility
  status: pending
  tasks:
  - id: TU_001
    name: Create tmux_layout.py with OrchestrationLayout
    status: completed
    description: 'New file: modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py

      - OrchestrationLayout dataclass (session_name, main/status/questions pane IDs,
      created_new_session)

      - tmux_available() - check shutil.which("tmux")

      - create_orchestration_layout(claude_cmd, dashboard_refresh, question_refresh)

      - _create_new_session_layout() - for when not already in tmux

      - _create_inplace_layout() - for when already in tmux

      - attach_to_session(session_name) - os.execvp into tmux attach

      - _shell_escape_cmd() - shlex.quote for tmux shell execution

      Reuse is_in_tmux, get_current_session_name from agenticcli.utils.tmux

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
- id: P2
  name: Session Dashboard Command
  status: pending
  tasks:
  - id: TU_002
    name: Add cmd_dashboard to session.py
    status: completed
    description: 'Add cmd_dashboard(args, ctx) to modules/AgenticCLI/src/agenticcli/commands/session.py

      - Rich.Live with auto-refreshing Table of active sessions

      - Reuse _list_all_sessions(), _update_session_status(), _check_session_health(),
      _format_relative_time()

      - Columns: ID (8-char), Status (colored), Health (OK/STALE/FAIL), Age, Role/Description

      - Filter to running/starting only

      - KeyboardInterrupt for clean exit

      - Add route in handle(): elif args.session_command == "dashboard"

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
  - id: TU_003
    name: Register session dashboard in cli.py
    status: completed
    description: 'Add @session_app.command("dashboard") to cli.py

      Options: --refresh/-r (int, default 5)

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
- id: P3
  name: Question Dashboard Command
  status: pending
  tasks:
  - id: TU_004
    name: Add cmd_dashboard to question.py
    status: completed
    description: 'Add cmd_dashboard(args, ctx) to modules/AgenticCLI/src/agenticcli/commands/question.py

      - Rich.Live with auto-refreshing Table of pending questions across all live
      plans

      - Scan docs/plans/live/*/questions/pending/*.yml

      - Columns: Plan (truncated), ID, Severity (color-coded), Question (truncated)

      - Title: Pending Questions (N)

      - KeyboardInterrupt for clean exit

      - Add route in handle(): elif args.question_command == "dashboard"

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/question.py
  - id: TU_005
    name: Register question dashboard in cli.py
    status: completed
    description: 'Add @question_app.command("dashboard") to cli.py

      Options: --refresh/-r (int, default 10)

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
- id: P4
  name: Refactor Orchestrate Command
  status: pending
  tasks:
  - id: TU_006
    name: Add tmux layout path to cmd_orchestrate
    status: completed
    description: 'Modify modules/AgenticCLI/src/agenticcli/commands/orchestrate.py

      - Check --no-tmux flag or tmux_available() for fallback to execvp

      - Call create_orchestration_layout() for tmux path

      - If created_new_session: attach_to_session()

      - If already in tmux: os.execvp("claude", cmd) in main pane

      - Graceful fallback on RuntimeError

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
  - id: TU_007
    name: Add new orchestrate flags to cli.py
    status: completed
    description: 'Add to orchestrate command in cli.py:

      - --no-tmux (bool, default False)

      - --dashboard-refresh (int, default 5)

      - --question-refresh (int, default 10)

      Pass through via _ns() call

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
- id: P5
  name: Verification
  status: pending
  tasks:
  - id: TU_008
    name: Run existing tests and verify no breakage
    status: completed
    description: 'python3 -m pytest modules/AgenticCLI/tests/ -x -q

      Verify all existing tests still pass after changes.

      '
  - id: TU_009
    name: Manual integration test
    status: completed
    description: '1. agentic orchestrate --help - verify new flags shown

      2. agentic session dashboard --help - verify new command

      3. agentic question dashboard --help - verify new command

      4. agentic orchestrate --no-tmux --dangerously-skip-permissions - fallback works

      5. agentic orchestrate --dangerously-skip-permissions - tmux 3-pane layout launches

      '
