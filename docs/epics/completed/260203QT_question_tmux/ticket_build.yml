context: 'This plan implements Tmux session support for human-in-the-loop (HITL) workflows,
  enabling

  remote operators to review and answer agent questions via CLI in a dedicated Tmux
  pane.


  ARCHITECTURE DECISION (CLI-First Strategy):

  - Agent runs in Tmux pane 1, generates question

  - Notification appears in dedicated Tmux pane 2

  - Operator switches to pane 2, runs CLI commands to answer

  - Agent detects answer and resumes work


  Tmux Integration:

  - Tmux session detection via TMUX env var

  - Dedicated notification pane creation

  - File watcher updates pane on new questions

  - CLI commands displayed for answering

  '
