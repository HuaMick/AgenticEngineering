  - id: QT-001
    name: Create Tmux Detection Utility Module
    description: 'Create a tmux utility module in AgenticCLI for detecting tmux environment,

      getting session information, and checking if agent is running in tmux.

      '
    status: completed
    agent: null
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/git.py
    - /home/code/AgenticEngineering/modules/AgenticGuidance/src/agenticguidance/services/session.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/tmux.py
    guidance: "Create a tmux.py utility module with the following functions:\n\n1.\
      \ is_in_tmux() -> bool\n   - Check TMUX environment variable\n   - Return True\
      \ if running in tmux session\n\n2. get_current_session_name() -> Optional[str]\n\
      \   - Parse TMUX env var to extract session name\n   - Use tmux display-message\
      \ -p '#S' as fallback\n   - Return None if not in tmux\n\n3. get_session_info(session_name:\
      \ Optional[str] = None) -> Optional[dict]\n   - Get session details (attached,\
      \ windows, panes)\n   - Use tmux list-sessions and list-windows commands\n \
      \  - Return dict with session metadata\n\n4. session_exists(session_name: str)\
      \ -> bool\n   - Check if named tmux session exists\n   - Use tmux has-session\
      \ command\n\nFollow the pattern from git.py with subprocess.run and error handling.\n\
      Use typing for all return types. Include docstrings with examples.\n"
    success_criteria:
    - is_in_tmux() returns True when TMUX env var is set
    - get_current_session_name() extracts correct session name from TMUX var
    - get_session_info() returns session metadata dict
    - session_exists() correctly identifies existing/non-existing sessions
    - Functions handle missing tmux binary gracefully
    - Unit tests cover all functions with mocked subprocess calls
