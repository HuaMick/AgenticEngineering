name: cli-docs-test
worktree_path: /home/code/AgenticEngineering-cli-docs-update
branch: ''
status: pending
priority: medium
objective: 'Ensure documentation quality by:

  1. Verifying README examples match --help output

  2. Testing all documented command examples

  3. Checking for broken or outdated references

  4. Validating command categories are accurate

  '
created: '2026-01-28'
phases:
- name: Final Documentation Audit
  description: Final review of all documentation changes
  tickets:
  - id: audit_01_001
    name: ''
    description: Review README completeness
    status: completed
    agent: null
    guidance: 'Final review of README.md:

      - All commands documented

      - Examples are accurate and tested

      - No TODO markers remain

      - Links work correctly

      '
    success_criteria:
    - README is complete and accurate
    - No placeholder content remains
  - id: audit_01_002
    name: ''
    description: Review --help consistency
    status: completed
    agent: null
    guidance: 'Final review of --help output:

      - Descriptions match README

      - No typos or inconsistencies

      - Examples in epilogs are accurate

      '
    success_criteria:
    - --help matches README
    - No inconsistencies found
- name: Cleanup
