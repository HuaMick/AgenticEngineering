_template_status: active
plan:
  name: CLI Bug Fixes
  worktree: /home/code/AgenticEngineering
  status: pending
  created: '2026-01-29'
  objective: 'Fix three critical bugs in CLI plan movement workflow discovered during
    260129CL review:

    1. Short-name resolution doesn''t work

    2. Archive doesn''t remove source folder

    3. Task move doesn''t remove from source YAML

    '
  phases:
  - name: Fix Short-name Resolution
    id: phase_shortname
    status: pending
    tasks:
    - id: fix_001
      name: Implement folder search in find_plan_folder
      status: completed
      description: 'Update find_plan_folder() in modules/AgenticCLI/src/agenticcli/commands/plan.py

        to search docs/plans/live/ for matching folder names when path is not found.


        When path provided:

        1. Check if path exists as-is

        2. If not, search docs/plans/live/ for matching folder name

        3. Support partial matching (e.g., "260129FI" matches "260129FI_cli_bug_fixes")

        '
      target_files:
      - modules/AgenticCLI/src/agenticcli/commands/plan.py
  - name: Fix Archive Source Removal
    id: phase_archive
    status: pending
    tasks:
    - id: fix_002
      name: Add rmtree after successful copytree
      status: completed
      description: 'In modules/AgenticGuidance/src/agenticguidance/services/plan.py,

        add shutil.rmtree(self.plan_path) after the successful copytree.


        Or replace copytree with shutil.move() entirely.

        Ensure dry-run mode does NOT remove source.

        '
      target_files:
      - modules/AgenticGuidance/src/agenticguidance/services/plan.py
  - name: Fix Task Move Source Removal
    id: phase_task
    status: pending
    tasks:
    - id: fix_003
      name: Add source file modification in move_task_to_completed
      status: completed
      description: 'After writing to plan_completed.yml, modify the source YAML to
        remove the task.

        Handle both flat task lists and nested tasks in phases.

        Preserve YAML structure and indentation.

        '
      target_files:
      - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - id: fix_004
      name: Add duplicate detection before appending
      status: completed
      description: 'Before appending task to completed_tasks list, check if task_id
        already exists.

        Skip with appropriate message if duplicate detected.

        '
      target_files:
      - modules/AgenticGuidance/src/agenticguidance/services/plan.py
  - name: Add Tests
    id: phase_tests
    status: pending
    tasks:
    - id: fix_005
      name: Add tests for short-name resolution
      status: completed
      description: 'Test short-name exact match and partial match.

        Test from different working directories.

        '
      target_files:
      - modules/AgenticCLI/tests/test_plan_movement.py
    - id: fix_006
      name: Add tests for archive and task move fixes
      status: completed
      description: 'Test archive removes source folder.

        Test task move removes from source YAML.

        Test duplicate detection.

        '
      target_files:
      - modules/AgenticCLI/tests/test_plan_movement.py
    - id: fix_007
      name: Run full test suite
      status: completed
      description: 'Run complete test suite to ensure no regressions.

        Fix any failing tests before completing plan.

        '
      target_files:
      - modules/AgenticCLI/tests/
      - modules/AgenticGuidance/tests/
