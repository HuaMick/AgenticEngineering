name: 260202CT_comprehensive_cli_command_test_suite
status: active
priority: high
plan_file: docs/plans/live/260202CT_comprehensive_cli_command_test_suite/live/plan_test.yml
context: 'This plan creates a comprehensive test suite for AgenticCLI after the MCP
  GUI

  dashboard feature was removed. The goal is to ensure all remaining CLI commands

  work correctly in both unit and integration contexts.


  The test plan covers:

  - All CLI command groups (plan, worktree, context, session, loop, etc.)

  - JSON output mode for automation

  - Error handling and helpful error messages

  - Real user workflows and scenarios


  Testing layers: Local + Docker (recommended baseline)

  - Local: Tests developer workflow with installed CLI

  - Docker: Tests CI/CD parity with shared pre-built image


  UAT validation is the primary success criteria for this plan.

  '
inputs:
- location: /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
  description: Main CLI structure with all command groups
- location: /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/entry.py
  description: CLI entry point handling --version and agent help
- location: /home/code/AgenticEngineering/modules/AgenticCLI/pyproject.toml
  description: Package configuration with entry points and dependencies
- location: /home/code/AgenticEngineering/modules/AgenticCLI/tests/
  description: Existing test suite patterns and fixtures
- location: /home/code/AgenticEngineering/modules/AgenticGuidance/userstories/MyAgents/
  description: User stories for CLI workflows
loop_structures:
- id: loop_test_fix
  type: test-fix-loop
  applies_to_phase: Component Testing
  trigger: After environment setup
  description: 'Iterative testing where tests validate CLI commands work correctly.

    Each iteration runs tests, identifies failures, and fixes issues

    until all tests pass or max iterations reached.

    '
  exit_criteria:
    success: All CLI command tests pass in local and Docker environments
    max_iterations: 5
    escalation: Escalate with test results and remaining failures
  participants:
  - agent: test-runner
    role: Executes CLI tests via smoke-test strategy
  - agent: builder
    role: Fixes CLI issues identified by tests
- id: loop_audit
  type: audit-test-fix-loop
  applies_to_phase: Test Quality Audit
  trigger: After initial test-fix-loop completes
  description: 'MANDATORY validation to detect reward hacking and verify test quality.

    Auditor examines tests for shortcuts, missing edge cases, and false positives.

    '
  exit_criteria:
    success: Audit passes AND all tests still pass after corrections
    max_iterations: 3
    escalation: BLOCK completion - audit failures must be resolved
  participants:
  - agent: test-audit
    role: Audits test quality and detects reward hacking
  - agent: test-runner
    role: Fixes audit-identified test issues
  - agent: builder
    role: Fixes implementation issues revealed by audit
  mandatory: true
- id: loop_uat
  type: user-story-validation-loop
  applies_to_phase: UAT Validation
  trigger: After audit-test-fix-loop passes
  description: 'UAT validation is PRIMARY SUCCESS CRITERIA. Uses test-user-simulator

    to validate complete CLI user journeys match real-world usage.

    '
  exit_criteria:
    success: All user story scenarios pass validation
    max_iterations: 3
    escalation: User stories not validated - implementation incomplete
  participants:
  - agent: test-user-simulator
    role: Simulates real user executing CLI workflows
  - agent: builder
    role: Fixes workflow issues identified during UAT
phases:
- name: Environment Setup
  execution: sequential
  description: Set up test environments (Local + Docker) before running tests
  status: pending
  tasks:
  - id: setup_001
    name: Local Environment Setup
    description: 'Install latest AgenticCLI version in local environment.

      Ensures UAT tests latest code, not stale installed version.


      Steps:

      1. Navigate to /home/code/AgenticEngineering/modules/AgenticCLI

      2. Run: uv pip install -e .

      3. Verify: agentic --version

      4. Verify: uv pip show agenticcli (version matches source)

      '
    status: completed
    agent_type: test-runner
    success_criteria:
    - CLI accessible via 'agentic' command
    - Version matches source (0.1.0)
    - All dependencies installed correctly
    target_files: []
  - id: setup_002
    name: Docker Environment Setup
    description: 'Build shared Docker test image for CI/CD parity testing.


      Steps:

      1. Check if Dockerfile.test exists in AgenticCLI module

      2. Build image: docker build -f Dockerfile.test -t agenticcli-test .

