# MISLEADING CONTENT
# ============================================================================
misleading_content:
  - file: plan_build.yml
    severity: HIGH
    description: >
      22 of 23 tasks are marked 'pending' but the work is complete in the codebase.
      An agent reading this plan would conclude:
        - The agent group has NOT been created (it has)
        - Plan commands have NOT been migrated (they have)
        - Agent prompts have NOT been updated (they have)
        - Tests have NOT been updated (they have, partially)
      This creates a HIGH risk of re-execution of already-completed work.

  - file: plan_test.yml
    severity: LOW
    description: >
      Stub file with 'TODO' placeholders. An agent might try to populate and
      execute this as if testing work is outstanding.

  - file: plan_teach.yml
    severity: LOW
    description: >
      Stub file with 'TODO' placeholders. An agent might try to populate and
      execute this as if documentation work is outstanding.

