# ============================================================================
# CODEBASE IMPLEMENTATION REALITY
# ============================================================================
implementation_reality:
  overall: COMPLETE
  summary: >
    The CLI restructure has been fully executed in the codebase. All structural
    goals described in the plan are live. The plan file is severely out of date
    with the code state.

  verified_implemented:
    - "'agentic agent --help' shows: plan, context, entrypoint, manifest, stories, question"
    - "'agentic agent' is hidden from 'agentic --help'"
    - "'agentic agent plan task' has: start, complete, prefill, list, status, add, update, current"
    - "'agentic agent plan' has: archive, unarchive, validate, scaffold, init, bootstrap, task, phase, move, orchestration, stories"
    - "'agentic agent context' has: bootstrap, role, task, inputs, generate-agent"
    - "'agentic agent entrypoint' has: list, show, execute"
    - "'agentic agent manifest' has: show, list, validate"
    - "'agentic agent stories' has: find, init, cat, status, update, report, untested, batch-update, affected"
    - "'agentic agent question' has: ask, defer, watch, watch-daemon, watch-stop"
    - "'agentic question --help' shows ONLY: list, show, answer, dashboard (plumbing hidden)"
    - "'agentic plan --help' shows ONLY: new, list, status, cancel"
    - "Backward compat aliases all work: agentic context bootstrap, agentic plan task start, agentic plan archive"
    - "21/25 .claude/agents/*.md files updated; remaining 4 have no CLI references"
    - ".agent/instructions.md fully updated to 'agentic agent ...' paths"
    - "agents.md fully updated with two-tier command table"
    - "docs/prompts/orchestration_planner.md updated"

  gaps_identified:
    - description: "test_backward_compat.py was not created (P07_T01)"
      severity: LOW
      reason: >
        Backward compat is working, but the formal parametrized test file
        specified in P07_T01 was never written. This is a test coverage gap,
        not a functional gap.
    - description: "plan_test.yml and plan_teach.yml are scaffold stubs (_template_status: stub)"
      severity: LOW
      reason: >
        These files were generated by 'agentic plan init' but never populated.
        They are not misleading about plan status but are clutter.
    - description: "plan_completed.yml has empty completed_items list"
      severity: LOW
      reason: >
        No completed items were formally moved to this file. The plan uses a
        different tracking pattern (status fields on individual tasks).
    - description: "22 tasks marked 'pending' in plan_build.yml despite being implemented"
      severity: HIGH
      reason: >
        This is the primary compliance issue. Any agent reading plan_build.yml
        would conclude the work has not been done and would re-execute already
        completed work. This is actively misleading.

