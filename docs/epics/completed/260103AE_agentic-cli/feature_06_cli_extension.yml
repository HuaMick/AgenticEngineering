# Feature 06: CLI Extensions for Subagent Support
# Additional CLI capabilities to reduce agent workload

feature:
  name: "CLI Extensions for Subagent Support"
  priority: 6
  status: completed
  completed_date: "2026-01-03"
  estimated_effort: high

  description: |
    Extended CLI commands specifically designed to offload work from subagents.
    These commands automate repetitive tasks that agents currently perform manually,
    allowing them to focus on reasoning rather than file manipulation.

  analysis_source:
    planner_agents: "modules/AgenticGuidance/agents/planner/"
    deploy_agents: "modules/AgenticGuidance/agents/deploy/"

  commands:
    - name: "inputs validate"
      usage: "agentic inputs validate <inputs-file>"
      description: "Validate all input references in an inputs.yml file"
      rationale: |
        Planner agents currently manually check if referenced files exist.
        This command automates input file resolution and validation.
      steps:
        - "Parse inputs.yml file"
        - "Resolve all file/layer references"
        - "Check each reference exists"
        - "Report broken references with suggestions"

    - name: "inputs resolve"
      usage: "agentic inputs resolve <inputs-file>"
      description: "Show resolved paths for all inputs"
      rationale: |
        Agents waste tokens parsing transitive layer references.
        CLI can resolve and display the full input tree.
      steps:
        - "Parse inputs.yml file"
        - "Recursively resolve layer references"
        - "Display complete input list with paths"

    - name: "template generate"
      usage: "agentic template generate <type> --output <path>"
      description: "Generate plan files from templates"
      types:
        - "build: Generate plan_live_teach.yml from build template"
        - "test: Generate plan_live_test.yml from test template"
        - "cleanup: Generate plan_live_audit_clean.yml from cleanup template"
        - "guidance: Generate guidance plan template"
      rationale: |
        Planners currently copy example files and manually update them.
        CLI can generate properly formatted files with injected metadata.
      steps:
        - "Load template for specified type"
        - "Inject context (worktree, branch, date)"
        - "Write to output path"

    - name: "stories find"
      usage: "agentic stories find [--project <project>] [--changes <files>]"
      description: "Find relevant user stories for testing"
      rationale: |
        planner-test and planner-cleaning manually locate user stories.
        CLI can scan and filter stories based on affected files.
      steps:
        - "Scan modules/AgenticGuidance/userstories/"
        - "Categorize by prefix (US-INSTALL-*, US-*, etc.)"
        - "Filter by project if specified"
        - "Match to changed files if specified"
        - "Display story list"

    - name: "manifest show"
      usage: "agentic manifest show <agent-path>"
      description: "Display formatted agent manifest"
      rationale: |
        Agents need to read and understand manifests of other agents.
        CLI provides quick access without file reading overhead.
      steps:
        - "Read manifest.yml from agent path"
        - "Display formatted output"
        - "Show triggers, patterns, and capabilities"

    - name: "cicd audit"
      usage: "agentic cicd audit"
      description: "Audit CI/CD configuration against codebase"
      rationale: |
        deploy-cicd agent manually audits cloudbuild.yaml against test directories.
        CLI can automate drift detection.
      steps:
        - "Parse cloudbuild.yaml test steps"
        - "List actual test packages in tests/"
        - "Flag discrepancies"
        - "Report findings"

  implementation_steps:
    - id: "06.1"
      task: "Add inputs subparser"
      status: completed
      details: |
        Add 'inputs' subparser with validate/resolve subcommands
        Implement YAML parsing with layer resolution

    - id: "06.2"
      task: "Add template subparser"
      status: completed
      details: |
        Add 'template' subparser with generate subcommand
        Store templates in package data or assets
        Inject metadata using string templates

    - id: "06.3"
      task: "Add stories subparser"
      status: completed
      details: |
        Add 'stories' subparser with find subcommand
        Implement directory scanning
        Add filtering by project and changes

    - id: "06.4"
      task: "Add manifest subparser"
      status: completed
      details: |
        Add 'manifest' subparser with show subcommand
        Parse and format manifest.yml
        Display triggers and patterns

    - id: "06.5"
      task: "Add cicd subparser"
      status: completed
      details: |
        Add 'cicd' subparser with audit subcommand
        Parse cloudbuild.yaml
        Compare to tests/ directory

  success_criteria:
    - "`agentic inputs validate inputs.yml` reports broken references"
    - "`agentic inputs resolve inputs.yml` shows full input tree"
    - "`agentic template generate build` creates valid plan file"
    - "`agentic stories find --project AgenticCLI` lists relevant stories"
    - "`agentic manifest show agents/deploy/deploy-worktree` shows manifest"
    - "`agentic cicd audit` detects test coverage gaps"

  agent_impact:
    deploy-worktree:
      - "Uses: agentic worktree create, agentic plan scaffold"
      - "Eliminates: Git commands, folder creation, file initialization"

    planner-build:
      - "Uses: agentic template generate build, agentic inputs validate"
      - "Eliminates: Template copying, input checking"

    planner-test:
      - "Uses: agentic stories find, agentic template generate test"
      - "Eliminates: Story scanning, template copying"

    planner-cleaning:
      - "Uses: agentic plan task complete, agentic plan archive"
      - "Eliminates: Manual YAML editing, folder copying"

    planner-reviewer:
      - "Uses: agentic plan validate, agentic inputs validate"
      - "Eliminates: Structure validation, reference checking"

    deploy-cicd:
      - "Uses: agentic cicd audit"
      - "Eliminates: Manual file comparison"
