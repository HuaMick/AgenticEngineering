# Guidance Improvement Plan: planner-cleaning Agent
# Generated by: planner-guidance
# Target: Fix guidance inconsistencies in planner-cleaning agent files

name: "guidance-planner-cleaning-remediation"
status: "active"
priority: "high"

context: |
  Self-review of planner-cleaning agent identified 6 guidance inconsistencies that cause
  agent confusion during plan creation. Key issues include example file mismatches,
  phase ordering contradictions, and missing loop type definitions.

  USER DECISIONS (AUTHORITATIVE):
  1. Phase ordering is a LOOSE rule - planners select appropriate ordering based on context
  2. User Story Validation Phase can have its own loop type in agent-loops.yml
  3. Remove stale example references (plan_live_audit_clean.yml as example). Use plan_example.yml as loose reference
  4. Create planner components at modules/AgenticGuidance/assets/examples/planner/components/
  5. Simplify anchor syntax where complexity outweighs gain

target_files:
  - modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml
  - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
  - modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml
  - modules/AgenticGuidance/assets/definitions/agent-loops.yml

# ========================================
# PHASE 1: Guidance Remediation Tasks
# ========================================
phases:
  - name: "Guidance Remediation Phase"
    execution: sequential
    description: "Fix planner-cleaning guidance inconsistencies"

    tasks:
      # ----------------------------------------
      # TASK 1: Fix example file reference mismatch in inputs.yml
      # ----------------------------------------
      - id: "teach_001"
        name: "Remove stale example reference from inputs.yml"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml
          - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml
        guidance: |
          PROBLEM:
          inputs.yml line 56-59 references plan_example.yml as "Unified plan example showing how to
          include cleanup, audit, and documentation phases within a single plan file."

          However, process.yml step 4 line 62 says "Reference the example live plan file from inputs
          (live/plan_live_audit_clean.yml)" - these don't match.

          SOLUTION:
          Update inputs.yml core_inputs to:
          1. Keep the plan_example.yml reference but update its description to clarify it shows
             STRUCTURE patterns (phase layout, task format) not specific output filenames
          2. Remove the implication that agents should output to plan_live_audit_clean.yml specifically

          CHANGES TO MAKE in inputs.yml (around line 56-59):
          Replace:
            - type: file
              path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
              description: "Unified plan example showing how to include cleanup, audit, and documentation phases within a single plan file."
              required: true

          With:
            - type: file
              path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
              description: "Reference plan showing phase structure patterns (task format, execution groups, success criteria). Use as structural guide, not output template."
              required: true

          Also update the pattern reference at line 76-78:
          Replace:
            - type: pattern
              path: "docs/plans/live/YYMMDDRepo_Branch/"
              description: "The live plan folder containing plan_live_teach.yml, plan_live_test.yml, and plan_live_audit_clean.yml. Planner-cleaning outputs to plan_live_audit_clean.yml and moves completed items to plan_completed.yml in the same folder."

          With:
            - type: pattern
              path: "docs/plans/live/YYMMDDRepo_Branch/"
              description: "The live plan folder. Planner-cleaning creates finalization phases (cleanup, audit, user-story-validation, documentation) with appropriate file naming based on context."

        success_criteria:
          - inputs.yml no longer implies a specific output filename (plan_live_audit_clean.yml)
          - plan_example.yml is described as structural reference, not output template
          - Planner is empowered to choose appropriate file organization

      # ----------------------------------------
      # TASK 2: Fix circular reference in process.yml
      # ----------------------------------------
      - id: "teach_002"
        name: "Remove self-referential example guidance from process.yml"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
          - modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
        guidance: |
          PROBLEM:
          process.yml step 4 (lines 57-74) contains circular/confusing references:
          - Line 62: "Reference the example live plan file from inputs (live/plan_live_audit_clean.yml)"
          - Line 70: "Write finalization phases to: docs/plans/live/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"

          This creates confusion because:
          1. The example file IS the output file (self-reference)
          2. inputs.yml actually references plan_example.yml, not plan_live_audit_clean.yml
          3. Hardcoded filename limits planner flexibility

          SOLUTION:
          Update step 4 to reference manifest.yml for phase definitions and plan_example.yml
          for structural patterns. Remove hardcoded output filename.

          CHANGES TO MAKE in process.yml step 4 (lines 57-74):
          Replace the entire step 4 content with:
            - |
              Add finalization phases following the phase definitions in manifest.yml:
              See manifest.yml phase_creation_rules for phase definitions and recommended ordering
              (cleanup_phase, audit_phase, user_story_validation_phase, documentation_phase).

              PHASE ORDERING (LOOSE RULE):
              The manifest.yml order (Cleanup -> Audit -> User Story Validation -> Documentation)
              is a sensible default. Planners may adjust ordering based on context.

              STRUCTURAL PATTERNS:
              Reference plan_example.yml from inputs for:
              - Phase structure and execution groups
              - Task format with inputs, guidance, and success_criteria
              - File-level inputs for context routing

              OUTPUT LOCATION:
              - Create finalization phases in: docs/plans/live/YYMMDDRepo_Branch/live/
              - Use descriptive file names based on phase content (e.g., plan_live_finalization.yml)
              - Move completed items to: docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml

              DUMPING GROUND: Use additional subfolders (e.g., audit-results/, analysis/) to store agent artifacts.

          Also update the outputs section (lines 27-37) to remove hardcoded plan_live_audit_clean.yml:
          Replace line 28:
            - location: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
              description: "Cleanup, audit, and documentation phases for the live plan"
          With:
            - location: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_*.yml"
              description: "Finalization phases (cleanup, audit, user-story-validation, documentation)"

        success_criteria:
          - process.yml step 4 references manifest.yml for phase definitions (not circular example)
          - Output filename is flexible, not hardcoded to plan_live_audit_clean.yml
          - Planners understand phase ordering is a LOOSE rule

      # ----------------------------------------
      # TASK 3: Update manifest.yml to clarify loose ordering
      # ----------------------------------------
      - id: "teach_003"
        name: "Clarify phase ordering as loose rule in manifest.yml"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml
          - modules/AgenticGuidance/assets/definitions/agent-loops.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml
        guidance: |
          PROBLEM:
          manifest.yml phase_creation_rules (lines 16-21) states:
            "Phase Order (must follow this sequence):"
          This is too rigid per USER DECISION: phase ordering is a LOOSE rule.

          Also, agent-loops.yml phase_ordering (lines 90-97) shows a different order:
            1. test-fix-loop
            2. cleaner-voting-loop
            3. audit-test-fix-loop (mandatory after cleanup)
            4. documentation-loop

          While manifest.yml shows:
            1. Cleanup
            2. Audit
            3. User Story Validation
            4. Documentation

          These can both be correct (different perspectives) but need clarification.

          SOLUTION:
          Update manifest.yml to mark ordering as a sensible default, not a strict requirement.

          CHANGES TO MAKE in manifest.yml phase_creation_rules (lines 16-21):
          Replace:
            phase_creation_rules: |
              Phase Order (must follow this sequence):
              1. CLEANUP PHASE - Remove obsolete files before final testing
              2. AUDIT PHASE - Validate test quality and detect reward hacking
              3. USER STORY VALIDATION PHASE - Ensure User Story tests pass (PRIMARY SUCCESS CRITERIA)
              4. DOCUMENTATION PHASE - Document final state (comes last)

          With:
            phase_creation_rules: |
              Phase Order (SENSIBLE DEFAULT - planners may adjust based on context):
              1. CLEANUP PHASE - Remove obsolete files before final testing
              2. AUDIT PHASE - Validate test quality and detect reward hacking
              3. USER STORY VALIDATION PHASE - Ensure User Story tests pass (PRIMARY SUCCESS CRITERIA)
              4. DOCUMENTATION PHASE - Document final state (comes last)

              RATIONALE:
              - Cleanup before audit ensures audit doesn't flag soon-to-be-removed files
              - Audit before user story validation ensures tests are valid
              - Documentation last ensures it reflects validated behavior

              FLEXIBILITY:
              Planners may reorder phases when context warrants (e.g., documentation-first for
              user-facing changes, audit-first when test quality is primary concern).

        success_criteria:
          - manifest.yml explicitly marks phase ordering as "SENSIBLE DEFAULT"
          - Rationale for ordering is documented (helps planners decide when to deviate)
          - Planners are explicitly empowered to adjust ordering

      # ----------------------------------------
      # TASK 4: Add user-story-validation-loop to agent-loops.yml
      # ----------------------------------------
      - id: "teach_004"
        name: "Add user-story-validation-loop type to agent-loops.yml"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/assets/definitions/agent-loops.yml
          - modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml
        target_files:
          - modules/AgenticGuidance/assets/definitions/agent-loops.yml
        guidance: |
          PROBLEM:
          manifest.yml defines a User Story Validation Phase (lines 88-107) but there is no
          corresponding loop type in agent-loops.yml. The phase uses "user_simulator agents"
          with "agent-blind-test approach" but this pattern lacks a formal loop definition.

          USER DECISION: User Story Validation Phase can have its own loop type.

          SOLUTION:
          Add user-story-validation-loop to agent-loops.yml loop_types section.

          CHANGES TO MAKE in agent-loops.yml:
          Add after documentation-loop (around line 55), before exploration-loop:

            user-story-validation-loop:
              purpose: "Validate complete user journeys through blind testing"
              phase: "user-story-validation"
              when_to_use: "After audit phase to confirm implementation meets user needs"
              maximum_iterations: 3
              core_pattern: "Execute story -> Report gaps -> Fix -> Repeat"
              note: |
                User simulator agents execute story tests following documentation only.
                This is the PRIMARY SUCCESS CRITERIA for implementation work.

          Also update phase_ordering (lines 90-97) to include user-story-validation:
          Replace order section:
            order:
              - "1. test-fix-loop (active development)"
              - "2. cleaner-voting-loop (cleanup)"
              - "3. audit-test-fix-loop (MANDATORY after cleanup)"
              - "4. documentation-loop (final phase)"

          With:
            order:
              - "1. test-fix-loop (active development)"
              - "2. cleaner-voting-loop (cleanup)"
              - "3. audit-test-fix-loop (MANDATORY after cleanup)"
              - "4. user-story-validation-loop (PRIMARY SUCCESS CRITERIA)"
              - "5. documentation-loop (final phase)"

        success_criteria:
          - agent-loops.yml contains user-story-validation-loop definition
          - phase_ordering includes user-story-validation step
          - Loop definition matches manifest.yml user_story_validation_phase semantics

      # ----------------------------------------
      # TASK 5: Fix example phase ordering in plan_live_audit_clean.yml
      # ----------------------------------------
      - id: "teach_005"
        name: "Update example to show sensible default ordering"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml
          - modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml
        target_files:
          - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml
        guidance: |
          PROBLEM:
          The example plan_live_audit_clean.yml shows:
            1. Audit Phase (lines 19-50)
            2. Cleanup Phase (lines 52-75)

          This contradicts manifest.yml which says Cleanup comes before Audit.
          However, per USER DECISION, ordering is a LOOSE rule. The example should
          show the sensible default while noting flexibility.

          SOLUTION:
          Reorder the example to show Cleanup->Audit (sensible default) and add a comment
          explaining the ordering is flexible.

          CHANGES TO MAKE in plan_live_audit_clean.yml:
          1. Move Cleanup Phase before Audit Phase in the phases array
          2. Add header comment explaining ordering flexibility

          Replace the header (lines 1-4) with:
            # Live Plan - Audit and Cleanup Phase (Example)
            # This example shows structure for combined audit and cleanup phases.
            # Phase ordering shown is the SENSIBLE DEFAULT per manifest.yml.
            # Planners may reorder phases when context warrants.
            # For detailed audit scenarios, see: reference/audit-scenarios-detailed.yml

          Reorder phases to show Cleanup first:
            phases:
              # ========================================
              # CLEANUP PHASE (Comes First - Sensible Default)
              # ========================================
              - name: Cleanup Phase
                # ... existing Cleanup Phase content ...

              # ========================================
              # AUDIT PHASE (After Cleanup - Validates Without Obsolete Files)
              # ========================================
              - name: Audit Phase
                # ... existing Audit Phase content ...

        success_criteria:
          - Example shows Cleanup before Audit (matching manifest.yml sensible default)
          - Header comment notes ordering flexibility
          - Example serves as accurate structural reference

      # ----------------------------------------
      # TASK 6: Remove process.yml guideline self-reference
      # ----------------------------------------
      - id: "teach_006"
        name: "Fix guideline that references stale example file"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
        guidance: |
          PROBLEM:
          process.yml guidelines section (lines 84-95) contains:
            Line 90: "Use plan_live_audit_clean.yml as the authoritative example for phase structure"

          This is problematic because:
          1. It references a specific output filename as the example
          2. Creates circular confusion (output file = example file)
          3. inputs.yml actually points to plan_example.yml

          SOLUTION:
          Update guidelines to reference manifest.yml for phase definitions and plan_example.yml
          for structural patterns.

          CHANGES TO MAKE in process.yml guidelines (lines 88-94):
          Replace:
            - |
              REFERENCE STRUCTURE:
              - Use plan_live_audit_clean.yml as the authoritative example for phase structure
              - Follow the same patterns for execution groups, inputs, guidance, and success criteria
              - Ensure inputs are file-level (not directory-level)
              - Provide detailed guidance for orchestration agent
              - Define measurable success criteria

          With:
            - |
              REFERENCE STRUCTURE:
              - Use manifest.yml for phase definitions and ordering guidance
              - Use plan_example.yml for structural patterns (execution groups, inputs, guidance, success criteria)
              - Ensure inputs are file-level (not directory-level)
              - Provide detailed guidance for orchestration agent
              - Define measurable success criteria

        success_criteria:
          - Guidelines reference manifest.yml (phase definitions) and plan_example.yml (structure)
          - No circular reference to output file as example
          - Guidance is clear and consistent with inputs.yml

success_criteria:
  - All 6 guidance inconsistencies resolved
  - planner-cleaning agent files are internally consistent
  - inputs.yml, process.yml, and manifest.yml reference each other correctly
  - agent-loops.yml includes user-story-validation-loop
  - Example file ordering matches manifest.yml sensible default
  - Planners understand phase ordering is flexible, not rigid
