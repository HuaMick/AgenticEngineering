      - "modules/AgenticGuidance/agents/test/test-*/process.yml"
    effort: "2-3 hours"
    impact: "HIGH - enables JIT CLI adoption across all agents"

  - id: "REC-002"
    priority: HIGH
    action: "Add JIT CLI reference to orchestration agent inputs.yml"
    description: |
      Update orchestration agent inputs.yml files to reference the
