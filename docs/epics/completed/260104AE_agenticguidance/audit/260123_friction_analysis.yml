    priority: CRITICAL
    action: "Add JIT CLI bootstrap step to all agent process.yml files"
    description: |
      Update modules/AgenticGuidance/agents/*/process.yml to include a
      bootstrap step that instructs agents to run:

      ```
      agentic context bootstrap --role <role-id> -j
      ```

      This should be the FIRST step before any file exploration.
    target_files:
      - "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
      - "modules/AgenticGuidance/agents/build/build-python/process.yml"
      - "modules/AgenticGuidance/agents/deploy/deploy-cicd/process.yml"
      - "modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml"
      - "modules/AgenticGuidance/agents/orchestration/orchestration-*/process.yml"
