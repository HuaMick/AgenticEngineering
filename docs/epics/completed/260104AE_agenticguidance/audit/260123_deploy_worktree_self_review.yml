context_minimisation:
  criterion: "Guidance follows context-minimisation principles"
  status: MIXED
  findings:
    - finding: "JIT CLI Bootstrap Referenced in Process"
      status: PASS
      evidence: |
        process.yml lines 51-64: Explicit JIT CLI bootstrap step documented
        with concrete commands and output expectations.
      assessment: |
        POSITIVE: Process file now includes JIT CLI commands as FIRST step,
        directly addressing friction analysis REC-001.

    - finding: "Bootstrap File Exists"
      status: PASS
      evidence: |
        .claude/agents/deploy-worktree.md contains complete bootstrap protocol
        with CLI command reference table (lines 24-34)
      assessment: "Bootstrap file provides thin-client alternative to full guidance"

    - finding: "Inline Definitions Bloat"
      status: CONCERN
      evidence: |
        inputs.yml lines 103-166: Agent-specific definitions section contains
        4 inline definitions (worktree_naming_convention, git_worktree_commands,
        workspace_file, worktree_operations, planning_scaffolding).

        Token estimate for definitions section: ~800 tokens
        These definitions duplicate content from other files:
        - worktree_naming_convention: Duplicate of plans.yml#naming_convention
        - worktree_operations: Duplicate of worktree-and-branching.yml rules
      assessment: |
        CONCERN: Inline definitions create duplication and maintenance burden.
        According to context-minimisation.yml line 114: "Inline definitions >100
        tokens should be extracted to shared assets."

    - finding: "Layer Architecture is Sound"
      status: PASS
      evidence: |
        inputs.yml lines 54-68: Uses transitive layer loading pattern:
        - layer: core-system.yml (required: true)
        - layer: deploy-minimal.yml (required: true)
        - layer: deploy-shared.yml (required: true)

        This design allows CLI bootstrap to return minimal seed context,
        with file-based fallback for detailed procedures.
      assessment: |
        POSITIVE: Architecture supports context-minimisation via layering.
        Agents can start with bootstrap and retrieve detailed guidance on-demand.

    - finding: "Required Inputs Section is Appropriate"
      status: PASS
      evidence: |
        inputs.yml lines 11-41: Required inputs clearly specified:
        - REPO_ROOT: Essential for path resolution
        - branch_name: Essential for git operations
        - base_branch: Optional with reasonable default

        Each input has description, type, example, and note explaining usage.
      assessment: |
        POSITIVE: Required inputs section is minimal and focused.
        No unnecessary context provided upfront.

  ratings:
    layer_architecture: STRONG
    bootstrap_protocol: STRONG
    inline_definitions: WEAK
    overall: GOOD_WITH_IMPROVEMENT_OPPORTUNITY

  recommendations:
    - action: "Extract inline definitions to dedicated reference file"
      rationale: |
        Create modules/AgenticGuidance/agents/deploy/deploy-worktree/references.yml
        containing worktree_naming_convention, git_worktree_commands,
        workspace_file, worktree_operations, planning_scaffolding.

        Replace inline content in inputs.yml with:
        ```
        references:
          - path: "deploy-worktree/references.yml"
            description: "Worktree operation procedures and definitions"
            required: true
        ```

        Token savings: ~600 tokens per agent session

      priority: MEDIUM
      effort: "30 minutes"
      impact: "Reduced context bloat, improved maintainability"

    - action: "Add 'prefer JIT CLI' note to bootstrap section"
      rationale: |
        Add note to process.yml line 64-65:
        ```
        CLI output provides your objective, process summary, input file paths.
        PREFER JIT CLI: For structured context, use CLI commands.
        ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
        ```
      priority: LOW
      effort: "5 minutes"
      impact: "Reinforces context-minimisation for agent implementation"

