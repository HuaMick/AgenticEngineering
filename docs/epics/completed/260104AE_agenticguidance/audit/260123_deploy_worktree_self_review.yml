# =============================================================================
# SECTION 5: SAFETY AND PREFLIGHT VALIDATION
# =============================================================================

safety_and_validation:
  criterion: "Guidance includes proper safety checks and preflight validation"
  status: GOOD
  findings:
    - finding: "Preflight Coverage"
      status: GOOD
      evidence: |
        inputs.yml lines 146-159: "Safety checks" section covers:
        - Verify worktree path doesn't already exist
        - Ensure branch name doesn't conflict with existing branches
        - Validate workspace file remains valid JSON after modification
        - Confirm git operations succeed before updating workspace file
      assessment: |
        GOOD: Safety checks are documented and appropriate.
        However, no explicit "FAIL-FAST PREFLIGHT" section in process.yml
        showing these checks run before main operations.

    - finding: "Missing Explicit Preflight Step in Process"
      status: CONCERN
      evidence: |
        process.yml lines 51-114: Process steps proceed directly to CLI
        bootstrap and worktree creation without explicit preflight validation.

        safety.yml lines 27-37 define "Fail-fast preflight" as a core rule:
        - "Verify required input files exist"
        - "Confirm tool availability (Docker, git, package managers)"
        - "Check environment variables and permissions"
      assessment: |
        MINOR ISSUE: Process should include explicit preflight step that
        validates git availability, REPO_ROOT accessibility, and permissions
        before attempting worktree operations.

    - finding: "Error Handling Documentation"
      status: GOOD
      evidence: |
        process.yml lines 90-95: Exit codes documented for agentic plan init:
        - 0: Success
        - 1: Worktree creation failed
        - 2: Folder already exists
        - 3: Invalid branch name or description

        .claude/agents/deploy-worktree.md lines 36-40: Error Handling section
        provides guidance for common failure modes.
      assessment: |
        GOOD: Error handling documentation enables graceful failure recovery.

    - finding: "No Escalation Triggers Documented"
      status: CONCERN
      evidence: |
        safety.yml lines 39-49 defines "Proactive escalation" rule:
        - "Ambiguous or conflicting requirements"
        - "Prerequisites cannot be met after multiple attempts"
        - "System behavior contradicts safety guidelines"

        Deploy-worktree guidance does not include escalation guidance for
        scenarios like: insufficient disk space, workspace file corruption,
        git configuration issues.
      assessment: |
        MINOR ISSUE: Guidance should include escalation triggers for
        unrecoverable errors to prevent endless retry loops.

  rating: GOOD
  recommendations:
    - action: "Add explicit preflight step to process.yml"
      text: |
        Add before step 1 (JIT CLI bootstrap):

        ```
        - |
          PREFLIGHT VALIDATION (Run FIRST):
          Before bootstrapping context, validate all prerequisites:

          1. Verify git is available:
             git --version

          2. Verify REPO_ROOT is accessible:
             test -d ${REPO_ROOT} && echo "REPO_ROOT exists"

          3. Verify git configuration is valid in REPO_ROOT:
             cd ${REPO_ROOT} && git rev-parse --show-toplevel

          4. Verify .code-workspace file is readable:
             ls ${REPO_ROOT}/*.code-workspace 2>/dev/null || echo "No workspace file found"

          If any check fails, escalate immediately with diagnostic information.
        ```
      priority: MEDIUM
      effort: "15 minutes"

    - action: "Add escalation triggers to Error Handling"
      text: |
        Add to .claude/agents/deploy-worktree.md after line 40:

        ```
        ## Escalation Triggers

        Stop work and request human intervention if:
        - Preflight checks fail (git unavailable, REPO_ROOT inaccessible)
        - Worktree creation fails after 1 retry with clear error
        - Workspace file is corrupt or unparseable JSON
        - Disk space is insufficient (< 500MB free)
        - Git configuration is broken (invalid repository)
        ```
      priority: MEDIUM
      effort: "10 minutes"

