# Guidance Review: Single Happy Path Principle
# Created: 2026-01-19
# Trigger: Planner agents proposed --main flag instead of single default behavior

plan:
  name: "Review Single Happy Path Guidance"
  worktree: "agenticguidance"
  status: completed
  completed_at: "2026-01-19"

  description: |
    Review and potentially strengthen guidance around the "single happy path" principle.

    Observation: When asked to implement Main-First Planning, the planner-build agent
    proposed adding a --main flag to provide options, instead of simply changing the
    default behavior to always use main. This suggests guidance may not adequately
    emphasize preferring single-path solutions over optional behaviors.

  objective: |
    Audit guidance files for clear statements about:
    1. Preferring single happy paths over optional flags/configurations
    2. Defaulting to correct behavior rather than requiring explicit flags
    3. Avoiding unnecessary complexity through options when a single path suffices

  phases:
    - id: "phase_audit"
      name: "Audit Existing Guidance"
      status: "completed"
      tasks:
        - id: "audit_001"
          description: "Search guidance files for statements about happy paths, defaults, and options"
          status: "completed"
          inputs:
            - modules/AgenticGuidance/assets/guidelines/
            - modules/AgenticGuidance/assets/definitions/
          success_criteria:
            - "Identify any existing statements about single happy path"
            - "Identify any statements about defaults vs flags"
            - "Document gaps in guidance"

    - id: "phase_remediation"
      name: "Add Single Happy Path Guidance"
      status: "completed"
      tasks:
        - id: "teach_001"
          description: "Add guideline about preferring single happy path over optional behaviors"
          status: "completed"
          target_files:
            - modules/AgenticGuidance/assets/guidelines/fix-the-source.yml
          guidance: |
            Consider adding a rule like:

            - rule: "Single Happy Path"
              description: |
                When implementing features or behaviors, prefer a single correct path
                over providing options. If there is a clearly correct default behavior,
                implement it as the only behavior rather than adding flags or options.
              justification: |
                Options add cognitive load and maintenance burden. If one option is
                clearly better, make it the default and only path. Users should not
                need to know about implementation details to get correct behavior.
              characteristics:
                - "Prefer single defaults over multiple options"
                - "If a flag is needed, question whether the non-flagged behavior is correct"
                - "Options should be reserved for truly orthogonal user preferences"
          success_criteria:
            - "Guideline added to appropriate file"
            - "Guideline is clear and actionable"

  context: |
    This plan was created because:
    - User requested Main-First Planning implementation
    - planner-build agent proposed: `agentic plan init --main` flag
    - User feedback: "just one happy path please, the plans should always get created in main"
    - The correct solution was: change default behavior, no flag needed

    This indicates planner agents may be biased toward adding options when a single
    path is sufficient. Guidance should be strengthened to counteract this bias.

  success_criteria:
    - "Guidance audit completed"
    - "Single Happy Path principle documented"
    - "Future planners will default to single-path solutions"
