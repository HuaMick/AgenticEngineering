# Guidance Improvement Plan: planner-build Agent
# Created: 2026-01-09
# Objective: Fix inconsistencies, contradictions, and outdated references in planner-build guidance

plan_name: "planner-build-guidance-remediation"
worktree: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"
status: "active"
priority: "high"

objective: |
  Fix six identified issues in planner-build agent guidance:
  1. Output file reference inconsistency between process.yml and inputs.yml
  2. CI/CD responsibility contradiction between manifest.yml and process.yml
  3. Missing file reference (fragment-references.yml documented but exists)
  4. Orphaned architecture reference (~/.config/mymodules path)
  5. Pattern path may never match (plan_live_build.yml pattern)
  6. Output file naming ambiguity

context: |
  Self-review identified inconsistencies in planner-build guidance files.
  User decisions clarify: planner-test handles CI/CD validation (NOT planner-build),
  remove outdated home directory config references, simplify anchor syntax if complex.

inputs:
  - location: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
    description: "Current planner-build inputs (target for remediation)"
  - location: "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
    description: "Current planner-build process (target for remediation)"
  - location: "modules/AgenticGuidance/agents/planner/planner-build/manifest.yml"
    description: "Current planner-build manifest (target for remediation)"
  - location: "modules/AgenticGuidance/assets/definitions/fragment-references.yml"
    description: "Fragment reference syntax documentation (exists, valid reference)"
  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
    description: "Unified plan example showing correct structure"
  - location: "modules/AgenticGuidance/agents/planner/planner-test/process.yml"
    description: "planner-test process showing CI/CD responsibility"

# ============================================
# PHASE 1: Fix CI/CD Responsibility Contradiction
# ============================================
phases:
  - name: "phase-1-cicd-responsibility-fix"
    description: "Remove CI/CD responsibility from manifest.yml - planner-test handles this"
    agent_category: "teacher"

    tasks:
      - id: "teach_001"
        name: "Remove CI/CD mandatory_phases from manifest.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
          - modules/AgenticGuidance/agents/planner/planner-test/process.yml
          - modules/AgenticGuidance/assets/definitions/separation-of-concerns.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
        guidance: |
          Remove the entire `mandatory_phases` section from manifest.yml (lines 19-32).

          Reason: User decision - planner-test handles CI/CD validation phases, NOT planner-build.
          The planner-test/process.yml already includes CI/CD validation guidance (line 82-83):
          "For plans modifying test structure, verify CI/CD validation phase is included"

          Replace with a brief note directing to planner-test:

          cicd_note: |
            CI/CD validation phases are planned by planner-test, not planner-build.
            See: modules/AgenticGuidance/agents/planner/planner-test/process.yml
        acceptance_criteria:
          - "mandatory_phases section removed from manifest.yml"
          - "cicd_note added explaining planner-test handles CI/CD"
          - "No duplicate CI/CD responsibility across planner agents"

      - id: "teach_002"
        name: "Remove orphaned home directory config reference from manifest.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
        guidance: |
          Remove line 13 from architecture_checklist in manifest.yml:
          "- Home directory config (~/.config/mymodules/AgenticGuidance/agents/ as single source of truth)"

          Reason: User decision - this is an outdated pattern that no longer applies.
          The home directory config approach was deprecated.

          Keep the remaining architecture checklist items (worktree, absolute paths,
          Domain->Workflow->Entrypoint, service boundaries, test structure).
        acceptance_criteria:
          - "~/.config/mymodules path reference removed from manifest.yml"
          - "Other valid architecture_checklist items preserved"

  # ============================================
  # PHASE 2: Fix Output File Reference Inconsistency
  # ============================================
  - name: "phase-2-output-file-consistency"
    description: "Align output file references between process.yml and inputs.yml"
    agent_category: "teacher"
    dependencies:
      - "phase-1-cicd-responsibility-fix"

    tasks:
      - id: "teach_003"
        name: "Fix process.yml output file references"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-build/process.yml
          - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/process.yml
        guidance: |
          Issue: process.yml has inconsistent output file references:
          - Line 29: "live/plan_live_build.yml"
          - Line 33: "live/plan_live_build.yml" (correct)
          - Line 37: References "live/plan_live_build.yml" as example input (confusing - should reference plan_example.yml)

          Fix line 37 to reference the correct example file:

          BEFORE (line 37):
          "Reference the example live plan file from inputs (`live/plan_live_build.yml`) for:"

          AFTER:
          "Reference plan_example.yml from inputs for:"

          The inputs.yml already correctly references:
          "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"

          This ensures process.yml references the EXAMPLE file (plan_example.yml),
          not the OUTPUT file (plan_live_build.yml).
        acceptance_criteria:
          - "Line 37 references plan_example.yml (example) not plan_live_build.yml (output)"
          - "Clear distinction between example files and output files"

      - id: "teach_004"
        name: "Remove or update pattern path that may never match"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
          - modules/AgenticGuidance/assets/definitions/plans.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
        guidance: |
          Issue: inputs.yml lines 104-107 have a pattern that may never match:

          - type: pattern
            path: "docs/plans/live/*/live/plan_live_build.yml"
            description: "Existing build phase plans in folder-based structure..."

          This pattern assumes nested `live/live/` structure which is inconsistent.
          The correct pattern should be: "docs/plans/live/*/plan_live_build.yml"
          OR the plans may be at root level without subfolder.

          Options:
          A) Remove this pattern entirely (agents create new plans, don't need to read existing ones)
          B) Fix pattern to: "docs/plans/live/**/plan_live_build.yml" (recursive glob)

          Recommend Option A: Remove the pattern. Reason:
          - planner-build creates plans, it doesn't need to read existing build plans
          - Reading existing plans adds complexity without clear benefit
          - Other context (plan_example.yml) provides sufficient structure reference
        acceptance_criteria:
          - "Pattern at lines 104-107 either fixed or removed"
          - "If removed, no broken references remain"

  # ============================================
  # PHASE 3: Simplify Fragment Reference Complexity
  # ============================================
  - name: "phase-3-simplify-fragment-references"
    description: "Evaluate and simplify anchor syntax usage"
    agent_category: "teacher"
    dependencies:
      - "phase-2-output-file-consistency"

    tasks:
      - id: "teach_005"
        name: "Evaluate fragment reference syntax in inputs.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
          - modules/AgenticGuidance/assets/definitions/fragment-references.yml
          - modules/AgenticGuidance/assets/definitions/agent-categories.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
        guidance: |
          Current state (inputs.yml lines 37-40):

          agent_context:
            # Fragment reference syntax (#anchor) documented in modules/AgenticGuidance/assets/definitions/fragment-references.yml
            category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#planner"
            role: "planner-build"

          The fragment-references.yml file EXISTS and documents this syntax.
          However, user decision: "Simplify if complexity outweighs gain."

          Assessment:
          - The #planner anchor adds precision but requires agents to understand fragment syntax
          - Most agents load the full agent-categories.yml anyway
          - The comment explaining the syntax adds context window overhead

          Recommendation: Keep the syntax but remove the explanatory comment.
          The fragment-references.yml documentation is sufficient for agents that need it.

          BEFORE:
          agent_context:
            # Fragment reference syntax (#anchor) documented in modules/AgenticGuidance/assets/definitions/fragment-references.yml
            category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#planner"

          AFTER:
          agent_context:
            category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#planner"

          This reduces redundancy while preserving the precise reference.
        acceptance_criteria:
          - "Explanatory comment about fragment syntax removed from inputs.yml"
          - "Fragment reference syntax (#planner) preserved"
          - "fragment-references.yml remains as documentation source"

  # ============================================
  # PHASE 4: Verification
  # ============================================
  - name: "phase-4-verification"
    description: "Verify all changes are consistent and no broken references"
    agent_category: "test"
    dependencies:
      - "phase-3-simplify-fragment-references"

    tasks:
      - id: "verify_001"
        name: "Validate planner-build guidance consistency"
        agent_type: "test-final-output"
        operation: "AUDIT"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
          - modules/AgenticGuidance/agents/planner/planner-build/process.yml
          - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
          - modules/AgenticGuidance/agents/planner/planner-build/process.yml
          - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
        guidance: |
          Verify the following after all changes:

          1. CI/CD Responsibility:
             - manifest.yml has NO mandatory_phases section
             - manifest.yml has cicd_note pointing to planner-test
             - process.yml notes CI/CD is handled by planner-test (existing line 89-90)

          2. Home Directory Config:
             - manifest.yml architecture_checklist has NO ~/.config/mymodules reference

          3. Output File References:
             - process.yml line 37 references plan_example.yml (example)
             - process.yml lines 29, 33 reference plan_live_build.yml (output)
             - Clear distinction: example vs output

          4. Pattern Paths:
             - inputs.yml has no broken or impossible-to-match patterns

          5. Fragment References:
             - inputs.yml agent_context uses #planner anchor without redundant comment
             - fragment-references.yml exists and is valid documentation

          6. Cross-file Consistency:
             - All file references in inputs.yml resolve to existing files
             - All file references in process.yml resolve to existing files
             - All file references in manifest.yml resolve to existing files
        acceptance_criteria:
          - "All six identified issues are resolved"
          - "No broken file references"
          - "No contradictions between the three files"
          - "Clear separation of concerns with planner-test"

success_criteria:
  technical_validation:
    - "CI/CD responsibility contradiction resolved (planner-test owns CI/CD)"
    - "Orphaned ~/.config/mymodules reference removed"
    - "Output file references consistent (example vs output distinction)"
    - "Pattern paths corrected or removed"
    - "Fragment reference comments simplified"
    - "All file references valid"

  user_validation:
    - "planner-build agent produces plans without CI/CD validation phases"
    - "planner-build guidance files have no internal contradictions"
    - "Agents following planner-build guidance find all referenced files"

notes:
  - "User decision: planner-test handles CI/CD validation, NOT planner-build"
  - "User decision: Remove outdated ~/.config/mymodules pattern"
  - "User decision: Simplify anchor syntax by removing redundant comments"
  - "fragment-references.yml exists and is valid - reference is NOT missing"
  - "Changes are small and verifiable per iteration.yml guidance"
