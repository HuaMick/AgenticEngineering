      Update planner guidance to understand and apply loop concepts.
      Clarify the distinction between:
      - Loop TYPE selection (orchestrator responsibility)
      - Loop STRUCTURE inclusion (planner responsibility)

    tasks:
      - id: TLP-001
        name: "Create loop-inclusion-for-planners.yml guideline"
        agent_type: teacher-update-assets
        description: |
          Create new guideline explaining:
          1. What loops are and why plans need them
          2. When to include loops (any iterative work)
          3. How to specify loops in plan YAML (structure template)
          4. Exit criteria patterns (PASS, max iterations, user decision)
          5. Common loop patterns: test-fix, self-review, audit-fix
        target_files:
          - "modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml"
        success_criteria:
          - "Guideline exists with clear examples"
          - "Loop structure template is copy-pasteable"
          - "Exit criteria patterns are explicit"
        status: completed
        completion_notes: |
          File exists at modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml
          with comprehensive content including:
          - what_are_loops section explaining concepts and why plans need them
          - when_to_include_loops with always_include_loops_when and mandatory_loops
          - loop_structure_template with copy-pasteable templates for all loop types
          - exit_criteria_patterns with PASS, max_iterations, user_decision, combined
          - common_loop_patterns with test-fix, self-review, audit-fix patterns
          - examples section with good and bad examples

      - id: TLP-002
        name: "Add loop_structure section to plans.yml definition"
        agent_type: teacher-update-assets
        description: |
          Update plans.yml to include loop_structure as a REQUIRED section
          in plan files. Define the schema:
          ```yaml
          loop_structure:
            type: "<loop-type from agent-loops.yml>"
            trigger: "<condition that starts loop>"
            exit_criteria:
              success: "<condition for successful exit>"
              max_iterations: <number>
              escalation: "<what to do if max reached>"
            participants:
              - agent: "<agent-name>"
                role: "<role in loop>"
          ```
        target_files:
          - "modules/AgenticGuidance/assets/definitions/plans.yml"
        success_criteria:
          - "loop_structure schema defined"
          - "Marked as required for non-trivial plans"
          - "Examples provided"
        status: completed
        completion_notes: |
          plans.yml (lines 315-473) contains comprehensive loop_structure section:
          - requirement_level defining non_trivial_plans as REQUIRED, single_task_plans as OPTIONAL
          - schema with type, trigger, exit_criteria (success, max_iterations, escalation), participants
          - valid_values list for loop types referencing agent-loops.yml
          - examples for build, guidance, cleanup, and planner review loops
          - validation_rules for loop structure verification

