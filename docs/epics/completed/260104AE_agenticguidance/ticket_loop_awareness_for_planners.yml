name: teach-loop-awareness-for-planners
worktree_path: "/home/code/AgenticEngineering"
branch: "main"
status: completed
priority: critical
phase_type: teach

objective: |
  Ensure planners and orchestration-planning understand and APPLY the agent-loop
  concept when creating plans. Plans must include review loops that allow work
  to continue until all gaps are identified and closed during implementation.

problem_statement: |
  CURRENT STATE:
  - Planners know loops exist (referenced in inputs.yml)
  - But planners do NOT build loops INTO their plans
  - Plans are created as linear task lists without iteration
  - When issues are found during execution, there's no loop to iterate
  - Self-reviews happen once and stop, even when NEEDS_ATTENTION

  DESIRED STATE:
  - Every plan includes appropriate review loops
  - Loops are defined with: trigger conditions, exit criteria, max iterations
  - Orchestration follows the plan's loops and iterates until gaps closed
  - NEEDS_ATTENTION always leads to another iteration, not termination

root_cause: |
  1. Planner guidance says "planners request validation needs but do NOT dictate loop strategy"
  2. This was interpreted as "planners don't include loops in plans"
  3. But the INTENT was: planners don't SELECT which loop type - orchestrator does
  4. Planners SHOULD include loop STRUCTURE in their plans with placeholders for loop type
  5. Orchestration-planning then fills in the specific loop type based on phase

