    description: "Loop definitions - planners must understand these to include in plans"

  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
    description: "Orchestration-planning guidance on loop selection"

  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
