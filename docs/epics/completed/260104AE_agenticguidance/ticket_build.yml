      \ FP-001\n  severity: high\n  resolution_type: GUIDANCE_UPDATE\n  target_file:\
      \ \"modules/AgenticGuidance/agents/planner/planner-build/process.mmd\"\n  suggested_change:\
      \ \"Add retry limit fence in error handling section\"\n  evidence:\n    - run_id:\
