- name: 'Phase 1: Entrypoint & Orchestration'
  execution: sequential
  description: Create entrypoint and orchestration for on-demand friction analysis
  tickets:
  - id: entry_01
    name: Create Friction Analysis Entrypoint
    description: Entrypoint that user references to trigger friction analysis
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/entrypoints/_analyze_friction.yml
    guidance: "Create entrypoint: _analyze_friction.yml\n\nStructure (following existing\
      \ entrypoint patterns):\n```yaml\nentrypoint:\n  name: \"_analyze_friction\"\
      \n  goal: \"Analyze LangSmith traces for friction patterns and recommend resolutions\"\
      \n  description: \"On-demand friction analysis triggered by user reference in\
      \ context\"\n\n  orchestration: \"modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd\"\
      \n\n  steps:\n    - \"Load orchestration process\"\n    - \"Query LangSmith\
      \ traces for specified project/timeframe\"\n    - \"Run friction pattern detection\"\
      \n    - \"Generate resolution recommendations\"\n    - \"Present findings to\
      \ user with actionable next steps\"\n\n  input:\n    - \"project_name: LangSmith\
      \ project (default: from CC_LANGSMITH_PROJECT)\"\n    - \"lookback_days: Days\
      \ to analyze (default: 7)\"\n    - \"limit: Max runs to analyze (default: 100)\"\
      \n\n  output:\n    - \"Friction report with detected patterns\"\n    - \"Resolution\
      \ recommendations (GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE)\"\n    - \"Suggested\
      \ next steps for user approval\"\n```\n"
  - id: entry_02
    name: Create Friction Orchestration Process
    description: MMD orchestration for friction analysis workflow
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd
    - modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml
    guidance: "Create orchestration-friction agent:\n\nProcess flow (MMD):\n1. Start\
      \ -> Load inputs (project, timeframe)\n2. Query LangSmith traces via agenticlangsmith\n\
      3. Run friction pattern detection\n4. For each pattern found:\n   - Classify\
      \ severity (high/medium/low based on frequency/impact)\n   - Determine resolution\
      \ type\n   - Identify target files for changes\n5. Generate friction report\n\
      6. Present to user with recommendations\n7. End (user decides next steps)\n\n\
      No automatic actions - analysis only, user decides resolution.\n"
