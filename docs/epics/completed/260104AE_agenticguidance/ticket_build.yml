    - modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml
    target_files:
    - create: modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml
    guidance: 'Create a ~100-line structural reference showing:

      1. Required root fields: plan_name, worktree, branch, liveplan, completedplan

      2. Phase structure: name, execution_groups, agents array

      3. Task structure: type, inputs, guidance, success_criteria

      4. Success criteria patterns: 3 examples of outcome-focused criteria


      IMPORTANT: This is a SHARED file for both:

      - planner-guidance (for teaching plan structure creation)

      - planner-reviewer (for validating plan structure)


