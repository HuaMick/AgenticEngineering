    verifying detection signals are correctly identified.

    '
  tickets:
  - id: test_01_001
    name: ''
    description: 'Test FP-001: Excessive Retries pattern detection'
    status: completed
    agent: null
    inputs:
    - path: modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml
      reason: FP-001 detection signal definitions
    guidance: "Create mock trace data that exhibits FP-001 signals:\n\nTest Cases:\n\
      1. Consecutive runs with same name pattern (e.g., \"Edit_file_attempt_1\", \"\
      Edit_file_attempt_2\")\n2. Error -> Retry -> Error -> Retry sequences in tool\
      \ calls\n3. Same tool called 3+ times with similar parameters within a session\n\
      4. Negative case: Normal retry (1-2 retries) should NOT trigger\n\nMock Trace\
      \ Structure:\n```python\nmock_trace_fp001 = {\n    \"session_id\": \"test-session-001\"\
      ,\n    \"runs\": [\n        {\"name\": \"Edit\", \"status\": \"error\", \"tool\"\
      : \"Edit\", \"params\": {\"file\": \"test.py\"}},\n        {\"name\": \"Edit\"\
      , \"status\": \"error\", \"tool\": \"Edit\", \"params\": {\"file\": \"test.py\"\
      }},\n        {\"name\": \"Edit\", \"status\": \"error\", \"tool\": \"Edit\"\
      , \"params\": {\"file\": \"test.py\"}},\n        {\"name\": \"Edit\", \"status\"\
      : \"success\", \"tool\": \"Edit\", \"params\": {\"file\": \"test.py\"}},\n \
      \   ]\n}\n```\n"
    success_criteria:
    - Detector identifies consecutive same-name runs as FP-001
    - Detector identifies error-retry-error sequences as FP-001
    - Detector does NOT flag normal single retries
