- name: 'Phase 3: Document Guidance Process Rule'
  description: 'Create clear documentation that any changes to modules/AgenticGuidance/agents/**

    MUST use _plan_teach.yml process. This rule should be discoverable by both

    humans reading documentation and agents processing guidelines.

    '
  tickets:
  - id: enforce_004
    name: Create guidance-process-requirements.yml definition
    description: "Create a new definition file at:\nmodules/AgenticGuidance/assets/definitions/guidance-process-requirements.yml\n\
      \nThis file should codify the rule that guidance changes require teach process:\n\
      \n```yaml\n# Guidance Process Requirements\n# Defines when _plan_teach.yml is\
      \ REQUIRED vs when _plan_build.yml is sufficient\n\nname: guidance-process-requirements\n\
      version: \"1.0\"\ndescription: |\n  Codifies the relationship between plan types\
      \ and file modifications.\n  Determines which entrypoint (_plan_build.yml vs\
      \ _plan_teach.yml) is\n  required based on the files being modified.\n\n# ==============================================\n\
      # CORE RULE\n# ==============================================\ncore_rule:\n\
      \  statement: |\n    Any task that modifies agent guidance files MUST go through\
      \ the\n    _plan_teach.yml process to ensure guidance validation is performed.\n\
      \n  rationale: |\n    Guidance files (process.yml, inputs.yml, manifest.yml)\
      \ define agent\n    behavior. Changes to these files affect the entire agent\
      \ system.\n    Without validation (agent self-review, guidance testing), errors\n\
      \    propagate silently until they cause execution failures.\n\n  enforcement:\
      \ |\n    - FENCE in planner-build detects guidance file modifications\n    -\
      \ orchestration-planning includes teach validation when detected\n    - Agent\
      \ self-review validates modified guidance before completion\n\n# ==============================================\n\
      # FILE CLASSIFICATION\n# ==============================================\nfile_classification:\n\
      \  requires_teach_process:\n    description: \"Files that REQUIRE _plan_teach.yml\
      \ process\"\n    patterns:\n      - pattern: \"modules/AgenticGuidance/agents/**/process.yml\"\
      \n        reason: \"Agent process definition - affects agent behavior\"\n  \
      \    - pattern: \"modules/AgenticGuidance/agents/**/inputs.yml\"\n        reason:\
      \ \"Agent inputs - affects context loading\"\n      - pattern: \"modules/AgenticGuidance/agents/**/manifest.yml\"\
      \n        reason: \"Agent metadata - affects routing and spawning\"\n      -\
      \ pattern: \"modules/AgenticGuidance/agents/**/outputs.yml\"\n        reason:\
      \ \"Agent outputs - affects downstream consumers\"\n      - pattern: \"modules/AgenticGuidance/assets/definitions/*.yml\"\
      \n        reason: \"Shared definitions - affects multiple agents\"\n      -\
      \ pattern: \"modules/AgenticGuidance/assets/guidelines/*.yml\"\n        reason:\
      \ \"Guidelines - affects agent decision-making\"\n      - pattern: \"modules/AgenticGuidance/entrypoints/*.yml\"\
      \n        reason: \"Entrypoints - affects routing and flow\"\n\n  build_process_sufficient:\n\
      \    description: \"Files where _plan_build.yml alone is sufficient\"\n    patterns:\n\
      \      - pattern: \"modules/AgenticGuidance/assets/examples/**\"\n        reason:\
      \ \"Examples are informational, not behavioral\"\n      - pattern: \"modules/AgenticGuidance/docs/**\"\
      \n        reason: \"Documentation does not affect agent behavior\"\n      -\
      \ pattern: \"**/*.md\"\n        reason: \"Markdown documentation\"\n      -\
      \ pattern: \"**/*.mmd\"\n        exception: \"EXCEPT orchestration process.mmd\
      \ files\"\n        reason: \"Visual diagrams (except process definitions)\"\n\
      \n# ==============================================\n# DECISION TREE\n# ==============================================\n\
      decision_tree:\n  description: \"How to determine which process to use\"\n \
      \ steps:\n    - step: 1\n      question: \"Does the task modify any files matching\
      \ requires_teach_process patterns?\"\n      yes: \"Use _plan_teach.yml (or ensure\
      \ build plan includes teach validation)\"\n      no: \"Proceed to step 2\"\n\
      \n    - step: 2\n      question: \"Does the task create new agent guidance files?\"\
      \n      yes: \"Use _plan_teach.yml - new agents need validation\"\n      no:\
      \ \"Proceed to step 3\"\n\n    - step: 3\n      question: \"Does the task modify\
      \ agent behavior in any way?\"\n      yes: \"Use _plan_teach.yml - behavior\
      \ changes need validation\"\n      no: \"_plan_build.yml is sufficient\"\n\n\
      # ==============================================\n# FENCE INSTRUCTION\n# ==============================================\n\
      fence: |\n  FENCE: GUIDANCE-PROCESS-REQUIREMENT\n  When planning ANY task, apply\
      \ the decision_tree above.\n  Guidance-modifying tasks MUST NOT bypass teach\
      \ process validation.\n  This fence exists because the JIT Context initiative\
      \ modified 26\n  agent files without validation, causing widespread friction.\n\
      \n# ==============================================\n# RELATED ARTIFACTS\n# ==============================================\n\
      related_artifacts:\n  planner_build_fence: \"modules/AgenticGuidance/agents/planner/planner-build/inputs.yml#guidance_modification_fence\"\
      \n  orchestration_routing: \"modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml#guidance_change_routing\"\
      \n  plan_teach_entrypoint: \"modules/AgenticGuidance/entrypoints/_plan_teach.yml\"\
      \n  plan_build_entrypoint: \"modules/AgenticGuidance/entrypoints/_plan_build.yml\"\
      \n```\n"
    status: pending
    agent: null
    inputs:
