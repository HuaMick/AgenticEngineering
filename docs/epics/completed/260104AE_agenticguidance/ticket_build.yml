- name: Guidance Refinement
  description: Refine guidance to remove rigid phase-based file separation and refocus
    MMD on agent orchestration.
  tickets:
  - id: guide_001
    name: Replace phase-based file separation with context-minimisation
    description: 'Remove the concept of separate planning files by phase type (build/teach/test/cleanup).

      Instead, file separation should purely serve context-minimisation - planners
      should create

      multiple smaller files when it helps agents avoid reading unrelated noise. The
      goal is that

      when an agent reads a planning file, it gets focused content relevant to its
      task.

      '
    status: pending
    agent: null
    inputs:
    - modules/AgenticGuidance/assets/definitions/plans.yml
    - modules/AgenticGuidance/agents/planner/planner-build/process.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
    - modules/AgenticGuidance/assets/guidelines/context-minimisation.yml
    target_files:
    - modules/AgenticGuidance/assets/definitions/plans.yml
    - modules/AgenticGuidance/agents/planner/planner-build/process.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
  - id: guide_002
    name: Refocus Plan-MMD on agent orchestration
    description: 'The .mmd files should define agent orchestration patterns (which
      agents to spawn, agent

      loops, dependencies) NOT phase sequences. Planners are intelligent enough to
      determine what

