- name: Phase 1 - Assess Missing Files
  execution: sequential
  description: Determine if missing files should be migrated, recreated, or if references
    should be updated
  tickets:
  - id: assess_001
    name: Check if acceptable-skips.yml content is still needed
    description: ''
    status: pending
    agent: teacher-review-guidance
    inputs:
    - modules/AgenticGuidance/agents/**/inputs.yml
    - modules/AgenticGuidance/legacy/**/acceptable-skips.yml
    guidance: "Determine the status of acceptable-skips.yml:\n\n1. Locate the legacy\
      \ version of acceptable-skips.yml\n2. Review its content to understand what\
      \ skip conditions it defines\n3. Check if test-audit agent inputs reference\
      \ this file\n4. Determine if the skip conditions are still relevant:\n   - Are\
      \ the test scenarios it references still active?\n   - Have the skip conditions\
      \ been consolidated elsewhere?\n   - Is the file obsolete due to test framework\
      \ changes?\n\nDECISION CRITERIA:\n- If content is still needed: Plan migration\
      \ to active location\n- If content is obsolete: Plan to remove references\n\
      - If content was consolidated: Update references to new location\n"
  - id: assess_002
    name: Check if agent-role-scope-matrix.md is duplicated in agent-categories.yml
    description: ''
    status: pending
    agent: teacher-review-guidance
    inputs:
    - modules/AgenticGuidance/agents/orchestration/orchestration-policy.yml
    - modules/AgenticGuidance/assets/guidelines/agent-categories.yml
    guidance: "Determine if agent-role-scope-matrix.md content exists elsewhere:\n\
      \n1. Find the reference to docs/agent-role-scope-matrix.md in orchestration-policy.yml\n\
      2. Understand what content the reference expects (role/scope matrix for agents)\n\
      3. Check agent-categories.yml for similar content:\n   - Does it define agent\
      \ roles and their scopes?\n   - Does it serve the same purpose as the missing\
      \ matrix?\n4. Search for any other files that might contain this information\n\
      \nDECISION CRITERIA:\n- If agent-categories.yml has equivalent content: Update\
      \ reference\n- If content is truly missing: Plan to create the documentation\n\
      - If reference is obsolete: Remove from orchestration-policy.yml\n"
  - id: assess_003
    name: Check if strategy-documentation-validation.yml was intentionally deprecated
    description: ''
    status: pending
    agent: teacher-review-guidance
    inputs:
    - modules/AgenticGuidance/legacy/**/*.yml
    - modules/AgenticGuidance/assets/strategies/*.yml
    guidance: "Determine the deprecation status of strategy-documentation-validation.yml:\n\
      \n1. Search legacy folder for references to strategy-documentation-validation.yml\n\
      2. Check git history if possible to understand when/why it was removed\n3. Look\
      \ for replacement files in assets/strategies/:\n   - Was the validation logic\
      \ moved to another strategy?\n   - Was it consolidated into a different validation\
      \ approach?\n4. Check if any active agents or plans reference this file\n\n\
      DECISION CRITERIA:\n- If intentionally deprecated: Clean up remaining references\n\
      - If accidentally removed: Determine if restoration is needed\n- If consolidated\
      \ elsewhere: Update references to new location\n"
