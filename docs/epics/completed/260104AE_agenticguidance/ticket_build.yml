      - detect_missing_context(runs) -> list[ContextGap]

      - detect_schema_violations(runs) -> list[SchemaViolation]

      - detect_convention_violations(runs) -> list[ConventionViolation]

      - detect_automatable_patterns(runs) -> list[AutomatablePattern]


