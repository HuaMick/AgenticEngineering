- name: 'Phase 1: Guidance Quality Definition'
  execution: sequential
  description: Create definition for guidance quality anti-patterns
  tickets:
  - id: def_01
    name: Create guidance-quality.yml definition
    description: Define anti-patterns that reduce guidance effectiveness
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/definitions/guidance-quality.yml
    guidance: "Create definition file with structure:\n\n```yaml\ndefinition:\n  name:\
      \ guidance-quality\n  description: \"Patterns that help or harm guidance effectiveness\"\
      \n\neffective_patterns:\n  - name: \"path_addition\"\n    description: \"Add\
      \ clear step to process file\"\n    example: \"Step 4: Validate output schema\
      \ before proceeding\"\n\n  - name: \"signpost_addition\"\n    description: \"\
      Add concrete example showing correct usage\"\n    example: \"See examples/teacher/schema-validation.yml\"\
      \n\n  - name: \"fence_strengthening\"\n    description: \"Add constraint that\
      \ prevents incorrect behavior\"\n    example: \"boundary: only modify files\
      \ within plan folder\"\n\n  - name: \"cli_offload\"\n    description: \"Move\
      \ deterministic operation to CLI command\"\n    example: \"Use 'agentic plan\
      \ init' instead of manual folder creation\"\n\nanti_patterns:\n  - name: \"\
      caps_emphasis\"\n    description: \"Using CAPS to emphasize importance\"\n \
      \   why_ineffective: \"Creates noise, agents don't respond to visual emphasis\"\
      \n    example_bad: \"You MUST ALWAYS validate output\"\n    example_good: \"\
      validation: required: true\"\n\n  - name: \"repetition\"\n    description: \"\
      Restating the same guidance in different words\"\n    why_ineffective: \"Increases\
      \ context without adding information\"\n    example_bad: \"Validate output.\
      \ Make sure to validate. Output validation is required.\"\n    example_good:\
      \ \"Step: Validate output (see validation-rules.yml)\"\n\n  - name: \"strong_language\"\
      \n    description: \"Using emotional or urgent language\"\n    why_ineffective:\
      \ \"If everything is critical/important, nothing is prioritized\"\n    example_bad:\
      \ \"This is CRITICAL and MUST be done IMMEDIATELY\"\n    example_good: \"priority:\
      \ high\"\n\n  - name: \"emphasis_escalation\"\n    description: \"Adding emphasis\
      \ to existing guidance instead of fixing structure\"\n    why_ineffective: \"\
      Doesn't address why guidance wasn't followed\"\n    example_bad: \"As stated\
      \ above (IMPORTANT)...\"\n    example_good: \"Move guidance to step where it's\
      \ needed\"\n\n  - name: \"negative_framing\"\n    description: \"Telling agents\
      \ what NOT to do without positive alternative\"\n    why_ineffective: \"Agents\
      \ need to know what TO do\"\n    example_bad: \"Do NOT create files outside\
      \ the plan folder\"\n    example_good: \"boundary: output_path: docs/plans/live/{{plan_id}}/\"\
      \n```\n"
