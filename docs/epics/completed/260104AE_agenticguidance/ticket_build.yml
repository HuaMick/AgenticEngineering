- name: Create Friction Patterns Definition
  description: 'Create a standalone friction-patterns.yml definition file in the assets

    directory. This enables reuse across agents and provides a single source

    of truth for friction pattern definitions.

    '
  tickets:
  - id: build_01_001
    name: ''
    description: Create friction-patterns.yml definition file
    status: completed
    agent: null
    inputs:
    - path: modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml
      reason: Contains existing friction pattern definitions to extract
    - path: modules/AgenticGuidance/assets/definitions/friction.yml
      reason: Existing friction definition for consistency
    - path: modules/AgenticGuidance/assets/definitions/definition.yml
      reason: Schema for definition files
    target_files:
    - modules/AgenticGuidance/assets/definitions/friction-patterns.yml
    guidance: "Create a new definition file for friction patterns. The file should:\n\
      \n1. Follow the standard definition file schema\n2. Define all 6 friction patterns\
      \ (FP-001 through FP-006)\n3. Include detection_signals for each pattern\n4.\
      \ Include default_resolution type for each pattern\n5. Include resolution_hint\
      \ for each pattern\n6. Define resolution_types (GUIDANCE_UPDATE, CLI_OFFLOAD,\
      \ ASSET_UPDATE)\n7. Define severity_classification rules\n\nStructure:\n```yaml\n\
      definition:\n  name: friction-patterns\n  version: \"1.0\"\n  description: |\n\
      \    Friction patterns detected during agent execution trace analysis.\n   \
      \ These patterns indicate guidance gaps or automation opportunities.\n\npatterns:\n\
      \  - id: FP-001\n    name: \"Excessive Retries\"\n    description: \"Agent retries\
      \ same operation multiple times\"\n    detection_signals:\n      - \"Multiple\
      \ consecutive runs with same name pattern\"\n      - \"Error -> Retry -> Error\
      \ -> Retry sequences\"\n    default_resolution: GUIDANCE_UPDATE\n    resolution_hint:\
      \ \"Add clearer error handling guidance or retry limits\"\n\n  # ... (continue\
      \ for FP-002 through FP-006)\n\nresolution_types:\n  - type: GUIDANCE_UPDATE\n\
      \    description: \"Update process files, add signposts, clarify fences\"\n\
      \    target_locations:\n      - \"modules/AgenticGuidance/agents/*/process.yml\"\
      \n      - \"modules/AgenticGuidance/agents/*/inputs.yml\"\n      - \"modules/AgenticGuidance/assets/guidelines/\"\
      \n  # ... (continue for CLI_OFFLOAD, ASSET_UPDATE)\n\nseverity_classification:\n\
      \  high:\n    criteria:\n      - \"Pattern occurs in >50% of analyzed sessions\"\
      \n      - \"Pattern causes visible user impact\"\n    action: \"Prioritize for\
      \ immediate resolution\"\n  # ... (continue for medium, low)\n```\n"
    success_criteria:
    - Definition file created at assets/definitions/friction-patterns.yml
    - All 6 friction patterns defined with complete metadata
    - Resolution types documented with target locations
    - Severity classification rules defined
    - File follows existing definition schema conventions
