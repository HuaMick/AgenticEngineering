- name: Dynamic Orchestration via MMD
  description: Enable planners to define the orchestration flow dynamically using
    Mermaid files with embedded metadata.
  tickets:
  - id: mmd_001
    name: Define Plan-MMD Schema
    description: 'Create a YAML schema definition for Plan-MMD files that focuses
      on agent orchestration

      patterns rather than rigid phase sequences. The MMD should express:

      - Agent spawning decisions (which agents to invoke)

      - Agent loops (test-fix-loop, audit-test-fix-loop, etc.)

      - Agent dependencies (execution order when needed)

      - Feedback triggers (conditions that cause re-planning)

      - Repair iteration limits


      Planners are intelligent enough to determine what agents need to be spawned
      and what

      loops to orchestrate. The MMD is a tool for expressing these orchestration decisions,

      not a rigid phase template.


      Plan-MMD Specification (metadata comments in MMD):

      ```

      %% PLAN_MMD_VERSION: 1.0

      %% GENERATED_BY: planner-<type>

      %% PLAN_FOLDER: <path>

      %% AGENT_ORCHESTRATION: (agent spawning and loop patterns)

      %% FEEDBACK_TRIGGERS: (what causes re-planning)

      %% MAX_REPAIR_ITERATIONS: 3

      ```

      '
    status: pending
    agent: null
