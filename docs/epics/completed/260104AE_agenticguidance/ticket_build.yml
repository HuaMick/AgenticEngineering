- name: 'Phase 3: Validation Subagent'
  execution: sequential
  description: Add explore validation step before recommendations
  tickets:
  - id: validate_01
    name: Update teacher-trace-diagnostics process
    description: Add validation step between detection and recommendations
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml
    guidance: "Insert new step between current Step 5 (recommendations) and Step 6\
      \ (output):\n\n```yaml\n- step: 5.5\n  name: \"Validate recommendations against\
      \ existing guidance\"\n  action: \"spawn_explore_subagent\"\n  purpose: |\n\
      \    Before presenting recommendations, verify they don't duplicate\n    existing\
      \ guidance in target files.\n\n  subagent_task: |\n    For each recommendation:\n\
      \    1. Read the target_file specified\n    2. Search for similar guidance (keywords,\
      \ patterns)\n    3. If similar guidance exists:\n       - Flag as potential\
      \ duplicate\n       - Note existing location\n       - Suggest merge/enhancement\
      \ instead of addition\n    4. Return validation results\n\n  outputs:\n    -\
      \ validated_recommendations: \"Recommendations with duplication check\"\n  \
      \  - potential_duplicates: \"List of recommendations that may duplicate existing\
      \ guidance\"\n    - merge_suggestions: \"Recommendations for consolidating with\
      \ existing guidance\"\n\n  filtering:\n    - \"Remove recommendations where\
      \ guidance already exists\"\n    - \"Downgrade severity if partial guidance\
      \ exists\"\n    - \"Note existing guidance location in recommendation\"\n```\n"
  - id: validate_02
    name: Add validation example to langsmith-trace-analysis.yml
    description: Add example showing recommendation validation pattern
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/examples/teacher/langsmith-trace-analysis.yml
    guidance: "Add new example section:\n\n```yaml\n- name: \"Validate recommendations\
      \ against existing guidance\"\n  description: \"Check if recommended guidance\
      \ already exists before presenting\"\n  pattern: |\n    # For each recommendation,\
      \ check target file for existing similar content\n    def validate_recommendation(recommendation,\
      \ target_file_content):\n        keywords = extract_keywords(recommendation.suggested_change)\n\
      \        existing_matches = []\n\n        for keyword in keywords:\n       \
      \     if keyword.lower() in target_file_content.lower():\n                existing_matches.append({\n\
      \                    \"keyword\": keyword,\n                    \"context\"\
      : extract_surrounding_context(target_file_content, keyword)\n              \
      \  })\n\n        if existing_matches:\n            return {\n              \
      \  \"status\": \"potential_duplicate\",\n                \"existing_guidance\"\
      : existing_matches,\n                \"suggestion\": \"Consider enhancing existing\
      \ guidance instead of adding new\"\n            }\n        return {\"status\"\
      : \"validated\", \"existing_guidance\": None}\n\n  anti_pattern: |\n    # Generating\
      \ recommendations without checking existing guidance\n    recommendations =\
      \ generate_recommendations(friction_patterns)\n    return recommendations  #\
      \ No validation - may duplicate existing\n```\n"
