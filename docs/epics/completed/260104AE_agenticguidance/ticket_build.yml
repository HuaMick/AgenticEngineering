phases:
- name: 'Phase 1: Document Self-Review Protocol'
  description: 'Define the self-review process as a formal guideline and integrate
    it into the

    standard guidance test scenarios. This establishes self-review as a recognized

    testing practice within the AgenticGuidance framework.

    '
  tickets:
  - id: selfreview_001
    name: Create agent-self-review.yml guideline
    description: "Create a new guideline at modules/AgenticGuidance/assets/guidelines/agent-self-review.yml\n\
      that defines the self-review process for agent guidance validation.\n\nThe guideline\
      \ should specify:\n\n1. PURPOSE\n   - Why self-review is essential for guidance\
      \ quality\n   - What types of issues self-review detects\n   - When self-review\
      \ should be triggered (after any guidance change)\n\n2. SELF-REVIEW PROTOCOL\n\
      \   - Agent receives only its own guidance files (process.yml, inputs.yml, outputs.yml)\n\
      \   - Agent reads each file and validates internal consistency\n   - Agent checks\
      \ all file path references resolve correctly\n   - Agent identifies ambiguities,\
      \ missing context, or unclear instructions\n   - Agent attempts minimal task\
      \ understanding to expose gaps\n\n3. VALIDATION CHECKLIST\n   - All input paths\
      \ in inputs.yml exist?\n   - All referenced assets/definitions/guidelines exist?\n\
      \   - Process steps are clear and actionable?\n   - Prerequisites are explicitly\
      \ documented?\n   - Loop context defined if agent participates in loops?\n \
      \  - Outputs are clearly specified?\n\n4. REPORTING FORMAT\n   - Structured\
      \ output with passed/failed status\n   - List of friction points with severity\
      \ levels\n   - Specific file paths and line references for issues\n   - Suggested\
      \ fixes for each issue found\n\n5. INTEGRATION\n   - How self-review fits into\
      \ guidance-test-loop\n   - Relationship to test-guidance-simulator agent\n \
      \  - When to escalate findings (CRITICAL severity)\n"
    status: pending
    agent: null
    inputs:
    - modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
    - modules/AgenticGuidance/assets/definitions/friction.yml
    target_files:
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
  - id: selfreview_002
    name: Add self-review to guidance-test-scenarios.yml
    description: "Update modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml\
      \ to\nadd self-review as a standard test scenario that is always included when\
      \ testing\nagent guidance.\n\nAdd new test_scenario entry:\n\n```yaml\nself_review_test:\n\
      \  id: \"self_review_test\"\n  purpose: \"Can agent validate its own guidance\
      \ for basic correctness?\"\n  description: |\n    Validates that an agent can\
      \ review its own guidance files and identify\n    basic issues like broken paths,\
      \ missing files, and inconsistencies.\n    This is the most fundamental form\
      \ of guidance validation.\n\n  inputs:\n    target_agent: \"Path to agent directory\
      \ containing guidance files\"\n    guidance_files:\n      - \"process.yml\"\n\
      \      - \"inputs.yml\"\n      - \"outputs.yml (if present)\"\n\n  constraints:\n\
      \    - \"Agent receives ONLY its own guidance files\"\n    - \"Agent must identify\
      \ issues without external hints\"\n    - \"Agent cannot explore beyond referenced\
      \ paths\"\n\n  expected_outputs:\n    success_criteria:\n      - \"All file\
      \ path references resolve to existing files\"\n      - \"No circular or broken\
      \ references\"\n      - \"Process steps are internally consistent\"\n      -\
      \ \"Prerequisites are documented\"\n\n    failure_indicators:\n      - \"Referenced\
      \ files do not exist\"\n      - \"Ambiguous paths without clear base directory\"\
      \n      - \"Contradictory instructions in process steps\"\n      - \"Missing\
      \ prerequisite documentation\"\n\n    report_structure:\n      - \"self_review_passed:\
      \ boolean\"\n      - \"broken_paths: list of paths that don't resolve\"\n  \
      \    - \"missing_files: list of referenced but missing files\"\n      - \"inconsistencies:\
      \ list of contradictions found\"\n      - \"ambiguities: list of unclear instructions\"\
      \n      - \"suggested_fixes: specific improvements needed\"\n\n  validation_checklist:\n\
      \    - \"Do all paths in inputs.yml resolve?\"\n    - \"Do all asset references\
      \ exist?\"\n    - \"Are process steps internally consistent?\"\n    - \"Are\
      \ prerequisites explicitly documented?\"\n```\n\nAlso update test_scenario_application_rules.always_include\
      \ to add self_review_test.\n"
    status: pending
    agent: null
    inputs:
    - modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    target_files:
    - modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
- name: 'Phase 2: Update test-guidance-simulator'
  description: 'Extend the test-guidance-simulator agent to support explicit self-review
    invocation

    and define the output schema for self-review reports. This enables automated and

    consistent execution of self-review testing.

    '
  tickets:
  - id: selfreview_003
    name: Add self-review invocation to test-guidance-simulator
    description: "Update modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml\n\
      to add explicit support for self-review mode invocation.\n\nChanges needed:\n\
      \n1. Add self_review_mode section to process.yml:\n   ```yaml\n   self_review_mode:\n\
      \     description: |\n       When invoked for self-review, the simulator spawns\
      \ the target agent\n       with only its own guidance files and instructs it\
      \ to validate them.\n\n     invocation_pattern: |\n       Target agent is spawned\
      \ with prompt:\n       \"You are agent: {agent_name}. Your guidance files are\
      \ at:\n       - process.yml: {path}\n       - inputs.yml: {path}\n       TASK:\
      \ Review your own guidance for correctness. Report:\n       1. Any file paths\
      \ that don't exist\n       2. Any missing referenced files\n       3. Any unclear\
      \ or ambiguous instructions\n       4. Any missing prerequisites\n       5.\
      \ Any inconsistencies between files\"\n\n     output_collection: |\n       Collect\
      \ structured output from spawned agent:\n       - self_review_passed: boolean\n\
      \       - issues_found: list of categorized issues\n       - severity_breakdown:\
      \ count by CRITICAL/HIGH/MEDIUM/LOW\n   ```\n\n2. Update steps to include self-review\
      \ scenario:\n   Add step for executing self_review_test from guidance-test-scenarios.yml\n\
      \n3. Ensure self-review is executed FIRST before other scenarios\n   (catch\
      \ basic issues before testing more complex behaviors)\n"
    status: pending
    agent: null
    inputs:
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/inputs.yml
    - modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    target_files:
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
  - id: selfreview_004
    name: Define self-review report output schema
    description: "Define a structured output schema for self-review reports that can\
      \ be consumed\nby orchestration and teacher agents for subsequent guidance improvements.\n\
      \nCreate or update the outputs section in test-guidance-simulator to include:\n\
      \n```yaml\noutputs:\n  - name: \"self_review_report\"\n    description: \"Structured\
      \ self-review validation results\"\n    format:\n      agent_name: \"string\
      \ - name of agent that performed self-review\"\n      agent_path: \"string -\
      \ path to agent directory\"\n      review_timestamp: \"ISO datetime\"\n    \
      \  self_review_passed: \"boolean - overall pass/fail\"\n\n      path_validation:\n\
      \        total_paths_checked: \"integer\"\n        paths_resolved: \"integer\"\
      \n        broken_paths:\n          - path: \"string - the path that failed\"\
      \n            referenced_in: \"string - file where reference exists\"\n    \
      \        error: \"string - reason for failure\"\n\n      file_validation:\n\
      \        required_files_present: \"list of files that exist\"\n        missing_files:\
      \ \"list of files that should exist but don't\"\n\n      consistency_check:\n\
      \        passed: \"boolean\"\n        inconsistencies:\n          - type: \"\
      string - type of inconsistency\"\n            location: \"string - file and\
      \ section\"\n            issue: \"string - description of inconsistency\"\n\
      \            suggested_fix: \"string - how to resolve\"\n\n      clarity_check:\n\
      \        ambiguities:\n          - location: \"string - file and section\"\n\
      \            issue: \"string - what is unclear\"\n            severity: \"CRITICAL\
      \ | HIGH | MEDIUM | LOW\"\n            suggested_fix: \"string - how to clarify\"\
      \n\n      summary:\n        total_issues: \"integer\"\n        by_severity:\n\
      \          CRITICAL: \"integer\"\n          HIGH: \"integer\"\n          MEDIUM:\
      \ \"integer\"\n          LOW: \"integer\"\n        recommended_action: \"string\
      \ - PASS | FIX_REQUIRED | ESCALATE\"\n\n    usage: |\n      - Orchestration\
      \ consumes to determine if guidance is ready for use\n      - Teacher agents\
      \ consume to prioritize guidance improvements\n      - Audit trails consume\
      \ for tracking guidance quality over time\n```\n\nAlso update inputs.yml to\
      \ reference this output schema.\n"
    status: pending
    agent: null
    inputs:
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/inputs.yml
    - modules/AgenticGuidance/assets/definitions/friction.yml
    target_files:
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
    - modules/AgenticGuidance/agents/test/test-guidance-simulator/inputs.yml
- name: 'Phase 3: Create Self-Review Preset'
  description: 'Create a CLI preset template for running agent self-reviews via the
    agentic CLI,

    and document usage in the JIT Context Architecture documentation.

    '
  tickets:
  - id: selfreview_005
    name: Create self-review CLI preset template
    description: "Create a new preset template at:\nmodules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml\n\
      \nThe preset should define tasks for running comprehensive agent self-review:\n\
      \n```yaml\n# Self-Review Preset\n# Tasks for running agent self-review validation\n\
      \nname: self-review\ndescription: \"Tasks for agent self-review validation\"\
      \nversion: \"1.0\"\n\ntasks:\n  - id: \"sreview_001\"\n    description: \"Validate\
      \ all input paths resolve to existing files\"\n    priority: \"critical\"\n\
      \    trigger: \"always\"\n\n  - id: \"sreview_002\"\n    description: \"Check\
      \ all asset/definition/guideline references exist\"\n    priority: \"critical\"\
      \n    trigger: \"always\"\n\n  - id: \"sreview_003\"\n    description: \"Verify\
      \ process steps are internally consistent\"\n    priority: \"high\"\n    trigger:\
      \ \"always\"\n\n  - id: \"sreview_004\"\n    description: \"Confirm prerequisites\
      \ are explicitly documented\"\n    priority: \"high\"\n    trigger: \"always\"\
      \n\n  - id: \"sreview_005\"\n    description: \"Validate loop_context if agent\
      \ participates in loops\"\n    priority: \"medium\"\n    trigger: \"loop_participant\"\
      \n\n  - id: \"sreview_006\"\n    description: \"Check output specifications\
      \ are complete\"\n    priority: \"medium\"\n    trigger: \"always\"\n\n  - id:\
      \ \"sreview_007\"\n    description: \"Identify ambiguous instructions requiring\
      \ interpretation\"\n    priority: \"medium\"\n    trigger: \"always\"\n\n  -\
      \ id: \"sreview_008\"\n    description: \"Generate self-review report in standard\
      \ format\"\n    priority: \"critical\"\n    trigger: \"always\"\n```\n\nThis\
      \ preset enables users to run:\n`agentic plan task prefill --preset self-review`\n\
      \nto load self-review tasks into their current task list.\n"
    status: pending
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/templates/presets/planner-test-preset.yml
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    - modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
    target_files:
    - modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml
  - id: selfreview_006
    name: Document self-review usage in JIT_CONTEXT_ARCHITECTURE.md
    description: 'Update docs/JIT_CONTEXT_ARCHITECTURE.md to document how to use the
      self-review

      preset and integrate self-review into guidance change workflows.


      Add a new section:


      ```markdown

      ## Agent Self-Review Testing


      Self-review is a basic-level testing practice for validating agent guidance.

      When guidance files (process.yml, inputs.yml, outputs.yml) are modified,

      agents can self-review their own guidance to catch issues before deployment.


      ### Running Self-Review


      Load the self-review task preset:

      ```bash

      agentic plan task prefill --preset self-review

      ```


      This loads standard self-review tasks that validate:

      - All input paths resolve to existing files

      - All asset/definition/guideline references exist

      - Process steps are internally consistent

      - Prerequisites are explicitly documented

      - Loop context is defined (if applicable)

      - Output specifications are complete


      ### Self-Review Output


      Self-review produces a structured report with:

      - Path validation results (broken paths, missing files)

      - Consistency check results (contradictions, ambiguities)

      - Severity breakdown (CRITICAL/HIGH/MEDIUM/LOW)

      - Recommended action (PASS/FIX_REQUIRED/ESCALATE)


      ### Integration with Guidance Changes


      Self-review should be run after any guidance modification:


      1. Modify agent guidance (process.yml, inputs.yml, etc.)

      2. Load self-review preset: `agentic plan task prefill --preset self-review`

      3. Execute self-review tasks

      4. Fix any issues found

      5. Re-run until self-review passes

      6. Commit guidance changes


      ### Related Artifacts


      - Guideline: modules/AgenticGuidance/assets/guidelines/agent-self-review.yml

      - Test Scenarios: modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml

      - Test Simulator: modules/AgenticGuidance/agents/test/test-guidance-simulator/

      - CLI Preset: modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml

      ```

      '
    status: pending
    agent: null
    inputs:
    - docs/JIT_CONTEXT_ARCHITECTURE.md
    - modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml
    - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
    target_files:
    - docs/JIT_CONTEXT_ARCHITECTURE.md
