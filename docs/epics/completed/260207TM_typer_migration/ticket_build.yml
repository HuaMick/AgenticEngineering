name: typer-migration
worktree_path: ''
branch: ''
status: active
priority: medium
objective: 'The previous Typer migration (260205TY) created a typer_app.py wrapper
  that delegates

  to the argparse-based cli.py. This is not a real migration — argparse still owns
  all

  command registration, parsing, and routing. The wrapper adds complexity without
  benefit.


  This plan performs a FULL migration:

  - Replace argparse command registration entirely with Typer/Click

  - Native shell completion (not a separate completion.py entry point)

  - Maintain all existing command behavior and flags

  - Remove the typer_app.py wrapper and argparse create_parser()


  NOTE: This is a large refactor. Phase carefully to avoid breaking existing commands.

  '
created: ''
phases:
- name: Foundation Phase
  execution: sequential
  tickets:
  - id: TM_001
    name: Audit all CLI commands and flags for migration mapping
    description: 'Catalog every argparse subparser, argument, flag, and routing function.

      Create a migration mapping document: argparse construct -> Typer equivalent.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    - modules/AgenticCLI/src/agenticcli/entry.py
    target_files:
    - docs/plans/live/260207TM_typer_migration/migration_mapping.yml
    guidance: "1. Parse cli.py's create_parser() to extract every:\n   - Top-level\
      \ command group (plan, worktree, session, etc.)\n   - Subcommand (plan list,\
      \ plan init, plan task start, etc.)\n   - Arguments and flags with types, defaults,\
      \ help text\n   - Global flags (--json, --verbose, etc.)\n2. Map each to Typer\
      \ equivalent:\n   - ArgumentParser -> typer.Typer()\n   - add_subparsers ->\
      \ app.add_typer()\n   - add_argument -> typer.Argument / typer.Option\n   -\
      \ set_defaults(func=) -> @app.command() decorator\n3. Identify any argparse\
      \ features without direct Typer equivalents\n"
  - id: TM_002
    name: Create Typer app skeleton with global flags
    description: 'Create the core Typer app with global callback for --json, --verbose
      flags.

      This replaces cli.py''s create_parser().

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    - modules/AgenticCLI/src/agenticcli/typer_app.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: '1. Create top-level typer.Typer() with callback for global flags

      2. Global callback handles --json/-j and --verbose/-v

      3. Register command groups as sub-Typer apps

      4. Keep handle() routing pattern in command modules (Typer calls them)

      5. DO NOT migrate individual commands yet — just the skeleton

      '
- name: Command Migration Phase
  execution: sequential
  tickets:
  - id: TM_003
    name: Migrate simple command groups (config, health, state, env)
    description: 'Migrate simpler command groups first to establish the pattern.

      These have fewer subcommands and simpler argument structures.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/agent_help.py
    - docs/plans/live/260207TM_typer_migration/migration_mapping.yml
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: '1. Convert each command group to @app.command() or sub-Typer

      2. Convert argparse arguments to Typer Argument/Option

      3. Maintain existing handle() routing in command modules

      4. Test each group after migration

      '
  - id: TM_004
    name: Migrate complex command groups (plan, worktree, session, loop)
    description: 'Migrate complex command groups with nested subcommands.

      plan has 3 levels: plan -> task -> start/complete/list.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticCLI/src/agenticcli/commands/loop.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: '1. Handle 3-level nesting (plan task start) with nested Typer apps

      2. Maintain all aliases (wt for worktree, ls for langsmith, etc.)

      3. Preserve mutual exclusion constraints (e.g., --task vs --role)

      4. Keep backward-compatible argument patterns

      '
  - id: TM_005
    name: Migrate context (CCI) commands
    description: 'Migrate the context/CCI command group which has its own subcommands

      (bootstrap, role, task, inputs, generate-agent).

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: '1. Create context_app Typer sub-app

      2. Register ctx as alias

      3. Convert each subcommand (bootstrap, role, task, inputs, generate-agent)

      4. Preserve all flags and their behaviors

      '
- name: Cleanup Phase
  execution: sequential
  tickets:
  - id: TM_006
    name: Remove argparse and wrapper artifacts
    description: 'Remove create_parser(), typer_app.py wrapper, and completion.py.

      Update entry.py to use Typer directly.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/entry.py
    - modules/AgenticCLI/pyproject.toml
    target_files:
    - modules/AgenticCLI/src/agenticcli/entry.py
    - modules/AgenticCLI/src/agenticcli/typer_app.py
    - modules/AgenticCLI/src/agenticcli/commands/completion.py
    - modules/AgenticCLI/pyproject.toml
    guidance: '1. Update entry.py to call Typer app directly

      2. Delete typer_app.py (wrapper no longer needed)

      3. Delete completion.py (Typer has native --install-completion)

      4. Update pyproject.toml entry points if needed

      5. Verify `agentic --install-completion` works natively

      '
  - id: TM_007
    name: Update and run full test suite
    description: 'Update all tests that mock argparse or call create_parser().

      Run full test suite to verify no regressions.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/tests/
    target_files:
    - modules/AgenticCLI/tests/
    guidance: '1. Find all tests that reference create_parser() or argparse

      2. Update to use Typer''s CliRunner for testing

      3. Run full pytest suite

      4. Fix any regressions

      '
