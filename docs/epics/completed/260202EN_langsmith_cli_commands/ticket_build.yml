plan:
  name: LangSmith CLI Commands Enhancement
  objective: Formalize temporary forensic scripts into permanent LangSmith CLI commands
  status: pending
  branch: feature/langsmith-cli-enhancements
  worktree: /home/code/AgenticEngineering-feature/langsmith-cli-enhancements
phases:
- id: review
  name: Review and Design
  description: Review existing implementation and design enhancements
  tasks:
  - id: '01'
    name: Audit existing langsmith.py
    description: 'Review modules/AgenticCLI/src/agenticcli/commands/langsmith.py to
      understand:

      - Current command structure and patterns

      - Available AgenticLangSmith service methods

      - Output formatting conventions

      - Error handling patterns

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
    - modules/AgenticLangSmith/src/agenticlangsmith/service.py
    success_criteria:
    - Document existing command signatures
    - Identify reusable helper functions
    - Note output formatting patterns
  - id: '02'
    name: Define command specifications
    description: 'Define detailed specifications for each new/enhanced command:

      - session-analyze: Session-focused run analysis

      - batch-search: Pattern matching across traces

      - run-inspect: Enhanced run details with hierarchy

      - friction-report: Export-focused friction analysis


      Include: arguments, options, output formats, error cases

      '
    status: completed
    success_criteria:
    - Command signatures documented
    - Output format examples created
    - Error handling approach defined
- id: implement
  name: Implementation
  description: Implement enhanced and new commands
  tasks:
  - id: '03'
    name: Implement session-analyze command
    description: 'Add agentic langsmith session-analyze command:

      - Group runs by session_id

      - Display session timeline

      - Show session statistics (duration, run count, error rate)

      - Support JSON and table output formats

      - Add --export option for CSV/JSON

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
    inputs:
    - Existing sessions command implementation
    - AgenticLangSmith service methods
    success_criteria:
    - Command executes successfully
    - Output is clear and useful
    - Export formats work correctly
  - id: '04'
    name: Implement batch-search command
    description: 'Add agentic langsmith batch-search command:

      - Search runs by regex pattern in inputs/outputs/errors

      - Filter by run_type, status, date range

      - Support session-based grouping

      - Export results to JSON/CSV

      - Handle large result sets efficiently

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
    success_criteria:
    - Pattern matching works correctly
    - Filters apply as expected
    - Results are paginated for large sets
  - id: '05'
    name: Enhance run-inspect command
    description: 'Enhance existing run command:

      - Add --tree option to show parent/child hierarchy

      - Include timing breakdown (queue time, execution time, overhead)

      - Show full inputs/outputs with --full flag

      - Add --format option (json, yaml, table)

      - Display related runs (siblings, children)

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
    inputs:
    - Existing cmd_run function
    success_criteria:
    - Tree view displays correctly
    - Timing breakdown is accurate
    - Format options work
  - id: '06'
    name: Enhance friction-report command
    description: 'Enhance existing friction command:

      - Add --export option (markdown, json, yaml)

      - Include resolution recommendation details

      - Link patterns to RLM definitions where applicable

      - Add --group-by option (pattern, severity, session)

      - Support detailed evidence output

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
    inputs:
    - Existing cmd_friction function
    - modules/AgenticGuidance/assets/definitions/friction-patterns.yml
    success_criteria:
    - Export formats generate valid output
    - Recommendations are clear and actionable
    - Grouping options work correctly
- id: test
  name: Testing
  description: Test new and enhanced commands
  tasks:
  - id: '07'
    name: Add unit tests
    description: 'Add unit tests for new command functions:

      - Test command parsing and validation

      - Mock AgenticLangSmith service calls

      - Verify output formatting

      - Test error handling

      '
    status: completed
    target_files:
    - modules/AgenticCLI/tests/test_langsmith_commands.py
    success_criteria:
    - All new commands have test coverage
    - Tests pass consistently
    - Edge cases covered
  - id: 08
    name: Integration testing
    description: 'Test commands against real LangSmith projects:

      - Verify session-analyze produces useful insights

      - Test batch-search with various patterns

      - Validate run-inspect hierarchy display

      - Check friction-report export formats

      - Test with different project sizes

      '
    status: completed
    success_criteria:
    - Commands work with real data
    - Performance is acceptable
    - Export files are valid
- id: rlm
  name: RLM Pattern Support
  description: Implement CLI support for Recursive Language Model patterns
  tasks:
  - id: '11'
    name: Review RLM specifications
    description: 'Review existing RLM specifications to understand requirements:

      - modules/AgenticGuidance/assets/specifications/rlm-context-accessor.yml

      - modules/AgenticGuidance/assets/definitions/rlm-patterns.yml

      - Reference: https://lnkd.in/gDXVnFm7


      Document:

      - ACCUMULATOR_* variable patterns

      - CONTEXT_* variable patterns

      - Bounded recursion requirements (max_depth)

      - RLM validation rules for large datasets

      '
    status: completed
    target_files:
    - modules/AgenticGuidance/assets/specifications/rlm-context-accessor.yml
    - modules/AgenticGuidance/assets/definitions/rlm-patterns.yml
    success_criteria:
    - RLM patterns fully documented
    - Variable naming conventions understood
    - Validation rules identified
  - id: '12'
    name: Implement RLM context accessor CLI
    description: 'Add agentic rlm subcommand group:

      - agentic rlm validate: Validate RLM compliance for trace analysis

      - agentic rlm context get <name>: Retrieve named context variable

      - agentic rlm context set <name> <value>: Store context variable

      - agentic rlm accumulator <name> --append <value>: Accumulate results


      Support for:

      - max_depth enforcement (default: 5)

      - Large dataset chunking (100+ traces)

      - Context persistence across CLI invocations

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/rlm.py
    success_criteria:
    - RLM subcommands implemented
    - Context variables persist correctly
    - Validation catches non-compliant patterns
  - id: '13'
    name: Integrate RLM with friction analysis
    description: 'Update friction-report command to use RLM patterns:

      - Use ACCUMULATOR_* for session-level evidence

      - Apply bounded recursion for large trace sets

      - Validate RLM compliance before analysis

      - Store intermediate results in CONTEXT_*


      This enables the _analyze_friction entrypoint to work properly

      with large datasets without overwhelming context windows.

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/langsmith.py
    inputs:
    - RLM context accessor implementation
    - Existing friction command
    success_criteria:
    - Friction analysis uses RLM patterns
    - Large datasets handled correctly
    - Context accumulation works
- id: finalize
  name: Documentation and Completion
  description: Update documentation and finalize implementation
  tasks:
  - id: 09
    name: Update CLI documentation
    description: 'Update documentation with new commands:

      - Add to modules/AgenticCLI/README.md

      - Include usage examples

      - Document all options and flags

      - Add troubleshooting section

      '
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    success_criteria:
    - All commands documented
    - Examples are clear and runnable
    - Options fully explained
  - id: '10'
    name: Final review and cleanup
    description: 'Final review before completion:

      - Code review for consistency

      - Remove any temporary debug code

      - Verify backward compatibility

      - Update CHANGELOG if exists

      - Mark plan as complete

      '
    status: completed
    success_criteria:
    - Code follows project conventions
    - No regressions in existing commands
    - Plan folder archived to completed/
outputs:
- name: Enhanced langsmith.py
  type: code
  location: modules/AgenticCLI/src/agenticcli/commands/langsmith.py
  description: Updated command module with new and enhanced commands
- name: RLM commands module
  type: code
  location: modules/AgenticCLI/src/agenticcli/commands/rlm.py
  description: New RLM context accessor CLI implementation
- name: Command tests
  type: tests
  location: modules/AgenticCLI/tests/test_langsmith_commands.py
  description: Comprehensive test coverage for all commands
- name: Updated documentation
  type: documentation
  location: modules/AgenticCLI/README.md
  description: Documentation including new command usage
notes:
- Maintain consistency with existing command patterns and output styles
- RLM implementation enables proper friction analysis for large trace sets
- Focus on making forensic analysis more accessible to users
- Export formats should be machine-readable for further processing
- RLM context should persist across CLI invocations for session continuity
