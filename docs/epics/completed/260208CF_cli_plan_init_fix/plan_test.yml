name: CLI Plan Init Fix - Test Plan
status: active
priority: critical
context: 'Test plan for the 2-char code extraction bug fix. The build plan has 4 phases

  (P1_FIX, P2_TESTS, P3_VALIDATION, P4_UAT) and 6 tasks that fix the path where

  `agentic plan init 260208PN -d "desc"` incorrectly produces `26020826_desc`

  instead of `260208PN_desc`. Tests verify the fix at unit, integration, and

  user acceptance levels against all three user stories.

  '
affected_stories:
- US-PLAN-INIT-001
- US-PLAN-INIT-002
- US-PLAN-INIT-003
inputs:
- location: docs/plans/live/260208CF_cli_plan_init_fix/plan_build.yml
  description: Build plan defining the fix phases and tasks
- location: docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
  description: User stories with acceptance criteria and test inputs
- location: modules/AgenticCLI/src/agenticcli/utils/naming.py
  description: Primary fix target - generate_plan_folder_name and get_worktree_id
- location: modules/AgenticCLI/src/agenticcli/commands/plan.py
  description: Call site fix target - cmd_init passes branch
- location: modules/AgenticCLI/tests/test_naming.py
  description: Existing test file to be extended with branch parameter tests
impacted_artifacts:
- artifact_type: test_file
  artifact_identifier: modules/AgenticCLI/tests/test_naming.py
  impact_type: behavior_change
  description: Extended with branch parameter and registry lookup tests
  breaking_change: false
loop_structures:
- id: loop_p1_fix_verify
  type: test-fix-loop
  applies_to_phase: TP1_P1_VERIFY
  trigger: After P1_FIX build phase completes
  description: 'Verify that naming.py accepts branch parameter and forwards it to

    get_worktree_id. Run targeted unit tests against the modified functions.

    '
  exit_criteria:
    success: All P1 verification tests pass
    max_iterations: 5
    escalation: Escalate to user - naming.py fix may have incorrect signature
  participants:
  - agent: test-runner
    role: Executes unit tests for naming.py changes
  - agent: build-python
    role: Fixes failures in naming.py if tests fail
- id: loop_p2_tests_verify
  type: test-fix-loop
  applies_to_phase: TP2_P2_VERIFY
  trigger: After P2_TESTS build phase completes
  description: 'Verify that new tests in test_naming.py are correct, cover all three

    user story scenarios, and pass against the fixed implementation.

    '
  exit_criteria:
    success: All new branch parameter tests pass
    max_iterations: 5
    escalation: Escalate to user - new tests may have incorrect assertions
  participants:
  - agent: test-runner
    role: Executes new test_naming.py tests
  - agent: test-builder
    role: Fixes test assertions or mocking issues
- id: loop_audit
  type: audit-test-fix-loop
  applies_to_phase: TP3_AUDIT
  trigger: After TP1 and TP2 verification complete
  description: 'MANDATORY audit loop to detect reward hacking in tests. Validates
    that

    tests exercise real code paths, mocks are minimal and correct, and

    assertions test actual behavior not implementation details.

    '
  exit_criteria:
    success: Audit passes AND all tests still pass after corrections
    max_iterations: 3
    escalation: BLOCK - audit failures must be resolved before UAT
  participants:
  - agent: test-audit
    role: Audits test quality and detects reward hacking
  - agent: test-builder
    role: Fixes audit-identified test issues
  - agent: build-python
    role: Fixes implementation issues revealed by audit
  mandatory: true
- id: loop_uat
  type: user-story-validation-loop
  applies_to_phase: TP5_UAT
  trigger: After regression gate passes
  description: 'PRIMARY SUCCESS CRITERIA. Validates all three user stories against

    the complete fixed implementation. Each story must pass acceptance

    criteria defined in user_stories.yml.

    '
  exit_criteria:
    success: All three user stories (US-PLAN-INIT-001, 002, 003) pass
    max_iterations: 3
    escalation: BLOCK completion - UAT must pass for plan to complete
  participants:
  - agent: test-user-simulator
    role: Simulates user executing plan init with various branch scenarios
  mandatory: true
phases:
- phase_id: TP1_P1_VERIFY
  name: Verify P1_FIX - naming.py Branch Parameter
  status: pending
  stories:
  - US-PLAN-INIT-001
  - US-PLAN-INIT-002
  - US-PLAN-INIT-003
  execution: sequential
  tasks:
  - id: CT-001
    name: Test generate_plan_folder_name accepts branch parameter
    status: completed
    description: 'Verify CF-001 output: generate_plan_folder_name() now has an optional

      branch parameter that is forwarded to get_worktree_id().

      '
    target_files:
    - modules/AgenticCLI/tests/test_naming.py
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    - modules/AgenticCLI/tests/test_naming.py
    loop: test-fix-loop
    guidance: 'Run existing tests to verify backward compatibility:

      1. python3 -m pytest modules/AgenticCLI/tests/test_naming.py -v -k "TestGeneratePlanFolderName"

      2. Verify all existing tests still pass (no regressions from signature change)

      3. Inspect naming.py to confirm branch parameter exists in function signature

      4. Inspect that branch is forwarded to get_worktree_id() call

      '
    success_criteria:
    - generate_plan_folder_name() has branch parameter in signature
    - branch parameter is forwarded to get_worktree_id()
    - All existing TestGeneratePlanFolderName tests pass unchanged
  - id: CT-002
    name: Test cmd_init passes branch to generate_plan_folder_name
    status: completed
    description: 'Verify CF-002 output: plan.py cmd_init() now passes branch=branch

      to generate_plan_folder_name().

      '
    target_files: []
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: 'Verify the call site change:

      1. Read plan.py and confirm generate_plan_folder_name call includes branch=branch

      2. Confirm the branch variable comes from args.branch (line ~329)

      3. Run: python3 -c "import ast; tree = ast.parse(open(''modules/AgenticCLI/src/agenticcli/commands/plan.py'').read());
      print(''syntax OK'')"

      4. Verify no import errors: python3 -c "from agenticcli.commands.plan import
      cmd_init"

      '
    success_criteria:
    - cmd_init() passes branch=branch to generate_plan_folder_name()
    - plan.py has no syntax errors
    - plan.py imports resolve correctly
- phase_id: TP2_P2_VERIFY
  name: Verify P2_TESTS - New Test Coverage
  status: pending
  stories:
  - US-PLAN-INIT-001
  - US-PLAN-INIT-002
  - US-PLAN-INIT-003
  execution: sequential
  tasks:
  - id: CT-003
    name: Run new generate_plan_folder_name branch tests (CF-003)
    status: completed
    description: 'Execute the new tests added by CF-003 that cover branch parameter

      forwarding, registry lookup, and fallback behavior.

      '
    target_files:
    - modules/AgenticCLI/tests/test_naming.py
    inputs:
    - modules/AgenticCLI/tests/test_naming.py
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    loop: test-fix-loop
    guidance: "1. Run: python3 -m pytest modules/AgenticCLI/tests/test_naming.py -v\
      \ -k \"TestGeneratePlanFolderName\"\n2. Verify these new test methods exist\
      \ and pass:\n   - test_branch_parameter_forwarded: branch=\"agentic-cli\" ->\
      \ \"AC\" from registry\n   - test_branch_none_uses_path_fallback: branch=None\
      \ -> path suffix \"TE\"\n   - test_branch_not_in_registry_uses_path: unknown\
      \ branch -> path suffix\n3. Verify mocks target correct import paths (agenticcli.commands.worktree.*)\n"
    success_criteria:
    - test_branch_parameter_forwarded passes - registry lookup returns correct code
    - test_branch_none_uses_path_fallback passes - None branch uses path suffix
    - test_branch_not_in_registry_uses_path passes - fallback works for unknown branch
  - id: CT-004
    name: Run new get_worktree_id branch tests (CF-004)
    status: completed
    description: 'Execute the new tests added by CF-004 that cover get_worktree_id

      registry lookup and error handling.

      '
    target_files:
    - modules/AgenticCLI/tests/test_naming.py
    inputs:
    - modules/AgenticCLI/tests/test_naming.py
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    loop: test-fix-loop
    guidance: "1. Run: python3 -m pytest modules/AgenticCLI/tests/test_naming.py -v\
      \ -k \"TestGetWorktreeId\"\n2. Verify these new test methods exist and pass:\n\
      \   - test_branch_triggers_registry_lookup: branch -> \"PN\" from registry\n\
      \   - test_branch_registry_import_error_falls_back: ImportError -> path suffix\n\
      \   - test_branch_registry_no_match_falls_back: no match -> path suffix\n3.\
      \ Confirm mocks correctly simulate registry scenarios\n"
    success_criteria:
    - test_branch_triggers_registry_lookup passes - registry returns 'PN'
    - test_branch_registry_import_error_falls_back passes - graceful degradation
    - test_branch_registry_no_match_falls_back passes - path suffix fallback
- phase_id: TP3_AUDIT
  name: Test Quality Audit
  status: pending
  stories:
  - US-PLAN-INIT-001
  - US-PLAN-INIT-002
  - US-PLAN-INIT-003
  execution: sequential
  tasks:
  - id: CT-005
    name: Audit test quality - detect reward hacking
    status: completed
    description: 'MANDATORY audit of all new and modified tests. Detect reward hacking

      patterns: over-mocking, trivial assertions, tests that pass for wrong

      reasons, or tests that don''t exercise real code paths.

      '
    target_files:
    - modules/AgenticCLI/tests/test_naming.py
    inputs:
    - modules/AgenticCLI/tests/test_naming.py
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    - docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
    loop: audit-test-fix-loop
    guidance: "Audit checklist:\n1. MOCK SCOPE: Are mocks minimal? Do tests mock only\
      \ external dependencies\n   (registry loading, abbreviation lookup) and not\
      \ internal logic?\n2. ASSERTION STRENGTH: Do assertions check actual output\
      \ values, not just\n   \"was called\" or \"is not None\"?\n3. CODE PATH COVERAGE:\
      \ Does each test exercise the real generate_plan_folder_name\n   and get_worktree_id\
      \ code paths, not just mocked wrappers?\n4. EDGE CASES: Are edge cases from\
      \ user stories covered?\n   - Short suffix padding (US-PLAN-INIT-003: single\
      \ char 'a' -> 'AX')\n   - Registry precedence over path suffix (US-PLAN-INIT-002)\n\
      5. FALSE POSITIVE RISK: Could any test pass even if the fix were reverted?\n\
      \   Run with intentionally wrong mock values to verify sensitivity.\n6. STORY\
      \ ALIGNMENT: Does each test trace to at least one user story?\n"
    success_criteria:
    - No reward hacking patterns detected
    - All assertions verify meaningful output values
    - Mocks are minimal and correctly scoped
    - Tests would fail if the fix were reverted
    - Each user story has at least one test covering its acceptance criteria
- phase_id: TP4_REGRESSION
  name: Full Regression Gate
  status: pending
  stories:
  - US-PLAN-INIT-001
  - US-PLAN-INIT-002
  - US-PLAN-INIT-003
  execution: sequential
  tasks:
  - id: CT-006
    name: Run full AgenticCLI test suite
    status: completed
    description: 'Run the complete test suite to verify no regressions from the fix.

      This gates UAT - no UAT until all tests pass.

      '
    target_files: []
    inputs:
    - modules/AgenticCLI/tests/
    guidance: "1. Run: python3 -m pytest modules/AgenticCLI/tests/ -v\n2. All tests\
      \ must pass (0 failures, 0 errors)\n3. Specifically verify:\n   - test_naming.py:\
      \ All old + new tests pass\n   - test_plan.py: No regressions from plan.py changes\n\
      \   - test_worktree.py: No regressions from any worktree-related changes\n4.\
      \ Record total test count and pass rate\n"
    success_criteria:
    - All test_naming.py tests pass (old and new)
    - All other AgenticCLI tests pass - 0 regressions
    - No import errors or fixture failures
- phase_id: TP5_UAT
  name: User Acceptance Testing (PRIMARY SUCCESS CRITERIA)
  status: pending
  stories:
  - US-PLAN-INIT-001
  - US-PLAN-INIT-002
  - US-PLAN-INIT-003
  execution: sequential
  strategy: test-user-simulator
  tasks:
  - id: CT-007
    name: 'UAT: US-PLAN-INIT-001 - Branch suffix code extraction'
    status: completed
    description: 'Validate that plan init correctly extracts the 2-char code from
      the

      branch suffix. This is the primary bug that triggered this plan.

      '
    target_files: []
    inputs:
    - docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    loop: user-story-validation-loop
    guidance: "Execute US-PLAN-INIT-001 acceptance criteria:\n\nTest Input 1:\n  branch:\
      \ \"260208PN\"\n  description: \"phone_notifications\"\n  Expected folder: \"\
      260208PN_phone_notifications\"\n  Expected code: \"PN\" (from branch suffix,\
      \ NOT \"26\" from path)\n\nTest Input 2:\n  branch: \"260208CF\"\n  description:\
      \ \"cli_fix\"\n  Expected folder: \"260208CF_cli_fix\"\n  Expected code: \"\
      CF\"\n\nValidation method:\n1. Call generate_plan_folder_name(worktree_path,\
      \ description, date, branch=branch)\n2. Verify the 2-char code in the result\
      \ matches expected_code\n3. Verify the full folder name matches expected_folder\
      \ pattern\n4. THIS IS THE CORE BUG FIX - must produce \"PN\" not \"26\"\n\n\
      Update user_stories.yml test_status for US-PLAN-INIT-001 to pass/fail.\n"
    success_criteria:
    - branch='260208PN' produces code 'PN' (not '26')
    - branch='260208CF' produces code 'CF' (not '26')
    - Folder name matches YYMMDDXX_description pattern correctly
    - US-PLAN-INIT-001 test_status updated to pass
  - id: CT-008
    name: 'UAT: US-PLAN-INIT-002 - Registry lookup for known branches'
    status: completed
    description: 'Validate that plan init consults worktrees.yml registry and uses

      the registered abbreviation for known branches.

      '
    target_files: []
    inputs:
    - docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    - docs/worktrees.yml
    loop: user-story-validation-loop
    guidance: "Execute US-PLAN-INIT-002 acceptance criteria:\n\nTest Input 1:\n  branch:\
      \ \"agentic-cli\"\n  description: \"test_feature\"\n  Expected code: \"AC\"\
      \ (from worktrees.yml abbreviation)\n\nTest Input 2:\n  branch: \"agenticguidance\"\
      \n  description: \"new_module\"\n  Expected code: \"AG\" (from worktrees.yml\
      \ abbreviation)\n\nValidation method:\n1. Verify worktrees.yml contains the\
      \ expected registry entries\n2. Call generate_plan_folder_name with registered\
      \ branch names\n3. Verify the abbreviation comes from registry, not path suffix\n\
      4. Registry lookup MUST take precedence over path suffix extraction\n\nUpdate\
      \ user_stories.yml test_status for US-PLAN-INIT-002 to pass/fail.\n"
    success_criteria:
    - branch='agentic-cli' produces code 'AC' from registry
    - branch='agenticguidance' produces code 'AG' from registry
    - Registry lookup takes precedence over path suffix extraction
    - US-PLAN-INIT-002 test_status updated to pass
  - id: CT-009
    name: 'UAT: US-PLAN-INIT-003 - Fallback for unregistered branches'
    status: completed
    description: 'Validate that plan init falls back to path suffix extraction when

      the branch is not in the worktrees.yml registry.

      '
    target_files: []
    inputs:
    - docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    loop: user-story-validation-loop
    guidance: "Execute US-PLAN-INIT-003 acceptance criteria:\n\nTest Scenario 1: Standard\
      \ unregistered branch\n  worktree path: /home/code/AgenticEngineering-myfeature\n\
      \  branch: \"myfeature\" (not in registry)\n  Expected code: \"MY\" (from path\
      \ suffix \"myfeature\" -> first 2 chars uppercased)\n\nTest Scenario 2: Short\
      \ suffix padding\n  worktree path: /home/code/AgenticEngineering-a\n  branch:\
      \ \"a\" (single char, not in registry)\n  Expected code: \"AX\" (padded with\
      \ X)\n\nValidation method:\n1. Call generate_plan_folder_name with unregistered\
      \ branch names\n2. Verify fallback to path suffix extraction works correctly\n\
      3. Verify short suffixes are padded with 'X'\n\nUpdate user_stories.yml test_status\
      \ for US-PLAN-INIT-003 to pass/fail.\n"
    success_criteria:
    - Unregistered branch falls back to path suffix extraction
    - Path suffix 'myfeature' produces code 'MY'
    - Short suffix 'a' produces padded code 'AX'
    - US-PLAN-INIT-003 test_status updated to pass
  - id: CT-010
    name: 'UAT: Final story status summary and sign-off'
    status: completed
    description: 'Aggregate all UAT results. Verify all three user stories pass.

      Update user_stories.yml with final test_status values.

      Plan cannot complete unless all stories pass.

      '
    target_files:
    - docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
    inputs:
    - docs/plans/live/260208CF_cli_plan_init_fix/user_stories.yml
    guidance: "1. Read user_stories.yml and verify all test_status fields\n2. Expected\
      \ final state:\n   - US-PLAN-INIT-001: test_status: pass\n   - US-PLAN-INIT-002:\
      \ test_status: pass\n   - US-PLAN-INIT-003: test_status: pass\n3. If any story\
      \ has test_status != pass, report which and why\n4. Generate UAT summary:\n\
      \   - Total stories: 3\n   - Passed: X/3\n   - Failed: list any failures with\
      \ reasons\n5. GATE: Plan CANNOT be marked complete unless all 3 stories pass\n"
    success_criteria:
    - US-PLAN-INIT-001 test_status is pass
    - US-PLAN-INIT-002 test_status is pass
    - US-PLAN-INIT-003 test_status is pass
    - All 3/3 user stories pass UAT
    - user_stories.yml updated with final test_status values
success_criteria:
- 'P1_FIX verified: naming.py accepts and forwards branch parameter'
- 'P2_TESTS verified: All 6 new test methods pass'
- 'Audit passes: No reward hacking, mocks minimal, assertions meaningful'
- 'Regression gate: Full AgenticCLI test suite passes with 0 failures'
- 'UAT PRIMARY: US-PLAN-INIT-001 passes - branch suffix extracted correctly'
- 'UAT PRIMARY: US-PLAN-INIT-002 passes - registry lookup works for known branches'
- 'UAT PRIMARY: US-PLAN-INIT-003 passes - fallback works for unregistered branches'
- 'All 3 user stories have test_status: pass in user_stories.yml'
