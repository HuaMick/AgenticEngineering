name: CLI Plan Init Fix - Test Plan
worktree_path: ''
branch: ''
status: active
priority: critical
objective: 'Test plan for the 2-char code extraction bug fix. The build plan has 4
  phases

  (P1_FIX, P2_TESTS, P3_VALIDATION, P4_UAT) and 6 tasks that fix the path where

  `agentic plan init 260208PN -d "desc"` incorrectly produces `26020826_desc`

  instead of `260208PN_desc`. Tests verify the fix at unit, integration, and

  user acceptance levels against all three user stories.

  '
created: ''
phases:
- name: Fix naming.py to Accept Branch Parameter
  execution: sequential
  tickets:
  - id: CF-001
    name: Add branch parameter to generate_plan_folder_name() in naming.py
    description: 'The function at naming.py:116 calls get_worktree_id(worktree_path)
      without passing branch. Add an optional branch parameter and forward it so that
      registry lookup can occur.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    guidance: "1. Change function signature at line 116:\n   def generate_plan_folder_name(\n\
      \       worktree_path: Path,\n       description: str,\n       date: datetime\
      \ | None = None,\n       branch: str | None = None,\n   ) -> str:\n2. Update\
      \ line 142 to pass branch:\n   worktree_id = get_worktree_id(worktree_path,\
      \ branch=branch)\n3. Update docstring to document the new branch parameter\n\
      4. Update Examples in docstring to show branch usage\n"
    success_criteria:
    - generate_plan_folder_name() accepts optional branch parameter
    - branch is forwarded to get_worktree_id()
    - Existing callers without branch continue to work (backward-compatible)
  - id: CF-002
    name: Pass branch to generate_plan_folder_name() in plan.py cmd_init()
    description: 'The call site at plan.py:416 calls generate_plan_folder_name(worktree_path,
      description) without passing the branch variable that is already available at
      line 329. Add branch=branch to the call.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: "1. Change line 416 from:\n   plan_folder_name = generate_plan_folder_name(worktree_path,\
      \ description)\n   to:\n   plan_folder_name = generate_plan_folder_name(worktree_path,\
      \ description, branch=branch)\n2. The branch variable is already defined at\
      \ line 329: branch = args.branch\n3. No other changes needed in this file\n"
    success_criteria:
    - cmd_init() passes branch to generate_plan_folder_name()
    - Branch variable is the same args.branch already used for worktree creation
- name: Add Tests for Branch Parameter
  execution: sequential
  tickets:
  - id: CF-003
    name: Add test for generate_plan_folder_name with branch parameter
    description: 'Add tests to TestGeneratePlanFolderName that verify the branch parameter
      is forwarded to get_worktree_id and that registry lookup works when branch is
      provided.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/tests/test_naming.py
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    target_files:
    - modules/AgenticCLI/tests/test_naming.py
    guidance: "Add these test methods to TestGeneratePlanFolderName (after line 129):\n\
      \n1. test_branch_parameter_forwarded:\n   - Mock agenticcli.commands.worktree.load_worktree_registry\
      \ to return\n     a registry with branch \"agentic-cli\" -> abbreviation \"\
      AC\"\n   - Mock agenticcli.commands.worktree.lookup_abbreviation to return \"\
      AC\"\n   - Call generate_plan_folder_name(path, \"feature\", date, branch=\"\
      agentic-cli\")\n   - Assert result starts with date + \"AC\"\n   - Use @patch\
      \ for the mocks on the import path in naming.py\n\n2. test_branch_none_uses_path_fallback:\n\
      \   - Call generate_plan_folder_name(Path(\"/repo-test\"), \"feature\", date,\
      \ branch=None)\n   - Assert uses \"TE\" from path suffix (existing behavior\
      \ preserved)\n\n3. test_branch_not_in_registry_uses_path:\n   - Mock registry\
      \ to return empty / no match\n   - Call with branch=\"unknown-branch\"\n   -\
      \ Assert falls back to path suffix extraction\n\nPattern: Use unittest.mock.patch\
      \ to mock the worktree imports\ninside get_worktree_id(). The imports are lazy\
      \ (inside the function),\nso patch \"agenticcli.commands.worktree.load_worktree_registry\"\
      \ and\n\"agenticcli.commands.worktree.lookup_abbreviation\".\n"
    success_criteria:
    - Test verifies branch parameter is forwarded to get_worktree_id
    - Test verifies registry lookup produces correct 2-char code
    - Test verifies None branch preserves existing fallback behavior
    - Test verifies unregistered branch falls back to path extraction
  - id: CF-004
    name: Add test for get_worktree_id with branch and registry
    description: 'Add tests to TestGetWorktreeId that exercise the registry lookup
      path when branch is provided.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/tests/test_naming.py
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    target_files:
    - modules/AgenticCLI/tests/test_naming.py
    guidance: "Add these test methods to TestGetWorktreeId (after line 56):\n\n1.\
      \ test_branch_triggers_registry_lookup:\n   - Mock load_worktree_registry to\
      \ return valid registry\n   - Mock lookup_abbreviation to return \"PN\"\n  \
      \ - Call get_worktree_id(Path(\"/repo-260208PN\"), branch=\"260208PN\")\n  \
      \ - Assert returns \"PN\" (from registry, not \"26\" from path)\n\n2. test_branch_registry_import_error_falls_back:\n\
      \   - Mock import to raise ImportError\n   - Call get_worktree_id(Path(\"/repo-feature\"\
      ), branch=\"feature\")\n   - Assert falls back to path suffix \"FE\"\n\n3. test_branch_registry_no_match_falls_back:\n\
      \   - Mock registry to return no match\n   - Call get_worktree_id(Path(\"/repo-myfeature\"\
      ), branch=\"myfeature\")\n   - Assert falls back to path suffix \"MY\"\n\nPattern:\
      \ Use @patch on \"agenticcli.commands.worktree.load_worktree_registry\"\nand\
      \ \"agenticcli.commands.worktree.lookup_abbreviation\".\n"
    success_criteria:
    - Test confirms registry lookup is triggered when branch is provided
    - Test confirms ImportError is caught and fallback works
    - Test confirms no-match falls back to path suffix
