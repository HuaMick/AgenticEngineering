      If AgentLoopService doesn''t exist yet, create stub that:

      - Checks if .tasklist/status.json shows all tasks ticked

      - Returns completion status for loop decision


      Integration point:

      - check_completion() should call tasklist.is_complete()

      - Loop continues until tasklist.is_complete() returns True

      '
    status: completed
    agent: null
    success_criteria:
    - Loop completion checks tasklist status
    - Loop continues if tasks remain unticked
  - id: TL-010
    name: Add tasklist status to loop prompt
    description: 'When Ralph Loop spawns new iteration, include tasklist status in
      prompt.


      Prompt injection:

      - Current tasklist completion percentage

      - List of unticked tasks

      - Instruction to tick tasks upon completion


      This ensures each fresh-context agent knows what remains.

