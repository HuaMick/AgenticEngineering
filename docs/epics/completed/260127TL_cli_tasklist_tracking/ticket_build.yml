name: cli-tasklist-tracking
worktree_path: /home/code/AgenticEngineering-agenticguidance
branch: agenticguidance
status: completed
priority: high
objective: "This plan implements CLI commands that force agents to explicitly tick\
  \ off\ntasks during orchestration. The goal is compliance enforcement - agents\n\
  must run CLI commands to mark tasks done, creating an auditable trail.\n\nKey insight:\
  \ If an agent claims completion without running the tick command,\nit's detectable\
  \ deception. Combined with Ralph Loop, agents keep getting\nspawned until the tasklist\
  \ shows all items ticked.\n\nWORKFLOW:\n1. PLANNING PHASE: Planner creates orchestration.mmd\
  \ with phases/tasks\n2. REVIEW PHASE: Reviewer approves plan, reads MMD, extracts\
  \ tasks, runs:\n     agentic tasklist init --tasks '<JSON>'\n   - Agent parses MMD,\
  \ CLI stores the data\n   - Tasklist is ready BEFORE orchestration begins\n3. ORCHESTRATION\
  \ PHASE: Agents execute tasks, must run:\n     agentic tasklist update <task_id>\
  \ in-progress  (when starting)\n     agentic tasklist update <task_id> completed\
  \    (when done)\n4. RALPH LOOP: Checks tasklist.is_complete(), respawns until all\
  \ completed\n\nFirst target: orchestration.mmd files for orchestration agents.\n\
  Future expansion: all agent types.\n"
created: ''
phases:
- name: 'Phase 1: Tasklist Service'
  execution: sequential
  description: Core service for parsing orchestration.mmd and tracking task status
  tickets:
  - id: TL-001
    name: Create TasklistService
    description: "Create modules/AgenticGuidance/src/agenticguidance/services/tasklist.py\n\
      \nDataclasses:\n- TaskItem(id, name, phase, status, updated_at)\n- TasklistState(tasks,\
      \ created_at, last_updated, source)\n- UpdateResult(success, message, task_id,\
      \ old_status, new_status)\n\nClass: TasklistService\n- __init__(plan_folder:\
      \ Path)\n- initialize(tasks: List[dict]) -> TasklistState\n  # Agent provides\
      \ task data, CLI doesn't parse MMD\n"
    status: completed
    agent: null
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/tasklist.py
    success_criteria:
    - Service class created with dataclasses
    - initialize() accepts task list from agent
  - id: TL-002
    name: Implement state persistence
    description: "Add state persistence to .tasklist/status.json in plan folder.\n\
      \nMethods:\n- _load_state() -> TasklistState\n- _save_state(state: TasklistState)\n\
      - _get_state_path() -> Path\n\nState file format:\n{\n  \"tasks\": [{\"id\"\
      : \"...\", \"status\": \"pending|ticked\", \"ticked_at\": \"...\"}],\n  \"created_at\"\
      : \"ISO timestamp\",\n  \"last_updated\": \"ISO timestamp\",\n  \"source_mmd\"\
      : \"orchestration_*.mmd filename\"\n}\n"
    status: completed
    agent: null
    success_criteria:
    - State persisted to .tasklist/status.json
    - State survives process restart
  - id: TL-003
    name: Implement status update operation
    description: 'Core status update operation for tasks.


      Methods:

      - update_status(task_id: str, status: str) -> UpdateResult

      - get_tasks_by_status(status: str = None) -> List[TaskItem]

      - get_completion_status() -> dict


      Valid statuses: pending, in-progress, completed, blocked, deferred


      Update operation must:

      - Verify task exists

      - Validate status value

      - Update status with timestamp

      - Persist state immediately

      '
    status: completed
    agent: null
    success_criteria:
    - update_status() updates state and persists
    - get_tasks_by_status() filters correctly
    - get_completion_status() returns percentage
  - id: TL-004
    name: Add completion check method
    description: 'Simple method to check if all tasks are completed.


      Methods:

      - is_complete() -> bool


      Returns True only when ALL tasks have status == "completed"

      blocked/deferred/pending/in-progress all return False


      Agents use this via: agentic tasklist show --status pending

      If empty result, all tasks are done.

      '
    status: completed
    agent: null
    success_criteria:
    - is_complete() returns True only when all status=completed
- name: 'Phase 2: CLI Commands'
  execution: sequential
  description: Add agentic tasklist commands
  tickets:
  - id: TL-005
    name: Add tasklist parser to cli.py
    description: 'Add _add_tasklist_parser() function to cli.py


      Create command group: agentic tasklist


      Subcommands:

      - init [--plan PATH]: Initialize tasklist from task data (agent provides via
      stdin/--tasks JSON)

      - show [--plan PATH] [--status STATUS] [--limit N]: Show tasks with filtering

      - update <task_id> <status>: Update task status (completed/in-progress/blocked/deferred)


      Status values: pending, in-progress, completed, blocked, deferred


      Agents check completion by: agentic tasklist show --status pending

      If result is empty, all tasks are done.


      Add to PROJECT_COMMANDS (requires plan folder context)

      Add routing in run_cli()

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - tasklist command group registered
    - subcommands defined with arguments
  - id: TL-006
    name: Create tasklist.py command module
    description: 'Create modules/AgenticCLI/src/agenticcli/commands/tasklist.py


      Functions:

      - handle(args, ctx) - main router

      - cmd_init(args, ctx) - REVIEWER RUNS THIS (accepts task data from agent)

      - cmd_show(args, ctx) - flexible filtering with --status, --limit

      - cmd_update(args, ctx) - THE KEY COMMAND (status transitions)

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/tasklist.py
    success_criteria:
    - All command handlers implemented
    - JSON output supported
  - id: TL-006a
    name: Implement cmd_init (REVIEWER GATE)
    description: "THE PLANNING GATE COMMAND - reviewer runs this after approving plan.\n\
      \nUsage: agentic tasklist init [--plan PATH] [--tasks JSON | stdin]\n\nBehavior:\n\
      - Agent reads orchestration.mmd and extracts tasks\n- Agent provides task list\
      \ to CLI via:\n  - --tasks '{\"tasks\": [{\"id\": \"...\", \"name\": \"...\"\
      , \"phase\": \"...\"}]}'\n  - Or pipe JSON to stdin\n- CLI creates .tasklist/status.json\
      \ with all tasks in \"pending\" state\n- CLI does NOT parse MMD - agent does\
      \ the parsing, CLI stores the data\n\nThis decouples MMD parsing from CLI, making\
      \ the system more flexible.\nAgent is responsible for understanding the orchestration\
      \ file format.\n\nOutput includes:\n- Number of tasks initialized\n- Tasklist\
      \ path created\n"
    status: completed
    agent: null
    success_criteria:
    - init creates .tasklist/status.json from provided task data
    - init accepts JSON via --tasks or stdin
    - JSON output shows initialized tasks
  - id: TL-006b
    name: Implement cmd_show (FLEXIBLE QUERY)
    description: "Show tasks with flexible filtering options.\n\nUsage: agentic tasklist\
      \ show [--plan PATH] [--status STATUS] [--limit N]\n\nOptions:\n- --status:\
      \ Filter by status (completed, in-progress, blocked, deferred, pending)\n- --limit:\
      \ Limit number of results (default: all)\n- --plan: Explicit plan folder path\n\
      \nDefault (no filters): Show all tasks\nExample: agentic tasklist show --status\
      \ pending --limit 1\n  → Returns next pending task (replaces old \"pending\"\
      \ command)\n\nOutput includes task id, name, phase, status, updated_at\n"
    status: completed
    agent: null
    success_criteria:
    - show lists all tasks by default
    - show filters by --status correctly
    - --limit 1 returns single next task
    - JSON output supported
  - id: TL-007
    name: Implement cmd_update (KEY ENFORCEMENT)
    description: 'THE CRITICAL COMMAND - agents must call this to update task status.


      Usage: agentic tasklist update <task_id> <status> [--plan PATH]


      Status values:

      - in-progress: Task being worked on

      - completed: Task finished successfully

      - blocked: Task cannot proceed (dependency/issue)

      - deferred: Task postponed for later


      Behavior:

      - Finds plan folder (auto-detect or --plan)

      - Loads TasklistService

      - Updates task status with timestamp

      - Persists state immediately

      - Prints success/failure with JSON support


      This is the enforcement mechanism. Agents MUST run this command

      to update task status. Claimed completion without update = deception.

      '
    status: completed
    agent: null
    success_criteria:
    - update command persists state
    - update command records timestamp
    - update command outputs machine-readable result
    - update command fails gracefully for unknown task
  - id: TL-008
    name: Add TasklistError exception class
    description: 'Create TasklistError in exceptions.py (exit code 72)


      Factory methods:

      - task_not_found(task_id)

      - invalid_status(status)

      - not_initialized(plan_folder)

      - validation_failed(incomplete_count)

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/exceptions.py
    success_criteria:
    - TasklistError class with exit code 72
    - Factory methods for common errors
