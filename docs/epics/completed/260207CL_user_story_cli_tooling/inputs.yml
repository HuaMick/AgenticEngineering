# Inputs for User Story CLI Tooling Plan
# Plan ID: 260207CL_user_story_cli_tooling

objective: |
  Implement CLI tooling to support user story test tracking and mandatory story linking
  in the planning process. Add story status management, reporting, and plan integration.

context:
  implementation_plan: |
    This plan is part of a two-plan initiative to integrate user stories into the planning process:
    - Companion plan (260207GU): Agent guidance updates  
    - This plan (260207CL): CLI tooling updates
    
    Key requirements:
    1. Stories gain embedded test metadata (last_tested, test_status, test_notes, tested_by_plan)
    2. Planning becomes story-mandatory (with escape hatch)
    3. New CLI commands for story status management
    4. Migration script for existing stories

  related_user_stories:
    - US-CLI-011: Story Discovery (existing)
    - US-CLI-012: Story Init (existing)
    - US-CLI-013: Story Cat (existing)
    # New stories to be created for:
    # - Story status viewing/updating
    # - Story reporting
    # - Plan-story linking

scope:
  primary_targets:
    - modules/AgenticCLI/src/agenticcli/commands/stories.py
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/tests/test_stories.py
    - modules/AgenticCLI/tests/integration/test_user_stories.py

  schema_updates:
    - docs/userstories/**/*.yml  # Add test tracking fields

deliverables:
  - "agentic stories status <id>" command - view story test status
  - "agentic stories update <id> --status pass|fail --notes '...'" command
  - "agentic stories report [--project X]" command - pass/fail/untested summary
  - "agentic stories untested [--project X]" command - list stories needing validation
  - Updated "agentic plan init" with mandatory story linking prompt
  - Migration script for existing story files (scripts/migrate_stories.py)
  - Unit and integration tests for all new commands
  - Updated user stories for AgenticCLI category

execution_worktree: /home/code/AgenticEngineering-userstory-cli
