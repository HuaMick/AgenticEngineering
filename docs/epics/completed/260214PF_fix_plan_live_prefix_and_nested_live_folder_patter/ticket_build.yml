objective: "THE PROBLEM:\nThe orchestration-planning agent just created plan folder\
  \ 260214US_add_user_story_generation_phase_to_planner_agents\nwith an OUTDATED structure:\n\
  \n1. Nested live/ subfolder containing plan files:\n   - live/plan_live_build.yml\n\
  \   - live/plan_live_test.yml\n\n2. Correct files at root:\n   - plan_teach.yml\n\
  \   - plan_test.yml\n   - plan_audit_clean.yml\n\nThe CORRECT pattern (enforced\
  \ by CLI and used by all recent plans):\n- Plan files (plan_*.yml) directly in folder\
  \ root\n- No \"live\" prefix in filenames\n- No nested live/, completed/, analysis/,\
  \ or audit/ subdirectories\n\nROOT CAUSE ANALYSIS:\n1. orchestration-planning/process.mmd\
  \ line 68 references \"plan_live_*.yml\"\n2. planner-test/process.yml line 18 has\
  \ path_template with nested \"/live/\" folder\n3. planner-build/process.yml line\
  \ 35 has path_template with nested \"/live/\" folder\n4. planner-guidance/process.yml\
  \ lines 27,37 have path_template with nested \"/live/\" folder\n5. planner-cleaning/process.yml\
  \ line 42 references nested structure\n\nIMPACT:\n- Inconsistent plan folder structures\n\
  - CLI commands may not find files (CLI expects flat root structure)\n- Auto-archival\
  \ may fail\n- Confusion for agents and users about where files live\n\nEVIDENCE:\n\
  - plans.yml (canonical definition) specifies FLAT STRUCTURE (lines 33-51)\n- plans.yml\
  \ has FENCE at line 200: \"Plan files MUST be in folder root, NOT subdirectories\"\
  \n- All completed plans from 260214 batch use correct flat structure\n- agentic\
  \ plan init creates correct flat structure (confirmed)\n\nLEGACY CONTAMINATION:\n\
  The outdated pattern exists in:\n- modules/legacy/MyAgents/... (expected, legacy\
  \ code)\n- modules/AgenticGuidance/agents/planner/... (WRONG, must be fixed)\n-\
  \ modules/AgenticGuidance/agents/orchestration/... (WRONG, must be fixed)\n"
