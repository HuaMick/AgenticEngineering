_template_status: active
plan:
  id: 260201MC
  name: MCP Module Hardening
  worktree: main
  branch: main
  status: pending
  origin:
    plan_id: 260131OR
    plan_name: MCP GUI Orchestration Dashboard Spike
    audit_finding: 'Spike completed successfully but audit identified production-readiness
      gaps:

      - MCP dependency imported unconditionally (breaks when mcp not installed)

      - Missing input validation on environment variables and paths

      - No tests for the MCP module

      '
  objective: 'Harden the MCP orchestration module for production use by:

    1. Making the MCP dependency truly optional with graceful degradation

    2. Adding input validation and error handling

    3. Creating comprehensive test coverage

    '
  scope:
    includes:
    - modules/AgenticCLI/src/agenticcli/mcp/__init__.py
    - modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py
    - modules/AgenticCLI/tests/mcp/  (to be created)
    excludes:
    - MCP dashboard UI styling (already complete)
    - New MCP features (out of scope)
  phases:
  - name: Optional Dependency Handling
    id: optional_deps
    status: pending
    estimated_effort: medium
    tasks:
    - id: MC-001
      name: Make MCP import conditional in __init__.py
      status: completed
      description: 'Wrap the MCP import in a try/except to gracefully handle missing

        mcp package. Module should be importable even without mcp installed.

        '
      acceptance_criteria:
      - agenticcli.mcp imports without error when mcp not installed
      - orchestration_mcp is None or raises ImportError when accessed without mcp
      - Clear error message explaining how to install mcp optional dependency
      file: modules/AgenticCLI/src/agenticcli/mcp/__init__.py
    - id: MC-002
      name: Make MCP import conditional in orchestration_server.py
      status: completed
      description: 'Add conditional import with clear error message at module level.

        Consider lazy import pattern if appropriate.

        '
      acceptance_criteria:
      - ImportError is caught and re-raised with helpful message
      - Message includes: pip install agenticcli[mcp] or pip install mcp
      - Module docstring updated to document optional dependency
      file: modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py
      completed_at: '2026-02-01T16:52:25.146834'
  - name: Input Validation
    id: input_validation
    status: pending
    estimated_effort: medium
    depends_on:
    - optional_deps
    tasks:
    - id: MC-003
      name: Add path validation to get_project_root and get_plans_dir
      status: completed
      description: 'Validate environment variable paths for:

        - Path existence

        - Path is a directory (not a file)

        - Path is within expected bounds (no path traversal beyond project)

        '
      acceptance_criteria:
      - Environment variables validated before use
      - Invalid paths logged with warning and fall back to auto-discovery
      - Path traversal attempts rejected
      file: modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py
    - id: MC-004
      name: Add HTML content sanitization in show_orchestration
      status: completed
      description: 'Sanitize Mermaid diagram content before embedding in HTML

        to prevent XSS if diagram content is untrusted.

        '
      acceptance_criteria:
      - Special HTML characters escaped in mmd_content before embedding
      - Plan path name sanitized in HTML output
      - No raw user/file content directly embedded in HTML
      file: modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py
  - name: Error Handling
    id: error_handling
    status: pending
    estimated_effort: low
    depends_on:
    - input_validation
    tasks:
    - id: MC-005
      name: Improve error handling in get_agentic_data
      status: completed
      description: 'Replace bare except with specific exception handling.

        Log errors appropriately instead of silently swallowing.

        '
      acceptance_criteria:
      - Specific exceptions caught (subprocess errors, JSON decode errors)
      - Errors logged with appropriate level (warning or debug)
      - Function still returns empty lists on error but caller knows why
      file: modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py
      completed_at: '2026-02-01T17:11:42.981410'
    - id: MC-006
      name: Add meaningful error responses from show_orchestration
      status: completed
      description: 'Improve error messages returned by show_orchestration for

        various failure scenarios.

        '
      acceptance_criteria:
      - Different error messages for: no plans dir, no active plan, no mmd file
      - Error responses are user-friendly and actionable
      - Errors include suggestions for resolution
      file: modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py
      completed_at: '2026-02-01T17:12:07.192733'
  - name: Test Coverage
    id: testing
    status: pending
    estimated_effort: medium
    depends_on:
    - error_handling
    tasks:
    - id: MC-007
      name: Create unit tests for path discovery functions
      status: completed
      description: 'Unit tests for get_project_root and get_plans_dir with mocked

        environment and subprocess calls.

        '
      acceptance_criteria:
      - Test environment variable path discovery
      - Test git-based path discovery
      - Test fallback behavior when neither works
      - Test invalid path handling
      file: modules/AgenticCLI/tests/mcp/test_orchestration_server.py
      completed_at: '2026-02-01T17:16:56.982942'
    - id: MC-008
      name: Create unit tests for show_orchestration
      status: completed
      description: 'Unit tests for the main tool function with mocked filesystem

        and subprocess calls.

        '
      acceptance_criteria:
      - Test successful HTML generation
      - Test no plan found scenario
      - Test no mmd file scenario
      - Test with mocked session data
      file: modules/AgenticCLI/tests/mcp/test_orchestration_server.py
      completed_at: '2026-02-01T17:25:01.361560'
    - id: MC-009
      name: Create test for optional import handling
      status: completed
      description: 'Test that the module handles missing mcp package gracefully.

        '
      acceptance_criteria:
      - Test import behavior when mcp not available
      - Test error message content
      - Use importlib or mock to simulate missing package
      file: modules/AgenticCLI/tests/mcp/test_optional_import.py
      completed_at: '2026-02-01T17:28:05.436302'
  test_strategy:
  - type: unit
    scope: Path discovery and HTML generation
    location: modules/AgenticCLI/tests/mcp/
    framework: pytest
    coverage_target: 80%
  success_criteria:
  - MCP module can be imported without mcp package installed
  - All input validation in place
  - All tests pass
  - Coverage >= 80% for mcp module
  - No regression in existing CLI tests
  notes:
  - This plan addresses technical debt from spike implementation
  - Keep changes focused on hardening, not new features
  - Consider adding mcp as optional dependency in pyproject.toml extras
