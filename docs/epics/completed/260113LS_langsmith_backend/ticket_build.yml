name: langsmith-backend-module
worktree_path: /home/code/AgenticEngineering-agenticlangsmith
branch: agenticlangsmith
status: completed
priority: high
objective: 'Create the AgenticLangSmith Python package as a reusable library for LangSmith
  API interaction.

  This module will be consumed by AgenticCLI and potentially other tools.


  The implementation will:

  - Scaffold a proper Python package with pyproject.toml (hatchling)

  - Implement LangSmithService class wrapping the official SDK

  - Provide filter utilities for query building

  - Be independently testable and installable

  '
created: ''
phases:
- name: 'Phase 1: Package Scaffolding'
  execution: sequential
  description: Create the AgenticLangSmith Python package structure
  tickets:
  - id: pkg_01
    name: Scaffold AgenticLangSmith Package
    description: Create package structure with pyproject.toml and src layout
    status: completed
    agent: null
    inputs:
    - modules/AgenticCLI/pyproject.toml
    target_files:
    - modules/AgenticLangSmith/pyproject.toml
    - modules/AgenticLangSmith/src/agenticlangsmith/__init__.py
    guidance: "1. Create `modules/AgenticLangSmith/pyproject.toml`:\n   - Name: \"\
      agenticlangsmith\"\n   - Build backend: hatchling\n   - Dependencies: \"langsmith>=0.1.0\"\
      \n   - Python requires: \">=3.10\"\n\n2. Create `modules/AgenticLangSmith/src/agenticlangsmith/__init__.py`:\n\
      \   - Export LangSmithService, build_time_filter, etc.\n   - Version: \"0.1.0\"\
      \n\n3. Ensure the project is installable via pip install -e .\n"
- name: 'Phase 2: Service Implementation'
  execution: sequential
  description: Implement the core LangSmith service wrapper
  tickets:
  - id: backend_01
    name: Create LangSmith Service Module
    description: Implement LangSmithService class wrapping the SDK
    status: completed
    agent: null
    inputs:
    - modules/AgenticLangSmith/src/agenticlangsmith/__init__.py
    guidance: 'Create: modules/AgenticLangSmith/src/agenticlangsmith/service.py


      Key components:

      - LangSmithService class wrapping langsmith.Client

      - Configuration from environment: LANGSMITH_API_KEY

      - Auto-detect LANGSMITH_ENDPOINT or use default


      Methods to implement:

      - __init__(api_key=None) - Init with key or from env

      - list_runs(project_name, limit, run_type, error_only) -> list[dict]

      - get_run(run_id) -> dict with full details

      - list_projects() -> list[dict]

      - get_project_stats(project_name) -> dict with aggregated stats

      - get_run_url(run_id) -> str shareable URL


      Error handling:

      - LangSmithConfigError: Missing API key

      - LangSmithAPIError: API call failures

      '
  - id: backend_02
    name: Add Query Filter Builders
    description: Helper functions for building LangSmith filter expressions
    status: completed
    agent: null
    inputs:
    - modules/AgenticLangSmith/src/agenticlangsmith/service.py
    guidance: 'Create: modules/AgenticLangSmith/src/agenticlangsmith/filters.py


      Filter builders using LangSmith filter syntax:

      - build_time_filter(start: datetime, end: datetime) -> str

      - build_type_filter(run_type: str) -> str

      - build_error_filter(has_error: bool) -> str

      - build_tag_filter(tag: str) -> str

      - combine_filters(*filters) -> str (and() combinator)


      Reference LangSmith filter syntax:

      - eq(field, value), neq(), gt(), gte(), lt(), lte()

      - has(field, value) for tags/metadata

      - and(), or() for logical operators

      '
- name: 'Phase 3: Testing'
  execution: sequential
  description: Unit tests for the AgenticLangSmith package
  tickets:
  - id: test_01
    name: Create Test Infrastructure
    description: Set up pytest configuration and fixtures
    status: completed
    agent: null
    target_files:
    - modules/AgenticLangSmith/tests/__init__.py
    - modules/AgenticLangSmith/tests/conftest.py
    - modules/AgenticLangSmith/pyproject.toml
    guidance: "1. Add pytest to dev dependencies in pyproject.toml\n2. Create tests/__init__.py\
      \ (empty)\n3. Create tests/conftest.py with fixtures:\n   - mock_langsmith_client:\
      \ Mocked langsmith.Client\n   - sample_run_data: Example run response\n   -\
      \ sample_project_data: Example project response\n"
  - id: test_02
    name: Unit Tests for Service
    description: Test LangSmithService class
    status: completed
    agent: null
    inputs:
    - modules/AgenticLangSmith/src/agenticlangsmith/service.py
    - modules/AgenticLangSmith/tests/conftest.py
    guidance: 'Create: modules/AgenticLangSmith/tests/test_service.py


      Test cases:

      - test_service_init_with_api_key - Explicit key works

      - test_service_init_from_env - Reads from environment

      - test_service_raises_without_key - LangSmithConfigError

      - test_list_runs_returns_list - With mocked client

      - test_list_runs_with_filters - Filters passed to SDK

      - test_get_run_returns_details - Full run details

      - test_get_run_not_found - Handles 404 gracefully

      - test_list_projects - Returns project list

      - test_get_project_stats - Aggregates stats correctly


      Use unittest.mock to mock langsmith.Client.

      '
  - id: test_03
    name: Unit Tests for Filters
    description: Test filter builder functions
    status: completed
    agent: null
    inputs:
    - modules/AgenticLangSmith/src/agenticlangsmith/filters.py
    guidance: 'Create: modules/AgenticLangSmith/tests/test_filters.py


      Test cases:

      - test_build_time_filter_format

      - test_build_type_filter

      - test_build_error_filter_true

      - test_build_error_filter_false

      - test_combine_filters_single

      - test_combine_filters_multiple

      '
  - id: test_04
    name: Run Test Suite
    description: Execute full test suite and fix any failures
    status: completed
    agent: null
    guidance: 'Run from worktree root:

      cd /home/code/AgenticEngineering-agenticlangsmith/modules/AgenticLangSmith

      pip install -e ".[dev]"

      pytest tests/ -v


      If tests fail, iterate until all pass.

      '
