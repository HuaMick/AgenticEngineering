      Guideline covers real command philosophy, when mocking is acceptable,

      and includes a CLI Command UAT Pattern code example.

      '
    target_files:
    - path: modules/AgenticGuidance/agents/test/test-user-simulator/process.yml
      change_type: modify
      change_category: guidance
  - id: teach-004
    name: Add CLI smoke test rule to planning-standard.yml
    description: 'Add a new rule to planning-standard.yml that mandates CLI smoke
