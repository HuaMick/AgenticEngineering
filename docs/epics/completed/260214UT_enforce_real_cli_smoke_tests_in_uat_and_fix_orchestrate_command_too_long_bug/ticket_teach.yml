name: Teach Phase - Enforce Real CLI Smoke Tests in UAT
status: completed
type: teach
phases:
- name: Update UAT Guidance
  status: completed
  description: 'Update planner-test, orchestration-executor, test-user-simulator,
    and

    planning-standard.yml to enforce real CLI smoke tests in UAT phases.

    '
  tasks:
  - id: teach-001
    name: Add real CLI smoke test fence to planner-test/process.yml
    description: 'Add a new fence in planner-test/process.yml that mandates UAT tasks
      for

      CLI commands MUST include a "real CLI smoke test" step.


      VERIFIED COMPLETE: The real_cli_smoke_test_requirement block exists at

      line 365 in modules/AgenticGuidance/agents/planner/planner-test/process.yml.

      The fence, rationale, requirements, and wrong_examples are all present.

      Do NOT re-apply - the content is already there.


      Target file: modules/AgenticGuidance/agents/planner/planner-test/process.yml

      '
    status: completed
    completed_at: '2026-02-21'
    completion_note: 'Applied by a prior session. Verified present at line 365 in
      process.yml.

      Content matches plan intent: FENCE block, rationale, requirements, examples.

      '
    target_files:
    - path: modules/AgenticGuidance/agents/planner/planner-test/process.yml
      change_type: modify
      change_category: guidance
  - id: teach-002
    name: Add integration smoke test gate to orchestration-executor/process.yml
    description: 'Add a mandatory integration smoke test gate in orchestration-executor/process.yml

      BEFORE the shutdown sequence. This gate ensures CLI commands are actually tested.


      VERIFIED COMPLETE: The integration_smoke_test_gate step exists at line 455 in

      modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml.

      Phase 2.7 header and full step content with detection criteria, execution steps,

      and fence text are all present. Do NOT re-apply.


      Target file: modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml

      '
    status: completed
    completed_at: '2026-02-21'
    completion_note: 'Applied by a prior session. Verified present at line 455 in
      process.yml.

      Step id integration_smoke_test_gate exists with detection criteria, smoke test

      execution steps, and FENCE text before shutdown sequence.

      '
    target_files:
    - path: modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
      change_type: modify
      change_category: guidance
  - id: teach-003
    name: Update test-user-simulator to prefer real commands over mocks
    description: 'Update test-user-simulator/process.yml to add a guideline that strongly

      prefers running real commands over mocked validation.


      VERIFIED COMPLETE: The PREFER REAL COMMAND EXECUTION guideline exists at

      line 179 in modules/AgenticGuidance/agents/test/test-user-simulator/process.yml.

      The guideline includes when-to-use-real-commands, when-mocking-is-acceptable,

      and a CLI Command UAT Pattern code example. Do NOT re-apply.


      Target file: modules/AgenticGuidance/agents/test/test-user-simulator/process.yml

