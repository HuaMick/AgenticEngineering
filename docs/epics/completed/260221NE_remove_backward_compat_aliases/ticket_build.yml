    description: "In cli.py, replace the 8 hidden top-level group add_typer calls\
      \ with deprecation commands. The current code:\n  app.add_typer(stories_app,\
      \ name=\"stories\", hidden=True)\n  app.add_typer(stories_app, name=\"st\",\
      \ hidden=True)\n  app.add_typer(manifest_app, name=\"manifest\", hidden=True)\n\
      \  app.add_typer(manifest_app, name=\"mf\", hidden=True)\n  app.add_typer(entrypoint_app,\
