name: agenticlangsmith-lean-build
worktree_path: /home/code/AgenticEngineering-agenticlangsmith
branch: ''
status: COMPLETED
priority: high
objective: 'This is the cleaned-up, non-overengineered version of the LangSmith integration.

  It avoids symlinks by installing the hook script directly to ~/.claude/hooks/

  and configures all worktrees in a single batch.

  '
created: ''
phases:
- name: Deployment Phase
  execution: sequential
  tickets:
  - id: deploy_01
    name: Environment Validation
    description: Verify jq/curl and LangSmith API Key availability
    status: pending
    agent: null
    guidance: '1. Run: which jq curl

      2. Ask user for their LangSmith API key (starts with lsv2_pt_...)

      '
  - id: deploy_02
    name: Install Hook Script
    description: Deploy the stop_hook.sh script to ~/.claude/hooks/
    status: pending
    agent: null
    guidance: 'mkdir -p ~/.claude/hooks

      curl -fsSL -o ~/.claude/hooks/stop_hook.sh https://raw.githubusercontent.com/langchain-ai/tracing-claude-code/main/stop_hook.sh

      chmod +x ~/.claude/hooks/stop_hook.sh

      '
  - id: deploy_03
    name: Configure Global Settings
    description: Add the Stop hook to ~/.claude/settings.json using new matcher format
    status: pending
    agent: null
    guidance: '# IMPORTANT: Claude Code hooks now use matcher-based format

      # Each hook event (Stop, PostToolUse, etc.) contains an array of objects

      # Each object has optional "matcher" and required "hooks" array

      # Format: {"Stop": [{"matcher": {...}, "hooks": [{"type": "command", "command":
      "..."}]}]}


      # Use jq to safely add the hook without breaking existing plugins

      cp ~/.claude/settings.json ~/.claude/settings.json.bak

      jq ''. + {"hooks": {"Stop": [{"hooks": [{"type": "command", "command": "bash
      ~/.claude/hooks/stop_hook.sh"}]}]}}'' ~/.claude/settings.json > ~/.claude/settings.json.tmp
      && mv ~/.claude/settings.json.tmp ~/.claude/settings.json

      '
  - id: deploy_04
    name: Batch Configure Worktrees
    description: Set up settings.local.json in all worktrees
    status: pending
    agent: null
    guidance: "WORKTREES=(\n  \"/home/code/AgenticEngineering\"\n  \"/home/code/AgenticEngineering-agentic-cli\"\
      \n  \"/home/code/AgenticEngineering-agenticguidance\"\n  \"/home/code/AgenticEngineering-agenticlangsmith\"\
      \n)\n\nfor WT in \"${WORKTREES[@]}\"; do\n  mkdir -p \"$WT/.claude\"\n  PROJECT_NAME=$(basename\
      \ \"$WT\")\n  echo \"{\\\"env\\\": {\\\"TRACE_TO_LANGSMITH\\\": \\\"true\\\"\
      , \\\"CC_LANGSMITH_API_KEY\\\": \\\"$API_KEY\\\", \\\"CC_LANGSMITH_PROJECT\\\
      \": \\\"$PROJECT_NAME\\\"}}\" > \"$WT/.claude/settings.local.json\"\n  echo\
      \ \"Ignored .claude/settings.local.json in $WT\"\n  grep -q \".claude/settings.local.json\"\
      \ \"$WT/.gitignore\" || echo \".claude/settings.local.json\" >> \"$WT/.gitignore\"\
      \ndone\n"
  - id: deploy_05
    name: Verification
    description: Perform a smoke test and check LangSmith dashboard
    status: pending
    agent: null
    guidance: '1. Run a simple command in Claude Code (e.g., ''hello'')

      2. Check ~/.claude/state/hook.log for activity

      3. Confirm trace appears at https://smith.langchain.ai/

      '
context: 'This is the cleaned-up, non-overengineered version of the LangSmith integration.

  It avoids symlinks by installing the hook script directly to ~/.claude/hooks/

  and configures all worktrees in a single batch.

  '
