id: US-RALPH-FIX-002
title: "Unattended Execution in Background"
description: "Verify that background Claude sessions do not hang on permission prompts."
persona: "Automated Orchestrator"
priority: "high"

starting_state:
  environment:
    current_plan: "260204RE"

journey:
  - step: 1
    action: "Run 'agentic ralph start -b'"
    expected: "Ralph starts and begins first iteration."
  
  - step: 2
    action: "Wait 30 seconds and check Ralph history"
    expected: "History shows at least one iteration was attempted or succeeded."
  
  - step: 3
    action: "Capture tmux pane to check for permission blocks"
    expected: "No 'Would you like me to proceed' prompts are visible in the terminal capture; actions proceed automatically."

success_criteria:
  - "Claude log shows automatic tool execution without user input"
  - "--dangerously-skip-permissions flag is confirmed in process tree"
