      \ WAS called\n\nUse monkeypatch/mock for PlanMovementWorkflow and is_plan_fully_completed.\
      \ Use capsys or mock print_warning to check output.\n"
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/tests/test_plan_question_gate.py
  - id: P6-T3
    name: ''
    description: "In test_plan_question_gate.py, add test:\n1. test_spawn_warns_on_pending_questions:\n\
