objective: 'The `agentic cicd` command provides CI/CD config inspection (audit, list,
  show)

  but there are no active CI/CD configs in the project. The only configs are in

  modules/legacy/MyAgents/ and one inert GitHub Actions workflow in AgenticCLI

  that''s not at the repo root.


  The `devops` group help text says "DevOps tools: worktrees, CI/CD integration"

  which references cicd, but cicd isn''t nested under it and isn''t needed.


  Decision: remove cicd entirely. It''s dead weight with no active CI/CD to inspect.

  Update devops group help text to remove the CI/CD reference.

  '
