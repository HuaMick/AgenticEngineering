name: cli-plan-creation-commands
status: active
priority: high
created: '2026-01-28'
problem: 'Current plan creation workflow requires manual YAML and MMD file writing.

  The CLI has gaps that force agents to use Write/Edit tools instead of CLI.


  Missing capabilities:

  - Cannot pass objective/description to template generation

  - Cannot create phases via CLI

  - Cannot generate orchestration MMD from plan YAML

  - No integrated plan creation flow

  - No user stories for blind testing

  '
objective: 'Add CLI commands that enable fully CLI-driven plan creation:

  1. Enhanced template generation with parameters

  2. Phase management commands

  3. Orchestration MMD generation from YAML

  4. User story definitions for all plan commands

  '
success_criteria:
- Agent can create complete plan using only CLI commands
- Zero manual YAML/MMD writing required
- All commands have user stories for blind testing
- 3+ test iterations validate functionality
user_stories:
- id: US-TPL-001
  as: orchestration agent
  i_want: to generate a plan template with my objective pre-filled
  so_that: I don't have to manually edit the YAML
  acceptance: 'agentic template generate build --objective "My objective" produces
    YAML with objective filled in

    '
  command: agentic template generate build --objective "..." --output plan_build.yml
- id: US-TPL-002
  as: orchestration agent
  i_want: to specify phases when generating a template
  so_that: the plan structure is created automatically
  acceptance: 'agentic template generate build --phases "P1:Name,P2:Name" creates
    phases in YAML

    '
  command: agentic template generate build --phases "P1:Fix bug,P2:Add tests"
- id: US-PHS-001
  as: planner agent
  i_want: to add a phase to an existing plan via CLI
  so_that: I don't need to edit YAML manually
  acceptance: 'agentic plan phase add --id P1 --name "Phase name" adds phase to plan_build.yml

    '
  command: agentic plan phase add --id P1 --name "Implementation" --plan <folder>
- id: US-PHS-002
  as: planner agent
  i_want: to list phases in a plan
  so_that: I can see what phases exist before adding tasks
  acceptance: 'agentic plan phase list shows all phases with IDs and names

    '
  command: agentic plan phase list --plan <folder>
- id: US-PHS-003
  as: planner agent
  i_want: to update a phase status via CLI
  so_that: I can mark phases as in_progress or completed
  acceptance: 'agentic plan phase update P1 --status completed updates the phase

    '
  command: agentic plan phase update P1 --status in_progress --plan <folder>
- id: US-ORC-001
  as: orchestration agent
  i_want: to generate an orchestration MMD from plan YAML
  so_that: I don't have to write MMD manually
  acceptance: 'agentic plan orchestration generate creates orchestration_*.mmd from
    plan_*.yml

    '
  command: agentic plan orchestration generate --plan <folder>
- id: US-ORC-002
  as: orchestration agent
  i_want: the generated MMD to include phase routing metadata
  so_that: executors know which agent handles each phase
  acceptance: 'Generated MMD contains PHASES, AGENT_ROUTING, FEEDBACK_TRIGGERS comments

    '
  command: agentic plan orchestration generate --plan <folder>
- id: US-ORC-003
  as: orchestration agent
  i_want: to validate MMD matches plan YAML
  so_that: I can detect drift between MMD and YAML
  acceptance: 'agentic plan orchestration validate checks MMD phases match YAML phases

    '
  command: agentic plan orchestration validate --plan <folder>
- id: US-TSK-001
  as: planner agent
  i_want: to add multiple tasks at once from a file
  so_that: I can batch-create tasks efficiently
  acceptance: 'agentic plan task import tasks.yml adds all tasks from file

    '
  command: agentic plan task import tasks.yml --plan <folder>
- id: US-TSK-002
  as: planner agent
  i_want: task add to auto-create phase if it doesn't exist
  so_that: I don't need separate phase add command
  acceptance: 'agentic plan task add --phase P1 creates P1 if missing

    '
  command: agentic plan task add "description" --phase P1 --create-phase
- id: US-STR-001
  as: test agent
  i_want: to list user stories for a plan
  so_that: I can generate blind test scenarios
  acceptance: 'agentic plan stories list shows all user stories

    '
  command: agentic plan stories list --plan <folder>
- id: US-STR-002
  as: test agent
  i_want: to generate blind test scenarios from user stories
  so_that: I can validate commands without prior knowledge
  acceptance: 'agentic plan stories test generates executable test cases

    '
  command: agentic plan stories test --plan <folder> --output tests.yml
phases:
- phase_id: P1
  name: Enhanced template generation
  status: pending
  tasks:
  - id: CR-001
    name: Add --objective flag to template generate
    description: 'Modify template generate command to accept --objective parameter.

      Inject objective into generated YAML template.


      Location: modules/AgenticCLI/src/agenticcli/commands/template.py

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/template.py
    acceptance_criteria:
    - --objective flag accepted
    - Objective appears in generated YAML
  - id: CR-002
    name: Add --phases flag to template generate
    description: 'Accept --phases as comma-separated list of ID:Name pairs.

      Parse and create phase structures in generated YAML.


      Example: --phases "P1:Build,P2:Test,P3:Deploy"

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/template.py
    acceptance_criteria:
    - --phases flag accepted
    - Phases created in generated YAML
  - id: CR-003
    name: Add --success-criteria flag
    description: 'Accept --success-criteria as multiline or comma-separated list.

      Add to generated YAML success_criteria field.

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/template.py
    acceptance_criteria:
    - Success criteria added to generated YAML
