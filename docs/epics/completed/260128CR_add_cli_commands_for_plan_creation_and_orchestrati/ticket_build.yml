name: cli-plan-creation-commands
worktree_path: ''
branch: ''
status: active
priority: high
objective: 'Add CLI commands that enable fully CLI-driven plan creation:

  1. Enhanced template generation with parameters

  2. Phase management commands

  3. Orchestration MMD generation from YAML

  4. User story definitions for all plan commands

  '
created: '2026-01-28'
phases:
- name: Enhanced template generation
  tickets:
  - id: CR-001
    name: Add --objective flag to template generate
    description: 'Modify template generate command to accept --objective parameter.

      Inject objective into generated YAML template.


      Location: modules/AgenticCLI/src/agenticcli/commands/template.py

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/template.py
  - id: CR-002
    name: Add --phases flag to template generate
    description: 'Accept --phases as comma-separated list of ID:Name pairs.

      Parse and create phase structures in generated YAML.


      Example: --phases "P1:Build,P2:Test,P3:Deploy"

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/template.py
  - id: CR-003
    name: Add --success-criteria flag
    description: 'Accept --success-criteria as multiline or comma-separated list.

      Add to generated YAML success_criteria field.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/template.py
- name: Phase management commands
  tickets:
  - id: CR-004
    name: Add plan phase add command
    description: 'New subcommand: agentic plan phase add

      Parameters: --id, --name, --description, --plan

      Adds phase to plan_build.yml or creates if missing.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/main.py
  - id: CR-005
    name: Add plan phase list command
    description: 'New subcommand: agentic plan phase list

      Shows table of phases with ID, name, status, task count.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
  - id: CR-006
    name: Add plan phase update command
    description: 'New subcommand: agentic plan phase update

      Parameters: phase_id, --status, --name

      Updates phase in YAML file.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
- name: Orchestration MMD generation
  tickets:
  - id: CR-007
    name: Add plan orchestration generate command
    description: 'New subcommand: agentic plan orchestration generate

      Reads plan_*.yml files and generates orchestration_*.mmd


      MMD should include:

      - Phase nodes from YAML

      - Agent routing based on phase type (build->builder, test->tester)

      - Test-fix loop structure

      - Feedback triggers

      - CLI commands in comments

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
  - id: CR-008
    name: Create MMD generation templates
    description: 'Create template snippets for MMD generation:

      - Header template with metadata

      - Phase node template

      - Test-fix loop template

      - Styling template


      Store in modules/AgenticCLI/src/agenticcli/templates/mmd/

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/templates/mmd/header.mmd
    - modules/AgenticCLI/src/agenticcli/templates/mmd/phase.mmd
    - modules/AgenticCLI/src/agenticcli/templates/mmd/testfix.mmd
  - id: CR-009
    name: Add plan orchestration validate command
    description: 'New subcommand: agentic plan orchestration validate

      Compares MMD against plan YAML:

      - All YAML phases present in MMD

      - Task IDs referenced correctly

      - Agent routing valid

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
- name: User story and test generation
  tickets:
  - id: CR-010
    name: Add plan stories list command
    description: 'New subcommand: agentic plan stories list

      Reads user_stories from plan YAML and displays them.

      Shows ID, as, i_want, command columns.

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
  - id: CR-011
    name: Add plan stories test command
    description: 'New subcommand: agentic plan stories test

      Generates blind test scenarios from user stories.


      For each story:

      - Extract command

      - Generate test case with expected outcome

      - Output as executable test YAML

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
  - id: CR-012
    name: Add user stories to existing plan commands
    description: 'Document user stories for existing commands:

      - plan init

      - plan task add/list/current/start/complete

      - plan status

      - plan validate

      - plan archive/move


      Add to modules/AgenticCLI/docs/user_stories.yml

      '
    status: completed
    agent: null
    target_files:
    - modules/AgenticCLI/docs/user_stories.yml
