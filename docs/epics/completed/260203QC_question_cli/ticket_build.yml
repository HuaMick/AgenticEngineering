    guidance: 'Add a new section to README.md documenting the question commands.


      SECTION LOCATION:

      Add after the "plan" command section, before "worktree" section.


      SECTION CONTENT:


      ### question - Human-in-the-Loop Question Management


      Manage the question/answer queue for human-in-the-loop workflows.

      Agents can pause and ask clarifying questions when they hit blockers.


      ```bash

      # List pending questions

      agentic question list

      agentic question list --status all

      agentic question list --plan /path/to/plan


      # Show question details

      agentic question show Q-001

      agentic question show Q-001 --plan /path/to/plan


      # Answer a question

      agentic question answer Q-001 --text "Yes, proceed with approach A"

      agentic question answer Q-001  # Interactive multi-line prompt


      # Create a question (manual/testing)

      agentic question ask "Should we refactor the auth module?" --severity high


      # Defer a question

      agentic question defer Q-001


      # JSON output mode

      agentic question list -j

      agentic question show Q-001 -j

      ```


      #### Plan-Scoped Questions


      Questions are stored in plan-scoped folders:

      - `docs/plans/live/{plan_id}/questions/pending/` - Unanswered questions

      - `docs/plans/live/{plan_id}/questions/answered/` - Answered questions

      - `docs/plans/live/{plan_id}/questions/deferred/` - Deferred questions


      The CLI auto-detects the plan folder from your current working directory.

      Use `--plan PATH` to specify a different plan folder.


      #### Integration with Agents


      Agents use the QuestionQueue service directly (from agenticguidance.services.question).

      The CLI commands provide the human interface for reviewing and answering questions.


      See also: 260203QF (Question Foundation), 260203QG (Question Guidance)

      '
