    guidance: "Implement _get_plan_path() to detect or validate plan folder paths.\n\
      \nFUNCTIONALITY:\n1. If args.plan provided: Validate and return that path\n\
      2. If args.plan NOT provided: Auto-detect from current working directory\n \
      \  - Check if cwd is inside a plan folder (docs/plans/live/YYMMDDXX_*)\n   -\
      \ Walk up directory tree to find plan root\n   - Return detected plan path\n\
      3. If no plan detected: Raise error with helpful message\n\nDETECTION LOGIC:\n\
      ```python\ndef _get_plan_path(args, ctx=None):\n    \"\"\"Detect or validate\
      \ plan folder path.\n\n    Args:\n        args: Command arguments (may have\
      \ args.plan)\n        ctx: Optional CLI context\n\n    Returns:\n        Path\
      \ object for plan folder\n\n    Raises:\n        SystemExit: If plan path invalid\
      \ or not detected\n    \"\"\"\n    from pathlib import Path\n    from agenticcli.console\
      \ import print_error\n\n    # Explicit --plan flag takes precedence\n    if\
      \ hasattr(args, 'plan') and args.plan:\n        path = Path(args.plan).resolve()\n\
      \        if not path.exists():\n            print_error(f\"Plan path does not\
      \ exist: {path}\")\n            sys.exit(1)\n        return path\n\n    # Auto-detection:\
      \ Check if cwd is in a plan folder\n    cwd = Path.cwd()\n    # Look for docs/plans/live/YYMMDDXX_*\
      \ pattern\n    # Walk up until we find it or hit repo root\n\n    # If not found:\n\
      \    print_error(\"Could not detect plan folder. Use --plan PATH to specify.\"\
      )\n    sys.exit(1)\n```\n\nREFERENCE:\nLook at how plan.py detects plan folders\
      \ (search for \"detect\" or \"find_plan\").\nReuse existing logic if available.\n"
