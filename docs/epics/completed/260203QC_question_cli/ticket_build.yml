context: 'This plan implements CLI commands for managing the question/answer queue.

  This is the PRIMARY INTERFACE layer of the CLI-First HITL strategy.


  ARCHITECTURE DECISION (CLI-First Strategy):

  - CLI is the primary text-mode interface for HITL

  - Voice (PersonaPlex) is an optional alternative consumer

  - Both interfaces use the same QuestionQueue service from 260203QF


  CLI Commands:

  - agentic question list [--plan PATH] [--status pending|answered|all]

  - agentic question show <question-id> [--plan PATH]

  - agentic question answer <question-id> [--text "answer"] [--plan PATH]

