    action: "Flatten 260205LB_cli_loading_bar"
    blocking: false

  - phase: 4
    step: 1
    action: "Run all validation checks"
    blocking: true
    must_pass: true

# ========================================
# ROLLBACK PLAN
# ========================================
rollback:
  description: "In case cleanup causes issues"
  commands:
    - "git reset --hard HEAD  # If not committed yet"
    - "git revert <commit-hash>  # If already committed"
  notes: |
    All operations use git mv which preserves history.
    Rollback is straightforward since no content changes, only file locations.
