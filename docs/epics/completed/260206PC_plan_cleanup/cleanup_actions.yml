      260203VP_voice_personaplex references 260203AV as historical context.
      No action needed - reference is not a hard dependency on file location.
    status: "pending"

# ========================================
# PHASE 3: FLATTEN OPERATIONS
# ========================================
flatten_operations:
  - operation: "flatten_structure"
    plan_id: "260203TS_task_service"
    base_path: "docs/plans/live/260203TS_task_service"
    files_to_move:
      - source: "live/plan_build.yml"
        destination: "plan_build.yml"
      - source: "live/orchestration_task_service_implementation.mmd"
        destination: "orchestration_task_service_implementation.mmd"
        conflict_resolution: "check_diff_first"
        note: "Root has orchestration_task_service.mmd - check if nested version differs"
    commands:
      - "cd docs/plans/live/260203TS_task_service"
      - "# Check if nested orchestration file differs from root"
      - "diff orchestration_task_service.mmd live/orchestration_task_service_implementation.mmd || true"
      - "# Move plan files from nested live/ to root"
      - "git mv live/plan_build.yml ."
      - "# Only move nested orchestration if it's newer/different"
      - "# Manual decision needed based on diff above"
      - "git rm -r live/"
    validation:
      - "ls docs/plans/live/260203TS_task_service/plan_build.yml"
      - "! ls docs/plans/live/260203TS_task_service/live 2>/dev/null"
    status: "pending"

  - operation: "flatten_structure"
    plan_id: "260205IM_cli_hardening"
    base_path: "docs/plans/live/260205IM_cli_hardening"
    files_to_move:
      - source: "live/plan_build.yml"
        destination: "plan_build.yml"
      - source: "live/plan_test.yml"
        destination: "plan_test.yml"
    commands:
      - "cd docs/plans/live/260205IM_cli_hardening"
      - "git mv live/plan_build.yml ."
      - "git mv live/plan_test.yml ."
      - "git rm -r live/"
    validation:
      - "ls docs/plans/live/260205IM_cli_hardening/plan_build.yml"
      - "ls docs/plans/live/260205IM_cli_hardening/plan_test.yml"
      - "ls docs/plans/live/260205IM_cli_hardening/analysis/"  # Should still exist
      - "! ls docs/plans/live/260205IM_cli_hardening/live 2>/dev/null"
    notes: "Keep analysis/ subfolder - legitimate supporting docs"
    status: "pending"

  - operation: "flatten_structure"
    plan_id: "260205LB_cli_loading_bar"
    base_path: "docs/plans/live/260205LB_cli_loading_bar"
    files_to_move:
      - source: "live/plan_build.yml"
        destination: "plan_build.yml"
      - source: "live/plan_test.yml"
        destination: "plan_test.yml"
    commands:
      - "cd docs/plans/live/260205LB_cli_loading_bar"
      - "git mv live/plan_build.yml ."
      - "git mv live/plan_test.yml ."
      - "git rm -r live/"
    validation:
      - "ls docs/plans/live/260205LB_cli_loading_bar/plan_build.yml"
      - "ls docs/plans/live/260205LB_cli_loading_bar/plan_test.yml"
      - "! ls docs/plans/live/260205LB_cli_loading_bar/live 2>/dev/null"
