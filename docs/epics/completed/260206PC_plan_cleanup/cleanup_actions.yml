validation_checks:
  - check: "no_nested_live_folders"
    command: "find docs/plans/live -type d -name 'live' | grep -v '^docs/plans/live$'"
    expected_output: ""
    expected_exit_code: 1
    description: "No nested live/ folders should exist"

  - check: "archived_plans_exist"
    commands:
      - "ls docs/plans/completed/260205BO_bootstrap_test"
      - "ls docs/plans/deferred/260203AV_agenticvoice_async"
    description: "Archived plans in correct locations"

  - check: "flattened_plans_valid"
    commands:
      - "ls docs/plans/live/260203TS_task_service/plan_build.yml"
      - "ls docs/plans/live/260205IM_cli_hardening/plan_build.yml"
      - "ls docs/plans/live/260205LB_cli_loading_bar/plan_build.yml"
    description: "Flattened plans have files at root"

  - check: "no_broken_references"
    commands:
      - "grep -r '260205BO_bootstrap_test' docs/plans/live/ || echo 'No references found (expected)'"
      - "grep -r '260203AV' docs/plans/live/ | grep -v '260203AV_agenticvoice_async/\\|260203VP\\|QUESTION_PLANS_OVERVIEW' || echo 'Only historical refs (expected)'"
    description: "No broken cross-plan references"

