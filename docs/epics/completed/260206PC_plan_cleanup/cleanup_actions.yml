# ========================================
# PHASE 2: ARCHIVE OPERATIONS
# ========================================
archive_operations:
  - operation: "archive_to_completed"
    plan_id: "260205BO_bootstrap_test"
    source: "docs/plans/live/260205BO_bootstrap_test"
    destination: "docs/plans/completed/260205BO_bootstrap_test"
    commands:
      - "git mv docs/plans/live/260205BO_bootstrap_test docs/plans/completed/"
    validation:
      - "ls docs/plans/completed/260205BO_bootstrap_test/plan_completed.yml"
      - "! ls docs/plans/live/260205BO_bootstrap_test 2>/dev/null"
