- name: Integrate reply polling into question watcher
  description: 'Add ntfy reply polling to the question watcher service so that replies

    from the ntfy app are detected and automatically processed as answers.

    '
  tickets:
  - id: P3-T1
    name: Add NtfyReplyPoller class to question_watcher.py
    description: "Add a new class NtfyReplyPoller that runs alongside the filesystem\n\
      watcher. It periodically polls ntfy for new messages and processes\nreplies\
      \ as answers.\n\nClass design:\n  class NtfyReplyPoller:\n      def __init__(self,\
      \ plan_path, topic, server, poll_interval=30):\n          self._plan_path =\
      \ plan_path\n          self._topic = topic\n          self._server = server\n\
      \          self._poll_interval = poll_interval  # seconds\n          self._last_poll_time\
      \ = str(int(time.time()))\n          self._running = False\n          self._thread\
      \ = None\n          self._processed_msg_ids = set()  # dedup\n\n      def start(self):\n\
      \          \"\"\"Start polling in a daemon thread.\"\"\"\n          self._running\
      \ = True\n          self._thread = threading.Thread(target=self._poll_loop,\
      \ daemon=True)\n          self._thread.start()\n\n      def stop(self):\n  \
      \        \"\"\"Signal the poll loop to stop.\"\"\"\n          self._running\
      \ = False\n\n      def _poll_loop(self):\n          \"\"\"Main loop: sleep,\
      \ poll, process replies.\"\"\"\n          while self._running:\n           \
      \   time.sleep(self._poll_interval)\n              if not self._running:\n \
      \                 break\n              try:\n                  self._check_for_replies()\n\
      \              except Exception as e:\n                  logger.warning(\"ntfy\
      \ poll error: %s\", e)\n\n      def _check_for_replies(self):\n          \"\"\
      \"Poll ntfy and process any matching replies.\"\"\"\n          from agenticcli.utils.ntfy\
      \ import (\n              parse_question_id_from_message,\n              poll_ntfy,\n\
      \              send_ntfy,\n          )\n          messages = poll_ntfy(self._topic,\
      \ since=self._last_poll_time, server=self._server)\n          if not messages:\n\
      \              return\n\n          # Update last poll time to newest message\
      \ time\n          self._last_poll_time = str(max(m.get(\"time\", 0) for m in\
      \ messages))\n\n          for msg in messages:\n              msg_id = msg.get(\"\
      id\", \"\")\n              if msg_id in self._processed_msg_ids:\n         \
      \         continue\n              self._processed_msg_ids.add(msg_id)\n\n  \
      \            # Skip messages that contain QID footers (outgoing notifications)\n\
      \              text = msg.get(\"message\", \"\")\n              if text.startswith(\"\
      New Question\") or not text.strip():\n                  continue\n\n       \
      \       # Try to find a QID in the message (user may quote original)\n     \
      \         qid = parse_question_id_from_message(text)\n              if not qid:\n\
      \                  continue\n\n              # Extract answer text (everything\
      \ before the QID tag)\n              answer_text = text.split(\"[QID:\")[0].strip()\n\
      \              if not answer_text:\n                  # Message was just the\
      \ QID, skip\n                  continue\n\n              self._answer_question(qid,\
      \ answer_text)\n\n      def _answer_question(self, question_id, answer_text):\n\
      \          \"\"\"Answer a question via QuestionQueue service.\"\"\"\n      \
      \    try:\n              from agenticguidance.services.question import QuestionQueue\n\
      \              service = QuestionQueue(self._plan_path)\n              question,\
      \ answer = service.answer_question(\n                  question_id, answer_text,\n\
      \                  answered_by=\"ntfy-reply\",\n              )\n          \
      \    logger.info(\"Auto-answered %s via ntfy reply\", question_id)\n\n     \
      \         # Send confirmation notification\n              from agenticcli.utils.ntfy\
      \ import send_ntfy\n              send_ntfy(\n                  topic=self._topic,\n\
      \                  title=\"Answer Received\",\n                  message=f\"\
      Question {question_id} answered: {answer_text[:100]}\",\n                  priority=\"\
      low\",\n                  server=self._server,\n                  tags=[\"white_check_mark\"\
      ],\n              )\n          except FileNotFoundError:\n              logger.debug(\"\
      Question %s not found in pending (already answered?)\", question_id)\n     \
      \     except Exception as e:\n              logger.warning(\"Failed to auto-answer\
      \ %s: %s\", question_id, e)\n\nKey design points:\n- Daemon thread (won't block\
      \ process exit)\n- Dedup via _processed_msg_ids set\n- Skips outgoing notifications\
      \ (starts with \"New Question\")\n- answer_text extracted from text before [QID:]\
      \ tag\n- Confirmation notification sent after successful answer\n- Errors logged\
      \ but never raised (resilient polling)\n"
    status: completed
    agent: null
    success_criteria:
    - Polls ntfy at configurable interval
    - Matches incoming messages to pending questions by QID
    - Auto-answers questions via QuestionQueue.answer_question()
    - Sends confirmation notification after answering
    - Handles missing questions (already answered) gracefully
    - Thread-safe, runs as daemon thread
  - id: P3-T2
    name: Wire NtfyReplyPoller into cmd_watch callback
    description: "Update the cmd_watch() function to optionally start an NtfyReplyPoller\n\
      alongside the filesystem watcher when ntfy is configured.\n\nChanges to cmd_watch():\n\
      1. After starting the filesystem observer, check if ntfy is configured\n   (same\
      \ logic as _send_ntfy_if_configured: read preferences.yml)\n2. If ntfy topic\
      \ is configured, create and start NtfyReplyPoller\n3. Stop the poller when the\
      \ watcher stops (in signal handler and\n   KeyboardInterrupt handler)\n\nAdd\
      \ helper function:\n  def _get_ntfy_config() -> dict | None:\n      \"\"\"Read\
      \ ntfy config from preferences. Returns dict with topic, server or None.\"\"\
      \"\n      # Extract config reading logic from _send_ntfy_if_configured\n   \
      \   # Returns {\"topic\": str, \"server\": str} or None\n\nUpdate cmd_watch():\n\
      \  ntfy_config = _get_ntfy_config()\n  poller = None\n  if ntfy_config:\n  \
      \    from agenticcli.services.question_watcher import NtfyReplyPoller\n    \
      \  poller = NtfyReplyPoller(\n          plan_path=plan_path,\n          topic=ntfy_config[\"\
      topic\"],\n          server=ntfy_config.get(\"server\", \"https://ntfy.sh\"\
      ),\n      )\n      poller.start()\n      console.print(\"[green]ntfy reply polling\
      \ active[/green]\")\n\n  # ... existing watcher loop ...\n\n  # In signal_handler\
      \ and KeyboardInterrupt:\n  if poller:\n      poller.stop()\n"
    status: completed
    agent: null
    success_criteria:
    - NtfyReplyPoller starts when ntfy is configured
    - Poller stops cleanly on Ctrl+C / SIGTERM
    - No crash when ntfy is not configured
    - Status message shown when polling is active
  - id: P3-T3
    name: Extract _get_ntfy_config() helper
    description: "Extract the ntfy config reading logic from _send_ntfy_if_configured()\n\
      into a reusable _get_ntfy_config() function. This avoids duplicating\nthe preferences\
      \ reading code in cmd_watch().\n\nNew function:\n  def _get_ntfy_config() ->\
      \ dict | None:\n      \"\"\"Read ntfy configuration from user preferences.\n\
      \n      Returns dict with 'topic' and 'server' keys, or None if ntfy\n     \
      \ is not configured or disabled.\n      \"\"\"\n      try:\n          from agenticcli.commands.config\
      \ import get_config_dir\n          config_dir = get_config_dir()\n         \
      \ prefs_file = config_dir / \"preferences.yml\"\n          if not prefs_file.exists():\n\
      \              return None\n\n          import yaml\n          prefs = yaml.safe_load(prefs_file.read_text())\
      \ or {}\n          ntfy_config = prefs.get(\"ntfy\", {})\n\n          topic\
      \ = ntfy_config.get(\"topic\", \"\")\n          if not topic:\n            \
      \  return None\n\n          if not ntfy_config.get(\"enabled\", True):\n   \
      \           return None\n\n          return {\n              \"topic\": topic,\n\
      \              \"server\": ntfy_config.get(\"server\", \"https://ntfy.sh\"),\n\
      \          }\n      except Exception:\n          return None\n\nThen refactor\
      \ _send_ntfy_if_configured() to use _get_ntfy_config()\ninternally (reducing\
      \ duplication).\n"
    status: completed
    agent: null
    success_criteria:
    - _get_ntfy_config() returns dict or None
    - _send_ntfy_if_configured() refactored to use it
    - Existing ntfy notification behavior unchanged
