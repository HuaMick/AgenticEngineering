name: 260208NB_ntfy_bidirectional_questions
worktree_path: ''
branch: ''
status: approved
priority: medium
objective: 'Enable bidirectional ntfy communication so users can reply to question

  notifications directly in the ntfy app and have those replies automatically

  processed as answers. Eliminates the need for SSH access to answer questions.


  Current flow: Agent asks question -> ntfy push -> User sees on phone -> SSH in ->
  CLI answer

  New flow: Agent asks question -> ntfy push (with question_id) -> User replies in
  ntfy app -> Watcher polls ntfy -> Auto-answers question

  '
created: '2026-02-08'
phases:
- name: Add poll_ntfy() function
  description: 'Add a poll_ntfy() function to utils/ntfy.py that fetches recent messages

    from an ntfy topic using the JSON polling API. This is the low-level

    building block for receiving replies.

    '
  tickets:
  - id: P1-T1
    name: Implement poll_ntfy() in ntfy.py
    description: "Add poll_ntfy(topic, since, server) function that:\n1. Constructs\
      \ URL: {server}/{topic}/json?since={since}&poll=1\n2. Sends GET request via\
      \ urllib.request (matching send_ntfy pattern)\n3. Parses response as newline-delimited\
      \ JSON (each line is a message)\n4. Returns list of dicts with keys: id, time,\
      \ message, title, tags\n5. Handles errors (HTTPError, URLError, OSError, JSONDecodeError)\
      \ gracefully\n6. Returns empty list on any error (non-throwing, like send_ntfy\
      \ returns False)\n\nFunction signature:\n  def poll_ntfy(\n      topic: str,\n\
      \      since: str = \"30m\",\n      server: str = \"https://ntfy.sh\",\n  )\
      \ -> list[dict]:\n\nThe `since` parameter accepts:\n- Relative: \"30m\", \"\
      1h\", \"2d\" (ntfy shorthand)\n- Unix timestamp: \"1707400000\"\n- Message ID:\
      \ \"p1234\" (resume from specific message)\n\nEach returned dict has at minimum:\n\
      \  {\"id\": str, \"time\": int, \"message\": str}\nAdditional fields (title,\
      \ tags, event) may be present.\n"
    status: completed
    agent: null
    success_criteria:
    - poll_ntfy returns list of dicts from ntfy JSON endpoint
    - Empty list returned on network error (no exception raised)
    - HTTP errors logged at warning level
    - Uses urllib.request only (no external dependencies)
    - 5-second timeout on request (matching send_ntfy)
  - id: P1-T2
    name: Add parse_question_id_from_message() helper
    description: "Add helper function to extract question ID from an ntfy message\
      \ body.\nUsed to match incoming replies to outgoing question notifications.\n\
      \nFunction signature:\n  def parse_question_id_from_message(message: str) ->\
      \ str | None:\n\nLogic:\n1. Search message text for pattern: [QID: Q-XXXXXXXX-XXXXXX-XXXX]\n\
      \   using regex: r'\\[QID:\\s*(Q-\\d{8}-\\d{6}-[0-9a-f]{4})\\]'\n2. Return the\
      \ captured question ID, or None if no match\n3. If multiple QIDs found, return\
      \ the first (most recent in quoted reply)\n"
    status: completed
    agent: null
    success_criteria:
    - Extracts QID from "[QID: Q-20260208-120000-abc1]" format
    - Returns None when no QID present
    - Handles multiline messages (user may reply with quoted text)
