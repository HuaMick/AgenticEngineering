plan:
  name: Build Phase - Migrate AgenticCLI to Typer
  worktree: /home/code/AgenticEngineering-agentic-cli
  branch: agentic-cli
  status: planning
  success_criteria:
  - agentic plan list -j works regardless of position
  - agentic context bootstrap -j works regardless of position
  - cli.py length reduced significantly (target 50%)
  - All existing subcommands (100+) functional and tested
  - No regression in JSON schema output
  created: '2026-02-01'
  objective: 'Migrate the entire Agentic CLI from argparse to Typer. This will simplify
    the 2,500+ line cli.py,

    resolve the global flag ordering issue, and provide a more maintainable foundation
    for future features.

    '
  scope:
    includes:
    - modules/AgenticCLI/src/agenticcli/cli_typer.py
    - modules/AgenticCLI/src/agenticcli/entry.py
    - modules/AgenticCLI/pyproject.toml
    excludes: []
  phases:
  - id: P1
    name: Architecture
    status: pending
    tasks:
    - id: '01'
      name: Define Typer App Structure
      description: Design the nested app structure to mirror the current set of 100+
        commands.
      status: completed
    - id: '02'
      name: Add Typer Dependency
      description: Update pyproject.toml to include typer[all].
      status: completed
  - id: P2
    name: Foundation
    status: pending
    tasks:
    - id: '01'
      name: Implement Main Typer Entry
      description: Create the top-level app and global callbacks for --json and --debug.
      status: completed
    - id: '02'
      name: Implement Shared Rich Console
      description: Ensure Typer uses the existing AgenticCLI console/logging system.
      status: completed
  - id: P3
    name: Subcommand Migration
    status: pending
    tasks:
    - id: '01'
      name: Migrate 'plan' Command Group
      description: Port all plan subcommands to Typer as a pilot.
      status: completed
    - id: '02'
      name: Migrate 'context' Command Group
      description: Port all context subcommands (CCI).
      status: completed
    - id: '03'
      name: Mass Migration of Remaining Groups
      description: Port setup, health, worktree, session, loop, etc.
      status: completed
  - id: P4
    name: Verification
    status: pending
    tasks:
    - id: '01'
      name: Switch Entry Point
      description: Update entry.py to delegate to the new Typer app.
      status: completed
    - id: '02'
      name: Run Parity Tests
      description: Verify every command against the legacy argparse version.
      status: completed
