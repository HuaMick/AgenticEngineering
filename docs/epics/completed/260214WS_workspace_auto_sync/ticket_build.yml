      This could be:

      - A documented pattern in the orchestration planner prompt

      - An update to docs/prompts/orchestration_planner.md

      - A section in CLAUDE.md or project memory


      The goal is that Claude sessions naturally use the CLI before spawning planners,

      not that they''re forced to — make the right path the easy path.

