name: Workspace Drift — Root Cause Resolution
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
objective: 'Resolve the root causes of workspace file drift by addressing the fundamental
  problem:

  plan folders are created through multiple uncontrolled paths (agent Write tool,
  cmd_scaffold,

  cmd_create) that bypass the CLI''s plan init pipeline. The workspace file is a symptom
  —

  the real issue is that Claude sessions and spawned agents jump directly to creating
  plan

  artifacts without going through `agentic plan init`, which is the only path that
  properly

  creates worktrees AND updates the workspace file.


  SUCCESS LOOKS LIKE: Every plan folder in docs/plans/live/ was created by `agentic
  plan init`,

  has a corresponding worktree (or explicitly opted out), and the workspace file stays
  in sync

  automatically without manual intervention.

  '
created: ''
phases:
- name: Funnel plan creation through CLI
  description: 'Address the root cause: ensure all plan folder creation goes through

    `agentic plan init`. This is the highest-value change because it prevents

    drift at the source rather than fixing it after the fact.

    '
  tickets:
  - id: task-1.1
    name: Add FENCE to planner-build preventing direct folder creation
    description: "Add a fence to planner-build/process.yml that detects when the plan\
      \ folder\ndoesn't exist and STOPS the agent with a clear instruction to request\n\
      `agentic plan init` be run first.\n\nCURRENT GUIDANCE (line 110):\n  \"A planning\
      \ folder should have been provided (docs/plans/live/YYMMDDXX_description/).\n\
      \   Create appropriate folder structure based on plan complexity\"\n\nPROBLEM:\
      \ \"should have been\" is advisory — agent proceeds to create it anyway.\n\n\
      FIX: Change to a hard FENCE:\n  \"FENCE: The plan folder MUST already exist\
      \ at docs/plans/live/YYMMDDXX_description/.\n   If it does not exist, STOP and\
      \ report:\n   'Plan folder not found. Run `agentic plan init <branch> --description\
      \ <desc>` first.'\n   Do NOT create the plan folder directly. The CLI creates\
      \ the worktree, workspace\n   entry, and folder structure atomically.\"\n"
    status: completed
    agent: null
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticGuidance/agents/planner/planner-build/process.yml
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticGuidance/agents/planner/planner-build/process.yml
    guidance: '1. Read process.yml lines 108-117 (the folder creation guidance)

      2. Replace the advisory "should have been provided" with a FENCE block

      3. Add validation step: check folder exists before proceeding

      4. Add error message template with `agentic plan init` command

      5. Apply same fence to planner-test, planner-cleaning, planner-audit process.yml
      files

      '
    success_criteria:
    - planner-build process.yml has FENCE for missing plan folder
    - Fence provides clear `agentic plan init` command to run
    - Agent cannot proceed without existing plan folder
    - Same fence applied to all planner-* agents
