context: "ROOT CAUSE ANALYSIS (from diagnostics 2026-02-14):\n\n1. MULTIPLE UNCONTROLLED\
  \ CREATION PATHS:\n   - cmd_init: Creates worktree + plan folder + workspace update\
  \ (CORRECT but has bug)\n   - cmd_create: Creates worktree + plan in FEATURE worktree\
  \ (BYPASSES Main-First)\n   - cmd_scaffold: Creates plan folder only, NO worktree,\
  \ NO workspace update\n   - Agent Write tool: Creates files directly, NO CLI involvement\
  \ at all\n   Only cmd_init does things correctly, but nothing enforces its use.\n\
  \n2. AGENT SESSION BYPASS:\n   - Claude sessions spawn planner-build via Task tool\n\
  \   - planner-build guidance says \"A planning folder should have been provided\"\
  \n   - But when spawned directly, no upstream caller runs `agentic plan init` first\n\
  \   - Agent creates folder with Write tool → no worktree, no workspace update\n\
  \   - Example: 260214WS_workspace_auto_sync was created this way in this session\n\
  \n3. PLAN INIT BUG:\n   - plan.py cmd_init line 1154: `if workspace_file and not\
  \ worktree_exists:`\n   - Only updates workspace for NEW worktrees, skips reused\
  \ ones\n   - Causes workspace to miss entries when worktrees are reused\n\n4. NO\
  \ POST-HOC RECONCILIATION:\n   - `agentic worktree sync` exists but nothing triggers\
  \ it automatically\n   - No lifecycle hook on plan completion to sync workspace\n\
  \   - No validation gate that catches drift before it compounds\n\nOBSERVED SYMPTOMS:\n\
  - Workspace has stale entry for deleted worktree (plan-fix-11-test-plan...)\n- 260214WS\
  \ plan folder exists without worktree (created by agent Write)\n- 260214TC plan\
  \ folder reused worktree but workspace wasn't updated\n- docs/worktrees.yml registry\
  \ has stale entries\n\nVALIDATOR BUG (secondary):\n- plan.py:4001 regex `\\w+` doesn't\
  \ match hyphenated phase IDs (phase-1)\n- Should be `[\\w-]+` — causes false validation\
  \ failures\n"
