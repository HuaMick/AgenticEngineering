- name: Filesystem Migration
  description: 'Perform the git mv to rename docs/plans/ to docs/epics/ and update

    all hardcoded path strings in the codebase.

    '
  execution: sequential
  tasks:
  - id: build_13
    name: Execute git mv docs/plans to docs/epics
    description: "Perform the atomic filesystem migration:\n1. git mv docs/plans docs/epics\n\
      \   This preserves git history for all plan/epic folders.\n2. Update any README\
      \ or CLAUDE.md files that reference docs/plans/\n3. Update agenticengineering.code-workspace\
      \ if it references docs/plans/\n\nIMPORTANT: This step must happen AFTER all\
      \ Python code changes are committed.\nRun git status to verify no uncommitted\
      \ changes before the mv.\nAfter git mv, run agentic agent epic bootstrap to\
      \ re-import all epics into TinyDB.\n\nNote: The TinyDB database (~/.agentic/plans.db)\
      \ will be migrated separately\nby the EpicRepository migration logic.\n"
    status: completed
    agent: build-python
    inputs:
    - docs/plans/
    target_files:
    - docs/epics/
    - agenticengineering.code-workspace
    success_criteria:
    - git mv completed: docs/plans/ does not exist, docs/epics/ does exist
    - All epic folders present at docs/epics/live/ and docs/epics/completed/
    - .code-workspace updated if it referenced docs/plans/
    - git status shows only the rename (not untracked files)
  - id: build_14
    name: Run TinyDB migration from plans.db to epics.db
    description: "Execute the TinyDB migration:\n1. Run agentic agent epic bootstrap\
      \ to trigger EpicRepository auto-bootstrap\n   from docs/epics/ (this will create\
      \ ~/.agentic/epics.db)\n2. Verify the migration: agentic epic list --json should\
      \ show all epics\n3. Compare old plan count with new epic count\n4. If old ~/.agentic/plans.db\
      \ exists, verify data parity then keep as backup\n\nThe EpicRepository migration\
      \ logic (added in build_03) handles:\n- Detecting existing \"plans\" table in\
      \ plans.db\n- Copying data to \"epics\" table in epics.db\n- Renaming plan_folder_name\
      \ -> epic_folder_name in all documents\n- Renaming plan_folder -> epic_folder\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    target_files: []
    success_criteria:
    - ~/.agentic/epics.db created with all epics
    - agentic epic list shows same count as old agentic plan list
    - agentic epic status <epic_folder> works for existing epics
