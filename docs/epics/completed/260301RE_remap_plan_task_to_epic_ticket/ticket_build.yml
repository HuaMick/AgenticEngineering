name: remap-plan-task-to-epic-ticket-uat
worktree_path: /home/code/AgenticEngineering
branch: main
status: planning
priority: medium
objective: 'User acceptance testing for the epic/ticket terminology migration.

  Validates complete end-to-end user workflows work correctly with the new

  epic/ticket commands, and that the migration is transparent to users

  familiar with Jira/Agile conventions.


  DEPENDENCY: plan_cleaning.yml must be fully completed.


  UAT SCOPE:

  - Complete epic lifecycle workflow (create, work on, archive)

  - Agent spawning via epic context (agentic session spawn --epic)

  - Orchestration planning workflow (orchestration-planning creates epics)

  - Ralph loop discovering and acting on epics

  - Worktree integration with epic folders

  '
created: ''
phases:
- name: Plan Folder Compliance Audit
  execution: sequential
  description: 'Audit this epic folder (260301RE_remap_plan_task_to_epic_ticket) for

    compliance with the new epic folder standards.

    '
  tasks:
  - id: audit_01
    name: Verify all ticket files are at folder root
    description: 'Check that all ticket_*.yml and plan_*.yml files are at the folder
      root.

      This epic was created before the migration, so it uses plan_*.yml names.

      Post-migration, verify:

      1. All files are at docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/

      2. No nested subdirectories contain ticket files

      3. README.md is present at root

      4. orchestration_*.mmd is present at root (once created)

      '
    status: completed
    agent: test-audit
    inputs:
    - docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/
    completed_date: '2026-03-03'
    success_criteria:
    - All ticket files at folder root
    - No nested ticket files in subdirectories
    - README.md present
    - Folder path is docs/epics/live/ (not docs/plans/live/)
  - id: audit_02
    name: Verify phase and ticket structure in all ticket files
    description: 'Audit each ticket file for proper structure:

      1. Each file has name, worktree_path, branch, status, objective fields (root-level)

      2. Each file has phases[] with tasks[] or tickets[]

      3. Each task/ticket has id, name, description, status, success_criteria

      4. loop_structure present in each ticket file

      5. No _template_status: stub fields remaining

      '
    status: completed
    agent: test-audit
    inputs:
    - docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/plan_teach.yml
    - docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/plan_build.yml
    - docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/plan_test.yml
    - docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/plan_cleaning.yml
    - docs/epics/live/260301RE_remap_plan_task_to_epic_ticket/plan_uat.yml
    completed_date: '2026-03-03'
    success_criteria:
    - All ticket files have required root-level fields
    - No _template_status: stub remaining
    - All tasks have success_criteria
    - loop_structure present in each file
- name: Services Layer Migration
  execution: sequential
  description: 'Rename and refactor the AgenticGuidance services layer.

    This is the foundation - CLI and tests depend on this layer.

    '
  tasks:
  - id: build_01
    name: Create epic.py service (rename from plan.py)
    description: 'Create modules/AgenticGuidance/src/agenticguidance/services/epic.py

      by renaming and refactoring plan.py:


      CLASS RENAMES:

      - PlanMovementWorkflow -> EpicMovementWorkflow

      - PlanCreateResult -> EpicCreateResult

      - PlanData -> EpicData

      - PlanMetadata -> EpicMetadata

      - PlanUpdateResult -> EpicUpdateResult

      - PlanDeleteResult -> EpicDeleteResult

      - PlanService -> EpicService

      - TaskMoveResult -> TicketMoveResult

      - TaskData -> TicketData (in plan.py context)


      KEY METHOD RENAMES in EpicService:

      - create_plan -> create_epic

      - get_plan -> get_epic

      - list_plans -> list_epics

      - update_plan_status -> update_epic_status

      - get_plan_tasks -> get_epic_tickets

      - validate_plan_structure -> validate_epic_structure

      - _generate_plan_folder_name -> _generate_epic_folder_name

      - _resolve_plan_folder -> _resolve_epic_folder


      PATH UPDATES in EpicMovementWorkflow:

      - archive_plan_folder -> archive_epic_folder

      - All "docs/plans/live/" -> "docs/epics/live/"

      - All "docs/plans/completed/" -> "docs/epics/completed/"


      PRESERVATION: Keep plan.py as a compatibility shim that imports from epic.py

      and re-exports all old names with DeprecationWarning on first import.

      Do NOT delete plan.py in this phase (cleanup phase handles deletion).

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    success_criteria:
    - epic.py created with all renamed classes and methods
    - plan.py updated to re-export from epic.py with deprecation warnings
    - No functionality removed - purely a rename
    - All docstrings updated to use epic/ticket vocabulary
  - id: build_02
    name: Create ticket.py service (rename from task.py)
    description: 'Create modules/AgenticGuidance/src/agenticguidance/services/ticket.py

      by renaming and refactoring task.py:


      CLASS RENAMES:

      - TaskStatus -> TicketStatus (values: PENDING, IN_PROGRESS, COMPLETED unchanged)

      - Task -> Ticket

      - TaskService -> TicketService


      METHOD RENAMES in TicketService:

      - get_task -> get_ticket

      - list_tasks -> list_tickets

      - get_current_task -> get_current_ticket

      - update_task_status -> update_ticket_status

      - start_task -> start_ticket

      - complete_task -> complete_ticket


      ATTRIBUTE RENAMES:

      - self.plan_path -> self.epic_path

      - self.plan_file -> self.ticket_file (defaults to ticket_build.yml)

      - self._plan_folder_name -> self._epic_folder_name


      PRESERVATION: Keep task.py as a compatibility shim importing from ticket.py.

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    success_criteria:
    - ticket.py created with all renamed classes and methods
    - task.py updated to re-export from ticket.py with deprecation warnings
    - TicketStatus, Ticket, TicketService all functional
  - id: build_03
    name: Create epic_repository.py (rename from plan_repository.py)
    description: 'Create modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py

      by renaming and refactoring plan_repository.py:


      CLASS RENAMES:

      - PlanRepository -> EpicRepository


      TinyDB TABLE RENAMES:

      - self._plans = self._db.table("plans") -> self._epics = self._db.table("epics")

      - self._tasks = self._db.table("tasks") -> self._tickets = self._db.table("tickets")

      - self._phases = self._db.table("phases") (unchanged - phases are still phases)


      FIELD RENAMES in TinyDB documents:

      - "plan_folder_name" -> "epic_folder_name" (key field in all tables)

      - "plan_folder" -> "epic_folder"


      METHOD RENAMES:

      - create_plan -> create_epic

      - get_plan -> get_epic

      - list_plans -> list_epics

      - update_plan -> update_epic

      - delete_plan -> delete_epic

      - archive_plan -> archive_epic

      - unarchive_plan -> unarchive_epic

      - cancel_plan -> cancel_epic

      - resync_plan_folder -> resync_epic_folder

      - get_tasks -> get_tickets

      - get_task -> get_ticket

      - update_task_status -> update_ticket_status

      - add_task -> add_ticket

      - get_current_task -> get_current_ticket

      - check_all_tasks_complete -> check_all_tickets_complete

      - get_plan_branch -> get_epic_branch

      - get_task_counts -> get_ticket_counts

      - import_from_yaml -> import_from_yaml (unchanged - reads ticket_*.yml)

      - import_all_yaml -> import_all_yaml (scans docs/epics/ instead of docs/plans/)

      - export_to_yaml -> export_to_yaml (writes ticket_build.yml)


      PATH UPDATES:

      - /plans/live/ -> /epics/live/ in archive_epic and unarchive_epic

      - docs/plans -> docs/epics in import_all_yaml

      - Default db_path: ~/.agentic/plans.db -> ~/.agentic/epics.db


      DB MIGRATION: The EpicRepository constructor must include a migration

      method that detects old "plans" table and migrates to "epics" table.

      This handles existing installations without data loss.


      PRESERVATION: Keep plan_repository.py as a compatibility shim.

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    success_criteria:
    - EpicRepository created with all renamed methods and tables
    - TinyDB tables use "epics", "tickets", "phases" names
    - Migration logic handles existing "plans" table
    - plan_repository.py re-exports from epic_repository.py
    - Default db path changed to ~/.agentic/epics.db
  - id: build_04
    name: Update services __init__.py exports
    description: 'Update modules/AgenticGuidance/src/agenticguidance/services/__init__.py:

      - Add imports from epic.py, ticket.py, epic_repository.py

      - Export all new names: EpicService, EpicData, EpicMetadata, etc.

      - Export TicketService, Ticket, TicketStatus, TicketData

      - Export EpicRepository

      - Keep old names exported for backward compatibility (via shims)

      - Update RalphLoopService imports: PlanInfo -> EpicInfo, PlanAction -> EpicAction

      - Update module docstring

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    success_criteria:
    - All new Epic/Ticket names exported
    - Old names still exported via backward compat
    - __all__ list updated
  - id: build_05
    name: Update ralph.py service for epic terminology
    description: 'Update modules/AgenticGuidance/src/agenticguidance/services/ralph.py:


      DATACLASS RENAMES:

      - PlanInfo -> EpicInfo (all field names stay same: name, path, status, etc.)

      - PlanAction -> EpicAction


      CLASS RENAMES:

      - RalphLoopService (no rename - it''s a service class name, not plan-specific)


      PATH UPDATES in RalphLoopService:

      - docs/plans/live -> docs/epics/live (default discovery path)

      - plans_dir parameter -> epics_dir

      - All self.plans_dir -> self.epics_dir


      METHOD/VARIABLE UPDATES:

      - _get_completed_plans -> _get_completed_epics

      - discover_plans -> discover_epics

      - Internal variables: plan_dir -> epic_dir, plan_path -> epic_path

      Note: plan_name field in EpicInfo stays as name (not plan_name)


      KEEP for backward compat: RalphLoopService still importable from ralph.py.

      Add module-level aliases: PlanInfo = EpicInfo, PlanAction = EpicAction

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ralph.py
    success_criteria:
    - EpicInfo and EpicAction dataclasses exist
    - discover_epics method works correctly
    - docs/epics/live used as default discovery path
    - PlanInfo/PlanAction still importable as aliases
  - id: build_06
    name: Update context.py service for epic terminology
    description: 'Update modules/AgenticGuidance/src/agenticguidance/services/context.py:


      CLASS RENAMES:

      - MainFirstPlanResolver -> MainFirstEpicResolver


      PATH UPDATES:

      - docs/plans/live -> docs/epics/live (in resolve_active_plan path resolution)


      METHOD UPDATES:

      - resolve_active_plan -> resolve_active_epic

      - extract_current_task -> extract_current_ticket

      - extract_all_tasks -> extract_all_tickets


      KEEP backward compat alias: MainFirstPlanResolver = MainFirstEpicResolver

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/context.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/context.py
    success_criteria:
    - MainFirstEpicResolver class created
    - resolve_active_epic method works
    - docs/epics/live used for plan resolution
    - Backward compat alias present
