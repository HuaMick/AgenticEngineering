    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
    - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    success_criteria:
    - orchestrate.py uses epic terminology in docstrings and help text
    - ralph.py imports EpicInfo/EpicAction and uses epic vocabulary
    - No "plan folder" or "docs/plans/" references remain
  - id: build_17
    name: Update exceptions.py and validation.py
    description: "modules/AgenticCLI/src/agenticcli/exceptions.py:\n  - Rename PlanFileError\
      \ -> EpicFileError (keep alias)\n  - Rename PlanFolderError -> EpicFolderError\
      \ (keep alias)\n  - Update error message strings: \"plan file\" -> \"epic file\"\
      ,\n    \"plan folder\" -> \"epic folder\", \"agentic plan scaffold\" -> \"agentic\
      \ epic scaffold\"\n\nmodules/AgenticCLI/src/agenticcli/validation.py:\n  - validate_plan_folder_exists\
      \ -> validate_epic_folder_exists (keep alias)\n  - validate_plan_folder_structure\
      \ -> validate_epic_folder_structure (keep alias)\n  - validate_plan_folder_is_valid\
      \ -> validate_epic_folder_is_valid (keep alias)\n  - PLAN_REQUIRED_FIELDS ->\
      \ EPIC_REQUIRED_FIELDS (keep alias)\n  - validate_plan_yaml -> validate_epic_yaml\
      \ (keep alias)\n  - validate_plan_yaml_content -> validate_epic_yaml_content\
      \ (keep alias)\n  - validate_plan_yaml_strict -> validate_epic_yaml_strict (keep\
      \ alias)\n  - Update all error messages and docstrings\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/exceptions.py
    - modules/AgenticCLI/src/agenticcli/validation.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/exceptions.py
    - modules/AgenticCLI/src/agenticcli/validation.py
    success_criteria:
    - New Epic* class/function names exist as primary
    - Old Plan* names kept as backward compat aliases
    - All error messages use epic/ticket vocabulary
  - id: build_18
    name: Update git.py env var, question_watcher.py, question_tui.py
    description: "modules/AgenticCLI/src/agenticcli/utils/git.py:\n  - Add AGENTIC_EPICS_DIR\
      \ env var support (primary)\n  - Keep AGENTIC_PLANS_DIR as deprecated fallback\n\
      \  - get_plans_dir -> get_epics_dir (keep alias)\n  - Update fallback path:\
      \ docs/plans/live -> docs/epics/live\n  - Update comments referencing docs/plans/\n\
      \nmodules/AgenticCLI/src/agenticcli/services/question_watcher.py:\n  - plan_folder\
      \ parameter -> epic_folder (keep alias)\n  - Update docstrings: \"plan folder\
      \ containing questions\"\n  - Update path scanning: docs/plans/live/ -> docs/epics/live/\n\
      \nmodules/AgenticCLI/src/agenticcli/tui/question_tui.py:\n  - Update path scanning\
      \ from docs/plans/live/* to docs/epics/live/*\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/git.py
    - modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    - modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/git.py
    - modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    - modules/AgenticCLI/src/agenticcli/tui/question_tui.py
    success_criteria:
    - AGENTIC_EPICS_DIR supported as primary env var
    - Question watcher scans docs/epics/live/
    - TUI scans docs/epics/live/*
    - All backward compat aliases present
  - id: build_19
    name: Update __init__.py stability markers, task_workflow.py, orchestration workflow
    description: "modules/AgenticCLI/src/agenticcli/__init__.py:\n  - Rename stability\
      \ markers: \"plan.task.prefill\" -> \"epic.ticket.prefill\"\n  - \"plan.task.list\"\
      \ -> \"epic.ticket.list\", etc.\n\nmodules/AgenticCLI/src/agenticcli/workflows/task_workflow.py:\n\
      \  - Rename to ticket_workflow.py (keep task_workflow.py as compat shim)\n \
      \ - TaskPresetWorkflow -> TicketPresetWorkflow\n  - PresetLoadResult stays same\
      \ name (not plan-specific)\n  - Update docstrings: \"plan's live subdirectory\"\
      \ -> \"epic's live subdirectory\"\n  - \"task presets into plan files\" -> \"\
      ticket presets into epic files\"\n\nmodules/AgenticCLI/src/agenticcli/workflows/orchestration.py:\n\
      \  - Update docstring: \"Load orchestration MMD content from plan folder\"\n\
      \    -> \"Load orchestration MMD content from epic folder\"\n  - Update any\
      \ plan_folder variable names\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/__init__.py
    - modules/AgenticCLI/src/agenticcli/workflows/task_workflow.py
    - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/__init__.py
    - modules/AgenticCLI/src/agenticcli/workflows/ticket_workflow.py
    - modules/AgenticCLI/src/agenticcli/workflows/task_workflow.py
    - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
    success_criteria:
    - Stability markers use epic.ticket.* naming
    - ticket_workflow.py created with TicketPresetWorkflow
    - task_workflow.py is compat shim
    - orchestration.py docstrings updated
  - id: build_20
    name: Update settings.local.json, .gitignore, pyproject.toml keywords, entrypoints
    description: ".claude/settings.local.json:\n  - Add permissions for agentic epic\
      \ commands alongside plan commands\n  - \"Bash(agentic epic:*)\", \"Bash(agentic\
      \ --json epic list:*)\" etc.\n\n.gitignore:\n  - Update comment: \"Agentic local\
      \ state (TinyDB plans database)\"\n    -> \"Agentic local state (TinyDB epics\
      \ database)\"\n\nmodules/AgenticCLI/pyproject.toml:\n  - Add \"epic\" to keywords\
      \ list (keep \"planning\" for discoverability)\n\nmodules/AgenticGuidance/entrypoints/_plan_build.yml:\n\
      \  - Create _epic_build.yml as primary (keep _plan_build.yml as compat)\n  -\
      \ Update internal references: agentic plan init -> agentic epic init\n  - Update\
      \ step descriptions to use epic/ticket vocabulary\n\nmodules/AgenticGuidance/entrypoints/_plan_teach.yml:\n\
      \  - Create _epic_teach.yml as primary (keep _plan_teach.yml as compat)\n  -\
      \ Same updates as above\n"
    status: completed
    agent: build-python
    inputs:
    - .claude/settings.local.json
    - .gitignore
    - modules/AgenticCLI/pyproject.toml
    - modules/AgenticGuidance/entrypoints/_plan_build.yml
    - modules/AgenticGuidance/entrypoints/_plan_teach.yml
    target_files:
    - .claude/settings.local.json
    - .gitignore
    - modules/AgenticCLI/pyproject.toml
    - modules/AgenticGuidance/entrypoints/_epic_build.yml
    - modules/AgenticGuidance/entrypoints/_epic_teach.yml
    - modules/AgenticGuidance/entrypoints/_plan_build.yml
    - modules/AgenticGuidance/entrypoints/_plan_teach.yml
    success_criteria:
    - Settings allow both epic and plan CLI commands
    - .gitignore comment updated
    - pyproject.toml has "epic" keyword
    - Entrypoint files created/updated with epic vocabulary
- name: Identify Remaining Plan References
  execution: sequential
  description: 'Audit the codebase to find any remaining plan/task references that

    should be cleaned up.

    '
  tasks:
  - id: clean_01
    name: Audit codebase for remaining plan/task references
    description: "Run comprehensive search for remaining plan/task terminology:\n\
      1. grep -rn \"docs/plans\" modules/ --include=\"*.py\" (should return empty)\n\
      2. grep -rn \"PlanService\\|TaskService\\|PlanRepository\" modules/ --include=\"\
      *.py\"\n   (should only return shim files and backward compat)\n3. grep -rn\
      \ \"plan_folder\\b\" modules/ --include=\"*.py\"\n   (should be replaced by\
      \ epic_folder everywhere)\n4. grep -rn \"plan_command\\|plan_action\" modules/\
      \ --include=\"*.py\"\n   (old argparse namespace keys - should be replaced)\n\
      5. grep -rn \"docs/plans\" modules/AgenticGuidance/assets/ (should be empty)\n\
      6. grep -rn \"agentic plan\\|agentic plan task\" modules/ --include=\"*.md\"\
      \n   (should show only deprecated alias docs)\n\nOutput a report of all findings\
      \ categorized by:\n- Safe to remove (in shim files)\n- Needs update (functional\
      \ code still using old names)\n- Documentation only (acceptable in backward\
      \ compat docs)\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/
    - modules/AgenticGuidance/src/
    success_criteria:
    - Audit report produced listing all remaining references
    - Report categorizes each reference as safe/needs-update/doc-only
- name: Remove Compatibility Shims
  execution: sequential
  description: 'Remove the backward compatibility shim files introduced in the build
    phase,

    replacing with clean imports and removing deprecated code paths.

    '
  tasks:
  - id: clean_02
    name: Remove plan.py, task.py, plan_repository.py shims
    description: 'Verify no external code imports these modules directly, then remove
      them:

      1. Verify no test files import from plan.py directly (only via epic.py)

      2. Verify no CLI code imports from task.py directly (only via ticket.py)

      3. Delete modules/AgenticGuidance/src/agenticguidance/services/plan.py

      4. Delete modules/AgenticGuidance/src/agenticguidance/services/task.py

      5. Delete modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py

      6. Update services/__init__.py to remove all old-name exports

      7. Run full test suite to verify no regressions


      CAUTION: Before deletion, verify the shim file imports are no longer needed.

      If any external module still imports old names, fix that module first.

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    success_criteria:
    - plan.py, task.py, plan_repository.py deleted
    - __init__.py exports only epic/ticket names
    - All tests still pass after deletion
  - id: clean_03
    name: Remove deprecated CLI plan.py command module
    description: "After verifying no tests use plan.py command module directly:\n\
      1. Verify test_plan.py tests only call via agentic plan (CLI, not direct import)\n\
      2. Remove plan.py delegating shim code (keep file but remove delegation wrapper)\n\
      \   OR delete entirely if nothing imports it\n3. Update cli.py: Remove the _plan_handle\
      \ -> epic delegation\n   Replace deprecated plan_app commands with proper error\
      \ messages:\n   \"Command 'agentic plan ...' removed. Use 'agentic epic ...'\
      \ instead.\"\n4. Run test suite to verify no regressions\nNote: The plan_app\
      \ can stay as hidden deprecated commands but must show\nclear error/redirect,\
      \ not silently delegate.\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
    - agentic plan list shows "Removed: use agentic epic list" error
    - plan.py command module simplified (no complex delegation)
    - All agentic epic ... commands still work correctly
  - id: clean_04
    name: Remove naming utility aliases
    description: 'Clean up naming.py to remove backward compat aliases:

      1. Remove generate_plan_folder_name alias (keep only generate_epic_folder_name)

      2. Remove validate_plan_folder_name alias

      3. Remove parse_plan_folder_name alias

      4. Update all internal callers in other modules

      5. Run test suite


      Also clean up worktree.py:

      - Remove get_live_plan_folders alias

      - Remove create_planning_folder alias

      - Remove --no-plan flag (keep only --no-epic)

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/naming.py
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    success_criteria:
    - generate_plan_folder_name no longer exists
    - Only generate_epic_folder_name exists in naming.py
    - --no-plan flag removed from worktree create command
    - Tests updated and passing
- name: Clean Up Test Stubs and Backward Compat Test Code
  execution: sequential
  description: 'Remove backward compatibility test code that was added during migration.

    '
  tasks:
  - id: clean_05
    name: Remove backward compat test assertions
    description: "Review and clean up test files:\n1. Remove tests that verify old\
      \ PlanService import still works\n   (now that plan.py is deleted, these tests\
      \ would fail anyway)\n2. Remove tests that verify agentic plan ... deprecation\
      \ warning\n   (now that plan commands show error, update assertions)\n3. Update\
      \ test_plan.py and test_task*.py to reflect final state:\n   - These files can\
      \ be left as-is if they test the error messages\n   - Or deleted if no value\
      \ remains\n4. Remove any test fixtures that create files in docs/plans/ paths\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/tests/test_plan.py
    - modules/AgenticCLI/tests/test_plan_movement.py
    - modules/AgenticGuidance/tests/test_services_plan.py
    target_files:
    - modules/AgenticCLI/tests/test_plan.py
    - modules/AgenticGuidance/tests/test_services_plan.py
    success_criteria:
    - No test fixtures create docs/plans/ directories
    - Tests for removed commands verify error message output
    - Full test suite passes
- name: Final Verification
  execution: sequential
  description: 'Run the complete test suite one final time to verify clean state.

    '
  tasks:
  - id: clean_06
    name: Run final test suite verification
    description: 'Execute complete test suites across both modules:

      1. cd modules/AgenticGuidance && python3 -m pytest tests/ -v

      2. cd modules/AgenticCLI && python3 -m pytest tests/ -v

      3. Run smoke tests: agentic epic list, agentic epic status

      4. Verify no docs/plans/ directory exists in repo (only docs/epics/)

      5. Verify ~/.agentic/epics.db exists and plans.db either deleted or preserved
      as backup

      '
    status: completed
    agent: test-runner
    success_criteria:
    - Both test suites pass with 0 failures
    - No docs/plans/ directory in repository
    - docs/epics/live/ and docs/epics/completed/ exist with all epics
    - agentic epic list shows all epics
    - agentic plan list shows removal error
