  - id: build_16
    name: Update orchestrate.py and ralph.py CLI commands
    description: "modules/AgenticCLI/src/agenticcli/commands/orchestrate.py:\n  -\
      \ Update module docstring referencing \"planning and execution for plans\"\n\
      \  - Update \"planning\" action vocabulary and plan_folder parameter names\n\
      \  - Update command descriptions and help text\n  - Update path references:\
      \ docs/plans/ -> docs/epics/\n\nmodules/AgenticCLI/src/agenticcli/commands/ralph.py:\n\
      \  - Update \"action: plan\" references to \"action: epic\"\n  - Update \"needs\
      \ planning\" status text\n  - Update plan folder name displays and queue outputs\n\
      \  - Update docstrings referencing plan orchestration\n  - Update PlanInfo ->\
      \ EpicInfo, PlanAction -> EpicAction imports\n"
