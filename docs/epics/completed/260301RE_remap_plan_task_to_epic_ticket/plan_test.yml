    - Migration test verifies plans.db -> epics.db
  - id: test_04
    name: Update ralph, context, and integration test files
    description: "test_services_ralph.py:\n  - Update EpicInfo/EpicAction imports\n\
      \  - Update discover_epics method calls\n  - Update path assertions: docs/epics/live\n\
      test_services_context.py:\n  - Update MainFirstEpicResolver imports\n  - Update\
      \ resolve_active_epic method calls\ntest_integration_planning_with_stories.py:\n\
      \  - Update plan/task vocabulary throughout\ntest_planner_build_story_generation.py,\
      \ test_planner_test_story_validation.py:\n  - Update path references and plan_folder\
