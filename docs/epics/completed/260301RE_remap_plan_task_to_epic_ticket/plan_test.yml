name: remap-plan-task-to-epic-ticket-test
worktree_path: /home/code/AgenticEngineering
branch: main
status: in_progress
objective: 'Validate the epic/ticket rename through comprehensive test coverage.

  This phase updates all existing tests to use the new epic/ticket terminology

  and adds new tests to verify backward compatibility of deprecated plan/task aliases.


  DEPENDENCY: plan_build.yml must be fully completed before this phase begins.


  TEST SCOPE:

  - AgenticGuidance tests: ~27 test files (services, integration, UAT)

  - AgenticCLI tests: ~80+ test files (unit, integration, CLI smoke tests)

  - Total estimated: 2000+ test functions to verify

  '
phases:
- name: AgenticGuidance Service Tests Update
  description: 'Update all AgenticGuidance test files to use the new epic/ticket terminology.

    '
  execution: sequential
  tasks:
  - id: test_01
    name: Update test_services_plan.py -> test_services_epic.py
    description: "Rename and update test file:\n- Rename to test_services_epic.py\
      \ (keep test_services_plan.py as alias if needed)\n- Update all imports: from\
      \ agenticguidance.services.plan import PlanService ->\n  from agenticguidance.services.epic\
      \ import EpicService\n- Update all class names: PlanService -> EpicService\n\
      - Update all method names: create_plan -> create_epic, etc.\n- Update path assertions:\
      \ docs/plans/ -> docs/epics/\n- Add tests that verify old PlanService still\
      \ importable (backward compat)\nAlso update test_services_plan_service.py and\
      \ test_services_plan_service_integration.py\nin the same way.\n"
    status: completed
    agent: test-builder
    inputs:
    - modules/AgenticGuidance/tests/test_services_plan.py
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    - modules/AgenticGuidance/tests/test_services_plan_service_integration.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    target_files:
    - modules/AgenticGuidance/tests/test_services_epic.py
    - modules/AgenticGuidance/tests/test_services_plan.py
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    - modules/AgenticGuidance/tests/test_services_plan_service_integration.py
    success_criteria:
    - test_services_epic.py passes all tests
    - Backward compat tests: PlanService import succeeds
    - All create_epic, get_epic methods tested
    - docs/epics/ paths used in all path assertions
  - id: test_02
    name: Update test_services_task.py -> test_services_ticket.py
    description: 'Rename and update:

      - test_services_ticket.py with TicketService, Ticket, TicketStatus

      - Update all imports and class names

      - Update method assertions: start_ticket, complete_ticket, get_ticket

      - Add backward compat tests: TaskService still importable

      Keep test_services_task.py as backward compat test file.

      '
    status: completed
    agent: test-builder
    inputs:
    - modules/AgenticGuidance/tests/test_services_task.py
    - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    target_files:
    - modules/AgenticGuidance/tests/test_services_ticket.py
    - modules/AgenticGuidance/tests/test_services_task.py
    success_criteria:
    - test_services_ticket.py covers all TicketService methods
    - TaskService backward compat test passes
  - id: test_03
    name: Update plan_repository and plan_resurrection tests
    description: 'Update test_plan_repository_filelock.py:

      - Update PlanRepository -> EpicRepository imports

      - Update method names: create_plan -> create_epic, etc.

      - Update table name assertions: "plans" -> "epics", "tasks" -> "tickets"

      - Update path assertions: /plans/ -> /epics/

      - Add migration test: verify old "plans" table in plans.db migrates to "epics"
      in epics.db

      Update test_plan_resurrection.py:

      - Update path references

      - Update class/method names

      '
    status: completed
    agent: test-builder
    inputs:
    - modules/AgenticGuidance/tests/test_plan_repository_filelock.py
    - modules/AgenticGuidance/tests/test_plan_resurrection.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic_repository.py
    target_files:
    - modules/AgenticGuidance/tests/test_plan_repository_filelock.py
    - modules/AgenticGuidance/tests/test_plan_resurrection.py
