name: remap-plan-task-to-epic-ticket-teach
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
objective: 'Update all agent guidance, asset definitions, and documentation to replace

  plan/task terminology with epic/ticket terminology. This teach phase ensures

  agents understand the new vocabulary BEFORE the implementation phase executes,

  preventing guidance drift and enabling correct agent behaviour during migration.

  '
phases:
- name: Terminology Definitions
  description: 'Update canonical definition files that are the single source of truth
    for

    plan/epic terminology used by all agents.

    '
  execution: sequential
  tasks:
  - id: teach_01
    name: Update plans.yml definition to epic/ticket terminology
    description: 'Rename and update the canonical plans definition file:

      - Rename docs/plans/ references to docs/epics/

      - Update all "plan folder" to "epic folder" throughout

      - Update file_taxonomy: plan_*.yml -> ticket_*.yml

      - Update cli_usage section with new command syntax

      - Update plan_lifecycle to epic_lifecycle

      - Update phase_types section

      - Update path_conventions

      - Update two_level_completion_pattern (live -> completed)

      - Preserve all fences and validation rules, updating vocabulary

      IMPORTANT: "task" as a generic word (e.g. "your task is to...") is NOT changed.

      Only "task" in the sense of a tracked work item tracked in plan_*.yml becomes
      "ticket".

      '
    status: completed
    agent: teacher-update-assets
    target_files:
    - modules/AgenticGuidance/assets/definitions/plans.yml
    success_criteria:
    - All "plan folder" updated to "epic folder"
    - File taxonomy updated: plan_*.yml -> ticket_*.yml
    - docs/plans/ path references updated to docs/epics/
    - plan_lifecycle renamed to epic_lifecycle
    - CLI examples updated to agentic epic ...
  - id: teach_02
    name: Update cli-commands.yml with epic/ticket CLI commands
    description: 'Update the CLI commands definition file:

      - Replace agentic plan ... with agentic epic ...

      - Replace agentic agent plan task ... with agentic agent epic ticket ...

      - Update all command examples and parameter descriptions

      - Update plan_folder parameter names to epic_folder

      - Add deprecated aliases section documenting old agentic plan ... commands

      '
    status: completed
    agent: teacher-update-assets
    target_files:
    - modules/AgenticGuidance/assets/definitions/cli-commands.yml
    success_criteria:
    - All primary commands documented as agentic epic ...
    - ticket sub-commands documented as agentic epic ticket ...
    - Deprecated aliases section present
    - JSON output fields updated (plan_folder -> epic_folder, plan_folder_name ->
      epic_folder_name)
  - id: teach_03
    name: Update cli-agent-architecture.yml and agent-categories.yml
    description: 'cli-agent-architecture.yml: Update responsibilities list - "Task
      status updates

      in plan files" -> "Ticket status updates in epic folders".

      agent-categories.yml: Update planner category responsibility statements

      to reference epic/ticket model.

      '
    status: completed
    agent: teacher-update-assets
    target_files:
    - modules/AgenticGuidance/assets/definitions/cli-agent-architecture.yml
    - modules/AgenticGuidance/assets/definitions/agent-categories.yml
    success_criteria:
    - cli-agent-architecture.yml responsibilities updated
    - agent-categories.yml descriptions use epic/ticket vocabulary
- name: Guideline Updates
  description: 'Update all guideline files that reference plan/task vocabulary.

    '
  execution: sequential
  tasks:
  - id: teach_04
    name: Update planning-standard.yml, plan-completion.yml, plan-inputs.yml
    description: 'planning-standard.yml: Update all "plan"/"task" vocabulary to "epic"/"ticket".

      Update all CLI command references. Preserve all fences.

      plan-completion.yml (Copy-and-Sync pattern): Update docs/plans/ -> docs/epics/.

      plan-inputs.yml: Update plan_folder parameter name to epic_folder.

      '
    status: completed
    agent: teacher-update-guidance
    target_files:
    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
    - modules/AgenticGuidance/assets/guidelines/plan-completion.yml
    - modules/AgenticGuidance/assets/guidelines/plan-inputs.yml
    success_criteria:
    - planning-standard.yml uses epic/ticket vocabulary throughout
    - plan-completion.yml path references updated to docs/epics/
    - plan-inputs.yml uses epic_folder parameter name
  - id: teach_05
    name: Update tool-offloading.yml and worktree-and-branching.yml
    description: 'tool-offloading.yml: Update good_candidates list (task status updates,

      moving files between plan folders). Update CLI examples.

      worktree-and-branching.yml: Update Main-First Planning section to use

      epic terminology. Replace docs/plans/ -> docs/epics/.

      '
    status: completed
    agent: teacher-update-guidance
    target_files:
    - modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
    - modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml
    success_criteria:
    - tool-offloading.yml references new CLI commands and epic folders
    - worktree-and-branching.yml uses epic terminology in Main-First Planning
- name: Specification Updates
  description: 'Update formal specifications for the epic/ticket YAML schema.

    '
  execution: sequential
  tasks:
  - id: teach_06
    name: Update plan-schema.yml and plan-mmd-schema.yml
    description: 'plan-schema.yml: Update file_types section (plan_build -> ticket_build,

      plan_test -> ticket_test, etc). Update filename_pattern from plan_*.yml

      to ticket_*.yml. Update all path examples and descriptions.

      plan-mmd-schema.yml: Update path examples from docs/plans/ to docs/epics/.

      Update descriptive text to use epic terminology.

      Both files should include a deprecation_note explaining the rename.

      '
    status: completed
    agent: teacher-update-assets
    target_files:
    - modules/AgenticGuidance/assets/specifications/plan-schema.yml
    - modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml
    success_criteria:
    - plan-schema.yml file_types updated to ticket_*.yml
    - Both files use epic/ticket vocabulary
    - Deprecation notes added
- name: Planner Agent Guidance Updates
  description: 'Update all planner agent process.yml, inputs.yml, and manifest.yml
    files.

    '
  execution: sequential
  tasks:
  - id: teach_07
    name: Update planner-build and planner-test agent guidance
    description: "planner-build: process.yml, inputs.yml, manifest.yml\n  - plan_folder_name\
      \ -> epic_folder_name\n  - docs/plans/live/ -> docs/epics/live/\n  - plan_build.yml\
      \ -> ticket_build.yml (output file)\n  - All plan vocabulary -> epic/ticket\
      \ vocabulary\nplanner-test: process.yml, inputs.yml\n  - Same substitutions\n\
      \  - plan_test.yml -> ticket_test.yml (output file)\n"
    status: completed
    agent: teacher-update-assets
    target_files:
    - modules/AgenticGuidance/agents/planner/planner-build/process.yml
    - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
    - modules/AgenticGuidance/agents/planner/planner-build/manifest.yml
    - modules/AgenticGuidance/agents/planner/planner-test/process.yml
    - modules/AgenticGuidance/agents/planner/planner-test/inputs.yml
    success_criteria:
    - epic_folder_name used in all parameter references
    - ticket_*.yml used as output filenames
    - docs/epics/ used in all path examples
  - id: teach_08
    name: Update planner-guidance, planner-cleaning, planner-guidance-testing guidance
    description: "planner-guidance: process.yml, inputs.yml, manifest.yml\n  - plan_teach.yml\
      \ -> ticket_teach.yml\n  - All plan vocabulary -> epic/ticket\nplanner-cleaning:\
      \ process.yml, inputs.yml\n  - plan_cleaning.yml -> ticket_cleaning.yml\nplanner-guidance-testing:\
      \ process.yml, inputs.yml\n  - plan_test_guidance.yml -> ticket_test_guidance.yml\n"
    status: completed
    agent: teacher-update-assets
    target_files:
    - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance/manifest.yml
    - modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml
    - modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance-testing/process.yml
