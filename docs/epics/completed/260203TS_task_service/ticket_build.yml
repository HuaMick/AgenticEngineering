  - id: test_002
    name: Implement task retrieval tests
    description: Test get_task(), list_tasks(), get_current_task()
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/tests/test_services_task.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    target_files:
    - modules/AgenticGuidance/tests/test_services_task.py
    guidance: "Implement retrieval method tests in TestTaskService class:\n\n1. test_get_task_returns_task_by_id()\n\
      \   - Call get_task() with valid task_id\n   - Assert returned Task has correct\
      \ id, name, status\n   - Verify Task dataclass fields populated\n\n2. test_get_task_returns_none_for_invalid_id()\n\
      \   - Call get_task() with non-existent id\n   - Assert None returned\n\n3.\
      \ test_list_tasks_returns_all_tasks()\n   - Call list_tasks() without status\
      \ filter\n   - Assert returns list of all tasks (3 in fixture)\n\n4. test_list_tasks_filters_by_status()\n\
      \   - Call list_tasks(status=TaskStatus.PENDING)\n   - Assert only pending tasks\
      \ returned\n   - Repeat for in_progress and completed\n\n5. test_get_current_task_returns_in_progress()\n\
      \   - Fixture has in_progress task\n   - Assert get_current_task() returns in_progress\
      \ task\n\n6. test_get_current_task_returns_pending_when_none_in_progress()\n\
      \   - Modify fixture to have no in_progress tasks\n   - Assert get_current_task()\
      \ returns first pending task\n\n7. test_get_current_task_returns_none_when_all_completed()\n\
      \   - Modify fixture to have only completed tasks\n   - Assert get_current_task()\
      \ returns None\n\nASSERTIONS:\n- Use assert for boolean/equality checks\n- Verify\
      \ Task dataclass field types\n- Check list lengths and contents\n"
    success_criteria:
    - All retrieval tests implemented
    - Tests verify correct Task objects returned
    - Tests validate None returns for edge cases
    - Tests check status filtering logic
    - Tests pass when run with pytest
  - id: test_003
    name: Implement task update tests
    description: Test update_task_status(), start_task(), complete_task()
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/tests/test_services_task.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    target_files:
    - modules/AgenticGuidance/tests/test_services_task.py
    guidance: "Implement update method tests:\n\n1. test_update_task_status_changes_status()\n\
      \   - Update task from pending to in_progress\n   - Assert update_task_status()\
      \ returns True\n   - Re-load task and verify status changed\n   - Verify YAML\
