      \   from pathlib import Path\n   from agenticguidance.services.task import Task,\
      \ TaskService, TaskStatus\n\n2. Test fixtures (pytest):\n   @pytest.fixture\n\
      \   def sample_plan_path(tmp_path):\n       \"\"\"Create temporary plan directory\
      \ with sample YAML.\"\"\"\n       # Create docs/plans/live/test_plan/\n    \
      \   # Write plan_build.yml with phases and tasks\n       # Return Path to plan\
      \ folder\n\n   @pytest.fixture\n   def task_service(sample_plan_path):\n   \
      \    \"\"\"Create TaskService instance.\"\"\"\n       return TaskService(sample_plan_path)\n\
      \n3. Test class structure:\n   class TestTask:\n       \"\"\"Tests for Task\
      \ dataclass.\"\"\"\n\n   class TestTaskStatus:\n       \"\"\"Tests for TaskStatus\
      \ enum.\"\"\"\n\n   class TestTaskService:\n       \"\"\"Tests for TaskService\
      \ class.\"\"\"\n\nSAMPLE PLAN DATA:\n- Include 3 tasks: one pending, one in_progress,\
