name: task-service-implementation
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
objective: 'This plan implements TaskService in AgenticGuidance to provide CRUD operations

  for tasks within plan YAML files. Currently, tasks are embedded in plan files

  under phases[].tasks[] with no dedicated service layer for task manipulation.


  OBJECTIVE: Create TaskService following existing service patterns (plan.py,

  state.py, config.py) to enable programmatic task access and status updates.


  ARCHITECTURE ALIGNMENT: Domain service layer only (no workflow/entrypoint yet).

  Future work may add CLI commands using this service.


  UPDATE 2026-02-03 (Session 1): Initial planning. Analyzed existing service

  patterns and test structure. Ready for implementation.


  NEXT: Implement TaskService with comprehensive tests, then validate against

  real plan files.

  '
created: ''
phases:
- name: Service Implementation Phase
  execution: sequential
  description: Implement TaskService domain service with CRUD operations
  tickets:
  - id: impl_001
    name: Create TaskService class structure
    description: Implement TaskService skeleton with core methods and dataclasses
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/state.py
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: "Create task.py following patterns from existing services:\n\n1. Import\
      \ required modules (yaml, pathlib, dataclasses, enum)\n2. Define TaskStatus\
      \ enum: pending, in_progress, completed\n3. Create Task dataclass with fields:\n\
      \   - id: str\n   - name: str\n   - description: str\n   - status: TaskStatus\n\
      \   - agent: Optional[str]\n   - inputs: list[str]\n   - target_files: list[str]\n\
      \   - guidance: Optional[str]\n   - completed_date: Optional[str]\n4. Create\
      \ TaskService class with __init__(plan_path: Path)\n5. Add private helper: _load_plan_file()\
      \ -> dict\n6. Add private helper: _save_plan_file(data: dict) -> None\n\nPATTERN\
      \ REFERENCE:\n- Follow PlanMovementWorkflow pattern for YAML loading\n- Use\
      \ FileLock from state.py for atomic writes\n- Support both phases[].tasks[]\
      \ and plan.tasks[] patterns\n"
    success_criteria:
    - TaskService class exists with proper imports
    - Task dataclass has all required fields
    - TaskStatus enum has three states
    - _load_plan_file() and _save_plan_file() helpers implemented
    - No syntax errors, module imports cleanly
  - id: impl_002
    name: Implement task retrieval methods
    description: Add get_task(), list_tasks(), get_current_task()
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    - modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: "Implement task retrieval methods:\n\n1. get_task(plan_id: str, task_id:\
      \ str) -> Optional[Task]\n   - Search phases[].tasks[] for matching task_id\n\
      \   - Fall back to plan.tasks[] if not found in phases\n   - Return Task dataclass\
      \ or None\n   - Handle YAML parsing errors gracefully\n\n2. list_tasks(plan_id:\
      \ str, status: Optional[TaskStatus] = None) -> list[Task]\n   - Collect all\
      \ tasks from phases[].tasks[]\n   - Also check plan.tasks[] for backward compatibility\n\
      \   - Filter by status if provided\n   - Return list of Task dataclasses\n\n\
      3. get_current_task(plan_id: str) -> Optional[Task]\n   - Search for first task\
      \ with status=in_progress\n   - If none in_progress, return first task with\
      \ status=pending\n   - Return None if no pending or in_progress tasks\n   -\
      \ Log warning if multiple in_progress tasks found\n\nEDGE CASES:\n- Empty plan\
      \ files\n- Missing phases key\n- Tasks without required fields\n- Malformed\
      \ YAML\n"
    success_criteria:
    - get_task() returns correct task by ID
    - get_task() returns None for non-existent task
    - list_tasks() returns all tasks when status=None
    - list_tasks() filters correctly by status
    - get_current_task() prioritizes in_progress over pending
    - get_current_task() returns None when no actionable tasks
    - All methods handle missing/malformed data gracefully
  - id: impl_003
    name: Implement task update methods
    description: Add update_task_status(), start_task(), complete_task()
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    - modules/AgenticGuidance/src/agenticguidance/services/state.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: "Implement task mutation methods with file locking:\n\n1. update_task_status(plan_id:\
      \ str, task_id: str, status: TaskStatus) -> bool\n   - Load plan file with FileLock\
      \ for atomic operation\n   - Find task in phases[].tasks[] or plan.tasks[]\n\
      \   - Update status field\n   - Add completed_date if status=completed (ISO\
      \ 8601 format)\n   - Save plan file\n   - Return True on success, False if task\
      \ not found\n\n2. start_task(plan_id: str, task_id: str) -> bool\n   - Convenience\
      \ wrapper for update_task_status(status=in_progress)\n   - Validates task exists\
      \ before updating\n   - Returns boolean success\n\n3. complete_task(plan_id:\
      \ str, task_id: str) -> bool\n   - Convenience wrapper for update_task_status(status=completed)\n\
      \   - Automatically adds completed_date timestamp\n   - Returns boolean success\n\
      \nATOMIC WRITES:\n- Use FileLock(plan_file_path) context manager\n- Load YAML\
      \ inside lock\n- Modify data\n- Write YAML inside same lock\n- Release lock\
      \ automatically\n\nVALIDATION:\n- Check task exists before updating\n- Preserve\
      \ all other task fields during update\n- Maintain YAML formatting (use default_flow_style=False)\n"
    success_criteria:
    - update_task_status() changes task status atomically
    - update_task_status() adds completed_date when status=completed
    - update_task_status() returns False for non-existent tasks
    - start_task() sets status to in_progress
    - complete_task() sets status to completed with timestamp
    - File locking prevents concurrent modification
    - YAML formatting preserved after updates
  - id: impl_004
    name: Export TaskService in __init__.py
    description: Add TaskService exports to services package
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    guidance: "Update __init__.py to export TaskService:\n\n1. Add import statement:\n\
      \   from .task import (\n       Task,\n       TaskService,\n       TaskStatus,\n\
      \   )\n\n2. Add to __all__ list (alphabetically within \"Task services\" section):\n\
      \   # Task services\n   \"Task\",\n   \"TaskService\",\n   \"TaskStatus\",\n\
      \nPATTERN: Follow existing structure with comment sections\n(Config services,\
      \ Context services, etc.)\n"
    success_criteria:
    - TaskService imported in __init__.py
    - Task and TaskStatus exported
    - __all__ list updated with new exports
    - No import errors when importing from agenticguidance.services
    - Alphabetical ordering maintained within section
