- name: Quality Validation Phase
  execution: sequential
  description: Audit test quality and prevent reward hacking
  tickets:
  - id: audit_001
    name: Test quality audit
    description: Review tests for proper assertions and real behavior validation
    status: completed
    agent: test-audit
    inputs:
    - modules/AgenticGuidance/tests/test_services_task.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: "Audit test quality to prevent reward hacking:\n\nCHECKLIST:\n1. Do\
      \ tests verify actual behavior or just success=True?\n   - Tests should check\
      \ Task field values, not just \"returned something\"\n   - Tests should verify\
      \ YAML file contents after updates\n\n2. Are edge cases properly tested?\n \
      \  - Empty files, missing keys, malformed data\n   - Concurrent access scenarios\n\
      \   - Both task structure patterns (nested and flat)\n\n3. Are assertions specific\
      \ and meaningful?\n   - Avoid assert result is not None (too weak)\n   - Use\
      \ assert result.status == TaskStatus.COMPLETED (specific)\n\n4. Do tests verify\
      \ persistence?\n   - After update, re-load file and check changes persisted\n\
      \   - Verify YAML formatting preserved\n\n5. Are error conditions tested?\n\
      \   - Non-existent task IDs\n   - Invalid status transitions\n   - File locking\
      \ failures\n\nREPORT FORMAT:\n- List each issue found\n- Provide specific test\
      \ name and line number\n- Explain why current assertion is insufficient\n- Suggest\
      \ specific improvement\n"
    success_criteria:
    - Audit report identifies any weak assertions
    - Audit confirms edge cases covered
    - Audit validates error path testing
    - Audit verifies no reward hacking patterns
    - If issues found, proceed to audit_002
  - id: audit_002
    name: Fix audit findings
    description: Address test quality issues identified by auditor
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/tests/test_services_task.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: "Fix issues identified in audit report:\n\n1. For each finding:\n  \
      \ - Locate test and assertion\n   - Strengthen assertion per audit recommendation\n\
      \   - Re-run test to verify still passes\n\n2. Add missing tests:\n   - If audit\
      \ identifies uncovered edge case, add test\n   - Follow existing test patterns\n\
      \n3. Improve specificity:\n   - Replace weak assertions with specific field\
      \ checks\n   - Add multi-step verification for complex operations\n\nITERATION:\n\
      - After fixes, audit runs again\n- Maximum 3 iterations (audit-test-fix-loop)\n\
      - Escalate if issues persist after 3 rounds\n"
    success_criteria:
    - All audit findings addressed
    - Tests strengthened with specific assertions
    - Missing tests added
    - Re-run audit passes with no issues
