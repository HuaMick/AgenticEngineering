_template_status: active
plan:
  name: Test Phase - Typer CLI Parity Tests
  worktree: /home/code/AgenticEngineering-typer-test
  branch: typer-test
  status: in_progress
  created: '2026-02-01'
  objective: 'Execute automated parity tests comparing argparse and Typer backends.

    Generate test report with pass/fail for each command.

    '
  phases:
  - id: test-01
    name: Parity Test Suite
    status: completed
    tasks:
    - id: '01'
      name: Create test harness
      description: 'Create Python test harness that:

        1. Runs same command with AGENTIC_USE_TYPER=0 (argparse)

        2. Runs same command with AGENTIC_USE_TYPER=1 (typer)

        3. Compares JSON outputs for equality

        4. Reports differences

        Output: tests/test_typer_parity.py

        '
      status: completed
    - id: '02'
      name: Test global flag ordering
      description: 'Verify the main goal - global flags work in any position:

        - agentic --json plan list (before subcommand)

        - agentic plan list --json (after subcommand)

        - agentic plan --json list (middle)

        - agentic -j plan list -d (mixed)

        All should produce identical JSON output.

        '
      status: completed
    - id: '03'
      name: Test help output
      description: 'Verify help text quality:

        - agentic --help

        - agentic plan --help

        - agentic plan task --help

        Help should be clear and match argparse intent.

        '
      status: completed
    - id: '04'
      name: Test error handling
      description: 'Verify error cases:

        - Missing required arguments

        - Invalid option values

        - Unknown commands

        Errors should be clear and exit with proper codes.

        '
      status: completed
      completion_note: Error handling tests completed - 23 comprehensive test cases
        added
      completed_at: '2026-02-02T21:48:57.870401'
  - id: test-02
    name: Integration Tests
    status: completed
    tasks:
    - id: '01'
      name: Test with real plan folder
      description: 'Use this plan folder (260201TE) as test subject:

        - agentic plan status 260201TE

        - agentic plan task list --plan 260201TE -j

        - agentic plan task current --plan 260201TE

        Verify both backends work correctly.

        '
      status: completed
    - id: '02'
      name: Test CCI bootstrap
      description: 'Test context bootstrap with agent roles:

        - agentic context bootstrap --role build-python -j

        - agentic ctx bootstrap -j

        Verify role resolution and output format.

        '
      status: completed
  test_strategy:
  - type: parity
    scope: Compare argparse vs Typer output for all commands
    location: tests/test_typer_parity.py
  - type: integration
    scope: End-to-end CLI workflows
    location: tests/integration/
