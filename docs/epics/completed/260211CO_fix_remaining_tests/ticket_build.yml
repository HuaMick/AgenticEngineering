- name: Add Typer Input Validation Constraints
  description: 'Add validation callbacks to Typer --status and --priority parameters
    so invalid values are rejected at the CLI layer (matching argparse behavior).

    '
  tickets:
  - id: P2_01
    name: Add validation callbacks for --status and --priority in cli.py
    description: "Fix 2 failures in test_cli_task.py:\n1. test_list_status_rejects_invalid:\
      \ Typer --status is a plain str — Typer\n   accepts any string. Add a Typer\
      \ callback to validate against\n   [\"all\", \"pending\", \"in_progress\", \"\
      completed\"].\n\n2. test_add_priority_rejects_invalid: Same for --priority with\n\
      \   valid values [\"low\", \"medium\", \"high\"].\n\nAdd validation callbacks\
      \ in cli.py near the plan task command definitions. Also update the test assertions:\
      \ Typer error messages use \"Invalid value\" not \"invalid choice\". Update\
      \ tests to check for a more generic error pattern like `code != 0` (already\
      \ checked) and remove the specific message check or broaden it.\n"
    status: pending
    agent: null
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/tests/test_cli_task.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/tests/test_cli_task.py
    guidance: "In cli.py, add validation callbacks near the plan_task_list and plan_task_add\
      \ definitions (around line 1438):\n```python def _validate_status(value: str)\
      \ -> str:\n    valid = [\"all\", \"pending\", \"in_progress\", \"completed\"\
      ]\n    if value not in valid:\n        raise typer.BadParameter(\n         \
      \   f\"Invalid choice: '{value}'. Choose from: {', '.join(valid)}\")\n    return\
      \ value\n\ndef _validate_priority(value: str) -> str:\n    valid = [\"low\"\
      , \"medium\", \"high\"]\n    if value not in valid:\n        raise typer.BadParameter(\n\
      \            f\"Invalid choice: '{value}'. Choose from: {', '.join(valid)}\"\
      )\n    return value\n```\nApply as callback= on the Typer.Option() for the respective\
      \ parameters.\nIn test_cli_task.py, update assertions: - test_list_status_rejects_invalid:\
      \ Change `\"invalid choice\" in stderr.lower()`\n  to `\"invalid\" in stderr.lower()`\
      \ to match both formats\n- test_add_priority_rejects_invalid: Same change\n"
    success_criteria:
    - test_list_status_rejects_invalid exits non-zero for invalid status
    - test_add_priority_rejects_invalid exits non-zero for invalid priority
    - Valid values still accepted (existing passing tests remain green)
