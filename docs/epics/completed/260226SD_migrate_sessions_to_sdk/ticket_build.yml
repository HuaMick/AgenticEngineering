      \ Successful agent run \u2192 SessionResult(status=\"completed\")\n2. Agent\
      \ error \u2192 SessionResult(status=\"failed\")\n3. SDK not installed \u2192\
      \ fallback behavior\n4. Streaming messages are passed to on_message callback\n"
    target_files:
    - modules/AgenticCLI/tests/test_sdk_runner.py
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    success_criteria:
