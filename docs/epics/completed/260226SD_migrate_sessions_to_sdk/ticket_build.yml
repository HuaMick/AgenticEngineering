- name: Phase 5 - SDK Resilience (Retry, Timeout, Stall Detection)
  execution: sequential
  description: 'The SDK migration (Phases 1-4) replaced subprocess spawning but introduced
    a

    critical resilience gap: the SDK path has zero retry logic, no timeouts, and

    treats dropped streaming connections as successful completions. This was

    discovered when an orchestration-planning agent stalled overnight — the API

    stream dropped mid-response (stop_reason=None) and the system silently treated

    the empty result as "completed" instead of retrying.


    This phase adds timeout, retry, and stall detection to close the gap.

    '
  tickets:
  - id: SDK_008
    name: Add timeout to SDK query stream
    description: "In sdk_runner.py run_agent(), wrap the async query() iteration with\n\
      asyncio.wait_for() to enforce a maximum execution time.\n\nImplementation:\n\
      1. Add a `timeout_seconds` parameter to run_agent() (default: 1800 = 30 min)\n\
      2. Wrap the async for loop with asyncio.wait_for(timeout=timeout_seconds)\n\
      3. Catch asyncio.TimeoutError and return SessionResult(status=\"failed\",\n\
      \   result=\"SDK query timed out after {timeout_seconds}s\")\n4. Log timeout\
      \ events at WARNING level\n\nThe timeout should be configurable per-call so\
      \ orchestration can set longer\ntimeouts for complex agents and shorter ones\
      \ for simple explore agents.\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    success_criteria:
    - run_agent() accepts timeout_seconds parameter
    - asyncio.TimeoutError is caught and returns failed SessionResult
    - Default timeout is 1800 seconds (30 minutes)
    - Timeout event is logged at WARNING level
  - id: SDK_009
    name: Detect and reject empty/stalled results
    description: "In sdk_runner.py run_agent(), when the async generator exits without\n\
      yielding a ResultMessage, this currently returns status=\"completed\" with\n\
      empty text. This is the root cause of the silent stall bug.\n\nFix:\n1. After\
      \ the async for loop, if final_result is None (no ResultMessage\n   received),\
      \ return SessionResult(status=\"failed\",\n   result=\"No ResultMessage received\
      \ - stream may have dropped\")\n2. Add a result validation step: if result text\
      \ is empty AND cost_usd is 0,\n   log a WARNING and set status=\"failed\"\n\
      3. Only return status=\"completed\" when a genuine ResultMessage was received\n\
      \nThis ensures dropped connections are detected as failures, not successes.\n"
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    success_criteria:
    - Missing ResultMessage returns status="failed" (not "completed")
    - Empty result + zero cost triggers failure detection
    - Genuine completions still return status="completed"
    - Warning logged for stall detection events
  - id: SDK_010
    name: Add retry logic to _run_via_sdk in planner_loop
    description: "In planner_loop.py _run_via_sdk() (or _run_role_agent()), add retry\
      \ logic\nfor failed SDK executions. Currently it's single-shot with no recovery.\n\
      \nImplementation:\n1. Add max_retries parameter (default: 3) to _run_via_sdk()\n\
      2. On failure (status != \"completed\"), retry with exponential backoff:\n \
      \  - Attempt 1: immediate\n   - Attempt 2: wait 2 seconds\n   - Attempt 3: wait\
      \ 4 seconds\n3. Log each retry at INFO level: \"Retrying SDK agent (attempt\
      \ {n}/{max}): {reason}\"\n4. After all retries exhausted, return the last failure\
      \ result\n5. Do NOT retry on user-initiated cancellation (KeyboardInterrupt)\n\
      \nAlso pass appropriate timeouts to run_agent_sync():\n- explore agents: 600s\
      \ (10 min)\n- story/planner/reviewer agents: 1800s (30 min)\n- orchestration\
      \ agents: 3600s (60 min)\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    success_criteria:
    - Failed SDK calls are retried up to 3 times
    - Exponential backoff between retries (2s, 4s)
    - Each retry is logged with attempt number and failure reason
    - Timeout values are role-appropriate
    - KeyboardInterrupt is not retried
  - id: SDK_011
    name: Add result validation to _process_plan
    description: "In planner_loop.py _process_plan(), add validation of agent results\
      \ after\neach phase. Currently any status=\"completed\" result passes, even\
      \ if\nsuspiciously empty.\n\nImplementation:\n1. After each _run_role_agent()\
      \ call, validate the SessionResult:\n   - Check result.result is not empty (or\
      \ whitespace-only)\n   - Check result.duration_ms > 0\n   - Log a WARNING for\
      \ suspicious results but still accept them\n     (the retry logic in SDK_010\
      \ handles actual failures)\n2. Add a _validate_result(result, role_name) helper\
      \ method\n3. Log result summary at INFO level: \"Agent {role} completed in {duration}ms,\n\
      \   {len(result.result)} chars output\"\n\nThis provides observability into\
      \ agent execution quality without\nadding false-negative rejections.\n"
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    success_criteria:
    - Each agent result is validated after execution
    - Suspicious results (empty text, zero duration) logged as WARNING
    - Result summary logged at INFO level for all executions
    - No false rejections of legitimate results
  - id: SDK_012
    name: Write tests for retry and timeout logic
    description: 'Add tests covering the new resilience features:


      In test_sdk_runner.py:

      1. Test timeout fires and returns failed SessionResult

      2. Test missing ResultMessage returns failed (not completed)

      3. Test empty result + zero cost triggers failure detection

      4. Test genuine completion still works


      In test_planner_loop.py:

      5. Test retry logic: mock first 2 calls as failed, 3rd succeeds

      6. Test retry exhaustion: all 3 attempts fail, returns last failure

      7. Test KeyboardInterrupt is not retried

      8. Test timeout values are passed correctly per role

      9. Test result validation logs warnings for suspicious results

      '
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/tests/test_sdk_runner.py
    - modules/AgenticCLI/tests/test_planner_loop.py
    success_criteria:
    - All new tests pass
    - Timeout, stall detection, and retry paths all covered
    - Both success and failure scenarios tested
    - No regressions in existing tests
