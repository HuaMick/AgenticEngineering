name: SDK Session Migration - Test and UAT Plan
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
objective: "Validate the Claude Agent SDK migration across three test tiers:\n\n1.\
  \ Unit tests: sdk_runner.py in isolation (mocked SDK responses)\n2. Integration\
  \ tests: planner_loop.py SDK execution path and session.py\n   background spawn\
  \ SDK path, both using SDK mocks\n3. UAT: Validate acceptance criteria for affected\
  \ user stories\n   US-CLI-030, US-CLI-031, US-ORCH-011, US-ORCH-014\n\nAll tests\
  \ must pass and story test_status fields must be updated to reflect\nthe validated\
  \ state of the SDK migration.\n"
created: ''
phases:
- name: Phase 1 - SDK Foundation
  execution: sequential
  description: 'Install the Claude Agent SDK and create a thin wrapper layer that

    provides the same interface as the current subprocess spawning but

    uses the SDK internally. This allows incremental migration.

    '
  tickets:
  - id: SDK_001
    name: Add claude-agent-sdk dependency
    description: 'Add claude-agent-sdk to AgenticCLI''s pyproject.toml dependencies.

      Verify installation works. Check minimum version requirements.


      Steps:

      1. Run: pip index versions claude-agent-sdk

      2. Add to pyproject.toml: claude-agent-sdk >= <latest_minor>

      3. pip install -e modules/AgenticCLI

      4. python -c "from claude_agent_sdk import query; print(''OK'')"

      '
    status: completed
    agent: build-python
    target_files:
    - modules/AgenticCLI/pyproject.toml
    success_criteria:
    - claude-agent-sdk is importable
    - pip install -e modules/AgenticCLI succeeds
    - No version conflicts with existing dependencies
  - id: SDK_002
    name: Create SDK session runner module
    description: "Create a new module agenticcli/utils/sdk_runner.py that wraps the\n\
      Claude Agent SDK query() function with the same lifecycle semantics\nas the\
      \ current subprocess approach.\n\nThe module should provide:\n1. async def run_agent(prompt,\
      \ options, on_message=None) -> SessionResult\n   - Streams messages from query()\n\
      \   - Returns SessionResult with status, result_text, cost, usage\n   - Handles\
      \ errors gracefully with fallback path\n\n2. SessionResult dataclass with:\n\
      \   - status: \"completed\" | \"failed\"\n   - result: str (agent output)\n\
      \   - cost_usd: float\n   - duration_ms: int\n   - session_id: str (Claude Code\
      \ session ID)\n\n3. def run_agent_sync(prompt, options) -> SessionResult\n \
      \  - Synchronous wrapper using asyncio.run()\n   - For use in non-async code\
      \ paths\n\nMust include fallback logic:\n```python\ntry:\n    from claude_agent_sdk\
      \ import query, ClaudeAgentOptions\n    SDK_AVAILABLE = True\nexcept ImportError:\n\
      \    SDK_AVAILABLE = False\n```\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    - modules/AgenticCLI/src/agenticcli/utils/state_store.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    success_criteria:
    - sdk_runner.py exists and is importable
    - run_agent_sync() returns SessionResult
    - Graceful fallback when SDK not installed
  - id: SDK_003
    name: Write SDK runner unit tests
    description: 'Create tests for sdk_runner.py using mocked SDK responses.

      Use unittest.mock.AsyncMock for the query() async iterator.


      Test cases:

      1. Successful agent run → SessionResult(status="completed")

      2. Agent error → SessionResult(status="failed")

      3. SDK not installed → fallback behavior

      4. Streaming messages are passed to on_message callback

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    target_files:
    - modules/AgenticCLI/tests/test_sdk_runner.py
    success_criteria:
    - All tests pass
    - Both success and failure paths covered
    - SDK import fallback tested
- name: Phase 2 - Migrate planner_loop.py
  execution: sequential
  description: 'Replace the subprocess-based agent spawning in planner_loop.py with

    the SDK runner. This eliminates PID polling and dead-process detection.

    '
  tickets:
  - id: SDK_004
    name: Replace spawn methods with SDK runner calls
    description: "In planner_loop.py, replace these methods to use sdk_runner:\n-\
      \ spawn_explore_agent() → run agent synchronously, return result\n- spawn_story_agent()\
      \ → same\n- spawn_planner() → same\n- spawn_reviewer() → same\n- _spawn_orchestration_planner()\
      \ → same\n\nThe wait_for_session() method becomes unnecessary — the SDK call\n\
      blocks until completion. Simplify _process_plan() to:\n```python\nresult = run_agent_sync(explore_prompt,\
      \ explore_options)\nif result.status != \"completed\":\n    return False\n#\
      \ No more spawn + wait pattern\n```\n\nCRITICAL: Keep the state file write for\
      \ observability:\n- Still write session state to StateStore\n- But status is\
      \ determined by SDK result, not PID polling\n"
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/utils/sdk_runner.py
    - modules/AgenticCLI/src/agenticcli/commands/session.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    success_criteria:
    - No subprocess.Popen calls in planner_loop.py
    - No PID polling in planner_loop.py
    - State files still written for observability
    - Planning loop processes plan successfully
  - id: SDK_005
    name: Update planner_loop tests
    description: 'Update existing planner_loop tests to mock the SDK runner

      instead of subprocess calls. Remove tests for PID polling

      and dead-process detection.

      '
    status: completed
    agent: build-python
    inputs:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    target_files:
    - modules/AgenticCLI/tests/test_planner_loop.py
    success_criteria:
    - All planner_loop tests pass
    - No subprocess mocking needed
- name: Phase 3 - Migrate session spawn
  execution: sequential
  description: 'Migrate the cmd_spawn function in session.py to use the SDK for

    background sessions. Foreground sessions keep the subprocess approach

