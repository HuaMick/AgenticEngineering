context: 'The AgenticCLI session spawning system currently uses subprocess.Popen to
  launch

  Claude Code sessions and os.kill(pid, 0) to detect when they finish. This leads

  to chronic lifecycle management bugs:


  - Background sessions never update their own status from "running" to "completed"

  - The planner_loop.py relies on dead-PID detection which is fragile and racy

  - Exit codes are never captured for background sessions

  - State files become orphaned when processes die unexpectedly


  The Claude Agent SDK (claude-agent-sdk) provides a native Python API that

  eliminates all of these issues:

  - query() returns an async iterator that naturally terminates when done

  - ResultMessage signals success/failure with structured data

  - No PID polling, no state files, no subprocess management


  This plan migrates the core session spawning and planner loop to use the SDK.

  '
sdk_context:
  target_package: claude-agent-sdk
  docs_url: https://docs.anthropic.com/en/docs/claude-code/sdk
  python_ref: https://docs.anthropic.com/en/docs/agent-sdk/python
