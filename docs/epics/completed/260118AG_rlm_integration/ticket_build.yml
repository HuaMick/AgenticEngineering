      \ detection\n# This agent analyzes structured trace data to identify guidance\
      \ friction patterns\n# It does NOT directly update guidance files (that's teacher-update-guidance)\n\
      \ninputs:\n  agent_type: \"teacher-trace-diagnostics\"\n  version: \"1.0\"\n\
      \n  agent_context:\n    category: \"modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.teacher\"\
      \n    role: \"teacher-trace-diagnostics\"\n\n  # Reference layers (transitive\
