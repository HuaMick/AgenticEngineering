name: teacher-trace-diagnostics-implementation
worktree_path: /home/code/AgenticEngineering
branch: agenticguidance
status: completed
priority: high
objective: 'This plan creates a new teacher agent (teacher-trace-diagnostics) that
  consumes

  LangSmith traces via API and analyzes them for guidance friction patterns.


  The agent is complementary to teacher-update-guidance:

  - teacher-update-guidance: Analyzes agent logs/text output

  - teacher-trace-diagnostics: Analyzes structured LangSmith trace data


  Key challenges addressed:

  - Large trace volumes from subagent orchestration (100s of traces per run)

  - Context window overflow when processing nested trace hierarchies

  - Identifying systematic friction patterns across multiple runs


  RLM TEST CASE: This agent serves as a practical test case for RLM (Recursive

  Language Model) patterns. By using RLM decomposition for trace analysis, we

  validate that RLM patterns work effectively for real-world context management

  scenarios where trace data can flood the context window.


  DEPENDENCY: Requires modules/AgenticLangSmith service wrapper for API access.

  DEPENDENCY: References RLM patterns from plan_live_teach.yml (rlm-patterns.yml,

  rlm-context-accessor.yml when implemented).

  '
created: ''
phases:
