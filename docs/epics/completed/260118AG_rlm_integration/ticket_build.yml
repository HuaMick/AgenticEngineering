- name: 'Phase 3: LangSmith Integration Patterns'
  execution: sequential
  description: 'Document API patterns for trace fetching, including rate limiting,

    filtering, and efficient batch processing.

    '
  tickets:
  - id: td_03_01
    name: Create LangSmith integration examples
    description: 'Create example file showing LangSmith API usage patterns for trace
      analysis.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticLangSmith/src/agenticlangsmith/service.py
    - modules/AgenticLangSmith/src/agenticlangsmith/filters.py
    target_files:
    - modules/AgenticGuidance/assets/examples/teacher/langsmith-trace-analysis.yml
    guidance: "Create example file with practical patterns:\n\n```yaml\n# LangSmith\
      \ Trace Analysis Examples\n# For use by teacher-trace-diagnostics agent\n# Demonstrates\
      \ efficient trace fetching and pattern detection\n\nexamples:\n  basic_trace_fetch:\n\
      \    description: \"Fetch recent runs from a project\"\n    code: |\n      from\
      \ agenticlangsmith.service import LangSmithService\n\n      service = LangSmithService()\
      \  # Uses LANGSMITH_API_KEY env var\n      runs = service.list_runs(\n     \
      \     project_name=\"my-agent-project\",\n          limit=50\n      )\n\n  \
      \    for run in runs:\n          print(f\"{run['name']}: {run['status']} ({run['latency']:.2f}s)\"\
      )\n\n  filtered_error_fetch:\n    description: \"Fetch only runs with errors\
      \ for clustering analysis\"\n    code: |\n      from agenticlangsmith.service\
      \ import LangSmithService\n      from agenticlangsmith.filters import build_error_filter,\
      \ build_time_filter, combine_filters\n      from datetime import datetime, timedelta\n\
      \n      service = LangSmithService()\n\n      # Build combined filter: errors\
      \ in last 24 hours\n      time_filter = build_time_filter(start=datetime.now()\
      \ - timedelta(hours=24))\n      error_filter = build_error_filter(has_error=True)\n\
      \      combined = combine_filters(time_filter, error_filter)\n\n      error_runs\
      \ = service.list_runs(\n          project_name=\"my-agent-project\",\n     \
      \     filter_expr=combined,\n          limit=100\n      )\n\n  hierarchical_trace_analysis:\n\
      \    description: \"Analyze parent runs then drill into children\"\n    code:\
      \ |\n      from agenticlangsmith.service import LangSmithService\n      from\
      \ agenticlangsmith.filters import build_latency_filter\n\n      service = LangSmithService()\n\
      \n      # Step 1: Get top-level runs (no parent)\n      top_runs = service.list_runs(\n\
      \          project_name=\"my-agent-project\",\n          limit=50\n      )\n\
      \n      # Step 2: Identify anomalous runs (high latency or errors)\n      anomalous\
      \ = [r for r in top_runs if r['status'] == 'error' or (r['latency'] and r['latency']\
      \ > 60)]\n\n      # Step 3: Fetch children only for anomalous runs\n      for\
      \ parent in anomalous:\n          children = service.list_runs(\n          \
      \    project_name=\"my-agent-project\",\n              filter_expr=f\"eq(parent_run_id,\
      \ '{parent['id']}')\",\n              limit=100\n          )\n          # Analyze\
      \ child patterns...\n\n  backtracking_detection:\n    description: \"Detect\
      \ backtracking pattern in trace sequence\"\n    pattern: |\n      Backtracking\
      \ is detected when:\n      1. Same resource (file, URL, etc.) appears multiple\
      \ times in tool calls\n      2. No productive change between accesses\n    \
      \  3. Pattern suggests confusion rather than legitimate re-check\n\n    code:\
      \ |\n      def detect_backtracking(runs, window_size=10):\n          \"\"\"\
      Analyze run sequence for backtracking patterns.\"\"\"\n          findings =\
      \ []\n          resource_access = {}  # resource -> [access_indices]\n\n   \
      \       for i, run in enumerate(runs):\n              # Extract resource from\
      \ run (file path, URL, etc.)\n              resource = extract_resource(run)\n\
      \              if not resource:\n                  continue\n\n            \
      \  if resource in resource_access:\n                  previous = resource_access[resource]\n\
      \                  # Check if this is a revisit within window\n            \
      \      if i - previous[-1] <= window_size:\n                      # Check if\
      \ productive change between accesses\n                      if not has_productive_change(runs[previous[-1]:i]):\n\
      \                          findings.append({\n                             \
      \ 'pattern': 'backtracking',\n                              'resource': resource,\n\
      \                              'first_access': previous[-1],\n             \
      \                 'revisit': i,\n                              'run_ids': [runs[previous[-1]]['id'],\
      \ run['id']]\n                          })\n                  previous.append(i)\n\
      \              else:\n                  resource_access[resource] = [i]\n\n\
      \          return findings\n\n  token_anomaly_detection:\n    description: \"\
      Identify runs with abnormal token consumption\"\n    code: |\n      import statistics\n\
      \n      def detect_token_anomalies(runs, std_threshold=2.0):\n          \"\"\
      \"Flag runs with token usage > std_threshold standard deviations.\"\"\"\n  \
      \        findings = []\n\n          # Calculate statistics\n          token_counts\
      \ = [r['total_tokens'] for r in runs if r['total_tokens']]\n          if len(token_counts)\
      \ < 5:\n              return findings  # Not enough data\n\n          mean =\
      \ statistics.mean(token_counts)\n          std = statistics.stdev(token_counts)\n\
      \          threshold = mean + (std_threshold * std)\n\n          for run in\
      \ runs:\n              if run['total_tokens'] and run['total_tokens'] > threshold:\n\
      \                  deviation = (run['total_tokens'] - mean) / std\n        \
      \          severity = 'CRITICAL' if deviation > 3 else 'HIGH' if deviation >\
      \ 2.5 else 'MEDIUM'\n                  findings.append({\n                 \
      \     'pattern': 'token_anomaly',\n                      'run_id': run['id'],\n\
      \                      'run_name': run['name'],\n                      'tokens':\
      \ run['total_tokens'],\n                      'mean': mean,\n              \
      \        'std_deviations': round(deviation, 2),\n                      'severity':\
      \ severity\n                  })\n\n          return findings\n\n  rate_limiting:\n\
      \    description: \"Respect API rate limits when processing many runs\"\n  \
      \  code: |\n      import time\n\n      def fetch_with_rate_limit(service, project_name,\
      \ total_limit=500, batch_size=50, delay_seconds=1):\n          \"\"\"Fetch runs\
      \ in batches with rate limiting.\"\"\"\n          all_runs = []\n          offset\
      \ = 0\n\n          while len(all_runs) < total_limit:\n              batch =\
      \ service.list_runs(\n                  project_name=project_name,\n       \
      \           limit=min(batch_size, total_limit - len(all_runs))\n           \
      \   )\n              if not batch:\n                  break\n\n            \
      \  all_runs.extend(batch)\n              offset += len(batch)\n\n          \
      \    # Rate limit delay\n              if len(all_runs) < total_limit:\n   \
      \               time.sleep(delay_seconds)\n\n          return all_runs\n\nanti_patterns:\n\
      \  - name: \"Loading full inputs/outputs for all traces\"\n    problem: \"Inputs\
      \ and outputs can be very large, causing context overflow\"\n    solution: \"\
      Load inputs/outputs only for specific traces being investigated\"\n\n  - name:\
      \ \"Fetching all traces then filtering in memory\"\n    problem: \"Wastes API\
      \ calls and memory\"\n    solution: \"Use LangSmith filter expressions to filter\
      \ server-side\"\n\n  - name: \"Ignoring rate limits\"\n    problem: \"Can get\
      \ rate-limited or banned\"\n    solution: \"Add delays between batch requests,\
      \ use batch_size parameter\"\n\n  - name: \"Treating all errors equally\"\n\
      \    problem: \"Floods recommendations with low-priority items\"\n    solution:\
      \ \"Use severity classification to prioritize findings\"\n```\n"
    success_criteria:
    - File exists at modules/AgenticGuidance/assets/examples/teacher/langsmith-trace-analysis.yml
    - Contains basic_trace_fetch example with code
    - Contains filtered_error_fetch example using filter builders
    - Contains hierarchical_trace_analysis example
    - Contains backtracking_detection example with code
    - Contains token_anomaly_detection example with code
    - Contains rate_limiting example
    - Contains anti_patterns section with 4 items
