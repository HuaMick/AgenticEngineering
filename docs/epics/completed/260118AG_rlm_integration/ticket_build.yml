- name: 'Phase 2: Trace Analysis Definitions'
  execution: sequential
  description: 'Create shared definitions for trace diagnostics patterns.

    These definitions can be reused by other agents analyzing trace data.

    '
  tickets:
  - id: td_02_01
    name: Create trace-diagnostics.yml definition file
    description: 'Create shared definition file for trace diagnostics concepts.

      Place in assets/definitions/ for cross-agent reuse.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/inputs.yml
    target_files:
    - modules/AgenticGuidance/assets/definitions/trace-diagnostics.yml
    guidance: "Create definition file extracting generalizable concepts from inputs.yml:\n\
      \n```yaml\n# Trace Diagnostics Definitions\n# Shared concepts for analyzing\
      \ agent execution traces\n# Used by: teacher-trace-diagnostics, potentially\
      \ test-audit, planner-guidance\n\ntrace_diagnostics:\n  definition: |\n    Analysis\
      \ of structured execution traces (e.g., LangSmith runs) to identify\n    patterns\
      \ indicating guidance friction. Unlike log analysis which examines\n    text\
      \ output, trace diagnostics examines structured metadata: timing, hierarchy,\n\
      \    error status, and token consumption.\n\n  trace_sources:\n    langsmith:\n\
      \      description: \"LangSmith tracing platform\"\n      data_available:\n\
      \        - \"Run hierarchy (parent/child relationships)\"\n        - \"Timing\
      \ (start_time, end_time, latency)\"\n        - \"Token counts (prompt, completion,\
      \ total)\"\n        - \"Error status and messages\"\n        - \"Tags and metadata\"\
      \n        - \"Inputs and outputs (optional, can be large)\"\n      access_pattern:\
      \ \"API via langsmith Python SDK\"\n\n  friction_pattern_taxonomy:\n    description:\
      \ |\n      Classification of friction patterns detectable in trace data.\n \
      \     Each pattern type maps to a guidance improvement type.\n\n    patterns:\n\
      \      - name: \"backtracking\"\n        signal: \"Agent revisits previous decisions\"\
      \n        implies: \"Path is unclear - agent doesn't know next step\"\n    \
      \    remediation: \"path_clarity\"\n\n      - name: \"error_cluster\"\n    \
      \    signal: \"Same errors repeat across runs\"\n        implies: \"Fence is\
      \ missing - no guardrail preventing error\"\n        remediation: \"fence_strengthening\"\
      \n\n      - name: \"path_ambiguity\"\n        signal: \"Agent hesitates or tries\
      \ multiple approaches\"\n        implies: \"Signpost is missing - no example\
      \ showing approach\"\n        remediation: \"signpost_addition\"\n\n      -\
      \ name: \"token_anomaly\"\n        signal: \"Token consumption far exceeds norm\"\
      \n        implies: \"Context is bloated - too much unnecessary input\"\n   \
      \     remediation: \"context_minimisation\"\n\n  analysis_strategies:\n    hierarchical_sampling:\n\
      \      description: |\n        Process traces in layers: top-level summaries\
