  - id: td_01_02
    name: Create agent process.yml
    description: 'Create process.yml with goal, inputs, outputs, steps, and guidelines.

      Follow teacher-update-guidance/process.yml structure.

      '
    status: completed
    agent: null
    inputs:
    - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
    - modules/AgenticLangSmith/src/agenticlangsmith/service.py
    target_files:
    - modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml
    guidance: "Create process.yml with:\n\n```yaml\nprocess:\n  goal: |\n    Analyze\
      \ LangSmith traces to identify guidance friction patterns and generate\n   \
      \ structured recommendations for improving agent paths, fences, and signposts.\n\
      \    This agent examines trace structure, timing, and error patterns rather\
      \ than\n    raw text logs.\n\n  loop_context:\n    participates_in:\n      -\
      \ \"guidance-test-loop\"\n    loop_definition: \"modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.guidance-test-loop\"\
      \n    note: |\n      Operates at meta-level analyzing trace data. Can be invoked\
      \ after orchestration\n      runs to identify systematic friction patterns across\
      \ multiple agent executions.\n\n  inputs:\n    - location: \"modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/inputs.yml\"\
      \n      description: \"Trace diagnostics configuration and friction pattern\
      \ definitions\"\n\n  outputs:\n    - name: \"trace_diagnostics_report\"\n  \
      \    format: \"yaml\"\n      location: \"Returned to orchestrator or written\
      \ to plan audit folder\"\n      schema:\n        analysis_summary:\n       \
      \   traces_analyzed: \"integer\"\n          time_range: \"string - ISO date\
      \ range\"\n          project_name: \"string\"\n          friction_patterns_detected:\
      \ \"integer\"\n        friction_findings:\n          - id: \"string - unique\
      \ finding ID\"\n            pattern_type: \"enum(backtracking, error_cluster,\
      \ path_ambiguity, token_anomaly)\"\n            severity: \"enum(CRITICAL, HIGH,\
      \ MEDIUM, LOW)\"\n            trace_ids: \"array - LangSmith trace IDs exhibiting\
      \ pattern\"\n            description: \"string - what was detected\"\n     \
      \       evidence:\n              - trace_id: \"string\"\n                run_name:\
      \ \"string\"\n                indicator: \"string - specific observation\"\n\
      \            affected_guidance:\n              - file: \"string - path to guidance\
      \ file\"\n                section: \"string - relevant section\"\n         \
      \   recommendation:\n              type: \"enum(path_clarity, signpost_addition,\
      \ fence_strengthening, example_improvement)\"\n              proposed_change:\
      \ \"string\"\n              rationale: \"string\"\n        statistics:\n   \
      \       error_rate: \"float - percentage of runs with errors\"\n          avg_latency:\
      \ \"float - seconds\"\n          total_tokens: \"integer\"\n          backtracking_rate:\
      \ \"float - percentage of runs with backtracking\"\n\n  steps:\n    - |\n  \
      \    STEP 1: VALIDATE INPUTS AND CONFIGURATION\n\n      1. Load inputs.yml and\
      \ verify all required inputs are accessible\n      2. Confirm LangSmith API\
      \ is available (LANGSMITH_API_KEY environment variable)\n      3. Identify target\
      \ project name from inputs or use default\n      4. Determine analysis scope:\n\
      \         - Time range (default: last 24 hours)\n         - Run limit (default:\
      \ 100 runs, max: 500)\n         - Run type filter (default: all types)\n\n \
      \     If LangSmith API is unavailable, STOP and report configuration error.\n\
      \n    - |\n      STEP 2: FETCH AND FILTER TRACES\n\n      Using AgenticLangSmith\
      \ service:\n      1. Call list_runs() with project_name and limit\n      2.\
      \ For each top-level run, fetch child runs to build trace hierarchy\n      3.\
      \ Apply pre-filters to reduce data volume:\n         - Exclude runs shorter\
      \ than 1 second (likely trivial)\n         - Prioritize runs with errors for\
      \ detailed analysis\n         - Sample long-running traces for latency patterns\n\
      \n      CONTEXT MANAGEMENT via RLM DECOMPOSITION:\n      This agent uses RLM\
      \ (Recursive Language Model) patterns for context management.\n      Reference:\
      \ modules/AgenticGuidance/assets/definitions/rlm-patterns.yml (when implemented)\n\
      \n      RLM Pattern for Trace Analysis:\n      1. STORE CONTEXT: Store trace\
      \ metadata as environment variables\n         - CONTEXT_TRACES_SUMMARIES: Top-level\
      \ run summaries (id, name, status, latency, tokens)\n         - CONTEXT_TRACES_ERRORS:\
      \ Runs with error status\n         - CONTEXT_TRACES_ANOMALIES: Runs flagged\
      \ for detailed analysis\n\n      2. PROGRAMMATIC ACCESS: Write code to examine\
      \ and filter\n         - filter_by_error(): Extract error runs from CONTEXT_TRACES_SUMMARIES\n\
      \         - filter_by_latency(threshold): Extract high-latency runs\n      \
      \   - filter_by_tokens(std_dev): Extract token anomalies\n\n      3. RECURSIVE\
      \ DECOMPOSITION: Process large sets in subsets\n         - If >100 traces: Decompose\
      \ by time window (1-hour chunks)\n         - If >500 traces: Decompose by run\
      \ type first, then time\n         - Each subset processed independently, results\
      \ accumulated\n\n      4. ACCUMULATOR PATTERN: Collect findings progressively\n\
      \         - ACCUMULATOR_FRICTION_FINDINGS: List of detected patterns\n     \
      \    - ACCUMULATOR_STATISTICS: Aggregate metrics\n         - FINAL(trace_diagnostics_report):\
      \ Signal completion\n\n      Never load full inputs/outputs for all traces simultaneously.\n\
      \n    - |\n      STEP 3: DETECT FRICTION PATTERNS\n\n      Apply pattern detection\
      \ algorithms defined in inputs.yml:\n\n      A. BACKTRACKING DETECTION\n   \
      \      - Identify runs where agent revisits previous tool calls\n         -\
      \ Look for repeated file reads without intervening writes\n         - Detect\
      \ undo patterns (delete followed by recreate)\n         - Threshold: >2 revisits\
      \ to same resource = backtracking\n\n      B. ERROR CLUSTERING\n         - Group\
      \ errors by error message similarity\n         - Identify recurring error types\
      \ across runs\n         - Track error recovery patterns (retry success rate)\n\
      \         - Threshold: >3 similar errors across runs = cluster\n\n      C. PATH\
      \ AMBIGUITY\n         - Detect hesitation: long pauses between tool calls (>30s)\n\
      \         - Identify multiple attempts at same step\n         - Look for tool\
      \ call sequences that suggest confusion\n         - Threshold: >2 attempts at\
      \ same logical step = ambiguity\n\n      D. TOKEN CONSUMPTION ANOMALY\n    \
      \     - Flag traces with token usage >2x median\n         - Identify runs with\
      \ excessive prompt tokens (bloated context)\n         - Detect runs with minimal\
      \ completion tokens (truncated outputs)\n         - Threshold: >2 standard deviations\
      \ from mean = anomaly\n\n    - |\n      STEP 4: MAP FRICTION TO GUIDANCE\n\n\
      \      For each detected friction pattern:\n      1. Identify the agent that\
      \ exhibited the pattern (from trace name/tags)\n      2. Locate the agent's\
      \ guidance files:\n         - process.yml at modules/AgenticGuidance/agents/<category>/<agent>/\n\
      \         - inputs.yml at same location\n         - Referenced definitions and\
      \ guidelines\n      3. Map the friction type to guidance improvement type:\n\
      \         - backtracking -> path_clarity (unclear next steps)\n         - error_cluster\
      \ -> fence_strengthening (missing guardrails)\n         - path_ambiguity ->\
      \ signpost_addition (missing examples)\n         - token_anomaly -> context_minimisation\
      \ (bloated inputs)\n\n    - |\n      STEP 5: GENERATE RECOMMENDATIONS\n\n  \
      \    For each friction finding:\n      1. Create structured recommendation with:\n\
      \         - Unique ID (format: TD-YYYYMMDD-NNN)\n         - Pattern type and\
      \ severity\n         - Evidence (trace IDs, specific observations)\n       \
      \  - Affected guidance file and section\n         - Proposed change with rationale\n\
      \      2. Prioritize by severity:\n         - CRITICAL: Errors preventing task\
      \ completion\n         - HIGH: Errors requiring manual recovery\n         -\
      \ MEDIUM: Inefficiencies (backtracking, high tokens)\n         - LOW: Minor\
      \ hesitations, style issues\n      3. De-duplicate similar recommendations\n\
      \n    - |\n      STEP 6: OUTPUT DIAGNOSTICS REPORT\n\n      Generate trace_diagnostics_report\
      \ with:\n      1. analysis_summary: scope, counts, time range\n      2. friction_findings:\
      \ ordered by severity\n      3. statistics: aggregate metrics for the analyzed\
      \ traces\n\n      If invoked by orchestrator, return structured output.\n  \
      \    If invoked standalone, write to plan audit folder.\n\n  guidelines:\n \
      \   - |\n      TRACE SAMPLING: Never attempt to load all trace data at once.\n\
      \      Use hierarchical sampling: summaries first, details on demand.\n    -\
      \ |\n      EVIDENCE-BASED: Every recommendation must cite specific trace IDs\n\
      \      and observations. Avoid generic suggestions without evidence.\n    -\
      \ |\n      COMPLEMENTARY ROLE: This agent identifies friction patterns in traces.\n\
      \      It does NOT directly modify guidance files - teacher-update-guidance\n\
      \      consumes these recommendations to make changes.\n    - |\n      THRESHOLD\
      \ DISCIPLINE: Use defined thresholds consistently.\n      Do not lower thresholds\
      \ to find more patterns - maintain signal quality.\n    - |\n      RATE LIMITING:\
      \ Respect LangSmith API rate limits.\n      Add delays between batch requests\
      \ if needed.\n```\n"
    success_criteria:
    - File exists at modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml
    - Contains goal explaining trace analysis purpose
    - Contains loop_context referencing guidance-test-loop
    - Contains inputs referencing inputs.yml
    - Contains outputs with trace_diagnostics_report schema
    - Contains 6 steps covering validate, fetch, detect, map, recommend, output
    - Contains guidelines with at least 5 items
    - Step 2 includes context management for large trace volumes
    - Step 3 defines 4 friction pattern detection algorithms with thresholds
  - id: td_01_03
