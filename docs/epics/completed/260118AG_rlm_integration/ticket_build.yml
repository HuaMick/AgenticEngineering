      \n      description: \"Root-cause analysis patterns for diagnosing friction\"\
      \n      required: true\n\n    # Context minimisation - for token anomaly recommendations\n\
      \    - type: file\n      path: \"modules/AgenticGuidance/assets/guidelines/context-minimisation.yml\"\
      \n      description: \"Context minimisation patterns (for token anomaly recommendations)\"\
      \n      required: true\n\n  # LangSmith integration configuration\n  langsmith_config:\n\
      \    service_module: \"modules/AgenticLangSmith/src/agenticlangsmith/service.py\"\
      \n    filters_module: \"modules/AgenticLangSmith/src/agenticlangsmith/filters.py\"\
      \n    api_key_env: \"LANGSMITH_API_KEY\"\n    default_project: null  # Use LangSmith\
      \ default if not specified\n    rate_limit:\n      requests_per_minute: 60\n\
      \      batch_size: 50\n\n  # Analysis scope defaults\n  analysis_defaults:\n\
      \    time_range_hours: 24\n    run_limit: 100\n    max_run_limit: 500\n    min_run_duration_seconds:\
      \ 1.0\n    include_child_runs: true\n    run_types: null  # null = all types\n\
      \n  # Friction pattern definitions\n  definitions:\n    trace_diagnostics_role:\
      \ |\n      As a teacher-trace-diagnostics agent:\n      - You analyze LangSmith\
      \ trace data to identify friction patterns\n      - You detect backtracking,\
      \ error clusters, path ambiguity, and token anomalies\n      - You map friction\
      \ patterns to affected guidance files\n      - You generate structured recommendations\
      \ with evidence\n      - You do NOT directly modify guidance files\n      -\
      \ You do NOT replace teacher-update-guidance (you provide it with insights)\n\
      \      - You respect API rate limits and context window constraints\n\n    friction_patterns:\n\
      \      backtracking:\n        definition: |\n          Agent revisits previous\
      \ decisions or resources without making progress.\n          Indicates unclear\
      \ path or missing signposts about next steps.\n        indicators:\n       \
      \   - \"Repeated reads of same file without intervening writes\"\n         \
      \ - \"Undo patterns: delete followed by recreate\"\n          - \"Loop iterations\
      \ that produce same output\"\n          - \"Tool calls that reverse previous\
      \ tool calls\"\n        threshold:\n          min_revisits: 2\n          window_size:\
      \ 10  # Look at last N tool calls\n        severity_mapping:\n          \"2-3\
      \ revisits\": \"MEDIUM\"\n          \"4-5 revisits\": \"HIGH\"\n          \"\
      >5 revisits\": \"CRITICAL\"\n        guidance_type: \"path_clarity\"\n\n   \
      \   error_cluster:\n        definition: |\n          Same or similar errors\
      \ occur across multiple runs.\n          Indicates missing fence (guardrail)\
      \ or inadequate error guidance.\n        indicators:\n          - \"Error messages\
      \ with same root cause across runs\"\n          - \"Repeated failures at same\
      \ step type\"\n          - \"Timeout errors suggesting stuck patterns\"\n  \
      \        - \"Permission/access errors suggesting missing setup guidance\"\n\
      \        threshold:\n          min_occurrences: 3\n          similarity_threshold:\
      \ 0.8  # Cosine similarity of error messages\n        severity_mapping:\n  \
      \        \"3-5 occurrences\": \"MEDIUM\"\n          \"6-10 occurrences\": \"\
      HIGH\"\n          \">10 occurrences\": \"CRITICAL\"\n        guidance_type:\
      \ \"fence_strengthening\"\n\n      path_ambiguity:\n        definition: |\n\
      \          Agent hesitates or makes multiple attempts at the same logical step.\n\
      \          Indicates missing signpost (example) showing the expected approach.\n\
      \        indicators:\n          - \"Long pauses between tool calls (>30 seconds)\"\
      \n          - \"Multiple attempts at same tool with different parameters\"\n\
      \          - \"Abandoned tool calls (started but not completed)\"\n        \
      \  - \"Sequential reads of many files suggesting search behavior\"\n       \
      \ threshold:\n          pause_seconds: 30\n          max_attempts: 2\n     \
      \   severity_mapping:\n          \"2 attempts\": \"LOW\"\n          \"3 attempts\"\
      : \"MEDIUM\"\n          \">3 attempts\": \"HIGH\"\n        guidance_type: \"\
      signpost_addition\"\n\n      token_anomaly:\n        definition: |\n       \
      \   Trace consumes significantly more tokens than typical runs.\n          Indicates\
      \ bloated context, excessive verbosity, or inefficient prompting.\n        indicators:\n\
      \          - \"Total tokens >2x median for run type\"\n          - \"Prompt\
      \ tokens dominate (>80% of total)\"\n          - \"Completion truncated due\
      \ to token limit\"\n          - \"Repeated inclusion of same context in child\
      \ runs\"\n        threshold:\n          std_deviations: 2.0\n          prompt_ratio_max:\
      \ 0.8\n        severity_mapping:\n          \"2-3 std dev\": \"MEDIUM\"\n  \
      \        \">3 std dev\": \"HIGH\"\n          \"truncated output\": \"CRITICAL\"\
      \n        guidance_type: \"context_minimisation\"\n\n    recommendation_templates:\n\
      \      path_clarity:\n        focus: \"Make next steps clearer in process.yml\"\
      \n        typical_changes:\n          - \"Add explicit step transitions\"\n\
      \          - \"Clarify when to proceed vs. when to iterate\"\n          - \"\
      Add decision criteria for branching paths\"\n\n      fence_strengthening:\n\
      \        focus: \"Add guardrails to prevent common errors\"\n        typical_changes:\n\
      \          - \"Add validation steps before risky operations\"\n          - \"\
      Add error handling guidance\"\n          - \"Add pre-conditions checklist\"\n\
      \n      signpost_addition:\n        focus: \"Add examples showing expected approach\"\
      \n        typical_changes:\n          - \"Add inline examples in process steps\"\
      \n          - \"Add example files in assets/examples/\"\n          - \"Add 'good\
      \ vs bad' comparisons\"\n\n      context_minimisation:\n        focus: \"Reduce\
      \ unnecessary context in inputs\"\n        typical_changes:\n          - \"\
      Remove unused input references\"\n          - \"Add filters to load only relevant\
      \ sections\"\n          - \"Split large inputs into demand-loaded parts\"\n\
      ```\n"
