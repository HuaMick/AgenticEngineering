stories:
  - id: US-001
    title: "As a developer using the agentic CLI, I want the dead `agentic plan` command tree removed so that --help only shows working commands and I am not confused by deprecated entries that produce errors"
    acceptance_criteria:
      - "Given a fresh install of the CLI, when I run `agentic --help`, then the output does not contain a 'plan' command group"
      - "Given the plan commands are removed, when I run `agentic plan`, then I receive a clear 'command not found' error rather than a misleading sub-help menu"
      - "Given the plan commands are removed, when I run `agentic agent --help`, then the output does not contain a 'plan' subcommand group"
    related_agents:
      - "build-python"
    related_commands:
      - "agentic plan"
      - "agentic agent plan"

  - id: US-002
    title: "As an agent bootstrapping via the CLI, I want only working command trees registered so that automated agents do not waste turns invoking deprecated plan commands that return errors"
    acceptance_criteria:
      - "Given an agent reads CLI --help output to discover commands, when it parses available commands, then no plan-prefixed commands appear in the listing"
      - "Given an agent previously used `agentic plan task list`, when it runs against the updated CLI, then it receives a clear failure indicating the command no longer exists rather than a silent error or partial output"
    related_agents:
      - "build-python"
      - "planner-explore"
    related_commands:
      - "agentic epic ticket list"
      - "agentic epic phase list"

  - id: US-003
    title: "As a developer working on the question system, I want find_plan_folder and has_pending_questions safely stubbed so that question.py and session.py continue to function without crashing when plan infrastructure is removed"
    acceptance_criteria:
      - "Given find_plan_folder is stubbed, when question.py imports and calls find_plan_folder(), then it receives a clear error message and controlled exit instead of an unhandled exception"
      - "Given has_pending_questions is stubbed, when session.py calls has_pending_questions() during session startup, then it returns False without errors and the session proceeds normally"
      - "Given both stubs exist, when I import plan.py, then no ImportError or missing dependency occurs"
    related_agents:
      - "build-python"
    related_commands:
      - "agentic agent question"

  - id: US-004
    title: "As a codebase maintainer, I want dead plan.py code removed and helper functions consolidated in epic.py so that there is a single source of truth for agent-type and loop-type definitions"
    acceptance_criteria:
      - "Given handle() is removed from plan.py, when I grep the codebase for plan.handle, then no production code references it"
      - "Given get_valid_agent_types and get_valid_loop_types are removed from plan.py, when any module needs agent types, then it imports from epic.py exclusively"
      - "Given plan.py is cleaned up, when I inspect the module, then it contains only the two stub functions (find_plan_folder, has_pending_questions) with a clear docstring explaining their purpose"
    related_agents:
      - "build-python"
    related_commands: []

  - id: US-005
    title: "As a developer running the test suite, I want test files to have correct names reflecting what they test and all imports updated so that no tests break from the plan removal and test names match their actual coverage"
    acceptance_criteria:
      - "Given plan.py functions are stubbed or removed, when I run the full AgenticCLI test suite, then all tests pass or have valid skip reasons unrelated to plan removal"
      - "Given plan.py functions are stubbed or removed, when I run the full AgenticGuidance test suite, then all tests pass or have valid skip reasons unrelated to plan removal"
      - "Given test files that test epic functionality have misleading plan_ prefixes, when the rename is complete, then files like test_plan_new.py become test_epic_new.py and all cross-references are updated"
      - "Given test_plan_resurrection.py imports find_plan_folder, when the stub is in place, then the tests mock the stub appropriately and continue to validate TinyDB path reconciliation logic"
    related_agents:
      - "build-python"
      - "test-runner"
    related_commands: []

  - id: US-006
    title: "As a developer reading agent guidance files and documentation, I want all references to `agentic plan` commands replaced with `agentic epic` equivalents so that documentation is accurate and does not point to non-existent commands"
    acceptance_criteria:
      - "Given guidance files previously referenced `agentic plan` commands, when I grep for 'agentic plan' in guidance and docs, then no stale references remain"
      - "Given question.py prints usage strings mentioning plan commands, when those strings are updated, then they reference current command paths or are removed"
      - "Given session.py references 'agentic question list', when the reference is updated, then it points to the current working command or is removed"
    related_agents:
      - "build-python"
    related_commands:
      - "agentic epic"

  - id: US-007
    title: "As an operator validating a release, I want end-to-end verification that all epic commands are unaffected and all plan commands are confirmed absent so that I have confidence the decommission was clean with no regressions"
    acceptance_criteria:
      - "Given the plan removal is complete, when I run `agentic epic list`, then it returns correct epic data with no errors"
      - "Given the plan removal is complete, when I run `agentic epic ticket list --epic <folder>`, then it returns correct ticket data"
      - "Given the plan removal is complete, when I run `agentic epic phase list --epic <folder>`, then it returns correct phase data"
      - "Given the plan removal is complete, when I run `agentic plan` or `agentic agent plan`, then neither command is recognized"
      - "Given the plan removal is complete, when I run `python3 -c 'from agenticcli.cli import app'`, then no ImportError or NameError occurs"
    related_agents:
      - "test-runner"
    related_commands:
      - "agentic epic list"
      - "agentic epic ticket list"
      - "agentic epic phase list"
