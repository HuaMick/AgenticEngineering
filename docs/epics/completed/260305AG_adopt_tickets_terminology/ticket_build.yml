name: adopt_tickets_terminology
worktree_path: ''
branch: main
status: active
priority: high
objective: 'Migrate the codebase from using the ''tasks'' key to ''tickets'' key as
  the

  canonical terminology for work items within epic phases. The YAML schema

  already uses ''tickets'' but several code paths look for ''tasks'' only,

  causing tickets to be invisible. After fixing with fallback, do a clean

  break: remove all fallback patterns so the codebase uses ONLY ''tickets''.

  '
created: ''
phases:
- name: Implementation Phase
  execution: sequential
  description: 'Update the four files that use ONLY phase.get("tasks", [])

    to use the canonical fallback pattern: phase.get("tickets", phase.get("tasks",
    [])).

    This ensures both old YAML files (with "tasks" key) and new YAML files

    (with "tickets" key) are handled correctly.

    '
  tickets:
  - id: build_001
    name: Fix ticket.py — adopt tickets key with tasks fallback
    description: 'Update TicketService in ticket.py to read ''tickets'' key first,

      falling back to ''tasks'' for backward compatibility.

      '
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/ticket.py
    guidance: "WHAT TO CHANGE:\nThere are 4 locations in ticket.py that use phase.get(\"\
      tasks\", []).\nEach must be updated to phase.get(\"tickets\", phase.get(\"tasks\"\
      , [])).\n\nSPECIFIC LINES (verify before editing — line numbers may shift):\n\
      - Line 199: tasks = phase.get(\"tasks\", [])\n- Line 247: tasks = phase.get(\"\
      tasks\", [])\n- Line 296: tasks = phase.get(\"tasks\", [])\n- Line 365: tasks\
      \ = phase.get(\"tasks\", [])\n\nPATTERN TO APPLY:\n  # Before:\n  tasks = phase.get(\"\
      tasks\", [])\n  # After:\n  tasks = phase.get(\"tickets\", phase.get(\"tasks\"\
      , []))\n\nREFERENCE: epic.py already uses this pattern correctly.\nDo NOT rename\
      \ the local variable `tasks` — it refers to the list items,\nand renaming it\
      \ would cascade through many lines unnecessarily.\n\nBACKWARD COMPATIBILITY:\
      \ The fallback to \"tasks\" ensures old YAML files\nthat still use the \"tasks\"\
      \ key continue to work.\n"
    completed_date: '2026-03-06'
    success_criteria:
    - All 4 occurrences of phase.get('tasks', []) in ticket.py replaced with fallback
      pattern
    - No other changes to ticket.py logic
    - Existing tests still pass
  - id: build_002
    name: Fix context.py — adopt tickets key with tasks fallback
    description: 'Update MainFirstEpicResolver in context.py to read ''tickets'' key
      first.

      '
    status: completed
    agent: builder
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/context.py
    - modules/AgenticGuidance/src/agenticguidance/services/epic.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/context.py
    guidance: "WHAT TO CHANGE:\nThere is 1 location in context.py that uses phase.get(\"\
      tasks\", []).\n\nSPECIFIC LINE (verify before editing):\n- Line 258: for task\
      \ in phase.get(\"tasks\", []):\n\nPATTERN TO APPLY:\n  # Before:\n  for task\
      \ in phase.get(\"tasks\", []):\n  # After:\n  for task in phase.get(\"tickets\"\
      , phase.get(\"tasks\", [])):\n"
    completed_date: '2026-03-06'
    success_criteria:
    - The single occurrence of phase.get('tasks', []) in context.py replaced with
      fallback pattern
    - No other changes to context.py logic
  - id: build_003
    name: Fix ralph.py — adopt tickets key with tasks fallback
    description: 'Update RalphService._parse_plan_stats() in ralph.py to read ''tickets''
      key first.

      '
    status: completed
