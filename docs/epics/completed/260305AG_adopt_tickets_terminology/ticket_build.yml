      \ phase.get(\"tasks\", [])\n\nPATTERN TO APPLY:\n  # Before:\n  tasks = phase.get(\"\
      tasks\", [])\n  # After:\n  tasks = phase.get(\"tickets\", phase.get(\"tasks\"\
      , []))\n"
    completed_date: '2026-03-06'
    success_criteria:
    - The single occurrence of phase.get('tasks', []) in _parse_plan_stats replaced
      with fallback pattern
    - No other changes to ralph.py logic
  - id: build_003b
    name: Fix planner_loop.py — adopt tickets key with tasks fallback
