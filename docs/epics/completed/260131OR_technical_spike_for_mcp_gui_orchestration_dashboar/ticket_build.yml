phases:
- id: SPIKE-01
  name: Protocol Validation
  description: Verify Claude Code can render server-provided HTML via MCP resources.
  status: in_progress
  tasks:
  - id: SP-01-001
    description: Draft local MCP server with FastMCP and show_orchestration tool.
    status: completed
    guidance: Use FastMCP to create a tool that returns a UIResource with text/html.
  - id: SP-01-002
    description: Verify basic HTML rendering in Claude Chrome window.
    status: completed
    guidance: run 'claude --chrome' and invoke 'show_orchestration'.
- id: SPIKE-02
  name: Real-time Data Integration
  description: Connect the UI to live CLI state (sessions and loops).
  status: pending
  tasks:
  - id: SP-02-001
    description: Implement CLI state fetching in MCP server.
    status: completed
    guidance: Use subprocess to run 'agentic -j session list --active'.
  - id: SP-02-002
    description: Map session labels to Mermaid node IDs.
    status: completed
    guidance: Parse Mermaid labels and match against session prompts.
- id: SPIKE-03
  name: Visual Orchestration
  description: Highlight active nodes on the Mermaid diagram.
  status: pending
  tasks:
  - id: SP-03-001
    description: Implement dynamic node styling in Mermaid output.
    status: completed
    guidance: Inject 'style NODE_ID fill:#...' into the MMD content.
  - id: SP-03-002
    description: Implement auto-refresh mechanism (Polling/JS-refresh).
    status: completed
    guidance: Use setTimeout in the returned HTML to reload the resource.
- id: SPIKE-04
  name: Review & Finalization
  description: Technical review of the implementation and refinement.
  status: pending
  tasks:
  - id: SP-04-001
    description: Audit implementation against MCP standard.
    status: completed
  - id: SP-04-002
    description: Refine dashboard aesthetics (Glassmorphism/Premium UI).
    status: completed
  - id: SP-04-003
    description: Move spike implementation to module permanent home.
    status: completed
