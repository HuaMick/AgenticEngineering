name: Worktree Reuse and Auto-Cleanup
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
priority: high
objective: 'The CLI (agentic plan init) always creates a new worktree and never checks

  for available idle ones. The error-driven-planning-protocol says:

  - "Only create new worktree if ALL existing worktrees have active sessions"

  - "Multiple plans per worktree are allowed"

  - "New worktree creation is a last resort"

  Also, worktrees never get cleaned up - removal is manual only.

  '
