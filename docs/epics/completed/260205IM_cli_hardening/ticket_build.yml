    - modules/AgenticCLI/tests/integration/test_stop_idempotency_e2e.py
    - modules/AgenticCLI/tests/integration/test_bootstrap_planner_workflow.py
    guidance: "Perform comprehensive test audit following audit process:\n\nAudit\
      \ Checklist:\n1. Skipped tests validation:\n   - Find all @pytest.mark.skip\
      \ decorators\n   - Validate skip justification is legitimate\n   - Flag unjustified\
      \ skips as failures\n\n2. Reward hacking detection:\n   - Tests that mock too\
      \ much (not testing real behavior)\n   - Tests with hardcoded paths (not portable)\n\
      \   - Tests that pass trivially without validating behavior\n   - Tests missing\
      \ critical assertions\n\n3. Coverage gaps:\n   - Error paths not tested\n  \
      \ - Edge cases missing\n   - Integration points not covered\n\n4. Test quality\
      \ issues:\n   - Missing cleanup (temp files, state files)\n   - Tests that modify\
      \ global state\n   - Tests with race conditions\n   - Tests that depend on execution\
      \ order\n\n5. Implementation validation:\n   - Verify tests actually call the\
      \ implementation code\n   - Verify mocks are minimal and necessary\n   - Verify\
      \ assertions check meaningful behavior\n\nGenerate audit report with PASS/FAIL\
      \ for each test file.\n"
    success_criteria:
    - No unjustified skipped tests
    - No reward hacking detected
    - Coverage gaps identified and addressed
    - All tests meet quality standards
    - Audit report generated with specific findings
- name: UAT Validation Phase
