    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
- name: Update orchestration-planning
  execution: sequential
  description: Add story content validation gate after story discovery
  tasks:
  - id: ORCH_001
    name: Add Story Content Validation gate to orchestration-planning MMD
    description: 'Update orchestration-planning/process.mmd to add validation after
      story discovery.


      Current flow (lines 122-148):

      StoryDiscovery --> RunStoryFind --> StoriesFound? --> RecordStories --> StoryContextReady


      Insert NEW validation node between RecordStories and StoryContextReady:


      ```mermaid

      RecordStories --> ValidateStoryContent[Validate Story Content Exists]

      ValidateStoryContent --> StoryFilesExist{Story Files Found?}


      %% Happy path: story files exist with complete content

      StoryFilesExist -- "Yes: Complete Content" --> StoryContextReady


      %% Missing story files: need generation

      StoryFilesExist -- "No: Missing Files" --> CheckStoryCreationTasks{Has story_creation_tasks?}

      CheckStoryCreationTasks -- "Yes: Will Generate" --> NoteStoryGeneration[Note:
      Story generation in teach phase]

      NoteStoryGeneration --> StoryContextReady

      CheckStoryCreationTasks -- "No: Missing Tasks" --> BlockMissingStories((BLOCK:
      Story generation required but not planned))


      %% Incomplete story content: need fixes

      StoryFilesExist -- "Incomplete: Missing Fields" --> BlockIncompleteStories((BLOCK:
      Story content incomplete - missing success_criteria or journey))

      ```


      Also add comment at top of StoryDiscovery_SG (after line 124):

      ```

      %% STORY DISCOVERY vs STORY GENERATION:

      %% - Discovery: Find story IDs via `agentic stories find` (what stories exist)

      %% - Generation: Create story content files (what stories should exist if none
      found)

      %% - Validation: Verify story files have complete content (success_criteria,
      journey, testing)

      %% Both discovery AND content validation must pass before phase determination.

      ```

      '
    status: completed
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
    inputs:
    - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
  - id: ORCH_002
    name: Update planning-standard.yml to clarify discovery vs generation
    description: "Update planning-standard.yml to explicitly distinguish story discovery\
      \ from generation.\n\nUpdate line 19 \"rule: Story-First Planning\" section:\n\
      \nAdd new subsection after line 38:\n```yaml\nstory_lifecycle:\n  discovery:\n\
      \    description: \"Find existing story IDs that map to the objective\"\n  \
      \  command: \"agentic stories find [--project <name>]\"\n    output: \"List\
      \ of story IDs (US-PROJECT-NNN)\"\n    when: \"ALWAYS - first step in planning\
      \ workflow\"\n\n  generation:\n    description: \"Create new story content files\
      \ when discovery finds no stories\"\n    responsibility: \"planner-build (for\
      \ build plans), planner-guidance (for teach plans)\"\n    output: \"Story YAML\
      \ files with journey, success_criteria, testing fields\"\n    when: \"When discovery\
      \ returns empty AND plan type is build/test\"\n    escape_hatch: \"Infrastructure,\
      \ guidance, internal_tooling may skip with rationale\"\n\n  validation:\n  \
      \  description: \"Verify story files exist and have complete content\"\n   \
      \ responsibility: \"orchestration-planning (before phase determination), planner-test\
      \ (before UAT creation)\"\n    required_fields: [\"journey\", \"success_criteria\"\
      , \"testing\"]\n    when: \"After discovery (orchestration) and before UAT planning\
      \ (test)\"\n```\n"
    status: completed
    target_files:
    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
    inputs:
    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
    - modules/AgenticGuidance/assets/definitions/user-stories.yml
- name: Update orchestration-executor
  execution: sequential
  description: Add pre-UAT validation gate for story content
  tasks:
  - id: EXEC_001
    name: Add UAT validation gate to orchestration-executor/process.yml
    description: "Add fence to orchestration-executor that validates story content\
      \ exists\nbefore executing UAT phases.\n\nFind the UAT execution section in\
      \ orchestration-executor/process.yml and add:\n\n```yaml\n- |\n  FENCE: UAT\
      \ VALIDATION GATE\n  Before executing any UAT phase, the executor MUST validate\
      \ that user stories\n  have complete content. This prevents UAT tasks from running\
      \ against empty\n  or incomplete story definitions.\n\n  VALIDATION CHECKLIST:\n\
      \  1. Read affected_stories from plan metadata\n  2. For each story ID:\n  \
      \   a. Verify story file exists: docs/userstories/<project>/NN_category.yml\n\
      \     b. Verify story has success_criteria field (list, non-empty)\n     c.\
      \ Verify story has journey field (list, non-empty)\n     d. Verify story has\
      \ testing field (dict with local/docker keys)\n\n  3. If ANY story fails validation,\
      \ STOP UAT execution and report:\n     \"UAT VALIDATION GATE FAILURE\n\n   \
      \  Cannot execute UAT phase - story content incomplete or missing.\n\n     Failed\
      \ stories:\n     - <story_id>: <reason>\n\n     REQUIRED ACTION:\n     Fix story\
      \ content before UAT execution. Stories must have complete\n     success_criteria,\
      \ journey, and testing fields.\"\n\n  4. If all stories validate, proceed with\
      \ UAT phase execution\n\n  NOTE: This gate exists to catch the case where planning\
      \ approved incomplete\n  stories. It's a safety net, not a substitute for proper\
      \ story generation\n  during planning.\n```\n"
    status: completed
    target_files:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    inputs:
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    - modules/AgenticGuidance/assets/definitions/user-stories.yml
    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
loop_structures:
- id: loop_guidance_validation
  type: test-fix-loop
  applies_to_phase: Validation Phase
  trigger: After guidance updates complete
  description: 'Validate that updated planner agents actually generate user stories
    by running

    them on a test objective and checking output.

    '
  exit_criteria:
    success: Test plan includes user stories AND UAT phase references them
    max_iterations: 5
    escalation: Escalate - guidance changes not producing expected behavior
  participants:
  - agent: test-builder
    role: Create test cases that validate planner output
  - agent: planner-build
    role: Subject under test - should generate stories
  - agent: planner-test
    role: Subject under test - should validate story content
success_criteria:
- planner-build process.yml includes User Story Generation step
- planner-test process.yml includes Story Content Validation fence
- orchestration-planning validates story content after discovery
- orchestration-executor has UAT validation gate
- planning-standard.yml clarifies discovery vs generation vs validation
- Test planners output includes user stories with acceptance criteria
- UAT phases map 1:1 to user stories with explicit validation steps
- 'Meta-test: Create a new plan and verify it generates user stories'
