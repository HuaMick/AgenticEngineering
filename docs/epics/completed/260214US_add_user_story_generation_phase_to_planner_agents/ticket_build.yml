name: add-user-story-generation-to-planners
worktree_path: /home/code/AgenticEngineering-260212TC_add_test_cleaner_agent
branch: 260214US_add_user_story_generation_to_planners
status: active
priority: critical
context: "THE PROBLEM:\nThe planner-build and planner-test agents generate implementation\
  \ plans with tasks\nand phases, but they do NOT generate user stories. This means:\n\
  1. Test phases have no UAT acceptance criteria grounded in real user journeys\n\
  2. Manual test tasks are just command checklists (\"run X --help\") not user story\
  \ validations\n3. The test-runner agent (which only runs existing tests) is routed\
  \ for verification\n   instead of test-builder (which creates new tests)\n4. Plans\
  \ get marked complete after checking --help output without verifying actual functionality\n\
  \nEVIDENCE (from 260214TU_tmux_orchestration_ui):\n- Phase 5 \"Verification\" had\
  \ only 2 tasks: run existing tests + manual checklist\n- TU_009 \"Manual integration\
  \ test\" was 5 bullet points checking --help flags\n- Zero unit tests created for\
  \ the new tmux_layout.py module\n- The agent marked TU_009 complete after confirming\
  \ --help showed new flags\n- A critical tmux bug (detached sessions missing -x/-y\
  \ dimensions) shipped because\n  no test actually created a tmux session\n\nTHE\
  \ ROOT CAUSE:\n- orchestration-planning.mmd has story discovery via `agentic stories\
  \ find`\n- But planner agents don't have a \"generate user stories\" step\n- Story\
  \ discovery finds story IDs; story generation creates story content\n- Without story\
  \ content, UAT has no acceptance criteria to validate against\n"
inputs:
- location: modules/AgenticGuidance/agents/planner/planner-build/process.yml
  description: Build planner that needs story generation step
