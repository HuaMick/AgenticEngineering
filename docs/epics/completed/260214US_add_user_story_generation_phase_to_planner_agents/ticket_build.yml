open_questions:
- id: plan-q-001
  question: Should story generation be a separate phase or integrated into build planning?
  severity: high
  status: pending
  context: 'Two approaches:

    A) Planner-build generates stories inline during task creation

    B) Separate story-generator agent spawned before planner-build


    Approach A: Simpler, keeps context hot, but adds complexity to planner-build

    Approach B: Cleaner separation, reusable, but adds orchestration overhead


    Leaning toward A for now (inline generation) since planner-build already

    has the objective context and can generate stories before creating tasks.

    '
  created_at: '2026-02-14T00:00:00'
  asked_by: orchestration-planning
- id: plan-q-002
  question: How many user stories should a typical plan generate?
  severity: medium
  status: pending
  context: 'Need guidance on story quantity:

    - Minimum: 1 happy path story per major feature

    - Reasonable: 3-8 stories covering happy path + error cases + edge cases

    - Maximum: Avoid story explosion (>10 stories suggests feature needs decomposition)


    Suggest: 3-8 stories as the default range, with rationale if outside that range.

    '
  created_at: '2026-02-14T00:00:00'
  asked_by: orchestration-planning
