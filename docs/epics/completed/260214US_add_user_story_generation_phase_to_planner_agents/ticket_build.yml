- name: Update planner-build
  execution: sequential
  description: Add user story generation step to build planner process
  tickets:
  - id: BUILD_001
    name: Add User Story Generation step to planner-build/process.yml
    description: "Insert new step in planner-build/process.yml after \"USER STORY\
      \ INTEGRATION\" section (line 185):\n\nNEW STEP (insert after line 209 \"UAT\
      \ planning: planner-test...\"):\n```yaml\n- |\n  USER STORY GENERATION (MANDATORY\
      \ - when stories missing):\n  If `agentic stories find` returns no stories for\
      \ the objective, planner-build\n  MUST generate user stories before creating\
      \ implementation tasks.\n\n  STORY GENERATION PROCESS:\n  1. Parse objective\
      \ to identify user-facing features/changes\n  2. For each feature, generate\
      \ 3-8 user stories in format:\n     - id: US-<PROJECT>-<NNN>\n     - name: Brief\
      \ story description\n     - category: Grouping (cli_basics, api, features, etc.)\n\
      \     - persona: Who is the user\n     - priority: critical | high | medium\
      \ | low\n     - starting_state: Initial environment conditions\n     - journey:\
      \ Step-by-step actions with expected outcomes\n     - success_criteria: What\
      \ must pass for story to be validated\n     - testing: Local and Docker testing\
      \ instructions\n\n  3. Stories must cover:\n     - Happy path (primary user\
      \ journey)\n     - Error paths (validation failures, edge cases)\n     - Integration\
      \ scenarios (if feature interacts with other components)\n\n  4. Each story\
      \ must have specific, measurable acceptance criteria\n     (not vague \"it works\"\
      \ but \"command outputs X when given Y\")\n\n  5. Create story file at docs/userstories/<project>/NN_<category>.yml\n\
      \n  6. Record affected_stories in plan metadata with generated story IDs\n\n\
      \  7. Add story_creation_tasks to plan for teach phase to create files\n\n \
      \ STORY QUANTITY GUIDANCE:\n  - Minimum: 1 story (happy path only) - acceptable\
      \ for trivial changes\n  - Recommended: 3-8 stories - covers happy/error/edge\
      \ cases\n  - Maximum: 10+ stories suggests feature needs decomposition\n\n \
      \ ESCAPE HATCH (from planning-standard.yml):\n  Build plans are blocked_plan_types\
      \ - CANNOT skip story generation.\n  If truly no user-facing impact, plan type\
      \ should be \"guidance\" or \"infrastructure\".\n```\n\nUpdate line 185 section\
      \ title from \"USER STORY INTEGRATION (MANDATORY - FENCE: Story-First Planning):\"\
      \nto clarify it covers discovery AND generation:\n\"USER STORY INTEGRATION (MANDATORY\
      \ - FENCE: Story-First Planning):\"\nbecomes\n\"USER STORY INTEGRATION (MANDATORY\
      \ - Discovery + Generation):\"\n"
    status: completed
