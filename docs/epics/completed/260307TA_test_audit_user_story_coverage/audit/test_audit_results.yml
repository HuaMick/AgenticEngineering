##############################################################################
# 6. TEST ISOLATION
##############################################################################
test_isolation:
  status: PASS
  findings:
    - item: "TinyDB isolation"
      detail: "conftest._isolate_tinydb (autouse) redirects all DB writes to per-test tmp_path"

    - item: "Notification isolation"
      detail: "conftest._block_real_ntfy (autouse) patches ntfy config to None"

    - item: "CWD restoration"
      detail: "cli_runner, plan_cli_runner, and task_cli_runner all save/restore CWD in teardown"

    - item: "JSON mode reset"
      detail: "plan_cli_runner and cli_runner call set_json_output(False) in teardown"

    - item: "Git isolation"
      detail: "plan_repo and task_repo fixtures create isolated git repos in temp directories"

    - item: "No shared state"
      detail: "Each test class is independent; fixtures don't leak between classes"

  minor_concerns:
    - item: "task_cli_runner missing JSON reset"
      detail: >-
        task_cli_runner (test_task_list_commands.py) does not call
        set_json_output(False) in teardown, unlike plan_cli_runner. This
        could theoretically cause JSON mode to leak between tests.

