# 3. MOCK APPROPRIATENESS
##############################################################################
mock_analysis:
  status: MIXED

  appropriate_mocks:
    - test: TestContextInputs::test_context_inputs_returns_manifest
      mock_target: agenticguidance.services.get_role_inputs_manifest
      justification: "CLI layer test correctly mocks service layer"

    - test: TestContextInputs::test_context_inputs_role_filter
      mock_target: agenticguidance.services.get_role_inputs_manifest
      justification: "Tests CLI filtering logic without depending on actual agent files"

    - test: TestContextInputs::test_context_inputs_resolve_layers
      mock_target: agenticguidance.services.get_role_inputs_manifest
      justification: "Tests --resolve flag propagation through CLI to service"

    - test: TestContextRole::test_role_returns_json
      mock_target: agenticguidance.services.get_role_process
      justification: "CLI layer test isolates from service"

    - test: TestContextRole::test_role_not_found_error
      mock_target: agenticguidance.services.get_role_process
      justification: "Tests CLI error handling when service returns None"

    - test: TestContextGenerateAgent tests
      mock_target: agenticguidance.services.generate_agent_bootstrap
      justification: "CLI layer test isolates from file system template loading"

  misleading_mocks:
    - test: TestContextInputs::test_context_inputs_resolves_paths
      issue: >-
        Test name claims to verify "all input paths are resolved to absolute
        paths" but the mock provides pre-resolved absolute paths. The test
        actually checks CLI passthrough, not that the service performs path
        resolution. The real resolution logic in get_role_inputs_manifest()
        is NOT tested.

    - test: TestContextInputs::test_context_inputs_validates_existence
      issue: >-
        Test name claims to verify "missing files are flagged" but the mock
        provides pre-computed exists flags. Tests CLI passthrough only, not
        actual file existence detection.

  no_mocks_used:
    - file: test_task_list_commands.py
      note: >-
        All 16 tests run against real TinyDB via task_repo fixture. Good for
        integration testing but makes tests dependent on fixture setup quality.

    - file: test_cli_task.py
      note: >-
        All 18 tests are parser-level only (argument acceptance/rejection).
        No mocks needed since they test Typer/argparse configuration.

##############################################################################
# 4. REWARD HACKING PATTERNS
##############################################################################
reward_hacking:
  status: FAIL
  severity: CRITICAL

  # Category A: Tests that effectively always pass (vacuous truth)
  always_pass_tests:
    - test: TestTaskList::test_task_list_json_output
      file: test_task_list_commands.py
      line: 196
      pattern: "vacuous_if_guard"
      detail: >-
        Core assertion wrapped in `if stdout.strip():` - empty output passes
        without any JSON validation. Then `isinstance(data, (list, dict))` is
        true for virtually any valid JSON.

    - test: TestTaskList::test_task_list_filter_by_status
      file: test_task_list_commands.py
      line: 207
      pattern: "nested_vacuous_guards"
      detail: >-
        Triple-nested guards: `if stdout.strip()` → `if isinstance(data, list)`
        → `if isinstance(task, dict) and "status" in task`. Any empty or
        non-list output passes all assertions.

    - test: TestTaskCurrent::test_task_current_returns_task
      file: test_task_list_commands.py
      line: 227
      pattern: "vacuous_if_guard"
      detail: >-
        Guard `if stdout.strip() and stdout.strip() != "null"` followed by
        `if data:` means empty output, null, or empty dict all pass silently.

    - test: TestTaskCurrent::test_task_current_prefers_in_progress
      file: test_task_list_commands.py
      line: 238
      pattern: "vacuous_if_guard"
      detail: >-
        Same triple guard as above. Key assertion `data["status"] == "in_progress"`
        only fires if all guards pass - empty/null output passes silently.

    - test: TestTaskIntegration::test_list_then_current_consistent
      file: test_task_list_commands.py
      line: 314
      pattern: "vacuous_if_guard"
      detail: >-
        Four nested guards before the consistency assertion. If any guard
        is False, the test passes without testing anything.

    - test: TestTaskStatus::test_task_status_shows_task_details
      file: test_task_list_commands.py
      line: 388
      pattern: "nested_vacuous_guards_plus_accept_failure"
      detail: >-
        Nested `if` guards allow vacuous pass. Final assertion
        `returncode in [0, 1]` accepts both success and failure.

  # Category B: Tests that accept failure as success
  accept_failure_tests:
    - test: TestTaskUpdate::test_task_update_changes_status
      file: test_task_list_commands.py
      line: 259
      pattern: "accept_failure_returncode"
      detail: >-
        Asserts `update_result.returncode in [0, 1]` which accepts both
        success AND failure. Wrapped in guards so empty preconditions skip
        the entire test body.

    - test: TestTaskAdd::test_task_add_creates_task
      file: test_task_list_commands.py
      line: 303
      pattern: "accept_failure_returncode"
      detail: >-
        Asserts `result.returncode in [0, 1]` - accepts both success and
        failure. Never verifies the task was actually created.

    - test: TestTaskPrefill::test_task_prefill_loads_preset
      file: test_task_list_commands.py
      line: 285
      pattern: "accept_all_outcomes"
      detail: >-
        Asserts `code == 0 or "not found" in stderr.lower() or "error" in
        stderr.lower()` - accepts success, "not found", AND generic error.
        This test literally cannot fail.

  # Category C: Tests with broken/wrong implementation
  broken_tests:
    - test: TestTaskIntegration::test_update_then_current_reflects_change
      file: test_task_list_commands.py
      line: 339
      pattern: "broken_command_plus_pass_body"
      detail: >-
        CRITICAL: Calls `["agent", "agent", "plan", "task", "update", ...]`
        (doubled "agent" prefix) which is NOT a valid command path. The update
        silently fails. Then the innermost assertion body is literally
        `pass  # Test passes if no error`. This test does NOTHING.

  # Category D: Weak but acceptable assertions
  weak_assertions:
    - test: TestContextHelp::test_context_alias_ctx
      file: test_context_commands.py
      line: 170
      severity: LOW
      detail: >-
        OR chain for deprecation message variants is acceptable given that
        the exact deprecation wording may change.

    - test: TestContextBootstrap::test_bootstrap_human_readable
      file: test_context_commands.py
      line: 200
      severity: LOW
      detail: >-
        OR chain `"Bootstrap Context" in stdout or "Role:" in stdout or
        "CLI Commands" in stdout` - acceptable for rich output format variants.

  summary:
    total_reward_hacking: 10
    critical: 4     # always-pass in test_task_list_commands.py
    high: 4         # accept-failure + broken test
    low: 2          # weak assertions in test_context_commands.py

