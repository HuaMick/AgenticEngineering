- name: Fix dotted_order timestamp format for child runs
  description: 'Child runs have malformed dotted_order values. The API error shows:
    "invalid timestamp format in dotted_order at index 1: timestamp must contain ''T''
    separator"

    Current bad format: 20260207053601597218437Z7dcba651... Expected format: 20260207T053601000000uuid
    or 20260207T053601uuid

    The issue is in the assistant_dotted calculation around line 313 where the  timestamp
    substitution ${llm_start//[-:TZ.]/} incorrectly handles the ISO timestamp.

    '
  tickets:
  - id: fix-dotted-order.1
    name: ''
    description: "Fix the dotted_order generation for child runs (assistant, tool\
      \ runs).\nCurrent problematic code around line 313:\n  local assistant_dotted=\"\
      ${turn_dotted_order}.${llm_start//[-:TZ.]/}$(get_microseconds)${assistant_id}\"\
      \n\nThe ${llm_start//[-:TZ.]/} substitution strips characters but leaves a malformed\
      \ timestamp. The LangSmith API expects format: YYYYMMDDTHHMMSS or YYYYMMDDTHHMMSS000000\n\
      Fix approach: 1. Create a helper function to properly format ISO timestamps\
      \ to LangSmith format:\n   format_dotted_timestamp() {\n       local iso_ts=\"\
      $1\"\n       # Convert 2026-02-07T05:36:01Z to 20260207T053601\n       echo\
      \ \"$iso_ts\" | sed 's/-//g; s/://g; s/\\.[0-9]*Z$//' | cut -c1-15\n   }\n2.\
      \ Use this function when building child dotted_order values 3. Ensure microseconds\
      \ are appended correctly (6 digits, no letters)\n"
    status: completed
    agent: null
    success_criteria:
    - Child run dotted_order format matches: YYYYMMDDTHHMMSS000000uuid
    - No 'Z' character in the timestamp portion
    - API accepts batches without 400 errors
- name: Verify traces appear in LangSmith
  description: 'End-to-end verification that traces now submit successfully.

