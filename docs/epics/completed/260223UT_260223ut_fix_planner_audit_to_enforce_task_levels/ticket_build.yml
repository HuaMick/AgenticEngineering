name: Test Plan - Task Nesting Validation
worktree_path: ''
branch: ''
status: pending
priority: medium
objective: 'Validate that PlanService.validate_plan_structure() correctly detects

  task nesting violations (root-level tasks, phases without tasks) and

  that existing valid plans continue to pass validation.

  '
created: '2026-02-23'
phases:
- name: Plan Compliance Audit
  tickets:
  - id: AU_001
    name: Scan all live plans for root-level tasks violations
    description: 'Run PlanService.validate_plan_structure() against every plan

      folder in docs/plans/live/. Report any plans that have:

      1. Root-level `tasks:` key

      2. Phases without `tasks:` list

      3. Any other structure violations


      Output: list of plan folders with violations and specific errors.

      '
    status: pending
    agent: null
  - id: AU_002
    name: Verify sibling plan 260223NE can be archived
    description: 'Plan 260223NE_fix_planner_audit_to_enforce_task_nesting is

      the sibling plan with a single research task (IM_001). Since

      this plan (260223UT) completes the full implementation,

      260223NE should be archived to completed/ to avoid confusion.

      '
    status: pending
    agent: null
- name: Cleanup
  tickets:
  - id: CL_001
    name: Fix any live plans with nesting violations
    description: 'For any plans found in AU_001 with root-level tasks, restructure

      them to use phases[].tasks[] nesting. This is a manual remediation

      step that may not be needed if all existing plans are well-formed.

      '
    status: pending
    agent: null
- name: Phase 1 - Add nesting validation to PlanService
  tickets:
  - id: IM_001
    name: Add root-level tasks detection to validate_plan_structure()
    description: "Edit PlanService.validate_plan_structure() in plan.py (line 1344-1408).\n\
      After the YAML structure validation loop that checks required_fields,\nadd checks\
      \ inside the per-file loop:\n\n1. Check if data has a root-level 'tasks' key:\n\
      \   if \"tasks\" in data and isinstance(data[\"tasks\"], list):\n       errors.append(f\"\
      Root-level 'tasks' key in {plan_file.name}: \"\n                     \"tasks\
      \ must be nested under phases[].tasks[], \"\n                     \"not at plan\
      \ root level\")\n\n2. Check each phase entry for a 'tasks' key:\n   for phase\
      \ in phases:\n       if \"tasks\" not in phase:\n           warnings.append(f\"\
      Phase '{phase.get('name', '?')}' in \"\n                           f\"{plan_file.name}\
      \ has no tasks defined\")\n\n3. Check for blocking condition (root tasks + no\
      \ phases):\n   if \"tasks\" in data and \"phases\" not in data:\n       errors.append(f\"\
      BLOCKING: {plan_file.name} has tasks at root \"\n                     \"level\
      \ with no phases key - plan is malformed\")\n\nThe checks should be placed AFTER\
      \ the required fields check and BEFORE\nthe phase/task ID uniqueness loop.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    success_criteria:
    - 'validate_plan_structure() returns error when plan file has root-level tasks:
      key'
    - 'validate_plan_structure() returns warning when a phase has no tasks: list'
    - 'validate_plan_structure() returns error when tasks: at root and phases: missing'
    - Existing valid plans continue to pass validation (no regressions)
- name: Phase 2 - Update schema documentation
  tickets:
  - id: IM_002
    name: Add nesting constraint to plan-schema.yml validation_rules
    description: "Edit plan-schema.yml validation_rules section (line 364-389).\n\
      Add a new rule to plan_level rules:\n  - \"tasks key must NOT appear at root\
      \ level; tasks must be nested under phases[].tasks[]\"\n\nAdd a new rule to\
      \ phase_level rules:\n  - \"tasks list must be present (phases without tasks\
      \ are empty shells)\"\n\nThese rules document the programmatic validation added\
      \ in IM_001.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/specifications/plan-schema.yml
    success_criteria:
    - plan_level validation_rules include nesting constraint
    - phase_level validation_rules include tasks-required constraint
  - id: IM_003
    name: Add nesting note to plans.yml validation_checklist
    description: "Edit plans.yml validation_checklist.structure section (line 446-451).\n\
      Add a new check:\n  - \"Tasks nested under phases[].tasks[] only, never at root\
      \ level\"\n\nThis aligns the definitions file with the schema and programmatic\
      \ validation.\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/assets/definitions/plans.yml
    success_criteria:
    - validation_checklist.structure includes nesting check
- name: Unit Tests - Nesting Validation
  tickets:
  - id: TU_001
    name: Test root-level tasks detection
    description: "Create test in test_services_plan_service.py that verifies:\n1.\
      \ Plan with root-level `tasks:` key returns validation error\n2. Error message\
      \ contains \"root level\" and \"nested under phases\"\n3. Plan with both `phases:`\
      \ and root-level `tasks:` returns error\n\nTest fixture - malformed plan YAML:\n\
      \  name: \"bad-plan\"\n  status: active\n  tasks:\n    - id: \"T1\"\n      name:\
      \ \"orphan task\"\n      status: pending\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    success_criteria:
    - Test creates tmp plan file with root-level tasks and validates it fails
    - Error message is actionable (mentions phases[].tasks[])
  - id: TU_002
    name: Test phase without tasks detection
    description: "Create test that verifies:\n1. Plan with a phase that has no `tasks:`\
      \ key returns warning\n2. Warning message includes the phase name\n3. Plan with\
      \ multiple phases where some have tasks and some don't\n\nTest fixture:\n  name:\
      \ \"partial-plan\"\n  status: active\n  phases:\n    - name: \"Phase with tasks\"\
      \n      tasks:\n        - id: \"T1\"\n          name: \"a task\"\n         \
      \ status: pending\n    - name: \"Empty phase\"\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    success_criteria:
    - Warning returned for phase without tasks
    - Phase with tasks does not trigger warning
  - id: TU_003
    name: Test blocking condition (root tasks + no phases)
    description: "Create test that verifies:\n1. Plan with root-level `tasks:` AND\
      \ no `phases:` key returns error\n2. ValidationResult.valid is False\n3. Error\
      \ is clearly labeled as blocking\n\nTest fixture:\n  name: \"flat-plan\"\n \
      \ status: active\n  tasks:\n    - id: \"T1\"\n      name: \"orphan\"\n     \
      \ status: pending\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    success_criteria:
    - Blocking error returned
    - valid=False in ValidationResult
  - id: TU_004
    name: Test valid plans still pass (regression)
    description: "Create test that verifies properly structured plans still pass:\n\
      1. Plan with phases[].tasks[] nesting passes (valid=True)\n2. Plan with multiple\
      \ phases each containing tasks passes\n3. Stub templates (_template_status:\
      \ stub) are skipped\n\nTest fixture:\n  name: \"good-plan\"\n  status: active\n\
      \  phases:\n    - name: \"Phase 1\"\n      tasks:\n        - id: \"T1\"\n  \
      \        name: \"proper task\"\n          status: pending\n"
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    success_criteria:
    - Valid plans return valid=True with no errors
    - Stub templates skipped without error
- name: Integration Tests - Audit Report
  tickets:
  - id: TI_001
    name: Test validate_plan_structure against real plan folders
    description: 'Run validate_plan_structure() against a sample of existing live
      plans

      to verify no false positives are produced. Create tmp copies of known

      good plans and verify they pass.

      '
    status: pending
    agent: null
    target_files:
    - modules/AgenticGuidance/tests/test_services_plan_service_integration.py
