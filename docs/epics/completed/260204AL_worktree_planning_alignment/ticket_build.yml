      - worktree list: List all worktrees with status

      - worktree status: Current worktree context

      - worktree remove <branch-name>: Safe worktree removal

      '
  - id: AL_002
    name: Implement workspace file auto-update
    description: 'Add logic to automatically update .code-workspace file when worktrees

