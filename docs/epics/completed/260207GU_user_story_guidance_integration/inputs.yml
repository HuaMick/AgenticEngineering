# Inputs for User Story Guidance Integration Plan
# Plan ID: 260207GU_user_story_guidance_integration

objective: |
  Update agent guidance to integrate user stories as the central validation anchor for 
  planning and execution workflows. Focus on orchestration agents (orchestration-planning,
  orchestration-executor) but also review and update other relevant agents.

context:
  implementation_plan: |
    This plan is part of a two-plan initiative to integrate user stories into the planning process:
    - This plan (260207GU): Agent guidance updates
    - Companion plan (260207CL): CLI tooling updates
    
    Key requirements:
    1. Stories gain embedded test metadata (last_tested, test_status, test_notes, tested_by_plan)
    2. Planning becomes story-mandatory (with escape hatch)
    3. Failure/regression triggers orchestration loops to bridge gaps
    4. Planners have remit to update/create/delete stories

  related_user_stories:
    - US-ORCH-001: Initiate Implementation Planning
    - US-ORCH-002: Main-First Planning Workflow
    - US-ORCH-003: Specialized Planner Agents
    - US-ORCH-004: Plan Review and Approval
    - US-GD-063: Review Test Quality
    - US-GD-073: Test User Stories

scope:
  primary_targets:
    - modules/AgenticGuidance/agents/orchestration/orchestration-planning/
    - modules/AgenticGuidance/agents/orchestration/orchestration-executor/
    - modules/AgenticGuidance/agents/planner/
    - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
    
  secondary_review:
    - modules/AgenticGuidance/agents/test/test-audit/
    - modules/AgenticGuidance/agents/test/test-user-simulator/
    - docs/prompts/orchestration_executor.md

deliverables:
  - Updated orchestration-planning process.yml with mandatory story linking
  - Updated orchestration-executor process.yml with story status update loops
  - Updated planner-* agents with story creation/update capabilities
  - Updated planning-standard.yml fence for story-first planning
  - New or updated user stories for guidance agents if gaps found

execution_worktree: /home/code/AgenticEngineering-userstory-guidance
