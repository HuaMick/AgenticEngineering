    integration: Extend bootstrap output
    changes_required: Add orchestration section

# =============================================================================
# RISK ASSESSMENT
# =============================================================================
risks:

  environment_variable_conflicts:
    description: AGENTIC_* variables might conflict with user env
    mitigation: Use specific prefix, document clearly
    severity: LOW

  tmux_availability:
    description: Non-tmux environments won't work
    mitigation: Graceful fallback to standalone mode
    severity: LOW (target environment is tmux)

  session_name_collision:
    description: Manual sessions might use orchestration naming pattern
    mitigation: Validate role consistency, warn on mismatch
    severity: MEDIUM

  orphan_sessions:
    description: Orchestrator death leaves orphan builders
    mitigation: Orphan detection, configurable behavior
    severity: MEDIUM

  performance:
    description: Environment queries add overhead
    mitigation: Cache context, batch queries
    severity: LOW

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================
success_criteria:

  functional:
    - Can create orchestrator session for a plan
    - Can spawn builder/tester sessions from orchestrator
    - Environment variables correctly injected and queryable
    - Session hierarchy correctly tracked
    - Quality gates block unauthorized phase completion
    - Audit trail captures all orchestration events

  non_functional:
    - Session creation adds < 100ms overhead
    - No breaking changes to existing SessionService API
    - Works with existing tmux configurations
    - Clear error messages for enforcement violations

