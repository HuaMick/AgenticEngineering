# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================
summary:
  finding: |
    Process.yml files follow a consistent schema with extractable steps. The structure
    supports automated step extraction for agent-specific plan generation. Key finding:
    steps are stored as a list of either strings (free-form) or dicts (structured),
    both formats can be parsed for task generation.

  recommendation: |
    Step extraction is feasible. The CLI already parses process.yml files (see
    agent_help.py). Extending this to generate agent-specific task files is
    LOW complexity.

# =============================================================================
# PROCESS.YML SCHEMA ANALYSIS
# =============================================================================
process_yml_schema:
  description: |
    All process.yml files follow a consistent top-level structure with a single
    'process' key containing the agent's workflow definition.

  canonical_structure:
    process:
      goal: "string - Description of what this agent accomplishes"
      profile: "string (optional) - Agent profile type (e.g., 'orchestrator')"
      project_type: "string (optional) - Project specialization (e.g., 'python', 'flutter')"

      loop_context:
        participates_in: "list[string] - Loop types this agent participates in"
        loop_definition: "string (optional) - Reference to agent-loops.yml"
        role: "string (optional) - Role in loop (executor, auditor, fixer)"
        max_iterations: "integer (optional) - Max loop iterations"
        exit_conditions: "list[string] (optional) - Conditions to exit loop"
        iteration_strategy: "string (optional) - How iterations are handled"
        state_management: "string (optional) - How state persists between iterations"

      invocation_context:
        caller_chain: "list[string] (optional) - Who calls this agent"
        note: "string (optional) - Notes on invocation patterns"

      inputs:
        - location: "string - Path to inputs file"
          description: "string - Description of inputs"

      outputs:
        - name: "string - Output artifact name"
          description: "string - What this output contains"
          path_template: "string (optional) - Where output is written"
          required_fields: "list[string] (optional) - Required fields in output"
          schema_reference: "string (optional) - Reference to schema file"
          format: "string (optional) - Output format (yaml, json)"

      steps: "list[string | dict] - Ordered workflow steps"

      guidelines: "list[string] - Behavioral guidelines"

      fallbacks: "dict (optional) - Fallback behaviors for error cases"

  files_examined:
    - path: modules/AgenticGuidance/agents/planner/planner-build/process.yml
      lines: 297
      step_format: string (free-form multiline)
      step_count: 7

    - path: modules/AgenticGuidance/agents/build/build-python/process.yml
