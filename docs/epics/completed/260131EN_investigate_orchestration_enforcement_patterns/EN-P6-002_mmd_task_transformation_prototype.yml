# RISKS AND MITIGATIONS
# =============================================================================
risks_and_mitigations:

  - risk: "MMD format variations from manual editing"
    likelihood: MEDIUM
    impact: HIGH
    mitigation: |
      - Schema validation in cmd_orchestration_validate()
      - Graceful fallbacks for missing fields
      - Warning messages for non-standard patterns

  - risk: "Circular dependencies in edge parsing"
    likelihood: LOW
    impact: MEDIUM
    mitigation: |
      - Dependency cycle detection
      - Clear error messages identifying cycles

  - risk: "Agent routing mismatch"
    likelihood: MEDIUM
    impact: MEDIUM
    mitigation: |
      - Validate AGENT_ROUTING against known agent list
      - Cross-reference with KNOWN_AGENTS in agent_help.py

