# =============================================================================
# TRANSFORMATION PSEUDOCODE
# =============================================================================
transformation_pseudocode:

  class_design: |
    class MMDParserService:
        """Transform orchestration MMD files into task-plan YAML structures."""

        def parse_mmd_to_tasks(self, mmd_path: Path, plan_folder: Path) -> dict:
            """
            Entry point: MMD file -> structured tasklist

            Returns: {
                "plan_metadata": {...},
                "phases": [...],
                "tasks": [...],
                "orchestration_info": {...}
            }
            """
            content = mmd_path.read_text()

            # Stage 1: Extract metadata from comment header
            metadata = self._extract_metadata(content)

            # Stage 2: Extract phase information
            phases = self._extract_phases(content, metadata)

            # Stage 3: Extract task nodes from flowchart
            nodes = self._extract_flowchart_nodes(content)

            # Stage 4: Determine dependencies
            dependencies = self._extract_task_dependencies(content, nodes)

            # Stage 5: Generate task list structure
            tasks = self._generate_tasklist(nodes, phases, dependencies)

            return {
                "plan_metadata": metadata,
                "phases": phases,
                "tasks": tasks
            }

  metadata_extraction: |
    def _extract_metadata(self, content: str) -> dict:
        """Extract %% comment header metadata."""
        patterns = {
            "GOAL": r'%% GOAL: (.+)',
            "PROFILE": r'%% PROFILE: (.+)',
            "PHASES": r'%% PHASES: (.+)',
            "AGENT_ROUTING": r'%% AGENT_ROUTING: (.+)',
            "STATUS": r'%% STATUS: (.+)',
            "INPUT_PATH": r'%% INPUT_PATH: (.+)',
        }
        metadata = {}
        for name, pattern in patterns.items():
            match = re.search(pattern, content)
            if match:
                metadata[name.lower()] = match.group(1).strip()
        return metadata

  phase_extraction: |
    def _extract_phases(self, content: str, metadata: dict) -> list:
        phases = []

        # Try metadata first (%%PHASES: phase1, phase2)
        if "phases" in metadata:
            phase_list = [p.strip() for p in metadata["phases"].split(",")]
            phases = [{"id": f"phase_{i+1}", "name": p, "order": i}
                     for i, p in enumerate(phase_list)]
        else:
            # Extract from subgraph definitions
            subgraph_pattern = r'subgraph (\w+) \["([^"]+)"\]'
            for match in re.finditer(subgraph_pattern, content):
                phases.append({
                    "id": match.group(1),
                    "name": match.group(2),
                    "order": len(phases)
                })
        return phases

  node_extraction: |
    def _extract_flowchart_nodes(self, content: str) -> list:
        node_pattern = r'\[([^\]]+)\]'
        nodes = []

        for match in re.finditer(node_pattern, content):
            label = match.group(1)
            if not label or len(label) < 3:
                continue

            # Parse task ID if present (TASK-ID: description)
            if ":" in label:
                task_id, description = label.split(":", 1)
                task_id = task_id.strip()
                description = description.strip()
            else:
                task_id = self._generate_task_id(label)
                description = label

            nodes.append({
                "node_id": task_id,
                "label": label,
                "description": description,
                "type": "task"
            })
        return nodes

  dependency_extraction: |
    def _extract_task_dependencies(self, content: str, nodes: list) -> dict:
        dependencies = {}
        edge_pattern = r'(\w+)\s*(?:---|-->|-.->)\s*(\w+)'

        for match in re.finditer(edge_pattern, content):
            from_node = match.group(1)
            to_node = match.group(2)

            if to_node not in dependencies:
                dependencies[to_node] = []
            dependencies[to_node].append(from_node)

        return dependencies

  tasklist_generation: |
    def _generate_tasklist(self, nodes: list, phases: list,
                          dependencies: dict) -> list:
        tasks = []

        for i, node in enumerate(nodes):
            task = {
                "id": node["node_id"],
                "name": node["description"][:100],
                "description": node["description"],
                "status": "pending",
                "sequence": i + 1,
                "depends_on": dependencies.get(node["node_id"], [])
            }

            # Infer phase from node ID prefix
            for phase in phases:
                if node["node_id"].startswith(phase["id"]):
                    task["phase"] = phase["id"]
                    break
            else:
                task["phase"] = phases[0]["id"] if phases else "phase_1"

            tasks.append(task)

        return tasks

