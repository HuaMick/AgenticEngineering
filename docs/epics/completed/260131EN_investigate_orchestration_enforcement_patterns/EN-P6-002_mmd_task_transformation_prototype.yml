# =============================================================================
# KEY DESIGN DECISIONS
# =============================================================================
key_design_decisions:

  regex_based_parsing:
    decision: "Use regex-based parsing (vs. external Mermaid library)"
    rationale: |
      - Existing codebase patterns use regex
      - Avoids new dependencies
      - Sufficient for controlled MMD generation
    constraint: "Assumes well-formed MMD from internal generation tools"

  reuse_existing_task_schema:
    decision: "Reuse existing task schema (vs. creating new format)"
    rationale: |
      - Seamless integration with plan.py task commands
      - No schema duplication
      - Agents already understand this format
    benefit: "cmd_task_list, cmd_task_update work immediately"

  two_stage_parsing:
    decision: "Metadata + structural parsing (vs. monolithic)"
    rationale: |
      - Metadata provides authoritative context
      - Structure provides granular tasks
    benefit: "Handles both auto-generated and manually-edited MMD files"

  phase_first_organization:
    decision: "Phase-first organization (vs. task-first)"
    rationale: |
      - Plans are phase-organized
      - Tasks belong to phases
    mapping: "Node IDs often contain phase prefix (build_001, test_001)"

# =============================================================================
# BOOTSTRAP FLOW INTEGRATION
# =============================================================================
bootstrap_integration:

  current_flow: |
    agent_help.py -> extracts GOAL + first 8 steps from process.mmd

  proposed_flow_option_a: |
    MMD-to-Tasks Direct Transformation:

    orchestration.yml -> MMD file
        |
        v
    agentic plan orchestration generate --mmd <path>
        |
        v
    plan_*.yml (task list with full task extraction)
        |
        v
    agentic context bootstrap --role <agent>
        |
        v
    Enhanced context with full tasklist (not just first 8 steps)

  proposed_flow_option_b: |
    Plan-First Approach:

    orchestration.yml -> MMD file
        |
        v
    planner agents generate plan_*.yml files
        |
        v
    agentic plan orchestration validate (validates MMD matches plans)
        |
        v
    executor agents use task lists from plan_*.yml

# =============================================================================
# VALIDATION APPROACH
# =============================================================================
validation_approach:

  cmd_orchestration_validate:
    purpose: "Validate MMD matches plan YAML files"
    steps:
      - Parse MMD metadata and task extraction
      - Load plan YAML files from plan folder
      - Verify MMD nodes map to plan tasks
      - Check for orphaned tasks or missing nodes
      - Validate agent routing consistency
    output: "Validation report with discrepancies"

