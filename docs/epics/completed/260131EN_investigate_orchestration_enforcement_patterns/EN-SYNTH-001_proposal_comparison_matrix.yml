# CROSS-PROPOSAL DEPENDENCIES
# =============================================================================

cross_proposal_dependencies:

  foundational_proposals:
    - proposal: P3
      title: "Session Spawn Context Injection"
      dependents: [P4, P5]
      rationale: "All role-based enforcement depends on sessions knowing their role"

    - proposal: P4
      title: "Role Detection/Identification"
      dependents: [P5]
      rationale: "Session-level enforcement requires role detection logic"

  complementary_pairs:
    - pair: [P2, P6]
      relationship: "Plan-level vs Agent-level task structure"
      integration: "P2 provides orchestration structure; P6 provides agent steps"

    - pair: [P1, P2]
      relationship: "Task tracking vs Task preloading"
      integration: "P2 generates tasklists; P1 tracks their status"

    - pair: [P4, P5]
      relationship: "Role detection vs Session enforcement"
      integration: "P4 detects roles; P5 enforces session hierarchy"

  dependency_graph: |
    P3 (Session Context Injection) ─── foundational for ──→ P4 (Role Detection)
                                                                   │
                                                                   └──→ P5 (Tmux Patterns)

    P2 (Preloaded Tasklists) ──── complements ──→ P1 (CLI Tasklist Tracking)
           │
           └──── complements ──→ P6 (Bootstrap Plan Generation)

  implementation_sequence:
    phase_1_foundation:
      proposals: [P3, P4]
      rationale: "Establish environment-based context and role detection"

    phase_2_structure:
      proposals: [P2]
      rationale: "Add plan-level task structure from MMD parsing"

    phase_3_enforcement:
      proposals: [P5]
      rationale: "Session-level hierarchy enforcement with tmux"

    phase_4_granularity:
      proposals: [P6]
      rationale: "Agent-level step-by-step guidance"

    phase_5_optional:
      proposals: [P1]
      rationale: "Enhanced task tracking and gates (if needed after P2)"

