# =============================================================================
# INTEGRATION STRATEGY
# =============================================================================

integration_strategy:

  parallel_implementation:
    group_1:
      proposals: [P3, P4]
      can_develop_in_parallel: false
      reason: "P4 depends on P3's environment variables"
      sequence: "P3 first, then P4"

    group_2:
      proposals: [P2, P6]
      can_develop_in_parallel: true
      reason: "Both parse different sources (MMD vs process.yml)"
      coordination: "Share task schema format"

  integration_points:
    session_spawn:
      proposals_integrating: [P3, P4]
      file: "modules/AgenticCLI/src/agenticcli/commands/session.py"
      changes:
        - "P3: Environment variable injection"
        - "P4: Role-based enforcement checks"

    context_bootstrap:
      proposals_integrating: [P2, P6]
      file: "modules/AgenticCLI/src/agenticcli/commands/context.py"
      changes:
        - "P2: Include preloaded tasklist from MMD"
        - "P6: Generate agent task file from process.yml"

    session_service:
      proposals_integrating: [P5]
      file: "modules/AgenticGuidance/src/agenticguidance/services/session.py"
      changes:
        - "P5: Wrap with OrchestrationEnforcementService"

  shared_components:
    task_schema:
      used_by: [P1, P2, P6]
      location: "plan_example.yml task structure"

    environment_variables:
      used_by: [P3, P4, P5]
      prefix: "AGENTIC_*"

    session_registry:
      used_by: [P3, P4, P5]
      location: "~/.agentic/sessions/*.json"

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================

success_criteria:

  functional:
    - criterion: "Sessions can identify their role (orchestrator vs subagent)"
      proposals: [P3, P4]
      validation: "agentic session whoami shows role correctly"

    - criterion: "Orchestrators can spawn subagent sessions with context"
      proposals: [P3, P4, P5]
      validation: "Spawned session sees AGENTIC_SESSION_ROLE=subagent"

    - criterion: "Subagents are blocked from orchestrator-only operations"
      proposals: [P4, P5]
      validation: "Subagent cannot archive plan; receives blocking error"

    - criterion: "Plans have preloaded tasklists from MMD"
      proposals: [P2]
      validation: "entrypoint execute --compile includes tasklist"

    - criterion: "Agents receive step-by-step task files at bootstrap"
      proposals: [P6]
      validation: "agentic context bootstrap includes agent task file"

    - criterion: "Session hierarchy is tracked and queryable"
      proposals: [P5]
      validation: "agentic orchestration hierarchy shows parent-child tree"

  non_functional:
    - criterion: "Session spawn adds < 100ms overhead"
      proposals: [P3, P4]

    - criterion: "MMD parsing completes in < 500ms for typical files"
      proposals: [P2]

    - criterion: "No breaking changes to existing CLI commands"
      proposals: [P1, P2, P3, P4, P5, P6]

    - criterion: "Clear error messages for enforcement violations"
      proposals: [P4, P5]

    - criterion: "Backward compatibility for sessions without orchestration context"
      proposals: [P3, P4, P5]

