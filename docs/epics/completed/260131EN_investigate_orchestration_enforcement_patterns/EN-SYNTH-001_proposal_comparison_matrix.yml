    - proposal: "P3: Session Spawn Context Injection"
      complexity: LOW-MEDIUM
      effort_range: "80-100"
      effort_detail: "Phase 1: 50h (core), Phase 2: 20h (prompt), Phase 3: 30h (registry)"
      risk: LOW
