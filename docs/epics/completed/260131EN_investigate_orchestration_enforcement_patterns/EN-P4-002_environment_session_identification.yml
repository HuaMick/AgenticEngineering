# =============================================================================
# ANSWERS TO OPEN QUESTIONS
# =============================================================================

answered_questions:

  question_can_env_vars_distinguish_session_types:
    answer: |
      YES - but requires implementation. Currently NO environment variables
      distinguish session types. With the proposed AGENTIC_SESSION_ROLE variable,
      sessions can immediately detect their role:

      - AGENTIC_SESSION_ROLE=orchestrator -> main session managing tasks
      - AGENTIC_SESSION_ROLE=subagent -> spawned worker session
      - Not set -> legacy session without orchestration context

  question_what_claude_variables_could_be_used:
    answer: |
      Claude Code sets CLAUDE_CODE_ENTRYPOINT=cli but this only indicates
      CLI vs IDE origin, not session role or identity. CLAUDE_SESSION_ID
      is NOT currently exposed (feature request #17188 pending).

      Our AGENTIC_* variables work independently of Claude's internal session
      tracking and provide richer orchestration context.

  question_cross_platform_compatibility:
    answer: |
      Environment variables are POSIX-standard and work on:
      - Linux (confirmed via testing)
      - macOS (standard POSIX)
      - Windows (via Python's os.environ)
      - WSL (confirmed - current environment)

      No platform-specific issues expected.

  question_detection_informing_behavior:
    answer: |
      With environment-based role detection, behavior can be modified:

      For orchestrators:
      - Allow spawning subagents
      - Access to full plan context
      - Task delegation responsibilities
      - Progress monitoring duties

      For subagents:
      - Focus on assigned AGENTIC_TASK_ID only
      - Discourage spawning additional agents
      - Report back to parent session
      - Stay within task boundaries

      Enforcement can be:
      - Soft: Warnings when behavior deviates
      - Hard: Block operations inconsistent with role

# =============================================================================
# CONCLUSION
# =============================================================================

conclusion: |
  Environment-based session identification is the recommended approach for
  distinguishing orchestrators from subagents and establishing session hierarchy.

  Key Points:
  1. Current state: No session identification via environment variables
  2. Claude Code limitation: CLAUDE_SESSION_ID not exposed (pending #17188)
  3. Solution: Implement AGENTIC_* variable scheme in session spawn
  4. Integration: Works with existing EnvironmentProvider infrastructure
  5. Effort: ~80-100 LOC, LOW complexity, fully backward compatible

  The EN-P3-003 design document already provides the complete technical design.
  This research validates that design and confirms environment variables as
  the industry-recommended approach.

  Next Step: EN-P4-003 should synthesize findings from EN-P4-001 (metadata audit)
  and this research (EN-P4-002) into a role detection and enforcement design.

