# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary: |
  This research investigates how environment variables can be used for session
  identification in the current architecture, with focus on distinguishing
  orchestrators from subagents and establishing parent-child relationships.

  Key Findings:
  1. Claude Code sets CLAUDE_CODE_ENTRYPOINT=cli but NO session ID in environment
  2. There is an open feature request (#17188) for CLAUDE_SESSION_ID exposure
  3. The AgenticCLI already has design for AGENTIC_* variables (see EN-P3-003)
  4. Current subprocess spawns do NOT pass custom environment variables
  5. Environment-based identification is the recommended approach per industry analysis

  Recommendation:
  Implement the AGENTIC_* environment variable scheme from EN-P3-003, which provides
  a complete session identification framework that works independently of Claude Code's
  native session tracking.

# =============================================================================
# CURRENT ENVIRONMENT ANALYSIS
# =============================================================================

current_environment_analysis:

  claude_code_variables:
    description: "Environment variables set by Claude Code CLI"
    observed_variables:
      - name: "CLAUDE_CODE_ENTRYPOINT"
        value: "cli"
        description: "Indicates session was started via CLI (vs IDE)"
        useful_for_identification: false
        reason: "Does not provide session ID or role information"

    missing_variables:
      - name: "CLAUDE_SESSION_ID"
        status: "NOT EXPOSED - Feature Request #17188 pending"
        description: |
          Claude Code tracks session IDs internally (visible in transcript paths
          like ~/.claude/projects/.../UUID.jsonl) but does NOT expose them as
          environment variables to subprocesses, hooks, or scripts.

      - name: "CLAUDE_SESSION_NAME"
        status: "NOT EXPOSED - Feature Request #17188 pending"
        description: "User-defined name from /rename command"

      - name: "CLAUDE_SESSION_STARTED"
        status: "NOT EXPOSED - Feature Request #17188 pending"
        description: "Session start timestamp"

    reference: "https://github.com/anthropics/claude-code/issues/17188"

  agentic_cli_variables:
