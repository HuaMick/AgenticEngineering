      - name: "AGENTIC_PLANS_DIR"
        used_by: "MCP Orchestration Server"
        file: "modules/AgenticCLI/src/agenticcli/mcp/orchestration_server.py"
        purpose: "Override plans directory location"

    loaded_from_environment:
      loader: "EnvironmentProvider (agenticguidance/services/environment.py)"
      pattern: "Loads all AGENTIC_* prefixed variables"
      behavior: "Variables are loaded from environment and merged with config"
      code_reference: |
        def _load_from_env(self) -> dict[str, EnvVar]:
            for name, value in os.environ.items():
                if name.startswith("AGENTIC_"):
                    env_vars[name] = EnvVar(...)

  terminal_session_variables:
