# =============================================================================
# SESSION SPAWN ANALYSIS
# =============================================================================

session_spawn_environment_analysis:

  current_spawn_behavior:
    file: "modules/AgenticCLI/src/agenticcli/commands/session.py"
    function: "cmd_spawn()"

    popen_call:
      description: "Background session spawn via subprocess.Popen"
      current_code: |
        process = subprocess.Popen(
            cmd,
            cwd=working_dir,
            stdin=subprocess.DEVNULL,
            stdout=stdout_log,
            stderr=stderr_log,
            start_new_session=True,
            # NOTE: NO env= parameter - inherits parent environment
        )

    run_call:
      description: "Foreground session spawn via subprocess.run"
      current_code: |
        result = subprocess.run(
            cmd,
            cwd=working_dir,
            capture_output=True,
            text=True,
            # NOTE: NO env= parameter - inherits parent environment
        )

    finding: |
      CRITICAL GAP: Neither subprocess.Popen nor subprocess.run in cmd_spawn()
      passes a custom environment dictionary. This means:
      - Subprocesses inherit the parent process environment unchanged
      - No orchestration context is injected at spawn time
      - Spawned sessions cannot detect their role via environment

  proposed_modification:
    description: "From EN-P3-003 design document"
    code_example: |
      # Build environment with orchestration context
      spawn_env = os.environ.copy()

      # Always set session ID
      spawn_env["AGENTIC_SESSION_ID"] = session_id

      # Set orchestration context if provided via CLI args
      if role:
          spawn_env["AGENTIC_SESSION_ROLE"] = role
      if task:
          spawn_env["AGENTIC_TASK_ID"] = task
      if plan:
          spawn_env["AGENTIC_PLAN_FOLDER"] = plan
      if parent_session:
          spawn_env["AGENTIC_PARENT_SESSION"] = parent_session
      if phase:
          spawn_env["AGENTIC_PHASE"] = phase

      # Pass to subprocess
      process = subprocess.Popen(cmd, env=spawn_env, ...)

# =============================================================================
# PROPOSED ENVIRONMENT VARIABLE SCHEME
# =============================================================================

proposed_environment_scheme:

  overview: |
    Based on EN-P3-003 context injection design and industry best practices
    (see Claude Code feature request #17188), the following environment variable
    scheme is proposed for session identification.

  variables:

    # --- Session Identity ---
    variable_1:
      name: "AGENTIC_SESSION_ID"
      type: "string (UUID)"
      set_by: "agentic session spawn command"
      purpose: "Unique identifier for this session"
      value_example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      usage: |
        - Cross-reference with session registry (~/.agentic/sessions/*.json)
        - Parent reference for child sessions
        - Logging and tracing correlation

    # --- Role Identification ---
    variable_2:
      name: "AGENTIC_SESSION_ROLE"
      type: "enum string"
      values: ["orchestrator", "subagent"]
      set_by: "agentic session spawn --role"
      purpose: "Distinguish orchestrator from subagent"
      value_example: "subagent"
      detection_logic: |
        role = os.environ.get("AGENTIC_SESSION_ROLE")
        if role == "orchestrator":
            # This session manages task delegation
            # Can spawn subagents, read full plan
        elif role == "subagent":
            # This session performs assigned task only
            # Should NOT spawn additional subagents
            # Should focus on AGENTIC_TASK_ID only
        else:
            # Legacy session without orchestration context
            # Apply default behavior

    # --- Parent-Child Hierarchy ---
    variable_3:
      name: "AGENTIC_PARENT_SESSION"
      type: "string (UUID) or empty"
      set_by: "agentic session spawn --parent-session"
      purpose: "Establish session hierarchy"
      value_example: "parent-uuid-here"
      enables:
        - Session tree traversal
        - Orphan session detection
        - Cascading termination
        - Progress reporting to parent

    # --- Task/Plan Context ---
    variable_4:
      name: "AGENTIC_TASK_ID"
      type: "string"
      set_by: "agentic session spawn --task"
      purpose: "Assigned task identifier"
      value_example: "EN-P4-002"
      usage: |
        - Task boundary enforcement (stay within assigned task)
        - Progress tracking and reporting
        - Correlation with plan files

    variable_5:
      name: "AGENTIC_PLAN_FOLDER"
      type: "string (path)"
      set_by: "agentic session spawn --plan"
      purpose: "Plan folder for context"
      value_example: "docs/plans/live/260131EN_investigate_orchestration_enforcement_patterns"
      usage: |
        - Read plan_*.yml for task details
        - Find orchestration diagrams
        - Locate related files

    variable_6:
      name: "AGENTIC_PHASE"
      type: "string"
      set_by: "agentic session spawn --phase"
      purpose: "Orchestration workflow phase"
      value_example: "build"
      values: ["plan", "build", "test", "review", "deploy"]
      usage: |
        - Phase-appropriate behavior guidance
        - Gate enforcement (can't deploy during plan phase)

  detection_code:
    python: |
      import os

      def detect_session_context():
          """Detect orchestration context from environment variables."""
          return {
              "session_id": os.environ.get("AGENTIC_SESSION_ID"),
              "role": os.environ.get("AGENTIC_SESSION_ROLE"),
              "parent_session": os.environ.get("AGENTIC_PARENT_SESSION"),
              "task_id": os.environ.get("AGENTIC_TASK_ID"),
              "plan_folder": os.environ.get("AGENTIC_PLAN_FOLDER"),
              "phase": os.environ.get("AGENTIC_PHASE"),
          }

      def is_orchestrator():
          return os.environ.get("AGENTIC_SESSION_ROLE") == "orchestrator"

      def is_subagent():
          return os.environ.get("AGENTIC_SESSION_ROLE") == "subagent"

      def get_parent_session():
          return os.environ.get("AGENTIC_PARENT_SESSION")

      def get_assigned_task():
          return os.environ.get("AGENTIC_TASK_ID")

    shell: |
      # Check if this is a subagent session
      if [ "$AGENTIC_SESSION_ROLE" = "subagent" ]; then
          echo "I am a subagent working on task $AGENTIC_TASK_ID"
          echo "My parent is $AGENTIC_PARENT_SESSION"
      fi

      # Check if orchestrator
      if [ "$AGENTIC_SESSION_ROLE" = "orchestrator" ]; then
          echo "I am the orchestrator for plan $AGENTIC_PLAN_FOLDER"
      fi

# =============================================================================
# INTEGRATION WITH EXISTING SYSTEMS
# =============================================================================

integration_analysis:

  session_registry_integration:
    description: "How env vars relate to ~/.agentic/sessions/*.json"
    approach: |
      The session registry stores the authoritative session record.
      Environment variables provide runtime access to the same information.

      Flow:
      1. spawn command generates session_id UUID
      2. session_id stored in registry file AND set as AGENTIC_SESSION_ID
      3. Additional context (role, task, etc.) stored in registry AND env vars
      4. Spawned process can read context from env vars immediately
      5. External tools can query registry for full session details

    schema_alignment: |
      Session Registry Field     Environment Variable
      -------------------        -------------------
      session_id                 AGENTIC_SESSION_ID
      role                       AGENTIC_SESSION_ROLE
      task_id                    AGENTIC_TASK_ID
      plan_folder                AGENTIC_PLAN_FOLDER
      parent_session             AGENTIC_PARENT_SESSION
      phase                      AGENTIC_PHASE

  environment_provider_integration:
    description: "How this works with EnvironmentProvider service"
    approach: |
      The EnvironmentProvider in agenticguidance/services/environment.py
      already loads AGENTIC_* variables from the environment. This means:

      1. AGENTIC_* variables set at spawn time will be loaded automatically
      2. Commands using EnvironmentProvider will see these variables
      3. get_subprocess_env() will propagate them to nested processes

    benefit: |
      No changes needed to EnvironmentProvider - it already handles AGENTIC_*
      prefix variables. The session spawn code just needs to SET them.

  tmux_integration:
    description: "Relationship with tmux session management"
    approach: |
      Tmux sessions tracked by SessionService (agenticguidance/services/session.py)
      can cross-reference with environment-based session identification:

      Option A - Store env session ID in tmux metadata:
        tmux set-environment -t $session_name AGENTIC_SESSION_ID $uuid

      Option B - Derive correlation from working directory:
        Both systems track working directory, enabling correlation

      Option C - Use tmux session name to encode role:
        Naming convention: {plan_id}_{role}_{task_id}

    recommendation: |
      Start with Option A (environment variable propagation in tmux) for
      consistency with the overall environment-based approach.

  claude_code_integration:
    description: "Interaction with Claude Code's environment"
    current_state: |
      Claude Code does NOT expose CLAUDE_SESSION_ID (feature request pending).
      However, Claude Code sessions CAN read environment variables set by
      the parent process (agentic session spawn).

    implication: |
      Our AGENTIC_* variables will be available inside Claude Code sessions
      because they're set in the subprocess environment. Claude Code will
      inherit them and pass them to any tools/hooks it runs.

    caveat: |
      If a user starts Claude Code manually (not via agentic session spawn),
      no AGENTIC_* variables will be set. The session detection should
      handle this gracefully:

      role = os.environ.get("AGENTIC_SESSION_ROLE")
      if role is None:
          # Legacy session - no orchestration context
          # Apply default behavior or prompt user

# =============================================================================
# COMPARISON WITH ALTERNATIVES
# =============================================================================

alternative_approaches:

  approach_file_markers:
    description: "Use file markers instead of environment variables"
    mechanism: |
      Create a marker file at session start:
      ~/.agentic/sessions/{session_id}/context.yml

      Agent reads this file to determine role.

    pros:
      - Persists across process restarts
      - Can store complex context
      - Visible in filesystem

    cons:
      - File I/O overhead
      - Race conditions possible
      - Cleanup required
      - Agent must know where to look

    verdict: "Inferior to environment variables for quick detection"

  approach_cli_query:
    description: "Query CLI for session context"
    mechanism: |
      Agent calls: agentic session whoami
      Returns: {"role": "subagent", "task": "EN-P4-002", ...}

    pros:
      - Authoritative answer from registry
      - Can return rich context
      - Works for any process

    cons:
      - Subprocess overhead (~200ms)
      - Requires CLI availability
      - Token cost for agent to call

    verdict: "Good for verification, not for primary detection"

  approach_prompt_embedding:
    description: "Embed context in prompt (--inject-context)"
    mechanism: |
      Prefix prompt with:
      [ORCHESTRATION CONTEXT]
      Role: subagent
      Task: EN-P4-002
      [END ORCHESTRATION CONTEXT]

    pros:
      - Immediate visibility to LLM
      - No environment parsing needed
      - Self-documenting

    cons:
      - Token overhead (~50-100 tokens)
      - Can be ignored/overwritten
      - Doesn't help tool scripts

    verdict: "Good supplement, not replacement for env vars"

  approach_consensus: |
    Environment variables are the RECOMMENDED primary mechanism because:
    1. Zero latency - available immediately
    2. Standard POSIX convention - works everywhere
    3. Propagates to subprocesses automatically
    4. No file I/O or subprocess overhead
    5. Works for both LLM and tool scripts

    Industry validation: The Claude Code feature request #17188 (with 8.3-8.6/10
    score from multi-agent analysis) confirms environment variables as the
    ideal long-term solution for session identification.

