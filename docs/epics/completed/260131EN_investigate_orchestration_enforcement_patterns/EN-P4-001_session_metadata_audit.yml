      question: "Should they be unified or cross-referenced?"

# =============================================================================
# ANSWERS TO OPEN QUESTIONS
# =============================================================================

answered_questions:

  question_what_metadata_exists:
    answer: |
      Multiple overlapping systems with similar but not identical schemas:
      1. CLI session: session_id, pid, prompt, status, working_dir, etc.
      2. Loop: loop_id, iterations, completion_promise, etc.
      3. Tmux: name, state, worktree, plan_folder, etc.
      4. StateRegistry: pid, name, command, state, etc.

      All have metadata dicts that are UNUSED.

  question_can_sessions_identify_role:
    answer: |
      Currently NO. No system has a role field or parent reference.

      However, capabilities exist to add this:
      - Metadata dicts can store role
      - Environment variables can be set at spawn
      - Working directory provides inference signal
      - Tmux session naming could encode role

  question_session_lifecycle_events:
    answer: |
      Lifecycle events tracked:
      - spawn/start: Creates session record
      - status transitions: starting -> running -> completed/failed/stopped
      - process death detection: Automatic via PID checks
      - cleanup: Manual cleanup commands available

      NOT tracked:
      - Role assignment
      - Parent-child relationships
      - Task assignment
      - Orchestration state changes
