# ========================================
# ROOT-LEVEL PLAN METADATA
# ========================================
name: "jit-context-retrieval"
status: "completed"
priority: "high"
completed_date: "2026-01-24"
completion_note: "Implementation completed via sub-plans in completed/ folder"

# ========================================
# OBJECTIVE
# ========================================
objective: |
  Repurpose the Context Entrypoints project to implement a JIT (Just-In-Time) 
  Pull-based context architecture. Agents will use the CLI to retrieve their 
  objectives, processes, and inputs, moving away from pre-compiled static 
  markdown files.

# ========================================
# CONTEXT
# ========================================
context: |
  - Current "Push" model leads to context bloat and stale guidance.
  - Planning is now "Main-First", but agents in worktrees often lose 
    visibility of the live plan.
  - The CLI is the natural bridge to resolve the Main-First plan into the 
    Feature worktree session.

# ========================================
# PHASES
# ========================================
phases:

  # ----------------------------------------
  # PHASE 1: CLI Context Commands
  # ----------------------------------------
  - name: "CLI Context Commands"
    id: "phase_01"
    description: "Implement the 'agentic context' command group in the CLI"
    status: "pending"
    tasks:
      - id: "01.1"
        name: "Create cmd_context module"
        description: "Add a new command module for context retrieval"
        status: "pending"
        agent_type: "build"

      - id: "01.2"
        name: "Implement Main-First Plan Hunter"
        description: "CLI logic to find the active plan in the main worktree based on current branch"
        status: "pending"
        agent_type: "build"

      - id: "01.3"
        name: "Implement context bootstrap command"
        description: "Create the primary entrypoint for agents to get their 'Seed Context'"
        status: "pending"
        agent_type: "build"

  # ----------------------------------------
  # PHASE 2: Thin-Client Agent Migration
  # ----------------------------------------
  - name: "Thin-Client Agent Migration"
    id: "phase_02"
    description: "Update agent definitions to use the CLI for initialization"
    status: "pending"
    tasks:
      - id: "02.1"
        name: "Draft 'Bootstrap Context' template"
        description: "Define the minimal instructions for an agent to perform self-initialization"
        status: "pending"
        agent_type: "planner-guidance"

      - id: "02.2"
        name: "Migrate pilot agents"
        description: "Update a subset of agents (e.g., Planner, Builder) to the Pull model"
        status: "pending"
        agent_type: "build"

  # ----------------------------------------
  # PHASE 3: Validation & Cleanup
  # ----------------------------------------
  - name: "Validation & Cleanup"
    id: "phase_03"
    description: "Verify functional correctness and decommission legacy files"
    status: "pending"
    tasks:
      - id: "03.1"
        name: "Verify context accuracy"
        description: "Check if Clifford/agents correctly receive the same guidance we previously pushed via MD files"
        status: "pending"
        agent_type: "test"

      - id: "03.2"
        name: "Decommission static MD agents"
        description: "Remove the large flattened MD files from .claude/agents/ in favor of the new model"
        status: "pending"
        agent_type: "build"

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - Agents can correctly identify their task objective by running a CLI command.
  - Context bloat (initial session tokens) is reduced by at least 50%.
  - Policies updated in the CLI are immediately respected by agents in all worktrees.
  - Main-First planning folders are successfully resolved in feature worktree sessions.
