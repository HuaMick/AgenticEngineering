      \n\nfrom dataclasses import dataclass, field\nfrom pathlib import Path\nfrom\
      \ typing import Optional\n\nimport yaml\n\n\n@dataclass\nclass PresetLoadResult:\n\
      \    \"\"\"Result of loading a preset.\"\"\"\n\n    preset_name: str\n    tasks_added:\
      \ int\n    tasks: list[dict] = field(default_factory=list)\n    target_file:\
      \ Optional[str] = None\n    dry_run: bool = False\n\n\nclass TaskPresetWorkflow:\n\
      \    \"\"\"Workflow for loading task presets into plan files.\n\n    Provides:\n\
      \    - Loading preset templates from templates/presets/\n    - Adding preset\
      \ tasks to plan_live_*.yml files\n    - Listing available presets\n    \"\"\"\
      \n\n    PRESETS_DIR = Path(__file__).parent.parent / \"templates\" / \"presets\"\
      \n\n    def __init__(self, plan_path: Path):\n        \"\"\"Initialize task\
      \ preset workflow.\n\n        Args:\n            plan_path: Path to the plan\
      \ folder.\n        \"\"\"\n        self.plan_path = plan_path\n        self.live_dir\
      \ = plan_path / \"live\"\n\n    def list_presets(self) -> list[str]:\n     \
      \   \"\"\"List available preset names.\n\n        Returns:\n            List\
      \ of preset names (without .yml extension).\n        \"\"\"\n        if not\
      \ self.PRESETS_DIR.exists():\n            return []\n        return [f.stem\
      \ for f in self.PRESETS_DIR.glob(\"*.yml\")]\n\n    def get_preset_path(self,\
      \ preset_name: str) -> Path:\n        \"\"\"Get path to a preset file.\n\n \
      \       Args:\n            preset_name: Name of the preset (with or without\
      \ .yml).\n\n        Returns:\n            Path to preset file.\n\n        Raises:\n\
      \            FileNotFoundError: If preset doesn't exist.\n        \"\"\"\n \
      \       # Support both \"planner-build\" and \"planner-build-preset\"\n    \
      \    candidates = [\n            self.PRESETS_DIR / f\"{preset_name}.yml\",\n\
      \            self.PRESETS_DIR / f\"{preset_name}-preset.yml\",\n        ]\n\n\
      \        for path in candidates:\n            if path.exists():\n          \
      \      return path\n\n        raise FileNotFoundError(f\"Preset '{preset_name}'\
      \ not found\")\n\n    def load_preset(\n        self,\n        preset_name:\
      \ str,\n        dry_run: bool = False,\n    ) -> PresetLoadResult:\n       \
      \ \"\"\"Load a preset and add tasks to plan.\n\n        Args:\n            preset_name:\
      \ Name of the preset to load.\n            dry_run: If True, don't make changes.\n\
      \n        Returns:\n            PresetLoadResult with operation details.\n\n\
      \        Raises:\n            FileNotFoundError: If preset doesn't exist.\n\
      \        \"\"\"\n        preset_path = self.get_preset_path(preset_name)\n \
      \       preset_data = yaml.safe_load(preset_path.read_text())\n\n        tasks\
      \ = preset_data.get(\"tasks\", [])\n\n        if dry_run:\n            return\
      \ PresetLoadResult(\n                preset_name=preset_name,\n            \
      \    tasks_added=len(tasks),\n                tasks=tasks,\n               \
      \ dry_run=True,\n            )\n\n        # Find or create target file\n   \
      \     target_file = self._find_or_create_task_file()\n\n        # Load existing\
      \ content\n        if target_file.exists():\n            content = yaml.safe_load(target_file.read_text())\
      \ or {}\n        else:\n            content = {\n                \"name\": f\"\
      tasks-{self.plan_path.name}\",\n                \"preset_source\": preset_name,\n\
      \                \"tasks\": [],\n            }\n\n        # Add tasks\n    \
      \    existing_tasks = content.get(\"tasks\", [])\n        existing_ids = {t.get(\"\
      id\") for t in existing_tasks}\n\n        added_count = 0\n        for task\
      \ in tasks:\n            if task.get(\"id\") not in existing_ids:\n        \
      \        existing_tasks.append(task)\n                added_count += 1\n\n \
      \       content[\"tasks\"] = existing_tasks\n\n        # Write back\n      \
      \  with open(target_file, \"w\") as f:\n            yaml.dump(content, f, default_flow_style=False,\
      \ sort_keys=False, allow_unicode=True)\n\n        return PresetLoadResult(\n\
      \            preset_name=preset_name,\n            tasks_added=added_count,\n\
      \            tasks=tasks,\n            target_file=target_file.name,\n     \
      \   )\n\n    def _find_or_create_task_file(self) -> Path:\n        \"\"\"Find\
      \ existing task file or create path for new one.\n\n        Returns:\n     \
      \       Path to task file.\n        \"\"\"\n        # Look for existing plan_live_tasks.yml\n\
      \        task_file = self.live_dir / \"plan_live_tasks.yml\"\n        if task_file.exists():\n\
      \            return task_file\n\n        # Look for any plan_live_*.yml\n  \
      \      for f in self.live_dir.glob(\"plan_live_*.yml\"):\n            return\
      \ f\n\n        # Create new task file\n        self.live_dir.mkdir(parents=True,\
      \ exist_ok=True)\n        return task_file\n```\n\nAlso update __init__.py to\
      \ export the new class.\n"
    success_criteria:
    - TaskPresetWorkflow class created with documented methods
    - list_presets() returns available preset names
    - load_preset() loads YAML and adds tasks
    - Supports dry_run mode
    - PresetLoadResult dataclass captures operation results
    - Module exported from workflows/__init__.py
