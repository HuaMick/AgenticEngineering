  - id: design_cli_interface
    name: Design CLI Interface
    description: "Command: agentic plan init <branch> [--description <desc>] [--base\
      \ <base-branch>]\n\nBehavior:\n1. Check if worktree exists for <branch>\n  \
      \ - If no: create worktree at ../<repo>-<branch> from <base-branch> (default:\
      \ main)\n   - If yes: use existing worktree\n2. Generate plan folder name: YYMMDDXX_<description>\n\
      \   - YYMMDD: Current date\n   - XX: Worktree identifier (2 chars from branch\
      \ suffix or configured)\n   - description: Sanitized from --description or prompted\n\
      3. Create folder structure in worktree's docs/plans/live/:\n   - YYMMDDXX_description/\n\
      \     - live/\n     - analysis/\n     - audit/\n     - completed/\n     - README.md\
      \ (templated)\n4. Output: Full path to created folder\n\nExit codes:\n- 0: Success,\
      \ folder created\n- 1: Worktree creation failed\n- 2: Folder already exists\n\
      - 3: Invalid branch name or description\n"
    status: completed
    agent: null
  - id: design_naming_algorithm
    name: Design Naming Algorithm
    description: 'Worktree Identifier Derivation:

      1. Parse worktree path: /home/code/AgenticEngineering-agenticguidance

      2. Extract suffix after last hyphen: agenticguidance

      3. Take first 2 characters, uppercase: AG

      4. Result: 260115AG_naming_convention_audit


      Special cases:

      - No hyphen in path: Use first 2 chars of directory name

      - Configurable override: .agentic.yml can specify worktree_id


      Description sanitization:

      - Lowercase

      - Replace spaces with underscores

      - Remove special characters except underscore

      - Max 50 characters

      '
    status: completed
    agent: null
