- name: Implement Main Worktree Detection
  execution: sequential
  description: Add helper function to find the main worktree path
  tickets:
  - id: '01.1'
    name: Add find_main_worktree() helper function
    description: Create function to detect main worktree from git worktree list
    status: pending
    agent: null
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: "Add a new helper function near the top of plan.py (after find_plan_folder):\n\
      \ndef find_main_worktree(repo_root: Path) -> Path | None:\n    \"\"\"Find the\
      \ main worktree path (branch main or master).\n\n    Args:\n        repo_root:\
      \ Path to any worktree in the repository.\n\n    Returns:\n        Path to main\
      \ worktree, or None if not found.\n    \"\"\"\n    import subprocess\n\n   \
      \ try:\n        result = subprocess.run(\n            [\"git\", \"worktree\"\
      , \"list\", \"--porcelain\"],\n            capture_output=True,\n          \
      \  text=True,\n            check=True,\n            cwd=repo_root,\n       \
      \ )\n        lines = result.stdout.strip().split(\"\\n\")\n        i = 0\n \
      \       while i < len(lines):\n            if lines[i].startswith(\"worktree\
      \ \"):\n                wt_path = lines[i].split(\" \", 1)[1]\n            \
      \    for j in range(i + 1, min(i + 5, len(lines))):\n                    if\
      \ lines[j].startswith(\"branch \"):\n                        wt_branch = lines[j].split(\"\
      \ \", 1)[1].replace(\"refs/heads/\", \"\")\n                        if wt_branch\
      \ in (\"main\", \"master\"):\n                            return Path(wt_path)\n\
      \                        break\n                    elif lines[j].startswith(\"\
      worktree \"):\n                        break\n            i += 1\n    except\
      \ subprocess.CalledProcessError:\n        pass\n    return None\n"
    success_criteria:
    - Function returns Path to main worktree when found
    - Function returns None when main worktree not found
    - Function handles both 'main' and 'master' branch names
