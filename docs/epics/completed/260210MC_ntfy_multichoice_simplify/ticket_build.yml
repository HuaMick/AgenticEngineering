plan_name: ntfy Multi-Choice Support and Notification Simplification
worktree: 260210MC_ntfy_multichoice_simplify
branch: main
status: planning
target_project_path: /home/code/AgenticEngineering
objective: 'Simplify the ntfy question notification system and add multi-choice answer
  support.

  Remove severity gating so all questions trigger push notifications regardless of
  severity level.

  Add lettered multi-choice formatting (A/B/C/D) in notification bodies when questions
  have suggested_answers.

  Parse letter replies from phone and map them to the corresponding suggested answer
  text.

  '
context: 'Current system only notifies for blocking/high severity questions. Medium/low
  severity questions

  are skipped, which creates inconsistency for users. All questions should notify.


  Questions with suggested_answers should format them as lettered options (A/B/C/D)
  in the

  notification body. When users reply with a letter, the system should parse it and
  map

  to the corresponding answer text before saving.


  Maintains backward compatibility with free-text answers.

  '
phases:
- phase_id: build_01
  name: Remove Severity Gating from Notifications
  status: pending
  dependencies: []
  tasks:
  - task_id: build_01_01
    description: Remove severity check in _send_ntfy_if_configured() that skips medium/low
      questions
    status: completed
    file_inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/question.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/question.py
    guidance: "Current implementation (lines 966-970):\n```python\n# Severity gate\
      \ (Q3: only blocking/high trigger phone notifications)\nq_severity = getattr(q,\
      \ \"severity\", \"medium\").lower()\nif q_severity not in (\"blocking\", \"\
      high\"):\n    logger.debug(\"Skipping ntfy for %s (severity=%s)\", q_id, q_severity)\n\
      \    continue\n```\n\nRemove the entire severity check block (lines 966-970).\
      \ All questions should notify\nregardless of severity. Keep the severity display\
      \ in notify_new_question() title\nfor user context, but don't use it to gate\
      \ whether notifications are sent.\n\nAfter removal, the loop should directly\
      \ call notify_new_question() for all new questions:\n```python\nfor q in questions:\n\
      \    q_id = q.id if hasattr(q, \"id\") else q.get(\"id\", \"\")\n    if not\
      \ q_id or q_id in _ntfy_seen_question_ids:\n        continue\n\n    _ntfy_seen_question_ids.add(q_id)\n\
      \    success = notify_new_question(topic, q, server)\n    logger.debug(\"ntfy\
      \ notification for %s: %s\", q_id, \"sent\" if success else \"failed\")\n```\n"
    success_criteria:
    - Severity check lines 966-970 removed from _send_ntfy_if_configured()
    - All questions with new QIDs trigger notify_new_question() call regardless of
      severity
    - Medium and low severity questions now send push notifications
    - Existing tests that verify severity gating are updated or removed
  - task_id: build_01_02
    description: Update notify_new_question() to format multi-choice options in notification
      body
    status: completed
    file_inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/ntfy.py
    guidance: "Modify notify_new_question() to check if question has suggested_answers\
      \ and format\nthem as lettered options in the message body.\n\nCurrent body\
      \ format (lines 153-159):\n```python\ntext = getattr(question, \"text\", \"\"\
      )\nmessage = text[:200] + \"...\" if len(text) > 200 else text\n\n# Append question\
      \ ID footer for reply matching\nq_id = getattr(question, \"id\", \"\")\nif q_id:\n\
      \    message = f\"{message}\\n\\n[QID: {q_id}]\"\n```\n\nUpdate to:\n```python\n\
      text = getattr(question, \"text\", \"\")\nmessage = text[:200] + \"...\" if\
      \ len(text) > 200 else text\n\n# Append lettered options if suggested_answers\
      \ present\nsuggested = getattr(question, \"suggested_answers\", None)\nif suggested\
      \ and isinstance(suggested, list) and len(suggested) > 0:\n    message += \"\
      \\n\"\n    for i, answer in enumerate(suggested[:10]):  # Max 10 options (A-J)\n\
      \        letter = chr(ord('A') + i)\n        message += f\"\\n{letter}) {answer}\"\
      \n\n# Append question ID footer for reply matching\nq_id = getattr(question,\
      \ \"id\", \"\")\nif q_id:\n    message = f\"{message}\\n\\n[QID: {q_id}]\"\n\
      ```\n\nNotification body example:\n```\nWhich database for caching?\n\nA) Redis\n\
      B) PostgreSQL\nC) SQLite\nD) None - use in-memory only\n\n[QID: Q-20260210-075329-a62a]\n\
      ```\n"
    success_criteria:
    - Questions with suggested_answers show lettered options (A-J) in notification
      body
    - Questions without suggested_answers continue to work as before (no options)
    - Options limited to first 10 (A-J) to prevent abuse
    - QID footer remains intact at end of message
    - 'Letter format matches: ''A) option text'', ''B) option text'', etc.'
  - task_id: build_01_03
    description: Add letter parsing in NtfyReplyPoller to map replies to answer text
    status: completed
    file_inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    - /home/code/AgenticEngineering/modules/AgenticGuidance/src/agenticguidance/services/question.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    guidance: "Update NtfyReplyPoller._check_for_replies() to parse letter replies\
      \ and map\nthem to the corresponding suggested_answer text.\n\nCurrent logic\
      \ (lines 236-246):\n```python\n# Try to find a QID in the message (user may\
      \ quote original)\nqid = parse_question_id_from_message(text)\nif not qid:\n\
      \    continue\n\n# Extract answer text (everything before the QID tag)\nanswer_text\
      \ = text.split(\"[QID:\")[0].strip()\nif not answer_text:\n    continue\n\n\
      self._answer_question(qid, answer_text)\n```\n\nAdd letter parsing before calling\
      \ _answer_question:\n```python\n# Try to find a QID in the message (user may\
      \ quote original)\nqid = parse_question_id_from_message(text)\nif not qid:\n\
      \    continue\n\n# Extract answer text (everything before the QID tag)\nanswer_text\
      \ = text.split(\"[QID:\")[0].strip()\nif not answer_text:\n    continue\n\n\
      # Check if reply is a single letter (A-J) for multi-choice\n# Load question\
      \ to get suggested_answers\nfinal_answer = answer_text\nif len(answer_text)\
      \ == 1 and answer_text.upper() in 'ABCDEFGHIJ':\n    try:\n        from agenticguidance.services.question\
      \ import QuestionQueue\n        service = QuestionQueue(self._plan_path)\n \
      \       question = service.get_question(qid)\n\n        if question and question.suggested_answers:\n\
      \            letter_index = ord(answer_text.upper()) - ord('A')\n          \
      \  if 0 <= letter_index < len(question.suggested_answers):\n               \
      \ final_answer = question.suggested_answers[letter_index]\n                logger.info(f\"\
      Mapped letter '{answer_text.upper()}' to answer: {final_answer}\")\n    except\
      \ Exception as e:\n        logger.warning(f\"Failed to map letter reply for\
      \ {qid}: {e}\")\n        # Fall back to using the letter itself as answer\n\n\
      self._answer_question(qid, final_answer)\n```\n"
    success_criteria:
    - Single letter replies (A-J, case-insensitive) are mapped to corresponding suggested_answer
    - Free-text replies (not single letters) are saved as-is
    - Invalid letter indices fall back to using the letter as answer text
    - Question loading errors fall back to using original reply text
    - Log info message when letter mapping succeeds
    - Multi-word replies like 'A is best' treated as free text, not mapped
