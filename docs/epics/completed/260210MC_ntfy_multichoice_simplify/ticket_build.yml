notes: "## Key Design Decisions\n\n1. **Severity Remains in Model**: Severity is kept\
  \ as metadata (useful for UI display, filtering, etc.)\n   but no longer gates whether\
  \ notifications are sent. All questions notify.\n\n2. **Letter Format A-J**: Supports\
  \ up to 10 options max using letters A-J. This prevents abuse\n   (too many options)\
  \ while being intuitive for phone replies.\n\n3. **Case Insensitive**: Accept both\
  \ 'A' and 'a' as valid letter replies for better UX.\n\n4. **Graceful Fallback**:\
  \ If letter mapping fails (question not found, no suggested_answers,\n   invalid\
  \ index), fall back to using the reply text as-is. Never fail silently.\n\n5. **Backward\
  \ Compatible**: Free-text answers still work. Only single-letter replies trigger\n\
  \   mapping logic. Multi-word replies like \"A is best\" are treated as free text.\n\
  \n## Testing Strategy\n\n- Unit tests: test_ntfy.py covers formatting, parsing,\
  \ mapping logic\n- UAT tests: test_uat_e2e_notification_flow.py verifies complete\
  \ user journeys\n- Test both happy path and edge cases (invalid letters, missing\
  \ questions, etc.)\n\n## Files Modified\n\n1. modules/AgenticCLI/src/agenticcli/commands/question.py\
  \ (remove severity gate)\n2. modules/AgenticCLI/src/agenticcli/utils/ntfy.py (add\
  \ multi-choice formatting)\n3. modules/AgenticCLI/src/agenticcli/services/question_watcher.py\
  \ (add letter parsing)\n4. modules/AgenticCLI/tests/test_ntfy.py (update/add tests)\n\
  5. modules/AgenticCLI/tests/test_uat_e2e_notification_flow.py (update UAT tests)\n"
