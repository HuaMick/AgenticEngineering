        name: "Integrate QuestionQueue.answer_question()"
        description: |
          Use QuestionQueue service for writing answers (NO custom file writing):

          Integration points:
          ```python
          from agenticguidance.services.question import QuestionQueue
          from agenticguidance.models.question import AnswerConfidence

          def submit_answer(
              queue: QuestionQueue,
              question_id: str,
              answer_text: str,
              confidence_score: float
          ):
              # Map Parakeet confidence to AnswerConfidence enum
              if confidence_score >= 0.9:
                  confidence = AnswerConfidence.HIGH.value
              elif confidence_score >= 0.7:
                  confidence = AnswerConfidence.MEDIUM.value
              else:
                  confidence = AnswerConfidence.LOW.value

              # Write answer via QuestionQueue
              question, answer = queue.answer_question(
                  question_id=question_id,
                  answer_text=answer_text,
                  answered_by="voice",
                  confidence=confidence
              )

              return question, answer
          ```

          Use QuestionQueue.answer_question() for all answer writes.
          Map Parakeet confidence scores to AnswerConfidence enum values.
