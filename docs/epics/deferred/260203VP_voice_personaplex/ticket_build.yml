# ========================================
# CONTEXT (Narrative Updates)
# ========================================
context: |
  This plan implements PersonaPlex integration as an OPTIONAL voice interface for HITL.
  This is a CONSUMER of the CLI-First infrastructure, not the core.

  ARCHITECTURE DECISION (CLI-First Strategy):
  - CLI is PRIMARY interface, voice is OPTIONAL
  - Voice daemon reads from questions/pending/ (same as CLI)
  - Voice daemon writes via QuestionQueue service (same as CLI)
  - Both interfaces coexist without conflict

  This plan REPLACES 260203AV_agenticvoice_async with a new scope:
  - Old: Voice-first approach with custom queue and daemon
  - New: Voice as optional consumer of CLI-First infrastructure

  Reuse from 260203AV:
  - PersonaPlex WebSocket patterns
  - Parakeet TDT integration
  - Configuration system

  Discard from 260203AV:
  - Question queue monitoring (use 260203QF QuestionQueue)
  - Answer writing logic (use QuestionQueue.answer_question)
  - Custom daemon management (follow CLI patterns)

