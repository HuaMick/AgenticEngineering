  - name: "Phase 6: Daemon Management"
    execution: sequential
    description: "CLI commands for start/stop/status"
    tasks:
      - id: "VP-012"
        name: "Create agentic voice CLI command group"
        description: |
          Add voice command group to AgenticCLI:

          Commands:
          ```
          agentic voice start [--daemon] [--plan PLAN_ID]
          - Start AgenticVoice service
          - Default: daemon mode (continuous monitoring)
          - Option: one-shot mode (process pending, then exit)
          - Option: --plan to monitor specific plan (default: all active plans)

          agentic voice stop
          - Stop AgenticVoice daemon gracefully (SIGTERM)
          - Wait for current question to complete

          agentic voice status
          - Show service status (running/stopped)
          - Show pending question count per plan
          - Show last answer timestamp
          - Show daemon PID if running

          agentic voice logs [--tail N] [--follow]
          - Show service logs from ~/.agentic/agenticvoice.log
          - Option: --tail N (last N lines)
          - Option: --follow (tail -f behavior)
          ```

          Follow AgenticCLI command patterns (use Typer framework).
        status: "pending"
        agent_type: "build"
        inputs:
          - modules/AgenticCLI/src/agenticcli/cli.py
          - modules/AgenticCLI/src/agenticcli/commands/plan.py
        target_files:
          - modules/AgenticCLI/src/agenticcli/commands/voice.py
        guidance: |
          Implementation notes:
          - Use Typer for CLI framework (consistent with AgenticCLI)
          - Register voice command group in cli.py
          - Import AgenticVoice daemon module for start/stop
          - Use PID file for status checking

          Command implementation:
          - start: Fork daemon process, write PID file, exit
          - stop: Read PID file, send SIGTERM, wait for exit
          - status: Check PID file, query daemon health
          - logs: Read log file, support tail/follow options

          Error handling:
          - start: Check if already running (PID file exists)
          - stop: Check if not running (PID file missing)
          - status: Handle missing PID file (not running)
          - logs: Handle missing log file (never started)

          Follow existing CLI patterns from plan.py and other command modules.
        success_criteria:
          - Voice command group added to CLI
          - Start/stop/status/logs commands implemented
          - Daemon and one-shot modes supported
          - Plan filtering supported (--plan option)
          - Commands follow AgenticCLI patterns (Typer framework)
          - Error handling for invalid states (already running, not running)
          - Rich formatting for readable output

      - id: "VP-013"
        name: "Implement daemon status reporting"
        description: |
          Enhance status command with detailed daemon information:

          Status report should include:
          ```
          AgenticVoice Daemon Status
          ==========================
          Status: Running (PID: 12345)
          Uptime: 2 hours, 34 minutes
          Last question processed: 5 minutes ago

          Active Plans:
          - 260203QC_question_cli: 3 pending questions
