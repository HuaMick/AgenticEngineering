# ========================================
# OBJECTIVE
# ========================================
objective: |
  Implement PersonaPlex voice interface as an optional consumer of the question/answer queue.
  Voice daemon monitors questions/pending/, speaks questions via TTS, captures answers via STT,
  and writes answers via QuestionQueue service. Completely optional - system works without it.

