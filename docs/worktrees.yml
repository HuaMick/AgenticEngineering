# Worktree Registry
# Maps branch names to abbreviations and descriptions for plan folder naming.
# Used by `agentic worktree create` and `generate_plan_folder_name()`.
#
# Schema:
#   worktrees:
#     - branch: <branch-name>
#       abbreviation: <2-letter uppercase code>
#       description: <human-readable purpose>
#       path: <absolute filesystem path>

worktrees:
  - branch: "main"
    abbreviation: "AE"
    description: "Main branch - AgenticEngineering monorepo"
    path: "/home/code/AgenticEngineering"

  - branch: "agentic-cli"
    abbreviation: "AC"
    description: "AgenticCLI module development"
    path: "/home/code/AgenticEngineering-agentic-cli"

  - branch: "agenticguidance"
    abbreviation: "AG"
    description: "AgenticGuidance module development"
    path: "/home/code/AgenticEngineering-agenticguidance"

  - branch: "agenticlangsmith"
    abbreviation: "AL"
    description: "AgenticLangsmith module development"
    path: "/home/code/AgenticEngineering-agenticlangsmith"

  - branch: "agentictmux"
    abbreviation: "AT"
    description: "AgenticTmux module development"
    path: "/home/code/AgenticEngineering-agentictmux"

  - branch: "agenticvoice"
    abbreviation: "AV"
    description: "AgenticVoice module development"
    path: "/home/code/AgenticEngineering-agenticvoice"

  - branch: "userstory-cli"
    abbreviation: "UC"
    description: "User story testing - CLI tooling"
    path: "/home/code/AgenticEngineering-userstory-cli"

  - branch: "userstory-guidance"
    abbreviation: "UG"
    description: "User story testing - Guidance integration"
    path: "/home/code/AgenticEngineering-userstory-guidance"
