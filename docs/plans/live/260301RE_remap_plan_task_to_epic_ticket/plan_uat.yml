name: remap-plan-task-to-epic-ticket-uat
worktree_path: /home/code/AgenticEngineering
branch: main
status: planning
objective: |
  User acceptance testing for the epic/ticket terminology migration.
  Validates complete end-to-end user workflows work correctly with the new
  epic/ticket commands, and that the migration is transparent to users
  familiar with Jira/Agile conventions.

  DEPENDENCY: plan_cleaning.yml must be fully completed.

  UAT SCOPE:
  - Complete epic lifecycle workflow (create, work on, archive)
  - Agent spawning via epic context (agentic session spawn --epic)
  - Orchestration planning workflow (orchestration-planning creates epics)
  - Ralph loop discovering and acting on epics
  - Worktree integration with epic folders

phases:
  - name: Core Epic Lifecycle UAT
    description: |
      Validate the complete epic management workflow via CLI.
    execution: sequential
    tasks:
      - id: uat_01
        name: Validate epic creation workflow
        description: |
          Test the complete epic creation workflow:
          1. agentic agent epic init test-branch --description test_epic_uat
             Verify: exits 0, creates docs/epics/live/YYMMDDTT_test_epic_uat/
             Verify: JSON output includes epic_folder, epic_folder_name
          2. agentic epic list
             Verify: Shows the newly created epic
          3. agentic epic status <epic_folder>
             Verify: Shows ticket counts and status
          4. agentic agent epic validate <epic_folder>
             Verify: Validates epic structure
          5. Verify epic folder has correct structure:
             - README.md at root
             - ticket_build.yml scaffold at root (or no files - empty epic)
             - No docs/plans/ directories created accidentally
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - agentic agent epic init exits 0
          - docs/epics/live/YYMMDDTT_test_epic_uat/ created
          - agentic epic list shows the new epic
          - Epic structure is flat (ticket files at root)

      - id: uat_02
        name: Validate ticket management workflow
        description: |
          Given an epic with a ticket_build.yml containing tasks:
          1. agentic agent epic ticket list --epic <epic_folder>
             Verify: Lists all tickets
          2. agentic agent epic ticket current --epic <epic_folder>
             Verify: Returns first pending ticket
          3. agentic agent epic ticket start <ticket_id> --epic <epic_folder>
             Verify: Marks ticket as in_progress
          4. agentic agent epic ticket complete <ticket_id> --epic <epic_folder>
             Verify: Marks ticket as completed, triggers auto-archive if last ticket
          5. agentic epic status <epic_folder>
             Verify: Shows updated ticket counts

          Also verify the OLD commands show errors:
          6. agentic plan task start <task_id> --plan <epic_folder>
             Verify: Shows "Removed: use agentic epic ticket start" error (exit 1)
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - Ticket CRUD operations all work via agentic agent epic ticket
          - Auto-archive triggered when all tickets complete
          - Old agentic plan task commands show removal error

      - id: uat_03
        name: Validate epic archival and listing workflow
        description: |
          Test the complete epic archival workflow:
          1. agentic agent epic archive <epic_folder>
             Verify: Copies to docs/epics/completed/
             Verify: TinyDB updated with completed status
          2. agentic epic list
             Verify: Shows all epics (live and completed)
          3. agentic agent epic unarchive <epic_name>
             Verify: Moves back to docs/epics/live/
          4. agentic epic cancel <epic_folder>
             Verify: Marks epic as cancelled
          5. Verify docs/plans/ directory does NOT exist
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - Archive/unarchive workflow works
          - docs/epics/completed/ used (not docs/plans/completed/)
          - No docs/plans/ directory present

  - name: Agent Integration UAT
    description: |
      Validate that agents correctly use epic terminology when spawned.
    execution: sequential
    tasks:
      - id: uat_04
        name: Validate agent spawning with epic context
        description: |
          Test agent spawn with epic context:
          1. agentic session spawn --role build-python --epic <epic_folder> --dry-run
             Verify: Prompt includes epic_folder reference, not plan_folder
             Verify: Prompt uses "epic" and "ticket" vocabulary
          2. agentic session spawn --role orchestration-planning --epic <epic_folder> --dry-run
             Verify: Orchestration planning agent receives epic context
          3. agentic agent context bootstrap --role build-python -j
             Verify: Returns epic_folder in JSON (not plan_folder)
          Note: --dry-run mode should show the prompt without actually spawning.
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - Agent prompts reference epic_folder
          - Context bootstrap returns epic vocabulary
          - No "plan_folder" in generated prompts

      - id: uat_05
        name: Validate Ralph loop discovers epics
        description: |
          Test Ralph loop integration:
          1. Verify docs/epics/live/ is scanned (not docs/plans/live/)
          2. agentic session orchestrate ralph status -j
             Verify: Shows EpicInfo objects with correct paths
          3. Verify Ralph prioritizes epics correctly based on new paths
          4. Create an epic with no MMD, verify Ralph detects it as needs_planning
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - Ralph discovers epics from docs/epics/live/
          - EpicInfo objects have correct paths
          - needs_planning detection works for new epics

      - id: uat_06
        name: Validate orchestration planning creates epics with ticket files
        description: |
          Verify the orchestration-planning agent correctly creates epics:
          1. Spawn orchestration-planning with a test objective
          2. Verify it creates docs/epics/live/YYMMDDXX_description/
          3. Verify ticket files are created as ticket_build.yml (not plan_build.yml)
          4. Verify the orchestration MMD is created correctly
          5. Verify planner-reviewer approves the epic structure
          This is a live agent spawn test - verify from output only, do not
          run actual implementation. Use --dry-run if available.
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - orchestration-planning creates docs/epics/live/ folders
          - Ticket files named ticket_*.yml
          - Epic structure validates successfully
          - Planner-reviewer recognizes ticket files

  - name: Backward Compatibility UAT
    description: |
      Verify that old commands fail gracefully with clear error messages,
      not silently or confusingly.
    execution: sequential
    tasks:
      - id: uat_07
        name: Validate backward compatibility error messages
        description: |
          Test that old plan/task commands give clear, actionable errors:
          1. agentic plan list
             Verify: Error message "Command removed. Use: agentic epic list"
             Verify: Exit code 1
          2. agentic plan task start t01 --plan myfolder
             Verify: Error message pointing to agentic epic ticket start
          3. agentic agent plan task current --plan myfolder
             Verify: Clear redirect message
          4. agentic plan status
             Verify: Redirect to agentic epic status

          All error messages must be user-friendly and include the
          exact new command to use as a replacement.
        status: pending
        agent: test-user-simulator
        inputs: []
        target_files: []
        success_criteria:
          - All old commands exit 1 with actionable error message
          - Error messages include exact new command syntax
          - No silent failures or cryptic error messages

loop_structure:
  type: user-story-validation-loop
  trigger: UAT phase begins after cleanup completes
  exit_criteria:
    success: All user acceptance scenarios pass without errors
    max_iterations: 3
    escalation: escalate_to_human
  participants:
    - agent: test-user-simulator
      role: executor
    - agent: planner-reviewer
      role: validator

affected_stories:
  - CLM-002
  - CLM-003
  - CLM-004
  - ORH-001
  - ORH-002
