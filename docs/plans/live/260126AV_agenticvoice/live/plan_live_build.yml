  original_deferred_reason: |
    This plan references services that don't exist in AgenticGuidance:
    - PlanService (plan.py has PlanMovementWorkflow only)
    - ContextService (not implemented)
    - TaskService (not implemented)
    - ConfigService (config.py has TieredConfigLoader/ConfigWorkflow)
    - StateService (state.py has StateRegistry only)

    Additionally requires external STT/TTS service integrations.
    Defer to future planning when core services are expanded.

architecture:
  description: |
    AgenticVoice is a thin presentation layer that provides voice-based access
    to AgenticGuidance services. Voice commands are routed to the appropriate
    AgenticGuidance/services/* modules.

  imports:
    - from: agenticguidance.services.plan
      import: PlanService
    - from: agenticguidance.services.context
      import: ContextService
    - from: agenticguidance.services.task
      import: TaskService
    - from: agenticguidance.services.config
      import: ConfigService
    - from: agenticguidance.services.state
      import: StateService

  routing:
    voice_commands:
      - command: "create plan"
        routes_to: agenticguidance.services.plan.PlanService
      - command: "show context"
        routes_to: agenticguidance.services.context.ContextService
      - command: "list tasks"
        routes_to: agenticguidance.services.task.TaskService
      - command: "update task"
        routes_to: agenticguidance.services.task.TaskService
      - command: "get config"
        routes_to: agenticguidance.services.config.ConfigService

