objective: "Create plan_live_build.yml example file"
action_id: ACTION_002
status: PLANNING_COMPLETE

reference_files:
  structure_patterns:
    - path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
      purpose: "Execution groups and agent definitions"
    - path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_teach.yml"
      purpose: "Teacher agent patterns and guidance format"
    - path: "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
      purpose: "Task-level structure with phases, tasks, and context"
  requirements_sources:
    - path: "modules/AgenticGuidance/agents/planner/planner-build/manifest.yml"
      purpose: "Architecture checklist and mandatory phases"
    - path: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
      purpose: "Loop types (test-fix-loop for build phase)"

content_structure:
  header_comments:
    - "Explain BUILD phase purpose"
    - "List key principles (file-level inputs, detailed guidance, measurable success)"
    - "Reference agent loops (test-fix-loop pattern)"

  metadata:
    - worktree: "<repo_root>"
    - liveplan: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_build.yml"
    - completedplan: "docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed_build.yml"

  live_plans_structure:
    id: "EXAMPLE-HEALTHCHECK-001"
    title: "Implement Health Check API"
    description: "Build a health check API demonstrating Domain -> Workflow -> Entrypoint pattern"
    phases:
      - name: "Environment Setup"
        execution: "sequential"
      - name: "Domain Layer Build"
        execution: "parallel"
      - name: "Workflow Layer Build"
        execution: "sequential"
      - name: "Entrypoint Layer Build"
        execution: "parallel"
      - name: "Integration Testing"
        execution: "test-fix-loop"
      - name: "CI/CD Validation"
        execution: "sequential"
        note: "Mandatory per planner-build manifest"

example_scenario:
  name: "Health Check API"
  rationale: "Demonstrates Domain -> Workflow -> Entrypoint architecture pattern"
  phases:
    environment_setup:
      agent_type: build
      tasks:
        - "Verify dependencies"
        - "Create branch"
        - "Setup development environment"
      success_criteria:
        - "Development environment ready"

    domain_layer:
      agent_type: build
      count: 2
      parallel: true
      tasks:
        - "Create health check service"
        - "Implement health validators"
      inputs:
        - "src/domain/services/__init__.py"
        - "src/domain/validators/__init__.py"
      success_criteria:
        - "Domain logic implemented"
        - "Unit tests passing"

    workflow_layer:
      agent_type: build
      tasks:
        - "Create health check workflow"
        - "Integrate with domain services"
      depends_on: domain_layer
      success_criteria:
        - "Workflow orchestrates domain services correctly"

    entrypoint_layer:
      agent_type: build
      count: 2
      parallel: true
      tasks:
        - "CLI entrypoint implementation"
        - "API endpoint implementation"
      depends_on: workflow_layer
      success_criteria:
        - "Both entrypoints expose workflow functionality"

    integration_testing:
      execution: test-fix-loop
      agents:
        - type: test
          role: "Component testing"
        - type: build
          role: "Fix failures"
      success_criteria:
        - "All layers integrate correctly"
        - "End-to-end tests passing"

    cicd_validation:
      agent_type: deploy
      mandatory: true
      condition: "Changes touch tests/, pytest.ini, Dockerfile.test, cloudbuild.yaml"
      success_criteria:
        - "CI/CD pipeline passes"
        - "Docker build succeeds"

implementation_steps:
  - step: 1
    action: "Create file"
    path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml"

  - step: 2
    action: "Add header comments"
    content:
      - "BUILD phase focus (implementation, not testing or teaching)"
      - "Key principles from planner-build manifest"
      - "Phase ordering context"

  - step: 3
    action: "Add metadata section"
    fields: ["worktree", "liveplan", "completedplan"]

  - step: 4
    action: "Create live-plans array"
    structure: "Following example_scenario above"

  - step: 5
    action: "Define phases with execution_groups"
    requirements:
      - "Each phase has execution_groups"
      - "Each execution_group has agents with type, inputs, guidance, success_criteria"
      - "Use file-level inputs (not directories)"
      - "Include detailed guidance with Context, Instructions, Why this matters"

  - step: 6
    action: "Add user_stories section"
    purpose: "Validation criteria"

  - step: 7
    action: "Add architecture_compliance section"
    checks:
      - "Domain -> Workflow -> Entrypoint verification"
      - "Service boundary validation"

validation_criteria:
  structural:
    - "File parses as valid YAML"
    - "Contains all required sections (metadata, live-plans, phases)"
    - "Follows naming conventions from existing examples"
  content:
    - "Demonstrates realistic build scenario"
    - "Shows proper phase ordering"
    - "Includes test-fix-loop pattern"
    - "Shows CI/CD validation phase"
    - "Uses file-level inputs (not directories)"
  pattern_compliance:
    - "Guidance format matches existing examples (Context, Instructions, Why)"
    - "Success criteria are measurable and outcome-focused"
    - "Agent types match available categories (build, test, deploy)"
  architecture_alignment:
    - "Demonstrates Domain -> Workflow -> Entrypoint pattern"
    - "Shows proper dependency ordering between phases"
    - "Includes architecture compliance section"
