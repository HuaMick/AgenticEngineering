name: Restructure CLI into user-facing and agent-facing command groups
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
context: 'The AgenticCLI currently exposes all commands (70+ subcommands) at the top
  level or

  one level deep. This overwhelms human users with agent-internal plumbing they never

  call directly. The goal is to split the CLI into two tiers:


  Tier 1 (User-Facing): Clean, minimal commands humans type daily.

  Tier 2 (Agent-Facing): Hidden `agentic agent` namespace for agent plumbing.


  The key constraint is backward compatibility: agent prompt files (.claude/agents/*.md),

  .agent/instructions.md, agents.md, and docs/prompts/*.md all reference current command

  paths. These must continue to work via hidden aliases during the transition period.

  '
impacted_files:
- path: modules/AgenticCLI/src/agenticcli/cli.py
  change_type: modify
  change_category: implementation
  reason: Primary restructure target - add agent group, migrate commands, add aliases
- path: modules/AgenticCLI/tests/test_cli.py
  change_type: modify
  change_category: test
  reason: Update help text assertions for restructured command tree
- path: modules/AgenticCLI/tests/test_cli_restructure.py
  change_type: create
  change_category: test
  reason: New tests for agent namespace, hidden group, backward compat aliases
- path: .claude/agents/*.md
  change_type: modify
  change_category: documentation
  reason: Update CLI command references in agent instructions (optional - aliases
    provide compat)
- path: .agent/instructions.md
  change_type: modify
  change_category: documentation
  reason: Update CLI command references in agent instructions
- path: agents.md
  change_type: modify
  change_category: documentation
  reason: Update CLI command table to reflect new structure
phases:
- name: Analysis and Command Mapping
  id: P01
  status: pending
  description: 'Create a complete current-to-target command mapping and validate the

    categorization with the user before proceeding. Produce a detailed

    migration checklist.

    '
  tasks:
  - id: P01_T01
    name: Document complete command inventory with categorization
    status: completed
    description: 'Read cli.py and every command handler module. For each command,

      document: (1) current path, (2) target path, (3) tier (user/agent),

      (4) rationale for categorization, (5) files that reference it.


      Create a migration_map.md file in the plan folder documenting

      every command''s before/after path.

      '
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/
    target_files:
    - /home/code/AgenticEngineering/docs/plans/live/260220NE_restructure_cli_into_user_facing_and_agent_facing/migration_map.md
    success_criteria:
    - migration_map.md lists every CLI command (70+ commands)
    - Each command has current path, target path, and tier label
    - Agent guidance files that reference each command are identified
    completed_at: '2026-02-20T22:14:02.488237'
- name: Create Agent Group Infrastructure
  id: P02
  status: pending
  description: 'Add the `agentic agent` Typer group to cli.py as a hidden top-level

    group. Create empty sub-groups: agent plan, agent context, agent

    entrypoint, agent manifest, agent stories, agent question.

    This phase is purely additive - no existing commands are moved yet.

    '
  tasks:
  - id: P02_T01
    name: Add hidden agent Typer group with sub-groups
    status: pending
    description: "In cli.py, create:\n  agent_group = typer.Typer(help=\"Agent-facing\
      \ plumbing commands (internal)\", no_args_is_help=True)\n  app.add_typer(agent_group,\
      \ name=\"agent\", hidden=True)\n\nThen create sub-groups under agent_group:\n\
      \  agent_plan_app = typer.Typer(help=\"Plan management plumbing\", no_args_is_help=True)\n\
      \  agent_group.add_typer(agent_plan_app, name=\"plan\")\n\n  agent_context_app\
      \ = typer.Typer(help=\"CCI context retrieval\", no_args_is_help=True)\n  agent_group.add_typer(agent_context_app,\
      \ name=\"context\")\n\n  agent_entrypoint_app = typer.Typer(help=\"Workflow\
      \ entrypoints\", no_args_is_help=True)\n  agent_group.add_typer(agent_entrypoint_app,\
      \ name=\"entrypoint\")\n\n  agent_manifest_app = typer.Typer(help=\"Agent manifests\"\
      , no_args_is_help=True)\n  agent_group.add_typer(agent_manifest_app, name=\"\
      manifest\")\n\n  agent_stories_app = typer.Typer(help=\"User story management\"\
      , no_args_is_help=True)\n  agent_group.add_typer(agent_stories_app, name=\"\
      stories\")\n\n  agent_question_app = typer.Typer(help=\"Question queue plumbing\"\
      , no_args_is_help=True)\n  agent_group.add_typer(agent_question_app, name=\"\
      question\")\n\nAlso create nested sub-apps for agent plan:\n  agent_plan_task_app\
      \ (under agent_plan_app)\n  agent_plan_phase_app (under agent_plan_app)\n  agent_plan_move_app\
      \ (under agent_plan_app)\n  agent_plan_orch_app (under agent_plan_app)\n  agent_plan_stories_app\
      \ (under agent_plan_app)\n\nDo NOT move any commands yet. Just create the empty\
      \ group structure.\n"
