    validate, scaffold, init, bootstrap, move, orchestration, plan stories)

    from the top-level plan group to the agent plan group. Keep the original

    commands as hidden aliases for backward compatibility.


    After this phase, `agentic plan` should only show: new, list, status, cancel.

    All other plan commands work via `agentic agent plan ...` and also via

    their old paths (hidden aliases).

    '
  tasks:
  - id: P03_T01
    name: Copy plan task commands to agent plan task
    status: pending
    description: "Register all plan_task_app commands (start, complete, prefill, list,\n\
      status, add, update, current) on agent_plan_task_app.\n\nStrategy: Use the SAME\
      \ handler functions. Each agent command definition\ncalls the same _plan_handle()\
      \ with the same SimpleNamespace args.\n\nFor example:\n  @agent_plan_task_app.command(\"\
      start\")\n  def agent_plan_task_start(...):\n      # identical signature and\
      \ body to plan_task_start\n      _plan_handle(_ns(...))\n\nThen hide the original\
      \ plan_task_app by marking it hidden:\n  plan_app.add_typer(plan_task_app, name=\"\
      task\", hidden=True)\n\nThis ensures `agentic plan task start` still works but\
      \ is hidden\nfrom `agentic plan --help`.\n"
