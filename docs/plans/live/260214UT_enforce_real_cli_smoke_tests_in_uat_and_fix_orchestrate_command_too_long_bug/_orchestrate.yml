plan:
  id: "260214UT"
  name: "enforce_real_cli_smoke_tests_in_uat_and_fix_orchestrate_command_too_long_bug"
  objective: |
    Add real tmux integration testing to prevent shipping broken GUI layouts.

    The tmux orchestration GUI keeps breaking because every test either mocks
    tmux or uses --no-tmux to bypass it. Recent shipped bugs include:
    - -p percentage flag failing on detached sessions
    - $(cat file) wrapped in single quotes blocking shell expansion
    - Missing Enter key after send-keys
    - Orphaned agentic-orch-* sessions accumulating

    The command-too-long bug is ALREADY FIXED. This plan now focuses on:
    1. Making the tmux path testable (--dry-run flag)
    2. Fixing remaining latent bugs (inplace layout -p flags)
    3. Creating real tmux integration tests (13 tests, zero mocking)
    4. Updating guidance to prevent future mock-only UAT

  target_project_path: "/home/code/AgenticEngineering"
