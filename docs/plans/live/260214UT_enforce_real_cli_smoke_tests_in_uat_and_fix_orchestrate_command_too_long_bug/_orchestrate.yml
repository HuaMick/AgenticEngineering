plan:
  id: "260214UT"
  name: "enforce_real_cli_smoke_tests_in_uat_and_fix_orchestrate_command_too_long_bug"
  objective: |
    Fix the systemic UAT gap where plans pass UAT with mocked tests but real CLI
    commands are broken. Three plans (260214PF, 260214TG, 260214US) passed UAT
    but the actual `agentic orchestrate --mode planning` command is broken with
    two bugs:

    1. tmux split bug - changes in worktree never merged to main (no merge step)
    2. command too long - 447-line process.mmd passed as CLI arg exceeds tmux limit

    Root cause: UAT validates against mocked tests, not real CLI execution.

    Solution:
    1. Update guidance to enforce real CLI smoke tests in UAT
    2. Fix orchestrate.py to use temp file for system prompt (not CLI arg)
    3. Add integration tests that run actual installed CLI commands

  target_project_path: "/home/code/AgenticEngineering"
