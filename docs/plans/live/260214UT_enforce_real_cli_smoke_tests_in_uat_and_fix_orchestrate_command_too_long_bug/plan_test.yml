    name: "Create conftest.py with integration test markers"
    description: |
      Create pytest conftest.py to mark integration tests and allow selective running.

      TEST FILE: modules/AgenticCLI/tests/integration/conftest.py

      CONTENT:
      ```python
      """Pytest configuration for integration tests."""
      import pytest


      def pytest_configure(config):
          """Register custom markers."""
          config.addinivalue_line(
              "markers", "integration: mark test as integration test (runs real CLI)"
          )


      @pytest.fixture(scope="session", autouse=True)
      def verify_cli_installed():
          """Verify agentic CLI is installed before running integration tests."""
          import shutil
          if not shutil.which("agentic"):
              pytest.skip("agentic CLI not installed - skipping integration tests")
      ```

