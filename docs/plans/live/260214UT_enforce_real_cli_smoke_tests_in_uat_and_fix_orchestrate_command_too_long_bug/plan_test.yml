  - id: "test-001"
    name: "Create integration test for agentic orchestrate --mode planning"
    description: |
      Create a new integration test file that tests the orchestrate command
      with real CLI execution.

      TEST FILE: modules/AgenticCLI/tests/integration/test_orchestrate_integration.py
      (create integration/ directory if it doesn't exist)

      TEST CONTENT:
      ```python
      """Integration tests for agentic orchestrate command.

      These tests run the ACTUAL installed CLI binary, not mocked subprocess calls.
      This is the only way to catch bugs like the command-too-long error.
      """
      import subprocess
      import sys
      from pathlib import Path

      import pytest


      def test_orchestrate_planning_mode_no_tmux():
          """Test that `agentic orchestrate --mode planning --no-tmux` runs without error.

          RATIONALE:
          Previous plans "passed UAT" with mocked tests but the real command was
          broken. This test runs the ACTUAL installed binary to catch real errors.
          """
          # Run the actual installed CLI command
          result = subprocess.run(
              ["agentic", "orchestrate", "--mode", "planning", "--no-tmux"],
              capture_output=True,
              text=True,
              timeout=10,
              input="\n",  # Immediately exit Claude session
          )

          # We expect the command to start successfully (exit 0 or clean error)
          # The key is that it doesn't fail with "command too long" or similar
          assert result.returncode in [0, 1, 130], (
              f"Orchestrate command failed unexpectedly: {result.stderr}"
          )

          # Verify no tmux character limit errors
          assert "argument list too long" not in result.stderr.lower()
          assert "command too long" not in result.stderr.lower()


      def test_orchestrate_executor_mode_no_tmux():
          """Test that `agentic orchestrate --mode executor --no-tmux` runs without error."""
          result = subprocess.run(
              ["agentic", "orchestrate", "--mode", "executor", "--no-tmux"],
              capture_output=True,
              text=True,
              timeout=10,
              input="\n",  # Immediately exit
          )

          assert result.returncode in [0, 1, 130], (
              f"Orchestrate executor mode failed: {result.stderr}"
          )

          # Verify no character limit errors
          assert "argument list too long" not in result.stderr.lower()
          assert "command too long" not in result.stderr.lower()


      def test_orchestrate_uses_temp_file_for_prompt():
          """Verify that orchestrate uses a temp file for system prompt, not CLI arg.

          RATIONALE:
          The bug was that process.mmd (447 lines) was passed as --append-system-prompt
          which exceeded tmux character limits. The fix uses --append-system-prompt-file.

          This test verifies the fix by checking that temp files are created.
          """
          # This is harder to test without actually inspecting the command execution
          # For now, we trust that if the command runs successfully, the fix works
          result = subprocess.run(
              ["agentic", "orchestrate", "--mode", "planning", "--no-tmux"],
              capture_output=True,
              text=True,
              timeout=10,
              input="\n",
          )

          # If this runs without "command too long" error, the temp file approach works
          assert "argument list too long" not in result.stderr.lower()
          assert "command too long" not in result.stderr.lower()
      ```

