name: Test Phase - Real Tmux Integration Tests
status: pending
type: test
phases:
- name: Real Tmux Layout Tests
  status: pending
  description: 'Create integration tests that launch ACTUAL tmux sessions and verify
    the

    3-pane orchestration layout. These tests use the real tmux binary, create

    real sessions, verify real pane counts, and clean up after themselves.


    NO MOCKING. NO --no-tmux. The whole point is to test the tmux path

    that keeps breaking.

    '
  tasks:
  - id: test-001
    name: Create real tmux layout integration tests
    description: "Create a new integration test file that tests tmux layout creation\
      \ with\nreal tmux. NOT mocked subprocess, NOT --no-tmux bypass.\n\nTEST FILE:\
      \ modules/AgenticCLI/tests/integration/test_tmux_layout_real.py\n\nRequirements\
      \ for each test:\n- Must call the REAL tmux binary (subprocess.run with actual\
      \ tmux commands)\n- Must create actual tmux sessions\n- Must verify pane count\
      \ by running: tmux list-panes -t <session> | wc -l\n- Must verify pane titles\n\
      - Must clean up the session in a finally block (tmux kill-session)\n- Must skip\
      \ gracefully if tmux is not available (pytest.mark.skipif)\n\nTests to implement:\n\
      \n1. test_new_session_creates_three_panes\n   - Call _create_new_session_layout\
      \ with skip_commands=True\n   - Verify: tmux list-panes -t <session> returns\
      \ exactly 3 panes\n   - Verify: main pane exists with title \"orchestrator\"\
      \n   - Verify: status pane exists with title \"sessions\"\n   - Verify: questions\
      \ pane exists with title \"questions\"\n   - Cleanup: tmux kill-session -t <session>\n\
      \n2. test_pane_dimensions_are_reasonable\n   - Call _create_new_session_layout\
      \ with skip_commands=True\n   - Query pane dimensions: tmux list-panes -t <session>\
      \ -F \"#{pane_width} #{pane_height}\"\n   - Verify: main pane width > status\
      \ pane width (70/30 split)\n   - Verify: status pane height > questions pane\
      \ height (60/40 split)\n   - Cleanup: tmux kill-session\n\n3. test_session_name_contains_pid\n\
      \   - Verify session name starts with \"agentic-orch-\" and contains a number\n\
      \   - Verify: tmux has-session -t <session> returns 0\n\n4. test_cleanup_kills_orphaned_sessions\n\
      \   - Create 3 dummy tmux sessions named agentic-orch-test-1, agentic-orch-test-2,\
      \ etc\n   - Call cleanup_orchestration_sessions()\n   - Verify: all 3 sessions\
      \ are killed (tmux has-session returns non-zero)\n   - Verify: non-agentic sessions\
      \ are NOT killed\n\n5. test_dry_run_creates_and_destroys_layout\n   - Run: agentic\
      \ orchestrate --mode planning --dry-run\n   - Verify: exit code is 0\n   - Verify:\
      \ stdout contains valid JSON with session_name, pane IDs\n   - Verify: after\
      \ command completes, tmux session no longer exists\n\n6. test_send_keys_command_reaches_pane\n\
      \   - Create layout with skip_commands=True\n   - Manually send a test command:\
      \ tmux send-keys -t <main_pane> \"echo TMUX_TEST_MARKER\" Enter\n   - Wait briefly,\
      \ then capture pane content: tmux capture-pane -t <main_pane> -p\n   - Verify:\
      \ \"TMUX_TEST_MARKER\" appears in captured output\n   - This proves send-keys\
      \ actually works (the $(cat ...) expansion path)\n\n7. test_prompt_file_is_readable_from_pane\n\
      \   - Write a known string to a temp file\n   - Build the same command string\
      \ orchestrate.py builds:\n     claude --dangerously-skip-permissions --append-system-prompt\
      \ \"$(cat /tmp/testfile.md)\"\n   - Instead of running it, send: echo \"$(cat\
      \ /tmp/testfile.md)\" to a pane\n   - Capture pane output and verify the known\
      \ string appears\n   - This validates that the $(cat ...) expansion works inside\
      \ tmux send-keys\n\nEach test MUST have a try/finally to clean up tmux sessions\
      \ even on failure.\n\nTarget file: modules/AgenticCLI/tests/integration/test_tmux_layout_real.py\n\
      Change type: create\n"
    status: pending
    target_files:
    - path: modules/AgenticCLI/tests/integration/test_tmux_layout_real.py
      change_type: create
      change_category: test
  - id: test-002
    name: Create real CLI orchestrate smoke tests
    description: "Create integration tests that run the ACTUAL `agentic orchestrate`\
      \ command\nend-to-end. These complement the tmux-specific tests by testing the\
      \ full\ncommand path.\n\nTEST FILE: modules/AgenticCLI/tests/integration/test_orchestrate_smoke.py\n\
      \nTests to implement:\n\n1. test_orchestrate_dry_run_planning\n   - Run: agentic\
      \ orchestrate --mode planning --dry-run\n   - Verify: exit code 0\n   - Verify:\
      \ JSON output contains session_name, pane count = 3\n   - Verify: no tmux session\
      \ left behind\n\n2. test_orchestrate_dry_run_executor\n   - Run: agentic orchestrate\
      \ --mode executor --dry-run\n   - Verify: exit code 0\n   - Verify: JSON output\
      \ shows correct layout\n\n3. test_orchestrate_dry_run_loop\n   - Run: agentic\
      \ orchestrate --mode loop --dry-run\n   - Verify: exit code 0\n\n4. test_orchestrate_invalid_mode\n\
      \   - Run: agentic orchestrate --mode nonexistent --dry-run\n   - Verify: exit\
      \ code non-zero\n   - Verify: error message mentions valid modes\n\n5. test_orchestrate_temp_file_created\n\
      \   - Run: agentic orchestrate --mode planning --dry-run\n   - Parse JSON output\
      \ for prompt temp file path\n   - Verify: temp file exists (or existed) with\
      \ .md suffix\n   - Verify: temp file prefix starts with agentic_prompt_\n\n\
      6. test_no_orphaned_sessions_after_dry_run\n   - Run --dry-run 3 times in sequence\n\
      \   - After all 3, verify: tmux list-sessions shows NO agentic-orch-* sessions\n\
      \   - This proves cleanup works correctly\n\nTarget file: modules/AgenticCLI/tests/integration/test_orchestrate_smoke.py\n\
      Change type: create\n"
    status: pending
    target_files:
    - path: modules/AgenticCLI/tests/integration/test_orchestrate_smoke.py
      change_type: create
      change_category: test
  - id: test-003
    name: Add conftest with tmux skip marker and session cleanup fixture
    description: "Create or update the integration test conftest.py with:\n\n1. A\
      \ reusable fixture that ensures tmux is available, skips if not\n2. A session-scoped\
      \ fixture that cleans up any agentic-orch-* sessions\n   after ALL tests complete\
      \ (safety net)\n3. A per-test fixture that records existing sessions before\
      \ each test\n   and kills any new agentic-orch-* sessions created during the\
      \ test\n\nThis prevents test pollution between runs.\n\nTarget file: modules/AgenticCLI/tests/integration/conftest.py\n\
      Change type: create or modify\n"
    status: pending
    target_files:
    - path: modules/AgenticCLI/tests/integration/conftest.py
      change_type: modify
      change_category: test
success_criteria:
- All integration tests use REAL tmux (not mocked subprocess)
- Tests verify actual pane count is 3 (not assumed)
- Tests verify pane dimensions follow 70/30 and 60/40 splits
- Tests verify send-keys actually delivers commands to panes
- Tests verify $(cat file) expansion works inside tmux send-keys
- Tests clean up tmux sessions in finally blocks
- Tests skip gracefully when tmux is not available
- --dry-run tests verify no orphaned sessions remain
- All tests pass on this machine
