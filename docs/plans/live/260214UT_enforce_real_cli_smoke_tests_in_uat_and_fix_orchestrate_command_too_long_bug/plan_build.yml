name: "Build Phase - Fix Orchestrate Command Too Long Bug"
status: "pending"
type: "build"

phases:
  - name: "Fix System Prompt Passing"
    status: "pending"
    description: |
      Fix orchestrate.py to write system prompt to a temp file and use
      --append-system-prompt-file instead of passing 447 lines as a CLI arg.

tasks:
  - id: "build-001"
    name: "Refactor cmd_orchestrate to use temp file for system prompt"
    description: |
      Update cmd_orchestrate() in orchestrate.py to:

      1. Write system_prompt to a temp file instead of passing as --append-system-prompt arg
      2. Use tempfile.NamedTemporaryFile(mode='w', suffix='.md', delete=False)
      3. Pass temp file path to Claude using --append-system-prompt-file <path>
      4. Clean up temp file after Claude session ends (or let OS handle cleanup)

      CURRENT CODE (line 371-382):
      ```python
      # 3. Combine into system prompt appendix
      system_prompt = (
          f"{prompt_content}\n\n---\n\n"
          f"## BOOTSTRAP CONTEXT (auto-injected)\n\n{bootstrap_text}"
      )

      # 4. Build claude command
      cmd = ["claude", "--dangerously-skip-permissions"]
      model = getattr(args, "model", None)
      if model:
          cmd.extend(["--model", model])
      cmd.extend(["--append-system-prompt", system_prompt])
      ```

      NEW CODE:
      ```python
      import tempfile

      # 3. Combine into system prompt appendix
      system_prompt = (
          f"{prompt_content}\n\n---\n\n"
          f"## BOOTSTRAP CONTEXT (auto-injected)\n\n{bootstrap_text}"
      )

      # 4. Write system prompt to temp file
      with tempfile.NamedTemporaryFile(
          mode='w', suffix='.md', delete=False, prefix='claude_prompt_'
      ) as f:
          f.write(system_prompt)
          prompt_file_path = f.name

      # 5. Build claude command with prompt file
      cmd = ["claude", "--dangerously-skip-permissions"]
      model = getattr(args, "model", None)
      if model:
          cmd.extend(["--model", model])
      cmd.extend(["--append-system-prompt-file", prompt_file_path])
      ```

      RATIONALE:
      - The 447-line process.mmd exceeds tmux send-keys character limit
      - Passing as file arg avoids command-line length limits
      - Temp file is automatically cleaned up by OS on reboot if not deleted

      Target file: modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
      Lines to modify: 371-382
    status: "pending"
    target_files:
      - path: "modules/AgenticCLI/src/agenticcli/commands/orchestrate.py"
