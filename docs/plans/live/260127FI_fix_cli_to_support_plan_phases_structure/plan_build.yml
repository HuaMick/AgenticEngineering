# Fix CLI to Support plan.phases Structure
# Plan ID: 260127CL (CLI module)
# Created: 2026-01-27
#
# Goal: Fix CLI task commands to find phases nested under plan.phases
# Currently, cmd_task_list/status/current only check content.get("phases", [])
# but plan_teach.yml uses plan.phases structure

name: "fix-cli-plan-phases-structure"
status: "pending"
priority: "high"
created: "2026-01-27"

# ========================================
# PROBLEM STATEMENT
# ========================================
problem: |
  CLI task commands cannot find tasks in plans using the `plan.phases` structure:

  ```yaml
  # Structure A (works): phases at root
  phases:
    - phase_id: "P1"
      tasks: [...]

  # Structure B (broken): phases under plan
  plan:
    phases:
      - id: "phase_01"
        tasks: [...]
  ```

  Functions affected:
  - cmd_task_list() - line 690: `phases = content.get("phases", [])`
  - cmd_task_status() - line 780: `phases = content.get("phases", [])`
  - cmd_task_current() - line 1344: `phases = content.get("phases", [])`
  - cmd_task_update() - line 1232: `phases = content.get("phases", [])`

  Additional issue: Some functions use `phase.get("phase_id")` but plans also use `phase.get("id")`.

# ========================================
# ROOT CAUSE
# ========================================
root_cause: |
  The previous fix (260127FI) only updated `_update_task_status()` to check both structures.
  The other task functions still only check root-level phases.

# ========================================
# PHASES
# ========================================
phases:
  - phase_id: "P1"
    name: "Build - Fix Phase Lookup in All Functions"
    description: |
      Update all task-related functions to check both root-level and nested phases.
    status: "pending"
    tasks:
      - id: "CL-001"
        name: "Fix cmd_task_list phase lookup"
        description: |
          Update cmd_task_list() to check both structures:
          ```python
          phases = content.get("phases", []) or content.get("plan", {}).get("phases", [])
          ```
          Also fix phase_id lookup to check both field names:
          ```python
          phase_id = phase.get("phase_id", "") or phase.get("id", "")
          ```
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "cmd_task_list finds tasks under plan.phases"
          - "Both phase_id and id field names work"

      - id: "CL-002"
        name: "Fix cmd_task_status phase lookup"
        description: |
          Update cmd_task_status() to check both structures and field names.
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "cmd_task_status finds tasks under plan.phases"
          - "Phase info correctly extracted"

      - id: "CL-003"
        name: "Fix cmd_task_current phase lookup"
        description: |
          Update cmd_task_current() to check both structures and field names.
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "cmd_task_current finds tasks under plan.phases"

      - id: "CL-004"
        name: "Fix cmd_task_update phase lookup"
        description: |
          Update cmd_task_update() to check both structures and field names.
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "cmd_task_update finds tasks under plan.phases"

      - id: "CL-005"
        name: "Extract helper function for phase lookup"
        description: |
          Create a reusable helper to reduce code duplication:
          ```python
          def _get_phases_from_content(content: dict) -> list:
              '''Get phases from either root or nested under plan.'''
              return content.get("phases", []) or content.get("plan", {}).get("phases", [])
          ```
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
