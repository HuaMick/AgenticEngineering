- name: Data Flow Cross-References
  id: GROUP_7
  status: touchpoint_audit

  touchpoints:
  - id: TP-FLOW-001
    name: "Plan Creation Flow"
    steps:
      - "plan init -> naming.py -> registry lookup -> worktree create/reuse -> workspace update -> scaffold"

  - id: TP-FLOW-002
    name: "Plan Archival Flow"
    steps:
      - "archive -> cleanup_worktree_if_idle -> workspace update -> cmd_sync"

  - id: TP-FLOW-003
    name: "Validation Flow"
    steps:
      - "git state + registry + plan folders -> cross-reference -> report discrepancies"

  - id: TP-FLOW-004
    name: "Sync Flow"
    steps:
      - "git state + workspace -> reconcile -> update workspace + clean registry"

  - id: TP-FLOW-005
    name: "Orchestration Merge Flow"
    steps:
      - "read plan metadata -> detect worktree -> git commit in worktree -> git merge in main"

# =============================================================================
# GAPS IDENTIFIED
# =============================================================================

gaps:
- id: GAP-001
  name: "No E2E Tests for cmd_create and cmd_remove"
  severity: medium
  affected: [TP-CLI-001, TP-TEST-001, US-CLI-090, US-CLI-092]

- id: GAP-002
  name: "Registry Has NO FileLock Protection"
  severity: high
  affected: [TP-STATE-001, TP-STATE-005]
  evidence: "save_worktree_registry() at line 107 - direct write_text(), no lock"

- id: GAP-003
  name: "Plan-Branch Linkage Relies Solely on Naming Convention"
  severity: medium
  affected: [TP-UTIL-001, TP-STATE-001, TP-STATE-004]
  detail: "2-letter abbreviation could collide across branches"

- id: GAP-004
  name: "No Audit Trail of Sync Operations"
  severity: low
  affected: [TP-CLI-001, TP-STATE-001, TP-STATE-002]

- id: GAP-005
  name: "No Concurrent Access Tests"
  severity: medium
  affected: [TP-TEST-001, TP-TEST-003, TP-STATE-001]

- id: GAP-006
  name: "All 8 User Stories Have test_status: untested"
  severity: medium
  affected: [TP-US-001, TP-US-002]

# =============================================================================
# HISTORICAL TRACE ANALYSIS (Feb 15 - Mar 1, 2026)
# =============================================================================

historical_trace_analysis:
  methodology: |
    6 agents reviewed the last 2 weeks of git history, plan execution records,
    and worktree usage patterns. Each agent independently traced commits, branch
    activity, plan metadata, and registry state across the analysis period.
  analysis_period: "2026-02-15 to 2026-03-01"
  agent_count: 6

  periods:
  - id: PERIOD_1
    dates: "Feb 15-16"
    verdict: zero_worktree_usage
    findings:
      - "All commits directly on main branch"
      - "Workspace file RESET to main-only on Feb 16 (worktree refs explicitly removed)"
      - "One plan created (260216WT) with no worktree_path field"

  - id: PERIOD_2
    dates: "Feb 17-19"
    verdict: complete_gap
    findings:
      - "ZERO commits in the entire repo during this period"
      - "Plans created with these dates were actually executed on Feb 20+"

  - id: PERIOD_3
    dates: "Feb 20-21"
    verdict: genuine_but_short_lived
    label: "PEAK USAGE - only period worktrees were genuinely used"
    findings:
      - "Two worktrees created: AgenticEngineering-cli-nesting and AgenticEngineering-plan-tinydb-migration"
      - "3 plans used feature worktree paths, 5 plans used main"
      - "plan-tinydb-migration branch merged to main on Feb 22 (commit 1ae30e3)"
      - "Some parallel execution detected across main + 2 worktrees"
    duration_days: 2-3

  - id: PERIOD_4
    dates: "Feb 22-23"
    verdict: mixed_usage_transitioning_to_main
    findings:
      - "TinyDB migration merged to main (1ae30e3)"
      - "Multiple plans declared worktree paths but most work landed on main"
      - "cli-nesting worktree last commit: Feb 23 (f10f5e8)"
      - "Registry (docs/worktrees.yml) does NOT track either active worktree"

  - id: PERIOD_5
    dates: "Feb 24-26"
    verdict: zero_worktree_usage
    findings:
      - "ALL work committed directly to main branch (linear history)"
      - "No new worktrees created for 3 plans (260224SC, 260226PO, 260226SD)"
      - "Plans 260226PO and 260226SD explicitly have worktree: null"
      - "Both existing worktrees abandoned (no new commits after Feb 22-23)"

  - id: PERIOD_6
    dates: "Feb 27 - Mar 1"
    verdict: zero_worktree_usage
    findings:
      - "Zero commits in repo"
      - "Both worktrees remain stale (cli-nesting: Feb 23, plan-tinydb-migration: Feb 22)"
      - "Registry still only tracks 2 entries (main + one from Feb 12)"
      - "All 8 user stories remain test_status: untested"

  aggregate_statistics:
    plans_with_worktree_path:
      count: 61
      total: 587
      percentage: 10.4
      note: "historical total, mostly from older plans"
    days_parallel_development: 2-3
    days_main_only_development: 11
    worktrees_currently_stale: 2
    registry_tracking_active_worktrees: "0 of 2"
    infrastructure_exercised: "5-10%"
    infrastructure_cost:
      code_lines: ~4000
      guidance_files: 12
      test_lines: ~2000
    user_stories_tested: "0 of 8"

  hypothesis_confirmation:
    user_hypothesis: "Plans are executed sequentially, not in parallel"
    confirmed: true
    evidence:
      - "Plans ARE executed sequentially in main, not in parallel across worktrees"
      - "Worktree system used briefly Feb 20-22 then abandoned"
      - "System represents significant overhead (~6000 lines) for minimal actual benefit"
      - "Agents are NOT using the worktree system - they default to main"

  recommendation_options:
  - id: OPTION_1
    name: DEPRECATE
    description: "Remove worktree system entirely, simplify to main-branch development"
    effort: medium
    risk: low
    rationale: "System is unused. Removing it eliminates ~6000 lines of dead weight."

  - id: OPTION_2
    name: MOTHBALL
    description: "Keep code but remove from agent guidance. Reactivate if parallel need arises."
    effort: low
    risk: low
    rationale: "Lowest disruption. Agents stop referencing it, code stays dormant."

  - id: OPTION_3
    name: SLIM_DOWN
    description: "Keep minimal worktree support (create/list/remove) but strip reuse, validation, sync, registry subsystems"
    effort: medium
    risk: low
    rationale: "Retains escape hatch for manual use without the automation overhead."

  - id: OPTION_4
    name: INVEST
    description: "Enforce worktree usage via agent guidance changes"
    effort: high
    risk: medium
    rationale: "Unclear ROI given sequential execution pattern and single-developer workflow."

