# Worktree System Touchpoint Audit
# Type: Inventory-only (no actions, no tasks to execute)
# Created: 2026-03-01
#
# PURPOSE: Comprehensive map of every worktree-related touchpoint in the
# AgenticEngineering monorepo. Reference document, not an action plan.

name: Worktree System Touchpoint Audit
worktree_path: /home/code/AgenticEngineering
branch: main
status: touchpoint_audit
type: inventory
created_date: "2026-03-01"

objective: |
  Map every touchpoint in the worktree system across all layers of the monorepo:
  CLI commands, utilities, state/persistence, agent guidance, tests, user stories,
  and cross-cutting data flows. Identify gaps. No actions required.

# =============================================================================
# GROUP 1: CLI COMMANDS LAYER
# =============================================================================

groups:
- name: CLI Commands Layer
  id: GROUP_1
  status: touchpoint_audit
  description: |
    6 subcommands under 'agentic devops worktree' (alias: 'agentic devops wt').
    Routed through handle() in worktree.py. Typer registration in cli.py.

  touchpoints:
  - id: TP-CLI-001
    name: "worktree.py - Command Module"
    file: modules/AgenticCLI/src/agenticcli/commands/worktree.py
    line_count: 1384
    functions:
      router:
        - "handle(args, ctx=None) - line 31"
      commands:
        - "cmd_create(args) - line 660"
        - "cmd_list(args) - line 818"
        - "cmd_remove(args) - line 909"
        - "cmd_status(args) - line 975"
        - "cmd_validate(args) - line 1136"
        - "cmd_sync(args) - line 1280"
      helpers:
        - "get_repo_root() - line 55"
        - "load_worktree_registry(repo_root) - line 70 - NO FileLock"
        - "save_worktree_registry(repo_root, entries) - line 107 - NO FileLock"
        - "lookup_abbreviation(registry, branch) - line 134"
        - "find_workspace_file(repo_root) - line 167"
        - "update_workspace_add() - line 180 - FileLock 5s"
        - "update_workspace_remove() - line 244 - FileLock 5s"
        - "create_planning_folder(plan_path) - line 295"
        - "get_actual_worktrees(repo_root) - line 468"
        - "find_idle_worktrees(repo_root) - line 506"
        - "cleanup_worktree_if_idle() - line 592"

  - id: TP-CLI-002
    name: "cli.py - Typer Registration"
    file: modules/AgenticCLI/src/agenticcli/cli.py
    lines: "534-603"
    details:
      - "devops_group = typer.Typer() - line 537"
      - "worktree_app = typer.Typer() - line 540"
      - "name='worktree' + name='wt' hidden alias - lines 541-542"
    registered_commands:
      - "worktree_create - line 549 - Params: branch, --base, --no-plan, --abbreviation, --description"
      - "worktree_list - line 566"
      - "worktree_remove - line 572 - Params: branch, --force"
      - "worktree_status - line 585"
      - "worktree_validate - line 591"
      - "worktree_sync - line 597"

  - id: TP-CLI-003
    name: "plan.py - Worktree Integration"
    file: modules/AgenticCLI/src/agenticcli/commands/plan.py
    integration_points:
      archive_cleanup:
        lines: "335-375"
        imports: ["cleanup_worktree_if_idle", "cmd_sync"]
      plan_init_worktree:
        lines: "1255-1320"
        imports: ["find_idle_worktrees", "update_workspace_add"]
        strategy: "3-tier: existing branch > idle worktree > new creation"

# =============================================================================
# GROUP 2: UTILITIES LAYER
# =============================================================================

- name: Utilities Layer
  id: GROUP_2
  status: touchpoint_audit

  touchpoints:
  - id: TP-UTIL-001
    name: "naming.py - Plan Folder Naming"
    file: modules/AgenticCLI/src/agenticcli/utils/naming.py
    line_count: 213
    functions:
      - "get_worktree_id(worktree_path, branch) - line 12 - 2-char ID extraction"
      - "sanitize_description(description) - line 82"
      - "generate_plan_folder_name(path, desc, date, branch) - line 127"
      - "validate_plan_folder_name(name) - line 167 - regex: ^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
      - "parse_plan_folder_name(name) - line 192"

  - id: TP-UTIL-002
    name: "exceptions.py - WorktreeError"
    file: modules/AgenticCLI/src/agenticcli/exceptions.py
    lines: "75-115"
    factory_methods:
      - "branch_exists(branch) - line 81"
      - "worktree_exists(path) - line 90"
      - "not_in_repo() - line 99"
      - "invalid_base_branch(branch) - line 108"

# =============================================================================
# GROUP 3: STATE & PERSISTENCE LAYER
# =============================================================================

- name: State and Persistence Layer
  id: GROUP_3
  status: touchpoint_audit

  touchpoints:
  - id: TP-STATE-001
    name: "docs/worktrees.yml - Registry"
    file: docs/worktrees.yml
    schema_root_key: worktrees
    entry_fields: [branch, abbreviation, description, path]
    concurrency_protection: NONE
    gap: "GAP-002 - No FileLock, race condition risk"

  - id: TP-STATE-002
    name: "*.code-workspace - VS Code Workspace"
    file: agenticengineering.code-workspace
    concurrency_protection: "FileLock (timeout=5.0s)"

  - id: TP-STATE-003
    name: "git worktree list --porcelain - Ground Truth"
    description: "Git's own worktree tracking is the canonical source of truth"

  - id: TP-STATE-004
    name: "docs/plans/live/ - Plan Folders"
    file: docs/plans/live/
    naming_pattern: "YYMMDDXX_description"
    linkage: "2-letter abbreviation (XX) maps to registry branch"

  - id: TP-STATE-005
    name: "FileLock from agenticguidance.services.state"
    file: modules/AgenticGuidance/src/agenticguidance/services/state.py
    protects: [workspace_file]
    does_not_protect: [registry]

