    file: modules/AgenticGuidance/assets/definitions/cli-commands.yml

  - id: TP-AGENT-008
    name: "agent-categories.yml - Deploy Category"
    file: modules/AgenticGuidance/assets/definitions/agent-categories.yml

  - id: TP-AGENT-009
    name: "deploy-minimal.yml - Input Layer"
    file: modules/AgenticGuidance/assets/inputs/deploy-minimal.yml

  - id: TP-AGENT-010
    name: "plan-schema.yml - worktree_path Field"
    file: modules/AgenticGuidance/assets/specifications/plan-schema.yml

  - id: TP-AGENT-011
    name: "planner-build - worktree_path Required"
    file: modules/AgenticGuidance/agents/planner/planner-build/process.yml

  - id: TP-AGENT-012
    name: "orchestration-executor - Commit & Merge Step"
    file: modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
    lines: "418-451"
    step_id: worktree_commit_merge

