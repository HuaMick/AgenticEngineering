  - id: TP-AGENT-003
    name: "deploy-worktree - inputs.yml"
    file: modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml
    required_inputs: [REPO_ROOT, branch_name, base_branch]

  - id: TP-AGENT-004
    name: "Claude Code Agent Definition"
    file: .claude/agents/deploy-worktree.md
