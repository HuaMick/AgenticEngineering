  # ----------------------------------------
  # PHASE 4: Quality Validation
  # ----------------------------------------
  - name: "Quality Validation Phase"
    execution: sequential
    description: "Audit test quality and prevent reward hacking"
    loop: "audit-test-fix-loop"
    mandatory: true
    tasks:
      - id: "audit_001"
        name: "Test quality audit"
        description: "Review tests for proper assertions and real behavior validation"
        status: "pending"
        agent: "test-audit"
        depends_on: ["integ_001"]
        inputs:
          - modules/AgenticGuidance/tests/test_services_task.py
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        guidance: |
          Audit test quality to prevent reward hacking:

          CHECKLIST:
          1. Do tests verify actual behavior or just success=True?
             - Tests should check Task field values, not just "returned something"
             - Tests should verify YAML file contents after updates

          2. Are edge cases properly tested?
             - Empty files, missing keys, malformed data
             - Concurrent access scenarios
             - Both task structure patterns (nested and flat)

          3. Are assertions specific and meaningful?
             - Avoid assert result is not None (too weak)
             - Use assert result.status == TaskStatus.COMPLETED (specific)

          4. Do tests verify persistence?
             - After update, re-load file and check changes persisted
             - Verify YAML formatting preserved

          5. Are error conditions tested?
             - Non-existent task IDs
             - Invalid status transitions
             - File locking failures

          REPORT FORMAT:
          - List each issue found
          - Provide specific test name and line number
          - Explain why current assertion is insufficient
          - Suggest specific improvement

        success_criteria:
          - Audit report identifies any weak assertions
          - Audit confirms edge cases covered
          - Audit validates error path testing
          - Audit verifies no reward hacking patterns
          - If issues found, proceed to audit_002

      - id: "audit_002"
        name: "Fix audit findings"
        description: "Address test quality issues identified by auditor"
        status: "pending"
        agent: "builder"
        depends_on: ["audit_001"]
        condition: "audit_001 reports findings"
        inputs:
          - modules/AgenticGuidance/tests/test_services_task.py
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        guidance: |
          Fix issues identified in audit report:

          1. For each finding:
             - Locate test and assertion
             - Strengthen assertion per audit recommendation
             - Re-run test to verify still passes

          2. Add missing tests:
             - If audit identifies uncovered edge case, add test
             - Follow existing test patterns

          3. Improve specificity:
             - Replace weak assertions with specific field checks
             - Add multi-step verification for complex operations

          ITERATION:
          - After fixes, audit runs again
          - Maximum 3 iterations (audit-test-fix-loop)
          - Escalate if issues persist after 3 rounds

        success_criteria:
          - All audit findings addressed
          - Tests strengthened with specific assertions
          - Missing tests added
          - Re-run audit passes with no issues

