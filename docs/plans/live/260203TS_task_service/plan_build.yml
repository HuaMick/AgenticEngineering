        status: "pending"
        agent: "builder"
        depends_on: ["impl_004"]
        inputs:
          - modules/AgenticGuidance/tests/test_services_plan.py
          - modules/AgenticGuidance/tests/test_services_state.py
        target_files:
          - modules/AgenticGuidance/tests/test_services_task.py
        guidance: |
          Create test file following existing service test patterns:

          1. File header and imports:
             """Tests for task service."""
             import pytest
             from pathlib import Path
             from agenticguidance.services.task import Task, TaskService, TaskStatus

          2. Test fixtures (pytest):
