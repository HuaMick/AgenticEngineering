          6. test_get_current_task_returns_pending_when_none_in_progress()
             - Modify fixture to have no in_progress tasks
             - Assert get_current_task() returns first pending task

          7. test_get_current_task_returns_none_when_all_completed()
             - Modify fixture to have only completed tasks
             - Assert get_current_task() returns None

          ASSERTIONS:
          - Use assert for boolean/equality checks
          - Verify Task dataclass field types
