                 """Tests for Task dataclass."""

             class TestTaskStatus:
                 """Tests for TaskStatus enum."""

             class TestTaskService:
                 """Tests for TaskService class."""

          SAMPLE PLAN DATA:
          - Include 3 tasks: one pending, one in_progress, one completed
          - Use both phases[].tasks[] structure
          - Include edge cases: task without optional fields

        success_criteria:
          - test_services_task.py created with proper structure
          - Fixtures create valid plan YAML files
          - Test classes defined for each component
          - pytest can discover and collect tests

      - id: "test_002"
        name: "Implement task retrieval tests"
        description: "Test get_task(), list_tasks(), get_current_task()"
        status: "pending"
        agent: "builder"
        depends_on: ["test_001"]
        inputs:
          - modules/AgenticGuidance/tests/test_services_task.py
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        target_files:
          - modules/AgenticGuidance/tests/test_services_task.py
