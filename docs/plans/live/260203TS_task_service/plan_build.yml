          - Tests pass when run with pytest

      - id: "test_003"
        name: "Implement task update tests"
        description: "Test update_task_status(), start_task(), complete_task()"
        status: "pending"
        agent: "builder"
        depends_on: ["test_002"]
        inputs:
          - modules/AgenticGuidance/tests/test_services_task.py
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        target_files:
          - modules/AgenticGuidance/tests/test_services_task.py
        guidance: |
          Implement update method tests:

          1. test_update_task_status_changes_status()
             - Update task from pending to in_progress
