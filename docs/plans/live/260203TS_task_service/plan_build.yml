# TaskService Implementation Plan
# Implements task CRUD operations and status transitions for plan tasks

# ========================================
# ROOT-LEVEL PLAN METADATA (Required)
# ========================================
name: "task-service-implementation"
worktree_path: "/home/code/AgenticEngineering"
branch: "main"
status: "active"
priority: "high"

# File paths for plan management
worktree: "/home/code/AgenticEngineering"
plan_file: "docs/plans/live/260203TS_task_service/live/plan_build.yml"

# ========================================
# CONTEXT (Narrative Updates)
# ========================================
context: |
  This plan implements TaskService in AgenticGuidance to provide CRUD operations
  for tasks within plan YAML files. Currently, tasks are embedded in plan files
  under phases[].tasks[] with no dedicated service layer for task manipulation.

  OBJECTIVE: Create TaskService following existing service patterns (plan.py,
  state.py, config.py) to enable programmatic task access and status updates.

  ARCHITECTURE ALIGNMENT: Domain service layer only (no workflow/entrypoint yet).
  Future work may add CLI commands using this service.

  UPDATE 2026-02-03 (Session 1): Initial planning. Analyzed existing service
  patterns and test structure. Ready for implementation.

  NEXT: Implement TaskService with comprehensive tests, then validate against
  real plan files.

# ========================================
# ROOT-LEVEL INPUTS (Pre-gathered Context)
# ========================================
inputs:
  - location: "modules/AgenticGuidance/docs/ARCHITECTURE.md"
    description: "Architecture patterns for domain service implementation"

  - location: "modules/AgenticGuidance/src/agenticguidance/services/plan.py"
    description: "Existing plan service showing YAML manipulation patterns"

  - location: "modules/AgenticGuidance/src/agenticguidance/services/state.py"
    description: "Service patterns for dataclasses and enum usage"

  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
    description: "Plan structure reference for task location patterns"

# ========================================
# OPEN QUESTIONS
# ========================================
open_questions:
  - id: "QUESTION-001"
    question: "Should TaskService handle nested tasks in phases or flat task lists?"
    severity: "high"
    status: "ANSWERED"
    answer: "Support both patterns. Plan files use phases[].tasks[] while some legacy files use flat plan.tasks[]."
    answered_by: "HUMAN"
    context: |
      Analysis of existing plan files shows both patterns in use:
      - Modern plans: phases[].tasks[] (nested)
      - Legacy/simple plans: plan.tasks[] (flat)
      TaskService must handle both for backward compatibility.

  - id: "QUESTION-002"
    question: "How should get_current_task() prioritize when multiple tasks are in_progress?"
    severity: "medium"
    status: "ANSWERED"
    answer: "Return first in_progress task found. If none, return first pending task."
    answered_by: "HUMAN"
    context: |
      Single-agent execution model means only one task should be in_progress
      at a time. Multiple in_progress tasks indicates error state - return
      first found and log warning for human review.

# ========================================
# LOOP STRUCTURES
# ========================================
loop_structures:
  - id: "loop_implementation"
    type: "test-fix-loop"
    applies_to_phase: "Implementation Phase"
    trigger: "After service implementation completes"
    description: |
      Iterative testing pattern where TaskService implementation is validated
      against unit tests. Each iteration runs tests, identifies failures, and
      fixes issues until all tests pass.
    exit_criteria:
      success: "All unit tests pass AND integration tests with real plan files pass"
      max_iterations: 5
      escalation: "Escalate to user with test results and remaining failures"
    participants:
      - agent: "builder"
        role: "Implements TaskService and fixes test failures"
      - agent: "test-runner"
        role: "Executes pytest suite and reports results"

  - id: "loop_quality_audit"
    type: "audit-test-fix-loop"
    applies_to_phase: "Quality Validation Phase"
    trigger: "After implementation tests pass"
    description: |
      MANDATORY validation loop to verify test quality and prevent reward hacking.
      Auditor examines tests for proper assertions, edge case coverage, and
      real behavior validation.
    exit_criteria:
      success: "Audit passes with no test quality issues"
      max_iterations: 3
      escalation: "BLOCK deployment - test quality issues must be resolved"
    participants:
      - agent: "test-audit"
        role: "Audits test quality and detects reward hacking"
      - agent: "builder"
        role: "Fixes test quality issues identified by auditor"
    mandatory: true

# ========================================
# PHASES AND TASKS
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Service Implementation
  # ----------------------------------------
  - name: "Service Implementation Phase"
    execution: sequential
    description: "Implement TaskService domain service with CRUD operations"
    tasks:
      - id: "impl_001"
        name: "Create TaskService class structure"
        description: "Implement TaskService skeleton with core methods and dataclasses"
        status: "pending"
        agent: "builder"
        inputs:
          - modules/AgenticGuidance/src/agenticguidance/services/plan.py
          - modules/AgenticGuidance/src/agenticguidance/services/state.py
          - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
        target_files:
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        guidance: |
          Create task.py following patterns from existing services:

          1. Import required modules (yaml, pathlib, dataclasses, enum)
          2. Define TaskStatus enum: pending, in_progress, completed
          3. Create Task dataclass with fields:
             - id: str
             - name: str
             - description: str
             - status: TaskStatus
             - agent: Optional[str]
             - inputs: list[str]
             - target_files: list[str]
             - guidance: Optional[str]
             - completed_date: Optional[str]
          4. Create TaskService class with __init__(plan_path: Path)
          5. Add private helper: _load_plan_file() -> dict
          6. Add private helper: _save_plan_file(data: dict) -> None

          PATTERN REFERENCE:
          - Follow PlanMovementWorkflow pattern for YAML loading
          - Use FileLock from state.py for atomic writes
          - Support both phases[].tasks[] and plan.tasks[] patterns

        success_criteria:
          - TaskService class exists with proper imports
          - Task dataclass has all required fields
          - TaskStatus enum has three states
          - _load_plan_file() and _save_plan_file() helpers implemented
          - No syntax errors, module imports cleanly

      - id: "impl_002"
        name: "Implement task retrieval methods"
        description: "Add get_task(), list_tasks(), get_current_task()"
        status: "pending"
        agent: "builder"
        depends_on: ["impl_001"]
        inputs:
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
          - modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml
        target_files:
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        guidance: |
          Implement task retrieval methods:

          1. get_task(plan_id: str, task_id: str) -> Optional[Task]
             - Search phases[].tasks[] for matching task_id
             - Fall back to plan.tasks[] if not found in phases
             - Return Task dataclass or None
             - Handle YAML parsing errors gracefully

          2. list_tasks(plan_id: str, status: Optional[TaskStatus] = None) -> list[Task]
             - Collect all tasks from phases[].tasks[]
             - Also check plan.tasks[] for backward compatibility
             - Filter by status if provided
             - Return list of Task dataclasses

          3. get_current_task(plan_id: str) -> Optional[Task]
             - Search for first task with status=in_progress
             - If none in_progress, return first task with status=pending
             - Return None if no pending or in_progress tasks
             - Log warning if multiple in_progress tasks found

          EDGE CASES:
          - Empty plan files
          - Missing phases key
          - Tasks without required fields
          - Malformed YAML

        success_criteria:
          - get_task() returns correct task by ID
          - get_task() returns None for non-existent task
          - list_tasks() returns all tasks when status=None
          - list_tasks() filters correctly by status
          - get_current_task() prioritizes in_progress over pending
          - get_current_task() returns None when no actionable tasks
          - All methods handle missing/malformed data gracefully

      - id: "impl_003"
        name: "Implement task update methods"
        description: "Add update_task_status(), start_task(), complete_task()"
        status: "pending"
        agent: "builder"
        depends_on: ["impl_002"]
        inputs:
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
          - modules/AgenticGuidance/src/agenticguidance/services/state.py
        target_files:
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        guidance: |
          Implement task mutation methods with file locking:

          1. update_task_status(plan_id: str, task_id: str, status: TaskStatus) -> bool
             - Load plan file with FileLock for atomic operation
             - Find task in phases[].tasks[] or plan.tasks[]
             - Update status field
             - Add completed_date if status=completed (ISO 8601 format)
             - Save plan file
             - Return True on success, False if task not found

          2. start_task(plan_id: str, task_id: str) -> bool
             - Convenience wrapper for update_task_status(status=in_progress)
             - Validates task exists before updating
             - Returns boolean success

          3. complete_task(plan_id: str, task_id: str) -> bool
             - Convenience wrapper for update_task_status(status=completed)
             - Automatically adds completed_date timestamp
             - Returns boolean success

          ATOMIC WRITES:
          - Use FileLock(plan_file_path) context manager
          - Load YAML inside lock
          - Modify data
          - Write YAML inside same lock
          - Release lock automatically

          VALIDATION:
          - Check task exists before updating
          - Preserve all other task fields during update
          - Maintain YAML formatting (use default_flow_style=False)

        success_criteria:
          - update_task_status() changes task status atomically
          - update_task_status() adds completed_date when status=completed
          - update_task_status() returns False for non-existent tasks
          - start_task() sets status to in_progress
          - complete_task() sets status to completed with timestamp
          - File locking prevents concurrent modification
          - YAML formatting preserved after updates

      - id: "impl_004"
        name: "Export TaskService in __init__.py"
        description: "Add TaskService exports to services package"
        status: "pending"
        agent: "builder"
        depends_on: ["impl_003"]
        inputs:
          - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
          - modules/AgenticGuidance/src/agenticguidance/services/task.py
        target_files:
          - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
        guidance: |
          Update __init__.py to export TaskService:

          1. Add import statement:
             from .task import (
                 Task,
                 TaskService,
                 TaskStatus,
             )

          2. Add to __all__ list (alphabetically within "Task services" section):
             # Task services
             "Task",
             "TaskService",
             "TaskStatus",

          PATTERN: Follow existing structure with comment sections
          (Config services, Context services, etc.)

        success_criteria:
          - TaskService imported in __init__.py
          - Task and TaskStatus exported
          - __all__ list updated with new exports
          - No import errors when importing from agenticguidance.services
          - Alphabetical ordering maintained within section

  # ----------------------------------------
  # PHASE 2: Test Implementation
  # ----------------------------------------
  - name: "Test Implementation Phase"
    execution: sequential
    description: "Create comprehensive test suite for TaskService"
    loop: "test-fix-loop"
    tasks:
