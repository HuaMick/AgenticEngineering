name: Make TinyDB the first-class planning datastore with filelock concurrency
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
context: 'ARCHITECTURE DIRECTION:

  - TinyDB becomes the PRIMARY and FIRST-CLASS data store for all plan operations

  - YAML files become a secondary export/fallback (eventually decommissioned)

  - FileLock wraps all TinyDB writes for multi-agent concurrency safety

  - PlanRepository is the single entry point for all plan data access

  - CLI commands must stop reading YAML directly and go through PlanRepository/PlanService


  CURRENT STATE:

  - PlanRepository exists at services/plan_repository.py (TinyDB backend, no locking)

  - PlanService has use_tinydb flag with dual-write (YAML still source of truth)

  - CLI plan.py has 38 direct yaml.safe_load/dump calls bypassing PlanService

  - FileLock proven pattern exists in services/state.py

  - TaskService uses FileLock for YAML writes already


  TARGET STATE:

  - All reads go through PlanRepository (TinyDB-first)

  - All writes go through PlanRepository with FileLock protection

  - YAML export is opt-in (for git visibility), not required for operation

  - Zero direct yaml.safe_load/dump in CLI plan.py for plan data access

  - PlanService delegates entirely to PlanRepository


  REFERENCE FILES:

  - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py

  - modules/AgenticGuidance/src/agenticguidance/services/plan.py (PlanService class
  ~line 696)

  - modules/AgenticGuidance/src/agenticguidance/services/state.py (FileLock ~line
  71)

  - modules/AgenticGuidance/src/agenticguidance/services/task.py (TaskService)

  - modules/AgenticCLI/src/agenticcli/commands/plan.py (38 direct YAML calls)

  '
phases:
- name: Phase 1 - FileLock Concurrency Protection
  execution: sequential
  description: Add FileLock to all PlanRepository write operations for multi-agent
    safety
  tasks:
  - id: FL_001
    name: Add FileLock to PlanRepository write methods
    status: completed
    agent: build-python
    description: 'Wrap all PlanRepository write operations with FileLock for concurrency
      safety.

      Multiple orchestration agents can access plans.db simultaneously.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    - modules/AgenticGuidance/src/agenticguidance/services/state.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    guidance: "Import FileLock from .state module.\n\nIn PlanRepository.__init__:\n\
      - Create self._lock = FileLock(self.db_path) for protecting all write operations\n\
      \nWrap these methods with self._lock context manager:\n- create_plan() - the\
      \ insert call\n- update_plan() - the update call\n- delete_plan() - the remove\
      \ calls\n- update_task_status() - the update call\n- add_task() - the insert\
      \ call\n- import_from_yaml() - the entire upsert block (phases.remove + tasks.remove\
      \ + inserts)\n- import_all_yaml() - each individual plan import (lock per-plan,\
      \ not whole batch)\n\nRead-only methods (get_plan, list_plans, get_tasks, etc.)\
      \ do NOT need locking\nsince TinyDB JSON reads are atomic.\n\nPattern:\n  def\
      \ create_plan(self, plan_data: dict) -> PlanCreateResult:\n      with self._lock:\n\
      \          # existing logic...\n"
  - id: FL_002
    name: Add FileLock unit tests
    status: completed
    agent: build-python
    description: Test that FileLock protects concurrent PlanRepository writes.
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    target_files:
    - modules/AgenticGuidance/tests/test_plan_repository_filelock.py
    guidance: "Create test file: modules/AgenticGuidance/tests/test_plan_repository_filelock.py\n\
      \nTests:\n1. test_concurrent_writes_are_serialized - Use threading to simulate\n\
      \   two concurrent create_plan calls, verify both succeed without corruption\n\
      2. test_lock_file_created_during_write - Verify .lock file appears during write\n\
      3. test_stale_lock_recovery - Create a stale lock file with dead PID,\n   verify\
      \ PlanRepository can still write\n4. test_read_operations_dont_lock - Verify\
      \ get_plan/list_plans work without lock\n\nUse tmp_path for isolated TinyDB\
      \ instances.\n"
- name: Phase 2 - TinyDB as Primary Store
  execution: sequential
  description: Flip PlanService from YAML-first to TinyDB-first. TinyDB becomes source
    of truth.
  tasks:
  - id: PR_001
    name: Refactor PlanService to be TinyDB-first
    status: completed
    agent: build-python
    description: 'Make PlanService delegate entirely to PlanRepository for all data
      access.

      Remove YAML-as-source-of-truth pattern. TinyDB is the primary store.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    guidance: "CRITICAL: Do NOT modify PlanMovementWorkflow or GitSafetyChecker classes\
      \ in the same file.\nOnly modify PlanService class (starts ~line 696).\n\nChanges\
      \ to PlanService:\n1. Remove use_tinydb flag - TinyDB is now always-on (constructor\
      \ still creates _repository)\n2. get_plan(): Call self._repository.get_plan()\
      \ as the ONLY path.\n   Remove YAML fallback reads. If TinyDB returns None,\
      \ return None.\n   If _repository is None (import failure), fall back to YAML\
      \ as emergency recovery.\n3. list_plans(): Same - delegate to self._repository.list_plans()\
      \ only.\n4. create_plan(): Write to TinyDB via repository. Optionally export\
      \ to YAML.\n5. update_plan_status(): Update via repository. Optionally sync\
      \ to YAML.\n6. get_plan_tasks(): Delegate to self._repository.get_tasks()\n\n\
      Keep a _yaml_sync_enabled flag (default True) that controls whether YAML\nfiles\
      \ are kept in sync. This allows future decommissioning by flipping to False.\n\
      \nPattern for YAML sync:\n  def create_plan(self, ...):\n      result = self._repository.create_plan(plan_data)\n\
      \      if self._yaml_sync_enabled:\n          self._repository.sync_to_yaml(plan_folder_name)\n\
      \      return result\n"
  - id: PR_002
    name: Update TaskService to use PlanRepository for all writes
    status: completed
    agent: build-python
    description: TaskService should write to TinyDB first, then optionally sync YAML.
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: "Modify TaskService to use PlanRepository as primary:\n1. Import PlanRepository\n\
      2. In update_status(): Write to TinyDB via repository.update_task_status() FIRST,\n\
      \   then optionally sync YAML with repository.sync_to_yaml()\n3. Remove direct\
      \ FileLock + yaml.safe_load/dump for task status updates\n   (PlanRepository\
      \ handles its own locking now)\n4. Keep the existing public API unchanged\n"
- name: Phase 3 - Eliminate Direct YAML Access from CLI
  execution: sequential
  description: Replace all 38 direct yaml.safe_load/dump calls in CLI plan.py with
    PlanService/PlanRepository calls.
  tasks:
  - id: CL_001
    name: Replace YAML reads in plan discovery and listing
    status: completed
    agent: build-python
    description: Replace yaml.safe_load in find_plan_folder, cmd_list, cmd_status
      with PlanService.
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: "Target functions (search by name in plan.py):\n- find_plan_folder()\
      \ / _resolve_plan_path() - Use PlanRepository.get_plan() for resolution\n- cmd_list()\
      \ - Use PlanService.list_plans() instead of dir scanning + yaml.safe_load\n\
      - cmd_status() - Use PlanService.get_plan() instead of yaml.safe_load\n\nPattern:\
      \ Create a helper at module level:\n  def _get_repo():\n      from agenticguidance.services.plan_repository\
      \ import PlanRepository\n      return PlanRepository()\n\nReplace yaml.safe_load(f)\
      \ with repo.get_plan(folder_name) or similar.\nKeep JSON output formatting unchanged.\n"
  - id: CL_002
    name: Replace YAML reads/writes in task CRUD commands
    status: pending
    agent: build-python
    description: Replace yaml.safe_load/dump in task list, start, complete, update
      commands.
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: 'Target functions:

      - cmd_task_list() - Use repo.get_tasks() instead of yaml.safe_load

      - cmd_task_start() - Use repo.update_task_status() instead of yaml load+modify+dump

      - cmd_task_complete() - Use repo.update_task_status() instead of yaml load+modify+dump

      - cmd_task_current() - Use repo.get_current_task()

      - cmd_task_add() - Use repo.add_task()

      - cmd_task_update() - Use repo for updates

      - _update_task_status() helper - Delegate to repo.update_task_status()


      IMPORTANT: Preserve auto-archive trigger logic in cmd_task_complete().

      After updating task status, check if all tasks are complete, then trigger archive.

      '
  - id: CL_003
    name: Replace YAML reads in remaining plan commands
    status: pending
    agent: build-python
    description: Replace yaml access in validate, phase, init, new, bootstrap commands.
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: 'Target remaining yaml.safe_load/dump calls:

      - cmd_validate() - Use PlanService for plan structure validation

      - cmd_phase_add/list() - Use PlanRepository for phase operations

      - cmd_new() / cmd_init() - After creating YAML scaffolds, import to TinyDB

      - cmd_bootstrap() - Import bootstrapped plan to TinyDB

      - Any remaining yaml reads for plan data access


      Goal: Zero yaml.safe_load/dump calls for plan data in plan.py

      (yaml usage for NON-plan files like user stories is acceptable)

      '
- name: Phase 4 - Testing & Validation
  execution: sequential
  description: Comprehensive testing of TinyDB-first architecture
  tasks:
  - id: TV_001
    name: Update existing plan service tests for TinyDB-first
    status: pending
    agent: build-python
    description: Update test_services_plan_service.py to test TinyDB-first behavior.
    inputs:
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    - modules/AgenticGuidance/tests/test_services_plan_service_integration.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    target_files:
    - modules/AgenticGuidance/tests/test_services_plan_service.py
    - modules/AgenticGuidance/tests/test_services_plan_service_integration.py
    guidance: 'Update tests to verify:

      1. PlanService always uses TinyDB (no use_tinydb flag)

      2. get_plan() returns data from TinyDB, not YAML

      3. create_plan() writes to TinyDB first

      4. YAML sync is secondary and configurable

      5. Operations work even if YAML files don''t exist (TinyDB is sufficient)

      '
  - id: TV_002
    name: Run full test suite and fix regressions
    status: pending
    agent: build-python
    description: Run pytest on both AgenticGuidance and AgenticCLI, fix any regressions.
    inputs:
    - modules/AgenticGuidance/tests/
    - modules/AgenticCLI/tests/
    target_files:
    - modules/AgenticGuidance/tests/
    - modules/AgenticCLI/tests/
    guidance: "Run:\n  python3 -m pytest modules/AgenticGuidance/tests/ -x -v\n  python3\
      \ -m pytest modules/AgenticCLI/tests/ -x -v\n\nFix any failures caused by the\
      \ TinyDB-first migration.\nCommon issues to watch for:\n- Tests that mock yaml.safe_load\
      \ expecting it to be called (remove those mocks)\n- Tests that create YAML files\
      \ expecting them to be the source of truth\n- Tests that check for yaml.dump\
      \ side effects\n- Import errors from changed PlanService constructor\n"
