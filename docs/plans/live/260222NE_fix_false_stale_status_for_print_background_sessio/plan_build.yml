name: Fix false STALE status for (--print) background sessions
worktree_path: /home/code/AgenticEngineering-cli-nesting
branch: fix-stale-background-sessions
status: active
priority: high
context: |
  Background sessions spawned with `--print` (via `agentic session spawn -b`)
  use `claude --print` which buffers all output to log files and does NOT create
  tmux windows. The current health check system has several issues:

  1. **Tmux signal false-negative**: Signal 4 (`_check_tmux_session`) runs
     `tmux has-session -t {session_id}` for all background+running sessions.
     Since --print sessions never create a tmux session, this always returns
     False, adding a failing signal that misleads health reports.

  2. **10-minute stale threshold too aggressive**: `--print` sessions using
     `claude --print` may buffer output for extended periods (e.g., during
     large tool calls or file reads). The hardcoded 10-minute threshold in
     `_check_session_health()` (line 416) triggers false STALE on sessions
     that are actively working but haven't flushed output yet.

  3. **Auto-diagnostic spawning on false stale**: When `cmd_health()` detects
     stale OR unhealthy, it auto-spawns a diagnostic planner session via
     `_spawn_diagnostic_planner()`. False STALE from --print sessions causes
     unnecessary diagnostic sessions to be spawned, adding system load.

  4. **No CPU/child-process heartbeat**: For sessions without tmux windows,
     there's no alternative liveness signal beyond PID alive + log recency.
     Checking whether the PID has active child processes or CPU usage would
     provide a better heartbeat for --print sessions.

  Key code locations:
    - _check_session_health(): session.py:354-443
    - _check_tmux_session(): session.py:332-351
    - _spawn_diagnostic_planner(): session.py:242-329
    - cmd_health() auto-diagnostic trigger: session.py:1439-1451
    - stale_threshold hardcoded at 10 min: session.py:416
    - Session data has "background: True" but no "print_mode" flag

success_criteria:
  - --print background sessions are NOT checked for tmux session existence.
  - A new "process_children" or "cpu_active" signal is added for --print
    background sessions to provide a heartbeat when tmux is unavailable.
  - The staleness threshold for --print sessions is configurable and defaults
    to a higher value (e.g., 30 minutes) than the 10-minute default.
  - Auto-diagnostic spawning is gated so it does NOT fire for sessions that
    have an alive PID and active child processes (even if log files are stale).
  - Existing health check behavior for non-print sessions is unchanged.
  - All existing tests pass (no regressions).
  - New unit tests cover the --print-specific health check logic.

