          ```python
          def _check_child_processes(pid: int) -> bool | None:
              """Check if a process has active child processes.

              Uses /proc/{pid}/task or psutil-free ps command to detect child
              processes. This serves as a heartbeat for --print sessions that
              don't have tmux windows.

              Args:
                  pid: Process ID to check.

              Returns:
                  True if child processes found, False if none, None if check failed.
              """
              try:
                  # Use ps to find child processes (works on Linux/macOS without psutil)
                  result = subprocess.run(
                      ["ps", "--ppid", str(pid), "--no-headers", "-o", "pid"],
                      capture_output=True, text=True, timeout=5,
                  )
                  if result.returncode == 0:
                      children = [line.strip() for line in result.stdout.strip().splitlines() if line.strip()]
                      return len(children) > 0
                  return False
              except (FileNotFoundError, subprocess.TimeoutExpired):
                  return None
          ```

