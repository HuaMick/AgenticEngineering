# Live Plan - Teach Phase
# Plan: 260106AE_friction_improvements
# Objective: Improve guidance for friction points identified from entrypoint refactor validation

plan_name: "friction-improvements"
worktree: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"
created: "2026-01-06"
status: "planning"
phase_type: "teach"

objective: |
  Address friction points identified during entrypoint refactor validation.
  Focus on improving agent loop context documentation and invocation awareness.

  Primary target: FI-006 (MEDIUM) - teacher-update-guidance loop context
  Batched targets: FI-001, FI-002, FI-004, FI-005 (LOW) - entrypoint awareness

inputs:
  - location: "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"
    description: "Current teacher-update-guidance process - needs loop_context update"
  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
    description: "Orchestration-planning process - needs entrypoint-awareness"
  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd"
    description: "Orchestration-guidance process - needs explicit teacher routing"
  - location: "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
    description: "Planner-build process - needs invocation_context section"
  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
    description: "Planner-guidance process - has loop_context pattern to follow"
  - location: "modules/AgenticGuidance/entrypoints/_plan_build.yml"
    description: "Build entrypoint - reference for intent signal pattern"
  - location: "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
    description: "Teach entrypoint - reference for intent signal pattern"

phases:
  - name: "phase-1-loop-context-improvements"
    description: "Fix loop context documentation for teacher and planner agents"
    agent_category: "teacher"
    priority: P1
    success_criteria:
      - "teacher-update-guidance has accurate loop_context reflecting re-invocation possibility"
      - "planner-build has invocation_context section documenting its caller chain"
      - "Loop context patterns are consistent across agents"

    tasks:
      - id: "fi_006"
        description: "Update teacher-update-guidance loop_context to reflect re-invocation pattern"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "medium"
        friction_reference: "FI-006"
        context:
          target_file: "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"
          current_state: |
            loop_context:
              participates_in: []
              note: "This agent operates at meta-level, not within iteration loops"
          problem: |
            The note says "operates at meta-level" but the agent CAN be re-invoked
            if guidance validation fails in orchestration-guidance (see process.mmd
            lines 130-132: CategorizeGaps --> UpdatePlanGaps --> SpawnOrchestrationPlanning).
            This is confusing for agents trying to understand their context.
          required_changes:
            - "Update loop_context.participates_in to include 'guidance-test-loop'"
            - "Add loop_context.loop_definition reference to agent-loops.yml"
            - "Update note to explain the conditional re-invocation pattern"
        acceptance_criteria:
          - "loop_context.participates_in includes 'guidance-test-loop'"
          - "Note clarifies: operates at meta-level but may be re-invoked via guidance-test-loop if validation fails"
          - "Reference to agent-loops.yml#guidance-test-loop added"
        files:
          - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"

      - id: "fi_002"
        description: "Add invocation_context section to planner-build process"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "low"
        friction_reference: "FI-002"
        context:
          target_file: "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
          current_state: "No invocation_context section exists"
          problem: |
            Agents may be confused about how/when they are invoked.
            planner-guidance has loop_context but planner-build lacks equivalent.
          required_changes:
            - "Add invocation_context section after loop_definitions"
            - "Document caller chain: _plan_build.yml -> orchestration-planning -> planner-build"
            - "Note that it participates in planner-loop for refinement"
        acceptance_criteria:
          - "invocation_context section exists with caller chain documentation"
          - "Pattern matches planner-guidance loop_context structure"
        files:
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"

  - name: "phase-2-entrypoint-awareness"
    description: "Add entrypoint awareness to orchestration processes"
    agent_category: "teacher"
    priority: P2
    dependencies:
      - "phase-1-loop-context-improvements"
    success_criteria:
      - "orchestration-planning process documents entrypoint-awareness"
      - "Agents understand which entrypoint initiated the flow"

    tasks:
      - id: "fi_001"
        description: "Add entrypoint-awareness documentation to orchestration-planning"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "low"
        friction_reference: "FI-001"
        context:
          target_file: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
          current_state: "No documentation of which entrypoint invoked the flow"
          problem: |
            orchestration-planning receives objectives from either _plan_build.yml
            or _plan_teach.yml but has no documented awareness of this context.
            This makes it harder to understand flow routing decisions.
          required_changes:
            - "Add comment block after Start node explaining entrypoint awareness"
            - "Document that entrypoint intent (build vs teach) influences phase determination"
            - "Reference the entrypoint files as context source"
        acceptance_criteria:
          - "Comment block exists explaining entrypoint context"
          - "Phase determination section references entrypoint intent"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"

      - id: "fi_004"
        description: "Add explicit intent signal from entrypoints in orchestration-planning inputs"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "low"
        friction_reference: "FI-004"
        context:
          target_file: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
          current_state: "No runtime_inputs section for entrypoint intent"
          problem: |
            orchestration-planning relies on objective analysis to determine intent
            but could receive explicit intent from the entrypoint.
          required_changes:
            - "Add runtime_inputs section documenting expected entrypoint context"
            - "Document planning_intent: 'build' | 'teach' as expected from entrypoint"
        acceptance_criteria:
          - "runtime_inputs section exists with planning_intent documentation"
          - "Documentation explains this comes from entrypoint invocation"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"

      - id: "fi_005"
        description: "Add explicit teacher agent routing in orchestration-guidance"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "low"
        friction_reference: "FI-005"
        context:
          target_file: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd"
          current_state: "SpawnTeachers node exists but routing logic is implicit"
          problem: |
            orchestration-guidance spawns teacher agents but the routing
            decision (which teacher for which task) is not documented.
          required_changes:
            - "Add comment explaining teacher routing based on task type"
            - "Document teacher-update-guidance vs teacher-update-assets selection"
        acceptance_criteria:
          - "SpawnTeachers section has routing comments"
          - "Teacher selection criteria documented"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd"

  - name: "phase-3-verification"
    description: "Verify friction improvements are effective"
    agent_category: "test"
    priority: P3
    dependencies:
      - "phase-2-entrypoint-awareness"
    success_criteria:
      - "All process files have consistent loop/invocation context patterns"
      - "No broken references in updated files"
      - "Self-review agents can navigate context correctly"

    tasks:
      - id: "verify_001"
        description: "Validate loop_context patterns are consistent"
        agent_type: "test-guidance-simulator"
        operation: "AUDIT"
        context:
          scope: "All agents with loop_context or invocation_context sections"
          checks:
            - "loop_context.participates_in arrays contain valid loop names"
            - "loop_definition references resolve to agent-loops.yml"
            - "notes accurately describe agent behavior"
        acceptance_criteria:
          - "All loop_context patterns are self-consistent"
          - "All references resolve correctly"
        files:
          - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"

success_criteria:
  user_validation:
    - "Agents understand their invocation context without confusion"
    - "Loop participation is accurately documented"
    - "Entrypoint intent flows through to downstream agents"

  technical_validation:
    - "All loop_context sections reference valid loops in agent-loops.yml"
    - "invocation_context sections document caller chains accurately"
    - "No broken references in updated files"

notes:
  - "This plan addresses friction points identified during entrypoint refactor validation"
  - "FI-006 is the primary target (MEDIUM priority)"
  - "FI-001, FI-002, FI-004, FI-005 are batched LOW priority items"
  - "All changes are guidance improvements (teach phase), no code changes"
