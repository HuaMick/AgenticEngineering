          ```python
          from agenticcli.utils.subprocess_utils import get_clean_env
          # BEFORE:
          os.execvp("claude", direct_cmd)

          # AFTER:
          os.execvpe("claude", direct_cmd, get_clean_env())
          ```

          Add module-level import in orchestrate.py:
            from agenticcli.utils.subprocess_utils import get_clean_env

          Note: os.execvpe is stdlib (Python 3.x), no additional dependencies needed.

