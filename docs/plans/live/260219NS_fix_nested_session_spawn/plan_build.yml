name: "Fix nested session spawn - strip CLAUDECODE env var"
status: "active"
priority: "high"
context: |
  When any agentic CLI command spawns a `claude` subprocess from inside an
  existing Claude Code session, the child process inherits the CLAUDECODE
  environment variable set by the parent session. Claude Code detects this
  variable and refuses to start:

    Error: Claude Code cannot be launched inside another Claude Code session.
    Nested sessions share runtime resources and will crash all active sessions.
    To bypass this check, unset the CLAUDECODE environment variable.

  The fix is to strip CLAUDECODE (and potentially related internal Claude Code
  env vars such as CLAUDE_SESSION_ID, ANTHROPIC_CLAUDE_CODE, etc.) from the
  environment dict passed to each subprocess spawn site.

  The preferred approach is a centralised helper function in
  agenticcli/utils/subprocess.py that builds a clean env dict, then update
  every call site that spawns `claude` to use it. Non-claude subprocess calls
  (git, tmux, tail, python3 helper scripts, etc.) do NOT need the stripped env
  because they are unaffected by CLAUDECODE.

  Call sites that spawn `claude` (identified by code audit):

  1. session.py :: cmd_spawn()
     - subprocess.Popen (background mode) line ~820
     - subprocess.Popen (foreground Popen mode) line ~904
  2. session.py :: _spawn_diagnostic_planner()
     - subprocess.Popen line ~262
  3. loop.py :: cmd_start()
     - subprocess.Popen (background mode) line ~232
     - subprocess.run (foreground mode) line ~277
  4. plan.py :: cmd_new() (spawns planner via claude --print)
     - subprocess.run (status mode) line ~715
     - subprocess.run (json mode) line ~726
  5. plan.py :: cmd_run() (spawns agentic session spawn via subprocess)
     - subprocess.Popen line ~886
     NOTE: This spawns "agentic session spawn", not claude directly.
           The agentic binary itself is Python; the CLAUDECODE env var
           is only harmful when reaching the claude binary. However,
           since agentic session spawn will in turn spawn claude, the
           env var must be stripped at the outermost agentic spawn or
           within cmd_spawn itself — covered by fix #1.
  6. orchestrate.py :: cmd_orchestrate()
     - os.execvp("claude", ...) lines ~434, ~439, ~446, ~450
     NOTE: os.execvp replaces the current process; env stripping must use
           os.environ mutation before the execvp call, then restore, or
           pass a cleaned env via execve instead of execvp.
  7. ralph.py :: cmd_start() (tmux new-session with claude shell command string)
     - subprocess.run(["tmux", "new-session", "-d", "-s", session_name, claude_cmd]) line ~183
     NOTE: tmux inherits the calling process environment for the new session.
           The shell command string inside tmux will therefore see CLAUDECODE.
           Fix requires prepending `env -u CLAUDECODE` to the claude_cmd shell
           string, OR passing a modified env to the tmux subprocess.run call.

  Env vars to strip (conservative initial set):
    - CLAUDECODE
    - CLAUDE_CODE_ENTRYPOINT  (set by claude internals)

  The helper should also be documented to make future callers aware of it.

success_criteria:
  - A utility function `get_clean_env()` exists in
    /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/subprocess_utils.py
    that returns os.environ copy with CLAUDECODE and CLAUDE_CODE_ENTRYPOINT removed.
  - All subprocess.Popen and subprocess.run calls that spawn `claude` in
    session.py, loop.py, and plan.py pass `env=get_clean_env()`.
  - os.execvp calls in orchestrate.py are replaced with os.execve using the
    cleaned env dict (or env vars are unset before execvp and restored if needed).
  - The tmux new-session call in ralph.py passes the cleaned env dict to
    subprocess.run so the tmux session does not inherit CLAUDECODE.
  - Running `agentic session spawn --prompt "hello" -b` from inside a Claude
    Code session no longer produces the nested-session error.
  - Existing unit tests continue to pass (no regressions).
  - A smoke test or assertion confirms that the spawned process env does not
    contain CLAUDECODE.

