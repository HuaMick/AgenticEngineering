          Edit:
            /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/orchestrate.py

          The cmd_orchestrate() function uses os.execvp() to replace the current
          process with claude. os.execvp() inherits os.environ as-is. The fix is
          to switch these calls to os.execve() which accepts an explicit env dict,
          OR to unset the offending env vars from os.environ before calling execvp.

          The cleaner approach for code readability is to use os.execve() with
          a cleaned env dict. The signature is:
            os.execve(path, args, env)
          where path must be the full path to the executable, or use
          os.execvpe() which also searches PATH:
            os.execvpe(file, args, env)

          There are FOUR os.execvp("claude", direct_cmd) calls in orchestrate.py,
          all within cmd_orchestrate():
            - Around line 434: inside tmux already-in-session branch
            - Around line 439: tmux not available branch
            - Around line 446: RuntimeError fallback branch
            - Around line 450: --no-tmux branch

