name: "Fix nested session spawn - strip CLAUDECODE env var"
status: "active"
priority: "high"
context: |
  When any agentic CLI command spawns a `claude` subprocess from inside an
  existing Claude Code session, the child process inherits the CLAUDECODE
  environment variable set by the parent session. Claude Code detects this
  variable and refuses to start:

    Error: Claude Code cannot be launched inside another Claude Code session.
    Nested sessions share runtime resources and will crash all active sessions.
    To bypass this check, unset the CLAUDECODE environment variable.

  The fix is to strip CLAUDECODE (and CLAUDE_CODE_ENTRYPOINT) from the
  environment dict passed to each subprocess spawn site that ultimately
  invokes `claude`.

  The preferred approach is a centralised helper function in
  agenticcli/utils/subprocess_utils.py that builds a clean env dict, then
  update every call site that spawns `claude` to use it. Non-claude subprocess
  calls (git, tmux, tail, python3 helper scripts, etc.) do NOT need the
  stripped env because they are unaffected by CLAUDECODE.

  Call sites that spawn `claude` (verified against current codebase after
  commit 5e26050 CLI restructuring):

  1. session.py :: _spawn_diagnostic_planner()
     - subprocess.Popen at line 285
  2. session.py :: cmd_spawn() background mode
     - subprocess.Popen at line 857
  3. session.py :: cmd_spawn() foreground Popen mode
     - subprocess.Popen at line 941
  4. loop.py :: cmd_start() background mode
     - subprocess.Popen at line 164
  5. loop.py :: cmd_start() foreground mode
     - subprocess.run at line 209
  6. plan.py :: cmd_new() status mode (spawns planner via claude --print)
     - subprocess.run at line 717
  7. plan.py :: cmd_new() json mode (spawns planner via claude --print)
     - subprocess.run at line 728
  8. plan.py :: cmd_run() (spawns "agentic session spawn" which in turn
     invokes claude - env is inherited transitively)
     - subprocess.Popen at line 888
  9. orchestrate.py :: cmd_orchestrate() - four os.execvp("claude", ...) calls
     - Line 414: already-in-tmux branch
     - Line 419: tmux not available branch
     - Line 426: RuntimeError fallback branch
     - Line 430: --no-tmux branch
     NOTE: os.execvp replaces the current process; fix uses os.execvpe()
     which accepts an explicit env dict. The subprocess.Popen at line 214
     in _run_planning_loop() spawns sys.executable (Python), NOT claude,
     so it does NOT need env stripping.
  10. ralph.py :: start() (tmux new-session with claude shell command string)
      - subprocess.run at line 183
      NOTE: tmux inherits the calling process env for the new session. The
      shell command string inside tmux will see CLAUDECODE. Fix: pass a
      modified env to the tmux subprocess.run call.

  Env vars to strip (conservative initial set):
    - CLAUDECODE
    - CLAUDE_CODE_ENTRYPOINT  (set by claude internals)

  The helper should also be documented to make future callers aware of it.

success_criteria:
  - A utility function `get_clean_env()` exists in
    /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/subprocess_utils.py
    that returns an os.environ copy with CLAUDECODE and CLAUDE_CODE_ENTRYPOINT removed.
  - All subprocess.Popen and subprocess.run calls that spawn `claude` (or
    `agentic session spawn` which transitively invokes claude) in session.py,
    loop.py, and plan.py pass `env=get_clean_env()`.
  - os.execvp calls in orchestrate.py are replaced with os.execvpe using the
    cleaned env dict.
  - The tmux new-session call in ralph.py passes the cleaned env dict to
    subprocess.run so the tmux session does not inherit CLAUDECODE.
  - Running `agentic session spawn --prompt "hello" -b` from inside a Claude
    Code session no longer produces the nested-session error.
  - Existing unit tests continue to pass (no regressions).
  - A smoke test or assertion confirms that the spawned process env does not
    contain CLAUDECODE.

