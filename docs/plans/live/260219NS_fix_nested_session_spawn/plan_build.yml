            from agenticcli.utils.subprocess_utils import get_clean_env

          ralph.py spawns claude inside a tmux session at line 183-187 via:
          ```python
          result = subprocess.run(
              ["tmux", "new-session", "-d", "-s", session_name, claude_cmd],
              capture_output=True,
              text=True
          )
          ```

          tmux inherits its environment from the calling process and then passes
          it to the shell command it runs. If CLAUDECODE is set in the calling
          process, it will be present in the tmux session's environment, and
          from there inherited by the claude subprocess inside.

          The fix is to pass env=get_clean_env() to this subprocess.run call so
          that tmux itself starts without CLAUDECODE:

          ```python
          result = subprocess.run(
              ["tmux", "new-session", "-d", "-s", session_name, claude_cmd],
              capture_output=True,
              text=True,
              env=get_clean_env(),
          )
          ```

          The trailing comma after `text=True` should be present for consistency
          with the rest of the codebase. The verify_result subprocess.run at
          line 197 calls `tmux has-session` which does NOT spawn claude and does
          NOT need env stripping. The `subprocess.run(["tmux", "attach", ...])` at
          line 224 also does not need stripping.

