          Edit:
            /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/ralph.py

          ralph.py spawns claude inside a tmux session via:
            subprocess.run(["tmux", "new-session", "-d", "-s", session_name, claude_cmd], ...)

          tmux inherits its environment from the calling process and then passes
          it to the shell command it runs. If CLAUDECODE is set in the calling
          process, it will be inherited by the tmux session's shell, and from
          there by the claude subprocess.

          The fix is to pass env=get_clean_env() to the subprocess.run call for
          tmux new-session so that tmux itself starts without CLAUDECODE in its
          environment and therefore does not propagate it to the claude process.

          LOCATION - around line 183:
          ```python
          # BEFORE:
          result = subprocess.run(
              ["tmux", "new-session", "-d", "-s", session_name, claude_cmd],
              capture_output=True,
              text=True
          )

          # AFTER:
          from agenticcli.utils.subprocess_utils import get_clean_env
          result = subprocess.run(
              ["tmux", "new-session", "-d", "-s", session_name, claude_cmd],
              capture_output=True,
              text=True,
              env=get_clean_env(),
          )
          ```

          Note: ralph.py uses typer (not argparse like the other commands).
          The import pattern may differ — add the import at the top of the
          file with other stdlib/third-party imports.

