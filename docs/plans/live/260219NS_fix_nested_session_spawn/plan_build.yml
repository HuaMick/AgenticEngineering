          Replace ALL FOUR with os.execvpe:
          ```python
          # BEFORE:
          os.execvp("claude", direct_cmd)

          # AFTER:
          os.execvpe("claude", direct_cmd, get_clean_env())
          ```

          Do this for all four occurrences. Each is a standalone statement at
          the end of its branch.

          NOTE: Do NOT modify the subprocess.Popen at line 214 in
          _run_planning_loop() - that spawns sys.executable (the Python
