# CLI Loading Bar and Context Metrics - Test Plan
# Plan ID: 260205LB

name: "cli-loading-bar-and-metrics-tests"
status: "active"

phases:
  - name: "Phase 1: Unit Testing"
    execution: sequential
    tasks:
      - id: "UNIT_001"
        name: "Test token estimation"
        description: "Verify tokens.py heuristic matches expected character-to-token ratios"
        status: "pending"
        agent: "test-builder"
        target_files:
          - modules/AgenticCLI/tests/test_tokens.py
        success_criteria:
          - "1000 characters =~ 250 tokens"
          - "Handles empty strings and edge cases"

  - name: "Phase 2: Functional Testing"
    execution: sequential
    tasks:
      - id: "FUNC_001"
        name: "Test streaming output"
        description: "Verify that 'session spawn' doesn't buffer output until completion"
        status: "pending"
        agent: "test-builder"
        guidance: |
          1. Use an agent to spawn 'agentic session spawn'.
          2. The agent should be able to see the output streaming in its own terminal/context window before the process exits.
        success_criteria:
          - "Output is printed as it arrives from the process"

      - id: "FUNC_002"
        name: "Test progress bar thresholds"
        description: "Mock token usage to trigger yellow/red bar states"
        status: "pending"
        agent: "test-builder"
        guidance: |
          1. Mock the token estimation to return values > 150,000.
          2. Verify the terminal output captured by the agent reflects the color/style changes in the loading bar.
        success_criteria:
          - "Bar is cyan at 10%"
          - "Bar is yellow at 76%"
          - "Bar is red at 91%"

