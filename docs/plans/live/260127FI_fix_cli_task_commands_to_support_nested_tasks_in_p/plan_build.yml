name: fix-cli-task-commands-nested-tasks
status: pending
priority: high
created: '2026-01-27'
problem: "Current CLI task commands (`agentic plan task start/complete/list/status/current`)\n\
  cannot find tasks that are nested within phases in plan YAML files:\n\n```yaml\n\
  plan:\n  phases:\n    - name: \"Phase 1\"\n      id: \"phase_01\"\n      tasks:\
  \           # <-- CLI can't find tasks nested here\n        - id: \"CL-001\"\n \
  \         name: \"Task name\"\n          status: \"pending\"\n```\n\nThe `_update_task_status()`\
  \ function in `modules/AgenticCLI/src/agenticcli/commands/plan.py`\nonly searches\
  \ at the phase level (checking `item.get(\"id\")` on phases), not within `phases[].tasks[]`.\n\
  \nThis breaks the standard plan structure where tasks are nested inside phases.\n"
root_cause: "In `_update_task_status()` (lines 531-567), the code iterates over phases\
  \ but treats\nthe phases themselves as tasks:\n\n```python\nfor key in [\"phases\"\
  , \"implementation_steps\"]:\n    items = plan.get(key, [])\n    for item in items:\n\
  \        if item.get(\"id\") == task_id:  # <-- Checks phase ID, not nested task\
  \ ID\n            item[\"status\"] = new_status\n```\n\nThe function needs to:\n\
  1. Iterate over phases\n2. For each phase, iterate over phase[\"tasks\"]\n3. Find\
  \ the task within the nested tasks array\n"
phases:
- phase_id: P1
  name: Build - Fix CLI Task Parsing
  description: 'Update all task-related functions in plan.py to properly search for
    tasks

    nested within the phases[].tasks[] structure.

    '
  status: pending
  tasks:
  - id: FI-001
    name: Update _update_task_status() for nested tasks
    description: 'Modify _update_task_status() to search for tasks within phases[].tasks[]:

      1. Iterate over phases array

      2. For each phase, iterate over phase.get("tasks", [])

      3. Match task by id (checking both "id" and "task_id" fields)

      4. Update the matched task''s status

      5. Preserve existing fallback for implementation_steps

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    acceptance_criteria:
    - _update_task_status() finds tasks in phases[].tasks[]
    - Both 'id' and 'task_id' fields are checked
    - Status update modifies the correct nested task
    - Error message is shown if task not found
  - id: FI-002
    name: Verify cmd_task_list() handles nested tasks
    description: 'Review cmd_task_list() (lines 630-722) - it appears to already handle

      nested tasks correctly. Verify and fix if needed:

      - Iterates over content.get("phases", [])

      - For each phase, iterates over phase.get("tasks", [])

      - Extracts task_id, description, status

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    acceptance_criteria:
    - cmd_task_list shows all nested tasks
    - Status filter works with nested tasks
    - Verbose mode shows full task details
    guidance: 'NOTE: cmd_task_list() appears to already search phases[].tasks[] correctly.

      This task is to verify it works and add any missing functionality.

      '
  - id: FI-003
    name: Verify cmd_task_current() handles nested tasks
    description: 'Review cmd_task_current() (lines 1285-1414) - it appears to already
      handle

      nested tasks correctly. Verify and fix if needed:

      - Iterates over content.get("phases", [])

      - For each phase, iterates over phase.get("tasks", [])

      - Returns first in_progress or pending task

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    acceptance_criteria:
    - cmd_task_current finds first in_progress task
    - Falls back to first pending task
    - Returns full task details including guidance
    guidance: 'NOTE: cmd_task_current() appears to already search phases[].tasks[]
      correctly.

      This task is to verify it works end-to-end.

      '
  - id: FI-004
    name: Verify cmd_task_status() handles nested tasks
    description: 'Review cmd_task_status() (lines 725-818) - it appears to already
      handle

      nested tasks correctly. Verify and fix if needed:

      - Iterates over content.get("phases", [])

      - For each phase, iterates over phase.get("tasks", [])

      - Returns task details when found

      '
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    acceptance_criteria:
    - cmd_task_status shows details for nested task
    - Phase information is included in output
    - Error shown if task not found
    guidance: 'NOTE: cmd_task_status() appears to already search phases[].tasks[]
      correctly.

      This task is to verify it works end-to-end.

      '
