phases:
- name: Phase 1 - Foundation & Dependencies
  execution: sequential
  description: Add TinyDB dependency and create the PlanRepository foundation class
  tasks:
  - id: DB_001
    name: Add TinyDB dependency to AgenticGuidance
    status: completed
    agent: build-python
    description: 'Add tinydb>=4.8.0 to AgenticGuidance pyproject.toml dependencies.

      Run pip install to verify the dependency resolves correctly.

      '
    inputs:
    - modules/AgenticGuidance/pyproject.toml
    target_files:
    - modules/AgenticGuidance/pyproject.toml
    guidance: 'Add ''tinydb>=4.8.0'' to the dependencies list in pyproject.toml.

      Current dependencies are pyyaml>=6.0 and jinja2>=3.0.

      After editing, run: pip install -e modules/AgenticGuidance to verify.

      '
    success_criteria:
    - tinydb>=4.8.0 appears in pyproject.toml dependencies
    - pip install -e modules/AgenticGuidance completes without errors
    - python -c 'import tinydb; print(tinydb.__version__)' succeeds
  - id: DB_002
    name: Create PlanRepository class with TinyDB backend
    status: completed
    agent: build-python
    depends_on:
    - DB_001
    description: 'Create the PlanRepository class that wraps TinyDB for plan data
      storage.

      This is the domain-layer abstraction that replaces direct YAML file access.

      The repository manages:

      - Database initialization at ~/.agentic/plans.db

      - Tables: plans (metadata), tasks (individual tasks), phases (phase data)

      - Indexes on plan_folder_name, status, task_id

      - CRUD operations returning existing dataclass types

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    - modules/AgenticGuidance/src/agenticguidance/services/state.py
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    guidance: "Create a new file: modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py\n\
      \nDESIGN REQUIREMENTS:\n1. Class PlanRepository with __init__(db_path: Optional[Path]\
      \ = None)\n   - Default db_path: Path.home() / \".agentic\" / \"plans.db\"\n\
      \   - Create parent directories if needed\n   - Initialize TinyDB with default\
      \ JSON storage\n\n2. Tables:\n   - plans: One document per plan (plan_folder_name\
      \ as key)\n     Fields: plan_folder_name, plan_folder (absolute path), name,\
      \ worktree_path,\n     branch, status, priority, objective, created, context\n\
      \   - tasks: One document per task\n     Fields: plan_folder_name, phase_name,\
      \ task_id, name, description,\n     status, agent, inputs, target_files, guidance,\
      \ completed_date\n   - phases: One document per phase\n     Fields: plan_folder_name,\
      \ phase_name, execution, description\n\n3. Plan CRUD methods returning existing\
      \ dataclasses:\n   - create_plan(plan_data: dict) -> PlanCreateResult\n   -\
      \ get_plan(plan_id_or_name: str) -> Optional[PlanData]\n   - list_plans(status:\
      \ Optional[str] = None) -> list[PlanMetadata]\n   - update_plan(plan_folder_name:\
      \ str, updates: dict) -> PlanUpdateResult\n   - delete_plan(plan_folder_name:\
      \ str) -> PlanDeleteResult\n\n4. Task CRUD methods:\n   - get_tasks(plan_folder_name:\
      \ str, status_filter: Optional[str] = None) -> list[TaskData]\n   - get_task(plan_folder_name:\
      \ str, task_id: str) -> Optional[TaskData]\n   - update_task_status(plan_folder_name:\
      \ str, task_id: str, new_status: str) -> bool\n   - add_task(plan_folder_name:\
      \ str, phase_name: str, task_data: dict) -> bool\n   - get_current_task(plan_folder_name:\
      \ str) -> Optional[TaskData]\n\n5. Import/Export:\n   - import_from_yaml(plan_folder:\
      \ Path) -> bool  # Import single plan from YAML files\n   - export_to_yaml(plan_folder_name:\
      \ str, output_folder: Path) -> bool\n   - import_all_yaml(plans_base: Path)\
      \ -> dict  # Import all plans, return stats\n   - sync_to_yaml(plan_folder_name:\
      \ str) -> bool  # Write current DB state to YAML\n\n6. Use TinyDB's Query()\
      \ for search operations\n7. Use from tinydb import TinyDB, Query, where\n\n\
      IMPORTANT: Reuse existing dataclasses (PlanData, PlanMetadata, TaskData, etc.)\n\
      from the plan.py module. Do NOT create new data models.\n\nREFERENCE: The InMemorySessionRepository\
      \ pattern in\nmodules/legacy/MyAgents/projects/RemoteAgents/src/agent_remote/services/relay/infrastructure/in_memory_repository.py\n\
      provides a good template for the repository pattern.\n"
    success_criteria:
    - PlanRepository class created with all specified methods
    - python -c 'from agenticguidance.services.plan_repository import PlanRepository'
      succeeds
    - PlanRepository initializes TinyDB at ~/.agentic/plans.db
    - All methods return correct dataclass types
- name: Phase 2 - Service Layer Integration
  execution: sequential
  description: Update PlanService and TaskService to delegate to PlanRepository
  tasks:
  - id: SV_001
    name: Update PlanService to use PlanRepository
    status: pending
    agent: build-python
    depends_on:
    - DB_002
    description: 'Modify PlanService to delegate read/write operations to PlanRepository

      while maintaining its existing public API. Implement dual-write strategy:

      writes go to both TinyDB and YAML files.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    guidance: "MODIFY PlanService class (do NOT replace the file - only modify PlanService):\n\
      \n1. Add PlanRepository as an optional dependency:\n   def __init__(self, repo_path=None,\
      \ use_tinydb=True):\n       ...existing init...\n       self._repository = PlanRepository()\
      \ if use_tinydb else None\n\n2. Update get_plan() to try TinyDB first, fall\
      \ back to YAML:\n   - If self._repository: try repository.get_plan() first\n\
      \   - If TinyDB returns None or raises, fall back to existing YAML logic\n \
      \  - If YAML succeeds and TinyDB missed, auto-import to TinyDB\n\n3. Update\
      \ list_plans() similarly with TinyDB-first strategy\n\n4. Update create_plan()\
      \ with dual-write:\n   - Create YAML files as before (existing logic)\n   -\
      \ Also write to TinyDB via repository.create_plan()\n\n5. Update update_plan_status()\
      \ with dual-write:\n   - Update YAML files as before\n   - Also update TinyDB\
      \ via repository.update_plan()\n\n6. DO NOT modify PlanMovementWorkflow or GitSafetyChecker\n\
      7. DO NOT change the public API or return types\n8. Keep use_tinydb=True as\
      \ default (easy to disable for testing)\n\nBACKWARD COMPATIBILITY: If TinyDB\
      \ import fails (dependency not installed),\nset self._repository = None and\
      \ fall back to pure YAML.\n"
    success_criteria:
    - PlanService public API unchanged (same method signatures and return types)
    - PlanService reads from TinyDB when available
    - PlanService falls back to YAML when TinyDB record missing
    - PlanService writes to both TinyDB and YAML on mutations
    - Existing PlanService tests still pass
  - id: SV_002
    name: Update TaskService to use PlanRepository
    status: pending
    agent: build-python
    depends_on:
    - SV_001
    description: 'Modify TaskService to delegate task operations to PlanRepository

      while maintaining backward compatibility with YAML.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: 'MODIFY TaskService class:


      1. Add PlanRepository as optional dependency similar to PlanService

      2. Update task CRUD methods to use TinyDB-first, YAML-fallback strategy

      3. Update status transition to dual-write

      4. Maintain existing public API

      5. Keep FileLock for YAML writes (TinyDB handles its own concurrency)

      '
    success_criteria:
    - TaskService public API unchanged
    - Task CRUD operations use TinyDB when available
    - Task status updates write to both TinyDB and YAML
    - Existing TaskService tests still pass
  - id: SV_003
    name: Update services __init__.py exports
    status: pending
    agent: build-python
    depends_on:
    - SV_001
    description: 'Export PlanRepository from the services package __init__.py.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    guidance: 'Add PlanRepository to the services __init__.py:

      1. Add import: from .plan_repository import PlanRepository

      2. Add to __all__ list under "# Plan services" section

      '
    success_criteria:
    - from agenticguidance.services import PlanRepository succeeds
    - PlanRepository in __all__ list
- name: Phase 3 - Data Migration & Sync
  execution: sequential
  description: Create CLI commands for data migration and sync operations
  tasks:
  - id: MI_001
    name: Implement auto-bootstrap from YAML
    status: pending
    agent: build-python
    depends_on:
    - SV_001
    description: 'Implement auto-bootstrap logic in PlanRepository that detects an
      empty database

      and automatically imports all existing YAML plans on first access.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    guidance: "Add auto-bootstrap logic to PlanRepository:\n\n1. In __init__, after\
      \ database creation, check if plans table is empty\n2. If empty and plans_base\
      \ path exists, call import_all_yaml(plans_base)\n3. plans_base should be discoverable:\n\
      \   - Accept as constructor parameter\n   - Or auto-detect via PlanService._find_repo_root()\
      \ / \"docs\" / \"plans\"\n4. Import should be silent on success, log warnings\
      \ on failures\n5. Make auto-bootstrap configurable (auto_bootstrap=True parameter)\n\
      \nThe import_all_yaml method should:\n- Scan live/, completed/, deferred/ directories\n\
      - For each plan folder, call import_from_yaml()\n- Track and return stats: {imported:\
      \ N, skipped: N, failed: N}\n"
    success_criteria:
    - Empty database triggers auto-import on first access
    - All existing YAML plans imported successfully
    - Import is idempotent (running twice doesn't duplicate)
    - Stats returned showing import results
  - id: MI_002
    name: Add CLI db sync command
    status: pending
    agent: build-python
    depends_on:
    - MI_001
    description: 'Add ''agentic plan db sync'' CLI command for manual sync between
      TinyDB and YAML.

      '
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: 'Add a new subcommand ''db'' under ''plan'' with ''sync'' subcommand:

      - ''agentic plan db sync'' - Rebuild TinyDB from YAML files

      - ''agentic plan db sync --export'' - Write TinyDB state to YAML

      - ''agentic plan db status'' - Show TinyDB stats (plan count, DB size, last
      sync)


      Implementation:

      1. Add ''db'' to the plan subcommand handler

      2. Create cmd_db_sync() function

      3. Use PlanRepository.import_all_yaml() for sync

      4. Output results in JSON format when --json flag is set

      '
    success_criteria:
    - '''agentic plan db sync'' rebuilds TinyDB from YAML'
    - '''agentic plan db status'' shows database statistics'
    - Sync is idempotent and reports results
