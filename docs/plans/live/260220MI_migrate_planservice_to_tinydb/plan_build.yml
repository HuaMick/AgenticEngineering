  execution: sequential
  description: 'Replace direct YAML reads/writes in plan.py CLI commands with PlanService/PlanRepository
    calls.

    This is the largest phase - 37+ yaml.safe_load/dump calls need replacement.

    '
  tasks:
  - id: CL_001
    name: Refactor plan list and status commands
    status: pending
    agent: build-python
    depends_on:
    - SV_001
    - MI_001
    description: 'Replace direct YAML reads in cmd_list() and cmd_status() with PlanService
      calls.

      '
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: "Focus on these functions in plan.py:\n- cmd_list() (around line 2686):\
      \ Replace directory scanning + yaml.safe_load\n  with PlanService.list_plans()\n\
      - cmd_status() (around line 1283): Replace yaml.safe_load for plan/task status\n\
      \  with PlanService.get_plan() and get_plan_tasks()\n\nAPPROACH:\n1. Import\
      \ PlanService at function level (lazy import pattern already used)\n2. Create\
      \ PlanService instance with repo_path detection\n3. Replace yaml reads with\
      \ service calls\n4. Keep output formatting unchanged\n5. Maintain JSON output\
