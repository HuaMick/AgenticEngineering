    success_criteria:
    - cmd_list() uses PlanService.list_plans()
    - cmd_status() uses PlanService.get_plan()
    - Output format unchanged for both commands
    - JSON output (-j flag) unchanged
  - id: CL_002
    name: Refactor task CRUD commands
    status: pending
    agent: build-python
    depends_on:
    - CL_001
    description: 'Replace direct YAML reads/writes in task commands with PlanService/TaskService
