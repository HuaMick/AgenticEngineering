      - cmd_task_start() (line ~1944): Use TaskService or PlanRepository for status
      update

      - cmd_task_complete() (line ~1978): Use TaskService for status update

      - cmd_task_add() (line ~2320): Use PlanRepository.add_task()

      - cmd_task_update() (line ~2957): Use PlanRepository for task updates

      - _update_task_status() helper (line ~2018): Centralize via PlanRepository


      This is the highest-risk refactor. Take care to:

      1. Preserve all existing behavior (output format, error handling)

      2. Test each command after refactoring

      3. Keep the auto-archive logic in cmd_task_complete()

      '
    success_criteria:
    - All task commands use PlanService/TaskService instead of direct YAML
