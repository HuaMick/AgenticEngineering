name: migrate_planservice_to_tinydb
worktree_path: /home/code/AgenticEngineering-plan-tinydb-migration
branch: plan-tinydb-migration
status: active
priority: high
context: 'Migrate the AgenticCLI PlanService from static YAML files to an embedded
  TinyDB local datastore.


  RESEARCH FINDINGS (2026-02-20):

  - PlanService is defined in modules/AgenticGuidance/src/agenticguidance/services/plan.py
  (lines 657-1209)

  - PlanMovementWorkflow handles task archival (lines 119-554 in same file)

  - TaskService is in modules/AgenticGuidance/src/agenticguidance/services/task.py

  - CLI plan.py has 37 direct yaml.safe_load/dump calls - does NOT use PlanService
  for most operations

  - CLI only imports PlanMovementWorkflow and MoveResult from services (not PlanService)

  - FileLock in state.py provides current concurrency control

  - Plans stored in docs/plans/{live,completed,deferred}/YYMMDDXX_description/

  - Multiple plan_*.yml files per folder (plan_build.yml, plan_test.yml, etc.)

  - Existing user stories: US-GD-120 through US-GD-137 cover current PlanService

  - New migration stories: US-GD-200 through US-GD-206 created for TinyDB migration


  ARCHITECTURE DECISION:

  - TinyDB as fast read/query layer stored at ~/.agentic/plans.db

  - YAML files remain git-committed source of truth

  - Dual-write strategy: writes go to both TinyDB and YAML

  - Auto-rebuild TinyDB from YAML if database missing

  - Repository pattern (PlanRepository) abstracts storage from service layer


  NEXT: Phase 1 - Foundation & Dependencies

  '
