    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    guidance: 'MODIFY TaskService class:


      1. Add PlanRepository as optional dependency similar to PlanService

      2. Update task CRUD methods to use TinyDB-first, YAML-fallback strategy

      3. Update status transition to dual-write

      4. Maintain existing public API

      5. Keep FileLock for YAML writes (TinyDB handles its own concurrency)

      '
  - id: SV_003
    name: Update services __init__.py exports
    description: 'Export PlanRepository from the services package __init__.py.

      '
    status: pending
    agent: build-python
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/__init__.py
    guidance: 'Add PlanRepository to the services __init__.py:

      1. Add import: from .plan_repository import PlanRepository

      2. Add to __all__ list under "# Plan services" section

