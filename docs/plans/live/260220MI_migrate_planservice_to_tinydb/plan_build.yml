      '
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    - modules/AgenticGuidance/src/agenticguidance/services/task.py
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: 'Focus on these functions:

      - cmd_task_list() (line ~2128): Replace yaml reads with PlanService.get_plan_tasks()

      - cmd_task_status() (line ~2223): Use PlanService

      - cmd_task_current() (line ~3116): Use PlanService.get_plan_tasks() with status
