open_questions:
- id: plan-q-001
  question: Should TinyDB database be per-project (in repo) or global (~/.agentic/plans.db)?
  severity: high
  status: answered
  answer: Global at ~/.agentic/plans.db - plans span multiple worktrees and projects
  answered_by: planner-build
  context: 'Per-project would mean docs/plans/.plans.db in each repo, which keeps
    data local

    but creates issues with worktrees sharing the same plan data.

    Global at ~/.agentic/ matches existing state_store.py pattern.

    '
- id: plan-q-002
  question: Should YAML files still be written on every plan update, or only on explicit
    sync/export?
  severity: high
  status: answered
  answer: 'Dual-write: every mutation writes to both TinyDB and YAML for consistency'
  answered_by: planner-build
  context: 'YAML files are git-committed and used by agents reading plan files directly.

    Dual-write ensures YAML and TinyDB stay in sync without explicit sync commands.

    Performance cost is minimal since YAML writes are already happening.

    '
