worktree: /home/code/AgenticEngineering
branch: main
objective: |
  Refactor AgenticEngineering to 3-layer architecture:
  - AgenticCore: Business logic (extracted from AgenticCLI workflows)
  - Thin CLI: Presentation layer only (~2k lines)
  - AgenticTmux: Terminal session management
  - AgenticVoice: Voice interface for phone-based planning

phases:
  - phase: 1
    name: "Create AgenticCore Module"
    status: pending
    description: |
      Extract business logic from AgenticCLI/workflows/ into new AgenticCore module.
      This becomes the shared service layer for all interfaces.
    tasks:
      - id: AC-001
        name: "Create AgenticCore module structure"
        status: pending
        description: |
          Create the new module with proper Python package structure:
          - modules/AgenticCore/src/agenticcore/
          - services/, models/, utils/ subdirectories
          - pyproject.toml with dependencies
        files:
          - modules/AgenticCore/
          - modules/AgenticCore/pyproject.toml
          - modules/AgenticCore/src/agenticcore/__init__.py
        acceptance_criteria:
          - Module installs with pip install -e
          - Package structure follows existing conventions

      - id: AC-002
        name: "Move context_workflow to ContextService"
        status: pending
        description: |
          Extract MainFirstPlanResolver and context resolution logic to AgenticCore.
          This is the largest workflow (594 lines).
        files:
          - modules/AgenticCLI/src/agenticcli/workflows/context_workflow.py
          - modules/AgenticCore/src/agenticcore/services/context.py
        acceptance_criteria:
          - MainFirstPlanResolver moved to AgenticCore
          - get_role_process, get_role_inputs_manifest moved
          - All tests pass

      - id: AC-003
        name: "Move plan_workflow to PlanService"
        status: pending
        description: |
          Extract plan scaffolding, task CRUD, and git safety logic.
        files:
          - modules/AgenticCLI/src/agenticcli/workflows/plan_workflow.py
          - modules/AgenticCore/src/agenticcore/services/plan.py
        acceptance_criteria:
          - Plan scaffolding and validation moved
          - GitSafetyChecker moved
          - All tests pass

      - id: AC-004
        name: "Move remaining workflows to services"
        status: pending
        description: |
          Move config_workflow, task_workflow, state_workflow,
          template_workflow, environment_workflow to AgenticCore services.
        files:
          - modules/AgenticCore/src/agenticcore/services/config.py
          - modules/AgenticCore/src/agenticcore/services/task.py
          - modules/AgenticCore/src/agenticcore/services/state.py
          - modules/AgenticCore/src/agenticcore/services/template.py
          - modules/AgenticCore/src/agenticcore/services/environment.py
        acceptance_criteria:
          - All workflow files moved to services
          - Shared utilities extracted to utils/
          - Data models extracted to models/

      - id: AC-005
        name: "Create comprehensive test suite for AgenticCore"
        status: pending
        description: |
          Move relevant tests from AgenticCLI, add service-level tests.
        files:
          - modules/AgenticCore/tests/
        acceptance_criteria:
          - All services have unit tests
          - Tests run independently of AgenticCLI
          - CI passes

  - phase: 2
    name: "Refactor AgenticCLI to Thin Wrapper"
    status: pending
    description: |
      Update AgenticCLI to call AgenticCore services instead of local workflows.
      Remove workflows/ directory, keep only presentation logic.
    tasks:
      - id: AC-006
        name: "Update CLI dependencies"
        status: pending
        description: |
          Add agenticcore as dependency, update imports.
        files:
          - modules/AgenticCLI/pyproject.toml
        acceptance_criteria:
          - agenticcore in dependencies
          - Package installs correctly

      - id: AC-007
        name: "Refactor command handlers to use AgenticCore"
        status: pending
        description: |
          Update commands/context.py, commands/plan.py, etc. to call
          AgenticCore services instead of local workflows.
        files:
          - modules/AgenticCLI/src/agenticcli/commands/
        acceptance_criteria:
          - No imports from agenticcli.workflows
          - All commands call agenticcore.services
          - CLI behavior unchanged

      - id: AC-008
        name: "Remove workflows directory from AgenticCLI"
        status: pending
        description: |
          Delete workflows/ after all commands updated.
        files:
          - modules/AgenticCLI/src/agenticcli/workflows/
        acceptance_criteria:
          - workflows/ directory removed
          - AgenticCLI reduced to ~2,000 lines
          - All tests pass

  - phase: 3
    name: "Build AgenticTmux Module"
    status: pending
    description: |
      Create tmux session management module for terminal-based workflow.
    tasks:
      - id: AC-009
        name: "Create AgenticTmux module structure"
        status: pending
        description: |
          Create new module with tmux session management commands.
        files:
          - modules/AgenticTmux/
          - modules/AgenticTmux/pyproject.toml
        acceptance_criteria:
          - Module installs with pip install -e
          - agentic-tmux command available

      - id: AC-010
        name: "Implement SessionService in AgenticCore"
        status: pending
        description: |
          Add SessionService to AgenticCore for tmux session lifecycle.
        files:
          - modules/AgenticCore/src/agenticcore/services/session.py
        acceptance_criteria:
          - create_session, attach_session, list_sessions
          - Integration with PlanService (session per plan)

      - id: AC-011
        name: "Build tmux session commands"
        status: pending
        description: |
          Implement session create/attach/list/kill commands.
        files:
          - modules/AgenticTmux/src/agentictmux/commands/session.py
        acceptance_criteria:
          - agentic-tmux session create <name>
          - agentic-tmux session attach <name>
          - agentic-tmux session list

  - phase: 4
    name: "Build AgenticVoice Module"
    status: pending
    description: |
      Create voice interface for phone-based planning and control.
    tasks:
      - id: AC-012
        name: "Create AgenticVoice module structure"
        status: pending
        description: |
          Create new module with WebSocket server for phone connection.
        files:
          - modules/AgenticVoice/
          - modules/AgenticVoice/pyproject.toml
        acceptance_criteria:
          - Module installs with pip install -e
          - WebSocket server starts

      - id: AC-013
        name: "Implement voice command routing"
        status: pending
        description: |
          Route voice commands to AgenticCore services.
        files:
          - modules/AgenticVoice/src/agenticvoice/commands.py
        acceptance_criteria:
          - Voice commands parsed and routed
          - Responses formatted for TTS

      - id: AC-014
        name: "Integrate with PersonaPlex (optional)"
        status: pending
        description: |
          Optional integration with PersonaPlex for natural voice interaction.
        files:
          - modules/AgenticVoice/src/agenticvoice/personaplex.py
        acceptance_criteria:
          - PersonaPlex connection established
          - Full-duplex voice conversation works
