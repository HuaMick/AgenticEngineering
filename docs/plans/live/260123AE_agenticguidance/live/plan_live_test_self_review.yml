  test_scenarios_reference: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
  maximum_iterations: 3

  primary_artifacts:
    - location: "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
      description: "Self-review protocol guideline with 6-step CCI workflow"
      sections_to_test:
        - "cci_pattern (CCI Context Injection pattern)"
        - "cci_self_review_workflow (6-step workflow)"
        - "protocol (review steps and validation)"
        - "validation_checklist (path, process, loop, output validation)"
        - "reporting (output schema and severity rules)"

    - location: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
      description: "Self-review criteria definition with PASS/NEEDS_ATTENTION rules"
      sections_to_test:
        - "pass_criteria (PC-001 to PC-007)"
        - "needs_attention_triggers (NAT-001 to NAT-005)"
        - "output_requirements (SRLE-004)"
        - "quantitative_thresholds"
