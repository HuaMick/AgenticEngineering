          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml"
          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/manifest.yml"

      # -----------------------------------------------------------------------
      # 2.14-2.15: Orchestration Category Self-Review
      # -----------------------------------------------------------------------
      - id: "2.14"
        description: "Self-review validation of orchestration-executor agent"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        status: "pending"
        context:
          target_agent: "modules/AgenticGuidance/agents/orchestration/orchestration-executor/"
          test_scenario: "self_review_test"
          guidance_files_to_review:
            - "process.yml"
            - "inputs.yml"
          additional_scenarios:
            - "subagent_spawning_test"
          constraints: "Use only guidance files - no code inspection"
        acceptance_criteria:
          - "Agent completes self-review using guidance only"
          - "Subagent paths discoverable from inputs.yml"
          - "Zero CRITICAL issues found"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/inputs.yml"

      - id: "2.15"
        description: "Self-review validation of orchestration-friction agent"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        status: "pending"
        context:
          target_agent: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/"
          test_scenario: "self_review_test"
          guidance_files_to_review:
            - "process.yml"
            - "inputs.yml"
          additional_scenarios:
            - "subagent_spawning_test"
          constraints: "Use only guidance files - no code inspection"
        acceptance_criteria:
          - "Agent completes self-review using guidance only"
          - "Subagent paths discoverable from inputs.yml"
          - "Zero CRITICAL issues found"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"

  # =========================================================================
  # PHASE 3: Self-Review Output Validation
  # =========================================================================
  - phase_id: "3"
    phase_name: "Self-Review Output Validation"
    status: "pending"
    description: |
      Validate that self-review outputs conform to the schema defined in
      self-review-criteria.yml#output_requirements. Tests PASS and NEEDS_ATTENTION
      scenarios and verifies plan file creation for NEEDS_ATTENTION status.

    tasks:
      # -----------------------------------------------------------------------
      # 3.1: Validate PASS Output Schema
      # -----------------------------------------------------------------------
      - id: "3.1"
        description: "Verify PASS output conforms to output_requirements schema"
        agent_type: "test-audit"
        operation: "VALIDATE"
        status: "pending"
        context:
          validation_target: "PASS output format"
          schema_reference: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml#output_requirements"
          required_fields:
            - field: "status"
              expected_value: "PASS"
            - field: "findings"
              expected_value: "[]"
            - field: "plan_file_path"
              expected_value: "null"
            - field: "spot_check_eligible"
              expected_value: "true"
          validation_rules:
            - "status must be exactly 'PASS'"
            - "findings must be empty list"
            - "plan_file_path must be null for PASS"
            - "spot_check_eligible must be boolean"
        acceptance_criteria:
          - "All required fields present"
          - "Field values conform to schema"
          - "No extra/unknown fields"
        files:
          - "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"

      # -----------------------------------------------------------------------
      # 3.2: Validate NEEDS_ATTENTION Output Schema
      # -----------------------------------------------------------------------
      - id: "3.2"
        description: "Verify NEEDS_ATTENTION output conforms to output_requirements schema"
        agent_type: "test-audit"
        operation: "VALIDATE"
        status: "pending"
        context:
          validation_target: "NEEDS_ATTENTION output format"
          schema_reference: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml#output_requirements"
          required_fields:
            - field: "status"
              expected_value: "NEEDS_ATTENTION"
            - field: "findings"
              expected_structure: "list of {id, severity, description, recommendation}"
            - field: "plan_file_path"
              expected_value: "non-null string path"
            - field: "spot_check_eligible"
              expected_value: "true"
          validation_rules:
            - "status must be exactly 'NEEDS_ATTENTION'"
            - "findings must have at least one item"
            - "Each finding must have id, severity, description, recommendation"
            - "plan_file_path MUST NOT be null (FENCE enforcement)"
            - "spot_check_eligible must be boolean"
        acceptance_criteria:
          - "All required fields present"
          - "Findings array correctly structured"
          - "plan_file_path is non-null (FENCE: SRLE-004)"
        files:
          - "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"

      # -----------------------------------------------------------------------
      # 3.3: Validate FENCE Enforcement (NEEDS_ATTENTION without plan file)
      # -----------------------------------------------------------------------
      - id: "3.3"
        description: "Verify FENCE rejects NEEDS_ATTENTION without plan file"
        agent_type: "test-audit"
        operation: "VALIDATE"
        status: "pending"
        context:
          test_scenario_reference: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml#selfreview_no_plan_rejection"
          fence_rule: |
            FENCE: If status == NEEDS_ATTENTION AND plan_file_path is null/empty:
            - Output is INVALID
            - Self-review is INCOMPLETE
            - Orchestrator MUST reject and require plan file creation
          test_input:
            status: "NEEDS_ATTENTION"
            findings:
              - id: "NAT-002"
                severity: "CRITICAL"
                description: "Test finding - broken reference"
                recommendation: "Fix the reference"
            plan_file_path: null
          expected_behavior:
            - "Validation should FAIL"
            - "Error message indicates missing plan file"
            - "Loop does not advance"
        acceptance_criteria:
          - "FENCE correctly rejects invalid output"
          - "Clear error message returned"
          - "Loop iteration blocked until plan file created"
        files:
          - "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
          - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"

  # =========================================================================
  # PHASE 4: Guidance-Only Execution Validation
  # =========================================================================
  - phase_id: "4"
    phase_name: "Guidance-Only Execution Validation"
    status: "pending"
    description: |
      Final validation that agents can complete self-review using ONLY their
      guidance files without code inspection, codebase exploration, or external
      context beyond referenced files. Confirms the guidance-blind-test strategy.

    tasks:
      # -----------------------------------------------------------------------
      # 4.1: Audit Test Methodology
      # -----------------------------------------------------------------------
      - id: "4.1"
        description: "Audit that Phase 2 tests used guidance-only context"
        agent_type: "test-audit"
        operation: "REVIEW"
        status: "pending"
        context:
          review_target: "Phase 2 self-review test execution"
          audit_questions:
            - "Did target agents use ONLY guidance files (no code inspection)?"
            - "Did agents rely only on referenced paths, not exploration?"
            - "Were test scenarios executed as defined in guidance-test-scenarios.yml?"
            - "Did agents correctly apply self-review-criteria.yml thresholds?"
            - "Did agents follow the validation_checklist from agent-self-review.yml?"
          methodology_reference: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
        acceptance_criteria:
          - "No evidence of code inspection during self-review"
          - "All context derived from guidance files"
          - "Test scenarios executed correctly"
          - "Criteria applied consistently across agents"
        files:
          - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"

      # -----------------------------------------------------------------------
      # 4.2: Categorize and Report Findings
      # -----------------------------------------------------------------------
      - id: "4.2"
        description: "Aggregate and categorize self-review findings across all agents"
        agent_type: "test-audit"
        operation: "ANALYZE"
        status: "pending"
        context:
          input_source: "Phase 2 self-review outputs from all 15 agents"
          categorization_reference: "modules/AgenticGuidance/assets/definitions/friction.yml"
          analysis_dimensions:
            - "By category: which agent categories have most issues?"
            - "By criteria: which PC-*/NAT-* triggers fire most often?"
            - "By severity: CRITICAL vs HIGH vs MEDIUM vs LOW distribution"
            - "By type: path validation vs process vs consistency issues"
          output_format:
            - "summary_by_category"
            - "summary_by_criteria"
            - "summary_by_severity"
            - "recommended_improvements"
        acceptance_criteria:
          - "All findings categorized"
          - "Patterns identified across agent categories"
          - "Recommendations prioritized by severity"
        files:
          - "modules/AgenticGuidance/assets/definitions/friction.yml"

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================
success_criteria:
  phase_1:
    - "6-step CCI self-review workflow is executable from guidance"
    - "All cross-references in self-review-criteria.yml resolve"
    - "CLI output format provides all required file paths"

  phase_2:
    - "All 15 target agents complete self_review_test"
    - "Zero CRITICAL severity issues remain unresolved"
    - "Loop context valid for all loop participants"
    - "Subagent paths discoverable for orchestrators"

  phase_3:
    - "PASS output schema validated"
    - "NEEDS_ATTENTION output schema validated"
    - "FENCE enforcement (plan file requirement) confirmed"

  phase_4:
    - "All tests used guidance-only context"
    - "Findings categorized and prioritized"
    - "Improvement recommendations documented"

  overall:
    - "agent-self-review.yml guideline is executable"
    - "self-review-criteria.yml cross-references resolve"
    - "6-step CCI self-review workflow works across all agent categories"
    - "self_review_test scenario passes for all 15 agents"
    - "Agents can complete self-review using only guidance files"
    - "FENCE enforcement prevents incomplete self-review outputs"

