agent_assignments:
  test_guidance_simulator:
    role: "Primary executor for self_review_test scenario"
    responsibilities:
      - "Execute 6-step CCI workflow validation (Phase 1)"
      - "Run self_review_test on all 15 target agents (Phase 2)"
      - "Report friction points using friction.yml patterns"
      - "Generate outputs conforming to self-review-criteria.yml#output_requirements"
    loop_participation: "guidance-test-loop (executor)"
    guidance_files:
      - "modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml"
      - "modules/AgenticGuidance/agents/test/test-guidance-simulator/inputs.yml"

  test_audit:
    role: "Validator and auditor for self-review functionality"
    responsibilities:
      - "Validate output schema conformance (Phase 3)"
      - "Verify FENCE enforcement (Phase 3)"
      - "Audit test methodology (Phase 4)"
      - "Categorize and report findings (Phase 4)"
      - "Detect false positives and methodology issues"
    guidance_files:
      - "modules/AgenticGuidance/agents/test/test-audit/process.yml"
      - "modules/AgenticGuidance/agents/test/test-audit/inputs.yml"

  teacher_update_guidance:
    role: "Fixer for identified guidance gaps"
    responsibilities:
      - "Fix CRITICAL and HIGH severity issues"
      - "Update guidance files based on findings"
      - "Participate in documentation-loop for iterative fixes"
    triggered_by: "NEEDS_ATTENTION status from self-review"
    loop_participation: "documentation-loop (fixer)"
    guidance_files:
      - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"
      - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml"

