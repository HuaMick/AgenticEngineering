# =============================================================================
# PHASES
# =============================================================================

phases:
  # =========================================================================
  # PHASE 1: CCI Self-Review Workflow Validation
  # =========================================================================
  - phase_id: "1"
    phase_name: "CCI Self-Review Workflow Validation"
    status: "pending"
    description: |
      Validate that the 6-step CCI self-review workflow documented in
      agent-self-review.yml works correctly. Test that agents can:
      1. Receive CLI context injection (file paths)
      2. Read self-review-criteria.yml
      3. Read agent-self-review.yml protocol
      4. Read their own guidance files
      5. Apply self-review protocol
      6. Generate conformant output

    loop_pattern:
      type: "guidance-test-loop"
      participants:
        - "test-guidance-simulator (executor)"
        - "teacher-update-guidance (fixer, if gaps found)"
      exit_conditions:
        - "All 6 CCI workflow steps executable from guidance"
        - "Output conforms to self-review-criteria.yml#output_requirements"

    tasks:
      # -----------------------------------------------------------------------
      # 1.1: Validate CCI Bootstrap Context
      # -----------------------------------------------------------------------
      - id: "1.1"
        description: "Verify CLI provides required file paths for self-review"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          validation_target: "CCI output format"
          reference: "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml#cci_pattern.cli_output_format"
          required_fields:
            - "agent_name"
            - "agent_path"
            - "agent_files (process.yml, inputs.yml, outputs.yml, manifest.yml)"
            - "criteria_files (self-review-criteria.yml, agent-self-review.yml)"
            - "output_schema_path"
          test_agents:
            - "test-audit"
            - "planner-build"
            - "build-python"
        acceptance_criteria:
          - "CLI output includes all required fields"
          - "All file paths resolve to existing files"
          - "Paths use repository-relative format"
        files:
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"

      # -----------------------------------------------------------------------
      # 1.2: Validate self-review-criteria.yml Cross-References
      # -----------------------------------------------------------------------
      - id: "1.2"
        description: "Verify all cross-references in self-review-criteria.yml resolve"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          validation_target: "Cross-reference resolution"
          file_to_validate: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
          expected_cross_references:
            - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
            - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
            - "modules/AgenticGuidance/assets/definitions/friction.yml"
          criteria_to_verify:
            - "PC-001 to PC-007 (pass criteria)"
            - "NAT-001 to NAT-005 (needs attention triggers)"
        acceptance_criteria:
          - "All cross-reference paths exist"
          - "All criteria IDs referenced in examples exist in definitions"
          - "No broken internal references (e.g., #output_requirements)"
        files:
          - "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"

      # -----------------------------------------------------------------------
      # 1.3: Validate 6-Step CCI Workflow Execution
      # -----------------------------------------------------------------------
      - id: "1.3"
        description: "Execute full 6-step CCI self-review workflow on test agent"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        status: "pending"
        context:
          target_agent: "modules/AgenticGuidance/agents/test/test-audit/"
          workflow_reference: "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml#cci_self_review_workflow"
          steps_to_validate:
            - step: 1
              action: "Run CLI for initial context"
              validate: "File paths returned correctly"
            - step: 2
              action: "Read self-review-criteria.yml"
              validate: "PASS/NEEDS_ATTENTION criteria loaded"
            - step: 3
              action: "Read agent-self-review.yml"
              validate: "Protocol and validation checklist loaded"
            - step: 4
              action: "Read agent guidance files"
              validate: "process.yml, inputs.yml readable"
            - step: 5
              action: "Apply self-review protocol"
              validate: "Review steps executable"
            - step: 6
              action: "Generate conformant output"
              validate: "Output matches #output_requirements schema"
        acceptance_criteria:
          - "All 6 steps complete without friction"
          - "Agent produces valid PASS or NEEDS_ATTENTION output"
          - "If NEEDS_ATTENTION, plan_file_path is populated"
        files:
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
          - "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
          - "modules/AgenticGuidance/agents/test/test-audit/process.yml"
          - "modules/AgenticGuidance/agents/test/test-audit/inputs.yml"

  # =========================================================================
  # PHASE 2: Self-Review Test Scenario Across Agent Categories
  # =========================================================================
