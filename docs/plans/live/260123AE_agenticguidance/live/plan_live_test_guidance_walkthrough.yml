  # =========================================================================
  # PHASE 1: Orchestration Agents Walkthrough
  # =========================================================================
  - phase_id: "1"
    phase_name: "Orchestration Agents Walkthrough Validation"
    status: "pending"
    description: |
      Validate orchestration agents can execute their coordination tasks using
      only guidance files. Focus on subagent_spawning_test scenario - can
      orchestrators locate and spawn subagents from guidance alone?

    agent_category: "orchestration"
    applicable_test_scenarios:
      - "self_review_test"
      - "task_completion_test"
      - "reference_resolution_test"
      - "friction_detection_test"
      - "subagent_spawning_test"

    tasks:
      # -----------------------------------------------------------------------
      # 1.1: orchestration-executor
      # -----------------------------------------------------------------------
      - id: "1.1"
        name: "Walkthrough: orchestration-executor"
        description: |
          Execute guidance walkthrough for orchestration-executor.
          This agent coordinates plan execution and spawns task agents.
          Must validate ability to parse plans and route to correct agents.
        status: "pending"
        agent_type: "test-guidance-simulator"
        operation: "WALKTHROUGH"
        context:
          target_agent: "orchestration-executor"
          target_path: "modules/AgenticGuidance/agents/orchestration/orchestration-executor/"
          validation_mode: "guidance_walkthrough"
          guidance_files_to_review:
            - "process.yml"
            - "inputs.yml"
            - "manifest.yml"
          test_scenarios:
            - "self_review_test"
            - "task_completion_test"
            - "reference_resolution_test"
            - "friction_detection_test"
            - "subagent_spawning_test"
          walkthrough_task: |
            Execute the orchestration-executor process to coordinate plan execution.
            Demonstrate ability to:
            1. Load and parse plan files (MMD and YAML)
            2. Resolve agent routing from phase/task definitions
            3. Identify which subagents to spawn
            4. Locate subagent guidance paths from inputs.yml
          constraints: "Use ONLY guidance files - no code inspection or codebase exploration"
          report_template: "modules/AgenticGuidance/assets/definitions/friction.yml#FRICTION_POINT"
        acceptance_criteria:
          - "Agent completes walkthrough using guidance only"
          - "All input paths resolve correctly"
          - "Subagent guidance paths discoverable from inputs.yml"
          - "Agent routing logic clear from guidance"
          - "Plan parsing steps unambiguous"
          - "Friction report shows zero CRITICAL or HIGH severity issues"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/inputs.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/manifest.yml"

