# Plan: Comprehensive Walkthrough Test Plan for Agent Guidance
# Purpose: Validate that agents can complete tasks using only their guidance files
#          through guidance-blind-test strategy execution and walkthrough validation
#
# Created: 2026-01-26
# Agent: planner-guidance-testing (via _plan_teach.yml)
# Plan Folder: 260123AE_agenticguidance
#
# This plan builds upon the completed CCI Pattern Validation (plan_live_test_guidance.yml)
# to provide comprehensive walkthrough testing across ALL agent categories.
#
# VALIDATION STRATEGY:
# - guidance-blind-test: Agents receive ONLY guidance files, no code/codebase access
# - walkthrough validation: Step-by-step execution using guidance alone
# - friction detection: Report gaps, ambiguities, and missing context
# - agent assignments: test-guidance-simulator (executor), test-audit (quality)

# =============================================================================
# PLAN METADATA
# =============================================================================
name: "comprehensive-guidance-walkthrough-test"
status: "pending"
priority: "high"
created_date: "2026-01-26"
plan_type: "guidance-test"

worktree_path: "/home/code/AgenticEngineering"
branch: "main"
plan_file: "docs/plans/live/260123AE_agenticguidance/live/plan_live_test_guidance_walkthrough.yml"

# =============================================================================
# CONTEXT
# =============================================================================
context: |
  This plan provides comprehensive walkthrough validation for ALL agent guidance files.
  Building on the CCI Pattern Validation completed in plan_live_test_guidance.yml,
  this plan extends testing to cover:

  1. ORCHESTRATION AGENTS (3 agents)
     - orchestration-executor: Plan execution and subagent spawning
     - orchestration-friction: Friction detection and analysis
     - orchestration-planning: Planning workflow coordination

  2. PLANNER AGENTS (7 agents)
     - planner-audit: Audit phase planning
     - planner-build: Build implementation planning
     - planner-cleaning: Finalization and cleanup planning
     - planner-guidance: Guidance change planning
     - planner-guidance-testing: Guidance test planning (this agent)
     - planner-reviewer: Plan review and feedback
     - planner-test: Test phase planning

  3. TEST AGENTS (7 agents)
     - test-audit: Self-review auditing
     - test-builder: Test construction
     - test-final-output: Final output validation
     - test-guidance-simulator: Guidance walkthrough execution
     - test-runner: Test execution
     - test-service: Service testing
     - test-user-simulator: User journey simulation

  4. TEACHER AGENTS (3 agents)
     - teacher-trace-diagnostics: Trace analysis and friction detection
     - teacher-update-assets: Asset file updates
     - teacher-update-guidance: Guidance file updates

  5. BUILD AGENTS (2 agents)
     - build-flutter: Flutter implementation
     - build-python: Python implementation

  6. DEPLOY AGENTS (2 agents)
     - deploy-cicd: CI/CD pipeline deployment
     - deploy-worktree: Worktree setup and management

  TOTAL: 24 agents to be validated

  STRATEGY: guidance-blind-test
  Each agent receives ONLY its guidance files (process.yml, inputs.yml, manifest.yml)
  and must demonstrate task completion without code inspection or codebase exploration.

# =============================================================================
# TEST CONTEXT
# =============================================================================
test_context:
  loop_type: "guidance-test-loop"
  loop_reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.guidance-test-loop"
  strategy: "guidance-blind-test"
  component_reference: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
  test_scenarios_reference: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
  maximum_iterations: 3

# =============================================================================
# INPUTS
# =============================================================================
inputs:
  # Core test definitions
  - location: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
    description: "Test scenarios for guidance-blind-test validation"
    purpose: "Defines self_review_test, task_completion_test, reference_resolution_test, etc."

  - location: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
    description: "Self-review PASS/NEEDS_ATTENTION criteria"
    purpose: "Defines what constitutes successful self-review"

  - location: "modules/AgenticGuidance/assets/definitions/friction.yml"
    description: "Friction point patterns and templates"
    purpose: "Structured format for reporting guidance gaps"

  - location: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop definitions including guidance-test-loop"
    purpose: "Defines loop mechanics and exit conditions"

  - location: "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
    description: "Self-review protocol and checklist"
    purpose: "Execution guide for self-review validation"

  # Completed remediation plans (reference for expected state)
  - location: "docs/plans/live/260123AE_agenticguidance/completed/"
    description: "Completed remediation plans for all agent categories"
    purpose: "Establishes baseline - agents should PASS after remediation"

# =============================================================================
# AGENT ASSIGNMENTS
# =============================================================================
agent_assignments:
  executor:
    agent: "test-guidance-simulator"
    role: "Executes walkthrough validation for target agents"
    reference: "modules/AgenticGuidance/agents/test/test-guidance-simulator/"
    responsibilities:
      - "Spawn target agents with guidance-only context"
      - "Execute test scenarios defined in guidance-test-scenarios.yml"
      - "Collect friction points and gaps discovered during walkthrough"
      - "Generate structured friction reports"
      - "Iterate with teacher-update-guidance if gaps found"

  auditor:
    agent: "test-audit"
    role: "Validates test quality and methodology"
    reference: "modules/AgenticGuidance/agents/test/test-audit/"
    responsibilities:
      - "Verify walkthrough validations followed correct methodology"
      - "Detect false positives in friction reports"
      - "Validate target agents used ONLY guidance files"
      - "Confirm test scenarios executed as defined"
      - "Spot-check self-review results for leniency"

# =============================================================================
# LOOP STRUCTURES
# =============================================================================
loop_structures:
  - id: "loop_guidance_walkthrough"
    type: "guidance-test-loop"
    applies_to_phase: "All Walkthrough Phases"
    trigger: "Each phase start"
    description: |
      Guidance-test-loop for walkthrough validation. Each task spawns target agent
      with guidance-only context. Agent attempts task completion, reports friction.
      If gaps found, teacher-update-guidance fixes, then re-test.
    exit_criteria:
      success: "All test scenarios pass with zero CRITICAL or HIGH friction points"
      max_iterations: 3
      escalation: "Escalate to human with detailed friction report"
    participants:
      - agent: "test-guidance-simulator"
        role: "Executes walkthrough validation"
      - agent: "teacher-update-guidance"
        role: "Fixes guidance gaps if found"
      - agent: "test-audit"
        role: "Validates test quality"

  - id: "loop_audit_spot_check"
    type: "agent-self-review"
    applies_to_phase: "Audit Phase"
    trigger: "After walkthrough phases complete"
    description: |
      Spot-check validation to verify walkthrough tests were executed correctly.
      Sample agents from each category for deeper validation.
    exit_criteria:
      success: "Spot-check flag rate <30%"
      max_iterations: 2
      escalation: "Re-review all agents with stricter criteria"
    spot_check_sample: 8
    flag_threshold_percent: 30

# =============================================================================
# PHASES AND TASKS
# =============================================================================
