    - "test-results/walkthrough/phase7_audit_report.yml"

# =============================================================================
# OUTPUT DEFINITIONS
# =============================================================================
outputs:
  - name: "walkthrough_results"
    description: "Aggregated walkthrough validation results for all 24 agents"
    format:
      agents_tested: "integer (24)"
      categories_tested: "integer (6)"
      passed: "integer"
      needs_attention: "integer"
      results_by_category:
        orchestration:
          agents: "list"
          friction_summary: "object"
        planner:
          agents: "list"
          friction_summary: "object"
        test:
          agents: "list"
          friction_summary: "object"
        teacher:
          agents: "list"
          friction_summary: "object"
        build:
          agents: "list"
          friction_summary: "object"
        deploy:
          agents: "list"
          friction_summary: "object"

  - name: "friction_report"
    description: "Comprehensive friction analysis across all agents"
    format:
      total_friction_points: "integer"
      by_severity:
        CRITICAL: "integer"
        HIGH: "integer"
        MEDIUM: "integer"
        LOW: "integer"
      systemic_patterns: "list"
      recommended_fixes: "list with priority"

  - name: "audit_report"
    description: "Audit validation and spot-check results"
    format:
      methodology_validated: "boolean"
      false_positives_found: "integer"
      spot_check_flag_rate: "float"
      methodology_improvements: "list"

# =============================================================================
# NOTES
# =============================================================================
notes:
  - "This plan provides comprehensive walkthrough validation for ALL 24 agents"
  - "Building on completed CCI Pattern Validation (plan_live_test_guidance.yml)"
  - "Uses guidance-blind-test strategy - agents receive ONLY guidance files"
  - "Walkthrough tasks use minimal context to enforce guidance self-sufficiency"
  - "Each phase targets a specific agent category for focused validation"
  - "Friction categorization aligns with friction.yml patterns"
  - "self_review_test is executed FIRST for all agents (basic validation before complex scenarios)"
  - "Loop iterations allow for iterative guidance improvement (max 3)"
  - "Agent assignments: test-guidance-simulator (executor), test-audit (auditor)"
  - "Spot-check samples 8 agents across categories for deeper validation"
