          Categorize by severity (CRITICAL, HIGH, MEDIUM, LOW).
          Identify cross-agent patterns and systemic issues.
        status: "pending"
        agent_type: "test-audit"
        operation: "ANALYZE"
        context:
          input_source: "Phases 1-5 walkthrough validation reports"
          categorization_reference: "modules/AgenticGuidance/assets/definitions/friction.yml"
          severity_levels:
