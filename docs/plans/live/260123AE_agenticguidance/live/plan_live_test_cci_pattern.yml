  completed_work:
    - plan: "plan_live_cci_rename_simplification.yml"
      summary: "Renamed JIT to CCI across 22+ agents"
      date: "2026-01-23"
    - plan: "plan_live_agent_selfreview_cci.yml"
      summary: "Added CCI self-review pattern to agents"
      date: "2026-01-23"
    - plan: "plan_completed.yml"
      summary: "Consolidated completion of all CCI guidance updates"
