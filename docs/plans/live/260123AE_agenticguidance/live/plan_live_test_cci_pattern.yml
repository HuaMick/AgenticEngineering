    - path: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
      description: "Context minimisation with CCI preference"
    - path: "docs/CCI_CONTEXT_ARCHITECTURE.md"
      description: "Primary CCI architecture documentation"

# =============================================================================
# PHASES
# =============================================================================
phases:
  # ===========================================================================
  # PHASE 1: CCI BOOTSTRAP Section Validation
  # ===========================================================================
  - phase_id: "1"
    phase_name: "CCI BOOTSTRAP Section Validation"
    status: "pending"
    description: |
      Validate that all 28 agent process files contain properly structured
      CCI BOOTSTRAP sections with correct terminology and command syntax.

    loop_pattern:
      type: "guidance-test-loop"
      participants:
        - "test-guidance-simulator (pattern validator)"
        - "teacher-update-guidance (fixer, if gaps found)"
      exit_conditions:
        - "All agents have valid CCI BOOTSTRAP sections"
        - "Maximum iterations (3) reached - escalate to human"

    tasks:
      # -----------------------------------------------------------------------
      # 1.1: Build Agents CCI BOOTSTRAP Validation
      # -----------------------------------------------------------------------
      - id: "1.1"
        description: "Validate CCI BOOTSTRAP sections in build agents"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_agents:
            - "build-flutter"
            - "build-python"
          validation_checks:
            - check: "CCI_BOOTSTRAP_SECTION_PRESENT"
              description: "Process file contains 'CCI BOOTSTRAP' or 'CCI BOOTSTRAP (CLI Context Injection)' section"
              pattern: "CCI BOOTSTRAP"
            - check: "BOOTSTRAP_COMMAND_SYNTAX"
              description: "Bootstrap command uses correct syntax: agentic context bootstrap --role <agent-name>"
              pattern: "agentic context bootstrap --role"
            - check: "NO_JIT_REFERENCES"
              description: "No 'JIT' or 'Just-In-Time' terminology in active guidance"
              negative_pattern: "JIT|Just-In-Time"
            - check: "INPUTS_REFERENCE"
              description: "CCI bootstrap section references inputs.yml for required inputs"
              pattern: "inputs.yml"
        acceptance_criteria:
          - "Both build agents pass all 4 validation checks"
          - "Bootstrap command syntax is consistent between agents"
        files:
          - "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
          - "modules/AgenticGuidance/agents/build/build-python/process.yml"

      # -----------------------------------------------------------------------
      # 1.2: Deploy Agents CCI BOOTSTRAP Validation
      # -----------------------------------------------------------------------
      - id: "1.2"
        description: "Validate CCI BOOTSTRAP sections in deploy agents"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_agents:
            - "deploy-cicd"
            - "deploy-worktree"
          validation_checks:
            - check: "CCI_BOOTSTRAP_SECTION_PRESENT"
              pattern: "CCI BOOTSTRAP"
            - check: "BOOTSTRAP_COMMAND_SYNTAX"
              pattern: "agentic context bootstrap --role"
            - check: "NO_JIT_REFERENCES"
              negative_pattern: "JIT|Just-In-Time"
            - check: "INPUTS_REFERENCE"
              pattern: "inputs.yml"
        acceptance_criteria:
          - "Both deploy agents pass all 4 validation checks"
        files:
          - "modules/AgenticGuidance/agents/deploy/deploy-cicd/process.yml"
          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml"

      # -----------------------------------------------------------------------
      # 1.3: Orchestration Agents CCI BOOTSTRAP Validation
      # -----------------------------------------------------------------------
      - id: "1.3"
        description: "Validate CCI BOOTSTRAP sections in orchestration agents"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_agents:
            - "orchestration-executor"
            - "orchestration-friction"
            - "orchestration-planning"
          validation_checks:
            - check: "CCI_BOOTSTRAP_SECTION_PRESENT"
              pattern: "CCI BOOTSTRAP|cci_bootstrap"
              note: "Orchestrators may use cci_bootstrap variable naming"
            - check: "BOOTSTRAP_COMMAND_SYNTAX"
              pattern: "agentic context bootstrap --role"
            - check: "NO_JIT_REFERENCES"
              negative_pattern: "JIT|Just-In-Time|jit_bootstrap"
            - check: "INPUTS_REFERENCE"
              pattern: "inputs.yml"
        acceptance_criteria:
          - "All 3 orchestration agents pass validation checks"
          - "cci_bootstrap naming convention consistent (not jit_bootstrap)"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"

      # -----------------------------------------------------------------------
      # 1.4: Planner Agents CCI BOOTSTRAP Validation
      # -----------------------------------------------------------------------
      - id: "1.4"
        description: "Validate CCI BOOTSTRAP sections in planner agents"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_agents:
            - "planner-audit"
            - "planner-build"
            - "planner-cleaning"
            - "planner-guidance"
            - "planner-guidance-testing"
            - "planner-reviewer"
            - "planner-test"
          validation_checks:
            - check: "CCI_BOOTSTRAP_SECTION_PRESENT"
              pattern: "CCI BOOTSTRAP"
            - check: "BOOTSTRAP_COMMAND_SYNTAX"
              pattern: "agentic context bootstrap --role"
            - check: "NO_JIT_REFERENCES"
              negative_pattern: "JIT|Just-In-Time"
            - check: "INPUTS_REFERENCE"
              pattern: "inputs.yml"
        acceptance_criteria:
          - "All 7 planner agents pass all validation checks"
        files:
          - "modules/AgenticGuidance/agents/planner/planner-audit/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance-testing/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-test/process.yml"

      # -----------------------------------------------------------------------
      # 1.5: Teacher Agents CCI BOOTSTRAP Validation
      # -----------------------------------------------------------------------
      - id: "1.5"
        description: "Validate CCI BOOTSTRAP sections in teacher agents"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_agents:
            - "teacher-trace-diagnostics"
            - "teacher-update-assets"
            - "teacher-update-guidance"
          validation_checks:
            - check: "CCI_BOOTSTRAP_SECTION_PRESENT"
              pattern: "CCI BOOTSTRAP"
            - check: "BOOTSTRAP_COMMAND_SYNTAX"
              pattern: "agentic context bootstrap --role"
            - check: "NO_JIT_REFERENCES"
              negative_pattern: "JIT|Just-In-Time"
            - check: "INPUTS_REFERENCE"
              pattern: "inputs.yml"
        acceptance_criteria:
          - "All 3 teacher agents pass all validation checks"
        files:
          - "modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml"
          - "modules/AgenticGuidance/agents/teacher/teacher-update-assets/process.yml"
          - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"

      # -----------------------------------------------------------------------
      # 1.6: Test Agents CCI BOOTSTRAP Validation
      # -----------------------------------------------------------------------
      - id: "1.6"
        description: "Validate CCI BOOTSTRAP sections in test agents"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_agents:
            - "test-audit"
            - "test-builder"
            - "test-final-output"
            - "test-guidance-simulator"
            - "test-runner"
            - "test-service"
            - "test-user-simulator"
          validation_checks:
            - check: "CCI_BOOTSTRAP_SECTION_PRESENT"
              pattern: "CCI BOOTSTRAP"
            - check: "BOOTSTRAP_COMMAND_SYNTAX"
              pattern: "agentic context bootstrap --role"
            - check: "NO_JIT_REFERENCES"
              negative_pattern: "JIT|Just-In-Time"
            - check: "INPUTS_REFERENCE"
              pattern: "inputs.yml"
        acceptance_criteria:
          - "All 7 test agents pass all validation checks"
        files:
          - "modules/AgenticGuidance/agents/test/test-audit/process.yml"
          - "modules/AgenticGuidance/agents/test/test-builder/process.yml"
          - "modules/AgenticGuidance/agents/test/test-final-output/process.yml"
          - "modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml"
          - "modules/AgenticGuidance/agents/test/test-runner/process.yml"
          - "modules/AgenticGuidance/agents/test/test-service/process.yml"
          - "modules/AgenticGuidance/agents/test/test-user-simulator/process.yml"

  # ===========================================================================
  # PHASE 2: CLI Context Command Integration Testing
  # ===========================================================================
  - phase_id: "2"
    phase_name: "CLI Context Command Integration Testing"
    status: "pending"
    description: |
      Validate that CLI context commands referenced in guidance are correctly
      documented and that bootstrap command output is properly parsed.

    tasks:
      # -----------------------------------------------------------------------
      # 2.1: CLI Commands Definition Validation
      # -----------------------------------------------------------------------
      - id: "2.1"
        description: "Validate cli-commands.yml contains all CCI commands"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_file: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
          required_commands:
            - name: "context.bootstrap"
              description: "Full seed context for agent initialization"
              syntax: "agentic context bootstrap --role <role>"
            - name: "context.role"
              description: "Agent role context loading"
              syntax: "agentic context role <role>"
            - name: "context.task"
              description: "Task-specific context"
              syntax: "agentic context task <task-id>"
            - name: "context.inputs"
              description: "Agent inputs definition"
              syntax: "agentic context inputs --role <role>"
        acceptance_criteria:
          - "All 4 context commands are defined in cli-commands.yml"
          - "Command syntax matches guidance references"
          - "Command descriptions are clear and actionable"
        files:
          - "modules/AgenticGuidance/assets/definitions/cli-commands.yml"

      # -----------------------------------------------------------------------
      # 2.2: Bootstrap Command Output Parsing Validation
      # -----------------------------------------------------------------------
      - id: "2.2"
        description: "Validate bootstrap command output structure documentation"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_file: "docs/CCI_CONTEXT_ARCHITECTURE.md"
          expected_output_sections:
            - "File paths for source context exploration"
            - "Next CLI commands to run"
            - "Required inputs from inputs.yml"
            - "Process steps from process.yml"
          parsing_requirements:
            - "Output structure is documented for agent consumption"
            - "File paths are absolute (not relative)"
            - "Command chaining pattern is documented"
        acceptance_criteria:
          - "Bootstrap output structure is fully documented"
          - "File path output pattern is documented"
          - "Command chaining flow is clear"
        files:
          - "docs/CCI_CONTEXT_ARCHITECTURE.md"

      # -----------------------------------------------------------------------
      # 2.3: Agent Self-Review CCI Workflow Validation
      # -----------------------------------------------------------------------
      - id: "2.3"
        description: "Validate agent-self-review.yml CCI workflow documentation"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          target_file: "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
          expected_sections:
            - "6-step CCI workflow"
            - "Bootstrap command usage"
            - "Context loading sequence"
            - "Self-review criteria application"
        acceptance_criteria:
          - "CCI workflow is clearly documented"
          - "Steps are actionable without additional context"
          - "References to inputs.yml and process.yml are correct"
        files:
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"

  # ===========================================================================
  # PHASE 3: JIT Terminology Elimination Verification
  # ===========================================================================
  - phase_id: "3"
    phase_name: "JIT Terminology Elimination Verification"
    status: "pending"
    description: |
      Comprehensive search to verify zero JIT references remain in active
      guidance files. Historical references in completed/ folders are acceptable.

    tasks:
      # -----------------------------------------------------------------------
      # 3.1: Agent Process Files JIT Search
      # -----------------------------------------------------------------------
      - id: "3.1"
        description: "Search all agent process files for JIT references"
        agent_type: "test-guidance-simulator"
        operation: "SEARCH"
        status: "pending"
        context:
          search_scope: "modules/AgenticGuidance/agents/*/*/process.*"
          search_patterns:
            - "JIT"
            - "Just-In-Time"
            - "jit_bootstrap"
            - "JIT CLI"
            - "JIT Context"
          expected_result: "Zero matches"
        acceptance_criteria:
          - "Zero JIT references in any process.yml or process.mmd file"
        files:
          - "modules/AgenticGuidance/agents/"

      # -----------------------------------------------------------------------
      # 3.2: Agent Inputs Files JIT Search
      # -----------------------------------------------------------------------
      - id: "3.2"
        description: "Search all agent inputs files for JIT references"
        agent_type: "test-guidance-simulator"
        operation: "SEARCH"
        status: "pending"
        context:
          search_scope: "modules/AgenticGuidance/agents/*/*/inputs.yml"
          search_patterns:
            - "JIT"
            - "Just-In-Time"
            - "jit_"
          expected_result: "Zero matches"
        acceptance_criteria:
          - "Zero JIT references in any inputs.yml file"
        files:
          - "modules/AgenticGuidance/agents/"

      # -----------------------------------------------------------------------
      # 3.3: Asset Definitions JIT Search
      # -----------------------------------------------------------------------
      - id: "3.3"
        description: "Search asset definitions for JIT references"
        agent_type: "test-guidance-simulator"
        operation: "SEARCH"
        status: "pending"
        context:
          search_scope: "modules/AgenticGuidance/assets/definitions/*.yml"
          search_patterns:
            - "JIT"
            - "Just-In-Time"
          expected_result: "Zero matches"
          exclusions:
            - "Historical references documenting the rename (acceptable)"
        acceptance_criteria:
          - "Zero active JIT references in definitions"
        files:
          - "modules/AgenticGuidance/assets/definitions/"

      # -----------------------------------------------------------------------
      # 3.4: Guidelines JIT Search
      # -----------------------------------------------------------------------
      - id: "3.4"
        description: "Search guidelines for JIT references"
        agent_type: "test-guidance-simulator"
        operation: "SEARCH"
        status: "pending"
        context:
          search_scope: "modules/AgenticGuidance/assets/guidelines/*.yml"
          search_patterns:
            - "JIT"
            - "Just-In-Time"
          expected_result: "Zero matches"
        acceptance_criteria:
          - "Zero JIT references in guidelines"
        files:
          - "modules/AgenticGuidance/assets/guidelines/"

  # ===========================================================================
  # PHASE 4: Bootstrap Command Syntax Consistency
  # ===========================================================================
  - phase_id: "4"
    phase_name: "Bootstrap Command Syntax Consistency"
    status: "pending"
    description: |
      Validate that all bootstrap command references use the standard syntax:
      `agentic context bootstrap --role <agent-name>`

    tasks:
      # -----------------------------------------------------------------------
      # 4.1: Bootstrap Command Syntax Extraction
      # -----------------------------------------------------------------------
      - id: "4.1"
        description: "Extract and validate all bootstrap command references"
        agent_type: "test-guidance-simulator"
        operation: "EXTRACT"
        status: "pending"
        context:
          search_scope: "modules/AgenticGuidance/agents/"
          target_pattern: "agentic.*bootstrap"
          standard_syntax: "agentic context bootstrap --role <agent-name>"
          variant_patterns_to_flag:
            - "agentic --<agent-name>"
            - "agentic <agent-name> --bootstrap"
            - "agentic bootstrap"
        acceptance_criteria:
          - "All bootstrap commands follow standard syntax"
          - "No deprecated command patterns found"
          - "Agent names in commands match folder names"
        files:
          - "modules/AgenticGuidance/agents/"

      # -----------------------------------------------------------------------
      # 4.2: Cross-Reference Agent Names
      # -----------------------------------------------------------------------
      - id: "4.2"
        description: "Validate bootstrap --role values match agent folder names"
        agent_type: "test-guidance-simulator"
        operation: "VALIDATE"
        status: "pending"
        context:
          validation_rule: |
            For each agent at path: modules/AgenticGuidance/agents/{category}/{agent-name}/
            The bootstrap command in process.yml should use: --role {agent-name}
          expected_mappings:
            - folder: "build-flutter" -> role: "build-flutter"
            - folder: "build-python" -> role: "build-python"
            - folder: "planner-build" -> role: "planner-build"
            # ... etc for all 28 agents
        acceptance_criteria:
          - "All --role values match their agent folder names"
          - "No mismatched or misspelled role names"
        files:
          - "modules/AgenticGuidance/agents/"

  # ===========================================================================
  # PHASE 5: Gap Remediation (if needed)
  # ===========================================================================
  - phase_id: "5"
    phase_name: "Gap Remediation"
    status: "pending"
    depends_on: ["1", "2", "3", "4"]
    description: |
      Fix any gaps identified in Phases 1-4. Use teacher-update-guidance to
      correct guidance files and re-test after fixes.

    loop_pattern:
      type: "guidance-test-loop"
      iteration: 2
      participants:
        - "teacher-update-guidance (fixer)"
        - "test-guidance-simulator (validator)"
      exit_conditions:
        - "All identified gaps fixed"
        - "Re-test passes all validation checks"

    tasks:
      # -----------------------------------------------------------------------
      # 5.1: Fix CCI BOOTSTRAP Section Gaps
      # -----------------------------------------------------------------------
      - id: "5.1"
        description: "Fix any agents missing or having incorrect CCI BOOTSTRAP sections"
        agent_type: "teacher-update-guidance"
        operation: "FIX"
        status: "pending"
        condition: "Only execute if Phase 1 identified gaps"
        context:
          gap_types:
            - "Missing CCI BOOTSTRAP section"
            - "Incorrect bootstrap command syntax"
            - "Residual JIT terminology"
            - "Missing inputs.yml reference"
          fix_pattern: |
            For each gap:
            1. Load agent's process.yml (or process.mmd)
            2. Add or correct CCI BOOTSTRAP section
            3. Ensure standard command syntax: agentic context bootstrap --role <agent-name>
            4. Remove any JIT references
            5. Add reference to inputs.yml for required inputs
        acceptance_criteria:
          - "All flagged agents updated"
          - "Re-validation passes for updated agents"
        files:
          - "modules/AgenticGuidance/agents/*/*/process.yml"
          - "modules/AgenticGuidance/agents/*/*/process.mmd"

      # -----------------------------------------------------------------------
      # 5.2: Fix CLI Command Documentation Gaps
      # -----------------------------------------------------------------------
      - id: "5.2"
        description: "Fix any gaps in CLI command documentation"
        agent_type: "teacher-update-guidance"
        operation: "FIX"
        status: "pending"
        condition: "Only execute if Phase 2 identified gaps"
        context:
          target_files:
            - "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
            - "docs/CCI_CONTEXT_ARCHITECTURE.md"
          fix_pattern: |
            1. Add missing command definitions
            2. Correct command syntax documentation
            3. Add bootstrap output structure documentation
            4. Update command chaining examples
        acceptance_criteria:
