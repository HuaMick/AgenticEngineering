# Plan: Agent Self-Review with CCI Pattern
# Objective: Update agent self-review to use CCI (CLI Context Injection) pattern.
#
# Created: 2026-01-23
# Agent: planner-guidance
# Plan Folder: 260123AE_agenticguidance

name: "agent-self-review-cci-pattern"
worktree: "260123AE_agenticguidance"
branch: "main"
status: "completed"
priority: "high"

context: |
  Self-review is a key validation step for agent guidance. Currently, agents
  receive self-review criteria inline or via large markdown files. This plan
  updates self-review GUIDANCE to use the CCI (CLI Context Injection) pattern:

  1. Agents run CLI for initial context: `agentic <agent-name>`
  2. CLI output provides FILE PATHS including self-review criteria paths
  3. Agent reads those files for detailed criteria
  4. CLI provides structured context + file paths for exploration

  The key insight: CLI should provide POINTERS (file paths) not content.
  Agents use Read tool to fetch actual content, keeping CLI output minimal.

  EXISTING ASSETS:
  - modules/AgenticGuidance/assets/definitions/self-review-criteria.yml (EXISTS)
  - modules/AgenticGuidance/assets/guidelines/agent-self-review.yml (EXISTS)
  - modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml (EXISTS)

  SCOPE: GUIDANCE UPDATES ONLY
  - No new CLI commands (--self-review deferred until tmux/embedded sessions)
  - Update guidance to document CCI-based self-review workflow
  - Standard `agentic <agent-name>` output includes paths to self-review criteria
  - Agents read criteria files directly via Read tool

