    severity: "medium"
    status: "ANSWERED"
    answer: "MOOT - No CLI command implementation. Self-review is guidance-only."
    answered_by: "USER"
    context: |
      Decision: No --self-review CLI command will be implemented at this time.
      Deferred until tmux/embedded Claude sessions are available.

      Self-review workflow via guidance:
