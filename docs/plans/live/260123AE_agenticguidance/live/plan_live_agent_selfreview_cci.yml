# =============================================================================
# SELF-REVIEW FILE PATHS (for guidance documentation)
# =============================================================================
# These are the file paths that agents should read for self-review.
# The standard `agentic <agent>` CLI output should reference these paths.
self_review_file_paths:
  description: "File paths agents should read for self-review"

  agent_files:
    description: "Paths to agent guidance files (relative to agent directory)"
    items:
      - "process.yml"
      - "inputs.yml"
      - "outputs.yml (if exists)"
      - "manifest.yml"

  criteria_files:
    description: "Paths to self-review criteria and guidelines"
    items:
      - "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
      - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"

  output_schema_path: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml#output_requirements"

  related_assets:
    description: "Additional relevant files for context"
    items:
      - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
      - "modules/AgenticGuidance/assets/definitions/friction.yml"

  self_review_workflow: |
    1. Run `agentic <agent-name>` for initial context
    2. Read self-review-criteria.yml from the path above
    3. Read agent-self-review.yml for the review protocol
    4. Read your agent's guidance files (process.yml, inputs.yml)
    5. Apply the self-review protocol
    6. Generate output conforming to self-review-criteria.yml#output_requirements
