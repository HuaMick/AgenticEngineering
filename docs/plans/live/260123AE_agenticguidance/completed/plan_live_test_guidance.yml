    - "completed/plan_completed.yml (tasks moved here when done)"

# =============================================================================
# NOTES
# =============================================================================
notes:
  - "This plan validates CCI pattern adoption from the completed rename and self-review plans"
  - "Walkthrough tasks use minimal context to enforce guidance-blind-test strategy"
  - "File-level inputs ensure target agents have exact guidance files to review"
