        agent_type: "test-builder"
        loop: "test-fix-loop"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/commands/agent_help.py"
        target_files:
          - "modules/AgenticCLI/tests/test_agent_bootstrap.py"
        guidance: |
          1. Create test_agent_bootstrap.py with TestIsAgentName class
          2. Test KNOWN_AGENTS list contains expected 26 agents
          3. Test each category has correct agent count
          4. Test is_agent_name() returns True for valid agents
          5. Test is_agent_name() returns False for subcommands
          6. Test is_agent_name() returns False for typos
        success_criteria:
          - "is_agent_name() correctly identifies all 26 agents"
          - "Returns False for non-agent names"
          - "No false positives for subcommands"

