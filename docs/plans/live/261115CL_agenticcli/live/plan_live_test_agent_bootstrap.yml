# Plan: CLI Agent Bootstrap Functionality Test Plan
# Objective: Comprehensive testing of thin-client agent bootstrap pattern
#
# Created: 2026-01-26
# Agent: planner-build
# Plan Folder: 261115CL_agenticcli

name: "cli-agent-bootstrap-test-plan"
worktree: "261115CL_agenticcli"
branch: "main"
status: "pending"
priority: "high"
created_date: "2026-01-26"

context: |
  This test plan validates the CLI agent bootstrap functionality implemented
  in the CCI CLI Implementation plan. The bootstrap system enables thin-client
  agents to retrieve context via CLI commands rather than loading static files.

  KEY COMPONENTS TO TEST:
  1. Thin-client agent bootstrap pattern (.claude/agents/*.md -> CLI -> context)
  2. Positional argument syntax: `agentic <agent-name>`
  3. Agent discovery from AgenticGuidance module (KNOWN_AGENTS list)
  4. Bootstrap context injection (`agentic <agent-name> --bootstrap`)
  5. Agent manifest resolution (manifest.yml, process.yml, inputs.yml)
  6. 27 agent bootstrap file updates in .claude/agents/

  IMPLEMENTATION REFERENCE:
  - Entry point: modules/AgenticCLI/src/agenticcli/entry.py
  - Agent help: modules/AgenticCLI/src/agenticcli/commands/agent_help.py
  - Bootstrap files: .claude/agents/*.md (27 files)

# =============================================================================
# INPUTS
# =============================================================================
inputs:
  # Implementation files
  - location: "modules/AgenticCLI/src/agenticcli/entry.py"
    description: "Entry point handling positional agent names and --bootstrap flag"

  - location: "modules/AgenticCLI/src/agenticcli/commands/agent_help.py"
    description: "Agent help command with KNOWN_AGENTS list, bootstrap context loading"

  - location: "modules/AgenticGuidance/agents/manifest.yml"
    description: "Master agent manifest listing all agents by category"

  # Bootstrap template and files
  - location: ".claude/agents/"
    description: "Thin-client agent bootstrap files (27 total)"

  # Completed implementation plan
  - location: "docs/plans/live/261115CL_agenticcli/completed/plan_completed_cci_cli_implementation.yml"
    description: "Reference plan for what was implemented"

  # Existing test infrastructure
  - location: "modules/AgenticCLI/tests/conftest.py"
    description: "Test fixtures including cli_runner"

  - location: "modules/AgenticCLI/tests/test_cli.py"
    description: "Existing CLI test patterns to follow"

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================
success_criteria:
  - "All 26 agents accessible via positional syntax"
  - "Bootstrap flag provides expanded context for all agents"
  - "JSON output valid and parseable for all commands"
  - "Agent discovery correctly maps agents to categories"
  - "File path resolution works (absolute paths, existence checks)"
  - "Unknown agent errors provide helpful suggestions"
  - "All 27 bootstrap files (.claude/agents/*.md) use correct syntax"
  - "No regressions in existing CLI commands"

