  - location: "modules/AgenticCLI/tests/test_plan.py"
    description: "Existing plan command unit tests"

  - location: "modules/AgenticCLI/tests/test_naming.py"
    description: "Naming algorithm unit tests"

  # Test Infrastructure
  - location: "modules/AgenticCLI/tests/conftest.py"
    description: "Test fixtures (cli_runner, temp_repo, mock_cwd)"

