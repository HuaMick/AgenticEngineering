# ========================================
# CONTEXT
# ========================================
context: |
  Comprehensive test plan for validating CLI plan management commands.
  These commands enable agents to initialize plan folders, track tasks,
  and query plan state without manually parsing YAML files.

  KEY COMMANDS UNDER TEST:
  1. `agentic plan init` - Initialize worktree and plan folder with YYMMDDXX naming
  2. `agentic plan task status` - Show detailed status for a specific task
  3. `agentic plan task update` - Update task status in plan YAML
  4. `agentic plan task current` - Get next actionable task
  5. Plan folder discovery logic - Auto-detect plan from cwd
  6. Worktree integration - Main-First planning patterns

  TEST STRATEGY:
  - Unit: Individual command handlers with mocked filesystem
  - Integration: Full command execution with real git worktrees
  - Edge Cases: Error handling, invalid inputs, boundary conditions

  REFERENCE IMPLEMENTATIONS:
  - plan_completed_folder_creation_automation.yml (plan init spec)
  - plan_completed_cci_cli_implementation.yml (CLI patterns)

# ========================================
# ROOT-LEVEL INPUTS (Pre-gathered Context)
# ========================================
