# ========================================
notes: |
  TEST FILE ORGANIZATION:
  - test_plan_init.py: Plan initialization command tests (existing + new)
  - test_plan.py: General plan command tests (existing)
  - test_plan_task_commands.py: Task subcommand tests (new)
  - test_plan_discovery.py: Plan folder discovery tests (new)
  - test_worktree_integration.py: Main-First worktree tests (new)
  - test_naming.py: Naming algorithm unit tests (existing + new)

  MOCK STRATEGY:
  - Unit tests: Mock filesystem and git operations
  - Integration tests: Use real temp directories and git repos
  - Worktree tests: Create actual worktrees in temp directories

  MAIN-FIRST PLANNING:
  - Plans created in main worktree for visibility
  - Execution happens in feature worktrees
  - Commands from feature worktrees resolve to main plans

  TEST EXECUTION ORDER:
  1. Infrastructure setup (existing tests pass)
  2. Plan init tests (YYMMDDXX naming)
  3. Task command tests (status, update, current)
  4. Discovery and worktree tests
  5. Edge cases and error handling
  6. Final audit and full suite execution
