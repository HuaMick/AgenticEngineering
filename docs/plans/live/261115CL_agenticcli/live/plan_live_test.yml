        guidance: |
          Create comprehensive guide: modules/AgenticCLI/tests/experiments/EXPERIMENT_GUIDE.md

          ```markdown
          # Blind Testing Experiment Guide

          ## Overview

          This experiment tests whether prefilling task lists helps agents
          remember ancillary tasks during planning sessions.

          ## Hypothesis

          **H1**: Agents with prefilled task lists will complete more ancillary
          tasks (MMD diagrams, README updates, success_criteria) than agents
          without prefilled tasks.

          ## Experiment Design

          ### Control Group (Baseline)
          - Run planner-build normally
          - No task prefill
          - Record task completion rates

          ### Treatment Group
          - Run `agentic plan task prefill --preset planner-build` before starting
          - Then run planner-build
          - Record task completion rates

          ### Critical: Blinding
          - Do NOT tell the agent this is an experiment
          - Do NOT mention the task list explicitly
          - Let the agent discover the prefilled tasks naturally

          ## Execution Steps

          ### Baseline Session

          1. Create fresh plan folder:
             ```bash
             agentic plan scaffold 260120CL_baseline_01
             cd docs/plans/live/260120CL_baseline_01
             ```

          2. Create specification.md with test specification (see templates/)

          3. Start planner-build session WITHOUT mentioning tasks:
             ```
             You are planner-build. Create a build plan for the feature
             described in specification.md.
             ```

          4. After completion, fill out baseline_result_template.yml

          ### Treatment Session

          1. Create fresh plan folder:
             ```bash
             agentic plan scaffold 260120CL_treatment_01
             cd docs/plans/live/260120CL_treatment_01
             ```

          2. Run task prefill:
             ```bash
             agentic plan task prefill --preset planner-build
             ```

          3. Create IDENTICAL specification.md

          4. Start planner-build session:
             ```
             You are planner-build. Create a build plan for the feature
             described in specification.md.
             ```

          5. After completion, fill out treatment_result_template.yml

          ## Measurement Criteria

          | Metric | How to Measure |
          |--------|----------------|
          | MMD Generated | Check for process.mmd file |
          | README Updated | Check README.md modification |
          | Success Criteria | Count tasks with success_criteria field |
          | Target Files | Count tasks with target_files field |
          | Guidance | Count tasks with guidance field |

          ## Sample Size

          Minimum: 5 baseline + 5 treatment sessions
          Recommended: 10 baseline + 10 treatment sessions

          ## Analysis

          Run analysis after collecting results:
          ```python
          from test_experiment_analysis import ExperimentAnalyzer

          analyzer = ExperimentAnalyzer(Path("experiment_results/"))
          analyzer.load_results()
          print(analyzer.generate_report())
          ```

          ## Expected Outcomes

          If hypothesis is correct:
          - Treatment MMD rate > Baseline MMD rate by >20%
          - Treatment success_criteria rate > Baseline by >15%
          - Treatment target_files rate > Baseline by >10%

          ## Conclusion Criteria

          | Outcome | Criteria |
          |---------|----------|
          | POSITIVE | Improvement >15% on 2+ metrics with p<0.05 |
          | INCONCLUSIVE | <5 sessions per group |
          | NEGATIVE | No significant improvement |
          ```

        success_criteria:
          - "Complete experiment guide created"
          - "Clear step-by-step instructions"
          - "Measurement criteria defined"
          - "Analysis instructions included"
          - "Success criteria for experiment defined"

