          """Blind Testing - Results Analysis Framework.

          Tools for analyzing and comparing baseline vs treatment results.
          """

          import pytest
          import yaml
          from pathlib import Path
          from dataclasses import dataclass
          from typing import Optional


          @dataclass
          class ExperimentResult:
              """Single experiment session result."""

              experiment_type: str  # "baseline" or "treatment"
              session_id: str
              mmd_generated: bool
              readme_updated: bool
              total_tasks: int
              tasks_with_success_criteria: int
              tasks_with_target_files: int
              tasks_with_guidance: int
              notes: str = ""

              @property
              def success_criteria_rate(self) -> float:
                  return self.tasks_with_success_criteria / self.total_tasks if self.total_tasks else 0

              @property
              def target_files_rate(self) -> float:
                  return self.tasks_with_target_files / self.total_tasks if self.total_tasks else 0


          class ExperimentAnalyzer:
              """Analyze blind testing experiment results."""

              def __init__(self, results_dir: Path):
                  self.results_dir = results_dir
                  self.baseline_results: list[ExperimentResult] = []
                  self.treatment_results: list[ExperimentResult] = []

              def load_results(self):
                  """Load all results from YAML files."""
                  for yaml_file in self.results_dir.glob("*.yml"):
                      content = yaml.safe_load(yaml_file.read_text())
                      if not content:
                          continue

                      result = ExperimentResult(
                          experiment_type=content.get("experiment", "unknown"),
                          session_id=content.get("session_id", "unknown"),
                          mmd_generated=content.get("observations", {}).get("mmd_generated", False),
                          readme_updated=content.get("observations", {}).get("readme_updated", False),
                          total_tasks=content.get("observations", {}).get("total_tasks", 0),
                          tasks_with_success_criteria=content.get("observations", {}).get("tasks_with_success_criteria", 0),
                          tasks_with_target_files=content.get("observations", {}).get("tasks_with_target_files", 0),
                          tasks_with_guidance=content.get("observations", {}).get("tasks_with_guidance", 0),
                          notes=content.get("notes", ""),
                      )

                      if result.experiment_type == "baseline":
                          self.baseline_results.append(result)
                      elif result.experiment_type == "treatment":
                          self.treatment_results.append(result)

              def compare_mmd_generation(self) -> dict:
                  """Compare MMD generation rates."""
                  baseline_rate = sum(1 for r in self.baseline_results if r.mmd_generated) / len(self.baseline_results) if self.baseline_results else 0
                  treatment_rate = sum(1 for r in self.treatment_results if r.mmd_generated) / len(self.treatment_results) if self.treatment_results else 0

                  return {
                      "baseline_rate": baseline_rate,
                      "treatment_rate": treatment_rate,
                      "improvement": treatment_rate - baseline_rate,
                      "baseline_n": len(self.baseline_results),
                      "treatment_n": len(self.treatment_results),
                  }

              def compare_success_criteria(self) -> dict:
                  """Compare success criteria completion rates."""
                  baseline_avg = sum(r.success_criteria_rate for r in self.baseline_results) / len(self.baseline_results) if self.baseline_results else 0
                  treatment_avg = sum(r.success_criteria_rate for r in self.treatment_results) / len(self.treatment_results) if self.treatment_results else 0

                  return {
                      "baseline_avg": baseline_avg,
                      "treatment_avg": treatment_avg,
                      "improvement": treatment_avg - baseline_avg,
                  }

              def generate_report(self) -> str:
                  """Generate human-readable comparison report."""
                  mmd = self.compare_mmd_generation()
                  sc = self.compare_success_criteria()

                  report = f"""
          # Blind Testing Experiment Results

          ## Sample Sizes
          - Baseline sessions: {mmd['baseline_n']}
          - Treatment sessions: {mmd['treatment_n']}

          ## MMD Diagram Generation
          - Baseline rate: {mmd['baseline_rate']:.1%}
          - Treatment rate: {mmd['treatment_rate']:.1%}
          - Improvement: {mmd['improvement']:+.1%}

          ## Success Criteria Completion
          - Baseline avg: {sc['baseline_avg']:.1%}
          - Treatment avg: {sc['treatment_avg']:.1%}
          - Improvement: {sc['improvement']:+.1%}

          ## Conclusion
          {'POSITIVE: Task prefill improves completion rates' if mmd['improvement'] > 0.1 or sc['improvement'] > 0.1 else 'INCONCLUSIVE: More data needed' if mmd['baseline_n'] < 5 else 'NEGATIVE: Task prefill shows no significant improvement'}
          """
                  return report


          class TestExperimentAnalysis:
              """Tests for experiment analysis framework."""

              @pytest.fixture
              def sample_results_dir(self, temp_dir):
                  """Create sample results for testing."""
                  results_dir = temp_dir / "experiment_results"
                  results_dir.mkdir()

                  # Baseline result
                  baseline = {
                      "experiment": "baseline",
                      "session_id": "20260120_1000",
                      "observations": {
                          "mmd_generated": False,
                          "readme_updated": False,
                          "total_tasks": 10,
                          "tasks_with_success_criteria": 6,
                          "tasks_with_target_files": 7,
                          "tasks_with_guidance": 5,
                      },
                      "notes": "Agent forgot MMD diagram",
                  }

                  # Treatment result
                  treatment = {
                      "experiment": "treatment",
                      "session_id": "20260120_1100",
                      "observations": {
                          "mmd_generated": True,
                          "readme_updated": True,
                          "total_tasks": 10,
                          "tasks_with_success_criteria": 9,
                          "tasks_with_target_files": 10,
                          "tasks_with_guidance": 8,
                      },
                      "notes": "Agent completed all prefilled tasks",
                  }

                  with open(results_dir / "baseline_1.yml", "w") as f:
                      yaml.dump(baseline, f)
                  with open(results_dir / "treatment_1.yml", "w") as f:
                      yaml.dump(treatment, f)

                  return results_dir

              def test_load_results(self, sample_results_dir):
                  """Test loading results from directory."""
                  analyzer = ExperimentAnalyzer(sample_results_dir)
                  analyzer.load_results()

                  assert len(analyzer.baseline_results) == 1
                  assert len(analyzer.treatment_results) == 1

              def test_compare_mmd_generation(self, sample_results_dir):
                  """Test MMD comparison calculation."""
                  analyzer = ExperimentAnalyzer(sample_results_dir)
                  analyzer.load_results()

                  comparison = analyzer.compare_mmd_generation()

                  assert comparison["baseline_rate"] == 0.0
                  assert comparison["treatment_rate"] == 1.0
                  assert comparison["improvement"] == 1.0

              def test_generate_report(self, sample_results_dir):
                  """Test report generation."""
                  analyzer = ExperimentAnalyzer(sample_results_dir)
