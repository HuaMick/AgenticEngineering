          3. Verify JSON contains 'error' field when applicable
        success_criteria:
          - "Error cases return valid JSON"
          - "Error field present in error responses"

  # ---------------------------------------------------------------------------
  # PHASE 8: Integration Tests
  # ---------------------------------------------------------------------------
  - name: "Integration Tests"
    id: "phase_08"
    execution: sequential
    description: "End-to-end integration tests for context commands"
    tasks:

      - id: "08.1"
        name: "Test bootstrap then task consistency"
        description: |
          Verify bootstrap and task commands return consistent data.
        status: "pending"
        agent: "test-builder"
        loop: "test-fix-loop"
        target_files:
          - "modules/AgenticCLI/tests/test_context_commands.py"
        guidance: |
          Add/verify test case: test_bootstrap_then_task_consistent

          1. Run: agentic context bootstrap -j
          2. Run: agentic context task -j
          3. Verify bootstrap's current_task matches task output
          4. Verify plan_folder is same in both
        success_criteria:
          - "current_task in bootstrap matches task output"
          - "plan_folder consistent across commands"

      - id: "08.2"
        name: "Test full agent bootstrap flow"
        description: |
          Simulate complete agent bootstrap sequence.
        status: "pending"
        agent: "test-runner"
        loop: "test-fix-loop"
        target_files:
          - "modules/AgenticCLI/tests/integration/test_context_flow.py"
        guidance: |
          Create integration test file: test_context_flow.py

          Test sequence:
          1. agentic context bootstrap --role planner-build -j
          2. Parse JSON, extract current_task
          3. agentic plan task current -j
          4. Verify task IDs match
          5. agentic context role planner-build -j
          6. Verify process content available
          7. agentic context inputs --role planner-build -j
          8. Verify inputs resolved
        success_criteria:
          - "Full bootstrap flow completes without error"
          - "All data is consistent across commands"

      - id: "08.3"
        name: "Test CLI commands referenced in bootstrap"
        description: |
          Verify CLI commands in bootstrap output are valid and work.
        status: "pending"
        agent: "test-runner"
        loop: "test-fix-loop"
        guidance: |
          1. Run: agentic context bootstrap -j
          2. Extract cli_commands field
          3. Execute each command (with --help to verify syntax)
          4. Verify all commands exist and are valid
        success_criteria:
          - "All cli_commands references are valid CLI commands"
          - "Commands execute without error"

  # ---------------------------------------------------------------------------
  # PHASE 9: Test Execution and Validation
  # ---------------------------------------------------------------------------
  - name: "Test Execution and Validation"
    id: "phase_09"
    execution: sequential
    description: "Run all tests and validate coverage"
    tasks:

      - id: "09.1"
        name: "Run full test suite"
        description: |
          Execute all context command tests and verify pass rate.
        status: "pending"
        agent: "test-runner"
        loop: "test-fix-loop"
        guidance: |
          1. Run: `uv run pytest tests/test_context_commands.py -v --tb=short`
          2. Document pass/fail for each test
          3. Run: `uv run pytest tests/integration/test_context_flow.py -v` (if created)
          4. Calculate pass rate
        success_criteria:
          - "All tests pass (100% pass rate)"
          - "No flaky tests"

      - id: "09.2"
        name: "Generate test coverage report"
        description: |
          Generate coverage report for context commands.
        status: "pending"
        agent: "test-runner"
        loop: "test-fix-loop"
        guidance: |
          1. Run: `uv run pytest tests/test_context_commands.py --cov=agenticcli.commands.context --cov-report=term-missing`
          2. Document coverage percentage
          3. Identify uncovered lines
        success_criteria:
          - "Coverage >= 80% for context.py"
          - "Critical paths covered"

      - id: "09.3"
        name: "Final validation and documentation"
        description: |
          Document test results and any issues discovered.
        status: "pending"
        agent: "test-runner"
        loop: "test-fix-loop"
        target_files:
          - "docs/plans/live/261115CL_agenticcli/audit/test_context_commands_results.yml"
        guidance: |
          Create audit file documenting:
          1. Total tests: count
          2. Passed: count
          3. Failed: count (with reasons)
          4. Coverage: percentage
          5. Issues discovered
          6. Recommendations
        success_criteria:
          - "Audit file created with complete results"
          - "All issues documented"

# =============================================================================
# TEST EXECUTION COMMANDS
# =============================================================================
test_commands:
  run_all: "cd modules/AgenticCLI && uv run pytest tests/test_context_commands.py -v"
  run_with_coverage: "cd modules/AgenticCLI && uv run pytest tests/test_context_commands.py --cov=agenticcli.commands.context --cov-report=term-missing"
  run_single_class: "cd modules/AgenticCLI && uv run pytest tests/test_context_commands.py::TestContextBootstrap -v"
  run_integration: "cd modules/AgenticCLI && uv run pytest tests/integration/ -v"

# =============================================================================
# AGENT ASSIGNMENTS
# =============================================================================
agent_assignments:
  test-runner:
    phases: ["phase_01", "phase_09"]
    responsibilities:
      - "Execute tests and verify results"
      - "Generate coverage reports"
      - "Document test outcomes"

  test-builder:
    phases: ["phase_02", "phase_03", "phase_04", "phase_05", "phase_06", "phase_07", "phase_08"]
    responsibilities:
      - "Write new test cases"
      - "Update existing test file"
      - "Create integration test files"

