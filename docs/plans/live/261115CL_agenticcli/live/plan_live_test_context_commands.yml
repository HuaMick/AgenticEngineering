# =============================================================================
# OBJECTIVE
# =============================================================================
objective: |
  Comprehensive testing of CLI context commands to validate JIT (Just-In-Time)
  Pull-based context architecture. These commands are critical for agents to
  self-initialize via CLI instead of loading large static markdown files.

# =============================================================================
# CONTEXT
# =============================================================================
context: |
  This test plan validates the CLI context commands implemented as part of the
  JIT Context Entrypoints initiative. The commands enable agents to fetch exactly
  what they need via CLI, replacing the Push model of pre-loading large static files.

  COMMANDS UNDER TEST:
  1. `agentic context bootstrap` - Primary Seed Context entrypoint
  2. `agentic context role <role-id>` - Role-specific process/guidelines
  3. `agentic context task` - Active task from Main-First plan
  4. `agentic context inputs` - JIT manifest of relevant project files

  KEY FEATURES TO VALIDATE:
  - JSON output format (-j flag) for machine-readable output
  - Main-First plan resolution from feature worktrees
  - Human-readable output formatting (Rich panels/tables)
  - Error handling for missing plans, invalid roles, etc.

  EXISTING TEST COVERAGE:
  - modules/AgenticCLI/tests/test_context_commands.py (14 tests)
  - modules/AgenticCLI/tests/test_task_list_commands.py (16 tests)

  GAPS TO ADDRESS:
  - Edge case coverage for Main-First resolution
  - Worktree-specific testing scenarios
  - Error message validation
  - Integration with plan task commands

