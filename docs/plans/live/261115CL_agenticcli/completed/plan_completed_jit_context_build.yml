          - "modules/AgenticGuidance/agents/test/test-runner/manifest.yml"
          - "modules/AgenticGuidance/agents/test/test-builder/manifest.yml"
          - "modules/AgenticGuidance/agents/test/test-audit/manifest.yml"
        target_files:
          - ".claude/agents/test-runner.md"
          - ".claude/agents/test-builder.md"
          - ".claude/agents/test-audit.md"
