# ========================================
# NOTES
# ========================================
notes: |
  SEPARATION OF CONCERNS:
  - PLANNER AGENTS own plan management (creating phases, defining tasks, determining sequence)
  - CLI provides TOOLS for other agents to:
    - READ context (objective, guidance, inputs) without loading full files
    - UPDATE task status in existing plans without holding plan in context

  When an agent bootstraps:
  1. `agentic context bootstrap` returns objective + role guidance
  2. `agentic plan task current` returns the next task to work on
  3. Agent completes task
  4. `agentic plan task update <id> --status completed` persists progress
  5. Repeat until all tasks done

  The CLI serves as a persistence layer / external memory. The plan content
  (tasks, phases, guidance) is created by planner agents. The CLI just provides
  read/write access to that content.

  TOKEN REDUCTION:
  The 50% token reduction metric has been removed from success criteria per user request.
  Focus is on functional correctness and workflow improvement.
