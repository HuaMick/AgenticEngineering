# ========================================
# OBJECTIVE
# ========================================
objective: |
  Integrate the JIT (Just-In-Time) Context Entrypoints work from the 260114CL_context_entrypoints
  planning folder into AgenticCLI. This implements a Pull-based context architecture where agents
  fetch exactly what they need via CLI commands, replacing the Push model (pre-loading large
  static markdown files).

# ========================================
# CONTEXT
# ========================================
context: |
  This plan consolidates the JIT Context Entrypoints work into the AgenticCLI planning folder.
  The work implements:

  1. CLI CONTEXT COMMANDS: New command group for JIT context retrieval
     - `agentic context bootstrap` - Primary Seed Context entrypoint
     - `agentic context role <role-id>` - Role-specific process/guidelines
     - `agentic context task` - Active task from Main-First plan
     - `agentic context inputs` - JIT manifest of relevant files

  2. CLI PLAN TOOLS: Extensions to existing plan commands
     - `agentic plan task status` - Show task status from active plan
     - `agentic plan task update <id> --status <status>` - Update task status
     - `agentic plan task current` - Get next actionable task

  3. MAIN-FIRST PLAN RESOLUTION: CLI resolves plans from main worktree
     - Feature worktree agents can find their plan in main worktree
     - Branch-based matching to planning folders

  4. THIN-CLIENT AGENT MIGRATION: Minimal bootstrap instructions
     - Agents use CLI to retrieve context instead of static markdown
     - Target: under 500 tokens per agent file

  SEPARATION OF CONCERNS:
  - PLANNER AGENTS own plan management (creating plans, phases, task breakdown)
  - CLI provides TOOLS for agents to READ context and UPDATE task status
  - The CLI is a persistence layer / external memory, NOT a planning engine

