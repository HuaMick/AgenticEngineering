        guidance: |
          SIMULATION STEPS:
          1. Get current task: `agentic plan task current -j`
          2. Note task ID from output
          3. "Complete" the task (simulate work)
          4. Update status: `agentic plan task update <id> --status completed`
          5. Verify update succeeded
          6. Get next task: `agentic plan task current -j`
          7. Verify different task returned (or completion message)

          VALIDATION:
          - Task status persists to plan file
          - Plan YAML remains valid after update
          - Next task correctly identified

          CAUTION:
          - Use test plan file to avoid modifying real plans
          - Or restore original status after test
        success_criteria:
          - "Task update persists to file"
          - "Next task correctly returned"
          - "Plan file remains valid YAML"

      - id: "04.3"
        name: "Test subagent invocation with JIT context"
        description: |
          Verify a subagent can be invoked with minimal bootstrap
          and successfully retrieve its context via CLI.
        status: "pending"
        agent_type: "test-user-simulator"
        loop: "user-story-validation-loop"
        strategy: "simulator"
        inputs:
          - ".claude/agents/"
        guidance: |
          SCENARIO: Orchestration agent spawns build subagent

          SIMULATION STEPS:
          1. Load orchestration context (minimal)
          2. Orchestration identifies need for build subagent
          3. Subagent starts with thin-client file only
          4. Subagent runs bootstrap: `agentic context bootstrap --role build-python -j`
          5. Subagent receives build-specific context
          6. Subagent completes assigned task
          7. Subagent updates status via CLI

          KEY VALIDATION:
          - Subagent context is role-specific
          - Subagent can access plan from orchestration's session
          - Updates from subagent visible to orchestration
        success_criteria:
          - "Subagent bootstraps independently"
          - "Subagent receives correct role context"
          - "Updates propagate correctly"

