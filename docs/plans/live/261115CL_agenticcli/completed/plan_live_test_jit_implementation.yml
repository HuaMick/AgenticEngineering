        name: "Test policy update propagation"
        description: |
          Verify that policy updates in guidance files are immediately
          reflected in context command output.
        status: "pending"
        agent_type: "test-runner"
        loop: "test-fix-loop"
        inputs:
          - "modules/AgenticGuidance/agents/"
        guidance: |
          VALIDATION STEPS:
          1. Run `agentic context role planner-build` and note output
          2. Temporarily modify process.yml (add marker text)
          3. Immediately run `agentic context role planner-build` again
          4. Verify marker text appears in output (no cache)
          5. Revert process.yml change

          SUCCESS CRITERIA:
          - Changes appear immediately (no stale cache)
          - No restart or cache invalidation needed
          - Works across all context commands

          CLEANUP:
          - MUST revert any test changes to process.yml
        success_criteria:
          - "Policy updates appear immediately"
          - "No caching issues detected"

  # ----------------------------------------
  # PHASE 5: Regression Testing
  # ----------------------------------------
  - name: "Regression Testing"
    id: "phase_05"
    execution: sequential
    description: |
      Verify that JIT Context Entrypoints implementation does not
      break existing CLI functionality.
    tasks:

      - id: "05.1"
        name: "Test existing plan commands still work"
        description: |
          Verify existing `agentic plan` commands (before task subgroup)
          continue to function correctly.
        status: "pending"
        agent_type: "test-runner"
        loop: "test-fix-loop"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        guidance: |
          VALIDATION STEPS:
          1. Run `agentic plan --help` and verify help shows
          2. Test existing plan subcommands:
             - `agentic plan list` (if exists)
             - `agentic plan show` (if exists)
             - Any other pre-existing subcommands
          3. Verify no changes in behavior from before

          REGRESSION CHECK:
          - Compare current help output with expected
          - Verify no commands were accidentally removed
          - Verify no argument changes broke compatibility
        success_criteria:
          - "All pre-existing plan commands work"
          - "No behavioral changes detected"

      - id: "05.2"
        name: "Test existing worktree commands still work"
        description: |
          Verify `agentic worktree` commands used by Main-First
          resolution continue to function correctly.
        status: "pending"
        agent_type: "test-runner"
        loop: "test-fix-loop"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/commands/worktree.py"
        guidance: |
          VALIDATION STEPS:
          1. Run `agentic worktree --help`
          2. Run `agentic worktree status` and verify output
          3. Run `agentic worktree list` (if exists)
          4. Verify Main-First resolution uses these correctly

          CROSS-CHECK:
          - context_workflow.py should use worktree commands
          - No duplicate implementations
        success_criteria:
          - "Worktree commands function correctly"
          - "Status output is accurate"

      - id: "05.3"
        name: "Test CLI global options still work"
        description: |
          Verify global CLI options (--verbose, --json, etc.) work
          correctly with new context commands.
        status: "pending"
        agent_type: "test-runner"
        loop: "test-fix-loop"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/cli.py"
        guidance: |
          VALIDATION STEPS:
          1. Test --verbose flag with context commands
          2. Test --json flag at CLI level (if different from -j)
          3. Test --help at various command levels
          4. Test --version

          COMBINATIONS TO TEST:
          - `agentic --verbose context bootstrap`
          - `agentic context bootstrap --help`
          - `agentic --version`
        success_criteria:
          - "Global options work with new commands"
          - "No flag conflicts detected"

      - id: "05.4"
        name: "Test error handling consistency"
        description: |
          Verify error messages and exit codes are consistent with
          existing CLI error handling patterns.
        status: "pending"
        agent_type: "test-runner"
        loop: "test-fix-loop"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/cli.py"
        guidance: |
          VALIDATION STEPS:
          1. Test error scenarios for new commands:
             - Invalid role: `agentic context role invalid-role`
             - No plan found: (test in branch with no plan)
             - Invalid task ID: `agentic plan task update invalid-id --status completed`
          2. Verify error message format matches existing patterns
          3. Verify exit codes are appropriate (non-zero for errors)
          4. Verify no stack traces in normal error cases

          ERROR PATTERN CHECK:
          - Errors should use Rich console formatting
          - Exit codes should be consistent
          - Error messages should be actionable
        success_criteria:
          - "Error messages are consistent"
          - "Exit codes are appropriate"
          - "No unhandled exceptions"

  # ----------------------------------------
  # PHASE 6: Gap Analysis and Follow-up Planning
  # ----------------------------------------
  - name: "Gap Analysis and Follow-up Planning"
    id: "phase_06"
    execution: sequential
    description: |
      CRITICAL PHASE: Analyze test results to identify gaps and trigger
      remediation planning if needed.

      GAP CRITERIA:
      - Missing functionality: Feature specified but not implemented
      - Failed tests: Tests that cannot pass due to implementation issues
      - Edge cases: Scenarios not covered by current implementation
      - UX issues: Commands work but are confusing or error-prone

      REMEDIATION TRIGGER:
      If ANY gaps are identified, create plan_live_jit_remediation.yml
      following the same structure as this test plan.
    tasks:

      - id: "06.1"
        name: "Compile test results summary"
        description: |
          Aggregate results from all previous phases into a structured
          test results document.
        status: "pending"
        agent_type: "test-audit"
        loop: "audit-test-fix-loop"
        inputs:
          - "This plan (all previous phases)"
        target_files:
          - "docs/plans/live/261115CL_agenticcli/audit/jit_implementation_test_results.yml"
        guidance: |
          COMPILATION STEPS:
          1. Review all tasks from phases 1-5
          2. Document for each task:
             - Status: passed / failed / blocked / skipped
             - Issues found (if any)
             - Evidence (command outputs, error messages)
          3. Create summary statistics:
             - Total tests: N
             - Passed: N
             - Failed: N
             - Blocked: N
             - Skipped: N
          4. Categorize failures:
             - Implementation bugs
             - Test environment issues
             - Specification ambiguity
             - Edge case not handled

          OUTPUT FORMAT:
          Create jit_implementation_test_results.yml with structured results.
        success_criteria:
          - "All test results documented"
          - "Results categorized by type"
          - "Summary statistics accurate"

      - id: "06.2"
        name: "Identify implementation gaps"
        description: |
          Analyze test failures and edge cases to identify gaps
          in the implementation.
        status: "pending"
        agent_type: "test-audit"
        loop: "audit-test-fix-loop"
        inputs:
          - "docs/plans/live/261115CL_agenticcli/audit/jit_implementation_test_results.yml"
          - "docs/plans/live/261115CL_agenticcli/specification.md"
        target_files:
          - "docs/plans/live/261115CL_agenticcli/audit/jit_gap_analysis.yml"
        guidance: |
          GAP IDENTIFICATION CRITERIA:

          1. MISSING FUNCTIONALITY:
             - Feature in specification not implemented
             - Command exists but missing expected flag/option
             - Output missing required field

          2. FAILED TESTS:
             - Test fails due to implementation bug
             - Test fails due to incorrect behavior
             - Test blocked by missing prerequisite

          3. EDGE CASES:
             - Scenario works but with unexpected behavior
             - Error handling missing for valid error case
             - Race condition or timing issue identified

          4. UX ISSUES:
             - Command works but output is confusing
             - Error message not actionable
             - Help text misleading or incomplete

          DOCUMENTATION:
          For each gap, document:
          - Gap ID (GAP-001, GAP-002, etc.)
          - Category (missing/failed/edge/ux)
          - Description
          - Test that exposed the gap
          - Severity (critical/high/medium/low)
          - Suggested remediation
        success_criteria:
          - "All gaps identified and categorized"
          - "Severity assigned to each gap"
          - "Remediation suggestions provided"

      - id: "06.3"
        name: "Create remediation plan if gaps found"
        description: |
          IF gaps are identified in the previous task, create a
          remediation plan to address them.
        status: "pending"
        agent_type: "planner-build"
        loop: "planning-loop"
        inputs:
          - "docs/plans/live/261115CL_agenticcli/audit/jit_gap_analysis.yml"
          - "docs/plans/live/261115CL_agenticcli/live/plan_live_build.yml"
        target_files:
          - "docs/plans/live/261115CL_agenticcli/live/plan_live_jit_remediation.yml"
        guidance: |
          REMEDIATION PLAN CREATION:

          TRIGGER CONDITION:
          Create plan_live_jit_remediation.yml ONLY IF:
          - Any critical or high severity gaps identified
          - Any missing functionality gaps identified
          - Any failed tests that indicate implementation bugs

          IF NO GAPS:
          - Document "No remediation needed" in audit folder
          - Mark this task as completed with note "No gaps found"

          IF GAPS FOUND:
          1. Create plan_live_jit_remediation.yml
          2. Follow same structure as plan_live_build.yml:
             - Root metadata (name, status, priority)
             - Context (reference gap analysis)
             - Inputs (gap analysis + original specs)
             - Phases organized by gap category
             - Tasks for each gap remediation

          REMEDIATION PLAN STRUCTURE:
          - Phase 1: Critical gap fixes
          - Phase 2: High priority fixes
          - Phase 3: Medium priority fixes
          - Phase 4: Low priority / UX improvements
          - Phase 5: Re-test remediated items

          TASK REQUIREMENTS FOR EACH GAP:
          - Reference gap ID (GAP-001, etc.)
          - Clear success criteria
          - Test to verify fix
        success_criteria:
          - "Remediation plan created if gaps found"
          - "Plan follows standard structure"
          - "All gaps have remediation tasks"
          - "OR: 'No gaps' documented if none found"

      - id: "06.4"
        name: "Update coordination doc with test status"
        description: |
          Update the JIT Context Entrypoints coordination document
          with test completion status and any follow-up actions.
        status: "pending"
        agent_type: "planner-build"
        loop: "planning-loop"
        inputs:
          - "docs/plans/live/261115CL_agenticcli/audit/jit_implementation_test_results.yml"
          - "docs/plans/live/261115CL_agenticcli/live/plan_live_jit_context_entrypoints.yml"
        target_files:
          - "docs/plans/live/261115CL_agenticcli/live/plan_live_jit_context_entrypoints.yml"
        guidance: |
          UPDATE COORDINATION DOC:
          1. Add test_status section:
             test_status:
               implementation_test_plan: "plan_live_test_jit_implementation.yml"
               execution_date: "YYYY-MM-DD"
               status: "passed" | "failed" | "partial"
               summary: "Brief summary of results"
               gaps_found: true | false
               remediation_plan: "plan_live_jit_remediation.yml" | null

          2. Update overall status if needed

          3. Add next_steps if remediation required
        success_criteria:
          - "Coordination doc updated with test status"
          - "Status accurately reflects test results"
          - "Follow-up actions documented"

# ========================================
# NOTES
# ========================================
notes: |
  TEST PLAN PHILOSOPHY:
  This is an IMPLEMENTATION VERIFICATION plan, distinct from the general
  test plan (plan_live_test.yml). While the general test plan covers unit
  tests, integration tests, and UAT, this plan focuses on:

  1. Verifying built features match specification
  2. End-to-end validation of user workflows
  3. Gap detection and remediation planning

  GAP ANALYSIS IMPORTANCE:
  Phase 6 is CRITICAL. Any gaps identified MUST trigger creation of
  a remediation plan. This ensures:
  - No gaps are lost or forgotten
  - Remediation follows the same structured approach
  - Progress is trackable across iterations

  RELATIONSHIP TO OTHER PLANS:
  - plan_live_build.yml: What we're testing
  - plan_live_test.yml: Detailed test cases (unit/integration/UAT)
  - plan_live_jit_context_entrypoints.yml: Coordination doc
  - plan_live_jit_remediation.yml: Created IF gaps found (Phase 6)

  EXECUTION ORDER:
  This plan should be executed AFTER build implementation is complete
  (or after significant milestones). It is NOT a substitute for the
  general test plan, which should run during development.

  AUDIT TRAIL:
  All test results and gap analysis go to the audit/ folder:
  - audit/jit_implementation_test_results.yml
  - audit/jit_gap_analysis.yml
