        status: "pending"
        agent_type: "test-user-simulator"
        loop: "user-story-validation-loop"
        strategy: "simulator"
        inputs:
          - ".claude/agents/"
          - "modules/AgenticGuidance/assets/templates/bootstrap-agent-template.md"
        guidance: |
          USER STORY: As a thin-client agent, I need to bootstrap my context
          using only CLI commands so I can start working with minimal tokens.

          SIMULATION STEPS:
          1. Start with ONLY the thin-client .md file (under 500 tokens)
          2. Agent executes: `agentic context bootstrap --role <role> -j`
          3. Agent parses JSON output for objective and process
          4. Agent executes: `agentic plan task current -j`
          5. Agent receives current task with guidance
          6. Verify all steps complete without errors

          SUCCESS INDICATORS:
          - Agent has objective after bootstrap
          - Agent has task to work on
          - Agent has guidance for completing task
          - Total context loaded is minimal
        success_criteria:
          - "Bootstrap flow completes without errors"
          - "Agent receives complete working context"
          - "All CLI commands execute successfully"

