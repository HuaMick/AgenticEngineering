        target_files:
          - "docs/plans/live/260114CL_context_entrypoints/audit/uat_main_first.yml"
        guidance: |
          USER STORY: As an agent working in a feature worktree, I want my
          context commands to find my plan in the main worktree so that I
          can track my progress correctly.

          ACCEPTANCE CRITERIA:
          1. Agent is invoked in a feature worktree (not main)
          2. `agentic context bootstrap` finds plan in main worktree
          3. Objective matches the feature branch being worked on
          4. Task list reflects correct plan from main worktree
          5. Task updates persist to main worktree plan file

          VALIDATION STEPS:
          1. Create or use existing feature worktree
          2. Run `agentic context bootstrap` from feature worktree
          3. Verify objective is from main worktree plan
          4. Run `agentic plan task status` and verify tasks shown
          5. Document resolution path for debugging
        success_criteria:
          - "Context commands work from feature worktree"
          - "Plan correctly resolved from main worktree"
          - "No errors when plan folder matches branch"
          - "Updates persist to correct location"

      - id: "05.3"
