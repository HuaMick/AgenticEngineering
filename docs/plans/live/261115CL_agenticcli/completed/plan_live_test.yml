        name: "UAT: Thin-client agent bootstrap journey"
        description: |
          Validate that an agent using the thin-client model can successfully
          bootstrap, retrieve context, and complete a task using CLI commands.
        status: "pending"
        agent_type: "test-user-simulator"
        loop: "user-story-validation-loop"
        strategy: "simulator"
        inputs:
          - ".claude/agents/planner-build.md"
