          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        target_files:
          - "docs/plans/live/260114CL_context_entrypoints/audit/uat_bootstrap_journey.yml"
        guidance: |
          USER STORY: As an AI agent, I want to bootstrap my context via CLI
          so that I can work with minimal initial token usage.

          ACCEPTANCE CRITERIA:
          1. Agent reads thin-client .md file (under 500 tokens)
          2. Agent runs `agentic context bootstrap --role planner-build -j`
          3. Agent receives objective, process, and essential inputs
          4. Agent runs `agentic plan task current` to get next task
          5. Agent can work on the task with retrieved context
          6. Agent runs `agentic plan task update <id> --status completed`
          7. Agent can repeat cycle for next task

          VALIDATION STEPS:
          1. Invoke planner-build agent with thin-client file
          2. Observe: Does agent run bootstrap commands?
          3. Observe: Does agent successfully parse JSON output?
          4. Observe: Does agent retrieve correct task?
          5. Observe: Does agent complete task update cycle?
          6. Document any friction points or failures
        success_criteria:
