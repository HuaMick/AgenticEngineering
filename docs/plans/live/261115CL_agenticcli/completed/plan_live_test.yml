        description: |
          Validate that policy updates in CLI are immediately respected
          by agents in all worktrees (zero stale guidance).
        status: "pending"
        agent_type: "test-user-simulator"
        loop: "user-story-validation-loop"
        strategy: "simulator"
        inputs:
