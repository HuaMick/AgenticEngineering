          - "modules/AgenticCLI/src/agenticcli/commands/context.py"
        target_files:
          - "docs/plans/live/260114CL_context_entrypoints/audit/uat_policy_propagation.yml"
        guidance: |
          USER STORY: As a developer, I want policy updates to be immediately
          reflected in agent context so that I don't have stale guidance.

          ACCEPTANCE CRITERIA:
          1. Modify a process.yml or inputs.yml file
          2. Run `agentic context role <role>` and verify new content
          3. No cache invalidation required
          4. Change visible immediately across all sessions

          VALIDATION STEPS:
          1. Note current content of a process.yml field
          2. Modify the field (add a test marker)
          3. Run `agentic context role <role>` immediately
          4. Verify new content appears
          5. Revert the change after test
        success_criteria:
          - "Policy updates appear immediately"
          - "No stale guidance in context responses"
          - "Works across multiple worktrees"

