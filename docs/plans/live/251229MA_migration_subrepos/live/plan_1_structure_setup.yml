# Plan 1: Structure & Git Setup (Migration to Nested Sub-repositories)
# Created: 2025-12-29
# Status: completed

objective: |
  Establish the physical directory structure and git repository nesting for the MyAgents "parent" repository.
  This phase focuses on consolidation and movement without breaking logic (yet).

phases:
  - phase: 1
    name: "Root Consolidation"
    status: completed
    tasks:
      - id: MIG-STR-001
        status: completed
        severity: HIGH
        category: infrastructure
        description: |
          Move root-level files from the legacy `/home/code/myagents/` into the `MyAgents/` target root.
          Includes: Makefile, pyproject.toml, docker-compose.yml, cloudbuild.yaml.
        acceptance_criteria:
          - Files exist in `MyAgents/`
          - Original files removed or backed up

      - id: MIG-STR-002
        status: completed
        severity: HIGH
        category: security
        description: |
          Relocate the `secrets/` folder into `MyAgents/` and ensure it is git-ignored.
        acceptance_criteria:
          - `MyAgents/secrets/` contains the service account key
          - `MyAgents/.gitignore` contains `secrets/`

  - phase: 2
    name: "Repository Nesting"
    status: completed
    tasks:
      - id: MIG-STR-003
        status: completed
        severity: HIGH
        category: git_structure
        description: |
          Create the `projects/` directory and add the independent modules as nested repositories.
        modules:
          - Agent-GCPtoolkit
          - MyAgentsBackend
          - MyAgentsGuidance
          - RemoteAgents
        acceptance_criteria:
          - `MyAgents/projects/` directory created
          - Each module is present inside `projects/` as a functional git repository (e.g. via `git submodule add` or `mv`)
          - `MyAgents` tracks these sub-repositories

notes:
  - "Focus purely on filesystem and git state."
  - "Do not attempt to run or build services until Plan 2."
  - "Ensure .gitignore is updated before moving secrets."


