                guidance: |
                  Task: Create TieredConfigLoader in config_workflow.py

                  IMPLEMENTATION STEPS:

                  1. Create ConfigSource enum in config_workflow.py:
                     ```python
                     from enum import Enum

                     class ConfigSource(Enum):
                         DEFAULT = "default"
                         GLOBAL = "global"      # ~/.config/agenticcli/config.yml
                         PROJECT = "project"    # .agenticcli.yml in project root
                         ENV = "environment"    # AGENTIC_* environment variables
                         CLI = "cli"            # Command-line flags
                     ```

                  2. Create TieredConfigLoader dataclass:
                     ```python
                     @dataclass
                     class ConfigValue:
                         """A configuration value with its source."""
                         value: Any
                         source: ConfigSource
                         path: Optional[str] = None  # File path if file-based

                     @dataclass
                     class TieredConfigLoader:
                         """Multi-layer configuration loader implementing the onion model.

                         Layer precedence (highest to lowest):
                         1. CLI flags (--config-key=value)
                         2. Environment variables (AGENTIC_*)
                         3. Project config (.agenticcli.yml)
                         4. Global config (~/.config/agenticcli/config.yml)
                         5. Defaults (hardcoded)
                         """
                         global_config_path: Optional[Path] = None
                         project_config_path: Optional[Path] = None
                         cli_overrides: dict = field(default_factory=dict)

                         def load(self) -> dict:
                             """Load merged configuration from all layers."""
                             ...

                         def get(self, key: str) -> ConfigValue:
                             """Get a specific config value with source attribution."""
                             ...

                         def get_merged_with_sources(self) -> dict:
                             """Get full config with source attribution for each value."""
                             ...
                     ```

                  3. Implement layer loading methods:
                     - _load_defaults() -> dict: Return hardcoded defaults
                     - _load_global() -> dict: Load from global_config_path if exists
                     - _load_project() -> dict: Load from project_config_path if exists
                     - _load_env() -> dict: Parse AGENTIC_* environment variables
                       - AGENTIC_DEFAULTS_BASE_BRANCH -> defaults.base_branch
                       - AGENTIC_WORKTREE_DEFAULT_BASE -> worktree.default_base

                  4. Implement deep merge with source tracking:
                     - Higher layers override lower layers
                     - Track which source each final value came from

                  5. Update CLIContext in context.py:
                     - Add project_config_file property: returns project_root / ".agenticcli.yml"
                     - Add tiered_config property that returns TieredConfigLoader instance

