# Feature 05: Package Management
# Self-update and rebuild commands

feature:
  name: "Package Management Commands"
  priority: 5
  status: completed
  completed_date: "2026-01-03"
  estimated_effort: low

  description: |
    Commands for updating and rebuilding the AgenticCLI package.
    Essential for development workflow when iterating on the CLI.

  reference:
    legacy_cli: "modules/legacy/MyAgents/projects/MyAgentsBackend/src/myagents/frontend/cli"
    commands:
      - "myagents update"
      - "myagents rebuild"

  commands:
    - name: "update"
      usage: "agentic update"
      description: "Reinstall AgenticCLI from source"
      steps:
        - "Find AgenticCLI package root"
        - "Run: uv sync"
        - "Report success/failure"

    - name: "rebuild"
      usage: "agentic rebuild"
      description: "Full rebuild and reinstall"
      steps:
        - "Clean build artifacts (build/, dist/, *.egg-info/)"
        - "Build package: python -m build --installer uv"
        - "Reinstall: uv sync"
        - "Report success/failure"

  implementation_steps:
    - id: "05.1"
      task: "Add update command"
      status: completed
      details: |
        Find package root (where pyproject.toml lives)
        Execute uv sync
        Handle subprocess errors

    - id: "05.2"
      task: "Add rebuild command"
      status: completed
      details: |
        Find package root
        Clean: rm -rf build/ dist/ *.egg-info/
        Build: python -m build --installer uv
        Reinstall: uv sync
        Show progress and handle errors

  success_criteria:
    - "`agentic update` reinstalls from source without errors"
    - "`agentic rebuild` cleans, builds, and reinstalls"
    - "Commands work from any directory"
    - "Error messages are clear when build fails"

  notes: |
    These commands follow the legacy pattern from myagents_cli.py.
    Uses uv as package manager (already used in AgenticEngineering).
    Minimal implementation - no complex features needed.
