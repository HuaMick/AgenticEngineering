# Feature 04: Configuration and Preferences
# User settings management in home directory

feature:
  name: "Configuration and Preferences"
  priority: 4
  status: completed
  completed_date: "2026-01-03"
  estimated_effort: medium

  description: |
    Provides persistent user preferences stored in ~/.config/agenticcli/.
    Based on legacy preferences pattern but simplified for AgenticCLI.

  reference:
    legacy_cli: "modules/legacy/MyAgents/projects/MyAgentsBackend/src/myagents/frontend/cli"
    pattern: "PreferencesWorkflow from setup_workflow"

  commands:
    - name: "config show"
      usage: "agentic config show"
      description: "Display current configuration"
      steps:
        - "Read config file from ~/.config/agenticcli/config.yml"
        - "Display all settings"

    - name: "config init"
      usage: "agentic config init"
      description: "Initialize configuration interactively"
      steps:
        - "Create ~/.config/agenticcli/ if not exists"
        - "Prompt for default settings"
        - "Write config.yml"

    - name: "prefs get"
      usage: "agentic prefs get <key>"
      description: "Get a preference value"
      steps:
        - "Read preferences file"
        - "Return value for key (supports dot notation)"

    - name: "prefs set"
      usage: "agentic prefs set <key> <value>"
      description: "Set a preference value"
      steps:
        - "Read preferences file"
        - "Set key to value"
        - "Write preferences file"

    - name: "prefs list"
      usage: "agentic prefs list"
      description: "List all preferences"
      steps:
        - "Read preferences file"
        - "Display as JSON"

  implementation_steps:
    - id: "04.1"
      task: "Create config directory utilities"
      status: completed
      details: |
        Function to get config dir: ~/.config/agenticcli/
        Function to ensure directory exists
        Handle XDG_CONFIG_HOME if set

    - id: "04.2"
      task: "Add config subparser"
      status: completed
      details: |
        Add 'config' subparser with show/init subcommands
        Add 'prefs' subparser with get/set/list subcommands

    - id: "04.3"
      task: "Implement config show"
      status: completed
      details: |
        Read config.yml from config directory
        Display formatted output
        Handle missing file gracefully

    - id: "04.4"
      task: "Implement config init"
      status: completed
      details: |
        Create config directory
        Create default config.yml
        Prompt for any required values

    - id: "04.5"
      task: "Implement preferences commands"
      status: completed
      details: |
        Store preferences in preferences.yml
        Support dot notation for nested keys
        Handle JSON values for complex settings

  success_criteria:
    - "`agentic config init` creates ~/.config/agenticcli/"
    - "`agentic config show` displays configuration"
    - "`agentic prefs set worktree.default_base main` stores preference"
    - "`agentic prefs get worktree.default_base` returns 'main'"
    - "`agentic prefs list` shows all preferences"

  storage_format:
    config_file: "~/.config/agenticcli/config.yml"
    prefs_file: "~/.config/agenticcli/preferences.yml"
    example_config: |
      version: 1
      defaults:
        repo_abbreviation: AE
        base_branch: main
    example_prefs: |
      worktree:
        default_base: main
      plan:
        auto_scaffold: true
