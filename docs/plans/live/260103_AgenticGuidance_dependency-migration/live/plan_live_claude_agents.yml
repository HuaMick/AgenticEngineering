# Dependency Migration - Phase 3: Claude Code Agent Documentation
# Creates .md files in .claude/agents/ for all AgenticGuidance subagents
# Created: 2026-01-03
#
# PURPOSE: Enable Claude Code's Task tool to use AgenticGuidance agents
# via the subagent_type parameter. Each .md file documents one agent.
#
# DEPENDS ON: Phase 2D (build agent migration complete)
#
# KEY PRINCIPLES:
# 1. INPUTS: Existing agent process.yml and inputs.yml files
# 2. GUIDANCE: Create .md files following established template
# 3. SUCCESS CRITERIA: All agents accessible via Task tool

worktree: "/home/code/AgenticEngineering"
liveplan: "docs/plans/live/260103_AgenticGuidance_dependency-migration/live/plan_live_claude_agents.yml"
completedplan: "docs/plans/live/260103_AgenticGuidance_dependency-migration/completed/plan_completed.yml"

live-plans:
  - id: CLAUDE-AGENTS-DOC-001
    title: Create .claude/agents/ Documentation
    description: |
      Create .md files for all AgenticGuidance subagents to enable Claude Code integration.
      Template follows existing planner-build.md format with frontmatter and process/inputs references.

    template_reference: ".claude/agents/planner-build.md"

    phases:
      # ========================================
      # PHASE 3A: ORCHESTRATION AGENTS
      # ========================================
      - name: Orchestration Agent Documentation
        execution_groups:
          - execution: parallel
            name: Create orchestration agent .md files
            agents:
              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
                  - modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
                guidance: |
                  Context: Create .claude/agents/orchestration-planning.md to enable
                  Claude Code Task tool integration for the orchestration-planning agent.

                  Instructions:
                  1. Read planner-build.md as template reference
                  2. Create .claude/agents/orchestration-planning.md with:
                     ```
                     ---
                     name: orchestration-planning
                     description: Orchestrate planning workflows with planner agents and approval gates
                     ---

                     # orchestration-planning

                     Orchestrate planning workflows with planner agents and approval gates.

                     ## Process

                     Follow: `modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd`

                     ## Inputs

                     Load: `modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml`
                     ```
                  3. Note: Uses .mmd (Mermaid) not .yml for process file
                success_criteria:
                  - File created at .claude/agents/orchestration-planning.md
                  - Follows template format with frontmatter
                  - References correct process.mmd and inputs.yml paths

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/orchestration/orchestration-build/process.mmd
                  - modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml
                guidance: |
                  Context: Create .claude/agents/orchestration-build.md for the
                  orchestration-build agent that handles implementation workflows.

                  Instructions:
                  1. Read planner-build.md as template reference
                  2. Create .claude/agents/orchestration-build.md with:
                     - name: orchestration-build
                     - description: Orchestrate build workflows with implementation and test agents
                     - Process: modules/AgenticGuidance/agents/orchestration/orchestration-build/process.mmd
                     - Inputs: modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml
                success_criteria:
                  - File created with correct format
                  - References .mmd process file

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd
                  - modules/AgenticGuidance/agents/orchestration/orchestration-guidance/inputs.yml
                guidance: |
                  Context: Create .claude/agents/orchestration-guidance.md for the
                  orchestration-guidance agent that handles guidance improvement workflows.

                  Instructions:
                  1. Read planner-build.md as template reference
                  2. Create .claude/agents/orchestration-guidance.md with:
                     - name: orchestration-guidance
                     - description: Orchestrate guidance improvement workflows with teaching agents
                     - Process: modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd
                     - Inputs: modules/AgenticGuidance/agents/orchestration/orchestration-guidance/inputs.yml
                success_criteria:
                  - File created with correct format
                  - References .mmd process file

      # ========================================
      # PHASE 3B: DEPLOY AGENTS
      # ========================================
      - name: Deploy Agent Documentation
        execution_groups:
          - execution: sequential
            name: Create deploy agent .md file
            agents:
              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml
                  - modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml
                guidance: |
                  Context: Create .claude/agents/deploy-worktree.md for the
                  deploy-worktree agent that handles worktree and plan folder setup.

                  Instructions:
                  1. Read planner-build.md as template reference
                  2. Create .claude/agents/deploy-worktree.md with:
                     - name: deploy-worktree
                     - description: Create git worktrees and plan folder structures for isolated work
                     - Process: modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml
                     - Inputs: modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml
                success_criteria:
                  - File created with correct format

      # ========================================
      # PHASE 3C: TEST AGENTS
      # ========================================
      - name: Test Agent Documentation
        execution_groups:
          - execution: parallel
            name: Create test agent .md files
            agents:
              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/test/test-runner/process.yml
                  - modules/AgenticGuidance/agents/test/test-runner/inputs.yml
                guidance: |
                  Create .claude/agents/test-runner.md:
                  - name: test-runner
                  - description: Execute test suites and report results with structured output
                  - Process: modules/AgenticGuidance/agents/test/test-runner/process.yml
                  - Inputs: modules/AgenticGuidance/agents/test/test-runner/inputs.yml
                success_criteria:
                  - File created with correct format

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/test/test-audit/process.yml
                  - modules/AgenticGuidance/agents/test/test-audit/inputs.yml
                guidance: |
                  Create .claude/agents/test-audit.md:
                  - name: test-audit
                  - description: Audit test quality, coverage, and alignment with requirements
                  - Process: modules/AgenticGuidance/agents/test/test-audit/process.yml
                  - Inputs: modules/AgenticGuidance/agents/test/test-audit/inputs.yml
                success_criteria:
                  - File created with correct format

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/test/test-final-output/process.yml
                  - modules/AgenticGuidance/agents/test/test-final-output/inputs.yml
                guidance: |
                  Create .claude/agents/test-final-output.md:
                  - name: test-final-output
                  - description: Validate final outputs of agent processes for completeness
                  - Process: modules/AgenticGuidance/agents/test/test-final-output/process.yml
                  - Inputs: modules/AgenticGuidance/agents/test/test-final-output/inputs.yml
                success_criteria:
                  - File created with correct format

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
                  - modules/AgenticGuidance/agents/test/test-guidance-simulator/inputs.yml
                guidance: |
                  Create .claude/agents/test-guidance-simulator.md:
                  - name: test-guidance-simulator
                  - description: Simulate guidance execution to identify friction points
                  - Process: modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
                  - Inputs: modules/AgenticGuidance/agents/test/test-guidance-simulator/inputs.yml
                success_criteria:
                  - File created with correct format

      # ========================================
      # PHASE 3D: TEACHER AGENTS
      # ========================================
      - name: Teacher Agent Documentation
        execution_groups:
          - execution: parallel
            name: Create teacher agent .md files
            agents:
              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
                  - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml
                guidance: |
                  Create .claude/agents/teacher-update-guidance.md:
                  - name: teacher-update-guidance
                  - description: Analyze agent logs and improve process.yml and inputs.yml files
                  - Process: modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
                  - Inputs: modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml
                success_criteria:
                  - File created with correct format

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/teacher/teacher-update-assets/process.yml
                  - modules/AgenticGuidance/agents/teacher/teacher-update-assets/inputs.yml
                guidance: |
                  Create .claude/agents/teacher-update-assets.md:
                  - name: teacher-update-assets
                  - description: Create and update shared assets (definitions, guidelines, examples)
                  - Process: modules/AgenticGuidance/agents/teacher/teacher-update-assets/process.yml
                  - Inputs: modules/AgenticGuidance/agents/teacher/teacher-update-assets/inputs.yml
                success_criteria:
                  - File created with correct format

      # ========================================
      # PHASE 3E: ADDITIONAL PLANNER AGENTS
      # ========================================
      - name: Additional Planner Agent Documentation
        execution_groups:
          - execution: parallel
            name: Create additional planner .md files
            agents:
              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
                  - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
                guidance: |
                  Create .claude/agents/planner-guidance.md:
                  - name: planner-guidance
                  - description: Create guidance-focused plans for improving agent paths and signposts
                  - Process: modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
                  - Inputs: modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
                success_criteria:
                  - File created with correct format

              - type: build
                inputs:
                  - .claude/agents/planner-build.md
                  - modules/AgenticGuidance/agents/planner/planner-guidance-testing/process.yml
                  - modules/AgenticGuidance/agents/planner/planner-guidance-testing/inputs.yml
                guidance: |
                  Create .claude/agents/planner-guidance-testing.md:
                  - name: planner-guidance-testing
                  - description: Create validation plans using walkthrough-based guidance testing
                  - Process: modules/AgenticGuidance/agents/planner/planner-guidance-testing/process.yml
                  - Inputs: modules/AgenticGuidance/agents/planner/planner-guidance-testing/inputs.yml
                success_criteria:
                  - File created with correct format

      # ========================================
      # VALIDATION PHASE
      # ========================================
      - name: Documentation Validation
        execution_groups:
          - execution: sequential
            name: Validate all .md files
            agents:
              - type: audit
                inputs:
                  - .claude/agents/
                guidance: |
                  Context: Validate all .md files in .claude/agents/ for consistency.

                  Instructions:
                  1. List all .md files in .claude/agents/
                  2. For each file, verify:
                     - Has valid YAML frontmatter with name and description
                     - Has Process section with valid file path
                     - Has Inputs section with valid file path
                     - Referenced process.yml/.mmd file exists
                     - Referenced inputs.yml file exists
                  3. Report any missing or invalid files
                  4. Confirm total count matches expected (7 existing + 12 new = 19 total)
                success_criteria:
                  - All 19 .md files present
                  - All frontmatter valid
                  - All referenced files exist
                  - Consistent format across all files

    user_stories:
      - story: "As a developer, I want to invoke AgenticGuidance agents via Claude Code Task tool"
        validation: "All agents have .md files and can be referenced via subagent_type"
        status: "must_validate"

      - story: "As a maintainer, I want consistent documentation format across all agents"
        validation: "All .md files follow the same template structure"
        status: "must_validate"

    architecture_compliance:
      pattern: "Claude Code agent integration"
      verification:
        - check: "Each agent has corresponding .md file"
          files:
            - .claude/agents/*.md
          criteria: "One .md file per agent in AgenticGuidance"

        - check: "Frontmatter is valid YAML"
          files:
            - .claude/agents/*.md
          criteria: "All files have name and description in frontmatter"
