    name: "Replace top-level group aliases with deprecation commands"
    description: >
      In cli.py, replace the 8 hidden top-level group add_typer calls with deprecation
      commands. The current code:
        app.add_typer(stories_app, name="stories", hidden=True)
        app.add_typer(stories_app, name="st", hidden=True)
