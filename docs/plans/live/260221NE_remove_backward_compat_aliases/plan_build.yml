        app.add_typer(context_app, name="context", hidden=True)
        app.add_typer(context_app, name="ctx", hidden=True)

      Replace each with a @app.command(..., hidden=True) stub. Because Typer does not
      support catch-all arguments natively, use a context-aware approach:
        - Add `ctx: typer.Context` parameter to the callback
        - Use `allow_extra_args=True` and `allow_interspersed_args=False` on the
          Typer command decorator so it doesn't reject extra subcommand arguments
        - Print the error message and exit 1

      Implementation pattern for each:
        @app.command("stories", hidden=True, context_settings={"allow_extra_args": True, "allow_interspersed_args": False})
        def _deprecated_stories(ctx: typer.Context):
            \"\"\"Deprecated: use 'agentic agent stories'.\"\"\"
            from agenticcli.console import print_error
            print_error("Command 'agentic stories' has moved. Use 'agentic agent stories' instead.")
            raise typer.Exit(1)

      Apply this pattern for: stories, st, manifest, mf, entrypoint, ep, context, ctx.

      Note: The stories_app, manifest_app, entrypoint_app, and context_app Typer objects
      can still exist (they are used as the canonical implementations under 'agentic agent ...'
      via the agent_app group). Only remove the app.add_typer calls that register them at
      the top level.

