name: "Remove backward-compatible aliases"
status: "active"
worktree: /home/code/AgenticEngineering
plan_folder: docs/plans/live/260221NE_remove_backward_compat_aliases

objective: >
  Remove ALL backward-compatible hidden aliases from the CLI and replace with helpful
  error messages that direct users to the correct commands. Simultaneously update all
  agent process files and guidance assets that reference the old command paths to use
  the new 'agentic agent ...' prefix paths. This is a two-track change: (1) break the
  old aliases in CLI so they emit clear guidance messages and exit 1, (2) update all
  agent instruction files so spawned agents use correct paths from day one.

scope_notes: >
  31 hidden aliases to remove. 25+ agent process.yml files to update. CLI changes
  split by alias category (top-level groups, plan_app commands, plan_app sub-groups,
  question_app commands). Asset and template files also need updating. The 'agentic cfg'
  and 'agentic ls' shorthand aliases are user-facing convenience aliases — keep them as-is.
  'agentic configure prefs/pref' and 'agentic devops wt' are also kept per user decision
  (low-risk, non-agent paths). Focus is on aliases that agents are likely to call.

aliases_kept:
  - "agentic cfg -> agentic configure (user shorthand, keep)"
  - "agentic ls -> agentic langsmith (user shorthand, keep)"
  - "agentic configure prefs/pref -> agentic configure preferences (user shorthand, keep)"
  - "agentic devops wt -> agentic devops worktree (user shorthand, keep)"

aliases_to_remove:
  top_level_groups:
    - "agentic stories -> use agentic agent stories"
    - "agentic st -> use agentic agent stories"
    - "agentic manifest -> use agentic agent manifest"
    - "agentic mf -> use agentic agent manifest"
    - "agentic entrypoint -> use agentic agent entrypoint"
    - "agentic ep -> use agentic agent entrypoint"
    - "agentic context -> use agentic agent context"
    - "agentic ctx -> use agentic agent context"
  plan_app_commands:
    - "agentic plan new -> use agentic agent plan new"
    - "agentic plan init -> use agentic agent plan init"
    - "agentic plan bootstrap -> use agentic agent plan bootstrap"
    - "agentic plan scaffold -> use agentic agent plan scaffold"
    - "agentic plan validate -> use agentic agent plan validate"
    - "agentic plan archive -> use agentic agent plan archive"
    - "agentic plan unarchive -> use agentic agent plan unarchive"
  plan_app_subgroups:
    - "agentic plan task * -> use agentic agent plan task *"
    - "agentic plan phase * -> use agentic agent plan phase *"
    - "agentic plan move * -> use agentic agent plan move *"
    - "agentic plan orchestration * -> use agentic agent plan orchestration *"
    - "agentic plan stories * -> use agentic agent plan stories *"
  question_app_commands:
    - "agentic question ask -> use agentic agent question ask"
    - "agentic question defer -> use agentic agent question defer"
    - "agentic question watch -> use agentic agent question watch"
    - "agentic question watch-daemon -> use agentic agent question watch-daemon"
    - "agentic question watch-stop -> use agentic agent question watch-stop"

phases:
  - id: P1
    name: "Update Agent Process Files"
    description: >
      Update all agent process.yml files and supporting assets (inputs.yml, templates,
      cli-commands.yml) to use the new 'agentic agent ...' paths BEFORE the aliases are
      removed. This ensures spawned agents will not break when aliases are removed in P2.
    parallel: true

  - id: P2
    name: "Replace CLI Aliases with Deprecation Stubs"
    description: >
      Replace all hidden backward-compat aliases in cli.py with deprecation stubs that
      print a clear error message and exit 1. Implement per category. The stubs must
      appear at the same command path so Typer still routes them, but the callback
      prints the new path and refuses to proceed.
    parallel: false
    depends_on: [P1]

  - id: P3
    name: "Update Tests"
    description: >
      Replace the TestBackwardCompatibility and TestCommandAliases tests that expect old
      aliases to work. New tests must verify that the old paths emit deprecation error
      messages (exit code 1) and that the error output contains the new 'agentic agent ...'
      path. Also update tests in test_cli.py that assert 'wt', 'mf', 'st' aliases work.
    parallel: false
    depends_on: [P2]

