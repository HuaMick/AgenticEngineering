implementation_notes:
  typer_context_settings: >
    When registering deprecation stubs, use context_settings to allow extra args so
    Typer doesn't error on subcommand arguments before reaching the callback:
      @app.command("context", hidden=True,
                   context_settings={"allow_extra_args": True, "allow_interspersed_args": False})
      def _deprecated_context(ctx: typer.Context):
          ...
    This ensures 'agentic context bootstrap' routes to the stub rather than Typer
    throwing "No such command 'bootstrap'".

  error_message_format: >
    Use a consistent format for all deprecation messages:
      "Command 'agentic <old>' has moved. Use 'agentic agent <new>' instead."
    Print to stderr via print_error() from agenticcli.console.
    Always raise typer.Exit(1) after printing.

