# ========================================
# VALIDATION CRITERIA
# ========================================
validation:
  - criterion: "No nested live/ or completed/ subfolders remain in any plan folder"
    command: "find docs/plans -type d -name 'live' -o -name 'completed' | grep -v '^docs/plans/live$' | grep -v '^docs/plans/completed$'"
    expected: "Empty output (no matches)"

  - criterion: "No plan_live_*.yml files remain"
    command: "find docs/plans -name 'plan_live_*.yml'"
    expected: "Empty output (no matches)"

  - criterion: "All tests pass"
    command: "pytest modules/AgenticCLI/tests/ modules/AgenticGuidance/tests/ -v"
    expected: "All tests pass"

  - criterion: "CLI commands still work"
    command: "agentic plan list"
    expected: "Lists plans without error"

# ========================================
# ROLLBACK PLAN
# ========================================
rollback:
  description: |
    If migration causes issues, can revert using git:
    1. git checkout HEAD~1 -- docs/plans/
    2. git checkout HEAD~1 -- modules/AgenticGuidance/src/
    3. git checkout HEAD~1 -- modules/AgenticCLI/src/

    Alternatively, create backup branch before starting:
    git checkout -b backup/pre-plan-structure-cleanup
