          Update modules/AgenticGuidance/tests/test_services_plan.py to use new structure.
        status: "completed"
        target_files:
          - "modules/AgenticGuidance/tests/test_services_plan.py"

  - phase_id: "P5"
    name: "Update documentation"
    description: |
      Update documentation files that reference the old folder structure.
    status: "pending"
    tasks:
      - id: "P5-T1"
        name: "Update core documentation"
        description: |
          Update main documentation files:
          - modules/AgenticGuidance/README.md
