# =============================================================================
# DETAILED FEEDBACK
# =============================================================================
detailed_feedback:
  critical_issues:
    - issue_id: "CRIT-001"
      title: "False Completion Reporting (BLOCKING)"
      severity: "CRITICAL"
      description: |
        plan_build.yml declares status="implementation_complete" and all 4 tasks
        (IM_001-IM_004) marked as status="completed", but infrastructure verification
        confirms NONE of the implementations actually exist in the codebase.

        This is not a minor discrepancy - this represents fundamental plan integrity
        violation. The plan claims work is done when no work has been performed.

      impact: |
        BLOCKING - Cannot approve plan with false completion reporting.
        Test plan cannot be executed because it depends on non-existent implementations.
        All test tasks would fail immediately with "implementation not found" errors.

      evidence_summary:
        IM_001: "session.py still exits with code 1 for terminal states (not idempotent)"
        IM_002: "loop.py still exits with code 1 for terminal states (not idempotent)"
        IM_003: "planner agent directory does not exist"
        IM_004: "bootstrap command does not exist in plan.py"

      fix_required: |
        MANDATORY: Change plan_build.yml status from "implementation_complete" to "pending"
        or "in_progress". Mark all tasks IM_001-IM_004 as status="pending".

        Then either:
        1. Execute the build plan to perform the actual implementation work
        2. Remove the build plan if implementation is not needed yet
        3. Clarify that this is a design/planning document, not an implementation plan

    - issue_id: "CRIT-002"
      title: "Previous Review Error - Agent Verification Incorrect"
      severity: "HIGH"
      description: |
        The previous review (review_260205IM_decision.yml) incorrectly stated that
        the 'planner' agent was IMPLEMENTED with evidence of existing guidance files.
        This was factually incorrect and led to approval recommendation after only
        removing the documentation phase.

      actual_status: |
        planner agent at modules/AgenticGuidance/agents/planner/planner/ does NOT exist.
        Previous review claimed: "Generic planner role created as part of IM_003 implementation"
        Reality: No such directory or files exist.

      lesson_learned: |
        Infrastructure verification must actually check file existence, not rely on
        plan claims of completion. Success criteria must be independently verified.

  recommendations:
    - rec_id: "REC-001"
      title: "Correct Build Plan Status"
      priority: "CRITICAL"
      description: |
        Change plan_build.yml to accurately reflect implementation status.
        This is not negotiable - plans must report accurate status.

      action: |
        Update plan_build.yml:
        - status: "pending" (or "in_progress" if work is starting)
        - IM_001: status: "pending"
        - IM_002: status: "pending"
        - IM_003: status: "pending"
        - IM_004: status: "pending"

    - rec_id: "REC-002"
      title: "Execute Implementation Work"
      priority: "CRITICAL"
      description: |
        The 4 implementation tasks are well-defined with clear guidance and success
        criteria. Execute the build plan to perform the actual implementation work.

      action: |
        1. Spawn build-python agent for each task sequentially
        2. Verify success criteria after each task completion
        3. Update task status to "completed" only after verification
        4. Update plan_build.yml status to "implementation_complete" only after all tasks pass

    - rec_id: "REC-003"
      title: "Add Orchestration MMD"
      priority: "MEDIUM"
      description: |
        Once implementations are complete, add orchestration MMD for test plan execution.

      action: |
        Create orchestration_cli_hardening.mmd with:
        - GOAL: Validate CLI hardening implementations
        - PHASES: ENV_SETUP -> UNIT_TESTS -> INTEGRATION_TESTS -> AUDIT -> UAT
        - LOOP_STRUCTURES: Visual representation of test-fix-loop iterations
        - AGENT_ROUTING: Map phases to responsible agents

    - rec_id: "REC-004"
      title: "Strengthen Success Criteria Verification"
      priority: "HIGH"
      description: |
        Future reviews must independently verify success criteria, not trust plan claims.

      action: |
        For all "completed" tasks, planner-reviewer must:
        1. Read specified file locations
        2. Grep for expected code patterns
        3. Verify behavior matches success criteria
        4. REJECT if verification fails, regardless of claimed status

