# Test Plan for 260205IM_cli_hardening
# Created: 2026-02-05
# Objective: Comprehensive verification of CLI hardening and idempotency features

name: "cli-hardening-test-plan"
worktree_path: "/home/code/AgenticEngineering"
branch: "main"
status: "active"
priority: "high"

context: |
  This test plan verifies the CLI hardening implementation:
  1. Session stop idempotency (session.py handles terminal states and ProcessLookupError)
  2. Loop stop idempotency (loop.py handles terminal states and ProcessLookupError)
  3. Generic planner role (modules/AgenticGuidance/agents/planner/planner/)
  4. Bootstrap command (plan.py: cmd_bootstrap)
  5. Permission Skip Flag (cli.py: --dangerously-skip-permissions added to spawn and start)

objective: |
  Verify all CLI hardening features work correctly across unit, integration, and UAT levels.

  Success Criteria:
  - Stop commands return exit 0 when already in terminal state
  - Stop commands handle ProcessLookupError gracefully
  - Bootstrap command creates correct folder structure with stubs
  - --dangerously-skip-permissions is correctly passed to underlying 'claude' process
  - Planner role can be loaded via context bootstrap
  - All user stories pass in local and Docker environments

# ========================================
# IMPACTED FILES (Test Coverage Mapping)
# ========================================
impacted_files:
  - path: "modules/AgenticCLI/tests/test_session_stop_idempotency.py"
    change_type: create
    change_category: test
    reason: "Unit tests for session stop idempotency (terminal states and ProcessLookupError)"

  - path: "modules/AgenticCLI/tests/test_loop_stop_idempotency.py"
    change_type: create
    change_category: test
    reason: "Unit tests for loop stop idempotency (terminal states and ProcessLookupError)"

  - path: "modules/AgenticCLI/tests/test_plan_bootstrap.py"
    change_type: create
    change_category: test
    reason: "Unit tests for bootstrap command folder structure and stub creation"

  - path: "modules/AgenticCLI/tests/integration/test_context_bootstrap_planner.py"
    change_type: create
    change_category: test
    reason: "Integration test for loading planner role via context bootstrap"

  - path: "modules/AgenticCLI/tests/integration/test_stop_idempotency_e2e.py"
    change_type: create
    change_category: test
    reason: "End-to-end tests for stop command idempotency in realistic scenarios"

# ========================================
# IMPACTED ARTIFACTS (Features Validated)
# ========================================
impacted_artifacts:
  - artifact_type: cli_command
    artifact_identifier: "agentic session stop"
    impact_type: behavior_change
    description: "Now idempotent - returns success if already stopped/completed/failed"
    breaking_change: false

  - artifact_type: cli_command
    artifact_identifier: "agentic loop stop"
    impact_type: behavior_change
    description: "Now idempotent - returns success if already stopped/completed/failed"
    breaking_change: false

  - artifact_type: cli_command
    artifact_identifier: "agentic plan bootstrap"
    impact_type: new
    description: "New command for automated plan folder initialization with stubs"

  - artifact_type: agent_role
    artifact_identifier: "planner"
    impact_type: new
    description: "Generic planner role for plan folder management"

  - artifact_type: cli_flag
    artifact_identifier: "--dangerously-skip-permissions"
    impact_type: new
    description: "Flag to bypass tool permission prompts in spawned sessions/loops"

# ========================================
# LOOP STRUCTURES
# ========================================
loop_structures:
  - id: "loop_test_fix"
    type: "test-fix-loop"
    applies_to_phase: "Unit Tests Phase"
    trigger: "After test creation completes"
    description: |
      Iterative testing where unit tests are run, failures are analyzed,
      and implementation issues are fixed until all tests pass.
    exit_criteria:
      success: "All unit tests pass with proper coverage"
      max_iterations: 5
      escalation: "Escalate to user with failing test details"
    participants:
      - agent: "test-builder"
        role: "Creates and executes unit tests"
      - agent: "build-python"
        role: "Fixes failures identified by tests"

  - id: "loop_integration_test_fix"
    type: "test-fix-loop"
    applies_to_phase: "Integration Tests Phase"
    trigger: "After integration test creation completes"
    description: |
      Integration testing with focus on command interaction,
      state persistence, and cross-component behavior.
    exit_criteria:
      success: "All integration tests pass"
      max_iterations: 5
      escalation: "Escalate with integration failure analysis"
    participants:
      - agent: "test-builder"
        role: "Creates and executes integration tests"
      - agent: "build-python"
        role: "Fixes integration issues"

  - id: "loop_audit"
    type: "audit-test-fix-loop"
    applies_to_phase: "Test Audit Phase"
    trigger: "After all tests pass"
    description: |
      MANDATORY audit to detect reward hacking, skipped tests, hardcoded paths,
      and missing setup. Validates test quality before proceeding to UAT.
    exit_criteria:
      success: "Audit passes AND all tests still pass after corrections"
      max_iterations: 3
      escalation: "BLOCK UAT - audit failures must be resolved"
    participants:
      - agent: "test-audit"
        role: "Audits test quality and detects issues"
      - agent: "test-builder"
        role: "Fixes audit-identified test issues"
      - agent: "build-python"
        role: "Fixes implementation issues revealed by audit"
    mandatory: true

  - id: "loop_uat"
    type: "user-story-validation-loop"
    applies_to_phase: "UAT Validation Phase"
    trigger: "After audit passes"
    description: |
      User acceptance testing validates complete user journeys for orchestrator
      and developer personas. Primary success criteria for this plan.
    exit_criteria:
      success: "All user stories pass in local AND Docker environments"
      max_iterations: 5
      escalation: "Escalate with user story failure details"
    participants:
      - agent: "test-user-simulator"
        role: "Simulates user workflows and validates journeys"
      - agent: "build-python"
        role: "Fixes user-facing issues"
    mandatory: true

# ========================================
# PHASES AND TASKS
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Environment Setup (MANDATORY)
  # ----------------------------------------
  - name: "Environment Setup Phase"
    execution: sequential
    description: "Prepare testing environments to ensure tests validate latest code"
    tasks:
      - id: "ENV_001"
        name: "Local environment verification"
        description: "Verify CLI is installed and accessible in local environment"
        status: "pending"
        agent: "test-runner"
        inputs:
          - modules/AgenticCLI/pyproject.toml
        guidance: |
          Verify local environment setup:
          1. Run: uv pip install -e ./modules/AgenticCLI
          2. Verify: agentic --version (should show version from source)
          3. Verify: which agentic (should point to virtual environment)
          4. Document environment details for test context
        success_criteria:
          - "agentic command is accessible"
          - "Version matches source code"
          - "CLI commands respond correctly"

      - id: "ENV_002"
        name: "Docker environment preparation"
        description: "Build shared myagents-test Docker image for testing"
        status: "pending"
        agent: "test-runner"
        inputs:
          - Dockerfile.test
        guidance: |
          Prepare Docker testing environment:
          1. Build: docker build -f Dockerfile.test -t myagents-test .
          2. Verify: docker run --rm myagents-test agentic --version
          3. Document image ID and build timestamp
        success_criteria:
          - "Docker image builds successfully"
          - "CLI is accessible in container"
          - "Image is tagged as myagents-test"

  # ----------------------------------------
  # PHASE 2: Unit Tests Phase (test-fix-loop)
  # ----------------------------------------
  - name: "Unit Tests Phase"
    execution: sequential
    description: "Component-level testing of idempotency and bootstrap features"
    loop: "test-fix-loop"
    tasks:
      - id: "UNIT_001"
        name: "Session stop idempotency tests"
        description: "Test session stop returns exit 0 for terminal states and ProcessLookupError"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/session.py
          - modules/AgenticCLI/tests/test_session_commands.py
        target_files:
          - modules/AgenticCLI/tests/test_session_stop_idempotency.py
        guidance: |
          Create comprehensive unit tests for session stop idempotency:

          Test Coverage:
          1. Terminal state check (lines 363-373):
             - status='completed' -> exit 0, no process kill attempt
             - status='stopped' -> exit 0, no process kill attempt
             - status='failed' -> exit 0, no process kill attempt
             - Verify success message format
             - Verify JSON output format when --json flag used

          2. ProcessLookupError handling (lines 398-412):
             - Mock os.kill to raise ProcessLookupError
             - Verify status set to 'completed'
             - Verify ended_at timestamp is set
             - Verify session is saved
             - Verify exit 0 (not exit 1)
             - Verify success message indicates process not found

          3. Edge cases:
             - Multiple stop calls in sequence
             - Stop with --force flag on terminal state
             - Stop on non-existent process

          Use pytest with mocking for process interactions.
          Reference existing patterns from test_session_commands.py.
        success_criteria:
          - "All terminal states return exit 0"
          - "ProcessLookupError handled gracefully"
          - "No attempts to kill already-stopped processes"
          - "State transitions are correct"
          - "Test coverage >90% for cmd_stop function"

      - id: "UNIT_002"
        name: "Loop stop idempotency tests"
        description: "Test loop stop returns exit 0 for terminal states and ProcessLookupError"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/loop.py
          - modules/AgenticCLI/tests/test_loop_integration.py
        target_files:
          - modules/AgenticCLI/tests/test_loop_stop_idempotency.py
        guidance: |
          Create comprehensive unit tests for loop stop idempotency:

          Test Coverage:
          1. Terminal state check (lines 361-371):
             - status='completed' -> exit 0, no process kill attempt
             - status='stopped' -> exit 0, no process kill attempt
             - status='failed' -> exit 0, no process kill attempt
             - Verify success message format
             - Verify JSON output format when --json flag used

          2. ProcessLookupError handling (lines 403-417):
             - Mock os.kill to raise ProcessLookupError
             - Verify status set to 'completed'
             - Verify ended_at timestamp is set
             - Verify loop is saved
             - Verify exit 0 (not exit 1)
             - Verify success message indicates process not found

          3. Iteration handling:
             - Verify running iterations are also marked as stopped
             - Verify iteration timestamps are updated

          4. Edge cases:
             - Multiple stop calls in sequence
             - Stop with --force flag on terminal state
             - Stop on non-existent process

          Use pytest with mocking for process interactions.
          Reference existing patterns from test_loop_integration.py.
        success_criteria:
          - "All terminal states return exit 0"
          - "ProcessLookupError handled gracefully"
          - "No attempts to kill already-stopped loops"
          - "Iteration state is correctly updated"
          - "Test coverage >90% for cmd_stop function"

      - id: "UNIT_003"
        name: "Bootstrap command tests"
        description: "Test plan bootstrap creates correct folder structure and stubs"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/plan.py
          - modules/AgenticCLI/tests/test_plan_init.py
        target_files:
          - modules/AgenticCLI/tests/test_plan_bootstrap.py
        guidance: |
          Create comprehensive unit tests for bootstrap command:

          Test Coverage:
          1. Folder creation (lines 514-516):
             - Verify plan folder created at correct path
             - Verify live/ subfolder created
             - Verify parent directories created if needed

          2. Stub file creation (lines 518-546):
             - plan_build.yml contains correct metadata (name, worktree, branch, status, priority)
             - plan_build.yml contains provided objective
             - plan_build.yml has initial PLAN_001 task
             - plan_test.yml stub exists (minimal stub: "phases: []")
             - plan_completed.yml stub exists (minimal stub: "completed_items: []")

          3. File content validation:
             - YAML is syntactically valid
             - Timestamps are in correct format
             - Plan ID extraction from folder name works
             - Objective text is preserved exactly

          4. Error handling:
             - Existing folder -> exit 2 with error message
             - Invalid branch name -> appropriate error
             - Not in git repo -> exit 1 with error

          5. Output formats:
             - Normal output includes next steps
             - JSON output (--json) includes plan_folder, plan_path, objective, success

          Use pytest with temp directories for isolation.
          Mock git repository detection if needed.
        success_criteria:
          - "Correct folder structure created"
          - "All stub files present with valid YAML"
          - "Metadata matches input parameters"
          - "Error cases handled gracefully"
          - "Output format includes --dangerously-skip-permissions in suggested command"
          - "Test coverage >90% for cmd_bootstrap function"

      - id: "UNIT_004"
        name: "Permission skip flag tests"
        description: "Test --dangerously-skip-permissions flag parsing and pass-through"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticCLI/src/agenticcli/cli.py
          - modules/AgenticCLI/src/agenticcli/commands/session.py
          - modules/AgenticCLI/src/agenticcli/commands/loop.py
        target_files:
          - modules/AgenticCLI/tests/test_permission_skip_flag.py
        guidance: |
          Create unit tests for the --dangerously-skip-permissions flag:

          Test Coverage:
          1. CLI Parsing:
             - Verify --dangerously-skip-permissions is accepted by 'agentic session spawn'
             - Verify --dangerously-skip-permissions is accepted by 'agentic loop start'

          2. Session Spawn Pass-through:
             - Mock subprocess.Popen/run
             - Run 'agentic session spawn --prompt "test" --dangerously-skip-permissions'
             - Verify underlying 'claude' command includes '--dangerously-skip-permissions'

          3. Loop Start Pass-through:
             - Mock subprocess.Popen
             - Run 'agentic loop start --prompt "test" --dangerously-skip-permissions'
             - Verify underlying 'claude' command includes '--dangerously-skip-permissions'

          4. Negative tests:
             - Verify '--dangerously-skip-permissions' is NOT included when the flag is omitted.

          Use pytest with mocking for subprocess calls.
        success_criteria:
          - "Flag is correctly parsed by CLI"
          - "Flag is correctly passed to underlying 'claude' processes"
          - "Omission of flag works as expected"

  # ----------------------------------------
  # PHASE 3: Integration Tests Phase (test-fix-loop)
  # ----------------------------------------
  - name: "Integration Tests Phase"
    execution: sequential
    description: "Cross-component testing of CLI commands and role loading"
    loop: "test-fix-loop"
    tasks:
      - id: "INTEG_001"
        name: "Context bootstrap planner role test"
        description: "Test planner role can be loaded via context bootstrap command"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticGuidance/agents/planner/planner/manifest.yml
          - modules/AgenticGuidance/agents/planner/planner/process.yml
          - modules/AgenticGuidance/agents/planner/planner/inputs.yml
        target_files:
          - modules/AgenticCLI/tests/integration/test_context_bootstrap_planner.py
        guidance: |
          Create integration test for planner role loading:

          Test Coverage:
          1. Role file discovery:
             - Verify manifest.yml exists and is valid YAML
             - Verify process.yml exists and is valid YAML
             - Verify inputs.yml exists and is valid YAML

          2. Context bootstrap command:
             - Run: agentic context bootstrap --role planner -j
             - Verify JSON output contains role metadata
             - Verify role='planner' in output
             - Verify process steps are included
             - Verify no errors in output

          3. Role metadata validation:
             - name field is present and equals 'planner'
             - description is present and explains generic planning role
             - version field is present
             - outputs section defines plan_yaml output

          4. Process validation:
             - goal field explains plan initialization
             - steps include CCI BOOTSTRAP
             - steps include PLAN INITIALIZATION
             - invocation_context is present

          Use subprocess to run actual CLI command for integration testing.
        success_criteria:
          - "Role files are discovered correctly"
          - "Context bootstrap returns valid JSON"
          - "Role metadata is complete"
          - "No errors during role loading"

      - id: "INTEG_002"
        name: "Stop idempotency end-to-end test"
        description: "Test realistic scenarios with actual session/loop lifecycle"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/session.py
          - modules/AgenticCLI/src/agenticcli/commands/loop.py
        target_files:
          - modules/AgenticCLI/tests/integration/test_stop_idempotency_e2e.py
        guidance: |
          Create end-to-end integration tests for stop idempotency:

          Test Scenarios:
          1. Session lifecycle with multiple stops:
             - Start a mock session
             - Stop it normally (verify status='stopped')
             - Stop it again (verify exit 0, idempotent)
             - Stop it third time (verify still exit 0)

          2. Loop lifecycle with multiple stops:
             - Start a mock loop
             - Stop it normally (verify status='stopped')
             - Stop it again (verify exit 0, idempotent)
             - Stop it third time (verify still exit 0)

          3. Process cleanup scenario:
             - Start session/loop
             - Kill process externally (simulate crash)
             - Run stop command (verify ProcessLookupError handled)
             - Verify status='completed', exit 0

          4. Orchestration scenario:
             - Orchestrator starts multiple sessions
             - Some complete normally
             - Some fail
             - Some are stopped
             - Orchestrator calls stop on all (verify all return exit 0)

          Use actual CLI commands via subprocess for realistic testing.
          Use temp directories for session/loop state files.
        success_criteria:
          - "Multiple stop calls always succeed"
          - "Crashed processes handled gracefully"
          - "State files updated correctly"
          - "Exit codes are always 0 for idempotent operations"

      - id: "INTEG_003"
        name: "Bootstrap to planner workflow test"
        description: "Test complete workflow from bootstrap to planner agent spawn"
        status: "pending"
        agent: "test-builder"
        strategy: "smoke-test"
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/plan.py
        target_files:
          - modules/AgenticCLI/tests/integration/test_bootstrap_planner_workflow.py
        guidance: |
          Create integration test for bootstrap -> planner workflow:

          Test Workflow:
          1. Run bootstrap command:
             - agentic plan bootstrap --branch test-feature --objective "Test objective"
             - Verify exit 0
             - Capture plan folder name from output

          2. Verify created artifacts:
             - Plan folder exists at docs/plans/live/{folder}/
             - live/plan_build.yml exists and is valid
             - live/plan_test.yml stub exists
             - plan_completed.yml stub exists

          3. Verify plan_build.yml content:
             - name matches description
             - branch='test-feature'
             - objective="Test objective"
             - Has PLAN_001 task with agent='planner'

          4. Simulate planner context loading:
             - cd to plan folder
             - Run: agentic context bootstrap --role planner -j
             - Verify planner role loads successfully

          5. Verify suggested next step:
             - Output should suggest spawning planner agent
             - Command suggestion should reference created plan folder

          Use temp directories for isolated testing.
        success_criteria:
          - "Bootstrap creates all required artifacts"
          - "Planner role can be loaded in created plan context"
          - "Complete workflow executes without errors"
          - "Output provides clear next steps"

  # ----------------------------------------
  # PHASE 4: Test Audit Phase (audit-test-fix-loop) - MANDATORY
  # ----------------------------------------
  - name: "Test Audit Phase"
    execution: sequential
    description: "MANDATORY audit to validate test quality and detect issues"
    loop: "audit-test-fix-loop"
    tasks:
      - id: "AUDIT_001"
        name: "Test quality audit"
        description: "Audit all tests for reward hacking, skipped tests, and quality issues"
        status: "pending"
        agent: "test-audit"
        inputs:
          - modules/AgenticCLI/tests/test_session_stop_idempotency.py
          - modules/AgenticCLI/tests/test_loop_stop_idempotency.py
          - modules/AgenticCLI/tests/test_plan_bootstrap.py
          - modules/AgenticCLI/tests/integration/test_context_bootstrap_planner.py
          - modules/AgenticCLI/tests/integration/test_stop_idempotency_e2e.py
          - modules/AgenticCLI/tests/integration/test_bootstrap_planner_workflow.py
        guidance: |
          Perform comprehensive test audit following audit process:

          Audit Checklist:
          1. Skipped tests validation:
             - Find all @pytest.mark.skip decorators
             - Validate skip justification is legitimate
             - Flag unjustified skips as failures

          2. Reward hacking detection:
             - Tests that mock too much (not testing real behavior)
             - Tests with hardcoded paths (not portable)
             - Tests that pass trivially without validating behavior
             - Tests missing critical assertions

          3. Coverage gaps:
             - Error paths not tested
             - Edge cases missing
             - Integration points not covered

          4. Test quality issues:
             - Missing cleanup (temp files, state files)
             - Tests that modify global state
             - Tests with race conditions
             - Tests that depend on execution order

          5. Implementation validation:
             - Verify tests actually call the implementation code
             - Verify mocks are minimal and necessary
             - Verify assertions check meaningful behavior

          Generate audit report with PASS/FAIL for each test file.
        success_criteria:
          - "No unjustified skipped tests"
          - "No reward hacking detected"
          - "Coverage gaps identified and addressed"
          - "All tests meet quality standards"
          - "Audit report generated with specific findings"

  # ----------------------------------------
  # PHASE 5: UAT Validation Phase (user-story-validation-loop) - MANDATORY
  # ----------------------------------------
  - name: "UAT Validation Phase"
    execution: sequential
    description: "MANDATORY user acceptance testing - PRIMARY SUCCESS CRITERIA"
    loop: "user-story-validation-loop"
    tasks:
      - id: "UAT_001"
        name: "Orchestrator stop idempotency story"
        description: "Validate: As an orchestrator, I can stop sessions/loops without failure"
        status: "pending"
        agent: "test-user-simulator"
        strategy: "agent-blind-test"
        testing_layers:
          local: true
          docker: true
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/session.py
          - modules/AgenticCLI/src/agenticcli/commands/loop.py
        guidance: |
          User Story: As an orchestrator, I can stop sessions/loops without failure

          Persona: Orchestration system managing multiple agent sessions

          Starting State:
          - CLI installed and accessible
          - Multiple sessions in various states (running, completed, stopped, failed)
          - Multiple loops in various states (running, completed, stopped, failed)
          - Orchestrator has session/loop IDs from previous operations

          User Journey:
          1. Orchestrator lists all sessions: agentic session list
             Expected: See sessions in mixed states

          2. Orchestrator stops running session: agentic session stop <running-id>
             Expected: Session stops successfully, exit 0

          3. Orchestrator stops same session again: agentic session stop <running-id>
             Expected: Success message "already in terminal state", exit 0

          4. Orchestrator stops completed session: agentic session stop <completed-id>
             Expected: Success message "already in terminal state", exit 0

          5. Orchestrator stops failed session: agentic session stop <failed-id>
             Expected: Success message "already in terminal state", exit 0

          6. Repeat steps 1-5 for loops using: agentic loop list, agentic loop stop
             Expected: Same idempotent behavior

          7. Orchestrator bulk cleanup (stop all sessions):
             for id in $(agentic session list -j | jq -r '.[].session_id'); do
               agentic session stop $id
             done
             Expected: All stop commands succeed (exit 0), no errors

          Success Criteria:
          - Stop commands always return exit 0 for terminal states
          - No errors thrown when stopping already-stopped entities
          - Orchestrator can safely call stop multiple times
          - Bulk cleanup operations complete without failure

          Test in both local and Docker environments.
        success_criteria:
          - "All stop operations return exit 0"
          - "No errors for terminal state stops"
          - "Bulk cleanup succeeds"
          - "Behavior consistent across local and Docker"

      - id: "UAT_002"
        name: "Developer bootstrap workflow story"
        description: "Validate: As a developer, I can bootstrap a new plan with a single command"
        status: "pending"
        agent: "test-user-simulator"
        strategy: "agent-blind-test"
        testing_layers:
          local: true
          docker: true
        inputs:
          - modules/AgenticCLI/src/agenticcli/commands/plan.py
          - modules/AgenticGuidance/agents/planner/planner/
        guidance: |
          User Story: As a developer, I can bootstrap a new plan with a single command

          Persona: Developer starting a new feature implementation

          Starting State:
          - CLI installed and accessible
          - In git repository (AgenticEngineering)
          - No existing plan for this feature
          - Has a clear objective in mind

          User Journey:
          1. Developer decides to create a new feature plan
             Objective: "Implement user authentication service"
             Branch: auth-feature

          2. Developer runs bootstrap command:
             agentic plan bootstrap --branch auth-feature \
               --objective "Implement user authentication service"
             Expected: Success message with plan folder name and path

          3. Developer verifies folder structure:
             ls -la docs/plans/live/260205AU_auth_feature/
             Expected: See live/ subfolder

          4. Developer checks plan_build.yml:
             cat docs/plans/live/260205AU_auth_feature/live/plan_build.yml
             Expected:
             - Contains objective
             - Has metadata (name, branch, worktree_path, status, priority)
             - Has PLAN_001 task with agent='planner'

          5. Developer checks stub files:
             ls -la docs/plans/live/260205AU_auth_feature/live/
             Expected: plan_build.yml, plan_test.yml (stub)
             ls -la docs/plans/live/260205AU_auth_feature/
             Expected: plan_completed.yml (stub)

          6. Developer loads planner context:
             agentic context bootstrap --role planner -j
             Expected: Planner role loads successfully, JSON output includes process steps

          7. Developer follows suggested next step:
             Output suggests: "Spawn a planner agent to complete the plan"
             Expected: Clear guidance on what to do next

          Success Criteria:
          - Single command creates complete plan structure
          - All required files present and valid
          - Objective is preserved in plan
          - Next steps are clear and actionable
          - Developer can immediately proceed to planning

          Test in both local and Docker environments.
