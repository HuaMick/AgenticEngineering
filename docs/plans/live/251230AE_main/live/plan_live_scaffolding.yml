# AgenticEngineering Scaffolding Setup Plan
# Created: 2025-12-30
# Purpose: Bootstrap the core scaffolding for Claude Code sessions

worktree: /home/code/AgenticEngineering
branch: main

objective: |
  Set up the foundational scaffolding for AgenticEngineering:
  1. Basic planning system (planning folders + simple plan conventions)
  2. LangSmith tracing integration (capture friction points for maturity analysis)

  This enables the progressive automation loop: Claude Code works → traces capture friction → patterns mature into CLI.

phases:
  - phase: 1
    name: "Planning System Bootstrap"
    status: in_progress
    description: |
      Establish the minimum viable planning system so Claude Code sessions
      have persistent state and can track work across sessions.

    tasks:
      - id: PLAN-001
        status: complete
        description: "Create planning folder structure (live/, completed/, backlog/)"
        acceptance_criteria:
          - "docs/plans/live/ exists"
          - "docs/plans/completed/ exists"
          - "docs/plans/backlog/ exists"
        files:
          - docs/plans/

      - id: PLAN-002
        status: complete
        description: "Create initial plan folder with naming convention (251230AE_main)"
        acceptance_criteria:
          - "Folder follows YYMMDDRepo_Branch convention"
          - "Contains live/ and completed/ subdirectories"
        files:
          - docs/plans/live/251230AE_main/

      - id: PLAN-003
        status: in_progress
        description: "Document plan file conventions in README"
        acceptance_criteria:
          - "Plan YAML schema documented"
          - "Status values documented (pending, in_progress, complete)"
          - "Folder lifecycle documented"
        files:
          - docs/README.md

      - id: PLAN-004
        status: pending
        description: "Create guidance for Claude Code on using planning folders"
        acceptance_criteria:
          - "Claude Code can read current plan state"
          - "Claude Code can update task status"
          - "Claude Code knows where to find/create plans"
        files:
          - guidance/planning.md

  - phase: 2
    name: "LangSmith Tracing Setup"
    status: pending
    description: |
      Configure LangSmith tracing so Claude Code sessions are captured.
      This enables data-driven friction analysis for CLI maturity decisions.

    tasks:
      - id: TRACE-001
        status: pending
        description: "Configure LangSmith project for AgenticEngineering"
        acceptance_criteria:
          - "LangSmith project exists"
          - "API key configured"
          - "Test trace successfully sent"
        files:
          - .env (or config location)

      - id: TRACE-002
        status: pending
        description: "Document tracing conventions"
        acceptance_criteria:
          - "How to view traces documented"
          - "What to look for in friction analysis documented"
          - "How patterns graduate to CLI documented"
        files:
          - docs/README.md

      - id: TRACE-003
        status: pending
        description: "Create friction analysis template"
        acceptance_criteria:
          - "Template for capturing friction points"
          - "Located in planning folder analysis/ subdirectory"
        files:
          - docs/plans/live/251230AE_main/analysis/

  - phase: 3
    name: "Planning Agent Patterns"
    status: pending
    description: |
      Establish patterns for how Claude Code should plan work.
      Not custom agents - conventions for Claude Code to follow.

    tasks:
      - id: PATTERN-001
        status: pending
        description: "Create plan decomposition guidelines"
        acceptance_criteria:
          - "How to break objectives into phases"
          - "When to create new plan files vs update existing"
          - "Phase naming conventions"
        files:
          - guidance/planning.md

      - id: PATTERN-002
        status: pending
        description: "Create task definition guidelines"
        acceptance_criteria:
          - "Task ID conventions"
          - "Acceptance criteria patterns"
          - "Status transition rules"
        files:
          - guidance/planning.md

      - id: PATTERN-003
        status: pending
        description: "Test planning workflow end-to-end"
        acceptance_criteria:
          - "Claude Code can create a plan for a new objective"
          - "Claude Code can execute tasks and update status"
          - "Completed work moves to completed/ correctly"
        files:
          - docs/plans/

notes:
  - "Keep planning simple - Claude Code is the agent, plans are just state"
  - "LangSmith traces will reveal what planning patterns actually help"
  - "Avoid over-engineering - start minimal, add based on friction"
