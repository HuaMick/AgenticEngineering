          Complete _handle_answer, _handle_defer, _handle_more_info, _handle_show
          and the main keypress dispatch loop in run().

          The main loop runs in cbreak mode (see P01_T01). Keypress dispatch:
            key == '\r' (Enter)  --> _handle_answer()
            key == 'd'           --> _handle_defer()
            key == 'm'           --> _handle_more_info()
            key == 's'           --> _handle_show()
            key == arrow/j/k/Tab --> move cursor

          Answer flow (ui_design.md Section 4):
          1. User presses Enter on highlighted question
          2. _handle_answer():
             - Restore line mode: termios.tcsetattr(sys.stdin, TCSADRAIN, old_settings)
             - console.clear()
             - Print full question detail (severity, text, context, asked_by, time)
             - If suggested_answers: show navigable menu (↑↓ + Enter in cbreak)
               OR if freeform: use input() for text (line mode)
             - Confirm: single-keypress y/n/e (back in cbreak)
             - Submit via QuestionQueue(plan_path).answer_question(id, text, answered_by="human")
             - Auto-advance: self.cursor moves to next question
             - Re-enter cbreak: tty.setcbreak(sys.stdin.fileno())

          NOTE on suggested answer navigation: if the question has suggested_answers,
          stay in cbreak mode and let ↑↓ navigate the options, Enter selects, c
          switches to freeform input. Only switch to line mode for freeform typing.

          More info flow (ui_design.md Section 5):
          1. User presses 'm' on highlighted question
          2. _handle_more_info():
             - Restore line mode
             - Show question text briefly
             - Prompt: "What info do you need?"
             - input() for the request text
             - Submit as answer with need_more_info=True:
               QuestionQueue.answer_question(id, f"Need more info: {text}",
                   answered_by="human", confidence=None)
             - The answer YAML should include need_more_info: true
             - Re-enter cbreak

          Defer flow (ui_design.md Section 6):
          1. User presses 'd' on highlighted question
          2. _handle_defer():
             - Stay in cbreak mode (single-keypress y/n)
             - Show: "Defer? [Y/n]"
             - y/Enter: mark_deferred() + write YAML, auto-advance cursor
             - n: cancel, back to list

          Show flow (ui_design.md Section 7):
          1. User presses 's' on highlighted question
          2. _handle_show():
             - console.clear()
             - Print full question detail (read-only)
             - "Press any key to return..."
             - Read single keypress (cbreak), return to list

          Auto-advance after answer/defer:
            After submitting, self.cursor should point to the next pending question.
            If the answered question was the last one, cursor moves up to the new last.
            If no questions remain, show empty state.

          Error handling: if QuestionQueue raises (e.g., question already answered),
          print brief error, wait for keypress, return to list. Never crash the TUI.

