  - US-CLI-061
  - US-CLI-066
  - US-CLI-120

open_questions:
  - id: OQ-1
    text: |
      Should the TUI run in a dedicated tmux window (new window in current session)
      or as a split pane? A window gives more screen space on small Termux screens;
      a pane keeps everything in view simultaneously.
    severity: medium
    context: |
      Termux on Android typically uses small screens. The existing notification pane
      code uses split-window -h (horizontal split, 30%). A dedicated window avoids
      squeezing both the agent and the TUI into one screen.
    decision: "Use a dedicated tmux window named 'questions' for the TUI dashboard."

  - id: OQ-2
    text: |
      Should the TUI support multi-plan view (all live plans) or be scoped to one
      plan at a time? The current dashboard already scans all live plans.
    severity: low
    context: |
      Multi-plan view is more useful because multiple agents may be running concurrently.
      The existing `cmd_dashboard` already scans docs/plans/live/*/questions/pending/*.
    decision: "Multi-plan view (scan all live plans) matching current dashboard behavior."

  - id: OQ-3
    text: |
      Which rendering pattern: Rich Live (start/stop around input), or
      clear-reprint-select (console.clear + print + select.select on stdin)?
    severity: high
    context: |
      Rich Live conflicts with stdin reads. The pause-resume dance is fragile
      on Termux. We need single-keypress navigation (arrow keys, Tab, Enter)
      for a navigable list. This requires tty.setcbreak() mode. Rich Live is
      incompatible with cbreak mode.
    decision: |
      Use cbreak mode (tty.setcbreak) for single-keypress navigation +
      Rich Console for rendering (clear + print). Restore line mode for
      freeform text input. No Rich Live. See ui_design.md Sections 3 and 8.

  - id: OQ-4
    text: |
      How should iterative Q&A work when the user needs more information
      before answering a question?
    severity: medium
    context: |
      Some questions require context the agent hasn't provided. The user
      needs a way to say "I need more info about X" and have the agent
      respond with clarification (possibly as a new follow-up question).
    decision: |
      Add 'm' key action (more info). Submits answer with need_more_info: true
      flag. Agent reads this flag, provides clarification as a new question.
      TUI auto-refreshes to show the follow-up. See ui_design.md Section 5.

