      - id: "P05_T09"
        name: "Fix missing ProcessStateRegistry for watch-daemon/watch-stop"
        status: "pending"
        priority: "critical"
        agent: "build-python"
        inputs:
          - "/home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/question.py"
          - "/home/code/AgenticEngineering/modules/AgenticGuidance/src/agenticguidance/services/state.py"
          - "/home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/state.py"
        target_files:
          - "/home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/question.py"
        guidance: |
          UAT CRITICAL FAILURE (US-CLI-066, US-CLI-067): watch-daemon and watch-stop
          are completely broken because question.py imports ProcessStateRegistry from
          agenticcli.services.state -- a module that does not exist.

          Investigation results:
          - agenticcli/services/__init__.py: empty stub -- no ProcessStateRegistry here
          - agenticcli/commands/state.py: exists but uses StateRegistry (from
            agenticguidance.services), NOT ProcessStateRegistry
          - agenticguidance/services/state.py: defines StateRegistry (not ProcessStateRegistry)
          - ProcessStateRegistry does not exist anywhere in the codebase

          The correct class is StateRegistry from agenticguidance.services.state.
          However, its API is DIFFERENT from what question.py expects for ProcessStateRegistry.

          question.py's usage of ProcessStateRegistry (wrong API, must be replaced):
            Line 847:  registry.get_state(state_key)          # returns dict or None
            Line 850:  state.get("pid", "unknown")            # dict access
            Line 864:  registry.get_state(state_key)          # returns dict or None
            Line 867:  state.get("pid", "unknown")            # dict access
            Line 912:  registry.list_processes()              # returns {key: state_dict}
            Line 936:  registry.mark_stopped(state_key)       # update by string key
            Line 980:  ProcessStateRegistry()                 # constructor
            Line 985:  registry.get_state(state_key)          # returns dict or None
            Line 1009: registry.mark_stopped(state_key)       # update by string key
            Line 1037: registry.register_process(key, pid, metadata=...) # register by key+pid
            Line 1009: registry.mark_stopped(state_key)       # update by string key

          StateRegistry (correct class) API:
            StateRegistry()                          # constructor (no args needed)
            registry.register(name, command, metadata) -> ProcessEntry  # uses os.getpid()
            registry.get(pid: int) -> ProcessEntry | None
            registry.list_all() -> list[ProcessEntry]
            registry.list_active() -> list[ProcessEntry]
            registry.update_state(pid, state=ProcessState.STALE)
            ProcessEntry.pid, .name, .command, .state, .metadata, .started_at, .ended_at

          The watch-daemon pattern needs to be rewritten to use StateRegistry's PID-keyed
          API instead of a string-key API. The daemon PID is the natural key.

          Full fix strategy for cmd_watch_daemon (lines 831-886) and _ensure_watch_daemon
          (lines 954-1056):

          1. Replace all imports of ProcessStateRegistry with StateRegistry:
               from agenticguidance.services.state import StateRegistry, ProcessState

          2. In cmd_watch_daemon (lines 845-873): Replace ProcessStateRegistry usage.
             Instead of get_state(state_key) -> dict, after _ensure_watch_daemon()
             returns (True, "started"), the PID is in the Popen process. The simplest
             fix for the success message is to not look up via registry at all:
               print_success("Question watcher started in background")
             (Remove the registry PID lookup in cmd_watch_daemon -- it's cosmetic only.)

          3. In _ensure_watch_daemon (lines 954-1056): Replace ProcessStateRegistry:

             Replace:
               from agenticcli.services.state import ProcessStateRegistry
               registry = ProcessStateRegistry()
               existing_state = registry.get_state(state_key)
               if existing_state and existing_state.get("status") == "running":
                   pid = existing_state.get("pid")
                   ...os.kill(pid, 0)...
                   registry.mark_stopped(state_key)
               registry.register_process(state_key, process.pid, metadata={...})
               registry.mark_stopped(state_key)

             With StateRegistry (PID-keyed):
               from agenticguidance.services.state import StateRegistry, ProcessState
               registry = StateRegistry()
               # Check for existing running watcher by scanning active entries
               active = registry.list_active()
               watcher_entries = [e for e in active
                                  if e.name == f"question_watcher_{plan_path.name}"]
               if watcher_entries:
                   existing = watcher_entries[0]
                   try:
                       os.kill(existing.pid, 0)  # PID still alive?
                       return (False, "already_running")
                   except (ProcessLookupError, OSError):
                       registry.update_state(existing.pid, state=ProcessState.STALE)
               # ... start process ...
               registry.register(
                   name=f"question_watcher_{plan_path.name}",
                   command="question watch-daemon",
                   metadata={"plan_path": str(plan_path), "plan_name": plan_path.name},
               )
               # Note: register() uses os.getpid() -- but we need the child PID.
               # Since the daemon runs as a subprocess, we cannot register it from
               # the parent. Instead, skip registry registration for now and rely
               # on cmd_watch_stop scanning by process name using psutil or /proc.

          4. For cmd_watch_stop (lines 889-951): Replace ProcessStateRegistry.
             The simplest approach that avoids the keyed-registry mismatch is to use
             StateRegistry.list_active() and filter by name prefix:
               from agenticguidance.services.state import StateRegistry, ProcessState
               registry = StateRegistry()
               registry.cleanup_dead_processes()
               active = registry.list_active()
               watcher_entries = [e for e in active
                                  if e.name.startswith("question_watcher_")]

             Then stop each watcher using os.kill(entry.pid, signal.SIGTERM) and
             registry.update_state(entry.pid, state=ProcessState.COMPLETED).

          5. The ntfy check in _ensure_watch_daemon (line 973-976) requires ntfy config
             to start the daemon. This is wrong since ntfy is removed. Remove the
             ntfy_not_configured guard entirely -- the daemon should start regardless
             of ntfy config. Change:
               config = _get_ntfy_config()
               if not config:
                   return (False, "ntfy_not_configured")
             To simply remove those 3 lines (no ntfy gate needed).

          6. Also fix cmd_watch_daemon (line 876-881) which exits with error if
             reason == "ntfy_not_configured". After removing that gate in
             _ensure_watch_daemon, this branch can no longer be reached, but
             remove it anyway for hygiene.

          After these changes, watch-daemon will start without needing ntfy config,
          and watch-stop will stop watchers by PID using StateRegistry.list_active().
        success_criteria:
          - "watch-daemon starts successfully (no import error)"
          - "watch-daemon does not require ntfy to be configured"
          - "watch-stop stops running watchers without error"
          - "watch-stop exits cleanly (exit code 0) when no daemon is running"
          - "No import of ProcessStateRegistry anywhere in commands/question.py"
          - "`from agenticguidance.services.state import StateRegistry` used instead"

