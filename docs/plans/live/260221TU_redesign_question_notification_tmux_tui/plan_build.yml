            def cmd_dashboard(args, ctx=None):
                import subprocess
                from agenticcli.utils.tmux import is_in_tmux, session_exists
                from agenticcli.tui.question_tui import QuestionTUI

                refresh = getattr(args, "refresh", 5)
                no_window = getattr(args, "no_tmux_window", False)
                repo_root = _get_repo_root()

                if is_in_tmux() and not no_window:
                    # Launch TUI in a dedicated tmux window named 'questions'
                    _launch_tui_in_tmux_window(repo_root, refresh)
                else:
                    # Run TUI directly in current terminal
                    tui = QuestionTUI(repo_root=repo_root, refresh_seconds=refresh)
                    tui.run()

          Add `_launch_tui_in_tmux_window(repo_root, refresh)` as a module-level helper:

            def _launch_tui_in_tmux_window(repo_root: Path, refresh: int) -> None:
                import subprocess
                WINDOW_NAME = "questions"
                # Check if 'questions' window already exists in current session
                result = subprocess.run(
                    ["tmux", "list-windows", "-F", "#{window_name}"],
                    capture_output=True, text=True
                )
                existing = result.stdout.strip().split("\n") if result.returncode == 0 else []
                if WINDOW_NAME in existing:
                    # Switch to it
                    subprocess.run(["tmux", "select-window", "-t", WINDOW_NAME])
                else:
                    # Create new window and run TUI inside it
                    subprocess.run([
                        "tmux", "new-window", "-n", WINDOW_NAME,
                        f"agentic question dashboard --no-tmux-window --refresh {refresh}"
                    ])

          Add `_get_repo_root()` as module-level helper (extract from existing build_table() logic):

            def _get_repo_root() -> Path:
                import subprocess
                try:
                    result = subprocess.run(
                        ["git", "rev-parse", "--show-toplevel"],
                        capture_output=True, text=True, check=True,
                    )
                    return Path(result.stdout.strip())
                except (subprocess.CalledProcessError, FileNotFoundError):
                    return Path.cwd()

