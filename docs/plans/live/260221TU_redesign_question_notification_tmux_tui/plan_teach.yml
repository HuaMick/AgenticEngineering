      - id: "G01_T01"
        name: "Document TUI technology choice rationale"
        status: "pending"
        priority: "medium"
        agent: "build-python"
        inputs:
          - "/home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py"
        target_files:
          - "/home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/tui/question_tui.py"
        guidance: |
          Add a detailed module docstring to question_tui.py explaining:

          1. Why Rich Live was chosen over Textual:
             - Textual requires a proper TTY with full terminal control sequences.
               In some Termux + tmux combinations the PTY handling is limited,
               causing Textual apps to render incorrectly or fail to accept input.
             - Rich Live works over any terminal that supports ANSI codes, including
               Termux on Android and SSH sessions.
             - Rich is already a dependency; adding Textual would increase install size.

          2. The answer-input design (pause-Live, input(), resume-Live):
             - Rich Live and stdin input cannot run concurrently in the same thread.
             - Stopping/restarting Live around input() is the simplest approach that
               works on all terminals including SSH/Termux.
             - An alternative (background refresh thread + main thread input) is more
               complex and has race conditions on some terminals.

          3. The tmux window design:
             - Using a dedicated tmux window (not a split pane) gives maximum screen
               space on the small Termux screen.
             - The launcher creates the window the first time and switches focus to
               it; on subsequent calls it simply switches focus (idempotent).

          The docstring should be written in plain prose, not bullet lists, and kept
          under 40 lines.

        success_criteria:
          - "question_tui.py module docstring explains Rich vs Textual choice"
          - "Docstring explains the pause-Live input pattern"
          - "Docstring explains the tmux window design decision"
          - "Docstring is under 40 lines"

guidance_notes:
  tui_pattern: |
    The canonical pattern for a Rich-Live TUI in this codebase:

      with Live(build_layout(), console=console, refresh_per_second=1) as live:
          while True:
              # Pause for input
              live.stop()
              choice = input("Enter choice: ").strip()
              live.start()

              if choice == "q":
                  break
              # handle choice...
              live.update(build_layout())

