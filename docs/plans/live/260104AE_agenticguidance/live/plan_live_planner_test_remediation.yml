# Guidance Remediation Plan - planner-test Context Overload
# Agent: planner-test
# Source: audit_planner_test.yml (12 issues, context 15-20%, 42 files loaded)
# Created: 2026-01-07
# Purpose: Reduce context overload through consolidation, de-duplication, and selective loading

plan_metadata:
  plan_name: "planner-test Context Overload Remediation"
  target_agent: "planner-test"
  audit_source: "docs/plans/live/260104AE_agenticguidance/live/audit_planner_test.yml"
  worktree: "/home/code/AgenticEngineering-agenticguidance"
  created: "2026-01-07"
  objective: |
    Reduce planner-test context window usage from 15-20% by addressing 12 identified issues:
    - 1 HIGH: Stale NOT_MIGRATED agent references
    - 5 MEDIUM: Redundant/duplicated content
    - 6 LOW: Organizational improvements

# ==============================================================================
# QUESTIONS FOR USER - Decisions Required Before Phase 1
# ==============================================================================
questions_for_user:
  - id: Q1
    category: "HIGH - Stale References"
    question: |
      The manifest.yml references 3 NOT_MIGRATED agents at legacy paths:
      - test-user-simulator (modules/legacy/MyAgents/.../test-user-simulator/process.yml)
      - test-service (modules/legacy/MyAgents/.../test-service/process.yml)
      - test-builder (modules/legacy/MyAgents/.../test-builder/process.yml)

      Options:
      A) Migrate these agents to AgenticGuidance now (creates additional work)
      B) REMOVE references entirely - DELETE all stale refs, not deprecate
      C) Update to document as "DEPRECATED - not available" and remove from mappings
      D) Keep as-is with verified paths to legacy location (if legacy still accessible)
    impact: "HIGH - Determines whether test plans can reference agent-blind-test and service_test strategies"
    default_recommendation: "B - REMOVE all stale references entirely (user decision: remove, not deprecate)"
    user_decision: "REMOVE entirely - do NOT deprecate, DELETE all stale references"

  - id: Q2
    category: "MEDIUM - Strategy Loading"
    question: |
      testing.yml references all 8 strategy-*.yml files in its inputs section.
      Planner-test also loads all 8 in core_inputs.

      Options:
      A) Keep loading all 8 (maintains comprehensive context but high token cost)
      B) Load only relevant strategies per task (requires dynamic loading logic)
      C) Create strategy-index.yml with brief summaries, load full files only when selected
      D) Consolidate strategies into testing.yml (reduces file count but increases single file size)
    impact: "MEDIUM - Affects ~1100 tokens per strategy file (8800 total for all 8)"
    default_recommendation: "C - Create index file; load full strategy only when task specifies that strategy"

  - id: Q3
    category: "MEDIUM - Example File Size"
    question: |
      plan_live_test.yml example is 437 lines with detailed guidance blocks.

      Options:
      A) Keep full example (maintains comprehensive reference but 4500 tokens)
      B) Create skeleton example (~100 lines) + separate detailed-scenarios reference
      C) Move detailed content to guideline, keep example as minimal structure
      D) Create multiple small examples per scenario type (component, user-flow, dynamic-build)
    impact: "MEDIUM - Single largest file at ~4500 tokens"
    default_recommendation: "B - Skeleton structure example + optional detailed scenarios file"

  - id: Q4
    category: "LOW - Core Layer Files"
    question: |
      Core layers (core-system.yml + core-guidelines.yml) load 13 files for ALL agents.
      Some may be unnecessary for planner-test specifically (e.g., entrypoints.yml, domains.yml).

      Options:
      A) AUDIT each agent type to discover which core files they actually use
      B) Create specialized planner-core.yml layer with only needed files
      C) Make some core files "optional" based on agent category
      D) Leave for future optimization (low severity, high risk of breaking changes)
    impact: "LOW - Potentially ~3000 tokens of unnecessary context"
    default_recommendation: "A - AUDIT each agent type to discover which core files they actually use"
    user_decision: "U2: Use approach (a) - AUDIT each agent type to discover which core files they actually use"

# ==============================================================================
# PHASE 1: HIGH Priority - Stale Reference Resolution
# ==============================================================================
phases:
  - name: "phase-1-stale-reference-removal"
    description: "REMOVE HIGH severity stale NOT_MIGRATED agent references entirely"
    status: "pending"
    depends_on: ["Q1 decision"]
    agent_category: "teacher"
    success_criteria:
      - "All stale NOT_MIGRATED agent references REMOVED entirely from manifest.yml"
      - "No broken references in test_process_mapping section"
      - "Clear documentation of which test strategies are currently available"

    tasks:
      - id: "1.1"
        description: "Verify legacy path accessibility"
        agent_type: "test-final-output"
        operation: "AUDIT"
        status: "pending"
        context:
          scope: "Verify existence of legacy paths referenced in planner-test/manifest.yml"
          paths_to_check:
            - "modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/test/test-user-simulator/process.yml"
            - "modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/test/test-service/process.yml"
            - "modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/test/test-builder/process.yml"
        guidance: |
          Check if the legacy directory structure exists and is accessible.
          Document findings: paths exist / paths do not exist / directory structure changed.
        acceptance_criteria:
          - "Documented which legacy paths exist"
          - "Clear recommendation based on findings"
        files:
          - "agents/planner/planner-test/manifest.yml"

      - id: "1.2"
        description: "REMOVE stale NOT_MIGRATED agent references from manifest.yml entirely"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        status: "pending"
        depends_on: ["1.1", "Q1 decision"]
        context:
          target_file: "agents/planner/planner-test/manifest.yml"
          section: "test_process_mapping"
          current_state: |
            Mapping includes NOT_MIGRATED agents:
            - agent-blind-test: agents/test/test-user-simulator/process.yml (NOT_MIGRATED)
            - service_test: agents/test/test-service/process.yml (NOT_MIGRATED)
            - test-builder: agents/test/test-builder/process.yml (NOT_MIGRATED)
          required_changes: |
            REMOVE all stale NOT_MIGRATED references entirely:
            - REMOVE agent-blind-test entry completely
            - REMOVE service_test entry completely
            - REMOVE test-builder entry completely
            Do NOT deprecate - DELETE the entries from test_process_mapping.
        acceptance_criteria:
          - "All stale NOT_MIGRATED references REMOVED entirely from manifest.yml"
          - "No broken path references remain"
          - "Planner-test only references strategies that actually exist"
        files:
          - "agents/planner/planner-test/manifest.yml"

      - id: "1.3"
        description: "REMOVE stale references from inputs.yml entirely"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        status: "pending"
        depends_on: ["1.2"]
        context:
          target_file: "agents/planner/planner-test/inputs.yml"
          section: "core_inputs comments"
          current_state: |
            Comment says: "# NOT_MIGRATED: test-user-simulator - see modules/legacy/..."
            but the reference is commented out and may be misleading.
          required_changes:
            - "REMOVE all NOT_MIGRATED comments and references entirely"
            - "REMOVE any legacy path references completely"
            - "Do NOT keep deprecated notes - DELETE them"
        acceptance_criteria:
          - "All stale NOT_MIGRATED references REMOVED entirely from inputs.yml"
          - "No legacy path references remain"
          - "inputs.yml only references strategies that actually exist"
        files:
          - "agents/planner/planner-test/inputs.yml"

  # ==============================================================================
  # PHASE 2: MEDIUM Priority - Redundancy Consolidation
  # ==============================================================================
  - name: "phase-2-redundancy-consolidation"
    description: "Consolidate duplicated content across definition and guideline files"
    status: "pending"
    depends_on: ["phase-1-stale-reference-resolution"]
    agent_category: "teacher"
    success_criteria:
      - "Loop definitions exist in single authoritative source"
      - "Plan folder definitions exist in single authoritative source"
      - "test-creation-principles references reward-hacking instead of duplicating"
      - "Reduced total file content through consolidation"

    tasks:
      - id: "2.1"
        description: "Consolidate loop definitions - make agent-loops.yml authoritative"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        status: "pending"
        context:
          authoritative_file: "assets/definitions/agent-loops.yml"
          duplicate_file: "assets/guidelines/iteration.yml"
          overlap_content: |
            Both define test-fix-loop, audit-test-fix-loop, cleaner-voting-loop, documentation-loop.
            agent-loops.yml has loop_types section with purpose, phase, when_to_use, core_pattern.
            iteration.yml rules section duplicates with execution_pattern and characteristics.
          required_changes:
            - "agent-loops.yml becomes authoritative source for loop definitions"
            - "iteration.yml references agent-loops.yml instead of duplicating"
            - "iteration.yml keeps only behavioral rules that ADD to definitions (not repeat)"
        guidance: |
          Principle: Single Source of Truth
          - agent-loops.yml: WHAT loops exist, WHEN to use them
          - iteration.yml: HOW agents should BEHAVE in loops (adds context, doesn't repeat)

          Edit iteration.yml:
          1. Add reference to agent-loops.yml at top
          2. Remove rules that merely describe loop structure (already in agent-loops.yml)
          3. Keep rules about agent behavior, context handling, failure patterns
        acceptance_criteria:
          - "agent-loops.yml contains complete loop definitions"
          - "iteration.yml references agent-loops.yml for loop definitions"
          - "iteration.yml adds behavioral context without duplicating structure"
          - "Estimated reduction: ~50 lines from iteration.yml"
        files:
          - "assets/definitions/agent-loops.yml"
          - "assets/guidelines/iteration.yml"

      - id: "2.2"
        description: "Consolidate plan folder definitions - make plans.yml authoritative"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        status: "pending"
        context:
          authoritative_file: "assets/definitions/plans.yml"
          duplicate_file: "assets/definitions/folder-structure.yml"
          overlap_content: |
            folder-structure.yml explicitly notes "see assets/definitions/plans.yml (the authoritative source)"
            but then duplicates plans_live, plans_completed definitions.
          required_changes:
            - "folder-structure.yml removes plan-related folder definitions"
            - "folder-structure.yml keeps only non-plan folders (agent_logs, general paths)"
            - "folder-structure.yml references plans.yml for plan folder structure"
        guidance: |
          folder-structure.yml already acknowledges plans.yml as authoritative.
          Complete the consolidation:
          1. Remove folders.plans_root, folders.plans_live, folders.plans_completed, folders.plans_backlog
          2. Add explicit reference: "For plan folder structure, see plans.yml"
          3. Keep only path_conventions and agent_logs sections
        acceptance_criteria:
          - "folder-structure.yml contains no plan folder definitions"
          - "folder-structure.yml references plans.yml for plan structure"
          - "plans.yml is sole source for plan folder conventions"
          - "Estimated reduction: ~40 lines from folder-structure.yml"
        files:
          - "assets/definitions/folder-structure.yml"
          - "assets/definitions/plans.yml"

      - id: "2.3"
        description: "Update test-creation-principles to reference reward-hacking.yml"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        status: "pending"
        context:
          target_file: "assets/definitions/test-creation-principles.yml"
          duplicate_source: "assets/definitions/reward-hacking.yml"
          overlap_content: |
            test-creation-principles.yml section 2 "Avoid reward hacking patterns" lists:
            - Don't mock the behavior being tested
            - Don't use overly permissive assertions
            - Include negative test cases
            - Don't check --help text only
            reward-hacking.yml has same patterns plus additional detail.
          required_changes:
            - "Section 2 references reward-hacking.yml instead of listing patterns"
            - "Keep principle header, remove duplicated bullet points"
        guidance: |
          Replace section 2 content:
          FROM:
            2. Avoid reward hacking patterns:
               - Don't mock the behavior being tested
               - Don't use overly permissive assertions
               [etc...]

          TO:
            2. Avoid reward hacking patterns:
               - See assets/definitions/reward-hacking.yml for detailed patterns and prevention
        acceptance_criteria:
          - "test-creation-principles.yml references reward-hacking.yml for anti-patterns"
          - "No duplicated content between files"
          - "Estimated reduction: ~10 lines from test-creation-principles.yml"
        files:
          - "assets/definitions/test-creation-principles.yml"

      - id: "2.4"
        description: "Implement selective strategy loading (pending Q2 decision)"
        agent_type: "teacher-update-assets"
        operation: "CREATE_OR_UPDATE"
        status: "pending"
        depends_on: ["Q2 decision"]
        context:
          if_Q2_C_selected: |
            Create assets/definitions/strategy-index.yml with brief summaries:
            - strategy name
            - one-line purpose
            - when to use
            - full file path for detailed loading

            Update planner-test/inputs.yml to load index instead of all 8 strategy files.
            Update testing.yml to reference index.
          guidance_for_index: |
            Structure:
            strategies:
              agent-blind-test:
                purpose: "Documentation validation through blind testing"
                when: "Proving documentation enables task completion"
                detail_file: "assets/definitions/strategy-agent-blind-test.yml"
              [repeat for each strategy]
        acceptance_criteria:
          - "If Q2=C: strategy-index.yml exists with all 8 strategies indexed"
          - "If Q2=C: planner-test loads index, not all 8 files"
          - "If Q2=A: No changes (documented decision to keep full loading)"
          - "Estimated reduction if Q2=C: ~7000 tokens (loading index instead of 8 files)"
        files:
          - "assets/definitions/strategy-index.yml (if created)"
          - "agents/planner/planner-test/inputs.yml"
          - "assets/guidelines/testing.yml"

  # ==============================================================================
  # PHASE 3: MEDIUM Priority - Example File Optimization
  # ==============================================================================
  - name: "phase-3-example-optimization"
    description: "Reduce example file size while maintaining reference value"
    status: "pending"
    depends_on: ["Q3 decision"]
    agent_category: "teacher"
    success_criteria:
      - "Primary example file under 150 lines"
      - "Detailed scenarios preserved in optional reference"
      - "Example demonstrates structure, not comprehensive content"

    tasks:
      - id: "3.1"
        description: "Create skeleton test plan example (pending Q3 decision)"
        agent_type: "teacher-update-assets"
        operation: "CREATE_OR_UPDATE"
        status: "pending"
        depends_on: ["Q3 decision"]
        context:
          if_Q3_B_selected: |
            Create minimal skeleton example showing:
            - Plan metadata structure
            - Phase structure with execution_groups
            - Single component test agent (not 7)
            - Single user flow test agent (not 3)
            - Dynamic build agent pattern (brief)
            - Success criteria format

            Move detailed scenarios to:
            assets/examples/planner/YYMMDDRepo_Branch/reference/test-scenarios-detailed.yml
          target_skeleton: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
          target_detailed: "assets/examples/planner/YYMMDDRepo_Branch/reference/test-scenarios-detailed.yml"
        guidance: |
          Skeleton should be ~100 lines showing:
          - worktree, liveplan, completedplan metadata
          - One phase with test-fix-loop execution group
          - One component test agent with brief guidance
          - One user flow test agent with brief guidance
          - One dynamic build agent pattern
          - Success criteria structure

          Comment in skeleton: "For detailed test scenarios, see reference/test-scenarios-detailed.yml"
        acceptance_criteria:
          - "If Q3=B: Skeleton example under 150 lines"
          - "If Q3=B: Detailed scenarios in separate reference file"
          - "If Q3=A: Document decision to keep full example"
          - "Estimated reduction if Q3=B: ~3500 tokens"
        files:
          - "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
          - "assets/examples/planner/YYMMDDRepo_Branch/reference/test-scenarios-detailed.yml (if created)"

  # ==============================================================================
  # PHASE 4: LOW Priority - Organizational Improvements
  # ==============================================================================
  - name: "phase-4-organizational-improvements"
    description: "Address LOW severity organizational issues"
    status: "pending"
    depends_on: ["phase-2-redundancy-consolidation"]
    agent_category: "teacher"
    success_criteria:
      - "testing-types.yml serves as index to strategy files"
      - "MMD files removed from inputs or clearly documented as visual-only"
      - "Small test definition files consolidated where beneficial"

    tasks:
      - id: "4.1"
        description: "Update testing-types.yml to be index pointing to strategies"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        status: "pending"
        context:
          target_file: "assets/definitions/testing-types.yml"
          current_state: |
            Defines smoke_test, user_simulator, service_test, end2end, audit
            with inline descriptions that overlap strategy files.
          required_changes:
            - "Keep brief type definitions (1-2 lines each)"
            - "Add 'detail: strategy-*.yml' reference for each type"
            - "Remove content that duplicates strategy files"
        guidance: |
          Structure:
          Types of testing:
          - smoke_test: Early validation. Detail: strategy-user-simulation.yml
          - user_simulator: User story validation. Detail: strategy-agent-blind-test.yml
          [etc.]
        acceptance_criteria:
          - "testing-types.yml is brief index, not duplicate content"
          - "Each type points to relevant strategy file"
          - "Estimated reduction: ~10 lines"
        files:
          - "assets/definitions/testing-types.yml"

      - id: "4.2"
        description: "Remove MMD files from planner-test inputs (or document visual-only)"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        status: "pending"
        context:
          target_file: "agents/planner/planner-test/inputs.yml"
          files_to_address:
            - "assets/examples/planner/components/test_phase.mmd"
            - "assets/examples/planner/components/uat_phase.mmd"
          issue: |
            MMD diagram files provide visual reference but are not actionable
            for YAML plan generation. Currently marked required: false.
          options:
            - "Remove from inputs.yml entirely (cleanest)"
            - "Move to documentation section with note: 'Visual reference only, not for context loading'"
        acceptance_criteria:
          - "MMD files either removed from inputs or clearly documented as non-loading references"
          - "No tokens spent loading visual-only files"
        files:
          - "agents/planner/planner-test/inputs.yml"

      - id: "4.3"
        description: "Update user-stories.yml to be canonical, manifest.yml to reference"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        status: "pending"
        context:
          canonical_file: "assets/definitions/user-stories.yml"
          referencing_file: "agents/planner/planner-test/manifest.yml"
          overlap: "Both explain user story directory structure and spawning patterns"
          required_changes:
            - "manifest.yml mandatory_user_stories section references user-stories.yml"
            - "Remove duplicated directory structure explanation from manifest.yml"
        acceptance_criteria:
          - "user-stories.yml is single source for user story structure"
          - "manifest.yml references it instead of duplicating"
          - "Estimated reduction: ~15 lines from manifest.yml"
        files:
          - "assets/definitions/user-stories.yml"
          - "agents/planner/planner-test/manifest.yml"

      - id: "4.4"
        description: "Consider consolidating small test definition files"
        agent_type: "teacher-update-assets"
        operation: "EVALUATE"
        status: "pending"
        context:
          files_to_consider:
            - "assets/definitions/test-builder-role.yml (22 lines)"
            - "assets/definitions/test-structure.yml (27 lines)"
            - "assets/definitions/test-creation-principles.yml (36 lines)"
          evaluation_criteria: |
            Consolidation makes sense if:
            - Files are always loaded together
            - Content is closely related
            - Consolidation doesn't create a single huge file
            - File names wouldn't become misleading
        guidance: |
          Evaluate whether consolidating to test-creation.yml is beneficial.
          Consider:
          - Are these always loaded together? (Yes - via test-shared.yml)
          - Are they closely related? (Yes - all about test creation)
          - Would consolidation help or hurt discoverability?

          If consolidating:
          - Create test-creation.yml with three sections: role, structure, principles
          - Update test-shared.yml to reference single file
          - Remove old files
        acceptance_criteria:
          - "Decision documented with rationale"
          - "If consolidating: single test-creation.yml with clear sections"
          - "If not consolidating: documented reason to keep separate"
        files:
          - "assets/definitions/test-builder-role.yml"
          - "assets/definitions/test-structure.yml"
          - "assets/definitions/test-creation-principles.yml"
          - "assets/inputs/test-shared.yml"

  # ==============================================================================
  # PHASE 5: T4 Cross-cutting - Specialized Core Layer Audit (User Decision U1)
  # ==============================================================================
  - name: "phase-5-specialized-core-layer-audit"
    description: "AUDIT planner-test agent to discover which core files it actually uses, then create specialized core layers"
    status: "pending"
    depends_on: ["phase-4-organizational-improvements", "Q4 decision"]
    agent_category: "teacher"
    user_decision_ref: "U1: distributed implementation - audit each agent type"
    success_criteria:
      - "Complete audit of which core files planner-test actually uses"
      - "Specialized planner-core-guidelines.yml created with only needed files"
      - "Specialized planner-core-system.yml created with only needed files"
      - "planner-test updated to use specialized layers instead of generic core layers"

    tasks:
      - id: "5.1"
        description: "AUDIT planner-test agent to discover which core files it actually uses"
        agent_type: "test-final-output"
        operation: "AUDIT"
        status: "pending"
        context:
          scope: "Analyze planner-test agent behavior to determine which core files are actually referenced/used"
          current_core_files: |
            core-guidelines.yml loads:
            - assets/guidelines/*.yml (all guideline files)
            core-system.yml loads:
            - assets/definitions/*.yml (all definition files)
            Total: ~13 files loaded for ALL agents
          audit_approach: |
            User Decision U2: Use approach (a) - AUDIT each agent type to discover actual usage
            1. Trace planner-test process.yml execution patterns
            2. Identify which guideline files are actually referenced in planner-test behavior
            3. Identify which definition files are actually used by planner-test
            4. Document findings: USED vs UNUSED core files for planner-test
          expected_unused_candidates:
            - "entrypoints.yml (planner doesn't spawn at entrypoints)"
            - "domains.yml (planner doesn't need domain boundaries)"
            - "Potentially others discovered during audit"
        guidance: |
          Perform systematic audit of planner-test:
          1. Read planner-test/process.yml to understand agent behavior
          2. Trace which definitions are referenced in manifest.yml
          3. Trace which guidelines are referenced in agent behavior
          4. Create categorized list: REQUIRED, OPTIONAL, UNUSED
        acceptance_criteria:
          - "Complete list of core files categorized as REQUIRED/OPTIONAL/UNUSED"
          - "Rationale documented for each categorization"
          - "Estimated token savings calculated"
        files:
          - "agents/planner/planner-test/process.yml"
          - "agents/planner/planner-test/manifest.yml"
          - "agents/planner/planner-test/inputs.yml"
          - "assets/inputs/core-guidelines.yml"
          - "assets/inputs/core-system.yml"

      - id: "5.2"
        description: "Create specialized planner-core-guidelines.yml with only needed files"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        status: "pending"
        depends_on: ["5.1"]
        context:
          target_file: "assets/inputs/planner-core-guidelines.yml"
          based_on: "assets/inputs/core-guidelines.yml"
          purpose: |
            Create specialized core guidelines layer for planner agents that only includes
            the guideline files actually used by planner-test (based on 5.1 audit results).
          structure: |
            # Specialized Core Guidelines for Planner Agents
            # Based on audit of planner-test actual usage (task 5.1)
            # Reduces context by excluding unused guideline files

            layer_inputs:
              - path: assets/guidelines/[REQUIRED_FILE_1].yml
                required: true
              - path: assets/guidelines/[REQUIRED_FILE_2].yml
                required: true
              # ... only files identified as REQUIRED in audit
        acceptance_criteria:
          - "planner-core-guidelines.yml created"
          - "Only includes guideline files identified as REQUIRED in audit"
          - "Excludes files identified as UNUSED"
          - "Well-documented with audit rationale"
        files:
          - "assets/inputs/planner-core-guidelines.yml (to create)"
          - "assets/inputs/core-guidelines.yml (reference)"

      - id: "5.3"
        description: "Create specialized planner-core-system.yml with only needed files"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        status: "pending"
        depends_on: ["5.1"]
        context:
          target_file: "assets/inputs/planner-core-system.yml"
          based_on: "assets/inputs/core-system.yml"
          purpose: |
            Create specialized core system layer for planner agents that only includes
            the definition files actually used by planner-test (based on 5.1 audit results).
          structure: |
            # Specialized Core System for Planner Agents
            # Based on audit of planner-test actual usage (task 5.1)
            # Reduces context by excluding unused definition files

            layer_inputs:
              - path: assets/definitions/[REQUIRED_FILE_1].yml
                required: true
              - path: assets/definitions/[REQUIRED_FILE_2].yml
                required: true
              # ... only files identified as REQUIRED in audit
        acceptance_criteria:
          - "planner-core-system.yml created"
          - "Only includes definition files identified as REQUIRED in audit"
          - "Excludes files identified as UNUSED"
          - "Well-documented with audit rationale"
        files:
          - "assets/inputs/planner-core-system.yml (to create)"
          - "assets/inputs/core-system.yml (reference)"

      - id: "5.4"
