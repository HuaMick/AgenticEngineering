# Unified Plan: AgenticGuidance Orchestration Refinement
# Plan: 260104AE_agenticguidance
# Objective: Consolidate remaining tasks for CLI offloading and MMD orchestration

name: agenticguidance-refinement
worktree_path: /home/code/AgenticEngineering-agenticguidance
branch: agenticguidance
status: active
priority: high

context: |
  This plan consolidated the remaining tasks from the previous build and remediation phases.
  The focus is on offloading deterministic logic to the agentic-cli and implementing
  dynamic orchestration via Mermaid diagrams.

  UPDATE 2026-01-06: Agent self-review testing revealed critical friction patterns that
  must be addressed before proceeding with remaining phases. A Friction Remediation phase
  has been added to fix blocking issues.

  UPDATE 2026-01-06 (session 2): Friction Remediation phase COMPLETED. All 7 tasks done:
  - rem_cp001: Path semantics clarified in inputs.yml files
  - rem_cp002: Required inputs sections added to 4 agents
  - rem_hp001: Loop context added to test-audit and orchestration-guidance
  - rem_hp002: Output schemas defined for 3 agents
  - rem_hp003: Fragment reference syntax documented in new definition file
  - rem_mp001: Excessive context loading removed from teacher-update-guidance
  - rem_mp002: Version numbers aligned to 2.0 with documented scheme

  NEXT: Resume with Phase 1 (CLI Offloading) in fresh session.

phases:
  # ========================================
  # FRICTION REMEDIATION PHASE (Priority)
  # Added after agent self-review testing revealed critical issues
  # ========================================
  - name: Friction Remediation
    execution: sequential
    description: "Address critical friction patterns found during agent self-review testing"
    priority: critical
    audit_ref: "audit/260106_agent_self_review_results.yml"
    tasks:
      # CRITICAL Issues
      - id: "rem_cp001"
        name: "Clarify docs/plans/ path semantics"
        description: |
          Multiple agents reference docs/plans/live/ and docs/plans/completed/ directories.
          Clarify in guidance that these paths are relative to TARGET PROJECT, not the
          AgenticGuidance module. Add documentation to inputs.yml files.
        severity: "critical"
        affected_agents:
          - orchestration-planning
          - orchestration-build
          - orchestration-guidance
          - planner-build
          - planner-guidance
          - planner-test
        target_files:
          - "agents/orchestration/orchestration-planning/inputs.yml"
          - "agents/orchestration/orchestration-build/inputs.yml"
          - "agents/planner/planner-build/inputs.yml"
          - "agents/planner/planner-guidance/inputs.yml"
        acceptance_criteria:
          - "All inputs.yml files document that docs/plans/ is target project relative"
          - "Add base_path clarification comment at top of inputs files"
        status: "completed"
        completed_date: "2026-01-06"

      - id: "rem_cp002"
        name: "Add required_inputs sections to inputs.yml"
        description: |
          inputs.yml files don't distinguish between required inputs (must be provided by
          user/orchestration) and reference inputs (background context). Add required_inputs
          section to critical agents.
        severity: "critical"
        affected_agents:
          - orchestration-planning
          - orchestration-build
          - planner-build
          - planner-guidance
        target_files:
          - "agents/orchestration/orchestration-planning/inputs.yml"
          - "agents/orchestration/orchestration-build/inputs.yml"
          - "agents/planner/planner-build/inputs.yml"
          - "agents/planner/planner-guidance/inputs.yml"
        acceptance_criteria:
          - "Each inputs.yml has required_inputs section"
          - "Required inputs clearly marked vs optional context"
        status: "completed"
        completed_date: "2026-01-06"

      # HIGH Issues
      - id: "rem_hp001"
        name: "Add loop_context to loop participants"
        description: |
          Agents participating in loops (audit-test-fix-loop, guidance-test-loop) lack
          explicit loop_context sections specifying role, iteration strategy, exit conditions.
        severity: "high"
        affected_agents:
          - test-audit
          - orchestration-guidance
        target_files:
          - "agents/test/test-audit/process.yml"
          - "agents/orchestration/orchestration-guidance/process.yml"
        acceptance_criteria:
          - "Each agent has loop_context section"
          - "Specifies participates_in, role, iteration_strategy, exit_conditions"
        status: "completed"
        completed_date: "2026-01-06"
        notes: "Added to test-audit/process.yml and orchestration-guidance/manifest.yml"

      - id: "rem_hp002"
        name: "Define output schemas for agents"
        description: |
          Multiple agents have outputs: [] but steps describe generating reports/recommendations.
          Add structured output schemas.
        severity: "high"
        affected_agents:
          - test-audit
          - teacher-update-guidance
          - orchestration-guidance
        target_files:
          - "agents/test/test-audit/process.yml"
          - "agents/teacher/teacher-update-guidance/process.yml"
          - "agents/orchestration/orchestration-guidance/process.yml"
        acceptance_criteria:
          - "Each agent has populated outputs section"
          - "Output format, location, and structure defined"
        status: "completed"
        completed_date: "2026-01-06"
        notes: "Added structured output schemas to all three agents"

      - id: "rem_hp003"
        name: "Standardize fragment reference syntax"
        description: |
          References like 'agent-categories.yml#planner' use fragment syntax that is not
          universally supported. Document resolution mechanism or convert to explicit paths.
        severity: "high"
        target_files:
          - "agents/planner/planner-build/inputs.yml"
          - "agents/planner/planner-guidance/inputs.yml"
          - "agents/orchestration/orchestration-planning/inputs.yml"
        acceptance_criteria:
          - "Fragment references documented with resolution rules OR"
          - "Converted to explicit section references"
        status: "completed"
        completed_date: "2026-01-06"
        notes: "Created assets/definitions/fragment-references.yml documenting resolution rules"

      # MEDIUM Issues
      - id: "rem_mp001"
        name: "Reduce excessive context loading"
        description: |
          teacher-update-guidance loads cleaner-shared and test-shared layers that are
          irrelevant, violating context-minimisation. Create teacher-specific layer.
        severity: "medium"
        affected_agents:
          - teacher-update-guidance
        target_files:
          - "agents/teacher/teacher-update-guidance/inputs.yml"
          - "assets/inputs/teacher-shared.yml (create)"
        acceptance_criteria:
          - "teacher-update-guidance uses only relevant layers"
          - "Context load reduced by removing irrelevant layers"
        status: "completed"
        completed_date: "2026-01-06"
        notes: "Removed cleaner-shared.yml and test-shared.yml layers"

      - id: "rem_mp002"
        name: "Align version numbers across files"
        description: |
          Version mismatches between inputs.yml and manifest.yml create confusion.
          Standardize versioning scheme.
        severity: "medium"
        affected_agents:
          - planner-test
          - test-audit
        acceptance_criteria:
          - "All files in agent folder use same version"
          - "Version scheme documented"
        status: "completed"
        completed_date: "2026-01-06"
        notes: "Aligned versions to 2.0, added version scheme comments to manifest.yml files"

