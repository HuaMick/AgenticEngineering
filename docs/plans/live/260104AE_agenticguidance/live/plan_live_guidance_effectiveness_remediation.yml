          %% FENCE: ValidateNodeGranularity MUST check that NO task-level nodes exist.
          %% Pattern check: Nodes matching "deploy_\d+", "build_\d+", "test_\d+" are FORBIDDEN.
          %% Pattern check: Nodes with "[Execute: ...]" labels are FORBIDDEN.
