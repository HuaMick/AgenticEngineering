name: strategy-mmd-conversion
status: backlog
priority: low
created: "2026-01-16"
last_verified: "2026-01-16"
source_task: "low_007"
source_plan: "plan_live_batch_remediation.yml"

objective: |
  Convert 3 strategy-*.yml files from guidelines/ into .mmd planner components.
  These files define structured validation workflows with phases, decision gates,
  and escalation paths that are better expressed as Mermaid flowcharts for
  planner consumption.

# ============================================================================
# FILES TO CONVERT TO .mmd PLANNER COMPONENTS
# ============================================================================
# These files have multi-phase workflows with decision gates and iteration patterns
# that match the structure of existing planner components in:
# modules/AgenticGuidance/assets/examples/planner/components/

# REVISED SCOPE (2026-01-16 validation):
# - 1 file genuinely needs conversion (strategy-documentation-validation.yml)
# - 1 file should MERGE unique content into existing MMD (strategy-agent-blind-test.yml)
# - 1 file is REDUNDANT with existing MMD (strategy-agent-review-loop.yml) - mark for archive

files_to_convert:
  - source: "modules/AgenticGuidance/assets/guidelines/strategy-documentation-validation.yml"
    target: "modules/AgenticGuidance/assets/examples/planner/components/strategy_documentation_validation.mmd"
    status: "genuine_candidate"
    rationale: |
      This file defines a two-phase validation process:
      1. Schema validation phase (structure, completeness)
      2. Content validation phase (accuracy, clarity)

      The workflow has:
      - Parallel validation steps within each phase
      - Approval gate between phases
      - Clear pass/fail criteria

      NO EXISTING MMD EQUIVALENT - this is the only genuine conversion candidate.

files_to_merge:
  - source: "modules/AgenticGuidance/assets/guidelines/strategy-agent-blind-test.yml"
    target: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
    status: "merge_into_existing"
    rationale: |
      The existing guidance_blind_test.mmd (148 lines) is more comprehensive than
      the source YAML. However, the YAML has unique content about 3-layer testing
      (local, Docker, Cloud Build) that is NOT in the MMD.

      ACTION: Merge the 3-layer testing details into guidance_blind_test.mmd,
      then delete the source YAML.

files_to_archive:
  - source: "modules/AgenticGuidance/assets/guidelines/strategy-agent-review-loop.yml"
    status: "redundant"
    rationale: |
      This file is only 8 lines of conceptual description.
      The existing guidance_self_review_loop.mmd (89 lines) already provides
      a complete workflow with user decision gates, parallel spawning, and
      iteration tracking.

      ACTION: Archive or delete this file - it adds no value over the existing MMD.

# ============================================================================
# FILES TO KEEP AS GUIDELINES
# ============================================================================
# These files are conceptual explanations, decision frameworks, or checklists
# that work better as reference documentation than as flowcharts.

files_to_keep_as_guidelines:
  - file: "modules/AgenticGuidance/assets/guidelines/strategy-validation.yml"
    rationale: |
      Decision framework for selecting which validation strategy to use.
      This is reference documentation, not a procedural workflow.
      Agents consult this to decide WHICH strategy to apply.

  - file: "modules/AgenticGuidance/assets/guidelines/strategy-multi-layer.yml"
    rationale: |
      Comparison of alternative strategies (when to use each).
      This is conceptual guidance about strategy trade-offs.
      No workflow or phases to express as a flowchart.

  - file: "modules/AgenticGuidance/assets/guidelines/strategy-user-acceptance.yml"
    rationale: |
      Pre-test requirements and UAT distinctions.
      Defines WHAT user acceptance testing means, not HOW to execute it.
      More definitional than procedural.

  - file: "modules/AgenticGuidance/assets/guidelines/strategy-user-simulation.yml"
    rationale: |
      Conceptual explanation of user simulation approach.
      Describes the concept, not a step-by-step process.
      Works better as reference text than flowchart.

  - file: "modules/AgenticGuidance/assets/guidelines/strategy-fresh-environment.yml"
    rationale: |
      Test environment specification checklist.
      A list of requirements, not a workflow.
      Better as reference checklist than flowchart.

  - file: "modules/AgenticGuidance/assets/guidelines/strategy-test-suite.yml"
    rationale: |
      Simple test definition and scope documentation.
      Defines what a test suite is, not how to execute one.
      Too simple/flat for .mmd conversion benefit.

# ============================================================================
# CONVERSION CONSIDERATIONS
# ============================================================================

conversion_notes: |
  DESIGN WORK REQUIRED:
  Each conversion requires careful design work to:
  1. Identify phases and decision points
  2. Define entry/exit conditions
  3. Map escalation paths
  4. Align with existing component patterns
  5. Ensure consistency with other .mmd components

  POTENTIAL CONSOLIDATION:
  - strategy-agent-blind-test.yml may overlap with guidance_blind_test.mmd
  - strategy-agent-review-loop.yml may overlap with guidance_self_review_loop.mmd
  - Need to analyze and decide: merge, replace, or keep both

  COMPONENT NAMING:
  Target names use snake_case to match existing components:
  - guidance_blind_test.mmd
  - guidance_self_review_loop.mmd
  - feedback_loop.mmd

  AFTER CONVERSION:
  - Delete source .yml file after .mmd is validated
  - Update any inputs.yml references to point to new .mmd location
  - Document in component README which strategies are available

# ============================================================================
# EXECUTION PLAN
# ============================================================================

execution_phases:
  # REVISED PHASES (2026-01-16 validation):
  - name: "Phase 1: Convert strategy-documentation-validation.yml"
    description: "Create new MMD component (only genuine conversion candidate)"
    tasks:
      - "Read strategy-documentation-validation.yml and map to flowchart structure"
      - "Create strategy_documentation_validation.mmd in components folder"
      - "Validate flowchart syntax"
      - "Delete source .yml file"

  - name: "Phase 2: Merge into guidance_blind_test.mmd"
    description: "Add 3-layer testing details from strategy-agent-blind-test.yml"
    tasks:
      - "Extract 3-layer testing content (local, Docker, Cloud Build) from YAML"
      - "Add as new section in guidance_blind_test.mmd"
      - "Delete source .yml file"

  - name: "Phase 3: Archive redundant file"
    description: "Remove strategy-agent-review-loop.yml (redundant with existing MMD)"
    tasks:
      - "Delete strategy-agent-review-loop.yml"
      - "Verify guidance_self_review_loop.mmd covers all needed functionality"

  - name: "Validation"
    description: "Verify no broken references"
    tasks:
      - "Grep for references to deleted .yml files"
      - "Update any inputs.yml files that reference deleted files"

# ============================================================================
# SUCCESS CRITERIA
# ============================================================================

success_criteria:
  - "1 strategy file converted to .mmd (strategy-documentation-validation.yml)"
  - "1 strategy file merged into existing MMD (strategy-agent-blind-test.yml → guidance_blind_test.mmd)"
  - "1 strategy file archived/deleted (strategy-agent-review-loop.yml - redundant)"
  - "6 strategy files remain as guidelines (confirmed appropriate)"
  - "All references updated"
  - "Components follow existing .mmd naming and styling conventions"

# ============================================================================
# ESTIMATED EFFORT (REVISED)
# ============================================================================

estimated_effort: "2-3 hours"
complexity: "low"
blocker: "none"
revision_note: "Reduced from 4-6 hours after validation found 2 of 3 files overlap with existing components"
