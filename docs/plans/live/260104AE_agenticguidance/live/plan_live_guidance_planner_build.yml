# ============================================================
# QUESTIONS FOR USER (Updated)
# Design decisions that need clarification before proceeding
# ============================================================
questions_for_user:
  scope_questions:
    - question: "Should the example plan be split into smaller focused examples?"
      context: |
        The 515-line example plan is comprehensive but large. Options:
        1. Keep as-is with scope clarification notes (Phase 1 approach)
        2. Split into structure-template.yml (~150 lines) + phase-examples/ folder
        3. Create planner-specific views (build-example, test-example)
      recommendation: "Option 1 for now (lowest risk), defer split to future optimization"
      blocking: false

    # B1 RESOLVED - User decided to consolidate
    - question: "[RESOLVED] Should domains.yml, workflows.yml, entrypoints.yml be consolidated?"
      context: |
        User Decision B1: YES - consolidate into architecture-pattern.yml.
        Added as phase-2b-architecture-consolidation.
      resolution: "Consolidate per User Decision B1"
      blocking: false
      status: "resolved"

  layer_questions:
    - question: "Should planner-build-layer be exclusive or supplementary?"
      context: |
        Option A: planner-build-layer replaces core-system + planner-shared (exclusive)
        Option B: planner-build-layer supplements existing layers (additive)
      recommendation: "Option A - exclusive replacement for maximum context reduction"
      blocking: true
      default_if_no_response: "Option A"

    - question: "Should other planners also get specific layers?"
      context: |
        If planner-build gets a specific layer, consistency suggests other planners should too.
        This plan only addresses planner-build; other planners need separate audits.
        T4 addition creates planner-core-*.yml layers that can be shared.
      recommendation: "Create pattern with planner-build, apply to others after validation"
      blocking: false

  verification_questions:
    - question: "What is the acceptable context usage target?"
      context: |
        Current: 8-12% (~15,000 tokens)
        Proposed target (updated with T4): 4-6% (~8,000 tokens)
        Aggressive target: 2-4% (~5,000 tokens)
      recommendation: "4-6% is reasonable with specialized layers"
      blocking: false
      default_if_no_response: "4-6%"

