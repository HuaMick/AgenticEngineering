questions_for_user:
  design_decisions:
    - question: "Path resolution semantics clarification needed"
      context: |
        The audit flagged core-system.yml and planner-shared.yml as having stale paths
        (docs/ARCHITECTURE.md vs modules/AgenticGuidance/docs/ARCHITECTURE.md).
        However, inputs.yml states paths are "relative to AgenticGuidance MODULE ROOT".
        If the layer loading system correctly resolves paths from module root,
        docs/ARCHITECTURE.md IS correct (it exists at modules/AgenticGuidance/docs/).
      options:
        - "Paths are correct as-is (module-relative resolution works)"
        - "Paths need full path from repo root"
        - "Need to verify actual path resolution behavior in loader"
      impact: "Determines whether task 1.1 and 1.2 are needed"

    - question: "Example file trimming approach"
      context: |
        plan_live_audit_clean.yml at 469 lines needs reduction.
        Multiple trimming strategies possible.
      options:
        - "Keep one full phase, abbreviate others (proposed)"
        - "Create minimal skeleton with annotation comments"
        - "Split into multiple focused examples"
        - "Keep full example but load only on-demand"
      impact: "Determines how phase 3 is executed"

  gap_identification:
    - question: "Should iteration.yml be loaded by planner agents at all?"
      context: |
        iteration.yml provides behavioral guidelines for execution loops.
        Planner agents define loop structures but don't execute them.
        They may not need iteration.yml.
      options:
        - "Remove from planner inputs (planners don't execute loops)"
        - "Keep (planners need to understand loop behavior to plan correctly)"
      impact: "Additional ~2000 token savings if removed"

success_criteria:
  quantitative:
    - metric: "Context token usage"
      baseline: "~45,000 tokens per agent"
      target: "~27,000 tokens per agent"
      measurement: "Sum of line counts for all transitively loaded files, estimated at 2 tokens/line"
      scope: "ALL planner agents"

    - metric: "File count loaded"
      baseline: "19 files per agent"
      target: "~12 files per agent"
      measurement: "Count unique files in transitive closure of inputs"
      scope: "ALL planner agents"

    - metric: "Redundant content"
      baseline: "3 redundancy issues"
      target: "0 redundancy issues"
      measurement: "Audit for duplicated content across files"
      scope: "ALL planner agents"

  qualitative:
    - "ALL planner agents can still create finalization phases correctly"
    - "All required lifecycle patterns are discoverable from guidance"
    - "Error messages guide to correct authoritative sources"
    - "No loss of critical planning capability for any planner agent"

notes:
  - "SCOPE EXPANDED: This plan applies to ALL planner agents (cleaning, build, test, guidance, reviewer)"
  - "Phase T4 is MANDATORY: Specialized core layers must be created and deployed"
