name: plan_live_validation_phase_gap_investigation
status: pending
priority: high
created: "2026-01-15"
updated: "2026-01-15"
phase_type: teach

objective: |
  Investigate why the validation phase was skipped during UAT phase integration
  execution, and identify guidance gaps that allowed this to happen.

context: |
  INCIDENT SUMMARY:
  During execution of plan_live_uat_phase_integration.yml, the orchestrator:
  - Created orchestration MMD with Validation_SG subgraph defined
  - Executed all 4 remediation phases successfully
  - Committed and pushed changes
  - SKIPPED the validation phase entirely

  The orchestration MMD clearly defined:
  ```
  subgraph Validation_SG ["Validation Subgraph"]
      EnterValidation --> SpawnAudit[Spawn test-final-output Audit]
      SpawnAudit --> ValidationComplete{Validation Passed?}
      ValidationComplete -- "No: Gaps Found" --> PackageGaps[...]
      ValidationComplete -- "Yes: All Pass" --> ValidationPass[...]
  ```

  Yet this phase was never executed. The orchestrator proceeded directly
  from Phase 4 completion to committing changes.

  OBSERVED BEHAVIOR:
  1. Orchestrator created plan with validation phase
  2. Orchestrator executed implementation phases 1-4
  3. Orchestrator marked plan as completed
  4. Orchestrator committed without validation
  5. User had to prompt: "How did we do testing?"

  EXPECTED BEHAVIOR:
  1. Execute implementation phases
  2. Execute validation phase (spawn test-final-output)
  3. If validation fails, loop back or escalate
  4. Only mark complete after validation passes
  5. Then commit

phases:
  - name: "Root Cause Analysis"
    status: pending
    description: "Identify why validation was skipped"
    tasks:
      - id: "rca_check_orchestration_mmd"
        name: "Review orchestration MMD execution"
        status: "pending"
        description: |
          The orchestrator generated orchestration_uat_phase_integration.mmd
          but did not follow it. Investigate:
          - Was the MMD treated as documentation rather than executable flow?
          - Did the orchestrator "mentally execute" vs spawn agents?
          - Was there confusion about who owns validation (planner vs executor)?
        questions:
          - "Did the orchestrator read the MMD after creating it?"
          - "Was the MMD treated as a plan artifact vs execution guide?"
          - "Is there guidance stating MMD must be followed step-by-step?"

      - id: "rca_check_entrypoint_flow"
        name: "Review entrypoint invocation pattern"
        status: "pending"
        description: |
          The user invoked _plan_teach.yml then _orchestrate.yml conceptually.
          But the session acted as both planner AND executor in one flow.

          Questions:
          - Should _plan_teach produce a plan that _orchestrate executes separately?
          - Did combining planning + execution in one session blur responsibilities?
          - Is there guidance on session boundaries between planning and execution?
        target_files:
          - "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
          - "modules/AgenticGuidance/entrypoints/_orchestrate.yml"

      - id: "rca_check_validation_guidance"
        name: "Check validation phase guidance"
        status: "pending"
        description: |
          Review if there is explicit guidance requiring validation before completion.
          Check:
          - orchestration-policy.yml for completion requirements
          - process.mmd files for validation phase handling
          - Plan status management rules
        target_files:
          - "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/process.mmd"

  - name: "Gap Identification"
    status: pending
    description: "Identify specific guidance gaps"
    tasks:
      - id: "gap_mmd_execution_semantics"
        name: "MMD Execution Semantics Gap"
        status: "pending"
        description: |
          POTENTIAL GAP: No guidance stating that generated MMD files
          must be followed as executable workflows, not just documentation.

          Current state:
          - plan-mmd-schema.yml defines MMD structure
          - orchestration-executor-specification.yml defines executor behavior
          - But neither explicitly states: "Orchestrator MUST execute the MMD it generates"

          The gap may be: Orchestrators generate MMD for _orchestrate.yml to execute,
          but when acting as executor in same session, they may skip their own MMD.

      - id: "gap_validation_before_commit"
        name: "Validation-Before-Commit Gap"
        status: "pending"
        description: |
          POTENTIAL GAP: No explicit fence requiring validation before git commit.

          Current guidance:
          - response-audit.yml requires auditing responses
          - But does not mandate test-final-output before committing changes

          Missing: A fence stating "Do not commit implementation changes until
          validation phase completes successfully"

      - id: "gap_session_boundary"
        name: "Session Boundary Gap"
        status: "pending"
        description: |
          POTENTIAL GAP: Unclear when planning session ends and execution begins.

          The _plan_teach.yml says:
          "Output: Approved live plan folder path, phases created, ready for _orchestrate.yml"

          But the user asked to run both in sequence, which collapsed the boundary.
          Should there be guidance on:
          - When to stop and hand off to _orchestrate.yml?
          - When is it OK to execute inline vs spawn executor?

  - name: "Remediation Proposals"
    status: pending
    description: "Propose guidance fixes"
    tasks:
      - id: "fix_mmd_execution_fence"
        name: "Add MMD Execution Fence"
        status: "pending"
        description: |
          Proposal: Add fence to orchestration-policy.yml:

          FENCE: EXECUTE-YOUR-MMD
          When an orchestrator generates an orchestration MMD file, it MUST
          execute that MMD step-by-step. The MMD is not documentation - it is
          the executable workflow. Skipping phases defined in the MMD is a
          fence violation.
        target_files:
          - "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"

      - id: "fix_validation_before_commit"
        name: "Add Validation-Before-Commit Fence"
        status: "pending"
        description: |
          Proposal: Add to orchestration-policy.yml or response-audit.yml:

          FENCE: VALIDATE-BEFORE-COMMIT
          Implementation changes MUST pass validation phase before git commit.
          Validation includes:
          - test-final-output audit for completeness
          - Success criteria verification from plan
          - No skipping validation to "save time"

          Exception: Documentation-only changes may skip if explicitly noted.
        target_files:
          - "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"
          - "modules/AgenticGuidance/assets/guidelines/response-audit.yml"

      - id: "fix_session_handoff"
        name: "Clarify Session Handoff Points"
        status: "pending"
        description: |
          Proposal: Update entrypoint documentation to clarify:

          _plan_teach.yml / _plan_build.yml:
          - Produces approved plan + orchestration MMD
          - STOP at human approval gate
          - Output path for _orchestrate.yml to consume

          _orchestrate.yml:
          - Takes approved plan path as input
          - Executes MMD step-by-step including validation
          - Only marks complete after all phases pass

          When user requests "run both", orchestrator should:
          1. Complete planning phase with human approval
          2. Explicitly transition to execution mode
          3. Follow the MMD it just created
        target_files:
          - "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
          - "modules/AgenticGuidance/entrypoints/_plan_build.yml"
          - "modules/AgenticGuidance/entrypoints/_orchestrate.yml"

success_criteria:
  - "Root cause identified with specific guidance gap(s)"
  - "Remediation proposals are actionable and specific"
  - "Each proposal includes target files and fence/signpost language"
  - "Investigation considers if this is systemic or one-off"

notes: |
  This investigation is prompted by user observation during UAT phase integration.
  The orchestrator successfully implemented all changes but skipped validation,
  demonstrating a gap between "knowing what to do" (MMD shows validation) and
  "doing it" (validation was skipped).

  This is a TEACHING task - we need to improve guidance so future orchestrations
  don't make the same mistake. The fix is not in the code but in the guidance.

related_plans:
  - "plan_live_uat_phase_integration.yml (the plan that triggered this investigation)"
