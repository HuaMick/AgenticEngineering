# ============================================================================
# SUCCESS CRITERIA
# ============================================================================
success_criteria:
  - "All deprecated redirect stubs deleted (domains.yml, entrypoints.yml, workflows.yml)"
  - "All file merges completed without content loss"
  - "All reclassifications completed with reference updates"
  - "All decision items have documented decisions with rationale"
  - "No broken references after changes"
  - "Token overhead reduced by removing redundant files"
  - "All operations followed guidance from teaching phase guidelines"

# ============================================================================
# ORCHESTRATION
# ============================================================================
orchestration:
  agent_routing:
    High_Priority_Cleanup: "cleaner"
    Medium_Priority_Consolidation: "teacher-update-guidance"
    Low_Priority_Decisions: "planner-guidance"

  execution_order: |
    STEP 1: Complete Teaching Phase (PREREQUISITE)
    - Execute plan_live_teaching_file_operations.yml
    - Creates: reference-management.yml, file-consolidation.yml,
               file-reclassification.yml, content-evaluation.yml
    - Validates guidelines with dry-run tests

    STEP 2: User Decisions (BLOCKING)
    - User fills in decision_items section above
    - All 7 decisions must have 'decision' field populated
    - Rationale is recommended but optional

    STEP 3: Execute Phase 1 (High Priority Cleanup)
    - Tasks high_001 through high_007
    - Uses teaching phase guidelines for merge operations
    - Can proceed after teaching phase completes

    STEP 4: Execute Phase 2 (Medium Priority Consolidation)
    - Tasks med_001 through med_012
    - Uses teaching phase guidelines for all operations
    - Some tasks may depend on Phase 1 completion

    STEP 5: Execute Phase 3 (Low Priority Decisions)
    - Tasks low_001 through low_007
    - Blocked until user provides decisions
    - Each task references its corresponding decision_item

  execution_notes: |
    PREREQUISITES:
    1. Teaching phase (plan_live_teaching_file_operations.yml) must complete
    2. User must provide decisions in decision_items section

    GUIDELINES USAGE:
    All merge/move operations should follow the guidelines created in teaching phase:
    - reference-management.yml: For finding and updating references
    - file-consolidation.yml: For merge operations
    - file-reclassification.yml: For move operations between folders
    - content-evaluation.yml: For consolidation decisions

    NEXT SESSION:
    1. Review decision_items and populate 'decision' fields
    2. Confirm teaching phase plan is ready
    3. Execute teaching phase
    4. Execute batch remediation phases 1-3
