  # ---------------------------------------------------------------------------
  - id: "decision_001"
    task_ref: "low_001"
    question: "Should we create a specifications/ folder for format specs?"
    context: |
      Currently, format specifications like process-file-format.yml live in
      definitions/. This mixes two concepts:
      - Definitions: Concepts and vocabulary (what is an "agent", what is a "plan")
      - Specifications: Format/schema definitions (how a process.yml is structured)

      Examples of current specs in definitions/:
      - process-file-format.yml
      - plan-mmd-schema.yml
      - orchestration-executor-specification.yml
    options:
      A: |
        CREATE specifications/ FOLDER
        - New folder: modules/AgenticGuidance/assets/specifications/
        - Move format specs (process-file-format.yml, plan-mmd-schema.yml, etc.)
        - PRO: Clear conceptual separation
        - CON: Adds folder complexity, requires reference updates
      B: |
        USE NAMING CONVENTION
        - Keep all in definitions/
        - Use *-specification.yml or *-format.yml naming convention
        - PRO: No folder change, simple grep to find specs
        - CON: Less explicit separation
      C: |
        NO CHANGE
        - Keep current structure
        - PRO: No work required
        - CON: Mixed concepts in definitions/
    decision: null  # <-- USER: Set to "A", "B", or "C"
    rationale: null  # <-- USER: Brief explanation of choice

