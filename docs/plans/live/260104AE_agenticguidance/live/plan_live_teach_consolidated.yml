        name: "Process File Format Standardization (.mmd support)"
        severity: "critical"
        description: |
          orchestration-planning and orchestration-build have process.mmd but
          current framework docs imply process.yml is mandatory. Standardize
          .mmd as first-class citizen for orchestration logic.
        merged_from:
          - "plan_live_teach.yml:teach_proc_001"
          - "plan_agenticguidance.yml:rem2_003"
        target_files:
          - "assets/definitions/agent-context-files.yml"
          - "docs/agent-role-scope-matrix.md"
        instructions:
          - "Update agent-context-files.yml to explicitly allow .mmd for process logic"
          - "Add SIGNPOST explaining when to use .mmd vs .yml formats"
          - "Document pattern: orchestration agents use .mmd, planner agents use .yml"
        acceptance_criteria:
          - "agent-context-files.yml documents .mmd as valid process format"
          - "agent-role-scope-matrix.md points to orchestration .mmd files"
          - "Clear guidance on .mmd vs .yml usage pattern"
        status: "pending"

      # FROM: rem2_011
      - id: "TEACH-CON-009"
        name: "Path Resolution Prefix Clarification"
        severity: "high"
        description: |
          Dual path resolution (module root vs target project root) causes confusion.
          Existing documentation is in header comments but easily missed.
        source: "plan_agenticguidance.yml:rem2_011"
        target_files:
          - "assets/definitions/path-resolution.yml (create)"
        instructions:
          - "Create path-resolution.yml definition file"
          - "Document {module_root}/ vs {project_root}/ semantic prefixes"
          - "Add FENCE: All paths MUST be unambiguous regarding their root"
          - "Reference from agent inputs.yml files"
        acceptance_criteria:
          - "path-resolution.yml exists with clear prefix semantics"
          - "Examples show correct usage for both module and project paths"
          - "At least 2 inputs.yml files reference new definition"
        status: "pending"

