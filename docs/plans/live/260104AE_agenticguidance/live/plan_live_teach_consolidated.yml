      # MERGED: teach_frag_001 + rem2_002
      - id: "TEACH-CON-001"
        name: "Fragment Reference Resolution"
        severity: "critical"
        description: |
          Fragment references like 'agent-loops.yml#planner-loop' assume top-level
          keys, but actual file structure nests under 'loop_types.planner-loop'.
          Same issue for 'agent-categories.yml#planner' under 'agent_categories.planner'.
        merged_from:
          - "plan_live_teach.yml:teach_frag_001"
          - "plan_agenticguidance.yml:rem2_002"
        target_files:
          - "assets/definitions/fragment-references.yml"
          - "assets/definitions/agent-loops.yml"
          - "assets/definitions/agent-categories.yml"
        instructions:
          - "Update fragment-references.yml to support dot-notation for nested keys"
          - "Add concrete examples: agent-loops.yml#loop_types.planner-loop"
          - "Add FENCE: Fragment references MUST match actual file structure"
        acceptance_criteria:
          - "fragment-references.yml documents dot-notation for nested keys"
          - "At least 3 concrete examples added (both valid and invalid patterns)"
          - "FENCE instruction explicitly states matching requirement"
        status: "pending"

      # MERGED: teach_proc_001 + rem2_003
