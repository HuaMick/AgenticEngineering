# Plan: Context Minimisation Consolidation
# Created: 2026-01-14
# Status: approved
# Purpose: Consolidate Context Minimisation definition and guideline into a single source of truth

name: "context_minimisation_consolidation"
worktree_path: "/home/code/AgenticEngineering-agenticguidance"
branch: "main"
status: "approved"
priority: "medium"

# File paths for plan management
worktree: "/home/code/AgenticEngineering-agenticguidance"
plan_file: "docs/plans/live/260104AE_agenticguidance/live/plan_live_context_minimisation.yml"

context: |
  Context Minimisation is defined in two places:
  1. assets/definitions/context-minimisation.yml - definition file
  2. assets/guidelines/context-minimisation.yml - guideline file

  This creates redundancy and token overhead. Consolidating into a single source of truth
  aligns with the Context Minimisation principle itself.

related_plans:
  orchestration: "orchestration_context_minimisation.mmd"

# Root-level inputs shared across phases
inputs:
  - location: "modules/AgenticGuidance/assets/definitions/context-minimisation.yml"
    description: "Definition file to be merged and deleted"
  - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Guideline file - target for merged content"
  - location: "modules/AgenticGuidance/agents/"
    description: "Agent folders to search for inputs.yml references"

phases:
  # ========================================
  # PHASE 1: Teach - Merge and Consolidate
  # ========================================
  - name: "Teach"
    execution: sequential
    description: "Merge definition content into guideline and remove redundancy"
    agent_category: "teacher"
    tasks:
      - id: "teach_001"
        name: "Read Source Files"
        description: |
          Read content from assets/definitions/context-minimisation.yml and
          assets/guidelines/context-minimisation.yml to understand what needs merging.
        status: "pending"
        agent_type: "teacher-update-guidance"
        operation: "READ"
        inputs:
          - "modules/AgenticGuidance/assets/definitions/context-minimisation.yml"
          - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
        target_files: []
        acceptance_criteria:
          - "Definition file content is fully understood"
          - "Guideline file structure is identified"
          - "Merge strategy is determined"

      - id: "teach_002"
        name: "Update Guideline with Merged Content"
        description: |
          Update assets/guidelines/context-minimisation.yml to include the concise
          definition and justification from the definition file.
        status: "pending"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/assets/definitions/context-minimisation.yml"
          - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
        target_files:
          - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
        acceptance_criteria:
          - "Guideline contains merged definition content"
          - "No content is lost from either source file"
          - "Guideline is self-contained as single source of truth"

      - id: "teach_003"
        name: "Delete Definition File"
        description: |
          Delete assets/definitions/context-minimisation.yml after content has been merged.
        status: "pending"
        agent_type: "teacher-update-guidance"
        operation: "DELETE"
        inputs:
          - "modules/AgenticGuidance/assets/definitions/context-minimisation.yml"
        target_files:
          - "modules/AgenticGuidance/assets/definitions/context-minimisation.yml"
        acceptance_criteria:
          - "Definition file is deleted"
          - "No orphaned references remain"

      - id: "teach_004"
        name: "Update References in inputs.yml Files"
        description: |
          Search for references to the deleted definition file in inputs.yml files
          and update them to point to the guideline.
        status: "pending"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/**/*.yml"
        target_files: []
        guidance: |
          1. Search for "definitions/context-minimisation" in all inputs.yml files
          2. Replace with "guidelines/context-minimisation"
          3. Verify no broken references remain
        acceptance_criteria:
          - "All references to definition file are updated"
          - "References now point to guideline file"
          - "No broken references in any inputs.yml"

  # ========================================
  # PHASE 2: Test - Verify Consolidation
  # ========================================
  - name: "Test"
    execution: sequential
    description: "Verify the consolidation was successful"
    agent_category: "test"
    tasks:
      - id: "test_001"
        name: "Verify Merged Guideline Content"
        description: |
          Verify assets/guidelines/context-minimisation.yml contains the merged content
          and is a complete single source of truth.
        status: "pending"
        agent_type: "test-final-output"
        operation: "AUDIT"
        inputs:
          - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
        target_files: []
        acceptance_criteria:
          - "Guideline contains definition content"
          - "Guideline is self-contained"
          - "No missing information from original definition"

      - id: "test_002"
        name: "Verify Definition File Deleted"
        description: |
          Verify assets/definitions/context-minimisation.yml does not exist.
        status: "pending"
        agent_type: "test-final-output"
        operation: "AUDIT"
        inputs: []
        target_files: []
        acceptance_criteria:
          - "Definition file does not exist at assets/definitions/context-minimisation.yml"
          - "No orphaned backup or temp files remain"

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - "assets/guidelines/context-minimisation.yml is the single source of truth for Context Minimisation"
  - "assets/definitions/context-minimisation.yml no longer exists"
  - "All inputs.yml references point to the guideline, not the definition"
  - "No content is lost in the consolidation"
  - "Token overhead is reduced by eliminating redundant file"

# ========================================
# ORCHESTRATION
# ========================================
orchestration:
  agent_routing:
    teach: "planner-guidance"
    test: "planner-test"
  feedback_triggers:
    - "test_failure -> teach"
