    - priority: "HIGH"
      action: "Update plan to remove Q1-Q4 questions - all decisions are made"
      rationale: "User has provided decisions for all 4 questions"

    - priority: "HIGH"
      action: "Replace conditional task logic with concrete implementations"
      rationale: "Tasks currently say 'if Q2=C do X' - replace with 'do X'"

    - priority: "HIGH"
      action: "Add T4 coordination note or phase to plan"
      rationale: "T4 is a cross-cutting change requiring multi-plan coordination"

  structural_improvements:
    - priority: "MEDIUM"
      action: "Simplify Phase 1 - remove path verification task"
      rationale: "If REMOVING references, no need to verify if paths exist"

    - priority: "MEDIUM"
      action: "Update phase dependencies to remove 'Q decision' references"
      rationale: "Decisions are resolved; dependencies should reference phases only"

    - priority: "LOW"
      action: "Add estimated time/effort per task"
      rationale: "Helps orchestration agents estimate plan duration"

  risk_mitigations:
    - risk: "T4 implementation inconsistency across plans"
      mitigation: "Create shared design document or master plan before any T4 work"

    - risk: "Breaking agent functionality during core layer changes"
      mitigation: "Add verification task after each specialized layer creation"

    - risk: "Strategy index not reducing tokens if strategies still loaded"
      mitigation: "Clarify dynamic loading mechanism in task 2.4"

