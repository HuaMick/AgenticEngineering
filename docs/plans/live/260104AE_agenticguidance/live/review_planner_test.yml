  plan_name: "PASS - 'planner-test Context Overload Remediation'"
  worktree: "PASS - /home/code/AgenticEngineering-agenticguidance"
  objective: "PASS - Clear reduction target from 15-20% to <12%"
  phases:
    count: 5
    ordering: "PASS - Logical progression (stale refs -> consolidation -> examples -> org -> verify)"
    dependencies: "NEEDS_UPDATE - Dependencies reference Q decisions that are now resolved"

  task_structure:
    target_files: "PASS - Each task specifies exact files"
    agent_types: "PASS - Appropriate agent types (teacher-update-*, test-final-output)"
    operations: "PASS - Correct ordering (AUDIT before UPDATE)"
    acceptance_criteria: "PASS - Concrete and measurable"

  success_criteria:
    measurable: "PASS - Specific targets (<12% context, <38 files)"
    user_focused: "PASS - Functional criteria for planner-test capability"
    verifiable: "PASS - Zero broken references, single source of truth"

# ==============================================================================
# REMAINING AMBIGUITIES
# ==============================================================================
remaining_ambiguities:
  - id: "A1"
    category: "T4 Implementation Scope"
    description: |
      T4 requires creating specialized core layers for each agent type.
      For planner-test, what should the specialized core contain?

      Current core-system.yml and core-guidelines.yml load 13 files.
      Which are needed for planner-test? Which are not?
    suggested_resolution: |
      Create analysis task: For each of the 13 core files, document:
      - File name
      - Is it used by planner-test? (Y/N with rationale)
      - If N, mark for exclusion from specialized layer

      Then create planner-test-core.yml with only needed files.
    blocks_execution: false

  - id: "A2"
    category: "T4 Cross-Plan Coordination"
    description: |
      How will T4 be coordinated across all 6 remediation plans?
      Should there be:
      - A master T4 plan that all reference?
      - Parallel T4 phases in each plan?
      - Sequential T4 implementation (one agent at a time)?
    suggested_resolution: |
      Create master plan: plan_live_core_layer_specialization.yml
      This plan defines the architecture for specialized core layers and
      coordinates implementation across all agent types.

      Each agent remediation plan then adds a phase that depends on this master plan.
    blocks_execution: true

  - id: "A3"
    category: "Strategy Index Structure"
    description: |
      Task 2.4 mentions creating strategy-index.yml but doesn't specify
      how planner-test will dynamically load the selected strategy.

      Current: inputs.yml loads all 8 strategy files
      Target: inputs.yml loads index, then dynamically loads selected strategy

      How does "dynamic loading" work in the current architecture?
    suggested_resolution: |
      Clarify loading mechanism:
      - Option 1: Planner-test loads index, includes strategy file path in plan
                  output, orchestrator loads strategy for test agents
      - Option 2: Planner-test always loads index, process.yml updated to
                  conditionally load strategy based on task type
      - Option 3: All 8 strategies remain loadable but marked optional;
                  index just helps selection (tokens still saved if not read)
    blocks_execution: false

# ==============================================================================
# QUESTIONS FOR USER
# ==============================================================================
questions_for_user:
  - id: "U1"
    priority: "HIGH"
    question: |
      T4 (specialized core layers) affects all 6 remediation plans.

      How should we coordinate this cross-cutting change?

      A) Create separate master plan "plan_live_core_layer_specialization.yml"
         that defines the architecture, then each agent plan references it

      B) Add T4 phase to EACH remediation plan independently (risk of inconsistency)

      C) Implement T4 in ONE plan first (planner-test as pilot), then replicate
         pattern to other plans
    recommendation: "A - Master plan ensures consistent architecture across all agents"

  - id: "U2"
    priority: "MEDIUM"
    question: |
      For T4 implementation on planner-test, should we analyze which core files
      are actually needed BEFORE creating the specialized layer, or accept a
      proposed minimal set based on agent purpose?

      A) Analyze first - add AUDIT task to determine exactly which of 13 core
         files planner-test actually uses

      B) Propose minimal set - planner-test likely needs: agent-loops.yml,
         plans.yml, success-criteria-teacher.yml, context-minimisation.yml
         (skip: domains.yml, entrypoints.yml, worktree-and-branching.yml, etc.)
    recommendation: "A - Audit ensures nothing important is missed"

