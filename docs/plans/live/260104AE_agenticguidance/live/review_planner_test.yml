# Plan Review - planner-test Context Overload Remediation
# Reviewer: planner-reviewer
# Review Date: 2026-01-08
# Plan: plan_live_planner_test_remediation.yml

review_metadata:
  plan_reviewed: "plan_live_planner_test_remediation.yml"
  audit_source: "audit_planner_test.yml"
  reviewer_agent: "planner-reviewer"
  review_date: "2026-01-08"

# ==============================================================================
# REVIEW DECISION
# ==============================================================================
status: "NEEDS_CHANGES"

decision_summary: |
  The plan is well-structured and comprehensively addresses the 12 audit issues.
  However, there are critical misalignments with user decisions (especially T1 and T4)
  and the plan requires updates before approval.

  Key issues:
  1. T1 decision not reflected - plan still offers Q1 options but user decided REMOVE
  2. T4 decision creates cross-cutting architectural change not addressed in this plan
  3. Phase dependencies need update once user decisions are hardcoded
  4. Q4 is now superseded by T4 decision (specialized core layers required)

# ==============================================================================
# USER DECISION ALIGNMENT CHECK
# ==============================================================================
user_decision_alignment:
  T1_stale_references:
    user_decision: "REMOVE references entirely for NOT_MIGRATED agents (don't mark as deprecated, just remove)"
    plan_alignment: "MISALIGNED"
    issue: |
      The plan (Q1) offers 4 options including "C - Document as deprecated" as default recommendation.
      User has already decided: REMOVE entirely (closest to option B).

      The plan should:
      - Remove Q1 from questions_for_user section (decision made)
      - Update task 1.2 to reflect the REMOVE decision, not conditional logic
      - Update task 1.1 to skip path verification (irrelevant if removing)
      - Simplify acceptance criteria to: "NOT_MIGRATED references removed from manifest.yml"
    required_changes:
      - "Remove Q1 from questions_for_user - decision is REMOVE"
      - "Update task 1.1 to 'Remove NOT_MIGRATED agent references from manifest.yml'"
      - "Update task 1.2 to 'Update inputs.yml to remove stale NOT_MIGRATED comments'"
      - "Remove conditional 'changes_if_Q1_C' logic - replace with concrete REMOVE actions"

  T2_strategy_loading:
    user_decision: "Create strategy-index.yml, load full strategy only when selected"
    plan_alignment: "ALIGNED"
    issue: "None - plan Q2 option C matches user decision"
    required_changes:
      - "Remove Q2 from questions_for_user - decision is already made (option C)"
      - "Update task 2.4 to remove conditional logic and implement index directly"

  T3_example_file_size:
    user_decision: "Create skeleton (~100 lines) + separate detailed-scenarios file"
    plan_alignment: "ALIGNED"
    issue: "None - plan Q3 option B matches user decision"
    required_changes:
      - "Remove Q3 from questions_for_user - decision is already made (option B)"
      - "Update task 3.1 to remove conditional logic and create skeleton directly"

  T4_specialized_core_layers:
    user_decision: |
      CRITICAL - User dislikes generic core-guidelines and core-systems.
      Create SPECIALIZED versions for EACH agent type so agents only load what they need.
      This is a cross-cutting architectural decision affecting ALL agents.
    plan_alignment: "MISALIGNED - CRITICAL"
    issue: |
      Q4 in the plan recommends deferring core layer specialization (option D).
      User has REJECTED this deferral - they want specialized core layers NOW.

      This is a CROSS-CUTTING change that affects:
      - planner-test (this plan)
      - planner-guidance (separate plan)
      - planner-build (separate plan)
      - deploy-worktree (separate plan)
      - cleaning agents (separate plan)
      - ALL future agents

      This plan cannot implement T4 in isolation - it requires coordination.
    required_changes:
      - "Remove Q4 from questions_for_user - decision is SPECIALIZED (not defer)"
      - "Add new phase for planner-test core layer specialization"
      - "Add dependency note: 'T4 requires coordination across all 6 remediation plans'"
      - "Define what specialized core layer for planner-test would contain"
    cross_cutting_impact:
      affected_plans:
        - "plan_planner_guidance_remediation.yml"
        - "plan_live_guidance_planner_build.yml"
        - "plan_guidance_deploy_worktree_remediation.yml"
        - "plan_live_guidance_cleaning_remediation.yml"
        - "All other agent remediation plans"
      coordination_required: true
      recommendation: |
        Option A (RECOMMENDED): Create a separate "core-layer-specialization" master plan
        that coordinates T4 implementation across all agents. Each individual plan then
        references this master plan for T4 work.

        Option B: Add T4 implementation phase to EACH remediation plan, but mark them
        as dependent on a shared design document that defines the specialized layers.

