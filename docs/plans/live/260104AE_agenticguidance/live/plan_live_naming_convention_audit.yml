name: plan_live_naming_convention_audit
status: pivoted
priority: high
created: "2026-01-15"
pivoted: "2026-01-15"
phase_type: teach

objective: |
  PIVOTED: Original objective was to patch guidance files to fix naming convention issues.
  New approach: Build CLI tool that enforces naming convention, eliminating the bug class entirely.
  See: /home/code/AgenticEngineering-agentic-cli/docs/plans/live/260113_langsmith_cli/live/plan_live_folder_creation_automation.yml

pivot_rationale: |
  ROOT CAUSE ANALYSIS:
  - Planner agents were using incorrect folder names (YYMMDDRepo_Branch instead of YYMMDDWorktree_Description)
  - Initial fix: Patch all inputs.yml files, rename example folder, add explicit definitions
  - Problem: This is treating symptoms. Agents interpret guidance, so naming bugs can recur.

  TOOL OFFLOADING DECISION:
  - Folder naming is a DETERMINISTIC operation (date + worktree ID + description -> name)
  - Per guideline: modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
  - Solution: CLI command that enforces naming convention in code
  - Benefit: Bug class eliminated. No amount of guidance drift can create wrong folder names.

  CLI COMMAND PROPOSED:
    agentic plan init <branch> [--description <desc>]
    - Creates worktree if not exists
    - Generates folder name: YYMMDDXX_description (XX from worktree identifier)
    - Creates complete folder structure (live/, analysis/, audit/, completed/, README.md)
    - Validates or fails (no partial/incorrect output possible)

