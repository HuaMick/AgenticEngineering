# Plan: Teach Planner Component Awareness
# Remediation plan for planners defaulting to hardcoded workflows instead of flexible components
#
# PROBLEM IDENTIFIED:
# When asked how to formalize a new pattern (guidance-blind-test), 4 planner-guidance agents
# ALL recommended hardcoding the pattern into:
# - agent-loops.yml (new loop type)
# - process.yml (new phase/step)
# - strategy-*.yml (new definition)
#
# NONE of the agents recommended:
# - Creating a reusable MMD component in assets/examples/planner/components/
# - Allowing planners to SELECT different orchestrations flexibly
#
# This reveals a guidance gap: planners are not aware of the components folder or the
# architectural direction toward flexible orchestration selection.

name: "teach-planner-component-awareness"
status: "completed"
completed_date: "2026-01-11"
priority: "high"

context: |
  ROOT CAUSE ANALYSIS:

  The planner agents tried to formalize guidance-blind-test by embedding it into fixed
  workflows. This is problematic because:

  1. RIGIDITY: Hardcoded patterns cannot be easily swapped or customized
  2. COUPLING: Changes to one pattern affect all orchestrations that load it
  3. BLOAT: agent-loops.yml grows with every new pattern
  4. MISSED OPPORTUNITY: Components allow mix-and-match orchestration design

  DESIRED DIRECTION:

  Planners should prefer creating/selecting from REUSABLE COMPONENTS in:
  `modules/AgenticGuidance/assets/examples/planner/components/`

  Components are MMD files that:
  - Define self-contained orchestration patterns
  - Can be selected and composed by planners
  - Are NOT hardcoded into agent process files
  - Allow flexibility in how orchestrations are assembled

  EVIDENCE OF GAP:

  The 4 planner-guidance agents did not mention:
  - The components/ folder at all
  - The existing components (build_phase.mmd, cleanup_phase.mmd, etc.)
  - The pattern of composing orchestrations from reusable parts

inputs:
  - location: "modules/AgenticGuidance/assets/examples/planner/components/"
    description: "Existing reusable components - planners should be aware of these"
  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
    description: "Target inputs file - needs reference to components folder"
  - location: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
    description: "Target inputs file - needs reference to components folder"
  - location: "modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml"
    description: "Target inputs file - needs reference to components folder"
  - location: "modules/AgenticGuidance/agents/planner/planner-test/inputs.yml"
    description: "Target inputs file - needs reference to components folder"

phases:
  - name: "Teach Phase - Update Planner Awareness"
    execution: sequential
    description: "Update planner guidance to prefer components over hardcoded workflows"
    tasks:
      - id: "teach_001"
        name: "Create component-over-workflow guideline"
        description: |
          Create new guideline at:
          modules/AgenticGuidance/assets/guidelines/component-over-workflow.yml

          Key rules:
          - PREFER reusable components in assets/examples/planner/components/ over hardcoding
          - New patterns should be MMD components, not additions to agent-loops.yml
          - Planners COMPOSE orchestrations from components, not extend fixed workflows
          - Components are the primary mechanism for orchestration flexibility
        status: "completed"
        success_criteria:
          - "Guideline exists with clear rules"
          - "Guideline explains WHY components are preferred (flexibility, composability)"
          - "Guideline lists anti-patterns (hardcoding into loops, extending process files)"

      - id: "teach_002"
        name: "Create components-awareness definition"
        description: |
          Create new definition at:
          modules/AgenticGuidance/assets/definitions/planner-components.yml

          Content:
          - What components are (reusable MMD orchestration patterns)
          - Where they live (assets/examples/planner/components/)
          - Current component inventory (list existing .mmd files)
          - How planners should use them (select, compose, customize)
          - When to create new components vs use existing
        status: "completed"
        success_criteria:
          - "Definition exists with clear explanation"
          - "Lists all existing components with purpose"
          - "Provides usage guidance for planners"

      - id: "teach_003"
        name: "Wire component awareness into planner-guidance inputs"
        description: |
          Update modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml:
          - Add reference to planner-components.yml definition
          - Add reference to component-over-workflow.yml guideline
          - Add reference to components/ folder as core input
        status: "completed"
        note: "Wired through shared planner-core-guidelines.yml and planner-shared.yml layers"
        success_criteria:
          - "inputs.yml references new guideline"
          - "inputs.yml references new definition"
          - "inputs.yml lists components/ folder"

      - id: "teach_004"
        name: "Wire component awareness into planner-build inputs"
        description: |
          Update modules/AgenticGuidance/agents/planner/planner-build/inputs.yml:
          - Add reference to planner-components.yml definition
          - Add reference to component-over-workflow.yml guideline
          - Add reference to components/ folder as core input
        status: "completed"
        note: "Wired through shared planner-core-guidelines.yml and planner-shared.yml layers"
        success_criteria:
          - "inputs.yml references new guideline"
          - "inputs.yml references new definition"
          - "inputs.yml lists components/ folder"

      - id: "teach_005"
        name: "Wire component awareness into planner-cleaning inputs"
        description: |
          Update modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml:
          - Add reference to planner-components.yml definition
          - Add reference to component-over-workflow.yml guideline
          - Add reference to components/ folder as core input
        status: "completed"
        note: "Wired through shared planner-core-guidelines.yml and planner-shared.yml layers"
        success_criteria:
          - "inputs.yml references new guideline"
          - "inputs.yml references new definition"
          - "inputs.yml lists components/ folder"

      - id: "teach_006"
        name: "Wire component awareness into planner-test inputs"
        description: |
          Update modules/AgenticGuidance/agents/planner/planner-test/inputs.yml:
          - Add reference to planner-components.yml definition
          - Add reference to component-over-workflow.yml guideline
          - Add reference to components/ folder as core input
        status: "completed"
        note: "Wired through shared planner-core-guidelines.yml and planner-shared.yml layers"
        success_criteria:
          - "inputs.yml references new guideline"
          - "inputs.yml references new definition"
          - "inputs.yml lists components/ folder"

      - id: "teach_007"
        name: "Update planner-core shared layer"
        description: |
          If a planner-core layer exists that all planners use, add references there
          instead of duplicating across individual inputs.yml files.

          Check: modules/AgenticGuidance/assets/inputs/planner-*.yml
          Add references to component-over-workflow guideline and planner-components definition
        status: "completed"
        result: |
          Updated planner-core-guidelines.yml with component-over-workflow.yml reference.
          Updated planner-shared.yml with planner-components.yml and phase_templates/ references.
        success_criteria:
          - "Shared layer updated if exists"
          - "All planners inherit component awareness through layer"

  - name: "Test Phase - Guidance Blind Test"
    execution: sequential
    status: "deferred"
    deferred_reason: "Blind tests require dedicated session to avoid bias"
    description: "Validate planner awareness using guidance blind test pattern"
    tasks:
      - id: "test_001"
        name: "Spawn planner-guidance without hints"
        description: |
          Use guidance_blind_test.mmd component pattern:
          - Spawn planner-guidance agent
          - Ask: "How should we formalize a new orchestration pattern?"
          - DO NOT mention components folder or the specific gap
          - Observe if agent recommends using components/ folder
        status: "deferred"
        success_criteria:
          - "Agent mentions assets/examples/planner/components/"
          - "Agent recommends creating MMD component"
          - "Agent does NOT default to hardcoding into agent-loops.yml"

      - id: "test_002"
        name: "Spawn planner-build without hints"
        description: |
          Use guidance_blind_test.mmd component pattern:
          - Spawn planner-build agent
          - Ask: "Create a plan for a new build workflow"
          - DO NOT mention components folder
          - Observe if agent references existing components for composition
        status: "deferred"
        success_criteria:
          - "Agent references existing components (build_phase.mmd, test_phase.mmd)"
          - "Agent proposes composing from components"
          - "Agent does NOT propose extending fixed process.yml"

  - name: "Cleanup Phase - Decommission Old Blind Test Guidance"
    execution: sequential
    status: "completed"
    completed_date: "2026-01-11"
    description: "Remove hardcoded blind test definitions now replaced by the component approach"
    tasks:
      - id: "clean_001"
        name: "Delete strategy-guidance-blind-test.yml"
        description: |
          DECOMMISSION (not deprecate):
          modules/AgenticGuidance/assets/definitions/strategy-guidance-blind-test.yml

          RATIONALE:
          - This hardcoded definition is now replaced by the flexible component:
            modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd
          - The component approach allows planners to select/compose this pattern
          - The old definition encouraged hardcoding into workflows

          BEFORE DELETION:
          - Verify guidance_blind_test.mmd component exists and is complete
          - Check for any unique content worth preserving in the component
        status: "completed"
        success_criteria:
          - "File deleted entirely (not deprecated)"
          - "No DEPRECATED.md left behind"

      - id: "clean_002"
        name: "Update guidance-test-scenarios.yml references"
        description: |
          Check modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
          for references to strategy-guidance-blind-test.yml

          Update references to point to:
          modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd
        status: "completed"
        success_criteria:
          - "No broken references to deleted file"
          - "References updated to component location"

      - id: "clean_003"
        name: "Update agent-loops.yml references"
        description: |
          Check modules/AgenticGuidance/assets/definitions/agent-loops.yml
          for any guidance-blind-test loop types that reference the old definition.

          Either:
          - Remove the hardcoded loop type (prefer component composition)
          - Update to reference the component instead
        status: "completed"
        result: "No references found in agent-loops.yml - no action needed"
        success_criteria:
          - "No broken references"
          - "Loop definitions point to component or are removed"

      - id: "clean_004"
        name: "Search and update any remaining references"
        description: |
          Grep for references to strategy-guidance-blind-test across the codebase:
          - inputs.yml files
          - process.yml files
          - Other definitions

          Update all to reference the component approach.
        status: "completed"
        result: "Updated 16 references across 8 files. Zero remaining references to strategy-guidance-blind-test."
        success_criteria:
          - "grep 'strategy-guidance-blind-test' returns zero results in AgenticGuidance"
          - "All references updated or removed"

      - id: "clean_005"
        name: "Verify legacy folder already has copy (no action needed)"
        description: |
          Confirm that modules/legacy/ already has a copy of strategy-guidance-blind-test.yml
          (for historical reference only - agents should never read from legacy/).

          File exists at:
          modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/definitions/strategy-guidance-blind-test.yml

          NO ACTION NEEDED - legacy already has copy, we just delete from active module.
        status: "completed"
        result: "Verified legacy copy exists at modules/legacy/MyAgents/projects/MyAgentsGuidance/assets/definitions/strategy-guidance-blind-test.yml"
        success_criteria:
          - "Legacy copy exists (verified)"
          - "Active module copy deleted"

success_criteria:
  - "component-over-workflow.yml guideline exists"
  - "planner-components.yml definition exists with component inventory"
  - "All planner inputs reference new guideline and definition"
  - "strategy-guidance-blind-test.yml DELETED (not deprecated)"
  - "All references updated to component approach"
  - "Blind tests confirm planners now prefer components over hardcoding"

related_artifacts:
  - location: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
    description: "New component that replaces the hardcoded definition"
  - location: "modules/AgenticGuidance/assets/definitions/strategy-guidance-blind-test.yml"
    description: "TO BE DELETED - hardcoded definition being decommissioned"
