                  Context: Final verification that housekeeping cleanup is complete.

                  Instructions:
                  1. Verify FF-009 resolution: 260119AG README has no broken references
                  2. Verify FF-010 resolution: 260119BR status is clear (cleaned or documented)
                  3. Confirm no new inconsistencies were introduced

                  This is a quick verification pass - not a deep audit.
                success_criteria:
                  - FF-009 (folder inconsistency) is resolved
                  - FF-010 (empty placeholders) is resolved
                  - Both sessions have consistent, accurate documentation

          # ========================================
          # DOCUMENTATION PHASE - Policy Naming (REC-004)
          # ========================================
          - execution: sequential
            name: Evaluate policy rename for clarity (REC-004)
            agents:
              - type: teacher
                inputs:
                  - modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml
                guidance: |
                  Context: REC-004 from friction analysis (260122_friction_analysis.yml) recommends
                  considering renaming "Main-First Planning" to something clearer like
                  "Centralized Plan Visibility" to avoid confusion with code workflow.

                  The current name "Main-First Planning" suggests main branch primacy for all
                  activities, when it only refers to plan folder location/visibility.

                  Resolution Options (choose ONE):
                  1. RENAME: Change "Main-First Planning" to "Centralized Plan Visibility"
                     - Update rule name in worktree-and-branching.yml
                     - Search and update all references in guidance files
                     - Update CLI help text if applicable

                  2. KEEP AS-IS with Documentation: Keep "Main-First Planning" name
                     - The scope/clarification fields already explain the distinction
                     - Name is established and changing may cause confusion
                     - Add a brief "Why this name?" note if helpful

                  3. ALTERNATIVE NAME: Propose a different clearer name
                     - "Plan Visibility First"
                     - "Main-Branch Plan Hosting"
                     - Other suggestion

                  Instructions:
                  1. Read the current worktree-and-branching.yml to understand the rule context
                  2. Evaluate whether the existing clarification fields are sufficient
                  3. Make a decision and document rationale
                  4. If renaming, update all references (use grep to find them)
                  5. If keeping, optionally add a "naming rationale" note

                  Priority: LOW - This is a documentation improvement, not a functional change.
                success_criteria:
                  - Decision documented (rename, keep, or alternative)
                  - If renamed: All references updated consistently
                  - If kept: Documentation explains the name choice
                  - No broken references or inconsistencies introduced

