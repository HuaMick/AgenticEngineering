      # TEACH PHASE - Documentation Cleanup
      # ========================================
      - name: Documentation Cleanup Phase
        execution_groups:
          - execution: sequential
            name: Resolve folder structure inconsistency (FF-009)
            agents:
              - type: teacher
                inputs:
                  - docs/plans/live/260119AG_guidance_entrypoint_remediation/README.md
                guidance: |
                  Context: The README.md references files in an analysis/ folder that doesn't exist:
                  - `analysis/audit_worktree_locality.md`
                  - `analysis/review_260119_teach_test.yml`

                  The folder structure only has: completed/ and live/

                  Resolution Options (choose ONE):
                  1. PREFERRED: Update README to remove references to analysis/ folder
                     - Remove lines mentioning analysis/audit_worktree_locality.md
                     - Remove lines mentioning analysis/review_260119_teach_test.yml
                     - This is the cleaner approach since the analysis work is complete

                  2. ALTERNATIVE: Create analysis/ folder with stub files
                     - Only if the audit content is valuable to preserve
                     - Would require reconstructing the content

                  Instructions:
                  1. Read the current README.md
                  2. Identify all references to analysis/ folder
                  3. Remove those references from the Key Files section
                  4. Ensure remaining documentation is consistent
                success_criteria:
                  - README.md no longer references non-existent analysis/ folder
                  - Key Files section only lists files that actually exist
                  - Documentation remains coherent after edits

          - execution: sequential
            name: Resolve empty placeholder session (FF-010)
            agents:
              - type: teacher
                inputs:
                  - docs/plans/live/260119BR_test_main_first_planning/
                guidance: |
                  Context: Session 260119BR contains empty placeholder plan files:
                  - live/plan_live_teach.yml - Has "TODO: Describe the objective", empty phases
                  - live/plan_live_test.yml - Has empty phases array
                  - live/plan_live_audit_clean.yml - Has empty phases array

                  This appears to be a test session for Main-First Planning that was
                  never completed (created by test-guidance-simulator in session 260119AG).

                  Resolution Options (choose ONE):
                  1. PREFERRED: Mark session as abandoned/superseded
                     - Create a brief README.md explaining this was a test session
                     - Move files to completed/ with note about being test artifacts
                     - OR simply delete the empty placeholder files

                  2. ALTERNATIVE: Leave as-is with documentation
                     - Add README explaining the session's purpose as a test case
                     - This preserves the test evidence but adds context

                  Instructions:
                  1. Review the empty placeholder files
                  2. Decide on resolution approach (prefer cleanup over preservation)
                  3. Either delete empty files OR add README explaining test nature
                  4. Ensure session folder state is clear and documented
                success_criteria:
                  - Empty placeholder files are either removed or documented
                  - Session purpose is clear (test artifacts from Main-First validation)
                  - No ambiguity about whether this is active or abandoned work

