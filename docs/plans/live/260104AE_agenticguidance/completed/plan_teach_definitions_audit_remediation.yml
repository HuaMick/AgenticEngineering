          Workflow prescription. Also generalize by:
          - Removing myagents studio specific commands
          - Extracting project-specific parts to project inputs
        target: "modules/AgenticGuidance/assets/definitions/test-execution-workflow.yml"

      - id: "reclassify_006"
        name: "Move minimal-sufficient-change.yml to guidelines/"
        status: "pending"
        description: "Behavioral rules"
        target: "modules/AgenticGuidance/assets/definitions/minimal-sufficient-change.yml"

      - id: "reclassify_007"
        name: "Move iteration-approach.yml to guidelines/"
        status: "pending"
        description: "Builder iteration rules"
        target: "modules/AgenticGuidance/assets/definitions/iteration-approach.yml"

      - id: "reclassify_008"
        name: "Move root-cause-analysis.yml to guidelines/"
        status: "pending"
        description: "Actionable guidance"
        target: "modules/AgenticGuidance/assets/definitions/root-cause-analysis.yml"

      - id: "reclassify_009"
        name: "Move model-first-verification.yml to guidelines/"
        status: "pending"
        description: "Verification guidance"
        target: "modules/AgenticGuidance/assets/definitions/model-first-verification.yml"

      - id: "reclassify_010"
        name: "Move component-verification.yml to guidelines/"
        status: "pending"
        description: "Builder verification rules"
        target: "modules/AgenticGuidance/assets/definitions/component-verification.yml"

      - id: "reclassify_011"
        name: "Move readme-context.yml to guidelines/"
        status: "pending"
        description: "README structure guidelines"
        target: "modules/AgenticGuidance/assets/definitions/readme-context.yml"

      - id: "reclassify_012"
        name: "Move preserved-files.yml to guidelines/"
        status: "pending"
        description: "Cleaner constraints"
        target: "modules/AgenticGuidance/assets/definitions/preserved-files.yml"

  # ========================================
  # PHASE 4: Consolidate/Merge Files
  # ========================================
  - name: "Teach: Consolidate Related Files"
    execution: sequential
    status: pending
    priority: medium
    description: "Merge related files to reduce duplication"
    tasks:
      - id: "consolidate_001"
        name: "Merge separation-of-concerns into role-separation"
        status: "pending"
        description: |
          Files are near-duplicates. Merge unique content from
          separation-of-concerns.yml into role-separation.yml, then delete.
        target: "modules/AgenticGuidance/assets/definitions/separation-of-concerns.yml"

      - id: "consolidate_002"
        name: "Consider merging fence.yml + signpost.yml"
        status: "pending"
        description: |
          Conceptually paired teaching artifacts. Evaluate if merging into
          navigation-aids.yml improves clarity or just moves content around.
          May be better to keep separate if they serve distinct purposes.
        target: "modules/AgenticGuidance/assets/definitions/"

success_criteria:
  - "All redundant files (5) removed from definitions/"
  - "All strategy files (9 remaining) moved to guidelines/"
  - "All prescriptive files (~12) moved to guidelines/"
  - "All references updated across agent inputs.yml files"
  - "definitions/ contains only descriptive 'what is X?' content"
  - "guidelines/ contains all prescriptive 'how should I act?' content"

notes: |
  This plan addresses the highest-impact findings from the definitions audit.
  Additional findings (project-specific content generalization, obsolete Flutter files)
  are deferred to future sessions as they have lower impact and higher risk.

  The blind tests for planner component awareness are also deferred to allow
  this session's guidance changes to take effect before testing.

