name: definitions-audit-remediation
status: pending
priority: high
created: "2026-01-11"
phase_type: teach

objective: |
  Implement findings from the definitions audit conducted on 2026-01-11.
  88 definition files were audited by 6 parallel planner-guidance agents.
  Key issues identified:
  - 34% of files misclassified (should be guidelines)
  - 14% redundant/duplicate content
  - 9% project-specific content in shared framework
  - 3% potentially obsolete

inputs:
  - location: "docs/plans/live/260104AE_agenticguidance/live/plan_definitions_audit_master.md"
    description: "Master audit plan with detailed findings"
  - location: "docs/plans/live/260104AE_agenticguidance/live/batch*.md"
    description: "Batch audit reports (6 files)"

phases:
  # ========================================
  # PHASE 1: Remove Redundant Files
  # ========================================
  - name: "Teach: Remove Redundant Files"
    execution: sequential
    status: pending
    priority: high
    description: "Decommission files that are redundant or obsolete"
    tasks:
      - id: "redundant_001"
        name: "Decommission test-roles.yml"
        status: "pending"
        description: |
          File: modules/AgenticGuidance/assets/definitions/test-roles.yml
          Reason: Fully redundant with test-builder-role.yml + test-runner-role.yml
          Action:
          1. Verify no unique content
          2. Update any references to point to specific role files
          3. Delete file (no DEPRECATED.md)
        target: "modules/AgenticGuidance/assets/definitions/test-roles.yml"

      - id: "redundant_002"
        name: "Decommission testing-documentation.yml"
        status: "pending"
        description: |
          File: modules/AgenticGuidance/assets/definitions/testing-documentation.yml
          Reason: 100% project-specific (MyAgents paths)
          Action: Move to project-specific inputs or delete
        target: "modules/AgenticGuidance/assets/definitions/testing-documentation.yml"

      - id: "redundant_003"
        name: "Decommission acceptable-skips.yml"
        status: "pending"
        description: |
          File: modules/AgenticGuidance/assets/definitions/acceptable-skips.yml
          Reason: Project-specific test counts
          Action: Move to project-specific inputs or delete
        target: "modules/AgenticGuidance/assets/definitions/acceptable-skips.yml"

      - id: "redundant_004"
        name: "Decommission success-criteria-teacher.yml"
        status: "pending"
        description: |
          File: modules/AgenticGuidance/assets/definitions/success-criteria-teacher.yml
          Reason: Redundant with success-criteria.yml
          Action: Merge any unique content, then delete
        target: "modules/AgenticGuidance/assets/definitions/success-criteria-teacher.yml"

      - id: "redundant_005"
        name: "Decommission flutter-project-type.yml"
        status: "pending"
        description: |
          File: modules/AgenticGuidance/assets/definitions/flutter-project-type.yml
          Reason: Only 22 bytes, likely obsolete
          Action: Verify obsolete, then delete
        target: "modules/AgenticGuidance/assets/definitions/flutter-project-type.yml"

  # ========================================
  # PHASE 2: Reclassify Strategy Files
  # ========================================
  - name: "Teach: Move Strategy Files to Guidelines"
    execution: sequential
    status: pending
    priority: high
    description: "All strategy-*.yml files are prescriptive and belong in guidelines/"
    tasks:
      - id: "strategy_001"
        name: "Move strategy-*.yml files to guidelines/"
        status: "pending"
        description: |
          Move all 10 strategy files from definitions/ to guidelines/:
          - strategy-validation.yml
          - strategy-multi-layer.yml
          - strategy-agent-blind-test.yml
          - strategy-agent-review-loop.yml
          - strategy-documentation-validation.yml
          - strategy-fresh-environment.yml
          - strategy-test-suite.yml
          - strategy-user-acceptance.yml
          - strategy-user-simulation.yml

          NOTE: strategy-guidance-blind-test.yml already decommissioned (2026-01-11)

          After move:
          1. Update all references in agent inputs.yml files
          2. Update layer files (test-shared.yml, etc.)
          3. Update manifest.yml files
        target: "modules/AgenticGuidance/assets/definitions/strategy-*.yml"

  # ========================================
  # PHASE 3: Reclassify Other Prescriptive Files
  # ========================================
  - name: "Teach: Reclassify Prescriptive Definitions"
    execution: sequential
    status: pending
    priority: medium
    description: "Move prescriptive files from definitions/ to guidelines/"
    tasks:
      - id: "reclassify_001"
        name: "Move escalation.yml to guidelines/"
        status: "pending"
        description: "100% prescriptive behavioral rules"
        target: "modules/AgenticGuidance/assets/definitions/escalation.yml"

      - id: "reclassify_002"
        name: "Move exploration-principles.yml to guidelines/"
        status: "pending"
        description: "74 lines of 'how to act' rules"
        target: "modules/AgenticGuidance/assets/definitions/exploration-principles.yml"

      - id: "reclassify_003"
        name: "Move test-structure.yml to guidelines/"
        status: "pending"
        description: "Prescribes test organization (rename to test-organization.yml)"
        target: "modules/AgenticGuidance/assets/definitions/test-structure.yml"

      - id: "reclassify_004"
        name: "Move test-creation-principles.yml to guidelines/"
        status: "pending"
        description: "Explicitly 'principles' (prescriptive)"
        target: "modules/AgenticGuidance/assets/definitions/test-creation-principles.yml"

      - id: "reclassify_005"
        name: "Move test-execution-workflow.yml to guidelines/"
        status: "pending"
