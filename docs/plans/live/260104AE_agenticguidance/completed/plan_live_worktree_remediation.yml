# Plan: AgenticGuidance Worktree Policy Remediation
# Status: completed
# Priority: high (policy violation)
# Context: 21 AgenticGuidance files modified in main worktree instead of agenticguidance worktree

name: worktree-remediation
status: completed
priority: high
created: "2026-01-19"
updated: "2026-01-19"

objective: |
  Remediate worktree policy violation by transferring 21 uncommitted AgenticGuidance
  file modifications from the main worktree to the agenticguidance worktree, then
  properly commit and merge via PR.

problem_statement: |
  21 AgenticGuidance files were modified in the main worktree (/home/code/AgenticEngineering)
  instead of the dedicated agenticguidance worktree (/home/code/AgenticEngineering-agenticguidance).

  This violates the worktree-and-branching.yml guideline:
  - "Environment-worktree alignment" rule requires using the appropriate worktree for each phase
  - Changes to AgenticGuidance module should be developed in the agenticguidance worktree

  Impact: 1,190 insertions, 69 deletions across agent and asset files.

affected_files:
  agent_files:
    - modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml
    - modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
    - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
    - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
    - modules/AgenticGuidance/agents/planner/planner-build/process.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
    - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
    - modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml
    - modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml
    - modules/AgenticGuidance/agents/teacher/manifest.yml
    - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml
    - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
    - modules/AgenticGuidance/agents/test/test-audit/inputs.yml
    - modules/AgenticGuidance/agents/test/test-audit/process.yml
    - modules/AgenticGuidance/agents/test/test-final-output/inputs.yml
    - modules/AgenticGuidance/agents/test/test-final-output/process.yml
  asset_files:
    - modules/AgenticGuidance/assets/definitions/agent-loops.yml
    - modules/AgenticGuidance/assets/definitions/cli-commands.yml
    - modules/AgenticGuidance/assets/guidelines/context-minimisation.yml
    - modules/AgenticGuidance/assets/guidelines/fix-the-source.yml
    - modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml

worktree_paths:
  main: "/home/code/AgenticEngineering"
  agenticguidance: "/home/code/AgenticEngineering-agenticguidance"
  agenticguidance_branch: "agenticguidance"

phases:
  - id: phase_1
    name: "Stash and Transfer"
    status: pending
    description: |
      Safely stash uncommitted changes from the main worktree and transfer them
      to the correct agenticguidance worktree.
    tasks:
      - id: "1.1"
        name: "Verify worktree state"
        status: pending
        guidance: |
          Before stashing, verify both worktrees are in expected state:

          1. In main worktree (/home/code/AgenticEngineering):
             - Run `git status` to confirm 21 AgenticGuidance files are modified
             - Confirm no staged changes that should remain in main

          2. In agenticguidance worktree (/home/code/AgenticEngineering-agenticguidance):
             - Run `git status` to confirm clean state or note existing changes
             - Run `git log -1` to confirm on agenticguidance branch
        success_criteria:
          - "Main worktree shows exactly 21 modified AgenticGuidance files"
          - "Agenticguidance worktree state documented (clean or existing changes noted)"
          - "Both worktrees on expected branches (main and agenticguidance respectively)"

      - id: "1.2"
        name: "Create descriptive stash in main"
        status: pending
        guidance: |
          Stash the AgenticGuidance changes with a descriptive message for traceability:

          In /home/code/AgenticEngineering:
          ```
          git stash push -m "AgenticGuidance changes - worktree remediation transfer" -- modules/AgenticGuidance/
          ```

          Verify stash was created:
          ```
          git stash list
          git stash show stash@{0} --stat
          ```
        success_criteria:
          - "Stash created with descriptive message"
          - "Stash contains all 21 AgenticGuidance files"
          - "Main worktree is clean for AgenticGuidance module"

      - id: "1.3"
        name: "Apply stash in agenticguidance worktree"
        status: pending
        guidance: |
          Transfer the stashed changes to the agenticguidance worktree:

          1. Navigate to agenticguidance worktree:
             ```
             cd /home/code/AgenticEngineering-agenticguidance
             ```

          2. Fetch and rebase to ensure branch is current:
             ```
             git fetch origin
             git rebase origin/main
             ```

          3. Apply stash from main worktree:
             ```
             git stash apply stash@{0}
             ```
             Note: Stash is shared across worktrees in same repository.

          4. Verify all files transferred:
             ```
             git status
             git diff --stat
             ```
        success_criteria:
          - "All 21 files appear as modified in agenticguidance worktree"
          - "No merge conflicts from stash apply"
          - "Line counts match expected (approximately 1,190 insertions, 69 deletions)"

      - id: "1.4"
        name: "Clean up stash after successful transfer"
        status: pending
        guidance: |
          After verifying successful transfer, remove the stash:

          ```
          git stash drop stash@{0}
          ```

          Verify stash is removed:
          ```
          git stash list
          ```
        success_criteria:
          - "Stash removed from stash list"
          - "No orphaned stash entries"

  - id: phase_2
    name: "Commit and PR"
    status: pending
    description: |
      Review the transferred changes for logical grouping, create meaningful commits,
      and open a PR for merge back to main.
    tasks:
      - id: "2.1"
        name: "Analyze changes for commit grouping"
        status: pending
        guidance: |
          Review the changes to determine logical commit groupings:

          1. Review the diff to understand what was changed:
             ```
             git diff --stat
             git diff modules/AgenticGuidance/agents/
             git diff modules/AgenticGuidance/assets/
             ```

          2. Identify logical groupings by:
             - Feature area (agent updates vs asset updates)
             - Related changes (e.g., all planner agent updates together)
             - Dependent changes (changes that must go together)

          3. Suggested groupings (adjust based on actual content):
             - Agent process/inputs updates (16 files)
             - Asset definition updates (2 files)
             - Asset guideline updates (3 files)

          4. Document grouping decision before committing.
        success_criteria:
          - "Changes reviewed and understood"
          - "Logical commit groupings identified"
          - "Grouping rationale documented"

      - id: "2.2"
        name: "Create commits with clear messages"
        status: pending
        guidance: |
          Create meaningful commits based on grouping analysis:

          Example commit sequence (adjust based on 2.1 analysis):

          Commit 1 - Agent updates:
          ```
          git add modules/AgenticGuidance/agents/
          git commit -m "feat(AgenticGuidance): Update agent process and inputs files

          - Update orchestration-planning inputs and process
          - Update planner agents (build, guidance, reviewer)
          - Update teacher and test agent configurations
          - Align with latest context-minimisation patterns"
          ```

          Commit 2 - Asset definitions:
          ```
          git add modules/AgenticGuidance/assets/definitions/
          git commit -m "feat(AgenticGuidance): Update asset definitions

          - Update agent-loops.yml with refined loop patterns
          - Update cli-commands.yml with new command definitions"
          ```

          Commit 3 - Asset guidelines:
          ```
          git add modules/AgenticGuidance/assets/guidelines/
          git commit -m "feat(AgenticGuidance): Update asset guidelines

          - Refine context-minimisation.yml guidance
          - Update fix-the-source.yml patterns
          - Clarify worktree-and-branching.yml rules"
          ```
        success_criteria:
          - "All 21 files committed"
          - "Commits have descriptive messages explaining the changes"
          - "No uncommitted changes remaining"

      - id: "2.3"
        name: "Push branch and create PR"
        status: pending
        guidance: |
          Push the commits and create a PR for review:

          1. Push to remote:
             ```
             git push origin agenticguidance
             ```

          2. Create PR using gh CLI:
             ```
             gh pr create --title "feat(AgenticGuidance): Remediated worktree policy - agent and asset updates" --body "$(cat <<'EOF'
          ## Summary
          - Transfer of 21 AgenticGuidance files from main worktree to agenticguidance worktree
          - Updates to agent process/inputs files for improved context handling
          - Updates to asset definitions and guidelines

          ## Context
          These changes were incorrectly made in the main worktree. This PR remediates
          the worktree policy violation by properly committing in the agenticguidance branch.

          ## Test plan
          - [ ] Verify all agent files parse correctly
          - [ ] Verify guideline references are valid
          - [ ] Run any affected tests

          Generated with Claude Code
          EOF
          )"
             ```

          3. Note the PR URL for verification phase.
        success_criteria:
          - "Branch pushed to origin/agenticguidance"
          - "PR created with clear description"
          - "PR URL documented"

  - id: phase_3
    name: "Verification"
    status: pending
    description: |
      Verify the remediation is complete and both worktrees are in expected state.
    tasks:
      - id: "3.1"
        name: "Verify main worktree is clean"
        status: pending
        guidance: |
          Confirm main worktree has no AgenticGuidance changes:

          In /home/code/AgenticEngineering:
          ```
          git status -- modules/AgenticGuidance/
          ```

          Expected output: No changes to AgenticGuidance module.

          If any changes remain, investigate why stash did not capture them.
        success_criteria:
          - "git status shows no modified files in modules/AgenticGuidance/"
          - "Main worktree is clean or only contains expected non-AgenticGuidance changes"

      - id: "3.2"
        name: "Verify agenticguidance worktree has all changes"
        status: pending
        guidance: |
          Confirm all changes are committed in agenticguidance worktree:

          In /home/code/AgenticEngineering-agenticguidance:
          ```
          git status
          git log --oneline -5
          git diff origin/main --stat
          ```

          Verify:
          - No uncommitted changes
          - Recent commits contain the remediated changes
          - Diff from main shows expected files
        success_criteria:
          - "No uncommitted changes in agenticguidance worktree"
          - "Commits visible in git log"
          - "All 21 files accounted for in commits"

      - id: "3.3"
        name: "Verify PR follows worktree-and-branching guidelines"
        status: pending
        guidance: |
          Review the PR against worktree-and-branching.yml guidelines:

          1. Check PR is from correct branch:
             - Source: agenticguidance
             - Target: main

          2. Verify alignment with guidelines:
             - Environment-worktree alignment: Changes made in correct worktree
             - Main-First Planning: Plans remain in main (this is a code change, not a plan)

          3. Review PR description:
             - Clear explanation of changes
             - Acknowledgment of worktree remediation

          Reference: modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml
        success_criteria:
          - "PR source/target branches are correct"
          - "PR follows worktree-and-branching.yml conventions"
          - "No further policy violations"

      - id: "3.4"
        name: "Document remediation completion"
        status: pending
        guidance: |
          Update this plan file to mark remediation complete:

          1. Update plan status to 'completed'
          2. Add completion notes with:
             - PR URL
             - Final commit hashes
             - Any deviations from plan
          3. Move plan to completed/ folder:
             ```
             mv docs/plans/live/260104AE_agenticguidance/live/plan_live_worktree_remediation.yml \
                docs/plans/live/260104AE_agenticguidance/completed/
             ```
        success_criteria:
          - "Plan status updated to completed"
          - "PR URL documented"
          - "Plan archived to completed/ folder"

success_criteria:
  - "All 21 AgenticGuidance files transferred from main to agenticguidance worktree"
  - "Main worktree is clean (no AgenticGuidance modifications)"
  - "Changes properly committed with descriptive messages"
  - "PR created and ready for review"
  - "No data loss during transfer"
  - "Worktree policy compliance restored"

risks:
  - risk: "Merge conflicts when applying stash"
    mitigation: "Verify agenticguidance branch is rebased on latest main before applying"
  - risk: "Partial stash (not all files captured)"
    mitigation: "Verify stash file count matches expected 21 files before dropping"
  - risk: "Stash lost before transfer complete"
    mitigation: "Do not drop stash until transfer verified in destination worktree"

notes: |
  This remediation addresses a policy violation discovered during development.
  The violation occurred because changes were made in the main worktree instead
  of the dedicated agenticguidance worktree.

  WORKTREE POLICY REMINDER:
  - AgenticGuidance changes should be made in /home/code/AgenticEngineering-agenticguidance
  - The agenticguidance worktree tracks the 'agenticguidance' branch
  - Changes are merged to main via PR after proper review

  Reference: modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml

estimated_effort: "30-60 minutes"
