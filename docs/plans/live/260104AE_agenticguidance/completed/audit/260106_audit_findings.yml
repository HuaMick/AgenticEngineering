    - path: "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
      action: "CREATE"
      content_source: "Copy from main repo /home/code/AgenticEngineering/modules/AgenticGuidance/entrypoints/_plan_teach.yml"

    - path: "modules/AgenticGuidance/entrypoints/_plan_build.yml"
      action: "REPLACE"
      content_source: "Copy from main repo /home/code/AgenticEngineering/modules/AgenticGuidance/entrypoints/_plan_build.yml"

    - path: "modules/AgenticGuidance/entrypoints/_orchestrate.yml"
      action: "EDIT"
      edits:
        - line: 11
          old: "# Requires: Pre-approved plan folder path from _plan.yml output"
          new: "# Requires: Pre-approved plan folder path from _plan_build.yml or _plan_teach.yml output"
        - line: 21
          old: '- "Pre-approved plan folder path (from _plan.yml output)"'
          new: '- "Pre-approved plan folder path (from _plan_build.yml or _plan_teach.yml output)"'

    - path: "modules/AgenticGuidance/agents/orchestration/manifest.yml"
      action: "REPLACE"
      content_source: "Copy from main repo /home/code/AgenticEngineering/modules/AgenticGuidance/agents/orchestration/manifest.yml"

    - path: "modules/AgenticGuidance/assets/examples/teacher/concise.yml"
      action: "EDIT"
      edits:
        - line: 20
          old: "Example: entrypoints/_plan.yml -> _orchestrate.yml or _teach.yml"
          new: "Example: _plan_build.yml -> _orchestrate.yml"
        - line: 29
          old: "Example: _plan.yml -> _orchestrate.yml or _teach.yml"
          new: "Example: _plan_build.yml -> _orchestrate.yml"

