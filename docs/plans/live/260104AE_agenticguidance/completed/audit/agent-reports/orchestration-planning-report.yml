summary:
  total_issues: 19
  critical: 2
  high: 6
  medium: 7
  low: 4

# ==============================================
# FILE: process.mmd
# ==============================================
process_mmd:
  file: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
  status: "exists"

  critical:
    - id: "PROC-MMD-C01"
      title: "No escalation handling for max iterations in planning loops"
      description: |
        The process.mmd references planner-loop with MAX_ITERATIONS: 5 but does not show
        explicit escalation paths when max iterations are reached within each planning loop.
        The loops show "No: Refine" going back to the planner but no max-iteration check.
      location: "Lines 77-142 (PlanningLoops_SG subgraph)"
      impact: "Could cause infinite loops if planner and reviewer never agree"
      fix_suggestion: |
        Add iteration counter check nodes before each "SpawnPlanner*Fix" transition:
        - TeachIterCheck{Max Iterations?}
        - TeachIterCheck -- "Yes" --> EscalateTeach((Escalate to User))
        - TeachIterCheck -- "No" --> SpawnPlannerTeachFix

    - id: "PROC-MMD-C02"
      title: "Missing process.yml file"
      description: |
        The inputs.yml references "Follow: process.yml" pattern but no process.yml exists.
        Only process.mmd exists. The agent loading mechanism may expect both files.
      location: "N/A - file missing"
      impact: "Agent loader may fail to find process instructions"
      fix_suggestion: |
        Create process.yml that wraps process.mmd or update naming convention.
        Alternatively, ensure agent loader can handle .mmd-only agents.

  high:
    - id: "PROC-MMD-H01"
      title: "Inconsistent planner agent naming"
      description: |
        process.mmd uses "planner-guidance" for teach phase but the established naming
        in manifest.yml and agent structure shows "planner-guidance" exists. However,
        the semantic mapping between "teach" phase and "planner-guidance" is not explicit.
      location: "Lines 82-93 (Teach Planning Loop)"
      impact: "Agent may spawn wrong planner or fail to find correct agent"
      fix_suggestion: |
        Add explicit mapping comment: %% AGENT_MAPPING: teach -> planner-guidance
        Or create phase-to-agent routing table in inputs.yml

    - id: "PROC-MMD-H02"
      title: "No validation of CLI command availability"
      description: |
        The process assumes agentic-cli commands (agentic worktree status,
        agentic plan validate) exist but never validates their availability.
      location: "Lines 34-36"
      impact: "Process fails with cryptic error if CLI not installed"
      fix_suggestion: |
        Add CLI availability check before using CLI commands:
        LoadInputs --> CheckCLI{CLI Available?}
        CheckCLI -- "No" --> FallbackManual[Use Manual Verification]

    - id: "PROC-MMD-H03"
      title: "INPUT_PATH uses different file than documented"
      description: |
        Line 8 shows INPUT_PATH: agents/orchestration/orchestration-planning/inputs.yml
        This is the correct path, but the comment structure differs from other agents
        that use explicit "Load: <path>" instructions.
      location: "Line 8"
      impact: "Inconsistent input loading patterns across agents"
      fix_suggestion: |
        Standardize to use consistent input loading directive format

  medium:
    - id: "PROC-MMD-M01"
      title: "Unclear phase placeholder file format"
      description: |
        "CreatePlaceholders[Create Phase Placeholder Files]" does not specify
        what format these placeholder files should have or where they go.
      location: "Line 59"
      impact: "Downstream agents may not recognize placeholder format"
      fix_suggestion: |
        Add comment specifying placeholder file naming and location:
        %% PLACEHOLDER_FORMAT: plan_live_<phase>.yml in docs/plans/<plan_folder>/live/

    - id: "PROC-MMD-M02"
      title: "Missing explicit output schema"
      description: |
        The Output_SG subgraph describes what to report but not the structured
        format. Compare to orchestration-guidance which has explicit output schema.
      location: "Lines 179-183"
      impact: "Consumers cannot reliably parse output"
      fix_suggestion: |
        Add %% OUTPUT_SCHEMA comment or reference to schema definition

    - id: "PROC-MMD-M03"
      title: "Link style index may be fragile"
      description: |
        Line 194 hardcodes "linkStyle 57" which depends on exact edge count.
        Adding or removing edges will break this styling.
      location: "Line 194"
      impact: "Styling breaks when diagram is modified"
      fix_suggestion: |
        Use named classes or calculate edge index dynamically in documentation

  low:
    - id: "PROC-MMD-L01"
      title: "Missing diagram version comment"
      description: |
        No version header to track diagram changes relative to process evolution.
      location: "Top of file"
      impact: "Difficult to track which version of diagram matches which agent version"
      fix_suggestion: |
        Add: %% VERSION: 1.0 matching manifest.yml version

# ==============================================
# FILE: inputs.yml
# ==============================================
inputs_yml:
  file: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
  status: "exists"

  critical: []  # No critical issues

  high:
    - id: "INP-H01"
      title: "Mixed input structure - required_inputs vs inputs"
      description: |
        File uses two different top-level keys: required_inputs (lines 18-29) and
        inputs (lines 31-110). The relationship between these is unclear.
        Some loaders may only read one section.
      location: "Lines 18-31"
      impact: "Agent may not load required inputs correctly"
      fix_suggestion: |
        Either merge into single inputs section with required: true/false flags,
        or document the semantic difference clearly at top of file.

    - id: "INP-H02"
      title: "cli_commands section nested incorrectly"
      description: |
        cli_commands is nested under inputs as a mapping, but inputs also contains
        a list of location/description objects. This mixed structure is invalid YAML
        in terms of consistent typing.
      location: "Lines 39-52"
      impact: "YAML parsers may fail or misinterpret structure"
      fix_suggestion: |
        Move cli_commands to separate top-level key:
        cli_reference:
          worktree: {...}
          plan: {...}

    - id: "INP-H03"
      title: "Missing planner-build example reference"
      description: |
        inputs.yml references plan examples but the examples are for teach/test/audit_clean.
        No explicit build phase example is shown in the examples list, yet build is a
        primary phase for orchestration-planning.
      location: "Lines 99-109"
      impact: "Build phase planning has no example to reference"
      fix_suggestion: |
        Add: - location: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml"
        (File exists at this location)

  medium:
    - id: "INP-M01"
      title: "Path resolution semantics could be clearer"
      description: |
        The PATH RESOLUTION SEMANTICS header explains module root vs target root,
        but the EXCEPTION for docs/plans/ is only mentioned once and could be
        missed when reading individual input paths.
      location: "Lines 1-10"
      impact: "Path resolution errors when switching contexts"
      fix_suggestion: |
        Add inline markers for target-project paths:
        # TARGET_PROJECT_PATH: docs/plans/live/

    - id: "INP-M02"
      title: "No input validation schema"
      description: |
        required_inputs lists type: "string" but no validation constraints
        (min length, format patterns, etc.)
      location: "Lines 18-29"
      impact: "Invalid inputs may pass through"
      fix_suggestion: |
        Add validation constraints:
        format: "^/.*$"  # must be absolute path
        min_length: 1

    - id: "INP-M03"
      title: "Description mismatch for planner-guidance"
      description: |
        Line 95 describes planner-guidance as "Planning agent guidance and process improvements"
        but teach phase in process.mmd is about "guidance, process, or documentation improvements".
        Slight semantic inconsistency.
      location: "Line 95"
      impact: "Minor confusion about scope"
      fix_suggestion: |
        Align descriptions across files

  low:
    - id: "INP-L01"
      title: "Examples use placeholder naming"
      description: |
        Example paths use "YYMMDDRepo_Branch" placeholder naming which may confuse
        agents trying to learn the pattern.
      location: "Lines 100-107"
      impact: "Pattern learning may be hindered"
      fix_suggestion: |
        Add explicit naming pattern comment above examples

    - id: "INP-L02"
      title: "No default values for optional inputs"
      description: |
        While required_inputs clearly marks required: true, the other inputs
        don't specify defaults or fallback behavior.
      location: "Throughout inputs section"
      impact: "Unclear behavior when optional inputs missing"
      fix_suggestion: |
        Add default: field or required: false explicitly

# ==============================================
# FILE: manifest.yml
# ==============================================
manifest_yml:
  file: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/manifest.yml"
  status: "exists"

  critical: []  # No critical issues

  high: []  # No high issues

  medium:
    - id: "MAN-M01"
      title: "Missing loop_context section"
      description: |
        orchestration-guidance has loop_context section defining how it participates
        in loops, but orchestration-planning lacks this despite using planner-loop.
      location: "File-level"
      impact: "Loop participation behavior undefined"
      fix_suggestion: |
        Add loop_context section:
        loop_context:
          participates_in:
            - "planner-loop"
          role: "orchestrator"

    - id: "MAN-M02"
      title: "Missing outputs section"
      description: |
        orchestration-guidance has detailed outputs section with schema.
        orchestration-planning lacks this despite producing plan folder output.
      location: "File-level"
      impact: "Output format undocumented"
      fix_suggestion: |
        Add outputs section with schema for approved plan folder structure

  low:
    - id: "MAN-L01"
      title: "Missing category reference"
      description: |
        planner/manifest.yml references category: definition: "assets/definitions/..."
        but orchestration-planning manifest lacks this structure.
      location: "File-level"
      impact: "Inconsistent categorization patterns"
      fix_suggestion: |
        Add category reference to agent-categories.yml#orchestration

# ==============================================
# CROSS-FILE ISSUES
# ==============================================
cross_file_issues:
  high:
    - id: "CROSS-H01"
      title: "Version consistency not enforced"
      description: |
        manifest.yml shows version: "1.0" but process.mmd has no version marker.
        Changes to either file may not be synchronized.
      files: ["manifest.yml", "process.mmd"]
      impact: "Version drift between process and manifest"
      fix_suggestion: |
        Add %% VERSION: 1.0 to process.mmd header

  medium:
    - id: "CROSS-M01"
      title: "Fragment reference format inconsistent"
      description: |
        process.mmd uses "assets/definitions/agent-loops.yml#planner-loop" style
        but inputs.yml uses flat location paths without fragment references.
        Both styles should be documented or unified.
      files: ["process.mmd", "inputs.yml"]
      impact: "Inconsistent path resolution expectations"
      fix_suggestion: |
        Document supported path formats in PATH RESOLUTION SEMANTICS section

# ==============================================
# RECOMMENDATIONS
# ==============================================
recommendations:
  priority_1:
    - "Add max iteration escalation handling to planning loops (PROC-MMD-C01)"
    - "Create process.yml or update loader to handle .mmd-only (PROC-MMD-C02)"

  priority_2:
    - "Fix cli_commands YAML structure (INP-H02)"
    - "Add loop_context and outputs sections to manifest.yml (MAN-M01, MAN-M02)"
    - "Add plan_live_build.yml example reference (INP-H03)"

  priority_3:
    - "Standardize path resolution markers (INP-M01)"
    - "Add version comments to process.mmd (CROSS-H01)"
    - "Document placeholder file format (PROC-MMD-M01)"

# ==============================================
# VALIDATION COMMANDS
# ==============================================
validation_commands:
  - description: "Verify all referenced input files exist"
    command: |
      for path in $(grep "location:" inputs.yml | sed 's/.*location: "//;s/"//'); do
        if [ ! -f "modules/AgenticGuidance/$path" ]; then
          echo "MISSING: $path"
        fi
      done

  - description: "Check YAML syntax validity"
    command: "yq eval inputs.yml && yq eval manifest.yml"

  - description: "Verify CLI commands exist"
    command: "agentic --help || echo 'CLI not available'"
