# ============================================================================
# CROSS-CUTTING ISSUES - CRITICAL
# ============================================================================
critical_patterns:

  - id: CC-001
    severity: critical
    title: "Legacy-only agents: planner-phases and planner-teach"
    description: |
      Two planner agents exist ONLY in legacy location and have NOT been migrated:
      - planner-phases: modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/planner/planner-phases/
      - planner-teach: modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/planner/planner-teach/

      These are NOT present in modules/AgenticGuidance/agents/planner/ and are NOT
      listed in agent-categories.yml.
    impact: |
      Any orchestrator or entrypoint referencing these agents will fail.
      No current invocation path exists for these agents.
    affected_agents:
      - planner-phases
      - planner-teach
    recommendation: |
      Decision required:
      1. Migrate agents with full updates (PATH RESOLUTION, required_inputs, layers)
      2. Deprecate if functionality absorbed by other agents
      3. Merge into orchestration-planning if appropriate
    remediation_task: "rem2_001"

  - id: CC-002
    severity: critical
    title: "Fragment reference resolution inconsistency"
    description: |
      Fragment references like 'agent-loops.yml#planner-loop' assume top-level keys,
      but actual file structure nests under 'loop_types.planner-loop'.
      Same issue for 'agent-categories.yml#planner' which is under 'agent_categories.planner'.
    impact: |
      Agents cannot resolve fragment references correctly.
      May load entire files instead of specific sections.
    affected_agents:
      - orchestration-planning
      - planner-guidance
      - planner-build
    recommendation: |
      Either:
      1. Update fragment-references.yml to support dot-notation
      2. Restructure definition files to have target keys at top level
      3. Update all references to use correct nested paths
    remediation_task: "rem2_002"

  - id: CC-003
    severity: critical
    title: "Missing process.yml for orchestration agents"
    description: |
      orchestration-planning and orchestration-build have process.mmd but no process.yml.
      Other agents expect process.yml for execution instructions.
    impact: |
      Agent loader may fail to find process instructions.
      Inconsistent file patterns across agent types.
    affected_agents:
      - orchestration-planning
      - orchestration-build
    recommendation: |
      Either:
      1. Create process.yml wrappers that reference process.mmd
      2. Update agent loader to handle .mmd-only agents
      3. Standardize on single process file format
    remediation_task: "rem2_003"

  - id: CC-004
    severity: critical
    title: "NOT_MIGRATED test agents referenced without fallback"
    description: |
      planner-test manifest references test agents that don't exist:
      - test-user-simulator (NOT_MIGRATED)
      - test-service (NOT_MIGRATED)
      - test-builder (NOT_MIGRATED)
    impact: |
      Cannot spawn user simulator UAT, service tests, or builder tests.
      Test planning for these strategies will fail.
    affected_agents:
      - planner-test
    recommendation: |
      1. Add structured fallback_path fields for NOT_MIGRATED agents
      2. Or migrate the missing agents
      3. Or remove strategies that require unmigrated agents
    remediation_task: "rem2_004"

# ============================================================================
# CROSS-CUTTING ISSUES - HIGH
# ============================================================================
high_patterns:

  - id: HH-001
    severity: high
    title: "Version mismatches between manifest.yml and inputs.yml"
    description: |
      Multiple agents have different versions in manifest vs inputs:
      - planner-build: manifest 1.0, inputs 2.0-p1
      - planner-guidance: manifest 1.0, inputs 2.0-p1
      - planner-test: aligned at 2.0 (good)
    impact: |
      Orchestrators checking version compatibility may get confused.
    affected_agents:
      - planner-build
      - planner-guidance
    recommendation: |
      Align versions across files. Add version scheme documentation.
    remediation_task: "rem2_005"

  - id: HH-002
    severity: high
    title: "Empty outputs sections (outputs: []) despite documented outputs"
    description: |
      Process files declare outputs: [] but steps describe generating artifacts.
      No formal output schema for downstream consumers.
    impact: |
      Downstream agents cannot validate expected outputs.
      No contract for output structure.
    affected_agents:
      - orchestration-planning
      - orchestration-build
      - planner-build
      - planner-guidance
      - planner-test
    recommendation: |
      Populate outputs sections with formal schema including:
      - path templates
      - required fields
      - schema references
    remediation_task: "rem2_006"

  - id: HH-003
    severity: high
    title: "CLI commands referenced but not documented in all relevant inputs.yml"
    description: |
      Process files use CLI commands (agentic plan move, agentic worktree status)
      but not all inputs.yml files document these commands consistently.
    impact: |
      Agents may not know which CLI commands are available or their syntax.
    affected_agents:
      - orchestration-build
      - orchestration-planning
    recommendation: |
      Centralize CLI command documentation in assets/definitions/cli-commands.yml
      and reference from all relevant inputs.yml files.
    remediation_task: "rem2_007"

  - id: HH-004
    severity: high
    title: "Missing spawns declarations in manifest files"
    description: |
      Agents spawn other agents but don't declare these in manifest.yml.
      No validation that spawned agents exist and are compatible.
    impact: |
      Cannot verify spawn chain integrity at load time.
    affected_agents:
      - orchestration-build (spawns 9+ agents)
      - orchestration-planning (spawns 5+ agents)
    recommendation: |
      Add spawns section to manifest.yml listing all agents that can be spawned.
    remediation_task: "rem2_008"

  - id: HH-005
    severity: high
    title: "Required input validation not explicit in process steps"
    description: |
      inputs.yml defines required_inputs but process.yml step 1 only says
      "if an input cannot be found do not proceed" without explicit validation.
    impact: |
      Agents may proceed without required inputs or fail silently.
    affected_agents:
      - planner-guidance
      - planner-build
      - planner-test
    recommendation: |
      Add explicit validation step listing each required input and error messaging.
    remediation_task: "rem2_009"

  - id: HH-006
    severity: high
    title: "REPO_ROOT variable undefined"
    description: |
      deploy-worktree uses ${REPO_ROOT} in git commands but this variable
      is never defined or documented.
    impact: |
      Git worktree creation commands would fail.
    affected_agents:
      - deploy-worktree
    recommendation: |
      Define REPO_ROOT in inputs.yml or use target_project_path consistently.
    remediation_task: "rem2_010"

  - id: HH-007
    severity: high
    title: "Path resolution ambiguity: module root vs target project"
    description: |
      Inputs.yml uses dual path resolution (module root vs target project root)
      documented in header but easy to miss for specific paths.
    impact: |
      Path resolution errors when switching contexts.
    affected_agents:
      - All agents using docs/plans/ paths
    recommendation: |
      Use explicit prefixes like {module_root}/ and {project_root}/ in paths.
    remediation_task: "rem2_011"

