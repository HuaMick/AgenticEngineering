    estimated_effort: "high"
    depends_on: ["test_01"]

    tasks:
      # -----------------------------------------------------------------------
      # Task 2.1: Test Session Grouping Logic
      # -----------------------------------------------------------------------
      - task_id: "test_02_001"
        description: "Test session grouping by session_id and time-window fallback"
        status: "pending"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "Session grouping configuration"

        guidance: |
          Test session_analysis.grouping configuration:

          Test Cases:
          1. Runs with session_id are grouped by session_id
          2. Runs without session_id fall back to time_window_30min grouping
          3. Mixed runs (some with, some without session_id) are handled correctly

          Mock Data:
          ```python
          mock_runs = [
              {"id": "1", "session_id": "sess-A", "start_time": "2026-01-22T10:00:00"},
              {"id": "2", "session_id": "sess-A", "start_time": "2026-01-22T10:05:00"},
              {"id": "3", "session_id": "sess-B", "start_time": "2026-01-22T11:00:00"},
              {"id": "4", "session_id": None, "start_time": "2026-01-22T12:00:00"},  # Fallback
              {"id": "5", "session_id": None, "start_time": "2026-01-22T12:15:00"},  # Same window
          ]
          ```

          Expected Groups:
          - Group "sess-A": runs 1, 2
          - Group "sess-B": run 3
          - Group "time-window-12:00": runs 4, 5

        success_criteria:
          - "Runs with session_id are grouped correctly"
          - "Runs without session_id use time-window fallback"
          - "30-minute window boundary is respected"
          - "Group metadata includes session count"

      # -----------------------------------------------------------------------
      # Task 2.2: Test min_affected_sessions Filtering
      # -----------------------------------------------------------------------
      - task_id: "test_02_002"
        description: "Test pattern filtering by min_affected_sessions threshold"
        status: "pending"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "Threshold configuration (default: 2)"

        guidance: |
          Test session_analysis.thresholds filtering:

          Test Cases:
          1. Pattern in 1 session -> filtered out (below threshold)
          2. Pattern in 2 sessions -> included (meets threshold)
          3. Pattern in 5 sessions -> included (exceeds threshold)
          4. Critical severity pattern in 1 session -> included (exception)

          Mock Detection Results:
          ```python
          mock_patterns = [
              {"id": "FP-001-001", "affected_sessions": ["sess-A"], "severity": "medium"},  # Filtered
              {"id": "FP-002-001", "affected_sessions": ["sess-A", "sess-B"], "severity": "medium"},  # Included
              {"id": "FP-003-001", "affected_sessions": ["sess-A"], "severity": "critical"},  # Exception
          ]
          ```

        success_criteria:
          - "Single-session patterns are filtered out by default"
          - "Multi-session patterns (>=2) are included"
          - "Critical severity exceptions are respected"
          - "Filtered patterns are logged but not reported"

      # -----------------------------------------------------------------------
      # Task 2.3: Test Severity Classification
      # -----------------------------------------------------------------------
      - task_id: "test_02_003"
        description: "Test severity classification based on session frequency"
        status: "pending"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "Severity classification criteria"

        guidance: |
          Test severity_classification rules:

          - high: >50% of analyzed sessions
          - medium: 20-50% of analyzed sessions
          - low: <20% of analyzed sessions

          Test Cases (10 sessions analyzed):
          1. Pattern in 6 sessions (60%) -> high
          2. Pattern in 3 sessions (30%) -> medium
          3. Pattern in 1 session (10%) -> low

          Edge Cases:
          - Exactly 50% -> medium (not high)
          - Exactly 20% -> medium (not low)
          - Pattern with visible user impact -> high (regardless of frequency)

        success_criteria:
          - "High severity assigned for >50% frequency"
          - "Medium severity assigned for 20-50% frequency"
          - "Low severity assigned for <20% frequency"
          - "Edge cases handled correctly"

      # -----------------------------------------------------------------------
      # Task 2.4: Test Resolution Recommendation Mapping
      # -----------------------------------------------------------------------
      - task_id: "test_02_004"
        description: "Test pattern-to-resolution type mapping"
