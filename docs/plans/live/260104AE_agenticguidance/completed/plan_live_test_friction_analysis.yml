friction_patterns_under_test:
  - id: FP-001
    name: "Excessive Retries"
    detection_signals:
      - "Multiple consecutive runs with same name pattern"
      - "Error -> Retry -> Error -> Retry sequences"
    default_resolution: GUIDANCE_UPDATE

  - id: FP-002
    name: "Exploration Drift"
    detection_signals:
      - "Many Glob/Grep/Read tool calls before task execution"
      - "High tool-to-llm ratio in early run phases"
    default_resolution: GUIDANCE_UPDATE

  - id: FP-003
    name: "Missing Context Requests"
    detection_signals:
      - "AskUserQuestion calls for routine decisions"
      - "Questions about standard patterns/conventions"
    default_resolution: GUIDANCE_UPDATE

  - id: FP-004
    name: "Output Schema Violations"
    detection_signals:
      - "Validation errors in tool calls"
      - "Reviewer rejections citing format issues"
    default_resolution: GUIDANCE_UPDATE

  - id: FP-005
    name: "Convention Violations"
    detection_signals:
      - "File/folder names not matching patterns"
      - "Post-creation renames or corrections"
    default_resolution: CLI_OFFLOAD

  - id: FP-006
    name: "Automatable Patterns"
    detection_signals:
      - "Identical tool call sequences across sessions"
      - "Boilerplate generation patterns"
    default_resolution: CLI_OFFLOAD

phases:
  # ===========================================================================
  # Phase 1: Unit Tests - Friction Pattern Detection Logic
  # ===========================================================================
  - phase_id: "test_01"
    name: "Unit Tests - Friction Pattern Detection Logic"
    description: |
      Test individual friction pattern detectors with mock trace data.
      Each pattern (FP-001 through FP-006) should have isolated unit tests
      verifying detection signals are correctly identified.
    status: "completed"
    completion_note: |
      Tests already exist in modules/AgenticLangSmith/tests/test_friction.py.
      28 tests covering all friction patterns and resolution recommendations.
    estimated_effort: "high"

    tasks:
      # -----------------------------------------------------------------------
      # Task 1.1: Test FP-001 Excessive Retries Detection
      # -----------------------------------------------------------------------
      - task_id: "test_01_001"
        description: "Test FP-001: Excessive Retries pattern detection"
        status: "completed"
        completion_note: "Tests exist: test_detect_retry_pattern, test_no_retry_pattern_under_threshold"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "FP-001 detection signal definitions"

        guidance: |
          Create mock trace data that exhibits FP-001 signals:

          Test Cases:
          1. Consecutive runs with same name pattern (e.g., "Edit_file_attempt_1", "Edit_file_attempt_2")
          2. Error -> Retry -> Error -> Retry sequences in tool calls
          3. Same tool called 3+ times with similar parameters within a session
          4. Negative case: Normal retry (1-2 retries) should NOT trigger

          Mock Trace Structure:
          ```python
          mock_trace_fp001 = {
              "session_id": "test-session-001",
              "runs": [
                  {"name": "Edit", "status": "error", "tool": "Edit", "params": {"file": "test.py"}},
                  {"name": "Edit", "status": "error", "tool": "Edit", "params": {"file": "test.py"}},
                  {"name": "Edit", "status": "error", "tool": "Edit", "params": {"file": "test.py"}},
                  {"name": "Edit", "status": "success", "tool": "Edit", "params": {"file": "test.py"}},
              ]
          }
          ```

        success_criteria:
          - "Detector identifies consecutive same-name runs as FP-001"
          - "Detector identifies error-retry-error sequences as FP-001"
          - "Detector does NOT flag normal single retries"
          - "Returns pattern with severity based on retry count"

      # -----------------------------------------------------------------------
      # Task 1.2: Test FP-002 Exploration Drift Detection
      # -----------------------------------------------------------------------
      - task_id: "test_01_002"
        description: "Test FP-002: Exploration Drift pattern detection"
        status: "completed"
        completion_note: "Tests exist: test_detect_exploration_drift, test_no_drift_with_balanced_tools"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "FP-002 detection signal definitions"

        guidance: |
          Create mock trace data that exhibits FP-002 signals:

          Test Cases:
          1. Many Glob/Grep/Read calls (>10) before any Edit/Write call
          2. High tool-to-llm ratio in early run phases (>5:1)
          3. Codebase exploration spanning multiple directories without finding target
          4. Negative case: Efficient exploration (2-3 searches) should NOT trigger

          Mock Trace Structure:
          ```python
          mock_trace_fp002 = {
              "session_id": "test-session-002",
              "runs": [
                  {"name": "Glob", "tool": "Glob", "params": {"pattern": "*.py"}},
                  {"name": "Grep", "tool": "Grep", "params": {"pattern": "function"}},
                  {"name": "Read", "tool": "Read", "params": {"file": "src/a.py"}},
                  {"name": "Read", "tool": "Read", "params": {"file": "src/b.py"}},
                  # ... 10+ more exploration calls
                  {"name": "Edit", "tool": "Edit", "params": {"file": "src/target.py"}},
              ]
          }
          ```

        success_criteria:
          - "Detector identifies >10 exploration calls before action as FP-002"
          - "Detector calculates tool-to-llm ratio correctly"
          - "Detector does NOT flag efficient 2-3 call exploration"
          - "Returns pattern with drift magnitude"

      # -----------------------------------------------------------------------
      # Task 1.3: Test FP-003 Missing Context Detection
      # -----------------------------------------------------------------------
      - task_id: "test_01_003"
        description: "Test FP-003: Missing Context Requests pattern detection"
        status: "completed"
        completion_note: "Tests exist: test_detect_missing_context, test_no_pattern_with_few_questions"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "FP-003 detection signal definitions"

        guidance: |
          Create mock trace data that exhibits FP-003 signals:

          Test Cases:
          1. AskUserQuestion calls for routine decisions (naming conventions, file locations)
          2. Questions about standard patterns that should be in guidance
          3. Repeated questions about same topic across sessions
          4. Negative case: Novel/edge-case questions should NOT trigger

          Mock Trace Structure:
          ```python
          mock_trace_fp003 = {
              "session_id": "test-session-003",
              "runs": [
                  {
                      "name": "AskUser",
                      "tool": "AskUserQuestion",
                      "params": {"question": "What naming convention should I use for test files?"}
                  },
                  {
                      "name": "AskUser",
                      "tool": "AskUserQuestion",
                      "params": {"question": "Where should I put the new module?"}
                  },
              ]
          }
          ```

          Keywords to detect routine questions:
          - "naming convention", "file location", "standard pattern"
          - "where should", "what format", "how do I usually"

        success_criteria:
          - "Detector identifies AskUserQuestion for routine decisions as FP-003"
          - "Detector extracts question keywords for classification"
          - "Detector does NOT flag novel/unique questions"
          - "Returns pattern with question categories"

      # -----------------------------------------------------------------------
      # Task 1.4: Test FP-004 Schema Violations Detection
      # -----------------------------------------------------------------------
      - task_id: "test_01_004"
        description: "Test FP-004: Output Schema Violations pattern detection"
        status: "completed"
        completion_note: "Tests exist: test_detect_schema_violations, test_no_pattern_without_schema_errors"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "FP-004 detection signal definitions"

        guidance: |
          Create mock trace data that exhibits FP-004 signals:

          Test Cases:
          1. Validation errors in tool calls (malformed JSON, missing required fields)
          2. Reviewer rejections citing format issues
          3. Post-generation corrections to fix schema compliance
          4. Negative case: Successful first-attempt outputs should NOT trigger

          Mock Trace Structure:
          ```python
          mock_trace_fp004 = {
              "session_id": "test-session-004",
              "runs": [
                  {
                      "name": "Write",
                      "tool": "Write",
                      "status": "error",
                      "error": "ValidationError: missing required field 'name'"
                  },
                  {
                      "name": "Write",
                      "tool": "Write",
                      "status": "success",
                      "params": {"content": "...with name field added"}
                  },
              ]
          }
          ```

        success_criteria:
          - "Detector identifies validation errors as FP-004"
          - "Detector extracts schema violation type from error messages"
          - "Detector does NOT flag non-schema errors"
          - "Returns pattern with violation categories"

      # -----------------------------------------------------------------------
      # Task 1.5: Test FP-005 Convention Violations Detection
      # -----------------------------------------------------------------------
      - task_id: "test_01_005"
        description: "Test FP-005: Convention Violations pattern detection"
        status: "completed"
        completion_note: "Tests exist: test_detect_convention_violations"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "FP-005 detection signal definitions"

        guidance: |
          Create mock trace data that exhibits FP-005 signals:

          Test Cases:
          1. File/folder names not matching patterns (e.g., "myTest.py" instead of "test_my.py")
          2. Post-creation renames or corrections (Write then Rename/Move)
          3. Branch names violating conventions
          4. Negative case: Correct naming on first attempt should NOT trigger

          Mock Trace Structure:
          ```python
          mock_trace_fp005 = {
              "session_id": "test-session-005",
              "runs": [
                  {
                      "name": "Write",
                      "tool": "Write",
                      "params": {"file_path": "tests/myTestFile.py"}  # Wrong convention
                  },
                  {
                      "name": "Bash",
                      "tool": "Bash",
                      "params": {"command": "mv tests/myTestFile.py tests/test_my_file.py"}  # Correction
                  },
              ]
          }
          ```

        success_criteria:
          - "Detector identifies non-conventional names as FP-005"
          - "Detector identifies post-creation renames as FP-005"
          - "Detector does NOT flag correctly named files"
          - "Returns pattern with convention type violated"

      # -----------------------------------------------------------------------
      # Task 1.6: Test FP-006 Automatable Patterns Detection
      # -----------------------------------------------------------------------
      - task_id: "test_01_006"
        description: "Test FP-006: Automatable Patterns detection"
        status: "completed"
        completion_note: "Tests exist: test_detect_automatable_patterns"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "FP-006 detection signal definitions"

        guidance: |
          Create mock trace data that exhibits FP-006 signals:

          Test Cases:
          1. Identical tool call sequences across different sessions
          2. Boilerplate generation patterns (same template with variable substitution)
          3. Repeated multi-step workflows (e.g., read->modify->write->test pattern)
          4. Negative case: Unique sequences should NOT trigger

          Mock Trace Structure:
          ```python
          # Session 1
          mock_trace_fp006_session1 = {
              "session_id": "test-session-006a",
              "runs": [
                  {"name": "Read", "tool": "Read", "params": {"file": "template.py"}},
                  {"name": "Write", "tool": "Write", "params": {"file": "new_module.py"}},
                  {"name": "Bash", "tool": "Bash", "params": {"command": "pytest"}},
              ]
          }

          # Session 2 - Same sequence
          mock_trace_fp006_session2 = {
              "session_id": "test-session-006b",
              "runs": [
                  {"name": "Read", "tool": "Read", "params": {"file": "template.py"}},
                  {"name": "Write", "tool": "Write", "params": {"file": "another_module.py"}},
                  {"name": "Bash", "tool": "Bash", "params": {"command": "pytest"}},
              ]
          }
          ```

        success_criteria:
          - "Detector identifies repeated sequences across sessions as FP-006"
          - "Detector extracts sequence signature for comparison"
          - "Detector does NOT flag unique one-time sequences"
          - "Returns pattern with automation candidate details"

  # ===========================================================================
