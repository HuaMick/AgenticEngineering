        status: "pending"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "ASSET_UPDATE target_locations"

        guidance: |
          Validate ASSET_UPDATE recommendations:

          Expected Targets:
          - modules/AgenticGuidance/assets/definitions/
          - modules/AgenticGuidance/assets/examples/
          - modules/AgenticGuidance/assets/specifications/

          Test Cases:
          1. Schema violation suggests adding example files
          2. Convention violation suggests adding definition files

          Validation:
          - Asset directories exist
          - Recommendation specifies asset type needed
          - Example content suggestion is included

        success_criteria:
          - "Asset directories exist"
          - "Asset type is specified (definition/example/spec)"
          - "Content guidance is provided"

      # -----------------------------------------------------------------------
      # Task 4.4: Test Evidence Compilation
      # -----------------------------------------------------------------------
      - task_id: "test_04_004"
        description: "Validate evidence compilation from traces"
        status: "pending"

        guidance: |
          Validate evidence structure in recommendations:

          Required Evidence Fields:
          - session_id: Which session exhibited the pattern
          - run_ids: Specific runs that show the pattern
          - observation: Human-readable description
          - source: LangSmith trace URL or identifier

          Test Cases:
          1. Evidence links to real session_ids from mock data
          2. Run IDs are valid and exist in the trace
          3. Observation text accurately describes the pattern
          4. Source reference allows manual verification

        success_criteria:
          - "Session IDs in evidence match analyzed sessions"
          - "Run IDs are valid references"
          - "Observations are descriptive and accurate"
          - "Sources are verifiable"

  # ===========================================================================
  # Phase 5: Gap Analysis and Follow-Up Planning
  # ===========================================================================
  - phase_id: "test_05"
    name: "Gap Analysis and Follow-Up Planning"
    description: |
      Analyze test results to identify gaps in friction analysis coverage.
      If gaps are found, trigger creation of remediation plan.
    status: "pending"
    estimated_effort: "medium"
    depends_on: ["test_01", "test_02", "test_03", "test_04"]
    priority: "critical"

    gap_analysis_protocol: |
      ## Gap Detection Criteria

      Gaps are identified when any of the following occur:

      1. COVERAGE GAPS:
         - A friction pattern (FP-001 to FP-006) has no working detector
         - Detection signals defined in inputs.yml are not implemented
         - Edge cases are not handled (empty traces, malformed data)

      2. ACCURACY GAPS:
         - False positive rate >10% in validation tests
         - False negative rate >20% (known patterns not detected)
         - Severity misclassification in >15% of cases

      3. INTEGRATION GAPS:
         - LangSmith API errors not handled gracefully
         - Session grouping fails on certain data patterns
         - Output schema validation fails

      4. RECOMMENDATION GAPS:
         - Target files don't exist
         - Recommendations are too vague to action
         - Evidence is insufficient for verification

      ## Follow-Up Plan Trigger

      If ANY gaps are identified:
      1. Create `plan_live_friction_analysis_remediation.yml` in the same directory
      2. Document each gap with:
         - Gap ID (GAP-FA-001, GAP-FA-002, etc.)
         - Category (coverage/accuracy/integration/recommendation)
         - Severity (critical/high/medium/low)
         - Remediation approach
      3. Link remediation plan to this test plan

    tasks:
      # -----------------------------------------------------------------------
      # Task 5.1: Coverage Gap Analysis
      # -----------------------------------------------------------------------
      - task_id: "test_05_001"
        description: "Analyze friction pattern detection coverage"
        status: "pending"

        guidance: |
          Review test results from Phase 1 and Phase 2:

          Checklist:
          - [ ] FP-001 detector: Implemented and tested
          - [ ] FP-002 detector: Implemented and tested
          - [ ] FP-003 detector: Implemented and tested
          - [ ] FP-004 detector: Implemented and tested
          - [ ] FP-005 detector: Implemented and tested
          - [ ] FP-006 detector: Implemented and tested

          For each pattern, verify:
          - All detection_signals from inputs.yml are covered
          - Edge cases (empty input, malformed data) are handled
          - Negative cases (should NOT trigger) are tested

        success_criteria:
          - "All 6 friction patterns have working detectors"
          - "All detection signals are implemented"
          - "Edge cases are handled without crashes"

      # -----------------------------------------------------------------------
      # Task 5.2: Accuracy Gap Analysis
      # -----------------------------------------------------------------------
      - task_id: "test_05_002"
        description: "Analyze detection accuracy and classification"
        status: "pending"

        guidance: |
          Calculate accuracy metrics from test results:

          Metrics to Compute:
          1. False Positive Rate: patterns flagged incorrectly / total flagged
          2. False Negative Rate: patterns missed / total present
          3. Severity Accuracy: correct severity / total classified

          Thresholds:
          - False Positive Rate should be <10%
          - False Negative Rate should be <20%
          - Severity Accuracy should be >85%

          If thresholds not met, document as accuracy gap.

        success_criteria:
          - "False positive rate <10%"
          - "False negative rate <20%"
          - "Severity accuracy >85%"
          - "All metrics documented"

      # -----------------------------------------------------------------------
      # Task 5.3: Integration Gap Analysis
      # -----------------------------------------------------------------------
      - task_id: "test_05_003"
        description: "Analyze LangSmith integration and workflow gaps"
        status: "pending"

        guidance: |
          Review Phase 2 and Phase 3 results for integration issues:

          Checklist:
          - [ ] LangSmith connection errors handled gracefully
          - [ ] Session grouping works with all data patterns
          - [ ] Output schema validation passes
          - [ ] Workflow completes for edge-case inputs

          Document any:
          - API errors that cause crashes
          - Data patterns that break grouping
          - Schema violations in output

        success_criteria:
          - "All API errors handled gracefully"
          - "Session grouping robust to data variations"
          - "Output always matches schema"

      # -----------------------------------------------------------------------
      # Task 5.4: Recommendation Quality Analysis
      # -----------------------------------------------------------------------
      - task_id: "test_05_004"
        description: "Analyze recommendation actionability and completeness"
        status: "pending"

        guidance: |
          Review Phase 4 results for recommendation quality:

          Checklist:
          - [ ] All target files exist in codebase
          - [ ] Recommendations include specific action steps
          - [ ] Evidence is sufficient for verification
          - [ ] Resolution hints match pattern type

          Document any:
          - Invalid target paths
          - Vague or unactionable recommendations
          - Missing or insufficient evidence

        success_criteria:
          - "100% of target paths are valid"
          - "All recommendations have clear action steps"
          - "Evidence includes verifiable trace references"

      # -----------------------------------------------------------------------
      # Task 5.5: Generate Remediation Plan (If Gaps Found)
      # -----------------------------------------------------------------------
      - task_id: "test_05_005"
        description: "Create remediation plan if gaps identified"
        status: "pending"

        guidance: |
          ## CRITICAL: Remediation Plan Generation

          IF any gaps were identified in tasks test_05_001 through test_05_004:

          1. Create file: `plan_live_friction_analysis_remediation.yml`
             Location: docs/plans/live/260104AE_agenticguidance/live/

          2. Use standard plan structure with phases for each gap category

          3. Include for each gap:
             - Gap ID: GAP-FA-XXX
             - Source Test: Which test revealed the gap
             - Description: What is missing or broken
             - Severity: critical/high/medium/low
             - Remediation Tasks: Specific fixes needed

          4. Link back to this test plan:
             depends_on:
               - plan_live_test_friction_analysis.yml

          IF NO gaps identified:
          - Document "All tests passed, no remediation needed"
          - Mark this task as completed with success

        success_criteria:
          - "Gaps are documented with IDs and categories"
          - "Remediation plan created if gaps exist"
          - "Plan follows standard YAML structure"
          - "Plan is actionable by builder agent"

        conditional_output:
          if_gaps_found: "Create plan_live_friction_analysis_remediation.yml"
          if_no_gaps: "Document success and close test plan"

success_criteria:
  - "All unit tests for FP-001 through FP-006 pass (Phase 1)"
  - "Integration tests with mock data pass (Phase 2)"
  - "Real trace tests pass or gracefully skip (Phase 3)"
  - "Resolution recommendations are validated (Phase 4)"
  - "Gap analysis completed with documented results (Phase 5)"
  - "Remediation plan created if gaps identified"
  - "Test coverage >80% for friction analysis code"

notes:
  - "Phase 3 (real traces) is conditional on LangSmith availability"
  - "Phase 5 must trigger remediation plan if any gaps found"
  - "Mock data should cover all 6 friction patterns"
  - "Evidence linking is critical for recommendation quality"
  - "This test plan references the 260122 friction analysis report for real-world examples"

remediation_trigger:
  condition: "Any gap identified in Phase 5 tasks"
  action: "Create plan_live_friction_analysis_remediation.yml"
  location: "docs/plans/live/260104AE_agenticguidance/live/"
  template: |
    # Friction Analysis Remediation Plan
    # Generated from: plan_live_test_friction_analysis.yml
    # Gap Analysis Date: [DATE]

    name: "friction-analysis-remediation"
    status: "pending"
    depends_on:
      - plan_live_test_friction_analysis.yml

    gaps_identified:
      # Populated from test_05 results

    phases:
      # Generated based on gap categories
