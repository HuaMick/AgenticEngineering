          - FP-003 (Missing Context) -> GUIDANCE_UPDATE
          - FP-004 (Schema Violations) -> GUIDANCE_UPDATE
          - FP-005 (Convention Violations) -> CLI_OFFLOAD
          - FP-006 (Automatable Patterns) -> CLI_OFFLOAD

          Resolution Output Structure:
          ```python
          expected_recommendation = {
              "pattern_id": "FP-005-001",
              "resolution_type": "CLI_OFFLOAD",
              "target_locations": ["modules/AgenticCLI/src/agenticcli/commands/"],
              "hint": "Enforce via agentic CLI commands"
          }
          ```

        success_criteria:
          - "Each pattern maps to correct resolution type"
          - "Target locations are populated from resolution_types config"
          - "Resolution hints are included"
          - "ASSET_UPDATE type is available for manual override"

      # -----------------------------------------------------------------------
      # Task 2.5: Test Complete Workflow Pipeline
      # -----------------------------------------------------------------------
      - task_id: "test_02_005"
        description: "Test end-to-end friction analysis workflow with mock data"
        status: "pending"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd"
            reason: "Complete workflow definition"

        guidance: |
          Run complete workflow from process.mmd with mock LangSmith data:

          1. Input Validation Phase
             - Mock project_name: "TestProject"
