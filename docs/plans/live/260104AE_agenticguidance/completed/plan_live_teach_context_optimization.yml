          Delete constraints from process.yml (lines 129-137) - keep in inputs.yml.
        status: "pending"
        target_files:
          - "modules/AgenticGuidance/agents/test/test-audit/process.yml"
        guidance: |
          REMEDIATION ACTIONS (from self-review analysis):
          - Delete process.yml lines 20-22 (audit role summary - defined in inputs.yml#audit_role)
          - Delete process.yml lines 129-137 (constraints - defined in inputs.yml#audit_constraints)
