# =============================================================================
# DECISION: NEEDS_CHANGES
# =============================================================================
status: "NEEDS_CHANGES"

summary: |
  The plan is well-structured and addresses the audit findings comprehensively. However,
  there are alignment issues with user decisions D1, D2, D4, and D5 that require
  modification before approval. The plan also has some remaining ambiguities that
  need clarification.

# =============================================================================
# USER DECISION ALIGNMENT CHECK
# =============================================================================
decision_alignment:
  - decision_id: "D1"
    user_decision: "Make deploy-minimal.yml available to ALL deploy agents (not just setup agents)"
    plan_alignment: "MISALIGNED"
    issue: |
      Task 2.1 (line 98-130) creates deploy-minimal.yml with description stating
      "Lightweight layer for setup/scaffolding agents requiring minimal context".

      The plan should be updated to:
      1. Change description to "Lightweight layer for all deploy agents requiring minimal context"
      2. Consider whether deploy-cicd agent would benefit from this layer
      3. Update acceptance criteria to reflect broader availability
    remediation: |
      Update task 2.1 required_structure.header.description from:
        "Lightweight layer for setup/scaffolding agents requiring minimal context"
      To:
        "Lightweight layer for deploy agents requiring minimal context"

      Also update phase-2 description (line 85) from:
        "Create a lightweight layer for setup/scaffolding agents"
      To:
        "Create a lightweight layer for all deploy agents"

  - decision_id: "D2"
    user_decision: "Make agent-loops.yml conditional based on agent type"
    plan_alignment: "NOT_ADDRESSED"
    issue: |
      The audit identified that deploy-worktree loads agent-loops.yml (103 lines) despite
      explicitly stating it does not participate in loops. The plan questions_for_user
      section asks about this (lines 380-387) but does not include a task to implement
      the user's decision.

      User decided on option (c): Make agent-loops.yml conditional based on agent type.
    remediation: |
      Add a new phase or task to implement conditional loading of agent-loops.yml.
      Options:
      1. Add a phase-2b task to modify core-system.yml to make agent-loops conditional
      2. Create a core-system-minimal.yml layer that excludes agent-loops.yml
      3. Add conditional loading logic to deploy-worktree inputs.yml

      Recommended approach: Create core-system-minimal.yml that excludes agent-loops.yml,
      usable by non-looping agents like deploy-worktree.

  - decision_id: "D3"
    user_decision: "Standardize paths using fully qualified relative paths (modules/AgenticGuidance/docs/ARCHITECTURE.md)"
    plan_alignment: "NOT_ADDRESSED"
    issue: |
      The plan mentions the ARCHITECTURE.md path issue in questions_for_user (lines 391-396)
      but does not include a task to standardize the path in core-system.yml.

      Current reference: docs/ARCHITECTURE.md (line 26 of core-system.yml)
      Required reference: modules/AgenticGuidance/docs/ARCHITECTURE.md
    remediation: |
      Add a task to update core-system.yml line 26 from:
        path: "docs/ARCHITECTURE.md"
      To:
        path: "modules/AgenticGuidance/docs/ARCHITECTURE.md"

  - decision_id: "D4"
    user_decision: "Remove unused definition files from core-system.yml"
    plan_alignment: "NOT_ADDRESSED"
    issue: |
      The audit identified 9 unused definition files loaded via core-system.yml
      (domains.yml, workflows.yml, entrypoints.yml, guidance.yml, and 5 others).
      The plan questions_for_user section asks about this (lines 398-406) but does not
      include a task to implement the user's decision to remove them.
    remediation: |
      Add a task to evaluate and remove unused definition references from core-system.yml:
      - domains.yml (27 lines) - evaluate if needed for deploy-worktree
      - workflows.yml (53 lines) - evaluate if needed for deploy-worktree
      - entrypoints.yml (47 lines) - evaluate if needed for deploy-worktree

      Alternative: Create core-system-minimal.yml with only plans.yml reference.

  - decision_id: "D5"
    user_decision: "Do deduplication FIRST (before other phases)"
    plan_alignment: "MISALIGNED"
    issue: |
      Current phase order:
      1. phase-1-quick-wins (friction.yml fix, manifest consolidation)
      2. phase-2-deploy-minimal-layer
      3. phase-3-worktree-plan-extract
      4. phase-4-deduplicate-definitions (lines 227-271)
      5. phase-5-verification

      User decision: Do deduplication FIRST (before other phases).
      Current plan places deduplication in phase 4 with dependency on phase 3.
    remediation: |
      Reorder phases to:
      1. phase-1-quick-wins (keep as-is: friction.yml fix, manifest consolidation)
      2. phase-2-deduplicate-definitions (move from phase 4)
      3. phase-3-deploy-minimal-layer (move from phase 2)
      4. phase-4-worktree-plan-extract (move from phase 3)
      5. phase-5-verification (keep as-is)

      Note: Deduplication (task 4.1) has no real dependency on phases 2-3 since it
      operates on inputs.yml definitions section, not the layer files.

