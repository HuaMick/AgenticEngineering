questions_for_user:
  - id: "Q1"
    question: "Should the core-system.yml modifications affect all agents or create a separate layer?"
    context: |
      User decisions D3 (path standardization) and D4 (remove unused definitions) require
      modifications to core-system.yml. Since this layer is used by 27 agents (per line 3
      of core-system.yml), changes will affect all agents.

      Options:
      a) Modify core-system.yml directly (affects all 27 agents)
      b) Create core-system-minimal.yml for deploy agents with only needed references
      c) Create agent-specific overrides that exclude unused references
    impact: "Choice affects scope of changes and potential regression risk"

  - id: "Q2"
    question: "Should deploy-cicd also use deploy-minimal.yml?"
    context: |
      Per user decision D1, deploy-minimal.yml should be available to ALL deploy agents.
      deploy-cicd is another deploy agent (found at agents/deploy/deploy-cicd/).
      Should the plan include a task to evaluate and potentially migrate deploy-cicd
      to use deploy-minimal.yml?
    impact: "May expand plan scope but ensures consistent layer usage across deploy agents"

