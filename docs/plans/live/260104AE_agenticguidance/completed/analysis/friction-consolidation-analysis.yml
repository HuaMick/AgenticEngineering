# ============================================================================
# CONSOLIDATION STRATEGY
# ============================================================================
consolidation_strategy:
  principle: "Single source of truth for all friction remediation teaching tasks"

  phases:
    - name: "Phase 1: Critical Infrastructure"
      priority: "critical"
      description: "Fix blocking issues that prevent agents from operating correctly"
      merged_tasks:
        - "TEACH-CON-001"  # Fragment references
        - "TEACH-CON-002"  # .mmd process format
      unique_tasks:
        - "rem2_011"  # Path resolution prefixes

    - name: "Phase 2: Output and Validation Contracts"
      priority: "high"
      description: "Establish clear contracts for agent inputs and outputs"
      merged_tasks:
        - "TEACH-CON-003"  # Output schemas
        - "TEACH-CON-004"  # Input validation
        - "TEACH-CON-005"  # Version alignment

    - name: "Phase 3: Centralization and Declaration"
      priority: "high"
      description: "Create single sources of truth and explicit declarations"
      merged_tasks:
        - "TEACH-CON-006"  # CLI commands
        - "TEACH-CON-007"  # Spawns
        - "TEACH-CON-008"  # REPO_ROOT

    - name: "Phase 4: Asset Creation (MMD Examples)"
      priority: "high"
      description: "Create reusable MMD component examples for planners"
      unique_tasks:
        - "remod_plan_002"  # Create teach_phase.mmd, build_phase.mmd, etc.
      permission: "GRANTED - See invocation context"

    - name: "Phase 5: Orchestration Remodel"
      priority: "medium"
      description: "Improve orchestration patterns and loop definitions"
      unique_tasks:
        - "remod_clean_001"
        - "remod_clean_002"
        - "remod_plan_001"
        - "remod_val_001"
        - "remod_val_002"
        - "remod_uat_001"

    - name: "Phase 6: Loop Context and Invocation Awareness"
      priority: "low"
      description: "Improve agent understanding of their invocation context"
      unique_tasks:
        - "fi_006"
        - "fi_001"
        - "fi_002"
        - "fi_004"
        - "fi_005"

# ============================================================================
# VIABILITY ASSESSMENT
# ============================================================================
viability_assessment:
  viable_tasks:
    - All merged TEACH-CON tasks are viable
    - Asset creation (Phase 4) is viable with granted permission
    - Orchestration remodel (Phase 5) is viable

  concerns:
    - id: "CONCERN-001"
      title: "Agent self-review validation capacity"
      description: |
        Some friction improvements (fi_001-fi_006) were identified by agent
        self-review. The same agents cannot validate their own improvements
        without external reference.
      mitigation: "Use test-guidance-simulator for validation"
      severity: "low"

    - id: "CONCERN-002"
      title: "MMD example asset wiring"
      description: |
        New MMD examples must be wired to agent inputs.yml files. This requires
        updating multiple agents' inputs without breaking existing references.
      mitigation: "Add as supplementary references, not replacements"
      severity: "low"

# ============================================================================
# RECOMMENDATIONS FOR PLANNER-REVIEWER
# ============================================================================
recommendations:
  - id: "REC-001"
    title: "Execute Phase 1 before Phase 4"
    rationale: |
      Fragment reference resolution (TEACH-CON-001) must complete before
      adding new example references that use fragment syntax.

  - id: "REC-002"
    title: "Create MMD examples with minimal complexity"
    rationale: |
      Per README.md principle 'Less is More', MMD examples should be small
      and focused. Each example should demonstrate ONE pattern clearly.

  - id: "REC-003"
    title: "Batch low-priority tasks (Phase 6) for later session"
    rationale: |
      fi_001-fi_006 are LOW priority improvements identified from a secondary
      friction source. They can be deferred without blocking critical work.

  - id: "REC-004"
    title: "Deprecate source plans after consolidation"
    rationale: |
      Once plan_live_teach_consolidated.yml is approved, the source plans
      should be marked as superseded to prevent duplicate execution.
