# ============================================================
# ISSUES IDENTIFIED
# ============================================================
issues:
  - id: "ISSUE-001"
    severity: "medium"
    category: "user_decision_misalignment"
    description: |
      User decided B2: "CONSOLIDATE domains.yml, workflows.yml, entrypoints.yml into ONE file"
      but the plan explicitly defers this consolidation to "future plans".
    location: "questions_for_user.scope_questions[1]"
    recommendation: |
      Add a new task (suggested: Task 3.3 or a new Phase 3.5) to consolidate the three files
      into architecture-pattern.yml. This should:
      1. Create assets/definitions/architecture-pattern.yml combining all three files
      2. Update core-system.yml to reference the single file
      3. Update planner-build-layer.yml to use the consolidated file

      Alternatively, document this as a follow-up plan item if the scope should remain limited
      to planner-build-only changes in this iteration.
    blocking: false
    notes: |
      This is NOT blocking because:
      1. The consolidation can be safely added as a follow-up task
      2. The current plan achieves the 5-8% target without this change
      3. Consolidating shared files (domains/workflows/entrypoints) may require separate audits
         for other agents that depend on them

  - id: "ISSUE-002"
    severity: "low"
    category: "clarity"
    description: |
      Task 1.1 references "iteration.yml line 9" for iteration-approach.yml removal,
      but the actual reference is at line 9 in the inputs section. The task should
      clarify this is in the inputs section specifically.
    location: "Phase 1, Task 1.1"
    recommendation: "Clarify: 'iteration.yml inputs section (line 9)'"
    blocking: false

  - id: "ISSUE-003"
    severity: "low"
    category: "verification"
    description: |
      Task 4.2 measurement approach is abstract ("Estimate token usage based on file sizes").
      A more concrete measurement method would strengthen verification.
    location: "Phase 4, Task 4.2"
    recommendation: |
      Add concrete measurement steps:
      - Count total lines in all referenced files
      - Use approximate tokens-per-line ratio (estimate: 3-5 tokens/line for YAML)
      - Compare against 200k context window
    blocking: false

# ============================================================
# REMAINING QUESTIONS
# ============================================================
questions_for_user:
  - question_id: "Q1"
    question: |
      The plan defers domains/workflows/entrypoints consolidation (your B2 decision).
      Should this consolidation be:
      A) Added to this plan as a new task (increases scope)
      B) Documented as a separate follow-up plan (keeps scope focused)
      C) Already addressed - reviewer misunderstood the scope
    context: |
      The consolidation affects core-system.yml which is used by 27 agents.
      Changing this in the planner-build plan may have unintended effects on other agents.
    recommendation: "Option B - keep this plan focused, create separate consolidation plan"
    blocking: false

# ============================================================
# RECOMMENDATIONS
# ============================================================
recommendations:
  execution_order:
    - "Phase 1 can proceed immediately - no blocking dependencies"
    - "Phase 2 should start only after Phase 1 is committed and verified"
    - "Phase 3 is the highest-impact change - ensure Phase 2 is stable first"
    - "Phase 4 verification should be thorough before declaring success"

  risk_mitigation:
    - "Commit after each phase to enable rollback if issues arise"
    - "Run a test plan generation with planner-build after Phase 3 to validate capability"
    - "Keep original files (core-system.yml, planner-shared.yml) until Phase 4 passes"

  follow_up_items:
    - item: "domains/workflows/entrypoints consolidation"
      rationale: "User decision B2 - create separate plan after this plan validates"
    - item: "Apply layer pattern to other planners"
      rationale: "User decision B4 - after planner-build validates, create similar plans"

