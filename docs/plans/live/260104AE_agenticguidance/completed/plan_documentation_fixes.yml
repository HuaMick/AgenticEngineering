name: documentation-fixes
status: completed
completed_date: "2026-01-11"
priority: high
created: "2026-01-11"
phase_type: teach

objective: |
  Fix documentation and example structure issues discovered after orchestration decommissioning:
  1. Components folder has phase-specific files instead of reusable components
  2. Live plan examples imply phase-splitting which contradicts context minimisation
  3. plan_example.yml sits outside the plan folder structure

context: |
  The user identified that the example structure is misleading:
  - Components should be REUSABLE parts (like guidance_self_review_loop) not phase templates
  - Plan examples should not imply mandatory phase-splitting; planners decide based on context
  - plan_example.yml location is inconsistent with the folder structure

phases:
  # ========================================
  # PHASE 1: Fix Components Folder
  # ========================================
  - name: "Teach: Restructure Components"
    execution: sequential
    status: pending
    priority: high
    description: "Components should be reusable orchestration fragments, not phase templates"
    tasks:
      - id: "fix_comp_001"
        name: "Move phase files to reference folder"
        status: "pending"
        description: |
          The following are PHASE TEMPLATES, not reusable components:
          - build_phase.mmd
          - cleanup_phase.mmd
          - teach_phase.mmd
          - test_phase.mmd
          - uat_phase.mmd

          Move these to: assets/examples/orchestration/phase_templates/
          They show how to structure a phase, not components to embed.
        target: "modules/AgenticGuidance/assets/examples/planner/components/"

      - id: "fix_comp_002"
        name: "Keep and document reusable components"
        status: "pending"
        description: |
          Keep guidance_self_review_loop.mmd as the example of a TRUE component.
          Components are:
          - Reusable across different orchestration types
          - Can be embedded inside any phase
          - Not phase-specific

          Add more examples:
          - feedback_loop.mmd (generic feedback pattern)
          - approval_gate.mmd (human approval checkpoint)
          - audit_test_fix_loop.mmd (from agent-loops.yml)
        target: "modules/AgenticGuidance/assets/examples/planner/components/"

      - id: "fix_comp_003"
        name: "Update components README"
        status: "pending"
        description: "Document what components are vs phase templates"
        target: "modules/AgenticGuidance/assets/examples/planner/components/README.md"

  # ========================================
  # PHASE 2: Fix Live Plan Examples
  # ========================================
  - name: "Teach: Fix Plan Example Structure"
    execution: sequential
    status: pending
    priority: high
    description: "Remove phase-split pattern from examples"
    tasks:
      - id: "fix_ex_001"
        name: "Remove phase-split live files"
        status: "pending"
        description: |
          DELETE these files that imply mandatory phase-splitting:
          - plan_live_audit_clean.yml
          - plan_live_build.yml
          - plan_live_teach.yml
          - plan_live_test.yml

          These mislead planners into thinking they MUST split by phase.
          Context minimisation means: split when it reduces context load, not by default.
        target: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/"

      - id: "fix_ex_002"
        name: "Move plan_example.yml into live folder"
        status: "pending"
        description: |
          Move plan_example.yml from:
            YYMMDDRepo_Branch/plan_example.yml
          To:
            YYMMDDRepo_Branch/live/plan_example.yml

          This shows planners where plan files actually go.
        target: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/"

      - id: "fix_ex_003"
        name: "Update plan_example.yml content"
        status: "pending"
        description: |
          Update to show:
          - Single plan file with multiple phases (default)
          - Note: split only when context minimisation benefits
          - Reference context-minimisation.yml guidelines
        target: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_example.yml"

      - id: "fix_ex_004"
        name: "Update example README"
        status: "pending"
        description: "Document when to split plans vs keep unified"
        target: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/README.md"

  # ========================================
  # PHASE 3: Update READMEs
  # ========================================
  - name: "Teach: Update Documentation"
    execution: sequential
    status: pending
    priority: medium
    description: "Ensure READMEs reflect completed orchestration work"
    tasks:
      - id: "doc_001"
        name: "Update agents/README.md"
        status: "pending"
        description: "Verify orchestration section is correct"
        target: "modules/AgenticGuidance/agents/README.md"

      - id: "doc_002"
        name: "Update module README.md"
        status: "pending"
        description: "Verify workflow section reflects new architecture"
        target: "modules/AgenticGuidance/README.md"

      - id: "doc_003"
        name: "Update docs/README.md"
        status: "pending"
        description: "Reflect that live folder can be empty when no active work"
        target: "docs/README.md"

success_criteria:
  - "Components folder contains only reusable fragments"
  - "Phase templates moved to separate reference location"
  - "Plan examples show unified plan pattern (not phase-split)"
  - "plan_example.yml lives inside live/ subfolder"
  - "READMEs accurately describe current architecture"
