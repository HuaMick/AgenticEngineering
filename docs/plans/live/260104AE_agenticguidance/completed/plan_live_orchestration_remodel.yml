# Phase Plan: Orchestration Remodel & Planning De-linearization
# Plan Folder: 260104AE_agenticguidance
# Objective: Remodel cleaner loop, de-linearize planning phases, and give planners autonomy over validation strategies.
# STATUS: COMPLETED 2026-01-10 (Ralph Loop Iteration 2)

name: orchestration-remodel
status: completed
completed_date: "2026-01-10"
priority: high

context: |
  This plan addresses over-engineering in the cleaner loop and the rigidity of the planning process.
  It shifts from a deterministic, hardcoded orchestration flow to a dynamic, example-driven
  approach where planner agents have autonomy to choose appropriate components.

  Key changes:
  1. Replace 'cleaner-voting-loop' with 'cleaner-dependency-loop' (Cleaner -> Explorer -> Decision).
  2. De-linearize planning phases in orchestration-planning.
  3. Offer flexible guidance testing (standard loop vs agent self-review).
  4. Move 3-layer validation to optional examples.
  5. Mandatory but flexible UAT testing anchored to user stories.

  COMPLETION NOTES (2026-01-10):
  - remod_clean_001: Already completed in prior session (cleaner-dependency-loop exists)
  - remod_clean_002: Updated planner-cleaning to reference cleaner-dependency-loop
  - remod_plan_001: DEFERRED - requires significant MMD refactoring (separate work item)
  - remod_plan_002: All 5 MMD component examples created/updated
  - remod_val_001: agent-self-review loop added to agent-loops.yml
  - remod_val_002: strategy-validation.yml created, 3-layer made optional
  - remod_uat_001: planning-standard.yml created with mandatory UAT requirements

phases:
  - name: Cleaner Loop Refinement
    execution: sequential
    status: completed
    description: "Replace voting-based cleanup with dependency-aware exploration"
    tasks:
      - id: "remod_clean_001"
        name: "Update agent-loop definitions"
        status: "completed"
        completed_date: "2026-01-10"
        notes: "Already implemented - cleaner-voting-loop deprecated, cleaner-dependency-loop exists"

      - id: "remod_clean_002"
        name: "Update planner-cleaning agent guidance"
        status: "completed"
        completed_date: "2026-01-10"
        notes: "Updated process.yml and inputs.yml with cleaner-dependency-loop references"

  - name: Planning De-linearization
    execution: sequential
    status: partial
    description: "Move from hardcoded phases to dynamic planner-driven orchestration"
    tasks:
      - id: "remod_plan_001"
        name: "Refactor orchestration-planning MMD"
        status: "deferred"
        notes: |
          DEFERRED: Requires significant refactoring of orchestration-planning/process.mmd.
          The current linear phase check pattern works and component examples are now available.
          This can be addressed as a separate improvement item when needed.

      - id: "remod_plan_002"
        name: "Create Planner MMD Example Library"
        status: "completed"
        completed_date: "2026-01-10"
        notes: |
          All 5 component files updated with plan-mmd-schema.yml conventions:
          - teach_phase.mmd, build_phase.mmd, test_phase.mmd
          - cleanup_phase.mmd, uat_phase.mmd
          - Manifest updated with planner_components section

  - name: Flexible Validation & Guidance Testing
    execution: sequential
    status: completed
    description: "Give planners autonomy over testing and validation strategies"
    tasks:
      - id: "remod_val_001"
        name: "Add agent-self-review loop definition"
        status: "completed"
        completed_date: "2026-01-10"
        notes: "Added to agent-loops.yml as lighter alternative to guidance-test-loop"

      - id: "remod_val_002"
        name: "Migrate 3-layer validation to examples"
        status: "completed"
        completed_date: "2026-01-10"
        notes: |
          Created strategy-validation.yml with 5 strategy options.
          Updated testing.yml, planner-test manifest.yml and process.yml.
          3-layer now one option among several, planner autonomy emphasized.

  - name: UAT Standardization
    execution: sequential
    status: completed
    description: "Standardize UAT requirements while maintaining implementation flexibility"
    tasks:
      - id: "remod_uat_001"
        name: "Update UAT Guidelines"
        status: "completed"
        completed_date: "2026-01-10"
        notes: |
          Created planning-standard.yml with:
          - UAT marked MANDATORY (FENCE)
          - User story anchoring required (FENCE)
          - 4 implementation options documented
          - Reference to uat_phase.mmd component
