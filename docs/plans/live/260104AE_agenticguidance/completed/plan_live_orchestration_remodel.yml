# Phase Plan: Orchestration Remodel & Planning De-linearization
# Plan Folder: 260104AE_agenticguidance
# Objective: Remodel cleaner loop, de-linearize planning phases, and give planners autonomy over validation strategies.

name: orchestration-remodel
status: active
priority: high

context: |
  This plan addresses over-engineering in the cleaner loop and the rigidity of the planning process.
  It shifts from a deterministic, hardcoded orchestration flow to a dynamic, example-driven 
  approach where planner agents have autonomy to choose appropriate components.
  
  Key changes:
  1. Replace 'cleaner-voting-loop' with 'cleaner-dependency-loop' (Cleaner -> Explorer -> Decision).
  2. De-linearize planning phases in orchestration-planning.
  3. Offer flexible guidance testing (standard loop vs agent self-review).
  4. Move 3-layer validation to optional examples.
  5. Mandatory but flexible UAT testing anchored to user stories.

phases:
  - name: Cleaner Loop Refinement
    execution: sequential
    description: "Replace voting-based cleanup with dependency-aware exploration"
    tasks:
      - id: "remod_clean_001"
        name: "Update agent-loop definitions"
        description: |
          Modify assets/definitions/agent-loops.yml:
          - Mark cleaner-voting-loop as deprecated.
          - Add cleaner-dependency-loop: Cleaner identifies -> Explorer checks dependencies -> Cleaner/User decides.
        target_files: ["assets/definitions/agent-loops.yml"]
        status: "pending"

      - id: "remod_clean_002"
        name: "Update planner-cleaning agent guidance"
        description: "Align planner-cleaning process.yml and inputs.yml with the new dependency-aware loop."
        target_files: 
          - "agents/planner/planner-cleaning/process.yml"
          - "agents/planner/planner-cleaning/inputs.yml"
        status: "pending"

  - name: Planning De-linearization
    execution: sequential
    description: "Move from hardcoded phases to dynamic planner-driven orchestration"
    tasks:
      - id: "remod_plan_001"
        name: "Refactor orchestration-planning MMD"
        description: |
          Update orchestration-planning/process.mmd to remove the linear phase checks 
          (CheckTeach -> CheckBuild -> CheckTest -> CheckCleanup). 
          Replace with a dynamic dispatcher that executes the phases defined by the planners.
        target_files: ["agents/orchestration/orchestration-planning/process.mmd"]
        status: "pending"

      - id: "remod_plan_002"
        name: "Create Planner MMD Example Library"
        description: |
          Create a suite of .mmd examples in assets/examples/planner/ that planners 
          can reference and incorporate into their orchestration plans.
        target_files:
          - "assets/examples/planner/components/teach_phase.mmd"
          - "assets/examples/planner/components/build_phase.mmd"
          - "assets/examples/planner/components/test_phase.mmd"
          - "assets/examples/planner/components/cleanup_phase.mmd"
          - "assets/examples/planner/components/uat_phase.mmd"
        status: "pending"

  - name: Flexible Validation & Guidance Testing
    execution: sequential
    description: "Give planners autonomy over testing and validation strategies"
    tasks:
      - id: "remod_val_001"
        name: "Add agent-self-review loop definition"
        description: |
          Add agent-self-review as a lighter alternative to guidance-test-loop 
          in assets/definitions/agent-loops.yml.
        target_files: ["assets/definitions/agent-loops.yml"]
        status: "pending"

      - id: "remod_val_002"
        name: "Migrate 3-layer validation to examples"
        description: |
          Move 3-layer validation requirements from mandatory guidelines to 
          optional strategy definitions/examples in assets/definitions/strategy-validation.yml.
        target_files: 
          - "assets/definitions/strategy-validation.yml"
          - "agents/planner/planner-test/inputs.yml"
        status: "pending"

  - name: UAT Standardization
    execution: sequential
    description: "Standardize UAT requirements while maintaining implementation flexibility"
    tasks:
      - id: "remod_uat_001"
        name: "Update UAT Guidelines"
        description: |
          Specify that UAT is MANDATORY for all plans and MUST be anchored to user stories, 
          but implementations (simulator, blind test, documentation loop, etc.) are at 
          the planner's discretion.
        target_files: ["assets/guidelines/planning-standard.yml"]
        status: "pending"
