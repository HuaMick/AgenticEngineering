# Live Plan - Remediation Phase
# Plan: 260104AE_agenticguidance
# Objective: Fix incomplete entrypoint refactor implementation
# Created: 2026-01-06 after audit found critical gaps

name: agenticguidance-remediation
worktree_path: /home/code/AgenticEngineering-agenticguidance
branch: agenticguidance
status: active
priority: critical

audit_reference: "audit/260106_audit_findings.yml"

context: |
  The entrypoint refactor (_plan.yml → _plan_build.yml + _plan_teach.yml) was
  marked complete but verification agents found the worktree implementation
  is incomplete. The main repo has the correct files but the worktree is
  behind and has incomplete work-in-progress versions.

  Root cause: Worktree at commit 8fad7cd is behind main repo commit bfb3ec4.

remediation_strategy: |
  OPTION A (Recommended): Sync from main repo
  - Copy correct files from main repo to worktree
  - Avoid git merge to keep worktree history clean
  - Less risk of merge conflicts with live plan files

  OPTION B: Git merge
  - Merge origin/main into worktree branch
  - May have conflicts with plan files
  - More git-correct but riskier

phases:
  # ========================================
  # PHASE 1: Critical File Sync
  # ========================================
  - name: Critical File Sync
    execution: sequential
    description: "Sync missing and incorrect files from main repo"
    tasks:
      - id: "rem_001"
        name: "Create _plan_teach.yml from main repo"
        description: "Copy the correct _plan_teach.yml from main repo to worktree"
        status: "pending"
        audit_ref: "C1"
        command: |
          cp /home/code/AgenticEngineering/modules/AgenticGuidance/entrypoints/_plan_teach.yml \
             /home/code/AgenticEngineering-agenticguidance/modules/AgenticGuidance/entrypoints/_plan_teach.yml
        acceptance_criteria:
          - "File exists in worktree"
          - 'name: "_plan_teach"'
          - 'goal mentions "guidance plan"'

      - id: "rem_002"
        name: "Replace _plan_build.yml with correct version"
        description: "Copy the correct _plan_build.yml from main repo to worktree"
        status: "pending"
        audit_ref: "C2, H2, M2"
        command: |
          cp /home/code/AgenticEngineering/modules/AgenticGuidance/entrypoints/_plan_build.yml \
             /home/code/AgenticEngineering-agenticguidance/modules/AgenticGuidance/entrypoints/_plan_build.yml
        acceptance_criteria:
          - 'name: "_plan_build"'
          - 'goal mentions "implementation plan"'
          - 'Output mentions only _orchestrate.yml (not _teach.yml)'

      - id: "rem_003"
        name: "Replace manifest.yml with correct version"
        description: "Copy the correct orchestration manifest from main repo"
        status: "pending"
        audit_ref: "C3"
        command: |
          cp /home/code/AgenticEngineering/modules/AgenticGuidance/agents/orchestration/manifest.yml \
             /home/code/AgenticEngineering-agenticguidance/modules/AgenticGuidance/agents/orchestration/manifest.yml
        acceptance_criteria:
          - "routing_logic has _plan_build.yml"
          - "routing_logic has _plan_teach.yml"
          - "No _plan.yml references"

      - id: "rem_004"
        name: "Update _orchestrate.yml references"
        description: "Edit _orchestrate.yml to reference new entrypoints"
        status: "pending"
        audit_ref: "C4"
        file: "modules/AgenticGuidance/entrypoints/_orchestrate.yml"
        edits:
          - line: 11
            old: "# Requires: Pre-approved plan folder path from _plan.yml output"
            new: "# Requires: Pre-approved plan folder path from _plan_build.yml or _plan_teach.yml output"
          - line: 21
            old: '- "Pre-approved plan folder path (from _plan.yml output)"'
            new: '- "Pre-approved plan folder path (from _plan_build.yml or _plan_teach.yml output)"'
        acceptance_criteria:
          - "No _plan.yml references"
          - "Both new entrypoints mentioned"

      - id: "rem_005"
        name: "Update concise.yml examples"
        description: "Fix teacher examples to use new entrypoint names"
        status: "pending"
        audit_ref: "C5"
        file: "modules/AgenticGuidance/assets/examples/teacher/concise.yml"
        edits:
          - line: 20
            old: "Example: entrypoints/_plan.yml -> _orchestrate.yml or _teach.yml"
            new: "Example: _plan_build.yml -> _orchestrate.yml"
          - line: 29
            old: "Example: _plan.yml -> _orchestrate.yml or _teach.yml"
            new: "Example: _plan_build.yml -> _orchestrate.yml"
        acceptance_criteria:
          - "Examples use _plan_build.yml"
          - "No _teach.yml references (per DD-001)"

  # ========================================
  # PHASE 2: Verification
  # ========================================
  - name: Verification
    execution: parallel
    description: "Re-run verification agents to confirm fixes"
    agents:
      - type: test-audit
        task: "Scan for remaining _plan.yml references"
        inputs:
          - modules/AgenticGuidance/
        success_criteria:
          - "Zero standalone _plan.yml references found"

      - type: test-guidance-simulator
        task: "Self-review orchestration-planning guidance"
        inputs:
          - modules/AgenticGuidance/agents/orchestration/orchestration-planning/
        success_criteria:
          - "Agent understands both entrypoints"
          - "No friction points identified"

  # ========================================
  # PHASE 3: Commit and Status Update
  # ========================================
  - name: Commit and Status Update
    execution: sequential
    description: "Commit changes and update plan status"
    tasks:
      - id: "rem_010"
        name: "Commit remediation changes"
        description: "Git commit all file changes"
        status: "pending"
        command: |
          cd /home/code/AgenticEngineering-agenticguidance
          git add modules/AgenticGuidance/entrypoints/
          git add modules/AgenticGuidance/agents/orchestration/manifest.yml
          git add modules/AgenticGuidance/assets/examples/teacher/concise.yml
          git add docs/plans/live/260104AE_agenticguidance/
          git commit -m "fix: complete entrypoint refactor (_plan.yml → _plan_build.yml + _plan_teach.yml)"
        acceptance_criteria:
          - "Commit successful"
          - "All entrypoint files staged"

      - id: "rem_011"
        name: "Update plan_live_build.yml task statuses"
        description: "Mark ent_001 and ent_002 as completed"
        status: "pending"
        depends_on: ["rem_010"]
        acceptance_criteria:
          - "ent_001 status: completed"
          - "ent_002 status: completed"
          - "Evidence updated with commit hash"

execution_order: |
  1. Run rem_001 through rem_005 (Critical File Sync)
  2. Run verification agents in parallel
  3. If verification passes:
     - Run rem_010 (commit)
     - Run rem_011 (status update)
  4. If verification fails:
     - Review failures
     - Add fix tasks
     - Re-run verification

estimated_effort: "30 minutes with agents"
