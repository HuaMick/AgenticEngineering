live-plans:
  - id: EXAMPLE-ALIGNMENT-001
    title: Update Planner Example Folder to Current Practices
    description: |
      Update the planner example folder at modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/
      to reflect best practices discovered during the 260104AE_agenticguidance planning sessions.

      Key patterns to add:
      1. Root-level inputs section for context pre-gathering
      2. Unified main plan pattern with related_plans
      3. MMD orchestration example
      4. decision_items section for human-required decisions
      5. Consolidated README.md pattern (single session tracking document)
      6. Flexible subfolder guidance (remove mandatory requirements)

    phases:
      # ========================================
      # PHASE 1: Add Root-Level Inputs Pattern
      # Priority: HIGH - Enables context pre-gathering
      # ========================================
      - name: Add Root-Level Inputs Pattern
        priority: high
        description: "Add root-level inputs: section to all example plan files"
        depends_on: []  # First phase - no dependencies
        execution_groups:
          - execution: parallel
            name: Update existing example files with root-level inputs
            agents:
              - type: teacher-update-guidance
                id: "align_001"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml
                  - modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml
                guidance: |
                  Context: The plan_live_build.yml example currently has inputs nested under each agent,
                  but lacks a root-level inputs: section that enables context pre-gathering.
                  The teaching-plan-example.yml shows the correct pattern.

                  Instructions:
                  1. Add root-level inputs: section after the worktree/liveplan/completedplan metadata
                  2. Include inputs that would be gathered BEFORE phase execution begins
                  3. Each input should have:
                     - location: relative path to the file
                     - description: why this input is needed
                  4. Keep existing agent-level inputs for phase-specific context
                  5. Root-level inputs should include:
                     - Architecture reference (docs/ARCHITECTURE.md)
                     - Existing code structure (relevant source directories)
                     - Related plans (if referencing other work)

                  Pattern to follow (from teaching-plan-example.yml):
                  ```yaml
                  inputs:
                    - location: "analysis/friction-analysis.md"
                      description: "Friction analysis identifying gap"
                    - location: "assets/definitions/fence.yml"
                      description: "Fence concept definition"
                  ```

                  Why this matters: Root-level inputs enable orchestration agents to pre-gather
                  context BEFORE spawning implementation agents, reducing discovery overhead.
                success_criteria:
                  - Root-level inputs: section added after metadata
                  - At least 3-5 inputs listed with location and description
                  - Comment explaining purpose of root-level vs agent-level inputs

              - type: teacher-update-guidance
                id: "align_002"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_teach.yml
                  - modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml
                guidance: |
                  Context: The plan_live_teach.yml example is minimal and lacks root-level inputs.

                  Instructions:
                  1. Add root-level inputs: section following teaching-plan-example.yml pattern
                  2. Include guidance-focused inputs appropriate for teach plans:
                     - Process/definition files being updated
                     - Friction analysis or audit findings
                     - Agent category definitions
                  3. Enhance the example to be more comprehensive

                  Why this matters: Teach plans need context about existing guidance to make
                  targeted improvements.
                success_criteria:
                  - Root-level inputs: section added
                  - Inputs appropriate for teaching/guidance scenarios

              - type: teacher-update-guidance
                id: "align_003"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml
                  - modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml
                guidance: |
                  Context: The plan_live_test.yml example has comprehensive test-fix-loop patterns
                  but lacks root-level inputs.

                  Instructions:
                  1. Add root-level inputs: section
                  2. Include test-focused inputs:
                     - Test agent process files
                     - User story definitions
                     - Configuration files
                  3. Keep existing agent-level inputs for test-specific context

                  Why this matters: Test plans need upfront access to test infrastructure
                  and user story definitions.
                success_criteria:
                  - Root-level inputs: section added
                  - Inputs appropriate for testing scenarios

              - type: teacher-update-guidance
                id: "align_004"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml
                  - modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml
                guidance: |
                  Context: The plan_live_audit_clean.yml example has good structure including
                  previous_phases reference, but lacks root-level inputs.

                  Instructions:
                  1. Add root-level inputs: section
                  2. Include audit-focused inputs:
                     - Audit process definition
                     - Files to audit
                     - Cleanup criteria
                  3. Enhance the previous_phases pattern with cross-references

                  Why this matters: Audit plans need context about what was built/tested
                  to perform meaningful audits.
                success_criteria:
                  - Root-level inputs: section added
                  - Inputs appropriate for audit/cleanup scenarios

      # ========================================
      # PHASE 2: Add Unified Main Plan Example
      # Priority: HIGH - Shows orchestration pattern
      # ========================================
      - name: Add Unified Main Plan Example
        priority: high
        description: "Create main plan example showing related_plans and orchestration"
        depends_on: ["Add Root-Level Inputs Pattern"]
        execution_groups:
          - execution: sequential
            name: Create unified main plan example
            agents:
              - type: teacher-update-guidance
                id: "align_005"
                operation: CREATE
                inputs:
                  - docs/plans/live/260104AE_agenticguidance/live/plan_agenticguidance.yml
                  - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml
                guidance: |
                  Context: The current examples show individual plan files but don't show
                  how a main plan file can orchestrate multiple sub-plans. The plan_agenticguidance.yml
                  demonstrates this pattern.

                  Instructions:
                  1. Create modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_main.yml
                  2. Include these elements from plan_agenticguidance.yml:
                     - name: at root level (short identifier)
                     - worktree_path: (absolute path)
                     - branch:
                     - status: (planning, active, partially_completed, fully_completed)
                     - priority:
                     - context: (multi-line narrative with updates)
                     - related_plans: section referencing sub-plans
                  3. Example related_plans structure:
                     ```yaml
                     related_plans:
                       build: "live/plan_live_build.yml"
                       teach: "live/plan_live_teach.yml"
                       test: "live/plan_live_test.yml"
                       orchestration: "orchestration.mmd"
                     ```
                  4. Show how context: section gets updated as work progresses
                  5. Include phases that reference the sub-plans

                  Why this matters: Complex projects need a main plan that provides overview
                  and coordinates multiple sub-plans.
                success_criteria:
                  - plan_main.yml created with unified plan structure
                  - Includes name, worktree_path, branch, status, priority
                  - Has context: block showing update pattern
                  - Has related_plans: section referencing sub-plans
                  - Comments explain the orchestration pattern

      # ========================================
      # PHASE 3: Add MMD Orchestration Example
      # Priority: HIGH - Shows visual flow pattern
      # ========================================
      - name: Add MMD Orchestration Example
        priority: high
        description: "Create MMD orchestration example file"
        depends_on: ["Add Unified Main Plan Example"]
        execution_groups:
          - execution: sequential
            name: Create orchestration MMD example
            agents:
              - type: teacher-update-guidance
                id: "align_006"
                operation: CREATE
                inputs:
                  - docs/plans/live/260104AE_agenticguidance/live/orchestration_agenticguidance.mmd
                  - modules/AgenticGuidance/assets/examples/planner/components/build_phase.mmd
                  - modules/AgenticGuidance/assets/examples/planner/components/test_phase.mmd
                guidance: |
                  Context: The orchestration_agenticguidance.mmd shows how to use Mermaid diagrams
                  for orchestration flow visualization. The example folder needs this pattern.

                  Instructions:
                  1. Create modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/orchestration.mmd
                  2. Include metadata comments at top:
                     ```
                     %% PLAN_MMD_VERSION: 1.0
                     %% GENERATED_BY: planner-build
                     %% PLAN_FOLDER: docs/plans/live/<YYMMDDRepo_Branch>
                     %% PHASES: Phase_1, Phase_2, Phase_3
                     %% AGENT_ROUTING: Phase_1 -> builder, Phase_2 -> tester, Phase_3 -> teacher
                     %% STATUS: Phase_1=pending, Phase_2=pending, Phase_3=pending
                     ```
                  3. Create simple graph TD showing:
                     - Start node
                     - 3-4 phase nodes
                     - End node
                     - Feedback triggers (when to loop back)
                  4. Show classDef for completed phases styling
                  5. Add comments explaining the pattern

                  Why this matters: MMD files provide visual orchestration that is both
                  human-readable and machine-parseable for dynamic workflow execution.
                success_criteria:
                  - orchestration.mmd created with proper metadata comments
                  - Mermaid graph TD with phases and feedback triggers
                  - Comments explain each section
                  - Can be rendered in Mermaid-compatible viewers

      # ========================================
      # PHASE 4: Add Decision Items Pattern
      # Priority: MEDIUM - Shows human-input tracking
      # ========================================
      - name: Add Decision Items Pattern
        priority: medium
        description: "Add decision_items section to teach plan example"
        depends_on: ["Add MMD Orchestration Example"]
        execution_groups:
          - execution: sequential
            name: Add decision items to example
            agents:
              - type: teacher-update-guidance
                id: "align_007"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_teach.yml
                  - docs/plans/live/260104AE_agenticguidance/live/plan_live_teach.yml
                guidance: |
                  Context: The plan_live_teach.yml in the live plan shows how to track
                  decisions that require human input using a decision_items: section.
                  The example should demonstrate this pattern.

                  Instructions:
                  1. Add decision_items: section to plan_live_teach.yml example
                  2. Include 1-2 example decision items showing:
                     - id: "DECISION-001"
                     - title: descriptive title
                     - severity: critical | high | medium | low
                     - status: OPEN | IN_PROGRESS | RESOLVED
                     - resolution: (when resolved) what was decided
                     - resolved_date: (when resolved)
                     - context: multi-line description of the decision
                     - options: list of available choices
                  3. Show both OPEN and RESOLVED examples
                  4. Add comments explaining when to use decision_items

                  Why this matters: Some decisions require human judgment and can't be
                  automated. Tracking these separately ensures they don't block progress
                  while awaiting resolution.
                success_criteria:
                  - decision_items: section added to teach plan example
                  - Shows both OPEN and RESOLVED decision item examples
                  - Each item has required fields documented
                  - Comments explain usage pattern

      # ========================================
      # PHASE 5: Update README Pattern
      # Priority: MEDIUM - Consolidates session tracking
      # ========================================
      - name: Update README Pattern
        priority: medium
        description: "Create README.md example showing consolidated session tracking"
        depends_on: ["Add Decision Items Pattern"]
        execution_groups:
          - execution: sequential
            name: Create README example
            agents:
              - type: teacher-update-guidance
                id: "align_008"
                operation: CREATE
                inputs:
                  - docs/plans/live/260104AE_agenticguidance/README.md
                  - docs/plans/live/260104AE_agenticguidance/NEXT_SESSION_CHECKLIST.md
                guidance: |
                  Context: The current examples don't include a README.md pattern. The live
                  plan folder shows session tracking split between README.md and
                  NEXT_SESSION_CHECKLIST.md. The example should show README.md as the
                  single session tracking document.

                  Instructions:
                  1. Create modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/README.md
                  2. Include these sections (consolidated from both files):
                     - Plan Metadata (ID, worktree, branch, objective)
                     - Session History (dated entries with accomplishments)
                     - Status (phase completion tracking with checkboxes)
                     - Folder Structure (tree showing plan organization)
                     - Live Plans (list of active plan files with purpose)
                     - Next Steps (prioritized execution guide)
                     - Decision Items (blocking decisions requiring human input)
                     - Quick Reference table (file -> purpose mapping)
                  3. Remove the NEXT_SESSION_CHECKLIST.md pattern from examples
                  4. Add comments explaining each section's purpose

                  Why this matters: A single README.md reduces confusion about where to
                  look for session state and next actions.
                success_criteria:
                  - README.md example created with all sections
                  - Session tracking consolidated into single document
                  - Comments explain section purposes
                  - No separate NEXT_SESSION_CHECKLIST.md needed

      # ========================================
      # PHASE 6: Update Guidance Alignment
      # Priority: HIGH - Ensures examples match guidance
      # ========================================
      - name: Update Guidance Alignment
        priority: high
        description: "Update plans.yml and planner-build guidance to align with examples"
        depends_on: ["Update README Pattern"]
        execution_groups:
          - execution: sequential
            name: Update plans.yml subfolder guidance
            agents:
              # NOTE: plans.yml is a DEFINITION file, so use teacher-update-assets
              - type: teacher-update-assets
                id: "align_009"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/assets/definitions/plans.yml
                guidance: |
                  Context: The plans.yml currently specifies mandatory subfolders (live/ and completed/).
                  The user requests removing rigid subfolder requirements and allowing planning
                  agents to decide what subfolders are needed based on the project.

                  Instructions:
                  1. In plans.yml, update the live plans section:
                     - Remove "MUST contain at least these subfolders" language
                     - Change to "commonly used subfolders" or "recommended structure"
                     - Keep live/ and completed/ as EXAMPLES, not requirements
                  2. Add guidance that planning agents can create additional folders as needed
                  3. Clarify that minimal plans may have all files at root level
                  4. Update the file_taxonomy section to be more flexible
                  5. Add note: "The planning agent determines appropriate folder structure
                     based on plan complexity and project needs"

                  Current text to update:
                  ```
                  Each folder MUST contain at least these subfolders:
                  - live/: Active phase files
                  - completed/: Completed items
                  ```

                  Change to:
                  ```
                  Common subfolders (planning agent determines appropriate structure):
                  - live/: Active phase files (recommended for multi-phase plans)
                  - completed/: Completed items (recommended when tracking completion)
                  - analysis/: Iteration logs and analysis artifacts (optional)
                  - audit/: Audit reports and findings (optional)

                  Note: Simple plans may have all files at root level. Complex plans
                  benefit from subfolder organization. The planning agent determines
                  the appropriate structure based on plan complexity.
                  ```

                  Why this matters: Rigid subfolder requirements add unnecessary complexity
                  for simple plans and reduce agent flexibility.
                success_criteria:
                  - "MUST contain" language removed
                  - Subfolders presented as recommendations, not requirements
                  - Note added about planning agent flexibility
                  - Examples updated to show optional nature

          - execution: sequential
            name: Update planner-build process alignment
            agents:
              # NOTE: process.yml is agent guidance, so use teacher-update-guidance
              - type: teacher-update-guidance
                id: "align_010"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/agents/planner/planner-build/process.yml
                  - modules/AgenticGuidance/assets/definitions/plans.yml
                guidance: |
                  Context: The planner-build process.yml has step 2 that says
                  "Ensure mandatory subfolders exist: `live/` and `completed/`"
                  This should be updated to align with the more flexible plans.yml.

                  Instructions:
                  1. Update step 2 in process.yml to be more flexible:
                     - Change from "Ensure mandatory subfolders exist" to
                       "Create appropriate folder structure based on plan complexity"
                     - Reference plans.yml for folder structure guidance
                     - Allow agents to create subfolders as needed
                  2. Keep the "Move any completed items" guidance but make it conditional
                     on whether a completed/ folder is appropriate for the plan

                  Current step 2:
                  ```
                  A planning folder should have been provided (docs/plans/live/YYMMDDRepo_Branch/).
                  Ensure mandatory subfolders exist: `live/` and `completed/`.
                  Move any completed items to `completed/plan_completed.yml` within the folder.
                  ```

                  Change to:
                  ```
                  A planning folder should have been provided (docs/plans/live/YYMMDDRepo_Branch/).
                  Create appropriate folder structure based on plan complexity:
                  - Simple plans: files at root level
                  - Multi-phase plans: live/ subfolder for active files
                  - Plans with completion tracking: completed/ subfolder
                  Reference plans.yml for folder structure patterns.
                  If completed items exist and a completed/ subfolder is appropriate,
                  move them to `completed/plan_completed.yml`.
                  ```

                  Why this matters: Process guidance should match definition guidance
                  to avoid agent confusion.
                success_criteria:
                  - Step 2 updated to reference flexible structure
                  - "Mandatory" language removed
                  - Plans.yml referenced for patterns
                  - Conditional completion handling

          - execution: sequential
            name: Update planner-build inputs alignment
            agents:
              # NOTE: inputs.yml is agent guidance, so use teacher-update-guidance
              - type: teacher-update-guidance
                id: "align_011"
                operation: UPDATE
                inputs:
                  - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
                guidance: |
                  Context: The planner-build inputs.yml references the example files.
                  After updating the examples with new patterns (root-level inputs,
                  main plan, MMD, decision_items, README), the inputs should reference
                  these enhanced examples.

                  Instructions:
                  1. Update the example file reference description:
                     - Add note about root-level inputs pattern
                     - Add note about main plan orchestration pattern
                     - Reference the new MMD example
                  2. Add new example reference for plan_main.yml
                  3. Add new example reference for orchestration.mmd
                  4. Add note about README.md as session tracking document

                  Current:
                  ```yaml
                  - type: file
                    path: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml"
                    description: "Build-focused live plan example..."
                  ```

                  Add:
                  ```yaml
                  - type: file
                    path: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_main.yml"
                    description: "Main plan example showing related_plans orchestration, context updates, and status tracking"
                    required: false

                  - type: file
                    path: "assets/examples/planner/YYMMDDRepo_Branch/orchestration.mmd"
                    description: "MMD orchestration example showing phase flow, feedback triggers, and status metadata"
                    required: false

                  - type: file
                    path: "assets/examples/planner/YYMMDDRepo_Branch/README.md"
                    description: "README example showing consolidated session tracking (Session History, Status, Next Steps, Decision Items)"
                    required: false
                  ```

                  Why this matters: Inputs should reference all available examples so
                  planning agents can use appropriate patterns.
                success_criteria:
                  - New example references added
                  - Descriptions updated to mention new patterns
                  - Comments explain when to use each pattern

      # ========================================
      # PHASE 7: Verification
      # Priority: HIGH - Ensures consistency
      # ========================================
      # LOOP_REFERENCE: assets/definitions/agent-loops.yml#audit-test-fix-loop
      # MAX_ITERATIONS: 3 (if issues found, return to relevant phase for fix)
      - name: Verification Phase
        priority: high
        description: "Verify all updates are consistent and complete"
        depends_on: ["Update Guidance Alignment"]
        loop_pattern: "audit-test-fix-loop"
        max_iterations: 3
        execution_groups:
          - execution: sequential
            name: Verify example alignment
            agents:
              - type: test-audit
                id: "align_012"
