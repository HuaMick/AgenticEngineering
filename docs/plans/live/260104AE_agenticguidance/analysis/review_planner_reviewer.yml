  but user decision R1 specifies "structural-patterns.yml" as a shared file.

user_decision_alignment:
  R1_structural_patterns:
    decision: "Create shared planner/structural-patterns.yml for both agents"
    plan_alignment: MISALIGNED
    details: |
      Plan T1.1 creates "plan-structure-reference.yml" but user decision R1
      specifies the file should be named "structural-patterns.yml" and be
      shared between planner-guidance AND planner-reviewer agents.

      Current plan:
        - Creates: modules/AgenticGuidance/assets/examples/planner/plan-structure-reference.yml

      Should be:
        - Creates: modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml
        - Also update planner-guidance/inputs.yml to reference the shared file
    required_changes:
      - "Rename target file from 'plan-structure-reference.yml' to 'structural-patterns.yml'"
      - "Add task to update planner-guidance/inputs.yml to reference the shared file"
      - "Update all references in T1.3 and subsequent tasks to use correct filename"

  R2_skip_consolidation:
    decision: "Skip consolidation - just remove fix-the-source.yml and context-minimisation.yml from reviewer inputs"
    plan_alignment: PARTIALLY_ALIGNED
    details: |
      Plan T3.2 correctly handles the Q2 decision but still includes conditional
      logic for options A and B which will not be used. The guidance should be
      simplified to only show option C (removal) since user has decided.

      Additionally, T3.2 should be merged with T3.1 since both involve removing
      items from inputs.yml. Separate tasks for "operational guidelines" vs
      "philosophical guidelines" is unnecessary given user decision.
    required_changes:
      - "Simplify T3.2 guidance to only show removal action (option C)"
      - "Remove conditional logic for options A and B from T3.2"
      - "Consider merging T3.1 and T3.2 into single task for efficiency"
      - "Remove 'blocked_by: Q2' since decision is made"

  R3_keep_both_criteria:
    decision: "Keep both inline criteria in process.yml AND success-criteria-teacher.yml reference"
    plan_alignment: ALIGNED
    details: |
      Plan T2.2 correctly handles this by verifying the reference exists without
      requiring changes. The guidance explicitly states "No changes needed unless
      reference is missing or unclear" which aligns with keeping both.
    required_changes: []

