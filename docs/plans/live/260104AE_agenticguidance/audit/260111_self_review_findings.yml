# Agent Self-Review Findings
# Date: 2026-01-11
# Method: Spawned 4 audit agents to review 23 agents in parallel

summary:
  total_agents_reviewed: 23
  agents_by_category:
    test: 7 (test-runner, test-audit, test-guidance-simulator, test-builder, test-user-simulator, test-service, test-final-output)
    planner: 6 (planner-test, planner-guidance-testing, planner-build, planner-cleaning, planner-reviewer, planner-guidance)
    orchestration: 4 (orchestration-executor, orchestration-guidance, orchestration-planning, orchestration-build)
    teacher: 2 (teacher-update-guidance, teacher-update-assets)
    deploy: 2 (deploy-worktree, deploy-cicd)
    build: 2 (build-flutter, build-python)

  clarity_distribution:
    high: 0
    medium: 12
    low: 11

# ========================================
# CRITICAL ISSUES (Blocking/Breaking)
# ========================================
critical_issues:
  - id: "CRIT-001"
    agents: ["teacher-update-assets"]
    issue: "Broken path reference in process.yml"
    detail: "References 'modules/AgenticGuidance/agents/teacher/teacher-update-modules/AgenticGuidance/assets/inputs.yml' which does not exist"
    severity: "critical"
    action: "Fix path immediately"

  - id: "CRIT-002"
    agents: ["orchestration-guidance", "orchestration-build"]
    issue: "Deprecated agents still referenced throughout codebase"
    detail: |
      No deprecation markers in manifest.yml files. Category manifest, agents manifest,
      and multiple input files still route to these deprecated agents.
    severity: "critical"
    action: "Add DEPRECATED flags to manifest.yml, update routing references"

  - id: "CRIT-003"
    agents: ["test-guidance-simulator"]
    issue: "Subagent spawning mechanism undefined"
    detail: "process.yml step 5 says 'spawn target agent' but provides no mechanism"
    severity: "critical"
    action: "Document how to spawn subagents for simulation"

  - id: "CRIT-004"
    agents: ["test-final-output"]
    issue: "Dynamic input placeholders with no resolution mechanism"
    detail: "<live_plan_path> and <orchestration_execution_data> use placeholder syntax with no way to resolve"
    severity: "critical"
    action: "Define placeholder resolution or use concrete examples"

  - id: "CRIT-005"
    agents: ["orchestration-executor"]
    issue: "Conflicting plan_folder discovery location"
    detail: |
      process.yml says search <plan_folder>/live/ but inputs.yml shows plan_folder_path
      already includes 'live/' in examples. Unclear if executor should search nested live/.
    severity: "critical"
    action: "Clarify path semantics unambiguously"

# ========================================
# CROSS-CUTTING ISSUES (Multiple Agents)
# ========================================
cross_cutting_issues:
  - id: "CROSS-001"
    pattern: "Impossible 'update path' instructions"
    agents: ["test-runner", "test-builder", "test-service", "test-audit"]
    issue: "All contain 'If an input is found in a different location, update the path' - agents cannot modify their own guidance files"
    action: "Remove or reword to 'flag the discrepancy in output' only"

  - id: "CROSS-002"
    pattern: "Missing loop_context sections"
    agents: ["test-runner", "test-builder", "test-user-simulator", "test-service", "test-final-output"]
    issue: "Reference loop types but do not define loop_context section"
    action: "Add loop_context section consistent with test-audit"

  - id: "CROSS-003"
    pattern: "Empty outputs: []"
    agents: ["test-runner", "test-builder", "test-user-simulator", "test-service", "teacher-update-assets", "build-flutter", "build-python"]
    issue: "process.yml has 'outputs: []' despite defining output structures in inputs.yml"
    action: "Define outputs in process.yml or align with inputs.yml"

  - id: "CROSS-004"
    pattern: "Version inconsistencies"
    agents: ["test-runner", "test-final-output", "teacher-update-assets"]
    issue: "manifest.yml version differs from inputs.yml version"
    action: "Synchronize version numbers across files"

  - id: "CROSS-005"
    pattern: "Missing required_inputs section"
    agents: ["planner-reviewer", "planner-cleaning", "planner-guidance-testing"]
    issue: "Do not have explicit required_inputs validation unlike other planners"
    action: "Add required_inputs section for consistency"

  - id: "CROSS-006"
    pattern: "Missing test-shared.yml layer"
    agents: ["test-guidance-simulator", "test-user-simulator"]
    issue: "Do not include test-shared.yml layer unlike other test agents"
    action: "Add test-shared.yml layer or document why excluded"

  - id: "CROSS-007"
    pattern: "Project-specific content"
    agents: ["test-user-simulator", "test-service", "test-audit", "build-python"]
    issue: "Hardcoded project-specific values (myagents, myagents-test, Studio test names)"
    action: "Use placeholder syntax or move to project-specific configuration"

  - id: "CROSS-008"
    pattern: "MMD component files missing"
    agents: ["planner-test", "planner-build", "planner-guidance", "planner-cleaning"]
    issue: |
      Referenced MMD components do not exist:
      - build_phase.mmd, test_phase.mmd, cleanup_phase.mmd, uat_phase.mmd, teach_phase.mmd
    action: "Create missing components or remove references"
    note: "These were moved to phase_templates/ in this session - update references"

  - id: "CROSS-009"
    pattern: "Duplicate worktree detection code"
    agents: ["build-flutter", "build-python"]
    issue: "Identical worktree determination step duplicated across build agents"
    action: "Extract to shared definition or layer"

  - id: "CROSS-010"
    pattern: "Minimal manifest files"
    agents: ["deploy-worktree", "deploy-cicd", "build-flutter", "build-python"]
    issue: "Missing structure, responsibilities, boundaries fields"
    action: "Standardize manifest.yml structure"

  - id: "CROSS-011"
    pattern: "Vague process steps"
    agents: ["build-flutter", "build-python"]
    issue: "'Plan components' and 'Build components' steps lack substeps or criteria"
    action: "Expand with specific guidance or reference to builder-role.yml"

  - id: "CROSS-012"
    pattern: "Loop terminology inconsistency"
    agents: ["planner-test", "planner-guidance-testing", "test-audit"]
    issue: "test-fix-loop, test-audit-fix-loop, audit-test-fix-loop used interchangeably"
    action: "Consolidate to single consistent naming"

  - id: "CROSS-013"
    pattern: "Agent context reference format varies"
    agents: ["multiple planners"]
    issue: "Some use anchor syntax (#agent_categories.planner), some use just category name"
    action: "Standardize agent_context reference format"

  - id: "CROSS-014"
    pattern: "MMD generation logic duplicated"
    agents: ["planner-build", "planner-guidance"]
    issue: "Both have 100+ line mmd_generation sections with slight variations"
    action: "Extract MMD generation logic to shared reference document"

