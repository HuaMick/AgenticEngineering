    - "/modules/AgenticGuidance/agents/manifest.yml"
    - "/modules/AgenticGuidance/assets/definitions/orchestration-executor-specification.yml"

  files_referencing_deprecated_orchestration_build:
    - "/modules/AgenticGuidance/agents/orchestration/manifest.yml"
    - "/modules/AgenticGuidance/agents/manifest.yml"
    - "/modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
    - "/modules/AgenticGuidance/assets/definitions/orchestration-executor-specification.yml"

