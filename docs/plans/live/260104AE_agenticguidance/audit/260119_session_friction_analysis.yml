session_analysis:
  date: 2026-01-19
  sessions_analyzed:
    - "260119BR_test_main_first_planning"
    - "260119AG_guidance_entrypoint_remediation"
    - "260119CL_cli_main_first_planning"
    - "260104AE_agenticguidance"
  analysis_scope: |
    Review of session artifacts including plan files, completed work, live work,
    and READMEs to identify friction points where agents got stuck, had to backtrack,
    asked excessive questions, or showed signs of confusion.

friction_findings:

  # ============================================================================
  # CRITICAL FINDINGS
  # ============================================================================

  - id: FF-001
    pattern_type: convention_violation
    severity: CRITICAL
    description: |
      Worktree policy violation detected: 21 AgenticGuidance files were modified
      in the main worktree instead of the dedicated agenticguidance worktree.
      This required a full remediation plan (plan_live_worktree_remediation.yml)
      with 4 phases to stash, transfer, commit, and verify the changes.
    evidence:
      - file: "/home/code/AgenticEngineering/docs/plans/live/260104AE_agenticguidance/completed/plan_live_worktree_remediation.yml"
        observation: |
          21 files modified incorrectly in main worktree requiring stash+transfer remediation.
          Impact: 1,190 insertions, 69 deletions that had to be moved.
          Affected: 16 agent files + 5 asset files.
    affected_guidance:
      - "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
      - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
    suggested_resolution: |
      1. The Main-First Planning policy was implemented in 260119AG session to address this
      2. Consider adding a pre-commit hook or CLI validation to detect worktree violations
      3. Ensure all agents loading orchestration-planning inputs understand the Main-First policy

  - id: FF-002
    pattern_type: missing_context
    severity: CRITICAL
    description: |
      Agent confusion about where planning should occur (worktree vs main).
      This was the root cause of the 260119AG_guidance_entrypoint_remediation session.
      Agents were creating plans in feature worktrees instead of main, making plans
      invisible to users tracking from the main worktree.
    evidence:
      - file: "/home/code/AgenticEngineering/docs/plans/live/260119AG_guidance_entrypoint_remediation/README.md"
        observation: |
          Session objective: "Address agent confusion regarding where planning should occur
          (worktree vs main) and ensure the user has a centralized view of all planning state."
      - file: "/home/code/AgenticEngineering/docs/plans/live/260119AG_guidance_entrypoint_remediation/completed/plan_live_teach.yml"
        observation: |
          4 files had to be updated to add Main-First Planning policy:
          - worktree-and-branching.yml (new rule)
          - plans.yml (main_first_policy section)
          - process.mmd (GUIDELINE comments)
          - inputs.yml (planning_policy section)
    affected_guidance:
      - "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
      - "modules/AgenticGuidance/assets/definitions/plans.yml"
      - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
      - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
    suggested_resolution: |
      COMPLETED: Main-First Planning guidance has been added to all 4 target files.
      CLI update pending in 260119CL_cli_main_first_planning session.

  # ============================================================================
  # HIGH SEVERITY FINDINGS
  # ============================================================================

  - id: FF-003
    pattern_type: backtracking
    severity: HIGH
    description: |
      Multiple self-review iterations required to achieve agent compliance.
      The self-review process went through 14+ iterations before all 24 agents
      passed review. Original PASS assessments were "significantly too lenient"
      with a 78% flag rate on spot-checks.
    evidence:
      - file: "/home/code/AgenticEngineering/docs/plans/live/260104AE_agenticguidance/live/plan_live_self_review_remediation.yml"
        observation: |
          "Spot-Check Campaign Results (iterations 12-14):
          - 9 original PASS agents spot-checked
          - 7 flagged for review (78% flag rate)
          - 2 confirmed pass (test-runner, planner-cleaning)
          - Original PASS assessments were significantly too lenient"
      - file: "/home/code/AgenticEngineering/docs/plans/live/260104AE_agenticguidance/README.md"
        observation: |
          Multiple remediation rounds documented:
          - Self-Review Round 2 -> R2 Remediation
          - Self-Review Round 3 -> R3 Remediation
          - Self-Review Round 4 -> ALL PASS
          Each round found new critical issues requiring remediation.
    affected_guidance:
      - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
      - "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    suggested_resolution: |
      1. Add stricter self-review criteria to prevent lenient initial assessments
      2. Implement automated context-minimisation checks (token counting)
      3. Consider adding self-review as a standard phase in agent guidance updates

  - id: FF-004
    pattern_type: schema_violation
    severity: HIGH
    description: |
      Test criteria in blind tests did not match actual CLI output.
      The README.md criterion mentioned that plans should have README.md files,
      but the CLI scaffold does not create README.md files.
    evidence:
      - file: "/home/code/AgenticEngineering/docs/plans/live/260119AG_guidance_entrypoint_remediation/completed/plan_live_test.yml"
        observation: |
          "Minor discrepancy: test criteria mentions README.md but guidance does not require it"
          Result note: "README.md criterion not in actual guidance - discrepancy noted"
          Recommendation: "Either add README.md to CLI scaffold output or remove from test criteria"
    affected_guidance:
      - "modules/AgenticGuidance/assets/definitions/plans.yml"
      - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
    suggested_resolution: |
      1. Update plans.yml to explicitly state whether README.md is required or optional
      2. Either add README.md generation to CLI plan init, or remove from test criteria
      3. Ensure test blind tests use only documented guidance, not assumed conventions

  - id: FF-005
    pattern_type: missing_context
    severity: HIGH
    description: |
      CLI tool does not yet implement Main-First Planning policy.
      The agentic plan init command creates plans in the feature worktree,
      not the main worktree as required by the updated guidance.
    evidence:
      - file: "/home/code/AgenticEngineering/docs/plans/live/260119AG_guidance_entrypoint_remediation/README.md"
        observation: |
          "Finding: CLI tool (agentic plan init) doesn't yet implement Main-First"
          "This confirms CLI update is needed (separate build plan)"
      - file: "/home/code/AgenticEngineering/docs/plans/live/260119CL_cli_main_first_planning/completed/plan_live_build.yml"
        observation: |
          Build plan created but status is still "pending" for all 3 phases:
          - Phase 1: Implement Main Worktree Detection (pending)
          - Phase 2: Modify cmd_init() Logic (pending)
          - Phase 3: Build Verification (pending)
    affected_guidance:
      - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
      - "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
    suggested_resolution: |
      Complete the 260119CL_cli_main_first_planning build plan to implement:
      1. find_main_worktree() helper function
      2. Always create plan folder in main worktree
      3. Update output messages to reflect Main-First behavior

  # ============================================================================
  # MEDIUM SEVERITY FINDINGS
  # ============================================================================

  - id: FF-006
    pattern_type: exploration_drift
    severity: MEDIUM
    description: |
      Context-minimisation issues accumulated across multiple agents over time.
      4 agents with CRITICAL context issues identified requiring 8-10 hours of
