          - planner-test: PT-001 through PT-004
          - test-final-output: TFO-001 through TFO-004
          - test-guidance-simulator: TGS-001 through TGS-005
          - test-user-simulator: TUS-001 through TUS-005
    affected_guidance:
      - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
      - "modules/AgenticGuidance/agents/test/test-audit/process.yml"
      - "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
      - "modules/AgenticGuidance/agents/deploy/deploy-cicd/inputs.yml"
      - "modules/AgenticGuidance/agents/test/test-builder/inputs.yml"
    suggested_resolution: |
      1. Execute plan_live_teach_context_optimization.yml to address 4 CRITICAL agents
      2. Consider periodic automated context audits using token counting
      3. Add context-minimisation checks to the planner-reviewer approval checklist

  - id: FF-007
    pattern_type: path_ambiguity
    severity: MEDIUM
    description: |
      Empty stub files created by CLI scaffold that serve no purpose.
      The 260119CL session had to clean up empty stub files (plan_live_test.yml,
      plan_live_teach.yml, plan_live_audit_clean.yml) that were scaffolds with
