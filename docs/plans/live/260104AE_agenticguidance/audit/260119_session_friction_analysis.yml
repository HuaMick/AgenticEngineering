    suggested_resolution: |
      1. Consider not creating empty stub files in CLI plan init
      2. Or mark stub files clearly as templates requiring population
      3. Add validation to warn about empty stub files during plan review

  - id: FF-008
    pattern_type: backtracking
    severity: MEDIUM
