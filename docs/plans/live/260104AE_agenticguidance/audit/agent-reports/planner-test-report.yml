    defined_in: "assets/definitions/agent-loops.yml"
    referenced_in: ["process.yml", "manifest.yml"]
    completeness: "COMPLETE"
  audit-test-fix-loop:
    defined_in: "assets/definitions/agent-loops.yml"
    referenced_in: ["process.yml", "manifest.yml"]
