    - "Standardize strategy naming across files"
    - "Add required_inputs section to process.yml"

  long_term:
    - "Complete migration of test-user-simulator, test-service, test-builder"
    - "Formalize output schema for plan creation"
    - "Add path resolution documentation for multi-repo scenarios"
