    proposed_name: "plan_input_audit_remediation_consolidated.yml"
    rationale: |
      All 6 remediation plans address the same category of issues: context
      overload in agent inputs identified during the audit phase. They share:
      - Same source methodology (input audits)
      - Same execution pattern (phases with teacher agent tasks)
      - Same success criteria structure (context reduction targets)
      - Similar task types (UNUSED removal, OVERLAP consolidation, PHANTOM removal)

      Benefits of consolidation:
      - Unified execution tracking across all agents
      - Shared cross-cutting concerns documented once
      - Parallel execution opportunities visible at plan level
