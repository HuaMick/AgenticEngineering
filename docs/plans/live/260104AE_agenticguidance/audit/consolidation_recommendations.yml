# ============================================================
# FILES TO KEEP SEPARATE (DO NOT CONSOLIDATE)
# ============================================================
files_to_keep_separate:
  - id: "KEEP-001"
    file: "plan_agenticguidance.yml"
    justification: |
      This is the MASTER plan for the entire 260104AE project. It:
      - Contains root-level metadata (worktree, branch, status)
      - Links to all related plans via related_plans section
      - Tracks overall project context and narrative updates
      - Contains DECISION-001 and DECISION-002 which have project-wide impact

      Consolidating this with other plans would lose its role as the central
      coordination point.

  - id: "KEEP-002"
    file: "plan_live_build_migration.yml"
    justification: |
      This plan has a DIFFERENT PURPOSE than the remediation plans:
      - Remediation plans: Fix context overload in existing agents
      - Migration plan: Create new agents (test-user-simulator, test-service, test-builder)

      Migration involves:
      - Creating new folder structures
      - Writing new manifest.yml, inputs.yml, process.yml files
      - Updating agent-categories.yml

      This is a BUILD activity, not a TEACH activity. Different agent types execute it.

  - id: "KEEP-003"
    file: "plan_live_cleanup_deprecation.yml"
    justification: |
      This plan has a UNIQUE PURPOSE: deprecating legacy agents.

      It is:
      - Small and focused (175 lines, 3 tasks)
      - Near completion (just needs DEPRECATED.md files and verification)
      - Different execution pattern (creates files in legacy/ folder, not agents/)

      Merging with remediation plans would obscure its distinct purpose and
      completion status.

  - id: "KEEP-004"
    file: "plan_live_teach_consolidated.yml"
    justification: |
      This is already the CONSOLIDATED teach plan. It:
      - Merges 4 source plans into one
      - Is the active execution artifact
      - Has clear phase structure with 6 phases, 25+ tasks

      Further consolidation with remediation plans would create an unwieldy
      mega-plan that mixes TEACH (guidance refinement) and BUILD (agent migration)
      activities.

