    risk_level: "medium"
    risk_details: |
      Medium risk because:
      - Plans may have different approval statuses (some APPROVED, some NEEDS_CHANGES)
      - Must preserve per-agent phase dependencies
      - Task IDs need to be globally unique in merged plan

      Mitigation:
      - Only merge after all plans reach APPROVED status
      - Use namespaced task IDs (e.g., "guidance.1.1", "build.1.1")
      - Maintain separate success_criteria sections per agent
    execution_consideration: |
      IMPORTANT: Consolidation should happen AFTER all individual plans are approved.
      The consolidated plan becomes the execution artifact; individual plans become
      historical records moved to an archive/ subfolder.
    proposed_structure: |
