      - "audit_planner_cleaning.yml"
      - "audit_planner_reviewer.yml"
      - "audit_planner_test.yml"
      - "audit_deploy_worktree.yml"
    proposed_name: "audit_session3_input_analysis.yml"
    rationale: |
      All 6 audit files follow identical structure (iterations with issues_found,
      exit_condition based on 2 consecutive zero-issue iterations). They were
      generated in the same session and serve the same purpose: identifying
      context overload issues in agent inputs.

      Benefits of consolidation:
      - Single file for cross-agent issue pattern analysis
      - Easier to identify systemic issues (e.g., OVERLAP, PHANTOM_FILE appear across multiple agents)
      - Reduces file count from 6 to 1
      - Maintains traceability via agent_type keys within merged structure
    risk_level: "low"
    risk_details: |
      Low risk because:
      - Audit files are read-only artifacts (no execution dependencies)
      - Original per-agent data preserved via nested structure
      - No external references to individual audit files
    proposed_structure: |
      audit_session3_input_analysis:
        metadata:
          date: "2026-01-07"
          purpose: "Agent input context overload analysis"
          agents_audited: 6

        agents:
