          DETECTION LOGIC:
          ```python
          def _get_plan_path(args, ctx=None):
              """Detect or validate plan folder path.

              Args:
                  args: Command arguments (may have args.plan)
                  ctx: Optional CLI context

              Returns:
                  Path object for plan folder

              Raises:
                  SystemExit: If plan path invalid or not detected
              """
              from pathlib import Path
              from agenticcli.console import print_error

              # Explicit --plan flag takes precedence
              if hasattr(args, 'plan') and args.plan:
                  path = Path(args.plan).resolve()
                  if not path.exists():
                      print_error(f"Plan path does not exist: {path}")
                      sys.exit(1)
                  return path

              # Auto-detection: Check if cwd is in a plan folder
              cwd = Path.cwd()
              # Look for docs/plans/live/YYMMDDXX_* pattern
              # Walk up until we find it or hit repo root

              # If not found:
              print_error("Could not detect plan folder. Use --plan PATH to specify.")
              sys.exit(1)
          ```

