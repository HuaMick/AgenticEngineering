  CLI Commands:
  - agentic question list [--plan PATH] [--status pending|answered|all]
  - agentic question show <question-id> [--plan PATH]
  - agentic question answer <question-id> [--text "answer"] [--plan PATH]
  - agentic question ask <text> [--severity high|medium|low] [--plan PATH]
  - agentic question defer <question-id> [--plan PATH]

  IMPLEMENTATION APPROACH:
  - Follow argparse patterns from existing CLI commands (health.py, langsmith.py)
  - Use Rich library for formatted output (console.py utilities)
  - Support JSON output mode via -j flag
  - Auto-detect current plan context using plan detection logic
  - Interactive prompts for multi-line text input (answer command)

