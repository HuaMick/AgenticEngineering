cci_context_system:

  command: "agentic context bootstrap"

  implementation_file: modules/AgenticCLI/src/agenticcli/commands/context.py

  current_capabilities:
    bootstrap: |
      Returns:
      - role: Agent role ID
      - objective: From active plan
      - plan_folder: Active plan path
      - plan_path: Full path to plan
      - main_worktree: Main worktree path
      - current_task: Task details from plan
      - process: Role-specific process guidelines
      - essential_inputs: Input file references
      - cli_commands: Helpful CLI command hints

    role: "Get role-specific process.yml content"
    task: "Get active task from plan"
    inputs: "Get input file manifest for role"
    generate_agent: "Generate thin-client agent file"

  integration_opportunity: |
    The CCI bootstrap system already aggregates the exact context that should
    be injected at spawn time. The cmd_bootstrap() function returns:
    - Active plan and task information
    - Role-specific guidance
    - Essential inputs

    This could be pre-computed and injected at session spawn time.

# =============================================================================
# EXTENSION POINTS FOR ORCHESTRATION CONTEXT
# =============================================================================

extension_points:

  point_1_environment_variables:
    location: session.py:cmd_spawn() line 186
    mechanism: "Add env dict to Popen/run calls"
    example: |
      env = os.environ.copy()
      env["AGENTIC_SESSION_ROLE"] = "subagent"
      env["AGENTIC_PARENT_SESSION"] = parent_session_id
      env["AGENTIC_TASK_ID"] = task_id
      env["AGENTIC_PLAN_FOLDER"] = plan_folder

      process = subprocess.Popen(
          cmd,
          cwd=working_dir,
          env=env,  # <-- ADD THIS
          ...
      )
    effort: "LOW - simple addition"

  point_2_prompt_prefix:
    location: session.py:cmd_spawn() line 162
    mechanism: "Prepend orchestration context to prompt"
    example: |
      orchestration_context = f"""
      [ORCHESTRATION CONTEXT]
      Role: {role}
      Task: {task_id}
      Plan: {plan_folder}
      Parent Session: {parent_session_id}
      [END ORCHESTRATION CONTEXT]

      """
      prompt = orchestration_context + user_prompt
    effort: "LOW - string manipulation"
    drawback: "Consumes context window tokens"

  point_3_system_prompt_file:
    location: session.py:cmd_spawn() line 159
    mechanism: "Pass --system-prompt file to claude CLI"
    example: |
      # Generate temporary system prompt file with orchestration context
      system_prompt = generate_orchestration_system_prompt(role, task, plan)
      system_prompt_file = Path(tempfile.mktemp(suffix='.md'))
      system_prompt_file.write_text(system_prompt)

      cmd = ["claude", "--print", "--system-prompt", str(system_prompt_file)]
    effort: "MEDIUM - requires file management"
    benefit: "Doesn't consume user context tokens"

  point_4_spawn_command_extension:
    location: cli.py:_add_session_parser() line 1553
    mechanism: "Add new arguments to session spawn"
    example: |
      spawn_parser.add_argument(
          "--role", "-r",
          choices=["orchestrator", "subagent"],
          help="Role for this session"
      )
      spawn_parser.add_argument(
          "--task", "-t",
          help="Task ID this session is working on"
      )
      spawn_parser.add_argument(
          "--plan",
          help="Plan folder path for orchestration context"
      )
      spawn_parser.add_argument(
          "--parent-session",
          help="Parent session ID (marks this as a subagent)"
      )
    effort: "LOW - argument additions"

  point_5_session_registry_enhancement:
    location: session.py:_save_session() line 55
    mechanism: "Add orchestration fields to session JSON"
    example: |
      session_data = {
          "session_id": session_id,
          "pid": process.pid,
          # ... existing fields ...

          # NEW: Orchestration fields
          "role": role,  # "orchestrator" or "subagent"
          "task_id": task_id,
          "plan_folder": plan_folder,
          "parent_session": parent_session_id,
          "orchestration_phase": phase,
      }
    effort: "LOW - dict additions"
    benefit: "Enables session list to show orchestration hierarchy"

