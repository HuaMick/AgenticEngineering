# =============================================================================
# OPEN QUESTIONS FOR FOLLOW-UP TASKS
# =============================================================================

open_questions_remaining:

  - question: "How should the main session mark itself as orchestrator?"
    context: |
      The main session is started manually by the user, not via `agentic session spawn`.
      It cannot receive injected context through spawn. Options:
      1. User provides --role flag at manual start
      2. First `agentic context bootstrap --role orchestrator` sets env
      3. Presence of orchestration MMD in plan folder implies orchestrator role
    assigned_to: EN-P3-002

  - question: "Should spawned sessions inherit ALL parent environment vars?"
    context: |
      Currently, spawned sessions inherit process environment implicitly.
      If parent sets AGENTIC_* vars, they propagate. But is this sufficient?
      Should there be explicit inheritance vs fresh start?
    assigned_to: EN-P3-002

  - question: "How does this interact with --resume sessions?"
    context: |
      Resumed sessions restore conversation history but may lose env context.
      Need to understand Claude CLI's --resume behavior.
    assigned_to: EN-P3-002

  - question: "What is the acceptable overhead for context injection?"
    context: |
      System prompt generation, file I/O for prompts, CCI bootstrap calls
      all add latency. What's acceptable for spawn-time overhead?
    assigned_to: EN-P3-003

# =============================================================================
# CONCLUSION
# =============================================================================

conclusion: |
  The session spawn infrastructure provides clear extension points for
  orchestration context injection. The current implementation is minimal
  but well-structured, making it relatively easy to enhance.

  Recommended Approach: Hybrid injection using:
  1. Environment variables for role detection (AGENTIC_SESSION_ROLE)
  2. Session registry enhancement for hierarchy tracking
  3. Optional prompt prefix for critical context
  4. New spawn arguments (--role, --task, --plan, --parent-session)

  This investigation confirms P3 (Session Spawn Context Injection) is
  FEASIBLE with LOW-to-MEDIUM implementation effort. The extension points
  are well-defined and the existing CLI infrastructure supports the changes.

