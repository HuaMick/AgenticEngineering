# =============================================================================
# POTENTIAL SOLUTIONS (HIGH-LEVEL)
# =============================================================================

potential_solutions:

  solution_1_minimal_env_injection:
    description: "Add minimal environment variables at spawn time"
    effort: LOW
    variables:
      - "AGENTIC_SESSION_ROLE: orchestrator|subagent"
      - "AGENTIC_TASK_ID: task identifier"
      - "AGENTIC_PLAN_FOLDER: path to plan folder"
    pros:
      - Minimal code changes
      - Sessions can detect role via os.environ
      - Works with existing claude CLI
    cons:
      - Environment can be overwritten
      - Requires agent cooperation to check vars

  solution_2_full_context_injection:
    description: "Pre-compute CCI bootstrap and inject via system prompt"
    effort: MEDIUM
    mechanism: |
      1. Call cmd_bootstrap() equivalent to get full context
      2. Generate orchestration system prompt
      3. Pass to claude via --system-prompt
    pros:
      - Complete context available to agent
      - Consistent with CCI bootstrap pattern
      - Role guidance embedded at start
    cons:
      - Increases spawn time
      - Requires system prompt file management
      - May conflict with existing system prompts

  solution_3_hybrid_approach:
    description: "Env vars for detection + prompt injection for context"
    effort: MEDIUM
    mechanism: |
      1. Set env vars for role detection
      2. Prepend minimal context block to prompt
      3. Store full context in session registry
    pros:
      - Detection is reliable (env vars)
      - Context is explicit (prompt prefix)
      - Full details queryable (session registry)
    cons:
      - Multiple mechanisms to maintain
      - Prompt prefix consumes tokens

