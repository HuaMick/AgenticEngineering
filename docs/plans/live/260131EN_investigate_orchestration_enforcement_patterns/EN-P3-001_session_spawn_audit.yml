# =============================================================================
# SESSION SPAWN MECHANISM ANALYSIS
# =============================================================================

session_spawn_mechanism:

  command: "agentic session spawn"

  implementation_file: modules/AgenticCLI/src/agenticcli/commands/session.py

  spawn_flow:
    1_command_build: |
      The cmd_spawn() function builds a claude command:
      ```python
      cmd = ["claude", "--print"]
      if max_turns:
          cmd.extend(["--max-turns", str(max_turns)])
      cmd.append(prompt)
      ```

    2_background_spawn: |
      For background sessions, uses Popen with start_new_session=True:
      ```python
      process = subprocess.Popen(
          cmd,
          cwd=working_dir,
          stdin=subprocess.DEVNULL,
          stdout=stdout_log,
          stderr=stderr_log,
          start_new_session=True,  # Detaches from parent process group
      )
      ```

    3_foreground_spawn: |
      For foreground sessions, uses subprocess.run:
      ```python
      result = subprocess.run(
          cmd,
          cwd=working_dir,
          capture_output=True,
          text=True,
      )
      ```

    4_session_tracking: |
      Session metadata stored in ~/.agentic/sessions/<uuid>.json:
      - session_id: UUID
      - pid: Process ID
      - prompt: The user-provided prompt
      - max_turns: Turn limit if specified
      - status: running/completed/failed/stopped
      - working_dir: Working directory
      - command: Full command string
      - stdout_log/stderr_log: Log file paths (background only)

  current_context_injection:
    environment_variables: "NONE - no env vars are set"
    session_metadata: "NONE - no orchestration metadata"
    role_identification: "NONE - sessions don't know if they're orchestrator or subagent"
    task_assignment: "NONE - no task ID or phase passed"
    plan_context: "NONE - no plan folder reference"

