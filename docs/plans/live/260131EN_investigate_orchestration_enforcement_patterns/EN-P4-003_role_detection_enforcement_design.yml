# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary: |
  This document synthesizes findings from EN-P4-001 (session metadata audit) and
  EN-P4-002 (environment-based session identification) to design a complete role
  detection and enforcement system for distinguishing orchestrators from subagents.

  The design establishes:
  1. A multi-layer role detection strategy (environment vars + session registry)
  2. Role-appropriate behavior enforcement for CLI commands
  3. Integration points with existing session and plan management
  4. Graduated enforcement levels (advisory, warning, blocking)

  Key Design Decisions:
  - Environment variables (AGENTIC_SESSION_ROLE) as primary detection mechanism
  - Session registry as authoritative source for role persistence
  - CLI-level enforcement with graceful degradation for legacy sessions
  - Subagent restrictions on spawning and full plan access

# =============================================================================
# ROLE DETECTION STRATEGY
# =============================================================================

role_detection_strategy:

  overview: |
    Role detection uses a layered approach with fallback mechanisms. The primary
    source is environment variables set at spawn time; the secondary source is
    the session registry for persistence and verification.

  detection_layers:

    layer_1_environment_variables:
      name: "Environment Variable Detection"
      priority: PRIMARY
      mechanism: |
        At session start, check AGENTIC_SESSION_ROLE environment variable:
        - "orchestrator": Session manages task delegation
        - "subagent": Session performs assigned task only
        - Not set: Legacy session without orchestration context

      advantages:
        - Zero latency detection
        - Available immediately at process start
        - No file I/O required
        - Propagates to subprocesses automatically

      implementation:
        detection_function: |
          import os

          def detect_role_from_env() -> str | None:
              """Detect session role from environment variable.

              Returns:
                  'orchestrator', 'subagent', or None for legacy sessions.
              """
              return os.environ.get("AGENTIC_SESSION_ROLE")

          def is_orchestrator() -> bool:
              """Check if current session is an orchestrator."""
              return detect_role_from_env() == "orchestrator"

          def is_subagent() -> bool:
              """Check if current session is a subagent."""
              return detect_role_from_env() == "subagent"

          def is_legacy_session() -> bool:
              """Check if session has no orchestration context."""
              return detect_role_from_env() is None

    layer_2_session_registry:
      name: "Session Registry Lookup"
      priority: SECONDARY (verification/persistence)
      mechanism: |
        Query ~/.agentic/sessions/{session_id}.json for role field.
        This provides:
        - Persistence across process restarts (if session is resumed)
        - Verification of environment variables (tampering detection)
        - Historical role tracking for audit trails

      storage_location: "~/.agentic/sessions/*.json"

      schema_extension: |
        # New fields in session record (from EN-P3-003 design)
        {
            "role": "orchestrator" | "subagent" | null,
            "task_id": "EN-P4-003",
            "plan_folder": "docs/plans/live/...",
            "parent_session": "uuid-of-parent",
            "phase": "build",
            "orchestration_context": {
                "injected_at": "2026-01-31T10:00:00",
                "env_vars_set": ["AGENTIC_SESSION_ID", "AGENTIC_SESSION_ROLE", ...],
                "context_injected": true
            }
        }

      implementation:
        lookup_function: |
          import json
          from pathlib import Path

          def get_session_role_from_registry(session_id: str) -> str | None:
              """Look up session role from registry.

              Args:
                  session_id: UUID of the session to look up.

              Returns:
                  Role string or None if not found/not set.
              """
              session_file = Path.home() / ".agentic" / "sessions" / f"{session_id}.json"
              if not session_file.exists():
                  return None

              with open(session_file) as f:
                  data = json.load(f)
                  return data.get("role")

    layer_3_inference_fallback:
      name: "Inference-Based Detection (Fallback)"
      priority: FALLBACK (when layers 1-2 unavailable)
      mechanism: |
        When environment variables and registry don't provide role, use
        heuristics to infer likely role:

        Orchestrator signals:
        - Working directory is plan root folder
        - Prompt contains "orchestrat*" patterns
        - Session spawned multiple children

        Subagent signals:
        - AGENTIC_TASK_ID is set (even without AGENTIC_SESSION_ROLE)
        - AGENTIC_PARENT_SESSION is set
        - Working directory is module/test subdirectory

      reliability: LOW - use only as advisory signal
      recommendation: |
        Inference should NOT be used for enforcement decisions.
        It exists only to provide UX hints for legacy sessions.

  combined_detection_flow: |
    def detect_session_role() -> dict:
        """Detect session role using all available layers.

        Returns:
            dict with keys:
            - role: 'orchestrator', 'subagent', or None
            - source: 'environment', 'registry', 'inferred', or 'unknown'
            - confidence: 'high', 'medium', 'low'
            - context: dict with additional context (task_id, parent, etc.)
        """
        # Layer 1: Environment variables (high confidence)
        env_role = os.environ.get("AGENTIC_SESSION_ROLE")
        if env_role:
            return {
                "role": env_role,
                "source": "environment",
                "confidence": "high",
                "context": {
                    "session_id": os.environ.get("AGENTIC_SESSION_ID"),
                    "task_id": os.environ.get("AGENTIC_TASK_ID"),
                    "parent_session": os.environ.get("AGENTIC_PARENT_SESSION"),
                    "plan_folder": os.environ.get("AGENTIC_PLAN_FOLDER"),
                    "phase": os.environ.get("AGENTIC_PHASE"),
                }
            }

        # Layer 2: Session registry (medium confidence)
        session_id = os.environ.get("AGENTIC_SESSION_ID")
        if session_id:
            registry_role = get_session_role_from_registry(session_id)
            if registry_role:
                return {
                    "role": registry_role,
                    "source": "registry",
                    "confidence": "medium",
                    "context": load_session_context(session_id)
                }

        # Layer 3: Inference (low confidence)
        inferred = infer_role_from_context()
        if inferred:
            return {
                "role": inferred,
                "source": "inferred",
                "confidence": "low",
                "context": {}
            }

        # No role detected
        return {
            "role": None,
            "source": "unknown",
            "confidence": "none",
            "context": {}
        }

# =============================================================================
# ROLE ENFORCEMENT STRATEGY
# =============================================================================

role_enforcement_strategy:

  overview: |
    Role enforcement defines what actions each role is permitted to perform.
    Enforcement can be advisory (warnings), restrictive (blocking), or
    conditional (allowed with explicit override).

  enforcement_levels:

    level_1_advisory:
      name: "Advisory (Soft Warning)"
      behavior: |
        Log warning but allow action to proceed.
        Used for low-risk actions where user may have valid reasons.
      indicator: "[ADVISORY]"
      example: |
        [ADVISORY] Subagents typically don't read full plan. Consider focusing on assigned task.

    level_2_warning:
      name: "Warning (Strong Caution)"
      behavior: |
        Display prominent warning, require --force to proceed.
        Used for medium-risk actions that could disrupt orchestration.
      indicator: "[WARNING]"
      example: |
        [WARNING] Spawning additional agents as a subagent may confuse orchestration.
        Use --force to proceed anyway.

    level_3_blocking:
      name: "Blocking (Prohibited)"
      behavior: |
        Reject action with error. No override available.
        Used for high-risk actions that would break orchestration invariants.
      indicator: "[ERROR]"
      example: |
        [ERROR] Subagents cannot claim orchestrator role. This action is blocked.

  role_permissions:

    orchestrator_permissions:
      description: "Orchestrator is the main session managing task delegation"
      allowed_actions:
        - "Read full plan files (plan_build.yml, orchestration.mmd)"
        - "Spawn subagent sessions with context injection"
        - "Monitor subagent session status"
        - "Update plan task status"
        - "Mark tasks as started/completed"
        - "Archive/move plans"
        - "Access all session registry entries"
        - "Set AGENTIC_* environment variables for children"
      restricted_actions:
        - "Claim subagent role after starting as orchestrator (blocked)"
      advisory_actions:
        - "Reading task details outside current phase (advisory)"

    subagent_permissions:
      description: "Subagent performs assigned task, reports to parent"
      allowed_actions:
        - "Read assigned task details from plan"
        - "Update assigned task status (started, completed)"
        - "Query own session status"
        - "Read files relevant to assigned task"
        - "Create output/deliverables for assigned task"
        - "Report completion to stdout/exit code"
      restricted_actions:
        - "Spawn new Claude Code sessions (warning, --force to override)"
        - "Read full orchestration plan (advisory)"
        - "Mark unassigned tasks as completed (blocked)"
        - "Archive or move plans (blocked)"
        - "Claim orchestrator role (blocked)"
      advisory_actions:
        - "Reading unrelated modules (advisory)"
        - "Modifying files outside task scope (advisory)"

    legacy_permissions:
      description: "Sessions without orchestration context (backward compatible)"
      allowed_actions:
        - "All actions permitted without enforcement"
        - "Behaves like pre-orchestration CLI"
      behavior: |
        Legacy sessions have no role restrictions. This ensures backward
        compatibility for users who don't use orchestration features.

  enforcement_points:

    enforcement_point_session_spawn:
      location: "modules/AgenticCLI/src/agenticcli/commands/session.py"
      function: "cmd_spawn()"
      enforcement:
        - check: "If current session is subagent and trying to spawn"
          level: "warning"
          message: "Subagents typically don't spawn additional agents."
          override: "--force"
        - check: "If trying to set --role orchestrator as subagent"
          level: "blocking"
          message: "Subagents cannot spawn orchestrator sessions."
          override: none

    enforcement_point_plan_read:
      location: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
      functions: ["cmd_status()", "cmd_task_list()", "cmd_orchestration_*()"]
      enforcement:
        - check: "If subagent accesses full plan"
          level: "advisory"
          message: "Subagents should focus on assigned task."
          override: allowed (informational only)

    enforcement_point_task_complete:
      location: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
      function: "cmd_task_complete()"
      enforcement:
        - check: "If subagent tries to complete non-assigned task"
          level: "blocking"
          message: "Can only complete assigned task: {AGENTIC_TASK_ID}"
          override: none (unless no task assigned)

    enforcement_point_plan_archive:
      location: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
      function: "cmd_archive()"
      enforcement:
        - check: "If subagent tries to archive plan"
          level: "blocking"
          message: "Only orchestrator can archive plans."
          override: none

    enforcement_point_plan_move:
      location: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
      function: "cmd_move()"
      enforcement:
        - check: "If subagent tries to move plan"
          level: "blocking"
          message: "Only orchestrator can move plans."
          override: none

# =============================================================================
# ENFORCEMENT IMPLEMENTATION
# =============================================================================

enforcement_implementation:

  core_enforcement_module:
    location: "modules/AgenticCLI/src/agenticcli/orchestration/enforcement.py"
    purpose: "Centralized role detection and enforcement logic"

    class_design: |
      from enum import Enum
      from dataclasses import dataclass
      import os


      class Role(Enum):
          ORCHESTRATOR = "orchestrator"
          SUBAGENT = "subagent"
          LEGACY = None  # No role set


      class EnforcementLevel(Enum):
          ADVISORY = "advisory"
          WARNING = "warning"
          BLOCKING = "blocking"


      @dataclass
      class RoleContext:
          """Context about the current session's role."""
          role: Role
          source: str  # 'environment', 'registry', 'inferred', 'unknown'
          confidence: str  # 'high', 'medium', 'low', 'none'
          session_id: str | None
          task_id: str | None
          parent_session: str | None
          plan_folder: str | None
          phase: str | None


      @dataclass
      class EnforcementResult:
          """Result of an enforcement check."""
          allowed: bool
          level: EnforcementLevel
          message: str | None
          requires_force: bool


      class RoleEnforcer:
          """Enforces role-based restrictions on CLI actions."""

          def __init__(self):
              self._context: RoleContext | None = None

          @property
          def context(self) -> RoleContext:
              """Lazily detect and cache role context."""
              if self._context is None:
                  self._context = self._detect_context()
              return self._context

          def _detect_context(self) -> RoleContext:
              """Detect role from environment and registry."""
              role_str = os.environ.get("AGENTIC_SESSION_ROLE")

              if role_str == "orchestrator":
                  role = Role.ORCHESTRATOR
              elif role_str == "subagent":
                  role = Role.SUBAGENT
              else:
                  role = Role.LEGACY

              return RoleContext(
                  role=role,
                  source="environment" if role_str else "unknown",
                  confidence="high" if role_str else "none",
                  session_id=os.environ.get("AGENTIC_SESSION_ID"),
                  task_id=os.environ.get("AGENTIC_TASK_ID"),
                  parent_session=os.environ.get("AGENTIC_PARENT_SESSION"),
                  plan_folder=os.environ.get("AGENTIC_PLAN_FOLDER"),
                  phase=os.environ.get("AGENTIC_PHASE"),
              )

          def check_spawn_allowed(self, target_role: str | None = None) -> EnforcementResult:
              """Check if spawning a new session is allowed."""
              if self.context.role == Role.LEGACY:
                  # Legacy sessions can spawn freely
                  return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)

              if self.context.role == Role.SUBAGENT:
                  if target_role == "orchestrator":
                      return EnforcementResult(
                          allowed=False,
                          level=EnforcementLevel.BLOCKING,
                          message="Subagents cannot spawn orchestrator sessions.",
                          requires_force=False
                      )
                  return EnforcementResult(
                      allowed=False,
                      level=EnforcementLevel.WARNING,
                      message="Subagents typically don't spawn additional agents. Use --force to proceed.",
                      requires_force=True
                  )

              # Orchestrator can spawn anything
              return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)

          def check_task_complete_allowed(self, task_id: str) -> EnforcementResult:
              """Check if completing a task is allowed."""
              if self.context.role == Role.LEGACY:
                  return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)

              if self.context.role == Role.SUBAGENT:
                  if self.context.task_id and task_id != self.context.task_id:
                      return EnforcementResult(
                          allowed=False,
                          level=EnforcementLevel.BLOCKING,
                          message=f"Can only complete assigned task: {self.context.task_id}",
                          requires_force=False
                      )

              return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)

          def check_plan_archive_allowed(self) -> EnforcementResult:
              """Check if archiving a plan is allowed."""
              if self.context.role == Role.LEGACY:
                  return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)

              if self.context.role == Role.SUBAGENT:
                  return EnforcementResult(
                      allowed=False,
                      level=EnforcementLevel.BLOCKING,
                      message="Only orchestrator can archive plans.",
                      requires_force=False
                  )

              return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)

          def check_full_plan_access(self) -> EnforcementResult:
              """Check if reading full plan is advisable."""
              if self.context.role == Role.SUBAGENT:
                  return EnforcementResult(
                      allowed=True,  # Still allowed, just advisory
                      level=EnforcementLevel.ADVISORY,
                      message="Subagents should focus on assigned task. Consider using 'agentic plan task status {task_id}'.",
                      requires_force=False
                  )

              return EnforcementResult(True, EnforcementLevel.ADVISORY, None, False)


      # Singleton enforcer instance
      _enforcer: RoleEnforcer | None = None

      def get_enforcer() -> RoleEnforcer:
          """Get the global role enforcer instance."""
          global _enforcer
          if _enforcer is None:
              _enforcer = RoleEnforcer()
          return _enforcer

  cli_integration_pattern:
    description: "How to integrate enforcement checks into existing CLI commands"

    pattern_for_session_spawn: |
      # In modules/AgenticCLI/src/agenticcli/commands/session.py
      # Add at start of cmd_spawn():

      from agenticcli.orchestration.enforcement import get_enforcer

      def cmd_spawn(args, ctx=None):
          # ... existing setup code ...

          # Enforcement check
          enforcer = get_enforcer()
          target_role = getattr(args, "role", None)
          result = enforcer.check_spawn_allowed(target_role)

          if not result.allowed:
              if result.level == EnforcementLevel.BLOCKING:
                  print_error(f"[BLOCKED] {result.message}")
                  sys.exit(1)
              elif result.requires_force and not getattr(args, "force", False):
                  print_error(f"[WARNING] {result.message}")
                  sys.exit(1)

          # ... rest of spawn implementation ...

    pattern_for_plan_commands: |
      # In modules/AgenticCLI/src/agenticcli/commands/plan.py
      # Add to cmd_archive():

      from agenticcli.orchestration.enforcement import get_enforcer

      def cmd_archive(args):
          # Enforcement check
          enforcer = get_enforcer()
          result = enforcer.check_plan_archive_allowed()

          if not result.allowed:
              print_error(f"[BLOCKED] {result.message}")
              sys.exit(1)

          # ... rest of archive implementation ...

  enforcement_decorator:
    description: "Optional decorator for cleaner enforcement integration"

    implementation: |
      from functools import wraps
      from agenticcli.orchestration.enforcement import get_enforcer, EnforcementLevel

      def enforce_role(check_function: str, **kwargs):
          """Decorator to enforce role-based restrictions.

          Args:
              check_function: Name of RoleEnforcer method to call
              **kwargs: Arguments to pass to the check function

          Example:
              @enforce_role("check_plan_archive_allowed")
              def cmd_archive(args):
                  ...
          """
          def decorator(func):
              @wraps(func)
              def wrapper(*args, **wrapper_kwargs):
                  enforcer = get_enforcer()
                  check = getattr(enforcer, check_function)
                  result = check(**kwargs)

                  if not result.allowed:
                      from agenticcli.console import print_error
                      level_prefix = {
                          EnforcementLevel.BLOCKING: "[BLOCKED]",
                          EnforcementLevel.WARNING: "[WARNING]",
                          EnforcementLevel.ADVISORY: "[ADVISORY]",
                      }
                      print_error(f"{level_prefix[result.level]} {result.message}")

                      if result.level == EnforcementLevel.BLOCKING:
                          import sys
                          sys.exit(1)

                      # For warnings, check for --force
                      if result.requires_force:
                          import sys
                          cmd_args = args[0] if args else None
                          if not getattr(cmd_args, "force", False):
                              sys.exit(1)

                  return func(*args, **wrapper_kwargs)
              return wrapper
          return decorator

      # Usage example:
      @enforce_role("check_plan_archive_allowed")
      def cmd_archive(args):
          # Enforcement already handled by decorator
          ...

