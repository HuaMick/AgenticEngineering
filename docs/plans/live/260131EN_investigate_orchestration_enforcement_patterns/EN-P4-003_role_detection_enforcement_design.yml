session_whoami_command:
  description: "New command to display current session role and context"
  usage: "agentic session whoami"

  implementation:
    location: "modules/AgenticCLI/src/agenticcli/commands/session.py"

    function: |
      def cmd_whoami(args, ctx=None):
          """Display current session role and orchestration context.

          Args:
              args: Parsed command arguments.
              ctx: Optional CLIContext.
          """
          from agenticcli.console import console, is_json_output, print_header, print_json
          from agenticcli.orchestration.enforcement import get_enforcer

          enforcer = get_enforcer()
          context = enforcer.context

          if is_json_output():
              print_json({
                  "role": context.role.value if context.role.value else "legacy",
                  "source": context.source,
                  "confidence": context.confidence,
                  "session_id": context.session_id,
                  "task_id": context.task_id,
                  "parent_session": context.parent_session,
                  "plan_folder": context.plan_folder,
                  "phase": context.phase,
              })
              return

          print_header("Session Identity")

          role_display = context.role.value if context.role.value else "legacy (no orchestration)"
          console.print(f"[cyan]Role:[/cyan] {role_display}")
          console.print(f"[cyan]Detection Source:[/cyan] {context.source}")
          console.print(f"[cyan]Confidence:[/cyan] {context.confidence}")
          console.print()

          if context.session_id:
              console.print(f"[cyan]Session ID:[/cyan] {context.session_id}")
          if context.task_id:
              console.print(f"[cyan]Assigned Task:[/cyan] {context.task_id}")
          if context.parent_session:
              console.print(f"[cyan]Parent Session:[/cyan] {context.parent_session}")
          if context.plan_folder:
              console.print(f"[cyan]Plan Folder:[/cyan] {context.plan_folder}")
          if context.phase:
              console.print(f"[cyan]Phase:[/cyan] {context.phase}")

          if not any([context.session_id, context.task_id, context.parent_session]):
              console.print("[dim]No orchestration context detected.[/dim]")
              console.print("[dim]This is a legacy session with no role restrictions.[/dim]")

    cli_parser_addition: |
      # In _add_session_parser():
      whoami_parser = session_subparsers.add_parser(
          "whoami",
          help="Display current session role and orchestration context",
      )
      whoami_parser.set_defaults(session_command="whoami")

    handle_routing: |
      # In handle():
      elif args.session_command == "whoami":
          cmd_whoami(args, ctx)

# =============================================================================
# ERROR MESSAGES AND UX
# =============================================================================

error_messages:

  blocked_messages:
    spawn_as_orchestrator: |
      [BLOCKED] Subagents cannot spawn orchestrator sessions.

      You are currently running as a subagent (task: {task_id}).
      Orchestrator spawning is reserved for the main session.

      If you need additional compute, consider:
      - Reporting back to your parent session
      - Requesting the orchestrator spawn additional subagents

    complete_wrong_task: |
      [BLOCKED] Can only complete assigned task: {assigned_task_id}

      You attempted to complete: {requested_task_id}
      Your assigned task is: {assigned_task_id}

      To complete a different task, you must be assigned to it
      via --task when spawned.

    archive_as_subagent: |
      [BLOCKED] Only orchestrator can archive plans.

      You are running as a subagent. Plan archival is an
      orchestrator-level operation that affects all subagents.

      Complete your assigned task and let the orchestrator
      handle plan lifecycle management.

  warning_messages:
    spawn_as_subagent: |
      [WARNING] Subagents typically don't spawn additional agents.

      Spawning additional agents as a subagent may:
      - Confuse orchestration hierarchy
      - Create orphan sessions
      - Compete for resources

      Use --force to proceed anyway, or report to your parent
      session if additional compute is needed.

  advisory_messages:
    full_plan_access: |
      [ADVISORY] Subagents should focus on assigned task.

      You are accessing the full plan while assigned to task: {task_id}

      Consider using:
        agentic plan task status {task_id}

      to focus on your specific task context.

