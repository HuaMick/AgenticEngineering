# =============================================================================
# TESTING STRATEGY
# =============================================================================

testing_strategy:

  unit_tests:
    location: "modules/AgenticCLI/tests/test_orchestration_enforcement.py"
    tests:
      - test_detect_role_from_env_orchestrator
      - test_detect_role_from_env_subagent
      - test_detect_role_from_env_legacy
      - test_check_spawn_allowed_as_orchestrator
      - test_check_spawn_allowed_as_subagent
      - test_check_spawn_allowed_as_legacy
      - test_check_spawn_orchestrator_blocked_for_subagent
      - test_check_task_complete_allowed_for_assigned_task
      - test_check_task_complete_blocked_for_wrong_task
      - test_check_plan_archive_blocked_for_subagent
      - test_enforce_role_decorator

  integration_tests:
    location: "modules/AgenticCLI/tests/test_session_enforcement_integration.py"
    tests:
      - test_spawn_with_role_sets_env_vars
      - test_spawn_as_subagent_warns_without_force
      - test_spawn_as_subagent_proceeds_with_force
      - test_archive_blocked_when_subagent
      - test_whoami_shows_role_context

  manual_verification:
    scenarios:
      - name: "Orchestrator spawns subagent"
        steps:
          - "Start session with --role orchestrator"
          - "Spawn subagent with --role subagent --task TASK-001"
          - "Verify subagent sees AGENTIC_* env vars"
          - "Verify subagent can complete only TASK-001"

      - name: "Subagent attempts to spawn"
        steps:
          - "Start session with --role subagent"
          - "Attempt 'agentic session spawn --prompt test'"
          - "Verify warning is displayed"
          - "Verify --force allows spawn"

      - name: "Legacy session backward compatibility"
        steps:
          - "Start session without --role"
          - "Run 'agentic session whoami'"
          - "Verify shows 'legacy' with no restrictions"
          - "Verify all commands work normally"

# =============================================================================
# SECURITY CONSIDERATIONS
# =============================================================================

security_considerations:

  environment_variable_tampering:
    risk: |
      A malicious or confused agent could modify AGENTIC_SESSION_ROLE
      environment variable to escalate privileges.

    mitigation: |
      1. Session registry is authoritative - can cross-verify
      2. Environment is set at spawn time, hard to modify in subprocess
      3. Enforcement is defense-in-depth, not security boundary
      4. High-privilege operations should require explicit orchestrator role

  subagent_escape:
    risk: |
      Subagent could use --force to bypass restrictions and
      behave as if it were an orchestrator.

    mitigation: |
      1. --force only overrides WARNING level, not BLOCKING
      2. Critical operations (archive, orchestrator spawn) are BLOCKING
      3. Audit trail via session registry shows all spawns
      4. Parent orchestrator can monitor child behavior

  inheritance_attacks:
    risk: |
      Child process inherits parent's environment including role,
      could lead to unintended privilege propagation.

    mitigation: |
      1. Each spawn explicitly sets AGENTIC_SESSION_ROLE for child
      2. Default is to NOT inherit role (role = None in child)
      3. Orchestrator must explicitly grant role to children

# =============================================================================
# FUTURE ENHANCEMENTS
# =============================================================================

future_enhancements:

  phase_based_enforcement:
    description: |
      Enforce that certain operations only happen in certain phases.
      E.g., no code changes during "review" phase, no deploys during "plan".
    priority: LOW
    effort: MEDIUM

  resource_quotas:
    description: |
      Limit number of subagents an orchestrator can spawn.
      Limit compute time per subagent.
    priority: LOW
    effort: HIGH

  audit_logging:
    description: |
      Log all enforcement decisions to file for debugging
      and compliance tracking.
    priority: MEDIUM
    effort: LOW

  mcp_server_integration:
    description: |
      Expose role enforcement through MCP server so Claude Code
      can query role context programmatically.
    priority: MEDIUM
    effort: MEDIUM

  permission_overrides:
    description: |
      Allow plan files to specify custom permission overrides
      for specific tasks or phases.
    priority: LOW
    effort: MEDIUM

# =============================================================================
# CONCLUSION
# =============================================================================

conclusion: |
  This design provides a comprehensive role detection and enforcement system
  that builds on the foundations laid in EN-P4-001 (session metadata) and
  EN-P4-002 (environment-based identification).

  Key Achievements:
  1. Multi-layer detection strategy with environment variables as primary source
  2. Graduated enforcement levels (advisory, warning, blocking)
  3. Clear role permissions for orchestrators and subagents
  4. CLI integration patterns for existing commands
  5. New 'agentic session whoami' command for role introspection
  6. Full backward compatibility for legacy sessions

  The implementation requires approximately 280 lines of new code across
  5 modified files and 2 new files. All changes are backward compatible
  with existing sessions that don't use orchestration context.

  Next Steps:
  1. Implement Phase 1 (core detection module)
  2. Implement Phase 2 (CLI integration)
  3. Complete EN-P3-003 for environment injection (dependency)
  4. Add unit and integration tests
  5. Document in user-facing documentation

