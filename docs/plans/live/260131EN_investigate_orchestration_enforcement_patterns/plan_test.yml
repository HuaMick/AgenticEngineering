# =============================================================================
# NOTE: This is an investigation plan. Test plan is deferred.
# =============================================================================
# This file documents how we would validate each proposal IF it is selected
# for implementation. Actual test execution is OUT OF SCOPE for this plan.
#
# When investigation completes and a proposal is selected, a new implementation
# plan should be created with a proper test plan.
# =============================================================================

plan:
  name: "Orchestration Enforcement - Validation Criteria"
  status: deferred
  reason: "Investigation plan - test execution is out of scope"

# =============================================================================
# PROPOSAL VALIDATION CRITERIA
# =============================================================================

validation_criteria_by_proposal:

  proposal_1_tasklist:
    validation_approach: |
      If CLI tasklist is chosen for orchestration tracking, validation would:
      1. Create a test plan with known orchestration phases
      2. Execute orchestration with tasklist tracking enabled
      3. Verify tasklist state matches execution progress
      4. Test state persistence across session restart
    key_tests:
      - "Tasklist represents all orchestration phases"
      - "Task status updates are reflected in plan YAML"
      - "Current task query returns correct task"
      - "Sequential execution is enforced (if supported)"

  proposal_2_preload:
    validation_approach: |
      If preloaded tasklists are chosen, validation would:
      1. Create test orchestration MMD files
      2. Run `agentic plan start` and verify tasklist generation
      3. Compare generated tasklist to MMD structure
      4. Test with different MMD formats
    key_tests:
      - "MMD is parsed correctly"
      - "Generated tasklist matches MMD nodes"
      - "Validation gates are included"
      - "Error handling for malformed MMD"

  proposal_3_spawn:
    validation_approach: |
      If session spawn context injection is chosen, validation would:
      1. Spawn session with orchestration context
      2. Verify spawned session receives role and task
      3. Test that spawned session identifies as subagent
      4. Verify main session marker is set
    key_tests:
      - "Spawned session has role metadata"
      - "Task assignment is received"
      - "Subagent can identify its role"
      - "Main session marker persists"

  proposal_4_detection:
    validation_approach: |
      If main session detection is chosen, validation would:
      1. Create sessions via different methods
      2. Query role detection for each
      3. Verify detection accuracy
      4. Test edge cases (manual start, resume, etc.)
    key_tests:
      - "Detection via CLI command works"
      - "Detection via environment variable works"
      - "100% accuracy in all scenarios"
      - "No false positives/negatives"

  proposal_5_tmux:
    validation_approach: |
      If tmux patterns are chosen, validation would:
      1. Create tmux sessions with role encoding
      2. Verify role can be retrieved from session
      3. Test capture-pane for progress monitoring
      4. Verify works with local and remote sessions
    key_tests:
      - "Session name encodes role"
      - "Environment variables persist"
      - "capture-pane provides useful output"
      - "Works with remote tmux connections"

  proposal_6_generate:
    validation_approach: |
      If bootstrap-time plan generation is chosen, validation would:
      1. Run `agentic context bootstrap` with a plan folder
      2. Verify `agents/` subfolder is created
      3. Verify agent-specific plan file contains steps from process.yml
      4. Test that subagent can update its internal tasks via CLI
      5. Verify Audit Agent can find and validate the agent-specific plan
    key_tests:
      - "Bootstrap triggers file generation"
      - "Steps mapping is accurate"
      - "Agent can update internal tasks"
      - "Audit Agent correctly flags incomplete compliance"

# =============================================================================
# INVESTIGATION VALIDATION
# =============================================================================
# For the investigation itself, we validate by checking:

investigation_validation:
  all_questions_answered:
    check: "Each open_questions item has a documented answer"
    how: "Review plan_teach.yml and proposal findings"

  trade_offs_documented:
    check: "Each proposal has concrete trade-offs, not speculative"
    how: "Review potential_drawbacks are based on investigation, not assumptions"

  recommendation_justified:
    check: "Final recommendation has clear rationale"
    how: "Synthesis report explains why selected proposal(s) are recommended"

  quick_wins_identified:
    check: "Any immediate improvements are documented"
    how: "Synthesis report includes actionable quick wins"
