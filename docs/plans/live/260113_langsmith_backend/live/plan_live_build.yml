# Plan: AgenticLangSmith Backend Module
# Status: approved
# Created: 2026-01-13
# Summary: Scaffold AgenticLangSmith Python package with LangSmith service wrapper.

name: "langsmith-backend-module"
worktree_path: "/home/code/AgenticEngineering-agenticlangsmith"
branch: "agenticlangsmith"
plan_file: "docs/plans/live/260113_langsmith_backend/live/plan_live_build.yml"
status: "completed"
priority: "high"

context: |
  Create the AgenticLangSmith Python package as a reusable library for LangSmith API interaction.
  This module will be consumed by AgenticCLI and potentially other tools.

  The implementation will:
  - Scaffold a proper Python package with pyproject.toml (hatchling)
  - Implement LangSmithService class wrapping the official SDK
  - Provide filter utilities for query building
  - Be independently testable and installable

# ========================================
# PARALLEL EXECUTION CONTEXT
# ========================================
# This plan runs in the agenticlangsmith worktree and can execute
# in parallel with the CLI frontend plan in agentic-cli worktree.
#
# DEPENDENCY: The CLI frontend plan depends on this backend plan being complete
# before its Phase 1 (CLI Commands) can fully integrate.
# However, the CLI can start development with mocked service imports.
#
# Related plan: docs/plans/live/260113_langsmith_cli/live/plan_live_build.yml
parallel_context:
  sibling_plan: "/home/code/AgenticEngineering-agentic-cli/docs/plans/live/260113_langsmith_cli"
  provides: "agenticlangsmith package with LangSmithService class"
  integration_point: "CLI imports from agenticlangsmith.service"

# ========================================
# INPUTS
# ========================================
inputs:
  - location: "modules/AgenticCLI/pyproject.toml"
    description: "Reference for pyproject.toml structure and hatchling config"

# ========================================
# RESOLVED QUESTIONS
# ========================================
resolved_questions:
  - id: "QUESTION-001"
    question: "API key environment variable"
    answer: "Use standard LANGSMITH_API_KEY only"
    answered_by: "HUMAN"

dependencies:
  - package: "langsmith"
    version: ">=0.1.0"
    purpose: "Official LangSmith Python SDK"

# ========================================
# PHASES AND TASKS
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Package Scaffolding
  # ----------------------------------------
  - name: "Phase 1: Package Scaffolding"
    execution: sequential
    status: "completed"
    started_at: "2026-01-15T19:00:00Z"
    completed_at: "2026-01-15T19:05:00Z"
    agent_used: "build-python"
    description: "Create the AgenticLangSmith Python package structure"
    tasks:
      - id: "pkg_01"
        name: "Scaffold AgenticLangSmith Package"
        status: "completed"
        description: "Create package structure with pyproject.toml and src layout"
        target_files:
          - "modules/AgenticLangSmith/pyproject.toml"
          - "modules/AgenticLangSmith/src/agenticlangsmith/__init__.py"
        inputs:
          - modules/AgenticCLI/pyproject.toml
        guidance: |
          1. Create `modules/AgenticLangSmith/pyproject.toml`:
             - Name: "agenticlangsmith"
             - Build backend: hatchling
             - Dependencies: "langsmith>=0.1.0"
             - Python requires: ">=3.10"

          2. Create `modules/AgenticLangSmith/src/agenticlangsmith/__init__.py`:
             - Export LangSmithService, build_time_filter, etc.
             - Version: "0.1.0"

          3. Ensure the project is installable via pip install -e .
        acceptance_criteria:
          - "pyproject.toml exists and is valid"
          - "src/agenticlangsmith directory structure created"
          - "Package can be installed in editable mode"

  # ----------------------------------------
  # PHASE 2: Service Implementation
  # ----------------------------------------
  - name: "Phase 2: Service Implementation"
    execution: sequential
    status: "completed"
    started_at: "2026-01-15T19:05:00Z"
    completed_at: "2026-01-15T19:10:00Z"
    agent_used: "build-python"
    description: "Implement the core LangSmith service wrapper"
    tasks:
      - id: "backend_01"
        name: "Create LangSmith Service Module"
        status: "completed"
        description: "Implement LangSmithService class wrapping the SDK"
        target_file: "modules/AgenticLangSmith/src/agenticlangsmith/service.py"
        inputs:
          - modules/AgenticLangSmith/src/agenticlangsmith/__init__.py
        guidance: |
          Create: modules/AgenticLangSmith/src/agenticlangsmith/service.py

          Key components:
          - LangSmithService class wrapping langsmith.Client
          - Configuration from environment: LANGSMITH_API_KEY
          - Auto-detect LANGSMITH_ENDPOINT or use default

          Methods to implement:
          - __init__(api_key=None) - Init with key or from env
          - list_runs(project_name, limit, run_type, error_only) -> list[dict]
          - get_run(run_id) -> dict with full details
          - list_projects() -> list[dict]
          - get_project_stats(project_name) -> dict with aggregated stats
          - get_run_url(run_id) -> str shareable URL

          Error handling:
          - LangSmithConfigError: Missing API key
          - LangSmithAPIError: API call failures
        acceptance_criteria:
          - "LangSmithService class exists"
          - "Configuration reads from LANGSMITH_API_KEY"
          - "All methods implemented"
          - "Error handling with clear messages"

      - id: "backend_02"
        name: "Add Query Filter Builders"
        status: "completed"
        description: "Helper functions for building LangSmith filter expressions"
        target_file: "modules/AgenticLangSmith/src/agenticlangsmith/filters.py"
        inputs:
          - modules/AgenticLangSmith/src/agenticlangsmith/service.py
        guidance: |
          Create: modules/AgenticLangSmith/src/agenticlangsmith/filters.py

          Filter builders using LangSmith filter syntax:
          - build_time_filter(start: datetime, end: datetime) -> str
          - build_type_filter(run_type: str) -> str
          - build_error_filter(has_error: bool) -> str
          - build_tag_filter(tag: str) -> str
          - combine_filters(*filters) -> str (and() combinator)

          Reference LangSmith filter syntax:
          - eq(field, value), neq(), gt(), gte(), lt(), lte()
          - has(field, value) for tags/metadata
          - and(), or() for logical operators
        acceptance_criteria:
          - "Filter utilities implemented"
          - "Filters compose correctly with combine_filters"
          - "Docstrings explain filter syntax"

  # ----------------------------------------
  # PHASE 3: Testing (test-fix-loop)
  # ----------------------------------------
  - name: "Phase 3: Testing"
    execution: sequential
    status: "completed"
    started_at: "2026-01-15T19:10:00Z"
    completed_at: "2026-01-15T19:15:00Z"
    agent_used: "test-runner"
    description: "Unit tests for the AgenticLangSmith package"
    loop: "test-fix-loop"
    tasks:
      - id: "test_01"
        name: "Create Test Infrastructure"
        status: "completed"
        description: "Set up pytest configuration and fixtures"
        target_files:
          - "modules/AgenticLangSmith/tests/__init__.py"
          - "modules/AgenticLangSmith/tests/conftest.py"
          - "modules/AgenticLangSmith/pyproject.toml"
        guidance: |
          1. Add pytest to dev dependencies in pyproject.toml
          2. Create tests/__init__.py (empty)
          3. Create tests/conftest.py with fixtures:
             - mock_langsmith_client: Mocked langsmith.Client
             - sample_run_data: Example run response
             - sample_project_data: Example project response
        acceptance_criteria:
          - "pytest configured in pyproject.toml"
          - "conftest.py provides useful fixtures"

      - id: "test_02"
        name: "Unit Tests for Service"
        status: "completed"
        description: "Test LangSmithService class"
        target_file: "modules/AgenticLangSmith/tests/test_service.py"
        inputs:
          - modules/AgenticLangSmith/src/agenticlangsmith/service.py
          - modules/AgenticLangSmith/tests/conftest.py
        guidance: |
          Create: modules/AgenticLangSmith/tests/test_service.py

          Test cases:
          - test_service_init_with_api_key - Explicit key works
          - test_service_init_from_env - Reads from environment
          - test_service_raises_without_key - LangSmithConfigError
          - test_list_runs_returns_list - With mocked client
          - test_list_runs_with_filters - Filters passed to SDK
          - test_get_run_returns_details - Full run details
          - test_get_run_not_found - Handles 404 gracefully
          - test_list_projects - Returns project list
          - test_get_project_stats - Aggregates stats correctly

          Use unittest.mock to mock langsmith.Client.
        acceptance_criteria:
          - "Service tests pass with mocked SDK"
          - "Edge cases covered"
          - "Error paths tested"

      - id: "test_03"
        name: "Unit Tests for Filters"
        status: "completed"
        description: "Test filter builder functions"
        target_file: "modules/AgenticLangSmith/tests/test_filters.py"
        inputs:
          - modules/AgenticLangSmith/src/agenticlangsmith/filters.py
        guidance: |
          Create: modules/AgenticLangSmith/tests/test_filters.py

          Test cases:
          - test_build_time_filter_format
          - test_build_type_filter
          - test_build_error_filter_true
          - test_build_error_filter_false
          - test_combine_filters_single
          - test_combine_filters_multiple
        acceptance_criteria:
          - "Filter tests validate output format"
          - "Edge cases handled"

      - id: "test_04"
        name: "Run Test Suite"
        status: "completed"
        description: "Execute full test suite and fix any failures"
        guidance: |
          Run from worktree root:
          cd /home/code/AgenticEngineering-agenticlangsmith/modules/AgenticLangSmith
          pip install -e ".[dev]"
          pytest tests/ -v

          If tests fail, iterate until all pass.
        acceptance_criteria:
          - "pytest runs without errors"
          - "All tests pass"

success_criteria:
  - "AgenticLangSmith package is installable"
  - "LangSmithService class wraps SDK correctly"
  - "Filter utilities build valid LangSmith queries"
  - "All unit tests pass"
  - "Package exports are clean and documented"
