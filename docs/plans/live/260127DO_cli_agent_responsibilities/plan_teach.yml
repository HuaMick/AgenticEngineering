_template_status: active
plan:
  name: Document CLI vs Agent Responsibilities
  worktree: /home/code/AgenticEngineering
  branch: cli-agent-docs
  status: planning
  created: '2026-01-27'
  objective: 'Update guidance and README files to document the architectural distinction
    between:

    - CLI: Programmable, deterministic, dumb tool. No decision making or thinking.

    - Agent: Tactical decision making and thinking. Handles ambiguity and novel situations.

    - Pattern: When something becomes established, offload deterministic parts to
    CLI.


    Ensure planners know how to find and update README files and understand when to

    add CLI commands vs agent logic.

    '
  scope:
    includes:
    - modules/AgenticCLI/README.md
    - modules/AgenticGuidance/README.md
    - modules/AgenticGuidance/assets/definitions/
    - modules/AgenticGuidance/assets/guidelines/
    - modules/AgenticGuidance/agents/planner/
    excludes:
    - modules/AgenticBackend/
    - modules/AgenticFrontend/
  inputs:
  - location: modules/AgenticCLI/README.md
    description: Current CLI README - needs CLI vs Agent architecture section
  - location: modules/AgenticGuidance/README.md
    description: Current AgenticGuidance README - needs Agent responsibility documentation
  - location: modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
    description: Existing tool-offloading guideline - reference for CLI offloading
      patterns
  - location: modules/AgenticGuidance/assets/definitions/cli-commands.yml
    description: CLI commands definition - reference for deterministic operations
  - location: modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
    description: Planner-guidance inputs - update to include README discovery guidance
  phases:
  - name: Phase 1 - Module README Updates
    id: phase_01
    status: pending
    description: Update README.md files in AgenticCLI and AgenticGuidance to document
      CLI vs Agent responsibilities
    tasks:
    - id: AG_001
      name: Add CLI Architecture Section to AgenticCLI README
      description: "Add a dedicated section to modules/AgenticCLI/README.md documenting:\n\
        - CLI responsibility boundary (deterministic executor, no decisions)\n- When\
        \ to add new CLI commands (established patterns, mechanical operations)\n\
        - The handoff pattern (ambiguity \u2192 agent \u2192 established \u2192 CLI)\n"
      status: completed
      inputs:
      - modules/AgenticCLI/README.md
      - modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
      target_files:
      - modules/AgenticCLI/README.md
      guidance: "Add a new section \"## CLI vs Agent Architecture\" after the Principles\
        \ section.\nInclude:\n- Clear statement: \"CLI is a deterministic executor\
        \ - no decision making\"\n- Boundary definition: Operations with predictable,\
        \ rule-based outcomes\n- Example: \"Folder naming \u2192 CLI enforces, Agent\
        \ decides when to create\"\n- Pattern evolution: Novel \u2192 Agent handles\
        \ \u2192 Becomes established \u2192 Offload to CLI\n"
    - id: AG_002
      name: Add Agent Responsibilities Section to AgenticGuidance README
      description: 'Add a dedicated section to modules/AgenticGuidance/README.md documenting:

        - Agent responsibility boundary (thinking, decisions, ambiguity handling)

        - When agents should NOT be used (deterministic operations)

        - How agents discover what to do (guidance layer purpose)

        '
      status: completed
      inputs:
      - modules/AgenticGuidance/README.md
      - modules/AgenticGuidance/assets/definitions/agent-categories.yml
      target_files:
      - modules/AgenticGuidance/README.md
      guidance: 'Add a new section "## Agent Responsibilities" after the Module Structure
        section.

        Include:

        - Clear statement: "Agents handle judgment, interpretation, and novel situations"

        - Boundary definition: Operations requiring context-sensitivity or creativity

        - Guidance layer purpose: Provides paths, fences, signposts for agent behavior

        - Example of agent-appropriate tasks: Code review, error diagnosis, requirement
        interpretation

        '
  - name: Phase 2 - Architecture Definition
    id: phase_02
    status: pending
    description: Create a shared definition file for CLI vs Agent architecture pattern
    tasks:
    - id: AG_003
      name: Create cli-agent-architecture.yml Definition
      description: 'Create a new definition file that formalizes the CLI vs Agent
        architecture:

        - CLI responsibility boundary

        - Agent responsibility boundary

        - The handoff pattern

        - Decision criteria for new functionality

        '
      status: completed
      inputs:
      - modules/AgenticGuidance/assets/guidelines/tool-offloading.yml
      - modules/AgenticGuidance/assets/definitions/role-separation.yml
      target_files:
      - modules/AgenticGuidance/assets/definitions/cli-agent-architecture.yml
      guidance: 'Create new file: modules/AgenticGuidance/assets/definitions/cli-agent-architecture.yml


        Structure:

        - cli_responsibility: Definition of CLI as deterministic executor

        - agent_responsibility: Definition of Agent as thinking decision-maker

        - handoff_pattern: When and how to transition from Agent to CLI

        - decision_criteria: Checklist for "is this CLI or Agent work?"

        - examples: Concrete examples of each boundary


        Reference existing tool-offloading.yml for consistency.

        '
  - name: Phase 3 - Planner Guidance Updates
    id: phase_03
    status: pending
    description: Update planner agents to include README discovery and CLI vs Agent
      decision guidance
    tasks:
    - id: AG_004
      name: Add README Discovery to Planner Shared Inputs
      description: 'Update planner shared inputs to include guidance on:

        - Finding relevant README files for scope

        - Including README updates in planning

        - Checking module READMEs for implementation status

        '
      status: completed
      inputs:
      - modules/AgenticGuidance/assets/inputs/planner-shared.yml
      - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
      target_files:
      - modules/AgenticGuidance/assets/inputs/planner-shared.yml
      guidance: 'Add to planner-shared.yml:

        - Reference to README discovery pattern

        - Signpost: "Check module README.md for implementation status before planning"

        - Pattern for including README updates in plan scope

        '
    - id: AG_005
      name: Add CLI vs Agent Decision Guidance to Planner-Build
      description: 'Update planner-build process to include decision criteria for:

        - When to add new CLI commands

        - When to keep functionality in agent logic

        - How to recognize patterns ready for CLI offloading

        '
      status: completed
      inputs:
      - modules/AgenticGuidance/agents/planner/planner-build/process.yml
      - modules/AgenticGuidance/assets/definitions/cli-agent-architecture.yml
      target_files:
      - modules/AgenticGuidance/agents/planner/planner-build/process.yml
      guidance: 'Add to planner-build/process.yml steps:

        - Step to evaluate if new functionality should be CLI or Agent

        - Reference to cli-agent-architecture.yml for decision criteria

        - Checkpoint: "For mechanical operations, consider CLI command first"

        '
  - name: Phase 4 - Audit Guidance for CLI Usage
    id: phase_04
    status: pending
    description: Audit guidance files to ensure they reference CLI commands instead
      of manual file reading
    tasks:
    - id: AG_008
      name: Audit agent process files for manual file references
      description: 'Search all agent process.yml and inputs.yml files for patterns
        that

        should use CLI commands instead of manual file reading:


        Patterns to find and replace:

        - "Read:" or "Load:" followed by file paths -> agentic entrypoint execute
        --compile

        - "modules/AgenticGuidance/..." references -> CLI command equivalents

        - Instructions to manually parse YAML -> CLI JSON output


        Files to audit:

        - modules/AgenticGuidance/agents/**/process.yml

        - modules/AgenticGuidance/agents/**/inputs.yml

        '
      status: completed
      target_files:
      - modules/AgenticGuidance/agents/
      guidance: 'Use grep to find patterns:

        - grep -r "Read:" modules/AgenticGuidance/agents/

        - grep -r "Load:" modules/AgenticGuidance/agents/


        For each match, determine if CLI command exists and update reference.

        '
    - id: AG_009
      name: Add CLI-first principle to orchestration guidance
      description: 'Update orchestration agent guidance to emphasize CLI-first approach:

        - Agents should use CLI for context instead of file exploration

        - Document which CLI commands replace which file reads

        - Add signpost: "Use CLI commands for initial context, not Read tools"

        '
      status: completed
      target_files:
      - modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml
      - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
      guidance: "Add guidance principle:\n\"CLI-First Context: Always use agentic\
        \ CLI commands for initial context.\n Agents should not need Read/Glob/Grep\
        \ tools during bootstrap phase.\"\n"
    - id: AG_010
      name: Update cli-commands.yml with context compilation reference
      description: 'Ensure cli-commands.yml documents the --compile flag once implemented.

        Add clear documentation showing how CLI replaces manual file reading.

        '
      status: completed
      target_files:
      - modules/AgenticGuidance/assets/definitions/cli-commands.yml
  - name: Phase 5 - Self-Review Validation
    id: phase_05
    status: pending
    description: Validate documentation is clear and consistent across all updated
      files
    tasks:
    - id: AG_006
      name: Validate README Documentation Clarity
      description: 'Review both updated README files to ensure:

        - CLI vs Agent distinction is clear to new readers

        - Examples are concrete and actionable

        - Language is consistent between modules

        - Cross-references work correctly

        '
      status: completed
      inputs:
      - modules/AgenticCLI/README.md
      - modules/AgenticGuidance/README.md
      - modules/AgenticGuidance/assets/definitions/cli-agent-architecture.yml
      target_files: []
      guidance: 'Checklist:

        - [ ] Can a new user understand CLI vs Agent boundary from README alone?

        - [ ] Are the principles stated in both READMEs consistent?

        - [ ] Do the examples clearly illustrate the boundary?

        - [ ] Are cross-references between modules working?

        - [ ] Is the handoff pattern clearly explained?

        '
    - id: AG_007
      name: Validate Planner Guidance Integration
      description: 'Review planner guidance updates to ensure:

        - README discovery guidance is actionable

        - CLI vs Agent decision criteria is referenced appropriately

        - New definitions are linked from planner inputs

        '
      status: completed
      inputs:
      - modules/AgenticGuidance/assets/inputs/planner-shared.yml
      - modules/AgenticGuidance/agents/planner/planner-build/process.yml
      target_files: []
      guidance: 'Checklist:

        - [ ] Does planner-shared reference README discovery pattern?

        - [ ] Does planner-build include CLI vs Agent decision step?

        - [ ] Are new definitions referenced from appropriate inputs.yml files?

        - [ ] Is the guidance actionable (not just theoretical)?

        '
  loop_structures:
  - id: loop_self_review
    type: guidance-self-review-loop
    applies_to_phase: Phase 4 - Self-Review Validation
    trigger: After all documentation tasks complete
    description: 'Self-review loop to validate documentation quality.

      Agent reviews created/updated files against clarity checklist.

      '
    exit_criteria:
      success: All checklist items pass
      max_iterations: 3
      escalation: Escalate unclear sections to human for refinement
    participants:
    - agent: reviewer
      role: Reviews documentation against clarity criteria
  success_criteria:
  - AgenticCLI README documents CLI as deterministic executor (no decisions)
  - AgenticGuidance README documents Agent responsibility boundary
  - New cli-agent-architecture.yml definition exists with clear boundaries
  - Planner guidance includes README discovery and CLI vs Agent decision criteria
  - Self-review validates documentation is clear to new readers
