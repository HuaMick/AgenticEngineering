# Audit and Cleanup Plan
# Created: 2026-01-19
# Purpose: Post-implementation audit and cleanup tasks

plan:
  name: "Audit and Cleanup: Guidance Entrypoint Remediation"
  worktree: "260119AG_guidance_entrypoint_remediation"
  branch: "agenticguidance"
  status: pending

  description: |
    Post-implementation audit and cleanup phase for the Main-First Planning
    guidance remediation. Validates all changes are consistent and removes
    any temporary artifacts.

  phases:
    - id: "phase_audit"
      name: "Final Audit"
      status: "pending"
      tasks:
        - id: "audit_final_001"
          description: "Audit all modified files for consistency with Main-First Planning policy"
          status: "pending"
          inputs:
            - modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml
            - modules/AgenticGuidance/assets/definitions/plans.yml
            - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
            - modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
          success_criteria:
            - "All four target files contain consistent Main-First references"
            - "No contradictory guidance found"
            - "Cross-references between files are valid"

        - id: "audit_final_002"
          description: "Verify no orphaned or conflicting guidance exists in related files"
          status: "pending"
          inputs:
            - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
            - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
          success_criteria:
            - "Planner agents reference updated guidance correctly"
            - "No stale worktree-local planning references remain"

    - id: "phase_cleanup"
      name: "Cleanup"
      status: "pending"
      tasks:
        - id: "cleanup_001"
          description: "Move completed analysis files to analysis/ subfolder"
          status: "pending"
          inputs:
            - docs/plans/live/260119AG_guidance_entrypoint_remediation/
          success_criteria:
            - "Friction analysis and review files archived in analysis/"
            - "live/ contains only active plan files"

        - id: "cleanup_002"
          description: "Update README.md with completion status and summary"
          status: "pending"
          inputs:
            - docs/plans/live/260119AG_guidance_entrypoint_remediation/README.md
          success_criteria:
            - "README reflects completed phases"
            - "Key decisions documented"
            - "Next steps section updated"

  cleanup_targets:
    - location: "analysis/"
      items_to_move:
        - "review_*.yml files"
        - "friction-analysis.md"
