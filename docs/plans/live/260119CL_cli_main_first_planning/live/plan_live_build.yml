  Modify the `agentic plan init` CLI command to ALWAYS create plan folders in
  the main worktree, regardless of where the command is run. This is the
  single happy path for Main-First Planning.

  NO FLAGS NEEDED - just change the default behavior.

# ========================================
# CONTEXT
# ========================================
