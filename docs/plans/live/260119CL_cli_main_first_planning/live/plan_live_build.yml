  Current behavior (plan.py lines 128, 192-193):
  - Creates plan at `worktree_path / "docs" / "plans" / "live" / plan_folder_name`
  - Result: Plans created in the FEATURE worktree

  Required change:
  - ALWAYS detect the main worktree
  - ALWAYS create plan folder in main worktree's docs/plans/live/
  - Feature worktree still used for execution
  - No flags or options - single happy path

