  - location: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
    description: "Main file to modify - contains cmd_init() function"

# ========================================
# PHASES
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Implement Main Worktree Detection
  # ----------------------------------------
  - name: "Implement Main Worktree Detection"
    id: "phase_01"
    execution: sequential
    description: "Add helper function to find the main worktree path"
    status: "pending"

    tasks:
      - id: "01.1"
        name: "Add find_main_worktree() helper function"
        description: "Create function to detect main worktree from git worktree list"
        status: "pending"
        agent_type: "build"
        inputs:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        guidance: |
          Add a new helper function near the top of plan.py (after find_plan_folder):

          def find_main_worktree(repo_root: Path) -> Path | None:
              """Find the main worktree path (branch main or master).

              Args:
                  repo_root: Path to any worktree in the repository.

              Returns:
                  Path to main worktree, or None if not found.
              """
              import subprocess

              try:
                  result = subprocess.run(
                      ["git", "worktree", "list", "--porcelain"],
                      capture_output=True,
                      text=True,
                      check=True,
                      cwd=repo_root,
                  )
                  lines = result.stdout.strip().split("\n")
                  i = 0
                  while i < len(lines):
                      if lines[i].startswith("worktree "):
                          wt_path = lines[i].split(" ", 1)[1]
                          for j in range(i + 1, min(i + 5, len(lines))):
                              if lines[j].startswith("branch "):
                                  wt_branch = lines[j].split(" ", 1)[1].replace("refs/heads/", "")
                                  if wt_branch in ("main", "master"):
                                      return Path(wt_path)
                                  break
                              elif lines[j].startswith("worktree "):
                                  break
                      i += 1
              except subprocess.CalledProcessError:
                  pass
              return None
        success_criteria:
          - "Function returns Path to main worktree when found"
          - "Function returns None when main worktree not found"
          - "Function handles both 'main' and 'master' branch names"

    success_criteria:
      - "find_main_worktree() function exists"
      - "Function correctly identifies main worktree from git output"

