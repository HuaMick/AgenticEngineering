# AgenticGuidance Agent Loop Implementation Plan
# Plan ID: 260127AG (Build Phase)
# Created: 2026-01-27
# Module: AgenticGuidance (context injection, session management)
#
# This build plan implements the resolution for the Ralph Loop compliance
# investigation (plan_live_teach.yml). Solution: proper Geoffrey Huntley
# Ralph Loop with fresh context per iteration.

# ========================================
# ROOT-LEVEL PLAN METADATA
# ========================================
name: "agenticguidance-agent-loop"
worktree_path: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"
status: "in_progress"
priority: "high"

# ========================================
# CONTEXT
# ========================================
context: |
  This plan implements CLI commands and services for:
  1. MMD generation from plan YAML files
  2. Agent Loop orchestration (Geoffrey Huntley Ralph Loop pattern)

  Key architectural decision: Each iteration gets FRESH context.
  State persists via files (plan YAML, git history), not session memory.
  This prevents context rot and forces proper state externalization.

  Similar pattern to existing CCI (Context Injection) services in AgenticGuidance.

  Reference: /home/mick/.claude/plans/glittery-juggling-harbor.md

# ========================================
# RELATED PLANS
# ========================================
related_plans:
  investigation: "plan_live_teach.yml"  # Root cause investigation
  orchestration: "orchestration_agent_loop.mmd"  # Execution flowchart

# ========================================
# INPUTS
# ========================================
inputs:
  - location: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
    description: "MMD schema specification for generation"

  - location: "modules/AgenticGuidance/src/agenticguidance/services/"
    description: "Existing service patterns (CCI bootstrap, session)"

  - location: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
    description: "Existing plan command patterns"

  - location: "modules/AgenticCLI/src/agenticcli/cli.py"
    description: "CLI parser registration patterns"

# ========================================
# OPEN QUESTIONS
# ========================================
open_questions:
  - id: "AG-Q-001"
    question: "Should completion detection use exact string match or regex pattern?"
    severity: "medium"
    status: "OPEN"
    context: |
      Anthropic's plugin uses exact string matching for completion_promise.
      Regex would be more flexible but potentially error-prone.
    options:
      - "Exact string match (simpler, predictable)"
      - "Regex pattern (flexible, complex)"

  - id: "AG-Q-002"
    question: "Should loop state be stored in plan folder or global config?"
    severity: "low"
    status: "ANSWERED"
    answer: "Store in plan folder (.loop/ subdirectory)"
    answered_by: "PLAN"
    context: "Plan folder storage keeps state co-located with the work being managed."

# ========================================
# LOOP STRUCTURES
# ========================================
loop_structures:
  - id: "loop_build_validation"
    type: "test-fix-loop"
    applies_to_phase: "Phase 5: Testing"
    trigger: "After service implementation"
    exit_criteria:
      success: "All unit tests pass AND CLI commands functional"
      max_iterations: 5
      escalation: "Escalate to user with test results"
    participants:
      - agent: "test-builder"
        role: "Creates and runs tests"
      - agent: "builder"
        role: "Fixes implementation issues"

  - id: "loop_audit_validation"
    type: "audit-test-fix-loop"
    applies_to_phase: "Phase 5: Testing"
    trigger: "After initial testing completes"
    exit_criteria:
      success: "Audit passes AND all tests still pass after audit corrections"
      max_iterations: 3
      escalation: "BLOCK completion - audit failures must be resolved"
    participants:
      - agent: "test-audit"
        role: "Audits test quality and detects reward hacking"
      - agent: "test-builder"
        role: "Fixes audit-identified test issues"
    mandatory: true

# ========================================
# PHASES AND TASKS
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: MMD Generator Service
  # ----------------------------------------
  - name: "Phase 1: MMD Generator"
    execution: sequential
    description: "Implement MMDGeneratorService in AgenticGuidance"
    tasks:
      - id: "AG-RL-001"
        name: "Create MMDGeneratorService base structure"
        description: |
          Create modules/AgenticGuidance/src/agenticguidance/services/mmd_generator.py
          - MMDGenerationResult dataclass (success, message, output_path)
          - PlanMetadata dataclass (goal, profile, phases, agent_routing, status)
          - MMDGeneratorService class with __init__(plan_path: Path)
          - _load_plan_files() method to read plan_live_*.yml files
        status: "completed"
        agent_type: "builder"
        files:
          - "modules/AgenticGuidance/src/agenticguidance/services/mmd_generator.py"

      - id: "AG-RL-002"
        name: "Implement plan metadata extraction"
        description: |
          Add _extract_metadata() method
          - Parse YAML to extract: plan name, objective, phases, tasks
          - Derive agent routing from task.agent_type fields
          - Calculate status from phase/task statuses
        status: "completed"
        agent_type: "builder"
        depends_on: ["AG-RL-001"]

      - id: "AG-RL-003"
        name: "Implement MMD template generation"
        description: |
          Create MMD header template with schema comments
          - Generate flowchart nodes from phases
          - Generate subgraph blocks for phase details
          - Generate edge connections between phases
          - Include feedback triggers from plan config
          Reference: modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml
        status: "completed"
        agent_type: "builder"
        depends_on: ["AG-RL-002"]

      - id: "AG-RL-004"
        name: "Add MMD file writing with conflict detection"
        description: |
          Implement generate(output_path: Optional[Path] = None) -> MMDGenerationResult
          - Check for existing MMD file (require --force to overwrite)
          - Write generated content to file
          - Return result with success/failure status
        status: "completed"
        agent_type: "builder"
        depends_on: ["AG-RL-003"]

  # ----------------------------------------
  # PHASE 2: CLI Integration for MMD
  # ----------------------------------------
  - name: "Phase 2: MMD CLI Commands"
    execution: sequential
    description: "Add plan generate-mmd and validate --require-mmd commands"
    tasks:
      - id: "AG-RL-005"
        name: "Add generate-mmd parser to cli.py"
        description: |
          Add generate_mmd_parser to _add_plan_parser() function
          Arguments: path, --output, --force
        status: "completed"
        agent_type: "builder"
        depends_on: ["AG-RL-004"]
        files:
          - "modules/AgenticCLI/src/agenticcli/cli.py"

      - id: "AG-RL-006"
        name: "Implement cmd_generate_mmd() command handler"
        description: |
          In modules/AgenticCLI/src/agenticcli/commands/plan.py:
          - Import MMDGeneratorService from agenticguidance.services
          - Create service instance with plan path
          - Call generate() method
          - Handle JSON/console output appropriately
          - Add to handle() routing
        status: "completed"
        agent_type: "builder"
        depends_on: ["AG-RL-005"]
        files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"

      - id: "AG-RL-007"
        name: "Extend validate command for --require-mmd"
        description: |
          Add --require-mmd argument to validate parser
          In cmd_validate(), check for MMD file existence
          Add to errors if MMD required but missing
        status: "completed"
        agent_type: "builder"
        depends_on: ["AG-RL-006"]

      - id: "AG-RL-008"
        name: "Add MMDError exception class"
        description: |
          Create MMDError class in exceptions.py (exit code 71)
          Factory methods: not_found(), invalid_plan(), generation_failed()
        status: "completed"
        agent_type: "builder"
        files:
          - "modules/AgenticCLI/src/agenticcli/exceptions.py"

  # ----------------------------------------
  # PHASE 3: Agent Loop Service
  # ----------------------------------------
  - name: "Phase 3: Agent Loop Service"
    execution: sequential
    description: "Implement AgentLoopService for Geoffrey Huntley Ralph Loop"
    tasks:
      - id: "AG-RL-009"
        name: "Create AgentLoopService base structure"
        description: |
          Create modules/AgenticGuidance/src/agenticguidance/services/agent_loop.py
          - AgentLoopConfig dataclass (max_iterations, completion_promise, timeout)
          - AgentLoopState dataclass (active, iteration, started_at, costs, plan_folder)
          - LoopIterationResult dataclass (success, output, cost, duration)
          - AgentLoopService class with __init__(config: AgentLoopConfig)
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-008"]
        files:
          - "modules/AgenticGuidance/src/agenticguidance/services/agent_loop.py"

      - id: "AG-RL-010"
        name: "Implement state persistence"
        description: |
          Store state in <plan_folder>/.loop/status.json
          - _load_state() and _save_state() methods
          - Use existing FileLock pattern from state.py
          - Track: iteration, started_at, total_cost, session history
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-009"]

      - id: "AG-RL-011"
        name: "Implement claude -p subprocess execution"
        description: |
          run_iteration(prompt_file: Path) -> LoopIterationResult
          - Read prompt from .loop/PROMPT.md
          - Execute: claude -p "$(cat PROMPT.md)" --output-format json
          - Parse JSON response for result, cost, session_id
          - NO --resume flag (fresh context each iteration)
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-010"]

      - id: "AG-RL-012"
        name: "Implement completion detection"
        description: |
          check_completion(output: str) -> bool
          - Scan for completion_promise string in output
          - Support <promise>TEXT</promise> wrapper format
          - Return True only if promise found AND iteration successful
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-011"]

      - id: "AG-RL-013"
        name: "Implement loop orchestration"
        description: |
          start_loop(plan_folder: Path) -> AgentLoopState
          stop_loop() -> AgentLoopState
          - Main loop: run iterations until completion or max_iterations
          - Track costs across iterations
          - Handle interrupts gracefully
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-012"]

      - id: "AG-RL-014"
        name: "Add AgentLoopError exception class"
        description: |
          Create AgentLoopError class in exceptions.py (exit code 70)
          Factory methods: already_running(), not_running(), max_iterations_reached()
        status: "pending"
        agent_type: "builder"
        files:
          - "modules/AgenticCLI/src/agenticcli/exceptions.py"

  # ----------------------------------------
  # PHASE 4: Agent Loop CLI Commands
  # ----------------------------------------
  - name: "Phase 4: Agent Loop CLI"
    execution: sequential
    description: "Add agentic loop command group"
    tasks:
      - id: "AG-RL-015"
        name: "Add loop parser to cli.py"
        description: |
          Add _add_loop_parser() function
          Create subparsers: init, start, status, stop, run-once
          Add to GLOBAL_COMMANDS set
          Add routing in run_cli()
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-014"]
        files:
          - "modules/AgenticCLI/src/agenticcli/cli.py"

      - id: "AG-RL-016"
        name: "Create loop.py command module"
        description: |
          Create modules/AgenticCLI/src/agenticcli/commands/loop.py
          - handle(args, ctx) function with subcommand routing
          - Import console utilities and exceptions
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-015"]
        files:
          - "modules/AgenticCLI/src/agenticcli/commands/loop.py"

      - id: "AG-RL-017"
        name: "Implement cmd_init()"
        description: |
          Initialize .loop/ folder in plan folder
          Create PROMPT.md template with orchestration instructions placeholder
          Create status.json with initial state
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-016"]

      - id: "AG-RL-018"
        name: "Implement cmd_start() and cmd_stop()"
        description: |
          cmd_start(): Initialize loop state, begin iteration cycle
          cmd_stop(): Set stop flag, wait for current iteration to complete
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-017"]

      - id: "AG-RL-019"
        name: "Implement cmd_status()"
        description: |
          Show current loop state: iteration, cost, completion state
          JSON output support
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-018"]

      - id: "AG-RL-020"
        name: "Implement cmd_run_once()"
        description: |
          Run single iteration for testing
          Useful for debugging prompt and completion detection
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-019"]

  # ----------------------------------------
  # PHASE 5: Testing
  # ----------------------------------------
  - name: "Phase 5: Testing"
    execution: sequential
    description: "Unit and integration tests"
    loop: "loop_build_validation"
    tasks:
      - id: "AG-RL-021"
        name: "MMD Generator service tests"
        description: |
          Create modules/AgenticGuidance/tests/test_services_mmd_generator.py
          Tests:
          - test_load_plan_files
          - test_extract_metadata
          - test_generate_mmd_content
          - test_generate_creates_file
          - test_generate_requires_force_for_overwrite
        status: "pending"
        agent_type: "test-builder"
        depends_on: ["AG-RL-004"]
        files:
          - "modules/AgenticGuidance/tests/test_services_mmd_generator.py"

      - id: "AG-RL-022"
        name: "Agent Loop service tests"
        description: |
          Create modules/AgenticGuidance/tests/test_services_agent_loop.py
          Tests:
          - test_start_creates_state
          - test_increment_iteration
          - test_stop_preserves_state
          - test_completion_detection
          - test_max_iterations_enforcement
        status: "pending"
        agent_type: "test-builder"
        depends_on: ["AG-RL-013"]
        files:
          - "modules/AgenticGuidance/tests/test_services_agent_loop.py"

      - id: "AG-RL-023"
        name: "CLI command tests"
        description: |
          Create modules/AgenticCLI/tests/test_commands_loop.py
          Tests:
          - test_init_command
          - test_start_command
          - test_status_command
          - test_stop_command
          - test_run_once_command
          - test_json_output
        status: "pending"
        agent_type: "test-builder"
        depends_on: ["AG-RL-020"]
        files:
          - "modules/AgenticCLI/tests/test_commands_loop.py"

  # ----------------------------------------
  # PHASE 6: Service Exports
  # ----------------------------------------
  - name: "Phase 6: Service Exports"
    execution: sequential
    description: "Export new services and finalize"
    tasks:
      - id: "AG-RL-024"
        name: "Update services __init__.py"
        description: |
          Export MMDGeneratorService, MMDGenerationResult, PlanMetadata
          Export AgentLoopService, AgentLoopState, AgentLoopConfig
          Update __all__ list
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-023"]
        files:
          - "modules/AgenticGuidance/src/agenticguidance/services/__init__.py"

      - id: "AG-RL-025"
        name: "Update CLI help text"
        description: |
          Add loop to CLI epilog examples
          Add generate-mmd to plan command examples
          Ensure --help output is comprehensive
        status: "pending"
        agent_type: "builder"
        depends_on: ["AG-RL-024"]

      - id: "AG-RL-026"
        name: "Integration verification"
        description: |
          Run full verification:
          - agentic plan generate-mmd <test-folder>
          - agentic plan validate <test-folder> --require-mmd
          - agentic loop init --plan-folder <test-folder>
          - agentic loop run-once --plan-folder <test-folder>
        status: "pending"
        agent_type: "test-builder"
        depends_on: ["AG-RL-025"]

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - "agentic plan generate-mmd produces valid MMD from plan YAML"
  - "agentic plan validate --require-mmd fails if no MMD in live/"
  - "agentic loop init creates .loop/ folder with PROMPT.md template"
  - "agentic loop run-once executes single iteration with fresh context"
  - "agentic loop start runs until completion promise or max iterations"
  - "All unit tests pass"
  - "JSON output works for all commands"
