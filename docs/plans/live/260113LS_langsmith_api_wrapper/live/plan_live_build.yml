  Integrate LangSmith API into AgenticCLI to allow agents to query their own traces.
  This enables agent self-reflection, debugging, and usage analytics.

  The implementation will:
  - Add a new `agentic langsmith` command group
  - Create a backend service module for LangSmith API interaction
  - Use the official langsmith Python SDK
  - Support querying runs, projects, and feedback

