          Add question-workflow.yml reference to test-builder inputs.
          Test builders need this when test expected behavior is ambiguous.
        success_criteria:
          - question-workflow.yml reference added to inputs

      - id: "test_002"
        name: "Update test-builder process.yml"
        description: "Add question generation to test-builder process when expectations unclear"
        agent: "teacher-update-guidance"
        status: "pending"
        depends_on: ["test_001"]
        inputs:
          - modules/AgenticGuidance/agents/test/test-builder/process.yml
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
        target_files:
          - modules/AgenticGuidance/agents/test/test-builder/process.yml
        guidance: |
          Add step for generating questions when test expectations are unclear:

          ```yaml
          steps:
            # ... existing test building steps ...

            - |
              QUESTION GENERATION FOR UNCLEAR EXPECTATIONS:
              When implementing tests, if expected behavior is ambiguous, generate a question.

              Common scenarios:
              1. Error handling: What error code/message should be returned?
              2. Edge cases: How should system behave at boundary conditions?
              3. User flows: Which path should user take in scenario X?
              4. Data validation: What are exact validation rules and limits?

              Process:
              1. Attempt to infer from existing code patterns
              2. Check documentation and related tests
              3. If still ambiguous AND test is critical:
                 - Generate question YAML in questions/pending/
                 - Include attempted solutions and why they're insufficient
                 - Mark test task as blocked_on question ID

              Example question:
              ```yaml
              id: "QUESTION-TEST-002"
              question: "What error should be returned when user uploads invalid file format?"
              severity: "medium"
              task_id: "test_002"
              module: "tests/test_file_upload.py"
              context: |
                Writing test for invalid file upload scenario.
                Existing code returns generic 400 Bad Request.
                Need to know:
                - Should we return specific error code (e.g., 415 Unsupported Media Type)?
                - Should error message list supported formats?
                - Should we log the attempt?

                Pattern from other validation: Returns 400 with message.
                But file format seems different enough to warrant confirmation.
              attempted_solutions:
                - "Checked test_validation.py - uses generic 400"
                - "Checked API spec - doesn't specify file upload errors"
              ```

              After answer received:
              - Implement test with specified behavior
              - Update test documentation with clarification
          ```
        success_criteria:
          - Question generation step added
          - Common scenarios are listed
          - Example shows complete question YAML
          - Process explains when to question vs. infer

