# ========================================
# OBJECTIVE
# ========================================
objective: |
  Update agent guidance documents (inputs.yml, process.yml) to teach agents the question workflow.
  Create comprehensive examples and templates for question generation and resumption patterns.

  Target agent categories:
  - Orchestration agents (detect decision points requiring human input)
  - Planner agents (populate open_questions in plan YAML via CLI)
  - Builder agents (ask questions when blocked on implementation decisions)
  - Tester agents (ask questions about expected behavior)

  Agents will learn to:
  1. Identify when to ask questions vs. make autonomous decisions
  2. Generate well-formed YAML questions with appropriate severity
  3. Include sufficient context for human understanding
  4. Check for answers before escalating
  5. Resume work after receiving clarification

# ========================================
# LOOP STRUCTURES
# ========================================
loop_structures:
  - id: "loop_guidance_validation"
    type: "guidance-self-review-loop"
    applies_to_phase: "Validation Phase"
    trigger: "After all guidance updates complete"
    description: |
      Agents review updated guidance files for correctness and completeness.
      Validates that question workflow patterns are clear and actionable.
    exit_criteria:
      success: "All checklist items pass AND spot-check validation passes"
      max_iterations: 3
      escalation: "Escalate to human reviewer with specific gaps identified"
    participants:
      - agent: "planner-reviewer"
        role: "Self-reviews guidance against requirements"
      - agent: "teacher-update-guidance"
        role: "Validates example completeness and clarity"

# ========================================
# PHASES AND TASKS
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Create Shared Guideline Asset
  # ----------------------------------------
  - name: "Guideline Asset Creation"
    execution: sequential
    description: "Create question-workflow.yml guideline asset with complete workflow patterns"
    tasks:
      - id: "guide_001"
        name: "Create question-workflow.yml guideline"
        description: "Create comprehensive guideline for question generation and resumption workflow"
        agent: "teacher-update-assets"
        status: "pending"
        inputs:
          - modules/AgenticGuidance/assets/guidelines/escalation.yml
          - modules/AgenticGuidance/assets/guidelines/iteration.yml
          - docs/plans/live/260203QF_question_foundation/README.md
          - docs/plans/live/260203QC_question_cli/README.md
        target_files:
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
        guidance: |
          Create a new guideline file that teaches the complete question workflow pattern.

          Required sections:

          1. When to Ask Questions:
             - Blockers that require human judgment (architecture decisions, business logic, priorities)
             - Missing critical information that cannot be inferred
             - Conflicting requirements or constraints
             - High-risk decisions with significant impact

          2. When NOT to Ask Questions (Autonomous Decision-Making):
             - Technical implementation details (naming, file organization)
             - Standard patterns with documented precedent
             - Low-risk choices that can be validated in review
             - Questions answerable from existing docs/code

          3. Question Generation Format:
             - YAML structure: id, question, severity, status, context, task_id, module
             - Severity levels: high (blocking), medium (important), low (clarification)
             - Context requirements: task context, attempted solutions, why it's blocking

          4. File Storage Pattern:
             - Location: docs/plans/live/{plan_id}/questions/pending/{question_id}.yml
             - Filename: YYMMDD_HH_brief_description.yml (timestamped)
             - States: pending/, answered/, deferred/

          5. CLI Command References:
             - Agent generates YAML: Write directly to questions/pending/
             - Human answers: `agentic question list`, `agentic question answer <id>`
             - Agent checks for answers: Read from questions/answered/

          6. Resumption Pattern:
             - Before escalating, check questions/answered/ for new responses
             - Load answer content and incorporate into decision-making
             - Continue task execution with clarification
             - Move answered question to questions/answered/ if agent consumed it

          7. Example Scenarios:
             - Builder blocked on architecture decision
             - Planner needs priority clarification
             - Tester uncertain about expected behavior

          Reference escalation.yml for escalation trigger patterns (these become question triggers).
        success_criteria:
          - Guideline file exists at correct location
          - All 7 required sections are complete
          - YAML format examples are syntactically correct
          - Severity level guidance is clear and actionable
          - CLI command references match 260203QC implementation
          - Example scenarios cover builder, planner, and tester contexts

