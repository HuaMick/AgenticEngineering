              required: true
          ```
        success_criteria:
          - build-shared.yml exists with question-workflow.yml reference
          - OR guidance added to existing shared inputs
          - File follows existing input file conventions

      - id: "build_002"
        name: "Create builder question generation example"
        description: "Add example of builder question generation to guidelines"
        agent: "teacher-update-assets"
        status: "pending"
        depends_on: ["guide_001"]
        inputs:
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
        target_files:
          - modules/AgenticGuidance/assets/examples/builder/question-example.yml
        guidance: |
          Create new example file showing builder question generation workflow.

          Example scenario: Builder encounters architecture decision during implementation.

          Required sections:
          1. Scenario description
          2. What triggered the question
          3. Generated question YAML (complete example)
          4. How builder checks for answer
          5. How builder resumes after answer

          Example structure:
          ```yaml
          scenario: "Builder implementing data validation service"

          trigger: |
            Task requires input validation but plan doesn't specify validation library.
            Multiple options exist (Pydantic, Marshmallow, custom).

          question_generated:
            file: "questions/pending/260203_14_validation_library_choice.yml"
            content:
              id: "QUESTION-BUILD-001"
              question: "Which validation library should we use for data validation service?"
              severity: "high"
              status: "OPEN"
              task_id: "build_003"
              module: "src/services/validation.py"
              context: |
                Implementing data validation service per plan task build_003.
                Need to choose validation approach. Options:

                1. Pydantic (already in pyproject.toml)
                   - Pros: Type-safe, good docs, widely used
                   - Cons: Adds runtime overhead

                2. Marshmallow (not in dependencies)
                   - Pros: Flexible, serialization support
                   - Cons: Requires new dependency

                3. Custom validation
                   - Pros: Lightweight, full control
                   - Cons: More code to maintain

                Recommendation: Pydantic (already available)
                But seeking confirmation before implementing.
              options:
                - "Pydantic (recommended - already in deps)"
                - "Marshmallow (requires new dependency)"
                - "Custom validation functions"

          resumption_check:
            command: "Read questions/answered/260203_14_validation_library_choice.yml"
            interpretation: |
              If file exists in answered/:
              1. Read answer content
              2. Implement using specified library
              3. Continue with task build_003

              If file doesn't exist:
              - Notify user via CLI message
              - Reference: `agentic question list` shows pending question
              - Pause task until answer received
          ```
        success_criteria:
          - Example file created in correct location
          - All required sections present
          - Question YAML is complete and valid
          - Resumption pattern is clear

      - id: "test_001"
