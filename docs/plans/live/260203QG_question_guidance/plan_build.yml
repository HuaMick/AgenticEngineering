# ========================================
# CONTEXT (Narrative Updates)
# ========================================
context: |
  This plan updates agent guidance documents to teach agents how to generate and handle questions
  when they encounter blockers or need clarification during task execution.

  ARCHITECTURE DECISION (CLI-First Strategy):
  - Agents generate well-formed YAML questions when blocked
  - Questions follow 260203QF schema
  - Agents reference CLI commands for human operators
  - Resumption logic checks for answers and continues work

  Guidance Updates:
  - When to ask questions (blockers vs solvable issues)
  - How to generate question YAML (severity, context, format)
  - Where to write questions (plan-scoped folders)
  - How to check for answers and resume work
  - CLI references for human operators

