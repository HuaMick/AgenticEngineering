          - Example covers complete workflow (generation -> answer -> consumption)
          - YAML structures are complete and valid
          - Human interaction steps reference correct CLI commands
          - answered_by: HUMAN authority pattern is shown

      - id: "example_002"
        name: "Create builder workflow example"
        description: "End-to-end example of builder blocking and resuming on question"
        agent: "teacher-update-assets"
        status: "pending"
        depends_on: ["build_002"]
        inputs:
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
          - modules/AgenticGuidance/assets/examples/builder/question-example.yml
        target_files:
          - modules/AgenticGuidance/assets/examples/builder/question-workflow-complete.yml
        guidance: |
          Create example showing builder blocking and resuming workflow:

          1. Implementation Phase:
             - Builder working on task build_003
             - Encounters blocker requiring human decision
             - Generates question with context and attempted solutions
             - Writes questions/pending/ YAML file
             - Reports to orchestrator: "Task blocked on QUESTION-BUILD-001"

          2. Human Answers:
             - User reviews via CLI
             - Provides answer with rationale
             - Answer includes decision and any constraints

          3. Resumption Phase:
             - Builder spawned again for build_003
             - Checks questions/answered/ first
             - Finds answer for QUESTION-BUILD-001
             - Implements using specified approach
             - Completes task successfully

          Include timing and session boundaries to show async nature.
        success_criteria:
          - Example shows blocking behavior clearly
          - Resumption check pattern is explicit
          - Human answer includes rationale
          - Implementation follows answer constraints

      - id: "example_003"
        name: "Create tester workflow example"
        description: "Example of test-builder asking about expected behavior"
        agent: "teacher-update-assets"
        status: "pending"
        depends_on: ["test_002"]
        inputs:
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
        target_files:
          - modules/AgenticGuidance/assets/examples/test/question-workflow-example.yml
        guidance: |
          Create example showing test-builder question workflow:

          Scenario: Writing test for edge case behavior not specified in plan.

          1. Test Implementation:
             - Test-builder analyzing test task
             - Expected behavior unclear for edge case
             - Checks existing tests for patterns
             - Checks docs and implementation
             - Still ambiguous - generates question

          2. Question Details:
             - What was checked (attempted solutions)
             - Why existing patterns don't answer it
             - Impact of getting it wrong
             - Proposed test approach

          3. Human Clarification:
             - Answers with expected behavior
             - May reference requirement or user story

          4. Test Completion:
             - Test-builder implements test with clarified behavior
             - Adds comment referencing question answer
             - Test validates the specified behavior
        success_criteria:
          - Example shows inference attempts before questioning
          - Question includes attempted_solutions section
          - Test implementation references answer in comments
          - Pattern teaches "try to infer, then ask if critical"

  # ----------------------------------------
  # PHASE 6: Validation and Review
  # ----------------------------------------
  - name: "Validation Phase"
    execution: sequential
    description: "Validate that all guidance updates are complete and consistent"
    tasks:
      - id: "val_001"
        name: "Self-review guidance updates"
        description: "Review all updated guidance files for completeness and consistency"
        agent: "planner-reviewer"
        status: "pending"
        depends_on: ["orch_002", "orch_003", "plan_002", "plan_004", "plan_006", "build_002", "test_002", "example_001", "example_002", "example_003"]
        loop: "guidance-self-review-loop"
        inputs:
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
          - modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
          - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.yml
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
          - modules/AgenticGuidance/agents/planner/planner-build/process.yml
          - modules/AgenticGuidance/agents/planner/planner-test/inputs.yml
          - modules/AgenticGuidance/agents/planner/planner-test/process.yml
          - modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml
          - modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml
          - modules/AgenticGuidance/agents/test/test-builder/inputs.yml
          - modules/AgenticGuidance/agents/test/test-builder/process.yml
        guidance: |
          Review all updated guidance files against success criteria:

          Checklist:
          1. question-workflow.yml guideline is complete
             - All 7 sections present
             - Examples are clear and correct
             - CLI references match 260203QC spec

          2. Orchestration agents updated
             - inputs.yml has question-workflow.yml reference
             - process.yml has question checkpoint/handling steps
             - Instructions are actionable

          3. Planner agents updated
             - All planner inputs.yml have guideline reference
             - process.yml files have question generation steps
             - open_questions population is explained
             - Examples show correct YAML structure

          4. Builder/Test agents updated
             - Shared inputs or per-agent inputs updated
             - Question generation triggers are clear
             - Resumption patterns are explicit

          5. Examples are complete
             - Planner, builder, and tester workflows shown
             - End-to-end flow is clear
             - YAML structures are valid
             - Human interaction steps reference CLI correctly

          6. Consistency across agents
             - Question YAML format is consistent
             - Severity level usage is consistent
             - CLI command references are consistent
             - Resumption pattern is consistent

          Report findings with specific file:line references for any gaps.
        success_criteria:
          - All checklist items pass
          - No inconsistencies found across agent files
          - Examples validate successfully
          - Question workflow is teachable and actionable

      - id: "val_002"
        name: "Spot-check example validity"
        description: "Validate that example YAML files are syntactically correct and complete"
        agent: "teacher-update-assets"
        status: "pending"
        depends_on: ["val_001"]
        inputs:
          - modules/AgenticGuidance/assets/examples/planner/question-workflow-example.yml
          - modules/AgenticGuidance/assets/examples/builder/question-workflow-complete.yml
          - modules/AgenticGuidance/assets/examples/test/question-workflow-example.yml
        guidance: |
          Spot-check example files for technical correctness:

          1. YAML Syntax:
             - Parse each example file as YAML
             - Verify no syntax errors
             - Check indentation consistency

          2. Schema Compliance:
             - Question YAML matches 260203QF schema
             - Required fields present (id, question, severity, status, context)
             - Optional fields used correctly (task_id, module, options, attempted_solutions)

          3. Severity Levels:
             - high, medium, low used correctly
             - Severity matches question impact

          4. File Paths:
             - questions/pending/ paths are correct
             - questions/answered/ paths are correct
             - Filename format: YYMMDD_HH_brief_description.yml

          5. CLI References:
             - Commands match 260203QC spec
             - Flag usage is correct (--plan, etc.)

          Report any schema violations or syntax errors with specific examples.
        success_criteria:
          - All example YAML files parse successfully
          - Question schemas match 260203QF specification
          - File paths follow conventions
          - CLI references are accurate

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  # Guideline Asset
  - "question-workflow.yml guideline exists with all 7 required sections"
  - "YAML format examples are syntactically correct and follow 260203QF schema"
  - "Severity level guidance (high/medium/low) is clear and actionable"
  - "CLI command references match 260203QC implementation"

  # Orchestration Updates
  - "orchestration-planning and orchestration-executor inputs.yml reference question-workflow.yml"
  - "orchestration-planning process includes question checkpoint before plan approval"
  - "Question checkpoint distinguishes high-severity (must answer) from medium/low (can defer)"

  # Planner Updates
  - "All planner inputs.yml files reference question-workflow.yml"
  - "planner-build process includes open_questions population step with examples"
  - "planner-test process includes test expectation question generation"
  - "planner-reviewer process includes open_questions validation checklist"
  - "Examples show correct open_questions YAML structure in plan files"

  # Builder/Test Updates
  - "Builder agents have question workflow guidance (via shared inputs or per-agent)"
  - "test-builder inputs and process include question generation patterns"
  - "Question generation includes attempted_solutions and context requirements"
  - "Resumption pattern teaches checking questions/answered/ before escalating"

  # Complete Examples
  - "Planner workflow example shows complete lifecycle (generate -> answer -> consume)"
  - "Builder workflow example shows blocking and resumption pattern"
  - "Tester workflow example shows inference-first, question-second approach"
  - "All examples use valid YAML matching 260203QF schema"
  - "Examples demonstrate answered_by: HUMAN authority pattern"

  # Consistency and Quality
  - "Question YAML format is consistent across all examples"
  - "Severity level usage is consistent across agent types"
  - "CLI command references are consistent and accurate"
  - "Resumption pattern is consistent across agents"
  - "No gaps or contradictions found in validation review"

  # User Acceptance
  - "Agent can read guidance and understand when to ask vs. decide autonomously"
  - "Agent can generate well-formed question YAML with appropriate severity"
  - "Agent can check for answers and resume work after human clarification"
  - "Human can review pending questions and provide answers via CLI"
  - "Question workflow enables async HITL without blocking agent progress on other tasks"
