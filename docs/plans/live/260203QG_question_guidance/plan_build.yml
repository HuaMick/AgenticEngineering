          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-test/process.yml
        guidance: |
          Add guidance for test expectation questions during test planning:

          ```yaml
          steps:
            # ... existing test planning steps ...

            - |
              TEST EXPECTATION QUESTIONS (During Test Planning):
              When test expected behavior is ambiguous or under-specified, generate questions.

              Common test question scenarios:
              - Edge case behavior not documented
              - Error message format and wording
