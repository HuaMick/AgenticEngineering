      - id: "orch_002"
        name: "Update orchestration-planning process.yml"
        description: "Add question detection and coordination steps to orchestration process"
        agent: "teacher-update-guidance"
        status: "pending"
        depends_on: ["orch_001"]
        inputs:
          - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.yml
          - modules/AgenticGuidance/assets/guidelines/question-workflow.yml
        target_files:
          - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.yml
        guidance: |
          Add new step in the process steps section after plan creation but before approval:

          ```yaml
          steps:
            # ... existing steps ...

            - |
              QUESTION WORKFLOW CHECKPOINT (Before Plan Approval):
              Before submitting plan for approval, check for open questions that require human input.

              1. Check for questions/pending/ in plan folder
              2. If questions exist:
                 - List pending questions with severity
                 - Inform user: "Plan has N open questions requiring answers before execution"
                 - Reference CLI: `agentic question list --plan {plan_id}`
              3. Plan approval gate:
                 - High-severity questions MUST be answered before approval
                 - Medium/low severity can be deferred to execution phase

              This prevents plan execution from blocking on unanswered critical questions.
          ```
        success_criteria:
          - Question checkpoint step added to process
          - Step placement is logical (before approval gate)
          - Instructions reference CLI commands correctly
