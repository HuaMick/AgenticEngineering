# CLI Enforcement of Orchestration Patterns
# Plan ID: 260128EN
# Created: 2026-01-28
#
# Goal: Make CLI the authoritative source for orchestration state
# Agents should NEVER need to read files to determine plan state
# CLI tells agents: what exists, what's missing, what action to take

name: "cli-orchestration-enforcement"
status: "planning"
priority: "high"
created: "2026-01-28"

# ========================================
# PROBLEM STATEMENT
# ========================================
problem: |
  Current state:
  - Agents must read files to determine if orchestration_*.mmd exists
  - Agents must interpret plan status themselves
  - loop prompts contain file references (@ paths)
  - No enforcement that orchestration-planning agents populate tasklists

  Desired state:
  - CLI tells agent: "This plan NEEDS_PLANNING - spawn orchestration-planning agent"
  - CLI tells agent: "This plan READY_FOR_EXECUTION - tasks loaded, proceed"
  - CLI tells agent: "This plan BLOCKED - deferred, reason: X"
  - Zero file references in loop prompts

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - "`agentic plan list` shows orchestration status (has_mmd, has_tasks)"
  - "`agentic plan status` shows action_required field"
  - "loop2.txt has zero @ file references"
  - "Agent can determine all needed actions from CLI output alone"
  - "CLI validates plan has MMD before allowing task execution"

# ========================================
# PHASES
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Enhance plan list command
  # ----------------------------------------
  - phase_id: "P1"
    name: "Enhance plan list with orchestration status"
    status: "pending"
    tasks:
      - id: "EN-001"
        name: "Add has_orchestration_mmd field to plan list"
        description: |
          Modify cmd_plan_list() to check for orchestration_*.mmd files
          in each plan folder and include in output.

          JSON output should include:
          {
            "name": "260126AV_agenticvoice",
            "status": "deferred",
            "has_orchestration_mmd": true,
            "has_tasks": false,
            "action_required": "blocked"
          }
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "JSON includes has_orchestration_mmd boolean"
          - "Table output shows MMD column"

      - id: "EN-002"
        name: "Add action_required field to plan list"
        description: |
          Based on plan state, determine what action is needed:

          Logic:
          - If status == "deferred": action = "blocked"
          - If has_orchestration_mmd == false: action = "needs_planning"
          - If has_tasks == false: action = "needs_planning"
          - If pending > 0: action = "execute"
          - If all completed: action = "archive"

          This removes need for agent to interpret state.
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "action_required field present in output"
          - "Values: blocked, needs_planning, execute, archive"

  # ----------------------------------------
  # PHASE 2: Enhance plan status command
  # ----------------------------------------
  - phase_id: "P2"
    name: "Enhance plan status with orchestration details"
    status: "pending"
    tasks:
      - id: "EN-003"
        name: "Add orchestration_mmd field to plan status"
        description: |
          Show path to orchestration MMD if exists, or "MISSING" if not.

          Output:
          Orchestration: orchestration_agenticvoice.mmd
          - or -
          Orchestration: MISSING (run: agentic entrypoint execute _plan_build --compile)
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"

      - id: "EN-004"
        name: "Add deferred_reason to plan status"
        description: |
          If plan status is deferred, extract and show the reason from YAML.

          Output:
          Status: deferred
          Reason: Missing core services (PlanService, ContextService, TaskService)
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"

      - id: "EN-005"
        name: "Add next_action guidance to plan status"
        description: |
          Based on plan state, show what command to run next.

          Examples:
          Next Action: Spawn orchestration-planning agent
            Command: agentic entrypoint execute _plan_build --compile

          Next Action: Execute current task
            Command: agentic plan task start EN-001 --plan <folder>

          Next Action: Archive completed plan
            Command: agentic plan move folder --plan <folder>
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"

  # ----------------------------------------
  # PHASE 3: Add CLI validation/enforcement
  # ----------------------------------------
  - phase_id: "P3"
    name: "Add CLI validation for orchestration"
    status: "pending"
    tasks:
      - id: "EN-006"
        name: "Validate MMD exists before task start"
        description: |
          When running `agentic plan task start`, validate that
          orchestration_*.mmd exists in the plan folder.

          If missing:
          Error: Cannot start task - plan has no orchestration_*.mmd
          Hint: Run 'agentic entrypoint execute _plan_build --compile' and spawn planner
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"
        acceptance_criteria:
          - "task start fails if no MMD"
          - "Helpful error message shown"

      - id: "EN-007"
        name: "Add plan validate command for orchestration check"
        description: |
          Enhance `agentic plan validate` to check:
          - orchestration_*.mmd exists
          - MMD references valid phases
          - Tasks in YAML match phases in MMD

          Output:
          Validation: FAIL
          - Missing: orchestration_*.mmd
          - Action: Spawn orchestration-planning agent
        status: "pending"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/plan.py"

  # ----------------------------------------
  # PHASE 4: Update loop prompts
  # ----------------------------------------
  - phase_id: "P4"
    name: "Remove file references from loop prompts"
    status: "pending"
    tasks:
      - id: "EN-008"
        name: "Update loop2.txt to use CLI only"
        description: |
          Remove all file references from loop2.txt.

          Current (bad):
          "NEEDS_PLANNING: Has plan_*.yml but NO orchestration_*.mmd"

          New (good):
          "Check action_required field from `agentic plan list`"
          "If action_required == 'needs_planning': spawn planner"

          Agent should NEVER need to check for files.
        status: "pending"
        target_files:
          - "docs/prompts/loop2.txt"
        acceptance_criteria:
          - "Zero mentions of .mmd files"
          - "Zero mentions of .yml files"
          - "All decisions based on CLI output"

      - id: "EN-009"
        name: "Update loop1.txt to use CLI only"
        description: |
          Same treatment for loop1.txt - remove @ file references.
          Use CLI commands for all context and state discovery.
        status: "pending"
        target_files:
          - "docs/prompts/loop1.txt"

  # ----------------------------------------
  # PHASE 5: Test and validate
  # ----------------------------------------
  - phase_id: "P5"
    name: "Blind test and validation"
    status: "pending"
    tasks:
      - id: "EN-010"
        name: "Blind test CLI orchestration enforcement"
        description: |
          Test scenarios:
          1. Plan with MMD: task start should work
          2. Plan without MMD: task start should fail with helpful message
          3. plan list: should show action_required for all plans
          4. plan status: should show next_action guidance

          Use existing plans:
          - 260126AV_agenticvoice (has MMD, deferred)
          - Create test plan without MMD
        status: "pending"
        acceptance_criteria:
          - "All scenarios pass"
          - "Error messages are actionable"

# ========================================
# ORCHESTRATION NOTES
# ========================================
orchestration_notes: |
  This plan ITSELF needs an orchestration_*.mmd file!

  The orchestration-planning agent should:
  1. Read this plan_build.yml
  2. Create orchestration_cli_enforcement.mmd
  3. Define phase transitions and agent routing

  Without MMD, this plan cannot be executed.

  TO CREATE MMD:
  1. Run: agentic entrypoint execute _plan_build --compile
  2. Follow orchestration-planning process
  3. Generate MMD with phases and routing
