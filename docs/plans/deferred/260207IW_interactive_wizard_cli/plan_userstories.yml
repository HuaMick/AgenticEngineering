# CLI Command User Stories Mapping Plan
# Plan ID: 260207IW
# File: plan_userstories.yml
# Created: 2026-02-07
# Status: Pending
#
# PURPOSE: Map all CLI command combinations to user stories to understand
# which commands would benefit from interactive/wizard mode vs args-only.

_template_status: active

plan:
  id: 260207IW-US
  name: "CLI User Stories Mapping"
  status: pending
  objective: |
    Before implementing the hybrid CLI approach, we need a complete map of:
    1. All CLI commands and their argument combinations
    2. Which commands are typically used by agents vs humans
    3. The complexity/discoverability problem for each command
    4. User stories that would benefit from interactive mode
    
    This mapping informs where to invest in interactive features.

phases:
  - name: "Phase 1: CLI Command Inventory"
    id: phase_inventory
    status: pending
    tasks:
      - id: US-001
        name: "Extract complete CLI command tree"
        status: pending
        description: |
          Parse cli.py and document every command, subcommand, and their arguments.
          Output should be a structured inventory of:
          - Command path (e.g., `agentic plan spawn`)
          - Required arguments
          - Optional arguments  
          - Argument value constraints (enums, types)
        target_files:
          - docs/plans/deferred/260207IW_interactive_wizard_cli/artifacts/cli_inventory.yml
        acceptance_criteria:
          - "All commands from cli.py are documented"
          - "Argument types and constraints are captured"
          - "Aliases are mapped to canonical commands"

      - id: US-002
        name: "Classify commands by user type"
        status: pending  
        description: |
          Classify each command as:
          - `human-primary`: Mainly used by human operators
          - `agent-primary`: Mainly used by AI agents (orchestrator, executor, etc.)
          - `mixed`: Used by both humans and agents
        target_files:
          - docs/plans/deferred/260207IW_interactive_wizard_cli/artifacts/cli_inventory.yml
        acceptance_criteria:
          - "Each command has a user_type classification"
          - "Classification is based on observed usage patterns"

  - name: "Phase 2: User Story Mapping"
    id: phase_stories
    status: pending
    tasks:
      - id: US-003
        name: "Map existing user stories to CLI commands"
        status: pending
        description: |
          Cross-reference existing user stories from:
          - docs/userstories/MyAgents/
          - docs/userstories/RemoteAgents/

          For each CLI command, identify:
          - Which user stories exercise this command
          - What journey steps involve this command
          - What failure indicators relate to command complexity
        target_files:
          - docs/plans/deferred/260207IW_interactive_wizard_cli/artifacts/story_command_matrix.yml
        acceptance_criteria:
          - "Matrix of stories x commands exists"
          - "Gaps are identified (commands without story coverage)"

      - id: US-004
        name: "Create user stories for agent CLI interactions"
        status: pending
        description: |
          Create new user stories specifically for agent personas using the CLI:
          - Orchestrator agent spawning sessions
          - Planner agent creating plan files
          - Executor agent running commands
          - Audit agent checking completion
          
          Focus on the discovery and error recovery aspects.
        target_files:
          - docs/userstories/MyAgents/20_agent_cli.yml
        acceptance_criteria:
          - "At least 5 agent-focused CLI user stories created"
          - "Stories cover discovery, execution, and error cases"
          - "Stories follow existing user story format"

  - name: "Phase 3: Interactive Mode Candidates"
    id: phase_candidates
    status: pending
    tasks:
      - id: US-005
        name: "Score commands for interactive mode value"
        status: pending
        description: |
          For each agent-primary and mixed command, score:
          - Argument complexity (1-5): How many args, how complex are values
          - Discovery difficulty (1-5): Can agent know valid values without help?
          - Error cost (1-5): What's the cost of wrong args?
          - Frequency (1-5): How often is this command used?
          
          Interactive mode is highest value for: high complexity, high discovery difficulty,
          high error cost, high frequency.
        target_files:
          - docs/plans/deferred/260207IW_interactive_wizard_cli/artifacts/interactive_candidates.yml
        acceptance_criteria:
          - "All commands scored on 4 dimensions"
          - "Top 10 candidates for interactive mode identified"
          - "Justification for each recommendation"

      - id: US-006
        name: "Design interactive flows for top candidates"
        status: pending
        description: |
          For top 5-10 candidates, design the interactive flow:
          - What questions are asked
          - What options are presented
          - How validation happens at each step
          - How to recover from mistakes
        target_files:
          - docs/plans/deferred/260207IW_interactive_wizard_cli/artifacts/interactive_designs/
        acceptance_criteria:
          - "Flow diagrams or step descriptions for each candidate"
          - "Edge cases considered (cancel, back, invalid input)"

artifacts:
  location: docs/plans/deferred/260207IW_interactive_wizard_cli/artifacts/
  expected:
    - cli_inventory.yml
    - story_command_matrix.yml
    - interactive_candidates.yml
    - interactive_designs/

related_guidance:
  - modules/AgenticGuidance/assets/guidelines/planning-standard.yml
  - modules/AgenticGuidance/assets/guidelines/strategy-user-acceptance.yml

userstory_sources:
  - docs/userstories/MyAgents/02_cli_basics.yml
  - docs/userstories/MyAgents/11_development.yml
  - docs/userstories/RemoteAgents/
