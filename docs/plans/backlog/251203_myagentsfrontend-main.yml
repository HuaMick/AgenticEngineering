# ==============================================================================
# TECHNOLOGY DECISIONS (Preserved from Original Plan)
# ==============================================================================

technology_decisions:
  framework: Flutter
  rationale: |
    User confirmed mobile is priority ("remote control Claude from anywhere").
    Flutter's single codebase for web+mobile justifies upfront investment.

  dependencies:
    - web_socket_channel: ^2.4.0      # WebSocket client
    - pinenacl: ^0.5.1                # E2E encryption (matches PyNaCl)
    - xterm: ^4.0.0                   # Terminal emulation
    - go_router: ^14.0.0              # Routing
    - provider: ^6.1.0                # State management
    - deepgram_speech_to_text: ^2.0.0 # Official Deepgram SDK

  architecture: |
    Feature-based organization:
    lib/
    ├── main.dart
    ├── core/                    # Shared infrastructure
    │   ├── config/
    │   ├── crypto/              # E2E encryption (pinenacl)
    │   ├── networking/          # WebSocket client
    │   └── theme/
    ├── features/
    │   ├── remote_terminal/     # Terminal display + input
    │   ├── voice/               # Deepgram voice-to-text
    │   └── pairing/             # Session pairing UI
    └── routing/

# ==============================================================================
# PLANNER LOOP ANALYSIS (Preserved from Original Plan)
# ==============================================================================

planner_loop_analysis:
  date: 2025-12-03
  status: completed

  cross_repo_dependencies:
    summary: |
      MyAgentsFrontend depends on RemoteAgents for protocol compatibility,
      but most frontend work can proceed with mocks/stubs.

    dependencies:
      - dependency: Crypto format (PyNaCl ↔ pinenacl)
        type: protocol
        impact: Must match exactly for E2E encryption
        can_be_mocked: YES - use test vectors from RemoteAgents
        blocking: false

      - dependency: WebSocket endpoints
        type: API
        impact: /ws/client/{pairing_code} endpoint structure
        can_be_mocked: YES - mock WebSocket server
        blocking: false

      - dependency: Message types
        type: protocol
        impact: terminal_input, terminal_output, resize
        can_be_mocked: YES - define shared schema
        blocking: false

      - dependency: Session/Pairing flow
        type: business_logic
        impact: Pairing code generation and validation
        can_be_mocked: YES - mock pairing responses
        blocking: false

      - dependency: Relay server availability
        type: runtime
        impact: Needed for integration testing
        can_be_mocked: YES - local mock server
        blocking: Only for integration tests

  worktree_opportunities:
    summary: |
      Frontend work can be divided into independent streams.
      Voice feature is completely independent of RemoteAgents.
      Most work can proceed with mocks before backend is ready.

    dependency_graph: |
      W3 (Setup) ──┬──> W4 (Crypto) ──> W5 (Network) ──> W7 (Terminal)
                   │
                   └──> W6 (Voice) [INDEPENDENT - parallel with everything]

