# Backlog Plan - CI/CD Improvements
# Last Updated: 2025-11-26
# Items for CI/CD pipeline enhancements

# ==============================================================================
# GITHUB INTEGRATION
# ==============================================================================

github_integration:
  - id: CICD-001
    description: Enable branch protection with required status checks
    success_criteria:
      - Branch protection rule on `main`
      - Cloud Build status check required before merge
      - Prevent force pushes to main
      - At least one approval required for PRs
    priority: high
    dependencies: []
    effort: 30 minutes
    notes: |
      This is GitHub repo settings, not code.
      Ensures no broken code lands on main.

  - id: CICD-002
    description: Add coverage reporting to GitHub PRs
    success_criteria:
      - Coverage percentage visible on PRs
      - Codecov or similar integration configured
      - Coverage badge in README
      - Historical coverage tracking
    priority: medium
    dependencies: [CICD-001]
    effort: 1-2 hours
    notes: |
      Options: Codecov (free for open source), Coveralls, or custom GitHub Action.
      Current pipeline generates coverage XML but doesn't report it anywhere.

# ==============================================================================
# COVERAGE & QUALITY GATES
# ==============================================================================

quality_gates:
  - id: CICD-003
    description: Add coverage threshold enforcement
    success_criteria:
      - Minimum coverage threshold defined (e.g., 70%)
      - Build fails if coverage drops below threshold
      - Per-file coverage warnings for uncovered code
      - Coverage delta shown on PRs
    priority: medium
    dependencies: [CICD-002]
    effort: 1 hour
    notes: |
      Add --cov-fail-under=70 to pytest command.
      Start with a realistic threshold based on current coverage.

# ==============================================================================
# DEPLOYMENT PIPELINE (POST-RELEASE)
# ==============================================================================

deployment:
  - id: CICD-005
    description: Add staging environment deployment
    success_criteria:
      - Staging Cloud Run service deployed on main merge
      - Environment variables configured via Secret Manager
      - Health check endpoint validates deployment
      - Staging URL accessible for testing
    priority: deferred
    dependencies: []
    effort: 3-4 hours
    deferred_reason: |
      No release yet - premature to deploy.
      Defer until first release is ready.

  - id: CICD-006
    description: Add production deployment with manual approval
    success_criteria:
      - Production Cloud Run service
      - Manual approval gate before prod deploy
      - Rollback capability via Cloud Run revisions
      - Production monitoring/alerting configured
    priority: deferred
    dependencies: [CICD-005]
    effort: 2-3 hours
    deferred_reason: |
      Requires staging to be working first.
      Production deployment needs release strategy.

  - id: CICD-007
    description: Implement semantic versioning and release tags
    success_criteria:
      - Version bumping automated (conventional commits or manual)
      - Git tags created on releases
      - CHANGELOG generated from commits
      - PyPI publish on tagged releases
    priority: deferred
    dependencies: []
    effort: 2-3 hours
    deferred_reason: |
      No release yet.
      Implement when ready to publish to PyPI.

# ==============================================================================
# INFRASTRUCTURE
# ==============================================================================

infrastructure:
  - id: CICD-008
    description: Add build notifications (Slack/Discord/Email)
    success_criteria:
      - Failed builds notify team channel
      - Success notifications optional (noisy)
      - Links to build logs in notification
      - Configurable notification rules
    priority: low
    dependencies: []
    effort: 1-2 hours
    notes: |
      Cloud Build supports Pub/Sub -> Cloud Functions -> webhook.
      Or use Cloud Build notifiers (built-in).

  - id: CICD-009
    description: Add nightly/scheduled test runs
    success_criteria:
      - Scheduled trigger runs full suite nightly
      - Includes slow and costly tests
      - Results tracked for trend analysis
      - Alerts on nightly failures
    priority: low
    dependencies: []
    effort: 1 hour
    notes: |
      Use Cloud Scheduler to trigger Cloud Build.
      Catches flaky tests and regressions not in PRs.

