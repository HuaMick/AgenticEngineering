# Planner Task: Cleaner Agent Category Definition
# Plan: 251218_agent_categories

task:
  agent: "cleaner"
  target_path: "cleaner/"

  objective: "Introduce agent category concept to cleaner agent family"

  context: |
    The cleaner category is responsible for code quality and cleanup. It identifies issues,
    executes cleanup operations, and maintains core quality standards. This task adds explicit
    category references to the cleaner agent family.

  current_structure:
    sub_agents:
      - "cleaner-identify"
      - "cleaner-execute"
      - "cleaner-core"
    has_manifest: false

  tasks:
    - id: "cleaner-cat-01"
      description: "Create cleaner/manifest.yml with category reference"
      file: "cleaner/manifest.yml"
      criteria: "manifest.yml created and references assets/definitions/agent-categories.yml#cleaner"
      details: |
        Create hub manifest with:
        - Category reference
        - Sub-agent list
        - Routing logic for cleaner agents
      status: "completed"
      result: |
        Created cleaner/manifest.yml with:
        - Category definition reference: assets/definitions/agent-categories.yml#cleaner
        - Sub-agent list: cleaner-identify, cleaner-execute, cleaner-core
        - Routing workflow describing voting-based cleanup process
        - Boundaries and safety requirements

    - id: "cleaner-cat-02"
      description: "Update cleaner-identify/inputs.yml to reference category"
      file: "cleaner/cleaner-identify/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section to cleaner-identify/inputs.yml:
        - category: "assets/definitions/agent-categories.yml#cleaner"
        - role: "cleaner-identify"

    - id: "cleaner-cat-03"
      description: "Update cleaner-execute/inputs.yml to reference category"
      file: "cleaner/cleaner-execute/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section to cleaner-execute/inputs.yml:
        - category: "assets/definitions/agent-categories.yml#cleaner"
        - role: "cleaner-execute"

    - id: "cleaner-cat-04"
      description: "Update cleaner-core/inputs.yml to reference category"
      file: "cleaner/cleaner-core/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section to cleaner-core/inputs.yml:
        - category: "assets/definitions/agent-categories.yml#cleaner"
        - role: "cleaner-core"

  validation:
    - "cleaner/manifest.yml created and references agent-categories.yml"
    - "All 3 sub-agents reference their category"
    - "All file references resolve correctly"
    - "No broken references"

  dependencies:
    - "planner_definitions.yml (def-01 must complete first)"
