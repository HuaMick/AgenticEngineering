# Planner Task: Agent Categories Definition
# Plan: 251218_agent_categories

task:
  agent: "teacher-update-assets"
  target_path: "assets/definitions/"

  objective: "Create canonical agent-categories.yml definition"

  context: |
    Agent categories represent the top-level organizational structure for the MyAgents framework.
    Currently, categories exist implicitly as folder names. This task formalizes them into a
    canonical definition that all agents can reference for context and routing.

  tasks:
    - id: "def-01"
      description: "Create agent-categories.yml definition file"
      file: "assets/definitions/agent-categories.yml"
      criteria: "Defines all 9 agent categories (build, planner, test, cleaner, explore, teacher, deploy, documentation, orchestration) with purpose, sub-agents, and responsibilities"
      details: |
        Structure:
        - agent_categories:
            category_name:
              name: "Display Name"
              purpose: "High-level purpose statement"
              responsibility: "What this category is responsible for"
              sub_agents: [list of sub-agent names]

        Categories to define:
        1. build (2 sub-agents)
        2. planner (5 sub-agents)
        3. test (8 sub-agents)
        4. cleaner (3 sub-agents)
        5. explore (5 sub-agents)
        6. teacher (2 sub-agents)
        7. deploy (3 sub-agents)
        8. documentation (1 sub-agent)
        9. orchestration (1 sub-agent)
      status: "completed"
      result: |
        Created agent-categories.yml at assets/definitions/agent-categories.yml.
        File defines all 9 categories with name, purpose, responsibility, sub_agents list, and boundaries.
        Added usage section explaining how to reference this file from agent manifests and inputs.yml files.

    - id: "def-02"
      description: "Update agent-role-scope-matrix.md to reference categories"
      file: "docs/agent-role-scope-matrix.md"
      criteria: "Matrix organized by category with category definitions"
      details: |
        - Add category section headers
        - Group agents by their category
        - Reference agent-categories.yml for category definitions
        - Explain category boundaries and responsibilities
      status: "completed"
      result: |
        Updated agent-role-scope-matrix.md with:
        1. Added Category Reference section at top with link to agent-categories.yml
        2. Added category headers (Planner, Explore, Build, Test, Cleaner, Deploy, Documentation, Teacher, Orchestration)
        3. Each category header includes purpose and boundaries from agent-categories.yml
        4. Reorganized existing agent tables under their category sections
        5. All 9 categories now have proper section headers with clear context

    - id: "def-03"
      description: "Update ARCHITECTURE.md to explain category concept"
      file: "docs/ARCHITECTURE.md"
      criteria: "Architecture doc includes category hierarchy explanation"
      details: |
        Add section explaining:
        - What agent categories are
        - Why categories exist (organizational structure)
        - How categories relate to sub-agents
        - Reference to agent-categories.yml as canonical source
        - Category-level vs sub-agent-level responsibilities
      status: "completed"
      result: |
        Added comprehensive "Agent Categories" section to ARCHITECTURE.md after Hub-and-Spoke section.
        Section includes:
        1. What Are Agent Categories - definition with purpose, responsibilities, boundaries
        2. Why Categories Exist - 4 key benefits (scope boundaries, organization, routing, separation)
        3. Category Hierarchy - list of all 9 categories with brief descriptions
        4. How Categories Relate to Sub-Agents - explanation with Test category example
        5. Canonical Source - reference to agent-categories.yml as authoritative definition

  validation:
    - "agent-categories.yml exists and defines all 9 categories"
    - "Each category has: name, purpose, responsibility, sub_agents"
    - "ARCHITECTURE.md has category hierarchy section"
    - "agent-role-scope-matrix.md organized by category"
    - "All file references resolve correctly"

  reference_files:
    - "docs/plans/251218_agent_categories/analysis/agent-categories-analysis.md"
    - "docs/ARCHITECTURE.md"
    - "docs/agent-role-scope-matrix.md"
