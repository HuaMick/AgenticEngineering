# Planner Task: Teacher Agent Category Definition
# Plan: 251218_agent_categories

task:
  agent: "teacher"
  target_path: "teacher/"

  objective: "Introduce agent category concept to teacher agent family"

  context: |
    The teacher category is responsible for agent guidance improvement. It improves processes,
    updates shared assets, and plans agent improvements. This task adds explicit category
    references to the teacher agent family.

  current_structure:
    sub_agents:
      - "teacher-process"
      - "teacher-update-assets"
      - "teacher-plan" (mentioned in request but doesn't exist yet)
    has_manifest: false

  tasks:
    - id: "teacher-cat-01"
      description: "Create teacher/manifest.yml with category reference"
      file: "teacher/manifest.yml"
      criteria: "manifest.yml created and references assets/definitions/agent-categories.yml#teacher"
      details: |
        Create hub manifest with:
        - Category reference
        - Sub-agent list (currently: teacher-process, teacher-update-assets)
        - Note: teacher-plan may be added later
        - Routing logic for teacher agents
      status: "completed"
      result: |
        Created manifest.yml with:
        - category.definition: "assets/definitions/agent-categories.yml#teacher"
        - sub_agents: teacher-process, teacher-update-assets (with note about teacher-plan)
        - routing section describing when to use each sub-agent

    - id: "teacher-cat-02"
      description: "Update teacher-process/inputs.yml to reference category"
      file: "teacher/teacher-process/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section:
        - category: "assets/definitions/agent-categories.yml#teacher"
        - role: "teacher-process"

    - id: "teacher-cat-03"
      description: "Update teacher-update-assets/inputs.yml to reference category"
      file: "teacher/teacher-update-assets/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Added agent_context section:
        - category: "assets/definitions/agent-categories.yml#teacher"
        - role: "teacher-update-assets"

  validation:
    - "teacher/manifest.yml created and references agent-categories.yml"
    - "All 2 existing sub-agents reference their category"
    - "All file references resolve correctly"
    - "No broken references"

  notes:
    - "teacher-plan sub-agent mentioned in original request but doesn't exist in filesystem yet"
    - "This may be a future addition to the teacher category"
    - "Manifest should be structured to easily add teacher-plan when created"

  dependencies:
    - "planner_definitions.yml (def-01 must complete first)"
