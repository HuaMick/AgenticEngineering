# Planner Task: Deploy Agent Category Definition
# Plan: 251218_agent_categories

task:
  agent: "deploy"
  target_path: "deploy/"

  objective: "Introduce agent category concept to deploy agent family"

  context: |
    The deploy category is responsible for deployment and release management. It handles
    packaging, CI/CD workflows, and worktree management. This task adds explicit category
    references to the deploy agent family.

  current_structure:
    sub_agents:
      - "deploy-packaging"
      - "deploy-cicd"
      - "deploy-worktree"
    has_manifest: false

  tasks:
    - id: "deploy-cat-01"
      description: "Create deploy/manifest.yml with category reference"
      file: "deploy/manifest.yml"
      criteria: "manifest.yml created and references assets/definitions/agent-categories.yml#deploy"
      details: |
        Create hub manifest with:
        - Category reference
        - Sub-agent list
        - Routing logic for deploy agents
      status: "completed"
      result: |
        Created /home/code/myagents/MyAgents-staging/deploy/manifest.yml
        - Added category reference to assets/definitions/agent-categories.yml#deploy
        - Listed all 3 sub-agents: deploy-packaging, deploy-cicd, deploy-worktree
        - Included routing logic based on task triggers
        - Defined boundaries for deploy category

    - id: "deploy-cat-02"
      description: "Update deploy-packaging/inputs.yml to reference category"
      file: "deploy/deploy-packaging/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Updated deploy-packaging/inputs.yml with agent_context section:
        - category: "assets/definitions/agent-categories.yml#deploy"
        - role: "deploy-packaging"

    - id: "deploy-cat-03"
      description: "Update deploy-cicd/inputs.yml to reference category"
      file: "deploy/deploy-cicd/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Updated deploy-cicd/inputs.yml with agent_context section:
        - category: "assets/definitions/agent-categories.yml#deploy"
        - role: "deploy-cicd"

    - id: "deploy-cat-04"
      description: "Update deploy-worktree/inputs.yml to reference category"
      file: "deploy/deploy-worktree/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      status: "completed"
      result: |
        Updated deploy-worktree/inputs.yml with agent_context section:
        - category: "assets/definitions/agent-categories.yml#deploy"
        - role: "deploy-worktree"

  validation:
    - "deploy/manifest.yml created and references agent-categories.yml"
    - "All 3 sub-agents reference their category"
    - "All file references resolve correctly"
    - "No broken references"

  dependencies:
    - "planner_definitions.yml (def-01 must complete first)"
