implementation_notes:
  typer_context_settings: "When registering deprecation stubs, use context_settings\
    \ to allow extra args so Typer doesn't error on subcommand arguments before reaching\
    \ the callback:\n  @app.command(\"context\", hidden=True,\n               context_settings={\"\
    allow_extra_args\": True, \"allow_interspersed_args\": False})\n  def _deprecated_context(ctx:\
    \ typer.Context):\n      ...\nThis ensures 'agentic context bootstrap' routes\
    \ to the stub rather than Typer throwing \"No such command 'bootstrap'\".\n"
  error_message_format: "Use a consistent format for all deprecation messages:\n \
    \ \"Command 'agentic <old>' has moved. Use 'agentic agent <new>' instead.\"\n\
    Print to stderr via print_error() from agenticcli.console. Always raise typer.Exit(1)\
    \ after printing.\n"
