      agent stories"
    - agentic st exits with code 1 with guidance to agentic agent stories
    - agentic manifest exits with code 1 with guidance to agentic agent manifest
    - agentic mf exits with code 1 with guidance to agentic agent manifest
    - agentic entrypoint exits with code 1 with guidance to agentic agent entrypoint
    - agentic ep exits with code 1 with guidance to agentic agent entrypoint
    - agentic context exits with code 1 with guidance to agentic agent context
    - agentic ctx exits with code 1 with guidance to agentic agent context
    - agentic agent stories --help still exits 0 (functional path unaffected)
    - agentic agent context --help still exits 0 (functional path unaffected)
    - agentic --help does not show any of the 8 deprecated commands in visible output
  - id: P2-T2
    phase: P2
    name: Replace hidden plan_app commands with deprecation stubs
    description: "Replace the 7 hidden commands on plan_app with deprecation stubs.\
      \ Current code:\n  @plan_app.command(\"new\", hidden=True)\n  @plan_app.command(\"\
