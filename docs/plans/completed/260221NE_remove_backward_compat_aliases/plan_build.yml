- id: P2
  name: Replace CLI Aliases with Deprecation Stubs
  description: 'Replace all hidden backward-compat aliases in cli.py with deprecation
    stubs that print a clear error message and exit 1. Implement per category. The
    stubs must appear at the same command path so Typer still routes them, but the
    callback prints the new path and refuses to proceed.

    '
  parallel: false
  depends_on:
  - P1
  tasks:
  - id: P2-T1
    phase: P2
    name: Replace top-level group aliases with deprecation commands
    description: "In cli.py, replace the 8 hidden top-level group add_typer calls\
      \ with deprecation commands. The current code:\n  app.add_typer(stories_app,\
      \ name=\"stories\", hidden=True)\n  app.add_typer(stories_app, name=\"st\",\
      \ hidden=True)\n  app.add_typer(manifest_app, name=\"manifest\", hidden=True)\n\
      \  app.add_typer(manifest_app, name=\"mf\", hidden=True)\n  app.add_typer(entrypoint_app,\
      \ name=\"entrypoint\", hidden=True)\n  app.add_typer(entrypoint_app, name=\"\
      ep\", hidden=True)\n  app.add_typer(context_app, name=\"context\", hidden=True)\n\
      \  app.add_typer(context_app, name=\"ctx\", hidden=True)\n\nReplace each with\
      \ a @app.command(..., hidden=True) stub. Because Typer does not support catch-all\
      \ arguments natively, use a context-aware approach:\n  - Add `ctx: typer.Context`\
      \ parameter to the callback\n  - Use `allow_extra_args=True` and `allow_interspersed_args=False`\
      \ on the\n    Typer command decorator so it doesn't reject extra subcommand\
      \ arguments\n  - Print the error message and exit 1\n\nImplementation pattern\
      \ for each:\n  @app.command(\"stories\", hidden=True, context_settings={\"allow_extra_args\"\
      : True, \"allow_interspersed_args\": False})\n  def _deprecated_stories(ctx:\
      \ typer.Context):\n      \\\"\\\"\\\"Deprecated: use 'agentic agent stories'.\\\
      \"\\\"\\\"\n      from agenticcli.console import print_error\n      print_error(\"\
      Command 'agentic stories' has moved. Use 'agentic agent stories' instead.\"\
      )\n      raise typer.Exit(1)\n\nApply this pattern for: stories, st, manifest,\
      \ mf, entrypoint, ep, context, ctx.\nNote: The stories_app, manifest_app, entrypoint_app,\
      \ and context_app Typer objects can still exist (they are used as the canonical\
      \ implementations under 'agentic agent ...' via the agent_app group). Only remove\
      \ the app.add_typer calls that register them at the top level.\nLines to modify\
      \ in cli.py:\n  - Line 370: app.add_typer(stories_app, name=\"stories\", hidden=True)\n\
      \  - Line 371: app.add_typer(stories_app, name=\"st\", hidden=True)\n  - Line\
      \ 479: app.add_typer(manifest_app, name=\"manifest\", hidden=True)\n  - Line\
      \ 480: app.add_typer(manifest_app, name=\"mf\", hidden=True)\n  - Line 1151:\
      \ app.add_typer(entrypoint_app, name=\"entrypoint\", hidden=True)\n  - Line\
      \ 1152: app.add_typer(entrypoint_app, name=\"ep\", hidden=True)\n  - Line 1195:\
      \ app.add_typer(context_app, name=\"context\", hidden=True)\n  - Line 1196:\
      \ app.add_typer(context_app, name=\"ctx\", hidden=True)\n\nAdd deprecation command\
      \ stubs immediately below each section header, replacing the removed add_typer\
      \ calls. Keep the section comments to help future readers understand where the\
      \ canonical implementations live.\n"
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
