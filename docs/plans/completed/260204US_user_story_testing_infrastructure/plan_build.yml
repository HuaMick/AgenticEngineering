name: user-story-testing-infrastructure
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
priority: high
context: 'We need a formal way to test features using human-readable User Stories.

  These stories should be discoverable by the CLI and used by agents for blind testing.

  The pattern should be "one story per file" inside planning folders.

  '
objective: 'Enhance the Agentic CLI to support User Story initialization, discovery
  in plan folders,

  and guided execution for blind testing agents.

  '
phases:
- name: 'Phase 1: CLI Enhancements'
  execution: sequential
  tasks:
  - id: US_001
    name: Update stories command for Plan-local discovery
    description: Update find command to look into docs/plans/live/*/user_stories/
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/stories.py
    notes: 'Verified - _find_plan_stories_dirs() discovers user_stories in live plans. Tested successfully.'
  - id: US_002
    name: Implement 'agentic stories init'
    description: Create a template user story file in a specified location.
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/stories.py
    notes: 'Verified - cmd_init() creates YAML template with --plan option for plan-local stories.'
  - id: US_003
    name: Implement 'agentic stories cat'
    description: Display the content of a specific story for the agent to follow.
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/stories.py
    notes: 'Verified - cmd_cat() finds and displays story content. Tested successfully.'
- name: 'Phase 2: Agent Guidance Integration'
  execution: sequential
  tasks:
  - id: US_004
    name: Update test-audit agent guidance
    description: Teach test-audit agents how to use 'agentic stories' for blind testing.
    status: completed
    target_files:
    - modules/AgenticGuidance/agents/test/test-audit/process.yml
    notes: 'Verified - USER STORY VALIDATION step added with agentic stories find/cat usage.'
success_criteria:
- agentic stories find discovers stories in both global and plan-local directories
- agentic stories init creates a valid YAML template
- test-audit agent can successfully walk through a user story as a blind test
