phases:
  - id: phase_1
    name: tmux Configuration and Scripts
    status: completed
    description: Create optimized tmux configuration for remote/mobile access
    loop_strategy: test-fix
    tasks:
      - id: TR-001
        description: Create .tmux.conf template optimized for remote/mobile access
        status: completed
        acceptance_criteria:
          - Mouse support enabled
          - Prefix key configured (Ctrl+a recommended)
          - Easy config reload binding
          - 256 color support
          - Increased scrollback buffer
          - Status bar with session info
        files:
          - modules/AgenticTmux/configs/remote.tmux.conf

      - id: TR-002
        description: Create tmux plugin configuration (resurrect + continuum)
        status: completed
        acceptance_criteria:
          - tmux-resurrect plugin configured
          - tmux-continuum for auto-save/restore
          - Plugin manager (tpm) setup instructions
        files:
          - modules/AgenticTmux/configs/plugins.tmux.conf

      - id: TR-003
        description: Create agentic-tmux remote setup command
        status: completed
        acceptance_criteria:
          - "CLI command: agentic-tmux remote setup"
          - Installs tmux config to ~/.tmux.conf
          - Optionally installs TPM and plugins
          - Validates tmux is installed
        files:
          - modules/AgenticTmux/src/agentictmux/commands/remote.py

  - id: phase_2
    name: Tailscale Integration
    status: completed
    description: Scripts and documentation for Tailscale VPN setup
    loop_strategy: test-fix
    tasks:
      - id: TR-004
        description: Create Tailscale setup script for desktop/server
        status: completed
        acceptance_criteria:
          - Detection of existing Tailscale installation
          - Instructions for Tailscale authentication
          - SSH server configuration check
          - Firewall configuration guidance
        files:
          - modules/AgenticTmux/scripts/setup-tailscale.sh

      - id: TR-005
        description: Create agentic-tmux network status command
        status: completed
        acceptance_criteria:
          - Shows Tailscale status
          - Shows machine's Tailscale IP
          - Shows SSH server status
          - Provides connection string for mobile
        files:
          - modules/AgenticTmux/src/agentictmux/commands/remote.py

      - id: TR-006
        description: Add Tailscale IP to session info
        status: completed
        acceptance_criteria:
          - agentic-tmux session status shows Tailscale IP
          - Connection instructions displayed
        files:
          - modules/AgenticTmux/src/agentictmux/commands/session.py

  - id: phase_3
    name: Claude Code Session Templates
    status: completed
    description: Pre-configured session templates for Claude Code workflows
    loop_strategy: test-fix
    tasks:
      - id: TR-007
        description: Create Claude Code session template
        status: completed
        acceptance_criteria:
          - Pre-configured window layout for Claude Code
          - Named windows (claude, shell, logs)
          - Automatic worktree directory navigation
        files:
          - modules/AgenticTmux/templates/claude-session.yml

      - id: TR-008
        description: Implement agentic-tmux session create --template command
        status: completed
        acceptance_criteria:
          - Create session from template YAML
          - Template supports multiple windows/panes
          - Template supports working directory
          - Template supports initial commands
        files:
          - modules/AgenticTmux/src/agentictmux/commands/shortcuts.py

      - id: TR-009
        description: Create "quick start" command for mobile Claude Code session
        status: completed
        acceptance_criteria:
          - agentic-tmux claude-session [name]
          - Creates/attaches to Claude Code optimized session
          - Works from SSH connection
        files:
          - modules/AgenticTmux/src/agentictmux/commands/shortcuts.py

  - id: phase_4
    name: Integration with agentic CLI
    status: completed
    description: Integrate tmux remote commands with main agentic CLI
    loop_strategy: test-fix
    tasks:
      - id: TR-010
        description: Register tmux commands with agentic CLI
        status: completed
        acceptance_criteria:
          - agentic tmux session ... commands available
          - agentic tmux remote ... commands available
          - Help documentation integrated
        files:
          - modules/AgenticCLI/src/agenticcli/commands/tmux.py

      - id: TR-011
        description: Add remote access info to agentic context bootstrap
        status: completed
        acceptance_criteria:
          - Bootstrap shows Tailscale IP if available
          - Shows current tmux session name
          - Shows attach command for mobile
        files:
          - modules/AgenticCLI/src/agenticcli/commands/context.py

dependencies:
  existing:
    - AgenticTmux module (phases 1-2 complete)
    - SessionService in AgenticGuidance
    - agentic CLI infrastructure

  external:
    - tmux (system package) - INSTALLED
    - Tailscale - INSTALLED (100.101.19.66)
    - SSH server (openssh-server) - INSTALLED

success_criteria:
  - User can run agentic-tmux remote setup on desktop
  - User can get connection info via agentic-tmux network status
  - User can create Claude Code session with agentic-tmux claude-session
  - User can connect from mobile via SSH + tmux attach
  - Sessions persist across disconnects
  - Configuration optimized for mobile screens

future_integration:
  agenticvoice:
    plan_id: 260126AV
    status: deferred
    note: |
      User expressed desire for agenticvoice integration.
      AgenticVoice is planned but blocked on missing services.
      Voice control for tmux sessions can be added once
      AgenticVoice is implemented.
