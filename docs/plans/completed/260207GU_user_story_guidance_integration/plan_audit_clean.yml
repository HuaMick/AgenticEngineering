_template_status: active
plan:
  name: User Story Guidance Integration - Audit & Cleanup
  status: pending
  objective: 'Audit guidance changes for consistency, remove any orphaned references,

    and verify the complete story-first planning chain is intact from

    planning-standard.yml through to executor validation gate.

    '
  phases:
  - name: Phase 1 - Guidance Consistency Audit
    id: audit_01
    status: pending
    tasks:
    - id: audit_01_001
      name: Audit story-first fence propagation chain
      status: completed
      description: 'Verify the complete chain from definition to enforcement:

        1. planning-standard.yml DEFINES the story-first fence

        2. orchestration-planning/process.mmd IMPLEMENTS story discovery checkpoint

        3. orchestration-planning/inputs.yml DOCUMENTS story sourcing requirements

        4. planner-build/process.yml REQUIRES affected_stories identification

        5. planner-reviewer/process.yml VALIDATES story integration

        6. planner-orchestration/process.yml PROPAGATES story metadata to MMD

        7. orchestration-executor/process.yml ENFORCES story validation at gate


        Flag any broken links in this chain.

        '
    - id: audit_01_002
      name: Audit for orphaned or stale references
      status: completed
      description: 'Check for references that may have been invalidated by changes:

        - Old line number references in process.yml descriptions

        - References to removed or renamed sections

        - Duplicate definitions across files (should reference shared source)

        '
    - id: audit_01_003
      name: Verify no scope creep into companion plan territory
      status: completed
      description: 'Verify this plan did NOT modify:

        - modules/AgenticCLI/ (covered by 260207CL)

        - docs/userstories/ schema (covered by 260207CL)

        - Story YAML files directly (test metadata additions are 260207CL scope)

        '
  - name: Phase 2 - Cleanup
    id: audit_02
    status: pending
    tasks:
    - id: audit_02_001
      name: Remove template markers from plan files
      status: completed
      description: 'Ensure all plan files in this folder have _template_status: active
        (not stub).

        Remove any TODO markers that were populated during plan creation.

        '
    - id: audit_02_002
      name: Archive analysis artifacts
      status: completed
      description: 'Move any review_*.yml files to analysis/ subfolder.

        Move any audit_*.yml files to audit/ subfolder.

        Ensure live/ folder contains only active plan files.

        '
  cleanup_targets:
  - 'plan_teach.yml - verify _template_status: active'
  - 'plan_test.yml - verify _template_status: active'
  - 'plan_audit_clean.yml - verify _template_status: active'
  documentation:
  - inputs.yml - verify deliverables list is accurate post-implementation
  - plan_completed.yml - populate with completed items after archiving
