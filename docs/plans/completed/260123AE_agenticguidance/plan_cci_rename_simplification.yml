# Plan: CCI (CLI Context Injection) Rename and Simplification
# Objective: Rename JIT to CCI across all guidance and documentation,
#            and simplify the CLI command pattern.
#
# Created: 2026-01-23
# Agent: planner-guidance
# Plan Folder: 260123AE_agenticguidance

name: "cci-rename-and-simplification"
worktree: "260123AE_agenticguidance"
branch: "main"
status: "completed"
priority: "high"

context: |
  This plan renames "JIT (Just-In-Time) Context" to "CCI (CLI Context Injection)"
  to better reflect the architecture: context is injected via CLI commands.

  Additionally, the CLI command pattern is simplified to a chained approach:
  - `agentic <agent-name>` - Initial instructions (BREAKING CHANGE: was --agent-name)
  - `agentic <agent-name> --bootstrap` - Get inputs and process details
  - Commands chain: each command provides the next CLI commands to run
  - Each command also provides FILE PATHS for source context exploration

  SCOPE: Documentation/guidance updates only (teach phase).
  CLI implementation changes (build phase) are in a separate plan.

# =============================================================================
# INPUTS (Pre-gathered Context)
# =============================================================================
inputs:
  - location: "docs/JIT_CONTEXT_ARCHITECTURE.md"
    description: "Main architecture document - rename JIT to CCI"

  - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Context minimisation guideline - references JIT pattern"

  - location: "modules/AgenticGuidance/assets/guidelines/plan-inputs.yml"
    description: "Plan inputs guideline - references JIT"

  - location: "modules/AgenticCLI/src/agenticcli/commands/context.py"
    description: "CLI context commands - docstrings reference JIT"

  - location: "modules/AgenticCLI/src/agenticcli/cli.py"
    description: "CLI main entry - help text references JIT"

  - location: "modules/AgenticGuidance/README.md"
    description: "Guidance module README - may reference JIT"

# =============================================================================
# SCOPE DISCOVERY
# =============================================================================
scope_analysis:
  files_referencing_jit:
    count: 96
    categories:
      agent_process_files: "26 agents with process.yml referencing JIT bootstrap"
      guidance_definitions: "5+ definitions/guidelines with JIT references"
      plan_files: "Multiple completed plan files (historical - may preserve)"
      documentation: "JIT_CONTEXT_ARCHITECTURE.md, README files"
      cli_code: "context.py, cli.py docstrings and comments"

  rename_scope:
    primary: "JIT Context -> CCI (CLI Context Injection)"
    secondary: "Just-In-Time -> CLI Context Injection"
    preserve: "Historical plan files in completed/ folders (for audit trail)"

# =============================================================================
# OPEN QUESTIONS
# =============================================================================
open_questions:
  - id: "OQ-001"
    question: "Should completed plan files be updated or preserved as historical record?"
    severity: "low"
    status: "ANSWERED"
    answer: "Preserve completed plan files as-is. Only update active guidance and documentation."
    answered_by: "IMPLICIT"
    context: "Historical accuracy matters for audit trail. Completed plans are snapshots."

  - id: "OQ-002"
    question: "Should the CLI command structure change from `agentic --agent-name` to `agentic agent-name`?"
    severity: "medium"
    status: "ANSWERED"
    answer: "Hard switch to positional syntax. Remove -- prefix immediately."
    answered_by: "USER"
    context: |
      Current: agentic --planner-guidance
      Decision: agentic planner-guidance (positional subcommand)

      New command pattern:
      - `agentic planner-build` - Initial instructions
      - `agentic planner-build --bootstrap` - Full context with file paths

      Breaking change accepted. No backwards compatibility period.

# =============================================================================
# LOOP STRUCTURE
# =============================================================================
loop_structures:
  - id: "loop_self_review"
    type: "guidance-self-review-loop"
    applies_to_phase: "Teach Phase"
    trigger: "After guidance updates complete"
    description: |
      Self-review validates that all renamed references are consistent and
      no broken paths were introduced during the rename operation.
    exit_criteria:
      success: "All agents pass self-review with updated CCI references"
      max_iterations: 3
      escalation: "Escalate if rename introduces inconsistencies"
    participants:
      - agent: "teacher-update-guidance"
        role: "executor"
      - agent: "test-guidance-simulator"
        role: "validator"

