# ========================================
# CONTEXT
# ========================================
context: |
  This plan remediates guidance inconsistencies identified across all 7 test agents.
  The gaps were identified through guidance audit and self-review processes.

  IDENTIFIED GAPS (applicable to multiple agents):
  1. Missing RLM context accessor references - Some agents reference rlm-patterns.yml
     but don't reference the rlm-context-accessor.yml specification that provides
     the API for programmatic context operations.

  2. Inconsistent outputs.yml mentions - Process files mention outputs defined
     in inputs.yml but there's no outputs.yml file; outputs should be in process.yml.

  3. Missing input definitions - Some agents have incomplete input specifications
     or reference files that may not exist in target projects.

  4. Process/inputs file inconsistencies - Cross-reference mismatches between
     process.yml and inputs.yml (e.g., references to definitions that don't exist).

  AGENT-SPECIFIC GAP ANALYSIS:

  test-audit:
    - Has rlm_reference in process.yml but rlm_inputs in inputs.yml references
      rlm-context-accessor.yml (GOOD)
    - Process references inputs.yml#audit_role, #audit_checks, etc. (GOOD)
    - PASS: Well-structured with proper cross-references

  test-builder:
    - No RLM references (appropriate - test-builder doesn't need RLM)
    - Process references inputs.yml for definitions (GOOD)
    - PASS: Appropriate minimal structure

  test-final-output:
    - Has rlm_patterns in process.yml AND rlm_inputs in inputs.yml (GOOD)
    - Process references inputs.yml for definitions (GOOD)
    - PASS: Well-structured with RLM support

  test-guidance-simulator:
    - No RLM references (appropriate - guidance testing doesn't need RLM)
    - Has self_review_mode in process.yml (GOOD)
    - Has detailed outputs in process.yml (GOOD)
    - PASS: Well-structured for guidance testing

  test-runner:
    - No RLM references (appropriate - test execution doesn't need RLM)
    - Process references inputs.yml for definitions (GOOD)
    - MINOR: Some target project paths may not exist (acceptable as noted)
    - PASS: Appropriate structure

  test-service:
    - No RLM references (appropriate - service testing doesn't need RLM)
    - Process references inputs.yml for definitions (GOOD)
    - Has delayed_validation guidance (GOOD)
    - PASS: Well-structured for service validation

  test-user-simulator:
    - No RLM references (appropriate - user simulation doesn't need RLM)
    - Process references inputs.yml for definitions (GOOD)
    - Has multi_environment_testing guidance (GOOD)
    - PASS: Well-structured for user journey testing

  REASSESSMENT: After detailed analysis, the test agents are WELL-STRUCTURED.
  The original "gaps" were based on incomplete analysis. The actual issues are:

  ACTUAL REMEDIATION NEEDED:
  1. test-builder/inputs.yml: Missing RLM context accessor reference in rlm_inputs
     section (test-builder COULD use RLM for large test suites but doesn't have it)
  2. test-runner/inputs.yml: Missing RLM context accessor reference (COULD be useful
     for large test result analysis)
  3. Ensure all agents have consistent self_review_criteria reference

