      structure alignment between process.yml and inputs.yml.
    agent_category: "teacher"
    success_criteria:
      - "All process.yml files have consistent structure"
      - "All inputs.yml files reference required shared assets"
      - "RLM-capable agents have proper rlm_inputs section"
      - "Self-review criteria referenced in audit-capable agents"

    tasks:
      # Task 1.1: Add self-review criteria reference to test-audit
      - id: "teach_001"
        name: "Add self-review criteria reference to test-audit inputs"
        description: |
          Ensure test-audit/inputs.yml references self-review-criteria.yml
          in core_inputs section (it currently has inline self_review_criteria
          definition which should reference the canonical file).
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        status: "pending"
        context:
          target_file: "modules/AgenticGuidance/agents/test/test-audit/inputs.yml"
          current_state: "Has inline self_review_criteria definition in definitions section"
          required_changes:
            - "Update self_review_criteria to reference modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
            - "Keep brief inline summary but add 'reference:' field pointing to canonical file"
        acceptance_criteria:
          - "self_review_criteria references self-review-criteria.yml"
          - "No duplicate definitions >50 tokens"
        files:
          - "modules/AgenticGuidance/agents/test/test-audit/inputs.yml"

      # Task 1.2: Add RLM inputs section to test-builder (optional enhancement)
      - id: "teach_002"
        name: "Add optional RLM inputs to test-builder"
        description: |
          Add rlm_inputs section to test-builder/inputs.yml for potential
          use with large test suites. Mark as required: false.
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        status: "pending"
        context:
          target_file: "modules/AgenticGuidance/agents/test/test-builder/inputs.yml"
          current_state: "No rlm_inputs section"
          required_changes:
            - "Add rlm_inputs section after layers section"
            - "Include rlm-patterns.yml and rlm-context-accessor.yml references"
            - "Mark both as required: false"
            - "Add description noting use for large test suites"
        acceptance_criteria:
          - "rlm_inputs section exists with proper references"
          - "Both RLM files referenced with required: false"
        files:
