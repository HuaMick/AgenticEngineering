# ========================================
# LOOP STRUCTURES
# ========================================
loop_structures:
  - id: "loop_teach_validation"
    type: "guidance-self-review-loop"
    applies_to_phase: "Teach Phase"
    trigger: "After guidance updates complete"
    description: |
      Self-review loop to validate guidance updates. Each agent performs
      self-review after its guidance files are updated.
    exit_criteria:
      success: "All 7 agents pass self-review validation"
      max_iterations: 3
      escalation: "Escalate to human reviewer with specific findings"
    participants:
      - agent: "teacher-update-guidance"
        role: "Updates agent process.yml and inputs.yml files"
      - agent: "test-guidance-simulator"
        role: "Validates guidance through self-review"

  - id: "loop_test_validation"
    type: "agent-self-review"
    applies_to_phase: "Test Phase"
    trigger: "After teach phase completes"
    description: |
      Lightweight self-review to validate remediation effectiveness.
      Each agent reviews its own updated guidance.
    exit_criteria:
      success: "All agents report PASS status"
      max_iterations: 2
      escalation: "Report specific failures for manual review"
    participants:
      - agent: "test-guidance-simulator"
        role: "Spawns target agents for self-review validation"

