worktree: /home/code/AgenticEngineering
branch: main
objective: |
  Refactor AgenticEngineering to 3-layer architecture:
  - AgenticGuidance/services/: Business logic (extracted from AgenticCLI workflows)
  - Thin CLI: Presentation layer only (~2k lines)
  - AgenticTmux: Terminal session management
  - AgenticVoice: Voice interface for phone-based planning

  Key decision: Business logic goes into AgenticGuidance/services/ (NOT a separate "Core" module)
  because these services interpret guidance and belong with the guidance they interpret.

phases:
  - phase: 1
    name: "Create AgenticGuidance Services Layer"
    status: completed
    description: |
      Extract business logic from AgenticCLI/workflows/ into AgenticGuidance/services/.
      This becomes the shared service layer for all interfaces.
    tasks:
      - id: AG-001
        name: "Create AgenticGuidance services structure"
        status: completed
        description: |
          Create the services layer with proper Python package structure:
          - modules/AgenticGuidance/services/
          - modules/AgenticGuidance/models/
          - Update pyproject.toml to make it a Python package
        files:
          - modules/AgenticGuidance/services/
          - modules/AgenticGuidance/models/
          - modules/AgenticGuidance/pyproject.toml
          - modules/AgenticGuidance/services/__init__.py
        acceptance_criteria:
          - Module installs with pip install -e
          - Package structure follows existing conventions

      - id: AG-002
        name: "Move context_workflow to context.py service"
        status: completed
        description: |
          Extract MainFirstPlanResolver and context resolution logic to AgenticGuidance/services/.
          This is the largest workflow (594 lines).
        files:
          - modules/AgenticCLI/src/agenticcli/workflows/context_workflow.py
          - modules/AgenticGuidance/services/context.py
        acceptance_criteria:
          - MainFirstPlanResolver moved to AgenticGuidance/services/
          - get_role_process, get_role_inputs_manifest moved
          - All tests pass

      - id: AG-003
        name: "Move plan_workflow to plan.py service"
        status: completed
        description: |
          Extract plan scaffolding, task CRUD, and git safety logic.
        files:
          - modules/AgenticCLI/src/agenticcli/workflows/plan_workflow.py
          - modules/AgenticGuidance/services/plan.py
        acceptance_criteria:
          - Plan scaffolding and validation moved
          - GitSafetyChecker moved
          - All tests pass

      - id: AG-004
        name: "Move remaining workflows to services"
        status: completed
        description: |
          Move config_workflow, task_workflow, state_workflow,
          template_workflow, environment_workflow to AgenticGuidance/services/.
        files:
          - modules/AgenticGuidance/services/config.py
          - modules/AgenticGuidance/services/task.py
          - modules/AgenticGuidance/services/state.py
          - modules/AgenticGuidance/services/template.py
          - modules/AgenticGuidance/services/environment.py
        acceptance_criteria:
          - All workflow files moved to services
          - Shared utilities extracted
          - Data models extracted to models/

      - id: AG-005
        name: "Create comprehensive test suite for AgenticGuidance services"
        status: completed
        description: |
          Move relevant tests from AgenticCLI, add service-level tests.
        files:
          - modules/AgenticGuidance/tests/
        acceptance_criteria:
          - All services have unit tests
          - Tests run independently of AgenticCLI
          - CI passes

  - phase: 2
    name: "Refactor AgenticCLI to Thin Wrapper"
    status: completed
    description: |
      Update AgenticCLI to call AgenticGuidance services instead of local workflows.
      Remove workflows/ directory, keep only presentation logic.
    tasks:
      - id: AG-006
        name: "Update CLI dependencies"
        status: completed
        description: |
          Add agenticguidance as dependency, update imports.
        files:
          - modules/AgenticCLI/pyproject.toml
        acceptance_criteria:
          - agenticguidance in dependencies
          - Package installs correctly

      - id: AG-007
        name: "Refactor command handlers to use AgenticGuidance services"
        status: completed
        description: |
          Update commands/context.py, commands/plan.py, etc. to call
          AgenticGuidance services instead of local workflows.
        files:
          - modules/AgenticCLI/src/agenticcli/commands/
        acceptance_criteria:
          - No imports from agenticcli.workflows
          - All commands call agenticguidance.services
          - CLI behavior unchanged

      - id: AG-008
        name: "Remove workflows directory from AgenticCLI"
        status: completed
        description: |
          Delete workflows/ after all commands updated.
        files:
          - modules/AgenticCLI/src/agenticcli/workflows/
        acceptance_criteria:
          - workflows/ directory removed
          - AgenticCLI reduced to ~2,000 lines
          - All tests pass

  - phase: 3
    name: "Build AgenticTmux Module"
    status: deferred
    deferred_to: 260126AT_agentictmux
    description: |
      Create tmux session management module for terminal-based workflow.
      NOTE: This phase is tracked in detail by 260126AT_agentictmux plan.
    tasks:
      - id: AG-009
        name: "Create AgenticTmux module structure"
        status: pending
        description: |
          Create new module with tmux session management commands.
        files:
          - modules/AgenticTmux/
          - modules/AgenticTmux/pyproject.toml
        acceptance_criteria:
          - Module installs with pip install -e
          - agentic-tmux command available

      - id: AG-010
        name: "Implement session.py service in AgenticGuidance"
        status: pending
        description: |
          Add session.py service to AgenticGuidance for tmux session lifecycle.
        files:
          - modules/AgenticGuidance/services/session.py
        acceptance_criteria:
          - create_session, attach_session, list_sessions
          - Integration with plan.py (session per plan)

      - id: AG-011
        name: "Build tmux session commands"
        status: pending
        description: |
          Implement session create/attach/list/kill commands.
        files:
          - modules/AgenticTmux/src/agentictmux/commands/session.py
        acceptance_criteria:
          - agentic-tmux session create <name>
          - agentic-tmux session attach <name>
          - agentic-tmux session list

  - phase: 4
    name: "Build AgenticVoice Module"
    status: deferred
    deferred_to: 260126AV_agenticvoice
    description: |
      Create voice interface for phone-based planning and control.
      NOTE: This phase is tracked in detail by 260126AV_agenticvoice plan.
    tasks:
      - id: AG-012
        name: "Create AgenticVoice module structure"
        status: pending
        description: |
          Create new module with WebSocket server for phone connection.
        files:
          - modules/AgenticVoice/
          - modules/AgenticVoice/pyproject.toml
        acceptance_criteria:
          - Module installs with pip install -e
          - WebSocket server starts

      - id: AG-013
        name: "Implement voice command routing"
        status: pending
        description: |
          Route voice commands to AgenticGuidance services.
        files:
          - modules/AgenticVoice/src/agenticvoice/commands.py
        acceptance_criteria:
          - Voice commands parsed and routed
          - Responses formatted for TTS

      - id: AG-014
        name: "Integrate with PersonaPlex (optional)"
        status: pending
        description: |
          Optional integration with PersonaPlex for natural voice interaction.
        files:
          - modules/AgenticVoice/src/agenticvoice/personaplex.py
        acceptance_criteria:
          - PersonaPlex connection established
          - Full-duplex voice conversation works
