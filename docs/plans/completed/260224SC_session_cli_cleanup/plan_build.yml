name: session-cli-cleanup
status: completed
priority: medium
worktree_path: /home/code/AgenticEngineering
affected_stories:
  - US-CLI-033  # Inspect Session Health and Logs - renamed health -> healthcheck, added --diagnose
  - US-CLI-034  # Start Ralph Loop - moved from "session ralph" to "session orchestrate ralph"
  - US-CLI-035  # Stop Running Loop - same command path change
  - US-CLI-036  # Monitor Loop Progress - same command path change
context: |
  The `agentic session` command group has accumulated redundancy and misplaced
  commands over time. This plan restructures it for clarity:

  1. The `loop` subcommand is redundant with `ralph` and should be removed.
  2. `ralph` is a meta-orchestration concern and belongs under `orchestrate`.
  3. `status` duplicates what `list` already shows - remove it.
  4. `health` should be renamed `healthcheck` with auto-diagnostic spawn
     made opt-in via `--diagnose` flag (currently it spawns automatically).

  Target structure after cleanup:
    agentic session spawn
    agentic session list
    agentic session stop <id>
    agentic session healthcheck <id> [--diagnose]
    agentic session logs <id>
    agentic session orchestrate planning
    agentic session orchestrate executing
    agentic session orchestrate ralph start/stop/status/next/history

impacted_artifacts:
- artifact_type: cli_module
  artifact_identifier: agenticcli.cli
  impact_type: modification
  description: Remove loop_app, status command; move ralph under orchestrate; rename health to healthcheck
  breaking_change: true
- artifact_type: cli_module
  artifact_identifier: agenticcli.commands.session
  impact_type: modification
  description: Remove cmd_status, rename cmd_health to cmd_healthcheck, add --diagnose flag
  breaking_change: true
- artifact_type: cli_module
  artifact_identifier: agenticcli.commands.loop
  impact_type: deletion
  description: Entire module deleted - redundant with ralph
  breaking_change: true
- artifact_type: cli_module
  artifact_identifier: agenticcli.commands.ralph
  impact_type: minor_modification
  description: Update help text references from "session ralph" to "session orchestrate ralph"
  breaking_change: false
- artifact_type: test_file
  artifact_identifier: test_loop_integration.py, test_loop_stop_idempotency.py
  impact_type: deletion
  description: Tests for removed loop module
  breaking_change: false

phases:
- name: "Phase 1 - Remove loop subcommand group"
  execution: sequential
  description: |
    Delete the loop module and all its CLI registration. The loop commands are
    fully redundant with the ralph commands under session.
  tasks:
  - id: SC_001
    name: Delete loop.py module
    status: completed
    completed_at: '2026-02-26T10:15:00.000000'
    agent: build-python
    description: |
      Delete modules/AgenticCLI/src/agenticcli/commands/loop.py entirely.
      This module is redundant with ralph.py - both provide start/stop/status/history
      for loop execution, but ralph is the canonical implementation backed by
      RalphLoopService.
    target_files:
      - modules/AgenticCLI/src/agenticcli/commands/loop.py
    success_criteria:
      - loop.py no longer exists

  - id: SC_002
    name: Remove loop_app registration from cli.py
    status: completed
    completed_at: '2026-02-26T10:16:00.000000'
    agent: build-python
    description: |
      Remove from cli.py:
      1. The loop_app Typer instance (line ~778-779)
      2. The _loop_handle dispatcher (line ~783-784)
      3. All @loop_app.command decorators and functions: loop_start, loop_stop,
         loop_status, loop_history (lines ~787-845)

      Do NOT touch session_app, orchestrate_app, or ralph_app registrations.
    target_files:
      - modules/AgenticCLI/src/agenticcli/cli.py
    inputs:
      - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
      - No references to loop_app in cli.py
      - No references to _loop_handle in cli.py
      - session_app and orchestrate_app still function correctly

  - id: SC_003
    name: Delete loop-specific tests
    status: completed
    completed_at: '2026-02-26T10:17:00.000000'
    agent: build-python
    description: |
      Delete test files that test the loop module:
      - modules/AgenticCLI/tests/test_loop_integration.py
      - modules/AgenticCLI/tests/test_loop_stop_idempotency.py

      Check test_session_commands.py and other test files for any loop-related
      test cases that reference "session loop" commands. Remove those test cases
      but keep the rest of the file intact.
    target_files:
      - modules/AgenticCLI/tests/test_loop_integration.py
      - modules/AgenticCLI/tests/test_loop_stop_idempotency.py
      - modules/AgenticCLI/tests/test_session_commands.py
    success_criteria:
      - No test files reference "session loop" commands
      - Remaining tests still pass

- name: "Phase 2 - Move ralph under orchestrate"
  execution: sequential
  description: |
    Move the ralph Typer app from being a direct child of session_app to being
    nested under orchestrate_app. This changes the command path from
    `agentic session ralph ...` to `agentic session orchestrate ralph ...`.
  tasks:
  - id: SC_004
    name: Re-parent ralph_app under orchestrate_app in cli.py
    status: completed
    completed_at: '2026-02-26T10:18:00.000000'
    agent: build-python
    description: |
      In cli.py, change the ralph registration:

      BEFORE (line ~614-615):
        from agenticcli.commands.ralph import app as ralph_app
        session_app.add_typer(ralph_app, name="ralph")

      AFTER:
        from agenticcli.commands.ralph import app as ralph_app
        orchestrate_app.add_typer(ralph_app, name="ralph")

      The import stays the same; only the parent changes from session_app
      to orchestrate_app. The orchestrate_app is already defined at line ~723.
    target_files:
      - modules/AgenticCLI/src/agenticcli/cli.py
    inputs:
      - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
      - ralph_app is registered under orchestrate_app, not session_app
      - '"agentic session orchestrate ralph status" resolves correctly'

  - id: SC_005
    name: Update ralph.py help text and references
    status: completed
    completed_at: '2026-02-26T10:19:00.000000'
    agent: build-python
    description: |
      Update ralph.py command help text and any hardcoded command references:
      1. In start() function, update "Use 'agentic session ralph stop'" to
         "Use 'agentic session orchestrate ralph stop'"
      2. In history() function, update "agentic session ralph start" to
         "agentic session orchestrate ralph start"
      3. Update module docstring if it references command paths

      Search for all occurrences of "session ralph" and replace with
      "session orchestrate ralph".
    target_files:
      - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    inputs:
      - modules/AgenticCLI/src/agenticcli/commands/ralph.py
    success_criteria:
      - No references to "session ralph" in ralph.py (all updated to "session orchestrate ralph")

  - id: SC_006
    name: Update ralph test expectations
    status: completed
    completed_at: '2026-02-26T10:20:00.000000'
    agent: build-python
    description: |
      Update test_ralph_commands.py and any other tests that reference the
      old "session ralph" command path to use "session orchestrate ralph".

      Also update .claude/agents/orchestration-executor.md if it references
      ralph command paths.
    target_files:
      - modules/AgenticCLI/tests/test_ralph_commands.py
      - .claude/agents/orchestration-executor.md
    inputs:
      - modules/AgenticCLI/tests/test_ralph_commands.py
    success_criteria:
      - All test references updated to "session orchestrate ralph"
      - Tests pass

