- name: "Phase 4 - Rename health to healthcheck with --diagnose flag"
  execution: sequential
  description: |
    Rename the `health` command to `healthcheck` and make diagnostic planner
    auto-spawn opt-in via `--diagnose` flag. Without the flag, the command is
    purely read-only: it shows health signals and verdict but never spawns.
  tasks:
  - id: SC_010
    name: Rename cmd_health to cmd_healthcheck in session.py
    status: completed
    completed_at: '2026-02-26T10:24:00.000000'
    agent: build-python
    description: |
      In session.py:
      1. Rename cmd_health to cmd_healthcheck
      2. Add `diagnose` parameter read from args:
         diagnose = getattr(args, "diagnose", False)
      3. Guard auto-spawn logic behind `if diagnose:` - currently (lines ~1313-1354)
         the diagnostic planner spawns unconditionally when stale/unhealthy. Wrap
         those spawn calls so they only execute when diagnose=True.
      4. Update handle() routing: change "health" to "healthcheck"
      5. Update the usage message in handle()'s else branch
    target_files:
      - modules/AgenticCLI/src/agenticcli/commands/session.py
    inputs:
      - modules/AgenticCLI/src/agenticcli/commands/session.py
    success_criteria:
      - Function is named cmd_healthcheck
      - Diagnostic spawn only happens when diagnose=True
      - handle() routes "healthcheck" (not "health")

  - id: SC_011
    name: Rename health command to healthcheck in cli.py
    status: completed
    completed_at: '2026-02-26T10:24:30.000000'
    agent: build-python
    description: |
      In cli.py:
      1. Rename @session_app.command("health") to @session_app.command("healthcheck")
      2. Rename the function from session_health to session_healthcheck
      3. Add --diagnose flag:
         diagnose: Annotated[bool, typer.Option("--diagnose", help="Auto-spawn diagnostic planner for unhealthy sessions")] = False
      4. Pass diagnose=diagnose in the _session_handle _ns() call
      5. Update session_command value from "health" to "healthcheck"
    target_files:
      - modules/AgenticCLI/src/agenticcli/cli.py
    inputs:
      - modules/AgenticCLI/src/agenticcli/cli.py
    success_criteria:
      - Command is registered as "healthcheck"
      - --diagnose flag is available
      - session_command passed is "healthcheck"

  - id: SC_012
    name: Update healthcheck-related tests
    status: completed
    completed_at: '2026-02-26T10:25:00.000000'
    agent: build-python
    description: |
      Update test_session_commands.py and any tests that reference "session health"
      to use "session healthcheck". Also verify that tests exist for both the
      --diagnose and no-diagnose paths.
    target_files:
      - modules/AgenticCLI/tests/test_session_commands.py
    success_criteria:
      - All references updated from "session health" to "session healthcheck"
      - Tests cover both --diagnose and default (no diagnose) behavior

