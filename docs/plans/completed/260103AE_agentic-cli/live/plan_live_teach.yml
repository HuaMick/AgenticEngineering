# AgenticCLI Core Implementation Plan
# Planning phase for base CLI infrastructure and command structure

plan:
  name: "AgenticCLI Core Implementation"
  worktree: /home/code/AgenticEngineering-agentic-cli
  branch: agentic-cli
  status: completed
  created: "2026-01-03"
  completed_date: "2026-01-03"

  objective: |
    Build a CLI tool for AgenticEngineering that supports subagents by automating
    repetitive tasks they currently perform manually. Reference implementation:
    modules/legacy/MyAgents/projects/MyAgentsBackend/src/myagents/frontend/cli

  scope:
    includes:
      - CLI scaffolding with entry point and argparse structure
      - Worktree management commands (create, list, remove)
      - Plan management commands (scaffold, status, validate, complete)
      - Configuration and preferences management
      - Package management (update, rebuild)
    excludes:
      - GCP toolkit integration
      - LangSmith integration
      - LangGraph Studio commands
      - Relay/Remote service commands
      - Agent execution (chat) - deferred to later phase

  phases: []

  # Individual feature plans are in separate files for granular tracking
  feature_plans:
    - path: "live/feature_01_cli_scaffold.yml"
      description: "CLI scaffolding and entry point"
      priority: 1

    - path: "live/feature_02_worktree.yml"
      description: "Worktree management commands"
      priority: 2

    - path: "live/feature_03_plan_management.yml"
      description: "Plan management commands"
      priority: 3

    - path: "live/feature_04_config.yml"
      description: "Configuration and preferences"
      priority: 4

    - path: "live/feature_05_package.yml"
      description: "Package management commands"
      priority: 5

    - path: "live/feature_06_cli_extension.yml"
      description: "CLI extensions to support subagents"
      priority: 6
