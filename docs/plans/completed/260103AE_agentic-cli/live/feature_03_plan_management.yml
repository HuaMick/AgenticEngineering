# Feature 03: Plan Management
# Commands to manage planning folders and track plan state

feature:
  name: "Plan Management Commands"
  priority: 3
  status: completed
  completed_date: "2026-01-03"
  estimated_effort: high

  description: |
    Automates planning folder operations currently done manually by planner agents.
    Enables agents to call CLI commands instead of manually reading/writing YAML.

  reference:
    agents:
      - "modules/AgenticGuidance/agents/planner/planner-build"
      - "modules/AgenticGuidance/agents/planner/planner-test"
      - "modules/AgenticGuidance/agents/planner/planner-cleaning"
    definitions: "modules/AgenticGuidance/assets/definitions/plans.yml"
    examples: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/"

  commands:
    - name: "plan scaffold"
      usage: "agentic plan scaffold <folder-name> [--worktree <path>]"
      description: "Create planning folder structure without worktree"
      steps:
        - "Create docs/plans/live/<folder-name>/"
        - "Create live/ and completed/ subdirectories"
        - "Initialize 4 placeholder YAML files"
        - "Populate plan_live_teach.yml with metadata"

    - name: "plan status"
      usage: "agentic plan status [<plan-path>]"
      description: "Show plan status and task completion summary"
      steps:
        - "Find active plan (in current worktree if not specified)"
        - "Parse all phase files in live/"
        - "Count pending/in_progress/completed tasks"
        - "Display summary table"

    - name: "plan validate"
      usage: "agentic plan validate <plan-path>"
      description: "Validate plan folder structure and YAML syntax"
      steps:
        - "Check folder has live/ and completed/ subdirectories"
        - "Check required files exist"
        - "Validate YAML syntax in all files"
        - "Check input references resolve"
        - "Report issues with locations"

    - name: "plan task"
      usage: "agentic plan task <start|complete> <task-id> [--plan <path>]"
      description: "Update task status in plan files"
      steps:
        - "Find task by ID across phase files"
        - "Update status field"
        - "If completing, move to plan_completed.yml"

    - name: "plan archive"
      usage: "agentic plan archive <plan-path>"
      description: "Copy plan to completed/ folder"
      steps:
        - "Copy folder to docs/plans/completed/"
        - "Keep original in docs/plans/live/"
        - "Update metadata with completion timestamp"

  implementation_steps:
    - id: "03.1"
      task: "Add plan subparser"
      status: completed
      details: |
        Add 'plan' subparser with scaffold/status/validate/task/archive subcommands
        Pattern: nested subparsers for task start/complete

    - id: "03.2"
      task: "Implement plan scaffold"
      status: completed
      details: |
        Reuse scaffolding function from worktree create
        Allow standalone use without worktree
        Accept custom folder name

    - id: "03.3"
      task: "Implement plan status"
      status: completed
      details: |
        Parse YAML files in live/ directory
        Count tasks by status
        Display formatted summary
        Auto-detect plan from current worktree

    - id: "03.4"
      task: "Implement plan validate"
      status: completed
      details: |
        Check folder structure
        Validate YAML syntax (use yaml.safe_load)
        Check required sections present
        Validate input references

    - id: "03.5"
      task: "Implement plan task"
      status: completed
      details: |
        Find task across all phase files
        Update status field
        Move completed tasks to plan_completed.yml
        Preserve other task fields

    - id: "03.6"
      task: "Implement plan archive"
      status: completed
      details: |
        Copy (not move) folder to completed/
        Update completion metadata
        Follow copy-not-move pattern from plans.yml

  success_criteria:
    - "`agentic plan scaffold 260103AE_test` creates valid plan folder"
    - "`agentic plan status` shows accurate task counts"
    - "`agentic plan validate <path>` detects missing files"
    - "`agentic plan task complete 01.1` moves task to completed"
    - "`agentic plan archive <path>` copies to completed/"

  agent_offload:
    current_agents:
      - "planner-build"
      - "planner-test"
      - "planner-cleaning"
    manual_steps_eliminated:
      - "Reading and parsing YAML files"
      - "Task status updates across files"
      - "Moving completed items between files"
      - "Folder structure validation"
      - "Lifecycle state management"
    new_agent_workflow: |
      Agent calls CLI for file operations:
      - `agentic plan scaffold` for new plans
      - `agentic plan task start/complete` for status updates
      - `agentic plan archive` for completion
      Agent focuses on planning decisions, not file manipulation.
