# AgenticCLI Test Plan
# Test phases for validating CLI functionality

plan:
  name: "AgenticCLI Test Phases"
  worktree: /home/code/AgenticEngineering-agentic-cli
  branch: agentic-cli
  status: completed
  completed_date: "2026-01-03"

  phases:
    - id: "manual-01"
      name: "Manual CLI Testing"
      status: completed
      completed_date: "2026-01-03"
      tests:
        - command: "agentic --help"
          status: passed
          notes: "Clean, well-formatted help message with all commands"
        - command: "agentic --version"
          status: passed
          notes: "Returns agentic 0.1.0"
        - command: "agentic worktree list"
          status: passed
          notes: "Formatted table showing worktrees and plan folders"
        - command: "agentic plan status"
          status: passed
          notes: "Shows task counts per feature, progress percentage"
        - command: "agentic plan validate"
          status: passed
          notes: "Reports validation results correctly"
        - command: "agentic config show"
          status: passed
          notes: "Displays config from ~/.config/agenticcli/"
        - command: "agentic config list"
          status: passed
          notes: "Shows preferences with proper YAML formatting"
        - command: "agentic template generate build"
          status: passed
          notes: "Generates complete template with context injection"
        - command: "agentic template generate test"
          status: passed
          notes: "Generates test template with proper structure"
        - command: "agentic inputs --help"
          status: passed
          notes: "Shows validate/resolve subcommands"
        - command: "agentic stories --help"
          status: passed
          notes: "Shows find subcommand"
        - command: "agentic manifest --help"
          status: passed
          notes: "Shows show subcommand"
        - command: "agentic cicd audit"
          status: passed
          notes: "Expected error - no CI/CD config in repo yet"

  test_strategy:
    - type: "unit"
      scope: "Individual command handlers"
      location: "tests/unit/"

    - type: "integration"
      scope: "Command execution with file system"
      location: "tests/integration/"

    - type: "e2e"
      scope: "Full CLI invocation"
      location: "tests/e2e/"

  test_results:
    total_tests: 13
    passed: 12
    expected_errors: 1
    failed: 0
    notes: |
      All commands execute successfully with no crashes.
      Help messages are clear and well-formatted.
      Output formatting is consistent and readable.
      Template generation works correctly with context-aware values.
      Error messages are informative.

  future_enhancements:
    - "Consider adding color output for better readability"
    - "Add --json flag for scripting support"
    - "Consider progress bars for long-running operations"
    - "Add command aliases (e.g., agentic wt for agentic worktree)"
