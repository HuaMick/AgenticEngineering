    task_id: "12.18"
    status: pending
    estimated_effort: "1-2 hours"
    depends_on: ["phase-2"]

    objective: |
      Replace hardcoded story paths with a tiered discovery mechanism,
      similar to TieredConfigLoader. Support project-local, module, and
      global story locations.

    inputs:
      - path: "modules/AgenticCLI/src/agenticcli/commands/stories.py"
        description: "Current stories command - refactor discovery"
      - path: "modules/AgenticCLI/src/agenticcli/workflows/config_workflow.py"
        description: "TieredConfigLoader pattern reference"

    implementation_steps:
      - id: "4.1"
        title: "Create StoryDiscovery workflow"
        description: |
          Create src/agenticcli/workflows/story_workflow.py with:

          @dataclass
          class StoryLocation:
              path: Path
              source: str  # 'project', 'module', 'global'
              priority: int

          @dataclass
          class StoryDiscovery:
              """Tiered story location discovery."""
              project_root: Path | None = None
              config_dir: Path | None = None

              def get_search_locations(self) -> list[StoryLocation]:
                  """Get ordered list of story locations to search.

                  Priority (highest first):
                  1. Project stories: <project>/userstories/
                  2. Project stories: <project>/stories/
                  3. Module stories: <project>/modules/*/userstories/
                  4. Global stories: ~/.config/agenticcli/stories/
                  """

              def discover_stories(self, filters: dict | None = None) -> list[dict]:
                  """Find all stories across all tiers."""

              def get_story_by_id(self, story_id: str) -> dict | None:
                  """Find a specific story by ID."""
        files:
          - action: create
            path: "modules/AgenticCLI/src/agenticcli/workflows/story_workflow.py"

      - id: "4.2"
        title: "Add story configuration to TieredConfigLoader"
        description: |
          Extend DEFAULT_CONFIG in config_workflow.py:

          DEFAULT_CONFIG = {
              ...
              "stories": {
                  "search_paths": [],  # Additional custom paths
                  "file_patterns": ["*.yml", "*.yaml"],
                  "exclude_patterns": ["*_template.yml"],
              },
          }

          Add ENV_VAR_MAPPING:
          - AGENTIC_STORIES_PATH -> stories.search_paths (colon-separated)
        files:
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/workflows/config_workflow.py"

      - id: "4.3"
        title: "Refactor stories command to use discovery"
        description: |
