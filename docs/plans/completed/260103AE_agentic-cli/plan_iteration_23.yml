# =============================================================================
# PHASE 1: Environment Injection Infrastructure (Task 12.15)
# =============================================================================
phases:
  - id: "phase-1"
    name: "Context-Aware Environment Injection"
    task_id: "12.15"
    status: pending
    estimated_effort: "3-4 hours"

    objective: |
      Implement a secure environment provider that injects secrets and configuration
      directly into subprocesses at runtime. Key requirements:
      - No .env file creation (in-memory only)
      - Integration with TieredConfigLoader for secret sources
      - Support for secret masking in logs
      - Compatible with tools that expect environment variables

    inputs:
      - path: "modules/AgenticCLI/src/agenticcli/workflows/config_workflow.py"
        description: "TieredConfigLoader - use for config/secret sources"
      - path: "modules/AgenticCLI/src/agenticcli/context.py"
        description: "CLIContext - add environment provider methods"
      - path: "modules/AgenticCLI/src/agenticcli/logging.py"
        description: "Logging setup - add secret masking capability"

    implementation_steps:
      - id: "1.1"
        title: "Create EnvironmentProvider workflow"
        description: |
          Create src/agenticcli/workflows/environment_workflow.py with:

          @dataclass
          class SecretValue:
              name: str
              value: str
              source: ConfigSource  # From config_workflow
              masked: bool = True

          @dataclass
          class EnvironmentProvider:
              """In-memory environment variable provider for subprocess execution."""
              config_loader: TieredConfigLoader
              secrets: dict[str, SecretValue] = field(default_factory=dict)

              def load_from_config(self) -> None:
                  """Load env vars from tiered config (secrets.* keys)."""

              def load_from_env_file(self, path: Path, in_memory_only: bool = True) -> None:
                  """Parse .env file but only store in memory, never write."""

              def get_subprocess_env(self) -> dict[str, str]:
                  """Return env dict suitable for subprocess.run(env=...)."""

              def get_masked_env(self) -> dict[str, str]:
                  """Return env dict with secret values masked for logging."""

              def inject(self, command: list[str], **kwargs) -> subprocess.CompletedProcess:
                  """Execute command with injected environment."""
        files:
          - action: create
            path: "modules/AgenticCLI/src/agenticcli/workflows/environment_workflow.py"

      - id: "1.2"
        title: "Add secrets configuration to TieredConfigLoader"
        description: |
          Extend DEFAULT_CONFIG in config_workflow.py:

          DEFAULT_CONFIG = {
              ...
              "secrets": {
                  "mask_in_logs": True,
                  "sources": ["env", "config"],  # Load order
              },
              "environment": {
                  "inherit_parent": True,  # Inherit parent process env
                  "allowed_prefixes": ["AGENTIC_", "GIT_", "HOME", "PATH", "USER"],
              },
          }

          Add ENV_VAR_MAPPING entries:
          - AGENTIC_SECRET_* -> secrets.custom.*
        files:
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/workflows/config_workflow.py"

      - id: "1.3"
        title: "Add secret masking to logging"
        description: |
          Extend logging.py with secret masking filter:

          class SecretMaskingFilter(logging.Filter):
              """Masks secret values in log output."""
              def __init__(self, secrets: set[str]):
                  self.secrets = secrets

              def filter(self, record: logging.LogRecord) -> bool:
                  for secret in self.secrets:
                      if secret in str(record.msg):
                          record.msg = str(record.msg).replace(secret, "***")
                  return True

          def register_secrets_for_masking(secrets: set[str]) -> None:
              """Register secret values to be masked in all log output."""
        files:
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/logging.py"

      - id: "1.4"
        title: "Add environment provider to CLIContext"
        description: |
          Extend context.py with:

          @property
          def environment_provider(self) -> EnvironmentProvider:
              """Get environment provider for subprocess execution."""
              from agenticcli.workflows.environment_workflow import EnvironmentProvider
              return EnvironmentProvider(config_loader=self.get_tiered_config())

          def run_with_env(self, command: list[str], **kwargs) -> subprocess.CompletedProcess:
              """Run subprocess with injected environment from config."""
              return self.environment_provider.inject(command, **kwargs)
        files:
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/context.py"

      - id: "1.5"
        title: "Create env command group"
        description: |
          Create commands/env.py with subcommands:

          - agentic env show
            Shows current environment configuration (with secrets masked)

          - agentic env export --format=shell|json
            Exports env vars in shell or JSON format (for debugging)
            NEVER exports actual secret values - shows placeholder

          - agentic env run -- <command>
            Runs a command with the injected environment
            Example: agentic env run -- python script.py
        files:
          - action: create
            path: "modules/AgenticCLI/src/agenticcli/commands/env.py"
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/cli.py"

    tests:
      - path: "modules/AgenticCLI/tests/test_environment.py"
        scenarios:
          - "EnvironmentProvider loads secrets from config"
          - "EnvironmentProvider parses .env file in-memory only"
          - "get_subprocess_env() returns complete env dict"
          - "get_masked_env() replaces secret values with ***"
          - "inject() passes env to subprocess"
          - "SecretMaskingFilter masks secrets in log messages"
          - "Parent environment inheritance (when configured)"
          - "Allowed prefix filtering"
          - "env show command output (masked)"
          - "env export --format=shell output"
          - "env export --format=json output"
          - "env run executes command with injected env"
          - "JSON output mode for env commands"
          - "No .env files created during any operation"
        estimated_count: 15-18

    success_criteria:
      - "EnvironmentProvider loads from TieredConfigLoader"
      - "Secrets are never written to disk"
      - "Secret values are masked in all log output"
      - "'agentic env show' displays masked env configuration"
      - "'agentic env run' executes commands with correct env"
      - "All tests pass (target: 15+ tests)"

    user_validation:
      - command: "agentic env show"
        expected: "Shows environment configuration with secrets masked as ***"
      - command: "agentic --json env show"
        expected: "JSON output with masked secret values"
      - command: "agentic env run -- echo $HOME"
        expected: "Runs echo with inherited HOME variable"
      - command: "agentic env export --format=shell"
        expected: "Outputs shell export statements with placeholder secrets"

