# =============================================================================
  - id: "phase-3"
    name: "Multi-Provider CI/CD Auditing"
    task_id: "12.18"
    status: pending
    estimated_effort: "2-3 hours"
    depends_on: ["phase-2"]

    objective: |
      Extend CI/CD auditing to support multiple providers (GitHub Actions,
      Cloud Build, CircleCI) through a plugin-like architecture.

    inputs:
      - path: "modules/AgenticCLI/src/agenticcli/commands/cicd.py"
        description: "Current cicd command - extend with provider plugins"

    implementation_steps:
      - id: "3.1"
        title: "Create CI/CD provider abstraction"
        description: |
          Create src/agenticcli/workflows/cicd_workflow.py with:

          from abc import ABC, abstractmethod

          class CICDProvider(ABC):
              """Abstract base for CI/CD configuration providers."""

              @abstractmethod
              def detect(self, project_root: Path) -> bool:
                  """Return True if this provider's config exists."""

              @abstractmethod
              def parse_config(self, project_root: Path) -> dict:
                  """Parse the provider's configuration."""

              @abstractmethod
              def get_test_steps(self, config: dict) -> list[dict]:
                  """Extract test steps from configuration."""

              @abstractmethod
              def get_build_steps(self, config: dict) -> list[dict]:
                  """Extract build steps from configuration."""

          class CloudBuildProvider(CICDProvider):
              """Google Cloud Build provider (cloudbuild.yaml)."""

          class GitHubActionsProvider(CICDProvider):
              """GitHub Actions provider (.github/workflows/*.yml)."""

          class CircleCIProvider(CICDProvider):
              """CircleCI provider (.circleci/config.yml)."""

          @dataclass
          class CICDWorkflow:
              """Multi-provider CI/CD auditing workflow."""
              providers: list[CICDProvider] = field(default_factory=list)

              def __post_init__(self):
                  if not self.providers:
                      self.providers = [
                          CloudBuildProvider(),
                          GitHubActionsProvider(),
                          CircleCIProvider(),
                      ]

              def detect_provider(self, project_root: Path) -> CICDProvider | None:
                  """Detect which CI/CD provider is configured."""

              def audit(self, project_root: Path) -> dict:
                  """Run full audit across all detected providers."""
        files:
          - action: create
            path: "modules/AgenticCLI/src/agenticcli/workflows/cicd_workflow.py"

      - id: "3.2"
        title: "Implement GitHub Actions provider"
        description: |
          GitHubActionsProvider implementation:
          - Detect .github/workflows/*.yml files
          - Parse workflow files, extract jobs and steps
          - Identify test steps (pytest, npm test, etc.)
          - Map 'runs-on' to platform info
          - Handle matrix builds

          Special handling:
          - Multi-file workflows (combine results)
          - Reusable workflows (detect, note in audit)
          - Composite actions (note as external dependency)

      - id: "3.3"
        title: "Implement CircleCI provider"
        description: |
          CircleCIProvider implementation:
          - Detect .circleci/config.yml
          - Parse orbs, jobs, and workflows sections
          - Identify test jobs and steps
          - Handle workflow dependencies

          Special handling:
          - Orb usage (note as external dependency)
          - Caching configuration
          - Parallelism settings

      - id: "3.4"
        title: "Refactor cicd command to use providers"
        description: |
          Update commands/cicd.py:
          - Use CICDWorkflow for provider detection and parsing
          - Support --provider flag to force specific provider
          - Enhanced audit output showing provider-specific details
          - Add 'cicd providers' subcommand to list detected providers

          New usage:
            agentic cicd audit                    # Auto-detect provider
            agentic cicd audit --provider github  # Force GitHub Actions
            agentic cicd providers                # List detected providers
        files:
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/commands/cicd.py"

    tests:
      - path: "modules/AgenticCLI/tests/test_cicd_providers.py"
        scenarios:
          - "CloudBuildProvider detects cloudbuild.yaml"
          - "CloudBuildProvider parses steps correctly"
          - "GitHubActionsProvider detects .github/workflows/"
          - "GitHubActionsProvider handles multiple workflow files"
          - "GitHubActionsProvider extracts test jobs"
          - "CircleCIProvider detects .circleci/config.yml"
          - "CircleCIProvider parses jobs and workflows"
          - "CICDWorkflow auto-detects provider"
          - "cicd audit uses correct provider"
          - "cicd audit --provider forces specific provider"
          - "cicd providers lists detected providers"
          - "JSON output for all cicd commands"
        estimated_count: 12-15

    success_criteria:
      - "Three CI/CD providers implemented (Cloud Build, GitHub, CircleCI)"
      - "Provider auto-detection works correctly"
      - "'agentic cicd audit' works with any provider"
      - "'agentic cicd providers' lists available providers"
      - "All tests pass (target: 12+ tests)"

    user_validation:
      - command: "agentic cicd providers"
        expected: "Lists detected CI/CD providers in project"
      - command: "agentic cicd audit"
