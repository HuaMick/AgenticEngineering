          Create src/agenticcli/workflows/template_workflow.py with:

          @dataclass
          class TemplateWorkflow:
              """Jinja2-based template rendering for plan generation."""

              template_dirs: list[Path] = field(default_factory=list)
              env: jinja2.Environment = field(init=False)

              def __post_init__(self):
                  self.env = jinja2.Environment(
                      loader=jinja2.FileSystemLoader(self.template_dirs),
                      autoescape=False,  # YAML output
                      trim_blocks=True,
                      lstrip_blocks=True,
                  )
                  self._register_filters()

              def _register_filters(self):
                  """Register custom filters for plan generation."""
                  self.env.filters['date_format'] = self._date_format
                  self.env.filters['slugify'] = self._slugify
                  self.env.filters['yaml_safe'] = self._yaml_safe

              def render(self, template_name: str, context: dict) -> str:
                  """Render a template with given context."""

              def render_string(self, template_str: str, context: dict) -> str:
                  """Render a template string (for inline templates)."""

              def list_templates(self) -> list[dict]:
                  """List available templates with metadata."""
        files:
          - action: create
            path: "modules/AgenticCLI/src/agenticcli/workflows/template_workflow.py"

