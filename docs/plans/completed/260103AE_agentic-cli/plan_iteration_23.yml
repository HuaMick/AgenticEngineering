          - Show source location for each story
          - Add --source filter (project, module, global)
          - Enhanced output showing story tier

          New output format:
            US-INSTALL-001: Installation smoke test [project]
            US-CLI-001: CLI help command [module: AgenticGuidance]
        files:
          - action: modify
            path: "modules/AgenticCLI/src/agenticcli/commands/stories.py"

    tests:
      - path: "modules/AgenticCLI/tests/test_story_discovery.py"
        scenarios:
          - "StoryDiscovery finds project stories"
          - "StoryDiscovery finds module stories"
          - "StoryDiscovery respects priority order"
          - "Custom search paths from config"
