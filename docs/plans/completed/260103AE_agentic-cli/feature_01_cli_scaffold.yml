# Feature 01: CLI Scaffolding
# Foundation layer for the AgenticCLI command structure

feature:
  name: "CLI Scaffolding and Entry Point"
  priority: 1
  status: completed
  completed_date: "2026-01-03"
  estimated_effort: medium

  description: |
    Establish the foundational CLI structure based on the legacy myagents CLI pattern.
    Creates the entry point, main CLI module, and argparse framework.

  reference:
    legacy_cli: "modules/legacy/MyAgents/projects/MyAgentsBackend/src/myagents/frontend/cli"
    files:
      - entry.py: "Entry point with project detection and routing"
      - myagents_cli.py: "Main CLI implementation (reference only)"
      - __init__.py: "Package initialization"

  deliverables:
    - name: "Package structure"
      path: "modules/AgenticCLI/src/agenticcli/"
      files:
        - __init__.py
        - entry.py
        - cli.py

    - name: "pyproject.toml"
      path: "modules/AgenticCLI/pyproject.toml"
      description: "Package configuration with console script entry point"

  implementation_steps:
    - id: "01.1"
      task: "Create package directory structure"
      status: completed
      details: |
        Create src/agenticcli/ with __init__.py
        Follow src-layout pattern for package structure

    - id: "01.2"
      task: "Create entry point"
      status: completed
      details: |
        Create entry.py with main() function
        Minimal implementation: help and version only
        Pattern: Handle --help/-h and --version early before any imports

    - id: "01.3"
      task: "Create main CLI module"
      status: completed
      details: |
        Create cli.py with argparse parser setup
        Define run_cli() function called by entry.py
        Setup subparsers framework for future commands

    - id: "01.4"
      task: "Create pyproject.toml"
      status: completed
      details: |
        Define package metadata
        Set console script entry point: agentic = agenticcli.entry:main
        Minimal dependencies: none initially

    - id: "01.5"
      task: "Verify installation"
      status: completed
      details: |
        Install in development mode: uv pip install -e .
        Verify `agentic --help` works
        Verify `agentic --version` works

  success_criteria:
    - "`agentic --help` displays usage information"
    - "`agentic --version` displays version"
    - "Package installs without errors"

  patterns_from_legacy:
    - "Lazy imports for startup performance"
    - "Separate entry.py for routing, cli.py for implementation"
    - "Global state for project context"
    - "Consistent argparse subparser structure"
