execution_notes: |
  TESTING LAYERS (planner decision):
  - Local: Always test (validates developer workflow)
  - Docker: Skip for unit/integration (no infrastructure changes)
  - Cloud Build: Skip (no CI/CD changes)

  UAT IS PRIMARY SUCCESS CRITERIA:
  - Unit and integration tests validate implementation correctness
  - UAT validates that features actually solve user problems
  - All 5 user stories must pass for plan to be considered complete

  AUDIT IS MANDATORY:
  - Cannot skip test-audit-fix-loop phase (T5)
  - Must catch reward hacking before UAT
  - Must validate test quality and coverage

  LOOP EXECUTION ORDER:
  1. test-fix-loop (T1: scaffold tests)
  2. test-fix-loop (T2: prompt & spawn tests)
  3. test-fix-loop (T3: orchestration & builder tests)
  4. test-fix-loop (T4: end-to-end integration)
  5. audit-test-fix-loop (T5: MANDATORY)
  6. user-story-validation-loop (T6: MANDATORY - primary success)

  DEPENDENCY NOTE:
  - 260208CF must complete before T4 and T6 phases run
  - T1-T3 can use mocked plan init and run before 260208CF completes
  - T4 e2e and T6 UAT require correct plan init folder naming
