phases:
  - name: "Implementation"
    status: "completed"
    execution: sequential
    description: |
      Implement ExecutionRunner, CLI command, command handler, and documentation.
      All three layers: domain (ExecutionRunner), workflow (_run_executing_loop),
      and entrypoint (orchestrate_app.command("executing")).

    tasks:
      - id: "build-001"
        name: "Update orchestration_executor.md documentation"
        status: "completed"
        completed_date: "2026-02-22"
        inputs:
          - docs/prompts/orchestration_executor.md
        target_files:
          - "docs/prompts/orchestration_executor.md"
        guidance: |
          Update docs to reflect deterministic Python ExecutionRunner architecture.
          Remove references to --mode executor. Document CLI options and MMD source of truth.
        success_criteria:
          - "Documentation describes deterministic ExecutionRunner, not meta-LLM agent"
          - "All CLI options documented (--plan, --background, --max-iterations, etc.)"
          - "MMD as source of truth for phase ordering, routing, status is explained"

      - id: "build-002"
        name: "Implement ExecutionRunner in workflows/orchestration.py"
        status: "completed"
        completed_date: "2026-02-22"
        inputs:
          - modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
          - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
        target_files:
          - "modules/AgenticCLI/src/agenticcli/workflows/orchestration.py"
        guidance: |
          Add ExecutionRunner class with:
          - run() method with discovery mode and single-plan mode
          - _execute_plan() for sequential phase execution
          - _find_next_pending_phase() respecting PHASES order
          - _run_phase() spawning agents via agentic session spawn
          - _check_feedback_triggers() for failure recovery
          Also add to OrchestrationWorkflow:
          - update_mmd_status() for in-place MMD STATUS field mutation
          - discover_plans_needing_execution() for plan discovery
        success_criteria:
          - "ExecutionRunner.run() processes plans with pending MMD phases"
          - "Phases are executed sequentially in PHASES order"
          - "MMD STATUS is updated to in_progress, then completed/failed per phase"
          - "FEEDBACK_TRIGGERS cause phase re-runs on failure"
          - "Health check runs before execution starts"

      - id: "build-003"
        name: "Expose executing command in CLI and command handler"
        status: "completed"
        completed_date: "2026-02-22"
        inputs:
          - modules/AgenticCLI/src/agenticcli/cli.py
          - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
        target_files:
          - "modules/AgenticCLI/src/agenticcli/cli.py"
          - "modules/AgenticCLI/src/agenticcli/commands/orchestrate.py"
        guidance: |
          Register @orchestrate_app.command("executing") in cli.py with same flags
          as planning (--plan, --background, --max-iterations, --completion-promise,
          --project, --directory, --dangerously-skip-permissions).
          Implement _run_executing_loop() in orchestrate.py with:
          - Background mode via subprocess Popen
          - Foreground mode via ExecutionRunner
          - State persistence via StateStore
          - JSON and rich console output
        success_criteria:
          - "`agentic session orchestrate executing --help` shows correct options"
          - "Background mode spawns subprocess and returns session ID"
          - "Foreground mode runs ExecutionRunner and persists state"
          - "JSON output includes session_id, status, phases_completed, errors"

