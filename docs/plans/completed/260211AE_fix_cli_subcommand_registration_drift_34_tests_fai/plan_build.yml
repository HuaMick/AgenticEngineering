plan_name: "Fix CLI Subcommand Registration Drift (Typer Migration)"
worktree: 260211AE_fix_cli_subcommand_registration_drift_34_tests_fai
branch: main
status: approved
target_project_path: /home/code/AgenticEngineering
objective: >
  Fix 34 tests failing with exit code 2 due to Typer migration argument
  mismatches. The CLI migrated from argparse to Typer but the bridge layer
  has argument name mismatches and tests use old positional syntax.

context: >
  The CLI has been migrated to Typer (cli.py). Subcommands ARE registered
  but have argument mismatches:

  1. plan phase add: Typer expects --id/--name flags, tests pass positional args
  2. plan status/validate/archive: Typer bridge passes path= but handlers read args.plan
  3. plan task list/current: May have similar bridge attribute issues
  4. plan nested tasks: Task start/complete may have bridge issues

  The bridge pattern is: Typer function -> _plan_handle(_ns(...)) -> old handler.
  The _ns() call builds a namespace but attribute names don't always match.

  DECISION: Fix the TESTS to use new Typer syntax, since the Typer migration
  is the intended direction. Do NOT revert to argparse.

phases:
- phase_id: build_01
  name: Fix Typer Bridge Attribute Names
  status: pending
  dependencies: []
  tasks:
  - task_id: build_01_01
    description: Fix plan status/validate/archive bridge to pass plan= instead of path=
    status: pending
    file_inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/plan.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/cli.py
    guidance: >
      In cli.py, find the Typer functions for plan status, validate, archive
      (around lines 1323-1356). They pass path= to _ns() but the old handlers
      in plan.py read args.plan. Fix by either:
      a) Changing _ns(..., path=path) to _ns(..., plan=path) in the bridge, OR
      b) Adding plan=path alongside path=path in the _ns() call

      Also check plan task commands (start, complete, list, current) for similar
      mismatches between Typer parameter names and handler attribute expectations.
    success_criteria:
    - plan status --plan <folder> works (exit 0)
    - plan validate --plan <folder> works (exit 0)
    - plan archive --plan <folder> works (exit 0)
    - plan task list --plan <folder> works (exit 0)
    - plan task current --plan <folder> works (exit 0)

