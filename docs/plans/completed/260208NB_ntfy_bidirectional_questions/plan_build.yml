      \ import get_config_dir\n          config_dir = get_config_dir()\n         \
      \ prefs_file = config_dir / \"preferences.yml\"\n          if not prefs_file.exists():\n\
      \              return None\n\n          import yaml\n          prefs = yaml.safe_load(prefs_file.read_text())\
      \ or {}\n          ntfy_config = prefs.get(\"ntfy\", {})\n\n          topic\
      \ = ntfy_config.get(\"topic\", \"\")\n          if not topic:\n            \
      \  return None\n\n          if not ntfy_config.get(\"enabled\", True):\n   \
      \           return None\n\n          return {\n              \"topic\": topic,\n\
      \              \"server\": ntfy_config.get(\"server\", \"https://ntfy.sh\"),\n\
      \          }\n      except Exception:\n          return None\n\nThen refactor\
      \ _send_ntfy_if_configured() to use _get_ntfy_config()\ninternally (reducing\
      \ duplication).\n"
    success_criteria:
    - _get_ntfy_config() returns dict or None
    - _send_ntfy_if_configured() refactored to use it
    - Existing ntfy notification behavior unchanged
