plan_id: 260208NB
plan_name: ntfy Bidirectional Question Answering
status: approved
created: '2026-02-08'
updated: '2026-02-08'
objective: 'Enable bidirectional ntfy communication so users can reply to question

  notifications directly in the ntfy app and have those replies automatically

  processed as answers. Eliminates the need for SSH access to answer questions.


  Current flow: Agent asks question -> ntfy push -> User sees on phone -> SSH in ->
  CLI answer

  New flow: Agent asks question -> ntfy push (with question_id) -> User replies in
  ntfy app -> Watcher polls ntfy -> Auto-answers question

  '
architecture_notes: 'ntfy.sh supports a JSON polling endpoint: GET /{topic}/json?since=<timestamp>&poll=1

  This returns all messages posted to the topic since the given timestamp.

  When a user replies to a notification in the ntfy app, their reply appears as a

  new message on the same topic. We match replies to questions by embedding the

  question_id in the outgoing notification message footer, and parsing incoming

  messages for question_id patterns.


  Key design decisions:

  - poll_ntfy() uses urllib.request (stdlib only, matching send_ntfy pattern)

  - Question ID embedded in message body as "[QID: Q-XXXXXXXX-XXXXXX-XXXX]" footer

  - Reply matching uses regex to find QID in message text (user may quote original)

  - Polling integrated into existing watcher loop with configurable interval

  - Confirmation notification sent back after successful auto-answer

  '
