success_criteria:
  - criterion: "orchestration-planning produces approved plans independently"
    met: true
    evidence: |
      process.mmd implements a complete standalone planning flow:
      - Input Validation Phase (lines 16-25): Validates user-provided context
      - Phase Determination Subgraph (lines 44-58): Determines required phases (teach, build, test, cleanup)
      - Planning Loops Subgraph (lines 74-139): Iterative planner+reviewer loops for each phase
      - Human Approval Gate Subgraph (lines 149-167): Full decision tree (approve/changes/reject)
      - Output Subgraph (lines 176-182): Reports plan location and next steps
      The flow terminates with "End: Approved Plan Ready" - completely independent of execution.

  - criterion: "_plan.yml successfully invokes the new orchestration"
    met: true
    evidence: |
      entrypoints/_plan.yml:
      - Line 7: orchestration field points to "agents/orchestration/orchestration-planning/process.mmd"
      - Steps (lines 17-24) describe the complete orchestration delegation workflow
      - Output (lines 26-29) specifies approved plan folder ready for _execute.yml or _teach.yml
      Wiring is complete and correctly references orchestration-planning agent.

  - criterion: "Human approval gate works before any execution handoff"
    met: true
    evidence: |
      Human Approval Gate Subgraph (process.mmd lines 142-167):
      - Positioned AFTER all planning loops complete (AllPhasesPlanned --> HumanApproval)
      - Presents complete plan: PresentPlan --> ShowPhases --> ShowTasks --> ShowCriteria
      - User decision branches: Approved | Changes Requested | Rejected
      - Changes Requested returns to PlanningLoops (line 162 dotted edge)
      - Rejected terminates with "End: Plan Rejected"
      - Only "Approved" path leads to Output phase
      No execution can occur without explicit human approval.

  - criterion: "Existing orchestration flows remain functional"
    met: true
    evidence: |
      orchestration-build/process.mmd:
      - Lines 69-130: Planning Delegation Subgraph properly delegates to orchestration-planning
      - Supports both pre-approved plans (approved_plan_path) and planning delegation
      - Feedback loops (TEST_FAILURE, CICD_FAILURE, GUIDANCE_GAP, AUDIT_FAILURE) re-invoke orchestration-planning
      - Implementation Phase unchanged at line 145+

      orchestration-guidance/process.mmd:
      - Lines 36-84: Planning Delegation handles pre-approved plans or delegates to orchestration-planning
      - Lines 73-84: SpawnOrchestrationPlanning --> WaitForApproval --> ReceiveApprovedPlan
      - Feedback loops properly return to SpawnOrchestrationPlanning (lines 100, 134, 144)
      - Execution phase begins only after approved plan is received

      Both orchestration agents have been updated to delegate planning rather than embed it inline.

