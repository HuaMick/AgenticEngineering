      - Output specification aligns with downstream consumers (_execute.yml, _teach.yml)

  - id: "EC-02"
    component: "orchestration-planning/process.mmd"
    path: "/home/code/AgenticEngineering/modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
    status: valid
    detail: |
      Process flowchart is well-structured:
      - INPUT_PATH directive references inputs.yml
      - Phase determination subgraph handles teach/build/test/cleanup phases
      - Planning loops spawn correct planners (planner-guidance, planner-build, planner-test, planner-cleaning)
      - Human approval gate is properly implemented
      - Output phase reports plan location and next steps

  # DELEGATION CHAIN VERIFICATION
  - id: "DC-01"
    component: "orchestration-build delegation"
    path: "/home/code/AgenticEngineering/modules/AgenticGuidance/agents/orchestration/orchestration-build/process.mmd"
    status: valid
    detail: |
      orchestration-build correctly implements planning delegation:
      - CheckPlanInput decision node checks for pre-approved plan
      - "No: Need Planning" path spawns orchestration-planning (DelegatePlanning node)
      - Handoff contract documented: produces plan.yml, phase_build.yml, phase_test.yml
      - Failure feedback loops (TEST_FAILURE, CICD_FAILURE, GUIDANCE_GAP, AUDIT_FAILURE) route back to DelegatePlanning
      - inputs.yml documents approved_plan_path, planning_objective, and failure_context inputs

  - id: "DC-02"
    component: "orchestration-guidance delegation"
    path: "/home/code/AgenticEngineering/modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd"
    status: valid
    detail: |
      orchestration-guidance correctly implements planning delegation:
      - CheckApprovedPlan decision node checks for pre-approved plan
      - "No: Needs Planning" path spawns orchestration-planning (SpawnOrchestrationPlanning node)
      - Failure feedback loops route back to SpawnOrchestrationPlanning
      - inputs.yml documents approved_plan_path and orchestration_planning_ref inputs

  # PLANNER ROUTING VERIFICATION
  - id: "PR-01"
    component: "Planner sub-agents existence"
    status: valid
    detail: |
      All planner sub-agents referenced in orchestration-planning/process.mmd exist:
