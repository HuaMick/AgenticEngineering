    status: invalid
    severity: medium
    detail: |
      The agent-categories.yml definition file lists orchestration sub-agents as:
      - orchestrator
      - orchestration-guidance
      - orchestration-build

      MISSING: orchestration-planning is NOT listed, though it exists and is actively referenced by:
      - _plan.yml entrypoint
      - orchestration-build/process.mmd
      - orchestration-guidance/process.mmd
      - agents/manifest.yml
      - orchestration/manifest.yml

  # ORPHANED REFERENCE CHECK
  - id: "OR-01"
    component: "deploy-worktree reference"
    status: warning
    severity: low
    detail: |
      orchestration-planning/inputs.yml references:
      - agents/deploy/deploy-worktree/process.yml

      This agent does NOT exist in AgenticGuidance module.
      It exists only in legacy: modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/deploy/deploy-worktree/

      This is documented in agents/manifest.yml under not_migrated section.
      The reference path should either:
      1. Use relative path to legacy, OR
      2. Deploy agent should be migrated to AgenticGuidance

      Impact: Low (documented as not_migrated, process still works via legacy reference)

  - id: "OR-02"
    component: "explore-* agent references"
    status: warning
    severity: low
    detail: |
      orchestration-build/process.mmd references explore agents:
      - explore-codebase
      - explore-dependencies
      - explore-tests

      These agents do NOT exist in AgenticGuidance module.
      They are defined in agent-categories.yml under explore category but not migrated.

