      - planner-test: /home/code/AgenticEngineering/modules/AgenticGuidance/agents/planner/planner-test/ (has process.yml)
      - planner-cleaning: /home/code/AgenticEngineering/modules/AgenticGuidance/agents/planner/planner-cleaning/ (has process.yml)
      - planner-reviewer: /home/code/AgenticEngineering/modules/AgenticGuidance/agents/planner/planner-reviewer/ (has process.yml)
      - planner-guidance-testing: /home/code/AgenticEngineering/modules/AgenticGuidance/agents/planner/planner-guidance-testing/ (has process.yml)

