  - id: "OR-03"
    component: "test-* agent references"
    status: warning
    severity: low
    detail: |
      orchestration-build and orchestration-guidance reference:
      - test-guidance-simulator
      - test-final-output

      These agents do NOT exist in AgenticGuidance module.
      They exist in legacy: modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/test/

      Impact: Low (test category listed in not_migrated section)

  # CIRCULAR REFERENCE CHECK
  - id: "CR-01"
    component: "No circular references detected"
    status: valid
    detail: |
      Reference chain analysis:
      - _plan.yml -> orchestration-planning (no return reference)
      - orchestration-build -> orchestration-planning (delegation, returns approved plan)
      - orchestration-guidance -> orchestration-planning (delegation, returns approved plan)
      - orchestration-planning -> planner-* agents (spawning, no back-reference to orchestration)

      Feedback loops in orchestration-build and orchestration-guidance are INTENTIONAL
      re-planning cycles (not circular references) for quality improvement.

approval_blockers:
  - id: "AB-01"
    severity: medium
    issue: "agent-categories.yml missing orchestration-planning"
    resolution: |
      Add orchestration-planning to the orchestration sub_agents list in
      /home/code/AgenticEngineering/modules/AgenticGuidance/assets/definitions/agent-categories.yml

      Current:
        sub_agents:
          - orchestrator
          - orchestration-guidance
          - orchestration-build

      Required:
        sub_agents:
          - orchestrator
          - orchestration-planning
          - orchestration-guidance
          - orchestration-build

non_blocking_recommendations:
  - id: "NBR-01"
    type: "documentation"
    issue: "Legacy agent references should use explicit paths"
    recommendation: |
      In orchestration-planning/inputs.yml, change:
        - location: "agents/deploy/deploy-worktree/process.yml"
      To:
        - location: "modules/legacy/MyAgents/projects/MyAgentsGuidance/agents/deploy/deploy-worktree/process.yml"
        - note: "Not yet migrated - see agents/manifest.yml#not_migrated"

  - id: "NBR-02"
    type: "consistency"
    issue: "orchestrator vs orchestration-planning naming"
    recommendation: |
      agent-categories.yml lists 'orchestrator' but no agent by that exact name exists.
      Consider whether 'orchestrator' should be renamed to 'orchestration-planning'
      or if 'orchestrator' is a separate agent that needs to be created.

