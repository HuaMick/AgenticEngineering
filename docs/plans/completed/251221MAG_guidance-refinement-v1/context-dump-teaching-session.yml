# =============================================================================
# RECOMMENDATIONS FOR ANALYSIS
# =============================================================================

recommendations_for_analysis:

  high_priority:
    - issue: "Agent type mismatch between MyAgents and Claude Code"
      recommendation: |
        Document the mapping between:
        - MyAgents guidance agents (agents/ folder)
        - Claude Code subagent types (internal registration)
        Consider adding a mapping file or manifest that shows available spawnable types.

    - issue: "Tasks marked 'completed' before actual completion"
      recommendation: |
        Change phase 3 'completed' markers to 'scaffolded' or 'planned'.
        Reserve 'completed' status for verified work.
        Add verification step before marking complete.

    - issue: "Missing loop_context in loop participants"
      recommendation: |
        Add validation rule: If agent listed in agent-loops.yml as participant,
        process.yml MUST have loop_context section.
        Consider adding this to planner-test-guidance test scenarios.

  medium_priority:
    - issue: "State tracking across session crashes"
      recommendation: |
        Add execution-state.yml to live plan folders tracking:
        - Current step in process
        - Tasks completed vs pending
        - Last action taken
        - Timestamp

    - issue: "Partial integration verification"
      recommendation: |
        Final audit should independently verify all integration claims,
        not trust 'completed' markers in plan files.

  low_priority:
    - issue: "Test results scattered across folders"
      recommendation: |
        Standardize test-results/ and audit-results/ structure.
        Consider single validation-results/ folder.

