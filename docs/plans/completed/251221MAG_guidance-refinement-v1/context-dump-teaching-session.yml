# =============================================================================
# FRICTION POINTS ENCOUNTERED
# =============================================================================

friction_points:
  FR-TEST-001:
    category: "AGENT_TYPE_MISMATCH"
    severity: "HIGH"
    description: |
      Attempted to spawn 'test-guidance-simulator' as Claude Code subagent type.
      This agent exists in MyAgents guidance system but is NOT a Claude Code subagent.
    error_message: "Agent type 'test-guidance-simulator' not found"
    available_alternatives:
      - "test-agent"
      - "test-audit-agent"
      - "test-runner-agent"
      - "test-builder-agent"
      - "test-user-simulator-agent"
    workaround_applied: "Used test-agent instead"
    root_cause: |
      Two separate agent registration systems:
      1. Claude Code subagent types (hardcoded in Claude Code)
      2. MyAgents guidance agents (defined in agents/ folders)

      The orchestration process assumes agents defined in agents/ can be
      spawned directly, but Claude Code has its own limited set of subagent types.
    recommendation: |
      Need to clarify in guidance that:
      - Orchestration diagrams reference MyAgents guidance agents
      - Actual spawning uses Claude Code subagent types
      - Mapping between the two systems should be documented

  FR-TEST-002:
    category: "MISSING_LOOP_CONTEXT"
    severity: "HIGH"
    description: |
      Both newly created agents were registered as guidance-test-loop participants
      but lacked loop_context sections in their process.yml files.
    detection_method: "test-agent validation run"
    impact: "Agents cannot self-determine their loop participation"
    fix_applied: "Added loop_context sections to both agents"
    time_to_fix: "~5 minutes via teacher-agent"

  FR-AUDIT-001:
    category: "INCOMPLETE_INTEGRATION"
    severity: "CRITICAL"
    description: |
      Final audit found that task 3.3 (register agents in agent-categories.yml)
      was marked "completed" but the agents were NOT actually registered.
    evidence: "Grep search returned no matches for new agents"
    impact: "Orchestrators cannot discover these agents when spawning"
    fix_applied: "Added both agents to agent-categories.yml"
    root_cause: |
      Phase 3 tasks were marked "completed" as scaffolding before phases 1-2,
      but the actual work wasn't done. The "completed" status was aspirational.
    recommendation: |
      Status field should only be "completed" after verification.
      Consider "scaffolded" or "planned" for pre-work markers.

  FR-AUDIT-002:
    category: "INCOMPLETE_INTEGRATION"
    severity: "HIGH"
    description: |
      Task 3.2 (add GuidanceTest nodes to process.mm) was marked "completed"
      but orchestration-build/process.mm was missing the nodes.
    evidence: "Grep found only MoveCompleted changes, not GuidanceTest"
    finding: "orchestration-guidance had nodes; orchestration-build did not"
    fix_applied: "Added GuidanceTest flow to orchestration-build/process.mm"

  FR-CONTEXT-001:
    category: "CONTEXT_MANAGEMENT"
    severity: "MEDIUM"
    description: |
      Previous agent crashed, requiring context reconstruction from artifacts.
    mitigation: "Subagent-based execution prevented context overflow in this session"
    observation: |
      Using Task tool to spawn subagents for each plan execution kept main
      orchestrator context manageable. Each subagent had focused context.

  FR-PREREQ-001:
    category: "HIDDEN_PREREQUISITE"
    severity: "LOW"
    description: |
      P1 immediate actions (create agent directories) were already done,
      but this wasn't clear until files were checked.
    observation: "Some previous work had been done but state wasn't documented"
    recommendation: "Live plan folder should have status.yml tracking execution state"

