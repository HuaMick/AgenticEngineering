    The test-guidance-simulator agent we created in the guidance system is NOT
    automatically available as a Claude Code subagent type. These are different
    registrations:
    - Claude Code subagent types: Registered in Claude Code's internal system
    - MyAgents guidance agents: Defined in agents/ folder for orchestration

    This is a critical distinction that caused friction.

