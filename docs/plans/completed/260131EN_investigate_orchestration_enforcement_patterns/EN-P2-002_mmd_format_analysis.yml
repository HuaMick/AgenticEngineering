# =============================================================================
# SECTION 9: TRANSFORMATION CONSIDERATIONS
# =============================================================================
transformation_considerations:
  description: |
    Key considerations for programmatic parsing and transformation
    of MMD files into tasklists.

  parsing_challenges:
    metadata_extraction:
      challenge: "Metadata in comments varies in format"
      recommendation: "Use regex patterns for key-value pairs in %% comments"
      patterns_needed:
        - '%% KEY: value'
        - '%% KEY: value1, value2, value3'
        - '%% KEY = value'

    task_extraction:
      challenge: "Task IDs embedded in node labels"
      recommendation: "Match patterns like TASK-ID: description in square brackets"
      regex_suggestion: '\[([A-Z]+-[A-Z0-9-]+):\s*([^\]]+)\]'

    phase_detection:
      challenge: "Phases defined in subgraphs and metadata"
      recommendation: "Parse both PHASES metadata and subgraph definitions"

    agent_routing:
      challenge: "Agent assignments in metadata and node names"
      recommendation: "Parse AGENT_ROUTING comment and SpawnAgent nodes"

  mmd_to_tasklist_mapping:
    metadata_to_tasklist:
      PLAN_ID: "plan_id"
      GOAL: "description"
      PHASES: "phases[].name"
      STATUS: "phases[].status"
      AGENT_ROUTING: "phases[].agent_type"

    node_to_task:
      task_node: "tasks[].id, tasks[].description"
      spawn_node: "tasks[].agent_type"
      decision_node: "tasks[].success_criteria"
      phase_entry: "phases[].entry_marker"

# =============================================================================
# SECTION 10: RECOMMENDATIONS
# =============================================================================
recommendations:
  for_mmd_standardization:
    - id: "REC-MMD-001"
      title: "Standardize metadata header format"
      description: |
        Create a documented schema for MMD metadata headers.
        All new MMD files should include: PLAN_ID, GOAL, PROFILE,
        PHASES, AGENT_ROUTING, STATUS, and INPUT_PATH at minimum.

    - id: "REC-MMD-002"
      title: "Adopt consistent task ID format"
      description: |
        Standardize on PLAN_PREFIX-PHASE-TASK format (e.g., EN-P1-001)
        for all task nodes to enable automated tracking.

    - id: "REC-MMD-003"
      title: "Use subgraphs consistently"
      description: |
        All phases should be wrapped in subgraphs with consistent
        naming: PhaseName_SG ["Phase N: Description"]

  for_preloaded_tasklist_implementation:
    - id: "REC-TL-001"
      title: "Parse metadata block first"
      description: |
        Extract PHASES, AGENT_ROUTING, and STATUS from comment block
        to create initial task list structure.

    - id: "REC-TL-002"
      title: "Extract tasks from task nodes"
      description: |
        Identify task nodes by pattern matching [TASK-ID: description]
        and map to task list items with phase association.

    - id: "REC-TL-003"
      title: "Derive dependencies from edges"
      description: |
        Parse edges between phase nodes to establish task dependencies
        (blockedBy relationships).

    - id: "REC-TL-004"
      title: "Handle both simple and complex formats"
      description: |
        Support both minimal (orchestration_auto_archive.mmd) and
        comprehensive (orchestration_orchestration_enforcement.mmd)
        MMD formats in the parser.

