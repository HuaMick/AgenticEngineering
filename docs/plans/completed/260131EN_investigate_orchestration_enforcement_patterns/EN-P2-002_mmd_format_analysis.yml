# =============================================================================

metadata:
  task_id: EN-P2-002
  task_name: "Analyze MMD file formats across orchestration types"
  status: completed
  analysis_date: "2026-01-31"
  total_mmd_files_analyzed: 50
  categories_analyzed:
    - live_plans
    - completed_plans
    - deferred_plans

# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================
summary:
  key_finding: |
    MMD files in this repository follow a consistent Mermaid flowchart format
    with extensive metadata embedded in comments. The format has evolved over
    time, with newer files showing more standardized metadata headers and
    structured phase/task representation.

  format_evolution:
    early_format: "Minimal metadata, simple linear flows (e.g., orchestration_agenticguidance.mmd)"
    current_format: "Rich metadata headers, subgraph-based phases, explicit task IDs (e.g., orchestration_orchestration_enforcement.mmd)"

  consistency_score: "High - 90%+ of files follow recognizable patterns"

# =============================================================================
# SECTION 1: DIAGRAM TYPE PATTERNS
# =============================================================================
diagram_types:
  flowchart_LR:
    description: "Left-to-right flowchart - most common for orchestrations"
    usage_percentage: 70
    example_files:
      - "orchestration_orchestration_enforcement.mmd"
      - "orchestration_plan_structure.mmd"
      - "orchestration_langsmith_cli.mmd"
      - "orchestration_jit_context.mmd"
      - "orchestration_trace_diagnostics.mmd"
    characteristics:
      - "Horizontal flow suits phase-based progression"
      - "Natural left-to-right reading order"
      - "Good for showing parallel paths"

  flowchart_TD:
    description: "Top-down flowchart - used for simpler or more vertical flows"
    usage_percentage: 25
    example_files:
      - "orchestration_auto_archive.mmd"
      - "orchestration_multi_agent.mmd"
      - "orchestration_mandatory_rlm.mmd"
    characteristics:
      - "Vertical flow suits hierarchical structures"
      - "Better for showing decision trees"
      - "Often used for simpler plans"

  graph_TD:
    description: "Legacy graph syntax - older files"
    usage_percentage: 5
    example_files:
      - "orchestration_agenticguidance.mmd"
    characteristics:
      - "Older Mermaid syntax"
      - "Less common in recent files"
      - "Same rendering as flowchart TD"

# =============================================================================
# SECTION 2: METADATA HEADER PATTERNS
# =============================================================================
metadata_headers:
  description: |
    Metadata is embedded in MMD comments (%%) at the top of files.
    Headers have evolved from minimal to comprehensive over time.

  standard_fields:
    required_fields:
      - name: "GOAL"
        description: "Plan objective/purpose"
        example: "GOAL: Orchestrate investigation of orchestration enforcement patterns"
        presence_rate: "95%"

      - name: "PROFILE"
        description: "Orchestration profile/type"
        example: "PROFILE: Orchestration-Investigation"
        presence_rate: "90%"

    common_optional_fields:
      - name: "OUTPUT"
        description: "Expected deliverables"
        example: "OUTPUT: Investigation findings, proposal evaluations"
        presence_rate: "60%"

      - name: "GUIDELINE"
        description: "Referenced guidelines"
        example: "GUIDELINE: modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
        presence_rate: "55%"

      - name: "INPUT_PATH"
        description: "Path to plan input file"
        example: "INPUT_PATH: docs/plans/live/260127AG_ralph_loop_compliance/live/plan_live_build.yml"
        presence_rate: "85%"

      - name: "PLAN_FOLDER"
        description: "Plan folder location"
        example: "PLAN_FOLDER: docs/plans/live/260131EN_investigate_orchestration_enforcement_patterns/"
        presence_rate: "40%"

      - name: "PHASES"
        description: "List of plan phases"
        example: "PHASES: P1_Investigation, P2_Investigation, Synthesis, Review"
        presence_rate: "75%"

      - name: "AGENT_ROUTING"
        description: "Phase to agent type mapping"
        example: "AGENT_ROUTING: BuildPhase -> build-python, TestPhase -> test-runner"
        presence_rate: "85%"

      - name: "STATUS"
        description: "Phase completion status"
        example: "STATUS: Phase1=completed, Phase2=pending"
        presence_rate: "80%"

      - name: "FEEDBACK_TRIGGERS"
        description: "Error handling mappings"
        example: "FEEDBACK_TRIGGERS: TEST_FAILURE -> test-fix-loop, BUILD_FAILURE -> escalate"
        presence_rate: "50%"

      - name: "LOOP_DEFINITION"
        description: "Reference to loop type definition"
        example: "LOOP_DEFINITION: modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.test-fix-loop"
        presence_rate: "45%"

      - name: "MAX_ITERATIONS"
        description: "Maximum loop iterations"
        example: "MAX_ITERATIONS: 5"
        presence_rate: "40%"

      - name: "ESCALATION"
        description: "Escalation policy"
        example: "ESCALATION: If investigation cannot proceed, Ask User for guidance"
        presence_rate: "35%"

    newer_fields_emerging:
      - name: "PLAN_ID"
        description: "Unique plan identifier"
        example: "PLAN_ID: 260131EN"
        presence_rate: "15%"

      - name: "PLAN_TYPE"
        description: "Plan category"
        example: "PLAN_TYPE: Investigation (teach/guidance focus)"
        presence_rate: "15%"

      - name: "PLAN_MMD_VERSION"
        description: "MMD format version"
        example: "PLAN_MMD_VERSION: 1.0"
        presence_rate: "5%"

      - name: "WORKTREE"
        description: "Git worktree path"
        example: "WORKTREE: /home/code/AgenticEngineering-agentictmux"
        presence_rate: "25%"

      - name: "BRANCH"
        description: "Git branch name"
        example: "BRANCH: agentictmux"
        presence_rate: "25%"

# =============================================================================
# SECTION 3: NODE NAMING CONVENTIONS
# =============================================================================
node_naming:
  description: |
    Node names follow consistent patterns that indicate their purpose
    and role in the orchestration flow.

  patterns:
    entry_exit_nodes:
      pattern: "((NodeName))"
      description: "Double parentheses for Start/End stadium shapes"
      examples:
        - "Start((Start))"
        - "End((End: Plan Complete))"
        - "AskUser((Ask User for Clarification))"
        - "EscalateTests((Escalate: Test Failures Persist))"
      semantic_meaning: "Entry points, exit points, user interaction, escalation"

    process_nodes:
      pattern: "[NodeName]"
      description: "Square brackets for process/action steps"
      examples:
        - "LoadInputs[Load Context Inputs]"
        - "SpawnBuilder[Spawn builder Agent]"
        - "RunTests[Run All Tests]"
        - "ApplyFixes[Apply Implementation Fixes]"
      semantic_meaning: "Actions to be executed"

    decision_nodes:
      pattern: "{DecisionQuestion?}"
      description: "Curly braces for decision diamonds"
      examples:
        - "CheckInputs{All Inputs Found?}"
        - "TestsPassed{Tests Passed?}"
        - "ValidateWorktree{Worktree Valid?}"
        - "CompletionDecision{All Checks Pass?}"
      semantic_meaning: "Decision points with Yes/No branches"

    phase_entry_nodes:
      pattern: "[Enter Phase N: Phase Name]"
      description: "Process node marking phase entry"
      examples:
        - "Phase1[Enter Phase 1: MMD Generator]"
        - "EnterBuildPhase[Enter Build Phase]"
        - "InvestigationPhase[Enter Investigation Phase]"
      semantic_meaning: "Phase boundaries and context switches"

  task_id_patterns:
    description: "Task IDs embedded in node names for tracking"
    formats_observed:
      - pattern: "PLAN_PREFIX-TASK_NUM"
        example: "RLM-001, AG-RL-001, MA-001"
        usage: "Most common for build plans"

      - pattern: "PLAN_PREFIX-P{phase}-{task}"
        example: "EN-P1-001, EN-P2-002"
        usage: "Investigation plans with phase prefix"

      - pattern: "td_phase_task"
        example: "td_01_01, td_02_01"
        usage: "Legacy format, less common"

    task_node_examples:
      - "Task001[AG-RL-001: Create MMDGeneratorService base]"
      - "P1_Audit[EN-P1-001: Audit CLI commands]"
      - "RLM001[RLM-001: Update process.yml STEP 2]"

# =============================================================================
# SECTION 4: EDGE/FLOW PATTERNS
# =============================================================================
edge_patterns:
  description: |
    Edges connect nodes and include conditional labels for decision branches.
    Dashed lines are used for feedback loops and return paths.

  standard_edges:
    sequential:
      syntax: "NodeA --> NodeB"
      description: "Standard sequential flow"
      usage: "Most common - represents task progression"

    conditional_yes:
      syntax: 'NodeA -- "Yes: Success" --> NodeB'
      description: "Success/positive branch from decision"
      label_patterns:
        - '"Yes: All Pass"'
        - '"Yes: Verified"'
        - '"Yes: Success"'
        - '"Yes"'

    conditional_no:
      syntax: 'NodeA -- "No: Failure" --> NodeB'
      description: "Failure/negative branch from decision"
      label_patterns:
        - '"No: Fix Required"'
        - '"No: Missing"'
        - '"No: Escalate"'
        - '"No: Issues"'

  feedback_loops:
    description: "Dashed lines for return paths and feedback"
    syntax: "NodeA -.-> NodeB"
    alternative_syntax: "NodeA -.->|Label| NodeB"
    examples:
      - "CaptureAuditFailure -.->|Re-plan with AUDIT_FAILURE| EnterBuildPhase"
      - "ReturnPhase1 -.-> Phase1"
      - "IdentifyGaps -.->|Return to Testing| Phase5"
      - "CaptureChanges -.->|Return to Synthesis| SynthesisPhase"
    styling_note: "Often styled with linkStyle for dashed appearance"

  styling_links:
    description: "linkStyle directive for special edge rendering"
    syntax: "linkStyle N stroke:#color,stroke-width:Npx,stroke-dasharray: N N"
    example: "linkStyle 36 stroke:#888,stroke-width:2px,stroke-dasharray: 5 5"
    usage: "Applied to specific edge indices for feedback loops"

# =============================================================================
# SECTION 5: SUBGRAPH PATTERNS
# =============================================================================
subgraph_patterns:
  description: |
    Subgraphs group related nodes into logical phases or sections.
    They provide visual organization and semantic grouping.

  naming_conventions:
    pattern: 'subgraph ID_SG ["Display Name Subgraph"]'
    examples:
      - 'subgraph BuildPhase_SG ["Build Phase Subgraph"]'
      - 'subgraph P1_SG ["P1 - CLI Tasklist Investigation"]'
      - 'subgraph Testing_SG ["Phase 5: Testing Subgraph (Test-Fix-Loop)"]'
      - 'subgraph Validation_SG ["Validation Subgraph"]'

    id_suffix: "_SG is commonly appended to subgraph IDs"
    display_format: "Usually includes phase number and descriptive name"

  common_subgraph_types:
    phase_subgraphs:
      description: "Group tasks within a phase"
      example: |
        subgraph Phase1_SG ["Phase 1: Agent Structure (4 tasks)"]
            Phase1 --> SpawnTeacher1a[Spawn teacher: td_01_01 manifest]
            ...
        end

    validation_subgraphs:
      description: "Group validation/test activities"
      example: |
        subgraph Validation_SG ["Validation Subgraph"]
            ValidationPhase --> CheckNoNestedFolders[Verify no nested folders]
            ...
        end

    output_subgraphs:
      description: "Group output/reporting activities"
      example: |
        subgraph Output_SG ["Output Subgraph"]
            OutputPhase --> ReportImplementation[Report CLI Commands]
            ...
        end

    human_approval_subgraphs:
      description: "Group user interaction gates"
      example: |
        subgraph HumanApproval_SG ["Human Approval Gate Subgraph"]
            HumanApproval[Present Findings] --> ShowMatrix[Display Matrix]
            ...
        end

# =============================================================================
# SECTION 6: TASK/PHASE REPRESENTATION
# =============================================================================
task_representation:
  description: |
    Tasks are represented as nodes within phase subgraphs,
    with consistent patterns for spawning agents and tracking completion.

  spawn_agent_pattern:
    description: "Nodes that indicate agent spawning"
    format: "SpawnAgentType[Spawn agent-type Agent: Optional Context]"
    examples:
      - "SpawnBuilder1[Spawn builder Agent]"
      - "SpawnTestRunner[Spawn test-runner Agent]"
      - "SpawnExploreP1[Spawn explore Agent: Audit CLI tasklist]"
      - "SpawnUserSimulator[Spawn test-user-simulator Agent]"
      - "SpawnAudit[Spawn test-audit Agent]"
    agent_types_observed:
      - "builder"
      - "build-python"
      - "test-runner"
      - "test-builder"
      - "test-audit"
      - "test-user-simulator"
      - "teacher"
      - "teacher-update-guidance"
      - "teacher-update-assets"
      - "explore"
      - "planner"
      - "planner-reviewer"

  task_node_pattern:
    description: "Individual task nodes with IDs"
    format: "TaskID[TASK-ID: Task Description]"
    examples:
      - "Task001[AG-RL-001: Create MMDGeneratorService base]"
      - "P1_Audit[EN-P1-001: Audit CLI commands]"
      - "Task_MA001[MA-001: Extend SessionInfo with role]"

  phase_completion_pattern:
    description: "Nodes marking phase completion"
    formats:
      - "Phase1Complete[Phase 1 Complete]"
      - "Phase1Complete((Phase 1 Complete))"
      - "BuildPhaseComplete[Build Phase Complete]"
      - "CLIComplete((CLI Phase Complete))"

  test_fix_loop_pattern:
    description: "Common pattern for iterative testing/fixing"
    structure:
      - "RunTests[Run All Tests]"
      - "TestsPassed{Tests Passed?}"
      - 'TestsPassed -- "No: Fix" --> SpawnBuilderFix'
      - "SpawnBuilderFix --> ApplyFixes"
      - "ApplyFixes --> RunTests"
      - 'TestsPassed -- "Yes" --> PhaseComplete'
    escalation_path:
      - "CheckIterations{Max Iterations Reached?}"
      - 'CheckIterations -- "Yes" --> EscalateTests((Escalate))'

# =============================================================================
# SECTION 7: STYLING PATTERNS
# =============================================================================
styling_patterns:
  description: |
    CSS-like class definitions for visual styling of nodes.
    Applied using classDef and class directives.

  common_class_definitions:
    entrypoint:
      definition: "classDef entrypoint fill:#90EE90,stroke:#228B22"
      description: "Green fill for start/entry nodes"
      color_meaning: "Success/go color"

    exitpoint:
      definition: "classDef exitpoint fill:#FFB6C1,stroke:#DC143C"
      description: "Pink/red fill for end/escalation nodes"
      color_meaning: "Completion or warning"

    userpoint:
      definition: "classDef userpoint fill:#87CEEB,stroke:#4682B4"
      description: "Blue fill for user interaction nodes"
      color_meaning: "Human involvement required"

    keyaction:
      definition: "classDef keyaction fill:#FFD700,stroke:#DAA520"
      description: "Gold fill for key/important actions"
      color_meaning: "Highlight important steps"

    decision:
      definition: "classDef decision fill:#87CEEB,stroke:#4682B4"
      description: "Blue fill for decision nodes"
      color_meaning: "Decision point"

    completed:
      definition: "classDef completed fill:#90EE90,stroke:#228B22"
      description: "Green fill for completed phases"
      color_meaning: "Done/success"

    dashedstroke:
      definition: "classDef dashedstroke stroke-dasharray: 5 5"
      description: "Dashed border for feedback paths"
      color_meaning: "Return/retry path"

    phase_colors:
      phase: "classDef phase fill:#e1f5fe,stroke:#0288d1"
      test: "classDef test fill:#fff3e0,stroke:#ff9800"
      audit: "classDef audit fill:#fce4ec,stroke:#e91e63"
      success: "classDef success fill:#e8f5e9,stroke:#4caf50"
      validation: "classDef validation fill:#fff3e0,stroke:#e65100"
      completion: "classDef completion fill:#e8f5e9,stroke:#2e7d32"

  class_application:
    syntax: "class NodeA,NodeB,NodeC classname"
    examples:
      - "class Start entrypoint"
      - "class End exitpoint"
      - "class AskUser,EscalateTests userpoint"
      - "class UpdatePlanService,RunTests keyaction"

