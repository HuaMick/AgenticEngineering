        # In entrypoint.py cmd_execute():

        def cmd_execute(args):
            # ... existing code ...

            # After _compile_context()
            context = _compile_context(args)

            # NEW: Parse MMD and add tasklist
            plan_folder = Path(args.plan_folder) if args.plan_folder else None
            if plan_folder:
                mmd_file = find_orchestration_mmd(plan_folder)
