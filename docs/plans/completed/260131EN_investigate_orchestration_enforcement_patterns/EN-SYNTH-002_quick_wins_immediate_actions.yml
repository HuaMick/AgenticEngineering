  # ---------------------------------------------------------------------------
  # IA-004: SESSION HIERARCHY TRACKING
  # ---------------------------------------------------------------------------

  - id: IA-004
    title: "Parent-Child Session Hierarchy Tracking"
    source: P3, P4, P5
    effort_hours: 12-18
    value: MEDIUM-HIGH
    complexity: MEDIUM
    priority: 4

    what: |
      Track parent-child relationships between sessions:
      - Store parent_session_id in session record
      - Update parent's child_sessions list when spawning
      - Add get_session_hierarchy(plan_folder) query
      - Add `agentic session hierarchy` command to display tree
      Enables orchestrators to see all spawned subagents.

    why: |
      Foundation for session-level orchestration. Orchestrators need to
      know which subagents they've spawned. Enables cleanup (kill all
      child sessions), monitoring (track subagent progress), and debugging
      (visualize session tree).

    where:
      files:
        - modules/AgenticCLI/src/agenticcli/commands/session.py
        - modules/AgenticCLI/src/agenticcli/utils/session_registry.py
      commands:
        - "agentic session hierarchy [--plan <folder>]"
      dependencies:
        - IA-001 (environment variable injection stores parent_session)
        - QW-005 (session registry query utilities)

    implementation:
      phases:
        - phase: 1
          name: "Session Record Schema"
          effort: 2-3h
          deliverables:
            - Add parent_session field to session record
            - Add child_sessions list to session record
            - Backward compatibility for old records
          files:
            - modules/AgenticCLI/src/agenticcli/commands/session.py

        - phase: 2
          name: "Parent Update on Spawn"
          effort: 4-6h
          deliverables:
            - When spawning, update parent's child_sessions list
            - Store parent_session in child's record
            - Handle missing parent gracefully
          files:
            - modules/AgenticCLI/src/agenticcli/commands/session.py

        - phase: 3
          name: "Hierarchy Query"
          effort: 4-6h
          deliverables:
            - get_session_hierarchy(plan_folder) function
            - Build tree structure from session records
            - Handle orphan sessions
          files:
            - modules/AgenticCLI/src/agenticcli/utils/session_registry.py

        - phase: 4
          name: "Hierarchy Display Command"
          effort: 2-3h
          deliverables:
            - `agentic session hierarchy` command
            - Tree visualization with indentation
            - Filter by plan folder
          files:
            - modules/AgenticCLI/src/agenticcli/commands/session.py

      code_structure: |
        # In session.py cmd_spawn(), update parent:

        parent_session_id = getattr(args, "parent_session", None)
        if parent_session_id:
            # Load parent session record
            parent_record = load_session_record(parent_session_id)
            if parent_record:
                # Add this session to parent's child_sessions
                parent_record.setdefault("child_sessions", []).append(session_id)
                save_session_record(parent_session_id, parent_record)

        # In utils/session_registry.py:

        def get_session_hierarchy(plan_folder: str = None) -> dict:
            """Build session hierarchy tree."""
            sessions = get_all_sessions()

            # Filter by plan if specified
            if plan_folder:
                sessions = [s for s in sessions if s.get("plan_folder") == plan_folder]

            # Build tree structure
            tree = {}
            for session in sessions:
                if not session.get("parent_session"):
                    # Root session
                    tree[session["session_id"]] = build_subtree(session, sessions)

            return tree

      output_format: |
        Session Hierarchy for Plan: 260131EN_investigate_orchestration_enforcement_patterns/

        orch-260131EN (orchestrator)
        ├── build-260131EN-EN-P3-001 (subagent, task: EN-P3-001)
        ├── build-260131EN-EN-P4-002 (subagent, task: EN-P4-002)
        └── review-260131EN (subagent, reviewer role)

      testing: |
        1. Spawn orchestrator session
        2. From orchestrator, spawn 2 subagent sessions
        3. Run `agentic session hierarchy --plan <folder>`
        4. Verify tree structure shows parent-child correctly
        5. Test with orphan sessions (parent killed)

    success_criteria:
