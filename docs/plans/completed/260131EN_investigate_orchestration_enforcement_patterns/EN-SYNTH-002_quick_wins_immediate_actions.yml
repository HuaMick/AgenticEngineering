    implementation:
      approach: |
        1. Read MMD file
        2. Extract %% comment block
        3. Parse key-value pairs (KEY: value)
        4. Return dict of metadata

      code_sketch: |
        import re

        def extract_mmd_metadata(mmd_path: Path) -> dict:
            """Extract metadata from MMD comment header."""
            with open(mmd_path) as f:
                content = f.read()

            metadata = {}
            # Match %% KEY: value patterns
            for match in re.finditer(r'%%\s+(\w+):\s+(.+)', content):
                key = match.group(1)
                value = match.group(2).strip()
                metadata[key] = value

            return metadata

      testing: |
