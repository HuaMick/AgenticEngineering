  quality_metrics:
    - metric: "Performance overhead"
      target: "< 100ms overhead for session spawn with env injection"
      measurement: "Benchmark spawn time with vs without orchestration context"

    - metric: "Error rate"
      target: "< 5% of enforcement operations fail with errors"
      measurement: "Count errors in event log"

    - metric: "Backward compatibility"
      target: "100% of existing plans work without orchestration context"
      measurement: "Regression test suite passes"

# =============================================================================
# RISK MITIGATION
# =============================================================================

risk_mitigation:

  technical_risks:
    - risk: "Environment variable injection breaks existing workflows"
      likelihood: LOW
      impact: HIGH
      mitigation:
        - All new env vars are opt-in (only set if --role etc provided)
        - Backward compatibility tested
        - Gradual rollout with monitoring

    - risk: "MMD parsing fails on legacy/manually-edited files"
      likelihood: MEDIUM
      impact: MEDIUM
      mitigation:
        - Graceful fallbacks for missing metadata
        - Schema validation with clear error messages
        - Test with 50+ real MMD files before deployment

    - risk: "Role enforcement blocks legitimate operations"
      likelihood: LOW
      impact: MEDIUM
      mitigation:
        - Graduated enforcement (advisory → warning → blocking)
        - --force override for warning-level blocks
        - Clear error messages guide users to correct approach

  adoption_risks:
    - risk: "Agents don't use new CLI commands (stick to manual YAML edits)"
      likelihood: MEDIUM
      impact: MEDIUM
      mitigation:
        - Make CLI commands simpler than alternatives
        - Update agent process.yml to reference new commands
        - Event logging tracks adoption rates

    - risk: "Orchestrators bypass role-based enforcement"
      likelihood: LOW
      impact: HIGH
      mitigation:
        - Audit trail (event logging) detects bypasses
        - Enforcement hooks cover all sensitive operations
        - Session registry is authoritative (can't be easily tampered)

  implementation_risks:
    - risk: "Quick wins don't provide enough value to justify larger efforts"
      likelihood: LOW
      impact: MEDIUM
      mitigation:
        - Quick wins independently valuable (not just prototypes)
        - Evaluation phase (Phase 7) before committing to P5/P6/P1
        - Defer large efforts until foundation proves value

    - risk: "P3+P4 foundation insufficient for orchestration needs"
      likelihood: LOW
      impact: HIGH
      mitigation:
        - P3+P4 are industry-validated patterns
        - Session hierarchy tracking (IA-004) complements foundation
        - P5 (tmux) available as enhancement if needed

# =============================================================================
# DEPENDENCIES AND BLOCKERS
# =============================================================================

dependency_graph: |
  Quick Wins (Phase 0):
    QW-001 ──→ (no dependencies)
    QW-002 ──→ (no dependencies)
    QW-003 ──→ (no dependencies)
    QW-004 ──→ (no dependencies)
    QW-005 ──→ (no dependencies)

  Foundation (Phase 1):
    IA-001 ──→ (no dependencies)

  Structure + Enforcement (Phases 2-3, PARALLEL):
    IA-003 ──→ QW-004
    IA-006 ──→ IA-003
    IA-002 ──→ IA-001, QW-003

  Session Management (Phase 4):
    IA-004 ──→ IA-001, QW-005

  Enforcement Hooks (Phase 5):
    IA-007 ──→ IA-002

  Gate Validation (Phase 6):
    IA-005 ──→ (no dependencies, standalone)

blocking_relationships:
  - IA-001 blocks: [IA-002, IA-004]
    reason: "Role detection and hierarchy tracking require env vars"

  - IA-002 blocks: [IA-007]
    reason: "Enforcement hooks require RoleEnforcer service"

  - QW-004 blocks: [IA-003]
    reason: "MMD parsing uses metadata extraction utility"

  - IA-003 blocks: [IA-006]
    reason: "Entrypoint integration uses MMDParserService"

# =============================================================================
# RECOMMENDATIONS
# =============================================================================

recommendations:

  immediate_next_steps:
    - step: 1
      action: "Implement Quick Wins Sprint (QW-001 through QW-005)"
      timeline: "1-2 weeks"
      rationale: "Immediate value, validates patterns, low risk"

    - step: 2
      action: "Begin IA-001 (Environment Variable Injection)"
      timeline: "3-4 weeks"
      rationale: "Foundational for all role-based work"

    - step: 3
      action: "Parallelize IA-003 (MMD Parsing) and IA-002 (Role Detection)"
      timeline: "4-6 weeks"
      rationale: "Both are critical, can develop independently"

    - step: 4
      action: "Implement IA-004 (Session Hierarchy) and IA-007 (Enforcement Hooks)"
      timeline: "5-7 weeks"
      rationale: "Complete P3+P4 foundation"

    - step: 5
      action: "Implement IA-005 (Gate Validation) and IA-006 (Entrypoint Integration)"
      timeline: "2-3 weeks"
      rationale: "Add structure visibility and gate enforcement"

    - step: 6
      action: "Evaluation Phase: Measure adoption and value"
      timeline: "1-2 weeks"
      rationale: "Decide on P5, P6, full P1 based on real usage"

  strategic_decisions:
    - decision: "Prioritize P3+P4 (environment injection + role detection) over P2 (MMD parsing)"
      rationale: |
        P3+P4 are foundational for enforcement. P2 is valuable but not
        blocking. Can parallelize P2 with P4 if resources available.

    - decision: "Defer P5 (tmux patterns) until P3+P4 foundation validated"
      rationale: |
        P5 is substantial effort (250-350h). Session hierarchy tracking (IA-004)
        provides most value without tmux complexity. Implement P5 only if
        tmux-specific features prove necessary.

    - decision: "Defer P6 (bootstrap generation) until P2 validated"
      rationale: |
        P6 complements P2. If P2 tasklists are valuable, P6 adds agent-level
        granularity. If P2 proves insufficient, rethink approach.

    - decision: "Defer full P1 (tasklist tracking) indefinitely"
      rationale: |
        P2 provides structure visibility without P1's enforcement gaps.
        Quick Wins from P1 (QW-001, QW-002, IA-005) provide targeted value.
        Revisit full P1 only if P2 proves insufficient.

  alternatives_considered:
    - alternative: "Implement P1 first (CLI tasklist tracking)"
      rejected_because: |
        P1 has enforcement gaps (agents can bypass via YAML edits). P2 provides
        similar structure visibility without enforcement weaknesses. Quick Wins
        from P1 provide immediate value without full P1 commitment.

    - alternative: "Implement P2 before P3+P4"
      rejected_because: |
        P2 is valuable but not foundational. P3+P4 enable all role-based
        enforcement. Better to establish foundation first, then add structure.
        Can parallelize if resources available.

    - alternative: "Implement all proposals in parallel"
      rejected_because: |
        Resource constraints, dependencies between proposals, and risk of
        over-engineering. Phased approach validates patterns before committing
        to full implementation.

# =============================================================================
# CONCLUSION
# =============================================================================

conclusion: |
  Quick wins and immediate actions provide a clear path to orchestration
  enforcement without over-committing to unproven approaches.

  RECOMMENDED APPROACH:
  1. Quick Wins Sprint (20-32h): Immediate value, pattern validation
  2. P3 Core (20-30h): Environment injection enables role detection
  3. P2 Core (25-40h) + P4 Core (30-40h): Structure and enforcement (parallel)
  4. Session hierarchy (12-18h) + Enforcement hooks (16-24h): Complete foundation
  5. Gate validation (12-18h) + Entrypoint integration (8-12h): Add capabilities
  6. Evaluation: Measure, learn, decide on P5/P6/P1

  TOTAL EFFORT: 135-207 hours over 19-28 weeks (with parallelization)

  DEFERRED:
  - P1 full implementation (80-100h): Redundant with P2, keep Quick Wins only
  - P5 tmux patterns (250-350h): Build on foundation after validation
  - P6 bootstrap generation (61-96h): Build on P2 after validation

  This approach delivers orchestration enforcement in manageable increments,
  validates patterns early, and defers large efforts until foundation proves
  effective.

