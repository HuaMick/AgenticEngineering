  # ---------------------------------------------------------------------------
  # IA-007: ENFORCEMENT HOOKS IN CLI COMMANDS
  # ---------------------------------------------------------------------------

  - id: IA-007
    title: "Role-Based Enforcement Hooks in CLI Commands"
    source: P4
    effort_hours: 16-24
    value: HIGH
    complexity: MEDIUM
    priority: 7

    what: |
      Add enforcement hooks to CLI commands that should be role-restricted:
      - session spawn: Warn if subagent spawning additional agents
      - plan archive/move: Block if subagent attempts
      - task complete: Warn if completing unassigned task
      Use RoleEnforcer (IA-002) to validate operations.

    why: |
      Completes P4 core implementation. Without enforcement hooks, role
      detection (IA-002) is informational only. Enforcement hooks make
      orchestration boundaries real.

    where:
      files:
        - modules/AgenticCLI/src/agenticcli/commands/session.py
        - modules/AgenticCLI/src/agenticcli/commands/plan.py
      dependencies:
        - IA-002 (RoleEnforcer service)

    implementation:
      phases:
        - phase: 1
          name: "Session Spawn Enforcement"
          effort: 4-6h
          deliverables:
            - Check role before spawning session
            - Block subagent→orchestrator spawns
            - Warn subagent→subagent spawns (--force to override)
          files:
            - modules/AgenticCLI/src/agenticcli/commands/session.py

        - phase: 2
          name: "Plan Archive/Move Enforcement"
          effort: 4-6h
          deliverables:
            - Check role before archive/move operations
            - Block subagent archive/move attempts
            - Clear error message
          files:
            - modules/AgenticCLI/src/agenticcli/commands/plan.py

        - phase: 3
          name: "Task Complete Enforcement"
          effort: 4-6h
          deliverables:
            - Check if task assigned to current session
            - Warn if completing unassigned task
            - Advisory level (not blocking)
          files:
            - modules/AgenticCLI/src/agenticcli/commands/plan.py

        - phase: 4
          name: "Testing and Validation"
          effort: 4-6h
          deliverables:
            - Test each enforcement hook
            - Verify --force override works
            - Test error messages

      code_structure: |
        # In session.py cmd_spawn():

        from agenticcli.orchestration.enforcement import RoleEnforcer

        def cmd_spawn(args):
            enforcer = RoleEnforcer()

            # Check if current role can spawn
            result = enforcer.validate_operation("spawn_session")

            if not result.allowed:
                if result.level == EnforcementLevel.BLOCKING:
                    click.echo(f"[ERROR] {result.message}", err=True)
                    sys.exit(1)

                elif result.level == EnforcementLevel.WARNING:
                    click.echo(f"[WARNING] {result.message}", err=True)
                    if not args.force:
                        click.echo("Use --force to override.", err=True)
                        sys.exit(1)

            # ... continue with spawn logic ...

        # In plan.py cmd_archive():

        def cmd_archive(args):
            enforcer = RoleEnforcer()
            result = enforcer.validate_operation("archive_plan")

            if not result.allowed and result.level == EnforcementLevel.BLOCKING:
                click.echo(f"[ERROR] {result.message}", err=True)
                click.echo("Only orchestrator sessions can archive plans.", err=True)
                sys.exit(1)

            # ... continue with archive logic ...

      permission_matrix: |
        Operation          | Orchestrator | Subagent
        -------------------|--------------|-----------
        spawn_session      | ALLOW        | WARNING (--force)
        archive_plan       | ALLOW        | BLOCKING
        move_plan          | ALLOW        | BLOCKING
        complete_own_task  | ALLOW        | ALLOW
        complete_other_task| ADVISORY     | ADVISORY

      testing: |
        1. Spawn orchestrator, then spawn subagent from it
        2. From subagent, try to spawn another session (should warn)
        3. From subagent, try to archive plan (should block)
        4. From subagent, complete assigned task (should work)

    success_criteria:
      - Blocking enforcement prevents operation
      - Warning enforcement requires --force
      - Advisory enforcement logs but allows
      - Clear error messages guide users

    dependencies: [IA-002]
    blocks: []
    prerequisite_for: [P4]

