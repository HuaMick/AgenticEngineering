    implementation:
      approach: |
        1. Add cmd_task_done() that wraps task complete
        2. Add cmd_task_next() that completes current + starts next
        3. Infer task_id from plan context if not specified
        4. Add --plan flag to specify plan folder

      code_changes: |
        # In plan.py, add new commands:

        @click.command("done")
        @click.argument("task_id", required=False)
        @click.option("--plan", help="Plan folder path")
        def cmd_task_done(task_id, plan):
            """Mark task as completed (convenience wrapper)"""
            if not task_id:
                task_id = infer_current_task(plan)
            # Call existing task complete logic
            complete_task(plan, task_id)

        @click.command("next")
        @click.option("--plan", help="Plan folder path")
