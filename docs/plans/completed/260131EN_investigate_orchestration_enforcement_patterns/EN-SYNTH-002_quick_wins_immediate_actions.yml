  # ---------------------------------------------------------------------------

  - id: DEFER-001
    title: "P1: Full CLI Tasklist Orchestration Tracking"
    source: P1
    effort_hours: 80-100
    reason: REDUNDANT_WITH_P2

    rationale: |
      P1 provides task tracking and enforcement, but has enforcement gaps
      (agents can bypass via YAML edits). P2 (Preloaded Tasklists) provides
      similar plan structure visibility without enforcement weaknesses.

      DECISION: Defer P1 until P2 is implemented and evaluated. If P2 proves
      insufficient for task tracking needs, revisit P1 for enhanced enforcement.

      Quick Wins from P1 (QW-001, QW-002) provide immediate value without
      committing to full P1 implementation.

    keep_from_p1:
      - QW-001: Simplified status commands (agentic task done/next)
      - QW-002: Event-based logging infrastructure
      - IA-005: Gate validation commands (targeted solution)

    skip_from_p1:
      - Enforced task dependencies (P2 provides structure)
      - Completion hooks framework (complex, unclear value)
      - Activity heartbeat system (low ROI)
      - Session ID field in task (IA-004 tracks hierarchy better)
      - Full phase-aware schema (P2 extracts from MMD)

    reconsider_if:
      - P2 tasklist generation proves insufficient
      - Need for hard enforcement of task sequencing emerges
      - Completion hooks provide clear value proposition

  # ---------------------------------------------------------------------------
  # DEFER-002: P5 TMUX SESSION MANAGEMENT PATTERNS
  # ---------------------------------------------------------------------------

  - id: DEFER-002
    title: "P5: Tmux Session Management Patterns"
    source: P5
    effort_hours: 250-350
    reason: BUILD_ON_FOUNDATION

    rationale: |
      P5 provides sophisticated session hierarchy management with quality gates,
      but requires P3 (environment injection) and P4 (role detection) as
      foundation. Effort is substantial (3.5 development cycles).

      DECISION: Defer P5 until P3+P4 foundation is implemented and validated.
      P5 builds on environment-based context with tmux-specific session
      enforcement. Implement after foundation proves effective.

      Quick Wins (QW-003, QW-005) and Immediate Actions (IA-001, IA-002, IA-004)
      provide session hierarchy tracking without full tmux integration.

    prerequisites:
      - IA-001: Environment variable injection (P3 core)
      - IA-002: Role detection logic (P4 core)
      - IA-004: Session hierarchy tracking
      - IA-007: Enforcement hooks in CLI commands

    implement_after:
      - P3 and P4 foundation deployed to production
      - Session hierarchy tracking proves valuable
      - Need for tmux-specific features emerges

    alternative_approach: |
      Session hierarchy tracking (IA-004) provides parent-child relationships
      without requiring tmux. If tmux-specific features (terminal capture,
      session observation) are not needed, defer P5 indefinitely.

  # ---------------------------------------------------------------------------
  # DEFER-003: P6 BOOTSTRAP-TIME PLAN AUTO-GENERATION
  # ---------------------------------------------------------------------------

  - id: DEFER-003
    title: "P6: Bootstrap-time Plan Auto-generation (Process.yml → Tasks)"
    source: P6
    effort_hours: 61-96
    reason: BUILD_ON_P2

    rationale: |
      P6 generates agent-specific task files from process.yml at bootstrap.
      This complements P2 (which generates plan-level tasklists from MMD).

      DECISION: Defer P6 until P2 is implemented. P2 provides plan-level
      structure; P6 adds agent-level granularity. Implement P6 after P2
      proves that auto-generated task files are valuable.

      P6's MMD-to-task transformation (18-28 hours) overlaps with P2. If P2
      is implemented, the MMD parsing infrastructure is reusable for P6.

    prerequisites:
      - IA-003: MMD parsing service (P2 core)
      - IA-006: Entrypoint execute tasklist integration

    implement_after:
      - P2 deployed and evaluated
      - Agents find plan-level tasklists valuable
      - Need for agent-specific step-by-step guidance emerges

    alternative_approach: |
      If P2 tasklists are sufficient for agent guidance, P6 may be unnecessary.
      Agents already have process.yml available via agent_help.py. Auto-generating
      task files adds convenience but may not be essential.

