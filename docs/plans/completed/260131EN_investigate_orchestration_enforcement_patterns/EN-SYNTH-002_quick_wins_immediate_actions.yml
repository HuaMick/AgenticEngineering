    - metric: "Environment variable injection"
      target: "100% of spawned sessions have AGENTIC_SESSION_ID set"
      measurement: "Audit session spawn events for env var presence"

    - metric: "Role detection accuracy"
      target: "95%+ of sessions correctly identify their role"
      measurement: "Compare env vars to session registry data"

    - metric: "Enforcement effectiveness"
      target: "Zero subagent archive/move attempts succeed"
      measurement: "Audit event log for blocked operations"

  structure_metrics:
    - metric: "MMD parsing success rate"
      target: "90%+ of orchestration MMD files parse successfully"
      measurement: "Count parse successes vs failures"

    - metric: "Tasklist generation coverage"
      target: "100% of plans with MMD have tasklists in context"
      measurement: "Audit entrypoint execute context bundles"

    - metric: "Agent-specific filtering accuracy"
      target: "Agents see only their assigned tasks (no cross-agent leakage)"
      measurement: "Sample context bundles for role-based filtering"

  hierarchy_metrics:
    - metric: "Session hierarchy tracking"
      target: "100% of spawned sessions record parent_session"
      measurement: "Audit session records for parent field"

    - metric: "Hierarchy query accuracy"
      target: "Session hierarchy command shows correct tree"
      measurement: "Manual validation of hierarchy display vs session records"

  enforcement_metrics:
    - metric: "Spawn enforcement"
      target: "100% of subagent→orchestrator spawns blocked"
      measurement: "Audit event log for blocked spawn attempts"

    - metric: "Archive enforcement"
      target: "100% of subagent archive attempts blocked"
      measurement: "Audit event log for blocked archive attempts"

    - metric: "Force override usage"
      target: "< 10% of warnings overridden with --force"
      measurement: "Count --force usages in event log"

  adoption_metrics:
    - metric: "Role-based spawn adoption"
      target: "80%+ of session spawns include --role flag"
      measurement: "Count spawns with vs without --role"

    - metric: "Plan structure visibility"
      target: "Orchestrators reference tasklist in 50%+ of plans"
      measurement: "Survey orchestrator usage patterns"

    - metric: "Gate validation usage"
      target: "Gate validation used in 80%+ of multi-phase plans"
