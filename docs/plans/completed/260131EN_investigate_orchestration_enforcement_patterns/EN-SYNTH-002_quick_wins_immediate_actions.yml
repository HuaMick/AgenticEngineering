  # ---------------------------------------------------------------------------
  # IA-005: GATE VALIDATION COMMANDS (P1 SUBSET)
  # ---------------------------------------------------------------------------

  - id: IA-005
    title: "Gate Validation Commands"
    source: P1
    effort_hours: 12-18
    value: MEDIUM
    complexity: MEDIUM
    priority: 5

    what: |
      Add CLI commands for orchestration gate validation:
      - `agentic plan gate check <gate_name>` - Returns pass/fail
      - `agentic plan gate require <gate_name>` - Fails if gate not met
      - `agentic plan gate list` - Show all gates and status
      Enables orchestrators to enforce phase transitions.

    why: |
      Targeted solution for gate enforcement without full P1 complexity.
      Orchestrators can call gate validation before phase transitions.
      Foundation for future orchestration state machine.

    where:
      files:
        - modules/AgenticCLI/src/agenticcli/commands/plan.py
      commands:
        - "agentic plan gate check <gate_name> --plan <folder>"
        - "agentic plan gate require <gate_name> --plan <folder>"
        - "agentic plan gate list --plan <folder>"
      dependencies:
        - Plan YAML schema (existing)

    implementation:
      phases:
        - phase: 1
          name: "Gate Definition Schema"
          effort: 3-4h
          deliverables:
            - Define gate schema in plan YAML
            - Gate types: file_exists, task_completed, review_approved
            - Gate requirements structure
          design: |
            # In plan_*.yml:
            gates:
              - id: mmd_exists
                type: file_exists
                path: "orchestration_*.mmd"
              - id: build_complete
                type: phase_complete
                phase: build
              - id: review_approved
                type: review_status
                review_id: "build_review"

        - phase: 2
          name: "Gate Validation Logic"
          effort: 6-8h
          deliverables:
            - Implement gate check logic for each type
            - Return pass/fail with reason
            - Support multiple gate types
          files:
            - modules/AgenticCLI/src/agenticcli/commands/plan.py

        - phase: 3
          name: "Gate CLI Commands"
          effort: 3-4h
          deliverables:
            - cmd_gate_check()
            - cmd_gate_require()
            - cmd_gate_list()
          files:
            - modules/AgenticCLI/src/agenticcli/commands/plan.py

        - phase: 4
          name: "Testing"
          effort: 0-2h
          deliverables:
            - Test each gate type
            - Test pass/fail scenarios
            - Test error handling

      code_structure: |
        # In plan.py:

        @click.command("check")
        @click.argument("gate_name")
        @click.option("--plan", required=True)
        def cmd_gate_check(gate_name, plan):
            """Check if gate requirements are met."""
            plan_data = load_plan_yaml(plan)
            gates = plan_data.get("gates", [])

            gate = find_gate(gates, gate_name)
            if not gate:
                click.echo(f"Gate '{gate_name}' not found", err=True)
                sys.exit(1)

            result = validate_gate(gate, plan)
            if result.passed:
                click.echo(f"PASS: {gate_name}")
                sys.exit(0)
            else:
                click.echo(f"FAIL: {gate_name} - {result.reason}")
                sys.exit(1)

        def validate_gate(gate: dict, plan_folder: Path) -> GateResult:
            """Validate gate based on type."""
            gate_type = gate["type"]

            if gate_type == "file_exists":
                path = plan_folder / gate["path"]
                return GateResult(passed=path.exists(), reason=f"File {path}")

            elif gate_type == "phase_complete":
                phase = gate["phase"]
                tasks = get_phase_tasks(plan_folder, phase)
                all_complete = all(t["status"] == "completed" for t in tasks)
                return GateResult(passed=all_complete, reason=f"Phase {phase}")

            # ... other gate types

      testing: |
        1. Define gates in test plan YAML
        2. Test file_exists gate (file present vs absent)
        3. Test phase_complete gate
        4. Test gate require (should fail if gate fails)

    success_criteria:
      - Gate validation returns correct pass/fail
      - Clear error messages for failed gates
      - Supports multiple gate types
      - Integration with existing plan YAML schema

    dependencies: []
    blocks: []

