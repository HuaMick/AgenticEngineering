      code_structure: |
        # orchestration/enforcement.py

        class Role(Enum):
            ORCHESTRATOR = "orchestrator"
            SUBAGENT = "subagent"
            LEGACY = "legacy"  # No orchestration context

        class EnforcementLevel(Enum):
            ADVISORY = "advisory"
            WARNING = "warning"
            BLOCKING = "blocking"

        @dataclass
        class RoleContext:
            role: Role
            source: str  # "environment", "registry", "inferred"
            confidence: str  # "high", "medium", "low"
            session_id: str
            task_id: Optional[str]
            plan_folder: Optional[str]
            parent_session: Optional[str]
            phase: Optional[str]

        @dataclass
        class EnforcementResult:
            allowed: bool
            level: EnforcementLevel
            message: str
            requires_force: bool  # True if --force can override

        class RoleEnforcer:
            def get_current_role(self) -> RoleContext:
                """Detect current session's role."""
                # Layer 1: Environment variables (high confidence)
                if role_str := os.getenv("AGENTIC_SESSION_ROLE"):
                    return RoleContext(
                        role=Role(role_str),
                        source="environment",
                        confidence="high",
                        session_id=os.getenv("AGENTIC_SESSION_ID"),
                        task_id=os.getenv("AGENTIC_TASK_ID"),
                        plan_folder=os.getenv("AGENTIC_PLAN_FOLDER"),
                        parent_session=os.getenv("AGENTIC_PARENT_SESSION"),
                        phase=os.getenv("AGENTIC_PHASE")
                    )

                # Layer 2: Session registry (medium confidence)
                # ... registry lookup logic ...

                # Layer 3: Heuristics (low confidence)
                return RoleContext(role=Role.LEGACY, source="inferred", confidence="low", ...)

            def validate_operation(self, operation: str) -> EnforcementResult:
                """Check if current role can perform operation."""
                context = self.get_current_role()

                # Check permission matrix
                if operation == "spawn_session":
                    if context.role == Role.SUBAGENT:
                        return EnforcementResult(
                            allowed=False,
                            level=EnforcementLevel.WARNING,
                            message="Subagents should not spawn additional sessions",
                            requires_force=True
                        )

                # ... other operations ...

                return EnforcementResult(allowed=True, level=EnforcementLevel.ADVISORY, ...)

      testing: |
