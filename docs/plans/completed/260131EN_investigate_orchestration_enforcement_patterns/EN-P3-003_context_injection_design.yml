# =============================================================================
# DESIGN DECISIONS AND RATIONALE
# =============================================================================

design_decisions:

  decision_1:
    topic: "Environment Variables vs System Prompt"
    decision: "Use environment variables as primary mechanism"
    rationale: |
      - Environment variables are immediate and don't consume tokens
      - Can be detected without LLM interpretation
      - Works with any prompt content
      - System prompt requires file management and Claude CLI flags
    alternative_considered: "System prompt injection via --system-prompt"

  decision_2:
    topic: "Explicit vs Implicit Context"
    decision: "Prefer explicit CLI arguments, defer auto-resolution"
    rationale: |
      - Explicit context is traceable and predictable
      - Auto-resolution may pick wrong plan/task
      - User maintains control over orchestration
      - Auto-resolution can be added later as convenience
    alternative_considered: "Default to auto-resolution from active plan"

  decision_3:
    topic: "Prompt Prefix as Optional"
    decision: "Make prompt prefix opt-in via --inject-context"
    rationale: |
      - Not all sessions need embedded context
      - Reduces token overhead for simple tasks
      - Gives user control over prompt structure
      - Environment variables provide alternative detection
    alternative_considered: "Always inject context into prompt"

  decision_4:
    topic: "Session Hierarchy in Registry"
    decision: "Store parent_session and child_sessions in record"
    rationale: |
      - Enables hierarchical session views
      - Supports tracing orchestration flow
      - Allows cleanup of orphaned sessions
      - Minimal storage overhead (just UUIDs)
    alternative_considered: "Separate hierarchy database"

  decision_5:
    topic: "Backward Compatibility"
    decision: "All new features are optional, defaults preserve current behavior"
    rationale: |
      - Existing scripts continue to work
      - Gradual adoption possible
      - No breaking changes to session registry
      - New fields default to null/empty
    alternative_considered: "Breaking changes with migration"

# =============================================================================
# RISKS AND MITIGATIONS
# =============================================================================

risks:

  risk_1:
    description: "Environment variables can be overwritten by agent"
    likelihood: LOW
    impact: MEDIUM
    mitigation: |
      - Session registry provides authoritative context
      - Prompt prefix provides redundant context visibility
      - Log env vars at spawn time for audit trail

  risk_2:
    description: "Subagent ignores orchestration context"
    likelihood: MEDIUM
    impact: MEDIUM
    mitigation: |
      - Context is advisory, not enforced
      - Future enforcement layer can add hard limits
      - Agent training/guidance should emphasize role awareness

  risk_3:
    description: "Session registry grows with orchestration fields"
    likelihood: LOW
    impact: LOW
    mitigation: |
      - New fields are minimal (strings, not objects)
      - Existing session cleanup still applies
      - orchestration_context is optional blob

  risk_4:
    description: "Token overhead from prompt prefix"
    likelihood: LOW
    impact: LOW
    mitigation: |
      - Prompt prefix is opt-in via --inject-context
      - Context block is compact (~50-100 tokens)
      - Can be disabled when not needed

# =============================================================================
# TESTING STRATEGY
# =============================================================================

testing_strategy:

  unit_tests:
    - "Test CLI argument parsing for new flags"
    - "Test environment variable construction"
    - "Test session record schema with new fields"
    - "Test prompt prefix generation"

  integration_tests:
    - "Spawn session with orchestration context, verify env vars"
    - "Spawn session with --inject-context, verify prompt prefix"
    - "Verify session registry contains orchestration fields"
    - "Verify session list displays role and task"

  manual_tests:
    - "Spawn orchestrator session, spawn subagent, verify hierarchy"
    - "Resume session with orchestration context"
    - "Check session status shows orchestration details"

# =============================================================================
# CONCLUSION
# =============================================================================

conclusion: |
  This design provides a comprehensive approach to orchestration context
  injection that addresses all gaps identified in EN-P3-001 and EN-P3-002.

  The hybrid approach combines:
  1. CLI arguments for explicit context specification
  2. Environment variables for runtime detection
  3. Session registry for traceability and hierarchy
  4. Optional prompt prefix for immediate visibility

  Implementation is straightforward with ~100 lines of code for Phase 1,
  and all changes are backward compatible. The design establishes the
  foundation for future enforcement mechanisms while providing immediate
  value for orchestration-aware sessions.

  Next Steps:
  - Review design with stakeholders
  - Implement Phase 1 (core infrastructure)
  - Add Phase 2 (prompt injection) if needed
  - Enhance session list/status displays in Phase 3
  - Defer auto-resolution (Phase 4) for future iteration

