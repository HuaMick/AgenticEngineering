    archival_strategy:
      choice: "Auto-archive to completed/ folder on session end"
      rationale: "Preserves audit trail, cleans up active directory"

# =============================================================================
# RISKS AND MITIGATIONS
# =============================================================================
risks_and_mitigations:

  - risk: "Process step dependencies - no explicit depends_on"
    current_state: "Steps are sequential"
    mitigation:
      - Extract from step descriptions (heuristic)
      - Add optional depends_on field to process.yml step dicts
      - Use phase structure to infer parallelizable tasks

  - risk: "Agent type inference - no explicit mapping"
    current_state: "No process.yml to agent role mapping"
    mitigation:
      - Require agent category in process.yml metadata
      - Validate against KNOWN_AGENTS
      - Fail loudly if role cannot be determined

  - risk: "Stale task files - process.yml changes not reflected"
    current_state: "No auto-update mechanism"
    mitigation:
      - Add generation timestamp to files
      - Check if process.yml is newer
      - Warn agent if stale
      - Implement refresh command

  - risk: "Session ID collision"
    likelihood: "Extremely low (UUID4 = 2^122 values)"
    mitigation:
      - Use UUID4
      - Validation before archiving
      - Include timestamp in filename

