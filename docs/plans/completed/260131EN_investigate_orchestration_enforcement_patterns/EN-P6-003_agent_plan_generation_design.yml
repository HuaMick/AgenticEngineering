      notes: "Just documentation needed"

    - action: "Update agent_help.py to show task file location"
      effort: "1 hour"
      value: MEDIUM
      notes: "Guide agents to bootstrap command"

  phase_1_implementation_path:
    - step: "Implement services/agent_task_generator.py"
      notes: "Reuse step extraction from agent_help.py"

    - step: "Extend context.py with cmd_generate_agent()"
      notes: "Argument validation, error handling"

    - step: "Modify cmd_bootstrap()"
      notes: "Add --generate-task-file parameter"

    - step: "Document file schema"
      notes: "Update guidance artifacts, add examples"

  critical_design_decisions:
    session_id_timing:
      choice: "Optional at generation, added at spawn time"
      rationale: "Allows pre-generation at plan start without session ID"

    file_location:
      choice: ".claude/task-lists/<role>.yml (not plan-folder)"
      rationale: "Cleaner separation, easier discovery, supports concurrent sessions"

    update_strategy:
      choice: "Agent updates via CLI command or direct YAML edit"
