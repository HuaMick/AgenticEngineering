  immediate_actions:
    - action: "Add task file generation to cmd_bootstrap()"
      effort: "2-3 hours"
      value: HIGH
      notes: "Minimal changes, backward compatible"

    - action: "Create .claude/task-lists/ directory structure"
      effort: "0.5 hours"
