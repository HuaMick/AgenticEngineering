      # PHASE 4: VALIDATION
      # ========================================
      - name: Validation Phase
        status: complete
        execution_groups:
          - execution: sequential
            name: Verify all asset paths
            agents:
              - type: test
                inputs:
                  - modules/AgenticGuidance/entrypoints/_plan.yml
                  - modules/AgenticGuidance/assets/guidelines/fix-the-source.yml
