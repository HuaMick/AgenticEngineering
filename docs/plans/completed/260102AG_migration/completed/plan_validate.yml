                  Context: All files have been migrated. Verify paths resolve correctly.

                  Instructions:
                  1. For each file in the inputs list, verify it exists
                  2. Parse _plan.yml and extract all input paths
                  3. From the entrypoints/ directory, verify each relative path resolves
                  4. Report any missing files or broken references

                  Validation checklist:
                  - [ ] _plan.yml exists in entrypoints/
                  - [ ] All 6 guideline files exist in assets/guidelines/
                  - [ ] All 2 definition files exist in assets/definitions/
                  - [ ] All 3 example files exist in assets/examples/planner/YYMMDDRepo_Branch/live/
                  - [ ] Relative paths in _plan.yml resolve from entrypoints/ directory

                  Why this matters: Broken references would cause planner agent failures.
                success_criteria:
                  - All 12 files exist in target locations
                  - All relative paths in _plan.yml resolve correctly
                  - No broken references detected

          - execution: sequential
            name: Test _plan.yml execution
            agents:
              - type: test
                inputs:
                  - modules/AgenticGuidance/entrypoints/_plan.yml
                guidance: |
                  Context: _plan.yml should be parseable and usable by planner agents.

                  Instructions:
                  1. Parse _plan.yml as YAML
                  2. Verify required sections exist (process, inputs, steps, guidelines)
                  3. Verify input paths can be resolved relative to entrypoints/
                  4. Document any parsing errors or structural issues

                  Expected structure:
                  - process.goal: String describing the planning goal
                  - process.inputs: List of file references with location and description
                  - process.steps: List of execution steps
                  - process.guidelines: List of behavioral guidelines

                  Why this matters: Structural validity ensures the entrypoint can be used.
                success_criteria:
                  - YAML parses without errors
                  - All required sections present
                  - Input locations can be resolved
                status: pending

          - execution: sequential
            name: Review for broken references
            agents:
