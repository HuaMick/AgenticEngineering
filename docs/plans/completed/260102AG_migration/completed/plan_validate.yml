# AgenticGuidance Migration Plan - Validation and Cleanup (Planner Agents Only)
# Created: 2026-01-02
# Purpose: Validate migrated PLANNER files and complete cleanup tasks
#
# IMPORTANT: SCOPE LIMITATION
# This migration is LOCALIZED TO PLANNER AGENTS ONLY - not the entire agent ecosystem.
# - IN SCOPE: _plan.yml, 8 planner agents, assets directly referenced by planners
# - OUT OF SCOPE: teacher, explore, orchestration, documentation agents
# - PARTIAL: test, build, deploy, cleaner agents (only where planners reference them)
# - INTENTIONAL BROKEN REFS: References to out-of-scope agents left pointing to legacy
#
# KEY PRINCIPLES:
# 1. VALIDATION: Verify all PLANNER paths resolve correctly
# 2. TESTING: Confirm _plan.yml can be parsed and references work
# 3. CLEANUP: Document migration and archive planning artifacts
#
# This file covers phases 4-5 of the migration.

