                inputs:
                  - modules/AgenticGuidance/
                guidance: |
                  Context: Final review to catch any missed references.

                  Instructions:
                  1. Search all migrated files for absolute paths to legacy location
                  2. Search for any references to "MyAgentsGuidance" that should be updated
                  3. Check for any hardcoded paths that assume legacy folder structure
                  4. Report any findings for manual review

                  Search patterns:
                  - "modules/legacy/MyAgents/projects/MyAgentsGuidance"
                  - "/home/code/myagents/"
                  - Any absolute paths that don't match new location

                  Why this matters: Ensures complete migration without legacy dependencies.
                success_criteria:
                  - No references to legacy MyAgentsGuidance paths
                  - No hardcoded absolute paths to old locations
                  - All internal references use correct relative paths
                status: pending

