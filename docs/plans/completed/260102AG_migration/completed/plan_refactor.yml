# AgenticGuidance Migration - Refactor to Planner-Only Scope
# Created: 2026-01-02
# Completed: 2026-01-02
# Purpose: Remove non-planner agents and establish proper manifest structure
#
# CONTEXT:
# The initial migration included build/, test/, cleaner/, deploy/ agent directories
# because planner manifests hardcoded references to their process files.
# This violates the "planner only" scope. We need to:
# 1. Create a top-level agents/manifest.yml listing only migrated agents
# 2. Add agents/README.md explaining design decisions
# 3. Update planner manifests to reference category manifests (not process files)
# 4. Remove non-planner agent directories
# 5. Add definition for README-as-context pattern
#
# STATUS: COMPLETE (2026-01-02)
# All 6 tasks completed with 6 consecutive review approvals.

worktree: /home/code/AgenticEngineering
destination: /home/code/AgenticEngineering/modules/AgenticGuidance

live-plans:
  - id: AG-REFACTOR-001
    title: Refactor to True Planner-Only Scope
    status: complete
    completed: 2026-01-02
    description: |
      Remove non-planner agent directories and establish proper manifest structure.
      Planner agents should reference category manifests, not individual process files.

    phases:
      # ========================================
      # PHASE 1: CREATE AGENT MANIFEST
      # ========================================
      - name: Create Agent Manifest
        status: complete
        tasks:
          - id: REFACTOR-001
            status: complete
            completed: 2026-01-02
            description: "Create agents/manifest.yml listing only migrated agents"
            details: |
              Create /home/code/AgenticEngineering/modules/AgenticGuidance/agents/manifest.yml

              Content should include:
              - Only planner category (the only fully migrated agent category)
              - Short description for each agent
              - Reference to agent-categories.yml for category definitions

              Example structure:
              ```yaml
              # AgenticGuidance Agent Manifest
              # Lists all agents migrated to this module

              version: "1.0"
              module: AgenticGuidance

              categories:
                planner:
                  description: "Create executable implementation plans from objectives"
                  manifest: "agents/planner/manifest.yml"
                  sub_agents:
                    - planner-phases: "Initial objective decomposition into phases"
                    - planner-build: "Implementation planning"
                    - planner-test: "Test planning with loops"
                    - planner-cleaning: "Cleanup and audit planning"
                    - planner-teach: "Guidance improvement planning"
                    - planner-agent-exam: "Agent validation exams"
                    - planner-reviewer: "Plan review and approval"
                    - planner-test-guidance: "Guidance completeness testing"

              # Categories NOT yet migrated (remain in legacy)
              not_migrated:
                - build: "modules/legacy/MyAgents/"
                - test: "modules/legacy/MyAgents/"
                - cleaner: "modules/legacy/MyAgents/"
                - deploy: "modules/legacy/MyAgents/"
                - teacher: "modules/legacy/MyAgents/"
                - explore: "modules/legacy/MyAgents/"
                - orchestration: "modules/legacy/MyAgents/"
                - documentation: "modules/legacy/MyAgents/"
              ```

      # ========================================
      # PHASE 2: CREATE AGENTS README
      # ========================================
      - name: Create Agents README
        status: complete
        tasks:
          - id: REFACTOR-002
            status: complete
            completed: 2026-01-02
            description: "Create agents/README.md with design decisions"
            details: |
              Create /home/code/AgenticEngineering/modules/AgenticGuidance/agents/README.md

              Content should explain:
              1. Purpose of this agents directory
              2. Design decision: README files as injectable context
              3. What agents are migrated vs remaining in legacy
              4. How to reference agents that aren't migrated yet
              5. Future migration path

              Key design decisions to document:
              - README files serve as context that can be injected into agent prompts
              - Agents reference category manifests, not individual process files
              - Non-migrated agents should be referenced via legacy paths
              - Category manifests are updated as agents are migrated

      # ========================================
      # PHASE 3: ADD README CONTEXT DEFINITION
      # ========================================
      - name: Add README Context Definition
        status: complete
        tasks:
          - id: REFACTOR-003
            status: complete
            completed: 2026-01-02
            description: "Add assets/definitions/readme-context.yml if not exists"
            details: |
              Create /home/code/AgenticEngineering/modules/AgenticGuidance/assets/definitions/readme-context.yml

              Define the pattern:
              - README files as context injection points
              - When to use README vs other context files
              - How agents should interpret README content
              - Relationship to manifest files

      # ========================================
      # PHASE 4: UPDATE PLANNER MANIFESTS
      # ========================================
      - name: Update Planner Manifests
        status: complete
        tasks:
          - id: REFACTOR-004
            status: complete
            completed: 2026-01-02
            description: "Update planner manifests to reference category manifests"
            details: |
              Update the following files to remove hardcoded process.yml references:

              Files to update:
              - agents/planner/planner-test/manifest.yml
              - agents/planner/planner-test/inputs.yml
              - agents/planner/planner-build/manifest.yml
              - agents/planner/planner-cleaning/manifest.yml
              - agents/planner/planner-test-guidance/manifest.yml
              - agents/planner/planner-test-guidance/inputs.yml

              Change pattern:
              FROM: "agents/test/test-runner/process.yml"
              TO: Reference category manifest or leave as placeholder for future migration

              Example:
              ```yaml
              test_process_mapping: |
                Strategy to process mapping (references to be resolved at runtime):
                - smoke_test: test-runner (see agents/test/manifest.yml when migrated)
                - agent-blind-test: test-user-simulator
                - audit: test-audit
              ```

      # ========================================
      # PHASE 5: REMOVE NON-PLANNER AGENTS
      # ========================================
      - name: Remove Non-Planner Agent Directories
        status: complete
        tasks:
          - id: REFACTOR-005
            status: complete
            completed: 2026-01-02
            description: "Remove build/, test/, cleaner/, deploy/ directories"
            details: |
              Remove these directories from agents/:
              - agents/build/
              - agents/test/
              - agents/cleaner/
              - agents/deploy/

              These were incorrectly included because planner manifests
              hardcoded references to their process files.

              Command:
              ```bash
              rm -rf modules/AgenticGuidance/agents/build
              rm -rf modules/AgenticGuidance/agents/test
              rm -rf modules/AgenticGuidance/agents/cleaner
              rm -rf modules/AgenticGuidance/agents/deploy
              ```

              After removal, agents/ should only contain:
              - manifest.yml (new - from REFACTOR-001)
              - README.md (new - from REFACTOR-002)
              - planner/ (the only migrated agent category)

      # ========================================
      # PHASE 6: VALIDATION
      # ========================================
      - name: Validation
        status: complete
        tasks:
          - id: REFACTOR-006
            status: complete
            completed: 2026-01-02
            description: "Verify refactoring is complete"
            details: |
              Verify:
              1. agents/manifest.yml exists and lists only planner
              2. agents/README.md exists with design decisions
              3. assets/definitions/readme-context.yml exists
              4. Planner manifests no longer reference specific process.yml files
              5. Only agents/planner/ directory remains (plus manifest.yml and README.md)
              6. No broken required references

    success_criteria:
      - "agents/ contains only: manifest.yml, README.md, planner/"
      - "Planner manifests reference category manifests, not process files"
      - "README-as-context pattern is documented in definitions"
      - "Design decisions documented in agents/README.md"
