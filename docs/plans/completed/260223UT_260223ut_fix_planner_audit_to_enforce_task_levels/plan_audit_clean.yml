_template_status: active

name: "Audit and Cleanup - Task Nesting Compliance"
status: pending

objective: |
  After implementation, audit existing live plans to verify none have
  root-level tasks violations. Clean up any malformed plans found.
  Verify the sibling plan (260223NE) can be archived since this plan
  supersedes its research task.

phases:
  - name: "Plan Compliance Audit"
    id: "audit_01"
    status: pending
    tasks:
      - id: "AU_001"
        name: "Scan all live plans for root-level tasks violations"
        status: pending
        description: |
          Run PlanService.validate_plan_structure() against every plan
          folder in docs/plans/live/. Report any plans that have:
          1. Root-level `tasks:` key
          2. Phases without `tasks:` list
          3. Any other structure violations

          Output: list of plan folders with violations and specific errors.

      - id: "AU_002"
        name: "Verify sibling plan 260223NE can be archived"
        status: pending
        description: |
          Plan 260223NE_fix_planner_audit_to_enforce_task_nesting is
          the sibling plan with a single research task (IM_001). Since
          this plan (260223UT) completes the full implementation,
          260223NE should be archived to completed/ to avoid confusion.

  - name: "Cleanup"
    id: "cleanup_01"
    status: pending
    tasks:
      - id: "CL_001"
        name: "Fix any live plans with nesting violations"
        status: pending
        description: |
          For any plans found in AU_001 with root-level tasks, restructure
          them to use phases[].tasks[] nesting. This is a manual remediation
          step that may not be needed if all existing plans are well-formed.

cleanup_targets:
  - "docs/plans/live/260223NE_fix_planner_audit_to_enforce_task_nesting/"

documentation:
  - "docs/userstories/AgenticGuidance/04_planning.yml"
