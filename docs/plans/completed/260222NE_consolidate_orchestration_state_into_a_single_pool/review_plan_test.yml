# ========================================
# BLOCKING ISSUES SUMMARY
# ========================================
blocking_issues:
  - id: "BLOCK-001"
    fence: "story_validation"
    severity: HIGH
    description: |
      3 of 6 affected stories (US-CLI-030, US-CLI-032, US-CLI-035) lack UAT tasks.
      Per Story-First Planning fence: "Plans with affected_stories MUST have
      corresponding UAT tasks."
    remediation: |
      Option A: Add UAT tasks for the 3 missing stories
      Option B: Remove these 3 from affected_stories if they are not materially
      impacted by the state consolidation (requires justification)

  - id: "BLOCK-002"
    fence: "file_placement"
    severity: MEDIUM
    description: |
      plan_audit_clean.yml and plan_teach.yml are unpopulated stub templates.
      Stubs with _template_status: stub and TODO placeholders are structural issues.
    remediation: |
      Delete both files. If audit/teach phases are needed later, they can be
      re-created when ready.

  - id: "BLOCK-003"
    fence: "story_validation"
    severity: MEDIUM
    description: |
      plan_build.yml lacks affected_stories field. Build plans are in
      blocked_plan_types and MUST have affected_stories (no escape hatch).
    remediation: |
      Add affected_stories to plan_build.yml matching the 6 stories in plan_test.yml.
      Since build is completed, this is a retroactive fix but still required
      for plan integrity.

