- id: P7
  name: Update Agent Loop Definitions
  description: 'Add error-driven planning awareness to the agent loop definitions

    so that loops can track and report out-of-scope errors discovered during iterations.

    '
  execution: sequential
  tasks:
  - id: T_012
    name: Add error-driven-planning section to agent-loops.yml
    description: "Update modules/AgenticGuidance/assets/definitions/agent-loops.yml\
      \ to add:\n\n1. A new top-level section (after exit_conditions):\n\nerror_driven_planning:\n\
      \  concept: |\n    During any loop iteration, agents may discover errors outside\
      \ the current\n    plan's scope. These are NOT retry conditions \u2014 they\
      \ are opportunities for\n    systematic improvement via new planning sessions.\n\
      \n  protocol_reference: \"modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml\"\
      \n\n  loop_behavior: |\n    When an agent within a loop reports out_of_scope_error:\n\
      \    1. The orchestrator logs the error and suggested remediation plan\n   \
      \ 2. The loop CONTINUES (out-of-scope errors do NOT consume iterations)\n  \
      \  3. At loop exit, all out-of-scope errors are aggregated\n    4. Orchestrator\
      \ creates remediation plans for HIGH+ priority errors\n\n  does_not_affect:\n\
      \    - \"Iteration count (out-of-scope errors are separate from in-scope retries)\"\
      \n    - \"Loop exit conditions (these are still based on in-scope success criteria)\"\
      \n    - \"Max iterations (only in-scope failures count)\"\n"
    target_files:
    - modules/AgenticGuidance/assets/definitions/agent-loops.yml
    success_criteria:
    - error_driven_planning section added
    - Clear that out-of-scope errors don't consume iterations
    - Protocol reference included
    priority: MEDIUM
    status: completed
