  - phase_id: P2
    name: "Add Typer Input Validation Constraints"
    description: >
      Add validation callbacks to Typer --status and --priority parameters
      so invalid values are rejected at the CLI layer (matching argparse behavior).
    status: pending
    dependencies:
      - P1
    tasks:
      - task_id: P2_01
        name: "Add validation callbacks for --status and --priority in cli.py"
        description: >
          Fix 2 failures in test_cli_task.py:

          1. test_list_status_rejects_invalid: Typer --status is a plain str — Typer
             accepts any string. Add a Typer callback to validate against
             ["all", "pending", "in_progress", "completed"].

          2. test_add_priority_rejects_invalid: Same for --priority with
             valid values ["low", "medium", "high"].

          Add validation callbacks in cli.py near the plan task command definitions.
          Also update the test assertions: Typer error messages use "Invalid value"
          not "invalid choice". Update tests to check for a more generic error pattern
          like `code != 0` (already checked) and remove the specific message check
          or broaden it.
        status: pending
        guidance: >
          In cli.py, add validation callbacks near the plan_task_list and plan_task_add
          definitions (around line 1438):

          ```python
          def _validate_status(value: str) -> str:
              valid = ["all", "pending", "in_progress", "completed"]
              if value not in valid:
                  raise typer.BadParameter(
                      f"Invalid choice: '{value}'. Choose from: {', '.join(valid)}")
              return value

          def _validate_priority(value: str) -> str:
              valid = ["low", "medium", "high"]
              if value not in valid:
                  raise typer.BadParameter(
                      f"Invalid choice: '{value}'. Choose from: {', '.join(valid)}")
              return value
          ```

          Apply as callback= on the Typer.Option() for the respective parameters.

          In test_cli_task.py, update assertions:
          - test_list_status_rejects_invalid: Change `"invalid choice" in stderr.lower()`
            to `"invalid" in stderr.lower()` to match both formats
          - test_add_priority_rejects_invalid: Same change
        target_files:
