plan_name: "Fix Remaining 11 Test Failures (Typer Migration Residual)"
worktree: 260211CO_fix_remaining_tests
branch: main
status: draft
target_project_path: /home/code/AgenticEngineering

objective: >
  Fix 11 remaining test failures across 6 files caused by behavioral differences
  between the old argparse CLI and the new Typer CLI backend. The strategy is to
  update tests to match Typer behavior where appropriate, and add missing Typer
  constraints where the CLI should actually reject invalid input.

context: >
  The CLI migrated from argparse to Typer (cli.py). Most tests were updated in
  prior plans (260211AE series). These 11 failures are the final residual issues:

  1. test_plan.py (3 failures):
     - test_list_plans: Rich table truncates "260103AE_test" to "260103A…" — assertion
       must use substring or check table contains truncated form
     - test_task_start: Task start requires orchestration_*.mmd (EN-006 fence) but
       test fixture has no MMD file — need to create one in fixture
     - test_task_not_found: Error message is now "Cannot start task - plan has no
       orchestration_*.mmd" not "not found" — either fix assertion or add MMD file
       so the code reaches the "not found" path

  2. test_cli_task.py (2 failures):
     - test_list_status_rejects_invalid: Typer --status is a plain str, not choices=
       enum — Typer accepts any string. Fix: add validation callback in cli.py
     - test_add_priority_rejects_invalid: Same for --priority

  3. test_agent_help.py (2 failures):
     - test_all_26_agents_registered: KNOWN_AGENTS has 24 agents, test expects 26.
       Fix: update test to expect 24
     - test_orchestration_agents_count: Source has 3 orchestration agents, test expects 5.
       Fix: update test to expect 3

  4. test_cli.py (1 failure):
     - test_help_shows_aliases: Test expects "(wt)", "(cfg)" etc. in help output,
       but Typer uses hidden commands for aliases — they don't show in help text.
       Fix: update test to check actual Typer help content

  5. test_entry.py (1 failure):
     - test_main_h_flag: entry.py only translates -h→--help when AGENTIC_USE_TYPER=1.
       Test calls main() without env var, so -h falls through and exits with code 2.
       Fix: move -h translation before the backend routing check

  6. test_workflow_sequences.py (2 failures):
     - test_plan_scaffold_status_workflow: Expects live/ and completed/ subdirs inside
       scaffold folder, but create_planning_folder uses flattened structure (plan_*.yml
       directly in folder). Fix: update test assertions to match flattened structure
     - test_plan_with_json_output: Creates file at plan_path/live/plan_test.yml but
       flattened structure puts files directly in plan_path. Fix: write to plan_path/

affected_stories:
  - US-CLI-011  # Scaffold Plan Folder Only
