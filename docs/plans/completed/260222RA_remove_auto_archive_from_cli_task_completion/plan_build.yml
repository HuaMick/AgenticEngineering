name: Remove auto-archive from CLI task completion
status: completed
priority: high
context: 'When a build agent marks the last task in a plan as completed, the CLI was

  automatically archiving the plan folder from live/ to completed/. This

  short-circuited the orchestration-loop, which has its own dedicated archive

  pass that runs after discovery. Planners often identify that a plan tagged

  as "complete" isn''t actually properly completed. Auto-archive removed the

  opportunity for the planning loop to validate completion before archiving.

  Two plans were found stuck in live/ because auto-archive failed silently,

  and the loop assumed the CLI had already handled it.


  Goal: Remove all auto-archive triggers from CLI task completion commands.

  Only the orchestration-loop (via explicit `agentic plan move folder --force`)

  should archive plans. The `action_required: "archive"` signal in

  `plan status`/`plan list` output remains as the detection mechanism.

  '
success_criteria:
- Auto-archive code removed from cmd_task_complete, cmd_update_task, cmd_new
- --no-archive flag removed from all 6 CLI command registrations
- is_plan_fully_completed() function preserved (used by plan status)
- cmd_archive() and cmd_move() explicit archive commands preserved
- action_required "archive" signal in plan status/list JSON preserved
- All directly-related tests pass (auto-archive tests updated)
- Pre-existing test failures documented for separate fix
