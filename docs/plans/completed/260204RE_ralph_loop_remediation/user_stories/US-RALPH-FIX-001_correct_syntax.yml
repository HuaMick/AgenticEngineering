id: US-RALPH-FIX-001
title: "Ralph Loop Start with Correct Syntax"
description: "Verify that 'agentic ralph start' uses correct Claude flags and successfully initializes."
persona: "Developer starting work"
priority: "critical"

starting_state:
  environment:
    tmux_available: true
    claude_available: true
    no_loop_running: true

journey:
  - step: 1
    action: "Run 'agentic ralph start -b'"
    expected: "Output indicates 'Ralph loop started' with a Loop ID and Session name."
  
  - step: 2
    action: "Run 'tmux ls'"
    expected: "A tmux session named 'ralph-XXXX' exists."
  
  - step: 3
    action: "Attach to session: 'tmux attach -t ralph-XXXX' or check output via 'tmux capture-pane -p'"
    expected: "The Claude process is running and hasn't exited with an argument error."

success_criteria:
  - "No '--prompt' error in terminal logs"
  - "Tmux session remains active"
