    steps:
    - Run agentic orchestrate (no --planning-loop)
    - Verify interactive Claude session launches
    - Confirm bootstrap context injected
  - name: Planning loop runs full lifecycle
    steps:
    - Create a test plan with plan_build.yml
    - Run agentic orchestrate --planning-loop --plan <folder>
    - Verify planning phase runs (discover, plan, review, MMD)
    - Verify execution phase runs (parse routing, spawn agents per phase)
    - Verify plan archived on success
  - name: All tests pass
    steps:
    - Run python3 -m pytest tests/test_orchestration_workflow.py -v
    - Run python3 -m pytest tests/test_orchestrate_command.py -v
