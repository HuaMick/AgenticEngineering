name: agentic orchestrate --planning-loop
worktree_path: /home/code/AgenticEngineering
branch: main
status: active
priority: high
context: "PROBLEM:\n- The `agentic orchestrate` command currently only launches an\
  \ interactive Claude session\n- There is no automated mode that runs the full plan\
  \ lifecycle without human interaction\n- The planner loop (PlannerLoopWorkflow/Runner)\
  \ handles plan-then-MMD but not execution\n\nGOAL:\n- Add `--planning-loop` flag\
  \ to `agentic orchestrate` that automates the full lifecycle:\n  discover plans\
  \ needing orchestration, spawn planners, run review cycles,\n  generate/validate\
  \ MMDs, then execute phases by parsing AGENT_ROUTING and\n  spawning the appropriate\
  \ agents\n\nCURRENT STATE:\n- orchestrate.py (commands/orchestrate.py) has cmd_orchestrate()\
  \ for interactive mode\n- planner_loop.py (workflows/planner_loop.py) has PlannerLoopWorkflow\
  \ + PlannerLoopRunner\n- PlannerLoopRunner handles: discover -> type -> planner\
  \ -> review -> MMD gen -> validate\n- MMD headers contain AGENT_ROUTING, STATUS,\
  \ FEEDBACK_TRIGGERS, PHASES metadata\n- CLI registration in cli.py uses Typer @app.command()\
  \ pattern\n\nGAP:\n- No parse_mmd_routing() to extract execution metadata from MMD\
  \ files\n- No execution phase after MMD validation (spawn agents per AGENT_ROUTING)\n\
  - No archive_plan() step after successful execution\n- No --planning-loop flag on\
  \ orchestrate command\n"
success_criteria:
- agentic orchestrate --help shows --planning-loop flag
- parse_mmd_routing() correctly extracts AGENT_ROUTING, STATUS, FEEDBACK_TRIGGERS,
  PHASES
- OrchestrationWorkflow extends PlannerLoopWorkflow with execution methods
- OrchestrationRunner runs two-phase lifecycle (plan-then-execute) with phase-level
  retry
- agentic orchestrate --planning-loop --plan <folder> runs full lifecycle
- All new code covered by unit tests
- python3 -m pytest passes on new test files
architecture_alignment:
- Extends existing PlannerLoopWorkflow (no duplication)
- Follows CLI command pattern: handle(args, ctx) router + cmd_* functions
- Uses Typer registration pattern from cli.py
- MMD parsing uses same regex patterns as plan.py:3957
- State persistence follows planner.py pattern (_save_state/_load_state)
risks_and_mitigations:
- Risk: OrchestrationRunner spawning wrong agent types from MMD
  Mitigation: parse_mmd_routing() unit tested against real MMD templates
- Risk: Phase-level retry causing infinite loops
  Mitigation: max_retries parameter with hard cap, state tracking per phase
- Risk: Breaking existing interactive orchestrate command
  Mitigation: --planning-loop is additive flag, default behavior unchanged
phases:
- id: phase-1
  name: Orchestration Workflow
  description: Create OrchestrationWorkflow and OrchestrationRunner in workflows/orchestration.py
  tasks:
  - id: task-1.1
    name: Implement parse_mmd_routing() pure function
    description: "Create a pure function that parses MMD file content and extracts\
      \ structured\nmetadata from the header comments. Must handle both %% and # comment\
      \ styles.\n\nFUNCTION SIGNATURE:\n```python\ndef parse_mmd_routing(mmd_content:\
      \ str) -> dict:\n    \"\"\"Parse MMD header to extract routing metadata.\n\n\
      \    Returns dict with keys:\n        agent_routing: dict mapping phase_id ->\
      \ agent_type\n        status: dict mapping phase_id -> status_string\n     \
      \   feedback_triggers: dict mapping trigger -> action\n        phases: list\
      \ of dicts with id and description\n    \"\"\"\n```\n\nREGEX PATTERNS (from\
      \ plan.py:3957 and header.mmd.j2):\n- AGENT_ROUTING line: `r\"(?:%%|#)\\s*AGENT_ROUTING:\\\
      s*(.+)\"`\n  Format: \"phase_1 -> build-python, phase_2 -> test-builder\"\n\
      - STATUS line: `r\"(?:%%|#)\\s*STATUS:\\s*(.+)\"`\n  Format: \"phase_1=pending,\
      \ phase_2=pending\"\n- FEEDBACK_TRIGGERS line: `r\"(?:%%|#)\\s*FEEDBACK_TRIGGERS:\\\
      s*(.+)\"`\n  Format: \"TEST_FAILURE -> test-fix-loop, BUILD_FAILURE -> escalate\"\
      \n- PHASES lines: `r\"(?:%%|#)\\s+\\d+\\.\\s+(\\S+)\\s*-\\s*(.+)\"`\n  Format:\
      \ \"%%   1. phase_1 - Build components\"\n\nPer-phase routing (inside subgraphs):\n\
      - `r\"(?:%%|#)\\s*AGENT_ROUTING:\\s*(\\S+)\\s+agent\"`\n\nEDGE CASES:\n- Empty\
      \ MMD content -> return empty dicts/lists\n- Missing headers -> return partial\
      \ result with empty defaults\n- Duplicate keys -> last wins\n"
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/templates/mmd/header.mmd.j2
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/plan.py
      (lines 3949-3960)
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
    guidance: '1. Read header.mmd.j2 to understand the exact output format

      2. Read plan.py lines 3949-3960 for the existing AGENT_ROUTING regex

      3. Implement parse_mmd_routing() as a module-level pure function

      4. Use re.findall for header-level routing, re.search for individual lines

      5. Parse each format into structured dicts

      6. Return defaults for missing headers (empty dict/list, not None)

      '
    status: completed
    success_criteria:
    - Parses header AGENT_ROUTING into {phase_id: agent_type} dict
    - Parses STATUS into {phase_id: status} dict
    - Parses FEEDBACK_TRIGGERS into {trigger: action} dict
    - Parses PHASES into [{id, description}] list
    - Handles empty/malformed input gracefully
    - Also parses per-phase AGENT_ROUTING comments
  - id: task-1.2
    name: Implement OrchestrationWorkflow class
    description: "Create OrchestrationWorkflow extending PlannerLoopWorkflow with\
      \ methods\nfor the execution phase of the lifecycle.\n\nCLASS DESIGN:\n```python\n\
      class OrchestrationWorkflow(PlannerLoopWorkflow):\n    def load_mmd(self, plan_folder:\
      \ str) -> Optional[str]:\n        \"\"\"Load orchestration MMD content from\
      \ plan folder.\"\"\"\n\n    def parse_routing(self, mmd_content: str) -> dict:\n\
      \        \"\"\"Parse MMD routing metadata (delegates to parse_mmd_routing).\"\
      \"\"\n\n    def spawn_execution_agent(\n        self, plan_folder: str, phase_id:\
      \ str, agent_type: str\n    ) -> Optional[str]:\n        \"\"\"Spawn agent for\
      \ a specific phase execution.\"\"\"\n\n    def archive_plan(self, plan_folder:\
      \ str) -> bool:\n        \"\"\"Archive plan after successful execution.\"\"\"\
      \n```\n\nDETAILS:\n- load_mmd(): glob for orchestration_*.mmd in plan folder,\
      \ read first match\n- parse_routing(): thin wrapper around parse_mmd_routing()\n\
      - spawn_execution_agent(): similar to spawn_planner() but uses phase-specific\n\
      \  agent type and passes --plan flag. Uses `agentic session spawn` pattern.\n\
      - archive_plan(): calls `agentic plan archive <folder>` via subprocess\n"
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
    guidance: '1. Import PlannerLoopWorkflow from planner_loop

      2. Follow the same subprocess.run pattern for CLI calls

      3. load_mmd: use self.plans_dir / plan_folder / glob("orchestration_*.mmd")

      4. spawn_execution_agent: model after spawn_planner() (lines 139-175)

      5. archive_plan: `agentic plan archive <plan_folder>` subprocess call

      6. All methods return Optional/bool for error propagation

      '
    status: completed
    success_criteria:
    - Inherits all PlannerLoopWorkflow methods
    - load_mmd returns MMD content string or None
    - parse_routing delegates to parse_mmd_routing correctly
    - spawn_execution_agent spawns correct agent per phase
    - archive_plan calls CLI archive command
    - Error handling consistent with base class
  - id: task-1.3
    name: Implement OrchestrationRunner class
    description: "Create OrchestrationRunner with two-phase lifecycle (plan-then-execute)\n\
      and phase-level retry capability.\n\nCLASS DESIGN:\n```python\nclass OrchestrationRunner:\n\
      \    def __init__(\n        self,\n        workflow: Optional[OrchestrationWorkflow]\
      \ = None,\n        project: Optional[str] = None,\n        plan_folder: Optional[str]\
      \ = None,\n    ):\n        self.workflow = workflow or OrchestrationWorkflow()\n\
      \        self.project = project\n        self.plan_folder = plan_folder\n  \
      \      self.state = { ... }\n\n    def run(\n        self,\n        max_iterations:\
      \ int = 10,\n        completion_promise: Optional[str] = None,\n        max_phase_retries:\
      \ int = 2,\n    ) -> bool:\n        \"\"\"Run full orchestration: plan phase\
      \ then execute phase.\"\"\"\n\n    def _run_planning_phase(self, max_iterations:\
      \ int, completion_promise: str) -> bool:\n        \"\"\"Phase 1: discover, plan,\
      \ review, generate MMD (delegates to PlannerLoopRunner).\"\"\"\n\n    def _run_execution_phase(self,\
      \ max_phase_retries: int) -> bool:\n        \"\"\"Phase 2: parse MMD routing,\
      \ execute each phase sequentially.\"\"\"\n\n    def _execute_phase(self, plan_folder:\
      \ str, phase_id: str, agent_type: str) -> bool:\n        \"\"\"Execute a single\
      \ phase: spawn agent, wait, check status.\"\"\"\n```\n\nLIFECYCLE:\n1. Health\
      \ check\n2. If plan_folder specified: process single plan\n3. Else: discover\
      \ all plans needing work\n4. For each plan: run_planning_phase -> run_execution_phase\
      \ -> archive\n5. Phase-level retry: if _execute_phase fails, retry up to max_phase_retries\n\
      \nSTATE TRACKING:\n```python\nself.state = {\n    \"iteration\": 0,\n    \"\
      plans_processed\": [],\n    \"plans_failed\": [],\n    \"errors\": [],\n   \
      \ \"current_plan\": None,\n    \"current_phase\": None,\n    \"execution_results\"\
      : {},  # plan_folder -> {phase_id: status}\n}\n```\n"
    inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
      (PlannerLoopRunner lines 440-593)
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/workflows/orchestration.py
    guidance: '1. Model after PlannerLoopRunner but with two-phase lifecycle

      2. _run_planning_phase: instantiate PlannerLoopRunner internally, call .run()

      3. _run_execution_phase: load MMD, parse routing, iterate phases sequentially

      4. _execute_phase: spawn_execution_agent -> wait_for_session -> check result

      5. Phase retry: wrap _execute_phase in retry loop with max_phase_retries

      6. Track execution results per plan per phase in state dict

      7. archive_plan() after all phases succeed

      '
    status: completed
    success_criteria:
    - Two-phase lifecycle: planning then execution
    - Single-plan mode with --plan flag
    - Discovery mode without --plan flag
    - Phase-level retry with configurable max
    - State tracking for all plans and phases
    - Archive on success, error tracking on failure
