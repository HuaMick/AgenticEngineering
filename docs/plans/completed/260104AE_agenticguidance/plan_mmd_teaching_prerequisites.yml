# Teaching Plan: MMD Implementation Prerequisites
# Plan: 260104AE_agenticguidance
# Objective: Create guidance/specifications required before MMD build phase
# Status: active
# Phase Type: teach

name: mmd-teaching-prerequisites
status: completed
completed_date: "2026-01-10"
priority: critical
created: "2026-01-10"
phase_type: teach

context: |
  Analysis of MMD Implementation phase revealed CRITICAL teaching gaps that must
  be addressed before BUILD work can proceed. The current state:

  - plan-mmd-schema.yml exists (548 lines) but is REFERENCE only, not GUIDANCE
  - No specification for what "orchestration-executor" should do
  - No guidance on HOW planners should generate MMD output
  - No test scenarios for orchestration executor validation

  This teaching plan addresses these gaps to enable successful build execution.

inputs:
  - location: "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
    description: "Existing MMD schema - needs expansion with generation guidance"
  - location: "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
    description: "Target for MMD generation guidance"
  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-build/process.mmd"
    description: "Reference for current orchestration patterns"

phases:
  - name: "Orchestration Executor Specification"
    execution: sequential
    status: pending
    priority: critical
    description: "Define what the generic orchestration executor should do"
    tasks:
      - id: "teach_mmd_001"
        name: "Create orchestration-executor-specification.yml"
        status: "completed"
        description: |
          Create comprehensive specification defining:
          - Executor scope (execution only vs planning+execution)
          - AGENT_ROUTING metadata format with validation rules
          - FEEDBACK_TRIGGERS pattern definition
          - STATE model with valid phase status values
          - Fallback behaviors for invalid routing
        output_location: "modules/AgenticGuidance/assets/definitions/orchestration-executor-specification.yml"
        estimated_lines: 400

      - id: "teach_mmd_002"
        name: "Expand plan-mmd-schema.yml with execution metadata"
        status: "completed"
        description: |
          Add new sections to plan-mmd-schema.yml:
          - AGENT_ROUTING pattern section with examples
          - FEEDBACK_TRIGGERS pattern section
          - STATUS/state management section
          - Validation rules for routing agents
        target_file: "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
        estimated_lines: 150

  - name: "MMD Generation Guidance"
    execution: sequential
    status: pending
    priority: critical
    description: "Create guidance for planners to generate MMD output"
    tasks:
      - id: "teach_mmd_003"
        name: "Add MMD generation phase to planner-build process"
        status: "completed"
        description: |
          Add new section to planner-build/process.yml:
          - "GENERATE PLAN-MMD" phase with step-by-step instructions
          - When to create orchestration_<plan_name>.mmd file
          - How to parse plan phases into MMD nodes
          - MMD metadata comment requirements
          - Reference to plan-mmd-schema.yml for format
        target_file: "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
        estimated_lines: 100

      - id: "teach_mmd_004"
        name: "Update planner-build inputs with MMD component references"
        status: "completed"
        description: |
          Update inputs.yml to reference:
          - MMD component examples (build_phase.mmd, test_phase.mmd, etc.)
          - Plan-to-MMD conversion examples
          - Annotate as "REUSABLE PATTERN" references
        target_file: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
        estimated_lines: 30

      - id: "teach_mmd_005"
        name: "Add MMD generation guidance to planner-guidance"
        status: "completed"
        description: |
          Mirror teach_mmd_003 for planner-guidance agent.
          Teaching-focused plans also need MMD generation capability.
        target_file: "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
        estimated_lines: 100

  - name: "Orchestration Test Scenarios"
    execution: sequential
    status: pending
    priority: high
    description: "Define test scenarios for orchestration executor validation"
    tasks:
      - id: "teach_mmd_006"
        name: "Create orchestration-test-scenarios.yml"
        status: "completed"
        description: |
          Create test scenario definitions:
          - MMD_PARSING_TEST: Verify executor parses metadata correctly
          - AGENT_ROUTING_TEST: Verify correct agent spawning per phase
          - FEEDBACK_TRIGGER_TEST: Verify failure scenario handling
          - STATE_PERSISTENCE_TEST: Verify state across phases
          Include test data and success criteria for each.
        output_location: "modules/AgenticGuidance/assets/definitions/orchestration-test-scenarios.yml"
        estimated_lines: 350

      - id: "teach_mmd_007"
        name: "Update orchestration_example.mmd to modern syntax"
        status: "completed"
        description: |
          Update example to use:
          - flowchart LR (not graph TD)
          - Complete AGENT_ROUTING metadata
          - Complete FEEDBACK_TRIGGERS metadata
          - STATUS tracking pattern
        target_file: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/orchestration_example.mmd"
        estimated_lines: 80

success_criteria:
  - "orchestration-executor-specification.yml created with full scope definition"
  - "plan-mmd-schema.yml expanded with AGENT_ROUTING and FEEDBACK_TRIGGERS patterns"
  - "planner-build has 'GENERATE PLAN-MMD' phase in process.yml"
  - "planner-guidance has MMD generation guidance"
  - "orchestration-test-scenarios.yml created with 4 test scenario definitions"
  - "orchestration_example.mmd updated to modern syntax with complete metadata"

related_tasks:
  build_dependency: |
    These teaching tasks are PREREQUISITES for the MMD Implementation build phase.
    Build tasks mmd_002a, mmd_003, mmd_005 depend on this teaching work.
