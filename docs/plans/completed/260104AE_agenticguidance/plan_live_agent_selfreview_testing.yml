# Live Plan - Agent Self-Review Testing
# Plan: 260104AE_agenticguidance
# Objective: Establish agent self-review as a basic-level testing practice for guidance changes
# Created: 2026-01-23

name: agent_selfreview_testing
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
completed_date: "2026-01-23"

objective: |
  Establish agent self-review as a standard, basic-level testing practice for guidance changes.
  When agent guidance is modified, agents should be able to self-review their own guidance to
  catch issues like broken paths, missing files, and inconsistencies before those issues
  propagate into production workflows.

rationale: |
  Self-review is the most fundamental form of guidance validation. An agent reviewing its own
  guidance can immediately identify:
  - Broken file paths that don't resolve
  - Missing referenced files
  - Ambiguous instructions that require interpretation
  - Inconsistencies between process.yml, inputs.yml, and outputs.yml
  - Prerequisites that aren't documented

  This catches basic errors that would otherwise surface during actual task execution,
  causing friction and wasted iterations.

success_criteria:
  - Self-review protocol documented in agent-self-review.yml guideline
  - Self-review added to guidance-test-scenarios.yml as standard test type
  - test-guidance-simulator can invoke self-review mode
  - Self-review output schema defined for structured reporting
  - CLI preset template created for running agent self-reviews
  - Usage documented in JIT_CONTEXT_ARCHITECTURE.md

related_artifacts:
  guidance_test_scenarios: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
  test_guidance_simulator: "modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml"
  completed_self_review: "docs/plans/live/260104AE_agenticguidance/completed/plan_agent_self_review_testing.yml"
  cli_presets: "modules/AgenticCLI/src/agenticcli/templates/presets/"
  jit_context_docs: "docs/JIT_CONTEXT_ARCHITECTURE.md"

phases:
  # ========================================
  # PHASE 1: Document Self-Review Protocol
  # ========================================
  - name: "Phase 1: Document Self-Review Protocol"
    description: |
      Define the self-review process as a formal guideline and integrate it into the
      standard guidance test scenarios. This establishes self-review as a recognized
      testing practice within the AgenticGuidance framework.

    success_criteria:
      - "agent-self-review.yml guideline created with clear protocol definition"
      - "Self-review added to guidance-test-scenarios.yml as always_include scenario"
      - "Protocol compatible with existing test-guidance-simulator workflow"

    tasks:
      - id: "selfreview_001"
        name: "Create agent-self-review.yml guideline"
        description: |
          Create a new guideline at modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
          that defines the self-review process for agent guidance validation.

          The guideline should specify:

          1. PURPOSE
             - Why self-review is essential for guidance quality
             - What types of issues self-review detects
             - When self-review should be triggered (after any guidance change)

          2. SELF-REVIEW PROTOCOL
             - Agent receives only its own guidance files (process.yml, inputs.yml, outputs.yml)
             - Agent reads each file and validates internal consistency
             - Agent checks all file path references resolve correctly
             - Agent identifies ambiguities, missing context, or unclear instructions
             - Agent attempts minimal task understanding to expose gaps

          3. VALIDATION CHECKLIST
             - All input paths in inputs.yml exist?
             - All referenced assets/definitions/guidelines exist?
             - Process steps are clear and actionable?
             - Prerequisites are explicitly documented?
             - Loop context defined if agent participates in loops?
             - Outputs are clearly specified?

          4. REPORTING FORMAT
             - Structured output with passed/failed status
             - List of friction points with severity levels
             - Specific file paths and line references for issues
             - Suggested fixes for each issue found

          5. INTEGRATION
             - How self-review fits into guidance-test-loop
             - Relationship to test-guidance-simulator agent
             - When to escalate findings (CRITICAL severity)

        status: pending
        priority: high
        inputs:
          - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
          - "modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml"
          - "modules/AgenticGuidance/assets/definitions/friction.yml"
        target_files:
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
        acceptance_criteria:
          - "File created at modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
          - "Purpose section explains why self-review is essential"
          - "Protocol section provides step-by-step self-review process"
          - "Validation checklist covers all common guidance issues"
          - "Reporting format aligns with existing FRICTION_POINT structure"
          - "Integration section explains relationship to existing testing workflows"

      - id: "selfreview_002"
        name: "Add self-review to guidance-test-scenarios.yml"
        description: |
          Update modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml to
          add self-review as a standard test scenario that is always included when testing
          agent guidance.

          Add new test_scenario entry:

          ```yaml
          self_review_test:
            id: "self_review_test"
            purpose: "Can agent validate its own guidance for basic correctness?"
            description: |
              Validates that an agent can review its own guidance files and identify
              basic issues like broken paths, missing files, and inconsistencies.
              This is the most fundamental form of guidance validation.

            inputs:
              target_agent: "Path to agent directory containing guidance files"
              guidance_files:
                - "process.yml"
                - "inputs.yml"
                - "outputs.yml (if present)"

            constraints:
              - "Agent receives ONLY its own guidance files"
              - "Agent must identify issues without external hints"
              - "Agent cannot explore beyond referenced paths"

            expected_outputs:
              success_criteria:
                - "All file path references resolve to existing files"
                - "No circular or broken references"
                - "Process steps are internally consistent"
                - "Prerequisites are documented"

              failure_indicators:
                - "Referenced files do not exist"
                - "Ambiguous paths without clear base directory"
                - "Contradictory instructions in process steps"
                - "Missing prerequisite documentation"

              report_structure:
                - "self_review_passed: boolean"
                - "broken_paths: list of paths that don't resolve"
                - "missing_files: list of referenced but missing files"
                - "inconsistencies: list of contradictions found"
                - "ambiguities: list of unclear instructions"
                - "suggested_fixes: specific improvements needed"

            validation_checklist:
              - "Do all paths in inputs.yml resolve?"
              - "Do all asset references exist?"
              - "Are process steps internally consistent?"
              - "Are prerequisites explicitly documented?"
          ```

          Also update test_scenario_application_rules.always_include to add self_review_test.

        status: pending
        priority: high
        depends_on: ["selfreview_001"]
        inputs:
          - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
        target_files:
          - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
        acceptance_criteria:
          - "self_review_test scenario added to test_scenarios section"
          - "Scenario follows existing format with id, purpose, description, inputs, constraints, expected_outputs"
          - "test_scenario_application_rules.always_include updated to include self_review_test"
