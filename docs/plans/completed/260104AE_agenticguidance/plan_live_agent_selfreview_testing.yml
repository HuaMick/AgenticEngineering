          - "Steps updated to execute self_review_test scenario"
          - "Self-review executes first before other test scenarios"
          - "Existing guidance-test-loop integration preserved"

      - id: "selfreview_004"
        name: "Define self-review report output schema"
        description: |
          Define a structured output schema for self-review reports that can be consumed
          by orchestration and teacher agents for subsequent guidance improvements.

          Create or update the outputs section in test-guidance-simulator to include:

          ```yaml
          outputs:
            - name: "self_review_report"
              description: "Structured self-review validation results"
              format:
                agent_name: "string - name of agent that performed self-review"
                agent_path: "string - path to agent directory"
                review_timestamp: "ISO datetime"
                self_review_passed: "boolean - overall pass/fail"

                path_validation:
                  total_paths_checked: "integer"
                  paths_resolved: "integer"
                  broken_paths:
                    - path: "string - the path that failed"
                      referenced_in: "string - file where reference exists"
                      error: "string - reason for failure"

                file_validation:
                  required_files_present: "list of files that exist"
                  missing_files: "list of files that should exist but don't"

                consistency_check:
                  passed: "boolean"
                  inconsistencies:
                    - type: "string - type of inconsistency"
                      location: "string - file and section"
                      issue: "string - description of inconsistency"
                      suggested_fix: "string - how to resolve"

                clarity_check:
                  ambiguities:
                    - location: "string - file and section"
                      issue: "string - what is unclear"
                      severity: "CRITICAL | HIGH | MEDIUM | LOW"
                      suggested_fix: "string - how to clarify"

                summary:
                  total_issues: "integer"
                  by_severity:
                    CRITICAL: "integer"
                    HIGH: "integer"
                    MEDIUM: "integer"
                    LOW: "integer"
                  recommended_action: "string - PASS | FIX_REQUIRED | ESCALATE"

              usage: |
                - Orchestration consumes to determine if guidance is ready for use
                - Teacher agents consume to prioritize guidance improvements
                - Audit trails consume for tracking guidance quality over time
          ```

          Also update inputs.yml to reference this output schema.

        status: pending
        priority: high
        depends_on: ["selfreview_003"]
