implementation_notes:
  prior_work: |
    The completed/plan_agent_self_review_testing.yml documents a previous self-review
    execution that reviewed all 19 agents. This new plan formalizes self-review as
    a standard testing practice, building on lessons learned from that execution.

    Key findings from previous self-review:
    - 2 legacy-only agents discovered (planner-phases, planner-teach)
    - Fragment reference resolution inconsistency
    - orchestration agents missing process.yml (only have process.mmd)
    - NOT_MIGRATED test agents referenced without fallback paths
    - Version mismatches between manifest.yml and inputs.yml
    - Empty outputs: [] sections despite documented outputs

    These findings demonstrate the value of self-review and the need to formalize it.

  integration_points:
    - "test-guidance-simulator: Primary executor of self-review scenarios"
    - "guidance-test-loop: Self-review executes within existing loop structure"
    - "teacher agents: Consume self-review reports to prioritize guidance fixes"
    - "orchestration: Routes based on self-review pass/fail status"
    - "CLI presets: Enable easy invocation of self-review tasks"

  testing_approach: |
    Once implemented, the self-review infrastructure should be validated by:
    1. Running self-review on test-guidance-simulator itself (dogfooding)
    2. Comparing results with manual inspection for accuracy
    3. Verifying CLI preset loads correctly
    4. Confirming output schema is parseable by orchestration

