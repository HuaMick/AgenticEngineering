        name: "Add self-review invocation to test-guidance-simulator"
        description: |
          Update modules/AgenticGuidance/agents/test/test-guidance-simulator/process.yml
          to add explicit support for self-review mode invocation.

          Changes needed:

          1. Add self_review_mode section to process.yml:
             ```yaml
             self_review_mode:
               description: |
                 When invoked for self-review, the simulator spawns the target agent
                 with only its own guidance files and instructs it to validate them.

               invocation_pattern: |
                 Target agent is spawned with prompt:
                 "You are agent: {agent_name}. Your guidance files are at:
                 - process.yml: {path}
                 - inputs.yml: {path}
                 TASK: Review your own guidance for correctness. Report:
                 1. Any file paths that don't exist
                 2. Any missing referenced files
                 3. Any unclear or ambiguous instructions
                 4. Any missing prerequisites
                 5. Any inconsistencies between files"

               output_collection: |
                 Collect structured output from spawned agent:
                 - self_review_passed: boolean
                 - issues_found: list of categorized issues
                 - severity_breakdown: count by CRITICAL/HIGH/MEDIUM/LOW
             ```

          2. Update steps to include self-review scenario:
             Add step for executing self_review_test from guidance-test-scenarios.yml

          3. Ensure self-review is executed FIRST before other scenarios
             (catch basic issues before testing more complex behaviors)

        status: pending
        priority: high
