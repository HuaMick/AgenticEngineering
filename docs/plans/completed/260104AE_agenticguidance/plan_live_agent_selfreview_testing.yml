    tasks:
      - id: "selfreview_005"
        name: "Create self-review CLI preset template"
        description: |
          Create a new preset template at:
          modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml

          The preset should define tasks for running comprehensive agent self-review:

          ```yaml
          # Self-Review Preset
          # Tasks for running agent self-review validation

          name: self-review
          description: "Tasks for agent self-review validation"
          version: "1.0"

          tasks:
            - id: "sreview_001"
              description: "Validate all input paths resolve to existing files"
              priority: "critical"
              trigger: "always"

            - id: "sreview_002"
              description: "Check all asset/definition/guideline references exist"
              priority: "critical"
              trigger: "always"

            - id: "sreview_003"
              description: "Verify process steps are internally consistent"
              priority: "high"
              trigger: "always"

            - id: "sreview_004"
              description: "Confirm prerequisites are explicitly documented"
              priority: "high"
              trigger: "always"

            - id: "sreview_005"
              description: "Validate loop_context if agent participates in loops"
              priority: "medium"
              trigger: "loop_participant"

            - id: "sreview_006"
              description: "Check output specifications are complete"
              priority: "medium"
              trigger: "always"

            - id: "sreview_007"
              description: "Identify ambiguous instructions requiring interpretation"
              priority: "medium"
              trigger: "always"

            - id: "sreview_008"
              description: "Generate self-review report in standard format"
              priority: "critical"
              trigger: "always"
          ```

          This preset enables users to run:
          `agentic plan task prefill --preset self-review`

          to load self-review tasks into their current task list.

        status: pending
        priority: high
        inputs:
          - "modules/AgenticCLI/src/agenticcli/templates/presets/planner-test-preset.yml"
          - "modules/AgenticGuidance/assets/guidelines/agent-self-review.yml"
          - "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml"
        acceptance_criteria:
          - "File created at modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml"
          - "Preset follows existing preset format (name, description, version, tasks)"
          - "Tasks cover all self-review validation checklist items"
          - "Priority levels appropriately assigned (critical for path validation)"
          - "Preset loadable via agentic plan task prefill --preset self-review"

      - id: "selfreview_006"
        name: "Document self-review usage in JIT_CONTEXT_ARCHITECTURE.md"
        description: |
          Update docs/JIT_CONTEXT_ARCHITECTURE.md to document how to use the self-review
          preset and integrate self-review into guidance change workflows.

          Add a new section:

          ```markdown
          ## Agent Self-Review Testing

          Self-review is a basic-level testing practice for validating agent guidance.
          When guidance files (process.yml, inputs.yml, outputs.yml) are modified,
          agents can self-review their own guidance to catch issues before deployment.

          ### Running Self-Review

          Load the self-review task preset:
          ```bash
          agentic plan task prefill --preset self-review
          ```

          This loads standard self-review tasks that validate:
          - All input paths resolve to existing files
          - All asset/definition/guideline references exist
          - Process steps are internally consistent
          - Prerequisites are explicitly documented
          - Loop context is defined (if applicable)
          - Output specifications are complete

          ### Self-Review Output

          Self-review produces a structured report with:
          - Path validation results (broken paths, missing files)
          - Consistency check results (contradictions, ambiguities)
          - Severity breakdown (CRITICAL/HIGH/MEDIUM/LOW)
          - Recommended action (PASS/FIX_REQUIRED/ESCALATE)

          ### Integration with Guidance Changes

          Self-review should be run after any guidance modification:

          1. Modify agent guidance (process.yml, inputs.yml, etc.)
          2. Load self-review preset: `agentic plan task prefill --preset self-review`
          3. Execute self-review tasks
          4. Fix any issues found
          5. Re-run until self-review passes
          6. Commit guidance changes

          ### Related Artifacts

          - Guideline: modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
          - Test Scenarios: modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
          - Test Simulator: modules/AgenticGuidance/agents/test/test-guidance-simulator/
          - CLI Preset: modules/AgenticCLI/src/agenticcli/templates/presets/self-review-preset.yml
          ```

        status: pending
