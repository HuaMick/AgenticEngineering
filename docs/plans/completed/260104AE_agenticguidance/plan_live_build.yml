objective: |
  Refactor orchestration to be generic and split planning entrypoints
  into build and teach variants, leveraging the agentic-cli.

scope_additions:
  - id: "scope_001"
    name: "Relax plan file separation guidance"
    description: |
      Remove the strict requirement to separate plans into build/teach/test files.
      Replace with flexible guidance based on context_minimisation principle:
      - Split into multiple files ONLY when it reduces noise for agents reading the plan
      - Single file is fine if the plan is small/focused
      - Multiple files make sense for large plans where agents only need subset of tasks
      The goal is pragmatic file organization, not rigid categorization.
    status: "pending"
    inputs:
      # Pre-read context for guidance refinement
      - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"  # Current file separation logic
      - "modules/AgenticGuidance/assets/definitions/plans.yml"  # Current plan structure definitions
      - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"  # Guiding principle
    target_files:
      - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
      - "modules/AgenticGuidance/assets/definitions/plans.yml"
    acceptance_criteria:
      - "Removed mandatory build/teach/test/cleanup file structure from process.mmd"
      - "Updated plans.yml definition to describe flexible file organization"
      - "Added context_minimisation rationale for when to split files"

