  - name: "Dynamic Orchestration via MMD"
    description: "Enable planners to define the orchestration flow dynamically using Mermaid files with embedded metadata."
    success_criteria:
      - "Plan-MMD schema defined and documented with examples"
      - "Both planner-build and planner-guidance emit valid Plan-MMD files"
      - "Generic orchestration-executor routes based on MMD metadata"
      - "End-to-end dynamic orchestration tested for both build and teach flows"
    tasks:
      - id: "mmd_001"
        name: "Define Plan-MMD Schema"
        description: |
          Create a YAML schema definition for Plan-MMD files that focuses on agent orchestration
          patterns rather than rigid phase sequences. The MMD should express:
          - Agent spawning decisions (which agents to invoke)
          - Agent loops (test-fix-loop, audit-test-fix-loop, etc.)
          - Agent dependencies (execution order when needed)
          - Feedback triggers (conditions that cause re-planning)
          - Repair iteration limits

          Planners are intelligent enough to determine what agents need to be spawned and what
          loops to orchestrate. The MMD is a tool for expressing these orchestration decisions,
          not a rigid phase template.

          Plan-MMD Specification (metadata comments in MMD):
          ```
          %% PLAN_MMD_VERSION: 1.0
          %% GENERATED_BY: planner-<type>
          %% PLAN_FOLDER: <path>
          %% AGENT_ORCHESTRATION: (agent spawning and loop patterns)
          %% FEEDBACK_TRIGGERS: (what causes re-planning)
          %% MAX_REPAIR_ITERATIONS: 3
          ```
        status: "pending"
        inputs:
          # Pre-read context for schema design
          - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"  # Existing MMD patterns
          - "modules/AgenticGuidance/assets/definitions/agent-loops.yml"  # Loop and iteration patterns
          - "modules/AgenticGuidance/assets/definitions/agent-categories.yml"  # Agent routing categories
          - "modules/AgenticGuidance/assets/definitions/plans.yml"  # Plan structure definitions
        target_files:
          - "assets/definitions/plan-mmd-schema.yml"
        acceptance_criteria:
          - "Schema focuses on agent orchestration patterns, not phase sequences"
          - "Agent loops (test-fix-loop, audit-test-fix-loop) expressible in MMD"
          - "Planner agents decide orchestration patterns based on task needs"
          - "Feedback triggers include failure, quality threshold, and explicit request"
          - "Example MMD included in schema documentation"

      - id: "mmd_002a"
        name: "Update planner-build to Generate MMD"
        description: |
          Modify planner-build process to emit a Plan-MMD file alongside the plan YAML.
          The MMD should define the execution flow for implementation phases.
        status: "pending"
        depends_on: ["mmd_001"]
        inputs:
          # Pre-read context for MMD generation implementation
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"  # Current planner process
          - "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"  # Schema to follow (from mmd_001)
          - "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml"  # Plan example
        target_files:
          - "agents/planner/planner-build/process.yml"
          - "agents/planner/planner-build/templates/plan-flow.mmd.template"
        acceptance_criteria:
          - "Process includes step to generate plan-flow.mmd"
          - "Generated MMD includes all required metadata comments"
          - "Agent routing maps to builder and tester agents"

      - id: "mmd_002b"
        name: "Update planner-guidance to Generate MMD"
        description: |
          Modify planner-guidance process to emit a Plan-MMD file for teaching workflows.
          The MMD should define the flow for guidance creation and validation.
        status: "pending"
        depends_on: ["mmd_001"]
        inputs:
          # Pre-read context for MMD generation implementation
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"  # Current planner process
          - "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"  # Schema to follow (from mmd_001)
          - "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"  # Teaching plan example
        target_files:
          - "agents/planner/planner-guidance/process.yml"
          - "agents/planner/planner-guidance/templates/plan-flow.mmd.template"
        acceptance_criteria:
          - "Process includes step to generate plan-flow.mmd"
          - "Generated MMD includes all required metadata comments"
          - "Agent routing maps to teacher and auditor agents"

      - id: "mmd_003"
        name: "Create Generic Orchestration Executor"
        description: |
          Build a new orchestration-executor agent that:
          - Reads Plan-MMD from the active plan folder
          - Parses metadata to determine agent routing
          - Executes phases in order defined by MMD graph
          - Handles feedback triggers and repair loops
          - Tracks state via agentic-cli
        status: "pending"
        depends_on: ["mmd_001"]
        inputs:
          # Pre-read context for orchestration executor design
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/process.yml"  # Existing orchestration patterns
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml"
          - "modules/AgenticGuidance/agents/orchestration/manifest.yml"  # Orchestration manifest patterns
          - "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"  # MMD parsing requirements
          - "modules/AgenticGuidance/assets/definitions/agent-loops.yml"  # Repair loop patterns
        target_files:
          - "agents/orchestration/orchestration-executor/manifest.yml"
          - "agents/orchestration/orchestration-executor/process.yml"
          - "agents/orchestration/orchestration-executor/inputs.yml"
        acceptance_criteria:
          - "Agent can parse Plan-MMD metadata comments"
          - "Agent routes to correct sub-agent based on phase type"
          - "Agent respects MAX_REPAIR_ITERATIONS limit"
          - "Agent updates plan state after each phase"

      - id: "mmd_004"
        name: "Update Entrypoints for MMD-Driven Flow"
        description: |
          Refactor _orchestrate.yml to use the generic orchestration-executor.
          Remove hardcoded agent references in favor of MMD-driven routing.
        status: "pending"
        depends_on: ["mmd_003"]
        inputs:
          # Pre-read context for entrypoint refactoring
          - "modules/AgenticGuidance/entrypoints/_orchestrate.yml"  # Current entrypoint
          - "modules/AgenticGuidance/entrypoints/_plan_build.yml"  # Build planning entry
          - "modules/AgenticGuidance/entrypoints/_plan_teach.yml"  # Teach planning entry
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"  # New executor (from mmd_003)
        target_files:
          - "entrypoints/_orchestrate.yml"
        acceptance_criteria:
          - "Entrypoint delegates to orchestration-executor"
          - "No hardcoded agent paths in entrypoint"
          - "Plan folder path passed as input"

      - id: "mmd_005"
        name: "Test End-to-End Dynamic Orchestration"
        description: |
          Validate the complete flow:
          1. Planner generates plan with MMD
          2. Orchestrator reads MMD and routes correctly
          3. Feedback triggers cause appropriate re-planning
          4. State is correctly persisted throughout
        status: "pending"
        depends_on: ["mmd_002a", "mmd_002b", "mmd_004"]
        inputs:
          # Pre-read context for e2e test design
          - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"  # Executor to test
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"  # Build planner MMD output
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"  # Guidance planner MMD output
          - "modules/AgenticGuidance/entrypoints/_orchestrate.yml"  # Entry flow to test
          - "modules/AgenticGuidance/assets/examples/test/guidance-test-plan.yml"  # Test plan patterns
        target_files:
          - "tests/orchestration/test_mmd_flow.yml"
        acceptance_criteria:
          - "Build plan flow executes without hardcoded routing"
          - "Teach plan flow executes without hardcoded routing"
          - "Repair loop triggers on simulated failure"
          - "State reflects completed phases accurately"

  - name: "Guidance Refinement"
    description: "Refine guidance to remove rigid phase-based file separation and refocus MMD on agent orchestration."
    success_criteria:
      - "File separation based purely on context-minimisation, not phase types"
      - "MMD schema focused on agent orchestration patterns, not phase sequences"
      - "Planners create multiple files ONLY when it reduces noise for reading agents"
      - "Planner agents determine orchestration patterns based on task needs"
    tasks:
      - id: "guide_001"
        name: "Replace phase-based file separation with context-minimisation"
        description: |
          Remove the concept of separate planning files by phase type (build/teach/test/cleanup).
          Instead, file separation should purely serve context-minimisation - planners should create
          multiple smaller files when it helps agents avoid reading unrelated noise. The goal is that
          when an agent reads a planning file, it gets focused content relevant to its task.
        status: "pending"
        inputs:
          # Pre-read context for guidance refinement
          - "modules/AgenticGuidance/assets/definitions/plans.yml"  # Current plan structure definitions
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"  # Current planner-build process
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"  # Current planner-guidance process
          - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"  # Guiding principle
        target_files:
          - "modules/AgenticGuidance/assets/definitions/plans.yml"
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
        acceptance_criteria:
          - "Removed references to phase-type file naming (plan_live_build.yml, plan_live_teach.yml, etc.)"
          - "Added guidance that file separation is for context-minimisation only"
          - "Planners create multiple files ONLY when it reduces noise for reading agents"
          - "File names should be descriptive of content, not phase type"

      - id: "guide_002"
        name: "Refocus Plan-MMD on agent orchestration"
        description: |
          The .mmd files should define agent orchestration patterns (which agents to spawn, agent
          loops, dependencies) NOT phase sequences. Planners are intelligent enough to determine what
          agents need to be spawned and what loops to orchestrate. The MMD is a tool for expressing
          these orchestration decisions, not a rigid phase template.
        status: "pending"
        inputs:
          # Pre-read context for MMD refocus
          - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"  # Current orchestration MMD
          - "modules/AgenticGuidance/assets/definitions/agent-loops.yml"  # Agent loop patterns
          - "modules/AgenticGuidance/assets/definitions/agent-categories.yml"  # Agent categories
        target_files:
          - "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
        acceptance_criteria:
          - "MMD schema focuses on agent spawning and orchestration, not phase sequences"
          - "Agent loops (test-fix-loop, audit-test-fix-loop) are expressed in MMD when needed"
          - "Planner agents decide orchestration patterns based on task needs"
          - "Removed rigid phase-type routing from MMD metadata"
