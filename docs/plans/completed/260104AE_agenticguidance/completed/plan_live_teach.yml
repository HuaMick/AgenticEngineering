# Live Plan - Teach Phase
# Plan: 260104AE_agenticguidance
# Objective: Update guidance after entrypoint refactor (_plan.yml → _plan_build.yml/_plan_teach.yml)

name: agenticguidance
worktree_path: /home/code/AgenticEngineering-agenticguidance
branch: agenticguidance
status: completed

worktree: /home/code/AgenticEngineering-agenticguidance
liveplan: "docs/plans/live/260104AE_agenticguidance/live/plan_live_teach.yml"
completedplan: "docs/plans/live/260104AE_agenticguidance/completed/plan_completed.yml"

live-plans:
  - id: GUIDANCE-ENTRYPOINT-REFACTOR-001
    title: Update Guidance for Entrypoint Refactor
    description: |
      The entrypoint _plan.yml was split into two specialized entrypoints:
      - _plan_build.yml: For code implementation planning
      - _plan_teach.yml: For guidance/teaching planning

      All guidance files referencing the old _plan.yml must be updated.

    phases:
      # ========================================
      # TEACH PHASE
      # ========================================
      - name: Teach Phase
        execution_groups:
          - execution: parallel
            name: Update core guidance files
            agents:
              # Agent 1: Update orchestration manifest routing
              - type: teacher
                inputs:
                  - modules/AgenticGuidance/agents/orchestration/manifest.yml
                  - modules/AgenticGuidance/entrypoints/_plan_build.yml
                  - modules/AgenticGuidance/entrypoints/_plan_teach.yml
                guidance: |
                  Context: The orchestration manifest has routing_logic that references entrypoints.
                  The old entry pattern "_plan.yml entrypoint → orchestration-planning" needs updating.

                  Status: ALREADY UPDATED - Verify changes are correct

                  Current change shows:
                  - Old: "_plan.yml entrypoint → orchestration-planning"
                  - New: Two lines for "_plan_build.yml" and "_plan_teach.yml" → orchestration-planning

                  Instructions:
                  1. Verify the manifest.yml routing_logic section has both new entrypoints
                  2. Ensure the descriptions distinguish between build (code) and teach (guidance) planning
                  3. Verify consistency with actual entrypoint files
                success_criteria:
                  - manifest.yml has both _plan_build.yml and _plan_teach.yml in routing_logic
                  - Entry patterns section clearly distinguishes build vs teach planning
                  - No references to old _plan.yml entrypoint

              # Agent 2: Update teacher examples
              - type: teacher
                inputs:
                  - modules/AgenticGuidance/assets/examples/teacher/concise.yml
                  - modules/AgenticGuidance/entrypoints/_plan_build.yml
                  - modules/AgenticGuidance/entrypoints/_plan_teach.yml
                guidance: |
                  Context: Teacher examples show paths through the agent system.
                  The example showing "_plan.yml → _orchestrate.yml" needs updating.

                  Status: ALREADY UPDATED - Verify changes are correct

                  Current change shows:
                  - Old: "Example: entrypoints/_plan.yml → _orchestrate.yml or _teach.yml"
                  - New: "Example: entrypoints/_plan_build.yml or _plan_teach.yml → _orchestrate.yml or _teach.yml"

                  Instructions:
                  1. Verify the concise.yml example reflects the new entrypoint structure
                  2. Ensure both verbose and concise versions are updated
                  3. Check if any other examples reference the old _plan.yml
                success_criteria:
                  - concise.yml examples show _plan_build.yml or _plan_teach.yml
                  - Both verbose and concise versions are consistent
                  - No references to old _plan.yml in examples

              # Agent 3: Update orchestrate entrypoint references
              - type: teacher
                inputs:
                  - modules/AgenticGuidance/entrypoints/_orchestrate.yml
                guidance: |
                  Context: The _orchestrate.yml entrypoint references where it receives pre-approved plans from.
                  It should reference both _plan_build.yml and _plan_teach.yml.

                  Status: VERIFY CURRENT STATE

                  Instructions:
                  1. Read _orchestrate.yml and check input references
                  2. Ensure it mentions both _plan_build.yml and _plan_teach.yml as plan sources
                  3. Update if still referencing _plan.yml
                success_criteria:
                  - _orchestrate.yml input section lists both _plan_build.yml and _plan_teach.yml
                  - No references to old _plan.yml

          - execution: parallel
            name: Scan and update any remaining references
            agents:
              # Agent 4: Scan all guidance for remaining _plan.yml references
              - type: teacher
                inputs:
                  - modules/AgenticGuidance/assets/definitions/
                  - modules/AgenticGuidance/assets/guidelines/
                guidance: |
                  Context: There may be other guidance files referencing the old _plan.yml entrypoint.

                  Instructions:
                  1. Search all definition and guideline files for "_plan.yml"
                  2. Update any found references to use "_plan_build.yml or _plan_teach.yml"
                  3. Consider context - some may need just _plan_build.yml (code) or just _plan_teach.yml (guidance)

                  Why this matters: Consistency across all guidance prevents agent confusion.
                success_criteria:
                  - No references to standalone "_plan.yml" in definitions
                  - No references to standalone "_plan.yml" in guidelines
                  - All references updated to appropriate new entrypoint(s)

              # Agent 5: Update agent process files if needed
              - type: teacher
                inputs:
                  - modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd
                  - modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.mmd
                  - modules/AgenticGuidance/agents/orchestration/orchestration-build/process.mmd
                guidance: |
                  Context: Orchestration process files may reference entrypoints in comments.

                  Instructions:
                  1. Check process.mmd files for any _plan.yml references in comments
                  2. Update comments to reference _plan_build.yml or _plan_teach.yml as appropriate
                  3. Ensure consistency with actual entrypoint routing
                success_criteria:
                  - No _plan.yml references in process comments
                  - Comments accurately describe entrypoint flow
