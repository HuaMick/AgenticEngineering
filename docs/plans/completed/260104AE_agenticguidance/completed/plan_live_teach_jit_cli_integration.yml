notes: |
  This plan addresses the CRITICAL finding from friction analysis 260123:
  0% JIT CLI adoption despite complete implementation.

  The fix is purely a TEACH operation - updating guidance files to instruct
  agents to use the existing CLI infrastructure.

  PATTERN FOR PROCESS.YML FILES:
  Add this as the FIRST step (before any existing steps):

  ```yaml
  - id: "jit_bootstrap"
    name: "JIT CLI Bootstrap"
    description: |
      FIRST: Run JIT CLI commands to get structured context.
      This is MORE EFFICIENT than file exploration (Glob/Grep/Read).

      ```bash
      agentic context bootstrap --role <agent-role> -j
      agentic plan task current -j
      ```

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
  ```

  PATTERN FOR PROCESS.MMD FILES:
  Add this comment block at the TOP of the file:

  ```
  %% =============================================================================
  %% JIT CLI BOOTSTRAP (EXECUTE FIRST)
  %% =============================================================================
  %% Before following this flowchart, run:
  %%   agentic context bootstrap --role <agent-role> -j
  %%   agentic plan task current -j
  %% =============================================================================
  ```

estimated_effort: "2-3 hours"
