# ========================================
# CONTEXT
# ========================================
context: |
  Friction analysis (260123_friction_analysis.yml) discovered a critical gap:

  FINDING: 0 out of 26 agents used JIT CLI commands
  - agentic context bootstrap: 0 uses
  - agentic plan task current: 0 uses
  - agentic context role: 0 uses
  - agentic context inputs: 0 uses

  ROOT CAUSE: AgenticGuidance process.yml files do NOT instruct agents to use JIT CLI.
  The thin-client architecture is COMPLETE but NOT INTEGRATED into agent guidance.

  EXISTING ASSETS:
  - CLI Implementation: COMPLETE (agentic context/plan commands work)
  - Thin-client bootstrap files: COMPLETE (.claude/agents/*.md reference CLI)
  - Integration into guidance: MISSING (process.yml files don't mention CLI)

  IMPACT OF FIX:
  - Estimated 40-60% context reduction per agent (JIT returns structured data vs full files)
  - Eliminates exploration drift friction pattern (FP-002)
  - Agents get structured context immediately instead of using Glob/Grep/Read

