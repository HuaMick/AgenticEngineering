# Purpose: Add deprecation notices to bootstrap files for deprecated orchestration agents

# ========================================
# ROOT-LEVEL PLAN METADATA (Required)
# ========================================
name: "clean-deprecated-bootstraps"
worktree_path: "/home/code/AgenticEngineering"
branch: "main"
status: "completed"
priority: "medium"
completed_date: "2026-01-23"

# File paths for plan management
worktree: "/home/code/AgenticEngineering"
plan_file: "docs/plans/live/260104AE_agenticguidance/live/plan_live_clean_deprecated_bootstraps.yml"

# ========================================
# CONTEXT (Narrative Updates)
# ========================================
context: |
  Agent self-reviews found that deprecated agents (orchestration-build, orchestration-guidance)
  still have active bootstrap files in `.claude/agents/` that don't mention deprecation.
  Users invoking these bootstrap files will receive instructions for deprecated workflows,
  leading to confusion and potential use of superseded agent patterns.

  The corresponding agent folders already have proper deprecation markers:
  - DEPRECATED.md files exist in both agent folders
  - manifest.yml files have status: deprecated and deprecated_by: orchestration-executor

  However, the bootstrap entry points in `.claude/agents/` are missing deprecation notices.
  This creates a gap where users can still invoke deprecated workflows without warning.

# ========================================
# ROOT-LEVEL INPUTS (Pre-gathered Context)
# ========================================
inputs:
  - location: ".claude/agents/orchestration-build.md"
    description: "Bootstrap file for deprecated orchestration-build agent - needs deprecation notice"

  - location: ".claude/agents/orchestration-guidance.md"
    description: "Bootstrap file for deprecated orchestration-guidance agent - needs deprecation notice"

  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-build/DEPRECATED.md"
    description: "Existing deprecation documentation for orchestration-build"

  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/DEPRECATED.md"
    description: "Existing deprecation documentation for orchestration-guidance"

  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-build/manifest.yml"
    description: "Manifest with status: deprecated for orchestration-build"

  - location: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/manifest.yml"
    description: "Manifest with status: deprecated for orchestration-guidance"

  - location: ".claude/agents/orchestration-executor.md"
    description: "Bootstrap file for the replacement agent (orchestration-executor)"

# ========================================
# PHASES AND TASKS
# ========================================
phases:
  - name: "Phase 1: Update deprecated bootstrap files"
    execution: parallel
    description: "Add deprecation notices to bootstrap files that direct users to orchestration-executor"
    tasks:
      - id: "BOOT-001"
        name: "Add deprecation notice to orchestration-build.md"
        description: |
          Update .claude/agents/orchestration-build.md to include a prominent deprecation notice
          at the top of the file. The notice should:
          - Clearly state the agent is DEPRECATED
          - Provide deprecation date (2026-01-11)
          - Redirect users to orchestration-executor
          - Explain that this agent should not be invoked directly
          - Reference the full DEPRECATED.md file for details
        target_file: ".claude/agents/orchestration-build.md"
        acceptance_criteria:
          - "Deprecation notice appears at the very top of the file"
          - "Notice includes DEPRECATED status in a prominent format"
          - "Notice redirects to orchestration-executor as the replacement"
          - "Notice references the detailed DEPRECATED.md file location"
          - "Original bootstrap instructions preserved below notice (for reference)"
        status: "pending"

      - id: "BOOT-002"
        name: "Add deprecation notice to orchestration-guidance.md"
        description: |
          Update .claude/agents/orchestration-guidance.md to include a prominent deprecation notice
          at the top of the file. The notice should:
          - Clearly state the agent is DEPRECATED
          - Provide deprecation date (2026-01-11)
          - Redirect users to orchestration-executor
          - Explain that this agent should not be invoked directly
          - Reference the full DEPRECATED.md file for details
        target_file: ".claude/agents/orchestration-guidance.md"
        acceptance_criteria:
          - "Deprecation notice appears at the very top of the file"
          - "Notice includes DEPRECATED status in a prominent format"
          - "Notice redirects to orchestration-executor as the replacement"
          - "Notice references the detailed DEPRECATED.md file location"
          - "Original bootstrap instructions preserved below notice (for reference)"
        status: "pending"

  - name: "Phase 2: Verify deprecation alignment"
    execution: sequential
    description: "Ensure all deprecation markers are consistent across bootstrap files, DEPRECATED.md files, and manifest.yml status fields"
    tasks:
      - id: "VERIFY-001"
        name: "Ensure DEPRECATED.md files exist in corresponding agent folders"
        description: |
          Verify that DEPRECATED.md files exist in:
          - modules/AgenticGuidance/agents/orchestration/orchestration-build/DEPRECATED.md
          - modules/AgenticGuidance/agents/orchestration/orchestration-guidance/DEPRECATED.md

          Confirm the content is consistent with the deprecation notices added to bootstrap files:
          - Same deprecation date (2026-01-11)
          - Same replacement agent (orchestration-executor)
          - Same migration guidance
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/DEPRECATED.md"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/DEPRECATED.md"
        acceptance_criteria:
          - "Both DEPRECATED.md files exist"
          - "Deprecation date matches bootstrap notices"
          - "Replacement agent (orchestration-executor) is consistent"
          - "Migration path information is present"
        status: "pending"

      - id: "VERIFY-002"
        name: "Cross-check manifest.yml status fields"
        description: |
          Verify that manifest.yml files for both deprecated agents have:
          - status: deprecated
          - deprecated_by: orchestration-executor
          - deprecation_reason populated with meaningful explanation

          Cross-reference with DEPRECATED.md and bootstrap files to ensure consistency.
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/manifest.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/manifest.yml"
        acceptance_criteria:
          - "Both manifest.yml files have status: deprecated"
          - "Both manifest.yml files have deprecated_by: orchestration-executor"
          - "deprecation_reason field is present and meaningful"
          - "Information is consistent with DEPRECATED.md and bootstrap files"
        status: "pending"

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - "Bootstrap files (.claude/agents/orchestration-build.md and orchestration-guidance.md) have prominent deprecation notices"
  - "Deprecation notices redirect users to orchestration-executor"
  - "All three deprecation markers are aligned: bootstrap files, DEPRECATED.md files, manifest.yml status fields"
  - "Users invoking deprecated agents will immediately see deprecation warning"
  - "Original bootstrap content preserved for historical reference"

# ========================================
# EXECUTION NOTES
# ========================================
execution_notes:
  - "BOOT-001 and BOOT-002 can be executed in parallel (Phase 1)"
  - "VERIFY-001 and VERIFY-002 should be executed after Phase 1 to validate alignment"
  - "No deletion of files - only additions of deprecation notices"
  - "Preserve original bootstrap content below deprecation notice for reference"
  - "Use consistent deprecation date (2026-01-11) across all markers"
