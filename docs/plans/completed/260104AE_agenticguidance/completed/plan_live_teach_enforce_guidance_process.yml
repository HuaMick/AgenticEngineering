implementation_notes:
  jit_context_incident: |
    The JIT Context initiative (November 2025) modified 26 agent bootstrap files to
    implement just-in-time context loading. The changes were executed through
    _plan_build.yml only, which meant:

    1. No agent self-review was performed on the modified guidance
    2. No guidance testing validated the changes
    3. Broken paths and missing references were introduced
    4. Issues were only discovered during subsequent execution sessions
    5. Multiple friction analysis cycles were needed to identify root causes

    This plan prevents recurrence by:
    - Adding detection for guidance modifications in build plans
    - Automatically routing guidance changes through teach validation
    - Documenting the requirement clearly for future reference

  validation_approach: |
    After implementing this plan, the enforcement should be validated by:

    1. Creating a test build plan that includes a guidance file in target_files
    2. Verifying planner-build sets requires_teach_validation: true
    3. Verifying orchestration-planning includes teach validation phase
    4. Confirming agent self-review runs for the modified agent
    5. Testing that normal build plans (without guidance files) are unchanged

  related_friction_analysis: |
    This plan addresses issues identified in:
    - docs/plans/live/260104AE_agenticguidance/audit/260122_friction_analysis.yml
    - docs/plans/live/260104AE_agenticguidance/audit/260123_friction_analysis.yml

    Specifically: "JIT Context modifications bypassed teach process validation"

