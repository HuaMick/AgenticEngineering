                - "modules/AgenticGuidance/agents/**/outputs.yml"
              validation_required: "agent_self_review"

            shared_definitions:
              description: "Shared definitions affecting multiple agents"
              patterns:
                - "modules/AgenticGuidance/assets/definitions/*.yml"
              validation_required: "definition_consistency_check"

            guidelines:
              description: "Guidelines affecting agent decision-making"
              patterns:
                - "modules/AgenticGuidance/assets/guidelines/*.yml"
              validation_required: "guideline_impact_review"

            entrypoints:
              description: "Entry points affecting routing and flow"
              patterns:
                - "modules/AgenticGuidance/entrypoints/*.yml"
              validation_required: "routing_validation"

            specifications:
              description: "Specifications defining contracts"
              patterns:
                - "modules/AgenticGuidance/assets/specifications/*.yml"
              validation_required: "specification_review"

            exclusions:
              description: "Patterns that look like guidance but are not"
              patterns:
                - "modules/AgenticGuidance/assets/examples/**"
                - "modules/AgenticGuidance/docs/**"
                - "**/*.md"
              note: "These do not require teach process validation"
          ```

        status: pending
        priority: medium
        inputs:
          - "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
          - "modules/AgenticGuidance/assets/definitions/guidance-process-requirements.yml"
        target_files:
          - "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
        acceptance_criteria:
          - "guidance_file_patterns section added to agent-categories.yml"
          - "Patterns cover agent_guidance, shared_definitions, guidelines, entrypoints, specifications"
          - "Each pattern category has validation_required field"
          - "Exclusions section clarifies what does NOT require teach process"
          - "Patterns are valid glob syntax"

