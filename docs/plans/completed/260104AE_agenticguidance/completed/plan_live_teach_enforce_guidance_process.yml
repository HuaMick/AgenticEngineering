# Live Plan - Teach: Enforce Guidance Process for All Guidance Changes
# Plan: 260104AE_agenticguidance
# Objective: Ensure all guidance changes go through _plan_teach.yml process with validation
# Created: 2026-01-23

name: enforce_guidance_process
worktree_path: /home/code/AgenticEngineering
branch: main
status: completed
plan_type: teach
completed_date: "2026-01-23"

objective: |
  Enforce that any modifications to agent guidance files (process.yml, inputs.yml, manifest.yml)
  MUST go through the _plan_teach.yml process, not just _plan_build.yml. This ensures that
  guidance validation (including agent self-review) is always performed when guidance changes.

rationale: |
  The JIT Context initiative modified 26 agent bootstrap files but only followed the
  _plan_build.yml process, skipping _plan_teach.yml entirely. This meant:

  - No guidance validation was performed on the changed guidance files
  - No agent self-review caught broken paths or missing references
  - Issues only surfaced during execution, causing friction

  Build plans CAN include guidance file paths in their scope, but if those paths modify
  agent process.yml, inputs.yml, or manifest.yml, the changes MUST also have a
  corresponding teach plan with validation.

  KEY INSIGHT: The problem is not that build plans touched guidance files (sometimes
  necessary for infrastructure work). The problem is that guidance changes bypassed
  the teach process validation loop entirely.

context: |
  Current State:
  - _plan_build.yml routes to orchestration-planning with build intent
  - _plan_teach.yml routes to orchestration-planning with teach intent
  - orchestration-planning determines phases based on intent
  - planner-build creates implementation plans
  - planner-guidance creates teaching/guidance improvement plans

  Gap:
  - No detection mechanism when build plans modify guidance files
  - No FENCE to enforce teach process for guidance-modifying tasks
  - No documentation of the rule that guidance changes require teach process

  Desired State:
  - FENCE in planner-build inputs.yml detects guidance file modifications
  - orchestration-planning recognizes guidance changes and routes appropriately
  - Clear documentation of when _plan_teach.yml is REQUIRED
  - Detection patterns for identifying guidance-modifying tasks

success_criteria:
  - FENCE added to planner-build that detects guidance file modifications in task target_files
  - orchestration-planning updated to check for guidance file modifications in build plans
  - Rule documented that modules/AgenticGuidance/agents/** changes require _plan_teach.yml
  - Detection patterns defined for guidance file types (process.yml, inputs.yml, manifest.yml)
  - Validation loop triggered when build plan includes guidance modifications

related_artifacts:
  planner_build_inputs: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
  orchestration_planning_inputs: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
  orchestration_planning_process: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"
  plan_teach_entrypoint: "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
  plan_build_entrypoint: "modules/AgenticGuidance/entrypoints/_plan_build.yml"

phases:
  # ========================================
  # PHASE 1: Add Detection FENCE to planner-build
  # ========================================
  - name: "Phase 1: Add Guidance Detection FENCE to planner-build"
    description: |
      Add a FENCE instruction to planner-build that detects when planned tasks modify
      agent guidance files. When detected, the FENCE instructs the agent to flag this
      for teach process routing rather than silently proceeding with build-only execution.

    success_criteria:
      - "FENCE added to planner-build/inputs.yml detecting guidance file modifications"
      - "Detection patterns cover process.yml, inputs.yml, manifest.yml, outputs.yml"
      - "FENCE instructs to flag guidance changes for teach process validation"

    tasks:
      - id: "enforce_001"
        name: "Add guidance_modification_fence to planner-build inputs.yml"
        description: |
          Update modules/AgenticGuidance/agents/planner/planner-build/inputs.yml to add
          a guidance_modification_fence section that defines:

          1. DETECTION PATTERNS
             - File patterns that indicate guidance modifications:
               - modules/AgenticGuidance/agents/**/process.yml
               - modules/AgenticGuidance/agents/**/inputs.yml
               - modules/AgenticGuidance/agents/**/manifest.yml
               - modules/AgenticGuidance/agents/**/outputs.yml
               - modules/AgenticGuidance/assets/definitions/*.yml
               - modules/AgenticGuidance/assets/guidelines/*.yml

          2. FENCE INSTRUCTION
             ```yaml
             guidance_modification_fence:
               description: |
                 Detect when build plan tasks modify agent guidance files.
                 Guidance changes require teach process validation.

               detection_patterns:
                 critical_guidance_files:
                   - "modules/AgenticGuidance/agents/**/process.yml"
                   - "modules/AgenticGuidance/agents/**/inputs.yml"
                   - "modules/AgenticGuidance/agents/**/manifest.yml"
                   - "modules/AgenticGuidance/agents/**/outputs.yml"
                 definition_files:
                   - "modules/AgenticGuidance/assets/definitions/*.yml"
                 guideline_files:
                   - "modules/AgenticGuidance/assets/guidelines/*.yml"

               fence: |
                 FENCE: GUIDANCE-MODIFICATION-DETECTION
                 Before finalizing any build plan, check if ANY task target_files
                 match the detection_patterns above.

                 IF MATCH FOUND:
                 1. DO NOT proceed with build-only execution
                 2. FLAG the plan as requiring teach process validation
                 3. ADD to plan output: requires_teach_validation: true
                 4. LIST the specific guidance files being modified
                 5. RECOMMEND running _plan_teach.yml for these changes

                 RATIONALE: Guidance changes affect agent behavior across the entire
                 system. They MUST go through validation (agent self-review, guidance
                 testing) before deployment. Build-only execution skips this validation.

               output_flag:
                 name: "requires_teach_validation"
                 type: "boolean"
                 triggered_when: "Any target_file matches detection_patterns"
                 action: "Set to true and list matched files in guidance_files_modified"
             ```

          3. INTEGRATION WITH PLAN OUTPUT
             - Add requires_teach_validation field to plan output schema
             - Add guidance_files_modified list for matched files
             - Document that orchestration should check this flag

        status: pending
        priority: critical
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
        acceptance_criteria:
          - "guidance_modification_fence section added to inputs.yml"
          - "Detection patterns cover all critical guidance file types"
          - "FENCE instruction clearly states the detection logic"
          - "Output flag schema defined for requires_teach_validation"
          - "Rationale explains why guidance changes need teach process"

  # ========================================
  # PHASE 2: Update orchestration-planning Routing
  # ========================================
  - name: "Phase 2: Update orchestration-planning to Route Guidance Changes"
    description: |
      Update orchestration-planning to recognize when a build plan includes guidance
      modifications and automatically include teach phase validation in the orchestration.
      This ensures guidance changes get validated even when initially requested through
      _plan_build.yml.

    success_criteria:
      - "orchestration-planning checks for requires_teach_validation flag"
      - "When flag is true, teach phase is added to orchestration sequence"
      - "Documentation added explaining automatic teach phase inclusion"

    tasks:
      - id: "enforce_002"
        name: "Add guidance_change_routing to orchestration-planning inputs.yml"
        description: |
          Update modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
          to add a guidance_change_routing section that defines how to handle build plans
          that include guidance modifications.

          Add section:
          ```yaml
          # ==============================================
          # GUIDANCE CHANGE ROUTING
          # ==============================================
          # When a build plan includes guidance file modifications, the orchestration
          # MUST include teach phase validation to ensure guidance quality.
          # ==============================================
          guidance_change_routing:
            description: |
              Build plans may legitimately include guidance file paths (e.g., infrastructure
              work that updates agent inputs). However, any modifications to agent guidance
              MUST be validated through the teach process before deployment.

            detection_trigger: |
              If planner-build sets requires_teach_validation: true in plan output,
              this indicates the plan modifies guidance files.

            routing_action: |
              When requires_teach_validation is true:
              1. INCLUDE teach phase in orchestration sequence
              2. Position teach phase AFTER build tasks that modify guidance
              3. Include agent self-review for each modified agent
              4. Teach phase MUST complete successfully before plan completion

            fence: |
              FENCE: GUIDANCE-CHANGES-REQUIRE-TEACH
              A build plan with requires_teach_validation: true MUST NOT be marked
              complete until teach phase validation passes. This is NON-NEGOTIABLE.

              The following validation is REQUIRED:
              - Agent self-review for each agent whose guidance was modified
              - Path resolution validation for all modified inputs.yml files
              - Consistency check between process.yml and inputs.yml

            phase_insertion_pattern: |
              Original: [Build Phase] -> [Test Phase] -> [Complete]
              Modified: [Build Phase] -> [Teach Validation Phase] -> [Test Phase] -> [Complete]

              The Teach Validation Phase includes:
              - SpawnPlannerGuidance for validation task creation
              - SpawnSelfReview for each modified agent
              - SpawnReviewer to approve guidance changes
          ```

        status: pending
