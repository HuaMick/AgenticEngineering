          # Guidance changes require validation (agent self-review, guidance testing)
          # that is NOT performed in the build-only process.
          # See: modules/AgenticGuidance/assets/definitions/guidance-process-requirements.yml
          # ==============================================
          ```

        status: pending
        priority: medium
        depends_on: ["enforce_004"]
        inputs:
          - "modules/AgenticGuidance/entrypoints/_plan_build.yml"
          - "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
          - "modules/AgenticGuidance/assets/definitions/guidance-process-requirements.yml"
        target_files:
          - "modules/AgenticGuidance/entrypoints/_plan_build.yml"
          - "modules/AgenticGuidance/entrypoints/_plan_teach.yml"
        acceptance_criteria:
