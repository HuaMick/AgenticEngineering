  - "fences section includes file exploration guardrail with trigger/risk/guard/validation"
  - "anti_patterns section includes 3+ JIT-related anti-patterns"
  - "plan-inputs.yml references JIT CLI for dynamic context retrieval"
  - "All cross-references are accurate and files parse without errors"
  - "Guidance is actionable - agents can follow the hierarchy: JIT CLI > Precise Files > Exploration"

