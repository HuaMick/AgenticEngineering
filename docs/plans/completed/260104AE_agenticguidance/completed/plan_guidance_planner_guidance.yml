# Guidance Improvement Plan: planner-guidance Agent
# Created: 2026-01-09
# Purpose: Fix identified issues in planner-guidance agent guidance

plan_name: "planner-guidance Agent Guidance Remediation"
worktree: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"
status: "pending"
priority: "high"

objective: |
  Fix guidance issues in planner-guidance agent identified through self-review.
  Focus on: plan output structure, layer optimization, fragment reference simplification,
  and missing planning folder handling.

# Issues addressed (from self-review):
# 1. Plan output structure mismatch (process.yml vs teaching-plan-example.yml)
# 2. Fragment reference syntax - nested key issue with #planner anchor
# 3. Missing planning folder handling unclear
# 4. Output file mismatch between process.yml and example
# 5. Layer inclusion strategy adds excessive tokens
# 6. Input section example inconsistency
# 7. Missing agent references (teacher-update-guidance, teacher-update-assets)

inputs:
  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
    description: "Current planner-guidance process - primary target"
  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
    description: "Current planner-guidance inputs - layer optimization target"
  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/manifest.yml"
    description: "Current planner-guidance manifest - needs version update"
  - location: "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
    description: "Teaching plan example showing expected output structure"
  - location: "modules/AgenticGuidance/agents/manifest.yml"
    description: "Root agent manifest - replacement for category-specific layers"
  - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent categories - shows nested structure issue"
  - location: "modules/AgenticGuidance/assets/definitions/plans.yml"
    description: "Plan structure definition - authoritative source"

phases:
  - name: "phase-1-process-yml-fixes"
    description: "Fix process.yml output structure and escalation handling"
    agent_category: "teacher"
    success_criteria:
      - "Process outputs section specifies SEPARATE phase files (not single phases-based plan)"
      - "Clear escalation path for missing planning folder"
      - "Step 4 references correct output file structure"

    tasks:
      - id: "teach_001"
        name: "Clarify plan output structure in process.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
          - "modules/AgenticGuidance/assets/definitions/plans.yml"
          - "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
        guidance: |
          ISSUE: process.yml step 4 says to create:
            - `plan_live_teach.yml`: Guidance refinement and teaching tasks
            - `plan_live_audit_clean.yml`: Audit and cleanup tasks

          But teaching-plan-example.yml uses a single-file phases-based structure.
          The file_taxonomy in plans.yml confirms: live/ should contain plan_live_*.yml files.

          USER DECISION: planner-guidance should produce MULTIPLE files (not single phases-based plan).

          CHANGES REQUIRED:
          1. Update outputs section to list expected output files explicitly:
             outputs:
               - location: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_teach.yml"
                 description: "Teaching phase plan for guidance improvements"
               - location: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
                 description: "Audit and cleanup phase plan (if needed)"
               - location: "docs/plans/live/YYMMDDRepo_Branch/analysis/friction-analysis.md"
                 description: "Friction analysis document"

          2. Ensure step 4 guidance matches this multi-file output structure.

          3. Remove reference to teaching-plan-example.yml in favor of plan_example.yml
             which demonstrates the correct unified structure for each file.
        acceptance_criteria:
          - "outputs section explicitly lists expected files"
          - "step 4 clearly describes multi-file output structure"
          - "No conflicting references to single-file vs multi-file structure"

      - id: "teach_002"
        name: "Add escalation for missing planning folder"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
          - "modules/AgenticGuidance/assets/definitions/escalation.yml"
          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/manifest.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
        guidance: |
          ISSUE: Step 3 says "Verify the planning folder docs/plans/live/YYMMDDRepo_Branch/ exists"
          but does not specify what to do if it does not exist.

          USER DECISION: Escalate to run deploy-worktree first (option B).

          CHANGES REQUIRED:
          Add explicit fence after the verification requirement in step 3:

          **Fence**: If planning folder does not exist:
          - STOP planning
          - Escalate to orchestration: "Planning folder docs/plans/live/YYMMDDRepo_Branch/ does not exist.
            Run deploy-worktree agent first to create the workspace structure."
          - Do NOT create the folder manually (deploy-worktree ensures proper git worktree setup)
        acceptance_criteria:
          - "Clear fence added for missing planning folder"
          - "Escalation message specifies deploy-worktree agent"
          - "Explicit instruction NOT to create folder manually"

  - name: "phase-2-inputs-yml-optimization"
    description: "Remove excessive layer inclusions and fix fragment reference"
    agent_category: "teacher"
    success_criteria:
      - "test-shared, cleaner-shared, deploy-shared layers REMOVED"
      - "Root agent manifest added as alternative"
      - "Fragment reference simplified or documented correctly"

    tasks:
      - id: "teach_003"
        name: "Remove category-specific layers and add manifest reference"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
          - "modules/AgenticGuidance/agents/manifest.yml"
          - "modules/AgenticGuidance/assets/inputs/test-shared.yml"
          - "modules/AgenticGuidance/assets/inputs/cleaner-shared.yml"
          - "modules/AgenticGuidance/assets/inputs/deploy-shared.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
        guidance: |
          ISSUE: planner-guidance includes test-shared, cleaner-shared, deploy-shared layers
          "because it needs to understand ALL agent categories". This adds excessive tokens.

          USER DECISION: Planners only need modules/AgenticGuidance/agents/manifest.yml.
          Process should allow reading additional agent guidance as needed.

          CHANGES REQUIRED:
          1. REMOVE these layers from inputs.yml:
             - test-shared.yml (~6 file references, ~200+ tokens when expanded)
             - cleaner-shared.yml (~8 file references, ~300+ tokens when expanded)
             - deploy-shared.yml (~2 file references, ~100+ tokens when expanded)

          2. ADD a single reference to the root agent manifest:
             - type: file
               path: "modules/AgenticGuidance/agents/manifest.yml"
               description: "Root agent manifest listing all agent categories and sub-agents"
               required: true

          3. UPDATE the comment that says "planner-guidance is special: it needs to understand ALL
             agent categories" to reflect the new approach:
             "planner-guidance references agents/manifest.yml for category overview.
              For detailed agent guidance, read the specific agent's process.yml as needed."

          4. Ensure planner-core-system.yml and planner-core-guidelines.yml layers remain
             (these are T4-optimized and appropriate for planners).
        acceptance_criteria:
          - "test-shared, cleaner-shared, deploy-shared layers removed"
          - "agents/manifest.yml added as file reference"
          - "Comment updated to explain new approach"
          - "planner-core layers retained"

      - id: "teach_004"
        name: "Fix fragment reference syntax in agent_context"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
          - "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
          - "modules/AgenticGuidance/assets/definitions/fragment-references.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
        guidance: |
          ISSUE: agent_context uses fragment reference:
            category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#planner"

          But in agent-categories.yml, 'planner' is nested under 'agent_categories' key:
            agent_categories:
              planner:
                ...

          So the fragment reference #planner does NOT resolve to a top-level key.

          USER DECISION: Simplify if complexity outweighs gain.

          CHANGES REQUIRED:
          Option A (Recommended - Simplify):
          Remove fragment reference, use simple string:
            agent_context:
              category: "planner"
              category_definition: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
              role: "planner-guidance"

          This is simpler and the agent can look up the planner section when reading the file.

          Option B (If keeping fragments):
          Update to use nested path syntax: #agent_categories.planner
          But this is non-standard and adds complexity.
        acceptance_criteria:
          - "Fragment reference removed or corrected"
          - "agent_context still clearly identifies the agent's category"
          - "category_definition file path preserved for reference"

  - name: "phase-3-example-alignment"
    description: "Align example reference and update manifest"
    agent_category: "teacher"
    success_criteria:
      - "teaching-plan-example.yml reference replaced with plan_example.yml"
      - "manifest.yml version updated"

    tasks:
      - id: "teach_005"
        name: "Update example reference in inputs.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
          - "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
          - "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
        guidance: |
          ISSUE: inputs.yml references teaching-plan-example.yml but this example uses
          a single-file phases-based structure that conflicts with the multi-file
          output strategy specified in process.yml.

          CHANGES REQUIRED:
          1. Replace the teaching-plan-example.yml reference:
             FROM:
               - type: file
                 path: "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
                 description: "Example teaching plan showing structure for guidance improvement plans"

             TO:
               - type: file
                 path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
                 description: "Unified plan structure example showing required fields and task format"

          2. Keep the MMD component examples (teach_phase.mmd, uat_phase.mmd) as they
             complement the plan structure for visual orchestration.
        acceptance_criteria:
          - "teaching-plan-example.yml reference removed"
          - "plan_example.yml reference added"
          - "MMD component examples retained"

      - id: "teach_006"
        name: "Update manifest.yml version"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/manifest.yml"
        target_files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/manifest.yml"
        guidance: |
          ISSUE: manifest.yml is minimal and has version "1.0" which predates these fixes.

          CHANGES REQUIRED:
          Update version to indicate guidance has been revised:

          FROM:
            name: planner-guidance
            description: "Produce a high-signal, guidance-focused plan to improve agent paths, fences, and signposts."
            version: "1.0"

          TO:
            name: planner-guidance
            description: "Create guidance-focused plans to improve agent paths, fences, and signposts."
            version: "2.0"

            # Process and inputs files
            files:
              process: "process.yml"
              inputs: "inputs.yml"

            # Key changes in v2.0:
            # - Multi-file output structure (plan_live_teach.yml, plan_live_audit_clean.yml)
            # - Optimized layer loading (removed test-shared, cleaner-shared, deploy-shared)
            # - Simplified fragment reference syntax
            # - Clear escalation for missing planning folder
        acceptance_criteria:
          - "Version updated to 2.0"
          - "Description slightly refined"
          - "files section added for clarity"
          - "Change notes added"

success_criteria:
  user_validation:
    - "planner-guidance produces multi-file plans (plan_live_teach.yml, plan_live_audit_clean.yml)"
    - "Context window usage reduced by removing unnecessary layer inclusions"
    - "Missing planning folder triggers clear escalation to deploy-worktree"

  technical_validation:
    - "No broken references in process.yml, inputs.yml, or manifest.yml"
    - "outputs section in process.yml explicitly lists expected files"
    - "test-shared, cleaner-shared, deploy-shared layers removed from inputs.yml"
    - "agents/manifest.yml added as reference in inputs.yml"
    - "Fragment reference simplified in agent_context"

notes:
  - "This plan addresses 7 issues identified in self-review"
  - "User decisions have been incorporated for: output structure, fragment syntax, missing folder handling, layer optimization"
  - "teacher-update-guidance executes all tasks (no new assets need creation)"
  - "Verification can be done by re-running planner-guidance on a test case"
