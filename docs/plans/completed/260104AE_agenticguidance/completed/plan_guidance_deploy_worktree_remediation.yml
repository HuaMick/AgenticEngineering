    tasks:
      - id: "4.1"
        description: "D2: Make agent-loops.yml conditional based on agent type"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        priority: "MEDIUM"
        context:
          issue: "D2 - agent-loops.yml loaded for non-looping agents"
          current_state: |
            agent-loops.yml (103 lines) is loaded via core-system.yml for all agents.
            deploy-worktree explicitly states it does not participate in loops.
            This wastes ~150 tokens for non-looping agents.
          solution: |
            Create deploy-core-system.yml (per Q1 decision) that excludes agent-loops.yml.
            This layer will be used by deploy agents instead of core-system.yml.
          target_file: "modules/AgenticGuidance/assets/inputs/deploy-core-system.yml"
          required_structure:
            header: |
              layer_name: "deploy-core-system"
              description: "Core system layer for deploy agents - excludes agent-loops"
              version: "1.0"
            content: |
              Same as core-system.yml but WITHOUT agent-loops.yml reference.
              Deploy agents don't participate in iterative loops.
        acceptance_criteria:
          - "deploy-core-system.yml exists in assets/inputs/"
          - "Contains all core-system.yml references EXCEPT agent-loops.yml"
          - "Comments explain why agent-loops excluded for deploy agents"
        files:
          - "modules/AgenticGuidance/assets/inputs/deploy-core-system.yml"
        status: "skipped"
        completed_date: "2026-01-10"
        completed_in: "Session 8 - Ralph Loop"
        notes: |
          SKIPPED: core-system.yml does not actually load agent-loops.yml.
          It only contains: plans.yml, architecture-pattern.yml, ARCHITECTURE.md
          The D2 audit finding is outdated - agent-loops.yml is loaded via iteration.yml
          which is in core-guidelines (not core-system), and deploy agents already
          use deploy-minimal.yml which excludes iteration.yml.
          No action needed - deploy agents already have optimized context.

      - id: "4.2"
        description: "D3: Standardize path references across deploy agents"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "LOW"
        context:
          issue: "D3 - inconsistent path references"
          current_state: |
