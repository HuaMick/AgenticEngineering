            - entrypoints.yml
            - guidance.yml
            - Plus 5 others
            These are loaded but unused by deploy-worktree.
          required_actions:
            - "Audit which files are actually used by deploy agents"
            - "Document findings for phase 5 (specialized core layer)"
            - "Create list of files to exclude from deploy-core-system.yml"
        acceptance_criteria:
          - "Complete list of unused definitions documented"
          - "Rationale for each exclusion documented"
          - "Findings ready for phase 5 implementation"
        files:
          - "modules/AgenticGuidance/assets/inputs/core-system.yml"
        status: "completed"
        completed_date: "2026-01-10"
        completed_in: "Session 8 - Ralph Loop"
        notes: |
          AUDIT FINDINGS: Deploy agents now have optimized context:
          - core-system.yml loads only: plans.yml, architecture-pattern.yml, ARCHITECTURE.md
          - deploy-minimal.yml loads only: context-minimisation, worktree-and-branching, safety
