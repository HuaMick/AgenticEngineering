# =============================================================================
# PHASE 3: Create Deploy-Minimal Layer (ALL deploy agents - D1 fix)
# =============================================================================
  - name: "phase-3-deploy-minimal-layer"
    description: "Create a lightweight layer for ALL deploy agents (D1 fix: not just setup agents)"
    agent_category: "teacher"
    estimated_token_savings: "~400 tokens per agent"
    dependencies:
      - "phase-2-quick-wins"

    success_criteria:
      - "deploy-minimal.yml layer exists with only essential guidelines"
      - "deploy-worktree uses deploy-minimal instead of core-guidelines"
      - "deploy-cicd uses deploy-minimal instead of core-guidelines (Q2)"
      - "Context loading reduced by excluding irrelevant guidelines"

    tasks:
      - id: "3.1"
        description: "Create deploy-minimal layer for ALL deploy agents"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        priority: "MEDIUM"
        context:
          target_file: "modules/AgenticGuidance/assets/inputs/deploy-minimal.yml"
          current_state: |
            Deploy agents currently use core-guidelines layer which loads 8 guidelines:
            - fix-the-source.yml (47 lines) - NOT NEEDED for deploy
            - context-minimisation.yml (58 lines) - KEEP (meta-relevant)
            - experiment-first.yml (52 lines) - NOT NEEDED for deploy
            - less-is-more.yml (55 lines) - NOT NEEDED for deploy
            - worktree-and-branching.yml (50 lines) - KEEP (core to deploy ops)
            - testing.yml (84 lines) - NOT NEEDED for deploy
            - response-audit.yml (47 lines) - NOT NEEDED for deploy
            - safety.yml (68 lines) - KEEP (always relevant)

            Total unnecessary: ~285 lines / ~400 tokens
          required_structure:
            header: |
              layer_name: "deploy-minimal"
              description: "Lightweight layer for ALL deploy agents requiring minimal context"
              version: "1.0"
            references:
              - "assets/guidelines/context-minimisation.yml (meta-guidance)"
              - "assets/guidelines/worktree-and-branching.yml (core for deploy ops)"
              - "assets/guidelines/safety.yml (always required)"
        acceptance_criteria:
          - "deploy-minimal.yml exists in assets/inputs/"
          - "Contains only 3 guideline references (context-min, worktree, safety)"
          - "Follows layer file format consistent with existing layers"
        files:
          - "modules/AgenticGuidance/assets/inputs/deploy-minimal.yml"
        status: "completed"
        completed_date: "2026-01-09"
        completed_in: "Session 8 - Ralph Loop iteration 7"
        notes: "Created deploy-minimal.yml with 3 guidelines, includes rationale for exclusions."

      - id: "3.2"
        description: "Update deploy-worktree to use deploy-minimal layer"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "MEDIUM"
        context:
          target_file: "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
          current_state: |
            inputs.yml layers section references core-guidelines.yml (line 20-23)
            which loads all 8 guidelines regardless of relevance.
          required_changes:
            - "Replace 'assets/inputs/core-guidelines.yml' with 'assets/inputs/deploy-minimal.yml'"
            - "Update description to reflect minimal layer purpose"
        acceptance_criteria:
          - "inputs.yml references deploy-minimal.yml instead of core-guidelines.yml"
          - "Description updated to reflect change"
          - "Other layers remain unchanged"
        files:
          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
        status: "completed"
        completed_date: "2026-01-09"
        completed_in: "Session 8 - Ralph Loop iteration 7"
        notes: "Replaced core-guidelines.yml with deploy-minimal.yml in layers section."

      - id: "3.3"
        description: "Update deploy-cicd to use deploy-minimal layer (Q2 decision)"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "MEDIUM"
        context:
          target_file: "modules/AgenticGuidance/agents/deploy/deploy-cicd/inputs.yml"
          current_state: |
            deploy-cicd uses core-guidelines.yml like other agents.
            Per Q2 decision, it should use deploy-minimal.yml pattern.
          required_changes:
            - "Replace 'assets/inputs/core-guidelines.yml' with 'assets/inputs/deploy-minimal.yml'"
            - "Update description to reflect minimal layer purpose"
        acceptance_criteria:
          - "deploy-cicd inputs.yml references deploy-minimal.yml"
          - "Description updated to reflect change"
        files:
