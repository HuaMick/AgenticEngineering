# Guidance Plan: Deploy-Worktree Context Overload Remediation
# Created: 2026-01-07
# Updated: 2026-01-08
# Source: audit_deploy_worktree.yml (8 issues: 1 HIGH, 3 MEDIUM, 4 LOW)

plan_name: "Deploy-Worktree Context Overload Remediation"
worktree: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"
created: "2026-01-07"
updated: "2026-01-10"
status: "completed"

objective: |
  Reduce context window waste in ALL deploy agents from ~40-50% unused/redundant
  to <10%. This plan covers deploy-worktree, deploy-cicd, and all other deploy
  agents. Focus on eliminating duplicate content, creating targeted layers,
  consolidating scattered metadata, and creating specialized deploy-specific
  core layers.

audit_reference: "docs/plans/live/260104AE_agenticguidance/live/audit_deploy_worktree.yml"

# Scope clarification (D1 fix): This plan applies to ALL deploy agents
scope:
  primary_agent: "deploy-worktree"
  additional_agents:
    - "deploy-cicd"
    - "deploy-release"
    - "deploy-cloud"
    - "deploy-docs"
  scope_rationale: |
    User decision: deploy-minimal.yml pattern applies to ALL deploy agents,
    not just setup/scaffolding agents. deploy-cicd explicitly included per Q2.

# User Decisions (captured from review)
user_decisions:
  Q1_core_system_layer:
    decision: "Create SEPARATE deploy-core-system.yml layer"
    rationale: "Don't modify shared core-system.yml; create deploy-specific layer instead"
    impact: "New file: assets/inputs/deploy-core-system.yml"

  Q2_deploy_cicd_pattern:
    decision: "deploy-cicd should ALSO use deploy-minimal.yml pattern"
    rationale: "Same lightweight context needs as deploy-worktree"
    impact: "Update deploy-cicd inputs.yml to use deploy-minimal.yml"

# =============================================================================
# PHASE 1: Deduplication First (D5 fix - reordered to deduplicate FIRST)
# =============================================================================
phases:
  - name: "phase-1-deduplication"
    description: "Deduplicate content FIRST before other refactoring work (D5 fix: phase ordering)"
    agent_category: "teacher"
    estimated_token_savings: "~700 tokens"

    success_criteria:
      - "friction.yml contains no duplicate content (12 lines max, not 26)"
      - "inputs.yml definitions section reduced to non-redundant content only"
      - "No policy duplication with worktree-and-branching.yml"

    tasks:
      - id: "1.1"
        description: "Remove duplicate content from friction.yml"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        priority: "HIGH"
        context:
          target_file: "modules/AgenticGuidance/assets/definitions/friction.yml"
          current_state: |
            File contains 26 lines but only 12 lines of unique content.
            Lines 1-12 are repeated verbatim in lines 13-24.
            This is a copy-paste error causing ~100 wasted tokens.
          required_changes:
            - "Remove lines 13-26 (duplicate content)"
            - "Retain only lines 1-12 (unique friction definition)"
            - "Remove trailing blank lines"
        acceptance_criteria:
          - "friction.yml is exactly 12 lines (11 content + 1 trailing newline)"
          - "Content matches original lines 1-12 verbatim"
          - "File remains valid and readable"
        files:
          - "modules/AgenticGuidance/assets/definitions/friction.yml"
        status: "completed"
        completed_date: "2026-01-09"
        completed_in: "Session 8 - Ralph Loop"
        notes: "Removed duplicate content (lines 13-26). File now has 11 content lines + newline."

      - id: "1.2"
        description: "Analyze and deduplicate inputs.yml definitions section"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        priority: "MEDIUM"
        context:
          target_file: "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
          current_state: |
            definitions section (lines 64-158) contains ~90 lines of inline definitions:
            - git_worktree (lines 65-79): Overlaps with general git worktree knowledge
            - workspace_file (lines 81-94): KEEP - VS Code specific, not in guideline
            - worktree_naming_convention (lines 96-107): Duplicates guideline content
            - branch_strategy (lines 109-125): Duplicates worktree-and-branching.yml
            - worktree_operations (lines 127-139): KEEP - operational checklist
            - planning_scaffolding (lines 141-158): Will be addressed by phase 3

            Overlap with worktree-and-branching.yml:
            - branch_strategy duplicates "Staging-first merge strategy" rule
            - worktree_naming_convention overlaps folder structure conventions
          required_changes:
            - "Remove branch_strategy definition (duplicate of guideline)"
            - "Remove worktree_naming_convention (covered by guideline + folder-structure.yml)"
            - "Reduce git_worktree to command reference only (remove policy content)"
            - "Keep workspace_file (VS Code specific, not covered elsewhere)"
            - "Keep worktree_operations (operational checklist, not policy)"
        acceptance_criteria:
          - "definitions section reduced by ~50-60 lines"
          - "No policy duplication with worktree-and-branching.yml"
          - "Operational content (workspace_file, worktree_operations) preserved"
          - "Agent still has access to all necessary information"
        files:
          - "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
        status: "completed"
        completed_date: "2026-01-09"
        completed_in: "Session 8 - Ralph Loop iteration 6"
        notes: |
          Reduced definitions from ~95 lines to ~45 lines (~50 line reduction):
          - Removed branch_strategy (in worktree-and-branching.yml)
          - Removed worktree_naming_convention (in guideline + folder-structure.yml)
          - Reduced git_worktree to git_worktree_commands (commands only)
          - Kept workspace_file (VS Code specific)
          - Kept worktree_operations (operational checklist)
          - Condensed planning_scaffolding (reference to plans.yml)

