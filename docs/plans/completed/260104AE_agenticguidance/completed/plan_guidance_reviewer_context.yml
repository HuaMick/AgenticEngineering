plan_name: reviewer_context_optimization
status: completed
worktree: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"

audit_reference:
  source: "docs/plans/live/260104AE_agenticguidance/live/audit_planner_reviewer.yml"
  issues_count: 9
  categories:
    EXCESSIVE: 2
    REDUNDANCY: 1
    OVERLAP: 2
    UNUSED: 3
    MISSING_CONSOLIDATION: 1

questions_for_user:
  # Critical design questions requiring user input before proceeding
  - id: Q1
    category: "architecture"
    question: |
      Should we create reviewer-specific examples as NEW files, or create a shared
      "structural-patterns.yml" that both planner-guidance and planner-reviewer reference?
    options:
      - "A: Create reviewer-specific assets/examples/reviewer/plan-structure-reference.yml"
      - "B: Create shared assets/examples/planner/structural-patterns.yml for both agents"
      - "C: Embed minimal structure examples directly in planner-reviewer/inputs.yml"
    recommendation: "Option B - maintains single source of truth, reduces future drift"
    impact: "Affects Phase 1 task design and file locations"
    user_decision: "B - SHARED structural-patterns.yml for BOTH planner-guidance AND planner-reviewer"

  - id: Q2
    category: "scope"
    question: |
      The MISSING_CONSOLIDATION issue suggests merging fix-the-source.yml and
      context-minimisation.yml into review-principles.yml. Should this be:
    options:
      - "A: A NEW file with extracted reviewer-relevant rules only"
      - "B: A layer file referencing both with fragment selectors (#rule-name)"
      - "C: Skip consolidation - just remove unnecessary rules from reviewer inputs"
    recommendation: "Option C - simpler, avoids new file, removes 2 files from inputs"
    impact: "Affects Phase 3 task scope"

  - id: Q3
    category: "process"
    question: |
      For the OVERLAP issue (process.yml success criteria vs success-criteria-teacher.yml),
      should we:
    options:
      - "A: Remove inline criteria from process.yml, reference definition only"
      - "B: Keep both - inline is reviewer-specific, definition is authoritative source"
      - "C: Merge inline criteria INTO success-criteria-teacher.yml as reviewer section"
    recommendation: "Option B - inline checklist is practical, definition is conceptual"
    impact: "Low impact, affects Phase 2 only if Option A or C selected"

phases:
  # ========================================
  # PHASE 1: CONDENSE EXAMPLES (HIGH IMPACT)
  # Addresses: EXCESSIVE (2 issues), REDUNDANCY (1 issue)
  # Estimated savings: ~1,200 lines (50% of example content)
  # ========================================
  - name: "Condense Examples"
    description: |
      Create SHARED structural examples that demonstrate required patterns
      for BOTH planner-guidance and planner-reviewer agents.
      Reviewer validates structure, not content.

    execution: sequential

    tasks:
      - id: T1.1
        title: "Create SHARED structural-patterns.yml for planner agents"
        description: |
          Extract structural patterns from verbose examples into SHARED reference file.
          This file will be used by BOTH planner-guidance and planner-reviewer.
          Show WHAT structure is required, not HOW to implement.
        target_files:
          - create: "modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml"
        inputs:
          - "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml"
          - "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
          - "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
        guidance: |
          Create a ~100-line structural reference showing:
          1. Required root fields: plan_name, worktree, branch, liveplan, completedplan
          2. Phase structure: name, execution_groups, agents array
          3. Task structure: type, inputs, guidance, success_criteria
          4. Success criteria patterns: 3 examples of outcome-focused criteria

          IMPORTANT: This is a SHARED file for both:
          - planner-guidance (for teaching plan structure creation)
          - planner-reviewer (for validating plan structure)

          Do NOT include:
          - Full guidance blocks (use placeholder: "guidance: <detailed instructions>")
          - Multiple phases (one example of each phase type suffices)
          - Implementation details

          Format as YAML with inline comments explaining each required element.
        success_criteria:
          - "File exists at target location"
          - "Contains all required structural elements from checklist"
          - "Total length under 150 lines"
          - "No full guidance blocks included"
          - "Suitable for both planner-guidance teaching AND planner-reviewer validation"
        agent_type: "teacher"
        depends_on: []

      - id: T1.2
        title: "Extract plans.yml structure requirements"
        description: |
          Create focused plan-structure-requirements.yml with only the structural
          requirements relevant to plan review (not full lifecycle documentation).
        target_files:
          - create: "modules/AgenticGuidance/assets/definitions/plan-structure-requirements.yml"
        inputs:
          - "modules/AgenticGuidance/assets/definitions/plans.yml"
        guidance: |
          Extract from plans.yml:
          1. Required fields list with types
          2. Folder structure conventions (worktree, liveplan, completedplan paths)
          3. Naming conventions (YYMMDDRepo_Branch pattern)

          Do NOT include:
          - Lifecycle transitions (live -> completed)
          - Historical context
          - Multiple examples of same pattern

          Target: ~40 lines vs current 178 lines.
        success_criteria:
          - "File exists with extracted structure requirements"
          - "All reviewer checklist items can be validated against this file"
          - "No lifecycle management content included"
          - "Under 50 lines"
        agent_type: "teacher"
        depends_on: ["T1.1"]

      - id: T1.3
        title: "Update planner-reviewer inputs to use SHARED structural-patterns.yml"
        description: |
          Modify planner-reviewer/inputs.yml to reference the SHARED structural-patterns.yml
          instead of full verbose examples directory.
        target_files:
          - update: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
          - "T1.1 output: structural-patterns.yml"
          - "T1.2 output: plan-structure-requirements.yml"
        guidance: |
          Replace current inputs.yml content:

          REMOVE:
          - location: "assets/examples/planner/" (directory reference to verbose examples)
          - location: "assets/definitions/plans.yml" (full lifecycle doc)

          ADD:
          - location: "assets/examples/planner/structural-patterns.yml"
            description: "SHARED structural patterns for plan validation (used by planner-guidance too)"
          - location: "assets/definitions/plan-structure-requirements.yml"
            description: "Required fields and naming conventions"

          KEEP (unchanged):
          - agent-loops.yml
          - success-criteria-teacher.yml
        success_criteria:
          - "inputs.yml references SHARED structural-patterns.yml, not verbose examples"
          - "No directory-level references to assets/examples/planner/"
          - "All files referenced in inputs.yml exist"
        agent_type: "teacher"
        depends_on: ["T1.1", "T1.2"]

      - id: T1.4
        title: "Update planner-guidance inputs to use SHARED structural-patterns.yml"
        description: |
          Modify planner-guidance/inputs.yml to reference the SHARED structural-patterns.yml
          ensuring both planner agents use the same structural reference.
        target_files:
          - update: "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
          - "T1.1 output: structural-patterns.yml"
        guidance: |
          Update planner-guidance inputs.yml:

          ADD (if not present):
          - location: "assets/examples/planner/structural-patterns.yml"
            description: "SHARED structural patterns for plan creation (used by planner-reviewer too)"

          REVIEW existing references:
          - If planner-guidance references verbose examples directory, consider replacing
            with the SHARED structural-patterns.yml
          - Maintain single source of truth between planner-guidance and planner-reviewer

          This ensures both agents reference the SAME structural patterns file,
          preventing drift between what planner-guidance teaches and what planner-reviewer validates.
        success_criteria:
          - "planner-guidance inputs.yml references structural-patterns.yml"
          - "Same structural-patterns.yml file used by both planner-guidance and planner-reviewer"
          - "Single source of truth maintained for structural patterns"
        agent_type: "teacher"
        depends_on: ["T1.1", "T1.3"]

    phase_success_criteria:
      - "SHARED structural-patterns.yml under 150 lines"
      - "Structure requirements file under 50 lines"
      - "BOTH planner-reviewer AND planner-guidance inputs.yml reference SHARED structural-patterns.yml"
      - "No regression: reviewer process.yml checklist still works"

  # ========================================
  # PHASE 2: REMOVE OVERLAP (MEDIUM IMPACT)
  # Addresses: OVERLAP (2 issues)
  # Estimated savings: ~150 lines
  # ========================================
  - name: "Remove Overlap"
    description: |
      Remove non-consumable .mmd files from inputs and clarify success criteria sourcing.

    execution: sequential

    tasks:
      - id: T2.1
        title: "Remove .mmd flowchart files from reviewer context"
        description: |
          Ensure planner-reviewer does not load .mmd files (human documentation,
          not agent-consumable data).
        target_files:
          - verify: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        guidance: |
          Verify inputs.yml does NOT include:
          - Any .mmd file references
          - Any "assets/examples/planner/components/" references

          The current inputs.yml uses directory reference "assets/examples/planner/"
          which may transitively load .mmd files. After T1.3, this should be resolved.

          If any .mmd references exist, remove them.
        success_criteria:
          - "No .mmd files in inputs.yml references"
          - "No directory patterns that could match .mmd files"
        agent_type: "teacher"
        depends_on: ["T1.3"]

      - id: T2.2
        title: "Clarify success criteria source in process.yml"
        description: |
          Add reference to success-criteria-teacher.yml in process.yml checklist
          to make authoritative source explicit.
        target_files:
          - update: "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
          - "modules/AgenticGuidance/assets/definitions/success-criteria-teacher.yml"
        guidance: |
          In the SUCCESS CRITERIA CHECKLIST section, ensure the reference to
          success-criteria-teacher.yml is clear:

          Current:
            - [ ] Technical validation criteria are verifiable (see success-criteria-teacher.yml in inputs)

          This is sufficient - the inline checklist provides practical steps,
          the referenced file provides the conceptual definition.

          No changes needed unless reference is missing or unclear.
        success_criteria:
          - "success-criteria-teacher.yml reference exists in process.yml"
          - "Reference is in SUCCESS CRITERIA CHECKLIST section"
        agent_type: "teacher"
        depends_on: []
        blocked_by: "Q3"  # Only execute if user selects option requiring change

    phase_success_criteria:
      - "No .mmd files referenced in reviewer inputs"
      - "Success criteria reference clear and present"
      - "~150 lines removed from effective context"

  # ========================================
  # PHASE 3: REMOVE UNUSED INPUTS (LOW IMPACT)
  # Addresses: UNUSED (3 issues)
  # Estimated savings: ~150 lines
  # ========================================
  - name: "Remove Unused Inputs"
    description: |
      Remove guidelines that are not relevant to plan review function.

    execution: sequential

    tasks:
      - id: T3.1
        title: "Remove operational guidelines from reviewer inputs"
        description: |
          Remove worktree-and-branching.yml, response-audit.yml, and experiment-first.yml
          from planner-reviewer inputs.
        target_files:
          - update: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        guidance: |
          Remove these entries from inputs.yml:

          REMOVE:
          - location: "assets/guidelines/worktree-and-branching.yml"
            reason: "Operational execution guidance, not plan structure review"

          - location: "assets/guidelines/response-audit.yml"
            reason: "Final output formatting, not plan validation"

          - location: "assets/guidelines/experiment-first.yml"
            reason: "Discovery/exploration guidance, not review function"

          These guidelines belong in execution and exploration agent inputs,
          not in the reviewer which validates plan structure.
        success_criteria:
          - "worktree-and-branching.yml not in inputs"
          - "response-audit.yml not in inputs"
          - "experiment-first.yml not in inputs"
          - "~150 lines removed from reviewer context"
        agent_type: "teacher"
        depends_on: ["T1.3"]

      - id: T3.2
        title: "Simplify guideline references"
        description: |
          Review remaining guidelines (fix-the-source, context-minimisation) and
          determine if they should remain or be removed based on Q2 answer.
        target_files:
          - update: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
          - "modules/AgenticGuidance/assets/guidelines/fix-the-source.yml"
          - "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
        guidance: |
          Based on Q2 answer:

          If Q2 = C (recommended):
            REMOVE both guidelines from inputs - reviewer validates structure,
            does not need philosophical guidance on fixing vs symptoms.

          If Q2 = A:
            Create review-principles.yml extracting only:
            - "Fix root cause" rule from fix-the-source
            - "Need-to-know basis" rule from context-minimisation
            Then reference new file instead of both originals.

          If Q2 = B:
            Add fragment references: fix-the-source.yml#rule-fix-source
        success_criteria:
          - "Guideline inputs match Q2 decision"
          - "No unnecessary philosophical guidance loaded"
        agent_type: "teacher"
        depends_on: ["T3.1"]
        blocked_by: "Q2"

    phase_success_criteria:
      - "Only review-relevant inputs remain"
      - "3 unused guidelines removed"
      - "Total input files reduced from 15 to ~5-6"

  # ========================================
  # PHASE 4: SPECIALIZED CORE LAYER AUDIT
  # Cross-cutting: Audit and specialize core layers for planner agents
  # ========================================
  - name: "Specialized Core Layer Audit"
    description: |
      AUDIT planner agents to discover which core files they actually use,
      then create specialized planner-specific core layers to replace generic
      core-guidelines.yml and core-systems.yml references.

    execution: sequential

    tasks:
      - id: T4.1
        title: "Audit planner agents for core file usage"
        description: |
          Analyze all planner agents (planner-guidance, planner-reviewer, planner-build,
          planner-test, planner-cleaning) to identify which specific rules and systems
          from core-guidelines.yml and core-systems.yml they actually consume.
        target_files:
          - audit: "modules/AgenticGuidance/agents/planner/*/inputs.yml"
          - audit: "modules/AgenticGuidance/agents/planner/*/process.yml"
        inputs:
          - "modules/AgenticGuidance/core/core-guidelines.yml"
          - "modules/AgenticGuidance/core/core-systems.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-test/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-test/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml"
        guidance: |
          For each planner agent, trace which specific rules from core layers are:
          1. EXPLICITLY REFERENCED - directly mentioned in process.yml or guidance
          2. IMPLICITLY REQUIRED - needed for agent function but not explicitly mentioned
          3. UNUSED - included in generic core but not relevant to planner function

          Create audit report documenting:
          - Which core-guidelines.yml rules each planner agent uses
          - Which core-systems.yml systems each planner agent uses
          - Common patterns across all planner agents
          - Rules/systems unique to specific planner agents

          Output: Audit findings to inform T4.2 and T4.3
        success_criteria:
          - "All planner agents audited for core layer usage"
          - "Clear categorization: EXPLICIT, IMPLICIT, UNUSED for each rule/system"
          - "Common planner patterns identified"
          - "Unique per-agent requirements documented"
        agent_type: "reviewer"
        depends_on: []

      - id: T4.2
        title: "Create specialized planner-core-guidelines.yml"
        description: |
          Extract planner-relevant guidelines from core-guidelines.yml into
          a specialized planner-core-guidelines.yml containing ONLY the rules
          that planner agents actually use.
        target_files:
          - create: "modules/AgenticGuidance/core/planner-core-guidelines.yml"
        inputs:
          - "modules/AgenticGuidance/core/core-guidelines.yml"
          - "T4.1 output: audit findings"
        guidance: |
          Based on T4.1 audit findings, create planner-core-guidelines.yml:

          INCLUDE:
          - All guidelines marked EXPLICITLY REFERENCED by any planner agent
          - All guidelines marked IMPLICITLY REQUIRED by any planner agent

          EXCLUDE:
          - Guidelines marked UNUSED across all planner agents
          - Execution-specific guidelines (build, test, deploy operations)
          - Guidelines specific to non-planner agent types

          Structure:
          - Header explaining this is specialized for planner agents
          - Clear sections matching original core-guidelines.yml structure
          - Comments indicating which planner agents use each guideline

          Target: Significant reduction from full core-guidelines.yml
        success_criteria:
          - "File created with planner-relevant guidelines only"
          - "All planner agent requirements covered"
          - "No unused guidelines included"
          - "Clear documentation of scope"
        agent_type: "teacher"
        depends_on: ["T4.1"]

      - id: T4.3
        title: "Create specialized planner-core-systems.yml"
        description: |
          Extract planner-relevant systems from core-systems.yml into
          a specialized planner-core-systems.yml containing ONLY the systems
          that planner agents actually use.
        target_files:
          - create: "modules/AgenticGuidance/core/planner-core-systems.yml"
        inputs:
          - "modules/AgenticGuidance/core/core-systems.yml"
          - "T4.1 output: audit findings"
        guidance: |
          Based on T4.1 audit findings, create planner-core-systems.yml:

          INCLUDE:
          - All systems marked EXPLICITLY REFERENCED by any planner agent
          - All systems marked IMPLICITLY REQUIRED by any planner agent

          EXCLUDE:
          - Systems marked UNUSED across all planner agents
          - Execution-specific systems (CI/CD, deployment, runtime)
          - Systems specific to non-planner agent types

          Structure:
          - Header explaining this is specialized for planner agents
          - Clear sections matching original core-systems.yml structure
          - Comments indicating which planner agents use each system

          Target: Significant reduction from full core-systems.yml
        success_criteria:
          - "File created with planner-relevant systems only"
          - "All planner agent requirements covered"
          - "No unused systems included"
          - "Clear documentation of scope"
        agent_type: "teacher"
        depends_on: ["T4.1"]

      - id: T4.4
        title: "Update all planner agents to use specialized core layers"
        description: |
          Update inputs.yml for ALL planner agents to reference the new
          planner-core-guidelines.yml and planner-core-systems.yml instead
          of generic core-guidelines.yml and core-systems.yml.
        target_files:
          - update: "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
          - update: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
          - update: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
          - update: "modules/AgenticGuidance/agents/planner/planner-test/inputs.yml"
          - update: "modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml"
        inputs:
          - "T4.2 output: planner-core-guidelines.yml"
          - "T4.3 output: planner-core-systems.yml"
          - "All planner agent inputs.yml files"
        guidance: |
          For each planner agent inputs.yml:

          REPLACE:
          - location: "core/core-guidelines.yml"
            WITH: "core/planner-core-guidelines.yml"

          - location: "core/core-systems.yml"
            WITH: "core/planner-core-systems.yml"

          Ensure consistent update across ALL planner agents:
          - planner-guidance
          - planner-reviewer
          - planner-build
          - planner-test
          - planner-cleaning

          Verify no planner agent still references generic core layers.
        success_criteria:
          - "All planner agent inputs.yml updated"
          - "No planner agent references core-guidelines.yml directly"
          - "No planner agent references core-systems.yml directly"
          - "All planner agents reference planner-core-guidelines.yml"
          - "All planner agents reference planner-core-systems.yml"
        agent_type: "teacher"
        depends_on: ["T4.2", "T4.3"]

    phase_success_criteria:
      - "Audit completed for all planner agents"
      - "planner-core-guidelines.yml created with relevant guidelines only"
      - "planner-core-systems.yml created with relevant systems only"
      - "All planner agents updated to use specialized core layers"
      - "Significant context reduction achieved through specialization"

  # ========================================
  # PHASE 5: VALIDATION
  # Verify changes achieve context reduction without regression
  # ========================================
  - name: "Validation"
    description: |
      Verify the optimized inputs work correctly and achieve target reduction.

    execution: sequential

    tasks:
      - id: T5.1
        title: "Validate reviewer inputs completeness"
        description: |
          Ensure all checklist items in process.yml can still be validated
          with the reduced input set.
        target_files:
          - verify: "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
          - verify: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        guidance: |
          Walk through each checklist section in process.yml:

          PLAN STRUCTURE CHECKLIST:
          - Can plan_name, worktree, branch be validated? (via plan-structure-requirements.yml)

          INPUTS CHECKLIST:
          - Can file references be validated? (via structural-patterns.yml patterns)

          SUCCESS CRITERIA CHECKLIST:
          - Can criteria be validated? (via success-criteria-teacher.yml)

          TASK STRUCTURE CHECKLIST:
          - Can task format be validated? (via structural-patterns.yml)

          PATTERN ALIGNMENT CHECKLIST:
          - Can Domain/Workflow/Entrypoint patterns be validated? (via agent-loops.yml)

          If any checklist item cannot be validated with reduced inputs,
          identify the missing reference.
        success_criteria:
          - "All process.yml checklist items map to an input file"
          - "No orphaned checklist items"
          - "No missing structural reference"
        agent_type: "reviewer"
        depends_on: ["T3.2", "T4.4"]

      - id: T5.2
        title: "Measure context reduction"
        description: |
          Count lines in final input set and compare to original.
        target_files:
          - verify: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
        inputs:
          - "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
          - "All files referenced by inputs.yml"
        guidance: |
          Calculate total lines in final input set:
          - inputs.yml (~20 lines)
          - structural-patterns.yml (~100-150 lines) [SHARED with planner-guidance]
          - plan-structure-requirements.yml (~40 lines)
          - agent-loops.yml (existing)
          - success-criteria-teacher.yml (existing)
          - planner-core-guidelines.yml (NEW - specialized)
          - planner-core-systems.yml (NEW - specialized)

          Compare to original:
          - Original: ~2,500 lines across 15 files
          - Target: ~500 lines across 5-7 files (70-80% reduction)

          Document actual reduction achieved.
        success_criteria:
          - "Total lines under 700"
          - "Total files under 8"
          - "At least 60% reduction from original"
        agent_type: "reviewer"
        depends_on: ["T5.1"]

    phase_success_criteria:
      - "All checklist items have supporting input"
      - "Context reduction of 60%+ achieved"
      - "No functional regression in review capability"
      - "Specialized core layers validated"

overall_success_criteria:
  - description: "Context reduction achieved"
    metric: "60% or greater reduction in total input lines"
    verification: "Compare line counts before/after"

  - description: "No functional regression"
    metric: "All process.yml checklist items can be validated"
    verification: "T5.1 completes successfully"

  - description: "Inputs are specific, not directory-level"
    metric: "All inputs.yml entries are file-level references"
    verification: "No directory patterns in inputs.yml"

  - description: "SHARED structural-patterns.yml adopted"
    metric: "Both planner-guidance and planner-reviewer reference same file"
    verification: "T1.3 and T1.4 complete successfully"

  - description: "Specialized core layers created"
    metric: "All planner agents use planner-core-guidelines.yml and planner-core-systems.yml"
    verification: "T4.4 completes successfully"

implementation_notes:
  approach: |
    This plan follows the principle of "condense before remove" - creating
    focused alternatives before eliminating verbose originals ensures no
    information is lost in the transition.

  r1_alignment: |
    REVIEWER FINDING R1 ADDRESSED: T1.1 now creates SHARED structural-patterns.yml
    instead of reviewer-specific plan-structure-reference.yml. T1.4 added to ensure
    planner-guidance also references this shared file.

  core_layer_specialization: |
    PHASE 4 added for T4 cross-cutting requirement: Audit all planner agents to
    discover actual core file usage, create specialized planner-core-guidelines.yml
    and planner-core-systems.yml, then update all planner agents to use these
    specialized layers instead of generic core files.

  risk_mitigation: |
    Phase 5 validation ensures changes don't break reviewer functionality.
    If validation fails, rollback to previous inputs.yml is straightforward.

  future_considerations: |
    The SHARED structural-patterns.yml created here is used by both planner-guidance
    (for teaching) and planner-reviewer (for validation). This single source of
    truth prevents drift between what is taught and what is validated.

    The specialized core layer pattern (planner-core-*) can be replicated for
    other agent families (builder-core-*, tester-core-*, etc.) to achieve
    similar context reductions.
