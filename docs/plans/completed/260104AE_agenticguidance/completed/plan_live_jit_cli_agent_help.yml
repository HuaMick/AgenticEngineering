# Plan: JIT CLI Agent-Specific Help Commands
# Plan ID: 260104AE_agenticguidance
# Created: 2026-01-23
# Agent: planner-guidance
# Type: BUILD + TEACH
#
# PURPOSE:
# Implement agent-specific help commands in AgenticCLI so agents can discover
# their entire context from a single CLI command instead of reading files.
#
# PROBLEM:
# Current bootstrap files (.claude/agents/*.md) have ~50 lines of instruction.
# Agents ignore these instructions and default to file exploration (Glob/Grep/Read).
# This causes context bloat and exploration drift (FP-002).
#
# SOLUTION:
# 1. Minimal bootstrap with ONLY the agent-specific help command
# 2. Agent discovers everything from CLI output - no other option
# 3. Pattern: `agentic --<agent-name> --help`

