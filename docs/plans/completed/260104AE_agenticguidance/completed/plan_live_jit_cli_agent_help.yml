# ========================================
# CONTEXT
# ========================================
context: |
  OBSERVATION: 0 out of 26 agents used JIT CLI commands despite:
  - Full CLI implementation (agentic context bootstrap, plan task current)
  - JIT CLI steps added to all process.yml files
  - Thin-client bootstrap files referencing CLI commands

  ROOT CAUSE ANALYSIS:
  - Bootstrap files still have too much text (~50 lines)
  - Agents scan bootstrap, see options, and default to familiar file exploration
  - Instructions compete with agent's inherent preference for Glob/Grep/Read

  SOLUTION: Remove all options. Make CLI the ONLY path forward.
  - Bootstrap file: ONLY contains `agentic --<agent-name> --help`
  - CLI help output: Provides EVERYTHING the agent needs
  - Agent cannot explore files because no file paths are given

  EXPECTED OUTCOME:
  - 100% CLI usage for agent initialization
  - Zero file exploration before CLI bootstrap
  - Structured context delivery instead of raw file reads

