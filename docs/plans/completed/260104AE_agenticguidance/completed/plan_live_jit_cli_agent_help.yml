# SUCCESS CRITERIA
# ========================================
success_criteria:
  phase_1:
    - "Agent flags implemented for all 26 agents"
    - "`agentic --<agent-name>` shows agent-specific help"
    - "Help output includes: role, process steps, inputs, current task, next commands"
    - "JSON output available with -j flag"
    - "All unit tests pass"
    - "Response time < 500ms"

  phase_2:
    - "All 26 bootstrap files updated to minimal format"
    - "Each file is <= 8 lines"
    - "No exploration-related text in any file"
    - "All files contain the CLI command pattern"

  phase_3:
    - "Spawned agents use CLI as first action"
    - "No file exploration before CLI call"
    - "Agents successfully extract context from CLI output"
    - "Friction analysis updated with results"

# ========================================
# EXPECTED OUTCOMES
# ========================================
expected_outcomes:
  - outcome: "100% CLI usage for agent initialization"
    metric: "All spawned agents run CLI command first"
    baseline: "0% (current friction analysis)"

  - outcome: "Zero file exploration before context acquisition"
    metric: "No Glob/Grep/Read calls before CLI"
    baseline: "~15 exploration calls per agent (current)"

  - outcome: "Elimination of FP-002 (exploration drift)"
    metric: "Friction pattern not observed in post-implementation traces"

  - outcome: "Faster agent bootstrap"
    metric: "Agent context acquisition < 1 second"
    baseline: "~5-10 seconds with file exploration"

  - outcome: "Consistent agent behavior"
    metric: "All 26 agents follow identical bootstrap protocol"

# ========================================
# LOOPS
# ========================================
loops:
  test-fix-loop:
    description: |
      Loop for fixing test failures in CLI implementation.
      Run tests -> analyze failures -> fix code -> repeat.
    trigger: "Test failure"
    max_iterations: 5
    exit_condition: "All tests pass"

  guidance-test-loop:
    description: |
      Loop for validating agent behavior with minimal bootstrap.
      Spawn agent -> observe behavior -> adjust if needed -> repeat.
    trigger: "Agent uses file exploration before CLI"
    max_iterations: 3
    exit_condition: "Agent uses CLI first"

# ========================================
# NOTES
# ========================================
notes: |
  KEY INSIGHT:
  The previous approach (adding JIT CLI instructions to process.yml) failed because
  agents had OPTIONS. They could read the instructions OR explore files.
  Agents consistently chose file exploration.

  NEW APPROACH:
  Remove all options. The bootstrap file contains ONLY one command.
  The agent has no file paths to explore, no alternative instructions to follow.
  The CLI command is the ONLY path forward.

  IMPLEMENTATION ORDER:
  1. Build CLI commands first (Phase 1)
  2. Update bootstrap files only AFTER CLI is working (Phase 2)
  3. Validate with real agent spawns (Phase 3)

  DO NOT update bootstrap files until CLI is fully functional.
  Broken bootstrap files with non-working CLI commands would be worse
  than the current verbose bootstrap files.

estimated_effort: "4-6 hours"
