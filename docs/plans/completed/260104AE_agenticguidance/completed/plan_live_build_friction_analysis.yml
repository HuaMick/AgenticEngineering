            reason: "Source of REC-002 recommendation"

        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml"

        guidance: |
          Add the worktree-and-branching.yml guideline to orchestration-build inputs.

          This addresses REC-002 from the friction analysis audit:
          - FP-003-001: Missing Context - Agents performing builds may not have
            branching guidance in their context
          - Root cause: orchestration-build inputs.yml does not include the guideline

          Note: The inputs.yml already has a commented reminder about worktree policy
          at lines 82-86 and includes the guideline at line 87-92. However, the key_rules
          section should be strengthened to ensure agents understand the distinction
          between plan files (main worktree) and code changes (feature worktrees).

          If the guideline is already referenced, verify:
          1. The key_rules clearly state code goes in feature worktrees
          2. The CRITICAL distinction is explicit
          3. Reference to staging-first merge is present

          If not already present, add:
          ```yaml
          - location: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
            description: "Worktree + branching policy including code development workflow"
            key_rules:
              - "Main-First Planning: Plan FILES go in main worktree for visibility"
              - "Staging-first merge: CODE changes go in feature worktrees, merge via staging"
              - "CRITICAL: Main-First applies to plan files only, NOT code implementation"
          ```

        success_criteria:
          - "worktree-and-branching.yml is referenced in inputs"
          - "Key rules explicitly distinguish plan files from code changes"
          - "Staging-first merge workflow is referenced"
          - "Build agents will have branching context during execution"

