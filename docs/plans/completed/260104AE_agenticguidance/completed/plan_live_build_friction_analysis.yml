phases:

  # ===========================================================================
  # Phase 1: Create Friction Patterns Definition File
  # ===========================================================================
  - phase_id: "build_01"
    name: "Create Friction Patterns Definition"
    description: |
      Create a standalone friction-patterns.yml definition file in the assets
      directory. This enables reuse across agents and provides a single source
      of truth for friction pattern definitions.
    status: "completed"
    estimated_effort: "medium"

    tasks:
      # -----------------------------------------------------------------------
      # Task 1.1: Create friction-patterns.yml
      # -----------------------------------------------------------------------
      - task_id: "build_01_001"
        description: "Create friction-patterns.yml definition file"
        status: "completed"
        completed_at: "2026-01-23"

        inputs:
          - path: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
            reason: "Contains existing friction pattern definitions to extract"
          - path: "modules/AgenticGuidance/assets/definitions/friction.yml"
            reason: "Existing friction definition for consistency"
          - path: "modules/AgenticGuidance/assets/definitions/definition.yml"
            reason: "Schema for definition files"

        target_files:
          - "modules/AgenticGuidance/assets/definitions/friction-patterns.yml"

        guidance: |
          Create a new definition file for friction patterns. The file should:

          1. Follow the standard definition file schema
          2. Define all 6 friction patterns (FP-001 through FP-006)
          3. Include detection_signals for each pattern
          4. Include default_resolution type for each pattern
          5. Include resolution_hint for each pattern
          6. Define resolution_types (GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE)
          7. Define severity_classification rules

          Structure:
          ```yaml
          definition:
            name: friction-patterns
            version: "1.0"
            description: |
              Friction patterns detected during agent execution trace analysis.
              These patterns indicate guidance gaps or automation opportunities.

          patterns:
            - id: FP-001
              name: "Excessive Retries"
              description: "Agent retries same operation multiple times"
              detection_signals:
                - "Multiple consecutive runs with same name pattern"
                - "Error -> Retry -> Error -> Retry sequences"
              default_resolution: GUIDANCE_UPDATE
              resolution_hint: "Add clearer error handling guidance or retry limits"

            # ... (continue for FP-002 through FP-006)

          resolution_types:
            - type: GUIDANCE_UPDATE
              description: "Update process files, add signposts, clarify fences"
              target_locations:
                - "modules/AgenticGuidance/agents/*/process.yml"
                - "modules/AgenticGuidance/agents/*/inputs.yml"
                - "modules/AgenticGuidance/assets/guidelines/"
            # ... (continue for CLI_OFFLOAD, ASSET_UPDATE)

          severity_classification:
            high:
              criteria:
                - "Pattern occurs in >50% of analyzed sessions"
                - "Pattern causes visible user impact"
              action: "Prioritize for immediate resolution"
            # ... (continue for medium, low)
          ```

        success_criteria:
          - "Definition file created at assets/definitions/friction-patterns.yml"
          - "All 6 friction patterns defined with complete metadata"
          - "Resolution types documented with target locations"
          - "Severity classification rules defined"
          - "File follows existing definition schema conventions"

