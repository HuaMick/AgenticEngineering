            reason: "File to be updated"
          - path: "modules/AgenticGuidance/assets/definitions/friction-patterns.yml"
            reason: "New definition file to reference"

        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"

        guidance: |
          Modify inputs.yml to reference the definition file:

          1. Add reference to friction-patterns.yml at the top of the file
          2. Remove inline friction_patterns section (now in definition file)
          3. Remove inline resolution_types section (now in definition file)
          4. Remove inline severity_classification section (now in definition file)
          5. Keep session_analysis configuration (specific to this agent)
          6. Keep required_inputs section (specific to this agent)
          7. Keep dependencies section (specific to this agent)
          8. Keep output_format section (specific to this agent)

