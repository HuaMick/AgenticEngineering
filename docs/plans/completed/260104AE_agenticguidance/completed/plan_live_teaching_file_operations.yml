  agent_routing:
    Teaching_File_Operations: "teacher-update-guidance"
    Validation_File_Operations: "test-guidance-simulator"
  execution_notes: |
    This teaching phase MUST complete before batch remediation Phase 1-2.

    Execution order:
    1. teach_001 (reference-management) - foundational, no dependencies
    2. teach_002 (file-consolidation) - depends on teach_001
    3. teach_003 (file-reclassification) - depends on teach_001
    4. teach_004 (content-evaluation) - no dependencies, can run parallel with 002/003
