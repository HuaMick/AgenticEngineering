#   User explicitly requested: "REMOVE ALL phantom references entirely"
# - T4 MANDATORY: Phase 8 added for Specialized Core Layer Audit
#   Creates planner-core-guidelines.yml and planner-core-system.yml

plan_name: "Planner-Guidance Context Overload Remediation"
objective: |
  Remediate 66 context overload issues identified in planner-guidance audit.
  Target: Reduce context usage from 35-40% to under 25% while improving clarity.
  Additional T4 objective: Create specialized core layers for planner agents.

status: "pending"
total_issues: 66
total_phases: 8
total_tasks: 32

# =============================================================================
# QUESTIONS FOR USER
# =============================================================================
# These design decisions require user input before implementation proceeds.
# Each question has implications for multiple remediation tasks.
# =============================================================================

questions_for_user:
  - id: Q1
    category: "Phantom Files"
    question: "How should phantom file references be handled?"
    status: "RESOLVED"
    resolution: "User explicitly requested: REMOVE ALL phantom references entirely"
    context: |
      5 PHANTOM_FILE issues found. Referenced files that don't exist:
      - outputs.yml (referenced extensively, never created)
      - definitions.yml (referenced in ARCHITECTURE.md)
      - context-offloading.yml (guideline referenced but missing)
      - follow-the-expected-path.yml (guideline referenced but missing)
      - assets/processes/ directory (referenced but doesn't exist)
    decision: |
      USER DECISION: Remove ALL phantom references entirely.
      DO NOT create placeholder files for any phantom references.
      Clean removal is preferred over creating stubs.
    affects_tasks:
      - "3.1"
      - "3.2"
      - "3.3"
      - "3.4"
      - "3.5"

  - id: Q2
    category: "Inputs Format Standardization"
    question: "Which inputs.yml format should be canonical?"
    context: |
      Multiple structural inconsistencies found:
      - Flat list vs structured layers: format
      - agent_context at root vs nested under inputs:
      - Some have PATH RESOLUTION SEMANTICS header, some don't
      - Some have required_inputs section, most don't (only 4 of 14)
    options:
      - option: "Adopt planner-guidance format (structured layers + core_inputs)"
        pros: "Most comprehensive, supports transitive loading"
        cons: "Requires updating 10+ files"
      - option: "Simplify to flat list everywhere"
        pros: "Less complexity, easier to maintain"
        cons: "Loses layer abstraction benefits"
      - option: "Document both as valid patterns"
        pros: "No migration needed"
        cons: "Ongoing inconsistency"
    recommendation: "Adopt structured format with layers: for shared inputs, core_inputs: for agent-specific. Add required_inputs: to all files that need runtime inputs."
    affects_tasks:
      - "5.1"
      - "5.2"
      - "5.3"

  - id: Q3
    category: "Definition/Guideline Consolidation"
    question: "Should overlapping definition/guideline pairs be consolidated?"
    context: |
      11 OVERLAP issues where same concept appears in both definitions/ and guidelines/:
      - context-minimisation.yml (definition) + context-minimisation.yml (guideline)
      - reward-hacking.yml (definition) + reward-hacking-prevention.yml (guideline)
      - iteration-approach.yml + iteration.yml + agent-loops.yml (3 files!)
      - success-criteria.yml + success-criteria-teacher.yml + outcome-verification.yml
      - fix-the-source.yml (guideline) + root-cause-analysis.yml (definition)
    options:
      - option: "Keep split (definitions describe, guidelines prescribe)"
        pros: "Clear semantic distinction"
        cons: "Content still overlaps, context waste"
      - option: "Merge into single files per concept"
        pros: "Single source of truth, less context"
        cons: "Blurs definition/guideline boundary"
      - option: "Keep definition canonical, guideline references it"
        pros: "DRY principle, clear hierarchy"
        cons: "Requires updating guideline format"
    recommendation: "Option 3 - Keep definitions as canonical concept source; guidelines should reference definitions and add only prescriptive content"
    affects_tasks:
      - "2.1"
      - "2.2"
      - "2.3"
      - "2.4"

  - id: Q4
    category: "Layer Relevance"
    question: "Should planner-guidance drop test-shared and cleaner-shared layers?"
    context: |
      2 UNUSED issues: test-shared brings 6 definitions, cleaner-shared brings 7 files
      that are not relevant for guidance planning. Combined ~380+ lines of context waste.
    options:
      - option: "Remove both layers from planner-guidance inputs"
        pros: "Significant context reduction (~15%)"
        cons: "If future guidance work targets test/cleaner agents, would need to re-add"
      - option: "Keep layers, mark as optional"
        pros: "Available when needed"
        cons: "Still loaded by default, context waste"
      - option: "Create minimal planner-guidance-layer with just needed refs"
        pros: "Precise context control"
        cons: "Another layer to maintain"
    recommendation: "Remove both layers. If planner-guidance needs test/cleaner context for specific work, the orchestrator should pass it as required_inputs at runtime."
    affects_tasks:
      - "1.1"
      - "1.2"

