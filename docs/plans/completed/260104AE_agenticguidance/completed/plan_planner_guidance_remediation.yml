          - "All inputs.yml files have agent_context at root level"
          - "Consistent structure across all agent types"

      - id: "5.4"
        description: "Add loop_context to build agents"
        operation: "UPDATE"
        category: "STRUCTURAL_INCONSISTENCY"
        files:
          - "agents/build/build-python/process.yml"
          - "agents/build/build-flutter/process.yml"
        current_state: "Build agents lack loop_context despite participating in test-fix-loop"
        required_changes:
          - "Add loop_context section to both build agent process.yml files"
          - "Reference test-fix-loop from agent-loops.yml"
          - "Document max_iterations and participation pattern"
        acceptance_criteria:
          - "Both build agents have loop_context in process.yml"
          - "Consistent with planner-guidance/planner-reviewer pattern"

  # ---------------------------------------------------------------------------
  # PHASE 6: Documentation Alignment
  # ---------------------------------------------------------------------------
  # Impact: Accuracy, reduced confusion
  # Risk: Low
  # Dependencies: Phases 1-5
  # ---------------------------------------------------------------------------

  - name: "phase-6-documentation-alignment"
    description: "Align ARCHITECTURE.md with actual implementation"
    priority: 6
    estimated_context_reduction: "~5% (if ARCHITECTURE.md trimmed)"
    risk_level: "low"
    dependencies:
      - "phase-5-standardize-structure"

    agent_guidance:
      primary_agent: "teacher-update-guidance"
      selection_rationale: "Documentation updates"

    success_criteria:
      - "ARCHITECTURE.md reflects actual agent structure"
      - "No phantom file references"
      - "Agent counts match reality"

    tasks:
      - id: "6.1"
        description: "Update ARCHITECTURE.md agent counts"
        operation: "UPDATE"
        category: "DOCUMENTATION_DRIFT"
        files:
          - "docs/ARCHITECTURE.md"
        current_state: |
          Layer files claim agent counts (27, 22, 10, 8, 6, 8) that don't match
          actual ~15 migrated agents.
        required_changes:
          - "Audit actual agent count in agents/ directory"
          - "Update ARCHITECTURE.md to reflect actual counts"
          - "Update layer file descriptions if they mention counts"
        acceptance_criteria:
          - "Agent counts match actual agents/ directory structure"
          - "No overstated agent counts"

      - id: "6.2"
        description: "Remove ARCHITECTURE.md duplication with agent-categories.yml"
        operation: "UPDATE"
        category: "REDUNDANCY"
        files:
          - "docs/ARCHITECTURE.md"
        current_state: "ARCHITECTURE.md Agent Categories section duplicates agent-categories.yml"
        required_changes:
          - "Remove duplicate agent category content from ARCHITECTURE.md"
          - "Replace with reference to assets/definitions/agent-categories.yml"
          - "Keep high-level overview, remove detailed agent lists"
        acceptance_criteria:
          - "ARCHITECTURE.md references agent-categories.yml instead of duplicating"
          - "File reduced by 50+ lines"

      - id: "6.3"
        description: "Fix version inconsistencies"
        operation: "UPDATE"
        category: "VERSION_INCONSISTENCY"
        files:
          - "agents/*/inputs.yml (multiple)"
          - "agents/*/manifest.yml (multiple)"
        current_state: |
          Six different version formats: 1.0, 1.0-pilot, 2.0, 2.0-pilot, 2.0-p1
          No standardized scheme documented.
        required_changes:
          - "Document version scheme in inputs-format.yml (from task 5.1)"
          - "Standardize versions: use semantic versioning without pilot suffixes"
          - "Or document pilot suffix meaning and graduation criteria"
        acceptance_criteria:
          - "Consistent version format across all agent files"
          - "Version scheme documented"

  # ---------------------------------------------------------------------------
  # PHASE 7: Verification and Validation
  # ---------------------------------------------------------------------------
  # Impact: Ensure all changes are correct
  # Risk: N/A (verification only)
  # Dependencies: All previous phases
  # ---------------------------------------------------------------------------

  - name: "phase-7-verification"
    description: "Verify all remediation changes are correct and complete"
    priority: 7
    estimated_context_reduction: "Validation phase"
    risk_level: "none"
    dependencies:
      - "phase-6-documentation-alignment"

    agent_guidance:
      primary_agent: "test-final-output"
      selection_rationale: "Validation and verification of all changes"

    success_criteria:
      - "Zero broken file references"
      - "All consolidated files exist and are well-formed"
      - "Context usage reduced to target range"
      - "No regressions in existing functionality"

    tasks:
      - id: "7.1"
        description: "Validate all file references resolve"
        operation: "AUDIT"
        files:
          - "agents/planner/planner-guidance/inputs.yml"
          - "agents/planner/planner-guidance/process.yml"
        current_state: "Post-remediation state"
        required_changes:
          - "Run reference validation on planner-guidance inputs"
          - "Verify all paths resolve to existing files"
          - "Verify all layer references are valid"
        acceptance_criteria:
          - "Zero broken references"
          - "All required files exist"

      - id: "7.2"
        description: "Measure final context usage"
        operation: "AUDIT"
        files:
          - "agents/planner/planner-guidance/inputs.yml"
        current_state: "Pre-remediation: 35-40% context usage"
        required_changes:
          - "Calculate total lines/tokens loaded by planner-guidance inputs"
          - "Compare to pre-remediation baseline"
          - "Document reduction percentage"
        acceptance_criteria:
          - "Context usage under 25%"
          - "Reduction of at least 10 percentage points documented"

      - id: "7.3"
        description: "Run planner-guidance with sample task"
        operation: "TEST"
        files:
          - "agents/planner/planner-guidance/"
        current_state: "Post-remediation"
        required_changes:
          - "Execute planner-guidance on a sample friction analysis"
          - "Verify it produces valid guidance plan"
          - "Check for any missing context errors"
        acceptance_criteria:
          - "Agent completes without missing context errors"
          - "Output plan is well-formed"
          - "No regressions from baseline capability"

  # ---------------------------------------------------------------------------
  # PHASE 8: Specialized Core Layer Audit (T4 MANDATORY)
  # ---------------------------------------------------------------------------
  # Impact: Significant context reduction via specialized core layers
  # Risk: Medium - creates new specialized layer files
  # Dependencies: Phase 7 (verification complete before restructuring)
  # MANDATORY: This phase addresses T4 cross-cutting requirement
  # ---------------------------------------------------------------------------

  - name: "phase-8-specialized-core-layer"
    description: "Audit and create specialized core layers for planner-guidance agent"
    priority: 8
    estimated_context_reduction: "15-25% (specialized vs generic core layers)"
    risk_level: "medium"
    dependencies:
      - "phase-7-verification"

    agent_guidance:
      primary_agent: "teacher-update-guidance"
      secondary_agent: "teacher-update-assets"
      selection_rationale: "Creating specialized layer files and updating agent inputs"

    success_criteria:
      - "Audit complete: know exactly which core definitions/guidelines planner-guidance uses"
      - "planner-core-guidelines.yml created with only needed guidelines"
      - "planner-core-system.yml created with only needed system definitions"
      - "planner-guidance inputs.yml updated to use specialized layers"
      - "Context reduction measured and documented"

    tasks:
      - id: "8.1"
        description: "Audit planner-guidance core file usage"
        operation: "AUDIT"
        category: "CONTEXT_OPTIMIZATION"
        files:
          - "agents/planner/planner-guidance/process.yml"
          - "agents/planner/planner-guidance/inputs.yml"
          - "assets/inputs/core-guidelines.yml"
          - "assets/inputs/core-systems.yml"
        current_state: |
          planner-guidance loads generic core-guidelines.yml and core-systems.yml
          which contain definitions/guidelines for ALL agents, not just planners.
          Unknown which files are actually referenced/used by planner-guidance.
        required_changes:
          - "Trace all file references in planner-guidance process.yml"
          - "Identify which core-guidelines files are actually used"
          - "Identify which core-systems files are actually used"
          - "Document unused files that add unnecessary context"
          - "Create audit report of used vs unused core files"
        acceptance_criteria:
          - "Complete list of core files actually used by planner-guidance"
          - "Complete list of core files NOT used (context waste)"
          - "Documented rationale for each inclusion/exclusion"

      - id: "8.2"
        description: "Create planner-core-guidelines.yml"
        operation: "CREATE"
        category: "CONTEXT_OPTIMIZATION"
        files:
          - "assets/inputs/planner-core-guidelines.yml"
        current_state: "File does not exist; planner-guidance uses generic core-guidelines.yml"
        required_changes:
          - "Create planner-core-guidelines.yml in assets/inputs/"
          - "Include ONLY guidelines identified in audit (task 8.1)"
          - "Add header documenting this is planner-specific subset"
          - "Include PATH RESOLUTION SEMANTICS header"
          - "Reference only planner-relevant guidelines"
        acceptance_criteria:
          - "File exists at assets/inputs/planner-core-guidelines.yml"
          - "Contains subset of guidelines relevant to planner agents"
          - "Smaller than generic core-guidelines.yml"
          - "All references resolve to existing files"

      - id: "8.3"
        description: "Create planner-core-system.yml"
        operation: "CREATE"
        category: "CONTEXT_OPTIMIZATION"
        files:
          - "assets/inputs/planner-core-system.yml"
        current_state: "File does not exist; planner-guidance uses generic core-systems.yml"
        required_changes:
          - "Create planner-core-system.yml in assets/inputs/"
          - "Include ONLY system definitions identified in audit (task 8.1)"
          - "Add header documenting this is planner-specific subset"
          - "Include PATH RESOLUTION SEMANTICS header"
          - "Reference only planner-relevant system definitions"
        acceptance_criteria:
          - "File exists at assets/inputs/planner-core-system.yml"
          - "Contains subset of system definitions relevant to planner agents"
          - "Smaller than generic core-systems.yml"
          - "All references resolve to existing files"

      - id: "8.4"
        description: "Update planner-guidance to use specialized layers"
        operation: "UPDATE"
        category: "CONTEXT_OPTIMIZATION"
        files:
          - "agents/planner/planner-guidance/inputs.yml"
        current_state: |
          inputs.yml references generic core-guidelines.yml and core-systems.yml
          which load context for all agents, not just planners.
        required_changes:
          - "Replace core-guidelines.yml reference with planner-core-guidelines.yml"
          - "Replace core-systems.yml reference with planner-core-system.yml"
          - "Verify all transitive references still resolve"
          - "Add comment explaining specialized layer usage"
        acceptance_criteria:
          - "planner-guidance inputs.yml uses planner-core-guidelines.yml"
          - "planner-guidance inputs.yml uses planner-core-system.yml"
          - "No broken references after update"
          - "Context reduction documented"

      - id: "8.5"
        description: "Verify specialized core layer effectiveness"
        operation: "AUDIT"
        category: "CONTEXT_OPTIMIZATION"
        files:
          - "agents/planner/planner-guidance/inputs.yml"
        current_state: "Post-specialization state"
        required_changes:
          - "Measure context size before and after specialization"
          - "Run planner-guidance with specialized layers"
          - "Verify no missing context errors"
          - "Document context savings achieved"
        acceptance_criteria:
          - "Context reduction of at least 15% from specialized layers"
          - "Agent functions correctly with specialized layers"
          - "No missing references or functionality regressions"
          - "Savings documented for future reference"

# =============================================================================
# CROSS-CUTTING CONCERNS
# =============================================================================
# Issues that affect multiple files and should be considered throughout all phases

cross_cutting_concerns:
  - concern: "Reference updates cascade"
    description: |
      When consolidating files (phase 2), all references must be updated.
      Use grep to find all references before deleting any file.
    affected_phases: [2, 3, 4, 8]
    mitigation: "Create redirect comments in deleted files pointing to new location"

  - concern: "Spelling consistency (British vs American)"
    description: |
      Files use both 'minimisation' and 'minimization' spellings.
      Pick one and apply consistently.
    affected_phases: [2, 4]
    mitigation: "Use British spelling (minimisation) as current convention"

  - concern: "Layer loading order"
    description: |
      When removing layers (phase 1), ensure no transitive dependencies break.
      test-shared and cleaner-shared may have definitions used elsewhere.
      Phase 8 specialized layers must maintain all required transitive dependencies.
    affected_phases: [1, 8]
    mitigation: "Verify definitions are not cross-referenced before removing layers"

  - concern: "Empty section handling"
    description: |
      Multiple files have empty arrays (guidelines: [], outputs: [], participates_in: []).
      Decide: remove empty sections or document as intentional placeholders.
    affected_phases: [5, 6]
    mitigation: "Remove truly empty sections; keep with comment if placeholder for future"

  - concern: "Specialized core layer maintenance (T4)"
    description: |
      Phase 8 creates planner-specific core layers (planner-core-guidelines.yml,
      planner-core-system.yml). These must be maintained when core files change.
      Other planner agents may benefit from same specialized layers.
    affected_phases: [8]
    mitigation: "Document layer relationships; consider extending to other planner agents"

# =============================================================================
# EXECUTION GUIDANCE
# =============================================================================

execution_guidance:
  recommended_order: |
    1. Q1 RESOLVED: Remove all phantom references (user decision)
    2. Get user answers to Q2-Q4 before starting remaining work
    3. Execute Phase 1 (quick wins) - low risk, high impact
    4. Execute Phase 2 (consolidation) - uses patterns from Phase 1
    5. Execute Phase 3 (phantom removal) - remove all phantom refs per Q1 decision
    6. Execute Phase 4 (stale cleanup) - depends on Phases 2-3 changes
    7. Execute Phase 5 (standardization) - depends on Q2 answers
    8. Execute Phase 6 (documentation) - depends on all previous
    9. Execute Phase 7 (verification) - validates phases 1-6
    10. Execute Phase 8 (specialized core layers) - T4 MANDATORY after verification

  parallel_opportunities:
    - "Tasks 1.1 and 1.2 can run in parallel"
    - "Tasks 1.3, 1.4, 1.5 can run in parallel (independent files)"
    - "Tasks 3.1 and 3.2 can run in parallel"
    - "Tasks 3.3, 3.4, 3.5 can run in parallel"
    - "Tasks 4.1, 4.2, 4.5 can run in parallel"
    - "Tasks 8.2 and 8.3 can run in parallel (after 8.1 completes)"

  iteration_expectation: |
    Given the scope (66 issues, 8 phases, 32 tasks), expect:
    - 3-4 planner-guidance iterations for plan refinement
    - Multiple teacher agent executions per phase
    - Verification phase may surface issues requiring phase revisits
    - Phase 8 may require iteration if core layer audit reveals unexpected dependencies

notes:
  - "This plan addresses all 66 issues identified in audit_planner_guidance.yml"
  - "Phases are sequenced to minimize risk and maximize early impact"
  - "Q1 RESOLVED: User explicitly requested removal of ALL phantom references"
  - "Questions Q2-Q4 require user input before certain tasks can proceed"
  - "Context reduction targets are estimates based on file sizes"
  - "Verification phase ensures no regressions before completion"
  - "Phase 8 (T4 MANDATORY) adds specialized core layers for further context reduction"
