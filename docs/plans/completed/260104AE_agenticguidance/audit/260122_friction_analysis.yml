# =============================================================================
# FRICTION PATTERNS DETECTED
# =============================================================================

friction_patterns_detected:

  # --------------------------------------------------------------------------
  # FP-005: Convention Violation - CRITICAL
  # --------------------------------------------------------------------------
  - pattern_id: "FP-005-001"
    pattern_type: "convention_violation"
    severity: "critical"
    description: |
      Large CLI feature implementation committed directly to main branch (ef7d90a)
      instead of using a feature branch with proper merge flow.
    affected_sessions:
      - "ef7d90a"
    evidence:
      - observation: |
          Commit ef7d90a added 3,407 lines across 25 CLI files directly on main:
          - New task_workflow.py module (161 lines)
          - New preset templates (4 files, 163+ lines)
          - New experiment tests (542+ lines)
          - Extended cli.py (234 line diff)
          - Extended plan.py (367 line diff)
          - Extended langsmith.py (367 line diff)
        source: "git show ef7d90a --stat"
      - observation: |
          Main-First Planning guidance (worktree-and-branching.yml rule) states:
          "Plans must be created and maintained in the main worktree" but does not
          address where CODE implementation should happen. The guidance is clear
          about plan visibility but ambiguous about code commits.
        source: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
    root_cause: |
      GUIDANCE GAP: The Main-First Planning policy addresses where PLANS go but
      doesn't explicitly state where CODE commits should go. An agent interpreting
      "main-first" literally might conclude that all work should be on main.

      The staging-first merge strategy rule exists but may not be salient during
      rapid implementation sessions.
    resolution_recommendation:
      priority: "high"
      action: "Clarify Main-First Planning vs code commit workflow"
      guidance_updates:
        - file: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
          change: |
            Add explicit rule distinguishing Main-First PLANNING from feature branch
            CODE development:

            - rule: "Feature branch code development"
              description: |
                Code changes should be developed on feature branches (not main).
                Main-First Planning means plans are VISIBLE in main, not that
                code is committed there.
              workflow:
                1. Create plan in main worktree (Main-First Planning)
                2. Create feature worktree/branch for code
                3. Implement code in feature branch
                4. Merge feature branch to staging (staging-first merge)
                5. Merge staging to main

  # --------------------------------------------------------------------------
  # FP-005: Convention Violation - HIGH
  # --------------------------------------------------------------------------
  - pattern_id: "FP-005-002"
    pattern_type: "convention_violation"
    severity: "high"
    description: |
      Multiple large commits directly on main after Main-First Planning was
      implemented, suggesting the policy is being misinterpreted or ignored.
    affected_sessions:
      - "ef7d90a"
      - "5f4cb6d"
      - "c2feb83"
      - "f585890"
    evidence:
      - observation: |
          Since 2026-01-19, at least 4 non-merge commits have been made directly
          to main branch with significant changes to code and documentation.
        source: "git log --oneline --first-parent main -15"
      - observation: |
          Feature branches exist (agentic-cli, agenticlangsmith, agenticguidance)
          but their usage is inconsistent - some work goes through them, some
          goes directly to main.
        source: "git branch -a"
    root_cause: |
      ENFORCEMENT GAP: No pre-commit hook or validation prevents direct commits
      to main. The staging-first merge strategy is documented but not enforced.

  # --------------------------------------------------------------------------
  # FP-003: Missing Context - MEDIUM
  # --------------------------------------------------------------------------
  - pattern_id: "FP-003-001"
    pattern_type: "missing_context"
    severity: "medium"
    description: |
      Agents may not be loading the worktree-and-branching.yml guideline when
      performing CLI builds, leading to guideline-unaware commits.
    affected_sessions:
      - "ef7d90a"
    evidence:
      - observation: |
          The orchestration-build inputs.yml does not explicitly include
          worktree-and-branching.yml, meaning agents executing builds may not
          have the branching guidance in their context.
        source: "modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml"
      - observation: |
          Prior friction analysis (260119_session_friction_analysis.yml FF-001)
          documented that 21 AgenticGuidance files were modified in the wrong
          worktree, requiring a 4-phase remediation plan.
        source: "docs/plans/live/260104AE_agenticguidance/audit/260119_session_friction_analysis.yml"
    root_cause: |
      INPUT OMISSION: The orchestration-build agent doesn't load branching
      guidelines, so the agent has no context about where commits should go.

  # --------------------------------------------------------------------------
  # FP-006: Automatable Pattern - MEDIUM
  # --------------------------------------------------------------------------
  - pattern_id: "FP-006-001"
    pattern_type: "automatable_pattern"
    severity: "medium"
    description: |
      The branch/worktree creation and code commit workflow could be enforced
      via CLI tooling or pre-commit hooks rather than relying on agent memory.
    affected_sessions:
      - "ef7d90a"
      - "5f4cb6d"
    evidence:
      - observation: |
          The 'agentic plan init' command was updated to enforce Main-First
          Planning for plan folders. A similar enforcement mechanism could
          prevent commits to main outside of merge operations.
        source: "modules/AgenticCLI/src/agenticcli/commands/plan.py"
    resolution_recommendation:
      priority: "medium"
      action: "Add pre-commit hook or CLI guard for main branch commits"
      implementation_options:
        - option: "Pre-commit hook"
          description: |
            Add .claude/hooks/precommit that warns or blocks direct commits
            to main branch, suggesting merge workflow instead.
        - option: "CLI commit wrapper"
          description: |
            Add 'agentic git commit' that validates branch before allowing
            commit, with --force flag to override.

# =============================================================================
# ROOT CAUSE ANALYSIS
# =============================================================================

root_cause_analysis:
  primary_cause: "guidance_ambiguity"
  description: |
    The Main-First Planning policy was implemented to address WHERE PLANS are
    stored (always in main worktree for visibility). However, this policy was
    interpreted to mean ALL WORK happens on main, including code commits.

    The existing staging-first merge strategy rule was not salient during
    implementation, resulting in large code changes committed directly to main.

  contributing_factors:
    - factor: "Policy naming confusion"
      description: |
        'Main-First Planning' name suggests main is the primary target for all
        work, when it actually only refers to plan folder visibility.

    - factor: "Missing input in build agents"
      description: |
        orchestration-build and similar build agents don't load branching
        guidelines, so agents have no context about merge workflows.

    - factor: "No enforcement mechanism"
      description: |
        Unlike plan folder creation (which has CLI enforcement), there is no
        technical control preventing direct commits to main.

    - factor: "Feature branch overhead"
      description: |
        Creating feature branches for every change adds friction. When doing
        quick iterations, agents may take the path of least resistance (main).

  timeline_reconstruction:
    - date: "2026-01-19"
      event: "Main-First Planning guidance added to worktree-and-branching.yml"

    - date: "2026-01-19"
      event: "CLI agentic plan init updated to enforce Main-First for plans"

    - date: "2026-01-19-22"
      event: "Multiple large commits made directly to main, including CLI feature"

    - date: "2026-01-22"
      event: "3,400+ lines of CLI code committed to main in single commit"

# =============================================================================
# RECOMMENDATIONS
# =============================================================================

recommendations:

  - id: "REC-001"
    priority: "critical"
    action: "Clarify Main-First Planning scope in guidance"
    description: |
      Update worktree-and-branching.yml to explicitly state that Main-First
      Planning applies to PLAN FOLDERS only, not code commits. Code should
      still follow the staging-first merge workflow.
    target_files:
      - "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
    effort: "30 minutes"

  - id: "REC-002"
    priority: "high"
    action: "Add branching guideline to build agent inputs"
    description: |
      Include worktree-and-branching.yml in orchestration-build inputs.yml
      so agents have context about merge workflows during implementation.
    target_files:
      - "modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml"
    effort: "15 minutes"

  - id: "REC-003"
    priority: "medium"
    action: "Implement pre-commit guard for main branch"
    description: |
      Add a warning mechanism that alerts when commits are being made directly
      to main branch, reminding agents of the staging-first workflow.
    implementation_options:
      - "Claude Code pre-commit hook (.claude/hooks/precommit)"
      - "Git pre-commit hook (.git/hooks/pre-commit)"
      - "CLI wrapper command (agentic git commit)"
    effort: "1-2 hours"

  - id: "REC-004"
    priority: "low"
    action: "Rename policy for clarity"
    description: |
      Consider renaming 'Main-First Planning' to something clearer like
      'Centralized Plan Visibility' to avoid confusion with code workflow.
    rationale: |
      The current name suggests main branch primacy for all activities,
      when it only refers to plan folder location.
    effort: "30 minutes"

