            - manifest.yml user_story_validation_phase definition
            - process.yml goal section
            - assets/definitions/user-stories.yml
            The emphasis is appropriate but the path specification should be in one place.

        - category: "INCONSISTENT"
          files:
            - "assets/definitions/user-stories.yml"
            - "agents/planner/planner-cleaning/inputs.yml"
          description: |
            user-stories.yml states user stories are at "modules/AgenticGuidance/userstories/<project>/"
            inputs.yml states they are at "modules/AgenticGuidance/userstories/"
            The inputs.yml path is correct (directory exists with MyAgents/, RemoteAgents/, MyAgentsFrontend/).
            user-stories.yml should clarify this is the root directory, not a project-specific path.

