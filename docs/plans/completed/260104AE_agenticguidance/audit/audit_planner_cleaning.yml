            A planner-cleaning agent only needs plans.yml from core-system.
            Consider agent-type-aware layer filtering or splitting core-system into smaller layers.

        - category: "REDUNDANCY"
          files:
            - "agents/planner/planner-cleaning/inputs.yml"
            - "agents/planner/planner-cleaning/process.yml"
          description: |
