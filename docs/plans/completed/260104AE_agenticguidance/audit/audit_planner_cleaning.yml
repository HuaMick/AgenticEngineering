            from ARCHITECTURE.md and just referencing the matrix file.

        - category: "MISSING_CONSOLIDATION"
          files:
            - "assets/inputs/core-system.yml"
            - "assets/inputs/planner-shared.yml"
          description: |
            The layer system introduces indirection but no filtering. core-system.yml loads
