  - id: LOW-001
    file: agents/planner/planner-build/process.mmd
    location: "N/A"
    category: "Missing Asset"
    title: "No process.mmd Mermaid diagram exists"
    description: |
      Other agents often have a process.mmd file providing a visual flowchart
      of the process. This agent lacks one.
    impact: |
      Lower - primarily affects discoverability and quick understanding.
    recommendation: |
      Create a simple Mermaid flowchart showing:
      1. Input validation -> 2. Folder setup -> 3. Phase creation -> 4. Output
    evidence:
      file_check: "File does not exist. Did you mean process.yml?"

  - id: LOW-002
    file: agents/planner/planner-build/inputs.yml
    location: "lines 79-80"
    category: "Empty Section"
    title: "Guidelines section is empty array"
    description: |
      The guidelines section under inputs shows 'guidelines: []' but the process.yml
      references guideline files in comments. This inconsistency is minor but confusing.
    impact: |
      An agent may not load the referenced guidelines since they're only in comments.
    recommendation: |
      Either add explicit guideline references or remove the empty section to avoid
      implying that guidelines are loaded through inputs.yml.
    evidence:
      current: "guidelines: []"
      process_comments: "# Core guidelines: See assets/guidelines/"

  - id: LOW-003
    file: agents/planner/planner-build/inputs.yml
    location: "lines 83-88"
    category: "Comment-Only Section"
    title: "Definitions section contains only comments with no loadable references"
    description: |
      The definitions section contains helpful comments pointing to definition files
      but no actual loadable references. Only build_artifacts is defined.
    impact: |
      The agent must manually interpret comments vs structured references for
      which definitions to load.
    recommendation: |
      Convert comments to structured references:
        definitions:
          references:
            - path: "assets/definitions/agent-loops.yml"
              anchors: ["test-fix-loop", "audit-test-fix-loop"]
          inline:
            build_artifacts: |
              Build artifacts should be placed in...
    evidence:
      comment_pattern: "# Loop definitions: See assets/definitions/agent-loops.yml"

  - id: LOW-004
    file: agents/planner/planner-build/process.yml
    location: "line 47"
    category: "External Reference"
    title: "References docs/ARCHITECTURE.md without clarifying which repo"
    description: |
      Step 3 references "docs/ARCHITECTURE.md" for architecture patterns, but the
      path semantics are unclear - is this the target project's ARCHITECTURE.md
      or the AgenticGuidance module's ARCHITECTURE.md?
    impact: |
      An agent planning for a project without ARCHITECTURE.md may incorrectly
      reference AgenticGuidance's architecture file.
    recommendation: |
      Clarify: "Reference the target project's docs/ARCHITECTURE.md (if exists)
      or use default architecture patterns from this module's docs/ARCHITECTURE.md"
    evidence:
      reference: "Reference docs/ARCHITECTURE.md for Domain -> Workflow -> Entrypoint pattern"
      ambiguity: "Which project's ARCHITECTURE.md?"

# =============================================================================
# POSITIVE OBSERVATIONS
# =============================================================================
positive_observations:
  - area: "Path Resolution Semantics"
    observation: |
      The inputs.yml includes a clear PATH RESOLUTION SEMANTICS header (lines 1-10)
      explicitly documenting the dual-root pattern (module root vs target project root).
      This is excellent practice and prevents a common source of confusion.

  - area: "Required Inputs Section"
    observation: |
      The explicit required_inputs section (lines 18-36) with name, type, description,
      required flag, and example values provides excellent clarity for orchestrators.

  - area: "Layer-Based Loading"
    observation: |
      The use of layers (core-system.yml, planner-shared.yml) for transitive loading
      reduces duplication and ensures consistent context across planner agents.

  - area: "Example Plan Quality"
    observation: |
      The referenced example (plan_live_build.yml) is comprehensive with detailed
      phases, guidance, success criteria, user stories, and architecture compliance
      sections. This provides strong guidance for plan creation.

  - area: "Separation of Concerns"
    observation: |
      The clear statement that planner-build outputs ONLY to plan_live_build.yml
      while other planners handle test/audit phases demonstrates good domain separation.

