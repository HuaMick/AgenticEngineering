# =============================================================================
# CRITICAL ISSUES (Blocking - would prevent execution)
# =============================================================================
critical_issues: []
  # No critical blocking issues found

# =============================================================================
# HIGH ISSUES (Significant friction or ambiguity)
# =============================================================================
high_issues:
  - id: HIGH-001
    file: agents/planner/planner-build/inputs.yml
    location: "lines 73-76"
    category: "Path Resolution"
    title: "Pattern path uses target project root but semantics header says module root"
    description: |
      The path convention header (lines 4-10) states paths are relative to MODULE ROOT,
      with an exception that docs/plans/ paths are relative to TARGET PROJECT root.
      However, the pattern at line 74 uses 'docs/plans/live/*/live/plan_live_build.yml'
      which mixes semantics - it's a pattern that would need the target_project_path
      but is listed alongside module-relative paths.
    impact: |
      An agent loading inputs.yml may misinterpret where to look for existing plans.
      The pattern could resolve to the wrong location or fail to find files.
    recommendation: |
      1. Add a 'context: target_project' field to this pattern entry
      2. Or restructure to group target-relative patterns separately
      3. Consider using the target_project_path required input explicitly in the pattern
    evidence:
      pattern: "docs/plans/live/*/live/plan_live_build.yml"
      header_exception: "EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root"

  - id: HIGH-002
    file: agents/planner/planner-build/process.yml
    location: "lines 22-31"
    category: "Output Clarity"
    title: "No explicit output schema defined despite outputs: [] declaration"
    description: |
      The process.yml declares 'outputs: []' (line 14) but step 3 (lines 26-31) describes
      output requirements including 'live/plan_live_build.yml' structure. There is no
      schema or explicit output format specification.
    impact: |
      An agent may create plans with inconsistent structure. The example file exists
      but is not directly linked to the outputs section, creating ambiguity about
      mandatory vs optional fields in the output.
    recommendation: |
      1. Change outputs: [] to include explicit output file references:
         outputs:
           - path: "docs/plans/live/<plan_folder>/live/plan_live_build.yml"
             schema_reference: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_build.yml"
             required_fields: [worktree, liveplan, completedplan, live-plans]
      2. Add a YAML schema or JSON schema reference for plan structure validation
    evidence:
      current_outputs: "outputs: []"
      actual_output: "live/plan_live_build.yml"

  - id: HIGH-003
    file: agents/planner/planner-build/inputs.yml
    location: "lines 18-36"
    category: "Required Inputs"
    title: "Required inputs defined but no validation mechanism specified"
    description: |
      The required_inputs section properly defines three required inputs (objective,
      target_project_path, plan_folder_name) but there is no guidance on:
      1. How to validate these are present before proceeding
      2. What to do if they are missing (error vs escalate)
      3. How parent orchestrator should provide these
    impact: |
      The process.yml step 1 says "if an input cannot be found do not proceed" but
      lacks specifics on distinguishing between missing required inputs (fatal) vs
      missing optional inputs (continue).
    recommendation: |
      1. Add validation_behavior section to required_inputs:
         validation:
           on_missing: "escalate_to_orchestrator"
           error_message_template: "Required input '{name}' not provided"
      2. Reference this in process.yml step 1 for clarity
    evidence:
      step1_text: "if an input cannot be found do not proceed"
      required_inputs_count: 3

# =============================================================================
# MEDIUM ISSUES (Minor friction or inconsistencies)
# =============================================================================
medium_issues:
  - id: MED-001
    file: agents/planner/planner-build/manifest.yml
    location: "line 6"
    category: "Version Consistency"
    title: "Version mismatch between manifest (1.0) and inputs (2.0-p1)"
    description: |
      manifest.yml declares version: "1.0" while inputs.yml declares version: "2.0-p1".
      These should be consistent or have a clear versioning policy.
    impact: |
      An orchestrator checking version compatibility may get confused about which
      version applies. The 2.0-p1 suggests significant changes not reflected in manifest.
    recommendation: |
      1. Align versions across manifest.yml and inputs.yml
      2. Add versioning policy documentation to explain what each version tracks
      3. Consider using manifest.yml as source of truth for agent version
    evidence:
      manifest_version: "1.0"
      inputs_version: "2.0-p1"

  - id: MED-002
    file: agents/planner/planner-build/inputs.yml
    location: "line 38-40"
    category: "Fragment Reference Resolution"
    title: "Fragment reference syntax documented but resolution responsibility unclear"
    description: |
      The agent_context references "assets/definitions/agent-categories.yml#planner"
      using fragment syntax. While fragment-references.yml documents this syntax,
      it states "Resolution is performed by the agent reading the file, not by tooling."
      The planner-build agent has no explicit guidance on how to resolve this.
    impact: |
      The agent may not know how to use the fragment reference, potentially loading
      the entire agent-categories.yml instead of just the planner section.
    recommendation: |
      1. Add fragment resolution instructions in process.yml or a shared loading guideline
      2. Or expand the agent_context inline to avoid resolution ambiguity
    evidence:
      fragment_reference: "assets/definitions/agent-categories.yml#planner"
      resolution_note: "Resolution is performed by the agent reading the file"

  - id: MED-003
    file: agents/planner/planner-build/process.yml
    location: "lines 5-8"
    category: "Loop Context"
    title: "Loop definitions referenced but no loop execution context for planner"
    description: |
      The process.yml references agent-loops.yml but doesn't specify which loop type
      this agent participates in. The agent-loops.yml includes "planner-loop" but
      the process doesn't reference it or describe iteration behavior for planning.
    impact: |
      The agent lacks clarity on whether/how to iterate on plan quality, when to
      request reviewer feedback, or maximum iteration limits.
    recommendation: |
      1. Add loop_context section to process.yml:
         loop_context:
           type: "planner-loop"
           reference: "assets/definitions/agent-loops.yml#planner-loop"
           max_iterations: 5
           exit_condition: "Plan approved by reviewer or max iterations reached"
      2. Clarify interaction with planner-reviewer in the process
    evidence:
      loop_reference: "assets/definitions/agent-loops.yml"
      available_loop: "planner-loop"
      process_loop_context: "NOT SPECIFIED"

  - id: MED-004
    file: agents/planner/planner-build/process.yml
    location: "lines 56-65"
    category: "Guidelines Reference"
    title: "Guidelines section is mostly reviewer-focused, not build-planner focused"
    description: |
      The guidelines section (lines 56-65) focuses on "When reviewing plans (as a
      reviewer planner agent)" but this is the planner-build process, not
      planner-reviewer. The guidelines don't address build-planning scenarios.
    impact: |
      An agent following this process may be confused about whether these guidelines
      apply to it or if they were misplaced from planner-reviewer.
    recommendation: |
      1. Move reviewer guidelines to planner-reviewer/process.yml
      2. Add planner-build specific guidelines such as:
         - How to handle conflicting architecture patterns
         - When to split phases vs combine them
         - How to estimate parallelization opportunities
    evidence:
      guideline_focus: "When reviewing plans (as a reviewer planner agent)"
      expected_focus: "When creating build plans"

  - id: MED-005
    file: agents/planner/planner-build/manifest.yml
    location: "lines 23-36"
    category: "Mandatory Phase Clarity"
    title: "Mandatory CI/CD validation trigger conditions could be more explicit"
    description: |
      The mandatory_phases section lists conditions that trigger CI/CD validation
      but uses general patterns (e.g., "tests/ directory structure") without
      specifying exact detection criteria.
    impact: |
      An agent may inconsistently apply these rules - one might trigger on any
      tests/ change while another only on structural changes.
    recommendation: |
      1. Add explicit pattern matching:
         triggers:
           - pattern: "tests/**/__init__.py"
             action: "add/remove"
           - pattern: "pytest.ini"
             action: "modify"
      2. Consider a detection algorithm or reference to exploration findings
    evidence:
      current_trigger: "tests/ directory structure (add/move/remove test packages)"
      ambiguity: "What counts as 'structure' vs 'content' change?"

