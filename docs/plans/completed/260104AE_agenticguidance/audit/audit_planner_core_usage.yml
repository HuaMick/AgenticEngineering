# =============================================================================
# CORE FILES ANALYZED
# =============================================================================
core_files:
  core_guidelines:
    path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
    version: "1.0"
    rules:
      - id: "CG1"
        name: "fix-the-source.yml"
        description: "Principle of addressing root causes rather than symptoms"
      - id: "CG2"
        name: "context-minimisation.yml"
        description: "Strategies for minimizing context and maintaining focus"
      - id: "CG3"
        name: "experiment-first.yml"
        description: "Experimental validation before implementation"
      - id: "CG4"
        name: "less-is-more.yml"
        description: "Simplicity and minimalism principles"
      - id: "CG5"
        name: "worktree-and-branching.yml"
        description: "Git worktree and branching strategies"
      - id: "CG6"
        name: "testing.yml"
        description: "Core testing principles and approaches"
      - id: "CG7"
        name: "response-audit.yml"
        description: "Response quality and audit guidelines"
      - id: "CG8"
        name: "safety.yml"
        description: "Safety protocols and constraints"

  core_system:
    path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
    version: "1.0"
    systems:
      - id: "CS1"
        name: "plans.yml"
        description: "Plan structure and lifecycle definitions"
      - id: "CS2"
        name: "architecture-pattern.yml"
        description: "Consolidated architecture pattern: domains, workflows, entrypoints"
      - id: "CS3"
        name: "ARCHITECTURE.md"
        description: "Overall system architecture documentation"

# =============================================================================
# SPECIALIZED PLANNER LAYERS (T4 Optimization)
# =============================================================================
# NOTE: Planner agents use SPECIALIZED layers instead of generic core files.
# This is an intentional optimization to reduce token usage.

specialized_layers:
  planner_core_system:
    path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
    version: "1.0"
    included:
      - "CS1: plans.yml (ESSENTIAL)"
    excluded:
      - "CS2: architecture-pattern.yml (builder-specific detail)"
      - "CS3: ARCHITECTURE.md (reference documentation)"

  planner_core_guidelines:
    path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
    version: "1.0"
    included:
      - "CG1: fix-the-source.yml"
      - "CG2: context-minimisation.yml"
      - "CG3: experiment-first.yml"
      - "CG4: less-is-more.yml"
      - "CG5: worktree-and-branching.yml"
      - "CG7: response-audit.yml"
      - "plan-completion.yml (NEW - not in core-guidelines)"
    excluded:
      - "CG6: testing.yml (test-category-specific)"
      - "CG8: safety.yml (operational concerns)"

  reviewer_core_guidelines:
    path: "modules/AgenticGuidance/assets/inputs/reviewer-core-guidelines.yml"
    version: "1.1"
    included:
      - "plan-completion.yml (structure validation)"
    excluded:
      - "ALL philosophical guidelines (fix-the-source, context-minimisation, etc.)"
      - "ALL operational guidelines"
    rationale: "Reviewers validate structure, not approach"

