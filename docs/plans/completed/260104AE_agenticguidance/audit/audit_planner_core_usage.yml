unique_requirements:
  planner_guidance:
    distinguishing_feature: "Teacher-focused planning"
    unique_layers: []
    unique_inputs:
      - "path.yml, fence.yml, signpost.yml, guidance-artifacts.yml (teaching concepts)"
      - "friction.yml, root-cause-analysis.yml (friction analysis)"
      - "knowledge-encapsulation.yml (guidance quality)"
      - "agents/manifest.yml (agent discovery)"
    note: "Heaviest input set - needs full teaching vocabulary"

  planner_reviewer:
    distinguishing_feature: "Minimal philosophical guidance"
    unique_layers:
      - "reviewer-core-guidelines.yml (replaces planner-core-guidelines)"
    unique_inputs:
      - "plan-structure-requirements.yml"
      - "success-criteria-teacher.yml"
    note: "Lightest guidelines layer - validates structure, not approach"

  planner_build:
    distinguishing_feature: "Architecture awareness"
    unique_layers: []
    unique_inputs:
      - "planner-build/manifest.yml (architecture checklist)"
      - "orchestration.mmd, README.md (session artifacts)"
    note: "Implicitly needs CS2/CS3 for architecture patterns"

  planner_test:
    distinguishing_feature: "Test category knowledge"
    unique_layers:
      - "test-shared.yml (only planner with this layer)"
    unique_inputs:
      - "8 strategy-*.yml files"
      - "test-execution-workflow.yml"
      - "test-runner/process.yml, test-audit/process.yml"
    note: "Bridges planner and test categories"

  planner_cleaning:
