# Plan Review: planner-cleaning Context Overload Remediation
# Reviewed by: planner-reviewer
# Review date: 2026-01-08
# Plan file: plan_live_guidance_cleaning_remediation.yml

review:
  status: "NEEDS_CHANGES"

  summary: |
    The plan is well-structured and addresses all 11 issues from the audit correctly.
    However, several issues require attention before approval:
    1. Plan does not fully reflect user decisions (particularly C1 path handling)
    2. Phase 4 scope needs expansion per user decision C4 (apply to ALL planner agents)
    3. Phase 1 tasks 1.1 and 1.2 need revision based on user decision C1
    4. Minor dependency issue in Phase 5 regarding iteration.yml (user says KEEP per C5)

# =============================================================================
# VALIDATION AGAINST USER DECISIONS
# =============================================================================
user_decision_alignment:
  - decision_id: "C1"
    user_decision: "Paths are correct as-is (module-relative), but standardize using fully qualified paths"
    plan_alignment: "PARTIAL"
    issue: |
      The plan's Phase 1 (tasks 1.1, 1.2) treats path references as potentially STALE when
      user has confirmed paths ARE correct as-is. The tasks should be reframed:
      - Current framing: "Fix stale path references" implies paths are broken
      - Required framing: "Standardize paths to use fully qualified paths for clarity"

      Task 1.1 context states: "Issue: References docs/ARCHITECTURE.md but file is at
      modules/AgenticGuidance/docs/ARCHITECTURE.md" - but user confirmed module-relative
      paths are correct. The task should clarify this is a STANDARDIZATION, not a FIX.
    recommendation: |
      Update tasks 1.1 and 1.2:
      - Change description from "Update...path" to "Standardize...path to fully qualified form"
      - Update context to reflect user decision that paths ARE correct but should use
        fully qualified paths (e.g., modules/AgenticGuidance/docs/ARCHITECTURE.md) for
        consistency and clarity
      - Remove the NOTE in task 1.1 context that questions whether task is needed

  - decision_id: "C2"
    user_decision: "Split core-system.yml into two layers (proposed approach)"
    plan_alignment: "ALIGNED"
    notes: |
      Phase 4, task 4.1 correctly proposes splitting core-system.yml into:
      - core-plans.yml (for planners)
      - core-architecture.yml (for builders)
      - Keeping core-system.yml as umbrella layer for backwards compatibility
      This matches user's approved approach.

  - decision_id: "C3"
    user_decision: "Keep one full phase, abbreviate others for example trimming"
    plan_alignment: "ALIGNED"
    notes: |
      Phase 3, task 3.1 correctly specifies:
      - "Keep one example phase (cleanup or audit) in full detail"
      - "Show structure of second phase with abbreviated content"
      - Target of ~150 lines (max 200)
      This matches user's approved approach.

  - decision_id: "C4"
    user_decision: "YES, apply layer filtering to ALL planner agents for consistency"
    plan_alignment: "NOT_ALIGNED"
    issue: |
      Phase 4 only updates planner-cleaning inputs.yml (task 4.2).
      User explicitly decided to apply layer filtering to ALL planner agents.
      The plan must be expanded to include:
      - planner-build
      - planner-test
      - planner-guidance
      - planner-reviewer
    recommendation: |
      Add tasks 4.3, 4.4, 4.5, 4.6 to update inputs.yml for each planner agent
      to use core-plans.yml instead of core-system.yml.
      All tasks should depend on 4.1 (layer creation).

  - decision_id: "C5"
    user_decision: "KEEP iteration.yml - planners need to understand loop behavior to build loops into plans"
    plan_alignment: "PARTIAL"
    issue: |
      Phase 5, task 5.1 proposes clarifying separation between agent-loops.yml and iteration.yml.
      This is consistent with keeping iteration.yml (C5), but the task should explicitly state
      that iteration.yml is NOT to be removed or merged - only clarified.

      Additionally, the questions_for_user section still includes the question about
      whether iteration.yml should be loaded by planner agents. This question has been
      ANSWERED by C5 - it should be removed or marked as resolved.
    recommendation: |
      1. Update task 5.1 context to explicitly state iteration.yml is being KEPT per user decision
      2. Remove or mark as RESOLVED the gap_identification question about iteration.yml

# =============================================================================
# REMAINING AMBIGUITIES
# =============================================================================
remaining_ambiguities:
  - id: "AMB-1"
    description: "Path format after standardization"
    context: |
      User decision C1 says to use "fully qualified paths" but the definition is ambiguous:
      - Option A: Absolute from repo root (modules/AgenticGuidance/docs/ARCHITECTURE.md)
      - Option B: Absolute from module root (docs/ARCHITECTURE.md with documented resolution)
      The plan should clarify which format to use.
    impact: "Affects tasks 1.1, 1.2, 1.3"
    suggested_clarification: |
      Recommend using paths from MODULE root (e.g., docs/ARCHITECTURE.md) since
      inputs.yml already states "paths are relative to AgenticGuidance MODULE ROOT".
      Add explicit note in layer files that paths are module-relative.

  - id: "AMB-2"
    description: "planner-shared.yml update for C4"
    context: |
      planner-shared.yml references iteration.yml (per user decision C5, kept for planners).
      When applying layer filtering (C4) to all planner agents, need to verify
      planner-shared.yml layer composition is still appropriate.
    impact: "Affects scope of Phase 4 expansion"
    suggested_clarification: |
      Verify that planner-shared.yml references remain appropriate for all planner agents.
      May not require changes if iteration.yml is being kept (C5 confirms this).

# =============================================================================
# SUCCESS CRITERIA VALIDATION
# =============================================================================
success_criteria_review:
  quantitative:
    - metric: "Context token usage"
      baseline: "~45,000 tokens"
      target: "~27,000 tokens"
      assessment: "ACHIEVABLE"
      notes: |
        The estimated savings per phase are reasonable:
        - Phase 2: ~3500 tokens (redundancy removal)
        - Phase 3: ~6000 tokens (example trimming)
        - Phase 4: ~3000 tokens (layer filtering)
        - Phase 5: ~1000 tokens (overlap clarification)
        Total: ~13,500 tokens reduction (30% of baseline)
        This brings usage from 45K to ~31.5K, slightly above 27K target.
        Target is ambitious but achievable.

    - metric: "File count loaded"
      baseline: "19 files"
      target: "~12 files"
      assessment: "ACHIEVABLE"
      notes: |
        Removing domains.yml, workflows.yml, entrypoints.yml (-3 files)
        reduces file count significantly. Layer splitting adds 2 files
        but removes need to load them, net -3 files.

    - metric: "Redundant content"
      baseline: "3 redundancy issues"
      target: "0 redundancy issues"
      assessment: "ACHIEVABLE"
      notes: "Tasks 2.1, 2.2, 2.3 directly address all three redundancy issues."

  qualitative:
    - criteria: "Agent can still create finalization phases correctly"
      assessment: "ACHIEVABLE"
      notes: "References to plans.yml and manifest.yml preserve required guidance."

    - criteria: "All required lifecycle patterns are discoverable"
      assessment: "ACHIEVABLE"
      notes: "Task 2.1 preserves reference to plans.yml for full lifecycle documentation."

    - criteria: "Error messages guide to correct authoritative sources"
      assessment: "NEEDS_ATTENTION"
      notes: |
        No explicit task ensures error messages or documentation point to
        authoritative sources after consolidation. Consider adding acceptance
        criteria to relevant tasks.

    - criteria: "No loss of critical planning capability"
      assessment: "ACHIEVABLE"
      notes: "Plan focuses on consolidation and reference, not removal of capability."

# =============================================================================
# TASK DEPENDENCY VALIDATION
# =============================================================================
dependency_review:
  valid_dependencies:
    - chain: "Phase 1 -> Phase 2 -> Phase 3 -> Phase 4 -> Phase 5 -> Phase 6"
      assessment: "CORRECT"
      notes: "Sequential phases with correct ordering (correctness before optimization)"

    - dependency: "Task 4.2 depends on Task 4.1"
      assessment: "CORRECT"
      notes: "Cannot update inputs.yml to use core-plans.yml until core-plans.yml exists"

  missing_dependencies:
    - issue: "Tasks 4.3-4.6 (for C4 expansion) need to be added"
      recommendation: "All additional planner inputs.yml updates should depend on 4.1"

  dependency_concerns:
    - concern: "Phase 5 task 5.1 may affect planner-shared.yml which is used by all planners"
      impact: "Changes to iteration.yml loading may require coordination with Phase 4"
      recommendation: |
        Consider whether Phase 5 task 5.1 should come BEFORE Phase 4,
        since clarifying agent-loops.yml vs iteration.yml separation affects
        what planners need to load.

