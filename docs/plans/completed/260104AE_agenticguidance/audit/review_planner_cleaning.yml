recommendations:
  required_before_approval:
    - "Add tasks 4.3-4.6 for remaining planner agents per user decision C4"
    - "Reframe tasks 1.1, 1.2 as standardization per user decision C1"
    - "Remove or mark resolved the questions_for_user section"

  suggested_improvements:
    - "Add explicit note to task 5.1 that iteration.yml is being KEPT (C5)"
    - "Update Phase 4 token savings estimate for full planner agent scope"
    - "Consider adding acceptance criteria for error message guidance"
    - "Document core-plans.yml as authoritative layer for planner agents"

# =============================================================================
# FINAL VERDICT
# =============================================================================
verdict:
  status: "NEEDS_CHANGES"
  blocking_issues: 2
  details: |
    The plan is structurally sound and addresses the audit findings correctly.
    However, it does not fully implement user decisions C1 and C4:

    1. CRITICAL: Phase 4 must be expanded to all planner agents (C4)
    2. MAJOR: Phase 1 tasks must be reframed as standardization, not fixes (C1)
    3. MAJOR: Resolved questions should be removed from the plan

    Once these changes are made, the plan should be re-reviewed for approval.

    The plan correctly handles C2 (layer splitting), C3 (example trimming),
    and C5 (keeping iteration.yml), though C5 should be made more explicit
    in task 5.1.

  next_action: |
    Return to planner-guidance with this feedback to address:
    1. Expand Phase 4 with tasks for all planner agents
    2. Reframe Phase 1 tasks per C1 decision
    3. Clean up or remove questions_for_user section
    4. Add explicit C5 note to task 5.1
