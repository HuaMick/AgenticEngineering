# =============================================================================
# ISSUES LIST
# =============================================================================
issues:
  critical:
    - id: "CRIT-1"
      title: "Phase 4 scope incomplete per user decision C4"
      description: |
        User explicitly decided to apply layer filtering to ALL planner agents,
        but plan only updates planner-cleaning inputs.yml.
      resolution: |
        Add tasks 4.3, 4.4, 4.5, 4.6 to update:
        - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
        - modules/AgenticGuidance/agents/planner/planner-test/inputs.yml
        - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
        - modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml
        All should replace core-system.yml with core-plans.yml reference.

  major:
    - id: "MAJ-1"
      title: "Phase 1 tasks misframed - paths are correct per C1"
      description: |
        Tasks 1.1 and 1.2 are framed as fixing "stale" paths, but user confirmed
        paths ARE correct (module-relative). Tasks should be reframed as
        standardization for clarity, not correction.
      resolution: |
        Reframe tasks 1.1 and 1.2:
        - Change "issue" field to clarify this is standardization, not fixing errors
        - Update descriptions to reflect standardization intent
        - Remove NOTE questioning if task is needed

    - id: "MAJ-2"
      title: "questions_for_user section contains resolved questions"
      description: |
        The plan still lists questions that have been answered by user decisions C1-C5.
        These should be removed or marked as resolved to avoid confusion.
      resolution: |
        Either remove the questions_for_user section entirely (since all questions
        are answered) or convert it to a resolved_decisions section documenting
        the user's choices.

  minor:
    - id: "MIN-1"
      title: "Task 5.1 should explicitly state iteration.yml is being KEPT"
      description: |
        Per user decision C5, iteration.yml is being kept. Task 5.1 should
        explicitly state this to avoid any ambiguity about the task's intent.
      resolution: |
        Add to task 5.1 context:
        "NOTE: Per user decision, iteration.yml is being KEPT. This task only
        clarifies the separation between agent-loops.yml (structure) and
        iteration.yml (behavior) - it does NOT remove iteration.yml."

    - id: "MIN-2"
      title: "Estimated token savings should be updated after C4 expansion"
      description: |
        Phase 4 estimated_token_savings of ~3000 tokens assumes only planner-cleaning.
        With C4 expansion to all 5 planner agents, the impact is 5x larger.
      resolution: |
        Update Phase 4 estimated_token_savings to reflect all planner agents:
        "~3000 tokens per agent x 5 agents = ~15000 tokens total across all planners"
        (or note savings per agent invocation)

