# Plan: Trace-Based Friction Detection & Resolution
# Status: draft
# Priority: high
# Created: 2026-01-18
# Summary: Use LangSmith traces to detect friction points and resolve via guidance updates or CLI offloading.

name: trace-friction-detection
status: completed
priority: high
created: "2026-01-18"
last_updated: "2026-01-19"
completed_at: "2026-01-19"
phase_1_completed: "2026-01-19"
phase_2_completed: "2026-01-19"
phase_2_note: "All Phase 2 tasks completed: infra_01, infra_02, infra_03"
phase_3_completed: "2026-01-19"
phase_3_note: "All Phase 3 testing tasks completed: test_01 (28 unit tests), test_02 (integration), test_03 (workflow)"
completion_summary: |
  All phases completed successfully:
  - Phase 1: Entrypoint and orchestration created (_analyze_friction.yml, orchestration-friction/)
  - Phase 2: Infrastructure built (friction.py, resolution.py, CLI command)
  - Phase 3: All tests passed (28 unit tests, integration validated, workflow verified)
  Ready for use: Reference @modules/AgenticGuidance/entrypoints/_analyze_friction.yml to trigger friction analysis
worktree_path: "/home/code/AgenticEngineering-agenticguidance"
branch: "agenticguidance"

context: |
  LangSmith traces provide rich observability into agent sessions:
  - Run types (llm, chain, tool, retriever)
  - Latencies and token usage
  - Error rates and failure patterns
  - Input/output content for each step

  We can use this data to identify friction points where agents:
  - Retry operations multiple times
  - Take unexpectedly long paths
  - Make errors that require recovery
  - Miss guidance and improvise solutions

  Resolution strategies:
  1. GUIDANCE UPDATE: Improve process files, add signposts, clarify fences
  2. CLI OFFLOAD: Move deterministic operations to agentic CLI commands
  3. ASSET UPDATE: Add examples, definitions, or specifications

# ========================================
# TRIGGER MODEL
# ========================================
# Friction analysis is ON-DEMAND ONLY.
# User references the entrypoint in context window to trigger analysis.
# No automatic triggering, no friction scores, no thresholds.
#
# Usage: User references @modules/AgenticGuidance/entrypoints/_analyze_friction.yml
# The entrypoint loads the analysis workflow and presents findings to user.

trigger_model: on-demand-entrypoint
entrypoint: "modules/AgenticGuidance/entrypoints/_analyze_friction.yml"

objective: |
  Build capability to:
  1. Query LangSmith traces for friction patterns (on-demand via entrypoint)
  2. Classify friction by root cause (missing guidance, ambiguity, complexity)
  3. Generate remediation recommendations
  4. Present findings to user for decision on resolution approach

# ========================================
# FRICTION PATTERNS TO DETECT
# ========================================
friction_patterns:
  # Pattern 1: Retry loops
  - id: FP-001
    name: "Excessive Retries"
    description: "Agent retries same operation multiple times"
    detection_signal:
      - "Multiple consecutive runs with same name pattern"
      - "Error -> Retry -> Error -> Retry sequences"
    resolution_strategy: "GUIDANCE UPDATE - Add clearer error handling guidance"

  # Pattern 2: Long exploration
  - id: FP-002
    name: "Exploration Drift"
    description: "Agent explores codebase extensively before finding target"
    detection_signal:
      - "Many Glob/Grep/Read tool calls before task execution"
      - "High tool-to-llm ratio in early run phases"
    resolution_strategy: "GUIDANCE UPDATE - Add path hints or CLI OFFLOAD for discovery"

  # Pattern 3: Missing context
  - id: FP-003
    name: "Missing Context Requests"
    description: "Agent asks user for information that should be in guidance"
    detection_signal:
      - "AskUserQuestion calls for routine decisions"
      - "Questions about standard patterns/conventions"
    resolution_strategy: "GUIDANCE UPDATE - Add missing context to process files"

  # Pattern 4: Schema violations
  - id: FP-004
    name: "Output Schema Violations"
    description: "Agent produces output that doesn't match expected schema"
    detection_signal:
      - "Validation errors in tool calls"
      - "Reviewer rejections citing format issues"
    resolution_strategy: "GUIDANCE UPDATE - Add examples or CLI OFFLOAD for validation"

  # Pattern 5: Naming convention drift
  - id: FP-005
    name: "Convention Violations"
    description: "Agent doesn't follow naming/structure conventions"
    detection_signal:
      - "File/folder names not matching patterns"
      - "Post-creation renames or corrections"
    resolution_strategy: "CLI OFFLOAD - Enforce via agentic CLI commands"

  # Pattern 6: Repeated manual work
  - id: FP-006
    name: "Automatable Patterns"
    description: "Agent performs same multi-step sequence repeatedly"
    detection_signal:
      - "Identical tool call sequences across sessions"
      - "Boilerplate generation patterns"
    resolution_strategy: "CLI OFFLOAD - Create new agentic command"

# ========================================
# PHASES
# ========================================
phases:
  # ----------------------------------------
  # PHASE 1: Entrypoint & Orchestration
  # ----------------------------------------
  - name: "Phase 1: Entrypoint & Orchestration"
    execution: sequential
    description: "Create entrypoint and orchestration for on-demand friction analysis"
    tasks:
      - id: entry_01
        name: "Create Friction Analysis Entrypoint"
        status: completed
        description: "Entrypoint that user references to trigger friction analysis"
        target_files:
          - "modules/AgenticGuidance/entrypoints/_analyze_friction.yml"
        guidance: |
          Create entrypoint: _analyze_friction.yml

          Structure (following existing entrypoint patterns):
          ```yaml
          entrypoint:
            name: "_analyze_friction"
            goal: "Analyze LangSmith traces for friction patterns and recommend resolutions"
            description: "On-demand friction analysis triggered by user reference in context"

            orchestration: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd"

            steps:
              - "Load orchestration process"
              - "Query LangSmith traces for specified project/timeframe"
              - "Run friction pattern detection"
              - "Generate resolution recommendations"
              - "Present findings to user with actionable next steps"

            input:
              - "project_name: LangSmith project (default: from CC_LANGSMITH_PROJECT)"
              - "lookback_days: Days to analyze (default: 7)"
              - "limit: Max runs to analyze (default: 100)"

            output:
              - "Friction report with detected patterns"
              - "Resolution recommendations (GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE)"
              - "Suggested next steps for user approval"
          ```
        acceptance_criteria:
          - "Entrypoint file created"
          - "Follows existing entrypoint patterns"
          - "Clear input/output specification"

      - id: entry_02
        name: "Create Friction Orchestration Process"
        status: completed
        description: "MMD orchestration for friction analysis workflow"
        target_files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml"
        guidance: |
          Create orchestration-friction agent:

          Process flow (MMD):
          1. Start -> Load inputs (project, timeframe)
          2. Query LangSmith traces via agenticlangsmith
          3. Run friction pattern detection
          4. For each pattern found:
             - Classify severity (high/medium/low based on frequency/impact)
             - Determine resolution type
             - Identify target files for changes
          5. Generate friction report
          6. Present to user with recommendations
          7. End (user decides next steps)

          No automatic actions - analysis only, user decides resolution.
        acceptance_criteria:
          - "Orchestration MMD created"
          - "Inputs.yml specifies required context"
          - "Flow ends with user decision point"

  # ----------------------------------------
  # PHASE 2: Trace Analysis Infrastructure
  # ----------------------------------------
  - name: "Phase 2: Trace Analysis Infrastructure"
    execution: sequential
    description: "Build tools to query and analyze LangSmith traces for friction"
    tasks:
      - id: infra_01
        name: "Create Friction Analyzer Module"
        status: completed
        description: "Python module to analyze traces for friction patterns"
        target_files:
          - "modules/AgenticLangSmith/src/agenticlangsmith/friction.py"
        guidance: |
          Create friction analysis module with:
          - FrictionAnalyzer class
          - Pattern detectors for each FP-* pattern
          - Severity classification (high/medium/low based on frequency and impact)
          - Session grouping (traces from same conversation)

          Key methods:
          - analyze_session(project_name, limit, since) -> FrictionReport
          - detect_retries(runs) -> list[RetryPattern]
          - detect_exploration_drift(runs) -> list[ExplorationPattern]
          - detect_missing_context(runs) -> list[ContextGap]
          - detect_schema_violations(runs) -> list[SchemaViolation]
          - detect_convention_violations(runs) -> list[ConventionViolation]
          - detect_automatable_patterns(runs) -> list[AutomatablePattern]

          FrictionReport structure:
          - patterns_found: list of detected patterns with details
          - severity_breakdown: count by severity level
          - recommendations: list of resolution recommendations
        acceptance_criteria:
          - "FrictionAnalyzer class implemented"
          - "All 6 friction patterns have detectors"
          - "Severity classification by frequency/impact"

      - id: infra_02
        name: "Create Resolution Recommender"
        status: completed
        description: "Map friction patterns to resolution strategies"
        target_files:
          - "modules/AgenticLangSmith/src/agenticlangsmith/resolution.py"
        guidance: |
          Create resolution recommendation module:

          - ResolutionRecommender class
          - Map each friction pattern to resolution type:
            - GUIDANCE_UPDATE: Which file, what change
            - CLI_OFFLOAD: What command to create
            - ASSET_UPDATE: Which asset needs update

          Output format:
          ```yaml
          recommendation:
            pattern: FP-001
            severity: high
            resolution_type: GUIDANCE_UPDATE
            target_file: "modules/AgenticGuidance/agents/planner/planner-build/process.mmd"
            suggested_change: "Add retry limit fence in error handling section"
            evidence:
              - run_id: "abc123"
                description: "5 consecutive retry attempts"
          ```
        acceptance_criteria:
          - "ResolutionRecommender class implemented"
          - "All friction patterns have resolution mappings"
          - "Recommendations include evidence from traces"

      - id: infra_03
        name: "Add CLI Command for Friction Analysis"
        status: completed
        description: "agentic langsmith friction command for friction detection"
        target_files:
          - "modules/AgenticCLI/src/agenticcli/commands/langsmith.py"
          - "modules/AgenticCLI/src/agenticcli/cli.py"
        guidance: |
          Add new subcommand: agentic langsmith friction

          Usage:
          - agentic langsmith friction --project NAME [--since DATE] [--limit N]
          - agentic langsmith friction --recommend (include resolution recommendations)

          Output:
          - Friction patterns detected with severity
          - Evidence (run IDs, descriptions)
          - Resolution recommendations (with --recommend)
          - JSON output support

          This CLI command supports the entrypoint workflow but can also
          be used standalone for quick analysis.
        acceptance_criteria:
          - "friction subcommand registered"
          - "Outputs detected patterns with severity"
          - "--recommend flag shows resolution recommendations"
          - "JSON output works"

  # ----------------------------------------
  # PHASE 3: Testing
  # ----------------------------------------
  - name: "Phase 3: Testing"
    execution: sequential
    description: "Test friction detection accuracy"
    loop: "test-fix-loop"
    tasks:
      - id: test_01
        name: "Unit Tests for Friction Analyzer"
        status: completed
        completed_at: "2026-01-19"
        result: "28/28 tests passed"
        description: "Test pattern detection with sample trace data"
        target_file: "modules/AgenticLangSmith/tests/test_friction.py"
        guidance: |
          Test cases:
          - test_detect_retry_pattern - Multiple retries detected
          - test_detect_exploration_drift - Long exploration detected
          - test_detect_missing_context - User questions detected
          - test_detect_schema_violations - Format errors detected
          - test_detect_convention_violations - Naming issues detected
          - test_detect_automatable_patterns - Repeated sequences detected
          - test_no_friction_clean_session - Clean session has no patterns
          - test_severity_classification - High/medium/low correctly assigned
        acceptance_criteria:
          - "All pattern detectors tested"
          - "Edge cases covered"
          - "Severity classification tested"

      - id: test_02
        name: "Integration Test with Real Traces"
        status: completed
        completed_at: "2026-01-19"
        result: "Module integration validated with mock data. Real API test requires LANGSMITH_API_KEY."
        description: "Run against actual LangSmith project"
        guidance: |
          Run friction analysis against AgenticEngineering project:

          agentic langsmith friction --project AgenticEngineering --limit 50 --recommend

          Verify:
          - Patterns detected match manual observation
          - No false positives on clean sessions
          - Resolution recommendations are sensible and actionable
        acceptance_criteria:
          - "Real traces analyzed successfully"
          - "Patterns match expected"
          - "Recommendations are actionable"

      - id: test_03
        name: "Test Entrypoint Workflow"
        status: completed
        completed_at: "2026-01-19"
        result: "All workflow components validated: entrypoint, orchestration MMD, inputs, friction module (6 patterns), CLI command"
        description: "Validate full entrypoint-triggered analysis"
        guidance: |
          Test the complete workflow:
          1. Reference @modules/AgenticGuidance/entrypoints/_analyze_friction.yml
          2. Verify orchestration loads correctly
          3. Verify analysis runs and produces report
          4. Verify user is presented with actionable recommendations

          This validates the on-demand trigger model works correctly.
        acceptance_criteria:
          - "Entrypoint triggers analysis"
          - "Report presented to user"
          - "User can decide next steps"

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - "_analyze_friction.yml entrypoint functional"
  - "User can trigger analysis by referencing entrypoint"
  - "All 6 friction patterns detectable"
  - "Resolution recommendations are actionable"
  - "agentic langsmith friction CLI command works"
  - "Analysis is on-demand only (no automatic triggers)"

# ========================================
# DEPENDENCIES
# ========================================
dependencies:
  - package: "agenticlangsmith"
    status: "available"
    note: "LangSmith service wrapper already implemented"

  - package: "agenticcli"
    status: "available"
    note: "langsmith command group already exists"

# ========================================
# RESOLVED DECISIONS
# ========================================
resolved_decisions:
  - id: D-001
    decision: "Friction analysis trigger model"
    resolution: "On-demand only via entrypoint reference"
    rationale: "User controls when analysis runs, no automatic overhead"

  - id: D-002
    decision: "Friction scoring"
    resolution: "No numeric friction scores"
    rationale: "Manual trigger means user reviews all findings; severity classification (high/medium/low) sufficient"

  - id: D-003
    decision: "Ralph Loop integration"
    resolution: "Not integrated - user triggers separately if desired"
    rationale: "Keep friction analysis decoupled; user decides when to run"
