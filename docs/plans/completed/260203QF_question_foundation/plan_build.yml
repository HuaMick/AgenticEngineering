- name: 'Phase 3: File System Layer'
  execution: sequential
  description: Atomic YAML read/write with file locking
  tasks:
  - id: QF_009
    name: Add atomic file write operation
    description: Implement helper for atomic file writes with temp file + rename pattern
    status: completed
    agent: builder
    depends_on:
    - QF_008
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    - modules/AgenticGuidance/src/agenticguidance/services/plan.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    guidance: "Add _atomic_write helper method to QuestionQueue:\n\n```python\ndef\
      \ _atomic_write(self, path: Path, content: str) -> None:\n    \"\"\"Write content\
      \ to file atomically.\n\n    Args:\n        path: Target file path\n       \
      \ content: Content to write\n\n    Uses temp file + rename pattern for atomicity.\n\
      \    \"\"\"\n```\n\nImplementation:\n1. Create temp file in same directory (path.with_suffix('.tmp'))\n\
      2. Write content to temp file\n3. fsync to ensure write is on disk\n4. Rename\
      \ temp file to target path (atomic operation)\n\nHandle errors: clean up temp\
      \ file on failure.\nReference plan.py for atomic file operation patterns.\n"
    success_criteria:
    - _atomic_write() uses temp file + rename pattern
    - fsync called before rename to ensure data on disk
    - Temp file cleaned up on errors
    - Operation is truly atomic (no partial writes visible)
    - Docstring explains atomicity guarantee
    completed_at: '2026-02-03T23:01:22.783011'
  - id: QF_010
    name: Add file locking for concurrent access
    description: Integrate FileLock for thread-safe queue operations
    status: completed
    agent: builder
    depends_on:
    - QF_009
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    - modules/AgenticGuidance/src/agenticguidance/services/state.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    guidance: "Add file locking to critical operations in QuestionQueue:\n\nOperations\
      \ that need locking:\n1. create_question() - prevent concurrent ID collisions\n\
      2. answer_question() - prevent concurrent move operations\n\nImplementation\
      \ pattern:\n```python\nfrom agenticguidance.services.state import FileLock\n\
      \ndef create_question(...):\n    lock = FileLock(self.pending_dir / \".lock\"\
      )\n    try:\n        if not lock.acquire():\n            raise TimeoutError(\"\
      Could not acquire lock\")\n        # ... create question logic ...\n    finally:\n\
      \        lock.release()\n```\n\nUse FileLock from services/state.py (already\
      \ implemented).\nLock file should be {directory}/.lock (e.g., pending/.lock).\n\
      Always release lock in finally block.\n"
    success_criteria:
    - create_question() uses FileLock for pending directory
    - answer_question() uses FileLock for both directories
    - Locks released in finally blocks
    - TimeoutError raised if lock acquisition fails
    - No deadlocks possible (lock ordering consistent)
    - Concurrent operations are thread-safe
    completed_at: '2026-02-03T23:04:18.422289'
  - id: QF_011
    name: Add error handling and logging
    description: Add comprehensive error handling and logging throughout service
    status: completed
    agent: builder
    depends_on:
    - QF_010
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/question.py
    guidance: "Add error handling and logging to QuestionQueue:\n\n1. Import logging\
