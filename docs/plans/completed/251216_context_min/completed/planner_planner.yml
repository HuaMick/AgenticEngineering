    sub_agents:
      - "planner-agent-exam/"
      - "planner-build/"
      - "planner-cleaning/"
      - "planner-teach/"
      - "planner-test/"

  audit_checklist:
    context_minimisation:
      - "Each planner sub-agent loads substantial context - review necessity"
      - "Check for duplicated definitions across planner inputs"
      - "Identify shared context that could be at root level"
      - "Review if planners are loading process details they don't need"

    folder_structure:
      - "MISSING: Root manifest.yml to serve as hub"
      - "MISSING: Root inputs.yml for shared planner context"
      - "Ensure each sub-agent has: process.yml, inputs.yml, manifest.yml"
      - "Consider shared definitions.yml at planner root"

  tasks:
    - id: "plan-01"
      description: "Create root manifest.yml for planner agent"
      file: "planner/manifest.yml"
      criteria: "Hub file listing all planner sub-agents"
      status: "completed"
      result: "Created manifest.yml with all 5 sub-agents (planner-build, planner-test, planner-cleaning, planner-teach, planner-agent-exam) including descriptions, file paths, and routing guidelines"

    - id: "plan-02"
      description: "Delete root inputs.yml - sub-agents should be self-contained"
      file: "planner/inputs.yml"
      criteria: "File removed if exists; each sub-agent has complete inputs.yml"
      action: "delete"
      status: "completed"
      result: "Root inputs.yml did not exist - confirmed sub-agents are self-contained with their own inputs.yml files"

    - id: "plan-03"
      description: "Audit planner-build/inputs.yml for context minimisation"
      file: "planner/planner-build/inputs.yml"
      criteria: "Only build-planning specific inputs"
      status: "completed"
      result: "Already well-optimized - minimal inputs (7 core files), uses references in definitions section instead of duplication, all inputs are build-planning specific"

    - id: "plan-04"
      description: "Audit planner-test/inputs.yml for context minimisation"
      file: "planner/planner-test/inputs.yml"
      criteria: "Only test-planning specific inputs"
      status: "completed"
      result: "Removed redundant inline definitions (test_fix_loop, audit_test_fix_loop, test_strategies, reward_hacking) - replaced with references to process.yml and definition files. Reduced ~30 lines of duplication"

    - id: "plan-05"
      description: "Audit planner-cleaning/inputs.yml for context minimisation"
      file: "planner/planner-cleaning/inputs.yml"
      criteria: "Only cleaning-planning specific inputs"
      status: "completed"
      result: "Removed extensive inline definitions (~100 lines) for finalization phases, cleanup, audit, user story validation, and documentation phases. Replaced with references to process.yml and definition files. Kept minimal phase_ordering definition"

    - id: "plan-06"
      description: "Audit planner-teach/inputs.yml for context minimisation"
      file: "planner/planner-teach/inputs.yml"
      criteria: "Only teach-planning specific inputs"
      status: "completed"
      result: "Removed redundant inline definitions (path, fence, signpost, friction, guidance_artifact) - replaced with references to existing definition files. Reduced ~40 lines of duplication. Kept minimal guidance_improvement_plan definition"

    - id: "plan-07"
      description: "Audit planner-agent-exam/inputs.yml for context minimisation"
      file: "planner/planner-agent-exam/inputs.yml"
      criteria: "Only agent-exam specific inputs"
      status: "completed"
      result: "Already minimal and well-optimized - only 4 core inputs and 1 guideline, no changes needed"

    - id: "plan-08"
      description: "Update references after changes"
      criteria: "All paths in inputs/process files resolve to existing files"
      status: "completed"
      result: "Verified no references to root-level planner files in _plan.yml or orchestration-teach/process.yml. All definition file references validated (path.yml, fence.yml, signpost.yml, friction.yml, guidance-artifacts.yml, agent-loops.yml, user-stories.yml, reward-hacking.yml, test_strategies.yml all exist)"

  reference_update_locations:
    - "assets/processes/_plan.yml"
    - "orchestration/orchestration-teach/process.yml"

  # Additional context-minimisation proposals from review (2025-12-18)
  proposals:
    - id: "plan-prop-01"
      file: "planner/planner-cleaning/inputs.yml"
      issue: "Inline 'phase_ordering' definition (lines 97-99) is minimal but could be in process.yml instead"
      proposal: "Move phase_ordering to planner-cleaning/process.yml where it's more contextually relevant, or keep as brief inline definition"
      impact: "Minimal impact, ~50 tokens"
      priority: "low"
      status: "completed"
      decision: "Keep phase_ordering inline in inputs.yml"
      rationale: |
        Decided to keep phase_ordering in inputs.yml because:
        1. Already minimal (~50 tokens) with high reference value
        2. It's a definition (what the ordering is) not process logic (how to execute)
        3. The definitions: section in inputs.yml is appropriate for brief definitions
        4. Moving would require updating process.yml line 41 reference without meaningful benefit
        5. Follows pattern of keeping brief, essential definitions in inputs.yml for quick access

# Final Status: COMPLETED
