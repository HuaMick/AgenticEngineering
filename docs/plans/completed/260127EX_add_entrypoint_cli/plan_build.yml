# Add Entrypoint CLI Commands - CLI-First Bootstrap
# Plan ID: 260127EX
# Created: 2026-01-27
# Type: BUILD (code implementation)
#
# Goal: Add `agentic entrypoint` command group to enable CLI-first agent sessions.
# This allows initial prompts to direct agents to execute CLI commands immediately,
# building momentum for CLI usage throughout the session.
#
# Context: Agents need a CLI command to execute entrypoints directly rather than
# manually reading and applying entrypoint files. This supports the CLI_OFFLOAD
# pattern and ensures consistent entrypoint execution.

_template_status: active

plan:
  name: "add-entrypoint-cli"
  worktree: "/home/code/AgenticEngineering-cli-entrypoint-execute"
  branch: "cli-entrypoint-execute"
  status: "pending"
  priority: "high"
  type: "build"
  created: "2026-01-27"

  objective: |
    Add `agentic entrypoint` command group with list, show, and execute subcommands.
    This enables agents to bootstrap sessions via CLI, establishing CLI-first patterns
    from the start of any session.

    Commands to implement:
    - `agentic entrypoint list` - List available entrypoints
    - `agentic entrypoint show <name>` - Display entrypoint contents
    - `agentic entrypoint execute <name>` - Execute entrypoint (output for agent consumption)

  # ========================================
  # PHASES
  # ========================================
  phases:
    - name: "Phase 1 - Implement Entrypoint Command Module"
      id: "phase_01"
      description: |
        Create the entrypoint.py command module with list, show, and execute subcommands.
      status: "pending"
      tasks:
        - id: "EX-001"
          name: "Create entrypoint command module structure"
          description: |
            File: modules/AgenticCLI/src/agenticcli/commands/entrypoint.py

            Implement command module with:
            - handle() router for subcommands
            - _get_entrypoints_dirs() - returns list of entrypoint directories
            - _find_entrypoint() - resolves entrypoint name to file path
            - _list_entrypoints() - lists all available entrypoints

            Search paths for entrypoints (in order):
            1. Current working directory: .claude/entrypoints/
            2. Project root: modules/AgenticGuidance/entrypoints/
            3. Config-specified paths from agentic.yml

            Entrypoint naming convention:
            - Files named _<name>.yml or _<name>.md
            - Leading underscore indicates entrypoint
            - Name without underscore/extension for CLI reference
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/entrypoint.py"
          acceptance_criteria:
            - "Module follows existing command pattern (handle() router)"
            - "Supports multiple entrypoint directories"
            - "JSON output support via -j flag"

        - id: "EX-002"
          name: "Implement list subcommand"
          description: |
            Add cmd_list() to entrypoint.py

            Output format (text):
            ```
            Available Entrypoints
            ---------------------
            _plan_build       Build planning for code implementation
            _plan_teach       Teaching/guidance modification plans
            _orchestrate      Multi-phase orchestration execution
            _analyze_friction Session friction analysis
            ```

            Output format (JSON):
            ```json
            {
              "entrypoints": [
                {"name": "_plan_build", "path": "...", "type": "yml"},
                {"name": "_plan_teach", "path": "...", "type": "yml"}
              ],
              "count": 4
            }
            ```

            Include metadata extraction from entrypoint files:
            - Description from YAML header comments
            - Type (yml, md, txt)
            - Source directory
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/entrypoint.py"

        - id: "EX-003"
          name: "Implement show subcommand"
          description: |
            Add cmd_show() to entrypoint.py

            Arguments:
            - name: Entrypoint name (required) - with or without underscore

            Output:
            - Full contents of entrypoint file
            - For YAML files, optionally parse and format
            - For Markdown, output raw text

            Example: `agentic entrypoint show plan_build`
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/entrypoint.py"

        - id: "EX-004"
          name: "Implement execute subcommand"
          description: |
            Add cmd_execute() to entrypoint.py

            The execute command outputs the entrypoint content in a format
            suitable for agent consumption. This is NOT about running code,
            but about outputting the prompt/guidance for the agent to follow.

            Arguments:
            - name: Entrypoint name (required)
            - --vars: Key=value pairs for variable substitution (optional)
            - --context: Additional context to prepend (optional)

            Behavior:
            1. Resolve entrypoint file
            2. Read contents
            3. Apply variable substitution if --vars provided
            4. Output to stdout for agent to process

            Variable substitution supports:
            - {{PLAN_PATH}} - path to current plan
            - {{WORKTREE}} - current worktree path
            - {{TIMESTAMP}} - ISO timestamp
            - Custom vars via --vars key=value

            Example usage in agent prompt:
            "Execute `agentic entrypoint execute _plan_build --vars PLAN_PATH=docs/plans/live/260127EX`"
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/entrypoint.py"

    - name: "Phase 2 - CLI Registration and Help"
      id: "phase_02"
      description: |
        Register entrypoint command in CLI and add help documentation.
      status: "pending"
      tasks:
        - id: "EX-005"
          name: "Register entrypoint command in cli.py"
          description: |
            File: modules/AgenticCLI/src/agenticcli/cli.py

            Add entrypoint subparser with:
            - Parser for 'entrypoint' command
            - Subparsers for list, show, execute
            - Arguments and help text for each subcommand
            - Integration with handle() router

            Argument definitions:
            - list: --dir (optional path filter)
            - show: name (positional, required)
            - execute: name (positional), --vars (multiple), --context
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/cli.py"

        - id: "EX-006"
          name: "Add entrypoint to agent help"
          description: |
            File: modules/AgenticCLI/src/agenticcli/commands/agent_help.py

            Add entrypoint command documentation to agent help output.
            Include examples of how agents should use the command.
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/agent_help.py"

    - name: "Phase 3 - Integration with Loop and Session"
      id: "phase_03"
      description: |
        Integrate entrypoint execute with loop start and session spawn.
      status: "pending"
      tasks:
        - id: "EX-007"
          name: "Update loop.py to use entrypoint execute"
          description: |
            File: modules/AgenticCLI/src/agenticcli/commands/loop.py

            Modify _resolve_prompt() to use `agentic entrypoint execute`
            when --entrypoint flag is provided, instead of directly reading files.

            This ensures consistent entrypoint resolution across all CLI paths.
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/loop.py"

        - id: "EX-008"
          name: "Update session.py entrypoint handling"
          description: |
            File: modules/AgenticCLI/src/agenticcli/commands/session.py

            If session spawn supports entrypoint flag, update to use
            the new entrypoint resolution logic for consistency.
          status: "pending"
          target_files:
            - "modules/AgenticCLI/src/agenticcli/commands/session.py"

    - name: "Phase 4 - Guidance Updates"
      id: "phase_04"
      description: |
        Update guidance to reference the new entrypoint CLI command.
      status: "pending"
      tasks:
        - id: "EX-009"
          name: "Update cli-commands.yml with entrypoint command"
          description: |
            File: modules/AgenticGuidance/assets/definitions/cli-commands.yml

            Add entrypoint command definition:
            ```yaml
            entrypoint:
              description: "Manage and execute entrypoints"
              subcommands:
                list:
                  usage: "agentic entrypoint list"
                  description: "List available entrypoints"
                show:
                  usage: "agentic entrypoint show <name>"
                  description: "Display entrypoint contents"
                execute:
                  usage: "agentic entrypoint execute <name> [--vars KEY=VAL]"
                  description: "Execute entrypoint for agent consumption"
            ```
          status: "pending"
          target_files:
            - "modules/AgenticGuidance/assets/definitions/cli-commands.yml"

        - id: "EX-010"
          name: "Update orchestration process with entrypoint bootstrap"
          description: |
            File: modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml

            Add bootstrap step that references:
            "Execute `agentic entrypoint execute <entrypoint_name>` to load session context"

            This establishes CLI-first pattern from session start.
          status: "pending"
          target_files:
            - "modules/AgenticGuidance/agents/orchestration/orchestration-executor/process.yml"

    - name: "Phase 5 - Testing"
      id: "phase_05"
      description: |
        Comprehensive testing of entrypoint CLI commands.
      status: "pending"
      tasks:
        - id: "EX-011"
          name: "Unit tests for entrypoint command module"
          description: |
            File: modules/AgenticCLI/tests/test_entrypoint_commands.py

            Test cases:
            - _get_entrypoints_dirs() returns correct paths
            - _find_entrypoint() resolves names correctly
            - _list_entrypoints() finds all entrypoints
            - cmd_list() text and JSON output
            - cmd_show() displays correct content
            - cmd_execute() outputs with variable substitution
            - Error handling for missing entrypoints
          status: "pending"
          target_files:
            - "modules/AgenticCLI/tests/test_entrypoint_commands.py"
          acceptance_criteria:
            - "Minimum 25 test cases"
            - "100% coverage of new code"
            - "Tests for both text and JSON output modes"

        - id: "EX-012"
          name: "Integration tests for entrypoint execute"
          description: |
            File: modules/AgenticCLI/tests/test_entrypoint_integration.py

            Integration tests:
            - Execute with real entrypoint files
            - Variable substitution works correctly
            - Integration with loop start --entrypoint
            - Output format suitable for agent consumption
          status: "pending"
          target_files:
            - "modules/AgenticCLI/tests/test_entrypoint_integration.py"

  # ========================================
  # VALIDATION CRITERIA
  # ========================================
  validation:
    - criterion: "entrypoint list works"
      command: "agentic entrypoint list -j"
      expected: "JSON output with entrypoints array"

    - criterion: "entrypoint show works"
      command: "agentic entrypoint show _plan_build"
      expected: "Contents of _plan_build.yml displayed"

    - criterion: "entrypoint execute works"
      command: "agentic entrypoint execute _plan_build --vars PLAN_PATH=/test"
      expected: "Entrypoint content with variable substitution"

    - criterion: "Tests pass"
      command: "pytest modules/AgenticCLI/tests/test_entrypoint*.py -v"
      expected: "All tests pass"

  # ========================================
  # REFERENCE
  # ========================================
  reference:
    existing_entrypoints:
      - "_plan_build.yml - Build planning for code implementation"
      - "_plan_teach.yml - Teaching/guidance modification plans"
      - "_orchestrate.yml - Multi-phase orchestration execution"
      - "_analyze_friction.yml - Session friction analysis"

    related_commands:
      - "agentic context bootstrap - CCI bootstrap (reads CLI definitions)"
      - "agentic loop start --entrypoint - Loop with entrypoint prompt"

    design_principles:
      - "CLI-first: Agents start by executing CLI command, not reading files"
      - "Consistent resolution: All entrypoint paths resolve the same way"
      - "Variable substitution: Dynamic content injection for flexibility"
