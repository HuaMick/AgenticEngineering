      \n3. test_sync_no_workspace_file:\n   - Ensure no .code-workspace file exists\n\
      \   - Run `agentic worktree sync`\n   - Verify appropriate error message\n\n\
      4. test_sync_idempotent:\n   - Create a workspace file that's already in sync\n\
      \   - Run sync twice\n   - Verify workspace file unchanged and no errors\n\n\
      Pattern: Use cli_runner fixture. Create workspace files in temp_repo\nroot with\
      \ .code-workspace extension. Use create_worktree_for_test\nhelper (or adapt\
      \ from test_plan_init.py).\n"
    success_criteria:
