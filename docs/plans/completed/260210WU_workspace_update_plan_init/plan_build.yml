      \ a .code-workspace file\n   - Run plan init with -j flag\n   - Parse JSON output\
      \ and verify \"workspace_updated\" key exists\n\n4. test_init_no_workspace_file_continues:\n\
      \   - Ensure no .code-workspace file exists\n   - Run plan init\n   - Verify\
      \ it succeeds (exit 0) without error about workspace\n\nPattern: Write the workspace\
