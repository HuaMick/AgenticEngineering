      \ Use the existing cli_runner and\ntemp_repo fixtures.\n"
    success_criteria:
    - Test verifies workspace is updated on new worktree creation
    - Test verifies no duplicate entry on worktree reuse
    - Test verifies JSON output includes workspace_updated
    - Test verifies graceful handling when no workspace file exists
  - id: WU-005
    name: Add worktree sync tests to test_worktree.py
    status: completed
    description: 'Add tests for the new worktree sync command that verify stale entry

      removal and missing entry addition.

      '
    target_files:
    - modules/AgenticCLI/tests/test_worktree.py
    inputs:
    - modules/AgenticCLI/tests/test_worktree.py
    - modules/AgenticCLI/tests/conftest.py
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    guidance: "Add a new test class TestWorktreeSync:\n\n1. test_sync_removes_stale_entries:\n\
      \   - Create a workspace file with an entry pointing to a non-existent path\n\
      \   - Create a real worktree for the test\n   - Run `agentic worktree sync`\n\
      \   - Verify the stale entry was removed\n   - Verify the real worktree entry\
      \ remains\n\n2. test_sync_adds_missing_entries:\n   - Create a worktree manually\n\
