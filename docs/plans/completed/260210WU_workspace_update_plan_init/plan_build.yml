name: Fix Workspace Update Bug in plan.py cmd_init
status: active
priority: high
context: 'The `agentic plan init` command (plan.py:cmd_init at line 757) creates or
  reuses a

  worktree but never updates the VS Code .code-workspace file. The sibling command

  `agentic worktree create` (worktree.py:cmd_create at line 531) correctly calls

  find_workspace_file() and update_workspace_add() after worktree creation (lines
  614-618),

  but cmd_init bypasses worktree.py:cmd_create and runs `git worktree add` directly

  (line 857), so the workspace file is never updated.


  Additionally, there is no way to clean stale entries from the workspace file when

  worktrees are removed outside the CLI (e.g., manual `git worktree remove`). A new

  `agentic worktree sync` subcommand is needed to prune entries for worktrees that

  no longer exist.


  Key functions already available in worktree.py:

  - find_workspace_file(repo_root) -> Path | None  (line 198)

  - update_workspace_add(workspace_file, worktree_path, branch, repo_name) -> bool  (line
  211)

  - update_workspace_remove(workspace_file, worktree_path) -> bool  (line 260)

  '
affected_stories:
- US-WORKSPACE-001
- US-WORKSPACE-002
- US-WORKSPACE-003
impacted_artifacts:
- artifact_type: cli_module
  artifact_identifier: modules/AgenticCLI/src/agenticcli/commands/plan.py
  impact_type: behavior_change
  description: Add workspace update calls in cmd_init after worktree creation/reuse
  breaking_change: false
- artifact_type: cli_module
  artifact_identifier: modules/AgenticCLI/src/agenticcli/commands/worktree.py
  impact_type: new_function
  description: Add cmd_sync() function for workspace sync/prune and register in handle()
  breaking_change: false
- artifact_type: cli_module
  artifact_identifier: modules/AgenticCLI/src/agenticcli/cli.py
  impact_type: new_command
  description: Register worktree sync subcommand in Typer CLI
  breaking_change: false
- artifact_type: test_file
  artifact_identifier: modules/AgenticCLI/tests/test_plan_init.py
  impact_type: behavior_change
  description: Add tests for workspace update in plan init
  breaking_change: false
- artifact_type: test_file
  artifact_identifier: modules/AgenticCLI/tests/test_worktree.py
  impact_type: new_tests
  description: Add tests for worktree sync/prune command
  breaking_change: false
phases:
- phase_id: P1_FIX_PLAN_INIT
  name: Add Workspace Update to cmd_init
  status: pending
  stories:
  - US-WORKSPACE-001
  - US-WORKSPACE-002
  execution: sequential
  tasks:
  - id: WU-001
    name: Add workspace update after worktree creation in cmd_init
    status: completed
    description: "In plan.py:cmd_init (line 757), after the worktree is created or\
      \ reused\n(lines 846-866), add workspace file update calls using the existing\n\
      find_workspace_file() and update_workspace_add() from worktree.py.\n\nThe fix\
      \ covers two code paths:\n1. New worktree created (line 856-866): call update_workspace_add\
      \ after success\n2. Existing worktree reused (line 846-849): call update_workspace_add\n\
      \   (idempotent - update_workspace_add appends, so check for duplicates first)\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    guidance: "1. Add import at top of cmd_init (after existing worktree import at\
      \ line 771):\n   from agenticcli.commands.worktree import find_workspace_file,\
      \ update_workspace_add\n\n2. After the worktree creation/reuse block (after\
      \ line 866, before\n   \"Generate plan folder name\" comment at line 868), add:\n\
      \n   # Update VS Code workspace file\n   workspace_file = find_workspace_file(repo_root)\n\
      \   if workspace_file and not worktree_exists:\n       workspace_updated = update_workspace_add(\n\
      \           workspace_file, worktree_path, branch, repo_name\n       )\n   \
      \    if workspace_updated and not is_json_output():\n           console.print(f\"\
      \  [green]Updated workspace file[/green] {workspace_file.name}\")\n\n3. Add\
      \ workspace_updated to result_data dict (after line 918):\n   result_data[\"\
      workspace_updated\"] = workspace_updated if workspace_file else False\n\nNOTE:\
      \ Only update workspace when worktree was newly created (not worktree_exists),\n\
      because if worktree already existed, cmd_create or a previous cmd_init already\n\
      added it. This prevents duplicate entries.\n"
    success_criteria:
    - cmd_init calls find_workspace_file after worktree creation
    - cmd_init calls update_workspace_add when worktree is newly created
    - Workspace is NOT updated when reusing existing worktree (prevents duplicates)
    - workspace_updated field present in JSON output
    - User sees "Updated workspace file" message in non-JSON mode
- phase_id: P2_SYNC_COMMAND
  name: Add Worktree Sync/Prune Subcommand
  status: pending
  stories:
  - US-WORKSPACE-003
  execution: sequential
  tasks:
  - id: WU-002
    name: Implement cmd_sync in worktree.py
    status: completed
    description: 'Add a new cmd_sync() function to worktree.py that:

      1. Lists all git worktrees via `git worktree list --porcelain`

      2. Reads the .code-workspace file

      3. Removes workspace entries whose paths don''t match any existing worktree

      4. Optionally adds missing entries for worktrees not in the workspace

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    inputs:
    - modules/AgenticCLI/src/agenticcli/commands/worktree.py
    guidance: "1. Add cmd_sync after cmd_validate (after line ~1050):\n\n   def cmd_sync(args):\n\
      \       \"\"\"Synchronize workspace file with actual worktrees.\n\n       Removes\
      \ stale entries for worktrees that no longer exist.\n       Adds missing entries\
      \ for worktrees not in the workspace.\n       \"\"\"\n\n2. Implementation steps:\n\
      \   a. Get repo_root via get_repo_root()\n   b. Find workspace file via find_workspace_file(repo_root)\n\
      \   c. If no workspace file, print error and exit\n   d. Get list of actual\
      \ worktree paths from `git worktree list --porcelain`\n   e. Read workspace\
      \ JSON, iterate folders array\n   f. For each folder entry, resolve its path\
      \ and check if it exists\n      on disk AND is in the git worktree list\n  \
      \ g. Remove entries that point to non-existent worktrees (call\n      update_workspace_remove\
      \ for each stale entry)\n   h. For each worktree NOT in workspace folders, call\
      \ update_workspace_add\n   i. Report: \"Removed N stale entries, added M missing\
      \ entries\"\n\n3. Add \"sync\" to the handle() router (line 48):\n   elif args.worktree_command\
      \ == \"sync\":\n       cmd_sync(args)\n\n4. Update the else message to include\
      \ \"sync\"\n"
    success_criteria:
    - cmd_sync removes stale workspace entries for non-existent worktrees
    - cmd_sync adds missing entries for worktrees not in workspace
    - cmd_sync reports what was changed
    - cmd_sync handles no-workspace-file gracefully
    - cmd_sync is routed via handle()
  - id: WU-003
    name: Register worktree sync in Typer CLI
    status: completed
    description: 'Add the `sync` subcommand to the worktree_app Typer group in cli.py,

      following the same pattern as other worktree subcommands.

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    inputs:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: "1. After the worktree_validate command (line ~637), add:\n\n   @worktree_app.command(\"\
      sync\")\n   def worktree_sync():\n       \"\"\"Synchronize workspace file with\
      \ actual worktrees.\"\"\"\n       _worktree_handle(_ns(\n           command=\"\
      worktree\", worktree_command=\"sync\",\n           json=_global[\"json\"], debug=_global[\"\
      debug\"],\n       ))\n"
    success_criteria:
    - '''agentic worktree sync'' is a valid CLI command'
    - Routes to worktree.cmd_sync via handle()
