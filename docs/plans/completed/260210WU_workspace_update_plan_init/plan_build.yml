    - modules/AgenticCLI/tests/conftest.py
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    guidance: "Add a new test class TestPlanInitWorkspaceUpdate after TestPlanInit\
      \ (after line ~218):\n\n1. test_init_updates_workspace_on_new_worktree:\n  \
      \ - Create a .code-workspace file in temp_repo with basic structure:\n     {\"\
      folders\": [{\"name\": \"main\", \"path\": \".\"}], \"settings\": {}}\n   -\
      \ Run plan init with a new branch\n   - Read the workspace file and verify a\
      \ new folder entry was added\n   - Verify the entry path points to the worktree\
      \ location\n\n2. test_init_no_duplicate_workspace_entry_on_reuse:\n   - Create\
      \ a .code-workspace file with an existing entry for the worktree\n   - Create\
      \ a worktree manually (create_worktree_for_test)\n   - Run plan init with the\
      \ same branch (reuses worktree)\n   - Read workspace file and verify NO duplicate\
