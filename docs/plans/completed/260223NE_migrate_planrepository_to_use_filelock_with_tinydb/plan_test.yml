_template_status: active

name: TinyDB-First Migration - User Story Validation & Testing
worktree_path: /home/code/AgenticEngineering
branch: main
status: pending

objective: |
  Validate the TinyDB-first migration against user stories US-GD-200 through
  US-GD-206 and affected CLI plan management stories. Verify all acceptance
  criteria are met, update story test_status fields, and fix any gaps.

affected_stories:
  # TinyDB Migration stories (primary)
  - US-GD-200  # TinyDB Plan Repository - CRUD Operations
  - US-GD-201  # TinyDB Task Storage and Queries
  - US-GD-202  # YAML Import/Export for Human Readability
  - US-GD-203  # CLI Plan Commands Use PlanRepository
  - US-GD-204  # Data Migration from YAML to TinyDB
  - US-GD-205  # TinyDB Database Location and Lifecycle
  - US-GD-206  # Backward Compatibility During Migration
  # CLI Plan Management stories (affected by TinyDB-first flip)
  - US-CLI-013  # View Plan Status
  - US-CLI-014  # List Plan Tasks
  - US-CLI-015  # Get Current Task
  - US-CLI-016  # Start/Complete Tasks
  - US-CLI-017  # Add Task
  - US-CLI-018  # Update Task Status
  - US-CLI-020  # Manage Plan Phases
  - US-CLI-021  # Archive Plan

phases:
- name: Phase 1 - Update User Stories
  status: pending
  execution: sequential
  description: |
    Update user stories to reflect actual implementation. Key corrections:
    - US-GD-205: DB location is repo-local .agentic/plans.db (not ~/.agentic/)
    - US-GD-203: CLI uses TinyDB-first with YAML fallback (not full replacement)
    - US-GD-200: Add FileLock concurrency to acceptance criteria
    - Add new stories for: folder_matches guard, read-through pattern, resurrection
  tasks:
  - id: USU_001
    name: Update US-GD-200 through US-GD-206 to match implementation
    status: pending
    agent: build-python
    description: |
      Read each story in docs/userstories/AgenticGuidance/10_tinydb_migration.yml
      and update acceptance criteria to match what was actually built:
      - US-GD-200: Add FileLock on all writes, add phase CRUD, add archive/unarchive/cancel
      - US-GD-201: Add get_task_counts, check_all_tasks_complete, get_plan_branch
      - US-GD-202: sync_to_yaml() method, auto-import on read miss
      - US-GD-203: TinyDB-first with YAML fallback pattern, folder_matches guard
      - US-GD-204: Read-through auto-import replaces explicit migration
      - US-GD-205: Change to repo-local .agentic/plans.db, not ~/.agentic/
      - US-GD-206: Add resurrection detection (completed/ vs live/ mismatch)
    target_files:
    - docs/userstories/AgenticGuidance/10_tinydb_migration.yml

  - id: USU_002
    name: Verify CLI plan management stories still accurate
    status: pending
    agent: build-python
    description: |
      Check docs/userstories/AgenticCLI/02_plan_management.yml stories
      US-CLI-013 through US-CLI-021 to confirm acceptance criteria
      still hold with TinyDB-first architecture.
    target_files:
    - docs/userstories/AgenticCLI/02_plan_management.yml

- name: Phase 2 - User Story Acceptance Testing
  status: pending
  execution: sequential
  description: |
    Run acceptance tests for each user story. For each story:
    1. Read acceptance criteria
    2. Write or verify test that exercises each criterion
    3. Run tests and confirm pass
    4. Update test_status and last_tested fields
  tasks:
  - id: UAT_001
    name: Test US-GD-200 - PlanRepository CRUD Operations
    status: pending
    agent: test-builder
    description: |
      Verify PlanRepository CRUD:
      - create_plan, get_plan, update_plan, delete_plan
      - All operations via TinyDB
      - Atomic writes with FileLock
      - Phase CRUD: add_phase, update_phase, list_phases, get_phase
      - Lifecycle: archive_plan, unarchive_plan, cancel_plan
      Check existing tests in test_plan_repository_filelock.py and
      test_services_plan_service_integration.py.
    target_files:
    - modules/AgenticGuidance/tests/test_plan_repository_filelock.py
    - modules/AgenticGuidance/tests/test_services_plan_service_integration.py

  - id: UAT_002
    name: Test US-GD-201 - Task Storage and Queries
    status: pending
    agent: test-builder
    description: |
      Verify task operations via TinyDB:
      - add_task, get_task, update_task_status, get_tasks (with status filter)
      - get_current_task (first in_progress, then first pending)
      - get_task_counts returns correct totals
      - check_all_tasks_complete returns correct boolean

  - id: UAT_003
    name: Test US-GD-202 - YAML Import/Export
    status: pending
    agent: test-builder
    description: |
      Verify round-trip YAML fidelity:
      - sync_to_yaml() writes plan data to plan_build.yml format
      - Auto-import from YAML on TinyDB cache miss
      - YAML -> TinyDB -> YAML preserves all fields
      - Phases, tasks, metadata all survive round-trip

  - id: UAT_004
    name: Test US-GD-203 - CLI Commands Use PlanRepository
    status: pending
    agent: test-runner
    description: |
      Run the full CLI test suite and verify TinyDB-first paths work:
      - python3 -m pytest modules/AgenticCLI/tests/ --tb=short -q
      - Verify 0 failures
      - Spot-check that plan task list, task add, phase add, etc. all
        hit TinyDB-first with YAML fallback

  - id: UAT_005
    name: Test US-GD-205 - Database Location (repo-local)
    status: pending
    agent: test-builder
    description: |
      Verify DB is created at .agentic/plans.db in the repo root,
      NOT at ~/.agentic/plans.db. Test that:
      - PlanRepository() creates DB in repo-local .agentic/ dir
      - .agentic/ is in .gitignore
      - Multiple repos each get their own plans.db

  - id: UAT_006
    name: Test US-GD-206 - Backward Compatibility
    status: pending
    agent: test-builder
    description: |
      Verify fallback behavior:
      - When TinyDB has no record, CLI falls back to YAML reads
      - When TinyDB path fails (exception), CLI falls back to YAML
      - folder_matches guard prevents cross-plan data leaks
      - Tests using tmp_path get proper isolation from global DB

- name: Phase 3 - Update Story Status
  status: pending
  execution: sequential
  description: |
    After all acceptance tests pass, update the test_status and
    last_tested fields in the user story YAML files.
  tasks:
  - id: STS_001
    name: Mark tested stories as passing
    status: pending
    agent: build-python
    description: |
      For each story that passed acceptance testing:
      - Set test_status: passing
      - Set last_tested: "2026-02-24"
      - Set tested_by_plan: 260223NE_migrate_planrepository_to_use_filelock_with_tinydb
      Update both:
      - docs/userstories/AgenticGuidance/10_tinydb_migration.yml
      - docs/userstories/AgenticCLI/02_plan_management.yml
    target_files:
    - docs/userstories/AgenticGuidance/10_tinydb_migration.yml
    - docs/userstories/AgenticCLI/02_plan_management.yml
