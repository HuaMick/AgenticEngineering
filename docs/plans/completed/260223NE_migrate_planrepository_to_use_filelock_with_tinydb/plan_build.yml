    name: Add phase CRUD operations to PlanRepository
    status: completed
    agent: build-python
    description: 'Add add_phase, update_phase, and list_phases methods to PlanRepository.
      CLI''s cmd_phase_add and cmd_phase_update currently do YAML read+modify+dump.

      '
    inputs:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    target_files:
    - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py
    guidance: "Add these methods to PlanRepository (after the Task CRUD section):\n\
      \n1. add_phase(plan_folder_name: str, phase_data: dict) -> bool:\n   - Insert\
      \ a new phase document with plan_folder_name, phase_name,\n     execution, description,\
      \ status, and _order fields.\n   - Check for duplicate phase_name within the\
      \ same plan.\n   - Use FileLock for the insert.\n\n2. update_phase(plan_folder_name:\
      \ str, phase_name: str, updates: dict) -> bool:\n   - Update fields on an existing\
      \ phase document.\n   - Use FileLock for the update.\n\n3. list_phases(plan_folder_name:\
      \ str) -> list[PhaseData]:\n   - Return all phases for a plan, sorted by _order.\n\
      \   - No locking needed (read-only).\n\n4. get_phase(plan_folder_name: str,\
      \ phase_name: str) -> Optional[PhaseData]:\n   - Get a single phase by name.\n\
      \   - No locking needed (read-only).\n\nPattern for add_phase:\n  def add_phase(self,\
      \ plan_folder_name: str, phase_data: dict) -> bool:\n      phase_name = phase_data.get(\"\
      name\", \"\")\n      if not phase_name:\n          return False\n      with\
      \ self._lock:\n          Phase = Query()\n          existing = self._phases.search(\n\
      \              (Phase.plan_folder_name == plan_folder_name) &\n            \
      \  (Phase.phase_name == phase_name)\n          )\n          if existing:\n \
      \             return False\n          # Determine order\n          all_phases\
      \ = self._phases.search(Phase.plan_folder_name == plan_folder_name)\n      \
      \    max_order = max((p.get(\"_order\", 0) for p in all_phases), default=-1)\n\
      \          self._phases.insert({\n              \"plan_folder_name\": plan_folder_name,\n\
      \              \"phase_name\": phase_name,\n              \"execution\": phase_data.get(\"\
      execution\", \"sequential\"),\n              \"description\": phase_data.get(\"\
      description\", \"\"),\n              \"status\": phase_data.get(\"status\",\
      \ \"pending\"),\n              \"_order\": max_order + 1,\n          })\n  \
      \    return True\n"
