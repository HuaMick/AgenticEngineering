context: 'ARCHITECTURE DIRECTION:

  - TinyDB is the PRIMARY and FIRST-CLASS data store for all plan operations

  - YAML files are a secondary export/fallback (eventually decommissioned)

  - FileLock wraps all TinyDB writes for multi-agent concurrency safety

  - PlanRepository is the single entry point for all plan data access

  - CLI commands must stop reading YAML directly and go through PlanRepository/PlanService


  COMPLETED SO FAR (P1 + P2):

  - FileLock added to all PlanRepository write methods

  - PlanService refactored to TinyDB-first with read-through pattern

  - TaskService updated to TinyDB-first with yaml_sync_enabled flag

  - Repo-local DB isolation (.agentic/plans.db per repo, not global)

  - Resurrection detection (live/ preferred over completed/)

  - CL_001 partially done (2 of 38 YAML calls eliminated)

  - Commit 53c58d4 on main captures all Phase 1+2 work


  REMAINING WORK (P3-P6):

  - PlanData/TaskData dataclasses missing fields CLI needs

  - PlanRepository missing phase CRUD and archive/unarchive operations

  - 36 yaml.safe_load/dump calls remain in CLI plan.py (30 plan-data, 6 non-plan)

  - 12 pre-existing test failures (5 AgenticGuidance, 7 AgenticCLI)


  NON-PLAN YAML CALLS TO KEEP (do NOT migrate these):

  - Line 111: _get_loop_types() reads agent-loops.yml definition file

  - Line 1658: cmd_validate reads user_stories YAML (not plan data)

  - Line 4343: cmd_stories_list reads user stories

  - Lines 4439/4492/4501: cmd_stories_test reads/writes stories test output


  REFERENCE FILES:

  - modules/AgenticGuidance/src/agenticguidance/services/plan_repository.py

  - modules/AgenticGuidance/src/agenticguidance/services/plan.py (PlanService ~line
  658)

  - modules/AgenticGuidance/src/agenticguidance/services/state.py (FileLock ~line
  71)

  - modules/AgenticGuidance/src/agenticguidance/services/task.py (TaskService)

  - modules/AgenticCLI/src/agenticcli/commands/plan.py (36 YAML calls)

  '
phases:
- name: Phase 1 - FileLock Concurrency Protection
  execution: sequential
  description: Add FileLock to all PlanRepository write operations for multi-agent
    safety
  tasks:
  - id: FL_001
    name: Add FileLock to PlanRepository write methods
    status: completed
    agent: build-python
    description: Wrapped all PlanRepository write operations with FileLock.
    completed_date: '2026-02-23'
  - id: FL_002
    name: Add FileLock unit tests
    status: completed
    agent: build-python
    description: Created test_plan_repository_filelock.py with concurrency tests.
    completed_date: '2026-02-23'
- name: Phase 2 - TinyDB as Primary Store
  execution: sequential
  description: Flipped PlanService from YAML-first to TinyDB-first with read-through
    pattern.
  tasks:
