_template_status: active
plan:
  name: Update Testing Guidance for Honeycomb and UAT - Audit
  worktree_path: /home/code/AgenticEngineering-guidance-testing-honeycomb
  branch: guidance-testing-honeycomb
  status: pending
  phases:
  - name: Cross-Reference Audit
    id: phase_audit
    status: pending
    tasks:
    - id: HO-AU-001
      name: Verify Template Alignment
      inputs:
      - modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/live/plan_example.yml
      target_files: []
      guidance: "Check if the example plan templates need any updates to support the\
        \ \nnew honeycomb strategy or if they are flexible enough as is.\n"
      acceptance_criteria:
      - Example templates reviewed for Honeycomb compatibility
      status: completed
    - id: HO-AU-002
      name: Identify Stale Strategy References
      inputs:
      - modules/AgenticGuidance/assets/guidelines/
      target_files: []
      guidance: 'Search for any other guidelines that might refer to the old "Pyramid"

        model (if any) and mark them for future update or update them if simple.

        '
      acceptance_criteria:
      - No conflicting 'Pyramid' model language remains in the guidelines
      status: completed
success_criteria:
- Example templates reviewed for Honeycomb compatibility
- No conflicting Pyramid model language in guidelines
- All guidance files are internally consistent
validation_steps:
- step: Search for Pyramid references
  command: grep -ri 'pyramid' modules/AgenticGuidance/assets/ || echo 'No pyramid
    references found'
- step: Verify example templates
  command: ls modules/AgenticGuidance/assets/examples/planner/
loop_structure:
  type: audit-test-fix-loop
  trigger: Completion of teach phase guidance updates
  exit_criteria:
    success: All audit criteria passed, no conflicting references
    max_iterations: 2
    escalation: Escalate to user for manual review
  participants:
  - agent: test-audit
    role: validator
  - agent: teacher-update-assets
    role: executor (for fixes if needed)
