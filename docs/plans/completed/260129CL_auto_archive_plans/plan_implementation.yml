_template_status: active
plan:
  name: Auto-Archive Planning Folders
  worktree: /home/code/AgenticEngineering
  status: planning
  objective: 'Automate the movement of planning folders from ''live'' to ''completed''
    when the final task is marked as such.

    This reduces visual noise in agent sessions (like the Claude session list) and
    streamlines the workflow.

    '
  phases:
  - name: Logic Implementation
    id: impl_01
    status: pending
    tasks:
    - id: impl_01_001
      name: Add completion check helper
      description: Create a helper function to determine if all tasks across all live
        files are completed.
      status: completed
    - id: impl_01_002
      name: Hook into task update/complete commands
      description: Update cmd_task_complete and cmd_task_update to trigger auto-archival
        if help is needed.
      status: completed
    - id: impl_01_003
      name: Refactor PlanMovementWorkflow for silent moves
      description: Ensure the archival logic can run silently without user interaction
        when triggered automatically.
      status: completed
  - name: Safety & UX
    id: ux_02
    status: pending
    tasks:
    - id: ux_02_001
      name: Implement 'unarchive' command
      description: Add a way to easily bring a plan back to live/ if it was archived
        prematurely.
      status: completed
    - id: ux_02_002
      name: Add --no-archive flag
      description: Allow users/agents to suppress auto-archival if they want to keep
        the folder live for some reason.
      status: completed
  - name: Testing & Validation
    id: test_03
    status: pending
    tasks:
    - id: test_03_001
      name: Add integration tests for auto-trigger
      description: Verify that completing the last task of a plan actually moves the
        folder.
      status: completed
    - id: test_03_002
      name: Verify session list noise reduction
      description: Manually confirm that archived plans no longer appear in 'agentic
        plan list' or other live views.
      status: completed
