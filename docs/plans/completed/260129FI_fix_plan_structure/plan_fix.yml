_template_status: active
plan:
  name: Fix Plan Folder Structure
  worktree: /home/code/AgenticEngineering
  branch: main
  status: in_progress
  created: '2026-01-29'
  objective: 'Fix two plan folders (260129FI_auto_archive_plans, 260129UP_review_cli_movement_fixes)
    that have

    incorrect nested subdirectory structure. Update guidance to prevent this issue
    from recurring.

    '
  root_cause: 'The example template at modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/

    uses an outdated nested structure with live/ and completed/ subdirectories. The
    CLI expects

    plan_*.yml files directly in the plan folder root (flattened structure).

    '
  phases:
  - name: Update Guidance
    id: phase_guidance
    status: pending
    description: Fix the root cause by updating guidance examples and definitions
    tasks:
    - id: guidance_001
      name: Restructure example template folder
      status: completed
      description: 'Move plan files from nested subdirectories to folder root in the
        example template.

        - Move live/plan_example.yml to plan_example.yml

        - Move completed/plan_completed.yml to plan_completed.yml

        - Remove empty live/ and completed/ directories

        - Update README.md to show correct structure

        '
      target_files:
      - modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/
    - id: guidance_002
      name: Update plans.yml definition
      status: completed
      description: 'Clarify in plans.yml that plan_*.yml files must be in folder root.

        - Update file_taxonomy section

        - Remove confusing references to nested live/completed subdirectories

        - Add clear requirement statement

        '
      target_files:
      - modules/AgenticGuidance/assets/definitions/plans.yml
  - name: Restructure Broken Folders
    id: phase_fix
    status: pending
    description: Move files from nested subdirectories to folder root
    tasks:
    - id: fix_001
      name: Fix 260129FI_auto_archive_plans structure
      status: completed
      description: 'Restructure the auto_archive_plans folder:

        - Move live/plan_live_implementation.yml to plan_implementation.yml

        - Remove empty live/ and completed/ directories

        - Update README.md if needed

        '
      target_folder: docs/plans/live/260129FI_auto_archive_plans
    - id: fix_002
      name: Fix 260129UP_review_cli_movement_fixes structure
      status: completed
      description: 'Restructure the review_cli_movement_fixes folder:

        - Move live/plan_live_review.yml to plan_review.yml

        - Remove empty live/ and completed/ directories

        - Update README.md if needed

        '
      target_folder: docs/plans/live/260129UP_review_cli_movement_fixes
  - name: Verify CLI Detection
    id: phase_verify
    status: pending
    description: Confirm the CLI can detect and work with the fixed folders
    tasks:
    - id: verify_001
      name: Test CLI detection
      status: completed
      description: 'Verify CLI commands work with fixed folders:

        - Run agentic plan list and confirm all plans detected

        - Run agentic plan task current for each fixed plan

        - Confirm no errors

        '
