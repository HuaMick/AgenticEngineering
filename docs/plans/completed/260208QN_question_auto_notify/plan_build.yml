plan_id: 260208QN
plan_name: Question Auto-Notify on Creation
status: approved
created: '2026-02-08'
updated: '2026-02-09'
objective: "Wire ntfy push notifications directly into the question creation flow\
  \ so that\nblocking/high-severity questions notify the user's phone immediately\
  \ \u2014 without\nrequiring a manually started watcher daemon.\n\nCurrent state\
  \ (partially implemented by 260208NB):\n- cmd_ask() already calls _send_ntfy_if_configured()\
  \ and _ensure_reply_poller()\n- NtfyReplyPoller class exists in question_watcher.py\n\
  - Orchestration-executor guidance already tells agents to start watch-daemon\n\n\
  Remaining gaps (this plan):\n1. Severity filter: _send_ntfy_if_configured() sends\
  \ for ALL questions, but\n   only blocking/high should trigger phone notifications\
  \ (per Q3 resolution)\n2. cmd_ask() auto-notify should respect the severity filter\n\
  3. Tests for severity-gated notification behavior\n4. Verify orchestration-executor\
  \ guidance is correct (already done \u2014 lines 474-476)\n"
architecture_notes: "Decision log (pre-resolved open questions):\n- Q1: Add ntfy hook\
  \ in cmd_ask() directly (CLI-level, in session.py question command)\n  \u2192 Already\
  \ implemented in question.py cmd_ask() at lines 531-534\n- Q2: Update orchestration-executor\
  \ guidance to auto-start watch-daemon\n  \u2192 Already implemented in process.yml\
  \ guidelines at lines 474-476\n- Q3: Only blocking/high-severity questions trigger\
  \ phone notifications\n  \u2192 NOT YET IMPLEMENTED \u2014 this is the primary build\
  \ task\n- Q4: No circular dependency \u2014 keep ntfy in CLI module, simple hook\
  \ call in cmd_ask\n  \u2192 Architecture already correct, no changes needed\n\n\
  Hook location: agenticcli.commands.question._send_ntfy_if_configured()\nNotification\
  \ client: agenticcli.utils.ntfy.notify_new_question()\nReply poller: agenticcli.services.question_watcher.NtfyReplyPoller\n"
files_modified:
- modules/AgenticCLI/src/agenticcli/commands/question.py
- modules/AgenticCLI/tests/test_ntfy.py
- modules/AgenticCLI/tests/test_uat_e2e_notification_flow.py
phases:
- id: P1
  name: Add severity filter to auto-notify
  description: 'Gate ntfy push notifications so only blocking and high severity questions

    trigger phone notifications. Low and medium severity questions are still

    created and visible in the CLI/tmux but do not push to the phone.

    '
  tasks:
  - id: P1-T1
    name: Add severity gate in _send_ntfy_if_configured()
    status: completed
    file: modules/AgenticCLI/src/agenticcli/commands/question.py
    description: "In _send_ntfy_if_configured(), add a severity check before calling\n\
      notify_new_question(). Only questions with severity in (\"blocking\", \"high\"\
      )\nshould proceed to notification. Others are silently skipped.\n\nCurrent code\
      \ (lines 961-967):\n  for q in questions:\n      q_id = q.id if hasattr(q, \"\
      id\") else q.get(\"id\", \"\")\n      if not q_id or q_id in _ntfy_seen_question_ids:\n\
      \          continue\n      _ntfy_seen_question_ids.add(q_id)\n      success\
      \ = notify_new_question(topic, q, server)\n\nAdd after the dedup check, before\
      \ notify_new_question():\n  # Only notify for blocking/high severity (Q3 resolution)\n\
      \  q_severity = getattr(q, \"severity\", \"medium\").lower()\n  if q_severity\
      \ not in (\"blocking\", \"high\"):\n      logger.debug(\"Skipping ntfy for %s\
      \ (severity=%s)\", q_id, q_severity)\n      continue\n\nThis ensures:\n- blocking\
      \ \u2192 phone notification (urgent priority)\n- high \u2192 phone notification\
      \ (high priority)\n- medium \u2192 no phone notification\n- low \u2192 no phone\
      \ notification\n- The dedup set still tracks seen IDs to prevent re-notification\
      \ if\n  severity is later escalated\n"
    success_criteria:
    - blocking severity questions trigger ntfy notification
    - high severity questions trigger ntfy notification
    - medium severity questions do NOT trigger ntfy notification
    - low severity questions do NOT trigger ntfy notification
    - Dedup tracking still works correctly
    - No change to existing cmd_ask() call site
  - id: P1-T2
    name: Move dedup tracking after severity gate
    status: completed
    file: modules/AgenticCLI/src/agenticcli/commands/question.py
    description: "Adjust the dedup tracking so that question IDs are only added to\n\
      _ntfy_seen_question_ids AFTER passing the severity gate. This way,\nif a question\
      \ is later escalated from medium to high, it can still\nbe notified.\n\nRevised\
      \ loop logic:\n  for q in questions:\n      q_id = q.id if hasattr(q, \"id\"\
      ) else q.get(\"id\", \"\")\n      if not q_id or q_id in _ntfy_seen_question_ids:\n\
      \          continue\n\n      # Severity gate (Q3: only blocking/high)\n    \
      \  q_severity = getattr(q, \"severity\", \"medium\").lower()\n      if q_severity\
      \ not in (\"blocking\", \"high\"):\n          logger.debug(\"Skipping ntfy for\
      \ %s (severity=%s)\", q_id, q_severity)\n          continue\n\n      _ntfy_seen_question_ids.add(q_id)\n\
      \      success = notify_new_question(topic, q, server)\n"
    success_criteria:
    - IDs only added to dedup set when notification is actually sent
    - Medium/low questions not tracked in dedup (allows future escalation)
- id: P2
  name: Add tests for severity-gated notifications
  description: 'Add unit tests verifying the severity filter behavior and update

    existing tests that may assume all severities trigger notifications.

    '
  tasks:
  - id: P2-T1
    name: Add severity filter unit tests
    status: completed
    file: modules/AgenticCLI/tests/test_ntfy.py
    description: "Add a TestSeverityFilter test class (or add to existing test class)\n\
      with tests for _send_ntfy_if_configured() severity gating:\n\n1. test_blocking_severity_sends_notification:\n\
      \   Create a mock question with severity=\"blocking\", call\n   _send_ntfy_if_configured(),\
      \ verify notify_new_question is called.\n\n2. test_high_severity_sends_notification:\n\
      \   Same as above with severity=\"high\".\n\n3. test_medium_severity_skips_notification:\n\
      \   Create mock question with severity=\"medium\", call\n   _send_ntfy_if_configured(),\
      \ verify notify_new_question NOT called.\n\n4. test_low_severity_skips_notification:\n\
      \   Same as above with severity=\"low\".\n\n5. test_dedup_only_tracks_notified_questions:\n\
      \   Send a medium question, verify its ID is NOT in _ntfy_seen_question_ids.\n\
      \   Then send a blocking question, verify its ID IS in the set.\n\nUse monkeypatch\
      \ to mock _get_ntfy_config() to return a valid config,\nand mock notify_new_question\
      \ to track calls.\n"
    success_criteria:
    - All four severity levels tested
    - Dedup behavior tested for filtered vs notified questions
    - Tests mock at correct level (no real HTTP calls)
  - id: P2-T2
    name: Update E2E test for severity-aware auto-notify
    status: completed
    file: modules/AgenticCLI/tests/test_uat_e2e_notification_flow.py
    description: "The existing test_e2e_ask_notify_answer_flow() creates a question\n\
      with severity=\"high\" and asserts auto-notify was called. This test\nshould\
      \ still pass after the severity gate (high triggers notification).\n\nAdd one\
      \ new test:\n- test_e2e_medium_severity_no_auto_notify:\n  Create a question\
      \ with severity=\"medium\", verify that urlopen\n  is NOT called during cmd_ask()\
      \ (auto-notify skipped for medium).\n  Verify the question is still created\
      \ in pending/ (creation unaffected).\n\nAlso verify test_e2e_flow_with_ntfy_network_error\
      \ still passes\n(it uses severity=\"low\", so the auto-notify in cmd_ask should\
      \ be\nskipped entirely \u2014 the test creates the question first, then manually\n\
      calls notify_new_question which bypasses the filter).\n"
    success_criteria:
    - Existing high-severity E2E test still passes
    - New medium-severity test verifies no auto-notification
    - Question creation still works regardless of severity
    - No regressions in other E2E tests
