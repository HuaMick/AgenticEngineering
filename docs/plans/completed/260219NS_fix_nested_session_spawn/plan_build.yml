name: Fix nested session spawn - strip CLAUDECODE env var
status: active
priority: high
context: "When any agentic CLI command spawns a `claude` subprocess from inside an\n\
  existing Claude Code session, the child process inherits the CLAUDECODE\nenvironment\
  \ variable set by the parent session. Claude Code detects this\nvariable and refuses\
  \ to start:\n\n  Error: Claude Code cannot be launched inside another Claude Code\
  \ session.\n  Nested sessions share runtime resources and will crash all active\
  \ sessions.\n  To bypass this check, unset the CLAUDECODE environment variable.\n\
  \nThe fix is to strip CLAUDECODE (and CLAUDE_CODE_ENTRYPOINT) from the\nenvironment\
  \ dict passed to each subprocess spawn site that ultimately\ninvokes `claude`.\n\
  \nThe preferred approach is a centralised helper function in\nagenticcli/utils/subprocess_utils.py\
  \ that builds a clean env dict, then\nupdate every call site that spawns `claude`\
  \ to use it. Non-claude subprocess\ncalls (git, tmux, tail, python3 helper scripts,\
  \ etc.) do NOT need the\nstripped env because they are unaffected by CLAUDECODE.\n\
  \nCall sites that spawn `claude` (verified against current codebase after\ncommit\
  \ 5e26050 CLI restructuring):\n\n1. session.py :: _spawn_diagnostic_planner()\n\
  \   - subprocess.Popen at line 285\n2. session.py :: cmd_spawn() background mode\n\
  \   - subprocess.Popen at line 857\n3. session.py :: cmd_spawn() foreground Popen\
  \ mode\n   - subprocess.Popen at line 941\n4. loop.py :: cmd_start() background\
  \ mode\n   - subprocess.Popen at line 164\n5. loop.py :: cmd_start() foreground\
  \ mode\n   - subprocess.run at line 209\n6. plan.py :: cmd_new() status mode (spawns\
  \ planner via claude --print)\n   - subprocess.run at line 717\n7. plan.py :: cmd_new()\
  \ json mode (spawns planner via claude --print)\n   - subprocess.run at line 728\n\
  8. plan.py :: cmd_run() (spawns \"agentic session spawn\" which in turn\n   invokes\
  \ claude - env is inherited transitively)\n   - subprocess.Popen at line 888\n9.\
  \ orchestrate.py :: cmd_orchestrate() - four os.execvp(\"claude\", ...) calls\n\
  \   - Line 414: already-in-tmux branch\n   - Line 419: tmux not available branch\n\
  \   - Line 426: RuntimeError fallback branch\n   - Line 430: --no-tmux branch\n\
  \   NOTE: os.execvp replaces the current process; fix uses os.execvpe()\n   which\
  \ accepts an explicit env dict. The subprocess.Popen at line 214\n   in _run_planning_loop()\
  \ spawns sys.executable (Python), NOT claude,\n   so it does NOT need env stripping.\n\
  10. ralph.py :: start() (tmux new-session with claude shell command string)\n  \
  \  - subprocess.run at line 183\n    NOTE: tmux inherits the calling process env\
  \ for the new session. The\n    shell command string inside tmux will see CLAUDECODE.\
  \ Fix: pass a\n    modified env to the tmux subprocess.run call.\n\nEnv vars to\
  \ strip (conservative initial set):\n  - CLAUDECODE\n  - CLAUDE_CODE_ENTRYPOINT\
  \  (set by claude internals)\n\nThe helper should also be documented to make future\
  \ callers aware of it.\n"
success_criteria:
- A utility function `get_clean_env()` exists in /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/subprocess_utils.py
  that returns an os.environ copy with CLAUDECODE and CLAUDE_CODE_ENTRYPOINT removed.
- All subprocess.Popen and subprocess.run calls that spawn `claude` (or `agentic session
  spawn` which transitively invokes claude) in session.py, loop.py, and plan.py pass
  `env=get_clean_env()`.
- os.execvp calls in orchestrate.py are replaced with os.execvpe using the cleaned
  env dict.
- The tmux new-session call in ralph.py passes the cleaned env dict to subprocess.run
  so the tmux session does not inherit CLAUDECODE.
- Running `agentic session spawn --prompt "hello" -b` from inside a Claude Code session
  no longer produces the nested-session error.
- Existing unit tests continue to pass (no regressions).
- A smoke test or assertion confirms that the spawned process env does not contain
  CLAUDECODE.
