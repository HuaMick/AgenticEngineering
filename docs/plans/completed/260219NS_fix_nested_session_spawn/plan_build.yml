- id: P1
  name: Create centralised subprocess utility
  status: pending
  tasks:
  - id: P1_T1
    name: Create agenticcli/utils/subprocess_utils.py with get_clean_env()
    status: completed
    description: "Create a new utility module at:\n  /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/subprocess_utils.py\n\
      \nThe module must contain:\n\n```python\n\"\"\"Subprocess utilities for AgenticCLI.\n\
      \nProvides helpers for spawning subprocesses that strip Claude Code\ninternal\
      \ environment variables to prevent nested-session errors.\n\"\"\"\n\nimport\
      \ os\nfrom typing import Optional\n\n# Environment variables set by Claude Code\
      \ that must not be inherited\n# by child claude processes (causes nested-session\
      \ rejection).\n_CLAUDECODE_ENV_VARS = (\n    \"CLAUDECODE\",\n    \"CLAUDE_CODE_ENTRYPOINT\"\
      ,\n)\n\n\ndef get_clean_env(base_env: Optional[dict] = None) -> dict:\n    \"\
      \"\"Return a copy of the environment with Claude Code internal vars removed.\n\
      \n    Call this whenever spawning a `claude` subprocess from within an\n   \
      \ existing Claude Code session to prevent the nested-session error:\n      \
      \  \"Claude Code cannot be launched inside another Claude Code session.\"\n\n\
      \    Args:\n        base_env: Base environment dict to copy and strip. Defaults\
      \ to\n                  os.environ if not provided.\n\n    Returns:\n      \
      \  A new dict with CLAUDECODE and CLAUDE_CODE_ENTRYPOINT removed.\n    \"\"\"\
      \n    env = dict(base_env if base_env is not None else os.environ)\n    for\
      \ var in _CLAUDECODE_ENV_VARS:\n        env.pop(var, None)\n    return env\n\
      ```\n\nAlso update:\n  /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/utils/__init__.py\n\
      to export get_clean_env for convenient import (add to __all__ if it exists,\n\
      or add a direct import line).\n"
