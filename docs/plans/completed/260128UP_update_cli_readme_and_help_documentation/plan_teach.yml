_template_status: active
name: cli-docs-teach
worktree_path: /home/code/AgenticEngineering-cli-docs-update
worktree: cli-docs-update
status: pending
created: '2026-01-28'
summary: 'Update the AgenticCLI README.md documentation to accurately reflect all
  current

  CLI commands, subcommands, and options. The README serves as the primary reference

  for users and agents using the CLI.

  '
objective: 'Ensure the README.md in modules/AgenticCLI/ accurately documents:

  1. All current commands and their subcommands

  2. Correct syntax and options for each command

  3. Helpful examples for common workflows

  4. Accurate command categories (Global vs Project)

  '
scope:
  includes:
  - modules/AgenticCLI/README.md
  excludes:
  - Source code (handled in BUILD phase)
  - Help strings in code (handled in BUILD phase)
phases:
- phase_id: teach_01
  name: Audit Current Documentation
  description: Compare README content against actual CLI --help output
  status: pending
  estimated_effort: low
  tasks:
  - task_id: teach_01_001
    description: Run --help for all commands and compare to README
    status: completed
    guidance: 'Execute `agentic --help` and each subcommand --help, then compare

      output to README.md sections. Document discrepancies.


      Commands to check:

      - agentic --help (main)

      - agentic plan --help (and all subcommands)

      - agentic worktree --help

      - agentic config --help

      - agentic context --help (and all subcommands)

      - agentic entrypoint --help

      - agentic session --help

      - agentic loop --help

      - agentic langsmith --help

      - agentic manifest --help

      - agentic template --help

      - agentic stories --help

      - agentic inputs --help

      - agentic cicd --help

      - agentic state --help

      - agentic env --help

      - agentic setup --help

      - agentic health --help

      - agentic update --help

      - agentic rebuild --help

      '
    success_criteria:
    - Complete list of discrepancies documented
    - Missing commands identified
    - Incorrect syntax identified
- phase_id: teach_02
  name: Update README Sections
  description: Update README.md with accurate command documentation
  status: pending
  estimated_effort: medium
  depends_on:
  - teach_01
  tasks:
  - task_id: teach_02_001
    description: Add missing context command documentation
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The `context` command (CCI - CLI Context Injection) is not documented.

      Add a new section for context commands:


      ### context (ctx) - CLI Context Injection


      CLI Context Injection commands for agents to fetch exactly what they need.


      ```bash

      # Get seed context for agent initialization

      agentic context bootstrap [--role <role-id>]


      # Get role-specific process and guidelines

      agentic context role <role-id> [--format yaml|json]


      # Get active task from Main-First plan

      agentic context task [--all]


      # Get CCI manifest of relevant project files

      agentic context inputs --role <role-id> [--resolve]


      # Generate thin-client agent file from bootstrap

      agentic context generate-agent [options]

      ```

      '
    success_criteria:
    - context command section added to README
    - All subcommands documented with examples
  - task_id: teach_02_002
    description: Add missing entrypoint command documentation
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The `entrypoint` command is not fully documented. Add section:


      ### entrypoint (ep) - Workflow Entrypoints


      List, show, and execute entrypoint files for workflow starting points.


      ```bash

      # List all available entrypoints

      agentic entrypoint list

      agentic ep list


      # Show entrypoint contents

      agentic entrypoint show <name>

      agentic ep show _plan_build


      # Execute entrypoint with variable substitution

      agentic entrypoint execute <name> [--vars KEY=VALUE] [--context <text>]

      agentic ep execute orchestrate --context "Build new feature"


      # Compile complete context bundle

      agentic ep execute _plan_build --compile

      ```

      '
    success_criteria:
    - entrypoint command section added
    - All options documented including --compile
  - task_id: teach_02_003
    description: Add missing session command documentation
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The `session` command for Claude Code session management is not documented:


      ### session - Claude Code Session Management


      Spawn, list, stop, and monitor Claude Code sessions programmatically.


      ```bash

      # Spawn a new session

      agentic session spawn --prompt "Your task" [--max-turns N] [--background]


      # List sessions

      agentic session list [--active]


      # Stop a running session

      agentic session stop <session-id>


      # Get session status

      agentic session status <session-id>

      ```

      '
    success_criteria:
    - session command section added
    - All subcommands documented
  - task_id: teach_02_004
    description: Add missing loop command documentation
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The `loop` command for Ralph Loop management is not documented:


      ### loop - Ralph Loop Management


      Start, stop, and monitor Ralph Loop executions.


      ```bash

      # Start a new loop with prompt

      agentic loop start --prompt "Task description" [--max-iterations N]


      # Start loop from file

      agentic loop start --prompt-file task.txt


      # Start loop from entrypoint

      agentic loop start --entrypoint _orchestrate [--background]


      # Get loop status

      agentic loop status <loop-id>


      # Stop a running loop

      agentic loop stop <loop-id>


      # Show loop history

      agentic loop history

      ```

      '
    success_criteria:
    - loop command section added
    - All start options documented
  - task_id: teach_02_005
    description: Update plan task subcommands documentation
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The README shows `plan task start/complete` but missing newer commands:

      - prefill, list, status, add, update, current


      Update the plan section to include all task subcommands:


      ```bash

      # Task management

      agentic plan task list [--status pending|in_progress|completed]

      agentic plan task current

      agentic plan task start <task-id>

      agentic plan task complete <task-id>

      agentic plan task update <task-id> --status <status>

      agentic plan task add <description> [--phase <phase-id>]

      agentic plan task prefill --preset <preset-name> [--dry-run]

      agentic plan task status <task-id>

      ```

      '
    success_criteria:
    - All task subcommands documented
    - New commands like prefill, update, current included
  - task_id: teach_02_006
    description: Update command categories table
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The Command Categories table needs to be updated to include all commands

      and correct categorization:


      | Category | Scope | Commands |

      |----------|-------|----------|

      | **Global** | Any directory | setup, health, config, prefs, update, rebuild,
      state, env |

      | **Project** | Requires .git | worktree, plan, context, entrypoint, langsmith,
      inputs, template, stories, manifest, cicd, session, loop |

      '
    success_criteria:
    - Table includes all commands
    - Correct categorization (Global vs Project)
  - task_id: teach_02_007
    description: Update langsmith sessions subcommand documentation
    status: completed
    target_files:
    - modules/AgenticCLI/README.md
    guidance: 'The langsmith command has a `sessions` subcommand not documented:


      ```bash

      # List recent sessions with run counts

      agentic langsmith sessions [--project <name>] [--limit <n>]

      agentic ls sessions -p my-project -l 20

      ```

      '
    success_criteria:
    - langsmith sessions subcommand documented
- phase_id: teach_03
  name: Verify Documentation Accuracy
  description: Verify all documented commands work as described
  status: pending
  estimated_effort: low
  depends_on:
  - teach_02
  tasks:
  - task_id: teach_03_001
    description: Test documented command examples
    status: completed
    guidance: 'For each example in the README, verify:

      1. Command syntax is correct

      2. Example output matches description

      3. Options exist and work as documented

      '
    success_criteria:
    - All examples verified working
    - No broken command references
success_criteria:
- README.md accurately reflects all CLI commands
- All commands have documented examples
- Command categories table is complete and accurate
- New commands (context, entrypoint, session, loop) are documented
notes:
- Focus on README.md accuracy, not code changes
- Help string updates are in BUILD phase
- Coordinate with BUILD phase for any --help discrepancies
