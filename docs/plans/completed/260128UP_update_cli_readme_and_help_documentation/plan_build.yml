_template_status: active
name: cli-docs-build
worktree_path: /home/code/AgenticEngineering-cli-docs-update
worktree: cli-docs-update
status: pending
created: '2026-01-28'
summary: 'Update the --help output strings in the AgenticCLI source code to ensure

  consistency, accuracy, and helpfulness. This includes improving descriptions,

  adding examples where helpful, and ensuring help text matches README documentation.

  '
objective: 'Improve CLI --help output by:

  1. Ensuring all command descriptions are clear and accurate

  2. Adding helpful examples to complex commands

  3. Standardizing help text format across commands

  4. Matching help output to README documentation

  '
scope:
  includes:
  - modules/AgenticCLI/src/agenticcli/cli.py
  - modules/AgenticCLI/src/agenticcli/commands/*.py
  excludes:
  - README.md (handled in TEACH phase)
  - Business logic implementation
phases:
- phase_id: build_01
  name: Audit Help Strings
  description: Review all --help output and identify inconsistencies
  status: pending
  estimated_effort: low
  tasks:
  - task_id: build_01_001
    description: Capture all current --help output
    status: completed
    guidance: 'Run --help for all commands and subcommands, capturing output to review.

      Identify:

      - Inconsistent formatting

      - Missing descriptions

      - Unclear or unhelpful help text

      - Commands missing examples in epilog


      Focus on:

      - Main parser (cli.py)

      - Subcommand parsers in commands/ directory

      '
    success_criteria:
    - All --help output captured
    - Inconsistencies documented
    - Priority list of improvements created
- phase_id: build_02
  name: Update Main Parser Help
  description: Improve main agentic --help output with better organization
  status: pending
  estimated_effort: medium
  depends_on:
  - build_01
  tasks:
  - task_id: build_02_001
    description: Update main parser description and epilog in cli.py
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'The main parser is created in create_parser() function in cli.py.


      Update the epilog to include all command categories with clear organization:

      - Global Commands section

      - Project Commands section

      - Context Commands section (CCI)

      - Plan Task Commands section

      - Agent Bootstrap section

      - Entrypoint Commands section


      Ensure the epilog is formatted consistently and includes helpful examples.

      '
    success_criteria:
    - Main --help shows all command categories
    - Examples are helpful and accurate
    - Formatting is consistent
  - task_id: build_02_002
    description: Ensure all subparser help strings are descriptive
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'Each subparser added via add_parser() should have:

      - Clear help= text (shown in parent --help)

      - Descriptive description= text (shown in subcommand --help)


      Review and update all subparsers:

      - plan, worktree, config, langsmith, etc.

      - Nested subparsers (plan task, langsmith runs, etc.)

      '
    success_criteria:
    - All subparsers have help and description
    - Descriptions are meaningful, not just repeated names
- phase_id: build_03
  name: Update Command-Specific Help
  description: Improve help strings in individual command modules
  status: pending
  estimated_effort: medium
  depends_on:
  - build_02
  tasks:
  - task_id: build_03_001
    description: Update context command help strings
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: "The context command subparsers need clearer descriptions:\n\n- bootstrap:\
      \ \"Primary entrypoint for agents to self-initialize.\n              Aggregates:\
      \ Active Task + Role Guidance + Essential Inputs.\"\n- role: \"Returns process.yml\
      \ and manifest.yml content for a specific role.\"\n- task: \"Crawls the main\
      \ worktree's docs/plans/live/ to find active task.\"\n- inputs: \"Returns input\
      \ files for a role with path resolution.\"\n- generate-agent: \"Generate thin-client\
      \ agent file from bootstrap template.\"\n"
    success_criteria:
    - All context subcommands have clear descriptions
    - Help text explains what each command returns
  - task_id: build_03_002
    description: Update entrypoint command help strings
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: "Ensure entrypoint subcommands have helpful descriptions:\n\n- list:\
      \ \"Display all entrypoints from .claude/entrypoints/ and\n         modules/AgenticGuidance/entrypoints/.\"\
      \n- show: \"Show the full contents of an entrypoint file by name.\"\n- execute:\
      \ \"Read entrypoint, apply variable substitution, and output.\"\n\nAdd note\
      \ about --compile flag in execute help.\n"
    success_criteria:
    - All entrypoint subcommands have clear help
    - --compile flag is well documented
  - task_id: build_03_003
    description: Update session command help strings
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'Session command help should explain Claude Code integration:


      - spawn: "Spawn a new Claude Code session with a prompt."

      - list: "Display all Claude Code sessions with their status."

      - stop: "Stop a running session."

      - status: "Get session status."

      '
    success_criteria:
    - All session subcommands have clear help
    - Options are well documented
  - task_id: build_03_004
    description: Update loop command help strings
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'Loop command help should explain Ralph Loop concept:


      - start: "Start a Ralph Loop with a prompt from various sources."

      - stop: "Stop a running loop."

      - status: "Display detailed status of a loop including iteration progress."

      - history: "Show past loop executions."


      Ensure --entrypoint, --prompt-file options are well documented.

      '
    success_criteria:
    - All loop subcommands have clear help
    - Input options (prompt, prompt-file, entrypoint) are clear
  - task_id: build_03_005
    description: Update plan task subcommand help strings
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: 'Plan task subcommands need consistent, clear help:


      - start: "Mark task as in_progress"

      - complete: "Mark task as completed"

      - prefill: "Load preset task list from template"

      - list: "Show all tasks in current plan folder"

      - status: "Show detailed status for a specific task"

      - add: "Add new task to plan"

      - update: "Update task status in plan file"

      - current: "Get the current task to work on"

      '
    success_criteria:
    - All task subcommands have consistent help format
    - Help text is concise but informative
- phase_id: build_04
  name: Add Epilog Examples
  description: Add helpful examples to command epilogs where beneficial
  status: pending
  estimated_effort: low
  depends_on:
  - build_03
  tasks:
  - task_id: build_04_001
    description: Add examples to complex commands
    status: completed
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
    guidance: "Some commands benefit from epilog examples. Add examples to:\n\n1.\
      \ loop start - show different input methods:\n   Examples:\n     agentic loop\
      \ start --prompt \"Build feature\"\n     agentic loop start --prompt-file task.txt\n\
      \     agentic loop start --entrypoint _orchestrate\n\n2. entrypoint execute\
      \ - show variable substitution:\n   Examples:\n     agentic ep execute _plan_build\
      \ --compile\n     agentic ep execute orchestrate --vars PLAN_PATH=/path/to/plan\n\
      \n3. context bootstrap - show role usage:\n   Examples:\n     agentic context\
      \ bootstrap --role build-python\n     agentic ctx bootstrap -r planner-build\n\
      \nUse formatter_class=argparse.RawDescriptionHelpFormatter for epilogs.\n"
    success_criteria:
    - Complex commands have helpful examples
    - Examples are accurate and runnable
success_criteria:
- All --help output is clear and consistent
- Help text matches README documentation
- Complex commands include examples
- New commands (context, session, loop) have good help
notes:
- Focus on argparse help/description strings, not implementation
- Coordinate with TEACH phase for README alignment
- Test changes with --help after each update
