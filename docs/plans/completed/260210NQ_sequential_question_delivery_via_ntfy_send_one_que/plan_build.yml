plan_name: Sequential Question Delivery via ntfy
worktree: 260210NQ_sequential_question_delivery_via_ntfy_send_one_que
branch: main
status: planning
target_project_path: /home/code/AgenticEngineering
objective: >
  Replace batch-notify approach with sequential one-at-a-time question delivery
  via ntfy. Only the first pending question is sent as a notification. The user
  replies with an answer (letter or free text), then says 'next' to receive the
  next pending question. A new NtfyQuestionAgent service class handles all
  incoming ntfy replies with pattern-matching intent detection, maintaining a
  current-question pointer per plan in a state file.
context: >
  Currently all pending questions are sent as notifications at once via
  _send_ntfy_if_configured(). When the user replies from their phone, it's
  hard to know which question they're answering because multiple questions
  flood the phone simultaneously.


  The existing NtfyReplyPoller in question_watcher.py already handles polling
  and basic letter-to-answer mapping. This plan refactors that into a proper
  NtfyQuestionAgent that owns the question queue state, intent detection, and
  reply routing. The agent is a Python service class (not a Claude Code agent)
  that runs inside the watch-daemon process.


  The QuestionQueue service (agenticguidance.services.question) provides
  create_question, get_question, list_pending_questions, and answer_question
  methods. Questions live in questions/pending/ and questions/answered/ as
  YAML files with IDs like Q-YYYYMMDD-HHMMSS-XXXX.


  The ntfy utility module (agenticcli.utils.ntfy) provides send_ntfy,
  poll_ntfy, parse_question_id_from_message, and notify_new_question.

