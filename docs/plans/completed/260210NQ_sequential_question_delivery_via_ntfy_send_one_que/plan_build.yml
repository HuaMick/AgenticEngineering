    description: Implement intent detection with pattern matching in NtfyQuestionAgent
    status: pending
    file_inputs:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/services/ntfy_question_agent.py
    guidance: >
      Add an Intent enum and detect_intent function to ntfy_question_agent.py:


      ```python
      import enum
      import re

      class Intent(enum.Enum):
          ANSWER_LETTER = "answer_letter"      # Single letter A-J
          ANSWER_TEXT = "answer_text"           # Free-text answer
          NEXT_QUESTION = "next_question"       # 'next', 'next question', 'skip'
          LIST_QUESTIONS = "list_questions"     # 'list', 'how many'
          MORE_INFO = "more_info"              # 'discuss', 'more info', '?'

      # Patterns checked in order - first match wins
      _INTENT_PATTERNS: list[tuple[re.Pattern, Intent]] = [
          (re.compile(r'^(next|next question|skip)$', re.IGNORECASE), Intent.NEXT_QUESTION),
          (re.compile(r'^(list|how many|how many\?)$', re.IGNORECASE), Intent.LIST_QUESTIONS),
          (re.compile(r'^(discuss|more info|\?|details|explain)$', re.IGNORECASE), Intent.MORE_INFO),
          (re.compile(r'^[A-Ja-j]$'), Intent.ANSWER_LETTER),
      ]

      def detect_intent(text: str) -> Intent:
          text = text.strip()
          for pattern, intent in _INTENT_PATTERNS:
              if pattern.match(text):
                  return intent
          return Intent.ANSWER_TEXT  # Default: free-text answer
      ```


      Key design decisions:

      - Order matters: check command patterns before letter check so 'D' for
        'discuss' isn't misinterpreted (but 'discuss' is full word so safe)

      - Single character A-J only matches ANSWER_LETTER; multi-character strings
        default to ANSWER_TEXT even if they start with a letter

      - Case-insensitive matching for all command patterns

      - Extensible: voice transcriptions will use the same detect_intent function
    success_criteria:
