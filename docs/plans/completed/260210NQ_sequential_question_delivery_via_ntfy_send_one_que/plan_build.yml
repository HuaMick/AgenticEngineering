    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/services/ntfy_question_agent.py
    target_files:
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/services/question_watcher.py
    guidance: >
      Refactor NtfyReplyPoller._check_for_replies() to delegate to
      NtfyQuestionAgent instead of doing its own answer matching.


      Current behavior (lines 211-264): polls ntfy, parses QID from message,
      extracts answer text, maps letters, calls _answer_question directly.


      New behavior: polls ntfy, filters out outgoing messages, passes reply
      text to NtfyQuestionAgent.handle_reply() which handles everything.


      ```python
      def __init__(self, plan_path, topic, server="https://ntfy.sh", poll_interval=30):
          self._plan_path = plan_path
          self._topic = topic
          self._server = server
          self._poll_interval = poll_interval
          self._last_poll_time = str(int(time.time()))
          self._running = False
          self._thread = None
          self._processed_msg_ids: set[str] = set()
          # Create agent for reply handling
          from agenticcli.services.ntfy_question_agent import NtfyQuestionAgent
          self._agent = NtfyQuestionAgent(plan_path, topic, server)

      def _check_for_replies(self):
          from agenticcli.utils.ntfy import poll_ntfy

          messages = poll_ntfy(self._topic, since=self._last_poll_time,
                              server=self._server)
          if not messages:
              return

          self._last_poll_time = str(max(m.get("time", 0) for m in messages))

          for msg in messages:
              msg_id = msg.get("id", "")
              if msg_id in self._processed_msg_ids:
                  continue
              self._processed_msg_ids.add(msg_id)

              text = msg.get("message", "").strip()
              if not text:
                  continue

              # Skip outgoing notifications (sent by us)
              if text.startswith("Question ") or text.startswith("No more questions"):
                  continue
              if text.startswith("Answer Received") or text.startswith("Answer saved"):
                  continue

              # Delegate to agent
              try:
                  self._agent.handle_reply(text)
              except Exception as e:
                  logger.warning("Agent reply error: %s", e)
      ```


      Key changes:

      - Remove _answer_question method (logic moved to NtfyQuestionAgent)

      - Remove QID parsing from poller (agent uses state.current_question_id)

      - Remove letter mapping from poller (agent handles this)

      - Outgoing message filter updated for new notification formats

      - Keep poll_loop, start/stop, processed_msg_ids dedup unchanged
    success_criteria:
    - NtfyReplyPoller creates NtfyQuestionAgent in __init__
    - _check_for_replies delegates to agent.handle_reply for each message
    - _answer_question method removed from NtfyReplyPoller
    - QID parsing removed from poller (agent handles via state)
    - Letter mapping removed from poller (agent handles via intent detection)
    - Outgoing message filter updated for new notification title formats
    - poll_loop, start, stop methods unchanged
    - _processed_msg_ids dedup still works

