    - 'next', 'Next', 'NEXT QUESTION', 'skip' all return NEXT_QUESTION
    - 'list', 'how many' return LIST_QUESTIONS
    - 'discuss', 'more info', '?' return MORE_INFO
    - Single letters A-J (upper/lower) return ANSWER_LETTER
    - Multi-word text returns ANSWER_TEXT
    - Empty string after strip returns ANSWER_TEXT

