notes: >
  ## Key Design Decisions


  1. **Agent is a Python class, not an LLM agent**: NtfyQuestionAgent uses
     pattern matching for intent detection. No AI/LLM needed. The name reflects
     its autonomous decision-making role, not its implementation.


  2. **State file over in-memory state**: Using questions/ntfy_state.yml ensures
     state survives process restarts and is debuggable. Atomic writes prevent
     corruption from concurrent access.


  3. **Wait for 'next' after answer**: Don't auto-send the next question after
     answering. This gives the user control over pacing and prevents notification
     fatigue. The confirmation message includes a 'say next' hint.


  4. **Backward compatible first-question send**: When _send_ntfy_if_configured
     is called and no current question is active, it auto-sends the first pending
     question. This means the first question is still delivered automatically
     when asked — the user only needs to say 'next' for subsequent questions.


  5. **Outgoing message filter**: The poller skips messages that start with
     known notification prefixes ("Question ", "Answer Received", etc.) to
     avoid processing our own outgoing notifications as replies.


  6. **Voice-ready interface**: handle_reply(text) accepts any text string.
     When voice transcription is added later, transcribed text passes through
     the same detect_intent → handle flow without changes.


