      status: completed
      completed_at: '2026-02-01T20:02:12.324290'
    - id: CONF-02
      name: Flag --debug after conflicting shorthand
      description: Run 'agentic plan init test-branch -d Description --debug' and
        verify both work.
      status: completed
      completed_at: '2026-02-01T20:02:12.511007'
  test_strategy:
