    - id: POS-03
      name: Global flag at the very end
      description: Run 'agentic plan list -j' and verify JSON output.
      status: completed
      completed_at: '2026-02-01T20:02:08.815374'
  - id: test-02
    name: Conflict Validation
    status: pending
    tasks:
    - id: CONF-01
