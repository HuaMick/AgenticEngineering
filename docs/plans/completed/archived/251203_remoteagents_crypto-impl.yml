completedplan: /home/code/myagents/docs/plans/completed/251203_remoteagents_crypto-impl.yml

description: |
  Implement PyNaCl-based cryptographic operations that must match Flutter's pinenacl library.
  Provides X25519 key generation, encryption, and decryption functionality using the interfaces
  defined in shared-contracts. Focuses on NaCl box authenticated encryption only.

objectives:
  - Implement PyNaCl wrapper matching crypto interface types from shared-contracts
  - Ensure key format compatibility with Flutter pinenacl
  - Implement encryption/decryption using NaCl box primitives (matching shared-contracts signatures)
  - Validate against test vectors from shared-contracts

note: |
  CRITICAL: Crypto interfaces in shared-contracts have specific signatures:
  - encrypt(plaintext, their_public_key) -> tuple[Nonce, Ciphertext]
  - decrypt(ciphertext, nonce, their_public_key) -> bytes

  Signature operations (Ed25519) are NOT part of shared-contracts interfaces. Focus on
  X25519 encryption only. If signatures needed, add CryptoSigner protocol to shared-contracts first.

dependencies:
  requires:
    - shared-contracts
  blocks: []

success_criteria:
  - All crypto interface methods implemented with PyNaCl (KeyPair, CryptoBox, CryptoProvider)
  - Keys serialize/deserialize in pinenacl-compatible format (raw 32 bytes X25519)
  - Encryption returns tuple[Nonce, Ciphertext] matching shared-contracts signature
  - Decryption accepts (ciphertext, nonce, their_public_key) matching shared-contracts signature
  - All shared-contracts crypto test vectors pass

