  # ========================================
  # BUILD PHASE - PyNaCl Key Operations
  # ========================================
  - name: Build Phase - Key Operations
    execution_groups:
      - execution: sequential
        agents:
          # Key pair generation and serialization
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-crypto/src/agent_remote/shared/crypto/types.py
              - /home/code/myagents/RemoteAgents-crypto/src/agent_remote/shared/crypto/nacl_impl.py
            guidance: |
              Context: NaCl uses X25519 keys for encryption (32 bytes each). Keys must serialize
              to the exact format that Flutter pinenacl expects: raw 32-byte format, no headers.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents-crypto/src/agent_remote/shared/crypto/nacl_impl.py
              2. Import nacl.public (PyNaCl library)
              3. Implement NaClKeyPair class:
                 - Wraps nacl.public.PrivateKey
                 - Properties: public_key (bytes), private_key (bytes)
                 - Both return raw 32-byte format (use .encode(encoder=nacl.encoding.RawEncoder))
                 - Constructor accepts either PrivateKey object or raw 32-byte private key bytes
              4. Implement generate_keypair() function:
                 - Creates nacl.public.PrivateKey()
                 - Returns NaClKeyPair wrapping the key
              5. Implement keypair_from_bytes() function:
                 - Accepts private_key: bytes (32 bytes)
                 - Creates nacl.public.PrivateKey from raw bytes
                 - Returns NaClKeyPair
              6. Add validation:
                 - Verify keys are exactly 32 bytes
                 - Raise ValueError with clear message if wrong length
              7. Add docstrings explaining X25519 format and pinenacl compatibility

              Why this matters: Key format must be bitwise-identical to Flutter pinenacl or
              encryption/decryption will fail. Raw encoding (no base64 or headers) is critical.
            success_criteria:
              - generate_keypair() produces valid X25519 keys (32 bytes each)
              - keypair_from_bytes() reconstructs keypair from raw bytes
              - Keys serialize to raw 32-byte format (no encoding wrappers)
              - Validation rejects invalid key lengths with clear errors

  # ========================================
  # BUILD PHASE - PyNaCl Encryption
  # ========================================
  - name: Build Phase - Encryption Operations
    execution_groups:
      - execution: sequential
        agents:
          # Box encryption/decryption
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-crypto/src/agent_remote/shared/crypto/types.py
              - /home/code/myagents/RemoteAgents-crypto/src/agent_remote/shared/crypto/nacl_impl.py
            guidance: |
              Context: NaCl box provides authenticated encryption using Curve25519-XSalsa20-Poly1305.
              Per shared-contracts interface, encrypt() returns tuple[Nonce, Ciphertext] and decrypt()
              takes separate ciphertext, nonce, and their_public_key parameters.

              CRITICAL INTERFACE REQUIREMENTS (from shared-contracts):
              - encrypt(plaintext: bytes, their_public_key: PublicKey) -> tuple[Nonce, Ciphertext]
              - decrypt(ciphertext: Ciphertext, nonce: Nonce, their_public_key: PublicKey) -> bytes

              Instructions:
              1. Implement NaClBox class in nacl_impl.py:
                 - Constructor: __init__(keypair: NaClKeyPair)
                 - Stores the keypair for encryption/decryption operations
              2. Implement encrypt(plaintext: bytes, their_public_key: bytes) -> tuple[bytes, bytes]:
                 - Create nacl.public.PublicKey from their_public_key (raw bytes, 32 bytes)
                 - Create nacl.public.Box(our_private_key, their_public_key)
                 - Generate random nonce (24 bytes): nacl.utils.random(nacl.public.Box.NONCE_SIZE)
                 - Encrypt using box.encrypt(plaintext, nonce)
                 - CRITICAL: PyNaCl encrypt() returns nonce+ciphertext combined
                 - Extract nonce (first 24 bytes) and ciphertext (remaining bytes with MAC)
                 - Return tuple: (nonce, ciphertext) where ciphertext includes MAC
              3. Implement decrypt(ciphertext: bytes, nonce: bytes, their_public_key: bytes) -> bytes:
                 - Create nacl.public.PublicKey from their_public_key (32 bytes)
                 - Create nacl.public.Box(our_private_key, their_public_key)
                 - PyNaCl decrypt() expects combined nonce+ciphertext format
                 - Combine: combined = nonce + ciphertext
                 - Decrypt: box.decrypt(combined)
                 - Returns plaintext bytes
              4. Add error handling:
                 - Validate their_public_key is exactly 32 bytes
                 - Validate nonce is exactly 24 bytes
                 - Catch nacl.exceptions.CryptoError and raise ValueError("Decryption failed")
                 - Validate ciphertext minimum length (at least 16 bytes for MAC)
              5. Add docstrings explaining:
                 - Return format: (nonce, ciphertext) tuple where nonce is 24 bytes, ciphertext includes MAC
                 - Nonce is random per message, MUST be unique
                 - MAC provides authentication (Poly1305, 16 bytes appended to ciphertext)

              Why this matters: Signature MUST match shared-contracts interface exactly. Relay service
              will use EncryptedBlob with separate nonce and payload fields. Flutter pinenacl must
              receive same format.
            success_criteria:
              - encrypt() returns tuple[Nonce, Ciphertext] matching shared-contracts signature
              - decrypt() accepts (ciphertext, nonce, their_public_key) matching shared-contracts
              - Round trip works: decrypt(*encrypt(plaintext, pk), pk) == plaintext
              - Nonce is 24 bytes, ciphertext includes 16-byte MAC
              - Invalid inputs raise clear ValueError with validation messages

