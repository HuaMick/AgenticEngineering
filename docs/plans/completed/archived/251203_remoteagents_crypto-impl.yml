            guidance: |
              Context: Factory pattern provides clean interface for creating crypto objects per
              CryptoProvider protocol from shared-contracts. Utilities handle base64 encoding
              for transport over JSON/WebSocket (used by EncryptedBlob in relay messages).

              Instructions:
              1. Implement NaClProvider class in nacl_impl.py implementing CryptoProvider protocol:
                 - Method: generate_keypair() -> KeyPair (returns NaClKeyPair instance)
                 - Method: create_box(keypair: KeyPair) -> CryptoBox (returns NaClBox instance)
                 - REMOVED: generate_signing_keypair, create_signer (not in shared-contracts)
              2. Add utility functions in nacl_impl.py for base64 transport encoding:
                 - bytes_to_base64(data: bytes) -> str: base64.b64encode(data).decode('utf-8')
                 - base64_to_bytes(data: str) -> bytes: base64.b64decode(data)
                 - Used by relay service to encode nonce and ciphertext in EncryptedBlob JSON
              3. Update __init__.py to export:
                 - All Protocol types from types.py (KeyPair, CryptoBox, CryptoProvider)
                 - All type aliases (PublicKey, PrivateKey, Nonce, Ciphertext)
                 - NaClProvider factory (concrete implementation)
                 - NaClKeyPair, NaClBox classes (concrete implementations)
                 - Utility functions (bytes_to_base64, base64_to_bytes)
              4. Add module-level docstring in __init__.py:
                 - Explain PyNaCl wrapper implementing shared-contracts crypto interfaces
                 - Compatibility with Flutter pinenacl library (same NaCl box algorithm)
                 - Usage examples:
                   * Generate keypair using provider.generate_keypair()
                   * Create box using provider.create_box(keypair)
                   * Encrypt: nonce, ciphertext = box.encrypt(plaintext, their_public_key)
                   * Decrypt: plaintext = box.decrypt(ciphertext, nonce, their_public_key)
                   * Base64 encoding for JSON: bytes_to_base64(nonce), bytes_to_base64(ciphertext)
              5. Create convenience DEFAULT_PROVIDER constant:
                 - DEFAULT_PROVIDER = NaClProvider()
                 - Allows simple import: from agent_remote.shared.crypto import DEFAULT_PROVIDER

              Why this matters: NaClProvider implements CryptoProvider protocol for dependency
              injection. Base64 utilities ensure consistent encoding for EncryptedBlob JSON transport.
              Clean exports make package easy to use by relay/terminal services.
            success_criteria:
              - NaClProvider implements CryptoProvider protocol exactly
              - generate_keypair() and create_box() match protocol signatures
              - Base64 utilities handle encoding/decoding without corruption
              - All shared-contracts types exported from package
              - Module docstring includes correct usage examples
              - DEFAULT_PROVIDER available for simple usage

