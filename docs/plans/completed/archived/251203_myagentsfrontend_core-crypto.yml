                 - Dart: Export both key pairs to Base64
                 - Dart: Encrypt test message from Alice to Bob
                 - Dart: Export ciphertext as Base64
              3. Python script:
                 - Import Alice and Bob's keys from Base64
                 - Import ciphertext from Base64
                 - Decrypt using PyNaCl Box
                 - Verify plaintext matches original

              Test cases:
              - Simple ASCII: "Hello, World!"
              - Unicode: "Hello, 世界! 🌍"
              - JSON payload: {"type": "test", "data": 123}
              - Long text: 1KB paragraph

              Debugging:
              - If decryption fails, dump hex of both Dart and Python ciphertext
              - Compare byte-by-byte to find format differences
              - Check nonce position (first 24 bytes)
              - Check ciphertext length (includes 16-byte Poly1305 MAC)

              Report failures with:
              - Dart ciphertext (Base64)
              - Python error message
              - Hex dumps of both outputs

              Agent 4 - PyNaCl interop (Python encrypts, Dart decrypts):
              CRITICAL: Reverse direction interop test.

              Test setup:
              1. Python script generates KeyPair using PyNaCl
              2. Python script encrypts test message using PyNaCl Box
              3. Dart imports keys and ciphertext
              4. Dart decrypts using NaClCrypto.decrypt()
              5. Verify plaintext matches original

              Test cases:
              - Simple ASCII: "Hello from Python!"
              - Unicode: "Python 🐍 → Dart 🎯"
              - JSON payload: {"from": "python", "to": "dart"}
              - Long text: 5KB text file

              Python script structure:
              ```python
              from nacl.public import PrivateKey, Box
              import base64

              # Generate keys
              alice_private = PrivateKey.generate()
              bob_private = PrivateKey.generate()

              # Create box and encrypt
              box = Box(alice_private, bob_private.public_key)
              ciphertext = box.encrypt(b"test message")

              # Export for Dart (ciphertext includes nonce)
              print(base64.b64encode(ciphertext).decode())
              ```

              Debugging:
              - PyNaCl's Box.encrypt() returns: nonce || ciphertext (same format)
              - Verify Dart correctly splits nonce (first 24 bytes) from ciphertext
              - Check UTF-8 encoding matches (Python bytes → Dart String)

              Agent 5 - MessageEnvelope serialization and encryption:
