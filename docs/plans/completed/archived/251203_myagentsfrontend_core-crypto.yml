description: |
  E2E encryption using pinenacl package.
  CRITICAL: Must match PyNaCl format exactly for interoperability with RemoteAgents.

objectives:
  - Implement KeyPair class (X25519 key generation)
  - Implement NaClCrypto class with Box encryption
  - Create MessageEnvelope for protocol messages
  - Validate against RemoteAgents test vectors

dependencies:
  requires: [flutter-setup]
  blocks: [core-networking]

critical_requirements:
  - Format: nonce (24 bytes) || ciphertext || MAC (Poly1305)
  - Keys: 32 bytes each (public/private)
  - Transport: Base64 encoding
  - Must pass RemoteAgents test vectors

success_criteria:
  - Key pairs generate correctly (32-byte keys)
  - Encrypt/decrypt round-trip works
  - Interop test passes (Dart encrypts ↔ Python decrypts)

phases:
  # ========================================
  # BUILD PHASE
  # ========================================
  - name: Build Phase
    execution_groups:
      # Parallel execution: KeyPair and NaClCrypto can be implemented simultaneously
      - execution: parallel
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-core-crypto/lib/core/crypto/key_pair.dart
              - /home/code/myagents/MyAgentsFrontend-core-crypto/pubspec.yaml
            guidance: |
              Context: KeyPair manages X25519 key generation and storage for E2E encryption.
              Must use pinenacl package to match PyNaCl's behavior in RemoteAgents.

              Instructions:
              1. Verify pinenacl dependency is in pubspec.yaml (pinenacl: ^0.5.1)
              2. Create lib/core/crypto/ directory structure if needed
              3. Create lib/core/crypto/key_pair.dart with KeyPair class
              4. Import pinenacl package and use PrivateKey and PublicKey types
              5. Implement key generation:
                 - Static factory method: KeyPair.generate()
                 - Use PrivateKey.generate() from pinenacl for X25519 key generation
                 - Store 32-byte private key as Uint8List
                 - Derive 32-byte public key from private key
              6. Implement serialization methods:
                 - toBase64(): Export keys as Base64 strings for transport
                   - Use base64Encode() from dart:convert
                   - Return Map<String, String> with 'privateKey' and 'publicKey' fields
                 - fromBase64(): Static factory to import keys from Base64 strings
                   - Accept Map<String, String> with Base64-encoded keys
                   - Use base64Decode() to convert to Uint8List
                   - Reconstruct PrivateKey and PublicKey objects
              7. Add validation methods:
                 - Private key length check (must be exactly 32 bytes)
                 - Public key length check (must be exactly 32 bytes)
                 - Public key derivation verification (ensure derived key matches stored key)
              8. Add getters for raw bytes (if needed for crypto operations):
                 - privateKeyBytes: Uint8List getter
                 - publicKeyBytes: Uint8List getter

              Key Format Details:
              - X25519 private keys: 32 bytes (256 bits)
              - X25519 public keys: 32 bytes (256 bits)
              - Base64 encoding for transport/storage
              - Must match PyNaCl's PrivateKey and PublicKey format

              Why this matters: Key pair must match PyNaCl format for cross-language
              encryption. Any format mismatch will break pairing with RemoteAgents.

              Files to create:
              - lib/core/crypto/key_pair.dart

              Files to verify:
              - pubspec.yaml (ensure pinenacl dependency exists)
            success_criteria:
              - KeyPair class generates valid X25519 key pairs
              - Keys are exactly 32 bytes each
              - toBase64/fromBase64 round-trip preserves keys
              - Public key derives correctly from private key
              - Format matches PyNaCl (verified with test vectors)

          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-core-crypto/lib/core/crypto/nacl_crypto.dart
              - /home/code/myagents/MyAgentsFrontend-core-crypto/lib/core/crypto/key_pair.dart
              - /home/code/myagents/MyAgentsFrontend-core-crypto/pubspec.yaml
            guidance: |
              Context: NaClCrypto implements Box encryption using pinenacl.
              CRITICAL: Output format must match PyNaCl exactly (nonce || ciphertext).
              Box encryption automatically includes Poly1305 MAC in the ciphertext.

              Instructions:
              1. Verify pinenacl dependency is in pubspec.yaml (pinenacl: ^0.5.1)
              2. Create lib/core/crypto/nacl_crypto.dart with NaClCrypto class
              3. Import pinenacl's Box class for encryption
              4. Implement encrypt(String plaintext, KeyPair ourKeys, KeyPair recipientKeys):
                 - Convert plaintext String to UTF-8 bytes (utf8.encode())
                 - Create Box with our private key + recipient's public key
                   - Box constructor: Box(myPrivateKey: ourKeys.privateKey, theirPublicKey: recipientKeys.publicKey)
                 - Generate 24-byte random nonce using Box's nonce generation
                   - Or use pinenacl's Nonce.generate()
                 - Encrypt plaintext bytes to get ciphertext
                   - box.encrypt(plaintextBytes, nonce: nonce)
                 - Concatenate: nonce (24 bytes) || ciphertext (includes Poly1305 MAC)
                 - Encode result as Base64 for transport
                 - Return Base64-encoded string
              5. Implement decrypt(String ciphertextBase64, KeyPair ourKeys, KeyPair senderKeys):
                 - Decode Base64 to bytes (base64Decode())
                 - Split bytes: first 24 bytes = nonce, rest = ciphertext
                   - nonceBytes = bytes.sublist(0, 24)
                   - ciphertextBytes = bytes.sublist(24)
                 - Create Box with our private key + sender's public key
                   - Box constructor: Box(myPrivateKey: ourKeys.privateKey, theirPublicKey: senderKeys.publicKey)
                 - Decrypt ciphertext using nonce
                   - box.decrypt(ciphertextBytes, nonce: Nonce(nonceBytes))
                 - Convert decrypted bytes to String (utf8.decode())
                 - Return plaintext string
              6. Format validation:
                 - Verify nonce is exactly 24 bytes before encryption
                 - Verify concatenation is: nonce || ciphertext (not ciphertext || nonce)
                 - Verify Base64 encoding/decoding works correctly
                 - Handle errors: invalid Base64, wrong nonce length, decryption failure
              7. Error handling:
                 - Throw FormatException for invalid Base64
                 - Throw ArgumentError for invalid nonce length
                 - Throw CryptoException for decryption failures (wrong keys, corrupted data)

              PyNaCl Box Format Details:
              - Nonce: 24 bytes (192 bits), randomly generated per message
              - Ciphertext: Variable length, includes Poly1305 MAC (16 bytes at end)
              - Transport format: Base64-encoded (nonce || ciphertext)
              - Box uses X25519-XSalsa20-Poly1305 cipher suite

              Why this matters: Format must match PyNaCl's Box encryption exactly.
              RemoteAgents uses PyNaCl on Python side. Any mismatch breaks decryption.

              Files to create:
              - lib/core/crypto/nacl_crypto.dart

              Files to reference:
              - lib/core/crypto/key_pair.dart (for KeyPair type)

              Files to verify:
              - pubspec.yaml (ensure pinenacl dependency exists)
            success_criteria:
              - Encrypt/decrypt round-trip works with same key pairs
              - Nonce is exactly 24 bytes
              - Format is nonce || ciphertext (verified with hex dump)
              - Base64 encoding for transport works correctly
              - Ciphertext includes Poly1305 MAC automatically

      # Sequential execution: MessageEnvelope depends on both KeyPair and NaClCrypto
      - execution: sequential
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-core-crypto/lib/core/crypto/message_envelope.dart
              - /home/code/myagents/MyAgentsFrontend-core-crypto/lib/core/crypto/key_pair.dart
              - /home/code/myagents/MyAgentsFrontend-core-crypto/lib/core/crypto/nacl_crypto.dart
            guidance: |
              Context: MessageEnvelope wraps protocol messages with encryption metadata.
              Used by networking layer for all client-relay communication with RemoteAgents.

              Instructions:
              1. Create lib/core/crypto/message_envelope.dart with MessageEnvelope class
              2. Define message structure matching RemoteAgents protocol:
                 {
                   "type": "terminal_input" | "terminal_output" | "resize" | "pairing_request",
                   "payload": <encrypted_data_base64>,
                   "sender_public_key": <base64>,
                   "timestamp": <iso8601>
                 }
              3. Define MessageType enum:
                 - terminalInput: User input to remote terminal
                 - terminalOutput: Terminal output from remote agent
                 - resize: Terminal dimension changes
                 - pairingRequest: Initial pairing handshake
              4. Implement MessageEnvelope class:
                 - Fields: MessageType type, String payload, String senderPublicKey, DateTime timestamp
                 - Constructor: MessageEnvelope({required type, required payload, required senderPublicKey, DateTime? timestamp})
                   - If timestamp is null, use DateTime.now()
              5. Implement fromJson factory constructor:
                 - Parse JSON map to MessageEnvelope
                 - Convert "type" string to MessageType enum
                 - Parse "timestamp" ISO 8601 string to DateTime
                 - Validate required fields exist
              6. Implement toJson method:
                 - Convert MessageEnvelope to JSON map
                 - Convert MessageType enum to string
                 - Convert DateTime to ISO 8601 string (timestamp.toIso8601String())
              7. Integrate with NaClCrypto for encryption:
                 - Static factory: MessageEnvelope.seal(MessageType type, Map<String, dynamic> payloadData, KeyPair ourKeys, KeyPair recipientKeys)
                   - Convert payloadData to JSON string (jsonEncode())
                   - Encrypt JSON string using NaClCrypto.encrypt()
                   - Store encrypted Base64 string in payload field
                   - Include our public key in senderPublicKey field
                   - Create MessageEnvelope with type, payload, senderPublicKey, timestamp
              8. Implement decryption method:
                 - Method: Map<String, dynamic> open(KeyPair ourKeys, KeyPair senderKeys)
                   - Decrypt payload using NaClCrypto.decrypt()
                   - Parse decrypted JSON string to Map (jsonDecode())
                   - Return payload data as Map
              9. Support all message types:
                 - terminal_input payload: {"input": "command text"}
                 - terminal_output payload: {"output": "terminal response"}
                 - resize payload: {"cols": 80, "rows": 24}
                 - pairing_request payload: {"pairing_code": "ABC123"}

              Protocol Compatibility:
              - Must match RemoteAgents message format exactly
              - Timestamp format: ISO 8601 (YYYY-MM-DDTHH:MM:SS.sssZ)
              - Payload is always encrypted (even for pairing_request)
              - sender_public_key is Base64-encoded 32-byte public key

              Why this matters: Standard envelope for all encrypted messages between
              frontend and RemoteAgents. Provides type safety and encryption metadata.

              Files to create:
              - lib/core/crypto/message_envelope.dart

              Files to reference:
              - lib/core/crypto/key_pair.dart (for key serialization)
              - lib/core/crypto/nacl_crypto.dart (for encryption/decryption)
            success_criteria:
              - MessageEnvelope serializes to JSON correctly
              - toJson/fromJson round-trip preserves data
              - seal() encrypts payload using NaClCrypto
              - open() decrypts payload correctly
              - All message types supported (terminalInput, terminalOutput, resize, pairingRequest)
              - Timestamp format is ISO 8601
              - sender_public_key is included and valid

