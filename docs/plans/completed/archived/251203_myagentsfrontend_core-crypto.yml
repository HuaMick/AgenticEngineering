                - terminalInput with payload: {"input": "ls -la"}
                - terminalOutput with payload: {"output": "file1\nfile2"}
                - resize with payload: {"cols": 120, "rows": 30}
                - pairingRequest with payload: {"pairing_code": "TEST123"}
              - Test toJson/fromJson round-trip for each type:
                - Convert to JSON
                - Parse back to MessageEnvelope
                - Verify all fields match
              - Test seal/open with KeyPairs:
                - Generate two KeyPairs (client, server)
                - Seal message from client to server
                - Verify payload is encrypted (Base64, not plaintext JSON)
                - Open message as server
                - Verify decrypted payload matches original
              - Verify sender_public_key is included:
                - Check field exists in JSON
                - Verify it's Base64-encoded 32-byte key
              - Verify timestamp format is ISO 8601:
                - Check format: YYYY-MM-DDTHH:MM:SS.sssZ
                - Parse timestamp back to DateTime
              - Test error handling:
                - Invalid JSON (malformed)
                - Missing required fields
                - Invalid message type
                - Corrupted encrypted payload
                - Wrong sender public key (decryption should fail)

