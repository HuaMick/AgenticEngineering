name: RemoteAgents Terminal Service
worktree: /home/code/myagents/RemoteAgents-terminal
branch: terminal-service
status: completed
liveplan: /home/code/myagents/docs/plans/live/251203_remoteagents_terminal-service.yml
completedplan: /home/code/myagents/docs/plans/completed/251203_remoteagents_terminal-service.yml

description: |
  Implement the PTY (pseudo-terminal) wrapper that manages Claude Code CLI sessions.
  Handles process lifecycle, input/output streaming, and protocol translation between
  PTY streams and RemoteAgents messages.

objectives:
  - Implement PTYManager domain for process lifecycle management
  - Build TerminalWorkflow for CLI session handling
  - Integrate ptyprocess for PTY spawning and I/O
  - Implement bidirectional stream translation (PTY <-> protocol messages)
  - Add cleanup and error handling for process termination

dependencies:
  requires:
    - shared-contracts
  blocks:
    - cli-integration

success_criteria:
  - PTY spawns Claude Code CLI successfully
  - Input streams from client to CLI correctly
  - Output streams from CLI to client with proper formatting
  - Process cleanup occurs on session termination
  - Service passes integration tests with mock relay

