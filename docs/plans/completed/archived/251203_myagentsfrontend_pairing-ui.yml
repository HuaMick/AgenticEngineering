          - type: audit
            inputs:
              - /home/code/myagents/MyAgents-staging/src/myagents/frontend/agents/test/processes/audit.yml
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_state.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_controller.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_screen.dart
            guidance: |
              Context: Implementation and testing are complete. This audit verifies code quality,
              test coverage, and checks for reward hacking patterns.

              Audit Process: Execute audit.yml process from frontend/agents/test/processes/
              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251203_myagentsfrontend_pairing-ui.yml

              Audit Focus Areas:

              1. Code Quality:
              - State management: Is PairingState truly immutable? Is copyWith implemented correctly?
              - Controller: Is ChangeNotifier used properly? Are listeners notified correctly?
              - Error handling: Are errors caught and displayed clearly?
              - Resource cleanup: Is dispose() implemented and called?
              - Input validation: Is validation thorough and user-friendly?

              2. Test Quality:
              - Coverage: Are all code paths tested (success, error, edge cases)?
              - Mocking: Are mocks used appropriately (not mocking behavior being tested)?
              - Assertions: Are assertions specific and meaningful?
              - Test independence: Do tests run independently without side effects?
              - Edge cases: Are boundary conditions tested (empty input, max length, special chars)?

              3. Architecture Compliance:
              - Separation of concerns: Is state separate from UI logic?
              - Dependency flow: Does UI depend on controller, controller on state?
              - Provider pattern: Is ChangeNotifierProvider used correctly?
              - Navigation: Is routing handled properly without tight coupling?

              4. Reward Hacking Patterns:
              - Tests that mock the behavior they should be testing
              - Tests with overly permissive assertions ("contains" instead of "equals")
              - Missing negative test cases (what shouldn't happen)
              - Tests that check implementation details instead of behavior
              - Validation that accepts invalid input

              5. UX Quality:
              - Input feedback: Does user get immediate feedback on invalid input?
              - Loading states: Is it clear when connection is in progress?
              - Error messages: Are errors actionable (tell user what to do)?
              - Success flow: Is navigation smooth and immediate on success?

              Findings Reporting Format:
              Add findings to live plan under pairing_audit_findings with structure:
              - finding_type: "code_quality", "test_quality", "architecture_violation", "reward_hacking", "ux_issue"
              - component: Component with issue (PairingState, PairingController, PairingScreen, Tests)
              - description: What was found
              - severity: "high", "medium", "low"
              - recommendation: What should be fixed
              - affects: "code" or "tests" or "both"
            success_criteria:
