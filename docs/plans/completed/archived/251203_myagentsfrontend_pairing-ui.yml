name: Pairing UI
worktree: /home/code/myagents/MyAgentsFrontend-pairing
branch: pairing-ui
status: completed
liveplan: /home/code/myagents/docs/plans/live/251203_myagentsfrontend_pairing-ui.yml
completedplan: /home/code/myagents/docs/plans/completed/251203_myagentsfrontend_pairing-ui.yml

description: |
  Session pairing screen with code input and connection flow.
  Entry point for connecting to a Claude Code session.

objectives:
  - Implement PairingScreen with code input field
  - Connect button with loading state
  - Status display (connecting, connected, error)
  - Navigate to TerminalScreen on successful pairing

dependencies:
  requires: [core-networking]

success_criteria:
  - Can enter 6-character pairing code
  - Connects to relay via pairing code
  - Displays clear status feedback
  - Navigates to terminal on success

phases:
  # ========================================
  # BUILD PHASE
  # ========================================
  - name: Build Phase
    execution_groups:
      # Sequential execution: State management, controller, then screen
      - execution: sequential
        agents:
          # Agent 1: Pairing state management
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_state.dart
            guidance: |
              Context: PairingState defines the data model and state transitions for pairing flow.
              This is the foundation that PairingController will use for state management.

              Instructions:
              1. Create lib/features/pairing/pairing_state.dart
              2. Define ConnectionState enum:
                 - idle: Initial state before connection attempt
                 - connecting: Connection in progress
                 - connected: Successfully connected
                 - error: Connection failed
              3. Define PairingState class:
                 - pairingCode: String (current input value)
                 - connectionState: ConnectionState (current connection state)
                 - errorMessage: String? (error details if connection fails)
              4. Add validation helper:
                 - isValidCode: bool getter (checks if code is 6 alphanumeric characters)
                 - canConnect: bool getter (returns true if code is valid and not currently connecting)
              5. Add state factory methods:
                 - copyWith() for immutable updates
                 - initial() factory constructor for default state

              Why this matters: Clean state management prevents UI bugs and makes testing easier.
              State object is separate from controller logic for better testability.

              Files to create:
              - lib/features/pairing/pairing_state.dart
            success_criteria:
              - PairingState class compiles without errors
              - All state transitions defined clearly
              - Validation helpers work correctly
              - State is immutable (copyWith pattern)

          # Agent 2: Pairing controller
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_controller.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_state.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/core/networking/relay_client.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/core/crypto/key_pair.dart
            guidance: |
              Context: PairingController manages pairing flow and connection logic.
              Orchestrates key generation, relay connection, and state transitions.
              Uses PairingState for state management.

              Instructions:
              1. Create lib/features/pairing/pairing_controller.dart
              2. Extend ChangeNotifier for reactive state updates
              3. Implement state management:
                 - Private _state: PairingState field
                 - Public state getter
                 - setState() method that calls notifyListeners()
              4. Implement updateCode(String code) method:
                 - Update pairingCode in state
                 - Auto-uppercase the input
                 - Limit to 6 characters max
                 - Validate alphanumeric only
              5. Implement connect() async method:
                 - Guard: Return early if !state.canConnect
                 - Set state to connecting
                 - Generate client KeyPair using KeyPair.generate()
                 - Create RelayClient instance with KeyPair
                 - Connect to wss://{relay}/ws/client/{pairingCode}
                 - On success: Set state to connected, store RelayClient
                 - On error: Set state to error with error message
              6. Add dispose() method to clean up resources
              7. Error handling:
                 - Catch connection errors and set clear error messages
                 - Handle invalid pairing codes (404 from relay)
                 - Handle network errors (connection timeout)

              Why this matters: Pairing is the gateway to remote terminal.
              Must be reliable and handle errors gracefully.

              Files to create:
              - lib/features/pairing/pairing_controller.dart

              Files to reference:
              - lib/features/pairing/pairing_state.dart (state model)
              - lib/core/networking/relay_client.dart (connection)
              - lib/core/crypto/key_pair.dart (key generation)
            success_criteria:
              - Controller compiles without errors
              - State updates trigger notifyListeners()
              - Code validation enforces 6-character alphanumeric
              - Connection flow handles success and error paths
              - RelayClient created correctly on successful connection

          # Agent 3: Pairing screen UI
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_screen.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_controller.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/features/pairing/pairing_state.dart
              - /home/code/myagents/MyAgentsFrontend-pairing/lib/routing/router.dart
            guidance: |
              Context: PairingScreen is the entry point UI for connecting to remote session.
              Replaces placeholder screen created in flutter-setup.
              Uses ChangeNotifierProvider to connect to PairingController.

              Instructions:
              1. Replace lib/features/pairing/pairing_screen.dart (existing placeholder)
              2. Wrap screen with ChangeNotifierProvider<PairingController>
              3. UI layout structure (Column, centered):
                 - Spacer (push content to center)
                 - App title: "Claude Remote Terminal" (Text, fontSize: 24, fontWeight: bold)
                 - SizedBox(height: 48) (spacing)
                 - Pairing code input field
                 - SizedBox(height: 16)
                 - Connect button
                 - SizedBox(height: 16)
                 - Status message (conditional based on state)
                 - Spacer (push content to center)
              4. Pairing code input field:
                 - TextField with TextEditingController
                 - maxLength: 6 (enforced)
                 - textCapitalization: TextCapitalization.characters
                 - inputFormatters: [FilteringTextInputFormatter.allow(RegExp(r'[A-Za-z0-9]'))]
                 - style: TextStyle(fontSize: 32, fontFamily: 'Courier', letterSpacing: 4)
                 - textAlign: TextAlign.center
                 - decoration: InputDecoration with border, hintText: "ABC123"
                 - onChanged: (value) => controller.updateCode(value)
              5. Connect button:
                 - ElevatedButton with large size (width: 200, height: 48)
                 - text: "Connect" or CircularProgressIndicator (if connecting)
                 - onPressed: state.canConnect ? controller.connect : null (disabled if invalid)
                 - Color changes based on state (normal, loading, success)
              6. Status message (below button):
                 - Consumer<PairingController> to rebuild on state change
                 - Show different messages based on connectionState:
                   - idle: Empty (no message)
                   - connecting: "Connecting to session..." (gray text)
                   - connected: "Connected! Redirecting..." (green text, bold)
                   - error: state.errorMessage (red text, bold)
              7. Navigation on success:
                 - Listen to controller state changes
                 - When state.connectionState == ConnectionState.connected:
                   - Navigate to /terminal route using context.go('/terminal')
                   - Pass RelayClient via Provider to TerminalScreen
              8. Dispose controller when screen is disposed

              Why this matters: First impression for users. Must be intuitive and
              provide clear feedback during connection.

              Files to replace:
              - lib/features/pairing/pairing_screen.dart

              Files to reference:
              - lib/features/pairing/pairing_controller.dart (controller)
              - lib/features/pairing/pairing_state.dart (state model)
              - lib/routing/router.dart (navigation)
            success_criteria:
              - PairingScreen builds without errors
              - Input field enforces 6-character alphanumeric limit
              - Input auto-uppercases
              - Connect button disabled until valid code entered
              - Loading spinner shows during connection
              - Status messages display correctly based on state
              - Navigation to /terminal occurs on successful connection
              - UI is responsive and feels polished

