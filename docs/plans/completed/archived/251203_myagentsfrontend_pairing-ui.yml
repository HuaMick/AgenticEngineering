  # TEST 1: Invalid pairing code - server rejects connection
  - test_name: "Invalid pairing code - server rejects connection"
    test_file: test/features/pairing/pairing_controller_integration_error_test.dart
    line_number: 247
    skip_reason: "Dispose hangs after rejected connection - covered by other error tests"

    analysis:
      root_cause: "RelayClient dispose() doesn't complete cleanly when WebSocket connection is rejected at HTTP level (400 Bad Request). The channel.sink.close() call waits indefinitely for cleanup that never completes."

      functionality_tested: "Tests that server rejection of invalid pairing code (HTTP 400) is handled properly and client transitions to error state."

      coverage_status: "REDUNDANT - Already covered by passing tests"
      coverage_evidence:
        - test: "Network error - server not running (production URL unreachable)"
          file: "pairing_controller_integration_error_test.dart:37"
          status: "PASSING"
          covers: "Error state transitions and error message formatting"
        - test: "Network error - server not started (connection refused)"
          file: "pairing_controller_integration_error_test.dart:300"
          status: "PASSING"
          covers: "Connection failure handling and state transitions to error"
        - test: "Error message is user-friendly for network issues"
          file: "pairing_controller_integration_error_test.dart:137"
          status: "PASSING"
          covers: "Error message user-friendliness and content validation"

      is_critical: false
      is_redundant: true

    disposition: "DECOMMISSION"
    justification: |
      This test is redundant. The specific scenario of server rejection (HTTP 400)
      vs connection refused (connection error) both flow through the same error
      handling path in PairingController and RelayClient. The passing tests already
      verify:
      1. Error state transitions work correctly
      2. Error messages are user-friendly
      3. State recovery after error works

      The MockRelayServer rejection mechanism is tested at the HTTP level in
      MockRelayServer's own tests. Testing it again at the integration level
      provides no additional coverage given the dispose() issue makes the test
      unreliable.

    recommended_action: "Remove test - functionality is adequately covered"

