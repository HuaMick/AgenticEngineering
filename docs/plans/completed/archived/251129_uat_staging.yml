# ==============================================================================
# UAT TEST SCENARIOS
# ==============================================================================

uat_scenarios:
  - id: UAT-001
    name: Fresh Developer Setup
    description: "New developer clones repo and runs tests following only README"
    user_persona: "Junior developer, no MyAgents experience"

  - id: UAT-002
    name: CI/CD Pipeline Execution
    description: "Developer pushes code and observes CI/CD pipeline behavior"
    user_persona: "Developer with basic git knowledge"

  - id: UAT-003
    name: Test Execution Modes
    description: "Developer runs tests in unit, quick, and full modes"
    user_persona: "QA engineer testing different scopes"

  - id: UAT-004
    name: Docker Development Workflow
    description: "Developer builds and runs containers locally"
    user_persona: "Backend developer familiar with Docker"

  - id: UAT-005
    name: Testmon Selective Testing
    description: "Developer makes changes and runs testmon-filtered tests"
    user_persona: "Experienced developer optimizing test runs"

# ==============================================================================
# PHASES
# ==============================================================================

phases:
  # ========================================
  # UAT TEST PHASE - User Simulation Agents
  # ========================================
  - name: UAT Test Phase
    execution_groups:
      - execution: test-fix-loop
        name: User Simulation Testing
        agents:
          # Parallel user simulator agents - one per UAT scenario
          - type: test
            count: 5
            process: src/myagents/frontend/agents/test/processes/user_simulator.yml
            inputs:
              - /home/code/myagents/MyAgents-staging/docs/README.md
              - /home/code/myagents/MyAgents-staging/docs/architecture/architecture.md
            guidance: |
              Test Strategy: agent-blind-test (user simulation)
              Test Process: Execute user_simulator.yml - discover and test using only documentation

              USER SIMULATION SCENARIOS (distribute across 5 agents):

              Agent 1 - UAT-001 Fresh Developer Setup:
              Persona: Junior developer, first time with MyAgents
              Starting State: Fresh clone of MyAgents-staging branch
              Test Journey:
              1. Read README.md (follow instructions exactly as written)
              2. Discover how to install dependencies (look for pipx, uv, or pip instructions)
              3. Discover how to run tests (look for pytest or test commands)
              4. Execute test command with defaults
              5. Verify tests pass or report clear errors
              Expected Outcome: Tests run successfully following docs alone
              Report As Failure: Missing/unclear instructions, unexpected errors

              Agent 2 - UAT-002 CI/CD Pipeline:
              Persona: Developer with basic git knowledge
              Starting State: Working copy of MyAgents-staging
              Test Journey:
              1. Read CI/CD documentation (look for CICD_README.md or similar)
              2. Understand what triggers CI/CD (push, PR, etc.)
              3. Verify Dockerfile.test builds correctly locally
              4. Check coverage thresholds are documented
              Expected Outcome: Clear CI/CD documentation, Docker builds work
              Report As Failure: Missing CI/CD docs, build failures, unclear thresholds

              Agent 3 - UAT-003 Test Execution Modes:
              Persona: QA engineer testing different scopes
              Starting State: Dependencies installed
              Test Journey:
              1. Discover test execution modes (unit, quick, full)
              2. Run unit tests: verify fast execution
              3. Run quick tests: verify moderate scope
              4. Check for costly test markers and gating
              Expected Outcome: All modes work, clear mode selection docs
              Report As Failure: Mode failures, unclear mode documentation

              Agent 4 - UAT-004 Docker Workflow:
              Persona: Backend developer with Docker experience
              Starting State: Docker installed, repo cloned
              Test Journey:
              1. Find Docker build instructions
              2. Build development containers
              3. Verify Agent-GCPtoolkit path is correct in container
              4. Run tests inside container
              Expected Outcome: Containers build and run correctly
              Report As Failure: Build failures, path issues, missing instructions

              Agent 5 - UAT-005 Testmon Selective Testing:
              Persona: Experienced developer optimizing test runs
              Starting State: Working test environment
              Test Journey:
              1. Find testmon documentation
              2. Run full test suite once (baseline)
              3. Make small change to one file
              4. Run with testmon to verify selective execution
              5. Verify only affected tests run
              Expected Outcome: Testmon correctly identifies and runs affected tests
              Report As Failure: Full suite runs despite no changes, missing testmon docs

              Failure Reporting Format:
              Add failures to live plan under uat_failures with structure:
              - scenario_id: UAT-XXX
              - step: Which step in journey failed
              - failure_type: "documentation_gap", "unexpected_error", "unclear_instructions"
              - description: What went wrong
              - user_impact: How this affects the user persona
              - recommendation: What should be fixed
            success_criteria:
              - All 5 UAT scenarios pass following documentation only
              - Zero documentation gaps preventing task completion
              - Clear error messages when things go wrong
              - Grade improvement from B+ to A (12/12 scenarios)

          # Dynamic build agents to fix any failures
          - type: build
            count: "n = total failures"
            inputs:
              - /home/code/myagents/MyAgents-staging/docs/README.md
              - /home/code/myagents/MyAgents-staging/docs/architecture/architecture.md
              - /home/code/myagents/MyAgents-staging/docs/CICD_README.md
              - /home/code/myagents/MyAgents-staging/Dockerfile.test
              - /home/code/myagents/MyAgents-staging/pyproject.toml
            guidance: |
              Context: User simulator agents have identified UAT failures.
              Each build agent fixes ONE specific failure.

              Instructions:
              1. Read live plan at /home/code/myagents/docs/plans/live/251129_uat_staging.yml
              2. Find your assigned failure (orchestration agent will specify)
              3. Determine fix type:
                 - Documentation gap: Update README, CICD_README, or add new docs
                 - Code issue: Fix Dockerfile, pyproject.toml, or source code
                 - Configuration: Update test markers, pytest config, etc.
              4. Fix the specific issue identified
              5. Mark failure as resolved in live plan

              Fix Categories:
              - Documentation fixes: Add missing instructions, clarify existing text
              - Docker fixes: Path corrections, build optimizations
              - Test config fixes: Marker updates, scope definitions
              - Testmon fixes: Configuration or documentation updates

              Why this matters: Each failure represents a gap in user experience.
            success_criteria:
              - User can complete scenario following docs alone
              - Related scenarios still work (no regression)
              - Fix verified by re-running user simulation

