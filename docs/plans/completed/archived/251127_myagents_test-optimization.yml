# PHASE 6: DB PERSISTENCE REVIEW & IMPROVEMENTS
# ==============================================================================
# Session: 2025-11-28 (Review)
# Status: pending_execution
phase_6_db_persistence:
  name: "Database Persistence Review & Improvements"
  description: |
    Review of testmon database persistence strategy and recommendations for
    improving reliability in CI builds.
  status: "completed"
  completed_date: "2025-11-28"

  # ---------------------------------------------------------------------------
  # REVIEW FINDINGS
  # ---------------------------------------------------------------------------
  review_findings:
    testmon_database_purpose: |
      pytest-testmon uses a SQLite database (.testmondata) to store:
      1. Dependency Graph: Maps each test to the source lines it executed
      2. File Checksums: Stores hashes of source files from last run
      
      On each run, testmon compares current file checksums to the DB.
      Changed files trigger only the tests that depend on them.

    database_technology_decision: |
      RECOMMENDATION: Keep SQLite (current approach)
      
      Alternatives considered:
      - PostgreSQL/MySQL: Not supported by testmon; would require forking
      - Redis: Not suitable for coverage data volume
      - Custom solution: Over-engineering for this use case
      
      SQLite is the right choice because:
      - pytest-testmon is hardcoded to use local SQLite
      - Coverage tracking generates massive write I/O (local file is faster)
      - CI environments are ephemeral (no persistent server needed)
      
      The solution is to fix the ACCESS PATTERN, not the database technology.

    per_step_database_strategy: |
      RECOMMENDATION: Keep per-step databases (APPROVED)
      
      Current strategy correctly uses separate databases per test step:
      - test-cli.testmondata
      - test-echo.testmondata
      - test-infra.testmondata
      - etc.
      
      This avoids SQLite concurrency issues when 8 containers run in parallel.
      Each container has exclusive access to its own database file.

    docker_cp_approach: |
      RECOMMENDATION: Keep docker cp approach (APPROVED)
      
      The docker cp approach (vs volume mount) correctly handles:
      - First run: No file exists, container runs all tests
      - Subsequent runs: File copied in, testmon uses it
      
      Volume mounts create directories when source doesn't exist,
      which breaks SQLite. Docker cp avoids this.

  # ---------------------------------------------------------------------------
  # IDENTIFIED ISSUES
  # ---------------------------------------------------------------------------
  identified_issues:
    - id: upload-on-failure
      severity: medium
      description: |
        In cloudbuild.yaml, the upload-testmon-dbs step waits for ALL test steps.
        If ANY test step fails, Cloud Build skips the upload step entirely.
        This means no testmon databases are saved, even for passing test steps.
      
      current_behavior: |
        waitFor: ['test-cli', 'test-echo', 'test-infra', 'test-pkg', 
                  'test-int-files', 'test-shell-ops', 'test-workflows-misc', 
                  'test-integration-misc']
        
        If test-echo fails, upload-testmon-dbs is SKIPPED.
        All 8 databases are lost, including the 7 from passing steps.
      
      impact: |
        - Partial test failures lose all testmon progress
        - Next build runs all tests again (no selective execution benefit)
        - Testmon efficiency only realized on 100% passing builds
      
      recommendation: |
        Option A (Simple): Accept current behavior
        - Rationale: testmon advises that valid dependency data comes from passing tests
        - A failing test may have incomplete coverage data
        - This is the "safe" default
        
        Option B (Preserve progress): Modify upload to always run
        - Add allowFailure: true to all test steps
        - Use a wrapper script to track exit codes
        - Upload databases regardless of test outcome
        - Final step checks exit codes and fails build if any tests failed
        
        RECOMMENDATION: Start with Option A (current behavior).
        Monitor for a few weeks. If partial failures are frequent and
        causing repeated full test runs, implement Option B.

    - id: test-workflows-misc-missing-testmon
      severity: low
      description: |
        The test-workflows-misc step uses a different pytest invocation pattern
        that may not include testmon flags in the "unit" scope path.
      
      current_behavior: |
        Uses: uv run pytest -m "unit and not costly" ...
        Missing: --testmon --testmon-forceselect flags
      
      impact: |
        This test step always runs all tests (no selective execution).
        However, it's a small subset of tests so impact is minimal.
      
      recommendation: |
        Update test-workflows-misc to use testmon:
        uv run pytest --testmon --testmon-forceselect -m "not costly" ...
        
        Note: Remove "unit and" from marker filter (same fix applied elsewhere).

  # ---------------------------------------------------------------------------
  # EXECUTION TASKS FOR NEXT SESSION
  # ---------------------------------------------------------------------------
  tasks:
    - id: fix-workflows-misc-testmon
      description: "Add testmon flags to test-workflows-misc step in cloudbuild.yaml"
      status: completed
      completed_date: "2025-11-28"
      priority: low
      file: /home/code/myagents/MyAgents-test-optimization/cloudbuild.yaml
      changes: |
        In test-workflows-misc step, changed:
          uv run pytest -m "unit and not costly" ...
        To:
          uv run pytest --testmon --testmon-forceselect -m "not costly" ...

    - id: monitor-db-persistence
      description: "Monitor next 3-5 builds to verify testmon DB persistence"
      status: completed
