# Live Plan: Test Optimization - Selective Test Execution with pytest-testmon
# Worktree: /home/code/myagents/MyAgents-test-optimization
# Created: 2024-11-27

name: Test Optimization - Selective Test Execution
worktree: /home/code/myagents/MyAgents-test-optimization
branch: test-optimization
status: completed
completed_date: "2025-11-28"
pr_merged: "https://github.com/HuaMick/MyAgents/pull/3"

# NOTE: Re-implementing - previous work was documented but never committed.
# Implementation tasks:
# - Add pytest-testmon>=2.1.0 to pyproject.toml
# - Create scripts/testmon_poc.sh  
# - Update cloudbuild.yaml with testmon steps
# - Update test agent guidance

description: |
  Implement pytest-testmon for selective test execution based on file dependencies.
  Testmon tracks which source files each test touches and only re-runs tests when
  their dependencies change. Expected 50-70% reduction in CI test execution time.
  
  Approach:
  - Prove concept with small subset of tests first
  - Use GCS bucket for testmon database persistence between CI runs
  - Scale to full test suite after validation
  - Separate workstream reducing test count (coordinate before scaling)
  
  Current state:
  - 27 test files, 217 test markers across codebase
  - Only 1 test file has `costly` marker - needs audit
  - pytest.ini already defines `costly` marker

objectives:
  - Implement pytest-testmon integration with GCS storage
  - Prove selective execution works with subset of tests
  - Audit and flag all tests that incur API costs (LLM calls)
  - Scale to full test suite after POC validation

# ==============================================================================
# PHASES - Structured for Planner Loop
# ==============================================================================
phases:
  # ============================================================================
  # PHASE 1: AUDIT & PREPARATION
  # ============================================================================
  - name: Audit Phase
    description: "Audit tests for costly markers and prepare infrastructure"
    execution_groups:
      - execution: parallel
        name: "Audit costly tests and prepare GCS bucket"
        agents:
          # Audit agent: Find all tests making LLM/API calls
          - type: audit
            id: audit-costly-tests
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/tests/
              - /home/code/myagents/MyAgents-test-optimization/pytest.ini
            guidance: |
              Context: The `costly` marker exists but only 1 test file uses it.
              Tests calling LLMs or external APIs should be marked as costly to:
              - Exclude them from PR checks (already implemented)
              - Ensure they run on main merges only
              
              Instructions:
              1. Search all test files for patterns indicating LLM/API calls:
                 - Import of `langchain`, `openai`, `google.generativeai`, `anthropic`
                 - Use of `llm`, `model`, `chat`, `generate` functions
                 - Environment variable checks for API keys
                 - Mocked vs real API calls (only flag unmocked real calls)
              2. For each test file found:
                 - Determine if tests are unit (mocked) or integration (real calls)
                 - List tests that make real API calls
              3. Output a list of files needing `@pytest.mark.costly` added
              
              Files to check:
              - tests/workflows/agent_chat/
              - tests/workflows/agent_shell_operations/
              - tests/integration/
              - Any file importing LLM-related packages
              
              Current state:
              - Only tests/integration/file_operations/test_e2e_workflows.py has costly marker
              - Expect more files need marking
            success_criteria:
              - All tests making real LLM calls identified
              - Clear list of files needing costly marker
              - No false positives (mocked tests not flagged)

          # Builder agent: Set up GCS bucket for testmon
          - type: builder
            id: setup-gcs-bucket
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild.yaml
              - /home/code/myagents/docs/CICD_README.md
            guidance: |
              Context: pytest-testmon stores a database (.testmondata) tracking which
              tests depend on which source files. This database must persist between
              CI runs to enable selective test execution.
              
              Instructions:
              1. Create GCS bucket for testmon data (or use existing artifacts bucket)
                 - Bucket name suggestion: gs://myagents-ci-artifacts/testmon/
                 - Or document using existing bucket if one exists
              2. Document the bucket path and permissions needed
              3. Note: Actual Cloud Build integration comes in Phase 2
              
              Deliverables:
              - GCS bucket path documented
              - Permissions required for Cloud Build service account
              - No code changes yet - just infrastructure prep
            success_criteria:
              - GCS path for testmon documented
              - Permissions requirements clear
              - Ready for Cloud Build integration

  # ============================================================================
  # PHASE 2: POC - SMALL SCALE TESTMON
  # ============================================================================
  - name: POC Implementation
    description: "Prove testmon works with a small subset of tests"
    execution_groups:
      - execution: sequential
        name: "Install testmon and validate locally"
        agents:
          # Builder: Add testmon dependency
          - type: builder
            id: add-testmon-dependency
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/pyproject.toml
            guidance: |
              Context: pytest-testmon is a pytest plugin that tracks file dependencies
              for each test and only runs tests when their dependencies change.
              
              Instructions:
              1. Add pytest-testmon to dev dependencies in pyproject.toml
              2. Run `uv sync --dev` to install
              3. Verify testmon installs correctly
              
              Package: pytest-testmon (latest stable version)
              
              Note: Don't add any pytest.ini configuration yet - we'll test defaults first.
            success_criteria:
              - pytest-testmon in pyproject.toml
              - `uv sync --dev` succeeds
              - `pytest --testmon --help` shows testmon options

          # Builder: Create POC test script
          - type: builder
            id: create-poc-script
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/tests/workflows/health_check/
              - /home/code/myagents/MyAgents-test-optimization/scripts/
            guidance: |
              Context: Need to prove testmon works before scaling. Use a small, fast
              test directory (health_check has ~12 tests, all unit tests).
              
              Instructions:
              1. Create script: scripts/testmon_poc.sh
              2. Script should:
                 a. Run tests with testmon to generate initial database:
                    `pytest --testmon tests/workflows/health_check/`
                 b. Show .testmondata was created
                 c. Run again (should skip all tests - no changes)
                 d. Touch a source file that tests depend on
                 e. Run again (should run only affected tests)
                 f. Report results
              3. Make script executable and documented
              
              POC Success = testmon correctly identifies affected tests
            success_criteria:
              - POC script created and documented
              - Running script shows testmon skipping unchanged tests
              - Touching source file triggers affected tests only

      - execution: sequential
        name: "Apply costly markers from audit"
        agents:
          # Builder: Add costly markers
          - type: builder
            id: apply-costly-markers
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/tests/
            guidance: |
              Context: Audit phase identified tests making real LLM calls.
              These need `@pytest.mark.costly` decorator added.
              
              Instructions:
              1. Read audit findings from this plan's completed phases
              2. For each file identified:
                 - Add `@pytest.mark.costly` to test functions/classes making real API calls
                 - Don't mark mocked tests
                 - Add marker at most specific level (function > class > module)
              3. Verify: `pytest -m "costly" --collect-only` shows expected tests
              
              Pattern to add:
              ```python
              import pytest
              
              @pytest.mark.costly
              def test_real_llm_call():
                  ...
              ```
            success_criteria:
              - All identified tests marked with @pytest.mark.costly
              - `pytest -m "costly" --collect-only` matches audit findings
              - No non-LLM tests incorrectly marked

  # ============================================================================
  # PHASE 3: CLOUD BUILD INTEGRATION
  # ============================================================================
  - name: Cloud Build Integration
    description: "Integrate testmon with Cloud Build using GCS storage"
    execution_groups:
      - execution: sequential
        name: "Modify Cloud Build to use testmon with GCS"
        agents:
          # Builder: Add GCS download/upload steps
          - type: builder
            id: cloudbuild-testmon-integration
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild.yaml
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild-pr.yaml
            guidance: |
              Context: Cloud Build needs to:
              1. Download testmon database from GCS before tests
              2. Run tests with --testmon flag
              3. Upload updated database to GCS after tests
              
              Instructions for cloudbuild-pr.yaml (feature branch checks):
              1. Add step before tests to download .testmondata from GCS:
                 ```yaml
                 - name: 'gcr.io/cloud-builders/gsutil'
                   args: ['cp', 'gs://BUCKET/testmon/.testmondata', '.testmondata']
                   id: 'download-testmon-db'
                   allowFailure: true  # First run won't have DB
                 ```
              2. Modify test steps to use --testmon flag:
                 `pytest --testmon -m "unit and not costly" tests/...`
              3. Add step after tests to upload updated database:
                 ```yaml
                 - name: 'gcr.io/cloud-builders/gsutil'
                   args: ['cp', '.testmondata', 'gs://BUCKET/testmon/.testmondata']
                   id: 'upload-testmon-db'
                 ```
              
              For cloudbuild.yaml (main merges):
              - Also use testmon (selective execution)
              - Same as PR checks - efficiency on all branches
              - Full suite is manual trigger only
              
              POC Scope:
              - Apply to ONE test step first (test-cli or smallest)
              - Validate before rolling out to all steps
            success_criteria:
              - GCS download/upload steps added to cloudbuild-pr.yaml and cloudbuild.yaml
              - At least one test step uses --testmon
              - Manual trigger for full suite documented
              - First run (no DB) gracefully runs all tests

      - execution: sequential
        name: "Create manual full-suite trigger"
        agents:
          # Builder: Create manual trigger for full test runs
          - type: builder
            id: create-manual-full-trigger
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild.yaml
              - /home/code/myagents/docs/CICD_README.md
            guidance: |
              Context: Full test suite should only run when manually triggered.
              Not tied to any branch or automatic event.
              
              Instructions:
              1. Create or modify Cloud Build trigger for manual full runs:
                 - Name: myagents-full-test-manual
                 - Trigger type: Manual
                 - No branch filter (can run on any branch)
                 - Runs all tests without testmon (--testmon-off or no flag)
                 - Includes costly tests
              2. Document how to trigger:
                 - Via Cloud Console
                 - Via gcloud CLI: `gcloud builds triggers run myagents-full-test-manual`
              3. Update CICD_README.md with manual trigger instructions
            success_criteria:
              - Manual trigger created in Cloud Build
              - Trigger runs full suite without testmon
              - Documentation updated with trigger instructions

      - execution: sequential
        name: "Test Cloud Build integration"
        agents:
          # Test: Validate CI integration
          - type: test
            id: validate-ci-integration
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild-pr.yaml
            guidance: |
              Context: Need to verify testmon + GCS integration works in Cloud Build.
              
              Test Strategy: 
              1. Trigger a PR build manually or via small commit
              2. Verify:
                 - GCS download step runs (may fail first time - OK)
                 - Tests run with testmon
                 - GCS upload step succeeds
                 - .testmondata appears in GCS bucket
              3. Trigger another build:
                 - Verify GCS download succeeds
                 - Verify testmon skips unchanged tests
                 - Check build logs for "X passed, Y deselected"
              
              Success metrics:
              - Second build should be faster than first
              - Testmon should deselect some tests
            success_criteria:
              - GCS upload/download working
              - Testmon deselects tests on second run
              - Build time reduced compared to non-testmon

  # ============================================================================
  # PHASE 4: SCALE TO FULL TEST SUITE
  # ============================================================================
  - name: Scale to Full Suite
    description: "Roll out testmon to all test steps in PR builds"
    execution_groups:
      - execution: sequential
        name: "Extend testmon to all test steps"
        agents:
          # Builder: Apply to all test steps
          - type: builder
            id: scale-testmon-all-steps
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild-pr.yaml
              - /home/code/myagents/MyAgents-test-optimization/docker-compose.test.yml
            guidance: |
              Context: POC validated testmon works. Now apply to all parallel test steps.
              
              Note: Coordinate with test reduction workstream. If they've reduced test count,
              fewer changes needed here.
              
              Instructions:
              1. Review current parallel test steps in cloudbuild-pr.yaml:
                 - test-cli-unification
                 - test-echo-agent
                 - test-infrastructure-workflow
                 - test-packaging
                 - test-integration-file-ops
              2. Add --testmon flag to all test steps
              3. Consider: One shared .testmondata or per-step databases?
                 - Shared: simpler, one GCS file
                 - Per-step: avoids conflicts in parallel execution
                 - Recommendation: Per-step for parallel safety
              4. Update GCS paths if using per-step databases:
                 - gs://BUCKET/testmon/test-cli.testmondata
                 - gs://BUCKET/testmon/test-echo.testmondata
                 - etc.
            success_criteria:
              - All PR test steps use testmon
              - Parallel execution works without conflicts
              - GCS storage organized cleanly

      - execution: sequential
        name: "Validate full rollout"
        agents:
          # Test: Full integration validation
          - type: test
            id: validate-full-rollout
            inputs:
              - /home/code/myagents/MyAgents-test-optimization/cloudbuild-pr.yaml
            guidance: |
              Context: Testmon applied to all test steps. Validate full integration.
              
              Test Scenarios:
              1. PR with changes to backend/services/agents/:
                 - Should run agent-related tests only
                 - Other test steps should mostly skip
              2. PR with changes to tests/ only:
                 - Changed tests should run
                 - Source-dependent tests unaffected
              3. PR with changes to shared code (e.g., utils):
                 - Multiple test steps affected
                 - Correctly identifies cross-cutting changes
              
              Metrics to collect:
              - Average build time before testmon
              - Average build time after testmon
              - Percentage of tests typically skipped
            success_criteria:
              - Build times measurably reduced
              - No false negatives (missed test runs for changed code)
              - All test steps functioning correctly

# ==============================================================================
# COORDINATION NOTES
# ==============================================================================
coordination:
  test_reduction_workstream: |
    Another agent is working on reducing the total number of tests.
    Before Phase 4 (Scale), check if that work is complete.
    If test count is reduced, scaling becomes simpler.
    
  test_execution_policy: |
    ALL branches use testmon (selective execution):
    - Feature branch PRs: testmon + not costly
    - Staging PRs: testmon + not costly  
    - Main merges: testmon + not costly
    
    Full test suite is MANUAL TRIGGER ONLY:
    - Developer explicitly triggers when needed
    - Not tied to any branch or merge event
    - Use Cloud Build manual trigger or CLI
    
  no_automatic_full_runs: |
    No scheduled or branch-triggered full runs.
    Full suite runs only when manually requested.
    This maximizes CI efficiency while giving control to developers.

