              - No worktree-specific references in package

          - type: test
            inputs:
              - /home/code/myagents/MyAgents-cli_distribution/src/myagents/frontend/agents/test/processes/test_runner.yml
            guidance: |
              Final validation after audit findings addressed.
              
              Run full test suite to verify no regressions.
