  # ========================================
  # PHASE 5: DOCUMENTATION
  # ========================================
  - name: Documentation Phase
    execution_groups:
      - execution: sequential
        name: Update installation documentation
        agents:
          - type: documentation
            inputs:
              - /home/code/myagents/MyAgents-cli_distribution/README.md
              - /home/code/myagents/MyAgents-cli_distribution/docs/guides/getting-started.md
            guidance: |
              Update documentation to clearly separate:
              
              1. END USER INSTALLATION:
                 - pip install myagents (from PyPI when published)
                 - pip install /path/to/MyAgents (from source)
                 - pipx install myagents (isolated)
              
              2. DEVELOPER INSTALLATION:
                 - git clone + uv sync
                 - Uses uv workspace for local agent-gcptoolkit
                 - Never install system-wide from worktrees
              
              3. WORKTREE DISCIPLINE:
                 - Worktrees are for development, not system installs
                 - System installs should use main branch or PyPI
                 - Development venvs are isolated to worktree
              
              4. VERIFICATION:
                 - How to verify installation works
