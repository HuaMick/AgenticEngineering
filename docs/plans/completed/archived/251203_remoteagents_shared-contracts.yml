              - /home/code/myagents/RemoteAgents/tests/shared/fixtures/protocol_vectors.json
              - /home/code/myagents/RemoteAgents/docs/protocol.md
            guidance: |
              Context: Protocol documentation enables Flutter team to implement compatible client
              without needing to read Python code. Must be complete and unambiguous.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/docs/ directory
              2. Create protocol.md with comprehensive protocol specification:

                 A. Message Flow Patterns:
                 - Session pairing flow: SessionCreate -> SessionCreated -> SessionPair -> SessionPaired
                 - Terminal I/O flow: TerminalInput -> (processing) -> TerminalOutput
                 - Terminal lifecycle: (pairing) -> TerminalInput/Output -> TerminalResize -> TerminalClose
                 - Error handling: Any message can trigger Error response
                 - Keepalive: Ping <-> Pong at regular intervals

                 B. Each Message Type Documentation (all 13 types):
                 For each: TerminalOutput, TerminalInput, TerminalResize, TerminalClose,
                          SessionCreate, SessionCreated, SessionPair, SessionPaired, SessionClose,
                          EncryptedBlob, Ping, Pong, Error
                 Document:
                 - Purpose: When and why this message is sent
                 - Fields: Name, type, constraints, description
                 - JSON example: Complete valid message as JSON
                 - Validation rules: What makes message valid/invalid
                 - Type discriminator: Exact string value (e.g., "terminal.output")

                 C. Protocol Invariants:
                 - session_id must be established (via SessionCreated) before terminal messages
                 - nonce must be unique per EncryptedBlob (never reuse)
                 - pairing_code valid for 5 minutes from SessionCreated
                 - timestamp must be Unix epoch in seconds (float)
                 - All bytes fields transported as base64 in JSON

                 D. Test Vectors Section:
                 - Reference protocol_vectors.json for validation
                 - Include 2-3 complete message examples from vectors
                 - Show valid and invalid examples

                 E. State Diagrams:
                 - Session lifecycle state machine (disconnected -> creating -> created -> pairing -> paired -> closed)
                 - Terminal state machine (inactive -> active -> resizing -> closing -> closed)

              Files to trace:
              - All message files for accurate field definitions
              - protocol_vectors.json for concrete examples

              Why this matters: Flutter developers implement client from this documentation.
              Ambiguity leads to incompatible implementations and protocol bugs.
            success_criteria:
              - All 13 message types fully documented with JSON examples
              - State transitions clearly diagrammed
              - Validation rules explicitly stated with examples
              - JSON examples match actual serialization from test vectors
              - Documentation enables implementation without reading Python code

          # Crypto interface documentation
          - type: documentation
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/types.py
              - /home/code/myagents/RemoteAgents/tests/shared/fixtures/crypto_vectors.json
              - /home/code/myagents/RemoteAgents/docs/crypto.md
            guidance: |
              Context: Crypto documentation specifies exact format for keys, nonces, and ciphertext.
              Python uses PyNaCl, Flutter uses pinenacl - both must produce identical results.

              Instructions:
              1. Create crypto.md with comprehensive crypto specification:

                 A. Key Formats:
                 - X25519 public key: 32 bytes, derived from private key via Curve25519
                 - X25519 private key: 32 bytes, random generation
                 - Base64 encoding for JSON transport
                 - Key generation: Use cryptographically secure random for private key

                 B. Encryption Format (NaCl Box):
                 - Algorithm: Curve25519-XSalsa20-Poly1305 (NaCl public-key authenticated encryption)
                 - Nonce: 24 bytes, random, MUST be unique per message with same key pair
                 - Encryption output: (nonce: 24 bytes, ciphertext: variable length with Poly1305 MAC)
                 - Transport: Both nonce and ciphertext transported separately as base64 in EncryptedBlob

                 C. Security Properties:
                 - Authenticated encryption: Can't modify ciphertext without detection (Poly1305 MAC)
                 - Forward secrecy: Future compromise doesn't reveal past messages (ephemeral keys recommended)
                 - Nonce uniqueness: CRITICAL - reusing nonce with same keypair breaks security

                 D. Test Vectors:
                 - Reference crypto_vectors.json for cross-platform validation
                 - Known keypair (base64 encoded)
                 - Multiple plaintext + ciphertext pairs with nonces
                 - Round-trip examples showing encrypt/decrypt
                 - Edge cases: empty message, unicode text, large messages

                 E. Implementation Guidance:
                 - Python: Use PyNaCl library (nacl.public.Box, nacl.public.PrivateKey)
                 - Flutter: Use pinenacl package (identical API to PyNaCl)
                 - Code examples:
                   * Key generation in both languages
                   * Encryption in both languages
                   * Decryption in both languages
                   * Nonce generation best practices

                 F. Type Interface Reference:
                 - Document KeyPair, CryptoBox, CryptoProvider Protocol definitions
                 - Show method signatures and expected behavior
                 - Explain type aliases (PublicKey, PrivateKey, Nonce, Ciphertext)

              Files to trace:
              - types.py for exact interface definitions
              - crypto_vectors.json for test examples

              Why this matters: Encryption must be bitwise-identical between Python and Flutter
              or messages can't be decrypted. Detailed spec prevents implementation drift.
            success_criteria:
              - Key formats specified with exact byte layouts and generation process
              - Encryption process documented step-by-step with algorithm details
              - Test vectors provided with examples for cross-platform validation
              - Code examples provided for both Python (PyNaCl) and Flutter (pinenacl)
              - Security properties and constraints clearly stated
              - Type interfaces documented with method signatures

          # Integration guide documentation
          - type: documentation
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/__init__.py
              - /home/code/myagents/RemoteAgents/tests/shared/README.md
              - /home/code/myagents/RemoteAgents/docs/protocol.md
