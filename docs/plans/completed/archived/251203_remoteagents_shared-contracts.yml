                 - Critical path blocker: This package blocks relay-service, terminal-service, crypto-impl, cli-integration
                 - Dependencies: None (foundational package)
                 - Downstream consumers: relay-service, terminal-service, crypto-impl worktrees, Flutter client
                 - Quick start: How to install and use protocol messages
                 - Testing: How to run test vectors
                 - Documentation links: protocol.md, crypto.md

