name: RemoteAgents Shared Contracts
worktree: /home/code/myagents/RemoteAgents
branch: shared-contracts
status: ready_for_uat
liveplan: /home/code/myagents/docs/plans/live/251203_remoteagents_shared-contracts.yml
completedplan: /home/code/myagents/docs/plans/completed/251203_remoteagents_shared-contracts.yml

description: |
  Establish the foundational protocol contracts and cryptographic interfaces for RemoteAgents.
  This defines Pydantic message models, crypto type interfaces, and test vectors that all other
  services depend on. Critical path blocker for all downstream worktrees.

objectives:
  - Define Pydantic protocol message models for all RemoteAgents communication
  - Establish crypto interface types (keys, encryption, signatures) without implementation
  - Create comprehensive test vectors for protocol validation
  - Document message flow patterns and state transitions
  - Ensure type safety and serialization compatibility with Flutter client

dependencies:
  requires: []
  blocks:
    - relay-service
    - terminal-service
    - crypto-impl
    - cli-integration

success_criteria:
  - All protocol messages defined as Pydantic models with validation
  - Crypto interface types documented with clear contracts
  - Test vectors cover all message types and error cases
  - Messages serialize/deserialize correctly to JSON
  - Type hints provide full IDE support for downstream services

phases:
  # ========================================
  # BUILD PHASE - Protocol Infrastructure
  # ========================================
  - name: Build Phase - Protocol Infrastructure
    execution_groups:
      # Sequential: Base infrastructure needed before specific message types
      - execution: sequential
        agents:
          # Create base protocol directory structure and base classes
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
            guidance: |
              Context: All protocol messages share common patterns: type discriminator for routing,
              timestamp for ordering, JSON serialization. Base classes eliminate duplication and
              ensure consistency. This foundation must exist before defining specific message types.

              Instructions:
              1. Create directory structure:
                 - /home/code/myagents/RemoteAgents/src/agent_remote/__init__.py (empty module marker)
                 - /home/code/myagents/RemoteAgents/src/agent_remote/shared/__init__.py (empty module marker)
                 - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py (will export message types later)
              2. Create base.py with Pydantic base classes:
                 - RemoteAgentMessage: Base for all messages with type field and to_json()/from_json()
                 - TimestampedMessage: Adds timestamp field with auto-population (time.time())
                 - SessionMessage: Adds session_id field with UUID validation
              3. Add utility functions:
                 - bytes_to_base64(data: bytes) -> str
                 - base64_to_bytes(data: str) -> bytes
                 - generate_session_id() -> str (UUID4)
                 - generate_pairing_code() -> str (6 char random alphanumeric uppercase)
              4. Create type registry infrastructure for message deserialization:
                 - MESSAGE_TYPES: Dict[str, Type[RemoteAgentMessage]] mapping type strings to classes
                 - deserialize_message(json_str: str) -> RemoteAgentMessage (uses type field to dispatch)
              5. Add comprehensive docstrings explaining base class usage patterns

              Why this matters: Base infrastructure ensures all messages have consistent serialization
              and validation. Type registry enables safe deserialization without eval().
            success_criteria:
              - Base classes provide consistent interface for all message types
              - Timestamp auto-populates on message creation
              - Type registry infrastructure ready for message registration
              - Base64 utilities handle bytes fields correctly
              - UUID validation works for session IDs

  # ========================================
  # BUILD PHASE - Protocol Message Definitions
  # ========================================
  - name: Build Phase - Protocol Messages
    execution_groups:
      # Parallel execution: Different message categories can be defined simultaneously
      - execution: parallel
        agents:
          # Terminal protocol messages
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/terminal_messages.py
            guidance: |
              Context: Terminal messages handle PTY input/output streaming, terminal resizing, and
              session lifecycle. These must serialize efficiently for WebSocket transport and support
              binary data (terminal output can contain control codes, colors, etc.).

              Instructions:
              1. Define Pydantic models in terminal_messages.py inheriting from base classes:
                 - TerminalOutput(SessionMessage, TimestampedMessage): {type: "terminal.output", session_id, data: bytes, timestamp}
                 - TerminalInput(SessionMessage, TimestampedMessage): {type: "terminal.input", session_id, data: bytes, timestamp}
                 - TerminalResize(SessionMessage): {type: "terminal.resize", session_id, rows: int, cols: int}
                 - TerminalClose(SessionMessage): {type: "terminal.close", session_id, reason: str}
              2. Use Pydantic validators:
                 - data must be bytes (use base64_to_bytes/bytes_to_base64 from base.py)
                 - rows/cols must be positive integers (min=1, max=1000)
                 - session_id inherits UUID validation from SessionMessage base class
              3. Add JSON serialization using base class to_json()/from_json() methods
              4. Register message types in MESSAGE_TYPES registry from base.py
              5. Export message types in __init__.py

              Files to reference:
              - base.py: Base classes and utility functions
              - __init__.py: Export all terminal message types

              Why this matters: Terminal messages are high-frequency (every keystroke, output line).
              Efficient serialization and strict validation prevent protocol errors.
            success_criteria:
              - All terminal message types serialize to/from JSON correctly
              - Bytes fields handle binary data without corruption
              - Validation rejects invalid session_ids, dimensions, timestamps
              - Messages include type discriminator for routing
              - Messages registered in MESSAGE_TYPES registry

          # Session protocol messages
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/session_messages.py
            guidance: |
              Context: Session messages handle pairing flow between desktop and web client.
              Desktop creates session, relay issues pairing code, client uses code to connect.
              These messages contain cryptographic public keys (32 bytes each).

              Instructions:
              1. Define Pydantic models in session_messages.py inheriting from base classes:
                 - SessionCreate(RemoteAgentMessage): {type: "session.create", desktop_public_key: bytes}
                 - SessionCreated(SessionMessage): {type: "session.created", session_id, pairing_code: str}
                 - SessionPair(RemoteAgentMessage): {type: "session.pair", pairing_code: str, client_public_key: bytes}
                 - SessionPaired(SessionMessage): {type: "session.paired", session_id, desktop_public_key: bytes}
                 - SessionClose(SessionMessage): {type: "session.close", session_id}
              2. Validation rules using Pydantic validators:
                 - public_key fields must be exactly 32 bytes (X25519 format)
                 - pairing_code must match pattern: 6 uppercase alphanumeric characters
                 - session_id inherits UUID validation from SessionMessage base class
              3. Use base64 serialization from base.py for public_key bytes
              4. Register message types in MESSAGE_TYPES registry
              5. Export in __init__.py

              Files to reference:
              - base.py: Base classes, bytes serialization, session_id validation

              Why this matters: Session messages establish the security context. Invalid keys or
              malformed pairing codes break the entire pairing flow.
            success_criteria:
              - Public keys validate as exactly 32 bytes
              - Pairing codes match required format (6 chars, uppercase alphanumeric)
              - Session lifecycle messages complete pairing flow
              - Invalid formats rejected with clear error messages
              - Messages registered in MESSAGE_TYPES registry

          # Relay protocol messages
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
            guidance: |
              Context: Relay messages are the encrypted transport layer. All terminal and session
              messages are wrapped in EncryptedBlob when transmitted through relay. Also includes
              WebSocket keepalive (Ping/Pong) and error reporting.

              Instructions:
              1. Define Pydantic models in relay_messages.py inheriting from base classes:
                 - EncryptedBlob(SessionMessage): {type: "relay.encrypted", session_id, sender: Literal["desktop", "client"],
                                   payload: bytes, nonce: bytes}
                 - Ping(TimestampedMessage): {type: "relay.ping", timestamp}
                 - Pong(TimestampedMessage): {type: "relay.pong", timestamp}
                 - Error(RemoteAgentMessage): {type: "relay.error", code: str, message: str, details: Optional[dict]}
              2. Validation rules:
                 - payload can be any size (encrypted terminal/session message)
                 - nonce must be exactly 24 bytes (NaCl box requirement)
                 - sender must be "desktop" or "client" enum (use Literal type hint)
                 - error codes use namespaced format: "SESSION_EXPIRED", "INVALID_KEY", etc.
              3. Add base64 serialization for payload and nonce bytes using base.py utilities
              4. Define error code constants (SESSION_EXPIRED, PAIRING_FAILED, CRYPTO_ERROR, etc.)
              5. Register message types in MESSAGE_TYPES registry
              6. Export in __init__.py

              Files to reference:
              - base.py: Base classes, bytes serialization, timestamp handling

              Why this matters: EncryptedBlob is the only message type that crosses the untrusted
              network. Nonce format is critical for NaCl cryptographic safety.
            success_criteria:
              - EncryptedBlob validates nonce as exactly 24 bytes
              - Sender enum restricts to desktop/client only
              - Error codes provide structured error reporting
              - Ping/Pong enable WebSocket keepalive
              - Messages registered in MESSAGE_TYPES registry

  # ========================================
  # BUILD PHASE - Crypto Interface Types
  # ========================================
  - name: Build Phase - Crypto Interfaces
    execution_groups:
      - execution: sequential
        agents:
          # Crypto interface definitions
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/types.py
            guidance: |
              Context: Crypto interfaces define the contract for encryption/decryption without
              specifying implementation. This allows PyNaCl (Python) and pinenacl (Flutter) to
              implement the same interface, ensuring interoperability. This is INTERFACE ONLY - no
              implementation code.

              Instructions:
              1. Create directory structure:
                 - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/__init__.py
              2. Define Python Protocol classes in types.py (using typing.Protocol):
                 - KeyPair: Protocol with properties public_key: bytes, private_key: bytes
                 - CryptoBox: Protocol with methods:
                   * encrypt(plaintext: bytes, their_public_key: bytes) -> tuple[bytes, bytes]  # returns (nonce, ciphertext)
                   * decrypt(ciphertext: bytes, nonce: bytes, their_public_key: bytes) -> bytes
              3. Define type aliases for clarity:
                 - PublicKey = bytes  # 32 bytes X25519
                 - PrivateKey = bytes  # 32 bytes X25519
                 - Nonce = bytes      # 24 bytes random
                 - Ciphertext = bytes # encrypted data with Poly1305 MAC
              4. Document expected formats in comprehensive docstrings:
                 - Keys: X25519 format (32 bytes each)
                 - Nonce: Random 24 bytes, must never be reused with same key pair
                 - Ciphertext: Encrypted data + Poly1305 MAC (variable length)
                 - Encryption algorithm: Curve25519-XSalsa20-Poly1305 (NaCl box)
              5. Add factory interface:
                 - CryptoProvider: Protocol with methods:
                   * generate_keypair() -> KeyPair
                   * create_box(keypair: KeyPair) -> CryptoBox
              6. Export all interfaces and type aliases in __init__.py

              Files to create:
              - types.py: All Protocol definitions and type aliases
              - __init__.py: Export public interface

              Why this matters: Well-defined interfaces prevent implementation drift between Python
              and Flutter. Protocol classes provide static type checking without runtime overhead.
              These types will be referenced by relay, terminal, and crypto-impl worktrees.
            success_criteria:
              - All crypto operations defined as Protocol methods with clear signatures
              - Type aliases clarify byte array purposes and sizes
              - Docstrings document format requirements and constraints
              - Interfaces can be implemented by both PyNaCl and pinenacl
              - No implementation code present (types only)

  # ========================================
  # BUILD PHASE - Test Vectors
  # ========================================
  - name: Build Phase - Test Vectors
    execution_groups:
      - execution: sequential
        agents:
          # Test vector generation
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/terminal_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/session_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/tests/shared/__init__.py
              - /home/code/myagents/RemoteAgents/tests/shared/test_vectors.py
              - /home/code/myagents/RemoteAgents/tests/shared/fixtures/protocol_vectors.json
              - /home/code/myagents/RemoteAgents/tests/shared/fixtures/crypto_vectors.json
            guidance: |
              Context: Test vectors are known-good inputs/outputs that both Python and Flutter
              implementations must produce identical results for. This ensures cross-platform
              interoperability without needing live integration tests during development.

              Instructions:
              1. Create directory structure:
                 - /home/code/myagents/RemoteAgents/tests/__init__.py
                 - /home/code/myagents/RemoteAgents/tests/shared/__init__.py
                 - /home/code/myagents/RemoteAgents/tests/shared/fixtures/ directory
              2. Generate protocol test vectors in protocol_vectors.json:
                 - Valid examples: One of each message type (TerminalOutput, TerminalInput, TerminalResize,
                   TerminalClose, SessionCreate, SessionCreated, SessionPair, SessionPaired, SessionClose,
                   EncryptedBlob, Ping, Pong, Error) with all fields populated
                 - JSON serialization of each message with expected base64 encoding of bytes fields
                 - Invalid examples that should fail validation:
                   * Wrong UUID format for session_id
                   * Invalid nonce length (not 24 bytes)
                   * Invalid public key length (not 32 bytes)
                   * Negative terminal dimensions
                   * Invalid pairing code format
              3. Generate crypto test vectors in crypto_vectors.json:
                 - Known keypair (public + private keys as base64) for deterministic testing
                 - Multiple plaintext messages with expected ciphertext (including nonce)
                 - Round trip examples (plaintext -> encrypt -> decrypt -> plaintext)
                 - Edge cases: empty message, max size message, unicode text
              4. Create test_vectors.py pytest tests:
                 - Load vectors from JSON files using json.load()
                 - Test message deserialization from JSON matches expected structure
                 - Test message serialization produces expected JSON
                 - Test validation failures for invalid examples
                 - Mark all tests with @pytest.mark.test_vectors for easy filtering
              5. Add README.md in tests/shared/ documenting:
                 - Purpose of test vectors
                 - How to regenerate vectors if protocol changes
                 - How Flutter team should use these vectors

              Files to reference:
              - All protocol message files to understand message structures
              - base.py for serialization utilities

              Why this matters: Test vectors are the contract between Python and Flutter. Both
              teams can develop independently, then validate against shared vectors.
            success_criteria:
              - Protocol vectors cover all message types with valid and invalid examples
              - Crypto vectors enable cross-platform validation
              - Python pytest tests pass against all vectors
              - Vectors documented with generation process for Flutter team

  # ========================================
  # ENVIRONMENT SETUP PHASE
  # CRITICAL: Must run BEFORE test phase to ensure tests run against latest code
  # ========================================
  - name: Environment Setup Phase
    execution_groups:
      - execution: sequential
        name: Prepare test environment
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/pyproject.toml
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/__init__.py
            guidance: |
              Context: Test phase must run against the latest code version, not a stale installed version.
              This phase prepares the test environment BEFORE test agents begin validation.

              Instructions:
              1. Install latest version locally for testing:
                 - Run `uv pip install -e .` (editable install) from /home/code/myagents/RemoteAgents/
                 - Verify installation: `uv pip show agent-remote` or check package is importable
                 - Verify imports work: `python -c "from agent_remote.shared.protocol import *"`
                 - Document installed version in live plan for reference
              2. Verify test dependencies installed:
                 - Run `uv pip install pytest` if not present
                 - Verify pytest available: `pytest --version`
              3. Verify environment readiness:
                 - Protocol imports work
                 - Crypto type imports work
                 - Test fixtures directory exists

              Why this matters: Prevents tests from running against stale installed versions that don't match
              latest source code. Ensures test environment is properly configured.

              Files to reference:
              - pyproject.toml: Source version and dependencies
            success_criteria:
              - Latest code installed locally (editable install successful)
              - Protocol modules importable from agent_remote.shared.protocol
              - Crypto modules importable from agent_remote.shared.crypto
              - Pytest available and working
              - Environment ready for test phase

  # ========================================
  # TEST PHASE - Contract Validation
  # ========================================
  - name: Test Phase - Contract Validation
    execution_groups:
      - execution: test-fix-loop
        name: Protocol and crypto contract validation
        agents:
          # Parallel test agents
          - type: test
            count: 5
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/terminal_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/session_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/types.py
              - /home/code/myagents/RemoteAgents/tests/shared/test_vectors.py
              - /home/code/myagents/MyAgents-staging/src/myagents/frontend/agents/test/processes/test_runner.yml
            guidance: |
              Test Strategy: technical-spike (focused contract testing)
              Test Process: Execute test_runner.yml process from MyAgents-staging test agent processes
              Testing Layer: LOCAL (sufficient for pure Python contracts package - no Docker or infrastructure dependencies)
              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251203_remoteagents_shared-contracts.yml

              Note: Docker layer not required for this package as it contains only Pydantic models
              and Protocol definitions with no infrastructure dependencies.

              Test Distribution (5 agents):

              Agent 1 - Protocol message serialization:
              - Test all terminal message types (TerminalOutput, TerminalInput, TerminalResize, TerminalClose) serialize to/from JSON
              - Test bytes fields base64 encode/decode correctly without corruption
              - Test timestamp auto-population on TimestampedMessage creation
              - Test deserialization from JSON produces correct types with proper field values
              - Test round trip: message -> JSON -> message produces equal object

              Agent 2 - Protocol message validation:
              - Test session_id validation (UUID format required, malformed UUIDs rejected)
              - Test pairing_code validation (exactly 6 char uppercase alphanumeric, reject lowercase/special chars)
              - Test public_key validation (exactly 32 bytes, reject shorter/longer)
              - Test nonce validation (exactly 24 bytes for EncryptedBlob)
              - Test enum validation (EncryptedBlob sender must be "desktop" or "client", reject other values)
              - Test terminal dimensions validation (rows/cols positive integers 1-1000, reject negative/zero/too large)

              Agent 3 - Session and relay message validation:
              - Test SessionCreate, SessionCreated, SessionPair, SessionPaired, SessionClose message types
              - Test EncryptedBlob, Ping, Pong, Error message types
              - Test error code constants exist and follow namespacing (SESSION_EXPIRED, PAIRING_FAILED, etc.)
              - Test message type discriminators ("terminal.output", "session.create", "relay.encrypted", etc.)

              Agent 4 - Type registry and deserialization:
              - Test MESSAGE_TYPES registry contains all message types (count should match defined messages)
              - Test deserialize_message() correctly dispatches by type field for each message type
              - Test unknown type field raises clear, specific error
              - Test malformed JSON raises appropriate error with helpful message
              - Test base class utilities (bytes_to_base64, base64_to_bytes, generate_session_id, generate_pairing_code)

              Agent 5 - Test vectors validation:
              - Run all test vector pytest tests with pytest -v tests/shared/test_vectors.py
              - Validate protocol vectors match expected serialization for all message types
              - Validate crypto vectors match expected format
              - Validate invalid examples correctly fail validation
              - Report any vector mismatches with specific expected vs actual differences

              Failure Reporting:
              Add to live plan under test_failures with structure:
              - test_name: Name of failed test
              - component: Which component failed (terminal_messages, session_messages, base, etc.)
              - failure_description: What went wrong
              - expected_behavior: What should have happened
              - actual_behavior: What actually happened
              - files_involved: List of files related to failure
            success_criteria:
              - All protocol messages serialize/deserialize correctly
              - All validation rules enforce constraints
              - Type registry enables safe deserialization
              - All test vectors pass
              - Zero test failures

          # Dynamic build agents
          - type: build
            count: "n = total failures"
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/terminal_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/session_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/types.py
              - /home/code/myagents/RemoteAgents/tests/shared/test_vectors.py
              - /home/code/myagents/RemoteAgents/tests/shared/fixtures/protocol_vectors.json
              - /home/code/myagents/RemoteAgents/tests/shared/fixtures/crypto_vectors.json
            guidance: |
              Context: Test agents have identified contract validation failures. Each build agent
              fixes one specific failure. Read failures from live plan.

              Instructions:
              1. Read live plan at /home/code/myagents/docs/plans/live/251203_remoteagents_shared-contracts.yml
              2. Find assigned failure (orchestration agent will specify which one)
              3. Determine root cause:
                 - Validation failures: Incorrect or missing Pydantic validators
                 - Serialization failures: Bug in base64 encoding/decoding
                 - Type registry failures: Message type not registered or wrong type string
                 - Test vector failures: Vector doesn't match actual implementation (regenerate or fix code)
              4. Fix the specific issue:
                 - Update Pydantic field validators or constraints
                 - Fix base64 serialization utilities in base.py
                 - Register message types in MESSAGE_TYPES
                 - Regenerate test vectors if protocol changed, or fix implementation if vectors are correct
              5. Mark failure as resolved in live plan

              Files to modify based on failure type:
              - base.py: Base class issues, utility functions, type registry
              - terminal_messages.py: Terminal message validation/serialization
              - session_messages.py: Session message validation/serialization
              - relay_messages.py: Relay message validation/serialization
              - types.py: Crypto interface definitions
              - test_vectors.py: Test logic issues
              - protocol_vectors.json / crypto_vectors.json: Test vector data

              Why this matters: Contracts must be 100% correct before downstream services start.
              Any bugs here propagate to relay-service, terminal-service, crypto-impl, and Flutter client.
            success_criteria:
              - Fixed test now passes
              - No regression in related tests
              - Contract remains clear and documented
              - Fix addresses root cause, not just symptom

  # ========================================
  # CLEANUP PHASE
  # Remove any temporary files or obsolete code from development
  # ========================================
  - name: Cleanup Phase
    execution_groups:
      - execution: sequential
        name: Remove temporary development artifacts
        agents:
          - type: cleaner
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/__init__.py
              - /home/code/myagents/RemoteAgents/tests/shared/__init__.py
            guidance: |
              Context: Development may have created temporary files, debug code, or incomplete implementations.
              This phase ensures the final contracts package is clean and production-ready.

              Instructions:
              1. Remove any temporary test files (*.tmp, *.bak, __pycache__ directories)
              2. Remove any debug print statements or TODO comments marked for removal
              3. Verify all __init__.py exports are intentional (no accidental exports)
              4. Verify no commented-out code remains in production files
              5. Ensure all protocol messages are properly registered in MESSAGE_TYPES
              6. Verify test fixtures directory contains only necessary files

              Files to check:
              - All protocol/*.py files for cleanup
              - All crypto/*.py files for cleanup
              - tests/shared/ for any temporary fixtures

              Why this matters: Clean contracts package ensures downstream services don't inherit
              development artifacts or incomplete code.
            success_criteria:
              - No temporary files present in src/ or tests/
              - No debug statements or TODO removal markers in code
              - All exports in __init__.py are intentional
              - MESSAGE_TYPES registry matches defined message types
              - Test fixtures contain only production test data

  # ========================================
  # AUDIT PHASE (Audit-Test-Fix Loop)
  # Validates cleanup didn't break functionality and catches test quality issues
  # ========================================
  - name: Audit Phase
    execution_groups:
      - execution: audit-test-fix-loop
        name: Contract validation audit
        agents:
          # Audit agent
          - type: audit
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/base.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/terminal_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/session_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/relay_messages.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/crypto/types.py
              - /home/code/myagents/RemoteAgents/tests/shared/test_vectors.py
            guidance: |
              Context: Testing and cleanup have been completed. This audit verifies test quality
              and checks for reward hacking patterns where tests pass but implementation is incorrect.

              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251203_remoteagents_shared-contracts.yml

              Audit Focus Areas:

              1. Test Fairness:
              - Do test vectors actually validate serialization or use shortcuts?
              - Are validation tests checking actual constraints or just accepting any value?
              - Do crypto interface tests verify contract compliance?
              - Are error cases properly tested (not just happy path)?

              2. Implementation Completeness:
              - Are all 13 message types registered in MESSAGE_TYPES?
              - Do all Protocol interfaces have complete method signatures?
              - Are all validation rules enforced (not just documented)?
              - Are base64 utilities handling edge cases (empty bytes, invalid base64)?

              3. Cross-Platform Compatibility:
