description: |
  WebSocket client with connection lifecycle and encrypted messaging.
  Connects to RemoteAgents relay server.

objectives:
  - Implement RelayClient using web_socket_channel
  - Handle connection lifecycle (connect, disconnect, reconnect)
  - Integrate with crypto layer for encrypted messages
  - Support message types: terminal_input, terminal_output, resize

dependencies:
  requires: [core-crypto]
  blocks: [terminal-display, pairing-ui]

key_endpoints:
  client: "wss://{relay}/ws/client/{pairing_code}"

success_criteria:
  - Connects to relay server successfully
  - Handles disconnection gracefully
  - Messages encrypted/decrypted correctly

phases:
  # ========================================
  # BUILD PHASE (Flutter)
  # ========================================
  - name: Build Phase
    execution_groups:
      # Sequential execution: Connection state must exist before RelayClient
      - execution: sequential
        agents:
          - type: builder
            # NOTE: Use Flutter build process, not Python build process
            process: src/myagents/frontend/agents/build/flutter_process.yml
            inputs:
              - /home/code/myagents/MyAgentsFrontend-core-networking/lib/core/networking/connection_state.dart
            guidance: |
              Context: Connection state management for WebSocket lifecycle.
              Tracks connection status and provides state change notifications.

              Instructions:
              1. Create lib/core/networking/connection_state.dart
              2. Define ConnectionState enum:
                 - disconnected: Not connected
                 - connecting: Connection in progress
                 - connected: Active connection
                 - reconnecting: Attempting to reconnect
                 - error: Connection error
              3. Create ConnectionStateManager with ChangeNotifier:
                 - Current state
                 - State change callbacks
                 - Error message storage
              4. Implement state transitions:
                 - disconnected -> connecting -> connected
                 - connected -> disconnected (on close)
                 - disconnected -> reconnecting (on auto-reconnect)
                 - any -> error (on failure)

              Why this matters: UI needs to react to connection state changes.
              State management provides reactive updates to widgets.

              Files to create:
              - lib/core/networking/connection_state.dart
            success_criteria:
              - All connection states defined
              - State transitions work correctly
              - ChangeNotifier notifies listeners on state changes
              - Error messages stored and accessible

          - type: builder
            process: src/myagents/frontend/agents/build/flutter_process.yml
            inputs:
              - /home/code/myagents/MyAgentsFrontend-core-networking/lib/core/networking/relay_client.dart
              - /home/code/myagents/MyAgentsFrontend-core-networking/lib/core/crypto/key_pair.dart
              - /home/code/myagents/MyAgentsFrontend-core-networking/lib/core/crypto/nacl_crypto.dart
              - /home/code/myagents/MyAgentsFrontend-core-networking/lib/core/crypto/message_envelope.dart
              - /home/code/myagents/MyAgentsFrontend-core-networking/lib/core/networking/connection_state.dart
            guidance: |
              Context: RelayClient manages WebSocket connection to RemoteAgents relay server.
              Integrates with crypto layer for E2E encrypted messaging.

              Instructions:
              1. Create lib/core/networking/relay_client.dart with RelayClient class
              2. Use web_socket_channel package for WebSocket client
              3. Implement connection management:
                 - connect(String relayUrl, String pairingCode): Connect to wss://{relay}/ws/client/{pairingCode}
                 - disconnect(): Close connection cleanly
                 - reconnect(): Retry connection after failure
              4. Integrate crypto layer:
                 - Store our KeyPair and remote KeyPair
                 - Use MessageEnvelope for all messages
                 - Encrypt outgoing messages with NaClCrypto
                 - Decrypt incoming messages with NaClCrypto
              5. Handle message types:
                 - terminal_input: Send user input to relay
                 - terminal_output: Receive terminal output from relay
                 - resize: Send terminal dimension changes
                 - pairing_request: Initial handshake
              6. Connection lifecycle:
                 - Update ConnectionStateManager on state changes
                 - Auto-reconnect on connection loss (exponential backoff)
                 - Handle WebSocket errors gracefully
              7. Message stream:
                 - Provide Stream<MessageEnvelope> for incoming messages
                 - Allow filtering by message type

              Why this matters: Core networking layer for all frontend-backend communication.
              Must be reliable and handle connection issues gracefully.

              Files to create:
              - lib/core/networking/relay_client.dart

              Files to reference:
              - lib/core/crypto/key_pair.dart (for key management)
              - lib/core/crypto/nacl_crypto.dart (for encryption)
              - lib/core/crypto/message_envelope.dart (for message format)
              - lib/core/networking/connection_state.dart (for state management)
            success_criteria:
              - Connects to relay server successfully
              - Messages encrypted before sending
              - Messages decrypted after receiving
              - Connection state updates correctly
              - Auto-reconnect works with exponential backoff
              - Message stream filters by type correctly

      # Parallel execution: Mock relay server for testing
      - execution: parallel
        agents:
          - type: builder
            process: src/myagents/frontend/agents/build/flutter_process.yml
            inputs:
              - /home/code/myagents/MyAgentsFrontend-core-networking/test/mock_relay_server.dart
            guidance: |
              Context: Mock relay server for testing RelayClient without RemoteAgents dependency.
              Enables testing connection lifecycle and message handling.

              Instructions:
              1. Create test/mock_relay_server.dart with MockRelayServer class
              2. Use shelf_web_socket package to create WebSocket server
              3. Implement relay server behavior:
                 - Accept connections at ws://localhost:{port}/ws/client/{pairing_code}
                 - Validate pairing code format (6 characters)
                 - Echo terminal_input messages back as terminal_output
                 - Support resize messages
                 - Handle disconnections cleanly
              4. Support test scenarios:
                 - Successful connection
                 - Invalid pairing code (reject connection)
                 - Forced disconnection (test reconnect)
                 - Message encryption (validate encrypted format)
              5. Provide test helpers:
                 - start(): Start server on random port
                 - stop(): Stop server cleanly
                 - getPort(): Get server port for client connection
                 - getReceivedMessages(): Get messages received by server

              Why this matters: Enables testing without RemoteAgents backend.
              Tests can run in CI/CD without external dependencies.

              Files to create:
              - test/mock_relay_server.dart
            success_criteria:
              - Server accepts WebSocket connections
              - Validates pairing code format
              - Echoes messages correctly
              - Supports disconnect/reconnect testing
              - Test helpers work correctly

