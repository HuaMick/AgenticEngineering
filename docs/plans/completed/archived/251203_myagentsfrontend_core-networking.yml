               -w /app ghcr.io/cirruslabs/flutter:latest flutter test test/core/networking/

  # ----------------------------------------
  # DOCKER NETWORKING ANALYSIS
  # ----------------------------------------
  docker_networking_issue:
    symptom: |
      Tests that require WebSocket connections between MockRelayServer and
      RelayClient fail with "HandshakeException: Connection terminated during handshake"

    what_works:
      - MockRelayServer starts successfully (logs show "MockRelayServer started on port XXXXX")
      - Server binds to localhost inside container
      - All crypto-only tests pass (KeyPair, MessageEnvelope, NaClCrypto)

    what_fails:
      - RelayClient.connect() to ws://localhost:{port}/ws/client/{code}
      - WebSocket handshake never completes
      - Tests timeout after 30 seconds

    root_cause_analysis: |
      Docker container networking creates an isolated network namespace.
      When MockRelayServer binds to "localhost" (127.0.0.1) inside the container,
      it's binding to the container's loopback interface, not the host's.

      The RelayClient also runs inside the same container and connects to
      localhost, which SHOULD work (same container = same network namespace).

      However, the Flutter test runner may be creating process isolation that
      interferes with localhost networking, OR there's a timing issue where
      the server isn't fully ready when the client tries to connect.

      The Docker image (ghcr.io/cirruslabs/flutter) may also have network
      configuration differences that affect localhost WebSocket connections.

    evidence:
      - Server logs show successful startup with port number
      - Client immediately fails with HandshakeException
      - No "Connection refused" error (server IS listening)
      - Handshake starts but terminates mid-process

    possible_causes:
      - Docker container network stack configuration
      - Flutter test process isolation
      - WebSocket protocol handling in containerized environment
      - Timing race between server start and client connect

    NOT_the_cause:
      - Code bugs (crypto tests pass, proving core logic works)
      - Import/dependency issues (compilation succeeds)
      - Test logic errors (test structure is valid)

