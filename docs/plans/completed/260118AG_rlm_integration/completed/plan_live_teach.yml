name: RLM Integration for AgenticGuidance
worktree: 260118AG_rlm_integration
branch: agenticguidance
status: completed
completed_at: "2026-01-19T21:00:00Z"
objective: |
  Integrate Recursive Language Model (RLM) patterns into AgenticGuidance to enable
  programmatic context decomposition, recursive self-invocation, and environment-based
  variable storage for handling contexts beyond model limits without lossy summarization.

research_summary:
  rlm_core_concepts:
    - context_as_environment: "Store long prompts as variables in a REPL environment rather than direct model input"
    - programmatic_access: "LLM writes code to examine, decompose, and recursively call itself over context snippets"
    - recursive_decomposition: "Tasks broken through filtering, chunking, and sub-calling patterns"
    - variable_management: "Answers accumulate in buffers with FINAL(answer) signaling completion"

  key_advantages:
    - "Handles 10M+ token contexts without expanded windows"
    - "No information loss (unlike summarization)"
    - "Task-agnostic - model determines decomposition strategy"
    - "Comparable or cheaper costs through selective loading"

  source_paper:
    title: "Recursive Language Models"
    authors: "Alex L. Zhang, Tim Kraska, Omar Khattab"
    institution: "MIT CSAIL"
    arxiv: "https://arxiv.org/abs/2512.24601"

phases:
  # ===========================================================================
  # PHASE 1: RLM Pattern Documentation and Guidelines
  # ===========================================================================
  - phase_id: teach_01
    name: "Phase 1: RLM Pattern Documentation and Guidelines"
    status: completed
    completed_at: "2026-01-19T18:00:00Z"
    description: |
      Create foundational documentation and guidelines for RLM integration.
      Establish patterns, definitions, and best practices before implementation.

    tasks:
      - id: t01_01
        description: "Create RLM concepts definition file in assets/definitions/"
        status: completed
        inputs:
          - modules/AgenticGuidance/assets/definitions/agent-loops.yml
          - modules/AgenticGuidance/assets/definitions/architecture-pattern.yml
        target_files:
          - modules/AgenticGuidance/assets/definitions/rlm-patterns.yml
        guidance: |
          Create file with sections:
      - rlm_definition: Core concept explanation
      - core_concepts: 4 named sub-concepts (context_as_environment, programmatic_access,
        recursive_decomposition, variable_management) each with definition, example, when_to_use
      - search_execution_firewall: The two-agent pattern (Curator vs Specialist)
      - integration_with_loops: How RLM relates to existing agent-loops.yml
      - anti_patterns: At least 3 anti-patterns with thresholds (premature RLM, unbounded recursion, context soup)
    success_criteria:
      - "File exists at modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"
      - "Contains rlm_definition with >50 word explanation"
      - "Contains core_concepts with 4 sub-concepts"
      - "Contains search_execution_firewall definition (Two-Agent Pattern)"
      - "Each core_concept has definition, example/patterns, when_to_use/purpose"
      - "Contains integration_with_loops referencing at least 2 existing loop types"
      - "Contains anti_patterns with at least 3 patterns including thresholds"

      - id: t01_02
        description: "Create RLM integration guideline in assets/guidelines/"
        status: completed
        dependencies: [t01_01]
        inputs:
          - modules/AgenticGuidance/assets/guidelines/context-minimisation.yml
          - modules/AgenticGuidance/assets/definitions/rlm-patterns.yml
        target_files:
          - modules/AgenticGuidance/assets/guidelines/rlm-integration.yml
        guidance: |
          Create file with sections:
      - guideline.name, guideline.definition, guideline.justification
      - rules: At least 6 rules (size threshold 500 lines, prefer filtering over chunking,
        bound recursion depth to 5, hierarchical variable naming, signal completion explicitly,
        and the Search-Execution Firewall rule)
      - search_execution_firewall: Rule for separating context curation from task execution
      - decision_tree: 3+ decision points for when to use RLM vs standard context
      - anti_patterns: At least 5 anti-patterns
      - related_guidelines: Reference context-minimisation.yml
        success_criteria:
          - "File exists at modules/AgenticGuidance/assets/guidelines/rlm-integration.yml"
          - "Contains guideline structure with name, definition, justification"
          - "Contains rules section with at least 5 rules with description, justification, characteristics"
          - "Contains decision_tree with at least 3 decision points"
          - "Contains anti_patterns section with at least 5 anti-patterns"
          - "References rlm-patterns.yml in inputs section"

      - id: t01_03
        description: "Update context-minimisation.yml with RLM alternatives"
        status: completed
        dependencies: [t01_01, t01_02]
        target_files:
          - modules/AgenticGuidance/assets/guidelines/context-minimisation.yml
        guidance: |
          ADDITIVE modifications (preserve all existing content):
          - Add rlm_alternative section with when_rlm_complements_minimisation (3+ situations)
          - Add new rule "Consider RLM for selective access" with reference to rlm-integration.yml
          - Add to related_guidelines: rlm-integration.yml and rlm-patterns.yml
        success_criteria:
          - "context-minimisation.yml contains new rlm_alternative section"
          - "rlm_alternative has when_rlm_complements_minimisation with at least 3 situations"
          - "rules section contains new 'Consider RLM for selective access' rule"
          - "related_guidelines includes rlm-integration.yml and rlm-patterns.yml"
          - "Existing rules and anti_patterns preserved unchanged"

  # ===========================================================================
  # PHASE 2: Agent Loop Enhancement for RLM
  # ===========================================================================
  - phase_id: teach_02
    name: "Phase 2: Agent Loop Enhancement for RLM"
    status: completed
    completed_at: "2026-01-19T19:30:00Z"
    description: |
      Extend existing agent loop definitions to support RLM patterns.
      Add recursive decomposition and context refinement capabilities.

    tasks:
      - id: t02_01
        description: "Add RLM-aware loop definitions to agent-loops.yml"
        status: completed
        dependencies: [t01_01, t01_02]
        target_files:
          - modules/AgenticGuidance/assets/definitions/agent-loops.yml
        guidance: |
          ADDITIVE modifications - add after exploration-loop, before planner-loop:

          1. rlm-decomposition-loop:
             - purpose: Recursive decomposition of large contexts
             - maximum_iterations: 3, max_recursion_depth: 3
             - core_pattern: Store context -> Write code to filter -> Extract subset ->
               Process (may recurse) -> Accumulate -> FINAL(answer)
             - variable_conventions: CONTEXT_{SOURCE}_{SECTION}, FILTER_{CRITERIA},
               ACCUMULATOR_{TYPE}, FINAL_{OUTPUT}
             - relationship_to_other_loops: enhancement_for test-fix, exploration, planner

          2. rlm-context-refinement-loop:
             - purpose: Progressive context loading based on iteration feedback
             - maximum_iterations: 5
             - context_progression: 4 levels (signatures only -> docstrings -> summaries -> full)

          3. rlm_loop_selection section with decision_criteria
        success_criteria:
          - "agent-loops.yml contains rlm-decomposition-loop definition"
          - "agent-loops.yml contains rlm-context-refinement-loop definition"
          - "rlm-decomposition-loop has purpose, maximum_iterations, max_recursion_depth, core_pattern, variable_conventions"
          - "rlm-context-refinement-loop has context_progression with at least 4 levels"
          - "Both loops reference rlm-patterns.yml or rlm-integration.yml"
          - "Existing loop definitions unchanged"

      - id: t02_02
        description: "Create RLM context accessor specification"
        status: completed
        dependencies: [t01_01, t02_01]
        target_files:
          - modules/AgenticGuidance/assets/specifications/rlm-context-accessor.yml
        guidance: |
          Create comprehensive specification with:
          - accessor_scope: Definition and purpose
          - core_functions: store_context, get_context, list_contexts, clear_context
          - code_analysis_functions: find_usage, get_signature, check_file_exists, extract_imports
          - structured_content_functions: parse_yaml, get_yaml_section, extract_markdown_section, filter_yaml_by_criteria
          - accumulator_functions: create_accumulator, accumulate, get_accumulated, signal_final
          - usage_patterns: filter_and_process, hierarchical_extraction, cross_document_analysis
          - implementation_notes: runtime_flexibility, error_handling, performance_considerations

          Each function must have signature, description, parameters, returns, and example/use_cases
        success_criteria:
          - "File exists at modules/AgenticGuidance/assets/specifications/rlm-context-accessor.yml"
          - "Contains core_functions with 4 functions (store, get, list, clear)"
          - "Contains code_analysis_functions with 4 functions"
          - "Contains structured_content_functions with 4 functions"
          - "Contains accumulator_functions with 4 functions"
          - "Each function has signature, description, parameters, returns"
          - "Contains usage_patterns with at least 3 patterns with steps and examples"

  # ===========================================================================
  # PHASE 3: Planner Agent Guidance Updates
  # ===========================================================================
  - phase_id: teach_03
    name: "Phase 3: Planner Agent Guidance Updates"
    status: completed
    completed_at: "2026-01-19T20:30:00Z"
    description: |
      Update planner agent guidance to leverage RLM patterns for
      programmatic task decomposition and context handling.

    tasks:
      - id: t03_01
        description: "Update planner-build process with RLM decomposition option"
        status: completed
        dependencies: [t02_02]
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-build/process.yml
          - modules/AgenticGuidance/agents/planner/planner-build/inputs.yml
        guidance: |
          PROCESS.YML additions:
          1. Add CONTEXT ASSESSMENT step after folder creation with RLM trigger conditions:
             - Objective references 10+ files across multiple directories
             - Specification documents exceed 1000 lines
             - Dependency graph requires recursive exploration
          2. Modify phase creation step with dual-path (standard/RLM)
          3. Add guideline for RLM usage criteria and cost considerations

          INPUTS.YML additions:
          - Reference rlm-patterns.yml (required: false)
          - Reference rlm-context-accessor.yml (required: false)
        success_criteria:
          - "process.yml contains RLM decision point step with trigger conditions"
          - "process.yml contains dual-path (standard/RLM) phase creation"
          - "inputs.yml references rlm-patterns.yml and rlm-context-accessor.yml"
          - "All existing planner-build functionality preserved"

      - id: t03_02
        description: "Update planner-guidance process for RLM-based friction analysis"
        status: completed
        dependencies: [t02_02]
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-guidance/process.yml
          - modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml
        guidance: |
          PROCESS.YML additions:
          1. Extend "Map the current path" step with RLM option for trajectories >500 lines
          2. Add CROSS-AGENT PATTERN DISCOVERY step with friction matrix analysis
          3. Modify plan building step to leverage RLM-generated evidence

          INPUTS.YML additions:
          - Reference rlm-patterns.yml (required: false)
          - Reference rlm-context-accessor.yml (required: false)
          - Add agent_logs pattern for cross-agent analysis
        success_criteria:
          - "process.yml contains RLM-enhanced analysis with >500 lines trigger"
          - "process.yml contains cross-agent pattern discovery step"
          - "inputs.yml includes agent_logs pattern for cross-agent analysis"
          - "All existing planner-guidance functionality preserved"

      - id: t03_03
        description: "Update planner-reviewer to validate RLM integration choices"
        status: completed
        dependencies: [t03_01, t03_02]
        target_files:
          - modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml
          - modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml
        guidance: |
          PROCESS.YML additions:
          1. Add RLM USAGE CHECKLIST after pattern alignment checklist:
             - RLM trigger conditions were met (>1000 lines, >10 files)
             - Recursion depth is bounded (max_depth <= 5)
             - Context accessor calls reference valid patterns
             - RLM-generated content conforms to standard plan structure
          2. Add FENCES for unjustified usage (<500 lines) and excessive recursion (>5 depth)
          3. Extend codebase verification for RLM artifacts

          INPUTS.YML additions:
          - Reference rlm-patterns.yml for validation
          - Reference rlm-integration.yml for when appropriate
          - Add rlm_review_criteria definition
        success_criteria:
          - "process.yml contains RLM USAGE CHECKLIST with 6 validation items"
          - "process.yml contains fences for unjustified usage and excessive recursion"
          - "inputs.yml references rlm-patterns.yml and rlm-integration.yml"
          - "Plans without RLM patterns reviewed without additional overhead"

