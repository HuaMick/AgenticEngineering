          INPUTS.YML additions:
          - Add rlm_audit_strategy definition
          - Add rlm_context_thresholds (ALWAYS >20 files, SELECTIVE 10-20, DIRECT <10)
        success_criteria:
          - "process.yml contains rlm_patterns section with context accessor operations"
          - "process.yml contains recursive_decomposition_pattern"
          - "inputs.yml contains rlm_context_thresholds"
          - "Findings include file:line evidence from programmatic extraction"
          - "Agent can audit 100+ test file packages without context overflow"

      - id: t04_02
