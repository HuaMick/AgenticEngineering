          - modules/AgenticGuidance/agents/test/test-final-output/inputs.yml
        guidance: |
          PROCESS.YML additions:
          1. Add rlm_patterns section with anomaly_detection_pattern:
             - scan_for_workarounds, detect_path_anomalies, scan_skip_patterns
             - measure_pass_fail_ratio
          2. Add critical_question_generation pattern with severity scoring
          3. Add recursive_data_analysis for multi-phase test runs
          4. Modify step 2 to reference RLM for large execution data (>5000 lines)

          INPUTS.YML additions:
          - Add rlm_interrogation_strategy definition
          - Add anomaly_severity_matrix (CRITICAL/HIGH/MEDIUM/LOW)
        success_criteria:
          - "process.yml contains anomaly_detection_pattern with 4+ operations"
          - "inputs.yml contains anomaly_severity_matrix"
          - "Generated questions are specific to discovered anomalies"
          - "Questions prioritized by severity in output"

      - id: t04_03
        description: "Update teacher-update-guidance with RLM trajectory analysis"
        status: completed
        dependencies: [t02_02]
        target_files:
          - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml
          - modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml
        guidance: |
          PROCESS.YML additions:
          1. Add rlm_patterns section with trajectory_analysis_pattern:
             - extract_decision_points, detect_backtracking, measure_iteration_depth
             - extract_error_recovery, identify_guidance_gaps
          2. Add cross_trajectory_pattern for multi-agent friction discovery
          3. Add friction_pattern_taxonomy with 5 categories:
             - path_unclear, missing_signpost, fence_violation, input_confusion, loop_inefficiency
          4. Modify step 2 to reference RLM for trajectories >500 actions

          INPUTS.YML additions:
          - Add rlm_trajectory_strategy definition
          - Add cross_trajectory_analysis friction matrix pattern
        success_criteria:
          - "process.yml contains trajectory_analysis_pattern with 5 operations"
          - "process.yml contains friction_pattern_taxonomy with 5 categories"
          - "inputs.yml contains cross_trajectory_analysis pattern"
          - "Agent can analyze 1000+ action trajectories without overflow"
          - "Recommendations mapped to specific guidance files"

