phases:
  # ---------------------------------------------------------------------------
  # PHASE 1: Agent Structure
  # ---------------------------------------------------------------------------
  - name: "Phase 1: Agent Structure"
    execution: sequential
    description: |
      Create the foundational agent structure following existing teacher patterns.
      Establish manifest, process.yml, and inputs.yml files.

    tasks:
      - id: "td_01_01"
        name: "Create agent manifest.yml"
        description: |
          Create manifest.yml for teacher-trace-diagnostics agent.
          Follow teacher-update-assets/manifest.yml structure.
        status: "completed"
        inputs:
          - "modules/AgenticGuidance/agents/teacher/teacher-update-assets/manifest.yml"
        target_files:
          - "modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/manifest.yml"
        guidance: |
          Create file with structure:
          ```yaml
          name: teacher-trace-diagnostics
          description: "Analyze LangSmith traces to identify guidance friction patterns and recommend improvements"
          version: "1.0"
          parent: "teacher"

          structure:
            inputs: "inputs.yml - Trace analysis configuration and friction pattern definitions"
            process: "process.yml - Trace analysis workflow"

          responsibilities:
            - "Fetch and filter LangSmith traces via AgenticLangSmith service"
            - "Detect backtracking patterns (agent revisits previous decisions)"
            - "Cluster repeated errors across runs"
            - "Identify path ambiguity (hesitation, multiple attempts)"
            - "Flag token consumption anomalies"
            - "Generate structured recommendations for guidance improvement"

          boundaries:
            - "Read-only access to traces (does not modify LangSmith data)"
            - "Does NOT directly update guidance files (outputs recommendations)"
            - "Does NOT replace teacher-update-guidance (complementary analysis)"
