        guidance: |
          Create example file with practical patterns:

          ```yaml
          # LangSmith Trace Analysis Examples
          # For use by teacher-trace-diagnostics agent
          # Demonstrates efficient trace fetching and pattern detection

          examples:
            basic_trace_fetch:
              description: "Fetch recent runs from a project"
              code: |
                from agenticlangsmith.service import LangSmithService

                service = LangSmithService()  # Uses LANGSMITH_API_KEY env var
                runs = service.list_runs(
                    project_name="my-agent-project",
                    limit=50
                )

                for run in runs:
                    print(f"{run['name']}: {run['status']} ({run['latency']:.2f}s)")

            filtered_error_fetch:
              description: "Fetch only runs with errors for clustering analysis"
              code: |
                from agenticlangsmith.service import LangSmithService
                from agenticlangsmith.filters import build_error_filter, build_time_filter, combine_filters
                from datetime import datetime, timedelta

                service = LangSmithService()

                # Build combined filter: errors in last 24 hours
                time_filter = build_time_filter(start=datetime.now() - timedelta(hours=24))
                error_filter = build_error_filter(has_error=True)
                combined = combine_filters(time_filter, error_filter)

                error_runs = service.list_runs(
                    project_name="my-agent-project",
                    filter_expr=combined,
                    limit=100
                )

            hierarchical_trace_analysis:
              description: "Analyze parent runs then drill into children"
              code: |
                from agenticlangsmith.service import LangSmithService
                from agenticlangsmith.filters import build_latency_filter

                service = LangSmithService()

                # Step 1: Get top-level runs (no parent)
                top_runs = service.list_runs(
                    project_name="my-agent-project",
                    limit=50
                )

                # Step 2: Identify anomalous runs (high latency or errors)
                anomalous = [r for r in top_runs if r['status'] == 'error' or (r['latency'] and r['latency'] > 60)]

                # Step 3: Fetch children only for anomalous runs
                for parent in anomalous:
                    children = service.list_runs(
                        project_name="my-agent-project",
                        filter_expr=f"eq(parent_run_id, '{parent['id']}')",
                        limit=100
                    )
                    # Analyze child patterns...

            backtracking_detection:
              description: "Detect backtracking pattern in trace sequence"
              pattern: |
                Backtracking is detected when:
                1. Same resource (file, URL, etc.) appears multiple times in tool calls
                2. No productive change between accesses
                3. Pattern suggests confusion rather than legitimate re-check

              code: |
                def detect_backtracking(runs, window_size=10):
                    """Analyze run sequence for backtracking patterns."""
                    findings = []
                    resource_access = {}  # resource -> [access_indices]

                    for i, run in enumerate(runs):
                        # Extract resource from run (file path, URL, etc.)
                        resource = extract_resource(run)
                        if not resource:
                            continue

                        if resource in resource_access:
                            previous = resource_access[resource]
                            # Check if this is a revisit within window
                            if i - previous[-1] <= window_size:
                                # Check if productive change between accesses
                                if not has_productive_change(runs[previous[-1]:i]):
                                    findings.append({
                                        'pattern': 'backtracking',
                                        'resource': resource,
                                        'first_access': previous[-1],
                                        'revisit': i,
                                        'run_ids': [runs[previous[-1]]['id'], run['id']]
                                    })
                            previous.append(i)
                        else:
                            resource_access[resource] = [i]

                    return findings

            token_anomaly_detection:
              description: "Identify runs with abnormal token consumption"
              code: |
                import statistics

                def detect_token_anomalies(runs, std_threshold=2.0):
                    """Flag runs with token usage > std_threshold standard deviations."""
                    findings = []

                    # Calculate statistics
                    token_counts = [r['total_tokens'] for r in runs if r['total_tokens']]
                    if len(token_counts) < 5:
                        return findings  # Not enough data

                    mean = statistics.mean(token_counts)
                    std = statistics.stdev(token_counts)
                    threshold = mean + (std_threshold * std)

                    for run in runs:
                        if run['total_tokens'] and run['total_tokens'] > threshold:
                            deviation = (run['total_tokens'] - mean) / std
                            severity = 'CRITICAL' if deviation > 3 else 'HIGH' if deviation > 2.5 else 'MEDIUM'
                            findings.append({
                                'pattern': 'token_anomaly',
                                'run_id': run['id'],
                                'run_name': run['name'],
                                'tokens': run['total_tokens'],
                                'mean': mean,
                                'std_deviations': round(deviation, 2),
                                'severity': severity
                            })

                    return findings

            rate_limiting:
              description: "Respect API rate limits when processing many runs"
              code: |
                import time

                def fetch_with_rate_limit(service, project_name, total_limit=500, batch_size=50, delay_seconds=1):
                    """Fetch runs in batches with rate limiting."""
                    all_runs = []
                    offset = 0

                    while len(all_runs) < total_limit:
                        batch = service.list_runs(
                            project_name=project_name,
                            limit=min(batch_size, total_limit - len(all_runs))
                        )
                        if not batch:
                            break

                        all_runs.extend(batch)
                        offset += len(batch)

                        # Rate limit delay
                        if len(all_runs) < total_limit:
                            time.sleep(delay_seconds)

                    return all_runs

          anti_patterns:
            - name: "Loading full inputs/outputs for all traces"
              problem: "Inputs and outputs can be very large, causing context overflow"
              solution: "Load inputs/outputs only for specific traces being investigated"

            - name: "Fetching all traces then filtering in memory"
              problem: "Wastes API calls and memory"
              solution: "Use LangSmith filter expressions to filter server-side"

            - name: "Ignoring rate limits"
              problem: "Can get rate-limited or banned"
              solution: "Add delays between batch requests, use batch_size parameter"

            - name: "Treating all errors equally"
              problem: "Floods recommendations with low-priority items"
              solution: "Use severity classification to prioritize findings"
          ```
