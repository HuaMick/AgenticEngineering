# Teacher-Trace-Diagnostics Agent Implementation Plan
# Plan: Build agent that analyzes LangSmith traces to identify guidance friction patterns
# Plan Folder: docs/plans/live/260118AG_rlm_integration
# Agent Target: modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/

name: "teacher-trace-diagnostics-implementation"
worktree_path: "/home/code/AgenticEngineering"
branch: "agenticguidance"
status: "completed"
priority: "high"
plan_file: "docs/plans/live/260118AG_rlm_integration/live/plan_live_teach_trace_diagnostics.yml"

context: |
  This plan creates a new teacher agent (teacher-trace-diagnostics) that consumes
  LangSmith traces via API and analyzes them for guidance friction patterns.

  The agent is complementary to teacher-update-guidance:
  - teacher-update-guidance: Analyzes agent logs/text output
  - teacher-trace-diagnostics: Analyzes structured LangSmith trace data

  Key challenges addressed:
  - Large trace volumes from subagent orchestration (100s of traces per run)
  - Context window overflow when processing nested trace hierarchies
  - Identifying systematic friction patterns across multiple runs

  RLM TEST CASE: This agent serves as a practical test case for RLM (Recursive
  Language Model) patterns. By using RLM decomposition for trace analysis, we
  validate that RLM patterns work effectively for real-world context management
  scenarios where trace data can flood the context window.

  DEPENDENCY: Requires modules/AgenticLangSmith service wrapper for API access.
  DEPENDENCY: References RLM patterns from plan_live_teach.yml (rlm-patterns.yml,
  rlm-context-accessor.yml when implemented).

related_plans:
  orchestration: "orchestration_rlm_integration.mmd"
  rlm_patterns: "plan_live_teach.yml"

inputs:
  - location: "modules/AgenticGuidance/agents/teacher/manifest.yml"
    description: "Teacher category routing patterns for sub-agent discovery"

  - location: "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"
    description: "Reference structure for process.yml (goal, inputs, outputs, steps, guidelines)"

  - location: "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml"
    description: "Reference structure for inputs.yml (layers, core_inputs, definitions)"

  - location: "modules/AgenticLangSmith/src/agenticlangsmith/service.py"
    description: "LangSmith API service wrapper with list_runs, get_run, get_project_stats"

  - location: "modules/AgenticLangSmith/src/agenticlangsmith/filters.py"
    description: "Filter builders for LangSmith queries (time, type, error, tag, latency, token)"

open_questions:
  - id: "TQ-001"
    question: "Should trace analysis be time-bounded (e.g., last 24h) or run-bounded (e.g., last 50 runs)?"
    severity: "medium"
    status: "RESOLVED"
    resolution: "Time-bounded with configurable default (24h)"
    rationale: |
      High-activity orchestration use case benefits from "what happened recently" analysis.
      Configuration allows adjustment: time_range_hours, run_limit, max_run_limit.

  - id: "TQ-002"
    question: "How should the agent handle trace data that exceeds context limits?"
    severity: "high"
    status: "RESOLVED"
    resolution: "RLM Search-Execution Firewall - separate curation from analysis"
    rationale: |
      This agent serves as a TEST CASE for RLM patterns. To prevent context bloating, 
      we use a two-agent pattern:
      1. TRACE CURATOR: A sub-agent that stores traces as environment variables, 
         writes filter code, and extracts only the "bad" or relevant traces.
      2. TRACE ANALYST: The primary agent that takes the curated subset and 
         generates the final diagnostic report.
      This ensures the "messy" search history does not affect the final reasoning.

design_decisions:
  - id: "DD-001"
    decision: "Use RLM decomposition for trace analysis"
    date: "2026-01-19"
    context: "Agent is a test case for RLM patterns; validates RLM for real-world context management"

  - id: "DD-002"
    decision: "Time-bounded analysis with configurable defaults"
    date: "2026-01-19"
    context: "Aligns with 'recent activity' mental model for high-activity orchestration"

