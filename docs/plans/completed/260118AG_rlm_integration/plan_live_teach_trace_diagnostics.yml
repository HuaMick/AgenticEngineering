          ```
        success_criteria:
          - "File exists at modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/manifest.yml"
          - "Contains name, description, version, parent fields"
          - "Contains structure section with inputs and process references"
          - "Contains responsibilities with 6 items"
          - "Contains boundaries with 4 items"
          - "Contains integration section referencing langsmith_service"

      - id: "td_01_02"
        name: "Create agent process.yml"
        description: |
          Create process.yml with goal, inputs, outputs, steps, and guidelines.
          Follow teacher-update-guidance/process.yml structure.
        status: "completed"
        dependencies: ["td_01_01"]
        inputs:
          - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"
          - "modules/AgenticLangSmith/src/agenticlangsmith/service.py"
        target_files:
          - "modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml"
        guidance: |
          Create process.yml with:

          ```yaml
          process:
            goal: |
              Analyze LangSmith traces to identify guidance friction patterns and generate
              structured recommendations for improving agent paths, fences, and signposts.
              This agent examines trace structure, timing, and error patterns rather than
              raw text logs.

            loop_context:
              participates_in:
                - "guidance-test-loop"
              loop_definition: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.guidance-test-loop"
              note: |
                Operates at meta-level analyzing trace data. Can be invoked after orchestration
                runs to identify systematic friction patterns across multiple agent executions.

            inputs:
              - location: "modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/inputs.yml"
                description: "Trace diagnostics configuration and friction pattern definitions"

            outputs:
              - name: "trace_diagnostics_report"
                format: "yaml"
                location: "Returned to orchestrator or written to plan audit folder"
                schema:
                  analysis_summary:
                    traces_analyzed: "integer"
                    time_range: "string - ISO date range"
                    project_name: "string"
                    friction_patterns_detected: "integer"
                  friction_findings:
                    - id: "string - unique finding ID"
                      pattern_type: "enum(backtracking, error_cluster, path_ambiguity, token_anomaly)"
                      severity: "enum(CRITICAL, HIGH, MEDIUM, LOW)"
                      trace_ids: "array - LangSmith trace IDs exhibiting pattern"
                      description: "string - what was detected"
                      evidence:
                        - trace_id: "string"
                          run_name: "string"
                          indicator: "string - specific observation"
                      affected_guidance:
                        - file: "string - path to guidance file"
                          section: "string - relevant section"
                      recommendation:
                        type: "enum(path_clarity, signpost_addition, fence_strengthening, example_improvement)"
                        proposed_change: "string"
                        rationale: "string"
                  statistics:
                    error_rate: "float - percentage of runs with errors"
                    avg_latency: "float - seconds"
                    total_tokens: "integer"
                    backtracking_rate: "float - percentage of runs with backtracking"

            steps:
              - |
                STEP 1: VALIDATE INPUTS AND CONFIGURATION

                1. Load inputs.yml and verify all required inputs are accessible
                2. Confirm LangSmith API is available (LANGSMITH_API_KEY environment variable)
                3. Identify target project name from inputs or use default
                4. Determine analysis scope:
                   - Time range (default: last 24 hours)
                   - Run limit (default: 100 runs, max: 500)
                   - Run type filter (default: all types)

                If LangSmith API is unavailable, STOP and report configuration error.

              - |
                STEP 2: FETCH AND FILTER TRACES

                Using AgenticLangSmith service:
                1. Call list_runs() with project_name and limit
                2. For each top-level run, fetch child runs to build trace hierarchy
                3. Apply pre-filters to reduce data volume:
                   - Exclude runs shorter than 1 second (likely trivial)
                   - Prioritize runs with errors for detailed analysis
                   - Sample long-running traces for latency patterns

                CONTEXT MANAGEMENT via RLM DECOMPOSITION:
                This agent uses RLM (Recursive Language Model) patterns for context management.
                Reference: modules/AgenticGuidance/assets/definitions/rlm-patterns.yml (when implemented)

                RLM Pattern for Trace Analysis:
                1. STORE CONTEXT: Store trace metadata as environment variables
                   - CONTEXT_TRACES_SUMMARIES: Top-level run summaries (id, name, status, latency, tokens)
                   - CONTEXT_TRACES_ERRORS: Runs with error status
                   - CONTEXT_TRACES_ANOMALIES: Runs flagged for detailed analysis

                2. PROGRAMMATIC ACCESS: Write code to examine and filter
                   - filter_by_error(): Extract error runs from CONTEXT_TRACES_SUMMARIES
                   - filter_by_latency(threshold): Extract high-latency runs
                   - filter_by_tokens(std_dev): Extract token anomalies

                3. RECURSIVE DECOMPOSITION: Process large sets in subsets
                   - If >100 traces: Decompose by time window (1-hour chunks)
                   - If >500 traces: Decompose by run type first, then time
                   - Each subset processed independently, results accumulated

                4. ACCUMULATOR PATTERN: Collect findings progressively
                   - ACCUMULATOR_FRICTION_FINDINGS: List of detected patterns
                   - ACCUMULATOR_STATISTICS: Aggregate metrics
                   - FINAL(trace_diagnostics_report): Signal completion

                Never load full inputs/outputs for all traces simultaneously.

              - |
                STEP 3: DETECT FRICTION PATTERNS

                Apply pattern detection algorithms defined in inputs.yml:

                A. BACKTRACKING DETECTION
                   - Identify runs where agent revisits previous tool calls
                   - Look for repeated file reads without intervening writes
                   - Detect undo patterns (delete followed by recreate)
                   - Threshold: >2 revisits to same resource = backtracking

                B. ERROR CLUSTERING
                   - Group errors by error message similarity
                   - Identify recurring error types across runs
                   - Track error recovery patterns (retry success rate)
                   - Threshold: >3 similar errors across runs = cluster

                C. PATH AMBIGUITY
                   - Detect hesitation: long pauses between tool calls (>30s)
                   - Identify multiple attempts at same step
                   - Look for tool call sequences that suggest confusion
                   - Threshold: >2 attempts at same logical step = ambiguity

                D. TOKEN CONSUMPTION ANOMALY
                   - Flag traces with token usage >2x median
                   - Identify runs with excessive prompt tokens (bloated context)
                   - Detect runs with minimal completion tokens (truncated outputs)
                   - Threshold: >2 standard deviations from mean = anomaly

              - |
                STEP 4: MAP FRICTION TO GUIDANCE

                For each detected friction pattern:
                1. Identify the agent that exhibited the pattern (from trace name/tags)
                2. Locate the agent's guidance files:
                   - process.yml at modules/AgenticGuidance/agents/<category>/<agent>/
                   - inputs.yml at same location
                   - Referenced definitions and guidelines
                3. Map the friction type to guidance improvement type:
                   - backtracking -> path_clarity (unclear next steps)
                   - error_cluster -> fence_strengthening (missing guardrails)
                   - path_ambiguity -> signpost_addition (missing examples)
                   - token_anomaly -> context_minimisation (bloated inputs)

              - |
                STEP 5: GENERATE RECOMMENDATIONS

                For each friction finding:
                1. Create structured recommendation with:
                   - Unique ID (format: TD-YYYYMMDD-NNN)
                   - Pattern type and severity
                   - Evidence (trace IDs, specific observations)
                   - Affected guidance file and section
                   - Proposed change with rationale
                2. Prioritize by severity:
                   - CRITICAL: Errors preventing task completion
                   - HIGH: Errors requiring manual recovery
                   - MEDIUM: Inefficiencies (backtracking, high tokens)
                   - LOW: Minor hesitations, style issues
                3. De-duplicate similar recommendations

              - |
                STEP 6: OUTPUT DIAGNOSTICS REPORT

                Generate trace_diagnostics_report with:
                1. analysis_summary: scope, counts, time range
                2. friction_findings: ordered by severity
                3. statistics: aggregate metrics for the analyzed traces

                If invoked by orchestrator, return structured output.
                If invoked standalone, write to plan audit folder.

            guidelines:
              - |
                TRACE SAMPLING: Never attempt to load all trace data at once.
                Use hierarchical sampling: summaries first, details on demand.
              - |
                EVIDENCE-BASED: Every recommendation must cite specific trace IDs
                and observations. Avoid generic suggestions without evidence.
              - |
                COMPLEMENTARY ROLE: This agent identifies friction patterns in traces.
                It does NOT directly modify guidance files - teacher-update-guidance
                consumes these recommendations to make changes.
              - |
                THRESHOLD DISCIPLINE: Use defined thresholds consistently.
                Do not lower thresholds to find more patterns - maintain signal quality.
              - |
                RATE LIMITING: Respect LangSmith API rate limits.
                Add delays between batch requests if needed.
          ```
        success_criteria:
          - "File exists at modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/process.yml"
          - "Contains goal explaining trace analysis purpose"
          - "Contains loop_context referencing guidance-test-loop"
          - "Contains inputs referencing inputs.yml"
          - "Contains outputs with trace_diagnostics_report schema"
          - "Contains 6 steps covering validate, fetch, detect, map, recommend, output"
          - "Contains guidelines with at least 5 items"
          - "Step 2 includes context management for large trace volumes"
          - "Step 3 defines 4 friction pattern detection algorithms with thresholds"

      - id: "td_01_03"
        name: "Create agent inputs.yml"
        description: |
          Create inputs.yml with layers, core_inputs, and trace-specific definitions.
          Follow teacher-update-guidance/inputs.yml structure.
        status: "completed"
        dependencies: ["td_01_01"]
        inputs:
          - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/inputs.yml"
        target_files:
          - "modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/inputs.yml"
        guidance: |
          Create inputs.yml with:

          ```yaml
          # Teacher-Trace-Diagnostics Agent Inputs
          # Configuration for LangSmith trace analysis and friction pattern detection
          # This agent analyzes structured trace data to identify guidance friction patterns
          # It does NOT directly update guidance files (that's teacher-update-guidance)

          inputs:
            agent_type: "teacher-trace-diagnostics"
            version: "1.0"

            agent_context:
              category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.teacher"
              role: "teacher-trace-diagnostics"

            # Reference layers (transitive loading)
            # Context-minimized: only layers relevant to trace analysis
            layers:
              - type: layer
                path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
                description: "Core system definitions (agent architecture, workflows)"
                required: true

              - type: layer
                path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
                description: "Universal behavioral guidelines"
                required: true

            core_inputs:
              # Path/fence/signpost concepts - for mapping friction to guidance types
              - type: file
                path: "modules/AgenticGuidance/assets/definitions/path.yml"
                description: "Path concept: what agents read to determine next actions"
                required: true

              - type: file
                path: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml"
                description: "Fence, signpost concepts and guidance placement"
                required: true

              # Agent context discovery - for locating guidance files to improve
              - type: file
                path: "modules/AgenticGuidance/assets/definitions/agent-context-files.yml"
                description: "Where agents find process.yml, inputs.yml, manifest.yml"
                required: true

              # Root-cause analysis - for accurate friction diagnosis
              - type: file
                path: "modules/AgenticGuidance/assets/guidelines/root-cause-analysis.yml"
                description: "Root-cause analysis patterns for diagnosing friction"
                required: true

              # Context minimisation - for token anomaly recommendations
              - type: file
                path: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
                description: "Context minimisation patterns (for token anomaly recommendations)"
                required: true

            # LangSmith integration configuration
            langsmith_config:
              service_module: "modules/AgenticLangSmith/src/agenticlangsmith/service.py"
              filters_module: "modules/AgenticLangSmith/src/agenticlangsmith/filters.py"
              api_key_env: "LANGSMITH_API_KEY"
              default_project: null  # Use LangSmith default if not specified
              rate_limit:
                requests_per_minute: 60
                batch_size: 50

            # Analysis scope defaults
            analysis_defaults:
              time_range_hours: 24
              run_limit: 100
              max_run_limit: 500
              min_run_duration_seconds: 1.0
              include_child_runs: true
              run_types: null  # null = all types

            # Friction pattern definitions
            definitions:
              trace_diagnostics_role: |
                As a teacher-trace-diagnostics agent:
                - You analyze LangSmith trace data to identify friction patterns
                - You detect backtracking, error clusters, path ambiguity, and token anomalies
                - You map friction patterns to affected guidance files
                - You generate structured recommendations with evidence
                - You do NOT directly modify guidance files
                - You do NOT replace teacher-update-guidance (you provide it with insights)
                - You respect API rate limits and context window constraints

              friction_patterns:
                backtracking:
                  definition: |
                    Agent revisits previous decisions or resources without making progress.
                    Indicates unclear path or missing signposts about next steps.
                  indicators:
                    - "Repeated reads of same file without intervening writes"
                    - "Undo patterns: delete followed by recreate"
                    - "Loop iterations that produce same output"
                    - "Tool calls that reverse previous tool calls"
                  threshold:
                    min_revisits: 2
                    window_size: 10  # Look at last N tool calls
                  severity_mapping:
                    "2-3 revisits": "MEDIUM"
                    "4-5 revisits": "HIGH"
                    ">5 revisits": "CRITICAL"
                  guidance_type: "path_clarity"

                error_cluster:
                  definition: |
                    Same or similar errors occur across multiple runs.
                    Indicates missing fence (guardrail) or inadequate error guidance.
                  indicators:
                    - "Error messages with same root cause across runs"
                    - "Repeated failures at same step type"
                    - "Timeout errors suggesting stuck patterns"
                    - "Permission/access errors suggesting missing setup guidance"
                  threshold:
                    min_occurrences: 3
                    similarity_threshold: 0.8  # Cosine similarity of error messages
                  severity_mapping:
                    "3-5 occurrences": "MEDIUM"
                    "6-10 occurrences": "HIGH"
                    ">10 occurrences": "CRITICAL"
                  guidance_type: "fence_strengthening"

                path_ambiguity:
                  definition: |
                    Agent hesitates or makes multiple attempts at the same logical step.
                    Indicates missing signpost (example) showing the expected approach.
                  indicators:
                    - "Long pauses between tool calls (>30 seconds)"
                    - "Multiple attempts at same tool with different parameters"
                    - "Abandoned tool calls (started but not completed)"
                    - "Sequential reads of many files suggesting search behavior"
                  threshold:
                    pause_seconds: 30
                    max_attempts: 2
                  severity_mapping:
                    "2 attempts": "LOW"
                    "3 attempts": "MEDIUM"
                    ">3 attempts": "HIGH"
                  guidance_type: "signpost_addition"

                token_anomaly:
                  definition: |
                    Trace consumes significantly more tokens than typical runs.
                    Indicates bloated context, excessive verbosity, or inefficient prompting.
                  indicators:
                    - "Total tokens >2x median for run type"
                    - "Prompt tokens dominate (>80% of total)"
                    - "Completion truncated due to token limit"
                    - "Repeated inclusion of same context in child runs"
                  threshold:
                    std_deviations: 2.0
                    prompt_ratio_max: 0.8
                  severity_mapping:
                    "2-3 std dev": "MEDIUM"
                    ">3 std dev": "HIGH"
                    "truncated output": "CRITICAL"
                  guidance_type: "context_minimisation"

              recommendation_templates:
                path_clarity:
                  focus: "Make next steps clearer in process.yml"
                  typical_changes:
                    - "Add explicit step transitions"
                    - "Clarify when to proceed vs. when to iterate"
                    - "Add decision criteria for branching paths"

                fence_strengthening:
                  focus: "Add guardrails to prevent common errors"
                  typical_changes:
                    - "Add validation steps before risky operations"
                    - "Add error handling guidance"
                    - "Add pre-conditions checklist"

                signpost_addition:
                  focus: "Add examples showing expected approach"
                  typical_changes:
                    - "Add inline examples in process steps"
                    - "Add example files in assets/examples/"
                    - "Add 'good vs bad' comparisons"

                context_minimisation:
                  focus: "Reduce unnecessary context in inputs"
                  typical_changes:
                    - "Remove unused input references"
                    - "Add filters to load only relevant sections"
                    - "Split large inputs into demand-loaded parts"
          ```
        success_criteria:
          - "File exists at modules/AgenticGuidance/agents/teacher/teacher-trace-diagnostics/inputs.yml"
          - "Contains agent_type and version"
          - "Contains agent_context with category and role"
          - "Contains layers with core-system.yml and core-guidelines.yml"
          - "Contains core_inputs with path.yml, guidance-artifacts.yml, agent-context-files.yml"
          - "Contains langsmith_config with service_module, api_key_env, rate_limit"
          - "Contains analysis_defaults with time_range_hours, run_limit, max_run_limit"
          - "Contains definitions.friction_patterns with 4 patterns (backtracking, error_cluster, path_ambiguity, token_anomaly)"
          - "Each friction pattern has definition, indicators, threshold, severity_mapping, guidance_type"
          - "Contains recommendation_templates with 4 types"

      - id: "td_01_04"
        name: "Update teacher manifest.yml routing"
        description: |
