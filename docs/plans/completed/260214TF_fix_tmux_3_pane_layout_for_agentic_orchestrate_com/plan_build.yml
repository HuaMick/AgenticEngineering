_template_status: active
plan:
  name: Fix tmux 3-pane layout for agentic orchestrate
  worktree: /home/code/AgenticEngineering-260212TC_add_test_cleaner_agent
  branch: 260214TF_fix_tmux_orchestrate_layout
  status: planning
  created: '2026-02-14'
  objective: 'Fix the tmux 3-pane layout failure in `agentic orchestrate` command.
    Currently, when users

    run `agentic orchestrate -m loop` (or any mode), they get a plain single-pane
    Claude Code

    session instead of the expected 3-pane tmux layout with session/question dashboards.


    ROOT CAUSE 1 (PRIMARY - silent failure): `tmux new-session -d` creates a detached
    session

    without terminal dimensions. The subsequent `split-window -p 30` fails with "size
    missing"

    because tmux cannot calculate percentage-based splits without known dimensions.
    This raises

    RuntimeError which is caught at orchestrate.py:410, falling back silently to plain
    execvp.

    FIX: Add `-x 200 -y 50` to `tmux new-session -d` command.


    ROOT CAUSE 2 (secondary): The Claude command is sent to the main pane via `tmux
    send-keys`

    but Enter is never pressed (line 161). Even if the layout were created, the user
    would see

    a typed-but-not-executed command.

    FIX: Add "Enter" argument to the send-keys call.

    '
  scope:
    includes:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
    - modules/AgenticCLI/tests/test_tmux_layout.py
    - modules/AgenticCLI/tests/test_orchestrate_command.py
    excludes:
    - modules/AgenticCLI/src/agenticcli/utils/tmux.py
  impacted_files:
  - path: modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    change_type: modify
    change_category: implementation
    reason: Fix _create_new_session_layout to execute Claude command
  - path: modules/AgenticCLI/tests/test_tmux_layout.py
    change_type: create
    change_category: testing
    reason: New comprehensive test suite for tmux_layout module
  - path: modules/AgenticCLI/tests/test_orchestrate_command.py
    change_type: modify
    change_category: testing
    reason: Add tests for tmux layout path in orchestrate command
  impacted_artifacts:
  - artifact_type: function
    artifact_identifier: _create_new_session_layout
    impact_type: modify
    description: Add -x/-y dimensions to new-session and Enter key to send-keys for
      main pane
  - artifact_type: function
    artifact_identifier: attach_to_session
    impact_type: no_change
    description: Function works correctly - no changes needed
phases:
- name: Phase 1 - Root Cause Investigation & Documentation
  id: phase_01
  status: completed
  description: Investigate and document the exact failure point in the tmux layout
    creation
  tasks:
  - id: phase_01_001
    name: Trace execution path and identify failure point
    status: completed
    description: 'Investigation reveals TWO root causes:

      BUG 1 (PRIMARY): tmux new-session -d creates detached session without terminal

      dimensions. split-window -p 30 fails with "size missing" because percentage

      splits require known dimensions. This raises RuntimeError caught at orchestrate.py:410

      causing silent fallback to plain os.execvp. User never sees tmux layout at all.

      BUG 2 (SECONDARY): Claude command sent to main pane at line 161 without Enter
      key.

      Even with layout working, command would be typed but not executed.

      Verified: tmux_available()=True, is_in_tmux()=False, _create_new_session_layout()

      path taken but fails at first split-window call.

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    - modules/AgenticCLI/src/agenticcli/commands/orchestrate.py
- name: Phase 2 - Core Fix Implementation
  id: phase_02
  status: pending
  description: 'Fix both root causes: detached session dimensions and missing Enter
    key'
  tasks:
  - id: phase_02_001
    name: Add terminal dimensions to detached tmux session creation
    status: completed
    description: "CRITICAL FIX: Modify _create_new_session_layout() to add -x and\
      \ -y flags to\nthe `tmux new-session -d` command so that split-window can calculate\
      \ percentages.\nChange from:\n  [\"tmux\", \"new-session\", \"-d\", \"-s\",\
      \ session_name, \"-n\", \"orchestrator\", \"-P\", \"-F\", \"#{pane_id}\"]\n\
      To:\n  [\"tmux\", \"new-session\", \"-d\", \"-s\", session_name, \"-n\", \"\
      orchestrator\", \"-x\", \"200\", \"-y\", \"50\", \"-P\", \"-F\", \"#{pane_id}\"\
      ]\nWithout this, tmux split-window fails with \"size missing\" on detached sessions,\n\
      causing the entire layout creation to fail and fall back to plain session.\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    acceptance_criteria:
    - tmux new-session includes -x 200 -y 50
    - split-window -p 30 succeeds on detached session
    - No more 'size missing' error
  - id: phase_02_002
    name: Add Enter key to execute Claude command in _create_new_session_layout
    status: completed
    description: "Modify _create_new_session_layout() at line 161 to send Enter key\
      \ after the command.\nChange from:\n  subprocess.run([\"tmux\", \"send-keys\"\
      , \"-t\", main_pane_id, _shell_escape_cmd(claude_cmd)], check=True)\nTo:\n \
      \ subprocess.run([\"tmux\", \"send-keys\", \"-t\", main_pane_id, _shell_escape_cmd(claude_cmd),\
      \ \"Enter\"], check=True)\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
    acceptance_criteria:
    - Claude command is executed immediately in main pane
    - User sees running Claude session on attach, not typed command
  - id: phase_02_003
    name: Update comment to reflect new behavior
    status: completed
    description: 'Update the comment at lines 158-159 from "We''ll execute it when
      we attach" to

      reflect that the command is now executed immediately when the session is created.

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/utils/tmux_layout.py
