plan:
  name: Build Phase - CLI Remediation Implementation
  worktree: /home/code/AgenticEngineering
  branch: main
  status: planning
  created: '2026-02-01'
  objective: |
    Implement fixes for CLI regression issues:
    1. Global flags must work in BOTH positions (before AND after subcommand)
    2. Task commands must support phase-qualified task IDs (e.g., P2-01)

  scope:
    includes:
      - modules/AgenticCLI/src/agenticcli/cli.py
      - modules/AgenticCLI/src/agenticcli/commands/plan.py
    excludes: []

  phases:
    - id: P1
      name: Investigation
      status: pending
      tasks:
        - id: '01'
          name: Analyze current argparse implementation
          description: |
            Read cli.py to understand:
            - How _create_global_parent_parser works
            - How parents parameter is used in add_subparsers
            - Why global flags before subcommand stopped working
          status: pending

        - id: '02'
          name: Analyze task ID handling
          description: |
            Read plan.py _update_task_status function to understand:
            - How task_id search currently works
            - Where to insert phase-qualification logic
            - Impact on existing unqualified task ID usage
          status: pending

    - id: P2
      name: Fix Issue 1 - Global Flags Regression
      status: pending
      tasks:
        - id: '01'
          name: Implement global flags pre-parser
          description: |
            Add function to extract global flags from any position in sys.argv:
            - Parse --json, -j, --debug (no short -d due to conflicts)
            - Remove extracted flags from argv
            - Return dict of extracted flags and cleaned argv
          status: pending

        - id: '02'
          name: Integrate pre-parser into create_parser
          description: |
            Modify create_parser() to:
            1. Call pre-parser to extract global flags
            2. Pass cleaned argv to argparse
            3. Merge pre-parsed flags with argparse results
            4. Maintain backward compatibility with parent parser approach
          status: pending

        - id: '03'
          name: Update main() to use pre-parsed flags
          description: |
            Ensure main() receives merged flags from both parsing passes
          status: pending

    - id: P3
      name: Fix Issue 2 - Phase-Qualified Task IDs
      status: pending
      tasks:
        - id: '01'
          name: Add task ID parser helper
          description: |
            Create function to parse task_id string:
            - Input: "P2-01" or "P2.01" or "01"
            - Output: (phase_id, task_id) tuple or (None, task_id)
            - Regex: r'^(P\d+)[-.](.+)$'
          status: pending

        - id: '02'
          name: Update _update_task_status to support qualified IDs
          description: |
            Modify _update_task_status to:
            1. Parse task_id using helper
            2. If phase_id present, filter search to that phase
            3. If phase_id absent, use existing first-match behavior
            4. Provide better error message if qualified ID not found
          status: pending

        - id: '03'
          name: Update cmd_task_start and cmd_task_complete
          description: |
            Ensure both commands pass task_id to _update_task_status unchanged
            (parsing logic is centralized in _update_task_status)
          status: pending

    - id: P4
      name: Documentation Updates
      status: pending
      tasks:
        - id: '01'
          name: Update CLI usage examples
          description: |
            Update documentation to show both global flag positions:
            - agentic --json plan list (works)
            - agentic plan list --json (works)
          status: pending

        - id: '02'
          name: Document phase-qualified task IDs
          description: |
            Add examples of phase-qualified task IDs:
            - agentic plan task start P2-01
            - agentic plan task complete P2-01
          status: pending

  validation_criteria:
    - agentic --json plan list works (regression fixed)
    - agentic plan list --json works (original fix preserved)
    - agentic plan task complete P2-01 updates correct task
    - agentic plan task complete 01 updates first match (backward compat)
    - No new argparse conflicts introduced
