plan:
  name: Test Phase - CLI Remediation Validation
  worktree: /home/code/AgenticEngineering
  branch: main
  status: planning
  created: '2026-02-01'
  objective: 'Validate that both CLI issues are resolved and no regressions introduced.

    '
  scope:
    includes:
    - modules/AgenticCLI/src/agenticcli/cli.py
    - modules/AgenticCLI/src/agenticcli/commands/plan.py
    excludes: []
  phases:
  - id: P1
    name: Global Flags Validation
    status: pending
    tasks:
    - id: '01'
      name: Test global flags before subcommand
      description: 'Verify commands work with global flags BEFORE subcommand:

        - agentic --json plan list

        - agentic -j plan list

        - agentic --debug worktree status

        '
      status: pending
    - id: '02'
      name: Test global flags after subcommand
      description: 'Verify commands work with global flags AFTER subcommand:

        - agentic plan list --json

        - agentic plan list -j

        - agentic worktree status --debug

        '
      status: pending
    - id: '03'
      name: Test global flags with nested subcommands
      description: 'Verify global flags work at any position with deep nesting:

        - agentic --json context bootstrap

        - agentic context bootstrap --json

        - agentic context bootstrap -j

        '
      status: pending
    - id: '04'
      name: Verify no flag conflicts
      description: 'Ensure local flags still work and don''t conflict with global
        flags:

        - Commands with -d flag (description, directory, detail)

        - Commands with -v flag (verbose, vars)

        '
      status: pending
  - id: P2
    name: Phase-Qualified Task ID Validation
    status: pending
    tasks:
    - id: '01'
      name: Test unqualified task IDs (backward compat)
      description: 'Verify existing behavior still works:

        - agentic plan task start 01 (starts first match)

        - agentic plan task complete 01 (completes first match)

        '
      status: completed
      completed_at: '2026-02-01T19:56:23.023168'
    - id: '02'
      name: Test phase-qualified task IDs with dash
      description: 'Verify phase-qualified IDs work with dash separator:

        - agentic plan task start P2-01

        - agentic plan task complete P2-01

        - agentic plan task update P3-02 --status in_progress

        '
      status: completed
      completed_at: '2026-02-01T19:56:35.790914'
    - id: '03'
      name: Test phase-qualified task IDs with dot
      description: 'Verify phase-qualified IDs work with dot separator (optional):

        - agentic plan task start P2.01

        - agentic plan task complete P2.01

        '
      status: pending
    - id: '04'
      name: Test error handling for invalid qualified IDs
      description: 'Verify clear error messages for:

        - Non-existent phase: agentic plan task start P99-01

        - Non-existent task in valid phase: agentic plan task start P2-99

        - Malformed qualifier: agentic plan task start X2-01

        '
      status: pending
  - id: P3
    name: Integration Testing
    status: pending
    tasks:
    - id: '01'
      name: Test with real plan folder
      description: 'Use existing plan folder (260201CR_cli_remediation) to test:

        - Starting tasks with qualified IDs

        - Completing tasks with qualified IDs

        - Listing tasks shows correct status

        '
      status: pending
    - id: '02'
      name: Test help output
      description: 'Verify help text shows correct usage:

        - agentic --help (shows global flags)

        - agentic plan task start --help (shows task_id usage)

        '
      status: pending
    - id: '03'
      name: Test JSON output mode
      description: 'Verify JSON output works with both flag positions:

        - agentic --json plan list (returns valid JSON)

        - agentic plan list -j (returns valid JSON)

        '
      status: pending
  validation_criteria:
  - All global flag positions work correctly
  - Phase-qualified task IDs work correctly
  - Backward compatibility maintained for unqualified IDs
  - Error messages are clear and actionable
  - No regressions in existing functionality
