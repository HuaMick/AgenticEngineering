  \  session planner ...     \u2190 was: planner ...\n  session ralph ...       \u2190\
  \ was: ralph ...\n  session terminal ...    \u2190 was: terminal ...\n\n  Unchanged\
  \ at top level:\n  plan, stories, context, entrypoint, manifest, cicd, langsmith,\
  \ question\n\n  New additions:\n  devops worktree         \u2190 was: worktree\n\
  \  (inputs and template are being removed/hidden)\n"
