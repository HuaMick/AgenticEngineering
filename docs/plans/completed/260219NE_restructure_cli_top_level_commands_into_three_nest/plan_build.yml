  \   \u2190 was: rebuild\n\n  configure config ...    \u2190 was: config ...\n  configure\
  \ preferences   \u2190 was: preferences ...\n  configure env ...       \u2190 was:\
  \ env ...\n  configure state ...     \u2190 was: state ...\n\n  session orchestrate\
