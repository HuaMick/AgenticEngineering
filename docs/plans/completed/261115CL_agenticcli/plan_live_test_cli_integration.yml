# ========================================
# OBJECTIVE
# ========================================
objective: |
  Create a comprehensive integration test suite for the AgenticCLI that validates
  end-to-end workflows, command chaining, cross-worktree functionality, error handling,
  output consistency, and performance characteristics.

  This test plan ensures the CLI functions correctly as the central tool for agentic
  workflows, supporting both human operators and AI agents in managing planning,
  context retrieval, and task execution.

# ========================================
# CONTEXT
# ========================================
context: |
  The AgenticCLI has grown to include:
  - 15+ command groups (worktree, plan, context, config, langsmith, etc.)
  - CCI (CLI Context Injection) for agent initialization
  - Main-First plan resolution for cross-worktree operations
  - Task list management and status tracking
  - Multiple output modes (human-readable, JSON, YAML)

  Current test coverage focuses on unit tests for individual commands. This plan
  addresses the gap in integration testing where commands interact in realistic
  workflows.

  KEY TESTING GAPS:
  1. Command chaining (context bootstrap -> plan task -> agent execution)
  2. Cross-worktree data consistency
  3. Error recovery and graceful degradation
  4. Output format consistency across command groups
  5. Performance under realistic load

