_template_status: active

# Ralph CLI Registration - Implementation Plan
# Created: 2026-02-08
# Purpose: Register ralph command group in CLI and verify end-to-end

plan:
  name: "Ralph CLI Registration"
  worktree: "/home/code/AgenticEngineering"
  branch: "main"
  status: completed
  created: "2026-02-08"

  objective: |
    Register the existing `agentic ralph` command group in cli.py so that
    ralph commands (start, stop, status, next, history) are accessible via
    the CLI. The handlers in ralph.py are already Typer-native.

  scope:
    includes:
      - "modules/AgenticCLI/src/agenticcli/cli.py"
      - "modules/AgenticCLI/src/agenticcli/commands/ralph.py"
    excludes:
      - "modules/AgenticGuidance/"

  impacted_files:
    - path: "modules/AgenticCLI/src/agenticcli/cli.py"
      change_type: modify
      change_category: implementation
      reason: "Add ralph Typer app registration"

  impacted_artifacts:
    - artifact_type: cli_command
      artifact_identifier: "agentic ralph start"
      impact_type: new
      description: "Start Ralph loop to process all live plans"
    - artifact_type: cli_command
      artifact_identifier: "agentic ralph stop"
      impact_type: new
      description: "Stop the running Ralph loop"
    - artifact_type: cli_command
      artifact_identifier: "agentic ralph status"
      impact_type: new
      description: "Show Ralph loop status and progress"
    - artifact_type: cli_command
      artifact_identifier: "agentic ralph next"
      impact_type: new
      description: "Get the next recommended action"
    - artifact_type: cli_command
      artifact_identifier: "agentic ralph history"
      impact_type: new
      description: "Show iteration history"

  phases:
    - name: "Phase 1 - Registration"
      id: "phase_01"
      status: completed
      tasks:
        - id: "RL_001"
          name: "Import ralph app and register with add_typer in cli.py"
          status: completed
        - id: "RL_002"
          name: "Add 'ralph' to GLOBAL_COMMANDS set"
          status: completed
        - id: "RL_003"
          name: "Verify CLI import works without errors"
          status: completed
    - name: "Phase 2 - Verification"
      id: "phase_02"
      status: completed
      tasks:
        - id: "RL_004"
          name: "Verify agentic ralph --help shows all 5 commands"
          status: completed
        - id: "RL_005"
          name: "Verify agentic ralph next -j returns valid JSON"
          status: completed
        - id: "RL_006"
          name: "Verify agentic ralph status -j returns valid JSON"
          status: completed
        - id: "RL_007"
          name: "Run all 29 existing ralph tests and confirm pass"
          status: completed
