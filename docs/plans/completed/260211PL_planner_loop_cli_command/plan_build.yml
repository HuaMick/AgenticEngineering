title: Planner Loop CLI Command
description: 'Implement an ''agentic planner start'' command that automates the orchestration
  planning

  process defined in docs/prompts/orchestration_planner.md. The command runs a planning

  loop that: bootstraps with role orchestration-planning, discovers stories, iterates

  over live plans missing orchestration MMDs, spawns specialized planners and reviewers,

  manages review loops (max 3 iterations), generates and validates orchestration MMDs,

  and updates plan task status.


  The command is modeled after ''agentic loop start'' (Ralph Loop) but is specialized

  for the planning workflow. It supports background execution (--background) and

  max iterations (--max-iterations).

  '
plan_type: build
created: '2026-02-11'
affected_stories:
- US-CLI-03-01
- US-ORCH-01-01
- US-ORCH-01-02
success_criteria:
- '''agentic planner start'' launches the planning loop and iterates over live plans'
- Plans missing orchestration MMDs are identified and processed
- Story discovery runs before phase determination for each plan
- Specialized planners (planner-build, planner-test, etc.) are spawned per plan type
- Review loops with planner-reviewer run up to 3 iterations before escalating
- Orchestration MMDs are generated via 'agentic plan orchestration generate' or planner-orchestration
  spawn
- Generated MMDs are validated via 'agentic plan orchestration validate'
- Plan task status is updated via 'agentic plan task start/complete'
- '''--background'' flag runs the loop in background with PID tracking'
- '''--max-iterations'' controls maximum loop iterations (default 10)'
- Loop exits with completion promise when all plans have orchestration MMDs
- Health check runs before any work (agentic --version && agentic plan list)
- CLI error recovery protocol is followed when commands fail
- All new code has unit tests
phases:
- id: P1
  name: Planner workflow service
  description: 'Create the core planning loop workflow as a service module. This encapsulates

    the orchestration planner logic from docs/prompts/orchestration_planner.md into

    a Python service that the CLI command will invoke.

    '
  tasks:
  - id: P1-T1
    title: Create PlannerLoopWorkflow service
    status: completed
    agent: build-python
    description: "Create modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py\
      \ with\na PlannerLoopWorkflow class that encapsulates the planning loop logic.\n\
      \nKey responsibilities:\n- discover_plans_needing_orchestration(): List live\
      \ plans, check each for\n  existing orchestration_*.mmd files, return list of\
      \ plans needing work\n- run_health_check(): Execute 'agentic --version && agentic\
      \ plan list' and\n  raise if unhealthy\n- discover_stories(plan_folder, project):\
      \ Run 'agentic --json stories find'\n  and return affected stories\n- determine_plan_type(plan_folder):\
      \ Check for plan_build.yml, plan_teach.yml, etc.\n- spawn_planner(plan_folder,\
      \ plan_type): Spawn appropriate planner agent\n  (planner-build, planner-test,\
      \ planner-guidance, etc.) via\n  'agentic session spawn --role <planner> --plan\
      \ <folder> -b --dangerously-skip-permissions'\n- spawn_reviewer(plan_folder):\
      \ Spawn planner-reviewer agent and wait for\n  completion. Returns approved/rejected\
      \ status.\n- generate_mmd(plan_folder): Run 'agentic plan orchestration generate\
      \ --plan <folder>'\n- validate_mmd(plan_folder): Run 'agentic plan orchestration\
      \ validate --plan <folder>'\n- update_task_status(task_id, action, plan_folder):\
      \ Run\n  'agentic plan task start/complete <id> --plan <folder>'\n\nAll subprocess\
      \ calls should use subprocess.run with capture_output=True.\nFollow the pattern\
      \ from commands/loop.py for process management.\nUse logging module for structured\
      \ logging (import logging; logger = logging.getLogger(__name__)).\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
  - id: P1-T2
    title: Create PlannerLoopRunner orchestrator
    status: completed
    agent: build-python
    description: "In the same planner_loop.py file, add a PlannerLoopRunner class\
      \ that\norchestrates the full planning loop:\n\ndef run(self, max_iterations=10,\
      \ completion_promise=None):\n  1. Run health check\n  2. For each iteration\
      \ up to max_iterations:\n     a. Discover plans needing orchestration\n    \
      \ b. If none found, output completion promise and exit\n     c. For each plan\
      \ needing work:\n        - Discover stories (mandatory before phase determination)\n\
      \        - Determine plan type\n        - If plan YAML doesn't exist, skip (log\
      \ warning)\n        - Spawn appropriate planner agent\n        - Wait for planner\
      \ completion\n        - Run review loop (max 3 review iterations):\n       \
      \   * Spawn reviewer\n          * If approved: break\n          * If rejected:\
      \ re-spawn planner with feedback\n          * After 3 rejections: log escalation,\
      \ skip plan\n        - Generate MMD (try CLI first, fall back to planner-orchestration\
      \ spawn)\n        - Validate MMD (retry up to 3 times on failure)\n        -\
      \ Update task status\n     d. Log iteration summary\n  3. If max_iterations\
      \ reached without completion, log warning\n\nThe runner should store state (which\
      \ plans processed, iteration count) for\nstatus reporting. Use a simple dict\
      \ stored in memory during execution.\n\nThe default completion_promise is:\n\
      \"Planning complete. All plans have orchestration MMDs.\"\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
- id: P2
  name: CLI command registration
  description: 'Register the ''agentic planner'' command group with ''start'', ''stop'',
    and ''status''

    subcommands in the CLI. Follow the pattern of ''agentic loop'' but specialized

    for planning.

    '
  tasks:
  - id: P2-T1
    title: Create planner command handler
    status: completed
    agent: build-python
    description: "Create modules/AgenticCLI/src/agenticcli/commands/planner.py with:\n\
      \nhandle(args, ctx) router function dispatching to:\n- cmd_start(args, ctx):\
      \ Start the planner loop\n  Options:\n  - --max-iterations / -m (int, default\
      \ 10)\n  - --background / -b (bool)\n  - --completion-promise / -c (str, optional)\n\
      \  - --project / -p (str, optional - for story discovery filtering)\n  - --dangerously-skip-permissions\
      \ (bool)\n  - --directory / -d (str, optional - working directory)\n\n  Implementation:\n\
      \  - Instantiate PlannerLoopRunner with provided options\n  - If --background:\
      \ fork subprocess, write PID to state, print loop ID\n  - If foreground: call\
      \ runner.run() directly, display progress\n\n- cmd_stop(args, ctx): Stop a running\
      \ planner loop\n  - Accept planner_id argument\n  - Find PID from state, send\
      \ SIGTERM (or SIGKILL with --force)\n\n- cmd_status(args, ctx): Show planner\
      \ loop status\n  - Accept planner_id argument\n  - Show iteration count, plans\
      \ processed, current plan, errors\n\nFollow the exact pattern from commands/loop.py\
      \ for:\n- Background process management (PID tracking, state registry)\n- JSON\
      \ output support (check is_json_output())\n- Console output formatting (use\
      \ print_success, print_error, etc.)\n\nStore planner loop state in ~/.agentic/planner_loops/\
      \ (parallel to loops/).\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/planner.py
  - id: P2-T2
    title: Register planner commands in cli.py
    status: completed
    agent: build-python
    description: 'Add the ''planner'' command group to modules/AgenticCLI/src/agenticcli/cli.py.

      Follow the exact pattern of the ''loop'' command group:


      1. Create planner_app Typer sub-app with help text

      2. Register with app.add_typer(planner_app, name="planner")

      3. Add _planner_handle(args) helper function

      4. Add commands: planner_start, planner_stop, planner_status

      5. Map command flags to SimpleNamespace attributes


      Flags for ''planner start'':

      - --max-iterations / -m (int, default 10)

      - --background / -b (bool)

      - --completion-promise / -c (str, optional)

      - --project / -p (str, optional)

      - --dangerously-skip-permissions (bool)

      - --directory / -d (str, optional)

      - --worktree / -w (str, optional, alias for --directory)


      Add "planner" to the GLOBAL_COMMANDS set (not project-scoped).

      '
    target_files:
    - modules/AgenticCLI/src/agenticcli/cli.py
- id: P3
  name: Background execution and state management
  description: 'Implement background execution support, PID tracking, and loop state

    persistence. Reuse patterns from the existing loop command.

    '
  tasks:
  - id: P3-T1
    title: Implement planner loop state persistence
    status: completed
    agent: build-python
    description: "In the planner command handler (commands/planner.py), implement\
      \ state\npersistence for planner loops. Follow the loop.py pattern:\n\nState\
      \ directory: ~/.agentic/planner_loops/\nState file per loop: {loop_id}.json\n\
      \nState schema:\n{\n  \"id\": \"pl-<uuid-short>\",\n  \"status\": \"running|completed|failed|stopped\"\
      ,\n  \"started_at\": \"ISO timestamp\",\n  \"completed_at\": \"ISO timestamp\
      \ or null\",\n  \"pid\": <int>,\n  \"max_iterations\": <int>,\n  \"current_iteration\"\
      : <int>,\n  \"plans_processed\": [\"folder1\", \"folder2\"],\n  \"plans_pending\"\
      : [\"folder3\"],\n  \"current_plan\": \"folder3 or null\",\n  \"errors\": [{\"\
      plan\": \"folder\", \"error\": \"message\", \"timestamp\": \"ISO\"}],\n  \"\
      completion_promise\": \"string\",\n  \"directory\": \"path\"\n}\n\nImplement:\n\
      - _save_state(state, state_dir): Write state to JSON file\n- _load_state(loop_id,\
      \ state_dir): Load state from JSON file\n- _list_states(state_dir, active_only=False):\
      \ List all loop states\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/planner.py
  - id: P3-T2
    title: Implement background process forking
    status: completed
    agent: build-python
    description: "In cmd_start(), implement background execution:\n\nIf --background:\n\
      1. Build the command line to re-invoke 'agentic planner start' with\n   same\
      \ flags but without --background (to run in foreground in subprocess)\n2. Use\
      \ subprocess.Popen with stdout/stderr redirected to log files in\n   ~/.agentic/planner_loops/{loop_id}/\n\
      3. Store PID in state file\n4. Print loop ID and PID to console\n5. Return immediately\n\
      \nFollow loop.py's _run_background_loop() pattern exactly.\nUse the StateRegistry\
      \ for process tracking if available.\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/commands/planner.py
- id: P4
  name: Integration with orchestration planner prompt
  description: 'Wire the planner loop to use the orchestration planner prompt engineering

    from docs/prompts/orchestration_planner.md. The prompt content drives the

    spawned sessions'' behavior.

    '
  tasks:
  - id: P4-T1
    title: Implement prompt compilation for spawned planners
    status: completed
    agent: build-python
    description: "In PlannerLoopWorkflow, implement prompt compilation for the spawned\n\
      planner sessions. When spawning a planner (planner-build, planner-test, etc.),\n\
      the session should be bootstrapped with the orchestration-planning role context.\n\
      \nThe spawn_planner method should:\n1. Use 'agentic session spawn --role <planner-type>\
      \ --plan <folder> -b\n   --dangerously-skip-permissions' for specialized planners\n\
      2. The --role flag ensures the agent gets its process.yml guidance\n3. The --plan\
      \ flag provides plan context\n\nThe bootstrap step (agentic --json context bootstrap\
      \ --role orchestration-planning)\nhappens at the start of the overall loop,\
      \ not per-planner. This provides\nthe objective and context for the entire planning\
      \ session.\n\nAdd a compile_bootstrap_context(role=\"orchestration-planning\"\
      ) method that\ncalls the bootstrap command and returns the context dict.\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
- id: P5
  name: Session management and monitoring
  description: 'Implement waiting for spawned sessions to complete, monitoring their
    status,

    and handling failures. The planner loop must track all spawned sessions.

    '
  tasks:
  - id: P5-T1
    title: Implement session wait and monitoring
    status: completed
    agent: build-python
    description: "In PlannerLoopWorkflow, implement session lifecycle management:\n\
      \n- wait_for_session(session_id, timeout=600): Poll session status via\n  'agentic\
      \ --json session status <id>' until completed/failed/stopped.\n  Use a polling\
      \ interval of 10 seconds. Return the final status.\n- get_session_result(session_id):\
      \ Get session output/result.\n- is_session_alive(session_id): Quick check if\
      \ session is still running.\n\nFor the review loop, implement:\n- run_review_cycle(plan_folder,\
      \ max_reviews=3):\n  1. Spawn planner-reviewer\n  2. Wait for completion\n \
      \ 3. Parse result (approved/rejected)\n  4. If rejected and attempts < max_reviews:\n\
      \     - Extract rejection feedback\n     - Re-spawn planner with feedback context\n\
      \     - Wait for planner completion\n     - Loop back to reviewer\n  5. Return\
      \ (approved: bool, iterations: int, feedback: str)\n\nHandle timeouts gracefully\
      \ - if a session doesn't complete within timeout,\nlog error and move to next\
      \ plan.\n"
    target_files:
    - modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py
