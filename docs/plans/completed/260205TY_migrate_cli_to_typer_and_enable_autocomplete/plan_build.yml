name: 260205TY_migrate_cli_to_typer_and_enable_autocomplete
description: Migrate AgenticCLI from argparse to Typer and enable shell auto-completion.
status: pending
phases:
- id: P1
  name: Infrastructure & Dependencies
  status: pending
  tasks:
  - id: TY-001
    description: Add Typer and Rich to dependencies
    status: completed
    priority: high
    guidance: Add 'typer[all]' and 'rich' (if not already there) to modules/AgenticCLI/pyproject.toml.
- id: P2
  name: Core Refactor
  status: pending
  tasks:
  - id: TY-002
    description: Refactor main parser to Typer
    status: completed
    priority: high
    guidance: Rewrite modules/AgenticCLI/src/agenticcli/cli.py to use typer.Typer.
      Map existing subcommands to Typer commands.
  - id: TY-003
    description: Update subcommand handlers
    status: completed
    priority: medium
    guidance: Ensure all handler functions in src/agenticcli/commands/ work with Typer's
      argument passing style.
- id: P3
  name: Feature Parity & Global Flags
  status: pending
  tasks:
  - id: TY-004
    description: Implement Global Flags (--json, --debug)
    status: completed
    priority: high
    guidance: Use Typer callbacks or global options to ensure --json and --debug work
      across all commands.
  - id: TY-005
    description: Ensure Agent Name shortcuts work
    status: completed
    priority: medium
    guidance: Maintain support for 'agentic <agent-name> --bootstrap' logic currently
      in entry.py.
- id: P4
  name: Auto-Completion & Installation
  status: pending
  tasks:
  - id: TY-006
    description: Configure Shell Completion
    status: completed
    priority: high
    guidance: Ensure Typer's built-in completion works. Test 'agentic --install-completion
      bash'.
  - id: TY-007
    description: Update Setup Wizard
    status: completed
    priority: medium
    guidance: Update 'agentic setup' to prompt user to install shell completion.
- id: P5
  name: Verification
  status: pending
  tasks:
  - id: TY-008
    description: Verify migration with existing tests
    status: completed
    priority: high
    guidance: Run modules/AgenticCLI/tests/ and ensure no regressions.
  - id: TY-009
    description: Manual UAT for Tab Completion
    status: completed
    priority: high
    guidance: Open a new bash shell, type 'agentic <TAB><TAB>' and verify command
      suggestions appear.
