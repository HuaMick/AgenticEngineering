user_stories:
  # ============================================================================
  # Studio Commands User Stories
  # ============================================================================
  
  - id: US-STUDIO-001
    name: "Starting LangGraph Studio (Works from Anywhere)"
    category: "studio"
    persona: "Developer wanting to start LangGraph Studio from any directory"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true  # User has run 'myagents setup'
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/myagents/langgraph.json (created by setup)"
        - "~/.config/myagents/config.yml (created by setup)"
      test_scenarios:
        scenario_1:
          name: "From project directory"
          current_directory: "/home/test-user/my-agent-project"
          files_present:
            - "langgraph.json (local project)"
        scenario_2:
          name: "From outside project directory"
          current_directory: "/home/code/myagents"
          files_present: []
          files_missing:
            - "langgraph.json (no local project)"
    
    journey:
      # PRE-TEST VALIDATION: Verify installation was successful by checking error message format
      - step: 0
        action: "Validate installation: Run `myagents studio` from /tmp (no config files exist)"
        expected: "Error message format matches new code: 'No langgraph.json found in ~/.config/myagents/. Run 'myagents setup' to configure.'"
        failure_indicators:
          - "Old error message format: 'Run from project directory' (indicates stale installation)"
          - "Error message doesn't mention ~/.config/myagents/"
          - "Installation validation failed - wrong version installed"
        note: |
          This step validates that installation was successful by checking error message format.
          Old code produces: "No langgraph.json found. Run from project directory or use 'myagents setup'."
          New code produces: "No langgraph.json found in ~/.config/myagents/. Run 'myagents setup' to configure."
          If old format appears, installation failed or wrong version is installed.

      # Test Scenario 1: From within project directory (local langgraph.json takes priority)
      - step: 1
        action: "cd /home/test-user/my-agent-project && Run `myagents studio start`"
        expected: "Studio starts successfully using local langgraph.json"
        failure_indicators:
          - "Studio fails to start"
          - "Error message unclear"
          - "Requires langgraph.json error"
      
      - step: 2
        action: "Verify Studio is accessible"
        expected: "Studio UI accessible at default port"
        failure_indicators:
          - "Studio not accessible"
          - "Port conflict"
      
      - step: 3
        action: "Stop Studio: `myagents studio stop`"
        expected: "Studio stops successfully"
        failure_indicators:
          - "Stop command fails"
      
      # Test Scenario 2: From outside project directory (home directory config)
      - step: 4
        action: "cd /home/code/myagents && Run `myagents studio start`"
        expected: "Studio starts successfully using ~/.config/myagents/langgraph.json (home directory single source of truth)"
        failure_indicators:
          - "Studio fails to start"
          - "Error: No langgraph.json found in ~/.config/myagents/"
          - "Doesn't use home directory config"
          - "Unclear error message"
      
      - step: 5
        action: "Verify Studio is accessible"
        expected: "Studio UI accessible at default port"
        failure_indicators:
          - "Studio not accessible"
          - "Port conflict"
      
      - step: 6
        action: "Stop Studio: `myagents studio stop`"
        expected: "Studio stops successfully"
        failure_indicators:
          - "Stop command fails"
    
    success_criteria:
      - "Studio starts without errors from project directory"
      - "Studio starts without errors from outside project directory (uses home directory config)"
      - "Studio accessible via browser in both scenarios"
      - "Clear startup messages"
      - "Home directory config is single source of truth (local project files ignored)"
      - "Home directory config works from any directory"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "README.md (Work from Anywhere section)"
      - "docs/guides/usage.md"
  
  - id: US-STUDIO-002
    name: "Starting Studio with Custom Port (Works from Anywhere)"
    category: "studio"
    persona: "Developer needing custom port for Studio, running from any directory"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/myagents/langgraph.json"
      port_conflict: true  # Default port in use
      current_directory: "/tmp"  # Outside project directory
    
    journey:
      # PRE-TEST VALIDATION: Verify installation was successful
      - step: 0
        action: "Validate installation: Temporarily remove config, run `myagents studio` from /tmp"
        expected: "Error message format matches new code: 'No langgraph.json found in ~/.config/myagents/. Run 'myagents setup' to configure.'"
        failure_indicators:
          - "Old error message format: 'Run from project directory' (indicates stale installation)"
          - "Error message doesn't mention ~/.config/myagents/"
          - "Installation validation failed"
        note: "Restore config after validation, then proceed with test"

      - step: 1
        action: "Run `myagents studio start --port 3000` from /tmp (no local project)"
        expected: "Studio starts on port 3000 using home directory config (single source of truth)"
        failure_indicators:
          - "Port option ignored"
          - "Wrong port used"
          - "Port already in use error"
          - "Error: No langgraph.json found in ~/.config/myagents/"
          - "Doesn't use home directory config"
      
      - step: 2
        action: "Verify Studio accessible on custom port"
        expected: "Studio accessible at port 3000"
        failure_indicators:
          - "Not accessible on specified port"
      
      - step: 3
        action: "Stop Studio: `myagents studio stop`"
        expected: "Studio stops successfully"
        failure_indicators:
          - "Stop command fails"
    
    success_criteria:
      - "Custom port option works from outside project directory"
      - "Studio uses specified port"
      - "No port conflicts"
      - "Home directory config works with custom port (single source of truth)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "README.md (Work from Anywhere section)"
  
  - id: US-STUDIO-003
    name: "Checking Studio Status (Works from Anywhere)"
    category: "studio"
    persona: "Developer checking if Studio is running from any directory"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/myagents/langgraph.json"
      studio_running: false
      current_directory: "/tmp"  # Outside project directory
    
    journey:
      - step: 1
        action: "Run `myagents studio status` from /tmp (no local project)"
        expected: "Status shows Studio not running"
        failure_indicators:
          - "Command fails"
          - "Unclear status message"
          - "Error: No langgraph.json found"
          - "Doesn't fall back to home directory"
      
      - step: 2
        action: "Start Studio from /tmp, then check status again"
        expected: "Status shows Studio running"
        failure_indicators:
          - "Status doesn't update"
          - "Wrong status reported"
          - "Can't start Studio from outside project"
    
    success_criteria:
      - "Status command works from outside project directory"
      - "Status accurately reflects Studio state"
      - "Clear status messages"
      - "Home directory config works for status command (single source of truth)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "README.md (Work from Anywhere section)"
  
  - id: US-STUDIO-004
    name: "Stopping Studio Gracefully (Works from Anywhere)"
    category: "studio"
    persona: "Developer stopping Studio from any directory"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/myagents/langgraph.json"
      studio_running: true
      current_directory: "/tmp"  # Outside project directory
    
    journey:
      - step: 1
        action: "Run `myagents studio stop` from /tmp (no local project)"
        expected: "Studio stops gracefully using home directory config (single source of truth)"
        failure_indicators:
          - "Stop command fails"
          - "Studio doesn't stop"
          - "Process left running"
          - "Error: No langgraph.json found in ~/.config/myagents/"
          - "Doesn't use home directory config"
      
      - step: 2
        action: "Verify Studio is stopped"
        expected: "Studio no longer accessible"
        failure_indicators:
          - "Studio still running"
          - "Port still in use"
    
    success_criteria:
      - "Stop command works from outside project directory"
      - "Studio stops cleanly"
      - "No orphaned processes"
      - "Home directory config works for stop command (single source of truth)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "README.md (Work from Anywhere section)"
  
  - id: US-STUDIO-005
    name: "Force Stopping Studio (Works from Anywhere)"
    category: "studio"
    persona: "Developer needing to force stop Studio from any directory"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/myagents/langgraph.json"
      studio_running: true
      studio_unresponsive: true
      current_directory: "/tmp"  # Outside project directory
    
    journey:
      - step: 1
        action: "Run `myagents studio stop --force` from /tmp (no local project)"
        expected: "Studio force stopped using home directory config (single source of truth)"
        failure_indicators:
          - "Force stop fails"
          - "Studio still running"
          - "Process not killed"
          - "Error: No langgraph.json found in ~/.config/myagents/"
          - "Doesn't use home directory config"
      
      - step: 2
        action: "Verify Studio is stopped"
        expected: "Studio completely stopped"
        failure_indicators:
          - "Process still exists"
    
    success_criteria:
      - "Force stop works from outside project directory"
      - "Studio forcefully terminated"
      - "No zombie processes"
      - "Home directory config works for force stop (single source of truth)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "README.md (Work from Anywhere section)"
  
  - id: US-STUDIO-006
    name: "Restarting Studio (Works from Anywhere)"
    category: "studio"
    persona: "Developer restarting Studio from any directory"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/myagents/langgraph.json"
      studio_running: true
      current_directory: "/tmp"  # Outside project directory
    
    journey:
      - step: 1
        action: "Run `myagents studio restart` from /tmp (no local project)"
        expected: "Studio restarts successfully using home directory config (single source of truth)"
        failure_indicators:
          - "Restart fails"
          - "Studio doesn't stop first"
          - "Studio doesn't start after stop"
          - "Error: No langgraph.json found in ~/.config/myagents/"
          - "Doesn't use home directory config"
      
      - step: 2
        action: "Verify Studio is running after restart"
        expected: "Studio accessible after restart"
        failure_indicators:
          - "Studio not accessible"
          - "Restart incomplete"
    
    success_criteria:
      - "Restart command works from outside project directory"
      - "Studio stops then starts"
      - "Studio accessible after restart"
      - "Home directory config works for restart command (single source of truth)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "README.md (Work from Anywhere section)"

