# ==============================================================================
# RemoteAgents User Stories - Encryption
# ==============================================================================

category: encryption
name: "Encryption"
description: "End-to-end encryption and key exchange"

stories:
  # --------------------------------------------------------------------------
  # US-CRYPTO-001: Key Exchange During Pairing
  # --------------------------------------------------------------------------
  - id: US-CRYPTO-001
    title: "E2E Key Exchange on Pairing"
    priority: CRITICAL
    persona: web_user

    description: |
      As a user, I want public keys exchanged during pairing
      so that E2E encryption can be established.

    preconditions:
      - Desktop has generated keypair
      - Client has generated keypair

    journey:
      - step: 1
        action: "Desktop creates session with desktop_public_key"
        expected: "Session stores desktop public key"

      - step: 2
        action: "Client sends SessionPair with client_public_key"
        expected: "Session stores client public key"

      - step: 3
        action: "Relay sends SessionPaired to both parties"
        expected: |
          Desktop receives client_public_key
          Client receives desktop_public_key

      - step: 4
        action: "Both parties can encrypt messages for each other"
        expected: "Shared secret derived from keypairs"

    acceptance_criteria:
      - Public keys exchanged via SessionPaired message
      - Keys are Curve25519 format
      - Both parties can derive shared secret
      - Relay cannot decrypt messages

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-CRYPTO-002: Message Encryption
  # --------------------------------------------------------------------------
  - id: US-CRYPTO-002
    title: "Messages Encrypted End-to-End"
    priority: CRITICAL
    persona: web_user

    description: |
      As a user, I want all terminal data encrypted
      so that relay cannot see my data.

    preconditions:
      - Session is PAIRED
      - Keys exchanged

    journey:
      - step: 1
        action: "Client sends TerminalInput ('secret password')"
        expected: "Input encrypted using NaCl box"

      - step: 2
        action: "Encrypted message wrapped in EncryptedBlob"
        expected: "Contains payload (base64), nonce (base64)"

      - step: 3
        action: "Relay receives EncryptedBlob"
        expected: "Relay routes without decryption"

      - step: 4
        action: "Desktop decrypts with shared secret"
        expected: "Original 'secret password' recovered"

    acceptance_criteria:
      - NaCl box encryption (XSalsa20-Poly1305)
      - Unique nonce per message (24 bytes)
      - Relay cannot decrypt payload
      - Recipient decrypts successfully

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-CRYPTO-003: Nonce Uniqueness
  # --------------------------------------------------------------------------
  - id: US-CRYPTO-003
    title: "Unique Nonce Per Message"
    priority: HIGH
    persona: platform_operator

    description: |
      As a security-conscious user, I want each message to use a unique nonce
      so that replay attacks are prevented.

    preconditions:
      - Session is PAIRED

    journey:
      - step: 1
        action: "Send 100 messages in sequence"
        expected: "Each message has different nonce"

      - step: 2
        action: "Collect all nonces"
        expected: "100 unique nonce values"

      - step: 3
        action: "Verify no collisions"
        expected: "Set of nonces has 100 elements"

    acceptance_criteria:
      - Nonce generated randomly for each message
      - 24-byte nonce (192 bits of randomness)
      - No nonce reuse within session
      - Forward secrecy maintained

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-CRYPTO-004: Relay Cannot Access Plaintext
  # --------------------------------------------------------------------------
  - id: US-CRYPTO-004
    title: "Relay Blind to Message Content"
    priority: HIGH
    persona: platform_operator

    description: |
      As a security-conscious user, I want the relay to be blind to content
      so that my data is protected even if relay is compromised.

    preconditions:
      - Session is PAIRED
      - Traffic captured at relay

    journey:
      - step: 1
        action: "Client sends TerminalInput with known content"
        expected: "Encrypted payload transmitted"

      - step: 2
        action: "Capture EncryptedBlob at relay"
        expected: "Only encrypted bytes visible"

      - step: 3
        action: "Attempt to find plaintext in relay logs"
        expected: "Plaintext not present"

      - step: 4
        action: "Verify relay only routes, doesn't decrypt"
        expected: "Relay code has no decryption logic"

    acceptance_criteria:
      - Relay never sees plaintext
      - Relay logs don't contain terminal content
      - Only session IDs and metadata visible to relay
      - E2E encryption architecture verified

    test_layers:
      local: false
      docker: false
      integration: true
