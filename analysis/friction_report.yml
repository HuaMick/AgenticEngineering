        phases_completed=[]. Document in orchestration-executor/process.yml:
        "Lock timeout at iteration=1 is always safe to retry." This turns a
        22-minute wasted session into a 30-second delay.

    - priority: 4
      friction_point: FP-015
      action: >
        Stop writing zero-duration orchestration poll records to the persistent
        session store. March 29 had 73 such records (55% of all sessions) with
        no diagnostic value. Write idle polls to a transient heartbeat log only.
        This reduces session store write pressure and makes session-list readable.

    - priority: 5
      friction_point: FP-016
      action: >
        Add an epic-status FENCE to build-story-writer: if the target epic is
        already in status=completed, halt immediately and do not overwrite
