friction_points:

  - id: FP-011
    type: excessive_iteration
    severity: critical
    agent: "planner-explore"
    guidance_file: "planner/planner-explore/process.yml"
    description: >
      Epic 260329AG_eliminate_mandatory_disk_folder_creation_make_epic experienced
      12 consecutive planner-explore failures in two distinct waves before eventual
      success on the 13th and 14th spawns. The root failure mode was sdk_pane_failure
      (error_code="sdk_pane_failure", error_type="sdk_error") with num_turns=0 and
      cost_usd=0.0 for every failing session -- meaning the Claude SDK process never
      started a conversation turn. The retry system (max_retries=3 per category,
      4 categories in parallel) exhausted all 12 slots (4 x 3) and the orchestration
      session orch-851711d reported "Parallel explore: 0/4 categories completed."
      Wave 1 (4 sessions, 15:26): each ran for ~275-308s before the tmux pane
      process died without producing any turns. Wave 2 (8 sessions, 15:31): each
      failed in ~4-5s -- fast enough to trigger quick-exit detection but still
      classified as retryable (retryable=true), so all retry slots were consumed
      rather than halted. After all retries were exhausted, the orchestration
      session failed and no automatic recovery occurred. A 44-minute gap (15:32
      to 16:21) elapsed before a manual re-trigger succeeded. The planner-explore
      sessions for other epics run on the same day (fix_tinydb, fix_story_parsing)
      using the same code succeeded without issue, suggesting a transient environment
      condition (API rate limit, system resource pressure, or tmux session limit)
      affected this specific burst rather than a code defect.
    evidence:
      - "12 sessions: status=failed, exit_code=1, num_turns=0, cost_usd=0.0, error_code=sdk_pane_failure"
      - "Wave 1 IDs (15:26, ~280s each): c96bf68d, 6ed24d7c, 3405dde5, f6c5fb71"
      - "Wave 2 IDs (15:31, ~5s each): 01b6100d, e425f8ee, 92d6d252, 3eb7de5c, c2a866a5, 18e85f27, 9a18aa6a, 8c20fb58"
      - "orch-851711d error: 'Explore agent failed: Parallel explore: 0/4 categories completed'"
      - "All 12 failure_reason records: {retryable: true, suggested_action: retry}"
      - "PID gap: wave 1 PIDs 2041794-2041807, wave 2 PIDs 2058879-2059885 (17072 PIDs between batches)"
      - "44-minute gap: orch-851711d ended 15:32:27, orch-2707130 started 16:21:08"
    recommendation: >
      Three separate fixes are needed. (1) Cool-down on total-parallel failure:
      when ALL parallel explore agents fail with 0 turns simultaneously,
      introduce a mandatory 60-120s delay before the next retry batch rather
      than immediately spawning the next wave. The current SPAWN_RETRY_BACKOFF
      of [5, 15] seconds is appropriate for partial failures but not for
      environment outages. (2) Bounded retry with environment check: after 2
      consecutive total-parallel failures (all categories, 0 turns each), halt
      with a structured error rather than exhausting all 12 retry slots in under
      10 minutes. (3) Top-level orchestration retry: when the planning loop
      reports "Parallel explore: 0/N categories completed", the orchestration
      session should re-enter the planning loop after a 5-minute delay rather
      than marking the plan permanently failed. The 44-minute manual recovery
      gap is the most expensive single friction event of the day and would be
      eliminated by this change. Document the recovery path in
      orchestration-planning/process.yml.

  - id: FP-012
    type: input_resolution_failure
    severity: high
    agent: "orchestration-executor"
    guidance_file: "orchestration/orchestration-executor/process.yml"
    description: >
      exec-ea0ce367f8e4 (13:19) failed at iteration=1 for epic
      260329AG_fix_story_parsing_race_condition_in_planning_pipel with error
      "Could not acquire lock: /home/mick/.agentic/epics.db.lock after 10.0s
      (holder pid=1939243, holder age=14.3s)." The lock holder was not registered
      as a session -- most likely a build-python subprocess still writing to TinyDB.
      This execution attempt was a second manual launch while the build-python agent
      from the planning phase was still active. The failure took the full 10s
      timeout to manifest, then failed the entire session at iteration=1 with no
      work done. The subsequent session exec-d257d6e9f67b launched 23 minutes later
      and completed all 5 phases without issue. Wasted wall time: 22 minutes.
    evidence:
      - "exec-ea0ce367f8e4: started=12:57:01, failed=13:19:23, iteration=1, phases_completed=[]"
      - "Error: Could not acquire lock /home/mick/.agentic/epics.db.lock after 10.0s (holder pid=1939243, holder_age=14.3s)"
      - "Lock holder pid=1939243 not in session store (external subprocess)"
      - "build-python 2cd4a60e: started=12:57:03, ended=13:19:12 (concurrent with failed exec)"
      - "exec-d257d6e9f67b: started=13:20:05, completed=13:55:24, phases_completed=5"
    recommendation: >
      Guidance for orchestration-executor should document: "A TinyDB lock timeout
      at iteration=1 with phases_completed=[] means another process is still
      writing; this is safe-to-retry after a 30s wait." Raise the lock acquisition
      wait from 10s to 30s for iteration=1, or add a single retry after a 30s
      sleep before declaring failure. This turns a 22-minute wasted session into
      a 30-second delay.

  - id: FP-013
    type: guidance_gap
    severity: high
    agent: "orchestration (planner loop)"
    guidance_file: "orchestration/orchestration-planning/process.yml"
    description: >
      No planner-orchestration session record exists for epic
      260329AG_eliminate_mandatory_disk_folder_creation_make_epic in the March 29
      data. The 2-second orch-2707130 session at 16:21 immediately routed to
      execution, implying phases were already in TinyDB. The completed phases
      ("Initial Research and Planning", "Data Model -- Make epic_folder Optional",
      etc.) are well-structured and consistent with planner-orchestration output,
      but their origin is untracked. Additionally, execution (exec-04faec5, started
      16:21:28) launched 2 seconds before a planner-explore session (b001bf0d,
      started 16:21:30) -- meaning execution began before exploration was complete,
      a sequencing anomaly that happened to produce a correct result.
    evidence:
      - "No planner-orchestration session record for eliminate_mandatory in session data"
      - "orch-2707130c39ba: duration=2s -- immediate routing to execution"
      - "exec-04faec5 started=16:21:28, planner-explore b001bf0d started=16:21:30 (2s overlap)"
      - "exec-04faec5 completed 6 phases despite concurrent exploration"
    recommendation: >
      The planning loop should assert that planner-orchestration completed and
      wrote phases to TinyDB before routing to execution. If phases already exist
      (manual population or prior run), the loop should validate that all phases
      have required fields (agent, loop_type) and log a warning if no
      planner-orchestration session is recorded for this run. Add to
      orchestration-planning/process.yml: execution must not start until
      planner-orchestration completes.

  - id: FP-014
    type: excessive_iteration
    severity: medium
    agent: "build-python"
    guidance_file: "build/build-python/process.yml"
    description: >
      Epic 260329AG_fix_story_parsing_race_condition_in_planning_pipel spawned
      4 build-python sessions within exec-d257d6e9f67b (13:20 – 13:55), with the
      executor running 6 iterations for a 5-phase plan. Session 79ad255a (13:34,
      29s, 0 turns, $0) completed near-instantly, likely detecting no remaining
      work. Epic 260329AG_add_epic_priority_ordering also required 4 build-python
      sessions, the first costing $7.62 over 850s and 130 turns -- the highest
      single-session cost of the day. The phase scope for that session was broad
      enough to drive 130 turns of back-and-forth, suggesting the ticket guidance
      was under-specified for the work surface.
    evidence:
      - "260329AG_fix_story_parsing: 4 build-python sessions (22min, 13min, 29s, 11min)"
      - "29s session 79ad255a: num_turns=0, cost_usd=0 -- no work performed"
      - "exec-d257d6e9f67b: current_iteration=6, phases_completed=5"
      - "260329AG_add_epic_priority_ordering: build-python 1c20db69 -- 850s, 130 turns, $7.62"
    recommendation: >
      Add an early-exit check to build-python process.yml: if all tickets for
      the current phase are already completed, log and exit with status=completed
      rather than consuming context turns on bootstrap. The 29s zero-turn session
      shows the agent already does this sometimes, but guidance should make it
      explicit. For high-cost phases (>100 turns), consider splitting at the
      ticket-creation stage into two focused tickets rather than one broad phase.

  - id: FP-015
    type: excessive_iteration
    severity: medium
    agent: "orchestration (planner loop)"
    guidance_file: null
    description: >
      73 of 81 orchestration-system sessions (89%) on March 29 are zero-duration
      poll records. The orchestration idle loop writes 3 orch-* records per
      health-check interval, with ~24 poll groups observed across the day
      (07:44 through 23:55). At 3 records per poll x 24 polls = 72 overhead
      records with plans_processed=["test_plan"] or plans_processed=[]. These
      inflate the session count (133 total vs ~35 meaningful sessions), bloat the
      session store, and obscure signal in session-list output. Meaningful
      orchestration sessions are only: orch-63574e8 (FileLock planning), orch-69d788f
      (story_parsing planning), orch-851711d (eliminate, failed), orch-2707130
      (eliminate, recovered), and the 5 exec-* execution sessions.
    evidence:
      - "73 orch-* sessions: duration=0s, status=completed, plans_processed=['test_plan'] or []"
      - "24 poll groups at: 07:44, 07:47, 07:49, 07:51, 07:53, 07:55, 08:27, 08:34, ..."
      - "133 total sessions; only ~35 contain diagnostic signal"
    recommendation: >
      Orchestration poll-loop records should not be written to the persistent
      session store when no plan was dispatched and no error occurred. Write idle
      polls only to a transient in-memory heartbeat log or a separate prunable
      store. This reduces session record volume by ~55% for a busy day and makes
      session-list output and session-store scanning practical.

  - id: FP-016
    type: guidance_gap
    severity: medium
    agent: "build-story-writer"
    guidance_file: "build/build-story-writer/process.yml"
    description: >
      Session c9249008 (build-story-writer) started at 20:27 for epic
      260329AG_fix_story_parsing_race_condition_in_planning_pipel and remained
      in status=running at analysis time. This epic reached status=completed at
      13:55 (all 16 tickets done, all 5 phases done). A build-story-writer agent
      spawned 6.5 hours after epic completion is anomalous. No orchestration session
      that could have triggered this spawn appears in the data for the 20:27 window,
      suggesting a manual re-plan invocation. The build-story-writer guidance has
      no instruction to verify epic status before beginning story generation, so
      it will overwrite stories.yml on a completed epic if not stopped.
    evidence:
      - "c9249008: role=build-story-writer, status=running, started=20:27:30, ended=null"
      - "Epic 260329AG_fix_story_parsing: status=completed, 16/16 tickets done by 13:55"
      - "No orch-* session in the 20:25-20:30 window"
    recommendation: >
      Add a FENCE to build-story-writer process.yml: before generating stories,
      check epic status via `agentic -j epic status`. If the epic is already
      completed or archived, halt immediately with a warning rather than generating
      new stories. This prevents accidental story overwrites on finished work.

  - id: FP-017
    type: guidance_gap
    severity: low
    agent: "planner-explore"
    guidance_file: "planner/planner-explore/process.yml"
    description: >
      The recovery path after the 12-session cascade failure spawned only 2
      planner-explore sessions (99dc005a, 178s; b001bf0d, 556s) rather than the
      original 4 (one per story category). The execution phase then proceeded with
      ticket enrichment from only 2 of 4 categories. Execution ultimately succeeded,
      but there is no record of a validation step confirming which categories were
      covered. The planner-explore guidance contains no instruction for a recovery
      agent to check which categories already have enriched tickets vs which were
      skipped.
    evidence:
      - "Recovery: 2 planner-explore sessions completed (99dc005a: 178s, b001bf0d: 556s/81t)"
      - "Original attempt: 4 categories x 3 retries = 12 failed sessions"
      - "exec-04faec5 completed 6 phases successfully despite partial category coverage"
    recommendation: >
      Add a recovery step to planner-explore process.yml: when re-spawned after
      a cascade failure, check which categories already have enriched tickets
      (populated target-files and guidance) before deciding scope. Explicitly
      note skipped categories in the summary output so downstream agents
      (planner-orchestration) can flag gaps.

