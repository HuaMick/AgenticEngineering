    - priority: 1
      friction_point: FP-011
      action: >
        Add total-parallel-failure detection in spawn_explore_agents: when all
        parallel explore agents fail with num_turns=0, treat this as an environment
        outage rather than individual agent failures. Insert a 60-120s cool-down
        before the next batch rather than using the 5-15s SPAWN_RETRY_BACKOFF.
