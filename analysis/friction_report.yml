friction_points:

  - id: FP-001
    type: excessive_iteration
    severity: critical
    agent: "planner-design / ralph (both decommissioned)"
    guidance_file: null
    description: >
      2,224 session files dated March 10-12 are permanently stale. Of these,
      891 (40%) are stuck in status=running, 731 (33%) failed, and 602 (27%)
      completed. The dominant role is planner-design (1,352 sessions), which no
      longer exists in the current agent roster (removed in the 28-to-20
      restructure committed 2026-03-29). Also present are 280 ralph sessions
      (ralph decommissioned 2026-03-20) and 106 explore sessions (renamed
      planner-explore). None of these sessions can self-heal because the agents
      that would update them no longer exist. The 891 running sessions will
      remain in that state permanently, polluting session-list output and
      inflating live-session counts.
    evidence:
      - "Total sessions 2026-03-10/11/12: 2224"
      - "status breakdown: running=891, failed=731, completed=602"
      - "role breakdown: planner-design=1352, ralph=280, explore=106, planner-orchestration=61, story-generator=77, others=468"
      - "No planner-design or ralph directory exists under agents/"
      - "commit c77f7a0 (2026-03-29): complete 28->20 agent restructure"
    recommendation: >
      A one-time cleanup pass should transition all sessions whose role is absent
      from the current agent roster to status=failed with reason=agent_decommissioned.
      A CLI command such as `agentic orchestrate debug state cleanup --stale-roles`
      would operationalise this. Teacher agents should add a cleanup step to
      orchestration-executor guidance specifying that any agent decommission must
      be accompanied by a session-store tombstone pass for that role.

  - id: FP-002
    type: backtracking
    severity: high
    agent: "orchestration-executor"
    guidance_file: "orchestration/orchestration-executor/process.yml"
    description: >
      Epic 260328AG_extract_validate_phase_routing_utility_from_duplic required
      seven execution attempts spanning 57 minutes before the plan was marked
      complete. The sequence was: two planning failures (story_parsing, story_ids
      validation) followed by four execution failures (lock timeout after Build,
      lock timeout after Test+UAT, JSON corruption at start, EpicRepository
      unavailable at start) followed by a final session that completed only the
      Cleanup phase. The actual phase work for Build, Test, and UAT ran to
      completion in failed sessions (exec-5dfd53446d66 and exec-3e68b7136efe)
      but those sessions marked the plan failed when the lock error occurred
      during finalise, causing the next executor to treat all phases as un-run.
      This resulted in duplicate phase execution and lost time.
    evidence:
      - "22:16 orch-aefd039c2bdb: status=failed, error='stories.yml missing or invalid'"
      - "22:24 orch-64144c1c4672: status=failed, error='No tickets reference story_ids'"
      - "22:41 exec-5dfd53446d66: phases_completed=[Build], failed on lock timeout"
      - "22:56 exec-3e68b7136efe: phases_completed=[Test, UAT], failed on lock timeout"
      - "23:05 exec-72c1097b61eb: failed at iteration=1, JSON parse error at offset 3623749"
      - "23:11 exec-8034e6f9da44: failed at iteration=0, no EpicRepository"
      - "23:12 exec-0af9a1a79abd: phases_completed=[Cleanup], status=completed"
      - "epics.db.corrupt (3,623,749 bytes) and epics.db.repaired (3,623,742 bytes) dated 23:05"
    recommendation: >
      The executor should perform a phase-status pre-check at each iteration start
      and skip phases already marked completed in TinyDB. This idempotent resume
      behaviour would have allowed exec-3e68b7136efe (which completed Test+UAT)
      to also run Cleanup in the same session rather than failing. Additionally,
      distinguish lock-timeout-on-finalise from lock-timeout-on-phase-start in
      the error handler: the former means the plan may actually be complete and
      should trigger a status re-read before marking failed.

  - id: FP-003
    type: guidance_gap
    severity: high
    agent: "build-story-writer / planner-orchestration"
    guidance_file: "planner/planner-orchestration/process.yml"
    description: >
      The first planning attempt on epic
      260328AG_extract_validate_phase_routing_utility_from_duplic failed with
      "stories.yml missing or invalid after build-story-writer completed" (orch-aefd039c2bdb).
      The orchestrator had no retry or backoff logic when reading stories.yml
      immediately after the agent completion signal. This race condition — the tmux
      pane writes the file, the agent signals done, but the orchestrator reads
      before the filesystem flush propagates — was the subject of epic
      260329AG_fix_story_parsing_race_condition_in_planning_pipel, which was
      planned and fully executed on March 29 in 35 minutes. The guidance for
      planner-orchestration did not document the expected behaviour on a
      story-parse failure, leaving the system with no documented recovery path.
    evidence:
      - "orch-aefd039c2bdb error: 'stories.yml missing or invalid after build-story-writer completed — stories are required'"
      - "260329AG_fix_story_parsing_race_condition: 5 phases completed, all tickets completed"
      - "Commits a9f42c5 and 0eae43f on 2026-03-29 address the underlying race conditions"
      - "US-001 in the fixed epic directly specifies retry-with-backoff acceptance criteria"
    recommendation: >
      Add a guidance step in planner-orchestration process.yml documenting the
      retry-with-backoff behaviour for story parsing (now implemented in code).
      This ensures future agents reading the guidance understand the expected
      behaviour rather than treating a missing stories.yml as an unrecoverable
      error and failing the entire planning session.

  - id: FP-004
    type: guidance_gap
    severity: high
    agent: "planner-explore"
    guidance_file: "planner/planner-explore/process.yml"
    description: >
      All four planner-explore agents for epic
      260328AG_extract_validate_phase_routing_utility_from_duplic completed
      successfully, yet the subsequent pre-flight validation failed with
      "No tickets reference story_ids — stories are required." All four explore
      agents produced tickets with no story_ids populated. The FENCE: STORY-FIRST
      requirement exists in planning-standard.yml but the planner-explore guidance
      apparently did not instruct agents that populating story_ids is mandatory.
      The same failure did not occur on March 27 or March 29 epics (100% and 94%
      coverage respectively), suggesting the guidance was updated between
      those dates.
    evidence:
      - "orch-64144c1c4672 error: 'Pre-flight validation failed: No tickets reference story_ids'"
      - "260328AG_extract_validate: tickets=8, with_story_ids=0 (0% coverage)"
      - "260327AG_mandatory: tickets=16, with_story_ids=16 (100% coverage)"
      - "260329AG_fix_story_parsing: tickets=16, with_story_ids=15 (94% coverage)"
      - "All four explore sessions completed: 58c6656b, 8744c0cc, cab7a684, f1b2307c"
    recommendation: >
      Add an explicit self-check step to planner-explore process.yml: after writing
      tickets the agent must verify each ticket has at least one story_ids entry
      before marking itself complete. The check should cross-reference the US-*
      identifiers from the current epic's stories.yml. A teacher agent should
      review the diff between the March 28 and March 29 planner-explore guidance
      to confirm this fix was applied and document it as a FENCE.

  - id: FP-005
    type: input_resolution_failure
    severity: high
    agent: "orchestration-executor"
    guidance_file: "orchestration/orchestration-executor/process.yml"
    description: >
      exec-ea0ce367f8e4 (March 29 13:19) failed at iteration=1 with
      "Could not acquire lock after 10.0s (holder pid=1939243, holder age=14.3s)".
      The lock holder was still alive and only 14 seconds old — a concurrent
      process had just acquired the lock when this session started. This session
      was a retry for epic 260329AG_fix_story_parsing, which had been successfully
      planned by orch-69d788ffe531 at 12:35. The overlapping launch windows
      (exec-ea0ce367f8e4 started 12:57, orch-69d788ffe531 completed 12:35)
      suggest the user launched a second execution while the first was finalising.
      The immediately subsequent session exec-d257d6e9f67b (started 13:20)
      succeeded completely, completing 5 phases in 35 minutes.
    evidence:
      - "exec-ea0ce367f8e4: started=12:57, failed=13:19, error='Could not acquire lock after 10.0s'"
      - "Lock holder pid=1939243, holder_age=14.3s"
      - "exec-d257d6e9f67b: started=13:20:05, completed=13:55:24, all 5 phases done"
      - "Commits a9f42c5 raises lock timeout and adds auto-release on crash"
    recommendation: >
      Confirm the default lock timeout was raised from 10s in a9f42c5. The guidance
      for orchestration-executor should document that a lock-timeout on session start
      (iteration=1, no phases yet run) is always safe to retry after 15-30 seconds
      because it means another session is in its writeback phase. This should be
      distinguished in the error output from a mid-execution timeout.

  - id: FP-006
    type: guidance_gap
    severity: medium
    agent: "planner-orchestration"
    guidance_file: "planner/planner-orchestration/process.yml"
    description: >
      Epic 260327AG_mandatory_ticket_story_binding_for_build_plans has 6 phases
      in TinyDB, two of which reference decommissioned agent names: test-runner
      and test-user-simulator. Neither exists in the current roster (current test
      agents: test-builder, test-audit, test-uat, trace-explorer). If the executor
      runs this epic it will encounter a routing failure immediately. The epic is
      flagged as ready to implement by `agentic epic list`. The decommissioned
      names originated from the planner-orchestration agent that planned this epic
      before the 28-to-20 restructure was committed.
    evidence:
      - "260327AG_mandatory phases: agent=test-runner and agent=test-user-simulator (both absent from agents/)"
      - "Current test agents: test-builder, test-audit, test-uat, trace-explorer"
      - "`agentic epic list` shows 260327AG_mandatory as ready with 0/6 phases started"
      - "Restructure committed 2026-03-29 (c77f7a0)"
    recommendation: >
      Before running `agentic orchestrate session implement` on this epic, update
      the stale phase agent values (test-runner -> test-builder, test-user-simulator
      -> test-uat) via direct TinyDB update or `agentic epic phase` commands.
      Teacher agents should update planner-orchestration guidance to reference only
      current agent names, and a canonical agent-name list in planning-standard.yml
      would prevent this class of error after future restructures.

  - id: FP-007
    type: guidance_gap
    severity: medium
    agent: "planner-orchestration"
    guidance_file: "planner/planner-orchestration/process.yml"
    description: >
      The IM_001 "Initial Research and Planning" scaffold ticket in epics
      260329AG_fix_story_parsing and 260329AG_eliminate_mandatory_disk lacks
      story_ids (the only ticket without story_ids in those otherwise well-covered
      epics). This ticket is created before story generation runs and therefore
      cannot reference a US-* id at creation time. The pre-flight validator's
      current behaviour (pass if any ticket has story_ids) means this does not
      block execution, but the ticket remains without traceability. Either the
      guidance should instruct planner-orchestration to backfill story_ids on
      IM_001 after story generation completes, or the validator should be
      updated to require full coverage.
    evidence:
      - "260329AG_fix_story_parsing: task_id=IM_001, story_ids=null (1/16 tickets without)"
      - "260329AG_eliminate_mandatory_disk: task_id=IM_001, story_ids=null (1/17 tickets without)"
      - "Pre-flight validation passes for both epics (any-coverage check)"
    recommendation: >
      Update planner-orchestration process.yml to include a post-story-generation
      step: backfill story_ids on the IM_001 / research scaffold ticket using the
      most broadly applicable story from stories.yml. Alternatively update the
      pre-flight validator to require 100% coverage and exempt only explicitly
      tagged scaffold tickets.

  - id: FP-008
    type: excessive_iteration
    severity: medium
    agent: "orchestration-executor"
    guidance_file: "orchestration/orchestration-executor/process.yml"
    description: >
      The March 28 execution chain involved six executor launches over 57 minutes.
      The actual productive work (Build, Test, UAT) completed inside two failed
      sessions that were each marked failed due to lock errors on finalise, causing
      duplicate phase execution. Total iteration depth across sessions: 2+3+1+0+2
      = 8 iterations for a 4-phase epic. Expected iteration count for a healthy
      4-phase epic (no failures) is 4-5 iterations in a single session.
    evidence:
      - "exec-5dfd53446d66: current_iteration=2, phases_completed=[Build]"
      - "exec-3e68b7136efe: current_iteration=3, phases_completed=[Test, UAT]"
      - "exec-0af9a1a79abd: current_iteration=2, phases_completed=[Cleanup]"
      - "Total wall-clock time 22:16 to 23:13 = 57 minutes for 4 phases"
    recommendation: >
      Implement idempotent phase resume: executor reads TinyDB phase status before
      attempting each phase and skips phases already marked completed. This would
      reduce the March 28 scenario from 6 sessions to 2 (plan + execute-all-phases)
      and eliminate the duplicate Build/Test/UAT execution.

  - id: FP-009
    type: input_resolution_failure
    severity: medium
    agent: "orchestration-executor"
    guidance_file: "orchestration/orchestration-executor/process.yml"
    description: >
      exec-8034e6f9da44 failed with "No EpicRepository available" at iteration=0
      in under one second (started and failed at 23:11:56). This occurred one
      minute after exec-72c1097b61eb detected the corrupt DB at 23:05. The repair
      process (epics.db.repaired) was likely still in progress when this executor
      launched, leaving the database in an unreadable state. The executor had no
      health-check or wait logic and failed immediately.
    evidence:
      - "exec-8034e6f9da44: started=23:11:56, failed=23:11:56, current_iteration=0"
      - "exec-72c1097b61eb (preceding): JSON parse error at char 3623749"
      - "epics.db.corrupt and epics.db.repaired both dated 23:05"
      - "exec-0af9a1a79abd (succeeding, started 23:12): EpicRepository available"
    recommendation: >
      Add a database-health preflight to the executor: check that epics.db is
      present and valid JSON before entering the execution loop. If the check fails,
      wait with exponential backoff (up to ~60s) before aborting. This is distinct
      from a lock timeout — a corrupt or missing database indicates infrastructure
      recovery in progress.

  - id: FP-010
    type: excessive_iteration
    severity: informational
    agent: "planner-design / ralph (both decommissioned)"
    guidance_file: null
    description: >
      Historical accumulation: 1,352 planner-design and 280 ralph sessions from
      March 10-12 are permanently stale with no cleanup path. These are artefacts
      of intensive testing during the planning pipeline development period.
      891 remain stuck in status=running. They inflate session-store size
      (contributing to ~372K files in ~/.agentic/sessions/) and will confuse any
      tooling that iterates the session store without role-validity filtering.
    evidence:
      - "Total sessions 2026-03-10/11/12: 2224 — dominated by planner-design (1352) and ralph (280)"
      - "891 sessions stuck in status=running"
      - "~/.agentic/sessions/ contains 357 directory entries at analysis time"
    recommendation: >
      Implement `agentic orchestrate debug state cleanup --stale-roles` to tombstone
      sessions for absent roles. Document in orchestration-executor process.yml
      that any role decommission must be followed by a session-store cleanup pass.

story_compliance:

  - story_id: "inferred from phases"
    epic: "260329AG_fix_tinydb_file_lock_not_released_on_agent_crash"
    status: compliant
    evidence: >
      All 4 phases completed (Harden FileLock, Harden Epic Lock, Test, UAT).
      exec-d64528639736 completed in 22 minutes at iteration=5. No phases failed.
      Commits a9f42c5 and 0eae43f confirm the implementation reached the
      repository.

  - story_id: "US-001 (Reliable Story Parsing)"
    epic: "260329AG_fix_story_parsing_race_condition_in_planning_pipel"
    status: compliant
    evidence: >
      15/16 tickets have story_ids. All 16 tickets completed. 5 phases completed
      via exec-d257d6e9f67b in 35 minutes. Epic status=completed, awaiting archive.
      US-001 acceptance criteria (retry-with-backoff, structured exceptions, file
      readiness check) directly addressed by tickets P1-T1, P1-T2, P1-T3.

  - story_id: "US-002 (TinyDB concurrent access)"
    epic: "260329AG_fix_story_parsing_race_condition_in_planning_pipel"
    status: compliant
    evidence: >
      P2-T1 through P2-T3 implement TinyDB concurrent access hardening.
      P5-T2 (UAT: validate parallel explore agents complete with concurrent access)
      verifies the acceptance criteria. All P2 and P5 tickets marked completed.

  - story_id: "US-002 (ticket CE_001 story_ids field)"
    epic: "260327AG_mandatory_ticket_story_binding_for_build_plans"
    status: not_started
    evidence: >
      16 tickets pending, 16/16 have story_ids. 6 phases pending but 2 reference
      decommissioned agents (test-runner, test-user-simulator). No execution
      attempted. Story compliance cannot be assessed until stale agent names are
      corrected.

  - story_id: "none (0 story_ids on any ticket)"
    epic: "260328AG_extract_validate_phase_routing_utility_from_duplic"
    status: partial
    evidence: >
      8 tickets in TinyDB, 0 with story_ids. The epic's implementation reached
      the repository (commit bb53dcf: extract validate_phase_routing utility) but
      story traceability was never established. The Build, Test, and UAT phases
      ran to completion inside sessions that were marked failed due to lock errors.
      The Cleanup phase completed in the final session. Functional outcome achieved,
      story compliance absent.

  - story_id: "none (0 story_ids, not yet executed)"
    epic: "260328AG_cleanup_stale_agent_references_after_2820_restruct"
    status: not_started
    evidence: >
      5 tickets all status=proposed, none have story_ids. 2 phases pending
      (teacher-update-assets, test-builder). Epic has not been executed.
      This epic cannot be planned (story_ids missing) or executed without
      a re-plan run.

summary:
  total_friction_points: 10
  by_severity:
    critical: 1
    high: 4
    medium: 4
    informational: 1
  by_type:
    excessive_iteration: 3   # FP-001, FP-008, FP-010
    backtracking: 1          # FP-002
    guidance_gap: 4          # FP-003, FP-004, FP-006, FP-007
    input_resolution_failure: 2  # FP-005, FP-009

  epics_worked_on:
    - folder: "260328AG_extract_validate_phase_routing_utility_from_duplic"
      date: "2026-03-28"
      outcome: >
        Partial success via 7 attempts over 57 minutes. Build/Test/UAT phases ran
        inside failed sessions; only Cleanup completed in a session marked
        successful. Implementation committed to git. Story traceability: zero.
    - folder: "260329AG_fix_tinydb_file_lock_not_released_on_agent_crash"
      date: "2026-03-29 morning"
      outcome: "Clean success — 4 phases, 22 minutes, single session."
    - folder: "260329AG_fix_story_parsing_race_condition_in_planning_pipel"
      date: "2026-03-29 midday"
      outcome: "Success after 1 failed retry — 5 phases, 35 minutes in the final session."
    - folder: "260329AG_eliminate_mandatory_disk_folder_creation_make_epic"
      date: "2026-03-29 afternoon"
      outcome: "In-progress — planning stage, epic-creator running as of analysis time."

  top_recommendations:
    - priority: 1
      action: >
        Fix stale agent names in 260327AG_mandatory phases before running implement.
        test-runner -> test-builder, test-user-simulator -> test-uat.
        Failure to do this will cause an immediate routing error on the next
        `agentic orchestrate session implement` call.
    - priority: 2
      action: >
        Implement session-store cleanup for decommissioned roles. The 2,224 stale
        March 10-12 sessions are permanent noise and will grow with each future
        agent restructure unless a tombstone mechanism exists.
    - priority: 3
      action: >
        Add a FENCE self-check to planner-explore process.yml: agent must not mark
        itself complete until all created tickets have story_ids populated. This
        closes the gap that caused the March 28 pre-flight validation failure.
    - priority: 4
      action: >
        Update orchestration-executor guidance to implement idempotent phase resume:
        check TinyDB phase status before each iteration and skip already-completed
        phases. This eliminates the duplicate-execution pattern seen in the March 28
        six-session cascade.
    - priority: 5
      action: >
        Add a DB health preflight to the executor (valid JSON check with wait/backoff)
        to prevent the sub-second failures seen in exec-8034e6f9da44 and
        exec-72c1097b61eb when the database was mid-repair.

  system_health_assessment: >
    The system is functionally healthy for the two successfully completed March 29
    epics (FileLock hardening and story parsing race fix). The root causes of the
    March 28 cascade failure — TinyDB corruption, lock contention, missing story_ids
    on tickets — have all been directly addressed by commits landed today (a9f42c5,
    0eae43f, bb53dcf, c77f7a0). Three structural issues remain unresolved and require
    action before the next execute run: (1) 2,224 stale sessions from decommissioned
    roles with no cleanup path; (2) epic 260327AG_mandatory has stale agent names
    that will cause a routing failure on the next implement run; (3) epic
    260328AG_cleanup_stale_agent_references has zero story_ids and cannot be
    executed without a re-plan. The DB corruption artifact files
    (epics.db.corrupt, epics.db.repaired) in ~/.agentic/ should be archived or
    deleted once the repair is confirmed stable.
