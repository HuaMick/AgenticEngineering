# ============================================================
# Dashboard vs YAML: what each source reports right now
# ============================================================
dashboard_vs_yaml:
  yaml_state:
    US-PLN-046:
      last_tested: null
      test_status: untested
      test_notes: ''
      tested_by_plan: null
      last_pass_commit: null
      last_uat_commit: null
    US-PLN-047:
      last_tested: null
      test_status: untested
      test_notes: ''
      tested_by_plan: null
      last_pass_commit: null
      last_uat_commit: null

  dashboard_state:
    US-PLN-046:
      computed_status: never-passed
      testpass_commithash: "—"
      uatpass_commithash: "—"
    US-PLN-047:
      computed_status: never-passed
      testpass_commithash: "—"
      uatpass_commithash: "—"

  divergence_analysis:
    exists: true
    description: |
      The dashboard shows "never-passed" but the YAML says test_status: untested.
      These are NOT the same status in the dashboard's own enum. The divergence
      is expected and explained by the dashboard's two-axis status model:

      The dashboard does NOT display the raw YAML test_status field. Instead it
      calls StoryService.compute_story_status(), which uses a 7-value enum
      (broken, stale, never-passed, untested, passing, uat-verified, archived).

      The logic path (story.py lines 544-548):
        if ts not in ("pass", "passing"):   # true — test_status is "untested"
            if story_markers is not None and story.id in story_markers:
                return "never-passed"       # <-- fires because markers exist
            return "untested"

      The dashboard ALSO scans pytest test files for @pytest.mark.story markers
      (_scan_pytest_story_markers). Both US-PLN-046 and US-PLN-047 have
      multiple markers present in the test suite (confirmed in grep output).
      Because test markers exist but test_status is not "pass", the dashboard
      classifies them as "never-passed" — meaning: "there are tests for this
      story but they have never recorded a passing run in the YAML".

      The YAML is the source of truth for test history. The dashboard enriches
      that with live pytest marker presence. "never-passed" is the correct
      dashboard classification for a story that has test coverage but has never
      had update_commit_status() called to record a passing commit.

  user_memory_assessment: |
    The user may be confusing "never-passed" with "tested" — both appear in
    coloured rows (never-passed renders in cyan), compared to "untested" which
    renders as dim/grey. Glancing at a colourful row may have read as "something
    happened here." The user did NOT see "tested" or "uat-verified" — those
    statuses require last_pass_commit or last_uat_commit to be set, which they
    are not. The glance was most likely "never-passed" being mistaken for a
    positive status.

# ============================================================
# The tested_commit_hash gap — is there a write path that sets
# test_status without recording the commit hash?
# ============================================================
commit_hash_gap:
  field_names_in_schema:
    - last_pass_commit  # written by update_commit_status(..., commit_type="test")
    - last_uat_commit   # written by update_commit_status(..., commit_type="uat")
    - last_tested       # written by update_test_status() — timestamp only, not a commit hash

  gap_confirmed: true
  description: |
    There are TWO separate write paths and they are NOT called together:

    Path A — update_test_status() (story.py line 370)
      Writes: test_status, tested_by_plan, test_notes, last_tested (timestamp)
      Does NOT write: last_pass_commit, last_uat_commit
      Called by:
        - cmd_update_story (stories.py line 565) — manual `agentic stories update`
        - cmd_bulk_update (stories.py line 1319) — `agentic stories bulk-update --plan`

    Path B — update_commit_status() (story.py line 424)
      Writes: last_pass_commit OR last_uat_commit
      Does NOT write: test_status
      Called separately from Path A.

    If a caller invokes only Path A (e.g. `agentic stories update US-PLN-046 --status pass`),
    the story gets test_status: pass but last_pass_commit stays empty.
    compute_story_status() will then reach the passing branch but immediately
    check related_files for staleness — and because last_pass_commit is empty,
    the staleness check is skipped, so the story returns "passing" without a
    commit anchor.

    The dashboard column "testpass_commithash" then displays "—" even though
    the status shows "passing". This is the exact scenario the user described
    for a "tested status but no commit hash."

    The gap: there is no atomic write that sets both test_status: pass AND
    last_pass_commit in a single operation. The two fields live in separate
    service methods with no co-call enforcement.

  relevant_files:
    - /home/code/AgenticEngineering/modules/AgenticGuidance/src/agenticguidance/services/story.py
    - /home/code/AgenticEngineering/modules/AgenticCLI/src/agenticcli/commands/stories.py

  functions_of_interest:
    - "story.py:370 update_test_status() — writes test_status, NOT last_pass_commit"
    - "story.py:424 update_commit_status() — writes last_pass_commit/last_uat_commit, NOT test_status"
    - "stories.py:565 cmd_update_story — calls update_test_status only"
    - "stories.py:1319 cmd_bulk_update — calls update_test_status only"

# ============================================================
# What the user should believe
# ============================================================
summary:
  total_friction_points: 2
  by_severity:
    medium: 2
    high: 0
  by_type:
    guidance_gap: 1
    story_drift: 1

  findings:
    1_uat_did_not_run:
      verdict: confirmed_user_misremembered
      detail: |
        No UAT ran for US-PLN-046 or US-PLN-047 in the last 3 days (or ever).
        Both stories were recreated from scratch on 2026-04-05 in the deep audit
        commit (6ef014f). The stories that DID exist before that commit under
        the same IDs were entirely different stories (Human-in-the-Loop Plan
        Creation, Multi-Phase Plan Creation) — and those had never been tested
        either. The only test-uat agent sessions in the log ran against different
        epics (260327AG, 260401AG). Git log has zero commits writing
        test_status: pass to 07_orchestration_agents.yml.

    2_dashboard_vs_yaml_discrepancy:
      verdict: expected_design_behaviour_not_a_bug
      detail: |
        The dashboard correctly shows "never-passed" (cyan row) for both stories.
        The YAML correctly shows test_status: untested. These are consistent:
        "never-passed" means "has test markers in the codebase but has never
        recorded a passing commit." The dashboard enriches the raw YAML field
        with live pytest marker presence — a story that shows "untested" in YAML
        but has @pytest.mark.story markers renders as "never-passed" in the
        dashboard. The user likely glanced at a cyan "never-passed" row and
        mentally translated it as "something was tested."

    3_commit_hash_gap:
      verdict: real_architectural_gap
      detail: |
        The two-axis schema (test_status + last_pass_commit) is written by two
        separate service methods with no atomic co-call. A caller can set
        test_status: pass without setting last_pass_commit, producing the exact
        symptom described — dashboard shows a passing-family status but
        "testpass_commithash" column displays "—". This is latent until someone
        manually updates a story status without also updating the commit.
        The test-uat agent guidance should specify that both update_test_status
        AND update_commit_status must be called when recording a pass, and the
        CLI could enforce this with a --commit flag that makes the two calls
        atomic from the user/agent perspective.

  top_recommendations:
    - id: REC-001
      type: guidance_gap
      severity: medium
      target: test-uat agent guidance
      description: >
        Specify that recording a test pass requires two calls: update_test_status
        (for test_status + last_tested) AND update_commit_status (for
        last_pass_commit). Currently the guidance may only reference one path.
    - id: REC-002
      type: guidance_gap
      severity: medium
      target: stories.py cmd_update_story / cmd_bulk_update
      description: >
        Add an optional --commit flag to `agentic stories update` that atomically
        writes both test_status and last_pass_commit in one CLI invocation.
        This closes the gap at the CLI surface so agents cannot write a half-state.

