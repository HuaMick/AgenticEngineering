summary:
  total_friction_points: 6
  by_severity:
    high: 4
    medium: 2
    low: 0
  by_type:
    guidance_gap: 5
    workflow_gap: 4
    story_drift: 3
    tool_misuse: 0
    backtracking: 0
    excessive_iteration: 0
    input_resolution_failure: 0
    context_overflow: 0
  top_recommendations:
    - "Add throwaway heuristic guard in planner_loop.py before spawn_story_agent (high impact, low effort)"
    - "Add refactor-epic classification and story-scope fence to build-story-writer/process.yml"
    - "Add 'kind' field to EpicMetadata for structured epic-lifecycle awareness"
    - "Add post-generation story quality warning in planner_loop.py"
    - "Fix EPIC_PREFIX uniqueness check in build-story-writer/process.yml"
  root_cause_summary: |
    The primary failure is a missing fence at two levels: (1) the planner_loop
    has no throwaway-epic detection before invoking build-story-writer, causing
    ephemeral UAT scaffold epics to generate permanent stories; (2) build-story-writer
    guidance lacks explicit rules for refactor-only epics, causing agents to
    literalise implementation tickets into 14-step checklists.  A secondary
    structural defect is the EPIC_PREFIX uniqueness scheme breaking when multiple
    same-day epics share the YYMMDDXX code, producing duplicate story IDs.
