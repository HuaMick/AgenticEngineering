# ────────────────────────────────────────────────────────────────────────────
# THROWAWAY EPIC FENCE ASSESSMENT
# Does a skip mechanism exist? Should it?
# ────────────────────────────────────────────────────────────────────────────

throwaway_epic_fence:

  current_state: |
    No mechanism exists.  EpicMetadata has no 'tags', 'kind', or 'ephemeral' field
    (epic.py:568-604).  planner_loop.py calls spawn_story_agent() unconditionally
    for all epics with status 'seed' or 'planning'.  build-story-writer/process.yml
    has no detection logic for throwaway/UAT epics and no skip-story path.
    The planning pipeline treats `260411AG_uat_throwaway_*` identically to
    `260402AG_consolidate_story_storage_*`.

  should_exist: true

  rationale: |
    Throwaway/UAT scaffold epics exist specifically to exercise pipeline plumbing.
    They are not intended to deliver user value or produce permanent stories.
    Running build-story-writer on them:
    (a) pollutes the canonical story store with low-quality ephemeral stories
    (b) wastes API budget on agent calls with no durable value
    (c) creates duplicate IDs when multiple throwaway epics share the same date-prefix
    (d) bloats the stories health dashboard with 'Unknown' module entries

  design_recommendation: |
    Two complementary mechanisms:
    1. STRUCTURAL: Add 'kind' field to EpicMetadata ('production' | 'throwaway').
       `agentic epic new` auto-detects 'throwaway' from name heuristics and sets
       kind accordingly.  EpicRepository exposes this field.  planner_loop.py
       checks kind before spawning story agent.
    2. GUIDANCE: Add 'throwaway epic detection' step to build-story-writer/process.yml
       as a fallback for cases where kind is not set.  If the epic name contains
       'throwaway', 'uat_throwaway', or 'uat_test', write a minimal placeholder
       story with lifecycle: ephemeral and test_status: skip.


