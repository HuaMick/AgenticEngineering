agent: orchestration-executor
category: orchestration
clarity_score: 3
completeness_score: 3
consistency_score: 2

summary: |
  The orchestration-executor guidance provides comprehensive coverage of the executor's
  purpose and responsibilities, but suffers from clarity issues in critical areas:
  agent routing resolution, feedback trigger handling, and state synchronization.
  Inconsistencies exist between manifest, process, and specification files regarding
  line counts and agent availability references.

issues:
  - severity: high
    description: |
      Specification line count is outdated. manifest.yml claims "959 lines" but the actual
      orchestration-executor-specification.yml file contains 1022 lines. This discrepancy
      suggests the specification was updated but the reference was not.
    location: "manifest.yml:18"
    impact: |
      Agents may trust the line count as accurate documentation. When they read the spec,
      they find 63 additional lines of behavior not accounted for in the manifest reference.
    recommendation: |
      Update manifest.yml:18 to reference "1022 lines" or use a dynamic reference like
      "Comprehensive executor behavior specification (see specification file for line count)"

  - severity: high
    description: |
      Agent routing resolution is ambiguously documented regarding builder sub-agent selection.
      Process.yml (line 129) states "builder -> build-python (default) or build-flutter"
      but does NOT explain the decision logic for choosing between them. The specification
      (line 108) says "based on project type" but never defines what constitutes a "Flutter
      project" vs "Python project" or how this detection occurs.
    location: "process.yml:129 and specification.yml:108"
    impact: |
      An implementing agent cannot reliably choose between build-python and build-flutter
      without external context not provided in the guidance. This is a critical ambiguity
      that could cause phase execution failures.
    recommendation: |
      Add explicit decision criteria. Example: "builder resolves to:
      - build-flutter if target_project contains pubspec.yaml or flutter config
      - build-python for all other projects (default)
      Detail this in both process.yml and specification.yml"

  - severity: high
    description: |
      Inconsistent deploy-cicd agent reference. The orchestration-executor manifest.yml
      spawns fence includes deploy-cicd (line 55), but the central agents/manifest.yml
      does NOT list deploy-cicd in its deploy category (line 33 only lists deploy-worktree).
      The deploy/manifest.yml file DOES define deploy-cicd, indicating it exists but is
      not fully integrated into the central registry.
    location: "manifest.yml:55 vs agents/manifest.yml:33 vs agents/deploy/manifest.yml:27"
    impact: |
      This creates ambiguity about whether deploy-cicd is "officially available" for
      spawning. An executor checking agents/manifest.yml would not find deploy-cicd
      as a valid agent, even though orchestration-executor claims it can spawn it.
    recommendation: |
      Decide whether deploy-cicd is production-ready:
      - If YES: Update agents/manifest.yml to list it under deploy.sub_agents
      - If NO: Remove from orchestration-executor manifest.yml spawns and document
        deploy-cicd as "planned but not yet integrated"
      Add a consistency note: "All agents in orchestration-executor spawns must be
      registered in agents/manifest.yml"

  - severity: high
    description: |
      Feedback trigger handling in process.yml lacks specific detection patterns.
      The feedback trigger section (lines 165-189) lists trigger types (TEST_FAILURE,
      BUILD_FAILURE, CICD_FAILURE, GUIDANCE_GAP, AUDIT_FAILURE) and general actions,
      but does NOT specify HOW to detect each trigger from agent output.
      The specification provides detection patterns (e.g., lines 196-206 for TEST_FAILURE),
      but these details are NOT cross-referenced in process.yml.
    location: "process.yml:163-189 vs specification.yml:189-400"
    impact: |
      Agents cannot implement trigger detection without reading the detailed specification.
      The process.yml should be self-contained for implementation.
    recommendation: |
      Cross-reference or include detection patterns in process.yml. Add a section:
      "DETECTION PATTERNS (see specification.yml for full details):
      - TEST_FAILURE: test_status=failed OR tests_passed=false OR exit_code!=0
      - BUILD_FAILURE: build_status=failed OR compilation errors detected
      - CICD_FAILURE: cicd_status=failed OR pipeline_error=true
      - GUIDANCE_GAP: guidance_completeness < 100% OR gaps_found=true
      - AUDIT_FAILURE: audit_status=failed OR issues.count > 0"

  - severity: medium
    description: |
      Fallback behavior for missing AGENT_ROUTING is incomplete. Process.yml (lines 139-141)
      references fallback behavior but provides minimal detail. The specification (lines 660-700)
      provides extensive inference rules (e.g., "Phase contains 'Build' -> builder") but
      these are NOT available in the process.yml for agent reference.
    location: "process.yml:139-141 vs specification.yml:660-700"
    impact: |
      An executor must either read the detailed specification or risk incorrect inference.
      The process.yml should guide implementation for this critical fallback.
    recommendation: |
      Expand process.yml fallback section with example inference rules and confidence
      thresholds. Include a reference to the specification for complete rules.

  - severity: medium
    description: |
      Timeout configuration for agent spawning is not specified. Process.yml (line 150)
      mentions "Set timeout based on phase complexity" but provides NO guidance on what
      constitutes "complexity" or what specific timeout values to use.
    location: "process.yml:150"
    impact: |
      An implementing agent must guess timeout values. Short timeouts may cause false
      failures; long timeouts may mask hung agents.
    recommendation: |
      Add explicit timeout guidance: "Timeout recommendations:
      - Lightweight phases (validation, auditing): 5-10 minutes
      - Standard phases (build, test): 15-30 minutes
      - Complex phases (integration, E2E): 30-60 minutes
      Timeout is configurable per phase in plan YAML."

  - severity: medium
    description: |
      Agent spawn failure handling lacks clarity on "alternative agent" behavior.
      Specification (lines 727-732) mentions checking for alternative agents but
      does NOT explain where this alternative list is defined or how to identify
      valid alternatives. Process.yml does not reference this fallback at all.
    location: "specification.yml:727-732 and missing from process.yml"
    impact: |
      Unclear what constitutes a valid "alternative agent" or where alternatives
      are declared (manifest, AGENT_ROUTING, or elsewhere).
    recommendation: |
      Clarify alternative agent definition: "Alternative agents share same routing_type
      in the spawns fence. If spawn fails for build-python, attempt build-flutter
      if routing_type=builder is shared."

  - severity: medium
    description: |
      Process.yml specification_reference (line 8-10) indicates that the full behavior
      is documented in the specification "Section 6" but the specification uses numbered
      sections (1-8) with titles like "EXECUTOR SCOPE", "AGENT_ROUTING", etc. The
      reference "Section 6 execution_protocol" is clear, but earlier references to
      "Section 3" for FEEDBACK_TRIGGERS should be added to process.yml where
      feedback triggers are discussed (line 163).
    location: "process.yml:8-10 and specification.yml structure"
    impact: |
      Cross-referencing between files is inconsistent, making it harder for agents
      to locate detailed specifications.
    recommendation: |
      Add specific section references to each process.yml step. Example:
      "loop_evaluate_triggers (see specification.yml Section 3: FEEDBACK_TRIGGERS)"

  - severity: medium
    description: |
      Path resolution semantics are documented only in inputs.yml but not referenced
      in manifest.yml or process.yml. An agent might not understand the distinction
      between "repository root relative paths" and "target project relative paths"
      without reading inputs.yml.
    location: "inputs.yml:1-10 (should be referenced in manifest.yml)"
    impact: |
      Agents might misinterpret example paths like "docs/plans/live/" without
      understanding they're relative to the target project, not the repository.
    recommendation: |
      Add a note to manifest.yml purpose section: "Path resolution note: All paths
      except docs/plans/* are relative to repository root. docs/plans/* paths
      are relative to target project root. See inputs.yml for details."

  - severity: low
    description: |
      Inconsistent formatting in manifest.yml spawns list. Some agents have
      "purpose:" fields (e.g., build-python) while others use structured data
      differently. The formatting is consistent but verbose.
    location: "manifest.yml:23-76"
    impact: |
      No functional impact, but reduces readability. Consider consolidating to
      a table-like format for clarity.

  - severity: low
    description: |
      The phase execution loop step "5. Evaluate feedback triggers" (process.yml:163-190)
      shows trigger actions but does NOT specify whether multiple triggers can fire
      simultaneously or how to prioritize them if they do. Example: Can both
      TEST_FAILURE and GUIDANCE_GAP fire in the same phase?
    location: "process.yml:163-190"
    impact: |
      Edge case behavior is undefined. Implementation might fail or behave unexpectedly
      if multiple triggers occur together.
    recommendation: |
      Clarify trigger priority: "If multiple triggers fire:
      1. CRITICAL triggers (CICD_FAILURE) escalate immediately
      2. HIGH triggers (BUILD_FAILURE, AUDIT_FAILURE) are handled sequentially
      3. MEDIUM triggers (TEST_FAILURE) can retry
      4. LOW triggers (GUIDANCE_GAP) are deferred to teacher phase"

  - severity: low
    description: |
      The inputs.yml references "cli-commands.yml" as a source for CLI command
      references, but does NOT specify which commands are actually required vs.
      optional or how the executor should validate CLI availability.
    location: "inputs.yml:107-115"
    impact: |
      Low impact, but implementers must guess which CLI commands are mandatory.
    recommendation: |
      Add a validation step to process.yml startup: "Verify required CLI commands
      available: agentic plan validate, agentic plan task start/complete"

recommendations:
  - |
    CRITICAL: Add explicit agent routing resolution algorithm. Document the decision
    tree for resolving builder->build-python vs build-flutter, tester->test-runner vs
    test-builder, etc. This should be in both process.yml and specification.yml.

  - |
    CRITICAL: Reconcile deploy-cicd availability. Either integrate it into
    agents/manifest.yml or remove from orchestration-executor spawns fence.

  - |
    HIGH: Update manifest.yml specification line count from 959 to 1022 lines.

  - |
    HIGH: Replicate critical detection patterns from specification.yml into process.yml
    for feedback triggers (TEST_FAILURE, BUILD_FAILURE, etc.).

  - |
    HIGH: Document explicit timeout values and complexity criteria for phase spawning.

  - |
    MEDIUM: Add cross-references between process.yml steps and specification.yml sections.

  - |
    MEDIUM: Clarify fallback behavior rules for missing AGENT_ROUTING in process.yml.

  - |
    MEDIUM: Define "alternative agent" selection criteria and where alternatives
    are declared.

  - |
    MEDIUM: Document multiple feedback trigger priority and handling semantics.

  - |
    LOW: Add path resolution semantics note to manifest.yml (reference inputs.yml).

  - |
    LOW: Validate CLI command availability in startup sequence.

strengths:
  - Comprehensive specification document (1022 lines) covering detailed behavior
  - Clear purpose statement distinguishing executor from planner
  - Well-organized spawns fence with routing type annotations
  - Three-phase execution model (startup, loop, shutdown) is intuitive
  - Explicit guidelines section provides clear behavioral expectations
  - Good use of reference files (agent-loops.yml, agent-categories.yml) for DRY principle
  - Fallback behaviors documented with detection and resolution strategies
  - Resume capability and state synchronization concepts are well-designed

areas_of_concern:
  - Agent routing resolution lacks decision algorithm documentation
  - Feedback trigger detection patterns not replicated in process.yml
  - Deploy-cicd agent availability inconsistency across manifests
  - Timeout configuration left to agent discretion
  - Some critical details relegated to specification only (not in process.yml)
  - Path resolution semantics only documented in inputs.yml

version: "1.0"
reviewed_date: "2026-01-12"
reviewer: "self-review"
