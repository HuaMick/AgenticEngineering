# Docker Compose configuration for UAT (User Acceptance Testing)
# Purpose: Run full integration test suite with proper service orchestration
# Exit codes propagate for CI/CD integration (use --exit-code-from test)

version: '3.8'

x-common-variables: &common-variables
  WORKTREE_NAME: ${WORKTREE_NAME:-MyAgents-cloud-deploy}
  PYTHONUNBUFFERED: "1"
  UV_KEYRING_PROVIDER: subprocess

services:
  # UAT Test Runner - Runs full integration test suite
  test:
    build:
      context: .
      dockerfile: ${WORKTREE_NAME:-MyAgents-cloud-deploy}/Dockerfile.test
      args:
        WORKTREE_NAME: ${WORKTREE_NAME:-MyAgents-cloud-deploy}
    container_name: myagents-uat-test-runner
    depends_on:
      relay:
        condition: service_healthy
      terminal:
        condition: service_healthy
    environment:
      <<: *common-variables
      GOOGLE_APPLICATION_CREDENTIALS: /root/service-account.json
      # Test environment configuration
      RELAY_URL: http://relay:8080
      TERMINAL_URL: http://terminal:8081
      TEST_TIMEOUT: "300"
    volumes:
      # Mount test results for CI/CD artifact collection
      - uat-test-results:/test/results
      # Mount GCP service account for authentication
      - ${GCP_SA_KEY_PATH:-/home/code/myagents/secrets/myagents-475112-60da581cc8d9.json}:/root/service-account.json:ro
    networks:
      - myagents-uat-network
    command: >
      /bin/bash -c "
      set -e

      echo '=== UAT Test Runner Starting ==='
      echo 'Worktree: ${WORKTREE_NAME:-MyAgents-cloud-deploy}'
      echo 'Waiting for services to be ready...'

      # Wait for relay service
      timeout=60
      counter=0
      until curl -f http://relay:8080/health > /dev/null 2>&1 || [ $$counter -eq $$timeout ]; do
        echo \"Waiting for relay service... ($$counter/$$timeout)\"
        sleep 2
        counter=$$((counter + 2))
      done

      if [ $$counter -eq $$timeout ]; then
        echo 'ERROR: Relay service failed to become healthy'
        exit 1
      fi

      echo 'Relay service is healthy'

      # Wait for terminal service
      counter=0
      until curl -f http://terminal:8081/health > /dev/null 2>&1 || [ $$counter -eq $$timeout ]; do
        echo \"Waiting for terminal service... ($$counter/$$timeout)\"
        sleep 2
        counter=$$((counter + 2))
      done

      if [ $$counter -eq $$timeout ]; then
        echo 'ERROR: Terminal service failed to become healthy'
        exit 1
      fi

      echo 'Terminal service is healthy'
      echo '=== All services ready, starting integration tests ==='

      cd /workspace/${WORKTREE_NAME:-MyAgents-cloud-deploy}

      # Run integration tests with pytest
      # --junitxml: Generate XML report for CI/CD
      # --maxfail=5: Stop after 5 failures (fail fast for CI)
      # -v: Verbose output
      # --tb=short: Shorter traceback format
      /workspace/${WORKTREE_NAME:-MyAgents-cloud-deploy}/.venv/bin/pytest \
        tests/integration/ \
        --junitxml=/test/results/uat-integration.xml \
        --maxfail=5 \
        -v \
        --tb=short \
        --capture=no || TEST_EXIT=$$?

      echo '=== Test execution completed ==='

      # Copy additional artifacts if they exist
      if [ -d coverage_html ]; then
        cp -r coverage_html /test/results/
      fi

      if [ -f .coverage ]; then
        cp .coverage /test/results/
      fi

      # Exit with test exit code (0 for success, non-zero for failure)
      exit $${TEST_EXIT:-0}
      "
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '1.0'
    stop_grace_period: 30s

  # Relay Service - Required for integration tests
  relay:
    build:
      context: ./RemoteAgents-cloud-deploy
      dockerfile: Dockerfile
      target: production
    container_name: myagents-uat-relay
    environment:
      - PORT=8080
      - SERVICE_NAME=relay
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    networks:
      - myagents-uat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
    stop_grace_period: 20s

  # Terminal Service - Required for integration tests
  terminal:
    build:
      context: ./RemoteAgents-cloud-deploy
      dockerfile: Dockerfile
      target: production
    container_name: myagents-uat-terminal
    depends_on:
      relay:
        condition: service_healthy
    environment:
      - PORT=8081
      - SERVICE_NAME=terminal
      - RELAY_URL=http://relay:8080
      - LOG_LEVEL=info
    ports:
      - "8081:8081"
    networks:
      - myagents-uat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
    stop_grace_period: 20s

# Named volume for UAT test results
volumes:
  uat-test-results:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UAT_RESULTS_DIR:-./uat-results}

# Dedicated network for UAT testing
networks:
  myagents-uat-network:
    driver: bridge
    name: myagents-uat-network
