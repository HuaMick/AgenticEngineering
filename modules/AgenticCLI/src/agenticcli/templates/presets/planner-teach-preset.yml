# Planner-Teach Preset
# Ancillary tasks for teaching/guidance creation

name: planner-teach
description: "Tasks for creating teaching materials and guidance"
version: "1.0"

tasks:
  - id: "pt_001"
    description: "Create inputs.yml with all source references"
    priority: "high"
    trigger: "always"

  - id: "pt_002"
    description: "Generate process.mmd workflow diagram"
    priority: "medium"
    trigger: "workflow_defined"

  - id: "pt_003"
    description: "Add worked examples to guidance"
    priority: "medium"
    trigger: "guidance_created"

  - id: "pt_004"
    description: "Include anti-patterns section"
    priority: "low"
    trigger: "complexity > medium"

  - id: "pt_005"
    description: "Cross-reference related guidance documents"
    priority: "low"
    trigger: "related_docs_exist"

  - id: "pt_006"
    description: "Add validation checklist for guidance quality"
    priority: "high"
    trigger: "always"
