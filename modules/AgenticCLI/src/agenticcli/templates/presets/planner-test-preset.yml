# Planner-Test Preset
# Ancillary tasks for test planning

name: planner-test
description: "Tasks for test plan creation"
version: "1.0"

tasks:
  - id: "ptest_001"
    description: "Define test categories (unit, integration, e2e)"
    priority: "high"
    trigger: "always"

  - id: "ptest_002"
    description: "Map tests to user stories"
    priority: "medium"
    trigger: "stories_exist"

  - id: "ptest_003"
    description: "Include edge case scenarios"
    priority: "medium"
    trigger: "always"

  - id: "ptest_004"
    description: "Define test data requirements"
    priority: "medium"
    trigger: "always"

  - id: "ptest_005"
    description: "Specify expected coverage targets"
    priority: "high"
    trigger: "always"

  - id: "ptest_006"
    description: "Add performance test criteria if applicable"
    priority: "low"
    trigger: "performance_sensitive"
