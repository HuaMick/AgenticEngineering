# Builder Preset
# Ancillary tasks during implementation

name: builder
description: "Tasks for implementation agents during build phase"
version: "1.0"

tasks:
  - id: "build_001"
    description: "Run linter before committing"
    priority: "high"
    trigger: "pre_commit"

  - id: "build_002"
    description: "Run existing tests to verify no regressions"
    priority: "high"
    trigger: "implementation_complete"

  - id: "build_003"
    description: "Update docstrings for new functions"
    priority: "medium"
    trigger: "functions_added"

  - id: "build_004"
    description: "Add type hints to function signatures"
    priority: "medium"
    trigger: "python_code"

  - id: "build_005"
    description: "Check for hardcoded values that should be config"
    priority: "low"
    trigger: "always"

  - id: "build_006"
    description: "Verify imports are organized and minimal"
    priority: "low"
    trigger: "always"

  - id: "build_007"
    description: "Update CHANGELOG if significant change"
    priority: "low"
    trigger: "feature_complete"

  - id: "build_008"
    description: "Mark task complete in plan file"
    priority: "high"
    trigger: "task_done"
