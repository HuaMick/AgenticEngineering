# Planner-Build Preset
# Ancillary tasks to remember during build planning

name: planner-build
description: "Tasks for planner-build agent during plan creation"
version: "1.0"

tasks:
  - id: "pb_001"
    description: "Generate process.mmd diagram if plan has multiple phases"
    priority: "medium"
    trigger: "phases.count > 2"

  - id: "pb_002"
    description: "Update README.md with plan summary"
    priority: "low"
    trigger: "plan_created"

  - id: "pb_003"
    description: "Validate all inputs.yml file references exist"
    priority: "high"
    trigger: "inputs_defined"

  - id: "pb_004"
    description: "Add success_criteria to each task"
    priority: "high"
    trigger: "always"

  - id: "pb_005"
    description: "Specify target_files for each task"
    priority: "high"
    trigger: "always"

  - id: "pb_006"
    description: "Include guidance snippets for complex tasks"
    priority: "medium"
    trigger: "task.complexity > medium"

  - id: "pb_007"
    description: "Review for dependency ordering between tasks"
    priority: "medium"
    trigger: "tasks.count > 5"
