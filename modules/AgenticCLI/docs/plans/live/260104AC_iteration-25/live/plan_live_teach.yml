      # ========================================
      # PHASE 4: Recovery Patterns
      # ========================================
      - id: "25.4"
        name: "Recovery Patterns for Destructive Operations"
        status: pending
        execution: sequential
        depends_on: ["25.2", "25.3"]

        tasks:
          - id: "25.4.1"
            name: "Add rollback capability to worktree create"
            status: pending
            agent_type: builder
            inputs:
              - src/agenticcli/commands/worktree.py
              - src/agenticcli/exceptions.py
            guidance: |
              Add rollback capability to cmd_create() for partial failure recovery:

              Current flow:
              1. Create git worktree
              2. Create planning folder

              If step 2 fails, the worktree exists but is in an inconsistent state.

              Implementation:
              1. Wrap the entire operation in a try block
              2. Track what was created (worktree_created=False, plan_created=False)
              3. On exception:
                 - If worktree was created but plan failed, offer to:
                   a) Keep worktree without plan
                   b) Remove worktree and abort
                 - Log the partial state for debugging

              4. Add --rollback-on-failure flag (default True):
                 - If True, automatically clean up on failure
                 - If False, keep partial state for manual recovery

              User experience:
              - In JSON mode: include "partial_state" in error response
              - In interactive mode: prompt user for rollback decision
            success_criteria:
              - "cmd_create() has try/except with rollback logic"
              - "Partial failures are detected and handled"
              - "Error messages include recovery suggestions"
              - "Tests added for partial failure scenarios"

          - id: "25.4.2"
            name: "Add recovery suggestions to all error paths"
            status: pending
            agent_type: builder
            inputs:
              - src/agenticcli/commands/worktree.py
              - src/agenticcli/commands/plan.py
              - src/agenticcli/commands/config.py
              - src/agenticcli/exceptions.py
            guidance: |
              Audit all error paths and add recovery suggestions:

              worktree.py:
              - "Worktree path already exists" -> "Use a different branch name or remove existing worktree"
              - "Not in git repository" -> "Run this command from within a git repository"
              - "Error creating worktree" -> "Check if branch name is valid and base branch exists"

              plan.py:
              - "Plan folder not found" -> "Run 'agentic plan scaffold <name>' to create one"
              - "Invalid plan structure" -> "Ensure live/ and completed/ subdirectories exist"
              - "YAML parse error" -> "Check YAML syntax at [file]:[line]"

              config.py:
              - "No configuration found" -> "Run 'agentic config init' to create default config"
              - "Permission denied" -> "Check write permissions for ~/.config/agenticcli/"

              Implementation:
              - Use the recovery_hint parameter of exception classes
              - Update print_error calls to include suggestions
              - Ensure JSON output includes recovery_hint field
            success_criteria:
              - "All user-facing errors include recovery suggestions"
              - "Recovery hints are actionable and specific"
              - "JSON error responses include recovery_hint field"

