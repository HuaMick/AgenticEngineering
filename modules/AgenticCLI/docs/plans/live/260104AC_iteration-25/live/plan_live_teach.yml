              - This is particularly problematic - it swallows ALL exceptions
              - Should catch yaml.YAMLError specifically and log the parse failure
              - Add structured error info: which file failed, line number if available

              Also audit other exception handlers in this file:
              - Line 42-44: CalledProcessError handling is good (exits with message)
              - Line 205-207: CalledProcessError handling is good

              Replace broad Exception catch with specific yaml.YAMLError.
            success_criteria:
              - "No except Exception: pass patterns in worktree.py"
              - "YAML parse errors are logged with file path context"
              - "Existing tests still pass: pytest tests/test_worktree.py -v"

