              2. Test message formatting with and without recovery hints
              3. Test that all exceptions inherit from AgenticError
              4. Test details dict is accessible and serializable to JSON
              5. Test error codes are unique per exception type

              Use pytest parametrize for testing all exception types systematically.
            success_criteria:
              - "tests/test_exceptions.py exists"
              - "Tests cover all 4 domain exception types"
              - "Tests verify inheritance hierarchy"
              - "All tests pass: pytest tests/test_exceptions.py -v"

