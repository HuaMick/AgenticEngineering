            guidance: |
              Create src/agenticcli/validation.py with reusable validators:

              1. Branch name validation:
                 def validate_branch_name(name: str) -> None:
                 - Reject names starting with - (git restriction)
                 - Reject names containing: .., ~, ^, :, \, spaces
                 - Reject names ending with .lock or /
                 - Reject empty strings
                 - Raise ValidationError with clear message on failure

              2. Plan folder structure validation:
                 def validate_plan_folder(path: Path) -> list[str]:
                 - Check for required subdirectories: live/, completed/
                 - Return list of warnings (missing optional files)
                 - Raise ValidationError for critical structure issues

              3. YAML schema validation:
                 def validate_plan_yaml(content: dict, schema_type: str) -> None:
                 - Schema types: "build", "test", "cleanup", "guidance"
                 - Validate required fields based on schema type
                 - Raise ValidationError with field-level error details

              Include docstrings with examples for each validator.
            success_criteria:
