    phases:
      # ========================================
      # PHASE 1: Exception Framework Foundation
      # ========================================
      - id: "25.1"
        name: "Exception Framework Foundation"
        status: pending
        execution: sequential

        tasks:
          - id: "25.1.1"
            name: "Create exceptions.py module"
            status: pending
            agent_type: builder
            inputs:
              - src/agenticcli/workflows/config_workflow.py  # Reference pattern: ConfigResult dataclass
              - src/agenticcli/workflows/plan_workflow.py    # Reference pattern: MoveResult enum
            guidance: |
              Create src/agenticcli/exceptions.py with a custom exception hierarchy:

              1. Base exception class: AgenticError(Exception)
                 - Should include: message, details (dict), recovery_hint (optional str)
                 - Implement __str__ to format message with recovery hint

              2. Domain-specific exceptions inheriting from AgenticError:
                 - WorktreeError: For git worktree operation failures
                 - PlanError: For plan file/folder validation failures
                 - ConfigError: For configuration loading/saving failures
                 - ValidationError: For input validation failures

              3. Each exception should support:
                 - Optional context dict for structured error data
                 - Recovery suggestion string for user guidance
                 - Error codes for machine-readable error handling

              Pattern reference: Follow the dataclass pattern from ConfigResult but as exceptions.
            success_criteria:
              - "exceptions.py exists at src/agenticcli/exceptions.py"
              - "AgenticError base class implemented with message, details, recovery_hint"
              - "WorktreeError, PlanError, ConfigError, ValidationError classes exist"
              - "All exception classes can be imported: from agenticcli.exceptions import *"

