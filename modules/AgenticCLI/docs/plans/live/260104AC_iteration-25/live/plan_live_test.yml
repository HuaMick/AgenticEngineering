    # ========================================
    - id: "test-25.2"
      name: "Integration Test Suite"
      status: pending
      scope: "Command-level error handling"

      tests:
        - test_file: "tests/test_error_handling.py"
          coverage:
            - "CLI rejects invalid branch names with clear error"
            - "JSON output includes error details and recovery hints"
            - "YAML parse errors include file context"
