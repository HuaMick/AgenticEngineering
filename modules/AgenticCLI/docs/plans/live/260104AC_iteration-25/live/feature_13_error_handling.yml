# Feature 13: Error Handling & Recovery Framework
# Status: pending
# Priority: high

feature:
  id: FEAT-13
  name: "Error Handling & Recovery Framework"
  description: |
    Create a comprehensive error handling framework for AgenticCLI that provides:
    - Custom exception hierarchy for domain-specific errors
    - Recovery suggestions in error messages
    - Rollback patterns for destructive operations
    - Elimination of silent failure patterns

  current_problems:
    - description: "Silent pass statements swallow errors"
      locations:
        - "src/agenticcli/workflows/state_workflow.py:120"
        - "src/agenticcli/workflows/state_workflow.py:145"
        - "src/agenticcli/commands/worktree.py:483"
        - "src/agenticcli/commands/stories.py:50,100"
        - "src/agenticcli/commands/template.py:211"
        - "src/agenticcli/commands/plan.py:359"
        - "src/agenticcli/workflows/environment_workflow.py:154,171,193"
        - "src/agenticcli/workflows/template_workflow.py:267"
      impact: "Errors are hidden from users and developers"

    - description: "Generic Exception catches hide specific failures"
      locations:
        - "src/agenticcli/commands/worktree.py:482 (except Exception:)"
        - "src/agenticcli/commands/template.py:210 (except Exception:)"
      impact: "Makes debugging difficult, catches unexpected errors"

    - description: "No structured error information for automation"
      impact: "JSON mode cannot provide useful error details to scripts"

  deliverables:
    - path: "src/agenticcli/exceptions.py"
      description: "Custom exception hierarchy module"
      contents:
        - "AgenticError - Base exception with message, details, recovery_hint"
        - "WorktreeError - Git worktree operation failures"
        - "PlanError - Plan file/folder validation failures"
        - "ConfigError - Configuration loading/saving failures"
        - "ValidationError - Input validation failures"

    - path: "tests/test_exceptions.py"
      description: "Exception class tests"
      contents:
        - "Test exception instantiation and message formatting"
        - "Test inheritance hierarchy"
        - "Test details dict serialization"
        - "Test error codes"

  implementation_steps:
    - id: "13.1"
      name: "Create exceptions.py"
      status: pending
      estimated_lines: 80

    - id: "13.2"
      name: "Create test_exceptions.py"
      status: pending
      estimated_lines: 100

    - id: "13.3"
      name: "Replace silent passes in state_workflow.py"
      status: pending
      files: ["src/agenticcli/workflows/state_workflow.py"]

    - id: "13.4"
      name: "Replace silent passes in worktree.py"
      status: pending
      files: ["src/agenticcli/commands/worktree.py"]

    - id: "13.5"
      name: "Replace silent passes in remaining files"
      status: pending
      files:
        - "src/agenticcli/commands/stories.py"
        - "src/agenticcli/commands/template.py"
        - "src/agenticcli/commands/plan.py"
        - "src/agenticcli/workflows/environment_workflow.py"
        - "src/agenticcli/workflows/template_workflow.py"

    - id: "13.6"
      name: "Add rollback to worktree create"
      status: pending
      files: ["src/agenticcli/commands/worktree.py"]

    - id: "13.7"
      name: "Add recovery suggestions to all error paths"
      status: pending
      files:
        - "src/agenticcli/commands/worktree.py"
        - "src/agenticcli/commands/plan.py"
        - "src/agenticcli/commands/config.py"

  success_criteria:
    - "exceptions.py module exists with all 4 domain exceptions"
    - "No silent 'pass' statements in any except blocks"
    - "All exception handlers have logging or explicit handling"
    - "JSON error output includes recovery_hint field"
    - "Rollback implemented for worktree create failures"
