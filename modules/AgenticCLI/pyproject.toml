[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agenticcli"
version = "0.1.0"
description = "Command-line interface for AgenticEngineering"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "AgenticEngineering" }
]
keywords = ["cli", "agentic", "planning", "worktree"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pyyaml>=6.0",
    "rich>=13.0",
]

[project.scripts]
agentic = "agenticcli.entry:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agenticcli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]
