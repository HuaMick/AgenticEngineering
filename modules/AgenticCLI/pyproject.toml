[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-cli"
version = "0.1.0"
description = "Thin CLI calling API for AgenticEngineering"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
  { name = "AgenticEngineering", email = "agentic@example.com" },
]
dependencies = [
  "click>=8.1.0",
  "pyyaml>=6.0.0",
  "httpx>=0.27.0",
  "rich>=13.0.0",
  "uv>=0.1.0",
]

[project.scripts]
agentic = "agentic.main:cli"

[project.optional-dependencies]
dev = [
  "pytest",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentic"]
