# Blind Testing - Treatment Result Template
# =========================================
# Copy this file and fill in for each treatment session.
# Filename convention: treatment_YYYYMMDD_HHmm.yml

experiment: "treatment"
session_id: "YYYYMMDD_HHmm"  # Replace with actual timestamp

# ==============================================================================
# Agent/Model Information
# ==============================================================================
agent_info:
  model: ""  # e.g., "claude-opus-4-5-20251101"
  agent_type: "planner-build"
  session_duration_minutes: null  # Total time from start to completion

# ==============================================================================
# Prefill Information - CRITICAL for treatment
# ==============================================================================
prefill:
  preset_used: "planner-build"  # Preset that was loaded
  tasks_prefilled: null  # Number of tasks prefilled (check with task list)
  prefill_command: "agentic plan task prefill --preset planner-build --plan <path>"
  prefill_verified: null  # true/false - Did you verify tasks were visible?

# ==============================================================================
# Specification Details - MUST MATCH BASELINE
# ==============================================================================
specification:
  description: ""  # Brief description (should match baseline)
  num_phases: null  # Number of phases (should match baseline)
  num_tasks: null  # Total tasks created (compare with baseline)
  complexity: ""  # "low", "medium", or "high" (should match baseline)
  spec_file: ""  # Path to specification.md (ideally identical to baseline)
  matches_baseline: ""  # session_id of the paired baseline session

# ==============================================================================
# Observations - Fill these in after session
# ==============================================================================
observations:
  # Binary metrics - Critical measurement criteria
  mmd_generated: null  # true/false - Was process.mmd diagram created?
  readme_updated: null  # true/false - Was README.md updated with plan summary?

  # Count metrics
  total_tasks: null  # Total tasks in the generated plan
  tasks_with_success_criteria: null  # Tasks that have success_criteria defined
  tasks_with_target_files: null  # Tasks that have target_files specified
  tasks_with_guidance: null  # Tasks that have guidance text
  tasks_with_inputs: null  # Tasks that have inputs specified

  # Treatment-specific observations
  prefilled_tasks_completed: null  # How many prefilled tasks were explicitly addressed
  prefilled_tasks_mentioned: null  # true/false - Did agent reference the task list?
  agent_awareness: ""  # "explicit", "implicit", or "ignored" - How agent handled prefilled tasks

# ==============================================================================
# Calculated Rates - Compute after filling observations
# ==============================================================================
calculated_rates:
  # success_criteria_rate = tasks_with_success_criteria / total_tasks
  success_criteria_rate: null

  # target_files_rate = tasks_with_target_files / total_tasks
  target_files_rate: null

  # guidance_rate = tasks_with_guidance / total_tasks
  guidance_rate: null

  # prefill_completion_rate = prefilled_tasks_completed / tasks_prefilled
  prefill_completion_rate: null

# ==============================================================================
# Comparison with Baseline
# ==============================================================================
comparison:
  baseline_session_id: ""  # Same as matches_baseline above
  improvements:
    mmd_improved: null  # true if treatment=true and baseline=false
    readme_improved: null  # true if treatment=true and baseline=false
    success_criteria_improvement: null  # treatment_rate - baseline_rate
    target_files_improvement: null  # treatment_rate - baseline_rate
  meets_threshold: null  # true if improvement > 0.15 in 2+ metrics

# ==============================================================================
# Session Notes
# ==============================================================================
notes: |
  [Record any observations about agent behavior with prefilled tasks,
  whether agent referenced task list, unusual circumstances, etc.]

  Observations:
  -

  Prefill impact:
  -

  Agent behavior notes:
  -

# ==============================================================================
# Verification
# ==============================================================================
verified_by: ""  # Name/initials of person verifying results
verification_date: ""  # YYYY-MM-DD

# ==============================================================================
# Checklist (for your reference during session)
# ==============================================================================
# PRE-SESSION:
# [ ] Fresh plan folder created
# [ ] Task prefill command executed
# [ ] Prefilled tasks verified with task list command
# [ ] Specification.md prepared (MUST match baseline)
# [ ] This template copied with session timestamp
# [ ] Baseline session_id recorded in matches_baseline
#
# DURING SESSION:
# [ ] Start time noted
# [ ] Did not mention experiment to agent
# [ ] Did not draw attention to prefilled tasks
# [ ] Let agent complete naturally
# [ ] Noted if agent referenced task list
#
# POST-SESSION:
# [ ] Counted tasks with success_criteria
# [ ] Counted tasks with target_files
# [ ] Checked for process.mmd existence
# [ ] Checked for README.md update
# [ ] Counted prefilled tasks addressed
# [ ] Noted session duration
# [ ] All observations recorded above
# [ ] Rates calculated
# [ ] Compared with baseline session
