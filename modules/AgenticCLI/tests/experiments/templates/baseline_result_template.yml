# Blind Testing - Baseline Result Template
# =========================================
# Copy this file and fill in for each baseline session.
# Filename convention: baseline_YYYYMMDD_HHmm.yml

experiment: "baseline"
session_id: "YYYYMMDD_HHmm"  # Replace with actual timestamp

# ==============================================================================
# Agent/Model Information
# ==============================================================================
agent_info:
  model: ""  # e.g., "claude-opus-4-5-20251101"
  agent_type: "planner-build"
  session_duration_minutes: null  # Total time from start to completion

# ==============================================================================
# Specification Details
# ==============================================================================
specification:
  description: ""  # Brief description of the feature being planned
  num_phases: null  # Number of phases in the plan (target: 3+)
  num_tasks: null  # Total number of tasks created (target: 10+)
  complexity: ""  # "low", "medium", or "high"
  spec_file: ""  # Path to specification.md used

# ==============================================================================
# Observations - Fill these in after session
# ==============================================================================
observations:
  # Binary metrics - Critical measurement criteria
  mmd_generated: null  # true/false - Was process.mmd diagram created?
  readme_updated: null  # true/false - Was README.md updated with plan summary?

  # Count metrics
  total_tasks: null  # Total tasks in the generated plan
  tasks_with_success_criteria: null  # Tasks that have success_criteria defined
  tasks_with_target_files: null  # Tasks that have target_files specified
  tasks_with_guidance: null  # Tasks that have guidance text
  tasks_with_inputs: null  # Tasks that have inputs specified

# ==============================================================================
# Calculated Rates - Compute after filling observations
# ==============================================================================
calculated_rates:
  # success_criteria_rate = tasks_with_success_criteria / total_tasks
  success_criteria_rate: null

  # target_files_rate = tasks_with_target_files / total_tasks
  target_files_rate: null

  # guidance_rate = tasks_with_guidance / total_tasks
  guidance_rate: null

# ==============================================================================
# Session Notes
# ==============================================================================
notes: |
  [Record any observations about agent behavior, forgotten tasks, prompting
  required, unusual circumstances, etc.]

  Observations:
  -

  Forgotten items:
  -

  Agent behavior notes:
  -

# ==============================================================================
# Verification
# ==============================================================================
verified_by: ""  # Name/initials of person verifying results
verification_date: ""  # YYYY-MM-DD

# ==============================================================================
# Checklist (for your reference during session)
# ==============================================================================
# PRE-SESSION:
# [ ] Fresh plan folder created
# [ ] Specification.md prepared
# [ ] This template copied with session timestamp
# [ ] No task prefill commands run
#
# DURING SESSION:
# [ ] Start time noted
# [ ] Did not mention experiment to agent
# [ ] Let agent complete naturally
# [ ] Noted any prompting required
#
# POST-SESSION:
# [ ] Counted tasks with success_criteria
# [ ] Counted tasks with target_files
# [ ] Checked for process.mmd existence
# [ ] Checked for README.md update
# [ ] Noted session duration
# [ ] All observations recorded above
# [ ] Rates calculated
