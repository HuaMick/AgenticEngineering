# Blind Testing Experiment - Results Template
# ============================================
#
# This template documents the structure for recording experiment observations.
# Copy to templates/baseline_result_template.yml or templates/treatment_result_template.yml
# for actual experiment recording.
#
# MEASUREMENT CRITERIA:
# 1. MMD file generation (often forgotten)
# 2. README.md update (often forgotten)
# 3. success_criteria per task (often incomplete)
# 4. target_files specification (often missing)
#
# TARGET: >15% improvement in treatment vs baseline

# ==============================================================================
# EXPERIMENT METADATA
# ==============================================================================

experiment_info:
  name: "CLI Task Lists Blind Testing"
  version: "1.0"
  hypothesis: |
    Prefilling visible task lists will improve agent completion rates
    for ancillary tasks (MMD diagrams, README updates, success_criteria,
    target_files) by >15% compared to sessions without prefill.

  measurement_criteria:
    - metric: "mmd_generated"
      description: "Whether process.mmd diagram was created for multi-phase plans"
      baseline_expected: "~40% of sessions"
      improvement_target: ">55% of sessions"

    - metric: "readme_updated"
      description: "Whether README.md was updated with plan summary"
      baseline_expected: "~60% of sessions"
      improvement_target: ">75% of sessions"

    - metric: "success_criteria_rate"
      description: "Percentage of tasks with success_criteria defined"
      baseline_expected: "~70% of tasks"
      improvement_target: ">85% of tasks"

    - metric: "target_files_rate"
      description: "Percentage of tasks with target_files specified"
      baseline_expected: "~75% of tasks"
      improvement_target: ">90% of tasks"

# ==============================================================================
# SESSION RESULT TEMPLATE
# ==============================================================================

session_result:
  # Basic identification
  experiment: ""  # "baseline" or "treatment"
  session_id: ""  # Format: YYYYMMDD_HHmm (e.g., "20260120_1430")

  # Agent/Model Information
  agent_info:
    model: ""  # e.g., "claude-opus-4-5-20251101"
    agent_type: "planner-build"
    session_duration_minutes: null

  # Specification Details
  specification:
    description: ""  # Brief description of the feature being planned
    num_phases: null  # Number of phases in the plan
    num_tasks: null  # Total number of tasks created
    complexity: ""  # "low", "medium", or "high"

  # Treatment-specific (leave blank for baseline)
  prefill:
    preset_used: ""  # e.g., "planner-build"
    tasks_prefilled: null  # Number of tasks prefilled
    prefill_command: ""  # Exact command used
    matches_baseline: ""  # session_id of paired baseline session

  # Core Observations
  observations:
    # Binary metrics
    mmd_generated: null  # true/false - Was process.mmd created?
    readme_updated: null  # true/false - Was README.md updated?

    # Count metrics
    total_tasks: null  # Total tasks in the plan
    tasks_with_success_criteria: null  # Tasks with success_criteria defined
    tasks_with_target_files: null  # Tasks with target_files specified
    tasks_with_guidance: null  # Tasks with guidance text
    tasks_with_inputs: null  # Tasks with inputs specified

    # Treatment-specific observations
    prefilled_tasks_completed: null  # How many prefilled tasks were addressed
    prefilled_tasks_mentioned: null  # Did agent explicitly reference task list?

  # Calculated rates (fill in after session)
  calculated_rates:
    success_criteria_rate: null  # tasks_with_success_criteria / total_tasks
    target_files_rate: null  # tasks_with_target_files / total_tasks
    guidance_rate: null  # tasks_with_guidance / total_tasks

  # Free-form notes
  notes: |
    [Record observations about agent behavior, forgotten tasks, etc.]

  # Verification
  verified_by: ""
  verification_date: ""

# ==============================================================================
# COMPARISON TEMPLATE
# ==============================================================================

comparison:
  baseline_session: ""  # session_id
  treatment_session: ""  # session_id

  improvements:
    mmd_generated:
      baseline: null
      treatment: null
      improved: null  # true/false

    readme_updated:
      baseline: null
      treatment: null
      improved: null

    success_criteria_rate:
      baseline: null
      treatment: null
      improvement: null  # percentage point difference

    target_files_rate:
      baseline: null
      treatment: null
      improvement: null

  overall_assessment:
    meets_threshold: null  # true if >15% improvement in 2+ metrics
    conclusion: ""  # "positive", "inconclusive", or "negative"
    notes: ""

# ==============================================================================
# AGGREGATE RESULTS TEMPLATE
# ==============================================================================

aggregate_results:
  total_baseline_sessions: null
  total_treatment_sessions: null

  baseline_averages:
    mmd_generation_rate: null  # % of sessions with MMD
    readme_update_rate: null  # % of sessions with README update
    avg_success_criteria_rate: null  # avg across sessions
    avg_target_files_rate: null

  treatment_averages:
    mmd_generation_rate: null
    readme_update_rate: null
    avg_success_criteria_rate: null
    avg_target_files_rate: null

  improvements:
    mmd_generation: null  # treatment - baseline
    readme_update: null
    success_criteria: null
    target_files: null

  conclusion:
    feature_validated: null  # true if improvements > 15% threshold
    recommendation: ""  # "deploy", "needs_more_testing", "revise_approach"
    summary: |
      [Summary of experiment findings]

# ==============================================================================
# PROTOCOL REFERENCE
# ==============================================================================

protocol:
  baseline:
    steps:
      - "Create new plan folder: agentic plan scaffold YYMMDDID_blind_baseline"
      - "Create specification.md (3+ phases, 10+ tasks, moderate complexity)"
      - "Start planner-build WITHOUT prefill"
      - "Let agent complete naturally - do not mention experiment"
      - "Record observations using session_result template above"

  treatment:
    steps:
      - "Create new plan folder: agentic plan scaffold YYMMDDID_blind_treatment"
      - "Run prefill: agentic plan task prefill --preset planner-build --plan <path>"
      - "Verify tasks: agentic plan task list --plan <path>"
      - "Create IDENTICAL specification.md as paired baseline"
      - "Start planner-build - do not mention experiment or prefilled tasks"
      - "Record observations using session_result template above"

  analysis:
    steps:
      - "Pair each treatment session with its baseline session"
      - "Calculate improvement for each metric"
      - "Compute aggregate averages"
      - "Determine if >15% improvement threshold met"
      - "Document conclusion and recommendation"

  improvement_calculation: |
    For rate metrics (success_criteria, target_files):
      improvement = treatment_rate - baseline_rate

    For binary metrics (mmd_generated, readme_updated):
      improvement = treatment_percentage - baseline_percentage

    Success threshold: improvement > 0.15 (15 percentage points)
    Feature validated if 2+ metrics exceed threshold
