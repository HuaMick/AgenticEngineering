entrypoint:
  name: "_analyze_friction"
  goal: "Analyze LangSmith traces for friction patterns and recommend resolutions."
  description: |
    On-demand friction analysis triggered by user reference in context.
    Queries LangSmith traces, detects friction patterns, and presents
    resolution recommendations for user decision.

  # Orchestration agent that controls the analysis workflow
  # Note: The current session takes on the role of the orchestration agent.
  # Analysis is read-only - no automatic changes made.
  orchestration: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd"

  # Inputs are loaded by the orchestration agent from:
  # modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml

  steps:
    - "Run: agentic entrypoint execute _analyze_friction --compile"
    - "Follow the orchestration process from compiled output"
    - "Query LangSmith traces (by session_count or lookback_days)"
    - "Group runs by session_id"
    - "Run friction pattern detection per session (FP-001 through FP-006)"
    - "Filter patterns by min_affected_sessions threshold"
    - "Classify patterns by severity (high/medium/low based on frequency/impact)"
    - "Generate resolution recommendations (GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE)"
    - "Present findings with session-level evidence"
    - "Output: Friction report for user decision"

  input:
    - "project_name: LangSmith project (default: from CC_LANGSMITH_PROJECT env var)"
    - "lookback_days: Days to analyze (default: 7)"
    - "limit: Max runs to analyze (default: 100)"
    - "session_count: Number of recent sessions to analyze (optional, overrides lookback_days)"
    - "min_affected_sessions: Only report patterns affecting N+ sessions (default: 2)"

  output:
    - "Friction report with detected patterns and severity"
    - "Resolution recommendations with evidence from traces"
    - "Suggested next steps for user approval"

  # Friction patterns detected (reference: plan_live_trace_friction_detection.yml)
  # FP-001: Excessive Retries - Agent retries same operation multiple times
  # FP-002: Exploration Drift - Agent explores extensively before finding target
  # FP-003: Missing Context - Agent asks for info that should be in guidance
  # FP-004: Schema Violations - Output doesn't match expected schema
  # FP-005: Convention Violations - Doesn't follow naming/structure conventions
  # FP-006: Automatable Patterns - Same multi-step sequence repeated
