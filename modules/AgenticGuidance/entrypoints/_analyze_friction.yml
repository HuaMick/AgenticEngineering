entrypoint:
  name: "_analyze_friction"
  goal: "Analyze agent session traces for friction patterns and recommend resolutions."
  description: |
    On-demand friction analysis triggered by user reference in context.
    Queries recent agent session JSONL traces (stored in ~/.claude/projects/),
    detects friction patterns, and presents resolution recommendations for user decision.

  # Orchestration agent that controls the analysis workflow
  # Note: The current session takes on the role of the orchestration agent.
  # Analysis is read-only - no automatic changes made.
  orchestration: "modules/AgenticGuidance/agents/orchestration/orchestration-friction/process.mmd"

  # Inputs are loaded by the orchestration agent from:
  # modules/AgenticGuidance/agents/orchestration/orchestration-friction/inputs.yml

  steps:
    - "Locate agent session JSONL files in ~/.claude/projects/-home-code-AgenticEngineering/"
    - "Filter sessions by date range and role (planner-build, planner-design, etc.)"
    - "Extract queue-operation content (initial prompt sent to agent)"
    - "Extract thinking blocks from assistant messages to reveal reasoning"
    - "Extract tool_use calls (name + input) to detect Edit/Write/Bash implementation actions"
    - "Run friction pattern detection per session (FP-001 through FP-007)"
    - "Cross-reference prompt text against expected planning-only constraints"
    - "Filter patterns by min_affected_sessions threshold"
    - "Classify patterns by severity (high/medium/low based on frequency/impact)"
    - "Generate resolution recommendations (GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE)"
    - "Present findings with session-level evidence"
    - "Output: Friction report for user decision"

  # TRACE DATA LOCATIONS:
  # Session JSONL files: ~/.claude/projects/-home-code-AgenticEngineering/<uuid>.jsonl
  #   - Large files (10KB-5MB+), each line is a JSON object
  #   - Types: queue-operation (initial prompt), user, assistant (thinking, text, tool_use)
  #   - Session roles are in queue-operation content: "You are being spawned as a <role> agent."
  #
  # IMPORTANT: These JSONL files can have very long lines (100KB+).
  # Use head -c <bytes> for initial extraction rather than line-based tools.
  # Use grep -oP for pattern extraction rather than loading full files.
  #
  # Session state JSON: ~/.agentic/sessions/<uuid>.json
  #   - Contains role, epic_folder, status, transport, etc.

  input:
    - "lookback_days: Days to analyze (default: 7)"
    - "role_filter: Specific roles to analyze (default: all planner-* roles)"
    - "min_affected_sessions: Only report patterns affecting N+ sessions (default: 2)"

  output:
    - "Friction report with detected patterns and severity"
    - "Resolution recommendations with evidence from traces"
    - "Suggested next steps for user approval"

  # Prompt guide for agent sessions:
  # docs/prompts/friction_analysis.md

  # Friction patterns detected (reference: modules/AgenticGuidance/assets/definitions/friction-patterns.yml)
  # FP-001: Excessive Retries - Agent retries same operation 3+ times consecutively
  # FP-002: Exploration Drift - >60% exploration tools in early phases
  # FP-003: Missing Context - >3 AskUserQuestion calls for routine decisions
  # FP-004: Schema Violations - Output fails validation (schema/format errors)
  # FP-005: Convention Violations - Post-creation renames or naming corrections
  # FP-006: Automatable Patterns - Identical 3+ tool sequences across sessions
  # FP-007: Planning Scope Violation - Planner agent uses Edit/Write tools or runs tests

  # KNOWN ISSUE (2026-03-12): Planning agents doing implementation
  # Root causes identified:
  #
  # 1. DUPLICATE PROMPT BUILDER (PRIMARY)
  #    - planner_loop.py _build_agent_prompt() has PLANNING-ONLY constraint
  #    - session.py _build_role_prompt() does NOT have this constraint
  #    - Both tmux-sdk and subprocess spawn paths go through session.py
  #    - Only SDK-direct path (AGENTIC_FORCE_SDK_DIRECT=1) uses planner_loop.py prompt
  #    - File: modules/AgenticCLI/src/agenticcli/commands/session.py line 607-634
  #    - File: modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py line 87-119
  #
  # 2. PLANNER AGENTS HAVE EDIT/WRITE TOOLS
  #    - All .claude/agents/planner-*.md files have tools: Read, Glob, Grep, Bash, Edit, Write
  #    - Planners should NOT have Edit, Write (only need Read, Glob, Grep, Bash for CLI commands)
  #
  # 3. DOGFOOD STRATEGY ENCOURAGES IMPLEMENTATION
  #    - _DOGFOOD_STRATEGY text appended to every spawn prompt includes language like
  #      "spawn a subagent to implement the fix" which biases toward implementation
  #    - File: modules/AgenticCLI/src/agenticcli/commands/session.py line 593-604
  #
  # RECOMMENDED FIXES:
  #   a) Add _PLANNING_PHASE_ROLES check to _build_role_prompt in session.py
  #   b) Remove Edit, Write from planner-*.md tool lists
  #   c) Exclude or modify _DOGFOOD_STRATEGY for planning roles
