entrypoint:
  name: "_orchestrate"
  goal: "Execute a pre-approved plan by orchestrating builder and tester agents."
  description: "Entrypoint that delegates execution orchestration to the orchestration-build agent with a pre-approved plan."

  # Orchestration agent that controls the execution workflow
  # Note: The current session is to take on the role of the orchestration agent.
  # Orchestration is not to use subagents; it should use the primary session.
  orchestration: "agents/orchestration/orchestration-build/process.mmd"

  # Inputs are loaded by the orchestration agent from:
  # agents/orchestration/orchestration-build/inputs.yml
  # Requires: Pre-approved plan folder path from _plan_build.yml or _plan_teach.yml output

  steps:
    - "Load orchestration process from agents/orchestration/orchestration-build/process.mmd"
    - "Validate pre-approved plan exists at provided path"
    - "Execute phases in order defined by plan"
    - "Orchestrate builder and tester agents per phase definitions"
    - "Report completion status and any blocking issues"

  input:
    - "Pre-approved plan folder path (from _plan_build.yml or _plan_teach.yml output)"

  output:
    - "Execution status (completed, blocked, failed)"
    - "Phase completion report"
