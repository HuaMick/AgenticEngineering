entrypoint:
  name: "_epic_build"
  goal: "Build an implementation epic by decomposing the objective into executable phases (code implementation)."
  description: "Entrypoint that delegates implementation planning orchestration to the orchestration-planning agent."

  # ==============================================
  # GUIDANCE MODIFICATION WARNING
  # ==============================================
  # If your build objective includes modifications to agent guidance files
  # (process.yml, inputs.yml, manifest.yml), you may need _epic_teach.yml instead.
  # See: modules/AgenticGuidance/assets/definitions/guidance-process-requirements.yml
  #
  # The planner-build agent will detect guidance modifications and flag them
  # for teach process validation. Do not bypass this validation.
  #
  # Guidance files include:
  #   - modules/AgenticGuidance/agents/**/process.yml
  #   - modules/AgenticGuidance/agents/**/inputs.yml
  #   - modules/AgenticGuidance/agents/**/manifest.yml
  #   - modules/AgenticGuidance/assets/definitions/*.yml
  #   - modules/AgenticGuidance/assets/guidelines/*.yml
  # ==============================================

  # Orchestration agent that controls the planning workflow
  # Note: The current session is to take on the role of the orchestration agent.
  # Orchestration is not to use subagents; it should use the primary session.
  orchestration: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.yml"

  # Inputs are now loaded by the orchestration agent from:
  # modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
  # The orchestration agent loads:
  #   - Guidelines: fix-the-source, context-minimisation, worktree-and-branching, response-audit, iteration, orchestration-policy
  #   - Definitions: plans, agent-loops, agent-categories
  #   - Planner manifest and sub-agent processes
  #   - Epic examples for structure reference

  steps:
    - "Run: agentic entrypoint execute _epic_build --compile"
    - "Run: agentic epic init <branch> --description <desc>"
    - "Run: agentic epic ticket current"
    - "Follow the orchestration process from compiled output"
    - "Orchestration agent validates inputs (user provides context - no discovery phase)"
    - "Orchestration agent determines required phases based on objective type (teach, build, test, cleanup)"
    - "Orchestration agent runs planning loops with specialized planners and reviewers"
    - "Orchestration agent presents epic for human approval gate"
    - "Output: Approved live epic folder path, phases created, ready for _orchestrate.yml"

  output:
    - "Live epic folder location (docs/epics/live/YYMMDDXX_description/)"
    - "Phases created (teach, build, test, cleanup as needed)"
    - "Epic status: approved and ready for execution"
