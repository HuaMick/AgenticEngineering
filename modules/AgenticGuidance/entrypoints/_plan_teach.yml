entrypoint:
  name: "_plan_teach"
  goal: "Build a guidance plan by decomposing the objective into executable phases (teaching/guidance)."
  description: "Entrypoint that delegates guidance planning orchestration to the orchestration-planning agent."

  # ==============================================
  # REQUIRED FOR GUIDANCE CHANGES
  # ==============================================
  # This entrypoint MUST be used when modifying agent guidance files.
  # Guidance changes require validation (agent self-review, guidance testing)
  # that is NOT performed in the build-only process.
  # See: modules/AgenticGuidance/assets/definitions/guidance-process-requirements.yml
  #
  # Use this entrypoint when modifying:
  #   - modules/AgenticGuidance/agents/**/process.yml
  #   - modules/AgenticGuidance/agents/**/inputs.yml
  #   - modules/AgenticGuidance/agents/**/manifest.yml
  #   - modules/AgenticGuidance/assets/definitions/*.yml
  #   - modules/AgenticGuidance/assets/guidelines/*.yml
  #   - modules/AgenticGuidance/entrypoints/*.yml
  #
  # The teach process includes:
  #   - Agent self-review for modified agents
  #   - Path resolution validation
  #   - Consistency checks between process.yml and inputs.yml
  # ==============================================

  # Orchestration agent that controls the planning workflow
  # Note: orchestration-planning will be invoked with a 'guidance' intent
  # Note: The current session is to take on the role of the orchestration agent.
  # Orchestration is not to use subagents; it should use the primary session.
  orchestration: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/process.mmd"

  # Inputs are now loaded by the orchestration agent from:
  # modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml
  # The orchestration agent loads:
  #   - Guidelines: fix-the-source, context-minimisation, worktree-and-branching, response-audit, iteration, orchestration-policy
  #   - Definitions: plans, agent-loops, agent-categories
  #   - Planner manifest and sub-agent processes
  #   - Plan examples for structure reference

  steps:
    - "Run: agentic entrypoint execute _plan_teach --compile"
    - "Run: agentic agent epic init <branch> --description <desc>"
    - "Run: agentic agent epic ticket current"
    - "Follow the orchestration process from compiled output"
    - "Orchestration agent validates inputs (user provides context - no discovery phase)"
    - "Orchestration agent determines required phases (teach, test, cleanup)"
    - "Orchestration agent runs planning loops with specialized guidance planners and reviewers"
    - "Orchestration agent presents guidance plan for human approval gate"
    - "Output: Approved live plan folder path, phases created, ready for _orchestrate.yml"

  output:
    - "Live epic folder location (docs/epics/live/YYMMDDXX_description/)"
    - "Phases created (teach, test, cleanup as needed)"
    - "Plan status: approved and ready for execution"
