# ==============================================================================
# RemoteAgents User Stories - Session Management
# ==============================================================================

category: session
name: "Session Management"
description: "Creating, pairing, and managing remote terminal sessions"

stories:
  # --------------------------------------------------------------------------
  # US-SESSION-001: Create New Session
  # --------------------------------------------------------------------------
  - id: US-SESSION-001
    title: "Create New Remote Session"
    priority: CRITICAL
    persona: desktop_user

    description: |
      As a desktop developer, I want to create a new remote session
      so that I can share my terminal with a web client.

    preconditions:
      - Relay service is running on localhost:8080
      - Terminal CLI is installed

    journey:
      - step: 1
        action: "Run agent-remote-terminal --relay-url http://localhost:8080"
        expected: "CLI starts and initiates session creation"

      - step: 2
        action: "Observe CLI output"
        expected: |
          Session ID displayed (UUID format)
          6-character pairing code displayed prominently
          Instructions shown to share code with web client

      - step: 3
        action: "Verify session exists via API"
        command: "curl http://localhost:8080/api/sessions/{session_id}"
        expected: "Returns session state: DESKTOP_CONNECTED"

    acceptance_criteria:
      - Session created with unique session_id (UUID)
      - Pairing code is 6 alphanumeric characters
      - Session state is DESKTOP_CONNECTED after CLI connects
      - Pairing code displayed clearly to user

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-002: Pair Web Client
  # --------------------------------------------------------------------------
  - id: US-SESSION-002
    title: "Pair Web Client to Session"
    priority: CRITICAL
    persona: web_user

    description: |
      As a web client user, I want to enter a pairing code
      so that I can connect to a remote terminal session.

    preconditions:
      - Desktop user has created session (US-SESSION-001)
      - Web client has valid pairing code

    journey:
      - step: 1
        action: "Connect to /ws/client/{pairing_code}"
        expected: "WebSocket connection established"

      - step: 2
        action: "Send SessionPair message with client_public_key"
        expected: "Relay validates pairing code"

      - step: 3
        action: "Receive SessionPaired message"
        expected: |
          Contains session_id
          Contains desktop_public_key for E2E encryption

      - step: 4
        action: "Verify session state via API"
        expected: "Session state is PAIRED"

    acceptance_criteria:
      - Client connects via WebSocket with pairing code
      - SessionPair message processed successfully
      - Desktop receives notification of pairing
      - E2E encryption keys exchanged
      - Session state transitions to PAIRED

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-003: Session Expiry (Unused Pairing Code)
  # --------------------------------------------------------------------------
  - id: US-SESSION-003
    title: "Session Expiry After 5 Minutes"
    priority: HIGH
    persona: desktop_user

    description: |
      As a platform operator, I want sessions with unused pairing codes to expire
      so that stale sessions don't accumulate in memory.

    preconditions:
      - Relay service running with default cleanup interval

    journey:
      - step: 1
        action: "Create session via POST /api/sessions"
        expected: "Session created with pairing code"

      - step: 2
        action: "Wait 5+ minutes without pairing"
        expected: "Cleanup worker detects expired session"

      - step: 3
        action: "Attempt to pair with expired code"
        expected: "410 Gone error returned"

      - step: 4
        action: "Verify session removed via GET /api/sessions/{id}"
        expected: "404 Not Found"

    acceptance_criteria:
      - Unpaired sessions expire after 5 minutes
      - Expired codes return 410 Gone error
      - Session removed from repository
      - No resource leaks

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-004: Close Session (Desktop Initiated)
  # --------------------------------------------------------------------------
  - id: US-SESSION-004
    title: "Close Session from Desktop"
    priority: HIGH
    persona: desktop_user

    description: |
      As a desktop developer, I want to close my remote session
      so that I can end the connection cleanly.

    preconditions:
      - Session is in PAIRED state
      - Both desktop and client connected

    journey:
      - step: 1
        action: "Press Ctrl+C on desktop CLI"
        expected: "CLI initiates graceful shutdown"

      - step: 2
        action: "CLI sends SessionClose message"
        expected: "Relay notifies client of close"

      - step: 3
        action: "Observe client WebSocket"
        expected: "Client receives close notification"

      - step: 4
        action: "Verify session removed"
        expected: "GET /api/sessions/{id} returns 404"

    acceptance_criteria:
      - Ctrl+C triggers graceful shutdown
      - SessionClose sent to relay
      - Client notified of session close
      - Session cleaned up from repository
      - PTY process terminated

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-005: Close Session (Client Initiated)
  # --------------------------------------------------------------------------
  - id: US-SESSION-005
    title: "Close Session from Client"
    priority: HIGH
    persona: web_user

    description: |
      As a web client user, I want to disconnect from the session
      so that I can end my remote access.

    preconditions:
      - Session is in PAIRED state

    journey:
      - step: 1
        action: "Client closes WebSocket connection"
        expected: "Relay detects client disconnect"

      - step: 2
        action: "Relay notifies desktop"
        expected: "Desktop CLI receives close notification"

      - step: 3
        action: "Verify desktop CLI status"
        expected: "CLI shows client disconnected message"

      - step: 4
        action: "Verify session cleanup"
        expected: "Session transitions to CLOSED state"

    acceptance_criteria:
      - Client disconnect detected by relay
      - Desktop notified of disconnect
      - Session state transitions correctly
      - Resources cleaned up

    test_layers:
      local: true
      docker: true
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-006: Unique Session IDs
  # --------------------------------------------------------------------------
  - id: US-SESSION-006
    title: "Concurrent Sessions Have Unique IDs"
    priority: MEDIUM
    persona: platform_operator

    description: |
      As a platform operator, I want each session to have a unique ID
      so that sessions are isolated and don't interfere.

    preconditions:
      - Relay service running

    journey:
      - step: 1
        action: "Create 10 sessions concurrently"
        expected: "All sessions created successfully"

      - step: 2
        action: "Collect all session IDs"
        expected: "10 unique UUIDs returned"

      - step: 3
        action: "Verify no duplicate IDs"
        expected: "All IDs are unique"

      - step: 4
        action: "Verify no duplicate pairing codes"
        expected: "All pairing codes are unique"

    acceptance_criteria:
      - Each session has unique UUID
      - Each pairing code is unique
      - No ID collisions under concurrent creation
      - Sessions are isolated

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-007: Session State Machine
  # --------------------------------------------------------------------------
  - id: US-SESSION-007
    title: "Session State Transitions"
    priority: MEDIUM
    persona: platform_operator

    description: |
      As a platform operator, I want sessions to follow a defined state machine
      so that state transitions are predictable and auditable.

    preconditions:
      - Relay service running

    journey:
      - step: 1
        action: "Create session via POST /api/sessions"
        expected: "State = CREATED"

      - step: 2
        action: "Desktop connects via /ws/desktop/{session_id}"
        expected: "State = DESKTOP_CONNECTED"

      - step: 3
        action: "Client pairs via /ws/client/{pairing_code}"
        expected: "State = PAIRED"

      - step: 4
        action: "Either party disconnects"
        expected: "State = CLOSED"

    acceptance_criteria:
      - CREATED → DESKTOP_CONNECTED on desktop connect
      - DESKTOP_CONNECTED → PAIRED on client pair
      - PAIRED → CLOSED on disconnect
      - Invalid transitions rejected

    test_layers:
      local: true
      docker: false
      integration: true

  # --------------------------------------------------------------------------
  # US-SESSION-008: Multiple Desktop Sessions
  # --------------------------------------------------------------------------
  - id: US-SESSION-008
    title: "Single Desktop Supports Multiple Sessions"
    priority: LOW
    persona: desktop_user

    description: |
      As a desktop developer, I want to create multiple remote sessions
      so that different clients can connect to different terminals.

    preconditions:
      - Relay service running

    journey:
      - step: 1
        action: "Start first terminal CLI instance"
        expected: "First session created with unique code"

      - step: 2
        action: "Start second terminal CLI instance"
        expected: "Second session created with different code"

      - step: 3
        action: "Pair different clients to each session"
        expected: "Both sessions pair independently"

      - step: 4
        action: "Verify I/O isolation"
        expected: "Input/output doesn't cross between sessions"

    acceptance_criteria:
      - Multiple CLI instances can run simultaneously
      - Each instance has independent session
      - I/O streams are isolated
      - Sessions don't interfere

    test_layers:
      local: true
      docker: false
      integration: true
