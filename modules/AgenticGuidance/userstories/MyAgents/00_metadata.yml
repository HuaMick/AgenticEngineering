metadata:
  version: "1.5"
  last_updated: "2025-12-01"
  purpose: "Centralized user stories for agent-blind-test UAT validation"

  consolidation_notes: |
    v1.2 (2025-11-30) Consolidation Changes:
    - Consolidated US-SETUP-001 and US-SETUP-002 (duplicate scenarios)
    - Consolidated US-CLI-CONTEXT-001/002/003 into comprehensive scenario
    - Added US-INFRA-001: Cloud Build Environment Parity Testing
    - Added 'infrastructure' category for CI/CD environment testing
    - Net change: 38 → 35 user stories (3 removed, 1 added)
    - 100% duplication eliminated, all unique test coverage preserved

    v1.3 (2025-12-01) "Work from Anywhere" Updates:
    - Updated all Studio user stories (US-STUDIO-001 through US-STUDIO-006) to test both scenarios:
      * From within project directory (home directory config used - no local discovery)
      * From outside project directory (home directory config via ~/.config/mymodules/AgenticGuidance/agents/langgraph.json)
    - Updated US-CHAT-002 to test "work from anywhere" behavior
    - All project-scoped commands now explicitly test home directory single source of truth
    - Ensures UAT validates documented "work from anywhere" behavior after 'myagents setup'
    - Prevents UAT bypass where commands fail outside project directories despite documentation claims

    v1.4 (2025-12-01) "Home Directory Single Source of Truth + 3-Layer Testing":
    - Architecture change: ~/.config/mymodules/AgenticGuidance/agents/langgraph.json is SINGLE source of truth (NO FALLBACK)
    - Local project langgraph.json files are COMPLETELY IGNORED (no discovery, no fallback)
    - All paths in home config use absolute paths (works from any directory)
    - Updated testing approach to THREE LAYERS: Local, Docker, Cloud Build
    - User stories updated to reflect home directory only architecture
    - Cloud Build testing added to relevant user stories (infrastructure, setup, config)
    - Removed all references to "fallback" - home directory is the ONLY source (no fallback mechanism)

    v1.5 (2025-12-01) "Installation Validation":
    - Added pre-test installation validation to US-STUDIO-001 and US-STUDIO-002
    - Validation checks error message format to detect stale installations
    - Old error format: "Run from project directory" indicates wrong version installed
    - New error format: "No langgraph.json found in ~/.config/mymodules/AgenticGuidance/agents/" validates correct installation
    - Updated US-INSTALL-002 to validate error message format matches new code
    - Ensures tests validate installation success by checking behavior (error messages), not just assume it
    - Catches cases where installation failed or wrong version is installed

  # IMPORTANT: Private Package Registry
  # agent-gcptoolkit is hosted on GCP Artifact Registry (private).
  # This is by design - the project is not intended for public distribution.
  # Docker testing works because Agent-GCPtoolkit is copied into the container.
  # Local developer testing requires the sibling Agent-GCPtoolkit directory.
  private_registry_note: |
    agent-gcptoolkit is hosted on GCP Artifact Registry (private).
    For local development: Requires sibling ../Agent-GCPtoolkit directory
    For Docker testing: Agent-GCPtoolkit is copied into container via Dockerfile.test
    This is expected behavior - public PyPI distribution is NOT a goal.

  testing_approach: |
    Each user story is tested by a single user simulator agent.
    The agent validates across THREE TESTING LAYERS to ensure comprehensive coverage:

    1. LOCAL ENVIRONMENT TESTING
       - Direct execution on host machine (installed CLI)
       - Purpose: Validate developer workflow and rapid iteration
       - What it catches: Python logic errors, API contract issues, local configuration
       - Limitations: May miss Docker-specific issues, environment dependencies

    2. LOCAL DOCKER TESTING
       - Docker build + container execution on local machine
       - Purpose: Validate Dockerfile correctness and containerized behavior
       - Uses shared pre-built image (Dockerfile.test) to avoid slow container booting
       - What it catches: Dockerfile issues, container runtime problems, dependency packaging
       - Parity: Matches Cloud Build exactly (runtime/ and config/ created by Dockerfile)
       - Limitations: Doesn't test Cloud Build workspace restructuring

    3. CLOUD BUILD TESTING (CI/CD ENVIRONMENT)
       - Full Cloud Build execution in GCP (when specified in user story)
       - Purpose: Validate production deployment pipeline
       - Unique behavior: Workspace restructuring (Step 0.5) moves source to MyAgents/ subdirectory
       - What it catches: Cloud Build-specific issues, workspace structure problems, CI/CD integration
       - Cannot be fully simulated locally due to unique workspace restructuring
       - Required for: Infrastructure stories (US-INFRA-*), setup stories (US-SETUP-*), config stories (US-CONFIG-*)

    Each user story specifies which layers to test via testing section:
    - local: true/false
    - docker: true/false
    - cloud_build: true/false (optional, defaults to false)

    NOTE: Local testing requires the developer to have the sibling Agent-GCPtoolkit
    directory present. This is documented in the README and is expected for developers
    working in the monorepo structure.

execution_guidance: |
  When spawning user simulator agents for UAT testing:

  ## CRITICAL: FUNCTIONAL TESTING REQUIRED

  Test agents MUST execute the ACTUAL COMMANDS specified in journey steps.
  Do NOT substitute functional tests with --help validation.

  PROHIBITED BEHAVIOR:
  - Running only `myagents <command> --help` instead of actual commands
  - Reporting "PASS" based on help text validation alone
  - Adding "infrastructure/help validation only" caveats to test prompts
  - Summarizing or simplifying functional requirements from user stories

  REQUIRED BEHAVIOR:
  - Execute each journey step EXACTLY as written
  - If step says "Run `myagents studio start`", you MUST run that command
  - Verify ACTUAL outcomes, not just that help text exists
  - Test from the EXACT directories specified in the user story
  - Capture actual command outputs as evidence

  VALIDATION CHECKLIST (must answer YES to all before reporting PASS):
  - [ ] Did I execute each journey step as written (not just --help)?
  - [ ] Did I run actual commands that produce real outcomes?
  - [ ] Did I verify the expected outcomes occurred?
  - [ ] Did I test from the directories specified in the user story?
  - [ ] Did I capture actual command outputs as evidence?
  - [ ] Did I test in BOTH local AND Docker environments?

  If ANY answer is NO, the test is INCOMPLETE, not PASS.

  ## Orchestration Agent Instructions

  1. **Orchestration Agent Reads User Stories**: Read all *.yml files in docs/userstories/<project>/ to get user story definitions.
     Extract the relevant user story and pass the FULL definition to the agent in the prompt.

  2. **One Agent Per User Story**: Each user story gets exactly one user simulator agent.

  3. **MANDATORY Pre-Flight Validation (BLOCKING)**:
     BEFORE spawning ANY test agents, the orchestration agent MUST validate the environment.
     This is a BLOCKING requirement - if validation fails, HALT and DO NOT proceed.

     Execute preflight_validation.yml process:
     - Extract expected version from pyproject.toml
     - Verify local CLI: `myagents --version` == expected version
     - Verify Docker image: `docker run --rm myagents-test myagents --version` == expected version

     If version mismatch detected:
     - HALT immediately
     - Report: "ENVIRONMENT ERROR: Version mismatch detected"
     - Report: "Expected: {version from pyproject.toml}"
     - Report: "Local CLI: {actual version}"
     - Report: "Docker: {actual version}"
     - Report: "Action Required: Run scripts/install-global.sh to update CLI"
     - DO NOT PROCEED WITH TESTING

     This prevents testing outdated installations (lesson learned from UAT failure 2025-12-10).

  4. **Environment Preparation (Pre-requisite)**:
     - The orchestration agent MUST ensure the environment is prepared BEFORE spawning user simulator agents.
     - **Local**: Run `scripts/install-global.sh` ONCE to update the system-installed CLI.
     - **Docker**: Build the shared `myagents-test` image ONCE.
     - **VERIFY**: After preparation, run step 3 validation to confirm versions match.
     - This prevents race conditions from parallel agents trying to install simultaneously.
     - Agents should assume the environment is ready and use the installed `myagents` command.

  5. **Three-Layer Testing**: Each agent tests specified layers from the user story:
     - **Local execution** (if local: true): Validates developer workflow with installed binary
     - **Docker execution** (if docker: true): Validates CI/CD parity, Dockerfile correctness
     - **Cloud Build execution** (if cloud_build: true): Validates production pipeline, workspace restructuring
     - Most user stories test local + docker (comprehensive coverage)
     - Infrastructure/setup/config stories also test cloud_build (production validation)
  
  6. **Shared Docker Image**: Pre-build Docker image before spawning agents:
     - Build once: `docker build -f Dockerfile.test --build-arg WORKTREE_NAME=<worktree> -t myagents-test .`
     - All agents reuse same image: `docker run --rm myagents-test <command>`
     - Image includes all dependencies pre-installed

  7. **Test Process**: Use `src/mymodules/AgenticGuidance/agents/frontend/agents/test/processes/user_simulator.yml`

  8. **Agent Inputs** (what to provide in the prompt):
     - docs/README.md
     - docs/architecture/architecture.md
     - User story definition (extracted from this file by orchestration agent)

     The agent does NOT read userstories.yml directly - this keeps it "blind".

  9. **User Story Definition Format** (what to include in prompt):
     - id: The user story ID (e.g., US-CLI-001)
     - persona: Who the agent is simulating
     - starting_state: Initial environment conditions
     - journey: Step-by-step actions with expected outcomes
     - success_criteria: What must pass

  10. **Failure Reporting**: Agent updates live plan with structured failures:
     - user_story_id: US-XXX-XXX
     - step: Which step failed
     - failure_type: "documentation_gap", "unexpected_error", "unclear_instructions"
     - description: What went wrong
     - user_impact: How this affects the user persona
     - recommendation: What should be fixed
     - tested_environments: ["local", "docker", "cloud_build"] (list all tested layers)

  11. **Success Criteria**: All success criteria for the user story must pass in ALL specified environments
     - If local: true, must pass locally
     - If docker: true, must pass in Docker container
     - If cloud_build: true, must pass in Cloud Build environment

docker_setup: |
  # Pre-build shared Docker image (do this once before spawning agents)
  cd /home/code/myagents
  WORKTREE_NAME=MyAgents-staging docker build \
    -f MyAgents-staging/Dockerfile.test \
    --build-arg WORKTREE_NAME=MyAgents-staging \
    -t myagents-test .
  
  # Agents then use this shared image:
  docker run --rm \
    -v $(pwd):/workspace/myagents-test \
    -v ${GCP_SA_KEY_PATH}:/root/service-account.json:ro \
    -e GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json \
    myagents-test <command>

