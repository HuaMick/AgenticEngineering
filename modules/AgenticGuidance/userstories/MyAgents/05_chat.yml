user_stories:
  # ============================================================================
  # Chat Commands User Stories
  # ============================================================================
  
  - id: US-CHAT-002
    name: "Selecting Specific Agent for Chat (Works from Anywhere)"
    category: "chat"
    persona: "User who wants to chat with a specific agent from any directory"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        setup_completed: true
        config_exists: true
        config_valid: true
        home_directory: "/home/test-user"
      files_present:
        - "~/.config/mymodules/AgenticGuidance/agents/langgraph.json"
      knowledge:
        - "Knows about agent selection option"
        - "Wants to use echo agent"
      test_scenarios:
        scenario_1:
          name: "From project directory"
          current_directory: "/home/test-user/my-agent-project"
          files_present:
            - "langgraph.json (local project)"
        scenario_2:
          name: "From outside project directory"
          current_directory: "/tmp"
          files_present: []
    
    journey:
      # Test Scenario 1: From within project directory
      - step: 1
        action: "cd /home/test-user/my-agent-project && Run `myagents chat --help` to discover agent selection"
        expected: "See --agent option documented"
        failure_indicators:
          - "--agent option not shown"
          - "Unclear how to select agent"
      
      - step: 2
        action: "Run `myagents chat --agent echo` from project directory"
        expected: "Chat starts with echo agent using local langgraph.json"
        failure_indicators:
          - "Command fails"
          - "Wrong agent selected"
          - "Agent not found error"
      
      # Test Scenario 2: From outside project directory (home directory config)
      - step: 3
        action: "cd /tmp && Run `myagents chat --agent echo`"
        expected: "Chat starts with echo agent using ~/.config/mymodules/AgenticGuidance/agents/langgraph.json (home directory single source of truth)"
        failure_indicators:
          - "Command fails"
          - "Error: No langgraph.json found in ~/.config/mymodules/AgenticGuidance/agents/"
          - "Doesn't use home directory config"
          - "Wrong agent selected"
          - "Agent not found error"
      
      - step: 4
        action: "Verify echo agent behavior"
        expected: "Agent echoes messages correctly"
        failure_indicators:
          - "Agent doesn't echo"
          - "Wrong agent behavior"
    
    success_criteria:
      - "--agent option works correctly from project directory"
      - "--agent option works correctly from outside project directory (uses home directory config)"
      - "Specified agent is used in both scenarios"
      - "Agent behavior matches selection"
      - "Home directory config works for chat commands (single source of truth)"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/usage.md"
      - "README.md (Work from Anywhere section)"

