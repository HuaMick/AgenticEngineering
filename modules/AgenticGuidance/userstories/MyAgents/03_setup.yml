user_stories:
  # ============================================================================
  # Setup User Stories
  # ============================================================================
  
  - id: US-SETUP-001
    name: "Fresh User First-Time Setup (Documentation-Driven)"
    category: "setup"
    persona: "New user who just installed myagents CLI, following documentation exactly"
    priority: "critical"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: false
        home_directory: "/home/test-user"
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json (in current directory)"
      files_missing:
        - "~/.config/agent-gcptoolkit/config.yml"
        - ".env"
      user_has:
        - "GCP service account JSON at /home/test-user/gcp-keys/myagents-sa.json"
        - "GCP project ID: test-project-12345"
        - "GEMINI_API_KEY in GCP Secret Manager"
        - "LANGSMITH_API_KEY in GCP Secret Manager"
    
    journey:
      - step: 1
        action: "Read SETUP.md or README.md to understand setup process"
        expected: "Clear setup instructions found"
        failure_indicators:
          - "No setup documentation"
          - "Unclear setup steps"
      
      - step: 2
        action: "Run `myagents chat` (first attempt)"
        expected: "Config missing error with helpful setup guidance"
        failure_indicators:
          - "Silent failure"
          - "Unclear error message"
          - "No setup guidance provided"
      
      - step: 3
        action: "Respond Y to setup prompt (if interactive)"
        expected: "Interactive setup starts"
        failure_indicators:
          - "No interactive prompt"
          - "Must run separate command"
      
      - step: 4
        action: "Provide service account path and project ID"
        expected: "Config file created successfully"
        failure_indicators:
          - "Config creation fails"
          - "No success confirmation"
      
      - step: 5
        action: "See chat session start"
        expected: "Chat starts immediately after setup"
        failure_indicators:
          - "Must re-run command"
          - "Chat doesn't start"
      
      - step: 6
        action: "Type a test message and exit"
        expected: "Can send/receive messages, exit cleanly"
        failure_indicators:
          - "Chat doesn't work"
          - "Cannot exit cleanly"
    
    success_criteria:
      - "Agent reads SETUP.md before starting setup"
      - "Agent follows documented steps exactly as written"
      - "Agent completes setup without asking for help"
      - "Agent never manually creates config file"
      - "Agent never manually creates .env file"
      - "Agent uses only documented commands (no manual config editing)"
      - "Config file created at ~/.config/agent-gcptoolkit/config.yml"
      - ".env file auto-generated in project directory"
      - "Chat session starts successfully"
      - "Agent never deviates from documentation"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
      docker_command: |
        docker run --rm \
        -v $(pwd):/workspace/myagents-test \
        -v ${GCP_SA_KEY_PATH}:/root/service-account.json:ro \
        -e GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json \
        myagents-test /bin/bash -c "cd /workspace/myagents-test && myagents chat"
    
    documentation_references:
      - "SETUP.md"
      - "README.md"

  - id: US-SETUP-002
    name: "User Encountering Errors and Recovering"
    category: "setup"
    persona: "User setting up myagents but encountering errors"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: false
        home_directory: "/home/test-user"
        current_directory: "/home/test-user/work"
      files_missing:
        - "~/.config/agent-gcptoolkit/config.yml"
        - ".env"
      simulated_errors:
        - "Wrong service account path (first attempt)"
        - "Invalid project ID format (second attempt)"
        - "Missing secret in GCP (third attempt - requires fix)"
      user_has:
        - "GCP service account JSON at /home/test-user/keys/sa.json"
        - "GCP project ID: valid-project-123"
    
    journey:
      - step: 1
        action: "Run `myagents chat` and see config missing prompt"
        expected: "Clear error message with guidance"
        failure_indicators:
          - "Unclear error message"
          - "No recovery guidance"
      
      - step: 2
        action: "Provide WRONG path, observe error, retry with correct path"
        expected: "Error message helps identify issue, retry succeeds"
        failure_indicators:
          - "Error doesn't help diagnose"
          - "Cannot recover from error"
      
      - step: 3
        action: "Provide INVALID project ID, observe validation error, retry"
        expected: "Validation error is clear, retry succeeds"
        failure_indicators:
          - "Validation error unclear"
          - "Cannot fix and retry"
      
      - step: 4
        action: "Encounter secret not found error, read troubleshooting docs"
        expected: "Troubleshooting section helps resolve issue"
        failure_indicators:
          - "No troubleshooting documentation"
          - "Troubleshooting doesn't help"
    
    success_criteria:
      - "Agent recovers from errors without human help"
      - "Agent reads error messages for guidance"
      - "Agent uses SETUP.md troubleshooting section"
      - "Agent retries with corrected inputs"
      - "Agent successfully completes setup after errors"
      - "Agent reaches working chat session"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "SETUP.md (troubleshooting section)"
  
  - id: US-SETUP-003
    name: "User with Partial Setup"
    category: "setup"
    persona: "User who previously started setup but didn't finish"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        config_incomplete: true  # Missing service account path
        home_directory: "/home/test-user"
        current_directory: "/home/test-user/agent-project"
      files_present:
        - "~/.config/agent-gcptoolkit/config.yml (INCOMPLETE)"
        - "langgraph.json"
      files_missing:
        - ".env"
      config_contents: |
        gcptoolkit:
          project_id: my-project
          # service_account_file is missing
    
    journey:
      - step: 1
        action: "Run `myagents chat`"
        expected: "Config validation error (incomplete config)"
        failure_indicators:
          - "Silent failure"
          - "Unclear error"
      
      - step: 2
        action: "Run `myagents config verify` to diagnose"
        expected: "Specific error about missing service_account_file"
        failure_indicators:
          - "Diagnostic command unavailable"
          - "Error doesn't identify missing field"
      
      - step: 3
        action: "Fix incomplete config"
        expected: "Config fixed, verified successfully"
        failure_indicators:
          - "Cannot fix config"
          - "Fix doesn't work"
      
      - step: 4
        action: "Start chat successfully"
        expected: "Chat starts after config fix"
        failure_indicators:
          - "Chat still doesn't work"
    
    success_criteria:
      - "Agent identifies incomplete config issue"
      - "Agent uses diagnostic commands (config verify)"
      - "Agent fixes incomplete config"
      - "Agent verifies fix worked"
      - "Chat starts successfully"
      - "Agent follows documented recovery process"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "SETUP.md"
      - "docs/guides/configuration.md"

  - id: US-SETUP-004
    name: "Setup Output Validation (langgraph.json references valid files)"
    category: "setup"
    persona: "New user who just ran myagents setup"
    priority: "critical"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: false
        home_directory: "/home/test-user"
        current_directory: "/tmp/any-directory"
      files_missing:
        - "~/.config/mymodules/AgenticGuidance/agents/langgraph.json"
        - "~/.config/mymodules/AgenticGuidance/agents/config.yml"
    
    journey:
      - step: 1
        action: "Run `myagents setup`"
        expected: "Setup completes with success message"
        failure_indicators:
          - "Setup fails with error"
          - "Silent failure (no output)"
      
      - step: 2
        action: "Verify langgraph.json exists: test -f ~/.config/mymodules/AgenticGuidance/agents/langgraph.json"
        expected: "File exists"
        failure_indicators:
          - "File not created despite success message"
      
      - step: 3
        action: "Verify langgraph.json is valid json"
        expected: "python3 -c \"import json; json.load(open('$HOME/.config/mymodules/AgenticGuidance/agents/langgraph.json'))\" succeeds"
        failure_indicators:
          - "Invalid json (parse error)"
          - "Empty file"
      
      - step: 4
        action: "Verify graph paths in langgraph.json reference existing files"
        expected: "All files referenced in graphs section exist in installed package"
        failure_indicators:
          - "Referenced file doesn't exist (e.g., builder_agent.py when package has coding_agent.py)"
          - "Path points to source code, not installed package"
      
      - step: 5
        action: "Run `myagents chat --help` after setup"
        expected: "Help displayed without errors"
        failure_indicators:
          - "No langgraph.json found error"
          - "Module import error"
          - "File not found error"
    
    success_criteria:
      - "Setup command exits with code 0"
      - "langgraph.json file exists at ~/.config/mymodules/AgenticGuidance/agents/"
      - "langgraph.json is valid json with graphs section"
      - "All graph paths reference files that exist in the installed package"
      - "Subsequent commands work after setup"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "SETUP.md"

