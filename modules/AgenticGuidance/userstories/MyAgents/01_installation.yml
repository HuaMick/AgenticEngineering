user_stories:
  # ============================================================================
  # INSTALLATION User Stories
  # ============================================================================
  
  - id: US-INSTALL-001
    name: "Developer Installation from Monorepo using uv"
    category: "installation"
    persona: "Developer with access to the monorepo installing myagents"
    priority: "critical"

    # NOTE: This project uses GCP Artifact Registry for agent-gcptoolkit (private).
    # Installation requires access to the monorepo with sibling Agent-GCPtoolkit directory.
    # This is by design - public PyPI distribution is NOT a goal.

    starting_state:
      environment:
        myagents_installed: false
        python_available: true
        uv_available: true
        current_directory: "/home/code/mymodules/AgenticGuidance/agents/MyAgents-staging"
        monorepo_access: true  # Has access to monorepo with Agent-GCPtoolkit sibling
      files_present:
        - "../Agent-GCPtoolkit (sibling directory)"
        - "pyproject.toml"
        - "uv.lock"
      knowledge:
        - "Has Python 3.11+ installed"
        - "Has uv available (required)"
        - "Has access to monorepo with Agent-GCPtoolkit sibling"
        - "Understands uv workspace with local dependencies"

    journey:
      - step: 1
        action: "Read README.md to find installation instructions"
        expected: "Clear developer installation section found with uv sync"
        failure_indicators:
          - "No setup instructions"
          - "Unclear instructions"
          - "pip mentioned as primary method"

      - step: 2
        action: "Run uv sync in the worktree directory"
        expected: "Installation completes successfully, .venv created"
        failure_indicators:
          - "uv sync fails"
          - "Dependencies not resolved"
          - "Missing Agent-GCPtoolkit sibling directory"

      - step: 3
        action: "Verify myagents is available: .venv/bin/myagents --version"
        expected: "Version displayed from worktree venv"
        failure_indicators:
          - "myagents not found in .venv"
          - "Command not found"

      - step: 4
        action: "Run .venv/bin/myagents --version from any directory"
        expected: "Version displayed, no errors"
        failure_indicators:
          - "Module not found error"
          - "langgraph.json required error"
          - "Any import error"

      - step: 5
        action: "Run .venv/bin/myagents --help from any directory"
        expected: "Help displayed, no errors"
        failure_indicators:
          - "Requires langgraph.json"
          - "Any error instead of help"

      - step: 6
        action: "Run .venv/bin/myagents (no args) from /tmp"
        expected: "Help displayed (not error)"
        failure_indicators:
          - "Error message instead of help"
          - "Requires langgraph.json"

    success_criteria:
      - "uv sync succeeds with sibling Agent-GCPtoolkit directory"
      - "myagents command available in .venv after install"
      - "Version, help, and no-args all work from any directory"
      - "Documentation uses uv as the standard method"

    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
      docker_note: |
        Docker testing works because Agent-GCPtoolkit is COPY'd into the container.
        See Dockerfile.test line 37: COPY Agent-GCPtoolkit/ /workspace/Agent-GCPtoolkit/
      docker_command: |
        docker run --rm myagents-test /bin/bash -c "
          cd /workspace/MyAgents-staging &&
          .venv/bin/myagents --version &&
          .venv/bin/myagents --help &&
          cd /tmp && /workspace/MyAgents-staging/.venv/bin/myagents
        "

    documentation_references:
      - "README.md (Developer Installation section)"
  
  - id: US-INSTALL-002
    name: "CLI from Non-Project Directory After Install"
    category: "installation"
    persona: "User who just installed myagents and wants to use it"
    priority: "critical"
    
    starting_state:
      environment:
        myagents_installed: true
        current_directory: "/tmp/random_empty_dir"
      files_present: []
      files_missing:
        - "langgraph.json (anywhere in path)"
        - "~/.config/mymodules/AgenticGuidance/agents/langgraph.json"
    
    journey:
      - step: 1
        action: "mkdir -p /tmp/random_empty_dir && cd /tmp/random_empty_dir"
        expected: "In empty directory with no project context"
      
      - step: 2
        action: "Run myagents --version"
        expected: "Version displayed (global command works)"
        failure_indicators:
          - "Requires langgraph.json"
          - "Module import error"
          - "Any error"
      
      - step: 3
        action: "Run myagents --help"
        expected: "Help displayed (global command works)"
        failure_indicators:
          - "Requires langgraph.json"
          - "Error instead of help"
      
      - step: 4
        action: "Run myagents chat (project command without project)"
        expected: "Clear error: 'No langgraph.json found in ~/.config/mymodules/AgenticGuidance/agents/. Run 'myagents setup' to configure.'"
        failure_indicators:
          - "Silent failure"
          - "Old error message format: 'Run from project directory' (indicates stale installation)"
          - "Error message doesn't mention ~/.config/mymodules/AgenticGuidance/agents/"
          - "Unclear error message"
          - "Module import error"
          - "Shebang/path error"
      
      - step: 5
        action: "Verify error message format matches new code"
        expected: "Error message format validates installation: mentions ~/.config/mymodules/AgenticGuidance/agents/ and 'myagents setup'"
        failure_indicators:
          - "Old error format detected (installation validation failed)"
          - "Error doesn't mention ~/.config/mymodules/AgenticGuidance/agents/"
          - "Error doesn't mention setup command"
    
    success_criteria:
      - "Global commands work without project context"
      - "Project commands give clear, actionable error"
      - "No import errors or shebang issues"
      - "User knows what to do next"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "README.md"
      - "docs/guides/usage.md"
  
  - id: US-INSTALL-003
    name: "Developer Workflow Isolation"
    category: "installation"
    persona: "Developer working on myagents in a worktree"
    priority: "high"

    # NOTE: This requires the monorepo structure with sibling Agent-GCPtoolkit directory.
    # uv sync will resolve the local path dependency from ../Agent-GCPtoolkit.

    starting_state:
      environment:
        repo_cloned: true
        current_directory: "/home/code/mymodules/AgenticGuidance/agents/MyAgents-staging"
        uv_available: true
        monorepo_access: true
      files_present:
        - "pyproject.toml"
        - "langgraph.json"
        - "../Agent-GCPtoolkit (sibling directory)"
      knowledge:
        - "Developer knows about uv and worktrees"
        - "Developer wants isolated dev environment"
        - "Developer has the monorepo with Agent-GCPtoolkit sibling"

    journey:
      - step: 1
        action: "Verify monorepo structure: ls ../Agent-GCPtoolkit"
        expected: "Agent-GCPtoolkit sibling directory exists"
        failure_indicators:
          - "Directory not found"
          - "Missing sibling project"

      - step: 2
        action: "Run uv sync (developer install)"
        expected: "Virtual environment created in worktree"
        failure_indicators:
          - "uv sync fails"
          - "Dependencies not resolved"

      - step: 3
        action: "Verify .venv is in worktree: ls -la .venv"
        expected: ".venv directory exists in worktree"
        failure_indicators:
          - ".venv not created"
          - ".venv in wrong location"

      - step: 4
        action: "Verify myagents works: .venv/bin/myagents --version"
        expected: "Version displayed from worktree .venv"
        failure_indicators:
          - "myagents not found"
          - "Version not displayed"

      - step: 5
        action: "Verify myagents works from any directory: cd /tmp && /path/to/.venv/bin/myagents --help"
        expected: "Help displayed, no errors"
        failure_indicators:
          - "Requires langgraph.json"
          - "Error instead of help"

      - step: 6
        action: "Verify worktree install doesn't affect system: which myagents (outside venv)"
        expected: "System myagents is separate (or not installed)"
        failure_indicators:
          - "Worktree venv affected system installation"

    success_criteria:
      - "Developer install is isolated to worktree"
      - "Worktree .venv used for development"
      - "System installation not affected by dev work"
      - "uv sync works with sibling Agent-GCPtoolkit directory"

    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
      docker_note: |
        In Docker, Agent-GCPtoolkit is COPY'd as sibling directory.
        uv sync already completed during image build.

    documentation_references:
      - "README.md (Developer Installation section)"

