user_stories:
  # ============================================================================
  # Config Commands User Stories
  # ============================================================================
  
  - id: US-CONFIG-001
    name: "Initializing Config"
    category: "config"
    persona: "User initializing configuration interactively"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: false
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
      files_missing:
        - "~/.config/agent-gcptoolkit/config.yml"
      user_has:
        - "GCP service account JSON"
        - "GCP project ID"
    
    journey:
      - step: 1
        action: "Run `myagents config init`"
        expected: "Interactive config initialization starts"
        failure_indicators:
          - "Command fails"
          - "No interactive prompt"
          - "Unclear instructions"
      
      - step: 2
        action: "Provide service account path and project ID"
        expected: "Config file created successfully"
        failure_indicators:
          - "Config creation fails"
          - "Config incomplete"
      
      - step: 3
        action: "Verify config created"
        expected: "Config file exists and valid"
        failure_indicators:
          - "Config file missing"
          - "Config invalid"
    
    success_criteria:
      - "Config init works"
      - "Config file created correctly"
      - "Clear interactive prompts"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "SETUP.md"
      - "docs/guides/configuration.md"
  
  - id: US-CONFIG-002
    name: "Setting Config Path"
    category: "config"
    persona: "User specifying custom config file location"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
        - "/custom/path/config.yml"
    
    journey:
      - step: 1
        action: "Run `myagents config set-path /custom/path/config.yml`"
        expected: "Config path set successfully"
        failure_indicators:
          - "Command fails"
          - "Path not saved"
          - "Invalid path error"
      
      - step: 2
        action: "Verify config path used"
        expected: "CLI uses custom config path"
        failure_indicators:
          - "Default path still used"
          - "Path not respected"
    
    success_criteria:
      - "Set-path command works"
      - "Custom path used"
      - "Path persisted"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/configuration.md"
  
  - id: US-CONFIG-003
    name: "Showing Config"
    category: "config"
    persona: "User viewing current configuration"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
        - "~/.config/agent-gcptoolkit/config.yml"
    
    journey:
      - step: 1
        action: "Run `myagents config show`"
        expected: "Current config displayed"
        failure_indicators:
          - "Command fails"
          - "Config not displayed"
          - "Unclear output format"
      
      - step: 2
        action: "Verify config values shown"
        expected: "All config values visible"
        failure_indicators:
          - "Values missing"
          - "Sensitive data exposed"
          - "Wrong format"
    
    success_criteria:
      - "Config show works"
      - "All values displayed"
      - "Sensitive data masked appropriately"
      - "Clear, readable format"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/configuration.md"
  
  - id: US-CONFIG-004
    name: "Clearing Config"
    category: "config"
    persona: "User resetting configuration"
    priority: "medium"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: true
        current_directory: "/home/test-user/my-agent-project"
      files_present:
        - "langgraph.json"
        - "~/.config/agent-gcptoolkit/config.yml"
    
    journey:
      - step: 1
        action: "Run `myagents config clear`"
        expected: "Config cleared with confirmation"
        failure_indicators:
          - "Command fails"
          - "No confirmation prompt"
          - "Config not cleared"
      
      - step: 2
        action: "Verify config cleared"
        expected: "Config file removed or reset"
        failure_indicators:
          - "Config still exists"
          - "Config not reset"
    
    success_criteria:
      - "Config clear works"
      - "Confirmation prompt shown"
      - "Config actually cleared"
      - "Clear success message"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"
    
    documentation_references:
      - "docs/guides/configuration.md"

