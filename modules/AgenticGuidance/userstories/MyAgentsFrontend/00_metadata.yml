  - pairing: "User pairing and connection initiation"
  - terminal: "Terminal display and interaction"
  - navigation: "Routing, deep links, browser history"
  - build: "Build, test, and code quality"
  - connection_reliability: "Connection state management and auto-reconnect"
  - future_features: "Planned but not yet implemented features"
