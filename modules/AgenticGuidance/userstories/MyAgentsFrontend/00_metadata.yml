testing_approach:
  web: "All user stories should be testable in web browser"
  widget_test: "Component-level tests with mock dependencies"
  integration_test: "End-to-end tests requiring relay server or mock"

  periodic_review: |
    User stories should be reviewed periodically to ensure they reflect
    implementation reality. When implementing features:
    1. Update user story status from "future" to "implemented"
    2. Add implementation_references pointing to source files
    3. Verify success_criteria match actual implementation behavior
    4. Create user stories for features implemented without documentation

categories:
