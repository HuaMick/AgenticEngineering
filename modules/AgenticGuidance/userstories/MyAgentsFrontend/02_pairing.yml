# Pairing User Stories
# Status: 2 implemented, 1 partial

user_stories:
  # ============================================
  # US-PAIR-001: Enter Pairing Code
  # ============================================
  - id: US-PAIR-001
    name: "Enter Pairing Code"
    category: "pairing"
    persona: "User connecting to a remote session"
    priority: "critical"
    status: implemented

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: false

    journey:
      - step: 1
        action: "Open application"
        expected: "Pairing screen displays with code input field"
        failure_indicators:
          - "Application crashes"
          - "Different screen appears"
          - "No input field visible"

      - step: 2
        action: "Enter 6-character alphanumeric pairing code"
        expected: "Code auto-uppercases, displays in monospace font with letter spacing"
        failure_indicators:
          - "Lowercase characters accepted"
          - "Non-alphanumeric characters accepted"
          - "More than 6 characters accepted"
          - "Input not visible"

      - step: 3
        action: "Observe input validation"
        expected: "Connect button becomes enabled when code is valid (6 chars)"
        failure_indicators:
          - "Button enabled with invalid code"
          - "Button disabled with valid code"

    success_criteria:
      - "Input field visible and focused on load"
      - "6-character maximum enforced"
      - "Input auto-uppercases (TextCapitalization.characters)"
      - "Only alphanumeric characters accepted (A-Z, 0-9)"
      - "Monospace font with letter spacing for readability"
      - "Connect button disabled until code is 6 characters"

    testing:
      web: true
      widget_test: true
      integration_test: false

    implementation_references:
      - "lib/features/pairing/pairing_screen.dart:123-161 (_buildPairingCodeInput)"

  # ============================================
  # US-PAIR-002: Connect to Remote Session
  # ============================================
  - id: US-PAIR-002
    name: "Connect to Remote Session"
    category: "pairing"
    persona: "User connecting to a remote session"
    priority: "critical"
    status: implemented

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: false
        valid_code_entered: true

    journey:
      - step: 1
        action: "Click Connect button"
        expected: "Button shows loading spinner, status shows 'Connecting to session...'"
        failure_indicators:
          - "No visual feedback"
          - "Button still clickable during connection"
          - "Multiple connection attempts triggered"

      - step: 2
        action: "Wait for connection"
        expected: "On success: status shows 'Connected! Redirecting...', then navigate to /terminal"
        failure_indicators:
          - "No navigation on success"
          - "Success status not shown"
          - "Wrong destination route"

      - step: 3
        action: "Simulate connection failure"
        expected: "Error message displayed in red, button re-enabled for retry"
        failure_indicators:
          - "Silent failure"
          - "Generic error message"
          - "Unable to retry"
          - "App crashes"

    success_criteria:
      - "Connect button shows CircularProgressIndicator during connection"
      - "Status message updates: idle → connecting → connected/error"
      - "Successful connection navigates to '/terminal' route"
      - "Error state displays errorMessage in red with bold font"
      - "Button re-enables after error for retry"

    testing:
      web: true
      widget_test: true
      integration_test: true
      note: "Integration test requires mock relay server"

    implementation_references:
      - "lib/features/pairing/pairing_screen.dart:169-201 (_buildConnectButton)"
      - "lib/features/pairing/pairing_screen.dart:210-256 (_buildStatusMessage)"
      - "lib/features/pairing/pairing_controller.dart (connect method)"

  # ============================================
  # US-PAIR-003: Accessibility - Pairing Screen
  # ============================================
  - id: US-PAIR-003
    name: "Accessibility - Pairing Screen"
    category: "pairing"
    persona: "User with accessibility needs"
    priority: "high"
    status: partial

    implementation_note: |
      CURRENT STATE: Pairing screen has functional UI but lacks accessibility features.

      MISSING ACCESSIBILITY FEATURES:
      - No semantic labels for pairing code input field
      - No ARIA label for Connect button (relies on visible text only)
      - Status area not marked as live region (role="status")
      - Error messages not marked as alerts (role="alert")
      - Focus indicators use default Flutter styling (may not meet WCAG contrast)

      IMPLEMENTATION NEEDED:
      1. Add Semantics widget wrapping input field with label
      2. Add Semantics widget for Connect button with action description
      3. Wrap status message area with Semantics(liveRegion: true)
      4. Use announceForAccessibility() for error messages
      5. Verify focus indicators meet WCAG 2.1 Level AA (3:1 contrast minimum)

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: false
        assistive_technology: true

    journey:
      - step: 1
        action: "Navigate pairing screen using keyboard only"
        expected: "Input field and Connect button are reachable via Tab key, focus indicators visible"
        failure_indicators:
          - "Focus not visible"
          - "Elements unreachable via Tab"
          - "Tab order incorrect (should be: code input → connect button)"

      - step: 2
        action: "Activate Connect button using Enter/Space when focused"
        expected: "Button activates without mouse when focused"
        failure_indicators:
          - "Keyboard activation fails"
          - "Wrong element activated"
          - "No response to keyboard input"

      - step: 3
        action: "Use screen reader to access pairing form"
        expected: |
          Screen reader announces:
          - Input field with label "Enter pairing code" or "Pairing code input"
          - Input field has role="textbox" and describes current value
          - Connect button with label "Connect to remote session" or similar
          - Status messages announced as live region updates
        failure_indicators:
          - "Input field unlabeled or has generic label like 'TextField'"
          - "Button has no accessible label beyond 'Connect'"
          - "Status changes not announced automatically"

      - step: 4
        action: "Check ARIA attributes and semantic structure"
        expected: |
          Proper semantic structure:
          - Input field has Semantics(label: 'Enter pairing code')
          - Connect button has Semantics(label: 'Connect to remote session')
          - Status area has Semantics(liveRegion: true) for connection updates
          - Error messages have Semantics(liveRegion: true) or use announceForAccessibility()
        failure_indicators:
          - "Missing Semantics widgets"
          - "No live region for status updates"
          - "Screen reader cannot access error messages"

    success_criteria:
      - "Input field has Semantics label 'Enter pairing code' or equivalent"
      - "Connect button has Semantics label describing action"
      - "Status area wrapped with Semantics(liveRegion: true)"
      - "Error messages announced immediately via live region or announceForAccessibility()"
      - "Full keyboard navigation works (Tab order: input → button)"
      - "Focus indicators visible (meet WCAG 2.1 Level AA 3:1 contrast)"
      - "Screen reader announces all state changes (connecting, connected, error)"

    testing:
      web: true
      widget_test: true
      integration_test: false
      accessibility_tools:
        - "VoiceOver (macOS)"
        - "NVDA (Windows)"
        - "axe DevTools browser extension"
        - "Flutter Accessibility Inspector"

    implementation_references:
      - "lib/features/pairing/pairing_screen.dart (needs Semantics widgets)"
