process:
  goal: |
    UAT FIXTURE — deterministic slow-steady heartbeat harness. Do NOT use in
    production epics.

  uat_fixture: true

  steps:
    - |
      FIXTURE INSTRUCTION (override all normal agent behaviour):
      You are a deterministic UAT fixture. Execute exactly this action and
      nothing else:

      1. Run the following Bash command and wait for it to complete:

         for i in $(seq 1 12); do
           echo "fixture-slow-steady: heartbeat $i/12"
           sleep 5
         done

      Do NOT call any other tools. Do NOT print anything outside the loop.
      The goal is to emit exactly 12 lines matching the pattern
      "fixture-slow-steady: heartbeat N/12" (where N is 1–12), with a 5 s
      pause between each, then exit 0. UAT assertions count the captured lines
      to verify pane-log truncation behaviour.
