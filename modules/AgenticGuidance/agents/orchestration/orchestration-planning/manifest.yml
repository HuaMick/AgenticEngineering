name: orchestration-planning
description: |
  Planning-only workflows that produce approved plans for downstream use.
  Coordinates the creation and approval of implementation plans without executing them.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture
version: "2.0"

purpose: |
  Orchestration-planning handles workflows that require plan creation and approval
  before any execution begins. It spawns planning agents to create detailed plans,
  manages the review/approval process, and outputs approved plans that can be
  consumed by orchestration-executor agent.

# FENCE: Only agents listed in spawns may be invoked by this orchestrator
spawns:
  # Planning agents (one per phase type)
  - agent: "epic-creator"
    purpose: "Scaffold new epics with folder structure and initial tickets"
    when: "New epic initialization required"

  - agent: "planner-build"
    purpose: "Create implementation phase plans"
    when: "Build phase required"

  - agent: "planner-test"
    purpose: "Create test validation phase plans"
    when: "Test phase required"

  - agent: "planner-explore"
    purpose: "Create discovery and exploration phase plans"
    when: "Research or codebase analysis phase required"

  - agent: "planner-audit"
    purpose: "Create audit phase plans for plan folder compliance"
    when: "Audit phase required"

  # Phase record creation agent (creates TinyDB phase records with agent routing)
  - agent: "planner-orchestration"
    purpose: "Create TinyDB phase records with agent routing from approved ticket data"
    when: "After all phase plans are approved"

# Outputs produced by this orchestrator
# NOTE: TinyDB phase records are created by planner-orchestration (spawned by this orchestrator).
# This orchestrator coordinates the workflow; planner-orchestration creates the phase record artifacts.
outputs:
  - name: "TinyDB phase records"
    description: "Phase records in TinyDB with agent routing for orchestration-executor"
    generated_by: "planner-orchestration"
    required: true
    required_fields:
      - "name"           # Phase name
      - "agent"          # Agent type for routing (e.g., build-python, test-builder)
      - "status"         # Initial status (pending)
      - "execution"      # sequential or parallel
    cli_command: "agentic epic phase add --epic <folder> --name <phase> --agent <agent-type>"
