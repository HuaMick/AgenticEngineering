name: orchestration-planning
description: |
  Planning-only workflows that produce approved plans for downstream use.
  Coordinates the creation and approval of implementation plans without executing them.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture
version: "2.0"

purpose: |
  Orchestration-planning handles workflows that require plan creation and approval
  before any execution begins. It spawns planning agents to create detailed plans,
  manages the review/approval process, and outputs approved plans that can be
  consumed by orchestration-build or orchestration-guidance agents.

# FENCE: Only agents listed in spawns may be invoked by this orchestrator
spawns:
  # Planning agents (one per phase type)
  - agent: "planner-guidance"
    purpose: "Create guidance/teaching phase plans"
    when: "Teach phase required"

  - agent: "planner-build"
    purpose: "Create implementation phase plans"
    when: "Build phase required"

  - agent: "planner-test"
    purpose: "Create test validation phase plans"
    when: "Test phase required"

  - agent: "planner-cleaning"
    purpose: "Create cleanup phase plans"
    when: "Cleanup phase required"

  - agent: "planner-sdk"
    purpose: "Create plans for Claude Agent SDK integration and migration"
    when: "Objective involves SDK migration, subprocess replacement, or SDK-powered features"

  - agent: "planner-audit"
    purpose: "Create audit phase plans for plan folder compliance"
    when: "Audit phase required"

  # Review agent (used for all phase types)
  - agent: "planner-reviewer"
    purpose: "Review and approve/reject phase plans"
    when: "After each planner agent produces output"

  # MMD generation agent (creates orchestration MMD from approved plans)
  - agent: "planner-orchestration"
    purpose: "Generate orchestration MMD file from approved plan YAMLs"
    when: "After all phase plans are approved"

# Outputs produced by this orchestrator
# NOTE: The orchestration MMD is generated by planner-orchestration (spawned by this orchestrator).
# This orchestrator coordinates the workflow; planner-orchestration creates the MMD artifact.
outputs:
  - name: "orchestration_{epic_id}.mmd"
    path_template: "docs/epics/live/{epic_id}/orchestration_{epic_id}.mmd"
    description: "Mermaid flowchart for dynamic orchestration execution by orchestration-executor"
    generated_by: "planner-orchestration"
    required: true
    required_metadata:
      - "GOAL"           # Plan objective
      - "PROFILE"        # orchestrator
      - "PHASES"         # List of phases in execution order
      - "AGENT_ROUTING"  # Phase-to-agent mapping
      - "STATUS"         # Phase status tracking (pending, in_progress, completed, blocked)
    schema_reference: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
