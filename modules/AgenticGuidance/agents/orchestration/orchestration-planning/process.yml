process:
  goal: |
    Coordinate the creation and approval of implementation plans without executing them.
    Spawn planning agents, manage review/approval, and output approved epics with
    TinyDB phase records for downstream consumption by orchestration-executor.

  profile: "orchestrator"

  inputs:
    - location: "modules/AgenticGuidance/agents/orchestration/orchestration-planning/inputs.yml"
      description: "Planning inputs including required/runtime inputs, story discovery, and dependency fields"

  outputs:
    - name: "epic_folder_path"
      description: "Absolute path to the approved epic folder in docs/epics/live/"
      required: true
    - name: "phases_created"
      description: "List of TinyDB phase records created with agent routing"
      required: true
    - name: "next_step"
      description: "Always: agentic orchestrate session implement --plan <epic-folder>"

  # =============================================================================
  # PLANNING WORKFLOW
  # =============================================================================
  # Pipeline (new order, dispatcher-first):
  #   1. epic-creator
  #   2. planner-orchestration (dispatcher) — decides needs_stories, partitions
  #      phases, emits planning_decision
  #   3. build-story-writer — conditional on decision.needs_stories
  #   4. planner-build × N — parallel fan-out over decision.build_phase_ids
  #      (barrier waits for all)
  #   5. planner-test × M — parallel fan-out over decision.test_phase_ids
  #   6. pre-flight validation — story_ids check skipped when
  #      decision.needs_preflight_story_check is false
  #   7. promotion (proposed → pending)
  # =============================================================================

  steps:
    # =========================================================================
    # STEP 1: INPUT VALIDATION
    # =========================================================================
    - id: "input_validation"
      name: "Input Validation"
      description: |
        Verify all required inputs before proceeding:

        1. planning_objective (string, required)
           - High-level description of what to plan
           - ERROR if missing: "STOP: No planning_objective provided."

        2. target_project_path (string, required)
           - Absolute path to the target project root
           - ERROR if missing: "STOP: No target_project_path provided."

        3. planning_intent (enum, optional)
           - Values: build, teach, test
           - Influences phase determination and planner selection order
           - Default: inferred from objective analysis

        If ANY required input is missing, ask user for clarification and STOP.

    # =========================================================================
    # STEP 2: EPIC FOLDER SETUP
    # =========================================================================
    - id: "epic_setup"
      name: "Epic Folder Setup"
      description: |
        Create or verify the epic folder structure using CLI:

        ```bash
        agentic epic new "<description>"
        ```

        This command:
        - Enforces YYMMDDXX_description naming convention
        - Creates epic folder in docs/epics/live/
        - Creates epic.md with description
        - Returns JSON with epic_folder_name and epic_folder path

        If an existing epic matches the objective, reuse it instead of creating a new one.
        Check with: `agentic epic list`

    # =========================================================================
    # STEP 3: DISPATCH (planner-orchestration as dispatcher)
    # =========================================================================
    - id: "dispatch"
      name: "Dispatch via planner-orchestration"
      description: |
        Spawn planner-orchestration as the pipeline dispatcher. It runs SECOND
        (immediately after epic-creator) and is responsible for:

        1. Analyzing the objective and existing epic state
        2. Partitioning work into phases and creating TinyDB phase records
           with agent routing (planner-build, planner-test, planner-audit, etc.)
        3. Emitting a `planning_decision` with at least these fields:
           - needs_stories: bool — whether build-story-writer must run
           - build_phase_ids: list[str] — phases to fan-out planner-build over
           - test_phase_ids: list[str] — phases to fan-out planner-test over
           - needs_preflight_story_check: bool — whether Step 7 enforces story_ids

        Phase types and their planners:
        - **build / teach / cleanup**: → planner-build
        - **test / uat**: → planner-test
        - **audit**: → planner-audit

        Planning intent influences priority:
        - planning_intent: "build" → prioritize planner-build
        - planning_intent: "teach" → prioritize guidance phases
        - planning_intent: "test" → prioritize planner-test

        If phase record creation fails, retry up to 3 times then escalate.

    # =========================================================================
    # STEP 4: STORY GENERATION (conditional)
    # =========================================================================
    - id: "story_generation"
      name: "Story Generation (conditional)"
      description: |
        Conditional on `decision.needs_stories` from Step 3.

        If `decision.needs_stories` is true:
          Spawn build-story-writer to generate or verify user stories. Output
          lands in docs/userstories/EpicStories/{epic_folder}.yml. Stories are
          discovered from docs/userstories/ and generated as needed.

        If `decision.needs_stories` is false:
          Skip this step entirely (e.g., internal-only / guidance-only epics
          or epics whose stories already exist).

        FENCE: When stories are required by the decision, planning MUST NOT
        proceed past this step without either the story file or an explicit
        no_stories_rationale recorded in the epic.

    # =========================================================================
    # STEP 5: PARALLEL planner-build FAN-OUT
    # =========================================================================
    - id: "planner_build_fanout"
      name: "planner-build × N (parallel per phase)"
      description: |
        Fan out planner-build across `decision.build_phase_ids`. One planner-build
        invocation per phase, running in parallel. Each invocation is scoped to
        a single phase via the optional `phase_id` input (see planner-build
        inputs.yml) so that peer agents do not contend on each other's tickets.

        Barrier: wait for ALL parallel planner-build invocations to complete
        before proceeding to Step 6. If any invocation fails, retry that phase
        (max 5 iterations) with feedback; other phases remain completed.

        Per-phase validation (run on each returned result):
        - Tickets exist for the phase
        - Each ticket has required fields (title, description, success_criteria)
        - Agent types are from the valid roster
        - No duplicate ticket IDs
        - Story IDs on build tickets (only when
          decision.needs_preflight_story_check is true)

    # =========================================================================
    # STEP 6: PARALLEL planner-test FAN-OUT
    # =========================================================================
    - id: "planner_test_fanout"
      name: "planner-test × M (parallel per phase)"
      description: |
        Fan out planner-test across `decision.test_phase_ids`. One planner-test
        invocation per phase, running in parallel, each scoped via `phase_id`.

        Barrier: wait for ALL parallel planner-test invocations to complete
        before proceeding. Retry failing phases up to 5 iterations each.

    # =========================================================================
    # STEP 7: PRE-FLIGHT VALIDATION
    # =========================================================================
    - id: "preflight_validation"
      name: "Pre-Flight Validation"
      description: |
        Validate the complete epic before presenting for approval:

        1. All phases have agent routing assigned
        2. All tickets have required fields populated
        3. Phase execution order is valid (no circular dependencies)
        4. Story coverage: affected_stories or no_stories_rationale present —
           SKIP this check when decision.needs_preflight_story_check is false
           (e.g., internal/guidance-only epics explicitly opted out during
           dispatch).
        5. UAT phase exists for build epics

        ```bash
        agentic epic status --epic <folder>
        agentic epic ticket list --epic <folder>
        agentic epic phase list --epic <folder>
        ```

    # =========================================================================
    # STEP 8: PROMOTION (proposed → pending)
    # =========================================================================
    - id: "promotion"
      name: "Promotion"
      description: |
        Promote tickets from `proposed` to `pending` status so the executor
        can pick them up. This is the commit point — only tickets that passed
        Step 7 are promoted. Use:

        ```bash
        agentic epic ticket update <id> --status pending --epic <folder>
        ```

    # =========================================================================
    # STEP 9: HUMAN APPROVAL GATE
    # =========================================================================
    - id: "human_approval"
      name: "Human Approval Gate"
      description: |
        POLICY: Gate is for CLARIFICATION, not routine sign-off.

        - If all requirements are clear AND no open questions → auto-approve
        - If requirements are unclear OR open questions exist → present for user approval

        Present summary:
        - Epic objective and folder path
        - Phases created with agent routing
        - Ticket count per phase
        - Affected stories
        - Estimated scope

        If user requests changes → return to Step 5/6 (planner fan-out) with feedback.
        Max approval iterations: 3. Escalate if exceeded.

    # =========================================================================
    # STEP 10: OUTPUT
    # =========================================================================
    - id: "output"
      name: "Output"
      description: |
        Report planning completion:

        1. Epic folder path (live location)
        2. Phases created with agent assignments
        3. Total ticket count
        4. Next step command:
           ```bash
           agentic orchestrate session implement --plan <epic-folder>
           ```

        MANDATE: Output must include the exact next-step command for execution.

  # =============================================================================
  # GUIDELINES
  # =============================================================================
  guidelines:
    - "Planning ONLY — no execution, no code implementation"
    - "User provides all necessary context in prompt — no unbounded discovery"
    - "Epics created in docs/epics/live/ for visibility"
    - "Orchestrators OWN loop strategy selection"
    - "Planners REQUEST validation needs but do NOT dictate specific loop structures"
    - "Phase records must be at phase level — NO ticket-level routing"
    - "NEVER use Edit tool to change ticket status — use CLI commands"
    - "NEVER use rm or mv commands on epic folders — CLI handles archival"

  # =============================================================================
  # SPAWNABLE AGENTS
  # =============================================================================
  # FENCE: Only these agents may be spawned by this orchestrator
  spawns:
    - agent: "planner-orchestration"
      when: "Step 3 — dispatch: emits planning_decision and creates TinyDB phase records"
    - agent: "build-story-writer"
      when: "Step 4 — story generation (conditional on decision.needs_stories)"
    - agent: "planner-build"
      when: "Step 5 — parallel fan-out per build/teach/cleanup phase (decision.build_phase_ids)"
    - agent: "planner-test"
      when: "Step 6 — parallel fan-out per test/uat phase (decision.test_phase_ids)"
    - agent: "planner-audit"
      when: "Step 5/6 — audit phase planning (when included in decision)"
