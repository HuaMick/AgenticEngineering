# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs MUST be provided by the user or parent orchestrator.
# Without these, the agent cannot proceed.
# ==============================================
required_inputs:
  - name: "planning_objective"
    type: "string"
    description: "High-level objective to plan for (e.g., 'Implement user authentication')"
    required: true
    example: "Add dark mode toggle to settings page"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to the target project root where docs/plans/ will be created"
    required: true
    example: "/home/code/MyProject"

inputs:
  # ==============================================
  # CLI COMMAND REFERENCE
  # ==============================================
  # Use agentic-cli for deterministic operations instead of manual execution.
  # This reduces agent complexity and ensures consistent behavior.
  # ==============================================

  cli_commands:
    worktree:
      create: "agentic worktree create <branch> --base <base-branch>"
      list: "agentic worktree list"
      status: "agentic worktree status"
      description: "Worktree operations with automatic plan folder creation"

    plan:
      validate: "agentic plan validate <plan_folder_path>"
      status: "agentic plan status --path <plan_folder>"
      list: "agentic plan list"
      scaffold: "agentic plan scaffold <name> --worktree <path>"
      description: "Plan folder validation and status reporting"

  # ==============================================
  # GUIDELINES
  # ==============================================

  # Guidelines relevant to planning
  - location: "modules/AgenticGuidance/assets/guidelines/fix-the-source.yml"
    description: "Fix root causes instead of symptoms."
  - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Provide only required information, reduce noise."
  - location: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
    description: "Worktree + branching policy."
  - location: "modules/AgenticGuidance/assets/guidelines/response-audit.yml"
    description: "Mandatory response audit guideline."
  - location: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
    description: "Iteration patterns and small-change bias."
  - location: "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"
    description: "Orchestration policy: agent-task alignment, escalation, plan status management."

  # Definitions for planning context
  - location: "modules/AgenticGuidance/assets/definitions/plans.yml"
    description: "Plan types and locations."
  - location: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Definition of agent loops and recursive planning."
  - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent category definitions and boundaries."

  # Planner manifest for routing decisions
  - location: "modules/AgenticGuidance/agents/planner/manifest.yml"
    description: "Planner agent family manifest with sub-agents and routing logic."

  # Deploy agent for worktree setup
  - location: "modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml"
    description: "Process for worktree setup and verification."

  # Planner sub-agent processes for phase-specific planning
  - location: "modules/AgenticGuidance/agents/planner/planner-build/process.yml"
    description: "Process for planning code implementation and build tasks."
  - location: "modules/AgenticGuidance/agents/planner/planner-test/process.yml"
    description: "Process for planning test strategy and validation tasks."
  - location: "modules/AgenticGuidance/agents/planner/planner-cleaning/process.yml"
    description: "Process for planning code cleanup and removal tasks."
  - location: "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
    description: "Process for planning agent guidance and process improvements."
  - location: "modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml"
    description: "Process for reviewing and approving implementation plans."

  # Plan examples for structure reference
  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
    description: "Unified plan example showing integrated phases (Build, Test, Teach, Audit) in a single file with context updates and decision tracking."

  # Phase file strategy guidance
  phase_file_strategy: |
    For multi-phase plans, create SEPARATE phase files:
    - One plan_live_<phase>.yml per phase type (teach, build, test, cleanup)
    - This enables Context Minimisation: agents read only their phase file
    - Do NOT attempt to consolidate all phases into a single "unified" file

    The plan_example.yml is a STRUCTURE reference, not a file organization template.
  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/README.md"
    description: "README example showing consolidated session tracking, next steps, and decision items."
  - location: "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
    description: "Teaching plan example for guidance improvements with phases and tasks."

  # MMD Component Examples
  # Orchestration can reference these when determining phase structure
  - location: "modules/AgenticGuidance/assets/examples/planner/components/teach_phase.mmd"
    description: "MMD component for teach phase orchestration pattern."
  - location: "modules/AgenticGuidance/assets/examples/planner/components/build_phase.mmd"
    description: "MMD component for build phase orchestration pattern."
  - location: "modules/AgenticGuidance/assets/examples/planner/components/test_phase.mmd"
    description: "MMD component for test phase orchestration pattern."
  - location: "modules/AgenticGuidance/assets/examples/planner/components/cleanup_phase.mmd"
    description: "MMD component for cleanup phase orchestration pattern."
  - location: "modules/AgenticGuidance/assets/examples/planner/components/uat_phase.mmd"
    description: "MMD component for UAT phase orchestration pattern (MANDATORY)."
