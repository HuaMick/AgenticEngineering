# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

version: "2.0"

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs MUST be provided by the user or parent orchestrator.
# Without these, the agent cannot proceed.
# ==============================================
required_inputs:
  - name: "planning_objective"
    type: "string"
    description: "High-level objective to plan for (e.g., 'Implement user authentication')"
    required: true
    example: "Add dark mode toggle to settings page"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to the target project root where docs/plans/ will be created"
    required: true
    example: "/home/code/MyProject"

# ==============================================
# RUNTIME INPUTS
# ==============================================
# These inputs are passed at runtime by entrypoints to signal intent.
# They influence phase determination and planner selection order.
# ==============================================
runtime_inputs:
  - name: "planning_intent"
    type: "enum"
    values: ["build", "teach", "test"]
    description: |
      Intent signaled by the entrypoint that invoked this orchestrator.
      Influences which planner agent is prioritized during phase determination.
    examples:
      - entrypoint: "_plan_build.yml"
        planning_intent: "build"
        effect: "Prioritize planner-build, assume implementation-focused objective"
      - entrypoint: "_plan_teach.yml"
        planning_intent: "teach"
        effect: "Prioritize planner-guidance, assume guidance improvement objective"
      - entrypoint: "_plan_test.yml"
        planning_intent: "test"
        effect: "Prioritize planner-test, assume test strategy objective"

# ==============================================
# STORY DISCOVERY INPUTS
# ==============================================
# Story discovery is a MANDATORY step before phase determination.
# FENCE: planning-standard.yml#Story-First Planning
# ==============================================
story_discovery:
  description: |
    Before phase determination, orchestration-planning MUST discover affected
    user stories. This provides acceptance criteria for UAT and anchors the
    plan to verifiable user outcomes.
  source_location: "docs/userstories/"
  discovery_command: "agentic agent stories find [--project <project>]"
  outputs:
    - name: "affected_stories"
      type: "list[string]"
      description: "List of story IDs affected by this plan (e.g., US-CLI-001)"
      example: ["US-CLI-001", "US-CLI-002", "US-ORCH-003"]
    - name: "no_stories_rationale"
      type: "string"
      description: "Required when no stories found - explains why plan has no user story impact"
      example: "Internal guidance refactoring with no user-facing behavior change"
  downstream_usage: |
    Story context is passed to downstream planner agents:
    - planner-build: Uses affected_stories to populate plan metadata
    - planner-test: Uses affected_stories to plan UAT phases
    - planner-reviewer: Validates affected_stories or no_stories_rationale is present
  fence_reference: "modules/AgenticGuidance/assets/guidelines/planning-standard.yml#Story-First Planning"

# ##############################################
# MMD NODE GRANULARITY (DELEGATED)
# ##############################################
# MMD generation is now handled by planner-orchestration agent.
# The mmd_node_granularity fence and detailed patterns live in:
# modules/AgenticGuidance/agents/planner/planner-orchestration/inputs.yml
#
# This orchestrator spawns planner-orchestration after all phase plans are approved.
# ==============================================
mmd_generation_delegation:
  agent: "planner-orchestration"
  reference: "modules/AgenticGuidance/agents/planner/planner-orchestration/process.yml"
  note: "All MMD generation logic, node granularity fences, and schema validation are owned by planner-orchestration."

# ##############################################
# ##############################################
# CRITICAL: LOOP SELECTION OWNERSHIP (READ FIRST)
# ##############################################
# ##############################################
# Orchestrator owns loop selection; planners request validation needs.
# Reference: modules/AgenticGuidance/assets/definitions/agent-loops.yml
# ==============================================
loop_selection_guidance:
  ownership: |
    ORCHESTRATOR owns loop selection decisions. Planners request validation
    needs (e.g., "needs testing", "needs guidance validation"), but the
    orchestrator determines which specific loop to use based on context.

  # Shared explore verification template - referenced by phases that require pre-review verification
  explore_verification_template: &explore_verification |
    Before review, spawn explore agents to verify live/ files reflect codebase reality:
    - Check if plan target_files still exist
    - Check if "pending" tasks have already been implemented
    - Check if analysis/batch files contain completed or incomplete work
    Reviewer must reject if explore agents find significant discrepancies.

  phase_to_loop_mapping:
    - phase: "teach"
      primary_loop: "planner-loop"
      description: "Iterative planning with reviewer feedback for guidance improvement"
      explore_verification: *explore_verification
      validation_loops:
        - "guidance-test-loop"
        - "agent-self-review"
        - "guidance-self-review-loop"

    - phase: "build"
      primary_loop: "planner-loop"
      description: "Iterative planning with reviewer feedback for implementation"
      explore_verification: *explore_verification
      execution_loop: "test-fix-loop"
      note: "Build execution uses test-fix-loop for iterative development"

    - phase: "test"
      primary_loop: "planner-loop"
      description: "Iterative planning with reviewer feedback for test strategy"
      explore_verification: *explore_verification
      execution_loop: "test-fix-loop"
      validation_loop: "audit-test-fix-loop"
      note: "Audit loop is MANDATORY after test phase"

    - phase: "cleanup"
      primary_loop: "planner-loop"
      description: "Iterative planning with reviewer feedback for cleanup"
      explore_verification: *explore_verification
      execution_loop: "cleaner-dependency-loop"
      validation_loop: "audit-test-fix-loop"
      note: "Audit loop is MANDATORY after cleanup"

    - phase: "discovery"
      primary_loop: "exploration-loop"
      description: "Iterative discovery and information gathering"

    - phase: "documentation-validation"
      primary_loop: "documentation-loop"
      description: "Validate documentation through blind testing"

    - phase: "user-story-validation"
      primary_loop: "user-story-validation-loop"
      description: "PRIMARY SUCCESS CRITERIA - validate complete user journeys"

    - phase: "uat"
      primary_loop: "user-story-validation-loop"
      description: "User acceptance testing (alias for user-story-validation)"
      planner: "planner-test"
      executor: "test-user-simulator"
      note: "UAT planning handled by planner-test (see planner-test/process.yml#uat_phase_planning)"

  # Alternative loop selection criteria are defined in the authoritative source.
  # See selection_criteria fields in: agent-self-review, guidance-self-review-loop, guidance-test-loop
  alternative_loop_selection_reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#selection_criteria"

  loop_definition_reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"

# ==============================================
# LOOP VALIDATION
# ==============================================
# Plans for non-trivial work MUST include loop_structure.
# This ensures iterative patterns are explicitly defined.
# ==============================================
loop_validation:
  fence: |
    FENCE: PLANS-MUST-INCLUDE-LOOPS
    Plans for non-trivial work MUST include loop_structure section.
    Reviewer MUST reject plans without loops for:
    - Build phases (requires test-fix-loop)
    - Test phases (requires audit-test-fix-loop)
    - Cleanup phases (requires audit-test-fix-loop)
    - Teach phases (requires guidance-self-review-loop OR agent-self-review)

  trivial_exception: |
    Single-task plans with no iteration need (e.g., "fix typo")
    may omit loop_structure with justification.

# ==============================================
# CLI COMMAND REFERENCE
# ==============================================
# Centralized CLI commands - see shared definition for full documentation
cli_commands_reference: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
# Key commands used by orchestration-planning:
# - agentic agent plan init <branch> --description <desc>: Create plan folder (PREFERRED)
#   - Enforces YYMMDDXX_description naming convention programmatically
#   - Exit codes: 0=success, 1=fail, 2=exists, 3=invalid input
#   - For JSON output: agentic -j agent plan init <branch> --description <desc>
#
#   JSON output fields:
#   - branch: Branch name
#   - plan_folder: Absolute path to plan folder
#   - plan_folder_name: Generated folder name (YYMMDDXX_description format)
#
# - agentic agent plan validate: Validate plan folder structure
# ==============================================

# ==============================================
# SUB-AGENT ORCHESTRATION CLI WORKFLOW
# ==============================================
# When orchestrating sub-agents, use CLI commands for all task state management.
# This ensures data consistency and triggers auto-archival automatically.
# ==============================================
sub_agent_orchestration_workflow:
  description: |
    Standard workflow for spawning and managing sub-agents during plan execution.
    CLI commands handle all state transitions - agents should NEVER use Edit tool
    on plan YAML files or rm/mv commands on plan folders.

  workflow_steps:
    1_get_task:
      command: "agentic agent plan task current --plan <folder>"
      purpose: "Get the next task to execute"
      output: "Task details including id, description, guidance, inputs"

    2_start_task:
      command: "agentic agent plan task start <task_id> --plan <folder>"
      purpose: "Mark task as in_progress before spawning agent"
      timing: "BEFORE spawning the sub-agent"

    3_spawn_agent:
      command: "agentic session spawn --role <agent-role> --plan <folder>"
      purpose: "Spawn appropriate agent for the task"
      note: "Agent role determined by task type and agent-task alignment check"

    4_complete_task:
      command: "agentic agent plan task complete <task_id> --plan <folder>"
      purpose: "Mark task as completed after agent succeeds"
      auto_archive: "Triggers auto-archival when this is the last task"

  prohibited_operations:
    - "Edit tool to change status: field in plan YAML"
    - "rm commands on docs/plans/ paths"
    - "mv commands on docs/plans/ paths"
    - "Manual YAML editing for task status"

  auto_archival_note: |
    When completing the last task, CLI automatically archives the plan folder.
    Use --no-archive flag ONLY if follow-on work is explicitly planned.
# ==============================================

# ==============================================
# PHASE FILE STRATEGY
# ==============================================
phase_file_strategy: |
  For multi-phase plans, create SEPARATE phase files:
  - One plan_<phase>.yml per phase type (teach, build, test, cleanup)
  - This enables Context Minimisation: agents read only their phase file
  - Do NOT attempt to consolidate all phases into a single "unified" file

  The plan_example.yml is a STRUCTURE reference, not a file organization template.
# ==============================================

# ==============================================
# GUIDANCE CHANGE ROUTING
# ==============================================
# When a build plan includes guidance file modifications, the orchestration
# MUST include teach phase validation to ensure guidance quality.
# ==============================================
guidance_change_routing:
  description: |
    Build plans may legitimately include guidance file paths (e.g., infrastructure
    work that updates agent inputs). However, any modifications to agent guidance
    MUST be validated through the teach process before deployment.

  detection_trigger: |
    If planner-build sets requires_teach_validation: true in plan output,
    this indicates the plan modifies guidance files. Check plan output for:
    - requires_teach_validation: true
    - guidance_files_modified: [list of files]

  routing_action: |
    When requires_teach_validation is true:
    1. INCLUDE teach phase in orchestration sequence
    2. Position teach phase AFTER build tasks that modify guidance
    3. Include agent self-review for each modified agent
    4. Teach phase MUST complete successfully before plan completion

  fence: |
    FENCE: GUIDANCE-CHANGES-REQUIRE-TEACH
    A build plan with requires_teach_validation: true MUST NOT be marked
    complete until teach phase validation passes. This is NON-NEGOTIABLE.

    The following validation is REQUIRED:
    - Agent self-review for each agent whose guidance was modified
    - Path resolution validation for all modified inputs.yml files
    - Consistency check between process.yml and inputs.yml

    INCIDENT REFERENCE: CLI Context Injection initiative (2025-11) modified 26 agent
    bootstrap files without validation, causing broken paths and missing
    references that weren't caught until execution.

  phase_insertion_pattern: |
    Original: [Build Phase] -> [Test Phase] -> [Complete]
    Modified: [Build Phase] -> [Teach Validation Phase] -> [Test Phase] -> [Complete]

    The Teach Validation Phase includes:
    - SpawnPlannerGuidance for validation task creation
    - SpawnSelfReview for each modified agent
    - SpawnReviewer to approve guidance changes

  planner_build_fence_reference: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml#guidance_modification_fence"
# ==============================================

