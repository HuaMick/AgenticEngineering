  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/README.md"
    description: "README example showing consolidated session tracking, next steps, and decision items."
  - location: "modules/AgenticGuidance/assets/examples/planner/teaching-plan-example.yml"
    description: "Teaching plan example for guidance improvements with phases and tasks."

  # Planner-orchestration agent reference (for MMD generation delegation)
  - location: "modules/AgenticGuidance/agents/planner/planner-orchestration/process.yml"
    description: "Process for generating orchestration MMD files from approved plan YAMLs."
