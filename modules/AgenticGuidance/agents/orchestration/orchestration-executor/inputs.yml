# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/epics/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/epics/live/ or docs/epics/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# Orchestration-executor requires an epic with phases stored in TinyDB.
# It does NOT perform planning - it only executes.
# Phase routing, status, and feedback triggers are all read from TinyDB.
# ==============================================
required_inputs:
  - name: "epic_folder_path"
    type: "string"
    description: |
      Path to the EPIC FOLDER.
      Phases and tickets are loaded from TinyDB using the folder name.
    required: true
    example: "docs/epics/260110Repo_feature"
    note: |
      CORRECT:   "docs/epics/260110Repo_feature"
      INCORRECT: "docs/epics/260110Repo_feature/live/"

      The executor extracts the folder name and loads phase data via:
        agentic -j epic ticket list --epic <folder_name>
      All routing (phase.agent), status (phase.status), and triggers
      (phase.feedback_triggers) are stored as fields in TinyDB phase records.
    validation: |
      The epic must exist in TinyDB with at least one phase record.
      Phases must have an agent field specifying the agent type to route to.
      Use `agentic epic phase add` to add phases if missing.

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for resolving relative paths)"
    required: true
    example: "/home/code/MyProject"

inputs:
  # ==============================================
  # CCI CLI BOOTSTRAP CONTEXT
  # ==============================================
  # When spawning subagents, reference their thin-client bootstrap files
  # which document the CCI CLI commands they should run first.
  # ==============================================
  cci_cli_context:
    name: "CCI Bootstrap Context"
    type: "reference"
    description: |
      All spawned agents have thin-client bootstrap files at .claude/agents/<agent-name>.md
      These files instruct agents to run CCI CLI commands FIRST before file exploration.
      The CLI commands provide structured context more efficiently than Glob/Grep/Read.
    required: true
    bootstrap_files_location: ".claude/agents/"
    key_commands:
      - "agentic epic status --epic <epic>"
      - "agentic epic ticket current -j"
    purpose: |
      Ensures spawned agents retrieve their context via CLI commands rather than
      extensive file exploration, reducing token usage and improving efficiency.

  # CLI commands reference (see cli-commands.yml for full docs)
  cli_commands_reference: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"

  # Question workflow guideline
  - type: file
    path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
    description: "Question generation and resumption patterns for HITL workflow"
    required: true

  # ==============================================
  # CORE SPECIFICATION
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
    description: "Comprehensive executor behavior specification (959 lines)"
    required: true
    sections_used:
      - "executor_scope"
      - "agent_routing"
      - "feedback_triggers"
      - "state_model"
      - "execution_protocol"
      - "context_budget_management"

  # ==============================================
  # TINYDB PHASE SCHEMA REFERENCE
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
    description: "Plan structure reference for understanding phase and ticket fields in TinyDB"
    required: true
    usage: |
      Reference when reading TinyDB ticket data to understand:
      - Phase structure (name, execution, tickets)
      - Ticket structure (id, name, description, status, agent_type)
      - Routing fields: phase.agent (agent type to spawn)
      - Trigger fields: phase.feedback_triggers
      - Success criteria format
      - Output definitions

  # ==============================================
  # AGENT ROUTING RESOLUTION
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent category definitions for routing resolution"
    required: true
    usage: |
      Used to resolve generic routing types (builder, tester, teacher) to
      specific agents (build-python, test-builder, teacher-update-guidance).

  - type: file
    path: "modules/AgenticGuidance/agents/manifest.yml"
    description: "Central agent registry for spawn validation"
    required: true
    usage: "Validate that routed agents exist and are available"

  # ==============================================
  # PLANNER-ORCHESTRATION (for re-planning scenarios)
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/agents/planner/planner-orchestration/process.yml"
    description: "Process for creating TinyDB phase records with agent routing"
    required: false
    usage: "Spawn planner-orchestration when phase records need to be created or updated after plan changes"

  # ==============================================
  # LOOP DEFINITIONS
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop definitions for feedback trigger handling"
    required: true
    sections_used:
      - "loop_types.test-fix-loop"
      - "loop_types.audit-test-fix-loop"
      - "loop_types.guidance-test-loop"
    usage: |
      When FEEDBACK_TRIGGER fires, executor uses loop definitions to
      determine retry behavior, max iterations, and escalation path.

  # ==============================================
  # USER STORY DEFINITIONS
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
    description: "User story schema and metadata field definitions"
    required: true
    usage: |
      Reference when validating story test metadata during UAT phases:
      - Story test metadata fields: last_tested, test_status, test_notes, tested_by_plan
      - Story status lifecycle: untested -> passed | failed | regression
      - Story-first planning fence: planning-standard.yml#Story-First Planning

  - type: file
    path: "modules/AgenticGuidance/assets/specifications/story-schema.yml"
    description: "Story YAML schema for validating story file structure"
    required: false
    usage: |
      Reference when validating story files during UAT phases:
      - Required fields per story (id, title, category)
      - Optional fields (priority, steps, success_criteria)
      - File naming conventions

  - type: reference
    path: "docs/userstories/"
    description: "User stories location - executor validates affected stories during UAT"
    required: false
    usage: |
      When plan has affected_stories metadata, executor validates that
      UAT phases test those specific stories and capture test results.

  # ==============================================
  # ESCAPE HATCH RULES (for validation gate)
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/guidelines/planning-standard.yml"
    description: "Canonical escape hatch rules for story/UAT skip decisions"
    required: true
    sections_used:
      - "escape_hatch_rules"
    usage: |
      Validation gate uses escape_hatch_rules to determine blocking behavior:
      - blocked_plan_types (build, test): BLOCK on missing stories/UAT
      - allowed_plan_types (infrastructure, guidance, internal_tooling): WARN with rationale

  # ==============================================
  # TEST SCENARIOS (for validation)
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/tests/orchestration-test-scenarios.yml"
    description: "Test scenarios for executor validation"
    required: false
    usage: "Reference during development and testing"

  # ==============================================
  # CROSS-EPIC DEPENDENCY CONTEXT
  # ==============================================
  # The executor receives epics that have passed dependency gating in
  # orchestration-loop, but must perform a runtime re-check because
  # dependency status can change between discovery and execution.
  # ==============================================
  cross_epic_dependency_context:
    description: |
      Epics can declare dependencies on other epics via the `depends_on` field.
      The executor performs a runtime dependency re-check before executing each
      epic — even though orchestration-loop already filtered DEPENDENCY_BLOCKED
      epics during discovery. This guards against race conditions where a
      prerequisite epic was unarchived or a new dependency was added.

    runtime_check_fields:
      - name: "dependency_blocked"
        type: "boolean"
        description: "true if any depends_on epic has not reached 'completed' status"
        source: "`agentic --json epic status --epic <folder>`"

      - name: "blocked_by"
        type: "list[string]"
        description: "Epic folder names that are blocking this epic"
        source: "`agentic --json epic status --epic <folder>`"

      - name: "depends_on"
        type: "list[string]"
        description: "All declared dependency epic folder names"
        source: "`agentic --json epic status --epic <folder>`"

      - name: "blocks"
        type: "list[string]"
        description: "Epics that depend on THIS epic (downstream dependents)"
        source: "`agentic --json epic status --epic <folder>`"

      - name: "priority"
        type: "enum"
        values: ["critical", "high", "medium", "low"]
        description: "Epic priority — affects execution ordering when multiple epics are ready"
        default: "medium"

    completion_impact: |
      When this executor completes an epic successfully, dependent epics that
      were DEPENDENCY_BLOCKED may become unblocked. The orchestration-loop
      re-evaluates dependency status on each discovery pass.

    cli_commands:
      check_status: "agentic --json epic status --epic <folder>"
      add_dependency: "agentic epic link --epic <this_epic> --depends-on <other_epic>"
      remove_dependency: "agentic epic unlink --epic <this_epic> --depends-on <other_epic>"

  # ==============================================
  # CLI COMMAND REFERENCE
  # ==============================================
  - type: reference
    path: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
    description: "CLI commands reference for executor operations"
    required: false
    usage: |
      Key commands used by orchestration-executor:
      - agentic --json epic status --epic <folder>: Check dependency status and epic info
      - agentic epic status --validate: Validate epic folder before execution
      - agentic epic ticket start/complete: Track phase progress
      - agentic epic archive: Archive completed epics
