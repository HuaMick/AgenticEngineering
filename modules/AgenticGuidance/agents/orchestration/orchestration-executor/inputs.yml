# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# Orchestration-executor requires a pre-approved plan with MMD.
# It does NOT perform planning - it only executes.
# ==============================================
required_inputs:
  - name: "plan_folder_path"
    type: "string"
    description: |
      Path to the PLAN FOLDER (not the live/ subdirectory).
      The executor will internally search <plan_folder>/live/ for files.
    required: true
    example: "docs/plans/260110Repo_feature"
    note: |
      CORRECT:   "docs/plans/260110Repo_feature"
      INCORRECT: "docs/plans/260110Repo_feature/live/"

      The executor appends /live/ internally when searching for:
      - orchestration_*.mmd (Mermaid flowchart)
      - plan_*.yml (plan definition)
    validation: |
      Plan folder structure must be:
        <plan_folder>/
          live/
            plan_*.yml (plan definition with phases)
            orchestration_*.mmd (Mermaid flowchart with AGENT_ROUTING)

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for resolving relative paths)"
    required: true
    example: "/home/code/MyProject"

inputs:
  # ==============================================
  # CCI CLI BOOTSTRAP CONTEXT
  # ==============================================
  # When spawning subagents, reference their thin-client bootstrap files
  # which document the CCI CLI commands they should run first.
  # ==============================================
  cci_cli_context:
    name: "CCI Bootstrap Context"
    type: "reference"
    description: |
      All spawned agents have thin-client bootstrap files at .claude/agents/<agent-name>.md
      These files instruct agents to run CCI CLI commands FIRST before file exploration.
      The CLI commands provide structured context more efficiently than Glob/Grep/Read.
    required: true
    bootstrap_files_location: ".claude/agents/"
    key_commands:
      - "agentic context bootstrap --role <role-id> -j"
      - "agentic plan task current -j"
    purpose: |
      Ensures spawned agents retrieve their context via CLI commands rather than
      extensive file exploration, reducing token usage and improving efficiency.

  # CLI commands reference (see cli-commands.yml for full docs)
  cli_commands_reference: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"

  # Question workflow guideline
  - type: file
    path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
    description: "Question generation and resumption patterns for HITL workflow"
    required: true

  # ==============================================
  # CORE SPECIFICATION
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
    description: "Comprehensive executor behavior specification (959 lines)"
    required: true
    sections_used:
      - "executor_scope"
      - "agent_routing"
      - "feedback_triggers"
      - "state_model"
      - "execution_protocol"

  # ==============================================
  # MMD SCHEMA AND VALIDATION
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
    description: "Plan-MMD structural schema for validation"
    required: true
    sections_used:
      - "agent_routing"
      - "feedback_triggers"
      - "status_management"
      - "validation_checklist"

  # ==============================================
  # PLAN YAML SCHEMA REFERENCE
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
    description: "Plan YAML structure reference for phase and task parsing"
    required: true
    usage: |
      Reference when parsing plan_*.yml files to understand:
      - Phase structure (name, execution, tasks)
      - Task structure (id, name, description, status, agent_type)
      - Success criteria format
      - Output definitions

  # ==============================================
  # AGENT ROUTING RESOLUTION
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent category definitions for routing resolution"
    required: true
    usage: |
      Used to resolve generic routing types (builder, tester, teacher) to
      specific agents (build-python, test-runner, teacher-update-guidance).

  - type: file
    path: "modules/AgenticGuidance/agents/manifest.yml"
    description: "Central agent registry for spawn validation"
    required: true
    usage: "Validate that routed agents exist and are available"

  # ==============================================
  # PLANNER-ORCHESTRATION (for re-planning scenarios)
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/agents/planner/planner-orchestration/process.yml"
    description: "Process for generating orchestration MMD files from approved plan YAMLs"
    required: false
    usage: "Spawn planner-orchestration when MMD regeneration is needed after plan changes"

  # ==============================================
  # LOOP DEFINITIONS
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop definitions for feedback trigger handling"
    required: true
    sections_used:
      - "loop_types.test-fix-loop"
      - "loop_types.audit-test-fix-loop"
      - "loop_types.guidance-test-loop"
    usage: |
      When FEEDBACK_TRIGGER fires, executor uses loop definitions to
      determine retry behavior, max iterations, and escalation path.

  # ==============================================
  # USER STORY DEFINITIONS
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
    description: "User story schema and metadata field definitions"
    required: true
    usage: |
      Reference when validating story test metadata during UAT phases:
      - Story test metadata fields: last_tested, test_status, test_notes, tested_by_plan
      - Story status lifecycle: untested -> passed | failed | regression
      - Story-first planning fence: planning-standard.yml#Story-First Planning

  - type: reference
    path: "docs/userstories/"
    description: "User stories location - executor validates affected stories during UAT"
    required: false
    usage: |
      When plan has affected_stories metadata, executor validates that
      UAT phases test those specific stories and capture test results.

  # ==============================================
  # ESCAPE HATCH RULES (for validation gate)
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/assets/guidelines/planning-standard.yml"
    description: "Canonical escape hatch rules for story/UAT skip decisions"
    required: true
    sections_used:
      - "escape_hatch_rules"
    usage: |
      Validation gate uses escape_hatch_rules to determine blocking behavior:
      - blocked_plan_types (build, test): BLOCK on missing stories/UAT
      - allowed_plan_types (infrastructure, guidance, internal_tooling): WARN with rationale

  # ==============================================
  # TEST SCENARIOS (for validation)
  # ==============================================
  - type: file
    path: "modules/AgenticGuidance/tests/orchestration-test-scenarios.yml"
    description: "Test scenarios for executor validation"
    required: false
    usage: "Reference during development and testing"

  # ==============================================
  # CLI COMMAND REFERENCE
  # ==============================================
  - type: reference
    path: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
    description: "CLI commands reference for executor operations"
    required: false
    usage: |
      Key commands used by orchestration-executor:
      - agentic plan validate: Validate plan folder before execution
      - agentic plan task start/complete: Track phase progress
      - agentic plan move: Archive completed phases
