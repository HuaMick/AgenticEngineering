process:
  goal: |
    Execute pre-approved plans by reading TinyDB phase records and dynamically
    routing to appropriate agents based on the phase.agent field.

  profile: "orchestrator"

  specification_reference: |
    Full behavior specification: modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
    This process implements the execution protocol from Section 6 of the specification.

  inputs:
    - location: "modules/AgenticGuidance/agents/orchestration/orchestration-executor/inputs.yml"
      description: "Executor inputs including specification and schema references"

  outputs:
    - name: "execution_status"
      values: ["completed", "blocked", "failed"]
      description: "Final execution outcome"
    - name: "phase_report"
      description: "Status of each phase with timestamps"
    - name: "state_updates"
      description: "Updated phase status records in TinyDB"
    - name: "remediation_plans_spawned"
      description: "List of new planning folders created for out-of-scope errors discovered during execution"
      schema:
        - plan_name: "string"
          error_type: "string"
          priority: "enum(CRITICAL, HIGH, MEDIUM, LOW)"
          spawned_by: "string - agent that detected the issue"

  # =============================================================================
  # EXECUTION PROTOCOL
  # =============================================================================
  # Three phases: Startup -> Phase Execution Loop -> Shutdown
  # =============================================================================

  steps:
    # =========================================================================
    # CCI BOOTSTRAP (CLI Context Injection) - Run FIRST
    # =========================================================================
    - id: "cci_bootstrap"
      name: "CCI Bootstrap (CLI Context Injection)"
      description: |
        Execute these commands to get structured context efficiently:

        ```bash
        # Get epic status/context
        agentic epic status --epic <epic_folder>

        # Get current ticket if working from an epic
        agentic epic ticket current -j
        ```

        CLI output provides:
        - Your objective and process summary
        - Input file paths to read
        - Current task details (if plan exists)

        ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
        DO NOT explore the codebase before running these commands.

        CLI SESSION MANAGEMENT (for parallel execution):
        When spawning agents for phase execution, use CLI session commands:
        ```bash
        # Spawn a Claude Code session for an agent role
        agentic orchestrate session spawn --role <agent-role> --epic <epic_folder> -j

        # Check session health/detail status
        agentic orchestrate health <session-id> -j

        # List active sessions (for status overview)
        agentic orchestrate session list -j
        ```

        CLI ENTRYPOINT BOOTSTRAP (for session context):
        When starting a session with pre-defined context, use entrypoint commands:
        ```bash
        # Execute entrypoint to load session context
        agentic orchestrate session spawn --role <entrypoint_name> --epic <epic_folder>
        ```
        Use `agentic orchestrate session list` to see active sessions.

    # =========================================================================
    # PHASE 1: STARTUP SEQUENCE
    # =========================================================================
    - id: "startup_validate_inputs"
      name: "Validate Required Inputs"
      description: |
        REQUIRED INPUTS (from inputs.yml):
        1. epic_folder_path (string, required)
           - Path to epic folder (phases and tickets stored in TinyDB)
           - ERROR if missing: "STOP: No epic_folder_path provided."

        2. target_project_path (string, required)
           - Absolute path to target project
           - ERROR if missing: "STOP: No target_project_path provided."

        If ANY required input is missing, report error and STOP.

    - id: "startup_check_dependencies"
      name: "Runtime Dependency Check"
      description: |
        RUNTIME DEPENDENCY RE-CHECK:
        Before executing any epic, verify its dependencies are satisfied.
        Dependencies may have changed since orchestration-loop classified this
        epic as EXECUTE (e.g., a prerequisite epic completed or was unlinked).

        Check dependency status:
        ```bash
        agentic --json epic status --epic <epic_folder>
        ```

        From JSON output, check these fields:
        - `dependency_blocked` (boolean): true if any depends_on epic is incomplete
        - `blocked_by` (list): epic folder names that are still blocking
        - `depends_on` (list): all declared dependency epic folder names
        - `blocks` (list): epics that depend on THIS epic

        DECISION:
        - If `dependency_blocked: false` → proceed to phase loading
        - If `dependency_blocked: true` → SKIP execution with warning:
          "Skipping {epic} — blocked by dependencies: {blocked_by}"
          Return to orchestration-loop for re-evaluation.

        NOTE: The ExecutionRunner code performs this same check automatically
        via DependencyService.is_blocked(). This guidance step ensures the
        executor agent understands WHY an epic might be skipped at runtime
        even after orchestration-loop classified it as EXECUTE.

        FENCE: DEPENDENCY-BLOCKED-NO-EXECUTE
        An epic with `dependency_blocked: true` MUST NOT proceed to phase
        execution. This is enforced both in code (ExecutionRunner) and in
        agent guidance (this step).

    - id: "startup_load_phases"
      name: "Load Phase Index from TinyDB (JIT)"
      description: |
        JUST-IN-TIME MANIFEST LOADING:
        Load ONLY the phase index at startup — NOT full ticket descriptions.
        Full ticket details are loaded per-phase when spawning agents.

        STARTUP LOAD (compact, ~10 KB):
        - Extract the epic folder name from the epic_folder_path
          (e.g., "docs/epics/live/260110Repo_feature" -> "260110Repo_feature")
        - Load phase index: `agentic -j epic ticket list --epic {epic_folder_name}`
        - From the JSON response, extract ONLY:
          - Phase names and their execution order
          - Per-phase agent routing (phase.agent field)
          - Per-phase status (phase.status field)
          - Feedback triggers (phase.feedback_triggers field)
          - Max iterations (phase.max_iterations field)
        - Do NOT read full ticket descriptions, success_criteria, or inputs yet

        PER-PHASE LOAD (on demand, ~15 KB per phase):
        When the executor is about to spawn agents for a specific phase:
        1. Load that phase's ticket details (description, success_criteria, inputs)
        2. Pass ticket context to the spawned agent
        3. After agent completes: DISCARD the loaded ticket content from context
        4. Write outcome summary to execution_state.yml instead

        CONTEXT IMPACT:
        - Old approach: ~100 KB loaded at startup (all 6 plan files)
        - New approach: ~10 KB at startup + ~15 KB per active phase
        - Savings: 75-85 KB reduction in initial context load

        FENCE: JIT LOADING CONSTRAINT
        Do NOT load all ticket YAML files or full ticket descriptions during
        the startup sequence. Load ticket details only when needed for the
        current phase, then discard after summarisation.

        ERROR if TinyDB returns no phases or the epic does not exist.

    - id: "startup_validate_phases"
      name: "Validate Phase Data"
      description: |
        Validate loaded phase records from TinyDB:
        1. All phases have an agent field with a valid agent type
        2. Routed agent types exist in the manifest spawns fence
        3. Feedback trigger targets reference valid phase names
        4. Loop definitions reference valid loop types from agent-loops.yml

        FALLBACK if agent field is missing from a phase:
        - Attempt inference from phase name (Build* -> builder, Test* -> tester)
        - If inference fails, transition to blocked and ask user

        ERROR with specific validation failures if invalid.

    - id: "startup_determine_resume"
      name: "Determine Resume Point"
      description: |
        Inspect phase status records from TinyDB to find execution state:
        1. Find first phase with status != completed
        2. If all phases completed, execution is done
        3. If in_progress phase found, resume that phase
        4. If failed phase found, check for re-planning flag

        Output: resume_phase (name of phase to start/resume)

    - id: "startup_story_linkage_gate"
      name: "PRE-EXECUTION STORY LINKAGE GATE"
      description: |
        FENCE: Before executing any phase, verify that every ticket in build-plan
        epics has story_ids populated. This gate prevents unlinked work items from
        reaching execution.

        PRE-EXECUTION STORY LINKAGE CHECK:
        1. Query TinyDB for all tickets in the epic:
           `agentic -j epic ticket list --epic {epic_folder_name}`

        2. Determine if this is a build-plan epic:
           - Check if any phase has a build-category agent (build-python, build-flutter, etc.)
           - If NO build agents found → BYPASS this gate (infra/guidance epics are exempt)

        3. For build-plan epics, check every ticket for story_ids:
           - Iterate ALL tickets from TinyDB
           - For each ticket where story_ids is empty or missing → record as offending

        4. If ANY ticket lacks story_ids → BLOCK execution:
           "PRE-EXECUTION STORY LINKAGE GATE FAILURE

            Cannot execute build-plan epic — tickets missing story_ids.

            Offending tickets:
            - {ticket_id}: {ticket_name}

            REQUIRED ACTION:
            Add story_ids to each ticket:
            agentic epic ticket update {ticket_id} --epic {epic_folder_name} --story-ids 'US-XXX,...'

            Or run `agentic stories audit --epic {epic_folder_name}` for full gap report."

        5. If all tickets have story_ids → proceed to state file initialization

        BYPASS CONDITIONS:
        - Epic has no build-category phase agents (infra/guidance epic)
        - Epic has no tickets yet (will be caught by phase execution)

      fence: |
        FENCE: PRE-EXECUTION STORY LINKAGE
        Build-plan epics MUST NOT proceed to execution with unlinked tickets.
        This gate runs after startup validation and before state file initialization.
        Infra/guidance epics bypass this gate entirely.

    - id: "startup_init_state_file"
      name: "Initialise Execution State File"
      description: |
        MANDATE: Write all running execution state to a persistent YAML file
        rather than maintaining it purely in the executor's context.

        STATE FILE LOCATION:
        {epic_folder_path}/execution_state.yml

        INITIAL STATE FILE STRUCTURE:
        ```yaml
        # Execution State - written by orchestration-executor
        # Read at start of each reasoning turn for context recovery
        executor_session_id: "<session_id>"
        epic_folder: "<epic_folder_name>"
        started_at: "<ISO timestamp>"
        poll_cycle: 0
        current_phase: "<phase_name>"
        current_phase_status: "in_progress"

        active_sessions: {}
          # ticket_id:
          #   session_id: "<session_id>"
          #   status: "running | completed | failed"
          #   summary: "<1-line outcome>"

        completed_sessions: []
          # - ticket_id: "<id>"
          #   outcome: "success | failure"
          #   key_artifacts: [...]
          #   completed_at: "<ISO timestamp>"

        blocked_tickets: []
          # - ticket_id: "<id>"
          #   reason: "<why blocked>"

        context_budget:
          max_concurrent_agents: 8
          poll_batch_size: 5
        ```

        PURPOSE:
        At the start of each reasoning turn, the executor reads ONLY this
        compact state file (~2-5 KB) instead of relying on accumulated context
        from prior turns. This enables context compaction to clear prior turn
        details while preserving execution continuity.

        STATE FILE UPDATE PROTOCOL:
        - Update after EVERY state change (agent spawn, poll result, phase transition)
        - Use Write tool to overwrite the file atomically
        - Include a last_updated timestamp on each write
        - Keep completed_sessions entries as summaries only (<100 chars each)

        FENCE: STATE FILE IS SOURCE OF TRUTH
        If context compaction occurs, the executor MUST be able to reconstruct
        its execution state entirely from this file plus TinyDB phase records.

    # =========================================================================
    # PHASE 2: PHASE EXECUTION LOOP
    # =========================================================================
    - id: "loop_start"
      name: "Begin Phase Execution Loop"
      description: |
        For each phase from resume_point to end:
          1. Transition phase to in_progress
          2. Resolve agent routing
          3. Spawn agents with context (batched by MAX_CONCURRENT_AGENTS)
          4. Poll agents in batches of POLL_BATCH_SIZE
          5. Summarise and offload output to state file
          6. Evaluate feedback triggers
          7. Complete or handle failure

        CONTEXT MANAGEMENT DEFAULTS:
          MAX_CONCURRENT_AGENTS: 8  (max agents running simultaneously)
          POLL_BATCH_SIZE: 5        (max agents polled per turn)

        These values can be overridden in TinyDB epic metadata or phase records.

    - id: "loop_transition_status"
      name: "Transition Phase Status"
      description: |
        Update status from pending -> in_progress:
        1. Update TinyDB phase status: `agentic epic ticket start <phase_id> --epic <folder>`
        2. Record started_at timestamp

        CONSTRAINT: Only ONE phase may be in_progress at a time.

    - id: "loop_resolve_routing"
      name: "Resolve Agent Routing"
      description: |
        Read the agent field from the TinyDB phase record to find the agent for the current phase:
        1. Read phase.agent from TinyDB phase record (loaded in startup_load_phases)
        2. Resolve agent_type to specific agent:
           - builder -> build-python (default) or build-flutter (Flutter projects)
           - tester -> test-builder
           - deployer -> deploy-cicd
           - teacher -> teacher-update-guidance or teacher-update-assets
           - auditor -> test-audit
           - trace-analyst -> trace-explorer
           - uat -> test-uat
           - planner -> orchestration-planning

        3. Validate resolved agent is in manifest spawns fence

        FALLBACK if phase.agent field is missing or unrecognized:
          - Check phase name for hints (Test* -> tester, Build* -> builder)
          - If still unknown, transition to blocked and ask user

    - id: "loop_spawn_agent"
      name: "Spawn Routed Agent (Concurrency-Limited)"
      description: |
        Invoke the resolved agent with context using CLI session commands,
        respecting the MAX_CONCURRENT_AGENTS limit.

        CONCURRENCY LIMIT PROTOCOL:
        MAX_CONCURRENT_AGENTS = 8 (default, configurable via epic metadata)

        When a phase has more tickets than MAX_CONCURRENT_AGENTS:
        1. Divide tickets into sub-waves of MAX_CONCURRENT_AGENTS each
        2. Spawn wave 1 (up to 8 agents)
        3. Poll wave 1 using batched polling until all complete
        4. Spawn wave 2 (next batch of up to 8 agents)
        5. Repeat until all tickets in the phase are processed

        CONTEXT IMPACT:
        At 8 concurrent agents with ~35 KB raw output each:
        - Max raw injection per poll cycle: 280 KB (vs 770 KB with 22 agents)
        - After output summarisation: 8 × 1 KB = 8 KB per poll cycle
        - Combined with POLL_BATCH_SIZE=5: max 5 KB per reasoning turn

        SUB-WAVE TRACKING:
        Track sub-wave state in execution_state.yml:
        ```yaml
        current_wave: 2
        total_waves: 3
        wave_tickets:
          wave_1: [T_001, T_002, T_003, T_004, T_005, T_006, T_007, T_008]
          wave_2: [T_009, T_010, T_011, T_012, T_013, T_014, T_015, T_016]
          wave_3: [T_017, T_018, T_019, T_020, T_021, T_022]
        ```

        CLI SESSION SPAWN (preferred for deterministic management):
        ```bash
        agentic orchestrate session spawn --role <resolved-agent> --epic <epic_folder_path> -j
        ```

        Context provided automatically via CCI (JIT-loaded per phase):
        1. Phase-specific context from TinyDB (loaded on demand)
        2. Success criteria for phase
        3. Relevant input files
        4. Timeout based on phase complexity

        FENCE: UAT VALIDATION GATE
        Before executing any UAT phase, the executor MUST validate that user stories
        have complete content. This prevents UAT tasks from running against empty
        or incomplete story definitions.

        VALIDATION CHECKLIST:
        1. Read affected_stories from plan metadata
        2. For each story ID:
           a. Verify story file exists: docs/userstories/<project>/NN_category.yml
           b. Verify story has success_criteria field (list, non-empty)
           c. Verify story has journey field (list, non-empty)
           d. Verify story has testing field (dict with local/docker keys)

        3. If ANY story fails validation, STOP UAT execution and report:
           "UAT VALIDATION GATE FAILURE

           Cannot execute UAT phase - story content incomplete or missing.

           Failed stories:
           - <story_id>: <reason>

           REQUIRED ACTION:
           Fix story content before UAT execution. Stories must have complete
           success_criteria, journey, and testing fields."

        4. If all stories validate, proceed with UAT phase execution

        NOTE: This gate exists to catch the case where planning approved incomplete
        stories. It's a safety net, not a substitute for proper story generation
        during planning.

        STORY CONTEXT FOR UAT PHASES:
        When spawning agents for UAT-type phases, include story context:
        - Pass affected_stories from plan metadata to the spawned agent
        - Reference specific story files from docs/userstories/
        - Enable agents to update story test_status after validation
        - Story IDs map to acceptance criteria that define UAT success

        MANDATE: Use CLI session commands for agent spawning.
        This ensures proper CCI bootstrap and state tracking.
        Agent is spawned as session, execution waits for completion.

    - id: "loop_batched_polling"
      name: "Batched Agent Polling"
      description: |
        MANDATE: Do NOT poll all agents in a single turn.

        When multiple agents are running concurrently, poll them in batches
        to prevent context overflow from accumulated retrieval payloads.

        BATCHED POLLING PROTOCOL:
        1. Set POLL_BATCH_SIZE = 5 (default, configurable via epic metadata)
        2. Maintain a list of waiting_agents (agents spawned but not yet complete)
        3. Each poll turn:
           a. Select next POLL_BATCH_SIZE agents from waiting_agents (round-robin)
           b. Poll selected agents for status/output
           c. For each agent response, apply output summarisation (loop_collect_output)
           d. Write summarised outcomes to execution_state.yml (state file)
           e. Remove completed agents from waiting_agents
        4. On next poll turn:
           a. Read execution_state.yml summary (compact, <5 KB)
           b. Do NOT re-read raw outputs from previous poll turns
           c. Select next batch from remaining waiting_agents
        5. Repeat until waiting_agents is empty

        CONTEXT IMPACT:
        With POLL_BATCH_SIZE=5 and ~35 KB raw output per agent:
        - Per-turn raw injection: 5 × 35 KB = 175 KB (before summarisation)
        - After summarisation: 5 × 1 KB = 5 KB retained in context
        - Compared to polling all 22 agents: 770 KB → 5 KB per turn (154× reduction)

        FENCE: POLL BATCH SIZE CONSTRAINT
        Never poll more than POLL_BATCH_SIZE agents in a single reasoning turn.
        This is the primary mechanism preventing context overflow during execution.

    - id: "loop_collect_output"
      name: "Collect and Summarise Agent Output"
      description: |
        Receive output from spawned agent and IMMEDIATELY summarise to a fixed-size
        outcome record. Do NOT retain full agent output text in context.

        CONTEXT MANAGEMENT MANDATE:
        Raw agent outputs can be ~35 KB each. With multiple concurrent agents, retaining
        full outputs causes context overflow. Summarise BEFORE any further reasoning.

        SUMMARISATION PROTOCOL:
        1. Parse execution result (success/failure) from agent output
        2. Extract key artifacts and ticket completions
        3. Produce a compact outcome record (target: <1 KB per agent):

           ```yaml
           outcome: success | failure | in_progress
           key_artifacts:
             - "path/to/file1.py"
             - "path/to/file2.py"
           ticket_ids_completed:
             - "teach_01"
             - "teach_02"
           errors: "truncated error message (max 500 chars)"
           agent_id: "<session_id>"
           phase_id: "<phase_name>"
           poll_cycle: <integer>
           ```

        4. DISCARD the full agent output after summarisation
        5. Write the outcome record to the execution state file
           (see state_offload step for file location)
        6. Check for feedback trigger conditions using the SUMMARY only

        FENCE: CONTEXT SIZE CONSTRAINT
        After summarisation, the outcome record MUST be ≤1 KB.
        Full agent output text MUST NOT persist in executor context.
        If the agent output cannot be parsed, capture the first 500 chars
        as the error field and set outcome: failure.

    - id: "loop_evaluate_triggers"
      name: "Evaluate Feedback Triggers"
      description: |
        Check for FEEDBACK_TRIGGER conditions:

        TEST_FAILURE:
          - Condition: test-builder reports failing tests
          - Action: Check iteration count
            - If < MAX_ITERATIONS: Retry phase (delegate to planning for fix)
            - If >= MAX_ITERATIONS: Transition to blocked, ask user

        BUILD_FAILURE:
          - Condition: build agent reports compilation/build errors
          - Action: Delegate to orchestration-planning with BUILD_FAILURE context

        CICD_FAILURE:
          - Condition: deploy-cicd reports CI/CD issues
          - Action: Delegate to orchestration-planning with CICD_FAILURE context

        AUDIT_FAILURE:
          - Condition: test-audit reports issues
          - Action: Invoke audit-test-fix-loop per agent-loops.yml

        STORY_REGRESSION:
          - Condition: UAT agent reports a previously-passing story now fails
          - Action: Check iteration count
            - If < MAX_ITERATIONS: Retry with regression context (story ID + previous pass evidence)
            - If >= MAX_ITERATIONS: Transition to blocked with regression details
          - Note: Story regressions are high-priority - they indicate broken user journeys

        ERROR_REQUIRES_PLANNING:
          - Condition: Agent reports out-of-scope error requiring new planning session
            (output contains out_of_scope_error: true or remediation_plan_needed: true)
          - Action:
            - If agent already created planning folder: Log in remediation_plans_spawned
            - If agent did not create folder: Create via `agentic epic new`
            - If CRITICAL priority: Transition to blocked, ask user whether to continue or address first
            - If HIGH/MEDIUM/LOW: Log in remediation_plans_spawned, continue execution
          - Note: Unlike TEST_FAILURE/BUILD_FAILURE which re-plan the current plan,
            this trigger spawns a SEPARATE planning folder for future remediation.
            Out-of-scope errors do NOT consume loop iterations.
          - Reference: modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml

        STORY_COVERAGE_INCOMPLETE:
          - Condition: After a test phase completes, check pytest marker coverage
            against the epic's affected_stories list. Coverage is incomplete when
            any story in affected_stories has no corresponding @pytest.mark.story("<story_id>")
            marker in the test files produced by the phase.
          - Detection:
            1. Sync the story-test index: `agentic stories sync`
            2. Check coverage: `agentic stories coverage --project <project> -j`
            3. Parse JSON output: uncovered stories are in the "uncovered" array
            4. If uncovered is non-empty, this trigger fires
          - Action: Check iteration count (MAX_ITERATIONS default: 3 for story coverage)
            - If < MAX_ITERATIONS: Re-spawn test-builder with context:
              - uncovered_story_ids: list of story IDs without pytest markers
              - story_content: story acceptance criteria for uncovered stories
              - instruction: "Add @pytest.mark.story('<story_id>') markers to tests
                validating these stories. Create new tests if no existing test covers
                the story's acceptance criteria."
              Example CLI re-spawn:
              ```bash
              agentic orchestrate session spawn --role test-builder --epic <epic_folder> -j
              # Pass uncovered story IDs and acceptance criteria as session context
              ```
            - If >= MAX_ITERATIONS: Transition to blocked with coverage report:
              "STORY COVERAGE INCOMPLETE after {iterations} attempts.
               Uncovered stories: [IDs]
               Coverage: N/M stories covered (X%)"
          - Note: This trigger fires AFTER test phase completion, not during.
            It is evaluated alongside TEST_FAILURE but has its own iteration counter.
            Story coverage iterations do NOT consume TEST_FAILURE iterations.
          - Exit condition: All affected stories have @pytest.mark.story markers in test files

        If NO triggers fire, proceed to phase completion.

    - id: "loop_complete_phase"
      name: "Complete Phase"
      description: |
        On successful agent completion with no triggers:
        1. Update TinyDB phase status to completed:
           `agentic epic ticket complete <phase_id> --epic <folder>`
        2. Record completed_at timestamp
        3. Record agent_used

        Proceed to next phase in loop.

    - id: "loop_handle_failure"
      name: "Handle Phase Failure"
      description: |
        On unrecoverable failure or max iterations:
        1. Update status to failed or blocked
        2. Document failure reason
        3. Prepare escalation context
        4. If blocked: Await user input
        5. If failed: Require re-planning before retry

    # =========================================================================
    # PHASE 2.5: VALIDATION GATE (MANDATORY)
    # =========================================================================
    - id: "validation_gate"
      name: "Validation Phase Gate"
      description: |
        FENCE: Before proceeding to shutdown, verify ALL validation phases have executed.

        This gate ensures validation phases cannot be bypassed even if they
        are missing from TinyDB phase records (which would be a planning gap).

        VALIDATION GATE PROCESS:
        1. Query TinyDB for phases whose name contains "Validation" or "Audit":
           `agentic -j epic ticket list --epic {epic_folder_name}`
        2. For each validation phase, verify it was executed (status != pending)
        3. For each executed validation phase, verify result = PASS
        4. If ANY validation phase was skipped → BLOCK shutdown
        5. If ANY validation result != PASS → Return to fix phase

        STORY VALIDATION CHECK (references planning-standard.yml#escape_hatch_rules):
        6. If plan has affected_stories (from design_context.yml in epic folder,
           or via `agentic stories report --project <project> --coverage`):
           a. FENCE: Filter affected_stories by lifecycle before coverage check.
              Only stories with lifecycle "under-construction" or "implemented" are checked.
              Stories with lifecycle "proposal", "deprecated", or "archived" are excluded.
           b. Verify UAT phase validated those specific stories
           c. Check story test results are captured (test_status field in story YAML
              AND @pytest.mark.story markers in test files — markers are PRIMARY)
           d. For "under-construction" stories: MUST have BOTH @pytest.mark.story test
              markers AND @story() production code markers (from agenticguidance.markers)
           e. FENCE: Cannot proceed to shutdown if affected stories have test_status=failed
        7. If plan has no affected_stories and no no_stories_rationale:
           a. Determine plan type from TinyDB epic metadata
           b. If plan type in blocked_plan_types (build, test) → BLOCK (not WARN)
           c. If plan type in allowed_plan_types (infrastructure, guidance, internal_tooling) → WARN (non-blocking)
           d. If plan type unknown → BLOCK (fail-safe)
        8. UAT PHASE CHECK:
           a. If affected_stories present in TinyDB epic metadata, check TinyDB for UAT phase
           b. If no UAT phase found but affected_stories exist → BLOCK
              Error: "BLOCKED: Plan has affected_stories but no UAT phase in TinyDB."
        9. STORY COVERAGE CHECK (pytest markers are PRIMARY, production code markers secondary):
           a. Run `agentic stories sync` to rebuild the TinyDB story index
           b. Scan test files for @pytest.mark.story("<story_id>") markers:
              ```bash
              agentic stories coverage -j
              ```
           c. Check production code coverage via `agentic stories code <story_id>`
           d. ALSO read test_status from story YAML as a secondary signal
              (markers are persistent and authoritative; YAML test_status may decay)
           e. Classification per story:
              - COVERED: has @pytest.mark.story marker in test files
              - CODE_TAGGED: has @story() decorator in production code
              - UNTESTED: no test marker found AND test_status=untested in YAML
              - FAILED: has marker but test_status=failed in YAML (tests exist but fail)
           f. If ANY story is UNTESTED → BLOCK
              Error: "BLOCKED: Story coverage incomplete. N/M stories have no
              @pytest.mark.story markers in test files: [IDs]"
           g. If ANY story is FAILED → BLOCK
              Error: "BLOCKED: Story tests failing. N/M stories have failing tests: [IDs]"
           h. Report coverage: "Story coverage: N/M stories covered by pytest markers (X%)
              Code coverage: N/M stories tagged with @story() decorators (X%)"
           i. NOTE: A story with a pytest marker but test_status=untested in YAML
              is considered COVERED — the marker is authoritative. The YAML field
              may not have been updated yet.

        FENCE: VALIDATION GATE
        Cannot proceed to shutdown_aggregate_status until:
        - All *_Validation_* subgraphs executed
        - All *_Audit_* subgraphs executed
        - All validation results = PASS

        BLOCKING CONDITIONS:
        - Validation_SG status = pending → BLOCK
        - Audit_SG status = pending → BLOCK
        - Any validation status = failed → Return to fix phase, do NOT proceed

        ERROR MESSAGES:
        - "BLOCKED: Validation phase was not executed. Add phase with agent routing to TinyDB."
        - "BLOCKED: Audit phase was skipped. Cannot commit without audit."
        - "FAILED: Validation phase returned FAIL. Cannot proceed to commit."

      fence: |
        FENCE: NO SHUTDOWN WITHOUT VALIDATION
        This gate MUST run before any shutdown sequence step.
        Skipping this gate is a fence violation.
        Validation phases are identified by querying TinyDB, not by scanning MMD files.

    # =========================================================================
    # PHASE 2.6: INTEGRATION SMOKE TEST GATE (CLI command verification)
    # =========================================================================
    - id: "integration_smoke_test_gate"
      name: "Integration Smoke Test Gate"
      description: |
        FENCE: Before marking plan complete, verify CLI commands actually work
        by running the installed binary. This gate prevents plans from completing
        with broken CLI commands that passed mocked UAT.

        HISTORICAL CONTEXT:
        Plans 260214PF, 260214TG, 260214US passed UAT with mocked subprocess
        tests but the actual `agentic` command was broken. Mocked tests provide
        false confidence - they validate test code, not production behavior.

        DETECTION CRITERIA:
        This gate applies if:
        1. Plan modified files in modules/AgenticCLI/src/agenticcli/commands/
        2. Plan's impacted_files include any *.py files under agenticcli/commands/
        3. Plan objective or description mentions CLI command creation/modification
        4. Plan has affected_stories matching US-CLI-* pattern

        If NONE of these apply, skip this gate (not a CLI plan).

        EXECUTION STEPS (when gate applies):
        1. Identify CLI commands modified or created by this plan:
           - Read impacted_files from plan metadata
           - Extract command names from file paths (e.g., commands/orchestrate.py -> orchestrate)

        2. For EACH identified command, run smoke test:
           a. Execute: agentic <command> --help
              - Verify returncode == 0
              - Verify help text contains command description

           b. Execute: agentic <command> <minimal-args> --no-tmux
              - Use --no-tmux to avoid interactive mode
              - Minimal args = simplest valid invocation
              - Examples:
                * agentic orchestrate session plan --no-tmux
                * agentic epic list
                * agentic orchestrate session list
              - Verify returncode == 0 OR expected error code (not crash)
              - Verify stderr is empty OR contains expected validation messages

        3. Document smoke test results:
           - command_name: string
           - help_test: pass/fail
           - smoke_test: pass/fail
           - error_details: string (if failed)

        FAILURE HANDLING:
        If ANY smoke test fails:
        1. Transition plan to BLOCKED status
        2. Report failure details:
           "INTEGRATION SMOKE TEST FAILURE

           Command: agentic <command>
           Test: <help_test|smoke_test>
           Error: <error_output>

           The CLI command was modified but does not execute correctly.
           This indicates a gap between UAT (which passed with mocks) and
           actual runtime behavior.

           REQUIRED ACTION:
           - Verify the command is properly registered in CLI router
           - Check for import errors or missing dependencies
           - Test command locally: agentic <command> --help
           - Fix the issue and resume execution"

        3. Do NOT proceed to shutdown_aggregate_status
        4. Await user intervention or remediation plan

        PASS CRITERIA:
        - All identified commands pass --help test
        - All identified commands pass minimal smoke test
        - No crashes, no import errors, no registration failures

        SKIP CONDITIONS:
        - Plan did not modify CLI commands (detection criteria not met)
        - Plan metadata has integration_smoke_test: "skip" with rationale
        - Plan is guidance-only or test-only with no CLI changes

      fence: |
        FENCE: CLI INTEGRATION SMOKE TEST GATE
        This gate MUST run before shutdown_aggregate_status for CLI plans.
        Skipping this gate allows broken CLI commands to reach completion.

        UAT with mocked subprocesses is NOT sufficient to validate CLI commands.
        The installed binary MUST be executed to verify real-world behavior.
    - id: "shutdown_aggregate_status"
      name: "Aggregate Final Status"
      description: |
        After all phases processed:
        1. Count completed, failed, blocked phases
        2. Determine overall execution status:
           - All completed -> "completed"
           - Any blocked -> "blocked"
           - Any failed (not blocked) -> "failed"

    - id: "shutdown_generate_report"
      name: "Generate Execution Report"
      description: |
        Create summary report with:
        - Overall status
        - Per-phase status and timestamps
        - Agents used per phase
        - Any warnings or issues
        - Feedback triggers that fired
        - Remediation plans spawned (from ERROR_REQUIRES_PLANNING triggers):
          list each plan_name, error_type, priority, and spawned_by agent.
          These require follow-up orchestration and are NOT auto-executed.

    - id: "shutdown_persist_state"
      name: "Persist Final State"
      description: |
        Ensure state is durably stored:
        1. Final TinyDB phase status updates (all phases marked completed, failed, or blocked)
        2. Update execution_state.yml with final status and summary
        3. Archive completed epic if all phases are done:
           `agentic epic archive --epic <folder> --force`

        STATE FILE CLEANUP:
        The execution_state.yml file remains in the epic folder as an execution
        audit trail. It is NOT deleted on shutdown. Archived epics retain their
        state files for post-mortem analysis.

    - id: "shutdown_return"
      name: "Return Execution Result"
      description: |
        Return to caller:
        - execution_status: completed | blocked | failed
        - phase_report: Per-phase status details
        - state_updates: Files modified

  # =============================================================================
  # FALLBACK BEHAVIORS
  # =============================================================================
  fallbacks:
    missing_agent_routing: |
      If phase.agent field is missing from a TinyDB phase record:
      1. Attempt inference from phase names (Build* -> builder, Test* -> tester)
      2. If inference fails, transition to blocked
      3. Ask user to add agent routing to the phase:
         `agentic epic phase add --epic <folder> --name <phase> --agent <agent-type>`

    agent_spawn_failure: |
      If routed agent fails to start:
      1. Log failure with error details
      2. Check if alternate agent available (e.g., builder fallback)
      3. If no fallback, transition to blocked
      4. Ask user for resolution

    phase_data_incomplete: |
      If TinyDB phase records are missing required fields:
      1. Log which fields are missing
      2. Use TinyDB as the authoritative source of truth for all phase data
      3. If critical fields absent (agent, status), transition to blocked
      4. Ask user to update phase records via CLI:
         `agentic epic phase add --epic <folder> --name <phase> --agent <agent-type>`

  # =============================================================================
  # GUIDELINES
  # =============================================================================
  guidelines:
    # CLI-FIRST CONTEXT PRINCIPLE
    - "CLI-First Context: Always use agentic CLI commands for initial context. Agents should not need Read/Glob/Grep tools during bootstrap phase."
    - "All context retrieval should flow through CCI (CLI Context Injection) commands before any file exploration"
    # CLI MANDATE FOR TICKET MANAGEMENT
    - "NEVER use Edit tool to change ticket status in TinyDB epic files"
    - "ALWAYS use `agentic epic ticket start <ticket_id> --epic <folder>` when beginning a ticket"
    - "ALWAYS use `agentic epic ticket complete <ticket_id> --epic <folder>` when finishing a ticket"
    - "CLI auto-archives epic when completing the last ticket - do NOT manually archive"
    - "NEVER use rm or mv commands on epic folders - CLI handles all file operations"
    # ORCHESTRATION WORKFLOW
    - "Standard workflow: get ticket → start → spawn agent → complete"
    - "  1. `agentic epic ticket current --epic <folder>` to get next ticket"
    - "  2. `agentic epic ticket start <ticket_id> --epic <folder>` before spawning agent"
    - "  3. Spawn appropriate agent for the ticket"
    - "  4. `agentic epic ticket complete <ticket_id> --epic <folder>` when agent succeeds"
    # EXECUTION RULES
    - "Execute phases in order defined by TinyDB phase records (ordered by phase sequence)"
    - "Only spawn agents listed in manifest spawns fence"
    - "Persist state after every phase transition"
    - "Honor MAX_ITERATIONS before escalation"
    - "Never skip failed phases without user approval"
    - "Document all feedback trigger firings"
    # CONTEXT MANAGEMENT RULES
    - "FENCE: MAX_CONCURRENT_AGENTS=8 — never spawn more than 8 agents simultaneously"
    - "FENCE: POLL_BATCH_SIZE=5 — never poll more than 5 agents per reasoning turn"
    - "FENCE: Output summarisation — summarise agent output to ≤1 KB before retaining in context"
    - "FENCE: State offload — write execution state to execution_state.yml, not accumulated context"
    - "FENCE: JIT loading — load ticket details per-phase, not all at startup"
    - "FENCE: Execute ALL validation/audit phases BEFORE any commit"
    - "FENCE: Do NOT commit if any validation phase was skipped or failed"
    - "FENCE: Validation phases without agent routing in TinyDB = blocked workflow, ask user"
    - "FENCE: Complete ALL tasks (including LOW priority) before shutdown per orchestration-policy.yml"
    # CLI ERROR RECOVERY (DOGFOOD RULE)
    - "DOGFOOD RULE: If ANY agentic command exits non-zero, follow modules/AgenticGuidance/assets/guidelines/cli-error-recovery.yml"
    - "FENCE: Do NOT continue execution while CLI is broken. Diagnose, create remediation plan, fix, verify, then resume."
