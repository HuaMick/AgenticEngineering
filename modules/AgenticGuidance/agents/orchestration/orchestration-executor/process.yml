process:
  goal: |
    Execute pre-approved plans by reading Plan-MMD flowcharts and dynamically
    routing to appropriate agents based on AGENT_ROUTING metadata.

  profile: "orchestrator"

  specification_reference: |
    Full behavior specification: modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml
    This process implements the execution protocol from Section 6 of the specification.

  inputs:
    - location: "modules/AgenticGuidance/agents/orchestration/orchestration-executor/inputs.yml"
      description: "Executor inputs including specification and schema references"

  outputs:
    - name: "execution_status"
      values: ["completed", "blocked", "failed"]
      description: "Final execution outcome"
    - name: "phase_report"
      description: "Status of each phase with timestamps"
    - name: "state_updates"
      description: "Updated STATUS in MMD header and plan YAML files"

  # =============================================================================
  # EXECUTION PROTOCOL
  # =============================================================================
  # Three phases: Startup -> Phase Execution Loop -> Shutdown
  # =============================================================================

  steps:
    # =========================================================================
    # CCI BOOTSTRAP (CLI Context Injection) - Run FIRST
    # =========================================================================
    - id: "cci_bootstrap"
      name: "CCI Bootstrap (CLI Context Injection)"
      description: |
        Execute these commands to get structured context efficiently:

        ```bash
        # Get seed context (objective, process summary, inputs)
        agentic context bootstrap --role orchestration-executor -j

        # Get current task if working from a plan
        agentic plan task current -j
        ```

        CLI output provides:
        - Your objective and process summary
        - Input file paths to read
        - Current task details (if plan exists)

        ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
        DO NOT explore the codebase before running these commands.

        CLI SESSION MANAGEMENT (for parallel execution):
        When spawning agents for phase execution, use CLI session commands:
        ```bash
        # Spawn a Claude Code session for an agent role
        agentic session spawn --role <agent-role> --plan <plan-folder> -j

        # Check session status
        agentic session status <session-id> -j

        # List active sessions
        agentic session list -j
        ```

        CLI LOOP MANAGEMENT (for iterative workflows):
        When starting test-fix or build-validate loops, use CLI loop commands:
        ```bash
        # Start a Ralph Loop
        agentic loop start <loop-type> --plan <plan-folder> -j

        # Check loop status
        agentic loop status <loop-id> -j
        ```

        MANDATE: Use CLI for all session/loop state management.
        CLI provides deterministic process control and state persistence.

        CLI ENTRYPOINT BOOTSTRAP (for session context):
        When starting a session with pre-defined context, use entrypoint commands:
        ```bash
        # Execute entrypoint to load session context
        agentic entrypoint execute <entrypoint_name> [--vars KEY=VAL]
        ```
        Entrypoints provide templated context for common agent session patterns.
        Use `agentic entrypoint list` to see available entrypoints.

    # =========================================================================
    # PHASE 1: STARTUP SEQUENCE
    # =========================================================================
    - id: "startup_validate_inputs"
      name: "Validate Required Inputs"
      description: |
        REQUIRED INPUTS (from inputs.yml):
        1. plan_folder_path (string, required)
           - Path to plan folder with YAML and MMD files
           - ERROR if missing: "STOP: No plan_folder_path provided."

        2. target_project_path (string, required)
           - Absolute path to target project
           - ERROR if missing: "STOP: No target_project_path provided."

        If ANY required input is missing, report error and STOP.

    - id: "startup_load_mmd"
      name: "Discover and Load Plan-MMD File"
      description: |
        PATH SEMANTICS:
        - Input: plan_folder_path = the plan folder (e.g., "docs/plans/260110Repo_feature")
        - The executor INTERNALLY appends /live/ to find files
        - Files are located at: <plan_folder_path>/live/orchestration_*.mmd

        MMD DISCOVERY PROCESS:
        1. Construct search path: {plan_folder_path}/live/
        2. Search for orchestration_*.mmd file in that directory
        3. If multiple .mmd files found, use the one matching plan_id pattern
        4. If NO .mmd file found: ERROR "No orchestration MMD found in {plan_folder_path}/live/"

        MMD PARSING:
        5. Parse Mermaid flowchart structure
        6. Extract metadata comments:
           - GOAL: Plan objective
           - PROFILE: Should be "orchestrator"
           - PHASES: List of phase names
           - AGENT_ROUTING: Phase-to-agent mappings (e.g., "Build -> builder")
           - FEEDBACK_TRIGGER: Trigger-to-target mappings
           - STATUS: Current phase statuses
           - LOOP_DEFINITION: Reference to agent-loops.yml
           - MAX_ITERATIONS: Retry limit

        ERROR if MMD file not found or malformed.

    - id: "startup_load_yaml"
      name: "Load Plan YAML File"
      description: |
        1. Locate plan_*.yml in {plan_folder_path}/live/ (same directory as MMD)
        2. Parse phases and tasks
        3. Extract success criteria
        4. Verify alignment with MMD phases

        ERROR if YAML not found or phases don't match MMD.

    - id: "startup_validate_mmd"
      name: "Validate MMD Structure"
      description: |
        Validate against plan-mmd-schema.yml:
        1. All required metadata present
        2. AGENT_ROUTING format valid (Phase -> agent_type)
        3. Routed agent types in manifest spawns fence
        4. FEEDBACK_TRIGGER targets exist in flowchart
        5. LOOP_DEFINITION references valid loops

        ERROR with specific validation failures if invalid.

    - id: "startup_determine_resume"
      name: "Determine Resume Point"
      description: |
        Parse STATUS metadata to find execution state:
        1. Find first phase with status != completed
        2. If all completed, execution is done
        3. If in_progress found, resume that phase
        4. If failed found, check for re-planning flag

        Output: resume_phase (name of phase to start/resume)

    # =========================================================================
    # PHASE 2: PHASE EXECUTION LOOP
    # =========================================================================
    - id: "loop_start"
      name: "Begin Phase Execution Loop"
      description: |
        For each phase from resume_point to end:
          1. Transition phase to in_progress
          2. Resolve agent routing
          3. Spawn agent with context
          4. Collect agent output
          5. Evaluate feedback triggers
          6. Complete or handle failure

    - id: "loop_transition_status"
      name: "Transition Phase Status"
      description: |
        Update status from pending -> in_progress:
        1. Update MMD STATUS header
        2. Update plan YAML phase status
        3. Record started_at timestamp

        CONSTRAINT: Only ONE phase may be in_progress at a time.

    - id: "loop_resolve_routing"
      name: "Resolve Agent Routing"
      description: |
        Parse AGENT_ROUTING to find agent for current phase:
        1. Extract routing: "Phase_Name -> agent_type"
        2. Resolve agent_type to specific agent:
           - builder -> build-python (default) or build-flutter (Flutter projects)
           - tester -> test-runner (execution) or test-guidance-simulator (guidance)
           - deployer -> deploy-cicd or deploy-worktree
           - teacher -> teacher-update-guidance or teacher-update-assets
           - cleaner -> planner-cleaning
           - auditor -> test-audit or test-final-output
           - planner -> orchestration-planning

        3. Validate resolved agent is in manifest spawns fence

        FALLBACK if routing missing:
          - Check phase name for hints (Test* -> tester, Build* -> builder)
          - If still unknown, transition to blocked and ask user

    - id: "loop_spawn_agent"
      name: "Spawn Routed Agent"
      description: |
        Invoke the resolved agent with context using CLI session commands:

        CLI SESSION SPAWN (preferred for deterministic management):
        ```bash
        agentic session spawn --role <resolved-agent> --plan <plan_folder_path> -j
        ```

        Context provided automatically via CCI:
        1. Phase-specific context from plan YAML
        2. Success criteria for phase
        3. Relevant input files
        4. Timeout based on phase complexity

        MANDATE: Use CLI session commands for agent spawning.
        This ensures proper CCI bootstrap and state tracking.
        Agent is spawned as session, execution waits for completion.

    - id: "loop_collect_output"
      name: "Collect Agent Output"
      description: |
        Receive output from spawned agent:
        1. Parse execution result (success/failure)
        2. Capture any artifacts produced
        3. Note any warnings or issues
        4. Check for feedback trigger conditions

    - id: "loop_evaluate_triggers"
      name: "Evaluate Feedback Triggers"
      description: |
        Check for FEEDBACK_TRIGGER conditions:

        TEST_FAILURE:
          - Condition: test-runner reports failing tests
          - Action: Check iteration count
            - If < MAX_ITERATIONS: Retry phase (delegate to planning for fix)
            - If >= MAX_ITERATIONS: Transition to blocked, ask user

        BUILD_FAILURE:
          - Condition: build agent reports compilation/build errors
          - Action: Delegate to orchestration-planning with BUILD_FAILURE context

        CICD_FAILURE:
          - Condition: deploy-cicd reports CI/CD issues
          - Action: Delegate to orchestration-planning with CICD_FAILURE context

        GUIDANCE_GAP:
          - Condition: test-guidance-simulator reports missing guidance
          - Action: Invoke guidance-test-loop per agent-loops.yml

        AUDIT_FAILURE:
          - Condition: test-audit or test-final-output reports issues
          - Action: Invoke audit-test-fix-loop per agent-loops.yml

        If NO triggers fire, proceed to phase completion.

    - id: "loop_complete_phase"
      name: "Complete Phase"
      description: |
        On successful agent completion with no triggers:
        1. Update MMD STATUS: Phase_Name=completed
        2. Update plan YAML: phase.status = "completed"
        3. Record completed_at timestamp
        4. Record agent_used

        Proceed to next phase in loop.

    - id: "loop_handle_failure"
      name: "Handle Phase Failure"
      description: |
        On unrecoverable failure or max iterations:
        1. Update status to failed or blocked
        2. Document failure reason
        3. Prepare escalation context
        4. If blocked: Await user input
        5. If failed: Require re-planning before retry

    # =========================================================================
    # PHASE 2.5: VALIDATION GATE (MANDATORY)
    # =========================================================================
    - id: "validation_gate"
      name: "Validation Phase Gate"
      description: |
        FENCE: Before proceeding to shutdown, verify ALL validation phases have executed.

        This gate ensures validation phases cannot be bypassed even if they
        are missing from AGENT_ROUTING (which would be a schema violation).

        VALIDATION GATE PROCESS:
        1. Scan MMD for subgraphs containing "Validation" or "Audit" in name
        2. For each validation subgraph, verify it was executed (status != pending)
        3. For each executed validation, verify result = PASS
        4. If ANY validation subgraph was skipped → BLOCK shutdown
        5. If ANY validation result != PASS → Return to fix phase

        FENCE: VALIDATION GATE
        Cannot proceed to shutdown_aggregate_status until:
        - All *_Validation_* subgraphs executed
        - All *_Audit_* subgraphs executed
        - All validation results = PASS

        BLOCKING CONDITIONS:
        - Validation_SG status = pending → BLOCK
        - Audit_SG status = pending → BLOCK
        - Any validation status = failed → Return to fix phase, do NOT proceed

        ERROR MESSAGES:
        - "BLOCKED: Validation phase 'Validation_SG' was not executed. Add AGENT_ROUTING entry."
        - "BLOCKED: Audit phase 'Audit_SG' was skipped. Cannot commit without audit."
        - "FAILED: Validation phase returned FAIL. Cannot proceed to commit."

      fence: |
        FENCE: NO SHUTDOWN WITHOUT VALIDATION
        This gate MUST run before any shutdown sequence step.
        Skipping this gate is a fence violation.

    # =========================================================================
    # PHASE 3: SHUTDOWN SEQUENCE
    # =========================================================================
    - id: "shutdown_aggregate_status"
      name: "Aggregate Final Status"
      description: |
        After all phases processed:
        1. Count completed, failed, blocked phases
        2. Determine overall execution status:
           - All completed -> "completed"
           - Any blocked -> "blocked"
           - Any failed (not blocked) -> "failed"

    - id: "shutdown_generate_report"
      name: "Generate Execution Report"
      description: |
        Create summary report with:
        - Overall status
        - Per-phase status and timestamps
        - Agents used per phase
        - Any warnings or issues
        - Feedback triggers that fired

    - id: "shutdown_persist_state"
      name: "Persist Final State"
      description: |
        Ensure state is durably stored:
        1. Final MMD STATUS header update
        2. Final plan YAML updates
        3. Archive completed phases if configured

    - id: "shutdown_return"
      name: "Return Execution Result"
      description: |
        Return to caller:
        - execution_status: completed | blocked | failed
        - phase_report: Per-phase status details
        - state_updates: Files modified

  # =============================================================================
  # FALLBACK BEHAVIORS
  # =============================================================================
  fallbacks:
    missing_agent_routing: |
      If AGENT_ROUTING metadata is missing:
      1. Attempt inference from phase names (Build* -> builder, Test* -> tester)
      2. If inference fails, transition to blocked
      3. Ask user to provide routing or update MMD

    agent_spawn_failure: |
      If routed agent fails to start:
      1. Log failure with error details
      2. Check if alternate agent available (e.g., builder fallback)
      3. If no fallback, transition to blocked
      4. Ask user for resolution

    yaml_mmd_desync: |
      If plan YAML and MMD phases don't align:
      1. Log discrepancy
      2. Use plan YAML as source of truth for task details
      3. Use MMD for routing and flow
      4. If critical mismatch, transition to blocked

  # =============================================================================
  # GUIDELINES
  # =============================================================================
  guidelines:
    # CLI-FIRST CONTEXT PRINCIPLE
    - "CLI-First Context: Always use agentic CLI commands for initial context. Agents should not need Read/Glob/Grep tools during bootstrap phase."
    - "All context retrieval should flow through CCI (CLI Context Injection) commands before any file exploration"
    # CLI MANDATE FOR TASK MANAGEMENT
    - "NEVER use Edit tool to change task status in plan YAML files"
    - "ALWAYS use `agentic plan task start/complete <task_id>` for task status updates"
    - "ALWAYS use `agentic plan move folder --plan <plan_folder>` for archiving completed plans"
    - "Execute phases in order defined by MMD flowchart"
    - "Only spawn agents listed in manifest spawns fence"
    - "Persist state after every phase transition"
    - "Honor MAX_ITERATIONS before escalation"
    - "Never skip failed phases without user approval"
    - "Document all feedback trigger firings"
    - "FENCE: Execute ALL validation/audit subgraphs BEFORE any commit"
    - "FENCE: Do NOT commit if any validation phase was skipped or failed"
    - "FENCE: Validation subgraphs without AGENT_ROUTING = blocked workflow, ask user"
    - "FENCE: Complete ALL tasks (including LOW priority) before shutdown per orchestration-policy.yml"
