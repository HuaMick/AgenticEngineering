# Orchestration Agent Manifest
# Hub for orchestration agents that coordinate planning and execution workflows

category:
  definition: "assets/definitions/agent-categories.yml#orchestration"

description: |
  The orchestration agent family coordinates high-level workflows by spawning and managing
  specialized agents. Orchestration agents handle the lifecycle from planning through execution,
  including feedback loops and quality gates.

sub_agents:
  - orchestration-planning
  - orchestration-build
  - orchestration-guidance

routing_logic: |
  Route to specific orchestration sub-agents based on workflow type:
  - orchestration-planning: Planning-only workflows, produces approved plans for downstream use
  - orchestration-build: Code implementation workflows (features, bug fixes, refactoring)
  - orchestration-guidance: Guidance/context engineering workflows (agent teaching, process improvements)

  Entry patterns:
  - _plan_build.yml entrypoint → orchestration-planning (code implementation planning)
  - _plan_teach.yml entrypoint → orchestration-planning (guidance/teaching planning)
  - _orchestrate.yml entrypoint → orchestration-build or orchestration-guidance (with pre-approved plan)

  Delegation pattern:
  - orchestration-build and orchestration-guidance can delegate to orchestration-planning
  - Pre-approved plans bypass the planning delegation
  - _orchestrate.yml routes to orchestration-build (code) or orchestration-guidance (teaching) based on plan type
