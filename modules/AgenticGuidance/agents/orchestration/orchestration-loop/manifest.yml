name: orchestration-loop
description: |
  Full-lifecycle orchestration loop. Discovers all live epics, runs planning
  for epics missing TinyDB phase records, executes epics that have phases
  with agent routing, and archives completed epics. Loops until all live
  epics are completed or blocked.
version: "1.0"

purpose: |
  Orchestration-loop is the top-level orchestrator that combines planning and
  execution into a single continuous loop. Unlike orchestration-planning (plan only)
  or orchestration-executor (execute only), this agent runs the full lifecycle:

  1. Discover all live epics
  2. For epics without TinyDB phases: spawn orchestration-planning
  3. For epics with TinyDB phases and agent routing: spawn orchestration-executor
  4. Archive completed epics
  5. Repeat until all epics are completed or blocked

  SCOPE: Full lifecycle. Delegates planning to orchestration-planning and
  execution to orchestration-executor.

spawns:
  - agent: "orchestration-planning"
    purpose: "Plan creation and approval for epics missing TinyDB phase records with agent routing"
    when: "Epic has no TinyDB phases or phases lack agent routing"

  - agent: "orchestration-executor"
    purpose: "Execute approved epics that have TinyDB phases with agent routing"
    when: "Epic has TinyDB phases with agent routing and is not 100% complete"

inputs:
  - type: "file"
    path: "modules/AgenticGuidance/agents/orchestration/orchestration-loop/inputs.yml"
    description: "Loop configuration and thresholds"

outputs:
  - type: "loop_report"
    description: "Summary of all epics processed, their final status, and any blocked epics"
