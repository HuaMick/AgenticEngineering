name: orchestration-loop
description: |
  Full-lifecycle orchestration loop. Discovers all live plans, runs planning
  for plans missing orchestration MMDs, executes plans that have MMDs, and
  archives completed plans. Loops until all live plans are completed or blocked.
version: "1.0"

purpose: |
  Orchestration-loop is the top-level orchestrator that combines planning and
  execution into a single continuous loop. Unlike orchestration-planning (plan only)
  or orchestration-executor (execute only), this agent runs the full lifecycle:

  1. Discover all live plans
  2. For plans without MMDs: spawn orchestration-planning
  3. For plans with MMDs: spawn orchestration-executor
  4. Archive completed plans
  5. Repeat until all plans are completed or blocked

  SCOPE: Full lifecycle. Delegates planning to orchestration-planning and
  execution to orchestration-executor.

spawns:
  - agent: "orchestration-planning"
    purpose: "Plan creation and approval for plans missing orchestration MMDs"
    when: "Plan has no orchestration_*.mmd file"

  - agent: "orchestration-executor"
    purpose: "Execute approved plans that have orchestration MMDs"
    when: "Plan has orchestration_*.mmd file and is not 100% complete"

inputs:
  - type: "file"
    path: "modules/AgenticGuidance/agents/orchestration/orchestration-loop/inputs.yml"
    description: "Loop configuration and thresholds"

outputs:
  - type: "loop_report"
    description: "Summary of all plans processed, their final status, and any blocked plans"
