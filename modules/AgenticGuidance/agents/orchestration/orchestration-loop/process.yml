process:
  goal: |
    Run the full orchestration lifecycle: discover all live epics, plan those
    missing TinyDB phases, execute those with phases, archive completed epics,
    and loop until all epics are done or blocked.

  profile: "orchestrator"

  inputs:
    - location: "modules/AgenticGuidance/agents/orchestration/orchestration-loop/inputs.yml"
      description: "Loop configuration and thresholds"

  outputs:
    - name: "loop_report"
      description: "Summary of all epics processed with final status"

  steps:
    # =========================================================================
    # CCI BOOTSTRAP
    # =========================================================================
    - id: "cci_bootstrap"
      name: "CCI Bootstrap"
      description: |
        Execute bootstrap commands to get structured context:
        ```bash
        agentic --version && agentic epic list
        agentic --json epic list
        agentic --json epic ticket current
        ```
        If ANY command fails, follow DOGFOOD RULE immediately:
        Reference: modules/AgenticGuidance/assets/guidelines/cli-error-recovery.yml

    # =========================================================================
    # DISCOVERY
    # =========================================================================
    - id: "discovery"
      name: "Discover Epic Status"
      description: |
        For each live epic, classify its state:

        1. Run: `agentic --json epic list`
        2. For each epic, check TinyDB phase records:
           - `agentic --json epic status <folder>`
           - If status shows 100% complete -> ARCHIVE
           - If epic has phases with agent routing -> EXECUTE
           - If epic has no phases or phases lack routing -> PLAN

        Classify each epic:
        - 100% complete -> ARCHIVE (run: `agentic epic archive --epic <folder> --force`)
        - Has TinyDB phases with agent routing -> EXECUTE
        - No TinyDB phases or routing missing -> PLAN

        QUESTION GATE (MANDATORY): Before processing any epic:
        `agentic epic ticket list --epic <folder>`
        If pending blocking questions exist, mark epic as BLOCKED and skip.

    # =========================================================================
    # PLANNING PASS
    # =========================================================================
    - id: "planning_pass"
      name: "Plan All Unplanned"
      description: |
        For each epic classified as PLAN (no TinyDB phases with agent routing):

        Launch orchestration-planning via CLI:
        ```bash
        agentic orchestrate session plan --plan <folder>
        ```

        Or spawn as a session:
        ```bash
        agentic orchestrate session spawn --role orchestration-planning --epic <folder> -b --dangerously-skip-permissions
        ```

        After planning completes, re-classify the epic (it should now have TinyDB phases with agent routing).

    # =========================================================================
    # EXECUTION PASS
    # =========================================================================
    - id: "execution_pass"
      name: "Execute All Planned"
      description: |
        For each epic classified as EXECUTE (has TinyDB phases with agent routing):

        Launch orchestration-executor via CLI:
        ```bash
        agentic orchestrate session implement --plan <folder>
        ```

        Or spawn as a session:
        ```bash
        agentic orchestrate session spawn --role orchestration-executor --epic <folder> -b --dangerously-skip-permissions
        ```

        PARALLELISM RULES:
        - Guidance-only epics: safe to run in parallel
        - Build epics: run sequentially (shared files)

        After execution completes, check epic status.

    # =========================================================================
    # ARCHIVE PASS
    # =========================================================================
    - id: "archive_pass"
      name: "Archive Completed Epics"
      description: |
        For each epic at 100% completion:
        ```bash
        agentic epic archive --epic <folder> --force
        ```
        This moves the epic from live/ to completed/.

    # =========================================================================
    # LOOP CHECK
    # =========================================================================
    - id: "loop_check"
      name: "Check Loop Completion"
      description: |
        After one full cycle (discover -> plan -> execute -> archive):

        1. Re-run discovery: `agentic --json epic list`
        2. If no live epics remain -> EXIT with completion promise
        3. If all remaining epics are BLOCKED -> EXIT with blocked report
        4. If iteration count >= max_loop_iterations -> EXIT with max iterations report
        5. Otherwise -> return to discovery step for another cycle

    # =========================================================================
    # SHUTDOWN
    # =========================================================================
    - id: "shutdown"
      name: "Loop Shutdown"
      description: |
        Generate final loop report:
        - Epics completed (archived)
        - Epics still in progress
        - Epics blocked (with reasons)
        - Remediation epics spawned during execution
        - Total iterations used

        Output completion promise or blocked status.

  # ===========================================================================
  # CLI ERROR RECOVERY (DOGFOOD RULE)
  # ===========================================================================
  cli_error_recovery:
    reference: "modules/AgenticGuidance/assets/guidelines/cli-error-recovery.yml"
    description: |
      CRITICAL: If ANY agentic command fails during the loop, follow the
      DOGFOOD RULE immediately. Do NOT continue the loop while CLI is broken.
      Diagnose -> create remediation plan -> fix -> verify -> resume loop.

  guidelines:
    - "CLI-First Context: Always use agentic CLI commands for context. Do not explore the codebase before running bootstrap commands."
    - "DOGFOOD RULE: If ANY agentic command exits non-zero, follow modules/AgenticGuidance/assets/guidelines/cli-error-recovery.yml"
    - "FENCE: Do NOT continue the loop while CLI is broken."
    - "NEVER use Edit tool to change ticket status in epic YAML files"
    - "ALWAYS use agentic epic ticket start/complete for status updates"
    - "ALWAYS use agentic epic archive for archiving"
    - "The --json flag is a root-level global flag: agentic --json epic list (not agentic epic list -j)"
    - "--role and --ticket are mutually exclusive on orchestrate session spawn"
    - "Guidance epics can run in parallel. Build epics must run sequentially."
    - "Complete ALL tickets (including LOW priority) before shutdown"
