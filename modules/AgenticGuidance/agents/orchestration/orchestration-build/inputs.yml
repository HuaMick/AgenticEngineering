# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# At least ONE of (approved_plan_path, planning_objective) MUST be provided.
# - approved_plan_path: Skip planning, execute pre-approved plan directly
# - planning_objective: Spawn orchestration-planning first to create plan
# ==============================================
required_inputs:
  - name: "approved_plan_path OR planning_objective"
    type: "string"
    description: "Either a path to pre-approved plan, or an objective to plan for"
    required: true
    validation: "At least one must be provided"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for resolving docs/plans/)"
    required: true
    example: "/home/code/MyProject"

inputs:
  # ==============================================
  # CLI COMMAND REFERENCE
  # ==============================================
  # Centralized CLI commands - see shared definition for full documentation
  cli_commands_reference: "modules/AgenticGuidance/assets/definitions/cli-commands.yml"
  # Key commands used by orchestration-build:
  # - agentic worktree status: Verify worktree configuration
  # - agentic plan validate: Validate plan folder structure
  # - agentic plan task start/complete: Track task progress
  # - agentic plan move tasks/folder: Archive completed work
  # ==============================================

  # ==============================================
  # PLANNING INPUT OPTIONS
  # ==============================================
  # At least one of (approved_plan_path, planning_objective) must be provided.
  # If approved_plan_path is provided, planning delegation is skipped.
  # If only planning_objective is provided, orchestration-planning is spawned.
  # ==============================================

  - name: "approved_plan_path"
    type: "string"
    required: false
    description: "Optional: Path to pre-approved plan folder from orchestration-planning"
    example: "docs/plans/live/260103_feature_xyz/"
    notes: |
      When provided, orchestration-build skips planning delegation and
      directly loads the pre-approved plan for execution. The plan folder
      must contain: plan_live_build.yml, plan_live_test.yml with status: approved.

  - name: "planning_objective"
    type: "string"
    required: false
    description: "Optional: Objective to pass to orchestration-planning if no approved plan"
    example: "Implement user authentication feature"
    notes: |
      When provided without approved_plan_path, orchestration-build spawns
      orchestration-planning to create and get approval for an implementation plan.

  - name: "failure_context"
    type: "object"
    required: false
    description: "Optional: Failure details from previous execution attempt (for re-planning)"
    schema:
      failure_type: "enum(TEST_FAILURE, CICD_FAILURE, GUIDANCE_GAP, AUDIT_FAILURE, UAT_FAILURE)"
      failure_details: "object - structured failure report"
      original_plan_path: "string - path to the plan that failed"
      iteration_count: "integer - number of re-planning attempts"
    notes: |
      When provided, orchestration-planning receives this context to inform
      plan updates. Requires planning_objective to also be provided.
      UAT_FAILURE indicates user acceptance testing failures requiring re-planning.

  # ==============================================
  # GUIDELINES AND DEFINITIONS
  # ==============================================

  - location: "modules/AgenticGuidance/assets/guidelines/fix-the-source.yml"
    description: "Fix root causes instead of symptoms."
  - location: "modules/AgenticGuidance/assets/guidelines/experiment-first.yml"
    description: "Discover and experiment first when unsure."
  - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Provide only required information, reduce noise."
  - location: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
    description: "Worktree + branching policy."
  - location: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
    description: "Iteration patterns and small-change bias."
  - location: "modules/AgenticGuidance/assets/guidelines/testing.yml"
    description: "Mandatory testing and validation guidelines."
  - location: "modules/AgenticGuidance/assets/guidelines/response-audit.yml"
    description: "Mandatory response audit guideline."
  - location: "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"
