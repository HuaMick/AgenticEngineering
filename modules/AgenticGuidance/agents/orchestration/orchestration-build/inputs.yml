inputs:
  # ==============================================
  # PLANNING INPUT OPTIONS
  # ==============================================
  # At least one of (approved_plan_path, planning_objective) must be provided.
  # If approved_plan_path is provided, planning delegation is skipped.
  # If only planning_objective is provided, orchestration-planning is spawned.
  # ==============================================

  - name: "approved_plan_path"
    type: "string"
    required: false
    description: "Optional: Path to pre-approved plan folder from orchestration-planning"
    example: "docs/plans/live/260103_feature_xyz/"
    notes: |
      When provided, orchestration-build skips planning delegation and
      directly loads the pre-approved plan for execution. The plan folder
      must contain: plan.yml, phase_build.yml, phase_test.yml with status: approved.

  - name: "planning_objective"
    type: "string"
    required: false
    description: "Optional: Objective to pass to orchestration-planning if no approved plan"
    example: "Implement user authentication feature"
    notes: |
      When provided without approved_plan_path, orchestration-build spawns
      orchestration-planning to create and get approval for an implementation plan.

  - name: "failure_context"
    type: "object"
    required: false
    description: "Optional: Failure details from previous execution attempt (for re-planning)"
    schema:
      failure_type: "enum(TEST_FAILURE, CICD_FAILURE, GUIDANCE_GAP, AUDIT_FAILURE)"
      failure_details: "object - structured failure report"
      original_plan_path: "string - path to the plan that failed"
      iteration_count: "integer - number of re-planning attempts"
    notes: |
      When provided, orchestration-planning receives this context to inform
      plan updates. Requires planning_objective to also be provided.

  # ==============================================
  # GUIDELINES AND DEFINITIONS
  # ==============================================

  - location: "assets/guidelines/fix-the-source.yml"
    description: "Fix root causes instead of symptoms."
  - location: "assets/guidelines/experiment-first.yml"
    description: "Discover and experiment first when unsure."
  - location: "assets/guidelines/context-minimisation.yml"
    description: "Provide only required information, reduce noise."
  - location: "assets/guidelines/worktree-and-branching.yml"
    description: "Worktree + branching policy."
  - location: "assets/guidelines/iteration.yml"
    description: "Iteration patterns and small-change bias."
  - location: "assets/guidelines/testing.yml"
    description: "Mandatory testing and validation guidelines."
  - location: "assets/guidelines/response-audit.yml"
    description: "Mandatory response audit guideline."
  - location: "assets/guidelines/orchestration-policy.yml"
    description: "Orchestration policy: agent-task alignment, escalation, plan status management."
  - location: "assets/definitions/plans.yml"
    description: "Plan types and locations."
  - location: "assets/definitions/agent-loops.yml"
    description: "Definition of agent loops and recursive planning."
  - location: "assets/definitions/path.yml"
    description: "Path concept: what agents read to determine next actions."
  - location: "assets/definitions/fence.yml"
    description: "Fence concept: guardrails preventing wrong work."
  - location: "assets/definitions/signpost.yml"
    description: "Signpost concept: teaching artifacts helping agents choose correctly."
  - location: "assets/definitions/signal-and-noise.yml"
    description: "Signal vs noise definitions for context quality."
  - location: "assets/definitions/agent-categories.yml"
    description: "Agent category definitions and boundaries."
  - location: "agents/planner/planner-build/manifest.yml"
    description: "Specific requirements for build planning (Architecture patterns, CI/CD)."
  - location: "docs/agent-role-scope-matrix.md"
    description: "Agent role-scope matrix for task alignment verification."
  - location: "agents/test/test-final-output/process.yml"
    description: "Final output audit process."

