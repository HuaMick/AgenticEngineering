name: orchestration-build
description: |
  Code implementation workflows including features, bug fixes, and refactoring.
  Coordinates build agents to execute implementation plans.
version: "1.0"

purpose: |
  Orchestration-build manages code implementation workflows by spawning and
  coordinating build subagents. Handles features, bug fixes, and refactoring
  tasks. Can delegate to orchestration-planning when no pre-approved plan exists,
  or execute directly when given a pre-approved plan via _execute.yml entrypoint.
