# Orchestration-Friction Inputs
# Purpose: Context for friction analysis workflow

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs may be provided by the user or default from environment.
# ==============================================
required_inputs:
  - name: "project_name"
    type: "string"
    description: "LangSmith project to analyze"
    required: false
    default_env: "CC_LANGSMITH_PROJECT"
    example: "AgenticEngineering"

  - name: "lookback_days"
    type: "integer"
    description: "Number of days to look back for traces"
    required: false
    default: 7

  - name: "limit"
    type: "integer"
    description: "Maximum number of runs to analyze"
    required: false
    default: 100

  - name: "session_count"
    type: "integer"
    description: "Number of recent sessions to analyze (overrides lookback_days when provided)"
    required: false
    default: null
    note: "When specified, queries the N most recent sessions regardless of date range"

  - name: "min_affected_sessions"
    type: "integer"
    description: "Only report patterns affecting at least this many sessions"
    required: false
    default: 2
    note: "Single-session patterns may be user error, not guidance gaps"

inputs:
  agent_type: "orchestration-friction"
  version: "1.1"

  # ========================================
  # FRICTION PATTERNS REFERENCE (SINGLE SOURCE OF TRUTH)
  # ========================================
  # All friction patterns, resolution types, and severity classifications are
  # defined in the canonical definition file. This prevents duplication and
  # ensures single source of truth.
  #
  # Contents of friction-patterns.yml:
  #   - patterns: FP-001 through FP-006 (Excessive Retries, Exploration Drift, etc.)
  #   - resolution_types: GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE
  #   - severity_classification: high, medium, low thresholds and actions
  #
  # To access these definitions in workflow:
  #   1. Read friction_patterns_definition path to get full definitions
  #   2. Or use CCI CLI: agentic context inputs for dynamic loading
  friction_patterns_definition: "modules/AgenticGuidance/assets/definitions/friction-patterns.yml"

  # ========================================
  # SESSION ANALYSIS
  # ========================================
  session_analysis:
    description: "Session-based analysis configuration"

    grouping:
      method: "session_id"
      fallback: "time_window_30min"
      note: "Uses session_id from LangSmith metadata; falls back to time-based grouping if unavailable"

    thresholds:
      min_affected_sessions: 2
      min_pattern_frequency_per_session: 1
      note: "Pattern must occur at least once in at least 2 sessions to be reported"

    filtering:
      exclude_single_session_patterns: true
      rationale: "Single-session patterns may be user error, not guidance gaps"
      exceptions:
        - "Critical severity patterns are always reported"
        - "Patterns with explicit user feedback are always reported"

  # ========================================
  # DEPENDENCIES
  # ========================================
  dependencies:
    - package: "agenticlangsmith"
      required: true
      note: "LangSmith service wrapper for trace queries"

    - env_var: "CC_LANGSMITH_PROJECT"
      required: false
      note: "Default project if not specified in input"

  # ========================================
  # OUTPUT FORMAT
  # ========================================
  output_format:
    friction_report:
      sections:
        - "summary: High-level count of patterns by severity"
        - "patterns: Detailed list of detected patterns with evidence"
        - "recommendations: Resolution suggestions with target files"
        - "next_steps: Suggested actions for user"

  # ========================================
  # RLM ENFORCEMENT
  # ========================================
  # RLM (Recursive Language Model) Enforcement Configuration
  # Reference: modules/AgenticGuidance/assets/definitions/rlm-patterns.yml
  rlm_enforcement:
    description: |
      RLM is MANDATORY for large-context friction analysis. This section defines
      thresholds, required variables, and validation checks to ensure RLM
      patterns are properly applied when processing large session datasets.

    # Thresholds that trigger mandatory RLM usage
    thresholds:
      trace_count: 100           # Number of traces that triggers mandatory RLM
      context_lines: 500         # Total lines of trace data that triggers mandatory RLM
      session_span: 5            # Number of sessions that triggers mandatory RLM
      max_recursion_depth: 5     # Maximum allowed recursion depth per rlm-patterns.yml
      max_active_variables: 10   # Maximum active context variables per rlm-patterns.yml

    # Required RLM variables that MUST be created when thresholds exceeded
    # Naming follows conventions from rlm-patterns.yml#variable_management
    required_rlm_variables:
      context_variables:
        - name: "CONTEXT_SESSIONS_RAW"
          description: "Raw session data stored as context for programmatic access"
          required_when: "session_span >= 5 OR trace_count >= 100"

        - name: "CONTEXT_SESSIONS_SUMMARIES"
          description: "Summarized session metadata for efficient scanning"
          required_when: "session_span >= 5 OR trace_count >= 100"

        - name: "CONTEXT_FRICTION_PATTERNS"
          description: "Pre-loaded friction pattern definitions from canonical source"
          required_when: "always_for_friction_analysis"

      filter_variables:
        - name: "FILTER_FP001_EXCESSIVE_RETRIES"
          description: "Sessions exhibiting FP-001 excessive retry patterns"
          required_when: "friction_detection_enabled"

        - name: "FILTER_FP002_EXPLORATION_DRIFT"
          description: "Sessions with FP-002 exploration drift behavior"
          required_when: "friction_detection_enabled"

        - name: "FILTER_FP003_MISSING_CONTEXT"
          description: "Sessions with FP-003 missing context patterns (>3 AskUserQuestion calls)"
          required_when: "friction_detection_enabled"

        - name: "FILTER_FP004_SCHEMA_VIOLATIONS"
          description: "Sessions with FP-004 output schema violation indicators"
          required_when: "friction_detection_enabled"

        - name: "FILTER_FP005_CONVENTION_VIOLATIONS"
          description: "Sessions with FP-005 naming/structure convention violations"
          required_when: "friction_detection_enabled"

        - name: "FILTER_FP006_AUTOMATABLE_PATTERNS"
          description: "Sessions with FP-006 repeated automatable tool sequences"
          required_when: "friction_detection_enabled"

      accumulator_variables:
        - name: "ACCUMULATOR_FRICTION_FINDINGS"
          description: "Accumulated friction patterns detected across all session chunks"
          required_when: "session_span >= 5 OR trace_count >= 100"

        - name: "ACCUMULATOR_RESOLUTION_RECOMMENDATIONS"
          description: "Accumulated resolution recommendations (GUIDANCE_UPDATE, CLI_OFFLOAD, ASSET_UPDATE)"
          required_when: "session_span >= 5 OR trace_count >= 100"

        - name: "ACCUMULATOR_EVIDENCE"
          description: "Accumulated evidence supporting each friction finding"
          required_when: "session_span >= 5 OR trace_count >= 100"

      final_variables:
        - name: "FINAL_FRICTION_REPORT"
          description: "Final aggregated friction report - only set after all branches complete"
          required_when: "always_for_rlm"

    # Validation checklist for RLM compliance
    rlm_compliance_checklist:
      pre_processing:
        - check: "threshold_evaluation"
          description: "Evaluate if RLM thresholds are exceeded BEFORE loading sessions"
          validation: "trace_count OR context_lines OR session_span exceeds threshold"

        - check: "context_storage"
          description: "Store session data as named context variables, not direct loading"
          validation: "CONTEXT_* variables created before analysis begins"

        - check: "pattern_preload"
          description: "Load friction pattern definitions into context variable"
          validation: "CONTEXT_FRICTION_PATTERNS populated from friction-patterns.yml"

        - check: "programmatic_filtering"
          description: "Use code to filter sessions, not full context loading"
          validation: "Sessions accessed via get_context() with filter patterns"

      during_processing:
        - check: "bounded_recursion"
          description: "Recursion depth must be bounded"
          validation: "max_depth parameter <= 5 on all recursive operations"

        - check: "accumulator_usage"
          description: "Results accumulate in named variables, not inline"
          validation: "ACCUMULATOR_* variables used for intermediate results"

        - check: "variable_naming"
          description: "Variables follow hierarchical naming convention"
          validation: "All variables match CONTEXT_*, FILTER_*, ACCUMULATOR_*, or FINAL_*"

        - check: "variable_limit"
          description: "Active variable count within limits"
          validation: "Active context variables <= 10"

        - check: "session_chunking"
          description: "Large session sets processed in chunks"
          validation: "No single processing step handles more than 20 sessions at once"

      post_processing:
        - check: "completion_signaling"
          description: "FINAL signal only after all branches complete"
          validation: "FINAL_FRICTION_REPORT set only at top level, after accumulator aggregation"

        - check: "rlm_usage_reporting"
          description: "Report RLM usage in output schema"
          validation: "rlm_context_usage field populated in friction_report output"

        - check: "multi_session_aggregation"
          description: "Ensure patterns are aggregated across sessions per min_affected_sessions"
          validation: "Single-session patterns excluded unless critical severity"

    # Error messages for RLM violations
    violation_messages:
      threshold_exceeded_no_rlm: |
        VIOLATION: Session/trace count ({count}) exceeds RLM threshold but RLM
        decomposition was not applied. Re-run analysis using RLM patterns.
        Reference: modules/AgenticGuidance/assets/definitions/rlm-patterns.yml

      missing_context_variable: |
        VIOLATION: Required context variable {variable_name} was not created.
        When processing large datasets, CONTEXT_SESSIONS_SUMMARIES MUST be created.

      missing_accumulator: |
        VIOLATION: Accumulator variable {variable_name} was not used.
        Friction findings MUST accumulate in ACCUMULATOR_* variables, not inline.

      premature_final: |
        VIOLATION: FINAL_FRICTION_REPORT signaled before all session chunks processed.
        Ensure all recursive branches contribute to accumulators before FINAL.

      unbounded_recursion: |
        VIOLATION: Recursion depth exceeds maximum (5). Add depth bounds to recursive calls.

      variable_limit_exceeded: |
        WARNING: Active context variables ({count}) exceed recommended limit (10).
        Consider cleaning up unused variables to prevent context soup anti-pattern.

      single_session_pattern_reported: |
        WARNING: Pattern {pattern_id} reported from single session.
        Single-session patterns should be excluded unless critical severity.
        Verify min_affected_sessions filter is applied.
