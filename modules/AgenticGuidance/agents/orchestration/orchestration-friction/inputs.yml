# Orchestration-Friction Inputs
# Purpose: Context for friction analysis workflow

inputs:
  agent_type: "orchestration-friction"
  version: "1.1"

  # ========================================
  # FRICTION PATTERNS DEFINITION
  # ========================================
  # Pattern definitions externalized to shared definition file
  friction_patterns_definition: "modules/AgenticGuidance/assets/definitions/friction-patterns.yml"

  # ========================================
  # REQUIRED INPUTS
  # ========================================
  required_inputs:
    - name: "project_name"
      type: "string"
      description: "LangSmith project to analyze"
      required: false
      default_env: "CC_LANGSMITH_PROJECT"
      example: "AgenticEngineering"

    - name: "lookback_days"
      type: "integer"
      description: "Number of days to look back for traces"
      required: false
      default: 7

    - name: "limit"
      type: "integer"
      description: "Maximum number of runs to analyze"
      required: false
      default: 100

    - name: "session_count"
      type: "integer"
      description: "Number of recent sessions to analyze (overrides lookback_days when provided)"
      required: false
      default: null
      note: "When specified, queries the N most recent sessions regardless of date range"

    - name: "min_affected_sessions"
      type: "integer"
      description: "Only report patterns affecting at least this many sessions"
      required: false
      default: 2
      note: "Single-session patterns may be user error, not guidance gaps"

  # ========================================
  # SESSION ANALYSIS
  # ========================================
  session_analysis:
    description: "Session-based analysis configuration"

    grouping:
      method: "session_id"
      fallback: "time_window_30min"
      note: "Uses session_id from LangSmith metadata; falls back to time-based grouping if unavailable"

    thresholds:
      min_affected_sessions: 2
      min_pattern_frequency_per_session: 1
      note: "Pattern must occur at least once in at least 2 sessions to be reported"

    filtering:
      exclude_single_session_patterns: true
      rationale: "Single-session patterns may be user error, not guidance gaps"
      exceptions:
        - "Critical severity patterns are always reported"
        - "Patterns with explicit user feedback are always reported"

  # ========================================
  # FRICTION PATTERNS (inline for quick reference)
  # ========================================
  # Full definitions: modules/AgenticGuidance/assets/definitions/friction-patterns.yml
  # Inline patterns below are kept for context during workflow execution
  friction_patterns:
    - id: FP-001
      name: "Excessive Retries"
      description: "Agent retries same operation multiple times"
      detection_signals:
        - "Multiple consecutive runs with same name pattern"
        - "Error -> Retry -> Error -> Retry sequences"
      default_resolution: GUIDANCE_UPDATE
      resolution_hint: "Add clearer error handling guidance or retry limits"

    - id: FP-002
      name: "Exploration Drift"
      description: "Agent explores codebase extensively before finding target"
      detection_signals:
        - "Many Glob/Grep/Read tool calls before task execution"
        - "High tool-to-llm ratio in early run phases"
      default_resolution: GUIDANCE_UPDATE
      resolution_hint: "Add path hints or signposts to process files"

    - id: FP-003
      name: "Missing Context Requests"
      description: "Agent asks user for information that should be in guidance"
      detection_signals:
        - "AskUserQuestion calls for routine decisions"
        - "Questions about standard patterns/conventions"
      default_resolution: GUIDANCE_UPDATE
      resolution_hint: "Add missing context to process files"

    - id: FP-004
      name: "Output Schema Violations"
      description: "Agent produces output that doesn't match expected schema"
      detection_signals:
        - "Validation errors in tool calls"
        - "Reviewer rejections citing format issues"
      default_resolution: GUIDANCE_UPDATE
      resolution_hint: "Add examples or output schema documentation"

    - id: FP-005
      name: "Convention Violations"
      description: "Agent doesn't follow naming/structure conventions"
      detection_signals:
        - "File/folder names not matching patterns"
        - "Post-creation renames or corrections"
      default_resolution: CLI_OFFLOAD
      resolution_hint: "Enforce via agentic CLI commands"

    - id: FP-006
      name: "Automatable Patterns"
      description: "Agent performs same multi-step sequence repeatedly"
      detection_signals:
        - "Identical tool call sequences across sessions"
        - "Boilerplate generation patterns"
      default_resolution: CLI_OFFLOAD
      resolution_hint: "Create new agentic command for the pattern"

  # ========================================
  # RESOLUTION TYPES
  # ========================================
  resolution_types:
    - type: GUIDANCE_UPDATE
      description: "Update process files, add signposts, clarify fences"
      target_locations:
        - "modules/AgenticGuidance/agents/*/process.yml"
        - "modules/AgenticGuidance/agents/*/inputs.yml"
        - "modules/AgenticGuidance/assets/guidelines/"

    - type: CLI_OFFLOAD
      description: "Move deterministic operations to agentic CLI commands"
      target_locations:
        - "modules/AgenticCLI/src/agenticcli/commands/"

    - type: ASSET_UPDATE
      description: "Add examples, definitions, or specifications"
      target_locations:
        - "modules/AgenticGuidance/assets/definitions/"
        - "modules/AgenticGuidance/assets/examples/"
        - "modules/AgenticGuidance/assets/specifications/"

  # ========================================
  # SEVERITY CLASSIFICATION
  # ========================================
  severity_classification:
    high:
      criteria:
        - "Pattern occurs in >50% of analyzed sessions"
        - "Pattern causes visible user impact (delays, errors)"
        - "Pattern indicates missing critical guidance"
      action: "Prioritize for immediate resolution"

    medium:
      criteria:
        - "Pattern occurs in 20-50% of analyzed sessions"
        - "Pattern causes inefficiency but no errors"
        - "Pattern indicates optimization opportunity"
      action: "Queue for next improvement cycle"

    low:
      criteria:
        - "Pattern occurs in <20% of analyzed sessions"
        - "Pattern is minor inconvenience"
        - "Pattern is edge case behavior"
      action: "Document and defer"

  # ========================================
  # DEPENDENCIES
  # ========================================
  dependencies:
    - package: "agenticlangsmith"
      required: true
      note: "LangSmith service wrapper for trace queries"

    - env_var: "CC_LANGSMITH_PROJECT"
      required: false
      note: "Default project if not specified in input"

  # ========================================
  # OUTPUT FORMAT
  # ========================================
  output_format:
    friction_report:
      sections:
        - "summary: High-level count of patterns by severity"
        - "patterns: Detailed list of detected patterns with evidence"
        - "recommendations: Resolution suggestions with target files"
        - "next_steps: Suggested actions for user"
