name: orchestration-guidance
status: deprecated
deprecated_by: orchestration-executor
deprecation_reason: |
  Replaced by orchestration-executor which provides generic MMD-driven execution.
  orchestration-executor dynamically routes to agents based on Plan-MMD AGENT_ROUTING metadata,
  eliminating the need for specialized orchestration agents per workflow type.
description: |
  Guidance and context engineering workflows including agent teaching and process improvements.
  Coordinates guidance agents to enhance agent capabilities and workflows.
version: "2.0"
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture

purpose: |
  Orchestration-guidance manages guidance and context engineering workflows by
  spawning and coordinating guidance subagents. Handles agent teaching, process
  improvements, and documentation updates. Can delegate to orchestration-planning
  when no pre-approved plan exists, or execute directly when given a pre-approved
  plan via _plan_teach.yml entrypoint.

# ==============================================
# INPUTS
# ==============================================
inputs:
  location: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/inputs.yml"
  description: "Core inputs, layers, guidelines, and definitions for guidance orchestration"

# ==============================================
# SPAWNS FENCE
# ==============================================
# Only agents listed here may be invoked by this orchestrator
spawns:
  # Worktree and plan setup
  - agent: "deploy-worktree"
    purpose: "Create/verify worktree and plan folder structure"
    when: "Start of workflow"

  # Planning delegation (when no pre-approved plan)
  - agent: "orchestration-planning"
    purpose: "Create and approve guidance improvement plan"
    when: "No approved_plan_path provided"

  # Guidance modification agents
  - agent: "teacher-update-guidance"
    purpose: "Update agent-specific guidance (process.yml, inputs.yml)"
    when: "Guidance improvement phase"

  - agent: "teacher-update-assets"
    purpose: "Update shared assets (definitions, guidelines, examples)"
    when: "Shared asset modification needed"

  # Guidance validation
  - agent: "test-guidance-simulator"
    purpose: "Execute guidance blind tests to validate improvements"
    when: "After guidance changes, in guidance-test-loop"

  # Final audit
  - agent: "test-final-output"
    purpose: "Validate final outputs and completion"
    when: "Before marking plan complete"

# ==============================================
# LOOP CONTEXT
# ==============================================
# Specifies how this agent participates in iterative loops
# ==============================================
loop_context:
  participates_in:
    - "guidance-test-loop"
  role: "orchestrator"
  description: |
    orchestration-guidance acts as the orchestrator in guidance improvement loops.
    It coordinates teacher agents to make guidance changes, then spawns test-guidance-simulator
    to validate the changes reduced friction.
  iteration_strategy: |
    1. Receive friction report or guidance improvement request
    2. Spawn teacher agents to make guidance changes
    3. Spawn test-guidance-simulator to validate improvements
    4. If friction persists, analyze results and iterate
    5. Max iterations configurable (default: 3)
  exit_conditions:
    - "Friction reduced to acceptable level (validated by test-guidance-simulator)"
    - "Maximum iterations reached"
    - "No further improvements possible (diminishing returns)"
    - "User signals loop termination"
  state_management: |
    orchestration-guidance maintains loop state including iteration count,
    previous friction reports, and changes made. State is passed to subagents
    as context and stored in plan folder audit/ directory.

# ==============================================
# OUTPUTS
# ==============================================
outputs:
  - name: "orchestration_result"
    format: "yaml"
    location: "docs/plans/<plan_folder>/audit/orchestration_guidance_result.yml"
    schema:
      plan_folder: "string - path to plan folder"
      status: "enum(completed, failed, partial)"
      iterations_executed: "integer"
      friction_reduction:
        initial_friction_points: "integer"
        final_friction_points: "integer"
        reduction_percentage: "float"
      agents_spawned:
        - agent_name: "string"
          task: "string"
          result: "enum(success, failure)"
      changes_made:
        - file: "string"
          change_type: "enum(created, modified)"
          agent_responsible: "string"
      validation_results:
        validated_by: "string - typically test-guidance-simulator"
        friction_resolved: "array of strings"
        friction_remaining: "array of strings"
      next_steps:
        - "string - recommended actions if incomplete"
