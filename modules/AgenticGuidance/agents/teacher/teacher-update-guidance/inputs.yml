# Teacher-Update-Guidance Agent Inputs
# Context-minimized inputs for process improvement and friction analysis
# This agent analyzes execution patterns, improves process.yml files, inputs.yml files, creates examples, and builds paths/fences/signposts
# It does NOT create plans, update shared definitions, or plan exams

inputs:
  agent_type: "teacher-update-guidance"
  version: "2.0"

  agent_context:
    category: "assets/definitions/agent-categories.yml#teacher"
    role: "teacher-update-guidance"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/cleaner-shared.yml"
      description: "Cleaner shared inputs (cleaner-shared-guidelines, voting-system, cleaner-core manifest, preserved-files, overengineering, skipped-test)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

    - type: layer
      path: "assets/inputs/test-shared.yml"
      description: "Test category shared inputs (acceptable-skips, reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

  core_inputs:
    # Path/fence/signpost concepts - core teaching framework
    - type: file
      path: "assets/definitions/path.yml"
      description: "Path concept: what agents read to determine next actions"
      required: true
    - type: file
      path: "assets/definitions/fence.yml"
      description: "Fence concept: guardrails preventing wrong work"
      required: true
    - type: file
      path: "assets/definitions/signpost.yml"
      description: "Signpost concept: teaching artifacts helping agents choose correctly"
      required: true

    # Guidance artifact patterns - where to put information
    - type: file
      path: "assets/definitions/guidance-artifacts.yml"
      description: "Where to put information so agents actually read it"
      required: true
    - type: file
      path: "assets/definitions/generalized-vs-specific.yml"
      description: "When to use definitions/guidelines vs inputs/examples"
      required: true

    # Success criteria and verification patterns - core to fence building
    - type: file
      path: "assets/definitions/success-criteria-teacher.yml"
      description: "Success criteria patterns for outcome-based verification"
      required: true
    - type: file
      path: "assets/definitions/outcome-verification.yml"
      description: "Outcome verification patterns (avoid 'done', prefer verifiable checks)"
      required: true

    # Model-first verification - critical for generators
    - type: file
      path: "assets/definitions/model-first-verification.yml"
      description: "Model output as source of truth for generators"
      required: true

    # Example writing guidelines - for signpost creation
    - type: file
      path: "assets/examples/teacher/concise.yml"
      description: "Concise writing examples for reducing context window usage"
      required: true

    # Definition/guideline concepts - for understanding artifact types
    - type: file
      path: "assets/definitions/definition.yml"
      description: "Shared definition: what a definition is and when to use one"
      required: true
    - type: file
      path: "assets/definitions/guideline.yml"
      description: "Shared definition: what a guideline is and when to use one"
      required: true

    # Agent context discovery - how agents find their instructions
    - type: file
      path: "assets/definitions/agent-context-files.yml"
      description: "Where agents find process.yml, definitions.yml, manifest.yml and how context is discovered"
      required: true

    # Key anti-patterns and friction patterns - for identifying problems
    - type: file
      path: "assets/definitions/separation-of-concerns.yml"
      description: "Separation-of-concerns fence (avoid mixing responsibilities)"
      required: true
    - type: file
      path: "assets/definitions/root-cause-analysis.yml"
      description: "Root-cause analysis patterns (diagnose recurring friction correctly)"
      required: true
    - type: file
      path: "assets/definitions/escalation.yml"
      description: "Escalation triggers (when to stop and ask / change approach)"
      required: true

    - type: file
      path: "assets/definitions/knowledge-encapsulation.yml"
      description: "Knowledge encapsulation principle - identify unnecessary meta-knowledge in agent guidance"
      required: true

    # Agent folder structure - for discovering where process files are located
    # Load specific agent process files just-in-time when analyzing that agent's friction
    - type: directory
      path: "agents/"
      description: "Agent folder structure - discover process locations just-in-time"
      required: false

  # Teacher-update-guidance specific role definition
  # Note: Core definitions (path, fence, signpost, friction, guidance_artifact, model_first_verification)
  # are already loaded from shared definition files above - no need to duplicate them here
  definitions:
    process_improvement_role: |
      As a teacher-update-guidance agent:
      - You analyze agent execution patterns to identify friction patterns
      - You improve process.yml files to create clearer paths
      - You improve inputs.yml files to configure agent context properly
      - You create/improve examples to add effective signposts
      - You strengthen validation/constraints to build better fences
      - You ensure model-first verification in generators
      - You generate prioritized recommendations with specific examples
      - You have authority to update process.yml files across agent categories (cross-agent scope updates)
      - You do NOT create plans (that's planner-guidance)
      - You do NOT update shared assets in assets/ folder (that's teacher-update-assets)
