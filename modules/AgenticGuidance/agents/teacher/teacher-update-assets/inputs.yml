inputs:
  agent_type: "teacher-update-assets"
  version: "2.0-p1"

  agent_context:
    category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.teacher"
    role: "teacher-update-assets"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  core_inputs:
    # Asset type definitions (each asset type must be defined and treated consistently)
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/definition.yml"
      description: "What a definition is and when to use one"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/guideline.yml"
      description: "What a guideline is and when to use one"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/example.yml"
      description: "What an example is and when to use one"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml"
      description: "Where to put information so agents read it"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/generalized-vs-specific.yml"
      description: "When to use definitions/guidelines vs inputs/examples"
      required: true

    # Existing shared assets (for reference and duplication detection)
    - type: directory
      path: "modules/AgenticGuidance/assets/definitions/"
      description: "Shared definitions hub - target location for new/updated definitions"
      required: true

    - type: directory
      path: "modules/AgenticGuidance/assets/guidelines/"
      description: "Shared guidelines hub - target location for new/updated guidelines"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/manifest.yml"
      description: "Index of modular guidelines (update when adding/removing guidelines)"
      required: true

    - type: directory
      path: "modules/AgenticGuidance/assets/examples/"
      description: "Shared examples hub - target location for new/updated examples"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/examples/manifest.yml"
      description: "Index of centralized examples (update when adding/removing examples)"
      required: true

    # Writing quality and conciseness patterns
    - type: file
      path: "modules/AgenticGuidance/assets/examples/teacher/concise.yml"
      description: "Concise writing examples for reducing context window usage"
      required: true

    # Teacher concepts used in definitions
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/path.yml"
      description: "Path concept (often referenced in definitions)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/fence.yml"
      description: "Fence concept (often referenced in definitions)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/signpost.yml"
      description: "Signpost concept (often referenced in definitions)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/knowledge-encapsulation.yml"
      description: "Knowledge encapsulation principle - identify unnecessary meta-knowledge in agent guidance"
      required: true

  guidelines:
    - path: "modules/AgenticGuidance/assets/guidelines/testing.yml"
      description: "Testing behavioral guidelines for validating definition quality"

  definitions:
    asset_type_requirement: |
      This process updates assets under modules/AgenticGuidance/assets/.
      For each asset type you touch (definition / guideline / example), you must explicitly consult the
      corresponding asset-type definition input (definition.yml, guideline.yml, example.yml) and follow it.

    definition_file_structure: |
      Definitions files use this structure:
      - Top-level key: definitions: or <concept-name>: (for single-concept files)
      - Entries: <kebab-case-name>: | <concise, practical definition>
      - Prefer signals + checklists over philosophy
      - One screen per concept when possible

    naming_conventions: |
      File names:
      - Single topic: definitions/<topic>.yml
      - Small cohesive cluster: definitions/<cluster>.yml
      - Avoid dumping-ground files

    cross_cutting_check: |
      Only create shared definitions for concepts useful to 2+ agents.
      Keep agent-specific guidance in agent folders.

    duplication_removal: |
      When extracting to shared definitions:
      - Replace duplicated content with brief pointer under "See Also"
      - Keep agent-specific applications in agent files
      - Link to shared definition, don't duplicate it
