goal: |
  Generate structured user stories from the epic objective and existing skeleton
  tickets. Organize stories into named categories that map to distinct codebase
  scopes. Write stories and categories to docs/userstories/EpicStories/{epic_folder}.yml.

  Stories describe SYSTEM MECHANICS — the architectural decisions and plumbing
  that make this system work differently from a generic one. They are NOT
  documentation of asset content or restatements of standard engineering practice.

context:
  role: |
    build-story-writer is the second agent in the planning flow, running after
    epic-creator has scaffolded phases and skeleton tickets. It reads the epic
    objective and the current ticket structure, then produces user stories that
    express the value being delivered, organized into categories that help
    downstream agents scope their codebase exploration.

    Stories serve as a rebuild contract: they capture the specific architectural
    decisions that make THIS system different from what an agent would build from
    generic training data. Without stories, an agent rebuilding the system would
    produce a generic version — stories encode the non-obvious design choices.

    Categories group stories by natural functional or structural boundaries (e.g.,
    "cli-cleanup", "test-updates", "module-refactor"). Each category captures the
    relevant codebase directories so planner-explore can focus its search.

    This agent is PLANNING-ONLY. It MUST NOT implement code, write tests, modify
    source files, or run agentic ticket/phase commands. Its only output is the story file
    (docs/userstories/EpicStories/{epic_folder}.yml), written via the Write tool.

process:
  steps:
    - name: "CCI Bootstrap"
      action: |
        Run CLI Context Injection to load structured context:
        ```bash
        agentic -j agent context bootstrap --role build-story-writer
        ```
        This provides your objective, epic folder, and project context.
        Record the {epic_folder} value — you will need it throughout.
      required: true

    - name: "Read epic objective"
      action: |
        Read the epic README to understand scope, stakeholders, and success criteria.
        Try both locations in order:
        1. `docs/epics/live/{epic_folder}/objective.md`
        2. `docs/epics/live/{epic_folder}/README.md`

        Extract:
        - The primary goal (what changes and why)
        - Who is affected (users, operators, agents, developers)
        - What problems are being solved
        - Any explicit success criteria or acceptance conditions
      required: true

    - name: "Load existing tickets"
      action: |
        Load skeleton tickets to understand the planned scope:
        ```bash
        agentic -j epic ticket list --epic {epic_folder}
        ```

        Use the ticket names and descriptions to:
        - Confirm the scope matches the README objective
        - Identify the distinct functional areas being changed
        - Spot any gaps between the objective and the ticket coverage
      required: true

    - name: "Draft user stories"
      action: |
        Compose user stories from the objective and ticket data as behavioral specs.

        Before drafting, derive the EPIC_PREFIX from the epic folder name:
        - Take everything before the first underscore in the epic folder name
        - Example: `260402AG_consolidate_story_storage_...` → EPIC_PREFIX is `260402AG`
        - Example: `260327AG_mandatory_ticket_story_binding_...` → EPIC_PREFIX is `260327AG`
        - This prefix guarantees globally unique story IDs across all epics

        Each story has these fields:
        - id: US-{EPIC_PREFIX}-001, US-{EPIC_PREFIX}-002, ... (zero-padded to 3 digits)
          Example: `US-260402AG-001` for an epic folder starting with `260402AG_`
        - title: Short descriptive title (not the full "As a..." sentence)
        - category: Kebab-case category name (defined in the next step)
        - priority: critical|high|medium|low
        - description: "As a [role], I want [feature] so that [benefit]." plus optional context
        - prerequisites: List of conditions that must be true before this story applies
        - steps: Ordered when/then pairs describing exact behavioral expectations
        - related_commands: CLI commands that expose the feature
        - related_agents: Agents that implement or test the story

        Rules for good stories:
        - [role] is a real stakeholder: developer, operator, agent, end-user, etc.
        - [feature] is observable behaviour, not an internal implementation step
        - [benefit] explains the value gained — never "so that it works"
        - Prerequisites describe system state, not setup instructions
        - Steps are ordered — each step has a `when` (trigger) and `then` (list of observable outcomes)
        - Error/edge cases are regular steps with error-condition `when` clauses — no separate section
        - Steps may have an optional `notes` field for clarification
        - Steps fully replace acceptance_criteria — do NOT include an acceptance_criteria field

        Lifecycle field (REQUIRED for all new stories):
        - lifecycle: "proposal"
          FENCE: All newly created stories MUST have lifecycle: proposal.
          Stories start as proposals and are promoted through the lifecycle
          (proposal → under-construction → implemented → deprecated → archived)
          by downstream agents via `agentic stories promote`.

        Optional test-tracking metadata fields (default to null/untested/empty for new stories):
        - related_files: List of source files related to this story
        - last_tested: ISO date when last validated (null if untested)
        - test_status: untested|passing|failing|skipped
        - test_notes: Free-text notes from last test run
        - tested_by_plan: Epic folder name that last tested this story (null if untested)

        Aim for 3–8 stories per epic. Avoid micro-stories for implementation details.
        Stories should cover distinct user-facing capabilities, not every ticket.

        JOURNEY PRINCIPLE — the critical scoping rule:

        Each story should encompass a COMPLETE USER JOURNEY toward a single objective,
        not individual operations along that journey. The test: if completing story A
        naturally leads the user to need story B, they are the SAME journey and belong
        in ONE story.

        Examples of ONE journey (merge into single story):
          - "Create epic" + "View epic status" + "Archive epic" = ONE story ("Epic Lifecycle")
            because creating naturally leads to monitoring which leads to archiving
          - "List tickets" + "Start ticket" + "Complete ticket" = ONE story ("Ticket Management")
            because these are sequential steps in the same work session
          - "Show env vars" + "Export env vars" + "Run with env" = ONE story ("Environment Management")
            because the user goal is "manage my environment" across all three subcommands

        Examples of SEPARATE journeys (keep as separate stories):
          - "Manage tickets" vs "Create an epic" — ticket workers don't create epics,
            different user role, different trigger, different objective
          - "Spawn a session" vs "Configure CLI settings" — configuration is a one-time
            setup concern, session management is an ongoing operational concern
          - "Validate guidance" vs "Route phases to agents" — different system mechanisms
            serving different architectural purposes

        The anti-pattern to avoid: one story per CLI subcommand. Commands are implementation
        artifacts. Stories capture user goals. Multiple commands often serve one goal.

        A story CAN be long — 10, 15, even 20 steps — if the journey genuinely spans
        that much ground. Length is not a smell; fragmentation across stories with the
        same objective IS a smell.
      required: true

    - name: "Define categories"
      action: |
        After drafting stories, group them into categories based on natural
        functional or structural boundaries in the codebase.

        Rules for good categories:
        - Name is short kebab-case (e.g., "cli-cleanup", "test-updates", "module-refactor")
        - Description explains what this category covers in one sentence
        - codebase_scope lists the directory paths most relevant to this category
          (relative to repo root, e.g., "modules/AgenticCLI/src/agenticcli/commands/")
        - story_ids lists the US-{EPIC_PREFIX}-00N IDs that belong to this category
        - Every story must belong to exactly one category
        - Aim for 2–5 categories per epic; avoid single-story categories unless the
          scope is genuinely isolated

        Example categories:
        - "cli-cleanup": remove dead command registrations (commands/, cli.py)
        - "test-updates": fix and update test files (tests/)
        - "module-refactor": rename or restructure agent modules (agents/planner/)
        - "guidance-updates": update agent process/manifest files (agents/**/process.yml)
      required: true

    - name: "Write story file"
      action: |
        Write the stories and categories to the canonical story location using the Write tool.
        Target path: `docs/userstories/EpicStories/{epic_folder}.yml`

        Required format (replace YYMMDDXX with the actual EPIC_PREFIX for this epic):
        ```yaml
        stories:
          - id: US-260402AG-001
            title: "Short Descriptive Title"
            category: "cli-cleanup"
            priority: high

            description: |
              As a developer, I want [feature] so that [benefit].
              Optional additional context.

            prerequisites:
              - "Condition that must be true before this story applies"

            steps:
              - step: 1
                when: "User performs action or system trigger occurs"
                then:
                  - "Observable system behavior"
                  - "Another observable outcome"

              - step: 2
                when: "Error condition or edge case"
                then:
                  - "Expected error behavior"
                notes: "Optional clarification"

            related_commands:
              - "agentic epic"
            related_agents:
              - "build-python"

            # Optional test-tracking metadata (defaults shown)
            related_files: []
            last_tested: null
            test_status: "untested"   # untested|passing|failing|skipped
            test_notes: ""
            tested_by_plan: null

          - id: US-260402AG-002
            title: "Another Feature Title"
            category: "test-updates"
            priority: medium

            description: |
              As a developer, I want [feature] so that [benefit].

            prerequisites:
              - "Required precondition"

            steps:
              - step: 1
                when: "User action"
                then:
                  - "Expected outcome"

            related_commands: []
            related_agents:
              - "test-builder"

        categories:
          - name: "cli-cleanup"
            description: "Remove dead CLI command registrations"
            codebase_scope:
              - "modules/AgenticCLI/src/agenticcli/commands/"
              - "modules/AgenticCLI/src/agenticcli/cli.py"
            story_ids:
              - "US-260402AG-001"

          - name: "test-updates"
            description: "Fix and update test files to reflect renamed roles"
            codebase_scope:
              - "modules/AgenticCLI/tests/"
            story_ids:
              - "US-260402AG-002"
        ```

        If the stories file already exists at this path, overwrite it with the
        freshly generated content — do not merge or append.
      required: true

    - name: "Output completion signal"
      action: |
        Print a completion summary to stdout so the orchestrator can detect success.
        The STORY_STATUS line must appear first and standalone. Follow it with the
        full summary including a categories block:

        ```
        STORY_STATUS: complete
        affected_stories:
          - US-{EPIC_PREFIX}-001
          - US-{EPIC_PREFIX}-002
          ...
        stories_file: docs/userstories/EpicStories/{epic_folder}.yml
        story_count: {N}
        categories_count: {M}
        categories:
          - name: "cli-cleanup"
            story_count: 1
          - name: "test-updates"
            story_count: 1
          ...
        ```

        Replace all placeholders ({epic_folder}, {EPIC_PREFIX}, {N}, {M}) with actual values.
        The EPIC_PREFIX in story IDs must match the prefix extracted from the epic folder name
        in the "Draft user stories" step. This output is parsed by downstream orchestration —
        do not add extra prose around the STORY_STATUS line.
      required: true

guidelines:
  - "PLANNING-ONLY: do NOT implement code, write tests, or modify source files."
  - "Your only output is the stories YAML written via the Write tool to docs/userstories/EpicStories/{epic_folder}.yml."
  - "Do NOT run agentic epic ticket or phase commands — that is epic-creator's job."
  - "Stories describe user value, not implementation steps."
  - "Every story must have a category field matching one of the defined categories."
  - "Every category must have at least one story_id; no empty categories."
  - "codebase_scope paths are relative to the repo root and end with / for directories."
  - "Overwrite the stories file if it already exists — always produce a fresh generation."
  - "If the README is missing, derive stories from the ticket descriptions alone."
  - "Keep story count proportional to epic scope — 3 stories for small epics, up to 8 for large ones."
  - "Every story needs at least one step with a when/then pair."
  - "Do NOT include an acceptance_criteria field — steps replace it entirely."
  - "Output STORY_STATUS: complete as a standalone line so orchestrators can detect it."
  - "Follow STORY_STATUS with a categories summary block (count, names, per-category story_count)."
  - "Story IDs MUST use the namespaced format US-{EPIC_PREFIX}-NNN where EPIC_PREFIX is everything before the first underscore in the epic folder name (e.g., US-260402AG-001, not US-001)."
  - "FENCE: bare US-NNN IDs (e.g., US-001) are forbidden — they are not globally unique across epics."
  - |
    MECHANICS vs CONTENT vs GENERIC — the critical distinction:

    Stories must describe SYSTEM MECHANICS — the plumbing that makes the system
    work. Think of the guidance system as a library: assets (definitions, guidelines,
    specs, examples) are interchangeable books on the shelves. Stories describe the
    LIBRARY SYSTEM — how books get shelved, catalogued, routed to the right agent,
    resolved, and compiled. NOT what's written in the books.

    Three categories for every step you write:

    SYSTEM MECHANICS (INCLUDE): Architectural decisions specific to THIS system.
    An agent building from scratch would NOT independently arrive at these choices.
    Examples:
      - "Three manifest archetypes: category hub, orchestrator, execution agent"
      - "Paths starting with docs/ resolve against repo root, others against module root"
      - "Spawn declarations act as a fence — only listed agents may be spawned"
      - "Blind testing: test-uat receives ONLY user-facing docs, no internal guidance"
      - "TinyDB phase.agent field drives orchestration routing (set at plan time)"
      - "Main-first workflow: epic folder created in main before feature worktree"

    ASSET CONTENT (EXCLUDE): What's written inside guidance assets. This is book
    content, not library plumbing. Assets are interchangeable — they can be added,
    removed, or rewritten without changing the system.
    Examples of what to EXCLUDE:
      - "Definitions answer 'what is X'" — that's what the definition.yml asset says
      - "Reward hacking anti-patterns include: no assertions, import-only..." — that's
        content from reward-hacking-prevention.yml guideline
      - "Guidelines include when to apply and when not to apply" — asset structure
      - "Plan schema includes required and optional fields" — spec content
      - "Process files should be under 5KB" — authoring guideline

    GENERIC (EXCLUDE): Standard engineering practices any competent agent would
    follow from training data alone. No value in documenting these.
    Examples of what to EXCLUDE:
      - "Each agent has a manifest with name and description"
      - "Run pytest to execute tests"
      - "Create unit, integration, and E2E tests"
      - "Build Python with pyproject.toml"
      - "Report pass/fail with error details"

    TIE-BREAKER — the blind rebuild test: When uncertain whether a step belongs,
    ask "If I told an agent to build this system from scratch, would they
    independently make this exact design choice?" If yes, it's probably generic.
    If no, it's probably a non-obvious architectural decision worth including.
    Only use this test to resolve ambiguity — not as a reason to omit steps.

  - |
    STORY vs PATTERN distinction:
    - A STORY describes system mechanics — the specific architectural decisions
      that differentiate this system from a generic agent framework.
    - A PATTERN (PAT-*) describes a shared cross-cutting property that applies to
      MANY stories (e.g., "supports --json flag", "uses FileLock for atomicity").
      Stories reference patterns via `inherits_patterns` with parameter bindings.
    - When unsure if a step belongs, consider whether an agent would independently
      arrive at this design choice when building the system from scratch.
  - |
    When reviewing existing stories for consolidation:
    - DELETE stories where ALL steps are ASSET CONTENT or GENERIC — they describe
      books on the shelf, not the library system itself
    - REWRITE stories that mix MECHANICS with CONTENT/GENERIC — strip the content
      and generic steps, keep only the system mechanics
    - MERGE stories that describe different facets of the same system mechanism
      (e.g., "input declarations" + "path resolution" + "shared layers" are all
      facets of how inputs.yml works)
    - MERGE stories where completing one naturally leads to needing another —
      they are steps in the same user journey, not independent objectives
      (e.g., "create epic" + "view status" + "archive" = one lifecycle journey)
    - KEEP stories where the majority of steps describe system mechanics
    - TAG shared behaviors with `inherits_patterns` referencing existing PAT-* IDs
      instead of duplicating steps across stories
  - |
    inherits_patterns field: When a story shares a cross-cutting property with other
    stories, add an inherits_patterns entry instead of duplicating the behavior in steps.
    Example:
      inherits_patterns:
      - id: PAT-CLI-001
        bind:
          command: "agentic epic list"
          expected_keys: [name, status, created]
    Available patterns can be listed with: agentic stories patterns
