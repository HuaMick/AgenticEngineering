process:
  goal: |
    Build Flutter components that meet the success criteria.

  project_type: flutter

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/build/build-flutter/inputs.yml"
      description: "Core build agent inputs and guidelines"

  outputs:
    - name: "components_built"
      description: "List of Flutter components created or modified"
      location: "lib/ directory in target project"
      schema:
        - file_path: "string - relative path to component"
          component_type: "enum(widget, feature, core, test)"
          action: "enum(created, modified)"
    - name: "build_report"
      description: "Summary of Flutter build activities"
      location: "Returned to orchestrator"
      schema:
        worktree_path: "string - path to worktree used"
        files_created: "integer"
        files_modified: "integer"
        dart_analyze_passed: "boolean"
        pub_get_success: "boolean"
        issues_encountered: "array of strings"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic context bootstrap --role build-flutter -j

      # Get current task if working from a plan
      agentic plan task current -j
      ```

      CLI output provides your objective, process summary, input file paths.
      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.

    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Determine which worktree to work from:
      - Execute `pwd` to check your current directory
      - Execute `git rev-parse --show-toplevel` to determine the worktree root
      - If a worktree path is specified in the plan, change to that directory using `cd <worktree_path>`
      - If no worktree is specified, determine from current location
      - Record the worktree path and ensure all subsequent operations use this worktree
    - |
      Gather context and check assumptions.
    - |
      Plan components needed to meet the success criteria.
    - |
      Build components following the builder-role pattern (see modules/AgenticGuidance/assets/definitions/builder-role.yml):

      Substeps:
      a) Identify the minimal component set required to meet success criteria
         - Review the success criteria from the plan
         - List only the components needed (avoid over-engineering)

      b) For each component, implement following Flutter conventions:
         - Use proper file naming (snake_case for files, PascalCase for classes)
         - Follow project folder structure (lib/src/, lib/widgets/, etc.)
         - Use existing patterns from the codebase as templates
         - Add required imports at the top of each file

      c) Manage dependencies:
         - Add new packages to pubspec.yaml only when necessary
         - Prefer existing dependencies over adding new ones
         - Document why any new dependency was added

      d) Follow architecture patterns:
         - Match existing state management approach (Provider, Riverpod, Bloc, etc.)
         - Use established widget composition patterns from the project
         - Maintain separation between UI and business logic

      Success criteria for this step:
      - All components identified in planning step are implemented
      - Code follows existing project patterns and conventions
      - No unnecessary components or dependencies added
      - Files are placed in correct directories per project structure
    - |
      Verify your code compiles and imports work correctly:
      - Run `flutter pub get` if dependencies changed
      - Run `dart analyze lib/` to check for static analysis issues

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, fix-the-source.yml, experiment-first.yml, worktree-and-branching.yml)
    # Loop context (test-fix-loop): See modules/AgenticGuidance/assets/guidelines/iteration.yml (agent_context.test_fix_loop)
    # Builder patterns:
    #   - External files referenced in inputs.yml: builder-role.yml, minimal-sufficient-change.yml, iteration-approach.yml, component-verification.yml
    #   - Inline definitions in inputs.yml: flutter_verification, flutter_patterns, dart_conventions, flutter_folder_conventions
