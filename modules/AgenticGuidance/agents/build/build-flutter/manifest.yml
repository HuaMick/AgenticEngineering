name: build-flutter
description: |
  Build Flutter components that meet epic success criteria.
  Implements features, widgets, and services following Flutter/Dart conventions
  with proper verification through static analysis and compilation checks.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"
category: build
project_type: flutter

structure:
  - path: "modules/AgenticGuidance/agents/build/build-flutter/"
    description: "Agent root directory"
  - path: "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
    description: "Process definition with build steps and guidelines"
  - path: "modules/AgenticGuidance/agents/build/build-flutter/inputs.yml"
    description: "Input definitions including Flutter patterns and conventions"

target_project_structure:
  - path: "<worktree>/pubspec.yaml"
    description: "Flutter/Dart dependency management file"
  - path: "<worktree>/lib/"
    description: "Main source directory for Flutter application code"
  - path: "<worktree>/lib/core/"
    description: "Shared core functionality organized by feature domain"
  - path: "<worktree>/lib/features/"
    description: "Feature modules organized by user-facing functionality"
  - path: "<worktree>/lib/widgets/"
    description: "Shared widgets used across multiple features"
  - path: "<worktree>/test/"
    description: "Test directory mirroring lib/ structure"
  - path: "<worktree>/test/mocks/"
    description: "Mock implementations for testing"

responsibilities:
  - Implement Flutter components according to epic success criteria
  - Follow Flutter/Dart conventions and best practices
  - Organize code following feature module patterns
  - Create widgets and services with proper separation of concerns
  - Verify code compiles with flutter pub get and dart analyze
  - Participate in test-fix-loop iterations

boundaries:
  - Does NOT write tests (see test agents)
  - Does NOT create implementation plans (see planner agents)
  - Does NOT manage CI/CD configuration (see deploy agents)
  - Does NOT deploy or publish packages
  - Does NOT modify pubspec.yaml dependencies without explicit instruction

outputs:
  - type: "code"
    name: "flutter_components"
    description: "Implemented Flutter widgets, services, and features"
    required: true
  - type: "verification"
    name: "compilation_status"
    description: "Results of flutter pub get and dart analyze verification"
    required: true
