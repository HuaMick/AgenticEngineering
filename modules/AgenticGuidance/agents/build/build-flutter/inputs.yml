# Build-Flutter Sub-Agent Inputs
# Flutter-specific context for building mobile/web frontend components
#
# PURPOSE:
# Flutter builder discovers and implements Flutter-specific components including
# widgets, features, core functionality, and UI elements.
#
# CONTEXT MINIMIZATION:
# This agent contains ONLY the inputs needed for Flutter builds.
# Each sub-agent is self-contained with no shared parent inputs.

# PILOT: Using reference layers to eliminate duplication

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.build"
  role: "build-flutter"

inputs:
  agent_type: "build-flutter"
  version: "2.0-pilot"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, experiment-first, less-is-more, worktree-branching, testing, etc.)"
      required: true

  # Core inputs for Flutter builds (agent-specific only)
  core_inputs:
    # Flutter-specific folder structure
    - type: file
      path: "modules/AgenticGuidance/agents/build/build-flutter/manifest.yml"
      description: "Flutter project folder structure (pubspec.yaml, lib/, lib/core/, lib/features/, lib/widgets/, test/)"
      required: true

    # Flutter-specific process
    - type: file
      path: "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
      description: "Flutter build process including worktree detection, component planning, and Flutter-specific verification"
      required: true

  # Shared build agent definitions
  shared_definitions:
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/builder-role.yml"
      description: "Builder agent role and responsibilities"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/minimal-sufficient-change.yml"
      description: "Minimal sufficient change principle - smallest change that fully achieves the outcome"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/iteration-approach.yml"
      description: "Iteration approach - small, focused, layered iterations"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/component-verification.yml"
      description: "Component verification - basic structural soundness checks"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Iteration patterns including test-fix-loop, audit-test-fix-loop, and other iteration strategies"
      required: true

  definitions:

    # Flutter-specific definitions
    flutter_verification: |
      Flutter builder agents must verify built components using:
      - dart analyze lib/ for static analysis
      - flutter pub get for dependency resolution
      - dart format --set-exit-if-changed lib/ for formatting checks
      - Import verification: dart compile exe test.dart

    flutter_patterns: |
      Flutter builder agents must follow these patterns:
      - Widget composition over inheritance
      - Stateless widgets by default; stateful only when necessary
      - Proper use of BuildContext
      - Separation of business logic from UI (use providers, blocs, or similar)
      - Consistent widget tree structure
      - Proper disposal of resources in StatefulWidget
      - Use of const constructors where possible for performance
      - Follow Dart naming conventions (lowerCamelCase for variables/functions, UpperCamelCase for classes)

    dart_conventions: |
      Flutter builder agents must follow Dart language conventions:
      - Use nullable types (?) appropriately
      - Leverage Dart's null safety features
      - Use async/await for asynchronous operations
      - Follow effective Dart style guide
      - Use extension methods when appropriate
      - Prefer final over var when values don't change
      - Use named parameters for optional parameters
      - Document public APIs with /// comments

    flutter_folder_conventions: |
      Flutter projects follow this structure:
      - lib/ - Main source directory
      - lib/core/ - Shared core functionality
      - lib/features/ - Feature modules organized by user-facing functionality
      - lib/widgets/ - Shared widgets used across multiple features
      - test/ - Test directory mirroring lib/ structure
      - test/mocks/ - Mock implementations for testing
      - pubspec.yaml - Flutter/Dart dependencies and project metadata

# PILOT NOTES:
# - Reduced from 154 lines to 123 lines (31 line reduction)
# - 2 layers provide: plans, domains, workflows, entrypoints, ARCHITECTURE.md,
#   fix-source, experiment-first, less-is-more, worktree-branching, testing,
#   response-audit, safety, context-minimisation
# - Only Flutter-specific inputs remain inline (2 manifest/process files + 5 shared build definitions)
# - Layers enable easy updates to shared inputs across all build agents
