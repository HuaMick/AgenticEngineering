process:
  goal: |
    Build Python components that meet the success criteria.

  project_type: python

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/build/build-python/inputs.yml"
      description: "Core build agent inputs and guidelines"

  outputs:
    - name: "components_built"
      description: "List of Python components created or modified"
      location: "src/ directory in target project"
      schema:
        - file_path: "string - relative path to component"
          component_type: "enum(service, domain, workflow, entrypoint, test)"
          action: "enum(created, modified)"
    - name: "build_report"
      description: "Summary of Python build activities"
      location: "Returned to orchestrator"
      schema:
        worktree_path: "string - path to worktree used"
        files_created: "integer"
        files_modified: "integer"
        syntax_verified: "boolean"
        imports_verified: "boolean"
        execution_tested: "boolean"
        issues_encountered: "array of strings"
        out_of_scope_errors:
          description: "Errors the builder could not fix within current task scope — handed off to planner"
          schema:
            - error_details: "string - full error output"
              affected_files: "array of strings"
              current_epic: "string - epic folder being executed"
              discovery_context: "string - what builder was doing when error was found"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic agent context bootstrap --role build-python -j

      # Get current ticket if working from an epic
      agentic agent epic ticket current -j
      ```

      CLI output provides your objective, process summary, input file paths.
      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.

    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Determine which worktree to work from:
      - Execute `pwd` to check your current directory
      - Execute `git rev-parse --show-toplevel` to determine the worktree root
      - If a worktree path is specified in the plan, change to that directory using `cd <worktree_path>`
      - If no worktree is specified, determine from current location
      - Record the worktree path and ensure all subsequent operations use this worktree
    - |
      Gather context and check assumptions.
    - |
      Plan components needed to meet the success criteria.
    - |
      Build components following the builder-role pattern (see modules/AgenticGuidance/assets/definitions/builder-role.yml):

      Substeps:
      a) Identify the minimal component set required to meet success criteria
         - Review the success criteria from the epic
         - List only the components needed (avoid over-engineering)

      b) For each component, implement following Python conventions:
         - Use proper file naming (snake_case for modules and functions)
         - Follow project folder structure (src/, tests/, etc.)
         - Use existing patterns from the codebase as templates
         - Add required imports at the top of each file (stdlib, third-party, local)

      c) Manage dependencies:
         - Add new packages to requirements.txt or pyproject.toml only when necessary
         - Prefer existing dependencies over adding new ones
         - Pin versions appropriately
         - Document why any new dependency was added

      d) Follow architecture patterns:
         - Match existing project structure (domains/, services/, workflows/, entrypoints/)
         - Use established patterns from the project (dataclasses, Pydantic, etc.)
         - Maintain separation between business logic and I/O
         - Follow existing error handling patterns

      Success criteria for this step:
      - All components identified in planning step are implemented
      - Code follows existing project patterns and conventions
      - No unnecessary components or dependencies added
      - Files are placed in correct directories per project structure
    - |
      Verify your code compiles and imports work correctly:
      - Check for syntax errors with `python -m py_compile <file>`
      - Verify imports resolve correctly
      - Check for common issues with static analysis tools if available (pylint, mypy, etc.)
    - |
      Execute and test what you built:
      - Try to execute the built code to verify it works
      - If there is a working entrypoint (e.g., a CLI command, main function, or script), execute the code from that entrypoint
      - Verify the execution completes successfully and produces expected results
      - If execution fails, fix any runtime issues before proceeding
    - |
      Error-Driven Planning Check:
      After verifying and testing your build, check for errors you cannot fix
      within your current task's target_files.

      FOR EACH error in issues_encountered:
        IF you can fix it within your current task's target_files:
          → Fix inline (existing behavior)
        IF you CANNOT fix it (affects files outside your task scope):
          → Capture error context and hand off — do NOT attempt to classify or fix it
          → Include in build_report output under out_of_scope_errors
          → Continue with your build (do NOT block on these issues)

      Capture context for each error you cannot fix:
        error_details: Full error output (e.g., traceback, compiler message)
        affected_files: Files involved in the error
        current_epic: The epic folder you are executing
        discovery_context: What you were doing when you found the error

      Python-specific examples of errors to hand off:
      - ImportError from modules NOT in your plan's target_files
        e.g., `ModuleNotFoundError: No module named 'agenticguidance.services.missing'`
      - pytest failures for tests covering code you did NOT modify
        e.g., `FAILED tests/test_existing_service.py::test_old_endpoint - AssertionError`
      - Dependency version conflicts from other packages in requirements.txt
        e.g., `ERROR: pip's dependency resolver found incompatible versions for pyyaml`
      - Syntax or type errors in files outside your target_files
        e.g., `mypy: error: Module "utils.legacy" has no attribute "run"`

      FENCE: You MUST NOT classify errors as in-scope vs out-of-scope,
      assign priority levels, decide remediation strategy, or suggest plan names.
      Just capture context and hand off. Planners decide everything.

      Reference: modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, fix-the-source.yml, experiment-first.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, domains.yml, workflows.yml, entrypoints.yml)
