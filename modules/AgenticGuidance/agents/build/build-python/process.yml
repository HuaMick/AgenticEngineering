process:
  goal: |
    Build Python components that meet the success criteria.

  project_type: python

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/build/build-python/inputs.yml"
      description: "Core build agent inputs and guidelines"

  outputs:
    - name: "code_changes"
      description: "List of Python component files created or modified"
      location: "Returned to orchestrator"
      required: true
    - name: "build_result"
      description: "Build verification status including syntax check and import validation results"
      location: "Returned to orchestrator"
      required: true
    - name: "execution_result"
      description: "Results from executing and testing the built code"
      location: "Returned to orchestrator"
      required: true
    - name: "discrepancies"
      description: "Any input path discrepancies found during review"
      location: "Returned to orchestrator"
      required: false

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Determine which worktree to work from:
      - Execute `pwd` to check your current directory
      - Execute `git rev-parse --show-toplevel` to determine the worktree root
      - If a worktree path is specified in the plan, change to that directory using `cd <worktree_path>`
      - If no worktree is specified, determine from current location
      - Record the worktree path and ensure all subsequent operations use this worktree
    - |
      Gather context and check assumptions.
    - |
      Plan components needed to meet the success criteria.
    - |
      Build components.
    - |
      Verify your code compiles and imports work correctly:
      - Check for syntax errors with `python -m py_compile <file>`
      - Verify imports resolve correctly
      - Check for common issues with static analysis tools if available (pylint, mypy, etc.)
    - |
      Execute and test what you built:
      - Try to execute the built code to verify it works
      - If there is a working entrypoint (e.g., a CLI command, main function, or script), execute the code from that entrypoint
      - Verify the execution completes successfully and produces expected results
      - If execution fails, fix any runtime issues before proceeding

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, fix-the-source.yml, experiment-first.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, domains.yml, workflows.yml, entrypoints.yml)
