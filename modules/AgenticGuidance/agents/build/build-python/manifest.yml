folders:
  - path: "<worktree>/pyproject.toml"
    description: |
      Python project configuration and dependency management file.
      Defines package metadata, dependencies, and build configuration.

  - path: "<worktree>/src/"
    description: |
      Main source directory for Python application code.
      Contains the primary package structure.

  - path: "<worktree>/src/mymodules/AgenticGuidance/agents/backend/services/"
    description: |
      Backend services organized by domain and functionality.
      Each service is self-contained with its own workflows and tests.

  - path: "<worktree>/src/mymodules/AgenticGuidance/agents/backend/domains/"
    description: |
      Domain logic implementing business rules and domain models.
      Organized by domain area (e.g., conversation/, agent_control/).

  - path: "<worktree>/src/mymodules/AgenticGuidance/agents/backend/workflows/"
    description: |
      Workflow orchestration logic coordinating between domains.
      Each workflow represents a complete user journey or process.

  - path: "<worktree>/src/mymodules/AgenticGuidance/agents/frontend/cli/"
    description: |
      CLI entrypoints and command-line interface logic.
      Command handlers and CLI-specific routing.

  - path: "<worktree>/tests/"
    description: |
      Test directory organized by test type and workflow.
      Test files follow pytest conventions (*_test.py).

  - path: "<worktree>/tests/workflows/"
    description: |
      Per-workflow test packages using "1 package per workflow" structure.
      Each workflow has its own test package.
