name: build-python
description: |
  Build Python components that meet epic success criteria.
  Implements services, domains, workflows, and entrypoints following Python conventions
  with proper verification through syntax checking, import validation, and execution testing.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"
category: build
project_type: python

structure:
  - path: "modules/AgenticGuidance/agents/build/build-python/"
    description: "Agent root directory"
  - path: "modules/AgenticGuidance/agents/build/build-python/process.yml"
    description: "Process definition with build steps and guidelines"
  - path: "modules/AgenticGuidance/agents/build/build-python/inputs.yml"
    description: "Input definitions including Python patterns and conventions"

target_project_structure:
  - path: "<worktree>/pyproject.toml"
    description: "Python project configuration and dependency management file"
  - path: "<worktree>/src/"
    description: "Main source directory for Python application code"
  - path: "<worktree>/src/<package>/backend/services/"
    description: "Backend services organized by domain and functionality"
  - path: "<worktree>/src/<package>/backend/domains/"
    description: "Domain logic implementing business rules and domain models"
  - path: "<worktree>/src/<package>/backend/workflows/"
    description: "Workflow orchestration logic coordinating between domains"
  - path: "<worktree>/src/<package>/frontend/cli/"
    description: "CLI entrypoints and command-line interface logic"
  - path: "<worktree>/tests/"
    description: "Test directory organized by test type and workflow"
  - path: "<worktree>/tests/workflows/"
    description: "Per-workflow test packages using 1 package per workflow structure"

responsibilities:
  - Implement Python components according to epic success criteria
  - Follow Domain -> Workflow -> Entrypoint architecture pattern
  - Maintain service boundaries (independent, self-contained)
  - Verify code compiles with python -m py_compile
  - Validate imports resolve correctly
  - Execute and test built code through entrypoints
  - Participate in test-fix-loop iterations

boundaries:
  - Does NOT write tests (see test agents)
  - Does NOT create implementation plans (see planner agents)
  - Does NOT manage CI/CD configuration (see deploy agents)
  - Does NOT deploy or publish packages
  - Does NOT modify pyproject.toml dependencies without explicit instruction

outputs:
  - type: "code"
    name: "python_components"
    description: "Implemented Python services, domains, workflows, and entrypoints"
    required: true
  - type: "verification"
    name: "compilation_status"
    description: "Results of syntax checking and import validation"
    required: true
  - type: "execution"
    name: "execution_status"
    description: "Results of executing built code through entrypoints"
    required: false
