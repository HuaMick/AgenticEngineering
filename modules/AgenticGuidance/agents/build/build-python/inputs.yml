# Build-Python Sub-Agent Inputs
# Python-specific context for building backend services and CLI components
#
# PURPOSE:
# Python builder discovers and implements Python-specific components including
# backend services, domains, workflows, and CLI entrypoints.
#
# CONTEXT MINIMIZATION:
# This agent contains ONLY the inputs needed for Python builds.
# Each sub-agent is self-contained with no shared parent inputs.

# PILOT: Using reference layers to eliminate duplication

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.build"
  role: "build-python"

inputs:
  agent_type: "build-python"
  version: "2.0"  # Reference layer architecture (stable)

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, experiment-first, less-is-more, worktree-branching, testing, etc.)"
      required: true
      # Guidelines loaded via core-guidelines.yml layer (available to agent):
      #   - fix-the-source.yml: Address root causes rather than symptoms
      #   - context-minimisation.yml: Strategies for minimizing context
      #   - experiment-first.yml: Experimental validation before implementation
      #   - less-is-more.yml: Simplicity and minimalism principles
      #   - worktree-and-branching.yml: Git worktree and branching strategies
      #   - testing.yml: Core testing principles and approaches
      #   - response-audit.yml: Response quality and audit guidelines
      #   - safety.yml: Safety protocols and constraints

  # Core inputs for Python builds (agent-specific only)
  core_inputs:
    # Python-specific folder structure
    - type: file
      path: "modules/AgenticGuidance/agents/build/build-python/manifest.yml"
      description: "Python project folder structure (pyproject.toml, src/, tests/, services/, domains/, workflows/, CLI)"
      required: true

    # Python-specific process
    - type: file
      path: "modules/AgenticGuidance/agents/build/build-python/process.yml"
      description: "Python build process including worktree detection, component planning, and Python-specific verification"
      required: true

  # Shared build agent definitions
  shared_definitions:
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/builder-role.yml"
      description: "Builder agent role and responsibilities"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/minimal-sufficient-change.yml"
      description: "Minimal sufficient change principle - smallest change that fully achieves the outcome"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/iteration-approach.yml"
      description: "Iteration approach - small, focused, layered iterations"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/component-verification.yml"
      description: "Component verification - basic structural soundness checks"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Iteration patterns including test-fix-loop, audit-test-fix-loop, and other iteration strategies"
      required: true

  # Story context for story-first planning compliance
  story_context:
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
      description: "User story schema and metadata field definitions"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/specifications/story-schema.yml"
      description: "Story YAML schema for validating story file structure"
      required: true

  definitions:

    # Python-specific definitions
    python_verification: |
      Python builder agents must verify built components using:
      - python -m py_compile <file> for syntax validation
      - mypy (optional) for type checking
      - pylint (optional) for PEP 8 compliance
      - Import verification: python -c "import <module>"

    python_patterns: |
      Python builder agents must follow these patterns:
      - PEP 8 style guide compliance
      - Type hints for function signatures
      - Docstrings for public APIs (Google or NumPy style)
      - Proper use of __init__.py for packages
      - Virtual environment activation when needed
      - Use of pyproject.toml for dependencies

    python_folder_conventions: |
      Python projects follow this structure:
      - src/<package>/backend/services/ - Service layer
      - src/<package>/backend/domains/ - Domain logic
      - src/<package>/backend/workflows/ - Workflow orchestration
      - src/<package>/frontend/cli/ - CLI entrypoints
      - tests/ - Test files mirroring source structure
      - pyproject.toml - Python dependencies and project metadata

# ARCHITECTURE NOTES (v2.0 Stable):
# - Reference layer architecture reduces duplication (~50 lines saved)
# - 2 layers provide: plans, domains, workflows, entrypoints, ARCHITECTURE.md,
#   fix-source, experiment-first, less-is-more, worktree-branching, testing,
#   response-audit, safety, context-minimisation
# - Only Python-specific inputs remain inline (2 manifest/process files + 5 shared build definitions)
# - Layers enable easy updates to shared inputs across all build agents
# - CCI bootstrap command: agentic epic status --epic <epic_folder>
