# Deploy Agent Category Manifest
# Migrated: 2026-01-03

agent:
  name: "deploy"
  type: "hub"
  version: "1.0"

category:
  definition: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#deploy"

description: |
  The deploy category handles infrastructure and deployment tooling.
  Currently focused on CI/CD configuration for AgenticGuidance workflows.

sub_agents:
  - name: "deploy-cicd"
    purpose: "Maintain and validate CI/CD pipeline configuration"
    triggers:
      - "cicd"
      - "ci/cd"
      - "cloudbuild"
      - "dockerfile"
      - "pipeline"
      - "docker-compose"
    scope: "CI/CD infrastructure files, test configuration validation, pipeline synchronization"

# Not migrated (not referenced by AgenticGuidance orchestration):
# - deploy-packaging

routing_logic: |
  1. Route CI/CD, pipeline, and cloudbuild requests to deploy-cicd
  2. Escalate packaging requests to user (not available in this module)

boundaries: |
  Deploy agents handle infrastructure and deployment tooling.
  They do NOT:
  - Write application code (that's build agents)
  - Create tests (that's test agents)
  - Plan work (that's planner agents)
