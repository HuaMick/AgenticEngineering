# Deploy-Worktree Agent Inputs
# Defines the files, directories, and context that the deploy-worktree agent needs
# to manage git worktrees and VS Code workspace configuration.

inputs:
  agent_type: "deploy-worktree"
  name: "deploy-worktree"
  description: "Specializes in git worktree management and workspace configuration."
  version: "2.0"

  # ==============================================
  # REQUIRED INPUTS
  # ==============================================
  # These inputs MUST be provided by the parent orchestrator or user.
  # Without these, the agent cannot perform worktree operations.
  # Process.yml references: inputs.yml#required_inputs
  # ==============================================
  required_inputs:
    - name: "REPO_ROOT"
      type: "string"
      description: "Absolute path to the git repository root where worktrees will be created"
      required: true
      example: "/home/code/AgenticEngineering"
      note: |
        REPO_ROOT is typically the same as target_project_path.
        Used by CLI for path resolution: ${REPO_ROOT}/docs/plans/, ${REPO_ROOT}/*.code-workspace

    - name: "branch_name"
      type: "string"
      description: "Git branch name for the new worktree"
      required: true
      example: "feature_auth"

    - name: "base_branch"
      type: "string"
      description: "Base branch to create from (defaults to main)"
      required: false
      default: "main"
      example: "main"

  # SIGNPOST: Variable usage in CLI commands
  # =========================================
  # REPO_ROOT is used by CLI for:
  # 1. Path resolution: ${REPO_ROOT}/docs/plans/live/YYMMDDXX_description/
  # 2. VS Code workspace: ${REPO_ROOT}/*.code-workspace (glob pattern for filename discovery)
  # CLI handles git worktree commands internally
  # =========================================

  agent_context:
    category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.deploy"
    role: "deploy-worktree"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/deploy-minimal.yml"
      description: "Minimal guidelines for deploy (context-minimisation, worktree-and-branching, safety)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Agent-specific inputs
  # NOTE: manifest.yml consolidated into inputs.yml header (name, description, version)
  core_inputs:
    # VS Code workspace configuration
    # NOTE: Glob pattern used because filename varies by project (e.g., MyProject.code-workspace)
    # Each repository has exactly one workspace file; pattern enables filename discovery
    - type: file
      path: "${REPO_ROOT}/*.code-workspace"
      description: "VS Code workspace file that tracks all worktrees and repository folders"
      required: false

    # Planning and Environment Setup
    # NOTE: docs/plans/ is at repository root level, not within AgenticGuidance module
    - type: directory
      path: "${REPO_ROOT}/docs/plans/"
      description: "Central location for all planning artifacts (live, backlog, completed)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/plans.yml#naming_convention"
      description: "Plan folder naming and structure (naming_convention section)"
      required: true

    # Git repository information (dynamically determined)
    - type: pattern
      path: ".git/"
      description: "Git repository metadata for worktree operations"
      required: true

  # Deploy-worktree specific definitions
  # Per context-minimisation.yml: provide only required information
  # Manual git/workspace procedures removed - CLI handles all operations
  # Policy content in worktree-and-branching.yml, naming in plans.yml#naming_convention
  definitions:
    # Worktree naming convention
    worktree_naming_convention: |
      Pattern: <RepoName>-<branch_name>

      Components:
      - RepoName: Repository name (e.g., AgenticEngineering)
      - branch_name: Git branch name (e.g., agenticguidance, feature-xyz)

      Examples:
      - AgenticEngineering-agenticguidance
      - AgenticEngineering-feature-auth
      - MyProject-fix-123

      Validation rules:
      - No spaces in worktree path
      - Hyphen separator between repo and branch
      - Branch name should match git branch exactly
      - Worktree directory created at same level as main repo

      VS Code display name:
      - Format: "RepoName (branch-name)"
      - Example: "AgenticEngineering (agenticguidance)"

    # Planning structure reference - see plans.yml for full definition
    planning_scaffolding: |
      Every new worktree requires a planning folder in docs/plans/live/ (YYMMDDXX_description pattern).
      Structure: live/ for active files, completed/ for finished work.
      CLI command 'agentic agent plan init' enforces naming convention and creates scaffolding.
      See plans.yml for full requirements.

    # CLI commands reference
    cli_commands: |
      All worktree and plan operations are handled by the CLI:
      - Create worktree + plan: `agentic agent plan init <branch> --description <desc>`
      - List worktrees: `agentic worktree list`
      - Remove worktree: `agentic worktree remove <path>`
      - Worktree status: `agentic worktree status`
      - Fix workspace drift: `agentic worktree sync` (removes stale entries, adds missing worktrees)
      Do NOT run manual git worktree commands or modify workspace files directly.
      Workspace file updates are automatic — `agentic agent plan init` updates on create,
      `agentic worktree remove` updates on delete, `agentic worktree sync` reconciles drift.
