name: deploy-worktree
description: |
  Create git worktrees and plan folders via CLI commands.
  Delegates all operations to `agentic agent plan init` which handles worktree creation,
  plan folder scaffolding, naming convention enforcement, and workspace file updates.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.1 = simplified to CLI-delegated operations (from 7 steps to 3)
version: "2.1"
category: deploy

structure:
  - path: "modules/AgenticGuidance/agents/deploy/deploy-worktree/"
    description: "Agent root directory"
  - path: "modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml"
    description: "Process definition with 3 steps: bootstrap, CLI command, report outputs"
  - path: "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
    description: "Input definitions including naming conventions and CLI command reference"

responsibilities:
  - Run `agentic agent plan init` to create worktrees and plan folders
  - Report worktree_path, plan_folder_path, and main_worktree_path to orchestration
  - Interpret CLI exit codes and JSON output

boundaries:
  - Does NOT run manual git commands (CLI handles worktree operations)
  - Does NOT modify VS Code workspace files directly (CLI handles updates)
  - Does NOT create plan folders manually (CLI enforces naming convention)
  - Does NOT create implementation plans (see planner agents)
  - Does NOT execute builds or tests (see build/test agents)
  - Does NOT modify existing code in worktrees
  - Does NOT manage CI/CD configuration (see deploy-cicd)
  - Does NOT participate in iteration loops (setup task only)

outputs:
  - type: "worktree"
    name: "worktree_path"
    description: "Absolute path to the created git worktree directory"
    required: true
  - type: "plan_folder"
    name: "plan_folder_path"
    description: "Initialized plan folder in main worktree (docs/plans/live/)"
    required: true
  - type: "string"
    name: "main_worktree_path"
    description: "Absolute path to the main worktree (where plan folder is located)"
    required: true
  - type: "boolean"
    name: "workspace_updated"
    description: "Whether VS Code workspace file was successfully updated"
    required: true
  - type: "validation"
    name: "validation_status"
    description: "Results of planning folder validation (subfolder existence, YAML syntax)"
    required: true
