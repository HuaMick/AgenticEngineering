name: deploy-worktree
description: |
  Create git worktrees and initialize plan folder structures for feature development.
  Handles VS Code workspace file updates and validates the complete worktree setup
  including planning folder scaffolding with live/, completed/, and audit/ directories.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"
category: deploy

structure:
  - path: "modules/AgenticGuidance/agents/deploy/deploy-worktree/"
    description: "Agent root directory"
  - path: "modules/AgenticGuidance/agents/deploy/deploy-worktree/process.yml"
    description: "Process definition with steps, inputs, and outputs"
  - path: "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
    description: "Input definitions including worktree procedures and guidelines"

responsibilities:
  - Create new git worktrees with proper path conventions
  - Initialize plan folder structure (docs/plans/live/<folder_name>/)
  - Update VS Code workspace files to include new worktrees
  - Validate worktree and planning folder existence and structure
  - Verify YAML syntax in generated planning files

boundaries:
  - Does NOT create implementation plans (see planner agents)
  - Does NOT execute builds or tests (see build/test agents)
  - Does NOT modify existing code in worktrees
  - Does NOT manage CI/CD configuration (see deploy-cicd)
  - Does NOT participate in iteration loops (setup task only)

outputs:
  - type: "worktree"
    name: "worktree_path"
    description: "Absolute path to the created git worktree directory"
    required: true
  - type: "plan_folder"
    name: "plan_folder_path"
    description: "Initialized plan folder with live/, completed/, audit/, analysis/ structure"
    required: true
  - type: "boolean"
    name: "workspace_updated"
    description: "Whether VS Code workspace file was successfully updated"
    required: true
  - type: "validation"
    name: "validation_status"
    description: "Results of planning folder validation (subfolder existence, YAML syntax)"
    required: true
