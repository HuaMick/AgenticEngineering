process:
  goal: |
    Create new git worktrees and update VS Code workspace file configuration.

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/deploy/deploy-worktree/inputs.yml"
      description: "Core deploy-worktree agent inputs, guidelines, and worktree operation procedures"

  outputs: []

  loop_context:
    participates_in: []
    note: "Worktree management is a setup task, not part of iteration loops"

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Determine current worktree context:
      Reference inputs.yml definitions (git_worktree, worktree_naming_convention) for:
      - Worktree structure and path conventions
      - Commands for worktree operations
      - Expected directory patterns
    - |
      Create new worktree if requested:
      Reference inputs.yml definitions (worktree_operations, branch_strategy) for:
      - Worktree creation procedures and safety checks
      - Branch naming conventions and merge flow
      - Verification steps
    - |
      Update VS Code workspace file:
      Reference inputs.yml definitions (workspace_file, worktree_naming_convention) for:
      - Workspace file structure and formatting requirements
      - Folder naming patterns
      - Git repository scanning configuration
    - |
      Verify workspace file validity and accessibility:
      Reference inputs.yml definitions (worktree_operations) for validation requirements
    - |
      Create Planning Scaffolding:
      Reference inputs.yml definitions (planning_scaffolding) and assets/definitions/plans.yml:
      1. Generate folder name following YYMMDDRepo_Branch convention.
      2. Create directory at docs/plans/live/<folder_name>/ and internal subdirectories live/ and completed/.
      3. Initialize the four placeholder files in their respective subdirectories:
         - live/plan_live_teach.yml (populated with metadata: name, worktree path, branch, status: planning)
         - live/plan_live_test.yml (empty: phases: [])
         - live/plan_live_audit_clean.yml (empty: phases: [])
         - completed/plan_completed.yml (empty: completed_items: [])
    - |
      Final Verification:
      Confirm worktree, workspace entry, and planning folder structure (live/, completed/) with all 4 files exist in their correct locations.

  guidelines:
    # Core guidelines: See assets/guidelines/ (safety.yml, fix-the-source.yml, worktree-and-branching.yml)
    # Core definitions: See assets/definitions/ (plans.yml, domains.yml, workflows.yml, entrypoints.yml)
    # Worktree procedures: See inputs.yml definitions (git_worktree, workspace_file, worktree_operations)
    - |
      All detailed worktree procedures are in inputs.yml definitions.
      Follow worktree_operations for safety checks and validation steps.

