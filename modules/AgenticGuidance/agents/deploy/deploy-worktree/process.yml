process:
  goal: |
    Create new git worktrees and update VS Code workspace file configuration.

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
      description: "Core deploy-worktree agent inputs, guidelines, and worktree operation procedures"

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "worktree_path"
      type: "string"
      description: "Absolute path to the created worktree"
      required: true
      example: "/home/code/MyProject-feature_auth"

    - name: "plan_folder_path"
      type: "string"
      description: "Absolute path to the planning folder created for the worktree"
      required: true
      path_template: "{worktree_root}/docs/plans/live/{YYMMDDXX_description}/"
      example: "/home/code/MyProject-feature_auth/docs/plans/live/260110FA_feature_auth/"
      note: "YYMMDDXX format: YY=year, MM=month, DD=day, XX=worktree ID (2 uppercase letters from worktree suffix)"

    - name: "workspace_updated"
      type: "boolean"
      description: "Whether VS Code workspace file was successfully updated"
      required: true

    - name: "validation_status"
      type: "object"
      description: "Results of planning folder validation"
      required_fields:
        - "live_subfolder_exists"
        - "completed_subfolder_exists"
        - "yaml_syntax_valid"

  loop_context:
    participates_in: []
    note: "Worktree management is a setup task, not part of iteration loops"

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Determine current worktree context:
      Use CLI command: `agentic worktree status`
      This returns JSON with path, branch, is_worktree flag, and active plans.
      Reference inputs.yml definitions for context interpretation.
    - |
      Create worktree and plan folder in one operation:
      Use CLI command: `agentic plan init <branch> --description <desc> --base <base-branch>`

      This single command handles ALL of the following:
      - Git worktree creation (or reuses existing worktree for branch)
      - Plan folder naming with YYMMDDXX_description convention (enforced by CLI)
      - Planning folder scaffolding (docs/plans/live/<folder_name>/)
      - Subdirectory creation (live/, completed/, analysis/, audit/)
      - README.md template creation

      Exit codes:
      - 0: Success, worktree and folder created
      - 1: Worktree creation failed
      - 2: Folder already exists (choose different description)
      - 3: Invalid branch name or description

      For JSON output use: `agentic -j plan init <branch> --description <desc>`
      JSON response includes: worktree, worktree_created, branch, plan_folder, plan_folder_name

      NOTE: Do NOT create folders manually. The CLI enforces naming convention
      programmatically, eliminating agent interpretation errors.
    - |
      Update VS Code workspace file:
      Reference inputs.yml definitions (workspace_file, worktree_naming_convention) for:
      - Workspace file structure and formatting requirements
      - Folder naming patterns
      - Git repository scanning configuration
      NOTE: Workspace file update remains manual as it requires VS Code integration.
    - |
      Verify workspace file validity and accessibility:
      Reference inputs.yml definitions (worktree_operations) for validation requirements
    - |
      Final Verification:
      Use CLI commands in sequence:
      1. `agentic worktree list` - Confirm worktree appears in list
      2. `agentic plan list` - Confirm planning folder detected
      3. `agentic plan status --path <plan_folder>` - Verify folder structure
      Report any CLI validation errors to user.

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (safety.yml, fix-the-source.yml, worktree-and-branching.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, domains.yml, workflows.yml, entrypoints.yml)
    # Worktree procedures: See inputs.yml definitions (git_worktree, workspace_file, worktree_operations)
    - |
      All detailed worktree procedures are in inputs.yml definitions.
      Follow worktree_operations for safety checks and validation steps.

