process:
  goal: |
    Create new git worktrees and plan folders via CLI commands.
    The `agentic agent plan init` command handles worktree creation, plan folder scaffolding,
    naming convention enforcement, and workspace file updates in a single operation.

  inputs:
    - location: "modules/AgenticGuidance/agents/deploy/deploy-worktree/inputs.yml"
      description: "Core deploy-worktree agent inputs, guidelines, and worktree operation procedures"
      # Required runtime inputs (see inputs.yml#required_inputs):
      #   - REPO_ROOT: Absolute path to git repository root
      #   - branch_name: Git branch name for new worktree
      #   - base_branch: Base branch to create from (optional, default: main)

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "worktree_path"
      type: "string"
      description: "Absolute path to the created worktree"
      required: true
      example: "/home/code/MyProject-feature_auth"

    - name: "plan_folder_path"
      type: "string"
      description: "Absolute path to the planning folder (created in MAIN worktree, not feature worktree)"
      required: true
      path_template: "{main_worktree_root}/docs/plans/live/{YYMMDDXX_description}/"
      example: "/home/code/MyProject/docs/plans/live/260110FA_feature_auth/"
      note: |
        MAIN-FIRST PLANNING: Plan folders are in main worktree, not feature worktree.
        YYMMDDXX format: YY=year, MM=month, DD=day, XX=worktree ID (2 uppercase letters from worktree suffix)

    - name: "main_worktree_path"
      type: "string"
      description: "Absolute path to the main worktree (where plan folder is located)"
      required: true
      example: "/home/code/MyProject"

    - name: "workspace_updated"
      type: "boolean"
      description: "Whether VS Code workspace file was automatically updated by `agentic agent plan init`"
      required: true
      note: "Set automatically by CLI — no manual workspace file manipulation needed"

    - name: "validation_status"
      type: "object"
      description: "Results of planning folder validation"
      required_fields:
        - "live_subfolder_exists"
        - "completed_subfolder_exists"
        - "yaml_syntax_valid"

  loop_context:
    participates_in: []
    note: "Worktree management is a setup task, not part of iteration loops"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic agent context bootstrap --role deploy-worktree -j

      # Get current task if working from a plan
      agentic agent plan task current -j
      ```

      CLI output provides your objective, process summary, input file paths.
      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.

    - |
      Create worktree and plan folder via CLI:
      Run: `agentic agent plan init <branch> --description <desc> --base <base-branch>`

      This single command handles ALL of the following:
      - Worktree reuse: checks for idle worktrees (no active sessions) before creating new ones
      - Git worktree creation only if no idle worktree is available (last resort)
      - Plan folder naming with YYMMDDXX_description convention (enforced by CLI)
      - Planning folder scaffolding in MAIN worktree (docs/plans/live/<folder_name>/)
      - Subdirectory creation (live/, completed/, analysis/, audit/)
      - README.md template creation
      - VS Code workspace file update

      Worktree reuse behavior:
      1. If a worktree already exists for the branch → reuse it
      2. If no worktree exists but idle (session-free) worktrees are available → reuse one
      3. Only if ALL existing worktrees have active sessions → create a new worktree

      Exit codes:
      - 0: Success, worktree and folder created
      - 1: Worktree creation failed
      - 2: Folder already exists (choose different description)
      - 3: Invalid branch name or description

      For JSON output use: `agentic agent plan init <branch> --description <desc> --json`
      JSON response includes: worktree, worktree_created, worktree_reused, branch, plan_folder, plan_folder_name, main_worktree

      NOTE: Do NOT create folders manually. The CLI enforces naming convention
      and Main-First Planning behavior programmatically, eliminating agent errors.

    - |
      Report outputs:
      Trust CLI exit codes - exit code 0 from 'agentic agent plan init' confirms success.
      No additional verification commands needed.

      Parse CLI JSON output and report to orchestration:
      - worktree_path: Feature worktree path (for execution)
      - plan_folder_path: In main worktree (for centralized visibility)
      - main_worktree_path: Main worktree root (for reference)
      - workspace_updated: true if CLI reported success
      - validation_status: CLI validates folder structure internally

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (safety.yml, fix-the-source.yml, worktree-and-branching.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, architecture-pattern.yml)
    - |
      All worktree operations are delegated to the CLI.
      Do NOT run manual git commands or modify workspace files directly.
    - |
      Drift recovery: If the VS Code workspace file gets out of sync with actual
      worktrees (e.g., stale entries or missing worktrees), run `agentic worktree sync`
      to reconcile. This removes stale entries and adds missing worktree folders.
