# Deploy-CICD Agent Inputs
# Defines the files, directories, and context that deploy-cicd agents need
# to maintain and validate CI/CD pipeline configuration.
# This agent focuses on ensuring CI/CD infrastructure files remain synchronized with the codebase.

inputs:
  agent_type: "deploy-cicd"
  version: "2.0-p1"

  agent_context:
    category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#deploy"
    role: "deploy-cicd"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Core guidelines (fix-the-source, context-minimisation, experiment-first, less-is-more, worktree-and-branching, testing, response-audit, safety)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Agent-specific inputs
  core_inputs:
    # CI/CD configuration files - the primary focus of this agent
    - type: file
      path: "cloudbuild.yaml"
      description: "Cloud Build pipeline configuration with parallel test steps for validation and auditing"
      required: true

    - type: file
      path: "Dockerfile.test"
      description: "Test container image definition for CI environment setup and dependency management"
      required: true

    - type: file
      path: "docker-compose.test.yml"
      description: "Local test orchestration matching cloudbuild steps for local validation"
      required: true

    - type: file
      path: "pytest.ini"
      description: "Pytest configuration for coverage thresholds, markers, and test discovery settings"
      required: true

    # Package configuration for understanding dependencies
    - type: file
      path: "pyproject.toml"
      description: "Package configuration needed to validate Dockerfile.test sed patterns and dependencies"
      required: true

    # Test directory structure - source of truth for CI/CD configuration
    - type: directory
      path: "tests/"
      description: "Test directory structure to validate against CI config - source of truth for test packages"
      required: true

  # Deploy-CICD specific terminology and definitions
  definitions:
    cicd_maintenance: |
      The ongoing process of ensuring CI/CD configuration files remain synchronized with
      the codebase structure. This includes:
      - Validating cloudbuild.yaml test steps match actual test directories
      - Ensuring Dockerfile.test configurations work with pyproject.toml
      - Verifying docker-compose.test.yml mirrors cloudbuild.yaml
      - Checking pytest.ini settings for CI compatibility
      - Auditing test coverage across parallel test execution steps

      CI/CD maintenance prevents drift and catches configuration issues before they
      cause pipeline failures.

    cloudbuild_validation: |
      Process of auditing cloudbuild.yaml against the actual test directory structure:

      1. Extract all test directories referenced in cloudbuild.yaml
         - Look for pytest commands with directory arguments
         - Note the step ID and test directory mapping

      2. List all actual test packages in tests/ directory
         - tests/workflows/*/ - workflow-specific test packages
         - tests/integration/*/ - integration test packages
         - tests/unit/*/ - unit test packages (if any)

      3. Flag discrepancies
         - Missing packages: Test directories that exist but aren't in cloudbuild.yaml
         - Non-existent references: cloudbuild.yaml references directories that don't exist
         - Incomplete coverage: Test files not covered by any cloudbuild step

    dockerfile_validation: |
      Process of validating Dockerfile.test configuration:

      1. Check sed patterns match actual pyproject.toml content
         - Verify path replacements (e.g., workspace = true → path = "../Agent-GCPtoolkit")
         - Test patterns against actual pyproject.toml to ensure they'll work

      2. Verify dependency installation
         - Check uv sync --dev covers all test requirements
         - Verify test dependencies are included

      3. Check environment setup
         - Verify working directory settings
         - Check Python version compatibility

    pytest_configuration: |
      Pytest configuration for CI/CD environments:

      1. Coverage configuration
         - Check --cov-fail-under threshold is appropriate for parallel execution
         - Note: Parallel test steps may not individually meet full coverage thresholds
         - Recommend removing coverage threshold from pytest.ini if using parallel steps

      2. Marker configuration
         - Verify markers (unit, integration, e2e, slow, costly) are defined
         - Check markers match test categorization in codebase

      3. Test discovery
         - Verify testpaths settings match test structure
         - Check python_files, python_classes, python_functions patterns

    compose_validation: |
      Validation that docker-compose.test.yml mirrors cloudbuild.yaml:

      1. Compare services between files
         - Each cloudbuild test step should have corresponding compose service
         - Test directory mappings should match

      2. Verify consistency
         - Same test commands
         - Same environment variables
         - Same volume mounts

    platform_compatibility: |
      Platform-specific considerations for CI/CD testing:

      1. Root user issues (Docker runs as root)
         - Flag tests that check file permissions and may fail as root
         - Recommend @pytest.mark.skipif(os.geteuid() == 0, ...) for such tests

      2. Path dependencies
         - Flag tests with hardcoded paths that won't work in CI container
         - Recommend dynamic path resolution

    parallel_test_execution: |
      Strategy for running tests in parallel in CI/CD pipelines:

      - Multiple test steps run simultaneously for faster feedback
      - Each step focuses on specific test package or category
      - Coverage is aggregated across steps, not per-step
      - Step failures are independent - one failing step doesn't block others
      - Allows targeted retries of specific test categories

    ci_coverage_strategy: |
      Coverage handling in parallel CI/CD execution:

      - Individual parallel steps cannot meet full codebase coverage independently
      - Each step covers its assigned test package only
      - Either aggregate coverage across steps or remove --cov-fail-under from pytest.ini
      - Coverage thresholds should be enforced at pipeline level, not per-step
      - Document coverage strategy in CICD_README.md
