# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the TARGET PROJECT ROOT
# which is passed as an input parameter (target_project_path).
# The deploy-cicd agent validates CI/CD files within a specific project.
# ==============================================

# Deploy-CICD Agent Inputs
# Defines the files, directories, and context that deploy-cicd agents need
# to maintain and validate CI/CD pipeline configuration.
# This agent focuses on ensuring CI/CD infrastructure files remain synchronized with the codebase.

inputs:
  agent_type: "deploy-cicd"
  version: "2.0"  # Reference layer architecture (stable)

  agent_context:
    category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.deploy"
    role: "deploy-cicd"

  # Required runtime inputs (provided by orchestrator)
  required_inputs:
    - name: "target_project_path"
      description: "Path to the project root containing CI/CD files to validate"
      example: "modules/legacy/MyAgents/projects/MyAgentsBackend"
      required: true
      note: "All core_inputs paths below are relative to this target_project_path"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/deploy-minimal.yml"
      description: "Minimal guidelines for deploy (context-minimisation, worktree-and-branching, safety)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Agent-specific inputs
  core_inputs:
    # CI/CD configuration files - the primary focus of this agent
    - type: file
      path: "cloudbuild.yaml"
      description: "Cloud Build pipeline configuration with parallel test steps for validation and auditing"
      required: true

    - type: file
      path: "Dockerfile.test"
      description: "Test container image definition for CI environment setup and dependency management"
      required: true

    - type: file
      path: "docker-compose.test.yml"
      description: "Local test orchestration matching cloudbuild steps for local validation"
      required: true

    - type: file
      path: "pytest.ini"
      description: "Pytest configuration for coverage thresholds, markers, and test discovery settings"
      required: true

    # Package configuration for understanding dependencies
    - type: file
      path: "pyproject.toml"
      description: "Package configuration needed to validate Dockerfile.test sed patterns and dependencies"
      required: true

    # Test directory structure - source of truth for CI/CD configuration
    - type: directory
      path: "tests/"
      description: "Test directory structure to validate against CI config - source of truth for test packages"
      required: true

  # Deploy-CICD specific terminology and definitions
  definitions:
    cicd_maintenance: |
      The ongoing process of ensuring CI/CD configuration files remain synchronized with
      the codebase structure. This includes:
      - Validating cloudbuild.yaml test steps match actual test directories
      - Ensuring Dockerfile.test configurations work with pyproject.toml
      - Verifying docker-compose.test.yml mirrors cloudbuild.yaml
      - Checking pytest.ini settings for CI compatibility
      - Auditing test coverage across parallel test execution steps

      CI/CD maintenance prevents drift and catches configuration issues before they
      cause pipeline failures.

    cloudbuild_validation: |
      Audit cloudbuild.yaml against actual test directory structure:
      - Extract test directories from pytest commands (note step ID mappings)
      - List actual test packages: tests/workflows/*, tests/integration/*, tests/unit/*
      - Flag: missing packages, non-existent references, incomplete coverage

    dockerfile_validation: |
      Validate Dockerfile.test configuration:
      - Check sed patterns match pyproject.toml (verify path replacements work)
      - Verify dependency installation (uv sync --dev covers test requirements)
      - Check environment setup (working directory, Python version)

    pytest_configuration: |
      Pytest configuration for CI/CD environments:
      - Coverage: Check --cov-fail-under threshold (parallel steps may need threshold removal)
      - Markers: Verify unit/integration/e2e/slow/costly markers match codebase
      - Discovery: Verify testpaths, python_files, python_classes, python_functions patterns

    compose_validation: |
      Validate docker-compose.test.yml mirrors cloudbuild.yaml:
      - Compare services: each cloudbuild step should have corresponding compose service
      - Verify consistency: same test commands, environment variables, volume mounts

    platform_compatibility: |
      Platform-specific CI/CD testing considerations:
      - Root user: Flag permission tests, use @pytest.mark.skipif(os.geteuid() == 0, ...)
      - Path dependencies: Flag hardcoded paths, recommend dynamic path resolution

    parallel_test_execution: |
      Strategy for running tests in parallel in CI/CD pipelines:

      - Multiple test steps run simultaneously for faster feedback
      - Each step focuses on specific test package or category
      - Coverage is aggregated across steps, not per-step
      - Step failures are independent - one failing step doesn't block others
      - Allows targeted retries of specific test categories

    ci_coverage_strategy: |
      Coverage handling in parallel CI/CD execution:

      - Individual parallel steps cannot meet full codebase coverage independently
      - Each step covers its assigned test package only
      - Either aggregate coverage across steps or remove --cov-fail-under from pytest.ini
      - Coverage thresholds should be enforced at pipeline level, not per-step
      - Document coverage strategy in CICD_README.md
