process:
  goal: |
    Ensure CI/CD infrastructure files remain synchronized with the codebase.
    Prevent CI failures caused by drift between test structure and CI configuration.

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/deploy/deploy-cicd/inputs.yml"
      description: "Core deploy-cicd agent inputs, guidelines, and CI/CD validation procedures"
      # Required runtime inputs (see inputs.yml#required_inputs):
      #   - target_project_path: Path to project root containing CI/CD files to validate
      #   All core_inputs paths are relative to this target_project_path

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "cicd_audit_report"
      type: "object"
      description: "Structured report of CI/CD synchronization status"
      required_fields:
        - "cloudbuild_audit"   # {missing: [], non_existent: [], uncovered: []}
        - "dockerfile_issues"  # List of sed pattern or dependency issues
        - "pytest_issues"      # Coverage or marker configuration issues
        - "compose_drift"      # Differences between cloudbuild and compose
        - "platform_issues"    # Root user, path dependency issues
        - "recommended_fixes"  # List of {file, change, reason}

    - name: "validation_status"
      type: "string"
      description: "Overall validation result"
      enum: ["PASS", "WARN", "FAIL"]
      required: true

    - name: "blocking_issues"
      type: "array"
      description: "Issues that would cause CI failure if not fixed"
      items:
        type: "object"
        fields: ["file", "issue", "severity"]

  loop_context:
    participates_in:
      - loop: "test-fix-loop"
        role: "validate"
        responsibility: |
          Validates CI/CD configuration stays synchronized with codebase changes.
          Flags drift between test structure and CI config that would cause deployment failures.

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic context bootstrap --role deploy-cicd -j

      # Get current task if working from a plan
      agentic plan task current -j
      ```

      CLI output provides your objective, process summary, input file paths.
      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.

    - Review all inputs; if an input cannot be found, do not proceed. Flag path discrepancies in output.
    - Audit cloudbuild.yaml test steps per inputs.yml#cloudbuild_validation
    - Validate Dockerfile.test configuration per inputs.yml#dockerfile_validation
    - Validate pytest.ini settings per inputs.yml#pytest_configuration and inputs.yml#ci_coverage_strategy
    - Validate docker-compose.test.yml per inputs.yml#compose_validation
    - Check platform-specific test considerations per inputs.yml#platform_compatibility
    - Report findings in structured format per inputs.yml#cicd_maintenance and outputs schema

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (safety.yml, fix-the-source.yml, testing.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, architecture-pattern.yml)
    # CI/CD definitions: See inputs.yml definitions (cicd_maintenance, cloudbuild_validation, dockerfile_validation, pytest_configuration, compose_validation, platform_compatibility, parallel_test_execution, ci_coverage_strategy)
    - |
      All detailed CI/CD validation procedures are in inputs.yml definitions.
    - |
      When to run CI/CD validation:
      - After significant test structure changes (new test packages, moved tests)
      - When cloudbuild.yaml or Dockerfile.test changes
      - Before merging to staging/main branches
      - As part of cleanup phases after major refactoring
