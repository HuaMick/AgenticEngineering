process:
  goal: |
    Review existing tests in a specific test package to ensure valid testing. Detect silent failures,
    reward hacking, structural violations, and unjustified skip patterns.

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  # RLM patterns for large test package analysis
  # See: modules/AgenticGuidance/assets/definitions/rlm-patterns.yml
  # See: inputs.yml#rlm_audit_strategy and #rlm_context_thresholds for audit-specific usage
  rlm_reference:
    definition_file: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"
    trigger: "Test package contains >20 files or >2000 lines"
    key_patterns:
      - "recursive_decomposition (filter-then-process)"
      - "programmatic_access (filtered extraction)"
      - "variable_management (accumulator pattern)"

  # ==============================================
  # LOOP CONTEXT
  # ==============================================
  # Specifies how this agent participates in iterative loops
  # ==============================================
  loop_context:
    participates_in:
      - "audit-test-fix-loop"
    role: "auditor"
    # See inputs.yml#audit_role for complete role description
    iteration_strategy: |
      Each iteration focuses on a single test package. The agent does NOT fix issues -
      it reports findings to the orchestrator, which spawns fix agents if needed.
      After fixes, test-audit may be re-invoked to verify the fix resolved the issue.
    exit_conditions:
      - "No issues found in the assigned test package"
      - "All issues have been reported to orchestrator"
      - "Orchestrator signals loop termination"
    state_management: |
      test-audit is stateless between iterations. Each invocation receives the
      test package path and any previous findings as input context.

  inputs:
    - location: "modules/AgenticGuidance/agents/test/test-audit/inputs.yml"
      description: "Core test audit agent inputs and guidelines"

  outputs:
    - name: "audit_report"
      format: "yaml"
      location: "Returned to orchestrator (not written to file)"
      # See inputs.yml#audit_reporting for complete reporting format details

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic context bootstrap --role test-audit -j

      # Get current task if working from a plan
      agentic plan task current -j
      ```

      CLI output provides your objective, process summary, input file paths.
      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.

    - |
      VALIDATE INPUTS: Review all inputs per inputs.yml. If an input cannot be found, STOP.
      Focus ONLY on your assigned test package - other agents handle other packages in parallel.
    - |
      USER STORY VALIDATION: Find and walk through all User Stories associated with the package OR plan.
      Use `agentic stories find --project <plan_id>` to discover them.
      Walk through each 'journey' step-by-step to verify the implementation matches the human-readable requirements.
      Report any deviations as "User Story Failures" in the final audit report.

      STORY TEST METADATA CHECK:
      For each discovered story, check test metadata fields:
      - last_tested: When was this story last validated? Flag if missing or stale (>30 days)
      - test_status: Current status (untested/passed/failed/regression)
        - Flag stories with test_status=untested as "Not Yet Validated"
        - Flag stories with test_status=regression as "REGRESSION - Priority Fix Required"
      - test_notes: Review for completeness (should describe test approach and outcome)
      - tested_by_plan: Which plan last validated this story?

      REGRESSION DETECTION:
      If a story previously had test_status=passed but current audit finds implementation
      deviations, report as "Story Regression" (not just "User Story Failure").
      This distinction is important for executor STORY_REGRESSION feedback triggers.

      Include story metadata status in the final audit report under a dedicated
      "Story Test Metadata" section.
    - |
      AUDIT TEST QUALITY: Apply audit_checks per inputs.yml#audit_checks.
      For installation-related packages, also apply inputs.yml#installation_architecture_validation.
      For large packages (>20 files), use RLM per rlm_reference above and inputs.yml#rlm_audit_strategy.
    - |
      AUDIT SKIP PATTERNS: Find all skip patterns and cross-reference with acceptable-skips.yml.
      Apply inputs.yml#skip_pattern_audit criteria. Also review test-results/ XML for runtime skips.
      Categorize each: justified, unjustified (fixable), or needs investigation.
    - |
      AUDIT STRUCTURE: Review file/folder structure per inputs.yml#structural_issues.
      Flag duplicates or architectural violations. Do not fix - report to orchestrator.
    - |
      REPORT FINDINGS: Output per inputs.yml#audit_reporting format.
      Include: package path, user story results, skip audit results, test quality issues, structural issues.
      Constraints: inputs.yml#audit_constraints (do not fix, do not run tests).

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/
    # Audit specifics: See inputs.yml for audit_role, audit_checks, skip_pattern_audit, audit_constraints
    # NOTE: Behavioral constraints defined in inputs.yml#audit_constraints (single source of truth)