# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# containing the modules/AgenticGuidance/ directory.
# (e.g., modules/AgenticGuidance/assets/...).
# ==============================================

# Test User Simulator Agent Inputs
# Defines the minimal context needed for user simulator agents to execute
# user journeys following documentation only (agent-blind-test strategy)
#
# PURPOSE:
# User simulator agents simulate real users following documentation to complete
# user stories. They test BOTH local AND Docker environments to validate
# documentation completeness and catch discoverability gaps.
#
# RESPONSIBILITIES:
# - Execute user stories following ONLY documentation (agent-blind test)
# - Test in both local and Docker environments
# - Report documentation gaps and unclear instructions
# - Validate that journeys are completable with zero prior knowledge
#
# CONSTRAINTS:
# - NO code inspection (black box testing)
# - NO additional context beyond README, architecture, and user story definition
# - Receives user story definition from orchestration agent in prompt

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#test"
  role: "test-user-simulator"

inputs:
  agent_type: "test-user-simulator"
  version: "2.0"  # Reference layer architecture

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

  # Agent-specific inputs (only what's unique to test-user-simulator)
  core_inputs:
    # User story definitions and structure
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
      description: "User story structure, location (docs/userstories/), and how orchestration passes them to simulators"
      required: true

    # Project documentation that users would have
    - type: file
      path: "docs/README.md"
      description: "Main documentation index and navigation (if it exists)"
      required: false

    # Testing methodology
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/strategy-agent-blind-test.yml"
      description: "Agent blind test strategy for documentation validation and multi-environment testing"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/strategy-user-acceptance.yml"
      description: "User acceptance testing strategy"
      required: true

    # Live plan for failure reporting (when executing in test-fix-loop)
    - type: pattern
      path: "docs/plans/live/*/"
      description: "Live plan folders for structured failure reporting when executing in test-fix-loop context (folder-based structure)"
      required: false

  # Guidelines this agent should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/definitions/strategy-agent-blind-test.yml"
      description: "Agent-blind-test strategy and multi-environment validation requirements"

    - path: "modules/AgenticGuidance/assets/definitions/strategy-user-acceptance.yml"
      description: "User acceptance testing requirements"

  # User simulator specific terminology and concepts
  definitions:
    agent_blind_test: |
      Testing strategy where agent follows documentation only, without
      inspecting code. Simulates real user experience to catch UX gaps.
      Agent treats system as black box and reports documentation issues.

      Purpose: Validate documentation completeness and usability
      Phase: Documentation validation, release preparation

      Critical requirements:
      - Testing with subagents, NOT testing with code
      - Subagents execute actual commands as users would
      - Test BOTH local AND Docker environments
      - Execute each journey step EXACTLY as written
      - Verify ACTUAL outcomes, not just help text
      - NO --help-only validation

      Process:
      - Orchestration agent reads user stories from docs/userstories/<project>/
      - One agent per user story
      - Agent receives only: docs/README.md, docs/ARCHITECTURE.md, and user story definition
      - Agent does NOT read userstories files directly (keeps it "blind")

    user_story: |
      User stories define personas, starting states, journey steps, and success
      criteria for UAT testing. Located in docs/userstories/<project>/.

      Each user story includes:
      - id: Unique identifier (e.g., US-CLI-001)
      - name: Human-readable name
      - category: Grouping (cli_basics, setup, development, etc.)
      - persona: Who is the user
      - priority: critical, high, medium, low
      - starting_state: Initial environment conditions
      - journey: Step-by-step actions with expected outcomes
      - success_criteria: What must pass
      - testing: Local and Docker testing instructions

      Orchestration agent passes user story definition in prompt to keep
      simulator "blind" (no code or extra context).

    multi_environment_testing: |
      User simulator agents MUST test BOTH local AND Docker environments
      to validate developer workflow AND CI/CD parity.

      Purpose: Catch environment-specific issues
      - Local test validates developer experience
      - Docker test validates CI/CD and deployment parity
      - Differences between environments are important findings

    documentation_gap: |
      When a user simulator cannot complete a journey step using only
      documentation, that's a documentation gap (test failure).

      Types of gaps:
      - Missing steps or instructions
      - Unclear or ambiguous wording
      - Undiscoverable commands or options
      - Wrong or outdated information

      Report these as failures with recommendations for documentation fixes.

    functional_testing_requirement: |
      User simulators MUST execute ACTUAL commands, not just --help validation.

      PROHIBITED:
      - Running only `myagents <command> --help` instead of actual commands
      - Reporting "PASS" based on help text validation alone
      - Skipping journey steps because they "require infrastructure"

      REQUIRED:
      - Execute each journey step EXACTLY as written
      - Verify ACTUAL outcomes, not just that help text exists
      - Test from the EXACT directories specified in the user story
      - Capture actual command outputs as evidence

    failure_reporting_structure: |
      When executing in test-fix-loop context, failures must be reported
      to the live plan in a structured format:

      - user_story_id: the user story being tested
      - step: which journey step failed (number and description)
      - failure_type: "documentation_gap", "unexpected_error", "unclear_instructions", "docker_difference"
      - description: clear description of what failed
      - user_impact: how this affects the user persona
      - tested_environments: ["local", "docker"] or subset that was tested
      - local_result: pass/fail and details
      - docker_result: pass/fail and details
      - recommendation: what should be fixed

      This enables build agents to consume and fix failures independently.
