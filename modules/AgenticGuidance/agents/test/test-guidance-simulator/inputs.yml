# Test Guidance Simulator Agent Inputs
# Defines the minimal context needed for guidance simulator agents to execute
# agent tasks following ONLY guidance files (guidance-blind-test strategy)
# See process.yml for goal, responsibilities, and execution steps.
#
# CONSTRAINTS:
# - NO code inspection (cannot read implementation files)
# - NO codebase exploration beyond guidance references
# - Receives target agent specification from orchestration agent in prompt

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-guidance-simulator"

inputs:
  agent_type: "test-guidance-simulator"
  version: "1.0-pilot"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

  # Agent-specific inputs (only what's unique to test-guidance-simulator)
  core_inputs:
    # Testing methodology
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
      description: "Guidance blind test component with test flow, validation checklist, and iteration patterns"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
      description: "Test scenario definitions for guidance validation including friction categorization and execution patterns"
      required: true

    # Target agent guidance files (provided dynamically by orchestration agent)
    - type: pattern
      path: "modules/AgenticGuidance/agents/**/{process.yml,inputs.yml}"
      description: "Target agent guidance files - specific agent path provided in prompt (outputs defined in process.yml)"
      required: false

  # Guidelines this agent should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
      description: "Guidance-blind-test component and validation requirements"

  # Guidance simulator specific terminology and concepts
  definitions:
    guidance_blind_test: |
      Testing strategy where agent is given ONLY the target agent's guidance files
      (process.yml, inputs.yml) without access to implementation code.
      See guidance_blind_test.mmd and guidance-test-scenarios.yml for full test scenarios.

      Critical requirements:
      - Receives ONLY guidance files from target agent
      - NO access to implementation files (code, scripts, binaries)
      - NO codebase exploration beyond guidance references
      - Must attempt task execution using guidance alone
      - Reports friction when guidance is insufficient

    target_agent: |
      The agent being tested by the guidance simulator. Orchestration agent
      specifies target agent name and guidance file locations in prompt.
      Simulator receives only process.yml and inputs.yml - determines task,
      inputs, outputs, and execution steps from these files alone.

    friction_categorization: |
      See guidance-test-scenarios.yml for full severity definitions (CRITICAL/HIGH/MEDIUM/LOW).
      Report friction using FRICTION_POINT structure from friction.yml.

    guidance_gap_report: |
      A guidance gap occurs when simulator cannot complete task execution using
      only guidance files. Report as friction points with severity, recommendations,
      impact, and example of what guidance should specify.
