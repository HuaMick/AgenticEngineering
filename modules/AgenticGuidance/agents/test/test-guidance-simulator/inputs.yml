# Test Guidance Simulator Agent Inputs
# Defines the minimal context needed for guidance simulator agents to execute
# agent tasks following ONLY guidance files (guidance-blind-test strategy)
#
# PURPOSE:
# Guidance simulator agents test whether agent guidance (process.yml, inputs.yml)
# is self-sufficient for task completion without code inspection or exploration.
#
# RESPONSIBILITIES:
# - Execute agent tasks using ONLY guidance files
# - Validate path resolution and input discoverability
# - Test loop context, subagent spawning, and dependency chains
# - Report guidance gaps with friction categorization
# - Recommend guidance improvements
#
# CONSTRAINTS:
# - NO code inspection (cannot read implementation files)
# - NO codebase exploration beyond guidance references
# - Receives target agent specification from orchestration agent in prompt

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-guidance-simulator"

inputs:
  agent_type: "test-guidance-simulator"
  version: "1.0-pilot"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

  # Agent-specific inputs (only what's unique to test-guidance-simulator)
  core_inputs:
    # Testing methodology
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
      description: "Guidance blind test component with test flow, validation checklist, and iteration patterns"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
      description: "Test scenario definitions for guidance validation including friction categorization and execution patterns"
      required: true

    # Target agent guidance files (provided dynamically by orchestration agent)
    - type: pattern
      path: "modules/AgenticGuidance/agents/**/{process.yml,inputs.yml,outputs.yml}"
      description: "Target agent guidance files - specific agent path provided in prompt"
      required: false

  # Guidelines this agent should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
      description: "Guidance-blind-test component and validation requirements"

  # Guidance simulator specific terminology and concepts
  definitions:
    guidance_blind_test: |
      Testing strategy where agent is given ONLY the target agent's guidance files
      (process.yml, inputs.yml, outputs.yml) without access to implementation code.

      Purpose: Validate that guidance alone enables task understanding and execution
      Phase: Guidance validation, agent development quality assurance

      Critical requirements:
      - Receives ONLY guidance files from target agent
      - NO access to implementation files (code, scripts, binaries)
      - NO codebase exploration beyond guidance references
      - Must attempt task execution using guidance alone
      - Reports friction when guidance is insufficient

      Test scenarios (from guidance_blind_test.mmd and guidance-test-scenarios.yml):
      1. TASK_COMPLETION_TEST - Can agent complete task with guidance only?
      2. REFERENCE_RESOLUTION_TEST - Do all paths resolve correctly?
      3. LOOP_CONTEXT_TEST - Do loop participants have loop_context?
      4. SUBAGENT_SPAWNING_TEST - Can orchestrators spawn children?
      5. CROSS_AGENT_DEPENDENCY_TEST - Are dependencies explicit?

    target_agent: |
      The agent being tested by the guidance simulator. Orchestration agent
      specifies target agent name and guidance file locations in prompt.

      Target agent specification includes:
      - name: Agent identifier (e.g., "explorer-validation")
      - guidance_path: Location of agent guidance directory
      - files: process.yml, inputs.yml, outputs.yml (if present)

      Simulator receives only these guidance files and must determine:
      - What task the agent performs (from process.yml goal)
      - What inputs are required (from inputs.yml)
      - What outputs are created (from outputs.yml)
      - How to execute the task (from process.yml steps)

      Orchestration agent passes target agent specification in prompt to keep
      simulator "blind" (no code or extra context).

    friction_categorization: |
      When guidance is insufficient, friction points are categorized by severity:

      CRITICAL (P0):
      - Task cannot proceed without additional context
      - Required input paths missing from inputs.yml
      - Process steps reference undefined variables/concepts
      - Circular dependencies or unresolvable references
      - No way to complete task using guidance alone

      HIGH (P1):
      - Significant ambiguity requiring code inspection
      - Unclear execution order or dependencies
      - Missing loop_context for loop participants
      - Subagent paths not discoverable from inputs.yml
      - Guidance contradicts actual requirements

      MEDIUM (P2):
      - Guidance present but unclear or incomplete
      - Input descriptions too vague
      - Process steps lack necessary detail
      - Edge cases not documented
      - Requires inference to understand intent

      LOW (P3):
      - Minor discoverability issues
      - Task completable with reasonable effort
      - Guidance could be clearer but sufficient
      - Optional inputs not well documented

      Report friction using FRICTION_POINT structure from friction.yml

    guidance_gap_report: |
      When a guidance simulator cannot complete task execution using only
      guidance files, that's a guidance gap (test failure).

      Types of gaps:
      - Missing input file paths in inputs.yml
      - Ambiguous or incomplete process steps
      - Undiscoverable subagent references
      - Missing loop_context for iterative agents
      - Undefined dependencies or execution order
      - Vague input/output descriptions

      Report these as friction points with:
      - Severity categorization (CRITICAL, HIGH, MEDIUM, LOW)
      - Specific guidance improvement recommendations
      - Impact on agent execution capability
      - Example of what guidance should specify
