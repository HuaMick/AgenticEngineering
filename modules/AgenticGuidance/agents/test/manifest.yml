# Test Agent Category Manifest
# Migrated: 2026-01-03
# Reference: assets/definitions/agent-categories.yml#test

category:
  definition: "assets/definitions/agent-categories.yml#test"

  purpose: "Validation through testing and quality assurance"

  responsibility: |
    Execute tests, audit test quality, simulate guidance execution, validate final outputs

  boundaries: |
    Test agents validate; they do not fix or implement

sub_agents:
  - test-runner
  - test-audit
  - test-final-output
  - test-guidance-simulator

# Not migrated (not referenced by AgenticGuidance):
# - test-builder
# - test-user-simulator
# - test-service
# - test-flutter-builder
# - test-flutter-runner

routing:
  description: |
    Test agents are invoked through orchestration workflows and planner processes:
    - test-runner: Executes Python tests and reports results (smoke_test strategy)
    - test-audit: Reviews test quality, detects reward hacking (audit strategy)
    - test-final-output: Validates final outputs and execution data completeness
    - test-guidance-simulator: Executes walkthrough-based guidance validation (guidance-test-loop)
