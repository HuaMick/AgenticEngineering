name: test-builder
description: "Creates, updates, and executes test files. Builds rigorous tests for Unit, Integration, and E2E coverage, then runs them via pytest to validate results."
# Version scheme: X.Y where X = architecture version, Y = iteration
# 3.0 = added execution + result capture capabilities
version: "3.0"
category: test

responsibilities:
  - Create and update test files that expose defects
  - Execute tests via pytest and capture results
  - Parse JUnit XML output for structured result reporting
  - Build rigorous tests for Unit, Integration, and E2E coverage
