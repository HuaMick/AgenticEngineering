# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# containing the modules/AgenticGuidance/ directory.
# (e.g., modules/AgenticGuidance/assets/...).
# ==============================================

# Test Builder Agent Inputs Specification
# This file defines the inputs that test-builder agents need to CREATE and MODIFY tests
# Test builders create, update, AND execute tests
# Following context-minimization principle: only include what's needed for test creation

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-builder"

inputs:
  agent_type: "test-builder"
  version: "2.0"  # Reference layer architecture

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/test-shared.yml"
      description: "Test category shared inputs (reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

  # Agent-specific inputs (only what's unique to test-builder)
  core_inputs:
    # Project architecture - understanding what to test
    - type: file
      path: "docs/architecture/workflows.md"
      description: "Workflow documentation for understanding system flows and integration points to test"
      required: false

    # Testing strategies specific to test-builder
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/strategy-user-simulation.yml"
      description: "User simulation testing strategy"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/strategy-test-suite.yml"
      description: "Test suite execution strategy"
      required: true

    # Test examples and patterns - how to write good tests
    - type: directory
      path: "modules/AgenticGuidance/assets/examples/test/"
      description: "Test pattern examples: tests that should NOT be skipped, setup requirements, good vs bad test patterns"
      required: true

    # Test documentation for reference
    - type: file
      path: "docs/testing/README.md"
      description: "Testing documentation quick reference - understanding the testing ecosystem"
      required: false

    # Workflow-specific test guidance (when available)
    - type: pattern
      path: "tests/workflows/*/README.md"
      description: "Workflow-specific testing guidance and patterns (when available for specific workflows)"
      required: false

    # Live plan for test-fix-loop context
    - type: pattern
      path: "docs/epics/live/*/"
      description: "Live epic folders for reading assigned test failures to fix during test-fix-loop iterations (folder-based structure)"
      required: false

  # Story inputs — REQUIRED for story-first compliance
  story_inputs:
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
      description: "User story structure and authoritative path"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/specifications/story-schema.yml"
      description: "Story schema definition and validation checklist"
      required: true

    - name: "affected_stories"
      source: "ticket.inputs.affected_stories"
      description: "List of story IDs (US-XXX-NNN) from the ticket that tests should validate"
      required: true

  # Guidelines that test-builder agents should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/guidelines/testing.yml"
      description: "Testing behavioral guidelines"

    - path: "modules/AgenticGuidance/assets/guidelines/strategy-user-simulation.yml"
      description: "User simulation testing strategy"

    - path: "modules/AgenticGuidance/assets/guidelines/strategy-test-suite.yml"
      description: "Test suite execution strategy"

    - path: "modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml"
      description: "Reward hacking prevention guidelines"

    - path: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Test-fix-loop iteration patterns"

    - path: "modules/AgenticGuidance/assets/guidelines/less-is-more.yml"
      description: "Minimal viable change principles"

    - path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
      description: "Question generation when blocked on test expectations or implementation decisions"
      required: true

  # Test builder specific terminology and concepts
  # Note: Definitions externalized to shared asset files for single source of truth
  # - test_builder_role: modules/AgenticGuidance/assets/definitions/test-builder-role.yml
  # - test_creation_principles: modules/AgenticGuidance/assets/guidelines/test-creation-principles.yml
  # - test_fix_loop_context: modules/AgenticGuidance/assets/guidelines/iteration.yml
  # - testing_types (smoke_test, component_test, integration_test, workflow_test): modules/AgenticGuidance/assets/definitions/testing-types.yml
  definitions:
    reference: "modules/AgenticGuidance/assets/definitions/testing-types.yml"
    description: "Test type definitions (smoke_test, component_test, integration_test, workflow_test)"
