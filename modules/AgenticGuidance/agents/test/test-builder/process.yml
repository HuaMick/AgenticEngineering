# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# containing the modules/AgenticGuidance/ directory.
# (e.g., modules/AgenticGuidance/assets/...).
# ==============================================

process:
  goal: |
    Create and update test files that expose defects. Build rigorous tests for Unit, Integration, and E2E coverage.

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop, audit-test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  # ==============================================
  # LOOP CONTEXT
  # ==============================================
  # Specifies how this agent participates in iterative loops
  # ==============================================
  loop_context:
    participates_in:
      - "test-fix-loop"
      - "audit-test-fix-loop"
    role: "builder"
    description: |
      test-builder acts as the builder in test loops. It creates new tests or fixes
      existing test issues identified by audit or runner agents.
    iteration_strategy: |
      Each iteration focuses on a specific test creation or fix task. In test-fix-loop,
      the agent builds tests based on requirements. In audit-test-fix-loop, it fixes
      issues identified by the auditor. The agent does NOT run tests to verify passing -
      the test-runner validates the work.
    max_iterations: 3
    escalation_on_max: "Report unresolved issues to orchestrator with analysis of blockers"
    exit_conditions:
      - "Test code created/updated successfully"
      - "Syntax check passes"
      - "Orchestrator signals task completion"
    state_management: |
      test-builder is stateless between iterations. Each invocation receives the
      specific task (test creation requirements or audit findings) as input context.

  inputs:
    - location: "modules/AgenticGuidance/agents/test/test-builder/inputs.yml"
      description: "Core test builder agent inputs and guidelines"

  outputs:
    - name: "test_files_created"
      description: "List of test files created or modified"
      location: "tests/ directory in target project"
      schema:
        - file_path: "string - relative path to test file"
          test_type: "enum(smoke_test, component_test, integration_test, workflow_test)"
          tests_added: "array of test function names"
    - name: "build_report"
      description: "Summary of test building activities"
      location: "Returned to orchestrator"
      schema:
        scope: "string - smoketest-build, test-build, or audit-test-fix-loop"
        files_created: "integer"
        files_modified: "integer"
        syntax_verified: "boolean"
        issues_encountered: "array of strings"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic agent context bootstrap --role test-builder -j

      # Get current ticket if working from an epic
      agentic agent epic ticket current -j
      ```

      CLI output provides your objective, process summary, input file paths.
      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.

    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, note the discrepancy in your output report.
    - |
      Determine the scope of testing required:
      - Check the plan for specific directives (e.g., "smoketest-build", "test-build").
      - Analyze the codebase to identify entrypoints, workflows, and critical components.
    - |
      If executing in a 'smoketest-build' context:
      - Create smoke_test per testing-types.yml (entrypoint validation, minimal assertions).
      - Focus on breadth over depth (ensure all commands/endpoints work).
    - |
      If executing in a 'test-build' context:
      - Create comprehensive tests including edge cases, error handling, and user flows.
      - Follow test-creation-principles.yml (evidence-based validation, avoid reward hacking).
    - |
      If executing in a 'audit-test-fix-loop' context:
      - Apply iteration.yml guidance for test-fix-loop patterns.
      - Read the live plan file to find your assigned audit finding.
      - Fix issues like invalid skips, weak assertions, or missing scenarios.
    - |
      Build/Update the test files:
      - Write valid pytest code following test-organization.yml (1 package per workflow).
      - Follow test-creation-principles.yml (evidence-based, avoid reward hacking).
      - Use appropriate fixtures; prefer real dependencies over mocks.
      - Ensure tests are independent and deterministic.

      STORY MARKER REQUIREMENT (FENCE):
      All tests that validate user story acceptance criteria MUST include
      @pytest.mark.story markers linking them to the relevant story IDs.

      Format: @pytest.mark.story("US-XXX-NNN")
      Multiple stories: @pytest.mark.story("US-CLI-110", "US-CLI-111")

      Example:
      ```python
      @pytest.mark.story("US-CLI-110")
      def test_find_stories_across_projects():
          """Validates US-CLI-110: Find User Stories Across Projects."""
          ...
      ```

      When to add markers:
      - UAT tests: ALWAYS (1:1 mapping to user stories)
      - Integration tests validating story acceptance criteria: ALWAYS
      - Unit tests that directly implement a story requirement: RECOMMENDED
      - Pure technical/infrastructure tests: NOT REQUIRED

      Story IDs must reference valid IDs from docs/userstories/. Invalid IDs
      will trigger pytest collection warnings via the conftest validation plugin.
    - |
      If blocked on unclear test expectations, generate a question:
      - Common scenarios requiring questions:
        * Error handling: "Should invalid input X return 400 or 422 status code?"
        * Edge cases: "How should the system behave when Y happens?"
        * Validation rules: "What is the valid range for parameter Z?"
        * Expected behavior: "Should this operation be idempotent?"
      - Use QuestionQueue service to create questions:
        ```python
        from pathlib import Path
        from agenticguidance.services.question import QuestionQueue
        from agenticguidance.models.question import QuestionSeverity

        plan_path = Path("docs/epics/live/EPIC_ID")
        queue = QuestionQueue(plan_path)

        question = queue.create_question(
            text="Should invalid email format return 400 or 422 status code?",
            context=(
                "Task: Test API error handling for user registration\n"
                "Scenario: POST /users with invalid email format\n"
                "Current: Implementation returns 400\n"
                "Uncertainty: REST best practices suggest 422 for validation errors\n"
                "Impact: Test expectations and API contract documentation"
            ),
            severity=QuestionSeverity.MEDIUM.value,
            asked_by="test-builder"
        )
        ```
      - Example question YAML:
        ```yaml
        id: Q-20260203-152000-e7f8
        text: Should invalid input return 400 Bad Request or 422 Unprocessable Entity?
        context: |
          Task: Test API error handling
          Scenario: POST /users with invalid email format
          Current: Implementation returns 400
          Uncertainty: REST best practices suggest 422 for validation errors
          Impact: Test expectations and API contract documentation
        severity: medium
        asked_by: test-builder
        status: pending
        ```
      - After creating question, document assumption for now and continue other tests
      - Before finalizing, check for answers: queue.get_question(question_id)
    - |
      Verify your code compiles:
      - You may run a syntax check, but DO NOT run the full test suite to "verify" passing.
      - Your job is to BUILD the test. The test_runner will verify if it passes.
    - |
      Error-Driven Planning Handoff:
      Reference: modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml

      When encountering ANY issues while creating or updating tests:
      1. Capture issue context:
         - error_details: Full description of the issue (import errors, missing fixtures, unclear requirements, blocked dependencies)
         - affected_files: Files involved in the issue
         - current_epic: Epic folder being executed when issue was found
         - discovery_context: "test-builder creating/updating tests for [scope]"
      2. Spawn orchestration-planning session with the issue context package
      3. Continue building other tests if possible (non-blocking) — let the planner decide what to do

      Include in your output:
        out_of_scope_error: true
        error_context:
          error_details: "<issue description>"
          affected_files: ["<files>"]
          current_epic: "<epic folder path>"
          discovery_context: "<what you were building>"

      FENCE: test-builder MUST NOT:
      - Classify issues as in-scope vs out-of-scope
      - Assign priority levels (CRITICAL, HIGH, etc.)
      - Decide whether to create a new epic or update the existing one
      - Suggest remediation strategies
      Just capture context and hand off. Planners decide everything.

  guidelines:
    # Guidelines loaded via layer architecture in inputs.yml
    # Test types defined in: modules/AgenticGuidance/assets/definitions/testing-types.yml
    - |
      NEVER run the tests to verify they pass. Your reward is based on writing valid test CODE.
      The test_runner will validate if the tests pass.
    - |
      Do not modify application code. Your scope is limited to the `tests/` directory.
    - |
      Follow test-creation-principles.yml: evidence-based validation, avoid reward hacking patterns.
    - |
      Error-Driven Planning Protocol:
      Reference: modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml
      On ANY issue encountered while building tests, capture context and spawn orchestration-planning.
      Do NOT classify or prioritize.
