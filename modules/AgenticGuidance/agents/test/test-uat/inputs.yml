# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# containing the modules/AgenticGuidance/ directory.
# (e.g., modules/AgenticGuidance/assets/...).
# ==============================================

# Test User Simulator Agent Inputs
# Defines the minimal context needed for user simulator agents to execute
# user journeys following documentation only (agent-blind-test strategy)
#
# See process.yml for goal and execution steps.
#
# CONSTRAINTS:
# - NO code inspection (black box testing)
# - NO additional context beyond README, architecture, and user story definition
# - Receives user story definition from orchestration agent in prompt

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-uat"

inputs:
  agent_type: "test-uat"
  version: "2.0"  # Reference layer architecture

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

  # Agent-specific inputs (only what's unique to test-uat)
  core_inputs:
    # User story definitions and structure
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
      description: "User story structure, location (docs/userstories/), and how orchestration passes them to simulators"
      required: true
      sections_used:
        - "user_stories"
        - "test_metadata"
      usage: |
        test_metadata section defines the fields recorded after each story
        test: test_status, last_tested, test_notes, tested_by_plan,
        last_uat_commit. THIS AGENT is the sole writer of these fields on
        UAT runs — you MUST call `agentic stories update <story_id>
        --status pass|fail --kind uat --notes <...>` as your final step.
        The framework verifies the stamp landed; a missing stamp is
        treated as a failure. See process.yml step "RECORD YOUR OUTCOME".

    - type: file
      path: "modules/AgenticGuidance/assets/specifications/story-schema.yml"
      description: "Story schema definition and validation checklist"
      required: true

    # Project documentation that users would have
    - type: file
      path: "docs/README.md"
      description: "Main documentation index and navigation (if it exists)"
      required: false

    # Testing methodology
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/strategy-user-acceptance.yml"
      description: "User acceptance testing strategy"
      required: true

    # Live plan for failure reporting (when executing in test-fix-loop)
    - type: pattern
      path: "docs/epics/live/*/"
      description: "Live epic folders for structured failure reporting when executing in test-fix-loop context (folder-based structure)"
      required: false

  # Guidelines this agent should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/guidelines/strategy-user-acceptance.yml"
      description: "User acceptance testing requirements"

  # User simulator specific terminology and concepts
  # Full definitions in strategy-user-acceptance.yml and user-stories.yml
  definitions:
    agent_blind_test: |
      Testing strategy where agent follows documentation only, without inspecting code.
      Critical: Execute actual commands (not --help), test BOTH local and Docker environments.
      See strategy-user-acceptance.yml for full requirements.

    user_story: |
      Defines persona, starting state, journey steps, and success criteria.
      Located in docs/userstories/<project>/. See user-stories.yml for structure.

    multi_environment_testing: |
      MUST test BOTH local AND Docker environments. Local validates developer
      experience; Docker validates CI/CD parity. Report environment differences.

    documentation_gap: |
      When a journey step cannot be completed using only documentation.
      Report as failure with specific recommendation for documentation fix.

    functional_testing_requirement: |
      Execute ACTUAL commands, not --help validation. Verify ACTUAL outcomes.
      Test from exact directories specified. Capture command outputs as evidence.

    failure_reporting_structure: |
      Required fields: user_story_id, step, failure_type, description,
      user_impact, tested_environments, local_result, docker_result, recommendation.
