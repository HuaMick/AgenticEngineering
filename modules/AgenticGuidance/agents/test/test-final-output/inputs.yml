# Test Final Output Agent Inputs Specification
# This file defines the minimal inputs needed for final output validation and reporting
# This agent validates test results, creates summaries, and determines overall pass/fail

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-final-output"

inputs:
  agent_type: "test-final-output"
  version: "2.0-pilot"  # Using reference layers

  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/test-shared.yml"
      required: true

  # RLM-related inputs (loaded when execution data exceeds thresholds)
  rlm_inputs:
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"
      description: "RLM pattern definitions for context decomposition"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/specifications/rlm-context-accessor.yml"
      description: "RLM context accessor API for programmatic context operations"
      required: false

  # Agent-specific inputs (only what's unique to test-final-output)
  core_inputs:
    # Final outcome report template and structure
    - type: file
      path: "modules/AgenticGuidance/assets/examples/test/final_outcome_report.yml"
      description: "Example structure for final outcome reports - package-level results, next steps with WHY, goal achievement, design decisions"
      required: true

    # Critical questions for skeptical audit
    - type: file
      path: "modules/AgenticGuidance/assets/examples/test/critical_questions.yml"
      description: "Skeptical questions for reviewing execution data - identifies red flags like workarounds, hardcoded paths, test/production divergence, help-only validation"
      required: true

    - type: dynamic
      path: "<live_epic_path>"
      description: "Live epic file path (provided by orchestration agent)"
      required: true

    - type: dynamic
      path: "<orchestration_execution_data>"
      description: "Execution data: changes, test results, failures, design decisions (passed inline by orchestration agent)"
      required: true

  # Guidelines that test-final-output agent should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/guidelines/strategy-multi-layer.yml"
      description: "Multi-layer testing strategy for understanding different testing approaches"

  # Test-final-output specific terminology and concepts
  definitions:
    multi_layer_testing: |
      Validation approach using multiple complementary testing strategies.
      No single testing layer can catch all bug types.

      Layers:
      1. Automated tests (unit, integration, e2e) - catch logic errors, regressions
      2. Fresh environment testing - catch portability issues, configuration gaps
      3. Manual verification - catch UX issues, error message clarity
      4. Follow-docs-exactly test - catch documentation gaps, missing steps
      5. Blind-test validation - catch documentation usability issues

      Each layer catches different types of issues. All layers required for comprehensive coverage.

    acceptable_skips: |
      Only the following test skips are acceptable:

      1. Registry Authentication Tests (5 tests):
         - Require GCP Artifact Registry credentials
         - Skip reason: "Registry authentication packages not available"

      2. Shellcheck Test (1 test):
         - Requires shellcheck binary installed
         - Skip reason: "shellcheck not found"

      Any other skips indicate a problem that needs to be fixed.
      Studio tests should NOT skip - start Studio first if they do.

    failure_reporting: |
      Structured format for documenting test failures in live epic.

      Required fields:
      - test_name: Name of the failing test
      - component: Component or workflow being tested
      - failure_description: What went wrong
      - expected_behavior: What should have happened
      - actual_behavior: What actually happened
      - files_involved: Files that may need changes

      Purpose: Enables dynamic spawning of builder agents with precise fix targets

    agent_blind_test: |
      Testing strategy where agent follows documentation only, without
      inspecting code. Simulates real user experience to catch UX gaps.
      Agent treats system as black box and reports documentation issues.

      Purpose: Validate documentation completeness and usability
      Phase: Documentation validation, release preparation
      Critical requirements:
      - Testing with subagents, NOT testing with code
      - Subagents execute actual commands as users would
      - Test BOTH local AND Docker environments
      - Execute each journey step EXACTLY as written
      - Verify ACTUAL outcomes, not just help text
      - NO --help-only validation

      Process:
      - Orchestration agent reads user stories from docs/userstories/<project>/
      - One agent per user story
      - Agent receives only: docs/README.md, modules/AgenticGuidance/docs/ARCHITECTURE.md, and user story definition
      - Agent does NOT read userstories files directly (keeps it "blind")

    reward_hacking: |
      Pattern where tests pass but don't actually validate intended behavior.

      Examples:
      - Mocking the behavior being tested instead of testing real implementation
      - Overly permissive assertions (e.g., len(output) > 0)
      - Checking implementation details instead of user-facing behavior
      - Missing negative test cases
      - Help-text only checks instead of functional tests
      - Checking success=True without verifying actual outcomes

      Prevention:
      - Separate builder and validator roles
      - Require evidence, not just success flags
      - Use audit-test-fix-loop to review test quality
      - Define outcome-based success criteria
      - Evidence-based validation (file X exists and contains Y)

    rlm_interrogation_strategy: |
      RLM (Recursive Language Model) enables interrogating large execution data
      that would otherwise exceed context limits. Use when execution data
      exceeds 5000 lines (multi-phase test runs, large log outputs).

      Anomaly detection operations (see process.yml#rlm_patterns):
      - scan_for_workarounds: Find HACK/WORKAROUND/TODO patterns
      - detect_path_anomalies: Find hardcoded paths
      - scan_skip_patterns: Find skipped functionality
      - measure_pass_fail_ratio: Calculate test result ratios

      Question generation:
      - Questions generated from accumulated anomalies
      - Each question linked to specific evidence and location
      - Questions prioritized by severity (CRITICAL > HIGH > MEDIUM > LOW)

    anomaly_severity_matrix: |
      Severity classification for anomalies found in execution data:

      CRITICAL (immediate attention required):
      - Production path references in test code
      - Test results show 0% pass rate
      - Core functionality marked as skipped
      - Security-related tests disabled
      - Data corruption indicators

      HIGH (blocks release):
      - Workarounds without issue references
      - Hardcoded paths that break portability
      - >20% tests skipped without justification
      - Test/production configuration divergence
      - Regression from previous test run

      MEDIUM (should address):
      - TODO/FIXME without timeline or issue reference
      - Version mismatches in dependencies
      - Flaky test indicators (pass sometimes, fail sometimes)
      - Documentation gaps in changed areas

      LOW (nice to address):
      - Minor code style issues in logs
      - Non-blocking warnings
      - Performance suggestions
      - Documentation improvements
