process:
  goal: |
    Interrogate execution data to verify accuracy and completeness. Produce final summary for user when satisfied.

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (audit-test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  # RLM Patterns (for execution data >5000 lines)
  rlm_patterns:
    description: |
      RLM (Recursive Language Model) patterns enable interrogation of large execution
      data sets that exceed context limits. Use these patterns when execution data
      exceeds 5000 lines (multi-phase test runs, large log outputs).

    anomaly_detection_pattern:
      description: "Programmatic detection of anomalies in execution data"
      operations:
        scan_for_workarounds:
          description: "Find workarounds vs proper fixes in execution data"
          grep_patterns:
            - "TODO|FIXME|HACK|WORKAROUND"
            - "temporary|temp fix|quick fix"
            - "skip.*for now|disable.*temporarily"
          example: |
            workarounds = get_context("CONTEXT_EXECUTION", filter="HACK|WORKAROUND|TODO")
            for match in workarounds:
                accumulate("ACCUMULATOR_ANOMALIES", {
                    "type": "workaround",
                    "severity": "HIGH",
                    "evidence": match.context,
                    "location": f"{match.file}:{match.line}"
                })

        detect_path_anomalies:
          description: "Find hardcoded or suspicious path references"
          grep_patterns:
            - "/home/code/|/Users/|C:\\\\Users\\\\"
            - "hardcoded|absolute path"
          example: |
            paths = get_context("CONTEXT_EXECUTION", filter="/home/code/|/Users/")
            # Flag any hardcoded paths as potential portability issues

        scan_skip_patterns:
          description: "Find evidence of skipped functionality"
          grep_patterns:
            - "skipped|SKIPPED|pytest\\.skip"
            - "not implemented|NotImplemented"
          example: |
            skips = get_context("CONTEXT_EXECUTION", filter="skipped|SKIPPED")

        measure_pass_fail_ratio:
          description: "Calculate pass/fail/skip ratios from test results"
          example: |
            passed = len(get_context("CONTEXT_EXECUTION", filter="PASSED|passed").split("\\n"))
            failed = len(get_context("CONTEXT_EXECUTION", filter="FAILED|failed").split("\\n"))
            skipped = len(get_context("CONTEXT_EXECUTION", filter="SKIPPED|skipped").split("\\n"))
            ratio = {"passed": passed, "failed": failed, "skipped": skipped}

    critical_question_generation:
      description: |
        Generate critical questions based on discovered anomalies.
        Questions are prioritized by severity and specificity.

      pattern: |
        # 1. Store execution data
        store_context("CONTEXT_EXECUTION", content=execution_data)

        # 2. Detect anomalies
        create_accumulator("ACCUMULATOR_ANOMALIES")
        scan_for_workarounds()
        detect_path_anomalies()
        scan_skip_patterns()

        # 3. Generate questions per anomaly
        create_accumulator("ACCUMULATOR_QUESTIONS")
        for anomaly in get_accumulated("ACCUMULATOR_ANOMALIES"):
            question = generate_question(anomaly)
            accumulate("ACCUMULATOR_QUESTIONS", {
                "question": question,
                "severity": anomaly.severity,
                "evidence": anomaly.evidence,
                "location": anomaly.location
            })

        # 4. Signal final with prioritized questions
        questions = get_accumulated("ACCUMULATOR_QUESTIONS", sort_by="severity")
        signal_final("FINAL_QUESTIONS", result=questions)

      severity_scoring:
        CRITICAL:
          - "Production path references in test code"
          - "Test results show 0% pass rate"
          - "Core functionality marked as skipped"
        HIGH:
          - "Workarounds without issue references"
          - "Hardcoded paths that will break in other environments"
          - ">20% tests skipped without justification"
        MEDIUM:
          - "TODO/FIXME comments without timeline"
          - "Test/production configuration divergence"
          - "Version mismatches in dependencies"
        LOW:
          - "Minor code style issues in logs"
          - "Documentation gaps not affecting functionality"

    recursive_data_analysis:
      description: |
        For multi-phase test runs, analyze each phase recursively
        and aggregate findings across phases.

      pattern: |
        # Store all execution data
        store_context("CONTEXT_FULL_EXECUTION", content=all_execution_data)

        # Extract phases
        phases = extract_phases("CONTEXT_FULL_EXECUTION")

        # Analyze each phase
        create_accumulator("ACCUMULATOR_PHASE_FINDINGS")
        for phase in phases:
            phase_context = get_context("CONTEXT_FULL_EXECUTION",
                                        filter=f"Phase: {phase.name}")
            findings = analyze_phase(phase_context)
            accumulate("ACCUMULATOR_PHASE_FINDINGS", {
                "phase": phase.name,
                "findings": findings,
                "pass_rate": calculate_pass_rate(phase_context)
            })

        # Cross-phase analysis
        all_findings = get_accumulated("ACCUMULATOR_PHASE_FINDINGS")
        trends = detect_cross_phase_trends(all_findings)

        signal_final("FINAL_ANALYSIS", result={
            "phase_findings": all_findings,
            "trends": trends,
            "critical_questions": generate_questions(all_findings)
        })

      max_recursion_depth: 3
      trigger_condition: "Execution data exceeds 5000 lines"

  loop_context:
    participates_in:
      - "audit-test-fix-loop"
    role: "final-validator"
    max_iterations: 4
    escalation_on_max: "Produce best-effort summary with explicit data gaps noted"
    exit_conditions:
      - "All required data verified present"
      - "Final summary produced and approved"
      - "Orchestrator signals acceptance"

  inputs:
    - location: "modules/AgenticGuidance/agents/test/test-final-output/inputs.yml"
      description: "Core test final output agent inputs and guidelines"

  outputs:
    - description: "Final summary output to terminal (if approved)"
      format: "Markdown formatted per final_outcome_report.yml in inputs"

  steps:
    - |
      Review all inputs. Orchestration agent provides:
      1. Live plan path (dynamic input in inputs.yml)
      2. Execution data (changes, test results, failures, design decisions)
    - |
      INTERROGATE EXECUTION DATA - Assume nothing, verify everything:
      Review execution data with skeptical eye using critical_questions.yml patterns:
      - What changed? Which tests passed/failed/skipped? Root causes identified?
      - Design decisions with rationale? Original goal? Unresolved issues?
      - Apply critical questions and watch for red flags per critical_questions.yml:
        * Workarounds vs proper fixes, hardcoded paths, test/production divergence
        * Version mismatches, hidden skipped tests, fragile solutions

      RLM FOR LARGE EXECUTION DATA (>5000 lines):
      If execution data exceeds 5000 lines (multi-phase runs, large logs), use RLM patterns:
      - Store execution data as context variable
      - Use anomaly_detection_pattern to scan for workarounds, path anomalies, skip patterns
      - Use critical_question_generation to produce severity-scored questions
      - Use recursive_data_analysis for multi-phase test run aggregation
      Reference: rlm_patterns section above for operation examples
    - |
      VALIDATE USER STORY FUNCTIONAL TESTING per critical_questions.yml:
      If execution data includes user story test results:
      - Verify functional tests executed (not just --help validation)
      - Check journey steps were actually executed per agent_blind_test in inputs.yml
      - Validate testing layers match requirements (local, docker, cloud_build)
      - Flag INVALID if help-only testing or missing evidence
      - Request evidence: which commands run, actual outputs, testing layers executed
    - |
      IDENTIFY MISSING INFORMATION:
      Flag data gaps preventing accurate final summary:
      - Missing root causes, unclear changes, vague test results, unjustified skips
      - Formulate specific questions per inputs.yml guidelines (not vague questions)
    - |
      ESCALATE QUESTIONS TO ORCHESTRATION AGENT:
      If missing information:
      - Report specific questions to orchestration agent
      - Wait for additional execution data or investigation results
      - Re-review with new data (iterate until sufficient data)
    - |
      VERIFY YOU HAVE SUFFICIENT DATA per inputs.yml requirements:
      Only proceed if you have ALL required data:
      - What changed, original goal, goal status, design decisions with rationale
      - Test results at package level, root causes for failures, skip justifications
      - User story validation evidence (if UAT performed)
      - 3 prioritized next steps with WHY
      If ANY missing: escalate questions, wait for data, re-verify
    - |
      PRODUCE YOUR FINAL SUMMARY per final_outcome_report.yml structure in inputs.yml:
      - Synthesize execution data into clear, concise summary
      - Use markdown formatting sparingly (only for failures/concerns)
      - Output to terminal only (not .md files)
      - Structure: Test Results, Next Steps (max 3 with WHY), Goal Achievement, Changes Made, Worktrees
      - Focus on what didn't work, concerns, gaps; minimize success celebration

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/
    # Core definitions: See modules/AgenticGuidance/assets/definitions/
    # Final output specifics: See critical_questions.yml and final_outcome_report.yml
    - "Be skeptical. Challenge everything. Ask questions if data lacks detail."
    - "Quality over speed. Request more data rather than produce an incomplete summary."
    - "Be SPECIFIC when requesting missing info - vague questions yield vague answers."
    - "FOCUS ON WHAT DIDN'T WORK - explain failures, gaps, risks. Minimize success celebration."
    - "Your job: interrogate data, ask for missing info, produce final summary. Never investigate yourself."
    - "Iterate until you have all data needed for an accurate summary."
    - "Follow final_outcome_report.yml examples for structure and tone."
