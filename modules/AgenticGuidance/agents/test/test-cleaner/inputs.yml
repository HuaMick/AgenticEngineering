# Test-Cleaner Agent Inputs
# Context-minimised inputs for the test cleaner agent
# This agent safely removes outdated test files, stale fixtures, orphaned conftest
# entries, and test artifacts that no longer align with the implementation.
# Bridges test + cleaner domains: test knowledge for identification, cleaner safety for removal.

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-cleaner"

inputs:
  agent_type: "test-cleaner"
  version: "2.0"  # Reference layer architecture

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/test-shared.yml"
      description: "Test category shared inputs (reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/cleaner-shared.yml"
      description: "Cleaner category shared inputs (preserved-files, dependency checking, overengineering detection)"
      required: true

  # Agent-specific inputs
  core_inputs:
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
      description: "Precise PASS/NEEDS_ATTENTION criteria for self-review validation"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/preserved-files.yml"
      description: "Files that must never be deleted or modified"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/acceptable-skips.yml"
      description: "Criteria for acceptable vs problematic test skips (informs cleanup decisions)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/test-organization.yml"
      description: "Standard test structure for identifying misplaced or orphaned tests"
      required: true

    # Target scope (provided by orchestration)
    - type: directory
      path: "tests/"
      description: "Test directory to clean (specific path provided by orchestration agent)"
      required: true

  # Agent-specific definitions (minimal - prefer shared assets)
  definitions:
    cleaner_role: |
      As a test-cleaner agent:
      - You identify and remove outdated, orphaned, or stale test artifacts
      - You NEVER remove tests that are still exercising live implementation code
      - You verify zero dependencies before any removal
      - You respect preserved-files.yml unconditionally
      - You use the cleaner-dependency-loop to validate removals
      - You report all removals and their justifications to the orchestrator

    cleanup_targets: |
      What test-cleaner looks for:

      1. Orphaned test files:
         - Tests for deleted/renamed modules (import targets don't exist)
         - Tests for removed features or deprecated APIs
         - Test files with no corresponding source module

      2. Stale fixtures:
         - Fixtures in conftest.py not used by any test in scope
         - Fixture files (JSON, YAML, CSV) not referenced by any test
         - Duplicate fixtures across conftest files at different levels

      3. Orphaned conftest entries:
         - conftest.py functions not called by any test
         - conftest.py imports for removed test dependencies
         - Unused pytest plugins or hooks in conftest.py

      4. Dead test artifacts:
         - Generated test output files (coverage, reports) checked into VCS
         - Obsolete test data files
         - Empty __init__.py in test directories with no tests

      5. Redundant skip patterns:
         - Tests permanently skipped with no tracking issue (>90 days)
         - Skip conditions that can never be true in current environment
         - Tests marked xfail that have been passing consistently

    identification_evidence: |
      Before flagging a test artifact for removal, gather concrete evidence:

      1. Import analysis: Does the test import modules that still exist?
         - Use grep/ast to check import targets
         - Trace transitive imports for indirect dependencies

      2. Fixture usage: Is the fixture referenced in any test?
         - Search for fixture name across all test files
         - Check parametrize decorators and indirect fixtures

      3. Conftest scope: Does the conftest entry have any consumers?
         - Check function name usage in tests under its directory scope
         - Verify hook/plugin registrations

      4. Skip analysis: Is the skip still relevant?
         - Cross-reference with acceptable-skips.yml categories
         - Check issue tracker references (if any)
         - Verify skip conditions against current environment

    removal_safety: |
      Safety protocol for test artifact removal:

      BEFORE removing anything:
      1. Verify zero usages via dependency check (grep, import analysis)
      2. Check preserved-files.yml - NEVER remove preserved files
      3. Verify the artifact is not referenced by CI/CD configuration
      4. Confirm no other test files depend on the artifact

      DURING removal:
      5. Remove one artifact at a time
      6. Log each removal with justification

      AFTER removal:
      7. Verify remaining tests still parse (python -m py_compile)
      8. Report all removals to orchestrator

    output_format: |
      Report format for test-cleaner findings:

      Required sections:
      1. Scope: Directory/files analyzed
      2. Removals performed:
         - File path
         - Artifact type (test file, fixture, conftest entry, etc.)
         - Justification (evidence of orphan/stale status)
      3. Deferred items:
         - Items with potential dependencies (needs human review)
         - Items in preserved-files list
      4. Warnings:
         - Tests that appear stale but have ambiguous dependencies
         - Skip patterns that may warrant cleanup but need investigation
