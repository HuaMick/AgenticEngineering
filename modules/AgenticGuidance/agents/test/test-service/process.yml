# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# containing the modules/AgenticGuidance/ directory.
# (e.g., modules/AgenticGuidance/assets/...).
# ==============================================

process:
  goal: |
    Validate backend service lifecycle: startup, stability, and health checks. Focus on infrastructure validation, not functional testing.

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/test/test-service/inputs.yml"
      description: "Core test service agent inputs and guidelines"

  outputs:
    - name: "service_status"
      description: "Current status of the service (running, failed, stopped)"
      location: "Returned to orchestrator"
      required: true
    - name: "health_check_results"
      description: "Results from HTTP health endpoint requests"
      location: "Returned to orchestrator"
      required: true
    - name: "stability_report"
      description: "Service stability validation results across multiple check intervals"
      location: "Returned to orchestrator"
      required: true
    - name: "log_errors"
      description: "ERROR, CRITICAL, FATAL level messages and exception traces found in logs"
      location: "Returned to orchestrator"
      required: false

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Start the service and wait for initialization per delayed_validation in inputs.yml (10+ seconds).
      Race conditions can mask failures - immediate status checks are unreliable.
    - |
      Validate service health by making actual HTTP requests to health endpoints.
      Follow test_execution_workflow in inputs.yml for Studio service validation.
      Don't rely solely on port availability - port checks only confirm process exists.
    - |
      Check logs for errors after the delayed validation period.
      Flag ERROR, CRITICAL, FATAL level messages and exception traces per service_validation in inputs.yml.
    - |
      Verify service stability per delayed_validation guidance in inputs.yml:
      - Initial status check after delay
      - Follow-up checks during test execution
      - Final status verification before reporting success
    - |
      Report results to orchestration agent per failure_reporting format in inputs.yml.
      Include service status, health check results, and any logged errors.

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (fix-the-source.yml, context-minimisation.yml, response-audit.yml, testing.yml, iteration.yml, safety.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, workflows.yml, domains.yml, entrypoints.yml, test-roles.yml, studio-integration-tests.yml, acceptable-skips.yml, strategy-*.yml)
    # Test guidelines: See modules/AgenticGuidance/assets/guidelines/ (test-organization.yml, test-execution-workflow.yml)
    # Service test specifics: See inputs.yml for test_runner, service_validation, test_execution_workflow, studio_integration_tests, acceptable_skips, failure_reporting, delayed_validation
    - |
      NEVER debug or fix issues you find. On fail proceed with the next
      test and report back all failures to the orchestration agent.
    - |
      Apply delayed_validation requirements from inputs.yml:
      - Wait 10+ seconds after service start
      - Make actual HTTP requests to health endpoints
      - Check service status multiple times
      - Review logs after delayed validation period
