# Test Runner Agent Inputs Specification
# This file defines the minimal inputs needed for test-runner agents
# Following context minimization: test-runner ONLY executes tests and reports results
# It does NOT modify tests or code

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.test"
  role: "test-runner"

inputs:
  agent_type: "test-runner"
  version: "2.0-pilot"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/test-shared.yml"
      description: "Test category shared inputs (reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

  # Agent-specific inputs (only what's unique to test-runner)
  core_inputs:
    # Test runner specific resources
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/test-runner-role.yml"
      description: "Test runner role definition and constraints"
      required: true

    # NOTE: The following paths reference files in the TARGET PROJECT (not this guidance module).
    # These are expected to exist in projects that adopt this agent guidance framework.

    # Live epic for failure reporting and state tracking
    - type: pattern
      path: "docs/epics/live/*/"
      description: "Live epic folders for structured failure reporting and state tracking (folder-based structure)"
      required: false
      note: "Target project path - expected in projects using this guidance"

    # Testing documentation - how to run tests
    - type: file
      path: "docs/testing/README.md"
      description: "Quick reference for running tests with pytest"
      required: true
      note: "Target project path - must exist in project under test"

    - type: file
      path: "docs/testing/LOCAL_TESTING.md"
      description: "Detailed local and Docker testing guide"
      required: false
      note: "Target project path - optional in projects using this guidance"

    # Test directories for execution
    - type: pattern
      path: "tests/workflows/*/README.md"
      description: "Workflow-specific testing guidance"
      required: false
      note: "Target project path - expected in projects using this guidance"

  # Guidelines that test-runner should follow
  guidelines:
    - path: "modules/AgenticGuidance/assets/guidelines/strategy-test-suite.yml"
      description: "Test suite execution strategy for understanding testing approaches"

    - path: "modules/AgenticGuidance/assets/guidelines/strategy-fresh-environment.yml"
      description: "Fresh environment testing strategy"

  # Test runner specific terminology and concepts
  # Note: Core definitions moved to shared asset files for context minimization
  # - test_runner_role: modules/AgenticGuidance/assets/definitions/test-runner-role.yml
  # - test_execution_workflow: modules/AgenticGuidance/assets/guidelines/test-execution-workflow.yml
  # - acceptable_skips: modules/AgenticGuidance/assets/definitions/acceptable-skips.yml
  definitions:
    failure_reporting: |
      Structured format for documenting test failures in live epic.

      Required fields:
      - test_name: Name of the failing test
      - component: Component or workflow being tested
      - failure_description: What went wrong
      - expected_behavior: What should have happened
      - actual_behavior: What actually happened
      - files_involved: Files that may need changes
      - evidence: Actual test output, error messages, logs

      Purpose: Enables dynamic spawning of builder agents with precise fix targets

    evidence_based_reporting: |
      Test results must include concrete evidence, not just success flags.

      Required evidence:
      - Actual test output (pytest output, logs)
      - Specific error messages for failures
      - Test execution time and environment
      - Number of passed/failed/skipped tests
      - For failures: full stack trace and context

      Avoid:
      - "Tests passed: true" without showing what was tested
      - "Validation complete" without showing results
      - Reporting success without actual test output

    reward_hacking_prevention: |
      Test runners must report actual outcomes, not desired outcomes.

      Critical requirements:
      - Run actual tests, don't fake results
      - Report real pass/fail/skip counts
      - Include actual error messages for failures
      - Don't mark tests as passed if they skipped
      - Don't suppress failures to report success
      - Provide full test output as evidence

      If tests fail, report failures accurately.
      If tests skip unexpectedly, report as failures.
      Builder agents will fix issues - runner must only report truth.
