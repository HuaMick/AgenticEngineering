# AgenticGuidance Agent Manifest
# Lists all agents migrated to this module

version: "1.0"
module: AgenticGuidance

categories:
  planner:
    description: "Create executable implementation plans from objectives"
    manifest: "modules/AgenticGuidance/agents/planner/manifest.yml"
    sub_agents:
      - epic-creator: "Scaffold phases and skeleton tickets"
      - planner-audit: "Audit plan folder compliance"
      - planner-build: "Implementation planning"
      - planner-explore: "Planning-aware codebase exploration"
      - planner-orchestration: "Create TinyDB phase records with agent routing"
      - planner-test: "Test planning with loops"

  orchestration:
    description: "High-level orchestration agents that coordinate planning and execution workflows"
    manifest: "modules/AgenticGuidance/agents/orchestration/manifest.yml"
    sub_agents:
      - orchestration-executor: "TinyDB-driven execution - dynamic agent routing from phase.agent field"
      - orchestration-loop: "Full lifecycle loop: discover, plan, execute, archive"
      - orchestration-planning: "Planning-only orchestration - human-in-the-loop plan creation"

  deploy:
    description: "Infrastructure and deployment tooling"
    manifest: "modules/AgenticGuidance/agents/deploy/manifest.yml"
    sub_agents:
      - deploy-cicd: "CI/CD configuration validation"

  test:
    description: "Validation through testing and quality assurance"
    manifest: "modules/AgenticGuidance/agents/test/manifest.yml"
    sub_agents:
      - test-builder: "Create and update test files that expose defects"
      - test-audit: "Review test quality and detect reward hacking"
      - test-uat: "User acceptance testing via agent-blind-test strategy"
      - trace-explorer: "Explore and analyse execution traces"

  teacher:
    description: "Improve agent guidance by building paths, fences, and signposts"
    manifest: "modules/AgenticGuidance/agents/teacher/manifest.yml"
    sub_agents:
      - teacher-update-guidance: "Improve process.yml and inputs.yml files"
      - teacher-update-assets: "Create/update shared assets (definitions, guidelines)"

  build:
    description: "Building and compiling code for production deployment"
    manifest: "modules/AgenticGuidance/agents/build/manifest.yml"
    sub_agents:
      - build-python: "Python-specific build agent for backend services and CLI components"
      - build-flutter: "Flutter-specific build agent for mobile/web frontend components"
      - build-story-writer: "Generate user stories from epic objectives"
      - build-docs-writer: "Documentation agent for CLI help text, docstrings, and terminology"
