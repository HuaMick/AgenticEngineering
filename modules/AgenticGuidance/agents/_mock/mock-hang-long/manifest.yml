name: mock-hang-long
description: |
  UAT-only deterministic fixture. Produces zero output and stalls until
  forcibly killed. Role timeout is set to 5 s in ROLE_TIMEOUT_SECONDS.
  Used to test stall detection and the wait_for_session() timeout path.
version: "1.0"
category: _mock
uat_only: true

# Determinism mechanism:
# The process.yml prompt instructs Claude to sleep indefinitely (call Bash
# with a very long sleep) and produce no stdout. Combined with the 5 s role
# timeout, the orchestrator is forced through its timeout/kill path.

structure:
  - path: "modules/AgenticGuidance/agents/_mock/mock-hang-long/"
    description: "Agent root"

responsibilities:
  - Produce zero stdout
  - Block until killed by the role timeout (5 s)

boundaries:
  - Must NOT be routed by any production epic phase
  - Must NOT be listed in get_valid_agent_types() results for production use
