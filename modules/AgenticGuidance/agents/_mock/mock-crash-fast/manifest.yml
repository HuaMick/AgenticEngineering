name: mock-crash-fast
description: |
  UAT-only deterministic fixture. Immediately prints a fixed error string to
  stderr and exits non-zero. Used to test crash-fast branch diagnostics in
  planner_loop.py and the diagnostic surface exposed to the orchestrator.
version: "1.0"
category: _mock
uat_only: true

# Determinism mechanism:
# The process.yml prompt instructs Claude to emit exactly one stderr line and
# exit 1 immediately — no tool calls, no exploration. The fixed output string
# "mock-crash-fast: deliberate SDK-style failure" is load-bearing; UAT
# assertions grep for it.

structure:
  - path: "modules/AgenticGuidance/agents/_mock/mock-crash-fast/"
    description: "Agent root"

responsibilities:
  - Exit non-zero within 2 seconds of spawn
  - Print the exact string "mock-crash-fast: deliberate SDK-style failure" to stderr

boundaries:
  - Must NOT be routed by any production epic phase
  - Must NOT be listed in get_valid_agent_types() results for production use
