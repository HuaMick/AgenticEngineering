# Planner Agent Manifest
# Hub for planning agents that decompose objectives into executable plans

category:
  definition: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"

description: |
  The planner agent family is responsible for creating executable implementation plans
  from objectives. Planners analyze requests, structure work into phases and tasks,
  and produce live plans for other agent categories to execute.

sub_agents:
  - epic-creator
  - planner-audit
  - planner-build
  - planner-explore
  - planner-orchestration
  - planner-test

routing_logic: |
  Planning flow order (epic-creator-first architecture):
  1. epic-creator: Scaffold ALL phases + skeleton tickets via CLI (FIRST agent)
  2. build-story-writer: Generate user stories from epic objective (in build category)
  3. planner-explore: Parallel codebase exploration (one agent per category)
  4. planner-orchestration: Add agent routing to phases

  Route to specific planner sub-agents based on domain:
  - epic-creator: First in flow — scaffolds phases and skeleton tickets via CLI
  - planner-explore: Planning-aware codebase exploration, enriches tickets via CLI
  - planner-build: Planning code implementation and build tasks
  - planner-test: Planning test strategy and validation tasks
  - planner-audit: Auditing plan folder compliance and identifying misplaced/stale files
  - planner-orchestration: Creating TinyDB phase records with agent routing from ticket data
