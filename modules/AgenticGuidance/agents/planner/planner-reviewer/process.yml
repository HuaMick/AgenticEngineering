process:
  goal: "Review and approve/reject implementation plans."

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Reviewer provides feedback for planner-guidance to address in iterative refinement cycles"

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
      description: "Core reviewer planner agent inputs and guidelines"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic context bootstrap --role planner-reviewer -j

      # Get current task if working from a plan
      agentic plan task current -j
      ```

      CLI output provides:
      - Your objective and process summary
      - Input file paths to read
      - Current task details (if plan exists)

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
      DO NOT explore the codebase before running these commands.

    - "Review all inputs. Locate the plan files in the provided live plan folder (`live/`)."
    - |
      Verify plan structure using checklists from:
      modules/AgenticGuidance/assets/definitions/planner-reviewer-checklists.yml

      Apply in order:
      1. checklists.plan_structure - Validate root plan fields
      2. checklists.inputs - Validate context references
      3. checklists.success_criteria - Validate verifiable outcomes
      4. checklists.task_structure - Validate task definitions
      5. checklists.pattern_alignment - Validate established patterns

      Apply checklists.context_minimisation:
      - Validate inputs follow context minimisation principles
      - Check for inline definitions >100 tokens that exist in assets
      - Verify no duplicate definitions across files
      - Confirm layer references use transitive loading

      Apply fences (BLOCKING):
      - fences.rlm_usage - Only if plan references RLM patterns
      - fences.mmd_presence - For orchestrated plans
      - fences.file_placement - All plans
      - fences.codebase_verification - Spawn explore agents to verify
      - fences.self_review_validation - ALL plans (new SSR-004)
    - |
      Decision:
      - APPROVE: All checklist items pass AND all fences pass, plan ready for execution.
      - REJECT: Any checklist item fails OR any fence fails. Cite failed items with specific feedback.

      FENCE: PASS requires ALL criteria met (conjunction rule).
      Reference: modules/AgenticGuidance/assets/definitions/self-review-criteria.yml

      Historical note: 78% flag rate in FF-003 was caused by lenient assessment.
      When ANY item fails, the decision MUST be REJECT, not conditional APPROVE.
    - "Report decision and feedback."
    - |
      POST-APPROVAL CLEANUP (on APPROVE only):
      1. Report to orchestrator: "APPROVED: Merge tasks from [plan_name] into authoritative phase plan"
      2. Archive artifacts: audit_*.yml -> audit/, review_*.yml -> analysis/
      3. After merge: DELETE remediation plan from live/ (tasks preserved in merged plan)
      Note: REJECT decisions leave plans in live/ for next planner-loop iteration.

  guidelines:
    - "Reject plans with structural issues, missing critical information, OR misplaced files in live/."
    - "Ensure context routing is specific (file-level or directory-level references are both acceptable)."
    - "Validate that all mandatory loops (like audit-test-fix) are included where required."
