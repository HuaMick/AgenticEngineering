process:
  goal: "Review and approve/reject implementation tickets."

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Reviewer provides feedback for planner-guidance to address in iterative refinement cycles"

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
      description: "Core reviewer planner agent inputs and guidelines"
      # Required runtime inputs (see inputs.yml#required_inputs):
      #   - epic_folder_path: Path to epic folder to review
      #   - target_project_path: Absolute path to target project root

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "review_decision"
      description: "APPROVED, REJECTED, or NEEDS_REVISION decision with feedback"
      required_fields:
        - "decision"
        - "feedback"
        - "checklist_results"
      note: "Output written to review_*.yml, moves to analysis/ after processing"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic agent context bootstrap --role planner-reviewer -j

      # Get current ticket if working from an epic
      agentic agent epic ticket current -j
      ```

      CLI output provides:
      - Your objective and process summary
      - Input file paths to read
      - Current task details (if plan exists)

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
      DO NOT explore the codebase before running these commands.

    - "Review all inputs. Locate the ticket files in the provided live epic folder (`live/`)."
    - |
      INFRASTRUCTURE VERIFICATION (BLOCKING - must pass before structural review):

      Read the Implementation Status sections in:
      - modules/AgenticGuidance/README.md (Implementation Status section)
      - modules/AgenticGuidance/assets/definitions/agent-categories.yml (IMPLEMENTATION STATUS NOTE)

      For each agent/infrastructure referenced in the ticket:
      1. Verify the agent is listed as IMPLEMENTED (not "Not Migrated" or "NOT YET IMPLEMENTED")
      2. Verify the infrastructure exists (e.g., don't approve CICD tasks if deploy-cicd is placeholder)
      3. Verify referenced features are actually available

      REJECT if ticket includes:
      - Tasks targeting `deploy-cicd` (CICD pipeline not yet implemented)
      - Tasks targeting `deploy-packaging` (packaging infrastructure not implemented)
      - Tasks targeting `cleaner/*` agents (cleaner category not migrated)
      - Tasks targeting `explore/*` agents (explore category not migrated)
      - Tasks targeting `documentation/*` agents (documentation category not migrated)
      - Tasks targeting `test-flutter-*` agents (Flutter test agents not implemented)
      - Any agent that lacks actual guidance files (process.yml, inputs.yml)

      Flag tickets that assume infrastructure marked as "Not Implemented" in the README.

    - |
      Verify ticket structure using checklists from:
      modules/AgenticGuidance/assets/definitions/planner-reviewer-checklists.yml

      Apply in order:
      1. checklists.plan_structure - Validate root ticket fields
      2. checklists.inputs - Validate context references
      3. checklists.success_criteria - Validate verifiable outcomes
      4. checklists.task_structure - Validate task definitions
      5. checklists.pattern_alignment - Validate established patterns

      Apply checklists.context_quality:
      - Validate inputs follow context quality principles
      - Check for inline definitions that duplicate shared assets
      - Verify no duplicate definitions across files
      - Confirm layer references use transitive loading

      Apply fences (BLOCKING):
      - fences.rlm_usage - Only if ticket references RLM patterns
      - fences.phase_records - Verify TinyDB phase records exist for orchestrated tickets
      - fences.file_placement - All tickets
      - fences.codebase_verification - Spawn explore agents to verify
      - fences.self_review_validation - ALL tickets (new SSR-004)
      - fences.infrastructure_implementation - ALL tickets (verify targets implemented infrastructure)
      - fences.open_questions_validation - Validate open_questions section if present (see OPEN_QUESTIONS_VALIDATION below)

    - |
      OPEN_QUESTIONS_VALIDATION (Review Checklist):
      Reference: modules/AgenticGuidance/assets/guidelines/question-workflow.yml

      If the plan includes an open_questions section, validate that questions are properly
      identified and tracked for human input. This ensures execution agents can leverage
      the HITL question workflow effectively.

      VALIDATION CHECKLIST:

      1. Question Structure:
         - Each question has required fields: id, question, severity, status, context, created_at, asked_by
         - ID follows naming convention (plan-q-NNN or test-q-NNN format)
         - Severity is valid enum value: blocking | high | medium | low
         - Status is valid enum value: pending | answered | deferred
         - Context explains what was tried and why it's blocking

      2. Question Quality:
         - Question text is specific and actionable (not vague like "How should I implement this?")
         - Context provides sufficient background for human to answer
         - Impact is explained (what depends on this decision)
         - Research/attempted solutions are documented in context

      3. Severity Appropriateness:
         - blocking: Used only when truly cannot proceed (critical path blocked)
         - high: Used when it blocks one task but other work can continue
         - medium: Used when reasonable assumption exists and is documented
         - low: Used for preferences or nice-to-haves

      4. Autonomous Decision Boundary:
         - Questions are NOT about things agent should decide autonomously:
           * Variable naming (should follow existing patterns)
           * File organization (should follow existing structure)
           * Code formatting (should use existing linters)
           * Standard patterns already in codebase
           * Low-risk technical details
         - Questions ARE about legitimate blockers:
           * Architectural decisions with long-term impact
           * Business logic requiring stakeholder input
           * Priority clarification for conflicting requirements
           * Missing critical information not in docs/code
           * High-risk decisions

      5. Answered Questions (if status=answered):
         - answer field is present and non-empty
         - answered_at timestamp is present
         - answered_by field identifies who provided the answer

      APPROVAL CRITERIA:
      - APPROVE if all questions meet structure and quality requirements
      - NEEDS_REVISION if questions are vague, missing context, or inappropriately severe
      - NEEDS_REVISION if questions ask about autonomous decisions (too many questions)
      - NEEDS_REVISION if blocking questions exist but no parallel work is planned

      FEEDBACK EXAMPLES:
      - "Question plan-q-002 lacks context explaining what was tried"
      - "Question plan-q-005 asks about variable naming (autonomous decision, remove)"
      - "Question plan-q-001 marked blocking but plan has no parallel tasks (add alternative work or adjust severity)"
      - "Question test-q-003 is too vague: specify which behavior is unclear"

      NO OPEN_QUESTIONS SECTION:
      - This is VALID - not all plans require human questions
      - Only plans with genuine blockers need open_questions
      - Absence of section should not trigger rejection
    - |
      STORY VALIDATION (FENCE - Story-First Planning):
      Reference: modules/AgenticGuidance/assets/guidelines/planning-standard.yml#Story-First Planning

      Validate that tickets properly integrate user stories:

      VALIDATION CHECKLIST:
      1. Build tickets MUST have affected_stories list OR no_stories_rationale field
         - REJECT if neither is present in ticket metadata
         - affected_stories should contain valid story IDs (US-<PROJECT>-NNN format)
      2. Test tickets with UAT phase MUST reference specific story IDs
         - UAT tasks must map to story acceptance criteria
      3. Tickets modifying user-facing features MUST identify affected stories
         - Check target_files: if any are user-facing (CLI, API, UI), stories are expected
      4. Tickets with affected_stories MUST have corresponding UAT tasks
         - REJECT if stories listed but no UAT phase planned

      ESCAPE HATCH RULES (canonical source: planning-standard.yml#escape_hatch_rules):
      - allowed_plan_types: [infrastructure, guidance, internal_tooling] — may use no_stories_rationale
      - blocked_plan_types: [build, test] — MUST have affected_stories, no escape hatch
      - Vague rationales (e.g., "not applicable") should trigger NEEDS_REVISION
      - REJECT build/test tickets that attempt to skip stories regardless of rationale

      FEEDBACK EXAMPLES:
      - "Ticket lacks affected_stories and no_stories_rationale - add story discovery results"
      - "affected_stories lists US-CLI-001 but no UAT phase validates it"
      - "no_stories_rationale is too vague - explain why guidance changes don't impact users"
    - |
      Decision:
      - APPROVE: All checklist items pass AND all fences pass, ticket ready for execution.
      - REJECT: Any checklist item fails OR any fence fails. Cite failed items with specific feedback.
      - NEEDS_REVISION: Minor issues that can be addressed with another review cycle.

      FENCE: PASS requires ALL criteria met (conjunction rule).
      Reference: modules/AgenticGuidance/assets/definitions/self-review-criteria.yml

      Historical note: 78% flag rate in FF-003 was caused by lenient assessment.
      When ANY item fails, the decision MUST be REJECT, not conditional APPROVE.
    - |
      Report decision and feedback.

      IMPORTANT: Output your review status on a line by itself for machine parsing:
      ```
      REVIEW_STATUS: APPROVED
      ```
      Or:
      ```
      REVIEW_STATUS: REJECTED
      REVIEW_FEEDBACK: <specific feedback about what failed>
      ```
      Or:
      ```
      REVIEW_STATUS: NEEDS_REVISION
      REVIEW_FEEDBACK: <specific feedback about what needs revision>
      ```
    - |
      POST-APPROVAL CLEANUP (on APPROVE only):
      1. Report to orchestrator: "APPROVED: Merge tasks from [ticket_name] into authoritative phase ticket"
      2. Archive artifacts: audit_*.yml -> audit/, review_*.yml -> analysis/
      3. After merge: DELETE remediation ticket from live/ (tasks preserved in merged ticket)
      Note: REJECT decisions leave tickets in live/ for next planner-loop iteration.

  guidelines:
    - "Reject tickets with structural issues, missing critical information, OR misplaced files in live/."
    - "Ensure context routing is specific (file-level or directory-level references are both acceptable)."
    - "Validate that all mandatory loops (like audit-test-fix) are included where required."
    - "Reject tickets that reference unimplemented agents or infrastructure (check README Implementation Status)."
    - "Reject tickets that assume CICD infrastructure until deploy-cicd is fully implemented."
    - "Flag tickets targeting placeholder agents that exist only in taxonomy but lack guidance files."
