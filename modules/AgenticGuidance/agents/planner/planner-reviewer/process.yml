process:
  goal: "Review and approve/reject implementation plans."

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Reviewer provides feedback for planner-guidance to address in iterative refinement cycles"

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-reviewer/inputs.yml"
      description: "Core reviewer planner agent inputs and guidelines"

  steps:
    - "Review all inputs. Locate the plan files in the provided live plan folder (`live/`)."
    - |
      Verify plan structure using the following approval checklist:

      PLAN STRUCTURE CHECKLIST (each criterion must pass):
      - [ ] Plan has unique name at root level (plan_name field)
      - [ ] Worktree path is absolute and correct (worktree field)
      - [ ] Branch name matches worktree naming convention (branch field)
      - [ ] Plan objective clearly states what will be improved

      INPUTS CHECKLIST:
      - [ ] Context references are at file-level or directory-level (both are acceptable)
      - [ ] Each input has location and description fields
      - [ ] Referenced files exist in the repository or worktree

      SUCCESS CRITERIA CHECKLIST:
      - [ ] Each phase has measurable success criteria
      - [ ] Success criteria include user-focused validation (experience-driven checks)
      - [ ] Technical validation criteria are verifiable (see success-criteria.yml in inputs)
      - [ ] Criteria define observable outcomes, not implementation details

      TASK STRUCTURE CHECKLIST:
      - [ ] Each task specifies exact target file(s) to edit
      - [ ] Agent types are correctly allocated by category (planner/teacher/build/test)
      - [ ] Operations are properly ordered (CREATE before UPDATE, dependencies respected)
      - [ ] Each task has concrete acceptance criteria

      PATTERN ALIGNMENT CHECKLIST:
      - [ ] Tasks follow Domain -> Workflow -> Entrypoint patterns where applicable
      - [ ] Phase dependencies are explicitly declared
      - [ ] All mandatory loops included (audit-test-fix after cleanup, etc.)
    - |
      Decision:
      - APPROVE: If all checklist items pass and the plan is ready for execution.
      - REJECT: If any checklist items fail. Provide specific feedback for the planner agents to fix, referencing which checklist items failed and why.
    - "Report decision and feedback."
    - |
      POST-APPROVAL CLEANUP (execute only on APPROVE decision):

      1. Report to orchestrator that remediation tasks should be merged:
         "APPROVED: Merge tasks from [plan_name] into authoritative phase plan"

      2. Specify artifacts to archive (paths relative to plan folder root):
         - audit_*.yml related to this review -> move from live/ to audit/
           Example: live/audit_planner_build.yml -> audit/audit_planner_build.yml
         - review_*.yml (this decision file) -> move from live/ to analysis/
           Example: live/review_planner_build.yml -> analysis/review_planner_build.yml

      3. Specify remediation plan disposition:
         - After tasks are merged into phase plan, DELETE the remediation plan from live/
         - Do NOT archive remediation plans (tasks are preserved in merged phase plan)

      FENCE: Do not execute cleanup on REJECT decisions. Rejected plans remain
      in live/ for the next iteration of the planner-loop.

  guidelines:
    - "Only reject plans with genuine structural issues or missing critical information."
    - "Ensure context routing is specific (file-level or directory-level references are both acceptable)."
    - "Validate that all mandatory loops (like audit-test-fix) are included where required."
