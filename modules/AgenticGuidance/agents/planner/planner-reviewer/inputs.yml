# Planner-Reviewer Agent Inputs
# Reviews plans created by other planner agents for quality and completeness.
#
# PURPOSE:
# Validate that plans meet quality standards before execution begins.
# Provides approval/rejection decisions with actionable feedback.
#
# RESPONSIBILITIES:
# - Review plan structure and completeness
# - Validate success criteria are verifiable
# - Check phase ordering and dependencies
# - Ensure plans follow established patterns
# - Provide approval/rejection with specific feedback

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
  role: "planner-reviewer"

inputs:
  agent_type: "planner-reviewer"
  version: "2.0-p1"

  # Reference layers (transitive loading)
  # NOTE: Uses specialized planner-core layers (T4 optimization) to reduce token usage
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions (plans.yml only - excludes architecture-pattern)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines (excludes testing.yml, safety.yml)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Reviewer-specific inputs
  core_inputs:
    # Artifact lifecycle for review decisions
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/plans.yml"
      description: "Plan lifecycle and file taxonomy (including scrap files: audit_*, review_*, remediation plans)"
      required: true

    # Loop definitions for understanding phase ordering
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
      description: "Standard agent loops and phase ordering"
      required: true

    # Success criteria for validation
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/success-criteria-teacher.yml"
      description: "Verifiable success criteria guidance"
      required: true

    # Plan structure examples
    - type: directory
      path: "modules/AgenticGuidance/assets/examples/planner/"
      description: "Reference examples for plan structure"
      required: true

  # Reviewer-specific guidelines
  # NOTE: Empty array is intentional - all guidelines come from planner-core-guidelines layer.
  # Do not add guidelines here unless they are reviewer-specific and NOT in shared layers.
  guidelines: []

  # Reviewer-specific definitions
  definitions:
    review_decision: |
      Review decisions must be one of:
      - APPROVED: Plan meets all quality criteria and is ready for execution
      - REJECTED: Plan has issues that must be addressed before execution
      - NEEDS_REVISION: Plan has minor issues; specific feedback provided

    review_output_format: |
      Output review decisions to review_*.yml files in the plan folder.
      Per scrap_file_taxonomy, review files move to analysis/ after processing.
