# Planner-Reviewer Agent Inputs
# Reviews plans created by other planner agents for quality and completeness.

required_inputs:
  - name: "epic_folder_path"
    type: "string"
    description: "Path to the epic folder to review"
    required: true

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root"
    required: true

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "planner-reviewer"

inputs:
  agent_type: "planner-reviewer"
  version: "2.0"

  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/reviewer-core-guidelines.yml"
      description: "Reviewer-specific guidelines"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs"
      required: true

  core_inputs:
    - type: file
      path: "modules/AgenticGuidance/README.md"
      description: "Module README with Implementation Status section - check before validating plans"
      required: true
      usage: |
        Before approving any plan, check the Implementation Status section to verify:
        - Agents referenced in the plan are listed under "Implemented"
        - Infrastructure (like CICD) is not marked as "Not Migrated" or "Not Yet Implemented"
        - Features/agents are not placeholder or deprecated

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
      description: "Agent taxonomy with implementation status notes"
      required: true
      usage: |
        Cross-reference the IMPLEMENTATION STATUS NOTE section to verify:
        - Agents are in the IMPLEMENTED list, not NOT YET IMPLEMENTED
        - No references to deprecated agents without migration paths

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/plans.yml#required_fields"
      description: "Ticket validation requirements"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/planner-reviewer-checklists.yml"
      description: "Approval checklists and fences"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/inputs/reviewer-agent-loops.yml"
      description: "Loop definitions for phase ordering"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/success-criteria.yml"
      description: "Success criteria guidance"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml"
      description: "Structural patterns for validation"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"
      description: "RLM patterns for validation"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/rlm-integration.yml"
      description: "RLM integration guidelines"
      required: false

  guidelines:
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
      description: "Human-in-the-Loop (HITL) question workflow - for validating open_questions sections in plans"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/planning-standard.yml"
      description: "Planning standards including Story-First Planning fence"
      required: true
      usage: |
        Validates that plans include affected_stories or no_stories_rationale.
        Reference: planning-standard.yml#Story-First Planning

  definitions:
    review_decision: "APPROVED | REJECTED | NEEDS_REVISION"
    review_output_format: "Output to review_*.yml, moves to analysis/ after processing"
    ticket_data_source: "TinyDB — tickets stored in TinyDB, accessed via agentic -j epic ticket list"

  infrastructure_validation:
    description: "Validation rules for checking ticket targets against implementation status"
    rules:
      - name: "verify_agent_implementation"
        description: "Reject tickets that target agents marked as NOT YET IMPLEMENTED"
        check: "Cross-reference ticket's agent references against agent-categories.yml IMPLEMENTATION STATUS NOTE"
        reject_if: "Ticket references agents in NOT YET IMPLEMENTED list"

      - name: "verify_infrastructure_readiness"
        description: "Reject tickets that assume unimplemented infrastructure"
        check: "Cross-reference ticket's infrastructure needs against README.md Implementation Status"
        reject_if: "Ticket requires features marked as 'Not Migrated' or 'Not Yet Implemented'"
        examples:
          - "deploy-cicd tasks when CICD pipeline is not implemented"
          - "deploy-packaging tasks when packaging infrastructure is missing"
          - "explore-* agents when explore category is not migrated"

      - name: "verify_no_placeholder_targets"
        description: "Reject tickets targeting placeholder or deprecated agents"
        check: "Verify agents have actual guidance files, not just taxonomy entries"
        reject_if: "Ticket targets agents that exist only in taxonomy but lack process.yml/inputs.yml"

  story_validation:
    description: "Validation rules for Story-First Planning fence"
    fence_reference: "modules/AgenticGuidance/assets/guidelines/planning-standard.yml#Story-First Planning"
    rules:
      - name: "verify_story_presence"
        description: "Build tickets must have affected_stories or no_stories_rationale"
        check: "Ticket metadata contains affected_stories list OR no_stories_rationale field"
        reject_if: "Neither affected_stories nor no_stories_rationale is present"

      - name: "verify_uat_story_alignment"
        description: "Tickets with affected_stories must have UAT tasks for those stories"
        check: "UAT phase references specific story IDs from affected_stories"
        reject_if: "Stories listed but no UAT phase validates them"

      - name: "verify_story_rationale_quality"
        description: "no_stories_rationale must be specific and justified"
        check: "Rationale explains why no user stories are impacted"
        reject_if: "Rationale is vague (e.g., 'not applicable', 'none')"
