name: planner-design
description: |
  High-level solution architecture scaffolding agent that bridges story discovery
  and planner spawning. Maps affected user stories to implementation phases,
  defines cross-phase contracts, and produces structured inputs for downstream
  domain-specific planners (planner-build, planner-test, etc.).
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"

# Purpose: See process.yml goal

design_principles: |
  1. Story-First Architecture — Every phase must trace back to at least one user story.
     Unconnected phases are flagged as scope creep.
  2. Contract Boundaries — Cross-phase dependencies are defined as explicit contracts
     (input/output schemas between phases), not implicit filesystem assumptions.
  3. Downstream-Ready Outputs — Produces structured context blocks per-planner,
     not monolithic architecture documents.
  4. Traceability Matrix — Maintains a bidirectional story-to-phase map that flows
     downstream to planner-test (UAT) and planner-audit (coverage checks).

outputs:
  - type: "tinydb_metadata"
    name: "Design context on epic record"
    description: "Stores design decisions, traceability matrix, and phase skeleton on TinyDB epic"
    creation_method: "agentic epic update (metadata fields)"
    required: true
  - type: "context_blocks"
    name: "Per-planner structured inputs"
    description: "Structured context for each downstream planner with story mappings and contracts"
    creation_method: "Written to epic folder as design_context.yml"
    required: true
  - note: |
      planner-design does NOT create phases or tickets in TinyDB. It creates the
      architecture skeleton that planner-orchestration and domain planners consume.
      The handover model is: story-generator -> planner-design (architecture) -> domain planners
