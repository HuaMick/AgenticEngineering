# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths relative to REPOSITORY ROOT except docs/epics/ which are relative to TARGET PROJECT root
# ==============================================

required_inputs:
  - name: "objective"
    type: "string"
    description: "Epic objective to design solution architecture for"
    required: true
    example: "Add story-test alignment with pytest markers and coverage reporting"

  - name: "affected_stories"
    type: "list[string]"
    description: "List of user story IDs from story-generator (FENCE: required, not optional)"
    required: true
    example: ["US-CLI-110", "US-CLI-111", "US-GD-050"]

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for docs/epics/ resolution)"
    required: true
    example: "/home/code/MyProject"

  - name: "epic_folder_name"
    type: "string"
    description: "Epic folder name in YYMMDDXX_description format (enforced by CLI)"
    required: true
    example: "260308PD_planner_design_agent_story_alignment"

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "planner-design"

inputs:
  agent_type: "planner-design"
  version: "2.0"  # MUST match manifest.yml version

  # Reference layers (transitive loading)
  # NOTE: Uses specialized planner-core layers (T4 optimization) to reduce token usage
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs"
      required: true

  # Design-specific inputs
  core_inputs:
    - type: file
      path: "modules/AgenticGuidance/agents/planner/planner-design/manifest.yml"
      description: "Design principles and output specifications"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
      description: "Agent category definitions for routing decisions"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
      description: "Executor specification defining phase.agent routing"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml"
      description: "SHARED structural patterns for plan creation"
      required: true

  # Design-specific guidelines
  guidelines:
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
      description: "Human-in-the-Loop (HITL) question workflow"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/decommissioning-over-deprecation.yml"
      description: "Guidelines for removing vs deprecating code"
      required: false

guidance_modification_fence:
  description: |
    planner-design does NOT modify guidance files. It produces architecture
    context for downstream planners. If story analysis reveals guidance changes
    are needed, flag them in the phase skeleton with requires_teach_validation: true.
