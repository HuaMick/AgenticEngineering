# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# ==============================================

version: "1.0"

# ==============================================
# REQUIRED INPUTS
# ==============================================
required_inputs:
  - name: "plan_folder_path"
    type: "string"
    description: |
      Path to the plan folder containing approved plan_*.yml files.
      The agent reads <plan_folder>/plan_*.yml to extract phases and tasks.
    required: true
    example: "docs/plans/live/260207PO_planner_orchestration_refactor"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to the target project root (for resolving relative paths)"
    required: true
    example: "/home/code/AgenticEngineering"

# ==============================================
# INPUTS (Guidelines, Definitions, Specifications)
# ==============================================
inputs:
  # MMD Schema - the primary specification for output
  - location: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
    description: "Schema for orchestration MMD files: headers, nodes, edges, subgraphs, metadata requirements"
    required: true

  # Executor specification - understand what the consumer needs
  - location: "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
    description: "Runtime behavior spec: AGENT_ROUTING format, FEEDBACK_TRIGGERS patterns, STATUS management"
    required: true

  # Loop definitions - for generating loop subgraphs
  - location: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop type definitions, max iterations, escalation paths"
    required: true

  # Agent categories - for resolving generic types to specific agents
  - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent category definitions for routing resolution"
    required: true

  # Plan YAML schema reference
  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
    description: "Plan YAML structure reference for phase and task parsing"
    required: true

  # MMD phase templates
  - location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/teach_phase.mmd"
    description: "MMD component for teach phase orchestration pattern"
  - location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/build_phase.mmd"
    description: "MMD component for build phase orchestration pattern"
  - location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/test_phase.mmd"
    description: "MMD component for test phase orchestration pattern"
  - location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/cleanup_phase.mmd"
    description: "MMD component for cleanup phase orchestration pattern"
  - location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/uat_phase.mmd"
    description: "MMD component for UAT phase orchestration pattern"

  # Guidelines
  - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Context minimisation principles"
  - location: "modules/AgenticGuidance/assets/guidelines/fix-the-source.yml"
    description: "Fix root causes instead of symptoms"

# ==============================================
# MMD NODE GRANULARITY FENCE
# ==============================================
# This fence is the PRIMARY quality gate for planner-orchestration output.
# Duplicated from orchestration-planning inputs.yml for agent independence.
# ==============================================
mmd_node_granularity:
  principle: |
    MMD diagrams represent orchestration flow at the phase, loop, and agent
    spawn level. They do NOT represent individual task IDs or file operations.
    Task-level details belong in plan YAML files, not MMD orchestration diagrams.

  fence: |
    STOP and regenerate if ANY of these patterns appear in generated MMD:
    - Task ID nodes: deploy_\d+, build_\d+, test_\d+, teach_\d+, cleanup_\d+
    - Execute labels: [Execute: ...]
    - Individual file operations: [Edit ...], [Create ...], [Delete ...]

    REQUIRED patterns for valid MMD:
    - Phase nodes: [Enter X Phase], ((X Phase))
    - Spawn nodes: [Spawn X Agent]
    - Loop nodes: {X Loop}, subgraph X_Loop_SG
    - Decision nodes: {X?}
