# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT.
# (e.g., modules/AgenticGuidance/assets/...).
#
# EXCEPTION: docs/epics/ paths are relative to the TARGET PROJECT root.
# ==============================================

version: "1.0"

# ==============================================
# REQUIRED INPUTS
# ==============================================
required_inputs:
  - name: "epic_folder_path"
    type: "string"
    description: |
      Path to the epic folder. Tickets are loaded from TinyDB via:
      `agentic -j epic ticket list --epic <epic_folder_name>`
      Phase records are created in TinyDB via:
      `agentic epic phase add --epic <epic_folder_name> --name <phase> --agent <agent-type>`
    required: true
    example: "docs/epics/live/260207PO_planner_orchestration_refactor"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to the target project root (for resolving relative paths)"
    required: true
    example: "/home/code/AgenticEngineering"

# ==============================================
# INPUTS (Guidelines, Definitions, Specifications)
# ==============================================
inputs:
  # Executor specification - understand what the consumer needs
  - location: "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
    description: "Runtime behavior spec: phase.agent routing field, phase.feedback_triggers patterns, phase status management"
    required: true

  # Loop definitions - for assigning loop structures to phases
  - location: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop type definitions, max iterations, escalation paths"
    required: true

  # Agent categories - for resolving generic types to specific agents
  - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent category definitions for routing resolution"
    required: true

  # Plan example - reference for ticket and phase structure
  - location: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
    description: "Plan structure reference for understanding phase and ticket fields in TinyDB"
    required: true

  # Guidelines
  - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Context minimisation principles"
  - location: "modules/AgenticGuidance/assets/guidelines/fix-the-source.yml"
    description: "Fix root causes instead of symptoms"

# ==============================================
# PHASE RECORD CREATION FENCE
# ==============================================
# This fence is the PRIMARY quality gate for planner-orchestration output.
# All phase records MUST be created via CLI, never by editing TinyDB files directly.
# ==============================================
phase_record_creation:
  principle: |
    TinyDB phase records represent orchestration routing at the phase level.
    Each phase record must have: name, agent, status, execution fields.
    Task-level details belong in TinyDB ticket records, not phase records.

  fence: |
    STOP and recreate if ANY phase record is missing required fields:
    - Missing agent field: executor cannot route without it
    - Missing status field: executor cannot determine resume point
    - Missing execution field: executor cannot determine parallel vs sequential

    REQUIRED fields for valid phase record:
    - name: Phase identifier (e.g., "Build", "Test", "Cleanup", "UAT")
    - agent: Agent type (e.g., "build-python", "test-runner", "test-user-simulator")
    - status: "pending" (initial value for new phases)
    - execution: "sequential" or "parallel"

  cli_commands:
    create_phase: "agentic epic phase add --epic <folder> --name <phase> --agent <agent-type> --execution sequential"
    create_ticket: "agentic epic ticket add --epic <folder> --phase <phase> --id <id> --name <name>"
    list_phases: "agentic -j epic ticket list --epic <folder>"
    validate_epic: "agentic agent epic validate --epic <folder>"
