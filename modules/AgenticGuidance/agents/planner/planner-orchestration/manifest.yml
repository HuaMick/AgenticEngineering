name: planner-orchestration
description: |
  Creates TinyDB phase records with agent routing from approved ticket data.
  Reads epic phases and tasks, determines agent routing, and creates phase
  records in TinyDB consumable by orchestration-executor.
version: "1.0"

purpose: |
  planner-orchestration is a focused phase record creator. Given an epic with
  approved ticket data in TinyDB, it creates phase records with agent routing
  that orchestration-executor needs for dynamic routing at runtime.

  This agent creates TinyDB phase records with agent routing for execution
  by orchestration-executor. Naming convention:
  - orchestration-* agents execute workflows
  - planner-* agents create planning artifacts

outputs:
  - name: "TinyDB phase records"
    description: "Phase records in TinyDB with agent routing for dynamic orchestration execution"
    required: true
    required_fields:
      - "name"              # Phase identifier (e.g., "Build", "Test", "UAT")
      - "agent"             # Agent type for routing (e.g., "build-python", "test-builder")
      - "status"            # Initial value: "pending"
      - "execution"         # "sequential" or "parallel"
    optional_fields:
      - "feedback_triggers" # Failure handling paths (TEST_FAILURE, BUILD_FAILURE, etc.)
      - "loop_structure"    # Loop type, max iterations, exit conditions
      - "affected_stories"  # Story IDs for UAT phases
    cli_command: "agentic epic phase add --epic <folder> --name <phase> --agent <agent-type>"

architecture_checklist:
  - "Load all ticket data from TinyDB via `agentic -j epic ticket list --epic <folder>`"
  - "Extract phases, tasks, and loop structures from ticket records"
  - "Determine agent routing based on phase types and task agent_type fields"
  - "Create phase records via `agentic epic phase add` CLI command"
  - "Validate all phase records have required fields after creation"
  - "NEVER create ticket_*.yml or plan_*.yml YAML files on disk"
