name: planner-orchestration
description: |
  Generates orchestration MMD files from approved plan YAMLs.
  Reads plan phases and tasks, determines agent routing, and produces
  Mermaid flowcharts consumable by orchestration-executor.
version: "1.0"

purpose: |
  planner-orchestration is a focused artifact generator. Given a plan folder
  with approved plan_*.yml files, it produces the orchestration_<name>.mmd
  file that orchestration-executor needs for dynamic agent routing.

  This agent replaces the MMD generation logic that was previously embedded
  in orchestration-planning, following the naming convention:
  - orchestration-* agents execute workflows
  - planner-* agents create planning artifacts

outputs:
  - name: "orchestration_{plan_name}.mmd"
    path_template: "docs/plans/live/{plan_id}/orchestration_{plan_name}.mmd"
    description: "Mermaid flowchart for dynamic orchestration execution"
    required: true
    required_metadata:
      - "GOAL"
      - "PROFILE"
      - "PHASES"
      - "AGENT_ROUTING"
      - "FEEDBACK_TRIGGERS"
      - "STATUS"
    schema_reference: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"

architecture_checklist:
  - "Read all plan_*.yml files from plan folder"
  - "Extract phases, tasks, and loop structures"
  - "Determine AGENT_ROUTING based on phase types"
  - "Generate MMD with high-level nodes only (no task-level detail)"
  - "Validate node granularity before writing"
  - "Validate MMD against plan-mmd-schema.yml"
