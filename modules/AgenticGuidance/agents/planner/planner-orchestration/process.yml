goal: |
  Dispatcher. Read the epic and its skeleton phases, decide whether stories
  are needed for this epic, partition phases into build vs test, assign agent
  routing on each phase, and emit a planning_decision record in TinyDB that
  downstream planning steps consume.

context:
  role: |
    planner-orchestration runs SECOND in the planning pipeline, immediately
    after epic-creator has scaffolded empty phase shells and skeleton tickets.
    It acts as a DISPATCHER for the rest of planning — it does not itself
    write build guidance, test cases, or stories.

    Its outputs are:
      1. Agent routing set on every phase record (phase.agent field).
      2. A planning_decision TinyDB record describing whether story-writer
         should run, whether pre-flight story checks should run, and which
         phase ids are in the build partition vs the test partition.

    Downstream agents (build-story-writer, planner-build, planner-test) read
    the planning_decision record to know whether to execute or no-op.

    This agent does NOT:
      - Create or delete phases (epic-creator owns scaffolding).
      - Author stories (build-story-writer does, when dispatched).
      - Write tickets guidance/target files (planner-build / planner-test do).
      - Produce any files on disk. TinyDB is the sole store.

  naming_convention: |
    planner-* because this agent creates a planning artifact (the
    planning_decision record). orchestration-* agents execute workflows;
    planner-* agents describe / decide.

process:
  steps:
    # ========================================
    # STEP 1: Load Epic + Phase Context
    # ========================================
    - name: "Load Epic Context"
      action: |
        Read the epic and its current phase/ticket scaffolding from TinyDB:
        ```bash
        agentic epic status --epic {epic_folder_name}
        agentic -j epic ticket list --epic {epic_folder_name}
        agentic -j epic phase list --epic {epic_folder_name}
        ```
        Collect:
        - The epic objective / description (from status output or README).
        - Every existing phase: phase_id, name, description.
        - Every existing ticket: id, phase, name, description.

        Phases and skeleton tickets already exist. Your job is to CLASSIFY
        and ROUTE them, not to recreate them.
      inputs:
        - epic_folder_name: "Provided by orchestration-planning or user"
      required: true

    # ========================================
    # STEP 2: Decide needs_stories
    # ========================================
    - name: "Decide needs_stories"
      action: |
        Classify the epic objective into one of two buckets. This decision
        controls whether build-story-writer runs.

        needs_stories = FALSE when the objective contains any of these
        intent keywords (case-insensitive match on the objective text):
          refactor, cleanup, clean up, extract, decommission, migrate,
          migration, rename, DRY, hardening, harden, consolidate,
          reorganise, reorganize, tech-debt, tech debt, dead code,
          dead-code removal

        Rationale: such epics modify existing mechanics described by
        existing stories. The correct action is to update an existing
        story (if at all), and that work is handled by the verify-first
        branch of story-writer only when explicitly invoked — the
        dispatcher usually skips it entirely for these epics.

        needs_stories = TRUE when the objective describes:
          - New user-visible behavior.
          - A new feature, command, workflow, or surface.
          - A new system component or mechanic that did not previously
            exist.

        UNCERTAIN → default TRUE. story-writer's own verify-first path
        will no-op if it finds no genuinely new component.

        Record your reasoning in one sentence. You will include it in the
        planning_decision emission below.
      required: true

    # ========================================
    # STEP 3: Partition phases into build vs test
    # ========================================
    - name: "Partition phases"
      action: |
        Walk every phase record returned in step 1 and classify it:

        - build_phase_ids — phases whose work produces or modifies CODE.
          Typical names: "Build", "Implement", "Refactor", "Cleanup",
          "Migrate", "Teach" (for guidance edits), "Audit" (folder
          compliance edits).

        - test_phase_ids — phases whose work produces or modifies TESTS.
          Typical names: "Test", "Validate", "Coverage".

        - Phases that do BOTH (rare, e.g. a phase whose description
          mentions both implementation and its tests) — include the
          phase_id in BOTH lists. planner-test refines the test surface
          after planner-build is done, so double-listing is safe.

        Classification is by phase name + description, not by any
        pre-existing agent field (that field may be unset; this step is
        what populates it).
      required: true

    # ========================================
    # STEP 4: Set phase agent routing
    # ========================================
    - name: "Set phase agent routing"
      action: |
        For every phase, set the phase.agent field via the CLI so the
        executor can route work correctly:

        ```bash
        # For each phase in build_phase_ids:
        agentic epic phase update {phase_id} --epic {epic_folder_name} --agent build-python

        # For each phase in test_phase_ids:
        agentic epic phase update {phase_id} --epic {epic_folder_name} --agent test-builder
        ```

        Agent mapping:
          - build partition → build-python (Python projects; use
            build-flutter only if the epic is explicitly a Flutter epic).
          - test partition → test-builder.
          - phases in BOTH partitions → set agent to build-python; the
            test pass will be attached by planner-test as a follow-up
            ticket on the same phase.

        Do NOT create new phases here. Do NOT create "UAT" phases —
        UAT is an on-demand workflow (`agentic orchestrate session uat`),
        never a phase in the plan.
      required: true

    # ========================================
    # STEP 5: Emit planning_decision record
    # ========================================
    - name: "Emit planning_decision"
      action: |
        Write the planning_decision record directly to TinyDB using the
        EpicRepository helper. There is no `agentic epic decision set` CLI
        subcommand yet — invoke the repository via a python3 one-liner:

        ```bash
        python3 -c "
        from agenticguidance.services.epic_repository import EpicRepository
        r = EpicRepository()
        r.write_planning_decision(
            epic_folder_name='{epic_folder_name}',
            needs_stories={True|False},
            needs_preflight_story_check={True|False},
            build_phase_ids=[{comma-separated quoted phase ids from step 3}],
            test_phase_ids=[{comma-separated quoted phase ids from step 3}],
        )
        "
        ```

        Substitute the actual values from steps 2 and 3:
          - needs_stories: boolean from step 2.
          - needs_preflight_story_check: MUST equal needs_stories. The
            pre-flight story check is only meaningful when stories are
            expected; for refactor / cleanup epics it is suppressed.
          - build_phase_ids / test_phase_ids: the partitions from step 3.

        The helper stamps `decided_at` with an ISO timestamp automatically.

        Verify by reading it back:
        ```bash
        python3 -c "
        from agenticguidance.services.epic_repository import EpicRepository
        print(EpicRepository().read_planning_decision('{epic_folder_name}'))
        "
        ```
        Confirm the dict has the expected boolean and list values. If the
        read-back fails, re-run the write; do not proceed until the record
        is present.
      required: true

    # ========================================
    # STEP 6: Validate routing + decision
    # ========================================
    - name: "Validate"
      action: |
        Final sanity checks before handing back to orchestration-planning:

        1. Every phase listed by `agentic -j epic phase list --epic
           {epic_folder_name}` has a non-empty `agent` field.
        2. Every phase_id in build_phase_ids or test_phase_ids exists in
           the phase list (no stale ids).
        3. planning_decision record exists and round-trips via
           EpicRepository().read_planning_decision(...).
        4. No MMD or YAML files were written — TinyDB is the sole store.

        If any check fails, correct the offending step and re-run steps 4
        and 5. Report final status back to orchestration-planning.
      required: true

guidelines:
  - "DO NOT create new phases. epic-creator owns scaffolding; you only classify and route."
  - "DO NOT author stories, guidance, target files, or tests. You are a dispatcher."
  - "NEVER write MMD / YAML files on disk. TinyDB is the sole store."
  - "needs_preflight_story_check must equal needs_stories — never diverge the two booleans."
  - "When uncertain about needs_stories, default TRUE; story-writer's verify-first path will no-op if nothing to do."
  - "Every phase must end with an `agent` value set; empty `agent` fields will block the executor."
  - "Do NOT create 'UAT' phases — UAT is a separate on-demand workflow."

inputs_reference: "modules/AgenticGuidance/agents/planner/planner-orchestration/inputs.yml"
