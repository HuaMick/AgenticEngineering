goal: "Generate orchestration MMD files from approved plan YAMLs for downstream execution by orchestration-executor."

context:
  role: |
    planner-orchestration is a PLANNING artifact generator. It reads approved plan YAML files
    and produces orchestration MMD flowcharts that orchestration-executor can consume.

    This agent does NOT execute plans. It does NOT orchestrate other agents.
    It creates a single artifact: the orchestration_<name>.mmd file.

  naming_convention: |
    This agent follows the planner-* naming convention because it creates a planning artifact
    (the MMD file). orchestration-* agents execute workflows; planner-* agents create artifacts.

process:
  steps:
    # ========================================
    # STEP 1: Load Plan Context
    # ========================================
    - name: "Load Plan Context"
      action: |
        Read all plan_*.yml files from the plan folder's live/ directory.
        Extract:
        - Plan name and metadata
        - All phases (name, execution mode, description)
        - All tasks per phase (id, name, agent_type, status)
        - Loop structures (type, applies_to_phase, exit_criteria)
        - Success criteria
      inputs:
        - plan_folder_path: "Provided by orchestration-planning or user"

    # ========================================
    # STEP 2: Extract Phase Sequence
    # ========================================
    - name: "Extract Phase Sequence"
      action: |
        From the plan YAML phases, determine the execution order.
        Map each phase to its execution mode (sequential or parallel).
        Identify cross-phase dependencies.

    # ========================================
    # STEP 3: Determine Agent Routing
    # ========================================
    - name: "Determine Agent Routing"
      action: |
        Map each phase to the appropriate agent type using the AGENT_ROUTING table:

        AGENT_ROUTING mapping:
        - teach phases -> teacher agents (teacher-update-guidance, teacher-update-assets)
        - build phases -> builder agents (build-python, build-flutter)
        - test phases -> tester agents (test-runner, test-builder)
        - cleanup phases -> builder agents (cleanup tasks use builders)
        - audit phases -> planner-audit (plan folder compliance)
        - uat phases -> test-user-simulator (user acceptance testing)

        For each phase, resolve the generic type to the specific agent based on:
        - Task agent_type fields in the plan YAML
        - Project technology (Python -> build-python, Flutter -> build-flutter)
        - Phase type defaults from the mapping above

    # ========================================
    # STEP 4: Validate Loop Structure
    # ========================================
    - name: "Validate Loop Structure"
      action: |
        Verify that all non-trivial phases include loop_structure definitions.

        FENCE: PLANS-MUST-INCLUDE-LOOPS
        Plans for non-trivial work MUST include loop_structure section.
        Reject plans without loops for:
        - Build phases (requires test-fix-loop)
        - Test phases (requires audit-test-fix-loop)
        - Cleanup phases (requires audit-test-fix-loop)
        - Teach phases (requires guidance-self-review-loop OR agent-self-review)

        If loops are missing, STOP and report back to orchestration-planning.
        Do NOT generate the MMD without proper loop definitions.
      reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"

    # ========================================
    # STEP 5: Generate MMD Metadata Block
    # ========================================
    - name: "Generate MMD Metadata Block"
      action: |
        Create the MMD header comments with required metadata:

        Required metadata fields:
        - GOAL: Plan objective (from plan name/context)
        - PROFILE: "orchestrator" (always)
        - PHASES: Comma-separated list of phases in execution order
        - AGENT_ROUTING: Phase->agent type mapping (one per line)
        - FEEDBACK_TRIGGERS: Failure handling paths
        - STATUS: Initial status for all phases (Phase=pending)
        - AFFECTED_STORIES: Story IDs from plan metadata (if present)

        Format example:
        %% GOAL: Implement feature X
        %% PROFILE: orchestrator
        %% PHASES: Build, Test, Cleanup, UAT
        %% AGENT_ROUTING: Build=build-python, Test=test-runner, Cleanup=build-python, UAT=test-user-simulator
        %% FEEDBACK_TRIGGERS: TEST_FAILURE=retry(3), BUILD_FAILURE=escalate, STORY_REGRESSION=retry(3)
        %% STATUS: Build=pending, Test=pending, Cleanup=pending, UAT=pending
        %% AFFECTED_STORIES: US-CLI-001, US-CLI-002

        STORY METADATA IN MMD:
        When plan has affected_stories, include as MMD header comment.
        UAT phase nodes should annotate which stories they validate.
        STORY_REGRESSION trigger should be included in FEEDBACK_TRIGGERS.
        This enables the executor to parse story context directly from the MMD.
      schema_reference: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"

    # ========================================
    # STEP 6: Build Flowchart Structure
    # ========================================
    - name: "Build Flowchart Structure"
      action: |
        Construct the Mermaid flowchart with:
        - Start node and input validation phase
        - CCI Bootstrap block (agentic context bootstrap commands)
        - Phase execution nodes for each plan phase
        - Loop subgraphs per agent-loops.yml definitions
        - Feedback paths for re-planning (dashed lines)
        - Validation gates between phases
        - Success/escalation endpoints

        Each phase should follow this pattern:
        1. Enter phase node
        2. Spawn agent node
        3. Loop subgraph (if applicable)
        4. Validation decision node
        5. Exit phase node (success) or feedback path (failure)

    # ========================================
    # STEP 7: Validate Node Granularity (MANDATORY)
    # ========================================
    - name: "Validate Node Granularity"
      action: |
        FENCE: MMD-NODE-GRANULARITY
        Generated MMD nodes MUST be high-level (phases, loops, agent spawns).
        Task-level nodes are FORBIDDEN in orchestration MMDs.

        STOP and regenerate if ANY of these patterns appear:
        - Task ID nodes: deploy_\d+, build_\d+, test_\d+, teach_\d+, cleanup_\d+
        - Execute labels: [Execute: ...]
        - Individual file operations: [Edit ...], [Create ...], [Delete ...]

        REQUIRED patterns for valid MMD:
        - Phase nodes: [Enter X Phase], ((X Phase))
        - Spawn nodes: [Spawn X Agent]
        - Loop nodes: {X Loop}, subgraph X_Loop_SG
        - Decision nodes: {X?}

      correct_examples:
        - "BuildPhaseStart((Build Phase))"
        - "SpawnPlannerBuild[Spawn planner-build Agent]"
        - "subgraph TestFixLoop_SG [\"Test-Fix-Loop Subgraph\"]"
        - "ReviewResult{Plan Approved?}"

      incorrect_examples:
        - "build_001[Implement authentication]"
        - "EditFile[Edit process.yml]"
        - "AddFunction[Add validateUser function]"

    # ========================================
    # STEP 8: Write MMD File
    # ========================================
    - name: "Write MMD File"
      action: |
        Write the generated MMD to: <plan_folder>/orchestration_<name>.mmd
        where <name> is derived from the plan folder name.

        Example: docs/plans/live/260207PO_refactor/ -> orchestration_planner_orchestration_refactor.mmd

    # ========================================
    # STEP 9: Validate MMD Against Schema
    # ========================================
    - name: "Validate MMD Against Schema"
      action: |
        Validate the written MMD file against the plan-mmd-schema:
        1. All required metadata fields present
        2. Node granularity is high-level only
        3. All phases from plan YAML are represented
        4. Loop subgraphs match loop_structure definitions
        5. Feedback paths exist for failure scenarios
        6. Start and end nodes are properly defined

        If validation fails, return to Step 6 and fix.
      schema_reference: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"

guidelines:
  - "NEVER start implementation. Only create the orchestration MMD artifact."
  - "ALWAYS validate node granularity before writing the MMD file."
  - "ALWAYS include AGENT_ROUTING metadata - the executor depends on it."
  - "NEVER include task-level nodes in the MMD. Phases and agent spawns only."
  - "If loop structures are missing from the plan YAML, report back - do not generate without them."

inputs_reference: "modules/AgenticGuidance/agents/planner/planner-orchestration/inputs.yml"
