# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# (e.g., modules/AgenticGuidance/assets/), NOT the target project root.
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs MUST be provided by the parent orchestrator or user.
# Without these, the agent cannot create a valid build plan.
# ==============================================
required_inputs:
  - name: "objective"
    type: "string"
    description: "Build objective to plan for"
    required: true
    example: "Implement user authentication with JWT tokens"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for docs/plans/ resolution)"
    required: true
    example: "/home/code/MyProject"

  - name: "plan_folder_name"
    type: "string"
    description: "Plan folder name in YYMMDDXX_description format (enforced by CLI)"
    required: true
    example: "260106FA_feature_auth"

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "planner-build"

inputs:
  agent_type: "planner-build"
  version: "2.0"  # MUST match manifest.yml version

  # Reference layers (transitive loading)
  # NOTE: Uses specialized planner-core layers (T4 optimization) to reduce token usage
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions (plans.yml only - excludes architecture-pattern)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines (excludes testing.yml, safety.yml)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Build-planning specific inputs
  core_inputs:
    # Build-specific architectural guidance
    - type: file
      path: "modules/AgenticGuidance/agents/planner/planner-build/manifest.yml"
      description: "Architecture checklist and mandatory phase patterns (CI/CD validation triggers, domain->workflow->entrypoint alignment)"
      required: true

    # Unified plan example
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
      description: "Unified plan example showing task-level target_files pattern, impacted_artifacts (semantic), and multi-phase coordination."
      required: true


    # Orchestration MMD example
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/orchestration_example.mmd"
      description: "MMD orchestration example showing phase flow, feedback triggers, agent routing metadata, and status visualization"
      required: false

    # Plan MMD Schema (structural conventions for .mmd files)
    - type: file
      path: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
      description: "Formal schema defining MMD structure: header comments, node naming, subgraphs, edge patterns, and loop definitions"
      required: true

    # SHARED structural patterns (same file used by planner-reviewer for validation)
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml"
      description: "SHARED structural patterns for plan creation (used by planner-reviewer too)"
      required: true

    # README session tracking example
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/README.md"
      description: "README example showing consolidated session tracking (Session History, Status, Next Steps, Decision Items) - single document for session continuity"
      required: false

    # MMD Component Examples (optional reusable patterns)
    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/build_phase.mmd"
      description: "REUSABLE PATTERN: Build phase with architecture layers (Domain->Workflow->Entrypoint), planner-loop integration"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/test_phase.mmd"
      description: "REUSABLE PATTERN: Test phase with test-fix-loop integration, failure capture, exit conditions"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/cleanup_phase.mmd"
      description: "REUSABLE PATTERN: Cleanup phase with cleaner-dependency-loop, explorer integration, safety checks"
      required: false

    # MMD Generation Support
    - type: file
      path: "modules/AgenticGuidance/assets/specifications/orchestration-executor-specification.yml"
      description: "Executor specification defining AGENT_ROUTING syntax, FEEDBACK_TRIGGERS patterns, state model, and phase execution protocol"
      required: false

    # RLM Integration Support (optional - for complex objectives)
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"
      description: "RLM core concepts: context_as_environment, programmatic_access, recursive_decomposition, variable_management"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/specifications/rlm-context-accessor.yml"
      description: "RLM context accessor API: store_context, get_context, filter_yaml_by_criteria, accumulate, signal_final"
      required: false

  # Build-specific guidelines
  guidelines:
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
      description: "Human-in-the-Loop (HITL) question workflow - when to ask questions, how to generate them, storage patterns, and resumption"
      required: true

  # Build-specific definitions - keep minimal, reference definition files
  # Per context-minimisation.yml: "Provide only the information required for a process to complete its task"
  definitions:
    # Loop definitions: See modules/AgenticGuidance/assets/definitions/agent-loops.yml (test-fix-loop, audit-test-fix-loop)
    # Plan inputs: See modules/AgenticGuidance/assets/guidelines/plan-inputs.yml
    # Success criteria: See modules/AgenticGuidance/assets/definitions/user-stories.yml (UAT validation)
    # Architecture: See docs/ARCHITECTURE.md (Domain -> Workflow -> Entrypoint)
    # Overengineering: See modules/AgenticGuidance/assets/definitions/overengineering.yml

    build_artifacts: |
      Build artifacts should be placed in build-artifacts/dist/ directory.
      Never commit build artifacts to version control.

# ==============================================
# GUIDANCE MODIFICATION FENCE
# ==============================================
# Detect when build plan tasks modify agent guidance files.
# Guidance changes require teach process validation.
# ==============================================
guidance_modification_fence:
  description: |
    Build plans may legitimately include guidance file paths for infrastructure work.
    However, any modifications to agent guidance MUST be validated through the teach
    process before deployment. This fence detects such modifications and flags them.

  detection_patterns:
    critical_guidance_files:
      - "modules/AgenticGuidance/agents/**/process.yml"
      - "modules/AgenticGuidance/agents/**/process.mmd"
      - "modules/AgenticGuidance/agents/**/inputs.yml"
      - "modules/AgenticGuidance/agents/**/manifest.yml"
      - "modules/AgenticGuidance/agents/**/outputs.yml"
    definition_files:
      - "modules/AgenticGuidance/assets/definitions/*.yml"
    guideline_files:
      - "modules/AgenticGuidance/assets/guidelines/*.yml"
    entrypoint_files:
      - "modules/AgenticGuidance/entrypoints/*.yml"

  fence: |
    FENCE: GUIDANCE-MODIFICATION-DETECTION
    Before finalizing any build plan, check if ANY task `target_files`
    match the detection_patterns above.

    IF MATCH FOUND:
    1. DO NOT proceed with build-only execution
    2. FLAG the plan as requiring teach process validation
    3. ADD to plan output: requires_teach_validation: true
    4. The matched guidance files are already tracked in task target_files
    5. RECOMMEND running _plan_teach.yml for these changes

    RATIONALE: Guidance changes affect agent behavior across the entire
    system. They MUST go through validation (agent self-review, guidance
    testing) before deployment. Build-only execution skips this validation.

    INCIDENT REFERENCE: CLI Context Injection initiative (2025-11) modified 26 agent
    bootstrap files without validation, causing broken paths and missing
    references that weren't caught until execution.

  output_flag:
    name: "requires_teach_validation"
    type: "boolean"
    triggered_when: "Any target_file matches detection_patterns"
    action: "Set to true and list matched files in guidance_files_modified"

  output_schema_addition: |
    # Add to plan output when guidance modifications detected:
    requires_teach_validation: true
    # NOTE: Guidance files are tracked via task-level target_files, not plan-level lists.
    # The fence detects guidance modifications by scanning task target_files against detection_patterns.
