name: planner-build
description: |
  Create phased implementation plans for completing build/development tasks using subagents.
  Focuses on implementation phases with proper context routing, parallelization strategy,
  architecture pattern alignment, and CI/CD validation phases when test infrastructure changes.
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"

# Purpose: See process.yml goal

architecture_checklist: |
  Plans must verify alignment with these patterns:
  - Worktree specified (correct path for main vs feature branches)
  - Absolute paths in config files (enables work-from-anywhere)
  - Domain -> Workflow -> Entrypoint pattern for new code
  - Service boundaries maintained (independent, self-contained)
  - Test structure follows tests/workflows/ organization

cicd_note: |
  CI/CD validation phases are planned by planner-test, not planner-build.
  See: modules/AgenticGuidance/agents/planner/planner-test/process.yml
