process:
  goal: |
    Create a phased implementation plan for completing the task using subagents.

  # NOTE: Loop definitions (test-fix-loop, audit-test-fix-loop) are accessed via
  # inputs.yml -> planner-shared.yml -> iteration.yml -> agent-loops.yml

  invocation_context:
    caller_chain:
      - "_plan_build.yml entrypoint"
      - "orchestration-planning"
      - "planner-build"
    note: |
      planner-build is typically spawned by orchestration-planning when a build objective
      is identified. The entrypoint (_plan_build.yml) provides the initial objective,
      which orchestration-planning routes to this agent for detailed plan creation.

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
      description: "Core planner agent inputs and guidelines"

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "plan_live_build.yml"
      path_template: "docs/plans/live/{plan_id}/live/plan_live_build.yml"
      description: "Implementation plan with build and environment setup phases"
      required_fields:
        - "name"           # Unique plan name
        - "worktree_path"  # Absolute path to worktree
        - "status"         # active, blocked, completed
        - "phases"         # List of implementation phases
      schema_reference: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"

  steps:
    - |
      VALIDATE REQUIRED INPUTS (from inputs.yml required_inputs):
      The following inputs MUST be provided by the orchestrator or user:

      1. objective (string, required)
         - Build objective to plan for
         - ERROR if missing: "STOP: No objective provided. Cannot create build plan without clear objective."

      2. target_project_path (string, required)
         - Absolute path to target project root
         - ERROR if missing: "STOP: No target_project_path provided. Cannot resolve docs/plans/ location."

      3. plan_folder_name (string, required)
         - Plan folder name in YYMMDDRepo_Branch format
         - ERROR if missing: "STOP: No plan_folder_name provided. Cannot create plan files."

      If ANY required input is missing, report the specific error and STOP.
      If an input is found in a different location, update the path and flag the discrepancy.
    - |
      A planning folder should have been provided (docs/plans/live/YYMMDDRepo_Branch/).
      Create appropriate folder structure based on plan complexity:
      - Simple plans: files at root level
      - Multi-phase plans: live/ subfolder for active files
      - Plans with completion tracking: completed/ subfolder
      Reference plans.yml for folder structure patterns.
      If completed items exist and a completed/ subfolder is appropriate,
      move them to `completed/plan_completed.yml`.
    - |
      Review the objective and add IMPLEMENTATION phases to `live/plan_live_build.yml` for completing the objective.
      For each item gather context and check assumptions. Find where to source
      the required context and add context routing to the plan so that other agents dont have to.

      IMPORTANT: planner-build outputs ONLY to `live/plan_live_build.yml` (build and environment setup phases).
      Other planners handle test phases (planner-test) and audit/cleanup phases (planner-audit).

      PLAN STRUCTURE REQUIREMENTS:
      Reference plan_example.yml from inputs for:
      - Plan structure with unique name and worktree path at root level
      - File-level inputs for context routing (enables parallel vs sequential execution determination)
      - Detailed guidance and measurable success criteria patterns
      - Operation ordering and agent type allocation

      INPUTS SECTION (CRITICAL - Required for each task):
      Each task MUST include an `inputs` list specifying project-specific files the agent needs to pre-read.
      These inputs enable agents to gather context BEFORE implementation begins.

      Input selection criteria:
      - Include files that provide essential context for the task (interfaces, related code, configs)
      - Focus on PROJECT-SPECIFIC files (agent's process.yml already provides general guidance)
      - Avoid duplicating files already in the agent's inputs.yml (these are loaded automatically)
      - Prefer file-level paths over directories (e.g., "src/api/routes.py" not "src/api/")

      Example:
        - id: "task_001"
          name: "Add health check endpoint"
          inputs:                                    # <-- REQUIRED: Pre-read context
            - src/api/routes.py                      # Existing route patterns
            - src/domain/services/health_service.py  # Domain interface to use
            - tests/api/test_routes.py               # Test patterns to follow
          target_files:                              # <-- What to modify
            - src/api/health.py
          guidance: |
            ...

      Success criteria MUST include user-focused validation:
      - User acceptance tests - what does the user expect to be able to do?
      - User simulation tests - how will the builder agent validate the user experience?
      - Entrypoint execution - which CLI commands, API endpoints, or UI flows to test?
      - Expected outcomes - what should the user see/experience when it works?

      Architecture patterns for new code:
      Reference docs/ARCHITECTURE.md for Domain -> Workflow -> Entrypoint pattern and separation of concerns.

      DUMPING GROUND: Use additional subfolders (e.g., `analysis/`, `design-specs/`) to store agent artifacts
      like .md analysis files, diagrams, or intermediate specs to avoid polluting shared spaces.

  # ===========================================================================
  # GENERATE PLAN-MMD SECTION
  # ===========================================================================
  # After plan YAML is approved, generate the orchestration MMD file.
  # This section defines when and how to create the Plan-MMD flowchart.

  generate_plan_mmd:
    when_to_create:
      - |
        Create Plan-MMD AFTER the plan YAML (plan_live_build.yml) is approved:
        - Approval comes from planner-reviewer or human review
        - Plan YAML must have status: approved or be explicitly confirmed
        - Required for ALL plans with multiple phases (2+ phases)
        - Single-phase plans may skip MMD generation (orchestration is trivial)
      - |
        Create Plan-MMD BEFORE returning to orchestration:
        - The orchestration executor needs the MMD to drive execution
        - Plan YAML defines WHAT to do; Plan-MMD defines HOW to orchestrate
        - Both files must exist in the plan folder before execution begins

    generation_steps:
      - |
        STEP 1: READ APPROVED PLAN YAML
        Load the approved plan_live_build.yml from the plan folder.
        Extract the following information:
        - Plan name and objective (for MMD header comments)
        - Phase list with names and task structure
        - Agent type requirements per phase (inferred from task types)
        - Dependencies between phases (sequential vs parallel potential)

      - |
        STEP 2: EXTRACT PHASE STRUCTURE
        For each phase in the plan YAML, identify:
        - Phase name (use PascalCase with underscores for MMD node IDs)
        - Phase type: setup, build, test, deploy, audit
        - Agent routing: which agent type handles this phase
        - Success criteria: what determines phase completion
        - Dependencies: which phases must complete first

        Example extraction:
          YAML phase: "Environment Setup"
          -> MMD node: Environment_Setup
          -> Agent type: deployer (deploy-worktree)
          -> Depends on: none (first phase)

      - |
        STEP 3: CREATE MMD HEADER COMMENTS
        The Plan-MMD file requires structured header comments for executor interpretation.
        Generate the following headers based on plan content:

        REQUIRED HEADERS:
        ```
        %% GOAL: <objective from plan YAML - single sentence>
        %% PROFILE: Build
        %% PLAN_FOLDER: docs/plans/live/<plan_folder_name>
        %% PHASES: <comma-separated phase names from YAML>
        %% AGENT_ROUTING: <phase-to-agent mappings>
        %% STATUS: <all phases initialized as pending>
        ```

        AGENT_ROUTING FORMAT:
        Map each phase to its agent type based on phase content:
        - Environment/Setup phases -> deployer
        - Domain/Workflow/Entrypoint build phases -> builder
        - Test/Validation phases -> tester
        - CI/CD phases -> deployer
        - Audit phases -> auditor

        Example:
        ```
        %% AGENT_ROUTING: Environment_Setup -> deployer, Domain_Build -> builder, Integration_Test -> tester, CI_CD_Validation -> deployer
        ```

        STATUS FORMAT:
        Initialize all phases as pending:
        ```
        %% STATUS: Environment_Setup=pending, Domain_Build=pending, Integration_Test=pending
        ```

      - |
        STEP 4: CREATE FLOWCHART STRUCTURE
        Build the Mermaid flowchart following plan-mmd-schema.yml conventions:

        FLOWCHART DECLARATION:
        ```
        flowchart LR
        ```

        START NODE:
        ```
        Start((Start)) --> LoadInputs[Load Context Inputs]
        ```

        PHASE NODES:
        Create action nodes for each phase using PascalCase:
        ```
        LoadInputs --> Environment_Setup[Environment Setup Phase]
        Environment_Setup --> Domain_Build[Domain Build Phase]
        ```

        DECISION NODES:
        Add decision points after phases that may need validation:
        ```
        Domain_Build --> Tests_Passed{Tests Passed?}
        Tests_Passed -- "Yes" --> Workflow_Build[Workflow Build Phase]
        Tests_Passed -- "No: Fix" --> Domain_Build
        ```

        SUBGRAPHS:
        Group related phases into subgraphs for clarity:
        ```
        subgraph Implementation_SG ["Implementation Subgraph"]
            Domain_Build --> Workflow_Build
            Workflow_Build --> Entrypoint_Build
        end
        ```

        END NODES:
        ```
        Final_Phase --> End((End))
        ```

        ESCALATION NODES:
        Add escalation paths for failure handling:
        ```
        Decision -- "No: Escalate" --> AskUser((Ask User for Clarification))
        ```

      - |
        STEP 5: ADD FEEDBACK TRIGGERS AND LOOP CONNECTIONS
        Reference agent-loops.yml for loop definitions and add appropriate triggers.

        FEEDBACK_TRIGGER COMMENTS:
        Add trigger comments within relevant phase sections:
        ```
        %% FEEDBACK_TRIGGER: TEST_FAILURE -> Implementation_SG
        %% FEEDBACK_TRIGGER: BUILD_FAILURE -> Domain_Build
        %% FEEDBACK_TRIGGER: CICD_FAILURE -> CI_CD_Validation
        ```

        LOOP DEFINITION COMMENTS:
        For phases with iteration potential, add loop metadata:
        ```
        %% LOOP_DEFINITION: modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.test-fix-loop
        %% MAX_ITERATIONS: 5 (per test-fix-loop definition)
        %% ESCALATION: If max iterations reached without tests passing, stop and Ask User
        ```

        FEEDBACK FLOW EDGES:
        Use dashed lines for feedback/return paths:
        ```
        UpdatePlan -.->|Re-plan with TEST_FAILURE| Planning_Phase
        ```

        STYLING:
        Add styling block at end of file:
        ```
        %% ========================================
        %% STYLING
        %% ========================================
        classDef dashedstroke stroke-dasharray: 5 5;
        linkStyle N stroke:#888,stroke-width:2px,stroke-dasharray: 5 5;
        ```
        (Replace N with actual edge indices for feedback loops)

    metadata_requirements:
      agent_routing:
        description: "Map each phase to the appropriate agent type"
        required: true
        validation: "All phases must have routing; all agent types must be valid"
        valid_agent_types:
          - "builder: build-python, build-flutter"
          - "tester: test-runner, test-final-output"
          - "deployer: deploy-worktree, deploy-cicd"
          - "teacher: teacher-update-guidance"
          - "cleaner: cleaner-core"
          - "auditor: test-final-output, test-audit"

      feedback_triggers:
        description: "Define failure conditions that trigger re-planning or escalation"
        required: true
        standard_triggers:
          TEST_FAILURE:
            description: "Test execution failed"
            response: "Re-plan or retry based on severity"
            loop_reference: "agent-loops.yml#loop_types.test-fix-loop"
          BUILD_FAILURE:
            description: "Build/compilation failed"
            response: "Fix in iteration or escalate"
          CICD_FAILURE:
            description: "CI/CD validation failed"
            response: "Re-plan with CI/CD context"
          AUDIT_FAILURE:
            description: "Final audit detected issues"
            response: "Re-plan with audit findings"

      status_tracking:
        description: "Initialize and track phase execution status"
        required: true
        valid_statuses:
          - "pending: Phase not yet started"
          - "in_progress: Phase currently executing"
          - "completed: Phase finished successfully"
          - "failed: Phase encountered unrecoverable error"
          - "blocked: Phase awaiting user input"

    schema_references:
      plan_mmd_schema:
        path: "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
        description: "Complete structural schema for Plan-MMD files"
        use_for: "Node naming, subgraph patterns, edge syntax, validation rules"

      orchestration_executor:
        path: "modules/AgenticGuidance/assets/definitions/orchestration-executor-specification.yml"
        description: "Runtime behavior specification for MMD execution"
        use_for: "Understanding how executor interprets AGENT_ROUTING, FEEDBACK_TRIGGERS, STATUS"

      build_phase_example:
        path: "modules/AgenticGuidance/assets/examples/planner/components/build_phase.mmd"
        description: "Example build phase component with planner-loop"
        use_for: "Pattern for iterative planning with reviewer feedback"

    output_file:
      name_template: "orchestration_{plan_name}.mmd"
      location: "Same folder as plan_live_build.yml"
      example: "docs/plans/live/250110Repo_feature-x/orchestration_feature_x.mmd"

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, iteration.yml, fix-the-source.yml, experiment-first.yml, context-minimisation.yml, worktree-and-branching.yml, response-audit.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, guidance.yml, friction.yml, domains.yml, workflows.yml, entrypoints.yml)
    # Overengineering definition: See modules/AgenticGuidance/assets/definitions/overengineering.yml
    - |
      When reviewing plans (as a reviewer planner agent):
      - Reference plan_live_build.yml for valid context routing patterns.
        File-level inputs are preferred for parallel execution determination, but directory-level guidance is also valid.
      - Reference plan_live_build.yml for correct operation ordering.
      - Only reject plans with genuine structural issues or missing critical phases.
      - Ensure inputs are file-level so agents don't need to do discovery work.

      NOTE: CI/CD validation phase planning is handled by planner-test, not planner-build.
      For plans that modify test structure, planner-test will include CI/CD validation.
