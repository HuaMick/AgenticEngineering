process:
  goal: |
    Create a phased implementation plan for completing the task using subagents.

  # NOTE: Loop definitions (test-fix-loop, audit-test-fix-loop) are accessed via
  # inputs.yml -> planner-shared.yml -> iteration.yml -> agent-loops.yml

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Participates in planner-loop with planner-reviewer feedback driving iterative refinement"

  invocation_context:
    caller_chain:
      - "orchestration-planning (planning_intent: build)"
      - "planner-build"
    note: |
      planner-build is typically spawned by orchestration-planning when a build objective
      is identified. The orchestrator routes to this agent for detailed plan creation.
      NOTE: Legacy _plan_build.yml entrypoint files are superseded by planning_intent parameter.

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-build/inputs.yml"
      description: "Core planner agent inputs and guidelines"
      # Required runtime inputs (see inputs.yml#required_inputs):
      #   - objective: Build objective to plan for
      #   - target_project_path: Absolute path to target project root
      #   - epic_folder_name: Epic folder name in YYMMDDXX_description format

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "TinyDB tickets"
      description: "Implementation plan with build phases stored in TinyDB"
      creation_method: |
        Use CLI to create phases and tickets:
          agentic epic phase add --epic {epic_folder_name} --name '<phase_name>'
          agentic epic ticket add --epic {epic_folder_name} --phase '<phase_name>' --id '<id>' --name '<name>'
        Do NOT create plan_build.yml or ticket_build.yml YAML files on disk. Store all data in TinyDB via CLI.

    # NOTE: TinyDB phase records with routing are created by planner-orchestration, NOT by planners.
    # Planners create tickets in TinyDB only. The handover model is:
    # Planner (TinyDB tickets) -> planner-orchestration (creates phase records) -> Reviewer (validates complete package)

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic agent context bootstrap --role planner-build -j

      # Get current ticket if working from an epic
      agentic agent epic ticket current -j
      ```

      CLI output provides:
      - Your objective and process summary
      - Input file paths to read
      - Current task details (if plan exists)

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
      DO NOT explore the codebase before running these commands.

    - |
      VALIDATE REQUIRED INPUTS (from inputs.yml required_inputs):
      The following inputs MUST be provided by the orchestrator or user:

      1. objective (string, required)
         - Build objective to plan for
         - ERROR if missing: "STOP: No objective provided. Cannot create build plan without clear objective."

      2. target_project_path (string, required)
         - Absolute path to target project root
         - ERROR if missing: "STOP: No target_project_path provided. Cannot resolve docs/epics/ location."

      3. epic_folder_name (string, required)
         - Epic folder name in YYMMDDXX_description format
         - ERROR if missing: "STOP: No epic_folder_name provided. Cannot create ticket files."

      If ANY required input is missing, report the specific error and STOP.
      If an input is found in a different location, update the path and flag the discrepancy.
    - |
      CONTEXT ASSESSMENT - Evaluate if RLM decomposition is needed:

      RLM TRIGGER CONDITIONS (any one triggers RLM consideration):
      - Objective references 10+ files across multiple directories
      - Specification documents exceed 1000 lines total
      - Dependency graph requires recursive exploration (transitive dependencies)
      - Cross-referencing multiple large sources (spec + codebase + tests)

      IF RLM triggers are met:
      - Reference rlm-decomposition-loop from agent-loops.yml
      - Use rlm-context-accessor.yml for programmatic context operations
      - Structure plan phases to leverage filter_and_process or hierarchical_extraction patterns
      - Bound recursion depth to max 3 levels (per rlm-decomposition-loop)

      IF RLM triggers are NOT met:
      - Proceed with standard context loading
      - No RLM overhead required for smaller objectives

      COST CONSIDERATION: RLM adds latency (more API calls) but enables handling
      objectives that would otherwise require lossy summarization. Use only when
      context genuinely exceeds practical limits.
    - |
      FENCE: EPIC FOLDER MUST EXIST BEFORE PLANNING
      The epic folder MUST already exist at docs/epics/live/YYMMDDXX_description/.

      VALIDATION STEP:
      Before proceeding, verify the epic folder exists:
      1. Check if {target_project_path}/docs/epics/live/{epic_folder_name}/ exists
      2. If the folder does NOT exist, STOP immediately with this message:

         "FENCE VIOLATION: Epic folder not found at docs/epics/live/{epic_folder_name}/

          The epic folder must be created via CLI before planning can begin.

          REQUIRED ACTION:
          Run: agentic agent epic init <branch> --description <description>

          The CLI creates the folder structure atomically.
          Do NOT create the epic folder directly with the Write tool.

          After running the CLI command, retry the planning operation."

      3. If the folder exists, proceed with planning

      FOLDER STRUCTURE (for existing folders):
      Based on epic complexity, use appropriate structure:
      - Simple epics: files at root level
      - Multi-phase epics: live/ subfolder for active files
      - Epics with completion tracking: completed/ subfolder
      Reference epics.yml for folder structure patterns.
      If completed items exist and a completed/ subfolder is appropriate,
      use `agentic agent epic move tickets --epic <epic_folder>` to archive them.
    - |
      Review the objective and add IMPLEMENTATION phases to TinyDB for completing the objective.
      Use CLI: `agentic epic phase add` and `agentic epic ticket add` to create phases and tickets.
      Do NOT create plan_build.yml or ticket_build.yml YAML files on disk. Store all data in TinyDB via CLI.
      For each item gather context and check assumptions. Find where to source
      the required context and add context routing to the plan so that other agents dont have to.

      IMPORTANT: planner-build creates build and environment setup phases in TinyDB.
      Other planners handle test phases (planner-test) and audit/cleanup phases (planner-reviewer).

      PLAN STRUCTURE REQUIREMENTS:
      Reference ticket_example.yml from inputs for:
      - Epic/ticket structure with unique name at root level
      - File-level inputs for context routing (enables parallel vs sequential execution determination)
      - Ticket-level `target_files` on EVERY ticket (sole mechanism for parallelization decisions)
      - Detailed guidance and measurable success criteria patterns
      - Operation ordering and agent type allocation
      - NOTE: Do NOT include epic-level `impacted_files` (DEPRECATED)

      INPUTS SECTION (CRITICAL - Required for each ticket):
      Each ticket MUST include an `inputs` list specifying project-specific files the agent needs to pre-read.
      These inputs enable agents to gather context BEFORE implementation begins.

      Input selection criteria:
      - Include files that provide essential context for the ticket (interfaces, related code, configs)
      - Focus on PROJECT-SPECIFIC files (agent's process.yml already provides general guidance)
      - Avoid duplicating files already in the agent's inputs.yml (these are loaded automatically)
      - Prefer file-level paths over directories (e.g., "src/api/routes.py" not "src/api/")

      Example:
        - id: "ticket_001"
          name: "Add health check endpoint"
          inputs:                                    # <-- REQUIRED: Pre-read context
            - src/api/routes.py                      # Existing route patterns
            - src/domain/services/health_service.py  # Domain interface to use
            - tests/api/test_routes.py               # Test patterns to follow
          target_files:                              # <-- What to modify
            - src/api/health.py
          guidance: |
            ...

      Success criteria MUST include user-focused validation:
      - User stories generated - what user journeys will be validated in UAT?
      - User acceptance tests - what does the user expect to be able to do?
      - User simulation tests - how will the builder agent validate the user experience?
      - Entrypoint execution - which CLI commands, API endpoints, or UI flows to test?
      - Expected outcomes - what should the user see/experience when it works?

      USER STORY INTEGRATION (MANDATORY - Discovery + Generation):
      Build plans MUST identify affected user stories. This is a mandatory step
      enforced by planning-standard.yml#Story-First Planning.

      ESCAPE HATCH: NOT AVAILABLE FOR BUILD PLANS
      Build plans are blocked_plan_types per planning-standard.yml#escape_hatch_rules.
      The escape hatch (no_stories_rationale) CANNOT be used for build plans.
      Stories MUST be discovered and recorded — there is no bypass path.

      PROCESS:
      1. Run `agentic agent stories find` during objective parsing to discover affected stories
      2. Record affected_stories in plan metadata (e.g., affected_stories: ["US-CLI-001", "US-CLI-002"])
      3. Include story files in task input references for context
      4. When stories affected: planner-test creates UAT phases targeting those stories
      5. When no stories found: MUST include no_stories_rationale field explaining why

      STORY CREATION/UPDATE:
      When implementation requires new stories or changes existing user journeys:
      - Add story_creation_tasks to the plan (tasks to create/update story files)
      - Flag story_updates_needed: true in plan metadata
      - Story creation is deferred to a teach phase (not done during build planning)

      Reference: modules/AgenticGuidance/assets/definitions/user-stories.yml
      Reference: modules/AgenticGuidance/assets/guidelines/planning-standard.yml#Story-First Planning
      UAT planning: planner-test (see planner-test/process.yml#uat_phase_planning)

      USER STORY GENERATION (MANDATORY - when stories missing):
      If `agentic agent stories find` returns no stories for the objective, planner-build
      MUST generate user stories before creating implementation tasks.

      STORY GENERATION PROCESS:
      1. Parse objective to identify user-facing features/changes
      2. For each feature, generate 3-8 user stories in format:
         - id: US-<PROJECT>-<NNN>
         - name: Brief story description
         - category: Grouping (cli_basics, api, features, etc.)
         - persona: Who is the user
         - priority: critical | high | medium | low
         - starting_state: Initial environment conditions
         - journey: Step-by-step actions with expected outcomes
         - success_criteria: What must pass for story to be validated
         - testing: Local and Docker testing instructions

      3. Stories must cover:
         - Happy path (primary user journey)
         - Error paths (validation failures, edge cases)
         - Integration scenarios (if feature interacts with other components)

      4. Each story must have specific, measurable acceptance criteria
         (not vague "it works" but "command outputs X when given Y")

      5. Create story file at docs/userstories/<project>/NN_<category>.yml

      6. Record affected_stories in plan metadata with generated story IDs

      7. Add story_creation_tasks to plan for teach phase to create files

      STORY QUANTITY GUIDANCE:
      - Minimum: 1 story (happy path only) - acceptable for trivial changes
      - Recommended: 3-8 stories - covers happy/error/edge cases
      - Maximum: 10+ stories suggests feature needs decomposition

      ESCAPE HATCH (from planning-standard.yml):
      Build plans are blocked_plan_types - CANNOT skip story generation.
      If truly no user-facing impact, plan type should be "guidance" or "infrastructure".

      Architecture patterns for new code:
      Reference docs/ARCHITECTURE.md for Domain -> Workflow -> Entrypoint pattern and separation of concerns.

      RLM-ENHANCED PHASE CREATION (when RLM triggers are met):
      When creating phases for RLM-eligible objectives, include:

      1. Context Storage Phase (optional, for very large contexts):
         - Store large specifications/codebases as named context variables
         - Use CONTEXT_SOURCE_SECTION naming convention
         - Example: CONTEXT_CODEBASE_AUTH, CONTEXT_SPEC_API

      2. Filtered Analysis Phase:
         - Define filters to extract relevant subsets
         - Reference rlm-context-accessor.yml patterns (filter_and_process, hierarchical_extraction)
         - Specify accumulator naming: ACCUMULATOR_FINDINGS, ACCUMULATOR_TASKS

      3. Standard Implementation Phase:
         - Process filtered context with standard agent patterns
         - Accumulate results in named buffers
         - Signal FINAL(result) when phase completes

      STANDARD PHASE CREATION (when RLM triggers are NOT met):
      Proceed with normal phase definition without RLM overhead.

      DUMPING GROUND: Use additional subfolders (e.g., `analysis/`, `design-specs/`) to store agent artifacts
      like .md analysis files, diagrams, or intermediate specs to avoid polluting shared spaces.

    - |
      OPEN QUESTIONS POPULATION (HITL Question Workflow):
      Reference: modules/AgenticGuidance/assets/guidelines/question-workflow.yml

      During plan creation, identify blocking questions that require human judgment or
      information that cannot be inferred from existing context. Populate the open_questions
      section in the plan YAML to enable agents to track and resolve these during execution.

      WHEN TO INCLUDE QUESTIONS:
      - Architectural decisions with significant long-term impact
      - Business logic requiring domain-specific stakeholder input
      - Priority clarification for conflicting requirements
      - Missing critical information not in docs/code
      - High-risk decisions affecting system behavior

      QUESTION FORMAT IN PLAN:
      ```yaml
      open_questions:
        - id: "plan-q-001"
          question: "Should the user authentication use JWT tokens or session cookies?"
          severity: "blocking"  # blocking | high | medium | low
          status: "pending"     # pending | answered | deferred
          context: |
            Task: Implement user authentication for API endpoints
            Attempted: Researched both approaches, found tradeoffs
            Blocking: No prior auth implementation in codebase to follow
            Impact: Affects all API endpoint security implementation
          created_at: "2026-02-03T14:30:22"
          asked_by: "planner-build"
      ```

      FIELD DEFINITIONS:
      - id: Unique identifier (plan-q-NNN format for plan-level questions)
      - question: Clear, specific question text
      - severity: blocking (cannot proceed), high (significant impact), medium (workaround exists), low (preference)
      - status: pending (awaiting answer), answered (has answer field), deferred (postponed)
      - context: Background explaining why this is blocking and what was tried
      - created_at: ISO 8601 timestamp
      - asked_by: Agent role generating the question

      WHEN ANSWERED (populated during execution, not during planning):
      ```yaml
      - id: "plan-q-001"
        question: "..."
        status: "answered"
        answer: "Use JWT tokens with RS256 signing for stateless authentication"
        answered_at: "2026-02-03T16:45:00"
        answered_by: "human"
      ```

      DO NOT ASK QUESTIONS ABOUT:
      - Technical implementation details agents can decide autonomously
      - Standard patterns already established in codebase
      - Low-risk choices that can be validated in code review
      - Information available in existing documentation or code

      NOTE: During execution, agents will use QuestionQueue service to manage these
      questions dynamically. The open_questions section in the plan provides visibility
      and tracks plan-level questions identified during planning.

    - |
      IMPACTED ARTIFACTS ANALYSIS (Recommended for orchestration visibility):
      Reference: modules/AgenticGuidance/assets/specifications/plan-schema.yml

      After identifying tasks, analyze and document semantic artifact impacts to enable:
      - Clear impact analysis for reviewers
      - Semantic conflict detection between plans

      NOTE: Epic-level `impacted_files` is DEPRECATED. Do NOT generate it.
      File scoping is handled exclusively by ticket-level `target_files`.
      Each ticket MUST declare its `target_files` list.
      Orchestration determines parallelization from non-overlapping ticket target_files.

      IMPACTED_ARTIFACTS SECTION (semantic metadata — still recommended):
      For higher-level semantic impacts (APIs, CLI commands, services):
      ```yaml
      impacted_artifacts:
        - artifact_type: cli_command  # api | cli_command | service | agent | config | model | schema
          artifact_identifier: "agentic epic list"
          impact_type: new  # new | interface_change | behavior_change | deprecation | removal
          description: "New command for epic listing"
          breaking_change: false
      ```

      ANALYSIS APPROACH:
      1. Ensure every task has `target_files` defined (REQUIRED for parallelization)
      2. Identify semantic impacts (new commands, API changes, service modifications)
      3. Flag any breaking_change: true for interface or behavior changes
      4. Include impacted_artifacts in the plan output for reviewer visibility

    - |
      CLI vs AGENT DECISION STEP (For New Functionality):
      Reference: modules/AgenticGuidance/assets/definitions/cli-agent-architecture.yml

      Before adding tasks for new functionality, evaluate whether the work belongs in CLI or Agent:

      DECISION CHECKLIST:
      1. Is the operation predictable with deterministic outcomes? -> CLI
      2. Does it require interpretation or judgment? -> Agent
      3. Is it rule-based execution without context-sensitivity? -> CLI
      4. Will it be repeated frequently across agents? -> CLI (centralize)
      5. Does it produce creative or novel output? -> Agent

      CHECKPOINT: For mechanical operations, consider CLI command first.

      PATTERNS READY FOR CLI OFFLOADING:
      - File/folder scaffolding with naming conventions
      - Status queries and state reporting
      - Task status updates in plan files
      - Git operations (branch, commit)
      - YAML/JSON validation against schemas
      - Context bootstrapping (CCI pattern)

      When new functionality is identified:
      - Split at the boundary where judgment ends and determinism begins
      - Agent decides WHAT (parameters, decisions), CLI executes HOW (mechanical work)
      - If CLI command doesn't exist but should, add a task to create it first

      Example ticket sequence for CLI-first approach:
      ```yaml
      - id: "ticket_001"
        name: "Add CLI command for epic archival"
        agent: "builder"
        guidance: "Create 'agentic agent epic archive' command for mechanical move operation"

      - id: "ticket_002"
        name: "Update orchestration to use new archive command"
        depends_on: ["ticket_001"]
        guidance: "Replace manual file moves with CLI invocation"
      ```

    - |
      LOOP INCLUSION STEP (Before Finalizing Plan):
      Reference: modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml

      Before finalizing the plan, determine required loops for iterative work:

      1. test-fix-loop - For implementation iteration:
         - Use during active development phases
         - Enables build-test-fix cycles until success
         - Maximum iterations: 5 (standard)
         - Exit condition: All tests pass OR escalate

      2. audit-test-fix-loop - After cleanup phases:
         - MANDATORY after any test creation/modification
         - MANDATORY after cleanup/removal operations
         - Catches reward hacking and validates test quality
         - Maximum iterations: 3
         - Exit condition: Audit finds no issues OR escalate

      Include loop_structure section in plan output for each phase requiring iteration:

      ```yaml
      loop_structure:
        - phase: "Implementation"
          loop_type: "test-fix-loop"
          maximum_iterations: 5
          exit_conditions:
            success: "All user simulation tests pass"
            max_iterations: "Escalate to human"

        - phase: "Test Quality Validation"
          loop_type: "audit-test-fix-loop"
          maximum_iterations: 3
          mandatory: true
          exit_conditions:
            success: "Audit finds no reward hacking issues"
            max_iterations: "Escalate - quality issues persist"
      ```

      For detailed loop templates and patterns, see loop-inclusion-for-planners.yml.

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, iteration.yml, fix-the-source.yml, experiment-first.yml, context-minimisation.yml, response-audit.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, guidance.yml, friction.yml, architecture-pattern.yml)
    # Overengineering definition: See modules/AgenticGuidance/assets/definitions/overengineering.yml
    - |
      NOTE: Planners may request validation/iteration needs but do NOT dictate loop
      strategy. Loop selection is owned by orchestration-planning. See
      orchestration-planning/inputs.yml#loop_selection_guidance.
    - |
      When reviewing plans (as a reviewer planner agent):
      - Reference TinyDB tickets for valid context routing patterns.
        File-level inputs are preferred for parallel execution determination, but directory-level guidance is also valid.
      - Reference TinyDB tickets for correct operation ordering.
      - Only reject plans with genuine structural issues or missing critical phases.
      - Ensure inputs are file-level so agents don't need to do discovery work.

      NOTE: CI/CD validation phase planning is handled by planner-test, not planner-build.
      For plans that modify test structure, planner-test will include CI/CD validation.
