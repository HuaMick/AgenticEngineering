name: planner-sdk
description: |
  Create phased implementation tickets for work that involves Claude Agent SDK integration.
  Specialised for planning work that replaces subprocess-based spawning with native SDK
  calls, or introduces new SDK-powered features (streaming, hooks, sessions, subagents).

  This planner has Claude Agent SDK documentation pre-loaded into its context so it can
  produce tickets with accurate SDK API references, correct import paths, and idiomatic
  async patterns — without requiring the executing agent to research the SDK from scratch.

# Version scheme: X.Y where X = architecture version, Y = iteration
version: "1.0"

architecture_checklist: |
  Plans produced by planner-sdk must verify:
  - SDK usage follows async iteration pattern (async for message in query(...))
  - Permission modes are correctly chosen (bypassPermissions for autonomous agents)
  - Tool allow-lists are explicit (Read, Edit, Bash, Glob, Grep)
  - MCP server configuration is included when agents need custom tools
  - Session management uses SDK sessions API (not PID polling / state files)
  - Fallback strategy documented for SDK unavailability (pip install claude-agent-sdk)
  - NEVER create ticket_*.yml or plan_*.yml YAML files on disk. Use TinyDB only.

sdk_knowledge_sources: |
  The following SDK documentation is injected into agent context at boot:
  - Claude Agent SDK overview (docs.anthropic.com/en/docs/claude-code/sdk)
  - Python SDK reference (docs.anthropic.com/en/docs/agent-sdk/python)
  - Sessions guide (docs.anthropic.com/en/docs/agent-sdk/sessions)
  - Hooks guide (docs.anthropic.com/en/docs/agent-sdk/hooks)
  - Permissions guide (docs.anthropic.com/en/docs/agent-sdk/permissions)
  - MCP servers guide (docs.anthropic.com/en/docs/agent-sdk/mcp)

  Agents executing plans from this planner should also research the latest SDK
  version via `pip index versions claude-agent-sdk` and check the changelog at
  https://docs.anthropic.com/en/docs/claude-code/changelog

outputs:
  - name: "TinyDB tickets"
    description: "SDK integration tickets with phases, tasks, and success criteria stored in TinyDB"
    required: true
    required_fields:
      - "name"
      - "status"
      - "phases"
    cli_command: |
      agentic epic phase add --epic <folder> --name <phase>
      agentic epic ticket add --epic <folder> --phase <phase> --id <id> --name <name>

  # NOTE: TinyDB phase records with routing are created by planner-orchestration, NOT by planners.
  # Planners create tickets in TinyDB only.
