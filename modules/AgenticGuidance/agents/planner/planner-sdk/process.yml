process:
  goal: |
    Create a phased implementation plan for tasks that involve Claude Agent SDK
    integration — replacing subprocess-based CLI spawning with native SDK calls,
    or introducing new SDK-powered features (streaming, hooks, sessions, subagents).

    This planner has Claude Agent SDK knowledge pre-loaded so plans include
    correct API references, import paths, and idiomatic async patterns.

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Participates in planner-loop with planner-reviewer feedback driving iterative refinement"

  invocation_context:
    caller_chain:
      - "orchestration-planning (planning_intent: build, SDK keywords detected)"
      - "planner-sdk"
    note: |
      planner-sdk is spawned by orchestration-planning when the objective involves
      Claude Agent SDK integration or migration from subprocess-based patterns.
      It produces plans with SDK-specific guidance and API references baked in.
      NOTE: Legacy _plan_build.yml entrypoint files are superseded by planning_intent parameter.

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-sdk/inputs.yml"
      description: "SDK planner inputs including Claude Agent SDK documentation references"

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "TinyDB tickets"
      description: "SDK integration plan with phases and tasks stored in TinyDB"
      creation_method: |
        Use CLI to create phases and tickets:
          agentic epic phase add --epic {epic_folder_name} --name '<phase_name>'
          agentic epic ticket add --epic {epic_folder_name} --phase '<phase_name>' --id '<id>' --name '<name>'
        Do NOT create plan_build.yml or ticket_build.yml files on disk. TinyDB is the sole data store.

    # NOTE: TinyDB phase records with routing are created by planner-orchestration, NOT by planners.
    # Planners create tickets in TinyDB only. The handover model is:
    # Planner (TinyDB tickets) -> planner-orchestration (creates phase records) -> Reviewer (validates complete package)

  steps:
    - |
      CCI BOOTSTRAP — Run FIRST before any file exploration:

      ```bash
      agentic agent context bootstrap --role planner-sdk -j
      agentic agent epic ticket current -j
      ```

    - |
      VALIDATE REQUIRED INPUTS:
      1. objective (required) — SDK integration objective to plan for
      2. target_project_path (required) — Absolute path to target project root
      3. epic_folder_name (required) — Epic folder name in YYMMDDXX_description format

      If ANY required input is missing, STOP and report.

    - |
      RESEARCH LATEST SDK STATE:
      Before planning, gather the current state of the Claude Agent SDK:

      1. Check installed version:
         ```bash
         pip show claude-agent-sdk 2>/dev/null || echo "NOT INSTALLED"
         ```

      2. Check latest available version:
         ```bash
         pip index versions claude-agent-sdk 2>/dev/null || echo "Cannot check PyPI"
         ```

      3. Read the SDK documentation for the latest API surface:
         - Overview: https://docs.anthropic.com/en/docs/claude-code/sdk
         - Python reference: https://docs.anthropic.com/en/docs/agent-sdk/python
         - Sessions: https://docs.anthropic.com/en/docs/agent-sdk/sessions
         - Hooks: https://docs.anthropic.com/en/docs/agent-sdk/hooks
         - Permissions: https://docs.anthropic.com/en/docs/agent-sdk/permissions

      4. Record SDK version and API surface in plan metadata:
         ```yaml
         sdk_context:
           installed_version: "x.y.z"
           latest_version: "a.b.c"
           api_surface_verified: true
           docs_last_checked: "2026-02-26"
         ```

    - |
      CLAUDE AGENT SDK REFERENCE — Core API patterns for plan tasks:

      INSTALLATION:
      ```bash
      pip install claude-agent-sdk
      ```

      BASIC QUERY (one-shot, stateless):
      ```python
      import asyncio
      from claude_agent_sdk import query, ClaudeAgentOptions, AssistantMessage, ResultMessage

      async def run_agent(prompt: str) -> str:
          result_text = ""
          async for message in query(
              prompt=prompt,
              options=ClaudeAgentOptions(
                  allowed_tools=["Read", "Edit", "Bash", "Glob", "Grep"],
                  permission_mode="bypassPermissions",
              ),
          ):
              if isinstance(message, ResultMessage):
                  result_text = message.result if hasattr(message, 'result') else ""
          return result_text
      ```

      KEY CONCEPTS:
      - query() returns an async iterator — streams messages as agent works
      - ResultMessage signals completion (subtype = "success" | "error")
      - AssistantMessage contains reasoning and tool calls
      - permission_mode options: "default", "acceptEdits", "bypassPermissions"
      - allowed_tools restricts what the agent can use

      SESSION MANAGEMENT (multi-turn, stateful):
      ```python
      from claude_agent_sdk import ClaudeSDKClient

      client = ClaudeSDKClient()
      # First query creates session
      session = await client.query("First task...")
      # Continue in same session
      followup = await client.query("Follow up...", session_id=session.session_id)
      ```

      SUBAGENTS (programmatic):
      ```python
      options = ClaudeAgentOptions(
          agents=[
              {"name": "reviewer", "description": "Reviews code", "prompt": "..."},
              {"name": "builder", "description": "Builds code", "prompt": "..."},
          ]
      )
      ```

      HOOKS (lifecycle callbacks):
      ```python
      options = ClaudeAgentOptions(
          hooks={
              "PreToolUse": my_pre_tool_callback,
              "PostToolUse": my_post_tool_callback,
              "Stop": my_stop_callback,
          }
      )
      ```

      MCP SERVERS (custom tools):
      ```python
      options = ClaudeAgentOptions(
          mcp_servers={
              "my-server": {
                  "command": "python",
                  "args": ["-m", "my_mcp_server"],
              }
          }
      )
      ```

    - |
      MIGRATION PATTERNS — Subprocess to SDK:

      PATTERN 1: Background session spawn → SDK query()
      BEFORE (subprocess):
      ```python
      cmd = ["claude", "--print", "--dangerously-skip-permissions", prompt]
      process = subprocess.Popen(cmd, ..., start_new_session=True)
      # Poll PID to check completion
      while is_process_running(process.pid):
          time.sleep(10)
      ```

      AFTER (SDK):
      ```python
      async for message in query(prompt=prompt, options=ClaudeAgentOptions(
          permission_mode="bypassPermissions",
          allowed_tools=["Read", "Edit", "Bash", "Glob", "Grep"],
      )):
          if isinstance(message, ResultMessage):
              status = "completed" if message.subtype == "success" else "failed"
              break
      ```

      PATTERN 2: Session status polling → Natural async completion
      BEFORE: PID polling + state file management
      AFTER: async for loop naturally terminates when session ends

      PATTERN 3: Multiple sequential agents → Parallel SDK queries
      BEFORE: spawn agent → wait → spawn next → wait
      AFTER:
      ```python
      import asyncio
      results = await asyncio.gather(
          run_agent("Task 1"),
          run_agent("Task 2"),
      )
      ```

    - |
      TICKET STRUCTURE REQUIREMENTS:
      Same as planner-build — reference plan_example.yml for:
      - Phase structure with unique names
      - Task-level target_files (required for parallelization)
      - Detailed guidance with SDK-specific API references
      - Measurable success criteria

      ADDITIONAL SDK-SPECIFIC REQUIREMENTS:
      - Each task that touches session spawning MUST reference the SDK migration pattern
      - Tasks MUST include pip install / version check as a prerequisite
      - Tasks MUST include both SDK path AND fallback path (for graceful degradation)
      - Success criteria MUST include "SDK query() returns ResultMessage with subtype='success'"

    - |
      FENCE: EPIC FOLDER MUST EXIST BEFORE PLANNING
      Same fence as planner-build — verify docs/epics/live/{epic_folder_name}/ exists.

    - |
      USER STORY INTEGRATION (MANDATORY):
      Same as planner-build — build plans MUST identify affected user stories.
      Run `agentic agent stories find` during objective parsing.

    - |
      IMPACTED ARTIFACTS ANALYSIS:
      Document SDK-specific impacts:
      ```yaml
      impacted_artifacts:
        - artifact_type: service
          artifact_identifier: "session.cmd_spawn"
          impact_type: behavior_change
          description: "Replace subprocess.Popen with claude_agent_sdk.query()"
          breaking_change: false
      ```

    - |
      LOOP INCLUSION STEP:
      Same as planner-build — include test-fix-loop and audit-test-fix-loop
      where appropriate.

  guidelines:
    - |
      SDK VERSION PINNING: Plans should pin to a minimum SDK version but allow
      newer versions. Use `claude-agent-sdk>=X.Y.Z` format in requirements.
    - |
      ASYNC MIGRATION: When migrating synchronous subprocess code to async SDK,
      plan tasks should use asyncio.run() at the top-level entry point.
      Internal functions should be async def.
    - |
      GRACEFUL DEGRADATION: Every SDK migration task should include a fallback
      path that uses the existing subprocess approach if the SDK is unavailable.
      This prevents hard failures during transition.
    - |
      TESTING: SDK integration tests should mock the SDK query() to avoid
      real API calls in CI. Use unittest.mock.AsyncMock for async functions.
