# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths are relative to the REPOSITORY ROOT.
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# ==============================================

required_inputs:
  - name: "objective"
    type: "string"
    description: "SDK integration objective to plan for"
    required: true
    example: "Migrate session spawning from subprocess.Popen to claude-agent-sdk query()"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root"
    required: true
    example: "/home/code/AgenticEngineering"

  - name: "plan_folder_name"
    type: "string"
    description: "Plan folder name in YYMMDDXX_description format"
    required: true
    example: "260226SD_migrate_session_to_sdk"

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "planner-sdk"

inputs:
  agent_type: "planner-sdk"
  version: "1.0"

  # Shared planner layers (same base as planner-build)
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs"
      required: true

  # SDK-specific inputs
  core_inputs:
    - type: file
      path: "modules/AgenticGuidance/agents/planner/planner-sdk/manifest.yml"
      description: "SDK planner architecture checklist and knowledge sources"
      required: true

    # Plan example (same as planner-build)
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
      description: "Unified plan example"
      required: true

    # Plan MMD Schema
    - type: file
      path: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
      description: "MMD structure schema"
      required: true

    # Structural patterns
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml"
      description: "Shared structural patterns for plan creation"
      required: true

    # SDK-SPECIFIC: Current session spawning implementation (migration source)
    - type: file
      path: "modules/AgenticCLI/src/agenticcli/commands/session.py"
      description: "Current session spawn implementation — the primary migration target. Contains subprocess.Popen-based background spawning that should be replaced with SDK query()."
      required: true

    # SDK-SPECIFIC: Current planner loop (orchestration spawning)
    - type: file
      path: "modules/AgenticCLI/src/agenticcli/workflows/planner_loop.py"
      description: "Planning loop workflow — spawns agents via CLI subprocess. Primary candidate for SDK migration to eliminate PID polling and state file management."
      required: true

    # SDK-SPECIFIC: State store (the infrastructure being replaced)
    - type: file
      path: "modules/AgenticCLI/src/agenticcli/utils/state_store.py"
      description: "StateStore and is_process_running — the PID-based lifecycle management being replaced by SDK's natural async completion."
      required: true

  # SDK documentation references (agents should fetch these at runtime)
  sdk_documentation:
    - url: "https://docs.anthropic.com/en/docs/claude-code/sdk"
      description: "Agent SDK overview — installation, capabilities, getting started"
      fetch_at_runtime: true

    - url: "https://docs.anthropic.com/en/docs/agent-sdk/python"
      description: "Python SDK reference — query(), ClaudeAgentOptions, message types"
      fetch_at_runtime: true

    - url: "https://docs.anthropic.com/en/docs/agent-sdk/sessions"
      description: "Sessions — multi-turn agents, session persistence, context management"
      fetch_at_runtime: true

    - url: "https://docs.anthropic.com/en/docs/agent-sdk/hooks"
      description: "Hooks — PreToolUse, PostToolUse, Stop lifecycle callbacks"
      fetch_at_runtime: true

    - url: "https://docs.anthropic.com/en/docs/agent-sdk/permissions"
      description: "Permissions — default, acceptEdits, bypassPermissions modes"
      fetch_at_runtime: true

  guidelines:
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/question-workflow.yml"
      description: "HITL question workflow"
      required: true

  definitions:
    sdk_migration_patterns: |
      Key migration patterns for subprocess → SDK:

      1. SPAWN + POLL → ASYNC QUERY
         subprocess.Popen + PID polling → async for message in query()
         Eliminates: state files, dead-PID detection, exit_code parsing

      2. SEQUENTIAL SPAWNS → PARALLEL GATHER
         spawn → wait → spawn → wait → asyncio.gather(query(), query())
         Eliminates: serial bottleneck in multi-agent workflows

      3. STATE FILE LIFECYCLE → NATURAL COMPLETION
         StateStore.save({"status": "running"}) → ResultMessage signals done
         Eliminates: orphaned state files, stale sessions, race conditions

      4. CLI BINARY INVOCATION → IN-PROCESS SDK
         ["claude", "--print", prompt] → query(prompt=prompt, options=...)
         Eliminates: subprocess overhead, PATH issues, environment leakage
