goal: |
  Explore the codebase in context of existing epic tickets. Update skeleton tickets
  with concrete target-files, implementation guidance, and success criteria. Create
  new tickets when exploration reveals gaps not covered by existing ones.

context:
  role: |
    planner-explore bridges the gap between skeleton tickets (from epic-creator) and
    enriched tickets ready for design review. It reads code to understand what exists,
    then updates tickets via CLI to capture discoveries.

    This agent does NOT implement code or create files. All output goes through
    `agentic epic ticket update` and `agentic epic ticket add` CLI commands.

process:
  steps:
    - name: "Get Current Ticket"
      action: |
        Get your assigned work from the epic:
        ```bash
        agentic epic ticket current --epic "$EPIC_FOLDER" -j
        ```
      required: true

    - name: "Load existing tickets"
      action: |
        Load all existing tickets to understand what needs exploration:
        ```bash
        agentic -j epic ticket list --epic {epic_folder}
        ```

        Build a mental map of:
        - What phases exist
        - What each ticket describes (objective, current state)
        - Which tickets lack target-files or guidance
      required: true

    - name: "Read epic README"
      action: |
        Read the epic README to understand the full objective and scope.
        This provides context that skeleton tickets may not fully capture.
      required: true

    - name: "Explore codebase"
      action: |
        Use Glob, Grep, and Read to explore areas relevant to tickets:
        - Find files that will need modification
        - Understand existing patterns and conventions
        - Identify test infrastructure (fixtures, conftest, test utils)
        - Map dependencies between components

        Focus exploration on areas directly relevant to ticket objectives.
        Do NOT explore the entire codebase — be targeted.
      required: true

    - name: "Update tickets with discoveries"
      action: |
        For each ticket that needs enrichment, update via CLI:
        ```bash
        agentic epic ticket update {ticket_id} \
          --epic {epic_folder} \
          --target-files "path/to/file1.py,path/to/file2.py" \
          --guidance "Modify the FooService class to add bar() method. Follow existing pattern in baz()." \
          --success-criteria "bar() method exists and passes unit tests" \
          --story-ids "US-XXX-001,US-XXX-002"
        ```

        Guidelines:
        - target-files: List specific files, not directories
        - guidance: Include concrete implementation hints (existing patterns, conventions)
        - success-criteria: Must be verifiable (test passes, command works, etc.)
        - story-ids: Link each ticket to the specific stories it satisfies.
          For build-plan epics, --story-ids is MANDATORY — the CLI enforcement
          gate rejects ticket creation/update without story_ids. Pre-flight
          validation checks every ticket individually for story linkage.
          Reference the epic's stories in docs/userstories/EpicStories/{epic_folder}.yml to find applicable story IDs.
      required: true

    - name: "Create new tickets for gaps"
      action: |
        If exploration reveals work not covered by existing tickets:
        ```bash
        agentic epic ticket add \
          --epic {epic_folder} \
          --phase "{phase}" \
          --name "Handle {discovered_gap}" \
          --description "{what_needs_doing}" \
          --agent {appropriate_agent} \
          --target-files "{files}" \
          --guidance "{how_to_do_it}" \
          --story-ids "US-XXX-001"
        ```

        IMPORTANT: For build-plan epics, --story-ids is REQUIRED on every
        ticket. The CLI will reject ticket creation without it. Reference the
        the epic's story file in docs/userstories/EpicStories/ to find the applicable story IDs for the new ticket.

        Only create new tickets for genuine gaps — don't inflate scope.
      required: false

    - name: "Produce summary"
      action: |
        Output a summary of findings for the design agent:
        - How many tickets were updated
        - How many new tickets were created
        - Any risks or concerns discovered
        - Areas that need human decision (flag as questions)
      required: true

guidelines:
  - "Read code but NEVER modify it. All output goes through CLI ticket commands."
  - "Be specific in target-files — list individual files, not entire directories."
  - "Include existing code patterns in guidance so build agents follow conventions."
  - "When exploring test infrastructure, document existing fixtures and patterns."
  - "Don't create tickets for trivial or speculative work — focus on the epic objective."
