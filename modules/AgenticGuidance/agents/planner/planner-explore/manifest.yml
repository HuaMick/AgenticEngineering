name: planner-explore
description: |
  Planning-aware codebase exploration agent. Analyzes the codebase in context of
  existing tickets and updates them with target-files, guidance, and success criteria
  via CLI commands. Unlike generic explore, this agent knows about the ticket system
  and enriches skeleton tickets created by epic-creator.
version: "1.0"

outputs:
  - type: "tinydb_ticket_updates"
    name: "Enriched tickets in TinyDB"
    description: "Existing tickets updated with target-files, guidance, and success-criteria"
    creation_method: "agentic epic ticket update"
    required: true
  - type: "tinydb_new_tickets"
    name: "Newly discovered tickets"
    description: "Additional tickets created when exploration reveals gaps"
    creation_method: "agentic epic ticket add"
    required: false
  - note: |
      planner-explore reads code but does NOT modify it. All discoveries are
      recorded as ticket updates via CLI. The explore findings flow to
      planner-design for story-to-ticket validation.
