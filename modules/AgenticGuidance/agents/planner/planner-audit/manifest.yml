name: planner-audit
description: "Audit epic folder compliance and identify files that should be archived, completed, or removed."
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"

purpose: |
  Audit epic folders to ensure compliance with planning conventions and lifecycle rules.
  Identifies issues that create friction for future agents working with the epic folder:
  - Completed files still in live/ (should be in completed/)
  - Analysis/audit outputs that should be archived
  - Files that could mislead future agents (noise, red-herrings, stale data)
  - Tickets that were executed but not marked complete
  - Tickets that were never executed

  The audit produces a compliance report with actionable recommendations for cleanup.

# Process and inputs files
files:
  process: "process.yml"
  inputs: "inputs.yml"

outputs:
  - type: "audit_yaml"
    name: "audit_plan_compliance.yml"
    description: "Compliance audit report with findings and recommendations"
    location: "docs/epics/live/{epic_folder_name}/audit/"
    required: true
  - type: "markdown"
    name: "compliance-analysis.md"
    description: "Detailed analysis document explaining findings"
    location: "docs/epics/live/{epic_folder_name}/analysis/"
    required: false

audit_categories:
  file_placement: |
    Files in wrong location based on their status or type:
    - Completed items still in live/ (should sync to completed/)
    - Audit reports in live/ instead of audit/
    - Analysis artifacts in live/ instead of analysis/
    - Review decisions not moved to analysis/

  stale_artifacts: |
    Files that are outdated or no longer relevant:
    - Tickets with all items completed but folder not synced
    - Iteration logs from resolved issues
    - Temporary analysis files that served their purpose

  misleading_content: |
    Files that could cause future agents to take wrong actions:
    - Outdated tickets that reference deleted files
    - Incomplete remediation tickets that were superseded
    - Analysis pointing to resolved issues as current
    - Comments/todos that were addressed but not removed

  plan_execution_tracking: |
    Verifying that tickets were actually executed:
    - Tickets with status: active but no evidence of work
    - Tasks marked complete without corresponding code changes
    - Tickets abandoned mid-execution without documentation

compliance_rules:
  epic_folder_root: |
    The epic folder root should contain:
    - README.md at folder root
    - Optional subfolders: reference/, analysis/, audit/, completed/
    - Optional reference artifacts (.md files, diagrams)

    All ticket and phase data is stored in TinyDB, NOT as on-disk YAML files.
    Query TinyDB for ticket/phase data: `agentic -j epic ticket list --epic <folder>`

    Files that should NOT be at root:
    - ticket_*.yml or plan_*.yml (LEGACY - data belongs in TinyDB)
    - orchestration_*.mmd (LEGACY - phase routing stored in TinyDB phase records)
    - Audit reports (should be in audit/ subfolder)
    - Review decisions (should be in analysis/ subfolder)
    - General analysis documents (should be in analysis/ subfolder)

    DEPRECATED patterns (flag for removal):
    - On-disk ticket_*.yml or plan_*.yml files (migrate to TinyDB)
    - orchestration_*.mmd files (phase routing now in TinyDB phase records)
    - ticket_live_*.yml naming convention

  completed_folder: |
    The completed/ subfolder may contain:
    - Reference documentation and analysis artifacts
    - Legacy ticket files (should be migrated to TinyDB if still active)

    NOTE: Ticket completion status is tracked in TinyDB, not via file placement.
    Do NOT look for ticket_completed.yml files - query TinyDB instead.

  audit_folder: |
    The audit/ subfolder should contain:
    - Audit reports (audit_*.yml) after remediation is approved
    - Historical audit findings for reference

  analysis_folder: |
    The analysis/ subfolder should contain:
    - Iteration logs (plan_iteration_*.yml)
    - Review decisions (review_*.yml)
    - Friction analysis documents
    - General analysis markdown files
