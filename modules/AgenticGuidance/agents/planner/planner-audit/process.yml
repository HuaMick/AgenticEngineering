process:
  goal: |
    Audit epic folder compliance: identify misplaced, stale, or misleading files.
    Output: audit_plan_compliance.yml in audit/ subfolder with findings and actions.

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-audit/inputs.yml"
      description: "Core planner-audit agent inputs, definitions, and guidelines"
    - location: "docs/epics/live/YYMMDDXX_description/"
      description: "The epic folder to audit"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST:
      ```bash
      agentic agent context bootstrap --role planner-audit -j
      agentic agent epic ticket current -j
      ```
      Use Glob/Grep/Read only if CLI output indicates specific files to examine.

    - |
      VALIDATE REQUIRED INPUTS (STOP if missing):
      1. epic_folder_path - Path to audit (e.g., "docs/epics/live/260106MyProject_feature_auth/")
      2. target_project_path - Absolute path to project root (e.g., "/home/code/MyProject")

    - |
      FENCE: EPIC FOLDER MUST EXIST BEFORE AUDITING
      The epic folder MUST already exist at the provided epic_folder_path.

      VALIDATION STEP:
      Before proceeding, verify the epic folder exists:
      1. Check if the provided epic_folder_path exists on disk
      2. If the folder does NOT exist, STOP immediately with this message:

         "FENCE VIOLATION: Epic folder not found at {epic_folder_path}

          The epic folder must be created via CLI before auditing can begin.

          REQUIRED ACTION:
          Run: agentic agent epic init <branch> --description <description>

          The CLI creates the epic folder structure.
          Do NOT create the epic folder directly with the Write tool.

          After running the CLI command, retry the audit operation."

      3. If the folder exists, proceed with audit

    - |
      INVENTORY THE EPIC FOLDER:
      List all files in root and subfolders (live/, completed/, audit/, analysis/).
      Record: file path, type (from naming pattern), last modified date.

    - |
      AUDIT EPIC STRUCTURE HIERARCHY (CRITICAL - must pass before other checks):

      Query TinyDB for all tickets in the epic:
      ```bash
      agentic -j epic ticket list --epic {epic_folder_name}
      ```

      For each phase returned from TinyDB:
      1. Verify the phase has an `agent` field set
      2. Verify the phase has at least one ticket
      3. Check that tickets have required fields (id, name, status)

      RULES:
      - If a phase has no `agent` field, FLAG as HIGH severity:
        "STRUCTURE VIOLATION: Phase '{name}' has no agent routing. The executor
         cannot dispatch work without an agent field."
      - If a phase has no tickets, FLAG as MEDIUM severity:
        "Phase '{name}' has no tickets defined."
      - If tickets lack required fields, FLAG as HIGH severity with specifics.

      NOTE: Do NOT audit on-disk YAML files (ticket_*.yml). All ticket/phase data
      is stored in TinyDB. Use CLI commands to query the authoritative data source.

      Add findings to the compliance report under a new `structure_hierarchy` section.

    - |
      AUDIT FILE PLACEMENT (for each file ask: "Does this file belong here?"):

      For files in live/:
      - Is this an audit report (audit_*.yml)? FLAG: "Should be in audit/ subfolder"
      - Is this a review decision (review_*.yml)? FLAG: "Should be in analysis/ subfolder"
      - Is this analysis content? FLAG: "Should be in analysis/ subfolder"
      - Are there stale YAML ticket files (ticket_*.yml, plan_*.yml)?
        FLAG: "Legacy YAML ticket file found. All ticket data should be in TinyDB."

      For files in completed/:
      - Is there documentation or analysis that belongs in analysis/ subfolder?

      NOTE: Ticket/phase data is stored in TinyDB, not on-disk YAML files.
      Query TinyDB for ticket status: `agentic -j epic ticket list --epic {epic_folder_name}`
      Check TinyDB for completed status rather than looking for ticket_completed.yml files.

      For files in audit/:
      - These are generally correct placement (audit reports belong here after processing)

      For files in analysis/:
      - These are generally correct placement (iteration logs, reviews, analysis docs)

    - |
      AUDIT FOR COMPLETED FILES STILL IN LIVE:

      Query TinyDB for ticket completion status:
      ```bash
      agentic -j epic ticket list --epic {epic_folder_name}
      ```

      1. Check each ticket's status field in TinyDB
      2. If ALL tickets have status: completed:
         - FLAG: "All tickets completed - epic should be archived"
         - Recommend: Run `agentic agent epic move folder --epic {epic_folder_name}` to archive

      NOTE: Do NOT look for on-disk ticket_*.yml files for completion status.
      TinyDB is the authoritative source for all ticket/phase status data.
      Legacy YAML files on disk should be flagged for removal.

    - |
      AUDIT FOR STALE ANALYSIS/AUDIT OUTPUTS:

      Check for outputs that served their purpose but weren't archived:
      - Iteration logs (plan_iteration_*.yml) for issues that have been resolved
      - Friction analysis documents for completed refactors
      - Audit reports that have been addressed and remediated

      For each, determine:
      - Is there evidence the issue was resolved? (subsequent plans, code changes)
      - Is the file still providing value or is it noise?
      - Recommend archival or retention with justification

    - |
      AUDIT FOR MISLEADING FILES (noise/red-herrings):

      Identify files that could mislead future agents:
      - Plans referencing files that no longer exist
      - Tasks pointing to code locations that have moved
      - Analysis documents with outdated recommendations
      - TODOs or comments about issues that were fixed

      For each, evaluate:
      - Could an agent reading this file take a wrong action?
      - Is the file clearly marked as historical/outdated?
      - Recommend update, archive, or delete with specific reasoning

    - |
      AUDIT TICKET-TO-EXECUTION TRACKING:

      For each ticket file, verify execution status:

      EXPECTED COMPLETIONS:
      - Tickets with status: completed should have evidence of execution
      - Check for corresponding code changes, test results, or documentation

      INCOMPLETE TICKETS:
      - Tickets with status: active but no recent activity
      - Tickets with some items completed but others abandoned
      - Tickets that were superseded without explicit documentation

      For incomplete tickets, document:
      - What was the intended goal?
      - What evidence exists of partial execution?
      - Was the ticket superseded? If so, by what?
      - Recommend: mark as abandoned, complete remaining items, or archive

    - |
      AUDIT STORY TRACEABILITY (Bidirectional Coverage Check):

      This audit step verifies bidirectional linkage between tickets and user stories.
      Two directions must be checked:

      1. TICKET → STORY (Forward Traceability):
         For each ticket in TinyDB with a story_ids field:
         - Verify each referenced story ID exists in docs/userstories/
         - If a story ID is invalid, FLAG as HIGH severity:
           "Ticket '{ticket_id}' references non-existent story '{story_id}'"

      2. STORY → TICKET (Reverse Traceability):
         Query affected_stories from the epic record in TinyDB.
         For each affected story:
         - Check if at least one ticket references this story via story_ids
         - Check if at least one test file has @pytest.mark.story("<story_id>")
           by scanning test files: `grep -r "pytest.mark.story.*<story_id>" tests/`
         - If a story has NO ticket reference AND NO pytest marker:
           FLAG as MEDIUM severity:
           "Story '{story_id}' is in affected_stories but has no ticket or test linkage"

      3. PYTEST MARKER COVERAGE:
         For each affected story, check if any test uses @pytest.mark.story:
         ```bash
         grep -r "@pytest.mark.story.*<story_id>" modules/*/tests/
         ```
         - If no marker found, FLAG as MEDIUM severity:
           "Story '{story_id}' has no @pytest.mark.story marker in test files"

      Add findings to compliance report under a new `story_traceability` section.

    - |
      GENERATE COMPLIANCE REPORT:

      Create audit report (audit_plan_compliance.yml in audit/ subfolder) with:
      ```yaml
      audit:
        epic_folder: "{epic_folder_path}"
        audit_date: "YYYYMMDD"
        auditor: "planner-audit"

      findings:
        structure_hierarchy:
          - file: "{path}"
            issue: "tasks at root level | phase missing tasks | phases key missing"
            severity: "high|medium"
            recommendation: "{action}"
            blocking: true|false

        file_placement:
          - file: "{path}"
            issue: "{description}"
            severity: "high|medium|low"
            recommendation: "{action}"

        completed_in_live:
          - file: "{path}"
            all_items_completed: true
            recommendation: "Delete from live/ - synced copy exists in completed/"

        stale_artifacts:
          - file: "{path}"
            reason: "{why it's stale}"
            recommendation: "{action}"

        misleading_content:
          - file: "{path}"
            risk: "{how it could mislead}"
            recommendation: "{action}"

        story_traceability:
          - direction: "ticket_to_story|story_to_ticket|pytest_marker"
            entity_id: "{ticket_id or story_id}"
            issue: "{description of traceability gap}"
            severity: "high|medium"
            recommendation: "{action}"

        execution_tracking:
          - plan: "{path}"
            expected_status: "{status}"
            actual_status: "{status}"
            evidence: "{what was found}"
            recommendation: "{action}"

      summary:
        total_files_audited: N
        issues_found: N
        high_severity: N
        medium_severity: N
        low_severity: N

      actions:
        immediate:
          - "{high priority actions}"
        recommended:
          - "{medium priority actions}"
        optional:
          - "{low priority suggestions}"
      ```

    - |
      REPORT FINDINGS:

      Provide a summary to the orchestrating agent:
      - Number of files audited
      - Number and severity of issues found
      - Recommended immediate actions
      - Path to full audit report

  guidelines:
    # Core guidelines: See inputs.yml for transitive layer references
    # Epic lifecycle: See modules/AgenticGuidance/assets/definitions/plans.yml
    - |
      QUESTION EACH FILE: "Is this file compliant? Does it belong here?"
    - |
      COPY-AND-SYNC: Files stay in live/ while work continues; when ALL items done, delete live/ copy.
    - |
      SEVERITY: HIGH=could mislead agent, MEDIUM=wrong location/stale, LOW=minor organizational.
    - |
      HIERARCHY ENFORCEMENT: Tickets MUST use phases->tasks nesting. Root-level `tasks:` keys
      are a BLOCKING audit failure. Downstream parsers iterate phases[].tasks[] and will
      silently skip root-level tasks, causing missed work. Reference: plans.yml#required_fields.
    - |
      NON-DESTRUCTIVE: Audit and report only. Cleaner agents execute cleanup.
