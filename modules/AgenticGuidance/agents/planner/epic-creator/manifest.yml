name: epic-creator
description: |
  First agent in the planning flow. Scaffolds the entire epic structure by creating
  phases and skeleton tickets via CLI commands. All downstream agents inherit the
  mental model of "work through tickets, don't implement."
version: "1.0"

outputs:
  - type: "tinydb_phases"
    name: "TinyDB phase records"
    description: "Phases created via agentic epic phase add"
    creation_method: "agentic epic phase add"
    required: true
  - type: "tinydb_tickets"
    name: "TinyDB skeleton tickets"
    description: "Skeleton tickets created via agentic epic ticket add"
    creation_method: "agentic epic ticket add"
    required: true
  - note: |
      epic-creator scaffolds the structure. Downstream agents (planner-explore,
      planner-design, domain planners) enrich tickets with target-files, guidance,
      and success criteria. epic-creator does NOT write code or create files.
