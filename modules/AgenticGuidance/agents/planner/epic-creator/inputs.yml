# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths relative to REPOSITORY ROOT except docs/epics/ which are relative to TARGET PROJECT root
# ==============================================

required_inputs:
  - name: "objective"
    type: "string"
    description: "Epic objective — what needs to be accomplished"
    required: true
    example: "Redesign planning flow to put epic-creator first"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root"
    required: true
    example: "/home/code/AgenticEngineering"

  - name: "epic_folder_name"
    type: "string"
    description: "Epic folder name in YYMMDDXX_description format"
    required: true
    example: "260312EC_epic_creator_first"

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "epic-creator"

inputs:
  agent_type: "epic-creator"
  version: "1.0"

  # Minimal inputs — epic-creator needs CLI knowledge, not deep codebase context
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions"
      required: true

  core_inputs:
    - type: file
      path: "modules/AgenticGuidance/agents/planner/epic-creator/manifest.yml"
      description: "Agent manifest with output specifications"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
      description: "Agent category definitions for routing decisions"
      required: true
