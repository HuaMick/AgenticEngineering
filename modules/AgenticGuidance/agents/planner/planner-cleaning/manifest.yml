name: planner-cleaning
description: "Create cleanup, audit, and documentation phases for finalizing implementation"
version: "1.0"

purpose: |
  Create cleanup, audit, and documentation phases for finalizing implementation in live plans.
  Generates structured phases for:
  - Cleanup: Remove obsolete files before final testing
  - Audit: Validate test quality and detect reward hacking (audit-test-fix loop)
  - User Story Validation: Ensure User Story tests pass (PRIMARY SUCCESS CRITERIA)
  - Documentation: Document final state after implementation completes

  These phases are added to live plans during the planning loop to ensure proper finalization
  of work before moving to completed status.

phase_creation_rules: |
  Phase Order (must follow this sequence):
  1. CLEANUP PHASE - Remove obsolete files before final testing
  2. AUDIT PHASE - Validate test quality and detect reward hacking
  3. USER STORY VALIDATION PHASE - Ensure User Story tests pass (PRIMARY SUCCESS CRITERIA)
  4. DOCUMENTATION PHASE - Document final state (comes last)

  Cleanup Phase Structure:
  - Sequential execution groups for file removal tasks
  - Must specify which files/directories to remove
  - Must verify that critical files are NOT removed
  - Include success criteria: No obsolete files found, critical files intact

  Audit Phase Structure:
  - Use audit-test-fix-loop execution pattern
  - Audit agent runs first (assumes testing completed previously)
  - Test agent validates audit findings addressed
  - Build agent fixes issues ONLY if traced to source code (not test quality issues)
  - Include success criteria: Reward hacking identified, architecture validated, test quality verified

  User Story Validation Phase Structure:
  - Use user_simulator agents to execute User Story tests
  - One agent per user story FILE (tests all stories in file)
  - Tests cover local, Docker, and Cloud Build environments
  - Agent-blind-test approach (follows documentation only)
  - Include success criteria: All relevant User Story tests pass
  - This is the PRIMARY SUCCESS CRITERIA for implementation work

  Documentation Phase Structure:
  - Sequential execution groups for documentation updates
  - Update user-facing docs (README, SETUP, configuration guides)
  - Trace documentation to source code for accuracy
  - Include success criteria: Users can understand new architecture, migration guides work

definitions:
  cleanup_phase: |
    Cleanup phases remove obsolete files before final testing to ensure that cleanup
    doesn't break functionality. Key characteristics:

    - Must come BEFORE final testing/audit phases
    - Use sequential execution groups (tasks run one after another)
    - Specify exact files/directories to remove
    - Verify critical files remain intact (home directory configs, source code)
    - Success criteria must confirm obsolete files removed and critical files preserved

    Common cleanup tasks:
    - Remove obsolete config files (local project configs after migrating to home directory)
    - Remove test fixtures for deprecated behavior
    - Remove legacy code paths that are no longer used
    - Update .gitignore to prevent future creation of obsolete files

  audit_phase: |
    Audit phases validate test quality and detect reward hacking patterns where tests
    pass but implementation is incorrect. Key characteristics:

    - Use audit-test-fix-loop execution pattern
    - Audit agent runs first, assuming testing completed in previous phase
    - Test agent validates that audit findings have been addressed
    - Build agent fixes issues ONLY if traced to source code (not test quality issues)

    Audit focus areas:
    - Test fairness: Do tests verify behavior or use hidden configs?
    - Implementation simplicity: Is code actually simpler or just rearranged?
    - Architecture compliance: Is implementation following design principles?
    - Reward hacking patterns: Tests mocking behavior they should test, overly permissive assertions

    Success criteria:
    - All reward hacking patterns identified and documented
    - Architecture violations documented with severity ratings
    - Test quality issues distinguished from code issues
    - Specific recommendations provided for each finding

  user_story_validation_phase: |
    User Story Validation Phase is the PRIMARY SUCCESS CRITERIA for implementation work.
    This phase ensures that complete user journeys work as expected.

    Location: modules/AgenticGuidance/userstories/ (workspace-relative)
    Structure: Organized by project (MyAgents/, RemoteAgents/, MyAgentsFrontend/)

    Validation approach:
    - User simulator agents execute User Story tests
    - One agent per user story file
    - Tests cover local, Docker, and Cloud Build environments
    - Agent-blind-test approach (follows documentation only)

    SUCCESS CRITERIA:
    - All relevant User Story tests pass
    - User journeys complete successfully
    - Documentation accurately reflects behavior

    This phase must come AFTER audit phase (to ensure test quality) and
    BEFORE documentation phase (so docs can reflect validated behavior).

  documentation_phase: |
    Documentation phases document the final state after implementation completes.
    Key characteristics:

    - Comes LAST in the phase sequence (after cleanup, audit, and user story validation)
    - Use sequential execution groups for documentation updates
    - Update user-facing documentation (README, SETUP, configuration guides)
    - Trace documentation to source code to ensure accuracy

    Documentation tasks:
    - Update configuration guides to reflect new architecture
    - Update README with architecture highlights and work-from-anywhere capability
    - Update SETUP with verification steps and migration guides
    - Ensure examples match actual implementation behavior

    Success criteria:
    - New users can complete setup following documentation alone
    - Verification steps successfully confirm expected behavior
    - Migration instructions work without errors
    - Documentation accurately describes actual implementation behavior
