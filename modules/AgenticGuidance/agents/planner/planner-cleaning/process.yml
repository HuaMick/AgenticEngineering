process:
  goal: |
    Create cleanup, audit, and documentation phases for finalizing implementation.
    These phases ensure code quality, validate test integrity, and document the final state.
    Handles folder lifecycle transitions (copy to completed/ when appropriate).
    Recognizes follow-on work scenarios (new phases added to existing plans).

    OUTPUT STRUCTURE:
    - Outputs finalization phases to `live/` folder within the plan folder
    - Reads from all .yml files in `live/` to understand completed work
    - SYNCS completed items from `live/` files to copies in `completed/` (copy-and-sync)
    - DELETES files from `live/` only when ALL items are completed
    - Updates `completed/plan_completed.yml` with summary entries
    - COPIES entire plan folder to `docs/plans/completed/` when phases complete (folder-level copy)

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (audit-test-fix-loop, cleaner-dependency-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions
    # cleaner-dependency-loop: Explorer-verified cleanup pattern
    #   1. Cleaner identifies target files/code for removal
    #   2. Explorer agent checks for dependencies/usages
    #   3. Decision point: Safe to remove (no deps) or defer (has deps)
    #   4. Execute removal or escalate with dependency report

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml"
      description: "Core planner agent inputs and guidelines"
    - location: "docs/plans/live/YYMMDDXX_description/"
      description: "The live plan folder containing phase .yml files"

  outputs:
    - location: "docs/plans/live/YYMMDDXX_description/live/plan_live_*.yml"
      description: "Finalization phases (cleanup, audit, user-story-validation, documentation)"
    - location: "docs/plans/live/YYMMDDXX_description/completed/"
      description: "Completed .yml files moved from live/ (file-level moves)"
    - location: "docs/plans/live/YYMMDDXX_description/completed/plan_completed.yml"
      description: "Summary index of completed items"
    - location: "docs/plans/live/YYMMDDXX_description/analysis/"
      description: "Iteration logs and analysis artifacts"
    - location: "docs/plans/completed/YYMMDDXX_description/"
      description: "Snapshot copy of entire plan folder when phases complete"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic context bootstrap --role planner-cleaning -j

      # Get current task if working from a plan
      agentic plan task current -j
      ```

      CLI output provides:
      - Your objective and process summary
      - Input file paths to read
      - Current task details (if plan exists)

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
      DO NOT explore the codebase before running these commands.

    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      A planning folder should have been provided.
      Read all .yml files in `live/` to understand completed work.

      FILE LIFECYCLE:
      See modules/AgenticGuidance/assets/definitions/plans.yml for authoritative lifecycle patterns:
      - two_level_completion_pattern: Copy-and-Sync for phase plans
      - scrap_file_taxonomy: Move/delete rules for audit, review, remediation files
      - file_taxonomy: Reserved files and location semantics
    - |
      PLAN FOLDER ARTIFACT LIFECYCLE CHECK:
      For each file in the plan folder, ask:
      1. Is this file in the correct location per file_taxonomy? (live/, completed/, audit/, analysis/)
      2. Does this file represent noise for future agents?
         - Analysis markdown files that look like plans but aren't actionable
         - Batch output files whose recommendations were already implemented
         - Iteration logs that have served their purpose
      3. Should batch/analysis outputs be archived? Check if:
         - The recommendations in the file were implemented
         - The file no longer provides actionable value
         - Moving to analysis/ or audit/ would reduce clutter in live/

      ACTION: Flag files needing lifecycle transitions. Prioritize moving implemented analysis
      outputs to analysis/ and completed scrap files per scrap_file_taxonomy rules.
    - |
      Review the live plan phases and identify what work has been completed.
      Determine what finalization phases are needed based on the implementation.
    - |
      Add finalization phases following the phase definitions in manifest.yml:
      See manifest.yml phase_creation_rules for phase definitions and recommended ordering
      (cleanup_phase, audit_phase, user_story_validation_phase, documentation_phase).

      PHASE ORDERING (LOOSE RULE):
      The manifest.yml order (Cleanup -> Audit -> User Story Validation -> Documentation)
      is a sensible default. Planners may adjust ordering based on context.

      CLEANUP PHASE REQUIREMENTS (cleaner-dependency-loop):
      When creating cleanup phases, ensure the plan includes:
      1. Cleaner agent tasks to identify cleanup candidates
      2. Explorer agent tasks to check dependencies for each candidate
      3. Decision criteria for removal (safe if no dependencies) or deferral (has dependencies)
      4. Safety checks: zero usages verified, transitive dependencies traced, test coverage considered
      See cleanup_phase.mmd in inputs for visual reference.

      DECOMMISSIONING OVER DEPRECATION (CRITICAL):
      See modules/AgenticGuidance/assets/guidelines/decommissioning-over-deprecation.yml
      - DEPRECATED.md files indicate INCOMPLETE cleanup, not a permanent state
      - Cleanup phases MUST include tasks to fully remove deprecated components
      - Archive valuable patterns to assets/examples/ BEFORE deletion
      - Do NOT leave deprecated folders in place - they become noise for future agents

      STRUCTURAL PATTERNS:
      Reference plan_example.yml from inputs for:
      - Phase structure and execution groups
      - Task format with inputs, guidance, and success_criteria
      - File-level inputs for context routing

      OUTPUT LOCATION:
      - Create finalization phases in: docs/plans/live/YYMMDDXX_description/live/
      - Use descriptive file names based on phase content (e.g., plan_live_finalization.yml)
      - Move completed items to: docs/plans/live/YYMMDDXX_description/completed/plan_completed.yml

      DUMPING GROUND: Use additional subfolders (e.g., audit-results/, analysis/) to store agent artifacts.
    - |
      LOOP INCLUSION STEP (Before finalizing plan):
      Reference: modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml

      Before finalizing plan, determine required loops:
      - cleaner-dependency-loop for safe removal
        Ensures cleanup operations are verified by Explorer agent before execution.
        Pattern: Cleaner identifies -> Explorer checks deps -> Decision (safe/defer)
      - audit-test-fix-loop (MANDATORY after cleanup)
        Required to validate that cleanup did not break existing functionality.
        Catches reward hacking and validates test quality post-cleanup.

      Include loop_structure section in plan output:
        loop_structure:
          required_loops:
            - type: "cleaner-dependency-loop"
              when: "cleanup tasks identified"
              participants: ["cleaner", "explorer"]
              maximum_iterations: 3
            - type: "audit-test-fix-loop"
              when: "after any cleanup execution"
              mandatory: true
              participants: ["auditor", "test-builder"]
              maximum_iterations: 3
          exit_conditions:
            reference: "loop-inclusion-for-planners.yml#exit_criteria_patterns"
    - |
      Determine folder lifecycle action based on plan completion status.
      See modules/AgenticGuidance/assets/definitions/plans.yml for authoritative patterns:
      - plan_lifecycle: Four stages (planning, active, partially_completed, fully_completed)
      - follow_on_work_pattern: DO/DON'T rules for ongoing work
      - archived_vs_completed: FENCE - agents never touch archived/
    - |
      Report back to the orchestration agent that finalization phases have been added to the live plan folder.

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, iteration.yml, fix-the-source.yml, experiment-first.yml, context-minimisation.yml, worktree-and-branching.yml, response-audit.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, guidance.yml, friction.yml, architecture-pattern.yml)
    # Phase ordering and definitions: See manifest.yml (authoritative source for phase_creation_rules and definitions)
    # Loop inclusion: See modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml (when and how to include loops in plans)
    - |
      REFERENCE STRUCTURE:
      - Use manifest.yml for phase definitions and ordering guidance
      - Use plan_example.yml for structural patterns (execution groups, inputs, guidance, success criteria)
      - Ensure inputs are file-level (not directory-level)
      - Provide detailed guidance for orchestration agent
      - Define measurable success criteria
