process:
  goal: |
    Create cleanup, audit, and documentation phases for finalizing implementation.
    These phases ensure code quality, validate test integrity, and document the final state.
    Handles folder lifecycle transitions (copy to completed/ when appropriate).
    Recognizes follow-on work scenarios (new phases added to existing plans).

    OUTPUT STRUCTURE:
    - Outputs finalization phases to `live/plan_live_audit_clean.yml` within the plan folder
    - Reads from all .yml files in `live/` to understand completed work
    - SYNCS completed items from `live/` files to copies in `completed/` (copy-and-sync)
    - DELETES files from `live/` only when ALL items are completed
    - Updates `completed/plan_completed.yml` with summary entries
    - COPIES entire plan folder to `docs/plans/completed/` when phases complete (folder-level copy)

  loop_definitions:
    reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    description: "Loop types (audit-test-fix-loop, cleaner-voting-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-cleaning/inputs.yml"
      description: "Core planner agent inputs and guidelines"
    - location: "docs/plans/live/YYMMDDRepo_Branch/"
      description: "The live plan folder containing phase .yml files"

  outputs:
    - location: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
      description: "Cleanup, audit, and documentation phases for the live plan"
    - location: "docs/plans/live/YYMMDDRepo_Branch/completed/"
      description: "Completed .yml files moved from live/ (file-level moves)"
    - location: "docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml"
      description: "Summary index of completed items"
    - location: "docs/plans/live/YYMMDDRepo_Branch/analysis/"
      description: "Iteration logs and analysis artifacts"
    - location: "docs/plans/completed/YYMMDDRepo_Branch/"
      description: "Snapshot copy of entire plan folder when phases complete"

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      A planning folder should have been provided.
      Read all .yml files in `live/` to understand completed work.

      FILE LIFECYCLE:
      See modules/AgenticGuidance/assets/definitions/plans.yml for authoritative lifecycle patterns:
      - two_level_completion_pattern: Copy-and-Sync for phase plans
      - scrap_file_taxonomy: Move/delete rules for audit, review, remediation files
      - file_taxonomy: Reserved files and location semantics
    - |
      Review the live plan phases and identify what work has been completed.
      Determine what finalization phases are needed based on the implementation.
    - |
      Add finalization phases to `live/plan_live_audit_clean.yml` following the phase ordering in manifest.yml:
      See manifest.yml phase_creation_rules for authoritative ordering and phase definitions
      (cleanup_phase, audit_phase, user_story_validation_phase, documentation_phase).

      PLAN STRUCTURE REQUIREMENTS:
      Reference the example live plan file from inputs (`live/plan_live_audit_clean.yml`) for:
      - Phase structure and execution groups
      - File-level inputs for context routing
      - Detailed guidance patterns for orchestration agent
      - Measurable success criteria patterns
      - Operation ordering and agent type allocation

      OUTPUT LOCATION:
      - Write finalization phases to: `docs/plans/live/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml`
      - Move completed items to: `docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml`

      DUMPING GROUND: Use additional subfolders (e.g., `audit-results/`, `analysis/`) to store agent artifacts
      like audit reports, cleanup logs, or final documentation drafts to avoid polluting shared spaces.
    - |
      Determine folder lifecycle action based on plan completion status.
      See modules/AgenticGuidance/assets/definitions/plans.yml for authoritative patterns:
      - plan_lifecycle: Four stages (planning, active, partially_completed, fully_completed)
      - follow_on_work_pattern: DO/DON'T rules for ongoing work
      - archived_vs_completed: FENCE - agents never touch archived/
    - |
      Report back to the orchestration agent that finalization phases have been added to plan_live_audit_clean.yml.

  guidelines:
    # Core guidelines: See modules/AgenticGuidance/assets/guidelines/ (less-is-more.yml, iteration.yml, fix-the-source.yml, experiment-first.yml, context-minimisation.yml, worktree-and-branching.yml, response-audit.yml)
    # Core definitions: See modules/AgenticGuidance/assets/definitions/ (plans.yml, guidance.yml, friction.yml, domains.yml, workflows.yml, entrypoints.yml)
    # Phase ordering and definitions: See manifest.yml (authoritative source for phase_creation_rules and definitions)
    - |
      REFERENCE STRUCTURE:
      - Use plan_live_audit_clean.yml as the authoritative example for phase structure
      - Follow the same patterns for execution groups, inputs, guidance, and success criteria
      - Ensure inputs are file-level (not directory-level)
      - Provide detailed guidance for orchestration agent
      - Define measurable success criteria
