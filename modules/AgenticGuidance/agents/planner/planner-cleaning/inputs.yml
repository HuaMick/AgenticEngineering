# Planner-Cleaning Agent Inputs
# Defines the minimal context needed for creating cleanup, audit, and documentation
# phases that finalize implementation work.
#
# PURPOSE:
# Planner-cleaning agents create finalization phases that ensure code quality,
# validate test integrity through User Story validation, and document the final state.
#
# RESPONSIBILITIES:
# - Create Cleanup Phase: Remove obsolete files before final testing
# - Create Audit Phase: Validate test quality and detect reward hacking (audit-test-fix loop)
# - Create User Story Validation Phase: Ensure User Story tests pass (PRIMARY SUCCESS CRITERIA)
# - Create Documentation Phase: Update docs to reflect final state
# - Ensure correct phase ordering (cleanup -> audit -> user story validation -> documentation)

agent_context:
  category: "assets/definitions/agent-categories.yml#planner"
  role: "planner-cleaning"

inputs:
  agent_type: "planner-cleaning"
  version: "2.0-p1"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Cleaning-planning specific inputs
  core_inputs:
    # Cleaning-specific architectural guidance
    - type: file
      path: "agents/planner/planner-cleaning/manifest.yml"
      description: "Phase creation rules and finalization phase structures (Cleanup->Audit->User Story Validation->Documentation ordering, phase-specific structure requirements)"
      required: true

    # User Stories - Primary source of truth for success validation
    # NOTE: Path is workspace-relative. Actual location varies by target workspace.
    # Canonical definition in assets/definitions/user-stories.yml says modules/AgenticGuidance/userstories/<project>/
    - type: directory
      path: "modules/AgenticGuidance/userstories/"
      description: "PRIMARY SOURCE OF TRUTH for success validation. User stories define complete user journeys with expected outcomes. SUCCESS = User Story tests pass. Organized by project (MyAgents/, RemoteAgents/, MyAgentsFrontend/)."
      required: true

    - type: file
      path: "assets/definitions/user-stories.yml"
      description: "User story structure and UAT testing patterns - defines how user stories validate success"
      required: true
    # Example plan for audit/cleanup/documentation phases
    - type: file
      path: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
      description: "Example plan showing cleanup, audit, and documentation phases structure"
      required: true

    # Completed plan structure example
    - type: file
      path: "assets/examples/planner/YYMMDDRepo_Branch/completed/plan_completed.yml"
      description: "Completed plan example showing how completed items should be structured"
      required: true

    # Loop definitions (audit-test-fix-loop, cleaner-voting-loop, etc.)
    - type: file
      path: "assets/definitions/agent-loops.yml"
      description: "Loop type definitions and execution patterns"
      required: true

    # The live plan folder to add finalization phases to
    - type: pattern
      path: "docs/plans/live/YYMMDDRepo_Branch/"
      description: "The live plan folder containing plan_live_teach.yml, plan_live_test.yml, and plan_live_audit_clean.yml. Planner-cleaning outputs to plan_live_audit_clean.yml and moves completed items to plan_completed.yml in the same folder."
      required: true

  # Cleaning-specific guidelines
  guidelines: []

  # Planner-cleaning specific definitions
  # Per context-minimisation.yml: provide only required information, reduce noise
  definitions:
    # Finalization phases: See planner-cleaning/process.yml for phase definitions and ordering
    # Loop definitions: See assets/definitions/agent-loops.yml (audit-test-fix-loop, cleaner-voting-loop)
    # User story validation: See assets/definitions/user-stories.yml
    # Reward hacking patterns: See assets/definitions/reward-hacking.yml

    phase_ordering: |
      Cleanup -> Audit -> User Story Validation -> Documentation
      See plan_live_audit_clean.yml example for structure.
