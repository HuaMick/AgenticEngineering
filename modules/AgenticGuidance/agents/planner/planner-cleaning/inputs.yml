# Planner-Cleaning Agent Inputs
# Defines the minimal context needed for creating cleanup, audit, and documentation
# phases that finalize implementation work.
#
# PURPOSE:
# Planner-cleaning agents create finalization phases that ensure code quality,
# validate test integrity through User Story validation, and document the final state.
#
# RESPONSIBILITIES:
# - Create Cleanup Phase: Remove obsolete files before final testing
# - Create Audit Phase: Validate test quality and detect reward hacking (audit-test-fix loop)
# - Create User Story Validation Phase: Ensure User Story tests pass (PRIMARY SUCCESS CRITERIA)
# - Create Documentation Phase: Update docs to reflect final state
# - Ensure correct phase ordering (cleanup -> audit -> user story validation -> documentation)

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "planner-cleaning"

inputs:
  agent_type: "planner-cleaning"
  version: "2.0"  # MUST match manifest.yml version

  # Reference layers (transitive loading)
  # NOTE: Uses specialized planner-core layers (T4 optimization) to reduce token usage
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions (plans.yml only - excludes architecture-pattern)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines (excludes testing.yml, safety.yml)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Cleaning-planning specific inputs
  core_inputs:
    # Cleaning-specific architectural guidance
    - type: file
      path: "modules/AgenticGuidance/agents/planner/planner-cleaning/manifest.yml"
      description: "Phase creation rules and finalization phase structures (Cleanup->Audit->User Story Validation->Documentation ordering, phase-specific structure requirements)"
      required: true

    # User Stories - See user-stories.yml for authoritative path and structure
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
      description: "User story structure, UAT testing patterns, and authoritative path (modules/AgenticGuidance/userstories/)"
      required: true
    # Example plan for audit/cleanup/documentation phases
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"
      description: "Reference plan showing phase structure patterns (task format, execution groups, success criteria). Use as structural guide, not output template."
      required: true

    # MMD Component Examples
    # Use these when composing orchestration plans with visual flow diagrams
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/components/cleanup_phase.mmd"
      description: "MMD component showing cleanup phase pattern with dependency-aware exploration"
      required: false

    # Loop definitions (audit-test-fix-loop, cleaner-dependency-loop)
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
      description: "Loop type definitions including cleaner-dependency-loop (identify -> check deps -> decide)"
      required: true

    # The live plan folder to add finalization phases to
    - type: pattern
      path: "docs/plans/live/YYMMDDRepo_Branch/"
      description: "The live plan folder. Planner-cleaning creates finalization phases (cleanup, audit, user-story-validation, documentation) with appropriate file naming based on context."
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/plans.yml#scrap_file_taxonomy"
      description: "Lifecycle definitions for transient planning artifacts"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/plan-completion.yml"
      description: "Authoritative patterns for managing phase plan completion (Copy-and-Sync)"
      required: true

  # Cleaning-specific guidelines
  guidelines: []

  # Planner-cleaning specific definitions
  # Per context-minimisation.yml: provide only required information, reduce noise
  definitions:
    # Phase ordering: See manifest.yml phase_creation_rules (authoritative source)
    # Loop definitions: See modules/AgenticGuidance/assets/definitions/agent-loops.yml
    #   - audit-test-fix-loop: Validate test quality after cleanup
    #   - cleaner-dependency-loop: Explorer-verified cleanup (replaces deprecated voting loop)
    # User story validation: See modules/AgenticGuidance/assets/definitions/user-stories.yml
    # Reward hacking patterns: See modules/AgenticGuidance/assets/definitions/reward-hacking.yml
