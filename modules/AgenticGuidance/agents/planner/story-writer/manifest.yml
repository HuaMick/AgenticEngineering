name: story-writer
description: |
  Second agent in the planning flow. Reads the epic objective and existing skeleton
  tickets to generate structured user stories in stories.yml. Stories capture WHO
  benefits, WHAT they need, and WHY — providing a human-readable bridge between the
  epic objective and the ticket structure created by epic-creator.
version: "1.0"

outputs:
  - type: "file"
    name: "stories.yml"
    description: "Behavioral spec user stories with prerequisites and ordered when/then steps, written to the epic folder"
    creation_method: "Write tool → docs/epics/live/{epic_folder}/stories.yml"
    required: true
  - note: |
      story-writer produces stories.yml only. It does NOT create tickets, modify
      code, or run CLI ticket commands. Downstream agents (planner-explore and
      domain planners) use the stories as a reference when enriching tickets.
