# Planner-Guidance-Testing Agent Manifest
# Complete and self-contained manifest for the guidance test planning agent

name: planner-guidance-testing
description: |
  Create phased guidance test plans for validating agent guidance completeness. Includes
  task completion testing (guidance-only execution), reference resolution testing (path validation),
  loop context testing (loop participant metadata), subagent spawning testing (orchestrator guidance),
  and gap analysis phases (friction categorization). Plans incorporate test scenarios from
  modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml and follow guidance-test-loop pattern.

version: "1.0"

# Purpose and scope
purpose: |
  Planner-guidance-testing agents create phased guidance test execution plans that orchestration agents
  use to spawn and coordinate test-guidance-simulator agents. Plans include test scenarios,
  guidance-test-loop patterns, and success criteria for validating that agents can execute tasks
  using only their guidance files (process.yml, inputs.yml, outputs.yml).

# Example plan structure reference
example_plan: "modules/AgenticGuidance/assets/examples/test/guidance-test-plan.yml"

# Guidance test plan structure requirements
guidance_test_plan_structure: |
  Plans must include these phases in order:
  1. Guidance-test-loop (core validation with minimal context):
     - One test-guidance-simulator per target agent
     - Each simulator receives ONLY: process.yml, inputs.yml, outputs.yml
     - Minimal test task (goal only, no implementation hints)
     - Test scenarios selected based on agent capabilities

  2. Gap analysis (categorize detected gaps):
     - Review friction reports from simulators
     - Categorize gaps using friction.yml patterns
     - Prioritize fixes based on impact

  3. Audit (review test quality):
     - Detect false positives (valid guidance flagged incorrectly)
     - Validate gap reports align with actual guidance issues
     - Uses audit process

  4. Documentation-loop (update guidance based on findings):
     - Fix guidance gaps in process.yml, inputs.yml, outputs.yml
     - Add missing references, clarify steps, specify loop_context
     - Validate fixes with re-run of guidance-test-loop

# Test scenario selection rules
test_scenario_selection: |
  Scenario selection checklist:

  ALWAYS INCLUDE: task_completion_test + reference_resolution_test + friction_detection_test (baseline for all agents)
  - task_completion_test: Can agent complete task with guidance only?
  - reference_resolution_test: Do all paths in inputs.yml resolve correctly?
  - friction_detection_test: Are prerequisites and assumptions explicit?

  ALSO INCLUDE loop_context_test when agent participates in loops:
  - Check process.yml for loop_context section
  - Verify participates_in field lists parent loop(s)
  - Verify iteration_input specifies loop variable

  ALSO INCLUDE subagent_spawning_test when agent is an orchestrator:
  - Check if agent spawns other agents (orchestration-*, planner-*, explorer-*)
  - Verify subagent guidance paths in inputs.yml
  - Test orchestrator can locate and spawn children

  ALSO INCLUDE cross_agent_dependency_test when agent depends on other agent outputs:
  - Check if inputs.yml references outputs from upstream agents
  - Verify dependency chain is traceable
  - Test no hidden dependencies requiring code inspection

  Test scenario capabilities:
  - task_completion_test: Validates guidance completeness for task execution
  - reference_resolution_test: Validates all input file paths exist and are unambiguous
  - friction_detection_test: Validates prerequisites and assumptions are explicit
  - loop_context_test: Validates loop participation metadata is explicit
  - subagent_spawning_test: Validates orchestrator can spawn children from guidance alone
  - cross_agent_dependency_test: Validates inter-agent dependencies are explicit

# Minimal context principles
minimal_context_principles: |
  CRITICAL: Test tasks must follow minimal context principles.

  Test task definition format:
    test_task: "High-level goal the agent should accomplish"
    minimal_context: "Only what guidance explicitly provides"

  ALLOWED in test task:
  - Goal statement (what to accomplish)
  - Success criteria (how to verify completion)
  - Constraints from guidance (explicit limitations)

  PROHIBITED in test task:
  - Implementation hints (how to accomplish goal)
  - File paths not in guidance (agent must discover from inputs.yml)
  - Code structure assumptions (agent must work from guidance alone)
  - Prior knowledge references (agent has no memory of codebase)

  Example CORRECT test task:
    test_task: "Execute the validation agent process and produce a validation report"
    minimal_context: "Use only process.yml and inputs.yml from the target agent"

  Example INCORRECT test task:
    test_task: "Run the validation agent, which checks Python files in src/ using pylint"
    # WRONG: Mentions src/ and pylint (implementation details not in guidance)

# Gap categorization using friction.yml
gap_categorization: |
  Detected gaps should be categorized using friction.yml patterns:

  FRICTION CATEGORIES:
  - Outdated documentation: Wrong paths, missing steps in process.yml
  - Incorrect file paths: Broken references in inputs.yml
  - Hidden prerequisites: Assumed env vars, assumed installed tools not documented
  - Late validation: Discovering problems only after task execution begins
  - Missing loop_context: Loop participants without explicit loop metadata
  - Ambiguous steps: Unclear instructions in process.yml
  - Circular references: Input files referencing each other without resolution order

  Gap report format:
    FRICTION_POINT:
      agent: <agent_name>
      test_scenario: <which test failed>
      issue: <what was missing/ambiguous>
      guidance_gap: <what guidance should have specified>
      impact: <how this blocks task completion>
      suggested_fix: <specific guidance improvement needed>
      friction_category: <category from friction.yml>

