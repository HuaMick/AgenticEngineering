# Planner-Test Agent Inputs
# Defines the files, directories, and context that planner-test agents need
# to create test execution plans (test-fix-loop, audit-test-fix-loop).
#
# PURPOSE:
# Planner-test agents create phased test execution plans that orchestration
# agents use to spawn and coordinate test agents. Plans include test strategies,
# test-fix-loop patterns, audit patterns, and success criteria for testing.
#
# CONTEXT MINIMIZATION:
# This agent ONLY receives inputs needed for test planning. It does NOT need:
# - Build planning patterns (cleaner-dependency-loop, overengineering)
# - Documentation planning patterns (documentation-loop)
# - General architecture docs
# - Existing non-test plans
#
# RESPONSIBILITIES:
# - Create test execution plans with test-fix-loop or audit-test-fix-loop patterns
# - Define test strategies (smoke-test, agent-blind-test, audit, service-test)
# - Specify test success criteria and validation requirements
# - Route test inputs (user stories, test processes, code to test)
# - Ensure plans align with testing guidelines and patterns

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs MUST be provided by the parent orchestrator or user.
# Without these, the agent cannot create a valid test plan.
# ==============================================
required_inputs:
  - name: "planning_folder"
    type: "string"
    description: "Absolute path to planning folder containing build phase plans to test"
    required: true
    example: "/home/code/MyProject/docs/plans/live/260106MyProject_feature_auth"

  - name: "build_phases"
    type: "list"
    description: "List of build phase plan files to create tests for (in live/ subfolder)"
    required: true
    example: ["plan_live_build.yml"]

inputs:
  # Reference layers (transitive loading)
  # NOTE: Uses specialized planner-core layers (T4 optimization) to reduce token usage
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions (plans.yml only - excludes architecture-pattern)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines (excludes testing.yml, safety.yml)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/test-shared.yml"
      description: "Test category shared inputs (reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

  # Test-planning specific inputs
  core_inputs:
    # Test-specific architectural guidance
    - type: file
      path: "modules/AgenticGuidance/agents/planner/planner-test/manifest.yml"
      description: "Test plan structure requirements and layer selection rules (Environment Setup, test-fix-loop patterns, testing layers decision tree, mandatory US-INSTALL-* stories, process mapping)"
      required: true

    # User Stories - See user-stories.yml for authoritative path and structure
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/user-stories.yml"
      description: "User story structure, UAT testing patterns, and authoritative path (modules/AgenticGuidance/userstories/)"
      required: true
    # Testing definitions and patterns
    # NOTE: Loop definitions (test-fix-loop, audit-test-fix-loop) are now defined
    # directly in planner-test/process.yml, not in separate definition files

    # Test execution processes and workflows
    - type: file
      path: "modules/AgenticGuidance/agents/test/test-runner/process.yml"
      description: "Test runner process definition for executing component tests"
      required: true

    - type: file
      path: "modules/AgenticGuidance/agents/test/test-audit/process.yml"
      description: "Audit process for reviewing test quality and detecting reward hacking"
      required: true

    # Test strategies - strategy-validation.yml is the index that references all strategy files
    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/strategy-validation.yml"
      description: "Validation strategy index - references all strategy files (user-simulation, test-suite, fresh-environment, multi-layer, user-acceptance)"
      required: true

    # Example test plan structure
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
      description: "Unified plan example showing how to structure test phases with test-fix-loop patterns and success criteria in a single plan file."
      required: true

    # MMD Component Examples (optional)
    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/test_phase.mmd"
      description: "MMD component showing test phase pattern with test-fix-loop integration"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/uat_phase.mmd"
      description: "MMD component showing UAT phase pattern (MANDATORY) with flexible strategy selection"
      required: false
