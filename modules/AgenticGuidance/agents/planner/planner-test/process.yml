process:
  goal: |
    Create a phased test plan for validating the implementation using test-fix-loop
    and audit-test-fix-loop patterns with user story validation. Handles all test
    plan types including code testing, guidance walkthrough validation, and UAT planning.

  loop_context:
    participates_in: ['test-fix-loop', 'audit-test-fix-loop']
    note: "planner-test participates in these loops but does NOT select loop strategy"
    # Loop strategy selection is owned by orchestration-planning.
    # See orchestration-planning/inputs.yml#loop_selection_guidance

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-test/inputs.yml"
      description: "Core planner agent inputs and guidelines"

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "TinyDB test tickets"
      description: "Test phases stored in TinyDB with test-fix-loop and audit-test-fix-loop patterns"
      creation_method: |
        Use CLI: agentic epic phase add / agentic epic ticket add
        Do NOT create TinyDB files on disk.
      schema_reference: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/ticket_example.yml"
      note: "planning_folder is absolute path provided by orchestration (used in path_template)"

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get epic status/context
      agentic epic status --epic <epic_folder>

      # Get current ticket if working from an epic
      agentic epic ticket current -j
      ```

      CLI output provides:
      - Your objective and process summary
      - Input file paths to read
      - Current task details (if plan exists)

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
      DO NOT explore the codebase before running these commands.

    - |
      VALIDATE REQUIRED INPUTS (from inputs.yml required_inputs):
      The following inputs MUST be provided by the orchestrator or user:

      1. planning_folder (string, required)
         - Absolute path to planning folder containing build phase plans to test
         - ERROR if missing: "STOP: No planning_folder provided. Cannot create test plan without knowing what to test."

      2. build_phases (list, required)
         - List of build phase plan files to create tests for
         - ERROR if missing: "STOP: No build_phases provided. Cannot determine test targets."

      If ANY required input is missing, report the specific error and STOP.
      If an input is found in a different location, update the path and flag the discrepancy.
    - |
      FENCE: EPIC FOLDER MUST EXIST BEFORE PLANNING
      The epic folder MUST already exist at the provided planning_folder path.

      VALIDATION STEP:
      Before proceeding, verify the epic folder exists:
      1. Check if the provided planning_folder path exists on disk
      2. If the folder does NOT exist, STOP immediately with this message:

         "FENCE VIOLATION: Epic folder not found at {planning_folder}

          The epic folder must be created via CLI before planning can begin.

          REQUIRED ACTION:
          Run: agentic epic new <branch> --description <description>

          The CLI creates the epic folder structure.
          Do NOT create the epic folder directly with the Write tool.

          After running the CLI command, retry the planning operation."

      3. If the folder exists, proceed with test planning
    - |
      FENCE: STORY LIFECYCLE FILTER
      Only include stories with lifecycle "under-construction" or "implemented" in test
      plan scope. Stories with lifecycle "proposal", "deprecated", or "archived" MUST be
      excluded from test planning. Use `agentic stories status <story_id>` to check lifecycle.

      FENCE: STORY CONTENT MUST EXIST
      The test planner MUST validate that story content exists before creating UAT tasks.

      VALIDATION STEP:
      1. Read affected_stories from plan metadata (from build plan)
      2. For each story ID, check if story file exists:
         - Story location: docs/userstories/<project>/NN_<category>.yml
         - CLI helper: agentic stories cat <story_id>
      3. If story files missing, STOP with this error:

         "FENCE VIOLATION: Story content missing for UAT planning

         The following stories are referenced but have no content:
         - <story_id_1>
         - <story_id_2>

         REQUIRED ACTION:
         Stories must be generated before test planning. The build plan should
         include story_creation_tasks. Verify those tasks completed, or ask
         orchestration to spawn build-story-writer agent.

         After story files exist, retry test planning."

      4. If stories exist, read their content to extract acceptance criteria

      STORY CONTENT VALIDATION:
      Each story MUST have:
      - success_criteria field (list of measurable acceptance criteria)
      - journey field (step-by-step user actions)
      - testing field (local and docker test instructions)

      If any story lacks these fields, STOP with:
      "FENCE VIOLATION: Story <id> has incomplete content (missing <field>)"
    - |
      EPIC FOLDER STRUCTURE:
      See modules/AgenticGuidance/assets/definitions/epics.yml for folder structure and lifecycle.
      - Load all tickets from TinyDB to understand what was built (your test targets):
        `agentic -j epic ticket list --epic {epic_folder_name}`
      - Create your test phases in TinyDB via CLI: `agentic epic phase add` and `agentic epic ticket add`
      - Output ONLY to TinyDB (do not modify other phase tickets, do not create ticket_*.yml on disk)
    - |
      Create test plan phases following the patterns defined in inputs.yml.
      Reference user story integration guidelines from inputs.yml for:
      - User story selection criteria
      - Installation user story requirements (US-INSTALL-*)
      - Testing layer selection (Local, Docker, Cloud Build) - see manifest.yml for recommendations
      - Environment setup prerequisites
      - User story validation patterns (user-story-validation-loop)
      - Validation strategy options (strategy-validation.yml) - PLANNER CHOICE based on context
      - UAT phase planning (MANDATORY for build plans) - see UAT_PHASE_PLANNING section below

      STORY-TEST LINK REQUIREMENT:
      Each test ticket MUST include `story_ids` from the user stories being validated.
      Add story_ids when creating tickets:
        `agentic epic ticket add <id> --epic <folder> --name "..." --story-ids "US-CLI-110,US-CLI-111"`
      Acceptance criterion for each test ticket:
        "All story_ids have matching @pytest.mark.story markers in test files"

      PLAN STRUCTURE REQUIREMENTS:
      Reference the unified plan example (plan_example.yml) for:
      - Test phase structure with test-fix-loop and audit-test-fix-loop patterns
      - File-level inputs for context routing
      - Detailed guidance and measurable success criteria patterns
      - Operation ordering and agent type allocation
      - Component testing and user flow testing integration

      INPUT SOURCE (what you're testing):
      - Load build tickets from TinyDB: `agentic -j epic ticket list --epic {epic_folder_name}`
      - Review phase descriptions and ticket target_files to understand what components were built
      - Use this to determine what needs to be tested and which files to include in test inputs

      OUTPUT TARGET (where you write):
      - Create test phases in TinyDB: `agentic epic phase add` and `agentic epic ticket add`
      - Do NOT create ticket_test.yml or plan_test.yml files on disk
      - Test phases belong in TinyDB alongside build phases, not in separate files

      DUMPING GROUND: Use additional subfolders (e.g., `analysis/`, `test-results/`) to store agent artifacts
      like test logs, coverage reports, or analysis files to avoid polluting shared spaces.
    - |
      IMPACTED FILES AND ARTIFACTS ANALYSIS (Recommended for orchestration visibility):
      Reference: modules/AgenticGuidance/assets/specifications/plan-schema.yml

      For test plans, document file impacts to enable:
      - Clear visibility of test file locations
      - Conflict detection with other concurrent plans
      - Progress tracking during execution

      IMPACTED_FILES SECTION (for test plans):
      ```yaml
      impacted_files:
        - path: "tests/unit/test_feature.py"
          change_type: create
          change_category: test
          reason: "Unit tests for new feature"
        - path: "tests/integration/test_e2e_workflow.py"
          change_type: create
          change_category: test
          reason: "End-to-end integration tests"
        - path: "tests/conftest.py"
          change_type: modify
          change_category: test
          reason: "Add shared fixtures for new tests"
      ```

      IMPACTED_ARTIFACTS SECTION (for semantic impacts):
      ```yaml
      impacted_artifacts:
        - artifact_type: service
          artifact_identifier: "FeatureService"
          impact_type: behavior_change
          description: "Validated by new unit tests"
        - artifact_type: api
          artifact_identifier: "POST /api/feature"
          impact_type: behavior_change
          description: "Covered by integration tests"
      ```

      TEST-SPECIFIC NOTES:
      - change_category: test (for all test files)
      - Include config changes (conftest.py, pytest.ini) if modified
      - Document which artifacts/services the tests validate

    - |
      The plan should include phases in the order defined in manifest.yml test_plan_structure.
      See manifest.yml for authoritative phase ordering, testing_layers decision tree,
      and mandatory_user_stories requirements.
    - |
      LOOP INCLUSION STEP (Before finalizing plan):
      Reference: modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml

      Before finalizing plan, determine required loops:
        - test-fix-loop: For test execution phases where tests may fail and require fixes
        - audit-test-fix-loop: MANDATORY - Must be included after any test creation/modification
          to catch reward hacking and validate test quality
        - user-story-validation-loop: For UAT phases to iterate until user stories pass
        - story-coverage-loop: For post-test phases to verify @pytest.mark.story marker
          coverage against affected_stories. Re-runs test-builder with uncovered story IDs
          until all affected stories have corresponding markers in test files.
          Triggers STORY_COVERAGE_INCOMPLETE feedback in orchestration-executor.

      Include loop_structure section in plan output:
        - Each phase with iterative work must specify its loop type
        - Include maximum_iterations (standard: 5 for test-fix, 3 for audit, 3 for story-coverage)
        - Define explicit exit_conditions (PASS criteria and max_iterations action)
        - Specify participant agents and their roles

      Example loop_structure in phase:
        loop:
          type: "test-fix-loop"
          maximum_iterations: 5
          exit_conditions:
            success:
              condition: "PASS"
              criteria: "All tests pass"
            max_iterations:
              action: "escalate"
              reason: "Test failures persist"

      Example story-coverage-loop in UAT phase:
        loop:
          type: "story-coverage-loop"
          maximum_iterations: 3
          trigger: "STORY_COVERAGE_INCOMPLETE"
          exit_conditions:
            success:
              condition: "COVERAGE_COMPLETE"
              criteria: "All affected stories have @pytest.mark.story markers in test files"
            max_iterations:
              action: "escalate"
              reason: "Story coverage incomplete after max iterations"
          participants:
            - agent: "test-builder"
              role: "Create/update tests with @pytest.mark.story markers for uncovered stories"
          context_provided:
            - uncovered_story_ids: "List of story IDs without pytest markers"
            - story_content: "Acceptance criteria for uncovered stories"
    - |
      TEST EXPECTATION QUESTION GUIDANCE (HITL Question Workflow):
      Reference: modules/AgenticGuidance/assets/guidelines/question-workflow.yml

      During test planning, generate questions when test expected behavior is ambiguous
      or acceptance criteria are unclear. This prevents test creation based on assumptions
      and ensures tests validate correct behavior.

      WHEN TO GENERATE QUESTIONS FOR TEST PLANNING:
      - Expected behavior not specified in requirements
      - Edge case handling unclear (e.g., which HTTP status code for validation errors?)
      - Multiple valid interpretations of acceptance criteria
      - Test coverage scope ambiguous (which scenarios are in/out of scope?)
      - Performance/timeout expectations not documented

      EXAMPLE SCENARIOS REQUIRING QUESTIONS:
      1. API Error Handling:
         Question: "Should invalid input return 400 Bad Request or 422 Unprocessable Entity?"
         Context: REST best practices suggest 422 for validation, but implementation uses 400
         Severity: medium (can document assumption and proceed)

      2. Edge Case Behavior:
         Question: "How should the system handle duplicate submissions within 1 second?"
         Context: Spec doesn't address this edge case, could be reject or deduplicate
         Severity: high (affects test expectations and may require code changes)

      3. Coverage Scope:
         Question: "Should UAT include multi-tenant scenarios or focus on single-tenant flows?"
         Context: Architecture supports multi-tenancy but user stories don't mention it
         Severity: medium (affects test suite size and complexity)

      QUESTION FORMAT IN TEST PLAN:
      Add to open_questions section:
      ```yaml
      open_questions:
        - id: "test-q-001"
          question: "Should invalid input return 400 or 422 status code?"
          severity: "medium"
          status: "pending"
          context: |
            Task: Create API error handling tests
            Scenario: POST /users with invalid email format
            Current: Implementation returns 400
            Uncertainty: REST conventions suggest 422 for validation errors
            Impact: Test expectations and API contract documentation
          created_at: "2026-02-03T15:20:00"
          asked_by: "planner-test"
      ```

      SEVERITY GUIDANCE FOR TEST QUESTIONS:
      - blocking: Cannot write tests without answer (fundamental behavior unknown)
      - high: Can write tests but may need to rewrite after clarification
      - medium: Can document assumption and proceed with tentative tests
      - low: Cosmetic or preference question (test wording, organization)

      DO NOT ASK QUESTIONS ABOUT:
      - Test structure patterns (follow existing test patterns in codebase)
      - Assertion syntax or framework usage (refer to test-creation-principles.yml)
      - Test file organization (follow project conventions)
      - Mock/fixture naming (make reasonable decisions)

      ASSUMPTION DOCUMENTATION:
      When proceeding with medium/low severity questions:
      - Document assumption in test docstrings
      - Add TODO comment referencing the question ID
      - Note in test plan that tests may need updates after clarification

      Example:
      ```python
      def test_invalid_email_returns_validation_error():
          """Test that invalid email format returns validation error.

          ASSUMPTION: Using 422 status per REST conventions (question test-q-001).
          May need update if different status code is preferred.
          """
      ```

    - |
      Provide the test plan back to the main orchestration agent for execution.

  uat_phase_planning:
    mandatory: false
    note: |
      UAT is NO LONGER a phase in the build loop (2026-04-11). Do not
      create a "UAT" phase or "uat_*" tickets in any build plan. Instead,
      ensure every user story attached to this plan has a complete
      `uat_plan` block — the standalone `agentic orchestrate session uat`
      workflow will spawn test-uat per story and read the uat_plan block
      directly from the story YAML.
    planner_requirement: |
      For every affected story, VERIFY the story has a complete uat_plan
      block with these fields (see story-schema.yml#uat_plan for the
      canonical definition):
        - persona (should be agent-blind-test for most flows)
        - starting_state
        - journey (steps with action/observe pairs)
        - success_signals
        - cleanup (optional but recommended)
      If a story is missing its uat_plan, raise it as a plan blocker so
      story-writer or planner-explore can populate it BEFORE execution.
      The plan is free to proceed without a UAT phase — UAT is run
      on-demand after the main build loop completes.

  uat_task_generation:
    description: |
      Do not generate UAT tasks inside build-plan phases anymore. The
      `agentic orchestrate session uat --epic <folder>` workflow iterates
      the epic's stories at UAT time and spawns `test-uat` for each.
      Build/test phases remain responsible for writing `@pytest.mark.story`
      markers so `last_pass_commit` can be auto-recorded by the executor
      hook.

    mapping_rules:
      - "Each story attached to the plan must carry a complete uat_plan block"
      - "Build plans do NOT include a UAT phase"
      - "Test tickets carry story_ids via --story-ids so the executor hook can record last_pass_commit"

  # ========================================
  # FENCE: REAL CLI SMOKE TEST REQUIREMENT
  # ========================================
  real_cli_smoke_test_requirement:
    fence: |
      FENCE: UAT for CLI commands MUST run the actual installed CLI, not mocks.

      CLI command UAT MUST execute the real binary to catch integration issues.
      Subprocess mocking passes UAT even when the actual command is broken.

      HISTORICAL CONTEXT:
      Three plans (260214PF, 260214TG, 260214US) passed UAT with mocked tests
      but the actual command failed on execution. Mocked subprocess calls do
      NOT validate that the CLI command actually works.

      DETECTION CRITERIA:
      If plan modifies files in modules/AgenticCLI/src/agenticcli/commands/ OR
      plan adds new CLI commands OR plan objective mentions "agentic <command>",
      then UAT MUST run the real CLI.

    rationale: |
      CLI smoke tests exist to verify that the command actually works as users
      will invoke it. Mocking subprocess calls defeats this purpose entirely.
      The smoke test must prove that `agentic <command>` can be executed
      successfully by a user or automation script.

    requirements:
      - "UAT tasks for CLI commands MUST execute the installed binary"
      - "Use --no-tmux flag for non-interactive testing in automation"
      - "Verify actual command output, not mocked return values"
      - "Test error paths with real commands, not mocked exceptions"

    wrong_examples:
      - description: "Mocked subprocess (WRONG)"
        example: |
          # WRONG: This passes UAT even if the command is broken
          def test_orchestrate_planning_mode(monkeypatch):
              mock_run = Mock(return_value=Mock(returncode=0))
              monkeypatch.setattr('subprocess.run', mock_run)
              result = subprocess.run(['agentic', 'orchestrate', '--mode', 'planning'])
              assert result.returncode == 0

      - description: "--help only validation (WRONG)"
        example: |
          # WRONG: --help works even if actual command logic is broken
          def test_orchestrate_command_exists():
              result = subprocess.run(['agentic', 'orchestrate', '--help'], capture_output=True)
              assert result.returncode == 0
              assert 'orchestrate' in result.stdout.decode()

    right_examples:
      - description: "Run actual CLI command (RIGHT)"
        example: |
          # RIGHT: This runs the actual installed CLI binary
          def test_orchestrate_planning_mode_smoke():
              result = subprocess.run(
                  ['agentic', 'orchestrate', '--mode', 'planning', '--no-tmux'],
                  capture_output=True,
                  text=True
              )
              assert result.returncode == 0, f"Command failed: {result.stderr}"
              # Verify actual behavior, not mocked behavior
              assert 'Planning mode initialized' in result.stdout

      - description: "Run CLI with error path (RIGHT)"
        example: |
          # RIGHT: Verify error handling with real command
          def test_orchestrate_invalid_mode():
              result = subprocess.run(
                  ['agentic', 'orchestrate', '--mode', 'invalid'],
                  capture_output=True,
                  text=True
              )
              assert result.returncode != 0
              assert 'invalid choice' in result.stderr.lower()

    acceptable_mocking:
      description: |
        Mocking is ONLY acceptable for:
        - External service calls (APIs, databases, cloud services)
        - Time-consuming operations (long-running builds, deploys)
        - Destructive operations (file deletion, database drops)

        Mocking is NOT acceptable for:
        - CLI command entry points (must use real binary)
        - Argument parsing (must test actual argparse behavior)
        - Command routing (must verify real command dispatch)
