# Planner-Test Agent Manifest
# Complete and self-contained manifest for the test planning agent

name: planner-test
description: |
  Create phased test plans for validating implementations. Includes component testing (smoke-test),
  user flow testing (agent-blind-test with user stories), cleanup phases, test-audit-fix loops
  (MANDATORY), test suite phases (OPTIONAL, only if requested), documentation validation, and
  UAT phase planning (MANDATORY - PRIMARY SUCCESS CRITERIA). Plans incorporate user stories
  from docs/userstories/<project>/ into test-fix-loop phases and include environment setup tasks.

# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"

# Purpose and scope
purpose: |
  Planner-test agents create phased test execution plans that orchestration agents use to spawn
  and coordinate test agents. Plans include test strategies, test-fix-loop patterns, audit patterns,
  and success criteria for testing.

# Example plan structure reference
example_plan: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/live/plan_example.yml"

# Test plan structure requirements
test_plan_structure: |
  Plans must include these phases in order:
  1. Environment Setup (MANDATORY before UAT testing):
     - Local: Install latest version (`uv pip install -e .`) before UAT local testing
     - Verify: `uv pip show myagents` (version matches source)
     - Verify: CLI accessible via `myagents --version`
     - Docker: Build shared image `myagents-test` using `Dockerfile.test`
     - Ensures UAT tests latest code, not stale installed version

  2. Test-fix-loop (incorporates BOTH component AND user flow testing):
     - Component tests: smoke-test process (entry point testing strategy)
     - User flow tests: agent-blind-test strategy
     - One agent per user story FILE (tests all stories in file)
     - Each agent tests specified layers (typically local + docker, sometimes cloud_build)

  3. Cleanup (after initial implementation success)

  4. Test-audit-fix loop (MANDATORY, not optional):
     - Reviews skipped tests and validates skip justifications
     - Catches issues like hardcoded paths, missing setup, reward hacking
     - Uses audit process

  5. Test suite (OPTIONAL, only if requested):
     - Uses end2end testing
     - Skip unless user explicitly requests test suite execution

  6. UAT Validation (MANDATORY - PRIMARY SUCCESS CRITERIA):
     - Uses user-story-validation-loop
     - Validates complete user journeys
     - Spawns test-user-simulator or equivalent
     - See process.yml#uat_phase_planning for strategy options

  7. Documentation-loop (at very end)

# Testing layers decision tree (RECOMMENDATIONS, not mandatory)
# See also: modules/AgenticGuidance/assets/guidelines/strategy-validation.yml for full strategy options
testing_layers: |
  Layer selection guidance (PLANNER CHOICE - select based on context):

  RECOMMENDED BASELINE: Local + Docker (good default for most test plans)
  - Local: Validates developer workflow (installed CLI)
  - Docker: Validates CI/CD parity (shared pre-built image)

  CONSIDER Cloud Build when changes touch:
  - pyproject.toml (dependencies, packaging)
  - Dockerfile.test or docker-compose.test.yml
  - cloudbuild.yaml or cloudbuild-pr.yaml
  - pytest.ini or test configuration
  - scripts/install-global.sh or installation scripts
  - CI/CD infrastructure (test directory structure)
  - Any changes affecting workspace restructuring

  Layer capabilities:
  - Local: Catches Python logic errors, API issues, local config problems
  - Docker: Catches Dockerfile issues, container runtime, dependency packaging
  - Cloud Build: Catches workspace restructuring, CI/CD integration failures

  VALIDATION STRATEGY OPTIONS:
  Planners may choose from: 3-layer, single-layer, integration-only, uat-only, full-coverage
  See strategy-validation.yml for detailed guidance on when to use each strategy.

# Mandatory user stories
mandatory_user_stories: |
  US-INSTALL-* user stories MANDATORY when changes touch:
  - pyproject.toml (dependencies, entry points, packaging)
  - CLI entry points (frontend/cli/*)
  - scripts/install-global.sh or installation scripts
  - README.md or SETUP.md installation sections
  - [tool.uv.sources] configuration
  - Any packaging-related changes

  Justification: Installation issues bypass normal testing because tests assume
  cli_installed: true. US-INSTALL-* stories catch installation bugs that would
  otherwise reach users (broken shebangs, editable install issues, local path
  dependencies blocking pip/pipx install, missing docs, CLI inaccessibility).

# Test process mapping
# Maps test strategies to their process definition files.
# Only includes agents that have been migrated to AgenticGuidance.
test_process_mapping: |
  Strategy to process mapping:
  - smoke-test: modules/AgenticGuidance/agents/test/test-runner/process.yml
  - agent-blind-test: modules/AgenticGuidance/agents/test/test-user-simulator/process.yml  # MIGRATED 2026-01-09
  - test-suite: modules/AgenticGuidance/assets/guidelines/strategy-test-suite.yml
  - service-test: modules/AgenticGuidance/agents/test/test-service/process.yml  # MIGRATED 2026-01-09
  - test-build: modules/AgenticGuidance/agents/test/test-builder/process.yml  # MIGRATED 2026-01-09
  - audit: modules/AgenticGuidance/agents/test/test-audit/process.yml
  - cicd-maintenance: modules/AgenticGuidance/agents/deploy/deploy-cicd/process.yml
  - uat-simulator: modules/AgenticGuidance/agents/test/test-user-simulator/process.yml  # UAT validation
