name: planner-guidance
description: "Create guidance-focused plans to improve agent paths, fences, and signposts."
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"

# Process and inputs files
files:
  process: "process.yml"
  inputs: "inputs.yml"

# Key changes in v2.0:
# - TinyDB-based output (tickets stored in TinyDB via CLI, not on-disk YAML files)
# - Optimized layer loading (removed test-shared, cleaner-shared, deploy-shared)
# - Simplified fragment reference syntax (category: "planner" instead of #anchor)
# - Clear escalation for missing planning folder (use CLI: agentic agent epic init)

outputs:
  - type: "tinydb_tickets"
    name: "TinyDB teach phase tickets"
    description: "Teaching phase tickets stored in TinyDB with phases, tasks, and success criteria"
    creation_method: "agentic epic phase add / agentic epic ticket add"
    required: true
  - type: "tinydb_tickets"
    name: "TinyDB audit/cleanup phase tickets"
    description: "Audit and cleanup phase tickets stored in TinyDB (if needed)"
    creation_method: "agentic epic phase add / agentic epic ticket add"
    required: false
  - type: "markdown"
    name: "friction-analysis.md"
    description: "Friction analysis document identifying guidance issues (written to disk as a reference artifact)"
    location: "docs/epics/live/{epic_folder_name}/analysis/"
    required: true
  - note: |
      TinyDB phase records with agent routing are created by planner-orchestration, NOT planner-guidance.
      The handover model is: planner-guidance (TinyDB tickets) -> planner-orchestration (phase records) -> Reviewer
