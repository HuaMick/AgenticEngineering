name: planner-guidance
description: "Create guidance-focused plans to improve agent paths, fences, and signposts."
# Version scheme: X.Y where X = architecture version, Y = iteration
# 2.0 = reference layer architecture (inputs.yml uses transitive loading)
version: "2.0"

# Process and inputs files
files:
  process: "process.yml"
  inputs: "inputs.yml"

# Key changes in v2.0:
# - Multi-file output structure (ticket_teach.yml, ticket_audit_clean.yml)
# - Optimized layer loading (removed test-shared, cleaner-shared, deploy-shared)
# - Simplified fragment reference syntax (category: "planner" instead of #anchor)
# - Clear escalation for missing planning folder (use CLI: agentic agent epic init)

outputs:
  - type: "plan_yaml"
    name: "ticket_teach.yml"
    description: "Teaching ticket YAML with phases, tasks, and success criteria"
    location: "docs/epics/live/{epic_folder_name}/"
    required: true
  - type: "plan_yaml"
    name: "ticket_audit_clean.yml"
    description: "Audit and cleanup phase ticket (if needed)"
    location: "docs/epics/live/{epic_folder_name}/"
    required: false
  - type: "markdown"
    name: "friction-analysis.md"
    description: "Friction analysis document identifying guidance issues"
    location: "docs/epics/live/{epic_folder_name}/analysis/"
    required: true
  - type: "orchestration_mmd"
    name: "orchestration_{plan_name}.mmd"
    description: "Mermaid flowchart for dynamic orchestration execution"
    location: "docs/epics/live/{epic_folder_name}/"
    required: true
    schema_reference: "modules/AgenticGuidance/assets/specifications/plan-mmd-schema.yml"
