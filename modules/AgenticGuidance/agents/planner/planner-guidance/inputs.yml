# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the REPOSITORY ROOT
# (e.g., modules/AgenticGuidance/assets/), NOT the target project root.
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs MUST be provided by the parent orchestrator or user.
# Without these, the agent cannot create a valid guidance improvement plan.
# ==============================================
required_inputs:
  - name: "friction_source"
    type: "string"
    description: "Path to friction report, agent logs, or audit results to analyze"
    required: true
    example: "docs/plans/live/260106_plan/audit/friction_report.yml"

  - name: "target_agent"
    type: "string"
    description: "Agent name whose guidance needs improvement"
    required: true
    example: "planner-build"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for docs/plans/ resolution)"
    required: true
    example: "/home/code/AgenticEngineering"

# Planner-Guidance Agent Inputs
# Defines the files, directories, and context that planner-guidance agents need
# to create guidance improvement plans for agent paths, fences, and signposts.
#
# PURPOSE:
# Planner-guidance agents analyze agent friction patterns and create plans to improve
# agent guidance artifacts (process files, definitions, examples, manifests).
# Unlike other planners, these plans target teaching/guidance improvements, not
# feature implementation.
#
# RESPONSIBILITIES:
# - Analyze agent execution logs to identify friction patterns
# - Map current guidance paths (processes, definitions, examples, manifests)
# - Create minimal, verifiable plans to improve agent guidance
# - Ensure guidance changes are grounded in observed failure modes
# - Keep changes small, iterative, and easy to verify

agent_context:
  category: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#agent_categories.planner"
  role: "planner-guidance"

inputs:
  agent_type: "planner-guidance"
  version: "2.0"  # MUST match manifest.yml version

  # Reference layers (transitive loading)
  # NOTE: Uses specialized planner-core layers (T4 optimization) to reduce token usage
  # planner-guidance references agents/manifest.yml for category overview.
  # For detailed agent guidance, read the specific agent's process.yml as needed.
  layers:
    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-system.yml"
      description: "Planner-specific system definitions (plans.yml only - excludes architecture-pattern)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-core-guidelines.yml"
      description: "Planner-specific guidelines (excludes testing.yml, safety.yml)"
      required: true

    - type: layer
      path: "modules/AgenticGuidance/assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

    # Root agent manifest listing all agent categories and sub-agents
    - type: file
      path: "modules/AgenticGuidance/agents/manifest.yml"
      description: "Root agent manifest listing all agent categories and sub-agents"
      required: true

  # Teaching-planning specific inputs
  core_inputs:
    # Agent category definitions
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
      description: "Canonical definition of all agent categories and their boundaries"
      required: true

    # Teacher-specific core concepts
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/path.yml"
      description: "Path concept: what agents read to determine next actions"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml"
      description: "Fence, signpost concepts and where to put information so agents actually read it"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/friction.yml"
      description: "Friction concept: what increases agent cognitive load or causes wrong work"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/success-criteria.yml"
      description: "Success criteria patterns for outcome-based verification"
      required: true

    # Writing patterns
    - type: file
      path: "modules/AgenticGuidance/assets/examples/teacher/concise.yml"
      description: "Concise writing examples for reducing context window usage"
      required: true

    # Shared definitions for building effective guidance
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/definition.yml"
      description: "What a definition is and when to use one"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/guideline.yml"
      description: "What a guideline is and when to use one"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/generalized-vs-specific.yml"
      description: "When to use definitions/guidelines vs inputs/examples"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/agent-context-files.yml"
      description: "Where agents find process.yml, definitions.yml, manifest.yml and how context is discovered"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/outcome-verification.yml"
      description: "Outcome verification patterns (avoid 'done', prefer verifiable checks)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/role-separation.yml"
      description: "Role separation principles and avoiding conflicting incentives"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/escalation.yml"
      description: "Escalation triggers (when to stop and ask / change approach)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/guidelines/root-cause-analysis.yml"
      description: "Root-cause analysis patterns (diagnose recurring friction correctly)"
      required: true

    - type: file
      path: "modules/AgenticGuidance/assets/definitions/knowledge-encapsulation.yml"
      description: "Knowledge encapsulation principle - identify unnecessary meta-knowledge in agent guidance"
      required: true

    # NOTE: Loop patterns are now defined in respective process.yml files, not in separate definition files

    # Existing plans for context
    - type: pattern
      path: "docs/plans/live/*/"
      description: "Active live plan folders (for recording recommendations as actionable tasks - YYMMDDXX_description structure)"
      required: false

    # Folder-based planning structure (local to frontend agents)
    - type: pattern
      path: "docs/plans/*/"
      description: "Planning folders for agent refinement refactors (YYMMDDXX_description structure)"
      required: false

    # Agent execution logs for friction analysis
    # Note: Agent logs are not yet systematically collected. When available, they should be
    # stored in the project's docs/agent_logs/ directory following the pattern YYYYMMDD_<agent_name>.log
    # - type: pattern
    #   path: "docs/agent_logs/*.log"
    #   description: "Agent execution logs showing decisions, struggles, and outcomes for friction analysis"
    #   required: false

    # Plan structure example
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/plan_example.yml"
      description: "Unified plan structure example showing required fields and task format"
      required: true

    # Orchestration MMD example
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/orchestration_example.mmd"
      description: "MMD orchestration example showing phase flow, feedback triggers, agent routing metadata, and status visualization"
      required: false

    # Plan MMD Schema (structural conventions for .mmd files)
    - type: file
      path: "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
      description: "Formal schema defining MMD structure: header comments, node naming, subgraphs, edge patterns, and loop definitions"
      required: true

    # SHARED structural patterns (same file used by planner-reviewer for validation)
    - type: file
      path: "modules/AgenticGuidance/assets/examples/planner/structural-patterns.yml"
      description: "SHARED structural patterns for plan creation (used by planner-reviewer too)"
      required: true

    # MMD Component Examples
    # Use these when composing orchestration plans with visual flow diagrams
    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/teach_phase.mmd"
      description: "MMD component showing teach phase pattern with planner-guidance + reviewer loop"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/uat_phase.mmd"
      description: "MMD component showing UAT phase pattern with flexible strategy selection"
      required: false

    - type: file
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/guidance_self_review_loop.mmd"
      description: "MMD component showing guidance-self-review-loop: target agents self-review -> user decisions -> planner-guidance plans -> teacher executes -> loop until no issues"
      required: false

  # Teaching-specific guidelines
  guidelines: []

  # Teacher-plan specific terminology and definitions
  # Per context-minimisation.yml: definitions are in referenced files, avoid duplication
  definitions:
    # Core concepts: See modules/AgenticGuidance/assets/definitions/{path,fence,signpost,friction,guidance-artifacts}.yml
    # Guidance types: See modules/AgenticGuidance/assets/definitions/{definition,guideline,generalized-vs-specific}.yml
    # Agent discovery: See modules/AgenticGuidance/assets/definitions/agent-context-files.yml

    guidance_improvement_plan: |
      Plans to reduce agent friction by improving teaching artifacts (processes, definitions, examples).
      Validation is experience-driven: did the change reduce observed failures?
      See planner-guidance/process.yml for planning workflow.
