# ==============================================
# PATH RESOLUTION SEMANTICS
# ==============================================
# All paths in this file are relative to the AgenticGuidance MODULE ROOT
# (e.g., modules/AgenticGuidance/), NOT the target project root.
#
# EXCEPTION: docs/plans/ paths are relative to the TARGET PROJECT root.
# When an agent references docs/plans/live/ or docs/plans/completed/,
# these exist in the project being worked on, not in AgenticGuidance.
# ==============================================

# ==============================================
# REQUIRED INPUTS
# ==============================================
# These inputs MUST be provided by the parent orchestrator or user.
# Without these, the agent cannot create a valid guidance improvement plan.
# ==============================================
required_inputs:
  - name: "friction_source"
    type: "string"
    description: "Path to friction report, agent logs, or audit results to analyze"
    required: true
    example: "docs/plans/live/260106_plan/audit/friction_report.yml"

  - name: "target_agent"
    type: "string"
    description: "Agent name whose guidance needs improvement"
    required: true
    example: "planner-build"

  - name: "target_project_path"
    type: "string"
    description: "Absolute path to target project root (for docs/plans/ resolution)"
    required: true
    example: "/home/code/AgenticEngineering"

# Planner-Guidance Agent Inputs
# Defines the files, directories, and context that planner-guidance agents need
# to create guidance improvement plans for agent paths, fences, and signposts.
#
# PURPOSE:
# Planner-guidance agents analyze agent friction patterns and create plans to improve
# agent guidance artifacts (process files, definitions, examples, manifests).
# Unlike other planners, these plans target teaching/guidance improvements, not
# feature implementation.
#
# RESPONSIBILITIES:
# - Analyze agent execution logs to identify friction patterns
# - Map current guidance paths (processes, definitions, examples, manifests)
# - Create minimal, verifiable plans to improve agent guidance
# - Ensure guidance changes are grounded in observed failure modes
# - Keep changes small, iterative, and easy to verify

agent_context:
  # Fragment reference syntax (#anchor) documented in assets/definitions/fragment-references.yml
  category: "assets/definitions/agent-categories.yml#planner"
  role: "planner-guidance"

inputs:
  agent_type: "planner-guidance"
  version: "2.0-p1"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

    - type: layer
      path: "assets/inputs/test-shared.yml"
      description: "Test category shared inputs (acceptable-skips, reward-hacking, test-builder-role, test-creation-principles, test-structure, testing-types)"
      required: true

    - type: layer
      path: "assets/inputs/cleaner-shared.yml"
      description: "Cleaner shared inputs (cleaner-shared-guidelines, voting-system, cleaner-core manifest, preserved-files, overengineering, skipped-test)"
      required: true

    - type: layer
      path: "assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Teaching-planning specific inputs
  core_inputs:
    # Agent category definitions
    - type: file
      path: "assets/definitions/agent-categories.yml"
      description: "Canonical definition of all agent categories and their boundaries"
      required: true

    # Teacher-specific core concepts
    - type: file
      path: "assets/definitions/path.yml"
      description: "Path concept: what agents read to determine next actions"
      required: true

    - type: file
      path: "assets/definitions/fence.yml"
      description: "Fence concept: guardrails preventing wrong work"
      required: true

    - type: file
      path: "assets/definitions/signpost.yml"
      description: "Signpost concept: teaching artifacts helping agents choose correctly"
      required: true

    - type: file
      path: "assets/definitions/guidance-artifacts.yml"
      description: "Where to put information so agents actually read it"
      required: true

    - type: file
      path: "assets/definitions/success-criteria-teacher.yml"
      description: "Success criteria patterns for outcome-based verification"
      required: true

    # Writing patterns
    - type: file
      path: "assets/examples/teacher/concise.yml"
      description: "Concise writing examples for reducing context window usage"
      required: true

    # Shared definitions for building effective guidance
    - type: file
      path: "assets/definitions/definition.yml"
      description: "What a definition is and when to use one"
      required: true

    - type: file
      path: "assets/definitions/guideline.yml"
      description: "What a guideline is and when to use one"
      required: true

    - type: file
      path: "assets/definitions/generalized-vs-specific.yml"
      description: "When to use definitions/guidelines vs inputs/examples"
      required: true

    - type: file
      path: "assets/definitions/agent-context-files.yml"
      description: "Where agents find process.yml, definitions.yml, manifest.yml and how context is discovered"
      required: true

    - type: file
      path: "assets/definitions/outcome-verification.yml"
      description: "Outcome verification patterns (avoid 'done', prefer verifiable checks)"
      required: true

    - type: file
      path: "assets/definitions/separation-of-concerns.yml"
      description: "Separation-of-concerns fence (avoid mixing responsibilities)"
      required: true

    - type: file
      path: "assets/definitions/escalation.yml"
      description: "Escalation triggers (when to stop and ask / change approach)"
      required: true

    - type: file
      path: "assets/definitions/root-cause-analysis.yml"
      description: "Root-cause analysis patterns (diagnose recurring friction correctly)"
      required: true

    - type: file
      path: "assets/definitions/knowledge-encapsulation.yml"
      description: "Knowledge encapsulation principle - identify unnecessary meta-knowledge in agent guidance"
      required: true

    # NOTE: Loop patterns are now defined in respective process.yml files, not in separate definition files

    # Existing plans for context
    - type: pattern
      path: "docs/plans/live/*/"
      description: "Active live plan folders (for recording recommendations as actionable tasks - YYMMDDRepo_Branch structure)"
      required: false

    # Folder-based planning structure (local to frontend agents)
    - type: pattern
      path: "docs/plans/*/"
      description: "Planning folders for agent refinement refactors (YYMMDDRepo_Branch structure)"
      required: false

    # Agent execution logs for friction analysis
    # Note: Agent logs are not yet systematically collected. When available, they should be
    # stored in the project's docs/agent_logs/ directory following the pattern YYYYMMDD_<agent_name>.log
    # - type: pattern
    #   path: "docs/agent_logs/*.log"
    #   description: "Agent execution logs showing decisions, struggles, and outcomes for friction analysis"
    #   required: false

    # Teaching plan examples
    - type: file
      path: "assets/examples/planner/teaching-plan-example.yml"
      description: "Example teaching plan showing structure for guidance improvement plans"
      required: true

    # MMD Component Examples
    # Use these when composing orchestration plans with visual flow diagrams
    - type: file
      path: "assets/examples/planner/components/teach_phase.mmd"
      description: "MMD component showing teach phase pattern with planner-guidance + reviewer loop"
      required: false

    - type: file
      path: "assets/examples/planner/components/uat_phase.mmd"
      description: "MMD component showing UAT phase pattern with flexible strategy selection"
      required: false

  # Teaching-specific guidelines
  guidelines: []

  # Teacher-plan specific terminology and definitions
  # Per context-minimisation.yml: definitions are in referenced files, avoid duplication
  definitions:
    # Core concepts: See assets/definitions/{path,fence,signpost,friction,guidance-artifacts}.yml
    # Guidance types: See assets/definitions/{definition,guideline,generalized-vs-specific}.yml
    # Agent discovery: See assets/definitions/agent-context-files.yml

    guidance_improvement_plan: |
      Plans to reduce agent friction by improving teaching artifacts (processes, definitions, examples).
      Validation is experience-driven: did the change reduce observed failures?
      See planner-guidance/process.yml for planning workflow.
