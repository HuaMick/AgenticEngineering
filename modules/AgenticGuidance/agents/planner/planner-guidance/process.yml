process:
  goal: |
    Create a guidance-focused plan to improve agent paths, fences, and signposts.
    Keep changes small, iterative, and easy to verify.

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Participates in planner-loop with planner-reviewer feedback driving iterative refinement"

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
      description: "Core planner-guidance agent inputs, definitions, and guidelines"
    - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
      description: "Canonical definitions of agent categories"
    - location: "docs/plans/"
      description: "Target directory for creating new planning folders (YYMMDDRepo_Branch structure)"

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "plan_live_teach.yml"
      path_template: "docs/plans/live/{plan_id}/live/plan_live_teach.yml"
      description: "Teaching phase plan for guidance improvements (path, fence, signpost edits)"
      required_fields:
        - "name"
        - "worktree_path"
        - "status"
        - "phases"
      schema_reference: "modules/AgenticGuidance/assets/examples/planner/YYMMDDRepo_Branch/plan_example.yml"

    - name: "plan_live_audit_clean.yml"
      path_template: "docs/plans/live/{plan_id}/live/plan_live_audit_clean.yml"
      description: "Audit and cleanup phase plan (if needed)"
      required_fields:
        - "name"
        - "status"
        - "phases"

    - name: "friction-analysis.md"
      path_template: "docs/plans/live/{plan_id}/analysis/friction-analysis.md"
      description: "Friction analysis document identifying guidance issues"
      required_fields: []  # Markdown format, structure flexible

    - name: "orchestration_{plan_name}.mmd"
      path_template: "docs/plans/live/{plan_id}/live/orchestration_{plan_name}.mmd"
      description: "Mermaid flowchart for dynamic orchestration execution"
      required: true
      generation_guide: "See mmd_generation section below for creation steps"
      schema_reference: "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
      required_metadata:
        - "GOAL"           # Plan objective
        - "PROFILE"        # orchestrator
        - "AGENT_ROUTING"  # Phase-to-agent mapping (teaching-specific)
        - "STATUS"         # Phase status tracking

  steps:
    - |
      VALIDATE REQUIRED INPUTS (from inputs.yml required_inputs):
      The following inputs MUST be provided by the orchestrator or user:

      1. friction_source (string, required)
         - Path to friction report, agent logs, or audit results to analyze
         - ERROR if missing: "STOP: No friction_source provided. Cannot analyze guidance issues without source data."

      2. target_agent (string, required)
         - Agent name whose guidance needs improvement
         - ERROR if missing: "STOP: No target_agent provided. Cannot create guidance plan without knowing which agent to improve."

      3. target_project_path (string, required)
         - Absolute path to target project root
         - ERROR if missing: "STOP: No target_project_path provided. Cannot resolve docs/plans/ location."

      If ANY required input is missing, report the specific error and STOP.
      Identify the target agent(s) and their category (refer to agent-categories.yml).

    - |
      Clarify objective and constraints:
      - Which agent(s) are we improving?
      - What is the observed failure? (quote logs if available)
      - What is the smallest change that will measurably reduce that failure?

    - |
      Map the current path:
      - Identify which process files and definitions currently govern the behavior.
      - Locate missing signposts (examples, definitions) and missing fences (validation, constraints).
      - Call out mismatches between guidance and actual repo reality.

      **Requirement**: Verify the planning folder `docs/plans/live/YYMMDDRepo_Branch/` exists (created via `deploy-worktree`).

      **Fence**: If planning folder does not exist:
      - STOP planning immediately
      - Escalate to orchestration: "Planning folder docs/plans/live/YYMMDDRepo_Branch/ does not exist.
        Run deploy-worktree agent first to create the workspace structure."
      - Do NOT create the folder manually (deploy-worktree ensures proper git worktree setup)

      **Requirement**: Document this analysis in `analysis/friction-analysis.md` within the planning folder.

    - |
      Build a minimal, verifiable plan:
      - Create standard live plan files in `live/`:
        * `plan_live_teach.yml`: Guidance refinement and teaching tasks (path, fence, signpost edits)
        * `plan_live_audit_clean.yml`: Audit and cleanup tasks
      - Align tasks loosely to agents within each phase, allowing the orchestration agent flexibility to choose specialists as needed.
      - Each item must name exact file(s) to edit.
      - Each item must include acceptance criteria (verifiable).
      - Sequence items so early work reduces risk for later work.

      INPUTS SECTION (CRITICAL - Required for each task):
      Each task MUST include an `inputs` list specifying project-specific files the agent needs to pre-read.
      These inputs enable agents to gather context BEFORE implementation begins.

      Input selection criteria:
      - Include files that provide essential context for the task (current state, patterns to follow)
      - Focus on PROJECT-SPECIFIC files (agent's process.yml already provides general guidance)
      - Avoid duplicating files already in the agent's inputs.yml (these are loaded automatically)
      - For guidance tasks: include the target file's current state, related examples, and definitions referenced

      Example:
        - id: "teach_001"
          name: "Add fence to build-python process"
          inputs:                                         # <-- REQUIRED: Pre-read context
            - agents/build/build-python/process.yml       # Current state to understand
            - assets/definitions/fence.yml                # Fence concept definition
            - assets/examples/build/verification.yml      # Pattern to follow
          target_files:                                   # <-- What to modify
            - agents/build/build-python/process.yml
          guidance: |
            ...

      Validation guidance: experience-driven observable checks (not deterministic pass/fail).
      Reference success-criteria-teacher.yml and outcome-verification.yml in inputs.

    - |
      Write your planning artifacts:
      - Folder: `docs/plans/live/YYMMDDRepo_Branch/`
      - Analysis: `analysis/friction-analysis.md`
      - Phase Plans: `live/plan_live_teach.yml`, `live/plan_live_audit_clean.yml`
      - Structure file: `README.md` (overview of the refactor)

      Categories often requiring refinement:
      - planner: planner-guidance process/inputs
      - orchestration: orchestration-guidance process/inputs
      - teacher: teacher-update-guidance (process/inputs files), teacher-update-assets (shared assets)
      - assets: definitions, guidelines, examples

  # =============================================================================
  # GENERATE PLAN-MMD (OPTIONAL)
  # =============================================================================
  # Plan-MMD files are Mermaid flowcharts that define orchestration workflows.
  # They enable visual execution flow, automated agent routing, and feedback loops.
  # Reference: modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml
  # Reference: modules/AgenticGuidance/assets/definitions/orchestration-executor-specification.yml
  # =============================================================================

  mmd_generation:
    # -------------------------------------------------------------------------
    # WHEN TO CREATE MMD
    # -------------------------------------------------------------------------
    when_to_create:
      required_conditions:
        - "Plan YAML is approved by planner-reviewer"
        - "Plan involves teaching phases requiring orchestrated agent execution"
        - "Plan has feedback loops (guidance-test-loop, audit cycles)"

      skip_mmd_when:
        - "Single-task plans with no agent coordination"
        - "Plans that only update a single process.yml file"
        - "Quick fixes that don't need orchestration visualization"

    # -------------------------------------------------------------------------
    # HOW TO GENERATE MMD
    # -------------------------------------------------------------------------
    generation_steps:
      - |
        STEP 1: Extract phases from approved plan YAML
        - Read plan_live_teach.yml and plan_live_audit_clean.yml
        - List all phases in execution order
        - Identify dependencies between phases

      - |
        STEP 2: Create MMD header with required metadata
        - GOAL: Teaching/guidance improvement objective
        - PROFILE: Orchestration-Guidance (or Teaching-Orchestrator)
        - INPUT_PATH: Point to orchestration-guidance/inputs.yml
        - PHASES: List all phases in order
        - AGENT_ROUTING: Map each phase to appropriate agent (see agent_routing below)
        - STATUS: Initialize all phases as 'pending'

      - |
        STEP 3: Define flowchart structure
        - Use 'flowchart LR' (left-to-right) for teaching flows
        - Create Start((Start)) entry node
        - Add input validation subgraph
        - Add planning/teaching loop subgraphs
        - Create End((End)) or AskUser((Ask User)) exit nodes

      - |
        STEP 4: Add feedback loops and escalation paths
        - Define LOOP_DEFINITION references to agent-loops.yml
        - Set MAX_ITERATIONS per loop type (typically 3-5)
        - Add ESCALATION policies for max iteration handling
        - Use dashed edges (-.->|Label|) for feedback return paths

      - |
        STEP 5: Write MMD to plan folder
        - Output: docs/plans/live/YYMMDDRepo_Branch/orchestration_teach.mmd
        - Validate against plan-mmd-schema.yml structure
        - Ensure all phases have routing and status entries

    # -------------------------------------------------------------------------
    # AGENT_ROUTING FOR TEACHING PLANS
    # -------------------------------------------------------------------------
    # Maps phases to specific agents for teaching/guidance orchestration.
    # These differ from build plans - teaching uses teacher and test-guidance agents.
    agent_routing:
      teaching_phases:
        description: "Phases that improve agent guidance (paths, fences, signposts)"
        route_to:
          - "teacher-update-guidance: Process.yml updates, inputs.yml updates, inline examples"
          - "teacher-update-assets: Shared definitions, guidelines, examples in assets/"
        example_routing: |
          # AGENT_ROUTING: GuidanceUpdate -> teacher-update-guidance, AssetUpdate -> teacher-update-assets

      review_phases:
        description: "Phases that validate guidance improvements"
        route_to:
          - "test-guidance-simulator: Blind testing of updated guidance"
          - "planner-reviewer: Plan structure and completeness validation"
        example_routing: |
          # AGENT_ROUTING: GuidanceReview -> test-guidance-simulator, PlanReview -> planner-reviewer

      audit_phases:
        description: "Phases that audit final guidance quality"
        route_to:
          - "test-audit: Structural validation of guidance artifacts"
          - "test-final-output: Quality gate for completed guidance work"
        example_routing: |
          # AGENT_ROUTING: GuidanceAudit -> test-audit, FinalAudit -> test-final-output

      complete_routing_example: |
        %% AGENT_ROUTING: Planning -> planner-guidance, PlanReview -> planner-reviewer, \
        %%                Teaching -> teacher-update-guidance, GuidanceTest -> test-guidance-simulator, \
        %%                FinalAudit -> test-final-output

    # -------------------------------------------------------------------------
    # FEEDBACK_TRIGGERS FOR TEACHING
    # -------------------------------------------------------------------------
    # Teaching plans use guidance-specific triggers that differ from build plans.
    feedback_triggers:
      GUIDANCE_GAP:
        description: "test-guidance-simulator found missing or unclear guidance"
        trigger_loop: "guidance-test-loop"
        loop_reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.guidance-test-loop"
        response_action: "Re-plan with GUIDANCE_GAP context, route to teacher agent"
        example_edge: |
          GuidanceTest -- "No: Gaps Found" --> IdentifyGaps[Identify Friction Points]
          IdentifyGaps -.->|GUIDANCE_GAP: TeachLoop| SpawnTeacher

      AUDIT_FAILURE:
        description: "test-final-output found quality issues in guidance artifacts"
        trigger_loop: "audit-test-fix-loop"
        loop_reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.audit-test-fix-loop"
        response_action: "Re-plan with AUDIT_FAILURE context, return to teaching phase"
        example_edge: |
          FinalAudit -- "No: Issues" --> CategorizeAuditFailure[Categorize Issues]
          CategorizeAuditFailure -.->|AUDIT_FAILURE: ReviewLoop| SpawnPlannerGuidance

      escalation_policy: |
        If max_iterations reached without resolution:
        1. Mark phase as 'blocked'
        2. Generate friction summary with attempted fixes
        3. Escalate to AskUser((Ask User for Guidance))
        4. Preserve context for resume after user input

    # -------------------------------------------------------------------------
    # SCHEMA REFERENCES
    # -------------------------------------------------------------------------
    schema_references:
      plan_mmd_schema:
        path: "modules/AgenticGuidance/assets/definitions/plan-mmd-schema.yml"
        provides: "Structural schema for MMD files: headers, nodes, edges, subgraphs, styling"

      executor_specification:
        path: "modules/AgenticGuidance/assets/definitions/orchestration-executor-specification.yml"
        provides: "Runtime behavior: AGENT_ROUTING format, FEEDBACK_TRIGGERS patterns, STATUS management"

      teach_phase_example:
        path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/teach_phase.mmd"
        provides: "Reusable MMD component showing planner-guidance + reviewer loop pattern"

  guidelines:
    # Core guidelines: See planner-guidance/inputs.yml (direct references and transitive layers):
    # Direct: path.yml, fence.yml, signpost.yml, guidance-artifacts.yml, success-criteria-teacher.yml,
    #         outcome-verification.yml, separation-of-concerns.yml, escalation.yml, root-cause-analysis.yml,
    #         generalized-vs-specific.yml, definition.yml, guideline.yml, knowledge-encapsulation.yml
    # Via core-guidelines layer: context-minimisation.yml, experiment-first.yml, fix-the-source.yml
    # Via test-shared layer: reward-hacking.yml
    # Via cleaner-shared layer: overengineering.yml
    - |
      Bias toward iteration: smallest guidance change, then verify it improved outcomes.
    - |
      Prefer in-process guidance: put rules and examples inside process files agents read.
    - |
      Avoid over-generalizing: keep repo-specific details in inputs/examples, not universal definitions.

