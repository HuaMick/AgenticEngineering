process:
  goal: |
    Create a guidance-focused plan to improve agent paths, fences, and signposts.
    Keep changes small, iterative, and easy to verify.

  loop_context:
    participates_in: ['planner-loop']
    loop_definition: 'modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.planner-loop'
    max_iterations: 5
    note: "Participates in planner-loop with planner-reviewer feedback driving iterative refinement"

  inputs:
    - location: "modules/AgenticGuidance/agents/planner/planner-guidance/inputs.yml"
      description: "Core planner-guidance agent inputs, definitions, and guidelines"
    - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
      description: "Canonical definitions of agent categories"
    - location: "docs/plans/"
      description: "Target directory for creating new planning folders (YYMMDDXX_description structure)"

  outputs:
    # FENCE: Output must match declared schema before marking complete
    - name: "plan_live_teach.yml"
      path_template: "docs/plans/live/{plan_folder_name}/live/plan_live_teach.yml"
      description: "Teaching phase plan for guidance improvements (path, fence, signpost edits)"
      required_fields:
        - "name"
        - "worktree_path"
        - "status"
        - "phases"
      schema_reference: "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/live/plan_example.yml"

    - name: "plan_live_audit_clean.yml"
      path_template: "docs/plans/live/{plan_folder_name}/live/plan_live_audit_clean.yml"
      description: "Audit and cleanup phase plan (if needed)"
      required_fields:
        - "name"
        - "status"
        - "phases"

    - name: "friction-analysis.md"
      path_template: "docs/plans/live/{plan_folder_name}/analysis/friction-analysis.md"
      description: "Friction analysis document identifying guidance issues"
      required_fields: []  # Markdown format, structure flexible

    # NOTE: orchestration_*.mmd files are generated by orchestration-planning, NOT by planners.
    # Planners create plan YAML only. The handover model is:
    # Planner (YAML) -> Orchestrator (generates MMD) -> Reviewer (validates complete package)

  steps:
    - |
      CCI BOOTSTRAP (CLI Context Injection) - Run FIRST before any file exploration:
      Execute these commands to get structured context efficiently:

      ```bash
      # Get seed context (objective, process summary, inputs)
      agentic context bootstrap --role planner-guidance -j

      # Get current task if working from a plan
      agentic plan task current -j
      ```

      CLI output provides:
      - Your objective and process summary
      - Input file paths to read
      - Current task details (if plan exists)

      ONLY use Glob/Grep/Read if CLI output indicates specific files to examine.
      DO NOT explore the codebase before running these commands.

    - |
      VALIDATE REQUIRED INPUTS (from inputs.yml required_inputs):
      The following inputs MUST be provided by the orchestrator or user:

      1. friction_source (string, required)
         - Path to friction report, agent logs, or audit results to analyze
         - ERROR if missing: "STOP: No friction_source provided. Cannot analyze guidance issues without source data."

      2. target_agent (string, required)
         - Agent name whose guidance needs improvement
         - ERROR if missing: "STOP: No target_agent provided. Cannot create guidance plan without knowing which agent to improve."

      3. target_project_path (string, required)
         - Absolute path to target project root
         - ERROR if missing: "STOP: No target_project_path provided. Cannot resolve docs/plans/ location."

      If ANY required input is missing, report the specific error and STOP.
      Identify the target agent(s) and their category (refer to agent-categories.yml).

    - |
      Clarify objective and constraints:
      - Which agent(s) are we improving?
      - What is the observed failure? (quote logs if available)
      - What is the smallest change that will measurably reduce that failure?

    - |
      Map the current path:
      - Identify which process files and definitions currently govern the behavior.
      - Locate missing signposts (examples, definitions) and missing fences (validation, constraints).
      - Call out mismatches between guidance and actual repo reality.

      RLM-ENHANCED MAPPING (for trajectories >500 lines):
      When friction_source contains >500 lines of agent logs/trajectories, use RLM patterns:

      1. Store trajectory context:
         - store_context("CONTEXT_TRAJECTORY", path=friction_source)
         - Check line count: if >500 lines, proceed with RLM decomposition

      2. Filter for friction signals:
         - get_context("CONTEXT_TRAJECTORY", filter="ERROR|FAILED|RETRY|ESCALATE|BLOCKED")
         - Extract decision points: filter="DECISION:|CHOOSING:|SELECTED:"
         - Find backtracking: filter="REVERTING|UNDOING|RETRY #"

      3. Accumulate findings:
         - create_accumulator("ACCUMULATOR_FRICTION_PATTERNS")
         - Categorize by friction type: path_unclear, missing_signpost, fence_violation,
           input_confusion, loop_inefficiency

      For trajectories <500 lines, proceed with standard analysis without RLM overhead.

      **Requirement**: Verify the planning folder `docs/plans/live/YYMMDDXX_description/` exists.
      (Created via CLI command: `agentic plan init` - naming convention is CLI-enforced)

      **Fence**: If planning folder does not exist:
      - STOP planning immediately
      - Escalate to orchestration: "Planning folder does not exist.
        Orchestration should run 'agentic plan init <branch> --description <desc>' first."
      - Do NOT create the folder manually (CLI enforces naming convention programmatically)

      **Requirement**: Document this analysis in `analysis/friction-analysis.md` within the planning folder.

    - |
      CROSS-AGENT PATTERN DISCOVERY (RLM-enhanced, for multi-agent friction):
      When multiple agents exhibit similar friction patterns, use cross-trajectory analysis:

      1. Load multiple agent logs:
         - store_context("CONTEXT_AGENT_A", path=agent_a_logs)
         - store_context("CONTEXT_AGENT_B", path=agent_b_logs)
         - (up to 5 agent contexts - respect 10-variable limit)

      2. Build friction matrix:
         - For each agent context, extract friction patterns
         - Cross-reference to identify common sources
         - Categorize: shared_guidance_gap, shared_definition_missing, shared_example_needed

      3. Prioritize remediation:
         - Friction affecting multiple agents = higher priority
         - Single-agent friction = lower priority (may be agent-specific)
         - Generate ranked remediation list

      SKIP this step if analyzing single-agent friction or if trajectories are <500 lines total.

    - |
      Build a minimal, verifiable plan:
      - Create standard live plan files in `live/`:
        * `plan_live_teach.yml`: Guidance refinement and teaching tasks (path, fence, signpost edits)
        * `plan_live_audit_clean.yml`: Audit and cleanup tasks
      - Align tasks loosely to agents within each phase, allowing the orchestration agent flexibility to choose specialists as needed.
      - Each item must name exact file(s) to edit.
      - Each item must include acceptance criteria (verifiable).
      - Sequence items so early work reduces risk for later work.

      INPUTS SECTION (CRITICAL - Required for each task):
      Each task MUST include an `inputs` list specifying project-specific files the agent needs to pre-read.
      These inputs enable agents to gather context BEFORE implementation begins.

      Input selection criteria:
      - Include files that provide essential context for the task (current state, patterns to follow)
      - Focus on PROJECT-SPECIFIC files (agent's process.yml already provides general guidance)
      - Avoid duplicating files already in the agent's inputs.yml (these are loaded automatically)
      - For guidance tasks: include the target file's current state, related examples, and definitions referenced

      Example:
        - id: "teach_001"
          name: "Add fence to build-python process"
          inputs:                                         # <-- REQUIRED: Pre-read context
            - agents/build/build-python/process.yml       # Current state to understand
            - assets/definitions/guidance-artifacts.yml#fence  # Fence concept definition
            - assets/examples/build/verification.yml      # Pattern to follow
          target_files:                                   # <-- What to modify
            - agents/build/build-python/process.yml
          guidance: |
            ...

      Validation guidance: experience-driven observable checks (not deterministic pass/fail).
      Reference success-criteria.yml and outcome-verification.yml in inputs.

      RLM-GENERATED EVIDENCE (when RLM analysis was used):
      If RLM decomposition was applied in earlier steps, leverage the accumulated findings:
      - Reference ACCUMULATOR_FRICTION_PATTERNS for specific evidence
      - Include file:line citations from programmatic extraction
      - Map friction patterns to specific guidance files that need updates
      - Use get_accumulated("ACCUMULATOR_FRICTION_PATTERNS", sort_by="frequency") for priority

    - |
      DETERMINE REQUIRED LOOPS (before finalizing plan):
      Reference: modules/AgenticGuidance/assets/guidelines/loop-inclusion-for-planners.yml

      Before finalizing the plan, determine which loops are required for iterative work:

      1. guidance-self-review-loop - REQUIRED for validation phases:
         - Use when guidance changes need validation
         - Agent reviews own guidance files against self-review-criteria.yml
         - Exit: All criteria pass + spot-check passes (max 3 iterations)

      2. test-fix-loop - Include if implementation is involved:
         - Use when plan includes any build/implementation tasks
         - Enables build-test-fix iteration cycle
         - Exit: All tests pass (max 5 iterations)

      3. audit-test-fix-loop - MANDATORY if tests are created/modified:
         - External validation of test quality
         - Catches reward hacking patterns
         - Exit: Audit finds no issues (max 3 iterations)

      Include loop_structure section in plan output:
      ```yaml
      loop_structure:
        type: "<loop-type from agent-loops.yml>"
        trigger: "<condition that starts loop>"
        exit_criteria:
          success: "<condition for successful exit>"
          max_iterations: <number>
          escalation: "<what to do if max reached>"
        participants:
          - agent: "<agent-name>"
            role: "<role in loop>"
      ```

      NOTE: Planners specify loop STRUCTURE (what iteration is needed).
      Orchestration-planning selects the specific loop TYPE based on phase.

    - |
      Write your planning artifacts:
      - Folder: `docs/plans/live/YYMMDDXX_description/`
      - Analysis: `analysis/friction-analysis.md`
      - Phase Plans: `live/plan_live_teach.yml`, `live/plan_live_audit_clean.yml`
      - Structure file: `README.md` (overview of the refactor)

      Categories often requiring refinement:
      - planner: planner-guidance process/inputs
      - orchestration: orchestration-guidance process/inputs
      - teacher: teacher-update-guidance (process/inputs files), teacher-update-assets (shared assets)
      - assets: definitions, guidelines, examples

  guidelines:
    - |
      NOTE: Planners may request validation/iteration needs but do NOT dictate loop
      strategy. Loop selection is owned by orchestration-planning. See
      orchestration-planning/inputs.yml#loop_selection_guidance.
    - |
      Bias toward iteration: smallest guidance change, then verify it improved outcomes.
    - |
      Prefer in-process guidance: put rules and examples inside process files agents read.
    - |
      Avoid over-generalizing: keep repo-specific details in inputs/examples, not universal definitions.

