# Plan Schema Definition
# Defines the formal structure for ticket and phase data used by planner agents.
#
# IMPORTANT: All ticket/phase data is stored in TinyDB, NOT as on-disk YAML files.
# Agents MUST use CLI commands to create tickets and phases:
#   agentic epic phase add --epic <folder> --name <phase> --agent <agent-type>
#   agentic epic ticket add --epic <folder> --phase <phase> --id <id> --name <name>
# Do NOT create ticket_*.yml or plan_*.yml files on disk.
#
# SCOPE: Schema definitions for TinyDB ticket/phase records.
# For epic definitions, see: assets/definitions/plans.yml

storage_note: |
  DATA STORE: TinyDB (sole authoritative store for all ticket/phase data).
  LEGACY: ticket_build.yml, ticket_teach.yml, plan_*.yml files are DEPRECATED.
  These on-disk YAML files are no longer created by agents. All data flows through
  TinyDB via CLI commands. This schema defines the logical structure of records
  regardless of storage backend.

plan_schema:
  definition: |
    Ticket and phase records define the scope, phases, tickets, and success criteria for an
    implementation or teaching objective. Records are stored in TinyDB and accessed via CLI
    commands. This schema ensures consistency and enables orchestration agents to parse and
    execute epics.

  record_types:
    build_tickets:
      description: "Implementation tickets for code changes, features, or bug fixes"
      primary_use: "build-python, build-flutter agents"
      cli_command: "agentic epic ticket add --epic <folder> --phase Build --id <id> --name <name>"

    teach_tickets:
      description: "Teaching tickets for guidance updates, process improvements"
      primary_use: "teacher-update-guidance, teacher-update-assets agents"
      cli_command: "agentic epic ticket add --epic <folder> --phase Teach --id <id> --name <name>"

    test_tickets:
      description: "Test strategy tickets for validation and coverage"
      primary_use: "test-builder agent"
      cli_command: "agentic epic ticket add --epic <folder> --phase Test --id <id> --name <name>"

# =============================================================================
# CORE PLAN STRUCTURE
# =============================================================================

core_structure:
  required_fields:
    name:
      type: "str"
      description: "Plan name (human-readable identifier)"
      example: "user-authentication-feature"

    branch:
      type: "str"
      description: "Git branch associated with this plan"
      example: "feature/user-authentication"

    status:
      type: "str"
      enum: ["planning", "active", "needs_review", "blocked", "completed"]
      description: "Current plan status"

    objective:
      type: "str"
      description: "High-level description of what the plan aims to accomplish"

    phases:
      type: "list[Phase]"
      description: "Ordered list of execution phases"

  optional_fields:
    priority:
      type: "int"
      enum: [1, 2, 3, 4]
      description: "Plan priority for ordering execution (1=critical, 2=high, 3=medium, 4=low)"

    context:
      type: "str"
      description: "Background context explaining the problem or motivation"

    success_criteria:
      type: "list[str]"
      description: "List of criteria that must be met for plan completion"

    review_note:
      type: "str"
      description: "Notes for human reviewers about the plan"

    impacted_files:
      type: "list[ImpactedFile]"
      description: "Files expected to be modified/created by this plan"
      deprecated: true
      deprecation_notice: |
        DEPRECATED: Use task-level `target_files` instead.
        Task-level target_files is the sole mechanism for file scoping and parallelization.
        Plan-level impacted_files is retained for backward compatibility only.
      see: "#impacted_files_schema"

    impacted_artifacts:
      type: "list[ImpactedArtifact]"
      description: "Higher-level artifacts affected by this plan"
      see: "#impacted_artifacts_schema"

# =============================================================================
# IMPACTED_FILES SCHEMA
# =============================================================================
# Defines structure for explicit file scoping in plans.
# Enables orchestration to determine safe parallelization.

impacted_files_schema:
  deprecated: true
  deprecation_notice: |
    DEPRECATED: Plan-level impacted_files is superseded by task-level target_files.
    Use target_files on each task to declare which files the task modifies.
    Orchestration uses task-level target_files for parallelization decisions:
    tasks with non-overlapping target_files can run in parallel.
    This schema is retained for backward compatibility only.
  description: |
    The impacted_files section provides explicit scoping of files that will be
    modified, created, or deleted during plan execution. This enables:
    - Better orchestration visibility for parallelization decisions
    - Clear impact analysis for reviewers
    - File conflict detection between concurrent plans

  item_structure:
    path:
      type: "str"
      required: true
      description: "File path relative to repo root"
      examples:
        - "modules/AgenticCLI/src/agenticcli/commands/epic.py"
        - "modules/AgenticGuidance/agents/planner-build/process.yml"
        - "docs/epics/live/260204IM/README.md"

    change_type:
      type: "str"
      required: true
      enum: ["create", "modify", "delete"]
      description: |
        Type of change expected for this file:
        - create: New file will be created
        - modify: Existing file will be modified
        - delete: Existing file will be removed

    change_category:
      type: "str"
      required: true
      enum: ["implementation", "test", "config", "docs", "guidance"]
      description: |
        Category of the file change:
        - implementation: Source code files
        - test: Test files
        - config: Configuration files (pyproject.toml, etc.)
        - docs: Documentation files (README, etc.)
        - guidance: Agent guidance files (process.yml, inputs.yml)

    reason:
      type: "str"
      required: false
      description: "Brief explanation of why this file is being changed"
      examples:
        - "Add new plan CLI command"
        - "Update tests for new validation logic"

  example: |
    impacted_files:
      - path: "modules/AgenticCLI/src/agenticcli/commands/epic.py"
        change_type: create
        change_category: implementation
        reason: "New CLI command module for epic management"

      - path: "modules/AgenticCLI/src/agenticcli/cli.py"
        change_type: modify
        change_category: implementation
        reason: "Register new epic command group"

      - path: "modules/AgenticCLI/tests/test_epic_commands.py"
        change_type: create
        change_category: test
        reason: "Tests for epic CLI commands"

  orchestration_usage: |
    DEPRECATED: Orchestration now uses task-level target_files for these decisions.
    Tasks with non-overlapping target_files within a plan can run in parallel.
    Cross-plan parallelism is not supported — each plan is a serial orchestration unit.

    Legacy usage (retained for backward compatibility):
    1. Detect file conflicts between plans (overlapping paths)
    2. Determine safe parallelization (non-overlapping plans can run concurrently)
    3. Validate plan scope (ensure tasks match declared file impacts)
    4. Track execution progress (mark files as touched during execution)

# =============================================================================
# IMPACTED_ARTIFACTS SCHEMA
# =============================================================================
# Defines structure for higher-level artifact scoping in plans.
# Complements impacted_files with semantic-level impact tracking.

impacted_artifacts_schema:
  description: |
    The impacted_artifacts section identifies higher-level system components
    affected by the plan. While impacted_files tracks individual files,
    impacted_artifacts captures semantic impacts like API changes, new CLI
    commands, or service modifications.

  item_structure:
    artifact_type:
      type: "str"
      required: true
      enum: ["api", "cli_command", "service", "agent", "config", "model", "schema"]
      description: |
        Type of artifact being impacted:
        - api: API endpoint or interface
        - cli_command: CLI command or subcommand
        - service: Backend service or class
        - agent: Agent guidance or capability
        - config: Configuration schema or defaults
        - model: Data model or dataclass
        - schema: Schema definition

    artifact_identifier:
      type: "str"
      required: true
      description: |
        Unique identifier for the artifact. Format varies by type:
        - api: "GET /api/v1/users" or "EpicService.create_epic"
        - cli_command: "agentic epic init"
        - service: "QuestionQueue" or "epic.py:EpicService"
        - agent: "planner-build" or "test-builder"
        - config: "pyproject.toml:dependencies"
        - model: "Question" or "models/question.py:Answer"
        - schema: "plan-schema.yml:impacted_files"
      examples:
        - "agentic epic init"
        - "EpicService.validate_epic"
        - "planner-build"

    impact_type:
      type: "str"
      required: true
      enum: ["new", "interface_change", "behavior_change", "deprecation", "removal"]
      description: |
        Type of impact on the artifact:
        - new: Creating a new artifact
        - interface_change: Changing method signatures, parameters, or return types
        - behavior_change: Changing behavior without interface changes
        - deprecation: Marking artifact for future removal
        - removal: Removing the artifact

    description:
      type: "str"
      required: false
      description: "Detailed description of the artifact impact"

    breaking_change:
      type: "bool"
      required: false
      default: false
      description: "Whether this impact constitutes a breaking change"

  example: |
    impacted_artifacts:
      - artifact_type: cli_command
        artifact_identifier: "agentic epic init"
        impact_type: new
        description: "New CLI command for standardized epic folder creation"
        breaking_change: false

      - artifact_type: cli_command
        artifact_identifier: "agentic epic create"
        impact_type: interface_change
        description: "Add required --branch parameter"
        breaking_change: true

      - artifact_type: service
        artifact_identifier: "EpicService.validate_epic"
        impact_type: new
        description: "New validation method for epic folder structure"

      - artifact_type: agent
        artifact_identifier: "planner-build"
        impact_type: behavior_change
        description: "Update guidance to populate impacted_files section"

  orchestration_usage: |
    Orchestration agents use impacted_artifacts to:
    1. Identify semantic conflicts (e.g., two plans modifying same API)
    2. Sequence plans based on dependencies (API consumers after API changes)
    3. Assess risk level (breaking changes require additional validation)
    4. Generate release notes and changelog entries

# =============================================================================
# PHASE STRUCTURE
# =============================================================================

phase_structure:
  required_fields:
    name:
      type: "str"
      description: "Phase name (human-readable)"
      example: "Phase 1: CLI Enhancement"

    tasks:
      type: "list[Task]"
      description: "Ordered list of tasks in this phase"

  optional_fields:
    id:
      type: "str"
      description: "Phase identifier for referencing"
      example: "phase_01"

    execution:
      type: "str"
      enum: ["sequential", "parallel"]
      default: "sequential"
      description: "How tasks in this phase should be executed"

    status:
      type: "str"
      enum: ["planning", "in_progress", "completed", "blocked"]
      description: "Current phase status"

# =============================================================================
# TASK STRUCTURE
# =============================================================================

task_structure:
  required_fields:
    id:
      type: "str"
      description: "Unique task identifier within the plan"
      pattern: "^[A-Z]{2,3}_\\d{3}$"
      examples: ["IM_001", "AL_002", "RE_003"]

    name:
      type: "str"
      description: "Task name (action-oriented)"
      example: "Create plan.py command module"

    status:
      type: "str"
      enum: ["pending", "in_progress", "completed", "needs_review", "blocked"]
      description: "Current task status"

  optional_fields:
    description:
      type: "str"
      description: "Detailed description of what the task should accomplish"

    target_files:
      type: "list[str]"
      description: "Files this task will modify/create"

    guidance:
      type: "str"
      description: "Specific guidance for executing the task"

    review_note:
      type: "str"
      description: "Notes for reviewers about this task"

    dependencies:
      type: "list[str]"
      description: "Task IDs that must complete before this task"

# =============================================================================
# VALIDATION RULES
# =============================================================================

validation_rules:
  plan_level:
    - "name must be non-empty string"
    - "status must be valid enum value"
    - "phases must contain at least one phase"

  phase_level:
    - "name must be non-empty string"
    - "tasks must contain at least one task"

  task_level:
    - "id must match pattern ^[A-Z]{2,3}_\\d{3}$"
    - "name must be non-empty string"
    - "status must be valid enum value"
    - "dependencies must reference existing task IDs"

  impacted_files_level:  # DEPRECATED - use task-level target_files instead
    - "path must be relative to repo root (no leading /)"
    - "change_type must be valid enum value"
    - "change_category must be valid enum value"

  impacted_artifacts_level:
    - "artifact_type must be valid enum value"
    - "artifact_identifier must be non-empty string"
    - "impact_type must be valid enum value"
