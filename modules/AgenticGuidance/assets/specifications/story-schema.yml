# Story Schema Definition
# Defines the expected YAML structure for user story files.
#
# SCOPE: Structural definitions for .yml files in docs/userstories/ directories.
# Story files define user stories with acceptance criteria, test status, and relationships.
#
# PRINCIPLE: Stories describe SYSTEM MECHANICS — the architectural decisions and
# plumbing that make this system work differently from a generic one. They do NOT
# describe asset content (what's in definitions/guidelines/specs) or restate
# standard engineering practices. Think of the guidance system as a library:
# assets are interchangeable books; stories describe the library system itself.
#
# RELATED:
#   - modules/AgenticGuidance/src/agenticguidance/services/story.py (StoryService)
#   - modules/AgenticCLI/src/agenticcli/commands/stories.py (CLI commands)

# =============================================================================
# FILE STRUCTURE
# =============================================================================

file_structure:
  location_pattern: "docs/userstories/<Category>/<NN>_<topic>.yml"
  top_level_key:
    description: |
      Each story file must contain either a "stories" or "user_stories" key
      at the top level, containing a list of story objects.
    valid_keys:
      - "stories"
      - "user_stories"
    example: |
      area: installation
      description: "Setup wizard, update/rebuild, CLI installation"
      stories:
      - id: US-SET-001
        title: Initial CLI Setup
        ...

  optional_file_metadata:
    area:
      description: "Grouping area for the stories in this file."
      type: string
    description:
      description: "Human-readable description of the story group."
      type: string

  metadata_file:
    name: "00_metadata.yml"
    description: |
      Each category directory may contain a 00_metadata.yml file with
      category-level metadata. This file is excluded from story parsing.

# =============================================================================
# STORY OBJECT SCHEMA
# =============================================================================

story_schema:
  required_fields:
    id:
      type: string
      pattern: "^US-[A-Z]{2,4}-\\d{3}$"
      description: |
        Unique story identifier. Format: US-<CATEGORY>-<NUMBER>
        Category is 2-4 uppercase letters. Number is zero-padded to 3 digits.
      examples:
        - "US-SET-001"
        - "US-CLI-110"
        - "US-PLAN-003"
        - "US-STR-012"

    title:
      type: string
      description: "Short descriptive title for the user story."
      examples:
        - "Initial CLI Setup"
        - "Epic List Display"

  optional_fields:
    category:
      type: string
      description: "Functional category within the story group (e.g., configuration, testing)."
      examples:
        - "configuration"
        - "testing"
        - "session"

    priority:
      type: string
      enum:
        - "low"
        - "medium"
        - "high"
        - "critical"
      default: "medium"
      description: "Relative priority of the story."

    description:
      type: string
      description: |
        Full user story description, typically in the format:
        "As a <role>, I want to <action>, so that <benefit>."

    steps:
      type: list
      description: |
        Ordered list of step objects defining the user journey.
        Alternative key name: "journey" (both are accepted).
      item_schema:
        step:
          type: integer
          description: "Step number (1-based)."
        action:
          type: string
          description: "What the user does (used in simple format)."
        when:
          type: string
          description: "Precondition or trigger (used in BDD format)."
        then:
          type: list
          description: "Expected outcomes (used in BDD format)."
        expected:
          type: string
          description: "Expected result (used in simple format)."
      examples:
        simple_format:
          - step: 1
            action: "Run agentic setup"
            expected: "Setup wizard launches"
        bdd_format:
          - step: 1
            when: "the feature is used"
            then:
              - "agentic setup runs an interactive setup wizard"

    journey:
      type: list
      description: "Alias for 'steps'. Both keys are accepted by StoryService."

    success_criteria:
      type: list
      items:
        type: string
      description: "List of acceptance criteria that must be met."
      example:
        - "CLI responds within 2 seconds"
        - "Configuration is persisted across sessions"

    prerequisites:
      type: list
      items:
        type: string
      description: "List of prerequisites or dependencies."

    related_stories:
      type: list
      items:
        type: string
        pattern: "^US-[A-Z]{2,4}-\\d{3}$"
      description: "List of related story IDs."

    related_commands:
      type: list
      items:
        type: string
      description: "List of CLI commands relevant to this story."
      example:
        - "agentic setup"
        - "agentic setup --force"

    related_files:
      type: list
      items:
        type: string
      description: |
        List of source files that implement this story (relative to repo root).
        Used for bidirectional traceability: YAML lists files, files list stories
        via # story: headers. Staleness detection diffs these files against
        last_pass_commit to determine if re-testing is needed.
      example:
        - "modules/AgenticCLI/src/agenticcli/commands/epic.py"
        - "modules/AgenticGuidance/src/agenticguidance/services/epic.py"

    last_pass_commit:
      type: string
      description: |
        Short git commit hash where tests last passed for this story.
        Used for staleness detection: if any related_files changed since
        this commit, the story is marked 'stale'.
      example: "6ef014f"

    last_uat_commit:
      type: string
      description: |
        Short git commit hash where UAT last passed for this story.
        If related_files changed since this commit, the story is 'uat_stale'.
      example: "b412d8e"

    # UAT plan — doc-blind-executable journey for test-uat
    uat_plan:
      type: object
      description: |
        Concrete, doc-blind-executable UAT plan written from test-uat's perspective.
        REQUIRED for all NEW stories (writer-agent enforcement, not parse-time enforcement —
        existing stories without this field continue to load, and `agentic stories audit`
        surfaces them for incremental backfill). The shape mirrors what
        modules/AgenticGuidance/agents/test/test-uat/process.yml:118-123 expects
        (persona, starting_state, journey steps, success criteria), so no test-uat
        code changes are needed. Formalising this at story-writing time rotates story
        boundaries toward coherent journeys and removes the implicit design work
        test-uat used to do via self-discovery.
      fields:
        persona:
          type: string
          required: true
          description: |
            Who executes this journey. Must match a persona defined in
            modules/AgenticGuidance/agents/test/test-uat/inputs.yml (the
            `agent_blind_test` definition and any sibling personas added there).
          enum:
            - "agent-blind-test"
        starting_state:
          type: string
          required: true
          description: |
            Concrete preconditions a fresh executor can establish without hidden
            state from prior runs (e.g., "Fresh repo clone on main, no ~/.agentic
            config, no live epics").
        preconditions:
          type: list
          items:
            type: string
            pattern: "^US-[A-Z0-9]+-\\d{3}$"
          description: |
            List of US-IDs that must PASS before this journey is runnable.
            Test-uat can refuse to run a story whose preconditions haven't passed,
            and the health dashboard uses this to propagate failures. Empty list
            if the story has no cross-story dependencies. Cross-references
            `related_stories` but is stricter: preconditions are a PASS fence,
            related_stories are discoverability pointers.
        journey:
          type: list
          required: true
          description: |
            Ordered list of action/observe pairs. Replaces the fuzzy when/then
            pairing on the top-level `steps` field (which stays allowed for
            back-compat) with concretely executable commands and observable
            outcomes.
          item_schema:
            step:
              type: integer
              description: "1-based step number."
            action:
              type: string
              required: true
              description: "Exact command or operation to run (no vague wording)."
            observe:
              type: list
              items:
                type: string
              required: true
              description: |
                Concretely observable outcomes (exit code, output match, DB state,
                file existence). NO vague "verify it worked" wording.
        success_signals:
          type: list
          items:
            type: string
          required: true
          description: |
            The narrow set of things test-uat must observe to mark PASS. Distinct
            from success_criteria: stripped of implementation color, focused on
            what is observable at the end of the journey.
        cleanup:
          type: list
          items:
            type: string
          description: |
            Optional list of steps to undo side-effects. REQUIRED when the journey
            has durable side-effects (epic created, files written, config changed)
            to prevent state leakage between UAT runs.
      example:
        persona: agent-blind-test
        starting_state: |
          Fresh repo clone on main, no ~/.agentic config, no live epics in TinyDB.
        preconditions: []
        journey:
          - step: 1
            action: "Run `agentic epic new \"widget sorter\"`"
            observe:
              - "command exits 0"
              - "`agentic epic list` includes an epic with status=seed"
          - step: 2
            action: "Run `agentic epic phase add --epic <folder> --id P1 --name Design --agent planner-build`"
            observe:
              - "command exits 0"
              - "`agentic epic phase list --epic <folder>` shows P1 with 0 tickets"
        success_signals:
          - "Epic is discoverable via `agentic epic list` with the expected status"
          - "Phase count in status output matches phases added"
        cleanup:
          - "`agentic epic archive <folder>`"

    # Lifecycle field
    lifecycle:
      type: string
      enum:
        - "proposal"
        - "under-construction"
        - "implemented"
        - "deprecated"
        - "archived"
      default: "implemented"
      description: |
        Maturity lifecycle of the story. Orthogonal to test_status.
        Valid transitions: proposal → under-construction → implemented → deprecated → archived.
        Existing stories without this field default to "implemented".

    # Pattern inheritance
    inherits_patterns:
      type: list
      description: |
        List of pattern references with parameter bindings. Each entry
        specifies a pattern ID and binds concrete values to the pattern's
        declared parameters. This enables stories to inherit reusable
        cross-cutting verification behaviors.
      item_schema:
        id:
          type: string
          pattern: "^PAT-[A-Z]{2,4}-\\d{3}$"
          description: "Pattern ID to inherit (e.g., PAT-CLI-001)"
          required: true
        bind:
          type: object
          description: |
            Key-value map binding pattern parameters to concrete values.
            Keys must match parameter names declared in the pattern.
            All required parameters must be bound.
          required: true
      example:
        - id: PAT-CLI-001
          bind:
            command: "agentic epic list"
            expected_keys: [name, status, created]
        - id: PAT-DAT-001
          bind:
            operation: "update epic status"
            target_file: "epics.db"

    # Code tagging
    code_tagging:
      description: |
        Production code implementing a story is tagged with a file-level header comment:
          # story: US-XXX-NNN, US-YYY-NNN
        Placed at the top of the file (before or after module docstring).
        Comma-separated for multiple stories. Greppable and maps to git diff output.
        Bidirectional with related_files: YAML lists files, files list stories.

    # Test tracking fields
    test_status:
      type: string
      enum:
        - "untested"
        - "pass"
        - "fail"
        - "skip"
        - "regression"
      default: "untested"
      description: "Current test status of the story."

    last_tested:
      type: string
      format: "ISO 8601 datetime or null"
      description: "Timestamp of the last test run."

    tested_by_plan:
      type: string
      description: "Epic folder name that last tested this story."

    test_notes:
      type: string
      description: "Free-text notes about test results or issues."

# =============================================================================
# ID PREFIX CONVENTIONS
# =============================================================================

id_prefixes:
  description: |
    Story ID prefixes map to functional areas of the system.
    The prefix is extracted by matching the pattern US-[A-Z]+ from the ID.
  known_prefixes:
    US-SET: "Setup, installation, and configuration"
    US-SES: "Session management and lifecycle"
    US-PLN: "Planning and orchestration"
    US-STR: "Story management and tracking"
    US-GUI: "Guidance and agent definitions"
    US-CLI: "CLI commands and UX"

  pattern_prefixes:
    description: |
      Pattern ID prefixes map to cross-cutting verification domains.
      Format: PAT-<DOMAIN>-<NNN>
    known_prefixes:
      PAT-CLI: "CLI output, flags, error messages"
      PAT-DAT: "FileLock atomicity, TinyDB CRUD, persistence"
      PAT-EXE: "Test-fix loops, bounded retry, feedback routing"
      PAT-CTX: "CCI bootstrap, input resolution"
      PAT-TST: "UAT fences, coverage, reward hacking"
      PAT-AGT: "Agent spawning, lifecycle, routing"

# =============================================================================
# PATTERN OBJECT SCHEMA
# =============================================================================

pattern_schema:
  description: |
    Patterns are reusable cross-cutting verification behaviors that stories
    inherit via `inherits_patterns`. They live in docs/userstories/Patterns/
    organized by domain. Patterns are NOT UAT-verified directly — they are
    verified through the stories that claim them.

    Industry precedent: RSpec shared_examples, Gherkin Scenario Outline.

  location_pattern: "docs/userstories/Patterns/<domain>/<NN>_<topic>.yml"

  top_level_key:
    valid_keys:
      - "patterns"

  required_fields:
    id:
      type: string
      pattern: "^PAT-[A-Z]{2,4}-\\d{3}$"
      description: "Unique pattern identifier. Format: PAT-<DOMAIN>-<NUMBER>"
      examples:
        - "PAT-CLI-001"
        - "PAT-DAT-002"

    title:
      type: string
      description: "Short descriptive title for the pattern."

  optional_fields:
    description:
      type: string
      description: "Detailed description of the cross-cutting behavior."

    tags:
      type: list
      items:
        type: string
      description: "Tags for discovery and filtering."

    applicable_categories:
      type: list
      items:
        type: string
        pattern: "^US-[A-Z]{2,4}$"
      description: "Story category prefixes this pattern applies to."

    parameters:
      type: object
      description: |
        Declared parameters that must be bound by inheriting stories.
        Each key is a parameter name, value is a descriptor object with:
        - description (string, required)
        - required (bool, default true)
        - type (string, default "string")
        - default (any, optional)
      example:
        command:
          description: "The CLI command under test"
          required: true
        expected_keys:
          description: "Top-level JSON keys expected"
          required: true
          type: list

    verification:
      type: object
      description: |
        Three verification layers, all optional:
        - behavioral: step-by-step actions with expected outcomes (uses parameter placeholders)
        - structural: code inspection checks (grep patterns in file globs)
        - enforcement: sweep strategy for validating all claimant stories
      schema:
        behavioral:
          steps:
            type: list
            item_schema:
              step: { type: integer }
              action: { type: string, description: "Action with {param} placeholders" }
              expect: { type: string, description: "Expected outcome with {param} placeholders" }
        structural:
          checks:
            type: list
            item_schema:
              description: { type: string }
              look_for: { type: string, description: "Regex pattern to search for" }
              in_files: { type: string, description: "Glob pattern for target files" }
        enforcement:
          sweep: { type: string, description: "all_claimants or specific scope" }
          method: { type: string, description: "Procedure for verifying all claimants" }

# =============================================================================
# VALIDATION CHECKLIST
# =============================================================================

validation_checklist:
  file_validation:
    - "File is valid YAML"
    - "Top-level key is 'stories' or 'user_stories' containing a list"
    - "File is not named 00_metadata.yml"

  story_validation:
    - "Each story has a unique 'id' field"
    - "ID matches pattern US-[A-Z]{2,4}-\\d{3}"
    - "Each story has a non-empty 'title' field"
    - "If 'priority' is set, it is one of: low, medium, high, critical"
    - "If 'test_status' is set, it is one of: untested, pass, fail, skip, regression"
    - "If 'related_stories' is set, each item matches the ID pattern"
    - "NEW stories must include 'uat_plan' with persona, starting_state, journey, success_signals (enforced by writer agents and `agentic stories audit`, not by the parser — legacy stories without uat_plan still load)"
    - "If 'uat_plan.preconditions' is set, each entry matches the US-ID pattern"

  directory_validation:
    - "Stories are organized under docs/userstories/<Category>/"
    - "Patterns are organized under docs/userstories/Patterns/<domain>/"
    - "Category directories use PascalCase naming"
    - "Files are numbered with NN_ prefix for ordering"

  pattern_validation:
    - "Each pattern has a unique 'id' field"
    - "ID matches pattern PAT-[A-Z]{2,4}-\\d{3}"
    - "Each pattern has a non-empty 'title' field"
    - "If 'parameters' is set, each param has a 'description'"
    - "If 'verification.behavioral' is set, steps have 'action' and 'expect'"
    - "If 'verification.structural' is set, checks have 'look_for' and 'in_files'"

  inherits_patterns_validation:
    - "Each entry has a valid 'id' matching PAT-[A-Z]{2,4}-\\d{3}"
    - "Each entry has a 'bind' object"
    - "All required pattern parameters are present in 'bind'"
    - "Pattern ID resolves to an existing pattern file"

# =============================================================================
# COMPLETE EXAMPLE
# =============================================================================

complete_example:
  description: "Minimal but complete story file structure."
  template: |
    area: session
    description: "Session lifecycle and management stories"
    stories:
    - id: US-SES-001
      title: Spawn Agent Session
      category: session
      priority: high
      description: >
        As a developer, I want to spawn an agent session in tmux,
        so that I can run agents in isolated environments.
      steps:
      - step: 1
        when: "the user runs agentic orchestrate session spawn"
        then:
          - "A new tmux session is created"
          - "The agent process starts in the session"
      success_criteria:
        - "Session appears in agentic orchestrate session list"
        - "Agent responds to queries within timeout"
      related_commands:
        - "agentic orchestrate session spawn --role build-python"
        - "agentic orchestrate session list"
      test_status: untested
      last_tested: null
      tested_by_plan: null
