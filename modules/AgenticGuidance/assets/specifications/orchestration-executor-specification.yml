# Orchestration Executor Specification
# Defines the runtime behavior for a generic executor that reads TinyDB phase records and executes them dynamically.
#
# SCOPE: Specification for an executor that interprets TinyDB-stored phase metadata and orchestrates agent execution.
# This specification enables data-driven orchestration without any file-based plan formats (no MMD, no YAML ticket files).
#
# RELATED:
#   - modules/AgenticGuidance/assets/definitions/agent-loops.yml (loop definitions)
#   - modules/AgenticGuidance/agents/orchestration/orchestration-executor/manifest.yml

# =============================================================================
# SECTION 1: EXECUTOR SCOPE AND RESPONSIBILITIES
# =============================================================================

executor_scope:
  definition: |
    The orchestration executor is an EXECUTION-ONLY runtime component that:
    - Reads phase records from TinyDB via EpicRepository.list_phases(epic_folder)
    - Uses the `agent` field on each PhaseData record to determine which agent handles each phase
    - Manages phase progression, feedback loops, and escalation paths
    - Updates phase status in TinyDB as execution progresses
    - Does NOT perform planning (planning is delegated to orchestration-planning agent)
    - Does NOT read or write MMD files or YAML ticket files for execution state

  responsibilities:
    execution:
      - "Query TinyDB for all phases belonging to the epic via EpicRepository.list_phases()"
      - "Read agent routing from the PhaseData.agent field in TinyDB"
      - "Execute phases in declared order (sorted by _order field in TinyDB)"
      - "Monitor agent outputs for feedback triggers"
      - "Update phase status in TinyDB as execution progresses"
      - "Handle failures according to PhaseData.feedback_triggers stored in TinyDB"
      - "Persist state to TinyDB for resume capability"

    NOT_responsibilities:
      - "Planning (delegated to orchestration-planning agent)"
      - "Plan creation or task definition (done by planner agents)"
      - "Agent implementation (executor spawns agents, does not implement them)"
      - "Human approval gates (passed through to orchestration-planning)"
      - "Reading or writing MMD files"
      - "Reading or writing YAML ticket/phase files"

  relationship_to_orchestration_agents:
    orchestration_planning:
      role: "Creates and refines plans; writes phase records to TinyDB"
      interaction: |
        Executor reads approved phases FROM TinyDB after orchestration-planning has
        populated them. On feedback triggers requiring re-planning, executor invokes
        orchestration-planning with failure context, which then updates TinyDB phases
        and the executor resumes reading from TinyDB.

    orchestration_friction:
      role: "LangSmith trace friction analysis and pattern detection"
      interaction: |
        Friction analysis runs independently to detect guidance improvement opportunities.
        Executor may incorporate friction feedback when triggering re-planning phases.

  entrypoints_served:
    _orchestrate:
      description: "Primary entrypoint for execution with pre-populated TinyDB phases"
      required_inputs:
        - "epic_folder: Epic folder name whose phases are stored in TinyDB"
      behavior: |
        Executor calls EpicRepository.list_phases(epic_folder), finds the first
        pending/in_progress phase, resolves its agent field, spawns the agent,
        and loops until all phases are completed or escalation is required.

    fallback_to_planning:
      description: "When epic has no phases in TinyDB"
      behavior: |
        If list_phases() returns an empty list, executor delegates to
        orchestration-planning agent to populate phases in TinyDB first,
        then resumes execution.

# =============================================================================
# SECTION 2: AGENT ROUTING (TINYDB PHASE FIELDS)
# =============================================================================

agent_routing:
  definition: |
    Agent routing is stored directly in TinyDB as the `agent` field on each PhaseData record.
    The executor reads this field from TinyDB — there is no MMD file or YAML header to parse.
    Planners set the agent field when creating phases via `agentic epic phase add --agent <role>`.

  tinydb_phase_schema:
    key_fields:
      epic_folder_name: "str — parent epic this phase belongs to"
      phase_name: "str — unique phase identifier within the epic"
      phase_id: "str — stable ID for cross-referencing"
      agent: "str — agent role name (e.g. build-python, test-runner) — REQUIRED for execution"
      status: "str — pending | in_progress | completed | failed | blocked"
      execution: "str — sequential | parallel (defaults to sequential)"
      loop_type: "str — optional loop strategy for this phase"
      loop_max_iterations: "int — max retries for this phase"
      max_turns: "int — maximum agentic turns before timeout"
      timeout: "int — wall-clock timeout in seconds"
      feedback_triggers: "dict — maps PHASE_FAILURE keys to target phase names"
      _order: "int — sort key for phase execution order"

    example_record: |
      {
        "epic_folder_name": "260207XX_feature",
        "phase_name": "Domain_Build",
        "phase_id": "phase_domain_build",
        "agent": "build-python",
        "status": "pending",
        "execution": "sequential",
        "loop_max_iterations": 5,
        "max_turns": 50,
        "timeout": 1800,
        "feedback_triggers": {"DOMAIN_BUILD_FAILURE": "Domain_Build"},
        "_order": 2
      }

  agent_field_requirement:
    description: "The agent field is REQUIRED for every phase. Phases without it cannot execute."
    enforcement: "HARD — executor logs an error, marks phase as failed, and halts if agent field is absent"
    error_message: |
      Phase {phase_name} in {epic_folder} has no agent field set in TinyDB.
      Use 'agentic epic phase update {phase_name} --agent <agent-name>' to fix.
    fix_command: "agentic epic phase update <phase-name> --agent <agent-role>"

  agent_types:
    description: |
      Agent types map to agent categories defined in agent-categories.yml.
      The executor uses the agent field value directly as the --role argument when spawning.

    valid_types:
      builder:
        category: "build"
        resolves_to: "build-python or build-flutter based on project type"
        reference: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#build"

      tester:
        category: "test"
        resolves_to: "test-runner for execution, test-builder for test creation"
        reference: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#test"

      deployer:
        category: "deploy"
        resolves_to: "deploy-cicd for CI/CD and setup"
        reference: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#deploy"

      teacher:
        category: "teacher"
        resolves_to: "teacher-update-guidance or teacher-update-assets"
        reference: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#teacher"

      cleaner:
        category: "cleaner"
        resolves_to: "cleaner-core for execution"
        reference: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#cleaner"

      planner:
        category: "planner"
        resolves_to: "Appropriate planner sub-agent"
        reference: "modules/AgenticGuidance/assets/definitions/agent-categories.yml#planner"
        note: "Rarely used as an execution phase agent; planning is usually pre-execution"

      auditor:
        category: "test"
        resolves_to: "test-final-output or test-audit"
        note: "Specialized tester role for quality audits"

  validation_rules:
    agent_field_present:
      rule: "Every phase record in TinyDB must have a non-empty agent field"
      enforcement: "HARD — executor fails phase and halts if agent field is missing"
      check_command: "agentic epic phase list --epic <folder>"

    manifest_alignment:
      rule: "Routed agents must be in orchestrator's manifest.yml spawns fence"
      enforcement: "HARD — executor refuses to spawn agents not in spawns list"
      reference: "modules/AgenticGuidance/agents/orchestration/orchestration-executor/manifest.yml#spawns"

    type_validity:
      rule: "Agent types must match defined categories"
      enforcement: "HARD — unknown agent types cause phase failure"
      error_format: |
        ERROR: Unknown agent type '{type}' in TinyDB for phase '{phase}'.
        Valid types: build-python, build-flutter, test-runner, test-builder,
                     deploy-cicd, teacher-update-guidance, teacher-update-assets,
                     test-final-output, test-audit, planner-build, planner-test

  handling_missing_agent:
    behavior: |
      When executor encounters a phase with no agent field in TinyDB:
      1. Log error with phase name and epic folder
      2. Mark phase status as 'failed' in TinyDB
      3. Append error to execution state
      4. Halt execution of this plan
      5. Report to user with fix command

    error_message_format: |
      ROUTING ERROR: Cannot execute phase '{phase_name}'
      Agent field is not set in TinyDB for this phase.
      Fix: agentic epic phase update {phase_name} --epic {epic_folder} --agent <agent-role>
      Valid agent roles: build-python, test-runner, deploy-cicd, teacher-update-guidance,
                         test-final-output, test-audit, planner-build, planner-test

# =============================================================================
# SECTION 3: FEEDBACK_TRIGGERS PATTERN
# =============================================================================

feedback_triggers:
  definition: |
    FEEDBACK_TRIGGERS define conditions that interrupt normal phase progression
    and trigger corrective actions (re-run a prior phase, retry, or escalation).
    Triggers are stored as the `feedback_triggers` dict on each PhaseData record in TinyDB.
    The executor reads this field after a phase fails and uses it to determine
    which phase to re-set to pending for re-execution.

  tinydb_storage:
    field: "feedback_triggers (dict on PhaseData record)"
    format: |
      Keys are PHASE_NAME_FAILURE strings (uppercase).
      Values are the phase_name to reset to pending.
    example: |
      {
        "INTEGRATION_TEST_FAILURE": "Domain_Build",
        "UNIT_TEST_FAILURE": "Domain_Build"
      }
    set_via: "agentic epic phase update <phase> --feedback-triggers 'KEY:target_phase'"

  trigger_resolution:
    algorithm: |
      1. Phase fails (agent exits non-zero or session marked failed)
      2. Executor reads failed_phase.feedback_triggers from TinyDB
      3. Constructs failure_key: "{PHASE_NAME_UPPER}_FAILURE"
      4. Looks up failure_key in feedback_triggers dict
      5. If target phase name found: verify target exists in TinyDB via repo.get_phase()
      6. If target exists: reset target phase to pending, continue to next iteration
      7. If no trigger matches or target not found: mark phase failed, halt

  trigger_types:
    TEST_FAILURE:
      description: "Test execution reports failing tests"
      detection:
        output_patterns:
          - "test_status: failed"
          - "tests_passed: false"
          - "exit_code: non-zero from test command"
        structured_output:
          - "results.status == 'failed'"
          - "results.failures.count > 0"

      severity_levels:
        unit_test:
          severity: "LOW"
          response: "Fix in current iteration (within test-fix-loop)"
          max_retries: 5
          reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#test-fix-loop"

        integration_test:
          severity: "MEDIUM"
          response: "May require plan update; categorize and decide"
          escalation_threshold: 3

        e2e_test:
          severity: "HIGH"
          response: "Likely requires re-planning"
          escalation_threshold: 1

      response_actions:
        retry: |
          1. Re-spawn builder agent with failure context
          2. Builder attempts fix based on test output
          3. Re-run tests
          4. Increment iteration counter

        re_plan: |
          1. Package TEST_FAILURE context:
             - failure_type: "TEST_FAILURE"
             - failure_details: test output, failing tests, attempted fixes
             - epic_folder: current epic folder
             - iteration_count: number of fix attempts
          2. Invoke orchestration-planning with failure context
          3. Planning agent updates TinyDB phases with revised plan
          4. Resume execution from affected phase

        escalate: |
          1. Mark phase as 'blocked' in TinyDB
          2. Generate failure summary
          3. Present to user with options:
             - Provide fix guidance
             - Skip test
             - Abort execution

    CICD_FAILURE:
      description: "CI/CD validation or pipeline execution fails"
      detection:
        output_patterns:
          - "cicd_status: failed"
          - "pipeline_error: true"
          - "validation_result: invalid"
        exit_codes:
          - "Non-zero from deploy-cicd audit"
          - "Pipeline lint errors"

      failure_categories:
        configuration_error:
          description: "Invalid CI/CD configuration syntax or structure"
          severity: "MEDIUM"
          response: "Return to build phase for configuration fix"

        integration_error:
          description: "CI/CD works but fails with current codebase"
          severity: "HIGH"
          response: "May require coordinated plan update"

        infrastructure_error:
          description: "External service or permission issue"
          severity: "CRITICAL"
          response: "Escalate immediately to user"

      response_actions:
        retry: |
          1. Re-spawn deploy-cicd with previous failure context
          2. Deploy agent attempts configuration fix
          3. Re-run validation
          4. Increment retry counter (max: 3)

        re_plan: |
          1. Package CICD_FAILURE context:
             - failure_type: "CICD_FAILURE"
             - failure_category: configuration_error | integration_error
             - failure_details: validation output, config files affected
             - epic_folder: current epic folder
          2. Invoke orchestration-planning
          3. Planning agent updates TinyDB phases
          4. Resume with updated phases

        escalate: |
          1. Mark CI/CD phase as 'blocked' in TinyDB
          2. Generate infrastructure/permission report
          3. Present to user with:
             - Root cause analysis
             - Suggested manual steps
             - Option to skip CI/CD validation

    BUILD_FAILURE:
      description: "Build process fails to complete successfully"
      detection:
        output_patterns:
          - "build_status: failed"
          - "compilation_error: true"
          - "build_complete: false"
        exit_codes:
          - "Non-zero from build command"
          - "Compilation or linking errors"

      failure_categories:
        compilation_error:
          description: "Source code fails to compile"
          severity: "MEDIUM"
          response: "Fix code and retry build"

        dependency_error:
          description: "Missing or incompatible dependencies"
          severity: "MEDIUM"
          response: "Resolve dependencies and retry"

        configuration_error:
          description: "Build configuration is invalid"
          severity: "LOW"
          response: "Fix build config and retry"

      response_actions:
        retry: |
          1. Re-spawn builder agent with failure context
          2. Builder attempts fix based on build output
          3. Re-run build
          4. Increment retry counter (max: 5)

        re_plan: |
          1. Package BUILD_FAILURE context:
             - failure_type: "BUILD_FAILURE"
             - failure_category: compilation_error | dependency_error | configuration_error
             - failure_details: build output, error messages
             - epic_folder: current epic folder
          2. Invoke orchestration-planning
          3. Planning agent updates TinyDB phases
          4. Resume from build phase

        escalate: |
          1. Mark build phase as 'blocked' in TinyDB
          2. Generate build failure report
          3. Present to user with:
             - Error details
             - Attempted fixes
             - Suggested next steps

    GUIDANCE_GAP:
      description: "Guidance validation reveals missing or unclear guidance"
      detection:
        output_patterns:
          - "guidance_complete: false"
          - "friction_points: [list]"
          - "gaps_found: true"
        simulator_output:
          - "test-guidance-simulator reports friction"
          - "Agent unable to complete task without additional context"

      gap_categories:
        build_process:
          description: "Build steps are unclear or incomplete"
          route_to: "planner-build for plan update"

        test_design:
          description: "Test strategy or coverage is insufficient"
          route_to: "planner-test for plan update"

        guidance:
          description: "Agent guidance files need improvement"
          route_to: "planner-guidance for guidance plan"

      response_actions:
        categorize: |
          1. Parse friction report from test-guidance-simulator
          2. Classify each gap by category (build_process, test_design, guidance)
          3. Group gaps for efficient remediation

        re_plan: |
          1. Package GUIDANCE_GAP context:
             - failure_type: "GUIDANCE_GAP"
             - gap_category: build_process | test_design | guidance
             - friction_report: structured gap details
             - affected_agents: list of agents with gaps
             - epic_folder: current epic folder
          2. Route to appropriate planner based on gap_category
          3. Planner updates TinyDB phases with remediation steps
          4. Execute remediation via teacher agents
          5. Re-run guidance validation

        escalate: |
          1. If max_iterations (3) reached without resolution
          2. Mark guidance phase as 'blocked' in TinyDB
          3. Present gap summary to user
          4. Request clarification or additional context

    AUDIT_FAILURE:
      description: "Final audit reveals quality or completeness issues"
      detection:
        output_patterns:
          - "audit_passed: false"
          - "quality_issues: [list]"
          - "completion_status: incomplete"
        auditor_output:
          - "test-final-output reports issues"
          - "Required artifacts missing"
          - "Quality criteria not met"

      failure_categories:
        missing_outputs:
          description: "Required deliverables not present"
          severity: "HIGH"
          response: "Return to relevant build phase"

        quality_issues:
          description: "Outputs exist but do not meet quality bar"
          severity: "MEDIUM"
          response: "Re-plan with quality feedback"

        documentation_gaps:
          description: "Required documentation incomplete"
          severity: "LOW"
          response: "May defer or create documentation task"

      response_actions:
        re_plan: |
          1. Package AUDIT_FAILURE context:
             - failure_type: "AUDIT_FAILURE"
             - failure_category: missing_outputs | quality_issues | documentation_gaps
             - audit_report: detailed findings from test-final-output
             - affected_phases: which build phases produced failing outputs
             - epic_folder: current epic folder
          2. Invoke orchestration-planning with context
          3. Planning agent updates TinyDB phases with remediation
          4. Resume execution targeting specific issues

        escalate: |
          1. Mark execution as 'blocked' at final audit (update TinyDB phase status)
          2. Generate completion status report
          3. Present to user with:
             - What passed vs. what failed
             - Effort estimate for remediation
             - Option to accept partial completion

    UAT_FAILURE:
      description: "User acceptance testing reveals user journey failures"
      detection:
        output_patterns:
          - "uat_status: failed"
          - "user_stories_passed: false"
          - "story_failures: [list]"
        simulator_output:
          - "test-user-simulator reports story failure"
          - "User journey could not be completed"
          - "Acceptance criteria not met"

      failure_categories:
        story_failure:
          description: "User story test did not pass"
          severity: "HIGH"
          response: "Re-plan with story failure context"

        missing_story:
          description: "Required user stories not defined"
          severity: "MEDIUM"
          response: "Create stories via planner-test UAT planning"

        environment_issue:
          description: "UAT environment not properly configured"
          severity: "LOW"
          response: "Fix environment setup and retry"

      response_actions:
        retry: |
          1. Re-spawn test-user-simulator with failure context
          2. Simulator re-attempts failed stories
          3. Increment iteration counter (max: 3)

        re_plan: |
          1. Package UAT_FAILURE context:
             - failure_type: "UAT_FAILURE"
             - failure_category: story_failure | missing_story | environment_issue
             - failed_stories: list of stories that failed
             - story_outputs: detailed failure information
             - epic_folder: current epic folder
          2. Invoke orchestration-planning with context
          3. Planning agent updates TinyDB phases
          4. Resume with updated phases

        escalate: |
          1. Mark UAT phase as 'blocked' in TinyDB
          2. Generate user journey failure report
          3. Present to user with:
             - Which stories passed vs. failed
             - Root cause analysis
             - Suggested remediation approach
             - Option to accept partial UAT

      reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#user-story-validation-loop"
      note: "UAT is PRIMARY SUCCESS CRITERIA - validates user needs are met"

    ERROR_REQUIRES_PLANNING:
      description: "Agent discovered error outside current plan scope that needs separate remediation"
      detection:
        output_patterns:
          - "out_of_scope_error: true"
          - "remediation_plan_needed: true"
          - "spawned_planning_folder: <folder_name>"
        agent_output:
          - "Agent reports error context with error_outside_plan_scope flag"
          - "Agent may have already created planning folder"

      priority_levels:
        critical:
          severity: "CRITICAL"
          response: "Pause current execution, ensure remediation plan created, await user decision"
          blocking: true
        high:
          severity: "HIGH"
          response: "Log remediation plan, continue current execution"
          blocking: false
        medium:
          severity: "MEDIUM"
          response: "Log remediation plan, continue current execution"
          blocking: false
        low:
          severity: "LOW"
          response: "Log for tracking, optionally create plan"
          blocking: false

      response_actions:
        create_remediation_plan: |
          1. If agent did not already create plan folder:
             - Generate plan name using standard naming: YYMMDDXX_<description>
             - Create folder: agentic agent epic init <branch> --description <desc>
             - Write seed file with error context
          2. Log remediation plan reference in current execution state
          3. If CRITICAL: Pause and ask user whether to continue or address first
          4. If HIGH/MEDIUM/LOW: Continue execution, report at shutdown

        executor_tracking: |
          Maintain a remediation_plans_spawned list in the execution state:
          - plan_name: string
          - error_type: string
          - priority: CRITICAL|HIGH|MEDIUM|LOW
          - spawned_by: agent that detected the issue
          - current_epic: epic folder that was executing when discovered

      protocol_reference: "modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml"
      note: |
        Unlike TEST_FAILURE/BUILD_FAILURE which re-run phases in the CURRENT epic,
        ERROR_REQUIRES_PLANNING spawns a SEPARATE epic/planning folder.
        The current epic continues execution unless priority is CRITICAL.

  max_iterations_handling:
    definition: |
      Each feedback loop has a maximum iteration count defined in the PhaseData.loop_max_iterations
      field in TinyDB. When max iterations are reached without resolution, executor must escalate.

    iteration_tracking:
      storage: "Iteration count tracked in executor in-memory state and execution_state.yml"
      tinydb_field: "PhaseData.loop_max_iterations — set via agentic epic phase add/update"

    escalation_path:
      trigger: "iteration >= max_iterations AND status != completed"
      actions:
        - "1. Mark phase status as 'blocked' in TinyDB"
        - "2. Preserve all iteration context in execution_state.yml (attempts, failures, partial fixes)"
        - "3. Generate escalation summary with:"
        - "   - Total iterations attempted"
        - "   - Failure patterns observed"
        - "   - Partial progress made"
        - "   - Recommended next steps"
        - "4. Present to user for decision"

      user_options:
        continue: "User provides additional context; reset iteration count; update TinyDB phase to pending"
        skip: "User accepts current state; mark phase as 'completed_with_issues' in TinyDB"
        abort: "User terminates execution; preserve state in TinyDB and execution_state.yml for later resume"

# =============================================================================
# SECTION 4: STATE MODEL
# =============================================================================

state_model:
  definition: |
    The executor maintains execution state exclusively in TinyDB.
    Phase status transitions are written to TinyDB via EpicRepository.update_phase().
    No MMD files or YAML ticket files are used to track execution state.

  phase_status_values:
    pending:
      description: "Phase has not started"
      transitions_to: ["in_progress", "blocked"]
      initial_state: true

    in_progress:
      description: "Phase is currently executing"
      transitions_to: ["completed", "failed", "blocked"]
      constraints:
        - "Only ONE phase may be in_progress at a time"
        - "Must have routed agent actively spawned"

    completed:
      description: "Phase finished successfully"
      transitions_to: []  # Terminal state
      requirements:
        - "Agent exited with success status"
        - "No active feedback triggers"

    failed:
      description: "Phase encountered unrecoverable error"
      transitions_to: ["in_progress"]  # Can retry after re-planning or trigger reset
      requirements:
        - "Failure reason documented in execution_state.yml"
        - "Feedback trigger (if any) has reset target phase to pending"

    blocked:
      description: "Phase cannot proceed without user input"
      transitions_to: ["in_progress", "pending"]  # User can unblock
      triggers:
        - "Max iterations reached"
        - "Missing agent field in TinyDB"
        - "Missing dependencies"
        - "Escalation from feedback trigger"

    completed_with_issues:
      description: "Phase finished but with known issues (user-approved skip)"
      transitions_to: []  # Terminal state with caveats
      requirements:
        - "User explicitly approved continuation"
        - "Issues documented in execution_state.yml"

  state_transitions:
    valid_transitions:
      pending_to_in_progress:
        trigger: "Executor begins phase execution"
        action: "EpicRepository.update_phase(epic, phase, {status: in_progress})"

      in_progress_to_completed:
        trigger: "Agent session exits with success; no feedback triggers"
        action: "EpicRepository.update_phase(epic, phase, {status: completed})"

      in_progress_to_failed:
        trigger: "Agent session fails; no feedback trigger resolves it"
        action: "EpicRepository.update_phase(epic, phase, {status: failed})"

      in_progress_to_blocked:
        trigger: "Escalation required (max iterations, missing agent field)"
        action: "EpicRepository.update_phase(epic, phase, {status: blocked})"

      blocked_to_in_progress:
        trigger: "User provides resolution and resets phase"
        action: "EpicRepository.update_phase(epic, phase, {status: pending})"

      failed_to_in_progress:
        trigger: "Feedback trigger resets a prior phase to pending"
        action: "EpicRepository.update_phase(epic, prior_phase, {status: pending})"

  persistence:
    single_source_of_truth: |
      TinyDB is the ONLY authoritative state store for phase execution status.
      All state transitions are persisted by calling EpicRepository.update_phase().
      In-memory execution_state.yml provides a compact session-level summary
      (active sessions, completed outcomes, iteration counters) for context recovery
      within a single executor run, but TinyDB is the canonical record.

    tinydb_phase_record:
      location: "TinyDB phases table, queried by epic_folder_name"
      fields_updated_during_execution:
        - "status: pending | in_progress | completed | failed | blocked"
      query_method: "EpicRepository.list_phases(epic_folder_name)"
      update_method: "EpicRepository.update_phase(epic_folder_name, phase_name, updates_dict)"

    execution_state_file:
      location: "{epic_folder_path}/execution_state.yml"
      purpose: "Session-level context (active session IDs, per-phase outcomes, iteration counters)"
      format: |
        current_phase: "Domain_Build"
        active_sessions: ["session-abc123"]
        completed_outcomes:
          - phase: "Environment_Setup"
            outcome: "success"
            agent_used: "build-python"
            completed_at: "2026-03-09T14:15:00Z"
        phases_failed: []
        iteration: 2
        errors: []
      note: |
        execution_state.yml is a scratch file for the current executor run.
        It reduces context accumulation between reasoning turns.
        Authoritative phase status lives in TinyDB, not this file.

  resume_capability:
    definition: |
      The executor can resume execution from the last incomplete phase after
      interruption (crash, user pause, or session timeout).

    resume_algorithm:
      steps:
        - "1. Call EpicRepository.list_phases(epic_folder) to get all phases from TinyDB"
        - "2. Identify resume point:"
        - "   - If any phase is 'in_progress': resume from that phase"
        - "   - If all completed phases are contiguous: start next 'pending' phase"
        - "   - If gap in completed phases: log warning and start from first pending"
        - "3. Load execution_state.yml if present (iteration count, prior outcomes)"
        - "4. Resume execution with preserved context"

    resume_point_identification:
      priority_order:
        - "in_progress phase (highest priority - was interrupted)"
        - "blocked phase (awaiting user input)"
        - "first pending phase after last completed"

    context_preservation:
      preserved_on_resume:
        - "Phase status in TinyDB (survives process restart)"
        - "Iteration count (from execution_state.yml)"
        - "Last failure context (from execution_state.yml)"

      not_preserved:
        - "In-memory agent state (agent restarts fresh)"
        - "Temporary files (must be in declared outputs)"

    crash_recovery:
      scenario: "Executor or agent crashes mid-phase"
      behavior: |
        1. On restart, executor calls list_phases() and detects phase with status='in_progress'
        2. Executor resets phase to pending and restarts it
        3. Iteration count is loaded from execution_state.yml if available
        4. Crash counts as one failed attempt toward max_iterations

# =============================================================================
# SECTION 5: FALLBACK BEHAVIORS
# =============================================================================

fallback_behaviors:
  definition: |
    Fallback behaviors define how the executor handles exceptional conditions
    that are not covered by normal feedback_triggers.

  missing_agent_field:
    scenario: "Phase record in TinyDB has no agent field set"
    detection: "EpicRepository.list_phases() returns PhaseData with agent=None or agent=''"

    fallback_strategy:
      behavior: "Fail the phase immediately with a clear diagnostic message"
      actions:
        - "1. Log error with phase name and epic folder"
        - "2. Write error to execution state"
        - "3. Mark phase status as 'failed' in TinyDB"
        - "4. Halt execution of this epic"
        - "5. Display fix command to user"

      error_message: |
        ROUTING ERROR: Cannot execute phase '{phase_name}' in {epic_folder}
        The phase has no agent field set in TinyDB.
        Fix: agentic epic phase update {phase_name} --epic {epic_folder} --agent <agent-role>
        Valid agent roles: build-python, test-runner, deploy-cicd, teacher-update-guidance,
                           test-final-output, test-audit, planner-build, planner-test

    prevention: |
      Planners must always set the agent field when creating phases via
      `agentic epic phase add --agent <role>`. The planner-build and
      planner-orchestration agents are responsible for ensuring all phases
      have agent fields before execution begins.

  no_phases_in_tinydb:
    scenario: "EpicRepository.list_phases() returns empty list for the epic"
    detection: "len(phases) == 0 after calling list_phases()"

    fallback_strategy:
      behavior: "Delegate to orchestration-planning to populate phases"
      actions:
        - "1. Log warning that no phases found"
        - "2. Check if the epic exists in TinyDB (may be uninitialized)"
        - "3. If epic exists but has no phases: delegate to orchestration-planning"
        - "4. If epic does not exist: create it via agentic epic, then delegate to planning"
        - "5. Once planning completes (phases populated in TinyDB), resume execution"

  agent_spawn_failure:
    scenario: "Routed agent fails to start or immediately crashes"
    detection:
      - "Agent spawn command returns error"
      - "Agent session exits within 30 seconds without output (quick exit)"
      - "Agent reports fatal initialization error"

    fallback_strategy:
      retry_policy:
        max_retries: 3
        backoff: "exponential (1s, 2s, 4s)"
        quick_exit_threshold: "30 seconds"

      on_retry_exhaustion:
        - "1. Mark phase as 'blocked' in TinyDB"
        - "2. Log detailed spawn failure context:"
        - "   - Agent role and epic folder"
        - "   - Spawn command used"
        - "   - Error messages from failed attempts"
        - "   - Session diagnostics if available"
        - "3. Check for common causes:"
        - "   - Agent manifest.yml missing or invalid"
        - "   - Agent dependencies not met"
        - "   - Permission issues"
        - "4. Escalate to user with diagnostic information"

      quick_exit_detection: |
        If a session exits suspiciously fast (< 30 seconds), executor:
        1. Checks session logs for known retryable error patterns
        2. If error is retryable: retry with exponential backoff
        3. If error is not retryable: fail immediately without retrying
        4. If pattern unrecognized: attempt retry up to MAX_SPAWN_RETRIES

  circular_feedback:
    scenario: "Feedback triggers create infinite re-planning loop"
    detection:
      - "Same phase fails with same failure type >3 consecutive times"
      - "Iteration count exceeds loop_max_iterations"

    fallback_strategy:
      circuit_breaker:
        trigger: "iteration >= loop_max_iterations (read from PhaseData in TinyDB)"
        action: |
          1. Break feedback loop
          2. Mark phase as 'blocked' in TinyDB
          3. Generate loop analysis:
             - Failure pattern description
             - Iteration count
             - Hypothesis for root cause
          4. Escalate to user with analysis

      prevention:
        - "Each phase sets loop_max_iterations in TinyDB (via phase add/update)"
        - "Executor tracks iteration count and halts when limit is reached"
        - "User must manually reset phase to pending after providing fix context"

# =============================================================================
# SECTION 6: EXECUTION PROTOCOL
# =============================================================================

execution_protocol:
  definition: |
    The step-by-step protocol for executor operation from startup to completion.

  startup_sequence:
    steps:
      - step: "1. Resolve epic folder"
        actions:
          - "Accept epic_folder input (folder name or path)"
          - "Verify epic exists in TinyDB via EpicRepository"

      - step: "2. Load phase index from TinyDB"
        actions:
          - "Call EpicRepository.list_phases(epic_folder)"
          - "Validate that at least one phase record is returned"
          - "Check that all phases have agent fields set"
          - "Read only phase index fields at startup (name, agent, status, feedback_triggers)"
          - "Do NOT load full ticket details at startup — use JIT loading per Section 11"

      - step: "3. Validate orchestrator manifest"
        actions:
          - "Load orchestrator's manifest.yml"
          - "Extract spawns fence"
          - "Validate all phase agent values are in spawns list"

      - step: "4. Determine resume point"
        actions:
          - "Scan TinyDB phases for in_progress or pending status"
          - "Load execution_state.yml if present (iteration count, last failure)"
          - "Identify starting phase (in_progress takes priority, else first pending)"

      - step: "5. Initialize execution state"
        actions:
          - "Set up logging"
          - "Initialize or restore execution_state.yml"
          - "Initialize iteration counters"
          - "Prepare agent spawn environment"

  phase_execution_loop:
    for_each_phase:
      - step: "1. Transition to in_progress"
        actions:
          - "Call EpicRepository.update_phase(epic, phase, {status: in_progress})"
          - "Write phase start to execution_state.yml"

      - step: "2. Resolve agent"
        actions:
          - "Read agent field from PhaseData (already loaded from TinyDB)"
          - "Verify agent is in spawns fence"
          - "Load full ticket details JIT for this phase only"

      - step: "3. Spawn agent(s)"
        actions:
          - "Prepare agent inputs (phase tickets from TinyDB, context)"
          - "If phase execution=parallel: Group tickets by target_files overlap (see Section 7)"
          - "Spawn agents for parallel task groups concurrently using --ticket flag"
          - "Monitor agent execution"

      - step: "4. Collect output"
        actions:
          - "Receive agent output (success/failure, artifacts)"
          - "Summarise output to <=1 KB outcome record (see Section 11)"
          - "Discard raw output from context after summarisation"
          - "Store summarised outcome in execution_state.yml"

      - step: "5. Evaluate triggers"
        actions:
          - "On failure: read feedback_triggers from PhaseData in TinyDB"
          - "Construct failure_key: '{PHASE_NAME_UPPER}_FAILURE'"
          - "Look up failure_key in feedback_triggers dict"
          - "If trigger found and target phase exists: reset target to pending, continue"
          - "If no trigger: transition failed phase to 'failed' in TinyDB, halt"

      - step: "6. Complete or iterate"
        actions:
          - "If success: call update_phase({status: completed}), record end in execution_state.yml"
          - "If failure + trigger resolved: continue to next iteration"
          - "If failure + no trigger: halt, report to user"

  shutdown_sequence:
    on_completion:
      - "Verify all phases have terminal status in TinyDB"
      - "Generate execution summary"
      - "Archive completed epic if fully complete (update TinyDB status field)"

    on_interruption:
      - "Persist current iteration state to execution_state.yml"
      - "TinyDB phase statuses are already current (written on every transition)"
      - "Log resume point for next session"

    on_escalation:
      - "Mark blocked phase in TinyDB"
      - "Preserve full context in execution_state.yml"
      - "Generate user-facing summary"
      - "Await user input (do not auto-terminate)"

# =============================================================================
# SECTION 7: TASK PARALLELIZATION STRATEGY
# =============================================================================
# Defines how the executor determines which tasks can run in parallel
# based on task-level target_files declarations stored in TinyDB ticket records.

task_parallelization:
  implementation_status: "aspirational - not yet implemented in CLI or executor"
  definition: |
    The executor uses ticket-level `target_files` (read from TinyDB ticket records)
    to determine which tickets within a phase can safely run in parallel.
    NOTE: This algorithm is specified but not yet implemented. Current executor
    runs tasks sequentially within each phase.

  scope: |
    Parallelization applies WITHIN a single epic. Cross-epic parallelism is not
    supported — each epic is a serial orchestration unit.

  conflict_detection_algorithm:
    description: |
      Two tickets conflict if their target_files sets overlap (share any common file path).
      Tickets with non-overlapping target_files can run in parallel.

    steps:
      - "1. Load ticket records for the current phase from TinyDB via EpicRepository"
      - "2. For each pair of tickets, compute set intersection of target_files"
      - "3. If intersection is empty: tickets are INDEPENDENT (can parallelize)"
      - "4. If intersection is non-empty: tickets CONFLICT (must run sequentially)"
      - "5. Build ticket groups where all tickets in a group are mutually independent"

    example:
      tickets:
        - id: "T_001"
          target_files: ["src/service_a.py", "tests/test_a.py"]
        - id: "T_002"
          target_files: ["src/service_b.py", "tests/test_b.py"]
        - id: "T_003"
          target_files: ["src/service_a.py", "src/shared.py"]

      analysis: |
        T_001 ∩ T_002 = {} → INDEPENDENT (can parallelize)
        T_001 ∩ T_003 = {src/service_a.py} → CONFLICT (sequential)
        T_002 ∩ T_003 = {} → INDEPENDENT (can parallelize)

      parallel_groups:
        - group_1: ["T_001", "T_002"]  # Run in parallel
        - group_2: ["T_003"]            # Run after T_001 completes

  task_grouping:
    description: |
      Tickets are grouped into parallel execution batches. Within a batch, all tickets
      run concurrently. Batches execute sequentially.

    algorithm: |
      1. Start with all pending tickets for the phase (read from TinyDB)
      2. Find the maximal set of mutually independent tickets (no pairwise conflicts)
      3. This set forms the next parallel batch
      4. Remove batch tickets from pending set
      5. Repeat until no pending tickets remain

    constraints:
      - "Tickets with explicit `dependencies` must wait for dependencies to complete"
      - "Phase-level `execution: sequential` overrides parallelization (all tickets serial)"
      - "Phase-level `execution: parallel` enables the parallelization algorithm"

  spawning_pattern:
    description: |
      When spawning parallel tickets, the executor uses the --ticket flag to target
      specific tickets within an epic.

    cli_pattern: |
      # Spawn individual ticket within an epic
      agentic session spawn --role <agent> --epic <folder> --ticket <ticket_id> -b --dangerously-skip-permissions

    example: |
      # Parallel batch: T_001 and T_002 can run simultaneously
      agentic session spawn --role build-python --epic 260207XX_feature --ticket T_001 -b --dangerously-skip-permissions
      agentic session spawn --role build-python --epic 260207XX_feature --ticket T_002 -b --dangerously-skip-permissions

      # Sequential: Wait for T_001 to complete, then run T_003
      agentic session spawn --role build-python --epic 260207XX_feature --ticket T_003 -b --dangerously-skip-permissions

  missing_target_files:
    behavior: |
      If a ticket does not declare target_files in TinyDB, it is treated as potentially
      conflicting with ALL other tickets in the phase. This forces sequential execution
      for that ticket. Planners should always include target_files on every ticket.

# =============================================================================
# SECTION 8: INTEGRATION POINTS
# =============================================================================

integration_points:
  agentic_cli:
    description: "CLI commands the executor uses for epic operations"
    commands:
      - "agentic epic phase list --epic <folder>: List all phases with status from TinyDB"
      - "agentic epic phase update <phase> --status <status>: Update phase status in TinyDB"
      - "agentic epic ticket list --epic <folder>: List all tickets for phase routing"
      - "agentic epic move folder: Archive epic folder to completed/"

  tinydb_api:
    description: "EpicRepository methods used by the executor"
    methods:
      list_phases: "EpicRepository.list_phases(epic_folder_name) -> list[PhaseData]"
      get_phase: "EpicRepository.get_phase(epic_folder_name, phase_name) -> Optional[PhaseData]"
      update_phase: "EpicRepository.update_phase(epic_folder_name, phase_name, updates: dict)"
      list_tickets: "EpicRepository.list_tickets(epic_folder_name) -> list[TicketData]"
      has_pending_phases: "EpicRepository.has_pending_phases(epic_folder_name) -> bool"

  orchestration_planning:
    description: "Interface for delegating to planning agent"
    invocation:
      trigger: "Feedback trigger requires re-planning or no phases in TinyDB"
      inputs:
        - "failure_context: Structured failure information"
        - "epic_folder: Current epic folder"
        - "iteration_count: How many attempts made"
      outputs:
        - "Updated phases written to TinyDB by planner agent"
        - "Executor resumes by calling list_phases() again"

  agent_spawning:
    description: "How executor spawns agents"
    mechanism: |
      Executor uses standard agent spawning protocol:
      1. Read agent field from PhaseData in TinyDB
      2. Prepare input payload (phase tickets from TinyDB, context)
      3. Spawn agent via CLI: agentic session spawn --role <agent> --epic <folder>
      4. Monitor session state via sdk_pane_runner or tmux polling
      5. Collect exit status and summarised output

# =============================================================================
# SECTION 9: EXAMPLES
# =============================================================================

examples:
  phase_index_from_tinydb:
    description: "Phase records returned by EpicRepository.list_phases() at executor startup"
    content: |
      [
        PhaseData(name="Environment_Setup", agent="build-python", status="pending",
                  loop_max_iterations=3, max_turns=30, _order=1,
                  feedback_triggers={}),
        PhaseData(name="Domain_Build", agent="build-python", status="pending",
                  loop_max_iterations=5, max_turns=50, _order=2,
                  feedback_triggers={"DOMAIN_BUILD_FAILURE": "Domain_Build"}),
        PhaseData(name="Integration_Test", agent="test-runner", status="pending",
                  loop_max_iterations=3, max_turns=40, _order=3,
                  feedback_triggers={"INTEGRATION_TEST_FAILURE": "Domain_Build"}),
        PhaseData(name="CI_CD_Validation", agent="deploy-cicd", status="pending",
                  loop_max_iterations=2, max_turns=20, _order=4,
                  feedback_triggers={})
      ]

  status_update_sequence:
    description: "TinyDB status updates as execution progresses"
    scenario: "Environment_Setup completes, Domain_Build starts"
    before:
      tinydb: |
        Environment_Setup: status=in_progress
        Domain_Build: status=pending
        Integration_Test: status=pending
    after:
      tinydb: |
        Environment_Setup: status=completed
        Domain_Build: status=in_progress
        Integration_Test: status=pending

  feedback_trigger_resolution:
    description: "Feedback trigger resets a prior phase on failure"
    scenario: "Integration_Test fails; trigger resets Domain_Build to pending"
    trigger_record: |
      PhaseData(
        name="Integration_Test",
        feedback_triggers={"INTEGRATION_TEST_FAILURE": "Domain_Build"}
      )
    execution_flow: |
      1. Integration_Test fails (agent exits non-zero)
      2. Executor reads feedback_triggers: {"INTEGRATION_TEST_FAILURE": "Domain_Build"}
      3. Constructs failure_key: "INTEGRATION_TEST_FAILURE"
      4. Looks up target: "Domain_Build"
      5. Calls repo.get_phase(epic, "Domain_Build") — exists, confirmed
      6. Calls repo.update_phase(epic, "Integration_Test", {status: failed})
      7. Calls repo.update_phase(epic, "Domain_Build", {status: pending})
      8. Next iteration: list_phases() picks up Domain_Build as next pending
      9. Domain_Build re-executes with fix context from Integration_Test failure

# =============================================================================
# SECTION 10: VALIDATION CHECKLIST
# =============================================================================

validation_checklist:
  pre_execution:
    - "EpicRepository.list_phases() returns at least one phase for the epic"
    - "All phase records have a non-empty agent field in TinyDB"
    - "All phase agents are valid role names"
    - "All phase agents are in orchestrator's spawns fence"
    - "Epic folder exists and is accessible"

  during_execution:
    - "Only one phase in_progress at a time"
    - "Status transitions follow valid paths"
    - "Iteration counts do not exceed loop_max_iterations from TinyDB"
    - "Spawned agents match agent field from TinyDB"
    - "Output artifacts are written to declared locations"

  post_execution:
    - "All phases have terminal status in TinyDB (completed, failed, blocked, completed_with_issues)"
    - "Execution summary generated and written to execution_state.yml"
    - "Epic archived in TinyDB if fully complete"

# =============================================================================
# SECTION 11: CONTEXT BUDGET MANAGEMENT
# =============================================================================
# Normative requirements for preventing context overflow during orchestration.
# These constraints are MUST-follow (not advisory) and prevent the executor
# from exhausting its context window when managing concurrent sub-agents.
#
# BACKGROUND:
# Session 3ee29cd2 (2026-03-02) ran out of context after 54 turns while
# executing 22 concurrent sub-agents. Root cause: agent retrieval payloads
# (~35 KB each) accumulated in context during polling, consuming ~770 KB
# per poll cycle. After 2-3 cycles the context window was exhausted.
#
# REFERENCE: docs/epics/live/260303AG_reduce_orchestration_context_overflow/README.md

context_budget_management:
  definition: |
    The context budget management system prevents executor context overflow through
    five complementary mechanisms: output summarisation, batched polling, state file
    offloading, JIT phase loading, and concurrency limiting. These mechanisms are
    normative constraints, not optional optimisations.

  # ---------------------------------------------------------------------------
  # CONTEXT BUDGET BREAKDOWN
  # ---------------------------------------------------------------------------
  context_budget_table:
    description: "Expected context consumption per component with mitigations applied"
    entries:
      - component: "System prompt + guidance"
        without_mitigation: "~50 KB"
        with_mitigation: "~50 KB"
        notes: "Fixed overhead, not reducible"

      - component: "Phase index from TinyDB (startup)"
        without_mitigation: "~100 KB (all ticket details)"
        with_mitigation: "~10 KB (phase index only)"
        notes: "JIT loading reduces 90%"

      - component: "Per-phase ticket details from TinyDB"
        without_mitigation: "~15 KB × N phases (accumulated)"
        with_mitigation: "~15 KB (current phase only)"
        notes: "JIT load + discard after summarisation"

      - component: "Agent launch messages"
        without_mitigation: "~1 KB × N agents"
        with_mitigation: "~1 KB × 8 agents max"
        notes: "Concurrency limit caps N at 8"

      - component: "Agent retrieval payloads (per poll turn)"
        without_mitigation: "~35 KB × N agents polled"
        with_mitigation: "~1 KB × 5 agents (summarised)"
        notes: "Batched polling + summarisation"

      - component: "Execution state"
        without_mitigation: "Accumulated in context turns"
        with_mitigation: "~5 KB (execution_state.yml read)"
        notes: "State offloaded to execution_state.yml"

      - component: "Total per-turn budget"
        without_mitigation: "~820 KB+ (with 22 agents)"
        with_mitigation: "~80 KB max"
        notes: "10× reduction"

  # ---------------------------------------------------------------------------
  # NORMATIVE REQUIREMENTS
  # ---------------------------------------------------------------------------
  requirements:
    output_summarisation:
      level: "MUST"
      description: |
        After collecting agent output, the executor MUST summarise the result to a
        fixed-size outcome record (≤1 KB) capturing: outcome, key_artifacts,
        ticket_ids_completed, errors (truncated to 500 chars), and agent_id.
        Full raw output MUST be discarded from context after summarisation.
      reference: "process.yml#loop_collect_output"
      violation: "Context overflow from accumulated raw agent outputs"

    batched_polling:
      level: "MUST"
      description: |
        The executor MUST poll agents in batches of at most POLL_BATCH_SIZE (default: 5)
        per reasoning turn. After each batch, outcomes are written to execution_state.yml.
        The next turn reads the state summary, not raw outputs from prior turns.
      reference: "process.yml#loop_batched_polling"
      default_value: 5
      configurable_via: "TinyDB epic metadata field: poll_batch_size"
      violation: "Single-turn context spike from polling all agents simultaneously"

    state_file_offloading:
      level: "MUST"
      description: |
        The executor MUST maintain a persistent execution_state.yml file in the epic
        folder. All running state (active sessions, completed outcomes, current phase,
        poll cycle counter, blocked tickets) MUST be written to this file rather than
        held in accumulated context turns. At the start of each reasoning turn, the
        executor reads this compact state file (~2-5 KB) for context recovery.
      reference: "process.yml#startup_init_state_file"
      file_location: "{epic_folder_path}/execution_state.yml"
      violation: "Context accumulation from state held across reasoning turns"

    jit_phase_loading:
      level: "MUST"
      description: |
        At startup, the executor MUST load only the phase index (phase names, agent
        routing, status, triggers) from TinyDB — NOT full ticket descriptions.
        Full ticket details (description, success_criteria, inputs, target_files)
        MUST be loaded just-in-time from TinyDB when spawning agents for a specific
        phase, then discarded from context after the phase's outcome is summarised.
      reference: "process.yml#startup_load_phases"
      startup_budget: "~10 KB (phase index only)"
      per_phase_budget: "~15 KB (loaded on demand from TinyDB, discarded after use)"
      violation: "100 KB+ startup context from loading all ticket details upfront"

    concurrency_limiting:
      level: "MUST"
      description: |
        The executor MUST NOT spawn more than MAX_CONCURRENT_AGENTS (default: 8)
        sub-agents simultaneously. When a phase has more tickets than the limit,
        tickets MUST be divided into sub-waves. Each wave completes before the
        next wave is spawned.
      reference: "process.yml#loop_spawn_agent"
      default_value: 8
      configurable_via: "TinyDB epic metadata field: max_concurrent_agents"
      violation: "Unbounded concurrency leading to massive poll-cycle payloads"

  # ---------------------------------------------------------------------------
  # CONTEXT OVERFLOW DETECTION
  # ---------------------------------------------------------------------------
  overflow_detection:
    description: |
      The executor SHOULD monitor for signs of approaching context limits and
      take corrective action before compaction failure occurs.

    warning_signals:
      - signal: "Reasoning turn produces >50 KB of new context"
        action: "Verify summarisation is working; reduce POLL_BATCH_SIZE to 3"
      - signal: "execution_state.yml exceeds 10 KB"
        action: "Prune completed_sessions to last 10 entries"
      - signal: "More than 30 reasoning turns in a single phase"
        action: "Write checkpoint to execution_state.yml; consider context compaction"
      - signal: "Agent output cannot be summarised to ≤1 KB"
        action: "Truncate to first 500 chars; set outcome: failure; log warning"

    escalation: |
      If context overflow is imminent (compaction warnings, degraded responses):
      1. Write full state to execution_state.yml immediately
      2. Log warning: "CONTEXT BUDGET WARNING: Approaching context limit"
      3. Reduce POLL_BATCH_SIZE to 1 (poll one agent at a time)
      4. If still insufficient: transition to blocked, ask user to resume
         with a fresh session (TinyDB phase statuses enable seamless resume)
