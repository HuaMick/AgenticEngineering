# Layer 5: Planner Shared
# Planning-specific definitions and iteration guidelines
# Used by: 8 planner agents across various planning and strategy operations

layer_name: "planner-shared"
description: "Shared planning resources including role matrices, plan inputs, folder structures, and iteration approaches for all planner agents"
version: "1.0"

references:
  - path: "modules/AgenticGuidance/docs/agent-role-scope-matrix.md"
    description: "Matrix defining agent roles, scopes, and responsibilities"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/plan-inputs.yml"
    description: "Standard inputs required for plan creation"
    required: true

  - path: "modules/AgenticGuidance/assets/definitions/plans.yml#path_conventions"
    description: "Path conventions and folder structure for plans"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
    description: "Iteration principles and approaches for planning"
    required: true

  - path: "modules/AgenticGuidance/assets/definitions/planner-components.yml"
    description: "Component inventory and usage guidance - reusable MMD orchestration patterns"
    required: true

  - path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/"
    description: "Phase template components (build, test, uat, cleanup, teach) for orchestration composition"
    required: true

# README Discovery Pattern for Planning Scope
readme_discovery:
  signpost: |
    Check module README.md for implementation status before planning.
    READMEs document what exists, what's planned, and current limitations.
    Include README updates as part of plan scope when implementation changes behavior.

  pattern:
    discovery_steps:
      - "Identify modules in scope from objective"
      - "Read each module's README.md for current implementation status"
      - "Note any TODOs, planned features, or known limitations"
      - "Check if planned work addresses documented gaps"

    include_readme_updates:
      - "When adding new public APIs or entrypoints"
      - "When changing documented behavior or interfaces"
      - "When completing features marked as TODO in README"
      - "When deprecating or removing functionality"

    example_task_with_readme:
      id: "task_example"
      name: "Add batch processing to data loader"
      inputs:
        - "modules/DataLoader/README.md"          # Current implementation status
        - "modules/DataLoader/src/loader.py"      # Implementation to modify
      target_files:
        - "modules/DataLoader/src/loader.py"
        - "modules/DataLoader/README.md"          # Update docs for new feature
      guidance: "Add batch processing and update README to document new capability"
