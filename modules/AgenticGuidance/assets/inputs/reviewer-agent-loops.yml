# Reviewer-Focused Agent Loop Definitions
# Minimal slice of agent-loops.yml for planner-reviewer context.
#
# SCOPE: Loops relevant to plan review function only.
# For complete loop definitions, see: modules/AgenticGuidance/assets/definitions/agent-loops.yml
#
# Excludes: test-fix-loop, cleaner-dependency-loop, guidance-test-loop,
#           user-story-validation-loop, exploration-loop, documentation-loop,
#           agent-self-review, guidance-self-review-loop (execution loops not needed for review)

agent_loop:
  concept: |
    An agent loop is an iterative execution pattern where multiple agents collaborate
    in cycles until success criteria are met or maximum iterations reached.

    Key characteristics:
    - Multiple agents with distinct roles collaborate in each iteration
    - Each iteration produces feedback that guides the next
    - Loops have explicit exit conditions (success or max iterations)

loop_types:
  planner-loop:
    purpose: "Iterative planning with reviewer feedback"
    phase: "planning"
    when_to_use: "To create and refine implementation plans"
    maximum_iterations: 5
    core_pattern: "Define Phases -> Populate Phases -> Review -> Repeat"
    reviewer_role: |
      The planner-reviewer participates in this loop by:
      - Validating plan structure against checklists
      - Checking phase ordering and mandatory loop inclusion
      - Providing APPROVE/REJECT decisions with actionable feedback
      - Triggering cleanup on approval (archive audit/review files)

  audit-test-fix-loop:
    purpose: "Validate test quality and detect reward hacking"
    phase: "test-validation"
    maximum_iterations: 3
    mandatory: true
    note: "Reviewers must verify plans include this loop after cleanup phases"

mandatory_loops:
  audit-test-fix-loop:
    reason: "Must ALWAYS be included after cleanup - catches reward hacking and test quality issues"
  reviewer_validation: |
    When reviewing plans, verify mandatory loops are present:
    - Plans with cleanup phases MUST include audit-test-fix-loop afterward
    - Reject plans missing mandatory loops with specific feedback

exit_conditions:
  success: "All validation criteria met"
  max_iterations: "Escalate to human for decision"
  blocked: "Cannot proceed - escalate with context"
