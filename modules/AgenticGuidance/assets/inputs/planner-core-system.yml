# Layer 1P: Planner Core System
# Specialized subset of core-system.yml for planner agents
#
# PURPOSE:
# Reduces token usage by including ONLY system definitions relevant to planning work.
# Planners need epic structure but not the full architecture pattern details.
#
# AUDIT SOURCE: T4.1 Phase Audit (260109)
# Analyzed: planner-build, planner-test, planner-audit
#
# INCLUDED:
# - plans.yml: ESSENTIAL - defines epic types, lifecycle, file taxonomy, completion patterns
#
# EXCLUDED (with justification):
# - architecture-pattern.yml: Domain->Workflow->Entrypoint is builder-specific detail;
#   planner-build references this directly in its core_inputs when needed
# - ARCHITECTURE.md: Reference documentation, not actionable input for planning;
#   agents can reference this directly if exploration is needed

layer_name: "planner-core-system"
description: "Planning-specific system definitions for planner agents - includes epic structure, excludes architecture implementation details"
version: "1.0"

references:
  - path: "modules/AgenticGuidance/assets/definitions/plans.yml"
    description: "Epic structure, lifecycle, file taxonomy, and completion patterns - essential for all planners"
    required: true
