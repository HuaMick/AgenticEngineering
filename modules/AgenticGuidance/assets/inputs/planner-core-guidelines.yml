# Layer 2P: Planner Core Guidelines
# Specialized subset of core-guidelines.yml for planner agents
#
# PURPOSE:
# Reduces token usage by including ONLY guidelines relevant to planning work.
# Excludes testing.yml (test-category-specific) and safety.yml (operational concerns).
#
# AUDIT SOURCE: T4.1 Phase Audit (260109)
# Analyzed: planner-cleaning, planner-build, planner-test, planner-guidance, planner-reviewer
#
# INCLUDED:
# - fix-the-source.yml: Root cause analysis for plan creation
# - context-minimisation.yml: Essential for reducing plan complexity
# - experiment-first.yml: Discovery before planning
# - less-is-more.yml: Minimal viable plans
# - worktree-and-branching.yml: Branch strategy for plan organization
# - response-audit.yml: Final verification of plan output
#
# EXCLUDED (with justification):
# - testing.yml: Test-category-specific; planners reference test strategies directly
# - safety.yml: Operational concerns for builders/testers, not planners

layer_name: "planner-core-guidelines"
description: "Planning-specific behavioral guidelines for planner agents - reduces context by excluding test and operational guidelines"
version: "1.0"

references:
  - path: "modules/AgenticGuidance/assets/guidelines/fix-the-source.yml"
    description: "Principle of addressing root causes in plan creation"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Strategies for minimizing context in plans"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/experiment-first.yml"
    description: "Discovery and experimental validation before planning"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/less-is-more.yml"
    description: "Simplicity and minimalism in plan design"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
    description: "Git worktree and branching strategies for plan organization"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/response-audit.yml"
    description: "Response quality and audit guidelines for plan output"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/plan-completion.yml"
    description: "Standard patterns for managing plan file lifecycle (Copy-and-Sync)"
    required: true
