# Layer: Deploy-Minimal Guidelines
# Lightweight layer for ALL deploy agents requiring minimal context
# Used by: deploy-cicd, deploy-release, deploy-cloud, deploy-docs
#
# This layer provides only the essential guidelines for deploy operations,
# excluding heavy guidelines that are not relevant to deployment tasks.
# Estimated savings: ~400 tokens per agent vs core-guidelines.yml

layer_name: "deploy-minimal"
description: "Lightweight guidelines for deploy agents - only essential context"
version: "1.0"

# Guidelines selection rationale:
# - context-minimisation: Meta-relevant for all agents
# - safety: Always required for system integrity
#
# Excluded from core-guidelines (not needed for deploy):
# - fix-the-source.yml: Guidance improvement focus
# - experiment-first.yml: Development focus
# - less-is-more.yml: Development focus
# - testing.yml: Test agent focus
# - response-audit.yml: Response quality focus

references:
  - path: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    description: "Meta-guidance for minimizing context overhead"
    required: true

  - path: "modules/AgenticGuidance/assets/guidelines/safety.yml"
    description: "Safety protocols and constraints (always required)"
    required: true
