# Key Takeaways - Async Workflow Patterns
# ==============================================
key_takeaways:
  timing_and_sessions:
    description: "Demonstrates the async nature of the question workflow"
    timeline:
      - time: "14:30:00"
        event: "Agent blocks on question, creates Q-20260203-143022-a1b2"
        session: "session-1"

      - time: "14:32:15"
        event: "Agent exits gracefully, task marked as blocked"
        session: "session-1 ends"

      - time: "16:45:30"
        event: "Human reviews and answers question (2h 13m later)"
        session: "human interaction"

      - time: "17:00:00"
        event: "Orchestrator resumes task with new agent session"
        session: "session-2 starts"

      - time: "17:00:15"
        event: "Agent checks for answer, finds it, proceeds"
        session: "session-2"

      - time: "17:25:45"
        event: "Agent completes task successfully"
        session: "session-2 ends"

  blocking_behavior:
    description: "Clear pattern for blocking and resuming"
    agent_responsibilities:
      - "Recognize when decision requires human judgment"
      - "Generate question with full context and research"
      - "Exit gracefully with clear status update"
      - "On resumption, CHECK for answers first"
      - "Apply answer and document decision"

    human_responsibilities:
      - "Review pending questions periodically"
      - "Provide clear answers with rationale"
      - "Include implementation requirements and constraints"
      - "Specify confidence level if applicable"

  resumption_check_pattern:
    description: "Critical pattern: always check for answers on resume"
    code_pattern: |
      # ALWAYS check for answers when resuming blocked task
      from agenticguidance.services.question import QuestionQueue

      queue = QuestionQueue(plan_path)
      question = queue.get_question(question_id)

      if question and question.status == "answered":
          # Proceed with answer applied
          answer = question.answer
          # implement using answer...
      else:
          # Still blocked, exit again or escalate
          pass

  answer_quality:
    description: "High-quality answer includes multiple components"
    components:
      decision: "Clear choice (use in-memory caching)"
      rationale: "Why this choice (single-instance, simplicity)"
      requirements: "What to implement (lru_cache, TTL, logging)"
      constraints: "What NOT to do (no Redis dependency)"
      future_path: "Migration strategy (Redis if needed later)"

  documentation_trail:
    description: "Complete audit trail from question to implementation"
    artifacts:
      - "Question YAML with full context and research"
      - "Answer YAML with decision and rationale"
      - "Commit message referencing question ID"
      - "Code comments documenting architectural decision"
      - "Test coverage for chosen approach"

