# Builder Question Workflow - Complete End-to-End Example
# This example demonstrates the full lifecycle of a builder agent blocking on a question,
# receiving a human answer, and resuming execution with the answer applied.

example_name: "Complete Builder Question Workflow with Async Resumption"
description: |
  End-to-end scenario showing a builder agent working on a task, encountering a blocking
  decision requiring human judgment, generating a question, and resuming after receiving
  an answer. Demonstrates the async nature of the workflow with clear session boundaries.

# ==============================================
# PART 1: Implementation Phase - Blocking
# ==============================================
part_1_implementation_blocking:
  context: |
    A build-python agent is implementing task build_003: "Add caching layer to third-party
    API integration". The agent encounters an architectural decision that requires human
    judgment about which caching strategy to use.

  scenario_details:
    plan_id: "260203XY_api_integration"
    task_id: "build_003"
    task_description: "Add caching layer to third-party API integration"
    session_id: "20260203-143000-session-1"
    timestamp: "2026-02-03 14:30:00 UTC"

  # Step 1: Agent working, encounters blocker
  agent_work_before_blocker:
    agent_thought_process: |
      "I'm implementing the caching layer for the WeatherAPI integration. I've reviewed
      the requirements and existing code:

      Current state:
      - WeatherAPI calls made directly in src/services/weather_service.py
      - No existing caching infrastructure in codebase
      - API rate limit: 1000 calls/day (limit could be hit easily)
      - Response times: 200-500ms per request
      - Data freshness requirement: not specified in docs

      Architectural options I've researched:

      Option A: Redis-based distributed cache
        Pros: Fast, scalable, supports TTL, shared across instances
        Cons: Adds infrastructure dependency (Redis server), operational complexity
        Use case: Multi-instance deployments, high traffic

      Option B: In-memory cache (lru_cache or similar)
        Pros: Simple, no external dependencies, zero infrastructure overhead
        Cons: Not shared across instances, lost on restart
        Use case: Single-instance deployments, development environments

      Option C: File-based cache (SQLite or disk cache)
        Pros: Persistent, no external dependencies, works across restarts
        Cons: Slower than memory, not ideal for high-frequency access
        Use case: Low-to-medium traffic, persistence needed

      This is a blocking architectural decision because:
      1. No precedent in codebase for caching strategy
      2. Affects infrastructure (Redis deployment if chosen)
      3. Impacts deployment model (single vs multi-instance)
      4. Different tradeoffs for different environments (dev/staging/prod)
      5. Cannot proceed with implementation without knowing which to use

      This matches 'architectural_decisions' trigger in question-workflow.yml.
      Severity: blocking (cannot write cache code without knowing the approach)"

  # Step 2: Agent generates question using QuestionQueue
  question_generation:
    method: "Use QuestionQueue service to create question"
    code_executed: |
      from pathlib import Path
      from agenticguidance.services.question import QuestionQueue
      from agenticguidance.models.question import QuestionSeverity

      # Initialize queue for current plan
      plan_path = Path("docs/plans/live/260203XY_api_integration")
      queue = QuestionQueue(plan_path)

      # Create question with full context
      question = queue.create_question(
          text="Which caching strategy should we use for the WeatherAPI integration?",
          context=(
              "Task: build_003 - Add caching layer to third-party API integration\n"
              "\n"
              "Current state:\n"
              "  - No existing caching infrastructure in codebase\n"
              "  - API rate limit: 1000 calls/day\n"
              "  - Response times: 200-500ms per request\n"
              "  - Data freshness requirement: not specified\n"
              "\n"
              "Researched options:\n"
              "  A) Redis: Fast, distributed, requires infrastructure\n"
              "  B) In-memory (lru_cache): Simple, not persistent, single-instance\n"
              "  C) File-based (SQLite): Persistent, no deps, slower than Redis\n"
              "\n"
              "Blocking reasons:\n"
              "  - No caching precedent to follow in codebase\n"
              "  - Affects infrastructure deployment (Redis?)\n"
              "  - Different tradeoffs per environment (dev/staging/prod)\n"
              "\n"
              "Impact:\n"
              "  - Infrastructure: Redis adds server dependency\n"
              "  - Performance: Redis fastest, file slowest, memory middle\n"
              "  - Deployment: Redis enables multi-instance, others single-instance\n"
              "  - Maintenance: In-memory simplest, Redis most complex"
          ),
          severity=QuestionSeverity.BLOCKING.value,
          asked_by="build-python"
      )

      print(f"Question created: {question.id}")
      print(f"File written to: {plan_path}/questions/pending/{question.id}.yml")

    output: |
      Question created: Q-20260203-143022-a1b2
      File written to: docs/plans/live/260203XY_api_integration/questions/pending/Q-20260203-143022-a1b2.yml

  # Step 3: Question YAML file contents
  question_file_generated:
    file_path: "docs/plans/live/260203XY_api_integration/questions/pending/Q-20260203-143022-a1b2.yml"
    contents: |
      id: Q-20260203-143022-a1b2
      text: Which caching strategy should we use for the WeatherAPI integration?
      context: |
        Task: build_003 - Add caching layer to third-party API integration

        Current state:
          - No existing caching infrastructure in codebase
          - API rate limit: 1000 calls/day
          - Response times: 200-500ms per request
          - Data freshness requirement: not specified

        Researched options:
          A) Redis: Fast, distributed, requires infrastructure
          B) In-memory (lru_cache): Simple, not persistent, single-instance
          C) File-based (SQLite): Persistent, no deps, slower than Redis

        Blocking reasons:
          - No caching precedent to follow in codebase
          - Affects infrastructure deployment (Redis?)
          - Different tradeoffs per environment (dev/staging/prod)

        Impact:
          - Infrastructure: Redis adds server dependency
          - Performance: Redis fastest, file slowest, memory middle
          - Deployment: Redis enables multi-instance, others single-instance
          - Maintenance: In-memory simplest, Redis most complex
      severity: blocking
      asked_by: build-python
      created_at: 1738598622.5
      status: pending

  # Step 4: Agent exits gracefully and reports status
  agent_exit_behavior:
    task_status_update: "blocked-on-question"
    output_message: |
      Task build_003 blocked on architectural decision.

      Question ID: Q-20260203-143022-a1b2
      Question: Which caching strategy should we use for the WeatherAPI integration?
      Severity: blocking
      Status: Waiting for human response in questions/pending/

      Context: Need to decide between Redis (distributed, complex), in-memory
      (simple, single-instance), or file-based (persistent, slower) caching.

      This is an architectural decision with infrastructure and deployment implications.
      Cannot proceed with implementation until strategy is chosen.

      Recommendation: Review question with `agentic question show Q-20260203-143022-a1b2`
      Answer with: `agentic question answer Q-20260203-143022-a1b2 --text "your decision"`

      Agent session ending. Task will resume after answer is provided.

    orchestrator_notification: |
      [build-python] Task build_003: blocked-on-question (Q-20260203-143022-a1b2)
      [orchestrator] Marking task build_003 as BLOCKED, proceeding with parallel tasks

  session_end:
    timestamp: "2026-02-03 14:32:15 UTC"
    session_id: "20260203-143000-session-1"
    status: "Agent exited gracefully after blocking on question"

# ==============================================
# PART 2: Human Interaction - Answering
# ==============================================
part_2_human_answers:
