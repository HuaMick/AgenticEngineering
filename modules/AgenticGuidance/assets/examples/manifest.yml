# Examples Manifest
# Index of all centralized examples in modules/AgenticGuidance/assets/examples/
# Update this file when adding or removing examples

examples:
  cleaner:
    description: "Examples for cleaner agent operations"
    files:
      - path: "cleaner/dir-allowed.yml"
        description: "Example of allowed directory patterns for cleanup"
      - path: "cleaner/dir-not-allowed.yml"
        description: "Example of disallowed directory patterns"
      - path: "cleaner/preserved-files.yml"
        description: "Example of files that must never be deleted"

  planner:
    description: "Examples for planner agent outputs"
    files:
      - path: "planner/teaching-plan-example.yml"
        description: "Example teaching/guidance improvement plan"
      - path: "planner/YYMMDDRepo_Branch/plan_example.yml"
        description: "Unified plan structure reference (all sections in one file)"
      - path: "planner/YYMMDDRepo_Branch/completed/plan_completed.yml"
        description: "Example of a completed plan summary structure"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
        description: "Skeleton test plan (~100 lines, points to reference)"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_build.yml"
        description: "Skeleton build plan for implementation phases"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_teach.yml"
        description: "Skeleton teaching plan for guidance improvement"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
        description: "Skeleton audit/cleanup plan (~80 lines)"
      - path: "planner/YYMMDDRepo_Branch/reference/test-scenarios-detailed.yml"
        description: "Detailed test scenarios for reference (not for direct use)"
      - path: "planner/YYMMDDRepo_Branch/orchestration.mmd"
        description: "Example orchestration MMD showing phase flow with agents and loops"

  planner_components:
    description: "Reusable MMD components for orchestration plans (plan-mmd-schema.yml compliant)"
    files:
      - path: "planner/components/teach_phase.mmd"
        description: "Teach phase component: planner-guidance + reviewer loop for guidance improvement"
      - path: "planner/components/build_phase.mmd"
        description: "Build phase component: planner-build + reviewer loop with architecture layer validation"
      - path: "planner/components/test_phase.mmd"
        description: "Test phase component: planner-test + reviewer loop with test-fix-loop integration"
      - path: "planner/components/cleanup_phase.mmd"
        description: "Cleanup phase component: planner-cleaning + reviewer loop with dependency verification"
      - path: "planner/components/uat_phase.mmd"
        description: "UAT phase component: MANDATORY user story validation with flexible strategy selection"
      - path: "planner/components/guidance_self_review_loop.mmd"
        description: "Guidance self-review loop: iterative guidance improvement through agent self-review"


  teacher:
    description: "Examples for teacher agent operations"
    files:
      - path: "teacher/concise.yml"
        description: "Concise writing examples for reducing context window usage"

  test:
    description: "Examples for test agent operations"
    files:
      - path: "test/critical_questions.yml"
        description: "Example critical questions for test validation"
      - path: "test/final_outcome_report.yml"
        description: "Example final outcome report structure"
      - path: "test/guidance-test-plan.yml"
        description: "Example guidance testing plan"

