# Examples Manifest
# Index of all centralized examples in modules/AgenticGuidance/assets/examples/
# Update this file when adding or removing examples

examples:
  cleaner:
    description: "Examples for cleaner agent operations"
    files:
      - path: "cleaner/dir-allowed.yml"
        description: "Example of allowed directory patterns for cleanup"
      - path: "cleaner/dir-not-allowed.yml"
        description: "Example of disallowed directory patterns"
      - path: "cleaner/preserved-files.yml"
        description: "Example of files that must never be deleted"

  planner:
    description: "Examples for planner agent outputs"
    files:
      - path: "planner/teaching-plan-example.yml"
        description: "Example teaching/guidance improvement plan"
      - path: "planner/question-workflow-example.yml"
        description: "Complete end-to-end question workflow: planner generating and consuming questions"
      - path: "planner/YYMMDDXX_description/README.md"
        description: "Planning folder metadata template with session tracking and update patterns"
      - path: "planner/YYMMDDXX_description/plan_example.yml"
        description: "Unified plan structure reference (all sections in one file)"
      - path: "planner/YYMMDDXX_description/completed/plan_completed.yml"
        description: "Example of a completed plan summary structure"
      - path: "planner/YYMMDDXX_description/live/ticket_test.yml"
        description: "Skeleton test plan (~100 lines, points to reference)"
      - path: "planner/YYMMDDXX_description/live/ticket_build.yml"
        description: "Skeleton build plan for implementation phases"
      - path: "planner/YYMMDDXX_description/live/ticket_teach.yml"
        description: "Skeleton teaching plan for guidance improvement"
      - path: "planner/YYMMDDXX_description/live/ticket_audit_clean.yml"
        description: "Skeleton audit/cleanup plan (~80 lines)"
      - path: "planner/YYMMDDXX_description/reference/test-scenarios-detailed.yml"
        description: "Detailed test scenarios for reference (not for direct use)"

  builder:
    description: "Examples for builder agent operations"
    files:
      - path: "builder/question-example.yml"
        description: "Multiple question scenarios (architecture, business logic, when NOT to ask)"
      - path: "builder/question-workflow-complete.yml"
        description: "Complete end-to-end workflow showing blocking, human answer, and resumption with timing"

  teacher:
    description: "Examples for teacher agent operations"
    files:
      - path: "teacher/concise.yml"
        description: "Concise writing examples for reducing context window usage"

  test:
    description: "Examples for test agent operations"
    files:
      - path: "test/critical_questions.yml"
        description: "Example critical questions for test validation"
      - path: "test/final_outcome_report.yml"
        description: "Example final outcome report structure"
      - path: "test/question-workflow-example.yml"
        description: "Test-builder question workflow showing inference attempts before asking"

