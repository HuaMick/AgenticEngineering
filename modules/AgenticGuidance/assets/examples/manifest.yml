# Examples Manifest
# Index of all centralized examples in assets/examples/
# Update this file when adding or removing examples

examples:
  cleaner:
    description: "Examples for cleaner agent operations"
    files:
      - path: "cleaner/dir-allowed.yml"
        description: "Example of allowed directory patterns for cleanup"
      - path: "cleaner/dir-not-allowed.yml"
        description: "Example of disallowed directory patterns"
      - path: "cleaner/preserved-files.yml"
        description: "Example of files that must never be deleted"

  planner:
    description: "Examples for planner agent outputs"
    files:
      - path: "planner/teaching-plan-example.yml"
        description: "Example teaching/guidance improvement plan"
      - path: "planner/YYMMDDRepo_Branch/completed/plan_completed.yml"
        description: "Example of a completed plan structure"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_test.yml"
        description: "Example of a live test plan"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_build.yml"
        description: "Example of a live build plan"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_teach.yml"
        description: "Example of a live teaching plan"
      - path: "planner/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
        description: "Example of a live audit/clean plan"

  teacher:
    description: "Examples for teacher agent operations"
    files:
      - path: "teacher/concise.yml"
        description: "Concise writing examples for reducing context window usage"

  test:
    description: "Examples for test agent operations"
    files:
      - path: "test/critical_questions.yml"
        description: "Example critical questions for test validation"
      - path: "test/final_outcome_report.yml"
        description: "Example final outcome report structure"
      - path: "test/guidance-test-plan.yml"
        description: "Example guidance testing plan"

