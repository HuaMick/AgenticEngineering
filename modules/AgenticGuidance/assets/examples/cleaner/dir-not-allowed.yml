# Directory Not Allowed Examples
# Examples of directories and file locations that are NOT allowed in the project structure
# Used by cleaner agents to identify wrong_location and leftover cleanup targets

version: "1.0"
category: "cleaner"
created: "2025-12-13"
purpose: "Examples of file locations that violate project structure and should be cleaned up"

description: |
  This example demonstrates common violations of project structure and leftover artifacts
  from refactors. Files matching these patterns should be flagged as wrong_location or
  leftover depending on the context.

markdown_files_wrong_location:
  description: "Markdown files that are NOT in docs/ or README.md files"

  violation_pattern:
    rule: "Markdown files are only allowed in docs/ or as README.md"
    violations: "Any .md file that is NOT in docs/ and is NOT named README.md"

  bad_examples:
    - file: "src/mymodules/AgenticGuidance/agents/QUICKSTART.md"
      why_wrong: "Quickstart guides belong in docs/ or should be merged into README.md"
      correct_action: "Move to docs/QUICKSTART.md or merge into src/mymodules/AgenticGuidance/agents/README.md"
      category: "wrong_location"

    - file: "tests/test_completion_report.md"
      why_wrong: "Test reports belong in docs/ if they need to be kept"
      correct_action: "Move to docs/testing/completion_report_YYYY-MM-DD.md or remove if temporary"
      category: "wrong_location"

    - file: "src/mymodules/AgenticGuidance/agents/agents/planner/design_notes.md"
      why_wrong: "Design documentation belongs in docs/architecture/"
      correct_action: "Move to docs/architecture/planner_design.md"
      category: "wrong_location"

    - file: "scripts/migration_report.md"
      why_wrong: "Reports should be in docs/ or removed after migration completes"
      correct_action: "Move to docs/archive/migration_report_YYYY-MM-DD.md or remove"
      category: "wrong_location"

    - file: "CONTRIBUTING.md"
      why_wrong: "Not a README.md, should be in docs/"
      correct_action: "Move to docs/CONTRIBUTING.md"
      category: "wrong_location"

  common_violations:
    - pattern: "src/**/*.md (except README.md)"
      reason: "Documentation in source code violates structure"
      action: "Move to docs/ or merge into nearby README.md"

    - pattern: "tests/**/*.md (except README.md)"
      reason: "Test documentation should be in docs/testing/"
      action: "Move to docs/testing/ or remove if temporary"

    - pattern: "*_report.md anywhere"
      reason: "Reports are temporary documentation"
      action: "Move to docs/archive/ or remove if no longer needed"

    - pattern: "*_notes.md anywhere"
      reason: "Notes should be in docs/ or converted to code comments"
      action: "Move to docs/ or integrate into codebase"

leftover_folders:
  description: "Directories that remain after refactors but should have been removed"

  detection_criteria:
    - "Directory is listed in manifest.yml invalid_folders"
    - "Directory contains only __pycache__/ (Python bytecode)"
    - "Directory contains only duplicate files (same content exists in new location)"
    - "Directory contains only empty __init__.py"

  bad_examples:
    - directory: "backend/"
      why_wrong: "Root-level backend/ after src-layout migration"
      detection: "Listed in manifest.yml invalid_folders"
      verification: "Compare contents with src/mymodules/AgenticGuidance/agents/backend/ - if identical, it's a leftover"
      category: "leftover"

    - directory: "frontend/"
      why_wrong: "Root-level frontend/ after src-layout migration"
      detection: "Listed in manifest.yml invalid_folders"
      verification: "Compare contents with src/mymodules/AgenticGuidance/agents/frontend/ - if identical, it's a leftover"
      category: "leftover"

    - directory: "src/mymodules/AgenticGuidance/agents/agents/old_planner/"
      why_wrong: "Old directory after refactoring to new location"
      detection: "Only contains __pycache__/ or duplicate files"
      verification: "Check if files exist in src/mymodules/AgenticGuidance/agents/agents/planner/"
      category: "leftover"

    - directory: "myagents_old/"
      why_wrong: "Backup directory created during refactor"
      detection: "Directory name pattern suggests temporary backup"
      verification: "Compare with current mymodules/AgenticGuidance/agents/ - if duplicate, remove"
      category: "leftover"

  detection_process:
    step_1: "Check manifest.yml invalid_folders list"
    step_2: "If folder exists, examine contents"
    step_3: "Compare with expected new location"
    step_4: "If all content is duplicated or just __pycache__, flag as leftover"
    step_5: "If unique content exists, flag for manual review (lower confidence)"

  common_leftover_patterns:
    - pattern: "Root-level module directories after src-layout migration"
      examples: ["backend/", "frontend/", "mymodules/AgenticGuidance/agents/"]
      new_location: "src/mymodules/AgenticGuidance/agents/{backend,frontend}/"

    - pattern: "Nested src/ folders after flattening"
      examples: ["src/src/", "mymodules/AgenticGuidance/agents/src/"]
      new_location: "src/"

    - pattern: "Old namespace directories after package rename"
      examples: ["old_package_name/", "deprecated_module/"]
      new_location: "new_package_name/"

    - pattern: "Backup directories from refactors"
      examples: ["*_old/", "*_backup/", "*_original/"]
      note: "These should be removed after refactor verification"

duplicate_or_redundant_files:
  description: "Files that exist in multiple locations (one should be removed)"

  bad_examples:
    - files:
        - "src/mymodules/AgenticGuidance/agents/agents/planner/planner-build/manifest.yml"
        - "src/mymodules/AgenticGuidance/agents/agents/planner/planner-build/manifest_old.yml"
      why_wrong: "Duplicate manifest files - only one should exist"
      correct_action: "Remove manifest_old.yml after verifying current manifest.yml is correct"
      category: "redundancy"

    - files:
        - "modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/live/ticket_build.yml"
        - "planner/examples/ticket_build.yml"
      why_wrong: "Same example in two locations after migration"
      correct_action: "Keep in modules/AgenticGuidance/assets/examples/planner/YYMMDDXX_description/live/, remove from planner/examples/"
      category: "redundancy"

test_artifacts_wrong_location:
  description: "Test artifacts that should be in gitignored directories or docs/"

  bad_examples:
    - file: "test_output.log"
      why_wrong: "Test artifacts should not be committed"
      correct_action: "Add to .gitignore and remove from repo"
      category: "wrong_location"

    - file: "coverage.xml"
      why_wrong: "Coverage reports should not be committed"
      correct_action: "Add to .gitignore and remove from repo"
      category: "wrong_location"

    - file: ".coverage"
      why_wrong: "Coverage data should not be committed"
      correct_action: "Add to .gitignore and remove from repo"
      category: "wrong_location"

confidence_guidelines:
  high_confidence_violations:
    description: "Clear violations that should be flagged with confidence 4-5"
    examples:
      - "*.md files in src/ (except README.md)"
      - "Directories listed in manifest.yml invalid_folders that only contain __pycache__"
      - "Files with _old or _backup suffixes after refactor completion"
      - "Duplicate files where one is clearly the canonical version"

  medium_confidence_violations:
    description: "Likely violations that need verification (confidence 3)"
    examples:
      - "Directories listed in manifest.yml invalid_folders with some unique content"
      - "Markdown files that might be referenced by builds"
      - "Configuration files that might be environment-specific"

  low_confidence_violations:
    description: "Uncertain violations that should NOT be flagged (confidence 1-2)"
    examples:
      - "Files that might be required by external tools"
      - "Directories that might be mounted in Docker"
      - "Files with unclear purpose or ownership"

usage:
  when_to_use:
    - "When evaluating whether a file is in the wrong location"
    - "When checking for leftover directories after refactors"
    - "When identifying duplicate or redundant files"
    - "Before flagging files to ensure they truly violate project structure"

  how_to_apply:
    - "Compare file location against dir-allowed.yml first"
    - "If file does NOT match allowed patterns, check against these violation patterns"
    - "If file matches a violation pattern, assess confidence level"
    - "Only flag if confidence is 3 or higher"
    - "For leftover directories, verify contents are truly duplicated before flagging"

  voting_strategy:
    - "High confidence (4-5): Flag for cleanup"
    - "Medium confidence (3): Flag but expect possible escalation"
    - "Low confidence (1-2): Do NOT flag - insufficient evidence"
    - "When in doubt, check manifest.yml invalid_folders and project structure docs"

reference:
  related_examples:
    - "dir-allowed.yml - Examples of correct file locations"
    - "preserved-files.yml - Files that must never be removed"

  project_structure:
    - "docs/architecture/architecture.md - Official project structure"
