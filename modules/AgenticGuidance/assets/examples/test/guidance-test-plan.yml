# Example: Guidance Test Plan
# Demonstrates how planner-guidance-testing agents create guidance validation plans
# using the guidance-test-loop pattern.
#
# PURPOSE:
# This example shows the structure and content of a guidance test plan that validates
# agent guidance completeness through guidance-blind-test strategy. Real plans are
# created by planner-guidance-testing agents and stored in docs/plans/live/<folder>/live/
#
# CONTEXT:
# - Plan type: Guidance validation plan (tests guidance, not implementation)
# - Loop: guidance-test-loop (planner-guidance-testing → test-guidance-simulator → fix → repeat)
# - Strategy: guidance-blind-test (minimal context, no code inspection)
# - Test scenarios: From modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml

plan_metadata:
  plan_name: "guidance_validation_orchestration_agents"
  plan_type: "guidance-test"
  created_date: "2025-12-21"
  target_context: "Validate orchestration agent guidance completeness"
  worktree: "<repo_root>"  # e.g., /home/code/AgenticEngineering
  branch: "guidance-refinement-v1"
  plan_file: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_test_guidance.yml"

test_context:
  loop_type: "guidance-test-loop"
  loop_reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types.guidance-test-loop"
  strategy: "guidance-blind-test"
  component_reference: "modules/AgenticGuidance/assets/examples/planner/components/guidance_blind_test.mmd"
  test_scenarios_reference: "modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml"
  maximum_iterations: 3

phases:
  - phase_id: "1"
    phase_name: "Guidance Test Loop - Core Validation"
    description: |
      Execute guidance-test-loop to validate orchestration agent guidance using
      guidance-blind-test strategy. Test-guidance-simulator agents receive only
      guidance files and attempt task execution to identify gaps.

    loop_pattern:
      type: "guidance-test-loop"
      participants:
        - "test-guidance-simulator (executor)"
        - "teacher agents (fixer, if gaps found)"
      exit_conditions:
        - "All test scenarios pass with zero friction points"
        - "Maximum iterations (3) reached - escalate to human"

    test_targets:
      - agent: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/"
        reason: "New orchestrator - validate can spawn children and coordinate loops"
      - agent: "modules/AgenticGuidance/agents/orchestration/orchestration-build/"
        reason: "New orchestrator - validate subagent spawning and build coordination"

    tasks:
      - id: "1.1"
        description: "Validate orchestration-guidance agent guidance completeness"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          target_agent: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/"
          guidance_files:
            - "process.yml"
            - "inputs.yml"
            - "outputs.yml"
          test_scenarios:
            - "task_completion_test"
            - "reference_resolution_test"
            - "loop_context_test"
            - "subagent_spawning_test"
            - "friction_detection_test"
          test_task: |
            Orchestrate a guidance-test-loop for target agent 'planner-guidance-testing'.
            Spawn test-guidance-simulator to execute test scenarios. Aggregate results
            and determine if guidance is complete or gaps exist.
          minimal_context: |
            You are orchestration-guidance agent. Your goal is from process.yml.
            All input locations are in inputs.yml. Use only these guidance files.

        acceptance_criteria:
          - "Agent completes orchestration task without code inspection"
          - "All subagent guidance paths resolved from inputs.yml"
          - "Loop coordination logic discoverable from guidance"
          - "No CRITICAL or HIGH friction points reported"

        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/inputs.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/outputs.yml"

      - id: "1.2"
        description: "Validate orchestration-build agent guidance completeness"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          target_agent: "modules/AgenticGuidance/agents/orchestration/orchestration-build/"
          guidance_files:
            - "process.yml"
            - "inputs.yml"
            - "outputs.yml"
          test_scenarios:
            - "task_completion_test"
            - "reference_resolution_test"
            - "subagent_spawning_test"
            - "friction_detection_test"
          test_task: |
            Orchestrate a build workflow. Spawn builder, tester, and cleaner agents.
            Coordinate their execution and aggregate outputs. Report build status.
          minimal_context: |
            You are orchestration-build agent. Your goal is from process.yml.
            All input locations are in inputs.yml. Use only these guidance files.

        acceptance_criteria:
          - "Agent completes orchestration task without code inspection"
          - "All subagent guidance paths resolved from inputs.yml"
          - "Build workflow logic discoverable from guidance"
          - "No CRITICAL or HIGH friction points reported"

        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/inputs.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-build/outputs.yml"

      - id: "1.3"
        description: "Validate planner-guidance-testing agent guidance completeness"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          target_agent: "modules/AgenticGuidance/agents/planner/planner-guidance-testing/"
          guidance_files:
            - "process.yml"
            - "inputs.yml"
            - "outputs.yml"
          test_scenarios:
            - "task_completion_test"
            - "reference_resolution_test"
            - "loop_context_test"
          test_task: |
            Create a guidance test plan for target agent 'test-guidance-simulator'.
            Include test scenarios from inputs.yml. Structure plan with phases,
            tasks, and acceptance criteria.
          minimal_context: |
            You are planner-guidance-testing agent. Your goal is from process.yml.
            All input locations are in inputs.yml. Use only these guidance files.

        acceptance_criteria:
          - "Agent completes planning task without code inspection"
          - "All test scenario definitions resolved from inputs.yml"
          - "Loop participation clear from loop_context in process.yml"
          - "No CRITICAL or HIGH friction points reported"

        files:
          - "modules/AgenticGuidance/agents/planner/planner-guidance-testing/process.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance-testing/inputs.yml"
          - "modules/AgenticGuidance/agents/planner/planner-guidance-testing/outputs.yml"

  - phase_id: "2"
    phase_name: "Gap Analysis and Categorization"
    description: |
      Analyze friction points from Phase 1, categorize by severity, and identify
      patterns. Determine which gaps are guidance issues vs fundamental design flaws.

    tasks:
      - id: "2.1"
        description: "Aggregate and categorize guidance gaps"
        agent_type: "teacher"
        operation: "ANALYZE"
        context:
          input_source: "Phase 1 test reports from test-guidance-simulator agents"
          categorization_reference: "modules/AgenticGuidance/assets/definitions/friction.yml"
          severity_levels:
            - "CRITICAL: Task cannot proceed"
            - "HIGH: Requires code inspection"
            - "MEDIUM: Guidance unclear"
            - "LOW: Minor discoverability issues"
        acceptance_criteria:
          - "All friction points categorized by severity"
          - "Common patterns identified across agents"
          - "Root causes traced to specific guidance sections"
        files:
          - "docs/plans/live/251221MAG_guidance-refinement-v1/test-results/guidance/phase1_friction_report.yml"

      - id: "2.2"
        description: "Identify systemic guidance issues"
        agent_type: "teacher"
        operation: "ANALYZE"
        context:
          analysis_focus: "Cross-agent patterns in guidance gaps"
          questions:
            - "Are input path patterns inconsistent across agents?"
            - "Do orchestrators lack consistent subagent path conventions?"
            - "Are loop_context sections missing from loop participants?"
        acceptance_criteria:
          - "Systemic issues identified and documented"
          - "Guidance improvement recommendations prioritized"
          - "Fixes scoped (per-agent vs cross-agent updates)"
        files:
          - "docs/plans/live/251221MAG_guidance-refinement-v1/test-results/guidance/systemic_issues.yml"

  - phase_id: "3"
    phase_name: "Audit Test Quality"
    description: |
      Verify that test-guidance-simulator agents executed tests correctly and
      reported friction accurately. Detect false positives and test methodology issues.

    tasks:
      - id: "3.1"
        description: "Audit test execution methodology"
        agent_type: "audit"
        operation: "REVIEW"
        context:
          review_target: "Phase 1 test reports"
          audit_questions:
            - "Did simulator use ONLY guidance files (no code inspection)?"
            - "Were test scenarios executed as defined in guidance-test-scenarios.yml?"
            - "Are reported gaps genuine or simulator errors?"
            - "Did simulator follow minimal context principle?"
        acceptance_criteria:
          - "Test methodology validated as correct"
          - "False positives identified and filtered"
          - "Genuine gaps confirmed for fixing"
        files:
          - "docs/plans/live/251221MAG_guidance-refinement-v1/test-results/guidance/audit_report.yml"

  - phase_id: "4"
    phase_name: "Fix Guidance Gaps"
    description: |
      Update agent guidance to fix confirmed gaps from Phase 2. Use teacher agents
      to improve process.yml, inputs.yml, and outputs.yml files.

    tasks:
      - id: "4.1"
        description: "Fix orchestration-guidance agent gaps"
        agent_type: "teacher"
        operation: "FIX"
        context:
          target_agent: "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/"
          gaps_to_fix: "From Phase 2 gap analysis"
          guidance_files:
            - "process.yml"
            - "inputs.yml"
        acceptance_criteria:
          - "All CRITICAL and HIGH severity gaps fixed"
          - "Guidance updates follow guidance.yml structure"
          - "No new gaps introduced"
        files:
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/process.yml"
          - "modules/AgenticGuidance/agents/orchestration/orchestration-guidance/inputs.yml"

      - id: "4.2"
        description: "Re-test after fixes (iteration 2 of guidance-test-loop)"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          same_as_task_1_1: true
          iteration_number: 2
        acceptance_criteria:
          - "Previously reported gaps resolved"
          - "No new CRITICAL or HIGH gaps introduced"
          - "Test scenarios pass or gaps reduced"

success_criteria:
  phase_1:
    - "All test scenarios executed for all target agents"
    - "Friction points reported with categorization and suggested fixes"
    - "Test reports stored in test-results/guidance/ folder"

  phase_2:
    - "All friction points categorized by severity"
    - "Systemic patterns identified across agents"
    - "Fix recommendations prioritized"

  phase_3:
    - "Test methodology validated as correct"
    - "False positives filtered out"
    - "Genuine gaps confirmed"

  phase_4:
    - "All CRITICAL and HIGH severity gaps fixed"
    - "Re-test confirms gap resolution"
    - "Maximum 3 iterations of guidance-test-loop completed"

  overall:
    - "Zero CRITICAL guidance gaps remain"
    - "HIGH gaps reduced to acceptable level or documented as known limitations"
    - "Guidance follows guidance.yml structure standards"
    - "All test scenarios pass or gaps are justified exceptions"

file_organization:
  plan_folder: "docs/plans/live/251221MAG_guidance-refinement-v1/"
  live_plans:
    - "live/plan_live_test_guidance.yml (this file structure)"
  test_results:
    - "test-results/guidance/phase1_friction_report.yml"
    - "test-results/guidance/systemic_issues.yml"
    - "test-results/guidance/audit_report.yml"
  completed:
    - "completed/plan_completed.yml (tasks moved here when done)"

notes:
  - "This is an EXAMPLE - real plans created by planner-guidance-testing agents"
  - "Test tasks use minimal_context to enforce guidance-blind-test strategy"
  - "File-level inputs ensure simulator has exact guidance files to test"
  - "Acceptance criteria focus on guidance completeness, not implementation correctness"
  - "Loop iterations allow for iterative guidance improvement (max 3)"
  - "Friction categorization aligns with friction.yml patterns"
