# Example: Final Outcome Report
# This example shows how to structure the final report for the user.
#
# IMPORTANT: This report is OUTPUT TO TERMINAL, not saved as a file.
# The audit agent produces this directly to the user at the end of execution.
#
# Key principles:
# - Start with test results at PACKAGE level, not individual tests
# - Next steps: 3 items with WHY for each
# - Focus on original goal achievement and design decisions (include original prompt)
# - End with changes made and worktrees/live plan paths
# - Minimize success notes - focus on concerns, failures, and gaps

example_report: |
  ## Test Results

  **Passed:** 3/5 packages
  - tests/workflows/cli_unification
  - tests/workflows/studio_lifecycle
  - tests/domains/config

  **Failed:** 1/5 packages
  - tests/workflows/agent_shell_operations (❌ Path configuration issues - still using /home/code hardcoded paths)

  **Skipped:** 1/5 packages
  - tests/integration/files (⚠️ Costly tests gated - need to verify before merge)

  ## Next Steps

  1. **Fix shell operations path configuration** - Why: Blocks the core "work-from-anywhere" goal
  2. **Run skipped costly tests on staging** - Why: Config changes may break file handling, need verification before merge
  3. **Document config migration path** - Why: Existing users need guidance on moving configs to new location

  ## Goal Achievement

  **Original Goal:** Implement work-from-anywhere configuration for MyAgents CLI

  **Original Prompt:** "Implement work-from-anywhere configuration for MyAgents CLI"

  **Status:** Partially achieved - Core functionality works, shell operations blocked

  **Design Decisions:**
  - Chose home directory as primary config location (aligns with XDG standard)
  - Implemented cascading fallback pattern (user feedback: prefer explicit over implicit)
  - Deferred worktree-specific config (decided this is edge case for v2)

  **Concerns:**
  - Shell operations still reference hardcoded paths in worktree settings (blocks work-from-anywhere)
  - Skipped costly file integration tests - unknown if config changes break large file handling
  - No migration path documented for existing users with old config locations

  ## Changes Made

  - Refactored CLI configuration to use home directory detection
  - Removed hardcoded /home/code paths from configuration loader
  - Added fallback logic for langgraph.json discovery (home → cwd → parent)
  - Updated 3 test packages to verify new configuration behavior

  ## Worktrees and Live Plan

  **Worktrees worked on:** MyAgents, MyAgents-staging
  **Live plan path(s):** docs/plans/live/251126_mymodules/AgenticGuidance/agents/plan_live_build.yml, docs/plans/live/251126_myagents_staging/plan_live_build.yml

bad_example: |
  ## What NOT to do

  ❌ Don't list individual tests or celebrate success:
  - test_step1_check_python_version PASSED ✅
  - test_step2_check_uv_installed PASSED ✅
  - test_step3_run_pwd FAILED ❌
  - test_step4_run_git_status FAILED ❌
  - ... (297 more tests)

  ❌ Don't over-report success:
  "Great news! CLI entrypoints are working perfectly! Studio lifecycle is amazing!
  Configuration detection is flawless! Everything is wonderful except one tiny issue..."

  ❌ Don't include next steps without WHY:
  - Fix shell operations
  - Review tests
  - Run full suite

  This is noise. Users can't parse 300+ test results or vague next steps.
  Focus on: what changed, was goal achieved, design decisions, concerns, failures.

guidelines:
  - Start with test results at package level (not individual tests) - passed vs failed counts
  - Next steps must include WHY for each item (max 3)
  - Focus on goal achievement and design decisions made
  - Include original prompt with original goal so user remembers context
  - Lead with bullet points of what changed (code, config, architecture)
  - Include worktrees worked on and live plan path(s) at the bottom
  - Minimize success reporting - focus on concerns, failures, gaps
  - Use status icons (✅ ❌ ⚠️) sparingly - only for failures and concerns

