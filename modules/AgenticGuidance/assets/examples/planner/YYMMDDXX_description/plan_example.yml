# Unified Epic Structure Example
# This file demonstrates a unified epic with multiple phases in a single file.
#
# DEFAULT: Keep all phases in ONE ticket file.
# SPLIT: Only when context minimisation provides clear benefit.
#
# See: modules/AgenticGuidance/assets/guidelines/context-minimisation.yml
#
# When to split epics:
# - Epic exceeds ~500 lines (causes context dilution)
# - Phases have completely independent inputs (no shared context)
# - Different agents need strictly different subsets of information
#
# When to keep unified:
# - Phases share context, inputs, or open_questions
# - Total epic is manageable size
# - Cross-phase dependencies exist
#
# This example demonstrates the unified approach as the sensible default.

# ========================================
# ROOT-LEVEL EPIC METADATA (Required)
# ========================================
name: "example-feature-implementation"
branch: "feature/new-capability"
status: "active"
priority: "high"

# File paths for epic management
epic_file: "docs/epics/live/<YYMMDDXX_description>/epic.md"

# ========================================
# CONTEXT (Narrative Updates)
# ========================================
# The context section provides a running narrative of progress across sessions.
context: |
  This epic orchestrates the implementation of a new capability using the
  Domain -> Workflow -> Entrypoint architecture pattern.

  UPDATE YYYY-MM-DD (Session 1): Initial planning completed. Environment setup done.
  Domain services designed and implementation started.

  UPDATE YYYY-MM-DD (Session 2): Domain layer complete with tests. Workflow layer
  v1 implemented. Found friction in path resolution for entrypoints.

  NEXT: Complete entrypoints, run integration tests, and address guidance friction.

# ========================================
# RELATED EPICS (Optional)
# ========================================
related_epics: {}  # List related epic IDs here if applicable

# ========================================
# ROOT-LEVEL INPUTS (Pre-gathered Context)
# ========================================
# Shared context needed across multiple phases.
inputs:
  - location: "docs/ARCHITECTURE.md"
    description: "Architecture patterns for proper layering"

  - location: "pyproject.toml"
    description: "Project dependencies and build configuration"

# ========================================
# FILE SCOPING
# ========================================
# File scoping uses TICKET-LEVEL `target_files` (see tickets below).
# Each ticket declares which files it modifies via its `target_files` list.
# Orchestration uses non-overlapping target_files to determine safe parallelization.
# Epic-level `impacted_files` is DEPRECATED — do not include it in new epics.

# ========================================
# IMPACTED ARTIFACTS (Semantic Impact Tracking)
# ========================================
# Higher-level system components affected by this epic.
# Complements impacted_files with semantic-level impact tracking.
# Schema: modules/AgenticGuidance/assets/specifications/plan-schema.yml#impacted_artifacts_schema
impacted_artifacts:
  - artifact_type: cli_command
    artifact_identifier: "myproject example run"
    impact_type: new
    description: "New CLI command for running the example feature"
    breaking_change: false

  - artifact_type: service
    artifact_identifier: "ExampleService"
    impact_type: new
    description: "New domain service encapsulating business logic"

  - artifact_type: api
    artifact_identifier: "POST /api/v1/example"
    impact_type: new
    description: "New API endpoint for programmatic access"

# ========================================
# OPEN QUESTIONS (Human-Authority Decisions)
# ========================================
# This section tracks questions/decisions that require human judgment.
# CRITICAL: Answers provided by a HUMAN have absolute authority and MUST NOT
# be overwritten by AI decisions or subsequent automated reasoning.
open_questions:
  - id: "QUESTION-001"
    question: "Which dependency injection pattern should we use for the workflow layer?"
    severity: "high"
    status: "ANSWERED"
    answer: "Use constructor injection for all workflow services."
    answered_by: "HUMAN"  # Indicates this answer has authority
    context: |
      Multiple patterns (Service Locator, Container, Constructor) were discussed.
      The human decided on constructor injection for testability and clarity.
    options:
      - "Constructor injection (Preferred)"
      - "Service locator"
      - "Dependency container"

  - id: "QUESTION-002"
    question: "Should the API support legacy XML responses during the transition?"
    severity: "medium"
    status: "OPEN"
    context: "Old clients might still depend on XML, but JSON is the new standard."

# ========================================
# LOOP STRUCTURES (Required for non-trivial epics)
# ========================================
# Loop structures define iterative patterns for validation and quality assurance.
# Planners define the STRUCTURE; orchestration selects the specific loop TYPE.
# Reference: modules/AgenticGuidance/assets/definitions/agent-loops.yml
#
# Common loop patterns:
# - test-fix-loop: Build phases (implementation iteration)
# - audit-test-fix-loop: After cleanup (MANDATORY - catches reward hacking)
# - guidance-self-review-loop: Teach phases (guidance validation)
# - agent-self-review: Lighter alternative for guidance development
#
loop_structures:
  # ----------------------------------------
  # Pattern 1: Test-Fix Loop (for development/validation phases)
  # ----------------------------------------
  - id: "loop_validation"
    type: "test-fix-loop"
    applies_to_phase: "Validation Phase"
    trigger: "After development tasks complete"
    description: |
      Iterative testing pattern where implementation is validated against
      user stories. Each iteration runs tests, identifies failures, and
      fixes issues until all tests pass or max iterations reached.
    exit_criteria:
      success: "All integration tests pass AND user stories validated"
      max_iterations: 5
      escalation: "Escalate to user with test results and remaining failures"
    participants:
      - agent: "test-builder"
        role: "Creates and executes tests"
      - agent: "builder"
        role: "Fixes failures identified by tests"
      - agent: "test-audit"
        role: "Validates test quality (prevents reward hacking)"

  # ----------------------------------------
  # Pattern 2: Self-Review Loop (for guidance/teach phases)
  # ----------------------------------------
  - id: "loop_self_review"
    type: "guidance-self-review-loop"
    applies_to_phase: "Cleanup Phase"  # Documentation review uses self-review
    trigger: "After cleanup tasks complete"
    description: |
      Agents review their own guidance files for correctness and completeness.
      Good for iterative development but includes spot-check phase to catch
      lenient initial assessments.
    exit_criteria:
      success: "All checklist items pass AND spot-check validation passes"
      max_iterations: 3
      escalation: "Escalate to human reviewer with specific gaps identified"
    participants:
      - agent: "reviewer"
        role: "Self-reviews documentation against requirements"
      - agent: "spot-checker"
        role: "Validates a sample of PASS items for accuracy"
    user_decision_gate: true  # Questions/ambiguities require user resolution

  # ----------------------------------------
  # Pattern 3: Audit-Test-Fix Loop (MANDATORY after cleanup)
  # ----------------------------------------
  - id: "loop_audit"
    type: "audit-test-fix-loop"
    applies_to_phase: "Validation Phase"
    trigger: "After initial testing completes"
    description: |
      MANDATORY validation loop to detect reward hacking and verify test quality.
      Auditor examines tests for shortcuts, mocking issues, and false positives.
    exit_criteria:
      success: "Audit passes AND all tests still pass after audit corrections"
      max_iterations: 3
      escalation: "BLOCK deployment - audit failures must be resolved"
    participants:
      - agent: "test-audit"
        role: "Audits test quality and detects reward hacking"
      - agent: "test-builder"
        role: "Fixes audit-identified test issues"
      - agent: "builder"
        role: "Fixes implementation issues revealed by audit"
    mandatory: true  # Cannot skip this loop

# ========================================
# PHASES AND TICKETS
# ========================================
# All phases in one file (default). Split only when context minimisation benefits.
phases:
  # ----------------------------------------
  # PHASE 1: Development
  # ----------------------------------------
  - name: "Development Phase"
    execution: sequential
    description: "Implement core logic and interfaces"
    tickets:
      - id: "dev_001"
        name: "Domain Layer Build"
        description: "Implement pure business logic at src/domain/"
        status: "completed"
        completed_date: "YYYY-MM-DD"
        target_files:
          - "src/domain/services/example_service.py"

      - id: "dev_002"
        name: "Workflow Layer Build"
        description: "Orchestrate domain services at src/workflows/"
        status: "in_progress"
        target_files:
          - "src/workflows/example_workflow.py"

      - id: "dev_003"
        name: "Entrypoint Layer Build"
        description: "CLI and API interfaces at src/cli/ and src/api/"
        status: "pending"
        target_files:
          - "src/cli/commands/example.py"
          - "src/api/routes/example.py"

  # ----------------------------------------
  # PHASE 2: Validation
  # ----------------------------------------
  - name: "Validation Phase"
    execution: sequential
    description: "Verify implementation against requirements"
    tickets:
      - id: "val_001"
        name: "Integration Testing (test-fix-loop)"
        description: "Execute 'agent-blind-test' strategy across local and Docker layers to validate User Stories."
        status: "pending"
        loop: "test-fix-loop"
        strategy: "agent-blind-test"
        target_files:
          - "tests/test_example_service.py"
          - "tests/integration/test_example_e2e.py"

      - id: "val_002"
        name: "Final Quality Audit (audit-test-fix-loop)"
        description: "Mandatory audit to detect reward-hacking and verify test quality before completion."
        status: "pending"
        loop: "audit-test-fix-loop"
        target_files:
          - "tests/test_example_service.py"
          - "tests/integration/test_example_e2e.py"

  # ----------------------------------------
  # PHASE 3: Cleanup
  # ----------------------------------------
  - name: "Cleanup Phase"
    execution: sequential
    description: "Remove artifacts and finalize"
    tickets:
      - id: "clean_001"
        name: "Remove development artifacts"
        description: "Clean temp files, debug logs, unused imports"
        status: "pending"
        target_files:
          - "src/domain/services/example_service.py"
          - "src/workflows/example_workflow.py"
          - "src/cli/commands/example.py"

      - id: "clean_002"
        name: "Documentation review"
        description: "Ensure docs match final implementation"
        status: "pending"
        target_files:
          - "docs/features/example.md"

# ========================================
# SUCCESS CRITERIA
# ========================================
success_criteria:
  - "Users can execute commands via CLI and API"
  - "Overall system health is reported correctly"
  - "All integration tests pass in CI"
  - "No temporary files remain"
  - "Documentation complete and accurate"
