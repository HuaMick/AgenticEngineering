# Completed Epic Summary (Example)
# This file tracks completed phases and provides a summary index.
# Location: docs/epics/live/YYMMDDXX_description/plan_completed.yml

status: partially_completed

# Completed phase files in this folder
completed_phases:
  - file: ticket_live_teach.yml
    completed_date: "YYYY-MM-DD"
    summary: "Guidance friction addressed, agent processes updated"

  - file: ticket_live_build.yml
    completed_date: "YYYY-MM-DD"
    summary: "Domain, workflow, and entrypoint layers implemented"

# Phases still in progress (in live/ folder)
active_phases:
  - file: ticket_live_test.yml
    status: in_progress
    summary: "Testing in progress"

  - file: ticket_live_audit_clean.yml
    status: pending
    summary: "Awaiting test completion"

# Overall completion metrics
metrics:
  total_phases: 4
  completed: 2
  in_progress: 1
  pending: 1

# Notes for follow-on work
notes: |
  This epic demonstrates the TinyDB + Archive pattern.
  Tickets are tracked in TinyDB while docs/epics/live/ contains the epic folder.
  When all tickets complete, `agentic epic archive` moves the folder to docs/epics/completed/.
