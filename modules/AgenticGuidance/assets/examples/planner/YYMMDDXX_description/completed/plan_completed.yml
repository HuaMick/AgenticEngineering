# Completed Plan Summary (Example)
# This file tracks completed phases and provides a summary index.
# Location: docs/plans/live/YYMMDDXX_description/completed/plan_completed.yml

worktree: /home/code/MyProject-feature-branch
status: partially_completed

# Completed phase files in this folder
completed_phases:
  - file: plan_live_teach.yml
    completed_date: "YYYY-MM-DD"
    summary: "Guidance friction addressed, agent processes updated"

  - file: plan_live_build.yml
    completed_date: "YYYY-MM-DD"
    summary: "Domain, workflow, and entrypoint layers implemented"

# Phases still in progress (in live/ folder)
active_phases:
  - file: plan_live_test.yml
    status: in_progress
    summary: "Testing in progress"

  - file: plan_live_audit_clean.yml
    status: pending
    summary: "Awaiting test completion"

# Overall completion metrics
metrics:
  total_phases: 4
  completed: 2
  in_progress: 1
  pending: 1

# Notes for follow-on work
notes: |
  This plan demonstrates the Copy-and-Sync pattern.
  Completed items are synced here while live/ contains active work.
  When all phases complete, this folder will be copied to docs/plans/completed/.
