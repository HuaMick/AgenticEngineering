plan_name: "Build Agent Dependency Verification Fence"
worktree: "<repo_root>"  # e.g., /home/code/AgenticEngineering
branch: "build-verification-fence"
created: "2025-12-20"
objective: "Add missing fence to build agents to prevent builds with unmet dependencies"

# This example demonstrates a teaching plan structure for guidance improvements.
# Scenario: Build agents were observed attempting builds without verifying all
# dependencies are installed, leading to cryptic build failures.
# Root cause: Missing fence in build agent process to validate dependencies first.

inputs:
  - location: "analysis/friction-analysis.md"
    description: "Friction analysis identifying dependency check gap in build agents"
  - location: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml"
    description: "Fence, signpost concepts and where to put guidance information"
  - location: "modules/AgenticGuidance/assets/definitions/path.yml"
    description: "Path concept definition"
  - location: "modules/AgenticGuidance/agents/build/build-python/process.yml"
    description: "Current build-python process"
  - location: "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
    description: "Current build-flutter process"
  - location: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"
    description: "Agent category definitions"

phases:
  - name: "phase-1-add-dependency-fence"
    description: "Add explicit dependency verification step to build processes"
    agent_category: "teacher"
    success_criteria:
      - "Build processes include dependency verification step before build execution"
      - "Dependency fence prevents build attempts with missing dependencies"
      - "Clear error messages guide agents to install missing dependencies"

    tasks:
      - id: "1.1"
        description: "Add dependency verification step to build-python process"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "modules/AgenticGuidance/agents/build/build-python/process.yml"
          friction_reference: "analysis/friction-analysis.md#missing-dependency-check-fence"
          current_state: "Process jumps directly to build execution without verifying dependencies"
          required_changes:
            - "Add step before build: Verify all dependencies from requirements.txt are installed"
            - "Add fence: If dependencies missing, STOP and report which dependencies are needed"
            - "Add signpost: Reference dependency installation process or command"
        acceptance_criteria:
          - "Dependency verification step added to process.yml steps section"
          - "Fence prevents build with missing dependencies"
          - "Error message identifies specific missing dependencies"
        files:
          - "modules/AgenticGuidance/agents/build/build-python/process.yml"

      - id: "1.2"
        description: "Add dependency verification step to build-flutter process"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
          friction_reference: "analysis/friction-analysis.md#missing-dependency-check-fence"
          current_state: "Process jumps directly to build execution without verifying dependencies"
          required_changes:
            - "Add step before build: Verify Flutter SDK and dependencies from pubspec.yaml"
            - "Add fence: If dependencies missing, STOP and report which dependencies are needed"
            - "Add signpost: Reference flutter pub get command"
        acceptance_criteria:
          - "Dependency verification step added to process.yml steps section"
          - "Fence prevents build with missing dependencies"
          - "Error message identifies specific missing dependencies"
        files:
          - "modules/AgenticGuidance/agents/build/build-flutter/process.yml"

  - name: "phase-2-create-dependency-example"
    description: "Create example showing proper dependency verification pattern"
    agent_category: "teacher"
    success_criteria:
      - "Example file exists demonstrating dependency verification pattern"
      - "Example is referenced by build agent inputs"
    dependencies:
      - "phase-1-add-dependency-fence"

    tasks:
      - id: "2.1"
        description: "Create dependency verification example"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        context:
          target_file: "modules/AgenticGuidance/assets/examples/build/dependency-verification-example.yml"
          current_state: "No example showing how to verify dependencies before build"
          required_structure:
            - "Example showing Python requirements.txt verification"
            - "Example showing Flutter pubspec.yaml verification"
            - "Example showing clear error messages when dependencies missing"
            - "Example showing how to guide agent to install missing dependencies"
        acceptance_criteria:
          - "Example file exists at modules/AgenticGuidance/assets/examples/build/dependency-verification-example.yml"
          - "Shows verification pattern for both Python and Flutter"
          - "Demonstrates clear error messaging"
        files:
          - "modules/AgenticGuidance/assets/examples/build/dependency-verification-example.yml"

      - id: "2.2"
        description: "Reference dependency example in build agent inputs"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "modules/AgenticGuidance/agents/build/build-python/inputs.yml"
          current_state: "No reference to dependency verification example"
          required_changes:
            - "Add modules/AgenticGuidance/assets/examples/build/dependency-verification-example.yml to inputs list"
            - "Description: Dependency verification pattern and error handling"
        acceptance_criteria:
          - "Example referenced in build-python/inputs.yml"
          - "Clear description of example purpose"
        files:
          - "modules/AgenticGuidance/agents/build/build-python/inputs.yml"

  - name: "phase-3-verification"
    description: "Verify dependency fence is effective"
    agent_category: "test"
    success_criteria:
      - "All process files updated correctly"
      - "Example file complete and referenced"
      - "No broken references"
    dependencies:
      - "phase-2-create-dependency-example"

    tasks:
      - id: "3.1"
        description: "Validate all process and input file references"
        agent_type: "test-final-output"
        operation: "AUDIT"
        context:
          scope: "All modified process.yml, inputs.yml, and example files"
          checks:
            - "Dependency verification steps exist in both build processes"
            - "Example file exists and is well-formed"
            - "All references in inputs.yml resolve to existing files"
            - "Fence logic is clear and actionable"
        acceptance_criteria:
          - "Zero broken references"
          - "Dependency verification fence present in both build processes"
          - "Example file complete and referenced"
        files:
          - "modules/AgenticGuidance/agents/build/build-python/process.yml"
          - "modules/AgenticGuidance/agents/build/build-flutter/process.yml"
          - "modules/AgenticGuidance/agents/build/build-python/inputs.yml"
          - "modules/AgenticGuidance/assets/examples/build/dependency-verification-example.yml"

success_criteria:
  user_validation:
    - "Build agents check dependencies before attempting builds"
    - "Clear error messages guide agents when dependencies are missing"
    - "Build failures due to missing dependencies are eliminated"

  technical_validation:
    - "Dependency verification steps present in all build processes"
    - "Example file exists and is referenced correctly"
    - "No broken references in any modified files"

notes:
  - "This plan focuses on a single, high-value fence to prevent a common failure mode"
  - "Teacher agent selection: teacher-update-guidance for process.yml/inputs.yml updates; teacher-update-assets for shared assets in modules/AgenticGuidance/assets/ folder"
  - "Each phase builds on the previous to maintain consistency"
  - "Verification phase ensures no broken references before completion"
