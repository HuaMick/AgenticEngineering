# Example Main Plan Structure
# This file demonstrates how a main plan file orchestrates multiple sub-plans.
#
# MAIN PLAN vs SUB-PLANS:
# - Main plan: High-level orchestration, status tracking, and context narrative
# - Sub-plans: Detailed phase definitions (plan_live_build.yml, plan_live_teach.yml, etc.)
#
# KEY ELEMENTS:
# 1. name: Short identifier for the plan
# 2. worktree_path: Absolute path to working directory
# 3. branch: Git branch being worked on
# 4. status: Current plan lifecycle stage (planning, active, partially_completed, fully_completed)
# 5. priority: Execution priority (critical, high, medium, low)
# 6. context: Narrative updates tracking progress
# 7. related_plans: References to sub-plans being orchestrated
# 8. phases: High-level phase definitions that reference sub-plans

# ========================================
# ROOT-LEVEL PLAN METADATA (Required)
# ========================================
name: "example-feature-implementation"
worktree_path: "/home/code/MyProject-feature-branch"
branch: "feature/new-capability"
status: "active"
priority: "high"

# File paths for plan lifecycle management
worktree: "<repo_root>"
liveplan: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_main.yml"
completedplan: "docs/plans/live/<YYMMDDRepo_Branch>/completed/plan_completed.yml"

# ========================================
# CONTEXT (Narrative Updates)
# ========================================
# The context section provides a running narrative of progress.
# Update this section as work progresses to maintain session continuity.
context: |
  This plan orchestrates the implementation of a new capability using the
  Domain -> Workflow -> Entrypoint architecture pattern.

  UPDATE YYYY-MM-DD (Session 1): Initial planning completed. Build plan created
  with 6 phases covering environment setup through CI/CD validation.

  UPDATE YYYY-MM-DD (Session 2): Build phases 1-3 completed. Domain and workflow
  layers implemented with unit tests passing.

  UPDATE YYYY-MM-DD (Session 3): Entrypoint layer and integration testing in progress.
  Identified 2 issues requiring follow-up in test phase.

  NEXT: Complete integration testing, run audit phase, update documentation.

# ========================================
# RELATED PLANS (Sub-plan References)
# ========================================
# Related plans are the detailed sub-plans that this main plan orchestrates.
# Each sub-plan handles a specific type of work (build, teach, test, audit).
related_plans:
  build: "live/plan_live_build.yml"
  teach: "live/plan_live_teach.yml"
  test: "live/plan_live_test.yml"
  audit_clean: "live/plan_live_audit_clean.yml"
  orchestration: "orchestration.mmd"

# ========================================
# ROOT-LEVEL INPUTS (Pre-gathered Context)
# ========================================
# Inputs shared across all sub-plans for context pre-gathering.
inputs:
  # Architecture context
  - location: "docs/ARCHITECTURE.md"
    description: "System architecture for proper layering decisions"

  - location: "pyproject.toml"
    description: "Project dependencies and configuration"

  # Existing plans for reference
  - location: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_build.yml"
    description: "Build phase details for status tracking"

  - location: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_test.yml"
    description: "Test phase details for validation coordination"

# ========================================
# HIGH-LEVEL PHASES (Orchestration View)
# ========================================
# These phases provide a high-level view of the work.
# Detailed task definitions are in the referenced sub-plans.
phases:
  - name: "Build Phase"
    status: "completed"
    sub_plan: "live/plan_live_build.yml"
    summary: "Domain, workflow, and entrypoint layers implemented"
    completed_date: "YYYY-MM-DD"

  - name: "Test Phase"
    status: "in_progress"
    sub_plan: "live/plan_live_test.yml"
    summary: "Integration testing and user flow validation"
    progress: "3/5 test scenarios completed"

  - name: "Audit Phase"
    status: "pending"
    sub_plan: "live/plan_live_audit_clean.yml"
    summary: "Test quality audit and cleanup"
    depends_on: ["Test Phase"]

  - name: "Documentation Phase"
    status: "pending"
    sub_plan: "live/plan_live_audit_clean.yml"
    summary: "Update user-facing documentation"
    depends_on: ["Audit Phase"]

# ========================================
# SUCCESS CRITERIA (Plan-Level)
# ========================================
# High-level success criteria for the entire plan.
# Detailed criteria are in each sub-plan.
success_criteria:
  user_validation:
    - "Users can use the new capability from CLI and API"
    - "Documentation clearly explains the new feature"
    - "Migration path documented for existing users"

  technical_validation:
    - "All integration tests pass"
    - "Architecture compliance verified"
    - "CI/CD pipeline validates new code"

# ========================================
# NOTES
# ========================================
notes:
  - "This is an example main plan structure - customize for your specific project"
  - "Update the context section after each session to maintain continuity"
  - "Use related_plans to coordinate work across multiple sub-plans"
  - "High-level phases track orchestration status; detailed tasks are in sub-plans"
