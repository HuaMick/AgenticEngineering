# Live Plan - Audit and Cleanup Phase (Example)
# This example shows structure for combined audit and cleanup phases.
# For detailed audit scenarios, see: reference/audit-scenarios-detailed.yml

worktree: /home/code/MyProject-feature-branch
liveplan: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_audit_clean.yml"
completedplan: "docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml"

previous_phases:
  teach_plan: plan_live_teach.yml
  build_plan: plan_live_build.yml
  test_plan: plan_live_test.yml

live-plans:
  - id: EXAMPLE-AUDIT-CLEAN-001
    title: Example Audit and Cleanup Phase

    phases:
      # ========================================
      # AUDIT PHASE (Full Detail Example)
      # ========================================
      - name: Audit Phase
        execution_groups:
          - execution: audit-test-fix-loop
            name: Audit implementation completeness
            agents:
              - type: audit
                inputs:
                  - src/feature/
                  - tests/feature/
                  - docs/feature.md
                guidance: |
                  Context: Audit the implementation for completeness and quality.

                  Audit Checklist:
                  1. Consistency Check:
                     - Do all components follow project patterns?
                     - Are naming conventions consistent?

                  2. Completeness Check:
                     - Are all requirements implemented?
                     - Is documentation complete?

                  3. Reward Hacking Check:
                     - Are tests meaningful (not just passing)?
                     - Were any changes superficial?
                success_criteria:
                  - All requirements implemented and documented
                  - Tests verify actual behavior
                  - No broken references

      # ========================================
      # CLEANUP PHASE (Abbreviated - Shows Structure)
      # ========================================
      - name: Cleanup Phase
        # Pattern: Sequential cleanup tasks
        execution_groups:
          - execution: sequential
            name: Remove development artifacts
            agents:
              - type: cleaner
                inputs:
                  - "project root"
                guidance: |
                  Remove temporary files, debug logs, and unused imports.
                  Verify no active references before deletion.
                success_criteria:
                  - No temporary files remain
                  - Clean working directory

          # Additional cleanup groups follow same pattern:
          # - Documentation cleanup
          # - Import optimization
          # - Configuration validation
          # See reference/audit-scenarios-detailed.yml for full examples

success_criteria:
  - Audit finds no critical issues
  - All cleanup tasks completed
  - Working directory clean
