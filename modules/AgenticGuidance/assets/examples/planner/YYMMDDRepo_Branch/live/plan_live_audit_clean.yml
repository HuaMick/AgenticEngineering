# Example Live Plan Structure - Cleanup, Audit, User Story Validation & Documentation Phases
# Extracted from plan_live.yml v2.1
# This file demonstrates the final phases of a live plan after build and test phases.
#
# Phase Order:
# 1. CLEANUP PHASE - Remove obsolete files using cleaner-voting-loop pattern
# 2. AUDIT PHASE - MANDATORY audit-test-fix-loop to validate test quality and detect reward hacking
# 3. USER STORY VALIDATION PHASE - PRIMARY SUCCESS CRITERIA - validate user journeys work
# 4. DOCUMENTATION PHASE - Document final state and validate user journeys
#
# KEY PRINCIPLES:
# 1. INPUTS: File-level (not directory-level)
# 2. GUIDANCE: Detailed and specific for orchestration agent
# 3. SUCCESS CRITERIA: Measurable and outcome-focused
# 4. PRIMARY SUCCESS: User story validation (can users achieve their goals?)

# Paths use relative format from repo root - orchestration provides specific folder
worktree: "<repo_root>"  # e.g., /home/code/AgenticEngineering
liveplan: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_audit_clean.yml"
completedplan: "docs/plans/live/<YYMMDDRepo_Branch>/completed/plan_completed.yml"

live-plans:
  - id: LANGGRAPH-JSON-SIMPLIFY-001
    title: Simplify langgraph.json to Home Directory Only
    description: Standardize on single source of truth - only use ~/.config/myagents/langgraph.json.

    # Reference to previous phases (read-only context for finalization)
    previous_phases:
      build_plan: plan_live_build.yml
      test_plan: plan_live_test.yml

    phases:
      # ========================================
      # CLEANUP PHASE
      # Must come BEFORE audit to ensure cleanup doesn't break functionality
      # Uses cleaner-voting-loop pattern for safe consensus-based cleanup
      # ========================================
      - name: Cleanup Phase
        execution_groups:
          # Sequential execution: Remove obsolete project config files
          - execution: sequential
            name: Remove obsolete local config files
            agents:
              - type: cleaner
                inputs:
                  - langgraph.json
                  - .gitignore
                guidance: |
                  Context: The old architecture created local langgraph.json files in project directories.
                  These are now obsolete. Remove them and prevent future creation via .gitignore.

                  Instructions:
                  1. Safety check: Verify ~/.config/myagents/langgraph.json exists (source of truth)
                  2. Search for langgraph.json files in project directory (exclude home directory)
                  3. Remove all project-local langgraph.json files found
                  4. Update .gitignore to add pattern:
                     # Home directory is source of truth for langgraph.json
                     langgraph.json
                  5. DO NOT remove ~/.config/myagents/langgraph.json (critical file)

                  Why this matters: Eliminates confusion from obsolete config files.
                success_criteria:
                  - No local config files in project (verified via search)
                  - Home directory config intact and unchanged
                  - .gitignore prevents future local configs

          # Sequential execution: Clean up obsolete test fixtures
          - execution: sequential
            name: Remove test fixtures for local discovery
            agents:
              - type: cleaner
                inputs:
                  - tests/test_config.py
                  - tests/test_setup.py
                  - tests/fixtures/langgraph.json
                guidance: |
                  Context: Test fixtures for local project discovery are obsolete.
                  Tests should only verify home directory behavior.

                  Instructions:
                  1. Review test files for local discovery test cases
                  2. Remove test cases that verify local project langgraph.json discovery
                  3. Remove test fixtures at tests/fixtures/langgraph.json if they exist
                  4. Update remaining tests to verify home directory behavior only:
                     - Home directory detection
                     - Home directory creation if missing
                     - Local files being ignored
                  5. Ensure test isolation (use temporary home directory via HOME env var)

                  Why this matters: Tests should reflect current architecture, not legacy behavior.
                success_criteria:
                  - All tests pass with no local config fixtures
                  - Test suite validates home directory behavior only
                  - Tests remain isolated (don't affect real home config)

      # ========================================
      # AUDIT PHASE (MANDATORY audit-test-fix-loop)
      # Comes AFTER cleanup to validate cleanup didn't break functionality
      # Validates test quality and detects reward hacking patterns
      # ========================================
      - name: Audit Phase
        execution_groups:
          # Audit-test-fix-loop: Audit → Test → Fix → Repeat (max 3 iterations)
          - execution: audit-test-fix-loop
            name: Architecture simplification validation
            agents:
              - type: audit
                inputs:
                  - frontend/agents/test/test-audit/process.yml
                  - backend/services/agents/src/workflows/health_check_workflow.py
                  - backend/services/studio/src/domains/studio_manager/manager.py
                  - tests/test_config.py
                  - tests/test_setup.py
                guidance: |
                  Context: Testing completed in test phase. This MANDATORY audit verifies test quality
                  and checks for reward hacking (tests pass but implementation is incorrect).

                  Audit Process: Execute test-audit/process.yml
                  Reporting: Update liveplan with findings under LANGGRAPH-JSON-SIMPLIFY-001.audit_findings

                  Audit Focus Areas:

                  1. Test Fairness (Reward Hacking Detection):
                  - Do tests actually verify home-only behavior or use hidden configs?
                  - Are tests checking for local file exclusion or just ignoring the issue?
                  - Do tests verify absolute paths or accept relative paths?
                  - Are error messages properly validated or just checking for any error?
                  - Tests that mock out the behavior they should be testing

                  2. Implementation Simplicity:
                  - Is code actually simpler or just rearranged? (measure LOC, cyclomatic complexity)
                  - Are there hidden fallbacks that weren't removed?
                  - Does StudioManager truly use home directory or is there a workaround?
                  - Are there code paths that still check local directories?

                  3. Architecture Compliance:
                  - Is home directory truly the single source of truth?
                  - Are there any multi-tier discovery patterns still present?
                  - Is preference routing completely removed or just disabled?
                  - Are absolute paths enforced or just recommended?

                  4. Test Quality Issues:
                  - Tests with overly permissive assertions
                  - Missing negative test cases (what shouldn't happen)
                  - Tests that check implementation instead of behavior

                  Findings Reporting Format:
                  ```yaml
                  audit_findings:
                    - finding_type: "reward_hacking" | "test_quality" | "architecture_violation" | "hidden_complexity"
                      component: "Component with issue"
                      description: "What was found"
                      severity: "high" | "medium" | "low"
                      recommendation: "What should be fixed"
                      affects: "tests" | "code" | "both"
                  ```
                success_criteria:
                  - All reward hacking patterns identified
                  - Architecture violations documented with severity
                  - Specific recommendations provided for each finding
                  - Test quality issues clearly distinguished from code issues

              - type: test
                inputs:
                  - frontend/agents/test/test-runner/process.yml
                  - backend/services/agents/src/workflows/health_check_workflow.py
                  - backend/services/studio/src/domains/studio_manager/manager.py
                  - tests/test_config.py
                guidance: |
                  Context: Audit completed. This testing validates audit findings are addressed
                  and performs final validation of simplified architecture.

                  Test Strategy: user-simulation-testing (execute entrypoints, validate user experience)
                  Test Process: Execute test-runner/process.yml
                  Reporting: Update liveplan with failures under LANGGRAPH-JSON-SIMPLIFY-001.final_validation_failures

                  Final Validation Scenarios:

                  1. Code Simplification Verification:
                  - Verify detect_project_root() is simpler (fewer lines, no complex logic)
                  - Verify detect_langgraph_path() has no fallback logic
                  - Verify StudioManager has fewer parameters
                  - Verify preference routing code is completely removed
                  - Measure: Quantify simplification (LOC reduction, cyclomatic complexity)

                  2. Config Structure Validation:
                  - Verify ~/.config/myagents/langgraph.json contains absolute paths
                  - Verify no relative paths in config
                  - Verify paths resolve correctly from any directory
                  - Verify no cwd-dependent behavior

                  3. End-to-End Flow Testing:
                  - Fresh setup: Remove ~/.config/myagents/, run setup, verify config created correctly
                  - Directory independence: Run commands from 5+ different directories
                  - Local file ignored: Create local langgraph.json, verify it's ignored
                  - Studio lifecycle: Start/stop studio from different directories

                  4. Audit Finding Verification:
                  - If audit found test quality issues, verify tests are now valid
                  - If audit found reward hacking, verify tests truly test behavior
                  - If audit found hidden complexity, verify it's removed
                  - Re-run any tests flagged by audit

                  Failure Reporting Format:
                  ```yaml
                  final_validation_failures:
                    - test_name: "Name of failed test"
                      component: "Component being tested"
                      failure_description: "What went wrong"
                      expected_behavior: "What should have happened"
                      actual_behavior: "What actually happened"
                      files_involved: ["list", "of", "files"]
                  ```
                success_criteria:
                  - All validation tests pass
                  - Code is measurably simpler (quantified reduction)
                  - Config structure validated (absolute paths enforced)
                  - End-to-end flows work from any directory
                  - All audit findings verified as addressed
                  - Zero test failures

              - type: build
                inputs:
                  - backend/services/agents/src/workflows/health_check_workflow.py
                  - backend/services/studio/src/workflows/studio_lifecycle.py
                  - backend/services/studio/src/domains/studio_manager/manager.py
                  - frontend/cli/myagents_cli.py
                  - tests/test_config.py
                  - tests/test_setup.py
                guidance: |
                  Context: Audit and testing identified issues. Build agents fix issues ONLY if
                  failures are traced to source code (not test quality issues).

                  Instructions:
                  1. Read liveplan and find your assigned failure/finding
                  2. Determine root cause:
                     - If audit found test quality issue: Fix tests FIRST
                     - If test failure is due to bad test: Fix test, not source code
                     - If test failure is due to source code bug: Fix source code
                  3. Priority order:
                     a) Fix tests if they're testing incorrectly
                     b) Rerun tests after fixing tests
                     c) Only fix source code if tests are valid and still failing
                  4. Mark issue as resolved in liveplan after fixing

                  Fix Categories:
                  - Test fixes: Correct assertions, remove mocking of behavior being tested, add negative tests
                  - Code fixes: Remove hidden complexity, enforce absolute paths, eliminate fallbacks
                  - Both: Sometimes tests and code both need fixes

                  Why this matters: Fixing tests first prevents false negatives where bad tests mask real issues.
                success_criteria:
                  - Tests pass (both the fixed test and related tests)
                  - Issue no longer reproducible
                  - No regression in previously working functionality

      # ========================================
      # USER STORY VALIDATION PHASE (PRIMARY SUCCESS CRITERIA)
      # Comes AFTER audit to ensure test quality is validated
      # Comes BEFORE documentation so docs can reflect validated behavior
      # Validates that complete user journeys work as expected
      # ========================================
      - name: User Story Validation Phase
        execution_groups:
          # Sequential execution: Validate user stories for config simplification
          - execution: sequential
            name: Validate config simplification user stories
            agents:
              - type: user_simulator
                inputs:
                  - docs/userstories/MyAgents/config_management.yml
                  - docs/configuration.md
                  - docs/SETUP.md
                guidance: |
                  Context: This is the PRIMARY SUCCESS CRITERIA for the implementation.
                  User Story tests validate that complete user journeys work as expected.

                  Approach: Agent-blind-test (follow documentation only, no source code knowledge)

                  Instructions:
                  1. Read user stories from docs/userstories/MyAgents/config_management.yml
                  2. For each user story, execute the described journey:
                     - Follow only the documentation (configuration.md, SETUP.md)
                     - Do NOT use source code knowledge
                     - Simulate a real user who only has access to docs
                  3. Test environments:
                     - Local: Run commands from multiple directories (~/, /tmp, project dir)
                     - Verify work-from-anywhere capability
                  4. Record pass/fail for each user story

                  User Stories to Validate:
                  - "Run commands from any directory without manual config"
                  - "Setup 'just works' without understanding config internals"
                  - "Old local configs do not interfere"

                  Failure Reporting Format:
                  ```yaml
                  user_story_failures:
                    - story: "Story description"
                      environment: "local" | "docker" | "cloud"
                      failure_description: "What went wrong"
                      documentation_gap: "What was missing or unclear in docs"
                      suggested_fix: "How to fix the issue"
                  ```

                  Why this matters: If users can't complete their journeys, the implementation has failed
                  regardless of whether tests pass.
                success_criteria:
                  - All user stories in config_management.yml pass
                  - User journeys complete successfully using only documentation
                  - Work-from-anywhere capability verified from multiple directories

          # Sequential execution: Validate migration user stories
          - execution: sequential
            name: Validate migration user stories
            agents:
              - type: user_simulator
                inputs:
                  - docs/userstories/MyAgents/migration.yml
                  - docs/MIGRATION.md
                  - docs/configuration.md
                guidance: |
                  Context: Migration user stories validate that existing users can transition
                  from old architecture (local configs) to new architecture (home directory only).

                  Approach: Agent-blind-test (follow documentation only)

                  Instructions:
                  1. Read user stories from docs/userstories/MyAgents/migration.yml
                  2. Simulate a user with existing local langgraph.json files
                  3. Follow migration documentation to transition to home directory config
                  4. Verify:
                     - Local configs are properly ignored after migration
                     - Home directory config is created correctly
                     - Commands work from any directory after migration
                  5. Record pass/fail for each migration scenario

                  Migration Scenarios to Validate:
                  - Fresh install (no existing config)
                  - Existing local config only
                  - Existing home config only
                  - Both local and home configs present

                  Failure Reporting Format:
                  ```yaml
                  migration_failures:
                    - scenario: "Migration scenario"
                      initial_state: "Starting configuration state"
                      failure_description: "What went wrong"
                      documentation_gap: "What was missing in migration docs"
                      suggested_fix: "How to fix the issue"
                  ```

                  Why this matters: Migrating users are most likely to hit edge cases and confusion.
                success_criteria:
                  - All migration scenarios complete successfully
                  - No data loss during migration
                  - Local configs properly ignored after migration
                  - Clear error messages for any migration issues

      # ========================================
      # DOCUMENTATION PHASE
      # Comes last to document final state
      # Validates that users can achieve their goals following documentation alone
      # ========================================
      - name: Documentation Phase
        execution_groups:
          # Sequential execution: Update configuration guide
          - execution: sequential
            name: Update configuration documentation
            agents:
              - type: documentation
                inputs:
                  - docs/configuration.md
                  - backend/services/agents/src/workflows/health_check_workflow.py
                  - backend/services/studio/src/domains/studio_manager/manager.py
                guidance: |
                  Context: Architecture simplified to use only home directory for langgraph.json.
                  Documentation must reflect this change and guide users clearly.

                  Instructions:
                  1. Update "Configuration Location" section:
                     - Document ~/.config/myagents/ as single source of truth
                     - Remove references to local project langgraph.json files
                     - Remove references to preference-based routing
                     - Explain work-from-anywhere capability

                  2. Add "Absolute Paths Requirement" section:
                     - Explain langgraph.json must contain absolute paths
                     - Provide example of correct absolute path format
                     - Explain why absolute paths enable work-from-anywhere

                  3. Update examples:
                     - Show example langgraph.json with absolute paths
                     - Show commands working from different directories
                     - Remove examples with local project configs

                  4. Trace to source code:
                     - Reference health_check_workflow.py for detection logic
                     - Reference studio_manager/manager.py for Studio config usage
                     - Ensure documentation matches actual implementation

                  Why this matters: Users need clear documentation to understand new architecture.
                success_criteria:
                  - Users can locate config from documentation alone
                  - Examples demonstrate work-from-anywhere capability
                  - Documentation matches actual implementation behavior

          # Sequential execution: Update README and SETUP
          - execution: sequential
            name: Update README and setup documentation
            agents:
              - type: documentation
                inputs:
                  - README.md
                  - docs/SETUP.md
                  - backend/services/agents/src/workflows/setup_workflow.py
                guidance: |
                  Context: README and SETUP are first documents users read. Must clearly
                  explain home directory config and work-from-anywhere capability.

                  Instructions for README.md:
                  1. Update "Configuration" section:
                     - Emphasize work-from-anywhere (run commands from any directory)
                     - Explain home directory config (~/.config/myagents/)
                     - Remove references to local project discovery

                  2. Update "Quick Start" section:
                     - Show setup creates home directory config
                     - Show examples of running commands from different directories

                  Instructions for SETUP.md:
                  1. Update setup steps:
                     - Clarify setup creates ~/.config/myagents/langgraph.json
                     - Explain this config is used from anywhere
                     - Remove references to project-local setup

                  2. Add "Verification" section:
                     - Verify config exists at ~/.config/myagents/langgraph.json
                     - Verify commands work from any directory
                     - Test by cd'ing to different directories

                  3. Trace to source code:
                     - Reference setup_workflow.py for setup process
                     - Ensure documentation matches actual setup behavior

                  Why this matters: Clear setup documentation prevents user confusion.
                success_criteria:
                  - New users complete setup following only README and SETUP docs
                  - Verification steps confirm work-from-anywhere behavior
                  - Documentation accurately describes actual setup behavior

    # ========================================
    # PRIMARY SUCCESS CRITERIA
    # User story validation - can users achieve their goals?
    # ========================================
    user_stories:
      - story: "As a user, I want to run myagents commands from any directory without manual config"
        validation: "Commands work from ~/, /tmp, /var/tmp, and project directories"
        status: "must_validate"

      - story: "As a user, I want setup to 'just work' without understanding config internals"
        validation: "User follows SETUP.md, runs setup command, can use myagents from anywhere"
        status: "must_validate"

      - story: "As a migrating user, I want old local configs to not interfere"
        validation: "Local langgraph.json files are ignored, home directory config used"
        status: "must_validate"
