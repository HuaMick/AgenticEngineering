# Live Plan - Test Phase (Example)
# This skeleton shows test plan structure. For detailed test scenarios,
# see: reference/test-scenarios-detailed.yml
#
# LOCATION: This file belongs in the live/ subfolder of a plan folder.
# It demonstrates a PHASE-SPECIFIC plan (one of several in a plan folder).
# See plan_example.yml at the plan root for the unified reference structure.

worktree: /home/code/MyProject-feature-branch
liveplan: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_test.yml"
completedplan: "docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml"

previous_phases:
  build_plan: plan_live_build.yml

live-plans:
  - id: EXAMPLE-TEST-001
    title: Example Test Phase

    phases:
      # ========================================
      # TEST PHASE - Component Testing
      # ========================================
      - name: Component Tests
        execution_groups:
          - execution: test-fix-loop
            name: Test core components
            agents:
              # Single component test agent (pattern example)
              - type: test-component
                inputs:
                  - src/core/
                  - tests/unit/
                guidance: |
                  Context: Validate core component implementation.

                  Test Categories:
                  1. Unit Tests: Pure function behavior
                  2. Edge Cases: Boundary conditions, null handling
                  3. Error Handling: Exception paths

                  Strategy: agent-blind-test (write tests without implementation knowledge)
                success_criteria:
                  - All unit tests pass
                  - Edge cases covered
                  - Error handling verified

              # Additional component agents follow same pattern
              # See reference/test-scenarios-detailed.yml for full examples

      # ========================================
      # TEST PHASE - User Flow Testing
      # ========================================
      - name: User Flow Tests
        execution_groups:
          - execution: test-fix-loop
            name: Test end-to-end user flows
            agents:
              # Single user flow agent (pattern example)
              - type: test-e2e
                inputs:
                  - src/api/
                  - src/cli/
                  - tests/e2e/
                guidance: |
                  Context: Validate complete user workflows.

                  Test Categories:
                  1. Happy Path: Normal usage flow
                  2. Error Recovery: User error handling
                  3. Integration: Component interaction
                success_criteria:
                  - User flows complete successfully
                  - Error messages clear and helpful
                  - No broken integration points

              # Additional user flow agents follow same pattern

      # ========================================
      # TEST PHASE - Dynamic Build Testing
      # ========================================
      - name: Dynamic Build Tests
        execution_groups:
          - execution: sequential
            name: Build and run all tests
            agents:
              - type: test-runner
                inputs:
                  - pyproject.toml
                  - tests/
                guidance: |
                  Pattern: Run test suite after each fix iteration.
                  1. Build project (if applicable)
                  2. Run full test suite
                  3. Report failures for fix-loop iteration
                success_criteria:
                  - Build succeeds
                  - All tests pass
                  - No regressions

success_criteria:
  - All component tests pass
  - All user flow tests pass
  - Build and test suite green
