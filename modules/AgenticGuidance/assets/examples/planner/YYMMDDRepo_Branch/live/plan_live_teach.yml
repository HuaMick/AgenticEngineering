# Example Live Plan Structure - Teach Phase
# This file demonstrates the TEACH phase of a live plan, focused on guidance refinement.
#
# KEY PRINCIPLES:
# 1. INPUTS: Guidance files (process.yml, definitions.yml, manifest.yml, examples)
# 2. GUIDANCE: Focused on "Context Engineering" - improving paths, fences, and signposts.
# 3. SUCCESS CRITERIA: Experience-driven and observable (e.g., "Agent no longer ignores X").
# 4. NO CODE: Teaching is about refining the AI's "mental model" via documentation/guidance.

# Paths use relative format from repo root - orchestration provides specific folder
worktree: "<repo_root>"  # e.g., /home/code/AgenticEngineering
liveplan: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_teach.yml"
completedplan: "docs/plans/live/<YYMMDDRepo_Branch>/completed/plan_completed.yml"

# ========================================
# ROOT-LEVEL INPUTS (Pre-gathered Context)
# ========================================
# Root-level inputs enable orchestration agents to pre-gather context BEFORE
# spawning teacher agents. This is critical for teaching phases that need to
# understand existing guidance before making improvements.
#
# Note: Agent-level inputs provide task-specific files to modify.
# Root-level inputs provide the "why" context for guidance refinement.
inputs:
  # Guidance files to be refined
  - location: "agents/planner/planner-build/process.yml"
    description: "Planner-build process - primary target for teaching refinement"

  - location: "assets/definitions/agent-loops.yml"
    description: "Loop definitions that may need signpost improvements"

  - location: "assets/definitions/reward-hacking.yml"
    description: "Reward-hacking definition for audit fence improvements"

  # Friction analysis context
  - location: "analysis/friction-analysis.md"
    description: "Friction analysis identifying gaps in agent guidance"

  # Agent category definitions
  - location: "assets/definitions/agent-categories.yml"
    description: "Agent category definitions for proper agent selection"

# ========================================
# DECISION ITEMS (Human-Required Decisions)
# ========================================
# Decision items track choices that require human judgment and can't be automated.
# Use this section when:
# - Multiple valid approaches exist and the user should choose
# - A change has significant impact and needs explicit approval
# - Legacy code/agents need a deprecation/migration decision
#
# Each item should have a clear title, severity, and context explaining the decision.
# Update status and resolution as decisions are made.
decision_items:
  # Example: OPEN decision (awaiting human input)
  - id: "DECISION-001"
    title: "Choose dependency injection pattern"
    severity: "high"
    status: "OPEN"
    context: |
      The new workflow layer requires dependency injection for testability.
      Multiple patterns are available, each with trade-offs.
    options:
      - "Constructor injection: Simple, explicit, but verbose for many dependencies"
      - "Service locator: Flexible, but harder to test and trace"
      - "Dependency container: Powerful, but adds framework complexity"
    recommendation: "Constructor injection (recommended for clarity and testability)"

  # Example: RESOLVED decision (completed with resolution)
  - id: "DECISION-002"
    title: "Deprecate legacy planner agent"
    severity: "critical"
    status: "RESOLVED"
    resolution: "Deprecate - functionality absorbed by orchestration-planning"
    resolved_date: "2026-01-06"
    context: |
      Legacy planner-phases agent exists only in old location and has not been
      migrated. Its functionality overlaps with orchestration-planning.
    options:
      - "Migrate with full updates"
      - "Deprecate if functionality absorbed by other agents"
      - "Merge into orchestration-planning"

live-plans:
  - id: EXAMPLE-TEACH-001
    title: Example Teach Plan Structure
    description: Refinement of planner-agent guidance to reduce reward-hacking.

    phases:
      # ========================================
      # TEACH PHASE
      # ========================================
      - name: Teach Phase
        execution_groups:
          - execution: parallel
            agents:
              # Agent 1: Refine Planner Process
              - type: teacher
                inputs:
                  - agents/planner/planner-build/process.yml
                  - assets/definitions/agent-loops.yml
                guidance: |
                  Context: Planner agents are skipping the "cleanup" phase even when specifically
                  requested, leading to bloated live plans.

                  Instructions:
                  1. In planner-build/process.yml, add a MANDATORY check for cleanup phase.
                  2. Add a "signpost" (example) showing when a cleanup phase is required vs optional.
                  3. Update agent-loops.yml to explicitly link cleanup phase to "Pre-Flight Validation" outcomes.

                  Why this matters: Ensures plans stay lean and focused by enforcing cleanup steps.
                success_criteria:
                  - Process file contains explicit "MANDATORY" check for cleanup phase.
                  - Signpost/example clearly distinguishes between required and optional cleanup.
                  - Agent-loops.yml reflects the linkage to pre-flight outcomes.

              # Agent 2: Update Definition Signposts
              - type: teacher
                inputs:
                  - assets/definitions/reward-hacking.yml
                guidance: |
                  Context: Reward-hacking definition is too abstract; agents are ignoring it
                  during the audit phase.

                  Instructions:
                  1. In reward-hacking.yml, add 3 concrete "negative examples" (what NOT to do).
                  2. Use concise writing style for the examples - eliminate filler words and meta-commentary.
                  3. Add a "fence" instruction: "If any of these 3 patterns are detected, FAIL the audit."

                  Why this matters: Makes reward-hacking checks more objective and harder to ignore.
                success_criteria:
                  - Definition file includes 3 concrete negative examples.
                  - Writing style is concise - no filler words or meta-commentary.
                  - Explicit "FAIL" condition added to the definition.


