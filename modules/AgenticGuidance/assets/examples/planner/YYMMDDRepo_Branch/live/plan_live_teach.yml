# Live Plan - Teach Phase (Example)
# This skeleton shows teach plan structure for guidance improvement phases.
#
# LOCATION: This file belongs in the live/ subfolder of a plan folder.
# It demonstrates a PHASE-SPECIFIC plan (one of several in a plan folder).
# See plan_example.yml at the plan root for the unified reference structure.

worktree: /home/code/MyProject-feature-branch
liveplan: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_teach.yml"
completedplan: "docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml"

live-plans:
  - id: EXAMPLE-TEACH-001
    title: Example Teaching/Guidance Phase

    phases:
      # ========================================
      # TEACH PHASE - Friction Analysis
      # ========================================
      - name: Friction Analysis
        execution_groups:
          - execution: sequential
            name: Identify guidance friction points
            agents:
              - type: teacher-analyze
                inputs:
                  - modules/AgenticGuidance/agents/
                  - docs/friction-reports/
                guidance: |
                  Context: Analyze recent agent behavior for friction.

                  Analysis Steps:
                  1. Review recent agent failures
                  2. Identify root causes (missing fence, unclear path, etc.)
                  3. Prioritize fixes by impact
                success_criteria:
                  - Friction points documented
                  - Root causes identified
                  - Fixes prioritized

      # ========================================
      # TEACH PHASE - Guidance Updates
      # ========================================
      - name: Guidance Updates
        execution_groups:
          - execution: sequential
            name: Apply guidance improvements
            agents:
              - type: teacher-update-guidance
                inputs:
                  - analysis output from previous phase
                  - target process.yml files
                guidance: |
                  Context: Update agent guidance to address friction.

                  Update Steps:
                  1. Add missing fences/paths
                  2. Clarify ambiguous instructions
                  3. Add examples where helpful
                success_criteria:
                  - Guidance updated
                  - No broken references
                  - Changes follow patterns

              - type: teacher-update-assets
                inputs:
                  - modules/AgenticGuidance/assets/
                guidance: |
                  Context: Update shared assets if needed.

                  Update Steps:
                  1. Create/update definitions
                  2. Add examples
                  3. Update manifests
                success_criteria:
                  - Assets consistent
                  - Manifests updated

success_criteria:
  - Friction points addressed
  - Guidance improved
  - Ready for verification
