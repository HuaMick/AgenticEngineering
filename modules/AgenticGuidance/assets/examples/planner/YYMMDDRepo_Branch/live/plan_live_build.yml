# Example Live Plan Structure - Build Phase
# Extracted from plan_live.yml v2.1
# This file demonstrates the BUILD phase of a live plan.
#
# BUILD PHASE includes:
# - Environment Setup (verify dependencies, create branch, setup development environment)
# - Domain Layer Build (business logic, services, validators - parallelizable)
# - Workflow Layer Build (orchestration of domain services - sequential after domain)
# - Entrypoint Layer Build (CLI, API, UI - parallelizable after workflow)
# - Integration Testing (test-fix-loop pattern for iterative validation)
# - CI/CD Validation (mandatory when test infrastructure changes)
#
# KEY PRINCIPLES:
# 1. INPUTS: File-level (not directory-level) - provide specific files agents need
# 2. GUIDANCE: Detailed and specific for orchestration agent to construct prompts
# 3. SUCCESS CRITERIA: Measurable and outcome-focused
# 4. ARCHITECTURE: Domain -> Workflow -> Entrypoint pattern for layered implementation
# 5. EXECUTION: test-fix-loop pattern for integration testing phase
#
# ARCHITECTURE PATTERN:
# - Domain Layer: Pure business logic, no external dependencies, highly testable
# - Workflow Layer: Orchestrates domain services, handles cross-cutting concerns
# - Entrypoint Layer: User-facing interfaces (CLI, API, UI) that invoke workflows

# Paths use relative format from repo root - orchestration provides specific folder
worktree: "<repo_root>"  # e.g., /home/code/AgenticEngineering
liveplan: "docs/plans/live/<YYMMDDRepo_Branch>/live/plan_live_build.yml"
completedplan: "docs/plans/live/<YYMMDDRepo_Branch>/completed/plan_completed.yml"

live-plans:
  - id: EXAMPLE-HEALTHCHECK-001
    title: Implement Health Check API
    description: |
      Build a health check API demonstrating the Domain -> Workflow -> Entrypoint architecture pattern.
      This example shows proper layering: domain contains business logic, workflow orchestrates it,
      and entrypoints (CLI + API) expose it to users.

    phases:
      # ========================================
      # PHASE 1: ENVIRONMENT SETUP
      # Sequential execution - must complete before development begins
      # ========================================
      - name: Environment Setup
        execution_groups:
          - execution: sequential
            name: Development environment preparation
            agents:
              - type: build
                inputs:
                  - pyproject.toml
                  - requirements.txt
                  - .python-version
                  - Makefile
                guidance: |
                  Context: Before any implementation begins, the development environment must be
                  properly configured. This ensures all agents work with consistent tooling and
                  dependencies.

                  Instructions:
                  1. Verify Python version matches .python-version specification
                  2. Create virtual environment if not present: uv venv
                  3. Install dependencies: uv pip install -e ".[dev]"
                  4. Verify critical tools available: pytest, mypy, ruff
                  5. Create feature branch: git checkout -b feature/health-check-api
                  6. Verify clean git status before proceeding

                  Why this matters: Environment inconsistencies cause cryptic failures later.
                  Upfront verification prevents wasted cycles debugging environment issues.
                success_criteria:
                  - Virtual environment active with all dependencies installed
                  - Python version matches specification
                  - Development tools (pytest, mypy, ruff) accessible
                  - Feature branch created and checked out
                  - Git status clean (no uncommitted changes)

      # ========================================
      # PHASE 2: DOMAIN LAYER BUILD
      # Parallel execution - domain components are independent
      # ========================================
      - name: Domain Layer Build
        execution_groups:
          - execution: parallel
            name: Domain services and validators implementation
            agents:
              # Agent 1: Health Check Service
              - type: build
                inputs:
                  - src/domain/__init__.py
                  - src/domain/services/__init__.py
                  - src/domain/models/__init__.py
                  - tests/domain/__init__.py
                guidance: |
                  Context: The health check service is pure domain logic with no external dependencies.
                  It defines what "healthy" means for our system and how to check component status.

                  Instructions:
                  1. Create src/domain/services/health_service.py with:
                     - HealthStatus enum: HEALTHY, DEGRADED, UNHEALTHY
                     - ComponentHealth dataclass: name, status, message, latency_ms
                     - SystemHealth dataclass: overall_status, components, timestamp
                     - HealthService class with check_component() and aggregate_health() methods
                  2. Keep logic pure - no I/O, no external calls, just data transformation
                  3. Create tests/domain/test_health_service.py with unit tests:
                     - Test status aggregation (any UNHEALTHY = UNHEALTHY overall)
                     - Test component health creation
                     - Test edge cases (empty components, all healthy, mixed)
                  4. Run tests: pytest tests/domain/test_health_service.py -v
                  5. Type check: mypy src/domain/services/health_service.py

                  Why this matters: Pure domain logic is highly testable and reusable. By keeping
                  I/O out of this layer, we can unit test exhaustively without mocks.
                success_criteria:
                  - Health service created at src/domain/services/health_service.py
                  - HealthStatus, ComponentHealth, SystemHealth types defined
                  - Unit tests pass with 100% coverage of domain logic
                  - Type checking passes with no errors
                  - No external dependencies in domain layer

              # Agent 2: Health Validators
              - type: build
                inputs:
                  - src/domain/__init__.py
                  - src/domain/validators/__init__.py
                  - tests/domain/__init__.py
                guidance: |
                  Context: Validators ensure health check inputs and outputs meet our contracts.
                  They live in the domain layer because validation rules are business logic.

                  Instructions:
                  1. Create src/domain/validators/health_validators.py with:
                     - validate_component_name(): non-empty string, alphanumeric with underscores
                     - validate_latency_threshold(): positive integer, max 30000ms
                     - validate_health_response(): all required fields present, valid status
                  2. Raise ValidationError with descriptive messages on failure
                  3. Create tests/domain/test_health_validators.py:
                     - Test valid inputs pass
                     - Test invalid inputs raise ValidationError with clear messages
                     - Test boundary cases (empty string, zero latency, max latency)
                  4. Run tests: pytest tests/domain/test_health_validators.py -v
                  5. Type check: mypy src/domain/validators/health_validators.py

                  Why this matters: Validators catch bad data early, before it causes confusing
                  downstream failures. Clear validation messages help debugging.
                success_criteria:
                  - Validators created at src/domain/validators/health_validators.py
                  - ValidationError class defined with descriptive messages
                  - Unit tests cover valid, invalid, and boundary cases
                  - Type checking passes with no errors
                  - All tests pass

      # ========================================
      # PHASE 3: WORKFLOW LAYER BUILD
      # Sequential execution - depends on domain layer completion
      # ========================================
      - name: Workflow Layer Build
        execution_groups:
          - execution: sequential
            name: Health check workflow orchestration
            agents:
              - type: build
                inputs:
                  - src/domain/services/health_service.py
                  - src/domain/validators/health_validators.py
                  - src/workflows/__init__.py
                  - tests/workflows/__init__.py
                guidance: |
                  Context: The workflow layer orchestrates domain services and handles external
                  integrations. It's the bridge between pure domain logic and the outside world.

                  Instructions:
                  1. Create src/workflows/health_check_workflow.py with:
                     - HealthCheckWorkflow class that:
                       a. Accepts list of component checkers (dependency injection)
                       b. Validates inputs using domain validators
                       c. Executes health checks using HealthService
                       d. Handles timeouts and failures gracefully
                       e. Returns SystemHealth with all component results
                  2. Define ComponentChecker protocol/interface for dependency injection
                  3. Create concrete checkers:
                     - DatabaseChecker: verifies database connection
                     - CacheChecker: verifies cache availability
                     - ExternalServiceChecker: verifies external API health
                  4. Create tests/workflows/test_health_check_workflow.py:
                     - Use mock checkers to test workflow logic
                     - Test timeout handling
                     - Test partial failure scenarios
                     - Test validation integration
                  5. Run tests: pytest tests/workflows/test_health_check_workflow.py -v
                  6. Type check: mypy src/workflows/health_check_workflow.py

                  Why this matters: Workflows contain the "how" of operations. By using dependency
                  injection, we can test workflow logic without real external services.
                success_criteria:
                  - Workflow created at src/workflows/health_check_workflow.py
                  - ComponentChecker protocol defined for extensibility
                  - At least 3 concrete checkers implemented
                  - Workflow uses domain validators and services correctly
                  - Tests cover success, timeout, and failure scenarios
                  - Type checking passes with no errors

      # ========================================
      # PHASE 4: ENTRYPOINT LAYER BUILD
      # Parallel execution - CLI and API are independent
      # ========================================
      - name: Entrypoint Layer Build
        execution_groups:
          - execution: parallel
            name: CLI and API entrypoint implementation
            agents:
              # Agent 1: CLI Entrypoint
              - type: build
                inputs:
                  - src/workflows/health_check_workflow.py
                  - src/cli/__init__.py
                  - pyproject.toml
                  - tests/cli/__init__.py
                guidance: |
                  Context: The CLI entrypoint exposes health check functionality to command-line
                  users. It translates CLI arguments to workflow calls and formats output.

                  Instructions:
                  1. Create src/cli/health_commands.py with:
                     - health_check() command: runs full health check, outputs JSON or table
                     - health_component() command: checks single component by name
                     - --format flag: json, table, or simple (default: table)
                     - --timeout flag: max seconds to wait (default: 10)
                     - --verbose flag: include detailed component info
                  2. Use click or typer for CLI framework (consistent with existing CLI)
                  3. Register commands in main CLI group (check pyproject.toml for entry point)
                  4. Create tests/cli/test_health_commands.py:
                     - Use click.testing.CliRunner for CLI testing
                     - Test each output format
                     - Test error handling and exit codes
                     - Test help text is descriptive
                  5. Run tests: pytest tests/cli/test_health_commands.py -v
                  6. Manual test: myagents health check --format json

                  Why this matters: CLI is often the first touchpoint for developers. Good CLI UX
                  (clear help, multiple formats, sensible defaults) improves adoption.
                success_criteria:
                  - CLI commands created at src/cli/health_commands.py
                  - Commands registered and accessible via main CLI
                  - All output formats work correctly (json, table, simple)
                  - Exit codes follow convention (0=healthy, 1=degraded, 2=unhealthy)
                  - Tests pass including format and error handling tests
                  - Help text is descriptive and accurate

              # Agent 2: API Entrypoint
              - type: build
                inputs:
                  - src/workflows/health_check_workflow.py
                  - src/api/__init__.py
                  - tests/api/__init__.py
                guidance: |
                  Context: The API entrypoint exposes health check functionality to HTTP clients.
                  It follows REST conventions and returns appropriate status codes.

                  Instructions:
                  1. Create src/api/health_routes.py with:
                     - GET /health: full system health check
                     - GET /health/{component}: single component health
                     - Response schema: {status, components, timestamp, version}
                     - HTTP status codes: 200=healthy, 503=degraded/unhealthy
                  2. Use FastAPI or existing API framework (check existing routes for pattern)
                  3. Add request validation using Pydantic models
                  4. Include OpenAPI documentation (FastAPI auto-generates)
                  5. Create tests/api/test_health_routes.py:
                     - Use TestClient for API testing
                     - Test response schema correctness
                     - Test HTTP status code mapping
                     - Test invalid component name handling
                  6. Run tests: pytest tests/api/test_health_routes.py -v
                  7. Manual test: curl http://localhost:8000/health | jq

                  Why this matters: Health endpoints are critical for load balancers and monitoring.
                  Standard conventions (503 for unhealthy) enable automated health management.
                success_criteria:
                  - API routes created at src/api/health_routes.py
                  - Routes registered and accessible via main API
                  - Response schema matches specification
                  - HTTP status codes follow conventions (200 healthy, 503 unhealthy)
                  - OpenAPI documentation generated correctly
                  - Tests pass including schema and status code tests

      # ========================================
      # PHASE 5: INTEGRATION TESTING
      # test-fix-loop execution - iterate until all tests pass
      # ========================================
      - name: Integration Testing
        execution_groups:
          - execution: test-fix-loop
            name: End-to-end integration validation
            agents:
              # Test agents run first
              - type: test
                count: 2
                inputs:
                  - src/domain/services/health_service.py
                  - src/domain/validators/health_validators.py
                  - src/workflows/health_check_workflow.py
                  - src/cli/health_commands.py
                  - src/api/health_routes.py
                  - tests/integration/__init__.py
                guidance: |
                  Context: Integration tests verify that all layers work together correctly.
                  They test the full path from entrypoint through workflow to domain and back.

                  Instructions:
                  Agent 1 - CLI Integration Tests:
                  1. Create tests/integration/test_cli_integration.py
                  2. Test full CLI flow with real (but local) components:
                     - Start test server/database if needed
                     - Run: myagents health check --format json
                     - Verify JSON schema matches API response
                     - Test: myagents health check --format table
                     - Verify table format is readable
                     - Test component-specific: myagents health component database
                  3. Test error scenarios:
                     - Invalid component name
                     - Timeout simulation
                     - Partial failure (some components unhealthy)
                  4. Capture actual outputs as test evidence

                  Agent 2 - API Integration Tests:
                  1. Create tests/integration/test_api_integration.py
                  2. Test full API flow with real (but local) components:
                     - Start test server
                     - GET /health and verify response schema
                     - GET /health/database and verify single component response
                     - Verify HTTP status codes (200/503) match health status
                  3. Test error scenarios:
                     - Invalid component: GET /health/nonexistent -> 404
                     - Simulated unhealthy component -> 503
                  4. Test consistency: CLI and API should return same health status

                  FAILURE REPORTING FORMAT:
                  Add failures to live plan under EXAMPLE-HEALTHCHECK-001.integration_test_failures:
                  - test_name: Name of failed test
                  - layer: "cli" or "api"
                  - failure_description: What went wrong
                  - expected_behavior: What should have happened
                  - actual_behavior: What actually happened
                  - command_or_endpoint: CLI command or API endpoint tested
                  - error_output: Actual error message
                success_criteria:
                  - All CLI integration tests pass
                  - All API integration tests pass
                  - CLI and API return consistent health status
                  - Error scenarios handled gracefully
                  - No test pollution (each test is independent)

              # Build agents fix failures found by test agents
              - type: build
                count: "n = total failures"
                inputs:
                  - src/domain/services/health_service.py
                  - src/domain/validators/health_validators.py
                  - src/workflows/health_check_workflow.py
                  - src/cli/health_commands.py
                  - src/api/health_routes.py
                guidance: |
                  Context: Test agents have identified integration failures. Each build agent
                  is assigned ONE specific failure to fix.

                  Instructions:
                  1. Read assigned failure from live plan (integration_test_failures)
                  2. Analyze failure to determine root cause:
                     - Layer mismatch: workflow returns different format than entrypoint expects
                     - Missing error handling: exception not caught at entrypoint
                     - Schema drift: domain model changed but entrypoint not updated
                     - Configuration issue: hardcoded values instead of configuration
                  3. Implement targeted fix:
                     - Modify only files necessary to fix the specific failure
                     - Add missing error handling if that's the issue
                     - Update schema mappings if there's drift
                     - Add missing validation if input handling failed
                  4. Verify fix locally:
                     - Reproduce original failure
                     - Apply fix
                     - Re-run specific failing test
                     - Run related tests to check for regressions
                  5. Update live plan:
                     - Mark failure as resolved
                     - Document what was changed and why

                  Why this matters: Targeted fixes prevent introducing new bugs. One agent per
                  failure enables parallel fixing without conflicts.
                success_criteria:
                  - Assigned failure is resolved (test now passes)
                  - Fix is minimal and targeted
                  - No regressions in related tests
                  - Live plan updated with resolution details

      # ========================================
      # PHASE 6: CI/CD VALIDATION
      # Sequential execution - mandatory phase per planner-build manifest
      # ========================================
      - name: CI/CD Validation
        execution_groups:
          - execution: sequential
            name: CI/CD pipeline validation
            agents:
              - type: deploy
                inputs:
                  - tests/integration/test_cli_integration.py
                  - tests/integration/test_api_integration.py
                  - pytest.ini
                  - pyproject.toml
                  - Dockerfile.test
                  - cloudbuild.yaml
                guidance: |
                  Context: This phase is MANDATORY per planner-build manifest when changes touch
                  test infrastructure. It validates that CI/CD pipeline will succeed with the
                  new health check tests.

                  Instructions:
                  1. Verify test discovery:
                     - Run: pytest --collect-only tests/
                     - Confirm new integration tests are discovered
                     - Check pytest.ini includes integration test markers
                  2. Verify Docker test build:
                     - Run: docker build -f Dockerfile.test -t healthcheck-test .
                     - Run: docker run --rm healthcheck-test pytest tests/integration/
                     - Confirm tests pass in containerized environment
                  3. Validate Cloud Build configuration:
                     - Check cloudbuild.yaml includes integration test step
                     - Verify test step uses correct Docker image
                     - Confirm timeout is sufficient for integration tests
                  4. Run full CI simulation:
                     - Execute: gcloud builds submit --config=cloudbuild.yaml --dry-run (if available)
                     - Or: Run cloudbuild.yaml steps manually in sequence
                  5. Document any CI/CD configuration updates needed

                  Why this matters: CI/CD validation prevents the common failure mode of "works
                  locally but fails in pipeline." Integration tests often have environment
                  dependencies that surface only in CI.
                success_criteria:
                  - All new tests discovered by pytest
                  - Docker test build succeeds
                  - Tests pass in Docker container
                  - Cloud Build configuration is valid
                  - No test isolation issues in CI environment

    # ========================================
    # USER STORIES (Validation Criteria)
    # ========================================
    user_stories:
      - id: US-001
        title: Developer checks system health
        persona: Backend developer
        scenario: |
          As a backend developer, I want to quickly check if all system components
          are healthy so I can diagnose issues during development.
        acceptance_criteria:
          - Can run health check from any directory
          - Output clearly shows which components are healthy/unhealthy
          - Unhealthy components include diagnostic information
          - Multiple output formats available (json for scripts, table for humans)

      - id: US-002
        title: Load balancer health probe
        persona: DevOps engineer
        scenario: |
          As a DevOps engineer, I want to configure health probes for the load balancer
          so unhealthy instances are automatically removed from rotation.
        acceptance_criteria:
          - GET /health returns 200 for healthy, 503 for unhealthy
          - Response includes all component statuses
          - Endpoint responds within 5 seconds
          - No authentication required for health endpoint

      - id: US-003
        title: Monitoring integration
        persona: SRE
        scenario: |
          As an SRE, I want to collect health metrics over time so I can detect
          degradation trends before they become outages.
        acceptance_criteria:
          - Health response includes component latency in milliseconds
          - Response includes timestamp for time-series correlation
          - JSON format is consistent and parseable
          - Component names are stable for metric labeling

    # ========================================
    # ARCHITECTURE COMPLIANCE
    # ========================================
    architecture_compliance:
      pattern: "Domain -> Workflow -> Entrypoint"
      verification:
        - check: "Domain layer has no external dependencies"
          files:
            - src/domain/services/health_service.py
            - src/domain/validators/health_validators.py
          criteria: "No imports from src/workflows, src/cli, src/api, or external services"

        - check: "Workflow layer depends only on domain"
          files:
            - src/workflows/health_check_workflow.py
          criteria: "Imports from src/domain allowed; no imports from src/cli or src/api"

        - check: "Entrypoint layer depends on workflow"
          files:
            - src/cli/health_commands.py
            - src/api/health_routes.py
          criteria: "Imports from src/workflows allowed; no direct imports from src/domain/services"

        - check: "Service boundaries maintained"
          criteria: "Health check is self-contained; no circular dependencies across services"

      enforcement: |
        Architecture compliance is verified by:
        1. Import analysis during code review
        2. Mypy type checking with strict settings
        3. Integration tests verify layer isolation (mocking workflow doesn't break domain)
