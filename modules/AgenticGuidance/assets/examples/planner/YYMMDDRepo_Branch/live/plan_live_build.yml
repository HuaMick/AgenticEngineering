# Live Plan - Build Phase (Example)
# This skeleton shows build plan structure for implementation phases.

worktree: /home/code/MyProject-feature-branch
liveplan: "docs/plans/live/YYMMDDRepo_Branch/live/plan_live_build.yml"
completedplan: "docs/plans/live/YYMMDDRepo_Branch/completed/plan_completed.yml"

previous_phases:
  teach_plan: plan_live_teach.yml  # Optional: if guidance updates were needed first

live-plans:
  - id: EXAMPLE-BUILD-001
    title: Example Build Phase

    phases:
      # ========================================
      # BUILD PHASE - Domain Layer
      # ========================================
      - name: Domain Layer Implementation
        execution_groups:
          - execution: sequential
            name: Implement core business logic
            agents:
              - type: build-domain
                inputs:
                  - docs/ARCHITECTURE.md
                  - src/domain/
                guidance: |
                  Context: Implement pure business logic in domain layer.

                  Implementation Steps:
                  1. Define domain entities
                  2. Implement business rules
                  3. Create value objects
                success_criteria:
                  - All entities implemented
                  - Business rules verified
                  - No external dependencies

      # ========================================
      # BUILD PHASE - Workflow Layer
      # ========================================
      - name: Workflow Layer Implementation
        execution_groups:
          - execution: sequential
            name: Implement workflow orchestration
            agents:
              - type: build-workflow
                inputs:
                  - src/domain/
                  - src/workflows/
                guidance: |
                  Context: Orchestrate domain services into workflows.

                  Implementation Steps:
                  1. Define workflow interfaces
                  2. Implement orchestration logic
                  3. Handle errors and retries
                success_criteria:
                  - Workflows complete successfully
                  - Error handling in place
                  - Domain services properly composed

      # ========================================
      # BUILD PHASE - Entrypoint Layer
      # ========================================
      - name: Entrypoint Layer Implementation
        execution_groups:
          - execution: parallel
            name: Implement API and CLI interfaces
            agents:
              - type: build-api
                inputs:
                  - src/workflows/
                  - src/api/
                guidance: |
                  Implement REST API endpoints.
                success_criteria:
                  - Endpoints respond correctly
                  - Validation in place

              - type: build-cli
                inputs:
                  - src/workflows/
                  - src/cli/
                guidance: |
                  Implement CLI commands.
                success_criteria:
                  - Commands execute correctly
                  - Help text accurate

success_criteria:
  - All layers implemented
  - Build succeeds
  - Ready for testing phase
