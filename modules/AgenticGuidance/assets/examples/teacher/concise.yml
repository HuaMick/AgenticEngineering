# Concise Agent Guidance Examples
# Goal: Preserve context window by eliminating redundancy and filler

examples:
  definitions:
    verbose: |
      Path: |
        The instructions, context, and examples that guide agents through tasks.
        A path is essentially everything that an agent reads and follows when
        performing work. This includes process files, live plans, and folder
        structures. When paths are clear, agents succeed. When paths are unclear,
        agents experience friction and may fail or ask for help.

        Paths are built through three interconnected layers that work together:

        1. Process Files (process.yml):
           - These files define goals, inputs, steps, and guidelines
           - They provide static structure that agents follow
           - Agents read these files to understand what they should do
           - Example: entrypoints/_plan.yml → _orchestrate.yml or _teach.yml

    concise: |
      Path: |
        Paths guide agents to the outcome:

        1. Processes (process.yml):
           - Define goals, inputs, steps, and guidelines
           - Provide static structure that agents follow
           - Example: _plan.yml → _orchestrate.yml or _teach.yml

    why_better: |
      - Removed meta-explanation ("A path is essentially...")
      - Cut "when paths are clear/unclear" - shown in summary line instead
      - Removed "These files" and "Agents read these" - obvious from context
      - 60% fewer words, same information

  success_criteria:
    verbose: |
      success_criteria:
        - The changes have been implemented as specified in the guidance section above
        - The test process has been completed successfully without any failures
        - All of the tests are now passing after the changes were made
        - The documentation has been updated to reflect the changes that were made

    concise: |
      success_criteria:
        - All tests pass
        - Documentation matches implementation

    why_better: |
      - "Implemented as specified" restates guidance - remove
      - "Test process completed" restates process - remove
      - "Tests passing" is measurable - keep
      - "Documentation updated" � "matches implementation" - outcome focused

  guidance:
    verbose: |
      guidance: |
        Context: Currently the detect_project_root() function in the codebase
        searches for local project langgraph.json files, which adds complexity
        and causes confusion for users. The new architecture that we are
        implementing uses only ~/.config/myagents/langgraph.json as the single
        source of truth for configuration.

        Instructions:
        1. In health_check_workflow.py, you need to remove the langgraph.json
           search logic from the detect_project_root() function
        2. You should simplify detect_project_root() to delegate to
           detect_langgraph_path() which handles home directory only
        3. In entry.py, you need to remove any langgraph.json file discovery
           from the project root detection logic
        4. You should update error messages to indicate home directory
           (~/.config/myagents/) is the only config location
        5. You need to remove any fallback logic that checks local project
           directories for langgraph.json files

        Files to modify:
        - health_check_workflow.py: detect_project_root() and detect_langgraph_path()
        - entry.py: detect_project_root() function

        Why this matters: This change eliminates multi-tier discovery complexity
        and ensures consistent behavior regardless of working directory.

    concise: |
      guidance: |
        Remove local langgraph.json discovery. Use only ~/.config/myagents/.

        Files:
        - health_check_workflow.py: Remove search logic from detect_project_root()
        - entry.py: Remove langgraph.json discovery

        Why: Eliminates multi-tier complexity, consistent behavior from any directory.

    why_better: |
      - Context paragraph � one sentence
      - Removed "you need to", "you should" - assumed
      - Numbered steps � essential actions only
      - "Files to modify" section integrated
      - 70% fewer words

  plan_phases:
    verbose: |
      phases:
        - name: Build Phase
          description: |
            This phase handles all of the implementation work that needs to be
            done. Build agents will be spawned to make the necessary code changes
            according to the guidance provided.
          execution_groups:
            - execution: parallel
              description: |
                These agents can run simultaneously because they work on
                different files with no overlap between them.
              agents:
                - type: builder
                  inputs:
                    - backend/services/agents/src/workflows/health_check_workflow.py

    concise: |
      phases:
        - name: Build Phase
          execution_groups:
            - execution: parallel
              agents:
                - type: builder
                  inputs:
                    - backend/services/agents/src/workflows/health_check_workflow.py

    why_better: |
      - Phase description restates what "Build Phase" means - remove
      - Execution description restates what "parallel" means - remove
      - Let names and structure self-document

  process_steps:
    verbose: |
      steps:
        - |
          First, you need to validate all of the inputs that are listed above.
          If an input cannot be found at the specified location, you should not
          proceed with the rest of the process. Instead, you should report the
          missing input to the user.
        - |
          Next, you should analyze the agent logs to understand the current state
          of the path. Look for the following patterns in the logs:
          - Where do agents succeed? (these are clear paths)
          - Where do agents struggle? (these are missing signposts or unclear paths)
          - Where do agents go wrong? (these are missing fences or need guardrails)

    concise: |
      steps:
        - "Validate inputs. If missing, halt and report."
        - |
          Analyze agent logs:
          - Successes = clear paths
          - Struggles = missing signposts
          - Errors = missing fences

    why_better: |
      - "First/Next" ordering obvious from list - remove
      - "you need to/should" - remove
      - Parenthetical explanations � inline equations
      - 65% fewer words

principles:
  - name: "Remove meta-commentary"
    description: "Don't explain what you're about to say, just say it"
    bad: "This section describes the inputs that the agent needs..."
    good: "Inputs:"

  - name: "Trust structure"
    description: "Names and hierarchy convey meaning - don't restate"
    bad: "Build Phase: This phase handles building..."
    good: "Build Phase:" (let execution_groups show what happens)

  - name: "Outcome over process"
    description: "State what should be true, not steps taken"
    bad: "The test process has been completed successfully"
    good: "All tests pass"

  - name: "Cut filler words"
    description: "Remove words that add no information"
    remove:
      - "you need to", "you should", "make sure to"
      - "basically", "essentially", "actually"
      - "in order to" � "to"
      - "the fact that" � remove entirely

  - name: "One sentence context"
    description: "Background should be one sentence, not a paragraph"
    bad: "Currently the system works X way. This causes Y problems. We want Z."
    good: "Replace X with Z to fix Y."
