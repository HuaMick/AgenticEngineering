guideline:
  name: "Less is More"
  description: |
    Principles for achieving full outcomes with minimal code complexity and
    modification. Focus on efficiency, maintainability, and resisting
    speculative changes.

  inputs:
    - location: "assets/definitions/minimal-sufficient-change.yml"
      description: "Smallest change required to satisfy success criteria"
    - location: "assets/definitions/overengineering.yml"
      description: "Identifying and avoiding unnecessary complexity"
    - location: "assets/definitions/success-criteria.yml"
      description: "Defining observable outcomes to know when to stop"

  rules:
    - rule: "Minimal sufficient change"
      description: |
        Make the smallest possible change that fully satisfies the observable
        success criteria.
      justification: |
        Reduces blast radius, simplifies review, and preserves the clarity
        of the codebase for future agents.
      characteristics:
        - "Complete requirements without adding 'nice-to-have' features"
        - "Fix the root cause with the least amount of structural disruption"

    - rule: "Resist 'while we're here' improvements"
      description: |
        Do not modify or refactor unrelated code during the current task.
        Focus strictly on the assigned objective.
      justification: |
        Unrelated changes add noise to diffs and increase the risk of
        regressions that are hard to trace.

    - rule: "Stop at success"
      description: |
        Once all success criteria are met and validated, stop working.
        Avoid polishing beyond what is required.
      justification: |
        Over-polishing leads to diminishing returns and complicates future
        maintenance without providing functional benefit.

  anti_patterns:
    - "Refactoring an entire class when a three-line fix is sufficient"
    - "Adding abstractions for hypothetical future use cases"
    - "Exceeding current infrastructure or scalability requirements"
    - "Polishing code that already meets all success criteria"

  related_guidelines:
    - location: "assets/guidelines/context-minimisation.yml"
      description: "Reducing information noise"
    - location: "assets/guidelines/iteration.yml"
      description: "Small, layered build-test-fix cycles"
