# CLI Error Recovery Protocol (DOGFOOD RULE)
# Shared guideline for all orchestration agents.
# When ANY `agentic` CLI command fails, agents MUST follow this protocol.

cli_error_recovery_protocol:
  name: "CLI Error Recovery Protocol (DOGFOOD RULE)"

  description: |
    When any CLI issue is encountered during orchestration, agents MUST follow
    this protocol immediately. Do NOT work around CLI errors manually.

  trigger_conditions:
    - "Session spawn fails (agentic orchestrate session spawn returns error)"
    - "Epic commands error (agentic epic ticket start/complete fails)"
    - "Ticket resolution fails (ticket_id not found, wrong field names)"
    - "Import/syntax errors in CLI modules"
    - "Any agentic command exits non-zero"

  mandatory_steps:
    step_1_diagnose:
      name: "Diagnose"
      description: "Capture the exact error output"
      commands:
        - "agentic --json plan list   # Verify CLI is responsive"
        - "agentic --version          # Check basic health"

    step_2_create_remediation_plan:
      name: "Create a remediation epic"
      description: "Use agentic epic new with a descriptive name"
      command: "agentic epic new <branch> --description 'fix: <describe the CLI issue>'"

    step_3_plan_the_fix:
      name: "Plan the fix"
      description: "Spawn a planner-build session to design the remediation"
      command: "agentic orchestrate session spawn --role planner-build --epic <new-epic-folder> -b --dangerously-skip-permissions"

    step_4_execute_the_fix:
      name: "Execute the fix"
      description: "Spawn build-python sessions to implement"
      command: "agentic orchestrate session spawn --role build-python --epic <new-epic-folder> -b --dangerously-skip-permissions"

    step_5_verify:
      name: "Verify"
      description: "Confirm the CLI issue is resolved"
      commands:
        - "agentic --version && agentic epic list"
        - "cd /home/code/AgenticEngineering/modules/AgenticCLI && python3 -m pytest tests/ -x -v"

    step_6_resume:
      name: "Resume"
      description: "Return to the original plan and continue from where you left off."

  common_pitfalls:
    - pitfall: "--json flag position"
      wrong: "agentic epic list -j"
      right: "agentic --json epic list"
    - pitfall: "Ticket creation"
      wrong: "Creating ticket_*.yml files on disk"
      right: "Use `agentic epic ticket add --epic <folder>` to store tickets in TinyDB"
    - pitfall: "Ticket ID field"
      wrong: "id: P1-T1 in some contexts"
      right: "Use ticket_id — check TinyDB record for actual field name"
    - pitfall: "--role vs --ticket"
      wrong: "--role build-python --ticket P1-T1"
      right: "Use ONE: --role OR --ticket (mutually exclusive)"
    - pitfall: "Epic folder path"
      wrong: "260210OP_my_epic (bare name)"
      right: "docs/epics/live/260210OP_my_epic (full path for ls, bare name for --epic)"
    - pitfall: "Manual epic edits"
      wrong: "Editing ticket_build.yml status fields directly"
      right: "agentic epic ticket start/complete <id> --epic <folder>"

  fences:
    - "You MUST NOT skip any step in this protocol"
    - "You MUST NOT continue orchestration while CLI is broken"
    - "You MUST NOT manually work around CLI errors (e.g., editing YAML directly)"
    - "The CLI is the source of truth — if it's broken, fix it FIRST"

  related:
    - "modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml"
