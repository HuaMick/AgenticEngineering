# CLI Error Recovery Protocol (DOGFOOD RULE)
# Shared guideline for all orchestration agents.
# When ANY `agentic` CLI command fails, agents MUST follow this protocol.

cli_error_recovery_protocol:
  name: "CLI Error Recovery Protocol (DOGFOOD RULE)"

  description: |
    When any CLI issue is encountered during orchestration, agents MUST follow
    this protocol immediately. Do NOT work around CLI errors manually.

  trigger_conditions:
    - "Session spawn fails (agentic session spawn returns error)"
    - "Plan commands error (agentic plan task start/complete fails)"
    - "Task resolution fails (task_id not found, wrong field names)"
    - "Import/syntax errors in CLI modules"
    - "Any agentic command exits non-zero"

  mandatory_steps:
    step_1_diagnose:
      name: "Diagnose"
      description: "Capture the exact error output"
      commands:
        - "agentic --json plan list   # Verify CLI is responsive"
        - "agentic --version          # Check basic health"

    step_2_create_remediation_plan:
      name: "Create a remediation plan"
      description: "Use agentic plan init with a descriptive name"
      command: "agentic plan init <branch> --description 'fix: <describe the CLI issue>'"

    step_3_plan_the_fix:
      name: "Plan the fix"
      description: "Spawn a planner-build session to design the remediation"
      command: "agentic session spawn --role planner-build --plan <new-plan-folder> -b --dangerously-skip-permissions"

    step_4_execute_the_fix:
      name: "Execute the fix"
      description: "Spawn build-python sessions to implement"
      command: "agentic session spawn --role build-python --plan <new-plan-folder> -b --dangerously-skip-permissions"

    step_5_verify:
      name: "Verify"
      description: "Confirm the CLI issue is resolved"
      commands:
        - "agentic --version && agentic plan list"
        - "cd /home/code/AgenticEngineering/modules/AgenticCLI && python3 -m pytest tests/ -x -v"

    step_6_resume:
      name: "Resume"
      description: "Return to the original plan and continue from where you left off."

  common_pitfalls:
    - pitfall: "--json flag position"
      wrong: "agentic plan list -j"
      right: "agentic --json plan list"
    - pitfall: "Plan file naming"
      wrong: "plan.yml, build.yml"
      right: "plan_build.yml, plan_test.yml, plan_teach.yml"
    - pitfall: "Task ID field"
      wrong: "id: P1-T1 in some contexts"
      right: "Use task_id — check plan YAML for actual field name"
    - pitfall: "--role vs --task"
      wrong: "--role build-python --task P1-T1"
      right: "Use ONE: --role OR --task (mutually exclusive)"
    - pitfall: "Plan folder path"
      wrong: "260210OP_my_plan (bare name)"
      right: "docs/plans/live/260210OP_my_plan (full path for ls, bare name for --plan)"
    - pitfall: "Manual plan edits"
      wrong: "Editing plan_build.yml status fields directly"
      right: "agentic plan task start/complete <id> --plan <folder>"

  fences:
    - "You MUST NOT skip any step in this protocol"
    - "You MUST NOT continue orchestration while CLI is broken"
    - "You MUST NOT manually work around CLI errors (e.g., editing YAML directly)"
    - "The CLI is the source of truth — if it's broken, fix it FIRST"

  related:
    - "modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml"
