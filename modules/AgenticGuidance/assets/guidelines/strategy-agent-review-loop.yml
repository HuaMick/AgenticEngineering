agent-review-loop: |
    A testing strategy where an agent is spawned to review the work done
    by the previous agent/s. The review agent provides feedback, then
    the previous agent is respawned to address. This loops until n number
    of review agents sequentially provide approval.
    - the number of sequential reviews is determined by the complexity of the work.
    Justification: Fresh eyes catch errors that the original author is blind to; multiple loops ensure convergence on quality.
