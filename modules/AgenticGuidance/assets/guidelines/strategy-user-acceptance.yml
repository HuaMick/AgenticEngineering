user-acceptance-testing: |
    A testing strategy for validating user workflows. There are two types of UAT:

    1. AGENT UAT (testing with subagents):
       - User simulator agents (subagents) execute actual commands from user stories
       - Agents test as if they are new users with only documentation
       - Uses user_simulator.yml process (spawns subagents)
       - This is what agents perform in automated workflows

    2. HUMAN UAT (testing with actual humans):
       - Real humans test the system following user stories
       - Provides authentic user feedback and discovers UX issues agents might miss
       - Typically performed manually before release or in production
       - Cannot be automated - requires actual human judgment

    CRITICAL DISTINCTION: Agent UAT is testing with subagents, NOT testing with code.
    - Agent UAT: User simulator agents (subagents) execute actual commands from user stories (e.g., `myagents studio start`, `myagents setup`)
    - Testing with code: Automated unit/integration test suites written in code that validate code logic, APIs, and component integration
    - Agent UAT validates user experience and workflows via subagents; testing with code validates code correctness via automated test suites
    - Agent UAT uses user_simulator.yml process (spawns subagents); testing with code uses test_runner.yml process (executes test code)
    - Agent UAT tests what users actually do via subagents; testing with code tests what developers wrote via automated test suites

    Justification: Users interact with the installed package, not the source code; simulation must match user reality. Agent UAT provides automated validation, while human UAT provides authentic user feedback.

    CRITICAL PREREQUISITE: Install the latest version of the package locally before testing.

    Pre-test requirements:
    1. Version verification:
       - Compare installed version (uv pip show myagents) with source version (pyproject.toml)
       - If versions differ, install the latest: uv pip install -e /path/to/MyAgents
       - Verify editable install location exists and is accessible
       - Document the version being tested in test results

    2. Dependency verification:
       - Ensure all dependencies are at compatible versions
       - Verify agent-gcptoolkit is installed and accessible
       - Check for any stale editable installs pointing to non-existent directories

    Why this matters:
    - Simulation agents test the INSTALLED package, not the source code
    - Stale installations mask bugs that exist in the latest source
    - Version mismatches cause false passes/fails that waste debugging time
    - User acceptance testing must validate what users will actually run

    Test execution:
    1. Install latest version locally (uv pip install -e .)
    2. Verify installation: uv pip show myagents (check version and location)
    3. Spawn simulation agents to test user workflows
    4. Simulation agents should test as if they are new users
    5. Report any version-related issues as test failures

    Success criteria:
    - Installed version matches source pyproject.toml version
    - Editable install location exists and is valid
    - All simulation agents complete successfully against installed package
    - No stale package warnings during test execution

    Integration with other strategies:
    - Combine with fresh-environment-test for complete validation
    - Combine with documentation-validation-testing for user journey validation
    - Should be run AFTER build/fix cycles complete and BEFORE release
