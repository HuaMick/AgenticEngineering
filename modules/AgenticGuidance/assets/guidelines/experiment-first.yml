guideline:
  name: "Discover and Experiment First"
  description: |
    Guidelines for reducing uncertainty and avoiding incorrect assumptions 
    through iterative discovery and small, targeted experiments.

  inputs:
    - location: "modules/AgenticGuidance/assets/guidelines/exploration-principles.yml"
      description: "Core principles for discovery, pattern identification, and sampling"

  rules:
    - rule: "Experiment over guessing"
      description: |
        When unsure about behavior, structure, or dependencies, default to 
        running a small experiment or reading source code before acting. 
        Never guess at symbol definitions or API behavior.
      justification: |
        Incorrect assumptions multiply complexity and lead to regressions that 
        are difficult to trace. Small experiments provide definitive answers.
      examples:
        wrong: "Implementing a fix based on what I assume a function does"
        right: "Writing a small test script to verify actual function behavior"

    - rule: "Representative sampling"
      description: |
        Sample key files from major areas instead of reading every file in 
        a directory.
      justification: |
        Exhaustive reading is slow and fills the context window with 
        redundant noise. Sampling provides sufficient pattern awareness.

    - rule: "Fail-fast assumption testing"
      description: |
        Verify critical assumptions early (e.g., checking file existence, 
        making a single API call) before proceeding with deep analysis or 
        implementation.
      justification: |
        Identifying a wrong assumption early saves significant time and 
        prevents building on a flawed foundation.

  anti_patterns:
    - "Guessing at symbol definitions instead of searching"
    - "Reading entire directories without a specific discovery goal"
    - "Proceeding with implementation despite high uncertainty"
    - "Ignoring existing project patterns and conventions"

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Exploration loops for discovery"
    - location: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
      description: "Reducing discovery noise"
