test_execution_workflow: |
  Test agents should follow this workflow when running tests:

  1. **Pre-Test Setup**:
     - Start LangGraph Studio service if not already running
     - Command: myagents studio start
     - Wait for Studio to be ready (check health endpoint)
     - Verify Studio is accessible before proceeding

  2. **Test Execution**:
     - Run pytest with appropriate flags
     - Do NOT skip tests that require Studio service
     - Studio integration tests should run successfully

  3. **Post-Test Cleanup**:
     - Stop Studio service after tests complete
     - Command: myagents studio stop
     - Clean up any test artifacts

  4. **Expected Results**:
     - All tests should pass except:
       - 5 tests requiring GCP registry authentication (acceptable skip)
       - 1 test requiring shellcheck (acceptable skip)
     - Studio integration tests (10 tests) should PASS, not skip

  5. **If Tests Skip**:
     - Check if Studio is running: myagents studio status
     - If not running, start it: myagents studio start
     - Re-run tests
     - Do NOT accept "Studio not running" as a valid skip reason
