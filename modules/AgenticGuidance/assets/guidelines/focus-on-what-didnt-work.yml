guideline:
  name: "Focus on What Didn't Work"
  description: |
    Guidelines for transparent reporting that prioritizes gaps, failures,
    and risks over trivial successes. This prevents "success theater" and
    ensures that critical issues are addressed.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/success-criteria.yml"
      description: "Observable outcomes used to measure completion"
    - location: "modules/AgenticGuidance/assets/definitions/acceptable-skips.yml"
      description: "Definitions and policies for acceptable vs unacceptable skips"

  rules:
    - rule: "Prioritize failures and gaps"
      description: |
        In all reports and summaries, lead with what failed, what was
        skipped, and what remains to be done.
      justification: |
        Highlighting failures drives improvement and ensures that risks
        are visible rather than buried under a list of successes.
      characteristics:
        - "Lead with failure summaries"
        - "Explicitly list skipped requirements or tests"
        - "Document known gaps and technical debt introduced"

    - rule: "Objective-based reporting"
      description: |
        Always restate the original objective and clearly identify any
        parts of that objective that were not achieved.
      justification: |
        Maintains clarity on overall progress and prevents losing sight
        of the goal due to partial successes.

  anti_patterns:
    - "Lengthy reports focusing on successful trivial tasks"
    - "Burying failures at the bottom of a response"
    - "Omitting known gaps to make a report look better"
    - "Using 'passing' status for work with major skipped components"

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/response-audit.yml"
      description: "Final verification of reporting accuracy"
