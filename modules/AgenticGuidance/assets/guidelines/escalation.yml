escalation: |
    When confidence is low, escalate instead of guessing.

    Triggers:
    - Missing required inputs
    - Ambiguous instructions or conflicting requirements
    - Repeated failures (e.g., 3 attempts without progress)

    Structured Escalation:
    For HITL (Human-in-the-Loop) escalation with structured question/answer workflow,
    see modules/AgenticGuidance/assets/guidelines/question-workflow.yml

    The question-workflow guideline provides:
    - When to ask questions vs. make autonomous decisions
    - Question generation format (YAML structure)
    - File storage pattern (pending/answered/deferred)
    - CLI commands for human responders
    - Resumption pattern for agents to check for answers
    - Example scenarios (builder, planner, tester contexts)

