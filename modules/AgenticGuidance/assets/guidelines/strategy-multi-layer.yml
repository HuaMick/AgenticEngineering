# Multi-Layer Testing Strategy
# STATUS: OPTIONAL - One testing strategy among several valid approaches
# See also: strategy-test-suite.yml, strategy-fresh-environment.yml

multi-layer-testing:
  status: "optional"
  description: |
    A comprehensive testing strategy using multiple complementary testing approaches.
    Justification: No single testing layer can catch all bug types (e.g., logic vs. env vs. docs).

  when_to_use: |
    Use multi-layer testing when:
    - Building production-ready releases
    - High-confidence validation is required
    - Multiple deployment environments exist
    - Documentation accuracy is critical

    Consider simpler strategies when:
    - Rapid iteration is prioritized
    - Scope is limited to a single component
    - Time constraints prevent full testing
    - Risk tolerance is higher

  testing_layers:
    1_automated:
      name: "Automated tests (unit, integration, e2e)"
      catches: "Logic errors, regressions, component integration"
    2_fresh_environment:
      name: "Fresh environment testing"
      catches: "Portability issues, configuration gaps, hardcoded paths"
    3_manual:
      name: "Manual verification"
      catches: "UX issues, error message clarity, recovery paths"
    4_follow_docs:
      name: "Follow-docs-exactly test"
      catches: "Documentation gaps, missing steps, incorrect instructions"
    5_blind_test:
      name: "Blind-test validation"
      catches: "Documentation usability, completeness, discoverability"

  key_insight: |
    Each layer catches different types of issues. However, not all projects
    require all 5 layers. Planners should select layers appropriate to context.

  success_criteria:
    - "Selected testing layers pass"
    - "Each layer identifies and resolves issues"
    - "No gaps between test environment and production environment"

  reference: "Based on lessons learned from GCPTOOLKIT-CONFIG-GAP-001 implementation."

alternative_strategies:
  unit_only:
    when: "Component-level changes with well-defined interfaces"
    layers: ["automated (unit)"]
  integration_focus:
    when: "Multi-component changes without user-facing changes"
    layers: ["automated (unit, integration)"]
  uat_only:
    when: "User-facing changes where UAT is sufficient"
    layers: ["automated (basic)", "manual verification"]
  documentation_only:
    when: "Documentation updates without code changes"
    layers: ["follow-docs-exactly", "blind-test"]
