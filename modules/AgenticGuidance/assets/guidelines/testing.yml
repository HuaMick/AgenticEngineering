guideline:
  name: "Testing Guidelines"
  description: |
    Guidelines for agent behavior during testing and validation. These rules
    ensure that testing is rigorous, representative of user experience, and
    provides definitive evidence of success.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/testing-types.yml"
      description: "Definitions of smoke, service, user simulator, and audit testing"
    - location: "modules/AgenticGuidance/assets/guidelines/strategy-user-simulation.yml"
      description: "User simulation testing strategy"
    - location: "modules/AgenticGuidance/assets/guidelines/strategy-test-suite.yml"
      description: "Test suite execution strategy"
    - location: "modules/AgenticGuidance/assets/guidelines/strategy-fresh-environment.yml"
      description: "Fresh environment testing strategy"
    - location: "modules/AgenticGuidance/assets/guidelines/strategy-multi-layer.yml"
      description: "Multi-layer testing strategy"
    - location: "modules/AgenticGuidance/assets/guidelines/strategy-user-acceptance.yml"
      description: "User acceptance testing strategy"
    - location: "modules/AgenticGuidance/assets/guidelines/strategy-validation.yml"
      description: "Validation strategy options (3-layer, single-layer, etc.) - OPTIONAL planner choice"

  rules:
    - rule: "Rigorous functional validation"
      description: |
        Always execute actual commands and verify real outcomes. Do not rely
        on --help output or simple success codes.
      justification: |
        Help text validation does not prove functional correctness; actual
        execution does.
      characteristics:
        - "Execute each journey step exactly as written"
        - "Capture actual command outputs as evidence"
        - "Verify state changes (e.g., files created, database updated)"

    - rule: "Test the user's reality"
      description: |
        Validate the installed package and fresh environment, not just the
        source code in the current branch.
      justification: |
        Users interact with installed packages and starting from zero config.
        Testing must reflect this to catch portability and packaging issues.
      characteristics:
        - "Install latest version locally before testing"
        - "Verify version matches pyproject.toml"
        - "Test from clean state (no pre-existing config or env vars)"

    - rule: "Multi-layered approach (OPTIONAL strategy)"
      description: |
        Consider composing multiple testing strategies to catch different classes of bugs.
        This is a RECOMMENDED approach, not mandatory. Planners have autonomy to select
        the validation strategy appropriate for their context.
      justification: |
        No single layer catches all issues, but the right number of layers depends on
        project risk, scope, and timeline. See strategy-validation.yml for options.
      characteristics:
        - "Consider automated logic validation (test-fix-loop)"
        - "Consider fresh environment validation for portability"
        - "Consider documentation validation (blind-test) for user-facing changes"
      strategy_reference: "modules/AgenticGuidance/assets/guidelines/strategy-validation.yml"

    - rule: "Documentation as a first-class citizen"
      description: |
        Validate documentation with the same rigor as code.
      justification: |
        If the documentation is incorrect or incomplete, the product is broken
        for the user.
      characteristics:
        - "Perform follow-docs-exactly tests"
        - "Use blind-testing to surface hidden assumptions"

    - rule: "Preserve validated state"
      description: |
        Checkpoint and commit as soon as tests pass.
      justification: |
        Enables fast rollback and provides a clear audit trail of working states.

  # ========================================
  # FENCE: UAT Requirements
  # ========================================
  uat_requirements:
    mandatory: true
    fence: |
      FENCE: UAT is MANDATORY for all epics
      Every epic MUST include a User Acceptance Testing phase. Automated tests
      alone do not prove the system works for users. UAT validates the complete
      user experience.

    user_story_anchor:
      fence: |
        FENCE: UAT MUST be anchored to user stories
        UAT phases MUST reference specific user stories from docs/userstories/.
        Each UAT test MUST trace back to a user story ID (e.g., US-CLI-001).
        User stories define the acceptance criteria that UAT validates.

    story_test_metadata:
      description: |
        After UAT validation, test agents MUST update story test metadata to track
        validation status over time. This enables regression detection and audit trails.
      fields:
        last_tested:
          type: "ISO 8601 date"
          description: "When the story was last validated"
          example: "2026-02-07"
        test_status:
          type: "enum"
          values: ["untested", "passed", "failed", "regression"]
          description: "Current validation status of the story"
        test_notes:
          type: "string"
          description: "Summary of test results or failure details"
          example: "All 3 journey steps completed successfully via test-user-simulator"
        tested_by_epic:
          type: "string"
          description: "Epic ID that last validated this story"
          example: "260207WC_cli_epic_updates"
      update_pattern: |
        After UAT execution, test agents should update story metadata:
        1. Set last_tested to current date
        2. Set test_status based on results (passed/failed)
        3. Add test_notes summarizing outcomes
        4. Set tested_by_epic to current epic ID
        CLI command: `agentic stories update <story_id> --test-status <status> --epic <epic_id>`
      regression_detection: |
        A story has REGRESSED when:
        - Previous test_status was "passed"
        - Current UAT execution shows failure
        - Set test_status to "regression" (not just "failed")
        - This triggers STORY_REGRESSION feedback in executor

    implementation_options:
      description: |
        UAT is mandatory but implementation strategy is flexible.
        Planners may select the approach most appropriate to context.
      options:
        user_simulator:
          description: "Spawn test-user-simulator agents to execute user journeys"
          when: "Full user journey validation needed"
          visual_reference: "assets/examples/orchestration/phase_templates/uat_phase.mmd"
        blind_test:
          description: "Spawn test-guidance-simulator without prior context"
          when: "Documentation completeness validation needed"
        documentation_loop:
          description: "Create user documentation and have users review"
          when: "Human feedback on UX is prioritized"
        manual_validation:
          description: "Present implementation to human validator"
          when: "Complex scenarios requiring human judgment"

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Loop patterns (test-fix, audit-test-fix)"
    - location: "modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml"
      description: "Ensuring tests provide true evidence of success"
