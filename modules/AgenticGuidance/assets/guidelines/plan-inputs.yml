Epic inputs specify the files, directories, and context that agents need to complete their work.

Input types:
- files: Specific files to read or modify
- directories: Directories to explore or work within
- patterns: Glob patterns for finding related files
- context: Additional context files for understanding the domain

Input specification in epics:
  inputs:
    - type: file | directory | pattern
      path: absolute or relative path
      description: why this input is needed
      required: true | false

Best practices:
- Be specific: Provide exact paths when known
- Be minimal: Only include inputs needed for the task
- Be descriptive: Explain why each input is needed
- Use patterns for groups of related files
- Mark optional inputs with required: false

Guidance can reference inputs when clarifying scope or instructions.
The orchestration agent uses inputs to construct context for target agents.

CCI (CLI Context Injection) context retrieval:
  When agents need context beyond static epic inputs, prefer CLI commands
  and the sdk_pane_runner context-file mechanism over ad-hoc file exploration:
  - `agentic epic ticket current -j` - Get active ticket details from epic
  - `agentic epic status --epic <epic> --role <role-id> -j` - Get role-specific context
  - sdk_pane_runner --context-file - Structured seed context injected at session start

  Static epic inputs define WHAT files are relevant.
  CLI commands and context files retrieve the content efficiently at runtime.

  See: docs/CCI_CONTEXT_ARCHITECTURE.md

Example:
  inputs:
    - type: file
      path: src/workflows/agent_chat.py
      description: Workflow to modify
      required: true
    - type: directory
      path: tests/workflows/agent_chat/
      description: Test directory for validation
      required: true
