user-simulation-testing: |
    A testing strategy where builder agents validate functionality by simulating the user experience.
    This replaces the old "technical-spike" approach with a focus on real user validation.

    Key principles:
    - Execute entrypoints as a user would (CLI commands, API endpoints, UI flows)
    - Run the code to verify it works from a user perspective
    - Test actual user workflows, not just unit tests or code assertions
    - Validate that users can accomplish what the success criteria specify

    Execution approach:
    1. Builder agent implements minimal components to meet success criteria
    2. Builder agent simulates user experience by:
       - Executing entrypoints if available (CLI commands, API endpoints)
       - Running the code to verify it works from a user perspective
       - Testing the actual user workflow, not just unit tests
    3. If user simulation reveals issues, builder agent fixes and retries
    4. Success is validated through actual usage simulation, not just test passes

    Examples:
    - For CLI: Execute the command and verify the output/behavior
    - For API: Make actual HTTP calls and verify responses
    - For libraries: Import and use the code as an end user would
    - For workflows: Execute the full workflow from start to finish
