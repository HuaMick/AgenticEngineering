guideline:
  name: "Epic Completion Patterns (TinyDB + Archive)"
  description: |
    Standard patterns for managing epic completion via TinyDB ticket tracking and CLI archival.
    Tickets are marked complete in TinyDB; when all tickets are done, `agentic epic archive` moves
    the epic folder to docs/epics/completed/ and updates TinyDB status.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/plans.yml"
      description: "Authoritative definition of plan lifecycle and file taxonomy"

  rules:
    - rule: "Two-Level Completion Model"
      description: |
        Epic completion happens at two levels: item-level sync (file remains in live/)
        and folder-level copy (entire epic folder moves to completed/).
      justification: |
        Allows follow-on work to continue in the live folder without losing the context
        of what was previously achieved. Avoids large, monolithic 'completed' files.
      
    - rule: "Incremental Completion"
      description: |
        Tickets are marked completed individually via CLI commands that update TinyDB.
        The epic folder remains in docs/epics/live/ while any tickets are pending/in-progress.
      execution_pattern:
        - "Mark tickets completed via `agentic epic ticket complete <id> --epic <folder>`"
        - "TinyDB tracks all ticket statuses"
        - "Epic folder stays in live/ until ALL tickets are completed"

    - rule: "Full Completion (Archive)"
      description: |
        When ALL tickets in TinyDB are marked completed, the epic folder is archived.
      execution_pattern:
        - "Verify all tickets in TinyDB have status: completed"
        - "CLI auto-archives when the last ticket is marked complete"
        - "Or manually: `agentic epic archive <epic_folder>`"

  examples:
    - description: "TinyDB-Based Completion Demonstration"
      example: |
        # This example shows how epic completion works with TinyDB-tracked tickets.

        scenario: "Work in progress with some tickets completed"

        folder_structure:
          docs/epics/live/251215MA_main/:
            epic.md: "Epic description and context"
            reference/: "Optional reference materials"

        tinydb_state:
          epic: "251215MA_main"
          tickets:
            - id: "build_01"
              status: "completed"
            - id: "build_02"
              status: "completed"
            - id: "build_03"
              status: "in_progress"
            - id: "test_01"
              status: "pending"

        completion_workflow:
          when_all_tickets_finish:
            - "Mark last ticket: agentic epic ticket complete test_01 --epic 251215MA_main"
            - "CLI auto-archives folder to docs/epics/completed/251215MA_main/"
            - "Original may remain in live/ for follow-on work"

        reactivation_workflow:
          if_issues_found:
            - "Manually move folder: mv docs/epics/completed/251215MA_main docs/epics/live/251215MA_main"
            - "Update ticket statuses via CLI"
            - "Re-archive when resolved"

  cli_commands:
    description: |
      CLI commands for epic archival. See modules/AgenticGuidance/assets/definitions/plans.yml
      for authoritative CLI usage documentation.
    commands:
      archive:
        command: "agentic epic archive <full_path>"
        example: "agentic epic archive docs/epics/live/260128AG_example"
        note: "Copies to completed/ but does NOT remove source from live/"
      unarchive:
        note: "No CLI command exists for unarchiving. This is a manual operation."
        manual_procedure: "mv docs/epics/completed/<epic_name> docs/epics/live/<epic_name>"
        example: "mv docs/epics/completed/260128AG_example docs/epics/live/260128AG_example"
      auto_archival:
        trigger: "When completing the last ticket with 'agentic epic ticket complete'"
        suppress: "Use --no-archive flag to prevent auto-archival"
    path_requirement: |
      Epic commands accept full paths or short names.
      Short-name resolution IS supported: partial folder names are matched
      against docs/epics/live/ using prefix matching (startswith).
      Example: --epic 260128AG resolves to docs/epics/live/260128AG_example

  # ==============================================
  # FENCE: CLI-ONLY FILE OPERATIONS
  # ==============================================
  cli_only_fence:
    description: |
      FENCE: All epic file operations MUST use CLI commands.
      Manual file operations (rm, mv, Edit on status fields) are PROHIBITED.
    justification: |
      CLI commands ensure data consistency, trigger auto-archival, and maintain
      proper epic lifecycle state. Manual operations bypass these safeguards and
      can leave epics in inconsistent states.
    prohibited_operations:
      - "rm docs/epics/live/<folder>  # Use CLI archival instead"
      - "mv docs/epics/live/<folder> docs/epics/completed/  # CLI handles this"
      - "Edit tool to change ticket status fields  # Use agentic epic ticket start/complete"
      - "Direct YAML editing of epic status  # CLI manages status transitions"
    required_cli_commands:
      ticket_management:
        - command: "agentic epic ticket start <ticket_id> --epic <folder>"
          purpose: "Mark ticket as in_progress"
        - command: "agentic epic ticket complete <ticket_id> --epic <folder>"
          purpose: "Mark ticket as completed; triggers auto-archive if last ticket"
      archival:
        - command: "agentic epic archive <folder>"
          purpose: "Manual archival (copies to completed/)"
        - manual: "mv docs/epics/completed/<name> docs/epics/live/<name>"
          purpose: "Restore archived epic to live/ (manual operation, no CLI command)"
    violation_indicators:
      - "Bash rm command on docs/epics/ paths"
      - "Bash mv command on docs/epics/ paths"
      - "Edit tool modifying status: field in epic YAML"
      - "Epic folder missing from live/ without CLI archive call"
