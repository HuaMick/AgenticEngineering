guideline:
  name: "Plan Completion Patterns (Copy-and-Sync)"
  description: |
    Standard patterns for managing plan files during the transition from 'active' to 'completed' states.
    Ensures that live workspaces remain focused while preserving a full audit trail of finished work.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/plans.yml"
      description: "Authoritative definition of plan lifecycle and file taxonomy"

  rules:
    - rule: "Two-Level Completion Model"
      description: |
        Plan completion happens at two levels: item-level sync (file remains in live/) 
        and folder-level copy (entire plan folder moves to completed/).
      justification: |
        Allows follow-on work to continue in the live folder without losing the context 
        of what was previously achieved. Avoids large, monolithic 'completed' files.
      
    - rule: "Incremental Completion (Copy-and-Sync)"
      description: |
        For phase plans (plan_live_*.yml), files stay in live/ as long as ANY item is pending.
        Completed items are synced to a copy in completed/.
      execution_pattern:
        - "Identify completed items in live/ file"
        - "If completed/ copy doesn't exist → Create it with ONLY completed items"
        - "If completed/ copy exists → Update it with NEWLY completed items"
        - "DO NOT delete from live/ until ALL items are marked completed"

    - rule: "Full Completion (Delete from Live)"
      description: |
        When ALL items in a phase file are marked completed, the file is removed from live/.
      execution_pattern:
        - "Verify all items in live/my_feature.yml are status: completed"
        - "Ensure completed/my_feature.yml contains all these items"
        - "Use `agentic plan move tasks --plan <plan_folder>` to archive completed tasks"

  examples:
    - description: "Copy-and-Sync Pattern Demonstration"
      example: |
        # This example shows how files move between live/ and completed/ subfolders
        # based on their completion status.

        scenario: "Work in progress with some items completed"

        folder_structure:
          docs/plans/live/251215MA_main/:
            live/:
              plan_live_enhance.yml: "Phase definition (reserved - stays in live/)"
              my_feature.yml: "5 items: 3 completed, 2 pending (stays in live/)"
              another_task.yml: "All items pending (stays in live/)"
            completed/:
              my_feature.yml: "3 items: only completed ones (synced copy)"
              old_feature.yml: "All items done, deleted from live/"
              plan_completed.yml: "Summary index (reserved)"
            analysis/:
              plan_iteration_1_results.yml: "Iteration logs"

        state_transitions:
          - description: "Partial completion (file in BOTH locations)"
            file: my_feature.yml
            live_copy: "all 5 items (working copy)"
            completed_copy: "3 completed items only (archive)"

          - description: "Full completion (file ONLY in completed/)"
            file: old_feature.yml
            note: "Was deleted from live/ when all items completed"

          - description: "No completion yet (file ONLY in live/)"
            file: another_task.yml
            note: "Will get a completed/ copy when first item completes"

        completion_workflow:
          when_my_feature_finishes:
            - "Sync final 2 items to completed/my_feature.yml"
            - "Delete live/my_feature.yml"
            - "File now exists only in completed/"

        reactivation_workflow:
          if_issues_found_in_old_feature:
            - "Copy completed/old_feature.yml back to live/"
            - "Update affected items' status"
            - "Sync fixes back to completed/ as resolved"
