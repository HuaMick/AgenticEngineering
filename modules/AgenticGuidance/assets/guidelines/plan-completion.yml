guideline:
  name: "Epic Completion Patterns (Copy-and-Sync)"
  description: |
    Standard patterns for managing epic files during the transition from 'active' to 'completed' states.
    Ensures that live workspaces remain focused while preserving a full audit trail of finished work.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/plans.yml"
      description: "Authoritative definition of plan lifecycle and file taxonomy"

  rules:
    - rule: "Two-Level Completion Model"
      description: |
        Epic completion happens at two levels: item-level sync (file remains in live/)
        and folder-level copy (entire epic folder moves to completed/).
      justification: |
        Allows follow-on work to continue in the live folder without losing the context
        of what was previously achieved. Avoids large, monolithic 'completed' files.
      
    - rule: "Incremental Completion (Copy-and-Sync)"
      description: |
        For phase epics (ticket_*.yml), files stay in live/ as long as ANY item is pending.
        Completed items are synced to a copy in completed/.
      execution_pattern:
        - "Identify completed items in live/ file"
        - "If completed/ copy doesn't exist → Create it with ONLY completed items"
        - "If completed/ copy exists → Update it with NEWLY completed items"
        - "DO NOT delete from live/ until ALL items are marked completed"

    - rule: "Full Completion (Delete from Live)"
      description: |
        When ALL items in a phase file are marked completed, the file is removed from live/.
      execution_pattern:
        - "Verify all items in live/my_feature.yml are status: completed"
        - "Ensure completed/my_feature.yml contains all these items"
        - "Use `agentic epic move tickets --epic <epic_folder>` to archive completed tickets"

  examples:
    - description: "Copy-and-Sync Pattern Demonstration"
      example: |
        # This example shows how files move between live/ and completed/ subfolders
        # based on their completion status.

        scenario: "Work in progress with some items completed"

        folder_structure:
          docs/epics/live/251215MA_main/:
            live/:
              ticket_enhance.yml: "Phase definition (reserved - stays in live/)"
              my_feature.yml: "5 items: 3 completed, 2 pending (stays in live/)"
              another_ticket.yml: "All items pending (stays in live/)"
            completed/:
              my_feature.yml: "3 items: only completed ones (synced copy)"
              old_feature.yml: "All items done, deleted from live/"
              plan_completed.yml: "Summary index (reserved)"
            analysis/:
              plan_iteration_1_results.yml: "Iteration logs"

        state_transitions:
          - description: "Partial completion (file in BOTH locations)"
            file: my_feature.yml
            live_copy: "all 5 items (working copy)"
            completed_copy: "3 completed items only (archive)"

          - description: "Full completion (file ONLY in completed/)"
            file: old_feature.yml
            note: "Was deleted from live/ when all items completed"

          - description: "No completion yet (file ONLY in live/)"
            file: another_ticket.yml
            note: "Will get a completed/ copy when first item completes"

        completion_workflow:
          when_my_feature_finishes:
            - "Sync final 2 items to completed/my_feature.yml"
            - "Delete live/my_feature.yml"
            - "File now exists only in completed/"

        reactivation_workflow:
          if_issues_found_in_old_feature:
            - "Copy completed/old_feature.yml back to live/"
            - "Update affected items' status"
            - "Sync fixes back to completed/ as resolved"

  cli_commands:
    description: |
      CLI commands for epic archival. See modules/AgenticGuidance/assets/definitions/plans.yml
      for authoritative CLI usage documentation.
    commands:
      archive:
        command: "agentic epic archive <full_path>"
        example: "agentic epic archive docs/epics/live/260128AG_example"
        note: "Copies to completed/ but does NOT remove source from live/"
      unarchive:
        command: "agentic epic unarchive <epic_name>"
        example: "agentic epic unarchive 260128AG_example"
        note: "Moves from completed/ back to live/ (reverse archival)"
      auto_archival:
        trigger: "When completing the last ticket with 'agentic epic ticket complete'"
        suppress: "Use --no-archive flag to prevent auto-archival"
    path_requirement: |
      Epic commands accept full paths or short names.
      Short-name resolution IS supported: partial folder names are matched
      against docs/epics/live/ using prefix matching (startswith).
      Example: --epic 260128AG resolves to docs/epics/live/260128AG_example

  # ==============================================
  # FENCE: CLI-ONLY FILE OPERATIONS
  # ==============================================
  cli_only_fence:
    description: |
      FENCE: All epic file operations MUST use CLI commands.
      Manual file operations (rm, mv, Edit on status fields) are PROHIBITED.
    justification: |
      CLI commands ensure data consistency, trigger auto-archival, and maintain
      proper epic lifecycle state. Manual operations bypass these safeguards and
      can leave epics in inconsistent states.
    prohibited_operations:
      - "rm docs/epics/live/<folder>  # Use CLI archival instead"
      - "mv docs/epics/live/<folder> docs/epics/completed/  # CLI handles this"
      - "Edit tool to change ticket status fields  # Use agentic epic ticket start/complete"
      - "Direct YAML editing of epic status  # CLI manages status transitions"
    required_cli_commands:
      ticket_management:
        - command: "agentic epic ticket start <ticket_id> --epic <folder>"
          purpose: "Mark ticket as in_progress"
        - command: "agentic epic ticket complete <ticket_id> --epic <folder>"
          purpose: "Mark ticket as completed; triggers auto-archive if last ticket"
      archival:
        - command: "agentic epic archive <folder>"
          purpose: "Manual archival (copies to completed/)"
        - command: "agentic epic unarchive <name>"
          purpose: "Restore archived epic to live/"
    violation_indicators:
      - "Bash rm command on docs/epics/ paths"
      - "Bash mv command on docs/epics/ paths"
      - "Edit tool modifying status: field in epic YAML"
      - "Epic folder missing from live/ without CLI archive call"
