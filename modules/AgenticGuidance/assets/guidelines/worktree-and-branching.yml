guideline:
  name: "Worktree Source of Truth and Branching"
  description: |
    Policies for maintaining consistency across git worktrees and 
    enforcing a safe merge flow through staging to main.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/plans.yml#naming_convention"
      description: "Standard naming conventions for worktrees and live plan folders"

  rules:
    - rule: "Main branch as source of truth"
      description: |
        The main branch (MyAgents worktree) is the authoritative source for 
        all agent guidance, processes, and architectural patterns.
      justification: |
        Divergent guidance across branches causes confusion and inconsistent 
        agent behavior. Centralizing truth in main ensures all worktrees 
        operate on the same standards.
      characteristics:
        - "Update guidance in main first"
        - "Sync guidance from main to feature branches before execution"
        - "Do not modify guidance locally in feature branches"

    - rule: "Staging-first merge strategy"
      description: |
        All development branches must merge to staging (e.g., myagents-staging) 
        before merging to main.
      justification: |
        Direct merges to main bypass integration testing and risk production 
        stability. Staging provides a safe environment for pre-release validation.
      workflow: "dev branch → staging → main"

    - rule: "Environment-worktree alignment"
      description: |
        Use the appropriate worktree for the current phase (dev, staging,
        cloud-deploy).
      justification: |
        Maintains clear boundaries between active development, integration
        testing, and production-ready code.

    - rule: "Centralized Plan Visibility"
      aliases: ["Main-First Planning"]  # Legacy name for backward compatibility
      description: |
        Plans (docs/plans/live/) must be created and maintained in the main
        worktree to ensure visibility and traceability for the user.
      scope: |
        APPLIES TO: Plan files only (docs/plans/live/*.yml, orchestration MMDs, README.md)
        DOES NOT APPLY TO: Code changes, feature implementation, module updates

        Centralized Plan Visibility is a PLAN VISIBILITY policy, not a code development policy.
        Code implementation MUST still happen in feature worktrees and merge via staging.
      justification: |
        Creating plans in feature worktrees causes visibility issues - users cannot
        see all active plans from a single location. Centralized Plan Visibility ensures
        the user has a centralized view of all planning state.
      clarification: |
        Centralized Plan Visibility is about PLAN VISIBILITY, not code development:
        - Plan YAML files: Created in main worktree so user sees all plans in one place
        - Code changes: Must be developed in feature worktrees, merged via staging to main
        - After plan approval: Switch to feature worktree for actual implementation
        - The 'agentic plan init' command creates BOTH: plan folder in main, worktree for code

        The workflow is:
        1. Create plan in main worktree (visibility)
        2. Switch to feature worktree (code development)
        3. Implement code changes in feature branch
        4. Merge via staging to main (code integration)
      characteristics:
        - "Create plan folders in the main worktree's docs/plans/live/"
        - "Plan files only - code work happens in feature worktrees"
        - "Plan creation happens BEFORE worktree switching for execution"
        - "After plan creation in main, switch to feature worktree for implementation"
        - "Execution happens in feature worktrees after plan approval"
        - "Plan status updates are committed back to main"
        - "Use 'agentic plan init' which enforces Centralized Plan Visibility programmatically"
        - "JSON output includes 'main_worktree' field for verification"
      implementation:
        command: "agentic plan init <branch> --description <desc>"
        behavior: "Creates plan folder in main worktree, feature worktree for execution"
        reference: "modules/AgenticGuidance/assets/definitions/cli-commands.yml#plan.init"

  anti_patterns:
    - "Merging dev branches directly to main"
    - "Modifying core guidance files in a feature branch without syncing to main"
    - "Using the wrong worktree for a specific deployment phase"
    # Centralized Plan Visibility anti-patterns (scope enforcement)
    - "Committing code changes directly to main branch (violates staging-first merge)"
    - "Implementing features in the main worktree (Centralized Plan Visibility applies to plan files only)"
    - "Confusing plan file visibility with code development workflow"
    - "Interpreting Centralized Plan Visibility as permission to do all work in main"

  tooling_enforcement:
    - name: "Pre-commit branch check"
      status: "implemented"
      location: ".claude/hooks/precommit"
      description: |
        A Claude Code pre-commit hook that warns when non-plan files
        are committed to the main branch. This provides technical
        enforcement of the Centralized Plan Visibility scope.
      behavior:
        - "Triggers on commits to main or master branch"
        - "Identifies non-plan files (anything outside docs/plans/ and .claude/)"
        - "Outputs warning with Centralized Plan Visibility reference"
        - "Does NOT block commit (warning only, exit 0)"
      configuration: |
        The hook is automatically active for Claude Code sessions.
        No configuration required. Hook implements REC-003 from
        friction analysis (260122_friction_analysis.yml).

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/safety.yml"
      description: "Operational guardrails"
