guideline:
  name: "Worktree Source of Truth and Branching"
  description: |
    Policies for maintaining consistency across git worktrees and 
    enforcing a safe merge flow through staging to main.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/plans.yml#naming_convention"
      description: "Standard naming conventions for worktrees and live plan folders"

  rules:
    - rule: "Main branch as source of truth"
      description: |
        The main branch (MyAgents worktree) is the authoritative source for 
        all agent guidance, processes, and architectural patterns.
      justification: |
        Divergent guidance across branches causes confusion and inconsistent 
        agent behavior. Centralizing truth in main ensures all worktrees 
        operate on the same standards.
      characteristics:
        - "Update guidance in main first"
        - "Sync guidance from main to feature branches before execution"
        - "Do not modify guidance locally in feature branches"

    - rule: "Staging-first merge strategy"
      description: |
        All development branches must merge to staging (e.g., myagents-staging) 
        before merging to main.
      justification: |
        Direct merges to main bypass integration testing and risk production 
        stability. Staging provides a safe environment for pre-release validation.
      workflow: "dev branch → staging → main"

    - rule: "Environment-worktree alignment"
      description: |
        Use the appropriate worktree for the current phase (dev, staging,
        cloud-deploy).
      justification: |
        Maintains clear boundaries between active development, integration
        testing, and production-ready code.

    - rule: "Main-First Planning"
      description: |
        Plans (docs/plans/live/) must be created and maintained in the main
        worktree to ensure visibility and traceability for the user.
      justification: |
        Creating plans in feature worktrees causes visibility issues - users cannot
        see all active plans from a single location. Main-First Planning ensures
        the user has a centralized view of all planning state.
      characteristics:
        - "Create plan folders in the main worktree's docs/plans/live/"
        - "Plan creation happens BEFORE worktree switching for execution"
        - "Execution happens in feature worktrees after plan approval"
        - "Plan status updates are committed back to main"

  anti_patterns:
    - "Merging dev branches directly to main"
    - "Modifying core guidance files in a feature branch without syncing to main"
    - "Using the wrong worktree for a specific deployment phase"

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/safety.yml"
      description: "Operational guardrails"
