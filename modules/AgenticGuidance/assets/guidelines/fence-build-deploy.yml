fence-build-deploy: |
  Build and deploy are distinct boundaries with different responsibilities.
  Understanding where one ends and the other begins prevents scope creep.

  Build Boundary:
  - Responsibility: Write code, verify it compiles/type-checks
  - Outputs: Source code files, configuration files
  - Success criteria: Code builds without errors, tests pass
  - Tools: Compilers, linters, test runners
  - Scope ends: When code is ready to package and install

  Deploy Boundary:
  - Responsibility: Create artifacts, install/configure systems
  - Inputs: Built code from build phase
  - Outputs: Installed packages, running services, artifacts
  - Success criteria: Services running, packages installed correctly
  - Tools: Package managers, installers, deployment scripts
  - Scope begins: After code is verified to build correctly

  The Fence Between:
  - Build produces code that CAN be deployed
  - Deploy takes that code and MAKES it running/installed
  - Build should NOT: Install packages, start services, modify system state
  - Deploy should NOT: Write source code, fix bugs, modify business logic

  Examples:

  Build Phase:
  - Write feature implementation
  - Run unit tests
  - Verify type checking passes
  - Fix linting errors
  - Commit code changes
  - ✓ Output: Working source code

  Deploy Phase:
  - Package application (docker build, pip wheel, etc.)
  - Install package on target system
  - Configure environment variables
  - Start services
  - Verify health checks pass
  - ✓ Output: Running application

  Common Mistakes:
  - Build agent installing packages (crosses into deploy)
  - Deploy agent fixing code bugs (crosses into build)
  - Build agent starting services to test (use test fixtures instead)
  - Deploy agent modifying source code (should trigger rebuild)

  When Work Crosses the Fence:
  - Build discovers deployment issue → hand off to deploy agent
  - Deploy discovers code bug → hand off to build agent
  - Don't try to do both in one agent

  Related: agent-categories.yml, role-separation.yml
