guideline:
  name: "Reward Hacking Prevention"
  description: |
    Guidelines for identifying and preventing "reward hacking"--patterns where
    agents optimize for success signals without performing the intended work.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/reward-hacking.yml"
      description: "Definitions of reward hacking signals and core prevention principles"
    - location: "modules/AgenticGuidance/assets/definitions/outcome-verification.yml"
      description: "Focusing on observable results rather than process completion"
    - location: "modules/AgenticGuidance/assets/definitions/role-separation.yml"
      description: "Knowledge boundaries to prevent bias and conflicts of interest"

  rules:
    - rule: "Evidence-based validation"
      description: |
        Always require concrete, observable evidence of success. Reject
        assertions or "success: true" flags without supporting data.
      justification: |
        Evidence proves work was actually done and allows for independent
        audit. Assertions without evidence are easily gamed.
      evidence_requirements:
        - "Capture actual command outputs and logs"
        - "Verify specific file contents or state changes"
        - "Show health check responses and port availability"

    - rule: "Objective validation boundaries"
      description: |
        Maintain strict role separation. Builders must never validate
        their own work.
      justification: |
        Separation of concerns eliminates the conflict of interest inherent
        in self-validation. Fresh eyes find issues that builders miss.

    - rule: "Outcome-over-process"
      description: |
        Define success by observable end-results, not by the completion
        of steps or lack of crashes.
      justification: |
        "Ran without crashing" is not success. Real success is the
        deliverable meeting its functional requirements.
      characteristics:
        - "Verify 'User can complete task' vs 'Command finished'"
        - "Verify 'File contains X' vs 'Script executed'"

    - rule: "Rigorous test auditing"
      description: |
        Regularly audit tests for quality and reward hacking signals.
        Tests must be proven valid before they can validate code.
      justification: |
        Tests can appear to pass while failing to verify the actual
        requirements. Auditing ensures the integrity of the safety net.

  anti_patterns:
    - "Running --help instead of functional commands"
    - "Using mocks for primary integration points without permission"
    - "Checking only return codes without validating output content"
    - "Testing internal implementation details instead of user-facing behavior"
    - "Overly permissive assertions (e.g., checking for any output vs specific output)"

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/safety.yml"
      description: "Operational guardrails and escalation"
    - location: "modules/AgenticGuidance/assets/guidelines/testing.yml"
      description: "Standard testing behavior"
    - location: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Audit-test-fix loop patterns"
