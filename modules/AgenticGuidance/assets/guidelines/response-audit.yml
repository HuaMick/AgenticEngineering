guideline:
  name: "Response Audit (Mandatory)"
  description: |
    Final quality control guardrail: every user reply must be verified 
    by an independent audit agent to prevent reward hacking and ensure 
    objective reporting.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml"
      description: "Standards for where to store and report information"
    - location: "modules/AgenticGuidance/assets/definitions/success-criteria.yml"
      description: "Observable outcomes used to measure completion"

  rules:
    - rule: "Independent audit before reply"
      description: |
        Before sending any final response to the user, spawn an independent 
        audit agent to verify the work done.
      justification: |
        Self-validation is unreliable due to inherent bias. A skeptical 
        third-party audit ensures rigorous quality control and identifies 
        unconscious reward hacking.
      process:
        - "Gather execution data (raw facts and evidence)"
        - "Spawn Audit Agent using test/test-final-output/process.yml"
        - "Wait for audit summary"
        - "Relay the summary verbatim to the user"

    - rule: "Terminal-only summaries"
      description: |
        Output audit summaries directly to the terminal response. Do not
        create .md summary files.
      justification: |
        Summary files pollute the repository and are difficult to track.
        Use live plan files for state tracking and the terminal for communication.

    - rule: "Audit before commit (state change gate)"
      description: |
        FENCE: For orchestration workflows, audit MUST occur BEFORE git commit,
        not just before reply. Git commit is the irreversible state change.
      justification: |
        The commit is the point of no return. Auditing after commit can identify
        problems but cannot prevent them from being persisted. The audit must gate
        the commit operation, not the reply operation.
      process:
        - "Execute all work phases (build, teach, test, etc.)"
        - "STOP at validation/audit phase - do NOT skip to commit"
        - "Spawn Audit Agent using test/test-final-output/process.yml"
        - "If PASS → Proceed to commit"
        - "If FAIL → Do NOT commit → Return to fix phase or escalate"
      fence: |
        FENCE: AUDIT GATES STATE CHANGES
        For orchestration: audit BEFORE commit, not just before reply.
        The commit is the state change that matters - once committed, errors persist.

        Correct sequence:
        1. Execute work phases
        2. Execute audit/validation
        3. If pass → commit
        4. If fail → fix → re-audit

        Incorrect sequence (FENCE VIOLATION):
        1. Execute work phases
        2. Commit
        3. Execute audit (too late!)

  anti_patterns:
    - "Skipping the audit because the task 'seemed simple'"
    - "Paraphrasing the audit agent's results instead of relaying verbatim"
    - "Creating README.md or summary.md files for the audit report"

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml"
      description: "Detecting and preventing gaming of signals"
    - location: "modules/AgenticGuidance/assets/guidelines/focus-on-what-didnt-work.yml"
      description: "Reporting gaps and failures accurately"
