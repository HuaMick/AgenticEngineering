guideline:
  name: "Iteration Patterns"
  description: |
    Behavioral guidelines for agents during iterative loops.
    Loop DEFINITIONS (types, phases, max iterations) are in agent-loops.yml.
    This file defines behavioral RULES that add value beyond definitions.

  authoritative_source:
    location: "modules/AgenticGuidance/assets/definitions/agent-loops.yml"
    provides: "Loop types, phases, when_to_use, maximum_iterations, core_pattern"

  behavioral_rules:
    test-fix-loop:
      key_behavior: "Prioritize real user experience over pure code correctness"
      justification: "User simulation catches integration issues that unit tests miss"
      agent_responsibilities:
        - "Builder agents must execute entrypoints and run code as a user would"
        - "Success criteria validated through actual usage simulation"

    audit-test-fix-loop:
      key_behavior: "Focus on test integrity, not just code correctness"
      justification: "Tests must be validated to catch reward hacking"
      agent_responsibilities:
        - "Audit agent reviews tests for reward hacking patterns"
        - "Test agent fixes tests based on audit findings"
        - "Build agent only fixes code if tests reveal actual bugs"

    documentation-loop:
      key_behavior: "Validate docs through blind testing"
      justification: "Documentation proven usable only when agent completes journey with docs alone"

    cleaner-dependency-loop:
      key_behavior: "Explorer verification before destructive changes"
      justification: "Dependency checking is more reliable than voting consensus"

    exploration-loop:
      key_behavior: "Iterative discovery before acting"
      justification: "Complex tasks need multiple discovery rounds"

  agent_context:
    test_fix_loop:
      context: |
        When executing in a test-fix-loop context, the test-builder may be 
        assigned to fix test quality issues:
        - Read the live plan file for assigned failure_id or issue_id
        - Focus on fixing ONLY your assigned test quality issue
        - Update live plan to mark issue as resolved after fixing
        - Do not attempt to fix other issues - each has its own builder agent

    audit_test_fix_loop:
      context: |
        When executing in an audit-test-fix-loop context, the test-builder 
        may be assigned to fix audit findings:
        - Read the live plan file for assigned audit_finding_id or failure_id
        - Focus on fixing ONLY your assigned audit finding
        - Update live plan to mark finding as resolved after fixing
        - Do not attempt to fix other findings - each has its own builder agent

  examples:
    good:
      - description: "Test-fix-loop catching integration issue early"
        example: |
          Iteration 1: Build creates minimal components. Test FAILs with import error.
          Iteration 2: Build adds missing import. Test PASSes.
          Checkpoint: Commit working state.
      - description: "Audit-test-fix-loop detecting reward hacking"
        example: |
          Iteration 1: Audit finds tests check success=True without verifying files.
          Iteration 2: Test agent rewrites tests to verify actual file contents.
          Result: Audit PASSes.
      - description: "Documentation loop finding gaps"
        example: |
          Iteration 1: Agent FAILs - missing setup step. Fix: Add step.
          Iteration 2: Agent FAILs - ambiguous instruction. Fix: Clarify.
          Iteration 3: Agent PASSes.

    bad:
      - description: "Infinite loop without maximum iterations"
        example: "No maximum iteration limit set; agent loops 50+ times on same failure."
      - description: "Skipping audit phase"
        example: "Build implements, tests PASS, but reward hacking in tests leads to production bug."
      - description: "Not iterating when needed"
        example: "Builder gives up after one iteration despite a clear fix being possible."

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/testing.yml"
      description: "Testing behavioral standards"
    - location: "modules/AgenticGuidance/assets/guidelines/reward-hacking-prevention.yml"
      description: "Preventing gaming of success criteria"
