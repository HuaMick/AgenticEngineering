guideline:
  name: "Orchestration Policy"
  description: |
    Defines agent-ticket alignment verification, escalation policies, epic status management,
    and success criteria communication patterns for orchestration workflows.

    This guideline ensures orchestrators correctly validate agent capabilities before spawning,
    handle issues by delegating to appropriate agents, and communicate outcomes consistently.

  inputs:
    - location: "docs/agent-role-scope-matrix.md"
      description: "Matrix defining each agent's scope and capabilities"
    - location: "modules/AgenticGuidance/assets/definitions/epics.yml"
      description: "Epic status values and completion patterns (TWO-LEVEL, COPY-NOT-MOVE)"

  rules:
    - rule: "Agent-Ticket Alignment Verification"
      description: |
        Before spawning any agent, verify the agent's documented scope covers the specific ticket.
      justification: |
        Spawning an agent for a ticket outside its scope leads to poor results, wasted tokens,
        and potential errors. The agent-role-scope-matrix.md is the authoritative source.
      execution_pattern:
        - "Identify the agent specified in the epic for a given ticket"
        - "Consult docs/agent-role-scope-matrix.md for that agent's scope"
        - "Compare: Does the documented scope cover this specific ticket?"
        - "If match → Proceed with spawn"
        - "If mismatch → FENCE: Do NOT spawn, trigger escalation policy"
      characteristics:
        - "Matrix check is MANDATORY before every agent spawn"
        - "Scope mismatches must halt execution, not proceed with wrong agent"
        - "Document mismatch details when triggering escalation"

    - rule: "Escalation Policy"
      description: |
        Always offload work to appropriate agents rather than doing it yourself.
      justification: |
        Orchestrators are managers, not doers. Doing work directly creates bottlenecks,
        context overload, and bypasses specialized agent capabilities.
      execution_pattern:
        - "Identify the issue category (test failure, documentation gap, scope mismatch, etc.)"
        - "Match to appropriate agent type based on issue"
        - "Spawn agent with clear context and expected outcome"
        - "If no appropriate agent exists → Ask user for guidance"
      characteristics:
        - "Bugs and investigations → Delegate to diagnostics or build agents"
        - "Specialized work → Delegate to agents with domain expertise"
        - "Scope mismatches (detected per Agent-Ticket Alignment Verification rule) → Update epic and re-plan with correct agent"
        - "Unknown issues → Investigate to determine agent type, then delegate"

    - rule: "Epic Status Management"
      description: |
        Update epic status and summary counts as work progresses using CLI commands.
      justification: |
        Accurate status tracking enables progress visibility, identifies blockers early,
        and ensures completion patterns are followed correctly. CLI commands ensure
        data consistency and trigger auto-archival when all tickets complete.
      execution_pattern:
        - "Use `agentic epic ticket start <ticket_id> --epic <folder>` when starting a ticket"
        - "Use `agentic epic ticket complete <ticket_id> --epic <folder>` when completing a ticket"
        - "CLI auto-archives to completed/ when the last ticket is marked complete"
        - "Use --no-archive flag only if follow-on work is planned"
      characteristics:
        - "NEVER use Edit tool to modify ticket status in epic YAML files directly"
        - "NEVER use rm or mv commands on epic folders - CLI handles archival"
        - "CLI enforces TWO-LEVEL COMPLETION and COPY-NOT-MOVE patterns automatically"
        - "Status values: planning, active, partially_completed, fully_completed"
      cli_workflow:
        get_ticket: "agentic epic ticket current --epic <folder>"
        start_ticket: "agentic epic ticket start <ticket_id> --epic <folder>"
        complete_ticket: "agentic epic ticket complete <ticket_id> --epic <folder>"
        archive_epic: "Automatic when last ticket completes (or: agentic epic archive <folder>)"

    - rule: "Success Criteria Communication"
      description: |
        Pass success criteria as bullet points to spawned agents. Receive only success/failure reports.
      justification: |
        Clear, structured criteria enable agents to self-verify. Minimal reporting reduces noise
        and allows orchestrators to focus on exceptions.
      execution_pattern:
        - "Extract acceptance criteria from epic ticket definition"
        - "Format as clear bullet points in agent spawn prompt"
        - "Expect: Success/failure status from agent"
        - "Only request details on failure"
      characteristics:
        - "Bullet point format preferred for acceptance criteria"
        - "Agents report success/failure, not verbose logs"
        - "Details only on failure: what failed, why, suggested fix"
        - "Orchestrator logs failures in plan for tracking"

    - rule: "Validation-Before-Commit Fence"
      description: |
        FENCE: All validation phases defined in the orchestration MMD MUST execute
        and PASS before any git commit or epic status update to "completed".
      justification: |
        Commits are irreversible state changes. Validation after commit defeats the
        purpose of validation - errors are already persisted. The audit/validation
        phase exists to catch errors BEFORE they become permanent.
      execution_pattern:
        - "Identify all validation/audit subgraphs in the MMD"
        - "Verify each validation subgraph has AGENT_ROUTING entry"
        - "Execute all validation phases before marking epic complete"
        - "Only proceed to git commit after ALL validation phases PASS"
        - "If validation fails → Do NOT commit → Trigger feedback loop"
      fence: |
        FENCE: NO COMMIT BEFORE VALIDATION
        Git commits are PROHIBITED until:
        1. All MMD-defined validation subgraphs have executed
        2. All validation phases report PASS
        3. Validation agent (test-final-output) has approved the changes

        Violation indicators:
        - Commit created while Validation_SG status = pending
        - Plan marked completed without validation phase execution
        - "Skipping validation to save time" reasoning
      characteristics:
        - "Validation is MANDATORY, not optional"
        - "Validation subgraphs MUST have AGENT_ROUTING entries to be executable"
        - "Missing AGENT_ROUTING for validation = blocked workflow, not skipped validation"
        - "Exception: Documentation-only changes may skip with explicit notation"

    - rule: "Exhaustive Ticket Completion Policy"
      description: |
        FENCE: Orchestration loops MUST continue until ALL tickets in the epic are completed,
        including minor, LOW priority, and optional items. Do NOT mark an epic complete
        while any pending tickets remain.
      justification: |
        Users expect the full epic to be executed. Stopping after major items leaves work
        incomplete and forces users to repeatedly push agents to finish. Minor improvements
        are still improvements - they were included for a reason.
      execution_pattern:
        - "Before shutdown, scan ALL tickets in the epic YAML"
        - "Count tickets by status: pending, in_progress, completed, blocked"
        - "If ANY ticket has status: pending or in_progress → DO NOT proceed to shutdown"
        - "Continue executing phases until all tickets reach completed or blocked"
        - "Only stop when: (a) all tickets completed, (b) blocked awaiting user, or (c) user explicitly requests stopping"
      fence: |
        FENCE: NO EARLY EXIT
        Orchestration shutdown is PROHIBITED while:
        1. Any ticket has status: pending
        2. Any ticket has status: in_progress
        3. Any phase has unexecuted tickets

        Violation indicators:
        - "All major items done" while minor tickets remain
        - Skipping tickets because they are LOW priority
        - Epic marked completed with pending tickets
      characteristics:
        - "Priority level (HIGH/MEDIUM/LOW) does NOT determine whether to complete"
        - "ALL priority levels MUST be completed before shutdown"
        - "LOW priority means 'do last', NOT 'skip if convenient'"
        - "Only user can authorize early termination"

  examples:
    good:
      - description: "Agent-ticket alignment check before spawning"
        example: |
          # Epic specifies teacher-update-assets for updating modules/AgenticGuidance/agents/foo/inputs.yml
          # Step 1: Check agent-role-scope-matrix.md
          #   - teacher-update-assets scope: "shared assets in modules/AgenticGuidance/assets/ folder"
          # Step 2: Compare epic ticket location
          #   - Ticket location: modules/AgenticGuidance/agents/foo/inputs.yml (NOT in modules/AgenticGuidance/assets/)
          # Step 3: Mismatch detected
          # Action: Do NOT spawn teacher-update-assets
          # Escalation: Update epic to use teacher-update-guidance instead

      - description: "Escalation policy - offloading to appropriate agent"
        example: |
          # Issue: Test failing in auth module
          # Wrong: Orchestrator attempts to fix test directly
          # Right: Spawn build agent with context
          spawn:
            agent_type: "build"
            context: "Fix failing test in auth module: test_login_timeout"
            acceptance_criteria:
              - "test_login_timeout passes"
              - "No regression in other auth tests"

      - description: "Success criteria as bullet points"
        example: |
          spawn:
            agent_type: "teacher"
            task: "Update inputs.yml to include new guideline"
            acceptance_criteria:
              - "orchestration-policy.yml added to inputs list"
              - "Entry has location and description fields"
              - "File remains valid YAML syntax"

    bad:
      - description: "Skipping agent-ticket alignment check"
        example: |
          # Epic says spawn teacher-update-assets
          # Wrong: Immediately spawn without checking scope
          spawn:
            agent_type: "teacher-update-assets"
            task: "Update modules/AgenticGuidance/agents/foo/inputs.yml"
          # This will fail - agent scope doesn't cover modules/AgenticGuidance/agents/ folder

      - description: "Orchestrator doing work instead of delegating"
        example: |
          # Wrong: Orchestrator directly editing files
          edit:
            file: "src/auth.py"
            fix: "Add timeout handling"
          # Right: Spawn build agent to handle the fix

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/validation-strategy.yml"
      description: "Defines when to use bash vs agent delegation for validation"
    - location: "modules/AgenticGuidance/assets/definitions/epics.yml"
      description: "Epic status values and completion patterns referenced by this guideline"
    - location: "modules/AgenticGuidance/assets/guidelines/response-audit.yml"
      description: "Audit requirements that complement this validation fence"
