guideline:
  name: "Planning Standards"
  description: |
    Standards for plan structure and required phases. Ensures consistency across all
    orchestration plans and mandates critical validation phases.

  inputs:
    - location: "modules/AgenticGuidance/assets/definitions/plans.yml"
      description: "Plan status values, completion patterns, and structure definitions"
    - location: "docs/userstories/"
      description: "User stories location - UAT must reference stories from here"

  rules:
    # ========================================
    # FENCE: STORY-FIRST PLANNING
    # ========================================
    - rule: "Story-First Planning"
      mandatory: true
      fence: |
        FENCE: STORY-FIRST PLANNING
        Story discovery MUST occur BEFORE phase determination in any planning workflow.
        Every plan MUST identify affected user stories using `agentic stories find`
        before creating phase plans. Stories provide the acceptance criteria that
        drive UAT and define success.
      justification: |
        Without early story discovery, plans risk building features that don't map
        to user needs, and UAT phases lack concrete acceptance criteria. Story-first
        planning ensures every implementation is anchored to verifiable user outcomes.
      execution_pattern:
        - "Run `agentic stories find [--project <project>]` to discover affected stories"
        - "Record affected_stories in plan metadata (list of story IDs)"
        - "Pass story context to downstream planner agents"
        - "If no stories found: require no_stories_rationale field in plan metadata"
      characteristics:
        - "Story discovery runs before phase determination"
        - "Stories location: docs/userstories/"
        - "affected_stories field is mandatory in plan metadata (or no_stories_rationale)"
        - "Story IDs follow US-<PROJECT>-NNN format (e.g., US-CLI-001)"
      story_lifecycle:
        discovery:
          description: "Find existing story IDs that map to the objective"
          command: "agentic stories find [--project <name>]"
          output: "List of story IDs (US-PROJECT-NNN)"
          when: "ALWAYS - first step in planning workflow"
        generation:
          description: "Create new story content files when discovery finds no stories"
          responsibility: "planner-build (for build plans), planner-guidance (for teach plans)"
          output: "Story YAML files with journey, success_criteria, testing fields"
          when: "When discovery returns empty AND plan type is build/test"
          escape_hatch: "Infrastructure, guidance, internal_tooling may skip with rationale"
        validation:
          description: "Verify story files exist and have complete content"
          responsibility: "orchestration-planning (before phase determination), planner-test (before UAT creation)"
          required_fields: ["journey", "success_criteria", "testing"]
          when: "After discovery (orchestration) and before UAT planning (test)"
      escape_hatch_rules:
        description: |
          Canonical rules for when stories and UAT can be skipped. ALL agent
          guidance files MUST reference this section — no inline escape hatch
          definitions are permitted elsewhere.
        allowed_plan_types:
          - "infrastructure"
          - "guidance"
          - "internal_tooling"
        blocked_plan_types:
          - "build"
          - "test"
        rules:
          - "Plans in allowed_plan_types may proceed without stories IF no_stories_rationale is provided"
          - "Plans in blocked_plan_types MUST have affected_stories — no escape hatch available"
          - "Vague rationales (e.g., 'not applicable') are rejected; rationale must explain user-impact absence"
        required_field: "no_stories_rationale"
        example: |
          # Allowed (infrastructure plan):
          no_stories_rationale: "Internal guidance refactoring with no user-facing behavior change"

          # Blocked (build plan without stories):
          # ERROR: Build plans are blocked_plan_types — cannot skip story discovery

    # ========================================
    # FENCE: UAT IS MANDATORY
    # ========================================
    - rule: "UAT Phase Mandatory"
      mandatory: true
      fence: |
        FENCE: UAT is MANDATORY for all plans.
        Every orchestration plan MUST include a User Acceptance Testing (UAT) phase.
        Plans without UAT are incomplete and must not be marked fully_completed.
      justification: |
        Automated tests alone do not prove the system works for users. UAT validates
        the complete user experience against acceptance criteria defined in user stories.
        Without UAT, there is no evidence that deliverables satisfy user needs.
      characteristics:
        - "UAT phase required regardless of plan complexity"
        - "UAT must occur after implementation phases complete"
        - "UAT failure blocks plan completion"
        - "UAT success measured against user story acceptance criteria"

    # ========================================
    # FENCE: USER STORY ANCHORING
    # ========================================
    - rule: "UAT User Story Anchoring"
      mandatory: true
      fence: |
        FENCE: UAT MUST be anchored to user stories.
        UAT phases cannot proceed without defined user stories. Each UAT test
        must trace back to a user story ID. User stories define the acceptance
        criteria that UAT validates.
      justification: |
        Without user stories, UAT has no objective success criteria. User stories
        provide the acceptance criteria that determine pass/fail. Ad-hoc UAT
        without story anchoring risks validating the wrong things or missing
        critical user requirements.
      execution_pattern:
        - "Identify relevant user stories: `agentic stories find`"
        - "Map each story to implementation artifacts"
        - "Execute UAT against story acceptance criteria"
        - "Document pass/fail per story ID (e.g., US-CLI-001)"
      characteristics:
        - "Stories discovered via: agentic stories find [--project <project>]"
        - "Stories location: docs/userstories/"
        - "Each UAT test traces to specific story ID"
        - "Acceptance criteria from stories define UAT success"

    # ========================================
    # FENCE: CLI SMOKE TEST REQUIREMENT
    # ========================================
    - rule: "CLI Smoke Test Requirement"
      mandatory: true
      fence: |
        FENCE: CLI SMOKE TEST REQUIREMENT
        UAT for CLI commands MUST execute the actual installed binary, not mocks.
        Plans that modify CLI commands MUST include smoke tests that run the real
        `agentic` command to verify it works as users will invoke it.
      justification: |
        Mocking subprocess calls provides false confidence. Three plans (260214PF,
        260214TG, 260214US) passed UAT with mocked tests but the actual command
        execution failed. Mocked tests validate test code, not production behavior.
        Real CLI execution catches:
        - Import errors and module registration issues
        - Argument parsing bugs in actual argparse configuration
        - Command routing failures in CLI dispatcher
        - Runtime errors that only occur in installed binary context
      detection_criteria:
        description: |
          This fence applies when ANY of the following are true:
        conditions:
          - "Plan modifies files in modules/AgenticCLI/src/agenticcli/commands/"
          - "Plan's impacted_files include *.py files under agenticcli/commands/"
          - "Plan objective mentions 'CLI command' or 'agentic <command>'"
          - "Plan has affected_stories matching US-CLI-* pattern"
      requirements:
        - "UAT MUST execute installed CLI binary (not mocked subprocess)"
        - "Smoke test MUST run at minimum: agentic <command> --help"
        - "Smoke test SHOULD run: agentic <command> <minimal-valid-args>"
        - "Use --no-tmux or --dry-run flags to avoid interactive/destructive operations"
        - "Verify actual command output, not mocked return values"
      examples:
        bad:
          - description: "Mocked subprocess call (WRONG)"
            code: |
              # WRONG: Passes UAT even if command is broken
              def test_orchestrate_command(monkeypatch):
                  mock_run = Mock(return_value=Mock(returncode=0))
                  monkeypatch.setattr('subprocess.run', mock_run)
                  result = subprocess.run(['agentic', 'orchestrate', '--mode', 'planning'])
                  assert result.returncode == 0
          - description: "--help only test (INSUFFICIENT)"
            code: |
              # INSUFFICIENT: --help works even if command logic is broken
              def test_command_help():
                  result = subprocess.run(['agentic', 'orchestrate', '--help'])
                  assert result.returncode == 0
        good:
          - description: "Real CLI smoke test (RIGHT)"
            code: |
              # RIGHT: Runs actual installed binary
              def test_orchestrate_planning_mode_smoke():
                  result = subprocess.run(
                      ['agentic', 'orchestrate', '--mode', 'planning', '--no-tmux'],
                      capture_output=True,
                      text=True
                  )
                  assert result.returncode == 0, f"Command failed: {result.stderr}"
                  assert 'Planning mode initialized' in result.stdout
          - description: "Real CLI error path test (RIGHT)"
            code: |
              # RIGHT: Verifies error handling with real command
              def test_orchestrate_invalid_mode():
                  result = subprocess.run(
                      ['agentic', 'orchestrate', '--mode', 'invalid'],
                      capture_output=True,
                      text=True
                  )
                  assert result.returncode != 0
                  assert 'invalid choice' in result.stderr.lower()

    # ========================================
    # UAT IMPLEMENTATION FLEXIBILITY
    # ========================================
    - rule: "UAT Implementation Flexibility"
      description: |
        UAT is mandatory but implementation strategy is at the planner's discretion.
        Planners select the approach most appropriate to the plan's context.
      justification: |
        Different plans have different validation needs. A CLI tool benefits from
        user simulation, while a guidance update benefits from blind testing. Rigid
        mandates on strategy would reduce effectiveness.
      implementation_options:
        test-user-simulator:
          description: |
            Spawn test-user-simulator agents to execute simulated user journeys.
            Agent walks through user stories as if they were a real user.
          when_to_use:
            - "Full user journey validation needed"
            - "CLI tools or interactive features"
            - "Repeatable automated validation desired"
            - "User flow complexity requires step-by-step execution"
          agent: "test-user-simulator"

        guidance-blind-test:
          description: |
            Spawn test-guidance-simulator without prior context. Agent attempts
            to complete tasks using only documentation and guidance.
          when_to_use:
            - "Documentation completeness validation needed"
            - "Guidance or instruction updates"
            - "Validating that guidance is self-contained"
            - "Testing that new users can follow instructions"
          agent: "test-guidance-simulator"

        documentation-loop:
          description: |
            Create user documentation and have the user review it. User validates
            that documentation accurately represents the implementation.
          when_to_use:
            - "End-user facing features needing docs validation"
            - "Human feedback on UX is prioritized"
            - "Documentation is primary deliverable"
            - "User must approve final wording"
          agent: "documentation-writer (user reviews output)"

        manual:
          description: |
            Present implementation to human validator. Human executes user stories
            manually and provides feedback.
          when_to_use:
            - "Complex scenarios requiring human judgment"
            - "Subjective quality assessment needed"
            - "Critical features requiring human approval"
            - "Automated simulation insufficient"
          agent: "None (human-in-the-loop)"

  uat_phase_component:
    location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/uat_phase.mmd"
    description: |
      Reusable UAT phase component for orchestration plans. Provides flow diagram
      showing strategy selection, story validation fence, iteration loop, and
      exit conditions. Planners should reference this component for UAT structure.
    usage: |
      Include in orchestration plans as the final validation phase. The component
      handles:
      - User story existence validation (fence)
      - Strategy selection (simulator, blind-test, doc-loop, manual)
      - Results aggregation across strategies
      - Iteration on failures (max 3 per loop definition)
      - Escalation when stories missing or max iterations reached

  examples:
    good:
      - description: "Plan with properly anchored UAT"
        example: |
          phases:
            - name: "Implementation"
              # ... implementation tasks ...
            - name: "UAT"
              user_stories:
                - "US-CLI-001: User can install CLI tool"
                - "US-CLI-002: User can run basic commands"
              strategy: "test-user-simulator"
              acceptance_criteria:
                - "All referenced stories pass validation"
                - "User simulator completes journeys without errors"

      - description: "Strategy selection based on context"
        example: |
          # For a guidance update plan:
          uat:
            strategy: "guidance-blind-test"
            rationale: "Testing guidance completeness - blind agent should succeed with docs alone"
            stories:
              - "US-GUIDE-001: Agent can follow process without prior context"

    bad:
      - description: "Plan without UAT phase"
        example: |
          # WRONG: Plan ends at implementation
          phases:
            - name: "Build"
              tasks: [...]
            - name: "Test"  # This is automated testing, NOT UAT
              tasks: [...]
          # Missing UAT phase - plan cannot be marked complete

      - description: "UAT without user story anchoring"
        example: |
          # WRONG: UAT has no story references
          uat:
            strategy: "manual"
            description: "Have someone test it"
            # No stories, no acceptance criteria - how do we know if it passes?

  related_guidelines:
    - location: "modules/AgenticGuidance/assets/guidelines/testing.yml"
      description: "Testing guidelines including UAT requirements section"
    - location: "modules/AgenticGuidance/assets/guidelines/iteration.yml"
      description: "Loop patterns for UAT iteration"
    - location: "modules/AgenticGuidance/assets/guidelines/orchestration-policy.yml"
      description: "Orchestration patterns for spawning UAT agents"

  related_components:
    - location: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/uat_phase.mmd"
      description: "UAT phase flow diagram component"
