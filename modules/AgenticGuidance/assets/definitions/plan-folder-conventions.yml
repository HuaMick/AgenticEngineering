# Plan Folder Conventions (Minimal)
# For deploy agents that only need scaffolding information.
# Full lifecycle details: modules/AgenticGuidance/assets/definitions/plans.yml

naming_convention:
  pattern: "YYMMDDXX_description"
  regex: "^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
  examples:
    - "260115AG_naming_audit"
    - "260104AE_agenticguidance"
  notes: |
    - YYMMDD: Date of creation (6 digits)
    - XX: 2-character worktree identifier (uppercase)
    - description: Sanitized description (lowercase, underscores)
  cli_enforcement: |
    Naming is enforced by 'agentic plan init' command.
    Agents should NOT manually construct folder names.
  worktree_id_derivation: |
    XX is derived from the worktree path:
    1. Parse worktree path (e.g., /home/code/AgenticEngineering-agenticguidance)
    2. Extract suffix after last hyphen (e.g., agenticguidance)
    3. Take first 2 characters, uppercase (e.g., AG)

folder_structure:
  location: "docs/plans/live/{naming_pattern}/"
  required_subfolders:
    - "live/": "Active phase files"
    - "completed/": "Finished work tracking"
  placeholder_files:
    - "live/plan_live_teach.yml": "Primary active plan"
    - "completed/plan_completed.yml": "Summary of finished items"

# For advanced lifecycle management (plan states, completion patterns,
# follow-on work rules), see the full plans.yml definition.
