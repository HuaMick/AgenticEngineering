voting_system: |
  The cleaner uses a multi-agent voting system for safe cleanup decisions.

  Why voting for cleaning?
  - Cleaning is the HIGHEST RISK operation (wrongly deleted code is catastrophic)
  - Single-agent decisions have unacceptable false-positive rates
  - 3-agent consensus dramatically reduces error probability
  - Non-unanimous decisions get human review (safe default)

  Voting thresholds:
  - 3/3 votes (unanimous): Auto-approved for cleanup
  - 2/3 votes: Escalated to user with vote breakdown
  - 1/3 votes: Escalated to user with vote breakdown
  - 0/3 votes: Automatically rejected (no cleanup)

  Vote matching rules:
  - Targets match by normalized file path (case-insensitive, trailing slash ignored)
  - Category must match for votes to combine
  - Rationales are preserved for user review of escalated items

  Agent roles in voting:
  - cleaner-identify agents: Vote on what to remove (identification only)
  - orchestrator: Aggregates votes, escalates non-unanimous decisions
  - cleaner-execute agent: Executes only approved items (no new identification)

  Red-flagging (self-filtering):
  - Agents should flag fewer items with high confidence vs many with low confidence
  - Low-confidence items (1-2 on 5-point scale) should NOT be flagged
  - This reduces correlated errors across agents
