signal: |
  Information that possesses "Discriminatory Power" - it allows the agent to distinguish
  the correct action from a sea of possibilities.

  High-signal content is:
  - Actionable: Can be directly applied to make decisions or perform operations
  - Specific: Points to concrete files, patterns, or decisions rather than abstract concepts
  - Verifiable: Has clear success criteria that can be tested or validated
  - Evidence-Based: Grounded in codebase reality (actual file paths, existing patterns, real constraints)

  Examples of signal:
  - "Edit agents/builder/process.yml line 42"
  - "Tests pass when 'flutter test' exits with code 0"
  - "Required inputs listed in assets/inputs/core-system.yml must all exist before proceeding"

  Related: context-minimisation.yml, path.yml, fence.yml

noise: |
  Information that causes "Attentional Drift" - distracting the model's limited attention
  window from the critical path without adding discriminatory power.

  Noise includes:
  - Meta-Talk: Commentary about the process rather than the task itself
    ("This is important because...", "Let me explain why...")
  - Stale Context: Outdated information that no longer applies
    (Old file paths, deprecated patterns, historical decisions no longer relevant)
  - Generic Philosophy: Abstract principles without concrete application
    ("Code should be maintainable", "Follow best practices")
  - Structural Redundancy: Repeated information across multiple files
    (Same definition in 3 places, duplicated examples, copy-pasted guidelines)

  Examples of noise:
  - "It's really important to understand that testing matters" (meta-talk + generic)
  - "The old system used to be in /legacy/..." (stale context, unless migration is the task)
  - "Always write clean code" (generic philosophy without specific criteria)
  - Defining "signal" in both process.yml and inputs.yml and README.md (redundancy)

  Related: friction.yml, context-minimisation.yml

signal-to-noise-ratio: |
  Measure of guidance quality. High signal-to-noise ratio means most content directly
  contributes to task completion.

  Evaluation checklist:
  - Can I remove this sentence without reducing task completion probability? (If yes: noise)
  - Does this point to a specific action, file, or decision criterion? (If no: likely noise)
  - Is this information duplicated elsewhere in the agent's context? (If yes: redundancy noise)
  - Would this still be true/useful 6 months from now? (If no: potential stale context)

  Target ratio: Aim for 80%+ signal in process files and inputs.

  High signal-to-noise example:
  ```
  steps:
    - Read assets/definitions/signal-and-noise.yml
    - Verify all required inputs exist (see inputs.yml)
    - Create target file if missing, edit if present
  ```

  Low signal-to-noise example:
  ```
  steps:
    - First, it's important to understand that we need to read some definitions
      because definitions help us understand concepts, and understanding is critical
      for successful task completion. So let's read the signal-and-noise definition
      which is probably somewhere in the assets folder.
    - We should verify inputs exist because that's a good practice...
  ```

maximizing-signal: |
  Techniques for increasing discriminatory power in guidance:

  1. Use concrete file paths:
     Low signal: "Update the process file"
     High signal: "Edit agents/builder/process.yml"

  2. Specify exact success criteria:
     Low signal: "Make sure tests work"
     High signal: "Run 'flutter test' - it must exit with code 0 and show 0 failures"

  3. Provide decision checkpoints:
     Low signal: "Handle errors appropriately"
     High signal: "If step 2 fails: check logs in /tmp/build.log, escalate if out-of-memory error"

  4. Reference existing patterns:
     Low signal: "Follow the standard approach"
     High signal: "Use the same structure as assets/examples/teacher/concise.yml"

  5. Link to single source of truth:
     Instead of duplicating a definition, write: "See assets/definitions/fence.yml"

minimizing-noise: |
  Patterns to avoid that increase attentional drift:

  1. Avoid meta-commentary:
     Remove: "This is important because", "Let me explain", "Note that"
     Keep only if it prevents a specific, likely error

  2. Remove stale context immediately:
     When paths change, update all references or remove historical notes
     Don't leave "old system used to..." unless actively migrating

  3. Replace philosophy with checklists:
     Don't: "Code should be maintainable and follow best practices"
     Do: "Before submitting: run linter, verify tests pass, check no TODO comments"

  4. Consolidate duplicated content:
     If 3 files define "fence", move to assets/definitions/fence.yml
     Replace duplicates with: "See assets/definitions/fence.yml"

  5. Delete redundant explanations:
     If process.yml says "Read inputs.yml then execute", don't also say it in inputs.yml

examples:
  high_signal_guidance: |
    # Process: Deploy validation
    steps:
      - Verify artifacts exist: ls build/app/outputs/flutter-apk/
      - Check artifact size: Must be > 10MB (du -h <artifact>)
      - Upload to registry: gcloud artifacts docker push <image>
      - Verify upload: gcloud artifacts docker images list --filter="name~myagents"
      - Exit code 0 = success, non-zero = escalate with error message

  low_signal_guidance: |
    # Process: Deploy validation
    steps:
      - First we need to make sure everything is ready for deployment. This is
        important because deploying broken artifacts causes production issues.
        So let's verify the artifacts exist somewhere in the build folder.
      - Check that the artifact size seems reasonable (not too small or too big).
      - Upload the artifact to the registry using the appropriate command.
      - Verify it worked by checking the registry somehow.
      - Make sure to handle errors appropriately.

  high_signal_definition: |
    fence: |
      Guardrails that prevent wrong work:
      - Success criteria that are measurable
      - Validation/audit steps appropriate to risk
      - Constraints that remove ambiguity (inputs, scope boundaries)

  low_signal_definition: |
    fence: |
      A fence is an important concept in our system that helps us make sure we're
      doing the right thing. Fences are really useful because they prevent mistakes,
      which is critical for success. Think of a fence like guardrails on a highway -
      they keep you safe. In our context, fences include things like success criteria
      (which should be good and clear) and validation steps (which should exist and
      be appropriate). We also want to have constraints because constraints are
      helpful for reducing confusion.
