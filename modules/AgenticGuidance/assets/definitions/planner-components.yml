# Planner Components Definition
# Defines what components are, where they live, and how planners should use them.
#
# Related guideline: modules/AgenticGuidance/assets/guidelines/component-over-workflow.yml

definition:
  name: "Planner Components"
  description: |
    Components are reusable orchestration patterns that planners can select and
    compose into phase structures. Components enable flexible orchestration design
    without hardcoding patterns into agent process files or loop definitions.
    All orchestration routing is stored in TinyDB phase records.

  what_components_are: |
    Components are documented patterns that define:
    - A specific orchestration pattern (loop, gate, phase, etc.)
    - Entry and exit points for embedding in larger flows
    - Agent routing metadata and feedback triggers
    - Clear success/failure conditions

  locations:
    phase_templates:
      path: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/"
      purpose: "Complete phase structures representing full workflow stages"
      contents:
        - name: "build_phase"
          purpose: "Complete build phase with architecture layers and iteration"
        - name: "test_phase"
          purpose: "Test execution with test-fix-loop integration"
        - name: "uat_phase"
          purpose: "User acceptance testing with flexible strategy selection"
        - name: "cleanup_phase"
          purpose: "Cleanup with dependency checking and safety validation"
        - name: "teach_phase"
          purpose: "Guidance teaching with planner-guidance and reviewer loop"

    reusable_components:
      path: "modules/AgenticGuidance/assets/examples/planner/components/"
      purpose: "Small, focused patterns embeddable in any phase"
      contents:
        - name: "feedback_loop"
          purpose: "Generic iterative refinement with user feedback"
        - name: "approval_gate"
          purpose: "Human approval checkpoints before critical actions"
        - name: "audit_test_fix_loop"
          purpose: "Test quality validation with audit-driven fixes"
        - name: "guidance_self_review_loop"
          purpose: "Agent self-review pattern for guidance quality"
        - name: "guidance_blind_test"
          purpose: "Blind testing pattern for guidance validation"

  usage:
    how_planners_use_components: |
      1. SELECT: Choose appropriate components for the orchestration need
      2. COMPOSE: Combine phase templates with reusable components
      3. CUSTOMIZE: Connect component entry/exit points to phase flow
      4. AVOID: Modifying agent-loops.yml or process.yml for new patterns

    when_to_create_new_components: |
      Create a new component when:
      - A pattern will be reused across multiple orchestrations
      - The pattern is self-contained with clear entry/exit points
      - The pattern represents a distinct orchestration behavior

      Do NOT create a new component when:
      - The pattern is a one-off customization
      - The pattern exists in an existing component (reuse instead)
      - The pattern belongs in agent-loops.yml (canonical loop types only)

    placement_decision:
      phase_templates: "Use for complete phase structures (Build, Test, UAT, etc.)"
      reusable_components: "Use for small patterns embeddable in any phase"
      agent_loops: "Use ONLY for canonical loop type definitions referenced by multiple agents"

  examples:
    composing_orchestration: |
      Planning a guidance validation phase:
      1. Start with teach_phase pattern as base structure
      2. Reference guidance_blind_test pattern for validation
      3. Add approval_gate pattern before publishing
      4. Connect component entry/exit points via TinyDB phase records
