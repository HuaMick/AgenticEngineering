# Build and Packaging Definition
# Consolidated from: build-artifacts.yml, packaging.yml (2026-01-16)
# Defines build output locations and packaging procedures

build_artifacts: |
  Build artifacts should always be placed in build-artifacts/ directory:
  - Wheels: build-artifacts/dist/*.whl
  - Source distributions: build-artifacts/dist/*.tar.gz
  - All build outputs should be git-ignored
  - Never commit build artifacts to version control

packaging: |
  Packaging involves creating distributable artifacts (wheels, source distributions).
  Key steps:
  - Build wheel files using uv build or setuptools
  - Verify package structure and metadata
  - Output artifacts to build-artifacts/ directory
  - Handle dependencies and versioning
  - Never commit build artifacts (ensure .gitignore excludes them)
