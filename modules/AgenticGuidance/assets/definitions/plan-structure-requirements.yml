# Plan Structure Requirements
# Extracted from plans.yml for reviewer validation
# Focus: structure validation, not lifecycle management
# Source: modules/AgenticGuidance/assets/definitions/plans.yml

required_fields:
  plan_level:
    - plan_name: "string - unique descriptive name"
    - worktree: "string - YYMMDDXX_description format (CLI-enforced)"
    - branch: "string - git branch name"
    - status: "enum - planning|active|partially_completed|fully_completed"
    - phases: "list - ordered phase definitions"

  phase_level:
    - phase_id: "string - unique identifier"
    - name: "string - human-readable name"
    - status: "enum - pending|in_progress|completed"
    - tasks: "list - ordered task definitions"

  task_level:
    - task_id: "string - unique identifier"
    - description: "string - actionable (starts with verb)"
    - status: "enum - pending|in_progress|completed|blocked"
    - success_criteria: "list - verifiable conditions"

folder_structure:
  root: docs/plans/

  live_plans:
    path: docs/plans/live/YYMMDDXX_description/
    naming: "YYMMDD + worktree ID (XX) + underscore + sanitized description"
    examples: ["260115AG_naming_audit", "260104CL_cli_feature"]
    cli_note: "Use 'agentic plan init' to create - naming is CLI-enforced"
    subfolders:
      live/: "Active phase files"
      completed/: "Finished work files"
      analysis/: "Iteration logs (optional)"
      audit/: "Audit reports (optional)"

reserved_files:
  live_subfolder:
    - "plan_live_*.yml - Phase definition files"
    - "plan_next_actions.yml - Active tracking file"
  completed_subfolder:
    - "plan_completed.yml - Summary index"

validation_checklist:
  structure:
    - "All required_fields present at each level"
    - "Phase/task IDs unique within their scope"
    - "Status values match valid enum options"
  naming:
    - "Folder matches YYMMDDXX_description pattern (regex: ^\\d{6}[A-Z]{2}_[a-z0-9_]+$)"
    - "Phase files in live/ or completed/ subfolder"
    - "Naming validated by CLI during plan init (do not validate manually)"
  quality:
    - "Success criteria are specific and verifiable"
    - "Task descriptions start with action verb"
    - "Phase ordering reflects dependencies"

fence: "Agents must NEVER modify docs/plans/archived/"
