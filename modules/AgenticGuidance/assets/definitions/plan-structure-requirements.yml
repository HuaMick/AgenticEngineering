# Plan Structure Requirements
# Extracted from plans.yml for reviewer validation
# Focus: structure validation, not lifecycle management

folder_structure:
  root: docs/plans/

  live_plans:
    path: docs/plans/live/YYMMDDRepo_Branch/
    naming: "YYMMDD + Repo initials + underscore + branch name"
    examples:
      - "251122MA_main"
      - "251211MA_custom_agents"
    subfolders:
      live/: "Active phase files (in progress or pending)"
      completed/: "Finished work files (done, verified)"
      analysis/: "Iteration logs and analysis artifacts (optional)"
      audit/: "Audit reports and findings (optional)"

  backlog_plans:
    path: docs/plans/backlog/
    pattern: "backlog_*.yml"
    categories: [cicd, core, maintenance, testing]

  completed_plans:
    path: docs/plans/completed/
    pattern: "YYMMDD_<worktree>.yml"

reserved_files:
  live_subfolder:
    - pattern: "plan_live_*.yml"
      purpose: "Phase definition files"
    - pattern: "plan_next_actions.yml"
      purpose: "Active tracking file"

  completed_subfolder:
    - pattern: "plan_completed.yml"
      purpose: "Summary index of completed items"

  analysis_subfolder:
    - pattern: "plan_iteration_*.yml"
      purpose: "Iteration logs"

validation_rules:
  - "Folder name must match YYMMDD[Repo]_[Branch] pattern"
  - "Phase plans must be in live/ or completed/ subfolder"
  - "Files determine status by LOCATION not name"
  - "Agents must NEVER modify docs/plans/archived/"
