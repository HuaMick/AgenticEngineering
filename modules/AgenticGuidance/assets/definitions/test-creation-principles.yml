test_creation_principles: |
  When creating tests, test-builder agents must follow these principles:

  1. Evidence-based validation:
     - Verify actual outcomes, not just success flags
     - Check file contents, not just existence
     - Validate user-facing behavior, not implementation details
     - Include concrete assertions about what was produced

  2. Avoid reward hacking patterns:
     - Don't mock the behavior being tested
     - Don't use overly permissive assertions (e.g., len(output) > 0)
     - Include negative test cases
     - Don't check --help text only, validate functional behavior
     - Test actual outcomes, not just return codes

  3. Follow test structure:
     - Use 1 package per workflow organization
     - Place tests in tests/workflows/<workflow_name>/
     - Create self-contained test packages with own fixtures
     - Follow naming conventions (agent_ prefix for agent workflows)
     - Mirror lib/ structure for Flutter tests

  4. Write maintainable tests:
     - Clear test names describing what is being validated
     - Minimal viable test coverage (don't over-test)
     - Tests should be independent and not rely on execution order
     - Tests should validate one behavior per test case
     - Use appropriate test granularity (unit, integration, e2e)

  5. Test real behavior:
     - Use real dependencies where practical, not mocks
     - Validate integration points between components
     - Test error handling and edge cases
     - Ensure tests would fail if the feature was removed
