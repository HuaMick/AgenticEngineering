preserved_files: |
  CRITICAL: The following files must NEVER be removed or modified by the cleaner agent.
  These are essential for CI/CD, reproducible builds, and project infrastructure:

  Lock files (reproducible builds):
  - uv.lock - Python dependency lock file (required by Dockerfile.test)
  - poetry.lock - Alternative Python lock file
  - package-lock.json / yarn.lock - Node.js lock files

  Configuration files:
  - pyproject.toml - Python project configuration
  - setup.py / setup.cfg - Legacy Python config
  - package.json - Node.js project configuration
  - .gitignore / .dockerignore - Ignore configurations

  CI/CD infrastructure:
  - Dockerfile* - Docker build configurations
  - docker-compose*.yml - Docker compose configurations
  - cloudbuild.yaml - Google Cloud Build configuration
  - .github/workflows/*.yml - GitHub Actions

  Documentation required by builds:
  - README.md - Often required in Docker build context

  Reference: docs/CICD_README.md for CI/CD pipeline details.
