context-minimisation: |
  The principle of providing only the essential information required for an agent or process to complete its specific task.
  Context is considered "minimal" when removing any part of it would prevent the task from being completed successfully.

  Justification:
  - More context creates noise and dilutes the model's attention.
  - Excessive context leads to decision paralysis and slower execution.
  - Large context windows increase token costs and potential for hallucination.
  - Precise context boundaries enable better parallel execution.

  Related: path.yml, fence.yml
