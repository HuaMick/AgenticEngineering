readme-as-context: |
  A design pattern where README.md files serve dual purposes:
  1. Human-readable documentation for developers
  2. Injectable context for agent prompts

  Why this pattern is useful:
  - Reduces duplication: Single source of truth for both humans and agents
  - Keeps documentation in sync: When README is updated, agent context updates automatically
  - Leverages existing conventions: Developers already maintain READMEs
  - Improves discoverability: Standard location for project understanding

  When to use README vs dedicated context files:
  - Use README.md for: General project overview, setup instructions, usage examples,
    architecture explanations, and information useful to both humans and agents
  - Use dedicated context files (inputs.yml, definitions.yml) for:
    Agent-specific structured data, machine-parseable configurations,
    information only relevant to automated processes

  Decision guide:
  - README: "Would a human developer find this useful?" -> Yes -> README
  - inputs.yml: "Is this a list of files/paths the agent needs?" -> Yes -> inputs.yml
  - definitions.yml: "Is this a reusable concept definition?" -> Yes -> definitions.yml
  - manifest.yml: "Is this project-specific folder structure?" -> Yes -> manifest.yml

  Related: agent-context-files.yml, plan-inputs.yml, guidance-artifacts.yml

readme-structure-for-agents: |
  Structure READMEs for effective agent consumption:

  Clear headings:
  - Use consistent heading hierarchy (# > ## > ###)
  - Make section titles descriptive and scannable
  - Agents use headings to navigate to relevant sections

  Structured content:
  - Use bullet points for lists of items
  - Use numbered lists for sequential steps
  - Use code blocks for commands, paths, and examples
  - Keep paragraphs focused on single concepts

  Key sections for agent context:
  - Purpose/Overview: What this module/project does
  - Structure: Directory layout and key files
  - Usage: How to run, test, or interact with the component
  - Dependencies: What this component requires
  - Outputs: What this component produces

  Avoid in READMEs meant for agent consumption:
  - Excessive marketing language or promotional content
  - Long historical narratives without current relevance
  - Deeply nested structures that obscure key information
  - Ambiguous language that requires human judgment to interpret

readme-manifest-relationship: |
  How README and manifest files relate:

  README.md provides narrative context:
  - What the project/module does and why
  - How components relate conceptually
  - Human-readable explanations and examples

  manifest.yml provides structural context:
  - Concrete file paths and directory locations
  - Machine-parseable folder structure
  - Project-specific path mappings

  Together they form complete context:
  - README explains "what and why"
  - Manifest specifies "where exactly"
  - Agent reads both: README for understanding, manifest for navigation

  Pattern: When updating README structure sections, verify manifest.yml reflects
  the same folder organization. When paths change in manifest, update README
  structure descriptions.

  Example relationship:
  ```
  # README.md
  ## Project Structure
  - `agents/` - Agent definitions and processes
  - `assets/` - Shared definitions and inputs

  # manifest.yml
  folders:
    agents: agents/
    assets: assets/
  ```

  Anti-pattern: Duplicating exact paths in both files. README should describe
  structure conceptually; manifest provides exact paths for programmatic access.

when-not-to-use-readme: |
  Cases where README is NOT the right context source:

  Structured agent inputs:
  - File lists with metadata -> use inputs.yml
  - Success criteria -> use process.yml steps or success_criteria section

  Reusable definitions:
  - Concept definitions used across agents -> use definitions.yml
  - Project-agnostic principles -> use guidelines.yml

  Sensitive information:
  - API keys, credentials -> never in README or context files
  - Environment-specific paths -> use manifest.yml with substitution

  Ephemeral state:
  - Current task status -> use plan files
  - In-progress work -> use tracking mechanisms, not README

  The test: "Would updating this README section require updating agent process files?"
  If yes, the information should be in a dedicated context file that both reference.
