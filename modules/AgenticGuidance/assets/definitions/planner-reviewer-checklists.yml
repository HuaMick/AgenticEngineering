# Planner-Reviewer Checklists
# Externalized from process.yml for single-source-of-truth
# Referenced by: modules/AgenticGuidance/agents/planner/planner-reviewer/process.yml

checklists:
  epic_structure:
    description: "Epic has valid root structure"
    items:
      - "Epic has unique name at root level (epic_name field)"
      - "Epic folder follows YYMMDDXX_description naming (CLI-enforced)"
      - "Epic objective clearly states what will be improved"
      - "Epic files (ticket_*.yml) are at folder root, NOT in subdirectories"
      - "No ticket_live_ prefix in filenames (use ticket_*.yml, not ticket_live_*.yml)"
      - "No nested live/, completed/, analysis/, or audit/ folders containing epic files"
    notes:
      - "Epic folder naming is enforced by 'agentic epic init' - trust CLI enforcement"
      - "Flat structure is enforced by CLI - nested epic files cause auto-archival failures"
      - "Optional subfolders (reference/, analysis/, audit/) are for artifacts only, NOT epic files"

  inputs:
    description: "Plan inputs are properly defined"
    items:
      - "Context references are at file-level or directory-level"
      - "Each input has location and description fields"
      - "Referenced files exist in the repository"

  success_criteria:
    description: "Success criteria are verifiable"
    items:
      - "Each phase has measurable success criteria"
      - "Success criteria include user-focused validation"
      - "Technical validation criteria are verifiable"
      - "Criteria define observable outcomes, not implementation details"

  ticket_structure:
    description: "Tickets are well-defined"
    items:
      - "Each ticket specifies exact target file(s) to edit"
      - "Agent types are correctly allocated by category"
      - "Operations are properly ordered (CREATE before UPDATE)"
      - "Each ticket has concrete acceptance criteria"

  pattern_alignment:
    description: "Epic follows established patterns"
    items:
      - "Tickets follow Domain -> Workflow -> Entrypoint patterns where applicable"
      - "Phase dependencies are explicitly declared"
      - "All mandatory loops included (audit-test-fix after cleanup, etc.)"

  loop_structure:
    description: "Epic includes appropriate loops for iteration"
    items:
      - "loop_structure section exists for non-trivial epics"
      - "Loop type matches phase type (per phase_to_loop_mapping)"
      - "Exit criteria are explicit and verifiable"
      - "Max iterations specified with escalation path"
    rejection_condition:
      condition: "Non-trivial epic missing loop_structure"
      message: "Epic must include loop_structure. See loop-inclusion-for-planners.yml"

  # Context quality checklist (SSR-004)
  # Note: Token-based thresholds removed - context quality measured by relevance, not size
  context_quality:
    description: "Epic inputs follow context quality principles"
    items:
      - "No inline definitions that duplicate shared assets"
      - "No duplicate definitions across inputs.yml files"
      - "Layer references use transitive loading (not flat duplication)"
      - "File references resolve to existing targets"
    reference: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"

fences:
  rlm_usage:
    description: "RLM usage validation (only when plan references RLM patterns)"
    trigger_conditions:
      - "Plan references rlm-patterns.yml or rlm-context-accessor.yml"
      - "Plan includes RLM variables (CONTEXT_, ACCUMULATOR_, FILTER_, FINAL_)"
    checklist:
      - "RLM trigger conditions were met (context >1000 lines OR >10 files)"
      - "Recursion depth is bounded (max_recursion_depth <= 5, prefer <= 3)"
      - "Variable naming follows conventions"
      - "Context accessor calls reference valid patterns"
      - "FINAL() signal is called only at top level"
    rejection_conditions:
      unjustified_usage:
        condition: "Context <500 lines total"
        message: "RLM overhead unjustified. Context size below 500-line threshold."
      excessive_depth:
        condition: "max_recursion_depth > 5"
        message: "Recursion depth exceeds maximum of 5."
      missing_final:
        condition: "Uses accumulators but lacks FINAL() signal"
        message: "Plan uses RLM accumulators but missing FINAL() signal."
    skip_condition: "If plan does not reference RLM patterns, skip entirely"

  mmd_presence:
    description: "MMD file validation for orchestrated epics"
    checklist:
      - "orchestration_*.mmd file exists in live/ folder"
      - "MMD contains GOAL header comment"
      - "MMD contains AGENT_ROUTING header comment or metadata"
      - "MMD contains PHASES list"
    rejection_condition:
      condition: "orchestration_*.mmd missing from epic folder"
      message: "Missing orchestration MMD. Return to orchestration-planning."
    exception: "Single-ticket epics (1 phase with 1 ticket) may be approved without MMD"

  file_placement:
    description: "Epic folder contains only properly placed files (BLOCKING)"
    allowed_at_root:
      - "ticket_*.yml files (NOT ticket_live_*.yml - outdated naming)"
      - "orchestration_*.mmd files"
      - "README.md"
    allowed_in_subfolders:
      - "reference/: Reference materials"
      - "analysis/: Analysis files, iteration logs (*.md, ticket_iteration_*.yml)"
      - "audit/: Audit reports (audit_*.yml)"
      - "completed/: Completed epic snapshots (optional subfolder)"
    forbidden:
      - "ticket_*.yml files in nested live/, completed/, analysis/, or audit/ subfolders"
      - "ticket_live_*.yml naming (outdated - use ticket_*.yml)"
      - "Nested live/ subfolder containing epic files"
      - "Analysis/documentation files at root (*.md except README.md) -> analysis/"
      - "Audit reports at root (audit_*.yml) -> audit/"
    rejection_note: "File placement issues ARE blocking issues - flat structure is required for CLI compatibility"

  codebase_verification:
    description: "Verify live/ files reflect codebase reality (BLOCKING)"
    epic_file_checks:
      - "Do target_files referenced in tickets still exist?"
      - "Have any pending tickets already been implemented?"
      - "If >50% pending tickets done, FLAG: stale tickets"
    analysis_file_checks:
      - "Classify as: IMPLEMENTED, PARTIALLY_IMPLEMENTED, NOT_IMPLEMENTED"
      - "PARTIALLY_IMPLEMENTED: FLAG incomplete work"
      - "NOT_IMPLEMENTED: FLAG should be live epic"
    rlm_extension:
      - "Referenced context accessor patterns exist"
      - "Variable naming follows documented conventions"
      - "Accumulator schemas are valid JSON Schema"
      - "RLM phases have bounded iteration counts"

  # Self-review validation fence (SSR-004)
  # BLOCKING: Must pass before epic approval
  self_review_validation:
    description: "Validate epic inputs against self-review criteria (BLOCKING)"
    trigger: "All epic reviews"
    blocking: true
    items:
      - "Epic inputs do not duplicate content from referenced assets"
      - "All file references validated and resolve to existing files"
      - "Version numbers aligned across agent files"
      - "No deprecated patterns without migration notes"
    rejection_condition:
      condition: "ANY item fails validation"
      message: "Self-review validation failed. Fix issues before approval."
    historical_note: |
      This fence addresses FF-003 (78% flag rate on spot-checks, 14+ iterations).
      Lenient assessments caused by imprecise criteria. PASS requires ALL items met.
    reference: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"
