Epics are living documents that help agents track the current state of the project.

# Naming Convention
naming_convention:
  pattern: "YYMMDDXX_description"
  regex: "^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
  examples:
    - "260115AG_naming_convention_audit"
    - "260104CL_agentic_cli_feature"
  components:
    YYMMDD: "Date of creation (year/month/day)"
    XX: "2 uppercase letters (e.g., derived from branch name or epic type)"
    description: "Sanitized description (lowercase, underscores only, max 50 chars)"
  cli_enforcement: |
    Use 'agentic epic new <branch> --description <desc>' to generate names automatically.
    The CLI enforces this convention programmatically - agents should NOT attempt manual naming.

There are 3 types of epics:
- epics_live: Live epics in docs/epics/live/YYMMDDXX_description/ folders (e.g., 260115AG_naming_audit).
  See naming_convention above for pattern details.
  Use 'agentic epic new' command to create - CLI enforces naming programmatically.

  FLAT STRUCTURE REQUIREMENT:
  Epic folders contain only epic.md and optional reference materials.
  Tickets, phases, and status are stored in TinyDB, NOT as files on disk.
  Do NOT create live/ or completed/ subdirectories within epic folders.

  Standard folder structure:
    YYMMDDXX_description/
    ├── epic.md                # Epic description and context
    └── reference/             # Optional: reference materials

  Optional subfolders for artifacts (NOT for epic files):
  - reference/: Reference materials and research (optional)
  - analysis/: Iteration logs and analysis artifacts (optional)
  - audit/: Audit reports and findings (optional)

  Note: Additional folders (design-specs/, etc.) can be used for agent artifacts
  (e.g., .md analysis files) to avoid polluting the project root.
  This structure reduces context window usage and keeps implementation artifacts organized.

- epics_backlog: Backlog epics organized by category in docs/epics/backlog/backlog_*.yml.
  Files include backlog_cicd.yml, backlog_core.yml, backlog_maintenance.yml, backlog_testing.yml.
  Contains all future epics organized by category. Items are moved from the backlog to the appropriate live epic.

- epics_completed: Completed epics in docs/epics/completed/YYMMDDXX_description/.
  Each epic folder is copied (not moved) when fully completed. Completed epics should be minimised.
  Implementation details should be moved to README or be discoverable from the codebase.

# CLI Epic Command Usage
cli_usage:
  path_requirements:
    description: |
      Epic commands accept full paths or short names. The CLI supports
      short-name resolution: partial folder names are matched against
      docs/epics/live/ using prefix matching (startswith).

      Resolution order:
      1. If path exists as-is (full or relative path), use it directly
      2. If not found, search docs/epics/live/ for exact folder name match
      3. If no exact match, find folders starting with the given prefix
      4. If multiple prefix matches, first alphabetically is used
    correct_usage:
      - "agentic epic ticket complete build_01 --epic docs/epics/live/260128AG_example"
      - "agentic epic ticket complete build_01 --epic 260128AG_example"
      - "agentic epic ticket complete build_01 --epic 260128AG"
      - "agentic epic status --epic docs/epics/live/260128AG_example"
    short_name_examples:
      - input: "260128AG"
        resolves_to: "docs/epics/live/260128AG_example"
        note: "Prefix match against folder names in docs/epics/live/"
      - input: "260128AG_example"
        resolves_to: "docs/epics/live/260128AG_example"
        note: "Exact folder name match"

  archival_commands:
    archive:
      command: "agentic epic archive <epic_path>"
      behavior: |
        Copies the epic folder from live/ to completed/.
        IMPORTANT: Does NOT remove the source folder from live/.
        Manual cleanup of the live/ folder may be needed if desired.
      example: "agentic epic archive docs/epics/live/260128AG_example"

    unarchive:
      note: "No CLI command exists for unarchiving."
      manual_procedure: |
        To unarchive an epic manually:
        1. Move the folder from docs/epics/completed/<name>/ back to docs/epics/live/<name>/
        2. Update the epic status in TinyDB if needed (via agentic epic ticket update)
      example: "mv docs/epics/completed/260128AG_example docs/epics/live/260128AG_example"

  auto_archival:
    description: |
      When marking the last ticket in an epic as completed, the CLI automatically
      triggers archival to docs/epics/completed/. This can be suppressed.
    trigger: "All tickets in TinyDB have status: completed"
    suppress_flag: "--no-archive"
    example: "agentic epic ticket complete final_ticket_01 --epic docs/epics/live/260128AG_example --no-archive"
    notes:
      - "Auto-archival copies but does not remove source folder"
      - "Ticket update succeeds even if auto-archive fails"

  known_limitations:
    - "Archive command copies but does not remove source folder"
    - "Ticket move does not remove from source file (copy-not-move pattern)"

  # ==============================================
  # FENCE: CLI-ONLY EPIC OPERATIONS
  # ==============================================
  cli_only_fence:
    description: |
      FENCE: All epic status updates and archival MUST use CLI commands.
      Manual file operations bypass data consistency checks and auto-archival.
    prohibited_operations:
      bash_commands:
        - "rm docs/epics/live/<folder>"
        - "rm -rf docs/epics/live/<folder>"
        - "mv docs/epics/live/<folder> docs/epics/completed/"
        - "cp -r docs/epics/live/<folder> docs/epics/completed/"
      edit_operations:
        - "Edit tool to modify status: field in epic YAML files"
        - "Direct manipulation of ticket status values outside CLI"
    required_alternatives:
      ticket_status:
        instead_of: "Edit tool on status: field"
        use: "agentic epic ticket start/complete <ticket_id> --epic <folder>"
      epic_archival:
        instead_of: "mv or cp commands"
        use: "agentic epic archive <folder> (or let auto-archive handle it)"
      epic_cleanup:
        instead_of: "rm commands"
        use: "Manual cleanup is user-only operation after archival"
    auto_archival_behavior: |
      When `agentic epic ticket complete` marks the last ticket as completed,
      the CLI automatically:
      1. Copies the epic folder to docs/epics/completed/
      2. Preserves the live/ copy for potential follow-on work
      3. Logs the archival action

      Use --no-archive flag ONLY if follow-on work is planned.

epic_lifecycle:
  Four distinct stages govern how epics move through their lifecycle:

  1. planning:
     - Epic is being developed
     - Initial phases and tickets are being defined
     - Folder exists in docs/epics/live/

  2. active:
     - Epic execution is in progress
     - One or more phases are being worked on
     - Folder exists in docs/epics/live/
     - Phases and tickets tracked in TinyDB

  3. partially_completed:
     - Some phases completed, follow-on work continues
     - Folder exists in BOTH docs/epics/live/ AND docs/epics/completed/
     - completed/ copy in docs/epics/completed/ contains snapshot of finished phases
     - live/ copy in docs/epics/live/ contains ongoing work

  4. fully_completed:
     - All phases done, no active work remaining
     - Folder copied to docs/epics/completed/
     - May or may not remain in docs/epics/live/ (user decision)

file_taxonomy:
  Epic folders contain epic.md and optional reference materials.
  All ticket and phase data is stored in TinyDB, NOT as files on disk.

  Correct structure:
    YYMMDDXX_description/
    ├── epic.md                # Epic description and context
    └── reference/             # Optional subfolder for reference materials

  WRONG structure (do NOT use):
    YYMMDDXX_description/
    ├── ticket_*.yml           # WRONG: tickets are in TinyDB
    ├── live/
    │   └── ticket_*.yml       # WRONG: nested files
    └── completed/
        └── ticket_*.yml       # WRONG: nested files

  Optional subfolders (for artifacts only, NOT for epic files):
    - reference/: Reference materials and research
    - analysis/: Iteration logs and analysis artifacts (ticket_iteration_*.yml, .md documents)
    - audit/: Audit reports and findings

  # ==============================================
  # FENCE: FLAT STRUCTURE ENFORCEMENT
  # ==============================================
  flat_structure_fence:
    description: |
      FENCE: Epic folders contain only epic.md and optional reference materials.
      Tickets and phases are in TinyDB. Do NOT create ticket files on disk.
      NEVER create nested live/, completed/, analysis/, or audit/ subdirectories for epic files.

    prohibited_patterns:
      - "docs/epics/live/YYMMDDXX_description/live/ticket_*.yml"
      - "docs/epics/live/YYMMDDXX_description/completed/ticket_*.yml"
      - "ticket_live_*.yml" (outdated naming)
      - "ticket_*.yml files on disk" (tickets are in TinyDB)

    correct_patterns:
      - "docs/epics/live/YYMMDDXX_description/epic.md"
      - "Tickets and phases stored in TinyDB at ~/.agentic/epics.db"

    cli_enforcement: |
      The CLI creates epic folders with flat structure via 'agentic epic new'.
      CLI commands expect epic files at folder root, NOT in subdirectories.
      Nested structure will cause CLI errors and auto-archival failures.

    migration_note: |
      Legacy epics may have had nested live/ folders or ticket files on disk.
      These patterns are ELIMINATED. All tickets and phases are in TinyDB.
      Epic folders contain only epic.md and optional reference materials.

    rationale: |
      Flat structure ensures:
      - CLI compatibility (commands locate files correctly)
      - Auto-archival works (scans folder root for epic files)
      - Consistency across all epics
      - Reduced confusion about file locations

scrap_file_taxonomy:
  description: "Transient artifacts from planning loops with different lifecycle than phase epics"

  audit_files:
    pattern: "audit_*.yml"
    purpose: "Issue identification reports from audit loops"
    lifecycle: "Move to audit/ subfolder after remediation plan is APPROVED"
    retention: "Archive for historical reference, do not delete"

  review_files:
    pattern: "review_*.yml"
    purpose: "Epic approval/rejection decisions from advisory validation"
    lifecycle: "Move to analysis/ subfolder after decision is processed"
    retention: "Archive for decision audit trail, do not delete"

  remediation_plans:
    description: "Remediation tickets are added to TinyDB via CLI, not as files on disk"
    lifecycle: "Merge approved tickets into TinyDB phase records, then mark complete"
    retention: "Tickets preserved in TinyDB; no file artifacts to clean up"

two_level_completion_pattern:
  Epics use a two-level completion model: ticket-level status updates and folder-level copy.

  Note: This pattern refers to docs/epics/live/ and docs/epics/completed/ directories,
  NOT to subdirectories within epic folders. Epic files remain in their folder root.

  NOTE ON SCRAP FILES:
  Transient artifacts (audit_*.yml, review_*.yml) in epic folders have different lifecycle:
  - They MOVE to analysis/ or audit/ subfolders after processing
  - Cleanup is triggered by APPROVAL, not by completion of all items
  - These are optional reference artifacts, NOT ticket/phase data (which is in TinyDB)

  TICKET-LEVEL COMPLETION:
  Tickets are marked completed via CLI commands that update TinyDB.
  Status updates happen in TinyDB, not in files on disk.

  INCREMENTAL COMPLETION (partial epic completion):
  - Epic folder remains in docs/epics/live/ while any tickets are pending/in-progress
  - Update ticket statuses via `agentic epic ticket complete` CLI command

  FULL COMPLETION (all tickets done):
  - When ALL tickets in TinyDB have status: completed
  - Copy entire folder to docs/epics/completed/
  - Original may remain in docs/epics/live/ for follow-on work
  Example:
    agentic epic move folder --epic <epic_folder>  # Copy to completed
    docs/epics/completed/260115AG_example/         # Archived version

  REACTIVATION (issues found post-completion):
  - Update epic files in docs/epics/live/ copy
  - Update affected tickets' status to reflect the issue
  - docs/epics/completed/ copy remains as historical record

  FOLDER-LEVEL COMPLETION (COPY-NOT-MOVE pattern):
  - When ALL tickets in an epic folder are completed (status: 'fully_completed')
  - The ENTIRE epic folder is COPIED (not moved) to docs/epics/completed/
    Command: agentic epic move folder --epic <epic_folder>
  - The original docs/epics/live/ folder remains in place to support follow-on work
  - Only users manually move old epic folders from live/ to an archived/ subdirectory

  Why this pattern works:
  - Agents can add missed items to files in docs/epics/live/ without disrupting completed/ archive
  - Completed tickets are preserved even while work continues
  - Reactivation is clean: update docs/epics/live/ copy, sync to completed later

follow_on_work_pattern:
  DO:
  - Keep the existing folder in docs/epics/live/ for follow-on work
  - Add new phases and tickets via CLI commands (stored in TinyDB)
  - Reference the original work in metadata (e.g., original_epic_date, previous_phases)
  - Copy the folder to docs/epics/completed/ when initial phases complete
  - Update the docs/epics/completed/ copy when new phases complete

  DON'T:
  - Create a new folder for related follow-on work (reuse the existing folder)
  - Move the folder out of docs/epics/live/ while work continues
  - Archive the folder without explicit user confirmation
  - Create live/ or completed/ subdirectories within epic folders

archived_vs_completed:
  Critical distinction between completed and archived storage:

  completed/:
  - Location: docs/epics/completed/
  - Purpose: Snapshot of completed work
  - May have an active counterpart in docs/epics/live/
  - Updated when new phases of the same epic complete
  - Accessible for reference and follow-on planning

  archived/:
  - Location: docs/epics/archived/
  - Purpose: Historical storage for epics 6+ months old
  - No active counterpart in docs/epics/live/
  - Infrequently accessed

  FENCE: Agents must NEVER move, copy, or modify folders to or within docs/epics/archived/.
  Only users may perform archival operations.

phase_types:
  description: |
    Standard phase types used in orchestration planning. These determine which
    planner agents to use and how phases are ordered in execution.

  types:
    teach:
      purpose: "Guidance, process, or documentation improvements"
      planner: "planner-build"
      executor: "teacher-update-guidance, teacher-update-assets"
      order_priority: 1

    build:
      purpose: "Code implementation or feature development"
      planner: "planner-build"
      executor: "build-python, build-flutter"
      order_priority: 2

    test:
      purpose: "Test strategy and validation tickets"
      planner: "planner-test"
      executor: "test-builder, trace-explorer"
      order_priority: 3

    cleanup:
      purpose: "Code cleanup or removal tickets"
      planner: "planner-audit"
      executor: "build-python (cleanup operations)"
      order_priority: 4

    audit:
      purpose: "Epic folder compliance checks and file lifecycle validation"
      planner: "planner-audit"
      executor: "test-audit"
      order_priority: 5

    uat:
      purpose: "User acceptance testing - validates complete user journeys"
      planner: "planner-test (handles UAT as testing domain)"
      executor: "test-uat"
      order_priority: 6
      note: "PRIMARY SUCCESS CRITERIA - mandatory for build epics"

  execution_order: |
    Standard execution order: teach -> build -> test -> cleanup -> audit -> uat
    Note: Not all phases are required for every epic. Orchestration determines
    which phases are needed based on the objective.

  naming_convention: |
    Use lowercase in YAML files (e.g., "teach", "build", "uat").
    Use Title Case in comments and documentation (e.g., "Teach Phase", "UAT Phase").
    Avoid uppercase abbreviations (e.g., "UAT" should be "uat" in code).

# Epic Structure Requirements (for pre-flight validation)
# Merged from plan-structure-requirements.yml
required_fields:
  epic_level:
    - epic_name: "string - unique descriptive name"
    - branch: "string - git branch name"
    - status: "enum - planning|active|partially_completed|fully_completed"
    - phases: "list - ordered phase definitions"

  phase_level:
    - phase_id: "string - unique identifier"
    - name: "string - human-readable name"
    - status: "enum - pending|in_progress|completed"
    - tickets: "list - ordered ticket definitions"

  ticket_level:
    - ticket_id: "string - unique identifier"
    - description: "string - actionable (starts with verb)"
    - status: "enum - pending|in_progress|completed|blocked"
    - success_criteria: "list - verifiable conditions"

validation_checklist:
  structure:
    - "All required_fields present at each level"
    - "Phase/ticket IDs unique within their scope"
    - "Status values match valid enum options"
    - "loop_structure present for non-trivial epics"
  naming:
    - "Folder matches YYMMDDXX_description pattern (see naming_convention.regex)"
    - "Phases and tickets stored in TinyDB, NOT as files on disk"
    - "Naming validated by CLI during epic init (do not validate manually)"
  quality:
    - "Success criteria are specific and verifiable"
    - "Ticket descriptions start with action verb"
    - "Phase ordering reflects dependencies"
    - "loop_structure exit_criteria are measurable"

# Loop Structure Requirements
# Defines how epics declare their execution loop patterns
# Reference: modules/AgenticGuidance/assets/definitions/agent-loops.yml
loop_structure:
  description: |
    Epics must declare their loop structure to enable planners to understand
    the iterative execution pattern, exit conditions, and participant roles.
    This ensures consistent loop handling across the planning system.

  requirement_level:
    non_trivial_epics: "REQUIRED - Any epic with multiple phases or agent coordination"
    single_ticket_epics: "OPTIONAL - Simple epics may omit if no iteration needed"
    trivial_threshold: |
      An epic is considered trivial if:
      - Single phase with 3 or fewer tickets
      - No agent coordination required
      - No iteration or feedback loops
      All other epics MUST include loop_structure.

  schema:
    type:
      required: true
      description: "Loop type from agent-loops.yml"
      valid_values:
        - "test-fix-loop"
        - "audit-test-fix-loop"
        - "cleaner-dependency-loop"
        - "documentation-loop"
        - "user-story-validation-loop"
        - "exploration-loop"
        - "rlm-decomposition-loop"
        - "rlm-context-refinement-loop"
        - "planner-loop"
        - "guidance-test-loop"
        - "agent-self-review"
        - "guidance-self-review-loop"
      reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types"

    trigger:
      required: true
      description: "Condition that starts the loop execution"
      examples:
        - "Phase enters 'in_progress' status"
        - "All prerequisite phases completed"
        - "User approves epic for execution"
        - "Test failures detected in previous iteration"

    exit_criteria:
      required: true
      description: "Conditions that terminate the loop"
      sub_fields:
        success:
          required: true
          description: "Condition for successful loop completion"
          examples:
            - "All tests pass with zero failures"
            - "Reviewer approves epic structure"
            - "No guidance gaps identified"
            - "All user stories validated"
        max_iterations:
          required: true
          type: "integer"
          description: "Maximum iterations before escalation"
          constraints:
            minimum: 1
            maximum: 10
            recommended: "Match agent-loops.yml maximum_iterations for loop type"
        escalation:
          required: true
          description: "Action when max_iterations reached without success"
          valid_values:
            - "escalate_to_human"
            - "escalate_with_partial_results"
            - "abort_with_rollback"
            - "continue_with_warning"

    participants:
      required: true
      description: "Agents involved in the loop with their roles"
      item_schema:
        agent:
          required: true
          description: "Agent name (from agents/ directory)"
        role:
          required: true
          description: "Agent's function in the loop"
          common_roles:
            - "executor"      # Performs primary action
            - "validator"     # Checks/validates output
            - "reviewer"      # Approves/rejects
            - "fixer"         # Addresses issues found
            - "observer"      # Monitors without modifying

  examples:
    build_epic_with_test_fix_loop:
      loop_structure:
        type: "test-fix-loop"
        trigger: "Build phase enters 'in_progress' status"
        exit_criteria:
          success: "All unit tests pass and coverage >= 80%"
          max_iterations: 5
          escalation: "escalate_to_human"
        participants:
          - agent: "build-python"
            role: "executor"
          - agent: "test-builder"
            role: "validator"
          - agent: "build-python"
            role: "fixer"

    guidance_epic_with_self_review:
      loop_structure:
        type: "guidance-self-review-loop"
        trigger: "Guidance files created or modified"
        exit_criteria:
          success: "All agents report NO ISSUES REMAINING"
          max_iterations: 3
          escalation: "escalate_with_partial_results"
        participants:
          - agent: "planner-build"
            role: "executor"
          - agent: "teacher-update-guidance"
            role: "fixer"

    cleanup_epic_with_dependency_check:
      loop_structure:
        type: "cleaner-dependency-loop"
        trigger: "Cleanup phase starts"
        exit_criteria:
          success: "All targets removed or documented as deferred"
          max_iterations: 3
          escalation: "escalate_to_human"
        participants:
          - agent: "cleaner"
            role: "executor"
          - agent: "explorer"
            role: "validator"
          - agent: "orchestrator"
            role: "reviewer"

    planner_review_loop:
      loop_structure:
        type: "planner-loop"
        trigger: "Epic creation initiated"
        exit_criteria:
          success: "Reviewer approves AND explore verification passes"
          max_iterations: 5
          escalation: "escalate_to_human"
        participants:
          - agent: "planner-build"
            role: "executor"
          - agent: "explorer"
            role: "validator"
          - agent: "orchestration-planning"
            role: "reviewer"

  validation_rules:
    - "type must reference valid loop from agent-loops.yml"
    - "max_iterations should not exceed loop type's maximum_iterations"
    - "participants must include at least one executor role"
    - "exit_criteria.success must be measurable/verifiable"
    - "escalation must be one of the valid_values"

concrete_example:
  # See: modules/AgenticGuidance/assets/guidelines/plan-completion.yml
  # Demonstrates the TinyDB + Archive pattern with epic lifecycle and state transitions.

# Path Conventions
# Merged from folder-structure.yml
path_conventions:
  repo_content:
    standard: "relative"
    description: |
      Use relative paths from repo root for all repo content.
      Examples:
        - 'modules/AgenticGuidance/assets/definitions/path.yml' (CORRECT)
        - 'modules/AgenticGuidance/agents/orchestration/process.yml' (CORRECT)
        - '/home/code/somerepo/assets/definitions/path.yml' (INCORRECT - absolute)
    rationale: "Relative paths are portable across environments and repositories"

  epic_folder_references:
    standard: "relative"
    description: |
      Epic folder paths are relative to project root.
      Agents receive specific folder paths as input from orchestration.

# Agent Logs (future - not yet systematically collected)
agent_logs:
  path: "docs/agent_logs/YYYYMMDD_<agent_name>"
  description: |
    Agent decision logs. Single line per decision or action taken.
    When available, logs should follow the pattern YYYYMMDD_<agent_name>.log
