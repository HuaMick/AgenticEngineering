Plans are living documents that help agents track the current state of the project.
Plans are organized by worktree to support parallel work across different branches.

# Naming Convention (for deploy-worktree and CLI reference)
naming_convention:
  pattern: "YYMMDDXX_description"
  regex: "^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
  examples:
    - "260115AG_naming_convention_audit"
    - "260104CL_agentic_cli_feature"
  components:
    YYMMDD: "Date of creation (year/month/day)"
    XX: "2 uppercase letters derived from worktree path suffix"
    description: "Sanitized description (lowercase, underscores only, max 50 chars)"
  cli_enforcement: |
    Use 'agentic plan init <branch> --description <desc>' to generate names automatically.
    The CLI enforces this convention programmatically - agents should NOT attempt manual naming.
  worktree_id_derivation: |
    XX is derived from the worktree path suffix after the last hyphen:
    - /home/code/AgenticEngineering-agenticguidance -> AG
    - /home/code/MyProject-feature -> FE
    - /home/code/Repo-cli -> CL

There are 3 types of plans:
- plans_live: Live plans organized by worktree in docs/plans/live/YYMMDDXX_description/ folders (e.g., 260115AG_naming_audit).
  See naming_convention above for pattern details.
  Use 'agentic plan init' command to create - CLI enforces naming programmatically.
  Common subfolders (planning agent determines appropriate structure based on plan complexity):
  - live/: Active phase files (recommended for multi-phase plans)
  - completed/: Completed items (recommended when tracking completion)
  - analysis/: Iteration logs and analysis artifacts (optional)
  - audit/: Audit reports and findings (optional)

  Note: Simple plans may have all files at root level. Complex plans benefit from subfolder
  organization. The planning agent determines the appropriate structure based on plan complexity.

  Additional folders (design-specs/, etc.) can be used as a "dumping ground" for agent artifacts
  (e.g., .md analysis files) to avoid polluting the project root or other shared spaces.
  Note: For staging and main branches, the plan name is omitted from the folder name. For other branches, a plan name may be appended (e.g., 251211MA_custom_agents).
  This structure reduces context window usage and keeps implementation artifacts organized.

- plans_backlog: Backlog plans organized by worktree/category in docs/plans/backlog/backlog_*.yml.
  Files include backlog_cicd.yml, backlog_core.yml, backlog_maintenance.yml, backlog_testing.yml.
  Contains all future plans organized by category. Items are moved from the backlog to the appropriate live plan.

- plans_completed: Completed plans organized by worktree in docs/plans/completed/YYMMDDXX_description/.
  Each plan folder is copied (not moved) when fully completed. Completed plans should be minimised.
  Implementation details should be moved to README or be discoverable from the codebase.

plan_lifecycle:
  Four distinct stages govern how plans move through their lifecycle:

  1. planning:
     - Plan is being developed
     - Initial phases and tasks are being defined
     - Folder exists in docs/plans/live/

  2. active:
     - Plan execution is in progress
     - One or more phases are being worked on
     - Folder exists in docs/plans/live/
     - Active phase files in live/ subfolder

  3. partially_completed:
     - Some phases completed, follow-on work continues
     - Folder exists in BOTH docs/plans/live/ AND docs/plans/completed/
     - completed/ folder contains snapshot of finished phases
     - live/ folder contains new phases for ongoing work

  4. fully_completed:
     - All phases done, no active work remaining
     - Folder copied to docs/plans/completed/
     - May or may not remain in docs/plans/live/ (user decision)

file_taxonomy:
  Agents can create ANY .yml files during planning/execution (no naming restrictions).
  The file's LOCATION determines its status, not its name:

  live/ subfolder:
    purpose: "Active work files (in progress or pending)"
    contains: "Any .yml files the agent creates during planning/execution"
    reserved_files:
      - plan_live_*.yml: "Phase definition files (stay in live/)"
      - plan_next_actions.yml: "Active tracking file (stays in live/)"

  completed/ subfolder:
    purpose: "Finished work files (done, verified)"
    contains: "Files moved from live/ when all their tasks are complete"
    reserved_files:
      - plan_completed.yml: "Summary index of completed items (stays in completed/)"

  analysis/ subfolder:
    purpose: "Iteration logs and analysis artifacts"
    contains: "plan_iteration_*.yml files and .md analysis documents"

scrap_file_taxonomy:
  description: "Transient artifacts from planning loops with different lifecycle than phase plans"

  audit_files:
    pattern: "audit_*.yml"
    purpose: "Issue identification reports from audit loops"
    lifecycle: "Move to audit/ subfolder after remediation plan is APPROVED"
    retention: "Archive for historical reference, do not delete"

  review_files:
    pattern: "review_*.yml"
    purpose: "Plan approval/rejection decisions from planner-reviewer"
    lifecycle: "Move to analysis/ subfolder after decision is processed"
    retention: "Archive for decision audit trail, do not delete"

  remediation_plans:
    pattern: "plan_*_remediation*.yml"
    purpose: "Intermediate fix plans generated from audits"
    lifecycle: "Merge approved tasks into authoritative phase plan, then delete from live/"
    retention: "Tasks preserved in phase plan; original file deleted (not archived)"

two_level_completion_pattern:
  Plans use a two-level completion model: item-level sync and folder-level copy.

  SCRAP FILE FENCE:
  The Copy-and-Sync pattern applies to PHASE PLANS (plan_live_*.yml).
  SCRAP FILES (audit_*.yml, review_*.yml, plan_*_remediation*.yml) have different rules:
  - They do NOT use Copy-and-Sync
  - They MOVE (not copy) to target subfolders after processing
  - remediation_plans are DELETED (not moved) after task merge
  - Cleanup is triggered by APPROVAL, not by completion of all items

  FILE-LEVEL COMPLETION (Copy-and-Sync pattern):
  Files stay in live/ while work continues. Completed items are synced to a copy in completed/.

  INCREMENTAL COMPLETION (partial file completion):
  - File remains in live/ while any items are pending/in-progress
  - Create/update a COPY in completed/ containing ONLY completed items
  - Both copies coexist: live/ has all items, completed/ has only done items
  Example:
    live/my_feature.yml         # 5 items: 3 completed, 2 pending
    completed/my_feature.yml    # 3 items: only the completed ones

  FULL COMPLETION (all items done):
  - When ALL items in a file have status: completed
  - Ensure completed/ copy has all items
  - DELETE the file from live/ (no longer needed)
  - File now exists ONLY in completed/
  Example:
    rm live/my_feature.yml      # All done, remove working copy
    completed/my_feature.yml    # Authoritative completed version

  REACTIVATION (issues found post-completion):
  - COPY file back from completed/ to live/
  - Update affected items' status to reflect the issue
  - Keep completed/ copy as historical record
  - Sync changes back to completed/ as items are re-completed

  FOLDER-LEVEL COMPLETION (COPY-NOT-MOVE pattern):
  - When ALL items in a plan folder are completed (status: 'fully_completed')
  - The ENTIRE plan folder is COPIED (not moved) to docs/plans/completed/
    Command: cp -r docs/plans/live/YYMMDDXX_description docs/plans/completed/
  - The original live/ folder remains in place to support follow-on work
  - The completed/ subfolder is preserved in both locations as the canonical archive
  - Only users manually move old plan folders from live/ to an archived/ subdirectory

  Why this pattern works:
  - Agents can add missed items to live/ files without disrupting completed/ archive
  - Completed items are preserved even while work continues
  - Clear deletion signal: file removed from live/ = fully done
  - Reactivation is clean: copy back, fix, sync

follow_on_work_pattern:
  DO:
  - Keep the existing folder in docs/plans/live/ for follow-on work
  - Add new plan files for new phases in the live/ subfolder
  - Reference the original work in metadata (e.g., original_plan_date, previous_phases)
  - Copy the folder to docs/plans/completed/ when initial phases complete
  - Update the docs/plans/completed/ copy when new phases complete

  DON'T:
  - Create a new folder for related follow-on work (reuse the existing folder)
  - Move the folder out of docs/plans/live/ while work continues
  - Archive the folder without explicit user confirmation

archived_vs_completed:
  Critical distinction between completed and archived storage:

  completed/:
  - Location: docs/plans/completed/
  - Purpose: Snapshot of completed work
  - May have an active counterpart in docs/plans/live/
  - Updated when new phases of the same plan complete
  - Accessible for reference and follow-on planning

  archived/:
  - Location: docs/plans/archived/
  - Purpose: Historical storage for plans 6+ months old
  - No active counterpart in docs/plans/live/
  - Infrequently accessed

  FENCE: Agents must NEVER move, copy, or modify folders to or within docs/plans/archived/.
  Only users may perform archival operations.

# Plan Structure Requirements (for planner-reviewer validation)
# Merged from plan-structure-requirements.yml
required_fields:
  plan_level:
    - plan_name: "string - unique descriptive name"
    - worktree: "string - YYMMDDXX_description format (CLI-enforced)"
    - branch: "string - git branch name"
    - status: "enum - planning|active|partially_completed|fully_completed"
    - phases: "list - ordered phase definitions"

  phase_level:
    - phase_id: "string - unique identifier"
    - name: "string - human-readable name"
    - status: "enum - pending|in_progress|completed"
    - tasks: "list - ordered task definitions"

  task_level:
    - task_id: "string - unique identifier"
    - description: "string - actionable (starts with verb)"
    - status: "enum - pending|in_progress|completed|blocked"
    - success_criteria: "list - verifiable conditions"

validation_checklist:
  structure:
    - "All required_fields present at each level"
    - "Phase/task IDs unique within their scope"
    - "Status values match valid enum options"
  naming:
    - "Folder matches YYMMDDXX_description pattern (see naming_convention.regex)"
    - "Phase files in live/ or completed/ subfolder"
    - "Naming validated by CLI during plan init (do not validate manually)"
  quality:
    - "Success criteria are specific and verifiable"
    - "Task descriptions start with action verb"
    - "Phase ordering reflects dependencies"

concrete_example:
  # See: modules/AgenticGuidance/assets/guidelines/plan-completion.yml
  # Demonstrates the Copy-and-Sync pattern with folder structure and state transitions.

# Path Conventions
# Merged from folder-structure.yml
path_conventions:
  repo_content:
    standard: "relative"
    description: |
      Use relative paths from repo root for all repo content.
      Examples:
        - 'modules/AgenticGuidance/assets/definitions/path.yml' (CORRECT)
        - 'modules/AgenticGuidance/agents/orchestration/process.mmd' (CORRECT)
        - '/home/code/somerepo/assets/definitions/path.yml' (INCORRECT - absolute)
    rationale: "Relative paths are portable across environments and repositories"

  plan_folder_references:
    standard: "relative"
    description: |
      Plan folder paths are relative to project root.
      Agents receive specific folder paths as input from orchestration.

# Agent Logs (future - not yet systematically collected)
agent_logs:
  path: "docs/agent_logs/YYYYMMDD_<agent_name>"
  description: |
    Agent decision logs. Single line per decision or action taken.
    When available, logs should follow the pattern YYYYMMDD_<agent_name>.log
