Plans are living documents that help agents track the current state of the project.

# Naming Convention
naming_convention:
  pattern: "YYMMDDXX_description"
  regex: "^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
  examples:
    - "260115AG_naming_convention_audit"
    - "260104CL_agentic_cli_feature"
  components:
    YYMMDD: "Date of creation (year/month/day)"
    XX: "2 uppercase letters (e.g., derived from branch name or plan type)"
    description: "Sanitized description (lowercase, underscores only, max 50 chars)"
  cli_enforcement: |
    Use 'agentic plan init <branch> --description <desc>' to generate names automatically.
    The CLI enforces this convention programmatically - agents should NOT attempt manual naming.

There are 3 types of plans:
- plans_live: Live plans in docs/plans/live/YYMMDDXX_description/ folders (e.g., 260115AG_naming_audit).
  See naming_convention above for pattern details.
  Use 'agentic plan init' command to create - CLI enforces naming programmatically.

  FLAT STRUCTURE REQUIREMENT:
  Plan files (plan_*.yml, orchestration_*.mmd, README.md) MUST be in the folder root.
  Do NOT create live/ or completed/ subdirectories within plan folders.

  Standard folder structure:
    YYMMDDXX_description/
    ├── README.md              # Plan overview and status
    ├── orchestration_*.mmd    # Process diagram(s)
    ├── plan_*.yml             # Phase files (directly in root)
    └── reference/             # Optional: reference materials

  Optional subfolders for artifacts (NOT for plan files):
  - reference/: Reference materials and research (optional)
  - analysis/: Iteration logs and analysis artifacts (optional)
  - audit/: Audit reports and findings (optional)

  Note: Additional folders (design-specs/, etc.) can be used for agent artifacts
  (e.g., .md analysis files) to avoid polluting the project root.
  This structure reduces context window usage and keeps implementation artifacts organized.

- plans_backlog: Backlog plans organized by category in docs/plans/backlog/backlog_*.yml.
  Files include backlog_cicd.yml, backlog_core.yml, backlog_maintenance.yml, backlog_testing.yml.
  Contains all future plans organized by category. Items are moved from the backlog to the appropriate live plan.

- plans_completed: Completed plans in docs/plans/completed/YYMMDDXX_description/.
  Each plan folder is copied (not moved) when fully completed. Completed plans should be minimised.
  Implementation details should be moved to README or be discoverable from the codebase.

# CLI Plan Command Usage
cli_usage:
  path_requirements:
    description: |
      Plan commands accept full paths or short names. The CLI supports
      short-name resolution: partial folder names are matched against
      docs/plans/live/ using prefix matching (startswith).

      Resolution order:
      1. If path exists as-is (full or relative path), use it directly
      2. If not found, search docs/plans/live/ for exact folder name match
      3. If no exact match, find folders starting with the given prefix
      4. If multiple prefix matches, first alphabetically is used
    correct_usage:
      - "agentic plan task complete build_01 --plan docs/plans/live/260128AG_example"
      - "agentic plan task complete build_01 --plan 260128AG_example"
      - "agentic plan task complete build_01 --plan 260128AG"
      - "agentic plan status --plan docs/plans/live/260128AG_example"
    short_name_examples:
      - input: "260128AG"
        resolves_to: "docs/plans/live/260128AG_example"
        note: "Prefix match against folder names in docs/plans/live/"
      - input: "260128AG_example"
        resolves_to: "docs/plans/live/260128AG_example"
        note: "Exact folder name match"

  archival_commands:
    archive:
      command: "agentic plan archive <plan_path>"
      behavior: |
        Copies the plan folder from live/ to completed/.
        IMPORTANT: Does NOT remove the source folder from live/.
        Manual cleanup of the live/ folder may be needed if desired.
      example: "agentic plan archive docs/plans/live/260128AG_example"

    unarchive:
      command: "agentic plan unarchive <plan_name>"
      behavior: |
        Moves a plan folder from completed/ back to live/.
        Useful when a plan was archived prematurely or needs to be resumed.
        Supports partial matching of folder names.
      example: "agentic plan unarchive 260128AG_example"
      notes:
        - "Will fail if destination already exists in live/"
        - "Prompts for confirmation unless --force is used"

  auto_archival:
    description: |
      When marking the last task in a plan as completed, the CLI automatically
      triggers archival to docs/plans/completed/. This can be suppressed.
    trigger: "All tasks in all plan_*.yml files have status: completed"
    suppress_flag: "--no-archive"
    example: "agentic plan task complete final_task_01 --plan docs/plans/live/260128AG_example --no-archive"
    notes:
      - "Auto-archival copies but does not remove source folder"
      - "Task update succeeds even if auto-archive fails"

  known_limitations:
    - "Archive command copies but does not remove source folder"
    - "Task move does not remove from source file (copy-not-move pattern)"

  # ==============================================
  # FENCE: CLI-ONLY PLAN OPERATIONS
  # ==============================================
  cli_only_fence:
    description: |
      FENCE: All plan status updates and archival MUST use CLI commands.
      Manual file operations bypass data consistency checks and auto-archival.
    prohibited_operations:
      bash_commands:
        - "rm docs/plans/live/<folder>"
        - "rm -rf docs/plans/live/<folder>"
        - "mv docs/plans/live/<folder> docs/plans/completed/"
        - "cp -r docs/plans/live/<folder> docs/plans/completed/"
      edit_operations:
        - "Edit tool to modify status: field in plan YAML files"
        - "Direct YAML manipulation of task status values"
    required_alternatives:
      task_status:
        instead_of: "Edit tool on status: field"
        use: "agentic plan task start/complete <task_id> --plan <folder>"
      plan_archival:
        instead_of: "mv or cp commands"
        use: "agentic plan archive <folder> (or let auto-archive handle it)"
      plan_cleanup:
        instead_of: "rm commands"
        use: "Manual cleanup is user-only operation after archival"
    auto_archival_behavior: |
      When `agentic plan task complete` marks the last task as completed,
      the CLI automatically:
      1. Copies the plan folder to docs/plans/completed/
      2. Preserves the live/ copy for potential follow-on work
      3. Logs the archival action

      Use --no-archive flag ONLY if follow-on work is planned.

plan_lifecycle:
  Four distinct stages govern how plans move through their lifecycle:

  1. planning:
     - Plan is being developed
     - Initial phases and tasks are being defined
     - Folder exists in docs/plans/live/

  2. active:
     - Plan execution is in progress
     - One or more phases are being worked on
     - Folder exists in docs/plans/live/
     - Phase files (plan_*.yml) are in folder root

  3. partially_completed:
     - Some phases completed, follow-on work continues
     - Folder exists in BOTH docs/plans/live/ AND docs/plans/completed/
     - completed/ copy in docs/plans/completed/ contains snapshot of finished phases
     - live/ copy in docs/plans/live/ contains ongoing work

  4. fully_completed:
     - All phases done, no active work remaining
     - Folder copied to docs/plans/completed/
     - May or may not remain in docs/plans/live/ (user decision)

file_taxonomy:
  CRITICAL: Plan files (plan_*.yml) MUST be in the plan folder root, NOT in subdirectories.

  Correct structure:
    YYMMDDXX_description/
    ├── README.md
    ├── orchestration_*.mmd
    ├── plan_build.yml       # <-- Directly in folder root
    ├── plan_teach.yml       # <-- Directly in folder root
    └── reference/           # Optional subfolder for reference materials

  WRONG structure (do NOT use):
    YYMMDDXX_description/
    ├── live/
    │   └── plan_*.yml       # WRONG: nested in subdirectory
    └── completed/
        └── plan_*.yml       # WRONG: nested in subdirectory

  File naming conventions:
    - plan_*.yml: Phase files (build, teach, test, audit, cleanup, uat)
    - orchestration_*.mmd: Process diagrams
    - README.md: Plan overview and status

  Optional subfolders (for artifacts only, NOT for plan files):
    - reference/: Reference materials and research
    - analysis/: Iteration logs and analysis artifacts (plan_iteration_*.yml, .md documents)
    - audit/: Audit reports and findings

  # ==============================================
  # FENCE: FLAT STRUCTURE ENFORCEMENT
  # ==============================================
  flat_structure_fence:
    description: |
      FENCE: Plan files (plan_*.yml, orchestration_*.mmd, README.md) MUST be at folder root.
      NEVER create nested live/, completed/, analysis/, or audit/ subdirectories for plan files.

    prohibited_patterns:
      - "docs/plans/live/YYMMDDXX_description/live/plan_*.yml"
      - "docs/plans/live/YYMMDDXX_description/completed/plan_*.yml"
      - "plan_live_*.yml" (outdated naming - use plan_*.yml)
      - "live/plan_build.yml" (nested - should be plan_build.yml at root)

    correct_patterns:
      - "docs/plans/live/YYMMDDXX_description/plan_build.yml"
      - "docs/plans/live/YYMMDDXX_description/plan_test.yml"
      - "docs/plans/live/YYMMDDXX_description/orchestration_*.mmd"

    cli_enforcement: |
      The CLI creates plan folders with flat structure via 'agentic plan init'.
      CLI commands expect plan files at folder root, NOT in subdirectories.
      Nested structure will cause CLI errors and auto-archival failures.

    migration_note: |
      Legacy plans may have nested live/ folders or plan_live_*.yml files.
      These are DEPRECATED and should be migrated to flat structure:
      1. Move plan_*.yml files from nested live/ to folder root
      2. Remove plan_live_ prefix from filenames
      3. Delete empty nested live/ directory
      4. Update README to reflect flat structure

    rationale: |
      Flat structure ensures:
      - CLI compatibility (commands locate files correctly)
      - Auto-archival works (scans folder root for plan files)
      - Consistency across all plans
      - Reduced confusion about file locations

scrap_file_taxonomy:
  description: "Transient artifacts from planning loops with different lifecycle than phase plans"

  audit_files:
    pattern: "audit_*.yml"
    purpose: "Issue identification reports from audit loops"
    lifecycle: "Move to audit/ subfolder after remediation plan is APPROVED"
    retention: "Archive for historical reference, do not delete"

  review_files:
    pattern: "review_*.yml"
    purpose: "Plan approval/rejection decisions from planner-reviewer"
    lifecycle: "Move to analysis/ subfolder after decision is processed"
    retention: "Archive for decision audit trail, do not delete"

  remediation_plans:
    pattern: "plan_*_remediation*.yml"
    purpose: "Intermediate fix plans generated from audits"
    lifecycle: "Merge approved tasks into authoritative phase plan, then delete from live/"
    retention: "Tasks preserved in phase plan; original file deleted (not archived)"

two_level_completion_pattern:
  Plans use a two-level completion model: task-level status updates and folder-level copy.

  Note: This pattern refers to docs/plans/live/ and docs/plans/completed/ directories,
  NOT to subdirectories within plan folders. Plan files remain in their folder root.

  SCRAP FILE FENCE:
  The Copy-and-Sync pattern applies to PHASE PLANS (plan_*.yml).
  SCRAP FILES (audit_*.yml, review_*.yml, plan_*_remediation*.yml) have different rules:
  - They do NOT use Copy-and-Sync
  - They MOVE to analysis/ or audit/ subfolders after processing
  - remediation_plans are DELETED (not moved) after task merge
  - Cleanup is triggered by APPROVAL, not by completion of all items

  TASK-LEVEL COMPLETION:
  Tasks are marked completed within their plan_*.yml files in the folder root.
  Status updates happen in-place within the plan files.

  INCREMENTAL COMPLETION (partial plan completion):
  - Plan folder remains in docs/plans/live/ while any tasks are pending/in-progress
  - Update task statuses within plan_*.yml files as work progresses
  Example:
    docs/plans/live/260115AG_example/
    ├── plan_build.yml    # 5 tasks: 3 completed, 2 pending
    └── plan_test.yml     # All tasks pending

  FULL COMPLETION (all tasks done):
  - When ALL tasks in ALL plan files have status: completed
  - Copy entire folder to docs/plans/completed/
  - Original may remain in docs/plans/live/ for follow-on work
  Example:
    agentic plan move folder --plan <plan_folder>  # Copy to completed
    docs/plans/completed/260115AG_example/         # Archived version

  REACTIVATION (issues found post-completion):
  - Update plan files in docs/plans/live/ copy
  - Update affected tasks' status to reflect the issue
  - docs/plans/completed/ copy remains as historical record

  FOLDER-LEVEL COMPLETION (COPY-NOT-MOVE pattern):
  - When ALL tasks in a plan folder are completed (status: 'fully_completed')
  - The ENTIRE plan folder is COPIED (not moved) to docs/plans/completed/
    Command: agentic plan move folder --plan <plan_folder>
  - The original docs/plans/live/ folder remains in place to support follow-on work
  - Only users manually move old plan folders from live/ to an archived/ subdirectory

  Why this pattern works:
  - Agents can add missed items to files in docs/plans/live/ without disrupting completed/ archive
  - Completed tasks are preserved even while work continues
  - Reactivation is clean: update docs/plans/live/ copy, sync to completed later

follow_on_work_pattern:
  DO:
  - Keep the existing folder in docs/plans/live/ for follow-on work
  - Add new plan files (plan_*.yml) for new phases in the folder root
  - Reference the original work in metadata (e.g., original_plan_date, previous_phases)
  - Copy the folder to docs/plans/completed/ when initial phases complete
  - Update the docs/plans/completed/ copy when new phases complete

  DON'T:
  - Create a new folder for related follow-on work (reuse the existing folder)
  - Move the folder out of docs/plans/live/ while work continues
  - Archive the folder without explicit user confirmation
  - Create live/ or completed/ subdirectories within plan folders

archived_vs_completed:
  Critical distinction between completed and archived storage:

  completed/:
  - Location: docs/plans/completed/
  - Purpose: Snapshot of completed work
  - May have an active counterpart in docs/plans/live/
  - Updated when new phases of the same plan complete
  - Accessible for reference and follow-on planning

  archived/:
  - Location: docs/plans/archived/
  - Purpose: Historical storage for plans 6+ months old
  - No active counterpart in docs/plans/live/
  - Infrequently accessed

  FENCE: Agents must NEVER move, copy, or modify folders to or within docs/plans/archived/.
  Only users may perform archival operations.

phase_types:
  description: |
    Standard phase types used in orchestration planning. These determine which
    planner agents to use and how phases are ordered in execution.

  types:
    teach:
      purpose: "Guidance, process, or documentation improvements"
      planner: "planner-guidance"
      executor: "teacher-update-guidance, teacher-update-assets"
      order_priority: 1

    build:
      purpose: "Code implementation or feature development"
      planner: "planner-build"
      executor: "build-python, build-flutter"
      order_priority: 2

    test:
      purpose: "Test strategy and validation tasks"
      planner: "planner-test"
      executor: "test-runner, test-guidance-simulator"
      order_priority: 3

    cleanup:
      purpose: "Code cleanup or removal tasks"
      planner: "planner-cleaning"
      executor: "build-python (cleanup operations)"
      order_priority: 4

    audit:
      purpose: "Plan folder compliance checks and file lifecycle validation"
      planner: "planner-audit (when it exists), planner-test"
      executor: "test-audit, test-final-output"
      order_priority: 5

    uat:
      purpose: "User acceptance testing - validates complete user journeys"
      planner: "planner-test (handles UAT as testing domain)"
      executor: "test-user-simulator"
      order_priority: 6
      note: "PRIMARY SUCCESS CRITERIA - mandatory for build plans"

  execution_order: |
    Standard execution order: teach -> build -> test -> cleanup -> audit -> uat
    Note: Not all phases are required for every plan. Orchestration determines
    which phases are needed based on the objective.

  naming_convention: |
    Use lowercase in YAML files (e.g., "teach", "build", "uat").
    Use Title Case in comments and documentation (e.g., "Teach Phase", "UAT Phase").
    Avoid uppercase abbreviations (e.g., "UAT" should be "uat" in code).

# Plan Structure Requirements (for planner-reviewer validation)
# Merged from plan-structure-requirements.yml
required_fields:
  plan_level:
    - plan_name: "string - unique descriptive name"
    - branch: "string - git branch name"
    - status: "enum - planning|active|partially_completed|fully_completed"
    - phases: "list - ordered phase definitions"

  phase_level:
    - phase_id: "string - unique identifier"
    - name: "string - human-readable name"
    - status: "enum - pending|in_progress|completed"
    - tasks: "list - ordered task definitions"

  task_level:
    - task_id: "string - unique identifier"
    - description: "string - actionable (starts with verb)"
    - status: "enum - pending|in_progress|completed|blocked"
    - success_criteria: "list - verifiable conditions"

validation_checklist:
  structure:
    - "All required_fields present at each level"
    - "Phase/task IDs unique within their scope"
    - "Status values match valid enum options"
    - "loop_structure present for non-trivial plans"
  naming:
    - "Folder matches YYMMDDXX_description pattern (see naming_convention.regex)"
    - "Phase files (plan_*.yml) in folder root, NOT in subdirectories"
    - "Naming validated by CLI during plan init (do not validate manually)"
  quality:
    - "Success criteria are specific and verifiable"
    - "Task descriptions start with action verb"
    - "Phase ordering reflects dependencies"
    - "loop_structure exit_criteria are measurable"

# Loop Structure Requirements
# Defines how plans declare their execution loop patterns
# Reference: modules/AgenticGuidance/assets/definitions/agent-loops.yml
loop_structure:
  description: |
    Plans must declare their loop structure to enable planners to understand
    the iterative execution pattern, exit conditions, and participant roles.
    This ensures consistent loop handling across the planning system.

  requirement_level:
    non_trivial_plans: "REQUIRED - Any plan with multiple phases or agent coordination"
    single_task_plans: "OPTIONAL - Simple plans may omit if no iteration needed"
    trivial_threshold: |
      A plan is considered trivial if:
      - Single phase with 3 or fewer tasks
      - No agent coordination required
      - No iteration or feedback loops
      All other plans MUST include loop_structure.

  schema:
    type:
      required: true
      description: "Loop type from agent-loops.yml"
      valid_values:
        - "test-fix-loop"
        - "audit-test-fix-loop"
        - "cleaner-dependency-loop"
        - "documentation-loop"
        - "user-story-validation-loop"
        - "exploration-loop"
        - "rlm-decomposition-loop"
        - "rlm-context-refinement-loop"
        - "planner-loop"
        - "guidance-test-loop"
        - "agent-self-review"
        - "guidance-self-review-loop"
      reference: "modules/AgenticGuidance/assets/definitions/agent-loops.yml#loop_types"

    trigger:
      required: true
      description: "Condition that starts the loop execution"
      examples:
        - "Phase enters 'in_progress' status"
        - "All prerequisite phases completed"
        - "User approves plan for execution"
        - "Test failures detected in previous iteration"

    exit_criteria:
      required: true
      description: "Conditions that terminate the loop"
      sub_fields:
        success:
          required: true
          description: "Condition for successful loop completion"
          examples:
            - "All tests pass with zero failures"
            - "Reviewer approves plan structure"
            - "No guidance gaps identified"
            - "All user stories validated"
        max_iterations:
          required: true
          type: "integer"
          description: "Maximum iterations before escalation"
          constraints:
            minimum: 1
            maximum: 10
            recommended: "Match agent-loops.yml maximum_iterations for loop type"
        escalation:
          required: true
          description: "Action when max_iterations reached without success"
          valid_values:
            - "escalate_to_human"
            - "escalate_with_partial_results"
            - "abort_with_rollback"
            - "continue_with_warning"

    participants:
      required: true
      description: "Agents involved in the loop with their roles"
      item_schema:
        agent:
          required: true
          description: "Agent name (from agents/ directory)"
        role:
          required: true
          description: "Agent's function in the loop"
          common_roles:
            - "executor"      # Performs primary action
            - "validator"     # Checks/validates output
            - "reviewer"      # Approves/rejects
            - "fixer"         # Addresses issues found
            - "observer"      # Monitors without modifying

  examples:
    build_plan_with_test_fix_loop:
      loop_structure:
        type: "test-fix-loop"
        trigger: "Build phase enters 'in_progress' status"
        exit_criteria:
          success: "All unit tests pass and coverage >= 80%"
          max_iterations: 5
          escalation: "escalate_to_human"
        participants:
          - agent: "build-python"
            role: "executor"
          - agent: "test-runner"
            role: "validator"
          - agent: "build-python"
            role: "fixer"

    guidance_plan_with_self_review:
      loop_structure:
        type: "guidance-self-review-loop"
        trigger: "Guidance files created or modified"
        exit_criteria:
          success: "All agents report NO ISSUES REMAINING"
          max_iterations: 3
          escalation: "escalate_with_partial_results"
        participants:
          - agent: "planner-guidance"
            role: "executor"
          - agent: "teacher-update-guidance"
            role: "fixer"

    cleanup_plan_with_dependency_check:
      loop_structure:
        type: "cleaner-dependency-loop"
        trigger: "Cleanup phase starts"
        exit_criteria:
          success: "All targets removed or documented as deferred"
          max_iterations: 3
          escalation: "escalate_to_human"
        participants:
          - agent: "cleaner"
            role: "executor"
          - agent: "explorer"
            role: "validator"
          - agent: "orchestrator"
            role: "reviewer"

    planner_review_loop:
      loop_structure:
        type: "planner-loop"
        trigger: "Plan creation initiated"
        exit_criteria:
          success: "Reviewer approves AND explore verification passes"
          max_iterations: 5
          escalation: "escalate_to_human"
        participants:
          - agent: "planner-build"
            role: "executor"
          - agent: "explorer"
            role: "validator"
          - agent: "planner-reviewer"
            role: "reviewer"

  validation_rules:
    - "type must reference valid loop from agent-loops.yml"
    - "max_iterations should not exceed loop type's maximum_iterations"
    - "participants must include at least one executor role"
    - "exit_criteria.success must be measurable/verifiable"
    - "escalation must be one of the valid_values"

concrete_example:
  # See: modules/AgenticGuidance/assets/guidelines/plan-completion.yml
  # Demonstrates the Copy-and-Sync pattern with folder structure and state transitions.

# Path Conventions
# Merged from folder-structure.yml
path_conventions:
  repo_content:
    standard: "relative"
    description: |
      Use relative paths from repo root for all repo content.
      Examples:
        - 'modules/AgenticGuidance/assets/definitions/path.yml' (CORRECT)
        - 'modules/AgenticGuidance/agents/orchestration/process.mmd' (CORRECT)
        - '/home/code/somerepo/assets/definitions/path.yml' (INCORRECT - absolute)
    rationale: "Relative paths are portable across environments and repositories"

  plan_folder_references:
    standard: "relative"
    description: |
      Plan folder paths are relative to project root.
      Agents receive specific folder paths as input from orchestration.

# Agent Logs (future - not yet systematically collected)
agent_logs:
  path: "docs/agent_logs/YYYYMMDD_<agent_name>"
  description: |
    Agent decision logs. Single line per decision or action taken.
    When available, logs should follow the pattern YYYYMMDD_<agent_name>.log
