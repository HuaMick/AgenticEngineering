# Trace Diagnostics Definitions
# Shared concepts for analyzing agent execution traces
# Used by: teacher-trace-diagnostics, potentially test-audit, planner-guidance

trace_diagnostics:
  definition: |
    Analysis of structured execution traces (e.g., LangSmith runs) to identify
    patterns indicating guidance friction. Unlike log analysis which examines
    text output, trace diagnostics examines structured metadata: timing, hierarchy,
    error status, and token consumption.

  trace_sources:
    langsmith:
      description: "LangSmith tracing platform"
      data_available:
        - "Run hierarchy (parent/child relationships)"
        - "Timing (start_time, end_time, latency)"
        - "Token counts (prompt, completion, total)"
        - "Error status and messages"
        - "Tags and metadata"
        - "Inputs and outputs (optional, can be large)"
      access_pattern: "API via langsmith Python SDK"

  friction_pattern_taxonomy:
    description: |
      Classification of friction patterns detectable in trace data.
      Each pattern type maps to a guidance improvement type.

    patterns:
      - name: "backtracking"
        signal: "Agent revisits previous decisions"
        implies: "Path is unclear - agent doesn't know next step"
        remediation: "path_clarity"

      - name: "error_cluster"
        signal: "Same errors repeat across runs"
        implies: "Fence is missing - no guardrail preventing error"
        remediation: "fence_strengthening"

      - name: "path_ambiguity"
        signal: "Agent hesitates or tries multiple approaches"
        implies: "Signpost is missing - no example showing approach"
        remediation: "signpost_addition"

      - name: "token_anomaly"
        signal: "Token consumption far exceeds norm"
        implies: "Context is bloated - too much unnecessary input"
        remediation: "context_minimisation"

  analysis_strategies:
    hierarchical_sampling:
      description: |
        Process traces in layers: top-level summaries first, then drill
        into child runs only for traces showing anomalies.
      when_to_use: ">100 traces"
      steps:
        - "Fetch top-level run summaries (no inputs/outputs)"
        - "Calculate aggregate statistics"
        - "Identify anomalous runs (errors, high latency, high tokens)"
        - "Fetch child runs only for anomalous parents"
        - "Analyze child patterns for those specific runs"

    time_windowing:
      description: |
        Process traces in time-based batches to avoid loading
        all data at once.
      when_to_use: ">500 traces"
      steps:
        - "Divide time range into windows (e.g., 1-hour)"
        - "Process each window independently"
        - "Aggregate patterns across windows"
        - "Report cross-window trends"

    pre_filtering:
      description: |
        Apply LangSmith filters before fetching to reduce data volume.
      when_to_use: "Known friction type or high-volume project"
      filters:
        - "error_only: True (for error clustering)"
        - "run_type: 'chain' (for orchestration analysis)"
        - "latency > threshold (for performance issues)"

  severity_classification:
    CRITICAL:
      definition: "Errors preventing task completion"
      action: "Immediate guidance fix required"
      examples:
        - "100% failure rate for specific operation"
        - "Infinite loop detected"
        - "Context overflow causing truncation"

    HIGH:
      definition: "Errors requiring manual recovery"
      action: "Fix in next guidance update"
      examples:
        - "Repeated errors with partial recovery"
        - ">5 backtracking instances per run"
        - "Token usage >3 std dev"

    MEDIUM:
      definition: "Inefficiencies not blocking completion"
      action: "Include in regular guidance maintenance"
      examples:
        - "2-5 backtracking instances"
        - "Token usage 2-3 std dev"
        - "Moderate hesitation patterns"

    LOW:
      definition: "Minor issues, style concerns"
      action: "Log for future consideration"
      examples:
        - "Occasional hesitation"
        - "Slightly elevated token usage"
        - "Inconsistent but non-blocking patterns"

  rlm_mandatory:
    description: |
      RLM (Recursive Load Management) is MANDATORY for large-context trace analysis.
      Trace diagnostics often involve processing hundreds or thousands of execution
      traces, each with potentially large inputs/outputs. Without RLM patterns,
      agents risk context overflow, degraded analysis quality, and missed patterns.

    rationale: |
      Trace data is inherently hierarchical and voluminous. A single project may have
      thousands of runs, each with multiple child runs. Loading all trace data at once
      violates context minimisation principles and leads to poor analysis outcomes.

    thresholds:
      trace_count_boundary: 50
      description: "RLM patterns required when analyzing more than 50 traces"
      child_run_boundary: 100
      child_description: "RLM required when total child runs exceed 100"
      token_boundary: 50000
      token_description: "RLM required when estimated token load exceeds 50K"

    required_rlm_patterns:
      - pattern: "hierarchical_sampling"
        reference: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml#hierarchical"
        applies_when: "Analyzing trace hierarchies with parent/child relationships"

      - pattern: "progressive_loading"
        reference: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml#progressive"
        applies_when: "Processing large trace sets incrementally"

      - pattern: "summary_first"
        reference: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml#summary_first"
        applies_when: "Need overview before detailed analysis"

    compliance_requirements:
      - requirement: "threshold_check"
        description: "Agent MUST check trace count before loading full data"
        enforcement: "Validate trace count < threshold before bulk operations"

      - requirement: "chunked_processing"
        description: "Agent MUST process traces in chunks when above threshold"
        enforcement: "Use time_windowing or hierarchical_sampling strategies"

      - requirement: "summary_before_detail"
        description: "Agent MUST fetch summaries before detailed trace data"
        enforcement: "Load run metadata first, inputs/outputs only when needed"

      - requirement: "progressive_drill_down"
        description: "Agent MUST drill down only into anomalous traces"
        enforcement: "Filter to error/anomaly traces before loading children"

    violation_consequences:
      - "Context overflow leading to truncated analysis"
      - "Missed friction patterns due to incomplete processing"
      - "Degraded response quality from context pollution"
      - "Increased latency and token costs"

  relationship_to_other_concepts:
    path: "modules/AgenticGuidance/assets/definitions/path.yml"
    fence: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml#fence"
    signpost: "modules/AgenticGuidance/assets/definitions/guidance-artifacts.yml#signpost"
    context_minimisation: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
    rlm_patterns: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"
