# Testing Types Index
# Brief type definitions with pointers to detailed strategy files.
# For implementation details, see the referenced strategy-*.yml files.

testing_types:
  smoke_test:
    description: "Early validation of entrypoints and basic functionality"
    detail: "strategy-user-simulation.yml"
    characteristics:
      - "Tests entrypoints work (imports, basic execution)"
      - "Validates minimal component set"
      - "Fast feedback for development"
      - "Minimal assertions, focused on 'does it run'"

  component_test:
    description: "Validates specific component functionality in isolation"
    detail: "test-organization.yml"
    organization:
      - "Located in tests/workflows/<workflow_name>/"
      - "One package per workflow structure"
      - "Self-contained with own fixtures and helpers"
    purpose: "Validate component behavior and integration points"

  integration_test:
    description: "Validates components work together correctly"
    detail: "test-organization.yml"
    focus:
      - "Component interactions"
      - "Data flow between components"
      - "Integration points validation"
      - "Real dependencies, not mocks (where practical)"

  workflow_test:
    description: "Tests organized by workflow under tests/workflows/<workflow_name>/"
    detail: "test-organization.yml"
    structure:
      - "CLI/infrastructure workflows: descriptive names (health_check, studio)"
      - "Agent workflows: agent_ prefix (agent_chat, agent_shell_operations)"
      - "Cross-workflow: tests/workflows/e2e/"

  user_simulator:
    description: "Validates agent usability by testing user stories with only default guidance"
    detail: "examples/planner/components/guidance_blind_test.mmd"

  service_test:
    description: "Validates backend service lifecycle (startup, health, stability, logging)"
    detail: "strategy-fresh-environment.yml"

  end2end:
    description: "Comprehensive test suite for end-to-end workflow validation"
    detail: "strategy-test-suite.yml"

  audit:
    description: "Reviews existing tests for reward hacking and validates test quality"
    detail: "examples/planner/components/guidance_self_review_loop.mmd"

see_also:
  - "strategy-multi-layer.yml: Multi-layer testing strategy"
  - "strategy-user-acceptance.yml: User acceptance testing strategy"
  - "examples/planner/components/strategy_documentation_validation.mmd: Documentation validation strategy"
