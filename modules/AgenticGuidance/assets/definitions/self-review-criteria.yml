# Self-Review Criteria Definition
# Establishes precise criteria for PASS vs NEEDS_ATTENTION decisions
# Source: Friction Analysis FF-003 (78% flag rate on spot-checks, 14+ iterations)
#
# CRITICAL RULE: PASS requires ALL criteria to be met (conjunction)
# NEEDS_ATTENTION is triggered if ANY single criterion fails (disjunction)

# =============================================================================
# FILE LOCATION AND CROSS-REFERENCES
# =============================================================================
# File Location:
#   modules/AgenticGuidance/assets/definitions/self-review-criteria.yml
#
# Cross-References:
#   Protocol Guide (process & workflow):
#     modules/AgenticGuidance/assets/guidelines/agent-self-review.yml
#
#   Test Scenarios (validation scenarios):
#     modules/AgenticGuidance/assets/definitions/guidance-test-scenarios.yml
#
#   Friction Detection (patterns & remediation):
#     modules/AgenticGuidance/assets/definitions/friction.yml
#
# Note: All paths use repository-relative format from repository root.
# =============================================================================

# =============================================================================
# PASS CRITERIA (ALL must be TRUE)
# =============================================================================
pass_criteria:
  description: |
    For a self-review to result in PASS, ALL of the following must be true.
    If ANY single criterion fails, the result must be NEEDS_ATTENTION.
    This conjunction rule prevents lenient assessments.

  criteria:
    - id: "PC-001"
      name: "No Duplicate Definitions"
      description: "No duplicate definitions between inputs.yml and referenced assets"
      check: "Compare inline definitions against assets/definitions/ and assets/guidelines/"
      threshold: "Zero duplicates >50 tokens"
      violation_severity: "HIGH"

    - id: "PC-002"
      name: "All References Resolve"
      description: "All file references resolve to existing files"
      check: "Validate each path reference points to an existing file"
      threshold: "100% of references must resolve"
      violation_severity: "CRITICAL"

    - id: "PC-003"
      name: "No Circular References"
      description: "No circular or self-referencing includes"
      check: "Trace reference graph for cycles"
      threshold: "Zero cycles detected"
      violation_severity: "HIGH"

    - id: "PC-004"
      name: "Path Resolution Semantics"
      description: "Context references follow path-resolution.yml semantics"
      check: "Verify paths use repository-root-relative format"
      threshold: "All paths follow documented semantics"
      violation_severity: "MEDIUM"

    - id: "PC-005"
      name: "Version Alignment"
      description: "Version numbers aligned between manifest.yml and inputs.yml"
      check: "Compare version fields across agent files"
      threshold: "All versions match within agent"
      violation_severity: "LOW"

    - id: "PC-006"
      name: "No Large Inline Duplicates"
      description: "No inline definitions that duplicate asset content >50 tokens"
      check: "Compare inline content against assets, estimate token count"
      threshold: "Zero inline definitions >50 tokens that match asset content"
      violation_severity: "HIGH"

    - id: "PC-007"
      name: "Transitive Layer Loading"
      description: "Layer references use transitive loading, not flat duplication"
      check: "Verify inputs.yml uses layer references, not copy-pasted content"
      threshold: "All shared content accessed via layer references"
      violation_severity: "MEDIUM"

# =============================================================================
# NEEDS_ATTENTION TRIGGERS (ANY triggers failure)
# =============================================================================
needs_attention_triggers:
  description: |
    If ANY of the following conditions is detected, the self-review MUST result
    in NEEDS_ATTENTION. These are automatic disqualifiers for PASS status.

  triggers:
    - id: "NAT-001"
      name: "Duplicate Definition Found"
      condition: "Same content (>50 tokens) exists in 2+ locations"
      detection: "grep -based content comparison"
      action: "Remove duplicate, reference canonical source"

    - id: "NAT-002"
      name: "Broken File Reference"
      condition: "Any referenced file path does not resolve to existing file"
      detection: "Path existence check for all references"
      action: "Fix path or remove stale reference"

    - id: "NAT-003"
      name: "Large Inline Definition"
      condition: "Inline definition >100 tokens that exists in shared assets"
      detection: "Token count estimation + content matching"
      action: "Replace inline with reference to asset"

    - id: "NAT-004"
      name: "Version Mismatch"
      condition: "manifest.yml version differs from inputs.yml version"
      detection: "Version field comparison"
      action: "Align versions across agent files"

    - id: "NAT-005"
      name: "Deprecated Pattern Usage"
      condition: "Pattern marked deprecated in assets used without migration note"
      detection: "Search for deprecated markers in referenced patterns"
      action: "Migrate to current pattern or add migration plan"

    - id: "NAT-006"
      name: "Context Bloat"
      condition: ">30% content reduction potential identified"
      detection: "Compare current vs minimal version token counts"
      action: "Reduce context by removing redundancy, using references"

# =============================================================================
# QUANTITATIVE THRESHOLDS
# =============================================================================
quantitative_thresholds:
  inline_definition:
    max_tokens_before_extraction: 100
    max_tokens_duplicate_check: 50
    description: |
      Inline definitions >100 tokens should be extracted to shared assets.
      Definitions >50 tokens that match asset content are duplicates.

  context_reduction:
    target_percent: 30
    description: |
      If context can be reduced by >30%, the agent is bloated and needs attention.
      This indicates redundant content, excessive inline definitions, or missing references.

  redundancy_detection:
    trigger_locations: 2
    description: |
      If the same content appears in 2+ locations, it's a redundancy issue.
      Canonical content should exist in one place with references from others.

  transitive_depth:
    max_depth: 3
    description: |
      Layer references should not exceed 3 levels of indirection.
      Deeper nesting indicates over-complicated structure.

  inputs_yml_size:
    max_recommended_tokens: 2000
    warning_threshold_tokens: 1500
    description: |
      inputs.yml should typically be <2000 tokens. Files >1500 tokens
      should be reviewed for potential extraction opportunities.

# =============================================================================
# AUTOMATED CHECK PROCEDURES
# =============================================================================
automated_checks:
  token_estimation:
    command: "wc -w {file} | awk '{print int($1 * 1.3)}'"
    description: "Estimate token count using words * 1.3 approximation"
    threshold: "inputs.yml should be <2000 tokens"
    usage: |
      # Example: Estimate tokens in inputs.yml
      wc -w modules/AgenticGuidance/agents/test/test-audit/inputs.yml | awk '{print int($1 * 1.3)}'

  duplicate_detection:
    command: |
      # Find definitions that appear in both inputs.yml and assets/
      grep -h '^  [a-z_]*:$' {agent}/inputs.yml 2>/dev/null | sort > /tmp/input_keys.txt
      grep -rh '^  [a-z_]*:$' modules/AgenticGuidance/assets/definitions/ 2>/dev/null | sort | uniq > /tmp/asset_keys.txt
      comm -12 /tmp/input_keys.txt /tmp/asset_keys.txt
    description: "Detect definition keys duplicated between inputs and assets"
    threshold: "Zero duplicates expected"
    usage: |
      # Manual inspection: compare inline definitions to asset content
      # Look for descriptions, schemas, or examples that match verbatim

  reference_validation:
    command: |
      # Extract and validate all file references
      grep -oP '(?:path|location):\s*["'\'']?\K[^"'\''#\n]+' {agent}/inputs.yml 2>/dev/null | while read ref; do
        [ -f "modules/AgenticGuidance/$ref" ] || [ -f "$ref" ] || echo "MISSING: $ref"
      done
    description: "Validate all file references resolve to existing files"
    threshold: "Zero missing references"
    usage: |
      # Example for test-audit agent
      grep -oP 'location:\s*"\K[^"]+' modules/AgenticGuidance/agents/test/test-audit/inputs.yml | while read ref; do
        [ -f "$ref" ] && echo "OK: $ref" || echo "MISSING: $ref"
      done

  version_comparison:
    command: |
      # Compare versions between manifest.yml and inputs.yml
      manifest_ver=$(grep -oP 'version:\s*["'\'']?\K[^"'\''\n]+' {agent}/manifest.yml 2>/dev/null | head -1)
      inputs_ver=$(grep -oP 'version:\s*["'\'']?\K[^"'\''\n]+' {agent}/inputs.yml 2>/dev/null | head -1)
      [ "$manifest_ver" = "$inputs_ver" ] && echo "MATCH: $manifest_ver" || echo "MISMATCH: manifest=$manifest_ver inputs=$inputs_ver"
    description: "Check version alignment between manifest and inputs"
    threshold: "Versions must match"

# =============================================================================
# BORDERLINE EXAMPLES
# =============================================================================
examples:
  description: |
    These examples demonstrate the correct PASS or NEEDS_ATTENTION decision
    for borderline cases. Study these to calibrate your assessment rigor.

  borderline_cases:
    - id: "EX-001"
      title: "Inline Definition Duplication"
      agent_state: |
        inputs.yml contains a 150-token 'audit_checks' definition that matches
        content in assets/definitions/audit-criteria.yml almost verbatim.
      decision: "NEEDS_ATTENTION"
      rationale: |
        Exceeds 50-token duplicate threshold AND 100-token inline threshold.
        The correct approach: reference the asset file instead of duplicating.
      lesson: "This type of duplication caused 35% of FF-003 flags."

    - id: "EX-002"
      title: "Small Agent-Specific Definition - Acceptable"
      agent_state: |
        inputs.yml contains a 40-token role description that is unique to this
        agent and does not exist in any shared asset.
      decision: "PASS"
      rationale: |
        Below 50-token duplicate threshold. Content is agent-specific and not
        appropriate for extraction to shared assets.
      lesson: "Not all inline content is bad - agent-specific context belongs in inputs.yml."

    - id: "EX-003"
      title: "High Context Reduction Potential"
      agent_state: |
        inputs.yml is 3000 tokens. Analysis shows it could be reduced to 2000
        tokens by removing redundant descriptions and using layer references.
      decision: "NEEDS_ATTENTION"
      rationale: |
        33% reduction potential exceeds 30% threshold. This indicates context
        bloat that consumes unnecessary tokens and may confuse the agent.
      lesson: "Context bloat caused 25% of FF-003 flags."

    - id: "EX-004"
      title: "Acceptable Context Size"
      agent_state: |
        inputs.yml is 1800 tokens with no identified redundancy. All content
        is either agent-specific or properly referenced from shared assets.
      decision: "PASS"
      rationale: |
        Within 2000-token recommended limit. No reduction opportunities means
        content is appropriately structured.
      lesson: "Size alone doesn't determine bloat - reduction potential matters."

    - id: "EX-005"
      title: "Single Broken Reference"
      agent_state: |
        inputs.yml references 'assets/definitions/old-file.yml' which was
        renamed to 'assets/definitions/new-file.yml'. All other criteria pass.
      decision: "NEEDS_ATTENTION"
      rationale: |
        ANY broken reference triggers NEEDS_ATTENTION regardless of other
        factors. Broken references prevent agent from accessing required context.
      lesson: "Broken references caused 20% of FF-003 flags. Always validate paths."

    - id: "EX-006"
      title: "Minor Version Mismatch - Low Severity"
      agent_state: |
        manifest.yml has version "2.1" but inputs.yml has version "2.0".
        All file references resolve, no duplicates, context is minimal.
      decision: "NEEDS_ATTENTION"
      rationale: |
        Version mismatch triggers NEEDS_ATTENTION per NAT-004. However, this
        is LOW severity and can be fixed quickly by aligning versions.
      lesson: "Even low-severity issues trigger NEEDS_ATTENTION - fix them all."

    - id: "EX-007"
      title: "Deprecated Pattern with Migration Note"
      agent_state: |
        inputs.yml uses deprecated 'strategy-*' path (now in guidelines/).
        However, a comment explains: "# TODO: migrate to guidelines/ path"
      decision: "NEEDS_ATTENTION"
      rationale: |
        Deprecated pattern usage still triggers NEEDS_ATTENTION even with
        migration note. The note shows awareness but doesn't resolve the issue.
      lesson: "Migration notes are good but don't substitute for actual fixes."

# =============================================================================
# OUTPUT REQUIREMENTS (SRLE-004)
# =============================================================================
output_requirements:
  description: |
    Self-review agents MUST output all of the following fields.
    This schema ensures self-review results are actionable and enforceable.

  required_fields:
    - field: "status"
      type: "enum"
      values: ["PASS", "NEEDS_ATTENTION"]
      description: "Overall assessment result based on pass_criteria and needs_attention_triggers"

    - field: "findings"
      type: "list"
      item_schema:
        id: "string (NAT-XXX for standard triggers, or CUSTOM-XXX for agent-specific)"
        severity: "CRITICAL | HIGH | MEDIUM | LOW"
        description: "string - what was found"
        recommendation: "string - how to fix"
      description: "List of all issues found. Empty list for PASS status."

    - field: "plan_file_path"
      type: "string | null"
      description: |
        Path to created plan file.
        REQUIRED when status == NEEDS_ATTENTION
        null when status == PASS
      example: "docs/plans/live/260104AE_agenticguidance/live/plan_guidance_test_audit_broken_refs.yml"

    - field: "spot_check_eligible"
      type: "boolean"
      description: "Whether this result is eligible for spot-check sampling"

  validation_rule: |
    FENCE: If status == NEEDS_ATTENTION AND plan_file_path is null/empty:
    - Output is INVALID
    - Self-review is INCOMPLETE
    - Orchestrator MUST reject and require plan file creation

  output_example:
    pass_example:
      status: "PASS"
      findings: []
      plan_file_path: null
      spot_check_eligible: true
    needs_attention_example:
      status: "NEEDS_ATTENTION"
      findings:
        - id: "NAT-002"
          severity: "CRITICAL"
          description: "Reference to assets/definitions/old-file.yml does not resolve"
          recommendation: "Update path to assets/definitions/new-file.yml"
      plan_file_path: "docs/plans/live/260104AE_agenticguidance/live/plan_guidance_test_audit_broken_refs.yml"
      spot_check_eligible: true

# =============================================================================
# FENCE INSTRUCTION
# =============================================================================
fence:
  name: "Self-Review Conjunction Rule"
  description: |
    FENCE: Self-review PASS requires ALL criteria met.

    DO NOT assess PASS if:
    - ANY single NEEDS_ATTENTION trigger is detected
    - ANY single PASS criterion is not met

    This fence prevents the lenient assessments that caused 78% flag rate
    in FF-003. When in doubt, choose NEEDS_ATTENTION over PASS.

  enforcement: |
    If you find yourself considering PASS when any criterion fails,
    STOP and reassess. The 78% flag rate was caused by exactly this
    kind of lenient assessment. Strictness prevents wasted iterations.

# =============================================================================
# HISTORICAL CONTEXT
# =============================================================================
historical_context:
  source: "docs/plans/live/260104AE_agenticguidance/audit/260119_session_friction_analysis.yml"
  finding_id: "FF-003"
  summary: |
    In the 260119 session, initial self-review assessments were significantly
    too lenient:
    - 14+ iterations required before agents passed review
    - 78% flag rate on spot-checks (7 of 9 PASS agents were flagged)
    - Root cause: Imprecise criteria for PASS vs NEEDS_ATTENTION

    This definition file addresses the root cause by establishing precise,
    measurable criteria that reduce subjectivity in assessments.
