# Agent Categories Definition
# Canonical source of truth for the MyAgents agent organizational structure

description: |
  Agent categories represent the top-level organizational structure of the MyAgents framework.
  Each category contains related sub-agents that share a common purpose and responsibility domain.

agent_categories:
  build:
    name: "Build"
    purpose: "Implementation of code changes and new functionality"
    responsibility: "Execute plan items by writing code, building components, and verifying compilation"
    sub_agents:
      - build-python
      - build-flutter
    boundaries: "Build agents implement; they do not plan, test, or clean"

  planner:
    name: "Planner"
    purpose: "Create executable implementation plans from objectives"
    responsibility: "Analyze objectives, structure work into phases and tasks, produce live plans for other agents"
    sub_agents:
      - planner-build
      - planner-test
      - planner-cleaning
      - planner-guidance
      - planner-reviewer
      - planner-guidance-testing
    boundaries: "Planner agents plan; they do not implement or execute the plans"

  test:
    name: "Test"
    purpose: "Validation through testing and quality assurance"
    responsibility: "Create tests, execute tests, audit test quality, simulate user journeys, validate services"
    sub_agents:
      - test-builder
      - test-runner
      - test-audit
      - test-user-simulator
      - test-service
      - test-final-output
      - test-flutter-builder
      - test-flutter-runner
      - test-guidance-simulator
    boundaries: "Test agents validate; they do not fix or implement (except test-builder writes tests)"

  cleaner:
    name: "Cleaner"
    purpose: "Safe removal of dead code and redundant content"
    responsibility: "Identify cleanup candidates, vote on removals, execute approved deletions safely"
    sub_agents:
      - cleaner-identify
      - cleaner-execute
      - cleaner-core
    boundaries: "Cleaner agents remove; they do not add new code or fix issues"

  explore:
    name: "Explore"
    purpose: "Codebase discovery and analysis before planning"
    responsibility: "Discover architecture, find similar features, analyze dependencies, survey tests, synthesize findings"
    sub_agents:
      - explore-architecture
      - explore-feature
      - explore-dependency
      - explore-test
      - explore-synthesis
    boundaries: "Explore agents discover; they do not implement or modify code"

  teacher:
    name: "Teacher"
    purpose: "Build paths, fences, and signposts for agents"
    responsibility: "Execute guidance improvements, analyze processes, update shared assets"
    sub_agents:
      - teacher-plan
      - teacher-update-guidance
      - teacher-update-assets
    boundaries: "Teacher agents guide; they improve agent guidance, not application code"
    special_note: "Teacher agents execute guidance improvements from plans created by planner-guidance (planner category). Separation: planner-guidance creates guidance improvement plans; teacher-update-guidance and teacher-update-assets execute those plans."

  deploy:
    name: "Deploy"
    purpose: "Packaging, CI/CD, and infrastructure management"
    responsibility: "Build and install packages, sync CI/CD config, create worktrees"
    sub_agents:
      - deploy-packaging
      - deploy-cicd
      - deploy-worktree
    boundaries: "Deploy agents deploy; they do not write application code"

  documentation:
    name: "Documentation"
    purpose: "Maintain minimal, accurate documentation"
    responsibility: "Update docs to match code, remove redundant docs, fill documentation gaps"
    sub_agents:
      - documentation-core
    boundaries: "Documentation agents document; they do not change code behavior"

  orchestration:
    name: "Orchestration"
    purpose: "Coordinate agent execution and manage workflows"
    responsibility: "Route tasks to appropriate agents, manage execution flow, handle escalations"
    sub_agents:
      - orchestration-planning
      - orchestration-build
      - orchestration-guidance
    boundaries: "Orchestration agents coordinate; they delegate work to specialist agents"
    taxonomy_note: "Orchestration is a meta-agent (coordinates across categories), not a domain category (like build, test, clean)"

patterns:
  boundaries: |
    Key boundary fences between categories:
    - Build vs Deploy: See modules/AgenticGuidance/assets/definitions/fence-build-deploy.yml
    - Test vs Build: Test agents validate, build agents implement
    - Clean vs Build: Clean agents remove, build agents create
    - Explore vs Plan: Explore agents discover, plan agents structure work

usage: |
  Reference this file from agent manifests and inputs.yml files:
    category_definition: "modules/AgenticGuidance/assets/definitions/agent-categories.yml"

  Each agent should know its category for:
    - Understanding its scope boundaries
    - Knowing when to escalate vs. when to proceed
    - Identifying sibling agents within the same category
