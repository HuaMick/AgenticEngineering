model-first-verification: |
  For generator agents, the model's actual output is the source of truth.
  Verify what was generated, not that the generation process ran.

  Applies to:
  - Code generators (build agents)
  - Plan generators (planner agents)
  - Content generators (documentation agents)
  - Test generators (test-builder agents)

  Verification approach:
  - Check the generated artifact exists
  - Validate the artifact's content/structure
  - Run the artifact (compile, test, execute) to verify it works
  - Compare against expected patterns or outcomes

  Anti-patterns:
  - "Generation completed" (process-based, not outcome-based)
  - "Model produced output" (doesn't verify quality)
  - "No errors during generation" (doesn't verify correctness)

  Good examples:
  - "Generated code compiles without errors"
  - "Generated plan contains required sections"
  - "Generated tests pass when run"

  See also:
  - outcome-verification.yml: General outcome verification principles
  - success-criteria-teacher.yml: Success criteria patterns

