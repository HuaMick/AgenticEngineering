test_structure: |
  Tests are organized in test/ directory, mirroring the lib/ structure.

  **Example Structure**:
  ```
  lib/
    core/
      crypto/
        key_pair.dart
      networking/
        relay_client.dart
  test/
    core/
      crypto/
        key_pair_test.dart
      networking/
        relay_client_test.dart
    mocks/
      mock_relay_server.dart
  ```

  **Naming Conventions**:
  - Test files: <source_file>_test.dart
  - Test groups: Use group() to organize related tests
  - Test names: Descriptive, explain what is being tested
