# Folder Structure Definition
# Defines general folder conventions for repo content.
# PLAN FOLDERS: See modules/AgenticGuidance/assets/definitions/plans.yml (authoritative source)
# This file defines path conventions and non-plan folder structures.

path_conventions:
  repo_content:
    standard: "relative"
    description: |
      Use relative paths from repo root for all repo content.
      Examples:
        - 'modules/AgenticGuidance/assets/definitions/path.yml' (CORRECT)
        - 'modules/AgenticGuidance/agents/orchestration/process.mmd' (CORRECT)
        - '/home/code/somerepo/assets/definitions/path.yml' (INCORRECT - absolute)
    rationale: "Relative paths are portable across environments and repositories"

  plan_folder_references:
    standard: "relative"
    authoritative_source: "modules/AgenticGuidance/assets/definitions/plans.yml"
    description: |
      See plans.yml for plan folder structure, naming conventions, and lifecycle patterns.
      Agents receive specific folder paths as input from orchestration.

folders:
  # Plan folders: See plans.yml for complete definitions
  plans_root:
    path: "docs/plans/"
    reference: "modules/AgenticGuidance/assets/definitions/plans.yml"
    note: "See plans.yml for subfolder structure, lifecycle, and completion patterns"

  # Non-plan folders defined here
  agent_logs:
    path: "docs/agent_logs/YYYYMMDD_<agent_name>"
    description: |
      Agent decision logs. Single line per decision or action taken.
