# Folder Structure Definition
# Defines the standard folder structure for plans, logs, and documentation
# Used by planner agents to understand where files are located
#
# NOTE: For detailed plan lifecycle, folder naming, and completion patterns,
# see assets/definitions/plans.yml (the authoritative source for plan structure).
# This file defines general folder conventions; plans.yml defines plan-specific rules.

path_conventions:
  repo_content:
    standard: "relative"
    description: |
      Use relative paths from repo root for all repo content (assets/, agents/, docs/).
      Examples:
        - 'assets/definitions/path.yml' (CORRECT)
        - 'agents/orchestration/process.mmd' (CORRECT)
        - 'docs/plans/live/251230AE_main/' (CORRECT)
        - '/home/code/somerepo/assets/definitions/path.yml' (INCORRECT - absolute)
    rationale: "Relative paths are portable across environments and repositories"

  plan_folder_references:
    standard: "relative"
    description: |
      Use relative paths from repo root for plan folder references.
      The planning folder location is: docs/plans/
      Examples:
        - 'docs/plans/live/YYMMDDRepo_Branch/' (CORRECT)
        - 'docs/plans/completed/YYMMDDRepo_Branch/' (CORRECT)
      Agents receive the specific folder path as input from orchestration.
    rationale: "Relative paths work across different repository locations"

folders:
  plans_root:
    path: "docs/plans/"
    description: "Root folder for all planning artifacts"
    subfolders:
      - live/      # Active plans being worked on
      - completed/ # Snapshots of completed work
      - backlog/   # Future work items by category
      - archived/  # USER-MANAGED historical archive (agents must not touch)

  plans_live:
    path: "docs/plans/live/YYMMDDRepo_Branch/"
    description: |
      Each plan has a live folder following the naming convention:
      - YYMMDD: Date of creation
      - Repo: Abbreviated repo identifier (e.g., AE for AgenticEngineering, AG for AgenticGuidance)
      - Branch: Branch name using underscores (e.g., _main, _staging, _feature_x)
      Example: 251230AE_main, 260102AG_migration

      REQUIRED subfolders:
        - live/: Active phase files (plan_live_teach.yml, plan_live_test.yml, etc.)
        - completed/: Completed items archive (plan_completed.yml)

      OPTIONAL subfolders (agent artifact dumping grounds):
        - analysis/: Analysis documents and friction reports
        - audit-results/: Audit findings and reports
        - design-specs/: Design specifications and diagrams
        - test-results/: Test execution logs and reports

  plans_completed:
    path: "docs/plans/completed/YYMMDDRepo_Branch/"
    description: |
      Completed plan folders mirror the live folder naming convention.
      See assets/definitions/plans.yml for lifecycle patterns (COPY-NOT-MOVE).

  plans_backlog:
    path: "docs/plans/backlog/backlog_*.yml"
    description: |
      Backlog plans organized by category.
      Files: backlog_cicd.yml, backlog_core.yml, backlog_maintenance.yml, backlog_testing.yml

  plans_archived:
    path: "docs/plans/archived/"
    description: |
      USER-MANAGED historical archive for plans older than 6 months.
      AGENT FENCE: Agents must NEVER move, copy, modify, or interact with this directory.

  agent_logs:
    path: "docs/agent_logs/YYYYMMDD_<agent_name>"
    description: |
      Agent decision logs. Single line per decision or action taken.
