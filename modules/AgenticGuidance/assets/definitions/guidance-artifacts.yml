# Guidance Artifacts Definition
# Consolidated from: fence.yml, signpost.yml, guidance.yml (2026-01-16)
# Defines guidance concepts and where guidance artifacts should be stored

# What is "guidance" in plan tasks?
# Merged from guidance.yml
guidance_in_plans: |
  Guidance provides instructions for the orchestration agent to generate prompts for the target agent.
  It contains the context, scope, and specific instructions that will be included in the target agent's prompt.

  Guidance should include:
  - Context about what needs to be done and why it matters
  - Specific instructions for the work to be performed
  - Important details or constraints the target agent needs to know
  - Process file paths to specify which process the target agent should execute

  Guidance can include file paths from inputs when it helps clarify the scope or instructions.
  The orchestration agent uses this guidance to construct the full prompt for the target agent.

  Guidance should NOT include:
  - High-level objectives or goals (those belong at the plan level in the description field)
  - Completion criteria or checkpoints (those belong in success criteria)
  - Process steps that are already defined in agent processes (unless clarifying which process to use)

  Be specific and detailed - this guidance becomes the target agent's instructions.
  The orchestration agent reads guidance from plans and generates appropriate prompts for spawned agents.
  This allows the same guidance to work for single agents or multiple parallel agents (when count > 1).

# Core concepts for agent guidance
fence: |
  Guardrails that prevent wrong work:
  - Success criteria that are measurable
  - Validation/audit steps appropriate to risk
  - Constraints that remove ambiguity (inputs, scope boundaries)

signpost: |
  A teaching artifact that helps agents choose correctly:
  - Examples (`examples/*.yml`): show the pattern with realistic values
  - Definitions (`definitions.yml`): name concepts + rules of thumb
  - Plan guidance: task-specific context + file paths

guidance_artifacts:
  description: |
    Put information where agents will actually read it.
    This file defines where different types of agent guidance should be stored.

  process_files:
    standard_format:
      format: "process.yml"
      structure:
        - "goal: workflow purpose and scope"
        - "loop_context: loop participation and max iterations"
        - "inputs: list of input files with descriptions"
        - "outputs: list of expected output artifacts"
        - "steps: ordered workflow steps"
        - "guidelines: behavioral guardrails"
      when_to_use: "Use process.yml for all single-agent workflows and most multi-agent workflows"
      examples:
        - "modules/AgenticGuidance/agents/build/build-python/process.yml"
        - "modules/AgenticGuidance/agents/planner/planner-guidance/process.yml"
        - "modules/AgenticGuidance/agents/teacher/teacher-update-guidance/process.yml"

    alternative_format:
      format: "process.mmd"
      description: "Mermaid flowchart format for complex multi-agent workflows requiring visual representation"
      when_to_use: "Only use process.mmd for complex multi-agent orchestration workflows where visual flowchart adds clarity"
      requirements:
        - "Must embed goal, inputs, and guidelines as mermaid comments for parseability"
        - "Must define loop_context in comments if agent participates in loops"
        - "Consider supplementing with process.yml for structured access"
      current_usage:
        - "modules/AgenticGuidance/agents/orchestration/process.mmd (complex multi-agent coordination)"
      rationale: "Visual flowcharts help understand complex branching logic, but lack structured sections for programmatic access"

  other_artifacts:
    processes_folder:
      path: "processes/*.yml"
      purpose: "Reusable sub-workflows"
    definitions:
      path: "definitions.yml"
      purpose: "Reusable concepts (project-agnostic)"
    guidelines:
      path: "guidelines.yml"
      purpose: "Universal principles (project-agnostic)"
    examples:
      path: "examples/*.yml"
      purpose: "Project-specific examples"
    manifest:
      path: "manifest.yml"
      purpose: "Project-specific folder map"
