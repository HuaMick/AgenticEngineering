# CLI Commands Definition
# Created: 2026-01-09
# Purpose: Single source of truth for all agentic-cli commands
# Referenced by: orchestration-executor/inputs.yml, orchestration-planning/inputs.yml

cli_commands:
  description: |
    Use agentic-cli for deterministic operations instead of manual execution.
    This reduces agent complexity and ensures consistent behavior.

    SIGNPOST: To extend CLI commands:
    1. Add new command to appropriate category below
    2. Update cli-commands.yml in this file
    3. Reference from inputs.yml files that need the command
    4. Document usage in command description

  worktree:
    create:
      command: "agentic worktree create <branch> --base <base-branch>"
      description: "Create git worktree with automatic plan folder structure"
      parameters:
        branch: "Feature branch name to create"
        base-branch: "Base branch to create from (e.g., main)"
      example: "agentic worktree create feature_auth --base main"

    list:
      command: "agentic worktree list"
      description: "List all git worktrees in repository"

    status:
      command: "agentic worktree status"
      description: "Show status of current worktree including plan folder"

  plan:
    init:
      command: "agentic agent plan init <branch> [--description <desc>] [--base <base-branch>]"
      description: |
        Initialize worktree and plan folder with enforced naming convention.
        Combines worktree creation (if needed) with plan folder scaffolding.
        Naming convention (YYMMDDXX_description) is enforced programmatically.

        MAIN-FIRST PLANNING: Plan folders are ALWAYS created in the main worktree,
        even when run from a feature worktree. This ensures all plans are visible
        from a single location (main worktree's docs/plans/live/) before execution.
        - Plan folder: Created in main worktree's docs/plans/live/
        - Feature worktree: Created (or reused) for execution
      parameters:
        branch: "Branch name for worktree (required)"
        --description/-d: "Plan description for folder name (optional, defaults to branch)"
        --base/-b: "Base branch to create worktree from (default: main)"
      main_first_planning: true
      exit_codes:
        0: "Success - worktree and plan folder created"
        1: "Worktree creation failed or not in git repository"
        2: "Plan folder already exists (use different description)"
        3: "Invalid branch name or description"
      json_output:
        worktree: "Absolute path to feature worktree (for execution)"
        worktree_created: "Boolean - true if new worktree created, false if reused"
        branch: "Branch name"
        base: "Base branch used"
        plan_folder: "Absolute path to plan folder (IN MAIN WORKTREE, not feature worktree)"
        plan_folder_name: "Generated folder name (YYMMDDXX_description format)"
        main_worktree: "Absolute path to main worktree where plan folder was created"
      naming_convention:
        pattern: "YYMMDDXX_description"
        components:
          YYMMDD: "Current date (year/month/day)"
          XX: "2 uppercase letters from worktree path suffix (e.g., AG from -agenticguidance)"
          description: "Sanitized description (lowercase, underscores, max 50 chars)"
        regex: "^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
      examples:
        - "agentic agent plan init feature-auth --description user_authentication"
        - "agentic agent plan init bugfix --base develop"
        - "agentic -j agent plan init my-feature --description api_refactor"
      example_json_output: |
        {
          "worktree": "/home/code/MyProject-my-feature",
          "worktree_created": true,
          "branch": "my-feature",
          "base": "main",
          "plan_folder": "/home/code/MyProject/docs/plans/live/260119MF_api_refactor",
          "plan_folder_name": "260119MF_api_refactor",
          "main_worktree": "/home/code/MyProject"
        }
        Note: plan_folder points to MAIN worktree, not the feature worktree.
      note: "Prefer this over 'worktree create' + 'plan scaffold' for new plans"
      reference: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml#Main-First Planning"

    validate:
      command: "agentic agent plan validate <plan_folder_path>"
      description: "Validate plan folder structure and required files"
      parameters:
        plan_folder_path: "Path to plan folder (e.g., docs/plans/live/260115AG_feature)"

    status:
      command: "agentic plan status --path <plan_folder>"
      description: "Show status of plan including phase completion"
      parameters:
        plan_folder: "Path to plan folder"

    list:
      command: "agentic plan list"
      description: "List all plans in docs/plans/live/"

    scaffold:
      command: "agentic agent plan scaffold <name> --worktree <path>"
      description: "Create plan folder structure from template (low-level, prefer plan init)"
      parameters:
        name: "Plan name in YYMMDDXX_description format (e.g., 260115AG_feature_auth)"
        path: "Worktree path for plan creation"
      note: "Prefer 'agentic agent plan init' which generates correct naming automatically"

    task_start:
      command: "agentic agent plan task start <task_id> --plan <plan_folder>"
      description: |
        Mark task as in_progress. Supports nested task structure (phases[].tasks[]).
        Searches both 'id' and 'task_id' field names.
      parameters:
        task_id: "Task ID from plan file (e.g., FI-001, CL-002)"
        plan_folder: "Path to plan folder"
      nested_structure: |
        Works with tasks nested under phases:
          phases:
            - phase_id: "P1"
              tasks:
                - id: "FI-001"  # Can use 'id' or 'task_id'
                  status: "pending"
      example: "agentic agent plan task start FI-001 --plan docs/plans/live/260127FI_feature"

    task_complete:
      command: "agentic agent plan task complete <task_id> --plan <plan_folder>"
      description: |
        Mark task as completed. Supports nested task structure (phases[].tasks[]).
        Searches both 'id' and 'task_id' field names.
      parameters:
        task_id: "Task ID from plan file (e.g., FI-001, CL-002)"
        plan_folder: "Path to plan folder"
      example: "agentic agent plan task complete FI-001 --plan docs/plans/live/260127FI_feature"

    task_list:
      command: "agentic agent plan task list --plan <plan_folder> [--status <filter>] [--verbose]"
      description: |
        List all tasks in plan folder. Supports nested task structure (phases[].tasks[]).
        Shows task ID, description, status, and phase information.
      parameters:
        plan_folder: "Path to plan folder"
        --status/-s: "Filter by status: all, pending, in_progress, completed (default: all)"
        --verbose/-v: "Show full task details including guidance"
      examples:
        - "agentic agent plan task list --plan docs/plans/live/260127FI_feature"
        - "agentic agent plan task list --plan docs/plans/live/260127FI_feature --status pending"
        - "agentic agent plan task list -p docs/plans/live/260127FI_feature -v"

    task_current:
      command: "agentic agent plan task current --plan <plan_folder>"
      description: |
        Get current/next task to work on. Returns first in_progress task,
        or first pending if none in progress. Supports nested task structure.
        This is the primary "what should I do next?" query for agents.
      parameters:
        plan_folder: "Path to plan folder"
      json_output:
        plan_folder: "Plan folder name"
        task: "Full task object with id, name, description, status, phase, guidance, inputs, target_files"
        all_complete: "Boolean - true if all tasks are completed"
      example: "agentic agent plan task current --plan docs/plans/live/260127FI_feature"

    task_status:
      command: "agentic agent plan task status <task_id> --plan <plan_folder>"
      description: |
        Show detailed status for a specific task. Includes guidance, inputs,
        target files, and phase information. Supports nested task structure.
      parameters:
        task_id: "Task ID to query"
        plan_folder: "Path to plan folder"
      example: "agentic agent plan task status FI-001 --plan docs/plans/live/260127FI_feature"

    task_update:
      command: "agentic agent plan task update <task_id> --status <new_status> --plan <plan_folder> [--note <note>]"
      description: |
        Update task status with optional note. Supports nested task structure.
        More flexible than start/complete for arbitrary status changes.
      parameters:
        task_id: "Task ID to update"
        --status/-s: "New status value"
        plan_folder: "Path to plan folder"
        --note/-n: "Optional note to add to task"
      example: "agentic agent plan task update FI-001 --status blocked --plan docs/plans/live/260127FI_feature"

    move_task:
      command: "agentic agent plan move task <task_id> --plan <plan_folder>"
      description: "Move single task to completed folder"
      parameters:
        task_id: "Task ID to move"
        plan_folder: "Path to plan folder"

    move_tasks:
      command: "agentic agent plan move tasks --plan <plan_folder>"
      description: "Move all completed tasks to plan_completed.yml"
      parameters:
        plan_folder: "Path to plan folder"

    move_folder:
      command: "agentic agent plan move folder --plan <plan_folder>"
      description: "Archive entire plan folder to completed/"
      parameters:
        plan_folder: "Path to plan folder"

  context:
    # CCI (CLI Context Injection) pattern commands
    # Used by agents to bootstrap their context via CLI rather than file exploration
    # Reference: docs/CCI_CONTEXT_ARCHITECTURE.md
    bootstrap:
      command: "agentic agent context bootstrap --role <agent-role> [-j]"
      description: |
        Bootstrap agent context with structured file paths and role information.
        Part of the CCI (CLI Context Injection) pattern where agents retrieve
        context on-demand via CLI instead of pre-loading markdown files.

        Returns:
        - Agent role and category
        - Process file path
        - Inputs file path
        - Manifest file path
        - Key file paths for the agent's operation
      parameters:
        --role/-r: "Agent role identifier (e.g., build-python, orchestration-planning)"
        -j: "Output in JSON format for machine parsing"
      json_output:
        role: "Agent role identifier"
        category: "Agent category (build, test, orchestration, etc.)"
        process_path: "Path to agent's process.yml file"
        inputs_path: "Path to agent's inputs.yml file"
        manifest_path: "Path to agent's manifest.yml file"
        context_files: "Array of additional context file paths"
      examples:
        - "agentic agent context bootstrap --role build-python -j"
        - "agentic agent context bootstrap --role orchestration-planning -j"
        - "agentic agent context bootstrap -r test-runner"
      note: "Primary entry point for CCI pattern - replaces file exploration with deterministic CLI. NOTE: Old path 'agentic context bootstrap ...' has been removed. Use 'agentic agent context bootstrap ...'."

    role:
      command: "agentic agent context role <role-id> [-j]"
      description: "Get role-specific process and guidance for an agent"
      parameters:
        role-id: "Agent role identifier"
        -j: "Output in JSON format"
      note: "NOTE: Old path 'agentic context role ...' has been removed. Use 'agentic agent context role ...'."

    task:
      command: "agentic agent context task [-j]"
      description: "Get current task from the main worktree plan"
      parameters:
        -j: "Output in JSON format"
      note: "NOTE: Old path 'agentic context task ...' has been removed. Use 'agentic agent context task ...'."

    inputs:
      command: "agentic agent context inputs --role <agent-role> [-j]"
      description: "Get manifest of input files for an agent role (CCI pattern)"
      parameters:
        --role/-r: "Agent role identifier"
        -j: "Output in JSON format"
      note: "NOTE: Old path 'agentic context inputs ...' has been removed. Use 'agentic agent context inputs ...'."

  session:
    # Session management commands for spawning and managing Claude Code sessions
    # Sessions enable parallel execution across multiple worktrees/contexts
    spawn:
      command: "agentic session spawn --role <agent-role> [--directory <path> | --worktree <path>] [--plan <plan-folder>] [--task <task-id>] [-b] [-j]"
      description: |
        Spawn a new Claude Code session for parallel agent execution.
        Sessions run in isolated contexts and can target specific directories.

        Returns session ID and connection details for monitoring.
        Note: --role and --task are mutually exclusive.
        Note: --directory and --worktree are mutually exclusive (--worktree is an alias for --directory).
      parameters:
        --prompt/-p: "Direct prompt string for the session"
        --role: "Agent role identifier for the session (e.g., build-python, test-runner)"
        --task: "Task ID to spawn agent for (mutually exclusive with --role)"
        --plan: "Plan folder name for task context (optional)"
        --max-turns/-m: "Maximum agentic turns"
        --background/-b: "Run session in background"
        --directory/-d: "Working directory for session execution (optional)"
        --worktree/-w: "Worktree path for session execution (alias for --directory, mutually exclusive)"
        --dangerously-skip-permissions: "Skip permission prompts"
        -j: "Output in JSON format for machine parsing"
      json_output:
        session_id: "Unique identifier for the spawned session"
        role: "Agent role assigned to session"
        directory: "Working directory if specified"
        plan: "Plan folder path if specified"
        status: "Session status (running, pending)"
        pid: "Process ID of the session"
      exit_codes:
        0: "Success - session spawned"
        1: "Invalid role or role not found"
        2: "Directory path does not exist"
        3: "Session spawn failed"
      examples:
        - "agentic session spawn --role build-python -j"
        - "agentic session spawn --role test-runner --directory /home/code/MyProject-feature -b"
        - "agentic session spawn --role test-runner --worktree /home/code/MyProject-feature -b"
        - "agentic session spawn --role orchestration-executor --plan 260127XX_feature --dangerously-skip-permissions"

    list:
      command: "agentic session list [-j]"
      description: "List all active Claude Code sessions"
      parameters:
        -j: "Output in JSON format"
      json_output:
        sessions: "Array of session objects with id, role, status, started_at"

    stop:
      command: "agentic session stop <session-id>"
      description: "Stop a running Claude Code session"
      parameters:
        session-id: "Session ID to stop (from session list or spawn output)"
      exit_codes:
        0: "Success - session stopped"
        1: "Session not found"
        2: "Session already stopped"

    status:
      command: "agentic session status <session-id> [-j]"
      description: "Get detailed status of a specific session"
      parameters:
        session-id: "Session ID to query"
        -j: "Output in JSON format"
      json_output:
        session_id: "Session identifier"
        role: "Agent role"
        status: "Current status (running, completed, failed, stopped)"
        started_at: "Session start timestamp"
        last_activity: "Last activity timestamp"
        output_summary: "Summary of session output/progress"

  loop:
    # Ralph Loop management commands for iterative agent workflows
    # Loops are prompt-driven with configurable iteration limits
    start:
      command: "agentic loop start --prompt <text> [--entrypoint <name>] [--max-iterations <n>] [--completion-promise <text>] [-b] [-d <dir> | -w <dir>] [-j]"
      description: |
        Start a Ralph Loop for iterative agent execution.
        Loops are driven by a prompt (or entrypoint) rather than a loop-type positional arg.

        The prompt defines the iteration goal, and --completion-promise sets the
        exit condition text that must appear in output to terminate the loop.
        Note: --directory and --worktree are mutually exclusive (--worktree is an alias for --directory).
      parameters:
        --prompt/-p: "Direct prompt string for the loop"
        --prompt-file/-f: "Read prompt from file instead of inline"
        --entrypoint/-e: "Entrypoint reference (alternative to --prompt)"
        --max-iterations/-m: "Maximum iterations before stopping (default: 10)"
        --completion-promise/-c: "Text that must appear in output to complete loop"
        --background/-b: "Run loop in background"
        --directory/-d: "Working directory for the loop"
        --worktree/-w: "Worktree path for the loop (alias for --directory, mutually exclusive)"
        --output/-o: "Output file path"
        --dangerously-skip-permissions: "Skip permission prompts"
        -j: "Output in JSON format"
      json_output:
        loop_id: "Unique identifier for the loop instance"
        max_iterations: "Maximum iterations configured"
        status: "Loop status (running, pending)"
      exit_codes:
        0: "Success - loop started"
        1: "Missing prompt/entrypoint"
        3: "Loop start failed"
      examples:
        - "agentic loop start --prompt 'Run tests and fix failures' --max-iterations 5 -j"
        - "agentic loop start --entrypoint test-fix --completion-promise 'All tests pass' -b"
        - "agentic loop start --prompt-file loop_prompt.md -m 3 -d /home/code/MyProject"

    stop:
      command: "agentic loop stop <loop-id> [--force]"
      description: "Stop a running Ralph Loop"
      parameters:
        loop-id: "Loop ID to stop (required)"
        --force/-f: "Force kill the loop"
      exit_codes:
        0: "Success - loop stopped"
        1: "Loop not found"
        2: "Loop already stopped"

    status:
      command: "agentic loop status <loop-id> [-j]"
      description: "Get status of a specific loop"
      parameters:
        loop-id: "Loop ID to check (required)"
        -j: "Output in JSON format"
      json_output:
        loop_id: "Loop identifier"
        status: "Current status (running, completed, failed, stopped)"
        current_iteration: "Current iteration number"
        max_iterations: "Maximum iterations allowed"

    history:
      command: "agentic loop history [--active] [--status <filter>] [--limit <n>] [-j]"
      description: "Show past loop executions"
      parameters:
        --active/-a: "Show only active loops"
        --status/-s: "Filter by loop status"
        --limit/-l: "Max loops to show (default: 20)"
        -j: "Output in JSON format"
      json_output:
        entries: "Array of loop history entries with id, status, iterations, timestamps"

  entrypoint:
    # Entrypoint management commands for session context bootstrapping
    # Entrypoints provide pre-defined context templates for agent sessions
    # Reference: modules/AgenticCLI/agentic_cli/commands/entrypoint.py
    description: "Manage and execute entrypoints for session context bootstrapping"

    list:
      command: "agentic agent entrypoint list [-j]"
      description: "List available entrypoints"
      parameters:
        -j: "Output in JSON format"
      json_output:
        entrypoints: "Array of entrypoint names and descriptions"
      examples:
        - "agentic agent entrypoint list"
        - "agentic agent entrypoint list -j"
      note: "NOTE: Old path 'agentic entrypoint list ...' has been removed. Use 'agentic agent entrypoint list ...'."

    show:
      command: "agentic agent entrypoint show <name> [-j]"
      description: "Display entrypoint contents and metadata"
      parameters:
        name: "Entrypoint name to display"
        -j: "Output in JSON format"
      json_output:
        name: "Entrypoint name"
        description: "Entrypoint description"
        content: "Full entrypoint content"
        variables: "Array of variable placeholders in the entrypoint"
      examples:
        - "agentic agent entrypoint show builder-session"
        - "agentic agent entrypoint show orchestration-planning -j"
      note: "NOTE: Old path 'agentic entrypoint show ...' has been removed. Use 'agentic agent entrypoint show ...'."

    execute:
      command: "agentic agent entrypoint execute <name> [--vars KEY=VAL ...] [--compile] [-j]"
      description: |
        Execute entrypoint for agent consumption, rendering variables.
        With --compile flag, recursively resolves all file references and outputs
        a complete context bundle - eliminating the need for manual file reading.
      parameters:
        name: "Entrypoint name to execute"
        --vars: "Variable substitutions in KEY=VAL format (repeatable)"
        --compile/-c: "Compile complete context bundle by recursively resolving all file references"
        -j: "Output in JSON format"
      compile_flag:
        description: |
          The --compile flag enables CLI-First Context pattern:
          - Recursively resolves all path: references in inputs.yml files
          - Outputs complete context as structured sections
          - Eliminates need for Read/Glob/Grep during agent bootstrap
          - Each referenced file becomes a labeled section in output
        replaces_manual_reading: |
          BEFORE (manual file reading):
            1. Read entrypoint file
            2. Read process.yml
            3. Read inputs.yml
            4. For each path: in inputs.yml, Read that file
            5. Repeat for nested references

          AFTER (CLI-first):
            agentic agent entrypoint execute <name> --compile

          Single command provides all context needed for agent bootstrap.
        output_format: |
          Multi-section output with headers:
          === ENTRYPOINT: <name> ===
          [entrypoint content]

          === FILE: <path1> ===
          [file1 content]

          === FILE: <path2> ===
          [file2 content]
          ...
      json_output:
        name: "Entrypoint name"
        rendered_content: "Entrypoint content with variables substituted"
        variables_used: "Object of variables that were substituted"
        compiled_files: "Array of resolved file paths (when --compile used)"
        compiled_content: "Object mapping paths to file contents (when --compile used)"
      exit_codes:
        0: "Success - entrypoint executed and rendered"
        1: "Entrypoint not found"
        2: "Missing required variable"
        3: "Invalid variable format"
      examples:
        - "agentic agent entrypoint execute builder-session"
        - "agentic agent entrypoint execute plan-executor --vars PLAN_PATH=docs/plans/live/260127XX_feature"
        - "agentic agent entrypoint execute orchestration-planning --vars OBJECTIVE='Implement auth' --vars SCOPE=backend -j"
        - "agentic agent entrypoint execute _plan_teach --compile"
        - "agentic agent entrypoint execute _plan_build --compile"
        - "agentic -j agent entrypoint execute _orchestrate --compile"
      note: "NOTE: Old path 'agentic entrypoint execute ...' has been removed. Use 'agentic agent entrypoint execute ...'."

usage_notes:
  # CLI-FIRST CONTEXT PRINCIPLE
  cli_first_context:
    principle: |
      CLI-First Context: Always use agentic CLI commands for initial context.
      Agents should not need Read/Glob/Grep tools during bootstrap phase.
    implementation:
      - "Use 'agentic agent entrypoint execute <name> --compile' for complete context bundles"
      - "Use 'agentic agent context bootstrap --role <role>' for role-specific context"
      - "Use 'agentic agent plan task current' for task context"
    benefits:
      - "Eliminates repetitive file reading across agent sessions"
      - "Ensures consistent context delivery"
      - "Reduces token usage by providing pre-compiled context"
      - "Enables deterministic agent bootstrap without exploration phase"

  general:
    - "CLI commands are executed by orchestration agents directly (tool-offloading pattern)"
    - "Prefer CLI over manual file operations for consistency"
    - "CLI validates inputs and enforces naming conventions programmatically"
    - "Errors are returned with actionable messages and exit codes"
    - "Use 'agentic agent plan init' as primary entry point for new plans (replaces deploy-worktree spawn)"
    - "JSON output (-j flag) available for machine-parseable responses"
    - "CCI context commands (agent context bootstrap, agent context role, etc.) provide deterministic context retrieval"
    - "Session commands enable parallel Claude Code execution across worktrees"
    - "Loop commands manage iterative workflows via prompt-driven iteration"
