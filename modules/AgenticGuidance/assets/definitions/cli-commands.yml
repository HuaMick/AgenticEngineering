# CLI Commands Definition
# Created: 2026-01-09
# Purpose: Single source of truth for all agentic-cli commands
# Referenced by: orchestration-build/inputs.yml, orchestration-planning/inputs.yml

cli_commands:
  description: |
    Use agentic-cli for deterministic operations instead of manual execution.
    This reduces agent complexity and ensures consistent behavior.

    SIGNPOST: To extend CLI commands:
    1. Add new command to appropriate category below
    2. Update cli-commands.yml in this file
    3. Reference from inputs.yml files that need the command
    4. Document usage in command description

  worktree:
    create:
      command: "agentic worktree create <branch> --base <base-branch>"
      description: "Create git worktree with automatic plan folder structure"
      parameters:
        branch: "Feature branch name to create"
        base-branch: "Base branch to create from (e.g., main)"
      example: "agentic worktree create feature_auth --base main"

    list:
      command: "agentic worktree list"
      description: "List all git worktrees in repository"

    status:
      command: "agentic worktree status"
      description: "Show status of current worktree including plan folder"

  plan:
    init:
      command: "agentic plan init <branch> --description <desc> --base <base-branch>"
      description: |
        Initialize worktree and plan folder with YYMMDDXX_description naming.
        Combines worktree creation (if not exists) with plan folder scaffolding.
        Enforces naming convention programmatically - eliminates agent interpretation errors.
        PREFERRED over manual worktree + scaffold for new plan creation.
      parameters:
        branch: "Branch name for worktree (required)"
        desc: "Plan description for folder name (defaults to branch name)"
        base-branch: "Base branch to create worktree from (default: main)"
      examples:
        - "agentic plan init agenticguidance --description naming_audit"
        - "agentic plan init feature-auth --base develop"
        - "agentic -j plan init test-branch --description my_feature"
      exit_codes:
        "0": "Success - folder created"
        "1": "Worktree creation failed"
        "2": "Plan folder already exists"
        "3": "Invalid branch name or description"
      output_json:
        worktree: "Path to worktree directory"
        worktree_created: "Boolean - whether worktree was newly created"
        branch: "Branch name"
        base: "Base branch used"
        plan_folder: "Full path to created plan folder"
        plan_folder_name: "Generated folder name (YYMMDDXX_description)"
      naming_algorithm: |
        1. Parse worktree path (e.g., /home/code/AgenticEngineering-agenticguidance)
        2. Extract suffix after last hyphen (e.g., agenticguidance)
        3. Take first 2 characters, uppercase (e.g., AG)
        4. Generate: YYMMDD + XX + _ + sanitized_description
        Example: 260115AG_naming_audit

    validate:
      command: "agentic plan validate <plan_folder_path>"
      description: "Validate plan folder structure and required files"
      parameters:
        plan_folder_path: "Path to plan folder (e.g., docs/plans/live/260115AG_naming_audit)"

    status:
      command: "agentic plan status --path <plan_folder>"
      description: "Show status of plan including phase completion"
      parameters:
        plan_folder: "Path to plan folder"

    list:
      command: "agentic plan list"
      description: "List all plans in docs/plans/live/"

    scaffold:
      command: "agentic plan scaffold <name> --worktree <path>"
      description: |
        Create plan folder structure from template.
        NOTE: Prefer 'plan init' for new plans - it handles worktree + naming automatically.
        Use scaffold only when worktree already exists and you need additional plan folders.
      parameters:
        name: "Plan name in YYMMDDXX_description format"
        path: "Worktree path for plan creation"

    task_start:
      command: "agentic plan task start <task_id> --plan <plan_folder>"
      description: "Mark task as in_progress"
      parameters:
        task_id: "Task ID from plan file"
        plan_folder: "Path to plan folder"

    task_complete:
      command: "agentic plan task complete <task_id> --plan <plan_folder>"
      description: "Mark task as completed"
      parameters:
        task_id: "Task ID from plan file"
        plan_folder: "Path to plan folder"

    move_task:
      command: "agentic plan move task <task_id> --plan <plan_folder>"
      description: "Move single task to completed folder"
      parameters:
        task_id: "Task ID to move"
        plan_folder: "Path to plan folder"

    move_tasks:
      command: "agentic plan move tasks --plan <plan_folder>"
      description: "Move all completed tasks to plan_completed.yml"
      parameters:
        plan_folder: "Path to plan folder"

    move_folder:
      command: "agentic plan move folder --plan <plan_folder>"
      description: "Archive entire plan folder to completed/"
      parameters:
        plan_folder: "Path to plan folder"

usage_notes:
  - "CLI commands are executed by deploy-worktree and orchestration agents"
  - "Prefer CLI over manual file operations for consistency"
  - "CLI validates inputs before execution"
  - "Errors are returned with actionable messages"
  - "TOOL-OFFLOADING: Deterministic operations belong in CLI, not agent guidance"
  - "Reference: modules/AgenticGuidance/assets/guidelines/tool-offloading.yml"

recommended_workflow:
  new_plan: |
    For new plans, use 'agentic plan init' which:
    1. Creates worktree if not exists
    2. Generates correct YYMMDDXX_description folder name
    3. Scaffolds plan structure (live/, completed/, placeholder files)
    Example: agentic plan init my-feature --description auth_implementation

  existing_worktree: |
    If worktree already exists and you need additional plan folders:
    1. Use 'agentic plan scaffold' with explicit name
    2. Or use 'agentic plan init' - it will detect existing worktree
    Example: agentic plan init my-feature --description second_plan
