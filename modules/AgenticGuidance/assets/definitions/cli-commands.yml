# CLI Commands Definition
# Created: 2026-01-09
# Updated: 2026-03-02 - Renamed plan->epic, task->ticket per remap plan
# Purpose: Single source of truth for all agentic-cli commands
# Referenced by: orchestration-executor/inputs.yml, orchestration-planning/inputs.yml

cli_commands:
  description: |
    Use agentic-cli for deterministic operations instead of manual execution.
    This reduces agent complexity and ensures consistent behavior.

    SIGNPOST: To extend CLI commands:
    1. Add new command to appropriate category below
    2. Update cli-commands.yml in this file
    3. Reference from inputs.yml files that need the command
    4. Document usage in command description

  epic:
    init:
      command: "agentic epic new <branch> [--description <desc>]"
      description: |
        Initialize an epic folder with enforced naming convention.
        Creates epic folder scaffolding in docs/epics/live/.
        Naming convention (YYMMDDXX_description) is enforced programmatically.
      parameters:
        branch: "Branch name for the epic (required)"
        --description/-d: "Epic description for folder name (optional, defaults to branch)"
      exit_codes:
        0: "Success - epic folder created"
        1: "Not in git repository"
        2: "Epic folder already exists (use different description)"
        3: "Invalid branch name or description"
      json_output:
        branch: "Branch name"
        epic_folder: "Absolute path to epic folder"
        epic_folder_name: "Generated folder name (YYMMDDXX_description format)"
      naming_convention:
        pattern: "YYMMDDXX_description"
        components:
          YYMMDD: "Current date (year/month/day)"
          XX: "2 uppercase letters (e.g., from branch name suffix)"
          description: "Sanitized description (lowercase, underscores, max 50 chars)"
        regex: "^\\d{6}[A-Z]{2}_[a-z0-9_]+$"
      examples:
        - "agentic epic new feature-auth --description user_authentication"
        - "agentic -j agent epic init my-feature --description api_refactor"

    validate:
      command: "agentic epic validate <epic_folder_path>"
      description: "Validate epic folder structure and required files"
      parameters:
        epic_folder_path: "Path to epic folder (e.g., docs/epics/live/260115AG_feature)"

    status:
      command: "agentic epic status --path <epic_folder>"
      description: "Show status of epic including phase completion"
      parameters:
        epic_folder: "Path to epic folder"

    list:
      command: "agentic epic list"
      description: "List all epics in docs/epics/live/"

    scaffold:
      command: "agentic epic scaffold <name>"
      description: "Create epic folder structure from template (low-level, prefer epic init)"
      parameters:
        name: "Epic name in YYMMDDXX_description format (e.g., 260115AG_feature_auth)"
      note: "Prefer 'agentic epic new' which generates correct naming automatically"

    ticket_start:
      command: "agentic epic ticket start <ticket_id> --epic <epic_folder>"
      description: |
        Mark ticket as in_progress. Supports nested ticket structure (phases[].tickets[]).
        Searches both 'id' and 'ticket_id' field names.
      parameters:
        ticket_id: "Ticket ID from epic file (e.g., FI-001, CL-002)"
        epic_folder: "Path to epic folder"
      nested_structure: |
        Works with tickets nested under phases:
          phases:
            - phase_id: "P1"
              tickets:
                - id: "FI-001"  # Can use 'id' or 'ticket_id'
                  status: "pending"
      example: "agentic epic ticket start FI-001 --epic docs/epics/live/260127FI_feature"

    ticket_complete:
      command: "agentic epic ticket complete <ticket_id> --epic <epic_folder>"
      description: |
        Mark ticket as completed. Supports nested ticket structure (phases[].tickets[]).
        Searches both 'id' and 'ticket_id' field names.
      parameters:
        ticket_id: "Ticket ID from epic file (e.g., FI-001, CL-002)"
        epic_folder: "Path to epic folder"
      example: "agentic epic ticket complete FI-001 --epic docs/epics/live/260127FI_feature"

    ticket_list:
      command: "agentic epic ticket list --epic <epic_folder> [--status <filter>] [--verbose]"
      description: |
        List all tickets in epic folder. Supports nested ticket structure (phases[].tickets[]).
        Shows ticket ID, description, status, and phase information.
      parameters:
        epic_folder: "Path to epic folder"
        --status/-s: "Filter by status: all, pending, in_progress, completed (default: all)"
        --verbose/-v: "Show full ticket details including guidance"
      examples:
        - "agentic epic ticket list --epic docs/epics/live/260127FI_feature"
        - "agentic epic ticket list --epic docs/epics/live/260127FI_feature --status pending"
        - "agentic epic ticket list -p docs/epics/live/260127FI_feature -v"

    ticket_current:
      command: "agentic epic ticket current --epic <epic_folder>"
      description: |
        Get current/next ticket to work on. Returns first in_progress ticket,
        or first pending if none in progress. Supports nested ticket structure.
        This is the primary "what should I do next?" query for agents.
      parameters:
        epic_folder: "Path to epic folder"
      json_output:
        epic_folder: "Epic folder name"
        ticket: "Full ticket object with id, name, description, status, phase, guidance, inputs, target_files"
        all_complete: "Boolean - true if all tickets are completed"
      example: "agentic epic ticket current --epic docs/epics/live/260127FI_feature"

    ticket_status:
      command: "agentic epic ticket status <ticket_id> --epic <epic_folder>"
      description: |
        Show detailed status for a specific ticket. Includes guidance, inputs,
        target files, and phase information. Supports nested ticket structure.
      parameters:
        ticket_id: "Ticket ID to query"
        epic_folder: "Path to epic folder"
      example: "agentic epic ticket status FI-001 --epic docs/epics/live/260127FI_feature"

    ticket_update:
      command: "agentic epic ticket update <ticket_id> --status <new_status> --epic <epic_folder> [--note <note>]"
      description: |
        Update ticket status with optional note. Supports nested ticket structure.
        More flexible than start/complete for arbitrary status changes.
      parameters:
        ticket_id: "Ticket ID to update"
        --status/-s: "New status value"
        epic_folder: "Path to epic folder"
        --note/-n: "Optional note to add to ticket"
      example: "agentic epic ticket update FI-001 --status blocked --epic docs/epics/live/260127FI_feature"

    move_ticket:
      command: "agentic epic move ticket <ticket_id> --epic <epic_folder>"
      description: "Move single ticket to completed folder"
      parameters:
        ticket_id: "Ticket ID to move"
        epic_folder: "Path to epic folder"

    move_tickets:
      command: "agentic epic move tickets --epic <epic_folder>"
      description: "Move all completed tickets to epic_completed.yml"
      parameters:
        epic_folder: "Path to epic folder"

    move_folder:
      command: "agentic epic move folder --epic <epic_folder>"
      description: "Archive entire epic folder to completed/"
      parameters:
        epic_folder: "Path to epic folder"

  deprecated_aliases:
    # These aliases existed prior to 2026-03-02. They map old plan/task commands
    # to the current epic/ticket equivalents. Do not use these in new agent code.
    description: |
      The following agentic plan ... and agentic plan task ... commands are
      deprecated as of 2026-03-02. Use the epic/ticket equivalents instead.
      Aliases may still work during a transition period but will be removed.
    commands:
      - old: "agentic plan list"
        new: "agentic epic list"
      - old: "agentic plan status --path <plan_folder>"
        new: "agentic epic status --path <epic_folder>"
      - old: "agentic plan init <branch>"
        new: "agentic epic new <branch>"
      - old: "agentic plan validate <plan_folder_path>"
        new: "agentic epic validate <epic_folder_path>"
      - old: "agentic plan scaffold <name>"
        new: "agentic epic scaffold <name>"
      - old: "agentic plan task start <task_id> --plan <plan_folder>"
        new: "agentic epic ticket start <ticket_id> --epic <epic_folder>"
      - old: "agentic plan task complete <task_id> --plan <plan_folder>"
        new: "agentic epic ticket complete <ticket_id> --epic <epic_folder>"
      - old: "agentic plan task list --plan <plan_folder>"
        new: "agentic epic ticket list --epic <epic_folder>"
      - old: "agentic plan task current --plan <plan_folder>"
        new: "agentic epic ticket current --epic <epic_folder>"
      - old: "agentic plan task status <task_id> --plan <plan_folder>"
        new: "agentic epic ticket status <ticket_id> --epic <epic_folder>"
      - old: "agentic plan task update <task_id> --plan <plan_folder>"
        new: "agentic epic ticket update <ticket_id> --epic <epic_folder>"
      - old: "agentic plan move task <task_id> --plan <plan_folder>"
        new: "agentic epic move ticket <ticket_id> --epic <epic_folder>"
      - old: "agentic plan move tasks --plan <plan_folder>"
        new: "agentic epic move tickets --epic <epic_folder>"
      - old: "agentic plan move folder --plan <plan_folder>"
        new: "agentic epic move folder --epic <epic_folder>"
    json_output_renames:
      - old_field: "plan_folder"
        new_field: "epic_folder"
      - old_field: "plan_folder_name"
        new_field: "epic_folder_name"

  context:
    # CCI (CLI Context Injection) pattern commands
    # Used by agents to bootstrap their context via CLI rather than file exploration
    # Reference: docs/CCI_CONTEXT_ARCHITECTURE.md
    bootstrap:
      command: "agentic epic status --epic <epic> --role <agent-role> [-j]"
      description: |
        Bootstrap agent context with structured file paths and role information.
        Part of the CCI (CLI Context Injection) pattern where agents retrieve
        context on-demand via CLI instead of pre-loading markdown files.

        Returns:
        - Agent role and category
        - Process file path
        - Inputs file path
        - Manifest file path
        - Key file paths for the agent's operation
      parameters:
        --role/-r: "Agent role identifier (e.g., build-python, orchestration-planning)"
        -j: "Output in JSON format for machine parsing"
      json_output:
        role: "Agent role identifier"
        category: "Agent category (build, test, orchestration, etc.)"
        process_path: "Path to agent's process.yml file"
        inputs_path: "Path to agent's inputs.yml file"
        manifest_path: "Path to agent's manifest.yml file"
        context_files: "Array of additional context file paths"
      examples:
        - "agentic epic status --epic <epic> --role build-python -j"
        - "agentic epic status --epic <epic> --role orchestration-planning -j"
        - "agentic epic status --epic <epic> -r test-builder"
      note: "Primary entry point for CCI pattern - replaces file exploration with deterministic CLI. NOTE: Old path 'agentic context bootstrap ...' has been removed. Use 'agentic epic status --epic <epic> ...'."

    role:
      command: "agentic epic status --epic <epic> <role-id> [-j]"
      description: "Get role-specific process and guidance for an agent"
      parameters:
        role-id: "Agent role identifier"
        -j: "Output in JSON format"
      note: "NOTE: Old path 'agentic context role ...' has been removed. Use 'agentic epic status --epic <epic> ...'."

    task:
      command: "agentic epic ticket current [-j]"
      description: "Get current ticket from the active epic"
      parameters:
        -j: "Output in JSON format"
      note: "NOTE: Old path 'agentic context task ...' has been removed. Use 'agentic epic ticket current ...'."

    inputs:
      command: "agentic epic ticket list --role <agent-role> [-j]"
      description: "Get manifest of input files for an agent role (CCI pattern)"
      parameters:
        --role/-r: "Agent role identifier"
        -j: "Output in JSON format"
      note: "NOTE: Old path 'agentic context inputs ...' has been removed. Use 'agentic epic ticket list ...'."

  orchestrate:
    # Orchestration commands for spawning and managing sessions and epics
    # Sessions enable parallel execution across multiple directories/contexts
    session_spawn:
      command: "agentic orchestrate session spawn --role <agent-role> [--directory <path>] [--epic <epic-folder>] [--ticket <ticket-id>] [-b] [-j]"
      description: |
        Spawn a new Claude Code session for parallel agent execution.
        Sessions run in isolated contexts and can target specific directories.

        Returns session ID and connection details for monitoring.
        Note: --role and --ticket are mutually exclusive.
      parameters:
        --prompt/-p: "Direct prompt string for the session"
        --role: "Agent role identifier for the session (e.g., build-python, test-builder)"
        --ticket: "Ticket ID to spawn agent for (mutually exclusive with --role)"
        --epic: "Epic folder name for ticket context (optional)"
        --max-turns/-m: "Maximum agentic turns"
        --background/-b: "Run session in background"
        --directory/-d: "Working directory for session execution (optional)"
        --dangerously-skip-permissions: "Skip permission prompts"
        -j: "Output in JSON format for machine parsing"
      json_output:
        session_id: "Unique identifier for the spawned session"
        role: "Agent role assigned to session"
        directory: "Working directory if specified"
        epic: "Epic folder path if specified"
        status: "Session status (running, pending)"
        pid: "Process ID of the session"
      exit_codes:
        0: "Success - session spawned"
        1: "Invalid role or role not found"
        2: "Directory path does not exist"
        3: "Session spawn failed"
      examples:
        - "agentic orchestrate session spawn --role build-python -j"
        - "agentic orchestrate session spawn --role test-builder --directory /home/code/MyProject -b"
        - "agentic orchestrate session spawn --role orchestration-executor --epic 260127XX_feature --dangerously-skip-permissions"

    session_list:
      command: "agentic orchestrate session list [-j]"
      description: "List all active Claude Code sessions"
      parameters:
        -j: "Output in JSON format"
      json_output:
        sessions: "Array of session objects with id, role, status, started_at"

    session_stop:
      command: "agentic orchestrate session stop <session-id>"
      description: "Stop a running Claude Code session"
      parameters:
        session-id: "Session ID to stop (from session list or spawn output)"
      exit_codes:
        0: "Success - session stopped"
        1: "Session not found"
        2: "Session already stopped"

    health:
      command: "agentic orchestrate health <session-id> [-j]"
      description: "Get detailed health status of a specific session"
      parameters:
        session-id: "Session ID to query"
        -j: "Output in JSON format"
      json_output:
        session_id: "Session identifier"
        role: "Agent role"
        status: "Current status (running, completed, failed, stopped)"
        started_at: "Session start timestamp"
        last_activity: "Last activity timestamp"
        output_summary: "Summary of session output/progress"

    debug_logs:
      command: "agentic orchestrate debug logs <session-id>"
      description: "Get session output logs"
      parameters:
        session-id: "Session ID to retrieve logs for"

    debug_state:
      command: "agentic orchestrate debug state <subcommand>"
      description: "Session state inspection"
      subcommands:
        list: "List all session states"
        show: "Show state for a specific session"
        clear: "Clear session state"
        cleanup: "Clean up stale session states"

    session_plan:
      command: "agentic orchestrate session plan [--plan <epic-folder>]"
      description: "Create orchestration plan for an epic (spawns planner agents)"
      parameters:
        --plan: "Scope to a specific epic folder (optional, processes all unplanned epics if omitted)"
      examples:
        - "agentic orchestrate session plan --plan docs/epics/live/260127XX_feature"
        - "agentic orchestrate session plan"

    session_implement:
      command: "agentic orchestrate session implement [--plan <epic-folder>]"
      description: "Execute phases for an epic via agents"
      parameters:
        --plan: "Scope to a specific epic folder (optional, processes all ready epics if omitted)"
      examples:
        - "agentic orchestrate session implement --plan docs/epics/live/260127XX_feature"
        - "agentic orchestrate session implement"

  entrypoint:
    # Entrypoint management commands for session context bootstrapping
    # Entrypoints provide pre-defined context templates for agent sessions
    # Reference: modules/AgenticCLI/agentic_cli/commands/entrypoint.py
    description: "Manage and execute entrypoints for session context bootstrapping"

    list:
      command: "agentic orchestrate session spawn list [-j]"
      description: "List available entrypoints"
      parameters:
        -j: "Output in JSON format"
      json_output:
        entrypoints: "Array of entrypoint names and descriptions"
      examples:
        - "agentic orchestrate session spawn list"
        - "agentic orchestrate session spawn list -j"
      note: "NOTE: Old path 'agentic entrypoint list ...' has been removed. Use 'agentic orchestrate session spawn list ...'."

    show:
      command: "agentic orchestrate session spawn show <name> [-j]"
      description: "Display entrypoint contents and metadata"
      parameters:
        name: "Entrypoint name to display"
        -j: "Output in JSON format"
      json_output:
        name: "Entrypoint name"
        description: "Entrypoint description"
        content: "Full entrypoint content"
        variables: "Array of variable placeholders in the entrypoint"
      examples:
        - "agentic orchestrate session spawn show builder-session"
        - "agentic orchestrate session spawn show orchestration-planning -j"
      note: "NOTE: Old path 'agentic entrypoint show ...' has been removed. Use 'agentic orchestrate session spawn show ...'."

    execute:
      command: "agentic orchestrate session spawn execute <name> [--vars KEY=VAL ...] [--compile] [-j]"
      description: |
        Execute entrypoint for agent consumption, rendering variables.
        With --compile flag, recursively resolves all file references and outputs
        a complete context bundle - eliminating the need for manual file reading.
      parameters:
        name: "Entrypoint name to execute"
        --vars: "Variable substitutions in KEY=VAL format (repeatable)"
        --compile/-c: "Compile complete context bundle by recursively resolving all file references"
        -j: "Output in JSON format"
      compile_flag:
        description: |
          The --compile flag enables CLI-First Context pattern:
          - Recursively resolves all path: references in inputs.yml files
          - Outputs complete context as structured sections
          - Eliminates need for Read/Glob/Grep during agent bootstrap
          - Each referenced file becomes a labeled section in output
        replaces_manual_reading: |
          BEFORE (manual file reading):
            1. Read entrypoint file
            2. Read process.yml
            3. Read inputs.yml
            4. For each path: in inputs.yml, Read that file
            5. Repeat for nested references

          AFTER (CLI-first):
            agentic orchestrate session spawn execute <name> --compile

          Single command provides all context needed for agent bootstrap.
        output_format: |
          Multi-section output with headers:
          === ENTRYPOINT: <name> ===
          [entrypoint content]

          === FILE: <path1> ===
          [file1 content]

          === FILE: <path2> ===
          [file2 content]
          ...
      json_output:
        name: "Entrypoint name"
        rendered_content: "Entrypoint content with variables substituted"
        variables_used: "Object of variables that were substituted"
        compiled_files: "Array of resolved file paths (when --compile used)"
        compiled_content: "Object mapping paths to file contents (when --compile used)"
      exit_codes:
        0: "Success - entrypoint executed and rendered"
        1: "Entrypoint not found"
        2: "Missing required variable"
        3: "Invalid variable format"
      examples:
        - "agentic orchestrate session spawn execute builder-session"
        - "agentic orchestrate session spawn execute epic-executor --vars EPIC_PATH=docs/epics/live/260127XX_feature"
        - "agentic orchestrate session spawn execute orchestration-planning --vars OBJECTIVE='Implement auth' --vars SCOPE=backend -j"
        - "agentic orchestrate session spawn execute _epic_teach --compile"
        - "agentic orchestrate session spawn execute _epic_build --compile"
        - "agentic -j agent entrypoint execute _orchestrate --compile"
      note: "NOTE: Old path 'agentic entrypoint execute ...' has been removed. Use 'agentic orchestrate session spawn execute ...'."

usage_notes:
  # CLI-FIRST CONTEXT PRINCIPLE
  cli_first_context:
    principle: |
      CLI-First Context: Always use agentic CLI commands for initial context.
      Agents should not need Read/Glob/Grep tools during bootstrap phase.
    implementation:
      - "Use 'agentic orchestrate session spawn execute <name> --compile' for complete context bundles"
      - "Use 'agentic epic status --epic <epic> --role <role>' for role-specific context"
      - "Use 'agentic epic ticket current' for ticket context"
    benefits:
      - "Eliminates repetitive file reading across agent sessions"
      - "Ensures consistent context delivery"
      - "Reduces token usage by providing pre-compiled context"
      - "Enables deterministic agent bootstrap without exploration phase"

  general:
    - "CLI commands are executed by orchestration agents directly (tool-offloading pattern)"
    - "Prefer CLI over manual file operations for consistency"
    - "CLI validates inputs and enforces naming conventions programmatically"
    - "Errors are returned with actionable messages and exit codes"
    - "Use 'agentic epic new' as primary entry point for new epics"
    - "JSON output (-j flag) available for machine-parseable responses"
    - "CCI context commands (agent context bootstrap, agent context role, etc.) provide deterministic context retrieval"
    - "Session commands enable parallel Claude Code execution across different directories"
