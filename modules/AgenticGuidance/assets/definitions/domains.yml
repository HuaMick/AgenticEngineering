Domains are a representation of a human understandable concept.
They should be created as a package so that they can scale to multiple files as needed.

Example from this project:
```
backend/services/agents/src/domains/
  __init__.py
  planner_agent/
    __init__.py
    planner.py
    plan_generator.py
```

Real world example:
```
backend/services/agents/src/domains/
  __init__.py
  research_agent/
    __init__.py
    research.py
    report.py
  compliance_agent/
    __init__.py
    validator.py
    rules.py
```
