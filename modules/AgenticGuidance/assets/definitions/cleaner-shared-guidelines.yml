# Cleaner Shared Guidelines
# Common guidelines referenced by cleaner-core, cleaner-identify, and cleaner-execute agents
#
# PURPOSE:
# Consolidates the 7 core guidelines shared across all cleaner agents to reduce repetition
# and ensure consistency. Each cleaner agent references this file instead of listing
# the same 7 guideline files individually.
#
# USAGE:
# Reference this file in cleaner agent inputs.yml files:
#   - type: file
#     path: "modules/AgenticGuidance/assets/definitions/cleaner-shared-guidelines.yml"
#     description: "Core cleaner guidelines (7 shared files)"
#     required: true

shared_guidelines:
  description: |
    Core guidelines that all cleaner agents (core, identify, execute) must follow.
    These guidelines provide the foundational principles for safe, minimal, and
    effective codebase cleanup operations.

  guidelines:
    - name: "context-minimisation"
      path: "modules/AgenticGuidance/assets/guidelines/context-minimisation.yml"
      description: "Provide only what's needed, remove noise"
      purpose: |
        Ensures cleaner agents focus on minimal context and avoid over-loading
        information. Critical for identifying truly unnecessary code.

    - name: "less-is-more"
      path: "modules/AgenticGuidance/assets/guidelines/less-is-more.yml"
      description: "Minimal viable change, avoid duplication"
      purpose: |
        Guides cleaner agents to make the smallest possible changes that achieve
        cleanup goals without introducing new duplication or complexity.

    - name: "safety"
      path: "modules/AgenticGuidance/assets/guidelines/safety.yml"
      description: "Safety guidelines to prevent catastrophic deletion"
      purpose: |
        CRITICAL: Prevents cleaner agents from removing protected files, core
        infrastructure, or making destructive changes without proper safeguards.

    - name: "experiment-first"
      path: "modules/AgenticGuidance/assets/guidelines/experiment-first.yml"
      description: "Discover and verify first"
      purpose: |
        Ensures cleaner agents verify file usage and dependencies before flagging
        or removing code. Prevents false positives and accidental deletions.

    - name: "worktree-and-branching"
      path: "modules/AgenticGuidance/assets/guidelines/worktree-and-branching.yml"
      description: "Worktree and branching strategy"
      purpose: |
        Defines how cleaner agents should use worktrees and branches for safe,
        isolated cleanup operations with easy rollback capabilities.

    - name: "response-audit"
      path: "modules/AgenticGuidance/assets/guidelines/response-audit.yml"
      description: "Audit-before-reply guardrail"
      purpose: |
        Requires cleaner agents to audit their planned actions before execution,
        ensuring all cleanup operations are reviewed for safety and correctness.

    - name: "testing"
      path: "modules/AgenticGuidance/assets/guidelines/testing.yml"
      description: "Quality gates and testing mindset"
      purpose: |
        Ensures cleaner agents verify that cleanup operations don't break tests
        or introduce regressions. Execute agents run syntax checks after removals.

referenced_by:
  - "cleaner/cleaner-core/inputs.yml"
  - "cleaner/cleaner-identify/inputs.yml"
  - "cleaner/cleaner-execute/inputs.yml"

impact:
  token_savings: "~600 tokens across 3 agents (7 guidelines × ~30 tokens × 3 agents)"
  maintenance: "Single source of truth for shared guidelines - update once, apply everywhere"
  consistency: "Ensures all cleaner agents follow identical core principles"
