role-separation: |
  Agents performing distinct roles should have distinct knowledge.
  Knowledge boundaries prevent conflicts and enable independent operation.
  Do not combine conflicting incentives in one agent.

  Principle:
  - Builders receive build context, not test context
  - Testers receive test context, not implementation details
  - Auditors receive criteria, not how code was written

  Why separate:
  - Prevents bias (tester who wrote code tests differently)
  - Reduces cognitive load (irrelevant context is noise)
  - Enables parallel work (no shared state confusion)
  - Catches blind spots (fresh eyes find different issues)
  - Avoids conflicting incentives (builder shouldn't judge own completion)

  Division patterns:
  - Build vs Validate (separate who makes from who checks)
  - Plan vs Execute (separate strategy from implementation)
  - Audit vs Fix (separate finding issues from resolving them)

  Example:
  - Wrong: Builder changes code and declares validation complete
  - Right: Builder implements; test/audit validates independently

  Anti-patterns:
  - One agent does everything (no checks, no boundaries)
  - Validator receives builder's reasoning (inherits assumptions)
  - Shared context "just in case" (noise defeats the purpose)

  Related: context-minimization.yml, fence.yml
