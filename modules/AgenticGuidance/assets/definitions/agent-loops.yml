# Agent Loop Definitions
# Conceptual definition of agent loops - what they are and when to use each type.
# Process files contain specific implementation details (which agents, execution patterns).
#
# SCOPE: Structure definitions only (what loops exist, their purpose, max iterations)
# For behavioral guidelines (how to behave during loops), see:
#   modules/AgenticGuidance/assets/guidelines/iteration.yml

agent_loop:
  concept: |
    An agent loop is an iterative execution pattern where multiple agents collaborate
    in cycles until success criteria are met or maximum iterations reached.

    Key characteristics:
    - Multiple agents with distinct roles collaborate in each iteration
    - Each iteration produces feedback that guides the next
    - Loops have explicit exit conditions (success or max iterations)
    - Maximum iterations prevent infinite loops; escalate to human if reached

  structure: |
    1. Initial action by primary agent(s)
    2. Validation/feedback by secondary agent(s)
    3. Fix/improve based on feedback
    4. Repeat until exit condition met

loop_types:
  test-fix-loop:
    purpose: "Iterative development with user simulation testing"
    phase: "active-development"
    when_to_use: "During active development to validate real user experience"
    maximum_iterations: 5
    core_pattern: "Build → Test → Fix → Repeat"

  audit-test-fix-loop:
    purpose: "Validate test quality and detect reward hacking"
    phase: "test-validation"
    when_to_use: "After initial testing to ensure tests are valid"
    maximum_iterations: 3
    mandatory: true
    core_pattern: "Audit → Test → Fix → Repeat"

  cleaner-dependency-loop:
    purpose: "Dependency-aware cleanup with explorer verification"
    phase: "cleanup"
    when_to_use: "Before removing code - uses explorer to verify no active dependencies"
    maximum_iterations: 3
    core_pattern:
      - "Cleaner identifies target files/code for removal"
      - "Explorer agent checks for dependencies/usages"
      - "Decision point: Safe to remove or defer"
      - "Execute removal or escalate with dependency report"
    participants:
      - "cleaner agent (identification)"
      - "explorer agent (dependency checking)"
      - "orchestrator (decision and execution)"
    exit_conditions:
      - "All targets removed (no dependencies found)"
      - "Deferred targets documented (dependencies exist)"
      - "Max iterations reached (escalate remaining)"
    safety_checks:
      - "Explorer must verify zero usages before removal"
      - "Indirect dependencies must be traced (transitive)"
      - "Test coverage must be checked (removes may break tests)"

  documentation-loop:
    purpose: "Validate documentation through blind testing"
    phase: "documentation-validation"
    when_to_use: "To prove documentation is complete and usable"
    maximum_iterations: 3
    core_pattern: "Attempt journey → Report gaps → Fix → Repeat"

  user-story-validation-loop:
    purpose: "Validate complete user journeys through blind testing"
    phase: "user-story-validation"
    when_to_use: "After audit phase to confirm implementation meets user needs"
    maximum_iterations: 3
    core_pattern: "Execute story → Report gaps → Fix → Repeat"
    note: |
      User simulator agents execute story tests following documentation only.
      This is the PRIMARY SUCCESS CRITERIA for implementation work.

  exploration-loop:
    purpose: "Iterative discovery and information gathering"
    phase: "discovery"
    when_to_use: "Before implementation when understanding is needed"
    maximum_iterations: 3
    core_pattern: "Explore → Analyze → Decide → Repeat"

  # ===========================================================================
  # RLM-Enhanced Loops
  # These loops leverage Recursive Language Model patterns for handling large contexts
  # Reference: modules/AgenticGuidance/assets/definitions/rlm-patterns.yml
  # ===========================================================================

  rlm-decomposition-loop:
    purpose: "Recursive decomposition of large contexts for analysis or processing"
    phase: "context-processing"
    when_to_use: |
      When context exceeds model limits and requires programmatic decomposition:
      - Documents exceed 500 lines
      - Codebase spans 10+ files
      - Cross-referencing multiple large sources
      - Information needed is sparse within large corpus
    maximum_iterations: 3
    max_recursion_depth: 3
    core_pattern:
      - "Store context in environment variables"
      - "Write code to filter/extract relevant subset"
      - "Process subset (may recurse for further decomposition)"
      - "Accumulate results in named buffers"
      - "Signal FINAL(answer) when complete"
    variable_conventions:
      CONTEXT_SOURCE_SECTION:
        purpose: "Stored input contexts"
        examples: ["CONTEXT_CODEBASE_TESTS", "CONTEXT_SPEC_API"]
      FILTER_CRITERIA:
        purpose: "Filtered subsets of context"
        examples: ["FILTER_ERRORS_ONLY", "FILTER_PUBLIC_METHODS"]
      ACCUMULATOR_TYPE:
        purpose: "Accumulated intermediate results"
        examples: ["ACCUMULATOR_FINDINGS", "ACCUMULATOR_DEPENDENCIES"]
      FINAL_OUTPUT:
        purpose: "Final results ready for output"
        examples: ["FINAL_ANALYSIS", "FINAL_RECOMMENDATIONS"]
    participants:
      - "curator agent (context filtering and preparation)"
      - "specialist agent (task execution on curated context)"
    relationship_to_other_loops:
      enhancement_for:
        - "test-fix-loop: Analyze large test outputs"
        - "exploration-loop: Navigate large codebases"
        - "planner-loop: Process large specifications"
      pattern: |
        RLM-decomposition can be invoked within other loops when a single
        iteration encounters context that exceeds model limits. The outer
        loop continues after RLM processing completes.
    exit_conditions:
      - "FINAL(answer) signaled with accumulated results"
      - "Max recursion depth reached (aggregate partial results)"
      - "Max iterations reached (escalate with partial findings)"
    safety_checks:
      - "Recursion depth bounded to max_recursion_depth"
      - "Variable count limited to 10 active contexts"
      - "FINAL only called at top level after all branches complete"
    reference: "modules/AgenticGuidance/assets/definitions/rlm-patterns.yml"

  rlm-context-refinement-loop:
    purpose: "Progressive context loading based on iteration feedback"
    phase: "context-refinement"
    when_to_use: |
      When optimal context level is unknown upfront:
      - Task may be solvable with minimal context
      - Full context loading would be wasteful
      - Feedback determines if more context needed
    maximum_iterations: 5
    core_pattern:
      - "Load minimal context (signatures only)"
      - "Attempt task with current context level"
      - "If insufficient: Escalate to next context level"
      - "Repeat until task complete or max context reached"
    context_progression:
      level_1:
        name: "signatures_only"
        description: "Function/class signatures without bodies"
        context_size: "~5% of full"
        example: "def process_user(user_id: str) -> User"
      level_2:
        name: "with_docstrings"
        description: "Signatures plus docstrings and comments"
        context_size: "~15% of full"
        example: "Signature + '''Process user by ID, returns User object'''"
      level_3:
        name: "with_summaries"
        description: "Docstrings plus AI-generated implementation summaries"
        context_size: "~30% of full"
        example: "Docstring + 'Validates ID, queries DB, maps to User model'"
      level_4:
        name: "full_implementation"
        description: "Complete source code"
        context_size: "100%"
        example: "Full function body with all implementation details"
    escalation_triggers:
      - "Task cannot proceed with current information"
      - "Ambiguity requires more implementation details"
      - "Error analysis needs full context"
      - "Cross-reference requires related code"
    participants:
      - "context-loader agent (manages progression levels)"
      - "task-executor agent (attempts task at each level)"
    exit_conditions:
      - "Task completed successfully at any level"
      - "Level 4 reached (full context, proceed regardless)"
      - "Max iterations reached (escalate)"
    optimization_benefit: |
      By starting with minimal context and escalating only when needed,
      this loop minimizes token usage and latency. Many tasks resolve
      at level 1-2 without ever loading full implementations.
    reference: "modules/AgenticGuidance/assets/guidelines/rlm-integration.yml"

  rlm_loop_selection:
    description: |
      Decision criteria for when to use RLM-enhanced loops vs standard loops.
      RLM adds complexity - use only when context exceeds practical limits.

    decision_criteria:
      use_rlm_decomposition:
        when:
          - "Context exceeds 500 lines"
          - "Spans 10+ files across multiple directories"
          - "Requires cross-referencing multiple documents"
          - "Information needed is sparse (searching large corpus)"
        indicators:
          - "Standard context loading causes truncation"
          - "Task naturally decomposes into sub-tasks"
          - "Results can be aggregated from independent sub-operations"

      use_rlm_refinement:
        when:
          - "Optimal context level unknown upfront"
          - "Task might succeed with partial information"
          - "Full context loading would be wasteful"
        indicators:
          - "Previous similar tasks succeeded with minimal context"
          - "Task is read-heavy (analysis, understanding)"
          - "Cost/latency optimization is important"

      use_standard_loop:
        when:
          - "Context fits comfortably in model window (<500 lines)"
          - "Task requires holistic understanding of all context"
          - "Decomposition would lose important relationships"
          - "Context is already minimal and targeted"
        indicators:
          - "All context needed simultaneously for reasoning"
          - "No natural decomposition points exist"
          - "Task is write-heavy (generating new content)"

    cost_considerations: |
      RLM patterns trade latency for capacity:
      - More API calls (recursive invocations)
      - Overhead for context management
      - But: Can handle 10M+ token contexts
      - And: Selective loading often cheaper than max-context calls

  planner-loop:
    purpose: "Iterative planning with reviewer feedback and codebase verification"
    phase: "planning"
    when_to_use: "To create and refine implementation plans"
    maximum_iterations: 5
    core_pattern:
      - "Define Phases → Populate Phases"
      - "Explore Verification (parallel explore agents verify live/ files against codebase)"
      - "Review (reviewer validates structure AND explore findings)"
      - "Fix/Update based on feedback"
      - "Repeat until approved"
    participants:
      - "planner agents (planning)"
      - "explore agents (codebase verification)"
      - "planner-reviewer (validation)"
    explore_verification:
      purpose: "Verify files in live/ folder reflect current codebase reality"
      triggers:
        - "Before review step"
        - "When live/ contains analysis or batch files"
      checks:
        - "Do referenced files still exist?"
        - "Have recommended changes been implemented?"
        - "Are task statuses accurate (pending vs completed)?"
        - "Is content still relevant or stale?"
      output: "Verification report with flags for reviewer"
    exit_conditions:
      - "Reviewer approves AND explore verification passes"
      - "Max iterations reached (escalate)"

  guidance-test-loop:
    purpose: "Validate guidance completeness through agent simulation"
    phase: "guidance-validation"
    maximum_iterations: 3
    core_pattern:
      - "Define test task from guidance"
      - "Spawn test-guidance-simulator"
      - "Execute with minimal context"
      - "Report guidance gaps found"
      - "Update plan task statuses from report"
      - "Fix gaps via teacher agents"
      - "Repeat until no gaps remain"
    participants:
      - "planner-guidance-testing"
      - "test-guidance-simulator"
    exit_conditions:
      - "All test scenarios pass"
      - "No guidance gaps identified"
      - "Max iterations reached (escalate)"

  agent-self-review:
    purpose: "Agent reviews own guidance files for correctness and completeness"
    phase: "guidance-validation"
    when_to_use: "Lighter alternative to guidance-test-loop during guidance development"
    alternative_to: "guidance-test-loop"
    selection_criteria: |
      Use agent-self-review (LIGHTEST) when:
      - Quick validation of guidance changes during development
      - Agent needs to check its own process.yml, inputs.yml, manifest.yml
      - No external simulation or multi-agent coordination needed
      - Fast feedback cycle is priority over comprehensive validation

      Use guidance-test-loop (HEAVIER) when:
      - Guidance completeness needs validation via blind simulation
      - External perspective is needed (agent cannot validate itself)
      - High-confidence verification required before deployment
    maximum_iterations: 3
    core_pattern:
      - "Agent reads own guidance files (process.yml, inputs.yml, manifest.yml)"
      - "Agent applies self-review-criteria.yml (PASS requires ALL criteria met)"
      - "Agent identifies issues, gaps, or inconsistencies"
      - "Agent reports findings with specific recommendations"
      - "Fix issues and repeat if needed"
    participants:
      - "any agent (self-reviewing)"
    exit_conditions:
      - "All checklist items pass"
      - "No friction points identified"
      - "Spot-check validation passes"
      - "Max iterations reached (escalate)"

    # Spot-check phase (SSR-006) - prevents lenient assessments
    # Reference: Friction Analysis FF-003 (78% flag rate on spot-checks)
    spot_check_phase:
      trigger: "After initial self-review completes"
      purpose: "Catch lenient initial assessments before they propagate"
      sample_size:
        formula: "max(2, ceil(pass_count * 0.2))"
        description: "Minimum 20% of PASS agents, at least 2"
      flag_threshold_percent: 50
      on_threshold_exceeded: |
        If spot-check flags >50% of sampled PASS agents:
        1. Mark all initial PASS as NEEDS_REVIEW
        2. Apply stricter criteria from self-review-criteria.yml
        3. Re-assess each agent with quantitative checks
        4. Repeat spot-check on new PASS set
      max_spot_check_rounds: 3
      iteration_strategy: |
        Round 1: Sample 20% of PASS agents (min 2), apply spot-check checklist
        Round 2 (if >50% flagged): Re-review ALL PASS with stricter criteria
        Round 3 (if still >50% flagged): Escalate to human reviewer
      checklist_reference: "modules/AgenticGuidance/assets/definitions/spot-check-checklist.yml"
      historical_context: |
        This phase was added to address FF-003 finding:
        - 78% flag rate on spot-checks (7 of 9 PASS agents flagged)
        - 14+ iterations required before agents passed review
        - Root cause: Lenient initial assessments not caught early

    criteria_reference: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml"

    note: |
      This is the simplest guidance validation loop. The agent reviews its own
      guidance without spawning external simulators or coordinating with other
      agents. Good for iterative development but limited by agent's self-bias.
      For objective validation, use guidance-test-loop with external simulator.

      IMPORTANT: PASS requires ALL criteria met (conjunction rule).
      Reference self-review-criteria.yml for thresholds and examples.

  guidance-self-review-loop:
    purpose: "Iterative guidance improvement through agent self-review"
    phase: "guidance-improvement"
    when_to_use: "When updating guidance for multiple agents based on identified friction"
    alternative_to: "guidance-test-loop"
    selection_criteria: |
      Use guidance-self-review-loop (LIGHTER) when:
      - Multiple agents need guidance improvements simultaneously
      - Friction patterns have been identified but not localized
      - Agent context files (inputs.yml, process.yml, manifest.yml) need review
      - Quick iteration on guidance changes is needed

      Use guidance-test-loop (HEAVIER) when:
      - Guidance completeness needs validation via blind simulation
      - New agent processes require external validation
      - High-confidence verification is required before deployment
      - User stories need full execution testing
    maximum_iterations: 3
    core_pattern:
      - "Spawn target agents for self-review (parallel)"
      - "Agents review their own inputs.yml, process.yml, manifest.yml"
      - "Collect issues and questions requiring user decisions"
      - "User provides answers to ambiguities"
      - "Spawn planner-guidance agents to create remediation plans (parallel)"
      - "Execute fixes via teacher-update-guidance agents"
      - "Repeat until multiple agents report NO ISSUES REMAINING"
    participants:
      - "target planner agents (self-review)"
      - "planner-guidance (remediation planning)"
      - "teacher-update-guidance (execution)"
    exit_conditions:
      # NO_ISSUES_REMAINING defined precisely (SRLE-002)
      no_issues_remaining:
        description: "Loop exits when ALL of the following are true"
        criteria:
          - "Self-review status is PASS (not NEEDS_ATTENTION)"
          - "Zero NEEDS_ATTENTION triggers (NAT-001 through NAT-005) detected"
          - "Spot-check flag rate <50% (if spot-check phase applies)"
          - "No pending plan files in live/ folder for this agent"
        reference: "modules/AgenticGuidance/assets/definitions/self-review-criteria.yml#needs_attention_triggers"
      iteration_continues_when:
        description: "Loop continues while ANY of the following are true"
        conditions:
          - "Any agent has NEEDS_ATTENTION status"
          - "Any NAT-* trigger is active"
          - "Plan files exist in live/ that haven't been executed"
          - "Spot-check flag rate >= 50%"
      legacy_conditions:
        - "All identified issues have remediation plans executed"
        - "Max iterations reached (escalate)"
    user_decision_gate: true
    visual_reference: "modules/AgenticGuidance/assets/examples/orchestration/phase_templates/guidance_self_review_loop.mmd"

    # ==========================================================================
    # Orchestrator Role and Enforcement (SRLE-003)
    # ==========================================================================
    orchestrator_role:
      definition: |
        The PRIMARY AGENT that spawns self-review subagents IS the orchestrator
        for this loop. The orchestrator:
        1. Spawns subagents for self-review
        2. Collects self-review results
        3. ENFORCES plan file creation check
        4. Rejects incomplete self-reviews (NEEDS_ATTENTION without plan file)
        5. Continues loop until NO_ISSUES_REMAINING
      enforcement_checkpoint: |
        After each self-review subagent returns:
        IF status == NEEDS_ATTENTION:
          CHECK: Does live/ contain plan_guidance_{agent_name}_*.yml?
          IF NO: Reject result, require plan file creation
          IF YES: Present plan to user for approval
        IF status == PASS:
          CHECK: Verify zero NAT-* triggers
          IF ANY NAT-* active: Reject, status should be NEEDS_ATTENTION
      rejection_response: |
        When orchestrator rejects incomplete self-review:
        1. Return to subagent with: "Self-review incomplete: NEEDS_ATTENTION status requires plan file"
        2. Require subagent to create plan file at: {plan_folder}/live/plan_guidance_{agent_name}_*.yml
        3. Block loop advancement until plan file exists
    note: |
      This loop includes a USER DECISION GATE between self-review and planning.
      Questions/ambiguities from self-reviews must be resolved before creating
      remediation plans. This ensures fixes align with user intent.

    # ==========================================================================
    # FENCE: Plan File Creation Requirement (SRLE-001)
    # ==========================================================================
    fence_plan_creation:
      name: "Self-Review Plan Creation FENCE"
      trigger: "NEEDS_ATTENTION status from any self-reviewing agent"
      requirement: |
        FENCE: When self-review returns NEEDS_ATTENTION:
        1. Agent MUST create plan file at: {plan_folder}/live/plan_guidance_{agent_name}_{issue_type}.yml
        2. Agent MUST NOT autonomously defer issues - present ALL findings to user
        3. Plan file MUST include: objective, findings list, proposed tasks
        4. Without plan file in live/, the loop CANNOT iterate
      violation: |
        If NEEDS_ATTENTION but no plan file created:
        - Self-review is INCOMPLETE
        - Loop iteration is BLOCKED
        - Orchestrator MUST reject the self-review result
      user_deferral_policy: |
        FENCE: Agents DO NOT decide deferral.
        - Agent presents findings with severity assessment
        - User decides which findings to address now vs defer
        - Only user can mark a finding as "deferred"
        - Agent may RECOMMEND deferral but MUST NOT implement it unilaterally
      plan_file_template:
        location: "{plan_folder}/live/plan_guidance_{agent_name}_{issue_type}.yml"
        required_fields:
          - "name"
          - "objective"
          - "findings (list with id, severity, description)"
          - "tasks (list of remediation tasks)"
          - "status: pending"

phase_ordering:
  description: |
    Standard phase order for complete implementation cycles:
  order:
    - "1. test-fix-loop (active development)"
    - "2. cleaner-dependency-loop (cleanup with explorer verification)"
    - "3. audit-test-fix-loop (MANDATORY after cleanup)"
    - "4. user-story-validation-loop (PRIMARY SUCCESS CRITERIA)"
    - "5. documentation-loop (final phase)"

mandatory_loops:
  audit-test-fix-loop:
    reason: "Must ALWAYS be included after cleanup - catches reward hacking and test quality issues"

exit_conditions:
  success: "All validation criteria met"
  max_iterations: "Escalate to human for decision"
  blocked: "Cannot proceed - escalate with context"

# ===========================================================================
# Error-Driven Planning in Loops
# Reference: modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml
# ===========================================================================

error_driven_planning:
  concept: |
    During any loop iteration, agents may discover errors outside the current
    plan's scope. These are NOT retry conditions — they are opportunities for
    systematic improvement via new planning sessions.

  protocol_reference: "modules/AgenticGuidance/assets/definitions/error-driven-planning-protocol.yml"

  loop_behavior: |
    When an agent within a loop reports out_of_scope_error:
    1. The orchestrator logs the error and suggested remediation plan
    2. The loop CONTINUES (out-of-scope errors do NOT consume iterations)
    3. At loop exit, all out-of-scope errors are aggregated
    4. Orchestrator creates remediation plans for HIGH+ priority errors

  does_not_affect:
    - "Iteration count (out-of-scope errors are separate from in-scope retries)"
    - "Loop exit conditions (these are still based on in-scope success criteria)"
    - "Max iterations (only in-scope failures count)"
