multi-layer-testing: |
    A comprehensive testing strategy using multiple complementary testing approaches.
    Justification: No single testing layer can catch all bug types (e.g., logic vs. env vs. docs).

    Created based on GCPTOOLKIT-CONFIG-GAP-001 - multi-layer testing caught different
    types of gaps that no single approach would have found.

    Testing layers (in order):
    1. Automated tests (unit, integration, e2e)
    2. Fresh environment testing (Phase 5)
    3. Manual verification (Phase 6)
    4. Follow-docs-exactly test (Phase 7)
    5. Blind-test validation (Phase 7b)

    What each layer catches:
    - Automated: Logic errors, regressions, component integration
    - Fresh environment: Portability issues, configuration gaps, hardcoded paths
    - Manual verification: UX issues, error message clarity, recovery paths
    - Follow-docs-exactly: Documentation gaps, missing steps, incorrect instructions
    - Blind-test: Documentation usability, completeness, discoverability

    Key insight: Each layer is necessary - they catch different types of issues.
    No single testing approach is sufficient for production readiness.

    CRITICAL: Automated tests passing != system works for end users

    Success criteria:
    - All 5 testing layers pass
    - Each layer identifies and resolves issues
    - No gaps between test environment and production environment
    - Documentation proven usable by blind-test

    Integration with release process:
    - Phases 5-7b of pre-release checklist
    - Must complete all layers before release
    - Each layer builds on previous layers

    Reference: Based on lessons learned from GCPTOOLKIT-CONFIG-GAP-001 implementation.
