# Guidance Quality Definition
# Patterns that help or harm guidance effectiveness
# Created: 2026-01-21
# Source: ticket_live_friction_analysis_improvements.yml (def_01)

definition:
  name: guidance-quality
  description: "Patterns that help or harm guidance effectiveness"

effective_patterns:
  - name: "path_addition"
    description: "Add clear step to process file"
    example: "Step 4: Validate output schema before proceeding"

  - name: "signpost_addition"
    description: "Add concrete example showing correct usage"
    example: "See examples/teacher/schema-validation.yml"

  - name: "fence_strengthening"
    description: "Add constraint that prevents incorrect behavior"
    example: "boundary: only modify files within plan folder"

  - name: "cli_offload"
    description: "Move deterministic operation to CLI command"
    example: "Use 'agentic epic init' instead of manual epic folder creation"

anti_patterns:
  - name: "caps_emphasis"
    description: "Using CAPS to emphasize importance"
    why_ineffective: "Creates noise, agents don't respond to visual emphasis"
    example_bad: "You MUST ALWAYS validate output"
    example_good: "validation: required: true"

  - name: "repetition"
    description: "Restating the same guidance in different words"
    why_ineffective: "Increases context without adding information"
    example_bad: "Validate output. Make sure to validate. Output validation is required."
    example_good: "Step: Validate output (see validation-rules.yml)"

  - name: "strong_language"
    description: "Using emotional or urgent language"
    why_ineffective: "If everything is critical/important, nothing is prioritized"
    example_bad: "This is CRITICAL and MUST be done IMMEDIATELY"
    example_good: "priority: high"

  - name: "emphasis_escalation"
    description: "Adding emphasis to existing guidance instead of fixing structure"
    why_ineffective: "Doesn't address why guidance wasn't followed"
    example_bad: "As stated above (IMPORTANT)..."
    example_good: "Move guidance to step where it's needed"

  - name: "negative_framing"
    description: "Telling agents what NOT to do without positive alternative"
    why_ineffective: "Agents need to know what TO do"
    example_bad: "Do NOT create files outside the epic folder"
    example_good: "boundary: output_path: docs/epics/live/{{epic_id}}/"
