# NOTE: GCP toolkit not yet reimplemented. This configuration is for future use.
# STATUS: not_implemented

gcp_artifact_registry: |
  MyAgents uses GCP Artifact Registry for private Python packages.

  Registry URL: https://us-central1-python.pkg.dev/myagents-475112/myagents-python/simple/

  Published packages:
  - agent-gcptoolkit: GCP toolkit for agent operations (available on registry)

  IMPORTANT: myagents depends on agent-gcptoolkit, which is a private package.
  - agent-gcptoolkit is NOT on PyPI - it's only on GCP Artifact Registry
  - The install-global.sh script handles authentication automatically via netrc
  - Authentication requires: gcloud CLI installed and gcloud auth login

  The install-global.sh script:
  1. Configures netrc with GCP access token for registry authentication
  2. Builds the wheel from source
  3. Uses uv tool install with --index pointing to the registry
  4. Resolves agent-gcptoolkit from the registry automatically

  For deployment/publishing to registry:
  - Use scripts/deploy-to-registry.sh
  - See docs/guides/registry-setup.md for full documentation
