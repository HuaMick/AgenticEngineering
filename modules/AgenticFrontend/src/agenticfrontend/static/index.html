<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgenticFrontend — Terminal UI</title>
  <meta name="description" content="Web-based terminal interface for AgenticEngineering orchestration">

  <!-- xterm.js from CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* === Design Tokens === */
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2332;
      --bg-card: rgba(17, 24, 39, 0.85);
      --bg-glass: rgba(30, 41, 59, 0.6);
      --border-color: rgba(99, 102, 241, 0.2);
      --border-active: rgba(99, 102, 241, 0.5);
      --border-glow: rgba(99, 102, 241, 0.3);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.15);
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* === Layout === */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
        var(--bg-primary);
    }

    /* === Header === */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      min-height: 48px;
      z-index: 100;
    }

    #header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      box-shadow: var(--shadow-glow);
    }

    #header .logo-text {
      font-size: 15px;
      font-weight: 600;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    #header .stats {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition-normal);
    }

    .stat-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    .stat-badge .dot.disconnected {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* === Tab Bar (for multi-orchestrator) === */
    #tab-bar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      min-height: 36px;
      gap: 2px;
      overflow-x: auto;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      font-family: var(--font-sans);
    }

    .tab:hover {
      color: var(--text-secondary);
      background: rgba(99, 102, 241, 0.05);
    }

    .tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
    }

    .tab .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    /* === Main Content (Split Pane) === */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === Left Pane — Orchestrator === */
    #left-pane {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      position: relative;
      min-width: 0;
    }

    /* === Right Pane — Sub-agents === */
    #right-pane {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: rgba(10, 14, 23, 0.5);
      min-width: 0;
    }

    #right-pane::-webkit-scrollbar {
      width: 6px;
    }

    #right-pane::-webkit-scrollbar-track {
      background: transparent;
    }

    #right-pane::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    /* === Terminal Panel === */
    .terminal-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .terminal-panel.sub-agent {
      flex: 0 0 auto;
      height: 300px;
      border-bottom: 1px solid var(--border-color);
      transition: height var(--transition-normal);
    }

    .terminal-panel.sub-agent.expanded {
      height: 500px;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: var(--bg-glass);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
      min-height: 32px;
    }

    .terminal-header .terminal-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .terminal-header .terminal-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px rgba(16, 185, 129, 0.3);
    }

    .terminal-header .terminal-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-mono);
      letter-spacing: -0.2px;
    }

    .terminal-header .terminal-role {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-primary);
      padding: 1px 8px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .terminal-header .terminal-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .terminal-header .terminal-actions button {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      transition: all var(--transition-fast);
    }

    .terminal-header .terminal-actions button:hover {
      color: var(--text-primary);
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--border-color);
    }

    .terminal-header .terminal-actions button.close-btn:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
      min-height: 0;
    }

    .terminal-container .xterm {
      height: 100%;
    }

    /* === Empty State === */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px;
      text-align: center;
    }

    #empty-state .empty-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-md);
    }

    #empty-state h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    #empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 280px;
    }

    /* === Resize Handle === */
    #resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      position: relative;
      z-index: 10;
      transition: background var(--transition-fast);
    }

    #resize-handle:hover,
    #resize-handle.active {
      background: var(--accent-primary);
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
    }

    /* === Toast Notifications === */
    #toast-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      color: var(--text-primary);
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-width: 360px;
    }

    .toast.success { border-left: 3px solid var(--success); }
    .toast.warning { border-left: 3px solid var(--warning); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.info { border-left: 3px solid var(--info); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(20px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="logo">
        <div class="logo-icon">A</div>
        <span class="logo-text">AgenticFrontend</span>
      </div>
      <div class="stats">
        <div class="stat-badge" id="terminal-count-badge">
          <span class="dot" id="connection-dot"></span>
          <span id="terminal-count">0 terminals</span>
        </div>
        <div class="stat-badge" id="event-status-badge">
          <span class="dot disconnected" id="event-dot"></span>
          <span id="event-status">connecting...</span>
        </div>
      </div>
    </header>

    <!-- Tab Bar -->
    <div id="tab-bar">
      <!-- Tabs generated dynamically -->
    </div>

    <!-- Main Content -->
    <div id="main">
      <!-- Left Pane: Orchestrator -->
      <div id="left-pane">
        <div id="orchestrator-panel" class="terminal-panel">
          <div class="terminal-header">
            <div class="terminal-info">
              <div class="terminal-status-dot"></div>
              <span class="terminal-name">orchestrator</span>
              <span class="terminal-role">orchestrator</span>
            </div>
          </div>
          <div class="terminal-container" id="orchestrator-terminal-container">
            <!-- xterm.js instance -->
          </div>
        </div>
      </div>

      <!-- Resize Handle -->
      <div id="resize-handle"></div>

      <!-- Right Pane: Sub-agents -->
      <div id="right-pane">
        <div id="empty-state">
          <div class="empty-icon">🤖</div>
          <h3>No sub-agents yet</h3>
          <p>Sub-agent terminals will appear here when spawned from the orchestrator.</p>
        </div>
        <div id="sub-agent-stack" style="display:none;">
          <!-- Sub-agent panels added dynamically -->
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>
  </div>

  <script>
    // ===================================================================
    // AgenticFrontend — Terminal UI Controller
    // ===================================================================

    const WS_BASE = `ws://${location.host}`;
    const API_BASE = `${location.protocol}//${location.host}`;

    // State
    const terminals = new Map();  // name -> { terminal, fitAddon, ws, panel, meta }
    let eventsWs = null;
    let eventsReconnectTimer = null;
    let reconnectAttempts = 0;

    // ---------------------------------------------------------------
    // Toast notifications
    // ---------------------------------------------------------------
    function showToast(message, type = 'info', duration = 4000) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✓', warning: '⚠', error: '✕', info: 'ℹ' };
      toast.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s forwards';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    // ---------------------------------------------------------------
    // Terminal count update
    // ---------------------------------------------------------------
    function updateTerminalCount() {
      const count = terminals.size;
      document.getElementById('terminal-count').textContent =
        `${count} terminal${count !== 1 ? 's' : ''}`;
    }

    // ---------------------------------------------------------------
    // Create an xterm.js terminal instance
    // ---------------------------------------------------------------
    function createTerminal(name, containerEl, meta = {}) {
      const terminal = new Terminal({
        theme: {
          background: '#0a0e17',
          foreground: '#e2e8f0',
          cursor: '#6366f1',
          cursorAccent: '#0a0e17',
          selectionBackground: 'rgba(99, 102, 241, 0.3)',
          selectionForeground: '#e2e8f0',
          black: '#1e293b',
          red: '#ef4444',
          green: '#10b981',
          yellow: '#f59e0b',
          blue: '#3b82f6',
          magenta: '#8b5cf6',
          cyan: '#06b6d4',
          white: '#e2e8f0',
          brightBlack: '#475569',
          brightRed: '#f87171',
          brightGreen: '#34d399',
          brightYellow: '#fbbf24',
          brightBlue: '#60a5fa',
          brightMagenta: '#a78bfa',
          brightCyan: '#22d3ee',
          brightWhite: '#f8fafc',
        },
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
        fontSize: 13,
        lineHeight: 1.35,
        cursorBlink: true,
        cursorStyle: 'bar',
        scrollback: 10000,
        allowProposedApi: true,
      });

      const fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);

      try {
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        terminal.loadAddon(webLinksAddon);
      } catch (e) {
        // Web links addon is optional
      }

      terminal.open(containerEl);

      // Fit after a brief delay to ensure DOM is ready
      requestAnimationFrame(() => {
        fitAddon.fit();
      });

      // Connect WebSocket to terminal PTY
      const wsUrl = `${WS_BASE}/ws/terminals/${name}`;
      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log(`[WS] Connected to terminal: ${name}`);
        // Send initial size
        const dims = fitAddon.proposeDimensions();
        if (dims) {
          ws.send(JSON.stringify(["set_size", dims.rows, dims.cols]));
        }
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data[0] === 'stdout') {
          terminal.write(data[1]);
        }
      };

      ws.onerror = (err) => {
        console.error(`[WS] Error on terminal ${name}:`, err);
      };

      ws.onclose = () => {
        console.log(`[WS] Disconnected from terminal: ${name}`);
        terminal.write('\r\n\x1b[31m[Connection closed]\x1b[0m\r\n');
      };

      // Forward terminal input to WebSocket
      terminal.onData((data) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(["stdin", data]));
        }
      });

      // Handle resize
      terminal.onResize(({ cols, rows }) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(["set_size", rows, cols]));
        }
      });

      const info = { terminal, fitAddon, ws, panel: null, meta };
      terminals.set(name, info);
      updateTerminalCount();

      return info;
    }

    // ---------------------------------------------------------------
    // Orchestrator terminal — connect on load
    // ---------------------------------------------------------------
    function initOrchestrator() {
      const container = document.getElementById('orchestrator-terminal-container');
      const info = createTerminal('orchestrator', container, { role: 'orchestrator' });
      info.panel = document.getElementById('orchestrator-panel');
    }

    // ---------------------------------------------------------------
    // Sub-agent terminal — create dynamically
    // ---------------------------------------------------------------
    function addSubAgentTerminal(name, meta = {}) {
      const stack = document.getElementById('sub-agent-stack');
      const emptyState = document.getElementById('empty-state');

      // Hide empty state
      emptyState.style.display = 'none';
      stack.style.display = 'flex';
      stack.style.flexDirection = 'column';
      stack.style.flex = '1';

      // Build panel
      const panel = document.createElement('div');
      panel.className = 'terminal-panel sub-agent';
      panel.id = `panel-${name}`;
      panel.innerHTML = `
        <div class="terminal-header">
          <div class="terminal-info">
            <div class="terminal-status-dot"></div>
            <span class="terminal-name">${escapeHtml(name.length > 16 ? name.substring(0, 16) + '…' : name)}</span>
            ${meta.role ? `<span class="terminal-role">${escapeHtml(meta.role)}</span>` : ''}
          </div>
          <div class="terminal-actions">
            <button class="expand-btn" title="Toggle expand" onclick="toggleExpand('${name}')">⤢</button>
            <button class="close-btn" title="Close terminal" onclick="closeTerminal('${name}')">✕</button>
          </div>
        </div>
        <div class="terminal-container" id="terminal-container-${name}"></div>
      `;

      stack.appendChild(panel);

      // Create terminal
      const containerEl = document.getElementById(`terminal-container-${name}`);
      const info = createTerminal(name, containerEl, meta);
      info.panel = panel;

      showToast(`Terminal "${name}" created`, 'success');
      return info;
    }

    // ---------------------------------------------------------------
    // Close a sub-agent terminal
    // ---------------------------------------------------------------
    function closeTerminal(name) {
      const info = terminals.get(name);
      if (!info) return;

      // Close WebSocket
      if (info.ws && info.ws.readyState === WebSocket.OPEN) {
        info.ws.close();
      }

      // Dispose terminal
      info.terminal.dispose();

      // Remove panel
      if (info.panel) {
        info.panel.remove();
      }

      terminals.delete(name);
      updateTerminalCount();

      // Call DELETE API
      fetch(`${API_BASE}/api/terminals/${name}`, { method: 'DELETE' })
        .catch(err => console.error('Failed to delete terminal:', err));

      // Show empty state if no sub-agents remain
      const subAgents = [...terminals.keys()].filter(n => n !== 'orchestrator');
      if (subAgents.length === 0) {
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('sub-agent-stack').style.display = 'none';
      }

      showToast(`Terminal "${name}" closed`, 'warning');
    }

    // ---------------------------------------------------------------
    // Toggle expand a sub-agent panel
    // ---------------------------------------------------------------
    function toggleExpand(name) {
      const info = terminals.get(name);
      if (!info || !info.panel) return;
      info.panel.classList.toggle('expanded');
      setTimeout(() => info.fitAddon.fit(), 300);
    }

    // ---------------------------------------------------------------
    // Events WebSocket — lifecycle push
    // ---------------------------------------------------------------
    function connectEvents() {
      const wsUrl = `${WS_BASE}/ws/events`;
      eventsWs = new WebSocket(wsUrl);

      eventsWs.onopen = () => {
        console.log('[Events] Connected');
        document.getElementById('event-dot').classList.remove('disconnected');
        document.getElementById('event-status').textContent = 'connected';
        reconnectAttempts = 0;
      };

      eventsWs.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleEvent(data);
        } catch (e) {
          console.error('[Events] Parse error:', e);
        }
      };

      eventsWs.onerror = (err) => {
        console.error('[Events] Error:', err);
      };

      eventsWs.onclose = () => {
        console.log('[Events] Disconnected');
        document.getElementById('event-dot').classList.add('disconnected');
        document.getElementById('event-status').textContent = 'reconnecting...';

        // Exponential backoff reconnect
        reconnectAttempts++;
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        eventsReconnectTimer = setTimeout(connectEvents, delay);
      };
    }

    function handleEvent(data) {
      switch (data.type) {
        case 'terminal_list':
          // Initial terminal list — connect any we don't already have
          for (const t of (data.terminals || [])) {
            if (t.name !== 'orchestrator' && !terminals.has(t.name)) {
              addSubAgentTerminal(t.name, t);
            }
          }
          break;

        case 'terminal_created':
          if (data.name !== 'orchestrator' && !terminals.has(data.name)) {
            addSubAgentTerminal(data.name, data);
          }
          break;

        case 'terminal_closed':
          if (terminals.has(data.name) && data.name !== 'orchestrator') {
            const info = terminals.get(data.name);
            if (info.ws) info.ws.close();
            if (info.terminal) info.terminal.dispose();
            if (info.panel) info.panel.remove();
            terminals.delete(data.name);
            updateTerminalCount();

            const subAgents = [...terminals.keys()].filter(n => n !== 'orchestrator');
            if (subAgents.length === 0) {
              document.getElementById('empty-state').style.display = 'flex';
              document.getElementById('sub-agent-stack').style.display = 'none';
            }
            showToast(`Terminal "${data.name}" closed`, 'warning');
          }
          break;
      }
    }

    // ---------------------------------------------------------------
    // Resize handle (split pane)
    // ---------------------------------------------------------------
    function initResizeHandle() {
      const handle = document.getElementById('resize-handle');
      const leftPane = document.getElementById('left-pane');
      const rightPane = document.getElementById('right-pane');
      let isDragging = false;

      handle.addEventListener('mousedown', (e) => {
        isDragging = true;
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const mainEl = document.getElementById('main');
        const mainRect = mainEl.getBoundingClientRect();
        const pct = ((e.clientX - mainRect.left) / mainRect.width) * 100;
        const clampedPct = Math.max(20, Math.min(80, pct));
        leftPane.style.flex = `0 0 ${clampedPct}%`;
        rightPane.style.flex = `0 0 ${100 - clampedPct}%`;

        // Refit all terminals
        terminals.forEach(info => {
          try { info.fitAddon.fit(); } catch (e) {}
        });
      });

      document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        handle.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';

        // Final fit
        terminals.forEach(info => {
          try { info.fitAddon.fit(); } catch (e) {}
        });
      });
    }

    // ---------------------------------------------------------------
    // Auto-refit on window resize
    // ---------------------------------------------------------------
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        terminals.forEach(info => {
          try { info.fitAddon.fit(); } catch (e) {}
        });
      }, 100);
    });

    // ---------------------------------------------------------------
    // Utility
    // ---------------------------------------------------------------
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------------------------------------------------------------
    // Init
    // ---------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
      initOrchestrator();
      connectEvents();
      initResizeHandle();
    });
  </script>
</body>
