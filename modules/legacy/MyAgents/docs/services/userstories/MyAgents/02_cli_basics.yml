user_stories:
  # ============================================================================
  # CLI Basics User Stories
  # ============================================================================
  
  - id: US-CLI-001
    name: "CLI Help Discovery"
    category: "cli_basics"
    persona: "New user exploring the CLI with no prior knowledge"
    priority: "high"
    
    starting_state:
      environment:
        cli_installed: true
        config_exists: false
        current_directory: "/tmp/exploration"
      files_present: []
      files_missing:
        - "~/.config/myagents/langgraph.json"
        - "langgraph.json"
      knowledge:
        - "Knows myagents CLI exists"
        - "Has NO prior knowledge of commands"
        - "Has NOT read documentation yet"
    
    journey:
      - step: 1
        action: "Run `myagents` with no arguments"
        expected: "See help message listing available commands (not error)"
        failure_indicators:
          - "Error message instead of help"
          - "Requires langgraph.json to show help"
          - "Unclear or missing command list"
      
      - step: 2
        action: "Run `myagents --help` or `myagents -h`"
        expected: "See detailed help message with command descriptions"
        failure_indicators:
          - "Help not available"
          - "Missing command descriptions"
      
      - step: 3
        action: "Run `myagents chat --help`"
        expected: "See chat command usage and options"
        failure_indicators:
          - "Command-specific help unavailable"
          - "Unclear usage instructions"
      
      - step: 4
        action: "Discover and run a global command (e.g., `myagents --version`)"
        expected: "Command works from any directory without langgraph.json"
        failure_indicators:
          - "Requires langgraph.json for global commands"
          - "Command fails unexpectedly"
    
    success_criteria:
      - "Help messages are informative and discoverable"
      - "Global commands work without project context"
      - "User can discover available commands without documentation"
      - "No errors when exploring CLI"
    
    testing:
      local: true
      docker: true
      docker_image: "myagents-test"  # Shared pre-built image
      docker_command: |
        docker run --rm -v $(pwd):/workspace/myagents-test \
        myagents-test /bin/bash -c "cd /workspace/myagents-test && myagents"
    
    documentation_references:
      - "README.md (should mention help commands)"
      - "docs/guides/usage.md"

