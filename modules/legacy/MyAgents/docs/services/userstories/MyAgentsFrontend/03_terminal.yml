# Terminal User Stories
# Status: 1 placeholder, 1 partial

user_stories:
  # ============================================
  # US-TERM-001: Terminal Screen Display
  # ============================================
  - id: US-TERM-001
    name: "Terminal Screen Display"
    category: "terminal"
    persona: "User viewing remote terminal output"
    priority: "critical"
    status: placeholder

    implementation_note: |
      CURRENT STATE: Terminal screen exists as PLACEHOLDER ONLY.

      The current implementation (lib/features/remote_terminal/terminal_screen.dart)
      is only 27 lines and displays:
      - AppBar with "Terminal" title
      - "Terminal Screen Placeholder" text
      - "Back to Pairing" button

      XTERM INTEGRATION PENDING:
      - xterm package (^4.0.0) declared in pubspec.yaml but NOT integrated
      - See US-XTERM-001 in 06_future_features.yml for xterm integration work

      FUNCTIONALITY MISSING:
      - No actual terminal rendering (xterm.js)
      - No input handling
      - No output display
      - No ANSI color support
      - No cursor display
      - No scrollback buffer

      This user story will become fully testable after US-XTERM-001 is implemented.

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: true
        connection_status: "connected"

    journey:
      - step: 1
        action: "Navigate to terminal screen after successful pairing"
        expected: "Terminal screen displays (currently placeholder)"
        failure_indicators:
          - "Navigation fails"
          - "Screen crashes"
          - "Blank screen"

      - step: 2
        action: "View terminal content"
        expected: "[AFTER US-XTERM-001] xterm.js terminal with cursor, scrollback"
        current_behavior: "Shows 'Terminal Screen Placeholder' text only"
        failure_indicators:
          - "No terminal visible"
          - "Terminal unresponsive"

      - step: 3
        action: "Navigate back to pairing"
        expected: "Back button returns to pairing screen"
        failure_indicators:
          - "Navigation fails"
          - "State not reset"

    success_criteria:
      # Current (placeholder):
      - "[CURRENT] Screen displays with AppBar and placeholder text"
      - "[CURRENT] Back button navigates to '/' (pairing screen)"
      # After xterm integration (US-XTERM-001):
      - "[AFTER XTERM] Terminal renders using xterm package"
      - "[AFTER XTERM] Cursor visible and blinking"
      - "[AFTER XTERM] ANSI colors rendered correctly"
      - "[AFTER XTERM] Scrollback buffer functional"
      - "[AFTER XTERM] Input field receives keyboard focus"

    testing:
      web: true
      widget_test: true
      integration_test: false
      note: "Full testing blocked until US-XTERM-001 (xterm integration) is complete"

    implementation_references:
      - "lib/features/remote_terminal/terminal_screen.dart (placeholder only)"
      - "pubspec.yaml:14 (xterm: ^4.0.0 declared)"

    related_stories:
      - "US-XTERM-001 (xterm integration - required for full functionality)"

  # ============================================
  # US-TERM-003: Layout Responsiveness
  # ============================================
  - id: US-TERM-003
    name: "Terminal Layout Responsiveness"
    category: "terminal"
    persona: "User on various screen sizes"
    priority: "medium"
    status: partial

    implementation_note: |
      CURRENT STATE: Terminal screen uses basic Container layout without responsive design.

      MISSING RESPONSIVE PATTERNS:
      - No MediaQuery-based layout adaptation
      - No responsive breakpoints defined
      - No responsive font sizing for terminal
      - No touch-friendly controls on mobile
      - No orientation handling (portrait/landscape)

      IMPLEMENTATION NEEDED:
      1. Use LayoutBuilder or MediaQuery to detect screen size
      2. Define breakpoints:
         - Desktop (>1024px): Full terminal, optional sidebar/tools
         - Tablet (768px-1024px): Full terminal, collapsible sidebar
         - Mobile (<768px): Full-width terminal, hamburger menu
      3. Implement responsive terminal font sizing (12-16px based on screen)
      4. Add touch-friendly controls for mobile (larger tap targets)
      5. Handle orientation changes gracefully

      NOTE: This is secondary to US-XTERM-001 (xterm integration). Responsive
      design should be implemented after core terminal functionality works.

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: true
        connection_status: "connected"

    journey:
      - step: 1
        action: "Open terminal on desktop (>1024px width)"
        expected: "Full terminal display with optional sidebar"
        current_behavior: "Centered column with placeholder text"
        failure_indicators:
          - "Layout broken"
          - "Content cut off"
          - "Scrollbars appear unnecessarily"

      - step: 2
        action: "Resize browser to tablet (768-1024px)"
        expected: "Terminal adapts, sidebar collapses if present"
        current_behavior: "No layout change"
        failure_indicators:
          - "Content overflows"
          - "No layout adaptation"

      - step: 3
        action: "Resize browser to mobile (<768px)"
        expected: "Full-width terminal, hamburger menu, touch-friendly controls"
        current_behavior: "No layout change"
        failure_indicators:
          - "Content too small to read"
          - "Buttons too small to tap"
          - "Horizontal scroll required"

      - step: 4
        action: "Rotate device (portrait ↔ landscape)"
        expected: "Layout adapts to new dimensions gracefully"
        current_behavior: "No orientation handling"
        failure_indicators:
          - "Content clips"
          - "Layout breaks"
          - "Terminal not resized"

    success_criteria:
      - "Layout uses MediaQuery or LayoutBuilder to detect screen size"
      - "Breakpoints defined: desktop (>1024px), tablet (768-1024px), mobile (<768px)"
      - "Terminal font size scales appropriately (12-16px based on screen)"
      - "Touch targets meet minimum 44x44px on mobile (WCAG 2.5.5)"
      - "Orientation changes handled gracefully"
      - "No horizontal scrolling required on any device"
      - "All UI elements accessible on all screen sizes"

    testing:
      web: true
      widget_test: true
      integration_test: false
      responsive_testing:
        - "Chrome DevTools device emulation"
        - "Real device testing (iOS Safari, Android Chrome)"
        - "Orientation testing"

    implementation_references:
      - "lib/features/remote_terminal/terminal_screen.dart (needs responsive refactor)"
