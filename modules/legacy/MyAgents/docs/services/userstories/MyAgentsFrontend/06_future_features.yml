# Future Features User Stories
# Status: 2 implemented, 2 future

# IMPLEMENTATION STATUS GUIDE:
# - "status: implemented" = Feature is fully implemented in codebase
# - "status: future" = Feature planned but not yet implemented
# - "status: partial" = Feature partially implemented, see implementation_note

user_stories:
  # ============================================
  # US-WS-001: WebSocket Connection (IMPLEMENTED)
  # ============================================
  - id: US-WS-001
    name: "WebSocket Connection to Relay Server"
    category: "connection"
    persona: "User connecting to remote session"
    priority: "critical"
    status: implemented

    implementation_note: |
      FULLY IMPLEMENTED in lib/core/networking/relay_client.dart (500+ lines).

      Implementation includes:
      - WebSocket connection to relay server
      - URL format: {protocol}://{relayUrl}/ws/client/{pairingCode}
      - Auto-reconnect with exponential backoff (1s base, 60s max)
      - Connection state management via ConnectionStateManager
      - Message streaming via StreamController
      - Error handling with error stream
      - Graceful disconnect with cleanup

      This was incorrectly marked as "future" when it has been implemented.

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: true
        relay_server_available: true

    journey:
      - step: 1
        action: "Initiate connection with pairing code"
        expected: "WebSocket connects to wss://{relayUrl}/ws/client/{pairingCode}"
        failure_indicators:
          - "Wrong URL format"
          - "Connection not attempted"
          - "Protocol not wss:// for production"

      - step: 2
        action: "Monitor connection state"
        expected: |
          State transitions:
          - Initial connection: disconnected → connecting → connected
          - Auto-reconnect: disconnected/error → reconnecting → connected
        failure_indicators:
          - "State not updated"
          - "Listeners not notified"
          - "Stuck in connecting state"
          - "reconnecting state not used during auto-reconnect"

      - step: 3
        action: "Send and receive messages"
        expected: "Messages sent through channel, received via messageStream"
        failure_indicators:
          - "Messages not sent"
          - "Messages not received"
          - "Stream errors"

      - step: 4
        action: "Disconnect intentionally"
        expected: "Clean disconnect, state changes to disconnected, no auto-reconnect"
        failure_indicators:
          - "Auto-reconnect triggered on intentional disconnect"
          - "Resources not cleaned up"
          - "State not updated"

    success_criteria:
      - "WebSocket URL correctly built: {protocol}://{relayUrl}/ws/client/{pairingCode}"
      - "localhost/127.0.0.1 uses ws://, production uses wss://"
      - "ConnectionStateManager tracks state transitions"
      - "messageStream broadcasts incoming messages"
      - "errorStream broadcasts WebSocket errors"
      - "Intentional disconnect prevents auto-reconnect"
      - "Resources disposed properly (streams, channel)"

    testing:
      web: true
      widget_test: false
      integration_test: true
      note: "Requires MockRelayServer for integration testing"

    implementation_references:
      - "lib/core/networking/relay_client.dart (main WebSocket client)"
      - "lib/core/networking/relay_client.dart:133-144 (connect method)"
      - "lib/core/networking/relay_client.dart:195-214 (_buildWebSocketUrl)"
      - "lib/core/networking/connection_state.dart (state management)"

  # ============================================
  # US-CRYPT-001: Encrypted Communication (IMPLEMENTED)
  # ============================================
  - id: US-CRYPT-001
    name: "End-to-End Encrypted Communication"
    category: "security"
    persona: "User with secure communication requirements"
    priority: "critical"
    status: implemented

    implementation_note: |
      FULLY IMPLEMENTED in lib/core/crypto/ directory.

      Implementation includes:
      - NaCl Box encryption (X25519-XSalsa20-Poly1305) via pinenacl package
      - X25519 key pair generation (32-byte keys)
      - Message encryption with automatic nonce generation
      - Message decryption with MAC verification
      - Message envelope format matching RemoteAgents protocol

      Encryption format: Base64(nonce || ciphertext)
      - nonce: 24 bytes (192 bits)
      - ciphertext: variable length (includes 16-byte Poly1305 MAC)

      This was incorrectly marked as "future" when it has been implemented.

    starting_state:
      environment:
        app_installed: true
        platform: "web"
        paired: true
        connection_status: "connected"

    journey:
      - step: 1
        action: "Generate key pair for encryption"
        expected: "KeyPair generated with 32-byte private and public keys"
        failure_indicators:
          - "Keys not generated"
          - "Wrong key length"
          - "Weak randomness"

      - step: 2
        action: "Encrypt outgoing message"
        expected: "Message encrypted with NaClCrypto.encrypt(), format: Base64(nonce || ciphertext)"
        failure_indicators:
          - "Encryption fails"
          - "Wrong format"
          - "No nonce generated"

      - step: 3
        action: "Decrypt incoming message"
        expected: "Message decrypted with NaClCrypto.decrypt(), MAC verified"
        failure_indicators:
          - "Decryption fails"
          - "MAC verification skipped"
          - "Wrong keys used"

      - step: 4
        action: "Create message envelope"
        expected: |
          MessageEnvelope.seal() creates:
          {
            "type": "<message_type>",
            "payload": "<encrypted_base64>",
            "sender_public_key": "<base64>",
            "timestamp": "<iso8601>"
          }
        failure_indicators:
          - "Wrong JSON format"
          - "Missing fields"
          - "Type not snake_case"

    success_criteria:
      - "KeyPair.generate() creates valid X25519 key pair (32 bytes each)"
      - "NaClCrypto.encrypt() returns Base64(nonce || ciphertext)"
      - "NaClCrypto.decrypt() verifies MAC and returns plaintext"
      - "24-byte nonce automatically generated for each encryption"
      - "Poly1305 MAC (16 bytes) included in ciphertext"
      - "MessageEnvelope matches RemoteAgents protocol format"
      - "Compatible with PyNaCl on server side"

    testing:
      web: true
      widget_test: true
      integration_test: true
      note: "Integration test verifies compatibility with RemoteAgents server"

    implementation_references:
      - "lib/core/crypto/nacl_crypto.dart (X25519-XSalsa20-Poly1305 encryption)"
      - "lib/core/crypto/key_pair.dart (X25519 key pair generation)"
      - "lib/core/crypto/message_envelope.dart (protocol format)"
      - "pubspec.yaml:13 (pinenacl: ^0.6.0)"

