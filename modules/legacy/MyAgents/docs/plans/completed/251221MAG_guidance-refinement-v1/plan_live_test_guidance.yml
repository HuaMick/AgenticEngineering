# Guidance Testing Implementation Plan
# Follow-on work from guidance-refinement-v1 to implement guidance testing

plan_name: "Implement planner-test-guidance Agent"
worktree: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1"
branch: "guidance-refinement-v1"
created: "2025-12-21"
status: "completed"
objective: "Create agents for testing agent guidance through simulation"

proposal_reference: "proposal_planner-test-guidance.md"

inputs:
  # Existing patterns to reuse
  - location: "assets/definitions/strategy-agent-blind-test.yml"
    description: "Pattern for blind testing - adapt for guidance"
  - location: "agents/test/test-user-simulator/process.yml"
    description: "User simulator pattern - template for guidance simulator"
  - location: "assets/definitions/agent-loops.yml"
    description: "Loop definitions - add guidance-test-loop"
  - location: "assets/definitions/friction.yml"
    description: "Friction patterns for gap categorization"

  # Teaching framework
  - location: "assets/definitions/path.yml"
    description: "Path concept for guidance validation"
  - location: "assets/definitions/fence.yml"
    description: "Fence concept for constraint validation"
  - location: "assets/definitions/signpost.yml"
    description: "Signpost concept for discoverability testing"

phases:
  - name: "phase-1-core-structure"
    description: "Create core agent structure and loop definition"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "planner-test-guidance agent has process.yml, inputs.yml, manifest.yml"
      - "test-guidance-simulator agent has process.yml, inputs.yml, manifest.yml"
      - "guidance-test-loop defined in agent-loops.yml"
      - "strategy-guidance-blind-test.yml created with testing strategy"

    tasks:
      - id: "1.1"
        description: "Add guidance-test-loop to agent-loops.yml"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        context:
          target_file: "assets/definitions/agent-loops.yml"
          required_changes:
            - "Add guidance-test-loop definition to loop_types"
            - "Purpose: Validate guidance completeness through agent simulation"
            - "Phase: guidance-validation"
            - "Maximum iterations: 3"
            - "Core pattern: Define task → Spawn simulator → Execute → Report gaps → Fix → Repeat"
        acceptance_criteria:
          - "guidance-test-loop defined in agent-loops.yml"
          - "Follows same structure as other loop definitions"
        files:
          - "assets/definitions/agent-loops.yml"

      - id: "1.2"
        description: "Create strategy-guidance-blind-test.yml definition"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        context:
          target_file: "assets/definitions/strategy-guidance-blind-test.yml"
          template: "assets/definitions/strategy-agent-blind-test.yml"
          required_sections:
            - "Concept and purpose"
            - "Critical requirements (minimal context, no code inspection)"
            - "Test scenarios (task completion, reference resolution, loop context, subagent spawning)"
            - "Validation checklist"
            - "Failure reporting structure"
        acceptance_criteria:
          - "File exists at assets/definitions/strategy-guidance-blind-test.yml"
          - "Defines guidance-blind-test strategy parallel to agent-blind-test"
          - "Includes test scenarios for guidance validation"
        files:
          - "assets/definitions/strategy-guidance-blind-test.yml"

      - id: "1.3"
        description: "Create planner-test-guidance agent"
        status: "completed"
        agent_type: "teacher-process"
        operation: "CREATE"
        context:
          target_directory: "agents/planner/planner-test-guidance/"
          files_to_create:
            - "process.yml - Planning process for guidance tests"
            - "inputs.yml - Input definitions with layers"
            - "manifest.yml - Agent metadata"
          reference_agent: "agents/planner/planner-test/process.yml"
          key_differences:
            - "Focus on guidance testing, not implementation testing"
            - "Test scenarios: task completion, reference resolution, loop context"
            - "Uses guidance-test-loop instead of test-fix-loop"
        acceptance_criteria:
          - "agents/planner/planner-test-guidance/process.yml exists"
          - "agents/planner/planner-test-guidance/inputs.yml exists"
          - "agents/planner/planner-test-guidance/manifest.yml exists"
          - "Process defines guidance test planning workflow"
        files:
          - "agents/planner/planner-test-guidance/process.yml"
          - "agents/planner/planner-test-guidance/inputs.yml"
          - "agents/planner/planner-test-guidance/manifest.yml"

      - id: "1.4"
        description: "Create test-guidance-simulator agent"
        status: "completed"
        agent_type: "teacher-process"
        operation: "CREATE"
        context:
          target_directory: "agents/test/test-guidance-simulator/"
          files_to_create:
            - "process.yml - Simulation execution process"
            - "inputs.yml - Minimal inputs for blind testing"
            - "manifest.yml - Agent metadata"
          reference_agent: "agents/test/test-user-simulator/process.yml"
          key_differences:
            - "Receives process.yml + inputs.yml instead of README + user story"
            - "Executes agent task instead of user journey"
            - "Reports guidance gaps instead of documentation gaps"
            - "Tests subagent spawning patterns"
        acceptance_criteria:
          - "agents/test/test-guidance-simulator/process.yml exists"
          - "agents/test/test-guidance-simulator/inputs.yml exists"
          - "agents/test/test-guidance-simulator/manifest.yml exists"
          - "Process defines guidance simulation workflow"
        files:
          - "agents/test/test-guidance-simulator/process.yml"
          - "agents/test/test-guidance-simulator/inputs.yml"
          - "agents/test/test-guidance-simulator/manifest.yml"

  - name: "phase-2-test-scenarios"
    description: "Implement specific test scenario definitions"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "Test scenarios documented in guidance-test-scenarios.yml"
      - "Example test plan created"
      - "Example test report created"
    dependencies:
      - "phase-1-core-structure"

    tasks:
      - id: "2.1"
        description: "Create guidance-test-scenarios.yml definition"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        context:
          target_file: "assets/definitions/guidance-test-scenarios.yml"
          scenarios_to_define:
            - "task_completion_test: Can agent complete task with guidance only?"
            - "reference_resolution_test: Do all paths in inputs.yml resolve?"
            - "loop_context_test: Do loop participants have loop_context?"
            - "subagent_spawning_test: Can orchestrator spawn children successfully?"
            - "friction_detection_test: Are there hidden prerequisites?"
        acceptance_criteria:
          - "File exists at assets/definitions/guidance-test-scenarios.yml"
          - "All 5 test scenarios defined with purpose, inputs, expected_outputs"
        files:
          - "assets/definitions/guidance-test-scenarios.yml"

      - id: "2.2"
        description: "Create example guidance test plan"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        context:
          target_file: "assets/examples/test/guidance-test-plan.yml"
          structure:
            - "plan_name, target_agent, worktree, branch"
            - "test_scenarios list with specific tests"
            - "Each test has id, scenario_type, target_file, task_definition"
            - "success_criteria for each test"
        acceptance_criteria:
          - "Example file exists at assets/examples/test/guidance-test-plan.yml"
          - "Shows complete test plan structure"
          - "Uses realistic agent names and file paths"
        files:
          - "assets/examples/test/guidance-test-plan.yml"

      - id: "2.3"
        description: "Create example guidance test report"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        context:
          target_file: "assets/examples/test/guidance-test-report.yml"
          structure:
            - "test_run metadata (timestamp, target_agent, simulator_agent)"
            - "results list with pass/fail for each scenario"
            - "gaps_found list with friction categorization"
            - "recommendations for guidance fixes"
        acceptance_criteria:
          - "Example file exists at assets/examples/test/guidance-test-report.yml"
          - "Shows complete report structure"
          - "Includes gap categorization aligned with friction.yml"
        files:
          - "assets/examples/test/guidance-test-report.yml"

  - name: "phase-3-integration"
    description: "Integrate guidance testing into orchestration workflow"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "_teach.yml updated with guidance testing step"
      - "orchestration/process.mm includes guidance test node"
      - "planner-test-guidance referenced in agent-categories.yml"
    dependencies:
      - "phase-2-test-scenarios"

    tasks:
      - id: "3.1"
        description: "Update _teach.yml entrypoint with guidance testing"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_file: "entrypoints/_teach.yml"
          required_changes:
            - "Add Step 4a: Spawn planner-test-guidance for test planning"
            - "Add Step 4b: Spawn test-guidance-simulator for execution"
            - "Update Step 4 (Final Audit) to include guidance test results"
        acceptance_criteria:
          - "_teach.yml includes guidance testing steps"
          - "Guidance testing happens before final audit"
          - "Failed tests trigger return to planning"
        files:
          - "entrypoints/_teach.yml"

      - id: "3.2"
        description: "Update orchestration process.mm with guidance test node"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_files:
            - "agents/orchestration/orchestration-guidance/process.mm"
            - "agents/orchestration/orchestration-build/process.mm"
          required_changes:
            - "Add GuidanceTest node between ExecutePhases and SpawnAudit"
            - "Add decision node: GuidanceTestsPassed?"
            - "Failed path returns to PlanningLoop with gaps as friction"
        acceptance_criteria:
          - "Both process files include GuidanceTest step"
          - "Decision nodes route failures back to planning"
          - "Visual flow shows guidance testing in execution path"
        files:
          - "agents/orchestration/orchestration-guidance/process.mm"
          - "agents/orchestration/orchestration-build/process.mm"

      - id: "3.3"
        description: "Register new agents in agent-categories.yml"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        context:
          target_file: "assets/definitions/agent-categories.yml"
          required_changes:
            - "Add planner-test-guidance to planner category agents list"
            - "Add test-guidance-simulator to test category agents list"
        acceptance_criteria:
          - "planner-test-guidance listed in planner category"
          - "test-guidance-simulator listed in test category"
        files:
          - "assets/definitions/agent-categories.yml"

  - name: "phase-4-validation"
    description: "Validate guidance testing with self-test"
    agent_category: "test"
    status: "completed"
    success_criteria:
      - "test-guidance-simulator can test planner-test-guidance"
      - "Reference resolution detects intentionally broken path"
      - "Loop context test detects missing loop_context"
    dependencies:
      - "phase-3-integration"

    tasks:
      - id: "4.1"
        description: "Self-test: Run guidance simulator on new agents"
        status: "completed"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          target_agents:
            - "agents/planner/planner-test-guidance/"
            - "agents/test/test-guidance-simulator/"
          test_scenarios:
            - "task_completion_test"
            - "reference_resolution_test"
            - "loop_context_test"
        acceptance_criteria:
          - "Both new agents pass task completion test"
          - "All references resolve correctly"
          - "Loop contexts are properly defined"
        files:
          - "agents/planner/planner-test-guidance/process.yml"
          - "agents/test/test-guidance-simulator/process.yml"

      - id: "4.2"
        description: "Negative test: Verify detection of broken guidance"
        status: "completed"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          test_approach: "Create temporary broken guidance and verify detection"
          expected_detections:
            - "Broken file reference in inputs.yml"
            - "Missing loop_context for loop participant"
            - "Unclear step in process.yml"
        acceptance_criteria:
          - "Simulator correctly identifies broken reference"
          - "Simulator correctly identifies missing loop_context"
          - "False positive rate is low (no spurious failures)"
        files: []

success_criteria:
  user_validation:
    - "Guidance changes can be tested automatically before deployment"
    - "Guidance gaps are detected before they cause agent failures"
    - "Testing workflow is integrated into _teach.yml entrypoint"

  technical_validation:
    - "planner-test-guidance creates valid test plans"
    - "test-guidance-simulator executes with minimal context"
    - "Friction detection aligns with friction.yml patterns"
    - "guidance-test-loop follows standard loop structure"

notes:
  - "This extends the existing agent-blind-test pattern for guidance"
  - "Leverages subagent spawning for realistic simulation"
  - "Integrates with existing orchestration workflow"
  - "Self-validating: new agents are tested by the system they create"
