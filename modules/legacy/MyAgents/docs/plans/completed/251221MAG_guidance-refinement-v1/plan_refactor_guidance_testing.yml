# Live Plan: Refactor Guidance Testing Strategy
# BUILD/REFACTOR Phase
# This plan moves guidance test planning upstream and replaces agent simulation with guidance walkthrough validation.

plan_name: "Refactor Guidance Testing Strategy"
worktree: /home/code/myagents/MyAgentsGuidance-guidance-refinement-v1
branch: guidance-refinement-v1
liveplan: /home/code/myagents/MyAgentsGuidance-guidance-refinement-v1/docs/plans/live/251221MAG_guidance-refinement-v1/live/plan_live_teach.yml
completedplan: /home/code/myagents/MyAgentsGuidance-guidance-refinement-v1/docs/plans/completed/251221MAG_guidance-refinement-v1/plan_live_teach.yml

inputs:
  # Orchestration process files
  - location: agents/orchestration/orchestration-guidance/process.mmd
    description: "Orchestration workflow that coordinates planning and execution phases"

  # Test planning agent
  - location: agents/planner/planner-test-guidance/process.yml
    description: "Test planner that generates guidance validation test plans"

  # Test execution agent
  - location: agents/test/test-guidance-simulator/process.yml
    description: "Test executor that performs walkthrough-based guidance validation"

  # Reference definitions
  - location: assets/definitions/guidance-test-scenarios.yml
    description: "Defines guidance test scenarios and walkthrough validation strategy"

  - location: assets/definitions/strategy-guidance-blind-test.yml
    description: "Defines the blind test strategy for guidance validation"

  - location: assets/definitions/agent-loops.yml
    description: "Defines agent loop patterns including guidance-test-loop"

live-plans:
  - id: MAG-REFACTOR-001
    title: Refactor Guidance Testing Strategy
    description: |
      Move guidance test planning upstream into the planning loop and replace agent simulation
      with guidance walkthrough validation. This ensures guidance quality is validated early
      in the workflow before execution begins.

    phases:
      # ========================================
      # PHASE 1: ORCHESTRATION REFACTORING
      # ========================================
      - name: Orchestration Refactoring
        dependencies: []
        execution_groups:
          - execution: sequential
            agents:
              - type: teacher-update-guidance
                inputs:
                  - agents/orchestration/orchestration-guidance/process.mmd
                guidance: |
                  Operation: UPDATE file at agents/orchestration/orchestration-guidance/process.mmd

                  Context: The orchestration process currently runs test planning during the
                  execution phase. This means implementation plans can be approved before
                  guidance quality is validated. We need to move planner-test-guidance spawning
                  into the Planning & Review subgraph so that both implementation and test
                  plans are ready before execution begins.

                  Instructions:
                  1. Review the current process.mmd to understand the Planning & Review subgraph
                  2. Move the planner-test-guidance spawning step from the execution phase into
                     the Planning & Review subgraph
                  3. Ensure planner-test-guidance runs after planner-build/planner-teach complete
                  4. Update the transition logic so the Execution phase only starts after BOTH:
                     - Implementation plan approved (planner-build/planner-teach)
                     - Test plan approved (planner-test-guidance)
                  5. Add decision nodes to handle test planning failures (return to teaching if needed)

                  Why this matters: Early validation of guidance quality prevents implementing
                  features with unclear or broken guidance, reducing rework cycles.
                success_criteria:
                  - process.mmd shows planner-test-guidance as part of Planning & Review subgraph
                  - Execution phase depends on both implementation AND test plan approval
                  - Decision nodes handle test planning failures gracefully
                  - Workflow diagram clearly shows test planning happens before execution

      # ========================================
      # PHASE 2: AGENT LOGIC REFACTORING
      # Dependencies: Phase 1 must complete first to ensure orchestration supports new workflow
      # ========================================
      - name: Agent Logic Refactoring
        dependencies: ["Orchestration Refactoring"]
        execution_groups:
          # These two agents can run in parallel - they work on different files
          - execution: parallel
            agents:
              - type: teacher-update-guidance
                inputs:
                  - agents/planner/planner-test-guidance/process.yml
                  - assets/definitions/guidance-test-scenarios.yml
                  - assets/definitions/strategy-guidance-blind-test.yml
                guidance: |
                  Operation: UPDATE file at agents/planner/planner-test-guidance/process.yml

                  Context: planner-test-guidance currently generates simulation-based test tasks
                  that rely on user stories and complex scenario creation. We need to shift to
                  a walkthrough-based strategy that focuses on guidance quality validation.

                  Instructions:
                  1. Review assets/definitions/guidance-test-scenarios.yml to understand the
                     walkthrough validation approach
                  2. Review assets/definitions/strategy-guidance-blind-test.yml to understand
                     the blind test methodology
                  3. Update process.yml to generate walkthrough tasks that:
                     - Validate guidance clarity and completeness
                     - Check for broken references and missing context
                     - Verify guidance can be followed without external knowledge
                  4. Explicitly avoid "simulation" and "user story" terminology
                  5. Focus on generating tasks that spawn target agents to review their own guidance
                  6. Ensure generated plans reference the walkthrough validation strategy

                  Why this matters: Walkthrough validation directly tests guidance quality
                  without the complexity of scenario simulation, making tests faster and
                  more maintainable.
                success_criteria:
                  - Generated test plans focus on guidance walkthrough and reference validation
                  - Plans explicitly avoid simulation and user story terminology
                  - Generated tasks spawn target agents for self-guided review
                  - Plans reference guidance-test-scenarios.yml and strategy-guidance-blind-test.yml

              - type: teacher-update-guidance
                inputs:
                  - agents/test/test-guidance-simulator/process.yml
                  - assets/definitions/guidance-test-scenarios.yml
                  - assets/definitions/agent-loops.yml
                guidance: |
                  Operation: UPDATE file at agents/test/test-guidance-simulator/process.yml

                  Context: test-guidance-simulator currently executes simulation-based tests.
                  We need to refactor it to execute walkthrough-based validation that spawns
                  target agents to perform their own guidance review.

                  Instructions:
                  1. Review assets/definitions/guidance-test-scenarios.yml to understand
                     walkthrough execution requirements
                  2. Review assets/definitions/agent-loops.yml to understand the guidance-test-loop
                  3. Update process.yml to:
                     - Spawn the target agent with instructions to review its own guidance
                     - Collect feedback on ambiguities, broken references, and missing context
                     - Report findings in structured format for teacher agents to consume
                  4. Remove simulation execution logic and user story handling
                  5. Implement walkthrough execution that focuses on guidance clarity
                  6. Ensure the agent can participate in the guidance-test-loop for iterative refinement

                  Why this matters: Agents performing self-guided review expose guidance issues
                  that simulations might miss, providing more authentic validation.
                success_criteria:
                  - Agent spawns target agents to perform self-guided guidance review
                  - Agent reports ambiguities, broken references, and missing context in structured format
                  - Simulation and user story logic removed
                  - Agent correctly participates in guidance-test-loop as defined in agent-loops.yml

      # ========================================
      # PHASE 3: GUIDANCE REPAIR LOOP VERIFICATION
      # Dependencies: Phases 1 and 2 must complete to ensure the full workflow is in place
      # ========================================
      - name: Guidance Repair Loop Verification
        dependencies: ["Orchestration Refactoring", "Agent Logic Refactoring"]
        execution_groups:
          - execution: sequential
            agents:
              - type: teacher-update-guidance
                inputs:
                  - agents/orchestration/orchestration-guidance/process.mmd
                  - assets/definitions/agent-loops.yml
                guidance: |
                  Operation: UPDATE file at agents/orchestration/orchestration-guidance/process.mmd

                  Context: With test planning moved upstream and walkthrough validation implemented,
                  we need to verify that the feedback loop from walkthrough findings to the
                  Planning-Teach Loop works correctly.

                  Instructions:
                  1. Review process.mmd to identify the return-to-planning logic
                  2. Verify that failing walkthrough tests trigger the appropriate return-to-planning flow
                  3. Ensure teacher agents (planner-teach) receive specific walkthrough failure details
                  4. Confirm the guidance-test-loop defined in agent-loops.yml is correctly integrated
                  5. Add any missing decision nodes or feedback paths
                  6. Document the expected behavior when walkthrough validation fails

                  Why this matters: The repair loop ensures guidance issues found during validation
                  are fed back to teacher agents for correction, creating a quality improvement cycle.
                success_criteria:
                  - Failing walkthrough tests trigger return-to-planning logic in process.mmd
                  - Teacher agents receive specific walkthrough failure details
                  - guidance-test-loop from agent-loops.yml is correctly integrated
                  - Decision nodes handle walkthrough failures and route to appropriate teacher agents
                  - Expected behavior documented in comments or annotations

      # ========================================
      # PHASE 4: TESTING VALIDATION
      # Dependencies: All previous phases must complete to test the end-to-end workflow
      # ========================================
      - name: Testing Validation
        dependencies: ["Orchestration Refactoring", "Agent Logic Refactoring", "Guidance Repair Loop Verification"]
        execution_groups:
          - execution: sequential
            agents:
              - type: test-guidance-simulator
                inputs:
                  - agents/orchestration/orchestration-guidance/process.mmd
                  - agents/planner/planner-test-guidance/process.yml
                  - agents/test/test-guidance-simulator/process.yml
                  - assets/definitions/guidance-test-scenarios.yml
                  - assets/examples/test/guidance-test-plan.yml
                  - assets/examples/test/guidance-test-report.yml
                guidance: |
                  Operation: Validate existing files and generate test report

                  Context: All refactoring phases are complete. We need to validate that the
                  guidance-test-loop works end-to-end as designed.

                  Instructions:
                  1. Review assets/examples/test/guidance-test-plan.yml to understand expected test plan format
                  2. Review assets/examples/test/guidance-test-report.yml to understand expected report format
                  3. Execute the guidance-test-loop by:
                     - Triggering planner-test-guidance to generate a walkthrough test plan
                     - Verifying the test plan follows the walkthrough strategy (not simulation)
                     - Executing test-guidance-simulator to perform walkthrough validation on:
                        * teacher-update-guidance
                        * teacher-update-assets
                        * assets/guidelines/orchestration-policy.yml (specifically escalation rules)
                     - Verifying the simulator spawns target agents correctly
                     - Collecting walkthrough findings and validation results
                  4. Intentionally introduce a guidance issue to test the repair loop:
                     - Add a broken reference or ambiguous instruction to test guidance
                     - Run the walkthrough validation
                     - Verify the failure is detected and reported
                     - Verify the feedback reaches the appropriate teacher agent
                  5. Generate a test report following guidance-test-report.yml format
                  6. Document any deviations from expected behavior

                  Failure Handling:
                  - If walkthrough validation tests FAIL, return to Phase 2 (Agent Logic Refactoring)
                  - Spawn teacher agents (planner-teach or teacher-update-assets) to fix:
                    * Broken guidance references in agent process.yml files
                    * Ambiguous or incomplete instructions
                    * Missing context or definitions in assets/definitions/
                  - Re-run validation after fixes are applied
                  - If orchestration logic fails, return to Phase 1 (Orchestration Refactoring) and spawn teacher-update-guidance agent to fix process.mmd

                  Why this matters: End-to-end validation ensures the complete workflow functions
                  correctly and that guidance quality issues are caught and repaired as designed.
                success_criteria:
                  - planner-test-guidance generates walkthrough-based test plan (not simulation-based)
                  - Generated test plan matches format in guidance-test-plan.yml
                  - test-guidance-simulator executes walkthrough validation successfully
                  - Simulator spawns target agents and collects feedback correctly
                  - Intentionally introduced guidance issue is detected and reported
                  - Failure feedback reaches appropriate teacher agent for repair
                  - Test report generated following guidance-test-report.yml format
                  - No unexpected errors or workflow deviations observed
