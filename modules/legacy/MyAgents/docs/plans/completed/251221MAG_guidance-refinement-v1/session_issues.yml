session_issues:
  - id: FR-TEST-001
    category: AGENT_TYPE_MISMATCH
    severity: HIGH
    description: "Attempted to spawn 'test-guidance-simulator' as Claude Code subagent type, but it is not a registered runtime type."
    root_cause: "Gap between MyAgents guidance definitions and Claude Code's internal subagent registry."
    recommendation: "Document a mapping between MyAgents agent names and spawnable Claude Code subagent types."

  - id: FR-AUDIT-001
    category: INCOMPLETE_INTEGRATION
    severity: CRITICAL
    description: "Tasks marked 'completed' in plan (agent registration in agent-categories.yml) were not actually executed."
    root_cause: "Tasks used as aspirational scaffolding; crash recovery led to false assumptions of completion."
    recommendation: "Reserve 'completed' status for verified work; use 'planned' or 'scaffolded' for pre-execution markers."

  - id: FR-AUDIT-002
    category: INCOMPLETE_INTEGRATION
    severity: HIGH
    description: "Process diagram nodes for GuidanceTest missing in orchestration-build/process.mm despite 'completed' status."
    root_cause: "Partial execution or failure to propagate changes across all relevant process files."
    recommendation: "Implement automated verification of diagram nodes during the audit phase."

  - id: FR-TEST-002
    category: MISSING_LOOP_CONTEXT
    severity: HIGH
    description: "Agents registered in guidance-test-loop lacked loop_context in their individual process.yml files."
    impact: "Agents cannot self-determine their role or exit conditions within the loop."
    recommendation: "Enforce a rule that any agent in agent-loops.yml must have a corresponding loop_context section in its process.yml."

  - id: FR-PREREQ-001
    category: HIDDEN_PREREQUISITE
    severity: LOW
    description: "Redundant effort checking for directory existence that was already completed."
    recommendation: "Improve state handoff between agents regarding physical filesystem modifications."

final_audit_summary:
  initial_verdict: "CONDITIONAL PASS"
  blocking_gaps: 2
  remediation_status: "FIXED (manual intervention by teacher-agent)"
  final_verdict: "PASS"

