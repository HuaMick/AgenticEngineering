plan_name: "Guidance Refinement - Orchestration Deviation Resolution"
worktree: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1"
branch: "guidance-refinement-v1"
created: "2025-12-23"
objective: "Address orchestration deviations discovered during Knowledge Encapsulation plan execution: agent-task mismatches, generic naming confusion, and missing escalation policy"

# This plan addresses three critical orchestration issues:
# 1. Agent-task mismatch not caught: Plans specified agents that couldn't handle the tasks
# 2. Orchestrator did work directly: When mismatch was found, work was done directly instead of escalating
# 3. Generic naming caused confusion: "teacher-process" didn't clearly indicate its purpose
#
# Root causes:
# - teacher-process name too generic, scope unclear
# - teacher-update-assets scope too narrow (excluded inputs.yml files)
# - Execute_Plan.yml lacked explicit agent-task mismatch handling guidance
# - No clear escalation policy for mismatch scenarios

inputs:
  - location: "docs/plans/live/251221MAG_guidance-refinement-v1/orchestration_knowledge_encapsulation.mmd"
    description: "Orchestration session documenting the deviations and user decisions"
  - location: "agents/teacher/teacher-process/process.yml"
    description: "Current teacher-process agent (to be renamed)"
  - location: "agents/teacher/teacher-update-assets/process.yml"
    description: "Current teacher-update-assets scope (needs expansion)"
  - location: "processes/Execute_Plan.yml"
    description: "Orchestration process needing escalation policy"
  - location: "docs/agent-role-scope-matrix.md"
    description: "Agent scope definitions to update"
  - location: "assets/definitions/agent-categories.yml"
    description: "Agent category definitions"

phases:
  - name: "phase-1-rename-teacher-process"
    description: "Rename teacher-process to teacher-update-guidance for clarity"
    agent_category: "teacher"
    success_criteria:
      - "Folder renamed from teacher-process to teacher-update-guidance"
      - "All internal file references updated"
      - "process.yml goal clearly indicates it handles inputs.yml and process files"
      - "No broken references to old name"

    tasks:
      - id: "1.1"
        description: "Rename teacher-process folder to teacher-update-guidance"
        agent_type: "bash"
        operation: "RENAME"
        context:
          from_path: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1/agents/teacher/teacher-process"
          to_path: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1/agents/teacher/teacher-update-guidance"
          rationale: "Generic 'teacher-process' name caused confusion about scope; new name clearly indicates it updates guidance files (process.yml and inputs.yml)"
        acceptance_criteria:
          - "Directory exists at agents/teacher/teacher-update-guidance/"
          - "Old directory agents/teacher/teacher-process/ does not exist"
          - "All files preserved in new location (manifest.yml, process.yml, inputs.yml)"
        files:
          - "agents/teacher/teacher-process/"
          - "agents/teacher/teacher-update-guidance/"

      - id: "1.2"
        description: "Update teacher-update-guidance/process.yml goal to clarify scope"
        agent_type: "bash"
        operation: "UPDATE"
        note: "Using bash because teacher-update-guidance agent doesn't exist yet after rename in 1.1"
        context:
          target_file: "agents/teacher/teacher-update-guidance/process.yml"
          current_goal: "Analyze agent execution patterns and improve agent paths, fences, and signposts by updating process files, examples, and guidance documents."
          issue: "Doesn't explicitly mention inputs.yml files, causing confusion about whether this agent handles them"
          required_changes:
            - "Update goal to explicitly state: 'by updating process.yml files, inputs.yml files, and inline guidance/examples'"
            - "Clarify that this agent handles both process instructions and input configuration"
            - "Maintain focus on process-level guidance (not shared assets)"
        acceptance_criteria:
          - "goal section in process.yml explicitly mentions inputs.yml files"
          - "Clear distinction between process-level guidance (this agent) vs shared assets (teacher-update-assets)"
          - "Scope clearly covers process.yml AND inputs.yml files"
        files:
          - "agents/teacher/teacher-update-guidance/process.yml"

      - id: "1.3"
        description: "Update teacher-update-guidance/inputs.yml references"
        agent_type: "bash"
        operation: "UPDATE"
        note: "Using bash because teacher-update-guidance agent doesn't exist yet after rename in 1.1"
        context:
          target_file: "agents/teacher/teacher-update-guidance/inputs.yml"
          current_state: "Self-references use old 'teacher-process' name"
          required_changes:
            - "Update location path from 'agents/teacher/teacher-process/inputs.yml' to 'agents/teacher/teacher-update-guidance/inputs.yml'"
            - "Update description references from 'teacher-process' to 'teacher-update-guidance'"
            - "Update any comments referencing the agent name"
        acceptance_criteria:
          - "All references to 'teacher-process' replaced with 'teacher-update-guidance'"
          - "File path locations are accurate"
          - "No orphaned references to old name"
        files:
          - "agents/teacher/teacher-update-guidance/inputs.yml"

      - id: "1.4"
        description: "Update teacher-update-guidance/manifest.yml"
        agent_type: "bash"
        operation: "UPDATE"
        note: "Using bash because teacher-update-guidance agent doesn't exist yet after rename in 1.1"
        context:
          target_file: "agents/teacher/teacher-update-guidance/manifest.yml"
          current_state: "Manifest uses old agent name"
          required_changes:
            - "Update agent_name to 'teacher-update-guidance'"
            - "Update description to clarify scope includes inputs.yml files"
        acceptance_criteria:
          - "agent_name is 'teacher-update-guidance'"
          - "Description accurately reflects updated scope"
        files:
          - "agents/teacher/teacher-update-guidance/manifest.yml"

  - name: "phase-2-expand-teacher-update-assets-scope"
    description: "Expand teacher-update-assets scope to include inputs.yml files across agents"
    agent_category: "teacher"
    success_criteria:
      - "teacher-update-assets process.yml goal includes inputs.yml files"
      - "Clear guidance on when to use teacher-update-assets vs teacher-update-guidance for inputs.yml"
      - "Scope expansion documented in process steps"
    dependencies:
      - "phase-1-rename-teacher-process"

    tasks:
      - id: "2.1"
        description: "Update teacher-update-assets/process.yml goal to include inputs.yml files"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        note: "teacher-update-guidance has authority to update process.yml files across teacher category (cross-agent scope update is part of its core function)"
        context:
          target_file: "agents/teacher/teacher-update-assets/process.yml"
          current_goal: "Add or update shared assets in assets/ so multiple agents can reuse core content (definitions, guidelines, examples) without duplication."
          issue: "Scope too narrow - excludes inputs.yml files which are also shared configuration"
          required_changes:
            - "Expand goal to: 'Add or update shared assets (definitions, guidelines, examples, agent inputs.yml) so multiple agents can reuse core content without duplication.'"
            - "Add clarification in steps about when to update inputs.yml files"
            - "Distinguish between: agent-specific inputs (use teacher-update-guidance) vs shared/multi-agent inputs (use teacher-update-assets)"
        acceptance_criteria:
          - "goal mentions inputs.yml files as part of scope"
          - "Process steps include guidance on inputs.yml file updates"
          - "Clear distinction between agent-specific vs shared inputs documented"
        files:
          - "agents/teacher/teacher-update-assets/process.yml"

      - id: "2.2"
        description: "Add inputs.yml handling guidance to teacher-update-assets steps"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        note: "Continuation of 2.1 - updating same file with additional step content"
        context:
          target_file: "agents/teacher/teacher-update-assets/process.yml"
          current_state: "Steps focus only on assets/ directory content"
          required_changes:
            - "Add to 'Pick the asset type' step: 'input-config: shared agent configuration (inputs.yml used by 2+ agents)'"
            - "Add to 'Decide if it belongs in shared assets' step: guidance on when inputs.yml changes should be shared vs agent-specific"
            - "Add to 'Update indexes' step: guidance on updating agent input references when shared inputs change"
        acceptance_criteria:
          - "Steps explicitly mention inputs.yml as an asset type"
          - "Clear criteria for shared vs agent-specific inputs"
          - "Index update guidance covers input file changes"
        files:
          - "agents/teacher/teacher-update-assets/process.yml"

  - name: "phase-3-update-orchestration-guidance"
    description: "Add agent-task mismatch handling and escalation policy to Execute_Plan.yml"
    agent_category: "teacher"
    success_criteria:
      - "Execute_Plan.yml includes explicit agent-task mismatch detection guidance"
      - "Hybrid escalation policy documented (update plan if agent exists, escalate if not)"
      - "Clear fence against orchestrator doing specialist work directly"
    dependencies:
      - "phase-1-rename-teacher-process"
      - "phase-2-expand-teacher-update-assets-scope"

    tasks:
      - id: "3.0"
        description: "Validate agent-role-scope-matrix.md accuracy before using as authoritative source"
        agent_type: "bash"
        operation: "VERIFY"
        note: "Prevents stale matrix from causing agent selection errors"
        context:
          target_file: "docs/agent-role-scope-matrix.md"
          validation_checks:
            - "Verify matrix contains entry for teacher-update-guidance (renamed in phase 1)"
            - "Verify matrix contains entry for teacher-update-assets"
            - "Cross-reference scopes with actual process.yml files for accuracy"
          rationale: "Escalation policy relies on matrix as source of truth - must be accurate first"
        acceptance_criteria:
          - "Matrix entries exist for both teacher agents"
          - "Scope descriptions match actual process.yml goals"
          - "No orphaned entries for old agent names"
        files:
          - "docs/agent-role-scope-matrix.md"
          - "agents/teacher/teacher-update-guidance/process.yml"
          - "agents/teacher/teacher-update-assets/process.yml"

      - id: "3.1"
        description: "Add agent-task mismatch detection guidance to Execute_Plan.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "processes/Execute_Plan.yml"
          current_state: "Steps mention 'Handle issues during execution' but lack specific guidance for agent-task mismatch"
          issue: "Orchestrator didn't detect when plan specified wrong agent for a task"
          required_changes:
            - "Add new step section: 'Validate agent-task alignment before spawning'"
            - "Check: Does the specified agent's scope (from agent-role-scope-matrix.md) cover this task?"
            - "Fence: If agent scope doesn't match task requirements, DO NOT proceed with spawning"
            - "Reference agent-role-scope-matrix.md as authoritative source for agent scopes"
        acceptance_criteria:
          - "New validation step exists before agent spawning"
          - "Clear fence prevents spawning mismatched agents"
          - "References agent-role-scope-matrix.md for scope validation"
        files:
          - "processes/Execute_Plan.yml"

      - id: "3.2"
        description: "Add hybrid escalation policy to Execute_Plan.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "processes/Execute_Plan.yml"
          current_state: "Generic escalation guidance exists but not specific to agent-task mismatch"
          user_decision: "Hybrid approach: update plan if correct agent exists, escalate if no agent exists"
          required_changes:
            - "Add to 'Handle issues during execution' section"
            - "Agent-task mismatch resolution policy:"
            - "  1. Consult agent-role-scope-matrix.md to find correct agent for the task"
            - "  2. If correct agent exists in system → Update live plan with correct agent, return to planning loop"
            - "  3. If no agent exists for the task → Escalate to user with: task requirements, why current agent doesn't fit, what agent is needed"
            - "Add fence: 'NEVER do the specialist work yourself - orchestrators coordinate, they do not implement'"
        acceptance_criteria:
          - "Hybrid escalation policy clearly documented in steps"
          - "Two-path decision tree: agent exists vs no agent exists"
          - "Strong fence against orchestrator doing specialist work"
          - "Clear escalation format when no agent exists"
        files:
          - "processes/Execute_Plan.yml"

      - id: "3.3"
        description: "Add validation strategy for simple file checks"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "processes/Execute_Plan.yml"
          issue: "Orchestrator spawned agents for simple YAML syntax/file existence checks"
          user_decision: "Use bash validation steps in plans instead of spawning agents for mechanical checks"
          required_changes:
            - "Add to 'Execute plan phases' section"
            - "Validation strategy:"
            - "  - Mechanical validation (YAML syntax, file existence, basic structure) → Use bash steps directly in plan"
            - "  - Semantic validation (test quality, code correctness, logic) → Spawn appropriate test/audit agents"
            - "Add example: 'File existence check: use bash ls/test, not test-audit agent'"
        acceptance_criteria:
          - "Clear distinction between mechanical vs semantic validation"
          - "Guidance to use bash for simple checks"
          - "Example showing mechanical validation pattern"
        files:
          - "processes/Execute_Plan.yml"

  - name: "phase-4-update-agent-role-scope-matrix"
    description: "Update agent-role-scope-matrix.md with renamed agent and expanded scopes"
    agent_category: "teacher"
    success_criteria:
      - "teacher-update-guidance name and scope updated in matrix"
      - "teacher-update-assets scope expansion reflected in matrix"
      - "No references to old 'teacher-process' name"
    dependencies:
      - "phase-1-rename-teacher-process"
      - "phase-2-expand-teacher-update-assets-scope"

    tasks:
      - id: "4.1"
        description: "Update Teacher category section in agent-role-scope-matrix.md"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "docs/agent-role-scope-matrix.md"
          current_state: "Lists 'teacher-process' agent in Teacher Agents table"
          required_changes:
            - "Rename 'teacher-process' → 'teacher-update-guidance' in table row"
            - "Update Role column: 'Update process and input guidance'"
            - "Update Scope column: 'Identify friction, generate prioritized recommendations, update process.yml and inputs.yml files with instructions/examples; meta-level'"
            - "Update teacher-update-assets Scope: Add 'inputs.yml files (shared/multi-agent)' to scope"
        acceptance_criteria:
          - "Teacher Agents table shows 'teacher-update-guidance' (not teacher-process)"
          - "Both agents' scopes clearly distinguish their responsibilities"
          - "inputs.yml handling responsibility is clear for both agents"
        files:
          - "docs/agent-role-scope-matrix.md"

  - name: "phase-5-update-planner-references"
    description: "Update planner process files that reference teacher-process"
    agent_category: "teacher"
    success_criteria:
      - "planner-teach/process.yml uses new teacher-update-guidance name"
      - "All example references updated"
      - "No broken references in planner category"
    dependencies:
      - "phase-4-update-agent-role-scope-matrix"

    tasks:
      - id: "5.1"
        description: "Update teacher agent references in planner-teach process.yml"
        agent_type: "teacher-update-guidance"
        operation: "UPDATE"
        context:
          target_file: "agents/planner/planner-teach/process.yml"
          current_state: "References 'teacher-process' in guidelines and steps"
          required_changes:
            - "Update step 5 (Write your planning artifacts): Change 'teacher-process' → 'teacher-update-guidance'"
            - "Update 'Categories often requiring refinement' section to use new name"
            - "Verify all references to teacher agents use correct names"
        acceptance_criteria:
          - "All references to 'teacher-process' replaced with 'teacher-update-guidance'"
          - "Agent name usage is consistent throughout file"
        files:
          - "agents/planner/planner-teach/process.yml"

      - id: "5.2"
        description: "Update teaching plan example to use new agent names"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        context:
          target_file: "assets/examples/planner/teaching-plan-example.yml"
          current_state: "Example uses 'teacher-process' agent_type in tasks"
          required_changes:
            - "Update all task agent_type references from 'teacher-process' → 'teacher-update-guidance'"
            - "Add comment explaining when to use teacher-update-guidance vs teacher-update-assets"
        acceptance_criteria:
          - "All agent_type fields use 'teacher-update-guidance' (not teacher-process)"
          - "Comment clarifies agent selection criteria"
        files:
          - "assets/examples/planner/teaching-plan-example.yml"

  - name: "phase-6-validation"
    description: "Validate all changes for consistency and correctness"
    agent_category: "test"
    success_criteria:
      - "No broken file references across all modified files"
      - "All 'teacher-process' references eliminated"
      - "Agent scopes are clear and non-overlapping"
      - "Escalation policy is complete and actionable"
    dependencies:
      - "phase-5-update-planner-references"

    tasks:
      - id: "6.1"
        description: "Validate no broken references to teacher-process"
        agent_type: "bash"
        operation: "VERIFY"
        context:
          validation_commands:
            - "grep -r 'teacher-process' /home/code/myagents/MyAgentsGuidance-guidance-refinement-v1/ --exclude-dir=.git --exclude='*.mmd' --exclude='plan_*.yml'"
            - "Expected: No matches (or only in historical/archived content)"
            - "If matches found in active files: those files need updating"
        acceptance_criteria:
          - "Zero references to 'teacher-process' in active agent files"
          - "Zero references in process.yml, inputs.yml, manifest.yml files"
          - "Zero references in agent-role-scope-matrix.md"
        files:
          - "All files in MyAgentsGuidance-guidance-refinement-v1/"

      - id: "6.2"
        description: "Validate all file paths exist and are correct"
        agent_type: "bash"
        operation: "VERIFY"
        context:
          validation_checks:
            - "Verify agents/teacher/teacher-update-guidance/ exists"
            - "Verify agents/teacher/teacher-process/ does NOT exist"
            - "Verify all modified files are valid YAML (yamllint or python yaml.safe_load)"
            - "Check all references in inputs.yml files point to existing files"
        acceptance_criteria:
          - "New folder structure exists as expected"
          - "Old folder removed"
          - "All YAML files are syntactically valid"
          - "No dangling references in inputs.yml files"
        files:
          - "agents/teacher/teacher-update-guidance/"
          - "agents/teacher/teacher-update-assets/"
          - "processes/Execute_Plan.yml"

      - id: "6.3"
        description: "Validate agent scope clarity and non-overlap"
        agent_type: "test-final-output"
        operation: "AUDIT"
        note: "This is SEMANTIC/quality audit (test-final-output scope), not mechanical file validation (which uses bash per ISSUE-2 resolution)"
        context:
          scope: "Teacher category agents and orchestration process"
          critical_questions:
            - "Is it clear when to use teacher-update-guidance vs teacher-update-assets?"
            - "Are inputs.yml file responsibilities clearly assigned?"
            - "Does Execute_Plan.yml provide actionable guidance for agent-task mismatch?"
            - "Is the escalation policy clear and complete?"
            - "Can an orchestrator follow the guidance without ambiguity?"
        acceptance_criteria:
          - "Clear decision criteria for choosing between teacher agents"
          - "No ambiguity in inputs.yml file handling"
          - "Escalation policy is complete with examples"
          - "Agent-task mismatch handling is actionable"
        files:
          - "agents/teacher/teacher-update-guidance/process.yml"
          - "agents/teacher/teacher-update-assets/process.yml"
          - "processes/Execute_Plan.yml"
          - "docs/agent-role-scope-matrix.md"

success_criteria:
  user_validation:
    - "Agent names clearly communicate their purpose (no generic names like 'teacher-process')"
    - "Orchestrators can validate agent-task alignment before spawning agents"
    - "Clear escalation path when plan specifies wrong agent or no suitable agent exists"
    - "Orchestrators never do specialist work directly - always delegate or escalate"

  technical_validation:
    - "Folder renamed from teacher-process to teacher-update-guidance with all references updated"
    - "teacher-update-guidance scope explicitly includes inputs.yml and process.yml files"
    - "teacher-update-assets scope expanded to include shared inputs.yml files"
    - "Execute_Plan.yml includes agent-task mismatch detection and hybrid escalation policy"
    - "agent-role-scope-matrix.md accurately reflects renamed agent and expanded scopes"
    - "Zero broken references to 'teacher-process' in active files"
    - "All YAML files syntactically valid"

notes:
  - "This plan addresses root causes of orchestration deviations, not symptoms"
  - "Focuses on clear naming, explicit scope definitions, and actionable escalation guidance"
  - "Hybrid escalation approach balances autonomy (update plan) with safety (escalate when uncertain)"
  - "Bash validation for mechanical checks reduces unnecessary agent spawning"
  - "Uses teacher-update-guidance for process/input updates, teacher-update-assets for shared examples"
