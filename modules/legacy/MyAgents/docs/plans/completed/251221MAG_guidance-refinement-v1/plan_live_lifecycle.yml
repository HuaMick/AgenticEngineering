# Plan Lifecycle Management Guidance
# Follow-on work from guidance-refinement-v1 to address planning folder lifecycle gaps

plan_name: "Plan Lifecycle Management Guidance"
worktree: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v1"
branch: "guidance-refinement-v1"
created: "2025-12-21"
status: "completed"
objective: "Add clear guidance for plan folder lifecycle, follow-on work patterns, and completed vs archived distinction"

context: |
  Recent experience with adding guidance testing work to the completed guidance-refinement-v1 plan
  revealed critical gaps in agent guidance for managing plan folder lifecycles. Agents lack clear
  instructions on three key patterns:

  1. How to recognize and handle follow-on work (new phases added to existing plans)
  2. How to copy folders to completed/ while keeping them active in live/
  3. Why agents must never archive (archived/ is user-only)

  Current state shows contradiction: completed plans defined as single files in definitions,
  but reality shows folder-based structure with same name in both live/ and completed/.

inputs:
  # Current definitions with gaps
  - location: "assets/definitions/plans.yml"
    description: "Plan types - missing lifecycle stages and follow-on work pattern"
  - location: "assets/definitions/folder-structure.yml"
    description: "Folder structure - file vs folder contradiction for completed/"
  - location: "docs/plans/live/README.md"
    description: "Live plans README - linear lifecycle needs follow-on work pattern"

  # Process files referencing completion
  - location: "agents/planner/planner-cleaning/process.yml"
    description: "Cleaning planner - needs folder lifecycle determination logic"
  - location: "processes/Execute_Plan.yml"
    description: "Execution process - conflates item completion with folder completion"
  - location: "entrypoints/_teach.yml"
    description: "Teach entrypoint - uses 'move' language, should be 'copy'"
  - location: "agents/orchestration/orchestration-guidance/process.mm"
    description: "Orchestration diagram - MoveCompleted node needs clarification"

  # Evidence of current pattern
  - location: "docs/plans/live/251221MAG_guidance-refinement-v1/"
    description: "Current live folder with follow-on work (plan_live_test_guidance.yml)"
  - location: "docs/plans/completed/251221MAG_guidance-refinement-v1/"
    description: "Completed snapshot with original work (plan_live_build.yml)"

phases:
  - name: "phase-1-core-definitions"
    description: "Add lifecycle stages, follow-on work pattern, and archived distinction to core definitions"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "Plan lifecycle stages defined in plans.yml"
      - "Follow-on work pattern documented with examples"
      - "Archived vs completed distinction clearly fenced"
      - "Folder-based completed pattern replaces file-based pattern"

    tasks:
      - id: "1.1"
        description: "Add plan lifecycle definition to plans.yml"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        context:
          target_file: "assets/definitions/plans.yml"
          required_sections:
            - "plan_lifecycle: Four stages (planning, active, partially_completed, fully_completed)"
            - "follow_on_work_pattern: DO/DON'T guidance for extending completed plans"
            - "archived_vs_completed: Critical distinction with agent fence"
          key_points:
            - "Define partially_completed: folder exists in both live/ and completed/"
            - "Copy-not-move pattern for completed/ snapshots"
            - "Same folder name in both locations is intentional"
            - "FENCE: Agents never move folders to archived/"
            - "Example showing plan_live_build.yml completed, plan_live_test.yml added"
        acceptance_criteria:
          - "plan_lifecycle section added with 4 stages clearly defined"
          - "follow_on_work_pattern includes 5 DO items and 3 DON'T items"
          - "archived_vs_completed section includes explicit FENCE statement"
          - "Concrete example shows same folder in live/ and completed/"
        files:
          - "assets/definitions/plans.yml"

      - id: "1.2"
        description: "Fix folder structure definition for completed plans"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "UPDATE"
        context:
          target_file: "assets/definitions/folder-structure.yml"
          required_changes:
            - "Change from file pattern (YYMMDD_<worktree>.yml) to folder pattern (YYMMDDRepo_Branch/)"
            - "Explain copy-not-move pattern for folder lifecycle"
            - "Document coexistence of live/ and completed/ folders"
            - "Add subfolder structure (live/, completed/, analysis/, README.md)"
            - "Explain lifecycle: copy on completion, update on follow-on completion"
          add_new_section:
            path: "/home/code/myagents/docs/plans/completed/archived/"
            description: "USER-MANAGED historical archive (6+ months old)"
            fence: "Agents must NEVER move, copy, or modify files in this directory"
        acceptance_criteria:
          - "Completed plans described as folders, not files"
          - "Copy pattern explicitly stated with lifecycle explanation"
          - "Archived/ section added with NEVER fence for agents"
          - "Coexistence pattern explained (both folders share name)"
        files:
          - "assets/definitions/folder-structure.yml"

  - name: "phase-2-documentation-updates"
    description: "Update process documentation and README files with lifecycle patterns"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "Live plans README documents follow-on work pattern"
      - "Process files clarify copy vs move semantics"
      - "Examples demonstrate folder coexistence"
    dependencies:
      - "phase-1-core-definitions"

    tasks:
      - id: "2.1"
        description: "Update docs/plans/live/README.md with follow-on work pattern"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_file: "docs/plans/live/README.md"
          changes_required:
            - "Replace 'moved to' with 'copied to' for completion language"
            - "Add new section: 'Follow-On Work Pattern'"
            - "Include concrete example showing both folders"
          new_section_content:
            title: "Follow-On Work Pattern"
            subsections:
              - "When to add follow-on work vs create new folder"
              - "How to document relationship (metadata reference)"
              - "Example file tree showing live/ and completed/ side-by-side"
              - "Explanation of snapshot (completed/) vs active (live/)"
            example_structure: |
              live/251221MAG_guidance-refinement-v1/
                ├── plan_live_build.yml              # Original (completed)
                ├── plan_live_test_guidance.yml      # Follow-on (planning)
                └── proposal_planner-test-guidance.md

              completed/251221MAG_guidance-refinement-v1/
                ├── plan_live_build.yml              # Snapshot at completion
                └── plan_completed.yml               # Items from build phase
        acceptance_criteria:
          - "Completion language updated to reflect copy-not-move pattern"
          - "New 'Follow-On Work Pattern' section added with subsections"
          - "Concrete example shows both folder structures side-by-side"
          - "Explains when folders sync and when they diverge"
        files:
          - "docs/plans/live/README.md"

      - id: "2.2"
        description: "Update planner-cleaning process with folder lifecycle logic"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_file: "agents/planner/planner-cleaning/process.yml"
          add_description_items:
            - "Handles folder lifecycle transitions (copy to completed/ when appropriate)"
            - "Recognizes follow-on work scenarios (new phases added to existing plans)"
          new_step: "Determine folder lifecycle action"
          decision_logic:
            - "IF all phases complete AND no follow-on work: COPY to completed/, keep in live/"
            - "IF some phases complete BUT new follow-on work: UPDATE completed/, keep live/ active"
            - "Document relationship in new plan metadata"
            - "FENCE: NEVER move to archived/"
        acceptance_criteria:
          - "Process description includes lifecycle transitions and follow-on recognition"
          - "New step added with decision logic for folder actions"
          - "Archive fence restated in process context"
          - "Both scenarios handled (full completion vs partial with follow-on)"
        files:
          - "agents/planner/planner-cleaning/process.yml"

      - id: "2.3"
        description: "Clarify completion handling in Execute_Plan.yml"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_file: "processes/Execute_Plan.yml"
          new_content: |
            Update plan status and handle completion:

            Within-folder completion (during execution):
            - Move completed ITEMS to plan_completed.yml in the same planning folder
            - Update phase status markers (planning → active → completed)

            Folder-level completion (after phases finish):
            - COPY entire planning folder to docs/plans/completed/YYMMDDRepo_Branch/
            - Keep folder in live/ for potential follow-on work
            - Only remove from live/ after worktree deletion and user confirmation

            IMPORTANT: Moving "completed items" ≠ copying "completed folders"
            - Items move within the folder structure
            - Folders copy to completed/ while staying in live/

            FENCE: Never move folders to archived/ - user-only action.
        acceptance_criteria:
          - "Two-level completion clearly distinguished (items vs folders)"
          - "Copy-not-move pattern explicitly stated"
          - "Archive fence included"
          - "Follow-on work possibility mentioned"
        files:
          - "processes/Execute_Plan.yml"

  - name: "phase-3-process-integration"
    description: "Update entrypoints and orchestration diagrams with lifecycle patterns"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "_teach.yml uses 'copy' language instead of 'move'"
      - "Orchestration diagram annotated with lifecycle clarifications"
      - "All fence statements consistent across files"
    dependencies:
      - "phase-2-documentation-updates"

    tasks:
      - id: "3.1"
        description: "Update _teach.yml entrypoint finalization step"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_file: "entrypoints/_teach.yml"
          current_text: "move completed plans to `docs/plans/completed/`"
          new_text: "copy completed plan folder to `docs/plans/completed/YYMMDDRepo_Branch/` while keeping it in `live/` for potential follow-on work"
          add_fence: "FENCE: Never move folders to archived/ subdirectory."
        acceptance_criteria:
          - "Language changed from 'move' to 'copy'"
          - "Follow-on work possibility explicitly mentioned"
          - "Archive fence added to finalization step"
        files:
          - "entrypoints/_teach.yml"

      - id: "3.2"
        description: "Annotate orchestration process.mm MoveCompleted nodes"
        status: "completed"
        agent_type: "teacher-process"
        operation: "UPDATE"
        context:
          target_files:
            - "agents/orchestration/orchestration-guidance/process.mm"
            - "agents/orchestration/orchestration-build/process.mm"
          current_node: "MoveCompleted[Move Completed Plans to docs/plans/completed/]"
          new_node: "MoveCompleted[Copy Completed Work to docs/plans/completed/]"
          add_comment: |
            %% COPY planning folder to completed/ (not move) - live/ may continue with follow-on work
            %% Only user moves completed/ folders to archived/ subdirectory
        acceptance_criteria:
          - "Node labels changed from 'Move' to 'Copy' in both process files"
          - "Comment added explaining copy pattern"
          - "Comment mentions follow-on work possibility"
          - "Comment includes user-only archived/ fence"
        files:
          - "agents/orchestration/orchestration-guidance/process.mm"
          - "agents/orchestration/orchestration-build/process.mm"

  - name: "phase-4-examples-and-validation"
    description: "Create concrete examples and validate consistency across all updates"
    agent_category: "teacher"
    status: "completed"
    success_criteria:
      - "Example folder showing follow-on work pattern created"
      - "All fence statements verified for consistency"
      - "Cross-references between files validated"
    dependencies:
      - "phase-3-process-integration"

    tasks:
      - id: "4.1"
        description: "Create follow-on work pattern example"
        status: "completed"
        agent_type: "teacher-update-assets"
        operation: "CREATE"
        context:
          target_file: "assets/examples/planner/YYMMDDRepo_Branch/README.md"
          sections_required:
            - "Overview: What this example demonstrates"
            - "Original Plan: plan_live_build.yml (completed 2025-12-21)"
            - "Follow-On Work: plan_live_test.yml (added 2025-12-21)"
            - "Folder Structure: Side-by-side live/ and completed/"
            - "Metadata Linking: How to reference original work"
            - "Lifecycle Timeline: When folders sync and diverge"
          file_tree_example: |
            live/251221MAG_example/
              ├── plan_live_build.yml              # Status: completed
              ├── plan_live_test.yml               # Status: planning (follow-on)
              ├── analysis/friction-analysis.md
              └── README.md

            completed/251221MAG_example/
              ├── plan_live_build.yml              # Snapshot at completion
              ├── plan_completed.yml               # Items from build phase
              ├── analysis/friction-analysis.md    # Copy from original
              └── README.md                        # Summary of completed work
        acceptance_criteria:
          - "README.md updated in assets/examples/planner/YYMMDDRepo_Branch/"
          - "Shows complete follow-on work pattern with file trees"
          - "Explains metadata linking convention"
          - "Documents when to sync completed/ with new completions"
        files:
          - "assets/examples/planner/YYMMDDRepo_Branch/README.md"

      - id: "4.2"
        description: "Validate fence consistency across all updated files"
        status: "completed"
        agent_type: "test-final-output"
        operation: "AUDIT"
        context:
          validation_targets:
            - "assets/definitions/plans.yml - archived_vs_completed section"
            - "assets/definitions/folder-structure.yml - archived/ path definition"
            - "agents/planner/planner-cleaning/process.yml - lifecycle step"
            - "processes/Execute_Plan.yml - completion handling"
            - "entrypoints/_teach.yml - finalization step"
            - "agents/orchestration/process.mm - MoveCompleted comment"
            - "docs/plans/live/README.md - follow-on work section"
          required_fence_language: "Agents must NEVER move|copy|modify folders to|in archived/"
          consistency_checks:
            - "All files use consistent 'copy' not 'move' language"
            - "All files include archived/ fence"
            - "All files explain follow-on work possibility"
        acceptance_criteria:
          - "All 7 files contain archived/ fence statement"
          - "Language consistency verified (copy vs move)"
          - "No contradictory guidance found"
          - "Cross-references validate (file paths exist)"
        files:
          - "assets/definitions/plans.yml"
          - "assets/definitions/folder-structure.yml"
          - "agents/planner/planner-cleaning/process.yml"
          - "processes/Execute_Plan.yml"
          - "entrypoints/_teach.yml"
          - "agents/orchestration/process.mm"
          - "docs/plans/live/README.md"

success_criteria:
  user_validation:
    - "Agents recognize follow-on work and keep folders in live/"
    - "Agents copy folders to completed/ while maintaining live/ for new work"
    - "Agents never move files to archived/ subdirectory"
    - "Planning folder lifecycle is clear and discoverable"

  technical_validation:
    - "All fence statements consistent (NEVER archive)"
    - "Copy-not-move pattern documented in 7+ files"
    - "Follow-on work pattern has concrete example"
    - "No contradictions between file-based and folder-based completed plans"
    - "Cross-references validate (all file paths exist)"

  teaching_framework:
    paths:
      - "Clear path from 'plan completed' to 'copy folder to completed/'"
      - "Clear path from 'need more work' to 'add follow-on plan in live/'"
    fences:
      - "FENCE: Agents NEVER use archived/ subdirectory (7+ files)"
      - "FENCE: Copy folders to completed/, don't move (5+ files)"
    signposts:
      - "plans.yml has discoverable lifecycle section"
      - "docs/plans/live/README.md has discoverable follow-on work pattern"
      - "Examples show concrete folder structures"

notes:
  - "Addresses real friction from adding plan_live_test_guidance.yml to completed plan"
  - "Resolves contradiction between file-based and folder-based completed plan definitions"
  - "Establishes user-only archived/ pattern to prevent premature archiving"
  - "Follow-on work pattern enables iterative development without folder proliferation"
