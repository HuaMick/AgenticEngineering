objective: "Document agent-task mismatches discovered during plan execution and establish escalation policy for orchestrators"
status: "completed"

# CONTEXT
# =======
# During execution of plan_knowledge_encapsulation.yml, the orchestrator encountered
# situations where the plan-specified agents did not match the task requirements.
# Rather than escalating to the user, the orchestrator performed the work directly.
# This is a policy violation that should be addressed.

issues_discovered:

  - id: "ISSUE-1"
    category: "agent-task-mismatch"
    title: "teacher-update-assets scope limited to assets/ folder"
    observed_during: "Phase 2 execution (tasks 2.1, 2.2, 2.3)"
    description: |
      The plan specified teacher-update-assets agent for updating agent inputs.yml files.
      However, teacher-update-assets process.yml states:
        "Add or update shared assets in assets/ so multiple agents can reuse core content"

      The tasks required updating files in agents/*/inputs.yml (not assets/).
      Agent process scope does not cover agent configuration files.

    deviation_taken: |
      Orchestrator performed the 3 edits directly instead of spawning agents.
      Rationale at the time: "mechanical edits, agent mismatch, avoid overhead"

    questions_for_resolution:
      - "Should teacher-update-assets scope expand to include agent inputs.yml files?"
      - "Should a different agent type handle agent configuration updates?"
      - "Should plans avoid specifying teacher-update-assets for non-assets/ files?"

  - id: "ISSUE-2"
    category: "agent-task-mismatch"
    title: "test-final-output designed for execution data audit, not file validation"
    observed_during: "Phase 3 execution (task 3.1)"
    description: |
      The plan specified test-final-output agent for validating YAML files and references.
      However, test-final-output process.yml states:
        "Interrogate execution data to verify accuracy and completeness"

      The task was simple file validation (YAML syntax, file existence).
      Agent is designed for complex execution data interrogation, not file checks.

    deviation_taken: |
      Orchestrator performed validation directly using yaml.safe_load and test -f.
      Rationale at the time: "deterministic validation, agent purpose mismatch"

    questions_for_resolution:
      - "Should a validation agent exist for file/reference integrity checks?"
      - "Should test-final-output scope include simple file validation?"
      - "Should plans use bash validation steps instead of agents for file checks?"

  - id: "ISSUE-3"
    category: "orchestration-policy"
    title: "Orchestrator performed work directly without escalating"
    observed_during: "Phase 2 and Phase 3 execution"
    description: |
      When the orchestrator determined that plan-specified agents did not match tasks,
      it performed the work directly rather than escalating to the user.

      Execute_Plan.yml states:
        "Offload work to appropriate agents rather than doing it yourself"
        "Orchestrators are managers, not doers"

      The orchestrator violated this principle by doing the work itself.

    policy_gap: |
      No clear guidance exists for what orchestrators should do when:
      - Plan specifies an agent type that doesn't match the task
      - No appropriate agent exists for the required work
      - The work is "simple" but still outside orchestrator scope

    proposed_escalation_policy: |
      The orchestrator's response depends on whether an appropriate agent exists in the system:
      1. If the plan specifies the WRONG agent, but a CORRECT agent type exists:
         - STOP execution of that task.
         - Update the plan to specify the correct agent.
         - Return to the Planning Loop for re-approval of the corrected plan.
      2. If NO AGENT in the system is fit for the required work:
         - STOP execution.
         - Document the gap (missing agent capability).
         - Escalate to the user with options (manual execution, override, or defer).

    questions_for_resolution:
      - "Should this logic be explicitly added to orchestration-guidance/process.mmd?"
      - "How can we ensure the Planning Loop catches these mismatches before execution?"

  - id: "ISSUE-4"
    category: "agent-naming"
    title: "teacher-process naming is too generic"
    description: |
      The agent `agents/teacher/teacher-process` is used for updating guidance processes, 
      but its name doesn't reflect this specific role, leading to confusion during planning.
    proposed_resolution: "Rename teacher-process to teacher-update-guidance"

  - id: "ISSUE-5"
    category: "planner-discovery"
    title: "Planner agents picking incorrect agents from .claude/agents/"
    description: |
      During the Knowledge Encapsulation plan, the planner specified agents that were 
      unfit for the tasks. This suggests the agent definitions in .claude/agents/*.md 
      or the docs/agent-role-scope-matrix.md are out of sync with actual agent 
      capabilities or insufficient for accurate discovery.
    questions_for_resolution:
      - "Are the .claude/agents/*.md files up to date with the latest process.yml definitions?"
      - "Does docs/agent-role-scope-matrix.md accurately reflect the current agent landscape?"
      - "How are agent roles being injected into planner inputs? (Check planner-teach/inputs.yml layer transitive loading)"
      - "Do we need a more formal 'Agent Registry' that planners can query?"

