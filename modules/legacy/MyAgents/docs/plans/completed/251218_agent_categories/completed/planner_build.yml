# Planner Task: Build Agent Category Definition
# Plan: 251218_agent_categories

task:
  agent: "build"
  target_path: "build/"

  objective: "Introduce agent category concept to build agent family"

  context: |
    The build category is responsible for building and compiling code for production deployment.
    It transforms source code into executable artifacts. This task adds explicit category
    references to the build agent family.

  current_structure:
    sub_agents:
      - "build-flutter"
      - "build-python"
    has_manifest: true

  tasks:
    - id: "build-cat-01"
      description: "Update build/manifest.yml to reference category definition"
      file: "build/manifest.yml"
      criteria: "manifest.yml references assets/definitions/agent-categories.yml#build"
      details: |
        Add category reference:
        category:
          definition: "assets/definitions/agent-categories.yml#build"
      status: "completed"
      result: "Created manifest.yml with category reference to assets/definitions/agent-categories.yml#build"

    - id: "build-cat-02"
      description: "Update build-flutter/inputs.yml to reference category"
      file: "build/build-flutter/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      details: |
        Add agent_context section:
        agent_context:
          category: "assets/definitions/agent-categories.yml#build"
          role: "build-flutter"
      status: "completed"
      result: "Added agent_context section with category and role references to build-flutter/inputs.yml"

    - id: "build-cat-03"
      description: "Update build-python/inputs.yml to reference category"
      file: "build/build-python/inputs.yml"
      criteria: "inputs.yml references the shared category definition"
      details: |
        Add agent_context section:
        agent_context:
          category: "assets/definitions/agent-categories.yml#build"
          role: "build-python"
      status: "completed"
      result: "Added agent_context section with category and role references to build-python/inputs.yml"

  validation:
    - "build/manifest.yml references agent-categories.yml"
    - "All 2 sub-agents reference their category"
    - "All file references resolve correctly"
    - "No broken references"

  dependencies:
    - "planner_definitions.yml (def-01 must complete first)"
