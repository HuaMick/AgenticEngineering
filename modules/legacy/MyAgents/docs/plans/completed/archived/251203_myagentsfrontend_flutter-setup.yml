description: |
  Flutter project scaffold with dependencies, routing, and folder structure.
  Web-first, mobile-ready architecture. Foundation for all feature worktrees.

objectives:
  - Create Flutter project with web platform support
  - Set up dependencies (web_socket_channel, pinenacl, xterm, go_router, provider, deepgram_speech_to_text)
  - Create feature-based folder structure (core/, features/, routing/)
  - Configure go_router with PairingScreen and TerminalScreen routes
  - Basic app shell with Provider state management

dependencies:
  blocks: [core-crypto, core-networking, terminal-display, pairing-ui, voice-feature]

success_criteria:
  - flutter run -d chrome launches without errors
  - All dependencies resolve correctly
  - Folder structure matches architecture spec
  - Router navigates between routes
  - No console errors in browser dev tools

phases:
  # ========================================
  # BUILD PHASE
  # ========================================
  - name: Build Phase
    execution_groups:
      # Sequential execution: Project creation must happen first, then folder structure and routing
      - execution: sequential
        name: Initialize Flutter project and dependencies
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend/pubspec.yaml
              - /home/code/myagents/MyAgents-staging/docs/architecture/architecture.md
            guidance: |
              Context: Creating the initial Flutter project scaffold for MyAgentsFrontend.
              This is the foundation for a remote terminal frontend that will enable users
              to control Claude Code from web and mobile devices. Must be web-first with
              mobile-ready architecture.

              Instructions:
              1. Verify worktree exists at /home/code/myagents/MyAgentsFrontend
              2. If Flutter project doesn't exist, create it:
                 - cd /home/code/myagents
                 - flutter create --platforms=web MyAgentsFrontend
                 - This creates the base Flutter project structure
              3. Update /home/code/myagents/MyAgentsFrontend/pubspec.yaml with required dependencies:
                 name: myagents_frontend
                 description: Remote terminal frontend for Claude Code
                 version: 0.1.0
                 environment:
                   sdk: '>=3.0.0 <4.0.0'
                 dependencies:
                   flutter:
                     sdk: flutter
                   web_socket_channel: ^2.4.0      # WebSocket client for backend communication
                   pinenacl: ^0.5.1                # E2E encryption (matches PyNaCl in RemoteAgents)
                   xterm: ^4.0.0                   # Terminal emulation widget
                   go_router: ^14.0.0              # Declarative routing
                   provider: ^6.1.0                # State management
                   deepgram_speech_to_text: ^2.0.0 # Deepgram voice SDK
                 dev_dependencies:
                   flutter_test:
                     sdk: flutter
                   flutter_lints: ^3.0.0
              4. Run flutter pub get to resolve dependencies
              5. Verify resolution succeeds with no conflicts:
                 - Check for version constraint issues
                 - Ensure all packages are compatible with Flutter 3.0+
                 - Verify web platform is enabled (flutter config --enable-web if needed)
              6. Test basic project builds:
                 - flutter build web --no-pub (dry run to verify no build errors)

              Why this matters: This is the foundation for all feature worktrees (core-crypto,
              core-networking, terminal-display, pairing-ui, voice-feature). Dependencies must
              resolve correctly and the project must build before any feature work can begin.
              Blocks 5 downstream worktrees.

              Files to create/modify:
              - pubspec.yaml: Add all dependencies with versions
              - Verify .dart_tool/ and build/ are in .gitignore
            success_criteria:
              - pubspec.yaml contains all 6 required packages with correct versions
              - flutter pub get completes without errors or warnings
              - No version conflicts in dependency resolution output
              - flutter build web --no-pub completes successfully
              - Web platform is enabled (flutter devices shows Chrome)

      # Sequential execution: Folder structure depends on project existing
      - execution: sequential
        name: Create feature-based folder structure
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend/lib/core/config/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/core/crypto/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/core/networking/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/core/theme/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/features/remote_terminal/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/features/voice/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/features/pairing/.gitkeep
              - /home/code/myagents/MyAgentsFrontend/lib/routing/.gitkeep
              - /home/code/myagents/docs/plans/live/251203_myagentsfrontend-main.yml
            guidance: |
              Context: Creating feature-based folder structure following Flutter best practices
              and MyAgents architecture patterns. This structure supports parallel development
              across multiple feature worktrees.

              Instructions:
              1. Create the following folder structure under /home/code/myagents/MyAgentsFrontend/lib/:
                 lib/
                 ├── main.dart (will be created by routing agent)
                 ├── core/
                 │   ├── config/      # App-wide configuration
                 │   ├── crypto/      # E2E encryption using pinenacl (matches PyNaCl)
                 │   ├── networking/  # WebSocket client for RemoteAgents backend
                 │   └── theme/       # Material theme and styling
                 ├── features/
                 │   ├── remote_terminal/  # Terminal display + input (xterm widget)
                 │   ├── voice/            # Deepgram voice-to-text integration
                 │   └── pairing/          # Session pairing UI with code input
                 └── routing/              # go_router configuration

              2. Create .gitkeep files in each empty directory to preserve structure in git:
                 - touch lib/core/config/.gitkeep
                 - touch lib/core/crypto/.gitkeep
                 - touch lib/core/networking/.gitkeep
                 - touch lib/core/theme/.gitkeep
                 - touch lib/features/remote_terminal/.gitkeep
                 - touch lib/features/voice/.gitkeep
                 - touch lib/features/pairing/.gitkeep
                 - touch lib/routing/.gitkeep

              3. Verify all directories are created with correct paths:
                 - Use ls -la lib/core/ to verify core subdirectories
                 - Use ls -la lib/features/ to verify feature subdirectories
                 - Use ls -la lib/routing/ to verify routing directory

              Why this matters: Provides clear separation of concerns for feature teams
              working in parallel worktrees. Each feature worktree (core-crypto, core-networking,
              terminal-display, pairing-ui, voice-feature) has a designated location. The
              .gitkeep files ensure empty directories are tracked in git so feature worktrees
              don't need to create them.

              Files to create:
              - lib/core/config/.gitkeep
              - lib/core/crypto/.gitkeep
              - lib/core/networking/.gitkeep
              - lib/core/theme/.gitkeep
              - lib/features/remote_terminal/.gitkeep
              - lib/features/voice/.gitkeep
              - lib/features/pairing/.gitkeep
              - lib/routing/.gitkeep
            success_criteria:
              - All 8 directories created under lib/
              - Each directory contains a .gitkeep file
              - Folder structure matches architecture specification in 251203_myagentsfrontend-main.yml
              - Git tracks empty directories (git status shows .gitkeep files)

      # Sequential execution: Routing depends on folder structure existing
      - execution: sequential
        name: Setup routing and app shell
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend/lib/main.dart
              - /home/code/myagents/MyAgentsFrontend/lib/routing/router.dart
              - /home/code/myagents/MyAgentsFrontend/lib/features/pairing/pairing_screen.dart
              - /home/code/myagents/MyAgentsFrontend/lib/features/remote_terminal/terminal_screen.dart
              - /home/code/myagents/MyAgentsFrontend/lib/core/theme/app_theme.dart
            guidance: |
              Context: Setting up go_router with placeholder screens for pairing and terminal
              routes. This establishes the navigation structure for the app. Full feature
              implementations will come from other worktrees (pairing-ui, terminal-display),
              but we need placeholders to verify routing works and provide integration points.

              Instructions:
              1. Create lib/core/theme/app_theme.dart with basic Material theme:
                 import 'package:flutter/material.dart';

                 class AppTheme {
                   static ThemeData get lightTheme => ThemeData(
                     useMaterial3: true,
                     colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue),
                   );
                 }

              2. Create lib/routing/router.dart with go_router configuration:
                 import 'package:flutter/material.dart';
                 import 'package:go_router/go_router.dart';
                 import 'package:myagents_frontend/features/pairing/pairing_screen.dart';
                 import 'package:myagents_frontend/features/remote_terminal/terminal_screen.dart';

                 final GoRouter appRouter = GoRouter(
                   initialLocation: '/',
                   routes: [
                     GoRoute(
                       path: '/',
                       name: 'pairing',
                       builder: (context, state) => const PairingScreen(),
                     ),
                     GoRoute(
                       path: '/terminal',
                       name: 'terminal',
                       builder: (context, state) => const TerminalScreen(),
                     ),
                   ],
                   errorBuilder: (context, state) => Scaffold(
                     body: Center(
                       child: Text('Page not found: ${state.uri}'),
                     ),
                   ),
                 );

              3. Create placeholder lib/features/pairing/pairing_screen.dart:
                 import 'package:flutter/material.dart';
                 import 'package:go_router/go_router.dart';

                 class PairingScreen extends StatelessWidget {
                   const PairingScreen({super.key});

                   @override
                   Widget build(BuildContext context) {
                     return Scaffold(
                       appBar: AppBar(title: const Text('Pairing')),
                       body: Center(
                         child: Column(
                           mainAxisAlignment: MainAxisAlignment.center,
                           children: [
                             const Text('Pairing Screen Placeholder'),
                             const SizedBox(height: 20),
                             ElevatedButton(
                               onPressed: () => context.go('/terminal'),
                               child: const Text('Go to Terminal'),
                             ),
                           ],
                         ),
                       ),
                     );
                   }
                 }

              4. Create placeholder lib/features/remote_terminal/terminal_screen.dart:
                 import 'package:flutter/material.dart';
                 import 'package:go_router/go_router.dart';

                 class TerminalScreen extends StatelessWidget {
                   const TerminalScreen({super.key});

                   @override
                   Widget build(BuildContext context) {
                     return Scaffold(
                       appBar: AppBar(title: const Text('Terminal')),
                       body: Center(
                         child: Column(
                           mainAxisAlignment: MainAxisAlignment.center,
                           children: [
                             const Text('Terminal Screen Placeholder'),
                             const SizedBox(height: 20),
                             ElevatedButton(
                               onPressed: () => context.go('/'),
                               child: const Text('Back to Pairing'),
                             ),
                           ],
                         ),
                       ),
                     );
                   }
                 }

              5. Create lib/main.dart with MaterialApp.router:
                 import 'package:flutter/material.dart';
                 import 'package:provider/provider.dart';
                 import 'package:myagents_frontend/routing/router.dart';
                 import 'package:myagents_frontend/core/theme/app_theme.dart';

                 void main() {
                   runApp(const MyAgentsApp());
                 }

                 class MyAgentsApp extends StatelessWidget {
                   const MyAgentsApp({super.key});

                   @override
                   Widget build(BuildContext context) {
                     return MultiProvider(
                       providers: [
                         // Provider setup for state management
                         // Feature worktrees will add providers here
                       ],
                       child: MaterialApp.router(
                         title: 'MyAgents Frontend',
                         theme: AppTheme.lightTheme,
                         routerConfig: appRouter,
                       ),
                     );
                   }
                 }

              6. Verify the app builds and runs:
                 - flutter run -d chrome
                 - Check that app launches in browser
                 - Verify navigation works between / and /terminal
                 - Check for console errors in browser dev tools

              Why this matters: Establishes the navigation structure and app shell that
              all feature worktrees will integrate with. Placeholders verify routing works
              and provide clear integration points for feature teams. The MultiProvider
              setup enables state management patterns for future features.

              Files to create:
              - lib/core/theme/app_theme.dart
              - lib/routing/router.dart
              - lib/features/pairing/pairing_screen.dart
              - lib/features/remote_terminal/terminal_screen.dart
              - lib/main.dart
            success_criteria:
              - App builds successfully with flutter run -d chrome
              - Browser opens and displays Pairing screen at /
              - Can navigate to /terminal route and see Terminal screen
              - Can navigate back to / from terminal screen
              - go_router handles /invalid_route and shows error page
              - No console errors in browser developer tools
              - Both placeholder screens render correctly with navigation buttons

  # ========================================
