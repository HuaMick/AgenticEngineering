  # ========================================
  # UAT PHASE
  # ========================================
  - name: UAT Phase
    execution_groups:
      - execution: parallel
        name: User acceptance testing - user simulator agents
        agents:
          - type: user_simulator
            count: 15
            inputs:
              - /home/code/myagents/MyAgentsFrontend/README.md
              - /home/code/myagents/MyAgentsFrontend/docs/testing/userstories/00_metadata.yml
              - /home/code/myagents/MyAgentsFrontend/docs/testing/userstories/01_app_launch.yml
              - /home/code/myagents/MyAgentsFrontend/docs/testing/userstories/02_pairing.yml
              - /home/code/myagents/MyAgentsFrontend/docs/testing/userstories/03_terminal.yml
              - /home/code/myagents/MyAgentsFrontend/docs/testing/userstories/04_navigation.yml
              - /home/code/myagents/MyAgentsFrontend/docs/testing/userstories/05_build.yml
            guidance: |
              Test Strategy: agent-blind-test (each agent tests one user story without knowing test implementation)

              Pre-requisite: Orchestration agent MUST run these commands before spawning agents:
              - cd /home/code/myagents/MyAgentsFrontend
              - flutter pub get
              - flutter build web

              Agent Assignment (15 agents, one per user story):
              - Agent 1: US-LAUNCH-001 (App Initial Launch) [web, widget_test]
              - Agent 2: US-LAUNCH-002 (App Theme Consistency) [web, widget_test]
              - Agent 3: US-PAIR-001 (View Pairing Screen) [web, widget_test]
              - Agent 4: US-PAIR-002 (Navigate from Pairing to Terminal) [web, widget_test, integration_test]
              - Agent 5: US-PAIR-003 (Pairing Screen Accessibility) [web]
              - Agent 6: US-TERM-001 (View Terminal Screen) [web, widget_test]
              - Agent 7: US-TERM-002 (Navigate from Terminal to Pairing) [web, widget_test, integration_test]
              - Agent 8: US-TERM-003 (Terminal Screen Layout Responsiveness) [web]
              - Agent 9: US-NAV-001 (Deep Link Navigation to Terminal) [web, integration_test]
              - Agent 10: US-NAV-002 (Handle Invalid Routes) [web, widget_test, integration_test]
              - Agent 11: US-NAV-003 (Browser History Navigation) [web, integration_test]
              - Agent 12: US-NAV-004 (Page Refresh Recovery) [web]
              - Agent 13: US-BUILD-001 (Flutter Web Build Success) [web]
              - Agent 14: US-BUILD-002 (Widget Tests Pass) [widget_test]
              - Agent 15: US-BUILD-003 (Analyze Code Quality) [none - analyzer only]

              Testing Approach per Agent:
              1. Read your assigned user story file to understand journey steps
              2. Execute each journey step EXACTLY as written in the user story
              3. Verify expected outcomes at each step
              4. Check for failure indicators documented in user story
              5. Test ALL applicable layers shown in brackets above for your user story
              6. Capture evidence: screenshots for web tests, test output for widget/integration tests

              CRITICAL VALIDATION CHECKLIST (from 00_metadata.yml):
              Before reporting PASS, answer YES to ALL:
              - [ ] Did I execute each journey step as written?
              - [ ] Did I verify the expected outcomes occurred?
              - [ ] Did I capture evidence of functionality (logs, test output)?
              - [ ] Did I test error scenarios where specified?

              If ANY answer is NO, the test is INCOMPLETE, not PASS.

              CRITICAL: Functional testing required - NOT just build validation!
              - PROHIBITED: Running only 'flutter build web' and reporting PASS
              - PROHIBITED: Summarizing or simplifying journey steps
              - REQUIRED: Execute ACTUAL commands specified in journey steps
              - REQUIRED: Verify ACTUAL outcomes, not just that app builds
              - REQUIRED: Capture evidence (test output, logs) where applicable

              Testing Layer Execution:
              - WEB: Serve build/web/ via HTTP server and test in browser OR use flutter run -d web-server
              - WIDGET_TEST: Create/run widget tests in test/ directory
              - INTEGRATION_TEST: Create/run integration tests in integration_test/ directory

              Failure Reporting Format:
              Report failures to live plan under uat_failures with ALL fields:
              - user_story_id: US-XXX-XXX
              - step: Which step failed (1, 2, 3, etc.)
              - failure_type: "ui_issue", "navigation_error", "unexpected_error", "build_failure", "test_failure"
              - description: What went wrong
              - user_impact: How this affects the user persona
              - recommendation: What should be fixed
              - tested_environments: ["web", "widget_test", "integration_test"]
            success_criteria:
              - All 15 user stories tested
              - Journey steps executed as documented (not summarized)
              - Expected outcomes verified with evidence
              - Failures documented with structured reports including recommendations
              - No critical (priority: critical) user stories failed
              - Evidence captured for all tests (logs, test output, screenshots where applicable)

