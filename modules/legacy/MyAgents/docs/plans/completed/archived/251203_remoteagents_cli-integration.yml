test_failures:
  - test_name: "Relay graceful shutdown timeout"
    component: "RelayServiceWorkflow.stop_relay"
    failure_description: "Relay server does not respond to SIGTERM and shut down gracefully within the 10-second timeout period. The server requires SIGKILL (force shutdown) to terminate."
    expected_behavior: "When stop_relay(force=False) is called, the server should respond to SIGTERM signal and shut down within 10 seconds (20 iterations * 0.5s = 10s timeout), cleaning up active sessions and closing connections gracefully."
    actual_behavior: "Server does not respond to SIGTERM within the 10-second timeout. Process remains running after graceful shutdown attempt, requiring force=True (SIGKILL) to terminate."
    files_involved:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_service_workflow.py
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/server.py
  - test_name: "Remote start/stop lifecycle - Service command incorrect"
    component: "RemoteWorkflow.start_service"
    failure_description: "RemoteWorkflow is attempting to start the relay server instead of a terminal service"
    expected_behavior: "start_service() should start a terminal service process that provides PTY sessions via WebSocket"
    actual_behavior: "start_service() executes 'python -m agent_remote.services.relay.api.server' which is the relay service, not the terminal service"
    files_involved:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/workflows/remote_workflow.py
    details: |
      In remote_workflow.py line 86-90, the command is:
      ```python
      command = [
          "python",
          "-m",
          "agent_remote.services.relay.api.server"
      ]
      ```
      This should be starting a terminal service, not the relay service.

  - test_name: "Remote start/stop lifecycle - Missing terminal server implementation"
    component: "Terminal Service"
    failure_description: "No terminal service server implementation exists"
    expected_behavior: "There should be a terminal service server module (similar to agent_remote.services.relay.api.server) that can be started to provide PTY sessions"
    actual_behavior: "The terminal service directory only contains domains and workflows - no server/api module exists"
    files_involved:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/
    details: |
      The terminal service structure is incomplete:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/
        - domains/ (exists)
          - pty_manager/ (exists)
          - crypto/ (exists)
          - io_buffer/ (exists)
        - workflows/ (exists)
          - remote_workflow.py (exists)
        - api/ (MISSING)
          - server.py (MISSING - needed for running terminal service)

      The relay service has a complete api/server.py that can be run, but the terminal service does not.

  - test_name: "Remote start/stop lifecycle - Python executable path"
    component: "RemoteWorkflow.start_service"
    failure_description: "Hardcoded 'python' command fails in detached subprocess context"
    expected_behavior: "Should use sys.executable to get the absolute path to the current Python interpreter"
    actual_behavior: "Uses hardcoded 'python' string which fails with FileNotFoundError when run as a detached process (start_new_session=True)"
    files_involved:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/workflows/remote_workflow.py
    details: |
      In remote_workflow.py line 87, the command uses "python" but should use sys.executable:
      ```python
      # Current (broken):
      command = ["python", "-m", "..."]

      # Should be:
      import sys
      command = [sys.executable, "-m", "..."]
      ```
      This is especially critical for detached processes which don't inherit the parent's PATH.

  - test_name: "CLI integration - Remote error log accessibility"
    component: "cmd_remote_start function and RemoteWorkflow"
    failure_description: "RemoteWorkflow missing public get_recent_errors() method, and cmd_remote_start doesn't attempt to display error logs on failure"
    expected_behavior: "RemoteWorkflow should have a public get_recent_errors() method matching RelayServiceWorkflow pattern, and cmd_remote_start should call it on startup failure to display recent errors"
    actual_behavior: "RemoteWorkflow only has private _get_recent_errors() method. cmd_remote_start doesn't call get_recent_errors() even though docstring says 'Shows recent error logs if startup fails'"
    files_involved:
      - /home/code/myagents/MyAgents-remote/src/myagents/frontend/cli/myagents_cli.py
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/workflows/remote_workflow.py
    details: |
      In myagents_cli.py cmd_remote_start (lines 431-469):
      - Docstring claims "Shows recent error logs if startup fails" (line 446)
      - But implementation doesn't call get_recent_errors() on failure (lines 460-464)
      - Compare to cmd_relay_start (lines 356-366) which correctly calls get_recent_errors()

      In remote_workflow.py:
      - Has _get_recent_errors() at line 471 (private method)
      - Missing public get_recent_errors() method (should match RelayServiceWorkflow.get_recent_errors at line 485)

      Fix needed:
      1. Rename RemoteWorkflow._get_recent_errors to get_recent_errors (make it public)
      2. Update cmd_remote_start to call workflow.get_recent_errors() on failure (match cmd_relay_start pattern)

  - test_name: "Error handling - Remote service uses hardcoded 'python' command"
    component: "RemoteWorkflow.start_service"
    failure_description: "Hard-coded 'python' command prevents remote service from starting on systems without python symlink"
    expected_behavior: "Should use sys.executable to get the current Python interpreter path, ensuring compatibility across all environments"
    actual_behavior: "Uses hardcoded 'python' string which fails with '[Errno 2] No such file or directory: python' on modern Linux systems that only have python3"
    files_involved:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/workflows/remote_workflow.py
    details: |
      Test Agent 4 discovered this critical defect during error handling tests.

      Location: remote_workflow.py line 87

      Current code:
      ```python
      command = [
          "python",  # Hard-coded, fails on systems without 'python' symlink
          "-m",
          "agent_remote.services.relay.api.server"
      ]
      ```

      Should be:
      ```python
      import sys  # Add at top of file if not present
      command = [
          sys.executable,  # Use current Python interpreter
          "-m",
          "agent_remote.services.relay.api.server"
      ]
      ```

      Impact: HIGH
      - Remote terminal service cannot start at all on affected systems
      - Affects all 'myagents remote start' commands
      - Relay service works fine (uses 'uvicorn' command, not python)

      Test Results:
      - Relay double-start prevention: PASS
      - Remote double-start prevention: FAIL (cannot start service)
      - Port conflict detection (both services): PASS
      - Stop when not running (both services): PASS
      - Stale PID detection (both services): PASS

      Note: This failure also duplicates/confirms the existing failure "Remote start/stop lifecycle - Python executable path"
      documented above. Both Test Agent 1 and Test Agent 4 independently discovered this defect.
