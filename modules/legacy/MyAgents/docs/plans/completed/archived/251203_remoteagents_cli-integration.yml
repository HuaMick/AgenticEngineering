# ========================================
# DESIGN DECISIONS
# ========================================
design_decisions:
  - decision: "Created separate RelayServiceWorkflow for CLI process management"
    rationale: |
      The existing RelayWorkflow handles session lifecycle (create, pair, route messages).
      CLI needs different concerns: start/stop uvicorn process, track PID, manage logs.
      Separation of concerns keeps each workflow focused and testable.
    files:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_service_workflow.py
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py

  - decision: "Used StudioWorkflow patterns for process management"
    rationale: |
      StudioWorkflow is proven, handles PID files, graceful shutdown, log rotation.
      Consistent patterns across studio/relay/remote commands improve maintainability.
      Reduces bugs by reusing tested code patterns.
    reference: /home/code/myagents/MyAgents-remote/src/myagents/backend/services/agents/workflows/studio_workflow.py

  - decision: "Created minimal terminal server as placeholder"
    rationale: |
      The build phase focused on CLI integration, not terminal service implementation.
      Placeholder allows CLI commands to work for testing process management.
      Actual PTY functionality is a separate concern for future work.
    file: /home/code/myagents/RemoteAgents/src/agent_remote/services/terminal/api/server.py
    limitation: "Only has /health endpoint - no actual PTY sessions"

