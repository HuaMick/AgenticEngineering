    - terminal-service
  blocks: []

success_criteria:
  - All CLI commands execute and return correct status
  - Services start/stop correctly from CLI commands
  - Status command shows service health and connection info
  - Pairing codes display correctly for user sharing
  - CLI help documentation complete for new commands

phases:
  # ========================================
  # BUILD PHASE - CLI Command Implementation
  # ========================================
  - name: Build Phase
    execution_groups:
      # Parallel execution group: Remote and Relay commands can be built simultaneously
      - execution: parallel
        agents:
          # Remote terminal CLI commands
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-remote/src/myagents/frontend/cli/myagents_cli.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/terminal_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/domains/pty_manager.py
            guidance: |
              Context: RemoteAgents provides a terminal service that runs PTY sessions on the desktop.
              Users need CLI commands to manage this service (start/stop/status) from the MyAgents CLI.

              Architecture patterns to follow:
              - Follow existing CLI patterns from myagents_cli.py (argparse subcommands)
              - Delegate to workflow classes (create RemoteWorkflow in RemoteAgents)
              - Use lazy imports to speed up CLI startup
              - Return meaningful status messages with connection info

              Instructions:
              1. Add 'remote' subcommand to myagents_cli.py with start/stop/status operations
              2. Create cmd_remote_start(), cmd_remote_stop(), cmd_remote_status() functions
              3. Follow existing patterns from cmd_studio_* commands (similar service management)
              4. Create RemoteWorkflow class in RemoteAgents/src/agent_remote/workflows/remote_workflow.py
              5. RemoteWorkflow should:
                 - Start terminal service process (delegates to TerminalWorkflow)
                 - Track PID and status (similar to StudioWorkflow patterns)
                 - Return connection info (WebSocket URL, session ID)
                 - Manage graceful shutdown
              6. Add argparse configuration:
                 - 'myagents remote start [--port PORT] [--foreground]'
                 - 'myagents remote stop [--force]'
                 - 'myagents remote status'
              7. Display connection information:
                 - WebSocket URL for clients to connect
                 - Session ID for pairing
                 - Service health status
              8. Integrate with existing help system (add to epilog examples)

              Reference files:
              - myagents_cli.py: cmd_studio_start/stop/status patterns (lines 211-323)
              - terminal_workflow.py: Terminal service entrypoint
              - pty_manager.py: PTY session management

              Why this matters: Users need simple commands to start/stop their desktop terminal
              service and get connection info to share with web clients.
            success_criteria:
              - 'myagents remote start' launches terminal service successfully
              - 'myagents remote status' shows service health and connection info
              - 'myagents remote stop' shuts down service gracefully
              - Connection info (WebSocket URL, session ID) displayed clearly
              - Commands work from any directory (home directory config)

          # Relay service CLI commands
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-remote/src/myagents/frontend/cli/myagents_cli.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/domains/session_manager.py
            guidance: |
              Context: RemoteAgents provides a relay service that brokers WebSocket connections
              between desktop terminals and web clients. Users need CLI commands to manage this
              self-hosted relay server.

              Architecture patterns to follow:
              - Follow existing CLI patterns from myagents_cli.py (argparse subcommands)
              - Delegate to workflow classes (enhance RelayWorkflow in RemoteAgents)
              - Use lazy imports to speed up CLI startup
              - Return meaningful status messages with server info

              Instructions:
              1. Add 'relay' subcommand to myagents_cli.py with start/stop/status operations
              2. Create cmd_relay_start(), cmd_relay_stop(), cmd_relay_status() functions
              3. Follow existing patterns from cmd_studio_* commands (similar service management)
              4. Enhance RelayWorkflow class in RemoteAgents/src/agent_remote/workflows/relay_workflow.py
              5. RelayWorkflow should:
                 - Start FastAPI relay server process (uvicorn)
                 - Track PID and status (similar to StudioWorkflow patterns)
                 - Return server info (public URL, WebSocket endpoints, active sessions)
                 - Manage graceful shutdown (close active sessions)
              6. Add argparse configuration:
                 - 'myagents relay start [--port PORT] [--host HOST] [--foreground]'
                 - 'myagents relay stop [--force]'
                 - 'myagents relay status'
              7. Display relay information:
                 - Public WebSocket URL (relay server endpoint)
                 - Number of active sessions
                 - Desktop and client connection endpoints
                 - Server health status
              8. Integrate with existing help system (add to epilog examples)
              9. Handle relay-specific concerns:
                 - Port availability checking
                 - Background process management
                 - Logging configuration

              Reference files:
              - myagents_cli.py: cmd_studio_start/stop/status patterns (lines 211-323)
              - relay_workflow.py: Relay service entrypoint
              - session_manager.py: Session tracking and management

              Why this matters: Users need to run their own relay server for privacy/control.
              Commands should make it easy to start/stop the relay and monitor active sessions.
            success_criteria:
              - 'myagents relay start' launches relay server successfully
              - 'myagents relay status' shows active sessions and endpoints
              - 'myagents relay stop' shuts down gracefully (closes sessions)
              - Server info (URLs, session count) displayed clearly
              - Commands work from any directory (home directory config)

      # Sequential execution group: Integration and help system updates
      - execution: sequential
        agents:
          # Process management workflows
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/remote_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/relay_workflow.py
              - /home/code/myagents/MyAgents-remote/src/myagents/backend/services/agents/workflows/studio_workflow.py
            guidance: |
              Context: Both remote and relay services need robust process management.
              StudioWorkflow provides proven patterns for background process lifecycle management
              that should be adapted for remote services.

              Instructions:
              1. Create RemoteWorkflow class following StudioWorkflow patterns:
                 - Background process spawning (subprocess.Popen with detach)
                 - PID tracking in state file (~/.config/myagents/remote.state)
                 - Graceful shutdown (SIGTERM then SIGKILL fallback)
                 - Status checking (process alive, port listening)
                 - Log file management (stdout/stderr capture)
              2. Enhance RelayWorkflow with process management:
                 - Background uvicorn server spawning
                 - PID tracking in state file (~/.config/myagents/relay.state)
                 - Graceful shutdown (signal active sessions, wait, then kill)
                 - Status checking (process alive, HTTP health endpoint)
                 - Log file management
              3. Implement state file format (JSON):
                 - pid: Process ID
                 - port: Service port
                 - host: Service host
                 - started_at: ISO timestamp
                 - log_file: Path to log file
                 - Additional service-specific info
              4. Implement log rotation and cleanup:
                 - Keep last N log files (default: 5)
                 - Clean up on service stop
                 - Provide method to retrieve recent errors (for diagnostics)
              5. Handle edge cases:
                 - Stale PID files (process died but file remains)
                 - Port already in use
                 - Service crashed (detect and cleanup)
                 - Multiple start attempts (prevent double-start)

              Reference implementation:
              - studio_workflow.py: StudioWorkflow class (process lifecycle patterns)

              Why this matters: Reliable process management ensures services start/stop cleanly
              and users can troubleshoot issues via logs and status commands.
            success_criteria:
              - Services start in background and remain running
              - PID files track running processes accurately
              - Graceful shutdown works reliably (no orphaned processes)
              - Status commands detect crashed services
              - Log files captured and accessible for debugging

          # Connection information display
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/remote_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/messages.py
            guidance: |
              Context: Users need clear connection information to pair desktop terminals with
              web clients. This includes pairing codes, WebSocket URLs, and session IDs.

              Instructions:
              1. Implement get_connection_info() method in RemoteWorkflow:
                 - Generate or retrieve session ID
                 - Generate pairing code (short, memorable, secure)
                 - Construct WebSocket URL for clients
                 - Return structured dict with all connection details
              2. Implement get_relay_info() method in RelayWorkflow:
                 - Get public relay URL (from config or default)
                 - List WebSocket endpoints (/ws/desktop, /ws/client)
                 - Count active sessions (query SessionManager)
                 - Return structured dict with relay details
              3. Add formatting helpers for CLI display:
                 - Format pairing code with separators (e.g., "ABC-123-XYZ")
                 - Format WebSocket URLs as clickable links
                 - Format session info as readable tables
              4. Implement QR code generation (optional, nice-to-have):
                 - Generate QR code for WebSocket URL + pairing code
                 - Display in terminal for mobile pairing
                 - Use qrcode library (add as optional dependency)
              5. Add status indicators:
                 - Service health: RUNNING, STOPPED, ERROR
                 - Connection status: CONNECTED, WAITING, DISCONNECTED
                 - Session count: N active sessions

              Reference protocol:
              - messages.py: SessionCreate, SessionPaired message formats

              Why this matters: Clear connection info is critical for UX. Users should be able
              to quickly share pairing codes with collaborators or connect their own devices.
            success_criteria:
              - Pairing codes generated correctly (secure, memorable format)
              - WebSocket URLs constructed with correct host/port
              - Status command displays connection info clearly
              - Session count accurate (matches SessionManager state)
              - QR codes display correctly in terminal (if implemented)

  # ========================================
  # TEST PHASE - Component and Integration Testing
  # ========================================
  - name: Test Phase
    execution_groups:
      - execution: test-fix-loop
        name: CLI integration testing - Remote and relay commands
        agents:
          # Component test agents
          - type: test
            count: 5
            inputs:
              - /home/code/myagents/MyAgents-remote/src/myagents/frontend/cli/myagents_cli.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/remote_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/relay_workflow.py
              - /home/code/myagents/MyAgents-remote/frontend/agents/test/processes/test_runner.yml
            guidance: |
              Test Strategy: technical-spike (focused component testing)
              Test Process: Execute test_runner.yml process from frontend/agents/test/processes/
              Reporting: Update live plan with structured failures under test_failures section

              Component Test Scope (distribute across 5 agents):

              Agent 1 - Remote start/stop lifecycle:
              - Run 'myagents remote start' and verify process spawns
              - Verify PID file created at ~/.config/myagents/remote.state
              - Verify terminal service listening on WebSocket port
              - Run 'myagents remote stop' and verify graceful shutdown
              - Verify PID file cleaned up and process terminated

              Agent 2 - Relay start/stop lifecycle:
              - Run 'myagents relay start' and verify uvicorn process spawns
              - Verify PID file created at ~/.config/myagents/relay.state
              - Verify relay endpoints available (/ws/desktop, /ws/client)
              - Run 'myagents relay stop' and verify graceful shutdown
              - Verify active sessions closed before shutdown

              Agent 3 - Status commands and connection info:
              - Start remote service and run 'myagents remote status'
              - Verify status shows RUNNING with connection details
              - Verify pairing code displayed correctly
              - Verify WebSocket URL format correct
              - Start relay service and run 'myagents relay status'
              - Verify relay status shows active session count

              Agent 4 - Error handling and edge cases:
              - Test double-start prevention (start already running service)
              - Test port already in use error handling
              - Test stop when service not running
              - Test status when service crashed (stale PID file)
              - Verify error messages clear and actionable

              Agent 5 - Integration with existing CLI:
              - Verify help text includes remote and relay commands
              - Test command aliases if any defined
              - Verify lazy imports don't slow down unrelated commands
              - Test CLI works from different directories
              - Verify log files created and accessible

              Failure Reporting Format:
              Add failures to live plan under test_failures with structure:
              - test_name: Name of failed test
              - component: CLI command or workflow being tested
              - failure_description: What went wrong
              - expected_behavior: What should have happened
              - actual_behavior: What actually happened
              - files_involved: List of files related to failure
            success_criteria:
              - All remote and relay commands execute without errors
              - Process lifecycle management works reliably
              - Status commands show accurate connection information
              - Error messages clear and actionable
              - No orphaned processes after stop commands

          # Dynamic build agents for failures
          - type: build
            count: "n = total failures"
            inputs:
              - /home/code/myagents/MyAgents-remote/src/myagents/frontend/cli/myagents_cli.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/remote_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/domains/pty_manager.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/domains/session_manager.py
            guidance: |
              Context: Test agents have identified failures in CLI integration tests.
              Each build agent is assigned ONE specific failure to fix.

              Instructions:
              1. Read live plan test_failures section to find assigned failure
              2. Determine root cause by examining:
                 - CLI command implementation (myagents_cli.py)
                 - Workflow process management (remote_workflow.py, relay_workflow.py)
                 - Service domain logic (pty_manager.py, session_manager.py)
              3. Fix the specific issue identified:
                 - Process management bugs: Fix PID tracking, signal handling
                 - Connection info bugs: Fix URL construction, pairing code generation
                 - Error handling bugs: Add proper validation, user-friendly messages
                 - Integration bugs: Fix workflow delegation, state management
              4. Verify fix doesn't break related functionality
              5. Mark failure as resolved in live plan

              Common failure categories:
              - Process lifecycle: PID files, subprocess spawning, graceful shutdown
              - Connection info: URL format, pairing codes, session tracking
              - Error handling: Edge cases, validation, error messages
              - CLI integration: Argparse config, command delegation, help text

              Why this matters: Each failure represents a gap between intended and actual
