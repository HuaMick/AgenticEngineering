phases:
  - name: Implementation Phase
    status: completed
    depends_on: []
    execution_groups:
      - execution: sequential
        name: Add Search Methods to FileOperations Domain
        status: completed
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-search_files/backend/services/agents/src/domains/file_operations/file_operations.py
            guidance: |
              Context: The FileOperations domain needs search capabilities. Add methods for searching text in files
              and finding files by name patterns.
              
              Instructions:
              1. Add search_in_files method to FileOperations class:
                 - Method signature: search_in_files(self, pattern: str, directory: str = ".", file_pattern: str = "*") -> List[dict]
                 - Search for text pattern in files matching file_pattern within directory
                 - Use Path.rglob() or Path.glob() for recursive search
                 - Validate directory path using validate_path()
                 - For each matching file, search for pattern in content
                 - Return list of dicts: [{"file": str, "line_number": int, "line": str}, ...]
                 - Limit results (e.g., max 100 matches) to prevent excessive output
                 - Handle binary files gracefully (skip or detect)
              2. Add find_files method to FileOperations class:
                 - Method signature: find_files(self, name_pattern: str, directory: str = ".") -> List[str]
                 - Find files matching name_pattern (supports glob patterns like *.py)
                 - Use Path.rglob() for recursive search
                 - Validate directory path using validate_path()
                 - Return list of relative file paths
                 - Limit results (e.g., max 100 files) to prevent excessive output
              3. Follow same security patterns as other methods (path validation, error handling)
              
              Why this matters: Enables the coding agent to search for content and find files, addressing a documented limitation.
            success_criteria:
              - search_in_files returns matches with file paths and line numbers when patterns found
              - find_files returns list of file paths matching glob patterns
              - Invalid paths (absolute, traversal) raise ValueError
              - Results capped at reasonable limit (e.g., 100 items)

          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-search_files/backend/services/agents/src/tools/file_tools.py
            guidance: |
              Context: The file_tools.py module needs to expose search functionality as tools.
              
              Instructions:
              1. Add search_in_files tool:
                 - @tool decorated function: search_in_files(pattern: str, directory: str = ".", file_pattern: str = "*") -> str
                 - Function docstring: "Search for text pattern in files. Returns matches with file paths and line numbers."
                 - Use _get_file_ops() to get FileOperations instance
                 - Call search_in_files method and format results as readable string
                 - Add to ALL_TOOLS list
              2. Add find_files tool:
                 - @tool decorated function: find_files(name_pattern: str, directory: str = ".") -> str
                 - Function docstring: "Find files matching name pattern (supports glob patterns like *.py)."
                 - Use _get_file_ops() to get FileOperations instance
                 - Call find_files method and format results as readable string
                 - Add to ALL_TOOLS list
              3. Update TOOLS_BY_NAME dict (automatic via ALL_TOOLS)
              
              Why this matters: Makes search functionality available to the LLM as tools.
            success_criteria:
              - get_tool_by_name("search_in_files") returns the search tool
              - get_tool_by_name("find_files") returns the find tool
              - len(ALL_TOOLS) increases from 3 to 5
              - Tools return formatted string output suitable for LLM consumption

