# ==============================================================================
# OBJECTIVE
# ==============================================================================

description: |
  Create a comprehensive testing plan for myagents that validates the system
  works correctly for end users through simulation agents.

  The testing should use user simulator agents to validate user workflows
  and ensure the system is ready for release.

# ==============================================================================
# INPUTS FOR PLANNER AGENTS
# ==============================================================================

inputs:
  - location: "src/myagents/frontend/agents/definitions/test_strategies.yml"
    description: "Testing strategies and patterns to follow"
  - location: "src/myagents/frontend/agents/test/definitions.yml"
    description: "Test agent definitions and roles"
  - location: "src/myagents/frontend/agents/test/processes/user_simulator.yml"
    description: "User simulator process"

# ==============================================================================
# PLANNER INSTRUCTIONS
# ==============================================================================

planner_objective: |
  Create a testing plan that uses simulation agents to validate myagents
  user workflows. The plan should:

  1. Define phases for user acceptance testing
  2. Specify which simulation agents to spawn
  3. Include success criteria for the testing

  Review the test_strategies.yml for guidance on testing approaches.
  Ensure the plan follows best practices for user acceptance testing.

# ==============================================================================
# PHASES (to be populated by planner agents)
# ==============================================================================

phases: []

# ==============================================================================
# VALIDATION CRITERIA
# ==============================================================================

validation:
  expected_outcome: |
    The planner agents should naturally include version installation/verification
    steps in the testing plan based on the user-acceptance-testing strategy
    defined in test_strategies.yml.

    If they do NOT include version verification, this indicates the guidance
    is not being followed or is not discoverable enough.
