                 - If test failure is due to bad test: Fix test, not structure
                 - If test failure is due to structure issue: Fix structure
              4. Priority order:
                 - Fix tests if they're testing incorrectly
                 - Rerun tests after fixing tests
                 - Only fix structure if tests are valid and still failing
