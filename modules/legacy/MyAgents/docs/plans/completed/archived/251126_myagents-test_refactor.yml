                 - Verify no broken imports

              4. For each file with recommendation "consolidate":
                 - Merge unique test cases into workflow tests
                 - Remove redundant test cases
                 - Delete integration test file after consolidation

              5. Update tests/README.md:
                 - Remove references to tests/integration/ if directory is removed
                 - Update structure diagram
                 - Document that domain/tool testing happens through workflow tests

              6. Clean up empty directories:
                 - Remove tests/integration/ if all files moved/deleted
                 - Remove tests/infrastructure/ if test_config_detection.py deleted and no other files

              7. Verify consolidation:
                 - Run pytest --collect-only to verify test discovery
                 - Run full test suite to verify no tests lost
                 - Verify test counts match expected (no reduction in coverage)

              Safety checks:
              - Do NOT delete tests without verifying they're redundant
              - Do NOT move tests without updating markers and imports
              - Verify test suite still passes after consolidation

              Why this matters: Consolidation eliminates redundancy and ensures all tests are
              organized by workflow, making test discovery easier and reducing maintenance burden.
            success_criteria:
              - All consolidation recommendations executed
              - Unique tests moved to appropriate workflow packages
              - Redundant tests deleted
              - Test suite still passes (no tests lost)
              - tests/README.md updated
              - Empty directories cleaned up

      # Validation: Verify consolidation didn't break anything
      - execution: sequential
        name: Validate consolidation
        status: pending
        agents:
          - type: test
            inputs:
              - /home/code/myagents/MyAgents-test-refactor/src/myagents/frontend/agents/test/processes/test_runner.yml
              - /home/code/myagents/MyAgents-test-refactor/tests/
              - /home/code/myagents/MyAgents-test-refactor/pytest.ini
            guidance: |
              Context: Consolidation has been executed. Validate that consolidation didn't break
              functionality or lose test coverage.

              Test Strategy: technical-spike (validation testing)
              Test Process: Execute test_runner.yml from frontend/agents/test/processes/
              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251126_myagents-test_refactor.yml

              Validation Scenarios:
              1. Test Discovery:
                 - Run pytest --collect-only
                 - Verify all expected tests discovered
                 - Verify no ImportError
                 - Compare test count with pre-consolidation count (should be same or higher)

              2. Full Test Suite:
                 - Run full test suite (pytest)
                 - All tests should pass
                 - No new failures introduced by consolidation

              3. Workflow-Specific Tests:
                 - Run pytest -m workflow_health_check (verify config detection tests work)
                 - Run pytest -m agent_chat (verify file/git operation tests work)
                 - Run pytest -m agent_shell_operations (verify shell operation tests work)
                 - Run pytest -m e2e (verify E2E tests work)

              4. Coverage Verification:
                 - Verify domain/tool functionality still tested (through workflow tests)
                 - Verify no functionality lost in consolidation

              Failure Reporting Format:
              Add failures to live plan under consolidation_validation_failures
            success_criteria:
              - All tests discovered successfully
              - Full test suite passes
              - Workflow-specific tests work correctly
              - No test coverage lost
              - Zero test failures

  # ========================================
  # PHASE 7: Documentation (LAST)
  # Documents final state after all testing and cleanup complete
  # ========================================
  - name: Documentation Phase
    status: completed
    depends_on:
      - Consolidation Phase
    execution_groups:
      - execution: sequential
        name: Update documentation
        status: pending
        agents:
          - type: documentation
            inputs:
              - /home/code/myagents/MyAgents-test-refactor/tests/README.md
              - /home/code/myagents/MyAgents-test-refactor/tests/workflows/
              - /home/code/myagents/MyAgents-test-refactor/Makefile
            guidance: |
              Context: Test refactor is complete and validated. Documentation must reflect final structure.

              Task:
              1. Update tests/README.md:
                 - Add structure diagram showing all workflow packages:
                   tests/workflows/
                     health_check/    - Health check workflow tests
                     studio/          - Studio workflow tests
                     setup/           - Setup workflow tests
                     help/            - Help workflow tests
                     cli_routing/     - CLI routing workflow tests
                     e2e/             - End-to-end tests (renamed from packaging/)
                     agent_chat/      - Chat agent tests (consolidated from echo_agent/)
                     agent_shell_operations/ - Shell operations agent tests
                 - Document naming convention:
                   workflow_<name>: For CLI/infrastructure workflow tests
                   agent_<capability>: For agent workflow tests
                   e2e: For cross-workflow end-to-end tests
                 - List all pytest markers with descriptions
                 - Document how to run workflow-specific tests (pytest -m workflow_<name>)
                 - Add guidance for creating new workflow test packages (US-002)
                 - Document workflow health reporting (pytest --workflow-health)

              2. Update Makefile:
                 - Add targets for each workflow:
                   test-workflow-health-check: pytest -m workflow_health_check
                   test-workflow-studio: pytest -m workflow_studio
                   test-workflow-setup: pytest -m workflow_setup
                   test-workflow-help: pytest -m workflow_help
                   test-workflow-cli-routing: pytest -m workflow_cli_routing
                 - Add targets for agent workflows:
                   test-agent-chat: pytest -m agent_chat
                   test-agent-shell-operations: pytest -m agent_shell_operations
                 - Add target for e2e:
                   test-e2e: pytest -m e2e
                 - Remove obsolete targets (test-infrastructure, test-packaging, test-echo-agent, test-shell-operations)
                 - Update help text to describe new targets

              3. Verify documentation matches implementation:
                 - Package names in README match actual directories
                 - Markers documented match pytest.ini
                 - Make targets work as documented
                 - Examples are accurate

              Why this matters: Accurate documentation enables developers to use new structure effectively.
            success_criteria:
              - README.md contains structure diagram with all 8 packages
              - Naming convention clearly documented
              - All pytest markers listed with descriptions
              - Make targets documented and working
              - User story guidance included (how to create new workflow tests)

          - type: documentation
            inputs:
              - /home/code/myagents/MyAgents-test-refactor/src/myagents/frontend/agents/test/manifest.yml
              - /home/code/myagents/MyAgents-test-refactor/src/myagents/frontend/agents/test/definitions.yml
              - /home/code/myagents/MyAgents-test-refactor/tests/manual/fresh_environment_test_guide.md
              - /home/code/myagents/MyAgents-staging/src/myagents/frontend/agents/definitions/test_strategies.yml
            guidance: |
              Context: Test agents need updated guidance to reflect new per-workflow test structure.
              Also need to ensure fresh environment testing guidance is integrated into planning agents.

              Task:
              1. Update manifest.yml:
                 - Update folder descriptions to reference new structure
                 - Use relative paths (no hardcoded /home/code/myagents/)
                 - Document tests/workflows/ structure with per-workflow packages
                 - Reference naming convention (workflow_<name>, agent_<capability>)
                 - Note that tests/integration/ has been consolidated into workflows (if completed)

              2. Update definitions.yml:
                 - Add guidance on per-workflow test packages:
                   "Tests are organized 1 package per workflow under tests/workflows/
                    Use workflow_<name> naming for CLI/infrastructure workflows
                    Use agent_<capability> naming for agent workflows
                    Use e2e/ for cross-workflow end-to-end tests"
                 - Document pytest marker convention
                 - Reference tests/README.md for structure details
                 - Note: Domain/tool layer testing happens through workflow tests, not separate integration tests

              3. Verify fresh environment testing guidance:
                 - Check test_strategies.yml already references fresh-environment-test strategy
                 - Verify fresh_environment_test_guide.md scenarios are covered in planning agent guidance
                 - If not fully integrated, add reference to fresh environment testing in planning agent guidance:
                   "When planning test phases, include fresh environment testing scenarios:
                    - First-time user (no configuration)
                    - Configuration setup flow
                    - Error detection and recovery
                    - Portability testing (no hardcoded paths)
                    - Non-interactive (CI/CD) mode
                    See: tests/manual/fresh_environment_test_guide.md for detailed scenarios"

              Why this matters: Test agents need accurate guidance to create and locate tests correctly.
              Fresh environment testing ensures automated tests passing = system actually works for users.
            success_criteria:
              - No hardcoded absolute paths in manifest.yml
              - Agent guidance reflects per-workflow structure
              - Naming convention documented for test agents
              - References to tests/README.md for details
              - Fresh environment testing guidance integrated into planning agent guidance
              - Consolidation results reflected in documentation

