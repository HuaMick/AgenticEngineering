              - /home/code/myagents/MyAgents-test-refactor/tests/conftest.py
            guidance: |
              Context: Cleanup has been completed. This audit verifies cleanup didn't break functionality
              and reviews test quality for reward hacking patterns.

              Audit Process: Execute audit.yml from frontend/agents/test/processes/
              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251126_myagents-test_refactor.yml with findings

              Audit Focus Areas:

              1. Post-Cleanup Validation:
              - Verify all old directories removed (infrastructure/, packaging/, echo_agent/, coding_agent/, shell_operations/)
              - Verify new packages intact (health_check/, studio/, setup/, help/, cli_routing/, e2e/, agent_chat/, agent_shell_operations/)
              - Check for broken import paths referencing old structure
              - Verify pytest markers reference new packages not old ones
              - Check conftest.py for obsolete fixture references

              2. Test Quality Review:
              - Review test markers for correctness (do markers match package names?)
              - Check for duplicate test coverage (same tests in multiple packages)
              - Verify test isolation (tests don't depend on other packages)
              - Check fixture usage (shared fixtures accessible from new locations)
              - Review skip markers (are tests being skipped for fixable reasons?)

              3. Architecture Compliance:
              - Verify 1 package per workflow principle (no bundling)
              - Verify naming convention followed (workflow_<name>, agent_<capability>)
              - Check for workflow-specific tests in wrong packages
              - Verify e2e tests in e2e/ package (not scattered)

              4. Reward Hacking Patterns:
              - Tests that skip validation instead of fixing root cause
              - Tests with overly permissive assertions
              - Missing negative test cases
              - Tests that don't actually verify package structure

              Findings Reporting Format:
              Add findings to live plan under audit_findings with structure:
              - finding_type: "post_cleanup_issue", "test_quality", "architecture_violation", "reward_hacking"
              - component: Component with issue
              - description: What was found
              - severity: "high", "medium", "low"
              - recommendation: What should be fixed
              - affects: "tests" or "structure" or "both"
            success_criteria:
