# Live Plan: Simplify Config Detection - Remove Fallback Complexity
# Worktree: /home/code/myagents/MyAgents-fallback_review
# Created: 2025-11-27

name: Simplify Config Detection - Remove Fallback Patterns
worktree: /home/code/myagents/MyAgents-fallback_review
branch: myagents-fallback_review
status: completed

description: |
  Review and simplify the config/project detection patterns in the codebase.
  
  Current state: Multiple fallback chains that silently try alternatives when
  config files are missing. This creates confusing behavior and makes debugging
  difficult.
  
  Target state: Single happy path per detection function. Error loudly with
  helpful messages when config is missing. Keep home directory as the canonical
  config location (XDG standard, cross-OS compatible). Agents use CLI commands
  (`myagents preferences`, `myagents config`) to modify settings - no direct
  file editing of home directory files.

objectives:
  - Remove silent fallback chains - error loudly with helpful info
  - Remove auto-creation of config files (allow_fallback=True pattern)
  - Keep home directory (~/.config/myagents/) as canonical config location
  - Ensure agents use CLI commands to modify preferences (not direct file access)
  - Update tests to verify error cases instead of fallback behavior
  - Simplify detect_project_root to single path (no home dir fallback for projects)

phases:
  - name: "Phase 1: Analysis & Design"
    status: not_started
    execution_groups:
      - execution: sequential
        agents:
          - id: "1.1"
            type: analysis
            description: "Document current fallback patterns in health_check_workflow.py"
            status: not_started
            inputs:
              - /home/code/myagents/MyAgents-fallback_review/src/myagents/backend/services/agents/workflows/health_check_workflow.py
              - /home/code/myagents/MyAgents-fallback_review/docs/plans/live/251127_myagents_fallback_review.yml
            guidance: |
              Context: The health_check_workflow.py contains multiple detection functions with complex
              fallback behavior that creates confusing UX. We need to document the current behavior
              before simplifying.

              Instructions:
              1. Analyze detect_project_root() function (lines 214-259):
                 - Document the two-level fallback: local project walk-up, then home directory fallback
                 - Identify when required=False triggers home directory fallback (line 247-250)
                 - Note the /tmp boundary check and its purpose

              2. Analyze detect_config_path() function (lines 261-289):
                 - Document the three-level cascade: project_root/config.yml, project_root/.myagents/config.yml, ~/.config/myagents/config.yml
                 - Identify all fallback paths checked

              3. Analyze detect_langgraph_path() function (lines 291-339):
                 - Document the allow_fallback parameter behavior
                 - Identify auto-creation logic (lines 317-336)
                 - Note test isolation check (lines 305-306)

              4. Analyze detect_context() function (lines 107-158):
                 - Document how it uses required=False to enable home directory fallback (line 143)
                 - Identify the error message when no langgraph.json found (lines 147-150)

              5. Update live plan with findings:
                 - Add section documenting each function's current fallback behavior
                 - Flag which fallbacks align with objectives (remove vs keep)
                 - Identify test isolation requirements to preserve

              Why this matters: Thorough documentation prevents accidental removal of needed
              functionality and ensures simplified version meets all requirements.
            success_criteria:
              - All fallback patterns documented with line numbers
              - Test isolation requirements identified (MYAGENTS_TEST_ISOLATION)
              - Clear mapping of what to remove vs preserve in live plan
              - No assumptions - all behavior traced to source code

          - id: "1.2"
            type: design
            description: "Design simplified detection patterns"
            status: completed
            depends_on: ["1.1"]
            inputs:
              - /home/code/myagents/MyAgents-fallback_review/src/myagents/backend/services/agents/workflows/health_check_workflow.py
              - /home/code/myagents/MyAgents-fallback_review/docs/plans/live/251127_myagents_fallback_review.yml
              - /home/code/myagents/MyAgents/src/myagents/frontend/agents/planner/examples/over_engineering.yml
            guidance: |
              Context: Based on documented fallback patterns from 1.1, design simplified detection
              that removes confusing behavior while preserving necessary functionality.

              Objectives (from live plan):
              - Remove silent fallback chains - error loudly with helpful info
              - Remove auto-creation of config files (allow_fallback=True pattern)
              - Keep home directory (~/.config/myagents/) as canonical config location
              - Simplify detect_project_root to single path (no home dir fallback for projects)

              Instructions:
              1. Design simplified detect_project_root():
                 - Single behavior: Walk up from cwd looking for langgraph.json
                 - NO home directory fallback (remove required=False behavior)
                 - Stop at /tmp boundary (preserve test isolation logic)
                 - Error message: "No langgraph.json found. Run from project directory or use 'myagents setup'."

              2. Design simplified detect_config_path():
                 - Single canonical location: ~/.config/myagents/config.yml
                 - Remove project-level config cascade (project_root/config.yml, project_root/.myagents/config.yml)
                 - Error message: "No config found at ~/.config/myagents/config.yml. Run 'myagents setup' to initialize."

              3. Design simplified detect_langgraph_path():
                 - Remove allow_fallback parameter entirely
                 - NO auto-creation of langgraph.json
                 - Preserve MYAGENTS_TEST_ISOLATION check (test requirement)
                 - Return None if ~/.config/myagents/langgraph.json doesn't exist

              4. Design simplified detect_context():
                 - Use detect_project_root(required=True) - no fallback
                 - Clear error propagation when langgraph.json missing
                 - Update error message to guide users to setup command

              5. Document in live plan:
                 - Function signatures (parameter changes)
                 - Behavior changes for each function
                 - Error messages for each failure case
                 - Test isolation preservation strategy

              Why this matters: Clear design specification enables implementation phase agents
              to work independently without re-discovering requirements.
            success_criteria:
              - Single happy path defined for each detect_* function
              - No silent fallbacks in design (all errors are explicit)
              - Test isolation preserved (MYAGENTS_TEST_ISOLATION)
              - Error messages guide users to 'myagents setup' command
              - Design documented in live plan with clear specifications

