design_specification:
  created_by: "Agent 1.2"
  created_at: "2025-11-28"

  function_designs:
    detect_project_root:
      current_signature: "def detect_project_root(self, required: bool = True) -> Optional[Path]:"
      new_signature: "def detect_project_root(self) -> Path:"

      current_behavior: |
        Two-level fallback:
        1. Walk up from cwd looking for langgraph.json (lines 231-244)
        2. If required=False, fall back to home directory (lines 246-250)
        3. Return None if not required and not found (line 259)

      new_behavior: |
        Single happy path:
        1. Walk up from cwd looking for langgraph.json
        2. Stop at /tmp boundary (preserve test isolation - lines 235-244)
        3. Always raise RuntimeError if not found

      changes:
        - Remove required parameter entirely
        - Remove home directory fallback (lines 246-250)
        - Remove None return possibility (always returns Path or raises)
        - Keep /tmp boundary check (critical for test isolation)

      error_message: "No langgraph.json found. Run from project directory or use 'myagents setup'."

      preserved_logic:
        - /tmp boundary check (lines 235-244) - prevents walking into system dirs during tests

    detect_config_path:
      current_signature: "def detect_config_path(self, project_root: Path) -> Optional[Path]:"
      new_signature: "def detect_config_path(self) -> Optional[Path]:"

      current_behavior: |
        Three-level cascade:
        1. Check project_root/config.yml (lines 274-277)
        2. Check project_root/.myagents/config.yml (lines 279-281)
        3. Check ~/.config/myagents/config.yml (lines 283-286)
        4. Return None if all checks fail

      new_behavior: |
        Single canonical location:
        1. Check ~/.config/myagents/config.yml only
        2. Return path if exists, None if not
        3. Never create config files

      changes:
        - Remove project_root parameter
        - Remove project-level config checks (lines 274-281)
        - Keep only home directory check (lines 283-286)
        - Returns Optional[Path] (None indicates config missing)

      error_guidance: "Returning None signals to caller that config missing. Caller should guide user to 'myagents setup'."

      caller_updates:
        - "Line 152 in detect_context(): Change from detect_config_path(project_root) to detect_config_path()"
        - "Line 93 in check_project_health(): Change from detect_config_path(project_root) to detect_config_path()"

    detect_langgraph_path:
      current_signature: "def detect_langgraph_path(self, allow_fallback: bool = False) -> Optional[Path]:"
      new_signature: "def detect_langgraph_path(self) -> Optional[Path]:"

      current_behavior: |
        Conditional auto-creation:
        1. Return None if MYAGENTS_TEST_ISOLATION set (lines 305-306)
        2. Check if ~/.config/myagents/langgraph.json exists (lines 308-314)
        3. If exists, return home directory
        4. If allow_fallback=True, auto-create file (lines 317-336)
        5. Otherwise return None

      new_behavior: |
        Pure detection only:
        1. Return None if MYAGENTS_TEST_ISOLATION set (preserve this)
        2. Check if ~/.config/myagents/langgraph.json exists
        3. Return home directory if exists, None if not
        4. Never create files

      changes:
        - Remove allow_fallback parameter
        - Remove auto-creation logic (lines 317-336)
        - Preserve MYAGENTS_TEST_ISOLATION check (CRITICAL - lines 305-306)
        - Simplified: detection only, no creation

      preserved_logic:
        - MYAGENTS_TEST_ISOLATION environment variable check (lines 305-306)
        - This allows tests to create isolated fixtures without interference

      caller_updates:
        - "Line 248 in detect_project_root(): Remove call entirely (home fallback being removed)"

    detect_context:
      current_signature: "def detect_context(self, command: Optional[str] = None, is_help: bool = False) -> Dict[str, Any]:"
      new_signature: "No change to signature"

      current_behavior: |
        For project commands (line 141-158):
        1. Call detect_project_root(required=False) - enables home fallback (line 143)
        2. Check if project_root is None (lines 146-150)
        3. If None, raise RuntimeError
        4. Call detect_config_path(project_root) (line 152)

      new_behavior: |
        For project commands:
        1. Call detect_project_root() - no parameters (always required)
        2. Function raises RuntimeError if not found - no None check needed
        3. Call detect_config_path() - no project_root parameter
        4. Let RuntimeError propagate naturally

      changes:
        - Line 143: Change from detect_project_root(required=False) to detect_project_root()
        - Remove None check (lines 146-150) since function never returns None
        - Line 152: Change from detect_config_path(project_root) to detect_config_path()
        - Error propagation simplified

      error_handling: |
        detect_project_root() now raises clear error with helpful message.
        No need to catch and re-raise - let it propagate to CLI for display.

  test_isolation_requirements:
    critical_preservation:
      - "MYAGENTS_TEST_ISOLATION environment variable check in detect_langgraph_path()"
      - "Located at lines 305-306 in current implementation"
      - "Purpose: Allows tests to use isolated fixtures without interference from ~/.config/myagents/"
      - "MUST be preserved in simplified version"

    /tmp_boundary:
      - "/tmp boundary check in detect_project_root()"
      - "Located at lines 235-244 in current implementation"
      - "Purpose: Prevents walking up into system directories during test execution"
      - "MUST be preserved in simplified version"

  error_messages:
    detect_project_root_error:
      current: "Could not find langgraph.json in current directory or any parent directory"
      new: "No langgraph.json found. Run from project directory or use 'myagents setup'."
      rationale: "Guides user to action (setup command) instead of just stating problem"

    detect_context_error:
      current: "Could not find langgraph.json in current directory, any parent directory, or home directory (~/.config/myagents/). Project commands require a valid project context."
      new: "Remove this check - let detect_project_root() error propagate"
      rationale: "Single source of truth for error message in detect_project_root()"

  implementation_order:
    - "Phase 2.1: Simplify detect_project_root() - foundation function"
    - "Phase 2.2: Simplify detect_config_path() - independent of 2.1"
    - "Phase 2.3: Remove detect_langgraph_path() auto-creation - independent"
    - "Phase 2.4: Update detect_context() - depends on 2.1, 2.2, 2.3 being complete"

