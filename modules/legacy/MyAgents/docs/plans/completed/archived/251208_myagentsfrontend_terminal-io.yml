phases:
  # Phase 1: E2E Integration Testing
  - name: E2E Integration Testing Phase
    description: |
      Test full round-trip: Flutter -> Relay -> PTY -> Response -> Relay -> Flutter
      Requires RemoteAgents terminal server with actual PTY implementation.

    execution_groups:
      - execution: test-fix-loop
        name: Terminal I/O round-trip testing
        agents:
          - type: test
            count: 3
            inputs:
              - /home/code/myagents/MyAgentsFrontend-terminal-io/lib/features/remote_terminal/terminal_screen.dart
              - /home/code/myagents/MyAgentsFrontend-terminal-io/lib/features/remote_terminal/terminal_controller.dart
              - /home/code/myagents/MyAgentsFrontend-terminal-io/lib/core/networking/relay_client.dart
            guidance: |
              Test E2E terminal I/O with actual RemoteAgents backend:

              Agent 1 - Basic I/O:
              - Type simple command (ls, pwd, echo)
              - Verify output appears in terminal
              - Verify no character doubling or corruption

              Agent 2 - ANSI rendering:
              - Run command with colors (ls --color)
              - Verify colors render correctly in xterm
              - Test cursor movement (vim, top)

              Agent 3 - Resize and edge cases:
              - Resize terminal window
              - Verify resize event sent to backend
              - Test reconnection after disconnect
            success_criteria:
              - Terminal input reaches PTY
              - PTY output rendered correctly
              - Colors and ANSI codes work
              - Resize events handled

