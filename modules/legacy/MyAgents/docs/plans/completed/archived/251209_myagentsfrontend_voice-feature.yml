name: Voice UI (Minimal Frontend)
worktree: /home/code/myagents/MyAgentsFrontend-voice
branch: voice-feature
status: completed
completed_at: 2025-12-10
liveplan: /home/code/myagents/docs/plans/live/251209_myagentsfrontend_voice-feature.yml
completedplan: /home/code/myagents/docs/plans/completed/251209_myagentsfrontend_voice-feature.yml

description: |
  Minimal voice UI for MyAgentsFrontend.
  FRONTEND ONLY: Audio capture and visual feedback.
  BACKEND HANDLES: Deepgram API integration, transcription (see RemoteAgents voice-backend plan).

  This follows MyAgents architecture: minimal frontend, business logic in backend workflows.

  IMPORTANT: Must not overlap with backend work. Backend handles:
  - Deepgram API integration (protected API key)
  - Audio processing and streaming to Deepgram
  - Transcript generation (interim + final)
  - Voice session lifecycle management

objectives:
  - VoiceButton UI widget with visual states (idle, recording, processing, success, error)
  - VoiceState management (local UI state only)
  - Audio capture (microphone to PCM chunks)
  - Send audio frames via RelayClient (E2E encrypted)
  - Receive and display transcripts from backend
  - Microphone permission handling

dependencies:
  requires:
    - flutter-setup (existing)
    - RemoteAgents voice-backend (see /home/code/myagents/docs/plans/live/251209_remoteagents-backlog.yml for session recovery)
  independent_of:
    - core-crypto (reuse existing)
    - core-networking (reuse existing RelayClient)

phases:
  # ========================================
  # BUILD PHASE
  # ========================================
  - name: Build Phase
    execution_groups:
      # Sequential Group 1: Core state management and audio capture (foundation)
      - execution: sequential
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_state.dart
            guidance: |
              Context: VoiceState manages UI state for voice recording.
              This is LOCAL UI STATE ONLY - no business logic, no Deepgram integration.
              Backend handles all transcription logic via RemoteAgents workflows.

              Instructions:
              1. Create lib/features/voice/voice_state.dart
              2. Define VoiceState enum:
                 - idle: Ready to record (initial state)
                 - requestingPermission: Awaiting microphone permission
                 - recording: Actively capturing audio (microphone on)
                 - processing: Waiting for final transcript from backend
                 - success: Transcript received successfully
                 - error: Permission denied or backend error
              3. Create VoiceController class (extends ChangeNotifier):
                 - currentState: VoiceState (current UI state)
                 - interimTranscript: String (live text from backend, updated in real-time)
                 - finalTranscript: String (completed text from backend)
                 - errorMessage: String? (error details if state is error)
                 - Methods:
                   * startRecording(): Transitions to requestingPermission/recording
                   * stopRecording(): Transitions to processing
                   * reset(): Returns to idle state
                   * onTranscriptReceived(String text, bool isFinal): Updates interim or final transcript
                   * onError(String message): Sets error state with message
                 - State transition logic:
                   * idle -> requestingPermission (on start)
                   * requestingPermission -> recording (on permission granted)
                   * requestingPermission -> error (on permission denied)
                   * recording -> processing (on stop)
                   * processing -> success (on final transcript)
                   * processing -> error (on backend error)
                   * any state -> idle (on reset)
                 - notifyListeners() on all state changes
              4. No Deepgram logic - backend handles transcription
              5. No audio capture logic - that goes in audio_capture.dart

              Files to create:
              - lib/features/voice/voice_state.dart

              Why this matters: Clear state management enables predictable UI behavior and proper
              visual feedback for all voice recording states.
            success_criteria:
              - All 6 UI states defined with dartdoc comments
              - All 6 state transitions validated with zero test failures
              - notifyListeners() called within 10ms of each state change
              - Interim and final transcripts stored in separate fields
              - Error messages accessible via errorMessage getter when state is error

          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/audio_capture.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_state.dart
            guidance: |
              Context: AudioCapture handles microphone recording and permission management.
              Captures raw audio PCM16 data and provides stream for sending to backend.
              NO transcription logic - just capture audio for backend processing.

              Instructions:
              1. Create lib/features/voice/audio_capture.dart
              2. Use record package (already in pubspec.yaml) for microphone access:
                 - Import: import 'package:record/record.dart';
                 - Create AudioRecorder instance
                 - Request microphone permission
                 - Start/stop recording on demand
                 - Provide Stream<Uint8List> of audio chunks
              3. Audio configuration (MUST match backend expectations):
                 - Format: PCM16 (AudioEncoder.pcm16bit)
                 - Sample rate: 16000 Hz
                 - Channels: mono (1 channel)
                 - Chunk size: 4096 bytes (for efficient streaming)
              4. AudioCaptureService class:
                 - final _recorder = AudioRecorder()
                 - Future<bool> requestPermission(): Requests microphone permission
                 - Future<bool> hasPermission(): Checks current permission status
                 - Future<Stream<Uint8List>> startRecording(): Starts audio capture, returns chunk stream
                 - Future<void> stopRecording(): Stops capture and releases microphone
                 - void dispose(): Cleanup resources
              5. Permission handling:
                 - Request permission on first use
                 - Update VoiceState via callback on permission result
                 - Handle denied gracefully with clear error message
                 - Support both Android and iOS permission models
              6. Resource cleanup:
                 - Dispose stream on stop
                 - Release microphone properly
                 - Cancel any pending operations
              7. Error handling:
                 - Catch permission errors
                 - Catch recording errors
                 - Provide clear error messages via exceptions

              NO DEEPGRAM LOGIC - just capture raw audio chunks for backend.

              Files to create:
              - lib/features/voice/audio_capture.dart

              Files to reference:
              - lib/features/voice/voice_state.dart (for state enum, not direct usage)

              Why this matters: Reliable audio capture is the foundation for voice input.
              Proper permission handling and resource management prevent crashes and improve UX.
            success_criteria:
              - Permission request completes within 2 seconds
              - Audio stream provides PCM16 chunks at 16kHz mono
              - Stream emits chunks of 4096 bytes (+/- 10%)
              - Resources cleaned up on stop (no leaked streams, verified via dispose)
              - Permission denial throws AudioCaptureException with clear message
              - Works on both Android and iOS (platform-specific tests pass)

      # Sequential Group 2: Message types and relay integration (depends on Group 1)
      - execution: sequential
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/core/crypto/message_envelope.dart
            guidance: |
              Context: Add voice message types to MessageType enum for voice protocol.
              Voice messages follow the same E2E encrypted format as terminal messages.

              Instructions:
              1. Update lib/core/crypto/message_envelope.dart
              2. Add to MessageType enum (after existing types):
                 - voiceAudioFrame: Audio chunk from frontend to backend
                 - voiceTranscript: Transcript from backend to frontend (interim + final)
                 - voiceControl: Control messages (start, stop, cancel)
                 - voiceStatus: Status updates from backend (ready, error)
              3. Update MessageTypeExtension.toSnakeCase():
                 - voiceAudioFrame -> 'voice.audio_frame'
                 - voiceTranscript -> 'voice.transcript'
                 - voiceControl -> 'voice.control'
                 - voiceStatus -> 'voice.status'
              4. Update MessageTypeExtension.fromSnakeCase():
                 - Add cases for all new voice message types
                 - Match exact strings from toSnakeCase()
              5. No other changes needed - MessageEnvelope.seal() and .open() already handle encryption

              Files to modify:
              - lib/core/crypto/message_envelope.dart (enum and extension only)

              Why this matters: Defines the protocol for voice communication between frontend and backend.
              Following the same pattern as terminal messages ensures consistency and reusability.
            success_criteria:
              - 4 new voice message types added to enum
              - toSnakeCase() returns correct strings with 'voice.' prefix
              - fromSnakeCase() parses all new types correctly
              - Unknown types still throw ArgumentError
              - Serialization/deserialization works for voice types

          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_relay_handler.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_state.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/audio_capture.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/core/networking/relay_client.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/core/crypto/message_envelope.dart
            guidance: |
              Context: VoiceRelayHandler bridges audio capture to backend voice service via RelayClient.
              Sends audio chunks and receives transcripts using E2E encrypted messages.
              This is the integration layer between local audio and remote backend.

              Instructions:
              1. Create lib/features/voice/voice_relay_handler.dart
              2. VoiceRelayHandler class:
                 - final RelayClient relayClient (injected via constructor)
                 - final VoiceController controller (injected via constructor)
                 - final KeyPair ourKeys, remoteKeys (for encryption)
                 - StreamSubscription? _transcriptSubscription
                 - StreamSubscription? _statusSubscription
                 - StreamSubscription? _audioSubscription
              3. Sending audio (frontend -> backend):
                 - startVoiceSession(): Send VoiceControl(action: "start")
                 - streamAudioFrames(Stream<Uint8List> audioStream):
                   * Listen to audio stream
                   * For each chunk: Send VoiceAudioFrame(data: base64.encode(chunk))
                   * Handle stream errors
                 - stopVoiceSession(): Send VoiceControl(action: "stop")
              4. Receiving transcripts (backend -> frontend):
                 - setupListeners(): Subscribe to relay message streams
                 - Listen for MessageType.voiceTranscript:
                   * Parse payload: {transcript: String, is_final: bool}
                   * Call controller.onTranscriptReceived(transcript, isFinal)
                   * Update UI via controller
                 - Listen for MessageType.voiceStatus:
                   * Parse payload: {status: String, message: String?}
                   * Handle "error" status -> controller.onError(message)
                   * Handle "ready" status -> update state
              5. Message format (match backend protocol):
                 - VoiceAudioFrame: {data: base64_string}
                 - VoiceTranscript: {transcript: string, is_final: bool}
                 - VoiceControl: {action: "start"|"stop"|"cancel"}
                 - VoiceStatus: {status: "ready"|"error"|"processing", message: string?}
              6. Error handling:
                 - Connection errors -> VoiceState.error
                 - Backend errors -> display error message via controller
                 - Audio stream errors -> stop session gracefully
              7. Resource cleanup:
                 - dispose(): Cancel all subscriptions
                 - Stop audio streaming on error

              Files to create:
              - lib/features/voice/voice_relay_handler.dart

              Files to reference:
              - lib/core/networking/relay_client.dart (existing - use .send() and message streams)
              - lib/core/crypto/message_envelope.dart (existing - use new voice types)
              - lib/features/voice/voice_state.dart (to update UI state)
              - lib/features/voice/audio_capture.dart (audio stream source)

              Why this matters: This is the critical integration point that connects local audio
              capture to remote backend transcription via encrypted relay.
            success_criteria:
              - Audio frames sent via relay using VoiceAudioFrame messages
              - Audio chunks base64-encoded before sending
              - Transcripts received via VoiceTranscript messages
              - Interim and final transcripts differentiated by is_final field
              - Transcripts routed to controller within 100ms of reception
              - Errors propagate to controller.onError within 50ms
              - All subscriptions cancelled on dispose (verified via mock)

      # Parallel Group 3: UI widget (can run parallel with terminal integration)
      - execution: parallel
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_button.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_state.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/audio_capture.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_relay_handler.dart
            guidance: |
              Context: VoiceButton is the UI widget for voice input in terminal screen.
              Push-to-talk style: hold to record, release to send final transcript.
              This is the user-facing component that ties everything together.

              Instructions:
              1. Create lib/features/voice/voice_button.dart
              2. VoiceButton StatefulWidget:
                 - Constructor params:
                   * required RelayClient relayClient
                   * required KeyPair ourKeys, remoteKeys
                   * required Function(String) onTranscriptComplete (callback to parent)
                 - State class holds:
                   * late VoiceController _controller
                   * late AudioCaptureService _audioCapture
                   * late VoiceRelayHandler _relayHandler
              3. UI design (FloatingActionButton style):
                 - VoiceState.idle: Microphone icon (Icons.mic), primary color
                 - VoiceState.requestingPermission: Loading indicator, disabled
                 - VoiceState.recording: Microphone icon, RED color with pulsing animation
                 - VoiceState.processing: Loading spinner (CircularProgressIndicator)
                 - VoiceState.success: Checkmark icon (Icons.check), brief green flash
                 - VoiceState.error: Error icon (Icons.error), red, show tooltip with error message
              4. Animations:
                 - Recording: Pulsing scale animation (AnimationController with repeat)
                 - Success: Brief scale bounce animation (300ms)
                 - Error: Shake animation (if desired)
              5. Interaction flow:
                 - onLongPressStart:
                   * Check microphone permission
                   * Call _controller.startRecording()
                   * Start audio capture: _audioCapture.startRecording()
                   * Send start control: _relayHandler.startVoiceSession()
                   * Stream audio: _relayHandler.streamAudioFrames(audioStream)
                 - onLongPressEnd:
                   * Stop audio capture: _audioCapture.stopRecording()
                   * Send stop control: _relayHandler.stopVoiceSession()
                   * Call _controller.stopRecording() (waits for final transcript)
                 - onLongPressCancel:
                   * Cancel recording: _audioCapture.stopRecording()
                   * Reset state: _controller.reset()
              6. Transcript display:
                 - Listen to _controller for transcript updates
                 - Show interim transcript in overlay (optional - can be added later)
                 - When final transcript received: Call onTranscriptComplete(finalTranscript)
                 - Auto-reset to idle after success
              7. Callback integration:
                 - onTranscriptComplete(String text): Called when final transcript ready
                 - Parent (TerminalScreen) sends this to terminal input
              8. Error handling:
                 - Show error tooltip on VoiceState.error
                 - Permission denied: Show clear message ("Microphone permission denied")
                 - Backend error: Show backend error message
                 - Tap to dismiss error and reset

              Files to create:
              - lib/features/voice/voice_button.dart

              Files to reference:
              - All voice feature files (voice_state, audio_capture, voice_relay_handler)

              Why this matters: This is the user-facing widget that provides tactile, visual feedback
              and integrates all voice components into a cohesive user experience.
            success_criteria:
              - Button responds to long press within 100ms
              - All 6 visual states render with distinct icons/colors
              - Recording animation starts within 50ms of state change
              - Audio streams continuously during long press
              - onTranscriptComplete fires within 200ms of final transcript
              - Permission denial shows "Microphone permission denied" message
              - Backend errors display errorMessage from controller
              - Button resets to idle within 500ms of success/error

          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/remote_terminal/terminal_screen.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_button.dart
            guidance: |
              Context: Integrate VoiceButton into TerminalScreen as a FloatingActionButton.
              Voice input is an alternative input method alongside keyboard for terminal commands.

              Instructions:
              1. Update lib/features/remote_terminal/terminal_screen.dart
              2. Add VoiceButton import:
                 - import '../voice/voice_button.dart';
              3. Add VoiceButton as FloatingActionButton:
                 - Add floatingActionButton property to Scaffold
                 - Position: bottom-right (default FAB position)
                 - Only show when connected to relay (check RelayClient.isConnected)
                 - Pass required params:
                   * relayClient: existing relay client instance
                   * ourKeys, remoteKeys: existing encryption keys
                   * onTranscriptComplete: (text) { sendToTerminalInput(text); }
              4. Wire transcript callback:
                 - onTranscriptComplete receives final transcript string
                 - Send to terminal as if user typed it: sendTerminalInput(transcript)
                 - Optionally append newline: sendTerminalInput('$transcript\n')
              5. Handle connection state:
                 - Hide VoiceButton when disconnected (relay not connected)
                 - Show VoiceButton only when terminal session active
                 - Disable VoiceButton if terminal not ready
              6. Permission handling:
                 - VoiceButton handles its own permission UI
                 - No additional permission handling needed in TerminalScreen

              Files to modify:
              - lib/features/remote_terminal/terminal_screen.dart

              Files to reference:
              - lib/features/voice/voice_button.dart (new widget to integrate)

              Why this matters: Provides seamless voice input integration into terminal workflow,
              enabling hands-free command execution.
            success_criteria:
              - VoiceButton appears as FAB at bottom-right of terminal screen
              - Button visibility toggles with relay connection state
              - Voice commands produce identical backend messages to typed commands
              - Zero behavioral difference between voice and keyboard input
              - FAB does not overlap with terminal output or input areas
              - FAB accessible (meets minimum touch target 48x48dp)

  # ========================================
  # TEST PHASE
  # ========================================
  - name: Test Phase
    execution_groups:
      # Test-fix-loop execution group: Parallel test agents, dynamic build agents for fixes
      - execution: test-fix-loop
        name: Voice UI component testing
        agents:
          # Parallel test agents: Test different voice components simultaneously
          - type: test
            count: 6
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_state.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/audio_capture.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_relay_handler.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_button.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/core/crypto/message_envelope.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/remote_terminal/terminal_screen.dart
            guidance: |
              Test Strategy: technical-spike (focused component testing)
              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251209_myagentsfrontend_voice-feature.yml

              IMPORTANT: Frontend-only testing. Mock backend responses.
              DO NOT test Deepgram integration (backend responsibility).

              Component Test Scope (distribute across 6 agents):

              Agent 1 - VoiceState and VoiceController:
              - Test all 6 state transitions (idle -> requestingPermission -> recording -> processing -> success)
              - Test error transitions from each state
              - Test reset() returns to idle from any state
              - Test onTranscriptReceived() updates interim vs final transcript correctly
              - Test notifyListeners() called on every state change
              - Test errorMessage stored when onError() called
              - Mock: No external dependencies needed

              Agent 2 - AudioCapture:
              - Test permission request flow (mock permission system)
              - Test hasPermission() returns correct status
              - Test startRecording() returns audio stream
              - Test audio chunks are ~4096 bytes (within reasonable range)
              - Test stopRecording() releases resources (stream closes)
              - Test permission denied throws clear exception
              - Test dispose() cleanup (no leaked resources)
              - Mock: Use mock AudioRecorder to avoid real microphone access

              Agent 3 - MessageType enum extensions:
              - Test 4 new voice message types added to MessageType enum
              - Test toSnakeCase() returns: 'voice.audio_frame', 'voice.transcript', 'voice.control', 'voice.status'
              - Test fromSnakeCase() parses all voice types correctly
              - Test unknown type throws ArgumentError
              - Test MessageEnvelope serialization with voice types
              - Mock: No mocking needed (pure data transformation)

              Agent 4 - VoiceRelayHandler integration:
              - Test startVoiceSession() sends VoiceControl(action: "start")
              - Test streamAudioFrames() sends VoiceAudioFrame for each chunk
              - Test audio chunks base64-encoded before sending
              - Test stopVoiceSession() sends VoiceControl(action: "stop")
              - Test VoiceTranscript reception updates controller (interim + final)
              - Test VoiceStatus error handling (controller.onError called)
              - Test dispose() cancels all subscriptions
              - Mock: MockRelayClient to avoid real network, mock audio stream

              Agent 5 - VoiceButton UI and integration:
              - Test button renders in all 6 states (idle, requestingPermission, recording, processing, success, error)
              - Test long press starts recording (calls startRecording, startVoiceSession)
              - Test release stops recording (calls stopRecording, stopVoiceSession)
              - Test cancel resets state (calls reset)
              - Test onTranscriptComplete callback fires with final transcript
              - Test error state shows tooltip with error message
              - Test button disabled during requestingPermission/processing
              - Mock: Mock AudioCapture, VoiceRelayHandler, VoiceController

              Agent 6 - Terminal Integration (VoiceButton in TerminalScreen):
              - Test VoiceButton appears in terminal screen when relay connected
              - Test VoiceButton hidden when relay disconnected
              - Test onTranscriptComplete routes final transcript to terminal input
              - Test terminal executes voice command as if typed (sends to backend)
              - Test no UI conflicts between voice button and existing terminal controls
              - Test FloatingActionButton positioned correctly (bottom-right, no overlap)
              - Test voice input flow: long press -> speak -> release -> transcript in terminal -> command executes
              - Mock: Mock RelayClient connection state, mock terminal input handler

              Failure Reporting Format:
              Add failures to live plan under test_failures with structure:
              - test_name: Name of failed test
              - component: Component being tested (voice_state, audio_capture, message_types, relay_handler, voice_button, terminal_integration)
              - failure_description: What went wrong
              - expected_behavior: What should have happened
              - actual_behavior: What actually happened
              - files_involved: List of files related to failure
            success_criteria:
              - Zero component test failures
              - All state transitions validated (6 states, all valid transitions, error paths)
              - Audio capture lifecycle tested (permission, start, stop, dispose)
              - Message types serialize/deserialize correctly (all 4 voice types)
              - VoiceRelayHandler sends and receives messages properly (control, audio, transcript, status)
              - VoiceButton integrates all components correctly (all 6 UI states, interactions)
              - Terminal integration verified (visibility, transcript routing, command execution)
              - Mock strategy appropriate (no over-mocking of integration points, no under-mocking of external dependencies)
              - End-to-end flow validated: voice input -> transcript in terminal -> command sent to backend
              - Performance acceptable: state transitions < 100ms, permission request completes within 2s
              - Error handling comprehensive: permission denied, backend errors, network failures all tested

          # Dynamic build agents: Spawn one build agent per failure found in live plan
          - type: build
            count: "n = total failures"
            inputs:
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_state.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/audio_capture.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_relay_handler.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/voice/voice_button.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/core/crypto/message_envelope.dart
              - /home/code/myagents/MyAgentsFrontend-voice/lib/features/remote_terminal/terminal_screen.dart
            guidance: |
              Context: Test agents have identified failures in voice UI components.
              Each build agent is assigned ONE specific failure to fix.

              Instructions:
              1. Read live plan at /home/code/myagents/docs/plans/live/251209_myagentsfrontend_voice-feature.yml
              2. Find your assigned failure (orchestration agent will specify which one)
              3. Determine root cause:
                 - Code bug: Fix implementation
                 - Missing functionality: Add feature
                 - Integration issue: Fix component wiring
              4. Fix the specific issue identified
              5. Mark failure as resolved in live plan after fixing

              Failure Categories:
              - State management: Fix VoiceState transitions or VoiceController logic
              - Audio capture: Fix permission handling, stream generation, or resource cleanup
              - Message types: Fix enum values, serialization, or deserialization
              - Relay integration: Fix message sending/receiving, subscription management
              - UI integration: Fix VoiceButton rendering, interactions, or callbacks
              - Terminal integration: Fix VoiceButton placement or transcript handling

              Why this matters: Each failure represents a gap in voice UI implementation.
              Systematic fixing ensures complete, working voice input feature.
            success_criteria:
              - Test that previously failed now passes
              - Related tests still pass (no regression)
              - Component behaves as specified in guidance

