# ==============================================================================
# RESEARCH FINDINGS
# ==============================================================================

research_findings:
  ci_cd_platform: Google Cloud Build
  infrastructure:
    - Primary CI/CD platform: Google Cloud Build (2nd Gen GitHub Integration)
    - Trigger types:
      - PR trigger: Runs on pull requests to main (uses cloudbuild-pr.yaml)
      - Main trigger: Runs on commits to main (uses cloudbuild.yaml)
    - Machine types:
      - PR builds: E2_MEDIUM (2 vCPU, free tier - 120 build-minutes/day)
      - Main builds: E2_HIGHCPU_8 (8 vCPU, parallel test execution)
    - Build time: 3m 48s for full MyAgents test suite (680+ tests)

  secret_management:
    platform: Google Secret Manager
    secrets_used:
      - GEMINI_API_KEY: AI model API key
      - LANGSMITH_API_KEY: LangSmith tracing API key
      - GH_TOKEN: GitHub OAuth token for private repo access
      - gcp-service-account-key: GCP service account JSON key
    access_pattern: Secrets mounted as environment variables via availableSecrets section

  testing_patterns:
    test_framework: pytest (Python)
    parallel_execution: true
    test_packages:
      - 8 parallel test packages in main build
      - Sequential unit tests only in PR builds (free tier optimization)
    selective_execution:
      - Tool: pytest-testmon (tracks code changes, runs only affected tests)
      - Storage: Testmon databases stored in GCS between builds
      - Per-package databases: test-cli.testmondata, test-echo.testmondata, etc.
    markers:
      - costly: Marks tests that require API calls or are slow
      - PR builds exclude costly tests: pytest -m "not costly"

  linting:
    tools:
      - ruff: Python linter (fast Rust-based linter)
      - mypy: Python type checker
    execution: Runs before tests (fail-fast pattern)

  dockerfile_pattern:
    file: Dockerfile.test
    multi_stage: true
    stages:
      - builder: Installs dependencies, builds artifacts
      - runtime: Copies venv and source, runs tests
    workspace_structure:
      - Monorepo layout: MyAgents and Agent-GCPtoolkit as siblings
      - Worktree name: Parameterized via ARG WORKTREE_NAME
      - Build context: Parent directory (/workspace)

  deployment:
    status: Not yet implemented for MyAgents
    deferred_reason: No release yet - premature to deploy
    planned_targets: Cloud Run (staging and production)

  branch_protection:
    status: Backlog item (CICD-001)
    requirements:
      - Required status checks from Cloud Build
      - Prevent force pushes to main
      - At least one approval required for PRs

