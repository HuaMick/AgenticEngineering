# ==============================================================================
# DESIGN DECISIONS
# ==============================================================================

design_decisions:
  - id: DD-001
    decision: Use Google Cloud Build (same as MyAgents)
    rationale: |
      - Consistency with existing infrastructure
      - Already set up with GitHub 2nd Gen integration
      - GCP Secret Manager integration for secrets
      - Free tier available (120 build-minutes/day on e2-medium)
    alternatives_considered:
      - GitHub Actions: Would require separate secret management setup
      - GitLab CI: Not used in organization

  - id: DD-002
    decision: Use Flutter Docker image for CI builds
    rationale: |
      - Official Flutter Docker images available (google/dart, cirrusci/flutter)
      - Consistent build environment across local and CI
      - No need to install Flutter SDK on each build (cached in image)
    implementation: |
      Use cirrusci/flutter:stable or google/dart:latest + Flutter SDK install

  - id: DD-003
    decision: Two-tier build strategy (PR vs Main)
    rationale: |
      - PR builds: Fast feedback (< 5 min), free tier (e2-medium)
      - Main builds: Comprehensive testing, larger machine (e2-highcpu-8)
      - Mirrors MyAgents pattern successfully
    pr_build:
      - Linting (flutter analyze)
      - Unit tests (flutter test)
      - No deployment
    main_build:
      - Linting
      - All tests
      - Web build (flutter build web)
      - Optional: Deploy to staging

  - id: DD-004
    decision: No testmon equivalent for Flutter
    rationale: |
      - pytest-testmon is Python-specific
      - Flutter test framework doesn't have selective execution tool
      - Flutter tests are typically fast enough to run all tests
    alternative: Use test tags to categorize tests (integration, unit, slow)

  - id: DD-005
    decision: Defer web deployment, use Cloud Run when implemented
    rationale: |
      - Focus on CI/CD pipeline first (testing + building)
      - Deployment can be added in Phase 2 once CI is stable
      - No production environment set up yet
    future_work: Deploy to Cloud Run (containerized Flutter web app)

