# ==============================================================================
# FILES TO CREATE
# ==============================================================================

files_to_create:
  - path: /home/code/myagents/MyAgentsFrontend-cicd/Dockerfile.test
    description: Multi-stage Docker image for Flutter CI builds
    template: |
      FROM cirrusci/flutter:stable AS builder

      WORKDIR /workspace/MyAgentsFrontend-staging

      # Copy pubspec files first for layer caching
      COPY MyAgentsFrontend-staging/pubspec.yaml MyAgentsFrontend-staging/pubspec.lock ./

      # Install dependencies
      RUN flutter pub get

      # Copy source code
      COPY MyAgentsFrontend-staging/lib ./lib
      COPY MyAgentsFrontend-staging/test ./test
      COPY MyAgentsFrontend-staging/web ./web
      COPY MyAgentsFrontend-staging/analysis_options.yaml ./

      # Runtime stage
      FROM cirrusci/flutter:stable

      WORKDIR /workspace/MyAgentsFrontend-staging

      # Copy from builder
      COPY --from=builder /workspace/MyAgentsFrontend-staging ./

      # Default command
      CMD ["/bin/bash"]

  - path: /home/code/myagents/MyAgentsFrontend-cicd/cloudbuild-pr.yaml
    description: PR validation build (lint + tests)
    key_steps:
      - Build Docker image with caching
      - Run flutter analyze
      - Run flutter test
      - Upload test results

  - path: /home/code/myagents/MyAgentsFrontend-cicd/cloudbuild.yaml
    description: Main branch build (lint + tests + web build)
    key_steps:
      - Build Docker image
      - Run flutter analyze
      - Run flutter test
      - Run flutter build web
      - Upload artifacts (test results, web build)

