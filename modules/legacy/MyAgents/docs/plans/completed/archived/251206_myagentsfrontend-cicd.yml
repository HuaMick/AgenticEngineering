# ==============================================================================
# RISKS AND MITIGATIONS
# ==============================================================================

risks:
  - risk: Flutter Docker image too large, slow builds
    probability: medium
    impact: medium
    mitigation: |
      - Use cirrusci/flutter images (optimized for CI)
      - Enable layer caching (--cache-from)
      - Push built image to GCR for reuse

  - risk: Web build requires secrets (Deepgram API key)
    probability: low
    impact: low
    mitigation: |
      - Check if Deepgram key required at build time
      - If needed, add to Secret Manager
      - Use --dart-define for build-time env vars

  - risk: Tests require external services (relay server)
    probability: medium
    impact: medium
    mitigation: |
      - Review existing tests - most use mock_relay_server.dart
      - Integration tests may need real relay server
      - Consider skipping integration tests in CI initially

  - risk: Path filtering doesn't work, triggers fire on all commits
    probability: low
    impact: medium
    mitigation: |
      - Test path filtering with manual trigger
      - Use includedFiles in trigger config
      - Monitor first few builds to verify filtering

