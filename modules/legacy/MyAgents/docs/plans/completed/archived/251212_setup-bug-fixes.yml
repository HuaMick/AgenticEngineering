# ==============================================================================
# PHASE 1: CODE FIXES (Priority: CRITICAL)
# ==============================================================================

phase_1_code_fixes:
  title: "Fix Silent Setup Failures"
  priority: CRITICAL
  estimated_effort: "1-2 hours"

  tasks:
    - id: FIX-001
      title: "Fix file reference in setup_workflow.py"
      file: "src/myagents/backend/services/agents/workflows/setup_workflow.py"
      lines: "226"
      change: |
        FROM: builder_agent_path = package_root / "backend" / "services" / "agents" / "workflows" / "builder_agent.py"
        TO:   coding_agent_path = package_root / "backend" / "services" / "agents" / "workflows" / "coding_agent.py"
      also_update:
        - "lines 241-244: Update langgraph.json generation to use coding_agent_path"

    - id: FIX-002
      title: "Add file existence verification"
      file: "src/myagents/backend/services/agents/workflows/setup_workflow.py"
      location: "After line 250 (after writing langgraph.json)"
      implementation: |
        # Verify file was written correctly
        if not langgraph_file.exists():
            return False, f"Failed to write langgraph.json to {langgraph_file}"

        # Verify referenced files exist
        for graph_name, graph_path in langgraph_data["graphs"].items():
            file_path, entry_point = graph_path.split(":")
            if not Path(file_path).exists():
                return False, (
                    f"langgraph.json references {file_path} which doesn't exist. "
                    f"This may indicate a package installation issue."
                )

    - id: FIX-003
      title: "Improve error handling in cmd_setup()"
      file: "src/myagents/frontend/cli/myagents_cli.py"
      line: "1105"
      implementation: |
        success, message = workflow.run_setup()
        if not success:
            import logging
            logging.error(f"Setup failed: {message}")
            logging.error(f"This may indicate a package installation issue")
            print(f"Error: {message}", file=sys.stderr)
            sys.exit(1)

