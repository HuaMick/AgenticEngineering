name: RemoteAgents Relay Service
worktree: /home/code/myagents/RemoteAgents
branch: relay-service
status: ready
liveplan: /home/code/myagents/docs/plans/live/251203_remoteagents_relay-service.yml
completedplan: /home/code/myagents/docs/plans/completed/251203_remoteagents_relay-service.yml

description: |
  Implement the WebSocket relay server that brokers connections between Flutter clients and
  terminal services. Handles session management, pairing code generation, and message routing
  between authenticated peers.

objectives:
  - Implement SessionManager domain for connection lifecycle management
  - Build RelayWorkflow for pairing code generation and session routing
  - Create FastAPI WebSocket server with connection handling
  - Implement message validation and routing logic
  - Add session timeout and cleanup mechanisms

dependencies:
  requires:
    - shared-contracts
  blocks:
    - cli-integration

success_criteria:
  - WebSocket server accepts and maintains concurrent connections
  - Pairing codes generate correctly and match sessions to peers
  - Messages route bidirectionally between authenticated clients
  - Sessions timeout and cleanup after inactivity
  - Service passes integration tests with mock clients

phases:
  # ========================================
  # BUILD PHASE - Domain Layer (SessionManager)
  # ========================================
  - name: Build Phase - SessionManager Domain
    execution_groups:
      - execution: sequential
        agents:
          # Session entity and value objects
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/entities.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/value_objects.py
              - /home/code/myagents/MyAgents/src/myagents/frontend/agents/orchestration/definitions.yml
            guidance: |
              Context: SessionManager domain models the lifecycle of a relay session: desktop creates
              session, receives pairing code, client connects with code, both peers exchange messages.
              Domain entities are pure business logic with no infrastructure dependencies (DDD pattern).

              Reference architecture patterns from definitions.yml for domain layer structure.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/ structure
              2. Define value objects in value_objects.py:
                 - SessionId: UUID wrapper with validation
                 - PairingCode: 6-char alphanumeric string (uppercase) with expiry timestamp
                 - PeerRole: Enum("desktop", "client")
                 - SessionState: Enum("created", "desktop_connected", "paired", "closed")
              3. Define Session entity in entities.py:
                 - Properties: session_id, pairing_code, desktop_public_key, client_public_key,
                              desktop_ws (Optional), client_ws (Optional), state, created_at, expires_at
                 - Methods:
                   * create(desktop_public_key) -> Session (generates session_id, pairing_code)
                   * connect_desktop(ws_connection) -> None (stores desktop WebSocket, transitions to desktop_connected)
                   * pair_client(client_public_key, ws_connection) -> None (validates pairing_code, stores client WebSocket, transitions to paired)
                   * is_expired() -> bool (checks if created_at + 5 minutes < now)
                   * close(reason: str) -> None (transitions to closed, clears WebSocket refs)
              4. Add domain exceptions:
                 - SessionExpiredException: Raised when pairing_code expired
                 - InvalidPairingCodeException: Raised when code doesn't match
                 - SessionAlreadyPairedException: Raised if client tries to pair twice
              5. Keep domain layer pure (no FastAPI/WebSocket imports, only Python stdlib)

              Why this matters: Pure domain entities enable testing without infrastructure.
              Business logic isolated from WebSocket/FastAPI implementation details.
            success_criteria:
              - Session entity models complete lifecycle (created -> paired -> closed)
              - Pairing code validates correctly (6 chars, expires after 5 min)
              - State transitions enforce valid sequences
              - Domain exceptions provide clear error cases
              - No infrastructure dependencies (no FastAPI/WebSocket imports)

          # Session repository interface
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/repository.py
              - /home/code/myagents/MyAgents/src/myagents/frontend/agents/orchestration/definitions.yml
            guidance: |
              Context: Repository interface defines how sessions are stored/retrieved without
              specifying implementation (in-memory dict, Redis, etc.). This is a Protocol class
              that infrastructure layer implements (DDD repository pattern).

              Instructions:
              1. Define SessionRepository Protocol in repository.py:
                 - add(session: Session) -> None
                 - get_by_id(session_id: SessionId) -> Optional[Session]
                 - get_by_pairing_code(code: PairingCode) -> Optional[Session]
                 - remove(session_id: SessionId) -> None
                 - get_all_active() -> List[Session] (for cleanup worker)
              2. Add docstrings documenting expected behavior:
                 - add() should raise if session_id already exists
                 - get_*() return None if not found (don't raise)
                 - remove() is idempotent (no error if not exists)
              3. Keep as pure Protocol (typing.Protocol) - no implementation

              Why this matters: Repository abstraction enables switching storage backends
              (in-memory for tests, Redis for production) without changing domain logic.
            success_criteria:
              - Repository interface defines all CRUD operations
              - Protocol class provides type checking without implementation
              - Docstrings clarify expected behavior
              - Interface supports both query patterns (by ID and by pairing code)

  # ========================================
  # BUILD PHASE - Workflow Layer (RelayWorkflow)
  # ========================================
  - name: Build Phase - RelayWorkflow
    execution_groups:
      - execution: sequential
        agents:
          # Relay workflow orchestration
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/entities.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/repository.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/messages.py
              - /home/code/myagents/MyAgents/src/myagents/frontend/agents/orchestration/definitions.yml
            guidance: |
              Context: RelayWorkflow orchestrates session creation, pairing, and message routing.
              It uses SessionRepository for persistence and protocol messages for communication.
              This is application logic that coordinates domain entities (DDD workflow pattern).

              Reference workflow patterns from definitions.yml for orchestration structure.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/ structure
              2. Implement RelayWorkflow in relay_workflow.py:
                 - __init__(repository: SessionRepository)
                 - create_session(desktop_public_key: bytes) -> tuple[SessionId, PairingCode]
                   * Create Session entity using Session.create()
                   * Store in repository via repository.add()
                   * Return session_id and pairing_code for response
                 - handle_desktop_connect(session_id: SessionId, ws_connection) -> None
                   * Retrieve session from repository
                   * Call session.connect_desktop(ws)
                   * Update in repository
                 - handle_client_pair(pairing_code: PairingCode, client_public_key: bytes, ws_connection) -> SessionId
                   * Retrieve session by pairing code
                   * Validate not expired (raise SessionExpiredException if expired)
                   * Call session.pair_client(client_public_key, ws)
                   * Update in repository
                   * Return session_id for client
                 - route_message(session_id: SessionId, sender: PeerRole, message: EncryptedBlob) -> None
                   * Retrieve session
                   * Validate sender is connected (has WebSocket)
                   * Determine recipient (if sender=desktop then recipient=client)
                   * Send message to recipient WebSocket
                 - close_session(session_id: SessionId, reason: str) -> None
                   * Retrieve session
                   * Call session.close(reason)
                   * Remove from repository
              3. Add workflow exceptions that wrap domain exceptions with context
              4. Import protocol message types from /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/messages.py

              Why this matters: Workflow layer coordinates domain entities and infrastructure.
              Clean separation enables testing workflows with mock repositories.
            success_criteria:
              - Workflow orchestrates complete session lifecycle
              - Message routing validates sender/recipient connectivity
              - Expired sessions rejected with clear errors
              - Workflow testable with mock repository (no hard dependencies)

  # ========================================
  # BUILD PHASE - Infrastructure Layer (FastAPI Server)
  # ========================================
  - name: Build Phase - FastAPI Server
    execution_groups:
      - execution: parallel
        agents:
          # In-memory repository implementation
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/in_memory_repository.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/repository.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/entities.py
            guidance: |
              Context: In-memory repository implements SessionRepository interface using Python dict.
              Suitable for single-instance deployments (desktop relay server). Add thread locks for
              concurrent access safety.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/ structure
              2. Implement InMemorySessionRepository in in_memory_repository.py:
                 - Use dict for storage: sessions: Dict[str, Session]
                 - Use threading.Lock for thread-safe access
                 - Implement all SessionRepository methods:
                   * add(): Lock, check exists, add to dict
                   * get_by_id(): Lock, return dict.get(session_id)
                   * get_by_pairing_code(): Lock, iterate sessions to find match
                   * remove(): Lock, dict.pop(session_id, None)
                   * get_all_active(): Lock, return [s for s in sessions.values() if s.state != "closed"]
              3. Add index for pairing_code lookups (Dict[str, SessionId]) for O(1) access
              4. Update indexes when sessions added/removed

              Why this matters: In-memory storage simple and fast for desktop use case.
              Thread locks prevent race conditions with concurrent WebSocket connections.
            success_criteria:
              - All repository operations thread-safe
              - Pairing code lookups use index (O(1) not O(n))
              - Repository implements SessionRepository Protocol
              - No race conditions under concurrent access

          # WebSocket connection manager
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/websocket_manager.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/messages.py
            guidance: |
              Context: WebSocket manager handles connection lifecycle, ping/pong keepalive,
              and message sending. Wraps FastAPI WebSocket with relay-specific logic.

              Instructions:
              1. Implement WebSocketManager in websocket_manager.py:
                 - accept(websocket: WebSocket) -> None (accept connection, start ping task)
                 - send_message(websocket: WebSocket, message: RemoteAgentMessage) -> None
                   * Serialize message to JSON
                   * Send via websocket.send_text()
                   * Handle websocket.WebSocketDisconnect
                 - receive_message(websocket: WebSocket) -> RemoteAgentMessage
                   * Receive JSON via websocket.receive_text()
                   * Deserialize using MESSAGE_TYPES registry
                   * Validate message structure
                 - close(websocket: WebSocket, reason: str) -> None
                   * Send Error message with reason
                   * Close WebSocket
                 - start_keepalive(websocket: WebSocket, interval: int = 30) -> None
                   * Background task sending Ping every interval seconds
                   * Expect Pong response within 5 seconds
                   * Close connection if Pong timeout
              2. Import WebSocket from fastapi, protocol messages from shared-contracts
              3. Handle WebSocketDisconnect exceptions gracefully

              Why this matters: Centralized WebSocket logic prevents duplication in endpoints.
              Keepalive detects dead connections and cleans up resources.
            success_criteria:
              - Messages serialize/deserialize correctly using protocol
              - Keepalive detects disconnected clients within 35 seconds
              - WebSocketDisconnect handled without crashing server
              - Error messages sent before closing connections

      # Sequential execution: REST API and WebSocket endpoints need infrastructure ready
      - execution: sequential
        agents:
          # REST API endpoints
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/api.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/in_memory_repository.py
            guidance: |
              Context: REST API provides session management operations: create session, query status,
              delete session. Used by desktop CLI to initiate relay sessions.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/ structure
              2. Implement FastAPI app in api.py:
                 - POST /api/sessions
                   * Request body: {desktop_public_key: str (base64)}
                   * Decode base64 to bytes
                   * Call workflow.create_session(desktop_public_key)
                   * Response: {session_id: str, pairing_code: str}
                 - GET /api/sessions/{session_id}
                   * Retrieve session from repository
                   * Response: {session_id, state, desktop_connected, client_connected, expires_at}
                 - DELETE /api/sessions/{session_id}
                   * Call workflow.close_session(session_id, reason="user_request")
                   * Response: 204 No Content
              3. Add dependency injection for workflow:
                 - get_workflow() -> RelayWorkflow (creates InMemoryRepository, RelayWorkflow)
                 - Use FastAPI Depends() for injection
              4. Add error handlers for domain exceptions:
                 - SessionExpiredException -> 410 Gone
                 - InvalidPairingCodeException -> 404 Not Found
                 - SessionAlreadyPairedException -> 409 Conflict
                 - SessionNotFoundException -> 404 Not Found
              5. Enable CORS for Flutter web client access

              Why this matters: REST API provides control plane for session management.
              Dependency injection enables testing with mock workflows.
            success_criteria:
              - POST /api/sessions creates session and returns pairing code
              - GET /api/sessions returns accurate session state
              - DELETE /api/sessions closes session cleanly
              - Domain exceptions map to appropriate HTTP status codes
              - CORS enabled for web client access

          # WebSocket endpoints
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/websocket_manager.py
            guidance: |
              Context: WebSocket endpoints handle real-time message routing between desktop and client.
              Two endpoints: /ws/desktop/{session_id} for desktop CLI, /ws/client/{pairing_code} for web client.

              Instructions:
              1. Implement WebSocket endpoints in websockets.py:
                 - GET /ws/desktop/{session_id}
                   * Accept WebSocket connection via websocket_manager.accept()
                   * Call workflow.handle_desktop_connect(session_id, websocket)
                   * Enter message loop:
                     - Receive EncryptedBlob messages from desktop
                     - Call workflow.route_message(session_id, sender="desktop", message)
                   * On disconnect: Call workflow.close_session(session_id, "desktop_disconnect")
                 - GET /ws/client/{pairing_code}
                   * Accept WebSocket connection via websocket_manager.accept()
                   * Call workflow.handle_client_pair(pairing_code, client_public_key, websocket)
                   * Receive session_id from pairing result
                   * Enter message loop:
                     - Receive EncryptedBlob messages from client
                     - Call workflow.route_message(session_id, sender="client", message)
                   * On disconnect: Call workflow.close_session(session_id, "client_disconnect")
              2. Handle WebSocketDisconnect exceptions
              3. Send Error messages for validation failures via websocket_manager.close()
              4. Inject workflow and websocket_manager via FastAPI dependency

              Why this matters: WebSocket endpoints are the data plane for encrypted message relay.
              Message loop must handle disconnects gracefully to cleanup sessions.
            success_criteria:
              - Desktop connects via /ws/desktop/{session_id}
              - Client connects via /ws/client/{pairing_code}
              - Messages route bidirectionally between peers
              - Disconnects trigger session cleanup
              - Invalid session/pairing codes return errors before accepting WebSocket

  # ========================================
  # BUILD PHASE - Background Workers
  # ========================================
  - name: Build Phase - Background Workers
    execution_groups:
      - execution: sequential
        agents:
          # Session cleanup worker
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workers/__init__.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workers/cleanup_worker.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/repository.py
            guidance: |
              Context: Cleanup worker runs periodically to close expired sessions. Sessions expire
              5 minutes after creation if client hasn't paired. Also closes sessions with dead WebSockets.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workers/ structure
              2. Implement cleanup worker in cleanup_worker.py:
                 - run_cleanup_loop(workflow: RelayWorkflow, interval: int = 60) -> None
                   * Infinite loop with interval seconds sleep
                   * Get all active sessions via repository.get_all_active()
                   * For each session:
                     - If session.is_expired(): workflow.close_session(session_id, "expired")
                     - If WebSocket disconnected: workflow.close_session(session_id, "connection_dead")
              3. Start cleanup worker as FastAPI background task on startup:
                 - Add @app.on_event("startup") handler in api.py
                 - Create asyncio.Task running cleanup loop
              4. Add logging for cleanup events (expired sessions, closed connections)

              Why this matters: Cleanup worker prevents resource leaks from abandoned sessions.
              Pairing codes must expire to prevent replay attacks.
            success_criteria:
              - Expired sessions close automatically after 5 minutes
              - Dead WebSocket connections cleanup within 60 seconds
              - Cleanup runs without blocking WebSocket message routing
              - Cleanup logs provide visibility into session lifecycle

          # Server entrypoint
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/server.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/api.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workers/cleanup_worker.py
            guidance: |
              Context: Server entrypoint combines REST API, WebSocket endpoints, and background workers
              into single FastAPI application. This is the main entry point for running the relay service.

              Instructions:
              1. Create server.py in entrypoints directory
              2. Combine components:
                 - Import FastAPI app from api.py
                 - Include WebSocket routes from websockets.py
                 - Add startup event handler to start cleanup_worker
              3. Add uvicorn configuration:
                 - Host: 0.0.0.0 (listen on all interfaces)
                 - Port: 8080 (default relay port)
                 - Workers: 1 (in-memory repository requires single worker)
              4. Add CLI entrypoint for starting server:
                 - if __name__ == "__main__": uvicorn.run()
              5. Add logging configuration (INFO level by default)

              Why this matters: Single entrypoint simplifies deployment and testing.
              Configuration ensures relay server works in Docker and local environments.
            success_criteria:
              - Server starts successfully on port 8080
              - All endpoints registered (REST + WebSocket)
              - Cleanup worker starts automatically
              - Logs show startup events clearly

  # ========================================
  # TEST PHASE - Integration Testing
  # ========================================
  - name: Test Phase - Integration Testing
    execution_groups:
      - execution: test-fix-loop
        agents:
          # Parallel test agents
          - type: test
            count: 5
            inputs:
              - /home/code/myagents/MyAgents/src/myagents/frontend/agents/test/processes/test_runner.yml
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/api.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py
            guidance: |
              Test Strategy: technical-spike (integration testing with FastAPI TestClient)
              Test Process: Execute test_runner.yml from src/myagents/frontend/agents/test/processes/
              Reporting: Update live plan at /home/code/myagents/docs/plans/live/251203_remoteagents_relay-service.yml with structured failures

              Test Distribution (5 agents):

              Agent 1 - Session creation and pairing flow:
              - POST /api/sessions with desktop_public_key
              - Verify response contains session_id and pairing_code (6 chars, uppercase)
              - Connect desktop WebSocket to /ws/desktop/{session_id}
              - Connect client WebSocket to /ws/client/{pairing_code}
              - Verify both connections succeed (receive connection confirmation)
              - Verify session state transitions: created -> desktop_connected -> paired

              Agent 2 - Message routing desktop -> client:
              - Create session and pair both peers (using flow from Agent 1)
              - Desktop sends EncryptedBlob message via WebSocket
              - Verify client receives identical message (same payload, nonce, sender)
              - Test multiple messages in sequence (10+ messages)
              - Verify message order preserved (no reordering)
              - Test concurrent messages (send before previous received)

              Agent 3 - Message routing client -> desktop:
              - Create session and pair both peers
              - Client sends EncryptedBlob message via WebSocket
              - Verify desktop receives identical message
              - Test bidirectional communication (both peers send/receive simultaneously)
              - Verify no message loss or duplication
              - Test large messages (payload > 1MB)

              Agent 4 - Session expiry and cleanup:
              - Create session, don't pair client
              - Mock time.time() to advance 5+ minutes
              - Verify pairing attempt fails with 410 Gone (SessionExpired)
              - Verify cleanup worker removes expired session
              - Test multiple concurrent sessions (create 10+, verify all expire)
              - Verify expired sessions don't leak memory

              Agent 5 - Error handling and edge cases:
              - Invalid session_id in GET /api/sessions returns 404
              - Invalid session_id in /ws/desktop returns error before accepting WebSocket
              - Invalid pairing_code in /ws/client returns 404
              - Pairing twice with same code returns 409 Conflict
              - Desktop disconnect closes session (verify via GET /api/sessions)
              - Client disconnect closes session
              - Malformed messages return Error response (don't crash server)
              - WebSocket keepalive works (Ping/Pong exchange)

              Failure Reporting Format:
              Add to liveplan under test_failures with structure:
              - test_name: Name of failed test
              - agent_id: Which agent found the failure (1-5)
              - failure_description: What went wrong
              - expected_behavior: What should have happened
              - actual_behavior: What actually happened
              - files_involved: List of files related to failure
            success_criteria:
              - Zero test failures reported in live plan
              - Session pairing flow completes successfully
              - Messages route bidirectionally without loss or reordering
              - Expired sessions reject pairing attempts
              - Disconnects cleanup resources immediately
              - Error cases handled gracefully (no server crashes)

          # Dynamic build agents
          - type: build
            count: "n = total failures"
            inputs:
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/domains/session_manager/entities.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/api.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/in_memory_repository.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/infrastructure/websocket_manager.py
            guidance: |
              Context: Integration tests identified failures. Fix assigned failure.

              Instructions:
              1. Read live plan at /home/code/myagents/docs/plans/live/251203_remoteagents_relay-service.yml
              2. Find your assigned failure (orchestration agent will specify which one)
              3. Determine layer and root cause:
                 - Domain: Entity state transitions, validation logic in entities.py
                 - Workflow: Orchestration logic, error handling in relay_workflow.py
                 - Infrastructure: Repository thread safety, WebSocket handling
                 - Entrypoint: HTTP status codes, request/response serialization
              4. Fix root cause (not symptoms):
                 - If state transition invalid, fix entity state machine
                 - If race condition, add proper locking
                 - If validation missing, add domain validation
                 - If error handling missing, add exception handling
              5. Mark failure resolved in live plan after fixing

              Why this matters: Relay service must handle concurrent connections reliably.
              Race conditions or validation bugs break message routing and leak resources.
            success_criteria:
              - Fixed test passes consistently (run 10+ times)
              - No regression in related tests
              - Concurrent access remains thread-safe
              - Fix addresses root cause (not symptom)

  # ========================================
  # DOCUMENTATION PHASE
  # ========================================
  - name: Documentation Phase
    execution_groups:
      - execution: sequential
        agents:
          # API documentation
          - type: documentation
            inputs:
              - /home/code/myagents/RemoteAgents/docs/api.md
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/api.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/websockets.py
              - /home/code/myagents/RemoteAgents/src/agent_remote/shared/protocol/messages.py
            guidance: |
              Context: API documentation enables CLI and Flutter client integration. Must document
              REST endpoints, WebSocket endpoints, and expected message flows. Documentation must
              be complete enough for external teams (CLI and Flutter) to integrate without reading code.

              Instructions:
              1. Create /home/code/myagents/RemoteAgents/docs/api.md
              2. Document REST API:
                 - POST /api/sessions:
                   * Request schema: {desktop_public_key: str (base64)}
                   * Response schema: {session_id: str, pairing_code: str}
                   * Example curl command
                   * Error responses: 400 (invalid key), 500 (server error)
                 - GET /api/sessions/{session_id}:
                   * Response schema: {session_id, state, desktop_connected, client_connected, expires_at}
                   * Session states: "created", "desktop_connected", "paired", "closed"
                   * Error responses: 404 (not found)
                 - DELETE /api/sessions/{session_id}:
                   * When to use: Manual session cleanup, testing
                   * Response: 204 No Content
                   * Cleanup behavior: Closes WebSockets, removes from repository
              3. Document WebSocket endpoints:
                 - /ws/desktop/{session_id}:
                   * Connection sequence: POST /api/sessions -> connect to /ws/desktop
                   * Message format: EncryptedBlob JSON (see protocol/messages.py)
                   * Keepalive: Ping/Pong every 30 seconds
                   * Error handling: Receive Error message before disconnect
                 - /ws/client/{pairing_code}:
