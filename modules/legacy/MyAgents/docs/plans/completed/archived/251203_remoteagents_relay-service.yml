  - name: Migrate from deprecated on_event to lifespan handlers
    status: completed
    priority: high
    description: |
      FastAPI deprecation warnings indicate @app.on_event("startup") and
      @app.on_event("shutdown") are deprecated and will be removed in v3.
      Migrate to lifespan context manager pattern before this breaks.
    files:
      - /home/code/myagents/RemoteAgents/src/agent_remote/services/relay/api/server.py
    guidance: |
      1. Replace @app.on_event decorators with lifespan context manager:
         ```python
         from contextlib import asynccontextmanager

         @asynccontextmanager
         async def lifespan(app: FastAPI):
             # Startup code here
             cleanup_task = asyncio.create_task(run_cleanup_loop(...))
             yield
             # Shutdown code here
             cleanup_task.cancel()

         app = FastAPI(lifespan=lifespan)
         ```
      2. Move startup logic (cleanup worker, logging) into lifespan
      3. Move shutdown logic into lifespan's finally/cleanup section
      4. Update tests if they depend on startup/shutdown events
    success_criteria:
