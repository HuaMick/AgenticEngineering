              Instructions:
              1. Add abstract methods to SessionRepository interface:
                 - get_sessions_by_recovery_state(state: RecoveryState) -> list[Session]
                   - Return all sessions in given recovery state
                   - Used for recovery timeout cleanup
                 - get_disconnected_sessions_older_than(timestamp: float) -> list[Session]
                   - Return sessions disconnected before given timestamp
                   - Used for recovery timeout enforcement (5 minute window)
                 - update_session_recovery(session: Session) -> None
                   - Update only recovery-related fields (optimization)
                   - Alternative to full update() for recovery state changes
              2. No implementation changes needed (interface only)
              3. Add docstrings explaining use cases for each method

              Files to modify:
              - repository.py: Add abstract methods to SessionRepository interface

              Why this matters: Repository interface defines contract for persistence
              layer without coupling to implementation details.

            success_criteria:
              - New abstract methods added to repository interface
              - Docstrings explain recovery use cases
              - No implementation code (interface only)

          # Implement recovery methods in InMemoryRepository
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/infrastructure/in_memory_repository.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/repository.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/entities.py
            guidance: |
              Context: InMemoryRepository stores sessions in dict. We need to implement
              recovery query methods efficiently without degrading existing performance.

              Instructions:
              1. Implement get_sessions_by_recovery_state():
                 - Iterate _sessions dict
                 - Filter by desktop_recovery.recovery_state or client_recovery.recovery_state
                 - Return matching sessions
              2. Implement get_disconnected_sessions_older_than():
                 - Iterate _sessions dict
                 - Check desktop_recovery.disconnected_at and client_recovery.disconnected_at
                 - Return sessions where either peer disconnected before timestamp
              3. Implement update_session_recovery():
                 - Validate session exists in _sessions
                 - Update recovery-related fields only
                 - Preserve existing session data
              4. Maintain thread safety:
                 - Use existing lock pattern if present
                 - Ensure consistent reads/writes
              5. Performance considerations:
                 - O(n) iteration acceptable for in-memory implementation
                 - Note: Redis implementation (B2) would use indexed queries

              Files to modify:
              - in_memory_repository.py: Implement recovery query methods

              Why this matters: Implements recovery queries for cleanup and monitoring
              without external dependencies.

            success_criteria:
              - Recovery query methods return correct results
              - Thread-safe implementation (if repository uses locking)
              - No performance regression for existing operations
              - Efficient filtering logic

  # ========================================
  # PHASE 4: WORKFLOW LAYER - Recovery Orchestration
  # ========================================
  - name: Workflow Layer - Recovery Orchestration
    description: |
      Implement recovery orchestration in RelayWorkflow and TerminalWorkflow.
      This phase coordinates reconnection handshake, history replay, and timeout cleanup.
    execution_groups:
      - execution: sequential
        name: Relay recovery workflow
        agents:
          # Add reconnection methods to RelayWorkflow
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/workflows/relay_workflow.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/entities.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/shared/protocol/session_messages.py
            guidance: |
              Context: RelayWorkflow orchestrates session lifecycle. We need to add
              reconnection handling that validates peer identity, checks recovery window,
              and coordinates history replay.

              Instructions:
              1. Add handle_reconnect() method:
                 - Parameters: session_id, peer_role, last_sequence, public_key, ws_connection
                 - Retrieve session from repository
                 - Validate public key matches (desktop_public_key or client_public_key)
                 - Call session.can_recover(peer_role)
                 - If recoverable:
                   - Call session.start_recovery(peer_role, ws_connection)
                   - Calculate missed_messages_count
                   - Return SessionReconnected(success=True, recovery_state=RECOVERING)
                 - If not recoverable:
                   - Return SessionReconnected(success=False, error_message=reason)
                 - Wrap domain exceptions with workflow context
              2. Add replay_terminal_history() method:
                 - Parameters: session_id, peer_role, last_sequence
                 - Retrieve session from repository
                 - Get terminal history from session.get_terminal_history()
                 - Filter messages after last_sequence
                 - Yield SessionHistoryReplay messages for each message
                 - Call session.complete_recovery(peer_role) after replay
                 - Clear history buffer after successful replay
              3. Add cleanup_expired_recovery_sessions() method:
                 - Get sessions disconnected > 5 minutes ago via repository
                 - For each session:
                   - Call session.fail_recovery(reason="Recovery timeout")
                   - Close session with close_session()
                 - Schedule periodic cleanup (every 60 seconds)
              4. Update handle_desktop_connect() and handle_client_pair():
                 - Initialize recovery metadata to CONNECTED state
              5. Update close_session():
                 - Call mark_desktop_disconnected() or mark_client_disconnected()
                 - Store DisconnectionReason based on close reason
                 - Don't immediately delete session (allow recovery window)
                 - Defer deletion to cleanup_expired_recovery_sessions()
              6. Add workflow exceptions:
                 - RecoveryNotAllowedException(session_id, reason)
                 - InvalidRecoveryCredentialsException(session_id, peer_role)

              Files to modify:
              - relay_workflow.py: Add reconnection and recovery methods

              Why this matters: RelayWorkflow enforces recovery rules and coordinates
              multi-step recovery process.

            success_criteria:
              - handle_reconnect() validates peer identity with public key
              - replay_terminal_history() delivers messages in correct sequence
              - cleanup_expired_recovery_sessions() enforces 5-minute timeout
              - close_session() preserves session for recovery window
              - Recovery state transitions follow domain rules

          # Add recovery support to TerminalWorkflow
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/terminal/workflows/terminal_workflow.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/terminal/domains/pty_manager/entities.py
            guidance: |
              Context: TerminalWorkflow manages PTY sessions. We need to integrate
              history recording and replay without impacting normal operation.

              Instructions:
              1. Update start_session() method:
                 - Add optional recoverable: bool parameter (default False)
                 - Pass recoverable to PTYSession.create()
                 - Document that recoverable sessions buffer terminal output
              2. Update _read_output() internal method:
                 - After reading PTY output, call session.record_output(data)
                 - Store returned sequence number with output
                 - Pass sequence to output_callback: output_callback(session_id, data, sequence)
              3. Add get_history_since() method:
                 - Parameters: session_id, last_sequence
                 - Retrieve session from repository
                 - Call session.get_history_since(last_sequence)
                 - Return list of (sequence, data) tuples
                 - Raise SessionNotFoundError if session doesn't exist
                 - Raise error if session not recoverable
              4. Update output_callback signature:
                 - Change from (session_id, data) to (session_id, data, sequence)
                 - Update type alias: OutputCallback = Callable[[str, bytes, Optional[int]], None]
                 - Document that sequence is None for non-recoverable sessions
              5. No changes to stop_session() or resize()

              Files to modify:
              - terminal_workflow.py: Add history recording and replay

              Why this matters: TerminalWorkflow records history transparently during
              normal operation, enabling recovery without client awareness.

            success_criteria:
              - Terminal output buffered automatically when recoverable=True
              - get_history_since() returns correct messages after given sequence
              - output_callback receives sequence numbers
              - No performance impact for non-recoverable sessions

