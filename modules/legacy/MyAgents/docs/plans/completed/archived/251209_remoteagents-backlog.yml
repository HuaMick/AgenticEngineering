phases:
  # ========================================
  # PHASE 1: DOMAIN LAYER - Session Recovery Entities
  # ========================================
  - name: Domain Layer - Session Recovery Entities
    description: |
      Create domain entities and value objects for session recovery state.
      This phase establishes the core domain model for tracking reconnection
      state, terminal history, and encryption context.
    execution_groups:
      - execution: parallel
        name: Session recovery domain entities
        agents:
          # Create RecoveryState value object and enums
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/value_objects.py
            guidance: |
              Context: Session recovery requires tracking reconnection state, message sequence,
              and disconnection timestamps. We need value objects to model this recovery state
              within the existing SessionManager domain.

              Instructions:
              1. Add RecoveryState enum with values:
                 - CONNECTED: Normal operation, no recovery needed
                 - DISCONNECTED: Peer disconnected, recovery possible
                 - RECOVERING: Reconnection in progress, replaying messages
                 - RECOVERY_FAILED: Recovery timeout or unrecoverable error
              2. Add DisconnectionReason enum with values:
                 - NETWORK_ERROR: Network interruption (recoverable)
                 - CLIENT_CLOSED: Clean client disconnect (recoverable)
                 - TIMEOUT: Keepalive timeout (recoverable)
                 - PROTOCOL_ERROR: Protocol violation (not recoverable)
                 - SESSION_EXPIRED: Pairing code expired (not recoverable)
              3. Create RecoveryMetadata value object with fields:
                 - last_message_sequence: int (last message sent/received)
                 - disconnected_at: Optional[float] (Unix timestamp)
                 - recovery_state: RecoveryState
                 - disconnection_reason: Optional[DisconnectionReason]
                 - reconnection_attempts: int (counter for retry logic)
              4. Add validation:
                 - disconnected_at must be positive timestamp
                 - reconnection_attempts must be non-negative
                 - recovery_state transitions follow state machine rules
              5. Follow existing patterns in value_objects.py (PairingCode, SessionId, etc.)

              Files to modify:
              - value_objects.py: Add RecoveryState, DisconnectionReason, RecoveryMetadata

              Why this matters: Value objects provide type-safe, validated domain concepts
              that can be reused across entities, workflows, and protocol messages.

            success_criteria:
              - RecoveryState enum defined with all required states
              - DisconnectionReason enum defined with all required reasons
              - RecoveryMetadata value object validates fields correctly
              - Value objects follow existing patterns in the file

          # Extend Session entity with recovery capabilities
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/entities.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/value_objects.py
            guidance: |
              Context: The Session entity currently tracks pairing state but not recovery state.
              We need to extend it to support disconnection tracking, recovery state management,
              and reconnection logic while preserving existing functionality.

              Instructions:
              1. Add recovery-related fields to Session.__init__():
                 - desktop_recovery: RecoveryMetadata (desktop connection recovery state)
                 - client_recovery: RecoveryMetadata (client connection recovery state)
                 - terminal_history: list[bytes] (buffered terminal output for replay)
                 - max_history_bytes: int (default 1MB, limit history buffer size)
              2. Add domain methods:
                 - mark_desktop_disconnected(reason: DisconnectionReason) -> None
                   - Store disconnection timestamp and reason
                   - Transition desktop_recovery to DISCONNECTED state
                   - Clear desktop_ws but preserve encryption keys
                 - mark_client_disconnected(reason: DisconnectionReason) -> None
                   - Same as desktop, but for client
                 - can_recover(peer_role: PeerRole) -> bool
                   - Check if recovery is possible (within timeout, recoverable reason)
                   - Recovery timeout: 5 minutes from disconnected_at
                 - start_recovery(peer_role: PeerRole, ws_connection: Any) -> None
                   - Transition to RECOVERING state
                   - Store new WebSocket connection
                   - Increment reconnection_attempts
                 - complete_recovery(peer_role: PeerRole) -> None
                   - Transition to CONNECTED state
                   - Reset reconnection_attempts
                 - fail_recovery(peer_role: PeerRole, reason: str) -> None
                   - Transition to RECOVERY_FAILED state
                   - Store failure reason
              3. Add history management methods:
                 - buffer_terminal_output(data: bytes) -> None
                   - Append to terminal_history
                   - Enforce max_history_bytes limit (drop oldest messages)
                 - get_terminal_history() -> list[bytes]
                   - Return buffered history for replay
                 - clear_terminal_history() -> None
                   - Clear history buffer (called after successful replay)
              4. Update existing methods:
                 - close(): Clear terminal_history buffer
                 - connect_desktop(), pair_client(): Initialize recovery metadata to CONNECTED
              5. Add domain exceptions:
                 - RecoveryNotPossibleException(session_id, peer_role, reason)
                 - RecoveryTimeoutException(session_id, peer_role, disconnected_at)

              Files to modify:
              - entities.py: Extend Session entity with recovery methods

              Why this matters: Session entity encapsulates all recovery business logic,
              ensuring state transitions are validated and recovery rules are enforced.

            success_criteria:
              - Session entity tracks recovery state for both peers independently
              - Disconnection methods preserve encryption keys for reconnection
              - can_recover() validates timeout and reason correctly
              - Terminal history buffer respects max_history_bytes limit
              - Domain exceptions provide clear error context

      # Sequential group: Terminal history domain model
      - execution: sequential
        name: Terminal history domain entities
        agents:
          # Create TerminalHistoryBuffer value object
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/terminal/domains/pty_manager/value_objects.py
            guidance: |
              Context: PTY sessions need to buffer terminal output for replay during recovery.
              This buffer must handle size limits, message ordering, and efficient replay.

              Instructions:
              1. Create TerminalHistoryBuffer value object with:
                 - messages: list[tuple[int, bytes]] (sequence number, data pairs)
                 - max_bytes: int (maximum buffer size in bytes)
                 - current_bytes: int (current buffer size)
                 - next_sequence: int (next sequence number to assign)
              2. Add methods:
                 - append(data: bytes) -> int
                   - Add message with sequence number
                   - Return assigned sequence number
                   - Enforce max_bytes limit by dropping oldest messages
                   - Update current_bytes
                 - get_messages_since(sequence: int) -> list[tuple[int, bytes]]
                   - Return all messages after given sequence number
                   - Used for partial replay during recovery
                 - get_all_messages() -> list[tuple[int, bytes]]
                   - Return complete history
                 - clear() -> None
                   - Reset buffer
                 - get_oldest_sequence() -> Optional[int]
                   - Return sequence number of oldest buffered message
                   - None if buffer empty
              3. Add validation:
                 - max_bytes must be positive (minimum 64KB, maximum 10MB)
                 - Enforce FIFO ordering when dropping old messages

              Files to modify:
              - value_objects.py: Add TerminalHistoryBuffer value object

              Why this matters: Encapsulates history buffering logic with proper validation
              and size management, preventing memory issues.

            success_criteria:
              - TerminalHistoryBuffer enforces size limits correctly
              - get_messages_since() returns only messages after given sequence
              - Oldest messages dropped when buffer exceeds max_bytes
              - Sequence numbers assigned monotonically

          # Extend PTYSession entity with recovery support
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/terminal/domains/pty_manager/entities.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/terminal/domains/pty_manager/value_objects.py
            guidance: |
              Context: PTYSession needs to track terminal output history for recovery.
              Must integrate with TerminalHistoryBuffer while preserving existing functionality.

              Instructions:
              1. Add history_buffer field to PTYSession:
                 - history_buffer: Optional[TerminalHistoryBuffer]
                 - Only initialized if session is recoverable
              2. Update PTYSession.create() factory method:
                 - Add optional recoverable: bool parameter (default False)
                 - Initialize history_buffer if recoverable=True
                 - Use default max_bytes=1MB for buffer
              3. Add domain methods:
                 - record_output(data: bytes) -> Optional[int]
                   - Call history_buffer.append() if buffer exists
                   - Return sequence number or None
                 - get_history_since(sequence: int) -> list[tuple[int, bytes]]
                   - Delegate to history_buffer.get_messages_since()
                   - Raise exception if history_buffer is None
                 - is_recoverable() -> bool
                   - Return whether session supports recovery (has history_buffer)
              4. No changes to existing state machine (STARTING -> RUNNING -> TERMINATED)

              Files to modify:
              - entities.py: Extend PTYSession with history buffer

              Why this matters: PTYSession controls whether history is recorded,
              enabling recovery to be opt-in per session.

            success_criteria:
              - PTYSession only records history when recoverable=True
              - record_output() returns sequence numbers correctly
              - get_history_since() throws clear error if session not recoverable
              - Existing PTY lifecycle unchanged

  # ========================================
  # PHASE 2: PROTOCOL LAYER - Recovery Messages
  # ========================================
  - name: Protocol Layer - Recovery Messages
    description: |
      Define protocol messages for reconnection handshake and history replay.
      These messages enable clients to signal reconnection intent and receive
      missed terminal output.
    execution_groups:
      - execution: parallel
        name: Recovery protocol messages
        agents:
          # Add session recovery messages
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/shared/protocol/session_messages.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/shared/protocol/base.py
            guidance: |
              Context: Clients need protocol messages to reconnect to existing sessions
              and request missed terminal output. These messages extend the session lifecycle.

              Instructions:
              1. Add SessionReconnect message (SessionMessage base):
                 - type: "session.reconnect"
                 - session_id: str (UUID, inherited from SessionMessage)
                 - peer_role: Literal["desktop", "client"] (who is reconnecting)
                 - last_sequence_received: int (last message sequence peer received)
                 - public_key: bytes (X25519 key to verify identity, 32 bytes)
                 - Validates: peer_role is valid, public_key is 32 bytes, sequence >= 0
              2. Add SessionReconnected message (SessionMessage base):
                 - type: "session.reconnected"
                 - session_id: str (UUID, inherited)
                 - success: bool (whether reconnection succeeded)
                 - recovery_state: str (RECOVERING, CONNECTED, RECOVERY_FAILED)
                 - missed_messages_count: int (number of messages to replay)
                 - error_message: Optional[str] (if success=False, why recovery failed)
              3. Add SessionHistoryReplay message (SessionMessage base):
                 - type: "session.history_replay"
                 - session_id: str (UUID, inherited)
                 - sequence: int (message sequence number)
                 - total_messages: int (total messages in replay)
                 - current_index: int (0-based index in replay sequence)
                 - data: bytes (base64-encoded terminal output)
                 - Validates: sequence >= 0, current_index < total_messages
              4. Follow existing patterns:
                 - Use Pydantic validators for all fields
                 - Use field_validator for custom validation
                 - Use field_serializer for bytes -> base64
                 - Register in MESSAGE_TYPES dict
                 - Add docstrings with examples

              Files to modify:
              - session_messages.py: Add SessionReconnect, SessionReconnected, SessionHistoryReplay

              Why this matters: Protocol messages define the contract between client and server
              for recovery handshake and history replay.

            success_criteria:
              - SessionReconnect validates peer identity with public key
              - SessionReconnected indicates success/failure and recovery state
              - SessionHistoryReplay properly sequences replay messages
              - All messages registered in MESSAGE_TYPES

          # Add terminal recovery messages
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/shared/protocol/terminal_messages.py
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/shared/protocol/base.py
            guidance: |
              Context: Terminal messages need sequence numbers for tracking delivery
              and detecting message loss during reconnection.

              Instructions:
              1. Extend TerminalOutput message:
                 - Add sequence: Optional[int] field (None for non-recoverable sessions)
                 - Validates: sequence >= 0 if present
                 - Backward compatible: existing messages without sequence still work
              2. Extend TerminalInput message:
                 - Add sequence: Optional[int] field (None for non-recoverable sessions)
                 - Validates: sequence >= 0 if present
              3. Add TerminalHistoryRequest message (SessionMessage base):
                 - type: "terminal.history_request"
                 - session_id: str (UUID, inherited)
                 - last_sequence_received: int (client's last received sequence)
                 - Validates: sequence >= 0
              4. Maintain backward compatibility:
                 - Existing TerminalOutput/Input without sequence field still parse
                 - Use Optional[int] to make sequence field optional
                 - Add docstring notes about recovery vs non-recovery modes

              Files to modify:
              - terminal_messages.py: Extend TerminalOutput, TerminalInput, add TerminalHistoryRequest

              Why this matters: Message sequencing enables detection of lost messages
              and replay of correct history during recovery.

            success_criteria:
              - TerminalOutput and TerminalInput have optional sequence field
              - Backward compatible with existing messages without sequence
              - TerminalHistoryRequest enables client-driven history requests
              - All validators enforce non-negative sequence numbers

  # ========================================
  # PHASE 3: INFRASTRUCTURE LAYER - State Persistence
  # ========================================
  - name: Infrastructure Layer - State Persistence
    description: |
      Implement in-memory persistence for recovery state. This phase adds
      recovery state tracking to existing repositories without external dependencies.
    execution_groups:
      - execution: sequential
        name: Repository recovery support
        agents:
          # Extend SessionRepository with recovery queries
          - type: builder
            inputs:
              - /home/code/myagents/RemoteAgents-backlog/src/agent_remote/services/relay/domains/session_manager/repository.py
            guidance: |
              Context: SessionRepository needs to support recovery-specific queries
