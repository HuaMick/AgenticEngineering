                - Verify relayClient.disconnect() called
                - Verify navigation back to previous screen
              - Test auto-focus:
                - Verify terminal gets focus when state becomes connected
                - Type characters, verify focus maintained (no focus loss on rebuild)

              Failure Reporting Format:
              Add failures to live plan under terminal_test_failures with structure:
              - test_name: Name of failed test
              - component: Component being tested (TerminalState, TerminalController, TerminalScreen)
              - failure_description: What went wrong
              - expected_behavior: What should have happened
              - actual_behavior: What actually happened
              - files_involved: List of files related to failure
            success_criteria:
              - TerminalState properly manages state and notifies listeners
              - Terminal output renders correctly (plain text, ANSI colors, multi-line)
              - User input sends to relay encrypted with correct message format
              - Resize events update dimensions and notify relay
              - UI states display correctly (loading, connected, error, disconnected)
              - Auto-focus works smoothly
              - Zero test failures

          - type: build
            count: "n = total failures"
            inputs:
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_controller.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_screen.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_state.dart
            guidance: |
              Context: Test agents have identified terminal display, input, or state management failures.
              Each build agent fixes ONE specific failure.

              Instructions:
              1. Read live plan at /home/code/myagents/docs/plans/live/251203_myagentsfrontend_terminal-display.yml
              2. Find your assigned failure (orchestration agent will specify which one)
              3. Determine root cause and fix:
                 - State management: Check ChangeNotifier implementation, notifyListeners() calls
                 - Output rendering: Check xterm buffer writes, decryption, ANSI handling
                 - Input handling: Verify terminal_input message format, encryption, key handling
                 - Resize: Check dimension detection, message sending, buffer adjustment
                 - UI state: Fix connection state handling, widget rebuilds, focus management
              4. Verify fix doesn't introduce regressions:
                 - Run related tests to ensure no new failures
                 - Check that fix aligns with Flutter best practices
              5. Mark failure as resolved in live plan after fixing

              Common failure categories:
              - State not updating: Missing notifyListeners() call
              - Output not rendering: Decryption failure or buffer write issue
              - Input not sending: Encryption failure or message format error
              - Resize not working: Event subscription or dimension calculation issue
              - UI flickering: Unnecessary rebuilds or state management issue
              - Focus lost: FocusNode not properly managed

              Why this matters: Terminal is the primary interface for remote control.
              Must feel responsive, render correctly, and handle all user input reliably.
            success_criteria:
              - Previously failing test now passes
              - No regression in other terminal tests
              - Fix aligns with Flutter and xterm best practices
              - Terminal feels responsive and correct

