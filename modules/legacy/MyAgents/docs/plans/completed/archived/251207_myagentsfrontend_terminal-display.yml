  # ========================================
  # BUILD PHASE
  # ========================================
  - name: Build Phase
    execution_groups:
      # Parallel execution group: State and controller can be built independently
      - execution: parallel
        name: Terminal infrastructure
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_state.dart
            guidance: |
              Context: TerminalState manages the state of the terminal including connection status,
              terminal dimensions, and current buffer state. This follows Flutter state management
              best practices using Provider pattern.

              Instructions:
              1. Create lib/features/remote_terminal/terminal_state.dart
              2. Define TerminalState class extending ChangeNotifier:
                 - connectionStatus: enum (disconnected, connecting, connected, error)
                 - terminalSize: struct (rows: int, cols: int)
                 - errorMessage: String? (for connection errors)
              3. Add state mutation methods:
                 - setConnectionStatus(ConnectionStatus status)
                 - setTerminalSize(int rows, int cols)
                 - setError(String message)
                 - clearError()
              4. Call notifyListeners() after each state change
              5. Add getters for computed state:
                 - isConnected: bool
                 - isConnecting: bool
                 - hasError: bool

              Dependencies:
              - flutter/foundation.dart (for ChangeNotifier)
              - provider package (already in pubspec.yaml from flutter-setup)

              Why this matters: Centralized state management makes terminal connection state
              observable by UI components and testable without UI dependencies.

              Files to create:
              - lib/features/remote_terminal/terminal_state.dart

              Reference patterns:
              - Provider state management pattern from flutter-setup phase
            success_criteria:
              - TerminalState class properly extends ChangeNotifier
              - All state mutations trigger notifyListeners()
              - Getters provide convenient state checks
              - No UI dependencies (pure Dart state class)

          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_controller.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/core/networking/relay_client.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/core/crypto/encryption_service.dart
            guidance: |
              Context: TerminalController manages terminal lifecycle and bridges xterm widget
              with RelayClient networking layer. It handles message routing, encryption/decryption,
              and terminal event propagation.

              Instructions:
              1. Create lib/features/remote_terminal/terminal_controller.dart
              2. Import dependencies:
                 - package:xterm/xterm.dart (Terminal class from xterm package)
                 - RelayClient from core/networking/relay_client.dart
                 - EncryptionService from core/crypto/encryption_service.dart
              3. Create TerminalController class:
                 - final Terminal terminal (from xterm package)
                 - final RelayClient relayClient
                 - final EncryptionService encryptionService
                 - StreamSubscription for relay messages
              4. Implement initialization:
                 - Create Terminal instance with default size (80x24)
                 - Subscribe to RelayClient message stream
                 - Subscribe to Terminal.onOutput stream (for user input)
                 - Subscribe to Terminal.onResize stream
              5. Implement message handlers:
                 - onRelayMessage(message):
                   - Filter for message_type: "terminal_output"
                   - Decrypt message.payload using encryptionService
                   - Write decrypted text to terminal.write()
                 - onTerminalInput(input):
                   - Encrypt input using encryptionService
                   - Send as terminal_input message via relayClient.send()
                 - onTerminalResize(rows, cols):
                   - Send resize message to relay with new dimensions
              6. Implement dispose():
                 - Cancel all stream subscriptions
                 - Dispose terminal instance
              7. Handle errors:
                 - Catch decryption failures (log and display error in terminal)
                 - Catch network failures (notify user via error message)

              Message format reference:
              - terminal_output: {message_type: "terminal_output", payload: <encrypted_base64>}
              - terminal_input: {message_type: "terminal_input", payload: <encrypted_base64>}
              - resize: {message_type: "resize", rows: int, cols: int}

              Why this matters: Controller decouples terminal UI from networking and crypto,
              making each component testable independently. Pure business logic without UI.

              Files to create:
              - lib/features/remote_terminal/terminal_controller.dart

              Files to reference:
              - lib/core/networking/relay_client.dart (for message sending/receiving)
              - lib/core/crypto/encryption_service.dart (for encrypt/decrypt methods)
            success_criteria:
              - Terminal instance created and managed properly
              - Relay messages decrypt and display in terminal buffer
              - User input encrypts and sends to relay
              - Resize events propagate to relay with correct dimensions
              - All streams properly subscribed and disposed
              - No memory leaks (verified via dispose)

      # Sequential execution group: Screen depends on controller and state
      - execution: sequential
        name: Terminal UI
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_screen.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_controller.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/features/remote_terminal/terminal_state.dart
              - /home/code/myagents/MyAgentsFrontend-terminal/lib/core/networking/relay_client.dart
            guidance: |
              Context: TerminalScreen is the main UI for remote terminal display.
              Uses xterm.dart widget for rendering and TerminalController for logic.
              This replaces the placeholder screen created in flutter-setup phase.

              Instructions:
              1. Update lib/features/remote_terminal/terminal_screen.dart (replace placeholder)
              2. Import dependencies:
                 - package:flutter/material.dart
                 - package:provider/provider.dart
                 - package:xterm/xterm.dart (TerminalView widget)
                 - TerminalController from ./terminal_controller.dart
                 - TerminalState from ./terminal_state.dart
                 - RelayClient from core/networking/relay_client.dart
              3. Create StatefulWidget TerminalScreen:
                 - State class: _TerminalScreenState
                 - Initialize controller in initState():
                   - Get RelayClient from Provider.of<RelayClient>(context)
                   - Create TerminalController(relayClient, encryptionService)
                   - Store controller in state
                 - Dispose controller in dispose()
              4. Build method structure:
                 - Use Consumer<TerminalState> for reactive UI
                 - Scaffold with:
                   - AppBar: Title "Remote Terminal" + connection status + disconnect button
                   - Body: Conditional rendering based on connection state
              5. Implement conditional rendering:
                 - If connecting: Center with CircularProgressIndicator + "Connecting..."
                 - If error: Center with error message + retry button
                 - If connected: TerminalView(controller.terminal)
                 - If disconnected: Center with "Disconnected" + reconnect button
              6. Layout TerminalView:
                 - Expanded widget to fill available space
                 - Background color: Colors.black (terminal theme)
                 - Text style: Monospace font, green on black
              7. AppBar widgets:
                 - Connection status indicator:
                   - Green dot if connected
                   - Orange dot if connecting
                   - Red dot if error/disconnected
                 - Disconnect button:
                   - IconButton(Icons.close)
                   - Calls relayClient.disconnect()
                   - Navigate back to previous screen
              8. Auto-focus handling:
                 - When connection state changes to connected, request focus on terminal
                 - Use FocusNode to manage terminal input focus
                 - Maintain focus during typing (don't lose focus on rebuild)

              UI Layout:
              ```
              AppBar
              ├── Title: "Remote Terminal"
              ├── Status: [●] Connected
              └── Action: [X] Disconnect

              Body (if connected)
              └── TerminalView (full screen, black background)
                  └── Terminal output with ANSI colors
              ```

              Why this matters: Primary UI for remote terminal interaction.
              Must render ANSI sequences correctly, feel responsive, and provide clear
              connection state feedback to user.

              Files to replace:
              - lib/features/remote_terminal/terminal_screen.dart (existing placeholder)

              Files to reference:
              - lib/features/remote_terminal/terminal_controller.dart (for terminal logic)
              - lib/features/remote_terminal/terminal_state.dart (for connection state)
              - lib/core/networking/relay_client.dart (for disconnect method)
            success_criteria:
              - Terminal renders full-screen correctly with black background
              - ANSI color sequences display correctly (red, green, blue, etc.)
              - Input focus works smoothly (auto-focus on connect, maintain during typing)
              - Connection status indicator shows current state accurately
              - Disconnect button disconnects and navigates back
              - Loading/error states display appropriate UI
              - No UI flickering or unnecessary rebuilds

