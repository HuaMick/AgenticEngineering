# ============================================================================

live-plans:
  - id: HOME-FOLDER-CONFIGS-001
    title: Remove Local Project Overrides - Home Folder Single Source of Truth
    description: |
      Remove all local project langgraph.json discovery logic. Make ~/.config/myagents/langgraph.json
      the single source of truth. This simplifies architecture, ensures consistent behavior regardless
      of working directory, and forces UAT to test as new users would - everything must be packaged
      and installed, no reliance on local project files.

    # Cleaner Voting Results (approved targets - 3/3 unanimous):
    # 1. health_check_workflow.py - detect_project_root() method (dead_code - REMOVE)
    # 2. health_check_workflow.py - detect_langgraph_path() method (dead_code - SIMPLIFY)
    # 3. langgraph.json (project root) - obsolete_file (REMOVE)
    # 4. docs/guides/configuration.md - 3-tier discovery sections (documentation - UPDATE)
    # 5. docs/guides/configuration.md - Local Project Override section (documentation - REMOVE)
    # 6. README.md - Local Project Override section (documentation - REMOVE)
    # 7. test_health_check_workflow.py - TestDetectProjectRoot tests (test_fixture - REMOVE)
    # 8. test_langgraph_home_directory_e2e.py - TestLocalOverridePriority tests (test_fixture - REMOVE)
    # 9. conftest.py - cleanup_home_directory_test_files fixture (test_fixture - UPDATE)

    phases:
      # ========================================
      # BUILD PHASE
      # ========================================
      - name: Build Phase
        execution_groups:
          # Parallel execution group: These agents can run simultaneously
          # They work on different files with no overlap
          - execution: parallel
            agents:
              # Remove local project langgraph.json discovery from health_check_workflow.py
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/agents/workflows/health_check_workflow.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/cli/entry.py
                guidance: |
                  Context: Currently detect_project_root() searches for local project langgraph.json files
                  by walking up the directory tree, adding complexity and confusion. The new architecture
                  uses only ~/.config/myagents/langgraph.json as the single source of truth.

                  CRITICAL: Cleaner voting approved detect_project_root() as DEAD CODE for REMOVAL (not simplification).

                  Instructions:
                  1. REMOVE the detect_project_root() method entirely from health_check_workflow.py
                  2. Replace ALL calls to detect_project_root() with detect_langgraph_path() or direct home directory detection
                  3. Simplify detect_langgraph_path() to ONLY check ~/.config/myagents/langgraph.json
                  4. Remove MYAGENTS_TEST_ISOLATION environment variable handling (no longer needed)
                  5. If home directory langgraph.json doesn't exist, raise clear error directing user to run 'myagents setup'
                  6. In entry.py, remove any langgraph.json file discovery from project root detection
                  7. Update error messages to indicate home directory (~/.config/myagents/) is the only config location
                  8. Remove any fallback logic that checks local project directories for langgraph.json

                  Files to modify:
                  - health_check_workflow.py: REMOVE detect_project_root() method entirely
                  - health_check_workflow.py: Simplify detect_langgraph_path() to home directory only
                  - entry.py: Remove langgraph.json file discovery from project root detection

                  Why this matters: Eliminates multi-tier discovery complexity and ensures consistent behavior
                  regardless of working directory. Forces UAT to test as new users would.
                success_criteria:
                  - detect_project_root() method completely removed
                  - detect_langgraph_path() only checks home directory
                  - Home directory config detected correctly from any working directory
                  - Local project configs completely ignored
                  - Error messages clearly guide user to home directory location
                  - No directory tree walking for langgraph.json discovery

              # Update StudioManager to use home directory only
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/studio/domains/studio_manager/manager.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/studio/workflows/studio_lifecycle.py
                guidance: |
                  Context: StudioManager currently accepts worktree_root parameter and constructs langgraph.json
                  path from project root. The new architecture uses home directory only (~/.config/myagents/).

                  Instructions:
                  1. In manager.py, update StudioManager initialization to use home directory for langgraph.json path
                  2. Replace worktree_root parameter with home_config_dir (default: ~/.config/myagents/)
                  3. Update langgraph_config_path construction to use home_config_dir instead of worktree_root
                  4. Update cwd parameter in subprocess calls to use home_config_dir (or remove if not needed)
                  5. Ensure langgraph.json paths in config use absolute paths (not relative)
                  6. In studio_lifecycle.py, update StudioManager instantiation to pass home_config_dir
                  7. Remove any worktree_root parameters from Studio component interfaces
                  8. Update path resolution to handle absolute paths from home directory config

                  Files to modify:
                  - manager.py: StudioManager.__init__() and langgraph_config_path property
                  - manager.py: Update subprocess.Popen cwd parameter
                  - studio_lifecycle.py: StudioManager instantiation calls

                  Why this matters: Ensures Studio components use consistent config location regardless of
                  where commands are executed from. Forces UAT to test with packaged installation.
                success_criteria:
                  - Studio commands find config without worktree context
                  - Studio operations work from any directory
                  - Absolute paths in config resolve correctly in Studio
                  - No worktree_root parameter dependencies

              # Update setup workflow to create home directory config with absolute paths
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/agents/workflows/setup_workflow.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/cli/myagents_cli.py
                guidance: |
                  Context: The setup workflow must create langgraph.json in home directory with absolute paths
                  so it works from any directory. This ensures new users can use the system immediately after
                  installation without needing local project files.

                  Instructions:
                  1. In setup_workflow.py, ensure langgraph.json is created in ~/.config/myagents/ with absolute paths
                  2. Convert all relative paths in langgraph.json to absolute paths based on installed package location
  3. Update dependencies to use absolute paths or package-relative paths
                  4. Update graphs paths to use absolute paths pointing to installed agent workflows
                  5. Update env path to use absolute path or environment variable
                  6. In myagents_cli.py, ensure setup command creates home directory config correctly
                  7. Remove any logic that creates local project langgraph.json files

                  Files to modify:
                  - setup_workflow.py: Config creation logic
                  - myagents_cli.py: Setup command implementation

                  Why this matters: Ensures new users can use the system immediately after installation.
                  Forces UAT to test as new users would - everything packaged and installed.
                success_criteria:
                  - Setup creates ~/.config/myagents/langgraph.json with absolute paths
                  - Config works from any directory after setup
                  - No local project langgraph.json files created
                  - All paths in config are absolute or package-relative

              # Test cleanup agent: Remove obsolete test fixtures (cleaner targets 7, 8, 9)
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/workflows/health_check/test_health_check_workflow.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/workflows/health_check/test_langgraph_home_directory_e2e.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/conftest.py
                guidance: |
                  Context: Cleaner voting approved removal of test fixtures that test obsolete local project detection.
                  These tests validate behavior that is being removed (local langgraph.json discovery).

                  CRITICAL: Remove test classes and fixtures that test local project detection:
                  - Target 7: TestDetectProjectRoot test class in test_health_check_workflow.py
                  - Target 8: TestLocalOverridePriority test class in test_langgraph_home_directory_e2e.py
                  - Target 9: cleanup_home_directory_test_files fixture in conftest.py (update, don't remove entirely)

                  Instructions:
                  1. In test_health_check_workflow.py: REMOVE TestDetectProjectRoot test class entirely
                  2. In test_health_check_workflow.py: REMOVE any test methods that create local langgraph.json files
                  3. In test_langgraph_home_directory_e2e.py: REMOVE TestLocalOverridePriority test class entirely
                  4. In test_langgraph_home_directory_e2e.py: REMOVE test methods testing local override priority
                  5. In conftest.py: UPDATE cleanup_home_directory_test_files fixture (may still be needed for home dir tests)
                  6. Update remaining tests to work with home directory only architecture
                  7. Verify test suite still runs without removed tests

                  Why this matters: Tests should validate current architecture, not obsolete behavior.
                success_criteria:
                  - TestDetectProjectRoot test class removed
                  - TestLocalOverridePriority test class removed
                  - No tests create local project langgraph.json files
                  - Test suite passes with removed test classes
                  - Remaining tests validate home directory only architecture

          # Sequential execution group: Update preferences system
          - execution: sequential
            agents:
              # Remove preference routing for langgraph.json
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/agents/workflows/preferences_workflow.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/cli/myagents_cli.py
                guidance: |
                  Context: The current architecture supports preference-based routing for langgraph.json path
                  (user can configure whether to use home directory or project directory). This adds complexity
                  and is no longer needed with home directory as single source of truth.

                  Instructions:
                  1. Remove langgraph_path preference support from preferences_workflow.py
                  2. Remove preference get/set/delete commands for langgraph_path
                  3. Update preferences documentation to remove langgraph_path references
                  4. In myagents_cli.py, remove langgraph_path preference commands
                  5. Update error messages to remove references to preference routing

                  Files to modify:
                  - preferences_workflow.py: Remove langgraph_path preference handling
                  - myagents_cli.py: Remove langgraph_path preference commands

                  Why this matters: Simplifies architecture by removing unnecessary routing complexity.
                success_criteria:
                  - No langgraph_path preference commands available
                  - Preferences system works without langgraph_path routing
                  - Error messages don't reference preference routing

      # ========================================
      # TEST PHASE (Component Testing + User Flow Testing)
      # Incorporates both technical validation and complete user journeys
      # Forces UAT to test as new users would - packaged installation
      # ========================================
      - name: Test Phase
        execution_groups:
          # Build-test-loop execution group: Parallel test agents (component + user flows), dynamic build agents
          - execution: test-fix-loop
            name: Component and user flow testing - Home directory single source of truth, packaged installation
            agents:
              # Parallel test agents: Spawn multiple test agents to test different aspects simultaneously
              # Reduced from 8 to 6 agents per test planner recommendation
              - type: test
                count: 6
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/agents/test/processes/test_runner.yml
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/agents/test/definitions.yml
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/agents/workflows/health_check_workflow.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/studio/domains/studio_manager/manager.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/backend/services/studio/workflows/studio_lifecycle.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/cli/myagents_cli.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/src/myagents/frontend/cli/entry.py
                guidance: |
