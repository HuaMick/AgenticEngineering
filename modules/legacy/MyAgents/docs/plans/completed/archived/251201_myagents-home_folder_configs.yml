      # ========================================
      # E2E TEST INFRASTRUCTURE FIX PHASE
      # Fixes 23 failing E2E tests that need home directory config
      # ========================================
      - name: E2E Test Infrastructure Fix Phase
        execution_groups:
          - execution: sequential
            name: Fix E2E tests that require home directory config
            agents:
              # Add home_config_fixture to conftest.py
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/conftest.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/workflows/health_check/test_langgraph_home_directory_e2e.py
                guidance: |
                  Context: 23 E2E tests fail because they invoke the CLI via subprocess and require
                  ~/.config/myagents/langgraph.json to exist. The test environment has MYAGENTS_TEST_ISOLATION=1
                  set which prevents routing, AND the home directory config doesn't exist.

                  Root Cause Analysis:
                  - Tests call CLI via subprocess.run() which requires real home config
                  - MYAGENTS_TEST_ISOLATION=1 prevents routing in HealthCheckWorkflow
                  - No langgraph.json exists in ~/.config/myagents/ during tests
                  - Tests expect home directory config but none is created

                  Solution: Add home_config_fixture to conftest.py following the pattern from
                  isolated_environment fixture in test_langgraph_home_directory_e2e.py.

                  Instructions:
                  1. Read the isolated_environment fixture in test_langgraph_home_directory_e2e.py as reference
                  2. Add home_config_fixture to tests/conftest.py:
                     ```python
                     @pytest.fixture
                     def home_config_fixture(tmp_path):
                         """Create isolated home config directory for E2E tests.

                         This fixture:
                         - Backs up existing ~/.config/myagents/ directory
                         - Creates a minimal langgraph.json for testing
                         - Temporarily disables MYAGENTS_TEST_ISOLATION
                         - Restores original state after test completes
                         """
                         import shutil
                         import tempfile

                         # Temporarily disable test isolation
                         test_isolation_was_set = 'MYAGENTS_TEST_ISOLATION' in os.environ
                         test_isolation_value = None
                         if test_isolation_was_set:
                             test_isolation_value = os.environ.pop('MYAGENTS_TEST_ISOLATION')

                         # Backup home config directory
                         home_config_dir = Path.home() / ".config" / "myagents"
                         backup_dir = None

                         if home_config_dir.exists():
                             backup_dir = Path(tempfile.mkdtemp())
                             shutil.copytree(home_config_dir, backup_dir / "myagents")
                             shutil.rmtree(home_config_dir)

                         # Create minimal test config
                         home_config_dir.mkdir(parents=True, exist_ok=True)
                         langgraph_json = home_config_dir / "langgraph.json"
                         langgraph_json.write_text('{"graphs": {}}')

                         yield {
                             "home_config_dir": home_config_dir,
                             "langgraph_json": langgraph_json,
                             "tmp_path": tmp_path,
                         }

                         # Restore original state
                         if home_config_dir.exists():
                             shutil.rmtree(home_config_dir)

                         if backup_dir:
                             shutil.copytree(backup_dir / "myagents", home_config_dir)
                             shutil.rmtree(backup_dir)

                         # Restore test isolation flag
                         if test_isolation_was_set:
                             os.environ['MYAGENTS_TEST_ISOLATION'] = test_isolation_value
                     ```
                  3. Ensure the fixture imports Path from pathlib and os
                  4. Test that the fixture works correctly

                  Why this matters: E2E tests need real home config to test CLI behavior.
                success_criteria:
                  - home_config_fixture added to conftest.py
                  - Fixture backs up and restores existing config
                  - Fixture disables MYAGENTS_TEST_ISOLATION temporarily
                  - Fixture creates minimal langgraph.json for tests

              # Update failing E2E test files to use the fixture
              - type: builder
                inputs:
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/workflows/cli_unification/test_unified_cli_e2e.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/workflows/health_check/test_global_command_architecture_e2e.py
                  - /home/code/myagents/MyAgents-myagents-home-folder-configs/tests/workflows/infrastructure/test_cli_integration.py
