          print(f"✅ Session created: {session_id}")
          print(f"✅ Pairing code: {pairing_code}")
          
          # US-E2E-002: Start PTY and connect to relay
          await workflow.start()
          print("✅ PTY started and connected to relay")
          
          # US-E2E-004: Send test input
