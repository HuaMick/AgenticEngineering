      2. Client sends: echo "Hello E2E" | base64 encode | encrypt | EncryptedBlob
      3. Desktop receives, decrypts, forwards to PTY
      4. PTY executes: echo "Hello E2E"
      5. Desktop receives output, encrypts, sends EncryptedBlob
      6. Client receives, decrypts, validates output contains "Hello E2E"
