      2. Client sends TerminalClose or disconnects WebSocket
      3. Verify desktop receives close notification
      4. Verify PTY process terminates (check PID no longer exists)
      5. Verify relay session removed (GET /api/sessions/{session_id} returns 404)
      6. Verify all WebSocket connections closed
