      - Relay forwards EncryptedBlob → Desktop
      - Desktop decrypts → gets TerminalInput
      - Desktop sends to PTY via TerminalWorkflow
      - PTY executes command and produces output
      - Desktop encrypts TerminalOutput → EncryptedBlob
      - Relay forwards EncryptedBlob → Client
      - Client decrypts → gets TerminalOutput
      - ANSI escape sequences preserved through encryption
    test_approach: |
