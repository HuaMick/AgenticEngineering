# ========================================
# ARCHITECTURE DECISIONS
# ========================================
architecture_decisions:
  - decision: "Follow relay service FastAPI + WebSocket pattern"
    rationale: |
      Relay service has proven implementation with session management, WebSocket handling,
      and graceful shutdown. Using the same patterns ensures consistency and reduces bugs.

  - decision: "Use existing PTYManager and IOBuffer domains"
    rationale: |
      Domain logic already exists and is tested. Server implementation should orchestrate
      these domains, not reimplement PTY or I/O logic.

  - decision: "Support session-based PTY management"
    rationale: |
      Each WebSocket connection creates one PTY session. Session ID tracks the PTY process.
      Enables multiple concurrent terminal sessions from different clients.

  - decision: "Implement graceful shutdown with PTY cleanup"
    rationale: |
      Orphaned PTY processes are a resource leak. Shutdown must close all PTY sessions
      cleanly and wait for processes to terminate.

