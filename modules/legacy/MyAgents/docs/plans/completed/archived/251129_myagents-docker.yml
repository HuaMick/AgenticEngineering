# ==============================================================================
# PROBLEM STATEMENT
# ==============================================================================

problem:
  title: "Recurring agent-gcptoolkit dependency format mismatch"
  symptoms:
    - pyproject.toml keeps getting changed between `workspace = true` and `path = "../Agent-GCPtoolkit"`
    - Dockerfile.test sed patterns get out of sync with pyproject.toml format
    - CI builds fail when sed pattern doesn't match the actual content
    - Agents change format for local dev, breaking CI
  
  root_cause: |
    The Docker container uses a FLATTENED directory structure that differs from local:
    
    LOCAL:                                    DOCKER (current):
    /home/code/myagents/                      /workspace/MyAgents-staging/
    ├── Agent-GCPtoolkit/                     ├── Agent-GCPtoolkit/  ← WRONG LEVEL
    ├── MyAgents-staging/                     ├── pyproject.toml
    │   └── pyproject.toml                    └── src/
    
    Because of this mismatch, the Dockerfile needs a `sed` hack to rewrite
    the path from "../Agent-GCPtoolkit" to "./Agent-GCPtoolkit".
    
    This sed pattern is fragile and keeps breaking when pyproject.toml format changes.

  evidence:
    - git log shows repeated commits: "fix(workspace): use workspace source", "fix(docker): correct sed pattern"
    - MyAgents uses `workspace = true`, MyAgents-staging uses `path = "../Agent-GCPtoolkit"`
    - Documentation (LOCAL_TESTING.md) is out of sync with actual code

# ==============================================================================
# SOLUTION
# ==============================================================================

solution:
  title: "Mirror exact local filesystem structure in Docker"
  approach: |
    Copy Agent-GCPtoolkit to /workspace/Agent-GCPtoolkit (sibling directory)
    instead of /workspace/MyAgents-staging/Agent-GCPtoolkit (child directory).
    
    This makes "../Agent-GCPtoolkit" resolve correctly without any sed hacks.
    
    PROPOSED:
    /workspace/
    ├── Agent-GCPtoolkit/       ← Sibling (same as local)
    └── MyAgents-staging/
        └── pyproject.toml      ← "../Agent-GCPtoolkit" works unchanged!
  
  benefits:
    - No sed hack needed - pyproject.toml works as-is
    - True reflection of local codebase structure
    - Eliminates format mismatch cycle
    - Works with BOTH `workspace = true` AND `path = "../Agent-GCPtoolkit"` formats

# ==============================================================================
# OBJECTIVES
# ==============================================================================

objectives:
  - Modify Dockerfile.test to copy Agent-GCPtoolkit to sibling directory
  - Remove sed hack for path rewriting
  - Test Docker build passes without modifications to pyproject.toml
  - Update documentation (LOCAL_TESTING.md) to reflect new approach
  - Standardize pyproject.toml format across all worktrees

