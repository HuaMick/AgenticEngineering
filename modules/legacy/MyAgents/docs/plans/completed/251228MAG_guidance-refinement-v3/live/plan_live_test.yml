# Plan: Guidance Refinement v3 - Test Phase
# Purpose: Validate orchestration-build/process.mmd guidance improvements through walkthrough-based validation
# Strategy: guidance-blind-test - test if agents can follow the diagram without confusion

plan_name: "guidance-refinement-v3-test"
worktree: "/home/code/myagents/MyAgentsGuidance-guidance-refinement-v3"
branch: "guidance-refinement-v3"
created: "2025-12-28"
status: "pending"
plan_type: "test"

# ============================================================================
# OBJECTIVE
# ============================================================================

objective: |
  Validate that the updated orchestration-build/process.mmd effectively guides agents through
  the build orchestration process. Using the guidance-blind-test strategy, verify that an agent
  can navigate the flowchart from Start to End, understanding all decision points, feedback loops,
  and phase transitions without requiring clarification or code inspection.

  The teaching plan (plan_live_teach.yml) adds 15 maturity improvements including:
  - 7 section headers with separators
  - Dual planning loops (Implementation + Test)
  - Loop definition references (MAX_ITERATIONS, ESCALATION)
  - Complete feedback loop documentation
  - Build-specific elements (Exploration, CI/CD, build agents)

  This test plan validates each improvement through targeted walkthrough scenarios.

# ============================================================================
# INPUTS
# ============================================================================

inputs:
  - location: "agents/orchestration/orchestration-build/process.mmd"
    description: "Target file to validate - the updated build orchestration flowchart"
  - location: "agents/orchestration/orchestration-build/inputs.yml"
    description: "Input definitions for orchestration-build agent"
  - location: "assets/definitions/strategy-guidance-blind-test.yml"
    description: "Blind test methodology - minimal context principle, friction reporting"
  - location: "assets/definitions/guidance-test-scenarios.yml"
    description: "Standard test scenario definitions and application rules"
  - location: "assets/definitions/agent-loops.yml"
    description: "Loop definitions that process.mmd should reference"
  - location: "agents/orchestration/orchestration-guidance/process.mmd"
    description: "Exemplar file - maturity target for comparison"
  - location: "docs/plans/live/251228MAG_guidance-refinement-v3/live/plan_live_teach.yml"
    description: "Implementation plan being validated - maturity gaps and phases"

# ============================================================================
# TEST SCENARIOS
# ============================================================================
# Each scenario validates a specific navigation path or decision point in process.mmd
# Following guidance-blind-test strategy: agent has ONLY the diagram, no code access

test_scenarios:
  # ---------------------------------------------------------------------------
  # SCENARIO 1: ENTRYPOINT NAVIGATION TEST
  # ---------------------------------------------------------------------------
  entrypoint_navigation:
    id: "test_1_entrypoint"
    name: "Entrypoint Navigation Test"
    description: |
      Can an agent starting at "Start" correctly identify the first action?
      Tests basic diagram entry and initial navigation.

    starting_point: "Start((Start))"
    expected_navigation_path:
      - "Start --> LoadInputs[Load Context Inputs]"
      - "Agent identifies LoadInputs as first action"

    walkthrough_task: |
      You are an orchestration-build agent. Given only the process.mmd flowchart:
      1. Identify the entry point to the orchestration process
      2. Determine the first action you must take
      3. Explain what "Load Context Inputs" means in this context

    success_criteria:
      - "Agent identifies Start node as entry point"
      - "Agent correctly navigates to LoadInputs as first action"
      - "Agent understands LoadInputs references inputs.yml for context"
      - "No confusion about where to begin"

    friction_indicators:
      - "Agent asks what inputs to load (diagram should reference INPUT_PATH)"
      - "Agent cannot find header comment with INPUT_PATH"
      - "Agent attempts to explore codebase for input definitions"
      - "Agent skips LoadInputs and goes directly to another node"

    validates_gap: "gap_1_header_comments - INPUT_PATH should be clear in header"

  # ---------------------------------------------------------------------------
  # SCENARIO 2: INPUT VERIFICATION TEST
  # ---------------------------------------------------------------------------
  input_verification:
    id: "test_2_input_verification"
    name: "Input Verification Flow Test"
    description: |
      Can an agent follow the input verification flow and know when to search or ask user?
      Tests the self-healing behavior for missing inputs.

    starting_point: "LoadInputs[Load Context Inputs]"
    expected_navigation_path:
      - "LoadInputs --> ReviewInputs[Review All Listed Inputs]"
      - "ReviewInputs --> CheckInputs{All Inputs Found?}"
      - "If No: CheckInputs --> SearchInputs --> Found{Found?}"
      - "If Found Yes: Update paths and return to ReviewInputs"
      - "If Found No: Stop and AskUser"
      - "If CheckInputs Yes: Proceed to SpawnDeployWorktree"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Trace the input verification flow from LoadInputs to either success or failure
      2. Explain what happens when an input is missing
      3. Identify when you would ask the user for help
      4. Describe the self-healing behavior (search and update paths)

    success_criteria:
      - "Agent traces complete verification flow"
      - "Agent understands 'search then ask' pattern"
      - "Agent can explain UpdateRefs behavior (update paths, flag discrepancy)"
      - "Agent identifies AskUser as last resort"
      - "Inline comments explain each decision (per gap_2)"

    friction_indicators:
      - "Agent cannot explain what 'search for missing inputs' means"
      - "Agent unclear on when to give up searching and ask user"
      - "Agent does not understand path update behavior"
      - "Missing comments make decision edges ambiguous"

    validates_gap: "gap_2_input_verification_comments - self-healing behavior explained"

  # ---------------------------------------------------------------------------
  # SCENARIO 3: EXPLORATION PHASE TEST
  # ---------------------------------------------------------------------------
  exploration_phase:
    id: "test_3_exploration"
    name: "Exploration Phase Test"
    description: |
      Can an agent understand when/how to spawn explore agents and synthesize findings?
      Tests the build-specific exploration phase that discovers architecture before planning.

    starting_point: "WorktreeValid{Worktree Valid?} -- Yes"
    expected_navigation_path:
      - "WorktreeValid -- Yes --> ExplorePhase[Spawn Explore Agents]"
      - "ExplorePhase may spawn: explore-codebase, explore-dependencies, explore-tests"
      - "All explore agents --> ExploreSynthesis[Synthesize Architectural Context]"
      - "ExploreSynthesis --> Planning phase entry"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Locate the Exploration Phase in the diagram
      2. Identify what explore agents may be spawned
      3. Explain the purpose of architectural context synthesis
      4. Determine when exploration is complete and what happens next

    success_criteria:
      - "Agent locates Exploration Phase subgraph"
      - "Agent identifies multiple explore agent types (codebase, dependencies, tests)"
      - "Agent understands synthesis aggregates findings"
      - "Agent knows exploration feeds into Planning phase"
      - "Section has LOOP_DEFINITION reference (per gap_3)"
      - "MAX_ITERATIONS documented for exploration loop"

    friction_indicators:
      - "Agent cannot find Exploration Phase (missing section header)"
      - "Agent unclear which explore agents to spawn"
      - "Agent does not understand synthesis purpose"
      - "Missing loop definition reference causes confusion about iteration limits"
      - "Agent attempts to skip exploration and go directly to planning"

    validates_gap: "gap_3_exploration_phase_documentation - subgraph with loop reference"

  # ---------------------------------------------------------------------------
  # SCENARIO 4: PLANNING LOOP TEST
  # ---------------------------------------------------------------------------
  planning_loops:
    id: "test_4_planning_loops"
    name: "Dual Planning Loop Test"
    description: |
      Can an agent navigate the dual planning loops (Implementation + Test) correctly?
      Tests the critical gap_5 - dual loop structure with proper documentation.

    starting_point: "ExploreSynthesis --> PlanningReview"
    expected_navigation_path:
      - "PlanningReview --> BuildPlanningLoop{Build Implementation Planning Loop}"
      - "Loop 1: SpawnPlannerBuild --> SpawnBuildReviewer --> BuildPlanApproved?"
      - "If No: Refine and loop back to SpawnPlannerBuild"
      - "If Yes: BuildPlanApproved --> TestPlanningLoop{Build Test Planning Loop}"
      - "Loop 2: SpawnTestPlanner --> SpawnTestReviewer --> TestPlanApproved?"
      - "If No: Refine and loop back to SpawnTestPlanner"
      - "If Yes: TestPlanViable? check"
      - "If Viability No: Return to BuildPlanningLoop"
      - "If Viability Yes: Proceed to ExecutePhases"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Identify both planning loops in the Planning subgraph
      2. Explain the difference between Loop 1 (Build Implementation) and Loop 2 (Build Test)
      3. Trace what happens when the build reviewer rejects a plan
      4. Trace what happens when the test plan reveals build issues (viability check)
      5. Find the MAX_ITERATIONS for each loop

    success_criteria:
      - "Agent identifies two distinct planning loops"
      - "Agent understands Loop 1 must complete before Loop 2"
      - "Agent traces rejection/refinement paths for both loops"
      - "Agent understands viability check can return to Loop 1"
      - "Agent finds LOOP_DEFINITION references for both loops"
      - "Agent finds MAX_ITERATIONS (5 for planner-loop)"
      - "Agent finds ESCALATION policy"

    friction_indicators:
      - "Agent sees only one planning loop (gap_5 not addressed)"
      - "Agent confused about loop ordering (which runs first)"
      - "Agent cannot find MAX_ITERATIONS or ESCALATION"
      - "Agent unclear on viability check purpose"
      - "Agent does not understand return path to Loop 1"
      - "FEEDBACK LOOP ENTRY POINTS not documented"

    validates_gap: "gap_5_dual_planning_loops, gap_4_planning_subgraph_header, gap_6_loop_definition_references"

  # ---------------------------------------------------------------------------
  # SCENARIO 5: IMPLEMENTATION LOOP TEST
  # ---------------------------------------------------------------------------
  implementation_loop:
    id: "test_5_implementation"
    name: "Implementation Loop Test"
    description: |
      Can an agent understand the build-test cycle with build-python/flutter and test-runner?
      Tests the Implementation Loop subgraph documentation.

    starting_point: "TestPlanViable -- Yes --> ExecutePhases"
    expected_navigation_path:
      - "ExecutePhases --> SpawnBuilders[Spawn build-python/flutter agents]"
      - "SpawnBuilders --> RunTests[Spawn test-runner]"
      - "RunTests --> TestsPassed{Tests Passed?}"
      - "If No (minor): Fix in iteration, loop back to SpawnBuilders"
      - "If No (severe): Categorize, escalate to PlanningReview"
      - "If Yes: Proceed to CICDCheck"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Locate the Implementation Loop subgraph
      2. Identify which builder agents may be spawned
      3. Explain the test failure handling behavior
      4. Determine when a test failure stays in the loop vs escalates to planning
      5. Find the loop definition and iteration limits

    success_criteria:
      - "Agent locates Implementation Loop subgraph"
      - "Agent identifies build-python and build-flutter as builder options"
      - "Agent understands test-runner integration"
      - "Agent distinguishes in-loop fixes from planning escalation"
      - "Agent finds LOOP_DEFINITION reference to test-fix-loop"
      - "Agent finds MAX_ITERATIONS (5 for test-fix-loop)"
      - "FAIL-FAST behavior documented in comments"

    friction_indicators:
      - "Agent cannot find Implementation Loop section header"
      - "Agent unclear which builder types exist"
      - "Agent does not understand when to escalate vs retry"
      - "Missing inline comments about fail-fast behavior"
      - "No loop definition reference found"

    validates_gap: "gap_8_implementation_phase_header, gap_9_implementation_loop_detail"

  # ---------------------------------------------------------------------------
  # SCENARIO 6: CI/CD CONDITIONAL TEST
  # ---------------------------------------------------------------------------
  cicd_conditional:
    id: "test_6_cicd"
    name: "CI/CD Conditional Test"
    description: |
      Can an agent determine when to spawn deploy-cicd and handle failures?
      Tests the CI/CD Validation Phase documentation.

    starting_point: "TestsPassed -- Yes --> CICDCheck"
    expected_navigation_path:
      - "TestsPassed -- Yes --> CICDCheck{CI/CD Changes?}"
      - "If Yes: CICDCheck --> SpawnDeploy[Spawn deploy-cicd Audit]"
      - "SpawnDeploy --> CICDValid{Valid?}"
      - "If CICDValid No: Categorize, return to PlanningReview"
      - "If CICDValid Yes: Proceed to GuidanceChanges"
      - "If CICDCheck No: Bypass CI/CD, go to GuidanceChanges"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Locate the CI/CD Validation Phase
      2. Determine when CI/CD validation is triggered (conditional)
      3. Identify the deploy-cicd agent's purpose
      4. Explain what happens when CI/CD validation fails
      5. Trace the bypass path when no CI/CD changes exist

    success_criteria:
      - "Agent locates CI/CD Validation Phase section header"
      - "Agent understands conditional triggering (only if CI/CD changes)"
      - "Agent identifies deploy-cicd agent role"
      - "Agent traces failure path back to planning"
      - "Agent traces bypass path to GuidanceChanges"
      - "Section has proper separator and documentation"

    friction_indicators:
      - "Agent cannot find CI/CD phase (missing section header)"
      - "Agent unclear on conditional logic"
      - "Agent does not know what deploy-cicd audits"
      - "Failure handling not documented"
      - "Missing categorization for CI/CD failures"

    validates_gap: "gap_10_cicd_phase_documentation"

  # ---------------------------------------------------------------------------
  # SCENARIO 7: GUIDANCE VALIDATION TEST
  # ---------------------------------------------------------------------------
  guidance_validation:
    id: "test_7_guidance_validation"
    name: "Guidance Validation Test"
    description: |
      Can an agent understand when guidance testing is needed and how to handle gaps?
      Tests the Guidance Validation Phase and Repair Loop documentation.

    starting_point: "CICDValid -- Yes OR CICDCheck -- No --> GuidanceChanges"
    expected_navigation_path:
      - "GuidanceChanges{Guidance Changes?}"
      - "If Yes: GuidanceTest --> GuidanceSimulator --> UpdateGuidanceStatuses --> GuidancePassed?"
      - "If GuidancePassed No: CategorizeGuidanceGaps --> RouteToHandler --> Return to Planning"
      - "If GuidancePassed Yes: Proceed to SpawnFinalAudit"
      - "If GuidanceChanges No: Bypass to SpawnFinalAudit"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Locate the Guidance Validation Phase
      2. Identify when guidance testing is triggered
      3. Explain the test-guidance-simulator role
      4. Describe the friction point categorization (CRITICAL/HIGH/MEDIUM/LOW)
      5. Trace the Guidance Repair Loop when gaps are found
      6. Find the loop definition and iteration limits

    success_criteria:
      - "Agent locates Guidance Validation Phase section header"
      - "Agent identifies conditional triggering"
      - "Agent understands planner-test-guidance and test-guidance-simulator roles"
      - "Agent explains friction categorization by severity"
      - "Agent traces Repair Loop with routing by gap type"
      - "Agent finds LOOP_DEFINITION reference to guidance-test-loop"
      - "Agent finds MAX_ITERATIONS (3 for guidance-test-loop)"
      - "PLAN STATUS UPDATE step documented"

    friction_indicators:
      - "Agent cannot find Guidance Validation Phase header"
      - "Agent unclear on test-guidance-simulator purpose"
      - "Friction categorization not documented"
      - "Repair Loop routing not explained"
      - "Missing loop definition reference"
      - "Missing status update documentation"

    validates_gap: "gap_11_guidance_validation_phase, gap_6_loop_definition_references"

  # ---------------------------------------------------------------------------
  # SCENARIO 8: FEEDBACK LOOP TEST
  # ---------------------------------------------------------------------------
  feedback_loops:
    id: "test_8_feedback_loops"
    name: "Feedback Loop Test"
    description: |
      Can an agent correctly return to Planning phase when failures occur?
      Tests the complete feedback loop documentation.

    starting_point: "Any failure point in the diagram"
    expected_navigation_path:
      - "Feedback Entry Points documented in Planning header:"
      - "1. Test Failures (from Implementation Loop) --> Update plan --> PlanningReview"
      - "2. CI/CD Failures (from CI/CD Phase) --> Categorize --> PlanningReview"
      - "3. Guidance Gaps (from Guidance Validation) --> Route by type --> PlanningReview"
      - "4. Audit Failures (from Final Audit) --> Update plan --> PlanningReview"
      - "All return paths shown as dotted lines (linkStyle)"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Identify ALL feedback loop entry points that return to Planning phase
      2. For each entry point, explain what triggers the return
      3. Describe how failure information is captured before returning
      4. Trace the visual styling that distinguishes feedback loops (dotted lines)
      5. Explain how the Planning phase handles re-entry from failures

    success_criteria:
      - "Agent identifies 4+ feedback loop entry points"
      - "Agent understands categorization before return (test, CI/CD, guidance, audit)"
      - "Agent traces UpdatePlan nodes that capture failure details"
      - "Agent understands dotted line styling for feedback loops"
      - "FEEDBACK LOOP ENTRY POINTS section present in Planning header"
      - "Numbered list of entry points with line references"

    friction_indicators:
      - "Agent cannot find feedback loop documentation"
      - "Agent misses one or more return paths"
      - "Agent unclear on failure categorization"
      - "Agent does not notice dotted line styling"
      - "Missing entry point documentation in Planning header"

    validates_gap: "gap_7_feedback_loop_documentation"

  # ---------------------------------------------------------------------------
  # SCENARIO 9: FINAL AUDIT TEST
  # ---------------------------------------------------------------------------
  final_audit:
    id: "test_9_final_audit"
    name: "Final Audit and Finalization Test"
    description: |
      Can an agent understand the final audit criteria and finalization steps?
      Tests the Final Audit Phase and Finalization documentation.

    starting_point: "GuidancePassed -- Yes OR GuidanceChanges -- No --> SpawnFinalAudit"
    expected_navigation_path:
      - "SpawnFinalAudit[Spawn test-final-output Audit]"
      - "SpawnFinalAudit --> FinalAudit{Final Audit Passed?}"
      - "If No: UpdatePlanIssues --> Return to PlanningReview (dotted line)"
      - "If Yes: MoveCompleted --> End"
      - "Finalization: Copy to docs/plans/completed/ (not move)"

    walkthrough_task: |
      You are an orchestration-build agent. Given the process.mmd flowchart:
      1. Locate the Final Audit Phase
      2. Identify the test-final-output agent's role
      3. Explain what happens when the final audit fails
      4. Describe the finalization step (copy vs move semantics)
      5. Understand why live/ folder persists for follow-on work

    success_criteria:
      - "Agent locates Final Audit Phase section header"
      - "Agent identifies test-final-output agent"
      - "Agent traces failure return path to Planning"
      - "Agent understands copy (not move) semantics"
      - "Agent understands live/ persistence reasoning"
      - "Section separator present"

    friction_indicators:
      - "Agent cannot find Final Audit section header"
      - "Agent unclear on test-final-output purpose"
      - "Agent does not understand copy vs move"
      - "Agent misses the return path on audit failure"
      - "Missing finalization comment about folder semantics"

    validates_gap: "gap_12_final_audit_phase, gap_13_finalization_phase"

# ============================================================================
# VALIDATION PHASES
# ============================================================================
# These phases execute the test scenarios using test-guidance-simulator

phases:
  - phase: "phase_1_walkthrough_validation"
    name: "Walkthrough Validation"
    description: |
      Execute all test scenarios against the updated orchestration-build/process.mmd.
      Uses guidance-blind-test strategy: simulator has ONLY the diagram, no code access.
    status: "pending"
    priority: "HIGH"
    agent_category: "test"
    tasks:
      - task: "Execute Entrypoint Navigation Test (test_1)"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          validation_mode: "guidance_walkthrough"
          target_file: "agents/orchestration/orchestration-build/process.mmd"
          test_scenario: "entrypoint_navigation"
          constraints: "Use only process.mmd - no code inspection or codebase exploration"
          report_template: "assets/definitions/strategy-guidance-blind-test.yml#FRICTION_POINT"
        acceptance_criteria:
          - "Agent successfully navigates from Start to LoadInputs"
          - "No friction points reported"
        status: "pending"

      - task: "Execute Input Verification Test (test_2)"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          validation_mode: "guidance_walkthrough"
          target_file: "agents/orchestration/orchestration-build/process.mmd"
          test_scenario: "input_verification"
          constraints: "Use only process.mmd - no code inspection or codebase exploration"
          report_template: "assets/definitions/strategy-guidance-blind-test.yml#FRICTION_POINT"
        acceptance_criteria:
          - "Agent traces complete input verification flow"
          - "Self-healing behavior clear from comments"
          - "No friction points reported"
        status: "pending"

      - task: "Execute Exploration Phase Test (test_3)"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
