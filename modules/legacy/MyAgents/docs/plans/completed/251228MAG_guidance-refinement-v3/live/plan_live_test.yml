          constraints: "Use only process.mmd - no code inspection or codebase exploration"
          report_template: "assets/definitions/strategy-guidance-blind-test.yml#FRICTION_POINT"
        acceptance_criteria:
          - "Agent locates Exploration Phase subgraph"
          - "Agent identifies explore agent types"
          - "Loop definition reference found"
          - "No friction points reported"
        status: "pending"

      - task: "Execute Planning Loop Test (test_4)"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
