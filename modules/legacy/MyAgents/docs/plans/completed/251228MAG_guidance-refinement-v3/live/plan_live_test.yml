  - phase: "phase_2_gap_analysis"
    name: "Gap Analysis Phase"
    description: |
      Aggregate friction points from all test scenarios and categorize by severity.
      Produce structured gap report for remediation.
    status: "pending"
    priority: "HIGH"
    agent_category: "test"
    depends_on: ["phase_1_walkthrough_validation"]
    tasks:
      - task: "Aggregate friction points from all scenarios"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          action: "aggregate_friction_report"
          input_scenarios: ["test_1", "test_2", "test_3", "test_4", "test_5", "test_6", "test_7", "test_8", "test_9"]
          categorization: "assets/definitions/guidance-test-scenarios.yml#friction_categorization"
        acceptance_criteria:
          - "All friction points aggregated"
          - "Points categorized by severity (CRITICAL/HIGH/MEDIUM/LOW)"
          - "Most common gap patterns identified"
        status: "pending"

      - task: "Map friction points to maturity gaps"
        agent_type: "test-guidance-simulator"
        operation: "EXECUTE"
        context:
          action: "map_to_teaching_plan"
          teaching_plan: "docs/plans/live/251228MAG_guidance-refinement-v3/live/plan_live_teach.yml"
          gaps_section: "maturity_gaps"
        acceptance_criteria:
          - "Each friction point mapped to gap_N in teaching plan"
          - "Unmapped friction points flagged as new gaps"
          - "Gap coverage report produced"
        status: "pending"

  - phase: "phase_3_audit"
    name: "Test Quality Audit"
    description: |
      Review test results for false positives and validate test quality.
      Ensure friction points are genuine guidance issues, not test design issues.
    status: "pending"
    priority: "MEDIUM"
    agent_category: "test"
    depends_on: ["phase_2_gap_analysis"]
    tasks:
      - task: "Audit test scenario validity"
        agent_type: "test-final-output"
        operation: "EXECUTE"
        context:
          action: "audit_test_quality"
          check_for:
            - "False positives (friction from test design, not guidance)"
            - "Overly strict expectations"
            - "Missing edge cases in test scenarios"
        acceptance_criteria:
          - "All test scenarios validated for correctness"
          - "False positives identified and filtered"
          - "Genuine friction points confirmed"
        status: "pending"

      - task: "Compare against exemplar maturity"
        agent_type: "test-final-output"
        operation: "EXECUTE"
        context:
          action: "compare_maturity"
          target: "agents/orchestration/orchestration-build/process.mmd"
          exemplar: "agents/orchestration/orchestration-guidance/process.mmd"
          criteria:
            - "Section headers count (target: 7)"
            - "Line count (target: 180-200)"
            - "Loop definition references (target: 4+)"
            - "Feedback loop documentation"
        acceptance_criteria:
          - "Target approaches exemplar maturity level"
          - "All critical gaps addressed"
          - "Build-specific elements preserved"
        status: "pending"

  - phase: "phase_4_documentation_loop"
    name: "Documentation Loop"
    description: |
      If friction points indicate genuine gaps, route back to teaching plan for remediation.
      This phase only executes if phase_2 identifies unaddressed gaps.
    status: "pending"
    priority: "HIGH"
    agent_category: "teacher"
    depends_on: ["phase_3_audit"]
    conditional: "Execute only if friction points > 0 after audit"
    tasks:
      - task: "Update teaching plan with newly discovered gaps"
        agent_type: "teacher-update-guidance"
        operation: "EXECUTE"
        context:
          action: "update_teaching_plan"
          source: "phase_2_gap_analysis results"
          target: "docs/plans/live/251228MAG_guidance-refinement-v3/live/plan_live_teach.yml"
        acceptance_criteria:
          - "New gaps added to maturity_gaps section"
          - "New tasks added to appropriate phases"
          - "Dependencies updated"
        status: "pending"

# ============================================================================
# SUCCESS CRITERIA
# ============================================================================

success_criteria:
  user_validation:
    - "An agent can navigate the entire orchestration-build flowchart without confusion"
    - "All decision points have clear, unambiguous edge labels"
    - "Feedback loops are traceable and understandable"
    - "Build-specific elements (exploration, CI/CD, builders) are well-documented"
    - "Loop iteration limits and escalation policies are discoverable"

  technical_validation:
    - "All 9 test scenarios pass with zero CRITICAL friction points"
    - "All 9 test scenarios pass with zero HIGH friction points"
    - "Total friction points <= 3 (MEDIUM or LOW only)"
    - "All 15 maturity gaps from teaching plan validated as addressed"
    - "File line count approximately 180-200 (up from 81)"
    - "7 section headers with separators present"
    - "4+ loop definition references present"
    - "Mermaid syntax renders without errors"

