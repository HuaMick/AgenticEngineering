      description: "Aggregated friction points from all test scenarios"
    - name: "gap_coverage.yml"
      description: "Mapping of friction points to maturity gaps"
    - name: "maturity_comparison.yml"
      description: "Comparison against orchestration-guidance exemplar"
    - name: "test_summary.yml"
      description: "Summary of all test scenario results"

