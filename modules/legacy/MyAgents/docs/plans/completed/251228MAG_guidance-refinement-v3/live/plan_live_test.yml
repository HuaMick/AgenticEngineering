          target_file: "agents/orchestration/orchestration-build/process.mmd"
          test_scenario: "planning_loops"
          constraints: "Use only process.mmd - no code inspection or codebase exploration"
          report_template: "assets/definitions/strategy-guidance-blind-test.yml#FRICTION_POINT"
        acceptance_criteria:
          - "Agent identifies dual planning loops"
          - "Agent traces both loop flows with refinement paths"
          - "Agent finds MAX_ITERATIONS and ESCALATION"
