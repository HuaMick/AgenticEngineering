# Planner Task: Teacher Agent Context Minimisation
# Plan: 251216_context_min

task:
  agent: "teacher"
  target_path: "teacher/"

  current_structure:
    root_files:
      - "manifest-teacher.yml"
      - "manifest.yml"
      - "inputs.yml"
      - "plan.yml"
    sub_agents:
      - "teacher-process/"
      - "teacher-update-assets/"

  audit_checklist:
    context_minimisation:
      - "Root inputs.yml is large (12KB) - review for unnecessary context"
      - "Check if plan.yml should be in a plans folder instead"
      - "Review if teacher sub-agents need all the root context"
      - "Identify definitions that could be referenced rather than inlined"

    folder_structure:
      - "Verify manifest.yml serves as hub with minimal detail"
      - "Verify manifest-teacher.yml has full context"
      - "Ensure each sub-agent has: process.yml, inputs.yml, manifest.yml"
      - "Consider moving plan.yml to docs/plans/"

  tasks:
    - id: "teach-01"
      description: "Delete root inputs.yml - sub-agents should be self-contained"
      file: "teacher/inputs.yml"
      criteria: "File removed; each sub-agent has complete inputs.yml without parent_inputs references"
      action: "delete"
      status: "completed"
      previous_notes: "Was: Reduced from 12KB to 2.3KB - now being removed entirely"
      notes: "File successfully removed. Verified both teacher-process/inputs.yml (8KB) and teacher-update-assets/inputs.yml (5.6KB) exist and contain no parent_inputs references. No references to teacher/inputs.yml found in codebase except this plan file."

    - id: "teach-02"
      description: "Review plan.yml placement"
      file: "docs/plans/teacher_exam/plan.yml"
      criteria: "Plan moved to docs/plans/ structure"
      status: "completed"

    - id: "teach-03"
      description: "Audit teacher-process/inputs.yml"
      file: "teacher/teacher-process/inputs.yml"
      criteria: "Only process-specific inputs"
      status: "completed"
      notes: "Removed duplicated definitions; made agent process files load just-in-time"

    - id: "teach-04"
      description: "Audit teacher-update-assets/inputs.yml"
      file: "teacher/teacher-update-assets/inputs.yml"
      criteria: "Only asset-update specific inputs"
      status: "completed"
      notes: "Already well-focused on asset-specific context; no changes needed"

    - id: "teach-05"
      description: "Add manifest.yml to each sub-agent folder"
      criteria: "All sub-agents have manifest.yml referencing parent"
      status: "completed"
      notes: "Enhanced manifests for teacher-process and teacher-update-assets with parent references, responsibilities, and boundaries"

    - id: "teach-06"
      description: "Update references after changes"
      criteria: "All paths in inputs/process files resolve to existing files"
      status: "completed"
      notes: "Updated build/plan.yml and planner_teacher.yml to reference new plan location"

  reference_update_locations:
    - "assets/processes/_teach.yml"
    - "planner/planner-teach/inputs.yml"

  # Additional context-minimisation proposals from review (2025-12-18)
  proposals:
    - id: "teach-prop-01"
      file: "teacher/teacher-process/inputs.yml"
      issue: "Well-structured with references to shared definitions - minimal duplication detected"
      proposal: "No action needed - good example of context minimization"
      impact: "N/A"
      priority: "none"
      status: "not_applicable"

  final_notes:
    - timestamp: "2025-12-18"
      note: "Hub manifests were later deleted as over-abstraction. The file teacher/manifest.yml (which served as a hub manifest with minimal detail) was removed in favor of a simpler architecture. This aligns with the context minimization goals - the hub pattern added unnecessary indirection without sufficient value."
      related_files:
        - "teacher/manifest-teacher.yml (deleted)"
        - "teacher/manifest.yml (deleted)"
