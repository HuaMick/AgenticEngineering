# Planner Task: Cleaner Agent Context Minimisation
# Plan: 251216_context_min

task:
  agent: "cleaner"
  target_path: "cleaner/"

  current_structure:
    root_files:
      - "manifest-cleaner.yml"
      - "manifest.yml"
    sub_agents:
      - "cleaner-core/"
      - "cleaner-execute/"
      - "cleaner-identify/"

  audit_checklist:
    context_minimisation:
      - "Review inputs.yml in each sub-agent for unnecessary context"
      - "Check process.yml steps for over-specified inputs"
      - "Identify files being loaded that could be referenced just-in-time"
      - "Remove historical/redundant context from manifests"

    folder_structure:
      - "Verify manifest.yml serves as hub with minimal detail"
      - "Verify manifest-cleaner.yml has full context"
      - "Ensure each sub-agent has: process.yml, inputs.yml"
      - "Check for missing manifest.yml in sub-agent folders"

  tasks:
    - id: "cleaner-00"
      description: "Delete root inputs.yml - sub-agents should be self-contained"
      file: "cleaner/inputs.yml"
      criteria: "File removed; each sub-agent has complete inputs.yml"
      action: "delete"
      status: "completed"
      result: "No root inputs.yml file exists. Sub-agents are self-contained."

    - id: "cleaner-01"
      description: "Audit cleaner-core/inputs.yml for context minimisation"
      file: "cleaner/cleaner-core/inputs.yml"
      criteria: "Only required inputs present; no full file dumps; self-contained (no parent_inputs)"
      status: "completed"
      result: |
        Optimized cleaner-core/inputs.yml:
        - Removed all inline definitions section (90+ lines of duplicate content)
        - Shortened verbose descriptions to concise essentials
        - Changed manifest path from cleaner/manifest.yml to cleaner-core/manifest.yml
        - Kept all 20 essential file inputs
        - Reduced file from 185 lines to 124 lines (33% reduction)
        - All inputs remain self-contained (no parent_inputs)

    - id: "cleaner-02"
      description: "Audit cleaner-execute/inputs.yml for context minimisation"
      file: "cleaner/cleaner-execute/inputs.yml"
      criteria: "Only required inputs present; no full file dumps"
      status: "completed"
      result: |
        Optimized cleaner-execute/inputs.yml:
        - Removed all inline definitions section (60+ lines of duplicate content)
        - Shortened verbose descriptions to concise essentials
        - Changed manifest path to cleaner-execute/manifest.yml
        - Removed redundant domain/workflow/entrypoint definitions (not needed for execution)
        - Reduced from 18 inputs to 14 essential inputs
        - Reduced file from 163 lines to 110 lines (32% reduction)
        - All inputs remain self-contained (no parent_inputs)

    - id: "cleaner-03"
      description: "Audit cleaner-identify/inputs.yml for context minimisation"
      file: "cleaner/cleaner-identify/inputs.yml"
      criteria: "Only required inputs present; no full file dumps"
      status: "completed"
      result: |
        Optimized cleaner-identify/inputs.yml:
        - Removed all inline definitions section (80+ lines of duplicate content)
        - Shortened verbose descriptions to concise essentials
        - Changed manifest path to cleaner-identify/manifest.yml
        - Changed overengineering.yml and skipped-test.yml from optional to required
        - Reduced file from 197 lines to 134 lines (32% reduction)
        - All inputs remain self-contained (no parent_inputs)

    - id: "cleaner-04"
      description: "Standardise folder structure"
      criteria: "All sub-agents have process.yml, inputs.yml, manifest.yml"
      status: "completed"
      result: |
        Verified folder structure standardisation:
        - cleaner-core/: Has process.yml, inputs.yml, manifest.yml ✓
        - cleaner-execute/: Has process.yml, inputs.yml, manifest.yml ✓
        - cleaner-identify/: Has process.yml, inputs.yml, manifest.yml ✓
        All sub-agents follow the standard structure.

    - id: "cleaner-05"
      description: "Update references after changes"
      criteria: "All paths in inputs/process files resolve to existing files"
      status: "completed"
      result: |
        Updated manifest.yml references in all three inputs.yml files:
        - cleaner-core now references: cleaner/cleaner-core/manifest.yml
        - cleaner-execute now references: cleaner/cleaner-execute/manifest.yml
        - cleaner-identify now references: cleaner/cleaner-identify/manifest.yml
        No process files needed updates (they don't reference cleaner inputs files).

  reference_update_locations:
    - "assets/processes/_execute.yml"
    - "planner/planner-cleaning/process.yml"
    - "planner/planner-cleaning/inputs.yml"

  # Additional context-minimisation proposals from review (2025-12-18)
  proposals:
    - id: "cleaner-prop-01"
      file: "cleaner/cleaner-core/inputs.yml"
      issue: "Same 7 guideline files loaded in cleaner-core, cleaner-identify, and cleaner-execute (lines 23-56)"
      proposal: "Create assets/definitions/cleaner-shared-guidelines.yml that references common guidelines, reducing repetition"
      impact: "Reduce ~600 tokens across 3 agents by consolidating common guideline references"
      priority: "medium"
      status: "completed"
      note: "Verified all three agents use identical guideline sets - consolidation is safe"
      result: |
        Created cleaner-shared-guidelines.yml and updated all three inputs.yml files:

        Files created:
        - assets/definitions/cleaner-shared-guidelines.yml (87 lines)
          Contains structured reference to 7 shared guidelines with descriptions and purposes

        Files updated:
        - cleaner-core/inputs.yml: Replaced 34 lines (7 guidelines) with 4 lines (1 shared reference)
        - cleaner-identify/inputs.yml: Replaced 34 lines (7 guidelines) with 4 lines (1 shared reference)
        - cleaner-execute/inputs.yml: Replaced 34 lines (7 guidelines) with 4 lines (1 shared reference)

        Impact:
        - Total lines reduced: 90 lines (34×3 = 102 lines → 4×3 = 12 lines)
        - Token savings: ~600 tokens across 3 agents
        - Maintenance: Single source of truth for shared guidelines
        - Consistency: All cleaner agents guaranteed to use identical core principles

    - id: "cleaner-prop-02"
      file: "cleaner/"
      issue: "Missing root-level manifest.yml for cleaner agent family"
      proposal: "Create cleaner/manifest.yml as hub file pointing to cleaner-core, cleaner-identify, cleaner-execute sub-agents (follow build/manifest.yml pattern)"
      impact: "Improve discoverability, align with hub-and-spoke architecture"
      priority: "medium"
      status: "completed"
      result: |
        Created cleaner/manifest.yml following build/manifest.yml hub pattern:

        File created:
        - cleaner/manifest.yml (155 lines)

        Content includes:
        - Agent family metadata and description
        - All 3 sub-agents with paths, manifests, process, inputs references
        - Role designations (orchestrator, identifier×3, executor)
        - Routing section explaining 3-phase workflow (identification → voting → execution)
        - Shared principles (safety_first, voting_system, high_confidence_only, incremental_execution)
        - Cleanup categories definitions (dead_code, redundancy, wrong_location, overengineering, leftover)
        - Protected files documentation

        Benefits:
        - Improved discoverability: Single entry point for understanding cleaner agent family
        - Architecture alignment: Follows hub-and-spoke pattern like build/manifest.yml
        - Documentation: Self-documenting structure explains voting workflow and safety measures
        - Consistency: Matches organizational standards across agent families

  completion_notes: |
    All tasks completed successfully as of 2025-12-18.

    Post-completion update (2025-12-18):
    The hub manifest approach (cleaner/manifest.yml) was later identified as over-abstraction
    and subsequently deleted. The cleaner agent family now operates without a root hub manifest,
    with each sub-agent (cleaner-core, cleaner-identify, cleaner-execute) being fully self-contained.
    This aligns with the principle of minimizing unnecessary abstraction layers.
