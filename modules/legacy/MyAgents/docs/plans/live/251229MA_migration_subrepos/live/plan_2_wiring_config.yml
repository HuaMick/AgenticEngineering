# Plan 2: Wiring & Configuration (Migration to Nested Sub-repositories)
# Created: 2025-12-29
# Status: pending

objective: |
  Configure the consolidated MyAgents workspace to ensure all services, tools, and CI/CD pipelines
  function correctly with the new nested directory structure.

phases:
  - phase: 1
    name: "Workspace & Dev Config"
    status: pending
    tasks:
      - id: MIG-WIR-001
        status: pending
        severity: HIGH
        category: workspace
        description: |
          Update the root `pyproject.toml` (uv workspace) and `myagents.code-workspace` paths.
        acceptance_criteria:
          - `[tool.uv.workspace]` members point to `projects/*`
          - VSCode workspace folders updated to nested paths

      - id: MIG-WIR-002
        status: pending
        severity: MEDIUM
        category: modules
        description: |
          Update cross-module dependency paths in `pyproject.toml` files (e.g., MyAgentsBackend's path to Agent-GCPtoolkit).
        acceptance_criteria:
          - Relative paths (e.g., `../Agent-GCPtoolkit`) still resolve correctly or are updated to `../Agent-GCPtoolkit` (if staying in projects/)

  - phase: 2
    name: "Service & Tooling Wiring"
    status: pending
    tasks:
      - id: MIG-WIR-003
        status: pending
        severity: HIGH
        category: docker
        description: |
          Update `docker-compose.yml` build contexts and volume mount paths.
        acceptance_criteria:
          - `docker-compose build` succeeds
          - `docker-compose up` mounts correctly to `./projects/RemoteAgents/...`

      - id: MIG-WIR-004
        status: pending
        severity: MEDIUM
        category: infrastructure
        description: |
          Update `Makefile` variable paths (CONFIG_FILE, etc.) to point to consolidated locations.
        acceptance_criteria:
          - `make help` and path-dependent targets work from MyAgents/

  - phase: 3
    name: "CI/CD Pipeline Refactor"
    status: pending
    tasks:
      - id: MIG-WIR-005
        status: pending
        severity: HIGH
        category: devops
        description: |
          Refactor `cloudbuild.yaml` to handle nested submodules and absolute workspace paths.
        acceptance_criteria:
          - `prepare-workspace` step correctly initializes submodules
          - Docker build steps use correct nested context paths
          - Test paths in `pytest` commands updated

notes:
  - "Requires Plan 1 to be fully completed."
  - "Validation should include running the full test suite via 'make test-all' once paths are wired."


