# Phase 2: Foundation - Duplication Elimination via Reference Layers
# TEACH PHASE: Guidance refinement and file restructuring

worktree: /home/code/myagents/MyAgents-staging
liveplan: /home/code/myagents/MyAgentsGuidance-staging/docs/plans/live/251218MAG_staging/live/plan_live_teach.yml
completedplan: /home/code/myagents/MyAgentsGuidance-staging/docs/plans/live/251218MAG_staging/completed/plan_completed.yml

live-plans:
  - id: PHASE-2-FOUNDATION
    title: Phase 2 Foundation - Reference Layers and Atomic File Splitting
    description: |
      Implement Phase 2 of duplication elimination plan:
      - P1: Create reference-based input layers (NOT content bundles)
      - P4: Split test_strategies.yml into 8 atomic strategy files
      - P9: Split flutter-test-definitions.yml into 6-7 atomic files

      Target: Eliminate 4,240 lines of duplication while preserving interchangeable parts principle.

    phases:
      # ========================================
      # P4: SPLIT TEST STRATEGIES (2-3 days)
      # ========================================
      - name: "P4: Split Test Strategies"
        execution_groups:
          - execution: sequential
            agents:
              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - assets/definitions/test_strategies.yml
                  - docs/plans/live/251218MAG_staging/live/plan_live_build.yml
                guidance: |
                  Context: test_strategies.yml is a 318-line mega-file bundling 8 separate testing strategies.
                  This violates the "1 concept per file" interchangeable parts principle.

                  Task: Split test_strategies.yml into 8 atomic strategy files.

                  Instructions:
                  1. Read assets/definitions/test_strategies.yml
                  2. Create 8 new strategy definition files in assets/definitions/:
                     - strategy-agent-review-loop.yml (agent_review_loop strategy)
                     - strategy-agent-blind-test.yml (agent_blind_test strategy)
                     - strategy-user-simulation.yml (user_simulation strategy)
                     - strategy-test-suite.yml (test_suite strategy)
                     - strategy-fresh-environment.yml (fresh_environment strategy)
                     - strategy-multi-layer.yml (multi_layer strategy)
                     - strategy-documentation-validation.yml (documentation_validation strategy)
                     - strategy-user-acceptance.yml (user_acceptance strategy)
                  3. Each file should contain ONLY that strategy's definition
                  4. Preserve all content for each strategy
                  5. Keep format consistent with existing definition files

                  Why this matters: Enables agents to selectively load only the strategies they need,
                  reducing context waste and restoring true interchangeability.

                success_criteria:
                  - 8 new strategy definition files created in assets/definitions/
                  - Each file contains exactly one strategy definition
                  - All content from original test_strategies.yml preserved
                  - Files follow YAML definition format standard

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - agents/**/inputs.yml
                  - agents/**/process.yml
                guidance: |
                  Context: 11 agents currently reference test_strategies.yml. After splitting into 8 files,
                  these references need to point to specific strategy files.

                  Task: Update agent references from test_strategies.yml to specific strategy files.

                  Instructions:
                  1. Search for all references to test_strategies.yml:
                     - In agents/**/inputs.yml files
                     - In agents/**/process.yml files
                  2. For each reference, determine which specific strategy(ies) that agent needs
                  3. Update reference to point to specific strategy file(s)
                  4. Remove the generic test_strategies.yml reference

                  Example transformation:
                  Before: - location: "assets/definitions/test_strategies.yml"
                  After:  - location: "assets/definitions/strategy-agent-blind-test.yml"
                          - location: "assets/definitions/strategy-test-suite.yml"

                  Why this matters: Ensures agents load only the strategies they actually use,
                  reducing context bloat.

                success_criteria:
                  - All 11 agent references to test_strategies.yml updated
                  - Each agent references only the specific strategies it needs
                  - No broken references remain
                  - All agents can still access their required strategies

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - assets/definitions/test_strategies.yml
                guidance: |
                  Context: Original test_strategies.yml is now superseded by 8 atomic strategy files.

                  Task: Archive or delete the original test_strategies.yml file.

                  Instructions:
                  1. Verify all content has been migrated to the 8 new strategy files
                  2. Verify no agents still reference test_strategies.yml
                  3. Delete assets/definitions/test_strategies.yml

                  Why this matters: Prevents confusion about which file is the source of truth.

                success_criteria:
                  - test_strategies.yml file deleted
                  - All strategy content preserved in new atomic files
                  - No references to deleted file remain

      # ========================================
      # P9: SPLIT FLUTTER DEFINITIONS (2-3 days)
      # ========================================
      - name: "P9: Split Flutter Definitions"
        execution_groups:
          - execution: sequential
            agents:
              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - assets/definitions/flutter-test-definitions.yml
                  - assets/definitions/reward-hacking.yml
                  - docs/plans/live/251218MAG_staging/live/plan_live_build.yml
                guidance: |
                  Context: flutter-test-definitions.yml is a 93-line file bundling 8 distinct concepts.
                  Some sections (reward_hacking, test_roles) duplicate content from other files.

                  Task: Split flutter-test-definitions.yml into 5-7 atomic files and remove duplications.

                  Instructions:
                  1. Read assets/definitions/flutter-test-definitions.yml
                  2. Create new Flutter definition files in assets/definitions/:
                     - flutter-project-type.yml (project_type section)
                     - flutter-test-structure.yml (test_structure section)
                     - flutter-skipped-tests.yml (skipped_tests section)
                     - flutter-test-execution.yml (test_execution section)
                     - flutter-environments.yml (environments section)
                  3. Handle duplications:
                     - reward_hacking section: DELETE (reference existing reward-hacking.yml instead)
                     - test_roles section: Check if role-separation.yml covers this, otherwise create flutter-test-roles.yml
                  4. Each file should contain ONLY that concept

                  Why this matters: Eliminates duplication and restores 1-per-file principle for Flutter definitions.

                success_criteria:
                  - 5-7 new Flutter definition files created
                  - Each file contains exactly one concept
                  - reward_hacking duplication removed (uses existing reward-hacking.yml)
                  - test_roles handled appropriately
                  - All content preserved or properly referenced

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - agents/**/inputs.yml
                  - agents/**/process.yml
                guidance: |
                  Context: Flutter agents currently reference flutter-test-definitions.yml.
                  After splitting, they need to reference specific Flutter definition files.

                  Task: Update Flutter agent references to point to new atomic files.

                  Instructions:
                  1. Find all references to flutter-test-definitions.yml
                  2. Determine which specific Flutter definitions each agent needs
                  3. Update references to point to specific files
                  4. Add reference to assets/definitions/reward-hacking.yml if needed

                  Why this matters: Ensures Flutter agents load only what they need.

                success_criteria:
                  - All Flutter agent references updated
                  - Agents reference only the specific definitions they use
                  - No broken references
                  - reward-hacking.yml properly referenced where needed

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - assets/definitions/flutter-test-definitions.yml
                guidance: |
                  Context: Original flutter-test-definitions.yml is now superseded by atomic files.

                  Task: Delete the original flutter-test-definitions.yml file.

                  Instructions:
                  1. Verify all content migrated to new files
                  2. Verify duplications properly handled
                  3. Delete assets/definitions/flutter-test-definitions.yml

                success_criteria:
                  - flutter-test-definitions.yml deleted
                  - All content preserved in atomic files or properly referenced
                  - No references to deleted file remain

      # ========================================
      # P1: REFERENCE-BASED INPUT LAYERS (1 week)
      # ========================================
      - name: "P1: Reference-Based Input Layers"
        execution_groups:
          - execution: sequential
            agents:
              - type: teacher
                process: agents/teacher/teacher-process/process.yml
                inputs:
                  - agents/**/inputs.yml
                  - assets/definitions/
                  - assets/guidelines/
                  - docs/plans/live/251218MAG_staging/live/plan_live_build.yml
                guidance: |
                  Context: 31 agents duplicate the same input file references repeatedly.
                  Analysis shows 4,240 lines of duplication across agent inputs.yml files.

                  MANDATORY CONSTRAINT: Layers MUST be REFERENCE manifests, NOT content bundles.
                  This means layers list file paths, they do NOT merge file contents.

                  Task: Design reference-based input layer structure.

                  Instructions:
                  1. Analyze all 31 agent inputs.yml files
                  2. Identify common patterns of input references:
                     - Core system definitions (plans, domains, workflows, entrypoints, guidance)
                     - Core guidelines (fix-source, context-min, less-is-more, experiment-first)
                     - Category-specific guidelines (build, test, clean patterns)
                  3. Design 3-5 reference layer files structure:
                     - assets/inputs/core-system.yml (system definition references)
                     - assets/inputs/core-guidelines.yml (universal guideline references)
                     - assets/inputs/build-shared.yml (build category shared references)
                     - assets/inputs/test-shared.yml (test category shared references)
                     - etc.
                  4. Document how agents will reference layers (transitive loading mechanism)

                  Why this matters: Eliminates 85% of input duplication while preserving atomicity.

                success_criteria:
                  - Reference layer structure designed
                  - 3-5 reference layer files identified
                  - Each layer contains ONLY file path references, NO content merging
                  - Transitive loading mechanism documented
                  - Preserves "1 concept per file" (layers are indexes, not bundles)

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - assets/inputs/
                guidance: |
                  Context: Reference layer structure has been designed. Now create the actual layer files.

                  Task: Create reference layer manifest files.

                  Instructions:
                  1. Create assets/inputs/ directory if it doesn't exist
                  2. Create reference layer files as designed:
                     - Each layer file lists ONLY file paths (references)
                     - Use YAML list format
                     - Include description of what the layer represents
                  3. Format example:
                     ```yaml
                     # Core System Definitions Layer
                     description: "Fundamental system definitions used by all agents"
                     references:
                       - assets/definitions/plans.yml
                       - assets/definitions/domains.yml
                       - assets/definitions/workflows.yml
                       - assets/definitions/entrypoints.yml
                       - assets/definitions/guidance.yml
                     ```

                  Why this matters: Creates the shared reference infrastructure.

                success_criteria:
                  - All reference layer files created in assets/inputs/
                  - Each file contains ONLY path references (no content merging)
                  - Format is consistent and documented
                  - Files follow reference manifest pattern

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - agents/build/build-python/inputs.yml
                  - agents/test/test-builder/inputs.yml
                  - assets/inputs/
                guidance: |
                  Context: Reference layers are created. Before rolling out to all 31 agents,
                  pilot with 2-3 agents to validate the approach.

                  Task: Pilot reference layers with 2-3 agents.

                  Instructions:
                  1. Choose 2-3 representative agents for pilot:
                     - build-python (builder agent)
                     - test-builder (test agent)
                  2. Update their inputs.yml to reference layers:
                     - Replace duplicated references with layer references
                     - Verify transitive loading works
                  3. Test agents can still access all required inputs
                  4. Document any issues or improvements needed

                  Why this matters: Validates reference layer mechanism before full rollout.

                success_criteria:
                  - 2-3 pilot agents migrated to use reference layers
                  - Agents can access all inputs via layer references
                  - Transitive loading mechanism validated
                  - Any issues documented and resolved

              - type: teacher
                process: agents/teacher/teacher-update-assets/process.yml
                inputs:
                  - agents/**/inputs.yml
                  - assets/inputs/
                guidance: |
                  Context: Pilot successful. Now roll out reference layers to all 31 agents.

                  Task: Migrate all 31 agents to use reference layers.

                  Instructions:
                  1. For each of the remaining 29 agents:
                     - Identify which reference layers apply
                     - Update inputs.yml to reference layers
                     - Remove duplicated individual file references
                     - Keep agent-specific inputs inline
                  2. Verify each agent after migration
                  3. Track migration progress

                  Why this matters: Eliminates 4,240 lines of duplication across all agents.

                success_criteria:
                  - All 31 agents migrated to use reference layers
                  - Each agent references appropriate layers
                  - Agent-specific inputs preserved
                  - All agents can access required inputs
                  - 4,240 lines of duplication eliminated

# ==============================================================================
# PHASE 2 SUCCESS CRITERIA
# ==============================================================================

success_criteria:
  P4_test_strategies:
    - test_strategies.yml split into 8 atomic strategy files
    - 11 agent references updated to point to specific strategies
    - Original test_strategies.yml deleted
    - Agents can selectively load only needed strategies
    - Interchangeability restored

  P9_flutter_definitions:
    - flutter-test-definitions.yml split into 5-7 atomic files
    - reward_hacking duplication removed (references existing file)
    - test_roles duplication handled
    - Flutter agent references updated
    - Original flutter-test-definitions.yml deleted

  P1_reference_layers:
    - 3-5 reference layer files created in assets/inputs/
    - Layers use REFERENCE pattern (not content bundling)
    - Pilot with 2-3 agents successful
    - All 31 agents migrated to use layers
    - 4,240 lines of duplication eliminated
    - "1 concept per file" principle preserved

  overall:
    - Interchangeable parts principle fully maintained
    - No content bundling (only reference manifests)
    - Individual definition/guideline files remain atomic
    - Agents load only what they need (selective composition)
    - 4,240+ lines eliminated in Phase 2
