name: Properly implement the teacher agent
worktree: /home/code/myagents/MyAgents-teacher
branch: teacher
status: planning

description: |
  The teacher agent is a PATH BUILDER for AI coding agents.

  Core philosophy:
  "You are a path builder for AI coding agents. You build paths for the agents to follow,
  fences to prevent them walking off the path, and sign posts to help them choose the
  right path. You should treat agents like trained animals - while you do not have control
  over the training or the initial instructions provided to the animals, you do have
  control over the path you set before them."

  What the teacher agent controls:
  - PATHS: Agent process files (process.yml) - the steps agents follow
  - FENCES: Validation rules, guardrails, constraints in process files
  - SIGNPOSTS: Definitions, examples, guidance embedded in process files

  What the teacher agent does NOT control:
  - The LLM's training
  - The system prompts/initial instructions
  - The agent's reasoning capabilities

  The teacher agent works by SHAPING THE ENVIRONMENT, not the agent.

  Primary outputs:
  - Improved process.yml files (clearer paths)
  - Better definitions.yml files (clearer signposts)
  - Guardrails and validation steps (fences)
  - Examples that demonstrate correct behavior

  Log analysis is a TOOL for understanding where paths need improvement,
  not the primary purpose.

objectives:
  - Create/improve agent process files (paths)
  - Add guardrails and validation steps to processes (fences)
  - Improve definitions and examples (signposts)
  - Analyze agent logs to identify where paths are unclear
  - Generate specific, actionable improvements to process files
  - Escalate to Compliance when fences (hard enforcement) are needed

# The teacher agent shapes the environment agents operate in
# Logs tell us where the environment needs improvement
# Output is always changes to process files, definitions, or examples

phases:
  # ========================================
  # PHASE 1: CORE DOMAIN - PATH BUILDING
  # ========================================
  - name: Path Building Domain
    description: |
      Create the domain modules for building and improving agent paths.
      The path builder works with process.yml files, definitions, and examples.
    execution_groups:
      - execution: sequential
        name: Process file manipulation
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/teacher/process.yml
            guidance: |
              Context: The teacher agent needs to read, understand, and modify agent process files.
              Process files (process.yml) define the PATHS agents follow. They contain:
              - goal: What the agent is trying to achieve
              - inputs: Files the agent must read
              - steps: Sequential instructions the agent follows
              - guidelines: Guardrails and constraints
              - outputs: What the agent produces

              Instructions:
              1. Create directory: backend/services/agents/domains/path_builder/
              2. Create __init__.py with public exports
              3. Create process_parser.py with:
                 - ProcessFile dataclass (goal, inputs, steps, guidelines, outputs, raw_yaml)
                 - parse_process_file(path: Path) -> ProcessFile
                 - validate_process_structure(process: ProcessFile) -> List[str] (issues)
                 - find_all_process_files(agent_dir: Path) -> List[Path]
              4. Create process_improver.py with:
                 - Improvement dataclass (location, issue, suggestion, severity)
                 - analyze_process_clarity(process: ProcessFile) -> List[Improvement]
                 - analyze_process_completeness(process: ProcessFile) -> List[Improvement]
                 - suggest_guardrails(process: ProcessFile, friction_evidence: List) -> List[str]
                 - apply_improvement(process: ProcessFile, improvement: Improvement) -> ProcessFile

              The path builder focuses on PROCESS FILES as the primary output.
              Every recommendation should map to a specific change in a process file.

              Files to create:
              - backend/services/agents/domains/path_builder/__init__.py
              - backend/services/agents/domains/path_builder/process_parser.py
              - backend/services/agents/domains/path_builder/process_improver.py

            success_criteria:
              - Can parse all process.yml files in frontend/agents/
              - Identifies structural issues in process files
              - Generates specific improvements (not vague suggestions)
              - Improvements map to exact locations in process files

          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/teacher/definitions.yml
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/orchestration/definitions.yml
            guidance: |
              Context: Definitions and examples are SIGNPOSTS that help agents make correct decisions.
              The teacher agent needs to identify missing or unclear definitions and create better examples.

              Instructions:
              1. Create definitions_analyzer.py in path_builder/ with:
                 - Definition dataclass (term, description, examples, usage_context)
                 - parse_definitions_file(path: Path) -> Dict[str, Definition]
                 - find_undefined_terms(process: ProcessFile, definitions: Dict) -> List[str]
                 - suggest_definition(term: str, usage_context: str) -> Definition
                 - analyze_definition_quality(definition: Definition) -> List[str] (issues)
              2. Create example_builder.py in path_builder/ with:
                 - Example dataclass (name, description, demonstrates, code_or_yaml)
                 - analyze_example_quality(example: Example) -> List[str] (issues per definitions.yml)
                 - create_example_for_pattern(pattern_name: str, context: str) -> Example
                 - Implement pedagogical quality checks from teacher/definitions.yml:
                   - ONE clear pattern (not everything at once)
                   - Realistic, recognizable use cases
                   - Meaningful field values (not "test" or "placeholder")
                   - Clear comments explaining WHY

              Signposts must be DISCOVERABLE - they belong IN process files,
              not in separate documentation agents won't find.

              Files to create:
              - backend/services/agents/domains/path_builder/definitions_analyzer.py
              - backend/services/agents/domains/path_builder/example_builder.py

            success_criteria:
              - Identifies undefined terms used in process files
              - Suggests clear, specific definitions
              - Creates examples that teach (pedagogically sound)
              - Examples are realistic, not abstract placeholders

  # ========================================
  # PHASE 2: FEEDBACK LOOP - LOG ANALYSIS
  # ========================================
  - name: Feedback Loop Domain
    description: |
      Log analysis is how the teacher learns where paths need improvement.
      Logs show where agents went off-path, hit fences, or missed signposts.
      The output is always "what to fix in the process files", not just "what went wrong".
    execution_groups:
      - execution: sequential
        name: Log analysis for path improvement
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/
              - /home/code/myagents/MyAgents-teacher/docs/agent_logs/
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/teacher/definitions.yml
            guidance: |
              Context: Logs tell us where the path failed. Every log pattern should map to
              a specific improvement in a process file, definition, or example.

              Log format: ISO8601_TIMESTAMP | MESSAGE
              Example: 2025-12-02T07:06:12.536252 | === Starting coding agent run ===

              Instructions:
              1. Create directory: backend/services/agents/domains/feedback_loop/
              2. Create __init__.py with public exports
              3. Create log_parser.py with:
                 - LogEntry dataclass (timestamp, message, entry_type)
                 - parse_log_file(path: Path) -> List[LogEntry]
                 - extract_agent_decisions(entries: List[LogEntry]) -> List[Dict]
                 - extract_errors(entries: List[LogEntry]) -> List[LogEntry]
                 - extract_tool_usage(entries: List[LogEntry]) -> Dict[str, int]
              4. Create path_diagnostic.py with:
                 - PathIssue dataclass (issue_type, description, log_evidence, affected_process, suggested_fix)
                 - diagnose_path_issues(log_entries: List[LogEntry], process: ProcessFile) -> List[PathIssue]
                 - Issue types:
                   - unclear_step: Agent struggled with a step -> clarify step wording
                   - missing_guardrail: Agent went off-path -> add fence/validation
                   - missing_signpost: Agent made wrong choice -> add definition/example
                   - dead_end: Agent got stuck -> add escape hatch or clearer direction

              KEY PRINCIPLE: Every diagnosis must include a SUGGESTED FIX that maps to
              a specific change in a process file. "Agent struggled" is not useful.
              "Add validation step after step 3 to verify X" is useful.

              Files to create:
              - backend/services/agents/domains/feedback_loop/__init__.py
              - backend/services/agents/domains/feedback_loop/log_parser.py
              - backend/services/agents/domains/feedback_loop/path_diagnostic.py

            success_criteria:
              - Can parse real agent logs from docs/agent_logs/
              - Every identified issue maps to a specific process file location
              - Suggested fixes are actionable (not "improve clarity")
              - Connects log evidence to process file improvements

  # ========================================
  # PHASE 3: ESCALATION TO COMPLIANCE
  # ========================================
  - name: Escalation Domain
    description: |
      When signposts (guidance) aren't enough, the teacher escalates to Compliance
      for fences (hard enforcement). This happens when agents repeatedly ignore guidance.
    execution_groups:
      - execution: sequential
        name: Escalation handler
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/teacher/definitions.yml
            guidance: |
              Context: From teacher/definitions.yml:
              - GUIDANCE (Teacher): Subjective, contextual, requires judgment
              - ENFORCEMENT (Compliance): Binary, programmable, can be validated

              When to escalate:
              - Agents see guidance but consistently ignore it (5+ times)
              - Same error across multiple executions
              - Pattern is structurally detectable (validator possible)

              Instructions:
              1. Create directory: backend/services/agents/domains/escalation/
              2. Create __init__.py with public exports
              3. Create escalation_handler.py with:
                 - EscalationRecord dataclass (timestamp, pattern, evidence, proposed_validator, severity)
                 - should_escalate(issue: PathIssue, occurrence_count: int) -> bool
                 - create_escalation(issue: PathIssue, evidence: List[str]) -> EscalationRecord
                 - write_escalation(record: EscalationRecord) -> bool
                 - Escalation file: ~/.config/myagents/escalations/compliance_issues.jsonl
              4. Create boundary_checker.py with:
                 - is_guidance_issue(issue: PathIssue) -> bool (requires judgment)
                 - is_enforcement_issue(issue: PathIssue) -> bool (can be validated)
                 - propose_validator(issue: PathIssue) -> str (validator description)

              Boundary test: If human judgment required -> guidance (teacher fixes).
              If programmatically checkable -> enforcement (escalate to compliance).

              Files to create:
              - backend/services/agents/domains/escalation/__init__.py
              - backend/services/agents/domains/escalation/escalation_handler.py
              - backend/services/agents/domains/escalation/boundary_checker.py

            success_criteria:
              - Correctly distinguishes guidance vs enforcement issues
              - Escalation threshold works (5+ occurrences)
              - Proposed validators are specific and implementable
              - Records written to JSONL for Compliance agent to read

  # ========================================
  # PHASE 4: WORKFLOW & CLI
  # ========================================
  - name: Workflow and CLI Integration
    description: |
      Create the teacher agent workflow that orchestrates path building and improvement.
      The CLI provides access to teacher functions.
    execution_groups:
      - execution: sequential
        name: Teacher workflow
        agents:
          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/workflows/coding_agent.py
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/path_builder/
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/feedback_loop/
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/domains/escalation/
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/teacher/process.yml
            guidance: |
              Context: Create the teacher agent workflow. The workflow can operate in different modes:
              - analyze: Analyze logs and suggest process improvements
              - improve: Apply improvements to process files
              - audit: Check process files for quality issues

              Instructions:
              1. Create file: backend/services/agents/workflows/teacher_agent.py
              2. Define TeacherState(TypedDict) with fields:
                 - mode: str (analyze/improve/audit)
                 - target_agent: Optional[str]
                 - target_process: Optional[Path]
                 - log_entries: List[LogEntry]
                 - path_issues: List[PathIssue]
                 - improvements: List[Improvement]
                 - escalations: List[EscalationRecord]
                 - report: str
              3. Create workflow nodes:
                 - load_context: Load process files and optionally logs
                 - analyze_paths: Check process files for clarity/completeness
                 - diagnose_from_logs: If logs provided, diagnose path issues
                 - generate_improvements: Create specific improvements
                 - check_escalations: Determine if any need compliance escalation
                 - apply_improvements: Optionally apply changes (with confirmation)
                 - generate_report: Summary of findings and changes
              4. Create entrypoints:
                 - run_teacher_analyze(target_agent, log_date) -> analysis report
                 - run_teacher_improve(process_path, improvements) -> modified process
                 - run_teacher_audit(agent_dir) -> audit report

              The teacher SHAPES process files. Every run should produce actionable output
              that improves the paths agents follow.

              Files to create:
              - backend/services/agents/workflows/teacher_agent.py

            success_criteria:
              - Workflow compiles with LangGraph
              - Analyze mode produces specific improvement suggestions
              - Improvements reference exact process file locations
              - Report is actionable, not just descriptive

          - type: builder
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/cli/myagents_cli.py
              - /home/code/myagents/MyAgents-teacher/src/myagents/backend/services/agents/workflows/teacher_agent.py
            guidance: |
              Context: Add teacher commands to CLI for path building and analysis.

              Instructions:
              1. Add cmd_teacher() with subcommands:
                 - myagents teacher analyze --agent coding [--date YYYYMMDD]
                   Analyze agent behavior and suggest process improvements
                 - myagents teacher audit [--agent AGENT | --all]
                   Audit process files for quality issues
                 - myagents teacher improve PROCESS_FILE
                   Interactive improvement session for a process file
                 - myagents teacher list-processes
                   List all agent process files
              2. Output format should show:
                 - Issue location (file:line or step number)
                 - Issue description
                 - Suggested fix (specific, actionable)
                 - Severity (CRITICAL/HIGH/MEDIUM/LOW)

              Example output:
              ```
              TEACHER ANALYSIS: coding_agent

              PATH ISSUES FOUND: 3

              [HIGH] frontend/agents/builder/process.yml:step[4]
                Issue: Step lacks validation checkpoint
                Evidence: 12 log entries show agents proceeding with invalid state
                Fix: Add validation step "Verify model compiles before proceeding"

              [MEDIUM] frontend/agents/builder/definitions.yml
                Issue: Term "model-first" used in process but not defined
                Fix: Add definition with example showing correct pattern
              ```

              Files to modify:
              - frontend/cli/myagents_cli.py

            success_criteria:
              - All subcommands work
              - Output shows specific file locations and fixes
              - Improvements are copy-paste ready where possible

