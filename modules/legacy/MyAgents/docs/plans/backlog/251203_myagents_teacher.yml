              - Every improvement references a specific location
              - Escalations are correctly categorized

  # ========================================
  # PHASE 6: VALIDATION
  # ========================================
  - name: Validation Phase
    description: |
      Validate the teacher agent can actually improve agent paths.
    execution_groups:
      - execution: sequential
        name: End-to-end validation
        agents:
          - type: test
            inputs:
              - /home/code/myagents/MyAgents-teacher/src/myagents/frontend/agents/
              - /home/code/myagents/MyAgents-teacher/docs/agent_logs/
            guidance: |
              Validate the teacher agent's core value proposition:

              1. Run teacher audit on builder agent process
              2. Verify output includes specific, actionable improvements
              3. Apply one improvement to the process file
              4. Verify the improvement makes sense (manual review)

              5. Run teacher analyze on coding agent with recent logs
              6. Verify diagnosed issues map to specific process file locations
              7. Verify suggested fixes are implementable

              The test passes if:
              - Teacher produces improvements that a human would agree with
              - Improvements are specific enough to implement without guessing
              - File locations are accurate

            success_criteria:
              - Teacher identifies real issues in process files
              - Improvements are specific and actionable
              - A human reviewer would agree with the suggestions
