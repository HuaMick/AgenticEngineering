# Backlog Plan: RemoteAgents Voice Backend Service
# Created: 2025-12-09
# Related: 251203_myagentsfrontend_voice-feature.yml (frontend UI)

name: Voice Backend Service (Deepgram Integration)
project: RemoteAgents
branch: voice-backend
status: backlog
priority: HIGH

description: |
  Backend voice transcription service for RemoteAgents following DDD pattern.
  Handles Deepgram API integration server-side to protect API keys.
  Audio streams from Flutter frontend via relay, transcripts returned E2E encrypted.

  Architecture follows existing RemoteAgents patterns:
  - Domain layer: VoiceSession entity, AudioFrame value objects
  - Workflow layer: VoiceSessionWorkflow orchestration
  - Infrastructure: DeepgramClient, AudioProcessor
  - Protocol: New message types for voice (VoiceAudioFrame, VoiceTranscript, VoiceControl)

dependencies:
  requires:
    - RemoteAgents core (merged to main)
    - Relay service (complete)
    - Terminal service patterns (reference)
  independent_of:
    - MyAgentsFrontend voice UI (can develop in parallel)

objectives:
  - Add voice service to RemoteAgents following DDD pattern
  - Integrate Deepgram Nova-3 streaming API server-side
  - Define voice protocol messages (extend existing 13 message types)
  - E2E encrypt all audio data using existing NaCl pattern
  - Provide real-time transcript streaming back to client

# ==============================================================================
# ARCHITECTURE
# ==============================================================================

architecture:
  data_flow: |
    Flutter App (audio capture)
        ↓ WSS (E2E encrypted VoiceAudioFrame)
    Relay Service (route voice messages)
        ↓ WSS (E2E encrypted)
    Desktop Voice Service
        ↓ Deepgram Streaming API (server-side, API key protected)
        ↓ Transcript received
    Desktop Voice Service
        ↓ WSS (E2E encrypted VoiceTranscript)
    Relay Service
        ↓ WSS
    Flutter App (display transcript)

  service_structure: |
    src/agent_remote/services/voice/
    ├── __init__.py
    ├── domains/
    │   ├── __init__.py
    │   ├── voice_session/
    │   │   ├── __init__.py
    │   │   ├── entities.py           # VoiceSession entity
    │   │   ├── value_objects.py      # AudioFormat, TranscriptResult
    │   │   ├── repository.py         # VoiceSessionRepository protocol
    │   │   └── exceptions.py         # VoiceSessionError, etc.
    │   └── audio_processor/
    │       ├── __init__.py
    │       └── processor.py          # Audio format conversion
    │
    ├── workflows/
    │   ├── __init__.py
    │   └── voice_workflow.py         # VoiceWorkflow orchestration
    │
    ├── infrastructure/
    │   ├── __init__.py
    │   ├── deepgram_client.py        # Deepgram SDK wrapper
    │   ├── in_memory_repository.py   # VoiceSession storage
    │   └── audio_converter.py        # PCM/Opus conversion
    │
    └── entrypoints/
        ├── __init__.py
        └── cli.py                    # agent-remote-voice CLI

# ==============================================================================
# PROTOCOL MESSAGES
# ==============================================================================

protocol_messages:
  new_types:
    - name: VoiceAudioFrame
      type: "voice.audio_frame"
      direction: client → desktop
      fields:
        - session_id: str
        - sequence: int           # Frame sequence number
        - codec: str              # "pcm16" or "opus"
        - sample_rate: int        # 16000
        - channels: int           # 1 (mono)
        - data: bytes             # Base64 encoded audio chunk
        - timestamp: datetime
      notes: "Encrypted in EncryptedBlob like all other messages"

    - name: VoiceTranscript
      type: "voice.transcript"
      direction: desktop → client
      fields:
        - session_id: str
        - is_final: bool          # true = final, false = interim
        - transcript: str         # Transcribed text
        - confidence: float       # 0.0 - 1.0
        - timestamp: datetime
      notes: "Interim results for real-time feedback, final for complete transcript"

    - name: VoiceControl
      type: "voice.control"
      direction: both
      fields:
        - session_id: str
        - action: str             # "start", "stop", "cancel"
        - timestamp: datetime
      notes: "Control voice session lifecycle"

    - name: VoiceStatus
      type: "voice.status"
      direction: desktop → client
      fields:
        - session_id: str
        - status: str             # "ready", "listening", "transcribing", "error"
        - error_message: str      # Optional error details
        - timestamp: datetime
      notes: "Status updates for UI state management"

  integration:
    location: src/agent_remote/shared/protocol/messages.py
    pattern: "Add to existing MessageType enum and message classes"

# ==============================================================================
# BUILD PHASES
# ==============================================================================

phases:
  - name: Phase 1 - Domain Layer
    priority: CRITICAL
    tasks:
      - id: VOICE-001
        title: "Voice Session Entity"
        file: src/agent_remote/services/voice/domains/voice_session/entities.py
        description: |
          Create VoiceSession entity with state machine:
          - States: CREATED, LISTENING, TRANSCRIBING, COMPLETED, ERROR
          - Track session lifecycle, audio buffer, transcript accumulation
          - Validate state transitions
        success_criteria:
          - VoiceSession entity with all states
          - State transitions validated
          - Domain exceptions defined

      - id: VOICE-002
        title: "Voice Value Objects"
        file: src/agent_remote/services/voice/domains/voice_session/value_objects.py
        description: |
          Create value objects:
          - AudioFormat(codec, sample_rate, channels, bit_depth)
          - TranscriptResult(text, is_final, confidence, latency_ms)
          - VoiceSessionId (UUID wrapper)
        success_criteria:
          - Immutable value objects
          - Validation on construction

      - id: VOICE-003
        title: "Voice Session Repository Protocol"
        file: src/agent_remote/services/voice/domains/voice_session/repository.py
        description: |
          Define repository protocol (interface):
          - create(session_id) -> VoiceSession
          - get(session_id) -> Optional[VoiceSession]
          - update(session) -> None
          - delete(session_id) -> None

  - name: Phase 2 - Infrastructure Layer
    priority: CRITICAL
    tasks:
      - id: VOICE-004
        title: "Deepgram Client Wrapper"
        file: src/agent_remote/services/voice/infrastructure/deepgram_client.py
        description: |
          Wrap Deepgram SDK for streaming transcription:
          - Load API key from environment (DEEPGRAM_API_KEY)
          - Configure Nova-3 model with smart_format, interim_results
          - Provide async streaming interface
          - Handle connection errors, retries
          - Measure and log latency
        dependencies:
          - deepgram-sdk>=3.0.0
        success_criteria:
          - Streaming connection to Deepgram
          - Interim + final transcripts received
          - Latency <500ms measured
          - Error handling for network/API issues

      - id: VOICE-005
        title: "In-Memory Repository"
        file: src/agent_remote/services/voice/infrastructure/in_memory_repository.py
        description: |
          Implement VoiceSessionRepository protocol:
          - Thread-safe storage (asyncio.Lock)
          - Session expiry (configurable timeout)
          - Cleanup of expired sessions

      - id: VOICE-006
        title: "Audio Converter"
        file: src/agent_remote/services/voice/infrastructure/audio_converter.py
        description: |
          Handle audio format conversion:
          - Accept PCM16 (from Flutter record package)
          - Convert to format Deepgram expects
          - Validate audio format parameters

  - name: Phase 3 - Workflow Layer
    priority: CRITICAL
    tasks:
      - id: VOICE-007
        title: "Voice Workflow"
        file: src/agent_remote/services/voice/workflows/voice_workflow.py
        description: |
          Orchestrate voice session lifecycle:
          - start_session(terminal_session_id) -> VoiceSession
          - handle_audio_frame(session_id, frame) -> None
          - stop_session(session_id) -> TranscriptResult
          - Coordinate domain + infrastructure
          - Emit VoiceTranscript messages via callback
        success_criteria:
          - Full session lifecycle managed
          - Audio frames streamed to Deepgram
          - Transcripts emitted in real-time
          - Clean session teardown

  - name: Phase 4 - Protocol Integration
    priority: HIGH
    tasks:
      - id: VOICE-008
        title: "Add Voice Message Types"
        file: src/agent_remote/shared/protocol/messages.py
        description: |
          Extend existing protocol with voice messages:
          - VoiceAudioFrame, VoiceTranscript, VoiceControl, VoiceStatus
          - Add to deserialize_message() routing
          - Ensure E2E encryption compatibility

      - id: VOICE-009
        title: "Integrate with Terminal Service"
        file: src/agent_remote/services/terminal/workflows/session_workflow.py
        description: |
          Extend SessionWorkflow to handle voice:
          - Route voice messages to VoiceWorkflow
          - Voice uses same session_id as terminal
          - Voice transcripts can optionally send to terminal input

  - name: Phase 5 - CLI Entrypoint
    priority: MEDIUM
    tasks:
      - id: VOICE-010
        title: "Voice CLI"
        file: src/agent_remote/services/voice/entrypoints/cli.py
        description: |
          Add CLI commands:
          - agent-remote-voice start (standalone voice service)
          - Or integrate into existing agent-remote-terminal CLI
          - Environment config: DEEPGRAM_API_KEY

  - name: Phase 6 - Testing
    priority: HIGH
    tasks:
      - id: VOICE-011
        title: "Unit Tests"
        files:
          - tests/services/voice/test_voice_session.py
          - tests/services/voice/test_voice_workflow.py
          - tests/services/voice/test_deepgram_client.py
        description: |
          Test voice service components:
          - Domain entity state transitions
          - Workflow orchestration (mock Deepgram)
          - Protocol message serialization
          - E2E encryption of audio frames

      - id: VOICE-012
        title: "Integration Tests"
        file: tests/integration/test_voice_e2e.py
        description: |
          End-to-end voice tests:
          - Flutter -> Relay -> Voice Service -> Deepgram (mock)
          - Verify transcript delivery
          - Test error scenarios

# ==============================================================================
# DEPENDENCIES
# ==============================================================================

new_dependencies:
  pyproject_toml:
    - "deepgram-sdk>=3.0.0"  # Deepgram Python SDK

  environment_variables:
    - DEEPGRAM_API_KEY  # Required for Deepgram API access

# ==============================================================================
# SUCCESS CRITERIA
# ==============================================================================

success_criteria:
  - Voice service follows RemoteAgents DDD pattern
  - Deepgram API key protected server-side (not in Flutter app)
  - Audio frames E2E encrypted through relay
  - Real-time transcripts (<500ms latency)
  - Interim results for UI feedback
  - Clean integration with existing terminal session
  - All tests passing

