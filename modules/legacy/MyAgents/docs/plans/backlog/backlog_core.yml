# MULTI-AGENT COORDINATION
# ==============================================================================

multi_agent:
  - id: MA-001
    description: Implement basic multi-agent coordination (Planner + Coder)
    success_criteria:
      - Supervisor pattern coordinates two agents
      - Planner agent creates implementation plan
      - Coder agent executes plan
      - Agents communicate via shared state
      - End-to-end test verifies coordination works
    priority: deferred
    dependencies: [AGENT-001, AGENT-002, TOOL-001, TOOL-002]
    source: 20251021_plans_backlog.md
    effort: 4-6 hours
    notes: |
      Defer until single agent works well.
      Start simple with two agents: Planner + Coder.
      Use Supervisor pattern for coordination.
      Add more agents only when needed.
    deferred_reason: |
      Single agent architecture needs more validation before multi-agent.
      Current focus is on improving tool quality and agent behavior.

# ==============================================================================
# ADVANCED FEATURES
# ==============================================================================

advanced:
  - id: ADV-001
    description: Implement persistent state for multi-user support
    success_criteria:
      - Conversation state saved to SQLite
      - State can be retrieved across sessions
      - Multi-user support with session isolation
      - Recovery from crashes preserves state
    priority: deferred
    dependencies: []
    source: 20251021_plans_backlog.md
    effort: 2-3 hours
    notes: |
      Options: SQLite (simple) or Redis (if needed).
    deferred_reason: |
      Current in-memory state is sufficient for single-user development.
      No identified need for multi-user support yet.
      Defer until concrete use case emerges.

  - id: ADV-002
    description: Implement human-in-the-loop approval for destructive ops
    success_criteria:
      - File deletion requires approval
      - Git push requires approval
      - Approval mechanism integrated with CLI
      - Timeout for approval requests
    priority: deferred
    dependencies: [TOOL-004, TOOL-003]
    source: 20251021_plans_backlog.md
    effort: 2-3 hours
    notes: |
      Don't assume users need hand-holding.
      Only add if users request it.
    deferred_reason: |
      Destructive operations not implemented yet.
      User feedback needed to determine if this is wanted.
      May be unnecessary friction in development workflow.

  - id: ADV-003
    description: Implement RAG for large codebase semantic search
    success_criteria:
      - Codebase indexed with embeddings
      - Semantic search returns relevant code
      - Integration with existing search tool
      - Performance acceptable for large repos (>100k LOC)
    priority: deferred
    dependencies: [TOOL-002]
    source: 20251021_plans_backlog.md
    effort: 4-6 hours
    notes: |
      Defer until grep/search proves insufficient for large repos.
    deferred_reason: |
      Current grep-based search is sufficient for most use cases.
      RAG adds complexity and infrastructure requirements.
      No evidence yet that semantic search is needed.

