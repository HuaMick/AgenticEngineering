# ==============================================================================
# SUMMARY
# ==============================================================================

summary:
  total_items: 10
  by_category:
    github_integration: 2
    agent_workflows: 3
    migration: 2
    validation: 1
    enhancements: 2
  worktree: github_issues
  total_effort: 40-55 hours
  notes: |
    These items enable decentralized planning with individual GitHub Issues tickets.
    Each agent task becomes its own issue that agents can read and update independently.
    
    **Decentralized Planning Approach:**
    - Each agent task = one GitHub Issue
    - Agents read their assigned issue to discover all context (guidance, success criteria, inputs)
    - Agents update their issue as they work (checkboxes, comments, Progress section)
    - Orchestration agent queries issues to discover what work needs to be done
    - No centralized YAML files - planning is distributed across issues
    
    **Implementation Strategy:**
    1. **Prototype First** (GH-008): Manually create issues for one plan, test agent workflows
    2. **Build Foundation** (GH-001, GH-002): API wrapper and issue templates
    3. **Update Agents** (GH-003, GH-004, GH-005): Planner creates issues, orchestration queries, agents update
    4. **Migration** (GH-006): Script to convert existing YAML plans to issues
    5. **Validation** (GH-007): Comprehensive tests for all workflows
    6. **Enhancements** (GH-009, GH-010): Automation and visualization (optional)
    
    **Key Benefits:**
    - **Decentralized**: Each agent works independently on their own issue
    - **Self-discovery**: Agents read issue body to understand task (no file paths needed)
    - **Real-time updates**: Agents update issues as they work (visible in GitHub UI)
    - **Better visibility**: Progress visible in GitHub Issues UI, no need to read YAML files
    - **Native integration**: Uses GitHub's built-in issue tracking (no third-party dependencies)
    - **Scalable**: Can handle many parallel agent tasks without file conflicts
    
    **Key Changes from Current System:**
    - Agents receive issue numbers (not YAML file paths)
    - Agents read issues via GitHub API (not file system)
    - Agents update issues directly (not YAML files)
    - Orchestration queries issues to discover work (not reading YAML files)
    - Planning distributed across issues (not centralized in YAML files)
    
    **Risks & Mitigations:**
    - **GitHub API rate limits**: Implement retry logic and caching (GH-001)
    - **Issue body parsing**: Use robust markdown parsing library (GH-001, GH-005)
    - **Label conventions**: Document and enforce consistent labels (GH-002)
    - **Migration complexity**: Start with prototype, then incremental migration (GH-008, GH-006)
    - **Backward compatibility**: Keep YAML support during transition (GH-003, GH-004)
    
    **Priority Items:**
    - High: GH-001, GH-002, GH-003, GH-004, GH-005, GH-008 (core functionality)
    - Medium: GH-006, GH-007 (migration and validation)
    - Low: GH-009, GH-010 (enhancements, can be deferred)





