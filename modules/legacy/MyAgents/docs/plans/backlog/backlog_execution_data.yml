# Backlog Plan - Execution Data Storage
# Last Updated: 2025-12-01
# Items for automatic execution data capture and storage

# ==============================================================================
# EXECUTION DATA CAPTURE
# ==============================================================================

execution_capture:
  - id: EXEC-001
    description: Implement automatic execution data capture for orchestration agent
    success_criteria:
      - All spawned agent commands automatically logged
      - Command outputs captured (stdout, stderr, exit codes)
      - Test execution results automatically recorded
      - File changes tracked (before/after diffs)
      - Timestamps recorded for all operations
      - Execution context preserved (working directory, environment variables)
    priority: high
    dependencies: []
    effort: 4-6 hours
    notes: |
      Current approach relies on orchestration agent self-reporting execution data.
      This is error-prone and can miss details or be incomplete.
      
      Automatic capture ensures:
      - No reliance on agent memory or self-reporting
      - Complete execution history
      - Accurate command outputs
      - Reproducible audit trail
      
      Implementation options:
      - Wrap agent spawning to capture commands/outputs
      - Hook into tool execution layer
      - Use process monitoring/logging
    source: 251201_myagents_main-uat-guidance-audit-extension.md
    related_issues:
      - "UAT guidance plan identified that test agents ran --help instead of functional tests"
      - "Audit agent needs execution evidence to validate user story testing"

  - id: EXEC-002
    description: Store execution data in structured format (JSON/YAML)
    success_criteria:
      - Execution data stored per orchestration session
      - Structured format enables querying and analysis
      - Data includes: commands, outputs, test results, file changes, timestamps
      - Human-readable format for debugging
      - Machine-readable format for audit agent consumption
    priority: high
    dependencies: [EXEC-001]
    effort: 2-3 hours
    notes: |
      Storage location options:
      - docs/execution_data/<session_id>/execution.json
      - .myagents/execution/<session_id>/execution.json
      - SQLite database for querying
      
      Format should include:
      - Session metadata (timestamp, user goal, plan path)
      - Agent spawns (agent type, prompt, outputs)
      - Commands executed (command, working dir, outputs, exit code)
      - File changes (file path, before/after content, diff)
      - Test results (package, pass/fail/skip, details)
      - User story execution (story ID, journey steps, commands run, outcomes)

  - id: EXEC-003
    description: Integrate execution data storage with audit agent
    success_criteria:
      - Audit agent reads execution data from storage (not just prompt)
      - Execution data automatically passed to audit agent
      - Audit agent can query execution history
      - Validation checks use stored data, not self-reported data
      - User story validation uses stored execution evidence
    priority: high
    dependencies: [EXEC-001, EXEC-002]
    effort: 2-3 hours
    notes: |
      Current implementation: Orchestration agent passes execution data in prompt.
      Future: Audit agent reads from storage, orchestration agent just provides session ID.
      
      Benefits:
      - Audit agent has complete execution history
      - Can validate against actual commands/outputs
      - No reliance on orchestration agent memory
      - Can detect discrepancies between reported and actual execution

# ==============================================================================
# USER STORY EXECUTION TRACKING
# ==============================================================================

user_story_tracking:
  - id: EXEC-004
    description: Track user story journey step execution automatically
    success_criteria:
      - Each user story journey step execution automatically logged
      - Commands run for each step captured
      - Expected outcomes verified and recorded
      - Testing layers executed (local, docker, cloud_build) tracked
      - Evidence of functional testing (not just --help) captured
      - Journey step pass/fail status determined from execution data
    priority: high
    dependencies: [EXEC-001, EXEC-002]
    effort: 3-4 hours
    notes: |
      Current problem: Test agents can report PASS but only run --help commands.
      Solution: Automatically track which commands were run for each journey step.
      
      Execution tracking should capture:
      - User story ID and journey step number
      - Expected action from user story
      - Actual commands executed
      - Command outputs and exit codes
      - Outcome verification (how expected outcome was verified)
      - Testing layer (local/docker/cloud_build)
      
      Audit agent can then validate:
      - Were functional commands run (not just --help)?
      - Were expected outcomes verified?
      - Were all testing layers executed as specified?

  - id: EXEC-005
    description: Detect help-only testing vs functional testing automatically
    success_criteria:
      - System detects when only --help commands were run
      - Flags user stories as INVALID if only help validation performed
      - Compares executed commands against user story journey steps
      - Reports discrepancies between requirements and execution
      - Prevents false PASS results
    priority: high
    dependencies: [EXEC-004]
    effort: 2-3 hours
    notes: |
      Detection logic:
      - Parse user story journey steps to extract required commands
      - Compare against actual commands executed
      - Flag if only --help variants were run when functional commands required
      - Check for "infrastructure/help validation" notes that override requirements
      
      Example:
      - User story says: "Run `myagents studio start`"
      - Execution shows: "myagents studio --help"
      - System flags: INVALID - only help validation, functional test not executed

# ==============================================================================
# EXECUTION DATA QUERYING & ANALYSIS
# ==============================================================================

querying_analysis:
  - id: EXEC-006
    description: Add query interface for execution data
    success_criteria:
      - Query execution data by session ID
      - Query by user story ID (all executions of a story)
      - Query by agent type (all spawns of a specific agent)
      - Query by test result (all failed tests)
      - Query by time range
      - Export execution data for analysis
    priority: medium
    dependencies: [EXEC-002]
    effort: 3-4 hours
    notes: |
      Use cases:
      - "Show me all executions of US-STUDIO-001"
      - "What commands were run in session X?"
      - "Which user stories failed in the last week?"
      - "Compare execution data between two sessions"
      
      Implementation:
      - CLI command: `myagents execution query <criteria>`
      - Or use SQLite queries if using database storage
      - Or simple grep/JSON parsing if using file storage

  - id: EXEC-007
    description: Add execution data analysis and reporting
    success_criteria:
      - Generate execution summary reports
      - Identify patterns (common failures, skipped steps)
      - Track user story pass rates over time
      - Compare execution data across sessions
      - Flag anomalies (unusual execution patterns)
    priority: low
    dependencies: [EXEC-006]
    effort: 4-6 hours
    notes: |
      Analysis features:
      - User story execution trends
      - Most common failure patterns
      - Execution time analysis
      - Command success rates
      - Testing layer coverage

# ==============================================================================
# INTEGRATION & AUTOMATION
# ==============================================================================

integration:
  - id: EXEC-008
    description: Automatically pass execution data to audit agent
    success_criteria:
      - Orchestration agent provides session ID to audit agent
      - Audit agent automatically loads execution data from storage
      - No manual execution data preparation needed
      - Execution data always complete and accurate
      - Audit agent can request additional data if needed
    priority: high
    dependencies: [EXEC-001, EXEC-002, EXEC-003]
    effort: 1-2 hours
    notes: |
      Current: Orchestration agent manually prepares execution data in prompt.
      Future: Orchestration agent just provides session ID, audit agent loads data.
      
      Benefits:
      - No manual data preparation
      - Always complete execution history
      - Audit agent has full context
      - Can validate against actual execution, not self-reported data

  - id: EXEC-009
    description: Add execution data retention policy
    success_criteria:
      - Configurable retention period (default: 30 days)
      - Automatic cleanup of old execution data
      - Option to archive important sessions
      - Storage size monitoring
      - Retention policy configurable per environment
    priority: low
    dependencies: [EXEC-002]
    effort: 1-2 hours
    notes: |
      Prevent storage bloat from accumulating execution data.
      Keep recent data for debugging, archive or delete old data.
      Important sessions (failed tests, critical changes) can be marked for retention.

