# Cloud Build configuration for UAT Testing
# Run User Acceptance Tests in Google Cloud Build
#
# Trigger: Manual or on pull request
# Duration: ~5-10 minutes
# Artifacts: Test results uploaded to GCS

steps:
  # Step 0: Setup service account credentials
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'setup-credentials'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Setting up GCP service account for tests"
        gcloud secrets versions access latest --secret="myagents-service-account-key" > /workspace/service-account.json
        chmod 600 /workspace/service-account.json
        echo "Service account configured"

  # Step 1: Create results directory
  - name: 'gcr.io/cloud-builders/docker'
    id: 'prepare-results-dir'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p /workspace/uat-results
        echo "UAT Results for Build ${BUILD_ID}" > /workspace/uat-results/BUILD_INFO.txt
        echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> /workspace/uat-results/BUILD_INFO.txt

  # Step 2: Build test and service images
  - name: 'gcr.io/$PROJECT_ID/docker-compose:1.29.2'
    id: 'build-images'
    args:
      - '-f'
      - 'docker-compose.uat.yml'
      - 'build'
      - '--parallel'
    env:
      - 'WORKTREE_NAME=MyAgents-cloud-deploy'
      - 'GCP_SA_KEY_PATH=/workspace/service-account.json'
      - 'UAT_RESULTS_DIR=/workspace/uat-results'
    timeout: '1200s'  # 20 minutes for build

  # Step 3: Run UAT tests
  - name: 'gcr.io/$PROJECT_ID/docker-compose:1.29.2'
    id: 'run-uat-tests'
    args:
      - '-f'
      - 'docker-compose.uat.yml'
      - 'up'
      - '--exit-code-from'
      - 'test'
      - '--abort-on-container-exit'
    env:
      - 'WORKTREE_NAME=MyAgents-cloud-deploy'
      - 'GCP_SA_KEY_PATH=/workspace/service-account.json'
      - 'UAT_RESULTS_DIR=/workspace/uat-results'
    timeout: '900s'  # 15 minutes for test execution

  # Step 4: Collect and process test results (runs even if tests fail)
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'upload-test-results'
    args:
      - 'cp'
      - '-r'
      - '/workspace/uat-results'
      - 'gs://${_ARTIFACT_BUCKET}/uat/${BUILD_ID}/'
    timeout: '300s'

  # Step 5: Generate test summary
  - name: 'python:3.12-slim'
    id: 'generate-summary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -q junitparser
        python3 <<'EOF'
        import os
        import sys
        from pathlib import Path
        try:
            from junitparser import JUnitXml
        except ImportError:
            print("junitparser not available, skipping summary")
            sys.exit(0)

        xml_file = Path('/workspace/uat-results/uat-integration.xml')
        if not xml_file.exists():
            print(f"No test results found at {xml_file}")
            sys.exit(0)

        xml = JUnitXml.fromfile(str(xml_file))

        print("\n" + "="*60)
        print("UAT TEST SUMMARY")
        print("="*60)
        print(f"Total Tests: {xml.tests}")
        print(f"Passed: {xml.tests - xml.failures - xml.errors}")
        print(f"Failed: {xml.failures}")
        print(f"Errors: {xml.errors}")
        print(f"Skipped: {xml.skipped}")
        print(f"Time: {xml.time:.2f}s")
        print("="*60)

        # Write summary to file
        summary_file = Path('/workspace/uat-results/SUMMARY.txt')
        with summary_file.open('w') as f:
            f.write(f"UAT Test Summary - Build {os.getenv('BUILD_ID', 'unknown')}\n")
            f.write(f"Total: {xml.tests}\n")
            f.write(f"Passed: {xml.tests - xml.failures - xml.errors}\n")
            f.write(f"Failed: {xml.failures}\n")
            f.write(f"Errors: {xml.errors}\n")
            f.write(f"Duration: {xml.time:.2f}s\n")

        if xml.failures > 0 or xml.errors > 0:
            sys.exit(1)
        EOF

  # Step 6: Cleanup containers and volumes
  - name: 'gcr.io/$PROJECT_ID/docker-compose:1.29.2'
    id: 'cleanup'
    args:
      - '-f'
      - 'docker-compose.uat.yml'
      - 'down'
      - '-v'
    env:
      - 'WORKTREE_NAME=MyAgents-cloud-deploy'

# Timeout for entire build
timeout: '2400s'  # 40 minutes total

# Build options
options:
  machineType: 'E2_HIGHCPU_8'  # 8 vCPU for faster execution
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

# Artifacts - upload test results
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/uat/${BUILD_ID}'
    paths:
      - '/workspace/uat-results/**'

# Substitutions - provide defaults
substitutions:
  _ARTIFACT_BUCKET: 'myagents-build-artifacts'
  _WORKTREE_NAME: 'MyAgents-cloud-deploy'

# Tags for organization
tags:
  - 'uat'
  - 'integration-tests'
  - 'docker-compose'
