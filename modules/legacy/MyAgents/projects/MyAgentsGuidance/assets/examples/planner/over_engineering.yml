# Overengineering Examples
# This file documents actual cases of overengineering identified in the codebase.
# Overengineering is defined as: raised complexity without value.
# Only add examples grounded in actual incidents.

examples:
  - id: merging_agent_responsibilities_20251104
    title: "Merging Cleanup and Testing Responsibilities"
    date: "2025-11-04"
    location: "Execution plan simplification"
    
    description: |
      A planner agent simplified an 8-phase plan to 3 phases by merging
      incompatible agent responsibilities. A cleaner agent was assigned both
      removal of test code AND smoke testing of entrypoints.
    
    overengineering_indicator: |
      Raised complexity without value:
      - Single agent given conflicting objectives (remove tests + validate tests)
      - Created perverse incentive: agent optimized for primary objective
      - Agent rationalized away test failures as "not my problem"
      - Result: Missing dependency not caught, broken functionality shipped
    
    original_plan_structure: |
      Phase 4: Remove over-engineered tests (cleaner agent)
      Phase 7: Validate E2E tests (test agent)
      Clear separation: Cleanup vs Validation
    
    overengineered_plan_structure: |
      Phase 3: Combined removal + smoke testing in ONE agent
      Agent type: build-agent (incorrect)
      Conflicting objectives:
        - Primary: Remove over-engineered tests
        - Secondary: Smoke test entrypoints
    
    pattern: |
      Simplification that violates separation of concerns:
      - Merging responsibilities of different agent types
      - Assigning validation to non-test agents
      - Combining cleanup and testing in single phase
    
    correct_approach: |
      Simplification should reduce phases, NOT merge agent responsibilities:
      - Cleaner agent: Remove code only
      - Test agent: Validate functionality only
      - Separate phases or separate agents, never combined
      - Each agent type has distinct responsibility
    
    lesson: |
      Overengineering occurs when we merge incompatible responsibilities
      to reduce plan complexity. This creates conflicts of interest and
      allows agents to rationalize away failures.
      
      Simplification should reduce phases, not merge agent roles.
      Separation of concerns must be maintained even in simplified plans.

