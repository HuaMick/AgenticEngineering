# Example Exam Plan Structure - Version 2.0
# This file demonstrates an exam plan for assessing a single agent's planning capabilities.
# The planner-agent-exam agent uses this structure to test an agent's ability to
# propose compliant implementation plans without writing code.
#
# KEY CONCEPTS:
# 1. EXAM CONTEXT: Defines the target agent and the task
#    - Target Agent: The role being tested (e.g., 'planner', 'builder')
#    - Task: A real, completed task or user story from the project
# 2. STUDENT TASK: The target agent proposes a plan
#    - Output: A step-by-step or component-based design
#    - Constraint: No code writing, just planning
# 3. TEACHER TASK: A reviewer agent grades the proposal
#    - Input: The student's proposal
#    - Criteria: Agent-specific guidelines (e.g., minimal changes, path/fence/signpost)
#
# Plan structure notes:
# 1. Simple linear sequence of Student -> Teacher pairs
# 2. Focus on "plan and design" rather than "build and test"
# 3. Immediate feedback loop via the Teacher's review

worktree: /home/code/myagents/MyAgents-exam-002
examplan: /home/code/myagents/docs/plans/live/251213MA_exam/live/plan_live_build.yml
resultsplan: /home/code/myagents/docs/plans/live/251213MA_exam/plan_completed.yml

exam-plans:
  - id: PLANNER-ASSESSMENT-001
    title: Planner Agent Capabilities Assessment
    description: Assess a planner agent's ability to create valid test plans and component designs.

    phases:
      # ========================================
      # EXAM MODULE 1: CREATE TEST PLAN
      # ========================================
      - name: Exam Module 1 - Test Planning
        execution_groups:
          - execution: sequential
            name: Student Task - Create Test Plan
            agents:
              - type: planner
                inputs:
                  - docs/services/userstories/MyAgents/01_installation.yml
                  - agents/test/manifest.yml
                guidance: |
                  Action: Propose a test plan for the installation user story.
                  Format: Step-by-step plan.
                  Constraints: Do NOT write code or run tests. Just describe the plan.
            
          - execution: sequential
            name: Teacher Task - Review Test Plan
            agents:
              - type: teacher
                inputs:
                  - [Student's Output from previous step]
                  - planner/guidelines.yml
                guidance: |
                  Action: Review the proposed test plan.
                  Criteria:
                  1. Does it cover all installation scenarios?
                  2. Does it follow the 'minimal changes' principle?
                  3. Are the steps clear and actionable?
                  Output: Pass/Fail with specific feedback.

      # ========================================
      # EXAM MODULE 2: COMPONENT DESIGN
      # ========================================
      - name: Exam Module 2 - Component Design
        execution_groups:
          - execution: sequential
            name: Student Task - Design Component
            agents:
              - type: planner
                inputs:
                  - docs/plans/completed/archived/251201_myagents-home_folder_configs.yml (Task Description only)
                guidance: |
                  Action: Propose a component design for refactoring the config system.
                  Format: Component-by-component breakdown.
                  Constraints: Do NOT write code. Focus on structure and data flow.

          - execution: sequential
            name: Teacher Task - Review Design
            agents:
              - type: teacher
                inputs:
                  - [Student's Output from previous step]
                  - agents/planner/manifest.yml
                guidance: |
                  Action: Review the component design.
                  Criteria:
                  1. Is the separation of concerns maintained?
                  2. Is the design over-engineered?
                  3. Does it solve the core problem simply?
                  Output: Pass/Fail with specific feedback.

