# Examples Manifest
# Centralized location for all agent examples
# Organization: examples/<category>/<example_file>

version: "1.0"
created: "2025-12-13"
purpose: "Centralized examples repository for all agent types"

structure:
  root: "/home/code/myagents/MyAgents-staging/assets/examples/"
  categories:
    - planner
    - test
    - teacher
    - cleaner
    - shared

categories:
  planner:
    path: "examples/planner/"
    description: "Examples for planner agent - plan structures, phases, execution patterns"
    files:
      - name: "plan_live_teach.yml"
        description: "Example of teaching and implementation phases (v2.1)"
        key_features:
          - "File-level inputs (not directory-level)"
          - "Detailed guidance for orchestration agent"
          - "Measurable outcome-focused success criteria"
          - "Parallel and sequential execution groups"
        use_cases:
          - "Reference for creating teach/implementation phases in live plans"
          - "Understanding correct input/guidance/success_criteria definitions"
          - "Learning parallel vs sequential execution patterns"

      - name: "plan_live_test.yml"
        description: "Example of test phase with component and user flow testing (v2.1)"
        key_features:
          - "Test-fix-loop execution pattern"
          - "Component testing (smoke_test strategy)"
          - "User flow testing (agent_blind_test strategy)"
          - "Dynamic build agents for failures"
        use_cases:
          - "Reference for creating test phases in live plans"
          - "Understanding test-fix-loop patterns"
          - "Learning user flow and component test integration"

      - name: "plan_live_audit_clean.yml"
        description: "Example of cleanup, audit, and documentation phases (v2.1)"
        key_features:
          - "Cleanup before final testing"
          - "Audit-test-fix-loop pattern"
          - "Documentation phase structure"
          - "Proper phase ordering"
        use_cases:
          - "Reference for creating cleanup/audit/docs phases"
          - "Understanding audit-test-fix-loop patterns"
          - "Learning phase ordering (cleanup before testing)"

      - name: "plan_completed.yml"
        description: "Example of a completed plan structure"
        key_features:
          - "Completed items format"
          - "Completion dates and phases"
          - "Description of work done"
        use_cases:
          - "Reference for archiving completed work"
          - "Understanding plan completion format"

      - name: "over_engineering.yml"
        description: "Real examples of overengineering patterns identified in codebase"
        key_features:
          - "Merging incompatible agent responsibilities"
          - "Pattern identification and lessons learned"
          - "Correct vs overengineered approaches"
        use_cases:
          - "Avoiding known overengineering patterns"
          - "Understanding separation of concerns"
          - "Learning from past mistakes"

  test:
    path: "examples/test/"
    description: "Examples for test agent - test patterns, reporting, critical thinking"
    files:
      - name: "README.md"
        description: "Guidelines for tests that should NOT be skipped"
        key_features:
          - "Credential-based tests should use available auth"
          - "Service-based tests should start services"
          - "Setup requirements should be met, not skipped"
          - "When skipping IS acceptable"
        use_cases:
          - "Deciding whether to skip a test"
          - "Understanding test agent responsibilities"
          - "Learning acceptable vs unacceptable skips"

      - name: "critical_questions.yml"
        description: "Examples of skeptical questions for audit agent to ask"
        key_features:
          - "Red flags for workarounds vs proper fixes"
          - "Wrapper scripts, hardcoded paths, silent skips"
          - "Test/production environment divergence"
          - "Success booleans without outcome verification"
          - "Help-only user story testing"
        use_cases:
          - "Audit agent reviewing execution data"
          - "Identifying reward hacking patterns"
          - "Challenging workarounds and asking for root cause fixes"

      - name: "final_outcome_report.yml"
        description: "Example format for final summary reports from audit agent"
        key_features:
          - "Package-level test results (not individual tests)"
          - "Next steps with WHY for each item"
          - "Goal achievement and design decisions"
          - "Minimize success notes, focus on concerns/failures"
        use_cases:
          - "Structuring final reports to users"
          - "Understanding what to include/exclude"
          - "Learning concise reporting format"

  teacher:
    path: "examples/teacher/"
    description: "Examples for teacher agent - concise guidance patterns"
    files:
      - name: "concise.yml"
        description: "Examples of verbose vs concise agent guidance"
        key_features:
          - "Remove meta-commentary"
          - "Trust structure (names/hierarchy convey meaning)"
          - "Outcome over process"
          - "Cut filler words"
          - "One sentence context"
        use_cases:
          - "Writing concise agent guidance"
          - "Preserving context window by eliminating redundancy"
          - "Learning concise communication principles"

  cleaner:
    path: "examples/cleaner/"
    description: "Examples for cleaner agent - protected files, allowed/disallowed locations"
    files:
      - name: "preserved-files.yml"
        description: "Files that must NEVER be removed by cleaner agents"
        key_features:
          - "Lock files (uv.lock, poetry.lock, package-lock.json)"
          - "Configuration files (pyproject.toml, package.json)"
          - "CI/CD infrastructure (Dockerfile, cloudbuild.yaml, workflows)"
          - "Documentation required by builds (root README.md)"
          - "Common mistakes and why files are protected"
        use_cases:
          - "Before flagging any infrastructure file for cleanup"
          - "Reviewing cleanup votes to ensure protected files aren't targeted"
          - "Understanding what makes a file critical infrastructure"

      - name: "dir-allowed.yml"
        description: "Examples of where different file types belong (allowed locations)"
        key_features:
          - "Markdown files: docs/**/*.md and **/README.md only"
          - "Source code: src/**/*.py, tests/**/*.py, scripts/**/*.py"
          - "Configuration files at appropriate hierarchy levels"
          - "Examples and definitions centralized locations"
        use_cases:
          - "Evaluating whether a file is in the wrong location"
          - "Comparing current locations against project standards"
          - "Understanding correct project structure"

      - name: "dir-not-allowed.yml"
        description: "Examples of file locations that violate project structure"
        key_features:
          - "Markdown files in wrong locations (src/*.md except README.md)"
          - "Leftover folders after refactors"
          - "Duplicate or redundant files"
          - "Test artifacts in wrong locations"
          - "Confidence guidelines for flagging violations"
        use_cases:
          - "Identifying wrong_location cleanup targets"
          - "Detecting leftover directories after refactors"
          - "Assessing confidence before flagging files"

  shared:
    path: "examples/shared/"
    description: "Examples shared across multiple agent types"
    files:
      - name: "overengineering.yml"
        description: "Comprehensive overengineering prevention examples"
        key_features:
          - "Premature abstraction"
          - "Merging incompatible responsibilities"
          - "Infrastructure exceeding requirements"
          - "Hypothetical future needs (YAGNI)"
          - "Clever over clear"
          - "Good vs bad examples"
        use_cases:
          - "Preventing overengineering across all agent types"
          - "Understanding when complexity is justified"
          - "Learning simplification principles"

migration_notes:
  original_locations:
    - path: "/home/code/myagents/MyAgents-staging/planner/examples/"
      files: ["plan_live.yml (now split into plan_live_teach.yml, plan_live_test.yml, plan_live_audit_clean.yml)", "plan_completed.yml", "over_engineering.yml"]
      status: "Migrated to assets/examples/planner/ (2025-12-13), split into phase-specific files (2025-12-14)"

    - path: "/home/code/myagents/MyAgents-staging/test/examples/"
      files: ["README.md", "critical_questions.yml", "final_outcome_report.yml"]
      status: "Migrated to assets/examples/test/ (2025-12-13)"

    - path: "/home/code/myagents/MyAgents-staging/teacher/examples/"
      files: ["concise.yml"]
      status: "Migrated to assets/examples/teacher/ (2025-12-13)"

    - path: "/home/code/myagents/MyAgents-staging/examples/"
      files: ["overengineering.yml"]
      status: "Migrated to assets/examples/shared/ (2025-12-13)"

    - path: "/home/code/myagents/MyAgents-staging/definitions/"
      files: ["preserved-files.yml", "markdown-file-rules.yml", "leftover-folders.yml"]
      status: "Refactored into assets/examples/cleaner/ (2025-12-13)"
      details:
        - "preserved-files.yml -> assets/examples/cleaner/preserved-files.yml (rewritten as example)"
        - "markdown-file-rules.yml -> merged into dir-allowed.yml and dir-not-allowed.yml"
        - "leftover-folders.yml -> merged into dir-not-allowed.yml"

  next_steps:
    - "Verify all examples are accessible from new locations (COMPLETED)"
    - "Update inputs.yml files to reference new paths (COMPLETED)"
    - "Remove original example folders after verification"
    - "Update cleaner/inputs.yml to reference new example paths (COMPLETED)"
    - "Update internal references in assets/ folder (COMPLETED)"
    - "Remove original definition files after cleaner/inputs.yml is updated"

usage:
  how_to_reference:
    description: "How agents should reference examples from the centralized location"
    examples:
      - agent: "planner-build"
        input: "examples/planner/plan_live_teach.yml"
        description: "Reference teach/implementation phase plan structure example"
      - agent: "planner-test"
        input: "examples/planner/plan_live_test.yml"
        description: "Reference test phase plan structure example"
      - agent: "planner-cleaning"
        input: "examples/planner/plan_live_audit_clean.yml"
        description: "Reference cleanup/audit/docs phase plan structure example"

      - agent: "test"
        input: "examples/test/critical_questions.yml"
        description: "Reference critical questions for audit"

      - agent: "teacher"
        input: "examples/teacher/concise.yml"
        description: "Reference concise guidance patterns"

      - agent: "cleaner"
        input: "examples/cleaner/preserved-files.yml"
        description: "Reference files that must never be removed"

      - agent: "cleaner"
        input: "examples/cleaner/dir-allowed.yml"
        description: "Reference allowed file locations"

      - agent: "cleaner"
        input: "examples/cleaner/dir-not-allowed.yml"
        description: "Reference disallowed file locations and leftover patterns"

      - agent: "any"
        input: "examples/shared/overengineering.yml"
        description: "Reference overengineering prevention examples"

maintenance:
  adding_new_examples:
    - "Determine appropriate category (planner/test/teacher/shared)"
    - "Add file to category subfolder"
    - "Update this manifest.yml with file description and use cases"
    - "Include key features and when to use"

  updating_existing_examples:
    - "Update the example file"
    - "Update manifest.yml if structure or use cases change"
    - "Note version changes if applicable"

  removing_examples:
    - "Remove file from category subfolder"
    - "Remove entry from manifest.yml"
    - "Document reason for removal if significant"

best_practices:
  - "Keep examples grounded in real incidents"
  - "Include both good and bad examples (what to do and what to avoid)"
  - "Provide clear use cases for when to reference each example"
  - "Update examples based on learnings from agent execution"
  - "Maintain conciseness - examples should demonstrate, not lecture"
