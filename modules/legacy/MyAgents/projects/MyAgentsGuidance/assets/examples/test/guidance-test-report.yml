# Example: Guidance Test Report
# Demonstrates how test-guidance-simulator agents report guidance validation results
# during guidance-test-loop execution.
#
# PURPOSE:
# This example shows the structure and content of a guidance test report produced
# when test-guidance-simulator agents execute guidance-blind-test scenarios and
# discover friction points in agent guidance.
#
# CONTEXT:
# - Report type: Guidance validation report (tests guidance completeness)
# - Loop: guidance-test-loop iteration output
# - Strategy: guidance-blind-test (minimal context, no code inspection)
# - Friction categorization: Aligns with assets/definitions/friction.yml

test_run_metadata:
  report_id: "guidance_test_001"
  report_type: "guidance-blind-test"
  timestamp: "2025-12-21T14:32:00Z"
  iteration_number: 1
  max_iterations: 3
  target_agent: "agents/orchestration/orchestration-guidance/"
  simulator_agent: "test-guidance-simulator"
  test_plan_reference: "docs/plans/live/251221MAG_guidance-refinement-v1/live/plan_live_test_guidance.yml"
  task_id: "1.1"

test_configuration:
  strategy: "guidance-blind-test"
  strategy_reference: "assets/definitions/strategy-guidance-blind-test.yml"
  scenarios_executed:
    - "task_completion_test"
    - "reference_resolution_test"
    - "loop_context_test"
    - "subagent_spawning_test"
    - "friction_detection_test"

  context_provided:
    guidance_files:
      - "agents/orchestration/orchestration-guidance/process.yml"
      - "agents/orchestration/orchestration-guidance/inputs.yml"
      - "agents/orchestration/orchestration-guidance/outputs.yml"
    test_task: |
      Orchestrate a guidance-test-loop for target agent 'planner-test-guidance'.
      Spawn test-guidance-simulator to execute test scenarios. Aggregate results
      and determine if guidance is complete or gaps exist.
    minimal_context: |
      You are orchestration-guidance agent. Your goal is from process.yml.
      All input locations are in inputs.yml. Use only these guidance files.
    code_access: false
    codebase_exploration: false

results:
  - scenario: "task_completion_test"
    scenario_reference: "assets/definitions/guidance-test-scenarios.yml#task_completion_test"
    status: "FAIL"
    summary: "Agent could not complete orchestration task - subagent spawn failed"

    details:
      task_attempted: true
      task_completed: false
      friction_points_found: 2

      execution_trace:
        - step: "Read process.yml to understand orchestration goal"
          status: "SUCCESS"
          notes: "Goal clear: orchestrate guidance-test-loop"

        - step: "Read inputs.yml to find subagent guidance paths"
          status: "FAIL"
          notes: "Could not find test-guidance-simulator guidance path in inputs.yml"
          friction_id: "FR-001"

        - step: "Attempt to spawn test-guidance-simulator"
          status: "BLOCKED"
          notes: "Cannot proceed without subagent guidance path"
          friction_id: "FR-001"

        - step: "Aggregate test results"
          status: "NOT_ATTEMPTED"
          notes: "Blocked by subagent spawning failure"

  - scenario: "reference_resolution_test"
    scenario_reference: "assets/definitions/guidance-test-scenarios.yml#reference_resolution_test"
    status: "PARTIAL"
    summary: "Some input paths resolved, others broken or ambiguous"

    details:
      total_references: 8
      resolved_references: 5
      broken_references: 2
      ambiguous_references: 1

      broken_paths:
        - path: "test-guidance-simulator guidance"
          location: "inputs.yml line 42"
          issue: "Path not specified - only agent name mentioned"
          friction_id: "FR-001"

        - path: "guidance-test-scenarios.yml"
          location: "inputs.yml line 58"
          issue: "Relative path without base directory"
          friction_id: "FR-002"

      ambiguous_paths:
        - path: "../test/test-guidance-simulator/"
          location: "inputs.yml line 45"
          issue: "Relative path - unclear base directory (from agent dir or worktree root?)"
          friction_id: "FR-003"

  - scenario: "loop_context_test"
    scenario_reference: "assets/definitions/guidance-test-scenarios.yml#loop_context_test"
    status: "PASS"
    summary: "Loop context section present and complete"

    details:
      loop_context_present: true
      participates_in:
        - "guidance-test-loop"
      iteration_input: "target_agent_path"
      notes: "Loop mechanics clear from process.yml"

  - scenario: "subagent_spawning_test"
    scenario_reference: "assets/definitions/guidance-test-scenarios.yml#subagent_spawning_test"
    status: "FAIL"
    summary: "Orchestrator cannot locate subagent guidance paths"

    details:
      is_orchestrator: true
      subagents_identified:
        - "test-guidance-simulator"
      subagent_paths_found: 0
      subagent_paths_expected: 1
      spawning_context_clear: true

      missing_subagent_paths:
        - agent: "test-guidance-simulator"
          mentioned_in: "process.yml step 3"
          path_in_inputs: false
          friction_id: "FR-001"

  - scenario: "friction_detection_test"
    scenario_reference: "assets/definitions/guidance-test-scenarios.yml#friction_detection_test"
    status: "FAIL"
    summary: "Hidden prerequisites and assumptions found"

    details:
      explicit_prerequisites: []
      hidden_prerequisites:
        - prerequisite: "Knowledge of test agent directory structure"
          impact: "Cannot locate test-guidance-simulator without exploring codebase"
          friction_id: "FR-001"

      assumed_tools: []
      assumed_config: []
      assumed_environment:
        - assumption: "Agent knows where test agents are located"
          should_be_explicit_in: "inputs.yml"
          friction_id: "FR-001"

gaps_found:
  total_gaps: 3
  critical_gaps: 1
  high_gaps: 1
  medium_gaps: 1
  low_gaps: 0

  friction_points:
    - id: "FR-001"
      severity: "CRITICAL"
      category: "missing_input_path"
      agent: "orchestration-guidance"
      test_scenario: "subagent_spawning_test"

      issue: |
        inputs.yml does not specify path to test-guidance-simulator agent guidance.
        Process.yml mentions spawning this agent but path is not discoverable.

      guidance_gap: |
        inputs.yml should include:
        - type: file
          path: "agents/test/test-guidance-simulator/process.yml"
          description: "Test guidance simulator process - spawned for test execution"

      impact: |
        Orchestrator cannot spawn subagent without guidance path. Task cannot proceed.
        This is a CRITICAL blocker - agent execution fails completely.

      suggested_fix: |
        Add test-guidance-simulator guidance paths to orchestration-guidance/inputs.yml:

        subagent_guidance:
          - type: file
            path: "agents/test/test-guidance-simulator/process.yml"
            description: "Test simulator process definition"
          - type: file
            path: "agents/test/test-guidance-simulator/inputs.yml"
            description: "Test simulator input requirements"

      friction_category_reference: "assets/definitions/friction.yml#hidden_prerequisites"

    - id: "FR-002"
      severity: "HIGH"
      category: "ambiguous_path"
      agent: "orchestration-guidance"
      test_scenario: "reference_resolution_test"

      issue: |
        inputs.yml references 'guidance-test-scenarios.yml' with relative path but
        no base directory specified. Unclear if relative to agent directory,
        worktree root, or assets/ directory.

      guidance_gap: |
        Path should be absolute or clearly relative to known base:
        - Absolute: "assets/definitions/guidance-test-scenarios.yml"
        - Or document base directory convention in inputs.yml header

      impact: |
        Agent must explore codebase or make assumptions about path resolution.
        Violates guidance-blind-test principle of no codebase exploration.

      suggested_fix: |
        Update inputs.yml to use absolute path from worktree root:
        - type: file
          path: "assets/definitions/guidance-test-scenarios.yml"
          description: "Test scenario definitions"

      friction_category_reference: "assets/definitions/friction.yml#ambiguous_paths"

    - id: "FR-003"
      severity: "MEDIUM"
      category: "unclear_path_convention"
      agent: "orchestration-guidance"
      test_scenario: "reference_resolution_test"

      issue: |
        Some paths in inputs.yml use relative paths (../test/...) without
        documenting whether they're relative to agent dir or worktree root.

      guidance_gap: |
        inputs.yml should document path convention:
        - All paths relative to worktree root, OR
        - All paths absolute, OR
        - Header comment explaining path resolution base

      impact: |
        Path resolution ambiguous - agent may look in wrong location.
        Wastes effort and may require codebase exploration to resolve.

      suggested_fix: |
        Add header to inputs.yml:
        # Path convention: All paths are relative to worktree root unless prefixed with /
        # Example: "agents/test/..." means "<worktree>/agents/test/..."

      friction_category_reference: "assets/definitions/friction.yml#documentation_gaps"

aggregate_analysis:
  total_friction_points: 3
  agents_with_gaps:
    - "orchestration-guidance"

  most_common_gap_pattern: "missing_subagent_paths"
  most_common_gap_description: |
    Orchestrator agents reference subagents in process.yml but do not include
    subagent guidance paths in inputs.yml. This prevents guidance-only spawning.

  critical_blockers: 1
  critical_blocker_description: "Cannot spawn subagent - task execution fails"

  recommended_actions:
    - priority: "P0"
      action: "Add test-guidance-simulator paths to orchestration-guidance/inputs.yml"
      impact: "Unblocks task execution"
      estimated_effort: "5 minutes"

    - priority: "P1"
      action: "Standardize path convention across all inputs.yml files"
      impact: "Reduces ambiguity for all agents"
      estimated_effort: "30 minutes"

    - priority: "P2"
      action: "Document path resolution rules in guidance.yml"
      impact: "Prevents future path ambiguity issues"
      estimated_effort: "15 minutes"

loop_iteration_decision:
  continue_loop: true
  reason: "CRITICAL gap found - must fix and re-test"
  next_iteration: 2
  fixes_required_before_retest:
    - "Fix FR-001: Add test-guidance-simulator paths to inputs.yml"
    - "Fix FR-002: Use absolute paths for scenario definitions"

  exit_conditions_met:
    all_tests_pass: false
    no_critical_gaps: false
    max_iterations_reached: false

  escalation_needed: false
  escalation_reason: null

recommendations:
  immediate_fixes:
    - gap_id: "FR-001"
      target_file: "agents/orchestration/orchestration-guidance/inputs.yml"
      fix_type: "add_content"
      fix_description: "Add subagent guidance paths to inputs section"

    - gap_id: "FR-002"
      target_file: "agents/orchestration/orchestration-guidance/inputs.yml"
      fix_type: "update_content"
      fix_description: "Change relative paths to absolute paths"

  systemic_improvements:
    - improvement: "Establish path convention standard"
      scope: "all agents"
      rationale: "Prevent path ambiguity across all agent guidance"
      affected_files:
        - "assets/definitions/guidance.yml"
        - "all agents/*/inputs.yml files"

    - improvement: "Create orchestrator guidance template"
      scope: "orchestrator agents"
      rationale: "Ensure all orchestrators include subagent paths in inputs.yml"
      affected_files:
        - "assets/templates/orchestrator-inputs-template.yml"

  guidance_quality_metrics:
    completeness_score: "40%"
    calculation: "5 resolved references / 8 total references * 100"

    self_sufficiency_score: "33%"
    calculation: "2 passed scenarios / 6 total scenarios * 100"

    target_scores:
      completeness: "100%"
      self_sufficiency: "100%"

notes:
  - "This is iteration 1 of max 3 iterations"
  - "CRITICAL gap (FR-001) blocks task execution - must fix before iteration 2"
  - "Test methodology validated - simulator correctly followed guidance-blind-test constraints"
  - "No code inspection performed - all gaps detected through guidance-only execution"
  - "Friction categorization aligns with friction.yml patterns"
  - "Report format follows FRICTION_POINT structure from strategy-guidance-blind-test.yml"

related_artifacts:
  test_plan: "docs/plans/live/251221MAG_guidance-refinement-v1/live/plan_live_test_guidance.yml"
  test_strategy: "assets/definitions/strategy-guidance-blind-test.yml"
  test_scenarios: "assets/definitions/guidance-test-scenarios.yml"
  friction_definitions: "assets/definitions/friction.yml"
  target_agent_guidance:
    - "agents/orchestration/orchestration-guidance/process.yml"
    - "agents/orchestration/orchestration-guidance/inputs.yml"
    - "agents/orchestration/orchestration-guidance/outputs.yml"
