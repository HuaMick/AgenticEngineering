# Agent Inputs Example - Test Agent
# This example shows a complete, filled-in inputs specification for the test agent
# Use this as a reference when creating inputs.yml for other agent types

inputs:
  agent_type: "test"
  version: "1.0"

  # Core inputs that test agents need to function
  core_inputs:
    # Core shared guidelines (migrated from orchestration/guidelines.yml)
    - type: file
      path: "assets/guidelines/fix-the-source.yml"
      description: "Fix root causes instead of symptoms"
      required: true

    - type: file
      path: "assets/guidelines/context-minimisation.yml"
      description: "Provide only required information, reduce noise"
      required: true

    - type: file
      path: "assets/guidelines/response-audit.yml"
      description: "Mandatory audit-before-reply guardrail"
      required: true

    # Core shared definitions (migrated from orchestration/definitions.yml)
    - type: file
      path: "assets/definitions/plans.yml"
      description: "Plan types and how live/backlog/completed plans are organized"
      required: true

    - type: file
      path: "assets/definitions/guidance.yml"
      description: "What plan guidance is and what it should/shouldn't contain"
      required: true

    - type: file
      path: "assets/definitions/friction.yml"
      description: "What friction is and how to reduce it"
      required: true

    # Project context
    - type: file
      path: "docs/architecture/architecture.md"
      description: "Project architecture and structure"
      required: true

    # Test agent specific resources (now in shared definitions/)
    - type: file
      path: "assets/definitions/testing-documentation.yml"
      description: "Testing documentation structure and locations"
      required: true

    - type: file
      path: "assets/definitions/test-roles.yml"
      description: "Test builder and runner role definitions"
      required: true

    - type: file
      path: "assets/definitions/test-structure.yml"
      description: "Test organization and workflow structure"
      required: true

    - type: directory
      path: "assets/examples/test/"
      description: "Test pattern examples"
      required: true

    # Test process specifications
    - type: file
      path: "test/processes/test_runner.yml"
      description: "Standard test execution process"
      required: true

    - type: file
      path: "test/processes/user_simulator.yml"
      description: "User flow testing process"
      required: false

    - type: file
      path: "test/processes/audit.yml"
      description: "Test quality audit process"
      required: false

    # Live plan for failure reporting
    - type: pattern
      path: "docs/plans/live/*/"
      description: "Live plan folders for structured failure reporting (folder-based structure)"
      required: true

  # Guidelines that test agents should follow
  guidelines:
    - path: "assets/guidelines/testing.yml"
      description: "Testing strategies and patterns"

    - path: "assets/guidelines/iteration.yml"
      description: "Test-fix loop patterns"

    - path: "assets/guidelines/reward-hacking-prevention.yml"
      description: "Prevent gaming of test success"

    - path: "assets/guidelines/safety.yml"
      description: "Safety guidelines for test execution"

  # Test agent specific terminology
  definitions:
    test_builder: |
      Agent responsible for creating new tests, not running them.
      Separation from test_runner prevents reward hacking where the same
      agent that writes tests also runs them and could game the results.

    test_runner: |
      Agent responsible for executing tests, not modifying them.
      Reports results without fixing failures directly.
      If tests fail, test_runner documents failures in live plan for
      builder agents to fix.

    technical_spike: |
      Testing strategy focused on component-level validation.
      Tests specific behaviors, edge cases, and technical requirements.
      Agent has full code access and can inspect implementation details.

    agent_blind_test: |
      Testing strategy where agent follows documentation only, without
      inspecting code. Simulates real user experience to catch UX gaps.
      Agent treats system as black box and reports documentation issues.

    test_fix_loop: |
      Execution pattern where test agents run in parallel to find failures,
      then builder agents are spawned dynamically to fix each failure.
      Loop continues until all tests pass or max iterations reached.

    audit_test_fix_loop: |
      Extension of test-fix-loop that starts with audit phase.
      Audit examines test quality and identifies reward hacking patterns
      before running tests. Ensures tests are valid before using them
      to validate implementation.

    reward_hacking: |
      Pattern where tests pass but don't actually validate intended behavior.
      Examples: mocking the behavior being tested, overly permissive assertions,
      checking implementation instead of behavior, missing negative test cases.
      Audit phase specifically looks for these patterns.

    component_test: |
      Test that validates specific component functionality in isolation.
      Examples: unit tests, integration tests for single components.
      Complements user_flow_tests which validate complete journeys.

    user_flow_test: |
      Test that validates complete user journey from start to finish.
      Tests follow user documentation without code inspection.
      Catches UX gaps that component tests miss.
      Critical for validating real-world usability.

    failure_reporting: |
      Structured format for documenting test failures in live plan.
      Includes: test_name, component, failure_description, expected_behavior,
      actual_behavior, files_involved.
      Enables dynamic spawning of builder agents with precise fix targets.
