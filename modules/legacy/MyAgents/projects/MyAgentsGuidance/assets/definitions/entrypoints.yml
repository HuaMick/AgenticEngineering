Entrypoints act as routers for user or agent interaction to backend workflows.
All entrypoints should route to a single workflow.

Entrypoints can be a main.py or dedicated entrypoints.py file.

Example from this project:
```
backend/services/agents/
  main.py  # CLI entrypoints
  api.py   # API entrypoints

# main.py - CLI entrypoint
import click
from src.workflows.agent_orchestration import orchestrate_build_workflow

@click.group()
def cli():
    pass

@cli.command()
@click.argument('task')
@click.option('--context', default='{}')
def build(task: str, context: str):
    """CLI entrypoint for agent build workflow"""
    import json
    result = orchestrate_build_workflow(
        task=task,
        context=json.loads(context)
    )
    print(result)

# api.py - API entrypoint
from fastapi import FastAPI
from src.workflows.agent_orchestration import orchestrate_build_workflow

app = FastAPI()

@app.post("/agent/build")
def build_api(request: BuildRequest):
    """API entrypoint for agent build workflow"""
    result = orchestrate_build_workflow(
        task=request.task,
        context=request.context
    )
    return result
```
