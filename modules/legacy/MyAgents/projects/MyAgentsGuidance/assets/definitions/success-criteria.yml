success-criteria: |
  Success criteria describe observable, measurable outcomes - not process steps.
  They answer: "How do we know we're done?"

  Good criteria:
  - "Tests pass with exit code 0"
  - "Service responds to health check within 5s"
  - "File X contains structure Y"
  - "Command output matches pattern Z"

  Bad criteria:
  - "Implement the feature" (not measurable)
  - "Run the tests" (step, not outcome)
  - "Fix the bug" (what does fixed look like?)
  - "Code is clean" (subjective)

  Test: Can a different agent verify success without asking questions?
  If no, criteria are not outcome-based.

  Why this matters:
  - Enables self-verification
  - Eliminates "is it done?" ambiguity
  - Prevents reward hacking

  Related: steps.yml, outcome-verification.yml, reward-hacking.yml
