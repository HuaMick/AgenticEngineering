leftover_folders: |
  Leftover folders are directories that remain after a refactor but should have been removed.
  They typically contain:
  - Only __pycache__/ directories (bytecode from old imports)
  - Duplicate source files that exist in the new location
  - Empty __init__.py files

  Detection process:
  1. Check invalid_folders list in manifest.yml
  2. If folder exists, compare contents with expected new location
  3. If all content is duplicated or just __pycache__, it's safe to remove
  4. If unique content exists, flag for manual review

  Common post-refactor leftovers:
  - Root-level backend/ or frontend/ after src-layout migration
  - Nested src/ folders after flattening
  - Old namespace directories after package rename
