skipped_test: |
  A skipped test uses the `skip:` parameter in test() or group() to bypass execution.
  Acceptable only for:
  - Platform-specific tests (skip on unsupported platforms)
  - External dependencies not available in test environment
  - Known environment limitations (e.g., WebSocket in Docker)

  All other skips should be fixed by setting up the required condition.

acceptable_skips: |
  Only the following test skips are acceptable for Flutter:

  1. **Platform-specific tests**:
     - Tests that only run on specific platforms (Android, iOS, Web)
     - Skip with platform check

  2. **WebSocket tests in Docker**:
     - Skip reason: "WebSocket localhost fails in Docker"
     - These run in CI/CD with native Flutter

  Any other skips indicate a problem that needs to be fixed.
