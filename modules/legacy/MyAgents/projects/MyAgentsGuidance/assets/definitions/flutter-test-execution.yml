test_execution: |
  Test agents should follow this workflow when running tests:

  1. **Pre-Test Setup**:
     - Run `flutter pub get` to ensure dependencies are current
     - Check for any required mock servers or fixtures

  2. **Test Execution**:
     - Run `flutter test <path>` with verbose output
     - Use `flutter test --reporter expanded` for detailed output

  3. **Post-Test Cleanup**:
     - Stop any mock servers started during tests
     - Clean up any test artifacts
