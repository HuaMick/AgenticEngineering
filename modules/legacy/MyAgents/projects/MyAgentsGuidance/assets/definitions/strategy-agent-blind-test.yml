agent-blind-test: |
    A testing strategy where a user simulator agent (subagent) is given a USER STORY DEFINITION
    by the orchestration agent, but only provided the default documentation (README, architecture).
    Justification: Agents with prior knowledge cannot simulate a new user's struggle with documentation.

    CRITICAL: This is testing with subagents, NOT testing with code.
    - Subagents execute actual commands as users would
    - This is different from automated test suites written in code

    ## CRITICAL: FUNCTIONAL TESTING REQUIRED ##

    Test subagents MUST execute the ACTUAL COMMANDS specified in journey steps.
    Do NOT substitute functional tests with --help validation.

    PROHIBITED BEHAVIOR:
    - Running only `myagents <command> --help` instead of actual commands
    - Reporting "PASS" based on help text validation alone
    - Adding "infrastructure/help validation only" notes to skip functional tests
    - Summarizing or simplifying functional requirements from user stories

    REQUIRED BEHAVIOR:
    - Execute each journey step EXACTLY as written
    - If step says "Run `myagents studio start`", you MUST run that command
    - Verify ACTUAL outcomes, not just that help text exists
    - Test from the EXACT directories specified in the user story
    - Capture actual command outputs as evidence

    VALIDATION CHECKLIST (must answer YES to all before reporting PASS):
    1. Did I execute each journey step as written (not just --help)?
    2. Did I run actual commands that produce real outcomes?
    3. Did I verify the expected outcomes occurred?
    4. Did I test from the directories specified in the user story?
    5. Did I capture actual command outputs as evidence?
    6. Did I test in BOTH local AND Docker environments?

    If ANY answer is NO, the test is INCOMPLETE, not PASS.

    THREE TESTING LAYERS:
    The agent validates across three distinct environments to ensure comprehensive coverage:

    1. LOCAL ENVIRONMENT TESTING
       - User simulator agent executes actual commands on host machine (e.g., `myagents studio start`)
       - Purpose: Validate developer workflow and user experience
       - What it catches: CLI functionality, user-facing errors, documentation gaps, local configuration issues
       - Execution: Agent follows user story journey steps, executing actual commands as a human would
       - Limitations: May miss Docker-specific issues, environment dependencies
       - CRITICAL: This is NOT testing with code - UAT is testing with subagents (agent-simulated human testing), not automated test suites written in code

    2. LOCAL DOCKER TESTING
       - User simulator agent executes same commands in Docker container
       - Purpose: Validate Dockerfile correctness and containerized behavior
       - Build command: docker build -f Dockerfile.test --build-arg WORKTREE_NAME=<name> .
       - Execution: Agent executes user story journey steps inside container (e.g., `docker run myagents-test myagents studio start`)
       - What it catches: Dockerfile issues, container runtime problems, dependency packaging, environment differences
       - Parity: Now matches Cloud Build exactly (runtime/ and config/ created by Dockerfile)
       - Limitations: Doesn't test Cloud Build workspace restructuring

    3. CLOUD BUILD TESTING (CI/CD ENVIRONMENT)
       - Full Cloud Build execution in GCP
       - Purpose: Validate production deployment pipeline
       - Unique behavior: Workspace restructuring (Step 0.5) moves source to MyAgents/ subdirectory
       - What it catches: Cloud Build-specific issues, workspace structure problems, CI/CD integration
       - Cannot be fully simulated locally due to unique workspace restructuring

    KEY INSIGHT: Local Docker and Cloud Build now match for runtime/config creation.
    The only remaining difference is workspace restructuring (source location).

    User stories are centralized in docs/userstories/<project>/ directory. Each story includes:
    - Persona: Who is the user (e.g., "Junior developer, no MyAgents experience")
    - Starting state: Initial environment conditions
    - Journey: Step-by-step actions with expected outcomes and failure indicators
    - Success criteria: What must pass for the story to succeed
    - Testing: Specifies which layers to test (local: true, docker: true, cloud_build: true/false)

    Execution pattern:
    - Orchestration agent reads user story files from docs/userstories/<project>/ and extracts the user story
    - One agent per user story
    - Orchestration agent passes user story definition in the prompt
    - Agent receives only: docs/README.md, docs/architecture/architecture.md, user story definition
    - Agent does NOT read userstories files directly (keeps it "blind")
    - Agent tests specified layers from user story (typically local + docker, sometimes cloud_build)
    - Docker uses myagents-test image (pre-built to avoid slow container booting)
    - Cloud Build testing validates production pipeline (when cloud_build: true in user story)

    Environment parity validation:
    - Local vs Docker: Tests same code produces same results in different environments
    - Docker vs Cloud Build: Dockerfile self-sufficiency (creates runtime/, config/)
    - Documentation completeness: Agent completes journey using only docs
    - Discoverability: Agent self-discovers required information

    Process file: test/test-user-simulator/process.yml
    Documentation: docs/CICD_README.md Section 11 (Cloud Build Workspace Structure)
