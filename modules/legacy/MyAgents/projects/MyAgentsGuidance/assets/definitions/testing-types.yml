Different types of testing are available for different phases and purposes.
The planner agent selects the appropriate test process based on testing strategy and phase.

Types of testing:
- smoke_test: Early validation of entrypoints and basic functionality. Used during test-fix-loop
  phase with user-simulation-testing strategy for active development and initial testing.
- user_simulator: Validates agent usability by testing USER STORIES with only default guidance.
  Used with agent-blind-test strategy. User stories are defined in docs/userstories/<project>/ directory.
  The orchestration agent reads user story files from docs/userstories/<project>/ and passes the user story definition to the agent.
  Each agent tests BOTH locally AND in Docker using shared pre-built image (myagents-test).
- service_test: Validates backend service lifecycle (startup, health checks, stability, logging).
  Used when services need lifecycle validation beyond functional testing.
- end2end: Comprehensive test suite creation for end-to-end workflow validation.
  Used during test suite phase with test-suite strategy (only on explicit user request).
- audit: Reviews existing tests to detect reward hacking and validate test quality.
  Used during audit-test-fix-loop phase to ensure tests are valid. Assumes testing has already been done.

Plans should specify which test process to use based on the testing strategy and phase requirements.

For user_simulator (agent-blind-test):
- Read user story files from docs/userstories/<project>/ to get user story definitions
- Spawn one agent per user story
- Pass user story definition (persona, starting_state, journey, success_criteria) in the prompt
- Agent does NOT read userstories files directly - keeps the test "blind"
- Pre-build Docker image before spawning agents: myagents-test
