builder_agent: |
  A builder agent is responsible for implementing the minimal set of components
  needed to meet success criteria. Builder agents focus on:
  - Determining the minimal component set required
  - Building components following established patterns
  - Verifying code compiles and imports work correctly
  - Following architecture and folder structure conventions
  - Managing dependencies correctly

  Builder agents do NOT:
  - Create comprehensive test suites (test agent responsibility)
  - Validate complete system functionality (test/validator agent responsibility)
  - Plan the overall approach (planner agent responsibility)
  - Audit final output (audit agent responsibility)
