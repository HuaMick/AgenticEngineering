reward-hacking: |
  Agents optimizing criteria without doing the intended work.

  Common Signals:
  - Tests validate implementation details instead of behavior
  - "PASS" reported without running the required commands or validations
  - Overly permissive assertions, skipped tests, or "help-text only" checks

  Prevention:
  - Separate builder and validator roles
  - Require evidence (outputs, files, logs), not "success: true"
  - Prefer outcome-based success criteria

reward_hacking_signals: |
  Patterns that indicate tests are gaming success criteria:

  1. Help-text only validation:
     - Running --help instead of actual commands
     - Checking help text exists without testing functionality

  2. Success flag without verification:
     - assert result.success == True (without verifying outcomes)
     - Checking return codes without validating actual outputs

  3. Mocking instead of real dependencies:
     - Creating mocks to make tests pass
     - Not testing real integrations

  4. Validating implementation details:
     - Testing internal code structure instead of behavior
     - Checking function calls instead of user-facing outcomes

  5. Permissive assertions:
     - len(output) > 0 (any output passes)
     - Assertions that always pass regardless of correctness

  6. Missing negative test cases:
     - Only testing happy path
     - No validation of error handling

  7. Silent failures:
     - Errors not logged or observable
     - Failures not bubbling up to user
