agent_context_files: |
  Agent context is stored in <agent_name>/:
  - process.yml or processes/<name>.yml - Step-by-step instructions
  - definitions.yml - Concept definitions agents may need
  - manifest.yml - Folder structure and file locations

  Agent role definitions are in .claude/agents/<agent>-agent.md

  When updating documentation, ensure agent manifests reference new docs
  so agents can discover them.
