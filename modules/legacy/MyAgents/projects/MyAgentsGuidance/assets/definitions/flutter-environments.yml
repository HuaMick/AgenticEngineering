environment_notes: |
  Flutter tests have different behavior in different environments:

  1. **Native Flutter** (preferred):
     - Full dart:io access, WebSocket works normally
     - Use for all test types

  2. **Docker**:
     - WebSocket localhost connections may fail
     - Use only for pure Dart logic tests (crypto, state management)

  3. **CI/CD (Cloud Build)**:
     - Use ghcr.io/cirruslabs/flutter:stable image
     - Runs natively, localhost works normally
