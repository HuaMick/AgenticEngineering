test_structure: |
  Tests are organized using "1 package per workflow" structure under tests/workflows/.
  Each workflow has its own test package containing workflow-specific tests.

  **Naming Conventions**:
  - CLI/infrastructure workflows: Use descriptive names (e.g., health_check, cli_routing, studio, infrastructure)
  - Agent workflows: Prefix with "agent_" (e.g., agent_chat, agent_shell_operations)
  - End-to-end tests: Use "e2e/" for cross-workflow integration tests

  **Test Organization Principles**:
  - Tests are organized by workflow, not by layer (no separate "unit" vs "integration" directories)
  - Domain/tool layer testing happens through workflow tests, not as separate integration tests
  - Each workflow test package is self-contained with its own fixtures and helpers
  - Cross-workflow scenarios belong in tests/workflows/e2e/

  **Example Structure**:
  ```
  tests/workflows/
    health_check/          # CLI workflow tests
      test_health_check.py
    agent_chat/            # Agent workflow tests
      test_coding_agent_integration.py
    e2e/                   # Cross-workflow end-to-end tests
      test_myagents_cli_e2e.py
      conftest.py
  ```
