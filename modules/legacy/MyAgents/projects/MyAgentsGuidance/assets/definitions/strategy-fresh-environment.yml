fresh-environment-test: |
    A testing strategy that validates the system works for new users with zero configuration.
    Justification: "Works on my machine" is a common failure mode; clean environment testing proves portability.

    MANDATORY before any release - created based on GCPTOOLKIT-CONFIG-GAP-001 lessons learned.

    Purpose: Ensure automated tests passing = system actually works for end users

    Test environment requirements:
    - Clean environment (no ~/.config/myagents/ or ~/.config/agent-gcptoolkit/)
    - No pre-existing configuration
    - No environment variables
    - No hidden configuration
    - Test environment = production environment

    Test scenarios:
    1. First-time user (no configuration)
    2. Configuration setup flow
    3. Post-setup functionality
    4. Error detection and recovery
    5. Portability testing
    6. Non-interactive (CI/CD) mode

    Success criteria:
    - All setup steps work from fresh environment
    - Error messages are clear and actionable
    - No manual file editing required
    - Documentation can be followed exactly
    - System works after setup

    Integration with release process:
    - Phase 5 of pre-release checklist
    - Must pass before manual verification
    - Catches portability issues (hardcoded paths)
    - Validates configuration setup flow

    See: tests/manual/fresh_environment_test_guide.md
