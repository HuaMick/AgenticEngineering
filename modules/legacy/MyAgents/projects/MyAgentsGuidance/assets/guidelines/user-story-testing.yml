guideline:
  name: "User Story Testing"
  description: |
    Defines patterns for user simulator testing including Docker environment preparation,
    user story extraction, blind testing methodology, and dual environment validation.

    This guideline ensures consistent, unbiased testing of user journeys across both
    local and containerized environments.

  inputs:
    - location: "docs/services/userstories/"
      description: "Directory containing user story definitions for each project"
    - location: "assets/definitions/strategy-user-simulation.yml"
      description: "Definition of user simulation testing strategy"

  rules:
    - rule: "User Simulator Prerequisites"
      description: |
        Pre-build the Docker test image once before spawning any user simulator agents.
      justification: |
        Building the image per-agent wastes time and resources. A single pre-built image
        ensures consistent test environment across all simulator runs.
      execution_pattern:
        - "Check if myagents-test Docker image exists and is current"
        - "If missing or outdated → Build image before spawning agents"
        - "Verify image build succeeds before proceeding"
        - "All subsequent user simulator agents use the pre-built image"
      characteristics:
        - "Image name: myagents-test (or project-specific variant)"
        - "Build once at start of test phase, not per-agent"
        - "Image must include all test dependencies"
        - "Failed image build halts test phase execution"

    - rule: "User Story Extraction"
      description: |
        Read user story definitions from the standard location before spawning simulators.
      justification: |
        Centralizing user stories in docs/services/userstories/ ensures consistency,
        version control, and reusability across test runs.
      execution_pattern:
        - "Navigate to docs/services/userstories/<project>/ folder"
        - "Read relevant user story definition files"
        - "Extract: persona, starting_state, journey, success_criteria"
        - "Pass extracted content to simulator agent (not file paths)"
      characteristics:
        - "Stories organized by project/service subdirectories"
        - "Each story file defines one complete user journey"
        - "Required fields: persona, starting_state, journey, success_criteria"
        - "Optional fields: preconditions, cleanup_steps"

    - rule: "Blind Testing Pattern"
      description: |
        Pass user story content to agents, not file paths. Keeps tests unbiased.
      justification: |
        Agents knowing file paths could inadvertently read implementation details,
        biasing test behavior. Blind testing ensures authentic user simulation.
      execution_pattern:
        - "Extract user story content from definition file"
        - "Pass story as inline content in agent spawn prompt"
        - "Do NOT pass file paths, folder locations, or source references"
        - "Agent receives only: persona, starting_state, journey, success_criteria"
      characteristics:
        - "Agent prompt contains story content, not file references"
        - "Agent cannot access story source file during test"
        - "Prevents implementation bias in test execution"
        - "Enables genuine user perspective simulation"

    - rule: "Dual Environment Testing"
      description: |
        Each user simulator agent tests both local and Docker environments.
      justification: |
        Local testing catches development issues quickly. Docker testing validates
        production-like behavior. Both are required for confidence.
      execution_pattern:
        - "Agent first executes user journey in local environment"
        - "Record local environment results"
        - "Agent then executes same journey in Docker environment"
        - "Record Docker environment results"
        - "Report combined results with environment-specific details"
      characteristics:
        - "Local test: Direct execution against development setup"
        - "Docker test: Execution against myagents-test container"
        - "Both must pass for overall success"
        - "Environment-specific failures reported separately"

  examples:
    good:
      - description: "Pre-building Docker image before test phase"
        example: |
          # At start of test phase (before spawning any simulators)
          step:
            description: "Build test Docker image"
            bash: "docker build -t myagents-test -f Dockerfile.test ."
            success_criteria:
              - "Exit code 0"
              - "Image myagents-test exists in docker images"

      - description: "Extracting and passing user story content"
        example: |
          # Read story file
          story_content:
            persona: "New user signing up for first time"
            starting_state: "On landing page, not authenticated"
            journey:
              - "Click 'Sign Up' button"
              - "Fill registration form with valid data"
              - "Submit form"
              - "Verify welcome email received"
            success_criteria:
              - "Account created in database"
              - "Welcome email sent within 60 seconds"
              - "User redirected to dashboard"

          # Spawn with content, not path
          spawn:
            agent_type: "test-user-simulator"
            context: |
              Execute this user story in both local and Docker environments:
              Persona: New user signing up for first time
              Starting State: On landing page, not authenticated
              Journey: [steps as inline content]
              Success Criteria: [criteria as inline content]

      - description: "Dual environment test execution"
        example: |
          spawn:
            agent_type: "test-user-simulator"
            task: "Execute signup journey"
            environments:
              - "local: Run against http://localhost:3000"
              - "docker: Run against myagents-test container"
            acceptance_criteria:
              - "Local: All journey steps complete successfully"
              - "Docker: All journey steps complete successfully"
              - "Both environments: Success criteria verified"

    bad:
      - description: "Passing file paths instead of content"
        example: |
          # Wrong: Agent can read implementation from path
          spawn:
            agent_type: "test-user-simulator"
            story_file: "docs/services/userstories/auth/signup.yml"
          # Right: Pass extracted content inline

      - description: "Testing only one environment"
        example: |
          # Wrong: Only testing locally
          spawn:
            agent_type: "test-user-simulator"
            environment: "local"
          # Missing Docker validation

      - description: "Building Docker image per agent"
        example: |
          # Wrong: Each agent builds its own image
          for story in stories:
            spawn:
              agent_type: "test-user-simulator"
              pre_step: "docker build -t myagents-test ."
          # Right: Build once before spawning any agents

  related_guidelines:
    - location: "assets/guidelines/testing.yml"
      description: "General testing guidelines including user simulation strategy"
    - location: "assets/definitions/strategy-user-simulation.yml"
      description: "Definition of user simulation testing strategy"
    - location: "assets/definitions/strategy-agent-blind-test.yml"
      description: "Definition of agent blind testing strategy"
