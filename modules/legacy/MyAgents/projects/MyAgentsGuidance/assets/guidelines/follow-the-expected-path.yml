guideline:
  name: "Follow the Expected Path"
  description: |
    Guidelines for maintaining process consistency and operational safety. 
    Adhere to established workflows and escalate rather than inventing 
    workarounds.

  inputs:
    - location: "assets/definitions/escalation.yml"
      description: "Triggers for stopping work and requesting guidance"
    - location: "assets/definitions/guidance.yml"
      description: "Definitions of what guidance is and how it should be used"

  rules:
    - rule: "Process adherence"
      description: |
        Follow the steps defined in the process and guidelines exactly. 
        Do not skip steps or invent shortcuts to reach an outcome faster.
      justification: |
        Consistency enables reliable automation, debugging, and cross-agent 
        collaboration. Bypassing processes creates unpredictable state.

    - rule: "Escalate over workaround"
      description: |
        If the expected path is blocked, ambiguous, or seems inefficient, 
        escalate to a human or higher-level agent for guidance.
      justification: |
        Prevents the introduction of fragile workarounds or incorrect 
        assumptions that degrade system integrity.

  anti_patterns:
    - "Bypassing safety or audit checks to save time"
    - "Creating custom scripts for tasks that have established processes"
    - "Guessing at requirements when they are unclear or conflicting"

  related_guidelines:
    - location: "assets/guidelines/safety.yml"
      description: "Security and operational guardrails"
    - location: "assets/guidelines/worktree-and-branching.yml"
      description: "Branching and worktree policies"
