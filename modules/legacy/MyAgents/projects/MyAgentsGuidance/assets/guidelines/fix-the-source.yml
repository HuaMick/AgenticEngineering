guideline:
  name: "Fix the Source"
  description: |
    Guidelines for addressing the root cause of issues to prevent 
    recurrence and avoid technical debt from symptom-masking workarounds.

  inputs:
    - location: "assets/definitions/root-cause-analysis.yml"
      description: "Reproduce-trace-fix-verify pattern"

  rules:
    - rule: "Fix the source, not the symptom"
      description: |
        Identify the underlying root cause and resolve it at the source. 
        Avoid adding conditional checks or null guards that merely hide a failure.
      justification: |
        Symptom-masking workarounds create technical debt and hidden complexity. 
        The problem will eventually resurface, often in a more confusing state.
      examples:
        wrong: "Adding a null check to hide an uninitialized state error"
        right: "Ensuring state is correctly initialized so the error cannot occur"

    - rule: "Reproduce and trace"
      description: |
        Always reproduce the failure first. Trace it back to the earliest 
        failing signal to identify the precise cause before attempting a fix.
      justification: |
        Systematic tracing ensures the fix targets the actual problem rather 
        than a secondary side effect.

    - rule: "Validate tests first"
      description: |
        Verify that your test accurately identifies the failure before 
        modifying production code.
      justification: |
        Ensures the test is a valid measure of success and prevents 
        false passes.

  anti_patterns:
    - "Masking errors with try-except blocks without handling them"
    - "Hardcoding values to fix dynamic failures"
    - "Adding specific edge-case handlers for problems that should be generic"

  related_guidelines:
    - location: "assets/guidelines/testing.yml"
      description: "Standard validation practices"
