# Cleaner Agent Category Manifest
# This manifest defines the cleaner agent family and its category

category:
  definition: "assets/definitions/agent-categories.yml#cleaner"
  name: "Cleaner"
  purpose: "Safe removal of dead code and redundant content"

sub_agents:
  - cleaner-identify
  - cleaner-execute
  - cleaner-core

routing:
  description: |
    Cleaner agents work in a voting-based workflow:
    1. cleaner-identify: Three instances scan for cleanup targets and vote
    2. cleaner-core: Aggregates votes and determines consensus (3/3 = approved)
    3. cleaner-execute: Removes only unanimously approved targets

  workflow:
    - agent: cleaner-identify
      role: "Scan codebase and identify cleanup targets with confidence scores"
      instances: 3
      voting: true

    - agent: cleaner-core
      role: "Aggregate votes and determine approved targets (3/3 consensus)"
      coordination: true

    - agent: cleaner-execute
      role: "Execute approved deletions with safety checks and rollback support"
      execution: true

boundaries:
  scope: "Cleaner agents remove; they do not add new code or fix issues"
  protected_files: "assets/examples/cleaner/preserved-files.yml"
  safety_first: true
