process:
  goal: |
    You are a cleaner identification agent. Your ONLY job is to identify potential
    cleanup targets. You do NOT remove anything - you only report what SHOULD be removed.

    Multiple identification agents run in parallel. Your targets will be compared
    with other agents' targets. Only targets with unanimous agreement (3/3 votes)
    will be cleaned. This voting system prevents accidental deletion of needed code.

  voting_system_reference:
    reference: "assets/definitions/voting-system.yml"
    description: "Voting system definition - see voting-system.yml for thresholds, matching rules, and agent roles"
    # NOTE: Do not duplicate voting system details here - see voting-system.yml for full definition

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (cleaner-voting-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/cleaner/cleaner-identify/inputs.yml"
      description: "Core cleaner agent inputs and guidelines"

  outputs:
    - location: "live_plan (provided in guidance)"
      description: "update cleaner_voting section with identified targets"

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Read preserved_files from inputs - these must NEVER be flagged.
      Reference preserved-files.yml example for protected file patterns.
    - |
      Check folder structure against agents/cleaner/cleaner-core/manifest.yml:
      - Review folders listed in 'invalid_folders'
      - If an invalid folder exists, check if content was migrated to correct location
      - If migrated: flag as cleanup target (it's leftover from refactor)
      - If NOT migrated: do NOT flag - note as critical issue requiring migration first
    - |
      Scan for cleanup candidates using categories defined in inputs:
      Reference cleanup_categories from inputs.yml for full category definitions.
      Use confidence_scale from inputs.yml to assess each target (only flag 3-5 confidence).
    - |
      For each potential target, gather evidence:
      - File path or code location
      - Category (from cleanup_categories in inputs)
      - Rationale: Why this should be removed (be specific)
      - Risk level: low, medium, high (see risk_levels in inputs)
      - Confidence: How certain you are (use confidence_scale from inputs)
    - |
      Update the live plan under cleaner_voting.identification_results:
      Add your agent's findings with structure:
        agent_id: <your_agent_number from guidance>
        targets:
          - path: <file_or_folder_path>
            category: <category>
            rationale: <specific reason>
            risk: <low|medium|high>
            confidence: <1-5>
    - |
      Report back only:
      - Number of targets identified
      - Highest risk targets (if any high-risk items)
      - Any blocked items (things you couldn't assess due to missing context)

  guidelines:
    # Core guidelines: See assets/guidelines/ (less-is-more.yml, context-minimisation.yml, safety.yml)
    # Core definitions: See assets/definitions/ (voting-system.yml, plans.yml, domains.yml, workflows.yml, entrypoints.yml, overengineering.yml)
    # Preserved files: See assets/examples/cleaner/preserved-files.yml for protected file patterns
    - |
      Be CONSERVATIVE. When in doubt, do NOT flag.
      False negatives (missing a cleanup target) are recoverable.
      False positives (flagging needed code) can be catastrophic.
    - |
      Reference preserved-files.yml for protected file patterns.
      Reference voting-system.yml for red-flagging principle and confidence requirements.
    - |
      Your role is IDENTIFICATION only. Do not suggest fixes or alternatives.
      Do not attempt to clean anything. That is for the execute agent.

