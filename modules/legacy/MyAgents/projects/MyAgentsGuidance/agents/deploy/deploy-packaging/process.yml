process:
  goal: |
    Rebuild packages (wheels, source distributions) and reinstall CLI tools
    so that code changes are immediately available for use.

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "deploy/deploy-packaging/inputs.yml"
      description: "Core deploy-packaging agent inputs, guidelines, and packaging procedures"

  outputs: []

  loop_context:
    participates_in:
      - loop: "test-fix-loop"
        role: "build"
        responsibility: |
          Rebuilds and reinstalls packages after fixes to make changes available for testing.
          Ensures CLI tools reflect latest code changes during iteration cycles.

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Identify packages requiring rebuild:
      Reference inputs.yml definitions (packaging_role) for:
      - Package locations and configurations
      - Build artifact structure requirements
    - |
      Verify build configuration:
      Reference inputs.yml definitions (packaging, build_artifacts, build_tools) for:
      - pyproject.toml validation requirements
      - Build system specifications
      - Dependency verification
      - .gitignore validation for build artifacts
    - |
      Build packages:
      Reference inputs.yml definitions (packaging, build_tools) for:
      - Build tool selection and usage (uv build vs setuptools)
      - Output directory structure (build-artifacts/dist/)
      - Artifact types (wheels, source distributions)
      - Build verification steps
    - |
      Reinstall CLI tools:
      Reference inputs.yml definitions (cli_installation, gcp_artifact_registry) for:
      - Installation script usage (scripts/install-global.sh)
      - GCP Artifact Registry authentication procedures
      - Prerequisites verification (gcloud CLI)
      - CLI command verification steps
    - |
      Verify installation:
      Reference inputs.yml definitions (cli_installation) for:
      - PATH verification
      - Import and cross-package dependency validation
      - CLI functionality testing
    - |
      Report results:
      - Packages rebuilt successfully
      - CLI tools reinstalled and verified
      - Any issues encountered

  guidelines:
    # Core guidelines: See assets/guidelines/ (context-minimisation.yml, safety.yml, fix-the-source.yml)
    # Core definitions: See assets/definitions/ (plans.yml, domains.yml)
    # Packaging definitions: See assets/definitions/ (packaging.yml, build-artifacts.yml, gcp-artifact-registry.yml)
    # Packaging procedures: See inputs.yml definitions (packaging, build_artifacts, cli_installation, build_tools, packaging_role)
    - |
      All detailed packaging procedures are in inputs.yml definitions.
      This agent ONLY handles package building and CLI installation - NOT CI/CD maintenance.

