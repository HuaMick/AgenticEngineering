# Deploy-Packaging Agent Inputs
# Context-minimised inputs for packaging and CLI reinstallation
# This agent ONLY handles package building and CLI installation - NOT CI/CD maintenance

inputs:
  agent_type: "deploy-packaging"
  version: "2.0-p1"

  agent_context:
    category: "assets/definitions/agent-categories.yml#deploy"
    role: "deploy-packaging"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Core guidelines (fix-the-source, context-minimisation, experiment-first, less-is-more, worktree-and-branching, testing, response-audit, safety)"
      required: true

    - type: layer
      path: "assets/inputs/deploy-shared.yml"
      description: "Deploy shared inputs (guidance, friction)"
      required: true

  # Agent-specific inputs
  core_inputs:
    # Package configuration files - the source of truth for building
    - type: file
      path: "pyproject.toml"
      description: "MyAgents package configuration for building wheels and managing dependencies"
      required: true

    - type: file
      path: ".gitignore"
      description: "Git ignore patterns - verify build artifacts are excluded from version control"
      required: true

    # Installation scripts for CLI tools
    - type: pattern
      path: "scripts/*.sh"
      description: "Build and installation scripts - install-global.sh handles GCP registry auth and CLI installation"
      required: true

  # Packaging-specific terminology and definitions
  # These provide essential context for building and installing packages
  definitions:
    packaging:
      reference: "assets/definitions/packaging.yml"

    build_artifacts:
      reference: "assets/definitions/build-artifacts.yml"

    cli_installation: |
      The process of installing CLI tools globally so that code changes are immediately available.

      For MyAgents and Agent-GCPtoolkit:
      - Use scripts/install-global.sh for global CLI installation
      - The script handles GCP Artifact Registry authentication automatically
      - It configures netrc with gcloud credentials
      - It fetches agent-gcptoolkit from the private registry

      Prerequisites:
      - gcloud CLI installed and authenticated (gcloud auth login)

      Verification:
      - Test CLI commands are in PATH (myagents --help, gcptoolkit version)
      - Verify imports work correctly
      - Check cross-package dependencies resolve

    gcp_artifact_registry:
      reference: "assets/definitions/gcp-artifact-registry.yml"

    build_tools: |
      Tools used for building Python packages:

      Primary tool: uv (modern, fast Python package manager)
      - uv build: Build wheel and source distributions
      - uv tool install: Install CLI tools globally
      - uv pip install: Install packages with dependencies

      Alternative: setuptools (traditional)
      - python -m build: Build packages
      - pip install: Install packages

      Always prefer uv when available for faster builds and better dependency resolution.

    packaging_role: |
      As a deploy-packaging agent:
      - You ONLY handle package building and CLI installation
      - You do NOT maintain CI/CD pipelines (that's for deploy-cicd agent)
      - You do NOT manage worktrees or branches
      - You verify build artifacts are git-ignored
      - You ensure CLI commands work after reinstallation
      - You build to build-artifacts/ directory only
      - You validate prerequisites before building (gcloud auth, etc.)
