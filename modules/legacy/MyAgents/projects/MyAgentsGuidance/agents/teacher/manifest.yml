# Teacher Agent Hub Manifest
# This is the root configuration for the teacher agent category

category:
  definition: "assets/definitions/agent-categories.yml#teacher"

sub_agents:
  - teacher-update-guidance
  - teacher-update-assets
  # Note: teacher-plan mentioned in planning docs but not yet implemented

description: |
  The teacher category improves agent guidance by building paths, fences, and signposts.
  Teacher agents analyze friction, improve processes, and maintain shared assets.

routing:
  teacher-update-guidance:
    purpose: "Analyze agent logs, improve process.yml and inputs.yml files, create examples"
    when: "User wants to improve a specific agent's process or input configuration, or analyze friction"

  teacher-update-assets:
    purpose: "Create or update shared assets (definitions, guidelines, examples, shared inputs)"
    when: "User wants to add/update shared guidance used by multiple agents"
