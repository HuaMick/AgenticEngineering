agent_context:
  category: "assets/definitions/agent-categories.yml#planner"
  role: "planner-build"

inputs:
  agent_type: "planner-build"
  version: "2.0-p1"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Build-planning specific inputs
  core_inputs:
    # Build-specific architectural guidance
    - type: file
      path: "agents/planner/planner-build/manifest.yml"
      description: "Architecture checklist and mandatory phase patterns (worktree specification, CI/CD validation triggers, domain->workflow->entrypoint alignment)"
      required: true

    # Build plan example
    - type: file
    - path: "assets/examples/planner/YYMMDDRepo_Branch/live/plan_live_teach.yml"
      description: "Build-focused live plan example showing proper plan structure with file-level inputs, detailed guidance, and measurable success criteria for build and environment setup phases"
      required: true

    # Existing plans for context
    - type: pattern
      path: "docs/plans/live/*/plan_live_teach.yml"
      description: "Existing build phase plans in folder-based structure (YYMMDDRepo_Branch) to understand current state"
      required: false

  # Build-specific guidelines
  guidelines: []

  # Build-specific definitions - keep minimal, reference definition files
  # Per context-minimisation.yml: "Provide only the information required for a process to complete its task"
  definitions:
    # Loop definitions: See assets/definitions/agent-loops.yml (test-fix-loop, audit-test-fix-loop)
    # Plan inputs: See assets/definitions/plan-inputs.yml
    # Success criteria: See assets/definitions/user-stories.yml (UAT validation)
    # Architecture: See docs/ARCHITECTURE.md (Domain → Workflow → Entrypoint)
    # Overengineering: See assets/definitions/overengineering.yml

    build_artifacts: |
      Build artifacts should be placed in build-artifacts/dist/ directory.
      Never commit build artifacts to version control.
