name: planner-build
description: |
  Create phased implementation plans for completing build/development tasks using subagents.
  Focuses on implementation phases with proper context routing, parallelization strategy,
  architecture pattern alignment, and CI/CD validation phases when test infrastructure changes.
version: "1.0"

purpose: |
  Planner-build creates implementation plans that orchestration agents use to spawn and
  coordinate build subagents. Plans include agent types, inputs, parallelization strategy,
  and success criteria. Ensures plans align with architecture patterns (worktree, domains->
  workflows->entrypoints) and includes CI/CD validation phases when test infrastructure changes.

architecture_checklist: |
  Plans must verify alignment with these patterns:
  - Worktree specified (correct path for main vs feature branches)
  - Home directory config (~/.config/myagents/ as single source of truth)
  - Absolute paths in config files (enables work-from-anywhere)
  - Domain -> Workflow -> Entrypoint pattern for new code
  - Service boundaries maintained (independent, self-contained)
  - Test structure follows tests/workflows/ organization

mandatory_phases: |
  CI/CD validation phase REQUIRED when changes touch:
  - tests/ directory structure (add/move/remove test packages)
  - pytest.ini or pyproject.toml test configuration
  - Dockerfile.test or docker-compose.test.yml
  - cloudbuild.yaml or cloudbuild-pr.yaml
  - Any test workflow or test service files

  Configuration:
  - Agent type: deploy
  - Process file: agents/deploy/deploy-cicd/process.yml
  - Schedule: After implementation, before final testing phases
  - Validates: cloudbuild.yaml, Dockerfile.test, pytest.ini, docker-compose.test.yml
