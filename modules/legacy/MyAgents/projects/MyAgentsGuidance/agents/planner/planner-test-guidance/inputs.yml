# Planner-Test-Guidance Agent Inputs
# Defines the files, directories, and context that planner-test-guidance agents need
# to create guidance test execution plans (guidance-test-loop).
#
# PURPOSE:
# Planner-test-guidance agents create phased guidance test execution plans that orchestration
# agents use to spawn and coordinate test-guidance-simulator agents. Plans include test scenarios,
# guidance-test-loop patterns, and success criteria for validating agent guidance completeness.
#
# CONTEXT MINIMIZATION:
# This agent ONLY receives inputs needed for guidance test planning. It does NOT need:
# - Implementation test planning patterns (test-fix-loop, audit-test-fix-loop)
# - User story testing patterns (agent-blind-test)
# - Component testing patterns (smoke_test)
# - Build planning patterns (cleaner-voting-loop, overengineering)
# - Documentation planning patterns (documentation-loop)
#
# RESPONSIBILITIES:
# - Create guidance test execution plans with guidance-test-loop pattern
# - Define test scenarios (task_completion, reference_resolution, loop_context, subagent_spawning)
# - Specify test success criteria and gap detection requirements
# - Route test inputs (agent guidance files to test)
# - Ensure plans align with guidance-blind-test strategy and minimal context principles

agent_context:
  category: "assets/definitions/agent-categories.yml#planner"
  role: "planner-test-guidance"

inputs:
  agent_type: "planner-test-guidance"
  version: "1.0"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Guidance-test-planning specific inputs
  core_inputs:
    # Guidance-specific architectural guidance
    - type: file
      path: "agents/planner/planner-test-guidance/manifest.yml"
      description: "Guidance test plan structure requirements and test scenario selection rules (test scenarios, minimal context principles, gap categorization, process mapping)"
      required: true

    # Guidance definitions and patterns
    - type: file
      path: "assets/definitions/guidance.yml"
      description: "Guidance structure and purpose - defines what guidance files should contain"
      required: true

    - type: file
      path: "assets/definitions/friction.yml"
      description: "Friction patterns for gap categorization - used to classify detected guidance gaps"
      required: true

    # Test execution processes and workflows
    - type: file
      path: "agents/test/test-guidance-simulator/process.yml"
      description: "Guidance simulator process for executing guidance-blind-test validation"
      required: true

    # Test strategies and scenarios
    - type: file
      path: "assets/definitions/strategy-guidance-blind-test.yml"
      description: "Guidance blind test strategy - primary testing approach for guidance validation"
      required: true

    - type: file
      path: "assets/definitions/guidance-test-scenarios.yml"
      description: "Test scenario definitions (task_completion, reference_resolution, loop_context, subagent_spawning, cross_agent_dependency)"
      required: true

    # Example guidance test plan structure
    - type: file
      path: "assets/examples/test/guidance-test-plan.yml"
      description: "Guidance test phase example showing guidance-test-loop structure with test scenarios, minimal context principles, file-level inputs, and measurable success criteria"
      required: true

    # Teaching framework concepts
    - type: file
      path: "assets/definitions/path.yml"
      description: "Path concept for guidance validation - tests if agents can discover required files"
      required: true

    - type: file
      path: "assets/definitions/fence.yml"
      description: "Fence concept for constraint validation - tests if agents respect guidance boundaries"
      required: true

    - type: file
      path: "assets/definitions/signpost.yml"
      description: "Signpost concept for discoverability testing - tests if guidance provides clear directions"
      required: true

  # Guidance-test-planning specific guidelines
  guidelines: []

  # Guidance-test-planning specific definitions
  # Per context-minimisation.yml: definitions are in planner-test-guidance/process.yml and referenced definition files
  definitions:
    # Loop definitions: See planner-test-guidance/process.yml (guidance-test-loop)
    # Test scenarios: See assets/definitions/guidance-test-scenarios.yml
    # Friction patterns: See assets/definitions/friction.yml
    # Teaching concepts: See assets/definitions/path.yml, fence.yml, signpost.yml
