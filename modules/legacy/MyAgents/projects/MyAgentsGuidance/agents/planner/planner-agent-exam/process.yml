process:
  goal: |
    Create an exam plan to evaluate a target agent's ability to follow guidelines.
    The plan involves selecting already-implemented tasks, having the target agent
    propose an implementation, and having a teacher agent review the proposal against guidelines.

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions
    # This exam process uses an exam validation pattern similar to test-fix-loop but with student/teacher roles

  inputs:
    - location: "agents/planner/planner-agent-exam/inputs.yml"
      description: "Exam configuration (target agent, number of tasks)"
      required: true
    - location: "docs/plans/completed/"
      description: "Source of completed tasks to use as exam questions"
    - location: "docs/services/userstories/"
      description: "Source of user stories to use as exam questions"
    - location: "assets/guidelines/"
      description: "Agent guidelines to be used for grading"

  outputs: []

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Parse the configuration from inputs.yml to determine:
      - target_agent_type: Which agent type to examine
      - num_tasks: Number of exam questions (default is 3)
      - task_source_filter: Optional filter for task selection
    - |
      Select 'n' distinct tasks from docs/plans/completed/ or docs/services/userstories/.
      - Tasks should be substantial enough to require component breakdown
      - Tasks should be isolated enough for a single session
      - Prefer tasks with clear, existing implementations for reference
    - |
      Update the live plan with a sequence of exam modules. For each selected task:

      1. Create a "Student" Task:
         - Role: [Target Agent Type]
         - Action: "Propose an implementation for: [Task Description]. Describe your approach step-by-step or component by component. Do NOT write code, just the design and plan."
         - Context: Provide the task requirements. Do NOT provide the existing solution.

      2. Create a "Teacher" Task:
         - Role: Teacher Agent
         - Action: "Review the implementation proposal from the previous step."
         - Inputs: The Student's proposal and specific guidelines for [Target Agent Type]
         - Instructions: "Compare the proposal against the agent guidelines. Flag any inconsistencies, over-engineering, or violations of the 'minimal changes' principle."
    - |
      Provide the exam plan back to the main orchestration agent for execution.

  guidelines:
    - |
      Ensure the Target Agent is strictly evaluated on *planning* and *design*, not final code execution.
    - |
      The Teacher Agent must be explicitly pointed to the relevant guideline files for the target agent.
    - |
      Tasks selected should be representative of real work (real user stories or completed plan items).

