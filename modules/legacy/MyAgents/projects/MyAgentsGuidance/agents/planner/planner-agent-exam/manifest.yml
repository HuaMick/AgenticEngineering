name: planner-agent-exam
description: "Generate exam questions to validate agent understanding of guidelines and capabilities"
version: "1.0"

purpose: |
  Create exam plans to evaluate target agents' ability to follow guidelines and understand
  their scope boundaries. Uses completed tasks or user stories as exam questions where
  agents propose implementations (without executing) and teacher agents review proposals
  against guidelines.

exam_structure: |
  Each exam consists of:
  1. Student Task: Target agent proposes an implementation approach
     - Focuses on planning and design, not code execution
     - Agent describes step-by-step or component-by-component approach
     - No access to existing solution

  2. Teacher Task: Teacher agent reviews the proposal
     - Compares proposal against agent guidelines
     - Flags inconsistencies, over-engineering, or violations
     - Identifies missing considerations or wrong agent routing

exam_question_sources: |
  Questions drawn from:
  - docs/plans/completed/: Completed tasks with known solutions
  - docs/services/userstories/: User stories with expected outcomes

  Selection criteria:
  - Substantial enough to require component breakdown
  - Isolated enough for single session
  - Clear existing implementations for reference

grading_focus: |
  Teacher agents evaluate:
  - Adherence to minimal changes principle
  - Proper agent routing (right agent for the task)
  - Following architecture patterns
  - Avoiding over-engineering
  - Respecting scope boundaries
  - Understanding of success criteria
