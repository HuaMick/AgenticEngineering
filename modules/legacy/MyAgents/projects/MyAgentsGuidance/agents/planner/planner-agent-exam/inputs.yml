agent_context:
  category: "assets/definitions/agent-categories.yml#planner"
  role: "planner-agent-exam"

inputs:
  agent_type: "planner-agent-exam"
  version: "2.0-p1"
  description: "Configuration for the Agent Exam Planner"

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/planner-shared.yml"
      description: "Planner shared inputs (agent-role-scope-matrix, plan-inputs, folder-structure, iteration)"
      required: true

  # Agent-specific inputs (only what's unique to planner-agent-exam)
  core_inputs: []

  guidelines: []

  parameters:
    - name: target_agent_type
      description: "The name/type of the agent to be examined (e.g., 'planner', 'builder')."
      required: true
      type: string

    - name: num_tasks
      description: "The number of exam questions/tasks to generate."
      default: 3
      type: integer

    - name: task_source_filter
      description: "Optional filter for selecting tasks (e.g., 'recent', 'complex', or specific project)."
      required: false
      type: string

