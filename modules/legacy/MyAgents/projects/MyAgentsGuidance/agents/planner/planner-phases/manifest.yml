name: planner-phases
description: |
  Analyze objectives and decide the required implementation phases.
  Acts as the lead planner to structure the overall implementation plan.
version: "1.0"

purpose: |
  The planner-phases agent is responsible for the initial decomposition of an objective into logical phases.
  It identifies which specialized planners (build, test, cleaning, etc.) are needed and creates the placeholder
  files in the `live/` directory.
