process:
  goal: |
    Create a phased test plan for validating the implementation using test-fix-loop
    and audit-test-fix-loop patterns with user story validation.

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop, audit-test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/planner/planner-test/inputs.yml"
      description: "Core planner agent inputs and guidelines"

  outputs: []

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      PLAN FOLDER STRUCTURE:
      Plans are now organized in folders, not single files. The planning folder structure is:

      docs/plans/live/YYMMDDRepo_Branch/
        - live/plan_live_*.yml           (Active phase files, one per phase)
        - completed/plan_completed.yml   (Completed items from all phases)

      YOUR RESPONSIBILITIES:
      - Read all other phase .yml files in `live/` to understand what was built (your test targets)
      - Create/update `live/plan_live_test.yml` with your test phases
      - Move any completed items to `completed/plan_completed.yml` within the folder
      - Output ONLY to `live/plan_live_test.yml` (do not modify other phase plans)
    - |
      Create test plan phases following the patterns defined in inputs.yml.
      Reference user story integration guidelines from inputs.yml for:
      - User story selection criteria
      - Installation user story requirements (US-INSTALL-*)
      - Three-layer testing approach (Local, Docker, Cloud Build)
      - Environment setup prerequisites
      - User simulator agent execution patterns

      PLAN STRUCTURE REQUIREMENTS:
      Reference the example test plan from inputs (`live/plan_live_test.yml`) for:
      - Test phase structure with test-fix-loop and audit-test-fix-loop patterns
      - File-level inputs for context routing
      - Detailed guidance and measurable success criteria patterns
      - Operation ordering and agent type allocation
      - Component testing and user flow testing integration

      INPUT SOURCE (what you're testing):
      - Read all phase .yml files in `live/` from the planning folder to understand what components were built
      - Use this to determine what needs to be tested and which files to include in test inputs

      OUTPUT TARGET (where you write):
      - Write your test phases to `live/plan_live_test.yml` in the same planning folder
      - This file contains ONLY test phases, not build or cleanup phases

      DUMPING GROUND: Use additional subfolders (e.g., `analysis/`, `test-results/`) to store agent artifacts
      like test logs, coverage reports, or analysis files to avoid polluting shared spaces.
    - |
      The plan should include the following phases in this order:
      1. Test-fix-loop: Incorporates BOTH component testing AND user flow testing
      2. Cleanup phase: Spawned after initial implementation success
      3. Audit-test-fix-loop: MANDATORY after cleanup (reviews skipped tests)
      4. Test suite phase: End-to-end testing (optional, only if requested)
      5. Documentation-loop: Final phase to update documentation

      Reference inputs.yml for detailed phase requirements and ordering rationale.
    - |
      Provide the test plan back to the main orchestration agent for execution.

  guidelines:
    # Core guidelines: See assets/guidelines/ (less-is-more.yml, iteration.yml, fix-the-source.yml, experiment-first.yml, context-minimisation.yml, worktree-and-branching.yml, response-audit.yml)
    # Core definitions: See assets/definitions/ (plans.yml, guidance.yml, friction.yml, domains.yml, workflows.yml, entrypoints.yml)
    # Test strategies and processes: See inputs.yml definitions section and assets/definitions/strategy-*.yml files
    # User story integration: See inputs.yml for detailed user story requirements
    - |
      For complex plans, always include a test-fix-loop.
    - |
      Test strategy selection (see inputs.yml for detailed test strategy definitions):
      - smoke_test: Entry point validation during active development
      - agent-blind-test: User simulator for UAT and documentation validation
      - test-suite: End-to-end testing (only on explicit user request)
      - service_test: Backend service lifecycle validation
      - audit: Test quality review to detect reward hacking
      - cicd_maintenance: CI/CD infrastructure validation
    - |
      When reviewing plans (as a reviewer planner agent):
      - Reference YYMMDDRepo_Branch/live/plan_live_test.yml example for valid structure patterns
      - Verify user stories are incorporated into test-fix-loop phases
      - CRITICAL: Verify test-audit-fix-loop is ALWAYS included after cleanup (mandatory)
      - For plans modifying test structure, verify CI/CD validation phase is included
      - For changes to pyproject.toml, CLI entry points, or installation docs, verify US-INSTALL-* user stories are included
      - Only reject plans with genuine structural issues or missing critical phases
