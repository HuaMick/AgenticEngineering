process:
  goal: "Explore existing patterns and related functionality, update live plan with findings."

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (exploration-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/explore/explore-feature/inputs.yml"
      description: "Core explore agent inputs and guidelines"

  outputs:
    - location: "live plan exploration.findings.features"

  steps:
    - |
      Review inputs from inputs.yml for feature_explorer and feature_discovery_approach.
      If an input cannot be found do not proceed.
    - |
      Follow feature_discovery_approach from inputs.yml:
      - Understand the objective - what feature is being requested?
      - Search for similar features using file patterns and naming conventions
      - Analyze implementation patterns - how are similar features built?
      - Identify reusable components that can be leveraged
    - |
      Update live plan exploration.findings.features with structured findings.
      Follow findings_structure from inputs.yml (similar_features, reusable_components, patterns, recommendations).
