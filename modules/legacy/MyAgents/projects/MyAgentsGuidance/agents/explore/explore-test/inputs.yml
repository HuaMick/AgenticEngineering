# Test Explorer Inputs
# SELF-CONTAINED - All required context for test exploration
# Analyzes test infrastructure and coverage patterns
#
# PURPOSE:
# Test explorer analyzes test suite structure, organization, and coverage patterns
# to inform implementation strategy. Focuses ONLY on test-related exploration.
#
# SCOPE (Context Minimization):
# - Test structure conventions and organization patterns
# - Coverage analysis approaches
# - Testing frameworks and infrastructure
# - Does NOT include: architecture exploration, feature discovery, dependency analysis

# P1 ROLLOUT: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#explore"
  role: "explore-test"

inputs:
  agent_type: "explore-test"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, context-min, experiment-first, testing, etc.)"
      required: true

    - type: layer
      path: "assets/inputs/explore-shared.yml"
      description: "Exploration principles and guidelines for all explore agents"
      required: true

  # Agent-specific inputs (only what's unique to explore-test)
  core_inputs:
    # Test exploration process
    - type: file
      path: "agents/explore/explore-test/process.yml"
      description: "Test explorer process for analyzing test infrastructure and coverage"
      required: true

  # Test explorer specific terminology
  definitions:
    test_explorer_scope: |
      Test explorer focuses exclusively on test infrastructure analysis:

      IN SCOPE:
      - Test directory structure and organization (e.g., tests/, __tests__, spec/)
      - Testing frameworks and tools (pytest, jest, vitest, etc.)
      - Test file naming conventions (test_*.py, *.test.ts, *.spec.js)
      - Test coverage patterns and gaps
      - Test types present (unit, integration, e2e, smoke)
      - Test configuration files (pytest.ini, jest.config.js, etc.)
      - Mock/fixture patterns and test data organization

      OUT OF SCOPE:
      - Application architecture (handled by architecture explorer)
      - Feature implementation patterns (handled by feature explorer)
      - Module dependencies (handled by dependency explorer)
      - Implementation code outside of tests/

    test_findings_format: |
      Test explorer updates live plan exploration.findings.tests with:

      exploration:
        findings:
          tests:
            structure:
              test_directories: []        # Where tests are located
              naming_conventions: []      # How test files are named
              organization_pattern: ""    # How tests are organized
            frameworks:
              primary_framework: ""       # Main testing framework
              additional_tools: []        # Test runners, assertion libs, etc.
            coverage:
              test_types_present: []      # unit, integration, e2e, etc.
              coverage_patterns: []       # What is/isn't tested
              gaps: []                    # Missing test coverage areas
            conventions:
              mock_patterns: []           # How mocks/fixtures are used
              test_data_approach: ""      # How test data is managed
            risks:
              test_infrastructure: []     # Test setup/config risks
              coverage_gaps: []           # Areas lacking tests

    exploration_workflow: |
      Test explorer follows this workflow:

      1. Locate test directories in the codebase
      2. Identify testing frameworks and configuration
      3. Analyze test file structure and naming conventions
      4. Examine test organization patterns (by feature, by type, etc.)
      5. Assess test coverage patterns and identify gaps
      6. Document mock/fixture patterns and test data approaches
      7. Flag test infrastructure risks and coverage concerns
      8. Update live plan exploration.findings.tests with structured findings

      The test explorer does NOT synthesize findings across domains - that is
      the responsibility of the synthesis agent after all explorers complete.
