process:
  goal: "Synthesize explorer findings into actionable recommendations for planners."

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (exploration-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/explore/explore-synthesis/inputs.yml"
      description: "Core explore agent inputs and guidelines"
    - location: "live plan exploration.findings"
      description: "findings from all explorer agents"

  outputs:
    - location: "live plan exploration.exploration_summary"

  steps:
    - |
      Review inputs from inputs.yml for synthesis principles and quality gates.
      If an input cannot be found do not proceed.
    - |
      Consolidate findings from exploration.findings (architecture, features, dependencies, tests).
      Follow synthesis_principles from inputs.yml: consolidate don't duplicate, prioritize actionability.
    - |
      Generate exploration_summary with:
      - relevant_patterns: Cross-cutting patterns relevant to the objective
      - risks: Critical risks flagged during exploration
      - recommendations: Specific, actionable implementation approach suggestions
    - |
      Apply quality_gates from inputs.yml before finalizing.
      Update live plan exploration_summary and mark exploration status as completed.
