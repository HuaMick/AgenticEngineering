process:
  goal: |
    Create and update Flutter test files (Unit, Widget, Integration) that expose defects.

  project_type: flutter

  loop_definitions:
    reference: "assets/definitions/agent-loops.yml"
    description: "Loop types (test-fix-loop) defined in agent-loops.yml"
    # NOTE: Do not duplicate loop definitions here - see agent-loops.yml for full definitions

  inputs:
    - location: "agents/test/test-flutter-builder/inputs.yml"
      description: "Core test Flutter builder agent inputs and guidelines"

  outputs: []

  steps:
    - |
      Review all inputs if an input cannot be found do not proceed.
      If an input is found in a different location, update the path and flag
      the discrepancy in your output.
    - |
      Determine the scope of testing required:
      - Check the plan for specific directives (e.g., "smoketest-build", "test-build").
      - Analyze the codebase to identify components and critical functionality.
    - |
      If executing in a 'smoketest-build' context:
      - Create basic smoke tests that verify core functionality works.
      - Focus on breadth over depth.
    - |
      If executing in a 'test-build' context:
      - Create comprehensive tests including edge cases, error handling, and user flows.
      - Follow Flutter testing best practices per flutter_definitions.yml in inputs.
    - |
      If executing in a 'audit-test-build' context:
      - Read the auditor's report (or plan feedback) to understand what needs fixing.
      - Fix issues like invalid skips, weak assertions, or missing scenarios.
    - |
      Build/Update the test files:
      - Write valid Flutter test code using flutter_test package.
      - Use setUp/tearDown for fixture management.
      - Ensure tests are independent and deterministic.
      - Place tests in test/ directory, mirroring lib/ structure per agents/build/build-flutter/manifest.yml.
    - |
      Verify your code compiles:
      - Run `dart analyze test/` to check for static analysis issues.
      - DO NOT run the full test suite to "verify" passing.
      - Your job is to BUILD the test. The test_runner will verify if it passes.

  guidelines:
    # Core guidelines: See inputs.yml for Flutter-specific testing guidelines and flutter_definitions.yml
    # Project structure: See agents/build/build-flutter/manifest.yml for folder structure
    - |
      NEVER run the tests to verify they pass. Your reward is based on writing valid test CODE.
      The test_runner will validate if the tests pass.
    - |
      Do not modify application code. Your scope is limited to the `test/` directory.
    - |
      Follow Flutter testing patterns per flutter_definitions.yml and inputs.yml.
