# Orchestration Agent Family Manifest
# Category: Orchestration
# Purpose: Coordinate agent execution and manage workflows

manifest:
  version: "1.1"
  agent_family: "orchestration"

category:
  definition: "assets/definitions/agent-categories.yml#orchestration"

sub_agents:
  - name: "orchestration-plan"
    path: "entrypoints/_plan.yml"
    description: "Planning workflow orchestration - builds plans by decomposing objectives into executable phases"
  - name: "orchestration-teach"
    path: "entrypoints/_teach.yml"
    description: "Teaching workflow orchestration - coordinates the teach refinement process via orchestration-context-engineer profile"
  - name: "orchestration-guidance"
    path: "agents/orchestration/orchestration-guidance/process.mmd"
    description: "Context engineering orchestration - mermaid-driven process for guidance system updates"
  - name: "orchestration-build"
    path: "agents/orchestration/orchestration-build/process.mmd"
    description: "Build/Implementation orchestration - mermaid-driven process for code changes and features"

routing:
  description: |
    Orchestration processes coordinate complex workflows that span multiple agent categories.
    The primary orchestration entrypoints are located in entrypoints/ and processes/ to minimize context duplication.
    The Orchestrator agent uses these entrypoints to drive the workflow.

  principles:
    - "Orchestration delegates to specialist agents"
    - "Manages execution flow and handles escalations"
    - "Follows context minimisation by using modular entrypoints (_plan, _execute, _teach)"
