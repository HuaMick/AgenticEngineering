# Documentation Core Sub-Agent Manifest
# Describes documentation types and their purpose (not prescriptive paths)

documentation_types:
  - type: "Architecture Documentation"
    common_locations:
      - "docs/ARCHITECTURE.md"
      - "docs/architecture/"
      - "README.md (architecture section)"
    purpose: |
      Technical architecture documentation covering:
      - Project folder structure (where things can be found)
      - Technology stack and technology choices
      - Design decisions and architectural patterns

  - type: "Usage Documentation"
    common_locations:
      - "docs/guides/usage.md"
      - "docs/usage/"
      - "README.md (usage section)"
    purpose: |
      Usage documentation covering:
      - How to use the CLI and its commands
      - Common workflows and patterns
      - Examples of typical usage scenarios

  - type: "Configuration Documentation"
    common_locations:
      - "docs/guides/configuration.md"
      - "docs/configuration/"
      - "README.md (configuration section)"
    purpose: |
      Configuration documentation covering:
      - Configuration files and their purpose
      - Environment variables and settings

  - type: "CI/CD Documentation"
    common_locations:
      - "docs/CICD_README.md"
      - "docs/deployment/"
      - "docs/cicd/"
    purpose: |
      CI/CD pipeline documentation covering:
      - Pipeline architecture and stages
      - Branching strategy and triggers
      - Testing strategy and execution
      - Build and deployment processes

  - type: "Testing Documentation"
    common_locations:
      - "docs/testing/"
      - "docs/tests/"
    purpose: |
      Testing documentation with hierarchical structure:
      - README.md: Quick reference, action-focused (primary entry point)
      - Detailed guides: Full testing procedures and scenarios

      Documentation strategy:
      - README.md is low-context, high-action (feed to agents by default)
      - Detailed docs only when specifically needed

  - type: "Documentation Index"
    common_locations:
      - "docs/README.md"
      - "docs/index.md"
    purpose: |
      Documentation index providing overview and navigation to other docs

  - type: "Project README"
    common_locations:
      - "README.md"
    purpose: |
      Main project README at repository root informing agents of:
      - Where things are located
      - What entrypoints are available
      - How to invoke commands and use the project

discovery_approach: |
  This manifest describes common documentation patterns, not prescriptive paths.
  When working with a project, discover its actual documentation structure by:
  1. Exploring the docs/ directory
  2. Reading the root README.md
  3. Checking for project-specific documentation conventions
  4. Using the common_locations as hints, not requirements

