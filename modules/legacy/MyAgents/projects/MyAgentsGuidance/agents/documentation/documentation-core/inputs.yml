# Documentation Core Agent Inputs
# Self-contained inputs following context minimization principles
# Each sub-agent has complete inputs.yml with only what it needs

# P1: Using reference layers to eliminate duplication

agent_context:
  category: "assets/definitions/agent-categories.yml#documentation"
  role: "documentation-core"

inputs:
  agent_type: "documentation-core"
  version: "2.0-p1"  # Using reference layers

  # Reference layers (transitive loading)
  layers:
    - type: layer
      path: "assets/inputs/core-system.yml"
      description: "Core system definitions (plans, domains, workflows, entrypoints, architecture)"
      required: true

    - type: layer
      path: "assets/inputs/core-guidelines.yml"
      description: "Universal behavioral guidelines (fix-source, experiment-first, less-is-more, context-minimisation, testing, etc.)"
      required: true

  # Core inputs for documentation agents (agent-specific only)
  core_inputs:
    # Documentation structure and conventions
    - type: file
      path: "agents/documentation/documentation-core/manifest.yml"
      description: "Documentation folder structure and file locations (where docs should be placed)"
      required: true

    - type: file
      path: "assets/definitions/agent-context-files.yml"
      description: "Where agents find process.yml, definitions.yml, manifest.yml files"
      required: true

    # Existing documentation to discover and update
    - type: directory
      path: "docs/"
      description: "Existing documentation folder to discover, trace, and update"
      required: false
      note: "Discover actual documentation structure - varies by project"

    # Main README as entry point reference
    - type: file
      path: "README.md"
      description: "Main project README with entrypoints and usage information"
      required: false
      note: "Not all projects have a root README - discover actual entry point docs"

    # Project configuration for discovering entrypoints
    - type: file
      path: "pyproject.toml"
      description: "Project configuration including CLI entry points (Python projects)"
      required: false
      note: "Only exists in Python projects - use for discovering CLI entrypoints"

  # Documentation-specific terminology and definitions
  definitions:
    documentation_hierarchy: |
      Documentation follows a two-level hierarchy to minimize context loading:

      Level 1 - Quick Reference (feed to agents by default):
      - docs/<topic>/README.md - Low context, action-focused
      - Contains: Commands, quick decisions, links to detailed docs

      Level 2 - Detailed Guides (feed only when needed):
      - docs/<topic>/<SPECIFIC_TOPIC>.md - Full details for specific areas
      - Example: docs/testing/local-testing-guide.md, docs/deployment/cicd-pipeline.md

    documentation_scope: |
      Documentation should be minimal and purposeful. Document:
      - Entrypoints and options, usage (how to use the project)
        * Include all command aliases and short flag forms
        * Document default behaviors (e.g., what happens with no arguments)
        * Ensure entrypoint documentation matches actual implementation
      - Techstack or technology choices
      - Project architecture or folder structure (where things can be found)

      Do NOT document:
      - Implementation details or Internal Logic
      - Project state, todos, bugs (reserved for plans in docs/plans/)

    agent_context_files: |
      Agent context is stored in <agent_name>/:
      - process.yml or processes/<name>.yml - Step-by-step instructions
      - definitions.yml - Concept definitions agents may need
      - manifest.yml - Folder structure and file locations

      When updating documentation, ensure agent manifests reference new docs
      so agents can discover them.

    documentation_folders: |
      Documentation structure varies by project. Common patterns include:
      - docs/ARCHITECTURE.md or docs/architecture/ - Architecture and design patterns
      - docs/guides/ - Usage and configuration guides
      - docs/testing/ - Testing documentation (hierarchical structure)
      - docs/plans/ - Live plans and backlog (NOT documentation)
      - docs/README.md - Documentation index and navigation

      Discover the actual structure in the target project's docs/ folder.
