[pytest]
# Pytest configuration for MyAgents test suite
# Consolidated from root and tests/pytest.ini (2025-11-05)

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    agent_chat: Chat agent workflow tests
    agent_shell_operations: Shell operations agent tests
    workflow: Workflow unit tests (health check, preferences, studio, help)
    workflow_health_check: Health check workflow tests
    workflow_help: Help workflow tests
    workflow_studio: Studio workflow tests
    workflow_preferences: Preferences workflow tests
    workflow_cli_routing: CLI routing workflow tests
    infrastructure_cli: Cross-workflow CLI integration tests (myagents CLI routing, command availability, error handling)
    infrastructure: Infrastructure and service tests
    cli_unification: CLI unification tests (myagents unified CLI)
    e2e: End-to-end tests
    slow: Tests that take significant time to run
    integration: Integration tests
    requires_gcptoolkit: Tests that require GCPToolkit to be installed
    requires_network: Tests that require network access
    requires_packaging_worktree: Tests that require packaging worktree (local dev only)
    costly: Tests that are expensive (use real LLM calls or long-running operations)

# Command line options
# Note: --cov-fail-under removed because CI/CD runs parallel test steps
# that each only cover a subset. Coverage is collected but not enforced per-step.
# For local full test runs: pytest --cov-fail-under=40
addopts =
    -v
    --strict-markers
    --tb=short
    --capture=no

# Output
console_output_style = progress
