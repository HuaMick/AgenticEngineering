    healthcheck:
      test: ["CMD", "python", "-c", "import pytest; import sys; sys.exit(0)"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3
    stop_grace_period: 30s

# Named volume for test results aggregation
volumes:
  test-results:
    driver: local

# Network configuration for test isolation
networks:
  default:
    driver: bridge
