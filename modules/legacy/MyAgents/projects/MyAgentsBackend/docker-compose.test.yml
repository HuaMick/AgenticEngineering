# Docker Compose configuration for parallel test execution
# Purpose: Run 6 test packages in isolated containers with resource limits
# Each service runs a subset of tests to reduce total execution time
# Note: Set WORKTREE_NAME environment variable to match your worktree directory name
version: '3.8'

x-common-variables: &common-variables
  WORKTREE_NAME: ${WORKTREE_NAME:-MyAgents}

services:
  # Test Package 1: CLI Unification tests
  test-cli-unification:
    build:
      context: ..
      dockerfile: ${WORKTREE_NAME:-MyAgents}/Dockerfile.test
    container_name: myagents-test-cli-unification
    command: >
      /bin/bash -c "
      cd /workspace/\${WORKTREE_NAME:-MyAgents} &&
      /workspace/\${WORKTREE_NAME:-MyAgents}/.venv/bin/pytest tests/workflows/cli_unification/
      --junitxml=/test/results/cli_unification.xml
      -v
      "
    volumes:
      - test-results:/test/results
      - ${GCP_SA_KEY_PATH:-/home/code/myagents/secrets/myagents-475112-60da581cc8d9.json}:/root/service-account.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - UV_KEYRING_PROVIDER=subprocess
      - GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import pytest; import sys; sys.exit(0)"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3
    stop_grace_period: 30s

  # Test Package 2: Builder Agent tests
  test-builder-agent:
    build:
      context: ..
      dockerfile: ${WORKTREE_NAME:-MyAgents}/Dockerfile.test
    container_name: myagents-test-builder-agent
    command: >
      /bin/bash -c "
      cd /workspace/\${WORKTREE_NAME:-MyAgents} &&
      /workspace/\${WORKTREE_NAME:-MyAgents}/.venv/bin/pytest tests/workflows/agent_shell_operations/test_coding_agent_integration.py
      --junitxml=/test/results/builder_agent.xml
      -v
      "
    volumes:
      - test-results:/test/results
      - ${GCP_SA_KEY_PATH:-/home/code/myagents/secrets/myagents-475112-60da581cc8d9.json}:/root/service-account.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - UV_KEYRING_PROVIDER=subprocess
      - GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import pytest; import sys; sys.exit(0)"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3
    stop_grace_period: 30s

  # Test Package 3: Infrastructure Workflow tests
  test-infrastructure-workflow:
    build:
      context: ..
      dockerfile: ${WORKTREE_NAME:-MyAgents}/Dockerfile.test
    container_name: myagents-test-infrastructure-workflow
    command: >
      /bin/bash -c "
      cd /workspace/\${WORKTREE_NAME:-MyAgents} &&
      /workspace/\${WORKTREE_NAME:-MyAgents}/.venv/bin/pytest tests/workflows/infrastructure/
      --junitxml=/test/results/infrastructure_workflow.xml
      -v
      "
    volumes:
      - test-results:/test/results
      - ${GCP_SA_KEY_PATH:-/home/code/myagents/secrets/myagents-475112-60da581cc8d9.json}:/root/service-account.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - UV_KEYRING_PROVIDER=subprocess
      - GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import pytest; import sys; sys.exit(0)"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3
    stop_grace_period: 30s

  # Test Package 5: Packaging tests
  test-packaging:
    build:
      context: ..
      dockerfile: ${WORKTREE_NAME:-MyAgents}/Dockerfile.test
      args:
        WORKTREE_NAME: ${WORKTREE_NAME:-MyAgents}
    container_name: myagents-test-packaging
    command: >
      /bin/bash -c "
      cd /workspace/\${WORKTREE_NAME:-MyAgents} &&
