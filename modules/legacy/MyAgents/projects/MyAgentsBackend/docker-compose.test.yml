      cd /workspace/\${WORKTREE_NAME:-MyAgents} &&
      /workspace/\${WORKTREE_NAME:-MyAgents}/.venv/bin/pytest tests/integration/file_operations/
      --junitxml=/test/results/integration_file_ops.xml
      -v
