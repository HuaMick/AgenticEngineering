        reservations:
          memory: 256m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import pytest; import sys; sys.exit(0)"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 3
    stop_grace_period: 30s

  # Test Package 6: Integration File Operations tests
  test-integration-file-ops:
    build:
      context: ..
      dockerfile: ${WORKTREE_NAME:-MyAgents}/Dockerfile.test
    container_name: myagents-test-integration-file-ops
    command: >
