# ==============================================================================
# Cloud Build - PR Validation (Free Tier)
# ==============================================================================
# Optimized for GCP free tier: 120 build-minutes/day on e2-medium
# Runs: Lint + Unit tests only (sequential to fit 2 vCPUs)
# Trigger: Pull Requests to main branch
# ==============================================================================

steps:
  # ==============================================================================
  # 0. Setup & Secrets
  # ==============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Fetching Service Account Key..."
        gcloud secrets versions access latest --secret=gcp-service-account-key --project=$PROJECT_ID > /workspace/service-account.json
    id: 'fetch-sa-key'

  # ==============================================================================
  # 0.5 Prepare Workspace
  # ==============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['GH_TOKEN']
    args:
      - '-c'
      - |
        echo "Cloning Agent-GCPtoolkit..."
        git clone https://x-access-token:$$GH_TOKEN@github.com/HuaMick/Agent-GCPtoolkit.git Agent-GCPtoolkit

        echo "Cloning RemoteAgents..."
        git clone https://x-access-token:$$GH_TOKEN@github.com/HuaMick/RemoteAgents.git RemoteAgents

        echo "Restructuring workspace..."
        mkdir MyAgents_tmp
        find . -maxdepth 1 -mindepth 1 \
          ! -name 'Agent-GCPtoolkit' \
          ! -name 'RemoteAgents' \
          ! -name 'MyAgents_tmp' \
          ! -name 'service-account.json' \
          -exec mv {} MyAgents_tmp/ \;
        mv MyAgents_tmp MyAgents
        
        # Create config for CI
        mkdir -p config
        cat > config/config.yml << 'EOF'
        gcp:
          project_id: myagents-475112
        server:
          host: "127.0.0.1"
          port: 2024
          allow_blocking: true
        runtime:
          pid_file: "/tmp/studio.pid"
          log_dir: "/tmp/studio/logs"
          checkpoint_dir: "/tmp/studio/checkpoints"
        langgraph:
          project_name: "myagents-echo"
        EOF
    id: 'prepare-workspace'
    waitFor: ['fetch-sa-key']

  # ==============================================================================
  # 1. Build (with caching to save time)
  # ==============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest || true
        docker build \
          -t gcr.io/$PROJECT_ID/${_IMAGE_NAME}:pr-$BUILD_ID \
          --cache-from gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest \
          --build-arg WORKTREE_NAME=${_WORKTREE_NAME} \
          -f MyAgents/Dockerfile.test \
          .
    id: 'build-image'
    waitFor: ['prepare-workspace']

  # ==============================================================================
  # 2. Lint (fast gate - fail fast)
  # ==============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '--rm'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:pr-$BUILD_ID'
      - 'bash'
      - '-c'
      - 'cd /workspace/${_WORKTREE_NAME} && uv run ruff check . && uv run mypy .'
    id: 'lint'
    waitFor: ['build-image']

  # ==============================================================================
  # 2.5 Download testmon database (selective test execution)
  # ==============================================================================
  # Download .testmondata from GCS to enable selective test execution.
  # First run (no DB) will fail gracefully and run all tests.
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - 'cp'
      - 'gs://$PROJECT_ID-coverage/testmon/pr-unit.testmondata'
      - '/workspace/MyAgents/.testmondata'
    id: 'download-testmon-db'
    allowFailure: true
    waitFor: ['build-image']

  # ==============================================================================
  # 3. Unit Tests (Sequential - fits e2-medium 2 vCPUs)
  # ==============================================================================
  # Run all unit tests in a single container to minimize overhead
  # Uses --testmon for selective execution based on changed files
  # Note: Can't use volume mount for testmondata - Docker creates a directory
  # if source doesn't exist, which breaks sqlite. Use docker cp instead.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Run container in background
        CONTAINER_ID=$(docker run -d \
          -v /workspace/service-account.json:/root/service-account.json:ro \
          -e GEMINI_API_KEY="$$GEMINI_API_KEY" \
          -e LANGSMITH_API_KEY="$$LANGSMITH_API_KEY" \
          -e GOOGLE_APPLICATION_CREDENTIALS=/root/service-account.json \
          gcr.io/$PROJECT_ID/${_IMAGE_NAME}:pr-$BUILD_ID \
          sleep infinity)

        # Copy testmondata into container if exists (from download step)
        if [ -f /workspace/MyAgents/.testmondata ]; then
          echo "Copying existing testmondata into container..."
          docker cp /workspace/MyAgents/.testmondata $${CONTAINER_ID}:/workspace/${_WORKTREE_NAME}/.testmondata
        else
          echo "No testmondata found - testmon will run all tests"
        fi

        # Run tests
        echo "Running tests with testmon (excluding costly)..."
        docker exec $${CONTAINER_ID} bash -c "cd /workspace/${_WORKTREE_NAME} && \
          uv run pytest --testmon --testmon-forceselect -m 'not costly' \
            tests/workflows/ \
            tests/integration/ \
            --tb=short \
            -v"
        TEST_EXIT=$?

        # Copy testmondata back out for upload step (even if tests fail)
        echo "Copying testmondata out of container..."
        docker cp $${CONTAINER_ID}:/workspace/${_WORKTREE_NAME}/.testmondata /workspace/MyAgents/.testmondata || true

        # Cleanup
        docker stop $${CONTAINER_ID} > /dev/null
        docker rm $${CONTAINER_ID} > /dev/null

        exit $${TEST_EXIT}
    secretEnv: ['GEMINI_API_KEY', 'LANGSMITH_API_KEY']
    id: 'unit-tests'
    waitFor: ['lint', 'download-testmon-db']

  # ==============================================================================
  # 3.5 Upload testmon database
  # ==============================================================================
  # Save updated .testmondata to GCS for future runs.
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - 'cp'
      - '/workspace/MyAgents/.testmondata'
      - 'gs://$PROJECT_ID-coverage/testmon/pr-unit.testmondata'
    id: 'upload-testmon-db'
    allowFailure: true
    waitFor: ['unit-tests']

substitutions:
  _WORKTREE_NAME: 'MyAgents'
  _IMAGE_NAME: 'myagents-test'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/LANGSMITH_API_KEY/versions/latest
      env: 'LANGSMITH_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/MyAgents-github-oauthtoken-efe903/versions/latest
      env: 'GH_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM  # FREE TIER: 120 min/day

