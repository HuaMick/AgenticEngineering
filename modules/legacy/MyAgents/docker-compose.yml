# Unified Docker Compose for MyAgents Local Development
# This configuration provides backend services for local MyAgents CLI development
#
# Services:
#   - relay: WebSocket relay service for agent communication (port 8080)
#   - terminal: PTY terminal service for remote shell access (port 8081)
#
# Usage:
#   Start all services:     docker-compose up
#   Start specific service: docker-compose up relay
#   Background mode:        docker-compose up -d
#   View logs:              docker-compose logs -f
#   Stop services:          docker-compose down
#
# Development Features:
#   - Hot-reload via volume mounts for source code changes
#   - Health checks ensure proper startup order
#   - Shared network for inter-service communication
#   - Environment file support (.env)

version: '3.8'

services:
  # ==============================================================================
  # Relay Service - WebSocket Server for Agent Communication
  # ==============================================================================
  relay:
    build:
      context: ./RemoteAgents
      dockerfile: Dockerfile
    container_name: myagents-relay
    ports:
      - "8080:8080"
    environment:
      # Relay service configuration
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CLEANUP_INTERVAL=${CLEANUP_INTERVAL:-60}
    volumes:
      # Mount source code for development hot-reload
      - ./RemoteAgents/src:/app/src:ro
      # Mount pyproject.toml for dependency changes
      - ./RemoteAgents/pyproject.toml:/app/pyproject.toml:ro
    networks:
      - myagents-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.myagents.service=relay"
      - "com.myagents.description=WebSocket relay for agent communication"

  # ==============================================================================
  # Terminal Service - PTY Terminal for Remote Shell Access
  # ==============================================================================
  terminal:
    build:
      context: ./RemoteAgents
      dockerfile: Dockerfile
    container_name: myagents-terminal
    ports:
      - "8081:8081"
    environment:
      # Terminal service configuration
      - TERMINAL_HOST=0.0.0.0
      - TERMINAL_PORT=8081
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TERMINAL_SHELL=${TERMINAL_SHELL:-/bin/bash}
    volumes:
      # Mount source code for development hot-reload
      - ./RemoteAgents/src:/app/src:ro
      # Mount pyproject.toml for dependency changes
      - ./RemoteAgents/pyproject.toml:/app/pyproject.toml:ro
    networks:
      - myagents-network
    # Terminal service depends on relay being healthy
    depends_on:
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Override default CMD to run terminal server
    command: ["python", "-m", "agent_remote.services.terminal.api.server"]
    restart: unless-stopped
    labels:
      - "com.myagents.service=terminal"
      - "com.myagents.description=PTY terminal service for remote shell access"

# ==============================================================================
# Networks
# ==============================================================================
networks:
  myagents-network:
    driver: bridge
    name: myagents-network
    labels:
      - "com.myagents.network=main"
      - "com.myagents.description=Shared network for MyAgents services"

# ==============================================================================
# Notes
# ==============================================================================
#
# Environment Variables (.env file support):
#   LOG_LEVEL          - Logging level (default: INFO)
#   CLEANUP_INTERVAL   - Relay cleanup interval in seconds (default: 60)
#   TERMINAL_SHELL     - Shell to use for PTY sessions (default: /bin/bash)
#
# Service Health Checks:
#   Both services expose /health endpoints for monitoring
#   Terminal service waits for relay to be healthy before starting
#
# Development Workflow:
#   1. Start services: docker-compose up
#   2. Services rebuild automatically when code changes (volume mounts)
#   3. Run local MyAgents CLI against http://localhost:8080 (relay)
#   4. Terminal sessions connect to http://localhost:8081 (terminal)
#
# Testing:
#   Verify relay health:    curl http://localhost:8080/health
#   Verify terminal health: curl http://localhost:8081/health
#   View relay logs:        docker-compose logs -f relay
#   View terminal logs:     docker-compose logs -f terminal
#
# Troubleshooting:
#   - If services fail to start, check logs: docker-compose logs
#   - Rebuild containers: docker-compose build --no-cache
#   - Reset volumes: docker-compose down -v && docker-compose up
#   - Check network: docker network inspect myagents-network
